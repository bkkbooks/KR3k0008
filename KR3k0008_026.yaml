body:
  text: 第二十六忠義一白不以財貨汙人後漢朱暉為郡吏太守阮況欲市暉牛不與曰恐以財貨汙君況卒厚贈非有愛也請代長史死劉平為彭城吏龐萌反攻郡刺史孫萌平冒刃伏萌上請以身代賊劍刃止萌中瘡氣絶蘇求飲平以己瘡血飲之袁渙感劉備劉備死群臣皆賀袁渙不賀袁渙以嘗為劉備舉史冒法辭故主愍懷太子廢有可不許宮臣送江統冒葉至伊水拜辭宿沙釐隨見上門欒布哭彭越布為梁大夫使齊漢臬越首布還奏事越頭下祠而哭之代太守罪後漢周嘉高祖父名燕宣帝時為獄曹掾太守欲枉殺人燕諫不聽死家諧闕詔覆考燕曰願著燕名但言時病栲掠辭無撓當下蠶室不食而死七賢袁祕為郡門下議生從太守趙謙擊黃巾軍敗與功曹封觀等七人以身捍刃皆死謙得免詔復其門號七賢負太守逃劉茂為門下掾赤眉攻郡殺長吏茂負太守孫福踰牆藏穴中得免晝隱夜求食百餘日賊去乃歸府叱辱官長者晉王育字伯春太守桓宣命為主簿宣左遷萬年令杜令王攸詣宣宣不迎攸曰卿為二千石吾所敬也今吾儕耳何不見迎欲以小雀遇我使畏死鷂乎育執刀叱攸曰主辱臣死小縣令敢輕辱吾君將剌之宣跣下抱育乃止由是知名歸故主曹公擒關羽禮之甚厚而顧其無久留意張遼以請問之羽曰極知曹公待我厚禮然受劉公恩誓以共死不可背要當立效報曹公而後歸及羽獲顏良曹公知其必去重加賞羽封所賜拜書告辭而去奔先主曹公不令追之官長引為證後漢吳詠嘗為馬賢所辟又為太尉龐參掾賢參相誣罪應死各引詠為證詠計理無兩直自刎而死二人慚和解涼州剌史張範祭其墓旌其子舉幡募救罪鮑宣字子都坐拒閉使者大不敬下獄當死弟子王咸舉幡募救宣者會此諸生會者千餘人遮丞相車又守闕遂得減死一等行賂免長吏罪太守尹端以宋俊公偉為主薄端坐死罪俊行賂得減端不知俊亦不言行賂減罪史弼字公謙坐罪舊舉孝廉魏邵賣郡邸行賂得減死變姓名鄧融請廉范為功曹融下獄范變姓名卒為獄吏管護之及出獄又牧養融孔來事可為馬周疏臣不幸早失父母犬馬之養已無所施顧來事可為者惟忠義而已忠正義烈天下所推朱敬則睿宗嗣位嘗曰神寵以來忠於本朝者李多柞王同皎韋月將燕欽融並褒復矣尚有遺者耶劉幽求曰朱敬則忠正義烈天下所推往為宗楚客冉祖雍等所誣謫守刺史長安中嘗語臣曰相王必受命當悉心事之及韋氏干紀臣遂見危赴難雖天誘其衷亦敬則啓之於是追贈名與岱嵩等武元衡贊賢者於忠義寧以一不幸遽使慊然於其心哉要躬可殞而名與岱嵩等矣其言忠義下皆畏悅張建討治徐十年其言忠義感激故下皆畏悅忠義奮發令狐彰李吉甫奏彰將死籍上土地兵甲遣諸子還第彰同時河朔諸鎮傳子孫熏灼數代唯彰忠義奮發而長子無辜皆竄死今通幸存惟陛下用之天下以忠義多田氏田宏正徙成德其子布為河陽節度使父子同日受命時韓洪與子公武亦皆領節度而天下以忠義多田氏忠義為當世所高田布諸子皆有方面功以忠義為當世所高我世唐臣守忠義顏杲卿至落陽祿山怒曰吾擢爾太守何負而反杲卿嗔目罵曰汝營州牧羊羯奴耳竊荷恩寵天子負汝何事而乃反乎我世唐臣守忠義恨不斬汝以謝上乃從爾反耶祿山不勝忿縛之天津橋柱節解以肉噉之詈不絶賊鉤斷其舌曰復能詈否杲卿含胡而絶矣張巡令狐潮素善巡至城下情語巡曰本朝危蹙兵不能出關天下事去矣足下以羸兵守危堞忠無所立盍相從以苟富貴乎巡曰古者父死於君義不報子乃銜妻孥怨假力于賊以相圖吾見君頭于通衢為百世笑奈何潮赧然去不可為不義屈城陷與遠俱執子琦謂巡曰聞公督戰大呼輒眥裂血面嚼齒皆碎何至是曰吾欲氣吐逆賊顧力屈爾子琦怒以刀使袂其口齒存者三四罵曰我為君父死爾附賊乃犬彘也安得久子琦曰服其節將釋之或曰彼守義者烏肯為我用且得衆心不可留乃以刃脅降巡不屈又降齊雲未應巡呼曰南入男兒死爾不可為不義屈齊雲笑曰欲將有為也公知我者敢不死亦不肯降乃與姚誾雷萬春等三十六人遇害程千里事見攻守門龐堅賊縛致東京將磔解之有說祿山曰義士也彼為其主殺之不祥乃縛於樹比且死見者哭之臨刑色不變符令奇田承嗣引令奇為右職田悅拒命馬燧敗之子璘乃以衆降燧璘之出與三子同降悅怒引令奇功讓令奇罵曰爾忘義背主旦夕死吾教子以順殺身庸何悔鈞死愈爾遠矣悅怒奮而起令奇臨刑色不變孫揆昭宗討李克用以揆為兵馬招討制置副使克用伏兵刀黃嶺執揆原禮而將用之曰公革輩從容廟堂何為自履行陳也揆大罵不詘克用怒使以鋸解之鋸齒不行揆謂曰死狗奴解人當朿之以扳汝輩安知行刑者如其所言詈不輟至死以忠義相提衡鄭從讜時鄭畋以宰相鎮鳳翔移檄討賊兩人以忠義相提衡賊尤憚之號二鄭云大間忠義傳序夷齊排周存商商不害亡而周以興兩人至餓死不肯屈卒之武王蒙慚德而夷齊為得仁仲尼變色言之不敢少損焉故忠義者真天下之大間歟姦鈌逆鼎搏人而肆其毒然殺一義士則四方解情故亂臣賊子赩然疑沮而不得逞何哉欲所以為彼者而為我也義在與在義亡與亡故王者常推而褒之所以砥礪生民而窒不軌也李玄通拜定州總管為黑闥所破愛其才欲以為將玄通曰吾當守節以報烏能降志賊邪不聽囚之故吏有餉飲饋者玄通曰諸君見哀吾能一醉遂縱飲謂守者曰吾能劍舞可借力守士與之曲終仰天太息曰大大夫撫方面不能保所守尚何視息邪乃潰腹死帝為流涕盧奕安祿山陷東都奕自朝服坐臺被執將殺之即數祿山罪徐顧賊徒曰為人臣者當識逆順我不蹈失節死何恨觀者恐懼奕臨刑西向再拜而辭罵賊不空口逆黨為變色李紳李錡辟掌書記會使者召錡稱疾即脅使者為衆奏天子幸得留錡召紳作疏坐錡前紳陽怖栗至不能為字下筆輒塗去盡數紙錡怒罵曰何敢爾不憚死邪對曰生未嘗見金革今得死為幸即注以刃令易紙復然或言許縱能軍中書紳不足用召縱至操書如所欲即囚紳獄中錡誅乃免或欲以聞謝曰本激于義非市名也乃止願至賊中諭天子至意吳漵朱泚反願至賊中諭天子至意帝大悅淑退謂人曰吾知死無益而決見賊者人臣食祿死其難所也方危時安得自計且不使陛下恨下無犯難者即日齎詔見泚具道帝待以不疑者而泚業僣逆故留漵客省不遣卒被害竄伏里中蔣沇德宗出奉天沇奔行在為賊所拘欲誘署僞職沇絶食不應命竄伏里中不復見京師平乃出本傳顧忠義可為者聞而默則不安裴潾傳張皋上疏臣蓬葭之生非以邀寵顧忠義可為者聞而默則不安郤唐兵升殿姚思廉遷代王侍讀高祖定京師府僚皆奔亡獨思廉侍王兵將升殿思廉厲聲曰唐公起義本安王至若等不宜無禮於王衆貽卻布列階下帝義之聽扶王至順王閣泣辭去觀者嘆曰仁人有勇謂此人乎忠義蓋天性王彥章武人不知書常為俚語謂人曰豹死留名其於忠義蓋天性五代史能為國家死姚洪自董璋為梁將時洪嘗事璋後事唐為指揮使長興中遣洪將千人戍閬州董璋反遣人以書招洪洪得璋書輒投廁中後璋兵攻破閬州執洪璋曰爾為健兒我遇汝厚奈何負我邪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘炙感恩不已今天子用爾為節度使何可反邪吾能為國家死不能從人奴以生璋怒然鑊于前令壯士十人刲其肉而食洪至死大罵明宗聞之泣下録其二子而厚恤其家五代史不忍背唐張敬達契丹兵圍敬達楊光遠勸敬達降晉敬達自以不忍背唐而救兵且至光遠促之不已敬達曰諸公何相迫邪何不殺我降光遠即斬敬達降契丹耶律德光聞敬達死哀其忠遣人收葬之罵虜城上沈斌晉開運元年為祁州剌史契丹犯塞至于榆林過祁州斌以州兵邀之契丹以精騎剷門斌兵多死城中無備勇將趙延壽留兵急攻之延壽招斌降斌從城上罵延壽曰公父子誤計陷于腥羶忍以犬羊之衆殘賊父母之邦斌能為死爾不能效公所為也已而城陷斌自盡其家屬皆徒于虜並五代史爭淬伏讎之刃各懷報國之心爭淬伏讎之刃破朱泚露布于公異羽義翼忠若鸞若鴻呂溫房元齡贊身得輕用者忠與義有生所甚重者身也得輕用者忠與義也身可殺名不可死志也孝友序捐生以趣義者寧豫期垂名不朽而為之故次序夏侯端以來凡三十三人於左方同上忠義感人李晟無積資輸糧提孤軍抗群賊身佩安危而氣不少衰徒以忠義感人故豪桀樂為之死耳本贊秉義挺忠崒然不可奪同上紀信乘黃屋以誑楚赴丹焰而存漢數千年間一人而已贊皇公三良論忠義之心豈膏盲之所羈絆柳宗元賦自古忠臣義士之難得五代之亂三人者或出於軍卒或出於僞國之臣可勝嘆哉忠義之徒泣血固守郭曙傳德宗詔曰四鎮二廷統西夏五十七蕃十姓部落國朝以來相與率職自關隴失守王命阻絶忠義之徒泣血固守奉遵朝法此皆侯伯守將來修共治之效朕甚嘉之何亡忠誼至是郭子儀吐蕃等掠涇邠子儀屯涇陽軍才萬人比到虜騎圍已合子儀以數十騎出免胄見其大酋曰諸君同艱難久矣何忽亡忠誼而至是邪李景稱臣願割地輸貢賦以效誠款而仁贍獨堅守不可下世宗使景所遣使孫晟等至城下招輸之仁贍子崇諫幸其父病謀諸得出降仁贍立命斬之監軍使周廷創哭于中門救之不得於是士卒皆感泣願以死守壽州故治壽春世以其難剋遂徙城下祭而復其軍曰忠正軍曰吾以旌仁贍之節也五代史白以孝事君則忠移孝為忠王遵忠臣見孝部君親在難魏夏侯肯年十三漢中之敗左右提之以走肯曰君親在難焉所走死奮劍以沒王經辭母魏王經為尚書高貴鄉公欲討司馬文王王沈王經皆預謀謀訖沈走告文王經獨不行被收泣辭母母顏色不變曰為子則孝為臣則忠人誰不死死得所何恨之也方寸亂矣獨徐庶從先主曹公獲其母庶辭先主而指之心曰本欲與將軍共圖霸業以方寸之地今失老母方寸亂矣無益於事益詣曹公忠孝萃於一門晉卞壺為蘇峻苦戰死二子眕盱見父沒同赴賊見害母撫二子尸曰父為忠臣汝為孝子何恨徵士翟陽曰父死於君子死於父忠孝萃於一門違孝徇忠晉溫嶠字太真欲將命母崔氏固止之嶠絶裾而去後母亡阻亂不獲歸葬不以母辭周處為中丞朝廷惡其彊直及使隸夏侯駿西征孫秀知其將死謂之曰卿有老母可以辭處曰忠孝不兩全既辭親事君父母安得而子乎今日我死日也代父死罪史石奢相楚行縣有殺人者追之乃其父也縱父而自悔曰以父立政不孝廢法縱罪非忠也遂自刎以死隨母亡畢諶為兗州別駕張邈劫其母弟妻子太祖謝遣之曰卿老母在彼當去諶頓首無二心既出遂亡呂布破張邈生得諶諶懼太祖曰孝於親豈不忠於君君子不罪之用為魯相孔立身成名王圭拜禮部尚書兼魏王師王問圭何以為忠孝圭曰陛下王之君事思盡忠陛下王之父事思盡孝可以立身可以成名奉上忠事親孝李績卒帝曰績奉上忠事親孝歷三朝未嘗有過韓琬舉茂才名動里中刺史行鄉飲餞之主人揚觶曰孝于家忠于國令始充賦請行無算爵儒林榮之諄諄必忠孝承乾好慢游然懼帝祕其跡臨朝言諄諄必忠孝無敢舉者大中間丞郎宴席蔣伸在坐忽酌一杯言曰坐上有孝於家忠於國及名重於時者飲此爵衆皆肅然無敢舉者獨李公景讓更引此爵蔣曰此宜然南部新書不兩立于志寧母喪免有詔起復本官固請終喪帝遣岑文本郭譬曰忠孝不兩立今太子須人教約卿彊起為我卒輔導之志寧乃就職觀書所志惟忠孝大略桓彥範觀書所志惟忠孝大略誅二張也張東之勤兵景運門將遂夷諸武桓將起事告其母母曰忠孝不並立義先國家可也教子弟濮陽吳君教子弟未嘗不以忠孝端其本柳宗元序不孝不忠為苟榮冒祿圈牢之物不若也帝嘉其切直蘇源明諫親征忠孝吾子梁臣牛存節病召歸京師將卒語其子知業曰忠孝吾子也不及其他忠孝臣子之大節唐家人傳無父烏生無君烏以為主而世之言曰為忠孝者不兩全夫豈然哉君父人倫之大本忠孝臣子之大節豈其不相為用而又相害者乎抑私與義而已矣蓋以其私則兩害以其義則兩得其父以兵攻其君為其子者從父乎從君乎曰身從其君志從其義可也能事其親以孝然後能其君以忠若烏震者可謂大不孝矣尚何有於忠哉本傳思履其跡馬周臣每讀前史見賢者忠孝未嘗不廢卷長想思履其蹟褒忠以勸臣節旌孝以激人倫李源傳父死賊手常悲憤不仕李德裕薦曰天寶時士罕伏節逆羯始興委符組棄城郭者不為恥而憕約義同列守位自如抵刃就終臣節之光由憕始而源天與至孝絶心仕祿五十餘年常守沉默理契深要一亂關析百慮洗然抱此精節棄於清世臣竊為陛下惜之穆宗下詔曰昔盜起幽陵振蕩河洛贈太尉憕處難居首正色就死兩河聞風再固危壁殊節卓焉源有曾參之行巢父之操泊然無勞汔此高年夫褒忠所以勸臣節也旌孝所以激人倫也其以源為諫議大夫源謝辭吐哀愨無所受學者學為忠與孝陽城遷國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十輩忠孝之門舊史劉褘之拜中書舍人轉相王府司馬高宗謂曰相王朕之愛子以卿忠孝之門藉卿師範所冀蓬生麻中不扶自直耳雖在千百年之前猶敬而慕之韓愈上李尚書書愈也少從事於文學見有忠於君孝於親者雖在千百年之前猶敬而慕之況親逢閣下得不候於左右以求效其懇懇馮伉授醴泉令著喻蒙書十四篇教以忠孝鄉鄉授之使轉相教督本傳白臣一主二奸以事君棄君於惡私政贊私劉因毀信廢忠移事智伯豫讓交私諸侯漢法孟子曰長君之惡其罪小逢君之惡其罪大逢迎也謂先意導之為惡居下訕上要君者無上利祿三違不出境則利祿也雖曰不要君吾不信也言不忠信語賊人之主事君不忠非孝也禮二心懷二孔為臣不忠王鉷弟焊鉷與銲召術士語不軌術士驚引去鉷捕殺之以絶口銲與邢縡善鉷亦交縡與銲謀引右龍武軍萬騎燒都門誅執政作難先二日事覺帝召鉷付告牒鉷意銲與縡連故緩其事但督兩縣尉捕賊會高力士以飛龍小兒甲騎四百至斬縡盡禽其黨國忠奏鉷與謀帝不信林甫亦為鉷言故帝原銲不問然欲鉷請銲罪使國忠諷之鉷良久曰弟為先人所愛義不欲捨而謀存帝聞頗恕而陳希烈固爭當以大逆鉷未知方上表自解有詔希烈訊鉷矣有司不肯通奏鉷見林甫林甫曰事後矣俄而銲至國忠問曰大夫與否未及應侍御史裴冕叱銲曰上以大夫故官君五品君為臣不忠為弟不誼大夫豈與反事乎國忠愕然曰與固不可隱不與不可妄銲乃曰兄不與獄具詔銲杖死鉷賜死本傳不諍於君蘇源明言臣不諍於君不忠也墜君命挫國威白居易李陵論墜君命挫國威不可言忠亦何生為李觀朝錯論忠所以補君忠有不遂是臣不臣亦何生為文粹以不忠為忠裴延齡引經誼惑其主以不忠為忠本贊不忠不孝者斬之閩王延義更名曦自昶世倔彊難制昶相王倓每抑折之曦亦憚倓不敢有所發新羅遣使聘閩以寶劍昶舉以示倓曰此將何為倓曰不忠不孝者斬之曦居旁色變五代史近者楊辨首為猖狂扇惑亂卒今則身膏齊斧縈反妻孥生為不忠之臣死為負義之鬼李贊皇一品集賜石雄及三軍敕古無其比劉稹乳是騃童未有所識皆是郭誼王協乘其昏弱矯托軍情妄獻表章欲求襲劉稹念其一門受戮便欲自取寵榮不義古無其比朕以誘陷劉稹皆是此賊賣上圓全義難容捨賜潞州軍人敕書同上義四白詩書義之府也義者利之本也君能制命為義義以生利利者義之和也義以建利義以成命見義不為無勇也義之與比禮以行義尊卑有禮得其宜也見義不為是為人子聞而能徙何以為憂將息爭端得知義所名以義聞不為義疾疾病也見義則不為病稱以好權爾雖有說謂之曰義吾則不知義以為質以義制事子曰義者天下之斷也義以為上君子有勇而無義為亂小人有勇而無義為盜大道廢有仁義老子名以義聞節因事見失義而後禮老子上義為之而有以為老子土地儒有立義以為土地行而服人張乃國維管子曰國有四維其二曰義節不可奪道不可屈文侯軾廬於干木假干木當於義故千乘為之軾廬諸侯為之止戈馮諼折券於薛人為孟嘗君市義晉文公出定襄王子犯曰人未知義未安其居文公於是出定襄王以示事君之禮也石碏滅親大義滅親謂殺子厚共叔多行共叔段驕祭仲請討之莊公曰多行不義必自敝子姑待之諭於義君子聞義不能徙是吾憂也不義而富且貴於我如浮雲思義君子行則思義門內恩掩門內之理恩掩義門外之理義斷恩不可劫以兵文子曰夫為義者為可劫以兵不可懸以利以義衛身文子曰世治則以義衛身世亂則以身衛義匡邪矯枉文子曰義者匡邪以為正欀險以為平衛身以為直方外易曰義以方外存義易知終終之可以存義也達義先王修禮以達義斷恩見上思義居則思義義然後取夫行義者以立言踐行豈徒徇名安己而已將以定去就之概夫專為義則傷生專為生則傷義義重於生全義可也後漢不謀舊國史樂毅去燕之趙趙王欲圖燕毅泣曰臣事昭王猶事大王若獲戾教於他國終身不謀趙之徒隸況燕昭王後嗣乎不忘舊主見上注慕義李膺門生皆禁錮侍御史景毅子實為膺門徒未有録牒故不及譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍苟安于己自免歸人義之爭罪魏王思與梁旨俱為西曹令史思直白曹失太祖旨將加重辟時思近出習代被收思乃馳還自陳己罪太祖歎習之不言思之職分曰軍中有義士二人不邀功郭憲西平人仁篤為一郡所歸韓約失信衆依羌人多欲取約邀功憲責怒曰人窮歸我約病死揚達所約送與疏憲曰生圖之豈取死人功太祖視疏問憲名不在中達以情對賜憲爵關內侯默受罪後漢段熲討羌涼州刺史郭閎貪其功稽留熲軍不進羌徒久戀鄉悉反叛閎歸罪熲坐徵輸左校羌覆沒營塢吏人守闕訟熲詔問段熲謝罪不敢言枉京師稱為長者自表取罪雷義字仲翁為尚書郎有同時郎坐事當居刑作義默自表取其罪以論司寇同臺郎覺之委位自上乞贖義罪順帝詔皆除刑免罪不謝范滂字孟博繫獄尚書霍諝理之得免范到京師往見諝而不為謝或讓之滂曰昔叔向嬰罪祁奚救之未聞羊舌有謝恩之辭祁奚有伐之色竟無所言養老窮婁護字君卿有故人呂公無子老窮托身於護養其妻及公終身恤孤窮楊峻字秀才同郡王象少孤為人傭年十八見使牧羊而私讀書被羊主箠楚峻美其才質贖象著家中聘娶立屋然後與別又晉許子章聞王育傭牧學讀書失羊將鬻以償之章遂代育償羊給衣食使與子同學身長八尺容貌絶異復以兄子妻之為立宅分之資産育受之無愧色太守治病蜀張嶷字伯岐病篤家貧廣漢太守何祗通厚嶷與疏闊乃自舉詣祗托以治病祗傾財療治數年乃愈以馬易棺後漢劉翊字相道逢病亡者以馬易棺脫衣斂之又逢故知困餧於路因殺所駕牛救之遂與俱餓死排患救患救解矜窮權濟富義抱義見得思義仁義為干櫓正路孟子曰義者人之正路也孔解牛與給喪事竇建德世為農鄉人喪親貧無以葬建德方耕聞之太息遽解牛與給喪事鄉黨異之撫棺號慟李綱為齊王憲參軍憲誅露車載尸故吏奔匿綱撫棺號慟為瘞訖乃去篤恩義岑文本撫弟姪篤恩義搢紳義之李義琰章懷太子之廢盡赦宮臣罪庶子薛元超等皆蹈舞義琰獨引咎涕泣搢紳義之詣獄自言李敬玄杭州參軍徐太玄哀其僚張惠以賦抵死而惠母老乃詣獄自言與惠偕受薄其罪惠得不死太玄坐免官敬玄廉知之擢鄭州司功可動以義李多祚張柬之將誅二張以多祚素感概可動以義乃從容謂曰將軍居北門幾何曰三十年矣將軍擊鍾鼎食貴重當世非大帝恩乎多祚泣數行下曰死且不忘柬之曰將軍知感恩則知所以報今在東宮乃大帝子而嬖豎擅朝危逼宗社國家廢興在將軍將軍誠有意乎捨今日尚何在答曰苟緣王室惟公所使乃引天地以自誓辭氣毅然柬之遂定謀以敬暉李湛為右羽林將軍命總禁兵與多祚王同皎請太子至玄武門斬關入及長生殿白武后曰諸將誅逆臣易之昌宗恐漏大謀不敢豫奏頓目請歸死后病臥顧湛曰我於而父子不薄亦豫是邪知義蕃將贊曰夷狄性惇故其能知義所在者鷙挺不可遷蓋巧不足而諒常有餘觀大奈等事君皆一其志無有顧望用能功績光明為天子倚信至渾瑊𨁂跌光顏輩烈垂無窮惟其諒有餘故也使絶域請代行狄仁傑同府參軍鄭崇質母老且疾當使絶域仁傑詣長史藺仁基請代行仁基咨其誼舉不失義思廉以諸生侍孱主奮然陳大義挫虓虎而奪之氣勇夫悍心褫駭自郤不敢加無禮於其君誠使有國家者舉不失義天下其何以抗之救韓思忠王晙朔方元帥魏元忠討賊不利劾奏副將韓思忠敗律當誅晙以思忠倫裨權不己制且其人勇智可惜不宜獨誅固爭得釋救魏張朱敬則進鳳閣鸞臺平章事張易之誣魏元忠張說欲誅之無敕言者敬則獨奏曰元忠說秉心忠一而所坐無名殺之失天下望乃得不死又宋璟張易之誣魏元忠有不臣語引張說為驗將廷辨說惶懼璟說曰名義至重不可陷正人以求苟免緣此受謫芬香多矣若不測者吾且叩閣救將與子偕死說感其言以實對元忠免死與資錢治喪郭元振年十六與薛稷趙彥昭同為太學生家嘗送資錢四十萬會有縗服者叩門自言五世未葬願假以治喪元振譽與之無少吝一不質名氏稷等嘆駭時人義之初重俊被害官屬莫敢視惟永和丞寧嘉勖號哭解衣褁其首時人義之義士謝叔方太宗曰義士也贖韋儇妹趙驊陳留陷歿于賊時江西觀察使韋儇族妹坐其夫為畿官不供賊沒為婢驊哀之以錢贖韋厚為資給賊平訪近屬歸之時人高其義獨餞於野皇甫鎛鎛之貶前房州剌史班肅以嘗僚獨餞於野朝廷義之送臨賀楊憑所善客徐晦憑得罪至藍田尉餞宰相權德輿曰君送臨賀誠厚無乃為纍乎餘見餞送門同舍當夕直為代竇參為萬年尉同舍當夕直者聞親疾惶遽參為代之會失因京兆按直簿劾其人參曰彼以不及謁而往參當坐乃貶江夏尉人皆義之申直其冤劉鄴德裕以朋黨抱誣死海上令狐綯久當國更赦不為還官爵至懿宗立綯去位鄴乃申直其冤復官爵世高其義餉姻家故人沈傅師問餉姻家故人帑無儲錢鬻宅以葬行義當時為難顏泉明其行義當時以為難負節義張巡負節義或以困厄歸者傾資振護無吝走人所急辛讜重然諾走人所急周贍朋友甄濟周贍有緩急輒出家資朋友以義聞任人之患李雍下獄許昌男子孔璋上書天子曰任人之患義也張巡功狀李翰傳張巡功狀表上之帝繇是感悟而巡大節白於世義士多之以義烈聞李綱孫安仁安靜自綱五世同居安仁安靜復以義烈聞世稱李氏不衰孝義劉家劉易從遷彭城長史永昌中為酷吏周興誣告坐死將刑百姓奔走爭解衣投地曰為長史祈福有司平直乃十餘萬當時號孝義劉家亡匿坐死桓彥範御史李福業嘗與彥範謀反被殺福業亦流番禺後亡匿吉州參軍敬元禮家吏捕得元禮俱坐死福業將刑謝元禮曰子有親吾甚愧恨元禮曰公窮而歸我我得已乎見者傷之三世不異居崔玄暐三世不異居家人怡怡如也列狄仁傑枉李嶠來俊臣誣狄仁傑等獄將抵死敕嶠與大理少卿張德裕侍御史劉憲覆驗德裕等內知其冤不敢異嶠曰知其枉不申是謂見義不為者卒興二人列其枉忤武后旨出為潤州司馬輟馬傾以濟樊澤客河朔相衛節度使薛嵩表為堯山令舉賢良方正次潼關雨淖困不能前有能執易者同舍朔旅哀之輟所乘馬傾褚以濟自罷所舉是歲澤上第救魏元忠蘇安恆魏元忠為張易之兄弟所誣獄方急安恆獨申救曰王者有容天下之量故齊其心能進天下之善故除其惡不然則神鬼馮怒陰陽紛舛行而宜之之謂義韓文原道分多勻薄顏杲卿令泉明到河北求宗屬履謙及父故將妻子奴隸尚三百餘人轉徙不自存泉明悉力贍給分多勻薄相抉挾度河再從皆同居劉審禮再從皆同居合二百口內外無間言元結曰信而勇者可以全義庶穆親族翟光鄴雍穆親族粗衣糲食與均有無而光鄴處之晏然五代史宗族七百口每食設廣席南唐李升州縣言民孝悌五代同居者七家皆表門閭復其繇役其尤盛者江州陳氏宗族七百口每食設廣席長幼以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食五代南唐世家沉斷固分者義也文粹盧藏用紀信碑荀息守言而死事豫讓感遇以自殘石乞烹身以徇白漸離臛自以報丹其義則立於大齊則闕焉同上視之如鴻毛白居易李陵論義重于死則視之如鴻毛死不為悔狄仁傑誠以山東之人重氣義一往死不為悔九世同居孝友傳序張公藝九世同居高宗有事太山臨幸甚居問本末書忍字以對天子為流涕賜縑帛而去請死陛南金開元初少卿盧崇道徙嶺南逃還南金匿之俄為讎人所告招捕按南金當重法弟趙壁詣御史王旭自言匿崇道者我也請死南金言弟自誣不情旭怪之趙璧曰母未葬妹未歸兄能辨之我生無益不如死旭驚上狀玄宗皆宥之舉船錢帛奴婢貺之裴寬尚書罷部西歸汴流中日晚維舟見一人坐樹下衣服極弊因命屈之與語大奇之遂為見知曰以君才識必自富貴何貧云也舉船錢帛奴婢貺之客亦不讓語訖上船奴婢偃蹇者鞭撻之公益奇之芝田録教行於天下由伯夷之為師也韓文通解自商之前千萬年渾渾然不知義之可換其生也故伯夷哀天下之偷且以彊則伏食其葛薇逃山而死於是後之人竦然而言曰雖餓死猶有義而不懼者況其小者乎故義之教行於天下由伯夷之為師也與三從昆弟居四十年朱敬則與三從昆弟居四十年資産無異割股肉啖之李績平洛陽得單雄信故人也表其材武且言若貸死必有以報請絀官爵以贖不許乃號動割股肉啖之曰生死永訣此肉同歸于土為收養其子焉悉奉廩賙濟內外親薛戎悉奉廩賙濟內外親無疏遠皆歸之既病以所有分遺之曰吾死矣可持為歸資衆皆哭而去匍陶請代史許敬宗始虞世基與善心同遭賊害封德彝常曰昔吾見世基死世南匍陶請代哭趙持滿王方翼其友趙持滿誅死尸諸道親戚莫敢視方翼曰欒布哭彭越義也周文王掩骼仁也絶友義蔽王仁何以事君遂往哭其尸具禮收葬金吾劾繫帝嘉之不罪無有難色韓愈書樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟皆優有餘而宗師妻子常寒露飢餒宗師怡然處之無有難色千金散義士四座無凡賓李白義救難之謂也宋子嵩化書賊相戒無往義門往依者五百室李知本事親馬至與弟知隱雍順子孫百餘至資用僮僕無間也大業末盜賊過廬不入相戒曰無往義門往依者五百室餘皆免捐生以趣義者寧像期垂名不朽而為之孝友序義在與在義亡與亡故王者常推而褒之所以砥礪生人而窒不軌也同上欒向儔宗室李晉坐豫太平公主謀晉就刑僚吏奔解雄司功參軍李撝從王如它日晉死哭其尸盡哀姚元崇嘆曰欒向儔也民性多逆聖人導之以其義鹿門隱書六闕相望朱敬則以孝義世被旌顯一門六闕相望裴佶授藍田尉德宗詔發畿縣民城奉天嚴郢為京兆政刻急本曹尉韋重規妻乳且疾不敢免佶請代役當時稱其義義形必霑巾杜甫詩李自倫六世同居准式旌表門閭敕曰其量地之宜高其外門門安綽楔左右建臺高一丈二尺廣狹方正稱焉圬以白而赤其四角使不孝不義者見之可以俊心而易行焉五代史四世同居兄弟猶同産劉君良四世同居兄弟猶同産也門內斗粟尺帛無所私武德中深州別駕楊弘業至其居凡六院共一庖子弟皆有禮節歎挹而去兄弟讓死王遇弟遐俱為賊執將釋一人兄弟讓死賊感其意盡縱之孝友傳飛梟食椹而懷音背本忘義者不及飛梟遠矣窮愁志鎮澆浮莫如尚義李源傅振高義於流俗之外柳宗元上趙宗儒啓以勇義平國難上嚴東川啓同上白送人喪後漢申屠蟠與濟陰王子居同在太學子居臨沒以身托蟠乃躬推輦送喪歸遇司隸從事義之為封傳護送蟠役傳不受也盜還馬孔嵩仲山正身厲行辭公府之京師宿卞亭盜竊其馬尋知是嵩馬乃責讓曰孔仲山善士豈宜侵盜送還馬之刺客不忍殺崔琦諷刺梁善冀令刺客陰殺之客見琦耕陌上懷詩諷詠乃以實告曰君賢不忍相殺君可亟逃吾亦從此亡矣遂去之琦音奇賊不入縣鄭玄還高密道遇黃巾見玄皆拜相約賊敢不入又袁宏見世亂乃混跡母沒不制服設位世莫能名黃巾賊入縣相約不入其廬托孤吳陸瑁同郡徐原愛居會稽素不相識臨死遺瑁書托孤幼瑁為起墓教導其子後漢傳論曰李膺振拔汙險之中蘊義生風以鼓動流俗激素行以恥威權立廉尚以抑貴勢使天下之士奮迅感概波蕩而從之幽深牢破家族而不悔至于子伏其死母歡其義壯哉范滂孟博將誅辭母母曰汝今得與李杜齊名吾何恨哉張儉被捕亡抵孔褒遇融融匿之赤眉弛兵赤眉過姜詩里弛兵而過曰驚乎大孝必觸鬼神魏胡昭為鄉里愛孫浪為寇約不犯胡君不忍刺陽球使刺客刺蔡雍客不忍刺又劉平使刺先主亦然又靈公使刺趙盾亦然義感五孔盜賊過閭不入李知本事見義門義城堡劉君良四世同居族兄弟猶同産也門內斗粟及帛無所私隨大業未荒饉妻勸其異居同易置庭樹鳥雛令鬥且鳴家人怪之妻曰天下亂禽鳥不相容況人邪君良即與兄弟別處月餘密知其計因斥去妻曰爾破吾家召兄弟流涕以告更復同居天下亂鄉人共依之從築為堡因號義城堡孝義鄉李自倫六世同居奉敕淮格按孝義旌表必先加按驗孝者復其終身義門仍加旌表得本州審到鄉老程言等稱自倫高祖訓訓生粲粲生則則生忠忠生自倫自倫生光厚六從居不妄敕以所居飛鳧鄉為孝義鄉匡聖里為仁和里准式旌表門閭義動人倫無不傷歎贊皇一品集論田群狀外議云田肇緣田群抵法不食而終義動人倫無不傷歎伏見後漢河間人尹次穎川人史玉皆坐殺人當死尹次兄初史玉母諢皆詣官曹求代其命因縊而物故漢帝哀之並赦其死既有故事敢不密陳假寢夢獲方惠宣太子業二十二年有疾帝憂之一昔容髮為變因假寢夢獲方寤而業少間數日湩流元德秀初兄子襁褓喪親無資得乳媼德秀自乳之數日湩流能食乃止白智者樂水智者樂智者動不惑智者智者詐愚用人之智去其詐智者見於未萌智者千慮必有一失愚者千慮必有一得漢書智者利仁知人者智以恬養智以智養恬恬智交相養智者天下之達德也何如其智信不智也潔瓶之智守不假器智者不失人語其蔽也蕩好智不好學大智子曰舜其大智也與不以智役物聖人智者心之符文子傳者智之役神清則智明智者心之符智公則心平絶聖棄智人利百倍老子智不足稱陽處父不役其身其智不足稱智免禍由智免臧武仲之智可謂成人矣臧文仲不智者三作虛器縱逆祀祀爰居是三不智智不如葵仲尼曰鮑莊子之智不如葵葵能衛其足智之難也有臧文仲之智而不容於魯抑有由也其智可及寧武子邦有道則智邦無道則愚其智可及其愚不可及既明且哲以保其身樊遲問智子曰務民之義敬鬼神而遠之可謂智矣子曰人皆曰豫智驅而納諸罟獲陷阱之中而莫之避也言其愚中庸樗里之囊史樗里子矍多智餘人號智囊管仲墮馬桓公北征孤竹山失道管仲曰老馬之智可肝乃墮馬馬行果得道隰朋尋蟻桓公北征孤竹無水朋曰隰明壤可得水乃掘蟻壤果然得水倉舒稱象魏武欲倉舒而不可稱稱象曰載於舟中則其至以他物論之可知矣太相大悅智有餘陳平智周萬物而不遺易智而不詐張老智士無思慮之變則不樂莊子智計歸之魏賈詡曰以非太祖舊臣而謀策深長懼見猜嫌閉門而自處無私交嫁娶不結高門天下論智計並歸賈氏也宮之奇在虞晉不加戎季梁在隨楚不為謀三仁未去武王還歸不伐殷智者所慮之於未形達者所規之於未兆子胥知姑蘇之有麋鹿輔果識智伯之為趙抄穆生謝病以免楚難鄒陽北遊不同吳禍以賢勇智智囊朝錯智如灸輠史淳于髡智如灸輠輠者車之盛膏器也灸之膏流不窮言如髡之智也桓範司馬宣王持誅曹爽桓範赴爽人曰智囊去也杜預多智人號智囊大智若愚不可以無涯之智役有涯之身莊子智六孔處事有疑非智尉遲恭隱巢計日急恭與長孫無忌入曰恭處事有疑非智衛兵數逃請聽納室裴矩隋煬帝幸江都衛兵數逃去帝憂之以問矩矩曰今乘輿淹狩已二年諸驍果皆無家人無匹合則不久安臣請皆聽納室帝笑曰公定多智因詔矩盡召江都女子孀家盡恣士所欲即配之不為愚者謀陳子昂奏八科謂智不為愚者謀尚謀又智者尚謀愚者所不聽智慮周密主鐸智慮周密時論推允辨給多智李程辨給多智天之象孫思邈曰智者動天之象故欲圓易曰見幾而作不俟終日圓之謂也望塵以知敵數周德威多智能望塵以知敵數好謀而成者智慮藏用紀信碑其自全近智泌之為人其自全近智贊智能顯功烈柳宗元答周用智能顯功烈而麼眇連蹇顛頓披縻固其所也五人智不及一韋公韋顗論議典據裴垍韋貫之李絳崔群蕭俯皆布衣舊繼為宰相朝廷典章多所咨逮嘗曰吾儕五人智不及一韋公民性多愚聖人導之以其智皮日休鹿門書知變通之謂也故居於冰化書智謀七白易人謀鬼謀百姓與能謀及卿士書謀之孔臧詩謨謀乎其上文選咨事為謀好謀而成謀不失利疑謀勿成中智以上荀息謂以璧假道於虞曰玩好在耳目之前患在一國之後中智以上乃能之臣料虞君中智之下也運籌帷幄漢祖曰運籌帷幄吾不如子房隨會其智傅隨會其智足使也識理過人晉謝安每曰朝之大事衆不能決咨王公無不得又魏舒元陽朝之碎務無問是非至於興廢大事衆莫能斷者而舒徐為籌之多出衆表也知幾其神乎易祭仲知權公羊宋人執鄭祭仲不名賢也為知權宋人曰為我出芻而立突仲不從則君必死國必亡從其言則可以存易亡古人有權祭仲是反於經然後有善也行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也未可與權可與適道未可與立可與立未可與權行中權廢中權見機而作不俟終日易孟子曰嫂溺援之以手權也男女不親授禮也嫂溺不援是豺狼也王霸視河後漢世祖為郎所逐南奔至呼沱河使吏具舟楫還曰河流澌無舟可渡衆皆恐復使王霸往視霸欲安衆心且使至河乃止遂矯云冰堅可渡世祖兵至河冰已合遂令霸護渡未畢二車冰乃解也吾謀適不用嘉謀嘉猷謀於野規矩誠設小大必由彼有人焉謀於長者無謀謀及婦人謀及庶人謀人之軍師敗則死之謀人之邦邑危則亡之張儀在蘇秦度關變通之間不容髮機也先見至誠之道可以前知見乎蓍龜動乎四體國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍福將至必先知之先覺抑亦先覺者是賢乎知微知章叔向母聞男聲晉叔向母聞向男伯石生視之及堂聞其聲而還曰豺狼之聲也非此莫喪羊舌氏遂不視之子文欲殺越椒楊子良生子越椒子文曰必殺之是子也熊虎之狀豺狼之聲不殺之必滅若敖氏之族贈策士會將歸晉繞朝知情贈之以策曰子無謂秦無人吾謀適不用也見事遲史范睢隨王稽入秦穰侯問稽車中有客乎稽曰無睢曰穰侯智士而見事遲回疑車中而忘索之乃平伏草穰侯行十里乃反使索車中有先知而無後悔思鱸魚晉張翰為齊王所辟因秋風起忽思鱸魚曰大丈夫所貴適意耳遂棄官歸江東俄而齊王敗人謂翰有先知之明軍勝人亡鍾會鄧艾伐蜀劉實字子真破蜀必矣而皆不還客問之笑而不答果如其言先見皆如此類也虞不獵矣晉假道於虞宮之奇曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩虞君不聽宮之奇曰虞不獵矣虢其亡乎屈瑕伐羅楚屈瑕伐羅鬥伯比謂其御曰莫敖必敗舉趾高心不顧矣果敗穆叔見趙孝伯曰趙孟將死其言偷且年未五十諄諄如八九十不能久矣偷苟且也先識後難智者見於未萌求知太早同見彈以思梟辨事方遲異在途而搜索許負之識條侯牛生白犢孔父知其吉祥位踐朱輪趙母知其必敗敏敏則有功黎民敏德不忘敏叔向曰薳氏有後於楚宜哉子蕩乘君命不忘敏加之以敏齊國莊子來聘禮成而加之以敏左傳告諸往而知來者敏於事而慎於言訥於言而敏於行回也非助我者於吾言無所不說聞言即解無所起發增益吾與回言終日不違如愚默而識之無所請益聞一知十回也聞一知二賜也開敏張放以公主子開敏敏給國語雞肋楊修字德祖為曹公主簿操平漢中欲因討劉備而不得進欲守之難為功於是出教唯曰雞肋衆莫曉修曰夫雞肋食之無所得棄可惜也公歸計決矣承意觀色淳于髡以承意觀色為務再見梁惠王終無言惠王問之曰前見王王志在逐後見王王志在音王曰誠聖人也聰悟識亡書漢武帝幸河東亡書三篋唯張安世識之寫得後購得本相校一無遺脫市肆閲書後漢王充字仲任博學不為章句家貧無書游洛陽市閲所賣書一見誦得遂博覽百家之書記貧人姓名後漢賈續既孤仕郡戶曹歲荒人饑太守君興使於都亭設貧人粥訊名字畢太守問口說六百人姓名無差謬博物張華博物彊記默講四海之內若指掌也讀諸剌夏侯湛從祖榮淵第五子七歲日誦千言經目輒識之文帝召之時有客百餘人人奏剌書卿里姓名示之一遍復使誦之不錯一人應奉讀書五行俱下為郡博物君子晉侯謂子産為博物君子博物多識王粲為侍中識竹簡晉束晢博物時嵩山下得竹簡一枚上兩行科斗字張華問束晢曰此漢明帝顯節陵中策文也驗之果然讀碑覆棋王仲宣與人共行讀道邊碑背而誦之不失一字又觀棋局壞粲為覆之棋者不信以帕蓋更以它局為之相校不失一路識部曲妻子吳朱桓字休穆為前將軍彊識與人一面數十年不忘部曲萬口妻子盡識之孔謀則通於遠而周於事柳文晉問胸有心者有其謀陳黯辨謀覆載之中胸有心者有其謀然其謀則必為己而先為人也故有孜孜汲汲力於謀者得之則逸身豐家不得則嫉時怨命為天下之謀堯舜有大寶之位不傳之子而傳於他人是為天下之謀得其君也大禹疏鑿橫流過其門而不顧啼嬰為天下之謀人為出其溺也后稷勤耕殖百榖為天下之謀人為粒其食也其謀信如何哉同上以謀略高自標顯薛逢杜黃裳善謀贊玄齡善謀如晦長於斷而玄齡善謀兩人深相知故能同心濟謀以佐佑帝浩蕩深謀噴江海李白述德英謀合鬼神同上贈張相文種有藏弓之恨李斯有稅駕之歎張華顧優游而不獲傅亮贊識微而不免此四子者皆神敏知幾聰明志古圖國致羈動必成功而自謀其身猶有此恨況常人哉窮愁志從容合廟謀徒倚瞻王室從容合廟謀杜甫送王信州曳踵為有疾狀姚崇資權譎始為同州張說以素憾諷趙彥昭劾崇及當國說懼潛詣岐王申款崇他日朝衆趨出崇曳踵為有疾狀帝詔問之對曰臣心有憂痛不在足問以故曰岐王陛下愛弟張說輔臣而密乘車出入王家恐為所誤故憂之於是出說相州死姚崇能算生張說崇與張說同為宰輔頗懷疑阻屢以事相侵張御之頗切崇既病戒諸子曰張丞相與吾不葉釁隙甚深然其為人稍懷奢侈尤好服玩吾身沒之後吾同僚當來吊子汝具陳吾平生服玩寶帶重器羅列於帳前張若不顧汝計家事産族無類矣若顧此吾屬無虞當録其玩用致公仍以神道碑為請既獲其文登時録進仍先礱石以待至便鐫刻張丞相見事當遲於我數日之後必當有悔若徵碑文以刊削為辭當引使視其鐫石仍告已具聞上元崇既沒張果至目其服玩者三四姚崇諸子悉如崇戒不數日文成敘足該詳時謂極筆其略曰八柱承天高明之位列四時成歲亭育之功全后數日果遣使取本以為辭未周密欲加刪改姚氏諸子乃引使者視其碑乃告以奏御使者覆命張悔恨撫膺曰死姚崇能算生張說吾今日方知才之不及遠矣度時舞數楊纂為吏部侍郎度時舞數以自進隨方制變張獻誠為政寬裕有機略隨方制變得匿名書內靴中王鍔善任數持下在淮南時嘗得匿名書內靴中俄取它書焚之人信其無名者異日因小罪并以所告窮驗衆以為神明諷劉玄佐韓滉劉玄佐不朝帝密詔滉曰宜早見天子不可使夫人白首與新婦子係填宮掖也玄佐泣悟言祿山反狀韋見素同平章事明年祿山表請蕃將三十二人代漢將帝許之見素不悅謂國忠曰言祿山反暴天下又以蕃代漢難將作矣國忠不應見素曰知禍之牙不能防見禍之形不能制焉用彼相每進見未嘗不為帝狀之帝不入其語未幾祿山果反機辨橫生鄭注于澄與語機辨橫生鈞達其意恨相見晚辨對縱橫皆合旨要又言辭敏速還同宿構馬上即成曾無點竄薛收舊史智數敏給李懷光人服其敏楊纂從子昉武后時為肅機宇文化及子訴治先蔭昉方食未即判遽曰肅機而未食庸知天下有冤而求食乎昉怒取牒署曰父弒隋主子訴隋資可乎人服其敏思致華敏劉禕之擢中書侍郎方是時詔令叢繁禕思致華敏裁可占授少選可待也屬文敏無留思韋承慶掌天官選屬文敏無留思雖大詔令未嘗著藁為祝成不淹頃李嗣真高宗東封還詔贈孔子太師命有司為祝司文郎中雷少穎文不稱旨更命嗣真成不淹頃暗誦六經日數千言劉乃少警穎暗誦六經日數千言敏於占對高士廉觀書一見輒誦敏於占對口記徒籍千人無差顏春卿調犀浦主簿嘗送徒於州亡其籍至廷口記物色凡徒籍千餘人長史陸象先異之呼指無誤崔涓性開敏為杭剌史及署未盡識卒史巧以紙各署姓名傅襟上過前一閲後數百人呼指無誤本傳廝豎一閲輒記姓名李畬遇事蜂鋭雖廝堅一閲輒記姓名士卒居人一見無不識張巡守雖陽士卒居人一見問姓名其後無不識官萬員未嘗忘姓氏李敬玄性彊記雖官萬員遇諸道未嘗忘姓氏一覽誦千言有若素習公在兩臺有送別四韻詩四十餘首令公誦之一遍倒覆之遂不錯一字其敏悟也如此韓休蘇顏文集序條神策軍建置本末蔣乂遷起居舍人會詔問神策軍建置本末中末討求不獲時集賢學士甚衆悉亡以對乃訪乂乂條據甚詳宰相高郢鄭殉瑜嘆曰集賢有人哉明日詔兼判集賢院五十年有聖人出孫思邈隋文帝輔政以國子博士召不拜密語人曰後五十年有聖人出吾且助之太宗初召詣京師吾孫為屬吏孫處約常以諸子見思邈曰俊先顯侑晚貴佺福在執兵後皆驗太子詹事盧齊卿之少也思邈曰後五十年位方伯吾孫為屬吏願自愛時思邈之孫溥尚未生及溥為蕭丞而齊卿徐州剌史倚冰山楊國忠權顧天下四方之士爭詣其門陝州進士張彖力學有大名志氣高大未嘗低折於人人有勸彖令修謁國忠可圖榮顯彖曰爾輩以楊公之勢倚靠如山以吾所見乃冰山耳或皎日大明之際則此山當誤人矣後果如其言則人美其先見開先天寶遺事千里外猶對面語房元齡高祖曰若人機識是宜委任每為吾兒陳事千里外猶對面語信八白大信不約小信未孚人未知信未宣其用信以守禮失信不立信以接事小所以事大信也仗德莫如信言以出信敦信書匹夫一為不信猶不可也可復之言信近於義言可復也車無輗軌子曰人而無信不知其可也大車無輗小車無軌其何以行之哉用情上好信則民莫敢不用情著誠去僞禮之經也作大事不以信未嘗可也寡信輕諾必寡信國寶信國之寶也信人之所庇言要急端好信不好學其蔽也絞伐原示信晉文公二三其德不信信及豚魚闕而不立寧去兵食失則何行譬無輗軌守約推誠忠信以為寶以為甲胄是曰行先不為人下君之所司也名以出信名位不愆則為民所信信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體信以守器動則不失信則車服可保節以誠著名以信聞子路之言傳千乘之國不信其盟而信子路之言言誠信季布也諾諺曰黃金百斤不如布之一諾澶淵之會卿不書不信也夫諸侯之上卿會而不信寵名皆棄文子不為人下趙方子能敦信不為人下也孔丘去食不得已而去於斯二者何先曰去食自古皆有死人無信不立子路無宿諾慎於信也退三舍晉文公與楚戰退三舍以報其德守信也冒雨赴期魏文侯與虞人期獵雨甚文侯曰與人期不可失信乃冒雨而赴也吳起終日不食吳起與故人期食不至起終日不食來乃食郭細侯竹馬之期郭伋字細侯竹縣有童兒騎竹馬迎曰聞使君來喜故迎問伋何日回伋與之期及回先期不入留一日以示信也范巨卿雞黍之會范巨卿張元伯千里為雞黍之會及期果至登堂拜母尾生抱橋而死與女子期也匹夫匹婦自經於溝瀆子曰匹夫匹婦之為諒也自經於溝瀆而莫之知也信士分財文子曰使信士分財不如定分而探籌何則有心者之平不如無心者之平晉侯存信去原晉侯圍原命三日之糧原不降命去之曰信人之所庇得原失信云云子本棄信不及三年巨卿赴期無差千里進德易曰忠信所以進德也人之所助者信也信以結人周仁之謂信復言非信也言無善惡而必復之非義信也不欺之臣公羊曰區區宋國猶有不欺之臣修辭立誠易曰間邪存其誠修辭立誠所以居業也不勉而中誠者不勉而中不思而得相在爾室尚不愧于屋漏著誠之義小人間居為不善無所不至見君子而後厭然掩其不善而著其善人之視己如見其肺肝然誠於中形於外故君子必慎其獨苟無盟信信以發志苟信不繼盟無益也言忠信行篤敬忠信禮之本也忠信之人可以學禮臣能承命為信信於民未施信於民而民信之矣情欲信信而後勞其民信而後諫未信則以為謗已也信之所勸者信也積善之應傳子曰管寧在遼東三十七年歸海中遇暴風船沒惟寧船自若時夜晦暝望見火光趣之得島島無居人又無火燼行者咸異皇甫謐曰積善之應也耿恭拜井後漢耿恭字伯宗守疏勤城城中無水穿井十丈無水恭整衣冠拜井泉湧出神告亭崩晉徐苗有志行常宿亭舍有神告曰亭欲崩遽走出得免恥費輕實恥為辭費也禮踐言諾責與其有諾責寧有已怨也苟欲全吾言安得全吾身史要盟無質禮子曰負蒲人之盟云云大道既隱小信未孚稱以行權爾雖有說謂之守信吾則不知節以名聞名以信聞蘇秦以百詐成一信淮南子云孔上不信則無以使下下不信則無以事上魏徵陳事曰上不信則無以使下下不信則無以事上信之為義大矣疏曰貞觀之初求士如渴賢者所舉即信而任之取其所長常恐不及比來由心好惡以衆賢舉而用以一人毀而棄雖積年任而信或一朝疑而斥為國保於誠信又陳事曰為國基於德禮保於誠信誠信立則下無二情德禮形則遠者來格故德禮誠信國之大綱不可斯須廢也傳曰君使臣以禮臣事君以忠自古皆有死人無信不立又曰同言而信信在言前同令而行誠在令外然不言而不行言不信也令而不從令不誠也不信之言不誠之令君子弗為也信為萬事本百姓所歸褚遂良論延陀請婚信者疾僞陳子昂謂信者疾僞以信質僞勢不相和同上強循遇人盡信不疑雨雪與相期蕭至忠少與友期諸路會雨雪人引避至忠曰寧有與人期可以失信卒友至乃去衆嘆服堆誠待士李訴沉鷙務堆誠待士故能張其卑弱而用之賊來降輒聽其便人之所助在信信之所本在誠陸贄帝曰朕豈不推誠哉然顧上封者惟譏斥人短長類非忠直往謂君臣一體故推信不疑至儉人賣為威福今茲之禍推誠之敝也贄曰人之所助在信信之所本在誠一不誠心莫之保一不信言莫之行故聖人重焉開心待人南霽雲至睢陽與張巡計事退謂人曰張公開心待人真吾所事也遂留巡所精愨而誠孔述睿貞元四年帝念平涼之難尤惻怛以述睿精愨而誠故遣恃祠具稱詔臨祭與人期雨雪虎狼不避陸羽奚僞誠信喜之披心示誠李尚隱再選河南尹論議皆披心示誠廝豎待以誠信曹華至廝堅必待以誠信人以為難不負約元德秀信者美德且夫信者美德也秦繆尚之而賢臣莫贖劉禹錫論書有死無二者信盧藏用紀信碑魯陽回日鄒子動天更無有他只在誠信代李石與劉稹書受君命至於觸槐賊入趙孟之門者睹其盛服將朝不忘恭敬侮受君命至於觸槐所以知其不為患也向使趙孟未闢寢門尚安社席思變計之數無肅敬之容為盜者必激其怒心增其勇氣焉得保其首領哉推是而言人不可不誠矣窮愁志相欺也為之符璽斗斛權衡以信之韓文民性多妄聖人導之以其信皮日休鹿門書信愨然之謂也故居於土宋子嵩化書智有誠實之謂信同上誠切李絳嘗因浴堂北廓奏對極論中官縱恣方鎮進獻之事憲宗怒厲聲曰卿所論奏何大過邪絳前論不已曰臣所諫論於臣無利是國家之利憲宗見某誠切改容慰喻舊唐書仁九白仁者天下之表親為國賓為仁善鄰國之寶也神裙仁而禍淫體仁足以長仁仁之本歟仁者安仁智者利仁君子去仁惡乎成名仁者樂山仁者靜仁者壽智者樂可謂仁之方仁遠乎哉為仁由已仁者不憂甚於水火仁之於民也甚於水火水火吾見蹈而死者未見蹈仁而死者也蹈仁凡上當仁不讓於師有仁義大道廢仁者漢書曰仁者百行之宗稱曰用權爾雖有說謂之仁德吾則不知上仁為之而有以為老子三月不違仁回也三月不違仁其餘則日月至焉而已矣克寬克仁民罔常懷懷于有仁達德仁者天下之遠德仁者必有勇勇者不必有仁宣尼訓人一日能用其力子曰有能一日用其力於仁矣我未見力不足者顏子好學三月不違其心見上注仲尼曰臧文仲不仁者三下展禽廢六關妾織蒲違仁若子無終食之間違仁求仁得仁伯夷叔齊不食周粟無求生以害仁有投身以成仁好仁不好學其蔽也愚仁親以為寶舅犯曰人無以為寶仁親以為寶注云仁親行仁也仁之為器子曰仁之為器重其為道遠舉者莫能勝行者莫能致也與仁子罕言利與命與仁若聖與仁則吾豈敢仁則吾不知也仁以自衛家語古之君子以仁自衛惻隱之心孟子曰有惻隱之心仁也無惻隱之心非仁也仁而不武無能達也里仁為美處仁擇不處仁焉得智依於仁遊於藝天下歸仁一日克己復禮天下歸仁焉仁有三與仁同功而異情有安仁有利仁有勉彊為仁仁之難成久矣君子而不仁者有矣夫未見小人而仁者人而不仁如禮何其仁不足稱也舅犯見利不顧其君其仁不足稱也放麑董仲舒春秋決獄曰君獵得麑使大夫持以歸大夫道見其母隨而鳴感而縱之君慍議罪未定君病恐死欲托孤幼乃覺之大夫其仁乎遇麑以息況人乎乃釋之以為子傳於議何如又淮南子孟孫獵得麑使秦巴持歸烹之其母隨而帝己不忍去之孟孫怒逐秦巴西居一年取為子傳曰夫一麑猶不忍況人乎董仲舒曰君子不麑不卯大夫不諫使持歸非也然而中感母思難廢君命徙之可也力行近乎仁禮不背本范子曰不背本仁也不忘舊信也無私忠也尊君畝也仁以接事信以可之忠以成之畝以行之事雖大必濟取數多者仁也田子方養老馬孔仁者有勇段秀實贊曰柳宗元曰太尉為人常低首拱手行步言氣卑弱未嘗以色待物視之儒者也遇不可必其志決非偶然者宗元不妄許人諒其然也非孔子所謂仁者必有勇乎臨事或折正韓休蕭嵩以休柔易故薦之休臨事或折正嵩嵩不能平宋璟聞之曰不意休能爾仁者之勇也仁恩溥博郝處俊帝曰朕昔從幸未央宮群仗既過有橫刀伏草中者先帝斂轡卻謂朕曰事發當死者數十人汝可命出之史臣惟敘此為實處俊曰先帝仁恩溥博類非一臣之弟處傑被擇供奉時有三衛誤拂御衣者懼甚先帝曰左右無御史我不汝罪有仁心下懷其恩楊晟王建使王宗裕圍晟晟有仁心下懷其恩雖城中食盡無叛者博愛之謂仁韓愈原道忘生從道者仁盧藏用紀信碑以仁厚蓄生人柳宗元啓本柔人而立極佩韋賦尼丘戮齊而誅卯兮本柔仁而立極柔仁博愛之道洽乎鰥嫠同上民性多暴聖人導之以其仁皮日休鹿門書德出之為仁宋子嵩化書仁者發生之謂也故居於木同上
