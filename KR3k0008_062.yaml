body:
  text: 卷第六十二琴一白神農氏削桐為琴繩絲為絃以通神明之德合天地之和鍾儀操南音樂操土風不忘舊也舜作五絃之琴以歌南風琴瑟在御莫不靜好君子之近琴瑟以儀節也非以慆心也儀節不過度也宓子賤不下堂宓子治單父彈琴不下堂而自治琴者樂之統也見琴操瓠巴鼓琴而鳥舞魚躍善鼓琴者也伯牙彈琴駟馬仰秣善彈琴者也中散廣陵嵇中散臨刑索琴彈為廣陵散曲終曰此曲於今絶矣雍門之感孟嘗涕淚承睫樂記曰絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思忠義之臣禮緑綺美人贈我緑綺琴朱絃尚書大傳曰大琴朱絃琴者所以正人心白虎通焦尾蔡雍於吳中聞人家爨桐爆聲知其良材因請之以制琴琴尾有焦處故號云焦尾陽春白雪緑水悲風幽蘭別鶴烏夜啼並琴曲名伏羲作以防心伏羲作琴以禁邪僻防淫心而反天真孔子聽而得意韓詩孔子學琴於師襄子曰丘得其意未得其人有間曰得其人矣洋洋乎翼翼乎其惟文王乎列子謂之師襄子禁邪見上納正嵇康琴贊曰間邪納正宣情宣和情性理性琴操曰理身理性正聲文選奇弄並嵇康琴賦云祕弄雅音龍鳳之象琴形山水之音伯牙絲桐之妙啓期三樂以琴歌自歌云吾有三樂斫孫枝文選清徵雲和空桑周官雲和之琴瑟冬日圜丘奏之空桑之琴瑟夏日方丘奏之龍門之琴瑟宗廟奏之雲和山名伯牙絶絃伯牙鼓琴意在山鐘子期曰魏巍乎意在水子期曰湯湯乎鍾期死伯牙遂絶絃以世無知音也長卿鳳凰之歌以琴心挑卓文君嶧陽孤桐材中琴號鍾古琴名促調高張七命文危絃𣚕絲之絃野繭之絲以為絃士發文士無故不徹琴瑟不學操縵不能安絃操縵雜弄文以琴瑟禮繁聲後漢宋弘薦桓談拜議郎給事中每侍宴令鼓琴好為繁聲宋弘不悅召責之摶拊琴瑟以詠祖考來格終身不聽琴瑟孫林父在戚擊鍤季扎非之云云林父聞之終身不聽琴瑟專一晏子曰琴瑟專一誰能聽之君子聽之以平其心晏子推琴莊子曰孔子遊乎淄惟之林休坐于杏壇之上弟子讀書孔子鼓琴曲未終有漁父下船而來孔子推琴而起曰其聖人者與雍門周以琴見孟嘗君孟嘗君曰先生能令文悲乎雍門周云云孟嘗泫然承睫周引琴鼓之孟嘗涕泣殺心形於聲蔡雍在陳留鄰人以酒食召雍比往有客彈琴聲雍至屏聽之曰以樂召我而有殺心何也遂及使者具告主人主人自追問雍雍以告莫不撫然琴者曰我向見螳蜋方捕鳴蟬蟬將去而未飛恐螳蜋之失蟬也此豈為殺心形於聲乎蔡琰辨斷絃事具知音門但識琴中趣何勞絃上聲陶潛不解琴畜素琴一張絃徽不具曰云云破琴晉戴逵安道少有文藝善琴太宰武陵王使人召之逵對使者打破琴曰戴安道不能為王門伶人別鶴之音捕蟬之思衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百張骼輔躒與楚戰乘乘車踞轉而鼓琴乘安車也踞倚也轉衣囊也難色魏文侯令杜夔與左願等於賓客中吹笙鼓琴夔有難色帝不悅因事擊之玄鶴舞史記師曠援琴一奏玄鶴二八集于門再奏延頸而鳴舒翼而舞平公大喜云云子敬之琴王獻之卒徽之奔喪不哭直上靈床取琴彈之久而不調曰鳴呼子散人琴俱亡因頓絶也左琴右書見夫妻門古琴名梁元纂要黃帝琴名清角齊桓公琴號鍾楚莊王繞梁司馬相如緑綺趙飛燕鳳凰善鼓劉向別録漢有渤海趙定國梁國龍德凡琴曲和樂而作命之曰暢暢者言其道之暢風俗通憂愁而作命之曰操操者言周征窮追猶不失其操五曲琴操曰古琴曲有詩歌五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒十二操一將歸孔子作二猗蘭三龜山並孔子作四越常周公作五拘幽文王作六歧山周人為文王作七履霜尹伯奇作八朝飛沐犢子作九別鵠商陵牧子作十殘彤曾子作十一木仙伯牙作十二壤陵亦伯牙作九引一列女楚樊姬作二伯飛魯伯飛作三貞魯次室女作四思歸衛女作五霹靂楚商梁作六走馬樗里牧恭侯作七箜篌霍里子高作八琴引秦明朗高作九楚引楚龍丘子高所作二十一章有河間雜弄二十一章琴歷曰琴曲有蔡氏五弄雙鳳離鸞歸鳳送遠幽蘭白雲長清短清側清調瑟調大遊明君胡笳廣陵散白魚歎楚妃歎鳳入松烏夜啼楚明光石上流泉臨汝侯調子雙燕離春弄連琴弄暢志清蟹行清看客清便僻清宛轉清孔善琴盧藏用善琴好鼓琴韓滉好鼓琴終身不鼓衛次公本善方未顯時京兆尹李齊運使子與遊請授之法次公拒絶因終身不復鼓楊收嘗言琴通黃鍾姑洗無射三均側出諸調由蘿蔦附灌木然時有安涗者世稱善琴且知音收問五絃外其二云何涗曰世謂周文武二王所加者收曰能為文王操乎涗即以黃鍾為宮而奏之以少商應大絃收曰止如子之言少商武絃也且文世安得武聲乎涗大驚響泉韻磬李勉善鼓琴有所自製天下寶之樂家傳響泉韻磬勉所愛者西舍利王雍羌獻其國樂至成都有大匏琴二覆以半匏皆彩畫之上加銅甌以竹為琴作虺文橫其上長三尺餘頭曲如拱長二寸以條繫腹穿甌及匏本可受二升大絃應太簇次絃應姑洗有獨絃匏琴以班竹為之不加飾刻木為虺首張絃無軫以絃繫項有四柱如龜茲琵琶絃應太簇有小匏琴二形如大匏琴長二尺大絃應南呂次應應鍾備指一弄五聲叢鳴舒元輿斫琴志曰越客沈虯子斫琴絃素絲七條其上備指一弄五聲叢鳴鳴中有靈峰橫空烏泉出雲鳳龍騰凌鶴哀烏啼松吟鳳悲鼓琴娛賓王涯使客賀若夷鼓琴娛賓寶琴司馬承偵睿宗引入掖庭錫寶琴琴有氣酉陽雜俎琴有氣曾識一道者相琴知吉凶秦楚聲李龜年至岐王宅聞琴曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍後彈者楊州薛滿出辨音集胡松節支琴白傳支琴和胡松節出金徽變化篇雪絃韓愈詩雪絃寂寂聽雷氏玉徽蜀中雷氏鍾琴常自品第上者以玉徽次者以琴瑟又次者以金以螺蚌出尚書故實絶無琴韻于頔嘗令客彈琴有知音者聽於簾下嘆曰三分之中一分箏聲二分琵琶聲絶無琴韻國史補怨抑掩朱絃沉吟停玉指白居易聽彈別鶴操清冷石泉引淡濘風松曲同上鼓有虞氏之南風賡之以文王宣父之操有一儒生魁然其形抱琴而來歷階而升坐于樽俎之南鼓有虞氏之南風賡之以文王宣父之操優遊夷愈廣厚高明追三代之遺音想舞雩之詠歎及暮而還韓愈燕太學序玉琴纖手弄玉琴清晨起長唴李白古風冰霜中自結龍鳳相與吟韋蘇州擬古有客天一方寧我孤桐琴迢迢萬里隔託此傳幽音冰霜中自結龍鳳相與吟五絃琴趙璧彈五絃琴人問其術璧曰吾之五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳如鼻不知五絃之為璧璧之為五絃也出語林取漆角為之李研公雅好琴常斫桐又取漆角為之多至數百張京師以樊氏路氏琴為第一同上寫聲發情於妙旨吾但寫聲發情於妙旨殊不知此曲之古今李白詩沉祝聲董庭繭三為沉祝聲聲皆琴聲也國史補三聲類聚金徽變化篇曰段由夫攜琴就松風間響之嘗曰三者皆自然之聲正合類聚半曇即以金縷衣邀之曲終云河輪佩玉同上嵇康抱琴訪山濤濤醉欲割琴康曰吾賣東陽舊業以得琴乞尚書今河輪佩玉藏為徽貨所衣玉簾中單買縮絲為袋論之其價與武庫爭先如欲割之吾即死矣眼疾不治獨狐及晚嗜琴有眼疾不肯治欲聽之專也願以頑璞上奉徽音柳宗元與衛淮南石琴薦啓增響亮於五絃應鏗鏘於六律同上憑崖一聽清心耳李白白毫子歌拂花弄琴坐青苔緑蘿之下春風來窗蕭颯松風起憑崖一聽清心耳留連白雪意斷續回風度司空主簿韋應物琴掩仰雖已終忡忡在幽素上古聲久埋滅無由見真濫有琴具徽絃再鼓聽愈淡古聲久埋滅無由見真濫韓愈秋懷琴奏龍門之緑桐李白樽酒行袖拂白雲開素琴彈為三峽流泉音李白劃然變軒昂勇士赴敵場韓文聽穎師琴昵昵兒女語恩怨相爾汝劃然變軒昂勇士赴敵場浮雲柳絮無根蒂天地闊遠隨飛揚上斫為緑綺徽聲粲發李白琴贊嶧陽孤桐石聳天骨根老水泉葉苦霜月斫為緑綺徽聲粲發秋風入松萬古奇絶拂彼白石彈吾素琴幽澗湫兮流泉深善乎明徽高張清心寂歷似千古松颼颼兮萬尋同上霹靂琴柳子見桐門百衲琴李沂公勉雅好琴常出絲桐之精者雜綴為之謂之百衲琴用蝸角為徽罷琴惆帳月照席杜甫詩白伏羲始制素女遺聲漢書黃帝命素女鼓瑟帝悲不止故破五十絃為二十五絃也二十五絃文子曰二十五絃各以其聲應言瑟不鳴而絃有聲膠柱調瑟文子琴瑟在御莫不靜好子曰由之瑟奚為於丘之門門人不敬子路子路之瑟不合雅頌君子之近琴瑟以儀節也非以慆心也士無故不徹琴瑟鏗爾而捨子問曾點曰爾何如鼓瑟希鏗爾捨瑟而作云云點曾晢也孔子取瑟而歌儒悲欲見孔子孔子辭以疾將命者出戶取瑟而歌使之聞之使知巳非真矣廉以立志見琴門雲和空桑同上促柱危絃朱絃清徵軒后之遺音黃帝湘靈之精韻湘妃澠池之會趙王恥為偏鼓西征賦緪絃促柱緪急絃也魚躍瓠巴鼓瑟淮魚躍聽鳳舞趙女鼓瑟而鳳舞趙瑟不學操縵不能安絃禮曰清廟之瑟朱絃而疏越一唱而三嘆有遺音者矣此雅淡之樂也言至和不在音也越瑟底孔文以琴瑟禮摶拊琴瑟以詠祖考來格楊惲婦趙女也雅善鼓瑟瑟二孔韓愈答陳商書齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾瑟鼓之合軒轅氏之律呂客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求祿利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟朱絲淫軫禹錫湘靈鼓瑟小説錢起寓宿驛舍外有人詠曰曲終人不見江上數峰青詠者數四怪之及殿試湘靈鼓瑟落句久不屬遂以此聯之因中選瑤瑟清骨唐相國李公集紀洪鍾駭聽瑤瑟清骨雲韶樂有瑟一樂志齊瑟彈東吟秦絃弄西音慷慨動顏魂使人成荒淫李白古風音響清塵埃韋蘇州樂燕行趙瑟正高張音響清塵埃一彈和妙謳吹去繞望臺艷雪凌空散舞羅起徘徊瑟有柱以玉為之呂延齊文選別賦注鳴瑟已呼孺人戛鳴瑟韓愈感春寶瑟各數十盧邁有寶瑟各數十有寒玉石磬響泉和志之號出南部新書柔瑟含情弄柔瑟彈作陌上桑絃聲何激裂風捲繞飛梁李白擬古雲和瑟北李唐右史鄭休範贈妓天仙歌曰嚴吹如何下太清玉朋無軫六銖輕雖知不是流霞酌願聽雲和瑟一聲靈瑟時窅窅韓愈遠遊聯句悲管逐清瑟杜甫詩吟松風汛瑟李白感興暫醉佳人錦瑟旁何時詔取金錢會暫醉佳人錦瑟旁杜甫曲江對雨挾瑟白蒙恬作箏秦箏史記曰夫彈箏者真秦之聲也郝素善彈箏朱絃玉柱危絃促柱新聲呂布奏於帳中不學操縵不能安絃楊惲曰家本秦也能為秦聲釋名曰箏施絃高箏箏然應六律阮瑤箏賦曰箏長六尺以應律絃有十二象十二時柱高三寸象於三才總八風陶融妻陳氏箏賦曰總八風之候不差貫微而洞雪不疾不徐侯瑾箏賦曰平平定均云云或合或離傳玄箏賦曰追赴促彈急聲而危洪纖奮假或合或離移風易俗推故引新傳玄賦云云有始有終傳玄云清濁代興有始有終不盈不縮陶融妻陳氏云度申揩摸不盈不縮羅敷陌上之聲孔引刀斬指樊彥琛妻魏者楊州人彥琛卒值徐敬業難陷兵中聞其知音令鼓箏魏曰夫亡不死而逼我管絃禍由我發引刀斬指西舍利獻其國樂至成都箏二其一形如鼉長四尺有四足虛腹以鼉皮飾背面及仰肩如琴廣七寸腹闊八寸尾長尺餘卷上虛中施關以張九絃左右一十八柱其一面飾彩花傳以虺皮為別彈箏搊箏樂志西京伎有彈箏搊箏各一哀響嬌童為我歌哀響跨箏笛韓愈感春清箏清箏何繚繞度曲緑雲垂李白邯鄲南亭木聲絲聲均其所自出抑折愈繹學者無能如間發書得箏以為其工獨得於天姿使木聲絲聲均其所自出抑折愈繹學者無能如劉禹錫與柳子厚書手語李白春日行佳人當窗弄白日弦將手語彈鳴箏銀甲李義山詩十三學尸戰彈箏銀甲不曾卸甲鳴銀玓瓅柱觸玉玲瓏白居易詩哀箏傷老大杜甫琴瑟箏築皆一樂志樂縣之制頌瑟同上五曰絲為琴為瑟為頌瑟頌瑟箏也箏絃玉指調元稹白出於絃鞀樂録琵琶本出於絃鞀杜縶以為秦之末蓋苦於長城之役百姓絃鞉而歌之釋名琵琶本胡中馬上所鼓也牖下世説謝仁祖在北牖下彈琵琶有天際之意四絃象四時也朱絃奏烏孫之曲漢遣烏孫公主念其行道思慕使知音焉上奏琵琶以慰之嘈囋聲也朱生善彈琵琶雖伯牙之妙無以加焉大道之曲謝鎮西在大市樓上彈琵琶作大道之曲孫放孔偉阮咸並善彈琵琶不學操縵不能安絃竹林七賢傳曰阮咸善彈琵琶風俗通曰琵琶近代樂家作不知所起長三尺五寸法天地人與五行四絃象四時釋名曰推手向前曰琵卻手向後曰琶因以為名焉傅玄賦曰所樂亦非瑟所樂亦非吟唯言琵琶與箏能娛我心緩調孫該曰緩調中絃元本反始急節成公綏賦雲改調高彈急節促過非龍引舞趙女綺羅梁山象柱岱谷絃孫該賦弦則岱谷篚貢天府聲高中虛外實象天地也琵琶四孔自下逆鼓曰琵自上順鼓曰琶讓皇帝子瑀聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絲大絃也樂家以自下逆鼓曰琵自上順鼓曰琶云左庶子奏琵琶李綱仕隋為太子洗馬太子勇宴宮臣左庶子唐令則奏琵琶又歌武媚娘曲綱曰令則官調護乃自比倡優進淫聲惑視聽誠使上聞之豈不為殿下纍乎龍首雲頭西舍利獻其國樂至成都韋皋以其樂器異常乃圖畫以獻有龍首琵琶一如龜茲製而項長二尺六寸餘腹廣六寸二龍相向為首有軫柱各三絃隨其數兩軫在項一在頸其覆形如師子有雲頭琵琶一形如前面飾虺皮四面有牙釘以雲為首軫以有花象品字三絃覆手皆飾虺皮刻捍撥為舞昆倉狀而彩飾之彈胡琵琶柴紹吐穀渾黨頊寇邊敕紹討之虜據高射紹軍兩矢士失色紹安坐遣人彈胡琵琶使二女子舞虜疑之休射觀楸木為面樂志高麗伎琵琶以蛇皮為槽厚寸餘有鱗甲楸木為面象牙為捍撥畫國王形秦漢子樂志初隋有琵琶圓體修頸而小號曰秦漢子蓋絃鞀之遺制出於胡中傳為秦漢所作羅沙檀槽明皇雜録天寶中中官白秀貞自蜀使回得琵琶以獻其槽羅沙擅槽為之溫潤如玉光耀可鑒有金縷紅文蹙成雙鳳貴妃每抱琵琶奏之音韻淒清飄出雲外諸貴主洎虢國夫人號為貴妃琵琶弟子每授曲畢皆廣為獻玉環羯胡犯京上欲遷幸復登華萼樓置酒四顧乃命進玉環玉環者睿宗所御琵琶也異時上長樂宮中常置別榻以帕覆之不以雜他樂器而未嘗持用至是命樂工賀懷智取調之又命禪定僧段師彈之除夜鼓胡琴九國志吳越錢鏐嘗歲除夜宴命諸子及諸孫鼓胡琴一再行遽止之曰人將以我為長夜之飲也低鬟緩視抱明月纖指破撥生胡風劉禹錫秦娘歌琵琶宮調八十一元稹琵琶歌白坎篌風俗通箜篌一名坎篌漢武帝祠太一后土令人調依琴作坎言其坎坎應節侯氏之音侯氏作故名箜篌箜篌出桑間濮上之地釋名云靡靡之樂見風俗通師涓所作公無渡河之曲琴操箜篌引者霍里子高所作也子高見白首提壺涉河其妻隨而止之不及墯河溺死妻乃援箜篌作無渡河之曲歌歌曰公無渡河公竟渡河公墯河死當奈公何曲終自投河死子高援琴而寫其歌聲名曰箜篌引不學操縵不能安絃禮注云操縵雜弄也胡箜篌後漢靈帝好胡服竹胡箜篌漢祠見上注晉解晉永和起居注曰詔太史解士非祠曲可琵琶箜篌也孫賦孫氏有箜篌賦其文甚美麗霍歌見上公無渡河注孔彈箜篌為樂哥舒翰監軍李大宜在軍中不治事與將士彈箜篌為樂鳳首樂工天竺伎有鳳首箜篌一傷妻之夫奏箜篌傷妻之夫樊鑄檄曲江水伯文韶護可息同上今欲取甘旨之物肥濃之味皆充祭用詔護可息而箜篌笙笛皆在奏矣宗廟加籩豆議韋述可出於蕃夷入耳之娛見上同作薊門桑葉王昌齡箜篌引有一遷客登高樓不言不寐彈箜篌彈作薊門桑葉秋風沙颯颯青冢頭朱字有李生者其舅姓盧有道術別久忽相遇邀生詣其居曰求得一妓善箜篌令侍飲李生視箜篌上有朱字云雲中辨江樹天際識歸舟盧曰此人名家莫要作婚姻否李莫測而退後娶陸長源女乃所見於盧家者問何能曰善箜篌示之朱字宛然李生具説女亦曰往嘗夢至一處亦記見生出逸史臥箜篌魏高陽王雍美人徐月華能彈臥箜篌為明妃出塞之聲雜俎吳絲蜀桐李賀箜篌引吳絲蜀桐張高秋荊山玉碎鳳凰叫芙蓉泣露香蘭笑十二門前融令光二十三絲動紫皇同上白雷霆之聲可以象鍾鼓文子云春分之音風俗通鼓者春分之音以助萬物發生建靈鼉之鼓上林賦伊耆氏蕢桴土鼓密須分唐叔以密須之鼓密須鼓名曹劌曰夫戰一鼓作氣再而衰三而竭我盈故克之傳擊鼓其鏜鍾聲也詩鼓以警衆子有鍾鼓弗鼓弗考刺晉昭公鼓方叔入于河播鞀武入于漢武方叔皆鼓師名言周衰不能用樂故去昭其聲也聲以發之師之耳目在吾旗鼓雷門之鶴會稽雷門鼓有白鶴來飛入於是鳴洛陽聞其聲人或去之鶴還飛去堯有敢諫鼓禹以聽治禹以五聲聽治曰教寡人以道者擊鼓伐鼓淵鼓淵鼓軒訇之音坎其擊鼓宛丘之下君子聽鼓鼙之聲則思將帥之臣禮傳曰三軍以利用也金鼓以聲氣也鼓以佐士衆之聲氣未絶鼓聲鼓鍾于宮聲聞于外鼓咽咽氣也無持布鼓過雷門漢書殷人以樹樹其鼓也鏗鍧之響坎坎之音簨虡是懸鳴鼓而攻之可也夫子責冉有六鼓四金辨其聲用周禮鼓人掌六鼓四金之音以節聲樂以和軍旅以正田役而辨其聲用所以不同也周禮韗人凡冒鼓必以啓蟄之日象雷之發聲也以革蒙鼓曰冒短聞遠聞又曰鼓大而短則聲疾而短聞鼓而長則聲舒而遠聞禮曰鼓無當於五聲五聲不得不和當猶王也先鼓以警戒鼓鼙之聲歡歡以立動動以進衆禮書曰下管鞀鼓周禮以雷鼓鼓神祀雷鼓八面鼓也神祀天神也以靈鼓鼓神祭六面鼓也地祗也以路鼓鼓鬼享四面鼓宗廟也以鼖鼓鼓金奏大鼓長八尺以鼛鼓鼓役事一丈二尺以晉鼓鼓金奏長丈六尺金奏謂樂作擊編鍾韗人職曰良鼓瑕如積環革調急也鼓角晉樂志鼓角橫笛吹曲周禮以鼖鼓軍事角説者云蚩尤帥魑魅與黃帝戰帝命吹角作龍鳴以禦之鼓之以雷霆易云云則其象也不知誰之所作易通卦驗曰冬至鼓用馬革圓徑八尺一寸夏至鼓用牛皮圓徑五尺一寸鄭曰馬坎類也小鼓謂之應爾雅纂要曰應鼓亦曰鼙鼓亦曰蝀鼓亦曰田鼓胤者引也言先擊鼓次引大鼓也又見禮圖大鞀謂之麻小者謂之料徒擊鼓謂之咢並爾雅玉鼓見春秋緯銅鼓見馬援傳石鼓見鄧明南康記以為山名又劉敬叔異苑晉武帝時吳郡臨平岸崩出一石鼓打之無聲以問張華華云可以蜀中桐木刻作魚形扣之則鳴如言果聞數十里聖鼓王韶之始興記曰秦鑿桂陽縣閣下鼓便自奔逸於臨武遂之洛陽因名聖鼓令臨武有聖鼓城也節鼓傅玄有節鼓賦樂録曰鞀鼓而小執其柄而搖其耳傍還自擊而鳴爾雅曰小者曰料今人併而言之矣擊玉春秋孔演圖曰有人叩金與擊王鼓駕六龍也獻銅虞喜志林曰建武二十四年南康郡男子獻鼓有記云廟西禮曰廟堂之下懸鼓在西應鼓在東也座左吳質答曹植書曰塤箎激於華鼓者郭也風俗通云盛引之荊州記曰始興郡桂陽縣有豫章木徑可長二丈作鼓名聖鼓秦時伐此未果忽自奔洛陽交趾鑄銅范曄後漢書馬援好騎名馬交趾得駱越銅鼓乃鑄為馬式孔禁用鄭餘慶兼判太常卿事自朱泚亂都輦數驚太常隸樂禁用鼓餘慶以時久平奏復舊制都曇鼓毛員鼓樂志天竺伎用都曇鼓毛員鼓村鼓時時急杜甫詩雲重鼓聲寒不起李賀龜頭高麗有龜頭雞婁龜茲有答獵鼓侯提鼓雞婁鼓建鼓樂志八音四曰革為雷鼓為靈鼓為路鼓皆有鞀為建鼓為鼖鼓為縣鼓為節鼓時鼓五代張薦明為道士高祖召見延入內殿薦明聞宮中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也配和鸞以入用並司南而為急柳宗元記里鼓賦施五繫於華山之野知霧氣已籠用百發乎南山之陽識雷聲所及同上鄙繁音之坎坎陋促節之闐闐同上石鼓酉陽雜俎冀縣有天鼓山山有石如河鼓星搖動則石鼓鳴鳴則秦上有殃羯鼓尤宜促急南卓羯鼓録羯鼓尤宜促急作連鼓碎之聲破空透遠持異衆樂凡天神之類皆以雷鼓地祗之類皆以靈鼓人鬼之類皆以路鼓樂志八音領袖玄宗云羯鼓八音之領袖上南山起雲宋璟尤善羯鼓詞云南山起雲北山起雨者宋所作也羯鼓解穢上嘗聽琴未終遽止之曰速令花奴持羯鼓來為我解穢上曲終花不墜汝陽王璡打曲上自摘紅槿置帽上王嘗戴研光絹帽極滑久而方安曲終花不墜上白倕作鍾見世本鳧氏作鍾周禮鍾秋分之音五經義從革以成懸於簨虡發鯨魚鏗華鍾鏤杵作魚形以叩鐘文選應雊雉淮南子撞鍾於庭郊雉皆雊注鍾聲似雷雷震則雉雊洪鍾萬鈞西京賦九乳千石三輔圖秦始皇造虡三文鍾小者皆千石也豐山有鍾九耳霜降則鳴山海經記曰善待開者如橦鍾叩之大者則大鳴叩之小者則小鳴鼓鍾于宮聲聞于外詩周景王將鑄無射鍾名泠州鳩曰王其以心疾死乎夫音樂之輿也而鍾音之器也器以鍾之鍾聚也聚其音也小者不窕窕細也大者不摦戶化反橫也則和於物物和嘉成嘉樂成也故和聲入於耳而藏於心心億則樂億安也窕則不咸不滿心也摦則不容心不容也心是以感感則生疾禹聽治禹以五聲聽治銘筍虡曰教寡人以義者擊鍾子有鍾鼓弗鼓弗考刺晉昭公昭其聲也聲以發之聽之則思武功錫之以旌文德顓頊居位文德者錫以鍾磬山崩先鳴東方朔傳漢武帝時未史宮殿前鍾無故自鳴三日三夜詔問朔朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鍾先鳴三日南郡太守上言山崩上大笑魯莊既鑄曹劌發言魯莊公鑄鍾大曹劌入見曰今國小鍾大云云齊景將懸晏子遂毀晏子春秋齊景鑄大鍾將懸之晏子曰鍾大不以禮遂毀之杜蕢是聽且諷晉侯禮智悼子卒未葬平公飲酒鼓鍾杜蕢自外來聞鍾聲遂入酌飲師曠曰曠飲斯又酌飲李調曰調飲斯吳札既聞乃誚文子傳吳季札將宿於戚聞鍾聲曰異哉夫子在此猶燕之巢幕上也君又在殯可以樂乎遂去之不宿南鄰擊鍾磬左思詩橦之以筵豈能發其聲金奏編鍾也兩欒欒鍾口兩角周禮鳧氏作鍾薄厚之震動清濁之所由出侈奄之所由興也鍾巳厚則石石聲不發也巳薄則播大薄則聲播侈則柞音昨柞然聲大也奄則鬱聲不舒揚也鍾大而短其聲疾而短聞鍾小而長則其聲舒而遠聞周禮鍾聲鏗鏗以立號號以立撗撗以立武君子聽鍾聲則思武臣禮宋左師向巢每食擊鍾傳鄭伯有於窟室夜飲酒擊鍾傳笙鏞以間鏞鍾鼓鍾伐鼛周禮鍾師掌金奏金謂鍾及鏄也凡樂事以鍾鼓奏九夏漢靈帝鑄鍾四皆受二千斛懸於玉堂及靈臺殿前鳴洪鍾善鍾律魏志杜夔字公良以知音為雅樂郎參大樂事善鍾律聰慧過人紹復先代古樂皆夔始也初漢鑄銅工柴玉巧有意思夔令鑄鍾其聲鈞聲清濁多不如法數改作玉甚厭之謂夔清濁任意頗相短夔玉更相白太祖太祖取所鑄鑄錯雜更試然後知夔之精而玉之妄於是罪玉國語鍾大不過鈞量不過石無射也單穆公周禮磬師掌擊磬擊編鍾教視瞭也教縵樂之鍾磬縵樂雜聲之和樂者燕樂房中之樂二樂皆教鍾磬凡祭祀奏縵樂所謂陰之聲孔沽洗角楊收涔陽耕得古鍾高尺餘收扣之曰此沽洗角也既劀拭有刻在兩欒果然丐銅鍾南蠻曇陵陀丐馬銅鍾帝與之金銀鍾南蠻婆賄伽盧國王宮設金銀二鍾寇至焚香擊之以占吉凶大儀理則天斂天下黃金作大儀理不就撾鍾三千雙娥獻歌笑撾鍾考鼓宮殿傾唐李太白春日行鍾動猿鳴鍾動不知曉韓愈衡嶽廟詩寸莛撞有如寸莛撞巨鍾留東野歌鍾歌鍾樂未休榮至者還逼李白自鳴天寶十載六月乙亥大同殿前鍾自鳴占曰庶雄為亂五行志鍾聲嘶嗄光化三年冬武德殿前鍾聲忽嘶嗄銅鍾孫智諒開元中內殿修齋奉詔投龍於吉州玉笥山泊舟江側有異氣在東川之中疑有古迹乃於閣皂山掘得銅鍾一枚重百餘斤鍾下得玉像三身因置閣皂觀出南部新書寧夫制於侈靡喬潭霜鍾賦寧失制於侈靡掩豈遺音於窕摦觸物瀏亮同上乍浮空以紆餘更觸物而瀏亮發越林巒周流非邑鍾之為器諧八音而表節岑文本賦黃鍾元間之登清廟也鏗天地動神祇柳宗元答問簨虡八白設業設虡崇牙樹羽詩周梓人為簨虡天下大獸五脂者膏者裸者羽者鱗者並雕書於樂懸上以鳴備物也外骨內骨卻行庂行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢故擊其所懸而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以為簨虡削為鐻莊子曰梓變削不為木為鐻未嘗敢以耗氣必齋心也孔左校署百官志左校署令二人丞一人掌梓匠之事樂縣簨虡皆供焉二十虡樂志凡植者為簨橫者為虡以縣鍾磬皆十有六周人謂之一堵而唐人謂之一虡自隋以前宮縣二十虡及隋平陳得梁故事用三十六虡遂用之唐初因隋舊用三十六虡高宗蓬萊宮成增用七十二虡至武后時省之開元定禮始依古著為二十虡造簨虡開元記上造簨虡流蘇之屬皆以金玉珠翠珍怪之物雜飾之蛟螭露簨虡韓愈詩簨虡仡以碣磍杜甫享太廟磬虡起北起西餘見磬門磬虡在西鍾虡在東樂志白無句作磬無句堯時人磬立秋之樂五經義曰磬者夷則之氣象萬物之成白虎通虞書夔曰擊石附石百獸率舞擊石拊石並擊磬也百獸感音而舞鳴球球亦玉磬泗濱之石書曰泗濱浮磬言石浮可為磬有心之擊子擊磬於衛有過者曰有心哉擊磬乎擊磬襄入于海襄磬師名昭其聲也懸黎之磬玉石名洞陰之磬磬名也見漢武內傳浮金輕玉之磬漢武帝有之賓媚人行賂於晉晉敗齊齊侯使賓媚行賂以紀獻玉磬賓媚人國佐也文仲告糴于齊國語魯飢臧文仲以玉磬告糴于齊南鄰擊鍾磬左思詩和鍾並擊與笙同音詩云笙磬同音夔拊呂氏春秋堯命夔拊石子擊見上獸舞見上鳥應東漢王阜為重泉令鸞鳥集于學阜擊磬鳥飛應而舞簨虡斯懸襄入于海子擊于衛不擊不考石聲磬磬以立辨辨以致死君子聽磬聲則思死封強之臣禮周禮磬氏為磬倨句一矩有半磬師掌編磬教視瞭也教縵樂見鍾門水濱得漢武時犍為郡於水濱得石磬十六枚劉向説上宜興辟雍設膠序隆雅頌之音以風化於天下無句作磬未知孰是樂録云世本亦云笙磬頌磬周禮注曰在東方曰笙磬笙生也西方曰頌磬或作康康功也泗濱見上瀛上王子年拾遺記曰瀛州土有青石可為磬長一丈而輕若鳴也浮金郭子橫洞冥記曰漢武帝作仙閣於甘泉宮西其上懸浮金輕玉磬禹以五音聽政懸鼓磬鐸鍾鞀以待四方之士為銘於簨虡曰語寡人以憂者擊磬淮南子魯堂漢書魯恭王壞孔子舊宅以廣宮室聞鍾磬琴瑟之聲遂不敢壞漢閣見上孔大磬編磬歌磬樂志曰凡樂八音二曰石為大磬為編磬為歌磬玉磬文宗好雅樂詔太常卿馮定釆開元雅樂製雲韶法曲雲韶樂有玉磬四笙磬同音文宗遇內宴乃奏曰笙磬同音沉吟忘味不圖為樂至於斯也自是臣下功高者輒賜之敗沸耳作驚爆端能敗笙磬韓愈答柳州食蝦蟆詩清磬司空圖題柳氏集後金之精粗考其聲皆可辨也豈清於磬而渾於鍾哉緑玉磬楊妃善擊磬乃取藍田緑玉琢之備極精巧幸蜀還乃送太常藏之出開元記樂石嶧山碑云刻此樂石人多不曉顏師古謂以泗濱浮磬作碑也封氏見聞録東方西方磬虡起北南方北方磬虡起西皆鍾虡次之樂白垂作笙見世本女媧之笙簧禮太簇之氣白虎通笙之言施也牙也萬物始施而牙太簇之氣也正月之音説文笙正月之音物生故謂之笙子晉吹以鳳鳴列仙傳王子晉好吹笙作鳳凰鳴遊伊洛間道士浮丘公接之上嵩山也虞帝奏而獸舞書曰笙鏞以間鳥獸蹌蹌與鏞問奏見上將磬同音詩曰笙磬同音北里之吹左思詩北里吹笙竽南郭之濫韓子曰齊宣王好竽必三百人齊吹南郭先生不竽者而濫於三百人之中以吹笙食祿宣王薨後王即位曰寡人之好竽欲一一吹之南郭先生乃逃也女媧之遺音董成之妙曲西王母侍者董雙成善吹笙曲沃之懸匏汶陽之孤篠潘嶽笙賦我有嘉賓鼓瑟吹笙吹笙鼓篁詩周禮笙師掌教吹笙竽塤籥簫箎笛管竹聲濫濫以立會會以聚衆君子聽笙竽之聲則思畜聚之臣禮絃匏笙簧會守拊鼓禮匏竹在下吹笙鼓篁中心翔翔穆天子傳云西王母吟曰云云大笙謂之巢小者謂之和爾雅魏文帝令杜夔於賓客吹笙鼓琴夔有難色遂黜免夔自公良為協律都尉漢桓帝能吹笙見東觀漢記釋名曰笙生也象物貰地而生以匏為之中空以受篁潘嶽笙賦曰明珠在水若銜若垂又云荊玉喟其長吟楚妃歎而增悲王廙笙賦曰金清玉振兮受合乎大諧又其調之妙離鴻潘賦曰夫其淒戾辛酸關關若離鴻之鳴兮別鵠王廙賦曰親昵遠逝登山送離發千里之長思詠別鵠於路岐通氣和神許慎説文曰舜祠下得笙玉管夫以玉作音故神人和鳳凰來儀也達陰陽五經析疑曰大笙者法萬物始生通達陰陽氣故有長短黃鍾為象法鳳凰也移風俗晉王廙笙賦曰直而不居曲而不兆疏音簡節樂不及妙以移風俗合至教弘義著於典謨歷萬代而彌邵孔通氣季秋之月上丁入學習吹所以通氣也簫管笙竽皆以吹鳴也月令章句三成下管新宮笙入三成謂三終也儀禮列管匏中列管匏中施簧管端大者十九雅釋樂逸態陸罕詠笙詩人情應節轉逸態逐聲移所美同王子弄羽一參差來應雲和琴楊希道詩短長插鳳翼洪細摹燕音切切孤竹管來應雲和琴曾城之匏其制也取不周之竹曾城之匏王廙賦簫十一白舜作簫其形參差以象鳳翼風俗通簫仲呂之氣白虎通夏至之樂易通卦驗云簫韶九成鳳凰來儀舜樂簫史弄玉列仙傳簫史善吹簫能致孔雀白鶴秦穆公女弄玉亦好簫遂妻之乃教弄玉作鳳臺一旦夫妻皆隨鳳去為作鳳女祠時有遺音簫管悲且清潘嶽詩秦簫玉簫晉書發涼王張駿墓得赤玉簫洞簫無底者也雅簫長四寸仲夏之月樂師均簫管參差之音禮秦樓之遺音弄玉也鳳簫短簫折柳之曲短簫有折楊柳之曲王褒洞簫賦文選編竹五經義簫編竹為之長尺五寸簫長則濁短則清月令章句從以簫管禮君子聽簫管之聲則思畜聚之臣與笙門同見上注簫管備舉喤喤厥聲詩天籟人籟地籟籟簫也莊子曰汝聞天籟未聞人籟汝聞地籟而未聞天籟南郭子綦云云漢元帝多才藝吹洞簫自度曲被歌聲也大者二十四管無底小者十六管有底博異云頌簫長一尺二寸見三禮圖漢元帝靈帝能吹簫見謝丞後漢書九成見上七數鄭注易通卦驗曰簫夏至樂夏至火用事其數七象鳳致鶴並見上注鳳飛簫史魚瞰王褒賦曰遷延縱逸魚瞰雞睨垂啄宛轉瞪瞢惡食文選蒯陌葛洪神仙傳曰蒯子訓少嘗仕郡人莫知其道三百餘年顏色不老及死殯之宿昔棺輷然作雷霆音光照宅宇見棺蓋飛於中庭棺中無復有人但餘履耳須臾聞陌上有人馬簫鼓之音張墓三十國春秋曰涼州胡安盜晉文王張駿墓見駿貌如生得赤玉簫紫玉笛越宮呂氏春秋曰客有以吹籟見越王者上下宮商和而越王不喜或謂之野者而王乃悅之亦有如此者要在聽之而已籟謂之簫廣雅伍子胥鼓腹吹簫乞食於吳市史記孔細器書注見細器之備條暢敷紛洞條暢而罕節兮摽敷紛以扶疏王子淵賦武聲仁聲武聲若雷霆仁聲若凱風同上危聲危聲合歌鼓絶弄混笙箎劉孝儀詩間笙篁喧然名都會吹簫間笙篁杜甫詩白武帝時丘仲作笛風俗通列和之遺音列和善吹笛截竹作龍吟笛賦云近世雙笛從羌起餘見下柯亭之竹見知音門發山陽之聲向子期思舊賦序曰山陽鄰人有吹笛者發聲暸亮感言而作賦折楊柳落梅花之曲曲名也六孔羌笛竹聲禮石崇妓緑珠有國色善吹笛長笛賦序馬融精該術數性好音律能吹笛為督郵無事獨臥郡平陽邸有雒客舍逆旅吹笛融去京師踰年暫聞甚悲之而作長笛賦當簻笛賦曰羌人伐竹不及已籠鳴水中不可見己截竹吹之聲相似剡其上孔通洞之截以當簻使易時京房字君明識音律舊本四孔加以一君明所加孔後出是謂商聲五音畢矣云云笛長短荀勗間協律列和曰作笛唯可依十二律十二笛令一孔依一律否和曰樂東廂長笛尾長四尺三寸今若取其下徵之聲於法聲濁者笛當長計其尺寸乃五分有餘和昔日依之不可吹也又笛諸孔亦恐不能得一孔應律也一定之調晉書云按周禮金石有一定之音故諸音皆受鍾磬之均至於饗宴殿堂之上不懸鍾磬則以笛有一定之調故諸絃歌皆從為正也三尺二調晉荀勗問列和曰若不知律呂之義作樂者均高下清濁之調當以何名之和曰每合樂時隨歌者清濁聲假聲濁者用二尺二笛因名曰此三尺二調聲清者用二尺九笛因名曰此二尺九調漢魏相傳施行皆然也請吹晉桓伊叔夏有蔡雍柯亭笛掌自吹之王徽之赴召京師泊舟青溪側索不識伊伊於岸上過有客曰此桓野王也徽之便使人謂曰聞君善吹笛試為一奏伊已貴顯素聞徽之名便下車倨胡床為三弄畢便上車去主客不交一言野王伊之小字也作笛晉樂志云宋玉賦玉在漢前作笛賦或云漢武時丘仲作此説恐非也馬融又有長笛賦云近代長笛從羌起笛滌也所以滌邪穢納之於雅正也長一尺四寸今有七孔衡陽之簳笛之所出也見宋玉賦雲夢之竹出笛見魏文與吳質書馬融宋禕並善吹笛桓子野及奴碩見語林芳林皓簳有奇寶兮宋玉賦類削良簳三孔條長昭華之琯西京雜記曰高祖初入咸陽宮周行庫府金玉珍寶不可言其尤驚異者笛長三尺三寸六孔銘曰昭華之琯絲竹之音攄憤蔡雍瞽師賦曰夫何矇昧之瞽兮心窮忽以郁伊目冥冥而無睹兮嗟懷順以愁悲撫長笛以攄憤兮云云諭意長笛賦曰可以通靈感物寫神諭意也遠可以通靈達微近可以寫情暢神蔡雍長笛賦云激朗清厲隋光分馬融長笛賦云清哀陶潛間居賦曰起攝帶以伺晨繁雲粲以素階雞斂翼而未鳴笛出聲而清哀孔隨歌隨歌響更發逐舞聲彌亮姚崇詩紫雲回明皇夢遊月宮諸仙奏上清之樂流亮清越殆非人間所聞覺以玉笛寫之名紫雲回曲開天傳信記臥吹笛漢中王瑀為太常卿早起聞永與里人吹笛問是太常樂人否曰然後因閲樂撻之曰某日何得風吹笛裂石李舟嘗得村舍煙竹截以為笛以遺李牟牟吹笛天下第一月夜泛江吹之寥亮逸發俄有客呼船而至請笛吹之甚為清壯山石可裂及入破呼吸盤僻應手粉碎客散不知所之疑其蛟龍也國史神七月望前許雲封言竹生雲夢之南鑒在柯亭之下以今年七月望前生明年七月望前伐過期不伐則其音窒未期而伐則其音浮甘澤謠洞庭老父賈客呂卿筠嘗於中春夜泊舟於君山側命酒吹笛數曲忽見一老父拿舟而來遂於懷袖間出笛三管其一大如合拱其次如常人之所蓄其一絶小如細筆管筠卿請老父一吹老父曰其大者諸天之樂不可發其次者對洞府諸仙合樂而吹其小者是老身與朋儕可樂者試為子吹之不知可終一曲否言畢抽笛吹三聲湖上風動波濤沆漾魚龍跳噴五聲六聲君山上鳥獸叫噪月色昏昧舟人大恐老父遂止博異志斷腸聲吹笛秋山風月清誰家巧作斷腸聲杜詩催落日鳴笛急吹催落日清歌緩送感行人韓詩水中龍應行雲絶高聲五音隨指發水中龍應行雲絶曾將黃鶴樓上吹一聲占盡秋江月劉禹錫笳十三白笳者胡人卷蘆葉吹之以作樂也故曰胡笳播為琴曲蔡琰胡笳互動牧馬悲鳴吟笑成群邊聲四起李陵書云悲笳文選出塞入塞胡笳者張博望入西域傳其法於西京唯得摩訶兜勒一曲李延年因胡曲更造新聲二十八解以為武樂有出塞入塞楊柳等十曲感動劉疇字正喬嘗避亂塢璧賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其遊客之思於是群胡皆垂淚而去孔笳吟細柳營杜詩大駕鹵簿前部扛鼓十二夾金鉦十二大鼓長鳴皆百二十鐃鼓十二歌簫笳次之儀衛志羽葆鼓十二歌簫笳次之大撗吹心葆鼓十二歌簫笳次之同上後部歌簫笳次之同上白北里吹笙竽左思詩笙竽俱唱文選濫吹南郭先生見笙門北里之吹南郭之濫見上注竹聲禮記見笙門竽笙備而不和禮明器也孔高門有笙竽韓愈詩雲韶竽一樂志文宗好雅樂詔太常卿馮定製雲韶樂有竽一七曰匏樂志七曰匏為笙為竽為巢為和缶十五白坎其擊缶宛丘之道詩陳風澠池之會秦王為趙王擊缶趙王命史書之易曰日昊之離不鼓缶而歌則大耋之嗟凶離六三莊缶缶堪擊文選擊缶真秦之樂也楊惲書用缶又曰樽酒簋二用缶納約禮曰門外缶門內壺孔盎缶地理志河南府土貢埏埴盎缶製用金成張瀆宣室志季員居長安延壽里一夕忽聞室之西南隅有歌其音極清越泛泛然久不已切志其歌詞曰色分藍葉清聲比磬中鳴七月七日吾當示汝之形歌竟其音亦闋後至秋始六日夜有甚雨潰其堂之北垣明日垣圯又聞其聲果前聞者員驚視之於垣下得一缶徑尺餘製用金成形狀奇古有文視不可見叩之其韻極長即命滌去塵蘚歷然可讀字若小篆乃崔子玉座右銘員得而異之琉璃罌缶南蠻婆賄伽盧國與諸蠻市以琉璃罌缶相易擊轅拊缶柳宗元答友人求文章書籥十六白詩曰左手執籥籥三孔笛也舞者執之天地之間其猶橐籥乎老籥師掌教國子舞羽吹籥周禮豳籥豳人吹之以為樂以籥不僣僣音侵孔吹籥王義方貶吉安丞行釋奠禮清歌吹籥登降跽立人人悅順雲韶籥文宗好雅樂製雲韶樂有籥一鳴籥紅頰吹鳴籥韓愈郾城聯句持羽執籥持羽魏證送文舞迎武舞入用舒和文舞郎左執籥五代史崔梲傳廟卑忌尊則去籥裴寬傳白蘇門之遺聲妙動林壑蘇門先生孫登善長嘯每發聲妙動林壑諧琴阮臺阮嗣宗善嘯聲與琴階陳留有阮公嘯臺成瑨坐嘯成瑨為南陽太守委任功曹岑晊人語曰南陽太守岑公孝弘農成瑨但坐嘯成公綏嘯賦逸群公子慷慨長嘯自然之至音發口成音隨口吻以發揚飛音妙聲竹不如肉晉書靈源之餘音神境記曰榮陽西有靈源山昔有採藥此山間林谷聞有長嘯者今樵人往往猶聞姑石之遺響異苑曰潯陽姑石山在江之坻初桓玄西下令人登之嶺上便聞長嘯聲甚清徹至峰乃見一人箕踞石上不言晉陽秋曰嵇康見孫登對之長嘯而不言也不答漢晉春秋曰桓帝幸樊城百姓莫不觀有老父獨耕不輟議郎張溫使問焉父嘯而不答數齒莊子童子夜嘯鬼數若齒有女仳離條其嘯矣有女仳離遇人之不淑矣詩解賊圍劉琨字越石為胡騎所圍城中窘迫因乘月登樓清嘯胡賊聞之皆悽然長歎而去趙炳臨流乘舟長呼而自濟搜神記趙炳嘗臨水從船人乞渡舟人不許炳乃擅坐其中長嘯呼風亂流而濟王廙佐樓而長嘯王廙列傳曰王導與庾亮遊于石頭會過廙至是日迅風飛帆廙倚樓而長嘯神色自逸魯女倚柱而悲嘯列女傳曰魯漆室邑女過時未嫁倚柱而悲嘯旁人問之曰何嘯之悲也子欲嫁乎吾為子求偶漆室邑之女曰吾豈為不嫁之故而悲哉憂吾君老太子少也善歌嘯郭子曰劉道真少時善歌嘯有一老姥謝其非常人甚識其歌嘯乃殺豚食之道真食豚不謝向南風而嘯吳越春秋曰吳王闔閭將欲伐楚登臺向南風而嘯有頃乃歎群臣莫有曉王意者伍子胥深知王憂乃薦孫武善為兵法人莫能知阮藉性樂酒善嘯聲聞數百里竹林七賢傳箕踞嘯歌世説曰晉文王德盛功大坐座嚴敬擬於王者惟阮籍箕踞嘯歌酣放自若如鼓吹七賢傳蘇門山中忽有真人在焉阮籍往尋與語不應籍乃長嘯有頃笑曰可更作又為嘯遂還半嶺嶺巔哂然有聲若數部鼓吹乃向人之為嘯潯陽記曰桓宣穆廬山見一人謂之曰君過前嶺必逢二少年相隨長嘯試要問之若不與言者可速去果見二人以袂掩鼻長嘯狀如惡其臭呼之不與言夢書曰夢吹嘯者欲有求也雜字解詰曰嘯吹聲也化石而嘯內傳曰海春仙人居髑髏山善嘯術時太山道士鍾約字期往來欽其藝春變為石人約不知乃坐石上仰面而嘯石亦復嘯於下傾山動澗響遏行雲約再拜謝之春知其意莫止即於坐石上對教三事不飲不食乃得嘯而風生於虎也孔乘月吟嘯崔咸善長嘯甘澤謠曰韋騶明五音善長嘯夫婦嘯詠崔覲與妻隱南山夫婦嘯詠相視為娛嘯有十五章一曰權輿二曰流雲三曰深溪虎四曰高柳蟬五曰空林鬼六曰巫峽猿七曰下鳴鵠八曰古木鳶九曰龍吟十曰地動十一曰蘇門十二曰劉公命鬼十三曰阮氏逸韻十四曰正章十五曰畢章出王睿炙轂子遞嘯韓愈納涼聯句遞嘯取遙風微微近秋朔溪谷寒白笴夜長嘯爽然溪谷寒李白遊秋浦出原野長嘯出原野凜然寒風生酬崔五郎中長嘯萬里風掃清胸中憂留別賈舍人倚天梯送君登黃山長嘯倚天梯送族弟輕衣裾長嘯輕衣裾嘯吒川澤弋獵畋漁嘯吒川澤常袞馬司徒神道碑激於舌端而清永泰中大理評事孫廣著嘯旨一篇云其氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事達情性嘯之清可以感鬼神致不死雷鼓霹靂之引天寶未有峨嵋山道士姓陳來遊京邑善長嘯能作雷鼓霹靂之引初則發聲調暢稍加散越須臾空寫雷之音匆復震駭聲如霹靂觀者莫不傾悚巳上出唐語林激氣衝口呂向注文選嘯賦潛轉於唇齒之間激氣衝口而出聲之清遠呂延濟文選注放歌長嘯歐陽矩移陸司勳書清聲上徹雲漢李翱守廬江有重囚當刑引慮之乃哀鳴曰某有薄藝願於貴人前試之乃長嘯也乃命釋械俄而清聲上徹雲漢公曰不謂蘇門之風出於赭衣之下可與孫阮同躅乎即赦其罪逸韻動海上與南陵常贊府遊五松山安石泛溟渤獨嘯長風還逸韻動海上高倩出人間李白平明空嘯吒思欲解世紛上
