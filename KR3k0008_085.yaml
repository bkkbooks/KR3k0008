body:
  text: 卷第八十五白三畋禮天子諸侯無事則歲三畋一為乾豆二為賓客三為充君之庖不畋禮無事而不畋曰不敬田不以禮曰暴天物禮曰畋獵有禮故戎事間也搜田以時詩薄狩于敖春搜夏苗秋獮冬狩皆於農隙以講事也傳不狩不獵胡瞻爾庭有縣貆兮鶉兮持兮從禽于外上無逸飛下無遺走好樂無荒德用不擾夜獵春畋校獵豺祭獸文子曰先王之法也豺未祭獸罝網不通於野鷹隼未擊羅網不張於谷順祭獸之時展從禽之禮宗祧之事傳曰楚子曰屬有宗祧之事於武陵言畋獵為宗祧及時之畋中禮之殺講戎事纘武功講一時之武國語三時務農一時講武遵三畋之文時畋周禮爭禽之訟周禮斷其爭禽之訟頒禽修祭禽之理獵得禽獸以供祭祀火畋禮曰豺祭獸然後田獵鷹化為鳩然後設罻羅昆蟲未蟄不用火畋悌達於搜狩矣禮曰頒禽隆於長者而悌達於搜狩矣隆多也老者多賜獲獸爭禽易曰畋無禽恆非其位雖勞無獲即鹿無虞以從禽也易畋獲三狐狐者隱藏之物畋獲三品乾豆賓客君庖前禽王用三驅失前禽也給鮮毚兔詩躍躍毚兔遇文獲之發彼小豝登此大兕射麋麗龜弋鳧與鴈兩狼並驅從兩狼兮御衆周禮太宰入則田役以御其衆竭作小司徒役無過家一人其餘為羡唯田與追正月竭作鄉師掌四時之田先期簡衆修卒伍也山虞澤虞皆掌畋獵之事饁獸小宗伯若大甸則帥有司饁獸于郊注饁饋也以饋四郊之神有司大司馬也遂頒禽獸仲春教振旅遂以搜田有司表貊立表而貊祭仲夏教茇舍遂以苗田茇草舍止也軍有草止之法仲秋教治兵遂以獮田仲冬教大閲遂以搜田並大司馬之職有畋獲禽獸者有司教道之月令十一月季春出火為焚然後簡其車賦而歷其卒伍而親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽鹽之利以觀其不犯命也求服其志不貪其德介麋迹人告曰逢澤有介麋譬如畋獵射御慣則能獲禽若未嘗登車射御則敗績壓覆是懼何暇思獲左爭禽榖梁蔡人殺陳他也陳侯淫獵于蔡與蔡人爭禽而殺之與楊祥事皆云云榖梁秋搜于紅以習戎事禮之大者艾蘭為防謂大防也置旃為轅門云云車軌塵馬後蹄掩禽旅掩取衆禽也御者不失其馳然後射能中過防不逐不從奔也面傷不獻嫌誅降也禽雖多天子取三十餘與衆士也漢高曰追殺獸者狗也指示蹤者人也鷹隼未發短弋不施於蹊隧既順時取物然猶山不槎櫱妄發期中進退履獲文選因農隙纘武功宋公載燧爰分左右之盂夏官建旗必殊險易之主險野人為主易野車為主大司馬職云建旗于表置旌于門田得禽而射不中穀梁田而習射射中而曰不得禽則得禽射不中而曰得禽則不得貴仁義賤勇力講事必在於有儀鹽利取觀於不犯並驅兩牡一發五豝司原虞針曰獸臣司原忘蹄結網不狩不獵以畋以漁奉時辰牡辰時也言及時馳逆之車掎角捕鹿金氏昌氏反掌攻猛鳥各以其物為媒而掎之禁俗掌部格西京五百里內宜禁捕獵犯者王公以下録奏痛決一頓禽荒書曰外作禽荒暴天物田不以禮曰暴天物習於畋獵謂之賢間於馳逐謂之好焉詩欲無犯時淫于原獸思其麀鹿並后羿虞針虞人之針戒畋獵也擭胎拾卵蚳蝝盡取文選取樂今日遑恤我後發狂老子曰騁馳畋獵令人心發狂灞陵夜獵舊時將軍盤遊無度十旬不返書曰太康尸位以逸豫乃盤遊無度畋于有洛十旬不返有窮后羿距于河五子感怨述大禹之戒以作五子之歌恆于遊畋時謂淫風心苟發狂物斯暴殄外作之荒既暴於物內憂之禍必及其身荒矣武王之志荒矣獵較較爭也孟子曰魯人獵較孔子亦獵校不違俗也燔人家漢長沙王建德獵縱火燔人九十家坐棄市宣詔捨之削八縣也武功載績雖聞七月之詩遊田為恆須憚三風之戒曹伯陽好弋割鮮染輪文選櫛風沐雨魏鮑勳叔業曰獵暴華蓋於原野傷生育之理櫛風沐雨而不以時隙焚林文子先王之法也不焚林而狩昆蟲未蟄不以火田也欲既犯時殺而盡物規諫刺荒旋刺荒也齊襄公好畋獵從禽獸而無厭國人刺之諫獵楊子雲作長楊賦以諫漢帝獵也好畋晉侯好畋故魏絳陳獸臣之針取監於后羿觀漁魯侯矢魚于棠遂觀之矢陳也陳捕漁之器臧僖伯諫之虞人之針見上羅氏之戒禮羅氏致鹿與女曰好田好女者亡其國也老氏之戒見上發狂注云云樊氏之戒楚莊王好田故魏樊夫人為之不食禽獸之肉三年王為之自戒也罔遊于逸罔淫于樂禹戒無逸之戒書周公作無逸曰文王不敢盤于遊田鳴呼無淫于觀于逸于田于遊也羅氏致鹿戒諸侯也羅氏掌鳥獸者戒見上注相如諫獵書力稱鳥獲捷言慶忌人誠有之獸亦宜然卒遇逸群之獸駭不存之地輿不及還轅人不暇服施巧是以胡越起於轂下而羌夷接軫也御橛之變諫獵書云漢武除地為上林帝令吾丘壽王舉籍河南堤封頃畝欲除為上林東方朔諫乃止舉籍謂舉數其籍也獲罪魏長水校尉戴陵諫七獲減死一等獵勝八音魏文侯獵中道問侍臣曰獵之樂何如八章劉曄曰獵勝鮑勛曰樂上通神明下知人理況獵暴華蓋於原野傷生育之至性因奏曄佞而問順云云廣城頌馬融李長為校書時人以文德可興武德宜廢遂寢狩搜之禮自戰陳之去故使猾賊從橫融以文武不墜故上廣天頌諫之露坐諫見諫諍門裨諶草創吳孫策好獵虞翻仲詡諫策策曰君言是也然時有所思端坐悒悒有裨諶草創之計是以行也天子畋示禮傳曰成有岐陽之搜所以示諸侯禮也諸侯所由用命也示汰商紂為黎之搜東陵之所以示諸侯汰也諸侯所畋棄命也三畋禮曰天子無事則歲三畋驅獸無害五穀無大畋獵孟夏不合圍天子禮王用三驅失前禽楚畋雲夢之澤漢獵長楊之宮羽獵六師既陳駟馬乃駕當在鎬之年天子無事順于敖之狩虞人有儀周文有渭濱之畋十日所獲非熊非羆得太公也薄狩于敖宣王詩大綏禮天子殺則下大綏綏大旗名殺獸也吉日宣王畋獵之詩徒御不驚大庖不盈德至禽獸湯見張羅去三面祝之云云諸侯聞之曰湯德至禽獸諸侯畋三畋禮曰天子諸侯無事則歲三畋不掩群諸侯禮不圍澤國君春畋云云小綏小綏諸侯旗名殺則下小綏禮楚田於夢禮既失之魯狩于郎嘗其時也楚子田孟諸宋公為右盂鄭伯為左盂盂陳名令夙駕載燧宋公達命無畏抶其僕以徇盧令刺荒齊襄公好畋獵盧犬名詩射鴻于囿衛是公戒孫文子寧惠公子從公不釋皮冠與之言云云子産唯君用鮮取鮮禽以祭示仁無麛無卵畋既以時殺亦中禮不殺胎不夭夭不覆巢禮不射宿子釣而不綱弋不射宿欲無犯時殺不盡禮射不剪謂向己者不殫物以昭仁解網見上注慕天乙之仁且聞羅網卜渭濱之獵不在熊羆取之以道田不夭夭搜獰順時合騶虞之仁也胎卵盡取是竭澤之淫風鑒五子之戒無及於荒考三驅之文不專於殺好生惡殺周禮禁麛卵與其毒矢射者謂其矢物且害心多餒獸之藥無出國門月令三月畋雖中禮不取於蚳蝝殺亦有仁無及於麛卵苟不道其生成則何殊於暴殄沉澤周禮禁沉澤謂以毒藥沉水中令魚蟲盡死無得春夏探卵彈射飛鳥宣詔曰三驅之禮一面之羅求服其志不食其得放麑孟孫獵得麑使秦巴西以歸其母隨而哀鳴西不忍放之孟孫怒巴公云乃赦之後託子巴西曰不忍殺麑可託也董仲舒曰禮不麛不卵取麑違命皆非禮也非禮未復命傳曰魏獻子合諸侯城周田於大陸而卒范獻子出其柏槨以其未覆命命而田也矢魚傳曰魯侯矢魚于棠非禮也臧僖伯諫曰鳥獸之肉不登于俎皮革齒牙骨角毛羽不登于器則公不將古之制也公不聽之不軌不物謂之亂政身剪禮曰凡有血氣之類不身剪剪殺也時殺禮曰禽獸不以其時殺非孝也有禮禮曰田獵有禮故戎事間畋既有時殺其中禮悌達於搜狩頒禽隆於長者而悌云云苟或達於禮經則何殊於暴物傳曰晉厲公田使婦人先殺而飲酒而後大夫殺厲公先婦人後鄉佐孔從獵得洛陽苑唐儉為民部尚書從獵洛陽苑群豕突出于林帝射四發輒殪四豕一豕躍及鐙儉投馬摶之帝拔劍斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢高祖以馬上得之不以馬上治之陛下神武定四方豈復快心於一獸帝為罷獵畋獵自放段成式侍父于蜀以畋獵自放文昌遣吏白其意諫止侯希逸好畋獵鳥鵲皆識謂之鳥賊李客師喜馳獵雖老猶未衰自京南屬山西際灃水鳥鵲皆識之每出從之翔噪人謂之鳥賊遊畋自娛李令問魏徵疏曰在貞觀初高居深拱無畋獵異弋之好數年之後志不克固鷹犬之貢遠及四夷晨出夕返馳驥為樂變起不測其及救乎截輕禽逐狡兔韓元超留輔太子監國時太子射獵詔得入禁御元超諫曰內苑之地繚叢薄冒翳薈絶磴險塗殿下截輕禽逐狡兔銜翳之變詎無可虞冒垂堂淫原獸長孫無忌從父敞隋煬帝為晉王敞以庫有從畋驪山王凌危逐鹿諫曰大王冒垂堂淫原獸可乎王遂止彈治柳范貞觀中為侍御史時吳王恪好畋獵范彈治之從獵涇陽蘇世長從獵涇陽大獲帝入旌門詫左右曰從獵畋樂乎世長曰陛下廢萬機事遊獵不滿十旬未為樂也數出畋遊虞世南帝數出畋遊世南為言皆蒙嘉納以獵為娛張玄素太子承乾事遊畋玄素上書曰古者田三驅非以教殺除民吉也今反以獵為娛行之無常豈不損盛德哉偽約畋裴行儉至西州徐召四鎮酋長偽約畋謂曰吾念此樂未始忘孰能忘吾獵者於是子弟願從者萬人孫伏伽言凡搜狩當順四時不可妄動且陛下即位之明日有獻鷂者不郤而受此前世弊事奈何行之柳澤上書曰今貴戚打毬擊鼓飛鷹走犬狎比小人盤遊藪澤陛下誕降謀訓觀以學業示之以好惡陳之以成敗則長享福祿矣以呼鷹逐獸為樂姚崇陝州硤石人徙同州刺史先天二年玄宗講武新豐故事天子行幸牧守在三百里者得詣行在時帝亦密召崇崇至帝方獵渭濱即召見帝曰公知獵乎對曰少所習也臣年二十居廣成澤以呼鷹逐獸為樂張景藏謂臣當位王佐無自棄故折節讀書遂待罪將相然少為獵師老而猶能帝悅與俱馳遂緩速如旨帝歡甚趙武孟彥昭父少遊獵晝夜馳獵不堪其勞隱太子建成為皇太子涼州人安興貴殺李軌以衆降詔趣原州應接建成素驕不恤士雖甚暑晝夜馳獵衆不堪其勞亡者過半不可一日不獵巢刺王元吉曰我寧三日不食不可一日不獵上賦以諷杜鴻漸明皇東行河因遊畋上賦以諷荒于遊畋崔郾穆宗荒于遊畋內酣蕩昕曉不能朝郾進曰十一聖之功德四海之大萬國之衆其治其亂繫於陛下自山以東百城地千里昨日得之今日失之願陛下親政事以幸天下帝動容慰謝遊畋恣樂流情傷志憲宗數出遊獵柳公綽奏太醫針以諷曰遊畋恣樂流情傷志馳騁勞形叱吒傷氣武德獵高祖帝紀武德四年閏月壬戌獵于好畤乙丑獵于九嵕丁卯獵于仲山戊辰獵于清水谷獻續虞人針白居易穆宗好畋遊獻續虞人針以諷曰高祖方獵蘇世長進言不滿十旬未足為歡上心既悟為之輟畋降及宋璟亦諫玄宗溫容聽納獻贊從容璟趨以出鷂死懷中噫逐獸于野走馬于路豈不快哉御橛可懼審其安危惟聖之慮遊獵韋社王琚懷州河內人玄宗為太子間遊獵韋社間怠休樹下琚以儒服見且請過家太子許之至所廬乃蕭然窶陋坐久殺牛進酒殊豐厚太子駭異自是每到韋社輒止其廬校獵盧懷謹卒帝後還京因校獵鄠社間望懷謹家環堵痺陋家人若有所營者馳使問焉還白懷謹大祥帝即以縑帛賜之為罷獵韓休峭鯁時政所得失言之未嘗不盡帝獵苑中或大張樂稍過差必視左右曰韓休知否已而疏輒至遮道諫潘好禮兼邠王府司馬農日王出獵家奴羅列好禮遮道諫王初不許乃臥馬下呼曰今農在田王何得非時暴禾稼以損下人要先踐殺司馬然後聽所為王慚為還勸止畋獵李絳出為華州刺史州有捕鷂戶歲責貢限絳以為言并勸止畋獵有詔澤潞太原天威府並罷之遷御史大夫穆宗數遊畋絳率其屬叩延英切諫不納以病辭飛鳥見必群噪張直方好馳獵往往設罝罘於道當宿衛不時入下遷驍衛將軍後居東都弋獵尤甚洛陽飛鳥皆識之見必群噪諸將憚其材武樊澤遷山南東道司度就拜節度使每射獵諸將憚其材武從獵夷門崔弘禮過宣武從劉玄佐獵夷門餘見賓客門荒畋獵藩鎮程懷直荒畋獵出輒數日而返馳獵近郊王播為京光尹勳戚家馳獵近郊播請呵止諫畋遊王起數上疏諫穆宗畋遊事畋蓬萊池帝嘗畋苑中至蓬萊池日絳嘗以諫我今可退也校獵渭川獻詩規諷呂向天子數校獵渭川向又獻詩規諷校獵同州劉仁軌正觀十四年校獵同州時秋斂未訖仁軌諫懇幅致諫褚亮高祖獵親格虎亮懇幅致諫暮夜乃還李德裕帝數出畋遊暮夜乃還德裕上言霄田為獠注管子曰獠獵異弋江東亦呼獵為獠火田為狩注放火燒草並爾雅履獲進則履退則獲潛身伏草間諫五代何澤為洛陽令唐莊宗好畋獵數踐民田澤乃潛身伏草間諫莊宗當馬而諫曰陛下未能一天下而休兵而暴斂疲民以給軍食今田將熟奈何恣畋遊以害多稼使民何以出租賦吏何以督民耕陛下不聽臣言願賜臣死於馬前莊宗大笑為之止獵天上黃金吳秦裴好馳獵以鷹隼為事常曰天下黃金餘不足貴出九國志騂弓金瓜鏑白馬蹴微雪杜甫遣興長陵鋭頭兒出獵待明發同上未嘗戴星杜牧燕將録今天子鋪樂張獵未嘗戴星獵騎圍邊月韓愈詩人業射獵呂元膺鄧虢川谷深曠人業射獵而不務農千騎飆掃萬乘雷奔李白大獵賦千騎飆掃萬乘雷奔稍搏桑而拂委大刮月密而搜塞門掉倚天之劍彎落月之弓同上白收禽論功文選會衆收禽論功賜也數諫衆寡又曰收禽舉觜數諫衆寡傳曰獸人無乃不給於鮮數獸計鮮七命曰虞人數獸林衡計鮮論最犒功禽獸諫獻禽獸周禮虞中周禮小宰禽佐於虞中注云今得禽者置之虞人之旗中而後獻給焉大獸公之小獸私之獲者取左耳以計功大司馬職云獻獸于公致禽周禮獵孟子曰魯桓公獵獸而祭孔子亦獵不違衆也較爭多以歲之非時獻禽之未至言私其豵獻豜于公詩獻獸小宰獸人掌網罟田獵辨其名物冬獻麋夏獻鹿春秋獻獸物時皆畋則守罟注備獸觸分禽平任安少卿為亭長邑人俱出獵任安常為分禽麋鹿部署老少皆喜曰任少卿分列平也孔得禽獻旗下禮志皇帝狩田凡射獸目左射之凡出表者不逐之諸得禽其大者供宗廟次者供賓客下者供庖廚乃命有司饁獸于四郊以獸告至於廟下獻禽之課文粹杜甫雕賦解騰攫而竦神開網羅而有喜獻禽之課數備而已田將止虞部建旗於田內乃雷擊駕鼓乃諸將之鼓士徒噪呼諸得獻者至其左耳大獸公之小獸私之通典陷阱三白周禮曰置人為阱擭以攻猛獸以靈鼓驅之靈鼓大面鼓也驅使趨阱擭也又曰凡害於國稼者春秋為阱擭秋塞阱杜擭害稼為禽獸也擭為𣏣㮙也設於阱中秋塞之謂其傷人也書曰杜乃擭敜乃阱塞之禮曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知避虎兕出於柙柙檻也猛獸在於陷阱則搖尾而求食擭獸利人除害犯暴摽幟律云於深山作陷阱者須明立標幟恐陷人也鷙獸禁暴孔治機阱李紳遷滁壽二州刺史霍山多虎擷茶者病之治機阱發民迹射不能止紳至盡去之虎不為暴拘若檻阱吳武陵信州人少陽子元濟叛武陵遺以書曰數百里之內拘若檻阱常疑死於左右手抵回姑息不可謂明自投機阱李翰五等論大臣側目相視自投機阱誘人文粹劉秩私錢譏今塞其路是設陷阱而誘之入不可三也諸有猛獸之處聽作檻阱射窩等開元令命塞陷阱顧少連補登封主簿邑有虎民患之少連命塞陷阱移文嶽神虎不為害猛虎落檻阱坐貪如孤豚韓文送進士劉師服東歸白肅肅兔罝詩伏羲氏作網罟以畋以漁蓋取諸離易小宰獸人掌罟畋獸辨其名物周禮驅而納諸罟擭陷阱之中而莫之知避託言人不知禮羅氏掌羅鳥蠟則供羅襦冥氏掌設弧張弧張則罿罦屬以局置禽獸也畋獵罝罘羅網畢翳餧獸之藥無出國門月令三月鷹化為鳩然後設罻羅楚人以弱弓微繳加歸鴈之上雖有矰繳安所施戚夫人歌豺獺未祭罝網不布於梁澤鷹隼未發矰弋不施於蹊隧罝罘玉篇云罝兔罝罘覆車也忘筌忘蹄魚網之設鴻則離之施罛濊濊音豁九罭魚網一面見下畢之羅之周禮守罟備獸觸也罟罶禁罝羅罣麗罣音毒良罟里革斷罟公曰良罟也鳥亂於上莊子畢弋機變多則鳥亂於上釣餌罟矰笱多則魚亂於下削革羅落罝罘多則獸亂於澤莊子魚不畏網而畏鵜鶘以網無情故也虎豹在囊檻漢以網為周祛祛遮禽獸國陳湯羅祝網史記湯出見野張網四面曰天下四方皆入吾網湯嘻盡之矣乃夫三面祝之曰欲左者左欲右者右不用命者入吾網諸侯聞之曰湯德及禽獸矣孔載三十車巢王元吉喜鷹狗出常載罟網三十車設罝罘於道張直方好馳獵往往設罝罘於道易人取禽獸之勞文粹元結補藥調網罟伏其義蓋稱伏義能易人取禽獸之勞吾人吉兮水深深網罟設兮水不深吾人苦兮山幽幽網罟設兮山不幽免禽獸文粹楊炯少姨廟碑免禽獸于網羅雲羅張天網布文粹李白大獵雲羅張天網布羅網罝罘綿原峭格掩路綿綿文粹陳子昂陳居士墓銘綿綿羅網冥冥高鴻鳥雀李商隱劉乂傳羅網鳥雀蟭螟飛而不度文粹李白大獵賦蟻蠓過而猶疑蟭螟飛而不度張羅網於門韓文實録貞元末五坊小兒張捕鳥雀於閭里皆為暴橫以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輒曰汝驚供奉烏雀痛毆之出錢物求謝乃去施衆網以加一禽尚不能得況張一目以羅萬品而望其飛者走者大者小者盡出乎其間其可得乎元稹制策虞羅自合虛施巧杜二鷹詩借狗求罝勝王元嬰為金州刺史從民借狗求罝所過為害網罟歲廣李乂帝遣使江南發在所庫資以贖生乂上疏鬻生之徒惟利是視錢刀日至網罟歲廣白男子之事禮既張我弓又挾我矢以威天下聖人弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽有志尚書若射之有志有志則中善射五射周禮六藝一曰五射注云百矢參連剡法讓尺弓儀射法法亦禮也習射上功習鄉上齒言功多者居上藝成而下貫革徹禮養由基蹲甲而射徹七札並夾取矢周禮危弓安矢具弓矢門引強周渤云云決拾儀禮司射適堂西垣決遂取弓于階告賓弓矢既具有司請注云決猶開也以象骨為著左臂鉤弦開體遂射以韋為之所以弦非射時為之拾謂斂也楅儀禮射曰司馬出于左物之南立于所設楅之南命弟子設楅猶樞所以承齊矢也乃設楅於中廷南當洗東肆東肆繼於賓也楅長如笥破的奠豐棲鵠啼猿君使士射不能則辭以疾曰某有負薪之憂和容正志射戲李廣與人居則畫地為軍陳闊狹以飲射戲求疏密持酒飲不勝者專以射為戲也禮射昭誠心射以禮成賓申賢序射侯終日射侯不出正兮君子無所爭必也射乎揖讓而升下而飲其爭也君子主皮子曰射不主皮為力不同科古之道也射有五善一曰和志二曰和容三曰主皮四曰和頌五曰興舞決拾既佽群臣合射大侯既抗射矢斯同行以燕禮以明君臣之義射於澤宮以觀禮樂之節將觀盛德必慎令儀燕以序賓射而選士射而觀德三侯文子五正為節天子以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節故明其節之志以不失其事則功成而德行立也禮記飾以禮樂其容體比於禮其節比於樂盡志於射繹己之志射之為言繹也繹者各繹已之志也心平體正持弓矢固審然後可以言中各射已之鵠動而中禮發心循聲發彼有的以祈爾爵失正鵠者反求諸身合射以禮序賓以賢射者進退周旋必中禮內志正外體直孔子射於矍相之圃觀者如堵牆百中五善四鍭如樹言中考繹志之文不專貫稽和容之善寧在主皮君子必爭賢者不失發必循聲既合采蘋之節中則破的何慚穿葉之能三年之妙雖貫虱心五善之容何乖貍首賓射之禮周禮射矢既同周禮凡射王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節二正大夫三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豹侯一獲一容樂以采蘩五節二正容乏也節樂之節也豹獸名獲弊也以燕以射詩三耦四矢四矢既挾周禮司裘供射侯設鵠鵠小鳥而難中是以中之為雋大射大射者謂祭祀時王將有郊廟之事以射擇諸侯及群臣與鄉國所貢之士可以與祭者射謂三公及王子弟封畿內者與衆臣射者也考功梓人張五采侯此五正之侯也五正者中朱次白次蒼次黃次玄居三去黃玄二正自蒼而畫朱緑其外之廣皆居侯中三分之二與士射以犴皮飾侯也肆懸懸磬乘矢四矢順羽而興儀禮執矢之禮記曰大夫與公士為賓不敢使鄉人加尊於人大夫故取公士不宿戒不戒而習之其牲烹狗于堂東方祖陽氣之在方立德行者莫若射故聖王務焉禮諸侯貢士於天子天子試之射宮中多與祭而君有慶少者不與祭而君有讓慶則益地讓則削地是以諸侯君臣盡志於射以習禮樂父鵠子鵠為人父者以為父鵠為人子者以為子鵠言志各思念己之鵠而射之中則得父子之道橫弓卻乎儀禮決拾並夾楅見上注太守行禮韓延壽為東郡守春秋鄉射陳樂揖讓習射獲罪後漢劉琨桓公教授五百餘人每春秋鄉射常備典儀以素木瓠葉而為俎豆桑弧蓬矢以射兔首縣宰率親屬觀之王莽以琨聚徒私行大禮僣上乃繫琨及家屬莽敗乃免善射彀中射麋麗龜射則臧弓舍拔則獲弓矢既調將軍射虎以宣威大夫射雉而取笑六鈞顏高之弓六鈞三十斤為一鈞七札養由基導甲而射徹七札飲羽李廣見石以為虎射而飲其羽弦不再控矢不虛發百步穿楊葉養由基矯矢猿啼由基引弓鴈落庚嬴中九鳥羿弓不虛發李廣控弦而獸伏屬羽而鳥下貫虱心於三年穿楊葉於百步藝出常倫絶倫引猿臂控鳥號敏手支左屈右見下如拒如附射者手也發彼有的應弦李廣為將射見敵非十步之內度不中不發發則應弦而倒用此奇將兵國數辱也善息史養由基射楊葉百發百中人皆曰善有一人曰可教矣由基怒曰子必能教我曰非能教子引左屈右也夫百步中楊葉而不善息小焉氣衰力倦弓撥矢鈞一發不中百發盡息人不知晉魏舒為後將軍盧育每與參佐射常為畫籌後遇朋人不足以舒為數育初不知其善射容範間雅發無不中舉坐莫有之敵者賭牛王凱有牛名八百里駮常瑩其蹄角王濟與對射賭之凱矜恃其能令濟先射一發破的因據胡床叱左右令探心求一割便去不中禮曰射有似乎君子失諸正鵠反求諸身反求身不怨不得為諸侯天子之射謂之射侯中而得為諸侯射不中則不得為諸侯不與於祭天子射於射宮射中則與於祭不中則不與於祭不得與於祭者有讓削於地得與於祭者慶益於地進爵黜地是也故發不中則反求諸己而已矣若夫不肖之人則彼將安能以中一發不中則棄前功出征云云循聲既爽於蘩發矢遂垂於楊葉君使士射不能則辭以疾曰某有負薪之憂可教見上門善息注有負薪之憂無穿楊之妙射不主皮矜恃恃射傳若羿恃其善射不修民事而淫于原獸辰國死藝傳曰潘黨與養由基蹲甲而射之徹七札焉以示楚王曰君有二臣如此何憂於戰王怒曰太辱國詰朝爾射死藝注云賤其不尚智謀矜射力必當於死藝也羿善射不得其死焉一矢覆命楚王召養由基與之兩矢使射呂錡中項伏韜一矢復命傳孔賊不敢前丘行恭善騎射王世充戰印山流矢著太宗馬行恭回射之發無虛鏃賊不敢前射無空發張士貴虢州盧氏人彎弓百五十斤左右射無空發善騎射李客師善騎射又長孫詮有甥趙持滿者善騎射逐野馬持滿為涼州長史嘗逐野馬射之矢洞於前邊人畏伏所射皆應弦仆薛仁貴與梁建方契苾何力遇高麗大將溫沙多門戰橫山仁貴馳入所射皆應弦仆又戰石城有善射者殺官軍十餘人仁貴怒單騎突擊賊弓矢俱廢五甲射仁貴為鐵勒道總管宴內殿帝曰古善射有穿七札者卿試以五甲射焉仁貴一發洞貫帝大驚走馬射帖孫伏伽帝數出馳射伏伽諫曰臣聞天子之居禁衛九重田也警入也蹕非直尊其居處為社稷生人計也比聞陛下走馬射帖娛悅群臣殆非所以導養聖躬垂憲後代七矢斃七人馮盎羅竇諸洞獠叛詔盎率衆二萬為諸軍先鋒賊據險不可攻盎持弩語左右曰矢盡勝負可知矣發七矢斃七人賊乃退供奉仗內張孝忠天寶末以供奉仗內古先哲王莫不遞襲源乾曜遷諫議大夫景雲後公卿百官上巳九日廢射禮乾曜以謂聖王教天下必制禮以正人情古之擇士先觀射禮非取一時樂也夫射者別邪正觀德行共祭祀辟寇戎古先哲王莫不遞襲比年以來射禮不講所同吝費而舊典為虧大射謂春秋不可廢分曹習射田弘正軍中嘗分曹習射弘正注矢聯中每射破的王栖曜賊將邢超然守曹州乘城指顧栖曜曰彼可取也一矢殞之栖曜善騎射始將兵時涉寇境遇遊騎環合乃規百步立表而射每射破的虜相顧懼引去許獵近郊賈耽為東都留守故事居守不出城以耽善射優詔許獵近郊手射賊來瑱賊攻穎川手射賊皆應弦僕萬人敵李晟往事河西王忠嗣從擊吐蕃悍尊乘城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍歡奮忠嗣撫其背曰萬人敵也一日射雞兔九十五藩鎮王武俊善射嘗與賓客獵一日射雞兔九十五觀者駭伏張萬福業儒不顯乃學騎射見白鷺射中其目石雄徐州人初雄討劉稹水次見折鷺謂衆曰使吾射中其目當成功一發如言帝聞下詔褒美射冠軍中田頵傳安仁義以善射冠軍中開門斗先告所當中然後射之埋其半土中馳射之至死劉感仁杲約降感紿諾仁杲怒執感埋其半土中馳射之至死詈益甚中左目張巡欲射子琦莫能辨因剡蒿為矢中者喜謂巡矢盡走白子琦乃得其狀使霽雲射一發中左目賊還射皆披靡南霽雲巡復遣如臨淮告急引精騎三十冒圍出賊萬衆遮之霽雲左右射皆披靡射佛寺浮圖霽雲抽矢回射佛寺浮圖矢著磚曰吾破賊還必滅賀蘭此矢所以志也射賊百步內霽雲善騎射見賊百步內乃發無不應弦斃裴旻事見虎門馳射為樂吳兢帝東封泰山道中數馳射為樂神武超絶突厥黜棘連遣大臣阿史德頡利發入獻遂從封禪有詔四夷諸酋皆入仗佩弓矢會兔超馬前帝一發斃之頡利發奉兔頓首賀曰陛下神武超絶若天上則臣不知人間無有也賜弓矢射禽呂向以起居舍人從帝東巡帝引頡利發及蕃夷酋長入仗內賜弓矢射禽向上言陛下引內從官陪封禪盛禮使飛鏃於前同獲獸之樂是狎昵太過或荊卿詭動何羅竊發逼嚴蹕冒清塵縱醢單于汙穹廬何以塞責帝順納一發貫二雕高駢事朱叔明為司馬有二雕並飛駢曰我且貴當中之一發貫二雕焉衆大驚號落雕侍御射不入鐵不如不發五代景延廣父建善射嘗教延廣曰射不入鐵不如不發由是延廣以挽強見稱溢的徐敬業射必溢的酉陽雜俎志射朝野僉載督君謨善射閉目而射應口而中云志所在則中有王靈智者學其法久之曲盡其妙欲射君謨殺之君謨時無弓矢執一短刀矢來輒折末後一矢以口承之遂嚙其鏑謂靈智曰學射三年但未教汝嚙鏃法耳一發竹分唐史帝出近苑或以竹一筒值舍外見才尺許遠且百步帝屬二矢曰黨羌窮寇乃歲暴吾鄙今我約射竹中則彼當自亡不中我且索天下兵剪之終不以賊遺于孫左右注目帝一發竹分矢徹諸外左右呼萬歲張歸霸張晊矢中歸霸歸霸拔之反以射賊一發而斃飛騎正觀中揀旅力驍捷善騎射者謂之飛騎衣五色袍乘六間馬上出遊幸即從駕行矣劉餗傳記捐弓投矢江南野史劉仁贍猿臂善射發無不中一旦世宗親臨城下坐幄中觀戰士攻城仁贍自上城射之矢去御坐數步輒墜左右驚愕咸諫請少避之世宗乃曰一箭射死一天子天下寧復有天子乎遂命左右進坐於墜箭之上矢復至又遠數步而止仁贍知之因捐弓投矢謂左右曰斯乃天也非吾所能中之筈不虛彀霍王元軌詔從獵遇群豕帝使射之筈不虛彀群豕為盡帝撫其背曰爾藝過人顧今無所施方天下未定得若豈不用乎三發連中薛公達佐鳳翔會軍帥不文嘗集射設的高數十尺令曰中者酬錦與金一衆軍莫能中公達軌弓矢揖曰請為公歡射三發連中衆大呼笑帥不喜因自免去為母卜安重榮晉高祖起太原使張潁陰招重榮其母與兄皆以為不可而重榮業已許潁母兄謀共殺潁以止之重榮曰未可吾當為母卜之乃立一箭百步而射之曰石公為天子則中一發輒中又立一箭而射之曰吾為節度使則中一發又中其母兄乃許重榮以巡邊千騎叛入太原高祖即位拜重榮成德軍節度使五代史射金瓶崔仁冀父詢天成中有蕃使假道來聘仍以弧矢大誇於吳人武肅王宴之於龍山擊場酒酬因以金瓶置射堋之上命蕃使射之蕃使一發中瓶之竇武肅王命詢曰汝能賽之乎詢曰詢雖不能願假王之威德請兼觜竇以勝之遂授以親箭二一發中之竇再發中之觜蕃使慚服者久之王大悅因賜金瓶並帛器以獎之自是命諸王子皆師其射法吳越史或挂針于木或立馬鞭百步射之在達靻時從其群豪射獵或挂針于木或立馬鞭百步射之輒中群豪皆伏以為神五代莊宗紀射生子弟李寶臣善騎射嘗覘虜射六人盡殪及還為祿山射生從入朝留為射生子弟三矢殺三人薛仁貴時九姓衆十餘萬令驍騎來挑戰仁貴發三矢殺三人於是虞懾皆降慮為後患悉抗之轉討磧北擒偽葉護兄弟三人軍中歌曰將軍三箭定天山壯士長歌入漢關九姓遂衰本傳善騎射李光弼嚴毅沈果有大略幼不嬉弄善騎射又郭晞善騎射從子儀征伐有功又李懷仙守營州善騎射又王武俊甫十五善騎射侯六白周禮梓人為侯廣與崇崇高也方參分其廣而鵠居焉器以皮為之各以其侯居中三分之一也兩介與其身三下兩介半之兩介謂布可以雜持侯者上幹下幹皆謂舌或謂舌取其出而左右也侯制上廣下狹蓋取象於人張臂八尺長六尺也上網與下網出舌尋絹寸焉網所以繫侯於植者上下皆出舌一尋尋人張臂之節網謂繩絹籠網舌維持侯張皮而棲鵠則蠢以功儀禮大射曰天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕此謂獸侯燕射則張之鄉射及賓射當張采侯三正而立天子侯燕射之禮各以鄉射之禮而張此侯也又曰乃張侯下網不及地武武人迹也中人之迹一尺二寸祭侯周禮射人祭侯為位注服不氏以祭其為位服不氏受獻之祭侯之禮以酒脯醢謂司馬實爵而獻獲者於侯薦脯折俎獲者執以祭其辭曰惟若寧侯強飲強食語爾子孫諸侯百福謂爾子孫後世為諸侯儀禮司馬洗爵升賓之以降獻獲者于侯薦脯醢折俎與薦皆三祭三祭處處獲負侯中也北面拜受爵司馬拜送爵獲者執爵使人執其薦與俎從之左介設俎豆籩在西豆在東是以獻俎當其北獲者以為功也南面坐執爵祭脯醢執爵興取胏坐祭遂祭主中者若神在中侯以明之書二侯孔去殿九十步禮志射前一日張熊侯去殿九十步設乏於侯西十步北十步可以張射侯文粹歧公遺受碑轅門言言夏屋耽耽可以張射侯權德輿賓登時畢諸將備戎裝韋蘇州始建射侯詩男子本懸弧有志在四方虎符忝明命熊侯始張皇賓登時畢諸將備戎裝星飛的屢破鼓噪武更揚天子五正李善選張大侯注鄭司農曰王張五采之侯也謂天子五正諸侯三正大夫士三正以布畫取五方正也於大侯上也中曰獲下曰留上曰揚禮志千牛將軍以矢行奏中曰獲下曰留上曰揚左曰左方右曰右方注留謂矢短不及侯揚謂矢過侯左右謂矢偏不正獲者持正自乏南行當侯東行至侯負侯北面立同上皇帝射於射宮則張熊皮去殿九十步通典觀於射宮則張麋侯如親射儀同上通典中七白周禮射烏氏凡射事飾中舍算執其禮事中以盛算舍謂設算於中以持射而取之中則釋之射禮君於國射皮於樹中於郊閭中於境虎中士鹿中天子之中未聞儀禮鄉射記國中射則皮樹樹獸名國中城內也中則翿旌獲尚父白羽與朱羽楺於郊謂主皮也又王制曰在郊閭中閭中獸角似牛一角各以其物獲士鹿中翿旌以獲獲八白儀禮獲者坐而獲射者則言大獲獲得也講武田之類是以獲中為獲也舉旌以宮偃旌以商宮為君商為臣聲和律律相生獲而未釋其算獲者執旌許諾聲大絶以旌負侯而俟俟弟子取矢以旌指教之卒射釋獲者遂以所執餘獲于中西興共而俟司射復位釋獲者進遂取賢獲勝黨之算司射視算司馬又命獲者倚旌于侯中為當負侯也又命獲者執旌以負侯欲命射者見侯與旌深有志於中孔布獲者位乏東禮志射前一日布獲者位乏東東面負侯面北立禮志其日質明皇帝服武辨獲老侍旌自乏南行當侯東行至侯負侯面北立侍中一人奏稱有司請具請射司馬奉弓自西階升當西楹前南面揮弓命獲者以旌去侯西行十步北行至乏止同上千年將軍以矢行奏中曰獲下曰留同上皇帝觀射於射宮獲者位於乏東東面取矢者在獲者南俱東面將射獲者持旌南行十步當侯東行至侯負侯北面立皇帝射於射宮獲者持旌自乏南行當侯東行負侯北面立已上通典司馬奉弓自西階升當西楹前南面揮弓命獲者去侯西行十步北行至乏止同上獲者謂看矢疏密者通典算九白儀禮曰司馬去侯者許諾司馬降釋弓反位司射猶挾一箇去撲與司馬交於階前司射北面曰不貫不釋釋算也不貫不中也上射揖司射反位釋獲者坐而釋獲每一箇釋一算上射於右下射於左有餘算則反委之禮尚曲也司馬降釋弓反位命弟子委如初大夫之矢則兼束之釋獲者東面于中而坐先數右獲二算為純純全耦也一純以取實于左手十純則縮縮縱也十為蹙而委之有餘純則橫於下一算為奇奇則又縮之純下又縱之禮曰箭籌八十八十者各以十為耦為正全數其有衆禽從實也孔算籌唐孔穎達曰多算者算籌也鄉村記曰箭籌八十有尺有握握素是也多算謂勝者少算謂不物者勝飲不勝而相揖讓故曰君子之所爭也論語正義司射引王公以下皆如御前之儀射訖王公以下皆北面相對立通事舍人宣敕云射中者依算賜物不中者罰通典
