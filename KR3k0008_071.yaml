body:
  text: 卷第七十一侍中一白貂蟬之貴金貂之寵漢書曰侍中以金蟬貂冠也金取堅蟬取絜貂取溫也喉舌之司應瑗曰侍中喉舌萬機珥貂即貂冠也佩璽見漢官入侍帝帷出負國璽侍中親侍帷幄山濤為侍中親侍帷幄血湔御衣晉嵇劭為侍中王師敗百官皆奔惟劭不去被害于帝側血湔御衣及定左右欲浣之帝曰此嵇侍中血勿令去也七車漢武時張寬為侍中從行車第七車有對星之事三代漢憑魴字老孫父子兄弟三代為侍中七葉金張之家七葉為漢侍中鵔鸃漢書侍中皆冠鵔鸃戰國策秦始皇破趙得以賜侍中重席戴憑事見講論門四代晉吳郡陸仲元晉太尉玩曾孫也自玩至仲元四代為侍中時人方之金張二族也密近應劭漢官儀曰侍中周官也侍中便蕃左右與帝升降卒思近對拾遺補闕百寮之中莫密於茲也桑弘羊年十三為侍中辟強留侯子張辟強為侍中年十五從容諷諫張衡拜侍中怕居幄內從容諷諫拾遺左右漢尊儒學選在戴憑晉任忠貞事先嵇劭居金貂之貴孔門下省侍中二人正二品掌出納帝命相禮儀凡國家之務與中書令參總而顓判省事百官志自露布以上乃審其餘覆奏畫制可而授尚書省行幸則負寶而從版奏中嚴外辨還宮則請降輅解嚴皇帝齋則請就齋室將奠則奉玉幣盥則奉匜取盤酌壘水贊洗酌泛齊受虛爵進福酒皆左右其儀饗宗廟進瓚而贊酌鬱酒既祼贊酌醴齊藉田則奉耒四夷朝見則承詔勞問臨軒命使冊皇后太子則承詔降宣命慰問聘召則蒞封題發驛遣使則給魚符凡官爵廢置刑政損益授之史官既書復蒞其記注職事官六品以下進擬則審其稱否而進退之百官志武德元年改侍內曰納言三年曰侍中龍朔六年改門下省曰東臺侍中曰左相武后光宅元年曰納言垂拱元年改門下省為鸞臺開元元年曰黃門省侍中曰監天寶元年曰左相同上平治尚書省滯訟魏徵為侍中尚書省滯訟不法者詔徵平治徵素不習法但存大體處事以情人人悅服進鄭國公帝嗟其言王珪遷侍中它日進見有美人侍帝側本廬江王媛姬也帝指之曰廬江王不道賊其夫而納其室何有不亡乎珪避席曰陛下以廬江王是耶非耶帝曰殺人而取其妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡父老曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰不然郭君善善不能用惡惡而不能去所以亡今陛下知廬江之亡其姬尚在切為陛下以為是審知其非所謂知惡而不去也帝嗟美其言恐女謁用事大臣陰謀張行成遷侍中兼刑部尚書晉州地震不息帝問之對曰天陽也君象地陰也臣象君宜動臣宜靜今靜者顧動恐女謁用事大臣陰謀又諸王公主參承起居或伺間隙宜明設防閑且晉陛下本封應不虛發伏願杜未萌帝然之位上袞竇懷貞再遷侍中方太平公主干政傾已附離日視事退輒詣公第刺取所欲睿宗為金仙玉冥二公主營觀費鉅萬諫者交疏不止惟懷貞勸成之躬護役作族弟維鍌諫曰公位上袞當思獻可替否輔天子而計較尾木雜廁公匠間使海內何所瞻仰乎不荅督繕益急傳三十四諸司奏議悉心糾駁張文瓘後拜侍中兼太子賓客諸司奏議悉心糾駁故帝委之或時移疾它宰相奏事帝必問與文瓘議未若不者曰往共籌之或曰已議則皆報可傳三十八諷獵魏知古先天中為侍中從獵渭川獻詩以諷手制褒荅並賜物五十段明年封梁國公傳五十一不可以賞功張九齡范陽節度使張守珪以斬可突于功帝欲以為侍中九齡曰宰相代天治物有其人然後授不可以賞功國家之敗由官邪也帝曰假其名若何對曰名器不可假也有如平東北二虜陛下何以加之遂止請出二息補外源乾曜進位侍中建言大臣子并求京職俊又率任外官平施之道臣三息具任京師請出二息補外以示自近始詔曰乾曜身率庶僚以讓既請外其子又復下遷傳不云乎范宣子讓其下皆讓晉國之人於是大和道之或行仁豈遠哉其令文武官父子昆仲三人在京司者分任于外王是公卿子弟者皆出補列傳五十二賜妓樂奉朝請馬燧拜司徒兼侍中賜妓樂奉朝請而已與李晟皆圖像凌煙閣九年十月自來朝詔無拜時李晟已卒帝顧曰尚記與太尉晟俱來邪今乃獨見公因悲涕燧亦疾而仆帝親掖之詔左右扶去送至陛遂乞骸倚侍中如衡華蜀人見繼岌請留崇韜鎮蜀從襲等因言崇韜有異志繼岌謂崇韜曰陛下倚侍中如衡華尊之廟堂之上期以一天下而制四夷必不棄元老於蠻夷之地此事非予敢知也五代史十四賜宸扆台衡二銘馬燧事見銘門特免十死劉幽求拜侍中璽詔曰頃王室不造中宗厭代戚孽專亂將隕社稷朕與王公皆幾于難幽求處危思奮翊贊聖儲協和義士震殄元惡國家之復存繄幽求是賴厥庸茂焉朕用嘉之雖胙已土宇而賦入未廣昔西漢行封更擇多戶東京定賞復增大邑宜加賜實封二百戶子子孫孫傳國無絕特免十死銘諸鐵券以傳其功得蒲萄不食陳達叔事見蒲萄門頡利懼而走楊恭仁授黃門侍郎尋為涼州總管就加納言突厥頡利率眾數萬獵其境恭仁應機設拒張疑屯虛幟示之頡利懼而走諫金塗九鼎九鼎欲成用黃金塗之納言姚怹曰鼎者神器貴在質朴豈待塗金為符曜耶請率先百官出任刺史長安中則天嘗與宰臣議及州縣官吏納言李嶠等奏曰臣等謬膺大任不能使兵革止息倉府殷盈戶口尚有逋逃官人未免貪濁夙夜惶懼不知啟處伏思當今要務莫過富國安人富國安人之方要擇刺史竊見朝廷物議莫不重內官輕外職每除授牧伯皆再三披訴比來所遣外任多是貶累之人風俗不澄實由於此臣等請輟近侍率先具寮韋嗣立對曰臣以庸愚謬膺獎擢承之外臺庶當盡節於是帶本官撿校汴州刺史舊史真宰相韋安石知納言時二張武三思寵橫安石數折辱之會侍宴殿下易之引蜀商宋霸子等博塞后前安石跪奏商等賤類不當戲殿上顧左右引出坐皆失色后以安石辭正改容慰勉鳳閣侍郎陸元方自以為不及退告人曰韋公真宰相陛下負臣臣不負陛下珪遷侍中帝使祖孝孫以樂律授宮中音家妓不進數被讓珪與溫彥博同進曰孝孫脩謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我腹心乃附下罔上為人游說邪彥博懼謝罪珪不謝曰臣本事前宮罪當死陛下矜其性命引至樞密責以忠效今疑臣以私是陛下負臣臣不負陛下帝默然慚遂罷韓弘以功加韓弘宣武節度憲宗用兵淮西拜弘行營都統使扞兩河元濟平以功加侍中上書戒中宗中宗復位以柏彥范為侍中上書戒帝曰伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以陰承陽違天也以婦凌夫違人也違天不祥違人不義故書曰牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預外政也伏願上以社稷為重令皇后無居正殿于外朝深居宮掖修陰教以輔佐天子挺直安樂公主館第成中宗臨幸宴從官賦詩御史大夫知政事李日知卒章獨以規戒睿宗他日謂曰嚮時雖朕亦不敢諫非公挺直何能爾即拜侍中焚藁槁高儉為侍中進上詳整允有獻納縉紳皆屬以目奏議未嘗不焚槁家人無見者甚得大臣體郝處俊為侍中自參綜朝政每與上言議必引經藉多所匡益甚得大臣之體以應對舊史諫廢王后韓瑗進侍中兼太子賓客后之廢瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輒廢非社稷計不納明日復諫曰王者立后配天地象日月匹夫匹婦尚知所擇況天子乎詩云赫赫宗周褒姒滅之臣讀至此常輟卷太息不圖本朝親見此禍宗廟其不血食乎帝大怒詔引去出褚遂良貶潭州都督明年瑗上言遂良受先帝顧託一德無二向日論事至誠懇切詎肯令陛下後堯舜而塵史冊哉願寬無辜以順眾心帝曰遂良之情朕知之矣其孛戾好犯上朕責之詎有過邪瑗曰遂良社稷臣蒼蠅點白傳致有罪昔微子既去商以亡張華不死晉不及亂陛下富有四海安於清泰忽驅逐舊臣遂不省察乎帝愈不聽瑗憂憤自表歸田里不報王侍中在唐王智興魯自郡齎事赴上都宿郾城逆旅遇店婦將產見二人入智興所寢之舍驚曰徐州王侍中在此又曰所生子後五歲當以金瘡死智興志之及至期復過店問婦所生子云近因斧傷已卒矣廣記白鳳池晉荀公曾為中書監除尚書令人賀之荀曰奪我鳳凰池諸人反相賀邪雞樹中書省有雞棲樹專車之貴晉和嶠為令荀勖為監不同居嶠嫉勖邪諂先登車專席而坐不容勖又乃引使車監令異車自此始也隔座之榮吳錄紀騭為中書令父亮為尚書令每朝會帝以雲母屏風隔其坐也丞相之上應劭注中書令位在丞相之上儒宗晉賀循字彥先為中書令時朝廷凝滯皆諮焉為世儒宗同處機密晉陳淮為中書令張華為監淮與華同處機密而雅崇華每至直月有詔書無大小取先示華華了不措意華得詔書不以示准中書令二孔中書省令二人正二品掌佐天子執大政而總判省事百官志凡王言之制有七一曰冊書二曰制書三曰慰勞制書四曰發敕五曰敕旨六曰論事敕書七曰敕牒皆宣署申覆然後行焉同上置降匈奴五原塞溫彥博為中書令突厥降詔議所以安邊者彥博諸如漢置降匈奴五原塞以為扞蔽與魏證廷爭證不勝其言天子卒從之後突厥可汗弟結社謀反帝始悔有決勝帷幄定社稷功房玄齡太宗即位為中書令弟功班賞以如晦等功弟一餘皆以次敘封拜帝顧群臣曰朕論公等功定封邑恐不能盡無有諱各為朕言之淮安王神通曰義師起臣兵最先至今玄齡等以刀筆吏居第一臣未論帝曰叔父兵誠先至然未嘗躬行陣勞故建德之南兵敗不振今元齡等有決勝帷幄定社稷功此蕭何所以先諸將也列專二十寧藉多人薛元超帝嘗宴諸王召元超與從容謂曰任卿中書寧藉多人哉俄拜中書令猶知門下省長孫無忌檢校中書令猶知門下省帝欲立昭儀為后無忌固言不可許敬宗數勸長孫無忌厲色折拒列傳三十改后者請更擇貴姓褚遂良高宗將立武昭儀遂良諫曰吾奉遺詔若不盡愚無以下見先帝遂良曰先帝疾執陛下手語臣曰我兒與婦今付卿且德音在耳可遽忘之翌日復言對曰必欲改后者請更擇貴姓昭儀昔事先帝身接帷第奈天下耳目何帝羞默遂良因致笏殿階叩頭流血曰還陛下此笏丐歸田里帝大怒引出武后從帷後呼曰何不撲殺此獠諫立武后來濟遷中書撿校吏部尚書帝將以武氏為后濟諫曰王者立后以承宗廟宜擇禮義名家幽閑令淑者副四海之望稱神祗之意故文王興姒關睢之化蒙被百姓其福如彼成帝縱欲以婢為后皇統中微其禍如此惟陛下詳察問馭下所宜來濟帝嘗從容問馭下所宜濟曰昔齊桓公出遊見老人命之食曰請遺天下食遺之衣曰請遺天下衣公曰吾府庫有限而給老人曰春不奪農時即有食夏不奪蚕工即有衣由是言之省徭役馭下之宜也於時山東役丁歲別數萬人又議取庸以償雇紛然煩撓故濟得及之問天與帝異稱邢文偉為內史后御明堂詔文偉曰天帝一也制曰郊后稷以配天祀文王於明堂以配上帝奈何而一對曰先儒執論不同昊天及五方總六天帝后曰帝有六則天下同稱固矣文偉不得對中書令可一日不見天子乎王及善留拜內史及善不甚文而清正白將臨事不可奪有大臣節時二張怙寵每侍宴無人臣禮及善數裁抑之后不悅曰卿年高不宜侍遊宴但檢校閣中及善即移病餘月后不復問及善歎曰中書令可一日不見天子乎遂乞骸骨猶不許改文昌左相同鸞臺三品以中書令執政事筆裴炎改中書令舊宰相議事門下省號政事堂長孫無忌以司空房玄齡以僕射魏證以太子太師皆知門下省事至炎以中書令執政事筆故徙政事堂於中書省列傳四十二自裴度以勳德居而敏中以恩澤進白敏中加中書令自裴度以勳德居而敏中以恩澤進列傳獨不詭隨蕭至忠為侍中中書令時楚客懷姦植黨而韋巨源楊百思李嶠務自安無所弼正至忠介其間獨不詭隨時望翕然歸重帝亦曰宰相中至忠最憐我列傳四十八中書令幸二員張嘉貞初嘉貞在兵部而說已為侍郎及皆相說位其下議論無所讓故說不平說代其處嘉貞銜悔謂人曰中書令幸二員何相迫邪傳五十二中書舍人後十年為令嘉貞其始為中書舍人崔湜輕之後與議事正出其上湜驚曰此終其座後十年而為中書令校中書令考二十四郭子儀以身為天下安危者二十年校中書令考二十四詔乘輅謁太廟視事尚書省李晟張延賞當國故與晟有隙密言晟不可持兵帝感其言貞元三年帝坐宣政殿引見晟備冊禮拜太尉中書令罷其兵詔乘輅謁太廟視事尚書省賜良馬錦彩千計傳七十九賜錦袍魏元忠拜中書令當朝用事群臣莫敢望謁告上冢詔宰相諸司長官祖道上東門賜錦袍給千騎四人侍賜銀千兩及還帝為幸白馬寺迎勞之姚崇遷紫微令固辭實封乃停舊食上事鑒十章張九齡上事鑒十章號千秋金鑒錄以伸諷諭令君四俊張嘉貞所薦苗延嗣員嘉靜呂太一崔訓皆位清要日與議政事故當時語曰令君四俊苗呂崔員賜詩裴度拜中書令上巳宴曲江度不赴帝賜詩見詩門長得卿在中書舊史薛元超高宗時為中書侍郎特承恩遇嘗召入與諸王同預私讌又重其文學政理之才曾謂元超曰長得卿在中書固不藉多人自舉一人岑文本善文辭李靖薦于帝擢中書舍人時顏師古為侍郎自武德以來詔誥或大事皆所草定及得文本號善職而敏速過之或策令叢遽敕吏六七人此筆待分口占授成無遺意師古以譴罷溫彥博為請帝曰師古練時事長於文誥人少逮者幸得復用朕自舉一人公毋憂乃授文本侍郎即專典機要副貳舊史崔沔當官正色未嘗僥汨拜中書侍郎或謂沔曰今之中書皆是宰相承宣帝命侍郎雖是副貳但署位而已甚無事也沔曰不然設官分職上下相維各申所見方為濟理豈可俛默偷安而為懷祿土也自是每有制敕及曹事沔多所異同張說頗不悅出為魏州刺史白南宮故事後漢鄭弘為尚書令前後所有補益政者皆著之為南宮故事以奇才拜擢後漢張安世字子孺上幸河東亡書一篋安世曰臣識之具作其書後求得亡書相校無遺失以奇才拜擢尚書令乞留宿衛後漢尚書黃香為東郡太守乞留宿衛拜尚書令送不出郭陳蕃字仲舉為豫章守性方聳峻不接賓客徵為尚書令送者不出郭門問車駕陳嶠為尚書令魏明帝嘗陳車駕卒至尚書門嶠跪問曰陛下何之帝曰欲案文書耳嶠曰此臣職分陛下不宜臨臣不稱職請黜退帝慚而還八座晉百官名尚書令僕射六尚書為八座獨座後漢世祖詔尚書令司隸校尉中丞朝會皆專席而坐京師號為三獨座尚書令三孔尚書省尚書令一人正二品掌典領百官其制有六尚書百官志三十六凡上之逮下其制有六一曰制二曰敕三曰冊四曰令五曰教六曰符下之達上其制有三一曰關二曰刺三曰移同上詔趨詣省視事郭子儀至自涇陽恩賚崇縟進拜尚書令懇辭不聽詔趨詣省視事百官往慶敕射生五百騎執戟寵衛子儀確讓且言太宗嘗踐此官故累聖曠不員置皇太子為雍王定關東乃得授渠可猥私老臣隳大典云云帝不獲已許之具所讓付史官六十二改尚書省曰中臺龍朔二年改尚書省曰中臺廢尚書今尚書曰太常伯侍郎曰少常伯光宅元年改尚書省曰文昌臺俄曰文昌都省垂拱元年曰都臺長安三年曰中臺武德中太宗初為秦王嘗親其職自是闕不復置儀形端揆唐六典凡庶務皆會而決之白呂尚文王得呂尚以為太師成王尊為太師號曰尚父世家三周公召公為保周公為師相成王為左右書尊敬尊敬師傅漢詔曰國之將興尊師重傳詩青蓋車董卓為太師乘青蓋車三公御史大夫已下皆拜後六十二靈壽杖平帝拜孔光為太師每朝賜靈壽杖十日賜食前五十一冠三公之首為四逸之儀教事師也者教之以事而喻諸德也禮六蔚為帝師文選周寵元勳任先呂尚漢崇碩德選在孔光當至聖之朝居太師之任出則有師禮問道帝入大學承師問道大戴禮天遺文王卜畋史卜卦曰非熊非羆天遺汝師六韜布衣足矣張良曰為萬戶侯帝王師布衣足矣出世家二十五張禹以論語教授成帝前五十一赫赫師尹民具爾瞻詩孔天子所師法太師太傅太保各一人為三師三師天子所師法無所總職非其人則闕百官志三十八仰為元老馮道周太祖拜道太師兼中書令道少能矯行以取稱於世及為大臣尤務持重以鎮物事四姓十君益以舊德自處然當世之士無賢愚皆仰道為元老而喜為之稱譽五代史五十四唐制置太師以師範一人儀形四海太師官之極五代後唐天成三年詔訓導之官唐六典三師訓導之官也其名即周之三公然非道崇重則不居其位贈天寶以前唯以其官贈長孫禎武約竇毅韋玄貞張說裴光庭而已通典白周畢周成王即位周公畢公並為太傅史紀四禹彪鄧禹鄧彪並為太傅後漢三十四聽政鄧彪為太傅和帝幼百官總己聽於彪恩寵之異莫之與比後紀四撗劍趙喜為太傅皇太子諸生尊卑無別喜乃撗劍正色以正之後十六絕席禹字伯達遷太傅朝夕進食與三公九卿絕席也後三十四賜杖世祖即位卓茂以德行見求時年七十餘拜太傅賜几杖後十五奪服奪服以母憂自乞聽以太傅行喪三年詔賜牛酒奪服後二十七嗜鮑魚賈誼曰文王使太公望傅太子發嗜鮑魚太公不與文王曰何以不與公曰禮鮑魚不登于俎豈有非禮而養太子哉王陵王陵為太傅漢書周寵元勳任光呂尚漢崇碩德選在王陵乘輿鍾隸事見上注陳蕃靈帝策時以陳蕃為太傅後五十六臨軒懸樂見三公門孔傳之德義通典太傅古官注云傳傳之德義也杜重威檢校太師守太傅白召公召公為保書贈刀見三公注賜絹咸寧二年制故太保王祥司空王基各賜絹五百匹晉錄云保也者慎其身以輔翼之而歸諸道者也禮六當垂拱之代居論道之司輔翼見上入則有保禮闕朝王祥自休徵為太保中丞侯光上言祥久疾闕朝會詔曰太保所毗倚以隆道引理非有司所得議晉三周寵元勳任先邵奭晉推碩德選在王祥孔止李順節班見百官孔緯進兼太保時天武都頭李順節疏暴人也以浙西節度使兼平章事臺吏白已謝當班見百官緯判止之明日順節盛服至則無班怏怏去它日見緯以為言緯曰固疑公見望也且百辟卿士天子廷臣班見宰相以宰相為之長公提天武健兒據堂授禮安乎子欲用之去都頭乃可順節慚縮不敢言列傳八十八竇季謀天寶以前唯以其官贈竇季謀一人而已通典即其家拜五代趙光逢以司徒致仕天成中即其家拜太保封齊國公白秦官太尉秦官掌武事漢書掌罰郊社太尉掌四方兵事行掌罰郊社之事百官志張禹在位三世忠孝彌篤牟融典職六年勤勞不息雲屏永和五年鄭弘代鄧彪為太尉舉第五倫為司空每正朝見弘曲躬自卑帝知致雲毋屏風分隔其間後二十三錦被朱寵為太尉食脫粟飯布被上賜錦被肉米不取之布被李固常蓋布被所食麥飯麤飯司馬包為太尉常食麤飯厚重周勃為太尉為人厚重安劉高祖曰周勃厚重少文能劉安者必勃也可使為太尉貞廉楊秉貞廉曰我有三不惑為太尉四世楊震秉賜彪四世為太尉讓位陳蕃拜太尉讓於胡廣王楊等臨朝歎曰黃憲在吾不敢先佩印綬漢寵元勳任先周勃晉尊碩德選在王祥不通州縣書王寵為太尉在位非公事不通州縣書其所辟命皆是海內之長者父來張酺為太尉父尚在酺每一遷轉乃一到洛父來適會正臘公卿罷朝俱賀奉酒上有極歡人莫不榮之禮錢太尉劉虞讓位於羊士靈帝為三公皆輸禮錢千萬有舉縕袍示之曰臣有唯此而已遂不拜輸西園曹嵩靈帝時貨賂中官及輸西園一萬億故位至太尉也臨軒懸樂見上注辭劉寔拜太尉自陳年老固辭上不許賜几杖宅一區不朝太尉七孔唐興太尉惟七人李德裕策功拜太尉進封趙國公德裕固讓言唐興太尉惟七人尚父子儀乃不敢拜近王智興李不義皆超拜保傳蓋惜重此官裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公毋固辭列傳一百五毛髮森豎宣宗即位德裕奉冊太極殿帝退謂左右曰向行事近我者非太尉邪每顧我毛髮為森豎即日罷為檢校司徒荊南節度使秦王兼之武德初秦王兼之永徽中無忌為之唐六典注錄尚書續漢書曰帝初即位置太尉錄尚書乘輿上殿魏華歆事見三公門白祈父大司馬見詩傳睢鳩傳曰少昊氏以鳥名官睢鳩氏司馬也注云王睢也鷙而有別故命為司馬以主法制統六師尚書司馬統六師平邦國注云夏官卿也主戎馬之事掌國征伐統正六軍治邦國之亂田苴立功史記晏子薦田苴曰文能附眾武能卻敵乃為大司馬立大功景舍辭賞景舍為大司馬伐蔡有功楚王賞之舍辭不受司武宋司馬名周用呂尚太公望為司馬漢寵霍光光為司馬秉政十三年百姓充實兼領尚書注云成王之時畢公為三公兼領司馬職穰苴桓溫並為司馬九法黃帝時常以為大司馬掌建邦之九法也周任元勳寵崇呂尚漢推大節選在霍光當歸馬之朝雖云無事然睢鳩之職用備不虞均萬人周禮司馬掌邦典政以平邦國以正百官以均萬人白周書薄為農父農父司徒也公近也違統也言司徒之職所以親近化擾於兆民以成乎其教也父子緇衣鄭武公父子並為周司徒善於其職國人美之為賦緇衣以明有國善善之功也詩曰緇衣之宜兮敝予又改為兮祝鳩傳少昊氏以鳥名官祝鳩氏司徒也注云祝鳩孝故司徒也主教民也掌邦教書曰司徒掌邦教敷五典擾兆民注地官也主五常之教以安人也敬敷五教帝曰契百姓不親五品不訓汝作司徒敬敷五教在寬云云契為司徒而民成民成知五教之法六禮七教八政禮曰司徒修六禮以節民性明七教以興民德齊八政以防民淫一道德以同風俗芮伯書成王以芮伯為司徒君牙書穆王命君牙作周大司徒曰弘敷五典式和人則地官掌土地之圖周禮乃立地官大司徒之職掌建邦之土地之圖與其民人之數佐王安擾邦國儉後漢儉寬為司徒臥布被又華歆為司徒以祿賜故人親戚帝聞歎曰司徒國之老乃蔬食布衣又王良妻布裙曳柴吏鮑恢不識知乃歎之夢吳錄丁固夢松生腹上占者曰松字十八公也後十八年果為三公讓蔡謨字道明遷司徒固讓親舊曰我若作司徒將為後世所嗤義不敢邪詔書數下辭之樂劍晉王導受遺詔輔幼主加葆用鼓吹及班劍冕服安帝詔侍中太常領司徒可袞冕服綠盭綬羽葆鼓吹也小車晉王戎為司徒委事長吏時乘小車而乃以手抻腰使望門而出入久不知其是台司漢用元勳任崇鄧禹晉推碩德選在山濤況當至理之朝宜重薄違之任當歸馬之代居祝融之官教典周禮司徒掌邦教典以安邦國以教官府擾兆民孔謹奉詔長孫無忌太子承乾廢帝欲立晉王未決坐兩儀殿群臣已罷獨留無忌元齡勣言東宮事因曰我三子一弟未知所立吾心無仰即投床取佩刀目向無忌等敬爭抱持奪刀授晉王而請帝所欲立帝曰我欲立晉王無忌曰謹奉詔異議者斬帝顧王曰舅許汝矣宜即謝王乃拜傳三十國家再造郭子儀收東都於是河東河西河南州縣悉平以功加司徒封代國公食邑千戶入朝帝遣具軍容迎灞上勞之曰國家再造卿力也子儀頓首謝傳六十二李晟收長安李晟至梁帝感泣群臣上壽且言晟蕩夷凶憝而市不易廛宗廟不震長安之人不識旂鼓雖三代用師不能加之帝曰天生晟為社稷萬人豈獨朕哉拜晟司徒兼中書令實封千戶傳七十九中人不朝服孔緯加司徒帝將郊見中尉樞密使索宰相朝服有司白中人無衣冠助祭中尉怒責禮官必得緯言中人不朝服國典也陛下欲假借之則請以所兼官為之服諫官固執帝召謂曰方舉大禮為我容之列傳八十八百官志司徒一人唐史品秩章服皆同太尉唐六典隋置司徒皇朝因之歷代品秩章服皆同太尉復為三公通典隋及大唐復為三公司空十白周禮若保宏父定辟若順也保安也宏父司空也辟君也言能順安司空之職而任之以定君臣之道也掌邦土書司空掌邦土居四民時地利注冬官卿也主國土以居民也士農工商四民使順天時分地利授之以土鳲鳩傳少昊以鳥名官鳲鳩氏司空也注云鳲鳩平均故為司空平水土平水土舜命伯禹作司空帝曰咨禹汝平水土惟時懋哉懋勉也典職六年後漢牟融為司空數有忠言章帝冊曰司空典職六年特加太尉兼領書成王時毛伯為三公兼領司空職歸免漢彭宣為司空王莽傳權宣乃上書乞骸骨上印綬歸鄉又後漢第五倫為司空自陳老病乞歸帝詔以二千石奉終又東觀漢記宗堪為司空十四年歸印綬賜千石奉終兼總二官張華以中書監兼司空辭官徐邈為司空歎曰三公論道之官無其人則闕安以老病參之固辭不拜及沒後制賜故司空邈榖二千石錢四十萬臨軒懸樂見三公門受規陸玩字上瑤既拜司空有人詣之索酒杯瀉置柱樑之間祝曰當今之材以為柱石莫傾人梁棟耶玩笑曰感卿良箴既而歎謂客曰以我為三公是天下無人談者以為知言當歸馬之朝奉嗚鳩之職事典周禮司空掌事典以平邦國以經百官以生萬人以讖命官後漢王梁君嚴世祖即位以赤伏符曰三梁主衛作玄武玄武水神司空冰上之官遂擢梁為大司空孔仍總朝政房元齡進司空仍總朝政固辭帝遣使謂曰遜誠美德也然國家相眷賴久一日去良弼如亡左右手顧公筋力未衰毋多辭列傳二十以外戚位三公長孫無忌進冊司空知門下尚書省事無忌辭又因高士廉口陳以外戚位三公嫌議者謂天子以私后家帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徵不棄也詔曰黃帝得力牧為五帝先夏禹得咎繇為三王祖齊威得管仲為互伯長朕得公遂定天下公其勿遜列傳三十自唐以來無特拜者馬胤孫時馮道拜司空司空自唐以來無特拜者有司不知故事朝廷議者紛然或曰司空三公宰相職也當參為大政而宰相盧文紀獨以為司空之職祭祀掃除而已胤孫皆不能決員外郎一人直第裴寂策司空遣尚書員外郎一人每日更直寂第其為崇貴如此太宗祠南郊命寂與長孫無忌同昇金輅寂辭讓太宗曰以公有佐命之勳無忌亦宣力於朕同載參乘非公而誰遂同乘而歸至親亦不虛授長孫無忌策拜司空固辭不許太宗曰朕之授官必擇才行若才行不至縱朕至親亦不虛授舊史三公不居宰輔王思禮代李光弼為河東節度副大使從平祿山收東京上元元年加司空自武德以來三公不居宰輔惟思禮而已楊國忠天寶十三載冊拜楊國忠為司空其日雨止通典白拜於床下漢成帝拜張禹少子於床下為黃門侍郎恥同列魏夏侯玄為黃門侍郎與皇后弟毛曾同坐玄恥之明帝恨之左遷羽林監張華字茂先為黃門侍郎博覽圖藉四海之內若指掌千門萬戶畫地而成門下侍郎十一孔門下侍郎二人正三品掌貳侍中之職百官志三十七龍朔二年改黃門侍郎曰東臺侍郎武后垂拱元年曰鸞臺侍郎天寶元年曰門下侍郎乾光元年曰黃門侍郎大歷二年復舊同上參知機務薛稷遷黃門侍郎參知機務與崔日用數爭事帝前罷兄弟對管華近溫大雅弟彥博大雅遷黃門侍郎彥博亦為中書侍郎兄弟對管革近帝嘗從容曰我起晉陽為卿一門爾制敕不便輒駁正李乂改黃門侍郎制敕不便輒駁正貴幸有求官者睿宗曰朕非有靳故李乂不可過爾傳四十四奉身纔一布囊盧懷慎束帶至晚未嘗休偃崔元綜長壽中遷鸞臺侍郎勤於政事每在中書必束帶至晚未嘗休偃諫修蓬萊宮張文瓘為東臺侍郎時造蓬萊上陽合璧等宮文瓘因進諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宮室使士崩瓦解戶口減半臣聞制化於未亂保邦于未危其弊不去必構禍難商鑒不遠近在清朝臣願稍安撫之無使生怨帝深納其言士可殺不可辱張廷珪遷黃門侍郎監察御史蔣挺以監決杖刑稍輕朝堂杖之廷珪奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖士可殺不可辱也議者以廷珪之言為是也並舊史白畫餅魏明帝詔舉中書侍郎為吏部尚書盧毓曰得人與不在盧生耳舉選莫取名名如畫作餅不可啖毓舉韓暨敦篤至行帝乃用之又裴潛風神高邁為中書侍郎出入禁門見者皆肅然改容監令同車見上令門注中書侍郎十二孔侍郎二人正三品掌貳令之職朝廷大政參議焉百官志品第四特豫宴于志寧為中書侍郎太宗嘗宴近臣問志寧豫宴安在有司奏敕召三品志寧品第四帝悟特詔豫宴犯吾鱗裡闕失杜正倫進中書侍郎與韋挺虞世南姚思廉論事稱旨帝設宴具召四人者謂曰我聞神龍可擾以馴然頷有逆鱗嬰者死人君亦有之卿屬遂犯吾鱗裨闕失朕其慮危亡哉思卿至意故舉酒以相樂也各賜帛有差忠勤見表崔知悌與載至德郝處俊等同賜飛白贊而知悌以忠勤見表執政久明習故事文辭詔敕多出其手郭正一問所以制戎者郭正一傳劉審禮與吐蕃戰大敗高宗詔群公問所以制戎者正一曰吐蕃曠年梗寇師數出坐費糧資近計則瘞威深入則莫得其巢穴今上策莫如少募兵且明烽堠勿事侵擾須數年之遲力有餘人思戰一舉可破矣帝納之遼東周箕子國溫彥博遷侍郎高麗貢方物高祖欲讓而不臣彥博執不可曰遼東本周箕子國漢玄菟郡不使北面則四夷何所瞻仰帝納而止詔令叢繁裁可占授少選可待也劉禕之擢中書侍郎同三品是時詔令叢繁禕之思致華敏裁可占授少選可待也列傳四十三以諂佞取容王琚始為中書侍郎母居洛陽來京師讓琚曰爾家上世皆州縣職今汝無攻城野戰勞以諂佞取容海內切齒吾恐汝家墳墓無人復掃降也琚卒不免傳四十六美官蘇頲起為工部侍郎帝問宰相有自工部侍郎得中書侍郎乎對曰陛下任賢惟所命何資之計乃詔以頲為中書侍郎帝勞曰方美官缺每欲用卿然宰相議遂無及者朕為卿恨傳五十諫東西兩朋郝處俊為中書侍郎高宗御殿觀酺時京城四縣及太常音樂分為東西兩朋帝令雍王賢為東朋周王潭為西朋務以角勝為樂處俊諫曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當須惟多讓美相敬如一今忽分為二朋遞相誇競非所以道仁義示和睦也高宗矍然曰卿之遠識非眾人所及中樞白居易除裴坦中書侍郎制宜登中樞以副僉望白端揆之司僕射樞機之重晉紀武帝詔曰侍中羊祜秉德清而處腹心之任始總樞機之重加左僕射祜字叔子贊治道謝安為僕射制曰尚書內贊治道統留事魏志徐宣左僕射加侍中車駕幸許昌宣總留事帝還主司奏呈文書帝曰吾與僕射何異也暮出顧和字君孝為僕射以母老辭制書屢不特聽暮出朝還其優遇如此不朝何澄字君玄以腳疾制聽坐家視事三日世說周顗為左僕射深識危亂常飲酒醉三日不醒時人謂之三日僕射墮車王常為僕射常墮車時人謂之墮車僕射魏尊碩德選在徐宣晉寵元勳選在任光羊祜左揆右揆左右僕射左右百官表建安中以執金吾榮邵為尚書左僕射僕射有左右自此始也山濤清虛晉以山濤清虛恬簡轉為左僕射僕射領選齊職儀曰魏朝以尚書僕射毛玠領選曹晉以僕射山濤領吏部後依擬至今或領焉僕射十三孔各一人從二品掌統理六官為今之貳令闕則總省事劾御史糾不當百官志三十七龍朔二年改左右僕射曰左右匡政光宅元年曰文昌左右相開元元年曰左右丞相天寶元年復同上尚食日給御膳裴寂拜尚書右僕射賜服玩不貲詔視朝必引與同坐入閣則延臥內言無不從呼為裴監不名也貴震當世列傳十約天下已定許上印綬寂遷左僕射帝置酒含章殿歡甚寂頓首曰始陛下發太原約天下已定許上印綬今四海妥安願賜骸骨歸田里帝泣下曰未也要當相與老爾公為宗臣我為太上皇逍遙晚歲不亦善乎不以私害義屈突通判俠東道行臺左僕射從討王世充時通二子在洛帝曰今以東略屬公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死許國今日之行正當先驅二兒死自其分終不以私害義帝太息曰烈士徇節吾今見之上疏辭疾劉仁軌拜左僕射太孫廢仁軌專知留守事上疏辭疾因陳呂后祿產禍敗事以規后傳三十三大事闕僕射房元齡進尚書左僕射帝曰公為僕射當助朕廣耳目訪賢才此聞閱牒訟日數百豈暇求人哉乃敕細務屬左右丞大事闕僕射共筦朝政杜如晦進位尚書右僕射仍領選與房元齡共筦朝政引士賢者下不肖咸得職當時浩然歸重以令僕委載胄會僕射蕭瑀免帝謂胄曰尚書總國網維失一事天下有受其弊者今以令僕委卿胄明敏長於操決無宿疑議者美其振職武德以來殆無其輩解事僕射戴至德遷尚書右僕射時劉仁軌為左人有所訴率優容之至德乃詰究本末理直者密為奏終不顯私恩由是當時多稱仁軌號解事僕射嘗更日聽訟有嫗詣省至德已取牒嫗乃復取曰初以為解事僕射今乃非是至德笑而還之人伏其長者或以問至德荅曰慶賞刑罰人主之柄為臣豈得與人主爭也帝知歎美至本省具朝服劍佩裴耀卿天實初進尚書左僕射俄改右僕射而李林甫代之上曰林甫至本省具朝服劍佩博士導郎官唱接禮畢就耀卿聽事乃常服以贊者主事導唱林甫驚曰班爵與公同而禮數異何也耀卿曰比苦眩不堪重衣又郎博士紛泊非病士所宜林甫默然慚不荅四品官拜李程再為僕射先是元和長慶時僕射視事百官皆賀四品以下官荅拜大和四年詔不荅拜王涯竇易直行之自如程循其故不自安言諸朝御史中丞李漢謂不荅于禮太重文宗不許聽用太和詔書議者不善知選聽就第注官裴遵慶以右僕射復知選事朝廷優其老聽就第注官時以為榮傳六十五檢校右僕射宰相百官送至省田神功大后二年來朝檢校右僕射詔宰相百官送省傳十九師長百僚劉宴常袞執政忌宴有公望乃言晏舊德當師長百僚用左僕射實欲奪其權帝以計務方詔以僕射領使如舊傳七十四自用隔品致恭竇易直檢校尚書右僕射易直以公潔自喜方執政未嘗引用親黨初元和中鄭餘慶議僕射上儀不與膈品官亢禮易直為中丞奏駁之及為僕射乃自用膈品致恭為時鄙笑傳七十六望冠一時李絳寶歷初拜尚書左僕射絳偉儀質以直道進退望冠一時賢不肖太分屢為讒邪所中傳七十七以宿德進鄭餘慶遷左僕射比非其人及餘慶以宿德進公論浩然歸重傳九十賦朝天行以獻張建封檢校尚書右僕射十三年來朝帝不待日召見延英殿詔會朝赴大夫班以示殊寵建封賦朝天行以獻帝眷遇異等賜名馬珍具傳八十三交騎不避王璠拜御史中丞璠挾所持頗橫恣道直僕射李絳交騎不避傳一百四位次三公陳夷行進位尚書左僕射與崔珙俱拜乃奏僕射始視事受四品官拜無著令且開元元年以左右僕射為左右丞相位次三公三公上日荅拜而僕射受之非是望敕所司約三公上儀著定令詔可始累朝紛議不決至夷行逐定檢校官重則從其班令狐楚檢校尚書右僕射故事檢校官重則從其班楚以吏部自有品固辭有詔嘉允賜靈壽杖李靖遷尚書右僕射每參議恂恂似不能言以沉厚稱懇乞骸骨加賜靈壽杖辭旨疏躁蕭瑀遷左僕射正觀初房元齡杜如晦新得君事任稍分瑀不能無少望乘罅切詆辭旨疏躁太常怒廢于家固辭蕭俛自謂輔政淺固辭僕射換吏部尚書右避選事徙兵部上日唱授按送印皆尚書郎為之裴均元和三年入為尚書右僕射上日唱授按送印皆尚書郎為之文武四品五品郎官御史拜延下御史中丞左右丞升階荅拜時以為禮太重三世居此官高儉遷右僕射儉三世居此官世榮其貴太宗幸洛陽太子監國命儉攝少師手詔曰端拱三川不憂關中者以屬卿也久之請致仕聽解僕射性豪移裴冕三拜性豪侈既素貴輿服食飲皆光麗珍豐櫪馬直數百金者常十數每廣會賓客不能名其饌自製巾予工甚人爭效之號僕射巾封倫議事輒變易封倫太宗立拜右僕射始倫之歸蕭瑀數薦之及是瑀為左僕射每議事倫初堅定至帝前輒變易由是有隙貞觀元年感疾臥尚書省帝親臨視命尚輩送還第師長庶官寶歷中左僕射李絳與御史中丞王璠相遇於道車不為之卻因上言故事云左右僕射師長庶官開元時以為左右丞相其後雖去三事機務猶總百司之權表狀之中不書其姓尚書以下每日合衙上日百寮列班宰相送上中丞御史列位于庭禮數之崇中外特異所以自武德貞觀以來聖君賢臣布政除弊不革此禮謂為合宜苟有不安尋亦合廢近年緣有才不當位恩加特拜者遂從權便不用舊儀酌於群情事實未當今或有僕射初除就中丞院門相見者即與就參何殊中丞新受亦無見僕射處憲度乖宜乃罷璠除拜必加同中書門下平章事貞觀末除拜僕射必加同中書門下平章事及參知機務等名方為宰相不然則否然為僕射者亦無不加焉至開元以來則罕有加者通典天寶元年議曰按僕射秦官其名則微其職甚細東漢以後雖委任漸重職司會府而非師長之職也今尚書令總領眾務舉特綱目僕射貳之誠為崇重且非統國政宰天下之任安有僕射因改丞相之名都無丞相之實而為百寮師長也又與丞郎絕禮若不隔品致敬則諸司長官與隔品寮屬其可絕禮乎斯不然矣同上左揆元積加陳楚左僕射制加之左揆以盛中權端揆同上授韋皋左僕射制罷去職勞正名端揆端右同上授李絳右僕射兼兵部尚書制端右可以旁綏於戎政右揆白居易加程執恭右僕射制特升右揆俾壯中權即其家拜韓文檢校左僕射劉公墓銘昌裔拜陳州刺史兩界桑葉交跡就拜尚書右僕射得病視政不時請去職即其家拜檢校左僕射封郎必居此座封德彝之少也僕射楊素見而奇之遂妻與姪女常撫座曰封郎必居此座後討遼東封公船沒眾皆謂死楊素曰封郎當得僕射此未必死使人求之封公抱得一板泛沒於大海中力盡欲放之忽憶楊公之言復勉力持之胸前為板所摩擊肉破至骨眾接救得之後果官至僕射見定命錄第一人李揆德宗幸山南用揆為入蕃會盟使拜尚書左僕射揆辭老恐死道路不能達命帝惻然杞曰和戎者當練朝廷事非揆不可異時年少揆者不敢辭揆至蕃酋長曰聞唐有第一人李揆公是否揆畏留因紿之曰彼李揆安肯來耶尚書改僕射為遷舊史楊志誠檢校工部尚書知節度事七年轉檢校吏部尚書詔下進奏官徐迪詣中書白宰相曰軍中不識朝廷體位只知自尚書改僕射為遷何知工部轉吏部為美且軍事盛飾以待新恩一旦復為尚書軍中必慚今中使往被其勢恐不得出及使至其傔奔還奏曰楊志誠怒不得僕射三軍亦有怨言志誠遣將王文穎謝恩並讓官復賜官告批荅文穎不受而歸朝廷納裴度言務以含垢下詔諭之因再遣使加尚書右僕射一門三僕射左僕射韋安石三從兄待價右僕射從姪巨源右僕射一門三僕射衣冠之盛無以加也西京雜記專以錢穀進王播大和元年入朝拜左僕射復輔政累封太原郡公時韋處厚當國以獻替自任天子嚮之播專以錢穀進不甚與事居位四年僕射不知政事自武德至長慶四年已前僕射並是正宰相神龍初豆盧欽望為僕射不帶同中書門下三品不敢參議政事後加知軍國事韋安石為僕射東都留守不帶同三品自後僕射不知政事矣唐新語寵待之禮當時無儔李玨牛僧儒碑公東都留守俄以左僕射召王人就賜官告特明異禮公一對而歸不詣相第又加相印出為漢南節度使制出上悔之欲追成命公固辭出都門特賜清廟六器宣曰以卿精忠用以貺別寵待之禮當時無儔樞密十四孔梁之崇政使乃唐樞密之職蓋出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問參謀議于中則有之未始專行事於外也史權侔宰相至崇韜重誨為之始復唐樞密之名然權侔於宰相矣同上武事任樞密後世因之遂分為二文事任宰相武事任樞密樞密之任既重而宰相自此失其職也機密之任安重誨郭崇韜不欲馬紹宏在己上初崇韜與宦者馬紹宏俱為中門使而紹宏位在上莊宗即位二人當為樞密使而韜不欲馬紹宏在己上乃以張居翰為樞密使紹宏為宣徽使事無巨細一以委之桑維翰拜中書令復為樞密使事無巨細一以委之數月之間百度寖理晉臣傳詔書救千人濫死唐張居翰掖庭令張從玫之養子同光中為樞密使偽蜀王衍既降詔遷其族於洛陽行及川秦時關東已亂莊宗慮衍為變遣中官馳騎齎詔殺之詔王衍一行並宜殺戮其詔己經書時居翰在密地覆視其詔乃揩去行字改為家字及衍就戮於秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰力也孔正四品左丞一人正四品上右丞一人正四品下百官司志掌辨六官之儀糾正省內劾御史舉不當者吏部戶部禮部左丞總焉兵部刑部工部右丞總焉同上龍朔元年改左右丞曰左右肅機同上判訴牒楊昉為肅機化及子訴治先蔭昉方食未即判遽曰肅機而未食庸知天下有冤而求食乎昉怒取牒書曰父弒隋主子訴隋資可乎人服其敏示四方盛德張行成檢校尚書左丞是時帝幸靈州詔皇太子從行成諫曰皇太子宜留監國對百寮日決庶務既為京師重且示四方盛德帝以為忠遷侍中在職修舉馮元常歷尚書左丞嘗密諫帝中宮權重宜少抑帝雖置其計而內然之由是為武后所惡元常在職脩舉識覽澄遠帝委遇特厚傳三十六振明綱轄韋思謙累尚書左丞能振明綱轄朝廷肅然進御史大夫三世居韋濟天寶中授左丞凡三世居之傳四十一郎吏肅然望風脩整韋洪景拜尚書左丞駁正吏銓所除六十餘官不當進資於是鄭絪丁公著楊嗣復皆奪俸郎吏肅然望風脩整時重其有守裴苦遷尚書右丞時李巽以兵部尚書領鹽鐵將遷使局就本曹經創已半會佶至以為不可巽雖怙恩而羌猶撒之時重其有守本傳不置僕射宇文融祖節貞觀中為尚書右丞謹幹自將江夏王道宗以事請節節以聞太宗喜賚絹二百勞之曰朕比不置僕射正以公在省耳傳五十九趙璟堪此璟拜給事中咸安公主降回紇詔關播為使而璟以御史中丞副之異時使者多私貴以市馬規利入獨璟不然使未還尚書右丞缺帝曰趙璟堪此遂以命之傳七十五士大夫壯其節董晉改尚書左丞是時右丞元琇為韓滉排迮得罪滉勢振朝廷晉見宰相誦元琇非罪士大夫壯其節傳七十六建言有司斷獄必刑部審覆徐浩右丞言故事有司斷獄必刑部審覆自李林甫楊國忠當國專作威福許有司就宰相府斷事尚書以下未省即署乖謹恤意請如故便詔可故詳復自此始正直朕所自知趙涓治衢不為觀察使所容奏免官帝見其名問宰相曰是豈永泰時御史乎對曰然詔拜尚書左丞既至勞之曰卿正直朕所自知乃以罪聞不信也恭謹不去位錢徽召拜尚書左丞會宣墨麻群臣在廷方大寒稍稍引避徽素恭謹不去位久而仆因告老不許用清察稱崔善為累尚書左丞用清察稱諸曹吏惡之以其短而傴嘲曰曲如鉤列封侯欲沮罷所任帝聞勉之曰昔齊末姦吏歌斛律明月而高緯暗不察至滅其家朕雖不德幸免是因下令購謗者謗乃止特詔賜錢戴胄遷尚書左丞矜其貧特詔賜錢十萬健于職劉洎拜尚書右丞相健于職於是尚書復始如徵時上言郎官不可賞能吏韋溫遷尚書右丞鹽鐵推官姚勖按大獄帝以為能擢職方員外郎將趍省溫使止之即上言郎官清選不可賞能吏帝命中人諭送溫執議不移詔改勖檢校禮部郎中振舉綱目略無留事韋仁約儀鳳四年除尚書左丞仁約奏曰陛下為官擇人無其人則闕今不惜美錦令臣製之此陛下知之深矣微臣盡命之日矣振舉綱目略無留事群曹肅然通典左綱右轄白居易庾承宣尚書右丞制昔我太宗皇帝嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴胄魏證及杜正倫劉洎輩繼領是職分居左右官脩事理人于今稱之故吾前命佳從持左綱今命承宣操右轄眾口藉藉頗為得人樞轄六曹同上孔揆授尚書左丞制尚書丞掌決百事樞轄六曹晉魏已還右卑於左椎有立者可以糾吏惟無瑕者可以律人
