body:
  text: 卷第四十六白讞平天下獄朱博遷廷尉職當讞平天下獄恐為官屬所誣謂掾吏曰本起武吏不通法律然三尺律人事出其中諸君試取吏議難知者來為諸君覆之乃為平處十中八九吏大驚異議驚乘輿張釋之為廷尉上行中渭橋有人行從橋下走誤驚乘輿釋之奏犯蹕罰金上怒其輕釋之曰法者天下所公共其時上誅則已既付廷尉廷尉天下之平用法一傾人安所措議盜環又有盜高廟坐前玉環奏棄市上怒令族之釋之曰如盜長陵一柸土何以加於法乎傳命誤後漢兄弟共殺人帝以兄不訓弟報兄重常侍孫章宣詔誤言兩報重尚書奏矯詔當斬郭躬有曰法故誤傳命誤當罰金帝曰疑其故也躬白曰君子不逆詐帝曰善爭死上讞張儉元節亡投孔融兄褒褒不在融匿之事發並收褒融爭死問母曰家事當在長妾合當辜一門爭死郡不能決乃上讞詔坐褒讞不當不罪景詔曰獄重事也人有愚智有令讞而後不當讞者不為失信欲令務先寬也心不厭景前詔曰疑獄雖文致於法而於人心不厭者輒讞之再卻廷尉張湯有疑奏已再卻矣倪寬為言其意因使寬為奏成讀之皆伏寬所奏即得可上曰前奏非俗吏之所為也移讞讞疑也讞于公禮獄成有司讞于公奏讞掾張湯舉倪寬為云云孔衣冠蒙更生李峴初東京平陳希烈等數百人待罪議者將悉抵死崔器等附致深文峴獨曰法有首有從有重有輕若一切論死非陛下與天下惟新意且羯胡亂常誰不凌污衣冠奔亡各顧其生可盡責耶陛下之親戚勳舊子若孫一日皆血鈇砧尚為仁恕哉衣冠蒙更生例不覆讞嚴郢字漢敖曰京師天下聚論徒者至廣例不覆讞今若悉待報有司斷決有程月不啻五千獄正恐牒案填委章程紊撓獄當與衆共魏謨中尉仇士良輔妖民賀蘭進興及黨與治軍中反狀具帝自臨問詔命斬囚以徇御史中丞高元裕建言獄當與衆共之刑部大理法官也決獄不與知律令謂何請歸有司未報謨上言事繫軍即推軍中如齊民宜付縣今獄不在有司法有輕重何從而知帝停決狀讞李日知歷同刑丞時法令嚴吏爭為酷日知獨平寬無文致嘗免一囚死少卿胡元禮執不可曰吾不去曹囚無生理日知曰僕不去曹囚無死法皆以狀讞而後用日知議詳讞韋弘景吏部員外郎楊虞卿以纍下吏詔弘景與御史詳讞科條叢繁王播進刑部侍郎是時天下多故大理議讞科條叢繁播悉置格律坐隅慷慨論正孔戣字君嚴改給事中江西觀察使李少和坐贓獄寢不下博陵崔易簡殺從父兄鞠獄其京兆尹左右之翻其情戣慷慨論正貶少和殺易簡奪尹三月俸議斧陵柏狄仁傑左威衛大將軍權善才右監門中郎將范懷義坐誤斧昭陵柏罪當免高宗詔誅之仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜高廟玉環文帝欲當之族長釋之廷諍曰假令取長陵一柸土何以加其法於是罪止棄市陛下之法在象魏固有差等犯不致死而致之死何哉今誤伐一柏殺二臣後世謂陛下為何如主帝意解遂免死論顏餘慶徐有功時博州刺史王沖責息餞于貴卿遣家奴督斂與尉顏餘慶相聞知奴自市弓矢還會沖坐逆誅魏州人告餘慶豫沖謀魏元忠謂餘慶為沖督償通書合謀明甚非曰支黨請誅死藉其家詔可有功曰永昌赦令與虺貞同惡魁首已伏誅支黨未發者原之餘慶赦後被言是謂支黨今以支為首是以生入死赦而復罪不如勿赦生而不殺不如勿生切謂朝廷不當爾后怒曰何謂魁首有功答曰魁者大帥首者元謀后曰餘慶安和不為魁首答曰若魁首者虺貞是巳既已伏誅餘慶今方論罪非支黨何后意解乃曰公更思之遂免死當此時左右衛仗在廷陛數百人皆縮頂不敢息而有功言定氣詳截然不撓受賕當死蕭齡之任廣州都督受賕當死詔群臣議請戮於朝唐臨建言群臣不知陛下議之之意在律王族戮於隱議親也刑不上大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異于它囚故議之有司又令入死不可為後世法帝然之齡之齊高帝五世孫由是免死唐臨字本德置笏在陛崔玄亮右散騎常侍字晦叔鄭注誣宋申錫捕逮倉卒內外震駭玄亮率諫宮叩延英苦諍反覆數百言文宗末諭置笏在陛曰孟子有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之乃置於法令今殺一凡庶尚稽典律況欲誅宰相乎臣為陛下惜天下法不為申錫言也帝感悟覆奏張蘊古除大理丞初河內人李好德素有風疾而語涉妄妖蘊古究其獄稱好德癲疾有懲法不當坐御史權萬紀劾蘊古情在阿縱奏事不實太宗大怒曰小子乃敢亂吾法耶令斬於東市尋悔因發制凡決死者命所司五覆奏自蘊古始也舊唐史謹刑二白一人刑善百姓休和傳視民如傷國之興也哀矜孟氏使陽膚為士師問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜三刺禮司寇正刑明辟必主刺一曰訊群臣二曰訊群吏三曰訊萬民其有罪方殺之以示不枉濫者一成盡心刑者成也一成而不可變故君子盡心焉伏念五六日至于旬時哀敬折獄泣持丹筆盛吉明慎易君子以明慎用刑而不留獄明而不留慎而不擾史死者不可復生漢書獄者天下之大命云云欽恤欽哉欽哉惟刑之恤哉文而不害蕭何嚴而不殘雋不疑簡孚核其罪有信文審克詳審閲實罪罰相當制短長之命死者不生念輕重之刑欽哉惟恤中典用情周禮八辟周禮以八辟麗邦法一議親二議故三議賢四議能五議功六議貴七議勤八議賓麗事麗附也謂當其本罪之事辭貴明征法宜慎測審慎國章斯抵誠合申刑輕無赦禮凡制五刑法輕無赦慎惟不變必在惟精恤在一成慎其三復奏讞漢宣令季秋後讞時士常幸宗室齊居而決事獄刑號平去酒肉杜緩為守治諸陵縣每冬月封具獄日常去酒肉省食官屬感其恩也涕泣漢張歐叔明為御史大夫嘗言案人上具獄事有可卻卻之不得已者涕泣面付之人命所懸孔謹重刑法沈傳師字子言為宣州於吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論決請如令覆奏徐堅字元固遷萬年主簿天授三年上書言囚有五聽令有三覆慮失情也此犯大逆詔使者勘當得實輒決人命至重萬有一不實欲訴無由以就赤族豈不痛哉此不足檢下之姦亂適長使人威福耳臣請如令覆奏則死者無恨敕法謹罰陳子昂字伯玉上言近日詔獄稍滋鉤捕支黨株蔓推窮蓋獄吏不識天意以抵慘刻誠宜廣愷悌之道敕法謹罰省白誣冤此太平安人之務也決刑無進酒肉太宗正觀五年十二月丁亥詔決死刑京師五覆奏詣州三覆奏其日尚食決刑無進酒肉既盡哀敬能致治平士師皋陶之恤刑司寇蘇公之用獄既盡哀敬能致治平杜牧畢諴除刑待制一輕一重理亂攸生陸贄奏議今京邑初平所用刑章元宜審謹一輕一重理亂攸生唐中宗慮囚制欲申作解之恩慮開徼幸路非所以納人軌物垂裕後昆既屬陽和之辰宜敦耕稼之業三農啓候方陳敬愛之規百姓為心爰軫泣辜之念將申慮降再釋狴牢庶無帶禁之冤仍示小懲之誡其都城之內見禁囚徒朕特親慮初學記於刑法尤謹刑法志太宗以英武定天下然其天姿仁恕初即位有勸以威刑肅天下者魏徵以為不可因上言王政本於仁恩所以愛民厚俗之意太宗欣然納之遂以寬仁治天下而於刑法尤謹臣願依覆奏法則死者甘伏知泣辜大恩生人歡悅見祥刑之意徐堅疏出六典白過聽殺人史李離晉文公理官也過聽殺人自拘當死文公曰官有貴賤罰有輕重下吏有罪非子之過也離曰臣居官為長不與吏讓受祿為多不與吏分過聽殺人傳罪下吏非所聞伏劍而死練法令孔光為廷尉法令號詳平治獄之吏漢路溫舒曰秦有十失其一尚存治獄之吏是也今治獄者上下相繼以刻為明深者獲功名平者多後患故治獄者皆欲人死非增之也自安之道在人之死也增秩宣詔曰今廷平任輕祿薄為立廷平秩六百石員四人務公平之選求明察寬恕于定國求明察寬恕黃霸以為廷平傅古義武帝方向文學張湯決大獄欲傅古義乃請博士弟子治春秋補廷尉吏也向學倪寬射策補廷尉文學卒吏為人溫厚口不能言語發明張湯盡用法律吏謂寬不習事不署從事世非法家楊賜為尚書令數日出為廷尉自以世非法家遂辭以特進就第三世廷尉吳雄子欣孫恭三世廷尉為法名家理曹椽魏置理曹椽蓋法曹身無王爵非廷尉所料晉王彪之字叔武為廷尉有永嘉太守謝毅後殺同郡人周矯矯從兄球詣州訴冤楊州刺史殷浩收毅付廷尉彪之以球為獄主身無王爵非廷尉所料不肯受與相反覆詔令受之彪之疏引據時人比之張釋之請置律博士晉衛覬奏刑法國家所重而私議所輕獄者人命所懸而選用者所卑請置律博士相教授遂施行斷獄飲酒于定國飲酒數石不亂冬月請治讞飲酒益精明為廷尉去酒肉見慎刑門不讀律而得廷尉之稱陳矯方知獄吏之尊周勃死灰不然見獄囚門如老獄吏見推斷門不用三冬見推斷門孔羅織之吏如獵者魏元忠為中丞歲餘陷侯思止獄仍放嶺南酷吏誅人多訟元忠者乃召復舊官因侍宴后曰卿纍負謗鑠何邪對曰臣猶鹿也羅織之吏如獵者苟須臣肉為之羹矣彼將殺臣以求進臣願何辜奉法持正鄭善果檢校大理卿奉法持正風績顯公卿間持平守正徐有功轉司刑少卿嘗謂所親曰大理人命所繫不可阿旨詭辭以求苟免故有功為獄持平守正專治詔獄杜景佺冀州武邑人入為司刑丞與徐有功來俊臣侯思止專治詔獄時稱遇徐杜者生來侯者死獻獄官針裴諝字士明惡法吏舞文或挾宿怨為重輕因獻獄官針以諷作大枷各為號來俊臣作大枷各為號一定百脈二喘不得三突地吼四著即臣五失魂膽六實同反七反是實八死豬愁九求即死十求破家司刑無鬼哭之庭大理有鳥巢之獄李庚西都賦唐文粹白按事發姦漢尹翁歸補河東卒吏按事發姦太守田延年重之司察蓋寬饒次公為司隸無所回避王生與書曰明主知君公正命君司察之位然既明且哲以保其身不納竟自刎逢諸葛諸葛豐字少君司隸刺舉無所回避王生與書曰逢諸葛舉節按侍中許章遂詔司隸去節司隸去節自豐始也埋輪後漢舉八使天下舉按不法張綱為侍御史充使最年少官卑受命訖乃埋輪於洛陽道中曰豺狼當路安問狐狸遂舉奏太尉梁冀奢淫不法朝廷振竦鷹隼始擊漢孫寶字子嚴為京兆尹立秋日辟侯文為東郡督郵引見曰今日鷹隼始擊當順天氣成嚴霜之誅掾頗有人乎文曰無其人不敢空受職寶曰誰也文曰杜稚季寶氣索良久曰其次誰文曰豺狼當路安問狐狸稚季聞之懼杜門不通水火搏擊翟方進為京兆搏擊亮彊為丞相奏陳咸冒濁苟容云云咸遂廢錮也二天後漢蘇章為冀州刺史按故人清河太守設酒饌太守喜曰人皆有一天我獨有二天章曰蘇孺文與故人飲私歡也明日冀州刺史按清河太守公法也遂正其罪所劾多范滂為太尉黃瓊所辟召三府掾屬舉謠言滂奏刺史二千石權豪二十餘人尚書責所劾猥多疑有所私也斂手避二鮑鮑永為司隸以鮑恢為從事俱抗直不避彊御世祖曰貴戚且斂手避二鮑怪鳥孫盛為長沙太守頗營資貨從事至郡服高名不劾盛與桓溫箋辭旨放蕩曰從事進無威鳳來儀之美退無鷹鸇搏擊之用徘徊湘川有似怪鳥溫怒遣按髒私濫車收到州不坐不避權貴後漢祭遵為軍市令世祖舍中兒犯法遵殺之縣令收督郵魏志滿寵為高平令市人張包為郡督郵貪穢因來在傳舍率吏卒收之即日考竟遂棄官白簡坐而待旦晉傅玄字休奕為司隸校尉天性峻急每當奏劾或值日暮捧白簡整簪帶竦懼不寢坐而待旦不避豪貴趙廣漢將吏至霍禹第突入其門搜索私屠酤椎破爐罌斬關而去不劾賢者晉羅含君章桓溫使檢劾謝尚含至不問郡事與尚酣飲而還溫問所劾含曰公以尚何如人溫曰勝我含曰豈有勝公而行非耶溫義之孔榜殺馮宿字拱之拜河南尹洛菀使姚文壽縱部曲奪民田匿于軍吏不敢捕府大集部曲輒與文壽偕來宿掩取榜殺之膽落溫造字簡輿授侍御史夏州節度使李祐拜大金吾進馬造正衙枰劾祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於溫御史威望隱然造彈擊無所回畏威望隱然發南曹僞官九十人主吏皆論死輒繩惡吏李向隱三入御史府輒繩惡吏不以殘鷙失名所發當也素議歸重劾奏常先風教齊浣字洗心為監察御史凡劾奏常先風教號善職百官肅然顏真卿字清臣遷御史大夫廣平王總兵二十萬平長安辭曰當闕不敢乘趨出梐枑乃乘王府都虞侯管崇嗣先王而騎真卿劾之帝還奏慰答曰朕子每出諄諄教戒故不敢失崇嗣老而躄卿姑容之百官肅然劾矯使李晟字良器宦者尹元貞持節到同華擅入河中諭慰李懷光晟劾元貞矯使欲洗宥元惡請治罪發姦擲伏賈敦頤遷洛州刺史發姦擲伏下無能欺使者十輩臨按郎餘慶下遷交州都督歡州司馬裴敬敷與餘慶雅故以事笞餘慶婢父婢方嬖譖敬敷死獄中又裒貨無藝民詣闕訴之使者十輩臨按餘慶謾讕不能得其情最後廣州都督陳善弘按之餘慶自恃在朝廷久明法令輕善弘不置對善弘怒曰舞文弄法吾不及君今日以天子命治君吾力有餘矣欲榜械之餘慶懼服罪知朝廷尊李勉字玄卿擢監察御史時武臣崛興無法度大將管崇嗣背闕坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊條姦李乂字尚真擢監察御史劾奏無避景龍初葉靜能怙勢乂條其姦中宗不納帝疏韋陟字殷卿會杜甫論房琯詞意迂慢帝令殷卿與崔光遠顏真卿按之陟奏甫言雖狂不失諫臣體帝繇是疏之不畏彊御裴諝字士明除右金吾將軍德宗新即位以刑名治天下百吏震時大行將藏陵事禁屠殺尚父郭子儀家奴宰羊諝列奏帝謂不畏彊禦善之反為所擠崔隱甫遷殿中侍御史內供奉浮屠慧範倚太平公主脅人子女隱甫劾狀反為所擠貶邙州司馬摘其姦贓萬計尹思貞調隆州參軍事屬邑豪蒲氏驁肆不法州檄思貞按之摘其姦贓萬計卒論死部人稱慶刻石挾邪亂政劉禹錫字夢得御史竇群劾禹錫挾邪亂政群即日罷權幸側目韋貫之劾金忠義不宜污朝籍忠義竟罷於是權幸側目劾按不撓李華字遐叔遷監察御史宰相楊國忠支婭所在橫猾華出使劾按不撓州縣肅然劾中人竇懷貞監察御史魏傳弓嫉史輔信義欲劾其姦懷貞曰是安樂所信任者奈何繩之傳弓曰王綱壞矣正坐此屬今日殺之明日殊無所悔彈李義府唐文粹王義方疏義方對仗叱義府不退義方三叱上既無言義府趨出義方乃讀彈文曰義府善柔成性佞媚為心昔事馬周分桃見寵後交劉洎割袖承恩生其羽翼長其光價因緣際會遂皆通達不能盡思端節對揚王休策蹇勵駑祗奉皇眷而反憑附社蔽虧日月請托公行交遊群小貪冶容之好原有罪之淳于恐漏泄其謀殞無辜之正義雖挾山超海之力望此猶輕回天轉日之光方斯更劣此如可恕孰不可容白失財者誅之周禮太宰治都縣鄙之治乘其財用之出入凡失財用物辟名者誅之注辟名謂為文書與實不相應考群吏之理太宰以八柄歲終令百官府名正其治受其會注會大計也其三歲大考群吏之理而誅賞之善罰者刑省而姦禁文子謫滿百漢陳遵為掾不視事曹吏白陳掾今日以某事謫遵曰滿百乃相聞舊事謫滿百當免自省晉宣帝問諸葛公起居何如而使者曰罰三十以上皆自省覽帝曰其能久乎議罰漢韓延壽為東都守臨出上車騎吏後至敕功曹議罰門下卒白曰明府早駕久駐未出騎吏父來不必入吏出趨謁父以敬父見罰得無傷大化乎延壽曰微子之言太守不知過族誅豪猾濟南三百豪猾二千石不能制郅都為太守族誅之孔濫罰李綱字文紀元吉為并州總管縱左右攘奪民愁苦宇文歆諫不聽并州陷帝怒謂綱曰王年少不習事故以歆及竇誕佐之太原興王地兵十萬粟支十年奈何一旦棄去歆建此計我當斬于軍綱曰王過惡誕養成之歆事王淺有闕必諍今賴歆計陛下不失愛子且有功又何加罪乎翌日帝悟引綱升御榻勞曰卿不言我幾濫罰誅張易之桓彥范字士則張東之將誅張易之等引與定策中宗至玄武門彥范等斬闕入士皆鼓噪時武后處迎仙宮之集仙殿斬易之等廡下后聞變而起見中宗曰乃汝耶豎子誅可還宮誅韋氏太平公主玄宗誅韋氏主與狄計遣子崇簡從事定將立相王未有以發其端者主顧溫王乃兒子可劫以為功乃入見王曰天下事歸相王此非兒所坐乃掖王下取乘輿服進睿宗臨刑極罵郝處俊孫象賢后素御處俊故因事誅之臨刑極罵乃死后怒令離磔其尸斫夷祖父棺冢自是訖后世將刑人必先以木九窒口云汙戮善良王及善留拜內史來俊臣繫獄當死后欲釋不誅及善曰俊臣凶狡不道引亡命污戮善良天下疾之不剿絶元惡且搖亂禍胎憂未既也后納之臨誅洗沐神色自若劉禕之賜死于家臨誅洗沐神色自若命其子執筆占為表子號塞不能書禕之乃自捉筆得數紙詞懇哀到今皆傷之罰不及有罪魏徵曰罰不及有罪則危亡之期或未可保劉洎贊曰洎欲身任安危以言掩其衆為媚忌所乘卒蹈罪誅誅棄骨鯁大臣李義府武后已立義府與敬宗德儉及御史大夫崔義玄中丞袁公瑜大理正侯善業相推轂濟其姦誅棄骨鯁大臣故后得肆志誅舞文者柳公綽字寬行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持法謂必殺貪者公綽判曰贓吏犯法法在姦吏壞法法亡誅舞文者罰一勸百權德輿字載之董溪于皋謨以運糧使盜軍興流嶺南帝悔其輕詔中使半道殺之德輿諫溪等方山東用兵乾沒庫財死不償責陛下以流斥太輕當責臣等謬誤審正其罪明下詔書與衆同棄則人人懼法臣知巳事不諍然異時或有此比要須有司論報罰一勸百孰不甘心帝深然之立釘趙思綰叛高祖遣郭崇義王峻討之至則擒之思綰問曰何以用刑告者曰立釘也思綰厲聲曰為吾告郭公吾死未足塞責然釘磔之醜壯夫所恥幸少假之從義許之父子俱斬於市五代史五十三狡虜既縻輸于國都示之市人即社行誅柳宗元皇武篇狡虜既縻輸于國都示之市人即社行誅分體燃臍于公異朱泚露布尚稽分體宋即燃臍揮刀紛紜爭切膾脯韓愈元和聖德詩解脫攣索夾以砧斧婉婉弱子亦立傴僂牽頭曳足先斷腰膂以及其徒體骸撐柱末乃取辟駭汗如雨揮刀紛紜爭切膾脯元舅大臣怫旨不閲歲屠覆道路目語及上官儀見誅政歸房帷天子拱手矣則天傳蠻區夷落罪無逃罰唐史三義方上言白哀刑政之苛淫刑以逞誰則無罪傳僭濫頗邪懼及善人刑濫楚多淫刑其大夫逃死於四方繁刑齊景公繁於刑有鬻踴者故晏子曰踴貴屨賤淪胥以鋪若此無罪無所措手足謂刑罰不中淫縱枉撓曲人入罪殺不辜書與其殺不辜寧失不經明刑不暴管子秦設重刑赤衣半道漢名臣奏云雖鄭傅猛政則曰寬難而楚用淫刑誰能救療弄法濫施殺餉獄者義縱為定襄至則掩獄中輕重罪四百餘人兼昆弟親戚私入相親或餉者亦二百餘人鞠為解脫死罰之罪盡殺之焚林斷木不時命曰傷地斷獄立刑不當命曰傷人緩深固之罪急縱出之誅孔刑濫人懼韓滉右丞元琇判度支也以關輔旱請運江南租米西給京師委滉督之其剛愎難共事請自江至楊子滉主之楊子以北自主之滉由是銜琇誣劾琇饋米與淄青李汭河中李懷光帝怒貶琇雷州司戶參軍左丞董晉白宰相劉滋齊映曰昨關輔用兵方蝗旱琇不增一賦而軍興皆濟可謂勞臣今被謫無名刑濫人懼假令權臣逞忠公何不請三司鞠之滋映不能用過刑劉洎死顯慶中其子弘業詣闕訴遂良譖死狀李義府右之高宗問近臣給事中樂彥瑋曰辨之是暴先帝過刑事寢慘文峭詆楊國忠李林甫興韋堅等獄欲危太子獄事畏卻以國忠怙寵搏鷙可用倚之使按劾國忠乃慘文峭詆逮係連年誣衊被誅者百餘族淫刑以逞高駢字千里駢之自將出屯也突將亂乘門以入監軍取役夫數百名叛卒藉斬其首乃定駢徐出以金帛厚賞士開府庫悉還其衣廩然密藉所給姓名夜遣牙將繫殺之夷其族雖孕者不貰投尸于江有一婦方踞而乳子將就刑媼傷之疑其畏死謂曰以子丐我一詣曹司也婦蹶起曰我知之且飽吾子不可使以饑就戮也見刑者拜曰渠有節度使奪戰士食一日忿怒淫刑以逞國家法令何有也我死當訴于天使此賊闔門如今日冤也逮死神色晏然蜀人聞者為垂泣有犯令者誅及鄰伍韓滉婺州屬縣有犯令者誅及鄰伍坐死數十百人又遣官察境內罪涉疑似必誅一判輒數十人下皆愁怖煎熬生人若墜大火昔祖龍滅古道嚴威刑煎熬生人若墜大火李白尋桃源序每笞一人以責其負每笞一人以責其負則諸案吏各持其簿列于庭凡一簿所負唱其多少量為笞數巳則以次唱而笞之少者猶積數十多者至笞百餘人不勝其苦吳越世家錢俶好行殺戮漢蔡王信高祖之後弟也所至好行殺戮軍士有犯法者信召其妻子對之刲剔支解使自食其肉血流盈前信命樂飲酒自如也為鐵籠鐵刷人有過者坐之籠中外燎以火刷剔其皮膚以死五代劉守光捶人畏不免嚴安之捶人畏不免視腫貴復笞之至血流乃喜鐵籠赩囚首索元禮為推使赩囚首加以楔至腦裂死又橫木開手足轉之號曬翅或紡囚梁上縋石於頭造檻車閩王鏻初薛文傑為鏻造檻車以謂古制疏闊乃更其制令上下通中以鐵芒內向動輒觸之既成首被其毒五代史六十八百口保無反者則天謂近臣曰自周興來俊臣死後更不聞有反逆者然則已前受戮者不有冤濫乎夏官侍郎姚元崇對曰自垂拱已後被告者皆枉酷自誣而死天下號為羅織甚於漢之黨錮賴上天降靈聖情發寤誅鋤凶惡朝廷乂安今日已後臣以微軀及一門百口保見在內外官吏無反者則天大悅曰已前宰丞皆順成其事陷朕為淫刑之主聞卿所說甚合朕心乃賜元崇銀千兩白吏乞貸毫氂輒死李實為京兆尹吏乞貸毫氂輒死按之無言者猥曰死亦非枉復殺之專以殘忍為政順帝在諒暗不踰月實殺數十人于府貶通州長史市人爭懷瓦石邀劫之實懼夜遁去刑殺太甚則致陰沴李石字中玉唐宗室文宗時大臣新族死歲苦寒外情不安帝曰人心未舒何也石曰刑殺太甚則致陰沴刑網浸密劉德威為大理卿太宗問曰比刑網浸密咎安在德威何在君不在臣下之寬猛視王之好律失入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深文為自營計非有教使然也琢斫屠剔膏流節離柳宗元琢斫屠剔膏流節離之禍不作而人乃克貌平舒愈執憲者以深刻為奉法高逢列五事以為今天下大定而刑未措何哉蓋謀猷之臣臺問之吏不崇簡易而昧經遠故執憲者以深刻為奉法當官者以侵下為益國楚掠凝慘徐有功武后僭位畏唐大臣謀己於是周興來俊臣丘神績王弘義等揣識后指置總監牧院諸獄捕將相俾相鉤逮掩搦護送楚掠凝慘為炮熏刳斫法南蠻傳蔡京經制嶺南峻條令為炮熏刳斫法愁毒為軍中所逐真蛟蜃南漢劉龔性聰悟而苛酷為刀鋸克解刳剔之刑每視殺人則不勝其喜不覺朵頤垂涎呀呷人以為真蛟蜃也為斷舌決口斫筋折足之刑史洪肇字化元凡民抵罪吏以白洪肇洪肇但以三指示之吏即腰斬之又為斷舌決口斫筋折足之刑五代史三十崔元綜雖外示謹厚而情深刻薄每受制鞫獄必披毛求疵隱於重辟人多鄙之唐史武宗用李德裕誅劉稹等大刑舉矣而性嚴刻故時竊盜無死所以原民情迫於饑寒也至是贓滿千錢者死至宣宗乃罷之而宣宗亦自喜刑名常曰犯我法雖子弟不宥也然少仁恩唐德自是衰矣唐刑法志峻刑暴禁王世充顧下多皆已乃峻刑暴禁以威之戶一人逃家無少長皆坐父子兄弟夫婦許相告免令五五相保一家叛舉伍誅酷吏八白唯戮是聞子玉鞭貫子玉治兵終日而畢鞭七人貫三人耳安忍無親以民為土芥國其亡也刀鋸鑽鑿國語大刑用兵甲鈇鉞次刑用鑽鑿薄刑用鞭朴也既乖勿喜之言豈念如傷之見夫樂殺人者不得志於天下也以苛為察以刻為明漢書斷之以剛傳依勢作威勢位也倚法以削倚刑法以行刻削之刑報虐以威言以威刑報上為虐于公高門以待封嚴母掃墓而迎喪文選蒼鷹之目郅都擊搏豪弱時號云云乳虎之稱寧成苛酷人語曰寧值乳虎無值寧成之怒屏棄仁惠專行毒痛鞭貫立威筆削入罪商鞅嚴刑自敝為法自敝延年酷法見誅漢書嚴延年為河南守峻刑酷法時人號為屠伯後坐枉法殺人所誅其母不哭周紆父子伏誅後漢周紆字文通為渤海太守酷虐每赦至先決刑後宣赦後坐事父子皆伏誅苟晞兄弟見害字道將北風刺虐也衛國並為威虐視人如讎殘人以逞將戕於餘戕殘人也忍人是可忍也不得其死吹毛刻骨束濕寧成操下如束濕言急也巧詆雖稱疾惡無乃忍人吏惟巧詆刑則濫施法家少恩文吏巧詆慘礉史韓非喜刑名極慘礉少恩也渭水盡赤商君臨渭水論囚七百餘人渭水盡赤酷烈楊雄解嘲曰呂刑靡敝秦法酷烈虎穴尹賞為長安令穿地深數丈內人於中百人為一輩覆以大石數日一發相枕藉死人號虎穴杜周內深次崩操切服下臧宣微文深詆張湯舞智御人急縱出之刑刑法志緩操故之法急縱出之刑言縱罪失出者誅急地臼木杵陳咸為南郡太守以殺伐立威豪猾大姓犯法輒計具符下以律程作司空司空主役官也為地曰木杵不中程或私脫鉗鉞及衣服不如法輒加罪督作劇不勝痛自到死者歲數千百人久者出腐爛家不得收注鉗在項鈇在足者展月見暴政門鬻棺之喻今獄吏以苛為察以刻為明深者獲功名平者多後患諺曰鬻棺之喻欲歲人疫非憎人欲殺之利於人死獄吏之深刻亦猶此也史掃墓之譏嚴延母事見上注泥塗罪人不與食晉王宏字正宗為河南尹無能名為苛碎桎梏罪人以墨塗面置深坑中餓不與食後有罪帝以宏纍有政聲以贖論也王法大刑不可以委曲生情毀身焦膚分骸斷首孔公卿被誅死者踵相及劉子元名知幾武后時吏橫酷淫及善人公卿被誅死者踵相及子元悼士無良而甘於禍作思謹賦以刺時酷烈賈敦順洛陽令楊德干矜酷烈杖殺人以立威敦順喻正曰政在養人傷生過多雖能不足貴也德干為衰減李嗣真諫來俊臣獄方熾嗣真上書諫昔陳平事漢祖謀疏楚君臣行反間項羽遂亡今殆有如平者謀陛下君臣恐為社稷禍不納澡垢索疵崔元綜每受制鞫獄必澡垢索疵不入死不肯止人畏鄙之笞掠嚴楚穆贊元和時鹽鐵轉運諸院擅繫囚笞掠嚴楚人多死質奏請與州縣吏參決自是不冤父嫌其酷郎餘慶始治萬年父知運嫌其酷將杖之餘慶避免父嘆曰國家用之矣吾尚奈何及為御史中丞復嘆曰郎氏危矣以憂死餘慶卒以貪殘廢汙點善良破壞其宗武三思凡構大獄污點善良破壞其宗天下皆蕩然深排巧引內刑塹中武懿宗大授間受詔訊大獄誅大臣王公皆深排巧引內刑塹中無有脫者其險酷雖周來等不能絶也酷吏破家桓彥范字士則內史李嶠等屢奏往為酷吏破家者請皆宥雪依違未從彥范復上言噬紳纓若狗豚然索元禮來俊臣之徒揣后密旨紛紛並興澤吻磨牙噬紳纓若狗豚然至叛胔臭達道路冤血流離刀鋸忠鯁貴彊之臣朝不保昏而后因以自肆不出帷闥而天命已遷出唐酷吏傳獄持宿囚至載初右臺御史周矩諫后曰凶人告許遂以為當推劾之吏以檢責痛詆為功鑿空投隙相於以殘泥耳籠首枷楔兼暴拉脅籤爪懸髮熏目號曰獄持畫禁食夜禁寐敲撲撼搖使不得瞑號曰宿囚人苟賒死何求不得時誘之為酷唐史臣云嗚呼非吏敢酷時誘之為酷觀俊臣輩怵利放命內懷滔天又張湯郅都之土苴云狼毒野葛王弘義每移檄州縣輒詫曰我文檄如狼毒野葛驢駒拔橛犢子縣等以怖下王旭裂獄械率有名曰驢駒拔橛犢子縣等以怖下又縋髮以石脅臣之三豹同上時監察御史李嵩李全交昔嚴酷取名與旭埒京師號三豹嵩為赤全交為白旭為黑閭里至相誼曰若違教值三豹𠢒尾榆敬羽凶態不能忍乃作臣枷號𠢒尾榆囚人多死羅鉗吉網李林甫陰構大獄誅不附已者引吉溫門下與錢塘羅希奭為奔走推鍛相勖以虐號羅鉗吉網震以烈威吉溫推事未窮而先計贓成奏乃引囚問震以烈威隨問輒承無敢忤鞭楚未收干壁而獄具矣鞫囚不問輕重來俊臣鞫囚不問輕重注醯于鼻掘地為牢或寢以匽溺或絶其糧囚至嚙衣絮以食大抵非死終不得出門壯轢腹敬羽以門壯轢腹掘地實棘席蒙上瀕坎鞫囚不服則擠之坎多死用慘刻奮肅代間渠憸宿狡頗用慘刻奮然不得如武后時敢搏擊殺戮矣訊囚名狀朝野僉載李嵩武后時為御史鞫備諸慘酷其訊皆有名號如仙人獻果王女登梯犢子懸銅驢兒拔橛鳳凰曬翅猴鎖火上麥索下攔單之類危坐小床敬羽纍遷御史中丞宗正卿鄭國公李遵坐賄下獄羽參按遵肥而羽瘠則引遵危坐小床痺且僕遵欲伸足羽曰公乃囚我延公坐何可慢遵僕三四徐受所言得贓至數百萬論殺最多酷吏索元禮訊一囚窮根柢相牽聯至數百未能訊衣冠氣褫后數引見賞賜以張其威故論殺最多來俊臣周興踵而奮天下謂之來索同上每擲一事千里同時輒發來俊臣拜左臺御史中丞中外纍息至以目語俊臣乃引侯思止王弘義郭弘霸李仁敬康暐衛遂忠等陰嘯不忍百輩使飛語誣衊公卿上急變每擲一事千里同時輒發契驗不差時號為羅織牒左署曰請付來俊臣或侯思止失入九白刑僭則懼及善人枉撓不當反受其殃枉撓曲入人罪也察阿黨謂獄官以私恩曲斷情匪哀矜理乖明啓明啓刑書入人之罪罰既爽於躬行罪宜甘於反坐制短長之命豈可復生斷出入之刑不聞惟恤重典平人國章斯抵誠合申嚴人命所懸豈宜失入過當傷深濫施未聞情得旋見獄成罪雖自掇既有常刑死不復生曷宜過當不平謂何孔失入無辜刑法志自張蘊古之死也法官以大出為戒有失入者又不加罪自是吏法稍密帝以問大理卿劉德威對曰律失入減三等失出減五等今失入無辜而失出有罪故吏皆深文帝矍然遂命失出入者皆如律求食搖尾見吏垂頭文粹獄針寂寂圜土纍纍繫囚求食搖尾見吏垂頭自古立名此為非所逼隘狹室欹傾漏宇冬有祁寒夏多隆暑焉可失入焉可妄處張說作匹婦含冤三年亢陽文粹張說獄針匹婦含冤三年亢陽匹夫結憤六月飛霜敢告司憲無輕國章失入者減三見上刑法志詐忠者迫我以社稷計文宗開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉久未原雪帝慚曰我當時亦誤其失詐忠者迫我以社稷計故耳宋申錫傳不可為後世法唐臨字本道御史大夫蕭齡之任廣州都督受賕當死詔群臣議臨曰齡之貪贓狠扈死有餘咎陛下以異於他囚故議之有司又令入死非堯舜所以用刑也不可為後世法帝然之失出十白利淫與其殺不辜寧失不經寧僭無濫賞不僭刑不濫不幸而過寧僭無濫察阿黨見失入門罪無掩蔽禮既乖明啓之文宜置利淫之罪急縱出之誅刑法志輕典容姦禮情非故縱罪則減論寬惡刑法志殺人不死傷人不刑是惠暴而寬惡也孔小過徐有功后召誥曰公比斷獄多失出何耶對曰失出臣小過好生陛下大德后黜然誤縱盧商字為臣同平章事大中元年春旱詔商與御史中丞封敖理囚繫於尚書省誤縱死罪罷為武昌軍節度使失出者減五劉德威太宗問比刑網寢密啓安在德威曰在君不在臣下之寬猛視主之好失出者減五今失出者有罪所以吏務深文為自營計法官以失出為戒自張蘊古之死也法官以失出為戒有失入者又不加罪自是刑法稍密刑法志怖以妖祟竇孝諶妻龐謂為其奴怖以妖祟教為夜解因告以厭詛薛季昶鞫之龐當死有功明其枉季昶劾有功黨惡逆當棄市有功萬視事令吏泣告有功曰豈吾獨死諸人長不死耶安步去后詰有功失出餘見上小過注白菀柳詩刺刑罰不平同罪異罪非刑也傳上下其手王子園與穿封戍爭囚伯州犁問上下其手曰王子圍寡君之貴介弟戍方城外之縣尹也注上下其手所以導囚意也隨上意漢張湯為廷尉上意所欲釋豫監吏輕平者所治即豪必舞文巧詆是以湯雖文深意忌得此聲譽而深刻吏多為爪牙用者也以主意為獄杜周為廷尉客謂之曰君為天下決平不循三尺法專以人主意旨為獄固當如是乎周曰三尺安出哉前王所是者疏為律後王所是者定為令以善疾惡後漢朱暉為臨淮太守好節概所拔用皆勵行士諸報怨以義犯法者皆為求理多得出濟不義之囚即時僵仆也兩劾嚴延年為涿郡遺吏趙繡案大姓東高氏繡為兩劾先白輕者欲觀延年意怒即出其重劾延年察知遂殺繡漢史抑彊扶弱嚴延年為河南守其法務抑彊扶弱弱者雖陷法曲文出之豪彊者以人內之當生者詭殺之人莫之測也撓法周陽由夷豪傑愛者撓法活之憎者典法殺之不當罪則悔當罪則威刑也古者刑不過罪爵不踰德荀卿子云刑不應罪賞不酬功張敞為京兆尹賞罰明時越法縱捨也枉撓反坐頗類偏黨其罪惟均所罰不一罪無等差刑有輕重高下其心孔撓法貸減王世充字行滿拜江都通守有繫獄者皆撓法貸減以樹私恩溫舒不足文粹李庾西都賦斤差衡之失論罪溫舒之不足以輕入重以生入死文粹李華中書堂記事不可以輕入重罪不可以生入死不能一法齊衆陸宣公奉天赦文上下其手希合盛旨酷吏傳序周矩諫武后曰陛下不諒試取告牒判無驗者使推其情有司必上下其手希合盛旨法司推斷舞法深詆徐有功上疏誠令天官銓注有所不平法司推斷舞法深詆二司理匭受所上章壅塞不白者皆許臣按驗劾發奪祿貶勞希旨用刑李峴因侍御毛若虛覆按謝夷甫罪用法不平峴白於帝曰若虛希旨用刑亂國法陛下信為重輕示無御史臺出為蜀州刺史出新唐史白五刑不用善人為邦百年勝殘去殺虞夏之道寡怨於人少文法也刑不施而人咸服畫冠堯畫冠為刑而人不犯罔或干政帝曰皋陶惟茲臣庶罔或干豫政言下順命也期于無刑書曰刑期于無刑民協于中注云以殺止殺而刑措不犯有司書茲用不犯于有司言人不犯罪昔唐虞畫刑而人不犯周之成康刑措而不用漢武詔周之成康見上漢之文景文帝用張釋之為廷尉罪疑者豫人是以刑罰大省至於斷獄四百有刑措之風景帝定箠令而笞者得全辟以止辟刑期無刑孔歲斷死二十九魏徵傳帝即位四年歲斷死二十九幾致刑措一歲斷刑不滿三十太宗之朝勤儉化人人用富庶加以德教致于升平故一歲斷刑不滿三十雖則聖明謹刑賢良恤獄之所致也白居易策止獄刑措從善遠惡必使為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰日時而得其罰則人懼而有懲焉為善者日有勸為不善者目有懲是毆天下之人而從善遠惡是刑所以措而化之所以成也柳宗元斷刑論不越月踰時可致刑措徐有功誠令天官銓注有所不平法司推斷舞法深詆三司理匭受所上章壅塞不白許令臣按驗劾發貶勞奪祿不越月踰時可致刑措后納之本傳開元二十五年刑部斷天下死罪唯有五十八人大理卿徐嶠上言大理獄由來相傳殺氣太盛鳥雀不棲至是有鵲巢其樹於是百寮上表賀以謂幾致刑措通典白法若易方人難知禁政有弛張法存沿革誠宜適變安可執迷所宜去彼取此不可以古制今法不前定官將疇依夏造殷因豈煩於制漢除秦敝亦便於時言之不中雖新意而奚為事必有初率舊章而則可若議事之刑滋章多制則舞文之吏因緣為奸無作聰明亂舊章章典也書罔以側言改厥度度法也晉鑄刑鼎鑄范宣子所為刑書仲尼曰晉其亡乎失其度矣夫晉國將守唐虞之法度以經緯其人范宣子之刑是晉國之亂刑也惟聖作則則法也畫一漢蕭何為法講若畫一曹參代之守而勿失不刊之典苟可彊國利人何憚改革法律史商鞅欲變法曰可與樂成不可與慮始苟可以彊國利人何憚改革法律甘龍曰聖人不易人而教智者不變法而理因人而教不勞而成功因法而治吏習而人安鞅曰龍世俗之言也常人安於故俗學者溺於所聞若然者居官守法可也非所以論彊國利人之術也三代不同禮而王五伯不同法而霸智者作愚者制焉賢者更禮不肖者拘焉是以治不一道也故湯武不循古而王復殷不易禮而亡反古者不可非而循禮者未足多也周因殷禮政亦不愆漢除秦刑人是以息苟用捨而合道蓋沿革而同歸簡要滋章法令滋章盜賊多有協中書合大中之法建中立大中之法中行之作晉鼎見誚仲尼見上子産之鑄鄭書終慚叔向鄭人鑄刑書叔向詒子産書曰先王議事以制不為刑辟懼人之有爭心也民知有辟則不忌於上並有爭心以徵於書而徼幸以成之夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國制三辟鑄刑書將以靖民不亦難乎民知爭端將棄禮而徵於書終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎子産曰僑不才不能為子孫吾以救世也既不承命敢忘大惠利百變變法也官或變法人豈懷刑非利百之謀豈宜變法遵畫一之義自合守文仍舊貫貫事也論語新意何必改作相沿不改也禮前定禮事前定則不困析言破律殺無赦易其紀律易則生亂舞文弄法若從私議是舞公文法無改度義有隨時適道在權救時貴變革故取新捨舊謀新相時革敝作古有初壞法亂紀蕭何定律參夷連坐無自立辟辟法也三尺安出客謂杜周曰君不循三尺法周曰三尺安出哉先王所是者疏為律後王所是者定為令也刪定奏上後漢應劭刪定律令撰律本章句尚書舊事廷尉版令決事比例司徒都目五曹詔書及春秋治獄凡二百五十篇蠲去重復奏之請刪削陳寵昭公奏律令條法溢於甫刑九千百八十九宜令三公廷尉平定應經合義刪條其餘越律馬援條奏越律與律駁者十餘事申明舊制約束之也自蔽商鞅孔輕重沿愛憎趙冬曦神龍初上書曰古律條目千餘隋時姦臣侮法著律曰條無正條者出非舉重以明輕入罪舉輕以明重一辭而廢條目數百自是輕重沿愛憎被罰者不知其然使賈誼見之慟哭必矣不務省事而務捉搦夫捉搦者法也法設而滋章滋章則盜賊多矣法而益國殺之可以比法令數改或行未見益止未知損譬奕者一棋為善而復之者愈善故曰設法不如息事韓琬凡有未發及已發未斷而逢格改者若格重則依舊條輕從輕法唐六典正觀初有蜀王法曹裴洪獻奏駁律令命長孫無忌房玄齡釐正凡五百餘條減開皇太尉入流者九十三條比古死刑殆除其半永徽中復撰律疏三十捲至今並存出唐六典云白死者不可復生漢文詔制短長之命書死者不恨宣詔曰獄者萬人之命能使生者不怨死者不恨則可謂文吏矣斬殺必當月令鈇鉞肆諸市朝景伯云於公伯寮吾力猶能肆諸市朝仲春無肆掠肆暴尸也月令以殺止殺書呂刑曰大辟疑赦其罰千鍰大辟死刑也死罪有疑即赦之罰千鍰以贖死罪也致辟誅殺也罪在大辟禮念施行之後不可復生當結罪之前所宜惟恤列刑周禮是全要領禮無所加誅一死國章斯抵誠合申嚴人命所懸亦宜審慎議獄緩死易莫大之刑刑故無小孔誤伐一柏而殺二臣狄仁傑官懷英遷大理丞左威衛大將軍權善才右監門中郎將范懷義坐誤斧昭陵柏罪當死高宗詔誅之仁傑奏不應死帝怒曰是使我為不孝子必殺之仁傑曰漢有盜高廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一杯土何以加其法於是罪止棄市陛下之法在象魏固有等差犯不至死而致之死何哉誤伐一柏而殺二臣後世謂陛下為何如主帝意遂解免死凡京城決死囚之日尚食蔬食內教坊及太常徹樂每歲立春後至秋分不得決死刑唐六典決死刑皆於中書門下詳覆同上凡決大辟在京者決三司五覆奏在外者刑部三覆奏唐六典老奴死罪李輔國乞解官有詔進封博陸郡王仍為司空尚父許朝朔望輔國欲入中書作謝表閽者不納曰尚父罷宰相不可入輔國氣塞久乃曰老奴死罪事郎官不了請地下事先帝優辭諭遣三坐大辟將死泰然不憂徐有功凡三坐大辟將死泰然不憂赦之亦不喜復死刑三覆奏上元元年肅宗本紀貞觀四年天下斷死罪者二十九人太宗本紀裴寂有死罪四裴寂字玄真浮屠法雅坐妖言辭連寂坐免官削封邑半歸故郡未幾汾陰狂男子謂寂奴曰公有天分寂遣奴殺所言者奴盜寂封邑錢百萬寂捕急遂上變帝怒曰寂有死罪四乃放靜州流罪十五白舜典曰流宥五刑宥寬也以流放之法寬其五刑屏之遠方以御魑魅舜流四凶投諸四裔以御魃魅投畀有北俟罪長沙五流有宅五宅三居居罪人遠近有三等四裔是投罪輕重而不等五流斯宅居遠近而有差黜惡禮流凶四凶去邪勿疑去父母之邦緩死申恩徙於瘴癘移人禦魅放流玄冠縞武不齒之服所放不率教者禮宥汝以遠傅子産謂子南曰君不忍殺宥汝以遠勉速行乎晉放大夫胥甲父于衛古者大夫已去三年待放君放之非也大夫待放正也見公羊傳莊舄曰越之流人去人滋久思人滋深流在裔土以實裔土國語信無罪而棄遂騷雖處罪放講學不倦吳志虞騛性疏直孫權怒徙交州雖處罪放講學不倦上書曰長沒海隅生無可與語死以青蠅為弔客云云罪窮兩造既明豪奪吾人流宥五刑自宜離逖爾土聖代好生既宥爾以遠也小人懷土尚於我有尤乎四罪而天下咸服舜流共工等播棄譴謫徙之於蜀漢放韓信投荒孔徙邊嚴郢字叔敖御史臺請天下斷獄一切待報唯徒者得悉徙邊郢言罪徒邊即流也流有三而一用之誠難且殺人外猶有十惡僞造符印疆光火諸盜今一徒之法太輕苟刑禍及流竄文粹皮日休鹿門隱書今之上為名與勢苟刑禍及流竄至是監刀鋸者必名人司流竄者必勢士繼其踵者惟恐其位之不速也名與勢然也別敕長流長孫無忌奏別敕長流以為永例後趙公犯罪敕長流嶺南至死不復回此亦為法自弊也決杖百流嶺南李朝隱為大理卿武彊令裴景仙丐贓五十匹帝怒杖殺之曰景仙其先寂有國功又丐乞贓無死比籍當死坐猶將宥之固請決杖百流嶺南四曰流書云流宥五刑謂不忍刑殺宥之于遠也唐刑法志得罪當流李安遠與王圭最善圭坐王頗得罪當流安遠為營護免矣長流登州五代王殷廣順三年秋九月永壽節殷求入為壽太祖許之而懼其疑也復遣使止之明年太祖有事于南郊是冬殷來朝殷握兵柄職當警衛出入多以兵從又求兵甲以備非常是時太祖臥疾疑殷有異志乃力疾御茲德殿殷入起居即命執之削奪在身官爵長流登州已殺之詔流罪無遠近皆徙邊要州太宗十四年詔流罪無遠近皆徙邊要州後犯者浸少出刑法志諸王子孫雖嬰褓亦投嶺南則天皇后武氏諸王牽連死戮殆盡子孫雖嬰褓亦投嶺南悉投放丑裔薛懷義陰募少年千人為浮屠有逆謀侍御史周矩劾狀請治驗太后曰是道人素狂不足治力少年聽窮劾矩悉投放丑裔懷義構矩免官白三黜柳下惠為士師三黜曰直道而事人焉往而不三黜三巳令尹子文三巳之無慍色降階白衣領職晉周顗伯仁為吏部尚書醉酒為有司所糾詔令白衣領職左遷左降左轉左授思過之地放黜師保書絀爵禮簡不肖以黜惡禮事君三違不出境則利祿也雖曰不要君吾不信奪之官邑咸黜不端再免潘安仁再免官黜乃亂也楚太子放臣逐臣遷客御魅見上注行吟澤畔屈原既放乃行吟澤畔為懷沙賦沉汨羅而死召歸宣室賈誼謫居長沙長沙卑濕自傷悼為鵬官賦後歲餘文帝思誼征還上在宣室詔誼入語俟罪長沙賈祖謫為長沙王傅既已謫去渡湘為賦吊屈原曰恭承嘉惠兮俟罪長沙側聞屈原兮自沉汨羅云云罪人黜伏謫去謫居直道獨醒謫居三年屏去失息禁闥俟罪荒陬瘴癘賈誼長沙之中實傷鵩鳥屈原汨羅之上見著離騷將不甘心故無鉗口投諸四裔孔聘邵王妓宗楚客坐聘邵王妓貶原州都督絀放權德輿言比經絀放者自謂抆拭無期坐為匪人以動和氣而冬薦官踰三年未受命衣食既空溘然就斃此亦窮人之一端也廢黜者因姦冒進柳澤疏遷貶無闋日李訓字垂訓本兵奇進及大權在己鋭意去惡故與帝言天下事無不如所欲挾注相朋比務報恩復讎素忌李德裕宗閔之寵及因楊虞卿獄指為黨人嘗所惡者悉陷黨中遷貶無闋日班列幾空中外震畏削跡朝瑞李雍字泰和貶遵化尉妻溫復為雍請戍邊自贖曰頻謫遠郡削跡朝瑞不啻十載歲時歎戀聞者傷懷願寬逐臣過惡王起字舉之帝數訪逮時政因積雨願寬逐臣過惡雖坐貶黜俄而遷復盧懷謹諫竊見內外官有賕餉狼籍劓剝蒸人雖坐貶黜俄而遷復還為牧宰任以江淮嶺磧粗示懲貶內懷自棄徇貨掊資訖無悛心明主之於萬物平分而無偏施以罪吏牧遐方是謂惠奸而遺遠坐小法貶唐儉字茂系坐小法貶光祿大夫三貶朱崖大中中李太尉三貶至朱崖兩判皆為擬進用者而令狐綯之詞未知孰是有俗傳云蛇用兩頭狐搖九尾鼻不正而身豈正服既斜而心亦斜仇家謗也南部新書屈平憔悴滯江潭亭伯流離放遼海折翮翻飛隨轉蓬李白送族弟中使臨門遣頃刻不得留病妹臥床褥分知隔明幽悲啼乞就列百請不頷頭韓愈赴江陵久作朝士貶得非命所施韓愈崔立之詩趙璧為誰點隋珠枉被彈李白送竇司馬望望思得效用柳宗元與京兆書凡人之黜棄皆望望思得效用放臣不宜與善地劉禹錫字夢得敘張九齡為宰相建言放臣不宜與善地悉徙五溪不毛處然九齡自內職出始安有瘴癘之歎罷政州守荊州有拘囚之思身出遐陬一失意不能堪矧華人士族必致丑地然後快意哉議者以為開元良臣而卒無嗣豈忮心失恕陰責最大雖他美莫贖邪痕廢程异字師舉為鹽鐵楊子院留後叔文敗貶郴州司馬李巽領鹽鐵薦異心計可任請拔擢用之乃復為楊子留後异起痕廢能厲已竭節悉矯革征利舊弊曠然無黜免意柳渾字夷曠免後數日置酒召故人出遊酣肆乃還曠然無黜免意丑地李朝隱字光國擢大理丞武三思構五王而侍御史鄭愔請誅之朝隱獨以不經目實不宜輕用法忤旨斥丑地白于役計年斷徒配役驅以就役計徒傳曰計徒庸也役諸司空周禮凡萬人有罪者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期月役則宥而赦之注云役者使給百工之役也伐薪之年鬼薪徒也就役計日徒坐舂稿徒役女子之所凡害人者置之圜土而施諸職事以明刑恥之明刑書罪惡於大方版著背也不齒三年不得列於平人不能改出乎圜土者殺之司圜掌收教罷人凡害人者不使飾冠著墨幪與古象刑同任之以事若今罰征上罪三年而捨中罪二年下罪一年凡圜土之刑人也不虧其財漢惠詔上造以上內外公孫有罪當刑及當為城旦舂皆耐為鬼薪白粲城旦謂旦旦起治城舂者婦人不預外徭役俱舂作米四歲刑取薪給宗廟白粲令擇米皆三歲刑張蒼定律諸當髡髡當為完者完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲入于隸臣妾隸臣妾一歲免為庶人男子為隸臣女子為隸妾逃亡及耐罪以上不用此令有爵者七十者未齔者皆不為奴有爵謂命士巳士男子八歲女子七歲而毀齒此司厲之職也復作邴吉使女徒復作復作弛刑徒弛刑徒不私鎖但責保顧山錢平紀天下人徒已論歸家出顧山錢月三百王陵為刑徒於道魏王陵過事髡五歲當掃道孔徒者得悉徙邊嚴郢字叔敖御史臺請天不斷獄一切待報徒者得悉徙邊郢言罪人徙邊即流也本傳三曰徒徒者奴也蓋奴辱之周禮曰其徒男子入于罪隸任之以事置之圜土而教之量其罪之輕重有年數而捨見刑法志長役之宗室李復字初陽改容州刺史先是西原亂吏獲反者沒為奴婢長役之復至使訪親戚一皆原縱罷役徒梁本紀乾化二年五月丁亥德音降死罪已下囚罷役徒五代史徒非重刑天子惻然詔曰徒非重刑而役者寒暑不釋唐刑法志私罪徒以上會赦免徐有功時有詔公罪流私罪徒以上會赦免踰百日不首復論有功奏曰陛下寬殊死罪巳發者原之於是通改過之心自新之路故肆告赦前事以其罪罪之若無告言所犯終不自發如告言赦前事則與律乖今赦前之罪不自言者還以法論則恩雖布天下而一罪不能不能貸臣竊為陛下不取隋徒刑五自一年至于三年唐因之
