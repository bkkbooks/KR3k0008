body:
  text: 卷第四十八白方剛子曰君子有三戒及其壯也血氣方剛戒之在鬥失意見上注怒有戰鬥傳小人之性釁於勇嗇於禍一朝之忿忘其身以及其親非惑與忿思難君子有九思彼竭我盈鬥心鬥志爭鬥之獄繁矣不忍小忿拗怒而少息肆其忿狷恚也暴弱彊者暴弱彊暴之男攘臂而仍之張拳張空拳冒白刃慍見怒形於色力爭蚌鷸相持兔犬俱斃血作脈憤爭為事末斗乃禍心鬥怒者成之周禮睚眥方剛奮末謂怒而動四支也禮忿懥懥怒貌也懥音致禮用壯逢彼之怒交捽趙簡子曰孟獻子有鬥臣五人叔向曰子不欲也若使肹侍交捽之可也控拳救鬥批亢史記解雜亂紛紏者不救鬥批亢者不摶橶控拳搗虛形格勢禁而自解扼亢附背婁敬曰夫人鬥不扼其亢拊其背未能全勝折脅拉齒范睢兩虎安得私鬥寇恂賈復勸解高鳳教授於西唐山中鄰士有爭財持兵而鬥鳳往脫巾叩頭曰仁義遜讓奈何棄之爭者慚投刃而謝之雞肋不足以安尊拳劉伶醉與人相忤其人攘袂奮拳伶曰雞肋不足以安尊拳其人笑而止老拳毒手石勒與李陽鄰居爭漚麻池相歐擊及貴召陽與飲酣謔引陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手教令刑法志歐人教令者與同罪即令人歐其父母不可與行者同決死爭雄憑怒力爭心競能鬥不過夷吾裂冠毀冕鬥囂司暴禁鬥囂者囂謔也暴音暴晉侯夢與楚子摶楚子伏地而監其腦傳佐鬥摶殺梁公子季友與莒拿屏左右而相搏公子友處下左右曰孟勞孟勞魯之寶刀也公子取而殺莒拿剛腸妻呼還春秋專諸與人鬥怒有萬人氣妻一呼即還子胥問之對曰屈於一人之下鬥智不鬥力救鬥者傷淮南子曰救鬥者傷批而殺之宋萬遇仇牧云云五侯之鬥血成江春秋考異曰龍門下血如江時人謠曰云云兩虎相鬥勢不俱生謂藺相如廉頗也孔柳宗元貞符惟人之初總總而生林林而群合偶而居交焉而爭際焉而鬥力大者博齒利者齒爪剛者決群衆者軋兵良者殺披披藉藉草野塗血噤齘薄賊南蠻傳坦綽遣使者齎驃信書遺節度使牛叢叢因責之曰州縣繕甲厲兵掎角相從皆蠻之深讎雖女子能噤齘薄賊況彊夫烈士哉毆辱李傑為御史大夫尚衣奉御長孫昕素惡傑遇于道內持玄宗婭婢與所親楊仙玉共毆辱之傑訴曰敗發膚痛在身辱衣冠恥在國帝怒斬昕等朝堂爾何功坐我上尉遲敬德嘗侍宴慶善官有班其下者敬德曰爾何功坐我上任城王道宗解喻之敬德勃然擊道宗目幾眇太宗不懌酒酣捉笏顧少連裴延齡方橫嘗與少連會田鎬第酒酣少連捉笏曰段秀實笏擊賊臣今吾笏擊姦臣奮且前五坊卒夜鬥傷縣人李渤字濬之五坊卒夜鬥傷縣人鄠令崔發怒敕吏捕捽其一中人也釋之帝大怒收發送御史獄會大赦改元發以囚坐雞干下俄而中人數十持挺亂擊發敗面折齒幾死吏哀請乃去既而囚皆釋而發不得原渤上疏曰縣令曳辱中人中人歐御囚其罪一也然令在赦前而中人在赦後之置于法恐四夷聞之慢倍之心生矣白戰鬥見上注身體髮膚受之父母不敢毀傷孝經傷人及盜抵罪漢書雖未及死且莫能傷君子不重傷面傷合則兩傷死傷橫道邴吉少卿為丞相嘗出逢清道群鬥死傷橫道吉不問史問之吉曰人相殺長安京兆尹所職宰相不親小事人服其知大體也厥足用傷周禮凡過而殺傷者以民成之周禮肆其一怒合則兩傷鬥毆胥怨相傷拔戟潁考叔挾輈而走子都拔戟而逐之折臂三公羊祜字叔子既奮李陽之拳乃折公羊之臂折其右肱易折齒齊景公為孺子牛而折其齒公羊曰宋萬擊仇牧齒者門齒被傷求去職晉祖約士少典選舉妻無男而妒不敢違忤夜寢於外為人所傷約求去識詔不聽司直劉隗劾之宜貶黜詔又不許疻人漢博士申咸毀薛直宣子況賂客楊明疻破咸於宮門外斷鼻傷脣使不得為近侍中丞奏況及明皆大不敬棄市廷尉直議咸遇人以不義而疻者與疻人罪同況竟減死疻音侈以仗毆擊腫起清黑而無瘡𤻷曰疻敗面謝萬字萬石嘗與蔡系爭言系推萬落床冠帽傾脫萬徐起謂系曰卿幾敗我面神意自若死傷積野李陵書頭壁俱碎孔兵傷其首韋見素從帝入蜀陳玄禮之殺國忠也兵傷其首衆傳聲曰無害韋公父子獲免帝令壽王賜藥傳創傷痍之痛文粹朱敬則諫除濫刑疏金鼓之聲未歇傷痍之痛尚聞下有小過皆鞭箠流血竇軌下有小過皆鞭箠流血人見者皆重足股栗請剖心以明皇嗣不反安金藏請剖心以明皇嗣不反引佩刀自剚腹中腸出被地眩而朴后聞大驚輿致禁中見忠門毆折一指隱太子傳秦府屬杜如晦騎過尹妃父門恚其傲率家僮捽毆折一指父懼即使妃前訴秦王左右暴其父帝不察大怒詰王曰兒左右乃凌我妃家況百姓乎狙盜發射李石傷見寇賊門瘡猶未平李密將如黎陽或曰向殺翟讓世績傷幾死瘡猶未平今可保乎白置堇國語驪姬置堇於肉注堇烏頭也飲鴆而死地墳藥驗犬斃祭地申生獻胙公祭地地墳與犬犬斃秦人毒涇上流師人多死晉侯帥諸侯伐秦害物之心毒人之罪害人聚毒苞藏禍心合聚毒藥噬臘遇毒羊叔子豈鴆人者乎羊祜遺陸抗藥抗曰云云孔舌壞而死五代李金全為安遠軍節度使金全左都押衙胡漢榮用事所為不法高祖患之為選廉史賈仁沼代之且召漢榮漢榮教金全留已而不遣金全客龐令圖諫曰宜納仁沼而遣漢榮漢榮聞之夜使人殺令圖而鴆仁沼舌壞而死吮血得解田令孜置酒會諸將黃頭將郭琪不肯飲曰軍容能易偏惠均衆士誠大願也令孜目曰君有功邪答曰戰黨項薄契丹數十戰此琪之功令孜嘻怒曰知之密以鴆注酒中琪飲已馳歸殺一婢吮血得解地黃酒馮球為相國餗門人有奴頗橫馮愛賈召奴責之奴泣謝未幾馮晨謁賈未出有二青衣齎錫瓶出曰公恐君寒奉地黃酒三杯馮悅盡舉之俄病渴且咽因暴卒唐史柳玭傳鴆殺之梁臣劉鄩尹皓段疑等素惡鄩乃譖之以為鄩與友謙親家故其逼留以養賊已而鄩兵數敗乃罷鄩歸洛陽鴆殺之夜宴毒酒而進之隱太子建成等召秦王夜宴毒酒而進之王暴疾衉血數升淮安王扶掖還宮帝問疾因敕建成秦王不能酒毋夜聚白厚誣君子鄭賈人曰吾小人不可厚誣君子興旡妄之辭明巧訴之咎無載爾僞作僞心勞飾虛憑虛行詐情僞詐謀姦計僞言詐僞之心禮爾詐豫欺矯誣反坐反受其殃月令枉撓不當云云誣善之人其辭游巧言如簧鑠金之口辭為憑虛罪宜閲實君子之道焉可誣也宣詔年八十已上非誣告殺傷人皆勿坐漢以其罪罪之行僻而堅言僞而辨孔讎家誣蔑桓彥範字士則王同皎謀誅三思事泄三思誣彥範等同逆陰令許州司功參軍鄭愔上變三思又疏韋后隱穢榜於道請廢之帝震怒三思猥曰此殆彥範輩為之命御史大夫李承嘉鞫狀物色其人承嘉即奏彥範敬暉張柬之袁恕巳崔元暐暴訕搖變內託廢后而實危君人臣無禮當伏誅詔有司議罪大理丞李朝隱執奏彥範等未訊即誅恐為讎家誣衊酷吏誣籍崔元暐遷鳳閣侍郎先是酷吏誣籍數百家元暐開陳其枉后感寤為原死脅假憂死韋陟安祿山陷洛陽弟斌沒賊國忠欲構陟與賊通密諭守吏令脅陟使憂死州豪傑共說曰昔張說被竄匿張氏以免今若詔書下誰敢庇公願公乘扁舟遁去事寧乃出不亦美乎陟慨然曰命當爾其敢逃刑因謝遣堅臥不出誣反宋申錫字慶臣帝惡宦官王守澄典禁兵偃蹇察申錫忠厚因召對俾與朝臣謀去守澄京兆尹王璠漏言守澄遣軍侯豆盧著誣告申錫反初議抵死於是左散騎常侍崔元亮等伏殿陛請以獄付外帝震怒叱曰吾與公卿議矣卿屬第出元亮等執據愈切涕泣懇到由是貸申錫於嶺表舉疑似衊染崔元略授戶部侍郎京兆劉栖楚劾元略前造東渭橋縱吏增估物不償直取工徒贓二萬緡詔奪一月俸於是栖楚規相位疑元略妨己路故舉疑似衊染之誣沒官錢裴延齡京兆尹李充指延齡專以憸僞罔上延齡捕充所善吏張忠榜掠之誣充沒官錢五十萬緡以餌結權幸令妻以犢車載金餉陸贄忠具獄其母投訴光順門匭有詔御史番劾一夕得狀乃釋忠楊炎以劉晏劾載已坐貶乃出晏忠州用庾準為荊南節度使誣晏殺之朝野側目李正已表請晏罪炎懼乃遣腹心分走諸道聲言宣慰而實自辨解言晏往嘗傳會姦邪謀立獨孤妃為后帝自惡之非它過也劾發民浚渠嚴郢字叔敖曰京師天下聚論徒者至廣例不覆讞令若悉待報有司斷決有程月不啻五千獄正恐牒案填委章程紊撓且旁及近邊犯死徒流者若何為差請下有司更議楊炎惡異已諷御史劾郢匿發民浚渠使怨歸上繫金吾長安中日數千人遮建福門訟郢冤告與虜通竇參字時中神策將軍孟華戰有功或誣以反龍武將軍李建玉陷吐蕃自拔歸部曲告與虜通皆論死參悉治出之人始屬望陰交皇甫無逸字仁儉皇甫希仁儉人也誣告無逸為母故陰交世充帝判其詐斬希仁遣給事中李公昌馳諭以誣罔論李靖為西海道行軍大總管高甑生軍繇藍澤道後期靖簿責之既歸而憾與廣州長史唐奉義告靖謀反有司按驗無狀甑生等以誣罔論誣殺忠良吉頊擢右肅政台中丞來俊臣下獄司刑當以死狀三日不下頊從武后遊苑中因間言臣為陛下耳目知俊臣狀入不出人以為疑后曰朕以俊臣有功徐思之頊曰于安遠告虺貞反今為成州司馬俊臣誣殺忠良罪惡如山國蝥賊也尚何惜於是后斬俊臣為吏誣訴狄仁傑調汴州參軍為吏誣訴黜陟使閻立本召訊異其才曰仲尼稱觀過知仁君可謂滄海遺珠類自誣服韋嗣立上書曰楊豫以來大獄屢興窮治連捕數年不絶大猾伺間陰相影響構似是之言正不赦之辜恣行楚參類自誣服勞罔陷人不測韋思謙武渙將軍田仁會誣奏御史張仁禕帝廷詰仁禕懦不能對思謙為辨其枉因言仁會營罔陷人不測者詞旨詳暢帝善之仁禕得不坐岑羲初節愍太子之難冉祖雍誣睿宗及太平公主連謀賴義與蕭至忠保護得免誣表以罪姚南仲拜義成節度使監軍薛盈珍恃權撓政不能逞因毀南仲於朝德宗惑之俄遣小使程務盈誣表以罪會南仲裨將曹文治入奏知其語則晨夜追至長樂驛及之與同舍夜殺務盈投其誣于廁坐誣罔誅孔戣遷尚書左丞信州刺史李位好黃老道數祠禱部將韋嶽告位集方士圖不軌監軍高重謙上急變捕位劾禁中戣奏刺史有罪不容繫仗內請付有司詔還御史臺戣與三思雜治無反狀嶽坐誣罔誅貶位建州司馬誣逐李實惡萬年令李衆誣逐虔州司馬誣劾以罪杜兼字處弘為濠州刺史僚宮韋賞陸楚皆聞家子有美譽論事忤兼誣劾以罪枉殺李紳字公垂始澧人吳汝納者韶州刺史武陵兄子也武陵坐贓貶播州司戶參軍死汝納家被逐久不得調時李吉甫任宰相汝納怨之後遂附宗閔黨中會昌時為永寧尉弟湘為江都尉郡人訟湘受贓狼籍身取民顏悅女斛仗觀察判官魏鉶鞠湘罪明白論報殺之議者謂吳氏世與宰相有嫌疑紳內顧望織成其罪諫官屢論列詔遣御史崔元藻覆按元藻言湘盜用程糧錢有狀娶部人女不實德裕惡元藻持兩端貶崖州司戶參軍宣宗立德裕去位紳已卒崔鉉等久不得志導汝納使為湘訟言湘素直為人訟衊大披重牢五木被體吏至以娶妻資媵結贓且言顏悅故士族湘罪皆不當死紳枉殺唐史李紳傳考訊自誣元行沖為東都副留守嗣彭王子志謙坐仇人告變考訊自誣株蔓數十人行沖察其枉列奏見原反為所搆劉憲字元度天授中奉詔按來俊臣罪憲疾其酷欲痛繩之反為所搆復坐誣枉李雍字泰和開元二十三年起為括州刺吏復坐誣枉且得罪天子識其名詔勿劾因傅以罪天寶中左驍衛兵曹參軍柳績有罪下獄雍嘗遺績馬故告溫使引雍嘗以休咎相語陰賂遺宰相李林甫素忌雍因傅以罪詔刑部員外郎祁順之監察御史羅希奭就郡杖殺之權幸所誣李勉進梁州刺史勉假王晬為南鄭令晬為權幸所誣詔誅之勉曰方藉牧宰為人父母豈以讒殺良吏乎即拘晬為請得免軍呼枉其聲殷地高仙芝傳初邊令誠數私於仙芝仙芝不應因言其逞撓狀以激帝且云常清以賊搖衆而仙芝棄陝地數百里朘盜廩賜帝大怒使令誠即軍中斬之令誠已斬常清陳尸於籧篨仙芝自外至令誠以陌刀百人自從曰大夫亦有命仙芝遽下曰我退罪也死不敢亂然以我為盜頡資糧誣也謂令誠曰上天下地三軍皆在君豈不知又顧麾下曰我募若輩本欲破賊取重賞而賊勢方鋭故遷延至此亦以固關也我有罪若輩可言不爾當呼枉軍中皆呼枉其聲殷地仙芝視常清尸曰公我所引拔又代吾為節度令與公同死豈命歟遂就死李紳帝初即位貶紳端州司馬栖楚等怒得善地皆切齒昭下百官賀逢吉唯右拾遺吳思不往逢吉斥思令告大行喪於吐蕃時人無敢言者惟韋處厚屢言紳枉折逢吉之姦諷論大逆不道宋璟韋丹將告武三思亂官以三思諷有司論大逆不道帝詔誅死璟請付獄按罪帝怒岸巾出側門謂璟曰朕謂已誅矣尚何請璟曰人言后私三思陛下不問即斬之臣恐有竊議者請斬而後刑帝愈怒璟曰請先誅臣不然終不奉詔帝乃流丹將嶺南誣告祝詛裴懷古恆州浮屠為其徒誣告祝詛不道武后怒命按誅之懷古得其枉為后申訴不聽因曰陛下法與天下畫一豈使臣殺無辜以希盛旨哉即其人有不臣狀臣何情寬之后意解得不誅邊彥溫誣安重誨趙鳳其後重誨為邊彥溫等告變明宗詔彥溫等廷詰具伏其詐即斬之後數日鳳奏事中興殿啓曰臣聞姦人有誣重誨者明宗曰此間事朕已處置之卿可無問也鳳曰臣所聞者繫國利害陛下不可以為間因指殿屋曰此殿所以尊嚴宏壯者棟梁柱石之所挾持也若折其一棟去其一住則傾危矣大臣國之棟梁柱石也且重誨起微賤歷艱危致陛下為中興主安可使姦人動搖明宗改容謝之曰卿言是也遂族彥溫等三家五代史二十八蒼繩點白傳致有罪韓瑗字伯玉褚遂良貶潭州都督明年瑗上言遂良受先帝顧託一德無二向日論事至誠懇切詎肯令陛下後堯舜而塵史冊哉遭厚謗醜言損陛下之明折志士之鋭況彼遷以來再離寒暑其責塞矣願寬無辜以順衆心帝曰遂良之情朕知之矣其悖戾好犯上朕責之詎有過邪瑗曰遂良社稷臣蒼繩點白傳致有罪昔微子既去殷以亡張華不死晉不及亂陛下富有四海安於清泰忽驅逐舊臣遂不省察乎帝愈不聽豈有知其枉濫而不為申明李嶠遷給事中時酷吏來俊臣陷狄仁傑李嗣真裴宣禮等三家奏請誅之則天仗嶠與大理少卿張德裕等覆具獄德裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉乃與德裕等列其枉狀由是忤旨出為潤州司馬抱吏呼冤五代唐景思為沿淮巡檢漢法酷而史洪肇用事喜以告許殺人景思有奴嘗有所求不如意即馳見洪肇言景思與李景交通而私畜兵甲洪肇遣吏將三十騎往收景思奴謂吏曰景思勇者也得則殺之不然將失之也吏至景思迎前以兩手抱吏呼冤請詣獄自理吏引奴與景思驗景思曰我家在此請索之有錢十千為受外賂有甲一屬為私畜兵吏索之惟一衣笥軍籍糧簿而已吏閔而寬之景思請械送京師以自明景思有僕王知權在京師聞景思被告乃見洪肇願先下獄明景思不反洪肇憐之送知權獄中日勞以酒食景思既械就道潁毫之人隨至京師共明之洪肇乃鞫其奴具伏即奏斬奴而釋景思唐舊臣李安靜為右武衛將軍武氏革命群臣皆勸進安靜獨無所請及收繫獄來俊臣問狀安靜曰正以我唐舊臣殺之可也若詰其狀吾誰欺俊臣誣殺之罪相容隱五白父為子隱子為父隱直在其中矣語子孫匿祖父宣詔父子之親夫婦之道天性也雖有患禍猶蒙死而存之成愛惜之心仁厚之志豈能違之自今子匿父妻匿夫孫匿祖安其父母皆勿坐其父母匿子夫匿妻大父母匿孫誅乃請廷尉以聞上下相蒙難以濟矣介之推掩義隱賊傳掩蔽掩惡伏藏搜慝孔子獵犯田掩不奏許圉師俄坐其子獵犯人田有辭怒而射之圉師掩不奏為人告擲帝曰宰相而暴百姓非作威福乎敬崇劾抵遂免官且情比樂羊可謂不慈傷教況罪非石厚徒云大義滅親白居易判白惡訐以為直子曰惡訐人之私以為己之直匿名告罪缿筒趙廣漢為潁川惡相朋黨乃許相訐或匿名相告罪者置缿筒令投書於其中缿筒乃瓦器也請告者名魏典農劉龜切於禁內射兔其曹張京投書言之帝匿京名送龜付獄高柔子文惠為廷尉請告者名帝怒曰吾豈妄收龜耶柔曰廷尉天下之平不敢毀法帝乃下京名各當其罪投書誹謗魏時有投書誹謗太祖欲得其主國淵字子尼請其本其書多引二京賦淵乃募讀二京賦者果得其罪人敢告王嘉上疏故事尚書希下章為煩擾百姓證驗章文必言敢告字乃下告訐發人之私孔詔許上變則天皇后武氏畏天下有謀反逆者詔許上變在所給輕傳供五品食送京師即日召見厚餌爵賞歆動之凡言變吏不得呵詰雖蕘夫耘子必親延見稟之客館敢稽留不送者以所告罪之故上變者遍天下人人屏息無敢議告其反按無狀張嘉貞武后朝為天兵使明年入朝或告其反按無狀帝令坐告者嘉貞辭曰國之重兵利器皆在邊今告者一不當即罪之臣恐塞言路且為未來之患昔天子聽政於上瞍賦矇誦百工諫庶人謗今將坐之則後無繇聞天下事遂得減死白應侯席槁史記應侯范睢任鄭安平為將降趙應侯席槁請罪秦法任人所任不善以其罪罪之秦昭王恐傷應侯意乃下令有敢言鄭安平事以其罪罪之文帝除收孥律朝錯曰罪人不孥連坐千餘家王溫舒為河內相坐之法刑法志韓任申子秦用商鞅著相坐之法三夷之刑定法令張湯趙禹條定法令作放縱所監臨部連坐之法注云部內有罪並連坐也罪不相及父子兄弟淪胥以鋪兄弟蜀志麋竺為安漢將軍弟芳為南郡與闕羽攜二叛歸孫權羽因覆兵敗竺請罪先主慰諭以兄弟不相及崇待如故也女荀氏女芝為潁川太守劉子元妻坐死何曾議云云一人之身內外受辜臣請在室之女從父母之誅既醮之婦隨夫家之罰從之妹魏郭淮伯濟妻王陵妹也陵誅妹當從罪見收羌夷胡渠帥數千人叩頭請淮表留妻淮不從妻上道五子泣血請淮淮不忍乃令追以書白司馬宣王云云宣王宥之豫則孥戮汝夏書妻盧育為冀州主簿時有士亡妻白所適夫家數日未與夫相見大理奏白並棄市育駮曰女子以接見恩生云云太祖從之兄太祖時劉廙弟與魏詡謀反當連坐陳群長文為言之太祖曰廙名臣也吾亦欲赦之乃使復位子孔融被誅二子年八歲端坐不起人問之二子曰安有巢毀而不破卵者果并見殺出妻淳于長封定陵侯坐大逆小妻及姑等六人事未發時已出或改嫁翟方進何武以犯時為論廷尉孔光曰夫婦義合云云詔從光議子妻魏母丘儉誅子妻荀氏應坐同程咸議云云孔坐誅則天皇后武氏臨朝韓王元嘉與魯王靈夔等皆自殺餘悉坐誅諸王牽連死滅殆盡子孫雖嬰褓亦投嶺南從不應死吳湊元載當國久愎狀日肆帝陰欲誅未發也顧左右無可與計即召湊圖之俄而收載賜死於是王縉楊炎王昂韓會包佶等皆當坐湊建言法有首從從不應死一用極刑虧德傷仁縉等由是得減死父子連坐齊浣字洗心謂蒲州司法參軍有父子連坐論死者浣曰條落則本枯奈何俱死議貸其父太守不聽固爭卒原之衣冠多坐畢搆字隆擇為左御史大夫會平諸韋治其黨衣冠多坐搆詳此輕重皆得其情此本湜謀崔湜帝誅蕭至忠等湜徒嶺外時雍州長史李晉亦坐誅歎曰此本湜謀今我死而湜生何也坐子往還繫獄荊王元景房遺愛謀反誅坐子則與往還繫獄時吳王亦抵罪高宗謂大臣曰朕欲從公丐叔及兄死兵部侍郎崔敦禮曰陛下雖申恩不可詘天下法遂賜死李峴初東京平陳希烈等數百人待罪議者將悉抵死帝意亦欲懲天下故崔器等附致深文峴時為三司獨曰法有首有從情有重有輕若一切論死非陛下與天下惟新意且羯胡亂常誰不凌汙衣冠奔亡各顧其生可盡責耶陛下之親戚勳舊子若孫皆血鈇砧尚為仁恕哉書稱殲厥渠魁脅從罔治況河北殘孽劫服官吏其人尚多今不開自新之路而盡誅之是堅叛者心使為賊致死困獸猶鬥況數萬人乎固爭數日乃見聽衣冠蒙更生新唐史白許相代後漢陳志字伯如為尚書奏母子兄弟相代死聽赦所代者皆施行范曄以為不善人多宰人常代其禍進退無據母兄安帝時尹次玉殺人兄初軍請代命因縊而死故尚書陳志以罪疑輕議活次玉應昭駮主議曰天討有罪五刑五用哉邵忽死子紏孔子曰如經於溝瀆朝父非錯班固云不如趙母指括全宗今殺無罪之初軍法當死之次玉此謂求生非謂代死也孔孔璋願代雍死李雍字太和素輕張說與相惡會他人告雍賊貸枉法下獄當死許昌男子孔璋上書天子曰伏見陳州刺史雍剛毅忠烈難不苟免往者折二張之角挫韋氏之鋒雖身受謫屈而姦謀沮解即雍有功於國且雍所能者拯孤恤窮救乏酬惠家無私聚令聞坐贓下吏死在旦夕臣聞生無益於國者不若殺身以明賢臣願以六尺之軀膏鈇鉞以代雍死臣知有雍雍不知有臣疏奏減死獄內亡囚竇參字時中為萬年尉時同寮有直官曹者將夕聞親疾請參代之會獄內亡囚步京兆尹按直簿將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之舊唐史白效天生殖傳曰為溫慈惠和以效天之生殖長育勝殘去殺善人為邦百年肆大眚春正月肆大眚赦其罪也眚災肆赦眚過也災害也肆緩也言誤而肆過害當緩之好生之德洽于民心並舜典發揮生成與歲更始蕩滌邪穢納入惟新天地發生雷雨作解赦過宥罪易曰雷雨作解君子以赦過宥罪在宥莊子聞在宥天下籥動王充論衡曰赦令將至繫室而動言有感也太恩東觀漢記漢章東狩永和二年晉惠南郊元康六年並大赦歡心欣戴悅隨開釋昭蘇滌惡蕩穢蹈德諫仁弛秋霜之嚴威流春澤之渥恩文選殷湯解綱四面霈然之澤漢景措刑萬物霑雷雨之仁四海及蓼肅之澤天慈有裕玉澤無偏然則政惟圖大法在廷中習以生常則起為奸之敝廢而不用何成作解之恩宜思委轡之懷兼追解網之德數則不可無之亦難赦者奔馬之委轡也青繩之澤除舊市新仁必好生政焉用殺渙汗之恩緩死好生蓼蕭澤及四海也詩過市周禮國君過市刑人赦苟有以藉手鮮不赦宥大國討小國也赦前事平詔曰赦令改行潔巳有司多舉赦前事非重刑灑心自新之意也勵精更始宣詔曰隱赦行刑後漢周紆字文通刻削少恩為渤海太守每赦到輒隱蔽行刑罪畢乃出赦書坐免官知將有赦張成善風角推知當有赦教子殺人李膺為河南尹收捕既而逢宥應愈懷忿竟按殺之不肯出獄張盤字子石為交趾太守時度尚僞言蒼梧賊入荊州盤下廷尉會赦見原不肯出獄曰亢對曲直尚不徵盤埋骨牢檻終不虛出於是徵尚尚到辭窮決罪偏枯之物蜀志孟光責費禕曰赦偏枯之物非明世宜有今上仁賢百僚稱職有何旦夕危負以惠奸宄禕顧謝而已蒼蠅集筆端符賢為赦令密議王猛進紙墨有大蒼蠅聲甚厲集筆端驅而復來俄而長安中相告有赦推窮言云有一小兒青衣於市呼之須臾不見得非向者此之告乎皇澤三赦一幼弱二老耄三愚蠢封三錢之府陶朱公故人莊生謂楚王曰某星害楚德可除之王使封三錢之府注黃白赤金也將赦慮人知有切盜云云楚莊王赦鄭伯見其肉袒也懲惡訓俗實任於嚴科宥罪恤辜義深於緩獄緬鏡前古莫不攸遵雷雨作解聖人開赦過之門肆眚騰文先王明録刑之典慶洽普天恩洽率土浹歡躍於九域飛渙汗於萬方烏啼叩閣宋元康中徙彭城王義慶時為江州相見而哭文帝聞而怪之徵遠宅義慶大懼妓妾夜聞烏啼聲叩閣云明日有赦後改為南州因作烏夜啼曲不用赦赦權時之宜非常典也荀悅漢紀云小惠不行無忘武侯之議華陽國志諸葛亮時有言惜赦者亮曰為政以大德不以小惠故匡衡不願為赦先帝亦言治亂之道悉矣曾不及赦大利是務盍遵管氏之言管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者奔馬之委轡也無赦者若痤疽於礦石委轡必顛覆也礦石療疾也屬禍亂之際則貴自新晉成帝詔曰令赦天下使得自新當休明之朝豈勞更始漢紀漢承兵革之後比屋可刑故申以大赦之命滌蕩穢流與人更始時制然也永業者則不然且事宜稽古政貴相時滌惡蕩穢雖權道之攸宜利淫惠姦豈幸門之可啓請思礦石無誘幸門則朱公之子無所用金陶朱公子犯法令中子用金求赦張成之男焉能倳刃見上注人之多辟大為防而猶踰邦有常刑小不忍而為亂唯願無赦後漢吳漢字子顏病甚上親問之曰唯願無赦有常無赦惠者人之仇讎法者人之父母管子凱風無私養之暖朝雲無偏注之潤凡作刑罰輕無赦孔小人之幸劉子知幾上書譏每歲一赦或十歲再赦小人之幸君子之不幸紓多難收群心陸贄興元赦令方具帝以槁付贄使商討其詳贄知帝執德不固困則思治泰則易驕欲激之使強其意曰欲紓多難收群心惟在赦令而已動人以言所感已淺言又不切人誰肯懷易曰聖人感人心而天下和平夫感者發於心而形於事事或未喻故宣之於言言必顧心心必副事三者相合乃可求感惟陛下先斷厥志以施其辭度可行者而宣之不可者措之無苟於言以重取悔廓然大赦劉晏子士安宦人劉清潭與嬖幸請立妃為后且言王數有符異以搖東宮時妄言晏與謀楊炎見帝流涕曰臣位宰相不能正其罪法當死崔祐甫曰陛下已廓然大赦不當究飛語致人於罪遂罷宴蒼生皆自新譙王重福神龍初韋庶人譖與張易之兄弟陷重潤貶濮州員外刺史徙合均二州景龍三年中宗親郊赦天下十惡者咸宥流人得還重福不得歸自陳蒼生皆自新而一子擯棄皇天平分固若此乎不報赦令國大事太宗順聖皇后長孫氏疾稍亟太子欲請大赦汛度道人祓塞災會后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈宜以吾亂天下法太子不敢奏以告元齡元齡以聞帝嗟美而群臣請遂赦帝既許后固爭止澡蕩群罪天下蒙恩咸得自新陳子昂奏入科比大赦澡蕩群罪天下蒙恩咸得自新甕藏北斗僧一行長於數所善王生其子以殺人繫獄求救於一行一行曰吾以數推之當有赦矣遣其徒授以布囊戒令某處廢園伺之有物來其數七共捕之以囊攜來勿脫也至晡時有七豕入園盡獲之一行置之大甕中密覆封以太一泥朱書梵字志之太史奏北斗不見召一行問之曰莫若大赦從之其夕太史奏見大星如故酉陽與天下更新孫伏伽諫曰陛下制詔曰常赦不免皆原之此非直赦有罪是亦與天下更新辭也以更赦免徐有功有韓紀孝者受徐敬業僞官巳物故推事使顧仲琰藉其家詔巳報可有功追議曰律謀反者斬身亡即無斬法無斬法即不得其緣所緣之人亡則所因之罪減詔從之皆以更赦免如此獲宥者數十百姓恩布天下時有詔公罪流私罪徒以上會赦免踰百日不首者復論有功奏曰陛下寬殊死罪巳發者原之是通改過之心自新之路故律告赦前事以其罪坐之若無告言所犯終不自發如告言赦前事則與律乖令赦前之罪不自言者還以法論即恩布天下而一罪不能貸臣切為陛下不取廓天地之德施雷雨之仁韋嗣立拜鳳閣舍人時刑濫及善人乃上書曰願陛下廓天地之德施雷雨之仁取垂拱以來罪無輕重所不赦者普皆原洗死者還官生者霑恩則天下瞭然知向所陷罪非陛下意恩被天下流昆蟲張仲方鄠令崔發以辱黃門繫獄逢赦不見宥仲方曰恩被天下流昆蟲而以行御前乎發由是不死聞者感泣思奮陸贄李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力蓋贄有助焉犯盜馬璘邠寧節度使元日有卒犯盜或曰宜赦璘曰赦之則人將伺其日為盜遂戮之五色雲間鵲飛鳴天上來傳聞赦書至卻放夜郎回李白憶舊遊遷者追回流者還韓文赦書一日行萬里罪從大辟皆除死遷者追回流者還滌瑕蕩垢清朝班德音釋輕繫囚明宗紀赦嗣復李德裕字文饒帝嘗疑楊嗣復李玨顧望不忠遣使殺之德裕知帝性剛而果於斷即率三宰相見延英嗚咽流涕曰昔太宗德宗誅大臣未嘗不悔臣欲陛下全活之無異時恨使二人罪惡暴著天下共疾之帝不許德裕伏不起帝曰為公等赦之德裕降拜升坐帝曰如令諫官論爭雖千疏我不赦德裕重拜因追還使者嗣復等乃免邵說相州安陽人大曆末上言天道三十年一小變六十年一大變祿山思明之難出入二紀多難漸平向之亂今將變而之治宜建徽號承天意而方謁郊廟大赦各一誠恐雷雨之施未晉鬱結之氣未除願因此時翛享獻款郊廟褒有德録賢人與天下更始振災益壽之術不納薛存誠拜御史中丞浮屠鑒虛者自貞元中關通賂遺倚宦豎為姦會坐于頔杜黃裳家事逮捕下獄存誠窮劾之得贓數十萬當以大辟權近更保救於帝帝有詔釋之存誠不聽明日詔使詣臺諭曰朕須此囚面詰非赦也存誠曰獄已具陛下陛下必欲召赦之請先殺臣乃可不然臣不敢奉詔鑒虛卒抵死草赦令群承慶字延休張易之誅承慶以素附離免冠待罪時議草赦令咸推承慶召使為之無撓色誤辭援筆而就慶賞之餘柳宗元字子厚貶永州司馬雅善蕭俯詒書曰儻因賊平慶賞之餘得以見白使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物不虛為太平人望外之澤又詒許孟容曰今其黨與幸獲寬貸得善地無公事坐食奉祿德至渥也尚何敢更俟除棄廢痼希望外之澤駮赦論五代張允晉高祖即位屢赦天下允為駮赦論以獻曰管子曰凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢之吳漢疾篤帝問漢所欲言漢曰惟願陛下無赦爾蓋行赦不以為恩不行赦不以為無恩罰有罪故也自古皆以水旱則降德音而宥過開狴牢而出囚冀感天心以赦其災者非也假有二人之訟者一有罪而一無罪若有罪者見捨則無罪者銜冤此乃致災之道非救災之術也至使小人遇天災則皆喜而相勸以為惡曰國將赦矣必捨我以救災如此則是教民為惡也夫天之為道福善而禍淫若捨惡人而變災為福則是天亦喜人為惡也凡天之降災所以警戒人主節嗜欲務勤儉恤鰥寡正刑罰而已是時晉高祖方好臣下有言覽之大喜聖德廣運浹于華夷天光下臨照彼幽蟄劉禹錫賀赦表網開三面危疑者許以自新照達四聰瑕穎者期於録用歡謠上徹于九天福祚永延于億載同上發號之始疾於春風殊私所及沛若時雨同上澤及八荒網開三面賀表同上農有薄征市無彊價勳勤是録爵秩以班柳宗元賀赦表又爰褒有客尊賢之典惟新載奉素王宗教之道斯在滌濯鏟磢磨滅瑕垢韓愈元和聖德詩幸丹鳳門大赦天下滌濯鏟磢磨滅瑕垢續功臣嗣拔賢任耇孩養無告仁滂施厚文集卷第一發號出令雲行雨施懼刑政之或差憐鰥寡之重困賀表韓文生恩既及於四海和氣遂充於八紘同上恩浹幽明慶溢寰海同上賀表德音朝發于九天和氣夕周于九海劉禹錫改元赦狀布惟新之令陸宣公敷肆眚之恩布惟新之令宣揚之際聞者莫不流涕陸贄奏議德音煥然以之更始所在宣揚之際聞者莫不流涕雖或凶獷匪人亦為之歔誠之動物乃至于斯懷梟鴟以好音消祲沴為和氣罷兵狀帝命出皇恩普文粹蘇頲東嶽朝觀頌序乃建雞竽伐鼉鼓帝命出皇恩普揚巽風作解雨玄衣素襟人報赦貞觀中黎景逸嘗居空青山有鵲巢其庭每以餘食飼之甚馴熟後景逸出仕被誣下獄一日有鵲於獄屋氣樓中下視景逸喜噪久之已而聞赦將下有一玄衣素襟人報赦先說赦來乃悟其鵲噪也朝野僉載九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再弘莫大之恩寶曆惟新更啓無彊之祚劉禹錫改元赦劫脅之役盡除聚斂之名皆去柳宗元東平赦表劫脅之役盡除聚斂之名皆去傷痍受煦老疾加恩豐財已復其征徭賜種更盈於穜稑嚴山川之祀神必有依申義烈之家物無不感就第放赦安樂公主産男滿月中宗韋后幸其第就第放赦天子御端門詔天下渙汗發澤與民更始建金雞於仗內聳修竿而揭起李庾西都賦以旱蝗責躬大赦太宗本紀貞觀二年正月庚午以旱蝗責躬大赦令在赦前中人在赦後李渤見鬥門一歲再赦好人喑啞太宗嘗謂群臣曰吾聞語曰一歲再赦好人喑啞吾有天下未嘗數赦者不欲誘民於幸免也唐刑法志致理興化必在推誠忘已濟人不吝改過唐文粹陸贄德宗赦文國有赦宥之事先集囚徒于闕下令衛尉樹金雞待宣制訖乃釋之唐六典后祀南郊壇南有大檞樹赦日置雞其杪賜號金雞樹武后傳楊恭仁為涼州總管瓜州刺史賀拔行威叛朝廷未即討恭仁募趫勇倍道進賊不虞其來遂克二城縱所俘還之衆感悅遂相與縳行威降覬其匍匐相率降款盡至廣務寬大用明惡殺之德杜甫寬集餘衆悉原盧鈞字子和兼節度昭義軍會劉稹死敕乘驛往進檢校兵部尚書專領昭義鈞及潞石雄兵已入而稹將白惟信率餘卒三千保路城未下雄召之使往十餘輩皆死鈞次高平惟信獻款且曰不即降者畏石尚書爾鈞與約而遣石雄欲盡夷潞兵鈞不聽坐治堂下左右皆雄親卒擊鼓傳漏鈞自居甚安雄引去乃召惟信至送闕下餘衆悉原素服乘驢五代王師範梁別將留重霸下其棣州師範乃請降太祖許之師範素服乘驢詣太祖請罪太祖待以客禮江南李景世宗以江南不聽命者嚴續之謀陳覺勸景誅續以謝罪景乃遣鍾謨入朝言不割地者非續謀願赦之白申恩屈法宥過無大刑故無小罪疑惟輕虞書赦小過孔子曰獄貴哀矜法宜開釋議事原情在宥莊子曰聞在宥天下矣未聞理天下獲宥情非抵冒政尚宛仁眚災肆赦注見赦門君子以赦過宥罪易自新史緹縈上書曰妾傷夫死者不可復生雖欲改過自新其道無由文帝哀之下詔除肉刑察貴用情恕宜及物三宥三赦周禮司刺掌三赦三宥之法一宥曰不識再宥曰過失三宥曰遺忘注不識者謂愚者無所知識也三赦見上赦門注克寬克仁不知不慍居上不寬人之過也各於其黨觀過斯知仁矣語免於刑戮恕而已矣仁遠乎哉孟夏出輕繫輕罪者放出之禮曰有旨無簡不聽簡誠也有其意無其誠不以為罪也附從輕附施刑也求出之故從輕赦從重雖是重罪猶赦之不赦過禮凡執禁以齊衆不赦過小不忍而恐亂安可容姦計過求瑕肆眚申恩傳肆大眚三細不宥言三犯罪罪雖小不宥也守正名之義當准法論念觀過之人則宜情恕況當弘貸之朝宜用哀矜之典貸法臣無敢作福誠為撓法豈曰愛人且政先執禁教在知防宥汝愛人違法者若可原情畜奸者盡求幸免若踰矩之人如可捨也則防姦之法將焉用之若寬前定之法恐誘後來之姦孽既可逃法將焉用坻冒猶或哀矜過失誠宜開釋奴誤射殺子不誅宋則事具恕門羹爛汝手見上寬恕門孔馳騎宥罪李勉字玄卿關東獻俘百將即死有嘆者勉過問曰被脅而官非敢反勉入見帝曰冠冕之汙半天下其欲澡心自歸無由如盡殺之是驅以助賊也帝馳騎宥罪後歸者日至父病為蠱求厭為江西觀察使有父病為蠱求厭者以木偶署勉名埋之掘治驗服勉曰是為其父則孝也縱不誅桓彥範內史李嶠等屢奏往為酷吏破家者請皆宥雪依違未從彥範復上言自文明後得罪惟楊豫博三州不免它可悉赦疏十上卒見聽平宥蕭穎士字茂挺父旻以莒丞抵罪潁士往訴于府佐張惟一惟一曰旻有佳兒吾以旻獲譴不憾乃平宥之全宥甚衆裴度自中立申光平定度入朝會帝以二劍付監軍梁守謙使悉誅賊將度遇諸郾城復與入蔡商罪議誅守謙請如詔度固不然謄奏申解全宥者甚衆屈突通仕隨為虎賁郎將文帝命覆隴西牧簿得隱馬二萬匹餘見濟活囚徒門岐州亡卒狄仁傑岐州亡卒數百剽行人道不通官捕繫盜黨窮訊而餘曹紛紛不能制仁傑曰是其計窮日為患乃明開首原格出繫者稟而縱之使相曉皆自縳歸帝嘆其達權宜一切洗貸張廷圭張易之誅議窮治黨與廷圭建言自古革命務歸人心則以刑勝治今唐曆不移天地復主宜以仁化蕩宥且易之盛時趍附奔走半天下盡誅則已暴罰一二則法不平宜一切洗貸中宗納之脅從杜讓能京師平進中書侍郎官吏多汙僞署有司皆欲論死讓能以脅從不足深治固爭之多所全貸霍王元軌歷定州刺史突厥寇定州州人李嘉運潛結賊詔窮誅支黨元軌以寇近且強人心危但殺嘉運餘無所詰洗宥絀放權德輿上言近陛下洗寡絀放者或起為二千石其徒更相勉知牽復可望惟因而弘之使人人自效帝頗采用之全活高崇文崇文拜東川節度使賊將邢泚已降而二斬于軍衣冠脅汙者詣牙請命崇文為條上全活之多所甄復許敬宗字延族初太子承乾廢官屬張玄素令狐德棻趙弘智裴宣機蕭鈞皆除名為民不復用敬宗為言玄素等以直言被嫌忌今一概被罪疑洗宥有所未至帝悟多所甄復桓文弘霸功陸相奏議置射鉤之賊而任其才釋斬祛之怨以免於難此桓文所以弘霸功也必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪宥工徙遠裔蕭鈞永徽中太常工為宮人通訊遺詔殺之且附律鈞言禁當有漸雖附律不應死帝曰如姬切符朕以為戒今不濫工死喜得忠言即宥工徙遠裔凝碧詩王維字摩詰祿山陷兩都玄宗出幸維扈從不及為賊所得祿山宴其徒於凝碧宮其樂工皆梨園弟子教坊工人維聞之悲惻潛為詩云萬戶傷心生野煙百官何日再朝天秋槐花落空宮裏凝碧池頭奏管絃賊平陷賊官三等定罪維以詩聞肅宗嘉之特宥之宥過輕刑流汪濊於四海柳宗元赦表得罪當宥郭元振玄宗講武驪山既三令帝親鼓之元振遽奏禮止帝怒軍容不整引坐纛下將斬之劉幽求張說叩馬諫曰元振有大功雖得罪當宥乃赦白今是昨非朝過夕改時有不仁未虧君子過而能改則曰大賢改而勿憚悔亦可追憚改知非誰無能改善莫大焉苟有必知赦之可也先迷後得臨事雖不三思苟有必知陳首明無二過宜嘉後覺盍恕前非既反迷途請寬昭憲自新未悟改行率德有恥且格聞義不能徙不善不能改是吾憂也語子曰吾未見能見其過而內自訟者訟責也語改之為貴無循枉枉不正也不正之事不循行之徙善遠罪禮知非改過洗愆洗心不遠復既非迷復請以輕論補過無咎者善補過也顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也有過則改見善則遷有過則改益卦易象辭也負罪引慝君子以恐懼修省震卦惟受責俾如流書曰責人斯無難惟受責俾如流是惟艱哉無恥過作非書過失可徵辨不可面數禮君子能知其過必有令圖秦公子針能補過者君子也仲尼曰人誰無過過而能改過則稱已必文能改陳元改過漢仇覽為亭長有陳元者其母告元不孝覽曰昨過廬舍籬落修整此不是惡人當化未至矣親至元家為陳孝道元後改過卒為孝子周處尋師周處為鄉里所患後知之乃改行詣洛尋師見二陸也宋杲後漢宋杲性悍喜與人報讎郭林宗諭以義杲叩頭後至并州刺史林宗受賈淑之弔後漢淑性險害邑里患之林宗遭母喪淑來修弔既而孫威直後至見林宗賢而受惡人弔不進而去林宗遽追之謝曰賈子厚誠實凶德然洗心向善仲尼不逆互鄉故吾許其進也毀鴨欄陸遜伯言時建昌侯攄於堂前作毀鴨欄頭施小巧遜正色曰君侯宜勤覽經典以自新何用此為攄即時毀之遷善易應詩人補袞之歌順周易牽復之義文選改轍孔狄仁傑武后謂曰有譖卿者謝曰陛下以為過臣當改之狄本傳過弗諱改元結上時議曰前日天子恨愧陵廟為羯逆傷汙憤悵上皇南幸巴蜀隱悼宗戚見誅過弗諱改許請改圖王處存子郜以其族奔太原使處直主留後全忠亦至處直辭曰弊邑奉上未嘗不忠事鄰未嘗不禮弗虞君之見攻也全忠責何故事克用答曰太原藉兄弟之舊修好往來常道也君苟為罪請改圖全忠許之陸贄上書曰人誰無過過而能改善莫大焉仲虺歌成湯之德曰改過不吝吉甫美宣王之功曰袞職有闕仲山甫補之夫成湯聖君也仲虺聖輔也以聖輔贊聖君不稱其無過稱其改過周宣中興賢王也吉甫文武賢臣也歌誦其美不美其無闕而美其補闕則聖賢之意貴於改過較然明甚蓋過差者上智下愚所不免惟賢者能改而之善愚者恥而之非也九弊又九弊恥聞過上之弊也悔過不得不深又悔過不得不深引咎不得不盡知過趙景字退翁自言薦果州刺史韋證以貪敗請降考校考使劉滋謂璟知過規切陸羽字鴻漸見有過者規切至忤人率德改行李雍下獄當死孔璋上書天子曰伏惟陛下寬雍之死使率德改行白席槁應侯范睢失舉席槁請罪免冠伏斧鑕梁孝王既刺殺袁盎請朝茅蘭說王乘布車伏闕下待罪蘭大夫也季孫練冠麻衣跣行傳晉責季孫意如逐昭公意如待罪籍槁玉音坐槁以就刑也有罪不逃刑導囚走陳首孔禮字德達嘗受馬台恩台坐法當死禮私導今踰獄而自首太祖減罪一等逃亡自首晉王坦之文度卒士韓帳逃亡歸首云失牛故叛有司劾帳盜牛考服罪坦之以帳束身自歸遂原罪敢逃刑命傳范滂後漢誅黨人范滂曰詣獄縣令欲與解逃滂曰何故纍君令老母流離乎又巴肅事同范滂徒罪長沙負荊孔不敢入謁唐惠宣太子業母早終從母賢妃鞫之妃弟與皇甫恂妄言休咎妃恐降服待罪業不敢入謁帝聞遽召之業伏殿下帝諭妃復位入朝羸服渾瑊為會盟使為尚結贊所劫副使崔漢衡以下皆陷惟瑊得免自奉天入朝羸服待罪詔釋之素服待罪王承宗曰田洪正求入侍請歸德棣二州入租賦待天子署吏洪正遣知感知信詣闕下請命前此帝賜詔許自新承宗素服待罪乃詔復官爵王承宗傳泥首待罪五代張全義字國維梁亡莊宗入汴全義自洛來朝泥首待罪莊宋勞之曰卿家弟姪幸復相見全義俯伏感涕慚懼待罪嚴綬為右僕射始就廊下食在百官上帝使中人賜含桃綬見拜之為御史劾奏綬始慚懼待罪詔釋綬而貶中人伏斧鑕唐史泉男生字元德其初至伏斧鑕待罪帝宥之世以此稱焉白魏尚有罪繫獄馮唐舉之拜雲中太守胸奴畏之韓安國下獄免官後起於獄中拜梁內史張敞起亡命張敞有罪詣闕上印綬即從闕下亡命後冀州有賊盜詔敞加拜冀州刺史棄瑕録用責功補過自效重以才難許其功贖抆拭朱博子元為左馮翊詰長陵大姓尚方禁面上是何等瘡𤻷禁具首服盜人妾見斫博曰馮翊欲灑卿抆拭用卿禁曰願效死也死灰重然秦赦孟明之罪漢收竇憲之功孔柳宗元字子厚貶永州司馬雅善蕭俯詒書陳情曰鄭詹束縳於晉終以無死鍾儀南音卒獲返國叔向囚虜自期必免范痤騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自治賈生斥逐復召宣室倪寬擯厄後至御史大夫劉向下獄當誅為漢儒宗此皆環偉博辨奇壯之士能自解脫今以恇怯淟涊下材末技又嬰痼病雖欲慷慨攘臂自同昔人愈疏闊矣使功不如使過李靖字藥師開州蠻冉肇則寇蔓州趙郡王孝恭戰未利靖率兵八百破其屯要險設伏斬肇則俘禽五千帝謂左右曰使功不如使過靖果然澡濯用之劉禹錫字夢得始坐叔文貶者八人憲宗欲終斥不復乃詔雖後更赦令不得原然宰相哀其才且困將澡濯用之會程异復起領留務乃詔禹錫等補遠州刺史流移之人皆不得棄放妻妾及私遁還鄉至六載然後聽仕即本犯不應流而特配焉者三載以後聽仕唐六典恕十四白夫子之道忠恕而已矣已所不欲勿施於人子貢問曰有一言而可以終身行之者乎子曰其恕乎云云作不順而施不恕仲尼謂臧武仲順事恕施尊賢而容衆嘉善而矜不能君子先人後己禮如恕老子曰以身觀身克寬克仁不知不慍仁遠乎哉包荒言包含荒穢也易國君含垢天之道也傳爾無忿疾于頑必有忍其乃有濟有容德乃大書躬自厚而薄責於人掩匿細過漢曹參見人有細過掩覆匿蓋之嘔丞相車茵見寬恕門羹爛汝手見寬恕門奴誤射死子不誅宋則子年十歲與蒼頭共弩射弦斷矢激誤中則子死則恕不誅荀爽美之孔治獄主仁恕崔仁師為殿中侍御史時青州有男子逆謀有司捕支黨纍纍填獄詔仁師按覆始至悉去囚械為具食飲湯瀋以情訊之坐止魁惡十餘人它悉原縱大理少卿孫伏伽謂曰原雪者衆誰肯讓死就決而事變奈何仁師曰治獄主仁恕故諺稱殺人刖足亦皆有禮豈有知枉不伸為身謀哉使吾以一介易十囚命固吾願也及敕使覆按諸囚咸叩頭曰崔公仁恕必無枉者舉無異辭由是知名過漢于張徐有功或稱有功仁恕過漢于張起居舍人盧若虛曰徐公當雷霆之震而能全仁恕雖千載未見其比時稱平恕狄仁傑稍遷大理丞歲中斷久獄萬七千人時稱平恕活無罪數百人李憲性明恕詳正大獄活無罪者數百人以恕自將內挫虐焰徐有功贊處猜后酷吏之間以恕自將內挫虐焰不使天下殘於燎可謂仁人也哉愛恕之譽一旦出呂諲崔器上李栖筠擢殿中侍御史李峴為大夫以三司按群臣陷賊者表栖筠為詳理判官推原其人所以脅汙者輕重以情悉心助峴故峴愛恕之譽一旦出呂諲崔器上白盜金漢直不疑同舍郎亡金疑不疑不疑乃買金償之後乃明也認馬卓茂字子康為丞相史出行有人認其馬心知其誤默解與之牽車而去謂之曰汝若自得馬當以此馬詣丞相府將來主得馬乃詣府叩頭謝還之盜絳陳重在郎署有郎誤持鄰舍郎絳去主疑重重不自申說市絳還之後郎還絳事乃白認牛劉寬字文饒為司徒有人失牛就寬車中認之寬下車步歸有得牛者謝曰慚負長者寬曰物有相類事容錯誤幸勞見歸何謝之有認豕魏曹節字元偉鄰人有亡豕者與節豕相類詣門認之節不爭後主得亡豕乃慚送謝節節乃笑而受之失脯晉乘虞字子深嘗宿逆旅同舍失脯疑虞盜之虞解衣償之主人曰多恐狐狸偷去乃將脯主至冢聞得脯客還虞衣虞投而不顧冰下得犢朱沖字巨容少有至行鄰人失犢認沖犢以歸後得犢於冰下大慚以犢還沖沖竟不受似是而非認稻鍾離牧字子幹墾田二十畝臨熟縣人認之遂以稻與之縣長乃民繫獄牧為之請長曰君慕承宮僕自行法牧遂出裝還山陰長釋民自止之民慚春稻得六十斛米還牧牧不受民置於道旁無取者開荒被認郭翻長翔家貧無業欲墾荒田先表題經年無主然後作及將熟有認之者悉推與之宰令聞以稻還翻翻不受認禾承宮字子少避地於象陰山耕種禾黍得熟人有認之者宮不爭推與之也盜璧張儀蛇酒孔李藩杜亞居守東都表置府中亞嘗疑牙將令狐運為盜掠服之藩爭不從輒去後果獲真盜物色驗之唐史張允濟仕隋為武陽令過道傍有姥廬守所蒔蔥因教曰弟還舍脫有盜當告令姥謝歸俄失亡蔥允濟召十里內男女盡至果得盜者白罪分故誤罰有等差法有誤論過宜情恕情匪誣欺法嘗開釋必先問罪方可原情事雖乖於審慎情直異於矯誣失傳得罪失辭失口闕疑面欺誠非巧詐之辜謂寬過誤之戾事雖昧於三思過宜寬於無簡慎非石氏雖慚數馬之能設比鍾離宜恕賜縑之謬恕而已矣仁遠乎哉誤宣後漢有兄弟殺人詔報兄重而減弟死孫章誤言兩報重尚書奏章矯詔當斬郭躬曰章應罰金傳命之誤其文輕帝美之奏對夏侯勝質朴見時謂上為君誤相字於上上以是親信之也以十為百後漢詔賜降胡縑以十為百帝怒將笞郎僕射鍾離意字子阿曰過誤之失常人所容若懈怠為僣則臣位大罪重當先坐乃解衣就格帝意解乃復孔過誤楊纂貞觀初為長安令有告女子袁妖逆者纂按之情不得袁敗太宗惡其不忠將殺之中書令溫彥博以過誤當宥乃免誤拂御衣郝處俊曰臣之弟處傑被擇供奉時有三衛誤拂御衣者懼甚先帝曰左右無御史我不汝罪帝曰此史臣應載臨敵捨敵無殺文粹皮日休漢斬丁公論丁公臨敵捨敵無殺誠惻隱之者高祖斬之果不為當臣子於尊極不稱誤戴胄長孫無忌被召不解佩刀入東上閣門封德彝論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子於尊極不稱誤法著御湯劑飲食舟船雖誤皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑文字誤十七白書馬闕文責寧加於石建石建為郎奏事事下驚恐曰書馬與尾五四獲譴死矣其懼慎如此今賜縑過數罪亦捨於鍾離見上注五而闕一十以為百一馬之闕二豕之疑亥豕之疑魯魚之誤移文有誤不以文害意堂以簿書誤於文字寧免毫釐之差不容筆削之改蹖駮紕繆闕疑改正闕文吾猶及史之闕文也失傳有司失其傳也文不加點辨魯非魚孔封敕脫誤蕭倣李燧為嶺南節度使使者已賜節而倣封還詔書帝方作樂不瑕命使遣優工輒出追之未及燧所而還後以封敕脫誤法當罰侍講孔溫裕曰給事中駮奏為朝廷論得失與有司奏事不類不應罰詔可令坊州貢杜若國史纂要貞觀中度支令坊州貢杜若本州曹官云本州不出杜若應由謝眺詩誤爾華省名郎若如此判事豈不畏二十八宿笑人耶改根為銀尚書故實韓昶愈之子雖教有義方而性頗暗劣嘗為集賢校理史傳有金根車而昶以為誤悉改根為銀後除拾遺坐此言罷制敕既行有誤則奏改之唐百官志中書舍人其禁有四四曰忘誤制敕既行有誤則奏改之弄獐之慶唐舊史玄宗朝宰相李林甫無學術太常少卿姜度妻誕子林甫手書慶之曰聞有弄獐之慶客視之掩口録詩一字誤皇甫湜其子録詩一字誤嚙臂血流白警巡西京賦云警夜巡晝夜事周禮謂夜警守之事三巡周禮掌固晝三巡注巡行以警慎也夜三鼜以號戒鼓也謂夜三擊鼓以巡戒之也鼜音戚灞亭夜獵李廣將軍夜獵還灞陵亭長呵叱之周禮禁行作不時者謂晨行者國禁官禁天術知禁犯禁司寤氏掌夜時謂早晚時也周禮以星分夜以詔夜士夜禁禁行也夜士巡夜之士御星行者禁宵行者游者御亦禁也厭浥行露豈不夙夜謂行多露詩禁御抵冒街禁國章扞掫行諸宵夜夜禁是干必先問罪宵行有故似可徵辭將軍尚不得夜行霸陵亭吏呵叱廣廣騎曰故李將軍曰今將軍尚不得夜行何故為也云云廣宿亭下受書犯夜晉三丞字安期為東海太守政尚清靜有犯夜者曰從師受學不覺日暮丞曰鞭撻寧越以立威名恐非教化之本使吏送歸家誰何殺之魏瞞傳曰太祖為洛陽北部尉造五色棒縣門左右各十餘枚犯禁者不避豪彊杖殺之愛幸黃門蹇石叔父夜行太祖殺之孔軍士干禁王重榮太原祁人與兄重盈皆以毅武冠軍擢河中牙將主伺察時兩軍士干禁捕而鞭之士還訴於中尉楊玄實玄實怒執重榮讓曰天子瓜士而藩校辱之答曰夜半執者姦盜孰知天子瓜士具言其狀玄實嘆曰非爾明辨孰由知之更諉於府擢右署醉觸夜禁劉貞亮憲宗之立貞亮為有功然終身無所寵假郭旻醉觸夜禁杖殺之由是莫不懾畏晨夜有行必問晨夜有行必問不應則彈弓而嚮之復不應則旁射又不應則射之折衝唐史百官志夜醉為邏卒擊折其齒溫庭筠丐錢楊子院夜醉為邏卒擊折其齒
