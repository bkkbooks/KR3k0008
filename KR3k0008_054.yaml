body:
  text: 卷第五十四水戰一白爭舟楫之利我得上流何故不克楚司馬子魚曰燒浮橋後漢公孫述遣任蒲田戎據荊州橫江作浮橋鬥樓上攢柱絶水道岑彭募人攻浮橋魯奇應募鼓船逆流而上直衝浮橋而攢柱鉤船不得進奇乘勢因飛炬焚之橋樓崩燒船順風並進蜀兵大敗周瑜赤壁戰燒曹公舟船具火攻門注大司馬不習水戰荊門之事取決於征南後漢光武詔征南將軍岑彭司馬吳漢樓船蒙衝孫權討黃祖祖橫兩蒙衝夾守沔曰以栟櫚大枻繫石為碇上有千人以弩交射軍不得前董襲乘大舸突入蒙衝襲身以刀斷兩細蒙衝乃橫流大兵遂進追而斬之孫權舉觴屬襲曰今日之會斷紲之功穿昆明池習水戰漢武將攻昆明夷以運船為戰晉陶侃士行為江夏太守禦賊陳敏敏時寇楊州引兵西上侃乃以運船為戰艦或言不可侃曰用官船討官但須聞上爾以舟師伐楚傳晉王浚拜益州修艦作大船連舫方一百二十步受二千人木為城起樓櫓四門其上皆得馳馬往來又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有造船舟於蜀梯蔽江而下吳以鐵鎖橫截之又作鐵錐丈餘暗置江中羊祜獲諜知情濬乃作筏數十縛草為人令先行錐輒著筏去又作炬長十餘圍灌以麻油在船前過鎖燃炬燒之須臾融液斷絶船行無礙也水戰則章邯已亡其城高祖圍章邯以水灌之舟戰於江國語云越伐吳樓船將軍楊朴孔乘潮而上舳艫銜尾蘇烈為神立道大總管率師討百濟自城山濟海至熊津口賊頻江屯兵定方出左涯乘山而陳與之戰賊敗死者數千王師乘潮而上舳艫銜尾進鼓而譟定方將步騎夾引直趨真都城賊傾國來酣戰破之縱戰艦於江中河間元王孝恭蕭銑據江陵俄進荊湖道總管統水陸十二軍發夷陵破銑二鎮縱戰艦於江中諸將曰得舟當濟吾用棄之反資賊奈何孝恭曰銑之境南際嶺左薄洞庭地險士衆若城未拔而援至我且有內外憂舟雖多何所用之今銑瀕江鎮戌見艫舫蔽江下必謂銑已敗不即進兵覘侯往返以引救湖則吾既拔江陵矣已而救兵到巴陵見船疑不進銑內外阻絶遂降淠水楊行密葛從周涉淮圍壽州行密出車西門由北門去以鋭士萬一千齕雪馳迫清口不進壅淮上流灌師古軍張訓自連水來行密使將羸兵一千人為前鋒師古易之方圍碁軍中不顧朱瑾侯瓚以百騎持汴旌幟直入師古壘舞槊而馳馴亦登岓超其柵汴軍大囂即斬師古士死十八全忠聞之與從周皆遁走追及壽陽大破之叩淠水方涉為瑾所乘溺死萬餘乘輕船田頵攻趙鍠於宣州鍠出東漢乘暴流以逸阻水解甲謂追騎不能及頵乘輕船追之鍠驚遂見禽反舟順流始頵將王壇等以舟師躡神福後至吉陽磯不戰會日暮壇掩神福軍半濟神福反舟順流急擊大破之擇善游者沿汴渠夜入柏良器李希烈圍寧陵遏水灌之親令軍士日拔城良器以救兵至擇弩手善游者沿汴渠夜入及旦伏弩發賊乘城者皆死造齊雲船數百艘南周徐景初周師南征無水戰之兵已而屢敗景兵獲水戰卒乃造戰艦數百艘使降卒教之水戰命王壞將以下淮景之水軍多敗長淮之舟皆為周師所得又造齊雲船數百艘世室至楚州北神堰齊雲舟大不能過乃聞老鵲河以通之遂至大江竹笮維戰艦于河事見火攻門載灰豆江砂五年春三月命王率水師大小戰艦凡五百餘艘皆龍形自東州來趨淮甸夏四月乙巳大戰淮人于狼山江將戰之日召指揮使張元實計之曰彼若徑當避其初仍令軍中宿理帆檣載石灰黑豆江砂以隨焉翌日昧爽淮船果乘風自西北而下危檣巨艦勢若雲合我師皆避之而賦舟既高且巨不能復上我師反乘風以逐之復用小舟圍其上右賊回舟而鬥因揚石灰賊不視乃撒豆于賊我則砂焉戰血既漬踐豆者靡不顛磋因縱火油焚之吳越敗史白環人掌致師致師者致其必死之志古者將戰先使勇力之士犯敵環四方之故郤其以事謀來侵伐者所謂折衝禦侮訟敵國敵國兵來則往之與訟曲直若齊國佐如師並周禮楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰致師者右入壘折馘執俘而還席於軍門之外晉趙旃掉戰夜至楚軍席於軍門之外使其徒入之示無畏踞轉而鼓琴轉衣囊也張骼輔躒致楚師嘗寇而速去之嘗試也蹈師掉戰魏氏春秋曰諸葛亮屯渭南糧少欲速戰魏敕司馬宣王堅壁挫其鋒亮慮遣書又致巾幗以怒宣子宣王將戰辛毗仗節奉詔敕乃止巾幗婦人喪巾遺之巾幗言其無勇以悼之幗音馘孔唐太宗圍王世充於東都竇建德自河朔率兵來救太宗自率騎趣武牢建德自滎陽西上策壘干板渚太宗以五百騎出武牢將挑戰先伏李績程咬金秦叔寶令尉遲敬德執稍造建德壘大呼致師賊衆大驚撓出兵數千騎太宗逡巡漸卻遂引賊以入伏內李績奮擊大破之獲其大將殷秋石瓚斬首數百級通典引退設伏取之大呼致師尉遲敬德竇建德營板渚王命李績等為伏親挾弓令敬德執稍略其壘大呼致師建德兵出乃稍引卻殺數十人衆益進伏發大破之致人者且令其自來贊皇一品集牛僧孺等兵法云用兵者致人之師不可自致所請致人者且令其自來況虜騎倏忽往來疾如風雷不可將兵遠襲今可以計攻者緣其有家口輜重不離漢境三二百里來去未得既有定所便可為謀魏武破烏柏李靖擒頡利皆用此計糧少戰利速馬燧田悅敗走魏州李抱真問曰糧少而深入何也燧曰糧少戰利速兵善於致人今悅與災青常三軍為首尾欲不戰而老我師若分擊左右未必破悅且來助是腹心支敵也法有攻其必救故趨魏以破之皆曰善公孫上哲戰鹽城覆其軍杜伏威傳白堅臥不起漢周亞夫擊吳楚吳楚飢數挑戰終不出夜軍中驚內相攻擊至帳下亞夫堅臥不起頃之復定梁王使韓安國扞吳楚安國持重吳不得過李廣下馬解鞍李廣望胸奴于騎上山陳廣騎皆恐唯廣曰皆下馬解鞍示不去胸奴必以我為大軍誘之遂縱馬臥胡引兵去吳漢後漢吳漢軍事激怒人倍其勇賊率五千人攻漢營軍中驚亂漢堅臥不動有頃自定突擊大破之漢字子顏射酒樽王霸為後漢將賊挑戰霸不出享士倍樂賊射城中中霸前酒樽安坐不動帷中講論張奐為胸奴中郎將烏柏叛燒度遼將軍門煙火相望奐坐帷中與弟講論若無事稍安陰使斬渠帥諸胡悉降蘇秦曰任大功不輕敵據胡床指麾晉謝艾討麻秋軺車冠幘秋怒少年冠服如此輕我也命馳擊之艾左右大擾勸艾乘馬艾乃下車據胡床指麾賊以為有伏兵不敢進也射雉賊杜曾勇冠三軍周訪惡之自於後射雉以安衆心也骨鯁諸葛亮數挑戰宣王欲與戰帝欲令持重乃令骨鯁臣衛尉辛毗仗節制之乃止孔坐城門指縱部分意氣間舒呂元膺拜東都留守始都有李師道留邸邸兵與山棚謀竊發事覺元膺擒破之始盜發都人震恐守兵弱不足持元膺坐城門指縱部分意氣間舒人賴以安子儀堅壁子儀虜寇邠州先驅至奉天諸將請擊之子儀曰客深入利速戰彼下素德我吾緩之當自攜二因下令敢言戰者斬堅壁待之賊果遁將務持重李晟每與賊戰必錦裘繡帽自表指顧陳前李懷光望見惡之戒曰將務持重豈宜自表襮為賊餌哉晟曰昔在涇原士破相畏伏欲令見之奪其心爾懷光不悅持重安邊不生事王忠嗣本負勇敢及為將乃能持重安邊不生事嘗曰平世為將撫衆而已吾不欲竭中國力以幸功名疲人版築不如按甲持重哥舒曜討李希烈希烈退保許州詔城襄城曜以疲人版築不如按甲持重以挫之帝不許據城李光弼救常山次真定常山團結子弟執賊將安思義降時賊將史思明李立節蔡希德攻饒陽光弼得思義不殺問其計答曰今軍行疲勞逢敵不可支不如按軍入守料勝而出虜兵焱鋭弗能持重圖之萬全光弼曰善據城待舉動安重來瑱賊圍南陽急瑱與魏仲犀合兵救之不勝人情惱懼瑱能撫訓士舉動安重賊不得侵馭軍持重魏元忠為隴右諸軍大使以討吐蕃又為靈武道行軍大總管禦突厥元忠馭軍持重雖無赫然功而亦未嘗敗士死麻葦房管請自平賊詔琯持節招討李光進將北軍琯身中軍先鋒中軍北軍遇賊陳濤斜戰不利琯欲持重有所伺中人邢延恩促戰故敗士死麻葦常務持重以挫人之鋒周德威者將常務持重以挫人之鋒故其用兵常伺敵之隙以取勝五代史請持重以敝之哥舒翰奏言祿山雖據河朔不得人心請持重以敝之待其離隙可不血刃而擒賊將崔乾祐守陝郡仆旗鼓羸師以誘戰覘者曰賊無備可圖也帝信之詔翰進討翰執曰祿山習用兵今始為逆不能無備是陰計誘我賊遠來利在速戰王師堅守無輕出關計之上也國忠計迫謬說帝趣翰出潼關宜持重以養威五代梁臣敬翔太祖已破趙匡凝取荊襄遂攻淮南翔切諫以謂新勝之兵宜持重以養威太宜不聽兵出光州遭大雨幾不得進進攻壽州不克而多所亡失太祖始大悔恨按軍不動符存審晉軍屯朝邑諸將皆欲速戰存審曰不若緩師示弱伺隙出奇可以取勝乃按軍不動居旬日望氣者言有黑氣狀如鬥雞存審曰可以一戰矣乃進軍擊鄩大敗之存審為將有機略大小百餘戰未嘗敗恤與德威齊名陳四白楚以甲午晦晨厭晉軍而陳郤至云陳不違晦晦陰盡日兵家所忌魚麗鄭御王師為魚麗之陳先偏後伍伍承彌縫注二十五人為偏以居前伍人為伍次之伍承偏之陳而彌縫補闕也此蓋魚麗陳法晉敗群狄于太原將戰魏舒曰彼徒我車所遇又厄厄險也不使車以什供車必克更增十人當一車之用而舍車請更卒去車乃毀車以為行步陳五乘為三伍兵車車三人今以五乘之人合十五人更以五人為伍為三伍為五陳以相離兩於前伍於後專為左角參為右角偏為前矩皆臨時處置之名狄人笑之大敗之笑其失常皆陳曰戰范丐曰塞井夷灶陳於軍中而疏行首疏陳晉侯使斥山澤之險雖所不至必旆而疏陳之示衆也平陰之役也楚武王荊尸授師孑焉以伐隨孑戟也尸陳也始於此參用戟奇陳李牧為奇陳張左右翼也史死地謂背水陳也兵法曰右背山陵前左水澤易左次行次師之法欲右背高故兵法也右牝左牡國語范蠡曰凡陳之道設右為牝左為牡又曰凡陳早晏無失必順天時魏田預討烏桓虜伏騎擊之預因地形回軍結固陳復陳圓陳陳圖晉書諸葛亮造八陳圖於平沙上壘石八行行相去二丈桓溫見之曰此常山蛇勢文帝莫能識也營衛魏祖於官渡使運糧賊數絶之乃使十乘為一道十道方行以營衛之也鵝鸛鄭翩願為鵝其御願為鸛皆陳名越鴈吳越春秋陳名鶴烈莊子徐無鬼曰鶴烈麗譙之間左角右牝並見上注衛為支離之卒陳名立成耿秉行止不正不結營部遠斥候有警軍陳立成也無行陳衛靈公問陳於孔子孔子對曰軍旅之事未之學也軍陳行列之法也孔善布陳郝廷玉吐蕃犯京畿與馬璘屯中渭橋它日魚朝恩聞其善布陳請觀之廷玉申號令鳴鼓角部伍坐作進退若一朝恩嘆曰吾處兵間久今始識訓練法廷玉惻然曰此臨淮王遺法也王善御軍賞當功罰適過每校旗不如令者輒斬由是人皆自效而赴蹈馳突心破膽裂自臨淮歿無復校旗事此安足賞哉未陳即奔康承嗣寵勛軍皆市人囂而強未陳即奔相蹈藉死者四萬勛釋甲服垢襦脫收夷痕士三千以歸分戟為陳常山愍王承乾好突厥言及所服選貌類胡者被以羊裘辮髮五人建一落張氈舍造五狼頭纛分戟為陳繫幡旗設穹廬自居自板渚出為陳竇建德自板渚出為陳秦王麾軍先登騎怒塵大漲乃率史大奈秦叔寶纏麾幟馳出賊陳後建德軍顧而驚遂大潰兵家三陳員半于高宗御武成殿問兵家有三陳何謂邪衆未對半千進曰臣聞古者星宿孤虛天陳也山川向背地陳也偏伍彌縫人陳也臣謂不然夫師以義出沛若時雨得天之時為天陳足食約費且耕且戰得地之宜為地陳舉三軍士如子弟從父兄得人之和為人陳捨是則何以戰帝曰善陳才列執長矛馳入羅士信隋大業時長白山賊王薄左才相孟讓攻齊郡通守張須陀率兵擊賊士信以執衣年十四短而悍請自效擊賊濰水上陳才列執長矛馳入城營刺殺數人取一級擲之承以矛戴而行賊皆貽懼無敢抗須陀乘之大破賊為兩方陳夾之劉鄩以兵萬人攻魏城東莊宗自貝州返趨擊之鄩忽見晉軍驚曰晉王在此邪兵稍卻追至故元城莊宗與符存審為兩方陳夾之鄩為圓陳以禦晉人兵再合鄩大敗八陳圖嘉話録夔州西市府臨江岸有諸葛亮八陳圖箕張翼舒鵝形鶴勢聚石分布宛然若有歧水之態三蜀消傾湧滉大樹十圍枯槎百丈破磑巨石隨波塞川而下及水落川平萬物皆失故態唯陳圖小石之漂聚行列依然如是令不動圖陳法上內史煬帝遣使圖須陀士信陳法上內史提刀略陳王忠嗣請精鋭數百襲虜會贊普大酋閲武鬱標川其下欲還忠嗣提刀略陳斬數千人獲牛馬萬計問賊陳李光弼賊師周擊取兵復振與安太清合衆三萬攻北城光弼斂軍入登陴望曰彼軍雖鋭然方陳而囂不足虞也日中當破乃出戰及期未決召諸將曰彼彊而可破者亂也今以亂擊亂宜無功因問賊陳何所堅堅曰西北隅召郝廷玉曰為我以麾下破之曰廷玉所將步卒請騎五百與之復問其次曰東南隅召論惟貞辭曰蕃將也不知步戰請鐵騎三百與之二百乃出賜馬四十分給廷玉等請陳諸原僕固懷恩媢光弼功餘見占候門三十二祥雲列曉陳殺氣赫長虹李白登廣武戰場周成之熊羆獨孤及八陳圖記魏之鶴列鄭之魚麗周成之熊羆昆陽之虎貌出匪以律我異於是陳解星芒盡李白塞下曲陳解星芒盡營空海霧銷將帥簡軍士除地為場北上中間二百步立五表表間五十步為二軍進止之節遂聲鼓有司舉旗士衆皆起行及表擊鉦乃止又擊三鼓有司偃旗士衆皆跪又擊鼓有司舉旗士衆皆起驟及表乃止東軍一鼓舉青旗為直陳西軍亦鼓舉白旗為方陳以應次四軍鼓舉赤旗為鋭陳東軍亦鼓舉黑旗為曲陳以應次東軍鼓舉黃旗為圓陳西軍亦鼓舉青旗為直陳以應次西軍鼓舉白旗為方陳東軍亦鼓舉赤旗為鋭陳以應次東軍鼓舉黑旗為曲陳西軍亦鼓舉黃旗為圓陳以應几陳先舉者為客後舉者為主每變陳二章各選刁楯五十人挑戰第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝負之形每將變陳先鼓而直陳然後變從餘陳之法既已兩軍俱為直陳又擊三鼓有司偃旗士衆皆跪又聲鼓舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每日至一行表跪進如前遂復其初唐志雲鳥陳杜甫謾說總戎雲鳥陳風前略橫陳紫髯分兩旁杜牧獨酌四十六訣裴行險為營陳部伍勝負別器能等四十六訣戰傷五白矢貫豫肘及手豫折以御左輪朱殷張侯無絶筋無折骨無面傷刮骨蜀關羽中箭刮臂骨血流離盈盤器佩刀截矢後漢耿介擊張步飛矢中股以佩刀截之左右無知者被創夷傷察夷傷夷亦傷李陵居延北與單于戰令軍中傷三創者載兩創者將居一創者持兵而已不任干戈李陵書曰死傷積野餘不滿百而皆扶病不任干戈然陵振臂一呼創痛皆起孔中流矢酣鬥不解安憲忠田洪正討齊察嘗為先鋒閲三十戰中流矢酣鬥不解由是著名飛矢著身如蝟深陽壯王道玄討王世充每赴敵飛矢著身如蝟氣益厲中流矢忍不言突擊自如段志玄從劉文靜拒屈突通于潼關文靜為桑顯和所襲軍且潰志玄率壯騎馳賊殺十餘人中流矢忍不言突擊自如對勢海苦戰狀王方翼引見奉天宮賜食帝前帝見衣有汗濯處問其故具對勢海苦戰狀視其創帝咨嗟久之剟膚敗面剟膚浹滄痍面碎黥頡韓愈征蜀聯句每度出兵傷夷不少贊皇一品集賜王宰詔意感勵士心同上其傷夷校重妨使役者亦任擇人充替其傷夷者仍不停糧非惟感勵士心必冀漸完兵力言念忠誠豈忘收獎張曲江集鋒鏑之下各致損傷言念忠誠豈忘收獎敕張守信書擇將非良傷人已甚同上近者率爾無謀輕敵馳突不顧遂損師徒擇將非良傷人已甚慰邊將傷痍詔封敖武宗使作詔書慰邊將傷痍詔曰傷居爾體痛在朕躬帝善其如意重傷殘廢之卒陸贄諫大難始平而百役疲瘵之氓重傷殘廢之卒皆忍死扶疾想聞德音百戰傷痍被邊長鎮之兵皆百戰傷痍同上步鬥傷面身被數瘡五代梁臣葛從周從太祖攻蔡州太祖墮馬從周扶太祖復騎與敵步鬥傷面身被數瘡體被十餘箭張歸厚鄆兵大至歸厚度不能支以數十騎衛太祖先還歸厚馬中矢僵乃持槊步鬥太祖還軍中遣張筠馳騎第取之以為必死矣歸厚體被十餘箭得筠馬乃歸太祖見之泣曰爾在喪軍何足計乎使舁歸宣武遷右神武統軍同上梁臣傳軍士負之而還王重師取濮州重師身被八九瘡軍士負之而還太祖聞之驚曰奈何使我得濮州而失重師乎使醫理之逾月乃愈金創被體戰必克捷徐懷玉從太祖東攻兗鄆破徐宿懷玉金創被體戰必克捷為梁名將戰罷閲創在背者殺之杜伏威每戰輒先登戰罷閲創在背者殺之血衊面不已王難得方戰麾下士失馬難得馳救矢箸眉披膚鄣目乃拔箭斷膚殊死前鬥血衊面不已帝嘉之在陳傷足江夏郡王道宗在陳傷足帝親加砭治賜御膳中創墮馬契苾何力貞觀九年與李大亮薛萬徹萬均討谷渾於赤水川萬均率騎先進為賊所包兄弟皆中創墮馬步鬥士死十七八何力馳壯騎冒圍奮擊虜披劘去殺傷太甚隱太子建城劉黑闥敗洛水建城問徵曰山東其定乎對曰黑闥雖敢殺傷太甚其魁黨皆縣名處死妻子係虜欲降無繇臨終戒其子曰吾少提一劍去鄉里四十年間取將相然履鋒冒刃出死入生而得至此也因出其平生身所中矢鏃百餘而示之曰爾其勉哉五代符存審張廷蘊常從莊宗征伐先登力戰金瘡滿體莊宗壯之以為帳前黃甲二十指揮步軍步虞侯魏博三城巡檢使同上白轅門以車轅為門牙門建牙也胥甲趙穿當軍門而呼曰薄人於險非勇也傳竇憲征胸奴以班孟堅傳仲武置幕與論文章傳毅字仲武運籌帷幄入幕之賓晉謝安王垣之請桓溫令卻超坐帷帳中風動張口開安笑曰卻生可謂入幕之賓孔參帷幄機祕桓如晦秦王表留幕府從征伐常參帷幄機祕上謁轅門任環高祖討捕於汾晉環上謁轅門承制者河東縣戶曹氣淩山河援桴軍門氣淩山河韓雲卿平淮碑二龍烏承泚與兄承恩皆為半盧先鋒沈勇而決戰轅門號二龍闢於大荒孫逖伯樂川記闢轅門於大荒轅門照白袍杜甫喜聞官軍臨賊詩風動將軍幕同上西山詩召募七白漢宣時西羌反募飲飛射士魯奇應募宜受上賞漢岑彭燒橋事見上注耶榆王郎反世祖令王霸於市募人霸至市人皆舉手耶榆笑之霸慚而反募敢死之士乞於鄱陽召募吳志周祗乞於鄱陽召募事下陸遜曰此郡人易動難安祗固陳可取之民吳遽等果殺祗遜討破豬突豨勇王莽時胸奴為寇甚莽大募天下囚徒人奴名曰豬突豨勇也晉馬隆字孝興涼州有虜隆請募士三千無問所從來鼓行擊之公卿僉曰六軍既衆州郡兵多俱當用之不宜橫設賞募帝不許隆孔戴紅抹額應詔婁師德後募猛士討吐藩乃自奮戴紅抹額來應詔高宗假朝散大夫使從軍彉騎張說時衛兵貧弱番休者亡命略盡說建請一切募勇彊士優其科條簡色役不旬日得勝兵十三萬分補諸衛以彊京師後所謂彉騎也山河子弟呂元膺拜東都留守東畿西南通鄧虢川谷曠深多麋鹿人業射獵而不事農遷徙無常皆趫悍善鬥號曰山棚權德輿居守將羈縻之未克至是元應募為山河子弟使衛宮城詔可募群盜貸死曹華進棣州刺史州與鄆比時賊略定商河華遽逐賊斬二千級復其縣又募群盜可用者貸死補屯卒使據孔道賊至輒擊郤之不敢北募者內應關播字希烈叛帝以汝州據賊衝刺史疲軟不勝任播盛稱李元平帝召見拜左補闕不數日檢校吏部郎中兼汝州別駕知州事元平既至希烈陰使亡命應募凡內數百人元平不寤賊遣將李克誠以精騎薄城募者內應縛元平馳見希烈益募兵號後樓都周寶以京師陷賊將赴難益募兵號後樓者都募萬死一生者南霽雲張巡始被圍築臺募萬死一生者數日無敢應俄有喑嗚而來者乃霽雲也巡對泣下得衆二十萬劉仁恭天佑三年朱全忠自將攻滄州壁長蘆仁恭悉發男子十五以上為兵涅其面曰定霸都士人則涅于臂曰一心事主盧龍閣閭里為空得衆二十萬出金帛募兵康承訓傳龐勛出金帛募兵游民多從之募卒二萬為左右鏌邪軍高駢以軍事屬呂用之募卒二萬為左右鏌邪軍又與守一分總置官屬如駢府夜飛將劉從諫妻弟裴問守邢州有募兵五百號夜飛將多豪姓本傳徵兵滿萬不如召募數千韓文若召募土人必得豪勇與賊相熟知其氣力所極無望風之驚愛護鄉里勇於自戰徵兵滿萬不如召募數千募勇士為宸衛都閩王昶弟繼嚴判六軍諸衛事昶疑而罷之代以季弟繼鏞而募勇士為宸衛都以自衛其賜豫給賞獨厚於他軍五代史募牧兒三千人哥舒翰安祿山反楊國忠大駭入見帝曰兵法安不忘危大兵在潼關而無後殿萬有一不利京師危矣即募牧兒三千人日夜訓練以劍南列將分統之又募萬人屯霸上使腹心杜乾運為帥翰疑圖己表請乾運兵隸節下因詭召乾運計事者至軍即斬首梟牙門并其軍本傳募兵得六萬人封常清安祿山反募兵得六萬人然皆市井庸保乃部分旗幟斷河陽橋以守賊募勇士於市狄仁傑曰北胸奴犯邊陛下使梁王三思募勇士於市踰月不及千人廬陵王代之不浹日輒五萬募重而約嚴蘇頲諫若夫擇良將募重而約嚴違律必誅殺敵必賞所募皆佇劣寒憊劉仁軌破百齊平壤有功者皆不甄敘州縣募不願行身壯家富者以財參逐率得避免所募皆佇劣寒憊無鬥志仁軌具論其弊人賈其勇韓琬上言往者召募人賈其勇今差勒闔宗逃亡白從軍行徇國難奮身卜式上書聞南越反願父子與齊習戰船往死之下詔曰齊相卜式願奮身國難賜爵關內侯願奮擊胸奴以贖罪竇憲年少從軍吳呂蒙年十五六竊隨姊夫鄧當擊賊當顧見呵叱不能禁止歸白母母怒欲罰之蒙曰貧賤難可居設有功當富貴可致不探虎穴安得虎子也又張昭弟子奮年未二十造作攻城火攻車步騭薦之昭不願曰汝年尚少對曰童汪死難子奇治阿奮不才年不為少也領兵連有功孔鼓三軍而進之韓愈與柳公綽中丞書閣下去文就武鼓三軍而進之陳師鞠旅親與為辛苦豈常習於威暴之事而樂其戰鬥之危也挾策從安西節度府馬璘年二十讀漢馬援傳至丈夫當死邊野以馬革裹尸而歸慨然曰使吾祖勳業墜于地乎開元末挾策從安西節度府更學兵書戰策馬燧與諸兄學士策嘆曰方天下有事大夫當以功濟四海渠老一儒哉更學兵書戰策白考竟其妻魏高柔字文惠為丞相理曹椽宋全逃亡舊法軍征士亡考竟其妻太祖更重其刑全有母及二弟主者奏殺之柔曰士卒亡誠可疾然聞有悔者宜貸其妻子一使賊中不信一使誘其還心太祖善之竇禮近出不還營以為亡沒其妻子見察獄門盧育見議刑門殺逃士吳志孫策伯符初從袁術策騎士有罪逃入術營隱於內廄策使人斬之訖詣術曰兵人好叛當共疾何為謝耶孔以兵自拔李懷光陰通朱泚反跡寖露駱元光以華州之衆守潼關尚可孤以神策兵保七盤皆受李晟節度懷光懼下益攜落畏為晟襲乃奔河中其將孟涉段威勇以兵數千自拔歸晟皆表以要官身卒奔亡李翰三臣論樂毅一為燕將才勝濟師銼衄於二城之間狼狽於兩國之際軍不振旅身卒奔亡蔡士多亡去朱全忠殺賢洪懼驅民趨申州遂奔行密麾鼓亙百餘里武昌杜洪邀之弗及蔡士多亡去趙德諲傳赦亡命背軍梁本紀開平元年十一月壬寅赦亡命背軍髡黥刑徒乞師十白楚子囊乞旅于秦傳重辭榖梁曰公子遂如楚乞師重辭也師出不必反戰不必勝也哭秦庭左傳吳入楚楚申包胥詣秦乞師立依庭牆而哭日夜不絶音水漿不入口七日而得兵漢陳餘從田橫籍兵籍借也告急晉伐鄭鄭子駟詣秦乞師曰大國在敝邑之字下是以告急同恤社稷之難犯圍求救犯師而出宋圍華氏華登如楚乞師華貙以車十五乘犯師而出送之一宿之行史趙魏攻韓韓使陳筮如秦乞師曰事急矣公雖病為一宿之行見穰侯穰侯曰急乎筮曰未急穰侯怒曰冠蓋相望告敝邑言未急何筮曰急將變孔清河太守乞師顏真卿為平原太守安祿山反清河太守使郡人李萼來乞師萼曰聞公首奮裾唱大順河朔恃公為全城清河西鄰也有江淮租布備北軍號天下北庫計其積足以三平原之有士卒可以一平原之衆公因而撫有以為腹心他城運之如臂之指耳真卿為出兵二千請乞兵淮南辛讜龐勛反攻杜慆於泗洲圍三月救兵外敗城益危讜復請乞兵淮南與壯士徐珍千人夜斬賊柵出見節度使令狐綯復詣浙西見審權平巢王重榮巢復振憂之與楊復光計復光曰我世與李克用共憂患其人忠不顧難死義如己若乞師焉事蔑不濟乃遣使者約連和克用使陳景斯總兵自嵐石赴河中親帥師從之遂平巢往救必俱亡王珂朱全忠謂張存敬曰珂恃太原侮慢我爾持一繩縳之存敬以兵數萬渡河進攻珂全忠率師繼進郎劾坷交結克用為方鎮生事不可赦珂乞師太原為何絪所迮不能進珂急使妻遺克用書曰賊攻我朝夕見俘乞食大梁矣克用答曰道且斷往救必俱亡不如歸朝廷同上傳乞師李克用劉仁恭敗退壁瓦橋卑辭歸窮於克用求救全忠環滄築而溝之內外援絶人相食仁恭復從克用乞師使百輩往乃許本傳遣使乞兵契丹漢劉旻為折德扆所敗周太祖崩旻聞之喜遣使乞兵契丹契丹遣楊袞將鐵馬萬騎及奚諸部兵五六萬人號稱十萬以助旻諸將疑鎔詐梁遣王景仁攻趙趙王王鎔來乞師諸將疑鎔詐未可出兵王不聽乃救趙敗梁軍白掎角戎子駒曰晉禦其上戎克其下譬如捕鹿晉人掎之諸戎角之諸侯相滅亡齊不相救則桓公恥之榖梁匡救其災大國之於小國周禮宗伯以禬禮哀圍敗同盟者會財以救若宋災也矯命救人史魏信陵君無忌矯命令如姬竊軍符於魏王臥內矯發晉鄙軍以救趙奉漏罋沃焦釜秦攻趙趙無食請粟於齊不與周子曰趙齊楚之扞敵邑救趙之急若奉漏罋沃焦釜也患力不能救德不能覆漢閩越圍東歐田蚡以不足煩中國嚴助曰患力不能救德不能覆蠻夷告急天子不救欲令安歸上曰太尉不足與計輔車相依示不相援後漢馬武王霸攻周建武敗奔霸堅壁示不相援賊乘時輕進襲背破之劉備求救於呂布布至謂諸軍曰玄德布弟也故相救布好解鬥今植戟營門射小支中則諸軍皆罷一發中之諸將皆伏遂罷兵此亦宜僚弄丸之類夜不相救世祖擊赤眉耿純伯山營在前去衆營數里賊夜攻純純選敢死士出戰後敗之世祖明且與諸將至營勞純曰昨夜困乎大軍不可夜動故不相救也違詔不相救吳楚反攻梁梁急日使使請救於周亞夫晉夫堅壁不出梁請於帝帝詔亞夫救梁亞夫不奉詔但絶吳糧道吳食盡而退擊大敗之孔遣神策將援哥舒曜拜東都汝洲行營節度使討李希烈屯襄城希烈遣衆萬人縱火攻柵殪人于塹以薄壘曜苦戰破之居數月希烈自率兵三萬圍曜築甬道屬城矢集如雨帝遣神策將劉德信以兵三千援之又詔河南都統李勉出兵相掎角勉以希烈在外許守兵少乘虛襲之希烈自解觀望莫肯救張巡傳賀蘭進明代巨節度屯臨淮許叔冀尚衡次彭城皆觀望莫肯救巡復遣南霽雲如臨淮告急引進騎三十冒圍出賊萬衆遮之霽雲左右射皆披靡既見進明進明曰睢陽存亡已決兵出何益霽雲曰城或未下如已亡請以死謝大夫叔冀者進明麾下也房琯本以牽制進明亦兼御史大夫勢相埒而兵精進明懼師出且見襲又思巡威聲恐成功初無出師意又愛霽雲壯士欲留之為大饗樂作霽雲泣曰昨出睢陽時將士不粒食已彌月今大夫兵不出而廣設聲樂義不忍獨饗雖食弗下咽今主將之命不達霽雲請置一指以示信歸報中丞也因拔佩刀斷指一座大驚為出涕卒不食去指矢回射佛寺浮圖矢著磚曰吾破賊還必滅賀蘭此矢所以志也援矛刺賊李光弼有裨將援矛刺賊洞馬腹中數人又有迎賊不戰而郤者光弼召援矛者賜絹五百匹不戰者斬詔入援北邙之敗朝恩羞其策繆故深忌光弼切骨而程元振尤疾之二人用事日謀有以中傷者及來填為元振讒死光弼愈恐吐蕃寇京師代宗詔入援光弼畏禍遷延不敢行及帝幸陝猶倚以為重數存問其母以解嫌疑梁求救于晉劉處讓少為張萬進親吏萬進叛梁附晉梁遣劉鄩討之萬進遣處讓求救于晉晉王方與梁相拒宋能出兵處讓乃於軍門截耳而訴曰萬進所以見圍者以附晉也奈何不顧其急苟不出兵願請死晉王壯之曰義士也為之發兵五代史俱受朝委共防患害張曲江邊鎮統軍詔俱受朝委共防患害何異一家況在絶域尤宜相援赴援梁太祖紀秦宗權聞盧瑭等敗乃自將精兵數千柵北郊五月兗州朱瑾鄆州朱瑄來赴援敬塘求援契丹敬塘徙鎮天平不受命曰太原地險而粟多吾當內檄諸鎮外求援契丹可乎梁紀卑辭歸窮劉仁恭敗退壁瓦橋卑辭歸窮於李克用求救克用為侵邢治本傳白廉藺史記廉頗曰藺相如徒以口舌為勞我羞為之下見必辱之相如聞之不與爭望則引車避曰兩虎鬥勢不俱生吾先國家之急後私讎頗聞之肉袒負荊謝罪史遷曰智勇兼之也兩虎私鬥後漢寇恂在潁川賈復部將犯法恂斬之復怒欲手刃恂恂每避後於帝坐相遇曰天下未定兩虎安得私鬥今日朕為解之遂交歡易諸將魏志帝欲假賈逵節曹休曰逵性剛侮易諸將不可以為督魏略曰休怨逵遲呵使敕豫州拾棄仗逵曰為國作豫州不為拾棄仗與休更相表魏書云休欲罪逵逵絶無言呂蒙曰老母待卿食吳甘寧廚下小兒有過失投呂蒙蒙恐殺之不即還後寧齎酒禮與蒙母蒙與升堂乃出廚下兒寧許不殺斯須還船縳於桑樹自挽弓射殺之畢敕船人增纜解衣臥蒙大怒會鼓兵欲攻寧蒙母徒跣曰至尊待汝如骨肉何以私怒甘寧蒙聞母言即自至寧船笑曰老母待卿食寧噓欷曰負卿即與蒙俱見母歡宴永日左傳郤至曰楚有六間其二卿相惡二卿子重子反也此六間之一不可以私憾忘義魏張遼屯合肥孫權圍之李典曰不可以私憾忘義率衆與遼破權陳武備相見晉王濬等伐吳濬不受渾節度濬先平吳後論功先後因不平渾子濟亦數毀濬濬常疑渾渾詣濬濬陳武備然後相見其相疑如此孔私忿不成大功馬燧田昂降燧請以洺州隸抱真而用昭義副使盧玄卿為刺史兼魏博招討副使李晟兵前獨隸抱真抱真亦請兼隸于燧以示協一然議者咎燧私忿交惡卒不成大功不協五代朱珍梁兵攻掠四方李唐賓常與珍俱與珍威名略等而驍勇過之珍嘗私迎其家置軍中太祖疑珍有異志遣唐賓伺察之珍與唐賓不協唐賓不能忍夜走還宣武珍單騎追之交訴大祖前太祖兩惜其材為和解之大將不協郭虔瓘陝王為安西都護韶虔瓘為副虔瓘與安撫招慰十姓可汗使那獻數持異交訴諸朝玄宗齎詔書諭解曰大將不協小人以逞何功可圖互防飛謗陵贄奏議李建徽楊惠元兵馬狀四軍按壘九帥異心論勢力則懸絶高卑據職名則不相統屬懷光經晟等兵微位下而忿其制不從心晟等疑懷光養寇蓄姦而忿其事多凌己端居則宜防飛謗欲戰則遞怒分功齟齬不和嫌釁遂起軍詐十三白雄傑之士因勢輔時作為權詐謂孫武事刑法志變詐白起詐坑趙降卒四十萬衛鞅請樂飲史記衛鞅遺魏以子即書曰往與公子歡今為兩國將不忍相攻可與公子面相見會盟樂飲而罷以安秦魏卬以為然會飲伏甲兵攻卬敗其軍豈尚詐謀哉左實右僞僞以衣物為人形韓信擊魏益為疑兵陳船欲渡臨晉而伏兵夏陽以本罌渡軍襲安邑晉將征南尚無掩襲之計羊祜剋日戰天兵逐北寧多變詐之謀不待期而薄人於險無勇也苟求詐勝匪念德功擊東南備西北周亞夫擊吳吳奔壁東南亞夫備西北已而吳精兵果奔西北不得入也貿易衣服後漢虞詡字升卿為武都守不滿三千兵士羌衆萬餘圍之詡陳兵令從東郭出北郭入貿易衣服回轉數周虜恐而退設伏邀之大敗反間敵師太祖與韓遂書多所點竄如遂改定者遂將示馬超超果疑遂與太祖有應孔曳柴揚塵望者謂大軍至顏杲卿兼御史中丞傳檄河北言王師二十萬入土門遣郭仲雍領百騎為先鋒馳而南曳柴揚塵望者謂大軍日中傳數百里賊張獻誠方圖饒陽棄甲走張疑幟土雄誕與李子通戰蘇州卻之子通以精兵保獨松嶺雄誕遣將陳當率千兵出不意乘高蔽崦張疑幟夜縛炬於樹遍山澤子通懼燒營遁保餘杭遂追擒之使牽類密者過陳李密王世充軍江淮士出入若飛密兵心動世充督衆疾戰使牽類密者過陳譟曰獲密矣士皆呼萬歲密軍亂遂潰兵詭道盛彥師與史萬寶鎮宣陽李密叛謀出山南萬寶懼謂彥師曰密驍賊也以王伯當輔之挾思東歸之士非計出萬全不為也殆不可當彥師笑曰請以數千兵為公梟其首萬寶問計答曰兵詭道也難豫言張疑屯虛幟楊恭仁為涼州總管突厥頡利率衆數萬獵其境恭仁應機設拒張疑屯虛幟示之頡利懼而走詐為糧車裴行儉突厥反蕭嗣業討賊不克詔行儉為定襄道行軍大總管先是嗣業饋糧數為虜鈔軍餒死行儉曰以謀制敵可也因詐為糧車三百乘車伏壯士五輩齎陌刀徑弩以羸兵挽進紿降常達拜隴州刺史時薛舉方彊達敗其子仁杲斬道千級舉遣將仵士政紿降達不疑厚加撫接士政伺隙劫之并其衆二千歸賊陽約降李光弼入太原至德二載思明希德率高秀巖牛廷玠將兵十萬攻光弼光弼又潛溝營地將沉其軍乃陽約降至期以甲士守陴遣裨校出若送款者思明大悅俄而賊數千沒于塹城上鼓譟突騎出乘之俘斬萬計思明畏敗乃去紿賊曰吾糧盡明日當降初光弼謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期何若曰棄之抱玉許諾即紿賊曰吾糧盡明日當降賊喜斂兵待期抱玉已繕完即請戰賊忿欺急攻之抱玉出奇兵夾擊俘獲過當刻木作婦人衣絳被髮康承訓傳龐勛反引兵救豐刻木作婦人衣絳被髮兵過斫而火之夜叢萬炬疑賊郭子儀吐蕃犯武功乃遣知節為前鋒擊鼓歡山張旗幟夜叢萬炬疑賊初光祿卿殷仲卿募兵藍田以徑騎先官軍不游奕直度滻民紿虜曰郭令公來會將軍王甫結俠少夜鼓朱雀街呼曰王師至吐蕃夜潰兵屯八百里黃巢攻臨安戍將董昌兵寡不敢戰伏數十騎莽中賊至伏弩射殺賊將下皆走昌進屯八百里見舍媼曰有追至告以臨安兵屯八百里矣賊駭曰向數騎能困我況軍八百里乎乃還多設疑兵李贊皇賜石雄詔意廣立虛寨多設疑兵蓋為自防豈暇侵佚且欲偷安歲月以老王師夜半食先雞鳴時鳴鼓角馬燧田悅知燧食乏深壁不戰燧令士齎十日糧進營食口與悅夾洹而軍造三橋逾洹日挑戰悅不出陰伏萬人將以掩燧燧令諸軍夜半食先雞鳴時鳴鼓角而潛師並洹趨魏州令曰聞賊至止為陳留百騎持火待軍畢發匿其旁須悅衆渡即焚橋燧行十餘里悅兵踰橋乘風縱火譟而前燧乃令士無動命除榛莽廣百步為場募勇士五千人陳而待比悅至火止氣少衰燧縱兵擊之田悅敗走橋已焚衆赴水死者不可計斬二萬級作機橋康承訓屯海州度賊至作機橋維以長緪賊半度緪絶七溺死度者不得戰殲之縛藁為人張巡城中矢盡巡縳槁為人干餘被黑衣夜縋城下潮兵爭射之久乃槁人還得箭數十萬其後復夜縋人賊笑不設備乃以死士五百斫潮營軍大亂焚壘幕追奔十餘里賊慚益兵圍之閉壘示怯五代王景仁初名茂章少從楊行密梁遣于友寧攻王師範師範乞兵於行密遂斬友寧太祖聞友寧死以兵二十萬倍道而至景仁閉壘示怯伺梁兵怠毀柵而出驅馳疾戰酣退坐召諸將飲酒已而復戰太祖登高望見之得青州降人問飲酒者為誰曰王茂章也太祖嘆曰使吾得此人為將天下不足平也梁兵又敗結草為人執以旗幟以驢負之同上劉鄩謂晉兵悉從莊宗赴魏而太原可襲乃結草為人執以旗幟以驢負之往來城上而潛軍出黃澤關襲太原晉兵望梁壘旗幟往來不知其去也以故不追詐為降書梁臣朱珍朱裕奔于鄆州太祖乃還汴留珍攻鄆州珍去鄆二十里遣精兵挑之鄆人不出朱裕詐為降書陰使人召珍約開門為內應珍信之夜率其兵叩鄆城門朱裕登陴開門內珍軍珍軍已入甕城而垂門發鄆人從城上磔石以投之珍軍皆死甕城中珍僅以身免太祖不之責也賊疑救至黑齒常之垂拱中突厥復犯塞常之率兵追擊至兩井忽與賊遇賊騎三千方擐甲常之見其囂以二百騎突之賊皆棄甲去其暮賊人至常之潛使人伐木列炬營中若燧燃然會風起賊疑救至遂夜遁大舉九節度討慶緒將戰子儀選善射三千士伏壁內誡曰須吾卻賊必乘壘若等譟而射既戰僞遁賊薄營伏發注射如雨賊震駭王師整而舊郭子儀傳詐言救兵至葛從周太祖攻朱僅干兗州未下留從周圍之瑾閉壁不出從周詐言救兵至陽避之高吳夜半潛還城下瑾以謂從周已去乃出兵收外壕從周掩擊之白擅發漢書段會宗擅發戊巳校尉兵有詔許贖之陳湯矯命誅郅支朝廷以矯制收繫按驗耿育言陳湯討絶域不羈之君係萬里難制之虜云云谷永訟陳湯策虜奮發報十年逋誅雪邊吏宿恥執憲之吏致之大辟云云馮奉世字子明持節送大宛客因設其兵擊莎車王莎車王自殺議封蕭望之以奉使有指而矯制違命雖有功不可為後法不宜封上善之矯制拜官魏鄧艾伐蜀劉禪降輒依鄧禹故事承制拜禪驃騎送於京師司馬宣王使監軍衛瓘喻艾事當須報艾曰承制拜假以安初附謂合權宜也漢魏春秋詔曰司馬法曰賞不踰日欲人速睹為善之利昔鄧禹入關承制拜季艾為河東守來歙承制拜高峻為通路將軍皆非先請臨時刻印觀釁而動以信事君節當慎守用權制敵利在從宜在師律而貴貞豈綸言之可贖且不稟命其何議功士師雖許專征君命誠難擅發稟命則不威專命則不孝宜准法論無從公贖請雖切於利便各自貽於矯誣大夫出境有可以安國家定社稷則專之可也傳苟利便宜則非專違使者以苟利國家專之可也所司以雖有君命何其速歟上將誠為擇利監軍未可與權宜承破竹安可守株師律尚貞兵符示信示不敢專是謂臧凶豈宜刑放矯制取馬益軍後漢臧宮擊公孫述衆多食少轉輸不至時帝遣謁者詣岑彭有馬七百匹宮矯制取以自益晨乃進兵矯制赦罪人廣漢群盜起拜孫寶子選為益州刺史親入山谷告輸群盜非起意渠魁皆得悔過歸田自劾矯制矯制受降馬援討五溪蠻宋均監軍援卒均以道遠士病乃矯制令呂仲奉制書入虜營告以恩信而勒兵隨之蠻夷震怖斬大帥而降均為置吏而還自劾矯制世祖嘉之孔徙屯李晟會吐蕃欲佐此帝議幸咸陽督戰懷光大駭疑帝奪其軍圖反益急晟與李建徽陽惠元皆聯屯適有使者到晟軍晟乃令曰有詔徙屯即結陳趨東渭橋後數日懷光并建徽惠元兵惠元死之專命十五白師在制命而已稟命則不威專命則不孝傳謂太子帥師魏絳戮楊干之僕公怒曰必殺魏絳絳曰軍事有死無犯為敬云云公跣而出謝之也擅誅羌任延為武威太守坐擅誅羌左轉邵陵令討旁郡賊後漢李章為琅邪太守北海夏侯思反囚太守而據營陵章即發兵千人馳往擊之掾吏上章曰二千石行不出界兵不擅發章按劍曰逆虜無狀此何可忍若坐討賊而死吾無恨遂引兵斬獲三百餘級上狀帝嘉之不拘科制太守表鍾由守司隸持節督關中諸軍委以事持節不拘科制專之可也大夫出云云見上注黃鬚兒魏鄢陵侯彰乘勝北至乘乾長史以上馬疲又授節度不得過代違命輕敵彰曰帥師專行唯利所在縱敵非良將遂斬獲鮮卑太祖持彰鬢曰黃鬚兒意何大也將在軍君命有所不受諸荀亮數挑戰魏使辛毗伏節制兵司馬宣王固表請戰亮曰彼本無戰心請戰者示武爾將在軍君命有所不受若能制吾豈千里而請戰耶擅紀功後漢馮緄鴻卿擊武陵蠻有監軍張敞承宦官意表緄擅於江陵刻石紀功也違制受降朱祜仲先圍秦豐降轞車送洛陽吳漢劾祜違制受降違將師之任世祖不罪孔將得顓制裴度為淮西宣慰招討處置使是時詔道兵悉中官統監自處進退度奏罷之使將得顓制號令一戰氣倍不從中治李靖五代孫彥芳家故藏高祖太宗賜靖詔書數函上之一曰兵事節度皆付公吾不從中治也兵多則難用將衆則不一白居易河朔復亂深州圍益急居易上言兵多則難用將衆則不一宜詔魏博澤潞定滄四節度令各守境以省度支安於專行病於羈制陸宣公奏議凡在執干戈而衛社稷者皆自謂勳業由己義烈發心安於專行病於羈制陛下宜俯徇斯意因而委之遂其所安獲其所病敦以付授之義固以親信之恩假以便宜之權制得自專權得自縱李觀上宰相安邊書擇一虎臣練萬虎賁使制得自專權得自縱將無分權則成功同上夫兵有專制則畢力將無分權則成功凡臨軍對寇士卒不用命並得專行其罰唐六典兵部下多專命吳世家撫州危金諷叛彭彥章彭玕顧仔倡皆叛隆演問嚴可求誰可用者可求薦周本時本方敗可求彊起之本曰蘇州之敗非怯也乃上將權輕而下多專命爾若必見任願無用偏裨乃請兵戰于象牙潭執金諷彥章葛從周太祖遣攻劉守文以蔣暉監其軍暉語諸將曰吾王以我監諸將今燕兵來不可迎戰從周怒曰兵在上將豈監軍所得言白穰苴斬莊賈見軍政令門注斬監軍御史穿軍壘漢胡建字子孟守君政丞監軍御史穿北軍壘垣為賈區注小菴屋坐買賣也建斬御史出城奏於懷中曰穿窬不由路是謂姦臣按軍法正無屬將軍有罪以聞二千石以下行法焉制曰國容不入軍軍容不入國建何疑將在別屯殺人秦彭事見偏將門注孫策斬逃騎士孫策事見背軍門注晉職官志云使持節為上持節次之假節為下使持節得殺二千石以下持節得殺無官位人若軍事得與使持節同假節唯軍事得殺犯令者江外以來都督中外尤重唯王導乃居之孔殺偏裨李元諒李懷光反與馬燧渾瑊討之其將徐廷光素易元諒元諒見韓游環曰彼詬吾祖今日斬之子助我乎許諾既而遇諸道即數其罪叱左右斬之詣燧謝燧大怒將殺元諒游壞見曰殺一偏裨尚爾即殺一節度法宜如何燧默然元諒請輸錢百萬勞軍自贖瑊亦為請燧赦之帝以專殺恐有司劾治前詔勿論麾下為股栗哥舒翰事王忠嗣署衙將翰能讀左氏春秋漢書通大義疏財多施豫故士歸心為大斗軍副使佐安思順不相下忠嗣更使討吐蕃副將倨見翰怒立殺之麾下為股栗斬陴者據闔內軍郭子儀至德二載攻賊崔乾祐於潼關乾祐敗退保蒲津會永樂尉趙復河東司戶參軍韓旻司士徐景及宗室子鋒在城中謀為內應子儀攻蒲復等斬陴者披闔內軍乾祐走安邑安邑僞納之兵半入縣門發乾祐得脫身走殺大將路嗣恭後為郭子儀朔方節度留後大將孫守亮擁重兵驕蹇不受制嗣恭因稱疾守亮至即殺之一軍大震乘馬不避者即時榜殺柳公綽拜京兆尹方起府有神策校乘馬不避者即時榜殺帝怒其專殺公綽曰此非獨試臣乃輕陛下法帝曰既死不以聞可乎曰臣不當奏在市死職金吾在坊死職左右巡使帝乃解非用高瑀不能安李長至乃曰為我白宰相徐州專殺李聽親吏非用高瑀不能安因瞑目斫父墓射殺柳仲郢遷侍御史有禁卒誣里人斫父墓柏射殺之吏以專殺論而中尉護免其死仲郢監罰執曰賊不死是亂典刑遂獨詔京兆杖之不監朝廷嘉其守本傳
