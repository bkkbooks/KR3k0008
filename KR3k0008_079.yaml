body:
  text: 卷第七十九關市之征一白月令孟春易關市來商旅謂輕稅商也四方來集遠鄉皆至則財不匱上無乏用百姓乃遂月令孟冬戒門閭修鍵閉謹關梁月令孟夏門閭無閉關市無索順陽氣敷縱不難物市廛而不稅市廛舍而稅其舍不稅其物也關譏而不征譏察而已不征稅也此殷制司關掌其征周禮司關掌關貨之節以聯關市故有關市之征國凶禮殺無關門之地年不順成關梁不租孔議關市行人盡征崔融進鳳閣舍人時有司議關市行人盡征之融上疏謂周官九賦其七曰關市以市多淫巧而關通末遊欲止抑之故加稅耳然雖斂工商而不及往來今一切通取則事不師古且四人異業舊矣復動而搖之市者兼受善惡也若甚則細人無所容久必為亂天下之關必險道市必要津豪宗惡少在焉聞一旦變法或致騷動恐南走蠻北走狄舟航所聚同上天下諸津舟航所聚旁通巴漢前詣閩越七澤十藪三江五湖控引河洛兼包淮海洪舸巨艦千軸萬艘交貿往來憧憧永日關市之稅史籍有文秦政以雄圖武力捨之而不用也漢武以霸略雄才去之而勿取也同上富商大賈豪宗惡少輕死重義結黨連群暗烏則彎弓睚眥則挺劍同上謂市及國門關門也惟斂出入之商稅不悅往來之行人崔融有不可者六違背周官其不可一也四人各業今復動搖其不可二也流迸齊人其不可三也萬商廢業其不可四也稅市則人散稅關則暴興其不可五也儻加重稅或慮相驚其不可六也同上九賦二白周禮太宰以九賦斂財賄一曰邦中之賦在城郭者邦中之賦二十而稅二曰四郊之賦去國百里也三曰邦甸之賦二百里也四曰家削之賦三百里也五曰邦縣之賦四百里也六曰邦都之賦五百里各有差此已上平民也七曰關市之賦八曰山澤之賦關市山澤謂占會百物也九曰敝餘之賦敝餘百工之餘也玄謂敝餘占賣國之斥敝當增賦者若今賈人倍算也孔周官九賦崔融上疏曰謂周官九賦其七曰關市以市多淫巧而關通末遊欲止抑之故加稅耳八州之內九賦用殷元稹幽州德音貢賦修於九州柳宗元表貢賦未均於九州同上白羽翮之征羽人以時徵羽翮之征於山澤之農以當邦之政令齒角骨物角人掌徵齒角骨物於山澤之農月令孟令命有司牧水澤之賦謂蜃哈蒲雚之屬其利蒲魚謂水澤之利也周禮列而不賦禮年不順成山澤列而不賦注列遮列也雖不賦尚禁止山澤童枯則不稅周禮司徒以土會之法辨五地之生一曰山林其動物宜毛物其植物宜旱物一曰川澤其動物宜鱗物其植物宜膏物斡山海貨食貨志浮食寄民欲擅斡山海之貨注斡謂主領之以致富羡利佃人也海租宣帝時欲增海租三倍蕭望之奏言比加海租魚不出武帝時縣官嘗曰魚而不加租帝不聽之孔計斛輸錢崔元亮遷歙州刺史斂人馬牛生駒犢官籍蹄噭故吏得為姦玄亮焚其籍一不問民山處輸租者苦之下令許計斛輸錢民賴其利管榷山澤之利唐文粹漢有少府水衡管榷山澤之利終不若領之大農也論進奉書皇甫湜我在山上舍一畝蒿磽田夜雨叫租吏春聲暗交關李賀山畋澤虞輸賦于都柳宗元武岡銘宜歸王者德宗時戶部侍郎韓洄議山澤之利宜歸王者自是皆隸鹽鐵使食貨志山川林藪之所産殖雨露春秋之所成就莫非王財皇甫湜田稅四白周禮凡任地園宅無征園廛二十而一近郊十一遠郊二十有三甸稍縣鄙都皆無過十二漆林二十五載師職云周禮輕近而重遠口多役園廛輕者廛無榖園少利也夏后五十而貢殷七十而助周百畝而徹皆什一也徹通也助藉也莫善於助莫不善於貢貢者校數歲之中以為常樂歲粒米狼戾多取之不為虐則寡取之凶年糞其田而不足則必取盈焉故不善任農以耕貢九榖周禮閭師七古者公田藉而不稅借人力治公田不稅也圭田無征厚賢也即周禮土田也月令九月命有司農事既收舉五榖之要定稅厚薄稅畝履其餘畝而稅十而取二履畝公羊傳稅畝者何履畝而稅桀貊多平十一大桀小桀言多稅喻桀之害人也寡乎十一大貊小貊言如蠻貊稅故少也一夫治田百一十畝公田在內私田稼不善則非吏吏迫不得治私田也公田稼不善則非民民不治公田故罪之趙奢行法不避平原平原家不肯出稅趙奢為趙田部吏以法治平原用事者九人也十五稅一漢惠復田租十五稅一注云漢儉於周中廢而復之榖租蒿稅以律占租紹紀令人得以律占租不以實家長不自書罰金二斤沒入所不自占隱度定辭也武帝時律外取故令家長各以物自占雖一時供億議以從權而田卒污菜孰云不足雖給於公上情不涉於徇私然望彼微求罪須加於從欲地征地求相地衰征唯加田無征夏官司勳掌賞地之政令凡頒掌地三之一食唯加田無征注既賞之又加賜以田所以厚恩唯加賞田無國征也賦鐵晉趙鞅賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書注令人出鐵以一鼓為率也封田陳轅頗為司徒賦封田以嫁公女有餘以為己大器國人逐之出奔墾田不實光武時天下墾田多不實帝見陳留吏牘上有書云穎川弘農可問河南南陽不可問帝詰吏不服顯宗曰以墾田相方耳河南帝城多近臣南陽帝鄉多近親田宅踰制不可問也孔稅浮屠錢張廷圭武后稅天下浮屠錢營佛祠於白馬坡作大象廷圭諫下碇稅孔戣拜嶺南節度使蕃舶泊步有下碇稅戣禁絶無所求索收豪室稅李翱為廬州刺史時州旱遂疫逋捐係路亡藉口四萬權豪賤市田屋牟厚利而窶戶仍輸賦翱下教使以田占租無得隱收豪室稅萬二千緡貧弱以安稅泗口王智興檢校濠州節度使揫索財賂交權幸以賈虛名用度不足始稅泗口以佐軍須稅外加斂嚴礪節度東川擅沒吏民田宅餘所稅外加斂錢牧都畿佛祠田磑租入李吉甫奏牧都畿佛祠田磑稅入以寬貧民僧道輸絹李叔明上言謂僧道年未滿五十可令歲輸絹四尼及女冠輸絹二雜役與民同之過五十者免議雖上罷之請檢天下田宜得益租五代劉審交晉高祖拜審交三司使議者請檢天下民田宜得益租審交曰租有定額而天下比年無間田民之苦樂不可等也遂止不檢而民賴以不擾或五分納一謂之率貸自天寶末年盜賊奔突克復之後府庫一空又所在屯師用度不足於是遣御史康雲間出江淮陶鋭往蜀漢豪商富戶皆籍其家資所有財貨畜産或五分納一請之率貸所收巨萬計蓋權時之宜通典請簿百姓一年稅錢唐開元十八年御史大夫百姓一年稅錢充本依舊令高戶及典正等捉隨月收利將供官人料錢多率稅商賈其後諸道節度使觀察使多率稅商賈以充軍資雜用或於津濟要路及市肆間交易之處計錢至一千以上者皆以分數稅之自是商説無利多失業矣上元中敕江淮堰埭商賈牽船過處準斛斗納錢謂之埭程大歷初諸州府應稅青苗錢每畝十文充百司手力資課三年十月臺司奏緣兵馬未散百司支計不給每畝更加五文通典稅民屋架籍賈人資錢陳京初帝討李希烈財用屈京與戶部侍郎趙贊請稅民屋架藉賈人資錢以率貸之請收邸直裴休進中書侍郎時方鎮設邸閣居茶取直因是商人他貨橫賦之道路苛擾休建言請收邸直無擅賦商人奏罷稅外薑芋錢崔戎持節劍南奏罷稅外薑芋錢當賦錢者率三之以其一準繒布優其估以與民征乘牛之出入市者宗室具兼河南尹視征乘牛之出入市者斥所得佐用度公田籍而不稅往古之時醇朴未散公田籍而不稅關市譏而不征文粹崔融疏所租入十分錫一江南野史後主昱罷諸郡屯田歸州縣委所屬宰薄與常賦俱征所租入十分錫一謂之率分以為祿廩諸朱膠牙稅亦然由是公無遺利而屯田佃民絶公吏之撓刻獲安業焉鹽米以先主世不概括定民産自正斛上別輸三斗於官廩受鹽二斤謂之鹽米百姓便之及世宗剋準南鹽貨遂艱官無可支至今輸之猶為定制民稅出雜産物與錢韓文張君墓志改澧州刺史民稅出雜産物與錢尚書有經數觀察使牒州徵民錢倍經君曰刺史可為法不可貪官害民留禁不肯從被支稅草以納間廄韓休為虢州刺史被支稅草以納間廄休奏請均配餘州張説駁之曰若獨免虢州即當移向他郡休復將執奏寮吏曰更奏必忤執政之意休曰為刺史不能敕百姓之弊何以為政必以忤上得罪所甘心也竟執奉獲免唐舊史白口賦昭詔無妝五口賦注漢議民年七歲至十五出口錢武帝加車騎也減口賦錢昭詔人未家給其減口賦錢文收口錢文詔民三十賦丁男三年而一事收口錢也高祖劫算賦民年十五至十六算賦人百二十年十一算治庫兵車貢禹上書古無算賦口錢武帝征四夷重賦民子産三歲出口錢至有生多輒殺宜令七歲去齒乃出口錢二十始算倍算漢律人出一算算百二十錢也唯賈人與奴婢倍算也孔榷算之科陸贄言常賦不給乃議蹙限而加斂焉加斂既殫則別配之別配不足於是榷算之科設資産之中事情不一陸贄奏議資産之中事情不一有藏于襟懷囊篋物雖貴而人莫能窺有積于場圃囷倉苴雖輕而衆以為富有流通蕃息之貨數雖寡而計日收羸有廬舍器用之資價雖高而終歲無利如此之比其流實繁一概計估算緡宜其失平長偽白算軺車漢食貨志非吏比者三老北邊騎士軺車一算注軺車小車也比例也非為吏人之例非為三老非為北邊騎士而有軺車皆令出一算商賈二算商賈有軺車之算注重其賦也算船食貨志船五文已上一算匿不自占占不悉戍邊一歲沒入緡錢有能告者以其半畀之也孔崔融獻議曰吐蕃傳右史崔融獻議曰張騫始通西域列四郡據兩關斷胸奴右臂稍稍度河隍築令居以絶南羌於是障侯亭遂出長城數千里傾府庫殫士馬行人使者歲月不絶至作皮弊算緡錢法稅舟車榷酒酤夫豈不懷為長久計然也天下諸津舟船所聚旁通巴漢前詣閩越七澤十藪三江五湖控引河洛兼包淮海弘舸巨艦千舳萬艘交貿往還憧憧永日今若江津河口置鋪納稅則撿覆撿覆則遲留此津才過彼鋪復止非惟國家稅錢更遭主司僦賂船有大小載有多少量物而稅觸塗淹久統論一日之中未過十分之一因此淹滯必至吁嗟崔融疏白大貊小貊公羊傳曰什一天下之中正也寡乎什一大貊小貊注貊蠻貊也蠻貊無宗廟社稷城郭故稅薄也白圭之清孟子白圭謂孟子曰吾欲二十而稅可乎孟子曰子之道貊道也薄賦輕徭簿斂園有桃魏大夫刺其君國小而迫儉以嗇而無德以將之也保鄣尹鐸為晉陽請曰繭絲乎保鄣乎趙簡子曰保鄣乎尹鐸損其戶數損則稅輕而人安可謂保鄣乎繭絲減稅也度官用以賦人食貨志漢興約法省禁輕田而租什五而稅一量利祿而度官用以賦於人法才取也斂從其薄藏於百姓孔薄賦斂為要令狐德棻曰今天下無虞惟薄賦斂為要薄賦斂張玄素貞觀四年治洛陽宮且東幸玄素上書天下不可以力勝唯當務儉約薄賦斂以身先之願蠲薄徭賦張廷圭上疏願蠲薄徭賦賦斂省則人富盧藏用嘗以賦斂省則人富輕賦節用李玨帝曰人君輕所賦節所用可乎玨曰貞觀時房杜王魏為文皇帝謀固此耳帝頗向納寬百姓租賦李翱條興復太平大略曰寬百姓租賦蠲賦十萬石又曰今歲關中麥不收陛下哀民之窮下明詔蠲賦十萬石群臣動色百姓歌樂遍畎畝有詔蠲責李渤張平叔斂天下逋租渤言上不能奉詔下不忍民窮無所逃死請放歸田里有詔蠲責蠲撗租錢三百萬衛次公為陝虢觀察使蠲撗租錢三百萬罷巡勾李吉甫罷諸路歲終巡勾以絶苛斂寬賦斂曲環陝州安邑人改陳許節度寬賦斂不剝下不加斂程異方討蔡異使江表調財用所至不剝下不加斂輕用以饒寬賦田布所至寬賦勸穡人皆安之劉晏書移書於宰相元載京師三輔苦稅入之重淮湖粟至可減徭賦半為一利悽惻念誅求薄斂近休明杜甫簡元使君下無曲獻上絶私求陸贄奏議階下臨御之祕清靜之化下無曲獻上絶私求近歲已來稍逾前旨今但滌除流誤振起聖猷則淳風再興賄道中寢雖有貪叨之輩曷由復肆侵漁州郡羡財亦將焉往若不上輸王府理須下紓疲人如是則困窮之中十又緩其四五矣惻惻詔書下半減麥與緡半租豈不薄尚竭力與斤元稹旱災詩詔度支減賦崔衍復奏州縣多岩田又郵傳劇道屬歲無秋民舉流亡不蠲減租頗人無生理臣見長吏之患在因循不以聞不患陛下不憂恤也患申請不實不患朝廷不矜貸也陛下拔臣大州寧欲視民困而顧望不言哉德宗公其言為詔度支減賦通賦蒙勿收之惠柳宗元表欲人之安也在於薄斂斂之薄也在於節用若用之不節寧斂之欲薄其可得乎先在省不急之費定經用之數使下之人知上有憂恤之心取非獲已自然樂其輸矣通典復除八白小司徒稽夫家九比之數以辨老幼貴賤廢疾凡征役施舍者舍謂復不給徭役者賢者能者卿大夫以歲時登衆寡辨其可任者國中自七尺及六十野自六十有五皆役之其國中貴者賢者服公事老者疾者皆免豐沛漢高曰以沛為朕湯沐邑復其民父老請曰沛已蒙復豐未蒙上曰豐極不忘也特以其雍齒反吾故遂棄復豐也平城役又高詔吏卒從軍至平城反城守邑者皆復終日勿事諸侯子又詔曰諸侯子在關中復十二負歸者半之復身及戶又高詔非士大夫已下皆復其身及戶勿事注復其身及戶內無徭役魏氏武卒刑法志魏氏武卒衣三屬甲操十二石弩負矢五十置戈其上胄帶劍贏三日之糧日中而趨百里中試者復其戶利其田宅也買復食貨志武帝時兵革數動民多買復及五大夫長以次徵發之士益鮮也南頓後漢光武過南頓復田租一歲父老固請十年帝曰安敢遠期十年父老曰陛下惜耳因大笑復增一年也請優復常山三考上言上生元吉民願蒙優復穎川魏志文帝復穎川一年田租勸耕織史衛鞅變法民戮力本業耕織致粟帛多者復其身小利舉以為收孥年老漢武詔八十復三算復二口之算也九十者復甲九十身末利下與革車之賦貞婦平帝時復貞婦鄉一人車馬武令民車騎馬者復甲卒三人勸人養馬也五女晉武帝以將士應娶者多家有五女給復孔三歲一復韋皋為劍南西川節度使始皋務私其民列州玄除租凡三歲一復皋沒人德之優賢能文粹周禮鄉大夫職曰國中自七十以下皆征之其捨者為賢正責也服公事也注捨謂君今復除其計耳所以優賢能也陳章甫與吏部孫員外書復給文粹百姓並復給五年奉天改元赦陸贄奪其畜牧事其子孫陸贄奏議凡有私牧者例元勳貴戚之門所謂將家者皆統師嶽牧之後是乃嘗蒙親委或著忠勞復除征役固有常典今忽奪其畜牧事其子孫有乞假以給資裝有破産以營卒乘道路悽憫部曲感傷貴位崇勳孰不解體流民還者給復三年乾元二年肅宗本紀諸沒落外番得還者一年以上復三年二年以上復四年三年以上復五年外番之人投化者復十年通典白輸幣子産相鄭伯如晉晉侯未見子産曰未知見時不敢輸幣亦不敢暴露非薦陳之不敢輸也暴露之則恐燥濕之不時而朽蠹也泛舟之役秦輸粟於晉自雍及絳相繼命之曰泛舟之役謂從謂水運入汾河歸粟夏歸粟于蔡周函矜終無資也方輸錯出枚乘曰諸侯方輸錯出運行數千里不絶其珍怪不如山東之府僦載煩費王莽傳曰陳寶貨皆重則小用不給皆輕其僦載煩費注僦送也樂輸作大函使投中晉劉超世瑜為句容令常年賦稅者四出評百姓家資超作大函封付之使各自書家産投函中訖送還縣百姓依實上課所入有踰乎書也孔緩期韋溫出為陝虢觀察使民當輸租而麥未熟吏白督之溫曰使民貨田中穗以供賦可乎為緩期而賦辦代下戶納租高承簡遷邢州刺史觀察府責賦尤急承簡代下戶數百輸租蠶絲盡輸稅機杼空倚壁柳宗元田家姑舂婦簷輸促促輸官不足歸賣屋元稹田家詞老翁家貧在山住耕種山田三四畝苗疏稅多不得食輸入官倉化為土張籍野老歌賦調嘗與民為期不擾自辦王仲舒傳均輸十白桑弘羊為大司農中丞管諸侯計事事稍置均輸以通貨物詣所輸於官今去其土地所饒平於其所在時所價官更於他處賣之輸者便而官有利張林請立後漢張林請布帛為租以通貨立均輸朱暉議比賈販而止建以均輸弘羊見非於卜式比之賈販張林沮計於朱暉興榷管之利誠欲豐財畜聚斂之臣則為傷義作法於貪其敝何救以義為利則人不食若謀之不臧雖得而非貴同上輸販權販籠貨委輸坐市販昔邊鄙或聳猶假贍軍今役車其休豈資興利賜軍輸後漢光武以劉盆子為趙王郎中上賜洛陽軍輸地以列肆使食稅終身平準食貨志唯桑弘羊以天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國名往往置均輸鹽鐵官軍令遠方各以其物如異時商賈所轉販者為賦而相權輸置平準于京師都受天下委輸召工官治車器皆仰給大農大農諸官盡籠天下諸侯之貨物貴則賣之賤則買之如此富商大賈亡所牟其利反本物不得騰踴故抑天下之物名曰平準孔顧少連字夷仲改京兆尹先是京畿租賦薄厚不能一少連以法均之均租調韓滉為鎮海軍節度使均租調不踰年境內稱治居無主客人無丁中商賈稅三十之一與居者均稅自代宗時始以畝定稅而斂以夏秋至德宗相楊炎遂作兩稅法夏輸無過六月秋輸無過十一月置兩稅使以總之量出制入居無主客以居者為簿人無丁中以貧富為差商賈稅三十之一與居者均役田稅視大歷十四年墾田之數為定遣黜陟使按比諸道丁産等級免鰥寡惸獨不濟者敢有加斂以枉法論食貨志因暴斂以毀其家陸宣公豪富之徒乘急今以邀其利窮乏之輩因暴斂以毀其家非所謂均節財物準平賦法之術也若抵石于井非極泉不止李渤上言渭南長源鄉戶四百今才四十閺鄉戶三千而今遷他州縣大抵類此唯其弊始於攤逃人之賦假令十室九逃則均責未逃者若抵石于井非極泉不止誠由聚斂之臣割下媚上願下詔一賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣免貧者而不益富者稅此誠當也乘理政之後固非若此不可不幸乘弊政之後其可爾耶夫弊政之大賄賂行而征賦亂苟然則貧者無資以求於吏則有貧之實而不得貧之名富者操其贏以市於吏則無富之名而有富之實貧者困而無所省富者恣而無所忌固必問其實則貧者固免富者固賦矣安得待一定之論哉若曰止免貧者而富者不問則僥幸者衆皆挾重利以邀貧者猶若不免焉若曰檢富者懼不得實而不可增焉則貧者亦不得實不可免矣若皆得實故縱以為不均何哉孔子曰不患寡而患不均不患貧而患不安今富者稅益少貧者不免捁拾以輸縣官以為不均大矣柳宗元答元饒州書不能救弊何以為政韓休請均配餘州餘見田賦門平糴十一白食貨志李悝為魏文侯作盡地力之教曰糴甚貴傷民人士工商也甚賤傷農民傷則離散農傷則國貧甚貴甚賤其傷一也善為國者使民無傷而農益勸故善糴者必謹觀歲有上中下熟上熟其收自四萬四百石平歲百畝收百五十石今大熟四倍六百石計民終歲長四百石官糴三百石此為糴三舍一也中熟自三餘三百石自三收四百五十石終歲長三百石官糴二百石此為糴二捨一也下熟自倍餘百石自倍收三百石終歲長百石官糴五十石云下熟糴一謂中分百石之一也小飢收百石平歲收一百五十石今小飢收百石收三分之二中飢七十石收三分之一大飢三十石收五分之一故大熟則糴三而捨一中熟則糴二下熟則糴一使民適足價平則止小飢則發小熟之所斂大飢則發大熟之所斂而糶之故雖有飢饉水旱糴不貴而民不散取有餘補不足行之魏國以富強糴三輔罷關東漕漢宣時風度數登穰穀石至五錢大司農耿壽昌善為算能商功利奏言故事歲漕關東穀四百萬斛以給京師用九十六萬人宜糴三輔弘農河東上黨太原榖足供京師可以省關東漕九十過半大夫蕭望之奏以漕關內之榖築倉治船費直二萬億有動衆之功恐生旱氣上不聽望之之言漕事果便壽昌遂曰邊郡築倉以榖賤時增價糴之以利農貴時減價糶之名曰常平民便之上奏賜爵關內侯常平元帝時大水琅琊人相食在位諸儒多以常平請罷無與人爭利皆罷之管子曰歲有凶穰榖有貴賤人君不治則畜賈遊於市乘人不給百倍其本是以民有餘則輕之故人君散之以重凡重輕散斂之以時即準平故大賈畜家不得豪奪吾人也裒多益寡稱物平施貿遷有無狗彘食人食而不知檢野有餓莩而不知發孟子故管子之輕重李悝之平糴弘羊之均輸壽昌之常平亦有從事故古為之有數吏良而令行故民賴其利萬人作乂漢書贊糶三十史記糶三十病農九十病末上不過八十下不減三十則農末俱利務完物無息敝相質易腐敗而食之不便後漢劉般伯興為金吾將軍帝欲置常平公卿多以為便般以常平外有利人之名內實侵刻百姓豪右因緣為姦帝乃止孔建平糴法張檢徙代州勸墾田力耕歲數稔私蓄富實儉恐慮易驕乃建平糴法入之官虜喜悅置各糴貯備使吳武陵信州人長慶初竇易直以戶部侍郎判度支表武陵主鹽北邊易直以不職薄其遇會表置和糴貯備使擇郎中為之武陵諫曰今緣邊膏壤鞠為榛杞父母妻子不相活前在朔方度支米價四十而無踰月積皆先取商人而後求牒還都受錢脫有寇薄城不三旬便當餓死何所取財而云和糴哉中人為和糴使高鉞元和末以中人為和糴使鉞疏論執關輔以榖賤傷農宜加價糴榖陸贄近歲關輔之地年榖屢登數減百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困穀賤今夏江淮水潦漂損田苗比於常時米價加倍氓庶匱乏流庸頗多關輔以榖賤傷農宜加價糴榖以勸稼穡江淮以榖貴民困宜減價糶以救凶災之厄榖糴豐賤殊異往時陸贄近者沿邊諸州頻歲大稔榖糴豐賤殊異往時此乃天贊國家永固封略之時也而尚日不暇給曾無遠圖軍府有歉食之詞穡人有悔耕之意天贊而不愛其利農傷而不恤其窮反凶災流行播殖墯廢雖復悔恨事何可追頃請擇人充使委之平糴務農陛下以理貴因循未賜允許江淮旱榖踴貴盧坦江淮旱榖踴貴或請抑其直坦曰所部地狹榖來他州若直賤不來矣不如任之既而商賈以米坌至乃多貸兵食出諸市價遂平白九貢任土百貨以時歸時事於宰旅韓宣子聘問王命名請事對曰晉士丐將歸時事於宰旅注時事四時貢職宰旅冢宰之事也言貢獻於宰旅者不敢斥尊陳之藝極藝極法度入以歲時天子班貢輕重之列貢職之數禮天子合諸侯制貢職之數輕重之法以遠近士宜為度制財用之節貢職多少方物貢之有時取之以道飲化爰來人無遠邇率職而入貢有等夷悅服樂輸樂率貢職賨幪夷狄布貨賮志貨也方賮望日來賓以時入貢漢書憬彼淮夷來獻其琛憬遠也琛寶也禹別九州而任土作貢王府則有底貢底致也無有遠邇畢獻方物武王克商諸侯官受方物府無虛月魯之於晉職貢不乏史不絶書府無虛月誅求無時悉索敝賦以來會時事也列尊貢重列位也公侯地廣故所貢多卑而貢重甸服也甸服天子畿內供職貢也貢之無藝貢獻無極亡可待也合諸侯藝貢事禮也藝法也棧山般海踰沙軼漠之貢史不絶書文選誅求不已具歎無時供給既難寧無虛月時入周禮以時入之地貢地以生物入貢各以所有周禮制有貢各以地所有畢納納畢庭實有獻於功穎考叔凡於尊者有獻而不敢以聞此謂獻辭貔皮詩曰獻其貔皮赤豹黃罷彝器傳諸侯皆獻彝器於王晉獨無有何也叔向曰喪賓宴又求彝器非禮也盡其上實土地所有獻芹列子曰昔有獻芹於鄉老嘗之苦笑而退也獻未有程高詔欲省賦甚今獻未有程法也吏或多賦以為獻宜令諸侯常以八月十月朝獻郡國各以口數率人錢歲以六十三以給獻費獻費見上注述職漢詔曰諸侯納貢非為財幣所以述職封還獻物後漢順詔桂陽太守文襲獻大珠以希幸媚帝令還之千里馬寶劍光武有獻千里馬及寶劍劍賜騎士馬駕鼓車太官勿受光武詔郡國所獻疲敝令太官勿受也置侯和帝時南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者繼路白羽扇晉庾澤嘗以白羽扇獻帝嫌其非新反之劉劭云云孔巧索珍異杜元穎敬宗驕僻不君元穎每欲中帝意以固幸乃巧索珍異獻之踵相躡於道獻金鐶宇文士及從化及至黎陽帝手書召之士久亦遣家僮間道走長安通諄勤且獻金鐶帝悅曰我嘗與士及共事今以此獻是將來矣孫伏伽上言相國參軍盧牟子獻琵琶長安丞張安道獻弓矢並被賚賞以率土之富何索不致豈少此物哉簿羡資百萬以獻王遂師東討李師道召為光祿卿淄青行營糧料使俄而賊誅遂薄羡資百萬以獻帝高其能獻木杯藤盤韋嗣京獻木杯藤盤數十物願租賦外一絶姚元崇曰戚里貢獻以求媚于上公卿方鎮寖亦為之臣願租賦外一絶之可乎必躬閲視渾賊歲特貢奉必躬閲視掊斂獻貢齊映為桂管江西兩觀察使映罷不以罪冀復進乃掊斂獻貢以中帝欲天下歲入之物唐食貨志天寶時租錢二百餘萬緡粟千九百八十餘萬斛庸調絹七百四十萬匹綿百八十餘萬屯布千三十五萬餘端天子驕於佚樂而用不知節大抵用物之數常過其所入詭取諸郡輕貨上於帝韋堅船次樓下堅詭取諸郡輕貨上於帝以給貴戚近臣獻瓶初諸藩銀大瓶止五尺李兼為江西始獻六尺瓶至齊映乃八尺云數奏鷹犬異獵太穆皇后竇氏帝後見隋政多亂多妄誅極乃為自安計數奏鷹犬異獵煬帝喜滄海未全歸禹貢杜甫詩洛下舟車入天中貢賦均上戶部郎中掌任土所出而為貢賦之差六典戶部有獻李絳遷戶部侍郎判本司帝以戶部故有獻而絳獨無何哉答曰凡方鎮有地則有賦或嗇用度易羡餘以為獻臣乃為陛下謹出納烏有羡羸哉若以為獻是從東庫物實西庫進官物結私恩帝懼然悟杜鴻漸兼成都尹請入朝獻寶器五床羅綿十五床麝臍五石獻縑韓滉帝既狩梁州獻縑千萬匹無獻李峴遷京兆尹玄宗歲幸溫陽甸內巧供億以嬌上峴獨無所獻帝異之悉禁李石開成赦令天下非藥物茗果他貢悉禁廣貢奉劉餗廣貢奉以結恩公託進獻楊炎早四方貢獻悉入內庫權臣巧吏因得旁緣公託進獻私為贓盜者動萬萬計以珍貢私別庫陸贄始帝播遷府藏委棄衛兵無楮衣至是天下貢奉稍至於是行在夾廡署瓊林大盈二庫別藏貢物贄諫以今師旅方殷瘡痛呻吟之聲未息遽以珍貢私別庫恐群下有所觖望請悉出以賜有功令後納貢必歸有司先給軍賞瑰怪纖麗無得以供是乃散小儲成大儲捐小寶固大寶也帝悟即撤其署獻羡錢五百餘萬韓滉封鄭國二年更封晉是歲入朝獻羡錢五百餘萬緡詔加度支諸道轉運鹽鐵等使淡菜蚶蛤孔戣明州歲貢淡菜蚶蛤之屬戣以為自海抵京師道路役凡四十三萬人奏罷之得相王播自淮南還獻玉帶十有三銀碗數千綾絹四十萬遂再得相云諫罷錢徽加承旨是時內積財圖復河湟然禁無名貢獻而至者不甚卻徽懇諫罷之貢蚶元稹徙浙東觀察使明州歲貢蚶役郵卒方人不勝其疲稹奏罷之獻銀壺甕李絳襄陽裴均違詔書獻銀壺甕數百具絳歸之度支示天下以信帝可奏仍赦均罪以佩刀獻張説為東都留守説知太平等懷逆乃因使以佩刀獻玄宗請先決策納之脂盝妝具李德裕為浙西觀察使敬宗立侈用無度詔浙西上脂盝粧具德裕奏比年旱災物力未完三月壬子赦令常貢之外悉罷進獻此陛下恐聚斂之吏緣以成姦雕窶之人不勝其敝也願詔宰相議何以俾臣不違詔旨不乏軍興不疲人不斂怨則前敕後詔咸可遵承不報方是時罷進獻不閲月而求貢使者足相接于道故德裕推一以諷他侏儒陽城為道州刺史産侏儒歲貢朝廷城哀其生離無所進帝使求之城奏曰州民盡短若以貢不知何者可共自是罷獻錢三十萬緡崔祐甫淄青李正己畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答祐甫曰正己誠詐陛下不如遣使勞其軍以所獻就賜將士若正己奉承詔旨是陛下恩洽士心若不用彼自斂怨軍且亂又使諸藩不以朝廷為重賄帝曰善正己慚服獻糗餌數百馱張濬黃巢之亂稱疾挾其母走商山僖宗西出衛士食不給漢陰令李康獻糗餌數百馱士皆厭給帝異之曰爾乃及是乎對曰臣安知為此張濬教臣也乃急詔濬至行在再進諫議大夫羡餘白居易河東王鍔將加平章事居易以為宰相天下具瞻非有重望顯功不可任按鍔誅求百計不恤雕瘵所得財號為羡餘以獻今若假以名器四方聞之皆謂陛下得所獻與宰相餼牽外無他獻裴耀卿傳帝謂張説曰今帝有事岱宗而懷州刺史王丘餼牽外無他獻我知其市恩也獻馬鄭珣瑜為河南尹未入境會德宗生日尹當獻馬吏欲前取印白珣瑜視事且內贄珣瑜徐曰未到官而遽事獻禮歟不聽零陵香上供韋畝湘源生零陵香歲市上供人苦之宙為奏罷四方爭為怪珍入貢玄宗貴妃楊氏四方爭為怪珍入貢動駭耳目貢賦不絶趙匡凝太祖表匡凝荊襄節度使以匡萌為荊南留後是時唐衰藩鎮不復奉朝廷獨匡凝兄弟貢賦不絶五代史韓愈上尊號表章亥所步禹契所書四面輻輳各修貢職西戎之首北虜之渠怛威愧德失據狼狽收其種落逃遁遠去來獻羊馬千里不絶寸地尺天皆入貢奇祥異瑞皆來送不知何國致白環復道諸山得銀甕杜甫洗兵馬行感其志而戒初一品集異域歸忠傳序昔越嘗貢雉薦于宗廟西旅獻獒陳于典訓所以感其志而戒其初仁聖大孝皇帝龍荒君長上表獻良馬二絶大漢而貢赤誠涉流沙而霑赭汗萬里貢賦百蠻歸款辛替否傳貢賦均洛下舟車入天中貢賦均杜甫有感詩天子誕日諸道爭以侈麗奉獻常袞天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事袞以為漢文帝還千里馬不用晉武帝焚雉頭裘宋高祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆淫侈不急而節度使非能男耕而女織者類出於民是斂怨以媚上也請還之禁獻侏儒短節高祖本紀武德元年十一月戊申禁獻侏儒短節小馬庳牛異獸奇禽貢奉毋慮五十萬上紹為租庸判官德宗已西狩乃督輕貨趣間道走洋州紹先見行在帝勞之曰吾軍乏春服朕且衣裘奈何紹流涕曰租庸使遣臣貢奉毋慮五十萬即至帝曰道回遠經費方急何可望耶後五十萬繼至猶足紓難天下以進奉結主恩崔衍遷宣歙觀察使先是天下以進奉結主恩州藏耗竭韋皋劉贊為之倡贊死衍代之舊貢金錫凡十八品皆倍直市千州民匱多逃去衍至蠲革之莊宗以來方鎮進獻之事稍作自莊宗以求方鎮進獻之事稍作至於晉而不可勝紀矣其添都助國之物動以千數計至於來朝奉使買宴贖罪莫不出於進獻而功臣大將不境而死則其子孫率以家資求刺史其物多者得大州善地蓋自天子皆以賄賂為事矣則為其民者其何以堪之哉五代史楚州獻定國寶一十一酉陽雜俎初代宗即位自慶雲見黃氣抱日初楚州獻定國寶一十一乃上詔監國詔曰上天降寶獻自楚州神明生曆數之符合璧定妖災之氣初楚州有尼真如忽有人接去天上天帝言下方有災令以此寶鎮之其數十二楚州刺史崔侁表獻焉一曰玄黃天符形勢如笏長八寸有孔辟人間兵疫二曰玉雞毛白玉也王者以孝理天下則見三曰穀璧白玉也如粟粒無雕鐫之迹王者得之五穀豐熟四曰西王母白環二枚所在處外國歸伏五曰闕名六曰如意寶珠大如雞卵七曰紅靺鞨大如巨栗八曰琅琊珠二枚逾常珠有逾徑一寸三分九曰玉玦形如玉環四分缺一十曰玉印大如半手理如鹿形陷入印中十一曰皇后粉採桑鉤細如箸屈其末十二曰雷公石斧形無孔諸寶置之日中皆白氣連天瑞龍腦天寶末交趾貢龍腦如蠶蟬形波斯言老龍腦樹節方有禁中呼瑞脂腦上賜貴妃十枚香聞十步同上白苞茅不入齊桓伐楚曰爾貢苞茅不入王祭不供寡人是徵對曰貢之不入寡人之罪也敢不供給不供是懼闕而為罪宜守命以供時豈絶書而重月既爽樂輸宜科墯職未乖悅使何悔樂輸無之實難貢或不供必先問罪臨事有虧則思移過先期不告誰今當辜宋義王不供職貢慢官之後徒欲費辭戒事之前胡不申報孔貢獻不入高駢自乾符以來貢獻不入天子貢職廢闕責當有歸陸宣公自希烈亂常污染淮甸貢職廢闕責當有歸在于編氓豈任其咎諸侯春不貢杜甫詩藩貢或闕王命征之蘇頲藩貢或闕王命征之於是乎治兵其郊獲辭而止本傳楚貢何年絶杜甫詩珍奇之貢不入張東之論戊姚州之弊白子産爭承承謂負賦之次曰鄭伯男也使從公侯之貢懼不給也貢之無極亡可待也自日中以爭至于昏晉人許之子産爭承田班輕重見上叔孫將命請視邾滕叔孫會于宋季武子使視邾滕言自比邾滕永薄賦也苟非讎敵敢不樂輸請恤薄言宜寬厚斂事必舉中節宜奉上雖家財將竭宜緩誅求而國賦是資則難蠲免訴永減而猶可請不供而謂何孔訴機織未就盧坦為壽安令河南賦限已窮縣人訴機織未就坦詣府請申十日不聽坦諭縣人第輸勿顧限違之不過罰令俸爾由是知名上請貸期文粹孫樵書何易于督賦何如曰上請貸期不欲纍絶百姓使賤出粟帛糧儲屋宅男女牛羊幾盡元結拜道州刺史初西原蠻掠居人數萬去遺戶裁四千諸使調發符牒二百函結以人困甚不忍加賦即上言臣州為賊焚破糧儲屋宅男女牛羊幾盡今百姓十不一在耄孺騷離未有所安嶺南諸州寇盜不盡得守捉候望四十餘屯一有不靖湖南且亂請免百姓所負稅租及租庸使和市雜物十三萬緡帝許之明年租庸使索上供十萬緡結又奏歲正租庸外所率宜以時增減詔可九貢十五白周禮大宰以九貢致邦國之用一曰祀貢積牲苞茅之屬二曰嬪貢嬪或為賓皮帛之屬玄謂貢絲枲也三曰器貢宗廟之器也玄謂器者銀鏤金聲四曰幣貢繡帛也玄謂玉帛皮幣也五曰材貢竹木之材六曰貨貢金珠龜貌七曰服貢祭服絺綌八曰遊貢毛羽之屬九曰物貢謂九州之外各以所貢之物為贄若肅慎貢楛矢之類禹貢九州冀州厥貢漆絲厥篚織文文謂綺錦之屬青州厥貢鹽絺海物惟錯錯雜也非一種也岱畎也絲京鉛谷也鉛松怪石厥篚檿絲檿絲桑蠶絲中琴絃者徐州厥貢惟土五色羽畎夏翟嶧陽孤桐泗濱浮罄淮夷璸珠淚魚厥篚玄纖縞纖細也縞白纖也玄黑繒也織在中混二物皆細也楊州厥貢惟金三品瑤琨筱簜竹箭也齒革羽毛惟木厥篚織具厥苞橘柚錫貢注錫命乃貢不常荊州厥貢羽毛齒革惟金三品杶左十早右人木栝柏礪砥弩州惟梱簬楛注美竹也三邦底貢厥名注楛中矢斡三物非雲夢之澤三國咸致貢也包匭菁茅厥篚玄纁璣組九江納錫大龜注大龜亦命錫乃貢之豫州厥貢漆絲絺紵厥篚織纊錫貢磬錯注治玉曰錯梁州厥貢璆鐵銀鏤砮磬熊羆狐狸織皮雍州厥貢惟璆琳琅玕厥篚玄黃兗州厥貢漆絲厥篚織文孔辨其名物白居易裴洪泰太府少卿制九土之貢百品之貨辨其名物謹其出納常在外府貢賦未均於九州柳宗元為樊左丞讓宮表版圖再緝貢賦未均於九州貢賦修於九州同上表從民之宜乃九於野墳厥貢藝而有上中下同上天對蠻夷貢賦十六白書西旅獻獒太保作旅獒無有遠邇畢獻方物貴寶周禮九州之外謂之蕃國也一見名以其貴寶為贄象胥諭言語也嚮風來享來王名馬西域獻果下馬魏志檅國今朝鮮皆具地出果下馬漢時嘗獻之才尚三尺以來賨布晉食貨志夷人輸賨布戶一匹遠者或一丈遠夷不課田者輸義米戶三斛遠者五斗米極遠者輸算錢八十二文義米見上被聲教選遐荒越裳白雉後漢交趾之南有越裳國周公居攝六年截止裳以三象重譯獻白雉曰天元烈風雷電則中國有聖人也故來獻之請加稅後漢順帝時武陵守上書以蠻夷率服可比漢民增租請加稅虞翻云不可帝不從果叛常賦鄭純為永昌守與哀牢夷得歲輸布貫頭衣領二鹽一斛以為常賦賨人晉書廩君出武落丹穴名務相氏巴姓種類遂繁奏並以為黔中郡薄賦之口出錢四十巴人呼賦為賨人也蕃夷進獻式主客式諸蕃夷進獻答諸色無估價物鴻臚寺量之酬答也孔蔥嶺以東皆奉貢贄楊恭仁為涼州總管由蔥嶺以東皆奉貢贄就加納言朝貢踵至裴矩帝自東都矩以蠻夷朝貢踵至諷帝悉召天下奇倡怪妓大陳端門前曳錦縠珥金琲者十餘萬詔百官都人列繒樓幔閣夾道被服光麗廛邸皆供帳池酒林胾譯長縱蠻夷與民貨易在所令邀飲食相娛樂蠻夷咨嗟謂中國為仙都帝所天子以為誠諸國悉使者奉獻魏徵高昌王麴文泰將入朝西域諸國欲困文泰悉使者奉獻帝詔文泰使人厭怛紇于迎之徵曰異時文泰入朝所供擬不能具今又加諸國焉則瀕塞州縣以乏致罪者衆彼以商賈來則邊人為之利若賓客之中國蕭然耗矣漢建武時西域請置都護送侍子光武不許不以蠻夷弊中國也帝曰善追止其詔獻萬釘寶細金帶馬五千匹統業護可汗獻萬釘寶細金帶馬五千匹獻生口數十斐寬拜范陽節度使檀州刺史何僧獻生口數十寬悉歸之故夷夏感附獻濱塞亭障李吉甫吐蕃復請獻濱塞亭障南北數千里求盟吉甫謀曰邊境荒岨犬羊相吞邊夷按圖覆視且不能知今生蕃綿山跨谷以數番紙而圖千里起靈武著劍門要險之地所亡二三百所有得地之名而實喪之陛下將安用此帝乃詔謝贊普不納猛火油薔薇水五代占城顯德五年其國王因德漫遣使者莆訶散來貢猛火油八十四瓶薔薇水十五瓶其表以貝多葉書之以香木為函猛火油以灑物得水則出火薔薇水云得自西域以灑衣雖敝而香不滅魚牙紬海豹皮新羅開元中數入朝獻果下馬朝霞紬魚牙紬海豹皮又有二女獻琥珀馬瑙日本永徽初獻琥珀大如斗馬瑙者五升器龍腦香西域摩揭陀正觀十六年遣使者獻龍腦香璽書優答貢頗黎狀若酸棗罽賓武德三年遣使者貢寶帶金鎖水晶盞頗黎狀若酸棗鬱金香東安開元十四年納馬豹後八年獻波斯馬二拂菻繡氍毬一鬱金香等緑金精西域驢分國正觀十七年遣使獻赤玻璃緑金精下詔答賚蠻琛夷貢北狄贊蠻琛夷貢踵相逮于廷紫瓷盆唐杜陽編武宗會昌元年渤海貢紫瓷盆量容半斛內外通瑩其色純紫厚可寸餘舉之則若鴻毛黃金鵝以獻吐蕃贊普餘見向化門日本獻方物日本建中元年使者真人興能獻方物興能善書真人蓋因官而氏也九夷八蠻在荒服之外者皆已賓貢韓文唐受命為天子凡四方萬國不問海內外無小大咸臣順於朝時節貢水土百物大者特來小者附集送殷員外序同上越裳貢雉昔越裳貢雉薦於宗廟西旅獻獒陳于典訓一品集高麗貢方物高祖欲讓而不臣溫彥博執不可曰遼東木周箕子國漢玄菟郡不使北面則四夷何所瞻仰帝納而止或時候風潮朝貢蠻朝賈人舶交海中若帥得人則一邊盡治韓文窮天貢賝異同上聯句五色玉酉陽雜俎天寶初安思順進五色玉帶又於左藏庫中得五色王杯上怪近日西賮無五色玉令責安西諸蕃蕃言比嘗進皆為小勃律所劫不達上怒欲征之乃命王天運統諸蕃兵伐之勃律君長恐懼請罪悉出寶玉願歲貢獻天運不許即屠城而還白卜式輸家財漢武有事胸奴卜式上書輸家財半助邊上問欲官乎式曰臣少牧羊不魯為吏不願為官曰家有冤乎式曰不與人爭未嘗有冤但以天子征胸奴有智者宜效用有財者宜助國公孫弘曰此非人情不可以化而亂法遂不報數歲渾邪降縣官人衆式復持二十萬與河南尹尹上其名帝謝之召賜式外繇四百人時富豪皆匿財唯式欲助軍費上以式為郎中以諷天下杜緩入錢榖元帝時榖貴人流西羌反方征之杜緩上書入錢榖助用前後數百萬後為太常麋笁助軍資蜀志麋笁率奴客二千金銀貨幣助軍資于時困匱賴以復振奉國奉上憂國憂邊徇公産侔陶白室比程羅古時富人王丹上麥鄭禹西征王丹率宗族上麥二千斛蕭何佐軍漢召平謂蕭何曰上有疑君之心宜讓封悉以家私助軍何從其計上大悅王肅上錢縑後漢東海王肅以西羌未平上錢二萬永和中復上縑萬匹助國費鄭太后下詔褒納之孔出資助邊嚴震至德乾德中數出資助邊前後賞賜皆上于官李嗣業前後賞賜皆上于官以助軍云詔方鎮獻財助軍李固言帝伐回詔方鎮獻財助軍上疏固諫不從上米五十萬斛鹽二萬斛張允伸龐勛以徐州反上書欲遣弟允皋領兵討賊不許上米五十萬斛鹽二萬斛佐用度出家資助軍李叔明德宗幸興元出家資助軍悉衣幣獻宮掖
