body:
  text: 卷第八十一換田一白傳鄭伯以太山之祊易許田又曰鄭伯以璧假許田穀梁云鄭伯以璧假許田非假也諱易也天子在上諸侯不敢以相與諸侯受於天子助祭太山湯沐邑也子不得專也許魯衛宿邑祊鄭助祭太山湯沐邑也易地交易疆場之地一彼一此何常之有各以所利兩不相傷去彼取此求田史田蚡使籍福魏其侯城南田魏其曰老僕雖棄將軍雖貴可以勢奪乎蚡怒曰魏其何愛數頃田也請官地田蚡為丞相請考工地益宅上怒曰君何不遂請武庫為將請美田宅秦王翦伐荊始皇迭至灞請美田宅園地甚衆至軍又使使請美田者五輩或曰將軍之乞貸亦已甚矣翦曰秦王不信人故請業自固也占田王立使客因南郡守李尚書占墾草田數百頃上書願入縣官詔平田與直有費一萬萬孫寶子嚴按發劾奏尚下獄也孔瘠地易上地食貨志憲宗末天下營田皆雇民或借庸以耕又以瘠地易上地民間苦之穆宗即位詔還所易地而耕田畝換易唐楊炎言於帝曰開元承平久不為版籍而丁口轉死田畝換易白聽以版圖周禮小宰聽閭里以版圖注版戶籍也圖地圖也聽人訟地者以版圖決之地訟周禮凡地訟以圖正之注云地訟爭疆界也以土地之圖斷其訟齊楚俱失虞芮不爭虞芮二國爭田久而不決相謂曰西伯仁人也盍往質焉入其境耕者讓畔行者讓路虞芮之君曰吾儕小人不可以入君子之朝遂以所爭之田為間田宋鄭之間有隙地田彌作頓丘王暢巖戈錫六邑宋鄭盟曰勿有是鄭人後成巖戈錫宋向巢伐鄭鄭敗宋師於六邑轔虛依前不肯也農必有畔地豈無圖定其廣狹必先量地辨以曲直亦在徵書請詳無理之辭庶驗求多之罪勸農務本必制夫廛度土有初豈無籍地豪奪吾人漢書先疇沃上爭尋常之地傳邢侯與雍子爭鄐田兄弟爭田韓延壽為左馮翊行縣至高陵有兄弟爭田者延壽曰是吾化不行閉閣思過請告將解印訟者慚以田相讓願終身不爭質厥成詩虞芮質厥成見上爭孟子曰爭地以戰殺人盈野孔段秀實初為營田判官涇大將焦令諶取人田自占給與農約熟歸其半是歲大旱農告無入令諶曰我知入不知旱也責之急農無以償往訴秀實秀實署牒免之紛紜與奪八十一斷李華練塘頌序潤州練胡幅員四十里其傍大姓強家泄流為田專利上腴畝收倍鐘富劇淫衍旱則懸耜水則具舟人罹其害九十餘祀凡徑上司紛紜與奪八十一斷曲能掩直強者以得之韋公素知截湖申戒縣吏率徒闢之所潤者遠原隰皆春耕者飽憂者泰獵犯人田有辭怒而射許圉師俄坐其子獵犯人田有辭怒而射之圉師掩不奏為人告擲帝讓曰宰相而暴百姓非作威福乎咋舌不敢言劉禹錫高陵令頌涇水東行注白渠灑而為三以沃關中故秦入常得善歲涇陽人擁而顓之私開四竇澤不及下涇田獨肥也邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之腴皆權幸家榮勢足以破理訴者復得罪由是咋舌不敢言吞怨銜忍公乃循故事考式文暨前後詔條更水道入于我里請杜私竇使無棄流請遵田令使無越制京兆具事以聞詔許訖役訟爭李華復練塘頌膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年遊淀為漻清不爭步畝文粹劉梲與崔尚書方今天下百姓不敢爭步畝三疏申理卒與民直張仲方為金州刺史宦人奪民田仲方三疏申理卒與民直白決渠降雨荷插成雲溝塍綺錯開竇灑流溝澮脤連白公開涇以溉秦漢太始二年趙中大夫白公奏穿涇水起谷口尾入櫟陽注渭中袤二百里溉四千五百頃人歌曰田於何所池陽谷口云云谷口即今雲陽治國邑也史起引漳而灌鄴魏文侯曾孫襄王時史起為鄴令引漳水而灌鄴以留魏之河內人歌曰引漳水灌鄴旁千古岸生稻梁決為雨之渠泥惟數斗人歌曰涇水一石其泥數斗且溉且糞長我禾黍注水中停淤泥可以當糞收如雲之稼畝乃一鐘鄭國為奉鑿涇水旁北山東注渠成雨其田溉注填遊之水溉舄鹵之地四萬頃皆畝一鐘無鹵年一溉之功且異復枯之效旱苗嘗經一溉亦復枯也萬頃之潤寧虞首種之艱月令首種不入且溉縣糞如粢如梁濬茲溝洫決彼堰瀦變雲雨於黃污化膏腴於舄鹵無旱暵之憂得沮洳之澤稻人周禮稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮瀉水種之芒種皆治水也列音祿計切濬其畝澮生彼稻梁見上十二渠具縣令勸課門沃野沃渭溉灌均水均束邵信臣為南陽守行視郡中泉通溝瀆起水則堤闕以廣溉灌人得其利為水作均水約束刻石立碑以防分爭六輔渠倪寬為左內史奏請開六輔渠溉田作塘晉張閔字敬緒為晉陵內史所部四縣以旱田遂立曲河新豐塘溉八百餘頃每年豐稔葛洪作頌以擅興廢免官其後益拜大司農畎澮清白渠斗門式水部式京兆府高陵界清白二渠交口置斗門堰清水恆淮為五分三分上中白渠二分入清渠若雨水上多即上下用水處相開放還入清水三月一日已前八月二十日已後任開放之蓄泄蓄貯水泄放水治舊渠後漢何敞為汝南守治銅陽舊渠百姓賴其利墾田增二萬頃修三渠晉食貨志夏侯和修新渠富壽遊陂三渠溉田三百頃濬畎澮渠也變逸於勞力移地利以農易瘠智切天功美鄭白之沃亡沮溺之勤溉岡鹵晉書符堅通伾上源鑿山起堤逍渠引瀆以溉岡鹵百姓賴之孔右史渠溫造為朗州刺史開後鄉渠百里溉田二千頃民獲其利號右史渠溉四縣田節度河陽秦復懷州古奏渠枋口堰以溉濟源河內溫武陟四縣田計五千頃築句城塘李襲譽纍楊州長史楊州吳江大都會俗喜商賈不事農襲譽為引雷陂水築句城塘溉田八百頃以盡地利鑿汾水絳州刺史韋武鑿汾水灌田萬三千餘頃以水與民昭懿公主大歷末寰內民訴涇水為磑壅不得溉田京兆尹黎幹以請詔撤磑以水與民時主及曖家皆有磑丐留帝曰吾為蒼生若可為諸戚唱即日毀由是廢者八十所作均水法戴叔倫守撫州刺史氏歲爭溉灌為作均水法俗便利之築富人固本二塘李吉甫為淮南節度使築富人固本二塘溉田且萬頃孟瀆孟簡為常州刺史州有孟瀆久淤閼簡治導溉田凡四千頃斥海濱棄地為田杜佑初佑決雷陂以廣灌溉斥海濱棄地為田積米至五十萬斛廝水溉田李頻再遷武功令有六門堰者廞廢五百五十年方歲飢頻發官廥庸民浚渠按故道廝水溉田穀擦以大稔擅決司洧水盧群淮西吳少誠擅決司洧水溉田使者之不奉詔命群臨詰引伊洛崔縱為河南尹引伊洛溉高仰通利里閭水甚宜之泄流為田李華潤州復練塘頌序大族強家泄流為田決翟陂趙昹卒珝代立珝頗知書乃求鄧艾故迹決翟王陂溉民田兄弟居陳二十餘年陳人大賴之五代史釃引新渠匯于河流瀦雷陂以溉穡地釃引新渠匯于河流皆省功費而弘利澤權德輿岐公淮南遺愛碑歲獲粳稻蒲魚無慮萬計于頔為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命復修堤閼歲獲粳稻蒲魚無慮萬計螣泉落環珮畦田差纂組杜牧弄水亭詩波光碧繡畦東坡詩北有澗水通青苗杜甫夔州歌東屯稻畦一百頃北有澗水通青苗疏導渠流永徽六年雍州長史長孫祥奏言往日鄭白渠溉田四萬餘頃今為富商大賈競造碾磑堰遏費水渠流梗澀止溉一萬許頃請修營此渠以便百姓至於鹹鹵亦堪為水田高宗曰疏導渠流使通溉灌濟沃炎旱應大利益大尉無忌對曰白渠水帶泥淤灌田益其肥美又渠水發源本高向下枝分極衆若使流至同州則水饒足比為碾磑用水泄渠水隨入滑加以壅遏耗竭所以得利遂少於是遣祥等分檢渠上碾磑皆毀之至大曆中水田才得六千二百餘頃代田四白後漢末以趙過為搜粟都尉過能為代田一畝甽工犬反歲代處故曰代田古法也後稷始甽田以耜為耦並兩耜而耕廣尺深尺田甽長終畝一畝三甽一夫三百甽而播種於訓中苗生葉已上稍耨壟草因隤其土以附苗根故詩曰或耘或耔黍稷嶷嶷耘除草也耔附根也言苗稍壯每耨輒附其根也比盛暑壟盡而根深除能風旱故嶷嶷而盛也其耕耕下種田器皆有便巧漢五頃田當古十二項古以百步為畝漢以二百四十步為畝故十二夫之田於漢為頃率五頃田用耦耕二牛三人一歲之收常過縵田畝一斛已上縵田不為甽者莫幹反善者倍之善為甽者又過縵田畝二斛已上者過使教太常三輔太常主諸陵有民亦課種田大農買工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人挽犁過奏光以為丞教人相與庸挽犁庸功也言挽功其作也義亦與傭賃同率多人者田日三十畝少者十三畝以故田多墾闢又教邊郡及居延是邊城河東弘農三輔太常民皆使代田用力少而得穀多也孔月一代唐嚴郢奏秦地膏腴田曰上上耕者皆畿人月一代功甚易農器五白周易斫木為耜揉森為耒耒耨之利以教天下蓋取諸益周禮煆氏為鎛器田器也錢鎛之屬錢鎛農器鑄劍戟為農器家語天子親載耒耜月令修耒耜具田器季冬告人月令揉木為耒范金為錢鎛三之日于耜豳詩正月遂人治野以時器勸氓時器耒耜錢鎛之屬越鎛考工記越無鎛非無鎛夫人而能為鎛也借鉏漢賈誼曰商君化秦俗子借父擾鉏慮有德色秦借而著包西征賦曰子羸鉏而借父秦俗而著包遂大夫簡稼器修稼政車人為耒庛音次謂耒下前曲接耜也長尺有一寸中直者三尺三寸上句者二尺二寸堅地欲其直庛柔地欲其句庛直庛則利推土回反句庛則利發倨句磬折謂之中地中地之耒其庛以直者如磬折調之調者弦六尺也水排鑄後漢杜詩公君為南陽善計略教民造作水排鑄為農器用力少見功多人便之孔請三千具默啜請農器三千具收河北耕器為范五代劉審交遷陳州防禦使出視民田見民耕器簿陋乃取河北耕器為范為民更鑄剡木為犁室韋剡木為犁人挽以耕耕具白敏中兼邠寧制置使規蕭關通靈威路使為耕戰具大售殷賦陸龜蒙治家子言吾且始鑄田器歲東作必大售殷賦重秉耒耜者一撥不敢起器無耒耜張曲江龍池頌人食未粒鳥獸是茹時不耕稼器無耒耜而神農氏將教其本則天為之雨粟鑄鎛釤鉏斸韓文李惟簡志益市耕牛鑄鎛釤鉏斸以給農之不能自具者夫神農斫耒耜孝闢耨所以墾良田而殖嘉穀也然而不能遏稂莠之滋焉其所以遏之者芟夷錢鎛之而已元稹策市耕牛佃具李惟簡出為鳳翔節度市耕牛佃具給農歲增墾數千萬頃初稅農具錢五代唐明宗長興二年種六白詩曰誕降嘉種維秬維秠維穈維芑秠一稃二米穈赤苗芑白苗也周禮司稼辨穜稑之種周知其名辨五物九等五物五地也九等謂騂剛赤緹云云舍人懸穜稑之種以供皇后春獻禮皇后率六宮獻穜稑之種不能償種假與漢平詔貪人遷徙至徙所易田宅假牛犁穜植也凡糞種騂剛用牛騂赤上剛強也赤緹用羊赤稊縓色間地兮反墳壤用麋渴澤用鹿故水處鹹瀉用貆貆貒音丸勃壤用狐狐壤粉解埴壚用豕壚粘疏也強壏用蕡壏音檻蕡麻實也強壏堅地輕爨用火輕爨脆音孚照反凡上言用者皆謂煮其汁漬種也五種月令十二月雜五種漢書必雜五種以備災也孔請十萬斛默啜請粟田種十萬斛種不得下權德輿大旱上闕政曰畿甸之內大率赤地而無所望虒夌種時種不得下宜詔在所裁留經用以種貸民易種子陸贄謂宜詔度支召工就諸屯賜種子勸之播蒔敬始李翰屯田紀績頌陳三壤之禮而敬其始苗稼七白黍稷嶷嶷曾孫之稼如茨如梁既堅既好不稂不莠五穀不滋彼黍離離穫之挃挃穫聲先雨耘耨管子別苗莠列疏遫遫密也芃芃其麥五稼如雲之稼于耦其耘是刈是穫黍稷方華我黍與與我稷翼翼中原有菽菽藿藝麻如之何衡從其畝實莠國稼若苗之有莠若粟之有秕維穈維芑穈赤苗芑白苗降之穈芑離離山上苗苗而不秀孔崔沔曰祭祀上天苑囿躬稼所收莫不薦而後食盡誠敬也豐苗亦已穊雲水照方塘杜甫東渚詩耕之耰之文粹顧況上古愍農也䅎盛苗衰耕之耰之襏襫鋤犁手胼足胝嘉穀奮興根葉肥潤韓愈賀雨表麥芒際天搖青波柳宗元罷亞百頃稻西風吹半黃杜牧稻詩我屯之稼如雲漠漠李翰屯田紀績頌閲稼于冷泉後唐明宗紀綿延稼盈疇韋應物紆直水分野綿延稼盈疇登原欣時稼秋郊詩以稼則碩以植則茂柳宗元白認禾後漢承宮字少子避地漢中與妻子家陰山種禾黍熟人認與之認稻吳鐘離收子幹種稻將熟縣人認其田遂以稻與之墾萊田晉郭翻長翔欲墾萊田光立表經年無主乃作將熟人認禾悉與之縣令聞將稻還翻不受擅耕魏任假昭光有擅耕田種以語假假云我借之孔三疏申理張仲方補金州刺史宦人奪民田三疏申理卒與民直大族強家泄流為田李華練塘頌序見上田訟門注望沄沄兮視冥冥鳥間魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神明百年遊淀為漻清同上頌高陵令劉君請杜私竇使無棄流請遵田令使無越制以地還李惟簡改戶部尚書金吾大將軍有長尚萬國俊者以軍勢奪興平人田地吏憚莫敢治及公為金吾興平人曰久聞李將軍為人公平庶能直吾屈即齎縣牒來見公發視立杖國俊廢之以地還興平人訴牛羊使奪其田姚合纍給事中奉先馮翊二縣民訴牛羊使奪其田詔美原主簿朱儔覆按偎以田歸使合劾發其私以地還民手詔賜田隱太子傳秦王以美田給淮安王神通而張婕妤父丐之帝手詔賜田詔至神通已前得不肯與婕妤妄曰詔賜妾父田而王奪與人帝怒召秦王讓曰我令不如爾教耶饁餉九白饁彼南畝田畯至饎詩冀缺耨其妻饁之敬相待如賓具夫妻門書云葛伯仇餉有餉田葛伯殺而奪之餉者怨之故書云仇餉有嗿其饁嗿吐敢反衆兒伊黍來餉載筐及莒其餉伊黍其笠伊紏婦子來饁注筐莒盛黍稷豐年物雖賤猶食黍求漿酺之呂后田中酺老父孔耕餉戴叔倫守撫州刺史民歲爭溉灌為作均水法俗便利之耕餉歲廣隨日隨餉杜牧之上周相公墀書邊地無積粟師無見糧不先屯田隨日隨餉是不知地利也田婦有嘉獻發撒新歲餘韋應物西峰詩白租牛客晉王恂字良夫為河南尹魏時公卿已下租牛客戶有差自後小人憚役多樂之為貴勢之門動有百數又太原諸郡亦有胸奴胡人為田客多者數千武帝禁之恂明峻有防所部莫敢犯之蔭人為衣食客晉武帝制以品之高卑得蔭人為衣食客六品已上三人七品八品二人九品一人其田客第一第二品無過五十戶第三品十戶第四品七戶五品五戶六品三戶七品三戶八品九品一戶庇身亢身在其宇下孔縱田客殺人五代蕭希甫初明宗欲以希甫為諫議大夫豆盧革韋説頗沮難之其後革説為安重誨所惡希甫希旨誣奏革縱田客殺人革説終皆貶死家田佃戶五代周行逢民過無小大皆死夫人嚴氏諫曰人情有善惡安得一概殺之乎行逢怒曰此外事婦人何知嚴氏不悅紿曰家田佃戶以公貴頗不力農多恃勢以侵民請往視之至則營居以老歲時衣青裙押佃戶送租入城行逢往就見之勞曰吾貴矣夫人何自苦耶嚴氏白公思作戶長時乎民租後時常苦鞭朴今貴矣宜先斯以率衆安得遂志壟畝間乎白十月滌場霜降而收縮物場功畢入九月築場圃豳詩今之七月場人掌國場圃以時斂而藏之周禮築場圃農乃登穀月令七月孔場圃李林甫傳二十四年帝在東都欲還長安裴耀卿等建言農人場圃未畢須冬可還委圃賸疏雲矗以委圃歐陽詹就理韋蘇州丁壯俱在野場圃亦就理纍纍白公觀稼纍纍繞場稼地為鬥場孟方立克用擊邢洺滋無虛歲地為鬥場人不能稼竹木稍摧翳園場亦荒蕪韋應物詩失望築場圃吾衰尤拙計失望築場圃杜甫詩築場看斂積一學楚人為東屯詩百穀十二白播厥百穀百穀用成抽寶惟穀嘉穀穀惟國寶食乃民天穜稑之種仰膏雨左傳小國之仰大國如百穀之仰膏雨新穀既升九穀周禮太宰以九職任萬人一曰三農山澤平地九穀黍稷麻麥豆之屬五種月令季冬告人出五種命農計耦耕九種五穀種孔熾茂劉仁軌諫曰今茲澍澤霑足百穀熾茂嘉生張九齡今百穀嘉生乃怠於事天恐不可以訓青囊盛種李泌請以二月朔為中和節民間以青囊盛百穀種相問遺號為獻生子豐成陸贄奏議今歲關中之地百穀豐成京尹及諸縣令頻以此事言憂在京米粟太賤請廣和糴以救農人地不愛寶致百穀之豐穰柳文油油時雲雨厥百穀李華高宗康頌白祈禮孟春天子乃以元日祈穀于上帝登孟秋農乃登穀天子嘗新先薦寢廟孔不登陳君賓遷邢州刺史徙鄧州明年四方霜潦獨君賓所治有年儲倉充羡蒲虞二州民就食其境太宗下詔勞之曰去年關內六州穀不登餱糧少令析民房遂食聞刺史與百姓識朕此懷務相安養還有羸糧出布帛贈遺行者知此水旱常數更相拯贍禮讓興行海內之人皆為兄弟變澆薄之風朕顧何憂已踊貴盧坦江淮旱穀踊貴或請抑其價坦曰所部地狹穀來它州若直賤穀不至矣不如任之既而商以米坌至積穀翁韋寅善治生初陳初廣州宣宗垂誡貪泉寅奏曰江淮江陵生積穀尚七千堆固無所貪宣宗曰此所謂積穀翁雜家穀賤傷農馮道明宗問曰天下雖豐百姓濟否道曰穀貴餓農穀賤傷農因誦文士聶夷中世家詩嘉穀奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶韓愈賀雨表始築常平倉韋宙永州刺史州負嶺轉餉艱險每飢人輒殍死宙始築常平倉收穀羡餘以待之有田種穀今流血杜甫憶昔詩所務穀為本邪贏無乃勞杜甫述古詩馬厭穀韓文馬厭穀兮士不厭粳籺穀者所以阜俗康時聚人守位者也下至十室之邑必有千鐘之藏苟凶穰以之貴賤失度雖封丞相而猶困侯大農而謂何杜甫策問穀者百姓之本百役皆出同上説旱有田五百畝樹之穀柳宗元送從弟謀序囷倉穀粟滿未有旦夕憂韓文嘉穀隱豐年草深苗且稀農夫既不藝孤穗將安歸李白詩白有秕若苗之有莠若粟之有秕周粟伯夷叔齊不食周粟紅粟漢紅粟流衍太倉之粟紅腐不可食陳陳相因秦輸粟于晉三日求仁者之粟以祀之雖有粟吾得而食諸孔歲收粟十萬斛竇靜表請屯田太原帝從之歲收粟十萬斛輒發蕭復改同州刺史歲歉州有京畿觀察使儲粟復輒發以貸人有司劾治詔削階停刺史或吊之復曰苟利於人胡責之辭賤估以濟民蕭倣出太倉粟賤估以濟民至渭倉者百二十萬斛裴休進中書侍郎居三年粟至渭倉者百二十萬斛丐粟劉三復母病廢丐粟以養欲粟賤追李峴李峴出為零陵太守時京師米翔貴百姓乃相與謠曰欲粟賤追李峴似莠東夷流鬼粟似莠而小飛龍粟宣宗紀大中元年二月癸未停飛龍粟黃河西岸是吾蜀欲須供給家無粟杜甫瘦地翻宜粟杜甫秦州詩以沙參粒唐史突厥序為將者刻薄自入賦粟以沙參粒財粟殫亡韓文農不耕權財粟殫亡匹縑易粟數十斛郭元振為涼州都督舊涼州粟斛售數千至是歲數登至匹縑易粟十斛獲陳粟賈相在滑州境內大旱秋稼盡損賈召大將二人謂曰今歲荒旱煩若救三軍百姓也曰君可辱為健步翌日當有兩騎衣縿緋所乘馬蕃步鬣長經市出城君等蹤之識其所滅處則吾事諧矣二將乃裹糧衣皂行尋之一如賈言自市至野行二百里大冢而滅遂壘石摽表志焉經信而返賈大喜令數百人具畚鍤與二將偕往其所因發冢獲陳粟數十斛人竟不之測酉陽雜俎雖有數斗玉不如一盤粟李白鳥雀苦肥秋粟菽杜甫詩白玉換斗粟李白送劉長史濁醪與脫粟在眼無咨嗟杜甫詩日給朝班及暮齒日給還脫粟正觀初率土霜儉一匹絹才得帖斗粟而百姓怡然者知陛下憂憐之故人人自安曾無謗讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以陛下不憂憐之咸有怨言馬周白芃芃其麥詩登孟夏農乃登麥天子乃以彘嘗麥種董仲舒以春秋云聖人重麥如此宜令關中種宿麥丘中有麥詩兩歧張湛為漁陽人歌曰麥秀兩歧取溫之麥鄭國伐周云云甸人獻晉侯欲麥使甸人獻麥詩云貽我來牟大麥也不熟月令仲春行夏令則陽氣不勝麥乃不登勸人種麥無或失時八月孔獨恃於麥獨孤及上疏陳政曰民不敢訴於有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子咬骨矣教種韋丹為容州刺史教種茶麥吐蕃其稼有小麥青稞麥蕎麥白麥五代回鶻地宜白麥青稞麥進瑞麥五代梁宋州節度使友諒進瑞麥一莖三穗太祖怒曰宋州大水何用此為碧麥唐杜陽編元和八年大軫國貢碧麥形大於中華之麥粒表裏皆碧香氣如粳米食之體輕久可以御風金麥同昌公主出降賜金麥銀米共數斛此皆條枝國獻青波麥芒際天搖青波柳宗元詩自蒔以觀其成太子瑛元宗種麥苑中瑛諸王侍同帝曰是將事宗廟故親之亦欲若等知稼牆之艱因分賜侍臣曰春秋無麥禾古所甚重比詔使者閲田畝所對不以實故朕自蒔以觀其成山田麥無壟春氣晚更生杜詩青熒陵陂麥杜甫喜晴詩大麥乾枯小麥黃杜甫大麥行大麥乾枯小麥黃婦女行泣夫走藏東至集壁西梁畔問誰腰鎌胡與羌徼麥早向熟杜甫客堂詩野多青麥同上崆洞小麥熟且願休王師送高適南陽郭門外桑下麥青青韓文麥篲李賀詩麥芒如篲黍如粟宿麥以秋種太陰于時雨雪而霜故大傷首種首種謂宿麥以秋種故謂之首種入收也春為沍寒所傷故至夏麥不成長也臣恐霜雪損稼夏麥不登無所收入也王方慶疏麥雨漲溪田李賀孤城麥秀邊杜詩細麥落輕花同上江畔細麥復纖纖同上再熟高昌土沃麥皆再熟田舍子勝穫十斛麥尚欲更故婦許敬宗麥爛于場韋替否疏擇膏腴地蓻麥韋陟白清流之稻文選九熟抱朴子曰南海有九熟之稻再熟交趾有一歲再熟之稻薦禮冬薦稻稌夏穱滍皋香粳稻嘉蔬禮稻曰嘉蔬十月穫稻詩嘗稻季秋天子嘗稻先存寢廟生人歌曰引漳水灌鄴帝終古斥鹵生稻梁食夫稻語藉稻左傳鄅人藉稻邾人襲鄅人注君藉蓋履稻而行也認苗鐘離收事見上注不遺種今吳稻蟹食不遺種子國語孔盧城北狄傳渤海俗所居者曰盧城之稻巨粒西域摩揭陀有異稻巨粒號供大人米歲四熟天笁稻歲四熟稻粒寫詩北夢瑣言曰都會間有運大筆如椽或於稻粒上寫七言詩一絶歷歷可愛千畝碧泉亂東屯大江北百頃平若按六月青稻多千畝碧泉亂插秧適云已引溜如溉灌杜甫望補稻畦水歸玉粒定晨炊紅鮮任霞散同上輸官雞輸稻梁杜甫壯遊佇聞粳稻香東渚雨今足佇聞粳稻香秋行東諸詩罷亞罷亞百頃畝西風吹半黃杜甫獨酌野稻水穀唐地理志滄州乾符本魯城乾符元年生野稻水穀十餘頃燕魏飢民就食之稻收豐衍郭元振為涼州都督遣甘州刺史李漢通闢屯田盡水陸之利稻收豐衍龍睛稻唐謝玄卿遇神仙設龍睛稻續仙傳稻米流脂粟米白公私倉廩俱豐出杜甫詩琅琊之稻唐李百藥見幼敏門獐牙稻白居易詩鹿米獐牙稻粳稻來東吳杜甫出塞詩香稻香稻啄餘鸚鵡粒秋興詩粳稻共比屋南池昌谷五月稻細青滿干水李賀詩殫江南之稻柳文稻月一熟南蠻墮婆登嘗稻雪翻匙柳司馬詩平田百頃間收稻詩香稻三秋末平田百頃間杜甫珠稻元稹祝神珠稻欲垂新荒畦九月稻義牙李賀田中白彼黍離離薦月令秋薦黍殺雞為黍芃芃黍苗詩方華黍稷不能藝黍稷我黍與與生鄒衍吹律於燕谷燕谷乃曖生黍五穀之長韓子曰黍者五穀之長祭先王以為上盛也飯黍無以箸孔釀酒王績種黍春秋釀酒東皋多種黍勸爾早耕田李白贈崔秋浦傷萎天風拔大木禾黍咸傷萎李白寓言映道耕田秋雨足禾黍已映道杜甫遣興自種自斂植乃禾黍自種自斂柳宗元牛賦賴知禾黍收已覺糟床注杜甫荒村詩苦辭酒味薄黍地無人耕同上多麥與黍韓文元和聖德詩力難及黍稷得種菜與麻杜甫詩禾黍積東災韋應物授衣綿延稼盈疇韋應物禾十八白唐叔得禾異畝同穎書玄山之禾呂氏春秋曰飯之美者玄山之禾也禾役穟穟納十月納禾稼禾乃登七月取成周之禾鄭伐周云云犯季子皋葬其妻犯人之禾盡偃盡起天大雷電以風禾盡偃王出郊天乃雨反風禾則盡起尚書大無麥禾春秋書曰孔沒橐它天笁國禾之長者橐它玉山禾韓愈駑驥詩飢食玉山禾祥禾甘津澤祥禾秋雨聯句回霜收電文粹李德裕上尊號册回霜收電為之反禾禾生隴畝無東西杜甫兵車行縱有健婦把鋤犁禾生隴畝無東西種禾溝甽元稹田野狐兔行狐猾兔翦同上禾黍日夜長足得盈我囷元稹旱災禾頭生耳朝野僉載諺云秋雨甲子禾頭生耳幽州華州進嘉禾圖各一軸柳宗元賀嘉禾表六穗慚稱於漢臣異畝恥書於周典同上嘉禾一穰江淮為之康嘉禾一歉江淮為之儉嘉禾在全吳之壤最腴翰屯田頌云一莖五穗聞河南縣獻嘉禾一莖五穗重規視之曰偽也笞其人而遣五代白人食半菽不辨周子有兄不辨菽麥隕霜殺菽粥後漢光武曰昨公孫豆粥飢寒俱解種楊惲歌曰種一畝豆落而為萁中原有菽庶民采之詩維秬維秠維穈維芑秬黑黍秠一桴二米穈赤苗芑白苗詩十月納禾稼黍稷穜稑禾麻菽麥稻人掌澤草之所生種之莣種莣種稻麥地官周禮廩人掌九穀以待匪頒賙賜稍食官地黍稷垂成不能為榮黍而不黍不能蕃庶稷而不稷不能蕃殖國語丘中有麻孔䝁豆夏侯端東走擷鱉豆以食黑豆屑五行志黃巢未入京師時都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊兩器盧懷謹日晏設食蒸豆兩器靈光豆唐杜陽編大曆中日林國獻靈光豆大小類中國之菉豆其色紅而光芒長數尺本國人亦呼為詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫稱之可重一斤已上啖之一丸香美無比而數日不復言飢渴靈沙臛雲仙散録品物類聚曰白馬豆食之齒醉虢國夫人廚吏鄧連以洗豆皮作靈沙臛供翠鴛堂豆以二七為族唐酉陽雜俎狐猾兔翦禾苗豆甲狐猾兔翦元稹挾劍豆酉陽雜俎浪東有融澤之中生豆莢形似人挾劍橫斜而生豆苗鹿嚼解烏毒白居易禽蟲章注嘗獵者相攜行豆田秋花藹菲菲杜甫甘林天雨豆五代司天考天雨豆之類皆非中國耳目所及豆入牛口竇建德竄牛口谷初其軍有謠曰豆入牛口勢不得久至是果敗已喜黍豆高杜甫大雨豆子雨已熟杜詩蟲食豌豆陸相奏議京兆府先奏蟲食豌豆全然不收其用甚微且豌豆為物其用甚微舊例所支唯充畜料準數回給大豆諸司誰曰不然計價利剩徵義將安在同上種豆耘鋤元稹田野狐兔行白范丹後漢朝議以范丹為侍御史乃遁梁沛徒行敝服賣十卜於市遭黨人禁錮遂推鹿車捃拾自資捃表晉庾袞字叔褒麥熟穫者已畢而尚多兖列群子退曰待聞乃捃不曲行不旁掇跪而把之則亦有六種故畦列子類林百歲於春陂拾遺故畦並歌並進斂材周禮一曰斂材聚斂疏材彼有不獲稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利詩俯有拾仰有取漢書俯拾地芥拾橡庾袞叔褒又與邑人之山拾橡分夷險序長幼推男居難禮無違者孔收橡實崔從歲飢收橡實以飯及衆多杜甫望補稻畦詩遺穗及衆多我倉戒滋漫貧者不免於捃拾柳宗元論政理書今富者稅益少貧者不免於捃拾以輸縣官大田斯穫不有遺秉則滯穗也文粹歐陽詹上鄭相書云萬秉希一萬穗希一某豈遂當其一乎清霜九月天髣佛見滯穗杜甫雨詩捃拾榛藂間唐舊史劉贊為歙州刺史有老婦人捃於榛藂間猛獸將噬之幼女號呼搏獸而救之母子俱免故畦遺穗已蕩盡杜甫白鳧行儲蓄二十一白周禮地官委人掌斂野之賦斂薪芻凡疏林木疏林草木有實凡蓄聚物聚物諸瓜瓠葵芋為御冬之具也以稍聚待賓客以甸聚待羇旅凡余物以待頒賜余當為子詩篤公劉乃積乃倉乃裹餱糧于橐于囊王制國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢人無菜色然後天子食日舉以樂月令十月謹蓋藏循行積聚無有不斂九月趨人收斂務蓄菜旨蓄詩曰我有旨蓄亦以御冬聚斂之臣敝邑不敢保聚晉飢晉侯紓積聚以貸無蘊年蘊積斂不分災也子産曰陳其亡乎聚禾粟而不撫其民倉廩實知禮節公私之積賈誼曰漢幾三十歲公私之積猶可哀痛無不務納月令委積地官委人掌軍旅供其委積薪芻孔馬周言自古以來國之興亡不由積畜多少在百姓苦樂也且以近事驗之隋貯洛口倉而李密因之積布帛東都而王世充據之西京府庫亦為國家之用向使洛口東都無粟帛王世充李密未必能聚大衆但貯積者固有國之常要當人有餘力而後收之豈人勞而強斂之以資寇邪無一歲之儲韋嗣立建言今廩帑耗竭無一歲之儲假遇水旱人須賑給不時軍興士待資裝陛下何以具之視年豐耗發斂韓休積米長安萬年二縣各數十萬石視年豐耗而發斂焉故人不艱食儲廥贏衍王思禮在太原儲廥贏衍蓄積有素崔衍居十年嗇用度府庫充衍及穆贊代之以錢四十萬緡假民賦故雖旱人不流捐由衍蓄積有素也家得儲三千斛王起歷河中節度使方蝗旱粟價騰踊起下令家得儲三千斛斥其餘以市否者死神策士怙勢不從置于法由是廥積咸出民賴以生備凶年戶部尚書韓仲良奏王公以下墾田畝納二勝其粟麥粳稻之屬各依土地貯之州縣以備凶年制從之自是天下州縣始置義倉每有飢饉則開倉他賑給通典高宗武后數十年間義倉不許雜用其後公私窘迫貸義倉支用自中宗神龍之後天下義倉費用殆盡開元中定式王公以下每年戶別據所種田畝別稅粟二升以為義倉其商賈戶若無田及不足者上上戶稅五石上中以下遞減各有差同上天寶中凡天下諸色米計九千六百六萬二千二百二十石和糴一百一十三萬九千五百三十石同上常有三年食裴耀卿曰臣願廣陝運道使京師常有三年食雖有水旱不足憂儲給豐衍崔光遠祖敬嗣中宗在房州敬嗣為刺史儲給豐衍帝德之儲倉充羡陳君賓初徙鄧州明年四方霜潦獨君賓所至有年儲倉充羡積如京坻巨廩崇創翬飛雲矗宿以板幹積如京坻得蓋藏之宜協出入之制多黍多稌而禮節行矣文粹歧公遺愛碑權德輿倉廩無宿儲徭役猶未已韋應物田家足食之慶充溢於京坻柳宗元粢盛無虞儲峙用充同上廩取不節敖庾之藏有時而賜唐史李密家無接新之儲唐史宋務光上言數年以來公私乏竭戶口減耗家無接新之儲堯遭大水湯遭大旱唐文粹韋嗣立疏臣聞國無九年之儲家無三年之蓄家非其家也國非其國也故立國立家皆資於儲蓄矣夫水旱之災關之陰陽運數非人智力所能及也堯遭大水湯遭大旱則知仁聖之君亦所不免當此時百姓不至於困敝者有積也義倉據地取稅高宗永徽年頒新格義倉據地取稅實是勞煩宜令戶出粟上戶百餘各有差唐杜佑通典請立義倉貞觀初戴胄上言國無九年儲蓄豈經之所明誡今請計所墾田盡令出粟稻麥之鄉各納所在為立義倉年穀不登州縣隨便取給同上太倉令掌九穀廩藏之事凡鑿窖置屋皆銘磚為便斛之數其年用受領粟官吏姓名又立碑如其銘焉六典凡粟支九年米及雜種三年六典貯經三年斛聽耗一升五年以上二升同上給公糧者皆承尚書省府同上諸倉監各掌其窖修儲積之事凡粟出給者每一屋一窖盡賸者附計欠者隨事科徵非理欠損者坐所由令徵陪之同上祈穀二十二白詩曰琴瑟擊鼓以御田祖以祈甘雨去其螟螣及其蟊賊田祖有神秉畀炎火噫嘻春夏祈穀于上帝周禮籥章凡國祈年于田祖吹豳雅擊土鼓以樂畯春官豳雅詩豳風七月也豳人以吹籥之聲土鼓以瓦為筐以革為面田祖神農畯田夫月令四月命樂正習吹大雩帝命有司禱祀山川古之卿士有益於人者以祈穀實天子乃以元日祈穀于上帝季冬天子乃蠟百神於南郊為來年祈福於天宗臘日祭也百神自神農至昆蟲也天宗日月星辰之屬是也豚蹄盂酒淳于髡曰臣從東方來見道旁有禳田者操一豚蹄一盂酒祝曰歐窶滿篝汙耶滿車五穀蕃熟穰穰滿家臣笑其所持者寡所願者大歐窶器也篝籠也汙耶下用也乙日祠神農晉禮志云漢儀常以乙日祀先農及耕乙地也乙田見上祭天田漢立靈星祠常歲時祠以牛龍左角曰天田即農祥也農見而祭之見漢書農祥之祭見上祈年祈穀也孔願為三農祈穀張説帝幸并州説見帝曰太原王業所基陛下巡幸振耀威武以申永思繇河東入京師有漢武睢上祠此禮廢闊歷代莫舉願為三農祈穀誠四海之福帝納其言王者之興必感其一禮樂志按貞觀禮祈穀祀感生帝而顯慶禮祀昊天上帝傳曰郊而後耕詩曰噫嘻春夏祈穀于上帝禮記亦曰上辛祈穀于上帝而鄭玄乃云天之五帝迭王王者之興必感其一因別祭尊之故夏正之月祭其所生之帝於南郊以其祖配之故周祭靈威仰以后稷配因以祈穀然則祈穀非祭之本意乃因后稷為配爾此非祈穀之本義也夫祈穀本以祭天也然五帝者五行之精所以生九穀也宜於祈穀祭昊天而兼祭五帝豐稔二十三白必有豐年農夫之慶曾孫之稼如茨如梁曾孫之積如坻如京乃求千斯倉萬斯箱閔閔焉如農夫之望歲三時不害時和年豐秋成無害歲計有餘秋收三百之囷歲計十千之稅膏澤多豐年順成之歲年穀多熟克殷昔周飢克殷而年豐祈年於田祖祈年祈豐年田祖神農也周禮力田不如逢時躬稼徒欲望歲豐凶上下豐稔之年陳陳相因補敗以豐補敗餘糧栖畝而不收滯穗斯積餘糧不僅大田多稼多黍多稌詩曰豐年有年穀梁五穀皆熟為有年大有年公羊有年以喜書也僅有年亦足以當喜大有年豐稔也井中冰靈帝光和六年冬東海萊琅邪井中冰厚尺餘大有年衆維魚矣兆維豐年夢魚豐年之兆年穀和熟豐穰穰人掌反問年穀晏子春秋景公將伐魯特訊東門無澤問魯年穀對曰陰冰厥陽五寸寒溫即寒溫節則政平政平則上下和平上下和平則穀熟遂不伐魯孔頻歲豐稔馬周疏曰五六年來頻歲豐稔一匹絹易粟十餘斛水旱為災不謂年登宋務光曰今水旱為災不謂年登有富無窶天錫皇帝多麥與黍無召水旱耗于雀鼠億載萬年有富無窶韓愈元和聖德詩魚鹽滿市井布帛如雲煙李白贈宣城守野多滯穗畝有餘糧足食之慶充溢於京坻阜財之謠歡呼於道路柳宗元請復尊號地不愛寶致百寶之豐穰柳文大穰之徵文粹李翰蘇州屯田紀積頌白雀集于高豐屯廩蓋大穰之徵也如雲漠漠同上我屯之稼如雲漠漠夫伍碁布溝封綺錯閭裡一歡顏韋應物郊居言志詩唯當歲豐熟閭里一歡顏豐本增歧芃芃綿綿無磽塉與良沃獲一十於百千剩蔬雲矗以委圃餘糧嶽峙而栖畝歐陽詹德勝頌穀帛賤民無疾疫五代唐明宗紀問宰相言穀帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報天豐稔之報均于四方柳宗元為父老上狀西成有穰歲之報同上五穀穰熟既庶而豐韓文西水門記農功以成年穀大熟柳宗元表豐所則多而筐筥甚實杜甫享太廟賦蟲蝗二十四白去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火蟲螟為害蟲蝗為災百螣時起天災流行昆蟲之災介蟲敗穀昆蟲無作無螟赴海馬援為武陵守飛螟赴海避境魯恭為中牟令飛蝗避境設壇責己公沙穆為弘農令時多蝗蟲乃設壇責己蝗蟲遂去境人以為神明之君捕蝗漢平時蝗詔使者捕蝗人能捕蝗者詣吏以石斗受錢蝗隨督郵後漢戴封為西華令汝穎有蝗災不入西華界督郵行縣忽大至督郵其日去蝗亦隨去又宋均為九江守山陽楚沛多蝗蟲至九江輒四散稻蟹不遺種國語雨螽于宋穀梁雨螽于宋茅茨晝夜著上見下曰雨傳曰有蜚蜚負蠻蟲也蟲損免稅令具旱門孔蝗獨不至境史王方翼再遷肅州刺史儀鳳間何西蝗獨不至于境害氣作則蟲螟生狄仁傑時發兵戍疏勒四鎮百姓怨苦仁傑諫曰政不行則害氣作害氣作則蟲螟生水旱起矣遣使分道捕瘞韓思復開元初為諫議大夫山東大蝗宰相姚崇遣使分道捕瘞思復上言夾河州縣飛蝗所至苗輒盡今遊食至洛使者往來不敢顯言且天災流行庸可盡瘞望陛下悔過責躬損不急之務任至公之人持此誠實以答譴咎其驅蝗使一切宜罷玄宗然之蝗不入境李紳遷宣武節度使大旱蝗不入境河北蝗張孝忠為易守滄等州觀察使貞元二年河北蝗民餓死如積孝忠與其下同粗淡日膳裁豆䜺而已祭蝗于皋門五代晉出帝天福八年六月庚戍祭蝗于皋門帥奉軍國捕蝗祭亥供奉軍七人帥奉軍國捕蝗于京畿募民捕蝗八月丁未朔募民捕蝗易以粟並同上有蝗蔽天而飛晝為之黑凡庭戶衣帳悉充塞之王親祝於都會堂即夕大風蝗墮浙江而死吳越備史蜚蝗竟天陸贄集序蜚蝗竟天農稷不能善稼升之季年蟲蝗為害經時不息及嗣主立皆附草而死江南録張福率威順軍捕蝗於陳州安審信捕蝗于中都大赦以旱蝗大赦並天福八年乾祐元年滑州魚池旱蝗秋七月鴝鵒食蝗五代分道殺蝗姚崇開元四年山東大蝗民祭旦拜坐視食苗不敢捕崇奏詩云秉彼蟊賊付畀炎火漢光武詔曰勉順時政勸督農桑去彼螟蜮以及蟊賊此除蝗誼也且蝗畏人易驅又田皆有主使自救其地必不憚勤請夜設火坎其旁且焚且瘞蝗乃可盡古有討除不勝者特人不用命焉乃出御史為捕蝗使分道殺蝗吞蝗五行志正觀二年六月京畿旱蝗太宗在苑中掇蝗祝之曰人以穀為命百姓有過在豫一人但當蝕我無害百姓將吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之蝗集祠帝董昌始立生祠蝗集祠帝使人捕沈鏡湖告曰不為災飛鳥食蝗五代馮行襲所至輒天旱境旱有蝗則飛鳥食之殺多必戾和氣盧懷謹曰凡天災安可人力制也且殺蟲多必戾和氣願公思之崇曰昔楚王吞蛭而厥疾瘳叔敖斷蛇福乃降今蝗幸可驅若縱之穀且盡如百姓何殺蟲救人禍歸於崇不以諉公也蝗害訖息吏捕蝗者不勝而仰食於民王疑曰吏捕蝗者不勝而仰食於民則率暴以濟災也腹有梵字酉陽雜俎蝗蟲腹下有梵字魚子變今蝗蟲首有王字固自不可曉或言魚子變近之矣蟲食穀者部吏所致侵漁百姓則蟲食穀蟲身黑頭赤武吏也身赤頭黑文吏也同上稼牆茂而螟蝗不生柳文
