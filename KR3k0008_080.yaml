body:
  text: 卷第八十白農祥辰正天駟星也立春見於南候以興農故曰農祥也稼政學稼樊遲請學稼子曰吾不如老農俶載南畝田事既飭土膏脤起謂興農時祈穀天子乃以元日祈穀于上帝勸農勉人無或失時五種五穀之種訓農食哉惟時六府穀居其一八政食主其先專其農人無有所使月令十二月播厥百穀歲計權節權量時節以務農事天生時而地生財禮畎畝之中禮以興嗣歲播種不愆戒天時於風雨刈獲兼倍窮地利於膏腴稼事周禮巡守觀稼東作西成出土牛以示農耕之早晚月令立春春作秋成富國農分地利人代天工國有四人業無二事舍我穡事奪農工也如農之有畔土膏其動國語孔農國之本李渤言農國之本本立而太平可議把鋤荷臿柳宗元文待雨興作劉憲父思立高宗時為名御史于時河南北大旱詔遣御史中丞崔謐等分道賑贍思立建言今農事待雨興作輟日役破歲計本欲安存更煩擾之息人以展農張說疏臣願及時旋軫深居上京息人以展農修德以來遠所務穀為本農人望歲稔相率除蓬蒿所務穀為本邪羸無乃勞杜甫述古詩平秩東作虞書立制俶載南畝周雅垂文柳宗元進農書耕鑿之利敷帝力於嘉謨稼穡之難動大心於睿覽條桑浴種化墯窳之俗絶偷浮之源而條桑浴種深耕易耨之力用柳宗元與呂恭書迎春治耒耜候雨辟菑畬白公歸田詩苦戀本元男夫尚墾闢功苦戀本元無即山近鹽之逸劉禹錫和州壁記耕桑交跡韓文耕桑交跡吏不呵問生與耒耨為業柳宗元姓非文字所導生與耒耨為業農者不穀復韓愈三器論首起趣東作已看耘夏田韋應物澧上詩丁壯俱在野場圃亦就理歸來景常宴飲犢西澗水韋應物田家詩正觀永徽之間農不勸而耕者衆唐史韓琬上言官命促爾耕勉爾植督爾獲柳子郭櫜馱為農知地形杜詩農務村村急同上農月須知勸田家敢忘勤同上貧賤以田為業薛仁貴方春之業嚴挺之疏貿壞家産營百戲擾方春之業東作云始丁壯就功裴漼上言今東作云始丁壯就功妨多益少飢寒有漸講明種藝柳子厚龍城録豫南遷度高鄉道左逢老叟率多年于路次講明種藝其言深耕淺種時耘時耔卻牛羊之踐履去螟螣之殘害勤以朝夕滋之糞土而有秋之望富有年矣若夫堯湯水旱霜雹之不時則有天也余感此言將書諸紳贄于治民理生無所施而不可又至言之肆力耕桑者為農唐六典戶部辨天下之四人肆力耕桑者為農勤勞二白勤則不匱力於農穡小人用力以事其上耰而不輟樂事勸功懋力於耘耔暴背而耕書若農服田力穡乃亦有秋勤勞稼穡必有豐年不知稼穡之艱難深耕均種耘耔旦暮從事於田農身衣襏襫沾體塗足暴其髮膚少而習焉不見異物遷焉管子服勤畎畝盡力播植小人勞力矻矻終日望歲美鄭白之沃忘沮溺之勞必資人力以長地財躬稼力田食力庶人食力謂農工畎畝之中服勤於錢鎛敦業於田疇趨以天時務其歲計苟能敦業必是厚生朝疲夕倦春作秋成趨三時之務忘四體之勤就緒三時就緒三時務農作苦楊惲書曰田家作苦必資四體之勤乃獲千箱之利捽草把土手足胼胝輟耕而歎陳涉作田苦輟耕而歎是藨是蔉不敢告勞孔劉蕡策曰臣謹索春秋君人者必時視人之所勤人勤於力則功築罕人勤於財則貢賦少人勤於食則百事廢今財食與人力皆勤矣願陛下廢百事之勞廣三時之用則播植不愆矣勒子弟力農李華客隱由陽堯舜黴瘠禹胼胝陸龜蒙有田數百畝屋三十楹田苦下雨潦則與江通故常苦飢身畚鍤茠刺無休時或譏其勞答曰堯舜黴瘠禹胼胝彼聖人也吾一褐衣敢不勤乎董作西華屯孟元陽起陳許軍中曲環領節度使時已為大將董作西華屯盛夏屩而立于塗沒休乃就舍故田輒歲稔而軍食常足扎扎耒耜聲飛飛來烏鳶竭茲筋力事持用窮歲年柳宗元田家詩下稽功事上制祿食李翰屯田紀績頌下稽功事達之于上上制祿食復之于下敘其勞也田家秋作苦鄰女夜舂寒李白詩側耕危獲柳宗元囚山賦側耕危穫苟以食兮哀斯民之增勞耒耜勤千畝元稹代曲江老人詩神農有教田事之勤柳宗元表考耕餉勤惰高智周拜壽州刺史考耕餉勤惰監察御史巡按州縣察農桑不勤百官志刺史每歲巡屬縣其孝弟力田者具以名聞六典白敗業維莠詩曰無田甫田維莠驕驕不稼不穡胡取禾三百廛兮四體不勤五穀不分墯農自安不昏作勞昏強也不服田畝越其罔有黍稷越於也苟蒿萊之不除何黍稷之能藝厥父菑厥子乃弗肯播矧肯穫力惟不足田則甚蕪四體不勤既力虧於東作八月其穫獨無望於西成不能償種言所收不能充本種子也漢書里布屋粟周禮凡宅不毛者有里布凡田不耕者有屋粟罰以勸人務農桑祭無盛又曰庶人不耕者祭無盛不樹者葬無槨糾力周禮以理刑上功紏力注云功農功也力勸也紏察也餒在其中荒而不治禮曰地廣大荒而不治當于耜之日魯莫力田及其穫之時不能償種農祥罔候既失天時必懲浮墯以勸作勞罔有黍稷惟見蓬蒿徒云穜稑稼政靡終無窮地力或耘或耔則冀十千之賦不稼不穡奚望三百之廛既墮稼政無聽莠言農之墯業但見蓬蒿罰以勸人宜懲菽麥莊子耘而鹵莽之則實鹵莽而報豫滅裂則滅裂而報豫耦且殊於二五稼寧望於十千不耕不穫地有遺利人有餘力取未熟稻陶侃士衡為荊州守出遊見一人持一把未熟稻大怒曰汝既不佃而戲賊人稻執而乃鞭之是以百姓皆勤於農土爰稼穡何農功之不勤田卒汙萊宜屋粟之為利孔田不盡墾孔戣條上四事三百姓田不盡墾罷斥墯游劉蕡策念生寡而食衆可罷斥墯游天生蒸人必將有職游間浮食王制所禁李叔明傳彭偃云農夫鹵莽種之而怨天澤不潤雖欲勿餒可乎柳玭家訓游手末作竇軌為洺州都督下令諸縣有游手末作者按之天下殘瘁蕩為浮人楊炎傳課免於上而賦增於下是以天下殘瘁蕩為浮人止墯游韋丹為容州刺史止墯游使無怠墯勤以耕桑使無怠墯韓愈袁州謝表人多游心地有遺力方今人多游心地有遺力守本業者浮而不固逐末作者蕩而忘歸白居易拱手曳裾同上安得放慵墯拱手而曳裾田卒污萊室如垂磬白居易農夫之心盡思釋耒而倚市織婦之手皆欲投杼而刺文至使田卒污萊室如垂磬人力罕施而地利多郁邑無餘室以容遊人白氏篤其耕殖劉蕡策斥遊惰之人以篤其耕殖墯游衆則富庶之道廢元稹策陛下興戰耕之術則游墯之戶盡歸而戀本之心固矣同上詔天下坊胥市吏隨人所任皆備黃籍來者根其從去者審其方居者詳其業疾者籌其數時貢籍于縣歲貢籍于州州與縣相聞以困其游者而廩其窮者貢其業學者優其食也志不業而食則盜論而司敗督察之若是一人游墯一家棄之一家游墯一鄉棄之則守業者不得不固游心者不得不懲牛僧孺策論農夫工女墯業以避役李叔明惡道佛之弊上言曰農夫工女墯業以避役故農桑不勸土宜四白月令命有司善相丘陵阪險原隰土地所宜五穀所植以教導民農乃不惑土訓地財地利地力咸則三壤上中下三等田庶土交正五穀異種九土殊宜三農九穀周禮太宰以九職任萬人一曰三農生九穀注云山澤平地九穀黍稷麻麥之屬五土以土宜辨十有二土之名物而知其利害以阜人民以蕃鳥獸以育草木以任上所宜以舉興事也稼政謂月令善相丘陵阪險原隰土地所宜地求求地之所有者周禮地道敏樹樹生植也敏勉也地事載師掌任土之法以物事地物土之宜先王疆理天下物土之宜而布其利火耕水耨武詔江南之地火耕水耨宜東牆後漢烏桓土地宜東牆東牆似蓬草實似葵子至冬十月熟地産産生物也將長地財先征土事天生時而地生財禮地理有宜同上孔宜白麥青稞五代回鶻地宜白麥青稞麥黃麻蔥韭胡荽隨土地所宜食貨志戴胄建議自王公以下計墾田秋熟所在為義倉太宗善之乃詔畝稅二升粟麥稅稻隨土地所宜土彊沃美高厚有丘陵墳衍之大其植物豐暢茂遂有秬秠荏菽之宜柳武功縣丞記相原隰之宜指授方法故連二歲大熟韓文送水陸運使荊州之地元稹蟲豸詩荊州之地洲渚濕墊其動物宜介其毛物宜翅羽土厚地中寒溫以宜文粹李庾西都賦勸農五白雖有飢饉必有豐年親耕勸農勸人種麥勸農勉人勸農郡國後漢蔡揆以好農使勸郡國至大官盡地利李悝作盡地之教勤則畝有益五斗不勤損亦如之屋粟具墯廢門務本抑末宿麥漢武使謁者勸有水災郡種宿麥懲勸邵信臣翁卿為南陽守吏家子弟不以田作為事者輒斥罷之莫不耕種力田帶牛佩犢見刺史門重麥董仲舒曰春秋麥禾不熟成則書之以此知聖人於五穀重麥與禾也今關內不好種麥是失春秋所重宜勸種麥也緣南畝賈誼今驅人歸農使游食之人轉而緣南畝教種九真俗不知耕人常苦糴王延真長為守乃鑄作田器教之墾闢而百姓充給也奪漁獵具魏鄭惲文翁為下蔡長所在奪其漁獵之具使耕桑也田曹掾溫嶠字太真上疏請置田曹掾州一人勸農桑課農桑察吏能否今宜依舊夫布穴作王莽時民浮游無事出夫布一匹不能出者穴作縣官衣布之復耕織衛鞅變法民戮力耕織致粟帛多者復其身怠而貧者舉為奴懲墯游史漢武時富人致斗雞走狗亂齊民乃徵諸犯令柏引數千人命曰株送徒入財者得補郎郎選衰矣株根本也送引也拔生稻見墯廢門孔勸民墾田裴清歷信州刺史勸民墾田二萬畝考耕餉勤墯高智周拜壽州刺史考耕餉勤墯以為常披荊棘勸耕殖數年人物全盛民甚賴之張全義教民營田張儉教民營田歲收穀數十萬斛勸百姓相賑贍免飢殍州以全安展器授方田事既飭李翰頌觀民耕桑韋維徙內江令勸民農桑縣為刻頌勸督農力馬燧進鄭州刺史勸督農力歲一稅人以為便著諭蒙書馮伉醴泉令闕以授抗縣多囂猾伉為著諭蒙書大抵勸務農勸墾田李大亮授土門令勸墾田歲大熟勸耕自官曹杜甫大雨詩陰色靜隴畝勸耕自官曹朝巡夕課文粹冬耕春種夏耘秋穫朝巡夕課日考旬會趍其時也蘇州屯田頌李翰簟食瓢漿盡四體之勤同上野次露宿簟食瓢漿盡四體之勤趍一時之役大寒栗烈而猶執卉鼖盛暑赫曦而不傳車蓋勸耨趨獲莨莠不生螟蝥不作歲登億計征寬稅薄息我蒸人遂其耕鑿同上農事課勵農事課勵厚生克勤柳宗元韓府君碑勸以耕桑使無怠墯韓愈袁州謝表於茲省氓俗一用勸農桑韋應物登閣詩勸墾田力耕張儉為代州都督勸墾田力耕歲數稔私蓄富實木鐸云徇里胥均功唐太宗制古之必藉千畝者禮之飾也然而存其禮之為勸乎農也則未不若時使而不奪其力節用而不殫其財通其有無和其鄉閭則食固人之大急不勸而勸矣柳文勞農六白月令孟冬勞農以休息之十月農功畢黨正屬人飲酒正齒位詩云朋酒斯饗命曰勞酒親耕籍田也饗公卿大夫休力息勤樂事勸農休老勞農禮休息老物黃冠而祭息田夫也蠟祭一日之澤子貢觀蠟一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知報勞春作秋成朝疲夕倦斗酒自勞楊惲書曰田家作苦歲時伏臘烹羊炮羔斗酒自勞載酒勞勤者後漢王丹每至農時輒載酒肴於田間候勤者勞之墯者自勵也孔加階德宗貞元四年正月庚戍地震大赦增戶墾田者加階躬載酒食五代張全義還為河南尹是時河南遭巢儒兵火之後城邑殘破全義披荊棘勸耕殖躬載酒食勞民畎畝之間上制祿食唐文粹下稽功事達之于上上制祿食復之于下敘其勞也蘇州屯田頌李翰白趨人收斂月令肯穫厥父菑厥子乃弗肯播矧肯穫不耕而穫八月其穫是刈是穫農乃登穀七月史記力耕數耘如寇盜之至促遽之甚恐風雨所損斂穧此有不斂穧兵至請出人刈麥宓子賤為單父事具異政門載穫濟濟詩無不務納納收斂也農收宋皇國父為平公築臺妨于農收穫之秷秷十月滌場圃滌掃也詩孔甚褊室韋契丹別種田穫甚褊百畝可穫瀕海棄地茭芻填淤一夫之勤百畝可穫終古遺利沛然嘉生權德輿岐公淮南遺愛碑以菑穰為懷文粹不忍窘厄然後以菑穰為懷上張燕公房琯萬穗稀一大田斯穫不有遺秉則滯穗也萬秉稀一萬穗稀一某豈遂當其一乎鄭相公書歐陽詹穫十一於百千文粹歐陽詹德勝頌無磽瘠與良沃穫十一於百千督爾穫文粹柳宗元郭櫜拖傳官令促爾耕勸爾殖督爾穫刈熟簷肩赬韓愈城南聯句稻穫空雲水川平對石門杜甫詠懷實之堅好也得其穫見柳文秋斂未訖劉仁軌正觀十四年校獵同州時秋斂未訖仁軌諫曰今澍澤霑足百穀熾茂收才十二常日贅調已有所妨又供獵事役雖簡省猶不下損數萬少延一旬使場圃畢勞六飛徐驅公私交泰使趨刈穫宇文融凡農月州縣常務一切罷省使趨刈穫一不穫則流離安危繫之姚崇曰河南河北家無宿藏一不穫則流離安危繫之白或耕或耔耘除草耔附根二五耦二耜為耦如農夫之務去草芟夷薀崇之勿使能殖是藨是蔉亦服爾耕十千為耦載芟載柞千耦其耘畟畟良耜綿綿其藨藨耘也三之日于耜趨其耕耨周禮深耕疾耨以待時雨植其杖而耘耰而不輟耰覆種之也江湖之地火耕水耨武詔土膏脈起可耕之時寒耕熱耨乙地漢儀常以乙日耕乙地買牛給魏衛顗字伯通請使者監賣鹽以得益市井犁牛有歸民給之也教耕犁漢王景仲通為廬江長百姓不知牛耕地力有餘常食不足界有孫叔敖所起種田景乃率人教耕犁境遂豐稔也區種後漢劉般上言郡國以牛瘦墾田多減故請敕區種增進頃畝以為民也吏或通不種處以為租也孔為耦耕法王方翼遷夏州都督屬民牛疫民廢田作方翼為耦耕法張機鍵力省而見功多百姓順賴間田募耕顧少連為東都留守表禁苑及汝間田募耕以便民何易于為益昌令刺史崔朴常乘春與賓屬泛舟出益昌旁索民挽繂易于身引舟朴驚問狀易于曰方春百姓耕且蠶惟令不事可任其勞置社市牛韋宙為永州刺史民貧無牛以耕宙為置社二十家月會錢若干探名得者充市牛以是為準久之牛不乏勸墾田力田歲數稔張檢無貴賤皆耕南詔專于農無貴賤皆耕詔諸道上耕牛袁高元和二年帝以大盜之後關輔百姓貧田多荒茀詔諸道上耕牛委京兆府勸課量也給牛不滿五十畝不給高以為聖心所憂乃在窮乏今田不及五十畝即是窮人請兩戶共給一牛從之耕陸渾山鄭珣瑜少孤值天寶亂退耕陸渾山以養母耕耨取給崔覲以儒自業身耕耨取給象耕鳥耘耕者行端而徐起撥欲深象行端履深法其端深故曰象耕耘者務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘陸龜蒙野無青草人無垂耜野無青草盧藏用紀信碑方課子弟耕韋蘇州寓居永定精舍詩聊租二頃田方課子弟耕獨放寒林燒多尋虎跡行暮歸何處宿來此空山耕韋蘇州山叟耕詩分其畦壟文粹歐陽詹張博士講禮記農雖耕矣必耨分其畦壟兄弟同耕趙隱始布衣時家無資與兄騭同耕以養躬耕東皋文粹呂才東皋子集序葛巾聯牛躬耕東皋天麻餅耕桑偶記云青齊間遇春耕則犒牛以天麻餅仍用錦縷繫牛角上綴景未及郊穡人先耦耕柳宗元首春逢耕者眷然撫耒耜回首煙雲橫同上耕其傍便近地韓愈送韓約侍御給耒耜與牛使耕其傍便近地深耕種數畝杜甫冬菁飯之半牛力晚來新深耕種數畝未甚後四鄰置土一廛為耕氓置上一廛為耕氓朝夕謳謠使成文章柳宗元與蕭勉書喜率兄弟操耒耜而耕於野地薄而賦多不足以養其親韓文芟蒿斬蓬利鋤耰同上劉生詩日生撥穀鳴田家擁鋤犁李白贈從弟曉耕翻露草柳文溪居詩啓蟄也得其耕苗之猥大也得其耘柳文耘夫蕘子武后雖農夫蕘子必親延見健犢春耕土膏黑唐李賀詩微雨衆卉新一雷驚蟄始田家幾日間耕種從此起韋應物首起趣東作已見耘夏田同上刀耕火耨嚴震梁漢間刀耕火耨民采梠為食雖領十五郡而賦入才比東方數大縣開墾九白如農夫之務去草芟夷蘊崇之載芟載柞柞除水芟除草將耕先治之也除翦其荊棘戎子駒支斬其蓬蒿藜藿而共處之鄭桓公與商人千耦其耘若稽田既勤敷菑惟其陳修為厥疆畎敷菑陳修皆修理田地之不闢非吾地也管子吾土我疆土訓地財地力土宜刊大芟草水火處之可以美土疆周禮糞田疇美土疆月令季夏土潤溽暑大雨時行乃燒剃行水利以殺草可以糞田疇可以美土疆注謂欲耕萊田先剃草燒之候大雨蓄之時地美可耕種菑畬田一歲曰菑二歲曰畬三歲曰新田芟草把土揉木闢土相以丘陵芟其草木立表經年晉書郭翻字長翔欲墾萊田立表經年無主乃作熟人認皆與之縣令聞以其稻歸翻翻不受闢彼污萊剪其荊棘墾草田漢書南郡太守李尚占墾草田注是百姓田而云新墾也孫寶發其奸獄受誅而死墾田不實先時墾田多以不實事見田制門注孔墾田王方翼祖尚同安大長公主母李為主所斥居鳳泉墅方翼尚幼日墾田墾田五千頃黑齒常之拜河源道經略大使墾田五千頃歲收粟斛百餘萬由是食衍士精戍邏有備視墾田贏縮以稽本末陸贄八計曰視墾田嬴縮以稽本末開廢田盧坦表韓重華為代北水運使開廢田身率劉昌在邊凡十五年身率士墾田三年而軍有羡食撥腐曝淤文粹韋瓘宣州大農陂記斬莽闢蕪撥腐曝淤開荒梗數萬頃訓導以術陸宣公奏議所貴田野墾闢者豈不以訓導以術人自樂業乎賣所乘馬李大亮有文武才幹為土門令屬百姓飢荒盜賊侵寇大亮賣所乘馬分給貧弱勸以墾田歲因大稔太宗聞而嗟美下書詔美之一莊荒崔群知舉歸其妻乘間勸令置田群曰我有莊三十所春榜放三十人是也妻曰君非陸贄門生乎君掌文柄約其子簡禮不令就試如以君為良田陸氏一莊荒矣神農之斫耒耜教闢耨所以墾良田而殖嘉穀也元稹制策曰神農之斫耒耜教闢耨所以墾良田而殖嘉穀也然而不能遏莨莠之滋焉其所以遏之者芟夷錢鎛而已廉使奏吏之能者其二曰田野墾闢夫貴田野墾闢率民殖荒田限年免租新畝雖闢舊畬蕪矣人以免租年蒲復為污萊有稼穡不增之病食貨志募人假牛犁墾廢以所收半畀之田久不治故肥美歲入凡三萬斛諸工計所庸受粟有差除申曠土十白宋鄭之間有隙地焉量地以制邑度地以居民地邑民居必參相得也無曠土無遊民禮土曠人稀田萊多荒詩念編戶之人散成梗泛歎先朝之畝鞠為蓬蒿地廣大荒而不治此亦士之辱也虞芮之間田有餘而人不足君子恥之謂多曠土孔荒茀袁高貞元二年帝以大盜後關輔百姓貧田多荒茀詔諸道上耕牛按公田之廢者徐申遷韶州刺史申按公田之廢者募人假牛犁墾廢以所收半畀之田久不治故肥美歲入凡三萬斛原田蕪穢兮崢嶸榛棘柳宗元夢歸賦荒穢城西有數頃田樹果數百株多先人手自封植今已荒穢寄許京兆稼穡之地半為荒疇前宰無良下氓失業稼穡之地半為荒疇公曉喻歸本流亡盡復席豫楊府君碑銘序間田荒壤文粹李翰蘇州屯田紀績頌擇封內間田荒壤人所不耕者為其屯一寸荒田牛得耕杜甫蠶穀行除去逃戶荒地及河侵沙掩等地元稹奏同州均田狀常恐委疇隴忽與秋蓬飛李白田家戒其荒杜甫詩境內田荒廢者縱民耕之公不加賦錢吳越王備史境內荒絶田産尚隸租籍者悉免之文穆備史耕紡亡業高適傳遺畝當榛荊柳宗元助為田十一白周禮遂人以興鋤利鋤讀為助令之助作也遂師巡其稼穡而移用其民以救時事移用謂轉相佐助為耕耨斂刈芟之宜早晚不同而有天期地澤風雨之急也合耦為鋤里宰掌其邑之衆寡以歲合耦為鋤以治稼穡趨其耕耨行其秩敘以侍有司政令孝功記耜廣五寸二耜為耦兩人相助耕之旅師掌聚野之鋤粟人相助作一井出九夫稅季冬命農計耦耕人合則牛耦可知也借力借人而治田也侯彊侯以以用也疆謂力有餘而相助詩孔潛耕馮道歲飢退耕于野有荒其田不耕與力不能耕者道夜潛為之耕其人後來愧謝道殊不以為德白原隰龍鱗服先疇之畎畝原田莓莓我疆我里我田既臧沃塉處沃土則逸處塉土由勞一易再易周禮不易之地家百畝一易之地家二百畝再易之地家三百畝注云不易歲歲種美地也一易休一歲再易休二歲謂薄地也膏腴兼倍舄鹵均田疇盡疆以用索索法也疆治土也則宜用之法謂魯國三壤咸則庶土交正吾地我疆翼翼溝塍脈散𪽏繩綺分舄土衍沃廣輪之數縱橫也周禮夫廛周禮一夫田一廛注云百畝曰廛上地肥美田也中地下地薄惡者糞田疇美土疆月令季夏土潤溽暑廣狹之度沃塉之宜土敝地薄無力畎畝之中禮農力以時給授有期舄鹵膏腴不毛之地不食之地甫田詩倬彼甫田歲取十千大田多稼南畝牛畝中國有廬周禮大司徒以土宜之法辨十二土名物以相宅而知其利害十二分野十二邦也上繫十二次各有所宜也封畛土略畛塗所經略曰界負郭陳平有負郭田形方氏掌正封疆無有瓜離之地瓜邪也離絶也土壤自生曰土所植曰壤度山林鳩藪澤聚成藪澤使人不得焚㙩壤之以備獵處辨京陵大阜曰京絶高曰陵別之為冢墓表淳鹵塉薄地也表異輕其賦也數疆潦疆界有流潦者計數減其租入規偃豬偃豬下偃之地規度其受水多少町原防堤防間地不得方正如井田別為小頃町也牧隰皋水涯下濕為芻牧地井衍沃平美地周禮以六尺為步步百為畝畝百為夫夫三為屋一成少康有田一成封洫疆界傳曰爭尋常以盡其民八尺曰尋倍尋曰常常尋之地言少也不腆之田晉謂戎子駒支曰我惠公有不腆之田與汝割分而食之彊畎肥磽沮洳漸洳畇畇原隰墾闢之貌堤封孔給諸子田劉弘基病給諸子田各五頃搔背牧雞鵝間時田野中搔背牧雞鵝李白贈蔡舍人綿延韋蘇州登西岡詩綿延稼盈疇粳稻熟韋蘇州襄武館詩是時粳稻熟西望盡田疇嘉穀由是生文粹歐陽詹張博士講禮記田疇將植而求實雖耕矣必耨分其畦壟嘉穀由是乎生墾闢尚少文粹岑文本諫太宗勤政書田疇墾闢尚少茫茫野田緑韋應物經武功南嶺橫爽氣高林繞遙阡野廬不鋤理翳翳起荒煙同上畎畝孤城外江村亂水中杜甫向夕塹抵公畦稜詠懷無易仕之田園杜牧私田薿薿不侵其畔李幹屯田紀績頌白膏腴衍沃肥磽陸海東方朔曰汧隴以惠商洛以西厥壤肥磽灞滻以西涇渭之地此天下陸海之地貧者得以家給無飢寒之憂膏東方朔曰酆鎬之間號曰上膏畝一釜家好畤陸賈以好畤地善往家之上腴周原膴膴膴膴美也沃野涇渭溉灌張禹買田四百頃皆涇渭溉灌膏腴上價不易之地年年種肥美田上地多稼之田處沃土則逸處塉土則勞此繫乎地也畝種之田一畝收一鐘池陽穀口溝洫志秦人歌曰田於何所池陽穀口鄭國在前白渠在後荷鍤成雲決渠為雨涇水一石其泥數斗言肥濃也美業後漢中常侍蘇康管霸用事固天下良田美業劉祐為人司農移書所在依科役人桓帝怒之孔多田翁占膏腴李澄頗殖産伊川占膏腴自都至闕口疇野彌望時謂地癖良田美産高力士傳中人若黎敬仁等京師甲第池園良田美産占者什六上腴太平公主田園遍近甸皆上腴便好上腴李林甫土疆沃美古后稷封有漦之地其土疆沃美高厚有丘陵墳衍之大其植物豐暢茂遂有秬秠荏菽之宜柳宗元武功縣丞廳壁記得良田約數千頃伏奉今日德音拆寺蘭若共四萬四千六百餘所遠俗僧尼並奴婢為兩稅戶共四十一萬餘人得良田約數千頃其僧尼令隸主客大秦穆護祆二千餘人並令還俗一品集賀廢毀諸寺表為腴田唐循吏傳韋景駿神龍中歷肥鄉令縣北瀕漳連年泛溢人苦之景駿相地勢益南千步因高築鄣水至堤趾又輒去其北燥為腴田豐苗亦已概雲水照方塘杜詩嘉禾大田二十七屯廣輪曲折千有餘里文粹李翰屯田紀績頌上田三十頃讓皇帝憲為雍州牧賜上田三十頃名園上腴之田為中人所占者半京畿矣宦者傳序白海濱廣斥斥鹵瞻彼阪田有苑其特阪田崎嶇磽確之處然有茂特之田也生稻梁史鄴令引漳水灌田人歌曰引漳水灌鄴田旁乎右斥鹵生稻梁草田荒田磽陝沉斥刑法志除山川沉斥注沉居水下斤鹹鹵也不腆之田腆厚也醜地惡地處塉土則勞此繫平地者也處民必擇塉土國語聖人處民必擇塉土塉土之民勞則思善沃土之民逸則思不善故沃土之民不才而淫一易再易之地注見田疇門注中石田傳曰得志於齊猶石田也無所用之土敝則草木不長土敝地薄無力不食之地不毛之地不毛謂無草木也孔苦下陸龜蒙有田數百畝田苦下雨潦則與江通地塉鹵李景略拜豐州刺史窮塞苦寒地塉鹵邊戶勞悴土塉地狹杜牧之上李司徒諭用兵書澤潞兩州全居山內土塉地狹積穀全無撫之不暇崔郾陝土瘠而民勞吾撫之不暇猶恐其擾污萊塉鹵之地混成大田柳宗元操耨耜而耕地薄而賦多韓文井田十五白書曰殊厥井疆俾克畏慕不修道德則殊其井疆使畏為惡之禍慕為善之福周禮小司徒乃經其土地井收其田野九夫為井四井為邑邑方二百里四邑為丘四丘為甸四甸為縣四縣為都以任地事而令職貢匠人為溝洫九夫為井九夫所治之田為一井也公羊傳曰什一天下之中正貧富兼併雖皋陶不能使疆不陵弱也故聖人制田以口分一夫一婦受田百畝以食父母妻子五口為一家公田十二畝所謂什一廬舍二畝半凡為田一頃十二畝半八家九頃共為一井一無泄地氣一無費一家三同風俗四合巧拙五通財貨因井田為市壤食貨志商君相秦壞井田開阡陌急耕戰之費雖非古道猶以務本故能傾鄰國雄諸侯王制自滅也經界孟子曰夫行仁政必自經界始經界不正則井地不均故暴君汙吏必慢其經界也民得買賣食貨志董仲舒曰井民田得買賣富者田連阡陌貧者亡立錐之地近古限人田董仲舒曰古井舊法雖難卒行宜少近古限人田以贍不足注各立限不使富者過制則貧弱之家有可立矣孔遠而不可復唐牛僧孺賢良策周人井田之制遠而不可復古者因井田而制軍賦劉蕡策古者因井田而制軍賦古者一井之地九夫共之陸贄奏議國朝著令賦役之法有三一曰租二曰調三曰庸古者一井之地九夫共之公田在中藉而不稅私田不善則非利公田不善則非仁事頗纖微難於防檢春秋之際已不能行夏商之道廢文粹李翱平賦書秦滅古法墯井田夏商之道廢相承滋久不可卒復以安其業古者設井田之法以安其業同上度土田之廣狹畫為夫井度土田之廣狹畫為夫井量人戶之衆寡分為邑居使地利足以食人人力足以闢土邑居足以處衆人力足以安家野無餘田以啓專利邑無餘室以容遊人逃刑避役者往無所之敗業遷居者來無所處於是生業相固食力相濟其出財征也不待徵書而已平其起軍役也不待科人而已均矣白居易議井田阡陌戶繁鄉狹者則復以井田大抵人稀土廣者且修其阡陌戶繁鄉狹者則復以井田使都鄙漸有名家夫漸有數夫然則井邑兵田之地衆寡相維門閭族黨之居有無相保相維則兼并者何所取相維則游墯者何所容如此塒庶乎人無游心地無遺力給授田十六白周禮載師掌任土之法以物事地授職以廛里任國中之地廛里若今邑居田也廛民居之區域也里居也以場圃任園地園樹果瓜之屬以宅田士田賈田任近郊之地宅田致事家所授之田士讀為仕仕亦授田為之圭田孟子曰自卿已下必有圭田五十畝賈田賈人家所授之田也以公邑之田任甸地公邑六遂餘地天子使大夫治之以家邑之田任稍地家邑大夫菜地也以小都之田任縣地大都之田任疆地小都卿之菜地大都公之菜地王子弟所食邑也疆五百里王畿界也小司徒土地以稽人民周知其數上地家七人可任者家三人中地家六人可任者家五人下地家五人可任者家二人一家男女七人則受上地養者衆多遂人治野以下劑致氓致會也民田雖上中下及會之以下劑為率謂可任者家二人也以田里安氓以疆土任氓謂民有餘力復與田若餘夫然以土均平政辨其野之土以頒田里上地夫廛廛所居之內田百畝菜五十畝餘夫亦如之中地一夫廛田百畝菜百畝餘夫亦如之下地夫廛百畝菜二百畝餘夫亦如之雖上地菜饒遠縣師辨夫家田菜之數菜地休不耕者上田夫百畝不易之地食貨志中田夫二百畝一易之地下田夫三百畝再易之地歲更耕之自爰其處更守也爰於也授田令諸給口分田者田易則倍給注寬鄉三易已上者依鄉法亦給也寬鄉狹鄉又條諸州縣界受田悉足者足為寬鄉不足為狹鄉又條狹鄉不足者聽於寬田遙授也給永業口分田祿條出諸丁田給永業田二十畝口分田八十畝其中男年十八已上亦依丁男給老男篤疾各給口分四十畝寡妻妾各給口分三十畝先得永業者則通其衆口分數也工商受田食貨志工商家五口受田乃當農夫一人任地居人給受磽肥易地受田孔授田之制丁及男年十八以上者人一頃其八十畝為口分二十畝為永業老及篤疾廢疾者人以四十畝寡妻妾三十畝當戶者增二十畝皆以二十畝為永業其餘為口分食貨志凡收授以十月凡收授皆以歲十月授田先貧及有課役者凡田鄉有餘以給比鄉縣有余以給比縣州有餘以給近州稻給貧民玄宗開元二十六年正月乙亥以京兆稻田給貧民歲納租粟陸贄奏議國朝丁男一人授田百畝但歲納租粟二石而已言以公田假人而收其租入故謂之租口分永業之田樹以榆棗桑及所宜之木皆有數田多可以足其人者為寬鄉少者為狹鄉狹鄉授田減寬鄉之半其地有薄厚歲一易者倍授之寬鄉三易者不倍授工商者寬鄉減半狹鄉不給凡庶人徙鄉及貧無以葬者得賣世業田自狹鄉而徙寬鄉者得併賣口分田已賣者不復授死者收之以授無田者唐志凡授田者丁歲輸粟二斛稻三斛謂之租丁隨鄉所出歲輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩謂之調用人之力歲二十日閏加二日不殺者日為絹二匹謂之庸食貨志古者一夫受田不得過百畝欲使人不廢業田無曠耕今富者萬畝貧者無容足之居依託彊家服勞終歲常患不充有田之家坐食租稅京畿田畝稅五升而私家收租畝一石官取一私取十力穡者安得足食宜為占田條限裁租價損有餘優不足此安富恤窮之善經也同上白名田限數食貨志董仲舒曰亦言秦用商鞅法改井田之制富者田連阡陌貧者無立錐之地今宜少近古井田法限人名田以瞻不足塞兼并之路也限利哀詔諸侯王公列侯公主吏二千石及豪富人田宅無限與人爭利其議限利利謂下名田制漢名田制哀制王公列侯名田國中列侯在長安及公主名田縣道及關內侯吏人名田皆無得過三十頃賈人不得名田犯者以律論注名田國中者自食國中既收租稅又得有私田三十頃名田縣道者列侯有不足國雖受租復得田於他縣道公主亦如之其諸侯在國名田他縣者罰金三兩餘田分與九族王莽分男口不滿人而授田過者分餘田與九族及鄉黨也晉制戶調之法晉武時有司奏戶調之法男子一人占田七十畝女子三十畝其外丁男田課五十畝丁女二十畝次丁男半之女不課其官品第一至第九各以貴賤占田品第一至第二占五十頃第三品四十五頃降殺以王至九占十頃出晉書食貨志不可問光武時天下墾田多不以實豪右侵削陳留吏牘上有書曰潁川弘農可問河南南陽不可問帝不悟顯宗年十二曰當以墾田相方耳河南帝城多近臣南陽帝鄉多近親田宅踰制奪豪人田晉張輔世偉為藍田令龐宗西州大姓輔奪宗田二百餘頃給貧戶一縣稱之田宅晉有司奏王公國侯各宜京城有田宅今未暇作諸國邸當使城中有往來處近郊有芻槁田令限王公侯京城得有宅一處近郊田大國十五頃次國十頃小國七頃也孔踰制賈敦頤徙瀛州刺史永徽中遷洛州洛多豪右占田類踰制敦頤舉沒者三千餘頃以賦貧民遵水式兮復田制無荒區兮有良歲劉禹錫高陵碑書過文粹張彧桑洪羊評季孫用田賦孔子書而過之以其踰周公之制其闊一步其長二百四十步唐食貨志田以步其闊一步其長二百四十步為畝百畝為頃周世宗嘗夜讀書見唐元稹均田圖慨然歎曰此致治之本也王者之政自此始乃詔頒其圖法使吏民先習知之期以一歲大均天下之田其規為志意豈小哉周世宗贊檢校民田高下肥磽皆當江南先主李升檢校民田高下肥磽皆穫允當人絶咨怨輸賦不稽頒限田之科重兼并之律使公侯卿士方伯連帥下及豪商大賈不得廣併吞以奪專厚利因川澤以富貧人若然則均田之方寓其間矣又何必奪此而與彼然後為損益乎牛僧孺策白陳轅頗公田以嫁公女有餘以為己大器國人逐之種秫陶潛為彭澤令在縣公田悉種秫曰令吾醉於酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳雨我公田遂及我私詩稼不善周禮公田稼不善則罪人私田稼不善則罪吏借力治之古者井田家田百畝公田十畝借人力而治之占官晉李喜上言尚書山濤中山王睦各占田三更稻田請免濤睦等官孔賑貧民庾敬休蜀道米價騰踊請以本道闕官職田賑貧民廢京司職田李元紘是時廢京司職田見屯田門內外上下各有等差夫職既不同田亦異數內外上下各有等差白居易文量品而授地計田而出租國朝舊典量品而授地計田而出租故地之多少必視品之高下租之厚薄必視其田之肥磽如此則沃塉齊而戶租均等列辨而祿食足矣同上一井之地九夫共之陸贄古者一井之地九夫共之公田在中籍而不稅公田不善則非仁同上唐武德元年文武官給祿頗減隋制一品七百石從一品六百石二品五百石從二品四百六十石三品四百石從三品三百六十石四品三百石從四品二百六十石五品二百石從五品百六十石六品百石從六品九十石七品八十石從七品七十石八品六十石從八品五十石九品四十石從九品三十石外官則石一品有職分田十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃皆合百里內之地志塹抵公畦稜杜詩或有隔越鄉村被配一畝二畝之者或有身居市井亦令虛頭出稅之者元稹奏均田狀云或有隔越鄉村被配一畝二畝之者或有身居市井亦令虛頭出稅之者其公廨田官田驛田等所稅輕重約與職田相似亦是抑配百官租田疲人患苦凡京師諸司各有公廨田諸京官文武職事各有職分田諸州及都護府親王府宮人職分之田各有差諸職分陸田限三月稻田限四月以前上者並入後人以後上者入前人其夌田以九月三十日為限若前人自耕未種後人酬其功已自種者准租分法其價六十已下者依舊定不得過六斗通典開元十年敕所置職田本非古法爰自近制是以因循事有變通應須刪改其內外所給職田可從今年九月以後並宜停給十八年京官職田特令准令給受復用舊制同上大歷以來關中匱竭乃減外官職田三分之一以給京官俸上白田里不鬻禮償債朝錯曰有賣田宅鬻子孫以償債多買田自汙或謂蕭何曰上有疑君之心君何不多賤買人田宅以自汙何從其計上大悅民遮道上言相強賤買民田宅數千上謂曰君自謝民賣田供車馬貢禹上言臣有田百二十畝陛下過意徵臣臣賣田畝以給車馬賣田為賈漢書貧而得其田或賣以為賈注云賣田與人便為商賈業也疏廣不買田宅漢疏廣歸鄉為酒肴以召鄉里子孫謂鄉中老人曰子孫冀及君時頗立産業宜從丈人勸買田宅廣曰有舊田廬子孫勤力足供衣食增益之但以子孫怠慢也王田王莽令天下曰名王田不私買賣賣田起塋後漢崔實父卒賣田宅起冢墓塋賣田地賑人吳志天下亂魯肅不治家標賣田地以賑人甚得鄉里歡心膏腴上價漢張禹買田四百頃皆涇渭灌溉極膏腴上價也獻田宅者操書致書致契書也禮賤買後漢竇憲恃宮掖聲勢遂以賤直請買沁水公主田園田主不敢言帝知乃切責憲以田還公主孔雖貴不立田園張嘉貞雖貴不立田園有勸之者答曰吾嘗相國矣未死豈有飢寒憂苦以譴去雖富田産猶不能有也近世士大夫務廣田宅為不肖子酒色費我無是也市田穎陽武攸緒市田穎陽買土一廛柳宗元雅善蕭俯詒書曰買土一廛為耕氓丘之小不能一畝可以籠而有之問其主曰唐氏之棄地貨而不售問其價曰止四百餘憐而售之柳宗元小丘記禁買賣世業口分田初永徽中禁買賣世業口分田其後豪富兼并貧者失業於是詔買者還地而罰之唐食貨志願以潭上田貿財以緩禍柳宗元鈷鉧渾記一旦款門來告曰不勝官租私券之委積既芟山而更居云云徹舍鬻苗李實峻責租調人窮無告至徹舍鬻苗輸于官賣舍帖田李嶠臣計天下編戶貧弱者衆有賣舍帖田以供王役者剔屋賣田狄仁傑疏比緑軍興調發煩重傷破家産剔屋賣田兄弟訟鬩韋保衡以妾為妻鬻田宅至兄弟訟鬩家法遂替鬻昭應墅蕭復廣德中歲人飢家百口不自振議鬻昭應墅宰相王縉欲得之使弟紘說曰以君才宜在左右胡不以墅奉宰相取右職復曰鬻先人墅以濟孀單吾何用美官使門內餒且寒乎生平不治産有勸營之者曰祿廩雖薄在我則有餘田産何所取乎高郢
