body:
  text: 卷第十二白服以旌禮傳衣身之章也傳在笥惟衣裳在笥楚楚詩衣裳楚楚春服既成粲粲詩西人之子衣服粲粲顛倒衣裳安其吉兮燠兮如雪麻衣如雪九月授衣旗章禮曰郊廟祀之服以為旗章以別貴賤等級之度也有量禮衣服有量逢掖孔子曰丘少居魯衣逢掖之衣逢大也大掖之衣君子有道者所服也蓋形文子曰聖人衣足以蓋形以禦風寒挾纊襜如衣前後襜如也暑服月令孟夏天子初衣暑服注絺綌也衣服異宜禮命服賜服也禮不鬻衣服不鬻於市禮在躬禮衣服在躬而不得其名為岡岡然無知之貌裼襲禮裼襲禮之文也注衣服或裼或襲之文以為禮也衣服有別禮惟鵜之剌惟鵜在梁不濡其翼徒已之子不稱其服問人之寒則衣之禮女手摻摻女手可以縫裳詩曳婁子有衣裳不曳不婁鄉服魯哀公問孔子曰夫子之服其儒服與怪與士之異也孔子曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞君子之學也博其服也鄉丘也不知其儒服短衣楚制叔孫通儒服見漢王王憎之乃衣短衣善衣完且不費善衣之次善衣朝祭服次深衣夫祛猶在嘉服吉服遊服遊嬉之服好人之服要之棘之好人服之好人禔禔褒衣博帶雋不疑謁暴勝之裘之裼也見美也禮褧之恧其文章之著也朝服晉輿服志漢制一歲五郊天天子與執事者所服各如方色百官服常縫衣以從魏已來名為五時朝服正給四服闕秋服三年一易入廟服晉輿服志公特進列列卿大夫世婦中二千石中二千石夫人紺繒幗簪珥入廟自二千石夫人以上至皇后皆蠶月衣為朝服去地三寸朱博于元為琅玡守敕功曹官屬多褒衣大袑袑褲也不中節自今掾史衣皆去地三寸憎儒服叔孫通儒服嘗見漢王漢王憎之乃變其服服短衣楚制又酈食其踵軍門上謁衣儒衣冠沛公使人謝曰方以天下為事未暇見儒人食其按劍叱使者曰吾高陽酒徒非儒者也沛公遽延入斷衣令短蓋寬饒次公左遷衛司馬出殿門斷其襌衣令短離地冠大冠帶長劍按行衛士豫讓擊衣青袍如草身被輕暖曹植詩奢美不稱彼已之子不稱其服服美叔孫通曰服美不稱必以恧終取費完且不費見上注衣錦子曰衣夫錦於汝安乎宰豫曰安曰汝安則為之君子之容禮曰君子服其服則文以君子之容是故君子恥服其服而無其容纖靡致美乎黻冕服文彩不衷之衣好潔其衣服詩序狐裘之陋雖致誚於齊相麻衣之侈亦見剌於曹人禮有以文為貴者謂黻黻玄纁之服蜉蝣之剌蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪儉不曳婁雖聞諷於蟋蟀奢而好潔亦見剌於蜉蝣惟鵜諷其不稱相鼠剌以無儀身災春秋傳曰服之不衷身之災也鶴氅鷸冠越布單衣後漢陸閎美姿貌喜著越布單衣世祖見而好之自後常敕會稽郡獻越布香囊謝玄常佩紫羅香囊安患之而不欲其意因戲賭取焚之玄遂止寶玉衣紂儉敝不曳子有衣裳不曳不婁剌晉昭公儉也縕袍子曰衣敝縕袍與衣狐貉者立而不恥者其由也與取費闔廬衣服擇不取費儉也昭其儉也儉而有度短褐黜華尚素素衣化為緇風塵也潔而崇侈麻衣雖剌於曹人陋則失中狐裘見非於齊相惡衣服禮有以素為貴者不尚文彩浣衣禮晏平仲浣衣濯冠以朝君子以為隘逼下偞卑偞迫也墮葉反禮云為已偞卑布衣之儉見彼汲黯韋褲之弊聞諸祭遵晏子狐裘孫弘布被犢鼻司馬相如阮咸之衣見膚寒不待輕暖漢書寒之於衣不待輕暖不易衣見婁敬脫衣挽略去其羊裘見虞將軍曰臣願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛帛見衣褐褐見終不肯易衣皂帽布裙魏管寧幼安恆著皂帽布襦褲襦裙也衣葛常苦寒被褐而出衣錦而入呂氏春秋藏文於內固不可也異服禮曰作異服奇器以疑衆殺無赦不以聽注云謂其害大辭不可明紺緅君子不以紺緅飾紅紫不以為褻服厖服晉太子申生率師公衣之偏衣狐突曰衣之厖服遠其躬也罕夷白厖奇無常君有心矣先丹木曰是服也狂夫阻之阻疑怪士不衣織織染絲織音志衣服不二禮曰長人者衣服不二以齊其人二不齊一也既同聚鷸之尤宜及維鵜之剌皙幘而貍製齊侯賞黎珍黎珍辭曰有先登者皙幘而貍製乃東郭書紗縠單衣曲裾後垂江充衣制芰荷以為衣集芙蓉以為裳楚詞卉服島夷之服左衽不衷身災服之不衷身之災也胡服史記趙武靈王曰吾欲胡服騎射以教百姓樓緩曰善王曰世必議寡人奈何肥義曰疑事無功云云遂胡服招騎射襜褕入宮武安侯田恬坐襜褕入宮不敬國除幅巾縑巾傅子曰漢末王公多委王服以幅巾為雅袁紹崔鈞之徒雖為將軍皆著縑巾太祖以天下未定擬古皮辨裁縑帛以為之帢合簡易隨時之義以色別貴賤可謂軍容非國容也鷸冠鄭子臧好聚鷸冠鄭伯殺之君子曰服之不衷身之災也瓊辨楚子玉為瓊辨玉纓夢河神曰畀子豫與汝孟諸之麋既非常服難逭明刑奇服周禮禁禮曰關執禁以譏禁異服識異言同衣服周禮具下法度門襏襫之衣草衣以禦雨製造既成春服既成改造緇衣之宜兮敝豫又改為兮緇衣之好兮敝豫又改造兮縫裳摻摻女手可以縫裳補袞袞職有闕惟仲山甫補之要襋要制襋領也為公子裳結襘結帶襘領具飾衣裳禮刀尺針線裁縫操制學制子有美錦不使人學製焉縫裾為識虞詡為朝歌長賊屯聚潛遣貧民能縫者傭作賊衣以綵線縫其裾為識到市者擒之贈遺縞帶紵衣季札與子産縞帶子産獻紵衣焉綈袍須賈以范叔寒贈一綈袍曰戀戀有憐故人之意黑貂裘史記蘇秦説趙相李兌兌送以黑貂之裘寒者衣之解衣衣我韓信言漢王無衣之子無衣之子無裳無衣無褐何以卒歲不曳不婁見儉敝門注豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮佩玉蕊兮豫無所繫之言人皆佩玉我獨無所繫吳申叔儀曰吳王不恤國士也范叔寒見上綈袍注衣葛常苦寒易衣而出昔無襦今五褲賦無衣申包胥如秦乞師秦哀公為賦無衣九頓首而坐秦師乃出注云無衣三章章三頓首法度染綵月令季夏命有司染綵黼黻文章必以法度無或差忒黑黃蒼赤莫不質良以給郊廟祭祀之服以為旗章以別貴賤等級之度質正也良善也有量季秋命有司具飾衣裳文繡有桓衣服有量冠帶有常必循其故見膚被土禮曰古之衣服蓋有制度以應規矩短無見膚長無被土昭其度也昭其明也制形文子曰古之為道者量腹而食制形而衣羞服之式周禮太宰以九式均節財用四曰羞服之式式用財之節度者飲食也同衣服周禮司徒以本俗六安萬人六曰同衣服謂人雖富衣服不得獨異辨衣裳月令回肘禮深衣袂可以回肘言寬也正色禮曰衣正色裳間色列采禮非列釆不入公門列采正服之色衣服有別禮去地三寸見上注燕衣不踰祭服司服掌王之吉凶衣服辨其名物與其用事賈人高帝賈人無得衣錦繡綺縠絺綌紵罽操兵乘車騎洗濯心之憂矣如匪浣衣薄污我私薄浣我衣浣衣濯冠晏平仲浣衣濯冠以朝君子以為隘和灰請漱禮子事父母冠帶垢和灰請漱洗也音思侯友衣裳垢和灰請浣和灰灰汁也漱裳諸母不漱裳漱浣禮服浣濯之衣濯纓滄浪之水清可以濯吾纓浣紗濯錦補綴紉針禮子事父母衣裳綻裂紉針請補綴補袞仲山甫綻衣為裘禮良冶之子必學為裘縫人周禮掌王宮縫浣之事掌內外之縫事挫針莊子支離疏挫治繲繲浣衣音佳賚反挫針縫衣也孔親紉綻裳衣和政公主代宗以主貧詔諸節度餉億主一不取親紉綻裳衣諸子不敢服紈絺賜緋溫造為宣州尉賜緋衣品官服馬周先是品官舊服止黃紫於是三品服紫四品五品朱六品七品八品九品青鳴玉曳組李綱帝以舞工安叱奴為散騎常侍綱諫曰魏武使禰衡擊鼓衡先解朝衣曰不敢以先王法服為伶人衣今先令舞胡鳴玉曳組位五品趨丹地殆非創業垂統貽子孫之道被羽裳吹簫張易之時無檢輕薄者又諂言昌宗乃王子晉後身后使被羽裳吹簫乘寓鶴裴回庭中如仙去狀制袞冕六服閻立德遷尚衣奉御制袞冕六服腰輿傘扇咸有典法視衣製廣狹漢陽公主文宗尤惡世流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宮所服者皆當時賜未嘗敢變元和後數用兵悉出禁藏纖麗賞戰士由是散於人間內外矜似以成風若陛下示所好于下誰敢不變帝悅詔宮人視主衣製廣狹遍諭諸主稱德柳公綽太醫針曰衣服稱德侈則生慢浣濯公權嘗與六學士對便殿帝稱漢文帝恭儉因舉袂曰此三浣矣學士皆賀獨公權無言帝間之對曰人主當進賢退不肖納諫諍明賞罰服浣濯之衣此小節爾銀緋韋貫之張宿使淄青裴度欲為請銀緋貫之曰宿姦佞吾等縱不能斥奈何欲假以寵平衣紫韋澳一日召入屏左右問曰朕於敕使何如澳陳帝威制前世無比帝搖首曰未也策安出澳倉卒答曰若謀之外廷則大和事可用追鑒不若就擇可任者與計事帝曰朕固行之矣自黃至緑自緑至緋猶可衣紫即合為一矣蜀襭袍覆韋綬德宗時為翰林學士帝嘗幸其院韋妃從會綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇若此遺衣臥內皆經補浣楊行密嘗過楚州臺濛盛供帳之行密一夕去遺衣臥內皆經補浣濛還之行密曰吾興細微不敢忘本君笑我耶濛大慚解衣以贈夏侯端壽春人王世充遣人以淮南郡公尚書少吏部印緩召端解衣服以贈端曰吾天子使寧污賊官耶非持首去不可見即焚書及衣褐衣到闕下陽城德宗召拜諫議大夫遣長安尉楊寧齎束帛詣其家城褐衣到闕下辭讓帝遣中人持緋衣衣之不肯服朱桃椎益州成都人淡泊絶俗被裘曳索人莫能測其為長史竇軌見之遺以衣服鹿幩麂靴逼署鄉正委之地不肯服衣帶絶孫孝哲契丹部人祿山對側門俟召衣帶絶不知所為孝哲針縷素具徐為紉綻祿山大悅隱居服盧泓還山賜隱居服每內燕以衣敝惡辭不赴張仲武范陽人子直方時鄭畋輔政頻言仲武會昌中功第一今直方百口不自存每內燕以衣敝惡辭不赴陛下録功念舊宜少優假金鳥錦袍李石傳帝曰吾聞禁中有金鳥錦袍二昔玄宗幸溫泉與楊貴妃衣之今富人時時有之謁先師衣青襟介幘劉允章咸通中為禮部侍郎請諸王及進士第並謁先師衣青襟介幘以還古制正服李德裕臣在先朝嘗獻大明賦以諷二曰正服諷服御非法也不為鮮明盧鈞玩服不為鮮明衣婦人服李密簡驍勇數十人衣婦人服戴羃內離藏刀裙下詐為家嬋妾者入桃林傳舍須曳變服出據其城賜錦衣一襲劉幽求復舊官賜錦衣一襲無文綺之飾盧懷謹服無文綺之飾著白者山人李泌肅宗即位欲授以官固辭願以客從入議國事出陪輿輦衆指曰著黃者聖人著白者山人帝聞因賜金紫解衣衣之陸贄帝親倚至解衣衣之同類莫敢望生三日賜緋衣銀魚王繇尚水穆公主生子潛生三月賜緋衣銀魚朝服擅著賈直言始劉子悟從諫貴甚見直言輒衣紫擁笏以兵自衛直言諫悟曰郎少年無使襲山東態朝服豈擅著耶一歲賜袍自青及紫傳遊藝起一歲賜袍自青及紫人號四時仕宦衣紙自蔽周智光先是淮西忠臣臣入朝次潼關聞智光反率兵討之會敗忠臣因入華大掠自赤水至潼關畜産財物皆盡官吏至衣紙自蔽纍日不食者垢衣敗服武儒衡宰相鄭餘慶不事華潔門下客多垢衣敗服獨儒衡上謁未嘗有所易常衣垢弊蕭復傳常衣垢弊紫袍主事楊國忠侍郎韋見素張倚與本曹郎趨走堂下抱按牘國忠顧女弟曰紫袍二主事何如皆大噱衣服皆畫雲霞前蜀王衍嘗與太后太妃遊青城山官人衣服皆畫雲霞飄然望之若仙衣服喜鮮明李貞素衣服喜鮮明衣錦半臂來子珣遷遊擊將軍常衣錦半臂自異易服青以碧則天光宅元年九月甲寅易內外官服青者以碧覆以已袍安祿山林甫稍厚之引至中書覆以己袍羸衣朱泚賊已嚴何諸門士人羸衣冒出奇服玄宗貴妃楊氏奇服變化若神為大官服不改初辛祕破衣劉乂嘗穿履破衣危帽散衣李紳河南惡少危帽散衣霞紋帔司馬承正以花為之服西舍利進潔衣高麗帝總飛騎入鹽渝關皇太子迎道左初帝與太子別御褐袍曰俟見爾乃更袍歷二時弗易至穿穴群臣請更服帝曰士者敝衣吾可新服耶及是太子進潔衣乃御龍綃衣唐杜楊編元載寵姬薛瑤英衣龍綃衣一襲無一兩搏之不盈一握軿羅衣敬宗寶歷二年閩東國貢舞女二人衣軿羅之衣無縫而成其文巧織人未之識焉蘸碧衣鳳池編李紳為相時俗尚輕綃紫蘸碧為婦人衣紳自為小君裁剪百鳥毛裙安樂公主使尚方合百鳥毛織二裙正視為一色旁視為一色日中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志被華章之貴服顧逢掖之腐儒被華章之貴服劉禹錫集十七執領禬而抃舞失次被纖柔而顧眄增輝謝春衣表鶴文是賜遠慚晉代之賢鵜翼不濡實懼曹風之剌謝冬衣表服袍者加襴太尉長孫無忌議服袍者下加襴緋紫緑皆視其品庶人以白出唐車服志笥衣裳必文章遒澤為甲劉禹錫論書籠桶衫拂油巾皆蜀人奉養之者出浣花旅地志紅圈帔緑暈衫賞以紅圈帔緑暈衫影燈記使君寒贈袍杜甫詩汀草亂青袍同上江令錦袍鮮秋日詩同上奪錦袍以賞詩宋之問見詩門緑袍木簡楊炎道州還也家人以緑袍木簡棄之炎止曰吾嶺上一逐吏超登上台可常哉且有非常之福必有非常之禍安可棄是及貶還所服結今生緣開元中賜邊衣制自宮中有軍校袍中得一詩云留意多添線含情更著綿今生已過了重結後生緣持詩白帥帥以聞明皇問之有一宮人自言萬死即以嫁得詩者與汝結今生緣本事詩金字銘袍唐永壽中敕賜嶽牧金銀字銘袍雞跖集三浣衣五色線杜枚之郡齋獨酌詩云平生五色線願補舜衣裳龍朔元年孫道茂奏舊令六品緑八品九品青深青亂紫非卑品所服望請改八品九品著碧舊志上元元年敕三品以上服紫四品深緋五品淺緋六品深緑七品淺緑八品深青九品淺青庶人服黃一品以上文官並帶手巾等袋刀子礪石武官欲帶聽之九月百寮具新服宴之舊紀婦人從夫色正觀四年制舊志禮無服衫之文士人以棠苧襴衫為上服貴女功之始也一命以黃再命以黑三命以纁四命以緑五命以紫士服短褐庶人以白中書令馬周上議禮無服衫之文三代之制以深衣請加襴袖褾襈為士人上服開胯者名曰缺胯衫庶人服之新志給袍者皆易其繡文詣衛大將軍申郎以下給袍者皆易其繡文千牛衛以瑞牛左右衛以瑞馬驍衛以虎武衛以鷹威衛以豹嶺軍衛以白澤金吾衛以辟邪同上紫為三品之服其後紫為三品之服金玉帶銙十三緋為四品之服金帶銙十一淺緋為五品之服金帶銙十深緑為六品之服淺緑為七品之服皆銀帶銙九深青為八品之服淺青為九品之服皆鍮石帶銙八黃為流外官及庶人之服銅鐵帶銙七同上既而天子袍衫稍用赤黃遂禁臣民服同上裙曳地淮南觀察使李德裕令管內婦人衣褒四尺者皆闊一尺五寸裙曳地四五寸者減三寸同上寶雞袍唐酉陽雜俎賜安祿山品目有金鸞紫羅緋羅立馬寶雞袍方士服房玄齡隱太子將有變秦王召二人以方士服入夜計事縫戰士衣肅宗廢后張氏駐靈武産子三日起縫戰士衣太子敕止對曰今豈自養時耶衣者蠶桑也李叔明素惡道佛之弊上言乃下尚書省雜議裴伯言曰衣者蠶桑也食者耕農也群臣之服二十有一袞冕者一品之服也鷩冕者二品之服也毳冕者三品之服也絺冕者四品之服也玄冕者五品之服也平冕者郊廊武舞郎之服也爵辨者六品以下九品以上從祀之服也武辨者武官朝參殿庭武舞郎堂下鼓人鼓吹按工之服也辨服者文官九品公事之服也進賢冠者文武朝參三老五更之服也遠遊冠者親王之服也法冠者御史大夫中丞御史之服也高山冠者內侍省內謁者之服也委貌冠者郊廟文舞郎之服也卻非冠者亭長門僕之服也平巾幘者武官衛公事之服也黑介幘者國官視品府佐謁府國子太學生四門生俊士參見之服也介幘者流外官行署及三品以下登歌工人之服也緑幘者尚食局主膳典膳局典食大官署食官署供膳奉觶之服也具服者五品以上陪祭朝饗拜表大事之服也從省服者五品以上公事朔望朝謁見東宮之服也被仙衣而龜鶴齊壽柳文謝端午賜衣服表黃衫昭宗既誅宦官第五可範等準國故事量留三十人各賜黃絹衫一領以備宮中指使仍不得輒有養男其左右神策軍諸道監軍並令停廢白始裘月令孟冬天子始裘輕裘乘肥馬衣輕裘為裘見上注公子之裘取彼狐狸為公子裘短右褻裘長短右袂重裘諺曰救寒莫若重裘鷫鷞司馬相如與文君還成都以所服鷫鷞就市狐貉之厚以居謂裘安且燠兮輕暖文選身被輕暖如膏羔裘如膏日出有曜膏音幹道反禦寒文子曰衣足以禦寒蓋形童子不衣裘裳注為大溫也祀天服司裘大裘周禮曰司裘掌為大裘以供王祀天之服注云大裘羔裘祀天以示質良裘仲秋獻良裘注云良善也王所服也功裘季秋獻功裘注狐裘之類卿大夫所服裼裘襲裘禮曰裼襲禮之文也衣裘有裼襲以順禮狐裘羔袖善者多惡者少見美禮曰裘之裼見美也虎裘狼裘君之右虎裘左狼裘注謂尊者宜虎猛熊羆詩舟人之子熊羆是裘言富也狐裘反衣漢楊興謂史高曰將軍所舉不過門下賓客富貴而列士不舉是有狐白之裘而反衣也奢麗千金狐腋王褒講德論曰千金之裘非一狐之腋雉頭晉起居注曰太醫司馬程據上此裘非常服也上以損費功用於殿前燒之鶴氅世説王恭常乘高輿被鶴氅裘狐白秦囚孟嘗君説幸姬求解姬曰願得君鶴氅裘狐白裘已獻昭王矣有客能狗盜入秦宮藏盜得狐白裘獻之遂得歸齊矣既乖常服且抵彝章士不衣狐白禮遺子思在衛縕袍無表田子方遺其狐白之裘子思曰吾聞遺人食物不肯者受之如棄物於溝壑中吾雖無德不敢以身為溝壑遂不受出孔叢子青鳳毛拾遺記周昭王以青鳳毛為二裘一燠質二暄肌以禦寒也美裘蔡昭侯朝楚待美裘二其一獻之昭王而自衣其一楚相子常欲之不與常讒之蔡侯留楚三年蔡侯知之乃獻其裘子常子常受之乃言歸蔡侯蔡侯歸請晉伐楚粹白之裘天下無粹白之狐有粹白之裘注云集而後成粹純也儉敝三十年晏子一狐裘三十年晏子焉知禮言太儉也黑貂敝史記蘇秦説相李兌兌遺之以黑貂裘蘇秦遊秦秦不能用於是貂裘敝奢而不度翠被可鑒於楚王儉則失儀狐裘見非於齊相楊襲執玉其有藉者則裼藉繅文其無藉者則襲襲文質相交變裘之為裼見美也君子於事以見飾為敬羔羊之不裼庶人狐貉之厚以居士大夫不相因禮裼襲之不相因欲民之無相瀆也注不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執玉龜之屬也禮不盛者以裼為敬受享是也錦衣以裼之記曰君衣狐白裘錦衣以裼之注云君衣白裘以素錦為衣袒而見衣曰裼犬羊之裘不裼質略無文亦庶人也孔被裘曳索朱桃椎被裘曳索人莫能測其為大布張志和嘗欲以大布制裘嫂為躬績及成衣之雖暑不解服終身李巖為參軍時制一裘服終身粗裘鄭注裳衣粗裘鹿裘武攸緒王公所遺鹿裘塵皆流積玄狐裘西域高昌太宗即位獻玄狐裘十月始裘李程曰玄宗著令十月始裘浮光裘唐杜楊編敬宗寶曆元年南昌國進浮光裘即紫海水染其色也以五彩蹙成龍鳳以五色真珠上衣之以獵比苑為朝日所照光彩動搖一日從禽忽值暴雨而裘略無沾潤上異之青毛飾裘披青毛飾李身披翠雲裘袖拂紫煙去鳴早歌紫綺裘倒披紫綺裘玩月金陵粉圖珍裘五雲色曄如晴天散彩虹酬殷佐明媚五雲裘日本裘身著日本裘昂藏出風塵送魏萬青兕裘羌兒青兕裘杜甫送韋十六弊裘何啻聯百結投簡成華諸子冰雪之交衆裘我絺柳宗元集翠裘則天賜狄仁傑白有常禮冠帶有常必循其故昭度衡紞紘綖昭度也並冠節首飾冠首飾也身章傳曰衣身之章旌禮傳曰服以旌禮有頍之容頍音企在首詩曰有頍者辨實維在首如星會辨如星俅俅詩曰載辨俅俅恭貌載戴也致美乎黻冕元服冠也首服周禮辨師掌后首服五冕周禮辨帥掌王五冕皆玄冕朱裏延紐邃延天子玉藻十有二旒前後邃延出冕前後天子五綵藻為旒旒十有二延冕上覆也臺笠緇撮撮緇布冠都人士儉節也柱後惠文冠秦時法官冠張敞弟武為梁相云當以惠文冠治之一免禹貢曰冠一免安可復冠竹皮高祖以竹皮為冠及貴常冠所謂劉氏冠詔曰爵非公乘不得冠此公乘第八爵高山冠酈食其謁沛公衣儒衣冠注云一名高山冠挂後漢逢萌王莽時曰三綱絶矣不去禍及乃解冠挂於東都門而去角巾郭林宗遇雨其巾墊而折其後學者著冠莫不折其角葛巾蜀諸蜀武侯與宣皇在渭濱將戰宣皇戎服蒞事使人視武侯乘素車葛巾毛扇指揮三軍皆隨其進止宣皇聞而嘆曰可謂名士也漉酒陶潛在家酒熟取頭上葛巾漉酒漉畢還復著之縞冠玄武子姓之冠有父服不純吉素紕縞冠素紕既祥之冠不齒之服玄冠縞武不齒之服不免子路曰君子死冠不免免至地也服周之冕素冠庶見素冠招虞齊侯曰招虞人以弓不進使執之辭曰臣不見皮冠故不敢進乃捨之必彈楚詞曰新沭者必彈冠彈冠王陽入仕貢禹彈冠言相援引不整李下不整冠幅巾縑巾見異服門注進賢晉輿服志進賢冠古緇布遺像也蓋丈儒之服有王梁三梁兩梁一梁人主五梁三公三梁卿大夫尚書兩梁漢太官令冠兩梁親省御膳為重也博士兩梁崇儒也金璫附蟬漢幸臣侍臣閹儒服大冠侍中常侍加金璫附蟬為飾以金為貂飾首方山冠舞人以五綵隨其行方色服行列也樊噲冠漢書鴻門會項羽圖危漢王樊噲聞事急乃裂裳苞盾戴以為冠而入人壯其意乃制象焉惠文武冠一曰惠文或曰趙惠文王所造或曰齊人見于歲涸澤之神名曰慶忌冠乘小車疾馳因象其冠而服焉墯遊之冠禮垂緌五寸怒發蟬翅注後惠文御史冠冠細如蟬翅奇侈異服記作異服以疑衆不以聽言殺無赦不稱傅曰服美不稱必以惡終瓊辨鷸冠不衷身災並見上注既乖常服是抵彝章小冠杜欽子夏目盲杜鄴與欽同姓亦字子夏京師衣冠謂欽為盲子夏欽乃為小冠高廣才二寸謂小冠子夏儉敝昭其儉也儉而有度從儉麻冕從儉禮也今也純儉吾從衆拜下禮也語必加於首榖梁曰辨冕雖舊必加於首苴履漢書冠雖敝不以苴履奢崇瓊辨誠取敗於河神儉用竹皮豈見非於劉氏濯冠見上注逼下偞上偞迫也音墮莢反為己偞卑也章甫遺越人以章甫終不為惠孔冠髻在首令狐德棻帝嘗問丈夫冠婦人髻比高大何邪德棻對曰冠髻在首君之象也晉之將亡君弱臣疆故江左士女衣小而裳大宋武帝受命君德尊嚴衣裳隨亦變改此近事驗也僕射巾裴冕自製巾子工甚人爭效之號僕射巾冠冕之制董晉金吾將軍沈房有期喪公除常服入閣帝疑以問晉又問晉對曰古者服冠冕以佩玉節步堂上接武堂下布武君前趨進而已今或奔走以致顛仆在式朝臣皆綾袍五品而上金玉帶所以盡飾而奉上故漢尚書郎含香老萊綵服君父一也若然服絁縵亦非禮也帝然其言詔入閣官無趨走期以下喪不得以慘服會令群臣衣本品綾袍金玉帶自晉而復不加其身甄濟有詔贈濟祕書少監而逢與元稹善稹移書於史館修撰韓愈曰若甄生辨冕不加其身祿食不進其口直布衣一男子耳及亂則延頸受刃分死不回山帔葛巾武攸暨安樂公主出降遣通事舍人李邈以璽書邀之詔見曰山帔葛巾不名不拜聞變不及巾李願節度鳳翔用婚家竇綏典帳中兵驕驁怠沓衙將李臣則等因衆不忍夜斬緩首願聞變不及巾與左右數人縋而逸脫巾帶諫軌失思力脫巾帶諫尖巾前蜀王衍好裹尖巾其狀如錐金蓮花冠後宮皆戴金蓮花冠折皂巾地理志湖州土貢折皂巾輕金冠唐杜陽編寶曆二年浙東貢舞女戴輕金冠以金絲結之為鸞鶴狀仍飾以五彩細珠玲瓏相續可高一尺稱之無二三分玉葉冠唐明皇雜記持盈公主玉葉冠希世之寶英王踣巾武后擅政多賜群臣巾子繡袍勒以回文之銘皆無法度不足紀至中宗又賜百官英王踣樣巾帝在藩時冠也其後文官以紫黑絁為巾楊供奉官及諸司長官則有羅巾圓頭巾子後遂不改已上並唐車服志太宗嘗以袱頭起於後周便武事者也方天下偃兵採古制為翼善冠自服之又制進德冠以賜貴臣同上杜甫見嚴武不冠嚴武鎮成都奏杜甫為參謀甫於浣花里種竹植樹結廬枕江縱酒嘯詠與田畯野老相狎蕩無拘檢武過之有時不冠其傲誕如此舊史帽唐實録唐初以縠為之以隔風塵貂蟬冠舊行柳宗元詩為客裁烏帽杜甫九日詩正冠崔氏莊詩羞倩旁人為正冠何須不著鵔鸃冠寄題管寧紗帽淨秋日詠懷朝冠飄綵紘韓愈碧帽張巡前此遠將李滔救東平遂叛入賊大將田秀榮替與通或以告遠曰晨出戰以碧帽為識視之如言盡覆其衆還輒曰我誘之也請以精騎往易錦帽岸巾宋璟傳帝怒岸巾出側門珠飾巾秦再思紀異昭宗播遷於鳳翔朱梁率諸道甲馬奉迎車駕時侯王將帥在岐下者皆以珠一顆盤袱頭腳貫以銀線而簪之又軍人咸以珠飾巾競相請誇尚洎朱梁篡立乃知珠已居人上者久矣芾韠四白詩赤芾太古蔽膝之法象冕服謂之芾他謂之韠皆以韋為之朱芾斯皇大夫已上韠君朱大夫素士爵韋禮也在股詩曰赤芾在股邪幅在下莊疑祀曰天下有道我韍子佩天下無道我負子戴注言隱藏也孔胡服蔽膝唐郭知玄韻韠胡服蔽膝説文白紱也所以蔽前也下廣二尺上廣一尺其頸五寸一命縕韠再命赤韠俗作韠朝服謂之韠冕服謂之黻車服志爵韠爵辨者六品以下九品以上從祀之服也以紬為之無旒黑纓角簪導青衣纁裳白紗中單青領褾襈裾革帶鉤䚢大帶及捭內外皆緇爵帢白襪赤履五品以上私祭皆服之白緇帶士冠禮朝服緇帶緇黑繒素帶練帶緇辟再繚禮素帶終辟大夫素帶裨垂士練帶大夫帶四寸雜帶君朱緑大夫玄華士緇辟二寸再繚四寸凡待君帶垂足雜飾也垂足見上注麻者不紳紳大帶喪代之子張書諸紳搢紳者不道漢郊祀志云紳大帶搢謂插笏於大帶革帶之間如厲詩垂帶如厲厲垂貌黃河如帶帶紳五孔獻玉帶十有三王播自淮南還獻玉帶十有三遂再得相于闐玉帶李靖五代孫彥芳其舊物有靖破蕭銑時所賜于闐玉帶十三胯七方六刓胯各附環以金固之所以佩物者天子悉留禁中黃銀帶杜如晦薨帝嘗賜玄齡黃銀帶曰如晦與公同輔朕今獨見公泫然流淚曰世傳黃銀鬼神畏之更取金帶遣玄齡送其家束帶不休崔元綜同平章事坐政事堂束帶終日不休偃遺李訴以玉帶遺牛元翼賜李光顏帝御通化門臨送賜玉帶賜白玉帶楊元卿穆宗賜白玉帶通天犀帶馬植進中書侍郎初左軍中尉馬元贄最為帝寵信賜通天犀帶而植素與元贄善至通昭穆元贄以賜帶遺之它日對便殿帝識其帶以誥植植震恐言狀於是罷為天平軍節度使萬釘寶鈿金帶突厥傳統葉護可汗獻萬釘寶鈿金帶貝帶金鑣貝帶未嘗識叢書鈿鈿帶魚袋可汗拜蘇祿左羽林大將軍賜銀袍鈿帶魚袋七事刻玉為魚五代安重榮既僣侈以為金魚袋不足貴刻玉為魚佩之富人玉帶萇從簡陳州人許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賓二卒嘆曰事公欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻遂踰垣而去寶帶盧從史初神策中尉吐突承璀與對壘從史時過其管飲博承璀多出寶帶奇玩夸之縷金帶南詔衣縫紫錦罽縷金帶水玉腰帶唐杜陽編文宗朝李訓講周易頗葉上意時方盛夏遂命取水玉腰帶以賜訓紅玉帶唐明皇雜録上自解紅玉帶賜寧王紫金帶上以紫金帶賜岐王蓋昔高宗破高麗所得開元中高麗遣使來朝宴內殿因從容言於內臣曰紫金帶本國亡是歲荒民散干戈屢起幸在內帑一見足矣上聞之命封付其使犀帶有光楚馬希聲海商有鬻犀帶者直數百萬晝夜有光洞照一室希聲殺商而取之逾月光遂滅出九國志蘇逢吉求玉帶鳳翔李永吉初朝京師逢吉以永吉救秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先世玉帶永吉以無為解逢吉乃使人市一玉帶直數千緡責永吉償之既而不得州五代史三十漢臣傳垂拱中都督剌史始賜魚天授二年改佩魚為龜其後三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋景龍中令特進佩魚散官佩魚自此始也出唐書車服志賜寶帶契苾明征吐蕃以戰多進左威衛大將軍賜錦袍寶帶口占進王帶狀因話録晉公平淮西賜以玉帶公臨薨卻進口占奏狀曰內府之殄先朝所賜既不合將歸地下又不合留在人間聞者歎其不亂百人緩帶唐諺云一人在朝百人緩帶一人貴而親友皆榮之也雞跖集雕銜綴帶唐會要貞元之間德宗詔頃來賜衣文綵不常非制也朕今思之宜有定制節度使宜以綏帶取其武毅以靖封內觀察使宜以鴈銜威儀取其行列有序冀牧人有威儀也威儀瑞草也賜犀帶鄭畋進司空佩龜載初元年改內外官所佩魚並作龜舊史隨身魚唐實録唐永徽二年文武職事四品五品並給隨身魚天后復改魚為龜密裝腰鞓割方玉李賀酬答魚袋刀子礪石金玉帶唐高宗咸亨三年敕五品以上賜新魚袋並飾以銀三品以上賜金裝刀子礪石一具上元中又敕文武官三品以上金玉帶四品五品並金帶六品七品並銀帶八品九品並䃋石帶庶人銅鐵帶文武並帶手巾算袋刀子礪石武官欲帶亦聽之九月百官具新服上宴之于麟德殿唐舊史不知官高卑玉帶懸金魚韓愈示兒詩散職佩魚始唐景龍景龍中詔衣紫者魚袋以金飾之衣緋者以銀飾之車服志開元中駙馬都尉從五品者假紫金魚袋都督剌史品卑者假緋魚袋五品以上檢校試判官皆佩魚同上腰帶搢垂頭於下名曰尾取順下之義一品二品銙以金六品以上以犀九品以上銀庶人以鐵同上帶垂蒼玉珮韓愈聯句白錦衾爛兮詩抱衾與禱禱單被寢衣語曰必有寢衣長一身有半布被公孫弘為三公臥布被飾詐以釣名又張湛為漁陽守去職布被囊而已賜錦被朱寵為太尉家貧臥布被朝廷乃賜錦被又王良為司徒掾在任恭儉瓦器布被妻子不入官舍合歡鴛鴦古詩客從遠方來遺我一端綺文綵雙鴛鴦裁為合歡被輕暖文選身被輕暖安燠安且燠兮見裏禮褻衣衾不見裏謂其穢賜霍光錦被百領薑竑兄弟共被寢輕衾繡被後漢李忠仲為大將軍世祖賜之牛衣王章為諸生與妻居病無被臥牛衣編亂麻為衾俗呼之為龍且十二幅江夏孟宗少遊學其母作十二幅被以招賢士共臥庶聞君子之言覆被馮豹為郎奏事未報俯伏省闥從昏至明肅宗使期門郎錦被覆豹令勿驚令被晉光逸為小吏縣令更送客冒寒雨遇令不在解衣入令被曰何惜一被殺一人翡翠珠被爛齊光楚詞孔布被魏徵帝賜布被質錢陽城嘗以木枕布衾質錢人重其賢爭售之被中畫腹王紹素工草隸嘗與人書曰聞虞被中畫腹與余正同虞即世南也大衾玄宗為太子嘗製大衾將與諸王共之錦衾五代史康福常自言沙陀種有疾臥閣中寮佐入問疾見錦衾相顧竊戲曰錦衾爛兮福聞之怒曰安得謂我為奚引被王勃屬文則酣飲引被覆面臥錦被桓彥範流瀼州擢李承嘉金紫光祿大夫后又賜錦被一神錦被唐杜陽編元和八年大軫國貢神錦被冰蠶絲所織也方二丈厚一寸其上龍文鳳彩殆非人工神絲繡被同昌公主堂中設神絲繡被繡三千鴛鴦間以奇花異葉其精巧華麗絶比其上絡以靈粟之珠如粟粒五色輝映翠被粲爛韋蘇州長安道歌下有錦鋪翠被之粲爛博山吐香五雲散罨靸被鄭愚津陽門詩象床塵埃罨靸被注上在華清日罨颯公主嘗與上晨聽按新水調愛王起晚遽自真珠被而出及寇至倉惶隨駕出宮後不之省及上歸南宮一旦入此中而當時罨畫之被宛然塵積矣白褒衣大祒見衣服法度門五褲廉范字叔度為蜀郡太守放火禁嚴備水人歌曰廉叔度來何暮不禁火人安堵昔日無襦今五褲通健賈逵貧無褲晨著妻兄柳季褲而去時人謂之通健也皮褲馬援牛羊散與故舊身衣皮褲孔朝服褲褶歸崇敬時百官朝朔望皆服褲褶崇敬非之建言三代逮漢無其制隋以來始有服者事不稽古宜停詔可皮褲婁師德檢校豐州衣皮褲率士屯田易緑褲李訓下詔暴訓涯等罪李孝本易祿褲猶金帶以帽障面奔鄭注乞襦褲食貨志初德宗居奉天儲蓄空窘嘗遣卒視賊以苦寒乞襦褲帝不能致剔親王帶金而鬻之通身褲撲子蠻以青娑羅為通身褲蘭縑褲雲仙散緑海墨徽言曰李白遊慈恩寺僧用水松牌乞詩白為題訖僧獻蘭縑褲白襪而登席褚師聲子襪而登席云臣有疾異於人若見君將之注古者臣見君解襪有疾謂足疾也謂嘔吐者也結張釋之為王生結襪生塵文選羅襪生塵躞蹀羅襪躞蹀而容與孔多製履襪崔彥昭母聞彥昭相敕婢多制履襪或襪而騎李石中人自邊還走馬入金光門道路妄言兵至百官或襪而騎錦袎襪唐太真外傳妃子死之日馬嵬媼得錦袎一隻相遇過客一玩百錢前後獲錢無數盈盈漢水若可越可惜凌波步羅襪李白寄遠詩香塵動羅襪緑水不沾衣感興詩垢膩腳不襪杜甫北征青鞋布襪從茲始奉先劉少府白足傲履襪吳風謝安屐白足傲履襪縷絶香不歇不見巖畔人空見凌波襪郵童愛蹤迹私手解縏結傳看千萬服縷絶香不歇劉禹錫馬嵬行襪有帶尚矣文粹武王罷朝而襪系絶衛褚師呼聲子結襪而登席漢廷尉為王生結襪襪有帶尚矣今獨亡古之制亡者十八九矣奚襪帶之足云陸龜蒙雜説龍縞襪幽怪録巴邛人家橘園有兩大橘如三斗盎剖開每橘有二老叟皆相對象戲一叟曰我輪阿母女態盈娘子躋虛龍縞襪八緉鴉頭李白詩屐上足於霜不著鴉頭襪事業如拆襪線為蜀吏部尚書韓昭多能而皆不精朝士李白云韓八座事業如拆襪線無一條長北夢瑣言穢襪劉禹錫嘉話元載賜死主者以穢襪塞其口而終羅襪紅蕖艷杜甫千秋節有感詩詭制恆巾襪韓文不襪而鞋五代唐臣李仁矩董璋置酒如仁矩仁矩辭醉不往於傳舍與倡伎飲璋怒率衙兵露刃之傳舍仁矩惶恐不襪而鞋走廷中璋責之白跪遷俯納記嚮長者而屨跪而遷屨俯而納履坐取禮君子之飲潛也二爵而退則坐取屨隱辟而後屨履霜糾糾葛屨可以履霜踐雪史記東郭先生衣敝履不完行雪中履有上無下足踐地路人笑之珠履楚春申君賓客三千人皆躡珠履鳧舄王喬為鄴縣令每朝乘二舄乃鳧也豹舄傳曰雨雪楚王皮冠豹皮為履跪黃石公墜履令張良取之良跪授之屨賤踊貴織履高士傳曰陸仲子織履以為食樂在其中喪屨齊侯墜于車傷足喪屨反誅屨于徒人費不得鞭之誅屨見上注五兩葛屨五兩幾幾赤舄幾幾瓜田古詩曰君子防未然不處嫌疑間瓜田不納履李下不整冠文選不加於枕漢書履雖鮮不加於枕冠雖敝不以苴履尚書之聲鄭崇字子遊為尚書數上書諫上上笑曰我識鄭尚書履聲曳革履鄭崇事見上以承玉趾規行矩步上殿漢相蕭何劍履上殿珠履之奢雖懲於楚客葛屨之儉赤剌於魏人解屨禮侍坐於長者屨不上於堂解屨不敢當階就屨跪而舉之屏於側子房跪履於黃石釋之結襪於王生皆禮敬也屨人屨人為赤舄黑舄赤繶青絇素屨葛屨注亦繶赤絲為緣也命屨命夫婦履也功屨去飾士及妻屨散履及素履大祥時履青絇納屨踵缺莊子補履于將補履不如兩錢之錐扉屨鄭申侯見齊侯曰若師出於陳鄭之間供其資糧扉屨其可也注云草屨扉屨也絲屨禮國家靡敝君子不履絲屨禹治水山行乘樏丘遙反履下半寸如錐孔以履抵面滕王元嬰嘗為典韱崔簡妻鄭嫚罵以履抵元嬰面血流乃免製履崔彥昭與王凝外昆弟也凝大中初先顯而彥昭未仕嘗見凝凝倨不冠帶嫚言曰不若從明經舉彥昭為憾至是凝為兵部侍郎母聞彥昭相敕婢多製履襪曰王氏妹必與子皆逐吾將共行彥昭聞之泣且拜不敢為怨麂靴朱桃椎益州城都人長史竇軌遺以衣服麂幘麂靴委之地不肯服居士屩嘗織十芒屩置道上見者曰居士屩也為鬻米茗易之置其處輒取去終不與人接其為屩草柔細環結促密人爭躡之家惟枕履元德秀家惟枕履棕屩張志和棕屩抱持取靴崔戎出為華州剌史徙兗海沂密觀察使民擁留于道不得行乃休傳舍民至抱持取其靴高頭草履五行志文宗時吳越間織高頭草履如綾縠前代所無履下物也織草為之又非正服而被以文飾蓋陰斜闒茸奉侈之象墮舄玄宗貴妃楊氏每十月帝幸華清宮五宅車騎皆從國忠導以劍南旗節遺鈿墮舄狼藉于道穿屐劉義賜以屩高麗傳候騎獲覘人帝解其縛賜以屩遣飛雲履樵人直説曰白樂天燒丹于廬山草堂作飛雲履玄綾為質四面以素綃作雲朵染以四選香振履則如煙霧樂天著示山中道友曰吾足下生雲計不久上升朱府矣蒲靸江南李升常履蒲靸出九國志百合履唐二儀録云大曆中進五朵草履建中間進百合履露舄韓愈詩暄晨躡露舄桃花絲織鞋青州雜記青齊間桃花有一種盛開時垂絲二三尺者採之練以松脂遞相纏織成鞋履寄往都下人皆不辨何物麻鞋見天子杜甫述懷麻鞋見天子衣袖露兩肘遠遊履足下遠遊履凌波生素塵李白送人遊南獄五朵履唐實録大曆中進五朵履青絲履杜甫大雲寺細軟青絲履頻遊任履穿春日江村同上敕王喬以視履杜甫朝太清賦曳方履儒學傳序紆侈袂曳方履白球玉魚須禮天子以球玉諸侯以象大夫以魚須丈竹士以竹本象可也球王美玉文飾也指畫禮凡指畫於君前用笏受命禮造受命於君前書於笏書思記將適君所史進象笏書思對命注書之於笏謂恐失忘方正天子搢珽方正於天下也注云天子笏方其頭言無所屈前詘諸侯荼前詘後直讓於天子也圓其頭是屈於天子也荼音舒後詘大夫前詘後詘示無所不讓書教令輿服志古者貴賤皆執笏主書君上之教今有使搢之於帶中後代以來唯八座尚書執笏者以筆綴手版頭其餘王公卿士但執手版正主於敬不執筆示非記事官也手版見上注珽傳袞冕黻珽珽笏也運笏長者意欲去禮脫笏記小功不脫笏當事則脫注云悲哀之時不在記事相手版法出蕭何或曰四皓東方朔見喜曰非庸人所解相手版法擊錢鳳溫嶠飲錢鳳酒未飲以手版擊之倒執手版汗流洽背孔未嘗書笏王播善古奏雖數十事未嘗書于笏揚笏王無競三遷監察御史改殿中會朝宰相宗楚客楊再思離立偶語無競揚笏曰朝禮上敬以謹密字親署笏端崔澄性滑稽善辨帝恐漏禁中語以謹密字親署笏端還笏丐歸田里褚遂良帝將立昭儀遂良翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀昔事先帝身接帷第今立之奈天下耳目何帝羞默遂良因致笏殿階叩頭流血曰還陛下此笏丐歸田里書笏魏徵薨帝後臨朝嘆曰朕比使人至家得書一紙始半稿其可識者曰天下之事有善有惡任善人則國安任惡人則國弊公卿之內情有愛憎憎者惟見其惡愛者止見其善愛憎之間所宜詳謹若愛而知其惡憎而知其善去邪勿疑任賢勿猜可以興矣其大略如此朕顧思之恐不免斯過公卿侍臣書之於笏知而必諫也故笏徵五世孫謨帝問家書詔頗有存者乎謨對惟故笏在詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今之甘棠一榻置笏重積其上崔琳每歲時宴于家以一榻置笏重積其上舉笏卻揖宋璟告滿入朝公卿以次謁易之等後至促步而附璟舉笏卻揖唯唯良笏李絳進中書舍人翌日親擇良笏與之且曰異時膺顧托南面當如此絳頓首以笏叩額宋申錫豆盧著誣告與漳王謀反時二月晦群司皆休中人馳召宰相至中書舍人唱曰所召無宋申錫申錫始知得罪望延英門以笏叩額還第奪象笏擊朱泚段秀實朱泚召秀實計事源休姚令言李忠臣李子平皆在坐秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段吾豈從汝反耶遂擊之泚舉臂捍笏中顙流血衊面擊姦臣顧少連裴延齡方橫無敢忤者嘗與少連會田鎬第酒酣少連捉笏曰段秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直在坐勸解之題詩太子笏以賜王起兼太常卿禮儀使帝題詩太子笏以賜舉笏示所記韋貫之或薦之京兆尹李實實舉笏示所記曰此其姓名也置笏在陛崔元亮改諫議大夫鄭注誣宋申錫捕逮倉卒內外震駭玄亮率諫官叩延英苦諫反復數百言文宗末諭玄亮置笏在陛舉笏擊面常達歸賊薛舉奴張貴曰識我否達瞑目曰若乃奴耳貴忿舉笏擊其面達不為懾畫地陳攻守計賈隱林德宗見隱林偉其貌問家世答曰故范陽節度副使循臣從父也帝異之引至臥內以手板畫地陳攻守計衣紫擁笏賈直言始劉悟子從諫貴甚見直言輒衣紫擁笏以兵自衛直言諫悟曰郎少年毋使襲山東態朝服可擅著耶陽墮司空圖會遷洛陽柳璨希賊臣意誅天下才望助喪王室詔圖入朝圖陽墮笏趣意野耄璨知無意於世乃聽還執笏簾外宋遜為連州參軍剌史聞其善歌使教婢日執笏簾外唱吟自如青石手版高駢呂用之憚其術窮且見詰乃刻青石手版為龍蛇隱起文曰帝賜駢使人潛植幾上駢得之大喜以象笏賜百官之無笏者五代唐明宗天成元年八月丁酉以象笏三十二賜百官之無笏者笏架會昌以來宰相朝則有笏架入禁中逐門傳送至殿前朝罷則置于架上百寮則各有笏囊吏持之出常朝録居安思危元稹閣下以文皇敕起居郎書居安思危四字於笏上為至戒矣上裴相書合以憤烈文粹孫樵文貞公笏銘靈豸豸角比干獻骨合以僨烈在公為笏三世一笏韓皋家自黃門以來三世傳執一笏經祖父所執未嘗輕授於僕人之手歸則別致在臥內一榻以示敬謹出唐語林叩顙五代何澤邪佞嘗班退獨留以笏叩顙北望而呼曰明主明主以笏畫地陳勝負五代王彥章至京師入見以笏畫地陳勝負趙巖等劾不恭勒還第休咎必驗字參軍善相笏知休咎必驗呼為李相笏又龍復本者無目幾有象簡竹笏以手捻之必知官祿年壽怒虎可垂笏不可挫峭華可拔笏不可折孫樵笏銘帛裹雜俎陳希烈不便執笏騎馬以帛裹令左右執之李右座見云便為將來故事笏囊張九齡體弱有醞籍故事公卿皆搢笏于帶而後乘馬九齡獨常使人持之因設為笏囊自九齡始衛公故物文粹韋端符衛公故物記三年冬端符於三原令座中揖其群官有客曰某丞李謂端符曰是衛公之胄也其家傳賜收與它物服器十餘物訖咽端符即丞居為客謁丞延入就次因請以觀丞慘然曰諾即奉賜書一函它物一器出發視有玉帶一公擒蕭銑時所賜于闐所獻素錦袍靴褲皆非華人所為象笏不類今笏火鏡椰杯等凡十三物文王賜書二十通多言征討事丞因請韋作衛公故物記上馬插手版韓愈贈張籍昨因有緣事上馬插手版行抽手版付丞相韓愈送盤谷子詩移南山帝前動笏移南山李賀珮十一白珮衷之旗也衷中也旗表也左傳昭其聲也于以用之聲以發之蕊兮佩玉蕊兮豫無所繫之比德去身君子以玉比德無故玉不去身禮非僻之心君子行則鳴佩玉是以非僻之心無自入也珮以制容文選變玉行不變玉規行矩步周旋中規折旋中矩有聲容觀玉聲先王有制所以比德君子無故玉不去身佩服無斁揖讓有聲禮容玉德右徵角左宮羽禮曰佩玉右徵角左宮羽謂玉聲所中進揖退揚進則揖之退則揚之俯仰之節居設朝結禮居則設佩朝則結佩齋則綪佩綪屈結綪音爭山水之文天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬士佩瓀玫而縕組綬世子佩瑜玉而綦組綬注云山玄水蒼玉之文也綬者所以貫佩玉相承受之瓀玫音次旻非僻之心無自入也溫潤之德尚可比焉鏘鳴禮鏘鏘詩云佩玉銷鏘鏘繫之組綬金玦晉太子申生帥師晉侯佩之金玦狐突歎曰金寒玦離胡可恃贈詩之子之來之雜佩以贈之問之又鄭交甫於漢皋遇二女解佩贈交甫交甫懷之而亡秋蘭紉秋蘭以為佩象環孔子佩象環五互注謙不比德蕙楚詞連蕙若以為佩獻傳蔡昭侯為兩佩兩裘以如楚獻一佩一裘於昭王桓子常欲之不與三年止之獻乃歸之垂委主佩倚側臣佩垂主佩垂則臣佩委磬折垂佩容臭男子未冠則雞初鳴盥漱佩容臭臭香也童子佩觿注謂解結佩韋范丹字史雲自以狷急不能從容常佩韋以自戒西門豹亦以性剛急常佩韋自戒佩弦董安于性寬緩則佩弦以自警璆然孔子入見衛靈公夫人南子北面稽首夫人自絺惟中再拜環珮玉聲璆然孔霹靂木玄宗皇后王氏帝欲廢后后兄守一懼為求猒勝浮屠明悟教祭北斗取霹靂木刻天地文及帝諱合佩之倒冠落珮杜牧之晚晴賦倒冠落珮兮與世闊疏環珮之聲滿宮憲宗懿安皇后郭氏穆宗嗣位上尊號皇太后凡朔望三朝帝率百官詣宮門為壽或歲時慶問燕饗後宮戚里內外婦車騎駢壅環珮之聲滿宮佩金玉裴矩遣人説高昌伊吾等啖以厚利使入朝帝西巡燕友山高昌等二十七國謁道左皆佩金玉玉佩于闐德宗即位遣朱如玉之安西求玉於于闐得珮珂五霞珮乞君飛霞珮與我高頡頑韓愈調張藉沉璜瘞珮柳宗元弔屈原沉璜瘞珮兮孰幽而不光響切晨趨珮柳宗元獻洪農公詩楚宮久已滅幽珮為誰哀杜甫雨詩時聞雜珮聲珊珊鄭駙馬宅詩耿耿水蒼韓愈詩鵝肪截珮黃同上白佩以金玦見上注與大夫得罪待放於郊公與之環即還與之玦即去贊國擇利衛侯與石郊子玦使守國日以此贊國擇利而為之玉玦魏略太祖征漠中太子在盟津聞鍾繇有玉玦使臨藩侯因而説之繇即送之召人以環絶人以玦隋巢子緩佩玦者事至而斷莊三舉所佩玦玦十二孔清玉刻珮連玦環雪後寄崔二十六丞相寶玦杜甫哀王孫腰下寶玦青珊瑚昔似連環今似玦韋蘇州行路難歌荊山之白玉兮良工雕琢雙環連月蝕中夬鏡心穿故人贈妾初相結恩在鐶中尋不絶人情厚薄苦須臾昔似連環今似玦赴湘一品集讓太尉表既望日以懷紗甘赴湘而捐玦徘徊視環玦以徘徊空嗟白首劉禹錫謝表珊瑚玦唐文宗宮中有黃金蛇出階光灼宮人以珊瑚玦擲并玦而帶去上尋庫得真金蛇貫玦上曰此隋煬帝為晉王賜陳夫人熟視下阿縻字俟環玦兮思帝鄉劉禹錫賦寶玦麒麟起李賀送齊光祿
