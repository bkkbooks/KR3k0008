body:
  text: 卷第八十八學校一白古之教者家有熟黨有庠遂有序國有學槐市杏壇學名子襟刺廢亂世則學不修毀鄉校傳曰鄭人游鄉校以議執政毀鄉校何如子産曰人議善者吾則行之否者吾則改之是吾師也若何毀之開設學校開士林之學小雅盡廢游講肆入學以齒學不可廢教所由興將崇洙泗之風必立膠庠之學文翁立學漢言語翁為蜀郡守及諸郡縣小吏起學宮設官使弟子授業遂變鄒魯之風天下並令立學成均五立學名天子命之教然後為學小學在公宮南之左大學在郊夏后庠序殷瞽宗周頖宮天子立四學周立四郊之養養國老於東郊養庶老於虞庠大學之道在明明德稷下關西告往知來子貢曰告諸往而知來者大設庠序記寧字武子為豫章太守大設庠序取交州石為磬以革舊制學者千人以私俸給又起學臺不改作而修學晉盧浦字允源為鄱陽內史修庠序祭酒求更起屋行禮浦曰孔子射於矍相之囿而行禮大樹下況今學史序高望顯敞乎避疾後漢魯平字叔陵為相趙王欲移居學舍平諫不聽遂上言詔下詰平平奏曰禮諸侯薨於路寢未有逃避之典學校教化之處不可詔從平言修孔子廟階前除草得璧後漢鐘離意為魯相出私錢付戶曹孔訴修孔子廟身入廟拭枕席劍履男子張伯除堂下草得璧七枚伯藏一枚以六白意意啓前甕中丹書云云具璧門注孔學校復興高士廉進益州長史引諸生講授經義學校復興學堂陳子昂學堂至今猶存韋嗣立上書極陳永淳後庠序隳散胄子衰缺儒學之官輕章句之選弛貴閥後生以徼幸升寒族平流以替業去陛下誠下明詔追三館生徒敕王公以下子弟一入太學尊師尚儒發揚勸獎海內知鄉然後審異銓總各程所能以之臨人則官無曠民樂業矣請廣學校賈至以謂今鄉舉取人未盡請廣學校增國子博士員十道大州得置大學館增學廬李栖筠增學廬表宿儒河南褚沖吳何員等拜學官為之師身執經問義遠邇趍慕至徒數百人興州縣學廬倪若水為汴州刺史增修孔子廟興州縣學廬勸生徒為教誨風化興行修講舍陽嶠修講舍人以為善千二百區劉禹錫嘗嘆天下學校廢乃奏記宰相曰言者謂天下少士而不知養才之道大堙不揚貞觀時學舍至千二百區生徒三千餘外夷遣子今入附者五國今室廬圯廢生徒衰少非學官不振病無資以約也月俸完葺鄭餘慶建言兵興以來學校廢諸生離散今天下承平臣願率文吏月俸百取一以資完葺詔可大起學校李栖筠為常州刺史乃大起學校堂上畫孝友傳示諸生為鄉飲酒禮登歌降飲人人知勸督生徒興愷悌韓退之潮州請置鄉校牒以督生徒興愷悌之風刺史出己俸百千以為學本收其贏餘以給學生廚饌祟贄八計曰視學校興廢以稽教導四門義學王潮昭宗假潮福建等州團練使乃作四門義學設鄉校常袞始閩人未知學袞至為設鄉校使作為文章親加講導與為客主鈞禮觀游燕饗與焉由是俗一變歲貢士與內州等其後閩人春秋配饗袞于學官葺儒宮高承簡拜刺史葺儒宮備俎豆歲時行禮大屋加塗暨題衡山文宣王廟講堂非曩建大屋加塗暨杜甫詩鞠為荒圃文粹舒元輿國庠記雖館于雲合鞠為荒圃邦民之良辨服是纓公躬講講論虔默以聽柳宗元道州先聖廟碑俾是荒服移為闕裡在周則魯侯申能修泮宮詩有其歌在漢蜀守文翁能首儒學史有其贊今公法古之大同于魯化人之艱侔于蜀同上廟舍峻整階序廓大同上薛公祭于先聖然其堂庭庳陋椽棟毀墜曾不及浮圖外說克壯厥居水潦仍至負加蕩汰公蹙然不寧若罔獲承既祭而出登墉以望爰得美地豐衍端夷水環以流有泮宮之制是日樹表列位由禮考宜然後節用以制貨財乘時以僦功役逾年而克有成廟舍峻整階序廓大講肄之位師儒之室立廩以周食圃畦以育蔬權其子母贏且不竭由是邑里之秀民感道懷和更來門下咸願服儒衣冠徵工僦功完舊益新州之廟屋壞幾毀神位刺史柳宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎于贏財取土木金石徵工僦功完舊益新柳州碑白敬教勸學衛文公文翁化蜀劉渠起舍劉渠字曼生除新成長告縣曰昔文翁化蜀乃更大造學舍聚生徒也三餘董遇有從學者苦無日遇言以三餘冬歲之餘夜日之餘陰雨月之餘無員數漢元設博士弟子無致員數以廣學也公卿子為諸生左雄伯豪奏徵海內名儒為博士公卿子弟為諸生有志操者加其傣祿也別立學舍明帝為功臣子孫別立學選高能以受業自期門羽林之士悉通孝經章句自始亦遣子入學濟濟洋洋莫盛於永平也孔歲饑講學不廢崔從會歲饑拾橡實以飯講學不廢賜市書絹隴西恭王驕侈其弟奉慈亦荒縱皆為帝所鄙嘗曰吾仇人有善且用之況親戚乎墳典不聞學何以為善哉各賜市書絹二百匹以愧功之然不自克也身為教誨倪若水為汴州刺史勸生徒身為教誨風化興行誘勸後生陽嶠好學善誘勸後生六經法言韋處厚穆宗立為翰林學士處厚以帝沖怠不向學即與路隋合易詩書春秋禮孝經論語掇其粹要題為六經法言二十篇上之冀助省覽帝稱善廣學廬盧鴻至山中廣學廬聚徒至五百人業患不能精無患有司之不明行患不能成無患有司之不公韓愈進學解同學三白有朋自遠方來不亦樂乎儒有合志同方營道同術並立則樂相下不厭孫臏與龐涓俱學兵法事魏惠王為將軍龐涓以能不及臏以法斷兩足臏之齊後伐魏殺涓史記蘇秦張儀俱事鬼谷先生同硯席書漢宣帝與張彭祖云云收斂後漢戴封同學石敬之卒封收斂送喪到其家其家見平生書物皆在棺中大異之吊同門生王丹有同門生遭喪子請吊丹撻之令遺縑而已割席魏管寧與華歆同學聞門外車馬聲歆出觀之寧割席曰子非我友獨學無友則孤陋而寡聞遜友視志敬業樂群索居離群莊子妸荷甘與神農俱學於老龍吉神農隱几闔戶晝瞑妸荷甘日中奓戶而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰知子僻陋漫誕故棄子也孔同學相愛許紹父法光為刺史元皇帝為安州撫管紹時為兒與高祖同學相愛也講德討儒君昔與余講德討儒時中之奧希聖為徒呂衡州誄柳文遭時致力必濟謨庸文粹司空圖三賢贊隋大業間房公李公魏公同師文中子嘗謂其徒曰玄齡也志而密靖也惠而斷徵也直而遂俾其遭時致力懷濟謨庸贊曰三賢志同夙尚儒風以植公忠出遇太宗白我師三人同行必得我師吾師子産曰是吾師主善子曰德無常師主善為師吾道鄭玄字康成初事馬融學解歸北海融曰鄭生今去吾道東矣教學相長親師安其業而親其師人師然後可為人師擇師不可不慎肄業習也無犯顏而諫無隱隱過失也就養無方洙泗之間西河之上曾子謂子夏曰吾與汝事夫子於洙泗之間退而老於西河之上使民疑也青襟胄子絳紗宋宣文君立講堂生徒隔絳紗縵受業不見面董仲舒下帷讀書弟子以相次受或不見其面也五經笥邊孝先答弟子嘲曰腹便便五經笥請益無倦胄筵講肆絶帳發矇童蒙求我周禮太宰以九兩繫國民三曰師以賢得民能自得師者王自行朿修以上吾未嘗無誨焉從吾所好既多知十之賢博我以文必重在三之義杏壇講論槐市請師門人門生弟子當仁不讓於師教然後知困師貴自彊道宜馴致苟誨而不倦則教所由興示以一隅教其四失始發蒙以求我終論道而起豫拳拳伏膺聖人無常師師無當於五服弗得不親禮接待張禹字子文弟子彭宣恭儉有法度戴崇愷悌多智禹受業愛崇而敬宣崇候禹將入後堂燕飲昏夜極樂宣之來便坐講論經義日晏賜食不過一肉卮酒兩人皆自得也救師魏揚政從范叔受易叔為山妻告繫獄政以箭貫耳抱叔子伏道側訟叔帝感曰乞賜揚生師也質疑具勤學門少學徒董遇善左傳更為作宋墨別墨有從學遇不肯教謂之曰必當先讀百遍而義自見於是生徒少從遇學無為朱墨也不求資邴原年十一喪父家貧鄰有書舍原過之必泣其師問之曰何泣原曰孤者易傷貧者易感夫學者必有父兄羡其不孤而得學師感之曰欲學何書原曰無錢資師曰苟有志徒相教不求資遂從學也不往教孫寶字子嚴御史大夫張忠欲令授子經乃為除舍寶遂去忠遂署為主簿以屈之寶曰君男欲學而移寶自近禮有來學無往教道不可屈屈身何傷且不遇者無所不為況主簿乎忠聞之大慚遂薦寶又包咸字子良太守黃讜署戶曹欲召咸入授其子咸曰學無往教讜遂遣子就師公超市張楷字公超隱居學道者從之所在成市今華陰山南有公超市擬十哲晉文立字廣休事譙周周門人以立為顏回陳受字季虔為子夏羅憲為子貢連坐樂恢字伯奇事焦永為河東守隨之官閉廬讀誦不交人物後永被考諸弟子以關通被系恢獨皎然不幹法也追訟罪鄭弘字巨君師焦貺楚王英反引貺貺被收疾病於道亡歿妻子禁制獄諸生懼連乃皆變姓名逃罪弘獨髡頭負鈇鑕訟貺罪顯宗赦其家弘躬送貺喪及妻子還鄉里舉群盜漢叔孫通無所言皆進故群盜弟子或竊言曰數歲事先生今不能進專言大滑何也通曰漢王方蒙矢石諸生寧能鬥平乃薦之自表連罪李膺以黨錮死獄中門生故吏並被禁侍御史景毅子峴為膺門徒而未有牒録故不及譴毅曰謂膺賢遣子師之遂自表以免歸請罪人晉嵇康將刑東市學生三千人上書請為師帝不許不薦弟子孔光為三公弟子多就見師居位幾得其助光終無所薦舉至有怨者其公如此又後漢魯恭仲康在公位選群高弟至郡守者數十人而其耆舊大生或不蒙薦舉有怨者恭聞之曰學之不講是吾憂也諸生不有鄉薦老終無言也免門生役王褒字偉元門人為縣役褒不囑縣令乃步擔乾飯立路旁磬折云云門生為役故來送令即放之孔以師自居王圭兼魏王泰師王見之為先拜圭亦以師自居起學廬講授袁滋彊學博記少依道州刺史元結讀書自解其義結重之後客荊郢間起學廬講授文章老李嶠為文章老宿一時學者取法焉柳宗元徙柳州刺史南方為進士者千數千里從宗元游經指授者為文辭皆有法來學者跡接于道陽城遠近慕其行來學者跡接于道不拒曲士出為道州刺史太學諸生二百人請留城柳宗元聞之遺何蕃等書曰俞扁之門不拒病夫繩墨之側不拒散財師儒之席不拒曲士翼贊一人張後胤高祖鎮太原引為客以經授秦王太宗即位賜燕月池帝從容曰今日弟子何如胤曰昔孔子門人三千達者無子男之位臣翼贊一人乃王天下計臣之功過於先聖帝為之笑講授諸生李善坐與賀蘭敏之善流姚州遇赦還居汴鄭間講授諸生四遠至傳其業號文選學矮國願得為師蕭穎士矮國遣使入朝自陳國人願得蕭夫子為師者中收舍人張漸等諫不可而上表宿儒河南褚沖吳何員等起拜學官為之師身執經問義遠邇趍慕至徒數百人李栖筠傳受業解惑古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣韓昌黎文師說聖人無常師孔子師萇洪師襄老聃郯子之徒其賢不及孔子故弟子不必不如師通其業成就其道德古之學者必有師所以通其業成就其道德由漢自來師道日微取揆宏襟詢謀達識韓休蘇頓集序拘戈考篆魯鼎看銘書有亡篋文稱墜簡疑絳老之年走朝有門卜晉侯之疾訪史莫知莫不取揆宏襟詢謀達識使自直之箭則百代無一矢俟自圓之木則千載無一輪執矯揉之器有視之灌藂無非良材耳夢得文今之世為人師者衆笑之舉世不師故道益離吾欲從師可從者誰舉世笑之柳宗元師友針病不喜鬧豈可使呶呶者早暮咈吾耳騷吾心則固僵仆煩憒愈不可過矣柳宗元答韋中立書取其實而去其名無招越蜀吠怪同上由魏晉以下人益不事師今之世不聞有師有輒譁笑以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顏而為師世果群怪聚罵指目牽引而憎與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東屈子賦曰邑犬群吠吠所怪也僕往聞庸蜀之南常雨少日日出則犬吠子以為過言僕來南冬幸大雪踰嶺被南越中數州之犬皆蒼黃吠噬狂走者纍日今韓愈既自以為蜀之日吾子又欲使吾為越之雪不亦病乎誰敢衍怪於群目以召鬧取怒乎同上答韋中立書獨缺為人師平居望外遭齒舌不少獨缺為人師耳同上巫醫樂師百工之人不恥相師韓文師說巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則群聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官大則近諛嗚呼師道之不復可知矣言道講古窮文窮文辭以為師柳宗元答嚴厚輿書馬融鄭玄者二子獨章句師耳今世固不少章句師僕幸非其人吾子欲之其有樂而望吾子者矣言道講古窮文辭以為師則固吾屬事僕才能勇敢不如韓退之故又不為人師人之所見有同異吾子無以韓責我若曰僕相千百人又非也僕之所拒拒為師弟子名而不敢當其禮者也若言道講古窮文辭有來問我者吾豈常瞋目閉口邪三年國子師腸肚集藜莧韓愈詩學生謁師贄用腶修一朿酒一壺衫布一裁色如師所服師出中門延入與坐割修埐酒三爵止乃發篋出經摳衣前請師為說經大略然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬省月試時考歲貢唐歸崇敬傳白敬業敬道嚴師敬學無北面太學之禮雖詔於天子無北面所以尊師也請業則起請益則起漢尊桓榮而設几後漢明帝尊桓榮以師禮上幸太常府令榮坐東面設几燕敬鄒子而築宮史鄒衍如燕昭王擁彗請列弟子而受業築碣石宮而親事之禮聞來學不聞往教王者化人義存敬學生徒肄業禮必尊師苟匪師嚴則為儒戲經國化人學實為本嚴師敬業教所由興摳衣函丈于定國為廷尉迎師受春秋身執經北面備弟子禮孔著九經師授譜韋表微以學者薄師道不如聲樂賤工能尊其師著九經師授譜詆其違超僕以宗師之位柳宗元答蕭纂求書貺以高文開其知思又超僕以宗師之位貸僕以丘山之號尊尚師儒韋嗣立上書擾楚廢弛尊嚴而威柳宗元陽城碣雖自君恩亦因儒訓前試宣州溧水縣尉胡震博通六經華皓一志家在海郡筋力未衰臣童幼之時胡震受業豈謂年逾四紀位列三公雖自君恩亦因儒訓伏以元和二年前揚州士曹參軍薛玄造緣與臣亡父先授經具表論薦憲示授越州諸暨縣令臣幸因家門書事輒敢薦聞伏希聖慈特授浙東管內官冀臣報其舊恩獲繼先志既顯華門之士實為儒者之榮奉宣卿官至將相不忘本師朕深所嘉嘆宜依所奏贊皇一品制集順宗重師傅見輒先拜唐本紀兼魏王師王見之為先拜圭亦以師自居王圭唐史豈不能正平公之坐敬養亥唐屈文侯之膝恭師子夏文粹杜之松答王績書道既知尊榮何足恃同上官守有限就學無因延頸下風我勞何極誠恐燉煌孝廉檢對書而不出酒泉太守列鐘鼓而不迷同上白存心時觀而不語存其心也使之悱悱憤憤然後啓發救失學者有四失教者必知之人之學也或失則多或失則易或失則止此者心之莫同也知其心然後能救其失也善教者使人繼其志善學者師逸而功倍善待問者如撞鐘叩之以大者大鳴叩之小者小鳴溫故而知新可以為師矣循循善誘夫子循循然善誘人憤啓悱發一隅子曰舉一隅不以三隅反則不復也教誨不倦日長傳習教授討論日就月將傳先儒之訓為後學之宗善道欲罷不能夫子循循善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾人能弘道師貴受方教所由興學而不厭師能善道人欲發朦喻所由誠由用也長善善誘人孔易道難為性教貴受方師過而商不及俱未得中求退而由兼人各宜救失能博喻然後能為師自彊不息克勤無怠激勸犯法者後漢郭林宗左原為郡學生犯法見斥林宗遇於路乃設酒肴以慰之人譏林宗不絶惡人林宗曰人而不仁疾之已甚亂也原後結客報諸生值林宗在學愧負前言遂罷去人乃服其知識孔魏王師王圭兼魏王師王曰願聞所習圭曰漢東平王蒼稱為善最樂願王志之帝聞喜曰兒可以無過矣講教生徒張鎰為濠州刺史政條清簡延經術士講教生徒比去州升明經乾四十人獲趨門館荷深仁于哲匠文粹劉太真上楊相公啓又念頃日曾霑引問擊蒙而嘗失所對獲趨門館荷深仁于哲匠被君子之善誘雖其頑魯或有庶幾之道焉劉贊父玭為縣令贊始就學衣以青布襂襦每食則玭自食肉而別以蔬食食贊於床下謂之曰肉食君之祿也爾欲之則勤學問以干祿吾肉非爾之食也由是贊益力學舉進士五代史叔達亡國之餘幸賴前烈有隋之末濫尸貴郡因霑善誘頗識大方文粹陳叔達書建中貞元時文思崛興遂大振耀會故相常袞來為福建觀察使有文章高名又性頗嗜誘進微生推拔寒素中唯恐不及至之日比君為芝英每有一作屢加賞進游娛燕饗必召同席君之聲漸騰于江淮且達京師矣歐陽詹集序白教然後知困占畢占視也畢簡也謂多其問難隱學疾師教之不誠使人不由其誠教人不盡其材由用也材道也以我為隱乎吾無隱乎爾施悖求佛言教者亦言非則學者失問教之所由廢師勤而功半不善問者云逆師廢學不間於教訓傳化而成俗孝則為先師或非人教所由廢記問之學不足以為人師嘲詠邊韶事見廢墯門相非夏侯勝從兄子建師事勝勝非之曰建所為章句小儒破碎大道建亦非勝為學疏略難以應敵孔無所從學唐韓愈潮州請置鄉校牒刺史縣令不躬為之師里閭後生無所從學爾倚席唐文粹博士有倚席之譏請崇國學疏李絳居其位者不愧其道足下出文閫為諸生之著龜作後來之綿蕝得不思其居其位者不愧其道處于職者不墮其業乎否則市大易負乘之譏招詩人伐檀之刺矣移成均博士書皮日休日戒其屬月勵其徒鳴呼西域氏之教其徒日以講習決釋其法為事吾之視太學又足為西域氏之羞矣奚不日戒其屬月勵其徒年持六籍日決百氏俾諸生於聖典也洞知大曉同上白撲作教刑檟楚二物收威也二者荊類撲建也收者斂也禮記孔檟楚之政柳宗元四門記四門學之制助教之職佐博士以掌檟楚之政分其人而教育之不率教者檟楚之歸崇敬抵生徒及第多少為博士考課上下有不率教者檟楚之督以鞭楚陽嶠為國子祭酒生徒游墯者至督以鞭楚人怨之乘夜歐嶠劉知幾年十二父藏器為授古文尚書業不進父怒楚督之唐史廢業怠教者置之以刑自然儒雅日興典墳日重先生之道日盛太學之訓日崇李絳請崇國學疏死喪九白事師左右就養無方方常也服勤至死心喪三年哭寢師吾哭諸寢無服孔子喪門人疑所服子貢曰昔者夫子之喪顏問若喪子而無服喪子路亦然請喪夫子若喪父而無服禮猶父也回也視豫猶父也豫不得視猶子也孔子之喪二三子皆絰而出天喪豫顏淵死子曰天喪豫哭於廟門哭師云云負土成墳後漢桓榮字春卿事九江朱普普卒榮乃奔喪負土成墳素服夏侯勝授太后尚書及卒太后素服以報師傅之恩子路死夫子哭之於中庭既哭進使者而問故使者曰醢之矣服斬郭禹師郭荷荷卒曰五服之師者重服聖人嫌也遂服斬居廬群臣則經出則否廬冢六年史孔子喪弟子三年喪畢唯子貢廬墓六年而去思慕孔子卒弟子思慕以有若似孔子相與立為師以事如孔子議服晉禮志曰古無師制新禮齊衰三年摯虞議宜依舊無服詔從之其萎梁木其壞哲人其萎吾將安放夢奠子曰豫疇昔之夜夢坐奠於兩楹之間子哭之慟吊服加麻棄宮行服魏王朗師楊賜賜卒云云孔子廟藏孔子衣冠琴書至漢二百餘年不絶孔門人行喪王義方既死門人員半千何彥先行喪蒔松柏墓則三年乃去弟子共葬之啖助傳施士丐吳人兼善左氏春秋以二經教授由四門助教為博士秩滿當去諸生封疏乞留凡十九年卒于官弟子共葬之葬之日自遠至者幾千人江夢孫集門生弟子說釋經義卒時年八十五葬之日自遠方至者幾千人而服縗絰時跣者百許江南野史白來學鼓篋負笈摳衣虛往實來莊子行不言之教善問者如攻堅木先其易者後其節目不善者反此蟻術蟻子時術之言蟻蟲時術其功乃大學步莊子壽陵餘子學步邯鄲失其故步匍匐而歸青出於藍而青於藍冰生於水而寒於水百遍有從董遇學者曰必先讀百遍其義自見犯夜乘御飛龍晉王承為東海吏録一犯夜人來云從師不覺日暮承曰鞭撻寧越以立威名恐非正化之本遣吏送歸家告往知來賜也始可與言詩已矣絶問後漢趙偉字君長恥於廝役遂棄車馬詣資中杜撫授書二十年絶問家為發喪制服撫後乃歸遁去范丹字史雲為小吏恥之乃遁去受學於樊英又就馬融學也東家丘鄭邴原字根矩欲遊學詣孫嵩嵩曰君鄉里鄭君學覽古今博聞多識而君捨之履千里所謂鄭為東家丘也原曰人各有志或登山採玉或入海求珠豈可謂登山者不知海之深也先生謂僕以鄭為東家丘亦以仆為西家愚人嵩辭謝之稱官求學應劭造鄭玄曰故太守應仲遠北面稱弟子何如玄嘆曰仲尼之門考以四科回賜之徒不稱官閥劭大慚孔從外家學蔣乂幼從外家學得其書博覽強記逮冠該綜群籍翱籍相上下近李翱從僕學文頗有所得然其人家貧多事未能卒其業有張籍者年長於翱而亦學於僕其文與翱相上下一二年業之庶幾至乎至也韓愈與馮宿書無限其門文粹林簡言上韓吏部書人有儒其業與孟軻同代而生不遂師於軻不得聞乎道閣下豈不謂之惜乎去夫子有餘載孟軻楊雄死今得聖人之旨能傳說聖人之道閣下耳今人晞閣下之門孟軻楊雄之門也閣下無限其道為異代惜焉問文章為事韓愈答竇存亮書今乃乘不測之舟入無人之地以相從問文章為事身勤而事左辭重而請約非許之得也詩十一白詩序曰正得失動天地感鬼神者莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗六義一曰風二曰賦三曰比四曰興五曰雅六曰頌四始刪詩為三百篇溫柔敦厚詩教也溫柔敦厚而不愚則深於詩也不學詩無以言鯉退而學詩牆面而立子謂伯魚曰人而不為周南召南其猶正牆面而立小子何莫學夫詩詩可以觀可以興可以群可以怨多識於鳥獸草木之名雅言詩書執禮皆雅言也義府詩書義之府思無邪詩三百一言以蔽之曰思無邪起豫者商也始可與言詩已矣王漢竭而詩不作文選成康沒而頌聲寢云云夫子自衛反魯然後樂正雅頌各得其所興於詩修身當先學詩也小雅盡廢則四夷交侵中國微矣刪以煩文孔子詳其大義毛萇若過庭之子不學風雅之言則入國之人焉知敦厚之教子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為民風命太史陳詩以觀民風陳詩謂採詩以觀之唐虞之代教在修文殷周之時學難廢業採周之舊反魯而刪冬夏教以詩書書屬禮禮陰也故以屬冬詩屬樂樂陽也故以屬夏春誦月將夏弦以絲播樂章義則有六詩有六義學而肄三肄習也三謂小雅三章鹿鳴四牡皇皇者華不學博依不能安詩博依廣博興喻也分為四藝文志仲尼沒而微言絶七十弟子喪而大義乖故詩分為四注云謂毛齊韓魯也習奉曰詩有五際君臣父子兄弟夫婦朋友又詩內傳曰卯酉午戍亥解頤匡說詩解人頤牆面見上孔馬周嗜學善詩誦鹿鳴蟋蟀山惲中宗昵宴近臣詔遍為技山惲奏無所習惟知金城公主誦詩乃誦鹿鳴蟋蟀二篇未畢中書令李嶠以其近規諷止之帝嘉其直下詔賜服一稱獻詩纂義許叔牙於詩禮尤邃獻詩纂義十篇詩正而葩韓愈進學解曰詩正而葩詩有魯達徐曠傳時許善心薦曠及魯逵為學官時稱詩有魯連皆一時冠詩以紀興衰誦歎六典白義府趙衰曰郤縠敦詩書詩書義之府也雅言見上孔子曰入其國其教可知也其為人也疏通知遠而不誣則深於書者也禮上古之書謂之尚書虞夏商周之書典謨訓誥誓命之文雅誥奧義百篇之義歷代寶之以為大訓上世帝王遺書足以垂世立教藏於屋壁魯恭王時嘗欲以孔子宅為宮得古文虞夏商周之書伏生傳授漢濟南伏生年過九十失其本經口以傳授孔子訓傳孔安國作傳其序曰研精覃思博考經籍反魯之刪仲尼自衛反魯書暴秦之剷秦剷古文藏之書府治以學官文之將喪焚棄於秦坑道之既行啓發於魯壁羲軒之化必在修文虞夏之書所宜立學皋陶之謨周公之誥蜀志或怪諸葛這文彩不艷而過丁寧周至時議以皋陶大賢周公聖人考之尚書皋陶之謨略而雅周公之誥顃而悉則皋陶與舜禹談周公與群臣誓故也亮所與言盡衆人凡士故其文旨不得遂志也古文後漢杜林字伯山於西州得陳書古文尚書一卷常愛之衛宏徐巡皆受林學士古文示人日林離流兵亂常恐此經將絶何意衛子徐生復能傳之是斯道竟不墜地古文雖不合時務然禮失求之於野古文不猶愈於野乎願生無悔所學古文遂傳於世孔王審邽通書讀陽誓高定七歲讀尚書至湯誓跪問郢曰奈何以臣伐君郢曰應天順人何云伐耶對曰用命賞于祖不用命戮于社是順人乎郢異之世重其早慧本之書以求其質柳宗元答韋中立書本之書以求其質此吾所以取道之原也改頗為陂唐玄宗詔典謨既作雖曰不刊文字或訛豈必相襲朕聽政之暇乙夜觀書匪徒說於微言實欲暢於精理每讀尚書洪範至無偏無頗遵王之誼三復斯文並皆協韻唯頗一字實則不倫又周易泰卦中無平不陂釋文陂字亦有賴音陂之與頗訓詁無別為陂則文亦會意為頗則聲不成文應由煨燼之餘簡編墜缺傳授之餘差舛相仍原始要終須有刊革朕雖先覺兼訪諸儒僉以為然終非獨斷宜改頗字為陂仍宣示國學糾謬王元感撰書糾謬詆先儒同異白畫八卦古者伏羲氏始晝八卦九聖之微言自伏羲至孔子八索八卦之說謂之八卦求其義也又仲尼贊易道以黜八索潔靜精微易教也易之失賊知周公之德傳曰韓宣子觀書太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也易象與周公所作彖辭也故云乃知周公之德六爻之變三絶之勤孔子讀易韋編三絶斷志子曰昔聖人之作易也建陰陽天地之情位以為易雖有明智之心進必斷其志焉孔子曰加我數年五十而學易知命之年乃讀至命之書窮理盡性以至於命鉤深索隱通幽洞玄玄奧之言精微之義易與天地准下學上達上天知命頤天地之奧知鬼神之情讚以微言仲尼詳其大義輔嗣以斷天下之疑知性命之理彰往考來設卦明象觀爻立辭撮造化之樞達剛柔之變羲文之易文選孔七十六家藝文志易類七十六家六百六十五卷縣解尹知章覃思經術於易允縣解他書罕讀王績字無功以周易老莊置床頭他書罕讀也著大易張志知著大易十五篇其卦三百六十有五為一時冠易有陸德明為一時冠膚末於學柳宗元與劉禹錫書見與董生論周易九六義取老而變以為畢中和承一行僧得此說異孔穎達疏而以為新奇彼畢子董子何膚末於學而遽云云白魯史春秋者魯史記之名晉乘晉謂之乘撥亂反正莫近於春秋獲麟之史春秋感麟而作故絶筆於獲麟之一句記事繫年記事者以事繫日以日繫月以月係時以時係年所以紀遠別同異也屬辭比事春秋教也不刊之書以一字為褒貶春秋之稱微而顯志而晦宛而成章盡而不汙懲惡而勸善非聖人孰能修之筆削史記仲尼筆削春秋遊夏之徒不能措一辭知丘子曰後世知丘者以春秋罪丘者亦以春秋立一王之法周禮盡在見易門注善志志記也春秋善記事也經國之典帝王之準式經者夫子之文章傅者丘明之善志子夏不能措辭見上元凱猶其成癖杜預有春秋之癖藏之書府講以學官仲尼明周公之志傳序曰蓋周公之志仲尼從而明之丘明授夫子之經序曰左丘明授經於仲尼周禮小史掌邦國之志即序所謂諸侯各有國史分為五漢藝文志云仲尼沒而微言絶七十子喪而大義乖故春秋分為五注謂左氏公羊榖梁鄒氏郟氏三傳異同後漢何休著公羊墨守左氏膏盲榖梁廢疾鄭玄乃發墨守針膏盲起廢疾休見歎曰康成入吾室操吾戈矛以伐我春秋調人晉劉延以春秋一經而三家殊塗諸儒是非反為讎敵乃思一家之異合而通之以周禮有和怨調人之官遂作春秋調人七萬餘言論其首尾使大義無相乖有不可合者攀長短以通名也立博士劉歆字子駿上疏請立左氏博士下議范叔超曰左氏不祖孔子而出丘明師徒相傳又無其文非先帝所道無因得立上疏論陳元上疏陛下知丘明至寶親受孔子而公羊榖梁傳聞於後故立左氏博士詢可否此聖人得人之謙示不專己盡之群下也論者沉溺所習玩守舊聞左氏孤學少與遂為墨家所排之公羊爭長嚴翰公仲善公羊鍾繇好左氏為太官廚謂公羊為賣餅人家數與翰會辨析長短由機捷翰訥口時屈無以應繇曰公羊高竟服丘明翰曰直故吏為丘明公服耳公羊未肯也孔實辭孔子作春秋以一王法記言事以為褒貶盡聞見以為實辭舉凡例以為異同振滯王元感撰春秋振滯等數十篇魏知古見其書歎曰五經指南也敗績武平一初崔日用自言明左氏春秋諸侯官族它日學士大集日用折平一曰君文章固耐久若言經則敗績矣著通例及天文事序議韓滉善治春秋著通例及天文事序議各一篇袁滋能為春秋嘗以劉惲悲甘陵賦褒善斥惡戾春秋指然其文不可廢乃著後序著三傳總例韋表微尤好春秋病諸儒執一概是非紛然著三傳總例完會經趣外傳劉貺以竹書紀年序諸侯列會皆舉諡後人追修非當時正史如齊人殲于遂鄭棄其師皆孔子新意師春一篇録卜筮事與左氏合知按春秋經傳而為也因著外傳于休烈吐蕃金城公主請文藉玄宗詔祕書寫賜休烈上疏曰若陛下慮其失情示不得已請去春秋當周德既衰諸侯盛強征伐競興情僞於是乎生變詐於是乎起有以臣召君取威定霸之事誠與國之患也樊澤著春秋傳彭玕通左氏春秋王審邽通春秋朱子奢貞觀初高麗百濟同伐新羅連年病兵不解帝假子奢侍郎持節諭旨至其國為發春秋題納其美女帝責違旨而猶愛其才集傳啖助善為春秋考三家短長縫綻漏闕號集傳凡十年乃成復攝其綱條為例統可讀施士丐撰春秋傳未甚傳後文宗喜經術李石因言士丐春秋可讀凡史氏褒貶大法春秋已備之矣孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死韓文論史書非聖人之作春秋周室卑而諸侯僣矣文粹常仲孺文宣王廟記著後梁春秋蔡允恭記諸侯戰爭之事五代敬翔太祖問曰聞子讀春秋春秋所記何等事翔曰記諸侯戰爭之事耳太祖曰其用兵之法可以為吾用乎翔曰兵者應變出奇以取勝春秋古法不可用於今太祖大喜三代聖王死其道盡留於春秋文粹劉軻與馬植書自洙泗渡于淮達于江浮滄濱抵羅浮始得師于壽春楊生楊生以傳書為道者也始則三代聖王死其道盡留於春秋紀事文粹陸龜蒙春秋者紀事之史憑私臆決啖助托訥三家不本所承自用名學尊之曰孔王意徒令後生穿鑿詭辨詬前人捨成說自為紛紛左氏有文遠徐曠字文遠幽厲雖衰雅未為風逮平王之東人習餘化啖助幽厲雖衰雅未為風逮平王之東人習餘化苟有善惡當以周法正之故斷自平生之季以隱公為始所以拯薄勉善救周之弊革禮之失白五車莊子曰惠施其書五車群書班游受詔進讀群書閲市王充貧無書游洛陽市閲所賣書一見必誦遂通百家文史溢几篋張華字茂先雅愛書籍射死日無餘財唯文史溢几篋嘗徙居載書三十車祕書監虞志撰定書皆資華本取定書籍十五孔以墜鬻為不孝戒子孫杜兼家聚書至萬卷署其末以墜鬻為不孝戒子孫數車李襲譽以餘資寫書罷楊州書遂數車載好書侯君集本以行伍奮下知學後貴益自喜好書校集祕書魏證奏引諸儒校集祕書國家圖籍粲然完整聚書至二萬卷蘇辨聚書至二萬卷手自言定當時稱與祕府埒本傳不減祕府王方慶家聚書多不減祕府令狐德棻贊曰典章圖史有國者尤急所以考存亡成敗陳諸前而為之戒方天下初定德棻首發其義而後唐之文物粲然誠知治之本歟求天下遺書令狐德棻大亂後經籍亡散祕書湮缺德棻始請帝重購求天下遺書置吏補録不數年圖典略備手寫書百卷李大亮在越州手寫書數百卷及去留都督署吐蕃請文籍四種于休烈吐蕃金城公主請文集四種玄宗詔祕書寫賜休烈上疏吐蕃之性慓悍果決善學不回若達於書則知戰深於詩則知武夫有師干之試深於禮則知月令有廢典之兵深於春秋則知用師詭詐之計深於文則知往來書檄之制此何異假寇兵資盜糧也一書進官一資於時經大盜後史籍燔缺休烈奏請下御史核史館所由購府縣有得者許上送官一書進官一資一篇絹十匹凡數月止獲一二篇讎定群書王圭父顗隋開皇十三年召入祕書內省讎定群書自寫筆不釋手張文琮自寫筆不釋手子弟諫止曰吾好此不為倦侔祕府張弘靖家聚書侔祕府以古文字參定同異韓王元嘉藏書至萬卷皆以古文字參定同異文句詳正宗室沖撰時籍沒者衆惟沖撰家書為多皆文句詳正祕府所不及開陳經書王義方為吉安丞吉安介蠻夷梗悍不馴義方召首領稍選生徒為開陳經書左右圖史楊綰獨處一室左右圖史賜書柳宗元貽京光尹許孟容書曰家有賜書三千卷尚在善和里舊宅宅今三易王書存亡不可知熟誦乃録陸龜蒙得書熟誦乃録讎比勤勤朱黃不去手所藏雖少其精皆可傳四庫完治褚無量初內府舊書自高宗時藏宮中甲乙叢倒無量建請繕録補第以廣祕籍天子詔於東都乾元殿東廟部匯整比無量為之使因表盧僎陸去泰王擇從徐楚壁分部讎定衛尉設次光祿給食又詔祕書省司經局昭文崇文二館更相檢讎采天下遺書以益闕文不數年四庫完治帝詔群臣觀書賜無量等帛追紬故書鄭虔為博士初虔追紬故書可志者得四十餘篇括遺書蕭穎士奉使括遺書趙衛間淹久不報為有司劾免藏家書於箕潁間安祿山反潁士因藏家書於箕潁間身走山南唐元宗置集賢院部分典籍乾文殿博覽群書至六萬卷經籍大備又稱開元焉炱朽蟫斷籤秩紛舛馬懷素有詔句校祕書是時文籍盈漫皆炱朽蟫斷籤秩紛舛懷素建白願下紫微黃門召宿學巨儒就校繆缺又言自齊以前舊籍王儉七志已詳請采近書篇目及前志遺者續儉志以藏祕府詔可聚書為樂翟光鄴日與賓客飲酒聚書為樂奇篇祕籍段成式多奇篇祕籍取民藏書獻董昌僖宗始還京師昌取越民裴氏藏書獻之補祕書之亡家藏書至萬五千卷蔣乂起文思展前蜀王建起文思殿以清資五品正員官購群書以實之縹帙李白詩林軸麗麗來鵠讀鬼谷子其天下之書則牆褰整林軸麗麗斯可謂教導之備者也年代浸遠謬誤滋多文粹李陽冰論古篆書孔壁遺文汲冢舊簡年代浸遠謬誤滋多黃墨精謹韋述蓄書二萬卷皆手校定黃墨精謹內祕書不逮也鄴侯家多書插架三萬軸一一懸牙籤新若手未觸韓愈送諸葛詩數車韋述元行沖為時儒宗常載書數車自隨家有書至萬卷世號李書樓李蹊藏書之盛莫盛於開元其著録者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷嗚呼可謂盛矣軸帶籤帙兩都聚書四部以甲乙丙丁為次列經史子集四庫其本有正有副軸帶籤帙皆異色以別之四部書景龍文館記薛稷知集庫馬懷素知經庫沈佺期知史庫武平一知子庫通謂之四部書乙夜觀書唐文皇帝每視朝後即閲群書當謂左右曰若不甲夜觀事乙夜觀書何以為人君也洋洋滿車好古書百家言洋洋滿車行則與俱止則相對積為義府溢為高文柳子愛古書樂而成之吾嘗病其畔散不屬欲采此義幸吾弟宗直愛古書樂而成之搜討礫裂捃托融結離而同之與類推移不易時月而咸得從其條貫森然炳然若聞群玉之府指撝聯纍圭璋琮璜之狀各有列位不失其序柳宗元文字魯恭留杜甫詩家有書萬卷所藏必三本柳仲郢家有書萬卷所藏必三本上者貯庫其副常所閲下者幼學焉隋平之後經籍漸備大唐平王世充收具圖書沂河西上多有漂沒有者猶八萬自是圖藉在祕書弘文館集仙所寫皆御本也書有四部一曰甲為經二曰乙為史三曰丙為子四曰丁為集故分為四庫每庫二人知寫書出納名目以序以備檢討焉四庫之書兩京各一本共一十二萬五千九百六十卷皆以益州麻紙寫其經庫書緑鈿白牙軸黃帶紅牙籤史庫書鈿青牙軸縹帶緑牙籤子庫書雕紫檀軸紫帶碧牙籤集庫書緑牙軸朱帶白牙籤以分別六典藏書聞禹穴杜甫秦州雜詩黃卷真如律同上呈嚴鄭公白桓生欲借班嗣書班游受詔進讀群書上器其能賜以祕書之副游生稚稚生彪彪與從兄嗣共遊學家有賜書桓生借其書嗣報曰吾子巳貰仁義之羈糾何不用大道昔有學步邯鄆失其故步匍匐而歸恐似此故不進之嗣貴老莊故云云桓生談也好寫留本漢河間獻王從民約借善書必為好寫之留其真本加金帛賜以招之由是四方不遠千里或有先祖舊書必奉以獻之從帝借書晉皇甫謐從晉武借書帝載一車而賜之不借蜀志許慈與胡替為博士更相克伐分爭書籍有無皆不相通借也借書十六孔篇帙壞舛必為輯褫陸龜蒙借人書篇帙壞舛必為輯褫刊正假異書五代四夷録元欲知書自契丹歸中國載書數千卷樞密使趙延壽每假其異書醫經皆中國所無者束修投羊唐餘録倪若水藏書甚多列架不足疊窗安置不見天日子弟直日看書借書者先束修投羊借人編簡壞者緝之文字繆誤者刊之笠澤叢書借御書讀唐舊史李敬玄高宗在東宮馬周啓薦之召入崇賢館兼預侍讀仍借御書讀之
