body:
  text: 卷第六十四白股肱傳曰君之卿佐是為股肱股肱或虧何疾如之疾痛也社稷之臣衛柳莊疾公曰若疾亟雖當祭必告也公請於尸曰有臣柳莊者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以燧之捐館舍天不憖遺一老孔子卒哀公誄之云云傳彼蒼者天殲我良人如可贖兮人百其身詩梁木其壞天子廢朝國人罷市古之遺愛傳子産卒鄭人皆哭仲尼聞之出涕曰云云舂不相杵史記秦喪五羖大夫男女流涕童不歌謠舂不相杵人之云亡邦國殄瘁詩無祿早世不獲久享君德傳賢臣一孔奄忽不還邦人痛嗟蘇頲卒帝猶視朝起居舍人韋述上疏曰貞觀永徽時大臣薨輒置朝舉哀成終始恩上有旌賢録舊之德下有生榮死哀之美昔晉知悼子卒平公宴樂杜簣一言而悟春秋載之故禮部尚書頲纍葉輔弼奉事軒陛二十餘年今奄忽不還邦人痛嗟惟帷蓋之舊股肱之戚宜節廢朝明君臣之誼帝曰固朕意也即日帳次哭洛城南門不朝聞夜嚴命罷岑文本卒是夕帝聞夜嚴曰文本死所不忍聞命罷之聖上軫不憖之悲具寮興云亡之歎韓昌黎祭辟中丞文褒大節恤賢臣陳京德宗在奉天聞段秀實為賊所害七日不朝宰相以為方多難時不宜壅萬機天下其謂何京曰丞相之言非也夫褒大節恤賢臣天下所以安況卓卓特異者乎帝曰善悼痛褚無量卒帝聞悼痛詔宰相曰無量朕師今其永逝宜用優典於是贈禮部尚書鼎臣云亡梁木斯壞劉夢得慰王太尉表復二白記復盡愛之道有禱祠之心焉北面求諸幽之義也升屋而號曰皋某復諸侯大夫死於道升車左轂以其綏復有林麓則虞人設階無林麓則狄人設階階所以乘之以升屋狄人樂吏之賤者男子稱名女子稱字婦人復不以袡袡嫁時上服邾婁復之以矢蓋自戰於井陘始也死傷者多無衣以招魂公館復私館不復私館不復謂主人惡之也所為曰公館卿大夫之家曰私館復衣不以衣尸不以斂復本求生用生施死於義相反冕服周禮大喪以冕服復于太祖以乘車建綏復于四郊注云此天子之禮也禮復諸侯以袞衣復者朝服大夫以玄衣世婦以袒衣士爵辨士妻以稅衣皆升自東榮中屋履危北面三號卷衣投于前宋玉招魂序曰帝謂巫咸有人在下我欲輔之魂氣離散汝筮與之孔納禕衣復寢宮彭景直帝崩葬定陵有司議以和思皇后祔葬后為武后所殺不得其喪所將以招魂合諸梓宮景直曰招魂古無傳請如橋山藏衣冠故事納后禕衣復寢宮告以太牢納之方中奉帝梓宮制曰可斬衰三日不食齊衰二日不食大功一日不食小功緦麻再不食復於王寢復者二人以死者之上服左者升之自前東霤當屋履危北面西上左執領右執腰招以左每招長聲呼某復三呼上唐禮志以衣投於前承之以篋六品以下以箱升自阼階入以覆尸注若得魂魄返然後者撤舍西北扉降自後四霤復衣不以襲斂乃設床通典三品以上喪復謂招魂復魄通典注夷盤三白周禮凌人大喪供夷盤造冰焉所以褰尸置於床下記大夫設夷盤造冰焉士併瓦盤無冰傳曰命夫命婦喪浴用冰重四白儀禮士喪禮重木刊鑿之甸人置中庭參分庭之南木懸物長三尺羃用疏布視取銘為重記曰重主道也殷主綴重焉作主以綴其重懸諸廟去顯考乃埋之周主重徹焉周人作主徹重埋之重既虞而埋之就所倚處埋之凶門晉韋弘問曰父在母喪於父大門之內別立凶門便為父子一家有二門蔡謨答曰禮以瓦器盛始死之祭繫木裹之以葦席置庭中近南名為重門是其象禮既虞作主未有主以重當主本為喪設非以表門恐不為尊卑壓降也禮命士已上父子皆異宮今卑私之喪皆別開門亦不知今人如此者皆有凶門否孔鑿木為重禮志鑿木為重二品至于三品長八尺橫者半之三分庭一在南四品至于五品長七尺六品至於九品長六尺凡設重有差唐六典一品懸鬲六品已上四六品已下二重木刊鑿之為懸孔也長八尺橫者半之置於庭三分庭一在南以沐之米為粥實於鬲既實以疏布蓋其口繫以竹干懸於重木覆用葦席北向屈兩端交於後西端在上綴以竹干祝取銘置於重殯堂前楹下夾以葦席簾門以布又設葦障於庭通典銘旌五白儀禮士喪禮為銘各以其物亡則用緇長半幅經末長終幅廣三寸書銘於末曰某氏之柩記曰銘明旌也神明之旌以死者為不可別也故以旌識之周禮小宰置銘丹旐孔丹旐翩然韓愈祭鄭夫人水浮陸走丹旐翩然銘旌低昂又祭李郴州文見銘旌低昂尚遲疑於別袖飛旐翩翩柳宗元文以絳廣充幅主人復位乃為明旌以絳廣充幅一品至于三品長九尺韜杠銘曰某官封之柩置于西階上四品至于五品長八尺六品至于九品長六尺唐禮志丹旌即位柳宗元祭崔太常文殯紖以出斧屋爰封同上祭文置于宇西階上通典設銘大殮訖所司設太常畫日月十有二斿杠九仞斿委地大殮之後分置殿庭之兩階又設銘旌以絳廣充幅長二丈九尺題之立於殿下其三品以上長九尺五品以上八尺六品已下七尺皆書某官司封姓通典銘明旌也以死者為不可別故以其旗識之同上注殯殮六白小殮於牖下大殮於戶內殯於客位所以即遠也殯於五父之衢禮孔子少孤不知其墓殯於五父之衢人之見引之者皆以為葬也其引也蓋殯也注葬引與殯引異子曰喪具君子恥具一日二日而可為者君子不為也虞殯大夫三日而殯諸侯五日而殯斂以時服附於身必誠必信勿之有悔焉耳矣附於身謂衣衾捾槨魯卿大夫卒公不與小斂則不書日不書卒日所以紀恩厚薄季文子卒大夫入斂公在位位阼階西饗禮曰公適其臣升自阼階不敢有其室宰庀家器為葬備無衣帛妾無食粟之馬無藏金玉無重器備尸未設飾故帷堂小斂而徹帷帷殯非古也自敬薑之哭穆伯始也既殯望望如有從而不及禮熬君四種八筐大夫三種六筐士二種四筐加魚臘熬者煎穀也將塗設於棺士喪禮熬黍稯各二筐旁所以惑蚍蜉不至棺也大夫加梁君加稻也君殯用輴櫕于上畢塗屋櫕聚也屋殯上覆也如屋者大夫殯以幬櫕置於西序塗不暨于棺暨及也士殯見衽塗上帷之孔為備棺衾來填死門下客散去掩尸于坎殷亮獨後至哭尸側為備捾衾以葬殮以常服盧承慶臨終誡其子曰死生至理猶朝有暮吾死殮以常服單衣蕭瑀卒遺命殮以單衣三遣使賜內衣服張行成卒以殮三遣使賜內衣服錦衾殮李懷遠卒帝賜錦衾殮殯所顏真卿會其黨周曾康秀林等謀襲李希烈奉真卿為帥事泄曾死乃拘送真卿蔡州真卿度必死乃作遺表墓志祭文指寢西壁下曰此吾殯所也斂祭顏真卿賊破東都遣段子光傳李憕虞奕蔣靖首徇河北真卿乃斬子光藏三首它日結芻續體殮而祭為位哭之經給殯殮盧鈞擢嶺南節度使貞元後流放衣冠有疾若喪則經給醫藥殯殮瘞路左羅道宗蒲州虞鄉人貞觀末上書忤旨徙嶺南有同斥者死荊襄間臨終泣曰人生有死獨委骨異壤邪道琮曰吾若還終不使君留此痤路左既殮而行公之薨也命其子三日殮既殮而行於行之四汴州亂故君子以公為知人韓文董太傳行狀百官以理去職而薨卒者聽殮以本官服無官者介積單衣婦人有官品亦以其服殮通典哭七白哀有哭泣顏淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為申包胥立於泰庭而哭不絶聲七日秦伯乃出師救楚傳三舉舉聲也管子曰鮑叔既獲管仲而哭之三舉哀其將死而得之夷狄異聲而皆哀哭者哀之效也文子曰九夷八狄七戎六蠻哭窮途魏氏春秋阮籍率意獨往不由徑路車迹所窮輒慟哭而反繼之以血蔡威公闔門泣盡而繼之以血哭三日三夜哀國之將亡也孔子過太山側聞婦人哭而哀使子貢問曰子之哭一似重有憂者而曰然吾舅死於虎吾夫又死今吾子又死於虎也旅人先笑後號咷號咷哭也易一哀出涕子哭舊館人之喪遇於一哀而出之涕惡夫涕之無從使子貢脫驂膊之也哭有二道有愛而哭之有畏而哭之哀從中出失聲禮文伯卒朋友諸臣未有出涕者而內人皆行哭失聲哭踊有節序哭以次序而哭之周禮行哭周銜枚氏禁行歌哭禮於國中之道者周禮司巫邦有大災歌哭以請有歌者哭異悲以者動鬼神子於是日哭則不歌哭泣之哀舊館脫驂窮途反轍並見上注非其所而哭曰野哭哀亦至焉禮何其戚也傳秦伯辭晉大夫曰二三子何其戚也畏而哭之常聲曾申問於曾子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有不偯偯委曲也蓋謂無常聲也如斬之痛悲哀在中故哭泣無時也哭泣者有其次次位也囚從中來哀戚罔極禮自外作哭踊有儀交手哭禮親始死交手哭盡哀而止斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者三曲一聲三曲也偯聲從容也死喪有別哭泣從儀思既異於親疏聲亦殊於往反子思哭嫂為位善之也小功不為位而哭者是委巷之禮申祥之哭言思也亦然亦為位也哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所知哭於野張帷禮安得哭之焉得勿哭哭於斯趙文子成寢張老曰歌於斯哭於斯敬薑哭穆伯帷殯傳曰帷堂哭音不衰不盡家語魏司徒敬子死夫子盡而弔之主人不哀夫子哭不退有隙晉王珣與謝安有隙聞安薨謂族弟曰吾欲哭謝公獻之驚曰所望於法護遂哭之甚哀慟法護珣小字穆伯之喪敬薑晝哭文伯之喪敬薑晝夜哭孔子曰知禮子皮死哭者呼滅滅子皮名子臯曰若是野哉子罕哭陽門介夫子家子不見叔孫易幾而哭幾哭會也子家子不欲見叔孫故朝夕哭不同會也法哭誅者欒布哭彭越漢彭越贖欒布為梁大夫使齊未反越夷三族布回奏事畢於越頭下哭之吏捕以聞上怒布曰云云恐人人自危乃釋布為都尉又後漢京兆人脂習與孔融親善每戒融剛直及融被害許下莫敢收者習獨往撫尸曰文舉捨我死吾何用生為曹操大怒收悉將殺之後放出魏文帝以習有欒布義加太中大夫又晉書鍾會辟向雄會死葬之帝責曰王經死爾哭於東市我不問今復云云對曰法立於上教行於下何讎枯骨於中野又傳衛殺寧喜尸諸朝右惡將會宋之盟受命而出衣其尸枕股而哭之泣泣涕如雨泣泣漣漣佇立以泣啜其泣矣涕泗滂沱涕既隕之橫流涕之潺湲楚辭目盡腫朱公閉門而哭目盡腫泫然孔子葬雨甚至門人後曰防墓崩孔子泫然流涕曰吾聞之古不修墓垂涕洟泣玉卞和既刖抱玉而泣泣岐楊朱泣岐以其可東可西可南可北泣竹湘妃泣涕以淚揮竹竹盡斑玉筋甄后面白淚雙垂如玉筋向隅説苑滿堂飲酒有一人獨向隅而泣則滿堂之人皆不樂嗚咽袁安忠直每念王室嗚咽流涕繼以血見哭門沾袍仲尼感麟反袂拭面泣下沾袍情因外作悲自中來悲來填膺淚下承睫泣血鼠思泣血孺子泣者辨人有其母死而孺子泣者孔子曰哀則哀矣而難為繼羔子泣血三年未嘗見齒君子以為難也不見齒笑不大也無洵涕國語文伯之母刑諸婦云云吳起泣西河呂氏春秋吳起泣于西河之外正錯譖之魏武侯武侯使人召之起至岸止車西河泣而下數行荊軻泣燕市史記曰荊軻與高漸離飲於燕市酒酣歌已相對而泣旁若無人泣別蜀宗預聘英孫權泣別贈珠曰孤者矣恐不復相見見珠門孔哭尸側來填死門下客散去商亮獨後至哭尸側帝出次哭張公謹卒官下帝將出次哭之有司奏日在辰不可帝曰君臣猶父子也情感於內安有所避遂哭之哭送李績葬日帝與皇太子幸未央古城哭送望哭以過高士廉喪出橫橋帝登城西北橋望哭以過哀詔宮人節哭竇抗母隋文帝姊安成公主也母卒數號絶詔宮人節哭臨哭為之慟魏徵薨帝臨哭為之慟被髮號哭李綱卒初齊王憲女嫠居綱厚恤之及卒女被髮號哭如喪其親感塞長孫無忌二十三年帝病甚召入臥內帝引手捫無忌頤無忌哭帝感塞不得有所言涕泗冰鬚韋思謙涕泗冰鬚俯伏號絶哭洛城南門蘇頲卒帝即日帳次哭洛城南門哭過其喪郭子儀薨帝御安福門哭過其喪百官陪位流涕哭之盡哀盧邁進中書侍郎從父弟迎喪還洛陽過都邁奏請往哭之盡哀若知禮之過而不知情之至元德秀卒喬潭時為陸渾尉佐其葬族弟結哭之慟或曰子哭過哀禮歟結曰若知禮之過而不知情之至約家人無以哭聞母所李畬妻忽故時母病約家人無以哭聞母所哭泣無節侯知道程俱羅者靈州靈武人親喪廬墳哭泣無節知道七年俱羅三年不止非公為慟而誰慟李乂卒葬日蘇頲畢創馬懷素往祖之哭曰非公為慟而誰慟歟入朝見帝泣鍾紹京貶再遷溫州別駕十五年入朝見帝泣曰陛下忘疇日事耶忍使棄死草莽且同時立功者今骨已朽而獨臣在陛下卜垂愍乎帝惻然即日授太子右諭德泣見上武儒衡議諭頸正有風節目將大用宰相令狐楚忌之會以狄兼謨為拾遺楚自草制引武后革命事盛推仁傑功以指切儒衡且沮止之儒衡泣見上曰臣祖平一當天后時避仕終老不涉於纍帝慰勉之自是薄楚為人掩涕李晟帝至自梁晟以戎服三橋帝駐馬勞之為掩涕望泗哭慟辛讜至洪澤見戍將郭厚本告急望泗哭慟帳下皆流涕云坐使淚盈臉韓文誰令悲生腸坐使淚盈臉違舊主而泣姚崇后遷上陽宮中宗率百官起居王公更相慶崇獨流涕柬之等曰今豈泣涕時邪崇曰事天后久違舊土而泣人臣終節也涕浪浪而常流柳宗元閔生賦云云俯伏流涕溫造殷山哭聲殷山劉季述泫然伓淚杜如晦推心掩泣房玄齡涕下交頤馬璘發聲哀切周鄭客唐衢有文學老而無成善哭發聲哀切聞者泣下常遊大原遇享軍酒酣乃哭滿座不樂主人為罷出唐語林殞涕熏心韓文無所怨議身死而親故無所怨議哭之皆哀韓文鄭君志哭比平王於客舍後十五六年少傅卒哭之又十餘年至今哭少監焉嗚呼吾未耄老自始至今未四十年而哭其祖子孫三世于人世何如也人欲久不死而顧居此世者何也馬少監志走泣哭且張籍會哭貞曜先生卒其配鄭氏以告愈走泣哭且召張籍會哭明日以錢如東都供葬事諸嘗往來者咸來哭群鳥鳴翔程袁師方終每哭群鳥鳴翔白狼黃蛇程袁師母終負土築墳號懼人不復識常有白狼黃蛇馴墓左霑臆人生有情淚霑臆杜甫哭聲直上下雲霄杜甫兵車行牽衣頓足攔道哭哭聲直上干雲霄新鬼煩冤舊鬼哭天陰雨濕聲湫湫同上慟哭松聲回悲泉共幽咽北征涕汪浪以隕軾柳宗元攀歸賦淚如九河翻韓愈雜詩慷慨為悲吒淚如九河翻白哭踴有節禮無容觸地而已劈踴哭泣哀以送之劈踴哀之至也有算為之節文算數也為父母稽顙禮絶地之踴由文禮伯叔母疏哀踴不絶地姑姊妹之大功踴絶於地知此者由文哉跛者不踴踴八孔傳墳踴而哭侯知道居喪卒夜半傳墳踴而哭鳥獸為悲號劈踴荼毒呂才葬篇世之人為葬巫所欺忘劈踴荼毒以期徼幸晝夜哭訴柳宗元壽州安豐縣孝門銘李興扶服頓踴晝夜哭訴悲慕未盡王元感傳張柬之曰練而慨然悲慕未盡而踴劈之情差末如成人權德輿七歲居父喪器踴如成人氣絶寢於地男子曰布衣被髮徒跣婦人女子青縑衣去首飾齊衰以下丈夫素冠主人坐於床東啼踴無數衆主人在其後兄弟之子以下又在其後皆西面南上哭妻坐於床西妾及女子在其後哭踴無數唐禮志哀傷九白川閲水世閲人心焉摧剝恐先朝露音徽未泯人生到此天道寧論物是人非瞻烏之歎陳蕃死郭林宗哭之於野慟既而曰瞻烏爰止不知誰之屋含酸茹歎顏淵死子曰天喪豫盡哀王隱晉書曰阮籍鄰久未適而死籍往哭之盡哀墟墓之間未施哀於民而民哀孔不勝哀顏師古弟相時字睿師古死不勝哀而卒叔父喪殷踐猷以叔父喪哀慟嘔血而卒達神明文粹獨孤及李華中集序執親之喪哀達神明貫天地李華崔孝公沔文集序居憂也哀貫乎天地背爛心朽皮枯節攣文粹李華靈式二孝贊序侯知道程俱羅生養以孝歿奉以哀廬於冢次號泣無節侯氏七年矣程氏三年矣擁墳椎膺聲氣咽塞下入九泉上徹九天背爛心朽皮枯節攣手足胼胝同上創巨病殷手足胼胝成此高墳苴斬三年爾獨終身寒暑在廬柳宗元壽州孝門銘陷膺腐泚寒暑在廬祭奠十白記曰小斂奠於東方朝奠日出夕奠逮日始死脯醢之奠將小遣而行之大夫之喪既薦馬薦馬者出乃苞而讀書既夕禮苞牲用下體遣車視牢具遣奠牲體數奠而藏之或問曾子曰既奠苞其餘猶既食則裹其餘君子既食則裹其餘乎言傷廉也曾子曰子不見大饗乎既饗卷三牲之俎歸于賓館父母之餘而賓客之所以為哀也子曰豫疇昔夜夢坐奠於兩楹之間殷人奠於兩楹之間而丘也殷人也坐奠所以為凶象也有薦新如朔奠小祥之祭也主人之酢也嚌之衆賓兄弟皆啐之大祥主人啐之嚌至齒啐入口小殮之奠子遊曰於東方曾子曰於西方小殮之奠在西方也魯禮未失也自及葬不奠務於常葬小祥者主人練祭而不旅奠酬於賓賓弗舉禮也魯昭公練舉酬行與旅非禮也孝公大祥奠酬不舉亦非禮也未有見其享之者為使人勿倍謂脯醢之奠將行之乃葬而食之也練筮日筮尸視濯皆腰絰杖繩屨有司告而後去杖筮尸有司告事畢而后杖拜送賓大祥吉服而筮尸彌吉也大夫士若君不戒而往不具殷奠君退必奠禮異奠虞祭殊喪吉潔爾牛羊不聞於剝奠去其黍稷寧異乎載粻載粻非禮也遣奠無黍稷雖殷事以盡敬月朔月半薦新之奠終素哭而展哀奠以素器以生者有哀素之心雖孝子事亡禮當如此而主人自盡素以示哀哀以情降敬由禮立既以吉易喪必殺哀崇敬始死之奠其餘各也與孔以食四舉往祭高士廉卒方寒食敕尚宮以食四舉往祭食瓜美輟其半奠杜如晦薨帝他日食瓜美輟其半奠焉御饌往祭後敕所御饌往祭刲股肉以祭崔從大和六年卒下刲股肉以祭者帝自為文李懷遠卒帝自為文祭之致祭凡四十四幄舊史李光進葬母京城將相致祭凡四十四幄觀者如堵中使吊祠辛雲京卒及葬命中使吊祠時將相祭者至七十餘幄喪車移晷乃得去士二千人刲股以祭烏重胤既歿士二千人刲股以祭奠以敘哀韓愈祭馬仆射文白粥元酒生芻祭路隅呂才母卒以哀毀卒通人郎餘令以白粥元酒生芻祭路隅世人共哀之遣使祭明皇幸蜀妃子既死一日登高山望秦川謂高力士曰吾聽張九齡言不至此遣使祭之嘗引李巡張參在幕府後二人卒至宴餘乃設虛位沃饋之李勉酒肉在前君胡不食韓愈祭文喪助祭十一白曾子問曰大功之喪可以與於饋奠之事乎饋奠在殯時子曰豈大功耳自斬衰已下皆可禮也非謂為人謂於其所服天子諸侯之喪斬衰者奠為君服斬衰唯主人不奠大夫齊衰者奠服斬衰者不尊避正君齊衰兄弟也士則朋友不足則取於大功已下者齊衰不奠避大夫謂殷奠時小功可以與於祭乎子曰自斬衰已下與祭禮也曾子曰不亦輕喪而重祭乎怪使重喪執事孔子曰天子諸侯之喪不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功已下者也相識有喪服可以與於祭乎有喪服可以助喪識者祭否子曰緦不祭又何助於人乎曰廢喪服可以與於饋奠之事乎謂新除喪服也子曰脫衰與奠非禮也為其忘哀疾也以擯相可也孔宗室王大臣等皆祭德宗昭皇后王氏崩將葬后母郕國鄭夫人請設奠有詔祭物無用寓欲祭聽之於是示室王大臣李晟渾瑊等皆祭郭承嘏方大任用會卒家無餘資親友為辨喪祭本傳七十餘幄辛雲京卒將相祭者七十餘幄本傳主喪十二白記曰姑姊妹其夫黨無兄弟使族人主喪妻之黨雖親不主夫若無族則前後家東西家無則里尹主人閭胥里宰之屬男主必使同姓婦主必使異姓謂無主後者異姓同宗之婦婦人外成之義女子子在室為父母其主喪者不杖則子一人杖謂長女子也許嫁及二十為成人成人正杖也婦之喪虞卒哭其夫若子主之祔則舅主之虞卒哭祭祭婦非舅事也祔於誼廟尊者宜之主兄弟之喪雖疏亦虞之喪事祔虞乃畢無女主則男主拜女賓于寢門內無男主則女主拜男賓於阼階下子幼則以衰抱之代之拜喪有無後無女主凡喪父在父為主與賓客為禮宜使尊者也父沒兄弟同居各主其喪各為其妻子主喪親同長者主之若昆弟之喪宗子主之不同親者主之不同親者主之以義為主伯皋死赴於孔子孔子曰夫猶賜也而見我焉吾哭諸賜氏遂命子貢為之主曰為爾哭也來者拜之知伯皋而來者勿拜也孔身為治喪李白上安州裴長史書昔與蜀中友人吳指南同遊于楚指南死於洞庭之上白禫服慟哭若喪天倫遂摧殯于金陵數年來丐貸營葬於鄂城之東故鄉路魂魄無主以遷窆之式昭明情此則曰存交重義也雜喪十三白凡人有喪匍匐救之詩子食於有喪者之側未嘗飽惻隱之心鄰有喪舂不相里有殯不巷歌禮子見齊衰者雖少必作過之必趨荀有喪也見齊衰者雖狎必變人多疾疫又隨以喪大功廢業或曰大功誦可也許其口習臨喪不笑望柩不歌臨喪則必有哀色孔孤女稚兒為立夫家盧鈞擢嶺南節度使流族有疾若喪則殯殮孤女稚兒為立夫家以奉廩資助殫褚治喪崔洪禮所善李觀病且死洪禮殫褚為治喪瘞路左羅道琮上書忤旨徙嶺表有同斥者死荊襄間臨終泣曰人生有死乃委骨異鄉耶道琮曰吾若還終不使君獨留此瘞路左去歲餘遇赦歸方霖潦積水失其殯處道琮祀諸野波中忽若湓注者道琮曰若尸在可再沸祝已水復湧乃得尸負之還鄉李頻為建州刺史卒官下喪師父老相與扶柩葬永樂州天下亂盜發其冢壽昌人迹加封掩云杖十四白儀禮云苴杖竹也削杖桐也杖者各齊心皆下本杖者何爵無爵而杖者何擔主也擔市豐也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也記曰庶子不以杖即位父不主庶子之喪則孫以杖即位可也父在庶子為妻以杖即位舅不主妻之喪子得伸也有三年之練冠則以大功之麻易之唯杖屢不易為長子杖則其子不以杖即位也為妻父母在不杖不稽顙記曰古者尊卑皆杖叔孫武叔朝見倫人以杖關轂而輠輪者於是使有爵者杖王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所輯杖於大夫所則杖揖杖也舉不牲地也大夫喪三日既殯主人主婦室老皆杖士喪二日而殯三日之朝主人杖婦人皆杖大人哭殯則杖哭柩則輯杖童子當室則免而杖身病體羸以杖扶病父在不杖尊者在故堂上不杖避尊者處女子子在室為父母其主喪者不杖則子一人杖謂父母也杖而後起為母削杖桐也杖不終入於廟門棄杖者斷而棄之於隱者虞杖不入於室祔杖不升於堂孔筵杖之制盧履冰曰聖人之於禮必建中制使賢不肖共成文理而後釋彼伯叔姑姊烏有筵杖之制三年必喪乎妻喪杖期又云妻喪杖期情理俱殺者遠嫌疑尊乾道也縗絰杖哭五代張彥澤耶律德光至京師聞彥澤劫掠怒鎖之命高勳監殺之彥澤前所殺士大夫子孫皆縗絰杖哭隨而詬罵以杖撲之杖而後起崔祐甫獨孤及墓志丁父憂勺飲不入口者纍日先夫人諭以不可滅性之義由是微進饘粥杖而後起過杖頭今之士大夫喪妻往往杖竹甚長謂之過杖頭據禮父在適子妻喪不杖衆子則杖據禮彼以父服我以母服報之杖固削杖也雜俎奔喪十五白禮奔喪日行百里不以夜行見星而行見星而舍奔父母之喪也若未得行則成服而後行過國至境哭盡哀而止哭避市朝至家襲絰于序東絰帶反位拜賓成踊又哭乃絰者發喪已踰日節於是可也其未小斂而至與在家同不散帶者不見尸柩也凡拜賓就其位既拜反位哭踊奔喪者非主人則主人為之拜賓送賓喪者齊衰已下入門左中庭北面哭免麻于東即位祖與主人哭成踊而升哭者非父母之喪統於主人也丈夫婦人侍之皆如朝夕哭位無變嫌若賓客婦人奔喪升自東階殯東西面坐哭盡哀東髽即位與主人拾踊婦人髽於東序也不髽於房變於室也去縱大紒曰髽拾東也奔喪不及殯先之墓即位于墓左成踊盡哀括髮絰絞帶哭踊遂冠歸就次於又三哭猶括髮成踊三日成服於五哭相者告事畢又哭三哭不袒者哀已久殺成服之朝為四哭謂既期乃至其未期猶朝久哭不止於五哭也為母所以異於父者一括髮其餘免以終事他如奔父之禮聞喪不得奔喪乃為位括髮袒成踊襲絰絞帶即位於又哭三哭括髮袒成踊若除喪而後歸則先之墓哭成踊東括髮袒絰遂除於家不哭東即主人位除謂除喪而歸齊衰望鄉而哭大功望門而器緦麻即位而哭聞遠兄弟之喪既除喪而後聞免袒成踊拜賓則尚左手尚左手吉拜也凡為位者不奠吳起奔喪見下不奔喪門奉使覆命乃奔喪吳志虞翻別傳曰王朗使翻見豫章太守華韻圖起義兵未至聞孫策向會稽翻還遭父憂以奉使有節不過家追朗至侯官遠然後奔喪不奔喪史記吳起家纍千金遊仕不遂遂破其家鄉黨笑之殺其謗者三十餘人出衛郭門與其母別齒臂而盟曰起不為卿相不復入衛遂仕於魏為將母死終不歸曾子以為薄於孝而絶之漢陳湯不奔父喪奔喪罪孫權詔三年之喪人情之極痛世治無事君子不奔人喪有事則殺禮從宜以義斷恩也顧談議以為奔喪立科輕則不足禁孝子之心重則本非應死之罪愚以為長吏在遠苟不告語勢不得知此選代之間若有傳者必加大辟則長吏無廢職之負孝子無犯罪之刑胡綜議宜從科以大辟有犯無敢之其後吳縣令孟宗奔母喪而自拘於武昌以聽刑陸遜陳其素行減死一等孔間道奔喪李孝女名妙法瀛州博野人安祿山亂被劫徙它州聞父亡欲間道奔喪一子不忍去割一乳留以行毀無圖生徐浩張曲江碑丁母憂奔喪南計毀無圖生嗌不粒食父卒自徐州被髮徒跣趨喪所負土築塋晨夕號武引度奔喪之禮如聞親喪以哭答使者盡哀問故又哭盡哀服布深衣素冠遂行日行百里不以夜行惟父母之喪見星而行是星而舍若未得奔則成服而後行過州至境則哭盡哀而止哭避市朝望其州境哭此父母喪至於家內外哭待於堂上奔喪者入門而左升自西階殯東西面憑殯哭盡哀少退再拜退於序東被髮復殯東西面坐哭又盡哀尊卑撫哭如常訖內外各還次奔喪者乃還厥明坐於殯東如初未成服者三日成服通典起復十六白記曰子夏問三年之喪卒哭金革之事無避也禮與初有司與子曰君子不奪人喪亦不可奪喪也昔者魯伯禽則有為為之也有徐戎作難卒哭而征之急王事也今以三年之喪從其利者吾不知也時多攻取之兵言非禮也既卒哭而服王事晉伐秦遂發命子墨衰絰晉文未葬襄公以凶服從戎故墨衰絰稱子晉於是乎始墨遂常為俗門內之治恩掩義門外之治義斷恩所宜移孝入忠不可以恩掩義公勤奉上宜從金革之虞哀戚在中何必苴麻之飾身許心喪奪情順變奪禮執喪公必滅私庶人喪不二事終喪不從政也致事孔子曰夏后氏既葬而致事殷人既葬而致事周人卒哭而致事謂還職事於君禮也君子不奪人之喪亦不可奪喪也言重人之喪禮曰君既葬王政入於國既卒哭而復王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無避此權禮也辨絰帶輕服權以即事也節以忠全情由禮抑魯莊公之喪既葬而絰不入庫門時慶父作亂閔公不敢居喪葬以吉服而反正君臣欲以防遏之也父母之喪三年不從政齊衰之喪三月不從政攝事晉張華為度支尚書母憂哀過禮中詔逼令攝事贊成伐吳之計也官舍設靈晉傅咸繼母喪以無兄弟自陳詔乃使官舍設靈鄭默太康七年大鴻臚鄭默母喪當依舊攝職自陳始制大臣終三年然元康中陳準傅咸之徙猶以權奪不得終禮自茲往往為比也腰絰而服事禮閔子騫以孝聞者也腰絰而服事君注禮既練男子除乎首婦人除乎帶既而曰若是乎古之道不即人心退而致事孔子善之注既事畢言古者不敢斥君即近也退退身也致仕還祿位於君也孔子善其服事君之義內不失親親之恩也怒辭官魏解弘遭父喪有軍事當行辭疾病帝怒曰汝非曾閔收廷尉高柔為請之帝乃原之孔卿強起于志寧為大子詹事以母喪免有詔起復本官固請終喪帝遣中書侍郎岑文本孰譬曰忠孝不兩立今太子須人教約卿疆起為我卒輔道之志寧乃就職興塊次來墳摧穎川太守母喪免以孝聞安祿山反張相薦之興塊次拜汝南太守固請終制宣室涵方母喪奪哀持節宣慰所至州縣非公事未嘗言蔬飯水飲席地以暝使還固請終制代宗見其癯毀許之崔善為初天下既定群臣居喪者皆奪服善為建言其敝武德一年始許終喪然猶時以權迫不能免如房玄齡褚遂良者矣矣即苫次起持節鄭元璹母喪免會突厥提精騎數千萬身自將攻太原詔即苫次起元璹持節禮俗衰薄士以奪服為榮張説纍遷工部兵部二侍郎以母喪免既期詔起為黃門侍部固請終制祈陳哀到時禮俗衰薄士以奪服為榮而説獨以禮終天下高之奪服拜黃門侍郎杜暹遷給事中以母喪解會安西都護張孝嵩遷太原尹或言暹往使安西虜伏其清今猶慕思乃奪服拜黃門侍郎兼安西副大護固辭見聽李朝隱授岐州刺史母喪解召為楊州大都督府長史固辭見聽乞終喪解琬魏州元城人除監察御史以喪免武后顧琬習邊事迫令西撫羌夷琬因乞終喪后嘉許之詔服除赴屯父喪獻計誅王承宗陰向帝旨盧從史元和中丁父喪未官從史即獻計誅王承宗陰向帝旨繇是奪服出峩冠廟堂入泣血柩側韓渥言宰蘇崔貽範處喪未數月遽使視事傷孝子心今中書事一相可辦陛下誠惜貽範才俟變縗而召可也何必使出峨冠廟堂入泣血柩側毀瘠則廢務勤恪則忘哀此非人情可處也被髮號泣而入居留室屏節旄田布弘正遇害魏人素德弘正以布之賢而世其官可以成功穆宗遽召布解縗拜魏博節度乘傳以行布號泣固辭不聽乃出伎樂與妻子賓客決曰吾不還矣未至魏三十里跣行被髮號泣而入居留室屏節旌居父喪詔奪服薛大鼎陳思忠居父喪詔奪服客往吊思忠辭以辰日不見大鼎子克創曰事親者避嫌可也既孤矣則無不哭世服其言入朝徒跣及門夜直藉稿以寢歐陽詢母喪詔奪哀每入朝徒跣及門夜直藉稿以寢非公事不語還家輒號慟敦諭不就陸堅河南洛陽人再遷通事舍人有詔起復遣中官敦諭不就起復之制五代劉嶽初鄭餘慶嘗採唐士庶吉凶書疏之式雜以當時家人之禮為書儀兩卷明宗見其有起復之制嘆曰儒者所以隆孝悌而敦風俗且無金革之事起復可乎變禮中權張説姚崇碑其後剖符江表敦諭起復衰麻外墨欒棘外毀變禮中權通識所貴懇請終喪張曲江起復表聞命號咷使者逼迫及至闕下懇請終喪手詔曰墨縗之義不行蒼生之望安在臣節大於孝思王事急於情理捨輕從重徇公滅私變而通之正在於此白居易節度使起復制委節去位同去官門墨縗在體玄纛在前提劍就金無忘哀敬節度使田布起復元稹制辭不拜蘇頲遭父喪起為工部侍郎辭不拜終制乃就職呂諲擢平章事三月復召知門下三品當賜門戟或勸諲以凶服受吉賜不宜諲釋縗拜賜人譏其失禮唐史
