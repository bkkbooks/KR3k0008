body:
  text: 卷第三十七白天子布政之宮內有太室體象天地明堂之制上圜下方四達八窗九室三十六戶據坤靈之正位順陰陽以開闔合宮總章黃帝曰合宮虞舜曰總章復廟重屋八達九房辨其方位正天子之位也明諸侯之尊卑明堂者也宗祀文王於明堂以配上帝天子立明堂者所以正四時之序敦五教之本在國之南也白虎通於昭明堂明堂孔陽文選序五位東西九筵南北七筵室容二几周禮明堂制下之燥濕不能及上之寒暑不能入土事不文木事不鏤示人知節也晏子春秋明堂之制夏制三十室堂修二七廣四修一五室九階白盛盛謂蜃炭堊牆也五室四步三尺九階四旁兩挾窗門室之三室三之一也殷制殷人重屋復笮也堂修士尋堂崇三尺四阿阿今四柱也故名重屋周制周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室每室二筵室中度以几堂上以筵宮中以尋塗以几中舉四壁內也黃帝明堂圖漢郊祀志太上北趾有古時明堂上欲理明堂奉高旁濟南人公玉帶上黃帝明堂圖注云公王姓帶名也不登左傳曰勇則害上不登於明堂李尤明堂銘曰布政之宮上圜下方體則天地政則陰陽窗達四設流水洋洋順節行禮各居其旁春恤孤幼夏近賢良秋勵武冬進賢孔勸興明堂陳子昂垂拱初詔問群臣調元氣當以何道子昂因是勸后興明堂即上言曰昔黃帝含宮有虞總章堯衢室夏世室所以調元氣治陰陽也臣聞明堂有天地之制陰陽之統二十四氣八風十二月四時五行二十八宿莫不率備王者攻失則災政順則祥臣願陛下為唐恢萬世之業相國南郊建明堂與天下更始按周禮月令而成之雕飾譎怪侈而不法王求禮為左拾遺監察御史時后方營明堂雕飾譎怪侈而不法求禮以謂鐵鸑金龍丹雘珠玉乃商瓊臺夏瑤室之比非古所謂茅茨釆椽者督作則天皇后武氏詔毀乾元殿為明堂以浮屠薛懷義為使護督作通天宮萬歲登封元年三月丁巳復作明堂改曰通天宮布政之宮張齊賢傳王方慶上言布政之宮所以明天氣統萬物也大享陳貞節帝將大享明堂貞節惡武后所營非古所謂木不鏤土不文之制乃與馮宗上言明堂必直丙巳以憲房心布政太微上帝之所武后始以乾元正寢占陽午地先帝所以聽政故毀殿作堂徹之日有音如雷庶民譁訕以為神靈不悅堂成災火從之后不修德俄復營創殫用極侈詭禳厥變又欲嚴配上帝神安肯臨且密邇掖廷人神雜擾是謂不可放物者也序文昭武穆復廟重屋所以序文昭武穆楊炯少室山少姨廟碑銘典制不可常聖王示儉或有剪蒿為柱葺茅作蓋雖復古今典制不可常孔穎達明堂議景巳之地鄭元則在國之陽三里之外七里之內景已之地顏師古飛翬如雲之殿韓文周公之政焦心勞思日夜成方寸已非坐夫總章左個而後思後王之飛翬如雲之殿餘萬拱易其名為明堂耶軒轅草圖羲和練日景星明堂賦景星耀而太階平虹霓滅而日月張同上瞻少陽而舉措獻房心以開鑿瞻少陽而舉措採殷制酌夏步雜以代室重屋之名括以辰次火木之數同上歲入明堂者十八張齊賢傳王方慶言舊説天子歲入明堂者十八大享一月告朔十二四時迎氣四巡狩之歲一貴誠訓儉孔穎達席惟稿秸器尚陶匏用璽粟以貴誠服大裘而訓儉請為五室重屋上圓下方魏徵請為五室重屋上圓下方既體有則象又事多故實下室備布政之居上堂為祭天之所人神不雜禮亦宜之其高下廣袤之規凡筵丈尺之制則並隨時立法因事制宜三代有其名而無其制度禮樂志孝經曰宗祀文王於明堂以配上帝而三代有其名而無其制度自漢以來諸儒之論不一至於莫知所從則切臨時增損不能合古然推其本旨要于布政交神於王者尊嚴之居而已其制何必與古同引天地四時風氣乾坤為之者無所據依乃引天地四時風氣乾坤五行數象之類以為倣象而衆説亦不克成至于高下廣狹丈尺之制可以因事制宜魏證謂五室重屋上圓下方上以祭天下以布政自前世儒者所言雖異而以為如此者多同至于高下廣狹丈尺之制可以因事制宜也顏師古曰周書敘明堂有應門雉門之制以此知為王者之常居爾其青陽總章玄堂太廟左右個皆路寢之名也高宗時改元總章分萬年置明堂縣示欲必立之而議者益紛然或以為五室或以為九室而高宗依兩議以帟幕為之與公卿臨觀而議益不一乃下詔率意頒其制度至取象璜上設鴟尾其言益不經而明堂亦不能成明堂規制總章三年具明堂規制下詔其明堂院每面三百六十步當中置堂院四隅各置重樓其四墉各依方色堂周回十二門二十四窗堂心八柱外置四輔上以清陽玉葉覆之詔下之後詳議未決通典準水臬攢雲梁李白賦層簷屹其霞嶠廣廈鬱以雲布同上九室窈窕五闈聯綿同上雲楣立岌以橫綺綵桷攢欒而仰天同上玉女攀星於網戶金娥納月於琁題藻井綵錯以舒蓬天窗赩翼而銜霓同上三十六戶七十二牖度延列位西八東九白虎列序而躨跪青龍承隅而蚴蟉同上納六服之貢受萬邦之藉張龍旗與虹旌攢金戟與玉戚延五更進百辟同上鼓大武之隱轔張鈞天之鏗訇蓋聖主之所以孝治天下而享祀窅冥也同上白左制辟雍在明堂之左文選乃流辟雍辟雍湯湯聖皇蒞止造舟為梁文選又造舟清池維水泱泱乃營三宮謂明堂辟雍靈臺也白虎通曰辟雍者所以行禮樂宣教化辟者象璧之圜以施法天下雍壅也壅之以水象教化流行又云辟積也積天下之道德壅天下之殘賊詩於樂辟雍文王知鳥獸得所以為音聲與政通既合樂以詳之於喜樂乎諸在辟雍者言感中和之至也鎬京辟雍自西自東自南自北無思不服武王於鎬京行辟雍之禮自四方來觀者無不歸服四方攸同皇王辟雍禮統曰辟雍教化天下也王制天子曰辟雍圓如璧以水內如覆盆外如偃蓋諸侯曰頖半無水夏天子重屋諸侯宗廟殷天子廟諸侯世室三雍漢武帝時河間獻王來朝獻雅樂對三雍注謂辟雍明堂靈臺言天地君臣人民皆然建三宮之文質彰厥職之所宜終軍書三宮班政有文質也踐辟雍尊事三老兄事五更注後漢明帝辟雍海流道德之富孔以禮樂明和天下歸崇敬建議古天子學曰辟雍以制言之壅水環繚如璧然以誼言之以禮樂明和天下云爾在禮為澤宮故前世或曰璧池或曰璧沼亦言學省漢光武立明堂辟雍靈臺號三雍宮晉武帝臨辟雍行卿飲酒禮別立國子學以殊士庶今聲明之盛辟雍獨闕請以國子監為辟雍省斯禮止于辟雍凡學官春釋奠于其先師斯禮止于辟雍劉禹錫奏記論學事或言或歌講述古今呂道州凌煙閣勳臣虞世南贊於樂辟雍辟雍沈沈天子所臨或言或歌講述古今其徒八千纓辨森森獩貊羌髳咸詠德音羽林孤兒亦垂青襟水木周繞呂延濟注文選間居賦明堂辟雍水木周繞圜水為辟雍張齊賢傳王方慶言正室為太室向陽為明堂建學為太學圜水為辟雍異名同事古之制也白右立靈臺文選云靈臺在明堂之右乃經靈臺靈臺既崇帝動時登爰考休徵文選馮相視祲祲氣也祈褫禳災褫福也經始靈臺不日成之詩經始勿亟庶民子來謂文王造靈臺也詩九仞靈臺其高九仞在國之南上以觀休祥光之變夏曰清臺殷曰神臺周曰靈臺王者升靈臺望元氣吹時律觀物變觀天文之變洪範傳天子立靈臺所以觀天文之變而候日月崇上帝晉尚書陸機策秀才文曰明堂崇上帝清廟寧祖考辟雍班教化太學講藝文諸儒論之皆異蔡雍謂之一物何也紀瞻對曰取其宗禮之順曰清廟取室之貌曰太室取堂曰明堂四門之學曰太學取圜曰辟雍也孔歸崇敬見辟雍門候辰次災祥薛頤固丐為道士帝築觀九嵕山即祠建清臺候辰次災祥以聞所上與太史李淳風合天子占候之所呂向文選間居賦靈臺傑其高峙注云臺名天子占候之所考校歲時政理張銑注文選靈臺詩靈臺天子觀氣候之臺靈臺既高天子勤力而升于此以考校歲時政理善惡三光通其精曜五行布其次序也白明兩作離繼明易曰明兩作離大人以繼明照于四方一人元良萬邦以貞太子之謂也敬保元子成王顧命聖敬日躋齒學禮行一物而三善皆得者唯太子而已其齒學之謂也故太子齒學國人觀之曰將君我而與我齒讓何也曰有父在則禮然又有兄在又有君在此三善也恭敬溫文禮朝於王季日三問內豎安否如何文王為世子也侍膳傳太子奉家祀社稷之粢盛以朝夕侍君膳也撫軍監國君行則守有守則從從曰撫軍守曰監國羽翼已成漢高欲廢太子徵四皓到帝知太子羽翼已成遂不廢監撫餘間文選序東朝乾之長男合洊雷之象居明立之佐洊雷震也繼正體以為大本育明德而居少陽位尊儲副德茂元良博望之苑承華之門出龍樓而奉詔入虎闈而齒胄太子承萬代之業漢書搖本漢高欲廢太子叔孫通曰太子天下之本搖一本而天下不安奈何以天下為戲嬖子配嫡亂之本也傳銅龍樓太子宮樓辨惠對日晉明帝年數歲元帝指日問長安與日孰遠曰日遠只聞人從長安來不聞人從日邊來居然可知帝異之它日大集賓客問之曰日近帝問之曰舉首見日不見長安五勝帝王紀晉平公使叔譽聘周見太子晉與之言晉五勝之叔譽三窮歸告公曰太子年十五臣不能與之言君其事之問安侍膳文王為世子王季一飯亦一飯再飯亦再飯武王帥而行之諫春秋外傳靈王二十二年榖洛鬥將沒毀王官王將壅之太子晉諫云云遂止吹鳳笙太子晉吹鳳笙於洛濱作樂山海經祝融生太子長琴是時處瑤山作瑤山之樂也晉太子出會在三恪下王公上也群臣見儀晉尚書符問王公已下見皇太子儀及所衣服國子博士車胤議朝臣宜朱褠幘拜則案輕傳不見其文故太傅羊怙慶太子稱叩頭死罪此則拜之證也又太寧三年詔議其典尚書卞壺謂宜稽則漢魏闔朝同拜其朱衣冠冕唯施天朝宜褠幘而已朝議多同前星漢書五行傳曰心火星天王星也前星太子星也鶴禁漢宮闕疏曰白鶴太子所居之地凡人不得輒入故云鶴禁也少海昔天子比大海太子為少海日重光月重輪山重暉海重潤崔豹古今注曰明帝時為太子樂府詞云云教導必以禮光禮凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發行於外是故其成也擇恭敬而溫文太傅少傅立太傅少傅以養之欲其知父子君臣之道也教論德成入則有保出則有師是故教諭而德成也師也者教之以事而諭諸德也樂正司業父師司成抗世子之法於伯禽成王幼而不能蒞祚周公抗世子之法於伯禽使與王居欲令成王知父子君臣長幼之道二疏四皓明兩在三三謂君父師也見正事聞正言行正道賈誼云太子所宜也嗜鮑賈誼書文王使太公望傳太子發發嗜鮑魚太公不與曰鮑魚不登俎豆豈有非禮可以養太子哉襁褓之教授經後漢桓榮授太子經齒學見上親拜晉賀循字彥先世為儒宗除太子太傅命皇太子親往拜之喜頌漢太子喜王褒甘泉及洞簫頌太子令左右皆誦之也遊洊雷之講肆齒明離之胄筵保也者慎其身以輔翼之而歸諸道也生吹銅大戴禮曰古者生太子太師吹銅而御戶注銅律也吹之以和氣卜士負之士妻食之左傳接以太牢桑弧蓬矢六射天地四方甲觀書堂漢成帝生於甲觀書堂誕彌厥月詩誕大也彌終也謂后稷生也繼體之慶岐嶷魏明帝生而文帝愛之常在左右數歲而有岐嶷之姿疾玉體不安士發曰楚太子有疾吳客往問之曰伏聞太子玉體不安亦少問乎忽忽不樂漢太子體不安忽忽不樂詔使王褒等皆之太子宮娛侍太子朝夕平復乃歸死思子望思漢戾太子死後武帝思之作思子宮歸來望思之臺欲其魂來也苑空博望門閉承華道行三善天奪九齡賓客四皓漢張良令太子作書與商山四皓卑辭安車請以為客博望苑漢武帝立子據為太子起博望苑以通賓客即戾太子羽翼已成調護孔英果鬱林五恪帝初以晉王為太子又欲立恪長孫無忌固爭帝曰公豈以非己甥邪且兒英果類我若保護舅氏未可知無忌曰晉王仁厚守文之良主且舉棋不定則敗況儲位乎帝意乃止建太子以自副惠昭太子寧帝即位進王鄧與澧深洋洚四王同封於是國嗣未立李絳等建言聖人以天下為大器知一人不可獨化四海不可無本故建太子以自副然後人心定宗祐安有國不易之常道陛下受命四年而冢子未建是開窺覦之端乖謹重之義非所以承列聖示萬世帝曰善以寧為皇太子也天下本不可以輕動莊恪太子永稱事燕豫不能一循法保傳戒告憖不納又母愛弛楊貴紀方幸數譖之帝他日震怒御延英引見群臣詔曰太子多過失不可屬天下其議廢之群臣頓首言太子春秋盛雖有過尚可改且天下本不可以輕動惟陛下幸赦問儲二事李嗣真武后常問嗣真儲二事對曰程嬰贊曰存趙氏孤古人嘉之后悟中宗乃安位東宮李績晉王為皇太子授詹事兼左衛率俄同中書門下三品帝曰吾兒方位東宮公舊長史以宮事相委勿以資屈為嫌也副二之重魏謨進中書門下同平章事建言今天下粗治惟東宮未立不早以正人傅導之非所以存副二之重且泣下帝為感動自敬宗後惡言儲嫡事故公卿無敢開陳者時帝春秋高嫡嗣未辨謨輔政首發其端朝議歸重贊道賦李百藥授太子右庶子太子數戲媟無度乃作贊道賦以諷它日帝曰朕見卿賦述古儲二事勸勵甚詳向任卿固所望耳太子正則天下定姚珽兼左庶子時節愍太子稍失道珽凡四上書諫其一曰臣聞賈誼稱選天下端士使與太子居處出入故太子見正事聞正言行正道左右前後皆正人也夫習與正人居不能無正習與不正人居不能無不正教得而左右正則太子正太子正則天下定矣專學藝以廣懿德褚遂良帝於寢宮側別置院居太子遂良諫以為朋友深交者易怨父子殢愛者多愆宜許太子間還東宮近師傅專學藝以廣懿德帝從其言陳申生戾園禍以諫裴稹開元末壽王瑁以母寵欲立為太子稹陳申生戾園禍以諫玄宗改容謝之宗祧是繫劉洎皇太子初立洎謂宜尊賢重道上書曰太子宗祧是繫善惡之習興亡在焉弗勤于始將悔于末孝友仁愛挺自天資朝錯上書令通政術賈誼奏計務知禮教今太子孝友仁愛挺自天資然春秋鼎盛學當有漸以陛下多才多藝尚垂精厲志以博異聞而太子優遊坐棄白日陛下每退朝引見群臣訪以今古咨以得失而太子處內不接正人不聞正論臣所未諭且古者問安而退以廣敬也異宮而居以遠嫌也間者太子入侍逾旬不出師傳寮寀備員而已非所謂愛之也同上授以良書娛以佳賓臣愚以為授以良書娛以佳賓使耳所未聞目所未見儲德愈光群生之福也同上不素教李綱事隋為太子洗馬後勇廢文帝切讓官屬無敢對綱獨曰陛下不素教故太子至此太子資中人得賢首輔而善不肖者導而惡奈何歌舞鷹犬纖兒使日侍側何特太子罪邪召用玉契崔神慶突厥使者入見皇太子應朝有司移文東宮召太子神慶諫曰五品以上佩龜者蓋防徵召之詐肉出龜以合之況太子乎古者召太子用玉契此誠重謹防萌之意不可不察也肆放崔謹由傳初宣宗餌長年藥病渴且中躁而國嗣未立帝對宰相欲肆赦患其無端謹由曰太子天下本若立之郝為有名帝惡之不答微服觀乞寒胡戲韓朝宗睿宗詔作乞寒胡戲諫曰道路藉藉咸言皇太子微服觀之且胸奴在邸刺客卒發白龍魚服深可畏也太子天下本狄仁傑曰太子天下本本一搖天下危矣具禮迎還后即日遣徐彥伯迎廬陵王於房州王至后匿王帳中召見仁傑語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降拜頓首曰太子歸未有知者人言紛紛何所信后然之更令太子舍龍門具禮迎還中外大悅仁朋孝友崔玄暐奏言皇太子相王皆仁明孝友宜侍醫藥不宜引異姓出入禁闥后慰納監國杜正倫太子監國詔正倫行左庶子帝它日又言朕年十八猶在人間情偽無不嘗及即位處置有失必待諫乃釋然悟況太子生深宮不及知邪且人主不可自驕今若詔天下敢諫者死將無復發言矣故朕孜孜延進直言卿其以是曉太子冀裨益之求立太子斐度帝暴風眩中外不聞問者三日度數請到內殿求立太子翼日見帝遂立景王為嗣請立皇太子維天下心李玨表請立皇太子維天下心造曲室太子以農時造曲室纍月不止又好音樂過度于志寧諫以為今東宮乃隋所營當時號為侈麗豈容復事磨礱彩飾於其間丁匠官奴皆犯法亡命鉗鑿槌杵往來出入監門宿衛宜長千牛不得苛問爪牙在外廝役在內其可無憂乎又宮中數聞鼓聲大樂伎兒輒留不出往年口敕丁寧殿下可不思之太子不納本傳罕見宮官邢文偉歷太子典膳丞時孝敬罕見宮官文偉即減膳上書曰比者不甚廷議謁對稀簡三朝之後與內人獨居何縣發揮天資使濬哲文明哉今史既闕官宰得奉職謹守禮經以聞太子答曰觀尋來請良符宿志自非義均弼諧渠能進此藥石文偉由是益知名有君人量李泌拜元帥廣平王行軍司馬始軍中謀帥皆屬建寧王泌密白帝曰建寧王誠賢然廣平彖嗣有君人量豈使為吳太伯乎帝曰廣平為太子何假元帥泌曰使元帥有功陛下不以為儲副得耶太子從曰撫軍守曰監國今元帥乃撫軍也帝從之內外繫心衛次公貞元中擢左補闕德宗崩與鄭綢皆召至金鑾殿時皇太子久疾禁中或傳更議所立衆失色次公曰太子雖久疾冢嫡也內外繫心久矣必不得巳宜立廣陵王絪隨贊之議乃定詔突厥酋長子弟得事東宮徐齊聃咸亨初詔突厥酋長子弟得事東宮齊聃上書諫以為氈裘冒頓之裔解辮削衽使在左右非所謂恭謹威儀以近有德任官惟賢才左右惟其人之義被讚李林甫皇太子鄂王光王被讚帝欲廢之張九齡切諫帝不悅林甫惘然私語中人曰天子家事外人何與邪訓之不早韋溫太子得罪詔諭群臣溫曰陛下訓之不早非獨太子罪時頗直其言為太子歡劉訥言沛王為太子擢侍讀嘗集俳諧十五篇為太子歡母喪暢嘗傳昭德皇后崩中外服除皇太子諸王將服三年穆質上疏三年之喪自天子達於庶人漢文帝以宗廟社稷之重自貶乃以日易月後世所不能革太子人臣也不得如人君之制母喪宜無厭降見禮綱在東宮太子建成尤加禮後太子寖狎亡賴遂乞骸骨帝謝曰知卿直士幸卒輔吾兒李綱上疏韋承慶雍王為太子遷司議郎中儀鳳中詔太子監國太子稍嗜聲色興土工承慶見造作玩好浮廣倡優鼓吹歡譁戶奴小人皆得親左右承顏色恐因是作威福宜加繩察乃上疏極陳其端選正人輔導元稹始王伾王權文蒙幸太子官而撓國政稹謂宜選正人輔導因獻書曰胡亥之生也詩書不得聞聖賢不得近被趙高刑餘之人傅之以殘忍戕賊之術日恣睢天下之人未盡愚而亥不能分馬鹿矣高之威懾天下而亥自幽深宮矣若秦亡則有以致之也太宗為太子選知道德者十八人與之遊即位後雖間宴飲食十八人皆在上之失無不言下之情無不達不四三年而名高盛古斯遊習之致也行嚴師問道之禮臣以為高祖至陛下十一聖生而神明長而仁聖以是為屑屑者故不之省設萬世之後有周成中才生於深宮無保助之教則將不能知喜怒哀樂所自況稼穡艱難乎願令皇子洎諸王齒胄講業行嚴師問道之禮輟禽色之娛資遊習之善豈不美哉以名臣左右太子李固言進給事中將作監王堪坐治太廟不謹改太子賓客固言上還制書曰陛下當以名臣左右太子堪以慢宮斥處調護地非所宜詔改它王傳經義輔導韋綬穆宗為太子綬入侍讀方太子幼綬數為俚言以悅太子它日侍太子為帝道之帝怒曰綬當以經義輔導太子而反語此復何賴焉外遷虔州刺史侍講孔穎達侍講東宮後太子稍不法穎達爭不已乳夫人曰太子既長不宜數面折之對曰蒙國厚恩雖死不恨凱切愈至侍皇太子王紹宗武后召赴東都擢太子文學使侍皇太子宴宮中燕王忠帝始為太子而忠生宴宮中俄而太宗臨幸詔宮臣曰朕始有孫欲共為樂以憂死鄭肅詔兼賓客為太子豫授經既而太子母愛馳為讒所乘廢斥有端肅因入見天下大本不可輕動意致深切帝為動容然內寵方煽太子終以憂死睿孝天資太子弘前星位定拱宸極以昭彰蒼震氣宣與天地而長久賀册皇太子表劉禹錫文四嶽仰搖山之高百川承少海之潤賀箋蒼震發前星之輝黃離表重輪之瑞又箋行禮之日則屏翳收迹太陽宣精用彰出震之休更表重離之曜柳宗元安册皇太子我為太子卿力也崔群穆宗玄以吏部侍郎召之勞曰我為太子卿力也群曰此先帝意臣何力焉且陛下向為淮西節度使臣起制草其言有能辨南陽之牘允符東海之貴先帝然之則傳付久矣卿違朕意不顧家屬也李泌帝數稱舒王賢泌揣帝有廢立意因曰陛下有一子而疑之乃欲立弟之子臣不敢以古事爭且十宅諸叔陛下奉之若何帝赫然曰卿何知舒王非朕子對曰陛下昔為臣言之陛下有嫡子以為疑弟之子敢自信於陛下乎帝曰卿違朕意不顧家屬也耶對曰臣衰老位宰相以諫而誅分也使太子廢他日陛下悔曰我惟一子殺之泌不吾諫吾亦殺爾子則臣絶祀矣雖有兄弟子非所歆也皇后五白乃順承天厚德載物柔順利貞含萬物而化光正位居體美在其中關睢之德葛覃歸安父母以成婦道兔罝后妃之化也憂在進賢無私謁之心芣苡后妃不妒忌之美也天立厥配來嫁于周作嬪于京天作之合俔天之妹文定厥祥親迎于渭以聽內治禮天子后立六宮以聽天下之內治月食則后素服修六宮之職以明婦順天下內和聽女順治陰德聽內職和順陰教母道母天下日之與月天子之與后猶日之與月陰之與陽相須而成也外戚塗山有娀薑嫄太任史夏之興也以塗山殷之興也以有娀周之興也以大任內主淑女之德麗華之容周禮以陰禮教六宮陰禮后也立市后立市陰之義並后傳曰並后匹嫡亂之本也外戚之助史自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助金屋漢武曰得阿嬌當以金屋貯之即陳皇后也椒房漢官儀曰皇后稱椒房塗室取溫暖除惡氣也猶天子朱泥殿上曰丹墀也死喪服天子與后猶父之與母也故為天王服斬衰服父之義也為后服齊衰服母之義也桂宮中語樛木后妃逮下無嫉妒也上尊宗廟夙夜祁祁下訓御人尊卑肅肅將無嗜欲用稟仁慈禮服浣濯之衣修蘋藻之事螽斯之詠見於婦德麟趾之化或淚竹成斑將思虞舜二妃聞裂繒起笑將亡夏桀未喜婦人無儀中饋是儀為國風之始詩坤道象陰故能配合聖人易體資生之仁含成象之德助天養萬物大戴禮曰陰體先和婦道承順修其四德言容德功合於六宮禮穆穆克敬雍雍柔喜國語賢智亂臣十人九人而已其一人謂文母關睢見上注樊氏忠賢達善於楚國馬后貞素辭寵於漢君漢明帝馬皇后為人貞潔衣不加彩帝母幸之輒曰陛下雲雨之澤潤及六宮使陰陽和順示不偏也帝甚善之班婕辭輦懿範內令后之教正也周禮婦順不修禮記天子立后以彰明婦順是以婦順不修陰事不得謫見於天月為之食故月食則后素服而修六宮之職蕩天下之陰事注蕩滌去穢惡末喜妲已褒姒史桀之亡也以末喜紂之亡也嬖妲己周幽之亡也以於褒姒也長門宮陳皇后妒帝棄於長門宮奇袤媚道同玉輦而恃恩專金屋而怙寵殺皇子漢成趙昭儀皇后飛燕姊也殺皇子帝遂絶嗣童謠曰燕飛來兮啄皇孫納后若而人傳靈王求后於齊齊侯使晏桓子對曰夫婦所生若而人妾婦之子若而人無女而有姊妹及姑姊妹則曰先守某公之遺女若而人此先王之禮辭也不敢毀不敢譽故云若而人也齊侯許昏使陰黑結之結成也備百姓納女於天子曰備百姓姓生也言廣生息也五可晉武帝為太子納妃娶衛瓘女楊后受賈充妻郭氏之託欲娶賈充女帝曰衛氏女有五可長麗白賢多子賈充女五不可短黑惡妒無子嬪婦以備內官傳曰以備內官焜耀寡人之望以備嬪嬙嬪嬙婦官也內治志者天子后六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治馮昭儀之當熊義勇班婕妤之辭輦明智五不可見納后門以陰禮教九嬪以婦職之法教九御八十一御女也周禮內宰正其服正踰侈也禁其奇袤媚道展其功緒婦功也命婦九嬪已下內人九嬪也內官夫人已下陰事謂王幸御妃嬪之事也九嬪掌婦學之法以教九御婦德婦言婦功婦容各率其屬而以時御于王所言有次序貫魚之寵易貫魚以宮人寵釐降二女于媯汭嬪于虞堯妻舜二女也歸妾燕燕衛莊薑送歸妾也宿有妃嬙嬪御焉左傳吳王夫差三妃舜葬於蒼梧之野蓋三妃未之從也內寵並后亂之本也女史彤管古者后夫人必有女史彤管之法后妃群妾以禮御于君所女史書其環以進退生子月辰以金環退之當御者以銀環進之進之者著于左手既御者著于右手小星詩嘒彼小星三五在東喻衆妾也外戚外戚之功見上注一門三后後漢梁冀家也金穴後漢郭況外戚之富家稱金穴王氏五侯漢元后兄弟王鳳等東漢淪於嬖習女寵肺腑重侯纍將窮貴極富曠貴貴戚瑣瑣姻婭外姻孔高祖皇后高祖順聖皇后竇氏帝在煬帝時多畜善馬后見曰上性樂此盍以獻徒留之速罪無益也不聽頃果坐譴後見隋政亂多妄誅殛乃為自安計敷奏鷹犬異駒煬帝果喜擢將軍因謂諸子曰早用而母言得此久矣言及天下事不對太宗長孫皇后與帝言或及天下事辭曰牝雞司晨家之窮也可乎帝固要之訖不對託體紫宮兄無忌於帝本布衣交以佐命為元功出入臥內帝將引以輔政后因謂不可乘間曰妾託體紫宮尊貴已極不願私親更據權于朝漢之呂霍可以為戒請帝納忠容諫又請帝納忠容諫勿受讒良佐及崩帝謂之慟曰我豈不通天命而割情乎顧內失吾良佐哀不可已並上罪棄為婢高宗廢后王氏囚宮中帝念后間行至囚所見門禁錮嚴進飲食竇中惻然傷之呼曰皇后良娣無恙乎今安在二人同辭曰妾等以罪棄為婢安得尊稱邪流涕嗚咽又曰陛下幸念疇昔使妾死更生復見日月乞署此為回心院帝曰朕即有處置盜威福高宗皇后武氏已得志即盜威福帝亦懦昏舉能鉗勒使不得專長孫皇后曰妾於陛下夫婦之重有所言猶候顏色況臣下情隔禮殊而敢犯嚴顏陳忠言哉立武昭儀李績帝欲立武昭儀為皇后李義府許敬宗又請廢王皇后帝乃召績與長孫無忌于志寧褚遂良計之績稱疾不至帝後密訪績曰將立昭儀而顧命之臣皆以為不可今止矣答曰此陛下家事無須問外人帝意遂定配天地象日月韓瑗王后之廢瑗復諫曰王者立后配天地象日月匹夫匹婦尚知相擇況天子乎詩云赫赫宗周褒姒滅之臣讀至此常輟卷太息不圖本朝親見此禍宗廟其不血食乎帝大怒詔引出承宗廟母天下來濟帝將以武氏為后濟諫曰王者立后以承宗廟母天下宜擇禮義名家幽間令淑者副四海之望稱神祇之意故文王興姒關睢之化蒙被百姓其福如彼成帝縱欲以婢為后皇統中微其禍如此陛下詳察之專恣上官儀初武后得志遂牽制帝專威福帝不能堪又引道士行厭勝中人王伏勝發之帝因大怒將廢為庶人召儀與議儀曰皇后專恣海內失望宜廢之以順人心家不素顯武宗賢妃王氏進號才人帝欲立為后宰相李德裕曰才人無子且家不素顯恐詒天下議乃止房玄齡譴太宗皇后長孫氏及大漸與帝訣時房玄齡小譴就第后曰玄齡久事陛下預奇謀祕計非大故願勿置也施帷殿上預聞政事桓彥範中宗復位上書戒帝曰伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古帝王謀及婦人皆破國亡身傾輈繼路且以陰乘陽違天也以婦凌天違人也違天不祥違人不義伏願上以社稷為重令皇后無居正殿干外朝深居宮掖修陰教以輔佐天子立后許敬宗帝將立武后昭儀大臣切諫而敬宗陰揣帝私即妄言曰田舍子賸獲十斛麥尚欲更故婦天子富有四海立一后謂之不可何哉帝意遂定叩閣上表請立昭儀李儀府為長孫無忌所惡奏斥辟州司馬召未下義府問計於舍人王德儉德儉者許敬宗甥癭而智善揣事因曰武昭儀方有寵上欲立為后畏宰相議未有以發之君能白轉禍為福也義府即代德儉直夜叩閣上表請廢后立昭儀帝悅召見與語賜珠一斗停司馬詔書留復待順宗王皇后性仁順宮中化其德莫不柔雍本傳謹畏深抑外家無毫絲假貸訓厲內職有古后妃風同上夫艷嬖之興常在中主第禱既交則情與愛遷顏辭媚熟則事為私奪乘易昏之明牽不斷之柔險言以忠故受而不詰醜行已效反狃而為好左右附之憸壬惎之狡謀鉗其悟先哀誓揵於寵初天下之事已去而恬不自覺此武韋之所以遂篡弒而喪王室也言傳序姬薑淑媛魏徵曰今姬薑叔媛盡待於側矣宗姓不育魏謨李孝本宗室子誅死其二女沒入宮謨上言陛下即位不悅聲色于今十年未始採擇數月以來梢意聲伎教坊閲選百十未已莊宅收市亹亹有聞今又取孝本女內之後宮宗姓不育寵幸為纍傷治道之本速塵穢之嫌諺曰止寒莫如重裘止謗莫如自修惟陛下崇千載之盛德去一旦之玩好帝即出孝本女以歌舞入內禁中白居易元和四年天子以旱甚居易建言乞多出宮人憲宗頗采納是時于頔入朝悉以歌舞入內禁中或言普寧公主取以獻皆頔嬖愛居易以為不如歸之無令頔得歸曲天子宮人猥積李絳江淮大旱絳言江淮流亡所貸未廣而宮人猥積有怨鬲之思當大出之以省經費閲良家子及別宅婦人教坊使稱密詔閲良家子及別宅婦人內禁中京師囂然絳以吉甫畏不敢諫遂獨上疏帝曰朕以丹王等無侍者比命訪閭里以資致之彼不諭朕意故致譁擾乃悉歸所取後宮師其行德宗配韋氏唐制皇后而下有貴妃淑妃德妃賢妃是為夫人昭儀昭容昭媛修儀修容修媛充儀充容充媛是為九嬪婕妤美人才人各九合二十七是代世婦寶林御女采女各二十七合八十一是代御妻自餘六尚分典乘輿服御后妃傳序開元時以后下復有四妃非是乃置惠麗華三妃六儀四美人七才人而尚官尚儀尚服各三參合前號上禮本夫婦詩始后妃治亂因之興亡繫焉關睢之風行彤史之化修盛德之君帷薄嚴奧裏謁不忓於朝外言不內諸閫關睢之風行彤史之化修淑範懿行更為內助取充職位中葉以降后妃無大過惡取充職位而已楊氏未死玄亂厥謀張后制中肅幾斂衽同上妃嬪媵嬙杜牧阿房宮賦淑麗冠後廷敬宗妃郭氏從旁典籌中宗庶人韋氏初帝幽廢與后約一朝見天日不相制至是武三思升御床博戲帝從旁典籌不為忤爰舉令圖允資內輔韓愈順宗實録人倫之本王化之先爰舉令圖允資內輔外戚成敗視主德何如主賢則共其榮主否則先受其禍故太宗檢貴幸裁賞賜貞觀時內里無敗家高中二宗柄移艷私産亂朝廷武韋諸族耄嬰頸血一日同汙鈌刃玄宗初年法行近親裹表修敕天寶奪明委政妃宗階召反虜遂喪天下楊氏之誅噍類不遺蓋數十年之寵不償一日之慘甲第厚資無救同坎之悲寧不哀哉高竇雖緣外戚姻家然自以才猷結天子廁迹名臣垂榮無窮時有遇合故見諸事業本傳贊竇宗自魏迄唐支胄扶疏數百年所馮厚矣同上外家諸王並封吉頊后命坐頊頓首曰夫皇子外戚有分則兩安今太子再立而外家諸王並封陛下何以知之貴賤親疏之不明是驅使必爭臣知兩不安矣后曰朕知之業已然且奈何請抑母黨武平一時天子暗柔不君韋后蒸亂外戚盛平一重斥語即自請抑母黨上言陛下天性孝愛戚屬外家恩洽澤濡臣一宗陛三等家數侯朱輪華轂過許史梁鄧遠甚且后妃之家恩過寵深一朝覆沒遂無頔類願思抑損之宜長遠之策推遠時權以全親親帝慰勉不許金榜瑤簪武平一請抑損外戚權寵表白魯元平陽烏孫並公主號釐降二女堯妻舜二女見上注何彼穠矣美王姬也雖則王姬亦下嫁於諸侯執婦道以成肅雍之德列侯尚主夫詘於婦漢王吉列侯尚公主諸侯則國人承公主使夫詘於婦非陽尊陰卑之義公主子後漢封公主者所生之子襲母封為列侯皆傳國違天荀悅言尚主之制非古也以陰承如陽違天以婦凌夫違人也和親出降天女帝子鼓瑟於湘水娥皇也仙人吹蕭於秦樓弄玉學吹而鳳皇至遂升仙而去貴主平陽列仙簫史乘龍下嫁隨鳳上升主第宅也車服不繫其夫下王后一等雜令諸王公主及宮人不得親事帳內邑司如客部曲等在市興販及邸店沽賣者出舉後漢館陶公主為子求郎賜錢百萬而不與未嫁教於公宮禮女之車服不繫於夫棠棣之華桃李之色詩皆天子之女容也義絶傍私虔恭正匹漢書駙馬尚公主也公主封邑亦置官屬漢書分國之榮孰敢不敬晉書沁水之園乘綵舟於夜月漢書有公主於沁水立園夏侯楙尚清河公主位至侍中漢公孫賀字敬聲與陽石公主私通董偃與母賣珠於館陶公主家後為公主寵遇彼月斯望在釣惟緡詩天子之女如月之在望詩言以緡釣魚若齊侯之子娶平王之孫也築館於魯春秋帝乙歸妹易王安何彼穠矣美王姬也見上華如桃李王姬之車平王之孫天孫金枝亭公主後漢諸王女皆封亭公主肅宗特封東平王蒼琅邪王京女為縣公主者所生子襲母封為列侯皆傳國鄉亭不傳皇孫公主六孔紫袍玉帶歌舞帝前太平公主則天皇后所生儀鳳中吐蕃請主下嫁后不欲棄之夷乃真築宮如方士薰戒以拒和親事久之主衣紫袍玉帶折上巾具紛麗歌舞帝前帝及后大笑曰兒不為武官何故爾主曰以賜駙馬可乎帝識其意擇薛紹尚之宰相出門下時宰相七人五出主門下同上陳人間利病和政公主代宗立屢陳人間利病國家盛衰事天子鄉納折匕箸干琮尚永福公主主未降食帝前以事折匕箸帝知其不可妻士大夫更詔尚廣德公主薨晉陽公主明達薨年十二帝閲三旬不嘗膳日數十哀因以太子群臣進勉帝曰朕豈不知悲愛無益而不能已我亦不知其所以然有子而寡不得復嫁萬壽公主下嫁鄭皓主每進見帝必諄勉篤誨曰無鄙夫家無忤時事又曰太平安樂之禍不可不戒故諸主祗畏爭為可喜事帝遂詔夫婦教化之端其公主縣公有子而寡不得復嫁求為皇太女魏元忠安樂公主私請廢太子求為皇太女帝以問元忠元忠曰公主而為皇太女駙馬都尉當何名主恚曰山東木強安知禮阿母子尚為天子我何嫌宮中謂母氏阿母子故主稱之元忠固稱不可自是語塞開府置吏元忠輔政袁楚客以書規之曰女有內則男有外傳豈相監哉幕府者大夫之職今公主並開府置吏以女處男職所謂長陰抑陽也而望陰陽不愆風雨時若得乎制公主號宋璟帝嘗命璟與蘇頲制皇太子名與公主號遂差次所封且詔別擇一美稱及佳邑封上璟奏言七子均養詩人所稱今若同等別封或母寵子愛恐傷鳴鳩之平昔袁盎引卻慎夫人席文帝納之夫人亦不敢為嫌以其得長久計也臣不敢別封帝嘆重其賢起祠堂于墓李吉甫德宗時義陽義章二公主薨詔起祠堂于墓百二十楹楹費數萬計會永昌公主薨有司以請帝命減義陽之半吉甫曰德宗一切之恩不可為法昔漢章帝欲起邑屋於親陽東平王蒼以為不可故非禮之舉人君所謹請裁制墓戶以充守奉帝曰吾固疑其冗減之今果然然不欲取編民以官戶奉墳而已吉甫再拜謝取門閥者配帝曰諸女嫁不時而選尚皆由中人厚為財謝乃得遣吉甫奏自古尚主必謹擇其人江左悉取名士獨近世不然帝乃下詔皆封縣主令有司取門閥者配焉上平地生公府張果帝欲以玉真公主降果未言也果忽謂祕少監王迥質太常少卿蕭華曰諺謂娶婦得公主平地生公府可畏也二人怪語不倫俄有使至傳詔曰玉真公主欲降先生果笑固不奉詔天姬天姬之貴唐史公主贊歲茂穠華日新淑問白居易太和公主制皇室淑女突厥傳序動循矩法襄城公主性孝睦勤循矩法帝敕諸公主視為師式慧淑薑慶初傳親平公主慧淑韶悟華陽公主韶悟過人光艷動天下安樂公主下嫁武崇訓光艷動天下侯王柄臣皆出其門嘗作詔箝其前請帝署可帝笑從之與太平公主皆開府而主府官屬尤濫皆出屠販納資售官降墨敕斜封授之故號邪封官就第放赦安樂公主産男滿月中宗韋后幸其第就第放赦舊史傳唐制封戶主三百長公主止六百高宗時太平公主武后所生后始踰制神龍初太平至五千唐宗室尊公主長樂公主下嫁長孫沖帝以長孫皇后所生故敕有司裴齎視長公主而倍之魏徵曰昔漢明帝封諸王曰朕子安得同先帝子乎然則長公主者制有等差渠可越也唐史安平公主劉異將赴鎮安平入辭以異姬入從安平左右皆宮人也上盡記忽見別姬問安平曰此惟何安平曰劉郎聲音上喜安平不妒形於色顧左右曰別與作主人不令與宮娃同處主之甄別防間纖細不遺如此東觀奏記開元後天子敦睦帝妹戶千中宗諸女如之通以三千為限神龍二年閏正月敕公主府設官屬鎮國太平公主儀比親王長寧安樂唯不置長吏餘並同親王宜誠新都定安金城等公主非皇后生官員減半其金城公主以出降吐蕃特宜置司馬至景龍四年六月停公主府依舊邑司唐隆元年六月敕公主置府近有敕總停其太平公主有崇保社稷功其鎮國太平公主府即宜依舊通典皇親七白分寶玉於伯叔之國時庸展親敦敘九族和睦貴親綏族不咸傳昔周公弔二叔之不咸咸和也弔傷也既穆宗枝戚里敦睦之情懷柔之道天孫帝子金枝朱邸貴戚寵弟本枝宗子維城之固盤石之安立愛惟親書君子篤於親則民興於仁雖有周親不如仁人吾宗傳晉吾宗也親親周禮太宰八統馭萬民一曰親親親九族也人道之先親親也立愛自親始教民睦也宗盟周之宗盟異姓為後紏合宗族于成周親不在外羈不在內葛藟王族刺桓公棄其九族也公族朝于內朝內親也玄元仙宗皇家天族本玄祖之靈源分皇家之茂緒紏合符棣華之詩信厚如麟趾之日胏腑劉向曰臣幸託胏腑言國親如胏腑之附身葭莩言輕薄之親也振振公族王入朝侍從漢定陶王入朝盡從傅相中尉時中山王亦來朝獨從傅上怪問定陶王王對曰令云諸侯王朝得從其國二千石故盡從問中山王中山王不能對輦迎答拜後漢東平王蒼既至升殿乃拜天子親答之其後諸王入宮輒以輦迎至省閣乃下蒼以受恩過禮情至不寧上疏辭之公族之教周公踐作庶子之正於公族者教之以孝悌睦友子愛明父子之義長幼之序向方古者庶子之官治而邦國有倫邦國有倫而衆向方矣注言知所向也所以深骨肉之恩厚枝葉之庇麟趾美公子皆信厚如麟趾之時也理親存愛理正也禮記合族戚君禮有合族之道族不得以其戚戚君位也注君恩雖可以下施而族人皆臣不得以父兄之尊加於君也以教睦人禮齒序公族朝于內朝內親也雖有貴者以齒明父子也宗朝之中以爵為位崇德也宗人授事以爵以官尊賢也公與族人燕則以兄弟齒而孝悌之道達矣以至尊不自異於親列之中其族食世降一等親親之殺也殺差也謂燕有差數宗盟傳云周之宗盟異姓為後周人貴親而尚齒禮立敬惟長親親長長先親後疏曹植表曰堯之為教先親後疏理親禮見親疏之殺焉禮君子因族以合食合食謂與族人合食喪紀以服之輕重為序不奪人倫之親公族之刑禮公族有死罪則磬于甸人不於市朝也甸人掌野官也懸縊殺之曰磬也三宥獄成有司讞于公則曰基之罪在辟公曰宥之及三宥不對走出致刑于甸人公及素服不舉也公族無官刑不剪其類也雖金枝可貴三宥必加而玉律難容一成不變宜解網於竹刑無縱斧於葛藟治國制刑不隱其親宜準律論難從刑放傳刑放於寵雖親惟立愛而罪則斷恩威克厥愛義必掩恩私不害公門內之治恩掩義門外之治義斷恩王之同姓有罪則死刑焉周禮甸師注云王同姓有罪者斷其獄於甸師之官凡王之同族有罪不即市周禮注云刑于隱所也議親周禮八辟一曰議親之辟無有不禁月令雖有貴戚近習無有不禁理親禮纖剸禮公族之罪其在纖剸亦告于甸人有致刑于甸人公素服哭之如其倫之喪無服恩雖切於棣華法宜除于蔓草親哭之骨肉之恩無絶孔列第東都讓皇帝憲初帝五子列第東都積善坊號五王子宅及賜第上都隆慶坊亦號五王宅玄宗為太子常製大衾長枕將與諸王共之睿宗知喜甚及先天後盡以隆應舊邸為興慶宮而賜憲及薛王第於勝業坊申歧二王居安坊坊環列宮側為宗室雋宗室涵簡素忠謹為宗室雋從帝桉舞萬歲樓讓皇帝常從帝桉舞萬歲樓帝從復道上見衛士已食棄其餘竇中帝怒詔高力士杖殺之憲從容曰從復道上窺人之私恐士不自安日失大體豈以性命輕於餘食乎帝遽止謂力士曰王於我可謂有急難也不然且誤殺士西土樹神惠莊大子撝初生武后以母賤欲不齒以示浮屠萬回回詭曰此西土樹神宜兄弟后喜乃畜之宗姓無良傾敗相仍褚遂良曰今四方仰德誰弗率者唯太子諸王宜有定分帝曰有是哉朕年五十日以衰怠雖長子守器而弟支子尚五十人心常念焉自古宗姓無良則傾敗相仍公等為我柬賢者保傳之馬周疏曰竊觀今諸將功臣陛下所與定天下無威略振主如韓彭者而諸王年並幼少縱其長大陛下之日必無它心然則萬代之後不可不慮漢晉以來亂天下者何嘗不在諸王皆由樹置失宜不豫為節制以至滅亡人主豈不知其然溺於私愛爾故前車既覆而後車改輒也宗室標的景元子孫當草昧之初乘運而奮方高祖攘除四方所以宣力皆顯顯為世豪英至河間之功江夏之略可謂宗室標的者也唐史贊國初宗室唯道宗孝恭為最賢唐史江夏郡王道宗從秦王討賊王登玉璧城以望謂道宗曰賊怙衆欲戰爾計謂何對曰武周席勝剡然鋒未可當正宜以計摧之且烏合之衆憚持久若堅壁以頓其鋭食盡氣老可不戰擒也王曰而意與我合既而賊糧匱夜引去追戰滅之帝將討高麗道宗請以百騎度遼規形勢約其還曰臣請二十日行留十日覽觀山川得還見天子入賊地相易險度營陳處謁帝如期乃詔與李績為前鋒濟遼拔蓋牟城賊救至道宗與君又領騎才四千虜騎十倍皆欲浚溝保險須帝至道宗曰賊遽來其兵必疲我一鼓摧之固矣昔耿弇不以賊遺君父吾為前君當清道迎乘輿尚何待績善之選壯騎數十突進賊營左右出入績合擊大破之帝乃咨美本傳子弟國之根源吳兢改右補闕節閔太子難姦臣誣安國相王與謀朝廷大恐兢上言文明後呈運不殊帶陛下龍興恩被骨肉相王與陛下同氣親莫加焉今賊臣日夜陰謀必欲置之極法相王仁孝遭荼苦哀毀以陛下為命而自託於手足若信邪佞委之於法傷陛下之恩失天下望芟刈股肱獨任胸臆可為寒心且根朽者葉枯源涸者流竭子弟國之根源可使枯竭哉問子弟孰賢霍王元軌太宗嘗問群臣曰朕子弟孰賢魏徵曰臣愚不盡知其能唯吳王數與臣言未嘗不自失帝曰朕亦器之然卿以為前代孰比對曰經學文雅漢河間東平也至孝行曾閔不能過帝由是遇益厚地尊禮絶永王璘為宗臣表李勉宗祏所托常樂公主曰諸王國懿親宗祏所託王子王孫唐文粹杜牧阿房宮賦忝屬藉許王元名高宗欲授元名大州辭曰臣忝屬藉豈以州郡為仕進資邪周之卿士周召毛原皆同姓也宗室宰相贊周之卿士周召毛原皆同姓也唐宰相以宗室進者九人林甫姦諛幾亡天下其餘號賢宰相秦隋棄親侮賢皆二世而滅周唐任人不疑得親親用賢之道饗國長久子建文筆壯河間經術存杜甫別李義生值聖時蔭分天屬元稹代李中丞謝官表龍種自與常人殊杜甫哀王孫高帝子孫盡高準龍種自與常人殊本枝根株乎萬代杜甫太廟賦帝宗千里駒宗室嵩始為枝江丞荊州長史張東之曰帝宗千里駒吾得其人不倨于貴江夏郡王道宗晚學接士大夫不倨于貴皇子既長分院而居中人押之就夾城參天子起居家宅日進膳引詞學士入授書謂之侍讀唐宗室傳諸孫多則於宅外更置百孫院天子歲幸清宮又置十王百孫院于宮側宮人每院四百餘百孫亦三四十人禁中置維城庫以給諸王月俸少沈敏有識量河間元王孝恭少沈敏有識量進擊朱粲破之俘其衆諸將曰粲徒食人摯賊也請坑之孝恭曰不然今列城皆寇若獲之則殺後渠有降者乎悉縱之由是所至輒下唐本傳進荊湘總管統十二軍發夷陵破銑二鎮縱戰艦放江中諸將曰得舟當濟吾用棄之反資賊奈何孝恭曰銑之境南際嶺左薄洞庭地險士衆若城未拔而援至我且有內外憂舟雖多何所用之今銑瀕江鎮戍見艫舫蔽江下必謂銑已敗不即進即覘候往返以引救期吾既拔江陵矣已而救兵到見船疑不進銑內外阻絶遂降白夾輔藩屏宗子維城之固本枝盤石之安五等開封周乃寵諸兄弟七王建國漢則祚及子孫故周室將遷必依晉鄭之國漢家保定亦因齊楚之功綏麟趾之族廣犬牙之封封建親戚以藩屏周室傳昔周公弔二叔之不咸云云建立子孫藩屏社稷漢書高皇懷柔天下以親屏周傳周之有懿德也猶曰莫若兄弟故封建之其懷柔天下也猶懼有外悔十有五人武王克商建兄弟之國十有五人厚骨肉之恩重山河之誓茅土同姓以封周禮以脤膰之禮親兄弟之國周禮離棄杕杜刺時君不能親其宗族也晉人葛藟王族刺桓王也周室道衰棄其九族道乖綏族義爽篤親昵近昵親也骨肉將離不親九族枝葉將落無庇本根無縱斧於棣華宜庇根於葛藟不迪書今商王受昏棄厥遺王父母弟不迪迪道也言接之不以道也義先立愛仁不遺親遠間親所謂六逆傳小忿傳王將以狄伐鄭富良曰雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何也親離存愛禮晉自驪姬之亂詛無畜群公子自是晉無公族成公即位乃立之將枝葉之有庇豈蔓草之難圖展親將藉於屏周不弟詎同於克段棄親用羇單獻孔議封建蕭瑀帝問瑀朕欲長保社稷奈何瑀曰三代有天下所以能長久者類封建諸侯以為藩屏秦置守令二世而絶漢分王子弟享國四百年魏晉廢之亡不旋踵此封建之有明效也帝納之始議封建名臣講封建始唐興疏屬畢王至太宗稍稍降封時天下已定帝與名臣蕭瑀等喟然講封建事欲與三代比隆而魏徵李百藥皆謂不然杜佑之言曰且立法未有不敝者聖人在度其長短而為之建國之制初若磐石然敝則鼎峙力爭陵也短周有天下裂土田而瓜分之柳封建論周有天下裂土田而爪分之設五等邦群后布履晏羅四周于天下輸運而輻集合為朝覲會同離為守臣扞城然而降中夷王害禮傷尊下堂而迎覲者歷于宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣移書論封建劉晏避地襄王永王璘署晏右職固辭移書房琯論封建與古異今諸王出深宮一旦望桓文功不可致詔拜度支郎中太宗即位舉屬藉問大臣曰盡王宗子於天下可乎封德彝曰漢所封惟帝子若親昆弟其屬遠非大功不王非聖人之意柳宗元封建論是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連率有方伯連率而後有天子自天子至於里胥其德在人者死必求其嗣而奉之故封建非聖人之意也勢也賈誼痛其將亂朝錯憂其必危文粹李翰漢祖呂侯五等論過當啓陵替之端怙強速交爭之兆賈誼痛其將亂朝錯憂其必危卒使諸侯失前朝廷忿忌此其所以為計之非也問鼎之輕重者有之射王中肩者有之柳宗元封建論陵夷迄於幽厲王室東徙而自列為諸侯矣厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇弘者有之天下乖盩無君君之心佘以謂周之喪久矣徒建空名於諸侯之上耳制其守宰不制其王侯同上漢興天子之政行於郡不行於國制其守宰不制其王侯侯王雖亂不可變也國人雖病不可除也黃霸之明審汲黯之簡靖同上漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審睹汲黯之簡靖拜之可也復其位可也臥而委之以輯一方可也有罪得以黜有能得以賞救土崩之難莫如建諸侯削尾大之勢莫如置守宰唐有鎮帥古諸侯比也宗室贊
