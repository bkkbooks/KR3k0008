body:
  text: 卷第六十六白儀禮曰設披披絡棺也孺子沫之喪哀公欲設撥撥可以引柩車所謂紼也弔於葬者必執引若從柩及壙皆執紼廟中曰紼在塗曰引同名玄言傳曰葬敬嬴旱無麻始用葛紼引樞則用之記曰設披周也設崇殷也綢練設旐夏也周禮喪祝掌大喪勸防之事鄭司農云勸防引柩也玄謂勸猶倡率前引者防謂執備傾毀榆沈榆沈置車下則滑而易進孔執紼者禮志一品引四披六二品三品引二披四四品五品引二披二六品至于九品披二二刻掌饌者徹啓奠以出內外俱立哭執紼者皆入掌事者徹帷持翣者升執披者執前後披紼者引輴旌出先纛次主人以下後哭於輴後輴出執紼者解屬於輀車上江出阻越不及歸贈仍乖執紼梁肅為獨孤祭李員外文方俟歸紖再期奠沃柳文祭外生文飾以繽紖寄於高原同上祭弟宗查文棺槨二白子思曰附於身者必誠必信謂衣衾棺槨有虞氏瓦棺周人以葬無服之殤夏后氏即周周人用葬中殤下殤也殷人棺槨周人葬長殤周人牆置翣注牆柳衣也國子高曰衣足以飾身棺周於衣槨周於棺宋文公卒始厚葬槨有四阿四柱槨也棺有翰會會上飾翰旁飾皆僣王者禮也君子謂華元棄君於惡也有棺無槨顏淵死顏路請子之車以為之槨子曰鯉也死有棺而無槨衣衾而舉之言斂也且事難下禮貴建中翰會四阿雖僣而無度桐棺三寸而儉亦難遵漢書堯舜送死桐棺三寸此儉而難遵去其喪具禮喪具君子恥具一日二日而可為者君子不為石槨昔者夫子居宋見桓司馬自為石槨三年不成夫子曰若是其靡也死不如速朽之愈也禮夫子制於中都四寸之棺五寸之槨以斯知之不欲速朽也夫子為中都宰立此棺槨之制大為我棺陳乾昔寢疾屬其子曰如我死則必大為棺禮諸侯大棺八寸屬六寸椑四寸上大夫棺八寸屬六寸下大夫棺六寸屬四寸士棺六寸庶人四寸大棺棺之在表者屬裨小棺也大夫無椑士無屬以等尊卑也棺飾諸侯裏棺用朱緑雜金鑽大夫裏棺用玄緑牛骨鑽士不緑諸侯蓋用漆三衽三束大夫蓋用漆三衽二束士蓋不漆二衽二束鑽子南反諸侯松槨大夫柏槨士雜木槨棺槨之間諸侯容甒因其藏物以尊卑之節傳曰飾棺置諸堂阜諸侯龍輴象荒火三列蔽大夫畫荒火注畫雲氣覆之沐槨孔子故人原壤其母死夫子助之沐槨買棺內外易獻獻成造棺斫子家之棺貶之斫薄其棺不使從卿禮也美檟季文子為己樹六檟於蒲圃東門之外注將自為槨也匠慶取之以葬襄公母死姒氏定姒具棺槨漢貢禹曰臣年八十去家三千里子年十二自痛非在家為臣具棺槨者比山石為槨漢文曰北山石為槨用紵絮陳漆斫其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙無可欲不如此亦何憂也某所木黃霸次公為穎川人鰥獨死無可葬者霸為其區處曰某所木可為棺某亭豬可以祭皆如其言古之葬者厚衣之以薪葬之中野不封不樹後世聖人易之以棺槨蓋取諸大過易審棺槨之薄厚禮旬而布材既殯虞人致百祀之木可以為棺槨者斬之禮傳曰宋公將死曰唯楄柎所以藉幹者楄祔棺中苓床幹髑髏也書曰伯相命士須材成王崩時也須材以終為棺槨調棺趙廣漢為囚調棺皆曰死無恨矣軎轆小棺也詔賜棺而出之晉人圍曹曹人恐為其所得者棺而出之魏舒田於大陸焚焉焚田火也還卒范獻子去其柏槨以其未覆命而田也貶之也魏獻子城成周未歸而田下玉棺後漢王喬為葉縣令後天下玉棺於堂前吏人推排終不擾動喬曰天帝召我乃沐浴服飾寢其中蓋便立覆葬城東土自成墳其夕葉中牛皆喘流汗也孔斂以棺槥劉昌初城平涼將士骸骨不藏始命瘞之具以聞德宗下詔哀痛出衣數百稱官為賽具斂以棺槥營棺槥還葬盧鈞擢嶺南節度使貞元後流放衣冠其子姓窮弱不能自還者為營棺槥還葬分柩護送長安顏杲卿子泉明泉明之殯父與履謙分柩護送長安履謙妻疑斂具儉狹發視之與杲卿等乃號踊待泉明如父負棺入諫賈直言後署師道府屬師道不軌提刀負棺入諫曰願前死不見城之破師道怒囚之豫為冢棺司空圖豫為冢棺五品以上漆棺六品以下但得漆際出酉陽雜俎仙棺元和初建陽縣界山中墜仙人棺棺中脛骨長六尺青瑩如玉土棺壽安之南有上峰甚峻乾符初因雨而圮半壁銜土棺下有木橫亙之木見風成塵而土形尚固邑令滌之泥淚於水粉膩而臘黃剖其中猶倣佛矣骨存焉近代無以上為周身之具者夏后氏聖周殆比是也出高氏闕史蓋棺事則已此志常覬豁杜甫詩天落白玉棺王喬辭葉縣李白詩易棺衾歸骨于河南之陽韓愈女拿壙銘諸葬不得以石為棺槨其棺槨不得雕鏤彩畫戶牖欄檻槨內不得有金寶珠玉杜佑通典炯炯之氣戢於一木劉禹錫祭文五代石昂父平生不喜佛父死昂於柩前誦尚書曰此吾先人之所欲聞也明器三白子思曰凡附於身者必誠必信勿之有悔焉附棺謂盟器也孔子謂明器備物而不可用也其曰明器神明之器也塗車芻靈自古有之芻靈束芽為人馬也為葬備凶器請具葬之器具也子柳之母死子碩詩其也喪具君子恥具一日二日而可為者君子不為也避不懷也不仁不智孔子曰之死而致死之不仁而不可為也之死而致生之不智而不可為也是故竹不成用瓦不成沫木不成斫琴瑟張而不平笙竽備而不和有鍾磬而無簨虡其曰明器示人疑也禮仲憲曰夏后氏用明器示人無知也殷人用祭器示人有知也周人兼用之示人疑也曾子曰其不然乎其不然乎俑者禮孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉注俑備人也有面目似生人也子曰塗車芻靈自古有之孔子善古非周也既殯旬而布材與明器夫明器鬼器也祭器人器也夫古之人孰為而死其親者乎子謂明器知喪道矣備物而不可用生者之器哀哉死者而用生者之器不殆於用人乎哉言似用人也孔不藏孫思邈卒不藏明器芻偶僣侈不法李義甫葬其先轜輴芻偶僣侈不法惟陳墓所唐紹言比群臣務厚葬以俑人象驂眩耀相矜願按令切敕裁損凡明器不許列衢路惟陳墓所五六寓馬李績謂弟弼曰我死明器惟作五六寓馬輕紅輕素曹惠得木偶人能言語自稱輕紅輕素因語惠曰雞角入骨紫鶴喫黃角申不害五通泉室為六代吉昌且曰曉此語者當極貴顯中書令岑文本識三句幽怪録刻木為奴婢酉陽雜俎刻木為屋舍車馬奴婢抵蠱等凡喪葬則供其明器之屬唐六典甄官令別敕葬者供同上注別敕葬者供餘並私備三品以上九十事五品以上七十事九品以上四十事當野祖明地軸延馬偶人其高各一尺其餘音聲隊與僮僕之屬威儀服玩視生之品秩所有以瓦木為之其長率七寸冶金為備唐史文懿公葬冶金為備掌事者陳明器於壙東南西向北上通典挽歌四白傳曰公孫夏命其徒歌虞殯薤露之歌蒿里之辭皆挽歌曲名田氏之門人古今注薤露蒿里並田橫之門人作歌辭喪家之樂孔命挽士唱承天皇帝倓追帝號迎喪既至李泌為挽詞二解追述倓志命挽士唱自製挽歌群臣畢和衛國文懿公主咸通十年薨帝既素所愛自製挽歌群臣畢和帝擇其尤悲者令歌之代宗皇后獨孤氏薨詔群臣為挽詞帝擇其尤悲者令歌之悽愴其聲五代丁會少工挽喪之歌尤能悽愴其聲以自喜哀挽先路柳宗元祭文濁流洋洋有辟其郛公之薨也汴州人歌之曰濁流洋洋有闢其郛闐道歡呼公來之初今公之歸公在喪車韓文董公行狀夢作西施挽歌姚合謂沈亞之曰吾友王生者元和初夕夢遊吳侍吳王久聞軍中出輦鳴笳簫擊鼓言葬西施王悲悼不止立詔問客作挽歌詞生應教為詞曰西望吳王闕雲書鳳字牌連江起珠帳擇地葬金叉滿地紅心草三層碧玉階春風無處所悽恨不勝懷詞進王甚嘉之及寤能記其事出廣異記世說挽歌起於田橫橫死從者不敢哭為歌以寄哀也摯虞新禮議挽歌出於漢武帝役人勞若歌聲哀切遂以送終非古制也工部郎中嚴厚本有挽歌其來尚矣據左氏傅公會吳子伐齊時戰公孫夏卿命其徒歌虞殯示必死也雜俎沈亞之夢為秦公幼女弄玉壻公王死作挽歌應教曰泣葬一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處高樓明月中梨花寒食夜深閉翠微宮哀挽青門外杜甫詩紼謳挽歌起紼謳雜俎白上古不封不樹若斧之封墓形展墓省視庶人葬不為雨止不封不樹制既乖於蒿里辭無聽於莠言槨周於棺土周於槨反壤樹之哉滕公佳城白日之銘佳城鬱鬱三千年睹白日吁嗟滕公居此室卜青鳥之兆青鳥子相家者送子長夜臺泉門隴隧丹鳥銜上成墳舜葬蒼梧相以龍耳貴地出王侯封以馬鬣墓形下不及泉得中嚴母掃墓以待喪嚴延年母見延年嚴酷曰不意垂老見其子受戮吾歸鄉里當掃墓待爾明年果誅古者墓而不墳孔子合葬於防曰古者墓而不墳今丘也東西南北之人也不可以不識於是封之崇四尺高四尺周之士制也蒿里冢纍纍武王封比干之墓高祖護信陵之冢朋友之墓有宿草而不哭焉爾墓之木拱矣秦伯謂蹇叔曰何知中壽爾墓之木拱矣言其老悼也掛劍之樹延陵季子掛劍於徐君墓樹埋玉之泉墓而不墳墓封域也土高曰墳古墓犁為田不食之地託萬鬼之鄰居千年之室卜其宅兆而安周之周禮族墳墓族類也謂同宗之墓死生相近也兆域塋地死於兵者周禮凡死於兵者不兆域凡有功者居前丘封以爵等為丘封之制與其樹數墓位墓域族葬以親相近度數貴賤之制塋丘壟之小大高卑薄厚之度貴賤之等級為宮室不斬丘木廣敬也周禮冢人掌公墓之地位辨其兆域而為之圖先王之墓居中以昭穆為左右諸侯居前卿大夫士居後有功居前以爵節為丘封之度也趙文子曰武也得從先大夫於九原記原字作京哭墓子路曰去國哭墓而行反國不哭展墓而入墟墓之間未施哀於民而民哀周禮曰云云易墓非古也易除治之孔子曰吾見封之若堂者矣見若覆夏屋者矣見若斧者矣吾從若斧者焉省功而難上也馬鬣封之謂也以當時名解若斧者墳墓不培偃斧葬夫子於泗水之上其樹若偃斧禮賢者墓戰國策昔秦攻齊有令敢近柳下惠壟五十步樵者死得齊王首封萬戶以此貴也牧童採樵雍門周謂孟嘗君墳墓坐荊棘童兒採樵於其上也燕銜泥漢臨江王自殺葬藍田燕數萬銜泥置於冢上顏淵曰過墓則式京兆阡原氏阡原涉大治起冢初京兆尹曹氏葬茂陵人謂其道為京兆阡涉慕之乃買地開道立表署之曰南陽阡人不肯從謂之原氏阡涉父為南陽守象祁連山霍去病起冢云云立鳥象後漢楊震將葬之日有大鳥高丈餘集喪前俯仰泣下葬畢方去遂立鳥象於墓前盜發冢晉太樵中汲郡盜魏王墓或言安釐王墓得竹書數十車皆簡編科斗文字束皙為著作隨宜分析皆有冥諡墓發去官晉何充為會稽守以墓發去官儒以詩禮發冢莊子云土壤自高宗窮孝子傳曰宗承字世林父葬舊塋負土作墳不役僮僕一夕之間土壤自高五尺松竹生焉盜耕墓田律盜耕人墓田杖一百墳者徒一年盜葬人田律盜葬它人田者笞五十墓田加一等仍令移葬燻燒律賊盜律諸穿地得死人不更埋及墓以狐狸而燒及棺槨者徒二年燒尸者徒二年緦服以上尊長各遞加一年卑幼依兄人遞加一年盜墓樹後漢李充母死盜伐其墓樹殺之張釋之曰盜長陵一柸土云相墓地折臂三公晉有相羊祜墓常有受命者祜掘斷地勢以壞其形相曰當出折臂三公俄而祜墜馬折臂位至三公地失牛陶侃微時丁艱將葬忽失牛見一老父曰前岡見一牛伏山塢中其地葬者位極人臣父又指山云其次也世出二千石言訖不見侃尋牛得因葬其處三世為益州刺史龍耳晉文帝聞郭璞為人相地微服觀之謂主人曰此葬龍角必滅族何為葬此主人曰郭璞云此是龍耳三年當有天子至帝曰出天子邪主人曰非出天子能致天子也三書生後漢袁安父歿求葬地有書生指一處云葬此地當世為三公果如其言耳公孫文子升於瑕丘曰樂哉斯丘也我死則欲葬焉蘧伯玉曰吾子樂之則瑗請前惡其欲害人田也卜其宅兆而安厝之青烏子相冢旁置萬家韓信母喪無葬地乃出塋地擇高燥令旁可置萬家孔負土李昭德母卒負土成墳掃除王琚母讓琚曰吾恐爾家墳墓無人復掃除也復真堂姚勖終夔王傳自作壽藏於萬安山南原崇塋之旁署兆曰寂居穴墳曰復真堂中剟土為床日化臺而刻石告後世高五丈一尺宋璟邢州人和人皇后父王仁皎卒將葬用昭成皇后家竇孝諶故事墳高五丈一尺璟等請如著令魚朝恩使人發郭子儀父墓郭子儀破吐蕃靈州而朝恩使人發其父墓盜未得子儀自涇陽來朝中外懼有變及入見帝彥之即號泣曰臣久主兵不能禁士殘人之墓今發先臣墓此天譴非人患也不容終具韋弘機遷司農卿太子弘薨詔蒲州刺史李沖寂治陵成而玄堂隘不容終具將更為之役者過期不遣衆怨夜燒營去帝詔弘機令開隧左右為四便房撙制禮物裁工程不多改作如期而辨無碑神道李夷簡將終戒無碑神道惟識墓則已詔特增丈郭子儀薨著令一品墳崇丈八尺詔特增丈以別元功不知父墓杜羔父死河北不知父墓區處晝夜哀慟它日舍佛祠觀柱間有文字乃其父臨死記墓所在羔奔往亦有耆老識其壟因是乃得葬伊謹喪母將合葬而不知父墓晝夜哭夢若有導者既發之舊志可按也乃得葬分建二冢劉昌城平將士骸骨不藏始命葬之分建二冢大將曰旌義冢士曰懷忠冢盜發父墓柳仲郢為東都留守會盜發父墓棄官歸華原無異子弟為主柳宗元詒許孟容書曰先墓在城南無異子弟為主獨託村鄰歸掃塋域又曰雖不敢望歸掃塋域退託先人之廬以盡餘齒姑遂少北殘齮趙犨有射巢之難以先冢邇賊畏見殘齮即夜縋死士取柩以入手蒔松柏張志寬母終負土成墳手蒔松柏豫為墓偃臥其中盧照鄰豫為墓偃臥其中詔墓視陵盧粲武崇訓死詔墓視陵制粲曰凡王公主墓無稱陵者唯永泰公主事出特制非後人所援比崇訓塋兆請視諸主詔曰安樂公主與永泰不異崇訓於主當同穴為陵不疑粲固執以陵之稱本施尊極雖崇訓之親不及雍王雍墓不稱陵崇訓緣主而得假是名哉詔可起大冢李翰所善張巡死節翰傳巡功狀表上之曰巡身首分裂將士骸骼不掩宜於睢陽相擇高原起大冢招魂而葬旌善之義也丘壟頽沒孟浩然張九齡為荊南辟置于府府罷開元未病疽背卒後樊澤為節度使符載以箋叩澤曰故處士孟浩然文質傑美殞落歲久門裔陵遲丘壟頽沒永懷若人行路慨然前公欲更築大墓闔州縉紳聞風竦動而今外迫軍校內勞賓客牽耗歲時或有未遑誠令好事者乘而有之負公夙志矣澤及更為刻碑鳳林山南封寵其墓昨日玉魚蒙葬地早時金碗出人間杜甫詩積善之墓唐張說嘗自作父丹州刺史碑帝書其額曰嗚呼積善之墓松檟柳宗元啓不得歸奉松檟營墓李適勒其子曰霸陵原西視京師吾樂之可營墓樹十松焉及未病時衣冠往寢石榻上置所撰九經要句及素琴于時士貴其達少喪母失墓呂向少喪母失墓所在將葬巫者求得之七仞李密墳高七仞女媧墓自稱五行志天寶十一載六月虢州閺鄉黃河中女媧墓因大雨晦冥失其所在至乾元二年六月乙未夜濱河人聞有風雷聲曉見其墓踊出下有巨石上有雙柳各長丈餘時號風陵堆占冢墓自移天下破古冢楚馬希隱希聲葬長沙夌鄉塋域高燥時皆謂之古冢子孫當有興者出九國志古藏三四塋韓文萬日墳杜牧作韋溫志溫瘍生於首謂其壻曰豫作祕書日夢黃衣攝去道逢人告曰彼墳至大功須萬日遂寤今萬日矣果不起舊志可按見上注蒔松柏墓側土義方既死門人員半千何彥先行喪蒔松柏墓側三年乃去負土馬府君行狀親負土封其墓廬墓側植松柏終喪同上蛇長二丈江南野史彭玗楊行密掘其祖墳陵唯見蛇長二丈許目未開遂殺之玗亦死乃此投弔荒墳將毀李白日月有時歸合塋封韓文新阡絳水遙杜甫武衛將軍挽歌象陰山李績薨詔百官送至故城西北所築墳一准衛霍故事象陰山及烏德鞬山以旌破突厥薛延陀之功貞觀四年禁芻牧於古明君賢臣烈士之墓者開元十三年幸孔子宅以太牢祭其墓玄宗本紀金食其墨而火以貴趙矜歷襄陽丞客死柳州十七年子來章始壯自襄陽往求其喪不得野哭再閲旬卜人秦誗為筮曰金食其墨而火以貴其墓直丑在道之右南有貴神冢土是守宜遇西人深目而髯乃得其實明日有老人過其所問之得矜墓直社北遂歸葬洪安墓次時人哀來章孝皆為出涕昔人豪貴信陵君今人耕種信陵墳李白漢朝陵墓對南山杜甫燕女墳燕女墳記宋木有女姚玉京室有雙燕一為鷙烏所獲其一孤飛不離庭戶北六七歲玉京死燕來周回姚氏族泣語墳在南郭燕至墳所亦死纍纍冢相當杜甫詩哀彼遠征人去家死路旁不及父祖塋纍纍冢相當枯冢襄上詩淒其望呂葛不復夢周孔濟世數嚮時斯人各枯冢蕪沒汶陽瘞八哀詩子孫百代承靈址誰之言者青烏子柳文松柏芊芊封域安安上問於靈龜閟此顯魂上墓久狐兔鄰杜甫修墓禁袁滋先世墳墓在蔡吳少陽時為修墓禁芻牧殯宮空對棠梨花酉陽雜俎于襄陽在鎮時選人劉某入京逢一舉人年二十許言語明晤意甚相得劉因邀藉草同飲日暮舉人指支徑曰弊止數里能左顧乎劉辭以程期舉人因賦詩流水涓涓芹吐芽織烏雙飛客還家荒村無人作寒食殯宮空對棠梨花至明年劉歸襄州尋訪舉人殯宮存焉野無殯宮盧子駿劉公善政述悵望龍驤塋杜甫詩白有司旌門後魏楊弘三歲父母卒弘恨不識父母哀毀過禮追服十三年縣郡三百餘人上狀稱善有司奏宜旌賞復其一門旌其純孝太守表墓安誠記縣有孝子孝聞天下太守王府君樹雙土闕以表墓旌善情因哀見名以孝聞封比千墓武王入商旌賢者孔著表序始末揭陵太宗順聖皇后長孫氏崩帝自著表序始末揭陵左琢石為人馬立墓前秦叔寶陪葬昭陵太宗詔有司琢石為人馬立墓前以旌戰功斫石為人馬象拔箭狀丘行恭貞觀中詔斫石為人馬象拔箭狀立昭陵闕前以旌武功築闕李靖其妻卒詔墳制如衛霍故事築闕象鐵山積石山以旌其功忠臣之門馮元常神龍中旌其家大署曰忠巨之門旌禮其閭霍王元軌王文操者與賊戰敗二子鳳賢更以身蔽父得金二子死元軌上其事詔贈鳳賢朝散大夫旌禮其閭有紫芝白雀之祥楊炎父喪廬墓側號慕不廢聲有紫芝白雀之祥詔表其閭炎三世以孝行聞至門立六闕古所未有地本卬燥泉忽湧流安金藏母喪葬南闕口營石墳晝夜不息地本卬燥泉忽湧流廬之側季冬有華犬鹿相擾本道使上其事詔表闕于閭父卒被髮徒跣趨喪所武弘度父卒被髮徒跣趨喪所負土築塋晨夕號日一溢米素芝産廬前狸擾其旁高宗下詔褒美旌其門張志寬母終負士成墳高祖表其閭白儀禮聘禮東面北上碑南宮必有碑所以識日景引陰陽也檀弓曰公室視豐碑言視時僣天子豐碑斫大木為之形如石碑於槨前後四角豎之穿於中間為轆轤通下棺以其縴繞之天子六縴四碑諸侯四縴二碑夫鼎有銘此孝子孫之心也唯賢者能之銘者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名焉顯揚先祖所以崇孝也君子觀於銘既美其所稱又美其所為故衛孔悝之鼎銘曰六月丁亥公假於太廟公叔曰父乃祖莊叔左右成公云云為先祖者有美焉有好惡焉銘之義稱美不稱惡先祖無美而稱之是誣也有美而不知不明也知而不傳不仁也三者君子所恥也夫銘者一稱而上下皆得焉上謂光揚先祖下謂成順命也無愧後漢郭林宗卒于家同志者共為碑蔡雍為其文既而謂盧植曰吾為銘多矣皆有愧唯郭有道碑無愧也刊石姜肱弟子劉追慕肱德共刊石頌之禰衡讀蔡雍所作碑衡與黃祖子射共讀曰吾雖一覽猶能識之唯其中石缺二字更不明耳因書之射寫碑校不差莫不歎服王粲讀道邊碑與人同行使背誦之不失一字好辭曹操與楊修讀曹娥碑碑陰有八字曰黃絹幼婦外孫虀臼修解得操行三十里乃悟云黃絹色絲也色絲絶字也幼婦少女也少女妙字也外孫女子也女子好字也虀臼受辛也受辛辭字也絶妙好辭與修合操曰有智無智校三十里墮淚晉書襄陽百姓於峴山羊祜平生遊憩之處建碑立廟望冥碑者莫不流涕因名為墮淚碑沉江杜元凱好為身後名常言高岸為谷深谷為陵刻二碑紀平吳功一沉峴山江下一建立峴山上碑生金郭璞謂庾翼曰碑生金庾氏太忌後碑果生金又晉五行志永嘉九年賈逵碑生金所謂金不從革群寇起也拜碑扶風王駿西土為樹碑長老見碑無不拜其遺愛如此立碑令喪葬令諸碑碣其文須實録不得濫有褒飾五品以上碑螭首龜趺趺上高不得九尺七品以上立碑趺高四尺圭首方趺若隱淪道素孝義聞著無官得立孝父鼎銘曰一命而僂再命而傴三命而俯循牆而走亦莫豫敢侮饘於是粥於是以糊其口孔子之喪公西赤為識焉識名志也子張之喪公明儀為識焉碑披文而相質文賦門人立碑晉庾袞叔褒清白異行不降志及卒宗族鄉閭莫不崇重門人感慕為樹碑孔自為墓李栖筠自為墓民帝作文于碑魏徵薨晉王奉詔致祭帝作文于碑遂書之什所為碑後人言徵嘗録前後諫爭語示史官帝滋不悅什所為碑復立遼東之役軍還悵然曰魏徵若在吾無此行耶復立碑著官號月日盧承慶臨終戒其子曰碑志著官號月日無用虛文有唐忠孝韓長山墓韓思復率天子親題其碑曰有唐忠孝韓長山之墓古園陵不立碑韋湊開元初欲建碑靖陵湊以古園陵不立碑又方旱不可興工諫而止納石壤下銘君之績納石壤下祭張署帝為製碑張說卒帝為製碑長於碑志說為文屬思精壯長於碑志世所不建自為其父碑說嘗自為其父碑帝為書其額曰嗚呼積善之墓官為立碑盧懷謹帝經其墓碑表未立停蹕臨視泫然流涕詔官為立碑令中書侍郎蘇頲為文帝自書不志蘇頲詔立諸陵碑命頲為之詞辭曰前世帝后不志碑事弗稽古謂之不法審當可者祖宗諸陵一須營立後嗣謂何帝不納其言紀功郭知運卒帝詔中書令張說紀其功於墓碑自銘其墓辛祕病自銘其墓自為墓銘柳子華預知其終自為墓銘自為銘裴度臨終自為銘志自為墓志杜牧自為墓志齎金帛往請李華晚不甚著書惟天下士大夫家傳墓版及州縣碑頌時時齎金帛往請乃強為應沈亞之夢為秦公主作墓銘異夢録大和初沈亞之之邠出長安城客橐泉邸舍春時晝夢秦穆公曰謂寡人有愛女容而仁欲與大夫備灑掃可乎後一年春公主如平居時忽無疾卒公追傷不已使亞之作墓詩獨憶其銘曰白楊風哭兮石甃髯莎雜英滿地兮春色煙加朱愁粉瘦兮不主綺羅深深埋玉兮其恨如何碑版有殘銘李白自志歐陽矩自志墓鵲巢苗晉卿自為父碑文有鵲巢碑上帝親碑司馬承禎卒帝親文其碑云韋溫冢銘韋溫睿宗夷玄貞洵墳墓民盜取寶玉略盡天寶九載復詔發掘長安尉薛榮先往視冢銘載葬日月與發冢日月正同而陵與尉銘合率婦孫視窆封且刻其語於石納諸墓為銘韓文乳母墓多銘卿大夫功德公既以能為文辭擅聲於朝多銘卿大夫功德韓文權公墓碑虞八白記曰既封主人贈所以幣送死者於曠而祝宿虞尸祝先歸也既反哭主人與有司視虞牲省牲有司以几筵舍奠于墓左反日中而虞葬日虞不忍一日離也是日也以虞易奠卒哭曰成事祭以吉也以吉祭易喪祭卒哭為士祭明日祔于祖父祭告其祖之廟殷練而祔周卒哭而祔孔子善殷期而神之大功者主人之喪必為之再祭朋友虞祔而已上大夫之虞也少牢卒哭成事祔皆太牢下大夫之虞也特牲卒哭成事祔皆少牢反哭之弔哀之至殷既封而弔周卒哭而弔孔子曰殷已愨吾從周士三虞大夫五諸侯七迎精而反謂反哭虞也始虞用柔日柔日陰陰靜也再虞如事哀薦虞事丁日葬則巳日再虞三虞卒哭他用剛日後虞改用剛日剛陽陽主動葬日中而虞不忍一日離也不忍無所歸大夫祔於士不敢以己尊異其相父士不祔大夫不敢僣尊祔於父兄之未為大夫者妾祔於妾祖姑無妾祖姑則從昭穆之妾婦祔於所祔之妃無妃則從其昭穆之妃男子祔於王父則配女子祔於王母則不配配謂並祭也王母不配祭有事於尊可及卑有事於卑不敢援尊也婦祔於祖姑祖姑有三人則祔於親者謂有夫之繼母速反而虞孔子善衛之送葬者其往也如慕其反也如疑子貢曰豈若速反而虞先重後輕並有喪則葬先輕而後重其虞則先重而後輕孔葬畢而虞王彥威憲宗以正月崩有司議葬用十二月下宿彥威建言葬畢而虞虞而卒哭卒哭而祔皆卜曰今葬卜歲暮則畢祔在明年正月是改元慶賜皆廢矣有詔更用五月廟門外文粹權德輿埋瘞議古者貴祖埋虞主於廟門之道左以為比類長尺方四寸唐志虞主用桑長尺方四寸孔徑九分烏漆匱置於靈坐在寢室內戶西東向素几在右設洗於西階西南瓦甒二設於北牖下醴酒在東喪者既汰升靈所主人及諸子倚伏於戶外入哭于位饌入主人跪奠祝跪讀祝主人哭拜內外應拜者皆哭拜乃出杖降西階還次間日白易名禮衛公叔文子卒其子戊請諡於君曰日月有時將葬矣請以易其名者君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國社稷不辱者不亦文乎故謂夫子貞惠文子死而諡之無爵禮古者生無爵死無諡周道禮幼名冠字死諡周道也暴貴禮君子已孤不更名己孤暴貴不為父作諡注作諡嫌以己尊加於人也聞其諡知其行將葬請諡見上注尊名浮行禮先王諡以尊名節以一惠恥名之浮於行也注惠善也節以一善言取其一夫善以為諡號也浮過也所以彰明既往沮勸將來為靈若厲傳楚恭王請大夫曰是以不德亡師於鄢以辱社稷若從先君於禰廟請為靈若厲言加惡諡也既葬大夫謀諡曰王有命矣子囊曰以為恭若何毀之君臨楚國而知其過可不謂之恭乎不暝傳楚商臣弒其父諡之曰靈不暝曰成乃暝注禮既葬乃諡商臣忍人既弒父未斂而加惡諡賜諡周禮太史掌卿大夫喪死諡讀誄儀禮死而誄之今也古者生無爵死無諡古殷禮也周制以士為爵死猶未諡下大夫也今既云士死諡之非魯莊公始也賤不誄貴幼不誄長唯天子稱天以誄之諸侯相誄非禮也魯哀公誄孔子曰昊天不弔不憖遺一老俾屏余一人以在位子貢曰生不能用死而誄之非禮也士之有誄禮魯莊公與宋戰于乘丘縣賁父御卜國為右馬驚敗績公墜左單授綏公曰未之卜也縣賁父曰他日不改績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪遂誄之士之有誄自此始也諡以德成榖梁傳諡法云大行受大名小行受小名行生於已名生於人文質白虎通諡者或一言或兩言文者以一言為諡文王武王是也質者成湯是也君子謂楚子囊忠君薨不忘增其名謂諡君為恭事見上靈若厲注中孔非大號不稱讓皇憲葬帝以憲實推天下有高世之行非大號不稱乃追諡讓皇帝諡良皇甫無逸徙益州大都督府長史母在長安疾篤大宗命馳驛召還承問憂季不能食道病卒贈禮部尚書諡曰孝王圭駁曰無逸入蜀不能與母俱留卒京師子道未足稱不可謂孝乃更諡良進諡奉天皇帝琮薨肅宗立詔曰靖德太子琮親則朕兄睿哲聰明朕昔踐儲極顧誠非次君父有命不敢違永言懇讓不克如素宜進諡昭夷先生趙元卒其反魏元忠孟詵宋之問崔璩等共諡昭夷先生改諡貞褊肅瑀卒太常諡曰肅以其性忌改諡貞褊孝友先生朱仁軌卒郭山惲員半千魏知古共諡為孝友先生加諡韋湊時改葬故太子重俊有詔加諡湊上言王者發號出令必法大道善善著惡惡明也賞罰所不加則考行立諡以褒貶之晉太子申生諡曰恭漢太子據諡曰戾今太子乃諡節閔臣所未諭願與議諡者質於御前使臣言非耶甘鼎鑊之誅申大義示天下臣言是耶咸蒙冰釋不復異議如曰未然奈何使後世亂臣賊子資以為辭宜易諡以合經禮無愧裴子餘卒諡曰孝時程行諡貞中書令張說嘆曰二諡可無愧矣無請諡令狐楚疾甚敕諸子曰吾生無益於時無請諡表德懲惡李虞仲遷太常博士建言諡者所以表德懲惡春秋褒貶法也茆士爵祿僇辱流放皆緣一時非以明示百代然而後之所以知其行者惟諡是觀古者將葬請諡今近或二三年遠乃數十年然後請諡人歿已久風績湮歇採諸傳聞不可考信誄狀雖在言與事浮臣請凡得諡者前葬一月請考功刺太常定議詔可諡孝韋溫卒諡曰孝私諡元結卒門人私諡曰太先生文行元德秀卒李華諡曰文行先生貞孝權皋元和中諡為貞孝貞文孝父崔元翰卒門人共諡曰貞文孝父門人共諡曰文元蕭穎士死門人共諡曰文元先生以故名請諡呂諲永泰中嚴郢以故吏請諡有司博士獨孤及諡曰肅郢以故事宰相諡皆功名請諡曰忠肅及執奏謂諡在義美惡不在多名為誄揭于道張琇人莫不關之為誄揭于道士為作誄何澄粹池州人親歿以毀卒當時號青陽孝子士為作誄甚衆誄者數十人文粹李商隱華山尉陶生有常人也會昌中死長安中進士為陶生誄者數十人雖敗而其忠可録張伯儀卒既請諡博士李吉甫議以中興三十年而兵未戢者將帥養寇藩身也若以敗亡為戒則總干戈者必圖萬全而不決戰若伯儀雖敗而其忠可録遂諡曰忠不當醜諡宋慶禮卒太常博士張星以好巧自是諡曰專禮部員外郎張九齡申駁曰慶禮國勞臣在邊垂三十年往城營州士才數千無甲兵彊衛指期而往不失所慮遂罷海運收歲儲邊亭晏然其功可推不當醜諡改諡敬唐興參用漢制魏徵以王道佐時近文愛君忘身近貞二者並優廢一不可故曰文貞蕭瑀端直近貞性多猜近褊言褊則失貞稱貞則遺褊故曰貞褊蓋有為為之也若跡無異稱則易以一字故杜如晦曰成封德彝曰明王圭曰懿陳叔達曰忠溫彥博曰恭岑文本曰憲韋巨源曰昭皆當時赫赫居宰相位者諡不過一名而言故事宰相必以二名固所未聞呂諲傳諡曰貞肅杜暹卒太常諡曰貞肅右司員外郎劉同升等以暹行忠孝諡有未盡博士裴總謂暹往以墨縗受命安西雖勤勞于國不得盡孝其子列訴帝更敕有司考定卒諡貞孝太常博士凡王公以上諡皆跡其功德而為之褒貶無爵稱子卷德丘園聲實明著則諡曰先生唐六典白原涉顯名漢元涉先廬冢三年由是顯名京師馴擾兔連理木後漢蔡雍母卒廬于墓側動靜以禮有兔馴擾其房室又木生連理手刃盜樹李充母喪服行墓次有人盜其樹者充手刃之生子陳蕃為樂安太守郡人趙宣葬親不閉埏隧因居其中行服二十年鄉里稱孝以薦蕃蕃請與相見問及妻子而宣五子皆服內所生蕃大怒遂致罪也兄墓馬援兄卒期年不離墓所猛獸馴晉夏方廬墓側猛獸馴其旁殷仲堪子仲堪為桓玄所殺子簡之廬墓側鹿犯松裁獸為殺鹿許孜事見孝門注精誠有感鳥銜土以成墳顏氏哭泣無時柏沾涕而變色王褒開白日之銘已從十宅軫聞雷之痛未忍離情情因喪見名以孝聞念劬勞之德難報棘心慘毀瘠之容長居高里既孝因喪見而哀以禮終孔表異其門薛萬備有至行居母喪廬墓前太宗詔表異其門植松柏千餘蔣挺之卒列兄弟廬墓側植松柏千餘兄弟廬墓崔從山南嚴震府為推官以母喪免兄弟廬墓手執松柏母卒廬墓李昭德母卒廬墓側偃廬柴毀膠東君王道彥父喪荷土就墳躬蒔松柏偃廬柴毀雖親友不復識廬墓有虎狼依張士巖父亡廬墓有虎狼之依廬守日一食焦懷肅母終負土成墳廬守日一食杖然後起繼母沒亦如之白鵲上廬傍支叔才母亡廬墓有白鵲上廬傍廢櫛沐飯蔬飲水元讓母終廬墓次廢櫛沐飯蔬飲水穿壙為門梁文貞少從軍守邊建還親已亡即穿壙為門晨夕灑掃廬墓左會官改新道出文貞廬前行旅見之皆為流涕有甘露降塋木白兔馴擾縣令刊石記之廬塋許法謹倉州清池人母喪嘗廬于塋有甘露嘉禾連理白兔之祥自埏甓作冢廬其石林攢泉州莆田人母亡自埏甓作冢廬其右有白烏來甘露降露芝白兔馮子華廬親墓露芝白兔號孝馮家群鹿馴擾褚無量母喪廬墓左鹿犯所植松柏無量號訴曰山林不乏忍犯吾塋樹邪自是群鹿馴擾不復振觸築闕劉知柔居親喪墓廬側詔築闕表之寒暑在廬捧土濡涕頓首成墳陷膺腐眥寒暑在廬柳宗元安豐孝闕銘過制而不除喪宜廬于庭而矯於墓者大中之罪人也柳宗元廬冢彌年崔衍居父喪跣護柩行千里道路為流涕廬冢彌年食不鹽酪藉無茵席元德秀母亡廬母墓側食不鹽酪藉無茵席割乳廬墓五代何澤五代之際民苦於兵往往因親疾以割股或既喪而割乳廬墓以規免州縣賦役廬墓三十年唐史韓思彥客汴州張僧徹者廬墓三十年詔表其廬請思彥為頌載左腕廬于墓張進昭母患狐刺左手墮而終及殯進昭左腕廬于墓敦遣李晟薨訴與憲廬墓側德宗敦遣歸第一夕復往帝許之白葬殤見葬門媒氏禁嫁殤者周禮魯與齊戰于郎童汪錡往皆死焉魯人欲勿殤問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤不亦可乎汪童子未冠之稱以其死社稷故葬以成人之禮禮殤不備祭不立尸凡祭殤有陰厭有陽厭宗子為殤而死庶子不為後也其告祭特牲宗子從成人也凡殤則特豚祭殤不舉無肵俎無玄酒不告利成此其無尸反所降也其他如成人舉肺脊肵俎利成禮之施於尸也是謂陰厭是宗子為殤祭之奧之禮也小為殤其祭祀亦如此凡殤無後者祭於宗子之家當室之白尊于東房是謂陽厭凡殤謂庶子適子也白謂西北隅得尸明也明者曰陽也祭殤必厭厭飫而已不備禮也丈夫冠而不為殤婦人笄而不為殤下殤用棺衣自史佚始也棺斂於宮中史佚有子而死下殤也墓遠召公謂之曰何以不棺斂於宮中史佚曰吾敢乎哉召公言於周公周公曰豈不可史佚行之下殤用棺衣自史佚始也孔長中下殤禮志大功長殤九月中殤七月小功五月下殤無服之殤後蜀孟昶幼子玄寶生七歲而卒太常言無服之殤無贈典昶問李昊昊曰昔唐德宗皇子評生四歲而卒贈楊州大都督封肅王故事也昶乃贈玄寶青州大都督追封遂王小功之服最多親則叔父之下殤與嫡孫之下殤與昆弟之下殤韓文古殤及無後皆祔食於祖無祝而不拜設坐祖左而西向亞獻者莫祝乃奠之一獻而止禮樂志三凡殤無後以周親及大功為斷同上譎殤子以為耋皮日休正俗國殤之文則大雅怨也文粹陳子昂序祥十二白練而慨然祥而廓然親喪外除日月已竟哀未忘也免喪之外除喪三年之喪二十五月而畢豈不以送死有已復生有節哉復生除喪反生者之事也哀痛未盡思慕未忘然而服之以是斷之三年之喪若駟之過隙言疾喪有四制變而從宜取之四時祥之日鼓素琴示人有終也以節制也服從情殺哀以禮終孔子既祥五日彈琴而不成聲十日而成笙歌祥肉顏淵之喪饋祥肉孔子出受之入彈琴而後食之注彈琴以散哀也子夏既除喪見孔子與之琴和之而不和彈之而成聲作而曰先王制禮不敢不至焉子張既除喪而見孔子與之琴和之而和彈之而成聲作而曰先王制禮不敢不也能以孝終孝無終始喪有祥禫喪不過三年示民有終也哀極終堂禮及過隙去喪無所不佩朝祥暮歌魯人有朝祥而暮歌者子路笑之夫子曰由爾責於人終無已夫三年之喪亦已久矣子路出夫子曰又多乎哉踰月則其善孟獻子禫縣而不樂比御而不入夫子曰獻子加於人一等矣有子既祥絲屨組纓非禮也是月禫徙月樂言禫之明月可以樂喪服常讀樂章小祥中祥也亦曰練練而食菜果祥而食肉禫而從御御婦人也孝自中出喪以外除祥雖除服憂且終身雖送終之有已豈孝思之可忘士虞禮期而小祥祭名祥吉日祭薦此常事又期而大祥曰薦此祥事中間月而禫禫祭名與大祥間一月自喪至此凡二十七月禫之言淡淡然平安之意也大祥吉服而筮尸几變除必服其言服以即祭不以凶服間吉事傳曰大祥素縞麻衣記曰祥而縞冠縞冠素純除成喪者祭以縞冠猶未純吉既祭乃大祥素縞麻衣既祭乃服朝服既祭玄端而居服平常喪小記曰庶子父在則為母不禫父厭曾子問曰小祥者練祭而不旅奠酬於賓賓不舉禮也奠無尸虞不致爵大祥無算爵昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬不舉亦非禮也昭公失早孝公失過禫而纖無所不佩孔王元感著論元感濮州鄄城人初著論三年之喪以三十有六月譏詆諸儒鳳閣舍人張東之破其說祥而廓然哀傷已劇大抵子於親喪有終身之痛創巨者日久痛深者愈遲何歲月而止乎故練而慨然悲慕未盡而踊劈之情差未祥而廓然哀傷已劇而孤藐之懷更劇此情之所致寧外飾哉縞帶唐王元感祥則縞帶素紕白忌日必哀禮忌日不樂朔月忌日即歸哭于宗室大夫士居喪者君子有終身之憂忌日之謂也忌日不用非不祥也言夫忌日志有所至而不敢盡其私也不用不舉事也祥善也志有所志思親亡之時哀慕王修罷社修母社日死明年社日修號慕鄉里悲之為之罷社不食申屠蟠至忌日三日不食辭酒孔匿忌日祝欽明以匿親忌日為蕭至忠劾貶申州刺史作五君誄獻張說雅與蘇瑰善時瑰子頲為相因作五君誄獻頲其一紀瑰也候瑰忌日致之私忌不聽誓盧邁改右丞將作監元亙攝祠以私忌不聽誓御史劾之帝疑其罰下尚書省議邁曰按大夫士將祭於公既視濯而父母死猶奉祭祀散齊有大功喪致齊有期喪齊有疾病聽還舍不奉祭無忌日不奉祭無忌日不受誓者雖令忌日與告且古不以家事辭王事今攝祭特命也亙以常令拒特命執非所宜遂抵罪破契丹凱還且獻俘內史武攸宜破契丹凱還且獻俘內史上及善以孝明帝忌月請鼓吹備而不作方慶曰晉穆帝納后當康帝忌月時以為疑荀訥謂禮有忌日無忌月臣謂軍方大凱作樂無縑王綝傳入海日作忌讓國皇帝穆宗親兄不為太后所愛故穆宗越次而讓皇不肯臣穆宗遂造船入海不知其處臨入海時留語四句今刻在玉碑上云小山壓大山全無氣羞見本邦人將身投化外國人以十一月十一日入海日作忌雜家祠部凡國忌日兩京定大觀寺各二散齊諸道士女道士及僧尼皆集於齊所京文武五品以上與清官七品以上皆集行香以退若外州亦各定一觀一寺以散齊州縣官行香應設齊者蓋八十有一州焉唐六典凡遠忌日雖不廢務然非軍期急速亦不舉事餘如常式同上
