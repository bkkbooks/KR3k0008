body:
  text: 卷第九十四白卵既生矣翼而張之載飛載鳴一飲一啄羽族擇木仲尼曰鳥能擇木木豈能擇鳥排虛鳥排虛空而飛三年不鳴齊威王曰有大鳥止于王庭三年不飛飛則沖天三年不鳴鳴則驚人相彼鳥矣猶求友聲出自幽谷遷于喬木窮鳥入懷和鳴騫翥羽毛觜距求友籠鳥有山藪之思載好其音有鶯其羽鶯文綵也珍禽羽物周禮獻鳥者佛其首曲禮云云執禽者左手不獝鳳以為畜故鳥不獝獻禽禮曰凡獻禽加於一雙則執一雙以將命委其餘加猶多嫗伏禮羽者嫗伏卵生者不殈殈裂也男贄御孫曰男贄大者玉帛小者禽鳥注云云大夫執鴈士執雉鳥焚其巢易飛鳥遺之音宜下不宜上吉也鳥之將死其鳴也哀鷹鸇之逐鳥雀綿蠻黃鳥止于丘隅于飛集木黃鳥于飛集于灌木鸚鵡能言不離飛鳥養鳥秋官閩隸掌畜養鳥而番阜教之與鳥言秋官夷隸秋官夷隸掌役牧人養牛與鳥言云云鳥養眩視莊子曰海鳥止魯郊魯侯御而觴之奏九韶具太牢鳥乃眩視悲憂不食一臠三日而死非以鳥養養鳥者宜棲之深林聞樂莊子曰咸池九韶張於洞庭野鳥聞之而死咸若書曰鳥獸咸若傅其翼者兩其足漢書翼后稷薑嫄始生后稷誕置之寒冰鳥以翼覆之鳥獸鏘鏘率然舞化舜德高飛詩有鳥高飛亦傳于天鷹祭禮曰處暑之日鷹乃祭鳥畜鳥者則勿佛佛戾也禮大羅掌天子羅鳥獸雲如赤鳥傳有雲如衆赤鳥夾日以飛三日鳴亳鳥鳴于亳社如曰嘻嘻甲午災云云無迹莊子云莽眇之鳥遠深無迹八竅者卵生莊子反鄉飛鳥反鄉依其所生羅之一日文子得鳥者羅之一日適至家語少昊立鳳鳥適至故以鳥名官避不義又鳥獸之於避不尚知義之竅啄又鳥獸竅啄悲鳴送子恆山之鳥生四子羽翼既成分飛四海其母悲鳴而送之鳥生於陰屬於陽故卵之鳥社瑞應帝王世紀禹葬會稽有群鳥應民春耕則銜去草根啄除其蕪穢故謂之鳥社書化家語孔子與子夏講道德有赤氣貫天孔子曰魯瑞門當有血書西飛為鳥也具變化門御丹書呂氏春秋周文王時見大赤鳥銜丹書集周社文王火氣勝故其色尚赤也從南方來晉平公時有鳥從南方來赤質五色皆備集於庭相讓叔向曰吾聞師曠曰西方有鳥白質五色曰翬南方有鳥赤質五色曰雉今來為君瑞也悲楊震後漢楊震改葬華陰潼亭先葬十日有大鳥丈餘集震墓前俯仰悲鳴淚下沾地葬畢飛去時人立鳥象於墓前入帳中宋紀高祖伐鮮卑夜有大蒼鳥如鵝飛入高祖帳中從事胡蕃曰蒼者胡虜之色虜歸我也明旦攻城大破之小鳥生大鳥宋紀土地開闢則有小鳥生大鳥條支之鳥卵如甕命起西都賦曰命荊州使起鳥野鳥號東廂上有特栖鳥王粲詩列敷丹榮上云云上懷春向我鳴客鳥思故鄉翔鳥薄天飛越鳥巢南枝願隨越鳥翻飛南翔鳥倦飛而知還鳥獸腯膚帝江傳妙鳥於帝江注天山有鳥如丹識歌舞而妙靡名曰帝鄉如彼翰林鳥雙飛一朝隻棲者擇木雊者擇音鳥登木而失條整輕翮而思矯鳥散餘花落昨夜鳥聲春寄言楚辭願寄言於三鳥三鳥飛以自南覽其志而吹北也見離騷毛羽未成不可以高飛史傷弓之鳥落於虛發史畢駭文鳥畢駭獸成作知其能翔史孔子見老子曰鳥吾知其能翔魚吾知其能遊於龍吾則不能知聃其龍乎鳥獸阜滋阜大也不厭高同聲相應殊聲文衆形殊聲翩翻逸飛翕翼交頸短羽相鳴接翼巢居翱翔理翮觸絲沖天斂翼高飛並影側足纓繳寓居短聲整翰聯翩濯翼排虛疏風擇木奮飛孔衆禽之偶韋思謙進御史大夫見王公未嘗屈禮或以為譏答曰耳目官固當特立雕鶚鷹鸇豈衆禽之偶飛鳥依人帝曰褚遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛啾號柳懲咎賦衆鳥萃而啾號五大鳥集宮竇建德冬至大會僚吏有五大屬集其官群鳥從之夢張鷟為兒時夢紫文大鳥五色成文止其庭異鳥蕭銑自稱梁王有異鳥至建元為鳳鳴飛擁行車開元遺事李元紘為餘杭令治有聲遷潤州司馬發離百里鳥鵲之類飛擁行車鳥影度寒塘杜甫詩容與波上閻立本太宗泛池見異鳥容與波上召立本侔狀群噪張直方洛陽飛鳥皆識之見必群噪鴟梟不鳴未為瑞鳥呂向上言珍禽則天臨朝拜洛受圖大陳珍禽羅取王世充羅取飛鳥書符命於帛系鳥足縱之有彈捕得鳥而獻者亦拜官鳥得風而翔元稹曰鳥得風而翔奇禽怪羽倪若水上言奇禽怪羽為圜禦之玩四千五百種唐酉陽雜俎鳥有四千五百種鳥省馬充給事親仁坊有宅南有山亭多養鵝鴨又雜禽一家人掌之謂之鳥省出廬氏雜記翔霄密網之鳥舉羽而翔霄柳宗元戛瑟幽鳥啼杜牧詩高飛之翮長者在前卿朝廷羽翮也文宗謂李程鳥窺新捲簾杜甫詩鳳二白鳳兮鳳兮何德之衰丹穴于飛四靈麟鳳龜龍五色之文九苞之狀神鳥鳳別名也陽精鶡冠子鳳皇鶉火之禽陽之精翽翽其羽鳳皇于飛云云嗈嗈鳳皇鳴矣嗈嗈喈喈繫九千里應十二律仙翰靈鳳鳳儀丹穴名官見瑞官門鸑鷟鳳雛來儀簫詔九成鳳皇來儀六象鳳有六象頭象天目象日背象月翼象風足象地尾象緯緯五緯也九苞一曰歸命二曰心合度度天度也三曰耳聰達四曰舌屈伸五曰彩色光六曰冠短州州當朱色也七曰鋭鉤八曰音激揚九曰腹戶戶所由出入也鳴行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰即都知我唯黃持竹實來也孔子從鳳故孔子欲居九夷從鳳鳳遇亂則居夷狄鳳皇殿宣帝時鳳皇集二林乃作鳳皇殿以答嘉瑞鳳羽旅之美莊子金味失冠鄴中記曰石季龍與皇后在觀上有詔書五色紙書著鳳皇口中既銜詔侍人放數百丈緋繩麻廬回轉鳳皇飛下鳳以木作之五色畫之咮腳皆用金顧愷之鳳皇賦曰朱冠赫以雙翹五綵羽千金毛東觀漢記曰建武十八年鳳高八尺毛羽五色集穎川郡群鳥並從蓋地數頃留十七日乃去又拾遺記周昭王以青鳳之毛為一裘一曰暖質二曰暄肌常以禦寒至厲王末猶寶此及厲王流于彘人得而珍之罪有陷大辟者以一青鳳毛贖罪免外一毛千金賦太宗鳳賦曰有一靈鳳羽翮朝陽晨遊紫霧夕飲玄霜資長鳳以舉翰戾天衢而遠翔雄曰鳳雌曰皇書注云云不聞苟德不降則鳳皇不聞煥乎其有文章南方之鳥所居積石千里河出下鳳居上天為生食其樹名瓊枝高百二十圍以琳琅為實天為生救之離珠一人三頭遞臥迭起以司琅玕莊子左文曰賢右文曰智羽蟲長家語羽蟲三百六十而鳳為之長也鳳王者之嘉祥應瑞圖仁信瑞應負信戴仁挾義膺文苞智不啄生蟲不折生草不群居不侶行不經羅墜網上通天維下集河洛明治亂見存亡也食琅玕靈鳳振羽儀戢景西海濱朝食琅玕實夕飲玉池津宿丹山文夕宿丹山際燕假文燕翼假鳳翔鴟梟笑鳳皇不亦病乎聽鳴鳳之嗈嗈天台飄飄高逝文鳳飄飄其高逝兮夫固自引而遠去也翔千仞文鳳皇翔于千仞兮覽德輝而下之見細德之險微兮搖增翮而去之集南嶽文鳳皇集南嶽徘徊孤竹根於心有不厭奮翅凌紫雲豈不嘗辛苦羞與黃雀群何時嘗來儀順作聖明君鳳騫翥於薨棟咸溯風而欲翔溯向也遠罻羅文鳳鳴高岡以遠罻羅有聖賢之德不及棲鳳不及棲喻賢也文擇高梧文鳥擇高梧來儀之鳥迅翮推迅翮於鳳穴注漢不用敬通文也鐵鳳皇其闕文藻翰顧愷之賦朱冠赫以雙翹靈質翽其高舉備六德以成文暉藻翰之郁烈云云鳥長鳳也鳳愈飄翔而高舉楚辭惶惶鳳獨惶惶無集楚辭不下鳳皇飛而不下楚辭安栖鳳兮安栖楚辭不貪鳳亦不貪而妄食楚在笯笯籠名楚辭高翔楚獨見鸞鳳高翔于大皇之野循四極而回周覽德威而後下仙駕來翔吳志費椲曰鳳皇來翔麟吐哺自然之色蜀志鳳生五色豈以五采飾畫也雛蜀龐統字士元號鳳雛東南之實晉張華曰顏彥先鳳鳴朝陽東南之實者也思聲晉習鑿齒既罷歸與桓溫弟祕書曰每從北門而望隆中想臥龍之吟東眺白沙思鳳雛之聲止阿房晉符堅時長安謠曰鳳皇止阿房堅曰鳳皇非梧桐不栖非竹實不食乃植梧桐竹數十萬於阿城以待之時慕容沖小字鳳皇至是終陷堅城入止阿城也候鳴調律抱撲帝軒轅候鳳鳴調律翼若竽聲若簫樂帝之心孫卿子濯羽弱水暮宿風穴淮南子形貌韓詩外傳曰鳳雞冠鸞喙蛇頸龍胼鶴翼魚尾鴻前麟後鶴顙鴛鴦臆龜目而中注載德揚義背負仁翼挾信心抱忠足履正尾繫武仁智之禽鵠鵛而龜腹晉中興書云云首文曰德翼文曰禮背文曰義膺文曰仁腸文曰信山海經居廣都之野節節白虎通曰雄鳴足足又雌鳴遊必擇地飢不妄食白虎通云小音中鐘擊磬帝王世紀曰帝嚳擊磬鳳皇舒翼而舞駕六春秋命歷序昔辰數治世雖小九次之號曰皇談駕六鳳皇出也衝治三百五十歲也火精春秋孔演圖鳳火精隨孟虧瑞應蕭孟虧人首身為虞氏馴百禽夏后之世民始食卵孟虧去之鳳皇隨也威鳳鳳有威儀孔河東三鳳薛元敬河東三鳳見兄弟門鳳鳴朝陽韓瑗自瑗與遂良相繼死內外以言為諱將二十年帝造奉天宮御史李善感始上疏極言時人喜之謂為鳳鳴朝陽鸞鳳沖霄必假羽翼馬周帝以飛帛書賜周曰鸞鳳沖霄必假羽翼在鼓西舍利獻其國樂至成都按瑞圖曰王者有道則儀鳳在鼓故羽葆鼓栖以鳳皇鳳有利觜衆鳥不賓宋子嵩化書獻水鳥為鳳五代安重榮饒陽令劉巖獻水鳥五色重榮曰此鳳也冀之鳳集通訓門楊國忠帝再幸左藏庫班賚百官出納判官魏仲犀言鳳集通訓門門直庫西有詔改為丹鳳門進仲犀殿中侍御史屬吏率以鳳皇侵得調不篝不笯文粹皮日休補九夏樂歌鳳之愈愈不篝不笯樂德而至如賓之娛蒼梧之玄文粹李白大鵬賦恥蒼梧之玄鳳輝綵質與錦章建元蕭銑建元鳳鳴若鳳鳥始見李渤韓愈遺書曰朝廷士引頸東望若鳳鳥始見爭先睹不憎山栖王績託無心子以見趣曰鳳不憎山栖和聲隨祥風窈窕相飄揚丹穴五色羽其名為鳳凰昔周有盛德此鳥鳴高岡和聲隨祥風窈窕相飄揚岐山下詩韓文五章備綵珍鳳飛九千仞五章備綵珍李白古風祥風遺蒿鷃韓文聯句鳳飢不啄粟所食唯琅玕焉能與群雞蹙促爭一飧朝鳴崑丘樹夕飲砥拄湍李白詩一毛生鳳穴杜甫鳳凰五色百鳥尊韋應物鳶奪巢鳳凰五色百鳥尊知鳶為害何不言北風破南極朱鳳日低垂杜甫比風鳴鳳託高梧凌風何翩翩李白鳳凰蔚跋而來遊杜甫西嶽賦鳳凰鳥之遠人者也皆舜治天下政成而民悅命夔作樂樂聲和鳥獸聞之皆鼓舞當是之時鳳凰適至舜之史因並記以為美後世因以鳳來為有道之應其後鳳凰數至或出於庸君繆政之時或出於危亡大亂之際是果為瑞哉五代史五色赤文鳳也紫文鸑鷟也張薦祖鷟為兒時夢紫文大鳥五色成文止其庭大父父曰吾聞五色赤文鳳也紫文鸑鷟也資長風而舉翰戾天衢而遠翔西翥則煙氛閟色東飛則日月騰光太宗鳳賦見萬歲縣前蜀王建天祐七年六月鳳凰見萬歲縣白瑞官傳少昊氏之立有鳳鳥適至故紀於鳥而名官鳳鳥氏歷正也主有鳳為瑞故以鳥名官歷正掌歷之官歌舞丹穴山有鳳自歌自舞見則天下太平鳳凰翔兮舞紫庭周成王時鳳凰來儀於庭成王乃歌曰云云巢阿閣黃帝時鳳巢阿閣鳴岐陽內史曰周之興也鸑鷟鳴于岐陽御圖漢帝坐於玄扈洛水之上有鳳銜圖至帝前以黃玉為柙也授璽鳳皇負圖授堯黃玉為檢白玉為繩其章曰赤帝符璽止帝梧韓詩曰黃帝齋子宮中鳳乃蔽曰而下止帝東園集梧桐食竹實沒身不去君子有道鳳皇在郊藪禮集穎川黃霸為穎太守仁化大行鳳集境內仙蕭列仙傳曰蕭史吹簫秦穆公女弄玉亦善吹簫因妻之後鳳皇來夫婦俱去穆公因作鳳女樓覆巢毀卵則鳳不翔史仲尼曰鳳鳥不至吾已矣語雛古詩曰鳳皇何啾啾三母將九子易林曰鳳有十子同巢共母歡以相保又鳳生五雛又鸑鷟者鳳之雛也作律黃帝使伶倫采嶰谷之竹斷兩節開而吹之於是制十二管以聽鳳皇之鳴其雄鳴為六律雌鳴為六呂謂之律本卜婚傳懿氏妻敬仲其妻古之曰見謂鳳皇于飛和鳴鏘鏘鳴朝陽鳳皇鳴矣于彼高岡梧桐生矣于彼朝陽鳳非梧桐不棲非竹實不食非醴泉不飲銜詔見上棲枳棘仇香為主簿人曰枳刺上非鸞鳳所棲上擊九千宋玉曰鳳上擊九千里翱翔於杳置之際年號漢宣帝時有鳳皇之瑞改元為五鳳元年鳳以為畜鳳翼見上雲儀朱冠赫以雙翹金口見上銜詔注集玉谷易林曰鳳皇為主集於玉谷中鳳宿鳳穴鳳舉鳳鳴瑞官三孔少皞宗師太皞之道故曰少皞其立也鳳鳥適至故紀於官為鳥師鳳鳥氏歷正也學記總敘以為人極分瑞官於鳳紀斯乃帝昊氏之所以為人極也霍融嵩山啓母廟碑古師官鳥來鵠聖政紀頌鳳鳥為司疇人受職張説大衍序大鵬新添讀晉書睹阮宣子大鵬讚鄙心陋之李白序北溟之有魚吾不知其幾千里其名曰鯤化成大鵬質凝胚渾同上大鵬賦激一千以崛起摶九萬而遐征背嶪太山之崔嵬翼舉垂雲之縱橫同上曆汗漫以夭矯塌閶闔之崢嶸上摩蒼蒼下覆漫漫同上六月一息至于海湄憩乎泱漭之野入乎汪湟之池同上大鵬驚攫何諷夢渴賦右翼掩乎西極左翼蔽乎東荒李白賦大鵬橫霄而測度明堂賦斬飛鵬於日域獵賦上繽翻鵬翼呂溫程盧公贊鵬騫墮長翮韓文送惠師白女床山海經雲女床山有鳥曰鸞自歌自舞舞鏡孤鸞見鏡睹其影謂為雌必悲鳴而舞孝感漢書方諸遭母憂負上成墳種松千根鸞鳥栖其上感政王輔為重泉令有鸞翔集感異政也感樂抱朴子曰鸞聞樂而舞至則國安樂也棲棘見上置獲異苑曰罽賓國王置得一鸞欲其鳴不可致飾金繁饗珍羞對之愈戚三年不鳴夫人曰常聞鸞見類則鳴乃懸鏡照之鸞睹影悲鳴沖霄一奮而絶鸚鵡配禰衡賦云配鸞皇而等矣垂翅而舞東觀漢記章帝時集郡國王阜世公為重泉令吏民向化鸞止學館阜使授官椽公沙疊為張雅樂舉足垂翅應聲而舞復止縣屋留十餘日乃去赤神之精瑞應鸞赤神之精鳳皇之怪狀翟而五色以天鳴中音肅肅雍雍喜則鳴舞出女床之山窟氏之國及軒轅之丘沃民之域標山之所都之野自歌之鳥徘徊漢息夫躬絶命辭曰鷹隼橫厲鸞徘徊兮矰若浮焱動則機兮叢棘棧棧曷可棲兮冕頸折翼庸得往兮裔裔天台賦覿翔鸞之裔裔伏竄鸞鳳伏竄兮鴟梟翱翔鸞岡豫早記在西山洪崖先生乘鸞所憩處也高翔見上
