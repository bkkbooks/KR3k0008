body:
  text: 卷第十八白美如陳平陳平長欲娶富者莫肯與貧者平亦恥之富人張負有女五嫁而夫輒死人莫敢娶平欲娶之負謂其子仲曰吾欲以女妻平仲曰平貧不事産業負曰人有美如陳平肯長貧賤乎遂以女妻平徐吾犯妹左傳鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使彊委禽焉犯請於二子請使女自擇焉子皙盛飾而入布幣而出子南戎服入左右射超乘而出女自房觀之曰子皙信美矣抑子南夫也夫夫婦婦所謂順也遂適子南公孫楚也玉濬妻晉王濬字士治為河東從事剌史徐邈有女才淑擇夫未嫁邈乃大會佐史令女於內觀之指濬告母邈遂妻焉季芊楚昭王出嫁妹季芊曰所謂女子遠丈夫也鍾建負我矣請妻鍾建吳人入郢之時昭王奔隨鍾建負季芊走而從王賢如伯鸞後漢梁鴻字伯鸞同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁年至三十父母問故女曰欲得賢如伯鸞者鴻聞而娶之呂子衡呂範字子衡邑人劉氏家富女美範求之女母嫌欲勿許與劉氏曰吾觀呂子衡寧當久貧者乎遂與婚冥婚嫁殤周禮媒氏禁嫁殤者韆葬者合葬魏武帝愛子蒼舒卒欲求邢原女合葬原拒之曰合葬非禮也又娉甄氏亡女合葬也又明帝愛女淑薨取甄氏亡從孫合葬死則同穴擇夫一孔畫孔雀屏間請婚者射高祖順聖皇后竇氏父毅在周為上柱國尚武帝姊襄陽長公主常謂主曰此女有奇相且識不凡何可妄與人因畫二孔雀屏間請婚者射二矢陰約中目則許之射者閲數十皆不合高祖最後射中各一目遂歸於帝碧鸛鵲裴寬景雲中為潤州參軍事剌史韋詵有女擇所宜歸引為按察判官許妻以女歸語妻曰常求隹壻今得矣明日幃其族使觀之寬時衣碧瘠而長既入族人皆笑呼為碧鸛鵲詵曰愛其女必以為賢公侯妻也何可以貌求人卒妻寬擇壻車新進士大宴于曲江其日公卿家傾城縱觀有若東榻之選者十八九細車珠映櫛比托言折節晚學陝州剌史王當有女今袁天綱擇壻曰惟果毅姚某有貴子嫁之時人笑焉乃元崇也時二十三好獵都未知書母勸令讀書折節晚學以晚節入仕至宰相出太平廣記牽絲為婚張嘉貞有五女皆絶色欲納郭元振為壻令五女各持一絲元振從便牽之待妻以禮二白始由義合終以禮成如賓齊眉見面漢朱博字子元夜寢早起妻稀見其面若嚴君後漢張湛字子孝矜嚴好禮居處必自修整雖遇妻子若嚴君如君臣後漢馬良字君卿志行高整非禮不動遇妻子如君臣鄉黨以為儀表答拜後漢樊英有疾妻使婢拜問英下床答拜陳實怪問之英曰妻者齊也供奉祭祀禮無不答待妻有禮吳志顧愷字子通待妻有禮常夜入晨出罕見其面疾篤妻出省之愷令左右扶起冠幘加襲趣令妻還其貞潔不濁亂如此南面北面晉何曾閨門整肅年老相見皆正衣冠相待如賓己南面妻北面拜上酒酬酢既畢便出一歲如此不過再三焉自責後漢仇覽雖在燕居必以禮自整妻子有過免冠自責妻子庭謝侯覽冠乃敢升堂孔相待如賓五代萇從簡許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賓二卒歎曰吾今欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻踰垣而去不知所之見妻子必正衣冠唐臨白聶政姊史記聶政殺韓相俠纍皮面抉目自屠死韓購以千金久之政姊榮聞之曰吾弟為吾在重自刑以絶妾奈何畏沒身之誅滅賢弟之名乎乃之韓市呼天者三死政之旁磨笄山趙襄子登夏屋山請代王使廚人操銅斗行鍖代王殺之其姊聞之呼天磨笄自殺因以為其山名也代夫留獄中盛道妻趙氏字媛姜益部亂道聚衆敗當死媛姜夜告道速逃建立門戶妾留獄代君媛姜乃解道桎梏子翔五歲令攜走度道遠以實告應時見殺道會赦放歸終身不娶夫惡自殺沛國周都妻趙宗女守阿少間婦道而都多行無禮都父偉謂阿少曰當以道匡夫阿少退曰我言不用君必謂我不奉教若言見用是謂子違父而從婦不如死乃自殺手刃夫讎吳許升妻呂氏字榮升為博徒不治行榮流涕進規榮父欲改嫁之榮終不肯升乃感勵改行遂成名本州辟至壽春盜害之剌史尹曜捕得盜榮手斷其頭而歸祭升臨危請姑晉禮志云李繁姊先適陳詵為妻而遭賊於賊請活姑命賊掠將去繁後得消息往迎還詵王愆期議李鄙野人而臨危請姑險不忘順可謂孝婦矣議者欲令在沒略之中有殞無二是望人人為宋伯姬也孝婦陝婦人嫠居事叔姑甚謹家欲嫁之毀面自誓後叔姑病死有女在夫家從婦乞假不得因誣殺其母有司誅之鳥哀鳴尸上盛夏暴之十日不腐蟲獸亦不敗境內經年不雨呼延謀為太守訪其墓諡曰真烈婦其日大雨孔崇義夫人薛仁杲其降將旁仚地復所過剽害掠王氏女醉寢千野王取仚地所佩刀斬之送首梁州詔封女為崇義夫人刻石表曰烈女成汭王建遣將屯忠州與夔州剌史毛湘相唇齒厚屯白帝汭率存乘二軍之間攻之二軍使人誶辱汭韓楚言尤甚汭恥之曰有如禽賊當支解以逞會存夜斬營襲厚破之厚奔萬州為剌史張造所拒走綿州存入夔州楚言妻季語曰君常辱軍且支解解不如前死楚言不決李礪刀廉下方共食復語之夫曰未可知李取刀斷其首并殺三子乃自剄汭畏其烈禮葬之刻石表曰烈女割耳李德武妻裴德武在隋坐事徙嶺南時嫁方踰歲父矩表離婚德武謂裴曰我方貶無還理君必儷它族于此長訣矣答曰夫天也可背乎願死無它欲割耳誓保母持不許本傳剔目房玄齡妻盧玄齡微時病且死諉曰吾病革君年少不可寡居善事後人盧泣入帷中剔一目示房云無他會玄齡良愈禮之終身啖土飲水王蘭英獨孤師仁之姆師仁之父武都謀歸唐王世充設之師仁始三歲免死禁錮蘭英請髡鉗得保養許之時喪亂餓死者藉藉遊丐道路以食師仁身啖土飲水後詐為採薪竊師仁歸京師高宗嘉其義詔封蘭英永濤郡君抵甓殺父冤衛孝女絳州夏人字無忌父為鄉人衛長則所殺無忌甫六歲無兄弟母改嫁逮長志報父仇會從父大延客長則在坐無忌抵以甓殺之詣吏稱父冤已報請就刑巡察使褚遂良以聞太宗免其罪給驛徙雍州賜田宅州縣以禮嫁之冒刃立姑側鄭義宗妻盧夜有盜持兵劫其家人皆匿竄惟姑不能去盧冒刃立姑側為賊捽棰幾死賊去人問何為不懼答曰人所以異鳥獸者以其有仁義也今鄰裏急難尚相赴況姑可委棄邪若百有一危我不得獨生姑曰歲寒然後知松柏後凋吾乃今見婦之心婦人以節楚王靈龜妃上官靈龜卒喪除兄弟共諭妃少又無子可不有行泣曰丈夫以義婦人以節我未能殉溝壑尚可以御粧澤祭他胙乎將自劓則衆遂不敢彊蓬頭跣而負土汴女李母喪廬于墓蓬頭跣而負土以完園塋蒔松數百武后時按察使薛季昶表之詔樹闕門閭斷髮自誓崔繪妻盧繪喪盧年少家欲嫁之盧稱疾不許女兄適工部侍郎李思沖早亡思沖方顯重表求繼室詔許家內外姻皆然可思沖歸幣三百輿盧不可曰吾豈再辱於人乎寧沒身為婢是夕出自竇糞穢衊面還崔舍斷髮自誓思沖以聞武后不奪也詔為浮屠尼以終罵賊沈海符鳳妻某氏尤姝美鳳以罪徙儋州至南海為獠賊所殺脅某氏私之對曰一婦人不足事衆男子請推一長者賊然之乃請更衣有煩盛服立於舟罵曰受賊辱不如死自沉於海著女訓王琳妻韋者士族也琳卒時韋年二十五家欲彊嫁之韋固拒至不聽音樂處一室或終日不食卒年七十五著女訓行于世盧惟清妻徐惟清坐僚姻貶播川尉徐還鄉里糲食斥鉛膏采絺不遇會大赦徐間關迎惟清至荊州惟清死二髯奴將劫徐歸下江徐知之數其罪奴不敢逼劫其資去徐倍道行至播州足繭流血得惟清尸以還饒娥饒州樂平人父績漁于江遇風濤舟覆尸不出娥年十四哭水上不食三日死俄大震電水蟲多死父尸浮出鄉人異之歸賵具禮葬父及娥鄱水之陰河東柳宗元立碑云義聲動江南鄒待徵妻薄者從待徵官江陰袁朝亂薄為賊所掠將汙之不從語家媼使報待徵曰我義不辱即死於水賊去得其尸義聲動江南聞人李華作哀節婦賦再拜就死高愍女名姝姝父彥昭事李正己及納拒命質其妻子使守濮陽建中二年挈城歸河南都統劉玄佐納屠其家時女七歲母李憐其幼請免死為婢許之女不肯曰母兄皆不免何賴而生母兄將被刑遍拜四方女問故答曰神可祈也女曰我家以忠義誅神尚何知而拜之問父在所西嚮哭再拜就死德宗駭歎詔太常諡曰愍諸儒爭為之誄引繩束髮賈直言妻董直言坐事貶嶺南以妻少乃訣曰生死不可期吾去可亟嫁無須也董不答引繩束髮封以帛使直言署曰非君手不可解直言坐貶二十年乃還署帛宛然乃湯沐發墮無餘父亡間道奔喪李孝女名妙法安祿山亂被劫徙它州聞父亡欲間道奔喪一子不忍去割一乳留以行自刵陳冤衡方厚妻程大和中方厚為雍州録事參軍招討使董昌齡治無狀方厚數爭昌齡怒將執付吏辭以疾不免即以死告臥棺中昌齡知之使闔棺甚牢方厚閉久以爪攫棺爪盡乃絶程懼并死不敢哭昌齡恬不疑厚遣其喪程徒行至闕下叩右銀臺門自刵陳冤下御史鞠治有實昌齡乃得罪文宗詔封程武昌縣君賜一子九品正員官不嫁止陽女趙者父盜鹽當論死女詣官訴曰迫飢而盜救死爾情有可原原之否則請俱死有司義之許減父死女曰身今為官所賜願毀服依浮屠法以報即截耳自信侍父疾卒不嫁名寒如霜雪唐與風化陶淬且數百年而聞家令姓窈窕淑女至臨大難守禮節白刃不能移與哲人烈士爭不朽名寒如霜雪亦可貴矣提刀逐之僕固懷恩反郭子儀至河中瑒攻榆次未拔追兵于祁責其緩鞭之衆怒是夕偏將焦暉白玉等斬其首獻闕下懷恩聞以告母母曰我戒汝勿反國家酬汝不淺今衆變禍且及我奈何懷恩再拜出母提刀逐之曰吾為國殺此賊取其心以謝軍中懷恩走乃與部曲三百北渡河走靈武稍稍引亡命軍復振帝念舊勳不加罪詔輦其母歸京師厚恤之以壽終僕固懷恩贊曰其母拔刀逐賊烈婦人也引斧自斷臂五代王凝妻李氏凝家青齊之間時任虢州司戶參軍以疾卒于官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并污吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚恤李氏而笞其主人嗚呼士不自愛其身而辱恥以偷生者聞李氏之風宜少知愧哉秦拒默啜高睿妻睿為趙州剌史為默啜所攻州陷高睿仰藥不死至默啜所示以寶帶異袍曰降我賜爾官不降且死睿視秦秦曰君受天子恩當以死報賊一品官安定榮自是皆瞑目不語默啜知不可屈乃殺之楊完項城楊烈婦者李侃妻也侃為項城令季希烈分兵數千略定諸縣侃以城小賊鋭欲逃去婦曰寇至當守力不及則死焉君而逃尚誰守乃募死士固守賊引去卒完家道四白家人女正位乎內男正位乎外易家有嚴君家人有嚴君焉父母之謂也夫子之家事理隋武子刑于寡妻至于兄弟以御于家邦言文王自家刑國萬石君漢石奮子孫為小吏來謁必朝服見之有過失不誚讓為便坐對案不食子孫相責因長老謝改之乃許子孫在側雖宴必冠申申如也注便坐非正寢也閨門自守魏司馬朗父防閨門自守諸子雖冠成人不命進則不敢進不命坐不敢坐不指所謂不敢言父子之間整肅如此整肅晉何曾至孝閨門整肅自少及長無聲樂嬖幸之好與妻相見正衣冠相待如賓已南向妻北面再拜上酒酬酢既畢便出一歲如此不過再三曾字穎考又庾亮字元規美姿容談論風格峻整動由禮節閨門之內不肅而成或以為夏侯泰初陳長文之倫人憚其方嚴而莫敢造率子抱孫王羲之率子抱弱孫一味之甘割而分之以娛目前教養子孫敦厚退讓依陸賈班嗣楊王孫之處世也家人嗃嗃嚴酷甚也婦子嘻嘻失家節也免冠自責見上孔治家以嚴李晟治家以嚴子姪非晨昏不輒見所與言未嘗及公事家法修整韋陟家法修整敕子允就學夜分視之見其勤旦日問安色必怡稍怠則立堂下不與語集古今家誡書為屏風房玄齡治家有法度常恐諸子驕侈席勢凌人乃集古今家誡書為屏風今各取一具曰留意於此足以保躬矣閨門雍穆馮元常閨門雍穆有禮法家法可稱張知謇每敕子孫經不明不得舉家法可稱閨門友睦劉德威於閨門友睦家為賊質李晟家為賊質左右有言者晟涕數行下曰陛下安在而欲恤家乎朱泚使晟吏王無忌壻款壁門曰公等家無恙晟怒曰爾乃與賊為間乎叱斬之家行修治李景讓家行修治閨門惟謹保家源洧雍睦保家士友推之德星堂崔鄲四世緦麻同爨居光德里宣宗聞而嘆曰鄲一門孝友可為士族法因題曰德星堂後京兆民即其里號為德星社云私居內齊正色柳仲郢私居內齊正色服用簡素治家柳圭以不孝勒就養柳公綽治家埒韓滉及圭被廢士人愧帳言家法者尚韓穆穆寧居家嚴嘗撰家令訓諸子人一通又戒曰君子之事親養志為大吾志直道苟枉而道三牲五鼎非吾養也先是韓休家訓子姓至嚴正元間言家法者尚韓穆二門云三世一爨崔邠父倕三世一爨當時言治家者推其法述家訓戒子孫柳玭常述家訓戒子孫夫門第高者一事墜先訓則異他人雖生可以苟爵位死不可見祖先地下門高則自驕族盛則人窺至於孝慈友悌忠信篤行乃食之醢醬可一日無哉過家十餘未嘗見妻子辛讜初讜之求救也過家十餘未嘗見妻子家風楊弘禮素弟之子太宗征遼東拜兵部侍郎駐蹕之役領步騎二十四軍跳出賊輦所向摧靡常自山下望其衆袍仗精整人人盡力壯之謂許敬宗曰越公兒郎故有家風孝睦裴向門戶內外親屬百餘口祿俸必均世稱其孝睦君子重其家法崔祐甫朱泚亂祐甫妻王陷賊中泚嘗與祐甫同列遺以繒帛菽粟受而緘鐍之帝還京具封以獻士君子重其家法本傳孝慈韋倫居家以孝慈稱成立覆墜柳玭嘗述家訓戒子孫曰夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛擊鼓會飯裴寬兄弟八人於東都置第八院相對甥姪亦有名稱嘗擊鼓會飯子父女母白居易贊子孫衆盛實為名閥柳玭孝友聞家贊諸子李萆與外孫崔氏書云豫小時起居尊行三時侍食今諸子日出高眠爭覽盤器何嘗有此儀肥家以忍順柳玼家訓省事而後可以言家法家法備然後可以言養人同上務以門族相高宰相世系表唐為國久傳世多而諸臣亦各修其家法務以門族相高禮法稱於士林柳玭家訓余有本以學識禮法稱於士林我子孫以付汝李績弟弼為晉州剌史以績疾召為司衛卿使省視忽語曰我似少愈可置酒相樂於是奏樂宴飲列子孫于下將罷謂弼曰我即死欲有言恐悲哭不得盡故一訣爾我見房玄齡杜如晦高季輔皆辛苦立門戶亦望詒後悉為不肖子敗之我子孫今以付汝汝可謹察有不厲言行交非類者急榜殺以聞毋令後人笑吾猶吾笑房杜也白天性父子之道父道子道人父人子才不才亦各言其子也各子其子各親其親為孺子牛齊景公御繩為孺子牛而折其齒儒子荼也斯子吾有斯子親後子者親之後也敢不敬與禮莫知其惡諺曰人莫知其子之惡也堂構書曰若考作室既底法厥子乃不堂構矧肯構父慈子孝所謂六順負荷古人言其父析薪其子不克負荷天明傳曰為父子兄弟以象天明冬夏之日趙襄冬之日趙盾夏之日冬日可愛夏日可畏雙珠韋端有二子元將仲將孔融與端書曰不意雙珠生於老蚌荀陳之會世說曰陳太丘詣荀季和貧儉無僕乃使元方將車季方持杖長文尚小著車中既至荀使叔慈應門慈明行酒餘六龍下食文若小坐膝前于時太史奏五里內賢人聚長文群也阿戎談王戎字濬仲父渾阮籍謂曰濬仲清賞非卿倫也與卿言不如與阿戎談厚於慈禮以此防人人猶有薄於孝而厚於慈父為子隱直在其中以篤父子禮家肥禮曰父子篤夫婦和家之肥也異宮禮曰命士以上父子皆異宮宗敬也見父子之倫焉禮厚敬禮父子不同位以厚敬也無能禮父之親子也親賢而下無能故父尊而不親父止於慈禮為人子止於孝為人父止於慈父兮生我身之二也禮椒聊有實螽斯之詠孝養厥父母書陟彼岵矣瞻望父矣從命禮從命不仇微諫不倦勞而不怨可謂孝矣饋獻父母在饋獻不及車馬示人不敢專不奸傳父子不奸之謂禮有子有父公羊曰又有子子不得有父謂注云有子廢輒之義可立不以父命辭王父命衛侯棘也子由父疏榖梁仲嬰齊卒此公孫也子由又疏也視友史記趙禹謂將軍曰不知其子視之友遺體霍去病至河東傳舍人迎父仲孺仲孺趍拜謁將軍迎跪曰不早知為大人遺體父子之間人所難言武帝謂田千秋三君陳紀先方弟諶季方與父實齊德同行號三君一而已傳父一而已惟其疾之憂喜懼父母之年不可不知一則以喜一則以懼子為親後慈乃行先禍患相收莊子假之亡也林回棄千金之壁負赤子而趍為其布與赤子之布寡矣為其纍與赤子之纍多矣棄千金負赤子者彼以利合此以天屬天屬之親窮迫禍患相收也子為三公張酺為太尉父在田里每有遷職輒一詣京師適會歲節公卿詣酺府奉酒上壽極歡人皆慶羡之兼愛敬故母取其愛而君取敬名兼之者父也托子於人子胥使齊托春子於鮑氏吳王聞之怒賜子胥屬鏤劍自刎而死敬父書訓吳顧愷字子通每得父書常掃灑凡筵舒書於上拜跪之每句應諾畢復再拜若父有疾耗之問即臨書垂泣語聲哽咽訓子不訓義方石碏曰臣聞愛子教之以義方過庭孔子嘗獨立鯉趍而過庭曰不學詩無以言不學禮無以立鯉退而學詩語遠子又聞君子之遠其子教忠狐突曰子之能事父教之忠古之制也父教子二何以事君慈教父慈而教子孝而忠七子之業晉劉殷字長盛有子七人各受一經一門之內七業俱成嚴父愛子天性之恩日嚴之敬父父子子詩禮之訓幼子幼子常視無誑長者與之提攜則兩手捧長者之手貞劍辟咡詔之則掩口而對皆幼子之教幼學人生十年曰幼學餘具儒教幼學門不就師傳子既生不免於水火母之罪也成童不就師傳父之罪也將紹家聲必資庭訓嚴君之道教子之方居家自相勖道豈不優於嚴君邪萬石君也尊嚴之儀馮奉世奉世子野王通詩次逡通易次立通春秋次參通尚書刑國自家刑國不教吏職漢薛宣子惠為彭城令宣過其縣橋梁郵亭不修宣心知惠不能留數日終不問惠以吏事惠知不稱宣意使椽送宣令椽自從其所問宣以未教戒惠吏職之意宣笑曰吏道以法令為師可問而知自有資才何可學也各使守一藝後漢鄧禹子十三人各使守一藝教養子孫為後世法臨刑告子范滂字孟博被誣下獄謂其子曰吾欲使汝為惡惡不可為使汝為善我亦不為惡行路聞之莫不流涕又鄭玄字康成戒子益恩曰吾年七十自非拜國君命親族之憂展敬墳墓當杖而出門家事大小汝一承之爾煢煢無同生之相依勖求君子之道云云不訓後漢馬廖不訓諸子友人楊終戒之廖曰皎皎練絲所在染也八務七識魏氏春秋諸葛亮作八務七識六怒五懼皆有條章誡諸子弟睡不聽訓陳萬年疾召子咸教誡之咸睡頭觸屏風萬年怒將杖之咸曰具曉所言大抵教咸諂也萬年遂不復言撻子崔烈有重名靈帝時入錢五百萬為司徒名譽遂減問子鈞曰議者何如鈞曰嫌其銅臭烈舉杖擊之鈞服武辨而走烈曰死死卒父撾而走孝乎鈞曰大杖則走小杖則受烈慚而止又王丹子有同門生遭喪在山中請往吊之丹怒撻之令遺縑而已人問之丹曰交友之道未易言也全者鮮矣斑白逾峻孔盛安國年老還家性方嚴有軌憲雖子孫斑白而庭訓逾峻不慈乃疾厥子書曰父不能字厥子乃疾厥子言不慈也匪人不父父不父子不子滅親傳石碏純臣也大義滅親其子厚與州吁同弒君碏殺之不慈父不慈子不孝祗服厥父瘞子郭巨無兒鄧攸字伯道棄子治兄子後竟無兒人曰皇天無知使伯道無兒易子宋人易子而食父頑母囂信讒琴操君吉甫信後妻之讒而逐伯奇伯奇自傷無罪乃援琴作履霜操而死故文選曰掇蜂滅天性棄子鄧攸事見上注慈幼周禮以保息六養萬民一曰慈幼愛小幼也犁牛之子騂且角雖欲勿用山川其捨諸言父雖惡不害子善殺子晉獻公驪姬謀殺太子申生太子歸胙于公公曰姬置諸官六日公至毒而獻之公祭之地子墳與犬犬斃與小臣小臣斃姬曰賊由太子太子奔新城戊申縊死劫貨不救後漢橋玄字公祖遷侍中以疾罷就醫里舍玄少子十歲獨游門次座有三人持杖劫之入舍登樓求貨玄不與司隸圍守恐殺其子未欲迫之玄瞑目呼曰奸人無狀豈以一子之命而縱國賊遂進攻玄子亦死玄乃詣門謝罪請下天下凡有劫質皆併殺之不得贖以財寶開長奸路三綱絶矣漢逢萌見王莽殺子宇曰三綱絶矣不去禍及遂隱殺子漢金日磾子為帝弄兒上前驕逸後於殿下與官人戲日磾遂殺之食羹樂羊食肉羹棄子蜀程畿子都在郡龐義使告畿曰爾子在郡不從及禍畿曰樂羊食子羹非無父子之恩為國邵續字嗣祖初王浚假續樂陵太守石勒破浚遣續子乂招續權附於勒勒以乂為督護段匹磾要續俱歸元帝其子諫曰今棄勤歸磾任子危矣續泣曰我出身為國豈得顧子為叛臣哉遂絶勒勒乃害乂父兮母兮畜我不卒喪子喪明子夏喪其子而喪其明曾子吊而怒之曰喪爾子而喪其明爾罪三也子夏投其杖而拜之曰吾過矣嬴慱延陵季子適齊其長子死葬於嬴慱之間還封且號者三曰骨肉復于土命也夫七旬潘嶽西征賦曰大赤子於新安坎路側而瘞之亭有千秋之號子無七旬之期雖勉勵於延吳實憯慟於子慈注嶽子以三月壬寅生五月甲辰夭六十餘日也憯慟見上注珠碎於掌上蘭敗於庭中投車擠于溝壑楚靈王聞群公子之死自投于車下曰人之愛其子也亦如子乎侍者曰甚焉小人老而無子知擠于溝壑矣情鍾晉王衍字夷甫喪幼子山簡吊之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及情情之所鍾正在我輩簡服其言更為之慟仁與達晉書王祥二子烈芳同時而亡將死烈欲還葬舊土芳欲留葬京邑祥流涕曰不忘故鄉仁也不戀本土達也仁與達二子俱有稽顙禮為長子稽桑重正體也子既不幸老將疇依長子服禮庶子不得為子服三年不繼祖與禰故也注明遵一統不哭列子東門吳子死不哭其相曰公之愛子天下無有今死而不哭何也吳曰吾嘗無子無子時無憂今子死乃與向無子同吾何憂無益自損晉魏舒守陽元子混先卒舒每哀慟退而歎曰不及莊生遠矣豈以無益自損封篋王導還臺其子悅未嘗不送又為母襞斂箱篋中物悅亡導還臺至常送處哭至臺其母封篋不忍開之齎金贖弟陶朱公中子殺人於楚朱公遣少子齎金千斤贖罪長子請行到楚遺莊生莊生言王將赦天下長子以弟自當免遂不與莊生怒反言於王先殺朱公子而後赦長子持弟喪歸朱公曰吾固知必殺汝弟汝見吾貧苦時重惜金所以卒殺汝弟無子天窮老而無子天人之窮叔向之憂無子也伯道無兒皇天無知使伯道無兒伯道鄧攸字也擠溝小人老而無子知擠于溝壑見上注絳人絳縣人老而子預於城杞之食辱在泥塗趙孟謝之無後子文無後何以勸善妻無子衛莊公娶于齊東宮得臣之妹曰莊姜美而無子衛人為賦碩人又晉獻公娶于賈而無子何以能育托身於人樓護字君卿故人呂公無子歸護護養之終身為將不愛妾後漢祭遵為征虜將軍同産兄午以遵無子取妾送遵不受曰自以身任於國不敢慮繼嗣之計遺孤孤兒愛子托子恤後皇恤我後負薪孫叔敖死無立錐之地其子負薪於楚牧豕陳祐年二十而孤家貧牧豕於長垣澤中其父之友謂曰子二千石子牧豕縱子無恥奈何先君六尺之孤可以托六尺之孤謂幼君少孤孔子少孤不知其墓孤子死王事者之子周禮不逮事父母謂少孤也以縗抱之禮父沒子幼則以縗抱之慈幼見上恤孤禮字孤不能字人之孤無父何怙有子疇依漢帝既臨張禹有托安昌侯張禹疾病罷侯車駕親臨令幼子拜於床下山公尚在嵇紹不孤嵇康臨刑謂子曰山公在汝不孤仲宣無後魏王粲死後二子犯法誅絶後時太祖在漢中聞粲子死歎曰孤若在彼不使仲宣無後也虎子吳凌統卒二子皆孫權收養宮中愛遇與諸子同賓客進見呼之曰此吾虎子八歲令讀書十日一令乘馬及長追録統功封亭侯還其故兵知子莫若父知子莫若父知臣莫若君舉子祁奚請老晉侯問嗣焉稱解孤其讎將立而卒又問焉對曰午也可午奚子趙奢史趙括少學兵法父奢不能難然不謂之善曰兵死地而括易言之敗趙軍者必括也吳恢後漢吳祐父恢為南海欲殺青簡寫經祐諫曰踰趙五嶺俗多珍怪此書若成載必兼兩昔馬援以薏苡興謗王陽以衣囊徼名恢曰吳氏世不乏季子石苞石苞臨終分財與諸子不及崇崇母為言苞曰小兒雖小後自得之王昶晉王湛有隱德兄弟以為癡父昶獨異焉索靖每曰吾子琳廊廟器非簡札之用州縣吏不足污吾兒矣姚弋仲仲令子襄討石閔謂曰汝才十倍於閔謂不從坐吳志騶子張叔纍遷司直封侯父山陰德卒知涉不良表請有罪謂不從坐詔許之業官明經丞相漢書韋賢字長孺子玄成字少翁俱以明經位至丞相故語曰遺子黃金蒲籯不如一經司徒緇衣美鄭武公父子並為周司徒善於其職也父作子述禮父作之子述之謂文王武王之業清白問絹晉書故質仕魏為荊州剌史子威自京師省父自驅驢不止傳舍留十數日告歸父賜縑一匹威跪曰大人清貧何以得此曰吾俸祿之餘及威為徐州剌史武帝問之卿清孰如父對曰臣父清畏人知臣清畏人不知業書晉書王羲之子獻之並能書謝安問獻之君書何如君家君答曰固當不同大夫漢書杜延年為御史大夫以居父官不敢當父舊位坐臥皆易其處也張奐生男復臨此郡魏略張奐為武威太守時猛母方孕夢印綬登樓而歌旦告奐奐訊占夢占夢曰夫人生男復臨此郡必死官乎及生猛以建安中為武威太守殺剌史邯鄲商州兵圍之猛急恥見擒曰豈使我頭過華陰歷先君之墓乎乃登樓自燒而死替代漢公孫賀自太僕卿遷丞相其子敬聲代父為太僕卿韋康三輔録曰康字元將代父端為荊州剌史父老止傳舍康入官時人榮之辛毗魏志辛毗為衛尉卿子敞亦為衛尉卿同官隔坐吳録記亮為尚書令子騭為中書令每朝會詔以御屏風隔其坐周公拜前魯公拜後尚書劉馥為揚州太守恩化大行子靜為盧江守詔曰卿父昔為彼郡可謂能克負荷也三代為司隸後漢趙興不恤忌諱三代為司隸司隸下著姓世祖令鮑昱封隆胡檄問有所怪否昱曰通官文書不著姓怪司隸下著姓世祖曰吾欲令天下知忠臣子復為司隸也父子同戮父子伏誅漢書周紓字文通為沛郡守為人酷虐後坐事父子皆伏誅及宗後漢公孫賀為丞相子敬聲為太僕敬聲有罪賀請補朱安世以贖子罪安世曰丞相禍及宗矣子代父死史石奮相楚行縣有殺人者追之乃其父也縱其父還而自拘曰殺父立致非孝也廢法縱罪非忠也臣當死乃自刎而死假父假子何晏魏略太祖納何晏養收何晏養宮中服飾擬太子文帝憎之謂之假子秦朗獻帝春秋曰秦朗父為張飛所殺太祖納其母愛朗謂人曰豈有愛假子如孤者孔治命韋溫為翰林學士先是綬在禁廷積憂畏病廢故誡溫不得任近職至是固辭帝怒曰寧綬治命邪禮部侍郎崔蠡曰溫用亂命益所以為孝帝意釋然換知制誥賦詩同上既疾召親屬賦綬詩在室愧屋漏因泣下曰今知沒身不負斯誡矣同在禁管蘇瑰子頲遷給事中拜中書舍人時瑰曰中書門下三品父子同在禁管朝廷榮之俳兒莊恪太子永暴薨帝悔之明年下詔以陳王為太子置酒殿中有徘兒緣撞父畏其顛環走撞下帝感動謂左右曰朕有天下返不能全一兒乎因泣下繼為宰相竇至德父子繼為宰相世詫其榮同為侍郎崔挹子湜景龍二年遷兵部侍郎而挹為禮部侍郎武德已來父子同為侍郎惟挹湜云相失挹得謝而性貪數為人請托以干湜湜多不從由是父子相失廬陵在遠王方慶贊曰李德裕著書稱方慶為相時子為眉州司士參軍武后曰君在相位何子之遠對曰廬陵是陛下愛子今尚在遠臣之子庸敢相近以比倉唐悟又侯事呼乎君子哉父稱忠孝韋嗣立與承慶異母武后召嗣立謂曰爾父常稱二子忠且孝堪事朕比兄弟稱職如而父言今使卿兄弟相代並為宰相及知政事父子並為宰相世罕其比有父風采崔謹由有父風采彊幹李昭德彊幹有父風殢愛多愆褚遂良以為父子殢愛者多愆善教楊恭仁隋觀王雄子也仁壽中纍遷甘州剌史臨事不苛細徼人安之文帝謂雄曰匪特朕得人乃卿善教子矣吾家有子蘇詵十餘歲彊學有成人風頲曰吾家有子稱尊桓彥範曰父在子稱尊為逆字善訓子手詔褒善舒王元名子豫章王亶治江州有美政高宗以元名善訓子手詔褒善不肖高儉為氏族志崔幹仍居第一帝曰我於崔盧李鄭無嫌顧其世衰不復冠冕猶恃舊地以取資不肖子偃然自高販鬻松檟不解人間何為貴之功名之奇近世所未有李朔始晟克京師市不改肆訴平蔡亦如之功名之奇近世所未有同拜李宗閔進中書舍人父䎖為華州剌史父子同拜世以為寵撻潘好禮子請舉明經好禮曰經不明不可妄進乃自試之不能通怒撻之而徇於門有父風矩柳仲郢牛僧孺辟武昌幕府有父風矩僧儒歎曰非積習名教安及此邪不能事父柳圭與璧繼擢進士杜牧李商隱稱之以藍田尉直洪文館遷右拾遺給事中蕭倣鄭裔綽謂不能事父封還其詔賣子朱忠亮授四鎮節度使涇俗舊多賣子忠亮以財贖免者前後數百屬無親疏沈傳師治家不嚴威閨內自化兄弟子姓屬無親疏衣服飲食如一譖崔衍繼母李不慈倫使吐蕃歸李敝衣以見問故曰衍不吾給倫怒召衍將袒而鞭之衍泣無所陳倫弟殷趍白衍所廩舉送夫人所尚何云倫悟由是譖無入令子鄭餘慶子涵為右補闕敢言無所諱憲宗謂餘慶曰涵卿令子而朕直臣也可更相賀繼美賈至明皇幸蜀帝傳位至當撰冊既進槁帝曰昔先天誥命乃父為之辭今茲命冊又爾為之兩朝盛典出卿家父子可謂繼美矣至頓首嗚咽流涕率門生出迎楊嗣復父於陵嗣復領貢舉時於陵自洛入朝乃率門生出迎置酒第中於陵坐堂上嗣復興諸生坐兩序始於陵在考功擢浙東觀察使李師稷及第時亦在焉人謂楊氏上下門生世以為美龍崔珙父穎生八子皆有才世以擬漢荀氏八龍密語符令琦幽州亂挈子璘奔昭義田承嗣盜其地引令琦為右職田悅拒命馬燧敗之洹水令琦密語璘曰吾閲世事多矣自安史干紀無噍類吾觀田氏覆亡無時安用苟朝夕繫縲京師宗族屠地汝能委質朝廷為唐忠臣吾亦名揚後世矣璘泣曰悅忍人也近禍可畏答曰今王師四合吾屬俎中醢兒今行吾死不朽不行吾亦死尸疊逆地云何璘俯泣不能對得父一絶宋之問父令文富文辭且工書有力絶人世稱三絶既之問以文章起其弟之悌以蹻勇聞之遜精草隸世謂皆得父一絶求降外官增父秩孫逖父嘉之逖遷中書舍人拜嘉之且八十猶為令逖求降外官增父秩帝嘉納拜嘉之宋州司馬聽致仕顯名甄逢常以父不得在國史而逢與元稹善稹移書於史館修撰韓愈愈答逢能行身幸於方州大臣以摽目其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣由是父子俱顯名訪索呂向向之生父岌客遠方不還後有傳父猶在者訪索纍年不獲它日自朝還道見一老人物色問之果父也下馬抱父足號慟行人為流涕帝聞咨歎官岌朝散大夫杜門不出韋陟以父不得志歿乃與斌杜門不出八年親友更往敦曉乃強調洛陽令宋璟見陟嘆曰盛德遺範盡在是矣不私姚崇二子在洛通賓客饋遺憑舊請托魏知古歸悉以聞他日帝召崇曰卿子才乎皆安在崇揣知帝意曰臣二子分司東都其為人多欲而寡謹是必嘗以事千魏知古帝始以崇私其子或為隱微言動之及聞乃大喜問安從得之對曰知古臣所薦也臣子必謂見德而請之帝於是愛崇不私而薄知古欲斥之崇曰臣子無狀撓陛下法而逐知古外必謂陛下私臣乃止廣平風衰宋璟子升尚渾恕華衡天寶中渾恕尚並以贓敗流貶華衡亦皆坐廣德中渾起為太子諭德物議穢薄之流死江嶺兄弟皆荒飲俳嬉而衡最險悖廣平之風衰焉父子為學士蔣乂父子為學士儒者榮之有方面功田布諸子皆有方面功諫史孝章父憲誠得魏遷士曹參軍孝章見父數奸命內非之承間諫曰大河之北號富強然而挺亂取地天下指河朔若夷狄然今大人身封侯家富不資非痛洗溉竭節事上恐吾踵不旋禍且至因涕下沾襟父武不盡聽文宗賢之峭立有父風鄭裔綽試文韋溫以祓萃高等補咸陽尉父愕然疑假權謁進召而試諸廷文就無留思喜曰兒無愧矣吾兒不及若兒許敬宗孫彥伯昂子也頗有文敬宗晚年不復下筆凡大典冊悉彥伯為之嘗戲昂曰吾兒不及若兒答曰渠父不如昂父請二息補外源乾曜進侍中建言大臣子併求京職俊又率任外官非平施之道臣三息俱任京師請二息補外以示自近始詔可乃以子河南參軍弼為絳州司功大祝潔為鄭尉蘇氏宰相蘇廷碩與宋璟同當國璟嘗曰吾與蘇氏父子同為宰相僕射長厚自是國器獻可替否事至即斷盡公不顧私則今丞相過之不親教子張士衡父文慶士衡九歲居母喪哀慕過禮博士劉軌思見之為泣下奇其操謂文慶曰古不親教子吾為君成就之乃授以詩禮有父風蕭穎士子有亮直有父風庶事無間張曲江集敕突厥可汗書與兒情為既深庶事無間父子之國直往直來何異一家直無別也其在家無子弟之過居京兆之側遇事輒爭不從其令而從其義求子弟之賢而能業其家者韋群玉也韓文盛德遺範韋陟為洛陽令宋璟見陟嘆曰盛德遺範盡在是矣異類合為父子義兒傳世道衰人倫壞而親疏之理反其常干戈起於骨肉異類合為父子開平顯德五十年間天下五代而實八姓其三出於丐養蓋其大者取天下其次立功名位將相豈非因時之隙以利合而相資者邪五代史固宜長有人文章紹編剷韓愈贈張籍詩白母慈子育有慈無威母取其愛孝經厚其慈母也天只水火子既生不免水火母之罪母德母儀陟屺詩母氏劬勞聖善何恃無母何恃詩靡依匪母母兮鞫我腹我育我畜我長我欲報之德異天罔極三年免懷子生三年然後免於父母之懷不獨子其子禮各子其子從子婦人從人者也嫁從夫夫死從子慈愛無能禮母之親子也賢則親之無能則憐之母養如母而養之傍無几杖後漢胡廣年八十心力克壯為太傅繼母在堂朝夕省膳傍無几杖言不稱老母卒居喪盡禮三年母為敵獲徐庶母為曹公所得庶謂劉備曰本欲為明公效愚款今失老母方寸亂矣備遂聽庶降曹拜畫像漢金日磾母教誨兩子有法度上聞嘉之病死詔圖畫日磾每見像常涕泣賢母聖善母氏聖善我無令人三徙孟軻之母三徙擇鄰以教子買豬韓詩曰孟子少時問東家殺豬何為母曰欲啖汝既而悔曰吾聞胎教割不正不食席不正不坐今適有知而欺之是教之不信乃買豬肉以食之寄鮓吳録孟仁字恭武本名宗為監魚池司馬自結網捕魚作鮓寄母母還之曰汝為魚官以鮓寄母非避嫌疑也陰德孫叔敖幼時逢兩頭蛇畏後人見乃殺埋之其母曰汝有陰德必有陽報汝無憂矣掃墓嚴延年為河東太守峻刑酷法吏人號曰屠伯其母知終伏誅乃曰不意當老見壯子被刑戮今去汝東歸掃除墓地耳言待其靈樞也遂歸見昆弟宗人復言之後歲餘延年果棄市東海莫不賢其母不食漢書嶲不疑為京兆尹每録囚徒其母問以平反喜而食否則怒不食故不疑為吏嚴而不酷以為己子莊姜無子戴媯生桓公莊姜以為己子言若己生以為嫡子趙姬請逆盾與其母來以盾為才以為嫡子而使其己子下之不哭禮公父文伯之喪敬姜據其床而不哭曰吾有斯子也吾以為賢人也及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣注內人妻妾也舉德晉吳隱之字處默居喪過禮與韓康伯母鄰康伯母聞隱之哭謂其子曰汝居銓衡當舉此人及康伯為吏部尚書遂舉隱之階清級趙括母史趙王使括為將代廉頗其母請於王曰括必敗請不從坐後果敗王乃原其母王陵母在楚使人於漢謂陵曰漢王長者善事之無以吾為念因對使者自刎以固陵志叔向母叔向欲娶申公巫臣氏其母止之曰甚美必有甚惡叔向懼不敢娶平公彊使娶之生子伯石其母將視之及堂聞其聲而還曰豺狼之聲是必喪羊舌氏遂不視之陳嬰母秦末天下兵起嬰亦起衆母曰自吾為汝家婦長見貧賤卒富貴不祥不如以兵屬人事成少受其利王經母魏王經為尚書高貴卿公欲計司馬文王經及王沉王業謀經諫以魯昭公不忍李氏卒有乾侯之禍沉業馳出告文王經獨不告被收辭母母顏色不變笑而應曰人誰不死恐不得死以此併命何恨之有才學漢崔篆母師氏能通經學百氏之言王莽寵以殊禮賜號義成夫人崔實母後漢崔實母劉氏博覽書傳實為五原太守有能政母助也生徒受業晉韋逞母宋氏父世儒學盧壺奏就家立講堂置生徒百二十人隔紗幔受業號文宣君侍婢十人智略何無忌母劉氏弟牢之為桓玄所殺常思報及無忌與劉裕定謀夜於屏風內制檄劉氏以器覆燭窺之泣曰我不如東海呂母既孤其誠常恐哀促其壽養前妻子羊祜前母孔融女兄發初與祜同母兄弟俱病祜母度不能兩存乃專心於發遂得濟也截髮待客陶侃字士衡孝廉范逵嘗過侃時倉卒無以待客母謂侃曰汝但留賓客吾為計乃截髮為雙鬃賣易酒殽極豐備歡樂從者亦過望逵至京師稱述侃侃遂知名罵賊而死楊阜字義山參冀州軍事馬超攻破冀城殺刺史阜外兄美敘屯歷城阜見敘母說冀中事責敘不討賊敘母慨然救敘與阜起兵超禽得敘母母罵超殺之太祖下詔褒美之遺母鮓陶侃母諶氏侃少為縣吏嘗監魚池以魚鮓遺母母封鮓責之曰爾以官物遺我不能益我乃增吾憂耳惡母母嚚舜不安其室衛之淫風流行雖有七子之母猶不能安其室言欲去嫁也許穆頑蒸於夫人公子宣姜生也掇蜂之譖伯奇後母令奇掇蜂因而之譖其父尹吉甫乃逐之欲罪也寤生遂惡鄭公公寤生驚姜氏遂惡之後遂復為母子如初也棄子路有飢婦人抱子棄草間文選棄女堤下宋芮司徒生女子赤而毛棄之恭姬之妾取以入名之曰棄棄子冰上史記姜嫄踐巨人跡而孕生子為不祥棄之冰上飛鳥以翼覆之故名棄周祖后稷也新息婦人殺子後漢賈彪為新息令人貧困多不養子彪嚴為制與殺人同罪城南有盜害人城北婦人殺子彪出案椽吏欲引南彪怒曰賊害人此有常理母子相殘逆天違道遂先北也慈幼周禮棄子後漢龐參妻棄前妻子於井畜我不卒父兮母兮妊孕生育既生既育比豫于毒嗣續以嗣以續續莫大焉父母生之夢蘭鄭文公有賤妾燕姑夢天使與己蘭曰以是為而子既而文公與之蘭而御之曰妾不才幸而有子將不信敢徵蘭椒聊之實繁衍盈升芣苡婦人樂有子也采采芣苡薄言掇之男子之祥吉夢維何維熊維羆男子之祥維虺維蛇女子之祥弄璋弄瓦乃生男子載衣之裳載寢之床載弄之璋其立喤喤乃生女子載寢之地載衣之裼載弄之瓦贈鯉孔子子生三月有贈鯉魚者乃名子曰鯉字伯魚珠生老蚌孔融與韋端書曰不意雙珠生於老蚌繼體承家繼代保家有文在手傳宋武公生仲子有文在其手曰為魯夫人故仲子歸于我又邑姜方娠太叔夢帝謂己子名曰虞乃生有文在手曰虞遂以名之同物傳云相公是其生也與吾同物命之曰同謂同日生也三月禮子生三月而人名之聞聲不視叔向娶夏姬之女生子伯石其母及堂聞其聲曰豺狼之聲是必喪羊舌氏遂不視之聞聲觀狀楚司馬子良生子越椒良兄子文曰必殺之是子也熊虎之狀豺狼之聲不殺必滅若敖氏矣良不可後果滅若敖氏掌上之珠懸弧之慶男子初生以桑弧蓬矢六射天地四方示男子有事於四方又男女生男子設桑弧篷矢於門左女子設帨於門右也月辰禮妻將生子及月辰居側室夫使人日再問之至于生子復使人問之諸侯之禮也翦髮子生三月有之未擇日翦髮為鬌男角婦羇委則男左如右鬌遺髮也負髮子生三月始負子以桑弧蓬矢射也父母全而生之孩而名之子生三月妻以子見夫入門升阼陽妻抱子出升自西房父執子之右手父母全而撫其首也皆諸侯之禮食母禮諸侯家子生卜士之妻大夫之妾使食之大夫之子食母士之妻自養其子庶人禮庶人無側室生子及月辰夫出居群室其問之與子見父之禮無以異也子既生見父父必循其首也厥初之生有後之慶寢床見上注婦孕不育易乃多女災孕者傷也胎夭多傷胎生者不殰卵生者不殈殰敗也殈裂也宅者孕育能育何以宅者不坼不副無災無害謂姜嫄生后稷也疈音芳反毛詩似己莊子厲人生子恐其似己夜生取火視子厲醜人也三歲不孕易誕彌厥月先生如達樂羊子言易産姜嫄彌月不遲彌終也十月生子不遲接子凡接子擇日冢子則太牢謂天子世子太牢庶人特豚士特豕大夫少牢緩帶榖梁一人生子三人緩帶賜酒句踐令有娩者以告公今醫守之生男壺酒一犬生女壺酒一豚生三人公與之乳母二人與之餼給復漢書民産子復二歲胎教榖後焚章帝賜妊者胎教榖三斛夫復一歲著於令神光應嫗生四子見神光照室試四之乃得黃金諸子宦學並有才名兆葉熊羆慶傳嗣續從在手之文徇征蘭之請名子雙生梁嬴見下過期注居上為兄公羊言古人尚質雙生以後生者居上取以為兄則百斯男詩太姒嗣徽音則百斯男螽斯子孫衆多宜爾子孫陸終生六子史記陸終氏生六子拆剖而生焉不夫而孕列子曰思女不夫而孕又漢書哀牢夷者其先有婦名紗一居牢山捕魚水中觸沉木若有感因懷妊十月産子十人産驚死酈炎字文勝好學風病恍忽至孝母憂疾其發動妻始産而驚死妻家訟之不能理死獄中棄之不死韓朗字伯奇生三日遭亂棄於荊棘數日兵解母往視之有氣息乃收養及長舉為孝廉居然生子姜嫄無人道居然生后稷鬻子之閔斯鬻姓也雉之病也修己背坼而生禹簡狄胸剖而生契生齒家語男子八月生齒七歲而齔墮地范曄母如廁而生華額為磚傷因小字磚天地相應乃得化淳男女匹配乃得化生陰陽不對生可得乎易損卦注過期梁嬴孕過期卜將生一男一女男為人臣女為人妾過期謂十月不生遺服小同鄭玄別傳曰玄子為孔融吏舉孝廉融破圍往赴難被賊害有遺腹子以下卯日生玄以丁卯歲生故名曰小同李陵漢書李廣子當戶當戶早卒有遺腹生子陵有廣之風烈泗水王漢泗水戴王前薨無嗣國除後宮有遺腹子暖相內史不奏言上聞而憐之立暖為泗水王相內史皆下獄出母白也之母子思曰為伋也妻是為白也母不為伋也妻是不為白也母故孔氏不喪出母自子思始也不喪見上注子上之母禮曰子上之母死而不喪問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰吾先君子無所失道道隆則從而隆道汗則從而汗伋則安能為俊也妻云云注為禮出母期父卒為久後者則不服無服禮為父後者為出母無服之云不敢以私喪廢宗祀之禮慰心凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰母心詩曰有子七人莫慰母心辭母不顧吳駱統字公緒母改適為華歆小妻統時八歲遂與親客歸會稽其母送之拜辭上車面西母不顧泣於後御者曰夫人猶泣統曰不欲增母思乃不顧也母賤子貴史記姑布子卿見無恤曰此真將軍也簡子曰此母賤翟婢也子卿曰天之所授雖賤必貴母微裴秀母妾也秀年十八有令望而嫡母猶妒令秀母進饌於客賓見並起拜之母曰微賤如此應為小兒矣不聘傳聲伯之母不聘穆姜曰吾不以妾為似也後母織屨給子漢翟方進為小吏蔡文伯有封侯骨西至京師受經後母隨之長安織屨以給子射策甲科迎後母不至漢何武後母在遣使迎會盜賊留久不至哀帝策免曰君孝聲不聞其上印綬事逾謹後漢馮衍子約年十二後母惡之因夜行毒而豹敬事逾謹旁無几杖胡廣見上雙魚躍出晉王祥繼親朱氏欲生魚祥解衣將剖冰冰解雙魚躍出又思黃雀灸有數雀飛入幕中庭有丹奈母令守之風雨抱樹而泣羊祜母羊祜前母孔融女生兄發初與祜同母兄承同得病祜母度不能兩存乃專心養發得濟不肯隨之官傳咸為州繼母杜氏不肯隨咸之官表解職又喪繼母是下注中官舍設靈傳咸繼母喪以無兄弟乃使官舍設靈坐誣盜閻纘後母誣纘盜父時金訟於有司被清議所棄十年無怨色孝謹不怠母意解乃移中正復品蒲麻紵衣王延後母以蒲麻與延紵衣姑問之不言夏扇枕席冬以身溫母愛魚求不得杖之流血叩而哭忽有一魚長五尺躍出水母食之積日不盡於是撫之如己之子逐不能去薛包字孟常後母憎包分出之包日夜號泣不能去被打不得已廬於舍外且入而灑掃父怒又逐之乃廬於裏門晨夜不廢積歲餘父母慚而還之後六年服喪過乎哀戚慈愛程文矩妻穆姜有二男而前妻有四子四子以母非所生憎毀日積而穆姜撫字益隆衣食皆兼倍所生文矩卒或謂母曰四子不孝何不分母曰方以義導之使善及前妻長子興遇病因母親調藥餌恩情篤密久乃瘳謂三弟曰繼母慈仁我曹過深矣遠將三弟詣南鄭獄陳母之德狀己之過乞就刑縣言於郡郡守表異其母蠲徑遣四子許以修革托疾求和楊厚守仲植母與前妻子博不相安厚年九歲思令和親乃托疾不方不食母知其旨懼然後改意恩養加篤諫母王祥弟覽字玄通母朱氏遇祥無道覽數歲見祥被撻輒流涕抱持及長每諫母少止使祥非理覽亦與焉虐使祥妻覽妾亦趍往祥漸有時譽朱深疾乃鴆祥覽知取酒祥亦爭之不與朱遽翻之後母食覽必嘗之朱意乃止孔杜羔母更兵亂不知所之羔養憂號終日及兄兼為澤潞判官鞫獄有媼辦對不凡乃羔母得奉養以母子天性為言狄仁傑陸下欲三思為後且姑姪與母子孰親每以母子天性為言后雖忮忍不能無感故卒復唐嗣賢明鄭善果母崔賢明曉政治嘗坐閣內聽善果處決或當理則悅有不可則引至床下責愧之治家嚴蕭俯母韋賢明治家嚴俯雖宰相侍左右如褐衣問計於母王義方拜御史且疾當世附離匪人以期朝廷內決劾奏意必得罪問計於母母曰昔王母伏劍成陵之誼汝能盡忠吾願之死不恨賢操崔玄暐母盧有賢操常戒玄暐曰吾聞姨兄辛玄馭云子姓仕宦有言其貧寠下自存此善也若資貨盈衍惡也吾嘗以為確論比見親表仕者務多財以奉親而親不究所從來必出于祿廩則善如其不然何異盜乎若今為吏不能忠清無以戴天履地宜識吾意故玄暐所守以清自名王琚始為中書侍郎母居洛陽來京師讓琚曰爾家上世皆州縣職今汝無攻城野戰勞以諂佞取容海內切齒吾恐汝家墳墓無人復掃除也琚卒不免義先國家桓彥範誅二張也初將起事告其母母曰忠孝不並立義先國家可也問所安張鎰華原令盧摐以公事譙責邑人齊令詵宦人也御之結摐罪鎰案驗當免官有司承風以死論鎰下直之乃自其母曰今理摐摐免死而鎰坐貶黜則負官貶則為太夫人憂敢問所安母曰兒無纍於道吾所安也遂執正其罪摐得流鎰貶撫州司戶訟其子不孝五代史安重榮拜成德軍節度使有夫婦訟其子不孝重榮拔劍授其父使自殺之其父泣曰不忍也其母從旁詬罵奪其劍而逐之問之乃繼母也重榮叱其母出從後射殺之躬加訓導顏真卿師古五世從孫少孤母商躬加訓導既長慱學工辭章訓教諸子李景讓母鄭治家嚴躬訓教諸子始貧乏時治牆得積錢僮婢奔告母曰士不勤而祿猶災其身況無妄而得我何取亟使閉坎箠敕同上為浙西觀察使母問行日景讓率然對有日鄭曰如是吾方有事未及行蓋怒其不嘗告也且曰己貴何庸母行景讓重請罪乃赦雖老猶加箠敕己起欣欣如初嘗怒牙將杖殺之軍且謀變母欲息衆歡召景讓責將鞭其背吏大恐再拜請不許皆泣謝乃罷一軍遂定授經薛播早孤伯母林通經史善屬文射授經諸子及播兄弟訓道有方楊憑少孤其母訓道有方長善文辭與弟凝凌皆有名母憂潘孟陽初為侍郎年未四十其母謂曰以爾之材而位丞郎使吾憂之矮子李建母憐其孝每字之曰矮子勸吾食吾輒飽進藥吾意其瘳母不肯去鄉里張九齡為冀州剌史以母不肯去鄉里表換洪州都督免為官婢嚴武卒母哭且曰而今而後吾知免為官婢矣事後母柳公綽事後母薛謹甚雖姻屬不知非薛所生善訓子柳仲郢母韓即皋女也善訓子故仲郢幼而能耆學嘗和熊膽丸使夜咀咽以助勤長工文著尚書二十四司針本傳親導母輿崔邠為太常卿故事太常視事大閲四部樂都人縱觀邠自第去帽親導母輿公卿見者皆避道都人榮之回班候夫人趙隱既輔政它宰相及百官皆詣第升堂慶母歲時公邪必參多許懿宗誕日宴慈恩寺隱等侍母以安輿臨觀宰相方率自官拜恩於廷即回班候夫人起居縉紳以為榮迎還京師陸贄久之不得宰相還京但為中書舍人母韋猶在江東帝遣中人迎還京師不聞無母之人王潮王緒劉行全南走初以糧少故兼道馳約軍中曰以老孺從者斬潮與弟審邽審知奉母以行緒切責潮曰吾聞軍行有法無不法之軍對曰人皆有母不聞無母之人緒怒欲斬其母三子同辭曰事母猶事將軍也殺其母焉用其子緒殺之劉玄佐母貴母尚在賢婦人也常月織絁一端示不忘本數教敕玄佐盡臣節見縣令走庭中白事退戒曰長吏恐懼卑甚吾思而父吏於縣亦當爾而據案當之何安乎玄佐感悟故待下益加禮不貽親憂劉禹錫出為播州剌史詔下御史中丞裴度為言播極遠猿狖所宅禹錫母八十餘不能往當與其子訣恐傷陛下孝治請稍內遷帝曰為人子者當謹事不貽親憂若禹錫望它人尤不可赦度不敢對帝改容曰朕所言責人子事終不欲傷其親乃易連州遊獵以所獲饋母不食趙武孟少遊獵以所獲饋其母泣曰汝不好書而敖蕩吾安望哉不為食楊收母長孫七歲而孤母長孫親授經母躬訓教孔若思早孤其母躬訓教長以慱學聞為母執轡五代張遂清嘗為淄州剌史迎其母及郊遂清為母執轡行數十里州人以為榮臨政問法如何同上焉全節事母至孝其臨政治事必問法如何湯餅客劉禹錫送張盥童子赴舉詩云爾生始懸弧我作坐上賓引箸舉湯餅祝詞天麒麟蒲孺月安樂公主袒而鞭之崔衍父倫衍繼母不慈倫自吐蕃歸李敞衣以見問故曰衍不吾給倫怒召衍將袒而鞭之衍涕泣無所陳第殷趍白衍所廩舉送夫人所尚何云倫悟由是譖無入長為母所訓江南野史彭昌世習儒學長為母所訓遂習先業遠傳科筍味更覺綵衣春杜甫賀正夫人加恩芬芳孟母鄰同上
