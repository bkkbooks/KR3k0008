body:
  text: 卷第二十五孝一白詩凱風美孝子也能盡其孝道以慰其母心七子之母白華美孝子之潔白也南陔孝子相戒以養也書奉先思孝克諧以孝蒸蒸乂不格姦人之行莫大於孝聖人之德無以加於孝乎君子務本本立而道生孝悌也者其為仁之本與事父母能竭其力父兮生我母兮鞠我長我育我出入腹我欲報之德昊天罔極宗族稱孝焉邇之事父弟子入則孝出則悌子生三年然後免於父母之懷豫也有三年之愛於其父母乎州閭鄉黨稱其孝也父父子子天之經地之義人之行也君子頃音跬步之間不敢忘孝潁考叔純孝也愛其母施及莊公傳孝子不匱永錫爾類曾閔之行綵衣為戲老菜子年八十衣綵衣為嬰兒戲於父母之前扇枕溫席羅威孝聞當時生則敬養無違孟孫問孝子曰無違用孝養厥父母五常之首百行之先君子篤於親篤厚也當孝理之時懷歸厚之德天地之經膝下故親生之膝下曰嚴嚴致敬於父母也天性父子之道天性也行以內成孝由中出孝哉閔文騫烏反哺六行之先周禮六行孝友為先父在觀其志父沒觀其行請敦不匱無抑有辭仁親之道執以為恭爾雖有說謂之曰孝吾則不知家統乎尊行先乎孝行成於內陶乎孝理根以天性因心之孝名以孝聞禮由恩制棘心夭夭母氏劬勞蘭陔庭闈陟岵孝子行役思念父母師氏三德教國子三曰孝德以知惡逆三行一曰孝行以親父母不遺惡名禮父母既沒慎行其身不遺父母惡名可謂能終矣嚙指蔡順字君仲養母求薪客至母望順不還母乃嚙指順心動棄薪走歸母畏雷云云巨孝江華事具下注事親孝與士信臨財廉取與義分別有讓恭儉下人孔晉陽公主文德皇后所生后崩主始孩不之識及五歲經后所游地哀不自勝宗室皓事母孝韓思復少孤年十歲母為語父亡狀感咽幾絶趙來章時人哀來章孝岑文本自以興孤生事母以孝顯李日知母未及封而卒方葬吏乃齎贈制日知殞絶于道左右為泣莫能視巡察使路敬僣欲表其孝使求狀辭不報表所居為孝慈里劉子翼貞觀初召之辭以母老詔許終養江南道巡察使李襲譽嘉其孝表所居為孝慈里貌類父既孤不復視鑑韓皋三世以孝行聞楊為三世以孝行聞至門樹六闕古所未有順色柔聲崔彥昭雖為相退朝侍母膳與家人齒順色柔聲在左右無違士人多其孝丐粟以養劉三復少孤母病廢三復丐粟以養海東曾子海東王義慈事親孝於弟兄友時號海東曾子以孝悌名通朝廷者多閭巷剌草之民孝友序唐受命二百八十八年以孝悌名通朝廷者多閭巷剌草之民皆得書于史宮以孝悌自修於一鄉一行傳五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壞而天理幾乎其滅矣於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事跡不著而無可紀次五代史求孝悌之士石昂晉高祖時詔天下求孝悌之士戶部尚書王權宗正卿石光贊國子祭酒田敏兵部侍郎王延等相與詣東土閣上昂行義可以應詔孝者所以教人為善五代周世宗家人傳體常流血流敦儒母病狂易非笞掠人不能安左右皆亡去敦儒日侍疾體常流血母乃能下食敦儒怡然不為痛隱留守韋夏卿表其行詔標闕於閭徒步號泣省父宇文融劾張說引術士解禱出為魏州又貶洪州剌史子審與兄弟侍母京師及聞融再貶不告其家徒步號泣省父使者憐之以車共載達于巖州力耕養母王質力耕以養母父誅解衣請代高郢父伯祥為好畤尉安祿山陷京師將誅之郢尚幼父誅解衣請代賊義并貸之孝聞里閭高霞寓五代不異居孝聞里閭德宗初採使洪經綸言之詔表闕于門路隋父泌從渾堿會盟平涼為虜所執死焉時隋方嬰孺以恩授八品官逮長知父執虜中日夜號泣坐必西嚮不食肉母告以貌類泌者終身不引鏡路巖志純潔親歿終身不食肉闕中曾子賈會時號關中曾子賜鴆代飲賈直言父道中以藝待詔代宗時坐事賜鴆將死直言紿其父曰當謝四方神祇使者少怠輒取鴆代飲迷而踣明日毒潰足而出久乃蘇帝憐之免父死俱流領南直言猶足躄自負母入京師元德秀少孤事母舉進士不忍去左右自負母入京師奉祿不入私舍司馬鍠事繼母孝奉祿不入私舍六闕相望朱敬則以孝義世被旌顯一門六闕相望去病孤王忠嗣父海賓戰死玄宗憐其忠贈左金吾大將軍忠嗣時年九歲始名訓授尚輦奉御入見帝伏地號泣帝撫之曰此去病孤也須壯而將之更賜令名養禁中李光弼事繼母至孝見本傳贊第五琦子峰婦鄭皆以孝著表闕于門李晟幼孤奉母孝李源以父死賊手常悲憤不仕不娶絶酒葷惠林佛祠燈舊墅也源依祠居闔戶曰一食祠殿其先寢也每過必趨未始踐階穆宗詔曰源有曾參之所怡然無營夫旌孝所以激人倫也並本傳未嘗與人爭沈季詮少孤事母孝未嘗與人爭皆以為怯季詮曰吾怯乎為人子者可遺憂於親乎哉鄭善果父誠戰死善果方九歲以死事子襲爵家人為其幼弗告也及受詔號慟不自勝顏真卿事親孝十歲有至性獨孤庠父喪始十歲有至性聞呼父官及吊官來輒號慟幾絶欲與人游必先白母五代王殷事母以孝聞欲與人游必先白母母所不可者未常敢往及為剌史政事有小失母責之殷即取杖授婢僕自笞於母前睦親化人韋萬石始萬石奏太樂博士弟子遭喪者請以卒哭追集侍御史劉思立劾奏萬石曰睦親化人莫善於孝母食必侍立左右五代張希崇事母至孝朝暮母食必侍立左右徹饌乃敢退負王妣登樓錢鏐嘗於後庭樹層樓王妣春秋高不能上乃親負而登焉吳越備史入廚具甘旨上堂問起居韓愈董召南詩賊閔其孝支叔才隋末荒饉夜丐食野中還進母為賊執欲害之告以情賊閔其孝為解縛傭書蕭銖後粱宣帝曾孫少傭書事母孝匹夫單人行孝一概而凶盜不敢凌天子喟而旌之者以其教孝而求忠也孝友贊天寶三載詔天下家藏孝經本紀孝德傳郎餘令孝敬在東官餘令以梁元帝有天寶三載撰後傳數十篇獻太子太子嗟重改著作佐郎卒人知孝慈則氣感和樂薛放曰孝經人倫之本也光武令虎賁士皆習孝經玄宗親為注訓蓋人知孝慈則氣感和樂也帝曰聖人以孝為至德要道信然事親養志為大穆寧嘗撰家令訓諸子人一通又戒曰君子之事親養志為大吾志直道而已苟枉道而三牲五鼎非吾養也靈武二孝李華二孝贊序靈武二孝侯知道程具羅所見戎馬旃裘參於夷狄而能生以孝養歿奉以哀穿墉起墳廬於冢次根於天性陶我孝理二子之孝過於曾氏故為之贊云肇有二位孝道爰興柳宗元孝門銘肇有二位孝道爰興亢修厥猷載藉是登在帝有虞以孝蒸蒸仲尼述經以教于曾惟昔魯侯見命夷宮亦有考叔寤莊稱純顯顯李氏實與之倫猧子勸吾食輒飽李建母憐其孝每字之曰猧子勸吾食輒飽進藥吾意其寥衣布飯蔬虞世南所繼父寄陷於陳世南雖服除仍衣布飯蔬寄還乃釋服啖肉本傳養禮二白南陔孝子相戒以養也採蘭有事弟子服其勞有酒食先生饌曾是以為孝乎言未足為孝也服勤至凡為人子者冬溫而夏清昏定而晨省定安床衽省問安否曾子曰君子所謂孝者先意承志諭父母於道參直養者也安能為孝乎小人皆能養其親君子不敬何以辨陸績懷橘九歲字公紀子路負米下氣怡聲和氣愈色啜菽飲水子路曰傷哉貧也生無以為養孔子曰啜菽飲水以盡其歡斯之謂孝禮曰君子之孝養也樂其心不違其志生則親安之祭則鬼享之居則致其敬養則致其樂子曰今之孝者是謂能養至於犬馬皆能有養不敬何以別乎語文王之為世子朝於王季日三雞鳴而衣服至寢門外問內豎之御者曰今日安否食上必在在察視寒暖之節食下問所膳問所食命膳宰曰末有願末勿也願再也令其食物無再進也問所欲而敬進之內則父母在朝夕恆食子婦佐餕子與婦食其餘食父沒母在冢子御食侍母食也群子婦佐餕如初禮烹熟羶薌嘗而薦之非孝也養也養可能也敬為難敬可能也安為難孟子云曾子養曾晢既食問有餘乎曰有恐曾晢要分賜與人曾元養曾子既食問有餘乎曰無矣將以復進也若曾子者所謂養志也曾元者養口也事親如曾子可也父母何嘗何食詩剌勤勞不得養父母也慈以旨甘禮就養無方大養後漢書曰夫鐘鼓非樂之本而不可去三牲非孝之主而養不可廢言能大養則周公致四海之祭以義則仲由之菽甘於東鄰之牲行傭供母江草字次翁客下郅行傭供母母老恐搖動自在轅中挽母車父母老不辭官晉賈充責桑純父母老不歸養中丞孔恂劾詔下議何曾等曰稽之禮律八十者一子不從政九十者家不從政新令亦如之桑純父年八十兄弟六人三人在家不廢侍養於禮律未有違解職就養傳咸字長虞出為冀州剌史繼母杜氏不肯隨咸之官咸自表解職也祖母老辭官李密字令伯徵為太子洗馬密以祖母劉氏年高無人奉養上表陳情不應命孔陽城迂國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十輩有三年不歸仕者斥之臺制苛嚴不可省養韋溫入為監察御史以臺制苛嚴不可收省養不拜換著作郎既謝輒解歸力耕養母王質力耕以養母三時侍食吾小時猶省長幼每日兩時節盥起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出高眼爭覽盤器何曾有此儀可為太息李華與外孫書孝行三白子曰父母唯其疾之憂色難承順顏色為難父母之年不可不知也一則以喜一則以懼見其壽考則喜見其衰老則懼孝哉閔子騫人不見於其父母昆弟之言為人子者出必告反必面所游必有常所習必有業恆言不稱老廣也不登高不臨深不苟訾不苟笑孝子不服暗服事也暗中為事好生嫌疑不登危懼辱親也父母在不許友以死不有私財父母命呼唯而不諾手執業則投之食在口則吐之走而不趨曾子曰身者父母之遺體敢不敬乎居處不莊事君不忠蒞官不敬朋友不信戰陳無勇非孝也五者不遂災及其親敢不敬焉遂成也一舉足不敢忘父母是以道而不徑徑邪道也舟而不游不敢以先父母之遺體行危殆一出言不敢忘父母是故惡言不出於口忿言不及於身不辱其身不羞其親可謂孝矣父母在不稱老閨門之內戲而不歎君子於此方人人猶薄於孝而厚於慈蒸蒸舜也孜孜漢明也鮑永去妻永字君長妻於母前叱狗永遂去之違命則不孝左敬親者不敢慢於人孝經事親者居上不驕為下不亂在醜不爭三者不除雖日用三牲之養猶為不孝也孝莫大於嚴父尊嚴其父敬其父則子悅修身慎行恐辱先也居父舊官漢杜延年拜御史大夫居父舊官不敢當其舊位坐臥皆易其處所子曰孟莊子之孝也其他可能也其不改父之臣與父之政是難能也為人子者三賜不及車馬恐尊踰於父孝有三小孝用力中孝用勞大孝不匱慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母在不敢有其身不敢私其財示民有上下也傷足不出樂正子春下堂而傷足數月不出猶有憂色全歸父母全而生之子全而歸之可謂孝矣三年無改於父之道可謂孝矣不擇祿子路曰家貧親老不擇祿而仕倚門王孫賈年十五母曰汝朝出晚來倚門望暮出不歸倚廬望最孝萬石君子孫咸孝建為倚號哭救父樂恢年十一父為縣吏得罪將殺恢伏寺中晝夜號哭令哀之而赦其父遇賊江革字次翁臨淄賊起負母逃走遇賊不忍害傍無几杖胡廣年八十繼母在堂口不稱老傍無几仗忌日三日不食中屠蟠孛子龍驢鳴戴良字叔鸞母好驢鳴良常學之以悅母手不驅蚊晉吳猛常手不驅蚊畏其去噬母也眇目殷仲堪父病積年拭淚眇一目不許友以死聶政不受嚴仲子金以母在未敢許人之死取江水姜詩母好江水詩兒為母常取之後被江水溺死恐傷母情詐言游學俄而舍傍湧泉如江水并雙鯉同出慰母心有子七人莫慰母心揚名後世見下注身挽車江革事見上注聞父耕泣晉趙至景真詣師受業聞父耕叱牛聲投書而泣師怪問之曰我未能養使老父勞苦師甚異之扇枕王延字元事親夏則扇枕冬則以身溫之洗浣石建為郎中令每五日洗沐歸舍竊問侍者取親中群廁牏身自浣滌注親父也中群言中衣也廁近身衣也牏音投持遺劍張武父業戰失尸骸武每節持遺劍至亡處祭酹而還拜畫圖金日磾見母畫象則拜又晉許孜生有孝行圖父母象於廟朝夕拜之郭巨瘞子見宋略孔李安期父貶桂州遇盜將加以刃安期跪泣請代盜衰釋之號伏叛壘李甘楊牢有至行甘方未顯以書薦於尹曰執事之部孝童楊牢父茂卿從田氏府趙軍反殺田氏茂卿死牢之兄蜀三往索父喪慮死不果至牢自洛陽走常山二千里號伏叛壘禿髮羸骸有可憐伏讎意感解以戶還之單縗冬月往來太行間凍膚皸瘃銜哀雨血行路稠人為牢泣歸責其子以牢免之牢為兒踐操如此未聞執事門唁而書顯之豈樹風扶教意耶以身蔽父霍王元軌歷定州剌史王文璪者與賊戰戰敗二子鳳賢更以身蔽父得全二子死縣抑不為言元軌廉知之遣使吊祭上其事行積雪中五代張策李克用攻王行喻策與婢肩與其母東歸行積雪中行者憐之侍父母喪還鄉徒跣數千里服雖除容貌臞瘠李百藥里中一龍賈會有高節不答辟置里中號一龍親亡負土成墓盧其左手蒔松析時號關中曾子高堂九仞魯輿有北向之悲積粟萬鍾季路有南遊之嘆駱賓王上裴侍郎祿養四白孝乃行先祿宜親及祿非為己養貴逮親鴻既漸而于干鳥豈志於反哺欲養而親不待韓詩曾子曰往而不還者親也故孝子欲養而親不待是故椎牛而葬不知雞豚之逮親存也初吾為吏祿不過鍾釜尚欣然而喜者樂其逮親也既沒之後嘗事楚堂高九尺轉轂百乘猶北向而泣者悲其不逮吾親也家貧親老不擇祿而仕家語子路曰家貧親老不擇祿而仕昔者由也為親百里負米親沒南游於楚從車百乘纍茵而坐列鼎而食願負米百里而豈可得乎樹欲靜而風不止子欲養而親不待枯魚銜索幾何不蠹二親之壽忽如過隙子曰由也可謂思之也毛義捧檄毛義家貧養親張奉慕其名詣義會府檄至以義為守令義捧檄入喜動顏色奉心賤之及義母死除服舉賢良方正不就奉嘆曰往日之喜為親也干及親之祿立身揚名以顯父母日用三牲之養嗷嗷林烏受哺於子耿弇省疾後漢耿弇父況疾兄弟三人皆垂青紫侍省疾當世榮之虞談母孫氏加金章虞談母孫氏夫士不改節訓談忠義後蘇峻反談有功拜武昌侯太大人加金章紫綬談立養堂於家王導已下皆拜感汝墳之就舉周磐堅伯居貧養母叢薄不充嘗讀詩至汝墳之卒章慨然而嘆乃解韋帶就孝廉之舉卒章曰雖則如燬父母孔邇公卿奉壽後漢張酺字孟疾為太尉雖在公位父嘗歸舊里酺每遷職輒一詣京師適會歲公卿罷朝酺府奉酒上壽極歡卒日衆人皆榮慶之將吏拜迎魏張遼文遠屯合肥時遼母至屯遼從出迎所督諸軍將吏皆羅拜迎側觀者之顧雍母吳志顧雍為尚書令迎母於吳既至權臨賀之親拜其母於庭大臣畢會後太子往慶之孔賴祿而養姜公輔為翰林學士歲滿當遷上書以母老賴祿而養求兼京兆戶曹不得就養李光弼帝幸陝數有問其母令郭子儀輦其母還京二年光弼疾篤將吏問後事答曰吾淹軍中不得就養為不孝子尚何言哉未嘗豫宴樂令狐楚觀察使王珙受其材將辟楚楚雖在珙所以父官并州不得奉養未嘗豫宴樂滿歲謝歸求為知院官許康佐家苦貧母老求為知院官人譏其不擇祿及母喪已除凡辟命皆不答人乃知其為親屈歲月其滔王勃倬彼我繫篇有鳥反哺其聲嗷嗷今我不養歲月其滔循陔思養李贊皋賜何弘敬詔卿奉親之孝朕所深知陟屺有懷循陔思養違離周歲固切歸心一鍾信榮祿可以展權欣韋應物送鄒少府詩士皆艷其榮蕭嵩請老家饒財而華為二部侍郎衡以尚主位三品就養年踰八十士皆艷其榮白喜懼之年父母之年不可不知一則以喜一則以懼左右就養無方方常也左右扶持也昏定而晨省定謂床衽省問安否父母有疾冠者不櫛行不翔言不文琴瑟不御食肉不至變味飲酒不至變貌笑不至哂怒不至詈哂見齒也行不能正履不脫冠帶而養親有疾飲藥子先嘗之禮病則致其憂色不滿容色憂王季不安節則內豎以告文王文王色憂王季復膳然後復初文王有疾武王不脫冠帶而養文王一飯亦一飵文王再飯亦再飯旬有二日乃間間瘳也禮曰下氣怡聲問衣燠寒疾痛痾癢而敬抑搔之出入則或先或後而敬扶持之禮曰親老出不易方復不過時黃雀王祥至孝後母病思黃雀求之不得憂嘆乃有雀數十飛入幕母感憐之母失明盛彥母王氏因疾失明彥不應辟召躬奉病久婢使數見捶楚婢伺恨彥行取蠐螬灸飴之母食以為美然疑是異物藏以示彥彥見而抱母慟哭絶而後蘇目豁然即開也奉孝行劉弘為荊州奏仇教母老疾困賊至守衛不移以致栲掠幾至殞命可以訓獎臣子長益風教臣請教為歸鄉令黔婁父痢而私嘗其糞孔取急調侍李日知為給事中母老病取急調侍數日鬚髮輒白涕泣不食韓王元嘉聞太妃病涕泣不食孝童段秀實六歲母疾病不勺飲至七日病間乃肯食時號孝童衣不弛帶韋溫侍親疾調適湯濟彌二十年衣不弛帶不飲乳許法謹甫三歲已有知時母病不飲乳慘慘有憂色或以珍餌詭悅之輒不食還以進母刲股膳母章全益少孤為兄全啓所鞠母病全啓刲股膳母而愈侍湯液未嘗離劉澭怦之次子怦得幽州不三月病且死澭侍湯液未嘗離親潔湯劑王燾性至孝為徐州司馬母有疾彌年不廢帶親潔湯劑東光縣主紀王謹女東光縣主始入歲聞謹有疾不食父哀之紿云已愈主察顏色未平終不肯御內外稱之十旬不解衣房玄齡父疾綿十旬不解衣心悸而痛裴敬彝補陳王府典籤一日忽泣涕謂左右曰大人病痛吾轍然今心悸而痛事叵測乃請急倍道歸而父已卒束帶五旬竇抗侍父疾束帶五旬不弛嘗唾焦懷肅母病嘗其唾若味異輒悲號幾絶獺銜魚張生巖父病藥須鯉魚冬月冰合有獺銜魚至前得以供父父遂愈達于神祇李華崔沔集序公之侍疾也孝連於神祇母病十旬不褫帶藥不嘗不進程袁師心痛知母病舊史孝友張志寬惰末喪父哀毀骨立為州里所稱賊帥聞其名不犯其閭後為里正指縣稱母疾急求歸縣令問其故對曰母嘗有所苦志寬亦有所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄池驗其母竟如所言令異之慰喻遣去旌表門閭嚙疽刳䏶急親之病李甘楊牢有至行以書薦於尹曰目鄉人能嚙疽刳䏶急親之病皆一時決耳猶蒙表其閭脫之徑上有大禮則差問以粟帛違離六白陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮父曰嗟豫子行役母曰嗟豫季行役父母在不遠游游必有方喜懼之年靡瞻匪父靡依匪母凡為人子所游必有常親老出不易方復不過時不使憂也扇枕之戀倚門之恩並見上注晨昏之禮朝夕之膳眷戀庭闈心不遑安父母何嘗何食夫為人子者出必告反必面覲省胡威問絹後漢胡威父質為荊州威自京來省父辭歸父賜絹一匹跪曰大人清苦安得此縑父曰吾俸祿之餘又袁宏字夏甫父賀為彭城相宏往省謁變姓名徒行既至吏不為通會阿母出驚乃自呼入敬父書訊吳顧榿字子通每得父書必歸几按致書於上拜跪讀之每句應諾畢後再拜若父有疾即臨書垂泣即聲哽咽孔狄仁傑親在河陽仁傑登太行山反顧見白雲孤飛謂左右曰吾親舍其下瞻望久之雲移乃得去違離周歲因切歸心一品集賜何弘詔手取連環持答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至問我歸何時韓愈送張道士徒步號泣省父宇文融劾張說引術解禱出為魏州又貶汝州剌史子審與兄弟侍母京師及聞融再貶不告其家徒步號泣省父使者憐之以車共載達于巖州省親鴈門鄭從讜為河東節度使明年賊平詔克用代領河東克用使來曰方省親鴈門願公徐行來告來寧朝夕侍側韓文送鄭十校理序孝感七白曾子至孝三足烏棲其冠家語姜詩江泉見孝門孟宗泣而冬筍出孟宗後母好筍令宗冬月求之宗入竹林慟哭筍為之出劉殷哭而霜堇開劉殷祖母冬月思生堇殷哭感堇生滿地王祥感而黃雀王見父母疾門又剖冰而雙鯉躍出王祥母欲得魚時天寒祥剖冰求之冰開忽有雙鯉躍出動天之德感神之誠天祚大孝物感精誠孝非外至思自中來蛇膽顧含字弘都養嫂失明含嘗藥視膽不冠不入嫂目疾須蚺蛇膽含計盡求不得有一童子以合受含含開視之乃蛇膽也童子出門化為青鳥而去嫂目遂差滅火後漢郅惲為長沙太守有孝子古初遭父喪未葬鄰婦失火火起初匍匐柩上號哭以身捍火火為之滅惲甄異舉之鶴叫晉吳隱之執喪過禮家貧無人助哭每至哭臥之時常有雙鶴鳴叫也七年粟劉殷至孝夢西籬下有粟掘之得十五鐘銘曰七年粟賜孝子劉殷又二白鳩巢於庭赤烏巢門華陽國志吳順養母赤烏巢門白兔游墓後漢方儲字明幼喪父事母母終負土成墳白兔游其下烏助成墳蕭廣濟孝子傳文讓養母至孝母亡兄弟二人役力葬不用僮僕之力葬之日群鳥數千銜土壤助而成墳也又李陶母死陶墓側自治墓群鳥銜土助成墳墳自成生松竹孝子傳宗承父資喪舊瑩負土作一夕而成墳上自高五尺松竹自生火越燒蔡順君仲母終未葬里有火發逼順舍順抱棺叫哭遂火越燒他舍馴兔連理蔡雍廬墓有白馴兔擾木生連理感鳥獸晉許孜季義親沒柴致負土成墳不受卿人之助有哀其苦助者晝不逆夜除之每一悲號鳥獸翔集列植松柏五六里一日廣犯松柏栽歎曰鹿獨不念我乎明日見鹿為猛獸所殺置所犯柏處孜悵惋不已作冢埋鹿猛獸即於孜前自撲而死孜嘆而埋之後樹木滋茂立宅墓側奉亡如在鷹雉同棲鹿獸擾庭中失明後開見父母疾門又冰魚王延後母敕延求魚不得杖之流血延叩頭於冰而哭有一魚躍長五尺孝女沉江後漢叔先雄父墜湍水雄感念常有自沉之意家人防之百餘日消解因乘船於父墜處哭自投水其家夕夢雄曰卻後日當共父同出至期候之果與父相扶持出投箋河伯異苑荀林宗君儒乘水省舅陷河而死兄淪於水側投箋與河伯岸側水開儒執箋浮出曹娥曹娥父為巫祝於縣江泝濤迎婆娑神溺死不後尸娥年十四緣江號哭晝夜不絶旬有七日遂投江而死抱父尸而出孔旌大門閭李迥秀武后嘗遣內人候其母犬乳鄰貓中宗以為孝感旌大門閭白鵲馴擾狄仁傑始居母喪有白鵲馴擾之祥燕更巢共乳崔玄暐居父喪盡禮蘆有燕更巢共乳甘露降樹母亡哀毀甘露降庭樹紫芝産坐側白鳩白雀巢樹張九齡遷中書侍郎以母喪解毀不勝哀有紫芝産坐側白鳩白雀巢於家庭木連理同上居父喪哀毀庭中木連理芝生壤樹趙憬進太子舍人母喪免有芝生壤樹牛徽其父蔚避地于梁道病徽與子扶輿歷閣路盜擊其首血流面持輿不息盜迫之徽拜曰人皆有父今親老而疾幸無駭驚盜感之乃止及前谷又逢盜盜輒相語曰此孝子也共舉輿舍之家進帛褁創以饘飲奉蔚留信宿去王少玄父隋末死亂兵遺腹生少玄甫十歲問父所在母以告即哀泣求尸時野中白骨覆壓或白以子血漬而滲者父胔也少玄饞膚閲旬而獲遂以葬創甚彌年乃興神許二字鄭潛曜侍左右造次不去纍三月不沫面主疾侵刺血為書請諸神丐以身代火書而神許二字獨不化生祥下瑞嗟哉董生孝且慈人不識惟有天翁知生祥下瑞無時期家有狗孔出求食雞來哺其兒韓愈董生行忽有泉出宋思禮事繼母徐孝會大旱井池涸母羸疾非泉不適口思禮憂懼且禱忽有泉出諸庭味甘寒日不乏汲縣人異之柳冕為刻石頌其感芝草生所居堂新說崔希喬以仁孝友悌憂哀毀過禮為鄭縣丞芝草生所居堂一宿而葩蓋盈尺州以聞遷監察御史楊炎父喪廬墓有紫芝白雀之祥詔表其閭炎三世以孝聞至門樹六闕許法謹三歲母病不飲乳後親喪常廬于瑩有甘露嘉禾芝草連理白兔之祥天寶中表異其閭本傳神錫祕祉三秀靈泉柳宗孝門毀傷八白身為親後孝乃行先將使全歸必思淑慎曾子有疾召門弟子曰啓豫手啓豫足而今而後吾知免夫小子言全而歸也曾子曰身者父母之遺體敢不敬乎全而歸之不虧其體樂正子春下堂傷足足瘳數月不出猶有憂色門弟子問之對曰吾聞之夫子曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣君子頃音跬步之間不敢忘父母乘險回車漢王陽為益州長史行至九折阪歎曰奉先人之遺體奈何數乘此險遂以疾去後王遵除為益州剌史至阪問曰此非王陽回車之阪乎吏曰然遂叱其御曰王陽為孝子王遵為忠臣淑慎其身不敢毀傷曾子曰身體髮膚受之父母不敢毀傷孝之始也不辱曾子曰孝有三大孝尊親其次不辱其下能養慎行其身親之枝也孔子曰身也者親之枝也敢不敬與千金之子坐不華堂百金之子立不倚衡漢書持遺劍張武父業戰死不獲尸武每節持劍於亡處祭酹而還哀絶第五倫舉孝廉後遭母喪過毀傷魂靈不反因哀慟絶命孔韓愈鄠人對鄠有以孝子為旌門者乃本其自於鄠人曰彼自剔股以奉母疾瘳鄠大夫常曰他邑有是人乎曰母疾則止於烹粉藥石以為是未聞毀傷支體以為養在教未聞有如此者苟不傷於義則聖賢當先衆而為之也是不幸因而致死則毀傷滅絶之罪有歸矣殘肌敗形柳宗元為壽州安豐孝門銘序安豐縣編氓李興父病自刃股肉父老病已不能啖啜宿而死銘曰默禱隱冥引刃自嚮殘肌敗形羞繕奉進憂勞孝誠創巨痛仍號于空旻捧上濡漾頓首成墳陷膺腐胔剔股王懷貞母病醫言得人肉啖良已懷貞剔股以進母病愈詔旌表其門委巷之陋非有學術禮義之資能忘身以及其親出於誠心亦足稱者列十七八焉孝友傳唐時陳藏器著本草拾遺謂人肉治羸疾自是民間以父母疾多刲股肉而進同上不孝九白不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮以順則逆民無則焉凶德不在於善而皆在於凶德凶德謂悖德禮薄於孝以此防民民猶有薄於孝而厚於慈大為之防民猶有踰之匪人不子遺親敗因嚴之教曾莫敬親正懲惡之刑豈容悖禮德非歸厚罪豈從輕既不念於採蘭平安逃乎置棘棄色難之訓曾是遺親當孝治之朝敢思悖德猶為不孝子曰居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也莫大於不孝五刑之屬三千而罪莫大於不孝也三千件也非非孝者無親非人之孝者是有無親之心執以從宜爾雖有說謂之敦孝吾則不知其父攘羊而子證之語殺父傳曰楚欲誅令尹子南子南之子棄疾為王御士王每見之必泣棄疾曰君三泣臣矣誰之罪也王曰令尹之不勤子所知也國將討焉爾其居乎對曰父戮子居安用之泄命重刑臣亦不為遂誅子南既葬其徒曰行乎棄疾曰吾預殺吾父行將焉入曰臣王乎曰棄父事讎吾不忍也遂縊而死不孝之刑周禮以八刑紏萬民一曰不孝之刑紏孝紏察也周禮以鄉刑紏孝傷考書子不祗服厥父事大傷厥考心母亡不歸史吳起與母別嚙臂而盟曰不為卿相不歸遂事曾子頃之其母死之起終亡不曾子薄之而與起絶傷父之心禮有無父之國則可逃刑當篤親之朝如何獲宥此父子之疏節也言非至孝也子曰斷一樹殺一獸不以其時非孝寡人嘗學斷斯獄矣子弒父凡在宮者殺無赦殺其人壞其室污其宮而瀦焉弒君父之刑也子弒其父易莫慰心詩曰育子七人莫慰我心孔母殯不展崔損母殯不葬亦不展殯宦既遂母窮不自給宗室皋貶溫州長史攝州事時殿中侍御史李鈞與其弟京兆法曹參軍鍔宦既遂不肯還鄉母窮不自給皋行縣見之嘆曰入則孝出則悌有餘力則學若二子可與事君乎哉舉劾之並錮死事後母不謹元璹父譯事後母不謹惰文帝嘗賜孝經愧勗之至元璹亦不以孝聞士醜其行詔賜孝經罷歸田里于公異擢進士不能事後母既仕不歸省及陸贄當政奏其狀詔賜孝經罷歸田里不諍於父蘇源明上疏子不諍於父不孝也不孝不忠為苟榮冒祿圈牢之物不若也坐不孝免祝欽明於五經該淹自見坐於不孝免無以澡祓鴟梟啄母腦母死子始蕃蝮蛇生子時坼裂腸與肝韓愈孟東野失子詩惡子不可說鴟梟蝮蛇然上不能事父柳圭遷右拾遺而給事中蕭倣鄭裔綽謂圭不能事父封還其詔仲郢訴其子冒處諫職為可謂不孝則誣請勒就養詔可不能養母李渤父鈞殿中侍御史以不能養母廢于世渤恥之不肯仕白至德要道子曰先王有至德要道以順天下民用和睦上下無怨德之本夫孝德之本也教之所由生也加於百姓刑於四海以德教蓋天子之孝君子篤於親則民興於仁君子謂在上也民德歸厚聖人則之夫孝天之經也地之義也是以其教不肅而成其政不嚴而治其所因者本也本謂孝也因親以教愛先王見教之可以化民也故因嚴以教敬因親以教愛先之以博愛而民莫遺其親孝理天下先王之以孝治天下也故得萬國之歡心是以天下和平災害不生禮曰至孝近乎王至悌近乎霸塞乎天地曾子曰夫孝置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕之期孟子曰舜其大孝矣五十而慕吾於大舜見之矣不以天下儉其親子曰舜其大孝也與德為聖人尊為天子富有四海之內天子孝十孔過慶善宮覽觀梗欷高祖皇后竇氏太宗後即位過慶善宮覽觀梗欷顧侍臣曰朕生於此今母后永違育我之德不可報因號慟左右皆流涕乃享后於正寢高郢臣聞聖人受命於天以人為主苟功濟于人天人同和則宗廟受福子孫蒙慶傳曰德教加於百姓刑于四海天子之孝也又曰無念爾祖聿修厥德既受帝祉施于孫子是知王者之孝在於承順天地嚴配祖考恭謹德教以臨兆民俾四海之內歡必助祭延福流祚永永無窮莫大於承續穆宗皇后韋氏崩武宗立下詔朕因誕日展禮于太皇太后謂朕曰天子之孝莫大於承續今穆宗皇帝虛合享之位而宣懿大后實生嗣君當以祔廟繇是奉后合食穆宗室安國家定社稷崔日用因言太平公主逆節有萌陛下往以官府討有罪臣子勢須謀與力今據天位一下制書足矣帝曰畏驚太上皇奈何日用曰庶人之孝承順顏色天子之孝惟安國家定社稷若今姦宄竊發以亡大業可謂孝乎請先安北軍而後捕逆黨於太上皇固無所驚帝納之每懷嗣徽蒸蒸而慕一品集王尊號又以敬養不逮于長樂昭配禾升于祿宮每懷嗣徽蒸蒸而慕所以奉若慈訓對越兩儀因心制名永錫其孝薦饗新宮正月元日初見宗祖躬執百禮登降拜俯薦饗親宮視瞻梁梠戚見容色淚落入俎韓愈元和聖德詩大孝因心與天罔極蒸蒸之思惟舜其難至德要道無以加也然臣伏見以畢力追孝誠有所益文粹高郢諫造章敬寺未聞崇建梵宮雕琢金玉之為孝同上聖德孝思格于天地湛恩霈澤濟乎生靈同上諸侯孝十一白在上不驕高而不危所以長守貴也制節謹度滿而不溢所以長守富也制節儉費用謹度守禮法富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝也不敢侮於鰥寡治國者不敢侮於鰥寡而況於士民乎故得百姓之歡心以事其君卿大夫士孝十二白非先王之法服不敢服非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟蓋卿大夫之孝也治家者不敢失於臣妾而況於妻子乎故得人之觀心以事其親士孝資於事父以事母而愛同資於事父以事君而敬同故母取其受而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失然後能守其祭祀而保其祿位蓋士之孝也以顯父母子揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身事君不忠朋友不信戰陳無勇非孝也庶人孝十三白用天之道分地之利謹身節用以養父母此庶人之孝也禮曰庶人有善本諸父母書曰肇牽車牛遠服賈用孝養厥父母父母慶自先腆致用酒孔承順顏色崔日用曰庶人之孝承順顏色余見天子孝門孝門銘孝友壽州安豐李興有至行柳宗元為作孝門銘謹按興匹庶賤陋循習淺下性非文字所導生與耒耨為業而能鍾彼醇孝超出古烈生養以孝李華二孝贊靈武二孝曰侯知道程具羅目不睹朝廷之容耳不聞韶夏之聲足不登登齊魯之境所見戎馬旃裘參於夷狄而能生養以孝歿奉以哀青陽孝子何澄粹親病日錮俗尚鬼病者不進藥澄粹剔股肉進親疾為瘳後親沒伏于墓哭踴無數以毀卒當時號青陽孝子刻志從學任敬臣五歲喪母哀毀至七歲問父英曰若何可以報母英答曰揚名顯親可也乃刻志從學詔吏敦駕程袁師母病十旬不褫帶藥不嘗不進代弟戍洛州聞計日走二百里因負上築墳號懼人不復識改葬曾門以來閲二十年乃畢常有白狼黃蛇馴墓左每哭群鳥鳴翔永徽中剌史狀諸朝詔吏敦駕既至不願仕授儒林郎遣之匹夫單人行孝一概而凶盜不敬凌天子喟而旌之事親禮十四白內則曰子事父母雞初鳴咸盥漱櫛縱笄總拂髦縱朿髮音史冠緌纓左右佩用用器也左佩紛帨刀礪小觿金燧右佩玦捍管遰大觿木燧遰刀鞞以適父母舅姑之所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之抑按也搔摩也出入則或先或後而敬扶持之柔色以溫之父母衣衾簟席枕几不傳傳移也杖屨祗敬之勿敢近父母之所有命之應唯敬對進退周旋慎齊齊敬也升降出入不敢噦噫嚏咳缺伸跛倚睇視不敢唾洟並為不敬寒不敢襲襲重衣也癢不敢搔不有敬事不敢袒禓衣裳垢和灰請浣五日燂湯請浴燂濫也餳餂反三日具沐其間面垢燂潘請靧足垢燂湯請洗勿逆勿怠子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不嗜必嘗而待己不嗜者亦嘗而待命加之衣服雖不欲必服而待也父母怒撻之流血不敢疾怨起敬起孝起更也親在行禮於人稱父母或賜之則稱父拜受之事統於尊父母呼唯而不諾手執則業食在口則吐之走而不趨至敬也父黨無容敦牟卮匜非餕莫敢用敦牟黍稷器卮匜酒漿器孔事繼母尤謹劉審禮事繼母尤謹母食必侍立左右徹饌乃敢退五代張希崇冠帶入門溫清親饋江夢孫事繼母旦則冠帶入門溫清親饋欲饌退更常服力操耒耘暮而歸易衣侍膳畢然後就庠序江南野史侍左右如褐衣時蕭俯母韋賢明治家嚴俯雖宰相侍左右如褐衣時雖宰相退朝侍母膳與家人齒崔彥昭宦浸顯還家易衣侍左右猶布衣也趙隱白在三之義父生之師孝之君食之無二之心事君有死無二又曰君命無二策名委質二乃辟也辟罪也死而利國猶或為之傳危則致身死而同國無私不二竭力推誠臣事君以忠臨患不忘國忠也圖國忘死貞也臨大節而不可奪君子也社稷之臣柳莊死公曰非寡人之臣是社稷之臣也苟利國家何以事君傳士蒍失忠與敬何以事君為人臣者殺其身有益於君則為之匪躬之節時危見臣節世亂識忠臣鮑昭詩難至而節見史忠臣纍至而行明貞臣難至而節見為下克忠書悃款之誠忠一之意見楚詞憂國忘家選以公滅私進思君子之事上也進思盡忠退思補過名以忠聞節因危見儒有忠信以為甲胄又以為寶以道事君不可則止事君不忠非孝也為臣不全禮事君之小心禮圖國之大節忠節之屬荀息竭股肱荀息曰臣竭其股肱之力加之以忠貞不濟則以死繼之子文毀家以紓楚國之難林父進思荀林父事見上子囊城郢子囊將死遺言謂子庚曰必進思君子謂子囊將死不忘衛社稷可不謂忠乎公家之利知無不為托六尺之孤寄百里之命謂幼君文子死國難衛國有難公叔文子以其死衛寡人不亦貞乎鬻拳納刑愛君彊諫楚子而自刖君子曰可謂愛君矣諫而自納於刑刑猶不忘納君於善鮑永哭墓後漢鮑君長使過更始墓下車哭盡哀帝問公卿曰何如張堪曰忠有禮義之宗忠不忘君行之高者上悅王常心如金石後漢光武詣王常曰輔漢室心如金石真忠臣也是日拜為漢忠將軍孔達利衛請說以死左傳孔達伐陳晉討之達曰苟利社稷請以我悅遂自諡而死安于寧趙將焉用生傳智伯請趙氏殺董安于安于曰我死而晉國寧趙氏定將焉用生吾死暮矣乃縊而死嵇紹端冕晉蘇峻亂百寮奔散唯嵇紹端冕以身衛帝兵及御輦血湔御衣而死申蒯斷臂崔杼弒莊公申蒯斷臂與門者入哭奪劍以呼天而死之弘演內肝呂氏春秋曰狄人殺衛懿公盡食其肉唯捨其肝弘演使還哭畢自取出肝內懿公之肝仇牧碎首公羊宋萬弒閔公仇牧聞之趍而手劍叱之萬批牧碎首齒著于闔牧可謂不畏彊禦胡綱懸衣冠後漢胡綱有志節王莽亂綱解懸衣冠府門而去龔勝推印綬後漢王莽篡逆使奉璽書印綬迎勝勝推而不受曰吾受漢家大恩豈忍事二姓也地下復見故主哉不食而死山甫補過袞職有闕唯仲山甫補之有補過者也季文子無私積傳季文子卒宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子知文子之忠於公室相三君矣無私積史鰍尸諫史記史魚將死不令殯於寢曰吾生不能進蘧伯玉退彌子暇死以自貶衛君來吊問之其子以告立進蘧伯玉而退彌子暇上思利人忠也傳為下克忠書丑父與君易位晉韓厥逐齊侯既及逢丑父與君易位使公下如華泉注丑父代公居位故公得下車而免韓厥獻丑父郤獻子將戮之曰代其君任患者戮之不祥舍之以勸事君者乃免之紀信乘車以以誑楚項羽圍漢王於城皋紀信曰事急矣臣請乘車乃以王誑詐降漢王遂從城西門出項王見紀信問漢王安在信曰已去矣遂燒殺紀信王蠋縊樹史燕入齊聞王蠋在晝令軍中環晝三十里無入謂蠋曰齊人多高子之義吾將封子萬家蠋曰忠臣不事二君貞子不事二夫齊王不聽吾諫故退耕今國亡無義自固遂繫頭於樹奮絶而死齊士大夫曰王蠋布衣義不北面於燕況食祿者乎相率以從王於王於莒也卜式佐軍呂嘉反卜式上書曰主愧臣死皆當盡節其駕下者宜出財以佐軍黃權歸蜀無路蜀黃權軍敗降魏魏文帝謂曰卿去無路歸義欲效曲逆乎對曰臣降吳不可歸蜀無路故降耳蜀先主凶問至群臣咸賀唯權獨否耿弇不以賊遺君父傳誠志士之成仁豈匹夫之為諒已死已亡豈同親昵之義晏子曰國君為社稷死則死之為其社稷亡則亡之若為己死則為已亡非其親昵誰敢任之言親昵則當死私難主在與在誠為社稷之臣臣克艱厥臣書處不避污出不逃難傳殺身以成仁代君任患若臨患無苟豈處死為難不得中行誠古人之重死將期激節士之求生君臣士臣國語中行穆子圍鼓以鼓子宛支來令鼓人各復其所非寮勿從宿沙釐以其孥行從鼓子曰我君是事非常士也名曰君臣豈曰士臣穆子曰鼓有君矣曰臣委質於翟之鼓米委質於晉之鼓能執干戈以衛社稷禮社稷臣漢文帝目送絳侯曰能執干袁盎曰功臣非戈以衛也社稷禮者主在與在主亡與亡諸呂用事絳侯為太尉本兵柄弗能呂后崩大臣相與共誅諸呂適會功成故曰功臣又上問汲黯何如嚴助曰居職無愈人使輔少主守城郭賁育不如上曰古有社稷臣如黯近之柱石昌邑王淫亂霍光憂悶田延年曰伊尹廢太甲安社稷宗廟後世稱忠將軍為國柱石善能行之亦漢之伊尹臨難致命傳楚圍宋晉使解楊如宋曰晉師悉起將至矣使無降楚楚子囚之使反其言許之登車而呼宋人遂致其君之命楚子將殺之乃赦之又吳楚反圍齊齊使路中大夫告急於天子天子復令齊王堅守二國合圍無從而入二國與盟矣若反言漢已破齊從降許之既至城下望見齊王曰漢興發百萬軍使太尉救齊大夫乃誅忠不忘君忠十五孔被害西向大呼姜寶誼與裴寂拒宋金剛戰汾州為所禽帝聞為泣下曰彼烈士必不下賊死矣賜其家物十段米三百斛果謀還被害且死西向大呼曰臣無狀負陛下賊平詔迎其柩贈左衛大將軍諡曰剛死報屈突通援長安至潼關阻劉文靜兵不得進通勢蹙或說之降曰吾蒙國厚恩事二主安可逃難獨有死報爾每自摩其頸曰要當為國家受人一刀皇甫無逸煬帝幸江都詔居守洛陽及王世充篡棄母妻斬關中歸追騎及無逸顧曰吾有死終不能同爾為逆解金帶投之地曰以與爾無相困騎爭下取由是獲免不逆節以生李襲志仕隋始安郡丞或說曰公臨郡久士大夫悅向蠻夷畏服雖曰隋臣實君長也今四海分裂自王者非一姓宜遂據嶺表取百粵豈遽不若尉他乎襲志曰吾世隋臣今江都雖淪宗社尚有奉諸君當相與戮力刷讎恥豈怙亂圖不義哉吾寧蹈忠死不逆節以生尉他不足為吾法也不顧身張士貴破反獠還太宗聞其冒矢石先登勞之曰嘗聞以忠報國者不顧身於公見之忠於所事杜讓能帝狩梁天子間關嶮澀讓能未嘗暫去側帝勞曰朕失道再違宗廟方艱時卿不少捨朕蓋古所謂忠於所事邪忠款魏證十漸今外官奏事顏色不接間因所短詰其細過雖有忠款而不得申忠概所激載胄帝嘗謂左右曰胄於我非肺腑親然事之機切無不聞惟其忠概所激耳挺挺抗忠蕭復初淮南陳少游左附李希烈而張鎰判官韋皋殺邠隴叛卒不應楚琳復還執政建言陛下反正功臣已貴矣唯甄善伏惡為未明少游位將相首臣賊皋名淺官下獨挺挺抗忠如以皋代少游則天下瞭然知逆順之理帝許之見過不諫非忠蘇安恆武后末年投匭上書諫曰臣聞見過不諫非忠畏死不言非勇陛下以臣為忠則擇是而用以為不忠則斬臣頭以今天下書聞不報秉心忠一朱敬則同平章事張易之誣魏元忠張說欲誅之無敢言者敬則獨奏曰元忠說秉心忠一而所坐無名殺之失天下望乃得不死引咎於己劉禕之房先敏坐纍貶衛州司馬訴于相府內史騫味道謂曰太后旨禕之曰乃上從有司所奏云后聞加禕之太中大夫賜物百段后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎禕之引咎於己忠臣也割左耳誓不屈契苾何力衆執之至毗伽牙下何力箕踞拔佩刀東向呼曰有唐烈士受辱賊廷耶天地日月臨鑒吾志即割左耳誓不屈毗伽怒欲殺之其妻諫而止挾印赴行在裴諝代宗幸陝徒步挾考功南曹印赴行在帝曰疾風知徑草果可信李絳自知言功且斥去帝動容曰卿告朕以人所難言者疾風知徑草卿當之矣顏真卿祿山反河朔盡陷獨平原城守具備使司兵參軍李平馳奏玄宗既聞亂歎曰河北二十四郡無一忠臣邪及平至帝大喜謂左右曰朕不識真卿何如人所為乃若此帝思其忠為泣下張九齡曰祿山狼子野心有逆相宜即事誅之以絶後害帝後在蜀思其忠為泣下陸贄裴扆天復初帝密語韓偓曰陸贄裴扆孰忠於我偓曰扆等皆宰相安有他腸辛京果朱泚盜京師以老病不能從西嚮慟而卒業已效忠不復助惡張孝忠為定滄觀察使朱縚遣蔡雄說之答曰吾既為唐臣而天性撲強業已效忠不復助惡矣張茂和裴度討蔡茂和數以膽勇求自試謂度無功度請斬之以令軍憲宗曰豫以其家忠且孝為卿遠斥以忠力奮馬璘遭時屯棘以忠力奮感慨王室王鐸以太子太保平章事是時誅討大計悉屬駢駢內幸多難數偃蹇而外逗撓鐸感慨王室每入對必噫嗚流涕固請行時中和二年也乃以檢校司徒中書令為義成節度使諸道行營都統張巡贊惟宋三葉章聖皇帝東巡過其廟留駕裴回咨巡等雄挺盡節異代著金石刻贊明厥忠與夷齊餓踣西山孔子稱仁何以異云黃碣諫昌閩人也董昌為威勝軍節度使表碣自副及昌反諫曰大王拔田畝席貢輸之勤位將相非有勳業可紀今不能盡忠王朝乃自尊大日誅滅無種矣昌怒曰碣不順我邪斥出之奮身死節以動義旅李華宗子翰傳張巡功狀表上之曰且祿山背德大臣將相比肩從賊巡官不朝宴不坐無一伍之士一節之權徒奮身死節以動義旅不謂忠乎眷眷本朝甄逢常以父名不得在國史而逢與元積善積移書於史館修撰韓愈曰天下大亂死忠者不必顯從亂者不必誅而眷眷本朝甘心白刃難矣哉若甄生棄冕不加其身祿食不進其口直布衣一男子耳及亂則延頸受刃分死不回不以不必顯而廢忠不以不必誅而從亂在古與今蓋百一焉虞世南五絶帝每稱其五絶二曰忠直外揚君之美內正君之惡鄭惟忠天授中以制舉召見廷中武后問舉者何所似為忠對皆不合旨惟忠曰外揚君之美內正君之惡后曰善忠貫日月郭子儀贊天寶末盜發幽陵外阻內訌子議自朔方提孤軍轉戰逐北誼不還顧當是時天子西走唐祚若贅斿而能輔太子再造王室及大難略平遭讒甚詭奪兵柄然朝聞命夕引道無纖芥自嫌及被圍涇陽單騎見虜壓以至誠猜忍沮謀雖唐命方永亦由忠貫日月神明扶持者哉崔圓玄宗西出遷劍南節度副大使帝次河池圓疏具陳蜀士腴穀羡儲供易辦帝省書泣下曰世亂識忠臣即日拜中書侍郎同中書門下平章事仍兼劍南節度使誼不辭難孔緯帝避朱玫次陳倉詔拜緯御史大夫令趣百官至行在緯召御史曰吾等身被恩誼不辭難今詔群臣皆不至夫與人布衣游猶緩急相恤況於君乎且泣下御史亦辭方寇敓丐衣食請辦一日費而行緯曰吾妻疾旦暮盡丈夫豈以家事後國事乎公善自謀吾行決矣忠烈嶢然杜黃裳贊昔子貢孔堂高第而貨殖韓安國漢名宰而資貪黃裳亦以受餉見疵至於忠烈嶢然則不可掩己間道衛乘輿王處存遷義武節度使黃巢陷京師處存號哭不俟詔分麾下兵二千間道至山南衛乘輿每痛國難未夷語輒流涕中和二年授京城東面都統每痛國難未夷語輒流涕常達拜隴州剌史時薜舉方彊達敗其子仁杲斬首千級舉遣將仵士政紿降伺隙劫之并其衆二千歸賊舉指其妻謂達曰識皇后乎答曰彼癭老嫗何所道舉奴張貴又曰亦識我否達瞋目曰若乃奴耳貴忿舉笏擊其面達不為懾亦拔刀逐之趙弘安為蔽捍乃免仁杲平帝見勞曰卿忠節正可求之古人馮立敬君弘傳立已蒙貸歸語人曰上赦吾罪吾當以死報未幾突厥犯便橋立引數百騎與虜薄敗之咸陽帝喜授廣州都督呂子藏見攻守門終不屈賊王行敏與劉黑闥戰歷亭敗之既而釋界不設備為黑闥所掩縛致麾下終不屈賊遂斬之且死西向跪曰臣之忠惟陛下知之帝聞而悼惜李公逸與族弟善行居雍立始附王世充策其必敗乃獻款高祖因其地置杞州即拜總管封陽夏郡公以善行為剌史世充遣其弟將徐毫兵攻之公逸請援未報因使善行守身入朝言狀至襄城為賊羅送洛陽世充曰君越鄭臣唐何哉答曰我於天下唯聞有唐賊怒斬之善行亦死帝悼惜之封其子請剖心明皇嗣不反安金藏有誣皇嗣異謀者武后詔來俊臣問狀左右畏慘楚欲引服金藏大呼曰公不信我言請剖心明皇嗣不反也引佩刀自剚腹中腸出被地眩而撲后聞大驚輿致禁中命高醫內腸褫桑紩之閲夕而蘇后臨視嘆曰吾有子不能能自明不如爾之忠也即詔停獄睿宗乃乃安是時朝廷士大夫翕然稱其誼自以為弗及也遁入比干廟自剄王同皎神龍后武三思蒸濁王室同皎惡之與張仲之祖延慶周憬李悛冉祖雍謀須武后靈駕發伏弩射殺三思三思追俊上急變且言同皎欲擁兵闕下廢皇后帝殊不曉大怒斬同皎於都亭驛籍其家同皎且死神色自如仲之延慶皆死憬遁入比干廟自剄將死謂人曰比干古忠臣神而聰明其知我乎後三思亂朝虐害忠良滅亡不久可干吾頭國門見其敗也褒忠所以勸臣節也李源穆宗下詔曰褒忠所以勸臣節也宿中書十四昔郭元振玄宗誅太平公主也睿宗御承天門諸宰相走伏外省獨元振總兵扈帝事定宿中書十四昔乃休引刀刺心田布度軍且亂嘆曰功無成矣即為書謝帝曰臣觀衆意終且負國臣無功不敢忘死願速救元翼毋使忠臣義士塗炭於河朔哭授其從事李石訖乃入至几筵引刀刺心曰上以謝君父下以示三軍言訖而絶屢陳討賊謀王重榮子珂帝為劉季述所廢珂憤見言色屢陳討賊謀既反正首獻方物帝甚倚之劉蕡策今忠賢無腹心之寄復何面目入梁建國門梁臣敬翔與李振俱為大祖所信任莊宗入汴詔赦梁群臣李振喜謂翔曰有詔洗滌將朝新君邀翔欲俱入見翔夜止高頭車坊旦左右報曰崇政李公入朝矣翔嘆曰李振謬為文夫矣復何面目入梁建國門乎乃自經而卒欲操術以致忠兮衆呼然而互嚇柳文懲咎賦石演芬李懷光召石演罵曰爾為我子奈何欲破吾家今日負我宜即死對曰天子以公為股肱公以我為腹心公乃負天子我何不負公且我胡人無異心惟知事一人不呼我為賊死固吾分懷光使士臠食之皆曰烈士也可今快死以刀斷其頸發明其忠吉頊中宗之立頊實倡之會得罪無知者膚宗初有發明其忠乃下詔贍御史大夫本傳孝而仁者可與言忠元結參來瑱府時有父母隨子在軍者結說瑱曰孝而仁者可孝而仁渠有責其忠信義勇而不勸之孝慈邪將士父母宜給以衣食則義有所存矣瑱納之示不忘朝廷張播間道走淮南依楊行密行密得承制除拜播請每除吏必紫極官玄宗像前致制詰干按乃出之示不忘朝廷人臣同國患為忠常樂公主下嫁趙瑰瑰徙壽州越王貞將舉兵潰瑰書假道瑰將應之主進使者曰為我謝王諸王國懿親宗祐所托不捨生取義尚何須邪人臣同國患為忠不同為逆進忠若趨利楊虞卿曰陛下求治於宰相宰相求治於臣等進忠若趨利論政若訴冤不懷二心張憲莊宗遇弒明宗入京師太原猶未知而永王存霸奔于太原左右告憲曰今魏兵南嚮主上存亡未可知存霸之來無詔書而所乘馬斷其鞦豈非戰敗者乎宜拘之以俟命憲曰吾本書生無尺寸之功而人主遇我甚厚豈有懷二心以幸變第可與之俱死爾從事張昭遠教憲奉表明宗以勸之憲涕泣拒之五代史朝事梁暮事晉五代王彥章莊宗愛其驍勇欲全活之使人慰諭彥章彥章謝曰臣於陛下血戰十餘年今兵敗力窮不死何待且臣受梁恩非死不能報豈有朝事梁而暮事晉生何面目見天下之人乎以死報國孫晟事李升晟臨死世宗猶遣近臣問之晟終不對神色怡然正其衣冠南望而拜曰臣惟以死報國爾乃就刑同上以忠則九折之塗可叱蕭昕送桂州刺史
