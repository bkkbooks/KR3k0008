body:
  text: 卷第六十一白先王以作樂崇德易夔典樂教胄子聲依永律和聲八音克諧無相奪倫神人以和書九成簫韶九成鳳凰來儀祖考來格神人以和治世之音安以樂其政和亂世之音怨以怒其政乖五者不亂則無惉懘之音樂文同則上下和矣大樂必易大樂與天地同和樂所以象德也樂至則無怨也八風從律而不姦樂者德之華非聽其鏗鏘而已移風易俗莫善於樂將以理心不專盈耳聲由心感哀樂必形音與政通治亂可辨喜成明備聲可感人樂能易俗感人樂以化俗金奏禮之用和為貴關睢樂而不淫哀而不傷始作翕如也縱之純如也皓如也繹如也以成韶盡美矣又盡善也謂武盡美矣未盡善也子在齊聞韶三月不知肉味洋洋乎盈耳先王制樂所以節百事五節五聲之節五降傳曰五降之後不容彈矣降止也樂備五聲而止君子聽之以平其心物和則嘉成嘉樂成也和聲入於耳藏於心樂由陽來無聲之樂氣志不違天子宮懸四面象宮室諸侯軒懸三面懸無南面亦曰曲懸九奏特懸笙鏞以間鳥獸蹌蹌擊石拊石百獸率舞魏降曰夫樂以安德和其心也咸池張於洞庭黃帝咸池之樂張於洞庭六代之樂三年不為樂樂必崩教和周禮以樂教和則人不乖蕃樂周禮荒政九曰蕃樂謂凶年而閉樂器而不舉也防萬人之情又曰以六樂防萬人之情而教之和樂德又曰大司樂以樂德教國子忠和祗庸孝友樂語以樂語教國子興道諷誦言語大合樂以致鬼神以和邦國以諧萬民以悅遠人謂郊祀用六代之樂六變變奏也樂六奏致天地萬物謂大蠟之祭樂儀樂之容儀樂政樂之攻令和而不亂豈云鍾乎哉至則無聲非聽鏗鏘而已臨樂不歎春誦夏弦習樂也樂以修內正聲正聲感人順氣應之順氣成象而和樂興焉理心君子致樂以理心則易直子諒之心油然生矣樂者先王之所以飾喜徹懸去樂樂作樂闋酣歌成風雖聞誡於伊訓鍾鼓不考亦見剌於唐時樂備傳具舉簫管具舉用樂祭周禮司樂以禮奏黃鍾歌大呂舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地祗云云大祭祀宿懸以聲展之叩聽其聲具陳次之以知完否也記曰樂交動乎下樂自陽來生於音感於物合情飾貌者禮樂之事也卒爵而樂闋孔子屢歎之美之傳王子頽享五大夫樂及遍舞遍舞六代之舞特懸士特懸一面二肆鄭人賂晉侯歌鍾二肆肆行列嘉樂不野合鈞天廣樂史記趙簡子五日不知人寤曰我之帝所與百神遊于鈞天廣樂九奏萬舞不類二代之樂其聲動人心蕩滌邪意不以管絃亂人聲漢志叔孫通制禮樂乾豆上奏登歌獨上在歌不以管絃亂人聲欲在位者遍聞之猶古清廟之歌朱絃疏越一唱而三嘆有遺音者矣合樂三終椌楬孔日出無鍾鼓聲則金吾以聞李晟與馬燧皆在朝每宴樂恩賜使者相衝于家兩家日出無鍾鼓聲則金吾以聞少選使者至必問何不舉樂先墓享祀薦以音樂段文昌徒帥荊南先墓在荊州歲時享祀必薦以音樂歌舞習禮者譏其非平人心變風俗邢文偉為內史后曰移風易俗莫善於樂伯牙鼓琴鍾賜聽之知意在山水是人能移風易俗矣何取樂邪文偉曰聖人作樂平人心變風俗末世樂壞則為人所移后喜賜帛不喜奏樂柳公權通章律而不喜奏樂曰聞之令人驕怠僣正樂于頔卒更賜諡曰思右補闕高鉞博士王彥威持不可謂頔僣正樂五方師子樂趙宗儒守太常卿太常有五方師子樂非大朝會不作帝嗜聲色宦官領教坊者乃移書取之宗儒不敢違以訴宰相宰相以事專有司不應關白以懦不職罷作樂崇德以和神人賈曾為太子舍人太子數遣使采女樂就率更寺隸習曾諫曰作樂崇德以和神人聖人為之樂以宣其堙鬱韓文八音循通既比乎旭日升而氛埃滅杜甫朝享太廟賦金堂玉戶絲鳴管語李庾東都賦雲韶雅樂李固言為四川節度使詔雲韶雅樂即臨皋館送之破陳樂元德秀以為王者作樂崇德天人之極至而辭章不稱是無樂也於是作破陳樂辭以證商周為文思遲求音樂奏之神逸乃屬文李翰為文思遲求音樂當從令皇甫曾奏之神思涸則奏之逸乃屬文奉聖順聖樂李夷簡徙師劍南四川始韋皋作奉聖樂于頔作順聖樂常奏之軍中夷簡輒廢去謂禮樂非諸侯可擅制語其屬曰我欲蓋前人非以詒戒後來軍中樂劉瑑進宣武軍軍節度使先時大饗雜進倡舞瑑曰豈軍中邪取壯士千人披鎧擁矛盾習擊刺與吏士臨觀上日敕所司供帳設樂張説遷左丞相上日敕所司供帳設樂每聽忘倦嚴挺之傳睿宗好音律每聽忘倦繼天誕聖樂王虔休嘗得太常樂家劉玠撰繼天誕聖樂因帝誕以獻其樂以宮為鈞示五聲有君也以土為德本五運在中也奏三十五疊取二十四氣而成一歲奏十六節象元凱干朝云後中和樂本于此善絲竹姚誾樂流而不反則放武平一上書和聲以薦元結時議太常備樂和聲以薦樂天之和武平一上書樂天之和樂應天云云非公會不舉樂段秀實拜四鎮節度使非公會不舉樂奏樂自娛姦臣許敬宗第舍華僣縱酒奏樂自娛朝歌夜絃杜牧阿房宮賦繁絲疏管小洞庭宴集登歌發聲悲離明年正旦復奏于庭而登歌發聲悲離頌慝如薤露虞殯之音舞者行列進退皆不應節聞者皆悲憤其年高祖崩五代史樂在人和太宗謂侍臣曰古之聖人沿情以作樂國之興衰未必始此御史大夫杜淹曰陳將亡也有玉樹後庭花齊將亡也有伴侶曲帝曰夫聲之所感各因人之哀樂將亡之政其民苦故聞以悲今玉樹伴侶之曲尚存為公奏之知必不悲尚書右丞魏徵進曰孔子稱樂云和云鍾鼓云乎哉樂在人和不在音也樂志人和則樂和上一年張文收復請重正餘樂帝不許曰朕聞人和則樂和隋未喪亂雖政音律而樂不和若百姓安樂金石自諧矣同上始用樂梁紀注唐末之亂禮樂亡至此始用樂和人神移風俗莫尚於樂白居易議禮樂善變樂者變其數不變其情同上白事與制禮同聲成文謂之音五帝殊時不相沿樂樂由中出故靜和在中也樂由天作王者功成作樂故名與功偕功大者其樂備作樂以應天地室楚子為地室而懸焉客登金奏作於下先王制樂所以節百事天子省風以作樂移風易俗孔子自衛反魯樂正雅頌各得其所導志先王修樂以導志也崇德先王作樂以崇德季札觀周宣尼反魯能審其聲無抑觀周之請俾得其所宜從反魯之文文之以五聲播之以八音欲依反魯而定克振六代之音將使在齊或聞必忘三月之味伶倫之聽鳴鳳律呂用和師縶之始關睢音聲用制天下有道禮樂自天子出禮天子巡狩有變禮易樂者君流流放也君者侯也禮樂之情同故明王以相沿也言相因也過作則暴禮夔始制樂以賞諸侯舜命也德音禮曰聖人治天下天下大定然後正六律和五聲絃歌詩頌此之謂德音德音之謂樂樂主其盈盈溢也人好之故放樂盈而反以反為文文美也反自抑止也樂得其反則安抑之乃得中也是以其聲樂而不流流放也漢哀罷樂府官詔曰世俗奢泰文巧而鄭衛之聲樂其罷府之官其郊祭樂及古兵法武樂在經非鄭衛者條奏別屬他官臨軒作樂晉蔡謨議凡禮備則有樂此敬賓客之禮臨軒遣使自此始也歌者在上匏竹在下貴人聲漢興樂家有制氏紀其鏗鏘而已樂曲漢志樂曲有悲翁戰城南門樂有賢女童和三年中樂久長殿前生桂樹並樂曲名也制宗廟樂叔孫通因奏樂人制宗廟樂太祝迎神于廟門奏嘉至猶古降神之樂也皇帝入廟奏永至為行步節猶古采薺肆夏也乾豆上奏登歌不以管絃亂人聲欲在位遍聞之猶古清廟之歌也再終下奏休成樂美神明既饗也皇帝就於東廂坐室奏永安之樂成禮也中祠樂高祖唐山夫人所作也周有房中祠樂改名壽人樂其所在高祖樂楚聲於房中樂楚聲孝惠二年楚樂府令夏侯寬備其簫管更名安世樂昭容高祖作昭容樂古韶夏也主出武德舞之也禮容高祖作禮容樂主出文始五行舞舞入無樂將至至尊前不敢樂也出用樂者言樂舞不失節以禮樂終也孔定雅樂竇進武德中與太常少卿祖孝孫受詔定雅樂是正鍾律云郊廟燕會樂曲韋萬石善音律上元中遷太常少卿當時郊廟燕會樂曲皆萬石與太史令姚元辨增損之王維樂章寶應中代宗語縉曰朕嘗於諸王座聞王維樂今傳幾何遣中人王承華往取縉褒集數十百篇上之樂府數十篇雲韶諸工皆合之絃管李賀舉善音者呂才太宗詔侍臣舉善音者中書令溫彥博曰才悟絶人聞見一接輒究其妙自製大樂武后享神宮自制大樂舞工用九百人仲尼學文王操樂府古題序或曰樂府肇于漢魏按仲尼學文王操伯牙作流波水仙操齊牘沐作雉朝飛衛女作思歸引則不於魏漢而後始亦明矣元稹飛龍之樂儀鳳之音楊炯少姨廟碑高陽有飛龍之樂始會八風帝舜有儀鳳之音初調九秦后夔典其教制氏辨其聲國忌享廟奏樂儀裴寬為太常博士禮部擬國忌之辰享廟用樂下太常寬深達禮節待建新意以為廟尊忌卑則登歌廟卑忌尊則去籥中書令張説謂寬明識舉而行之聲無形而樂有器古之作樂者知夫器之必有弊而聲不可以言傳懼夫器失而聲遂亡也乃多為之法以著之故始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為籥合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡是三物者必有時而弊又總其法而著之於數使其分寸籥合誅兩皆起於黃鍾然後律度量衡相為表裏使得律者可以制其度量權衡因度量權衡亦可以制律不幸而皆亡則推其法數而制之用其長短多少輕重以相參考四者既同而聲必至聲至而後樂可作矣定雅樂唐興即用隋樂武德九年始詔少詔祖孝孫協律郎竇璡等定雅樂初隋用黃鍾一宮惟擊七鍾其五鍾鼓而不擊謂之啞鍾協律郎張文收乃依古斷竹為十二律高祖命與孝孫吹調五鍾叩之而應由是十二鍾皆用孝孫又以十二月旋相為六十聲八十四調樂成奏之初孝孫已定樂乃曰大樂與天地同和者也製十二和以法天地之成數號大唐雅樂鼓吹之樂本於軍容唐紹論樂疏鼓吹之樂本於軍容昔黃帝涿鹿有功以為警衛故綱鼓曲有靈夔吼雕鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之荔枝香甘澤淫天寶十四載楊妃誕辰上令小部音聲於長生殿奏新曲未有名會南海進荔枝因名為荔枝香河西節度使楊敬忠獻霓裳羽衣曲十二遍凡曲終必遽唯霓裳羽衣曲將畢引聲益緩樂志能自度曲段成式子安節善樂能自度曲知音三白知聲而不知音禽獸是也知音而不知樂衆庶是也唯君子為能知樂故審聲以知音審音以知樂審樂以知政魏文侯曰吾端冕而聽古樂則唯恐臥聽鄭衛之聲則不知倦吳季札請觀於周樂子在齊聞韶三月不知肉味和聲入於耳而藏於心故觀其樂治亂可知耳不聽五聲之和為聾富辰曰云云傳季子之觀周郎之顧樂其可知不知聲者不可與言樂知樂則幾於禮矣聲管人情哀樂必辨樂通王化理亂可知苟審聲以知音必窮本而通變窮本知變樂之情也聽音禮君子之聽音非聽其鏗鏘而已彼亦有所合也合己志也如能審樂季札請觀苟不知音文侯恐臥審一以定和審樂也一深於樂者善聽濫吹孔子曰夔達於樂聞樂而悲中山王季札觀樂自鄶已下無譏焉以其微甚也周郎顧吳志周瑜少精音樂雖三爵後有闕誤瑜知之必顧故時人曰曲有誤周郎顧蔡琰聞絃絶蔡琰文姬雍之女也雍夜彈琴絃絶琰年六歲聞之曰第一絃絶復古斷一絃問之曰第四絃雍曰偶中耳琰曰昔季扎觀風知四國興衰師曠吹律知南風不競由是言之何得不知也焦尾琴蔡雍在吳吳火燒桐以爨雍聞其火烈聲曰良木也因請裁而為琴果有美音其尾猶焦因曰焦尾琴柯亭笛蔡雍宿柯亭屋以竹為椽雍盼之曰良竹也遂請為笛琴有殺聲蔡雍事見琴門孔涼州新曲讓皇憲涼州獻新曲帝御便坐召諸王觀憲曰曲雖佳然宮離而不屬商亂而暴君卑逼下臣僣犯上發於忽微形於音聲播之詠歌見於人事臣恐一日有播遷之禍帝默然及安史亂世乃思憲審音知音嗣瑀亦知音死聲多且哀李嗣真章懷太子作寶慶曲閲於太清觀嗣真謂道人劉概輔儼曰宮不召商君臣乖也角與徵戾父子疑也死聲多且哀若國家無事太子任其咎俄而太子廢側堂堂橈堂堂嗣真常曰隋樂府有堂堂曲明皇再受命比日有側堂堂橈堂堂之謠側不正也撓危也皇帝病日侵事皆決中宮持權與人收之不易宗室雖衆居中制外勢且不敵諸王殆為后所蹂踐吾見難作不久矣道逢車鐸聲太常缺黃鍾鑄不能成嗣真居崇業里疑土中有之弗得其所道上逢一車有鐸聲甚厲嗣真曰宮聲也市以歸振於空地若有應者掘之得鍾衆樂遂和享太廟樂作時裴知古亦善樂律神龍元年正月享太廟樂作知古密謂萬年令元行沖曰金石諧婉將有大慶在唐室子孫乎是月中宗復位人有乘馬者知古聞其斯乃曰馬鳴哀主必墜死見新婚者聞佩聲曰終必離訪之皆然聞鼓琴至止息歎韓皋貌生知音律長年後不願聽樂以門內事多逆知之聞鼓琴至止息歎曰美哉嵇康之為是曲其當晉魏之際乎其音主商商為秋秋者將搖落肅殺其歲之晏乎晉乘金運商又金聲此所以知魏方季而晉方代緩其商弦與宮同音臣奪君之義知司馬氏之將篡也王陵母丘儉文欽諸葛誕斷為楊州都督咸有與復之謀皆為司馬懿父子所殺以楊州故廣陵也陵等皆魏大臣故名其曲曰廣陵散言魏散亡自廣陵始止息者晉雖暴興終止息於此其哀憤躁蹙憯痛迫脅之音盡於是矣永嘉之亂其兆乎康避晉魏之禍託以鬼神以俟後世知音云奏黃鍾五代王仁裕性曉音律高祖初定雅樂宴群臣於承福殿奏黃鍾仁裕聞之曰音不純肅而無和聲當有爭者起於禁中已而兩軍校鬥升龍門外聲聞於內人以為神玄宗既知音律又酷愛法曲選坐部伎子弟三百教於梨園弟子宮女數百亦為梨園弟子居宜春北院梨園法部更置小部音聲三十餘人唐志臥吹笛讓皇子瑀朝早過永興里聞笛音顧左右曰是太常工乎它日識之曰何故臥吹笛工驚謝又聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絃大絃也樂家以自下逆鼓曰琵自上順鼓曰琶本傳音知燥濕絃杜甫夔府詠懷詩淫樂四白並為入耳之娛桑間濮上亡國之音也惉懘之音鄭衛之音亂世之音先王制禮樂非以極耳目之欲而滅平和之德魏文侯端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦新樂姦聲溺而不止五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子不聽也慆心放鄭聲鄭聲淫樂云樂云鍾鼓云乎哉惡鄭聲之亂雅樂夏桀大進倡優漫瀾之樂設奇偉戲靡之聲史五音令人耳聾凡建國禁其淫聲若鄭衛之音也過聲失哀樂之節凶聲亡國之聲慢聲墮慢之聲作淫聲以疑衆殺無赦禮樂勝則流流放也姦聲逆氣禮曰姦聲感人而逆氣應之逆氣成象而淫樂興焉魏侯之聽鄭音悅而無倦桓公之受齊樂荒則不朝進俯退俯俯不齊一也子夏對魏文侯曰今夫新樂進俯退俯姦聲以濫溺而不止溺音子夏對文侯曰今君之所好者溺音乎宋音燕安溺志衛音趨數煩志齊音傲僻驕志鄭音好濫淫志此四者皆淫於色而害於德是以祭祀不用樂之失奢聲淫則放聞既異於在齊聲宜從於放鄭書曰罔淫于樂晉侯説新聲叔向曰公室其卑乎君之明兆其衰矣姦聲亂色不留聰明淫樂慝禮不接心術孔孫伏伽上言傳曰放鄭聲遠佞人令散伎者匪韶匪夏請並廢之以復雅正抑揚黃華獨孤及李華中集序學者稍厭抑揚黃華而窺咸韶之音入耳之娛本則無象韋述加籩議韶漠可急而箜篌笙笛堂在奏矣或興于近代或出于蕃夷入耳之娛本則無象本非正聲孫伏伽其二百戲散樂本非正聲隋末始見崇用此謂淫風不得不變近太常假民裾襦五百稱以衣妓工待玄武門遊戲臣以為非詒子孫之謀異曲新聲哀思淫溺武平一上書六代樂五白周書以樂舞教國子舞雲門大卷大咸咸池堯樂也大韶舜大夏禹大濩殷大武周北同所存六代樂黃帝曰雲曰大卷漢禮樂志云黃帝作咸池咸皆也池苞容浸潤也顓頊作六莖莖根莖澤及下也帝嚳作五英英華也堯作大章章明也舜作韶韶紹也繼堯禹作大夏夏大也承二帝二帝堯舜也湯作大濩濩救也武王作武言以武功定天下也周公作勺言能勺取先祖之道孔雲門軒轅氏之樂歌也其義蓋言雲之出潤益萬物如帝之德無所不施咸池陶唐氏之樂歌也其義蓋稱堯德至大無不備全元化油油兮孰知其然至德汩汩兮順之以先元化浘浘兮孰知其然至道泱泱兮曲之以全五莖顓頊之樂歌也其義蓋稱顓頊得五德之根莖大韶有虞氏之樂歌也其義蓋稱帝舜能紹元聖之德大夏有夏氏之樂歌也其義蓋稱禹治水其功能大中國茫茫下土兮乃生九州山有長岑兮州有深流茫茫下土兮乃均四方國有人民兮野有封疆茫茫下土兮乃歌萬年上著茂功兮下載人天大濩有殷氏之樂歌也其義蓋稱湯救天下護然得所萬姓苦兮然且哭不有聖人兮誰護育聖人生兮天下和萬物熙熙兮舞且歌以上並元結樂詩白任禁之樂南蠻之樂曰任四夷之樂曰禁韎離之曲東夷北夷之樂周禮鞮鞻氏掌四夷之樂與其聲逖鞮之倡上林賦云四夷之樂扶婁之技成王之時扶婁國獻之技納魯廟魯廟周公廟禮曰納蠻夷之樂於太廟以祀周公言廣魯於天下獻漢庭後漢西南夷揮國王獻樂作於庭安帝與群臣觀之四夷聞奏德所及文選舞四夷之樂以明德澤廣被四表五經義曰以娛四夷之賓以睦八荒之俗文選僸侏兜離並夷樂奏四夷樂于好會史記魯定公會齊景公於夾谷孔子攝相事齊有司趨進曰請奏四夷樂於是旌旄羽仗矛戟劍撥鼓譟而至孔子趨進歷階而登舉袂大言曰吾兩君為好會夷狄之樂何為請有司卻之齊侯乃麾而去戎索索法也賓旅巴渝之舞昧任昧東夷之樂任南蠻之樂帝王之庭不宜作夷樂後漢陳禪字紀山為諫議大夫西南禪國獻樂及幻人能吐火自支解易牛馬頭大會作之於庭禪離席舉手曰云云尚書陳忠劾禪詔不收周禮旄人掌教散樂舞夷樂夷樂四夷之樂散樂野人為樂之善者韎師掌教韎樂祭祀則帥其屬而舞之舞以東夷之舞大饗亦如之以雅以南韎任朱離變化晉樂志後漢天子受朝賀舍利從西來戲於殿前擊水化成魚漱水作霧又化成龍出水遊戲以兩大繩兩頭相去數丈兩倡女對行於繩上也四夷樂六孔為舞衣尋橦跳劍鼓鞞聲通晝夜不絶常山愍王承乾使尸奴數十百人習音聲樂胡人推髻剪綵為舞衣尋橦跳劍鼓鞞聲通晝夜不絶蘇幕遮呂元泰上書言比見坊邑相率為渾脫隊駿馬胡服名曰蘇幕遮旗鼓相當軍陳勢也騰逐喧譟戰爭象也錦繡夸競害風俗也督斂貧弱傷政體也胡服相歡非雅樂也渾脫為號非美名也安可以禮義之朝法胡虜之俗唱合生武平一後宴兩儀殿帝命后兄光祿少卿嬰監酒嬰滑稽敏紿詔學士嘲之嬰能抗數人酒酣胡人襪子何懿等唱合生歌言淺穢平一上書曰胡樂施于聲律本備四夷之數比來日益流宕異曲新聲哀思淫溺始自王公稍及閭巷妖伎胡人街童市子或言妃主情貌或列王公名質詠歌蹈舞號曰合生昔齊衰有行伴侶陳滅有玉樹後庭花趨數驁僻皆亡國之音夫禮傔而不進則銷樂流而不反則放臣願屏流僻崇肅雍凡胡樂備四夷外一皆罷遣況兩儀承慶殿者陛下受朝聽訟之所比大饗群臣不容以倡優媟狎虧汗邦典若聽政之暇苟玩耳目自當奏之後廷可也不納大唐平高昌盡收其樂著令者唯十部龜茲疏勒安國康國高麗西涼高昌宴樂清伎樂天竺通典吹螺擊鼓吐蕃贊普其樂吹螺擊鼓雲韶掩夷韎韓愈聯句乞寒潑胡通典百濟樂中宗之代工人散死開元中歧王範為太常卿復奏置之是以音伎多闕舞者二人紫大袖裙襦章甫冠皮履樂之存者箏笛挑皮篳篥箜篌歌同上南詔歸唐有內附心遣使楊加明詣西川節度韋皋請獻夷中歌曲於是皋作南詔奉聖樂凡樂三十工九十六人分四部一龜茲部二大鼓部三胡部四軍樂部南蠻傳其樂五譯而至同上南詔瓢笙笙四管酒至客前以笙推杯勸釂瞽宗七白周禮大司樂有道者有德者使教焉死則以為樂祖祭於瞽宗謂若夔典樂教胄子毛詩有瞽始作樂而合乎祖有瞽有瞽在周之庭論語師冕見及階子曰階也及席子曰席也告之曰某在斯周禮視暸視扶工扶工相瞽者相師之道也瞽為詩蒙瞍奏公瞽奏鼓書孔瞍賦矇誦張嘉正曰昔天子聽政於上瞍賦矇誦感物寓意可備矇瞽之風元稹上令狐相公啓女樂八白齊人婦女樂季桓子之三日不朝孔子行鄭人賂晉侯以女樂二八晉侯以樂之半賜魏絳秦穆遺戎而由余去穆公齊人歸魯而孔子行後房漢田蚡前堂羅鍾鼓立曲旃後房婦女以百數後堂張禹奢淫後堂理絲竹後列女樂後漢馬融季長達生任性不拘儒者之節常坐高堂施絳帳前受生徒後列女樂弟子以次相傳授鮮有入堂者盧植字子幹侍滿數年未嘗博盼融以是嘉之曳紈繡珥金翠絲竹盡時之妙石崇後房數百皆云云文選一遊山晉謝安在東山時每遊山嘗以妓樂相隨不悅王導作女妓蔡謨在坐不悅而去導知之亦不止竹不如肉桓溫問孟嘉曰聽妓絲不如竹竹不如肉何也嘉曰漸近自然夏侯惇從征孫權賜妓樂踏鼓魏志楊阜為武都太守會馬超來寇曹洪禦之超退洪置酒大會令女倡著羅縠衣踏鼓一座皆笑楊阜厲聲責洪曰男女有別云云遂奮衣出洪立罷女樂請阜還一座肅然憚之孔以樂律授宮中王圭帝使太常少卿祖孝孫以樂律授宮中音家伎不進數被讓圭與溫彥博同進曰孝孫修謹士陛下使教女樂又責譙之天下其以士為輕乎就率更寺隸習賈曾為太子舍人太子數遣使采女樂就率更寺隸習曾練李翱條興復太平大略曰昔齊遣魯以女樂季桓子受之君臣共觀二日不朝孔子行令韓弘獻女樂陛下不受遂以歸之三也獻女樂八人帝不納韓金義其子獻女樂八人帝不納曰我方以儉治天下惡用是為賜二部河間元王孝恭賜女樂二部後房歌舞伎百餘賞糖雞卵郭元振落梅粧閣有婢數十人客至則拖鴛鴦纈裙供一曲終則賞糖雞卵明其聲也宴罷散九和握香出敘聞録酒場舞閨姝韓愈送文暢詩凡三品已上得備女樂唐六典五品巳上女樂不得過三人同上掌樂九白舜典曰夔命汝典樂教胄子伶倫黃帝樂官子語魯太師樂其可知也周禮大司樂掌成均之法成均學名掌均調樂音理其樂周禮樂師凡樂成則告備周禮它樂官展樂器它具也展陳數也周禮學樂必時春誦夏絃移風有序日就月盈賤工師乙曰乙賤工也禮但紀鏗鏘漢書樂家有制氏但以雅樂舉聲律世世在太樂官但紀鏗鏘鼓舞不能知其義也李延年為協律都尉班贊曰協律則李延年論語大師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入于河播鞀武入于漢少師陽擊磬襄入于海周衰不能用樂故掌樂之官奔河海掌樂之官抱其器而奔河海漢志云云古樂書六國時魏文侯最為好古孝文時得其樂人竇公獻其書乃周官大宗伯之大司樂之章也孔太常掌樂太常寺卿一人少卿二人掌禮樂百官志掌調鍾律大樂署掌調鍾律以供祭饗同上以中官為教坊使武德後置內教坊于禁中武后如意元年改曰雲韶府以中官為使開元二年又置內教坊于蓬萊宮側有音聲博士第一曹博士第二曹博士京都置左右教坊掌俳優雜伎自是不隸太常以中官為教坊使習樂立師以教凡習樂立師以教而歲考其師之課業為三等百官志雜戲十白萬樂百戲臨迥望之廣場呈角抵之妙戲漢武帝令兩兩相當抵角量其伎九劍陸離魚龍雜踏仙倡奇戲文選作奇伎淫巧以蕩上心魯定公會景公于夾谷齊有司進曰請奏宮中之樂於是優倡侏儒為戲於前孔子曰匹夫而熒惑於諸侯罪當誅請命有司如法焉手足異處景公懼而歸史夏傑大進倡優漫瀾之樂奇偉戲靡之聲為悅目之玩態不可彌殫所未見必有可觀新樂魏文侯曰吾聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏曰今夫新樂進俯退俯姦聲以濫溺而不止及倡優侏儒猱雜子女不知父子樂終不可以語不可以導古此新樂之發也注進俯退俯言不齊一也猱雜言舞者如獼猴戲淫亂之其也桓子受而不朝文侯聽而無倦黃門武樂後命祭遵悌孫為征虜將軍帝幸遵饗士卒作黃門武樂良久乃罷舍利幻化後漢正旦天子臨德殿受朝賀舍利從西方來戲於殿前激水化成比目魚躍嗽水作霧翳日畢又化成龍八丈出外遊戲炫耀日光以兩大繩繫兩柱頭相去數丈兩倡女對舞行於繩上相逢比肩而不傾矣江左有夏育扛鼎巨鰲神龜抃舞背負靈嶽桂樹白雪畫地成川之戲魏晉記河女章小海唱晉夏統仲御會稽人至洛上曰賈充請作鄉閭樂曹娥死國人作河女章伍胥戮作小海唱以足叩船引聲喉轉含水嗽天雷雨饗集衆懼止之雙枝倍身列子曰宋有蘭子以妖干元君以雙枝長倍其身屬其頸並趨馳七劍迭而躍之賜金後復有以燕戲干元君將拘而戮之此伎雖同而時異也祕戲周仁德與後宮祕戲以垢污無所嫌常從象可罷漢哀詔聽工以律知曰冬至夏至一人朝賀置酒陳前殿房中不應經法常從象倡三十人常從象四人皆鄭聲可罷象譯人也若今戲假師子著假面也魚龍曼延百戲後漢安帝罷之優旃優施並俳優名觀優陳式鮑氏之圉人為優上皆釋甲飲酒且觀優至魚里都盧尋橦都盧山名其人善緣竿百戲孔百戲散樂本非正聲孫伏伽上言百戲散樂本非正聲隋末始見崇用此謂淫風不得不變餘見淫樂門乞寒胡戲韓朝宗初歷左拾遣睿宗詔作乞寒胡戲諫曰昔辛有過伊川見被髮而祭知其必戎今乞寒胡非古不法無乃為狄裸體跳足汩泥揮水張説武后未年為發寒胡戲中宗嘗乘樓從觀至是因四夷來朝復為之説上疏曰韓宣子適魯見周禮而嘆孔子會齊數倡優之罪列國如此況天朝乎今四夷請和使者入謁當接以禮樂示以兵威雖曰戎夷不可輕也焉知無駒支之辨由余之賢哉且乞寒潑胡未聞典故裸體跳足汩泥揮水盛德何觀焉恐非干羽柔遠樽俎折衝之道納之自是遂絶召梨園諸工合樂王維安祿山反迫為給事中祿山大宴凝碧池悉召梨園諸工合樂諸工皆泣維聞悲甚賦詩悼痛雜伎愈盛蘇元明言大河南北舉為寇盜王公以下廩稍匱絶將士糧賜僅支日月而中官冗食不減往年梨園雜伎愈盛今日陛下未得穆然高枕殆由此也以優補長安尉李栖筠華原尉俟莫陳怤以優補長安尉當參臺栖筠物色其勞怤色動不能對乃自言為徐浩杜濟薛雍所引非其優也諧臣顐官元結時議曰諧臣顐官怡愈天顏一作諧臣戲官司俳兒弄木偶伺人情崔彥曾為徐州觀察使桂州戍者脅糧料判官龐勛為將此還達泗口所過先遣俳兒弄木偶伺人情以防邀遏本傳設角抵戲田弘正初劉悟既平賊大張飲軍中凡三日設角抵戲引魏博使至延以為歡樂工授長史韋溫樂工尉遲璋授光州長史溫悉封上詔書作詼諧數千言陸羽為優人作詼諧數千言戲族咸在百弄迭作視仙童之霓裳睹壯夫之角抵李廋西都賦文粹陳跳九舞劍李輔國遷兵部尚書南省視事使武上戍裝夾道陳跳九舞劍百騎前驅自斷手足樂志天竺伎能自斷手足刺腸胄高宗惡其驚俗詔不令入中國俯身就鋒同上睿宗時婆羅門國獻人倒行以足舞仰植銛刀俯身就鋒歷臉下復植於背觱篥者立腹上終曲而不傷又伏伸其手二人躡之周旋百轉明宗自初即位減罷伶官五代史顐玩之臣杜牧燕將録令天子徘徊顐玩之臣顏澀不展咸通問諸王多習雜戲樂志咸通問諸王多習音聲倡優雜戲天子幸其院則迎駕奏樂戶奴數十百人習音聲常山愍王承乾使戶奴數十百人習音聲學胡人推髻翦綵為舞衣尋橦跳劍鼓角聲通晝夜不絶營百戲嚴挺之疏今暴衣冠羅伎樂雜鄭衛之音縱倡優之玩不深戒謹使不司跛倚下人罷劇府縣里閭課賦苛嚴呼嗟道路貿懷家産營百戲擾方春之業欲同其樂而反遺之患戴干舞帝御勤政樓張樂百伎羅列教坊女優王大娘善戴干舞頭戴長竿施木山狀如瀛州方丈命小兒持絳節立具上而舞中音節時劉晏以神童召見樓上帝命賦詩立進一絶曰樓前百戲爭競新只有長竿妙入神誰謂綺羅番有力猶自嫌輕更蓍人妃子甚嘉置晏於膝上為傳脂粉明皇雜録興王之舞服夷之伎揳擊吹鼓之音飛騰幻怪之容衆觀于遠邇柳宗元饗軍堂記帝教舞馬數百蹄分為左右部各有名稱曰某家驕其曲謂之傾杯樂者千匹馬皆衣之以錦繡絡以金鐸樂作奮首鼓尾縱橫應節又設三層木榻置馬其上周旋益妙祿山入京取數十匹歸范陽祿山敗入田承嗣軍不知其伎也一日大饗樂作馬聞樂而舞廄人以為妖孽之至斃明皇雜録觀公孫大娘舞劍器大曆中見臨穎李士二娘舞劍器壯其蔚跂問其所師曰余公孫大娘弟子也間元三載余尚童稚觀公孫大娘舞劍器渾脫瀏灘頓挫獨出冠時一人而已詩云昔有佳人公孫氏一舞劍器動四方觀者如山色淚喪天地為之久低昂耀如羿射九日落矯如群帝驂龍翔來如雷霆收震怒罷如江海凝清光絳唇朱袖兩寂寞況有弟子傳芬芒臨穎美人在白帝妙舞此曲神揚揚與余問答既有以感時撫事增惋傷先帝侍女八千人公孫劍器初第一五十年間似反掌風塵傾洞昏王室梨園弟子散如煙女樂餘姿映寒白金粟堆南木已拱瞿唐石城草蕭瑟杜甫樂器十一白周樂官正樂懸之位王宮懸四面也諸侯軒懸去南面也卿大夫判懸去兩宮也士特懸一面也展樂器展陳也二律見上簨虡以懸樂器也舞器羽籥之屬梓人為簨虡周禮夏后氏龍簨虡殷之崇牙周之璧翣皆以懸鍾鼓三代異名也禮鍾鼓管磬羽籥干戚樂之器也禮巧拙相非魏杜夔公良善鍾律初漢鑄工柴玉巧有意思夔令玉鑄鍾聲韻清濁多不如法數改作王饜之謂杜夔清濁任意夔玉更相白太祖太祖取所鑄鍾錯雜更試然後知夔之精玉之妄於是罪王也孔阮咸所作元行沖有人破古冢得銅器似琵琶身正圓人莫能辨行沖曰此阮咸所作器也命易以木絃之其聲亮雅樂家謂之阮咸展器于庭李嗣真擢太常丞嘗引工展器于庭后奇其風度物之善鳴金石絲竹匏土革木八者物之善鳴者也韓愈送孟東野序樂器有數樂志樂器有數其餘皆略而不著而其物名具在八音一曰金鑄鍾為締鍾為歌鍾為鑄為鐃為鐲為鐸二曰石鑄鍾為大磬為編磬為歌磬三曰土為塤為嘂嘂大塤也四曰革為雷鼓為靈鼓為路鼓皆有之為建鼓為鞀鼓為縣鼓為節鼓為打為相五曰絲為琴為瑟為頌瑟頌瑟箏也為阮咸為築六曰木為柷為敔為雅為應七曰匏為笙為竽為巢巢大笙也為和和小笙也八曰竹為簫為管為箎為笛為春牘此為樂器也樂器塵蠹肅宗皇后吳氏上在東宮玄宗因幸其宮顧庭宇不汛掃樂器塵蠹左右無嬪侍帝愀然白聲成文謂之音飾喜樂也善歌者使人繼其聲上如抗下如墜曲如折止如稿木倨中矩句中鉤纍纍乎疫如貫珠子與人歌而善必使反之而後和之歌之為言長言也月令章句曰歌者樂之聲也書曰歌永言新歌妙入神古詩聲條暢而逶迤美聲暢於虞氏並文選動梁塵七略善歌者有虞公發聲動梁上塵吐羽含徵見魏文詩含商吐角襄陽記昔有善歌者含商吐角之音郢中之曲宋玉曰有歌於郢中和者不過數人唱彌高而和彌寡陽春白雪之和也昔王豹處於淇而河西善謳綿駒處於高唐而齊右善歌孟子韓娥之遺音列子曰韓娥東之齊至梁過雍門鬻歌假食故雍門人善歌娥之遺音也曼聲列子曰韓娥曼聲長歌一里老幼喜躍抃舞秦青撫節悲歌聲振林木響遏行雲列子聲入雲霄戚夫人歌出塞之曲齊謳吳歈楚艷並歌名陽春白雪流風激楚陽阿並曲名悲歌吐清響陸機詩合聲習歌於國學也人聲禮曰歌者在上匏竹在下貴人聲也歌詠其聲禮登歌者五帝三王之聲變新聲漢李延年善歌為變新聲號協律聲也九歌九功之德皆可歌也九府三事謂之九功也嗟嘆之不足故永歌之臨風恍而浩歌騷升歌間歌登歌太師大祭祀帥瞽登歌晉武受禪罷雞鳴曲名晉志凡樂章古辭今之存者並漢世街陌謠謳江南採蓮烏生八九子白頭吟之屬是也子夜歌者女子夜造之孝武時王軻之家有鬼歌子夜是此時也鳳將雛者舊歌曲前漢軍騎將軍沈充所制團扇歌者中書令王玫婢善歌所製寤歌和習和歌歌以發德永言趙伐秦楚之謳武帝立樂府采誦夜有趙伐秦楚之謳以李延年為協律多舉司馬相如等造詩賦略論律足以合八音之調王者歌八闋葛天氏歌名九序書曰九序惟歌虞舜為南風之薰歌虞書曰帝庸作歌曰元首起哉股肱喜哉百工熙哉皋陶作賡歌漢高祖大風之歌高祖飲於沛自作歌曰大風起兮雲飛揚威加海內兮歸故鄉安得往士兮守四方漢武濟汾之歌得渥窪水馬作天馬歌又云作白麟赤鴈靈芝寶鼎之歌以薦郊廟因瑞作之傳曰文王之功天下誦而歌舞之發至德詠成功也濟汾過沛大宛千里馬至名蒲梢下歌曰天馬來兮自西極汲黯曰王者樂上承祖宗下化兆人今陛下得馬而歌協於宗廟百姓豈不知其意公孫弘曰黯謗聖制宣誅之黃竹之歌穆天子傳曰天子遊黃臺之丘獵於平澤有降雨天子乃休日中大寒北風雨雪有凍人天子作黃竹歌以哀之雜歌寧戚扣角之歌荊卿易水之歌孔子蚤作負手曳杖而歌莊子妻死鼓盆而歌季武子死曾點倚門而歌明不與之魯人朝祥而暮歌王母白雪之謠漢有天馬之歌聲歌各有宜禮記子貢問於師乙師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉夫歌者直己而陳德者也故寬而靜柔而正者宜歌誦廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜兼而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊言歌與性相近者也登木之歌禮原壤之母死夫子助之木槨原壤登木曰豫之不記於音久矣歌曰理首之班然執汝手之卷然夫子為不聞也行歌周禮銜枚氏禁囂呼歎鳴行歌哭於市中及道者朱買臣行歌道中負薪字翁子拊楹齊莊公通薑氏驟如崔氏拊楹而歌注云歌命薑氏也吳歈越吟中和樂職王遵為益州剌史王褒作中和樂職選好事者依鹿鳴習而歌之時汜鄉侯何武為童子選在歌中孔桑條歌十二篇中宗庶人韋氏太史迦葉志志上桑條歌十二篇言后當受命曰昔高祖時天下歌桃李太宗時歌秦王破陳高宗歌堂堂天后世歌武媚娘皇帝受命歌英王石州后今受命歌桑條韋蓋后妃之德專蠶桑共宗廟事也種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸承天皇帝倓帝惑偏語賜倓死明年李泌獻捷泌與帝雅素從容語倓事泌曰陛下嘗聞黃臺瓜乎高宗有八子天后所生者四人自為行而睿宗最幼長曰弘為太子仁明孝友后方圖臨朝鳩殺之而立次子賢賢日憂惕每侍上不取有言乃作樂章使工歌之欲以感悟上及后其曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸而賢終為后所斥死黔中陛下今一摘矣願無再歌竹枝劉禹錫斥朗州司馬州接夜郎諸夷風俗陋甚家喜巫鬼每祠歌竹枝鼓吹裴回其聲侯佇禹錫謂屈原后沅湘間作九歌使楚人以逆送神乃倚其聲作竹枝詞十餘篇於是武陵夷俚悉歌之躑躅謳歌灝灝和寧柳公權曰去隋氏克歸于唐躑躅謳歌灝灝和寧黃菊歌韋綬九月九日帝為黃菊歌顧至右曰安可不示韋綬即遣使持往綬遽奉和附使進歎百年曹確進中書侍郎時帝薄於德昵寵優人李可及可及者能新聲自度曲辭調悽折京師偷薄少年爭慕之號為拍彈同昌公主喪畢帝與郭未妃悼念不已可及為帝造曲曰歎百年教舞者數百皆珠翠緣飾刻畫魚龍地衣度用繒五千倚曲作辭哀思裴回聞者皆涕下舞闋珠寶覆地帝以為天下之至悲愈寵之但覺高歌有鬼神杜甫醉時歌詩歌鼓秦人盆同上貽華陽柳少府詩使教婢宋遜為連州參軍刺成聞其善歌使教婢日執笏簾外唱吟自如李益於詩尤所長每一篇成樂工爭以賂求取之被聲歌供奉天子本傳連袂而歌樂志宣宗每宴群臣備百戲帝制新曲教女伶數十百人衣珠翠緹繡連袂而歌其樂有播皇猷之曲檀來之歌南唐李景世宗取泗州周師步騎數萬水陸齊進軍士作檀來之歌聲聞數十里得寶歌韋堅鑿潭成帝為升樓每舟署某郡以所主暴陳其上若廣陵則錦銅器先是人間唱得休紇歌有楊州銅器語葉更變為得寶歌自造而唱習至是衣缺袴衫錦半臂終帽額立艫前倡人數百皆巾搆鮮冶齊聲應和鼓吹合作竹枝曲醉録張旭醉後竹枝曲反覆必至九回乃已百室連歌李庾東都賦紫雲曲八月望夜師與上遊月宮聆月中天樂其曲名曰紫雲曲上素曉音律默記其聲歸傳其音名霓裳羽衣曲出唐逸史歌甚善符存審少微賤嘗犯法當死臨刑指旁壞垣顧主者曰願就死于皮冀得垣土覆尸主者哀而許之為徙垣下而主將方飲酒顧其愛妓思得善歌者佐酒妓言有符存審常為妾歌甚善主將馳騎召存審而存審以徙垣下故未加刑因往就召使歌而悅之存審因得不死五代史還鄉歌吳越錢鏐遊衣錦軍作還鄉歌曰三節還鄉兮挂錦衣父老遠來相追隨吳越一王駟馬歸緣雲緣雲清切歌聲上杜甫樂遊園詩裊裊穿雲衢繁絃迸關細寒管裂圓蘆衆音不能逐裊裊穿雲衢杜牧張好好詩一聲雛鳳呼盼盼乍垂袖一聲雛鳳呼同上贈之天馬錦副以水犀梳同上孤雲忽無色邊馬為回首韋蘇州擬古詩玉顏上哀轉絶耳非世有孤雲忽無色邊馬為回首曲絶碧天高餘聲散秋草巴渝末曲贊皇一品集豈謂擊壞餘音謬入帝堯之聽巴喻末曲猥蒙漢祖之知善歌妙絶韓會與名輩號四夔會首而善歌妙絶出唐語林歌直千金開元遺事宮妓永新者善歌明皇寵愛每封奏歌則絲竹之聲莫能遏帝嘗謂左右曰此妾歌直千金隔障歌寧玉有妓寵姐美姿色善謳唱客莫能見李白侍酒戲曰聞王有寵姐善歌今酒殽醉飽群公宴倦王何吝此女示於衆王笑謂左右曰設七寶花幛召於障後歌之白起而謝曰雖不許見面聞其聲亦幸矣同上七寶杯酌蒲萄酒帝與妃賞牡丹命李龜年持金花箋賜李白令進清平樂詞三篇白援筆立書以進帝命李龜年歌太真妃以玻隳七寶杯酌西涼州蒲萄酒笑領歌奇姿態尤妙楊妃外傳進水調歌興慶宮帝潛邸於西南隅起花萼相輝二樓與諸王遊處祿山犯順乘遽以聞議欲遷幸置酒樓上命作樂有進水調歌者曰山川滿目淚霑衣富貴榮華得幾時不見只今汾水上惟有年年秋鴈飛上問誰為此詞曰李嶠上曰真才子也遂不終飲而去明皇雜録善歌念奴有色善歌宮妓中第一帝嘗曰此女眼色媚人天寶遺事米嘉榮劉禹錫與歌者米嘉榮唱得涼州意外聲舊人唯數米嘉榮永新歌明皇大酺勤政樓萬衆喧譁上命宮女永新歌一曲樓下皆竦聽寂無人聲滿堂慘不樂響下清虛裏江城帶素月況乃清夜起老夫悲暮年壯士淚如水杜甫聽楊氏歌又玉杯久寂寞金管迷宮徵雨霖鈴帝幸蜀初入斜谷霖雨彌旬棧道中聞鈴聲帝方悼念貴妃因採其聲為雨霖鈴曲以寄恨焉時梨園弟惟張野狐一人善觱栗因使吹之遂傳于世明皇雜録緑珠怨朝野僉載武后時補闕喬知之有妾曰碧玉美而善歌舞武承嗣借教歌僮納之不還知之作緑珠怨密寄之其末四句雲辭君去君終不忍徒勞掩袂傷鉛粉百年離恨在高樓一代容華為君盡碧玉得詩飲泣而卒承嗣聞之遂殺喬知之舞十三白公庭萬舞左手執籥右手秉翟詩執翿婆娑舞也蹲蹲舞我屢舞仙仙欺欺傞傞並醉舞貌也舞者樂之容也而有行綴之制執干持羽祕舞更奏振朱徙白鶴飛兮繭曳緒言舞似之文選蹩躠蹁躚舞貌長袖善舞韓子文選曰舞以盡意是以聽其聲不如察其形記曰干戚之容指顧應聲並舞賦云云若流風之回雪彩鸞之對鏡野舞謂野人學舞者周禮大司樂以樂教國子舞雲門大卷大韶大夏大濩大武此周所存六代之樂也凡舞有帗舞全羽有羽舞析羽皇舞以羽覆冒頭也旄舞氂牛尾也有干舞于兵也有人舞無所執以手袖為威儀周禮樂儀周禮禮容舞位周禮正舞位舞列猶舞次也舞器羽籥之屬習舞月令舞者羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也禮舞行列行諸侯德盛而教尊則天子賞之以樂故其治民勞者其舞行綴遠治民逸者其舞行綴短故觀其舞知其德行列也民勞則德薄德薄則賜少故綴遠也民逸則德盛德盛則賜多故綴短也謂人相去遠近動以干戚飾以羽旄禮舞動其容也禮三步以見方謂將舞必先三舉足以見將舞之漸也進旅退旅言進退齊一也禮綴兆行列禮舞者執其干戚習其俯仰屈伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉舞之蹈之嗟嘆之不足不知手之舞之足之蹈之言歡之至也飾喜萬舞有奕修袖繚繞而滿庭羅襪躡蹀而容與選大射詔諸侯以弓矢舞謂執弓挾矢揖讓進退之儀周禮釋菜合舞王子頽享五大夫樂及遍舞僭禮備用六代之舞振萬恆舞伊訓曰敢有恆舞于宮酣歌于室時謂巫風也書側辨之俄屢舞傞傞致右憲右憲讀為軒發揚蹈厲獻舞武帝時河間獻王好儒與毛生等共釆周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相遠也王者舞傳曰文王之功天下頌而歌舞之觀其舞知其德天子八佾佾八行行八人六十四人也諸侯六佾大夫四夫舞所以節八音而行八風也故自八已下舞以象功漢書周八佾漢五行漢有文始五行之舞知德象功見上虞帝誕敷文德舞干羽于兩階七旬有苗格黃帝雲門周王大武並舞名所以樂德象功也以褅禮祀周公於太廟朱干玉戚冕而舞大武禮漢高庫存奏武德文始五行之舞禮曰春夏干戈萬舞以象武秋冬學羽籥籥舞所以象文樂之文也見上吳季札觀樂見舞象簫南籥者文王舞曰美哉猶有憾恨切不終見舞大武者武王舞曰美哉周之盛也其若此乎言周德之最盛見舞大濩者湯舞也曰聖人之弘也猶有慚德聖人之難也湯慚於始用伐見舞大夏者曰聖人之勤非禹其誰能及之治水之勤見舞韶簫者舜舞曰德至矣哉大矣如天之無不燾如地之無不載也鼓舞而天下人之易雜舞孔子謂委氏八佾舞於庭是可忍也孰不可忍也僭於上也魯考仲子之宮將萬焉公問羽數於衆仲趙飛燕體輕能為掌上舞漢值其鷺羽宛丘之道詩刺陳幽公醉舞後漢蔡雍字伯喈就路五原太守五智餞之酒酣智起舞屬雍雍不為報智銜之舞不轉魏志陶謙恭袒為舒令郡守張盤常引入與燕飲謙或距而不留常舞屬謙謙不為起因強之乃舞舞又不轉曰轉則勝人百獸率舞沐猴狗鬥漢平恩侯許伯入第長信少府檀長卿起舞為沐猴與狗鬥司隸蓋寬饒劾長卿以列卿而沐猴舞失禮不敬許伯為謝長久乃解拂衣而起奮袖低卬揚憚書云高祖作巴渝舞長沙王舞袖不面舉上問之對曰臣地狹人微不足以回轉荊艷楚舞文選鴝鵒舞晉王導補謝尚為掾導有勝會謂之曰聞君能作鴝鵒舞一座傾相尚便著衣幘而舞令座上擊節為應俯仰有巾旁若無人白紵舞劉琨聞雞鳴而起舞內則曰十三誦詩舞勺十五成童舞象結風後漢傳毅舞賦云宋玉對楚襄王曰臣聞徼楚結風揚阿之舞材人之窮觀天下之至妙延年女弟李延年侍上歌曰北方有佳人云云平陽主因言延年女弟上召見實妙麗而善舞馬上舞袁談破公馬上舞三巴也劍舞鴻門會飲酒項莊曰軍中無以為樂請舞劍欲殺沛公項伯亦起舞翼蔽之賨旅巴渝之舞晉禮樂志巴郡善歌舞高祖愛其舞詔樂府習之今巴渝舞是也孔酒酣帝起舞燕王忠帝始為太子而忠生宴宮中俄而太宗臨幸詔宮臣曰朕始有孫欲共為樂酒酣帝起舞以屬群臣在位皆舞偶舞為帝壽安樂公主出嚮天子再拜武攸暨與大平公主偶舞為帝壽高麗舞楊再思為高麗舞見戲謔門是舉五經掃地祝欽明帝與群臣宴欽明自言能八風舞帝許之欽明體肥醜據地搖頭睆目左右顧盼帝大笑吏部侍郎盧藏用嘆曰是舉五經掃地談容娘舞渾脫舞黃獐舞帝昵宴近臣及修文學士詔遍為伎工部尚書張錫為談容娘舞將作大臣宗晉卿為渾脫舞左衛將軍張治為黃獐舞為回波舞求學士崔日用驟拜兵部侍郎宴內殿酒酣起為回波舞求學士順聖樂舞于頔常制順聖樂舞獻諸朝又教女伎為八佾聲態雄侈號孫吳順聖樂天子立觀裴守真是時破陳慶善二樂舞入帝常立以視頃樂闋乃坐守真并言二舞誠祖宗盛德然古無天子立觀者化育詒庇孰非厥功不應鼓舞別申嚴奉詔可賜酒醉起舞李嗣業入朝賜酒玄宗前醉起舞帝寵之詔學士等舞回波沈佺期兼修文館直學士既侍宴帝詔學士等舞回波佺期為弄辭悅帝自歌以舞王翰張嘉貞為本州長史偉其人厚遇之翰自歌以舞屬嘉貞神氣軒舉自如霓裳羽衣舞馮定再遷太常少卿文宗常詔開元霓裳羽衣舞參以雲韶隸于廷定部諸工立縣間端凝若植舞為五字南蠻西舍利請獻夷中歌曲且令驃國進樂人工十二人服南詔服立闢四門舞筵四隅節拜合樂又舞人服南詔衣絳裙襦黑頭囊金怯苴畫皮靴首飾抹額冠余寶花鬘襦上復加畫半臂執羽翟舞俯伏以象朝拜裙襦畫鳥獸草木文以五采雜華以象庶物咸遂羽葆四垂以象天無不覆正方布位以象地無不載分四列以象四氣舞為五字以象五行胡旋舞安祿山晚益肥腹緩及膝奮兩肩若挽率者乃能行作胡旋舞帝前乃疾如風千筵接舞李庾東都賦復文武二舞崔稅遷太常高祖詔太常復文武二舞冬至高祖會朝崇元殿庭設宮縣二舞在北登歌在上文舞郎八佾六十有四人冠時賢冠黃紗袍白中單白練𥛐襠白布大口褲革帶履左執籥右秉翟執縣引者二人武舞郎八佾大十有四人服一巾幘緋絲在大袖繡襠甲金飾白𥛐練錦騰蛇起梁帶豹文大口褲烏靴左執干右執戚執旌引者二人加鼓吹十二按負以態豹以象百獸率舞按設羽葆鼓一大鼓一金錞一歌簫笳各二人王公上壽天子舉爵奏玄同三舉登歌文同舉食文舞舞昭德武舞舞成功之曲禮畢高祖大悅賜梲金帛群臣左右睹者皆嗟嘆之五代史拂水低徊舞袖翻杜甫樂遊園播皇猷理宗明於音律嘗制曲曰播皇猷皆方履高冠連袂而舞有曰蔥西踏歌隊者大率其詞言蔥嶺之士樂河湟故曰歸為唐民又有執幡節者如翔雲飛鶴之變大中遺事舞以達歡古人飲酒皆以舞相屬長沙王小舉袖云國小不足回旋太宗亦自起舞屬群臣曰善古人浮質舞以達歡不必合度張燕公詩云醉後歡更好全勝未醉時動容皆是舞出語總成詩古今明賢集青俄翳長袖韓愈聯名唐之自製樂凡三大舞一曰七德舞二曰九功舞三曰上元舞樂志七德舞本名秦王破陳樂太宗為秦王破劉武周軍中相與作秦王破陳樂曲及即位宴會必奏之乃製舞圖左圓右方先遍後伍交錯屈伸以象魚麗鵝鸛命呂才以圖教樂工百二十八人被銀甲執戟而舞凡三變每變為四陳象擊剌往來歌者和曰秦王破陳樂後令魏徵與員外散騎常侍褚亮虞世南太子右庶子李百藥更制歌辭名曰七德舞舞初成觀者皆扼腕踴躍諸將上壽群臣稱萬歲蠻夷在庭者請相率以舞同上九功舞本名功成慶善樂太宗生於慶善宮貞觀六年年幸之宴從臣賞賜閭里同漢沛宛帝歡甚賦詩起居郎呂才被之管絃名曰功成慶善樂以童兒六十四人冠進德冠褲褶長袖漆髻屐履而舞號九功舞進蹈安徐以象文德上元舞高宗所作也舞者百八十人衣畫雲五色衣以象元氣其樂有上元二儀三才四時五行六律七政八風九官十洲得一慶雲之曲大祠享皆用之醉從趙女舞杜甫詩中堂舞神仙煙霧散玉質同上詩自笑燈前舞同上按舞圖上與諸王按舞萬歲樓下命畫之謂之按舞圖明皇雜録舞南詔奉聖樂字舞人十六執羽翟以四為列舞南字歌聖主無為化舞詔字歌南詔朝天樂舞奉字歌宇修文化舞聖字歌雨露覃無外舞樂字歌闢土丁零搴字舞畢又舞闢四門之舞舞終皆稽首逡巡又一人舞億萬壽之舞南蠻傳
