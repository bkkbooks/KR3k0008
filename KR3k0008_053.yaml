body:
  text: 卷第五十三警備一白預備不虞古之善政防其侵軼罔有敵於我師聊以自固軍行右轅左追蓐前茅慮無軍政不戒而備師無成命多備何為先縠彘子云云警而師徒有嚴險其走集走集壘壁明其伍候部伍相候望也軍旅思險險阻出其覆緩之處當思念以度人隱情以虞言私度己情所能以度彼之能否斤候用戒不虞且無外擢是資中權完其守備荒谷申警虞蜂蠆之毒楚君之戒分為二廣廣千乘乘隊也右廣初駕數及日中左則受之以至于昏吳國雖羸完修可息莒都恃漏失守用亡夜事請夜事守之事周禮糾守周禮以軍刑糾守守謂部伍也申嚴設伏料敵軍尚嚴終事資謀始握兵之要束甲之虞能軍賈怠刀劍不離身孫權曰昔雋不疑當安平之世刀劍不離身君子武備不可無之勇夫重閉況國乎莒子恃陋申公巫臣謂之云云雖有文事必有武備公羊非吳子遏之自輕行于皋卒兵事以嚴終榖梁曰古者大國過小邑必飾城而請罪禮也飾城修守備也庀武守宋災子罕使西鉏吾庀武守鄭災子産受兵登陴登陴守備也守關者備他盜漢王曰不設備小秦師左公徒釋甲執冰而踞踞游也言無戰志赤白囊邴吉馭吏習邊事織赤白囊書刺取採候也魯擊柝聞於邾邊遽乃止吳言上聞遽告于鄭商人弦高遇秦師乘馹正營部程不識正營奇行伍營陳擊刀斗至明軍不得休息未嘗遇害李廣不然軍士樂從廣而苦不識孔嚴備常若有敵李芃授河陽三城鎮遏使達練事宜嚴備常若有敵虜衆不敢入寇張獻甫為邠寧節度使築鹽夏二城虜衆畏不敢入寇以江淮甲給太原增馬千匹李吉甫寶應間發宥州以軍遙隸靈政道里曠遠故党項孤弱虜數擾之吉甫始奏復宥州乃治經略軍以隸綏銀道取鄜城神策屯兵九千實之以江淮甲三十萬給太原澤潞軍增太原馬千匹由是戎備全輯發義兵堅壁劉晏領江淮租庸事晏至吳郡而襄陽丞王璘反乃與採訪使李希言謀拒之希言假晏守餘杭會戰不利走依晏晏為陳可守計因發義兵堅壁會王敗欲轉略州縣聞晏有備遂自晉陵西走陸贄曰修封疆守要害蹊塹隧列屯營謹禁防明斥堠務農足食非萬全不謀非百克不鬥厄害之地俾置屯禦獨孤及曰假令居安畏危以備不虞自可厄害之地俾置屯禦武備張設王鐸為侍中封晉國公綏納流冗益募軍緝器鎧武備張設豫飭戰備顏真卿拜西節度使劉展將反真卿豫飭戰備都統李峘以為生事非短真卿因召為刑部侍郎繕甲兵治陴隍李晟進中書門下平章事晟受命拜且泣曰京師天下本若皆執羈靮誰將復之乃繕甲兵治陴隍以圖收復陸贄上書曰邊陲之戍以保封疆禁衛之旅以備巡警邦之大防也陛下悉而東征邊備空屈占徑兵三十杜兼為濠州刺史德宗既厭兵大抵刺史重代易至歷年不徙兼探帝意謀自固即修武備募占徑兵三十帝以為才選親兵晝夜警郭晞從征伐有功河中軍亂子儀召首惡誅之其支黨猶反側晞選親兵晝夜警以備非常姦人不得發備邊韋倫謂吐蕃豺虎野心不可事信約宜謹備邊帝喜其言閲鄉兵嚴守禦張鎰出為濠州刺史李靈耀反于汴鎰團閲鄉兵嚴守禦有詔褒美吳少誠叛獨東畿有備王翃徙東都留守既至開田二十餘屯修器械皆良金壽革練士卒號令精明俄而吳少誠叛獨東畿為有備關東賴之增陴濬隍顏真卿為平原守安祿山逆狀牙孽真卿陽託霖雨增陴濬隍料材壯儲廥廩日與賓客泛舟飲酒以紓祿山之疑果以為書生不虞也其可弛柝崇墉言言其可弛柝亦宜鎮以元老受降城碑分兵防守贊皇一品集賜王宰詔意當卿腹背受敵之處即須分兵防守以備寇虞列置府兵分隸禁衛陸宣公奏議太宗萬方底乂猶務戎備列置府兵分隸禁衛總戎備疆敵杜甫詩請五原靈武置舟師於河帝會群臣問所以備邊者將作大匠于筠請五原靈武置舟師於河扼其入中書侍郎溫彥博曰魏為長塹渴胸奴今司用帝使桑顯和塹邊大道召江南船工大發卒治戰艦頡利遣使來願款北樓關請互市帝不能拒突厥頡利傳無備二白不備不虞不可以師請先者去備薄威無備雖衆不可恃也臧文仲曰諸侯相見軍衛不徹警也莫敖伐羅不設備而敗縊于荒谷恃陋莒子恃陋不修城郭浹辰之間楚克其二都疆場無主以啓戎心卑邾魯及邾戰公卑邾不設備臧文仲曰國無小不可易也蜂蠆有毒況於國乎易晉卜偃曰虢必亡矣下陽不懼而又有功必易晉而不撫其民不可以五稔納斥候示不相備以藩為軍示不相疑狎敵榖梁遂之因氏飲戍者酒而殺之齊人殲焉此之謂狎敵罷屯漢韓安國史漁陽得生口言胸奴遠即上言田作時請罷屯罷屯月餘胸奴大至上谷漁陽安國嘔血而死也國雖大好戰必亡天下雖安忘戰必危主父偃雖曰薄威且乖重閉不整營伍李廣行無部在行陳就善水草屯舍人人自便不擊刁斗自衛幕府省文書然遠斥候未嘗遇害軍陳立成耿秉行止不結營部遠斥候有警急而軍陳立成讀孝經涼州刺史宋邊患多寇令多寫孝經令家家習之庶使知義蓋勳時為漢陽長史諫曰崔杼弒君慶父篡位齊魯非無文學今不急靜難之備云云邊不從奏行之果被詔責之輕裘緩帶羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衛不過數十人也孔不料天下安危事崔植與杜元穎不知兵謂藩鎮且平不復料天下安危事不數月朱克融亂復失河朔以精兵掩不備侯君集李靖討吐谷渾以君集為磧石道行軍總管師次鄯州議所向君集曰王師已至而賊不走險天贊我也若以精兵掩不備彼不我虞必有大利若遁峘山谷克之實難靖然其計簡鋭士約齎深入及其衆於庫山大戰破之毀垣而出王世充隋大業十年齊賊有孟讓者轉寇諸郡至于盱眙世充拒之世充數戰陽不利走壁讓益驕數日稍分其下南略裁留兵足圍壁世充知賊懈夜夷灶撤幕為方陳外向毀垣旦而出奮擊大破之賊不虞來楊恭仁瓜州刺史賀拔行威叛朝廷未即討恭仁募趫蕩倍道進賊不虞其來遂克二城乘無備擊不意劉仁軌時蘇定方伐高麗不克高宗詔仁軌拔軍就新羅與金法敏議去留計將士咸欲還仁軌曰今天子欲滅高麗未誅百濟留兵鎮守制其心腹雖孽豎跳梁上力未完宜厲兵粟馬乘無備擊不意百下百全戰勝之日開張形勢騰檄濟聲援接虜亡矣敕去盾鄣崔義玄陳碩真反義玄發兵自統衆繼之詰朝奮繫左右有以盾鄣者義玄曰刺史而有避耶敕去由是衆為用直搗其牙契苾何力吐谷渾主伏允在突淪川何力欲襲之薛萬均懲前敗以為不可何力曰賊無城郭遂薦草美水以為生不乘其不虞正恐鳥驚魚駭後無以窺其巢穴乃閲精騎千餘直搗其牙斬首數千級高仙芝討勃律李嗣業高仙芝討勃律署嗣業及中將田畛為左右陌刀將吐蕃兵十萬屯婆勒城據山瀕水聯木作郛以扼王師仙芝潛軍夜濟信圖河令曰及午破賊不者皆死嗣業提步士升山頽石四面以擊賊又樹大旗先走險請將從之虜不虞軍至因大潰投崖谷死者十八鼓而驅至勃律擒其主平之握節登陴李絳為山南西道節度使四年南蠻寇蜀道詔絳募兵千人往赴不半道蠻已去兵還監軍使楊叔元者素疾絳遣人迎說軍曰將收募直而還為民士皆怒乃譟而入劫庫兵絳方宴不設備遂握節登陴或言縋城可以免絳不從牙將王景延力戰歿絳遂遇害開門朱延壽昭宗在鳳翔詔延壽圍蔡以被全忠勢擢奉國軍節度使全忠兵每至延壽開門不設備而不敢逼也搗虛南蠻傳蔡京貶死崖州以桂管觀察使鄭愚代節度南詔攻交州進略安南蔡襲請救發湖荊桂兵五千屯雍州嶺南韋宙奏南詔必襲雍管不先防近而圖遠恐搗虛絶糧道且深入乃詔襲按軍海門詔鄭愚分兵禦之候其無備屈突通劉迦論反通發關中兵擊之次安定初不與戰軍中意其怯通陽言旋師而潛入上郡賊未之覺引而南去通士十里舍分兵徇地通候其無備夜簡精兵甲襲破之搗不備徐申進嶺南節度使劉闢反表請發卒五千循馬援故道繇爨蠻抵蜀搗闢不備詔可河乘虛搗賊張道源守趙州為竇建德所執會建德寇河南間遣人詣朝請乘虛搗賊心脅即詔諸將率兵影接俄而賊平出其不意五代高行周梁晉軍河上莊宗遣明宗東襲鄆州行周將前軍夜遇雨軍中皆欲止不進行周曰此天贊我也鄆人恃雨不備吾來宜出其不意即夜馳涉濟入其城鄆人方覺遂取之乘人之未備者莫若急攻范廷光明宗行幸汴州至滎陽朱守殷反廷光曰守殷反跡始見若緩之使得為計則城堅而難近故乘人之未備者莫若急攻臣請騎兵五百馳至城下以神速駭之乃以騎兵五百自暮疾馳至汴半夜行二百里戰于城下遲明明宗亦馳至汴兵望見天子乘輿乃開門而廷光先入猶卷戰殺傷甚衆守殷死汴州平五代史搗其空虛康延孝莊宗初聞延孝言梁必亡喜及聞其大舉也擢曰其將何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五千自鄆趨汴出其不意搗其空虛不旬日天下定矣莊宗甚壯其言後董璋等雖不出兵而梁兵悉屬段凝于河上京師無備莊宗卒用延孝策自鄆入汴凡八日而滅梁以功拜鄭州防禦使賜姓曰李不知兵所從來馬嗣勳天祐二年羅紹威將誅牙軍乞兵於梁梁女嫁魏適死太祖乃遣嗣勳以長直千人為綵輿入魏致兵器於輿中聲言助葬嗣勳館銅臺夜與魏新鄉鎮兵攻石柱門入迎給威家屬衛之乃益取魏甲兵攻牙軍牙軍可知兵所從來莫能為備殺其八千餘人遲明皆盡五代史敵心解弛贊皇品集賜王宰詔意韓信襲歷下之軍李靖翦陰山之虜皆因敵心解弛故得機計不遺宜選精兵掩其無備使呂嘉懷二而授首孟獲雖縱而必擒特立奇勳永光千古賜仲武詔掩其無備適見度支報狀王宰已似納其情款發使之時不光聞奏使受章表欲自擅招撫之功昔韓信破田榮李靖擒頡利皆是納降之後潛兵掩襲只令王宰失信豈得損朝廷武威建立奇功伏望降供奉官今日便赴行營自看進兵掩其無備兼許三軍重賞儻立殊功比類諸軍倍加賞賜贊皇一品集論劉稹狀潛移兵取黃澤路任畹李丕與臣狀兩道魏城路陳後被賊掘坑塹至深恐進兵不得古人云戰不勝則易城而處伏望詔義忠朝請潛移兵取黃澤路掩其不備贊皇一品制集披闔不設備羌怪之不敢進崔知溫遷蘭州刺史党項羌三萬人寇州兵寡衆懼莫知所出披闔不設備羌怪之不敢進俄會將軍權善才兵至破其衆視其陳無法指觀嗤笑哥舒翰敗將崔干祐為陳十十五五或卻或進以陌刀五千列陳後王師視其陳無法指觀嗤笑曰擒賊乃會食及戰乾祐旗少偃如欲遁者王師懈不為備伏忽起薄戰王師大潰兵機事以速為神李靖事見謀略門休祠房趨之崔光遠為京兆尹遣到渭北募僑民會賊黨剽涇陽休祠房椎牛呼飲光遠刺知之率兵夜趨其所使百騎彀滿阻其前命饒士合嗓賊醉不能師斬其徒二千得馬千噭過期若曰棄之李光弼判官韋損曰東都乃帝宅公當守之光弼曰汜水崿嶺盡為賊磎子能盡守乎遂檄河南縱官吏避賊閉無留人謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期何若曰棄之即給賊曰吾糧盡明日當降賊喜斂兵待期抱玉巳繕完即請戰賊忿欺急攻之抱玉出奇兵夾擊賊帥周摰引卻技雖窮於九攻志益專於三板逼陽懸布之巧汧城鑿穴之奇無傳燮之歎息有周苛之慷慨烈士抗詞痛臧洪之同日直臣致憤惜蔡恭於纍旬柳宗元南睢陽碑塞其飛走元稹代諭淮西書若聖天子推含垢之化圖不戰之功使環而守之塞其飛走則男不得耕女不得織鹽茗之路絶倉廩之積空不三數月求諸公於枯魚之賜矣城中糧盡以筒容米陳敬瑄傳王建為西州行營招討使圍凡三歲城中糧盡以筒容米率寸鬻錢二百梯衝外舞缶穴中偵鈴馬非艱析骸猶競柳文李晟收長安李晟自東渭橋移壁光泰門以薄都城連溝柵而賊將張庭芝李希倩求戰晟顧曰賊不出是吾憂也今乃冒死來天誘之矣勒吳詵等縱兵鏖擊賊攻華師急晟以精騎馳救中軍譟而從大破之乘勝入光泰門再戰敗郤彊尸相藉餘衆走白華賊大哭終夜不息翌日將復戰或請待西師晟曰賊既敗當乘機撲殄苛俟西軍是容其為計豈吾利邪乃悉軍軍光泰門使王佖李廣將騎史萬頃將步抵苑北晟先後隤苑垣為道二百步比兵至賊己伐木塞以拒戰晟叱諸將曰安得縱賊今先斬公矣萬頃先登拔柵以入佖督騎繼之賊崩潰執其將段誠諫大兵分道進雷噪震地殊死鬥晟令唐良臣等步騎奔突賊陳成輒北十餘遇皆不勝蹙入白華賊仗千餘出官軍背晟以麾下百騎自馳之左右呼曰相公來賊驚潰擒馘略盡泚率殘卒萬人西走田子奇追之餘黨悉降令分慰居人絲毫無所擾別將高明曜取賊妓一司馬胄取賊馬二即斬以徇坊人之遠者宿昔乃知王師之入也憚燧威拜城上馬燧度長春不下則懷光固守久攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧願其心已屈徐曰我自朝廷來可西嚮受命廷光再拜燧曰公等朔方士自祿山以來功高天下奈何棄之為族滅計若從吾言非止免禍富貴可遂也未對燧曰爾以吾為欺邪今不遠數步可射我披而示之心廷光感泣一軍皆流涕即率衆降燧以數騎入其城衆大呼曰吾等更為王人矣環汴為三十六柵梁本紀秦宗權稱帝陷陝洛懷孟唐許汝鄭州遣其將秦賢盧瑭張晊攻汴賢軍板橋晊軍陝瑭軍萬勝環汴為三十六柵王顧兵少不敢出乃遣朱珍募兵於東都而求救於鄆兗三年春珍得兵萬人馬數百四乃擊賢板橋拔其四柵又擊塘萬勝瑭敗投水死宗權聞瑭等敗乃自將精兵數千柵北郊五代史雲梯飛炮五代張敬達石敬瑭反即以敬達為太原四面詔討使六月兵圍太原敬達為長城連柵雲梯飛炮以攻之所為城柵將成輒有大風雨水暴至以壞之堅守百餘日五代王環初孟昶遣其秦州節度使高處儔代以兵援環未至聞堂倉兵敗亦潰歸處儔判官趙玼閉城不納處儔遂奔成都玼乃以城降成階二州相繼亦降獨環堅守百餘目然後克之城有不可守者大而人少小而衆多糧多而柴水不供壘薄而攻其不足土疏地下溉灌可潰邑闕人疲修緝未就凡若此類速徙之通典守拒法閉壁清野大梁都統李勉將大兵於大梁閉壁清野將誘其入境覆而取之朱泚賊衆集傅於城不築七山堞道以臨城又為層棚上以乾牛革為屋則居內雨射城中城中長兵徑弩皆所不及衆遂乘城而入勉不能抗擁衆宋州大梁遂陷幸奉天記太祖遣葛從周略地山東下洛州斬其刺史邢善益又下邢州走其刺史馬師素又下磁州殺其刺史袁奉陷五日而下三州五代白攻必取漢高祖曰連百萬之衆戰必勝攻必取吾不如韓信破堅摧剛攻無堅城以此攻城何城不克深溝高壘褁糧坐甲躬擐甲胄親授矢石必取之術堅守之心城若振槁晉釋宋圍能以德攻金湯之守金城湯池楚國方城以為城漢水以為池雖君之衆無所用之楚屈完謂齊桓公云云合圍十則戰漢書引兵法楚圍宋國易子而食折骸而爨雖然城下之盟有以國敝不能從華元卻子反謂之曰魯連作書繫書射城中燕將得書自殺完守入保拜井泉湧耿恭守疏勒寇戎來攻武守戎昭重圍同得原於重耳信由是明比剋敵於荀吳義然後取易曰乘其墉弗克攻吉同人卦凌城濟侯親鼓士凌城男女乘城而戰以爾鉤援與爾臨衝以伐崇墉臨衝車鉤援引上城者木攻國之兵短守國之兵長周禮因壘而降文王修德伐崇因壘而降晏弱圍萊甲寅堙之環城傳於堞堙土山堞女墻先登倍則攻敵則戰榖梁曰袁紹以土山地道襲魏太祖太祖以長塹拒之雲梯衝車諸葛亮攻郝照於陳倉以雲梯衝車臨城中照以火箭射之乃燒之梁麗莊子曰梁麗可以衝城不可以窒穴孫子曰善攻者敵不知所守陷堅摧剛楚子圍蔡里而裁城一里設版築也宋皇瑗圍鄭師每日遷舍作壘塹成輒徙合其圍也壘合鄭師哭遂取鄭也開一面吳志孫權征合肥久不拔張紘進計曰古之圍開一面以疑衆心今圍之密誠懼併命死戰也九攻九拒史墨翟宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶為城以堞為械九設攻城之機墨子九拒之公輸般攻械盡墨子守有餘公輸屈曰吾知所以拒我者吾不言楚王問之墨子曰公輸意過欲殺臣然臣弟子禽猾等三百人在宋楚乃不攻宋也龍韜潛運定拔幟之奇謀鳥陳臨高起沉砂之妙算縱敵生患違天不祥功振七略勇冠三軍孔乘城固守張孝忠為定滄觀察使朱滔遣說復啖以金帛皆不受易定介二鎮間乃浚溝壘修器械感厲將士乘城固守滔悉兵攻之帝詔李晟率師援滔乃解去遂全其軍城固士和康日知擢左武衛大將軍少事李惟嶽惟嶽叛日知與別駕及步將百人啐牲血共盟固州自歸惟嶽使王武俊攻之日知曰城固士和雖引歲未可下且賊所恃田悅耳悅兵血衊邢壕可浮不能殘半堞況吾城之完乎又給為臺檢示曰使者齎詔喻中丞中丞奈何負天子從小兒跳梁哉武俊引兵還斬惟嶽以獻非議事不下城陳利正李希烈叛詔哥舒翰討利正為前鋒希烈攻曜襄城利正登陴捍守七十日未嘗櫛沐非議事不下城以數隊出賊攻城設百機巡柵城上束芻灌膏以焚張巡令狐潮以四萬薄城人大恐巡諭諸將曰賦知城中虛實有輕我心今出不意可驚而潰也乘之勢必折乃分千人乘城以數隊出身前驅直薄潮軍軍卻明日賊攻城設百機巡柵城上東芻灌膏以焚焉賊不敢向畫攻守勢魯炅安祿山反拜上洛太守速行於帝前畫攻守勢遷南陽太守突圍同上賊將武令珣等擊之城中食盡米斗五十千一鼠四百餓者相枕藉炅被圍凡一年晝夜戰人至相食卒無救至德二載乃率衆突圍走襄陽李翰張巡功狀表上之曰賊盜神器鴟峙二京南臨漢江西逼岐雍群師列城望風出奔巡守孤城不為卻賊欲繞出巡後以擾江淮巡退軍睢陽厄東南咽領凡十餘萬賊不敢越睢陽城孤糧盡外救不至猶奮羸起病摧鋒陷堅三軍啖膚而食知死不叛城陷見執卒無撓詞慢叱凶徒精貫白日環壘刳塹灌以流潦吳武陵吳元濟叛武陵遺以書昏迷不返諸侯之師集城下環壘刳塹灌以流潦主將怨攜士卒崩離元濟不悟嚴兵締壘薛收王世充據東京竇建德來援收曰建德身總衆以來必飛轂轉糧更相資哺兩賊連固則伊洛之勝負未可歲月定也不若勤諸將嚴兵締壘浚其溝防戒毋出兵二賊可縛致麾下矣為地道崔寧為漢州刺史吐蕃破拓靜等州有詔收復嚴武遣寧將而西既薄賊城城皆纍石不得攻惟東南不合者文許謀知之乃為地道再宿而拔拓地數百里虜衆驚相謂曰寧神兵也齊攻四面儻或神算風驅天威電擊使齊攻四面各裂一隅彼若聚而待之則自窮分而應之則不足東抗則西入南備則北侵腹背受攻首尾皆畏赤族之刑既迫輿觀之計方施則固難期於曩之宥免矣撞車機石竇建德引兵討化及連戰破之化及保聊城乃縱撞車機石四面乘城拔之固守二年李襲志仕隋始安郡丞大業末盜賊起襲志傾私産募士得三千人乘城拒盜蕭銑林士弘屢玫之不下遂固守凡二年侯君集討高昌拔其城見兵車門驅民保城狄仁傑為魏州刺史前刺史懼賊至驅民保城修守具仁傑至曰賊在遠何自疲民萬一虜來吾自辨之何預若輩悉縱就田虜聞亦引去首鼠莫前陸贄李希烈寇襄城詔問策安出贄言李勉文吏也而當汴必爭地哥舒翰之衆烏合也扞襄城萬鋭之賊本非素習首鼠莫前則守禦失於不足也完濬城隍杜慆咸通中為泗州刺史會龐勛反圍城處士辛讜自廣陵來見慆勸出家屬獨以身守慆曰吾出百口求生衆心搖矣不如與將士先死共之衆聞皆泣下慆之聞難完濬城隍閲器械無不臭圍凡十月勛纍攻不得志會招討使馬舉率兵至遂解去圍凡十月飛棚聯柵劉昌裔曲環方攻濮州表為判官環領陳許軍又從府遷纍進營田副使環卒上官涗知後務吳少誠引兵薄城涗欲遁去昌裔比曰受詔而守死其職也況士馬完奮足支賊若堅壁不戰七日賊衆必衰我以全制之可也涗許諸賊攻堞壞不得修昌裔密造飛柵聯柵即募突將千人鑿城以出擊賊走之比還柵已立守陴遂安握塹以遏地道劉昌李希烈取汴江淮大震昌以兵三千守寧陵希烈衆五萬攻之昌掘塹以遏地道相拒凡四十餘日賊數敗乃解圍去引漳水灌城郭子儀連營進圍相州引漳水灌城漫一時不能破賊中糧盡人相食全十五城元結史思明亂因命發宛葉軍挫賊南鋒結屯泌陽守險全十五城帝狩奉天渾瑊帝狩奉天瑊率家人子弟以從授行在都虞候京畿渭北節度使朱泚兵薄城戰譙門晨至日中不解或以芻車至瑊曳軍塞門焚以戰賊乃解泚治攻具矢石四集如雨晝夜不息凡浹日鑿塹園城城中死者可藉人心危惴或夜縋出掇蔬本供御帝與瑊相泣朱泚方據乾陵造雲梁廣數十丈施火輪濡氈及革冒之周布水囊為陳指城東北上木廬蒙革周置之運薪創其下將塞隍帝詔瑊受以詔書干餘自御史大夫實封五百戶瑊俯伏嗚咽帝撫而遣之以死拒守趙隱祖植當德宗出狩變倉卒羽衛單寡朱泚攻城急植率家人奴客以死拒守固壘二歲樵蘇皆盡張環固壘二歲樵蘇皆盡米斗錢四十千計杯而食號為通腸疫死者爭啖其尸縣首千戶以備饌軍中甲鼓無遺夜擊門為警秦宗權不能守乃解去嬰城自守王重榮黃巢陷長安分兵略蒲節度使李都不能支乃臣賊然內憚重榮表以自副地邇京師賊調取橫數使者至重輩坐傳舍益發兵吏不堪命重榮脅說都曰我所詭謀紓難以外援未至今賊衰青日急又收吾兵以困我則亡無日矣請絶橋嬰城自守不然變生何以制之都曰吾兵寡謀不足絶之禍且至願以節假公遂奔行在收殘卒嬰城朱宣中和初魏博韓簡東窺曹鄆引兵濟河曹存實迎戰死于陳宣收殘卒嬰城簡圍之六月不能拔引去僖宗嘉其守拜宣天平節度使增堞深溝全忠之攻宣凡十興師四敗績宣才將皆盡益內沮度不能與全忠確則固守增堞深溝為不可逼繚長壕五周百道攻之趙犨黃巢入長安所在盜興陳人詣節度府請犨為刺史表于朝授之既視事會屬計曰巢若不死長安必東出關陳其衝也乃培城疏塹實倉庫峙槁薪為守計民有資者悉內之繕甲兵募悍勇悉補子弟領兵巢敗果東奔將孟楷以萬人寇項犨擊擒之僖宗嘉其功遷檢校司空巢聞楷死驚且怒悉軍據溵水與秦宗擢合兵數十萬繚長壕五周百道攻之犨引鋭士出戰屢破賊巢怒將必屠之宗權輸鎧仗軍須賊益張犨小大數百戰勝負相當故人心固乃間道乞師於朱全忠未幾汴軍至壁西北陳人思奮犨引兵急擊賊破之圍凡三百日而解雉堞崩剝呂子臧武德初朱粲新衄子臧率兵與馬元規并力元規軍不進子臧曰乘賊新敗上下惶沮一戰可擒若遷延其衆稍集吾食盡致死於我不可當也不納子臧請以所部兵獨進又不許俄而粲得衆復張元規嬰城子臧振腕曰謀不見用坐公死矣賊圍固會霖雨雉堞崩剝或勸其降子臧曰我天子方伯且降賊乎乃率麾下數百人赴敵死城亦陷手板畫地陳攻守計賈循從子隱林德宗引至臥內以手板畫地陳攻守計雲衝傅堞張巡安祿山反嗣吳王祗受詔合河南兵拒祿山乃舉兗以東委巡經略賊還七月復圍城以雲衝傅堞巡出鉤于枉之使不得進篝火焚梯賊以鉤車木馬進巡輒破碎之賊服其機不復攻穿壕立柵以守增備固守程千里遷上黨長吏賊將蔡希德圍上黨為賊執仰首敕諸騎使還曰為我報諸將可失帥不可失城軍中皆為泣下增備固守賊不能下乃還傅城百里樹木皆刊龐堅安祿山反南陽節度使魯炅表堅為長史兼防禦副使以薛願為潁川太守共守潁川時陳留滎陽已陷賊南陽被圍而潁川當往來衝賊將何史那承慶悉鋭攻之傅城百里樹木皆刊城中士單寡糧少而願堅晝夜戰諸郡兵無援者自正月盡十一月賊設木鵝衝車飛梯薄城矢如雨賊皆雷噪夜半踰城入悉完一州辛讜龐勛反攻杜慆於泗州讜合淮南兵入城上歡叫慆與下迎泣表其功于朝授監察御史圍凡十月乃解悉完一州徹民鄣落為蓬籠南蠻傳盧耽部將李自孝者與刺史喻士殄善士珍臣蠻自孝陰與賊通蠻攻城自孝守陴樹麾以自表麾所指蠻輒攻之為下所覺耽殺自孝以徇城左有民樓肆蠻俯射城中耽募勇士燒之器械俱盡二月蠻以雲梁鵝車四面攻上叫呼鵝車未至陴者以巨索鉤繫投膏炬車焚箱間蠻率盡死耽遣李璹張察率突將戰城下俘斬二千級蠻徹民鄣落為蓬籠如車軬下設枕木推而前不及城丈匿蠻其內以穴墉楊忞以罌貯糞瀋沃蠻蠻不能處注以鐵液蓬籠皆火然南詔負衆益治器械斧兵晝夜有聲將擊錦樓衆失色耽遣將出三面皆戰蠻引郤蠻利夜晦輒薄城聞呼嘯衆齊奮城上施鐵籠千炬賊來不得隱屯夫終夜哄蠻不能侵為擂石車李光弼入太原至德二載思明希德率高秀巖牛廷玠將兵十萬攻光弼時鋭兵悉赴朔方而麾下卒不免萬衆議培城以守光弼曰城環四十里賊至治之徒疲吾人乃徹民屋為擂石車車二百人挽之石所及輒數十人死賊傷十一植小旗城東北隅望周摯軍荔非元禮李光弼使元禮守羊馬城植小旗城東北隅望周摯軍摯持衆直逼城以車千乘載木鵝撞車麾兵填塹數八道並進光弼論元禮曰中丞視賊過兵不顧何也報曰公欲守邪戰歟光弼曰戰曰萬戰賊為我實塹復何怪光弼曰吾慮不及此公勉之元禮遂出戰造雲旝三百具李密造雲旝三百具以機發石為攻城械號將軍炮進逼東都坎墉先登李訴至懸瓠城賊持吳房朗山戍晏然無知者李祐等坎墉先登衆從之以羸兵守危堞張巡令狐潮語巡曰足下以羸兵守危堞忠無所立見忠義門守睢陽巡亡議者或謂巡始守睢陽衆六萬既糧盡不持蒲按隊出再生之路與夫食人寧若全人飛鳥不敢過辛讜龐勛反攻杜慆於泗州讜聞之拏舟趨泗口貫賊柵以入慆喜曰圍急飛鳥不敢過君乃冒曰刃入危城古人所不能乃勸解白衣被甲南蠻傳黎州陷人走匿山谷蠻掠金帛不勝負入自邛峽關圍雅州遂擊邛州是冬竇滂棄州壁導江儲資峙械皆亡矣按甲不出蕭穎士走山南節度使源洧辟掌書記賊別校攻南陽洧懼欲退保江陵穎士說曰官兵守滻關財用急必待江淮轉餉乃足餉道由漢沔則襄陽乃今天下喉襟一日不守則大事去矣日列郡數千人百萬訓兵衰寇社稷之功也賊方專崤陝公何以遽輕土地欲取笑天下乎洧乃按甲不出亦會祿山死賊解去攻之百端王彥章世宗攻壽州圍之數重以方舟載炮自淝河中流擊其城又束巨竹數十萬竿土施版屋號為竹龍載甲土以攻之又決其水寨入于淝河攻之百端自正月至于四月不能下踰年不可下張源德守貝州晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽晉軍攻破洛州而衛州刺史來昭邢州節度使閻寶皆以城降晉磁州刺史靳昭相州張筠滄州戴思遠皆棄城走當此時晉已先下全燕而鎮定皆附于晉自河以北山以東四面千里六鎮數十州之地皆歸晉獨貝一州圍之踰年不可干五代史穹廬連屬如岡阜張敬逵契丹兵圍敬逵也自晉安寨南長百餘里闊五千里敬逵軍中望之但見穹廬連屬如岡阜四面亙以毛索掛鈴為警縱犬往來敬逵軍中有夜出者輒為契舟所得由是閉壁不敢復出延壽等皆有二心無救敬逵意敬逵猶有兵五萬人馬萬匹久之食盡削木篩糞以飼其馬馬死者食之已而馬盡副招討使楊光遠勸敬逵降晉敬逵自以不忍背唐五代史當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳韓文掩其不虞賀魯敗降步真蘇定方命嗣業追虜會大雪軍中請須霽定方曰今氛晦風列虜謂我不能師掩其不虞可也緩則遠矣省日兼功上策也於是晝夜進收所過人畜至雙河與彌射步真會軍飽氣張距賀魯牙二百里陳而行祗金牙山賀魯衆適獵定方兵縱破其牙俘數萬人裴行儉擢纍安西都護詔行儉送波斯王旦為安撫大食使至西州諸蕃郊迎行儉召豪傑千餘人自隨揚言大熱未可以進宜軴軍須秋都支覘知之不設備行儉徐召四鎮酋長僞約畋謂曰吾念此樂未紿忘孰能從吾獵者於是子弟願從者萬人乃陰勒部伍數日倍道而進去都支帳十餘里先遣其所親問安否外若間暇非討襲者又使人趣召都支都支本與遮匐計及秋拒使者已而聞至倉卒不知所出率子弟五百餘人詣營謁遂擒之是日傳契箭召諸部酋長悉來請命並執送碎葉城簡精騎約齎襲遮匐道獲遮匐使者釋之俾前往諭其王并言都支巳擒狀遮匐乃降悉俘至京師將吏為刻石碎葉城以紀功不意兵之至梁本紀秦宗權柵北郊王置酒軍中中席王陽起如廁以輕兵出北門襲張晊晊不意兵之至也兗鄆之兵又從而合擊遂大敗之不為備梁臣朱珍太祖遣珍以兵趨滑州道遇大雪珍趨兵疾馳一夕至城下遂乘其城義成軍以為方雪不意梁兵來不為備遂下之掩其不備丁會梁軍在魏乃遣會及葛從周等將萬人救之會等行至河陰謀曰罕之料吾不敢渡九鼎以吾兵少而來遠且不虞吾之速至也出其不意掩其不備者兵家之勝策也乃渡九鼎直趨河陽戰于沇水罕之大敗河陽圍解逆風而戰張彥澤天大風契丹揚塵奮擊甚鋭軍中大懼彥澤以問諸將諸將皆曰今虜乘土風而吾居其下宜待風回乃可戰彥澤以為然諸將皆去偏將藥元福獨留謂彥澤曰今軍中饑渴已甚若待風回吾屬為虜矣且逆風而戰敵人謂我必不能所謂出其不意彥澤即拔拒馬力戰契丹奔北二十餘里追至衛村又大敗之契丹遁去至青岡峽遇雪康福登山望見川谷中煙火有吐蕃數千帳不覺福之至福分其兵為三道出其不意襲之吐蕃大駭棄車帳而走殺之如盡獲其玉璞綾錦羊馬甚衆由是威聲大振貞觀中突厥諸部離叛朝廷將圖進取以李靖率驍騎三千自馬邑出其不意突利不虞於靖見官軍掩至曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊破之通典賊醉不能師崔光遠拜御史大夫復為京兆尹遣到渭北募僑民會賊黨剽涇陽休祠房椎牛呼飲光遠刺知之率兵夜趨其所使百騎彀滿狙其前命驍士合譟賊醉不能師斬其徒二千得馬千噭俘酋長以獻自是賊常避其鋒拜西川節度使建中中西山兵馬使張朏襲成都為亂延賞奔鹿頭戍朏醋亂不設備延賞謀知之遣將叱于遂捕斬朏復成都張延賞傳貞觀中吐谷渾寇邊以李靖侯君集任城王宗道五總管征之軍次伏埃城吐谷渾燒去野草以餒我師退保大非川諸將咸言春草未生馬已羸瘦不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數合殺傷甚衆大破其國通典兵八出不意火攻四白公羊焚咸丘火攻也疾始火攻征伐之道不過用兵水火之威疾其暴而不仁也縱火救火漢李陵循龍城于四五日抵大澤葭葦中虜上風縱火陵中中亦縱火自救注自燒營旁草令虜火不及也析松為炬孫權攻合肥新城滿寵募壯士數十人析松尋炬灌麻油從上風放火燒賊攻具殺權弟子權遂退兵燒舟船吳志周瑜救劉備與曹公遇赤壁瑜部將黃蓋曰操軍方連船舟首尾相接可燒而走乃取蒙衝鬥艦數十艘實以薪草膏灌其中裏以帷幕欺以欲降豫備走舸各繫火船吏士延頸盡放火諸船同時火發風猛延燒岸上營人馬燒溺軍遂退敗也執燧象以奔吳師楚昭王也繫火燧於象尾火發象奔觸吳師燒浮橋岑彭伐公孫述事見水戰門攻即墨田單燒牛事孔推火車焚柵自晨訖晡馬燧遷兵部尚書初田悅新有魏傳悅反圍邢州使火將楊朝光以兵萬人據雙岡築東西二柵以禦燧燧率軍營二壘間是夜東壘遁燧令大將李自良等以騎兵守雙岡戒曰令悅得過者斬燧乃推火車焚朝光柵自晨訖晡爭擊大破斬朝光焚賊渾瑊朱泚方據乾陵造雲梁廣數十丈施大輪濡氈及革冒之周布水囊為障指城東北創木廬蒙革周置之運薪土其下將塞隍帝召瑊授以詔書千餘自御史大夫實封五百戶瑊俯伏嗚咽帝撫而遣之瑊前與防城使侯仲莊揣雲梁所道掘大隧積馬矢及薪燃之賊乘風推梁以進雲梁及隧而啖風返悉焚賊皆死舉城歡火棚皆燼韓游環進邠寧節度留後朱泚大治戰棚雲橋士皆懼游環曰賊取佛祠乾木為攻具可以火之既而賊大譟攻南雉游環曰是分吾力也趨北雉遣郭詢以鋭士三百傳蒲直出火其棚投薪于中風返皆燼賊氣沮故諸將推游環赴難功第一乘風縱火伊謹路嗣恭討哥舒晃以謹為先鋒下詔州戰把江口水湍駃乃為桴置薪焉乘風縱火賊焚且溺不可計與諸將追斬晃縛炬于樹遍山澤王雄誕與李子通戰蘇州卻之子通以精兵保獨松嶺雄誕遣將陳當率千兵出不意乘高蔽崦張尸幟縛炬于樹遍山澤子通懼燒營遁追擒之風順荻乾李敬業反武后遣大將李孝逸兵三十萬往擊之屯高郵監軍魏真宰曰賊其敗乎風順荻乾火攻之利也固請戰遂渡溪擊之敬業署陳久士疲皆顧望不正列孝逸乘風縱火逼其軍軍稍卻敬業業乃敗焚其攻具李密宇文化及擁兵十餘萬至黎陽密與隔水陳化及瞋目為鄙語辱密密顧左右曰此庸人圖為帝吾當折箠驅之乃以輕騎五百焚其攻具火終夜不滅縱火焚三十餘屯秦叔寶從通守張須陀擊賊盧明月須陀委營遁明月悉兵追躡叔寶等馳叩賊營門閉不得入乃升樓拔賊旗幟殺數十人營中亂即斬關納外兵縱火焚三十餘屯乘風火之王雄誕輔公祐擊李子通以雄誕稜為副戰漂水子通敗公祐乘勝追之反為所擠士皆走壁雄誕曰子通狃于勝無營壘今急擊之必克公祐不從雄誕獨提私卒數百銜枚夜往乘風火之子通大敗走度太湖杜咸牂柯反咸監軍出討賊保壘目固道荒漫師不能進咸乃息士示不欲戰陰伺之時旱暑風熾咸縱火譟而前賊眩怖相失自騰踐死擒其酋遂平之焚四百艘劉仁軌孫仁師帥陸軍以進仁軌與杜爽扶餘隆繇熊津白江會之遇倭人白江口四戰焚四百艘海水為丹焚橋馬燧由悅反燧進營倉戰與悅走洹而軍造三橋逾洹日挑戰悅不出陰伏萬人將以掩燧燧令諸軍夜半食先雞鳴時鳴鼓角而潛師並洹趨魏州令曰聞賊至止為陳留百騎持火待軍畢發匿其旁須悅衆度即焚橋燧行十餘里悅率李納等兵踰橋乘風縱火譟而前燧乃令士無動命除榛莽廣百步為場募勇士五千人陳而待日悅至火止氣少衰燧縱兵擊之悅敗走橋已焚衆赴水死者不可計斬首三萬級殺賊將孫晉卿安墨啜虜三千人尸相駘藉三十里淄青兵幾殲悅夜走魏州熛薰漲天朱宣全忠遣龐師古攻齊州宣瑾皆戍以兵久不下乾寧元年全忠身往薄情河結壘宣瑾三分其兵出擊之全忠迎戰東阿南風急汴軍居下甚懼俄而風返全忠得縱火焚其旁熛薰漲天宣等大北焚營張孝忠田承嗣見其軍整嚴焚營去縱火大呼史建瑭梁軍已破棗彊存審扼下博橋建瑭分其麾下五百騎為五隊一之衡水一之南宮一之信都一之阜城而自將其一各取梁芻牧者十人會下博至暮擒梁兵數十皆殺之各留其一人縱使逸走告之曰晉王軍日大至明日建瑭率百騎為梁旗識雜其芻牧者夜叩梁營斬其守門卒縱火大呼斬擊數十百人梁太祖夜拔營去五代史縱火焚梁艦王建及梁將賀環攻南城以竹笮維戰艦于河晉兵不得渡南城危甚莊宗積金帛於軍門募能破梁戰艦者至於吐火焚況莫不皆有建及重鎧執梢呼曰梁晉一水間耳何必巧為吾今破之矣即以大甕積薪自上流縱火焚梁艦建及以二舟載甲士隨之斧其竹笮梁兵皆走晉軍乃得渡救南城環解圍去凡火攻皆因天時燥旱營舍茅竹積芻穗糧軍營於秸草宿莽之中因風而焚之通典注追奔五白宣子曰逐寇如追奔軍之善政彼竭我盈晉敗齊師于安革逐之三周華不注華不注山名也援再衰之旆晉人奔以廣重不能進楚人惎之脫局拔旆投衡顧曰吾不如大國之數奔也惎教也前徒倒戈攻于後以北斬將搴旗追奔逐北逐倒戈之徒乘破竹之勢勿佚佚獲逐利追奔奔困獸猶鬥窮寇勿逐緩追逸賊窮寇緩之則走急則致死趙充國引兵至先零先零望見大軍棄輜重渡湟水道進充國徐行驅之或曰逐利行大遲充國曰窮寇緩之則走急則致死戰不逐奔榖梁曰孔乘勝入泰門李晟為招討使賊將張庭芝求戰晟顧曰賊不出是吾憂也今乃冒死來天誘之矣勒吳詵等縱兵鏖擊賊攻華師急晟精騎馳救中軍譟而從大破之乘勝入光泰門再戰敗郤僵尸相藉餘衆走白華賊大哭終夜不息古善戰弗逆奔崔知溫遷蘭州刺史党項羌入寇會將軍權善才率兵至大破復其衆善才欲窮追取之知溫曰古善戰弗逆奔且溪谷深草木荒延萬分一有變不可悔善才曰善追敗李光弼賊別將攻好畤破大橫關光弼追敗之李靖兵法曰諸戰鋭等隊打賊敗其駐隊隊別量抽驍健二十人逐北其輜重隊遙叫作聲援不得輒動跳蕩隊奇兵隊趁賊退不得過百步如審知賊徒敗散仍須取機追逐通典敵退追奔契丹自中國多故強於北方中國遭契丹者未嘗少得志自晏球擊敗禿餒又走愓隱其餘衆耳遺投村落村落之人以鋤擾白挺所在擊殺之無復遺類王晏球白荀攸魏太祖聞荀攸名與語大悅曰公達非常人吾得之計事以為軍師也諸葛亮為中郎將成都軍師辛毗魏與諸葛亮僑軍利在急戰每令恃重遣骨鯁臣辛毗伏節為軍師以制之當塗得志有軍師祭酒晉書與服志田忌為孫臏軍師居輜重車中軍師六孔李敬業以魏思溫為軍師李敬業開三府自稱匡復府上將領楊州大都督以前盩厔尉魏思溫為軍師取為謀主張璿劉季述亂璿徒步入洛泣喻張全義并致書諸藩請謀王室之難王師範起兵州欲取璿為謀主不克本白假言神助史記燕圍即墨田單令城中必祭先祖於延蜚鳥下食燕軍怪之單宣言神來助今日當有神人為我師有卒入曰臣可為師乎單東向師事之卒曰臣欺君誠無能單曰勿言出入必稱神祠子産劉聰討李矩矩詐降夜襲之矩兵有懼色矩令祠了子産揚言神兵助掩賊營大獲鎧馬祈鍾山神晉符堅載記曰堅入寇望見王師部陳齊整又八公山上草木皆類人形撫然有懼色初會稽王道子聞堅入寇以威儀鼓吹求助於鍾山神奉以相國之號及望所見若有力焉秦伯以璧祈戰于河傳奉太一旗見旌旗門太一注求神不設備王氏世事張氏五斗米道凝之尤甚為會稽內史孫恩攻郡疑之不設備入淨室請禱語諸將佐曰大道許鬼兵相助遂為恩所害渡河冰合後漢王霸元伯從世祖南號聞王郎兵在後從者皆恐至呼沱河候吏還白河水流澌無船可濟衆大懼使電視之霸欲且安衆令至遂跪曰冰堅可渡遂並比至河冰果合遂獲渡世祖悅霸謝曰神靈之祐也孔妄言有神呼野中康承訓詔黔中觀察使秦正謀討賊下招義鍾離定遠龐勛遣吳迥屯北津援濠士舉銑兵渡淮盡碎其營初勛之遁懼衆不軍妄言有神呼野中曰天符下國兵休勛使下相語符未降故敗北津方渠青蛇楊朝晟為邠寧節度使次方渠水乏有青蛇降險下走視其跡水從而流朝晟使築防環之遂為停淵士飲仰足圖其事以聞有詔置祠命泉曰應聖遇雪誓神俄而和霽王晙進并州都督長史突厥默啜叛敕晙將并州兵濟河以討晙裴行卷甲捨幕趨山谷夜遇雪恐失期誓於神曰晙事君不以忠不討有罪天所殛者殛自蒙罰士衆無罪心誠忠而天鑒之則止雪反風以獎成功俄而和霽時叛胡分二道走晙自東道追及之獲級三千殺牲祭川高仙芝吐蕃自仁琬以來三討之皆無功天寶六載詔仙芝以步騎一萬出討仙芝乃分軍為三使疏勒趙崇毗自北谷道撥換賈崇瓘自赤佛道仙芝與監軍邊令誠目護密俱入約會連雲堡堡有兵千餘城南因山為柵兵九十守之城下據婆勒川會川漲不得度仙芝殺牲祭川命士人齎三日糒集水涯士不甚信既涉旗不霑鞭不濡兵已成列仙芝喜告令誠曰嚮吾方涉賊擊我我無類矣今既濟而陳天以賊賜我也遂登山挑戰日未中破之拔其城聞廟廷甲馬號令之聲壬午命統軍使張筠趙承泰等率水陸三萬人以救無諸是行也宿衣錦軍武肅王廟廷有聞甲馬號令之聲凡數夕而止及接戰干閩淮人視我師周遍郊野皆丈餘蓋陰兵之助也出吳越備史黑風忽起張曲江賀昭陵狀妖賊張志誠見昭陵山上黑風忽起直衝行首莫不昏迷及至慓橋之際並即散走又父老云往年權梁山之徒將遲不軌當時亦有烈風暴雨發自昭陵彼至京城賊還破滅風礫晝冥導者迷裴行儉為安撫大食使徑莫賀延磧風礫晝冥導者迷將士饑乏行儉止營致祭令曰水泉非遠衆少安俄而雲徹風恬行數百步水草豐美後來者莫識其處衆皆驚以方漢二師將軍明日母大郎死唐神堯拜河東節度使九月領大使擊龍門賊母端兒夜過寒津口時明月方出白露初澄於小橋下有二人語言明日母大郎死我輩勤亦不少矣神堯因駐馬問二人再拜起泣言某二人漢兵也昨奉東嶽命兵神管押七十人付龍門助將軍討賊某二人埋骨在此因少憩亦自感傷亦欲先報於將軍耳神堯訝其言深切詢其姓氏俱笑言將軍貴人斯某僕卒之賤分不當逾言訖蒼惶去云大隊至矣倏忽不見頃疾風如過矢風煙蔽天而過神堯默喜明日破賊發七十三矢皆中而復得其矢信乎聖王所何至靈亦先為佐佑馬柳宗元龍城録信安王禕討奚於幽州告捷且言戰時士咸見晙與部將高昭麾兵赴敵天子嗟異陽伯成上疏請封晙墓表異之乃遣致祭晙王晙傳白牙中梟鳥晉謝艾討麻秋梟鳴牙中艾曰梟激也六博得梟者勝果破麻秋梁上鷹集王敦及虞談於本縣得宋人大姓數萬赴國難有野鷹集屋梁衆大懼談曰起大義而鷹鷙之鳥來集破賊必矣晉伐齊師曠曰烏鳥之聲樂齊師其遁矣此鳥得空城故樂傳孔烏噪營李敬業反武后遣大將軍李孝逸兵三十萬往擊之屯高郵孝逸後軍蘇孝祥率奇兵夜度擊敬業孝祥死孝逸退守石梁有烏群噪敬業營上監軍御史魏真宰曰賊其敗乎風順荻乾火攻之利也固請戰遂度溪擊之敬業置陳久士疲皆顧望不正列孝逸乘風縱火逼其軍軍稍卻敬業乃敗雲出軍上白免舞吐蕃列傳蕭炅為河西節度留後明年吐蕃攻白草安人軍詔臨洮朔方分援虜絶臨洮道白水軍使高東于拒守虜引去炅遣將追尾有雲出軍上白兔舞大破吐蕃黑氣狀如鬥雞符存審劉鄩攻同州存審與李嗣昭救之居旬日望氣者言有黑氣狀如鬥雞存審曰可以一戰矣乃進軍擊鄩大敗之五代史王方翼次葛水暴漲沈祭以禱師涉而濟又次葉河無舟而冰昔合時以為祥王方翼傳占候九白周禮太師執同律以聽軍聲而詔吉凶王者出軍太師吹律合音師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功歌者吹律以詠八風南風音微故曰不競占夢搏晉楚戰城濮晉文夢與楚子搏楚子伏己而盬其腦子犯曰吉我得天楚伏其罪吾其柔之矣注晉候面向上故得天腦所以柔物也陳天時蜀先主東征秦密陳天時必無利坐下獄後貰出之知有走氣吳志吳範治曆知風氣孫權襲關羽羽請降範曰有走氣言降詐也候者白羽去範曰雖去不免期明日之中權立表下漏待之有風動範撫手曰羽至矣皆如言也傳曰楚師陳不違晦陰盡之日兵家所忌六甲窮日鄧禹仲華為王匡所敗明日癸亥匡以六甲窮日不出禹因得更治兵大破之孤虛後漢趙彥少有術朝廷令宗資討太山殘賊彥為資陳孤虛之法以賊屯在莒莒五陽之地宜發五陽郡兵從孤擊虛一戰破之又段潁為羌所圍樊志張亦在圍中夜謂潁曰東南角無復羌宜乘虛引出住百里還攻之可勝從之果破之孔熒惑守歲李晟始晟屯渭橋也熒惑歲久乃退府中皆賀曰熒惑退國家之利用兵者昌晟曰天子暴露人臣當力死勤難安知天道邪至是乃曰前士大夫勸晟出兵非敢拒也且人可用而不可使之知也夫惟五緯盈縮不常晟懼復守歲則我軍不戰自屈矣皆曰非所及也雲狀如樹馮智戴帝聞其善用兵指雲問曰下有賊今可擊乎對曰雲狀如樹方辰在金金利木柔擊之勝帝奇其對黃氣出西北吳武陵吳元濟未破數月武陵自硤石望東南氣如旗鼓矛盾皆顛倒橫斜少選黃氣出西北盤蜿相交武陵告司馬韓愈曰今西北王師所在氣黃白喜象也敗氣為賊日直木舉其盈數不閲六十日賊必亡夫天見其祥宜修事應之兵可憂矣梁臣王景仁開平四年為北面招討使伐趙進營於柏鄉乾化五年正月庚寅日有食之崇政使敬翔白太祖曰兵可憂矣太祖為之旰食是日景仁及晉人戰大敗於柏鄉景仁歸望雲物李元亮貞元三年吐蕃請盟詔以軍從渾瑊會平涼元諒軍潘原游環軍洛口以為援既會元諒望雲物曰不祥虜必有變傳令約部伍出陳俄而虜劫盟瑊奔還元諒兵成列出氣若城王世充十四年世充引軍與密戰洛南有氣若城壓其營世充大敗衆幾盡李靖贊世言靖精風角鳥占雲祲孤虛之說為善用兵是大不然特以臨機果料敵明根于忠智而已星墜賊營崔義玄睦州女子陳碩真反義玄發兵而自統衆繼之有星墜賊營義玄曰賊必亡沒唐石王重榮傳帝幸定州次莎城百官繼至士民從者亦數萬帝欲入谷中自固以谷有沒唐石惡之徙石門考蓍龜責將師牛徽帝召徽曰今伐茂貞彼衆烏合取必萬全卿計何日有捷對曰臣職諫爭所言者軍國大體如索賊平之期願陛下考蓍龜責將師非臣職也既而師果敗每用征伐問無不中馬重績少學數術明太一五紀八像三統大曆居于太原唐莊宗鎮太原每用征伐必以問之重績所言無不中拜大理司直歲不利用兵郭崇韜因問司天司天官歲不利用兵崇韜曰古者命將鑿凶門而出況成算已決區區常談豈足信也五代福星煥耀正臨天駟贊皇一品集賜王宰詔意卿宜忠憤必在梟夷況自去年以來月頻奄畢今又福星煥耀正臨天駟東漢書云畢為天網網羅不善之人房為明堂方集重華之慶懸象昭晢前史所書今朕奉天道以行誅鼉集城門見妖怪門城中氣死鼓不能聲破亡兆也薛萬均攻梁師都也圍師都諸將以城險未可下萬均曰城中氣死鼓不能聲破亡兆也軍行險道十白榖梁齊桓越千里之險北伐山戎束馬懸車越太行齊桓公推石布土後漢王霸治飛狐道推石布土築亭障自代至平城三百里鑿山開道魏鄧艾自陰平道行無人之地七百餘里鑿山通道造作僑閣山高谷深糧運將匱頓於危珍艾以氈自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油古之為軍不以阻隘薄人於險斥山澤之險失道李廣引兵與大將軍出東道亡失道後大將軍使持糟醪問失道將廣自殺五將失道李陵獨遇戰導軍張騫以嘗使大夏留胸奴中久從大將軍征導軍知善水草處得無饑渴壺頭之近馬援討五溪蠻有兩道從充則塗夷而遠從壺頭路近而水險援以充道棄日費糧不如進壺扼其咽喉充賊自破遂進壺頭賊乘高守隘船不得進道惡武帝貴楊僕曰失期內顧以道惡為解孔扼衝魯炅拜襄鄧十州節度初賊欲剽亂江湖願炅適扼其衝故南夏以存策勳封岐國公迫險非便李光弼僕固懷恩娼媢光弼功陰佐朝恩陳掃除計使者來督戰弼使傳山陳懷恩曰我用騎今迫險非便地請陳諸原光弼曰有險可以勝可以敗陳于原敗斯殲矣且賊至死于我不如阻險懷恩不從賊據高原以長戟七百壯土執刀隨之委物僞遁懷恩軍爭剽伏兵發官軍大潰南塞要衝鳳翔節度使李楚琳殺張鎰得位雖數貢奉議者頗言其挾兩端有所狙伺贄諫曰勤王之師在畿內者急宣亟告景刻不可差商嶺既回遠而駱谷又為賊所扼通王命者惟褒邪爾若復阻則諸鎮之向背者我勝則來賊勝遂往此焉幾會不容差跌使楚琳逞憾敢為猖狂南塞要衝東與賊合則我咽喉梗而心膂分矣豈不病哉今顧望兩端是乃天誘其衷通歸塗濟大業也帝釋然優詔勞安之陸贄路隘步騎魚貫而前李嗣業高仙芝討勃律署為左右陌刀將從平石國馳守白石路既隘步騎魚貫而前緩伐十一白書曰天惟五年須暇湯之子孫冀改悔也詩曰於鑠王師遵養時晦晦昧也言養之待昏昧而伐之觀釁而動見可而進持重縱之使盈其罪逗遛不進逗撓逗遛而致撓敗也孔待其氣衰乃取李靖蕭銑將文士弘屯清江孝恭欲擊之靖曰不可士弘健將下皆勇士今新失荊門悉鋭拒我此救敗之師不可當宜駐南岸待其氣衰乃取之孝恭不聽食盡氣老可不戰禽江夏郡王道宗年十七從秦王討賊王登玉璧城以望謂道宗曰賊怙衆欲戰爾計謂何對曰武周席勝剡然鋒未可當正宜以計摧之且烏合之衆憚持久若堅壁以頓其鋭須食盡氣老可不戰禽也王曰而意與我合既而賊糧匱夜引去追戰滅之願徐制之牛徽楊復恭叛李茂貞請假招討節伐之帝乃以招討使授茂貞果有功然益偃蹇帝使宰相杜讓能將兵誅討徽諫曰岐國西門茂貞憑其衆而暴若令萬分一不利屈威重奈何願徐制之不聽逗留其兵天下兵馬副元帥李光弼以河東騎五百馳東都夜入共軍且謂賊方窺洛當扼虎牢帥師東出河上檄召兵馬使張用濟用濟憚光弼嚴教諸將逗留其兵用濟單騎入謁光弼斬之軍期十二白莊賈後期穰苴斬之史具軍政令門失期內顧內顧謂思妻子也見上注正恢逗遛當斬之失道後期李廣事見上注不至質田廣明子都擊胸奴不至質引軍空還下太僕杜延年薄責廣明自殺注質所期處誤令失期後漢祭彤次孫與南單于左賢王信擊北胸奴期至涿耶山信初有嫌於彤行出高門塞九百里得小山乃妄以為涿耶山彤到不見虜而還坐逗遛畏懦而下獄免孔告師期李訴李光顏戰數勝元濟悉鋭卒屯洄曲以抗光顏訴知其隙可乘乃遣從事鄭澥見裴度告師期于時元和十一年十月巳卯師夜起未得其時一品集賜沿邊諸鎮密詔古人云聖人無巧時變是守蓋惜其時也昔漢武命將出師輕齎深入耗蠹中國三十餘年竟不能臣伏胸奴蕩定沙漠此未得其時也至宣帝值胸奴百年之運因壞亂幾亡之厄單于稽首三代稱藩烽燧不設邊城晏如此遭遇其時也禁軍藥兵十三白秦人毒涇上流師人多死傳毒藥傅矢後漢耿恭伯宗以毒藥傅矢曰漢軍箭神矢瘡皆沸虜乃解去禁兵刃吳志賀齊字公苗擊黝歙諸藏中有善禁者交戰官軍刀劍不得拔弓弩射皆還自向齊長情有思曰吾聞金有刃蟲有毒者皆可禁無毒者不可禁彼必能禁吾兵者也乃多作徑木白棓以精卒五千先登賊恃有禁彼必不能以掊擊之禁果不得大敗賊也羊祜遺藥陸抗不疑見示信門投藥水中公羊齊人殲于遂注殲潰也齊強戍之遂人共投藥水中人多死占者有分土無分人戍之非也孔置鴆于酒于井楊行密壁黃鄂間杜洪置鴆于酒于井棄城去行密知不入命受建牙遇敵飲藥白居易判同饋醪而無他推誠猶可向毒流而不察雖悔寧追同上
