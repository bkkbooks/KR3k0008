body:
  text: 卷第十七白夫夫婦婦所謂順也傳夫和妻柔夫和而義妻柔而正婦聽而婉宜家宜爾室家偕老與子偕老如賓冀缺耨其妻饁之敬相待如賓晉侯曰能敬必有德以為下軍大夫鳳皇和鳴懿氏卜妻敬仲其妻占之曰吉是謂鳳皇于飛和鳴鏘鏘伉儷不能庇其伉儷好合妻子好合如鼓瑟琴二物傳謂夫婦外內以經二物配耦各有配耦侍執巾櫛禮間男女義合夫妻絲蘿古詩與君結新婚兔絲附女蘿琴瑟齊體夫妻齊體齊眉梁鴻妻孟光饋食舉按齊眉家肥夫婦和家之肥也禮必敬禮曰昔三代明王之政必敬其妻子妻者親之至也敢不敬焉中則內饋外言內和男行女隨刑于寡妻寡嫡也言文王先施法於妻而後及于邦家以和夫妻夫義婦聽甚宜其妻宜善也禮妻有服不舉樂於其則也禮移天之義一齊之義一與之齊驚死鄭炎遇風疾遭母憂疾甚發動妻厭而驚死妻家訟之不能自治死於獄中加杖晉劉毅散齊妻子有過立加杖以捶之希見朱博不好酒色之宴夜寢早起妻希見其面又劉基字敬輿與群弟居夜臥早起妻妾希見面諸弟敬憚之門無雜賓客刀環擊魏略桓範為異州牧屬鎮北將軍呂昭昭才名過於範範後謂妻曰我寧作卿向三公長跪不能為呂子受屈妻曰君前在東座欲擅斬徐州衆人為君難為下今羞為呂屈難為上也範怒以刀環擊妻妻傷胎死範稱疾不就州疾貪王衍妻郭氏貪戾無厭不能禁有幽州剌史李陽京師大俠郭氏憚之衍曰非但我言卿不可李陽亦言不可郭氏為之小損老而納正室魏鍾繇老而納正室蓋取宗子雖七十無主婦之義殺朱浮字叔元為彭寵所攻道走恐不脫乃下馬剌其妻僅以身免又齊伐魯魯欲將吳起起妻齊女也起殺之明不與齊及為將大破齊軍同心僶俯同心細君東方朔謂妻曰細君孺人禮曰大夫曰孺人孔薛仁貴妻柳曰夫有高世之材要須遇時乃發今天子自征遼東求猛將此難得之時君盍圖功名以自顯咸知已王義方魏徵異之欲妻以夫人之姪辭不取俄而徵薨乃取女人問其然曰初不附宰相今感知己故也妻諫竇建德凌敬説建德怒命扶出其妻諫曰祭酒計甚善王盍用之夫自滏口道乘唐之虛連營漸進以取山北因招突厥西抄關中唐必還師自救鄭難紓矣今頓兵虎牢下徒自苦恐無功建德曰此非女子所知兩妻王毛仲有兩妻一上所賜皆有國色生斂房孺復與妻鄭不相中慈姆為言乃具棺召家人生斂之鄭方乳促上道鄭死于行質張萬福初在泗州遇李希烈反陳少遊悉以部剌史妻子質揚州萬福獨不遣謂使者為我白公妻老且醜不足溷公意卒不行人稱其直蔡將妻烏重胤蔡將李端降重胤蔡人執其妻殺之妻呼曰善事烏僕射得士心大抵如此不相宜顏思魯初思魯與妻不相宜師古苦諫父不聽娶二妻五代安重榮娶二妻高祖因之並加封爵令匹柳玭夫婦之道王化所基韋挺疏教化之端夫婦教化之端公主傳詔不敢仰視權懷恩姿狀沈毅每盛服妻子不敢仰視長貧任婦愁杜甫屏迹詩詩稱鵲巢禮容翟茀杜牧宋叔康妻封制吾昔與卿同營已者今日一成矣周彬不治産業伏膺儒學刻苦修進俾畫作夜其妻嘗讓之曰汝家兄弟能力稼穡營已囊箱豐溢汝之不調無思悔畢向何如答曰卿嘗與吾市油數金是亦力穡營已而已但歲晚必得力及聞先主鎮金陵囊文而往將有事圓丘募四方英秀各為祝史彬所著特加選用署諸衛巡官嗣主與太弟交辟置之門下錫賚頗厚以所賜金幣陳列于庭謂婦曰吾昔與卿同營已者今日一成矣比諸伯叔何箇為勝耶尚能讓于吾乎妻曰斯男子之事非婦人女子所能知江南野史婚姻二白聘則為妻廟見為妻在塗稱婦婚姻以時必告父母及時男女得以及時三星在戶在隅婚姻時也百兩御之燕爾新婚嬿婉之求女子有行遠父母兄弟爾室宜爾室家我儀實維我儀反馬既嫁三月而反馬左氏鳴鳳之兆見上注從人女子從人藝麻結褵九十親藝其麻結褵其儀有室三十壯有室禮不息燭禮曰嫁女之家三夜不息燭思相離也謂親骨肉也不舉樂娶婦之家三日不舉樂思嗣親也謂重世變也又曰婚禮不用樂幽陰之義也欲合子婦深思其義嗣親見上注遵附遠之文娶於異姓所以附遠厚別也卜先近之日禮吉事先近日親迎男女親迎男先於女剛柔之義授室婦降自阼階授之室明婦為家主二十女二十而嫁男女以正六禮納釆問名納吉納徵請期親迎奠鴈御輪合巹禮曰主人筵幾於廟壻執鴈入揖讓升堂再拜奠鴈陳出御婦車而壻授綏御輪三周共牢而食合巹而酳所以合體同尊卑以親之著代承家男贄大者玉帛小者禽鳥以彰物也女贄不過榛栗棗修以告虔也萬代婚禮萬代之始秦晉匹也何以卑我高國傳曰敝無存曰此役也不死反必娶於高國高國貴族也歸我仲子歸于我注婦人謂嫁曰歸好仇仇匹求士娶妻陰禮周禮以陰禮教親則人不怨注陰禮男女之禮也婚姻以時則男女不怨曠多婚周禮荒政十曰多婚注荒年不備禮婚姻也詩曰古者國有凶荒則殺禮而多婚會男女之無夫家者所以蕃育人民嘉禮冠婚之禮許嫁禮曰女子許嫁而纓注繫纓示有從人之端授幣禮女自歸禮婚以禮成妻由義合布幣五兩御輪三周既繫許嫁之纓遂執告虔之贄女辭家而適人辭家委巷在塗是稱家事必慎令儀婚惟著代禮貴及時襟鞶展慶榛栗告虔女既辭家婦將授室桃李恐失當年榛栗遂移他族娶巫家女漢黃霸字次公為陽夏遊徼與善相者共載見一婦人相者曰此婦人合富貴不然相書不可用也霸推問乃鄉里巫家女也遂娶之後位至丞相配嫁晉書武帝制女年十七父母不嫁使長吏配嫁世婚漢鄭崇字子遊本高密大族世與王家相嫁娶也逆婦先配傳鄭公子忽如陳逆婦先配而後祖陳針子曰是不為夫婦誣其祖矣三月乃奠菜儀禮婦入三月乃奠菜以篚祭用槿祝曰某氏來婦敢奠菜于皇舅姑婦拜扱地扱地猶男子稽首也承我宗事儀禮父醮子曰往迎爾相承我宗事施襟施鞶母施襟結悅勉之於母曰道宮事庶及門內施鞶申之以父母命遂人以樂婚擾昕田勸婚姻也周禮判妻入子者皆書之媒氏掌萬人之判男女成名已上皆書年月日以名焉令男三十而娶女二十而嫁幾判妻入子者皆書之注入子嫁女也入云容媵姪娣不聘也書之別未成婚禮也入幣不過五兩凡嫁子娶妻也榖圭以聘女若粟女也造端禮造端乎夫婦重責本於婚婭以著代重責婦順焉女壯勿用娶女易人序婚姻不賀人之序也匪寇婚媾易謂無寇難即往就婚也遠恥公羊婚禮不稱主人遠恥也宋公使公孫來納幣稱宋公辭窮劉范劉氏范氏世為婚姻聞子有客賀娶妻曰聞子有客使某羞禮在途稱婦公羊在國稱女在途稱婦入國稱夫人繫援董叔娶於范氏曰將以求繫援也他日董祁訴於范獻子獻子執而縛之於庭槐叔向曰求繫既繫矣求援既援矣而欲得之無所謂也遲暮離騷恐美人之遲暮及年歲之未晏繁息漢書惠詔女子十五已上至三十不嫁五算欲人繁息勾踐令國中女子十七不嫁罪父母太早王吉字子陽以夫婦人倫為之大綱夭壽之萌世俗婚姻太早未知為人父母之道而有子故人多夭省俸祿賑婚姻任延為九真太守駱越俗無嫁娶禮延令男年二十至五十女年十五至三十栩匹配貧無聘財今長吏已下省俸祿賑婚姻悔婚魏志王褒字偉元與管彥男女各始生許為婚彥為西夷校尉褒女更許人彥弟馥白褒褒曰賢兄葬父於洛陽隨妻還臨淄用意如此何婚之有賀婚晉王彪之曰賀娶妻者是因酒食而有慶語愚謂無直相賀之禮而有禮貺共慶會之義亂倫之始陸玩為侍中司空兄曄録尚書父英高平相玩子納尚書今王導初至江左請婚於玩玩曰培塿無松柏薰蕕不同器玩雖不才不為亂倫之始合二姓之好上以事宗廟下以繼後世也老而納正室鍾繇見上注彈非耦齊沈約彈王源嫁女與滿璋勇鸞彈文曰璋之下錢五萬源以所聘餘直納妾王滿連姻實駭物聽潘楊之睦有異於此文選王滿見上注潘楊潘嶽作楊仲武誄曰潘楊之睦有自來也禁相賀宣詔郡國二千石或擅為苛政禁人嫁娶不得具酒食相賀由是廢鄉里之禮令民無所樂非所以導民也其勿行苛政也軺軿劉歆等新定婚禮親迎立軺軿馬軺立乘小車也軿馬驪駕也諸生皮辨韓延壽為穎川定嫁娶喪祭儀品令文學校官諸生皮辨執俎豆為吏民行嫁娶禮皮馬之禮晉所司奏婚禮納徵大婚用玄纁束帛加圭馬二駟王侯玄纁束帛加璧乘馬大夫玄纁束帛加羊古以皮馬為庭實天子加榖圭諸侯加大璋可依周禮改璧用璋其羊鴈酒米玄纁如故諸侯婚禮加納綵告期迎各帛五匹及納徵馬四匹皆夫家自備唯璋官為具用羊晉書云羊者佯也然則婚者有羊漢末始也斂錢助婚阮修字宣子居貧年三十未有室王敦等斂錢為助皆名士也時有求入錢不得者舊姻詩曰不思舊姻委禽公子黑強委禽焉黑字子皙人倫所資伉儷斯重齊體一行義存偕老形分一氣乾坤為八封之門人列三才夫婦為五倫之首天地之位既分夫婦之禮斯著入幣五兩栗帛周禮三十而娶周禮男三十而娶女二十而嫁媒匪斧析薪如之何匪斧不克娶妻如之何匪媒不得針線因針而入不因針而急女因媒而嫁不因媒而親伐柯如之何匪斧不克娶妻如之何匪媒不得不交禮曰男女無媒不交媒娉強媒良嫁從人曰歸因媒而嫁媒氏周禮行媒禮曰男女非有行媒不相知名妻以禮求為人作媒晉索紈字叔徹有孝廉令孤策夢立冰上與冰下人語紈曰冰上為陽冰下為陰陰陽事也士如歸妻逮冰未泮婚姻事也君在冰上與冰下人語為陽語陰媒介事也君當為人作媒冰泮而成婚會太守田豹因策為子求張氏女仲春成婚孔族屬姻家李敬元進吏部尚書凡三娶皆山東舊族又與趙李氏合譜故臺省要職多族屬姻家服除乃婚于志寧衡山公主既服除將下嫁志寧曰服可以例除情不可以例改心喪成婚非人情所忍於是公主待服除乃婚潛相聘娶高士廉王妃主壻皆取當世勳貴名臣家未嘗尚山東舊族後房玄齡魏徵李績復與婚故望不減然每姓第其房望雖一姓中高下懸隔李義府為子求婚不得始奏禁焉其後天下衰宗落譜昭穆所不齒者皆稱禁婚姻益自貴凡男女皆潛相聘娶天子不能禁世以為弊云以姻戚進竇威帝嘗引入臥內謂曰昔周有八柱國吾與公家是也今我為天子而公為內史令事固有不等邪威懼頓首謝曰臣家在漢再為外戚至元魏有三皇后今陛下龍興臣復以姻戚進夙夜懼不克任帝笑曰公有三后族夸我邪關東人與崔盧婚者猶自矜大公世為帝戚不亦貴乎嫁娶必多取資高士廉初太宗嘗以山東士人尚閥閲後雖衰子孫猶負世望嫁娶必多取資故人謂之賣婚王化所基韋挺上疏曰夫婦之道王化所基故有三日不舉樂之感今婚嫁之初雜奏絲竹以為宴歡官司習俗弗為條禁請婚褚遂良薛延陀請婚帝已納其聘復絶之遂良曰信為萬事本百姓所歸故文王許枯骨而不違仲尼去食存信貴之也通婚名族李日知貴諸子方總角皆通婚名族時人譏之引就清列李懷遠與李林甫善常慕山東著姓為婚姻引就清列天子嫁女皇后娶婦蕭至忠韋后嘗為其弟洵與至忠殤女冥婚至忠又以女妻后舅崔從禮子無詖兩家合禮帝主蕭后主崔時謂天子嫁女皇后娶婦婚嫁齊浣開府王毛仲寵甚與龍武將軍葛福順相婚嫁毛仲奏請無不從浣乘間曰福順典兵馬與毛仲為婚家小人寵極則姦生不豫圖且有後患不欲與寒鄉九裔為姻對尚官宋若昭欲以學名家家亦不欲與寒鄉凡裔為姻對用婚家典帳中兵李聽以威刑操下用婚家竇綬典帳中兵驕驁怠沓牙將李臣則因衆不忍夜斬綬首宗族孤孺者皆為婚嫁徐岱宗族孤孺者皆為婚嫁結婚張孝忠為成德軍節度使朱滔悉兵攻之帝詔李晟率師援孝忠滔解去孝忠因與晟結婚本傳嫁故人孤女嚴挺之嫁故人孤女數十人當時重之斥廩婚嫁柳仲郢衣冠孤女不能自歸者斥廩為婚嫁蕃華不得通婚盧鈞擢嶺南節度使蕃獠與華人錯居相婚嫁多占田營第舍有吏或撓之則相挺為亂鈞下令蕃華不得通婚禁占田産闔部肅一無敢犯為立夫家貞元後流放衣冠孤女稚兒為立夫家主其婚嫁顏春卿臨終捉真卿臂曰爾當大吾族顧我不得見以諸子諉汝後真卿主其婚嫁破酒韋宙出為永州剌史初里民婚出財會賓客號破酒晝夜集多至數百人貧者猶十數若不足則不迎至淫奔者宙條約使略如禮俗遂改有姻屬韋元旦與張易之有姻屬易之敗貶感義尉無與為婚柳宗元貶永州司馬移書言情曰荒陬中少士人女子無與為婚世亦不肯與罪人親昵以是嗣續之重不絶如縷強使孽子婚昵于頔常怒判官薛正倫奏貶陝州長史比詔下頔中悔奏復署舊職正倫死以兵圍其居強使孽子婚昵取世家子杜中立開成初文宗欲以真源臨真二公主降士族謂宰相曰民間修婚姻不計官品而上閥閲我二百年天子顧不及崔盧耶詔宗正卿取世家子以聞中立及校書郎衛洙得召見禁中拜著作郎月中遷光祿少卿駙馬都尉尚真源長公主許婚劉悟傳裴敞冕之裔辟悟府悟奇之故為從諫納其女裴年十五火光起褂下家人以為在因許婚封燕國夫人宋宣遠與盧懷謹姻家崔沔監察御史宋宣遠與盧懷謹姻家恃以弄法姚崇子彝留司東都通賓客招賄賂沔將按劾崇懷謹方執政共薦沔有史才政著作郎去其權蓋憚之也托繫援於高門實光榮於舊族見哀羇旅申以婚姻托繫援於高門實光榮於舊族代李丕與郭誼書汩喪廉恥唐贊遭晉播遷胡醜亂華百宗蕩析士去墳墓子孫猶挾系録以示所承而代閥顯者至賣婚求財汩喪廉恥天子屢抑不為衰長女當及事誰助出帨縭韓文近代婚禮當迎婦以粟三升填臼席一枚以覆井枲三斤以塞窗箭三隻置戶上婦上車壻騎而環車三匝女嫁之明日其家作黍臛女將上車以蔽膝覆頭面婦入門舅姑以下悉從便門出更從門入言當躪新婦迹又婦入門先拜豬樴及灶酉陽雜俎定婚店續幽怪録韋固少未娶旅次宋城遇異人倚囊坐向月檢書如西國梵字云此幽冥之書固曰然則君何主曰天下之婚爾因問囊中赤繩子云以繫夫妻之足雖仇家異域此繩一繫終不可易君妻乃此店北賣菜陳嫗女爾固逐之入菜市見眇嫗抱二歲女亦陋老人指示之固怒磨小刀付奴曰殺彼女當賜汝萬錢奴翌日刺於稠人中才眉間爾後十四年以父蔭參相州軍剌史王泰妻以女年十六七容貌端麗眉間常帖花鈿未嘗暫去逼問之曰妾郡守之猶子也父卒于宋城任時襁褓乳母鬻蔬以給朝夕嘗抱于市為賊所剌痕尚在因盡言宋城宰聞之名其店曰定婚岡頭澤底國史補張説好求山東婚姻與張氏親者皆為甲門四姓鄭氏不離滎陽又岡頭澤底李土門崔皆為頭族約不論財資韓愈寄立之詩老婦願嫁女約不論財資言姻喜附葭柳宗元詩王臺挂寶鏡持此意何如坦腹東床下由來志氣疏李白詩兔絲附蓬麻引蔓故不長杜甫新婚別兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路傍生女有所歸雞狗亦得將同上頗謂秦晉匹從來王謝郎同上凡七姓十家不得自為婚高儉為氏族志又詔後魏西李寶太原王瓊榮陽鄭溫范陽盧子遷盧澤盧輔清河崔宗伯崔懿晉趙郡李楷凡七姓十家不得自為婚女福豐厚必有令匹柳玭家訓曰東都仁和里裴尚書寬子孫衆盛實為名閥天后時宰相魏元同選尚書之先為壻未成婚而魏陷羅織獄家徙鎮嶺表及北還女已踰笄其家議無以為衣食資願下髮為尼有一尼自外至曰女福豐厚必有令匹子孫將遍天下宜北歸家人遂不敢議及荊門則裴齎裝以迎矣今勢利之徒捨信誓如反掌則裴之蕃衍乃天之報施中外姻嫁其禮獻皆親閲之鄭餘慶婚日敕北軍供帳李泌無妻不食肉帝乃賜光福里第強詔食肉為娶朔方故留後李暐甥婚日敕北軍供帳將授室而罷白敏中初帝愛萬壽公主欲下嫁士人時鄭皓擢進士第有閥閲敏中以充選皓與盧氏婚將授室而罷銜之諸王子孫凡婚聘必先因韓虢以請輒皆遂至數百千金貴妃楊氏女孫適崔皋裁九品衛佐帝重其不婚權家鄭覃傳一村惟兩姓世世為婚姻白樂天陳村詩錦繡張道待其至藩鎮宋滔初回紇以女妻奚王至大曆末奚亂殺王女逃歸道平盧滔以錦繡張道待其至請為婚女悅許焉遣使修壻禮於回紇回紇喜報以名馬重寶借吉而婚蔣乂張孝忠子茂宗尚義章公主母亡遺言丐成禮帝念孝忠功即日召為左衛將軍許主下降乂上疏以為墨縗禮本緣金革未有奪喪尚主者禮違人情不可為法帝令中使者諭茂宗之母之請乂意殊堅帝曰卿所言古禮也今俗借吉而婚不為少對曰俚室窮人子旁無至親乃有借吉以嫁不聞男冒凶而娶陛下建中詔書郡縣主當婚皆使有司循典故母用俗儀公主春秋少待年不為晚請茂宗如禮便帝曰更思之會太常博士韋彤諫曰婚禮主人几筵聽命稱事立文謂之嘉所以承宗廟繼後嗣也喪禮創巨者日久痛甚者愈遲二十五月而畢謂之凶所以送死報終示有節也故夫義婦聽父慈子孝昔魯侯改服晉襄墨縗緣金革事則有權變安有釋縗服衣冕裳去堊室行親迎以凶瀆嘉為朝廷爽法疏入帝忤其言促行前詔然心嘉乂有守禮部郎中凡婚嫁花叉禮衣六品已下妻及女嫁則服之其次花叉禮衣庶人女嫁則服之凡婚家之服資廕高者皆以高唐六典白怨耦曰仇失儷儷耦也鳥獸猶不失儷傳仳離有女仳離啜其泣矣棄背花落色衰復相棄背愛弛以色事人色衰而愛弛義絶夫婦之義絶反目易曰夫妻反目同心有怒我怨及爾偕老老使我怨不爽二三女也不爽士二其行女也罔極二三其德衰薄夫婦日以衰薄谷風剌夫婦失道也離絶棄其舊室夫婦離絶國俗傷敗覆水難收斷絃可續塵泥浮沉異路弦䇢離合非常上山採靡蕪下山逢故夫叱狗鮑永字君長養後母至孝妻嘗於母前叱狗永即去其妻啖棗王吉字子陽妻取東家棗啖吉吉乃去婦東家欲伐樹請吉去婦復還求去朱買臣負薪其妻羞之求去買臣曰吾五十當富貴今四十九矣妻怒曰終當餓死遂去之去室蘇武還漢生妻去室下堂糟粳之妻不下其堂糟粳榛栗去閣故人從去閣送畿薄送我畿伋也之妻子思曰不為伋也妻是不為白也母秋扇棄捐篋笥中恩情中道絶別鶴商陵牧子娶妻五年無子父母欲為改娶乃援琴為別鶴操比豫于毒棄我如遺士三出妻逐於境外言二三其德也出管子禮曰舅姑怒則子放婦出而不表禮焉不表謂不明言其過不宜其妻宜善也禮朿縕去婦復還不安左傳莒子娶女于向向薑不安莒而歸莒人入向以薑氏還也來歸傳凡諸侯之女歸寧曰來出曰來歸喪服喪服小記婦當喪而出則除之為父母喪未練而出則三年既練而出則已未練而反則期既練而反則遂之注云當喪當舅姑之喪出除喪絶族逆喪榖梁杞伯來逆叔姬之喪傳曰夫無逆出妻之喪無子梁叔魚三十無子欲出其妻商瞿曰吾年四十有子五人恐子晚出耳非妻之過矣陳平兄漢陳平與兄伯成嫂嫉平不親家産伯聞逐其妻金賞霍光以女妻金賞以霍氏事有萌牙上書去妻上哀之得不坐法李充後漢李充貧兄弟六人同衣遞食妻竊謂充曰妾有私財願分異充曰醞酒具會鄉里共議及賓至充從座中跪白母曰此婦無狀教充離異充母兄弟不可承宗事遂呵叱妻出門黃允後漢以黃允為雋才知名郭林宗曰卿有絶人之才恐守道不篤袁隗見允曰得壻如此人足矣允聞之遂遣其妻夏侯氏婦謂姑曰今日見充方與黃氏長別乞一會以展離訣集客二百餘人婦禳袂而前數允隱匿穢事十五言畢登車而去允遂廢於世仇怨晉書王珣及玫皆謝氏壻太傅安既與珣絶婚又離玫妻遂為仇怨蕩舟之遣傳齊侯與蔡姬乘舟于囿蕩公公歡色變禁之不止公怒歸之未之絶也蔡人嫁之遇故妻朱買臣字翁子為會稽太守入吳界見故妻與夫治道令後車載其夫妻到太守舍園中給之食一日妻自縊死與夫錢令葬送以妻與人東胡使使求冒頓妻閼氏左右請擊之冒頓曰奈何與鄰國惜一女子乎取所愛閼氏與之始托微波終傾覆水卷流黃以去閣罷織素於登山於妻有眷尚妍桃李之姿在壻無情頓改松蘿之契女一其心士二其行參商聚怨徒悲出閣之情水火生嫌詎答下山之問聽秋風於靜室臉淚恆齊鑒明月於空床愁腸欲斷雖求里母束縕難招繼召鄰人斷絃可續生離楚詞曰悲莫悲乎生別離夫妻再合黃昌字真聖初為書佐其妻遇賊被掠轉入蜀為人妻後昌為蜀郡守其妻因治事至於府中昌以其不類蜀人問其由妻曰妾本會稽書佐黃昌妻遭亂入蜀昌左足下有黑子常自言當為二千石昌出足示之相持悲泣乃還為夫妻陳詵妻晉李繁姊先適陳詵生四子遭亂諸賊請活姑命賊遂掠將去詵更娶嚴生子暉繁後得姊歸詵詵藉注二妻及李亡詵疑制服以言於庾亮司馬王愆期議曰案禮不二嫡故惠公元妃卒繼室以聲子諸侯猶然況庶人乎為詵也妻則為暉也母暉之制服無所疑矣詵有老母不可莫之養妻無歸期納妾可也李雖沒賊尚有尋求之理而便娶妻詵之短也畝隴之夫不達禮義施孝叔妻失身於郤犨而不棄者以非其罪李鄙野之人臨危請姑險不忘順可謂婦矣士喪禮曰繼室故稱繼母事之如嫡故先嫡後繼亮從之兩妻晉賈充前妻李氏坐徙後娶郭氏女後李氏以大赦得還詔充置左右夫人充母亦敕充迎李氏郭氏怒曰刊定律令佐命之功我有其分李那得與我並乃為李築館舍於外也孔逐妻令狐建擢左神武大將軍其妻成德軍節度使李寶臣女也建將棄之誣與門下客郭士倫通榜殺士倫而逐其妻寶臣請案劾無狀詈媵婢出妻李迥秀母聞不樂迥秀即出其妻或問之答曰娶婦要欲事姑苟違顏色何可留李元素其妻石泉公主方慶之孫前妻子皆不肖而元素溺姬侍王不見答元素久疾益昏惑遂出之王訴諸朝詔免元素官且令畀王貸五百萬落花辭枝羞故林李白白頭吟東流不作西歸水落花辭枝羞故林覆水再收豈滿杯棄妾已去難重回覆水不可收行雲難重尋同上代別情人白辨姓男女辨姓禮之大同君子惡之子産曰僑聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之晉侯內實有四姬焉皆同姓不娶買妾則卜禮曰娶妻不娶同姓故買妾不知其姓則卜之不書姓傳曰昭公娶于吳故不書姓徒聞盧癸賦詩斷章取義孰曰昭公知禮陳司敗問昭公知禮乎孔子曰知禮司敗曰君娶於吳為同姓謂之吳孟子君而知禮孰不知禮避宗盧蒲癸娶慶舍女同宗也人謂之曰男女辨姓子何不避宗何也曰宗不余避余焉避之詩賦斷章子所取求焉惡避宗注云苟有求於慶氏不復避宗譬如賦詩直取斷章之義不蕃傳曰男女同姓其生不蕃附遠禮娶於異姓所以附遠厚別也有別男女有別無別無義禽獸之道防人禮曰以禮防人魯春秋猶去夫人之姓曰吳其死曰孟子卒同姓故也本枝同族吳魯之百代不通禮曰吳魯而婚姻不通者周道然也出嗣而婚本族魏志陳矯本劉氏子出嗣舅氏而婚本族徐宣每非之太祖惜其材乃下令曰喪亂前事一切勿論姓同源異司空陳萊王基當世大儒而不達禮為子納司空玉沉女以姓同源異又王莽娶王咸女以為源異不同而娶之設法而威小人制禮以防君子孔李光進母李白妻柔而正婦聽而婉婦順禮曰婦順備而後內和理然後家可長久四德婦言婦道婦容婦功執婦道以成肅雍之德婉娩聽從婉言語娩容兒邦之媛兮詩云美欠為媛下之趙姬謂趙衰曰請逆盾及其母曰得寵而忘舊何以使人固請逆之以叔隗為內子而己下之以盾為才使為嫡子使其子下之讓夫樂羊子得遺金而歸其妻讓之曰妾聞君子不以小利污其行如玉之德匪石之心作程垂範閨闈和柔婉淑葉淑女之詩守夫人之法晉書時人稱鍾夫人之禮郤守夫人之法謝女之貞道韞曹家之訓大家婦式婦之式周禮從夫禮曰婦人從人者幼從父兄嫁從夫夫死從子甚宜其妻宜善也禮姆教姆是女師教以德禮和順積中禮婉容禮鳲鳩鵲巢鵲巢夫人之德也國君積行纍功以致爵位夫人德如鳲鳩乃可配焉采蘩大人不失職也晏子之御史記晏子相齊其御之妻窺其夫擁大蓋策駟馬意氣揚揚其妻請去是日夫自抑損晏子問之以實對薦為大夫林下風閨房秀王凝之妻謝氏道韞有才辨同郡張玄妹有才質適於顧氏玄稱之以敵道韞有濟尼者遊於二家或問之尼答曰王家夫人神情朗徹有林下風氣顧家婦冰清玉映自是閨房之秀戒夫傳曰伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難伯宗不從故及國語又曰伯宗歸喜曰吾言於朝謂似陽處父妻曰處父華而不實伯宗飲諸大夫酒妻聽曰大夫莫子若也然民不能其上久矣注云上謂賢在人上知人晉王渾妻鍾氏名琰有文才淑求賢夫有兵家子甚俊欲妻之令與群小吏雜處琰自帷中察之曰此人才足拔萃然地寒壽促不足展其器遂止其人數年卒才學竇滔妾蘇氏能屬文滔符堅時坐徙流沙蘇氏織綿作回文詩以贈滔循環讀之辭甚清婉智略晉書孟昶妻周氏昶弟顗妻又其從妹家並豐昶與劉裕討桓玄欲供軍謂妻曰幸早離絶脫富貴相迎周氏曰事不成於奚官中奉養大家又謂昶曰君舉措非謀及婦人者時所生女在抱推示之曰此可賣不惜傾産給之將舉謂顗妻曰昨夢不好門內不宜亦色我悉取作七日藏厭乃置帳中以絳與昶得數十人被服赫然云云武勇晉書符登妻毛氏善騎射登為姚萇所殺乃率壯士與萇戰殺傷甚衆為萇所執罵萇而死又劉遐妻邵續女驍果有父風遐為石季倫所圍妻單將數騎拔出遐於萬人之中又田防為亂遐應之妻止之不從乃密燒甲都盡又張茂妻陸氏茂為吳郡守被江充所害陸氏傾産率茂部曲為先登討充充敗為陸所殺女荀嵩女灌嵩為襄城太守為杜曾所圍欲求救於平南將軍石覽灌時年十三率勇士數十人踰城突圍且戰且前詣覽乞師兵至賊走患富吳志李衡每欲治家妻輒不聽後遣人於武陵龍陽洲作宅種甘橘千樹臨死敕兒曰洲里有木奴千樹亦當足衣食耳母曰汝父恆稱太史公言江陵千樹橘當封君家吾曰蓋人患無德義不患不富牛衣漢王章與妻居冬無被臥牛衣中涕泣妻怒呵曰京師尊貴誰如仲卿不自憤激乃反涕泣後章至京兆尹欲上封事妻止曰人當知止章不從竟死獄中鮑宣妻後漢鮑宣妻桓氏字少君宣從桓氏父學父奇其清苦以女妻之資送甚盛宣不悅妻曰既承君子雅命是聽乃衣短布裳與宣共挽鹿車歸拜姑禮畢提甕出汲修行婦道宣至司隸才學後漢蔡琰字文姬感亂離悲憤作詩二首又劉榛妻陳氏正旦獻椒花頌生徒受業韋遑母宋氏置生徒百二十人隔絳紗受業先姊行袁隗妻馬融女少有才辨隗謂曰弟先兄舉世以為笑今處姊未適前行可乎對曰妾姊高邈未遇良匹不如鄙薄苟然而已誡孫女張負嫁孫女與陳平戒之曰無以貧故事人不謹事兄伯如父事嫂姑如母齊眉梁鴻伯鸞賃春於皋伯通廡下妻每饋食不敢仰視舉按齊眉救夫罪蔡琰字文姬重嫁於董祀祀犯法當死文姬詣曹操請之時賓客滿座操曰蔡伯喈女在為諸君見之文姬進蓬首徒行請明罪音辭清辨旨甚哀痛操乃出祀罪小郎解圍謝道韞事見嫂叔門詠雪謝氏內集雪下安曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女道韞曰末若柳絮因風起安大悅道韞王凝之妻孔為世聞婦廣德公主下嫁于琮凡內外冠婚喪祭主皆身答勞疏戚咸得其心為世聞婦涉書史鄭義宗妻盧者范陽士族也涉書史能文章草隸殷保晦妻封敖孫也名絢字景文能文章草隸新粧詩楊盈川姪女曰容華幼善屬文嘗作新粧詩好事者稱之進士不櫛開圖有妹能文每語人曰有一進士所恨不櫛爾南楚新聞不許時世粧崔樞夫人治家整肅貴賤皆不許時世粧因話録敏妻朝野僉載則天朝來俊臣強盛朝官側目上林令侯敏偏事之其妻董氏諫止之曰俊臣國賊也勢不久可敬而遠之敏稍稍而退俊臣怒出為涪州武龍令敏欲棄官歸董氏曰速出莫求住遂行至州以剌謁侯不許上敏憂悶董氏曰任莫求去後五十日忠州賊破武龍殺舊縣令略家口並盡以不許上獲全俊臣誅逐其黨敏又獲免一子未嘗至都城太平廣記狄仁傑為相有盧氏堂姨居橋南別墅姨止一子未嘗至都城仁傑每伏臘晦朔修襈甚謹常休假候姨安否適見表弟挾弓矢攜雉兔來歸進膳顧揖仁傑意甚輕簡仁傑因啓姨其今為相表弟何樂願悉力從其旨姨曰相自貴爾姨止有一子不欲令事女主仁傑大慚而退崔玄暐母盧有賢操本傳白婦怨無終女子難養近之則不遜遠之則怨語艷妻之煽詩艷妻之方處怨耦曰仇疾郭氏之貪王衍以其妻郭氏貪鄙口不言錢傲佷法度反易剛柔悖慢驕佚蠱媚惑亂險詖之心不思淑女之章且壞夫人之法三嫁管子女三嫁入于春榖言見由是不貞順也奇邪媚也周禮陰訟謂爭中冓之言庸奴其夫外黃富人女庸奴其夫言視其夫若庸奴也不宜其妻宜善也禮以此防民婦猶有不至者不至謂不親於夫不孝於舅姑婦順不修禮牝雞之晨書曰牝雞無晨牝雞之晨惟家之索家索索盡也言雌代雄鳴則家索乘夫詩乘陵也孔剛悍楊弘武帝嘗讓曰爾在戎司授官多非其才何耶弘武曰臣妻剛悍此其所屬不敢違以諷帝用后言也帝笑不罪悍驕戾沓元載妻王氏河西節度使忠嗣女悍驕戾沓元載叵禁善士所惡薛克創有器識族人黃門侍郎顗弟紹尚太平公主問於克創答曰室有傲婦善士所惡夫惟淑德以配君子無患可矣顗不敢沮而紹卒誅殺二侍兒房孺復又娶崔昭女崔悍媚殺二侍兒私瘞之凶暴喜鞭楚人薛仁杲妻亦凶暴喜鞭楚人見不勝痛宛轉於地者則埋其足露腹背受捶白夫死不嫁禮一與之齊終身不改故夫死不嫁齊謂共牢而食自誓柏舟共薑自誓也共伯早死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之詩略曰之死矢靡它靡忒書哭穆伯之喪敬薑畫哭孔子曰知禮也天窮老而無夫謂之寡此天人之窮而無告也未亡人寡婦自謂殲我良人郊吊傳曰齊侯伐莒莒獲杞梁齊侯歸遇杞梁妻於郊使人吊之對曰植之有罪何辱命焉若免於罪由有先人之敝廬在下妾不敢與郊吊齊侯遂吊於室植杞梁名城崩琴操曰杞梁死其妻無子乃求夫尸於城下哭之道路聞之者皆揮淚十日而城崩竹死湘川記舜巡狩蒼梧而崩二妃不從以淚染竹竹盡成班而死也斷髮割鼻皆古之寡婦自誓不嫁失儷煢獨潘嶽之賦六薑之詩從子禮夫死從子稽顙禮婦人為夫與長子稽顙其餘則否夜哭禮寡婦不夜哭伊寡婦人之利禮夫由義合喪以禮成義重移天哀深沒地死同穴夫既溘至妻將疇依尸還陰氏後漢陰喻妻荀爽女名采少寡父母強嫁與郭奕爽以詐疾召采采歸而懷白刃爽令執奪到郭氏偽為歡建四燈請共談奕敬憚之曙奕出采敕左右辦浴入室令侍人避以粉書扇上曰尸還陰氏字未成恐人來乃以衣帶自縊而死刑耳劉長卿妻恆鸞女生一男五歲長卿卒遠嫌不歸寧男十五而夭乃刑其耳自誓宗婦愍之曰若家無他意何責義輕身曰先君五更尊為帝師男以忠孝女以貞順稱是以豫刑以明我情沛相王吉上奏題其門號景行義桓邑有祀黃鵠歌列女傳陶嬰夫死守義作黃鵠歌歌曰悲夫黃鵠之早寡兮七年不雙飛宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄其命早寡兮獨宿何傷嗟此寡婦兮泣下數行嗚呼哀哉死不忘兮鳥尚然況其夫良雖有賢雄兮終不重行魯人聞之遂不復求嫠婦莒婦人莒子殺其夫己為嫠婦孔哀毀成疾韓愈盧氏銘元和五年尚書薨夫人哀毀成疾當門戶備祭祀劉禹錫撰史公僕射神道碑史孝章妻博陵崔氏僕射之喪自沒竟至葬當門戶備祭祀建碑表皆崔氏之能且命其家老具事功來乞辭以傳于後哭聲一何苦白氏聞哭昨日南鄰哭哭聲一何苦問之身哭夫夫年二十五存念平生之形儀張銑注文選寡婦賦倣佛存念平生之形儀酸惻之懷呂向注寡婦賦為時序漸遠哀情降歇而酸惻之懷日以甚也白天窮禮老而無妻謂之鰥所謂天人之窮而無告也舞鏡孤鸞念其雌見鏡而舞鼓盆莊子妻死惠子吊之乃鼓盆而歌悼亡潘嶽有悼亡詩失儷伉儷廬仗晉劉實字子真喪妻為廬杖之制終喪不御肉輕薄笑之實不以為意祥服世説孫楚妻亡至祥服乃為詩以悼之以示王武子武子見其文曰未知文生於情情生於文覽之悽然增伉儷之重傷神世説荀奉倩妻曹氏有艷色妻嘗病熱奉倩恆以冷身尉之妻亡人吊不哭而傷神未幾奉倩亦卒宴會免官晉書廬江太守梁龕明日當除婦服今夕請客奏妓丞相長史周顗等三十人同會司直劉隗奏曰夫嫡妻長子皆杖既除而宴請免龕官削侯爵顗等知龕有喪吉會所禮宜奪俸一月殺妻史記吳起仕魯齊人攻魯急起娶齊女為妻恐疑之起欲就名乃殺其妻以明不與齊也遂攻齊大破自縊朱買臣既為會稽守其妻羞乃自縊而死自溺秋胡妻恨其夫乃自溺而死蕣華蒿里不杖禮曰為妻喪父母在不杖不稽顙私喪妻喪也禮妻以義親服從恩制再娶吳志孫承字仲嗣喪妻父昭欲為索諸葛瑾女孫權聞而勸之遂為婚行志後漢符融貧妻亡無以殯斂鄉人俗為備棺服融不受曰古之葬者棄之中野唯妻子可以行其志但即土埋藏而已葬妻後漢陳蕃喪妻還葬鄉里人畢至唯許劭不往或問曰仲舉性峻峻則少通不可造又時人多不行妻服云云佳人難再得荀璨字奉倩娶曹洪女卒歎曰佳人難再得見上注輕重相反張璠漢記山陽太守薛勤喪妻不哭臨殯曰幸不為夭折復何恨又王龔妻亡與諸子並杖行服時人兩譏之葬妻犯禾季子羔葬妻犯人之禾申祥以告曰請庾之子羔曰吾為邑宰於斯買道而葬後難繼也不再娶漢王駿妻死不娶或問之駿曰德非曾參子非華元何敢再娶又韓詩外傳曰曾參喪妻不更娶人問之曰以華元善也又後漢楊秉早喪夫人不娶又魏志管寧妻卒知故勸再娶寧曰每省曾子王駿之言意常嘉之豈違本心倚戶觀化莊子德官之喪潘嶽諫楊仲武曰德官之喪謂妻喪也喪妻八孔約家人無以哭聞母所李畬妻總故時母病恐悲傷約家人無以哭聞母所朝夕省侍無憂色不娶王維喪妻不娶孤居三十年早喪妻李玨舉桉來饁劉禹錫傷往賦我行其野農民乘者舉案來饁舉案來饁亦在林下我觀于塗裨販之夫同荷均挈荊叉布襦物莫失儷以孤處我方踽踽而焉如指遺褂兮能認訴空惟兮欲歸又曰寶瑟僵兮絃柱絶瑤臺傾兮鏡奩空見巾箱之故封同上閲刀尺之餘澤見巾箱之故封斂其遺服月旦一出陳之侍御武君當年喪其配斂其遺服櫛珥縏帨于篋月旦十五日則一出陳之抱嬰兒以泣韓愈吊武會御所畫佛文葬玉埋香玉溪編事孟蜀時秦川節度使王承儉築城獲瓦棺中有石刻曰隋開皇二年渭州剌史張崇妻王氏銘文有深深葬玉鬱鬱埋香之語云臼中炊江淮王生善卜有賈客張贍將歸夢炊臼中問王生生曰君歸不見妻矣臼中炊無釜也賈客歸妻已卒酉陽雜俎四十喪妻丁公著四十喪妻終身不畜妾白殺前妻子後漢龐參為太尉夫人疾前妻子投於井殺之參素與洛陽令祝良不平率吏入太尉府按實其事遂策免繼室傳臧宣叔妻于鑄生賈及薦而死繼室以其姪穆薑之姨子逐子薛包字孟嘗母喪以至孝聞父娶後妻而憎包乃出之包日夜號泣不能去至被杖毆不得已廬於舍外旦夕入而灑掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慚而還之謀出外蜀志劉表受後妻語愛少子琮長子琦謀自安遊後園上高樓去梯謂諸葛亮曰言出子口入吾耳可言乎亮曰君不見申生在內死重耳在外而安琦乃陰規出計非等間之語也織縑古詩新人工織縑故人工織素孔韋后乳媼竇懷貞會歲除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎懷貞唯唯俄而禁中寶扇鄣衛有衣翟衣出者已乃韋后乳媼王所謂莒國夫人者故蠻婢也懷貞納之不辭世謂媼壻為阿奢懷貞每謁見奏請輒自署皇后阿奢而人或謂為國奢軒然不慚以自媚於后再娶廬邁再娶無子假姓虞許敬宗嬖其婢因以繼室假姓虞斷髮李德武妻裴氏以孝聞鄉黨德武坐事徙嶺南時嫁方踰歲父矩表離婚德武謂裴曰我方貶無還理君必儷它族于此長決矣答曰夫天也可昔乎願死無它後十年德武未還矩決欲嫁之斷髮不食矩知不能奪聽之德武娶爾朱氏赦還聞其全節乃遣後妻為夫婦如初白賤妾魏武子有賤妾疾曰必嫁是妾及病甚曰我死必以為殉及卒子從治命嫁之嬖妾愛妾歸妾燕燕衛莊薑送歸妾也衣帛季孫相魯無衣帛之妾買妾不知其姓則十之織蒲臧文仲妾織蒲三不仁也奔則為妾聘則為妻不敢失孝經曰理家者不敢失於臣妾不聘傳聲伯之母不聘穆薑曰吾不以妾為以誘妾書曰不敢誘偷臣妾汝則有常刑當夕禮妻不在妾御莫敢當夕謂進御於君上僣緑衣衛莊薑傷己也妾上僣夫人失位云云生子禮妾將生子及月辰使人日一問之謂諸侯也有子則緦禮士妾有子而為之緦無子則已長子服妾為君之長子與女君同注不敢以恩將服君之正統妾祔於妾祖姑無祔祖姑則易牲而祔於女君可也注曰女君嫡祖姑也易牲而祔凡下女君一等自獻其身以此防民民猶有自獻其身脅齊媵之先者公羊禘于太廟用致夫人稱薑氏貶也譏以妾為妻脅於齊媵之先者注公聘楚齊君媵脅公以為夫人也無以妾為妻孟子齊桓公盟諸侯于葵丘再命曰無以妾為妻願欲笄乏國語楚司馬子期欲以妾為內子訪左史倚相曰吾妾願欲笄之注內子服衡笄外婦漢齊悼惠王母為高祖外婦旁妻王禁多娶旁妻禁元后父小妻武帝詔枚乘乘孽子皋之母小妻不肯隨乘怛妾腐木劉輔上書於成帝曰腐木不可以為柱卑人不可以為主毒張彭祖舊恩封陽都侯為小妻所毒漢宣帝時為妾出妻魏氏春秋鍾會母寵於父繇繇出其夫人太后為言文帝詔復之繇憤恚餐椒市噤乃止喪服車胤上言喪服禮制庶子為母緦麻三月傳曰尊非為體賢妾蘇秦謂燕主曰客有遠為吏其妻私人夫至使妾舉藥酒進之妾欲言恐逐主母勿言殺主父於是佯僵仆而棄酒主父大怒笞五十杖妾一僵上存主父下存主母身受笞此忠信而得罪也絡秀周顗母李氏字絡秀顗父浚為安東將軍求絡秀為妾父兄不許絡秀曰門戶殄瘁何惜女子遂與之生顗顗長母曰我屈節為汝家妾不與我為親吾亦不惜餘年顗等從命為方雅之族也見夫人晉書漢魏故事王公群妾見夫人夫人不答拜新禮亦宜答拜摯虞議曰以妾事女君如婦事姑則敬與婦同而加賤也宜不酬答齋縗禮悼公之母死哀公為之齋縗有若曰為妾齋縗禮與公曰吾得已乎哉魯人以妻我言皆為我妻也文過之言官女妾也奔孟僖子泉丘女夢以帷幕孟氏之廟遂奔於孟僖子送妾祭遵兄以遵無子以送妾之遵不受曰以身任於國不敢慮繼嗣孔以妾為妻李齊運晚以妾為妻具冕服行禮士人嗤之養子李績謂弼曰我死衆妾願留養子者聽餘出之母事父妾崔渙有嬖妾子縱以母事父之妾剛酷雖縱顯官而數笞詬然率妻子侯顏色承養不懈時以為難稍畜伎妾裴淮晚節稍畜伎妾厚妾薄妻嚴武幼豪爽母裴不為挺之所答獨厚其妾英武始八歲怪問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也父奇之曰真嚴挺之子汙逼崔寧在蜀久兵寖強而肆侈窮欲將吏妻妾多汙逼驍果崔寧其弟寬守成都楊于琳乘間起瀘州寬戰力屈寧妾任素驍果即出家財十萬募勇士得千人設部隊自將以進于琳大懼會糧盡且大雨引舟至廷乘而去不答其妻齊浣納劉戒女為妾不答其妻李林甫惡其行擠而廢之鬻女為人妾李德裕蜀人多鬻女為人妾德裕為著科約凡十三而上執三年勞下者五歲及期則歸之父母以妾為夫人杜佑議者謂佑治行無缺惟晚年以妾為夫人有所蔽云不置李玨旱喪妻不置積媵妾王仁皎積媵妾私通劉禕之垂拱中或告禕之與許敬宗妾私通太后遣肅州剌史王本立鞫治以敕承禕之曰不經鳳閣鸞臺何謂之敕后以謂拒制使賜死于家幽妓妾別舍楊憑入拜京兆尹與御史中丞李夷簡素有隙因劾憑江西姦贓及它不法詔李鄘趙昌即臺參訊于時憑幽妓妾於永樂別舍謗議頗歡故夷簡藉之痛擲發欲抵以死內無妾媵鄭覃旦夕問省楊晟隸鳳翔軍節度使李昌符畏其勇欲殺之妾周擲使亡去昌符死晟得妾周母事之周請為妻晟固辭旦夕問省乃視事納妾李義府洛州女子淳千以姦繫大理義府聞其美屬丞單正義出之納以為妾側室劉悟子從諫妻裴從諫有妾韋願封夫人許之詔至裴怒毀詔不與從諫他日會裴黨復出詔裴抵去曰淄青李師古四世阻命不聞側室封者君承朝廷姑息宜自黜削求洗濯顧以婢為夫人族不日滅耳從諫赧然止侍姬盈房李林甫尤好聲妓侍姬盈房李伊衡以妾為妻為王妾侍裁十數竇建德及為王妾侍裁十數私侍賓客南唐李煜嘗以韓熙載盡忠能直言欲用為相而熙載後房妓妾數十人多出外舍私侍賓客煜以此難之左授熙載右庶子分司南都熙載盡斥諸妓單車上道煜喜留之復其位已而諸妓稍稍復還煜曰吾無如之何矣主書韋年陟常以五采箋為主記使侍妾書之娟然衣羅紈鳴珥環房魯上節度使書堂皇數仞侍婢娟然衣羅紈鳴珥環出聲熊者纍百柳枝絳桃語林二侍妾名柳枝絳桃其後五廷湊有壽楊絶句不見園花并巷柳馬頭惟有月團團蓋寄意二姝及歸柳枝竄樊素小蠻白居易櫻桃樊素口楊柳小蠻腰侍妾也刻玉為倒龍佩唐樂史緑珠傳崇美妾千人擇數十人粧飾一處忽使視之相分別刻玉為倒龍佩結繞檻而舞千金駿馬換少妾李白襄陽歌千金駿馬換少妾笑坐雕鞍歌落梅女寶太和九年牛羊日曆寶曆中李願太尉晚得一青衣乃色中之尤者乃字之曰女寶意取季倫緑珠臻於此及願老乃曰今老矣乃家藏一女寶曾不問非臣所宜如得善文者希一表進之吾無恨矣乃求於楊漢公白淑姬詩彼美淑姬可與晤歌螓首蛾眉清陽婉兮靜女其姝彼美淑姬見上注洵美洵信也鍾美尤物天有尤物足以移人甚美必有甚惡捧心而嚬施芳澤設笄珥珥瑱耳也靡曼雉齒婑惰列子子産弟公孫穆後處比房擇雉齒婑惰趙女鄭姬北方有佳人美者顏如玉如玉見上注姱容修態楚辭雲雨巫山神女朝為行雲暮為行雨千金買笑巧笑之瑳瑳巧笑兒佩玉之儺乃可反行有節也孔惟擇美者有皓娶妻惟擇美者矯詔強娶來俊臣傳王慶詵女適段簡而美俊世矯詔強娶逼亂之王旭為侍御史紀希虯兄為南劍令坐贓旭奉使臨訊見其妻美逼亂之因殺其夫雲鬢儼分行翠眉縈度曲雲鬢儼分行杜甫華屋絶神仙同上秋日詠懷霧中花有鄰夫自外歸見婦吹火贈詩曰吹火朱唇動添薪玉腕斜遙看煙裏面一似霧中花出笑林諸將有掠得人之美女者以遺道道不能卻置之別室訪其主而還之五代史馮道非人所有畢諴上恩顧特異許以為相令狐綯所忌連徙之鎮皆綯緩其入相之謀也諴思有以結綯在此門得絶色非人所有者盛飾珠翠專使獻綯綯一見心為之動謂其子曰尤物必害人畢太原於吾無分今以是餌吾將傾吾家族也一見立反之使人不敢將回驛候諴意諴又瀝血書輸啓事於綯綯終不納乃命貨之東頭醫李玄伯上所狎昵者以錢七十萬致於家及舍上堂坐之玄伯執賤役以事之踰月盡得其歡心焉乃進於上上見大惑之寵冠六宮玄伯燒伏火丹進以市恩澤上瘡疾作玄伯之罪也懿宗即位與山人王嶽道士廬仙芝俱棄市東觀奏記妒十二白螽斯美后妃妒無妒也言若螽斯不妒忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮逮下樛木后妃逮下也言能逮下而無嫉妒之心焉夫人無妒忌之行則惠及賤妾入宮而妒史記女無美惡入宮而見妒專房之寵賈氏之種晉武帝欲為太子納妃帝曰賈氏之種妒而少子樊氏之賢楚莊王樊姬進女於王勝已者二人如己者七人惡女之仇史記好女入室惡女之仇不宜其妻宜善也禮夫婦之道苦苦謂不至不答不使視傳叔向之母妒叔虎之母美而不使視叔向曰深山大澤實生龍蛇豫懼生龍蛇以禍汝子何愛焉棄子後漢龐參妻棄前妻子於井中絶嗣晉書賈充妻郭槐疑充視乳母笞殺之其子黎人思慕乳母不食他乳遂死及生小子亦然充遂絶嗣無此句謝太傅劉夫人不令公有別房公頗欲立妓妾生姪等微達比旨共訊夫人因方便稱關睢螽斯有不妒之德夫人問誰撰此詩答云周公周公是男子相為耳使周姥撰詩當無此句南郡主欲殺李氏妒記曰桓司馬以李勢女為妾南郡主拔刀率婢數十人往李所因欲斫之見李在窗前梳頭髮垂委地姿貌絶麗乃徐下地結髮斂手向主曰國破家亡無心以至今日若能見殺猶生之年神色間正辭旨悽惋主乃擲刀抱之曰我見猶憐何況老奴害色謂之妒密置妾王導妻曹氏性妒導憚之乃密置衆妾於別館以處之曹氏知而將往導恐被妻辱遽命駕猶恐遲以所執塵尾柄驅牛而進求絶謝邈茂度妻鄭氏妒怨懟與邈書邈以書非婦人之辭疑其門生仇玄達為之作遂斥逐玄達被傷晉祖約妻無男性妒約亦不敢違忤常夜寢於外為人所傷疑妻所為求去職不許劉隗劾曰約新荷殊寵當敬以直內而患為婢妾身被刑戮宜貶黜帝不罪孔悍妒張亮更娶李氏李悍妒刵耳劓鼻宜城公主下嫁裴巽巽有嬖姝主怒刵耳劓鼻斷巽髮帝怒斥為縣主刻眉酉陽雜俎房孺復妻崔氏性忌左右婢不得濃粧高髻月給燕脂一豆粉一錢有一婢新買粧稍佳崔怒曰汝好粧耶我為汝粧乃令刻其眉以青填之燒鎖梁灼其兩眼角皮隨手燋卷以朱傳之及痂脫瘢如粧焉莊宗愛姬甚有色而生子后心患之莊宗燕居宮中元行欽侍側莊宗問曰爾新喪婦其復娶乎吾助爾聘后指愛姬請曰帝憐行欽何不賜之莊宗不得已陽諾之后趨行欽拜謝行欽再拜起顧愛姬肩輿已出宮矣莊宗不樂稱疾不食者纍日以鐵錐剌閩王延翰妻崔氏延翰多選良家子為妾崔氏性妒良家子之之美者輒幽之別室繫以大械刻木為人以手擊其頰又以鐵錐剌之死者八十四人五代史妒婦津臨濟有妒婦津相傳言晉太始中劉伯玉奏段氏性妒忌伯玉常於妻前誦洛神賦語其妻曰娶婦得如此吾無憾焉段氏曰君何以水神美而欲輕我吾死何愁不為水神其夜乃自沈而死死後七日托夢語伯玉曰君本願神吾今得為神也伯玉寤而覺之遂終身不復渡水有婦人渡此津者皆壞衣杜粧然後敢濟不爾風波暴發醜婦雖粧飾而渡其神亦不妒也出酉陽雜俎不可以死恐朝野僉載兵部尚書任瑰賜二艷姬妻妒爛其髮禿盡太宗聞之賜金瓶酒曰云飲之立死不妒即不須飲柳氏拜敕曰妾與瑰俱出微賤更相輔翼遂致榮官今多內嬖誠不如乞飲盡無他帝謂瑰曰人不畏死不可以死恐朕尚不能禁卿其奈何其二女令別宅安置君王雖愛蛾眉好無奈宮中妒殺人李白玉壺吟西施宜美復宜嚬醜女效之徒嫉身君王雖愛蛾眉好無奈宮中妒殺人月點錢點今婦人面飾用花子起自昭容上官氏所製以掩點迹大曆已前士大夫妻多妒悍者婢妾小不如意輒印面故有月點錢點雜俎寧知趙飛燕奪寵恨無窮李白怨歌行薦枕嬌夕月卷衣戀春風寧知趙飛燕奪寵恨無窮李益少癡而忌克世謂李益少癡而忌克防間妻妾苛嚴白畫眉漢京兆尹張敞為婦畫眉長安傳張京兆眉有司奏宣帝問之對曰臣聞閨房之中夫婦之私有過於畫眉上愛其能不責之遺肉漢武帝令東方朔自責朔曰拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑賜酒一石賜肉百斤將遺細君悅己女為悅己者容荀奉倩之深情鍾夫人之重愛小吏為妻先引蕭望之為御史大夫使小吏冠法冠為妻先引遷太子太傅甚宜其妻宜吾也禮擇璫賦珥食殘桃竊王車寵十三孔自為小君裁衣鳳池編李紳為相時俗尚輕綃紫醮碧為婦人衣紳自為小君裁衣寵極愛還歇李白妾薄命妍好去婦詞新寵方妍好寵煽赫然武后淑麗冠後廷郭貴妃淑麗冠後廷故寵異之漢帝重阿嬌貯之黃金屋咳唾落九天隨風生珠玉李白妾薄命蕭良娣方幸后引內後宮以撓妃寵武后與后爭寵蕭良娣有寵而武才人以先帝宮人與后爭寵更相毀短廢后王氏傳智算警穎迎意輒悟帝大悅遂專房楊妃傳造藝輝堂紫綃帳龍綃衣元載姬薛瑤英杜陽雜編五代唐莊宗先時攻梁軍於夾城得符道昭妻侯氏寵冠諸宮宮中謂夾寨夫人白思伯樹萱詩曰焉得萱草言樹之背願言思伯使我心痗望夫化石望夫不歸身化石於山之上飛蓬詩曰自伯之東首如飛蓬豈無膏沐誰適為容回文竇滔妻見賢婦門注蕩子不歸古詩蕩子去不歸空床難獨守牽衣魏文帝詩將適千里道妻子牽衣袂斂枕禮夫不在斂枕篋菌席襡器而藏之襡示藏塵泥之難古詩君為清路塵妾作濁水泥攀桃李兮不忍別孔團雪散雪辭魏國憲穆公主下嫁王士平主恣橫不法帝幽之禁中錮士平于第坐交中人貶賀州司戶門下客蔡南史獨孤申叔為主作團雪散雪辭狀離曠意帝聞怒捕南史等逐之幾廢進士科思相離漢陽公主名暢下嫁郭鏦辭歸第泣不自勝德宗曰兒有不足邪答曰思相離無它恨也帝亦泣顧太子曰真而子也暮婚晨告別嫁女與征夫不如棄路傍結髮為妻子席不暖君床暮婚晨告別無乃太匆忙杜甫新婚別泣盡影傷劉良注文選別賦織錦為回文詩使成章句以寄於夫思念別離故泣盡影傷愁如回飆亂白雪李白久別離南楚材妻詩進士南楚材始娶薛氏後遊穎川欲別婚貴族遣奴取琴書以示無歸意薛知見絶乃自圖其形題詩其側以寄有云恐君須忘卻時展畫圖看楚材大慚雲溪友議高城已不見況乃城中人歐陽詹寄太原官妓麗情集金瓶落井無消息李白寄遠憶昨東園桃李紅碧枝與君此時初別離金瓶落井無消息令人行歎復坐思空留錦字表心素至今緘愁不忍窺上腸隨回紋結織錦作短書腸隨回紋結相思欲有寄恐君不見察覆水不可收行雲難重尋代別同上常嫌玳習孤去婦詞自從離別久不覺塵埃厚常嫌玳瑁孤猶羡鴛鴦偶李白寒沼落芙蓉秋風散楊柳同上趙瑟初傾鳳凰枉蜀琴欲奏鴛鴦絃此曲此意無人傳願隨春風寄燕然長相思上漢口雙魚白錦鱗贈輔録事漢口雙魚白錦鱗令傳尺素報情人其中字數無多少祗是相思秋復春別時雙鴛綺留此千恨情碧草生舊迹緑琴歇芳聲韋應物詩心逐江水流自從為夫妻何曾在鄉土去年下揚州相送黃鶴樓眼看帆去遠心逐江水流李白江夏行白非偶左傳鄭公子忽有功於齊齊侯請妻之忽辭人問其故忽曰人各有偶齊大非吾偶也今奔齊之急而受室以歸是以師婚也辭與弟傳敝無存之父將室之辭以與其弟曰此役也不死反必娶於高國注言欲立功娶卿相之女又後漢王謙為何進長史以謙名公之胄欲與為婚見其二子使擇焉謙不許以疾免又魏志賈詡字文和嫁娶不結高門天下之論智計者歸之又魏志張範字公儀袁隗欲以女妻範範辭不受又桓階字伯續劉表欲妻之姪女階自陳結婚處拒不受又陸玩為侍中司空兄曄尚書僕射録尚書事父英高平相玩子納尚書令王導初至江左請婚於陸陸曰培塿無松柏薰蕕不同器玩不為亂倫之始又漢雋不疑字曼倩為京兆尹大將軍欲以女妻之固辭久之以病免又楊駿欲以女妻鄭默曰每讀雋不疑傳常嘉之中官女典略曰中官常侍唐衡欲以女妻汝南傅公明公明不娶轉以女妻荀彧彧父緄慕衡勢誡彧娶之為論者所譏臣松之云時閽豎用事四海屏氣尤懼唐衡威權莫二順則六親以安違則大禍立至斯以存易亡之由昔蔣詡姻于王氏無損清高之操緄之此婚庸何傷乎彧字文若不許婚孫權遣使為子索關羽女羽罵辱其使不許婚權大怒悔婚王褒偉元與管彥為友約男女為婚彥後葬父於洛陽褒遂別嫁其女謂彥弟馥曰昔嫁妹妹皆遠吉凶斷絶今賢兄葬父洛陽則京邑之人豈吾結好之意哉馥曰嫂是齊人也當還齊哀曰豈有葬父洛陽而隨妻還齊如此去就復何婚之有諫婚晉劉實妻卒華氏將以女妻實弟智諫曰華家貧類必污門戶實辭不得已竟婚而生子夏實後坐夏受賂免官頃之為大司農又以夏犯罪免官喪婚見哀部注孔為子請婚張延賞與李晟有夙憾及倛入朝韓滉從容邀晟平憾且使薦延賞於帝復拜平章事既而宴禁中帝出瑞錦一端以示和解因為子請婚延賞不許晟曰吾武夫雖有舊惡杯酒可解儒者難犯外睦而內含怒今不許婚釁未忘也
