body:
  text: 卷第二十七白包荒易爾無忿疾于頑書無求備於一人語必有忍乃有濟有容德乃大不恕臧文仲作不順而施不恕勿施于人己所不欲其恕乎子曰有一言而可以終身行之其恕乎躬自厚而薄責於人則遠怨矣人之過也各於其黨觀過斯知仁矣小人不能為君子之行非小人之過也當恕而勿責寬則得衆國君含垢傳天之道也曹參見人有細過掩匿覆蓋之丙吉不罪馭吏馭吏頻醉西曹請罪之吉曰以醉飽之過斥人欲今安歸乎不過吐嘔丞相車茵西曹第忍之蒲鞭示恥羹爛汝手漢劉寬字文饒吏人有過但蒲鞭示恥而已又夫人欲試之趨朝裝畢使婢奉肉羹翻污朝衣上遽收寬神色不異徐謂婢曰羹爛汝手耶宋則蒼頭誤殺子宋則子年十歲與蒼頭共弩射絃斷矢繳誤殺則子死則恕不誅荀爽美之不加聲於僮僕晉鄭默忠恕違道不遠兼容藉孺勸魏其侯不以己能責人不能王褒忠恕而已認物與具刑法部猜認門注避盜具凶惡門雜盜注不見吏過曹參為國相舍後園近吏舍日夜飲呼從吏患之引參遊園幸國相召按之乃反取酒張坐飲亦歌呼相應見人細過專掩匿蓋覆敗面蔡系與謝萬爭言推萬落床冠帽傾脫萬徐起曰卿幾敗面神氣自安理遣衛玠叔寶嘗云人有不及可以情恕非理相干可以理遣故終身無喜慍之色孔馬蹶鞍壞裴行儉嘗賜馬及珍鞍今史私馳馬馬蹶鞍壞懼而逃行儉招還之不加罪初平都支遮匐獲瑰寶不資蕃酋將士願觀焉行儉因宴遍出示坐者有碼瑙盤二尺文彩粲然軍吏趨跌盤碎惶懼叩頭流血行儉笑曰爾非故也何至是色不少吝性寬簡郭翰者性寬簡人有忤已遜以自免婁師德有度量人有忤已輒遜以自免不見容色臨事不苛細楊恭仁遷甘州剌史臨事不苛細徼人安之衆服其量竇德玄帝封禪次濮陽問古謂帝丘德玄不能對許敬宗具道其然帝稱善獲宗自矜于人德玄知不為忤衆服其量長厚常袞與楊綰同執政綰長厚通可而袞苛細於人無所不容薛存誠性和易於人無所不容政尚寬簡顧少連政尚寬簡不為灼灼名夷粹無競沈傳師性夷粹無競寬厚人皆安之高固拜邠寧節度使固本宿將且寬厚人皆安之然久在散位數為儕類輕笑及受命衆多懼固一釋不問敦大則有以容而思韓愈釋言劉鼎風稜五代劉鼎性若寬易而與選曹案吏有風稜性寬玄宗既命蕭嵩為相嵩性寬博多可及嵩引韓休同列有博厚恢弘之德能并容善僞柳宗元羽化柳公權凡公卿以書貺遺蓋巨萬而主藏奴或盜用嘗貯杯孟一笥滕識如故而器皆亡奴妄言叵則者笑曰銀杯羽化矣不復詰為父禳災李勉為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞于其壟或以告勉勉曰為父禳災亦可矜也舊史寬博多可韓休與蕭嵩同相嵩寬博多可休峭鯁寬恕退抑河間王孝恭寬恕退抑無矜伐色苗晉卿知選事選人訴索好官厲言倨色紛于前晉卿與相對終日無慍顏進侍郎積寬縱而吏下因緣作奸本傳居官有績根仁恕盧鈞所居官必有績大抵仁恕至誠而施事奴以米易酒陽城嘗絶糧遣奴糴米奴以米易酒醉臥于路城怪其故與弟迎之奴未醒乃負以歸及覺奴痛咎謝城曰寒而飲何責焉僚史非大過不榜責吳湊僚史非大過不榜責召至廷詰服原去其下傳相訓勖舉無稽事家僮折馬足不責歸登性溫恕家僮為馬所踶笞折馬足登知不加責有遺金石不死藥者紿曰已嘗及登服幾死訊之乃未之嘗人皆為怒而登不為慍寬和高瑀寬和居官無赫然譽所至稱治士人懷之斷速則寡恕于人陸贄斷速則寡恕于人而疑似不容辨也寡恕而下懼禍故反側之釁生不責奴僮相詬朱朴每對客不責奴僮曳仆諸前相之詬曰若持怒心即自撓矣人伏其長者戴至德遷尚書右僕射時劉仁軌為左人有所訴率優容之至德乃詰究本末理直密為奏終不顯私恩由是當時多稱仁軌者號仁軌為解事僕射常更日聽訟有嫗詣省至德已收牒嫗乃復取曰初以為解事僕射今乃非是至德笑還之人伏其長者本傳不知錢陌銖兩之數五代姚顗為人仁恕不知錢陌銖兩之數默汙爾婁師德在夏官注選選者就按閲簿師德曰容我擇之可乎選者不去乃灑筆曰墨汙爾盜飲具九國志王潛夜宴盜入其家盡取飲具逮明方知笑曰亦奸飲耶竟不問性寬易袁滋性寬易與之接者皆自謂可見肺腑白正曲為直直哉惟清司直彼已之子邦之司直直如朱絲繩如矢之直如弦之心直如弦死道邊舉直錯諸枉能使枉者直民之生也直罔之生也幸而免言人生所以自終以正直直而無禮則絞好直不好學其蔽也絞子貢曰惡訐以為直者訐發人之陰私曰思無邪詩三百一言以蔽之古之愚也直今之愚也詐庸為直乎言非直也惡直醜正言害正直也可謂直矣大直若曲老子身由正立名以直聞友直子曰益者三友友直友諒友多聞獬豸宅買反觸邪本無好惡屈軼指佞豈憚悔尤稱以為權爾雖有說謂之曰直吾則不知盡忠事上正色率下立身勵物軌俗端表雖表必正其景精鋼可折不屈其鋒中正無邪廉直徑正砥礪名節仲尼曰叔向古之遺直言叔向之直有古之遺風治國制刑不隱於親三數叔魚之惡不為末減末薄也曰義也夫可謂直矣叔向刑以殺弟故仲尼以為於義未安直則有也伯宗直言及難伯宗直言其妻戒之曰子好直言必及於難微生乞鄰子曰孰謂微生高直或乞醯焉乞諸其鄰而與之父子相隱直在其中葉公曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣直哉史魚邦有道如矢邦無道如矢柳下惠以直道而三黜柳下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦有覺德行覺然正直貌身有危而志不可奪見利不虧其義見死不更其守朱雲直臣雲直諫帝令斬之雲攀折檻成帝命令勿易折檻以旌直臣汲黯正直黯字長儒朱雲請劍斷佞臣張禹頭張綱埋輪請誅梁異董宣彊項不拜殺公主奴上令謝主宣手據地不肯因謂之彊項令任座之言文侯尚喜翟璜曰君仁則臣直任座之言宜文侯大喜也朱雲之節成帝猶旌見上注執德不回楊惲曰徑直者未必全直貌王陵任氣好直言虞詡字升卿剌舉無所回容有譴栲三曹刑罪剛直之性終不可踰免仇蓋勳為濮陽長史武威大守貪猾從事蘇正和案致其罪梁州剌史梁鵠畏貴戚欲誅正和訪於勳勳素與正和有仇及問對曰絏食鷹鳶欲有鷙鷙而殺之何哉鵠乃止和聞言詣勳勳不見曰吾為梁使君不為蘇正和也彈射蜀孟光曰吾好直言每彈射利病為世所嫌方直之士朝錯曰奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以無功居尊顯之位可謂方直之士矣不事權貴漢嚴彭祖為太傅廉直不事權貴或說天時不如人事君不修小禮曲意無左右之助願勉強之彭祖曰通經術修先王道何可委曲也又魏劉放孫資用事辛毗獨不交好子弟勸之毗曰吾立身有本末孫劉不平不過不作三公何害者也怒鴨欄劉遜伯言時建昌侯慮於堂前作鬥鴨欄頗施小巧遜正色曰君侯宜勤覽經典用此何為慮即時毀徹也面折長官郅惲事見政部屬吏門注孔方挺李栖筠方挺無所屈直道而行長孫無忌帝曰朕當評公等可否謂馬周評裁人物直道而行面剌人短嗣吳王子巘性介直面剌人短無所回畏魏謨為宰相議事天子前讜切無所回畏謂彊直為擅權魏徵曰便佞之徒謂彊直為擅權令狐峘諫詔合曰朕頃議山陵荒哀迷繆以違先旨卿引據典禮非唯中朕之失亦使朕不遺君親于患敢不聞義而從奉以終始雖古遺直何以加焉鯁切李義琰帝每顧問必鯁切不回主聖則臣直柳範曰主聖則臣直陛下仁明臣敢不盡愚見王公未嘗屈禮韋思謙進御史大夫性謇諤顏色莊重不可犯見王公未嘗屈禮峭直有行劉子翼峭直有行孤直憲宗皇后郭氏崩太常官王皞請后合葬景陵以主附憲宗室帝不悅令宰相白敏中讓之皞曰后乃憲宗東宮元妃事順宗為婦歷五朝母天下不容有異論敏中亦怒周墀又責謂皞終不撓墀曰皞性孤直俄貶皞句容令世路孔難直者先禍楊再思居相十餘年阿匿取容無所薦達人主所不喜毀之所喜譽之畏謹足恭未嘗忤物或曰公位尊何自屈折答曰世路孔艱直者先禍不爾豈全吾軀非公言直道不萌於心顏真卿立朝正色剛而有禮非公言直道不萌於心以直道進退李絳以直道進退望冠一時賢不肖太分屢為讒說所中激浮競宋申錫素孤直少與及進用議者謂可以激浮競元稹上疏人君始即位萌象未見必有狂直敢言者上或激而進之則天下君子望風曰彼狂而容于上其欲來天下士乎吾之道可以行矣其小人則竦利曰彼之直得幸于上吾將直言以徼利乎彊直守正徐晦彊直守正不沉浮於時世推敢直段平仲朝廷有得失未嘗不論奏世推其敢直云氣讜言直呂元膺為同州剌史既謝帝逮間政事所對詳詣明日謂宰相曰元膺氣讜言直宜留左右奈何出之李藩裴垍謝因言陛下及此乃宗社無疆之休臣等昧死請留元膺給事左右矜嚴悻直竇參為人矜嚴悻直果於斷以直言相周墀議河湟不合旨罷都尉鄭皓言於帝曰世謂墀矜嚴悻直以直言相亦以直言免性狷直張籍性狷直嘗責韓愈喜博裊及為駮雜之說論議好勝人其排釋老不能著書峭鯁李翱性峭鯁論議無所屈直道是陳柳宗元作陽城碣曰惟茲陽公乃作諫臣抗志庸義直道是陳鯁亮知名崔邠遷補闕上疏論裴延齡姦以鯁亮知名帝思質直賈隱林屬朱泚難率衆扈行在封武威群王賊解從臣稱慶隱林流涕前曰泚已奔群臣大慶宗社無疆之休然陛下資性急不能容掩若不悛雖今賊亡憂未艾也帝不以為忤拜神策統軍卒帝思其質直贈尚書左僕射谷那律從太宗出獵遇雨霑漬因問曰油衣若為而無漏邪那律曰以瓦為之當不漏帝悅其直清直亡欲席豫清直亡欲當官不為權直所憾資質朴直蔣乂資質朴直遇權臣秉政輒數歲不遷遇事不回崔祐甫性剛直遇事不回未始降屈魚朝恩凡詔會群臣計事朝恩怙貴誕辭折愧坐人出其上雖元載辨彊亦拱默唯禮部郎中相里造殿中侍御史李衎酬詰往返未始降屈搢紳賴以為彊李石當軸秉權亡所撓方是時宦寺氣盛陵暴朝廷每對延英而仇士良等往往斥訓以折大臣石徐謂曰亂京師者訓注也然其進孰為之先士良等恧縮不得對氣益奪搢紳賴以為彊願任直臣郭子儀願任直臣則中興之功日月可冀容直臣田布入為左金吾衛將軍諫官嘗論事帝前同列將麾卻之布止曰使天子容直臣毋輕進犯顏冒禍人之甚害存焉陸贄直而無隱裴皞性剛急直而無隱五代史盆池魚明皇以李林甫為相一日曲宴近臣於禁苑中帝指示張九齡李林甫曰檻中盆池新魚數頭鮮活可愛林甫曰賴陛下恩波所養九齡曰盆中之魚猶陛下用人但能裝景致助兒女之戲耳帝不悅人皆美九齡之直天寶遺事賜箸表直宋璟為相朝野歸美時春御宴帝以所用金箸令內臣賜之曰賜箸以表卿之直也天寶遺事諧附者無黜剝之憂正直者有後時之嘆韓琬公異時有姦邪譖斥又可爾乎楊憑與御史中丞李夷簡素有隙因隙劾憑江西姦贓及憑罪姻友懼素無往候者徐晦至藍田慰餞宰相權德輿謂晦曰獨君送臨賀誠厚無乃為纍晦曰方布衣時臨賀知識今忍遽棄耶有如公異時有姦邪譖斥又可爾乎德輿歎其直稱之朝李簡遽表為監察御史晦過謝問所以舉之之由夷簡曰君不負楊臨賀肯負國乎明目張膽以報天子韋思謙褚遂良市地不如直思謙劾之出為清水令或吊之答曰吾狷直觸機輒發何暇恤身乎丈夫當敢言地要須明目張膽以報天子焉能録録保妻子邪先朝納諫諍直氣橫乾坤杜甫別李義詩德宗謂姜公輔為賣直而不能容德宗贊王魏善諫而房杜讓其直唐贊三代遺直魏徵贊柳芳稱徵死知不知莫不恨惜以為三代遺直疏直劉蕢與諸儒偕進獨譏切宦官然亦太疏直矣顯身以直遂兮衆之所宜蔽也柳宗完懲咎賦苟縱直而不羈兮乃變罹而禍俱同上佩韋賦睹直道守節者則壯蓋有激也同上群邪沮謀直道不勝陸贄翰苑集序推德輿忠直孝友羽儀王室張薦顏真卿視端形直心無岐徑柳宗元書曰狀貌嶷然類丈夫視端形直心無岐徑其質氣誠可尚也韓休峭鯁韓休峭鯁時政得失言之未嘗不切直上每從禽苑圃張樂禁中稍為過差必顧左右曰韓休知否言畢而諫疏輒至上嘗引鏡自照默然不樂左右曰自韓休入相陛下無一日盡歡何不逐去使天顏戚戚上曰吾貌雖瘦天下必肥恃直而不戒韓愈釋言今我恃直而不戒禍其至哉直不近禍柳玭家訓白君子以振民育德德言盛美言德以盛為美進德修業欲及時也君子以懿文德天地之大德曰生皋陶邁種德失道而後德老子皇天無親惟德是輔德無常師太上貴德潤身禮德潤身德以柔中國禮上德不德是以有德老子曰樹德務滋威懷非威非懷何以示德雅頌者美盛德之形容大德不逾間語吉德凶德晉文公能以德政涼德薄德也德星聚陳太丘詣荀淑元方將車季方驂乘群幼坐於車中荀淑使慈明應門行酒文若小坐於膝餘六龍下食太史奏德星聚五百里內有賢人聚德量魏文帝察黃權有德量欲試驚之使左右催權交錯於道官屬莫不魂懾而權顏色舉止自若仇覽家人莫見喜怒聲色而雅裴遐在東平將軍周馥坐與人圍碁馥司馬行酒遐未即飲司馬曳遐墮地遐徐起還坐色無變碁如故性和有如此者避火王徽之俱有雅量一旦火發其舍徽之走不遑取履獻之怡然命左右扶出以此分優劣也霹靂夏侯玄倚柱作書霹靂柱玄書如故諸葛誕亦然臨賊蜀費褘文言時魏軍至假禕往禦之來敏詣禕禕別來圍碁時羽檄交至人馬擐甲儼駕訖禕與敏竟日對戲色無倦敏曰試君耳必能辨賊也果有功又苻堅入寇朝野震恐謝玄入見安安夷然不懼曰已別有旨又令張玄重請安遂與玄出遊山墅與玄碁賭墅安常劣於玄是日玄懼便敵手不勝日暮歸部署其所鎮物如此也咸有一德惟有慚德德以施惠德輶如毛既飽以德以德綏我反德為亂崇德報功惟德動天明德務崇明德惟馨棄德不祥為政以德以德和人德成而上度德以處德惟善政欲報之德在乎德行汪汪萬頃陂黃叔度大略趙充坦腹王羲之敗面見寬恕門超將中軍原軫將中軍先以下軍超將中軍故曰上德也德之不修是吾憂也語有鄰子曰德不孤必有鄰德延延久也書惟寧王德延君奭秉德不康康安也非我周秉德不康寧多方作德心逸日休周書恃德者昌史黎民敏德虞書言民敏疾修德德儉有度一德廣所及望而畏之貌足畏也色足憚也德禮不易英華外發尊其瞻視威而不猛莊而安容止可觀動則思禮行則思義監其德也德之恭也德之聚也德施普也德之輿也上德不德秩秩德音恭儉惟德率德改行果行育德其德不回德音是茂禮以防德懿文德既阻我德皆有嘉德陰德韓厥存趙孤太史公曰韓厥感晉靈公紹存孤以成程嬰杵曰之義韓氏陰德於趙其大者與魏終為諸侯十世宜乎邴吉病漢邴吉病上使加紼而封夏侯勝曰未死臣聞有陰德必享其樂以及子孫今吉未獲報非死病果愈于公閭于公閭壞父老治之公曰必高大其門令容駟馬高蓋我治獄多陰德子孫當有興者至定國杲為丞相升卿虞詡祖曰吾治獄多活人後世雖不及子公何知不至九卿乎故字詡曰升卿葬書生後漢王忳字少林詣京師於空舍中見一書生病困愍而視之生曰吾腰下有金十斤相贈乞藏骸骨未及問姓而絶忳鬻一斤營葬餘悉置棺下無知者後忳為大度亭長至亭有馬入亭中風飄繡被墮忳前忳後乘馬馬牽忳入他舍主人認馬忳具云云主人曰所埋者我貌也姓金名産此陰德報君也埋牛肉晉周於鄉人有盜牛者於冢間訪得密埋其肉不使知之叔敖斬蛇史係叔敖見兩頭蛇恐人更見乃斬埋之叔敖母曰夫有陰德必有陽報汝必當貴後為楚令尹活千人有封和喜鄧太后訓女叔陔言嘗聞活千人子孫必封兄訓為謁者治石曰河歲活數千人天道可信家必蒙福初太傅禹歎曰吾將百萬衆未嘗妄殺一人後亦有與者全濟順烈皇后父商曰我先人全濟河西活者不可勝數積德必報當在此女也靜陰合德不告而退遂亡見孝祿養門齊衰三年史程嬰立孤兒訖還自殺趙武服齊衰三年春秋祀之世世不絶行成於內天惟報施神亦福謙積善之家必有餘慶為而不恃聖人施德不望報老子德服人德則不競傳曰德則不競尋盟何為引車史藺相如位在廉頗上欲辱之相如知每引車避之後頗肉袒負荊謝罪德攻晉文公能以德攻人飲德吳程普以年長侮周瑜瑜折節下之不為校普自敬伏乃告人曰與周瑜交若飲醇醪不覺自醉也飲德既飲以德詩君子之德風人皆改操飾行許劭子將為功曹太將徐璆敬之府中莫不改操飾行同郡袁紹云濮陽今歸車徒甚盛入界謝賓客曰吾輿服豈可使豫將見之遂以單車歸也孫生至孝黃巾不犯孫先生舍以孫至孝陳實所短陳實仲弓鄉里化其德人有過曰寧為刑罰所加不為陳君所短王烈誘人先賢行狀曰王烈識道達義其誘人皆因性氣誨之後有盜牛者發曰罪責甘心乞不使王烈知也烈聞之遺布一端以激其心後老父遺劍於路有一人守之乃是盜牛者心服戴良才高見黃叔度未嘗不正容乃歸惘然有失母曰汝復從牛醫兒來耶對曰良不見叔度不自謂不及既觀其人固難得而測矣陳蕃周舉相謂曰時月不見叔度則福吝心生蕃為三公歎曰叔度在吾不敢先佩印綏避盜賞盜與盜開路並見盜門牛犯禾皇甫諡高士傳曰管寧幼安鄰有牛犯寧禾牽牛著涼處飲食過於牛主牛主大慚若犯嚴刑是以左右無鬥訟河海之潤河海之潤千里盛稱及四海左傳行成于身唯有德者能以寬服人德化逢萌修道人皆化之以德後漢無毒草譬如靈著在林林無毒草威鳳在野野集仁禽是以子將為吏人皆改操後漢許子將世德前訓國語叔詹曰昔用前訓文侯之功武公之業可謂前訓世濟其美不隕其名高陽才子家聲克紹前烈書父作之子述之無違命傳曰自幕至瞽瞍無違命舜之先也世名清廉漢王吉至孫崇世名清廉陳氏公卿陳實為太丘長子紀為司農孫群為司馬世有重名語曰公慚卿卿慚長也伏不競後漢伏湛九世祖伏生經學清淨無競故東州號伏不競楊氏名德楊震伯起八世祖僖封赤泉侯高祖敞丞相父寶陳居自農至七世名德震及玄孫彪四世為大尉世有名德羊祜九世並清德聞祖續父述汜育字雉春奕世敦睦逮育九世人號其家兒無常父衣無常主孔為國基於德禮魏徵云德禮國之大綱又曰德禮形則遠者來格國之大綱不可斯須廢也以德並凶勢不相入陳子昂婁公盛德婁師德狄仁傑未輔政婁師德薦之后曰朕用卿師德薦也誠知人矣出其奏仁傑慚已而歎曰婁公盛德我為所容乃知吾不逮遠矣本傳質厚少緣飾元德秀虞世南五絶虞世南帝每稱其五絶一曰德行風度凝遠宋璟風度凝遠人莫涯其量天下推為舊德張鎬起布衣二期至宰相在位雖淺而天下之人推為舊德徐岱不談人短外嚴重中寬厚令狐楚外嚴重不可犯而中寬厚博厚恢大之德陽城出為道州剌史太學諸生何蕃等二百人頓首闕下請留城柳宗元聞之遺蕃等書曰公有博厚恢大之德并容善僞來者不拒有狂感小生依托門下飛文陳愚論者以為陽公過於納汙風度沈整房琯風度沈整世推長者盧知猷器量渾厚世推為長者足乎己無待於外之謂德韓文原道德有吉有凶同上人不能窺其際陽城居位八年人不能窺其際拜御史臥家無喜色孫伏伽始伏伽伽拜御史時先被內旨而制未出歸臥家無喜色頃之御史造門子弟驚白伏伽徐起見之時人稱其有量以比顧雍李石中人自邊還走馬入金光門道路妄言兵且至京師歡走塵起百官或襪而騎臺省吏稍稍遁去鄭覃將出石曰事未可知宜坐須其定宰相走則亂矣若變出不虞逃將安適人之所瞻不可忽也益治薄書沛然如平時置怨結歡李吉甫李泌竇參器其才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州剌史使甘心焉既至置怨與結歡人益重其量器量方峻楊於陵器量方峻進止有常度器局峻整裴垍器局峻整持法度又竇威有器局莫可得窺蕭穎士送弟旭東歸序沖融坦蕩莫可得而窺也深沉有度量婁師德深沉有度量人有忤已輒遜以自免不見容色嘗與李昭德偕行師德素豐碩不能遽步昭德遲之恚曰為田舍子所留師德笑曰吾不田舍復在何人蓄雄剛之峻德韓愈上于頔書性和易於人無所不容薛存誠陰德在人陸元方臨終取奏槁焚之曰吾陰德在人後當有興者本傳白中令應舉屢不第詣胡蘆先生問命生不許之意無科級之分試日排安上門人馬駕肩鬧擁公顧見一婦人攜女奴挈二合在鬧中女奴力倦置門闑門將闢失婦人與女奴所在合留在闑公以參裾衛合恐為他人所搆日晏杳然欻南望向之婦人啜泣而來出聲啼號公詰之婦人反袂拭面而言夫犯刑憲罪案已圓在今辰明辰其家道豐厚然所蓄一寶帶有能救護者惟欲寶帶且曰今辰五鼓親遣女使齊合當鬧中失所在今夫不免極弄矣公備認物主不繆於元安置處給還婦人再拜泣謝而去赴試不及遂罷一舉翌日訪胡蘆生見公驚異且曰公去歲相過邪曰然公來年及第位極人臣必近種陰德公匿之而不言芝田録張杜有後豈用法雖深而治者或能去天下之惡除生人之害所以然也贊皇公陰德論全救數十族裴遵慶調大理丞邊將蕭克濟督役苛暴役者有醜言有司以大逆論遵慶曰財不足聚人力不足加衆焉能反由是全救數十族本傳裴度質狀眇小既屢出名場會有相者在洛大為搢紳所神公特造之相者公形神稍異不入相若不至貴即當餓死他日出遊香山寺忽一素衣婦人致緹緁於欄楯上祈祝良久而去度見緹褶在舊處知其遺忘也遂收取以待婦人再至日暮竟不至度挈歸逆旅詰旦復攜往寺門始闢昨日素衣疾趍而至托聲睕嘆若有非橫訊之曰阿父無罪被繫告人假得玉帶二犀帶一直千餘緡以賂津要不幸去失于此今老父不測之禍無所逃度撫然詰其物色因授之婦人拜泣請留一度笑而遣之尋詣相者審聲色頓異驚曰必有陰德前途萬里後必位極人臣出托言白贈人以言史孔子去周老子送之曰仁者贈人以言夫聰明深察近於死者議人也博辨宏達危身也規我子寧以他規我卒事不規傳曰王使椒舉立向戍子産之後以規過卒事不規曰禮吾所未見者有六焉又何以規之良規戢卿良規大夫規誨傳補察其過匡其不及苦言良針諍友規誨四孔陳呂后祿産禍敗事劉仁軌上疏辭疾因陳呂后祿産禍敗事以規后后遣武承嗣齎璽書慰勉詔太子諸王謝規諷意裴光廷撰瑤山往則維城前軌二篇獻之手制褒美詔皇太子諸王於光順門見光廷謝所以規諷意也蔣欽緒出為華州刺史蕭至忠自晉州被召過欽緒本姻家戒曰以君才不患不見用患非分而求耳至忠竟及禍劉延祐李績戒之曰子春秋少而有美名宜稍自抑無為出人上延祐欽納白直方大義以方外通天下之志以賢制爵周禮出其言善則千里應之髦士攸宜昭明有融高朗令終南山有臺樂得賢也南有嘉魚樂與賢者共之棫朴文王能官人也慎其獨君子潔矩之道有方之士不尚賢使人不爭老子恥名之浮於行難進易退三揖而進一辭而退賤貨貴德賢者不隕獲於貧賤不充詘於富貴去讒遠色賤貨貴德所以勸賢清明在躬氣志如神從善如流賢哉回也求善不厭賢者子孫宜有後也行賢而能去賢安往而不愛賢人集荀陳之會見德門注吉人為善惟日不足擇善而從為善不改其度孳孳雞鳴而起孳孳為善者舜之徒也朝有進善之旌為善最樂後漢明帝問東平王處家何等最樂對曰為善最樂詐善張湛居室修整雖遇妻子如嚴君人謂湛詐善湛曰人皆詐惡我獨詐善何傷乎動不纍高晉謝鯤通簡有識人服其遠揚而悟於榮辱自處若穢而動不纍高守節傳曰前志有之賢守節選賢與能任賢勿二取賢斂才舉賢援能進賢受上賞親賢下無能也賢賢易色國之紀人之望賢者信賢而任之君之明也議賢而下之臣之忠也呂氏春秋一沐三握髮一飯三吐哺周公下接白屋之士後世稱聖賢傷賢者殃及三代蔽賢者身當其害達賢者福流子孫嫉賢者名跡不全黃石公三略人之清者為賢賢不肖之杖鬻子惟后非賢不乂書得地千里不如得一賢士呂氏春秋黃金纍千不如一賢建官惟賢書素履賤貨責得所心觀賢魏文得譽於諸侯魏文侯師卜子夏敬假干木田子方得譽於諸侯叔堅圖形於屈廟後漢馬叔堅鄉里圖其形於屈原廟陳蕃解榻陳蕃敬徐孺特致一榻來則解之去則懸之慕賢執鞭所欣慕太史公曰晏子在余雖執鞭所欣慕傾慕漢臨邛令不敢嘗身請司馬相如相如往一座盡傾慕之慕藺司馬相如本名犬子慕藺相如為人遂名相如李杜齊名見義感門注喜御荀粲常就李膺門因為其御既還喜曰今乃得御李君矣其見仰慕也如此折角巾郭林宗行遇雨巾二角墊士人故折其巾角以效之蒲葵扇謝安風流時多愛慕故人罷中宿縣還有蒲葵扇五萬安取中者題之京師慕效競市價數倍掩鼻詠謝安能詠為洛下書生有鼻疾故音濁名流學詠者掩鼻效之衣練王導為太保時帑藏諸庫中唯練千端鬻之不得國用不給導乃製練布單衣士人翕然效之練遂湧貴何敢望回賜也語希顏慕藺孟母三徙以擇善見善如不及見善若驚聞義能徙里仁為美擇不處仁焉得知衣潤而行霧室香而襲衣景慕景行龍門李膺元禮以聲名自高士有得接遇者名為登龍門見賢思齊執轡魏公子執轡迎侯嬴軾廬魏文侯軾假干木之廬止戈於秦以己方人知賢與選部知人藻鑒門雜吾之師表黃憲字叔度世貧賤荀叔遇憲於逆旅時年十四竦然異之謂子吾之師表也既前見袁閬所未及勞問叔曰子國有顏子識之乎閬曰見吾黃叔度耶倒屣王粲字仲宣詣蔡雍雍倒屣迎粲粲年少容貌小短座盡驚雍曰王孫有異才吾不如也吾家書籍文章當盡與之張孝廉劉琰為丹陽尹張憑字長宗詣琰延之上坐言彌日當留宿至旦遣之憑遂還船須臾琰傳教覓張孝廉船便召同載托子薛宣為不其丞琅邪太守趙貢見宣悅其能還至府舍令妻相見戒曰貢君至丞相我子亦中丞相先噉牛心王羲之字逸少年十三謁周顗顗異之時重牛心灸坐客未噉顗先割噉羲之由是知名又托子魏三輔決録曰張既德容世寒素貌童時功曹游殷察之邀既過家設賓饌其妻笑之殷曰方伯器也與論王霸之略遂以子楚托之後既薦楚為漢興太守求縣石苞字仲容既知名詣吏部郎許允求為小縣允曰卿我輩人當相引在朝何小縣乎苞曰不意允知已也如此武庫五兵周弼見裴頠歎曰若武庫五兵縱橫一時之傑晏子贖越石父在縲紲中見知人門謝尚就袁宏見風流門孔斗南一人狄仁傑司馬李孝廉每曰狄公之賢北斗以南一人而已內無聲妓娛玩崔從位方鎮內無聲妓娛玩士大夫賢之以一賢敵七國衆李雍下獄許昌男子孔璋上書天子曰昔吳楚反漢得劇孟則不憂夫以一賢而敵七國之衆博選賢傑張玄素時太子事游畋玄素上書曰宜傳選賢傑朝夕侍左右官人惟賢政所以治也陳子昂奏官人惟賢政所以治也然君子小人各尚其類若陛下好賢而不任任而不能信信而不能終終而不能賞雖有賢人終不肯至又不肯勸反是則天下之賢集矣議者乃云賢不可知人不易識臣以為固易知固易識得賢須任又曰陛下知得賢須任今未能者蓋以嘗信任者不效如裴炎劉禕之周思茂騫味道固蒙用矣皆孤恩前死以是陛下疑於信賢臣固不然昔人有以噎得病乃欲絶食不知食絶而身殞賢人於國猶食在人人不可以一噎而止餐國不可以謬一賢而遠正士僥幸開則賢者隱韋嗣立建言僥幸開則賢者隱賢者隱則人不安人不安國將危矣木枕布衾質錢陽城拜右諫議大夫常以木枕布衾質錢人重其賢爭信之夷淡多容可康敬休夷淡多容可不飲酒食肉不邇聲色俊賢黃金臺貯俊賢多杜甫治君之用能置賢智於近而置愚不肖於遠使君子小人各適其分而身享安榮五代史楊綰以德服人而人自化可謂賢矣其論議渾大雖古王佐無以加本贊喪亡之國在賢哲之所扶匡柳宗元賦賢者常不遇韓休書賢者常不遇不賢者比肩賢者常無以自存不賢者志滿氣得賢者雖得卑位則旋而無不賢者或忘主有專不知造物者意如何無乃所好惡與人異心哉不知無乃都不省記臣其死生壽天耶未可知也慕司馬遷渾瑊慕李德裕蕭遘行六白行發乎邇見乎遠易言行君子之樞機易行過乎恭師氏教國三行一孝行以親父母二友行尊賢良三順行事師長孝友而睦姻親行前定則不疚危言危行行成於內行篤敬行成而先言過其行君子恥之內行翟方進內修行善行修身踐言謂之善行積行纍功行有枝葉素行景行污行達行孟子曰柳下惠不辭小官不羞汗君進不隱賢必以其道遺逸而不怨厄窮而不憫與鄉人處悠悠然不忍去也曰爾為爾雖袒裼裸程於我側安能浼我哉徐景山通介有恆語具節操門魏虞欽著書稱徐邈曰志高行潔言顧行行顧言士有百行士二其行儒行修大行者不拘小節孔無檢幅溫彥博裔孫庭筠薄於行無檢幅夷惠不能全行高馮上五事以為今外官卑品皆未得祿故飢寒之切夷惠不能全行不飾細行于琮宣宗詔選士人尚公主者皓語琮曰子有美才不飾細行為衆毀所抑能為之乎行方介崔琯行方介有器蘊己長形彼短己清彰彼濁朱偓性通簡不驕飾嘗曰士苟有行不必以己長形彼短己清彰彼濁修潔獨行畢隆擇睿宗嘉隆擇修潔獨行有古人風輿疾上道潘炎劉晏任權炎乃其壻晏得罪坐貶澧州司馬時輿疾上道不自言于邵高其介千邵孝悌有行晚塗益修潔進人以行則枝葉安有難別乎劉蕢卓然高行隱逸衛大經卓然高行口無二言潔身亂世以全吾志權皋顏真卿表為行軍司馬拜起居舍人固辭嘗曰潔身亂世以全吾志欲持是受名邪李季卿為江淮黜陟使列其高行以著作郎召不就自力讀書不謁州郡甄濟耕宜城野自力讀書不謁州郡歲飢節用以給親里大穰則振其餘於鄉黨貧缺者朋友有緩急輒出家資周贍以義聞天下高其行不名謂之元魯山遠近慕其行陽城謙恭簡素遇人長幼如一遠近慕其行來學者跡接于道行悖義言異行未嘗見其行有悖乎義言有異乎行者則徐之棄也柳宗元序性情七白利貞者性情也易懲忿窒欲致命遂志吉凶以情遷愛惡相攻而言凶生情僞相感而利害生習以性成惟民生厚因物有遷不忌不克天命之謂性率性之謂道人心不同其如面焉傳卞急好潔邾莊公成性人各有性張竦答陳遵曰人各有性長短自裁子欲為我亦不能吾將效子亦敗矣厚貌深情禮人各有心翼奉字少君曰知臣之術在六情十二律五性不相害五行所屬之性六情更廢興東方性仁西方性義南方性禮北方性智觀情以律視性以歷明王所宜獨自難與人共露之別不神獨行則自然韋弦西門豹情急珮韋自戒後漢范丹以性狷急亦佩韋自戒董安于性緩佩弦而自戒窮理盡性以至於命達於情聖人達於情遂於命性不可逸老子曰性不可逸命不可變時不可止性與天道不可得而聞也受性於父母後漢高獲與世祖有舊祖曰欲善當改剛性獲曰臣受性於父母不可改遂辭之吟詠情性以風其上詩序反情以和其志禮情深而文明禮性猶湍水孟子性相近習相遠語孔鄙遠浮華蕭瑀性鯁急鄙遠浮華恬淡韓思復謇特王羲方性謇特高自栗樹簡潔蕭浼性簡潔以聲利為汙疾邪太甚方重不苟言笑韋安石天性質厚韋斌幹局明彊戴胄性堅正幹局明彊性疏而果曰卿性疏而果恐以此孝友蕭復不苛察王圭性不苛察臨官務舉綱維去其不可者至僕妾亦不見喜慍明鋭元稹性明鋭遇事輒舉傾邪張又新忌前險譎多端李隆吉和厚尹知章性和厚人不見有喜慍未嘗有産業謹厚宗室道玄簡重張鎬奢豪河間王孝恭性奢豪然寬恕退遜無矜伐色嚴重少言鄭珣瑜恭畏徐康王元禮謹潔汝陽王璡謹柔李熅性謹柔材無過人者敏獪馬三寶性通率竇威雅淡未始忤物杜黃裳淡於接物武元衡雅性莊重雖淡於接物而開府極一時選浮險杜兼知天盡其心者知其性知其性則知天矣存存成性存存形色天性叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為太戚知若敖氏之鬼不食也人之性果善乎韓文原性后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎雜佛老而言今之言性者雜佛老而言也雜佛老而言奚言而不異性也者與生俱生者也情也者接於物而生也同上性之品有三而所以為性者五情之品有三而所以為情者七同上性之品有上中下三上焉者善而已矣中焉者可導而上下也下焉者惡而已矣其所以為性者五曰仁曰義曰禮曰智曰信上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也上者可學而下者可制性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪故上者可學而下者可制也下之情莫不願達於上上之情莫不求知於下陸贄白樂天知命故不憂易窮理盡性以至於命以聽天命得之自是不得自是以聽天命不知命莊子曰聖人達於性遂於命命不可變見上不知所以然而然得之在命文子曰所受天之命所遭於時有其才不遇於世命也求之有道得之有命故君子能以為善不能必受其福不忍為惡未能必免其禍故逢時進得之以義何幸之有不逢時必讓何不幸之有道之將行命也道之將廢命也公伯寮其如命何列子有力命論各正性命命可長也短長之命不知命也天命之謂性孔竇威仲尼棲遲不偶餘見勸學高竇贊曰古來賢豪不遭興運埋光鏟采與草木俱腐者可勝吒哉人稟天地而生而謂之命蕭瑀嘗以劉孝摽辨命論詭悖不經乃著論非之以謂人稟天地而生而謂之命至吉凶禍福則繫諸人今一於命非先王所以教人者修短天也馮宿疾革將斷重刑家人請宥之宿曰命修短天也撓法以求祐吾不敢命屯子今委修短豈得恨命屯杜甫詩非人力所支長孫皇后疾太子欲請大赦曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求帝聞嗟美命薄不能勝扈載王朴問李榖載不為舍人何也榖曰非不知其才然載命薄恐不能勝朴曰公為宰相以進賢退不肖何言命邪已而召拜知制誥及為學士歲中卒位三公年踰八十非命乎李績疾諸子固以藥進輒曰我山東田夫爾位三公年踰八十非命乎生死繫天寧就醫求活耶死生有命李玄道李密署記室密敗為王世充所執衆懼不能寐獨玄道曰死生有命憂能了乎釋縳為著作贊皇公荀悅哀王商論以仲尼之德足以塞叔孫之毀以仲尼之仕足以免陳蔡之困以仲尼之智足以避匡人之辱以仲尼之道足以容魯哀之世而逼迫多懼殆於危亡由是思之無非命也命之否也龍虎不能免於患及命之秦也蛭蚓皆得保其生名士以才為命婦人以色為命同上折群疑相論百年賦命定豈料沉與浮杜甫送韋平事命與時俱背才將聖不偶命與時俱背李白贈從弟弗耕而望收李白命解或曰貴與富在我而已以智求則得之不求則不得也何命之為或曰不然求之有不得而不求有得之者皆命也人事何為二子出或問曰二者之言其孰是也對曰是皆陷人於不善之言也以智而求之者盜耕人之田者也皆以為命者弗耕而望收者也吾無取焉爾命之窮通自我為足下曰命之窮通自我為之吾恐未合於道足下徵前世而言之則知矣若曰以道德為己任窮通之來不接意則可也韓文與衛中行書不遇興詞鬱厖眉之都尉數奇見惜坐猿臂之將軍柳睢陽碑命之窮勢之極柳文書命之窮勢之極其卒呼憤自斃不復望於上矣命乃天也今天子興教化定邪正海內皆欣怡愈而僕與四五子者獨淪陷如此豈非命歟命乃天也非云云者所制餘又何恨同上書主相造命李泌帝曰且建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞罰矣自古聖賢多薄命英雄惡少皆封侯杜
