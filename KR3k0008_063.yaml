body:
  text: 卷第六十三白服從恩制喪以禮成孝思喪紀孝無終始終堂禮由恩降喪以服差禮定親踈服差輕重哀從中來禮自外作服別輕重喪從旁殺恩辨親踈哀自中來恩從旁殺恩殺制節順變從宜節哀順變稱情立文子生三年然後免於父母之懷夫三年之喪天下之通喪也三年無改於父之道喪事不敢不勉在縗絰之中喪思哀哭泣之哀齊斬之情饘粥之食自天子達執親之喪水漿不入於口者三日杖而後能起子游曰喪事有進而無退所以即遠也儼然在憂服之中惡室之內哀素之心欒欒之貌毀瘠也蓼蓼之哀蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞喪事雖遽不凌節故騷騷爾則野太疾鼎鼎爾則小人太舒君子蓋猶猶爾舒疾之中表冠喪不慮居為無廟也謂賣宅舍以奉喪事顏丁善居喪始死皇皇然如有求而不得及殯望望然如有從而不及居喪之禮毀瘠不形形骨露也視聽不衰升降不由阼階出入不當門隧隧道也常若親存喪容纍纍羸憊色容顛顛音田憂思貌言容繭繭聲氣微也敬為上哀次之瘠為下顏色稱其情戚容稱其服孔子曰少連大連善居喪三日不怠三月不解解倦也期悲期年三年憂東夷之子也言生於夷狄而知禮縣子曰三年之喪如斬痛甚父母之喪不避涕泣見人夫悲哀在中故形變外也居於倚廬寖苫枕塊苴杖食粥所以為至痛飾也三日而食三月而沐不以死傷生也無父何怙無母何恃父兮生我母兮鞠我風樹曾子曰風欲靜而樹不止子欲養而親不待蓼莪之痛御恤苴麻之飾孝先百行憂負三年靡瞻匪父靡依匪母致喪三年致衰於喪父沒而不能讀父之書手澤存焉母沒而杯圈不能飲而口澤存焉禮無容言不文喪不過三年示民有終也父沒觀其行親沒旁殺兄弟伯叔之喪也禮上殺俱已上下殺孫以下稅喪追服也稅音退蔬食飲水禮三年之喪見親疏之殺焉禮喪多而服五三年之喪稱情而立文禮創鉅之痛茹荼之痛杯圈之慕節哀順變者君子念始念父母不欲傷己情喪有四制變而從宜有恩有理有節有權其恩厚者其服重禿者不免以禮制也創鉅者其痛深喪有無後無無主袒括髮去飾之甚也喪具君子恥具一日二日而可為者君子不為也具棺之屬子食於有喪者之側未嘗飽也喪不貳事稱家之有無喪不若禮不足而哀有餘哭踊有節勉而為瘠孟子曰勉而為瘠則吾無能乃使疑吾不以清居瘠者乎魯悼公喪以情居瘠用禮節哀五十不致毀七十唯衰麻在身飲酒食肉處於內喪者不遺人喪食雖惡必充飢飢而廢事飽而忘哀非禮出視不明聽不聰行不正不知哀君子病之故有疾飲酒食肉皆為疑死國禁哭則止謂祭禮婦人不居廬不寢苫不枕塊父母既練而歸期九月既葬而歸歸謂歸夫家無服之喪內恕孔悲喪與其易也寧戚孔無緦麻喪崔琳開元天寶間中外宗屬無緦麻喪跣護柩行千里崔衍父倫居父喪跣護柩行千里道路為流涕容貌癯毀李百藥侍父母喪還鄉徒跣數千里雖除容貌癯毀者累年徒跣血流劉審禮父母比葬徒跣血流行路咨嘆審禮為虜執持詔令其庶弟易從省之既至而審禮卒易從晝夜哭不止吐蕃哀其志乃還父屍徒跣萬里扶護以歸見者流涕哀毀如成人王方翼蚤孤哀毀如成人時人號孝童士人賢其孝張道源年十四居父喪士人賢其孝縣令郭湛署所居曰復禮鄉至孝里鄰里為泣王助七歲喪母哀號鄰里為泣以母喪不仕崔元翰補湖城主簿以母喪不仕王方慶嘗以令期及大功喪未葬不聽朝賀未除弗豫享宴比群臣不遵用頹紊教誼不可長有詔申責內外畏之匿喪李抱真卒其子殿中侍御史緘匿喪與其屬盧會昌元仲經謀會諸將仲經詭抱真令曰吾疾不任事令緘典軍勉佐之副使李說及諸校俯首皆曰諾緘感服出眾拜之蔬飯水飲席地以暝宗室函創巨痛仍號于穹旻壽州安豐李興亦有至行柳宗元為作孝文銘曰惟時高高曾不是聽創巨痛仍號于穹旻閭里細人每有重喪不即發問韋挺拜御史大夫是時承隋大亂風俗薄惡人不知教挺上疏曰父母之恩昊天罔極創巨之痛終身何已今衣冠士族辰日不哭謂為重喪親賓來弔輒不臨舉又閭里細人每有重喪不即發問先造邑社待營辦具乃始發哀至假車乘雇棺槨以榮送葬既葬鄰伍會集相與酣醉名曰出孝望一切懲革劉滋在母喪毀瘠幾死時謂劉孝子本傳居喪過哀二白孝乃行先則宜銜恤子為親後安可危身雖哀則在中敬以為上子曰敬為上哀次之論以哀情誠合從其至者合其喪禮亦可俯而就之服從恩制喪以禮終喪與其易也寧戚子游曰喪致乎哀而止不止滅性君子有終身之憂念其親也而無一朝之患曾子曰吾執親之喪水漿不入於口者七日子思曰先王制禮也過之者俯而就之高子羔執親之喪泣身三年未嘗見齒言泣無聲如出泣也未嘗見齒笑之微也君子以為難喪禮不若禮不足而哀有餘喪主哀也節哀順變者君子念始也始生也念父母生己不欲傷其性也毀不危身為無後也子春之母死五日不食曰吾悔之悔其過禮也先王制禮患其過於制也不以死傷生也勉慎終之情雖聞於寧戚守念始之義宜忘平致哀宜抑情而就禮多奚以為苟踰制而危身過猶不及季路不除宣尼患其過制趙孟又降楚子知其有田因心之孝在疾之儀執之以情爾雖有說謂之曰禮吾則不知喪事主哀禮喪紀之容謂纍纍顛顛也周禮雖三年之喪吾從至者而一朝之患子盍慎諸難繼禮云人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哭踴有節雖在禮而難傳且於人而加等孟獻子禫懸而不樂比終而不入夫子曰獻子加於人一等矣敬為上哀次之瘠為下創鉅之情罔極杯圈之慕何深喪食雖惡必充飢飢而廢事非禮也雖孝因喪見而哀以禮終喪雖寧戚禮亦節哀雖不勝喪乃比於不慈不孝漢萬右君元朔五年卒建哭泣杖而能起後歲餘亦卒不哀宰我問三年之喪期已久矣三年不為禮禮必壞三年不為樂樂必崩子曰食夫稻衣夫錦於汝安乎對曰安汝安則為之宰我出子曰予之不仁也魯昭公居喪而不哀在戚而有嘉容比及葬三易衰衰衽如故衰言嬉戲無度葬齊姜昭公不戚昭公母也晉使者曰其不沒乎有三年之喪而無一日之戚臨喪不哀吾何以觀之哉跂而及之子思曰先王制禮不至者跂而及之禮不足而哀有餘不思生育之恩遽忘怙恃之痛素冠刺不能三年詩有飾情之禮無稱服之容既垂在疾之儀是爽因心之孝孝思不子匪人喪食飽而忘哀非禮也鳥獸之不若雖不從其至者亦宜跂而及之曾子責子夏曰喪爾親使民未有聞焉孔憔然在苫塊中于志寧為太子詹事屢諫太子太子大怒遣張師政紇于承基往刺之二人者入見志寧憔然在苫塊中不忍殺乃去紀膏沐紀王謹女東光縣主王死號慟嘔血數升免喪絕膏沐者二十年柴瘠宗室暠居母喪柴瘠訖除家人未嘗見言笑毀幾不生王維母喪毀幾不生劉孝子劉滋在母喪毀瘠幾死時謂劉孝子居喪以禮郭曜居喪以禮疾甚或勸茹蔥薤終不屬口哀感不食丁公著三歲喪母甫七歲見鄰媼抱子哀感不肯食父喪貌力癯惙見者憂其死哀踊如成人權德輿七歲居父喪哀踊如成人毀瘠過禮奚陟居親喪毀瘠過禮父喪戚加於人王起父播喪哀戚加於人毀甚高士廉履行居母喪毀甚太宗諭使彊食哀癯過常竇抗居喪哀癯過常勺飲不入口五日房玄齡父喪勺飲不入口五日羅讓父喪幾毀滅服除布衣糲食茹毒終身文粹李華崔孝公沔文集序喪期有數而茹毒終身稱曰孝子崔祐甫汾河義橋記絳人有成橋于稷山縣南汾河水上入境稱曰孝子詢之三十喪父母五十猶麻縗故鄉黨捨氏不名貴之也抱終身之戚獨孤及李華中集序太夫人棄敬養公自傷悼雖除喪抱終身之戚嗌不粒食徐浩張曲江碑公丁內憂奔喪南訃毀無圖生嗌不粒食母喪以毀卒呂才母喪以毀卒布車從母喪羸瘠多病顏相時師古弟也羸瘠多病師古死不勝哀而卒母喪解毀不勝哀有紫芝產坐側白鳩白雀巢冢樹張九齡傳李朝隱母喪解召為楊州大都督長史固辭見聽時年已衰而篤于孝自致毀瘠士人以為難有疾三白曾子曰喪有疾食肉飲酒必有草木之滋焉以為姜桂之謂也增以香味為其疾不嗜飲食也居喪之禮頭有創則沐身有瘍則浴有疾則飲酒食肉疾止復初食旨不甘饘粥之食悲哀在中故形變於外疾痛在心口不甘味食不安美也傷腎焦肺言痛之甚也痛心疾首禿者不免偃者不袒跛者不踊非不悲也身有痼疾不可以備禮也孝子服勤三年身病體羸以杖扶病可也毀瘠為病君子不為也喪食歠王人主婦室老為其病也君命食之尊者易奪人也夫功衰食菜果飲水漿無鹽酪不能食食鹽酪可也功衰齊斬之末也既葬若君食之則食之矣大夫父之友食之則食之矣不避粱肉若有酒醴則辭變顏色見不可為君何食魯桓公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之達禮視君之母與妻之喪比之兄弟發喪顏色亦不飲食兄弟之喪內除也小君服輕亦內除也發諸顏色謂醲美酒食使人醉飽也衎爾君子母與妻之喪居處飲食言語衎爾衎爾自得貌孔勸茹蔥薤終不屬口注見居喪過哀門見者憂其死孝注見居喪過哀門因得痺疾崔元亮父喪客高郵臥苫終制地下濕因得痺疾不樂進取郤吊者陳叔達居喪又有疾太宗憂之遣使禁郤吊者白不為制服後漢袁閎居土室母沒不為制服設位世莫能名伯鸞死孝叔鸞生孝戴良叔鸞母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭二人俱有毀容典略曰世謂云過者俯而就之不至者跂而及之先王之制圍棋晉阮籍至孝母終與人圍棋對者求止留決賭既畢而飲二斗一號吐血數升將葬又食一蒸肫飲酒二斗又吐血毀瘠骨立王戎死孝戎母喪性至孝不拘禮飲酒食肉或觀弈棋容貌毀瘠杖而後起裴顏往吊之謂人曰若慟能傷人不免滅性之譏矣時和燆亦居大喪之禮自恃哀毀不逾於戎帝謂劉毅曰和嶠使人憂之毅曰嶠生考王戎死孝宜先憂之借馬追婢阮咸居喪借馬追姑家婢時甚非之慕阮籍姚興時京兆韋高慕阮籍為人居喪彈琴飲酒黃門郎吉成詵以文章雅正參掌機密聞之泣曰吾私刀斬之以樂風教遂持劍見高高懼而逃走丸藥晉陳壽君喪毀瘠疾病使婢丸藥弔客來見之獲譏於世沉累數年三易衰魯昭公見上注宋子明謂桐門右師曰吾猶衰絰而子擊鍾何也以同宗恩責之也右師曰喪不在此故也退而告人曰已衰絰而生子余何故捨鍾已子明也不廢樂晉謝安因以謝萬喪十年不以音樂及登台輔期喪不廢妓樂王坦之論之不從衣冠效之又晉梁龕明日當除婦服今日請客奏妓周顗等三十人同會丞相司宜劉隗奏請免龕官削侯爵顓等奪一月俸龕為廬江太守又叔向曰周景王一歲而有三年之喪二焉與喪賓蒸王雖不禭蒸樂以早非禮也注王后太子卒博賭袁耽字彥道倜儻不辨桓溫少時遊博徒資產盡猶有負欲求濟於耽耽時在艱略無難色遂變服懷布帽隨溫與債主戲耽素有博藝債者聞之而未相識謂之曰卿當不辨作袁彥道否遂就局十萬一賭直上百萬耽投馬絕叫探布帽擲地曰竟識袁彥道否其通脫如此孔游處不度皇甫鎛居喪游處不度下除詹事府司直久之頓食雞肉五代史馬希聲葬殷上潢希聲不哭泣頓食雞肉數器而起其禮部侍郎潘起譏之曰昔阮籍居喪而食蒸豚世豈乏賢邪召伶人作樂南漢劉玢襲在殯召伶人作樂裸男女以為樂或衣墨縗與娼女夜行釋縗拜賜呂諲擢同中書門下平章事會母喪解三品嘗賜門戟或勸諲以凶服受吉賜不宜諲釋縗拜賜人譏其失禮本傳喪婚五白左傳曰冬公如齊納幣魯莊公也注云不譏喪娶者不待貶責而自明也前年文姜薨今未三年也公羊夫人婦姜至自齊不稱姜氏貶也譏喪內娶無貶公之道公與夫人一體也居叔母喪而婚晉王籍之為太子文學居叔母喪而婚丞相司直劉隗奏之帝曰詩稱殺禮多婚今日之謂也可一解禁今已後宜為防也在叔父喪嫁顏含為東閤祭酒在叔父喪而嫁女隗又奏之妹喪嫁女梁州刺史楊欣有妹喪未經旬日車騎長史韓預強聘其女張輔為中正貶預以清風俗孔母亡遺占丐成禮蔣乂擢右拾遺張忠孝子茂宗尚義章公主母亡遺占丐成禮帝念孝忠功即日召為左衛將軍許主下降乂上疏以為墨縗禮本緣金地未有奪喪尚主者繆盩典禮違人情不可為法帝令中使者諭茂宗之母之請乂意殊堅帝曰卿所言古禮也今俗借吉而婚不為少對曰俚室窮人子旁無至親有借吉以嫁不聞男冒凶而娶陛下建中詔書郡縣主當婚皆使有司循典故毋用俗義公主春秋少待年不為晚請茂宗如禮便以凶瀆嘉太常博士韋彤裴堪諫曰婚禮主人几筵聽命稱事立文謂之嘉所以承宗廟繼後嗣也喪禮創巨者日久痛甚者愈遲二十五月而畢謂之凶所以送死報終示有節也故夫義婦聽父慈子孝昔魯侯改服晉襄墨縗緣金革事則有權變安有釋縗服衣冕裳去留室行親迎以凶瀆嘉為朝廷爽法疏入帝迂其言同上白恩既殊於輕重服亦異其精粗哀發乎中禮節其外喪以禮成服從恩制衣夫錦於汝安乎三易縗魯昭公事見上注在衰絰之中儼然在憂服之中喪冠不緌齊斬之情戚容稱其服如斬之情稱情之服苴麻至痛之飾其恩厚者其服重故為父斬衰飾情之禮稱服之容庶人不績者不縗周禮禮由恩制哀以服差哀紀禮容禮曰衰與其不當物也寧無衰也不當物謂精粗廣狹不中制度而惡其亂斬衰苴杖竹也父喪齊衰削杖桐也母喪傳曰晏桓子卒晏嬰麤衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草君子曰非大夫之禮也曰卿為大夫也此平仲之謙也君子衰絰則有哀色斬衰三升齊衰四升五升六升三等謂降正義大功七升八升九升降服大功七升正服大功八升義服大功九升小功十升十一升十二升八十縷為升緦麻十三升十四升十五升此哀之發於衣服也本恩制服父為長子三年傳曰正體在上所以傳重也庶子不為長子三年不繼祖也重其當先祖正體故三年禮曰三年之喪既練矣有期之喪既葬則帶其故葛帶絰服期之絰服其功衰父卒為母三年尊得伸也繼母如母傳曰繼母配父與因母同故孝子不取殊注因親也慈母如母傳曰妾之無子者妾子無母父母妾曰汝以為子命子曰汝以為母若是則生養之終其身如死則喪之三年貴父之命也注云大夫士之妾子也母為長子三年傳曰父所不降母亦不敢降不敢以尊降祖禰之正也父在為母期至尊在不敢申其私尊父必三年而後娶達子之志嫡子父在不為妻杖以父為喪主出妻子為母期則為外祖父母無服為父後者為出母無服者喪不祭故也世母叔母期以名服也為姑在室之為人後者為其父母期服傳曰不貳斬姑姊妹女子子適人無主者姊妹服傳曰無主祭者注云無主後之哀不忍降也婦為舅姑傳曰從服記曰齊衰不以邊坐大功不以服勤公叔朱有同母異父之昆弟死子游曰其大功者乎狄儀有同母異父之昆弟死子夏曰魯人則為之齊衰郕人有兄死子皋為之衰郕人曰蚕則績而蟹有匡范則冠而蟬有緌無服之殤子生三月則父名之死則不哭無而服之哭殤而以日易月者子生一月哭之一日凡言子者兼男女也傳曰中殤何以不見大功之殤中從上小功之殤中從下問曰據從昆弟之下殤在緦麻也大功小功皆謂服其成人也大功殤中從上則齊衰殤亦中從上此主大夫為殤服不見者以此求之夫叔之長殤小功布衰裳即葛五月不見中殤明從下也小功不為位者是委巷之禮子思之哭嫂也為位申祥之哭言思亦然言思祥妻之昆弟小功不稅則是遠兄弟終無服也而可乎據禮不稅曾子以己恩怪之庶子為父後者為其母緦麻三月與尊者為一體不敢服其私親士為庶母三月以名服也大夫以上為庶母無服乳母三月以名服妻之父母三月從服也從妻服之改葬緦謂墳以它故崩壞將亡失尸柩故也童子唯當室緦當室謂父母後同爨緦從母之夫舅之妻二夫人相為服君子未之言也或曰同爨緦以同居為恩士妾有子而為之緦無子則已孔縗麤李訓以王守澄進仲言尚縗麤帝使衣戎服號王山人與鄭注出入禁中服除為四門助教張柬之曰先王立其中制以成文理是以祥則縞帶素紕禫則無所不佩服紀一用古制盧履冰歷言古者父在為母期徹靈而心喪武后始請同父三年非是請如禮便玄宗疑之又以舅嫂叔服未安並下百官議是時言喪服各以所見奮交口紛騰七年乃下詔服紀一用古制自是人間父在為母服或期而禫禫而釋心喪三年或期而禫終三年或齊衰三年唐史縗者古居喪常服孫成嘗有期喪吊者至成不易縗而見客疑之請故荅曰縗者古居喪常服則廢喪也今而巾帕失矣降母服盧履冰曰議者或言降母服非詩所謂罔極者而又與伯叔母姑姊妹等且齊斬已有升降則歲小不容異也此迂生鄙儒未習先王之旨安足議夫禮哉使賢不肖共成文理聖人之於禮必制中制使賢不肖共成文理而後釋彼伯叔姑姊烏有筵杖之制三年必喪卒服縗李愬早喪所生為晉國王夫人所鞠王卒晟以非嫡敕諸子服緦愬獨號慟不心晟乃許服縗節之以禮文粹張東之駮三年服議直為節之以禮無可奈何故由也不能過制為姊服鯉也不能過期哭其母輸綾絹為喪服五代漢臣蘇逢吉妻武氏卒諷百官及州鎮皆輸綾絹為喪服父在為母服齊衰三年則天皇后武氏建言十二事父在為母服齊衰二年去縗麻之服襲錦榖之衣行道之人皆不忍也張柬之駮服議起苴絰使和鐘律非人情所堪楊瑒帝封太山集樂工山下居喪者亦在行瑒謂起苴絰使和鐘律非人情所堪帝許乃免入為國子祭酒蔣乂張茂宗尚義章公主母亡遺占丐成禮乂上疏以為墨縗禮云緣金革未有奪喪尚主者繆盩典禮違人情不可為法韋彤裴堪亮諫曰安有釋縗服衣冕裳釋縗拜賜呂諲會母喪解三品當服門戟諲釋縗拜賜人議其失禮不褫衰絰邵說自陳天寶中始仕會喪客河洛祿山亂喪紀當終不褫衰絰又再期懼終不免陰走洛魏雜服七白練冠以喪慈母自魯昭公始也祖父卒而後為母三年祖在為祖母如父在同母久而不葬唯主喪者不除其餘以麻終月孔氏不喪出母自子思始也不為伋也妻則為白也母南宮縚之妻之姑之喪夫子誨之髽曰爾無扈扈爾無從從爾從從太高扈扈太廣蓋榛以為笄長尺而總八寸夫為人後者其妻為舅姑大功傳曰杞孝公卒晉悼夫人喪之姊妹也服術有六有屬從已為母黨有徒從妻為夫黨臣為君黨有從有服而無服有從無服而有服從重而輕有從輕而重父子歸制服魏李胤字祖敏為河內守公孫度欲用之遂去莫知所終胤父追求積年情若居喪而不娉娶鄰居故人與父同年者因制服徐邈勸娶妻室胤遂絕房室亂孤幼居喪又設木主祭祖也詐服晉殷仲堪為荊州王欽詐服迎拜父喪律當棄市仲堪曰律處重老謂父在而詐服耳今欽父實先終與父在不同遂活之孔行服如所親李人亮歿後所育孤姓為人亮行服如所親者十餘人中外宗屬無緦麻喪崔朴開元天寶間中外宗屬無緦麻喪為所獎引服緦麻崔融死膳部員外郎杜審言為融所獎引為服緦麻畢創卒二妹為服三年小傳服絁縵董晉金吾將軍沈房有期喪公除常服入閤帝疑以問晉乃對曰故事朝官期以下喪服絁縵不復衣淺色南班亦如之盧履冰曰為嫡子三年斬衰而不去官尊祖重嫡崇其禮殺其情也如喪其親初齊王憲女釐居綱厚恤之及卒又被髮號哭如喪其親李綱傳浮屠惠義卒衰服送其喪嚴挺之溺志于佛與浮屠惠義善惠義卒衰服送其喪乃葬於塔左君子以為褊眾子服期唐文粹王積荅杜君書眾子服期其妻小功兄弟之子猶子也其服亦期先儒以為其妻亦小功惟王肅以為喪服之例旁尊皆執明公以為重於子妻之服失禮之差此則袁準之義也士林美之裴佶所與友皆第一流鄭餘慶尤厚善既歿餘慶為行服士林美之哀毀如大喪畢創始喪繼母而二妹襁褓身鞠養至成人及卒妹為創服弟栩留司東都聞疾馳歸哀毀如大喪雖變服未嘗笑天下稱其友悌白除喪先重者男子除乎首婦人除乎帶將軍文子之喪既除喪而後越人來吊主人深衣練冠待于廟垂涕洟子游曰亡於禮者也禮不忍除子路有姊之喪可以除之矣而不除也孔子曰何不除也子路曰吾寡兄弟而不忍也子曰患其過於制也遂除之又後漢江革母終不忍除服郡守遣丞掾擇服因請為也汝南薛包行服六年後漢記曰除殤之喪也必玄不朝必純言於成人為釋橝服除成喪者其祭也朝服縞冠成人也縞冠未絕祭服也孔二十五月王元感初著論三年之喪以三十有六月譏詆諸儒張柬之破其說曰三年之喪二十五月由古則然除喪不仕尹愔以親喪哀毀除喪不仕終身之戚文粹獨孤及李華中集序除喪抱終身之戚母喪解召為楊州大都督府長史固辭見聽李朝隱赴屯解琬以喪免武后顧琬習邊事迫追西撫羌夷琬因乞終喪后嘉許之詔服除赴屯以功擢中丞吳兢母喪去官服除自陳修臾有緒家貧不能具紙筆願得少祿以終餘功拜諫議大夫復修史崔從為嚴震府推官母喪免兄弟廬墓手蓺松柏喪闋不應辟命久之本傳母喪已除凡辟命皆不荅許康佐已除猶屏處丘園畢創居親喪毀棘甚已除猶屏處丘園本傳白韋泓託應詹晉書泓屬亂離依託詹詹分甘苦營伉儷及宅並薦之詹卒制朋友服祭之終身趙武為程嬰服齊衰三年管仲遇盜取為公臣及死桓公使為之服袁逢舉荀爽不應及卒制服三年後漢傅燮再舉孝廉聞所舉卒棄官行服向苗舉桓鸞為膠東今會卒奔喪終三年樂恢為本郡吏太守坐法奔喪行服魏徐楫請龐濟為主簿楫死送喪行服晉陸景為祖母所育心喪三年周翼為舅郤鑒去職心喪三年孔服縗絰李勣李密誅勣為密服縗絰葬訖乃釋稱情立文文粹魏徵定服制義嫂叔不服蓋推而遠之也或有長年之嫂遇孩童之叔劬勞鞠養情若所生稱情立文其義安在嫂叔舊無服今請服小功五月為服緦麻崔融撰武后哀策最高麗絕筆而死杜審言為融所獎引為服緦麻崔融傳白燮父固為梁冀所誅燮匿於人家得免十餘年梁冀誅乃還鄉里追行喪服與姊相見悲感路人袁紹追行父服袁紹生而父卒遭母喪服竟又追父服凡在廬冢六年禮皆歸洛陽非海內知名不得相見東海孝王臻及王儉並有篤行母亡皆吐血毀瘠至服練兄弟追念初喪父幼小哀禮有闕重喪制也稅服先王制禮過時不舉禮孔發哀服喪五代蕭希甫梁袁象先為青州節度使以希甫為巡官希甫不樂乃棄其母妻變姓名亡之鎮州莊宗滅梁遣希甫宣慰青齊希甫始知其母已死而妻袁氏亦改嫁矣希甫乃發哀服喪居于魏州服過制十一白子路有姊喪可除而不除子曰行道之人皆不忍先王制禮不可踰遂除之禮過之者俯而就之不至者跂而及之伯魚之母死期而猶哭子曰嘻其甚也伯魚聞之遂除之曾子曰父母之喪不除可乎子曰非不能勿除也患其過制也故先王制禮過時不舉禮也晉衛崇為庶母服三年顧和曰禮以執物成教心奪天屬之性今冒越皆下太常奪服盧欽字子若妻亡廬杖終喪不御酒肉劉寔不以為罪詩序曰素冠刺不能三年曰庶見素冠兮宰我問三年之喪期已久矣子曰予也有三年之愛於其父母乎予之不仁也薛宣兄弟相駮漢薛宣貢君為丞相弟修為臨淄令後母卒修去官持服宣謂修三年喪人少能行之兄弟相駮不可修竟行服兄弟由是不和翟方進後母終既葬二十六日除服自以身備漢相不敢踰國家之制度汝南薛包行服六年後漢妻服魏薛勤喪妻不哭曰幸不為夭何復恨哉又順帝時山陽太守王襲字伯宗妻卒與諸子並杖行時人兩議之孔服除仍衣布飯蔬虞世南出繼叔陳中書侍郎寄之後故字伯施陳天嘉中父荔卒世南毀不勝哀時寄陷於陳寶應世南雖服除仍衣布飯蔬寄還乃釋布噉肉五十猶縗麻文粹崔祐甫汾河義橋記絳人有成橋于稷縣入境稱曰孝子詢之三十而喪父母五十猶縗麻故其鄉黨捨氏不名貴之也畏名教之嚴唐王元感仲尼不能過制為姊服孔鯉不能過期哭母彼詎不懷畏名教之嚴也論遂廢四年不釋服歐陽通居廬四年不釋服妹為服三年畢隆擇始隆擇喪繼母而女妹襁褓身鞠養及卒妹為服三年變服未嘗笑同上弟栩聞疾馳歸哀毀如大喪雖變服未嘗笑形容癯毀路敬淳居親喪倚廬不出者三年服除號慟入門形容癯毀妻不之識去官十二白父母之喪三年不從政喪不貳事不從政也君子不奪人之喪喪亦不可奪致事記曰夏后氏既殯而致事殷人既葬而至事周人卒哭而致事注謂還職位於君魯公伯禽有為為之謂金革無避今以三年之喪而從其利者吾不知也後漢趙岐去官為親行服薛宣兄弟相駮見上注戴封以伯父喪去官姊喪陳重為細陽令政有異化州舉尤異當遷會稽太守以姊喪去官舅喪晉郤鑒字道徽值永嘉亂窮餒鄉人共飼之每攜兄子邁外生周翼往就食鄉人辭不能兼鑒乃獨往著飯兩頰還吐食二兒並得存鑒卒翼解職席苫心喪三年孔鬻薪韓思復以親喪去官鬻薪自給委節去位奉喪以居東都詔再起之辭以羸毀不任即命又加喻勉固守不變韓愈楚國人人墓誌白前母晉東平王懋上書云相王昌父毖居長沙有妻息後仕魏更娶昌母今昌聞前母喪所服謝云宜相報謝猛云不應服詔以終始爭絕不應服相為服吳國朱基娶陳氏生子東伯入晉晉賜妻生子綏伯基亡以歸吳兄弟養交二母篤先後之序及死交相為服鄭元疊鄭子郡娶陳司空從妹更娶蔡氏徐州平二妃並存蔡氏生子元疊為陳氏服嫡母服如子視猶子也為伋也妻則為白也母孔非嫡李晟以蔭補早喪所生為晉國王夫人所鞠王卒晟以非嫡敕諸子服緦愬獨號慟不忍晟乃許服縗白溘先朝露虐士死者化為異物逝者子在川上曰逝者如斯夫不捨晝夜死生有命屬纊以俟絕氣易簀曾子薤露長夜魂遊岱宗遊岱之魂死者人之終居常而待終埋玉庾亮死曰埋玉樹著泥中使人情何能已壽非金石休我以死溘然而至即至違代物化文子曰其死也物化白騎過隙莊子曰人生天地間如云云夜舟難守朝露易唏人之將死其言也善天喪予問死季路問死子曰未知生焉知死受賜而死禮死而不吊者三畏壓溺謂其身志孝也畏人或以非罪攻己而不避其死壓行止危險之下溺不乘舟橋如何不淑吊辭也禮男子不死於婦人之手婦人不死於男子之手君子重終代窮數盡大夜宛其死矣詩捐館逢天之戚無祿使人逢天之戚天命殞絕棄于良也就木死生契闊子在回何敢死人之云亡出生入死死之徒十有三老子反真水死後漢王延壽文考年二十餘水死乘舟遇風自投水中淮南子曰乘舟遇風波而恐死自投水中非不貪生也畏死也惑於畏死而忘生也人之嗜慾者亦復如此周禮死道路者則埋而置楬任器於有地之官詩曰行有死人尚或埋之百歲之後歸于其室其居閱水川閱水而成川世因人以成世偃然寢於巨室莊子喪妻怛化死者不可復生史淳于緹縈上書請以身贖父之罪死喪之威兄弟孔懷短命不幸有顏回者不幸短命苗而不秀秀而不實者有矣夫不得永年若使憂能傷人此子不得永年矣孔融與曹公云生有修短之命文選不永降年有永有不永短折洪範六極一曰凶短折早代短命之不長傳天之報施何其寡歟不見嫁娶魏志管輅字公明自歎曰天與我才不與我壽恐四十七八間不見女嫁男娶婦也卒時果四十八歲短折曰不祿禮死生有命終短無期札瘥夭昏未名曰昏左右謂邾文公曰命可長也君何不為邾子曰死之短長時也傳矧余制乃短長之命書祈天永命孔命屏左右李大亮臨終就槁歎曰吾聞男子不死婦人手命屏左右言終卒一朝成千古薛收卒秦王與其從兄子元敬書曰吾與伯褒共軍旅間何嘗不驅馳經略款曲襟袍豈其一朝成千古也就木李綱上書太子曰綱老矣幸未就木備位保傅異得效愚鄙歎其早死薛收卒秦王其後圖學士像歎其早死不得與死家簀祝欽明贊曰欽明獨保腰領死家簀思苦神竭崔融撰武后哀冊曰取高麗絕筆而死時謂云云阽死郝處俊卒詔官生葬事裴炎為白帝曰處俊阽死諉臣曰生無益于國死無煩費凡詔賜願一罷之帝聞惻然荅其意五色繩子劉禹錫嘉話趙相將薨長安諸門金吾見一小兒豹犢鼻攜五色繩子不旬日趙相浮生每多塗趨死惟一軌韓文秋懷猶朝有暮盧承慶卒誡其子曰死生至理猶朝有暮吾死歛以常服葬勿卜日恐不與同返岑文本從伐遼東神用頓耗容止不常帝憂曰文本今與我同行恐不與同返矣至幽州暴病卒身歿官第無留貲世重其廉云程异本傅不過數十寒暑柳宗元書曰悲夫人生少六七十者今三十七矣長來覺日月益促歲歲更甚大都不過數十寒暑無此身矣堂史署制僕懷中即死夏侯孜出為河中節度使猶同平章事初堂史署制仆孜懷中即死不數日孜罷與客夜宿客暴死張道源并州祁人嘗與客夜宿客暴死道源恐主人忽怖臥尸側至曙乃告所存惟圖書及酒數斛仲子陵及亡其家所存惟圖書及酒數斛而已以後事累公楊國忠帝在華清宮驛追國忠還林甫病已困入見床下林甫曰死矣公目入相以後事累公國忠懼其詐不敢當流汗被顏林甫果死遂拜右相發憤卒韋安石郭震入奏安石護作定陵有所盜被詔籍其贓安石歎曰祗須我乃已發憤卒薛戎悉奉廩賙濟內外新既病以所有分遺之曰吾死矣可恃為歸資眾皆哭而去大限韓愈祭薛中丞文長塗方騁大限俄窮主軫不憖之悲具寮興云亡之歎殞靈韓文玉樓李商隱李賀小傳長吉將死時忽晝見一緋衣人駕一赤虯持一版書若太古篆或霹靂石文者云當召長吉予不能讀欻下榻叩頭言阿彌老且病不能去緋衣人笑曰帝成白玉樓立召見為記天上差樂不苦也長吉竟死彭聃安在哉周孔亦已沉柳宗元覺衰氣魄且盡令狐楚重泉歐陽詹上鄭相公書其或素畜當在重泉之下矣奄忽為災張曲江賜新羅王水土不習食飲異宜奄忽為災遂至不救遽迫歸泉之期劉禹錫慰太尉薨表古今為長夜天下同寢寐唐張說注文選嘆逝賦燔骸成灰天笁國死者燔骸成灰建窣堵或委野中及河餌鳥獸魚鱉無喪紀不封摩伽陀死者葬于野不封植喪制為黑衣滿年而除玉魚符下戎幕閑談曰勳郎李迪朝下歸第馬上昏昏如醉過其門不入既而若寢覺焉見二黃衫人引至一戶外欲入中有人曰未來須待玉魚符下也乃醒後入朝龍尾道地上見一玉魚光瑩奪目雕刻奇麗恐他人先得遽以袍袖收之及歸馬上把玩至家與童孩戲弄見之因省其語不樂果數日而逝巫新麥以為讖果不得其所餐短不足悲修不足歡柳文多為泉下人李白門有車馬客行借問宗黨間多為泉下人復魄昭丘遠歸魂素滻偏杜甫哭李尚書玉折之官方玉折寄葬與萍漂同上哭王彭州掄或倏先狗馬遺恨九原杜甫進大禮賦表死故鄉新羅張保皋鄭年保皋既貴於其國年飢寒客漣水一日謂戎主馮元規曰我欲東乞食於張保皋元規曰若與保皋所負何如柰何取死其手年曰飢寒死不如兵死快況死故鄉邪過半黑頭死陰蟲食枯骴韓愈寄崔立之君看一時人幾輩先騰馳過半黑頭死陰蟲食枯骴耗思殫神溫彥博卒後帝歎曰彥博以憂國故耗思殫神我見其不逮再祺矣恨不許少閑不究其壽冥然長辭柳文冥然長辭如得甘寢無復恨矣杜曲晚耆舊四郊多白楊杜甫壯游詩流水生涯盡浮雲世事空哭長孫詩同上遠圖不究淮陽壯王道玄戰沒太宗曰惜其少遠圖不究哀哉因流涕殞落孟浩然卒樊澤為節度使時浩然暮碑壞符載以牋叩澤曰浩然文質傑美殞落歲久幽明茫然一慟腸絕柳宗元祭文拊膺長慟天道何如同上私泣百歲翁杜甫往在猶有淚成河經天復東注杜甫詩以玉鉞叩地王樸卒世宗臨其喪以玉鉞叩地大慟者數四五代史薛收卒王哭之慟本傳今汍瀾涕洟拜手于西韓愈與路鵠生序大懼哭于庭玄宗貴妃楊氏祿山反以誅國忠為名且指言妃及諸姨罪帝以欲皇太子撫軍因禪位諸楊大懼哭于庭國忠入白妃妃銜塊請死帝意沮乃止
