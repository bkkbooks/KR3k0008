body:
  text: 卷第二十四白乃寢乃興乃安斯寢北堂安寢北堂上晝寢宰豫晝寢子曰朽木不可雕也糞土之牆不可圬也於豫與何誅終夜不寢吾嘗終日不食終夜不寢寢不言論語寢不尸尸伸手足如死人安身傳夜以安身夙興夜寢孝經聖人之責宰豫弟子之嘲後漢邊韶字孝先教授數百人曾晝日假寐弟子私嘲曰邊孝先腹便便懶讀書但欲眠韶答曰邊為姓先為字腹便便五經笥寤與孔子談寐與周公議師若可嘲出何典記嘲者大慚寢無伏伏覆也禮東首禮君子寢恆東首東首生氣寢衣必有寢衣長一身有半語尚寢無覺詩云憂而欲寐假寐趙遁盛服將朝尚早坐而假寐鉏麑曰不忘恭敬民之主也明發不寐詩目炯炯而不寐孔酣臥李大亮身三職宿衛兩宮每番直常假寐帝勞曰公在我得酣臥韋綬為學士帝嘗幸其院韋妃從會綬方寢學士鄭絪欲馳告之帝不許神相趙昶巢之圍昶夜掫師疲而寢如有神相之者犁曙決戰士爭奮死頭陽睡五代劉延朗初延朗與房嵩並掌機密每延朗議事則垂頭陽睡不省睡王述律每酬飲自夜工旦晝則常睡國人謂之睡王五代史四夷附録欹眠欹眠聽新詩韓愈鼻息如雷鳴道士倚牆睡鼻息如雷鳴石鼎詩序間詠松風眠時遊敬亭上間詠松風眠李白贈宣城太守北窗常晝眠崔今學陶令北窗常晝眠贈崔秋浦腹搖鼻息曉鼓一發車馳馬奔豫方高枕偃然就寢腹搖鼻息夢到鄉國槐花鳴蜩噪庭孫樵乞巧文寢甚安李玄道為王世充所執衆懼不能寐獨玄道曰死生有命憂能了乎寢其安龜息袁天綱又相李嶠曰睡則息從耳出名龜息後必貴瓊筵寶幄連枝錦燈燭熒熒照孤寢李白搗衣篇尸寢驚弊裘杜甫晦日尋崔吊慶參請多亦廢闕嗜酒好睡其癖已痼往往閉戶便經旬日吊慶參請多亦廢闕至於俯仰進趨隨意所在杜牧書白意氣史記意氣高作威於世謂游俠惡少漠昭帝元鳳五年發三輔及郡國惡少年以戍遼東英俊之域西京賦游俠之場結客少年場輕死重氣結黨連群殺吏執仇漢書長安奸猾浸多少年殺吏受財執仇相與操丸為彈得赤丸者斬武吏黑者斬文吏城中薄暮塵起剽劫死傷橫道及尹賞為長安令乃穿地深數丈名為虎穴捕群盜內穴中數日視其尸相枕藉而死幽并之俠曹子建詩借問誰家子幽并游俠兒張趙之倫並俠客也文選劇孟之俠漢書劇孟洛陽人以任俠知名季布之諾漢收季布在俠立然諾之信氣蓋關中俠客少年連交合衆節慕原嘗名亞舂陵四公子也文選結儔附黨五陵之俠豪俠豪右感分遺身七啓曰雄俊之從交黨結倫輕生重氣感分遺身此游俠之徒求名殺吏賈勇報讎然諾則黃金不易失意則白刃相讎燕市荊軻飲燕市夷門侯嬴夷門抱關操丸之俠剚刃之讎杯酒間古詩失意杯酒間白刃起相讎背公死黨謂六國時背公死黨之義成守節奉上之義廢漢興未及匡王游俠序言信行果太史公曰游俠行雖不軌然猶言必信行必果知禁反正非明王在上示之以好惡齊之以禮法曷由知禁而反正四豪六國之罪人謂孟嘗等四公子殺身亡宗郭解之倫四夫之細竊生殺之權觀其溫良泛愛振窮周急謙退不伐亦皆絶異之資惜乎不入於道德放縱於末流殺身亡宗非不幸也並游俠傳序藏活豪士魯朱家藏活豪士以百數陰脫季布於危及布貴終不見劇孟周亞夫至河南得劇孟曰七國舉事而不求劇孟吾知其無能為已母死送車十乘而家無十金之産郭解字翁伯靜悍陰賊少藏亡命作奸剽攻劫鑄錢掘冢年長乃改節以德報怨姊子為人所殺賊窘自歸解解曰吾兒不直遂不罪其賊以此時人皆義之解出入人皆避然恭飾未嘗乘車入縣庭解史子斷揚掾頭公孫弘曰解以布衣以睚眥殺人雖不知罪尤甚遂族解氣蓋關中季布心長事袁紹弟畜灌夫氣蓋關中少年任俠者竊其名以行者衆也不以親為解袁盎家居劇孟嘗通盎盎厚待之人謂盎曰孟薄徒也將軍何曰通之盎曰孟急人之急造其門不以親為解撗穎川灌夫交通無非豪俠撗穎川穎川之人歌曰穎川清灌氏寧穎川濁灌氏族推埋王溫舒少時推埋為奸借客報讎朱雲字游少通輕俠借客報讎馳騖閭閻權行州里力折公侯柳市萬章字子夏居長安柳市孔以俠聞盧祖尚家饒財好施以俠聞為俠行劉義少放肆為俠行以伉俠相矜甄濟家衛州宗為伉俠相矜濟少孤獨好學以文雅稱胡證晉公裴度未顯時贏服私飲為武士所窘證聞突入坐客上引觥三釂客皆失色因取鐵燈檠摘枝葉櫟合其跗橫膝上謂客曰我欲為酒令飲不釂者以此擊之衆唯唯證一飲輒數升次授客客流離盤杓不能盡證欲擊之諸惡少叩頭請去證悉驅出故世人稱其狹縱蒱酒長安市哥舒翰家富饒財任俠重然諾縱蒱酒長安市任俠使氣郭元振為通泉尉任俠使氣撥去小節嘗盜鑄及掠賣部中口千餘以餉遺賓客百姓厭苦通於宮禁古押牙者富平居有游俠之才多奇計往通於宮禁出南部新書擊劍為任俠李白喜縱橫術擊劍為任俠輕財好施喜俠節竇建德喜俠節風流藪澤長安平康坊妓女所居之地俠少萃號風流藪澤天寶遺事間過信陵飲李白俠客行間過信陵飲脫劍膝前橫將炙啖朱亥持觴勸侯嬴三杯吐然諾五嶽到為輕義非俠不立俠非義不成贊皇公豪俠論俠者蓋非常之人也雖以然諾許人必以節義為本義非俠不立俠非義不成難兼之矣真俠鋤麑不賊孟宣承基不忍志寧斯為真俠矣同上弄閣或言剌客飛天夜義術也韓晉公在浙西時瓦棺寺因商人設無遮會衆中有一年少請弄閣乃投蓋而上單練口履膜皮猿桂鳥跂捷若神鬼復建罌水於結春下先溜至簷空一足欹身承其溜焉睹者無不毛寒珠衣仗劍張訓者吳丕祖之將校也丕祖在宣州給諸將鎧甲訓所得至弊怒形於色其妻謂之曰此不足介意但司徒苟知之必不爾明曰吳公問所由張以告公命易之後吳移廣陵常賜諸將馬訓所得亦駑馬弱妻言如前明日吳公又問之訓復以為言吳曰頃在宣州嘗賜諸將甲是夕夢一婦人珠衣衣直仗劍告豫所賜張訓甲甚弊當遂易之今賜諸將馬復夢前朱衣人告訓所得非良馬何哉訓亦不能測也訓妻有衣箱常自啓開未嘗見之一日妻也竊啓之果見劍一口珠衣一襲後乃知劍俠也紅線甘澤謠潞帥薛嵩有歌妓曰紅線當至德之後兩河未寧田承嗣有異圖欲併潞州募武勇超絶三千人號外宅男嵩聞以為憂每咄獨語紅線因侍問之嵩具告紅線曰此易耳妾願一到彼觀其形勢初夜首塗三更可還出戶忽不見未曉果復至取承嗣寢所金合夾嵩即遣使持送合遺承嗣書曰有客從彼來云自元帥頭邊得此金合承嗣大懼散外宅男河北遂寧飛劍剌木江南野史馬應昌善劍技初守吉州因休沐賓佐宴酣指梁棟間有竅者能於十數步外利飛劍剌之無不中者乃笑謂人曰吾長以儒術為事斯則少年之技於今亦無所試矣因引滿盡歡意氣素霓生李白俠客行趙客縵胡纓吳鉤霜雪明眼花耳熱後意氣素霓生少年學劍術淩鑠白猿翁珠袍曳錦帶七首插吳鴻由來萬夫勇挾此英雄風李白少年場行玉劍誰家子西秦豪俠兒李白詩所從皆博徒大俠隱太子建成資簡弛慢不治常檢荒色嗜酒畋獵無度所從皆博徒大俠白故舊不遺則民不偷不棄故舊無大過不相棄遺求舊人惟求舊半面之故敬故周禮太宰以八統御萬人二曰敬故謂不慢舊久要子曰久要不忘平生之言原仲季友傳曰季友如陳葬原仲仲季友之舊也恤養故人漢婁護君卿有故人呂公無子歸護護身與呂公妻呂嫗同食及護居妻子頗厭護流涕責曰呂公以故舊老窮寄身於我義所當奉遂養呂公終身孔隆于故舊李晟篤分義隆于故舊宿昔之好劉文靜唐公踐天子位擢納言時多引貴臣共榻文靜詠曰云云帝曰我雖應天受命宿昔之好何可忘契分愈密裴寂歷晉陽宮副監唐公雅厚及留守太原契分愈密引入臥內語平生丘和請入朝詔其子師利迎之及謁見高祖為興引入臥內語平生歡甚奏九部樂饗之接故舊如布衣時劉仁軌雖貴顯自矜踞接故舊如布衣時雖羇賤必均禮岑文本生平故人雖羇賤必均禮敦愛故舊薛季昶敦愛故舊布衣定交太宗皇后長孫氏兄無忌於帝本布衣定交以佐命元功出入臥內雖庸下與攜手韋表微篤故舊雖庸下與攜手語笑無間雅故郎餘慶遷交州都督歡州司馬裴敬敷與餘慶雅故以事笞餘慶婢父婢方嬖譖敬敷死獄中欺故因舊朱敬則五等論商鞅欺故友李斯囚舊交秋草日上階故人不過門秋草日上階李白舊不足倚柳宗元六逆論符氏進王猛而殺樊世乃興胡亥任趙高而族李斯乃亡舊不足倚盲宰相裴垍作相器局峻整人不敢于以私嘗有故人自遠詣垍資給優厚從容款狎其人乘間求京兆判司垍曰公才不稱此官不敢以人之私傷朝廷至公他日有盲宰相於公者得之垍則必不可孔平仲續世說不見故人十年餘不道故人無素書願逢顏色關塞遠豈意出守江城居杜甫寄岑嘉州白托孤可以托六尺之孤托妻子後漢朱暉同郡張堪素有名稱常於太學見暉重之接以友道把暉臂曰欲以妻子相托堪卒妻子貧暉候視賑贍之崔琰魏崔琰友人公孫方宋階早死琰撫其孤遺恩若己子兄子毛玠居位布衣蔬食撫兄孤子甚篤厚凌統吳凌統為將軍有功卒二子幼孫權收養宮中教讀書十日一乘鞍馬會群臣常召統子出示之曰吾家虎子山公撫嵇紹嵇康臨刑謂子紹曰山公尚在汝不孤矣分屋居張裔字君嗣與楊恭善及恭早死孤遺未成人裔迎與分屋居事恭母恭子長為娶置産業使立門戶經恤故舊賑贍衰宗行義至甚也分食邑魏曹真子丹少與宗人曹尊鄉人朱讚並事太祖三人早亡真乞分所食邑封遵六子詔褒美人分邑封二人子為關內侯食邑百戶字人之孤王成匿李燮恤孤上恤孤則人不倍養幼少存諸孤孔教撫孤姪王圭教撫孤姪雖其子不過也撫安薛收卒秦王與其從史子元敬書曰且家素貧而子幼善撫安之撫幼弟孤兄子宇文士及撫幼弟孤兄子以友睦稱柳仲郢李德裕貶死家無祿不自振及領鹽鐵遂取其兄子從質為推官知蘇州院宰相令狐綯持不可乃移書開諭綯綯從之親交無後者為嫁遣孤女韓愈凡內外親若交友無後者為嫁遣孤女而恤其家撫其孤至婚嫁成立錢徽與薛正倫魏弘簡善二人前死徽撫其孤至婚嫁成立拯孤恤窮李雍孔璋曰雍所能者拯孤恤窮嫁其孤女鄧景山與劉晏善其後家寒窶晏屢經紀之嫁其孤女二女為托韓充李元為河陽節度使署牙將未幾弘領宣武召主親兵元曰我知君舊矣吾兒不才無足纍君者二女方幼以為托遂辭去元沒為嫁二女周其家視恤其孤孟簡尚節義與之交者雖歿視恤其孤不少衰經贍其家蕭存韓愈少為存所知自袁州還過存廬山故居而諸子皆死唯一女在為經贍其家撫其二子李晟嵐州剌史談元澄嘗有德於晟後貶死晟既貴直其枉晟撫其二子為成就之願以桂兒為念鄭畋父亞任桂管觀察使畋生於桂州小字桂兒時西門思恭為監軍有詔微赴閣亞送於郊自以衰年以畋托之曰他日願以桂兒為念言訖泫然流涕思恭志之及為神策中尉亞已卒思恭使人召畋待之如甥姪因選師友教導畋後官至將相鎖言嫁故人孤女數十人嚴挺之重交游許與生死不易嫁故人孤女數十人當時重之戲謔五白善戲謔兮不為虐兮謔浪笑敖中心是悼伊其相謔惟士與汝戲談玩人喪德狎侮君子罔以盡其心前言戲之爾謂割雞焉用牛刀之言好弄傳夷吾弱不好弄戲也暴謔文選鄱陽暴謔中酒而作何晏曰鄱陽惡戲難與為曹不常矜莊鄭玄詩箋云君子之德有張有弛不常矜莊故有戲謔之日子雲之解客嘲孟堅之答賓戲孝先晝寢弟子興便腹之嘲言偃絃歌仲尼發割雞之戲鍾馬有利錐之戲士龍有白雉之嘲陸雲與荀鶴語曰既開青雲睹白雉何不張爾弓挾爾矢荀曰本謂雲龍騤騤乃是山鹿野麋獸弱弩彊是以發遲天子無戲言周公謂成王云不敢戲言成王沒齒受侮之旁狎禮不旁狎旁彊妄也狎侮玩也戲色禮曰不戲色靳之宋萬歸宋宋公靳之曰始吾敬子今子魯囚也吾不敬子矣萬病之遂弒宋公注戲而相狎曰靳也狗門晏子短小使於楚楚人為小門延晏子晏子對曰使狗國者從狗門而入臣使楚不當從狗門而入縛盜又縛盜置晏子之前楚王謂晏子曰齊國人也善盜乎晏子曰臣聞橘生江南北則為枳棘葉從似而味不同水土異也此人生於齊不為盜入楚為盜得無水土為盜耶諸葛子瑜吳諸葛瑾字子瑜而長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪即請筆益兩字曰之驢人伏其敏權即以驢賜恪白頭翁吳諸葛恪侍權坐有白頭烏集殿前恪曰白頭翁張昭年老疑恪戲之因曰恪欺陛下未有鳥名白頭翁請覓白頭母恪曰鳥有鶯母請覓鶯父相弄謔如此有司俱不罪張昭有悟於聽聞好狎不好狎納侮無啓寵紀侮書行前後晉孫綽興公好譏調與習鑿齒共行綽在前顧謂習曰沙之汰之瓦綽在後習曰簸之裼之糠秕在前潞涿君劉章有從事張裕饒鬚先主嘲之曰昔涿縣多毛姓東南西北諸毛繞涿郡裕曰昔有作上黨潞長遷涿郡令去官還家人與書欲署潞則失涿署涿則失潞乃署潞涿君先主無鬚故有此答以先祖相譏賈充嘗宴朝上瘐純後至謂曰君行常在人前今何在後純曰且有小市井事不了是以求後純之先曾為伍伯者充之先為市魁者故此相譏侮豫或敢侮豫孔名長意短口正心邪蘇世長帝大笑嘲曰何名長而意之短口正而心之邪世長曰名長意短誠如聖旨口正心邪不敢奉詔問官立所來張玄素始玄素與孫休伽在隋皆為令史太宗嘗問玄素宦立所來深目羞汗褚遂良見帝曰君子不失言於人明主不失言於戲故言則史書之禮成之樂歌之居上能禮其臣乃能盡力以奉其上近世宋武帝侮靳朝臣攻其門戶至恥懼狼狽前史以為非陸下昨問玄素在隋任何官對曰縣尉又問未為尉時曰流外又問何曹司玄素出不能徙步麵若死灰精爽頓盡見者咸共驚怪面似高麗楊再思張易之兄同休請公卿宴其寺酒酣戲曰公面似高麗再思欣然翦榖綴巾上反披紫袍為高麗舞舉動合節滿坐鄙笑也仰天相地姜師度喜渠漕是時太史令傳孝忠以知星顯時為語曰孝忠知仰天師度知相地嘲所嗜也好諧易陸長原好諧易無威儀點頭更擬蘇晉傳裴光廷知尚書有過官被卻者就籍以未點頭而已晉因榜選院曰門下點頭者更擬光廷以為侮己出晉汝州侵侮韓偓侍宴朱全忠崔胤臨陛宣事坐者皆去席渥不動曰侍宴無輒立二公將以我為知禮全忠怒偓薄己幸然出有譖偓喜侵侮有位胤亦與偓二侮笑自如許敬宗改中書舍人文德皇后喪群臣衰服率更令歐陽詢醜異敬宗侮笑自如貶洪州司馬李程不修儀檢滑稽好戲舊史李程不修儀檢滑稽好戲而居師長之地物議輕之頻伸諧戲劉晏所任者雖數千里外奉教令如目前頻伸諧戲不敢隱詔學士嘲之武平一宴兩儀殿帝命旨兄光祿少卿嬰監酒嬰滑稽敏給詔學士嘲之嬰能抗數人譽兒癖王勃傳其後助劼又以文顯福畤少子勸亦有文福畤嘗詫韓思彥思彥戲曰武子有馬癖君有譽兒癖王家癖何多邪死而後語五代馬胤孫周廣順中卒胤孫卒後其家婢有為胤孫語者初崔協為明宗相在位無所發明既死而有降語其家胤孫又然時人嘲曰生不能言死而後語錦衾爛兮五代史康福世本夷狄貴沙陀故常自言沙陀種福嘗有疾臥閣中寮佐入閣問疾見其錦衾相顧竊戲曰錦衾爛兮福聞之怒曰我沙陀種也安得謂我為奚聞者笑之兔園冊劉嶽傳宰相馮道世本田家狀貌質野朝士多笑其陋道且入朝兵部侍郎任贊與嶽在其後道斤數反顧問何為嶽曰遺下乃兔園冊爾兔園冊者鄉校里儒教田夫牧子之所誦故嶽舉以誚道也世修降表李昊初事王衍為翰林學士衍之亡也昊草降表至孟昶又草焉蜀人夜表其門曰世修降表李家當時傳以為笑謂麗景門為例竟來俊臣詔於麗景門別置獄敕俊臣等顓按事百不一貸王弘義戲謂麗景門為例竟謂入者例皆盡也胡頭應祝楊元琰敬暉等為武三思所構元琰知禍未已詭計請祝髮事浮屠戲曰胡頭應祝以多髭似胡云非所望於蕭傳蕭至忠後依太平復當國嘗出主第遇宋璟璟戲曰非所望於蕭傳至忠曰善乎宋生之言然不能自返也火迫酇侯朱泚初源休與姚令言勸泚圍奉天二人自比蕭何休顧令言曰成秦之業無輩我者我視蕭何子當曹參可矣即收圖籍貯府庫效何者人皆笑謂火迫酇侯宰相檐子入門五代盧程同平章事是時朝廷新造百度未備程始拜命之日肩輿導從喧呼道中莊宗聞其聲以問左右對曰宰相檐子入門莊宗登樓視之笑曰所謂似是而非者也坐有姓閻人同上史洪肇他日會飲王章酒酣為手勢令洪肇不能為客省使閻晉卿坐洪肇屢教之蘇逢吉戲曰坐有姓閻人何憂罰爵洪肇妻閻氏酒家倡以為譏己大怒確確無餘事曹確揚牧徐商路岩同秉政外有嘲之者確確無餘事金錢總被收商人都不管貨賂幾時休南部新書裴筠婚蕭楚女言定未幾擢進士第羅隱嘲之云細看月輪還有意信知青桂近嫦娥詩話目連變托言張祐柘枝詩云鴛鴦細帶拋何處孔雀羅襂付阿誰自樂天呼為問頭詩答曰公之長恨詞云上窮碧落下黃泉兩處茫茫俱不見此即目連訪母故也白著租庸使元載重斂州縣視其簿録其産而中分之甚者十八九時人謂之白著言其厚斂無名其所著者皆公然明白無嫌避渤海高雲有白著歌云上元官吏務剝削江淮之民多白著詩話飯甕熱發張林受眷於崔相昭緯或謁崔公曰何以久不見林曰飯甕子熱發崔訝飯甕不康之語林曰數日來水米不入非不康邪北夢鎖言既懷厚朴之才紀異録盧端揆質文筆俊健性好玩又為莊宗管記會醫學博士所司請槁公立草之筆不暫輟末句云既懷厚朴之才宜典從容之職莊宗覽之久為啓齒勿使瘡痍之後復作瘡痍同上韋莊為西川管記時王建聚兵甚衆供費尤多會有一縣宰記茲箕斂為部民所訟建以用兵岐隴徵督無常乃復用之公乃為建草牒詞云正當雕瘵之秋好安雕瘵勿使瘡痍之後復作瘡痍由是因之為口實錯認顏摽作魯公詩話顏摽咸通中鄭薰下狀元及第先是徐寇作亂薰意在激勸勳烈意摽乃魯公之後故置之巍科既而詢其廟院摽曰寒素京國無廟院薰始大悟有無名子嘲曰主司頭腦大冬烘錯認顏摽作魯公紫袍二主事楊國忠明年大選侍郎韋見素張倚與本曹郎趍走堂下抱案牒國忠顧女弟曰紫袍二主事何如皆大噱尉入臺多而縣辦否竇懷正時政令多門赤尉由墨制授御史者衆或戲曰尉入臺多而縣辦否對曰辦於異日問其故答曰佳吏在僥幸去故辦聞者皆笑與總管戲五代霍彥威莊宗滅梁彥威自陝來朝莊宗置酒故梁崇元殿彥威與梁將段凝袁象先等皆在莊宗酒酣指彥威等舉酒屬明宗曰此皆前日之勍敵今侍吾飲虢卿功也彥威等伏地請死莊宗勞之曰與總管戲爾卿無異也諧噱蘇世長歷天策府軍咨祭酒秦府開文學館引為學士與房玄齡等十八人皆蒙圖畫褚亮贊之曰軍咨諧噱超然辨司舊史豺咬殺魚婁師德好諧謔則天朝大禁屠殺師德因使至陝庖人進肉師德曰何為有此庖人曰豺咬殺羊師德曰豺大解事又進鱠復問有此庖人曰豺咬殺魚師德大叱之曰智短漢何不道是獺遂不食御史臺記侮玩之目顏抗性恢諧柳渾李泌與之厚自謂知己秉樞要當得達官久之遷著作佐郎抗不樂求歸於吳班列郡官皆有侮玩之目皆惡嫉之泌卒抗不哭而有調笑之言為憲司劾貶饒州司戶孔平仲續世說白爰笑爰語載笑載言嘻其笑矣巧笑倩兮囅然而咍管爾而笑夫子何哂掩口而笑笑不至矧父母有疾矧齒本也謔浪笑敖一笑千金樂然後笑人不厭其笑公叔文子胡盧宜笑既含睇兮注宜笑齒白也楚詞先笑而後號咷頭沒杯案魏太祖與人談論戲弄盡無隱諱及歡悅大笑至於頭沒杯案中肴膳霑污於巾幘也笑疾陸機見張華華令雲來機曰雲有笑疾及雲至見張華華以錦囊盛鬚雲見大笑不止又著衰絰上船見水中影因大笑落水救之免死必笑傳曰弱人必笑哂之夫子哂之言笑晏晏言笑晏晏詩啞啞笑言啞啞易嘻嘻婦子嘻嘻終吝易孔柳澤少言笑裴炎寡言笑大笑為樂號莊王鳳遇官屬尤嫚使奴蒙虎皮怖其參軍陸英俊幾死因大笑為樂笑殺天下鄭綮同平章事至是省史走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我史言不妄俄聞制詔下歎曰萬一然笑殺天下人笑中刀李義府貌足恭與人言嬉怡微笑而陰賊褊忌著于心凡忤意者皆中傷之時號義府笑中刀笑者不可測也魚朝恩會釋菜執易升坐百官咸在言鼎有覆餗象以侵宰相王縉怒元載怡然朝恩曰怒者常情笑者不可測載銜之引郭子儀自誚王松晉出帝北遷蕭翰立許王從益於京師以松為左丞相漢高祖入洛先遣人馳詔東京百官嘗受僞命者皆焚之使勿自疑由是御史臺悉斂百官僞敕焚之松以手指其胸引郭子儀自誚以語人曰此乃二十四考中書令也聞者笑之笑而不怒五代李茂貞居岐常以地狹賦薄下令榷油因禁城門無內松薪以其可為炬也有優者誚之曰臣請并禁月明茂貞笑而不怒持頤而笑柳宗元陪崔使君遊南池序左右皆大笑五代鄭玨莊宗入汴末帝惶恐不知所為玨曰臣有一策願得傳國璽馳入唐軍以緩其行而待救兵之至末帝曰顧卿之行能了事否玨俯首徐思曰但恐不易了於是左右皆大笑叨入相之資同上李鏻初李愚自太常卿作相而盧文紀代之及文紀作相鏻乃求為太常卿及拜命中謝曰臣叨入相之資朝士傳以為笑孤笑發孤笑於群憂韓愈別知賦衆夫指之笑謂我知不明此日足可惜諧笑性情漸浩浩諧笑方云云笑言溢口前隨杜尹拜表回笑言溢口何歡咍垂手笑瀧吏垂手笑官何問之愚粲然忽自哂授以鍊藥說李白古風自笑何驅驅贈張相鎬私唁且笑劉禹錫連州壁記嬉怡微笑李義府本傳笑而不答李守素論人物始言江左山東尚酬對至北則笑而不答虞西南歎曰肉譜足可白式宴以喜詩無喜色子文三仕為令尹無喜色喜形於色睢盱小人喜悅之貌楚殺子玉晉侯喜可知也受官喜毛義家貧養老親張奉慕其名候之會府檄至以義守令義奉檄入喜見顏色奉心賤之不知其為親也子攝相史孔子由大司寇攝行相事有喜色門人怪之孔子曰非樂其貴然喜下人得吾也一則以喜謂孝子見親年老而猶克壯也喜生於風則哀矜而勿喜孔喜見顏間太宗皇后長孫氏用無忌為尚書僕射后密諭令牢讓帝不獲已乃聽后喜見顏間王圭僕妾亦不見喜慍喜甚與家人樂飲劉元濟召為修文館學士既久斥喜甚與家人樂飲數日卒喜津津出眉宇間李林甫對親欣欣郭震自朝還對親欣欣退就室儼如也陸贄狩山南也道險澀與從官相失夜召贄不得帝驚且泣詔軍中得贄者嘗千金久之上謁帝喜見顏間自太子以下皆賀喜於獎善李栖筠楊家三喜楊敬之為國子祭酒俄遷太常少卿是日二子戎戴登科時號楊家三喜喜氣排寒冬韓愈贈張藉皆灑然喜隱太子傳帝謂秦王曰爾還洛陽行臺自陝以東悉王之建成等因密使人說帝言秦王左右皆山東人聞還洛皆灑然喜觀其意不復來矣信容得色舞于眉端劉禹錫呂溫集序得一善輒時衡擊節信容得色舞于眉端神躍色揚司空圖評詩書白將子無怒憑怒逢彼之怒君子如怒王赫斯怒慍見子路無慍色子文三已之無慍色忿思難君子九思一朝之忿忘其身顏回不遷怒忿懥懥怒忿疾于頑宜無悔怒懲忿室欲易損卦言可損之美莫大於忿欲內奰于中國奰音被不辭而怒曰奰衆怒不可犯難犯傳衆怒如水火撊然今熱事撊然授兵登陴將以誰罪注撊徑怒貌含怒不怒而威神有怒黽俯同心不宜有怒譴怒敬天之怒逢天憚怒憚厚也武怒奮其武怒室於怒市於色忿室家作色於市人色勃髮衝冠藺相如怒髮上衝冠奮髯抵几朱博怒齊吏忿擊伏尸百萬流血千里天子之怒也秦王謂唐睢睢云王聞布衣之怒乎王曰免冠徒跣以顙投也睢曰不然必伏尸二人血流三步怒生於兩傳王奮厥武如震如怒闞如虓虎詩怒八孔不塞衆人之怒柳宗元貶永州司馬貽蕭俯曰聖朝寬大貶黜甚薄不塞衆人之怒怪怒媢疾又曰超取顯美欲免世之求進者怪怒媢疾可得乎怒折匕箸廣德公主與帝食怒折匕箸帝曰此可為士人妻乎更許于琮尚主市怒劉武周太宗王仁恭令總虞候直閣下宣言于衆曰今歲飢死者骨相枕於野府君閉倉不恤豈憂百姓意乎以市怒其軍皆憤怨恚見顏間楊漢公鄭裔綽曰漢公既以墨敗陛下容可舉劇部弘貪人帝恚見顏間翌日斥裔綽為商州剌史天怒吳武陵遺二部侍郎孟簡書曰古稱一世三十年子厚之斥十二年殆半世矣霆砰電射天怒也不能終朝安有聖人在上畢世而怒人臣邪恚憤張介然守陳留初有詔講賊首而暴誅慶宗狀祿山入陳留見詔書拊膺大哭曰我何罪吾子何罪乃殺之即大恚憤殺陳留降者萬人以逞血流成川斬介然於軍門左右辟易陳京擢左補闕帝以盧杞為饒州剌史京與趙需裴佶宇文炫盧景亮張薦共劾杞輔政要位大臣踰時月不得對百官懍懍常若兵在頸陛下復用之姦賊唾掌復興帝不聽京等爭尤確帝大怒左右辟易諫者稍引卻京正色曰需等毋遽退極道不可以死請杞遂廢相在怒時魏元忠見相門怒則以力而相并唐蕃鎮表詩楊收王鐸皆薛逢同年進士收作相後逢有詩云須知金印朝天客同是沙隄避路人威鳳偶時皆瑞聖應龍無水謾通神收聞大銜之王鐸拜相逢又有詩云昨日鴻毛萬鈞重今朝山嶽一毛輕鐸又怨之舊史裾襪於硯鄭畋遷門下侍郎高駢請如西戎以公主下嫁畋盧攜入議之畋以國威靈不可相褻嫚攜怒拂衣去裾襪於硯因抵之帝以大臣爭口語俱罷攘袂張嘉貞與張說不相能嘉貞弟嘉祐贓污事發說勸嘉貞素服待罪不得入謁出為幽州剌史說遂代為中書令嘉貞惋恨謂人曰中書今年二員何相迫之甚也明年移益州都督就宴中書省與相會嘉貞恨說因攘袂勃罵源乾曜等共和續世說白九拜拜有九拜儀周禮揖禮肅拜手容恭禮吉拜凶拜非三年喪以吉拜凡男拜尚左手左陽女尚右手右陰八十者拜君命一坐再至略禮再至至地九十者君使人受不使拜也婦人吉事雖有君賜則肅拜低頭而已凶事則手拜手至地也大夫稽首再拜君答拜之禮無不答加勞賜一級無不拜傳王使宰孔賜齊桓胙將拜孔曰且有後命天子以伯舅耋老加勞賜一級無下拜拜下禮也鍾離意受賜不拜頒賜贓物贈子以拜王丹謂陳遵介者不拜品秩殊等拜揖異儀吉凶異道拜揖殊宜位既殊於品列拜則異其節文不拜揖客亢禮漢汲黯字長孺見將軍以亢禮人或說黯不可以不拜之曰夫以大將軍有揖客反不重邪又汲黯見田蚡未嘗拜揖揖三公後漢趙一元督為上計吏到京師是時司徒素逢受計吏數百皆拜伏庭中莫能仰視一獨長揖而已逢望異之命讓之曰小郡吏揖三公何也責稽首傳齊人責稽首注往年齊侯為公稽首公不答故也揖丞相漢書郅都為中尉丞相條侯至倨貴而都揖丞相也頽乎頎乎禮曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也注此周之喪拜先觸地無容哀之至也三年之喪吾從其至者注重者尚哀戚自期如殷可也大夫之臣不稽首以避君也不面拜君有賜不面拜為君之答已也揖官屬漢蓋寬饒次公左遷衛司馬先是左部見衛尉拜謂寬饒親事按舊令遂揖官屬已下衛者候司馬不拜自此正焉雅拜何武舉方正一人舉者召見行禮盤辟雅拜有司劾舉武不當率軍禮以長揖西征賦說亞夫教拜朱博子元為琅邪守門下掾貢遂耆老大儒教授數百人拜起舒遲博出教主簿曰貢遂書生不習吏禮主簿且教拜起間習乃止舒遲見上注參軍晉孫楚字子荊為著作郎參石苞驃騎將軍事負其才氣頗侮異於苞初至長揖曰天子命我參卿事因此嫌隙遂構苞奏楚與吳詔毀朝政楚亦抗表自理一拜一起吳主謂蜀伊籍曰勢事無道君對曰一拜一起未足為勞特揖孤卿特揖旅揖大夫旁三揖士禮記揖人必違其位環拜以鍾鼓為節環謂短拜三肅使者郤至對楚子以軍事不敢拜故三肅使者拜細吾子捨其大而拜其細尚能拜起黃霸不去老聾吏曰尚能拜起雖齊桓受胙恐貽天子之羞而亞夫建營實稟將軍之令耋老加恩齊侯辭一級之賜介胄難犯郤生成三肅之儀馬援受梁松拜援歸梁松候之拜床下援不答曰我松父友雖貴不可失敘松恨之常林不止晉宣王晉宣王以常林鄉邑之耆德每為之拜或謂曰司馬公貴至公宜止之林曰司馬公自欲敦長幼貴賤非吾所畏拜非吾所制言者踧踖而退王祥不拜晉王具職官三公門注責桑梓拜陸機為鄒平令性矜傲責鄉里謝鯤等拜或曰禮敬年爵以德為先令鯤拜勢懼傷風俗機不以為慚孔南面拜公卿安樂公主翌日大會群臣太極殿主被翠服出嚮天子再拜南面拜公卿公卿皆伏地稽首使高麗不拜李義琰使高麗不拜義琛再使匍匐拜伏凡百官拜禮各有差文武官三品已下正一品東宮官拜三師四品已下拜三少自餘屬官於本司隔品者皆拜焉唐六典舒王元名高祖之在大安宮太宗晨夕使尚宮問起居元名才十歲保媼言尚宮有品當拜元名曰此帝侍婢耳何拜為太宗壯之曰真吾弟也回紇皆南面拜董晉傳回紇恃有功見使者居因問市馬而唐歸我賄不足晉曰我非無馬而與爾為市為爾賜者不已多乎爾之馬歲五至而邊有司數皮償資天子不忘爾勞敕吏無得問諸戎以我之爾與也莫敢確衆皆南面拜不敢有言將卒皆拜董晉朱泚至河中李懷光反晉說之曰朱泚為臣而背其君苟得志於公敵賊有餘力若襲取之清宮以迎天子雖有大惡猶將掩焉如公則誰敢議懷光喜且泣又語其將卒皆拜人皆羅拜袁滋召為金吾衛大將軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜下拜跽受渾瑊每有賜豫下拜跽受常若在帝前朝延英詔母拜馬燧後病足不任謁九年十月自力朝延英詔母拜矍然下拜顏真卿盧杞將出之辭曰先中丞傳首平原面流血吾不敢以衣拭親舌舐之公不忍見容乎杞矍然下拜而銜恨切骨憚威拜城上馬燧李懷光反賊將徐廷光守長春宮城燧度長春不下則懷光固守久攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧顧其心已屈徐曰我自朝廷來可西向受命廷光再拜即率衆降東南向再拜屈突通劉文靜遣竇琮追及稠桑通知不免遂下馬東南向再拜號哭曰臣力屈兵敗不負陛下遂被禽送長安指膝郭子儀田承嗣傲狠不軌子儀嘗遣使至魏承嗣西望拜指其膝謂使者曰茲膝不屈於人久矣今為公拜汙賊官羅拜甄濟廣平王平東都濟詣軍門上謁泣涕王為感動肅宗詔館之三司者使汙賊官羅拜以愧其心不喜拜揖王績性簡放不喜拜揖諷拜佯不曉薛廷圭纍尚書左丞朱全忠兼四鎮廷圭以官告使至汴客將先見諷其拜廷圭佯不曉曰吾何德敢受令公拜乎及見卒不肯加禮不堪趨拜李源帝自遣使者持詔書抱笏即賜源頓首授詔謂使者伏疾老耄不堪趨拜再拜而辭盧奕安祿山陷東都被執將殺之奕臨刑西向再拜而辭拜中人嚴綬為尚書右僕射帝使中人賜含桃綬見拜之為御史劾奏慚懼待罪使吳越獨揖五代龍敏歷晉為太常卿使于吳越是時使吳越者見吳越王皆下拜敏獨揖之還遷工部侍郎馬上撗鞭揖同上尹揮從廢帝入洛陽而晉高祖來朝與揮相遇于道暉時猶為嚴衛指揮使恃先降功不為高祖禮馬上橫鞭揖之高祖怒白廢帝暉不可與名藩乃以為應州節度使拜多而乏同上呂琦廢帝怒曰朕一女尚幼欲棄之夷狄金帛所以養士而捍國也又輸以資虜可乎嵩等惶恐拜謝無數琦足力不能拜而先止帝曰呂琦強項肯以人主主視我邪琦曰臣素病羸拜多而乏容臣少息長揖李愚衡王友諒末帝兄也梁大臣李振等皆拜之獨愚長揖末帝以責愚曰衡王朕拜之卿獨揖可乎愚曰陛下以家人禮見之則拜宜臣於王無所私豈宜妄有所屈並五代史遍拜金吾將軍張萬福聞陽城率拾遺上跡論裴延齡姦佞遂遍拜陽與仲舒等曰諫議能如此言事天下安得不太平儀矩梗野拜忘舞蹈韓思彥久去朝儀矩梗野拜忘舞蹈謁見不拜盧鴻至東都謁見不拜宰相遣通事舍人問狀答曰禮者忠信所薄臣敢以忠信見帝觀行於一揖之內劉乃書不名不拜武攸緒敕有司即兩儀殿設位行問道禮詔見不名不拜攸緒至更冠帶仗入通事舍人贊就位攸緒趨就常班再拜帝愕然禮不及行見王無拜西域大食開元中始使使者來辭曰國人止拜天見王無拜有司切責乃拜不拜宰相姜晦開元初擢御史中丞先是不拜宰相御命使四方者廷中揖見後稍屈下至晦獨徇舊體謂御史曰不如故事具奏譴公等由是臺儀復振行步十白禮曰凡升階聚足連步以上謂足不相過上於東階則先左足上於西階則先右足堂上接武跡相近也堂下布武每足各成跡規行矩步行不舉足車輪曳踵凡執玉器執輕如不克行不舉足車輪曳踵注主君也如輪行不離地恭慎周旋中規折旋中矩謂行步君與尸行接武踵跡也大夫繼武跡相及也士中武跡相離也凡行容揚揚揚揚行兒足容重欲遲行步則有環珮之聲行中節也千里之行始於足下學步壽陵餘子學步於邯鄲失其故步匍匐而反屣步舍車而徒易賁其趾舍車而徒義不乘也賁飾也肆夏采齊周禮行以肆夏趨以采齊樂儀也曆階而升凡歷階不過二等與先生並行闕黨童子父黨隨行兄黨鴈行朋友不相踰翔步徒行步目國語足以步目吾不徒行玉趾憚行詩豈敢憚行畏不能趨孔進退甚詳董晉天子會朝公卿在廷侍中贊群臣賀竇參攝中書令當傳詔疾作公卿相顧未有詔晉從容進曰臣請代參事南面宣致詔詞進退甚詳走及奔馬高開道少趫勇走及奔馬後為盜史敬奉走逐奔馬跣足履棘五代王彥章能跣足履棘行百步不能遽步婁師德嘗與李昭德偕行師德素豐碩不能遽步昭德遲之恚曰為田舍子所留師德笑曰吾不田舍復在何人低首拱手段秀實贊太尉為人姁姁嘗低首拱手言氣卑弱未嘗以色待物急步疾呼韓文府中不聞急步疾呼行步欹危杜甫詩稠花亂葉畏江濱行步欹危實怕春追駿步而遐游柳宗元賦惟聰明為可考兮追駿步而遐游從容步進令狐峘貶吉州別駕稍遷刺吏齊映為江西觀察使按部及州峘輕映後出先至宰相今雖屬刺史自挾所以過映者至迎謁頗怏怏以語其妻妻曰君自視何如人以白頭走小生前君不以此見映雖黜死我無憾映至峘入謁從容步進不抹首屬戎器映以為恨去花殘步屧遲杜甫答鄭十七詩雅幅巾琴壺以隨劉禹錫別集趨十一白趨進翼如帷箔之外不趨堂上不趨執玉不趨趨蹌詩巧趨蹌兮疾趨則欲發而手足無移發起履也無移手足正也齊如流辨行剡剡而起屨疾趨之貌徐趨沒階趨進翼如也遲緩後漢孫堪常為縣令謁府趨步遲緩門亭長譴堪便解印而去趨以采薺見上注周走以呼棄疾使人楚國趨登晉靈公飲趙盾酒將殺之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下二節禮君召以三節一節以趨二節以走鯉趨論語孔帝問冠冕制董晉帝問冠冕制晉曰古者服冠冕以佩玉節步堂上接武堂下布武君前趨進而已今或奔走以致顛什趨者無善跡朱敬則諫曰急趨者無善跡沒階趨劉崇魯身為朱玫史官作勸進表在太原府使西川見田令孜沒階趨廢制度自崇魯始趨馳佐郡浙江西病間絶趨馳李白留別從兄詩豈憶當殿群臣趨杜甫杜鵑行冉冉自趨競杜詩龍尾道李聽為太子太傅招所善載酒集李宗閔閣至德裕則喻御史凡罷朝繇龍尾道趨出無輒至閣者趨降階伏唐持太和中為渭南尉試京兆府進士時尹杜悰欲以親故托之持輒趨降階伏悰語塞乃止臣子之禮過位必趨韋湊上言灑掃十二白禮凡為長者糞之禮必加帚於箕上取其兩手捧箕恭也謂初執往時也以袂拘而退其塵不及長者謂掃時也以袂擁帚之前令塵不揚以箕自向而扱之不向尊者亦示之恭也灑掃進退則可矣子游曰子夏之門人小子當灑掃進退則可矣抑末也本之則無如之何本者謂禮也糞除先人之敝盧張躍謂子大叔傳蠲掃不灑掃詩子有庭內不灑不掃掃地而祭掃門魏勃掃丞相曹參門掃室陳蕃字仲舉所居一室不掃人問曰孺子何不掃除蕃曰大丈夫當掃天下安能事一室乎擁篲迎門執帚所過糞除第五倫字伯魚不達客河東變姓名稱王伯齊載鹽往來太原上黨所過輒為糞除陌上人號為道士備灑掃納女於大夫禮孔汛掃廷唐房玄齡帝幸芙蓉園觀風俗玄齡敕子弟汛掃廷唐曰乘輿且臨幸有頃帝果幸其第敝帚柳宗元乞巧文旁羅萬金不鬻敝帚縛帚洛陽要紀王維居輞川宅宇既廣山林亦遠而雅好地不容浮塵日有十數掃飾者使兩童專掌縳帚而有不時給掃廳屋如兄言即掃廳屋候兄送毛仙翁灑掃縣中居引水經竹間招揚之罘並韓愈左掃右拂左掃因右拂旋收洛陽宮流夜郎李白呼兒掃中堂坐客論悲辛門有車馬客行掃崖去落葉席月聞清尊秋浦宴焚香掃地而坐韋應物性高潔所居焚香掃地而坐出語林掃花帚悵望送春杯殷勤掃花帚杜牧惜春詩急灑掃唐率更令張文成梟晨鳴於庭樹妻唾之文成曰急灑掃吾當改官言未畢賀客至出僉載掃職無憚五代馮道罷同州入朝拜司空唐制三公為加官無單拜者或三公正宰相便合參大政又云合策授又云祭祀時便令掃除道問之曰司空掃職吾無所憚既而知非乃止
