body:
  text: 卷第四十一白殺子後漢張奐為武威太守俗二月五月生子及與父母同日者悉殺之奐嚴賞罰重殺子之令風俗遂改賈子賈女後漢賈彪字偉節為新息長小民貧多不養子彪嚴為其制與殺人同罪數年間人民養子者僉曰賈父所生男名曰賈子女名曰賈女恥病後漢鄧訓字平叔為護羌校尉羌胡約病死每臨困輒以刀自刺訓問有困疾者輒拘縛束不與兵刀使醫治撩愈者非一小大感悅禁漁採見商部兼并門禁採珠禁珠門注禁弓弩公孫弘奏民不得挾弓弩吾丘壽王曰恐邪人挾之吏不能止良人自備而抵法是奪民救也弘詘伏之不舉子王吉為相人生子不養者斬其父母以上棘合埋之去又鄭惲文公為下蔡長民生子相活率不舉惲重設法百姓初畏罪後稍豐給男女悉以鄭為字禁淫祀西門豹禁河伯娶婦見縣令彊毅門又第伍倫伯魚為會稽太守俗多淫祀人常以牛祭神有食牛不薦者病先為牛鳴然後死倫禁斷又欒巴叔元為豫章守郡多山川鬼怪人破資祈禱巴素有道術能役鬼神悉毀房祀剪治姦巫遂絶百姓安之神娶宋均叔庠為九江守浚遒縣有唐后二山人共祀之衆巫因娶百姓男女為公嫗歲改易既而不敢嫁娶均到令曰為神娶者娶巫家女事遂絶火禁見寒食門安作見安人門孔風俗薄惡韋挺拜御史大夫是時承隋大亂風俗薄惡人不知教挺上疏曰父母之恩昊天罔極創巨之痛終身何已今衣冠士族辰日不哭謂為重喪親賓來弔輒不臨舉又閭里細人每有重喪不即發問先造邑社待營辨具乃始發京至假車乘雇棺槨以榮送葬既葬鄰伍會集相與酣醉名曰出孝官司習俗弗為條禁望一切懲革田弘正先時諸將出屯質妻子里民不得相生至弘正悉除其禁聽民通饋謝慶弔服玩僣侈者即日徹毀之行盜韋宙出為永州刺史邑中少年常以七月擊鼓群入民家號行盜皆迎為辨具謂之起盆後為解索喧呼疻鬥宙至一切禁之禁為浮屠死不葬宗室皓檢校太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黃坑有狗數百頭習食胔頗為人患吏不敢禁皓至遣捕群狗殺之申厲禁條約不再犯遂革其風不拾遺二白何並為長陵令路不拾遺劉矩為雍丘令有得遺者皆推尋其主而還之後漢繫樹魏邴原得遺錢拾以繫樹枝人以為神人繫錢愈多謂之神樹祀之原恐成淫祀乃辨之守劍後漢王烈在鄉里教化行人有盜牛者得之盜曰我將改勿使主烈知也烈聞遺布一端後父老遺劍於路至夜尋求見一人守劍於路問之乃昔盜牛者遺裝益部閻憲為綿竹令杜成夜得遺裝詣吏曰縣有門府不能慚心牛屬稚子王渙字稚子為溫令清商人露宿於道放牛者輒云屬稚子裝付樊父樊曄仲華為天水太守嚴猛道不拾遺行族至聚衣裝道旁云云以付樊父孔還拾袍張允濟仕隋為武陽令以愛和為行有行人夜發遺袍道中行十餘里乃寤人曰吾境未嘗拾遺可還取之既而得袍道不掇遺東夷列傳高麗盜者十倍取嘗殺牛馬者沒為奴婢故道不掇遺令行禁止郭元振治涼五歲善撫御夷夏畏慕令行禁止道不舉遺郎餘慶為萬年令道無掇遺道不舉遺闞稜署左將軍部兵皆群盜橫相侵牟稜按罪殺之雖親故無脫者至道不舉遺齎金一囊阿陵國女子為王號悉莫威令整肅道不舉遺大食君聞之齎金一囊置其行者趣避如是三年太子過以足躪金悉莫怒將斬之群臣固請曰而罪實本於足可斷趾群臣復為請乃斬指以徇大食君聞而畏之不敢加兵南蠻白尚能拜起黃霸為穎川許丞病聾督郵欲逐之霸曰丞廉吏雖老尚能拜起重聽何傷且善助之無失賢者意與人不求備書無求備於一人語子曰君子易事而難說及其使人也求備焉語有行之士未必能進趣進趣之士未必有行魏祖令曰愛其才漢張敞為京兆尹為人輕媚為婦畫眉帝愛其才而不備責戴其角者無上齒有其翼者兩其足董仲舒云孔取人不求備房元齡取人不求備雖卑賤皆得盡所能片善片能陸宣公奏議録片善片言以盡群材焉忘小瑕小怨俾無棄物焉無責人於不逮同上聖人制事必度物宜無求備於一人無責人於不逮苟有所長必有所短同上人之材行自昔罕全苟有所長必有所短若録長補短則天下無不用之人責短捨長則天下無不棄之士求備則觸類皆棄同上曲成則品物不遺求備則觸類皆棄是以巧梓順輪桷之用故枉直無廢材良御適險易之宜故駑驥無失性造次求備曷由得人同上前志所謂千年一聖五百年一賢者才難不其然乎夫惟聖人方禮全德賢之為用猶有未周且有未周之才彌五百年而有一造次求備曷得人不以求備取人不以己長格物隨能牧敘無隔卑賤論者稱為良相焉舊史房喬傳白張湯為廷尉奏事即譴湯摧謝注上有所譴即才折而謝之也嚮上意所便必引正監掾吏賢者因為臣議如此上書臣不用愚抵此注言不用諸掾語故至此罪當原即奏事上善之即曰臣非知此奏乃監掾吏某所為其欲薦吏揚人之善解人之過如此龔遂推美於王生遂見上問何以為理遂辭讓推美於上上曰君安得長者之言而道之曰臣議曹王生教臣耳不奪縣治薛宣貢君為馮翊得罪人告其縣長吏使自行罰曰不欲代縣治奪賢令長名也推美陳寵為太守威聲大行入守司農和帝問何以治對曰臣任功曹王渙以簡賢選能主簿潭顯拾遺補關臣奉宣詔書而已承掾任馬援為隴西守任下吏諸曹時白外事輒曰此承掾任何足相煩若大侵小點羌旅拒此乃太守事耳下教委任王棠敬伯為汝南守下教曰古人勞於求賢逸於任使其憲章朝右簡核王職委任功曹陳蕃匡政治務拾遺補闕任主簿應嗣坐嘯南陽太守成璡任功曹岑晊人歌曰南陽太守成公孝弘農成璡但坐嘯汝南太守范孟博南陽宗資主畫諾宗資任功曹范滂人歌云云呂虔字子恪為徐州刺史委別駕王祥唯主盜賊孫堅文臺為長沙守敕吏曰善治官曹文書以盜賊付太守也某掾鄉所為趙廣漢二千石推功美於下曰某掾所為非二千石所及發於至誠吏皆書寫心腹責大指不苛細汲黯長孺為東海守舉黃老好清靜擇丞吏任之責大指不苛細臥閨閣而理也吳黃蓋字公覆為石成長署兩掾主曹教曰若相欺終不加鞭初皆畏怖後以蓋不視文書漸容人事蓋按得其姦情殺之縣中震怖推美下吏四孔貨賄獄訟一切任五代裴迪太祖鎮宣武辟節度判官太祖用兵四方常留迪以調兵賦太祖乃榜門以兵事自處而以貨賄獄訟一切任迪常備屬僚或知故實李華御史大夫壁記初廳壁列先政之名記而不敘公以為艱難之選將俟後人謂華常備屬僚或知故實授簡之恩至屬辭之藝寡以吏事委長史司馬霍王元軌歷絳徐定三州刺史所至閉閣讀書以吏事委長史司馬必歸功於下王世充每捷必歸功於下白浚恆凶周易以深刻為常也不迪率典不躬不親杼軸其空徹我牆屋田卒污萊不勝其敝政散民亡事充政重政不率法而制於心苟簡之理苟於權利簡於仁義政以賄成而刑放於寵巧法折律飾文增辭貨行於言罪成於手後漢書刑肅而俗敝布常無藝藝法制也道殣相望而女富溢尤殣餓死神怒人怨上下相蒙君為政勿鹵莽莊子無惻隱之實商君遺禮義賈誼曰商君遺禮義棄仁恩故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕帚立而誶語注誶獨罵也滅天理而窮人欲愚弄其民官邪讒慝弘多慢令致期專政張湯每奏事至日旰天子忘食丞相充位而已天下事皆決於湯縣官所與末獲利姦吏並侵漁於是痛絶以罪自公卿以下至於庶人莫不指湯又王溫舒為中尉減宣左內史事無大小皆問其守官吏今丞不得擅搖以重法繩之數年一切為小治獨宣以小至大能自行之難為經也經常也請寄為奸請託之事謝錢以錢求士陳湯用小人公孫贊伯圭常言衣冠自以職分富貴不謝人惠故所寵愛類多商販庸兒所在侵刻百姓怨之不信吏劉類為弘農守每遣大吏出使隨覆察之白日於壁間窺門夜使幹廉察諸曹又以幹不足信云云不聞問嚴助請為會稽守數年不聞問詔曰聞者闊然久不聞問助謝罪多寫孝經梁州刺史宋邊患多寇迷理寡學術乃欲多寫孝經令家家習之蓋勳諫不從詔責之敝政五孔居官無所建明于敖家世用文學進初為時所稱及居官無所建明不選物以自容名益減釐補穿敝楊綰同中書門下平章事于時釐補穿敝唯綰是恃無所處可牛仙客知門下事百司詔訣所處可輒曰如今式革訛止弊馬總鄆州刺史廳記豈待守臣施諸政術而革訛止弊乎指香案爐鄭覃帝嘗謂百司不可使一曰弛惰因指香案爐曰此始華好用久則晦不治飾何由復新覃曰救世之敝在先責實比皆不攝職事至慕王夷甫以不及為靳此本于治平人人無事安逸致然帝曰要在謹法度而已變法之後弊隨事生韓文論鹽法狀弛張由於下筆指顧在於一言使政歸帝典理革前敝陸長源上宰相書白缿筒漢趙廣漢字子都為潁川俗朋黨廣漢患之乃為缿筒削其主名以為耳目為京兆善為鉤巨以得人情嘗召亭長界土亭長戲曰為我多謝趙君廣漢知之烏攫肉黃霸為潁川遣吏按行吏不敢舍郵亭食於路旁烏攫其肉吏還霸迎勞曰甚苦食於路乃為烏所攫肉吏以為霸盡知其行止事不敢隱也抆拭用能朱博字子元為馮翊長陵尚方禁少時嘗盜人妻見斫創著其頰博見其瘢問之尚不敢隱博笑曰丈夫固時有是馮翊欲灑卿恥抆拭用能自效不禁且懼對曰必死博敕禁無得泄語有便宜輒記言以為耳目擢禁連守縣令久之召功曹責以禁等事便自疏取受欺謾當斷頭功曹不敢隱博削記使之不敢差跌耳目蓋寬饒為官志在奉公俸錢月數千半給吏人為耳目借死魏太祖軍中糧少主簿請用小斗給軍糧祖曰善後軍中怨祖謂主簿曰借汝死以謝衆乃斬之以徇軍士晉文公譎而不正語把其陰重罪王溫舒擇敢往吏把其陰重罪縱使襲吏之姦羸服察俗羊續興祖為南陽守當入郡乃羸服間行侍童子一人而已觀邑里採風俗然後進吏人知之而貪潔良猾盡皆知之也譎數王渙為洛陽令能以譎教發摘姦伏問吏所聞范寧為豫章守欲進十五議曹下屬縣採風俗吏假歸還訊問所聞官長得失徐邈與書云云示人以詐無恥民免而無恥出奇譎朱博每到官輒出奇譎以示下不可欺也任詭譎孔佛軀汗流劉玄佐加汴宋節度使汴有相國寺或傳佛軀汗流玄佐自往大施金帛於是將吏商賈奔走輸金錢惟恐後十日玄佐敕止籍所入得巨萬因以贍軍其權譎類若此夾輔之勳垂于吏冊馮用之權論昔晉文公見天王于河陽譎則譎矣而夾輔之勳垂于史冊無名書內靴中王鍔善任數持下在淮南時嘗得無名書內靴中俄取它書焚之人信其無名者異日小罪并以所告窮驗示衆人以為神明肆騁譎怪裴延齡剝下附上肆騁譎怪政不一七白狐裘蒙茸一國三公吾誰適從土蒍謂晉獻公七年之中一與一奪二三孰甚焉季文子謂晉云云晉政多門朝夕改國不堪二政衆而惡國語政令無常孔尉入臺多而縣辦竇懷貞武后時政令多門赤尉由墨制授御史者衆或戲曰尉入臺多而縣辦否答曰佳吏在僥幸去故辦聞者皆笑政出多門大亂之漸魏元忠輔政譽望大減陳郡男子袁楚客以書規之曰政出多門大亂之漸姦詐起而暴亂生柳澤入調會有詔選者得言事乃上書曰政不常令不一則姦詐起而暴亂生州無他門人一知教盧子駿善政述人無所措劉蕡制策法出多門人無所措一中外之法同上法宜畫一官宜正名今分外官中官之員立南司北司之局或犯禁於南則亡命於北或正刑之外則破律於中實由兵農勢異中外法殊也列士惡多門杜甫石硯詩朝廷多門仍亙乎晉魏同上太廟賦時既政出多門遷除甚衆舊史申晝一之法柳澤詣闕上疏曰秪如斜封授官皆是僕妾汲引迷謬先帝紊亂前朝陛下初即位時納姚元崇宋璟之計所以咸令黜之比日已來又令敘用使君子道消小人道長惟陛下熟思而察之申晝一之法明不二之刑則天下之化又無間焉舊史政禁不一劉蕡暴政八白暴殄天物以蕩陵德慢神虐人不戒視成謂之暴慢令致期謂之賊暴君污吏慢其經界孟子朝令暮具苛政猛於虎上慢下暴敷虐於百姓天吏逸德烈於猛火惟威惟虐依勢作威報虐以威滅德作威以民為土芥殺人以逞不教而殺束濕寧成操下如束濕薪一怒寧值乳虎不值寧成之怒重足一跡人畏寧成蒼鷹人號郅都為蒼鷹法令嘗密矣然姦愈甚上下相遁遁避也武健嚴酷鷹擊毛鷙為理義縱足吾事矣王溫舒為河內具私馬五十匹驛奏事不過二日得報郡中驚其神速時於旁郡追求賦會春至溫舒歎曰使冬月益展月足吾事矣猜禍溫舒為中尉召猜禍吏任之其爪牙吏皆虎而寇屠伯嚴延年為河南守冬月屬縣內流血數里河南人號屠伯張敞書戒之答曰莠盛苗穢不可不除母掃墓待喪戒子尹賞將戒子曰為吏正坐殘賊勉思功效則復進用一坐軟弱不勝任則無有起時地臼不杵見酷吏門注刺骨吹毛文深趙禹巧詆張湯枹鼓不鳴董少平後漢董宣為洛陽令人號臥虎語曰云云婦人升樓黃昌為陳相縣民彭氏造高樓臨道昌行縣彭氏婦人登樓而觀昌乃殺之亂杖撾之魏劉穎為弘農守過無大小亂杖撾之吏人掘地求錢每遣大吏報使小吏覆察之佩韋西門豹性嚴急常佩韋以自戒去儒吏朱博所在輒罷去儒吏議曹曰文儒吏時有諫奏稱說云云博曰太守漢吏當奉三尺法無奈生所言聖人道何且歸待堯舜君也孔急刻少思李安遠歷潞州都督懷州刺史皆以幹用顯然急刻少思由是損名操下以嚴王遂猛吏奮毒急政破資宋務光上書下厭其苛潘好禮喜察細事下厭其苛所至務為威烈李紳所至務為威烈或陷暴刻故雖沒而坐吳湘冤去土囊斃親吏孟簡及出山南東道節度使內不樂政頗嚴峭時有詔置臨漢監以牧馬命簡兼使職簡以親吏陸翰主奏邸關通閹侍翰特之數傲狠簡怒追還以土囊斃之暴橫少恩于頔改蘇州為政有績然暴橫少恩杖前部尉以逞憾觀察使王緯以聞德宗不省俄遷大理卿為陝號觀察使慢言謝緯曰始足下劾我三進官矣益自肆峻罰奇懲官吏惴恐皆重足一跡參軍事姚峴不勝虐自沉于河府政苛細請移散官杜羔元和中為萬年令京兆尹元義方責租賦不時繫二縣吏將罪之羔等辨列尤苦尹不為縱羔乃謁宰相請移散官憲宗遣中宗問狀具對府政苛細力不堪奏詔皆免官奪尹三月俸議者以羔為直本傳剛猛立威劉贊治宣十年第以剛猛立威官吏重足一跡下有犯雖絲毫皆不肯貸辛雲京治謹于法下有犯雖絲毫皆不肯貸笞殺金吾吏張直方性暴率坐以小罪笞殺金吾吏政令嚴酷藩鎮李正巳政令嚴酷在所不敢偶語威震鄰境脅汙士衆李師道以嚴法持下凡所付遣必質其妻子有謀順者類族其家以故能脅汙士衆傳三世云眼中拔釘五代趙在禮在宋州人尤苦之已而罷去宋人喜而相謂曰眼中拔釘豈不樂哉既而復受詔居職乃籍管內口率錢一千自號拔釘錢人以目相謂郭英乂為政苛暴人以目相謂以峭法操下李鄘當官以峭法操下所至治猛決少恩人往往陷非法白威克厥愛允濟尚書言威勝愛則信成功畏威稟命傳翟方進于義字仲文年二十為南陽都尉宛令劉立與曲陽侯根為婚又著名州郡輕義年少義陽以他事召見立以主守盜十金賊殺不辜收縛立送獄威振南陽王尊為安定太守告屬縣令長丞奉法守職甚勞苦太守以今日至府願諸君勉正身以率下無以身試法敕掾功曹不中用者輒自避退無妨賢路孔子七日誅少正卯今一月矣五官掾張輔貪污一郡錢盡入輔家收送獄數日輔死盡得狡猾威震郡中霽威嚴魏相為楊州刺史按治郡國守相多所貶退丙吉與書曰朝廷深知弱翁行直方大用願少慎事自重藏器於身不顯其能相善其言為霽威嚴霽止也威信叛者姚期次公為魏郡守督賊李熊弟陸在外謀反期令吏送熊及母使就陸熊求得陸詣郡陸愧感自殺以一警百尹翁歸治東海明察吏人賢不肖盡知之每民大會及出行縣時有所取以一警百吏人皆伏恐懼識柳樹陶侃士行為諸營種柳都尉夏施盜柳植之於己門侃見駐車問曰此是武昌西門柳何因盜之施惶怖解印朱穆公叔為冀州刺史冀部令長聞穆濟河解印綬四十餘人矣不避豪彊剛亦不吐柔亦不茹不畏彊禦豺狼當路張綱劾奏梁冀驕奢斂手以避鮑永為司隸鮑恢為掾屬世祖曰貴戚且斂手以避二鮑違彊陵弱非勇也彊項董宣少年為洛陽令胡陽公主奴殺人與主驂乘宣行逢駐車收格殺之主訴於帝帝欲箠殺之宣曰云云帝使謝主宣不從彊伏宣手據地不俯因曰彊項侯御前呵囚虞延為洛陽令陰就客馬成為姦盜延收之陰氏每一書囑輒加篣二百就言於帝帝親録囚徒延陳獄狀可論者在東無理者在西成欲趨東延執之曰爾久依城社為巨蠹云云帝亦謂曰汝犯王法云云竟殺之還州檄橋玄公祖治陳相羊昌罪梁冀私檄救之刺史周景承旨召玄玄還檄不受發案益急昌竟下獄蒼鷹郅都為中尉行法不避貴戚貴戚側目而視號曰蒼鷹令慎乃出令令出惟行不惟反其身正不令而行其身不正雖令不從君子之德風小人之德草草上之風必偃發號施令罔有不臧尚書君子命以防欲命教命也大為之防民猶踰之言嚴令尚不能禁法令滋彰盜賊多有示民知禁周禮國禁官禁苟臨人之有失則雖令而不從論時令月令凡執禁以齊衆不赦過禮知防禮發號出令而民悅謂之和禮先甲易先甲三日後甲三日謂出令也先庚義同上后以施令告四方易事不再令發命之不哀遽令驛馬軍書懸教象之法于象魏屬民而讀邦法布德和令禮從其彊令吾令實過憲令君之憲令無遷令莊子孔以威肅聞李襲譽為人嚴愨以威肅聞權戚縮氣魏謨遷御史中丞發駙馬都尉杜中立姦贓權戚縮氣豪右畏戢韓佽遷桂管觀察使會春服使至鄉有豪猾厚進賄使者求為縣令使者請佽佽許之既去召鄉豪責以撓法笞其背以令部中自是豪右畏戢韋湊遷楊州法曹州人孟神爽罷仁壽令豪縱數犯法交通貴戚吏莫敢繩湊按治杖殺之遠近稱伏不畏侯卿杖秪畏尹卿筆尹思正授司府少卿時卿侯知一亦厲成嚴吏為語曰不畏侯卿杖秪畏尹卿筆摧擲姦伏宗室晦檢校雍州長史摧擲姦伏無留隱吏下畏之威名赫然崔隱甫御史大夫臺中自監察御史而下舊皆得顓事無所承咨隱甫始一切令歸稟乃得行有忤意輒劾正多貶絀者臺吏側目威名赫然草木亦知威名張萬福為濠州刺史召謂曰先帝改爾名正者所以褒也朕謂江淮草木亦知爾威名若從所改恐賊不曉是卿也復賜舊名本傳頭上尹劉栖楚改京兆尹峻誅罰不避權豪先是諸惡少竄名比軍凌藉衣冠有罪則逃軍中無敢捕栖楚一切窮治不閲旬宿姦老蠹為斂跡一日軍士乘醉有所凌突諸少年從旁譟曰癡男子不記頭上尹邪惡少望風遁去李紳為河南尹河南多惡少或危帽散衣擊大毬尸官道車馬不敢前紳治剛嚴皆望風遁去批薛懷義頰蘇良嗣遷文昌左相遇薛懷義偃蹇良嗣怒叱左右批其頰曳去武后聞之戒曰第出入北門彼南衙宰相行來無犯官下肅然柳仲郢擢劍南東川節度使大吏邊章簡挾勢肆貪前帥不能制仲郢因事殺之官下嘯然榜死巨猾王式餘姚民徐澤專魚鹽之利陳瑊乃巨猾也窮治其姦皆榜死本傳豪右斂跡韋澳繫帝舅主墅吏豪右斂跡疏吏惡榜之里閭王潛更節度荊南疏吏惡榜之里閭殺尤縱者渠凶宿狡不敢發鄭從讜為河東節度渠凶宿狡不敢發發又輒得上皆寒毛惕伏豪猾屏息李頻再遷武功令於是畿民多藉神策軍吏以其橫類假借不敢繩以法頻至神策士尚君慶逋賊六年不送悍然出入閭里頻密擲比伍與競君慶叩縣廷質頻即械送獄盡條宿惡請於尹殺之督所負無少貸豪猾大驚屏息奉法縣大治嚴挺之改濮汴二州刺史所治皆威嚴吏至重足脅息杖殺張易之奴魏元忠檢校洛州長史治號威明張易之家奴暴百姓橫甚元忠笞殺之權豪憚服摧姦抉隱李勉調開封尉汴州水陸一都會俗厖錯號難治勉摧姦抉隱為有名本傳誅真源大吏張巡更調真源令士多豪猾大吏華南金樹威恣肆邑中語曰南金口明府手巡下車以法誅之赦餘黨莫不改行遷善威聲風行裴行立遷安南經略使范廷芝嘗休沐久不還行立召之約曰軍法踰日者斬異時復然爾自死後廷芝逾期行立笞殺之以尸還范氏更為擇良以代於是威聲風行大猾閉門自斂王忠嗣試守代州別駕大猾閉門自斂不敢干法鉏滅姦吏十餘輩民大喜崔戎捕殺倡大賈劉崇龜終清海軍節度使廣有大賈約倡女夜集而它盜殺女遺刀去賈入倡家踐其血乃覺乘艑亡吏跡賈捕劾得約女狀而不殺也崇龜方大饗軍中悉集宰人至日入乃遣陰以遺刀易一雜置之詰朝群宰即庖取刀一人不去曰是非我刀問之得其主名往視則亡矣崇龜取它囚殺之聲言賈也陳諸市亡宰歸捕詰且伏其精明類此宿弊溫璋歷京兆尹素彊幹鉏宿弊豪右懾服豪彊犯法未嘗輒貸王播為三原令發擲隱微張亮為政多伺察發擲隱微示神明盜發三日內必禽蘇良嗣政上嚴每盜發三日內必禽號稱神明見惡輒取權懷恩擢萬年令賞罰明見惡輒取時語曰寧飲三斗塵無逢權懷恩馭吏整嚴蔣欽緒精治道馭吏整嚴雖銖抄罪不貸追集男女貞觀中衛州板橋店王張迪妻歸寧王衛楊貞三人投宿五更發有人取王衛刀殺張迪卻內刀鞘中至明店主人趨貞刀血狼籍栲訊貞苦毒遂自經上疑之差御史蔣坦覆推追店人一五以上以不足且散唯留一老媼年八十餘晚放出令密覘之曰媼出當有人與之語者即記姓名勿令漏泄果有一人共語即記之明日復爾其人問媼使人似何推勘如是者三日坦追集男女三百人就中喚與老媼語者餘皆放散問之其人服云與迪妻濫殺有實乃賜坦除侍御史朝野僉載寡婦告子不孝李傑既精聽斷雖往來食飲省治不少廢繇是府無淹事人吏愛之寡婦有告其子不孝者傑初色非是謂婦曰子法當死母悔乎答曰子無狀寧其悔乃命市棺還斂之使人跡婦出與一道士語頃持棺至傑令捕道士按一乃與婦私不得逞傑殺道士內于棺明吏治崔隱甫明吏治在職以彊正稱嚴明嚴郢拜京兆尹嚴明持法令疾惡撫窮敢誅殺盜賊一衰吏氣奪號神明李栖筠判南曹時大盜後選簿亡舛多僞冒栖筠判折有條吏氣奪號神明精裁遣吳湊初府中易湊貴戚子不更簿領每有疑獄時其將出則遮湊取決幸倉卒得容欺湊叩按視凡指擲盡中其弊初無留思衆畏服不意湊精裁遣如此處事精明皆以為神姜晦處事精明私相屬諉罪輒得皆以為神居官精明杜中立移司農吏不得為姦居官精明吏下寒栗畏伏中雖坐纍免及復用亦不為寬假其天資所長云察無遺私李巽鋭於為治持下以法察無遺私吏不敢少給府吏有過秋毫無所縱股栗脅息常如與巽對同上決事明當李揆臨下明李晟臨下明每治軍必曰某有勞某長於是雖廝養小善必記姓名明簿最下無紿李憕力于治有任事稱明簿最下無敢紿雖武夫而曉吏事安重榮雖武夫而曉吏事其下不能欺有夫婦訟其子不孝者重榮拔劍授其父使自殺之其父立曰不忍也其母從傍詬罵奪其劍而逐之問之乃繼母也重榮叱其母出從後射殺之五代史剖析如流王播充諸道鹽鐵轉運使雖案牘鞅掌剖析如流黠吏詆欺無不彰敗舊牸牛依婦家張允濟為武陽令元武民以牸牛依婦家者久之孳十餘犢將歸而婦家不與牛民訴縣縣不能決乃詣允濟允濟曰若自有令吾何與為民泣訴其抑允濟因令左右縳民蒙其首過婦家云捕盜牛者質所來婦家不知曰此壻家牛我無豫即遣左右撤蒙曰可以此牛還壻婦家叩頭服罪夜晏娛晝決事李適之夜宴娛晝決事案無留辭典法十白慎徽五典書儀式刑文王之典日靖四方雖無老成人尚有典刑施典於邦國周禮太宰乃施典於邦國施則于都鄙施法于官府法則以馭其害大夫以法相序士以信相考周禮盡在魯矣公之典在紂屏棄典刑典法非訖於威惟訖於富制事典趙宣子言為政也蒍敖為宰擇楚國之令典能用典矣典法無更莊子率由舊章三辟之興皆叔世也三代之法不起於盛時叔向與子産之書云云藏在盟府可以覆視也汝司典之後籍談謹爾侯度公共理具張釋之曰法者天下公共法為理具畫一法有起姦夫魯有初禮採周之舊傳孔明練李吉甫為太常慱士年尚少明練典故式遵舊典朱子奢立廟議祖宗之制式遵舊典編之於令柳宗元駮復讎議編之於令永為國典以濟斯民李翰嘉興屯田頌序聖上旰食宵興求古今令典可以濟斯民者闕典咸備舊章悉舉張曲江龍池聖德頌決綻補壞蕩瑕滌穢而闕典咸備舊章悉舉寖滅韓文王政不修寖滅典法增損號稱詳衷鄭餘慶帝患典制不倫謂餘慶淹該前載乃詔為詳定使俾參裁訂正餘慶引韓愈等為副凡增損儀矩號稱詳衷詔修六典韋述先是詔修六典徐堅創意歲餘歎曰吾更修七書而六典歷年未有所適蕭嵩引述撰定述始慕周六官官領其屬事歸於職規制遂定白夏倍虞官禮有虞氏官五十夏官百殷二百周三百修廢官唐虞稽古建官惟百庶政惟和夏商官倍亦克用又書革已日乃孚易人可與襲常難與適變政由俗革利百法變仍舊貫如之何何必改作新意相沿不改也禮適道在權救時貴變法宜改度義有隨時所貴便宜寧辭改作商倍夏官亦克用乂漢循秦政政亦不愆苟廢置之合宜信沿革而齊政革故鼎新惟新是圖何常之有是宜捨魯未可因殷夫魯有初採周之舊沿革十一孔傅奕上言陛下撥亂反正而官名律令一用隋舊且懲沸羹者吹冷齏傷弓之鳥驚曲木況天下久苦隋暴安得不新其耳目哉改正朔易服色變律令革官名功極作樂治終制禮使民知盛德之隆此其時也弊法李翰五等論琴瑟不調除仍舊之弊法矯弊之政張典江集敕處分縣今矯弊之政豈無所革也弓之高下者抑舉琴瑟之不調者更張宋齊以降繼體承祧者纘緒之初政未得中改之可也如弓之高下者抑舉琴瑟之不調者更張此亦天道也贊皇公宋齊論易官吏十二白漢文時居官長子孫以為氏倉氏庾是也後公卿以下轉相促急吏易政事或居官數月而退迎送交錯中材苟容求全下材懷危內顧已上主王嘉上疏云尚能拜起黃霸不欲數易官吏潁川時許丞老病聾督郵白逐之霸曰尚能拜起重聽何傷所易新吏未必賢送故迎新所費甚奸吏因絶簿書盜財物換縣薛宜為馮翊潁陽令薛恭本縣老者以功次遷職不辨而粟邑令尹賞久在郡用事粟邑易理宣奏與恭換縣數月而兩縣皆理滕薛大夫孟公綽為趙魏老則優不可以為滕薛大夫孔易置盧攜為兵部尚書會駢將張璘破賊帝復召攜以門下侍郎同平章事及失守以駢代之即按關東諸將為鐸畋所任者悉易置內阿田令孜而外寄戎政於駢與奪惟所愛惡白審官詩官不必備惟其人明王立政不惟其官惟其人也冗員官事不攝管仲奢僣損不急之官史楚悼王用吳起為相損不急之官拊養戰士省西曹魏志毛玠為司空丞相東曹掾請謁不行時人憚之時議欲併省官員咸言省東曹太祖知之令曰日出於東月盛於西凡人言先東東不可省遂省西曹官省則選清而得久職並則吏簡而俗靜晉王彪之議也省吏不如省官晉時議省州郡官吏以赴農功荀勗議曰省吏不如省官省官不如省事省事不如清心蕭曹清淨致畫一之歌此清之本漢文垂拱幾致刑措此省事也光武併合吏員縣官國邑財致一付比省官也魏太和中遣王人四出減天下吏員正始中亦併合郡縣此省吏也今欲求之於本則省事為先若欲省官司九寺可并於尚書蘭臺宜省於三府云云孔官貴簡約傅奕曰官貴簡約夏后官百不知虞氏五十周三百不如商之百汰去秕滓者菁華乃出楊嗣復進門下侍郎建言使府官屬多宜省帝曰無乃滯才乎對曰才者自異汰法秕滓者菁華乃出資課太繁吳湊纍左金吾衛大將軍言掌間彉騎飛龍內園英容園禁兵諸司雜供役羊資課太繁宜有蠲省省事不如省官李德裕嘗謂省事不如省官省官不知省吏能簡冗官誠治本也乃請罷郡縣吏凡二千餘員衣冠去者皆怨囚征戰艱難以省吏員杜佑為戶部侍郎以為省用則省官乃上議曰漢光武建武中廢縣四百吏率十署一魏太和時分遣使者省吏員正始是併郡縣晉太元省官七百隋開皇廢郡五百正觀初省內官六百員設官之本以治衆庶故古者計人置吏不肯虛設自漢至唐因征獸艱難以省吏員誠救弊之切也辛替否上疏曰太宗陛下之祖撥亂立極得至治之體省官清吏舉天下職司無虛授存無事之官食至重之稅李吉甫方今置吏不精流品厖雜存無事之官食至重之稅故生人日困冗食日滋內外官仰奉廩者無慮萬員有職局重出名異事離者甚衆故財日寡而受祿多官有限而調無數九流安得不雜官少易治又願詔有司博議州縣有可併併之歲時入仕有可停停之則吏寡易求官少易治同上患在官繁沈即濟今日之治患在官繁不患員少兩省官自常侍諫議補闕拾遺四十員日止兩人待對缺員二十一員未補若謂見官不足與議則當更選其人若廣聰明以收淹滯先補其闕何事官外置官中朝官常侍賓客十員其六員可罷左右贊善三十員其二十員可罷如舊制諸王未出閣官屬皆不除李泌停減吏員崔縱自兵興內外官冗溢時議併省縱奏兵未息仕進者多緒在官則纍遷有功而褒賞不可廢也比選集乃據闕留人怨望滋結朝廷頻詔録勞而諸道敘復日廣若停減吏員非但承優者無官可敘亦恐序進者無路勝置矣詔可減諸道觀察判官員之半楊綰執罷千四百員李朝隱遷吏部員外郎時政出權幸不關兩省而內授官但斜封其狀付中書即宣所司朝隱執罷千四百員怨誹歡騰朝隱胖然無避省官之不急陸贄五要曰省官之不急浹日損千二百五十員柳仲郢會昌初纍轉吏部郎中時詔減官冗長者仲郢條簡浹日損千二百五十員議者厭伏復吏員罷冗官李泌同中書平章事初張延賞咸天下吏員人情愁怨至流離死道路者泌請復之帝未從泌曰陛下欲省州縣則可而吏員不可減今州或參軍署券縣佐史判案所謂省官者去其冗員非常員也帝曰若何為冗員對曰州參軍無職事及兼試額內官者兼試自至德以來有之比正員三之一可悉罷帝乃許復吏員而罷冗官疾吏員廣李吉甫條件停減陸贄奉天赦內外官有冗員及百司不急之資委中書條件停減補受亡限員外置官韋嗣立補受亡限員外置官吏困供承官竭資奉國家大事豈甚於此竊見諸司官員所在委積多者數倍近古以來未之有也多不釐務廣有除拜無所裨益俸祿之費歲巨億萬空竭府藏方今倉庫空虛百姓凋弊公私損耗不可勝紀況邊隅未靜兵革猶興節用愛人正在今日增官廣費豈曰其時盧懷謹宜併省其員張延賞建言今官繁費廣州縣殘困宜併省其員悉收廩料糧課輸京師賞戰士帝許之即詔上州留上佐録事司戶司兵司士各一員中縣省尉京兆河南府司録判官赤縣丞簿尉各省半內外始怨勤官十四白守官廢命不敬積行纍功以致爵位詩序夙夜在公夙夜匪懈不可以怠不敢逮遑不懈於位不躬不親靖共爾位無日不惕豈敢忘職恪居官次政如農功日夜思之朝夕行之如農之有畔畔次也能勤有繼斷功績也蒞事惟勤居之不倦不敢自逸陳力就列夙夜惟夤欽乃攸司智以效官勤而蒞事不遑啓處苟有位於朝無有不恭恪非德莫如勤僶俯從事不敢告勞無棄物陶侃木屑事見善政門注孔每朝謁馬上以鞭算劉晏每朝謁馬上以鞭算質明視事至夜分上雖休浣不廢事無間劇即日剖決無留所居官雖祈寒烈暑無懈容姜確每入直盡夕不釋仗杜楚客為中郎將每入直盡夕不釋仗帝知而勞之當國夙夜勤彊房玄齡當國夙夜勤彊任公竭節天性勤吏職王播天性勤吏職每視簿領紛積於前人所不堪者播反用為樂清勤不懈牛仙客河西節度使王君㚟召為判官蕭嵩代節度復委以軍政仙客清勤不懈勤總吏職呂諲哥舒翰節度河西表度支判官勤總吏職諸僚或出游諲獨頽然據案鉤視簿最翰益親之吏不堪其勞而已益恭班宏清潔勤刀晨入官署夕而出吏不堪其勞而已益恭政勤清吳湊德宗初出為福建觀察使政勤清美譽四騰雖細務皆身親其勞久益彊力奚陟遷中書舍人雖細務皆身親其勞久益彊力人以為難晝夜不寐五代敬翔從太祖用兵盡心勤勞晝夜不寐自言惟馬上乃得休息不敢曠其職韓愈爭臣論孔子嘗為委吏矣嘗為乘田矣亦不敢曠其職必曰會計當而已矣必曰牛羊遂而已矣若陽子之祿秩不為卑且貧章章明矣而如此其可乎哉帶星以自勤何士又可使從政然能帶星以自勤則緩急勞逸之間必使適宜而會理矣白氏制勤恪蒞官元稹陸贄戒風俗文居省寺者不能以勤恪蒞官而務求簡易知更雀裴耀卿夜決獄訟常養一雀每更輒鳴裴呼為知更雀天寶遺事以勤國事蕭俯佐吾為理以勤國事是用正命為選部尚書而冠六卿統百職白居易蕭俯制儒學雖優亦勤吏事王彥威拜戶部侍郎儒學雖優亦勤吏事舊史白臺駘能業其官傳一日失職則死及守道不如守官齊侯田招虞人以旌不進仲尼曰守道不如守官注君招當往道之常也非物不進官之物也介于石易其靜也專小惑易方思不出其位各守爾典靖共爾位職思其憂各司其局見死不虧其守雖有挈瓶之智守不假器不為利諂官修其方唐宿其業食焉不避其難子路當官而行守官廢命不敬城蒲與屈左傳出納之吝謂之有司庖人雖不治庖祝史不越樽俎而代之莊子頭可得漢書殿中夜有怪群臣皆驚霍光恐有變召尚書符璽郎欲收取璽郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得明日光賞之問喘牛丙吉不問殺人而問喘牛曰殺人京兆尹長安令之所職方今少陽用事牛未宜喘宰相職調陰陽所當憂也陳平不對農獄上問絳侯周勃一歲入粟決獄幾何勃不能對汗流問陳平平對曰入粟當問搜粟都尉決獄問廷尉臣職上佐天子調陰陽下使四方得其所也刺史不察黃綬朱博為冀州刺史人遮道言事博曰若言丞尉當詣邵守刺史不察黃綬守官十五孔檄取資糧不與穆寧佐鹽鐵轉運李光弼屯徐州餉不至檄取資糧不與光弼怒召寧欲殺之寧見光弼執其手謝曰吾固知不可聊與君議爾時重其能守官死職柳公綽拜京兆尹方赴府有神策校乘馬不避者即時榜死帝怒其專殺公綽曰此非獨試臣乃輕陛下法帝曰既死不以聞可乎公綽曰臣不當奏在市死職金吾在妨死職左右巡使帝乃解守正行法徐有功為左肅政臺侍御吏辭曰臣聞鹿走山林而命繫庖廚者勢固自然陛下以法官用臣臣守正行法必坐此死矣后固授之帝嘉其守許孟容拜禮部員外郎公主子求補崇文生者孟容固謂不可主訴之帝問狀以著令對帝嘉其守自劾執法不稱獨孤用晦遷御史中丞會殿中王源植貶官用晦直其枉書五上不報即自劾執法不稱願罷官去朝廷嘉其守柳仲郢遷侍御史有禁卒誣里人斫父墓柏樹殺之吏以專殺論而中尉護免其死右補闕蔣係爭不省仲郢監罰執曰賊不死是亂典別有詔御史蕭傑監之傑復爭遂獨詔京兆杖殺之不監朝廷嘉其守居職持法不阿權要周彬野史守道不如守官臣職載筆君舉必書褚遂良辭以越局盧承慶遷民部侍郎太宗尋令檢校兵部侍郎仍知五品選事承慶辭曰選事職在尚書臣今掌之便是越局太宗不許之夫皮冠者是虞人之物也物者道之準也守其物由其準而後其道存焉苟捨之是失道也柳宗元守道論古者居其位思死其官可易而失之哉在上不為抗在下不為損矢人者不為不仁函人者不為仁率其職司其局交相致以全其公也同上太學生謁急后報可仁傑曰人君惟生殺柄不以假人至簿書期會宜責有司尚書省不決事左右丞不勾杖左右丞相不判徒況天子乎太學徒取告丞簿職耳本傳君子居其位則思死其官韓文曠官十六白守官廢命不敬一日失職則死及之棄命廢職尸祿素餐羲和湎淫廢時亂日廢厥職尸厥官官罔聞知叛官離次以于先王之誅以速官謗怠慢不治能官敢煩寵乎失政不立王事無曠怠於其位失官不食且昧恪居宜科懈位怠事慢官速戾既不治庖宜科出匣苟忘恤緯是謂拂經出匣毀櫝虎兕出於匣龜玉毀於櫝中是誰之過廢事慢易葬以士禮禮曰大夫廢其事終身不仕死以士禮葬之不司其局百官廢職服大刑禮官壞禮官失其守日食不書朔與日官之失也左傳惰慢禮蒞事不敬非孝也禮率職有怠官邪百事滋昏由官邪也闕而無罪苟不恭乎乃職必速戾于厥躬苟棄命於廢官則有常而無赦不能承式何以守官臨事有虧則思移過夫斯不請誑合當辜慢官之從徒告闕供臨事之前胡不申請左不攻于左汝不恭命都家之理有不及者周禮朝大夫掌都家之理注都家王子弟也天子之事當施於都家者使知而行之凡都家之理有不及者誅其朝大夫在軍旅則誅有司不及謂有稽殿者也滿百漢陳遵為椽不治曹事數廢被謫主者報曰陳掾今日以某事謫遵曰滿百乃相聞故事謫滿百者斥曹參為相不事事不事丞相之事沉職沉滯不舉備位言無職事具臣充位張湯為御史大夫每奏事日旰天子記食事皆決於湯丞相充位而已州縣之職徒勞人耳日飲醇酒曹參終日清談王夷甫為元城令終日清談縣務亦理養名逋事具怠隋門注孔有司弛墮韋溫諫比詔下閲月有司弛墮不力正可黜慢官懲不恪懌可任者繕完之則吏舉職事歸正矣妨職呂才東皋子集序除六合丞篤於酒德頗妨職務簿書棼如絲胥吏沸如糜皇甫湜吉州刺史廳記下車之初親簿書簿書棼如絲視胥吏胥吏沸如糜召詰其官皆眊然如酲登進其民皆薾然而疲官曹虛設陸長源上宰相書兵部無戎帳戶部無版圖虞水不管山川金倉不司錢榖光祿不供酒衛尉不供幕祕書不校勘著作不修撰官曹虛設俸祿相請小大間劇之殊陸贄奏議職事雖有小大間劇之殊而俱不可曠缺者蓋備于時而用爾得其人則公務克修非其人則厥官如曠官曠則事廢事廢則太殘漸至陵遲蕭至忠論鬻爵近侍要官多居美爵切見宰相及近侍要官子弟多居美爵此蓋勢要親戚罕有才藝遞相囑託虛踐官榮詩云東人之子職勞不賚西人之子粲粲衣服私人之子百寮是試或以其酒不以其漿鞙鞙佩璲不以其良此言王政不平衆官廢職私家之子列試於策班非其人徒長其飾佩上御史出都舊史韋思謙授監察御史謂人曰御史出都若不搖動山嶽震耀州縣是謂曠職爾棄官十七白棄官則族無所庇傳宋公孫蕩不仕無義君子之仕行其義也歸去來陶潛為彭澤令曰今日不能為五斗粟折腰於鄉里小兒乃棄官作歸去來雌伏東觀漢記趙溫子柔為京兆郡丞歎曰大丈夫當為雄飛焉能雌伏遂棄官而去命駕適意世說張翰字季鷹為齊王東曹掾在洛陽見秋風起因思江南菰菜羹鱸魚鱠曰人生所貴適意何能羈宦數千里以邀名爵乃命駕東歸解印詠風陶潛事難進易退君子三揖而進一辭而退君子奉身以退量力而行陳力就列不能者止不仕王侯高尚其事逃祿文子惡郡守後漢擅敷蒙成今以郡守非其人乃棄官投傳周景辟陳蕃為別駕以諫不合投傳去不樂為吏枚乘為弘農都尉不樂為吏去官客游梁三綱絶後漢逢萌字子慶見王莽殺子宇曰三綱絶矣不去禍及乃解冠掛東都門而歸也池中龍種襄陽記龐德公子奐字世文晉太康中為牂牁太守去官歸鄉居白沙里鄉人宗敬之相語曰我家池中龍種來里中化其德讓少壯皆代老者擔行意鄫衍制臣行意拯人後漢黨錮事下詔捕范滂督郵吳導至縣抱書閉閣伏床而泣滂聞之曰此必為我也即自詣獄縣令郭揖大驚出解印引出俱去曰天下事大矣子何為在此曰滂死則禍塞何敢以罪纍君又巴肅坐黨自載詣縣縣令見肅入閣解印綬欲俱去肅曰人臣有謀不隱有罪不怨遂被害刺史賈琮刻石記之長吏有嫌晉陶侃士衡補武署令與太守呂嶽有嫌棄官而歸不之官後漢楊倫以諫不合出補常山主簿病不之官民司隸催促倫上疏曰有留死一尺無北行一寸徵詣廷尉詔原之母杖世說王經彥緯為江夏守曹爽附絹三十匹令交市於吳經不發書棄官歸母以經典兵馬而擅去官對送使杖五十爽聞不復加罪免冠貢禹少翁為河南令以賊事為府官所責免冠謝禹曰冠一免豈可復冠耶遂去官也不過六百石漢邴漢兄子曼容為官不過六百石輒自免去奉遺戒王吉嘗坐昌邑王被刑戒子孫無為王國吏及子駿遷趙內吏遂免官歸不及政事閔仲督應司徒侯霸之辟既至不及政事仲叔曰辟而不問是失人也投劾云云投版范滂孟博為光祿主事執公議見光祿勳陳蕃蕃不止之滂恨投版棄官郭林宗聞而讓蕃誥誓王義之逸少會稽人稱疾去官於父母前自誓曰今後敢踰此心貪冒苟進是無尊而不子也孔棄官隱武寧山柳渾纍遷衢州司馬後棄官隱武寧山灌畦掇薪元結父延祖不在年過四十親婭彊勤之再調春陵丞輒棄官去曰人生衣食可適飢飽不宜復有所須每灌畦掇薪以為有生之役過此吾不思也母羸老未及迎而病林贊仕為福唐尉母羸老未及迎而病贊棄官還酣美酒王績大樂署史焦革家善釀績求為丞革死妻送酒不絶歲餘又死績曰天不使我酣美酒邪棄官去徒步歸鄉里賀知章肅宗為太子知章遷賓客授祕書監而左補闕薛令之兼侍讀時東官官積年不遷令之書壁望禮之薄帝見復題聽自安令之即棄官徒步歸鄉里輕舟夜遁呂才東皋子王績集序天下亂藩部法嚴屢被劾君歎曰羅網高懸去將安所遂出所受俸錢積于縣城門前託以風疾輕舟夜遁恥為王府屬郝處俊轉滕王友恥為王府屬棄官去負薪採橡栗杜甫為華州司功參軍關輔饑輒棄官去客秦州負薪採橡栗自給疾其姦蕭存張滂主財賦辟留務京師時裴延齡與滂不葉存疾其姦去官不得意韋正貫為單父尉不得意棄官去放情事外武元衡為華原令時畿輔有鎮軍督將恃恩矜功者多撓吏民元衡苦之乃稱病去官放情事外沈浮宴詠者久之德宗知其才召授比部員外郎舊史刺史不禮劉幽求制科中第調閬中尉刺史不禮棄官去李思訓為江都令武后多殺宗室思訓棄官去中宗復位以耆舊擢宗正卿歸養楊播舉進士退求志玄宗召拜諫議大夫棄官歸養肅宗即家拜散騎常侍杜門絶人事趙光逢昭宗時為御史中丞以世亂棄官洛陽杜門絶人事者五六年白愛君之祿寵光寵命君命吾又寵秩之傳得祿祿在其中拜於家即拜漢張敞亡命冀州賊起上使即家召敞拜冀州刺史又哀帝即楚拜龔舍為太山太守使者請舍至縣拜受印綬舍曰云云遂於家受詔便道之官也又阮孚轉吏部尚書領東海王師稱疾不拜詔就家用之卻鑒以為非禮帝曰就家用之誠快不爾便廢才也冒雨拜王雅茂達將拜太子少傅遇雨請以繖入王恂不許用冒雨而拜孔拜起居郎沈佺期稍遷台州録事參軍事入計得召見拜起居郎兼修文館直學士自草茅擢拾遺舊史崔群隱居明陵以節操聞韋夏卿薦群徵拜左拾遺遷侍御史充入蕃使判官群奏曰陛下即位二十年自草澤擢臣為拾遺是難其進也以二十年難進之臣用為判官一何易也非其好東皋集序獨步當時及為正字端簪理笏非其好也拜左贊善白樂天拜左贊善請亟捕盜宰相不悅若得吏部之職則拜陸贄請薦舉屬吏狀宋朝以蔡廓為吏部尚書先使人謂宰相徐羡之曰若得行吏部之職則拜不然則否羡之答曰黃散以下悉以委之廓猶憤恚以為失職遂不之官是則黃門散騎侍郎皆由吏部選授不必朝廷列位盡合東在台司此其明驗也盧質莊宗即位欲以質為相質性疏逸不欲任責因固辭不拜五代以吏最拜長安令薛蘋白奉身而退善為我辭季氏使閔子騫為費宰子騫曰善為我辭焉陳力就列不能者止知止不殆灌園於陵子辭三公為人灌園乞骸骨漢平當為丞相病驚上書乞骸骨上使尚書杜延年賜安車養牛一上尊酒十石曰君其勉就醫藥又杜延年賜安車驅馬罷就第又韋賢為丞相老病又韋賢賜金百斤罷加賜第一區丞相致仕自賢始遺失後漢世祖彊起張湛為司徒湛至朝堂失溲因自謝病而止劉矯有高節以叔父未得仕進絶州郡之命魏志讓封魏田疇子泰襲祖封侯讓不受有司劾疇狠愎苟立小潔宜加刑鍾繇議宜勿奪志又韋玄成佯狂讓封以避兄冶廑辭卿傳周遄冶廑納衛侯衛侯以為卿周冶既服將命周還先入及門遇疾而卒冶廑辭卿注見遄死故也重繭鮮食蘧子馮辭令尹重繭衣裘鮮貿而寢楚子使醫視曰瘠則甚矣而血氣未動言無疾也乃免敢辱高位以速官謗傳齊使敬仲為卿曰羇旅之臣幸免獲戾敢辱高位云云投檄漢崔篆以明經徵諸公車太保甄豐舉為步兵校尉篆辭曰吾聞伐國不問仁人戰陳不訪士此舉奚為至哉投檄而歸臣行意范蠡辭官曰君行令臣行意乃扁舟泛五湖辭外官蕭望之長倩拜平原守上疏曰陛下諫官補郡吏所謂憂末而忘本又黃香為尚書令遷東郡守上疏云典郡才非堪願留備冗員督責小職復為尚書令不許辭晉卞壺望之為尚書令時召樂謨為郡中正庾怡為廷尉評一人告稱父命不就壺奏一切班下不得以私讓為永制二子不得已就之辭大周處子隱除楚內史未行徵拜散騎常侍處子辭大不辭小遂之楚辭官得罪蔡謨上疏以疾病乞骸骨上司徒印綬章二十餘上穆帝臨軒遣使徵謨陳病篤曰有公族穆子之疾寢伏待罪自旦及申公卿奏謨慢免為庶人視子疾陸訥袒言為吏部尚書以愛子長生有疾求解官營視詔許之避舉主後漢劉陶子奇遷尚書以所舉主為尚書不可齊列乞就冗散拜侍中避功臣杜詩公君為南陽欲降避功臣上疏曰宜虛數郡待振旅之臣臣非宜所願受小職諱同王舒處明父名會舒拜會稽內史舒上疏乞換他郡朝廷議以字同音異舒又陳辭於是改會為鄶不得已而行之同名江統為中郎選司以統叔春為宜春令統因上疏曰去云但以職位之衆士人殷繁使至受官而令佐吏不得稱子孫不得言朝廷從之官不屑就辭合善為匪念恪居徒思智免孔謝病歸溫大雅父君攸入隋為泗州司馬見朝政不綱謝病歸纍表辭位魏徵進鄭國公纍表辭位不謀于家李日知拜侍中先天元年罷為刑部尚書屢乞骸骨許之日知將有請不謀于家歸乃治行妻驚曰産利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭于心無日而足也子文避祿謂之逃死冶廑辭卿迫於懼禍一品制集讓官表終制就職蘇頲遭父喪起為工部侍郎辭不拜不以吏部之子妄推薦陸象先吉頊為吏部擢洛陽尉元方時亦為吏部固辭不敢當頊曰才望高雅非常流所及實不以吏部之子妄推薦也白薛宣為馮翊潁陽多盜賊令薛恭未嘗治民職不辨粟邑縣小人謹朴易理令尹賞有才宣奏賞與恭換縣旬月間兩縣皆理曰公綽優於趙魏毋丘儉魏志儉為鎮南將軍豫州刺史諸葛誕東關不利乃令誕儉對換誕為豫州儉為揚州不擇官吳志孫策從容與呂範曰將軍士衆日盛綱紀猶有不理願暫領都督為將軍部分之策曰子衡已有大衆立功於外豈宜復屈小職知軍中細碎範曰今託將軍欲以官猶同舟涉海此亦範之計非但將軍策笑範出釋褠著褲褶執鞭詣閣下啓事自稱領都督策乃委以衆事威禁大行又晉褚裒謂李充曰能屈作一小縣否充曰窮猿奔林豈暇擇木遂作剡縣子路曰家貧親老不擇祿而仕捧檄毛義事親李張奉慕其名往候之會州檄至以義守令義捧檄入喜見顏色奉以是賤之後乃悟曰為親故也辭大就小葛洪稚川遷散騎常侍領大著作不就以年老欲鍊丹祈遐壽聞交趾出丹砂求為勾漏令帝以其資高不許洪曰非欲榮以有丹砂故耳帝從之阮籍求為步兵校尉聞步兵廚有貯酒三百斛乃求之也孔母不肯去鄉里張九齡出為冀州刺史以母不肯去鄉里換授洪州都督父嫌名韋聿遷祕書郎以父嫌名換太子司議郎兩換其職常袞以崔祐甫剛直因議群臣喪服不同袞上言祐甫率情變禮輕議國典自中書舍人謫為潮州刺史是時中書令郭子儀檢校司空平章事朱泚名是宰相當署制敕至於密勿之議則莫待聞時德宗踐祚未旬日居不言之中袞循舊事代署二人之名進貶祐甫敕出子儀及泚皆表明祐甫不當貶謫上曰向言可謫今言非罪何也二人皆奏實不嘗有謫之言德宗大駭罷為河南少尹以祐甫為門下侍郎平章事兩換其職舊史無替字人之術元稹吉旻誥京兆尹季同以旻有幹蠱之稱流聞于西遂其換縣之求無替字人之術謁宰相請移散官杜羔元和中為萬年令許季同為長安令京兆尹元義方責租賦不時將繫之羔等辨列尤苦尹不為縱羔乃謁宰相請移散官憲宗遣使問狀具對府政奇細力不堪奉詔皆免官奪尹三月俸議者以羔為直白馬曹見人部縱逸門統攝統屬攝寮寮吏長吏下列下位資事名參下吏職隸外臺入被光逸為博昌小吏縣令使逸送客遇寒雨沾濕凍還遇令不在遂解衣入令被中令還怒將加刑逸曰若不暫溫必凍死豈惜一被而殺一人故不疑令奇而釋之登車王徽之子猷為桓沖騎兵參軍沖問職事曰似馬曹從行遇雨下馬挑入沖車曰豈獨擅一車邪怒不謁殷仲文選東陽太守何無忌甚重之東陽無忌所統許便道修謁無忌欽遲之仲文失志恍惚遂不過府無忌以為薄己大怒遂中傷之踞見後漢沈景拜河間孝王相謁王王不正服箕踞殿上侍郎贊拜景不為禮問王所在虎賁曰是非王耶景曰不正服與民何別恐傷鄭當時未嘗名吏與官屬言若恐傷之役使蓋寬饒次公左遷衛司馬先時拜謁衛官常為繇使市買寬饒遂按舊令遂衛官屬行衛者繇使朝諸尚書辭也迎送孔奮君魚為姑臧令太守梁竦未嘗待以官屬之禮常迎於大門引入見其母也師友嚴詡為潁川與掾吏為師友如賓孫寶子嚴為京兆尹故吏侯文不肯仕寶以恩禮請文署為掾進見如賓禮拜起朱博為琅琅守門下掾貢還耆儒拜起舒遲博出教主簿云貢不習吏禮主簿且教拜起面折長官郅惲君章太守歐陽飲請為功曹汝南舊俗十月饗食百里內縣以牛酒到府臨饗禮畢歙教曰西郡督郵繇延天資忠貞云云欲顯于朝惲於下坐愀然前曰司正舉觥以君罪謝今案延資性貪鄙外方內圓云云明府以惡為善惲敢再拜奉觥歙慚曰敬受觥陳疾去也善事官長任延長孫為武威守帝戒曰善事官長無失名譽延曰忠臣不和和臣不忠上下雷同非陛下之福帝曰善買牛不與後漢朱暉文季為都吏太守阮況欲市牛暉不從及況卒暉厚贈送曰前有所求不與不敢以貨汙君德也孔日夕議事韓偓請逐李彥弼彥弼譖偓及令狐渙漏禁省語帝曰卿有官屬日夕議事奈何不欲我見學士邪主書楊炎與盧杞在中書同秉政盧杞密啓主書過咎逐之炎曰主書吾局吏也吾當自治之奈何相侵邪諸使辟署趙憬諸使辟署務得才以重府望能否巳試則引而置之朝無俾久滯帝皆然之楊於陵為句容主簿待韓滉節制金陵滉性剛嚴少所接與及於陵以屬吏謁謝滉甚奇之竟以女妻於陵舊史鏡湖秦望之遊元稹為浙東觀察使會稽山水奇秀稹所辟幕皆當時文士而鏡湖秦望之遊月三四焉副使竇鞏海內詩名與稹酬唱最多至今稱蘭亭絶唱天下聞其名爭欲取以為屬權皋安祿山籍其名表為薊尉祿山且叛以其猜虐不可諫欲行慮禍及親天寶十四載使獻俘京師還過福昌尉仲謨謨妻皋妹也密約以侯召之謨來皋陽喑直視謨而暝謨為盡哀自唅斂之皋逸去人無知者吏以詔召皋母母謂實死慟哭感行路故祿山不之虞歸其母皋潛候於淇門奉侍晝夜南奔客臨淮為驛亭保以詗北方既度江而祿山反天下聞其名爭欲取以為屬見屬吏輒先拜李元素為御史大夫內望作宰相久乏不見用則謝賓客曰無以官散外我見屬吏輒先拜人人失望委成於參佐張弘靖充盧龍節度使委成於參佐官屬輕侻酣肆夜歸燭火滿街前後呵止其詬責士皆曰反虜韋雍張宗厚又不通大體復刻軍賜專以法根治之是夕軍亂同上同官二十二白同官為寮吾常同寮敢不盡心聯事同上分職公司僚友司官官分聯屬聯職同班相恤國語臧文仲不交言漢陽偏仁辟司徒桓虞府府掾有宋章貪奢不法仁終不與交言同席也同臺郎表取罪後漢雷義同臺郎坐事當居罪刑義默然自表取其罪代還錢陳重有同舍郎負息錢重密以錢還疑盜絳直不疑為郎告歸同舍郎亡金意不疑盜之不疑不自明買金償之後誤持去者來乃明近不逼同魏伐及爾同僚詩併肩事主漢孔同位不相假蕭嵩進中書令裴光廷卒帝委嵩懌相嵩推韓休及同位峭直不相假至校曲直帝前蕭王並位蕭遘同平章事始王鐸主貢舉而得遘及是與鐸並位鐸年老嘗入對踣殿中遘掖起之帝喜曰遘善事長大臣和豫之幸也遘曰不止以長乃鐸門生帝笑曰鐸選士朕選宰相卿無負我遘頓首謝聯署歸登為右拾遺同列有所諫正輒聯署無所回諱郎家二賢郎餘令授霍王元軌府參軍事從父知年亦為王友元軌每曰郎家二賢皆入府不意培塿而松柏為林也聯舍敬晦進士及第辟山南東道節度府與馬曙聯舍於是師不政法制陵頽曙引所吏廷責之吏負兼軍職不引咎走訴諸府牙將旦十輩方雜語以申吏枉晦讓諸軍將曰吏冒軍名公等不能詰反引與為伍奈何衆愧謝闔府咨美多君子寮留守無事多君子寮韓文同服官僚同上同舍竇參為人矜嚴同舍當夕直參代之新史鼠虎俱為相屬陸長源以舊德為宣武行軍司馬韓愈為巡官或譏其年舊相遠愈曰大蟲老鼠俱為十二相屬何怪之有李肇國史補齊名韋元甫初任滑州白馬尉採訪使韋陟深器之奏充支使與同莫判官員錫齊名元甫精於簡牘錫詳於訊覆陟惟誠待之時謂員推韋狀舊史聯曹結綬權德輿唱和詩序貞元元和間為渭州尉聯曹結綬相視莫逆同寮竇參為萬年尉時同寮有直官曹者將夕聞親疾請參代之會獄囚亡走京兆君按直簿將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之舊史白任安漢衛青日衰霍去病益貴門下故人多事去病唯任安不去避席漢田蚡起為壽人皆避席魏其侯為壽故吏賓客避席餘皆半席戎首世說向雄為河南郡掾公事不畢太守劉淮笞之後俱在朝不相往來晉武令復君臣之好雄曰臣於河內不為戎首何好之有帝從之見泣桓玄年七歲服終州府文武吏辭其叔父沖撫玄曰此汝家故吏玄涕泣被面同升胡廣伯始凡七為三公故曰陳蕃李咸並為三司每朝會蕃等常稱疾避廣時人榮之見本傳馬駃蜀陽洪為蜀郡時書佐何祗數年後為廣漢太守每朝會祇只次洪朝洪曰君馬何駃祗曰故吏不敢駃但明府未著鞭也孔病召故吏柳公綽以病授兵部尚書不任朝請忽顧左右召故吏韋長衆謂屬諉以家事及長至乃曰為我白宰相徐州專殺李聽親吏非用高瑀不能安因瞑目不復語蜂附蟻合大抵當隆赫柄用而蜂附蟻合煦煦趄趄便僻匍匐以非乎人而售乎己若是者一旦勢異則電滅飆逝不為門下用矣柳宗元與顧中書書按杜黃裳故吏杜黃裳卒後數年御史劾奏黃裳納邠寧節度高崇文錢四萬五千緡按故吏吳憑及黃裳子載辭服帝念舊功但流憑昭州原載不問一切不問李宗閔凡不附已者指以為朋黨皆遂去之人人駭栗連月雺晦帝乃詔宗閔德裕姻家門生故吏自今一切不問所以慰安中外立石峴山韓思復卒後故吏盧僎邑人孟浩然立石峴山
