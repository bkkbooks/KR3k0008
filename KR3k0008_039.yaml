body:
  text: 卷第三十九白上聞上言上陳白奏青蒲伏青蒲奏事起草字誤漢石建為郎中令奏事事下建讀之驚曰馬與尾五令乃四不足一獲譴死也章奏漢陳湯字子公常受人金錢作章奏卒以此敗削稿漢孔光時有所言輒削稿持被覆之後漢馮豹字仲文為尚書即忠勤不懈每奏事未報嘗俯伏省閣或從昏至明肅宗聞而嘉之使黃門持被覆豹敕令勿驚之削本草後漢樊宏靡卿所上便宜及陳得失輒手自書寫削本草毀草後漢皇甫嵩義真前後上表陳諫有損益者五百餘事皆手書毀草不宣於外也焚草魏志荀彧文若以書陳事臨薨焚其草故奇策密謀不得盡聞也又魏志陳群長文密陳得失每上封事輒削其草時人及子弟莫能知之又晉羊祜叔子嘉謀讜議皆焚其草故世莫能聞之私竊其草漢師丹仲公議改幣丹使吏書奏吏私竊其草丁傅聞之告丹上封事行道持其書遂策免丹漢汲黯字長孺奏事上時在武帳不冠見黯起避使人可其奏其見敬憚如此敗章吳志太史慈字子義任郡曹吏與州有隙曲直未分以先聞者為善時州章已去郡曹恐後之可求使者慈年二十一以選行晨夜取道到洛陽城詣公車門州吏始來慈謂曰章題得無誤乎取視之因以刀截敗之州吏大呼曰敗我章慈將至車間與語曰向君不以章相與吾亦無因得敗之是為吉凶禍福等耳吾不獨受罪若默然俱去可以存易亡吏亡去慈既與出城因遁還通郡州章遂受其短周禮宰夫以諸臣之復萬人之逆注逆反迎受王命復謂朝廷奏事自上不逆謂上書也御僕吏之逆人之復條封急變聞急事去副封魏相奏去副封以防壅蔽副封謂副本也以所上事一本與尚書謂之副封壅於上聞程奏巧為奏自決露草疏舉賈誼草章草奏不及奏蕭何守關中事有不及奏即以便宜施行之太守請自奏事漢京房出為太山太守奏請無屬刺史得自乘傳奏事上初許之房論石顯五鹿充宗而上封事曰辛巳霧氣復乘太陽侵己卯庚辰間必有隔絶臣不能乘傳奏事也聽之忘倦馬援善談説每奏事上聽之而忘倦也露章漢何武君公遷揚州刺史所舉奏千石必先露章服罪者為虧除免之其不伏者極法奏之矜伐郤詵對晉武帝曰臣舉賢良對策第一猶桂林一枝昆山片玉侍中奏免詵官帝曰吾與戲耳為定奏章丞相玄成言朱雲暴虐雲上疏自訟陳咸為定奏章議所奏事趙充國翁孫每奏事上輒下其奏議臣初是充國計者什三中什五最後什八孔焚稿高士廉奏議未嘗不焚稿家人無見之者削稿戴胄所敷奏時政得失咸有可觀奏己即削稿祕外莫知焚馬周疾甚取所上章奏悉焚之曰管晏暴君之過取身後名吾不為也作章攬筆而具蘇味道吏部侍郎裴行儉才之會征突厥引管書記裴居道為左金吾衛將軍倩味道作章攬筆而具間徹清密削諸武封岑羲為中書舍人中宗時武三思用事敬暉欲上表削諸武封王者衆畏三思不敢為草獨羲為之詞誼徑切數上書勸帝願無輕敵久事外夷房玄齡上封者欲加譙黜魏徵時上封者衆或不切事帝厭之欲加譙黜徵曰古者立謗木欲聞已過封事其謗木之遺乎陛下思聞得失當恣其所陳言而是乎為朝廷之益非乎無損於政帝悅皆勞遣之論事先白長官顏真卿時元載多引私黨畏群臣論奏乃紿帝曰群臣奏事皆挾讒毀請每論事先白長官真卿上疏云陛下聞見止於數人耳目天下之士方鉗口結舌草遺奏令狐楚鄭儋繼領大原引掌書記至判官德宗喜文每省大原奏必能辨楚所為數稱之儋暴死不及占後事軍大歡將為亂夜十數騎挺刃邀取楚使草遺奏諸將圜視楚色不變秉筆輒就以遍示士皆感泣一軍乃安由是名益重疾甚自力為奏謝天子其為文於箋奏制令尤善每一篇成人皆傳諷疾甚自力為奏謝天子召門人李商隱曰吾氣魄且盡可助我成之其大要以甘露事誅譴者衆請霽威普見照洗辭皆曲盡無繆脫同上奏議待群署乃得上崔群數陳讜言憲宗嘉納因詔學士凡奏議待群署乃得上群以禁密之言人當自陳一為故事後或有惡直醜正則它學士不得上言矣固辭見群本傳頗用古言鄭餘慶奏議頗用古言如仰給縣官馬萬蹄有司不曉何等語人訾其不適時無遺奏裴度薨帝怪無遺奏敕家人索之得半稿以儲二為請無私言草奏皆意所不及張嘉真補平鄉尉坐事免長安中御史張循憲使河東事有未決病之問吏曰此頗有佳客乎吏以嘉真對試命草奏皆意所未及它日武后以為能循憲對皆嘉真所為因請以官讓疊署二封李澄每上章必疊署二封士大夫笑其野腕可斷表不可為黃巢據荊南脅李迢草表報天子迢曰吾腕可斷而表不可為巢怒殺之置書左右裴耀卿為濟州刺史會天子東巡帝謂張説曰裴耀卿上書數百言至曰人或重擾則不足以告成朕置書左右以自戒此其愛人也遺表顏真卿李希烈拘送真卿蔡州真卿度必死乃作遺表囊封奏事韓全誨張彥弘及彥弼合勢恣暴中官倚以自驕帝不平有斥逐者皆不肯行徹固請盡誅之全誨彥弘見帝祈哀帝知左右漏言始詔囊封奏事批監軍表梁守謙為院使見錢徽批監軍表語簡約嘆曰一字不可益邪銜之表責太重于頔誣劾鄧州刺史元洪朝廷不欲重違為流端州命中人護送至棗陽頔遣兵劫洪還拘之表責洪太重改吉州刺史言其淺鄙司空頲張彥之亂命判官王正言草奏詆斥梁君臣正言素不能文辭又為兵刃所追流汗浹背不能下筆彥怒惟正言下榻詬曰鈍漢辱我顧書吏問誰可草奏者即言頲羅王時書記乃馳騎召之頲亂兵劫其衣以敝服敝形而至見彥長揖神氣自若揮筆成文而言甚淺鄙彥以其易曉甚喜即給以衣服僕馬遂以為德倫判官後權軍府事五代史帝狩奏天李懷光率所部奔命李懷光帝狩奉天李懷光率所部待命將抵奉天前遣裨將詔以蠟韜表隨賊攻城叩壘呼曰吾朔方使也縋而上比登身被數十矢帝被圍急聞之喜即持詔大號城上人心乃安刳肝以為紙瀝血以書辭歸彭城我欲進短策無由至丹墀刳肝以為紙瀝血以書辭上言陳堯舜下言引龍夔言詞多感激文字少威蕤一讀己自怪再尋良自疑食芹雖云美獻御固已癡緘封在骨髓耿耿空自奇明朝有封事杜宿左省明朝有封事數問夜如何為今體章奏李商隱能為古文不喜偶對從事令狐楚幕能章奏遂以其事授商隱自是始為今體章奏博學強記下筆不能自休兩章對秋月一字階華星杜甫同元使君春陵行兩章對秋月一字階華星致君唐虞際純朴憶大庭草奏七卷唐權德輿陸宣公翰苑集序潤色之餘論思獻納軍國利害巨細必陳則有草奏七卷覽公之奏則知公之為臣也寫宣王起帝嘗以疑事令使者口質起具榜子附使者上凡成十篇號曰寫宣本傳陳事者悉上封太宗本紀貞觀元年五月癸丑敕中書令侍中朝堂受訟辭有陳事者悉上封白晝日三接揚于王庭書思對命禮史進象笏對揚天子休命造辟而言辟君也詭辭而出榖梁言上造膝諫事不可書傳史范推天威不違顏咫尺傳龍顏君召謂上為君漢夏侯勝質朴守正簡易無威儀見時謂上為君誤相字於上前上以是親信之衣褐見漢虞將軍與婁敬解衣敬曰衣帛衣帛見衣褐衣褐見延問進讀群書班遊於上前約背漢公孫弘嘗與公卿議至上前更背之汲黯曰齊人多詐始與臣等議而今背之忘食張湯每朝奏事天子曰旰食丞相充位而已事皆決於湯也庭詰汲黯庭詰公孫弘曰齊人多詐敷奏書有度漢霍光子孟每出入下殿進止有常度長者之言後漢詔問光祿勳劉琨曰前在江陵反風滅火後守弘農虎北渡河行何德政而致此琨曰偶然耳左右笑其質訥帝嘆曰乃長者之言應諾魏遊楚為隴西太守以功封侯引上殿不習朝覲被詔登不知儀式帝令侍臣滿中贊引呼隴西太守前楚當言唯不覺大應諾帝笑勞免之有疾魏志鍾繇元常有疾拜起不得時華歆亦以高年疾病朝見皆便載輿虎賁輿上殿就坐自是三公有疾以為故事醉睡後漢劉寬文饒每引見帝令寬講經寬嘗於坐被酒睡伏帝問太尉醉耶寬對曰臣下不敢醉但任太責重憂心如醉也醉面折後漢馬武子張為人嗜酒闊達敢言時醉在御前面折同列言其長短帝故縱之以為樂也盤辟雅拜漢何武舉方正士召見盤辟雅拜有司劾失舉漏泄夏侯勝常見出道上語上聞讓勝勝曰陛下所言善故揚之嘉言布於天下至今見誦臣以為可傳故傳之也堯言見上注對見二孔見內殿以簾自障張嘉真武后召嘉真見內殿以簾自障嘉真儀止秀偉奏對侃侃后異之因請白臣草茅之人未睹朝廷儀陛下過聽引對禁近今天威咫尺若隔雲霧恐君臣之道有未盡也后曰善詔上簾引拜監察御史神氣爽徹古對有序源乾曜自梁州都督召見神氣爽徹古對有序踰月不得見宗室巨拜夷陵太守安祿山陷東京玄宗方擇將帥張垍言巨有謀可屬大事召至京師楊國忠忌之謂人曰小兒詎可使對天子踰月不得見帝知之召入禁中對合旨帝大悅敕宰相與語久不得罷外官奏事顏色不接間因所短詰其細過魏徵陳十漸在貞觀初遇下有禮群情上達今外官奏事顏色不接間因所短詰其細過雖有忠款而不得申此不克終入漸也下有所陳當不時上李遜故事天子以畸日聽政對群臣遜奏陛下求治而下有所陳當不時上豈宜限以日如是畢歲得望天子者幾何憲宗悅從之雙日開延英張茂昭為節度使至京師雙日開延英對五刻罷召陳子昂武后奇其才召見金華殿子昂貌柔野少威儀而占對慷慨擢麒臺正字母拜白敏中懿宗立召拜門下侍郎數月足病不任謁俾對便殿毋拜右補闕王譜奏言敏中病四月陛下坐朝與它宰相語不三刻安暇論天下事詔延英坐日許百司長官二員言闕失謂之巡對薛玨為京兆尹是時韋彤為萬年令玨使彤禁鬻賣民苦之德宗怒奪玨彤俸帝疑下情不達因詔延英坐日許百司長官二員言闕失謂之巡對以軍務對者見不以時陸贄帝又問贄事切於今者贄勸帝群臣參日使極言得失若以軍務對者見不以時聽納無倦兼天下之智以為聰明帝曰朕豈不推誠然顧上封者惟譏斥人短長類非忠直往謂君臣一體故推不疑至憸人賣為威福今茲之禍推誠之敝也不待日召見張建封貞元四年拜徐泗濠節度使十三年來朝帝不待日召見延英殿欲一識卿面張萬福大歷三年召見代宗曰欲一識卿面且將以許杲纍卿萬福辭謝因前曰陛下以一許杲召臣如河北諸將叛欲屬何人帝笑曰姑為我了杲事且當大事乃拜和州刺史兼行營防禦使御小延英召對苗晉卿拜待中時年老蹇甚乞間日入政事堂帝優之為御小延英召對宰相對小延英自晉卿始始見軒陛元結史思明攻河陽帝將幸河東召結詣京師問所欲言結自以始見軒陛拘忌諱恐言下悉情乃上時議三篇五刻罷李吉甫還秉政入對延英凡五刻罷與六學士對便殿柳公權嘗與六學士對便殿諭遣陳京帝疑京為忌者中傷中人問賚相繼後對延英帝諭遣京沮駭走出罷為祕書少監當時上紫殿不獨卿相尊杜甫往昔武皇后臨軒御乾坤多事盡儒冠墨客謁雲屯當時上紫殿不獨卿相尊詔百官以次轉對李琪又建言入閣有侍制次對官論事而內殿起居一時而退欲有言者無由自陳非所以數見群臣之意也明宗乃詔起居日有言事許出行自陳又召百官以次轉對五代史五十四不以時請對盧文紀是時天下多事廢帝數以責文紀文紀因請罷五日起居復唐故事開延英冀得從容奏議天下事廢帝以謂五日起居明宗所以見群臣也不可罷而便殿論事可以從容何必延英因詔宰相有事不以時詣閣門請對五代史五十五迎謁于道崔渙出為巴西太守玄宗西狩迎謁于道帝見召奏以為明治體恨得之晚每延英對宰臣率漏下十一刻文宗即位鋭意於治每延英對宰臣率漏下十一刻本贊輟朝放朝皆用雙日唐制天子以雙日視朝乃命輟朝放朝皆用雙日氣息平均宣宗坐朝次對官趨至必待氣息平均然後問事令狐綯擬李遠為杭州上曰常聞李遠詩長日惟銷一局棋豈可臨郡哉對曰詩人之言託此為高興未必實然幽間鼓吹詔書引上殿令弟草中來蒼然請論事詔書引上殿奮舌動天意杜甫逸從弟亞新望穆穆之光韓愈聖德詩序曰與群臣序立紫宸殿下親望穆穆之光白下問上陳清問不希旨苟合漢孔光子夏習漢制上有所問處經而對不希旨苟合或不從不強爭時有所言輒削稿草據經以對蜀志譙周允南雖不預事以儒行見禮待訪大議輒據經以對咨訪吳志闞德澤潤每朝廷大議經典所疑輒咨訪之孔不能對竇德玄贊圖封禪帝次濮陽問古謂帝丘德玄不能對許敬宗具道其然帝稱善失旨崔湜帝將誅蕭至忠等召湜示腹心弟澄諫曰上有所問謹無隱湜不從及見對問失旨至忠等誅湜徙嶺外辨對益詳程名振轉洺州刺史太宗征遼東召問方略不合旨帝勃然詰之名振辨對益詳帝意解謂左右曰房玄齡常在朕前見朕嗔餘人色不能主名振生平未識我一旦誚讓而辭吐不屈真奇士哉每召與語雖甚倦徙倚軒檻猶數刻罷韋思謙高宗賢之每召與語雖甚倦徙倚軒檻猶數刻罷陳治亂所宜王及善擢魏州刺史武后因延問朝廷得失及善陳治亂所宜問外事陸元方同平章事后常問外事對曰臣備位宰相大事當白奏民間碎務不敢以聞選縣令詔問所以安人者韋濟調鄄成令或言吏部選縣令非其人既衆謝有詔問所以安人者對凡百人惟濟居第問家世及年溫造入奏天子愛其才問造家世及年對曰臣五世祖大雅外五世祖李績臣犬馬之齒三十有五帝奇之昏繆失對竇誕太宗與語昏繆失對講天下事李絳嘗盛夏對延英帝汗浹衣絳欲趨出帝曰朕宮中所對惟宮官女子欲與卿講天下事乃其樂也延英奏事五六刻乃罷韋渠牟為諫議大夫每延英奏對雖大臣率漏下二三刻渠牟每奏事輒五六刻乃罷天子歡甚雖數十事未嘗書于笏王播善占奏雖數十事未嘗書于笏問除二鎮陳夷行會以王彥威為忠武節度使史孝章領邠寧議皆出嗣復及夷行對延英帝問除二鎮當否對曰苟自聖擇無不當者嗣復曰若用人盡出上意而當固善如小不稱下安得默然夷行曰比姦臣數干權願陛下無倒持太阿以柄授人嗣愎曰古者任則不疑齊桓公器管仲於讎虜豈有倒持意邪帝以其言相觸頗不悅問天帝異稱邢文偉載初元年為內史后御明堂詔文偉發孝經后問天帝異稱云何文偉曰天帝一也制曰郊后稷以配天祀文王於明堂以配上帝奈何而一對曰先儒執論不同昊天及五方總六天帝后曰帝有六則天不同稱固矣文偉不得對問閽以中官方強不敢對許康左為侍講帝讀春秋至閽殺吳子餘祭問閽何人耶康佐以中官方強不敢對帝喜笑罷後觀書蓬萊殿召李訓問之對曰古閽寺今宦人也君不近刑臣以為輕死道孔子書之以為戒帝曰朕邇刑臣多矣得不慮哉訓曰列聖知而不能遠陛下念之宗廟福也於是內謀剪除矣軍國大務輒訪張説每軍國大務帝輒訪焉天子欽矚周墀遷起居舍人帝御紫宸與宰相語事已或召左右資質所宜墀最為天子欽矚間殿曠廷文粹來鵠聖德紀頌間殿曠廷無君臣咨謀洋溢之言阻越對揚同上宰執不正窺伺是忌針棘前後阻越對揚狼噬虎餐持膏衒肉蓋以多言為巳曾不致君嚴遂高居未嘗臨問陸相奏議陛下嚴遂高居未嘗降旨臨問群臣局蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通對有理趣崔珙為嶺南節度使入對延英文宗訪冶道後先珙對精亮有理趣帝咨嗟久之詳洽王徽昭宗立見便殿進對詳洽敷奏薑公輔有高世之才每進見敷奏詳亮德宗器之辭吐華暢房琯奏册靈武見肅宗具言上皇所以傳付意因道當時利病箝索虜情辭吐華暢占奏俚近鄭光七年不朝對延英占奏俚近帝不悅凡除吏必召見訪問親察其能否唐文宗贊陛下何不以聽朝之餘時御便殿詔當世賢相與舊德老臣訪持變扶危之謀求定傾救亂之術塞陰邪之路屏褻狎之臣戒其所宜戒憂其所宜憂既不得理於前當理於後既不得正其始當正其終劉蕡策諫諍四白開諫諍之道闢忠讜之門補察自卿大夫已下皆有父兄子弟以補察其過獻可替否治煩去惑有諫而無訕為人臣者諫而無驕唯木從繩則正后從諫則聖張良曰忠言逆耳利於行良藥苦口利於病士季三進及雷傳袞職有闕惟仲山甫補之詩夙夜在公日月獻納出入諷諫朝夕論思上下通情辭親策名則將身許危君陷惡何以臣為匡救其惡弼違舜曰豫違汝弼汝無面從工執藝事以諫朝夕納諫以輔台德台我也況當不諱之朝宜勵勿欺之節讜言嘉謀匡其不及命百官針王闕過則匡之失則革之傳史為書書其得失瞽為詩詩以諷刺工誦針諫工樂人也誦針諫之詞大夫規誨規正也誨諫也士傳言士卑不得徑達聞君過失告大夫庶人謗百工獻藝並左傳補闕正違君違不忘諫之以德臧哀伯諍臣七人天子進思盡忠退思補過事君以忠遂事不諫為臣不易一言興邦三進及霤量而後入禮事君者量而後入不入而後量故上無怨而下遠罪也謂量其事意可否而後諫嘉言罔攸伏書司諫掌紏萬人之德朋友之道保氏掌諫五惡養國子以道也尸諫史鰍死遺令殯於階下靈公來吊問之其子曰父云生不能退彌子瑕進蘧伯玉令殯於此公乃對殯退彌子瑕進蘧伯玉遂改殯焉三諫不聽則去驟諫請留將晉師為楚敗荀桓子請死所晉侯許之士貞子諫曰不可林父社稷之臣也夫其敗如日月之食何損於明三日晉侯乃使復其位傳直諫是以伏死而諫藥石之言子曰事君勿欺而犯之犯顏諫也有犯無隱可犯顏諫也無隱謂論政得失也面折庭諍陳平謂王陵曰面折庭諍我不如君安劉氏宗廟君不如我廣德之上樓船漢薛廣德為御史大夫直言極諫上欲御樓船廣德頓首諫上怒廣德又曰乘船危就橋安上乃從橋朱雲之折殿檻朱雲請上方斬馬劍斬佞臣張禹上怒令將雲下斬之雲攀檻折後欲理檻上曰勿理以旌直臣張良逆耳之忠見諫諍門杜欽拂心之直佩刀斷車鞅建武八年車駕西征郭憲諫不從乃拔佩刀斷車鞅光武不從穎川兵起乃回駕帝曰恨不用郭憲言破家為國魏志衛顗上疏曰非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一説也犯顏逆意指諫將表效於公忠豈敢辭於戮厚智在圖危直惟惡訐盡忠守死誠謂殺身之仁非罪陷刑是重納君之惡直能寤主仁有殺身盡忠無他宜將身許愛死不諫何以臣為寧違忤以遷善豈順從而履危極言直道辛毗引裾魏辛毗字佐治文帝欲徙冀州士人十萬戶實河南毗諫帝怒不答起入毗隨而引其裾帝怒良久乃出曰佐治卿持我何太急邪毗曰今徙既失人心又無以食也帝遂徙其半明主不惡切諫以博觀忠臣不避重誅以直諫漢書衆人之唯唯不如一士之諤諤楚辭云寧正言不諱以危身乎十居然則忠不陷君亂無立辟殷人守死雖曰比干之賢魯史正名終書泄冶之罪獲罪於天邦有道危言危行危厲也在於交友猶忠告而導之矧伊君臣實惡訐為直者為人臣者殺其身有益於君則為之禮既非言遜之朝詎有身危之慮實賴有位之士匡其不及繩愆紂繆革其非心頭軔乘輿後漢申屠剛諫帝出遊不從以頭軔乘輿乃止以言取罪臺鍾景公為臺臺成又欲為鍾晏子曰既築臺又約民為鍾民必哀以哀為樂非君民也諫畋景公畋十二日不反晏子曰嬰願有復也遂止之君安野不安國好獸而惡人乃不可乎於是罷畋即歸也諫愛槐齊景公有愛槐令使守曰犯者刑傷者死晏子諫曰君享國德未及於衆而刑辟如危國是不可以蒞國安民也遂罷守呂氏春秋曰衛靈公大寒鑿池范春曰天寒起役恐人傷公曰天寒乎哉春曰公衣狐裘坐熊席是以不寒民衣敝衣不補是以寒也楚莊王攻宋子重諫曰今君廚肉臭而樽酒敗三軍皆有飢欲以勝敵不亦難乎楚靈王坐章華之臺侍御數百隨珠照日羅衣從風孫叔敖曰昔紂行此而亡今四境內侵諸侯加兵土地日蹙百姓乖離君內寵無乃甚乎史高祖欲以趙王易太子叔孫通曰太子仁孝天下皆聞之呂后與陛下攻苦食淡其可背哉必欲廢嫡立庶臣願先伏誅以頸血污地帝曰吾直戲耳通曰太子天下本本一搖天下振動奈何以天下為戲漢書上幸甘泉因留射獵薛廣德諫曰關東困極民流陛下日撞亡秦之鍾聽鄭衛之樂臣誠悼之今士卒暴露從宮勞倦陛下亟反宮與百姓同憂樂天下幸甚漢郅都景帝時為中郎中郎敢直言面折大臣於朝堂從幸上林賈姬在廁野彘入廁上遣都都不行上欲自特兵殺之都伏上前曰一姬死復一姬進天下所有寧賈姬乎雖陛下自輕奈宗廟何太后何上還彘亦不傷姬天后聞之大喜賜金百斤上賜百斤説苑楚莊王築層臺延袤百里諫者七十二人有諸御而入諫曰昔虞不用宮之奇而晉并之曹不用僖負羇而宋并之吳不用子胥而越并之桀殺關龍逢而湯得之紂殺比干而武王得之遂趍出遽追之曰吾用子之諫先諫者不足動寡人之心至死出令曰能入諫者吾以為兄弟也漢武故事曰汲黯諫曰陛下愛才樂士求之無倦比得勞心苦神而盡其用輒已殺之以有限之士資於無已之誅陛下將何以為治謝承後漢書曰陳蕃諫桓帝曰當今之世三空田野空朝廷空倉庫空兵戎戢四方離散是陛下憔悴毀顏坐而待旦之時也説苑晉靈公造九層之臺費用千億令諫者死荀息曰臣能纍十二博棋加九雞子於上公曰危哉息曰復有危於此者九層之臺三年不成男不得耕女不得織國用空虛戶口減少社稷一滅君何望之諷諫主文而譎諫言之者無罪聞之者足以誡陳古以刺今出入諷諫為人臣之禮不顯諫注謂明言君惡不幾微也子曰事君欲諫不欲陳注陳言其過於外或以抒下情而通諷諭孔子曰諫有五吾從諷臨食興歎閻沒言小人之心飲酒流涕晏子為大臺之役諷者言非面折事不指陳或義引古今情見辭賦庶為寤主有以興物針規補察邦無道則危行言孫孫順也君心有寤冀擇善而從之臣節貴忠終惡訐為直者忠而謀國既三思而後行敏以寤君亦一言以為智下以風刺上舍肉穎考叔舍肉欲以發問説苑曰趙簡子舉兵伐謀有被甲士笑簡子曰子何笑對曰臣嘗當桑之時臣之鄰父與妻俱之田見桑中女因追之不能還其妻怒而去之臣遠笑其曠也簡子曰伐國是吾曠也遂還師歸又吳王欲伐荊少孺子欲諫不敢乃懷丸操彈於茂苑露沾衣王曰何沾衣如此曰榆上有蟬高居而鳴不知螳蜋委身向前捕螳蜋不知黃雀引頸欲啄黃雀又不知彈在其後皆務前不顧後患王乃罷蜀志曰大旱禁釀吏於人家索得釀具欲令與作酒同罪簡雍從先主遊見一男子行道曰彼人欲行淫何不捉先主曰卿何知曰彼有淫具與釀具同先主大笑而原之新序曰趙簡上羊阪群臣皆裨裼推車而虎會簷戟行歌簡子曰寡人上阪推車會獨有歌為臣侮主其罪何若曰為臣侮其主身死妻子為戮亦問君侮臣者簡子曰何為曰智者不為謀辨者不為使勇者不為鬥三者不使則國難保簡子乃罷推車又魏文侯與大夫坐問寡人何如群臣皆曰仁君次問翟璜曰君非仁君何以言之曰君伐中山不以封君弟而封君子文侯怒翟璜任座曰君仁君也曰子何以言之曰臣聞君仁臣直向翟璜之言直是以知文侯曰善復召翟璜孔叢子曰陳惠侯起陵陽臺未終刑者十人又執三監吏將殺之孔子適陳聞之見陳侯與登臺觀焉曰美哉斯臺未有不戮一人而致功若此陳侯默然乃赦執吏國語齊景公受馬暴死公怒欲刀解養馬者晏子曰請數之曰爾罪有三也公使爾養馬爾殺公之愛馬汝罪一也使公以一馬之故殺人為百姓怨爾罪二也使諸侯聞輕吾國汝罪三也公赦之強諫鬻拳強諫楚子楚子不從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善言懼君非臣法但美其忠愛也思紓國之難誠則盡忠奮震主之威如何無罪居常不能寤主臨難徒欲愛君晉侯之召周王猶不可以訓鬻拳之懼楚子宜自納于刑獲罪於天密諫造辟詭辭榖梁陽處父曰古者造辟而言詭辭而出出不以實告人削稿稿草本也魏陳群前後密諫得失每止封輒削稿人多譏其默後乃知臣不密則失身易啓乃心沃朕心書揚君之善夏侯勝入見出與人語人告不密上讓之對曰君言善臣故揚之也伏青蒲史丹密勿匡諫袞職有闕惟仲山甫補之詩沔水規宣王也詩篇名百官針王闕張湛白馬生後漢張湛數諫上常乘白馬上每有異政輒曰白馬生且復諫也尚書履聲漢鄭崇數諫哀帝曰我識鄭尚書履聲近臣盡規彌縫其闕匡救其惡匡輔匡益後漢補察其政大夫規誨傳醉殺吳志孫權既王歡宴之末自起行酒虞翻倒地佯醉不持權云翻起坐權怒手劍欲擊之侍坐皆惶懼劉基抱權諫曰大王以三爵後殺善士雖有罪天下孰知之大王以能容賢故海內望風一朝棄之可乎汝為君耳將司聰也磨礪以須王出吾刃將斬之于革諫楚靈王諫安樂史沛公入秦宮室帳幃狗馬婦女數倍意欲留居之張良曰秦為無道沛公故得致此為天下除殘賊宜縞素為資今始入秦即安其樂此乃助桀為虐且忠言逆耳利於行良藥苦口利於病納諫建善旌立諫鼓從諫如流漢高祖晏子一言而齊侯省刑屨賤踴貴之言諫而無驕驕謂諫人君其臣恃以驕之能無從乎改之為貴一日三諫晏子常一日三諫景公及卒公泣曰昔晏子一日三責我今孰責寡人乎大王有五失晉書齊王因輔政驕矜多過鄭方諫曰大王有五失因曰孤不能以致五闕若無子則終不聞孤之過容受直辭漢成帝贊堯設誹謗之木舜縣招諫之鼓出令懸賞齊威王出令曰能面刺寡人過者受上賞上書諫者受中賞謗議於市朝聞寡人之耳者受下賞於是齊大治從諫不咈咈戾也有言逆於汝心必求諸道稽于衆捨己從人詢茲黃髮詢于芻蕘高祖從諫如轉圜漢爾心或開豫禮虛受易虛己問政白獸樽晉書曰設獸樽於道樽蓋上施白獸若有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺誡也晏子曰合升斗之榖以滿倉廩太山之高非一石也纍卑然後高也夫治天下者非用一士之言也説苑拒諫違宮之奇之言虞不臘矣拒伍子胥之諫吳為沼乎三進及霤而後視之曰吾知過矣隨會諫晉靈公愎諫比干諫而死紂殺之周公曰不使大臣怨乎不以以用也禮曰為人臣三諫不聽則逃之君臣有義則合無義則離諫者有刑莫敖致敗秦違蹇叔之言而師敗陳愎泄治不諫而國亡不從逆耳之言終致噬臍之患顧子曰不諫則危君諫則危身故君子上不敢危君下不敢危身三諫不從則去矣朱雲從比干遊朱雲直言帝令斬之雲攀檻曰臣得下從關龍逢比干遊足矣誦言如醉聞曲謨之言則若醉言不好也桀殺關龍逢紂剖王子比干陳戮泄治吳誅伍員忠諫者謂之誹謗深計者謂之妖言漢書言胡亥逆忠直遠耆德比頑童時謂亂風忠讜杜口諫諍絶路如或患難匡救禮許逃亡泄治死之魯史書罪微子去矣宣父稱仁以道事君不可即止事君道合則服從不可則去禮以言取罪謗諫為人臣者有諫而無訕為人臣之禮不顯諫注謂明言君過不幾微也堯設誹謗之木齊威出令事見納諫門子曰天下有道則庶人不議庶人謗下以風刺上詢于芻蕘採其歌詠無或敢伏小人之攸針針規也書每歲孟春遒人以木鐸徇于路採歌謠也君子惡居下流而訕上者相彼君子猶惡稱人之惡矧伊忠臣豈宜楊主之過有亡而無疾諫不從則亡去無疾患也子貢曰君子信而後諫未信則以為謗己也監謗弭謗周厲王虐國人謗王王使衛巫監謗以告者則殺之道路以目王謂召公曰吾能弭謗者防人之口甚於防川召公曰為人臣者寡人使言不諫生則縱其欲君子謂華元樂舉於是不臣君主則縱其欲死又益其侈是棄君於惡何臣之為君昏不能匡危不能救秦醫和謂趙孟云國之大臣榮其寵祿有災禍興而無改焉必受其咎今君淫以生疾王不能禦天命不祐可謂具臣孔子曰事君遠而諫則諂也近而不諫則尸利也邦無道危行言孫孫順也不諫則危君見上注事上以忠則宜身許陷君於惡何用臣為寧違忤以納善豈順從而忘危衆臣不盡情而上無由聞過漢書漢黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎汝無面從伊訓曰臣下不匡其刑墨注臣不正君服墨刑也苟賴其榮是為尸利不匡其失宜及墨刑陳忠讜之言猶聞有賞廢獻替之義安得無辜君子立誠猶不成人之惡忠臣勵節豈可從君之昏遂事不諫豫違汝弼子不我思賞諫臣苟直言君宜賞恩不匡其上尚或有刑能盡其忠豈宜無賞齊威出令具納諫門臣道貴忠國章勸賞賞勸魏太祖破烏桓還問前諫丕令行者衆皆懼公皆厚賞之曰孤乘危僥幸雖勝天佐也不可為常諸君前諫萬安之計故相賞後勿難言也請賞秩漢梅福上書諫成帝曰天下之士民有上書諫可採取者秩升斗之祿賜以束帛若此則天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣諫父母子曰事父母幾諫見志不從又敬不違勞而不怨子孝而針子之事親三諫不聽則號泣而隨之下氣怡色內則曰父母有過下氣怡色柔聲以諫諫若不入起敬起孝悅則復諫起更也入則事父兄子悅家之肥也家壞父慈子孝自王已下各有父兄子弟以補察其過傳事親有隱而無犯注有隱不稱揚過失無犯不犯顏諫諍也天性人彝曾子曰君子之所謂孝者先意承志諭父母於道參直養者也安能為孝乎子曰君子弛其親之過弛棄也勞而無怨子云從命不忿微諫不倦勞而無怨可謂孝乎無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮舜父頑母嚚克諧以孝蒸蒸乂不格姦言舜能和之以孝使進善自治不至於惡瞽亦允若信能順於善也孜孜蒸蒸父有爭子則身不陷於不義故子不可以不爭於父從父之令又焉得為孝乎孝經孝在色難諫宜言遜逆耳之言因心之孝父父子子在於交遊尚不成人之惡矧伊子道豈宜陷父於非禮曰子諫父母不悅與其罪於鄉黨州閭寧熟諫言使父母得罪寧不悅而熟諫熟極也愛親陷父直而事主則高面折之忠孝乃安親宜盡色難之養雖色難之養所貴安親而面從其違得非陷父父母有過諫而不逆父母惡之懼而無怨吳祐諫寫書後漢吳祐隨父恢為南海太守祐年十二恢欲殺青簡寫經書祐諫曰南方多珍怪上為國家所疑下為權戚所望此書若成則載而兼兩昔馬援以薏苡故興謗王陽以衣囊徼名恢撫首曰吳氏不乏季子乎諫朋友子寧以他規我敢以此規過贈言敢不盡心吾嘗同寮官師相規言官衆互相規闕夏書士有爭友則身不離於令名相勸以義相勉以正成人之美君子忠告善導忠告而善導之不可則止君子以友輔仁有切瑳之道所以輔成仁朋友切切偲偲相切責之貌也孜孜勸善不可與言而與之言失言智者不失人亦不失言益者三友友直友諒友多聞儒有聞善以相告莊子曰四人相視莫逆其心遂相為友成我者鮑叔芝蘭之契芻蕘之言膠漆之義藥石之規刎頸之義須深逆耳之言不入善而相告是為知已不規過也不言無乃成人之惡針言孔魏徵以直言致太宗于堯舜李晟在鳳翔嘗曰魏徵以直言致太宗于堯舜上忠臣也我誠慕焉行軍司馬李叔度曰彼縉紳儒事公勳德何希是哉晟曰君失辭晟幸得備將相苟容身不言豈有犯無隱邪是非惟上所擇爾叔度大慚故晟每進對蹇蹇盡大臣節諸道饋獻常袞天子誕日諸道爭以侈麗奉獻文帝還千里馬不用晉武帝焚雉頭裘宋高祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆淫侈不急類出於民是斂怨以媚上也請皆還之或無所論諍帝輒詰所以然李絳博聞讜言以廣視聽顏真卿曰天下瘡痍未平干戈日滋陛下豈得不博聞讜言以廣視聽而塞絶忠諫乎陛下在陝時奏事者不限貴賤群臣以為太宗之治可跂而待且君子難進易退朝廷開不諱之路猶恐不言況懷厭怠校獵同州劉仁軌正觀十四年校獵同州時秋斂未訖仁軌諫曰今茲澍澤霑足百榖熾茂收才十二常日贅調已有所妨又供獵事繕橋治道帝璽書褒納願竭狂瞽王圭太宗嘗曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安朕雖不明幸諸公數諫正庶致天下於平圭進曰古者天子有爭臣七人諫不用則相繼以死今陛下開聖德收采芻言臣願竭狂瞽皇太子驟諫劉洎太宗嘗怒苑西監穆裕有詔斬朝堂皇太子驟諫帝喜曰朕始得魏徵朝夕進諫徵亡劉洎繼之兒在吾膝前見騰悅諫熟矣故有今日言也帝幸虢國夫人第陳元禮帝幸虢國夫人第諫曰未宣敕不可輕去就帝為止後在華清宮正月望夜帝出遊復諫曰陛下必出遊願歸城闕帝不能奪也幸安樂公主池主請御船韋安石中宗幸安樂公主池主請御船安石曰御輕舟乘不測非帝王事乃止忠臣不避誅震盧藏用武后作興泰宮於萬安山諫曰離宮別觀固多矣又窮人力以事土木臣恐議者以陛下不愛人而奉己也忠臣不避誅震以納君於仁明王不惡切詆以趨名于後后不從有諫臣風柳公權與周墀同對論事不阿墀為惴恐公權益不奪帝徐曰卿有諫臣風可屈居諫議大夫問郭旻領邠寧而議者頗有臧否答曰旻誠勳舊然人謂獻二女乃有是除帝曰女自參承太后豈獻哉公權曰嫌疑間不可戶曉因引王圭諫廬江王妃事是日帝命中宮自南宮送女還伏閣泣涕諫王質轉諫議大夫宋申錫之得罪質與諫官伏閣文宗開延英召見泣涕陳諫帝稍寤申錫得不死穆宗立不恤國事鄭單以父蔭纍諫議大夫穆宗立不恤國事覃與崔郾等廷對曰陛下新即位宜側身勤政而內耽宴嬉外盤遊畋今吐蕃在邊狙候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜豫願節用之毋令有司重取百姓帝不懌顧宰相蕭俯曰是皆何人俯曰諫官也帝意解乃曰朕之有闕下能盡規忠也因詔覃曰閣下殊不款款後有為我言者當見卿延英時閣中奏久廢至是士相慶身危吳兢明皇初立收還權綱鋭於決事群臣畏伏兢慮帝果而不及精乃上疏曰自古人臣不諫則國危諫則身危臣愚食陛下祿不敢避身危之禍自頃上封事往往得罪諫者頓少是鵲巢覆而鳳不至理之然也臣恐天下骨鯁士以讜言為戒撓直就曲斫方為刓偷合苟容不復納君於道矣朝有諷諫猶髮之有梳猛虎在山林藜藿為之不採忠諫之有益如此同上東封太山道中數馳射為樂同上帝東封太山道中數馳射為樂兢諫曰方今登岱告成不當逐狡獸使有垂堂之危朽株之殆帝納之將幸東都裴度帝將幸東都大臣切諫不納度從容奏國家建別都本備巡幸自艱難以來宮闕署屯百司之區茺圯弗治假歲月一新然後可行倉卒無備有司且得罪帝悅曰群臣諫朕不及此因止行伏閣言訓險邪高銖文宗得李訓驟拜侍講學士銖率諫官伏閣言訓素行險邪不可任必亂天下矣敬宗視朝不時高元裕敬宗視朝不時稍稍決事禁中宦官恣放大臣不得進見元裕諫曰今西頭勢乃重南衙樞密之權過宰相帝頗寤人皆危之吐蕃盜邊帝欲自將兵討蘇廷碩吐蕃盜邊諸將數敗虜益張秣騎內侵帝怒欲自討之廷碩諫曰古稱荒服取荒忽之義非常奉職貢也故來則拒去則勿逐以禽獸畜之羈縻御之譬若獵然羽毛不入服用體肉不登郊廟則王者不射也況萬乘之重與犬羊蚊虻語勝負哉葉蕃入寇帝欲避狄齊映同平章事吐蕃入寇關輔震騷咸言帝欲避狄映入諫曰戎狄不懲臣之罪也然內外恟恟謂陛下具糗糧欲治行夫大幸不再奈何不與臣等計乎因俯伏流涕天子為感寤脫巾帶固諫執失思力太宗逐兔苑中思力諫曰陛下為四海父母乃自輕臣竊殆之帝異其言後復逐鹿思力脫巾帶固諫帝為止額叩龍墀劉栖楚為右拾遺敬宗立視朝常晏數遊畋失德栖楚諫曰惟前世者初嗣位皆親庶政坐以待旦陛下新即位安臥寢內日晏乃作且憲宗及先帝皆長君朝夕恪勤四方猶有叛者陛下以少主踐祚未幾惡德流布恐福祚之不長也臣以諫為官使陛下負天下譏請碎首以謝遂額叩龍墀血被面李逢吉傳詔毋叩頭待詔栖楚捧首立帝動容揚袂使去栖楚曰不聽臣言請死於此有詔尉喻乃出辭疾歸洛後諫官對延英帝問向廷爭者在邪以諫議大夫召帝數出畋遊暮夜乃還李德裕帝數出畋遊暮夜乃還德裕上言人君動法於日故出而視朝入而燕息以是勤勤警戒詩曰敬天之渝不敢馳驅願節田遊承天意舶賈獻沉香亭材宗室漢纍遷左拾遺敬宗侈宮室舶賈獻沉香亭材漢諫曰以沉香為亭何異瑤臺瓊室乎賢妃極諫太宗賢妃徐惠貞觀末數調兵討定四夷稍稍治宮室百姓勞怨惠上疏極諫公主諫和政公主阿思布妻隸掖廷帝宴使衣緑衣為倡主諫曰布思誠逆人妻不容近至尊無罪不可與群倡處帝為免出之每進諫逢帝甚怒神色不徙徵每犯顏進諫逢帝甚怒神色不徙而天子亦為霽威以諫諍為心恥君不及堯舜王圭帝曰為朕言玄齡等對曰以諫諍為心恥君不及堯舜臣不如徵太宗好持論與公卿言古今事必往復難詰究臧否劉洎太宗好持論與公卿言古今事必往復難詰究臧否洎諫曰帝王之與臣庶聖哲之與庸愚等級遼絶勢不倫擬故課愚對聖持卑抗尊雖愚自強不可得已陛下降慈旨解柔顏虛心聽納猶恐群臣惴縮不敢進況以神機天辨飾辭援古而逆其議哉不面從裴矩帝為群臣言之曰矩能廷爭不面從物物若此天下有不治哉孫伏伽上言臣聞天子有爭臣雖無道不失其天下隋失天下者何不聞其過也聖人大德在能納諫陳子昂八科五招諫謂聖人大德在能納諫太宗德參三王而能容魏徵之直今誠有敢諫骨鯁之臣陛下廣延順納以新盛德則萬世有述遣使齎繒錦至石國市犬馬張廷圭時遣使齎繒錦至石國市犬馬廷圭曰犬馬非上性弗畜珍禽異獸不育于國願省無益之故救必然之爭天下之幸諫戍疏勒四鎮狄仁傑同平章事時發兵戍疏勒四鎮仁傑諫曰今乃用武荒外邀功絶域竭府庫之之資以爭磽確不毛之地得其人不足增賦獲其土不可耕織苟求冠帶遠夷不務固本安人此秦皇漢武之所行也又昔漢元帝納賈捐之謀而罷朱崖宣帝用魏相之策而棄車師田貞觀中克平九姓册拜李思摩為可汗使統諸部夷狄叛則伐降則撫得推亡固存之義無遠戍勞人之役武后幸玉泉祠欲御腰輿王方慶武后幸玉泉祠以山道險欲御腰輿方慶奏昔薛廣德諫漢元帝乘船危就橋安帝乃徙橋今山河危峭隥道曲狹比於樓船又復甚危陛下奈何輕踐畏塗哉后為罷行從官賦詩獨以規誡李日知初安樂公主館第成中宗臨幸燕從官賦詩日知卒章獨以規誡睿宗它日謂曰嚮時雖朕亦不敢諫非公挺直何能爾即拜侍中朱敬則諫朱敬則武后稱制天下頗流言遂天告密羅織之路興大獄誅諸將大臣至是已革命事益寧敬則諫曰國家自文明以來天地草昧內則流言外則構難故不設鉤距無以順人不切刑罰無以息暴於是置神器開告端故能不出房闥而天下晏然易主矣願鑒秦漢之迹考時事之宜使天下更始后善其言魏徵嫵媚魏徵帝大笑白人言徵舉動疏慢我但見其嫵媚耳徵再拜曰陛下導臣使言所以敢然若不受臣敢數批逆鱗哉苑中望昭陵文德皇后既葬帝即苑中作層觀以望昭陵引徵同升徵熟視曰臣眊昏不能見帝指視之徵曰此昭陵耶帝曰然徵曰臣以為陛下望獻陵若昭陵臣固見之帝泣為毀觀侍宴奏舞至慶善樂則諷玩無斁帝本以兵定天下雖已治不忘經略四夷也故徵侍宴奏破陳武德舞則俯首不顧舞至慶善樂則諷玩無斁舉有所諷切如此徵上十漸言比恃功業之大負聖智之明長傲縱欲無事興兵問罪遠裔親狎者阿旨不敢諫疏遠者畏威不敢言積而不已所損非細有道之君以逸逸人無道之君以樂樂身志驕於業泰體逸於時安太宗賢妃徐惠言翠微王華等宮雖因山藉水無築創之苦而工力和僦不謂無煩有道之君以逸逸人無道之君以樂樂身又言伎巧為喪國斧斤珠玉為蕩心鴆毒侈麗纖美不可以不遏志驕於業泰體逸於時安其剴切精詣大略如此以忠良為腹心憲宗皇后郭氏武宗喜畋遊他日問后起居從容謂曰如何可為盛天子后曰諫臣章疏宜審覽度可川用之有不可以詢宰相毋拒直言勿納偏言以忠良為腹心此盛天子也帝再拜還索諫章閲之往往道遊獵事自是畋幸稀小兒武撲等不復橫賜矣歸過于上陸贄陛下謂諫官論事歸過于上者信非其美然於盛德未有虧焉納而不違傳之適足增美拒而違之又安能禁之勿傳不宜以此梗進言之路也獨孤及上疏陛下屢發德音使左右侍臣得直言極諫然頃者雖容其直而不録其言其所上封皆寢不報有容下之名無聽諫之實遂使諫者稍稍自鉗口飽食相招為祿仕帝縱弛日晏坐朝裴度帝縱弛日晏坐朝度諫曰比陛下月率六七臨朝天下之人知勤政河朔賊臣皆聳畏近開延英益稀恐萬機奏稟有所壅閼夫頤養之道當順適時候則六氣平和萬壽可保道家法春夏蚤起取雞鳴時秋冬晏起取日出時蓋在陽勝之以陰在陰勝之以陽今方居盛夏謂宜詰旦數坐廣加延問漏及巳午則炎赫可畏聖躬勞矣帝嘉納為數視朝容直言治象也元稹又自以職諫諍不得數召見上疏曰臣聞治亂之始各有萌象容直言廣視聽身勤庶務委信大臣使左右近習不得蔽疏遠之人此治象也大臣不親直言不進抵忌諱者殺犯左右者刑與一二近習決事深宮中群臣莫得與此亂萌也人君始即位萌象未見必有狂直敢言者上或激而進之則天下君子望風曰彼狂而容於上其欲來天下士乎吾之道可以行矣其小人則竦利曰彼之直得幸於上吾將直言以徼利乎由是天下賢不肖各得以所忠貢於上上下之志沛然而通合天下之智治萬物之心人人各得其所戴其上如赤子之親慈母也雖欲誘之為亂可得乎請廣諫員牛叢任補闕數數言事會宰相請廣諫員宣宗曰諫臣惟能舉職為可奚用衆耶今張符趙璘牛業使朕聞所未聞三人足矣犯顏敢諫有犯顏敢諫之心無路而不得達劉蕡臣幸得從四子遊於地下又曰臣非不知言發而禍應計行而身繆蓋痛社稷之危哀生人之悔豈忍姑息時忌切陛下一命之寵哉昔龍逢死而啓商比干死而啓周韓非死而啓漢陳蕃死而啓魏今臣之來有司或不敢薦陛下又無以察臣之心退戮於權臣之手臣幸得從四子遊於地下固臣之願也所不知臣死之後將孰為啓之哉過古朝董是時第策官左散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴見蕡對嗟伏以為過古朝董矣而畏中官眥睚不敢取獻賦先朝納誨毋棄忠言李德裕臣在先朝嘗獻大朝賦以諷四曰納誨諷毋棄忠言論執強鯁白居易後對殿中論執強鯁帝未諭輒進曰陛下誤矣帝變色罷謂李絳曰是子我自拔擢乃敢爾我叵堪此必斥之絳曰陛下啓言者路故群臣敢論得失若黜之是箝其口使自為謀非所以發揚盛德也帝悟待之如初批逆鱗犯忌諱姚崇奏十事燕飲融韋丹將以忠被罪自是諍臣沮折臣願群臣皆得批逆鱗犯忌諱可乎剴拂帝短懇到深切贄及輔政不敢自顧重事有可否必言之所言皆剴拂帝短懇到深切或規其太過對曰吾上不負天子下不負所學皇它恤乎固爭孟簡元和中拜諫議大夫知匭事韓泰韓曄之復刺史吐突承璀為招討使簡皆固爭詣延英言不可狀以悻切出為常州刺史願竄吾名雷霆之下歸登見拾遺門勸順納諫諍憲宗問政所先登知帝睿而果于斷勸順納諫諍內外傳為讜言上敖拔聲析句左右皆曉知畢構敬暉等表諸武不宜為王誼當諫敖拔聲析句左右皆曉知三思疾之出為潤州刺史帝沖逸好宮室畋獵李程敬宗初同平章事帝沖逸好宮室畋獵功用奢廣程諫曰先王以儉德化天下陛十方諒陰未宜興作願回所費奉園陵帝嘉納以切諫引居要職吳兢太宗好悅至言時有魏徵王圭虞世南李大亮岑文本劉洎馬周褚遂良杜正倫高季輔咸以切諫引居要職嘗謂宰相曰自知者為難如文人之工自謂己長若使達者大匠詆訶商略則蕪辭拙迹見矣唐安公主厚葬薑公輔同平章事帝徙梁唐安公主道薨主性仁孝許下嫁韋宥以播遷未克也帝悼之甚詔厚其葬公輔諫曰即平賊主必歸葬今行道宜從儉以濟軍興帝怒謂翰林學士陸贄曰唐安之葬不欲事塋壟令纍甓為浮圖費甚寡約不容宰相開預苟欲指朕過爾贄曰公輔官諫議職宰相獻替固其分本立輔臣朝夕納誨徵而弼之乃其所也帝曰不然朕以公輔才不足以相而又自求解朕既許之內知且罷故買直售名爾遂下遷太子左庶子以死請陳京擢右補闕帝以盧杞為饒州刺史京與趙需裴佶宇文炫盧景亮張薦共劾杞輔政要位大臣踰時月不得對百官懍懍常若兵在頸陛下復用之姦賊唾掌復興帝不聽京等爭尤確帝大怒左右辟易諫者稍引郤京正色曰需等無遽退極道不可以死請杞遂廢本傳諫諍路絶李林甫補闕杜璡再上書言政事斥為下邽令因以語動其餘曰明主在上群臣將順不暇亦何所論君等獨不見立仗馬乎終日無聲而飫三品芻豆一鳴黜之矣後雖欲不鳴得乎由是諫諍路絶矣利發及蕃夷酋長入仗內呂向以起居舍人從帝東巡帝引頡利發及蕃夷酋長入仗內賜弓矢射禽向上言鴟梟不鳴未為瑞鳥豺虎雖伏弗曰仁獸況突厥安忍殘賊莫顧君父陛下震以武義來以文德勢不得不廷故稽顙稱臣奔命遣使陛下引內從官陪封禪盛禮使飛矢於前同獲獸之樂是狎昵大過或荊卿詭動何羅切發逼嚴蹕冒清塵縱醢單于汙穹廬何以塞責帝順納詔蕃夷出仗本傅俯首噤默孫伏伽帝語裴寂曰朕虛心盡下冀聞嘉言若李綱孫伏伽可謂誼臣矣俯首噤默豈朕所望哉諫臣盈庭忠言不聞楊虞卿穆宗初立逸遊荒恣虞卿上疏曰陛下初臨萬幾宜有憂天下心當日見輔臣公卿百執事垂意以問使四方內外灼有所聞而聽政六十日八對延英獨三數大臣承聖問而已它內朝臣偕入齊出無所咨詢諫臣盈庭忠言不聞臣實羞之蓋主恩疏而正路塞也公卿大臣宜朝夕燕見則君臣情接而治道得矣今宰相四五人或頃刻侍坐鞠躬隕越隨旨上下無能往來此繇君太尊臣太卑故也公卿列位數陟降清地曾未奉優眷承卜問雖陛下神聖如五帝猶宜周爰顧逮惠以氣色使支體相成君臣昭明陛下求治於宰相宰相求治於臣等進忠若趨利論政若訴冤此而不治無有也自古天子居危思安之心同而居安慮危之心則異故不得皆為聖明也時又有衡山布衣趙知微亦上書指言帝倡優在側馳騁無度內作色荒外作禽荒辭頗危切帝詔宰相因是賀天子納諫然不能用也橋舌阿旨吳湊文敬太子義章公主仍薨帝悼念厚葬之車士治墳農事廢湊候帝間徐言極爭不避或勸論事宜簡約不爾為上厭苦湊曰上明睿憂勞四海不以愛所鐘而疲民以逞也顧左右鉗噤自安耳若反復啓寤幸一聽之則民受賜為不少橋舌阿旨固善有如窮民上訴叵云罪何臣下畏怯自為循默段平仲德宗春秋高躬自聽斷天下事有所壅隔群臣畏帝苛察無敢言平仲常曰上聰明神武但臣下畏怯自為循默耳直士杜口李絳見浴堂殿帝曰比諫官多朋比論事不實皆陷謗訕欲黜其尤者若何絳曰此非陛下意必憸人以此營誤上心自古納諫昌拒諫亡夫人臣進言於上豈易哉君尊如天臣卑如地如有雷霆之威彼晝度夜思始欲陳十事俄而去五六及將以聞則又憚而削其半故上達者才十二何哉干不測之禍顧身無利耳雖開納獎勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知諫之益蹇諤之士去而不顧吳兢上疏曰隋煬帝驕矜自負以為堯舜莫己若而諱亡憎諫乃曰有諫我者當時不殺後必殺之大臣蘇威欲開一言不敢發因五月五日獻古文尚書帝以為訕己即除名蕭瑀諫無伐遼出河西郡守董純諫無幸江都就獄賜死自是蹇諤之士去而不顧獻納李泌贊曰觀肅宗披榛莽立朝廷單言暫謀有所寤合皆付以政當此時泌於獻納為不少矣伏閣上疏張彥澤張式父鐸詣闕訴冤諫議大夫鄭受益曹國珍尚書刑部郎中李濤張麟員外郎麻麟王禧伏閣上疏論彥澤殺式之冤皆不省濤見高祖怒起去濤隨之諫不己高祖不得己召式父鐸弟守貞子希範等皆拜以官為蠲涇州民稅免其雜役一年下詔罪己然彥澤止削階降爵而已五代史舁襯極諫閩王曦惡其宗室多以事誅之諫議大夫黃峻舁襯詣朝堂極諫曦怒貶峻漳州司戶參軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩繫頸挂於木久而乃絶五代史六十八旁引曲釋今人平居無事朋友骨肉切磋規誨之間尚宜旁引曲釋亹亹繹繹使樂去其不善而樂行其善況于君臣之間論諫書杜諤諤造庭陳黯答問諫者肉視虎狼冰顧鼎鑊諤諤造庭文粹輟食廢寢陸宣公奏議太宗招延詢諫輟食廢寢洞啓誠腑推心與人豁披胸襟忘己應物朝焉宴焉入則諫焉文粹盧元輔胥山銘夫差既王襯嚭受賂二十年內越祀又顛太伯廟血將乾闔閭劍光且失公朝焉宴焉入則諫焉孰謂知毒孰謂刀寒雖言屢出口而車甲巳困于齊矣蟹稻已奪於歲矣持祿養資李林甫固寵恃權蔽欺天子耳目諫官皆持祿養資無敢正言者抗音正諫陳子昂言不能歷丹鳳抵濯龍北面玉階東望金屋抗音而正諫聖人之罪人也輿人之誦不可輕高郢諫造寺書慮聞衆心成城衆口鑠金輿人之誦不可輕也拆檻牽裾犯顏回慮柳伉請誥程元振疏寺臣載路多士盈庭竟無一人拆檻牽裙犯顏回慮吾用休社稷計矣韓休峭鯁時政得失言之未嘗不盡帝嘗獵苑中或大張樂稍過差必視左右曰韓休知否已而疏輒至嘗引鑑默不樂左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘠天下肥矣且蕭嵩每啓事必順旨我退而思天下不安寢韓休敷陳治道多計直我退而思天下寢必安吾用休社稷計矣漢高赦周昌之對晉武受劉毅之譏吳兢上疏曰比見上封事者言有可采但賜束帛而已未嘗蒙召見被拔擢其忤旨則朝堂決杖傳逆本州或死於流貶由是臣下不敢進諫夫漢高帝赦周昌桀紂之對晉武帝受劉毅柏靈之譏況陛下豁達大度不能用此狂直邪獻無逸圖崔植傳姚崇宋璟曉夜孜孜納君於道璟嘗手寫尚書無逸圖以獻勸帝出入勸省以自戒其後朽朽暗代以山水圖稍怠于勸左右不復針規姦臣日用事以至於敗排雲叫閶闔披腹呈琅玕致君豈無術自進誠獨難韓愈詩
