body:
  text: 卷第四白太歲爾雅云在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰彊圉在戊曰著雍在已曰屠維在庚曰上章在辛曰重光在壬曰玄黓在癸曰昭陽白太歲爾雅云在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戍曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若白月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在巳曰則在庚曰窒在辛曰塞在壬曰終在癸曰極白謀時寒若洪範休徵急恆寒若咎徵冬祁寒小民怨嗟沍寒嚴氣升北戶墐扉寒往則暑來祭司寒孟冬地始坼嚴凝之氣天地嚴凝之氣始於西南而盛於西北此天地之義氣寒氣總至人力不堪其皆入室水澤腹堅室處嗟我婦子曰為改歲入此室處言寒也火見而清風戒寒國語冬日之陽萬物歸之言暖也在陰時則慘上牽於天薄寒之中人楚辭師人多寒撫勉之三軍之士如挾纊大寒之日雁北嚮雞始乳歲寒然後知松柏之後凋冰厚六尺朝錯曰狐貉之地積陰之處木皮三寸冰厚六尺墯指漠北苦寒之野墯指者十有六七皸瘃士卒皸瘃凌競甘泉賦曰馳閶闔入凌競凌競寒涼處也慘凜下陰潛而慘凜堯崩年異苑曰晉太康二年南州人見二鶴語曰今茲寒不減堯崩年綈袍須賈謂范叔寒如此與之綈袍無衣無褐何以卒歲淒其以風寒也禋于六宗孔安國曰四時也寒暑也日也月也星辰也水旱也一寒易曰日月運行一寒一暑雨雪其雱詩觱發風寒也栗烈寒氣也凍者莊子夫凍者假衣於春耐家食水者善游而耐寒不暖戎馬栗不暖冰漿軍士冰為漿火無光朱火青無光蘭膏坐自凝燈也重衾無暖氣挾纊如懷冰巢巢居知風寒激泠文晨風淒以激泠夕雪皓以掩路凝涸文子轍含冰以滅軌冰漸軸以凝涸行積冰之皚皚文鳥失條鳥登木而失條文兼衣文子御狐貉之兼衣襲狐貉之暖者不憂至寒之悽愴文子苦寒行魏武苦寒行曰人馬同時饑擔囊行取薪斧冰持作糜糜粥也墯指漢高祖從晉陽連戰乘勝逐北婁煩會大寒士卒墯指十有二三凍死漢王莽鑄威斗日大寒人馬凍死毒害漢竇武上表曰今日大寒過節毒害鳥獸城旁竹柏皆為傷死桐不華周書清明日桐不華則歲有寒黃竹詩穆天子傳雨雪有凍死人天子作黃竹詩以愍之涉水戰國田單解裘衣涉水老人也鑿池呂氏春秋衛靈公寒鑿池王孫賈奏曰君衣狐裘而坐熊席四陬有火民衣穿不補履缺不苴君不寒民寒矣公善之吹律劉向別録燕地寒谷不生五穀鄒子吹律召溫風至人名黍谷凍入地廣雅北方地苦寒冰厚一尺凍入地一丈稜稜霜氣蔌蔌風威寒四孔肌革慘懍毛髮蕭條柳宗元貶永州司馬雅善蕭俯貽書曰忽遇北風晨起薄寒中體肌革慘懍毛髮蕭條連紙褫書為裳褕史思明傳東都再更亂時方烈寒人皆連紙褫書為裳褕烏質勒死郭元振為安西大都護西突厥酋烏質勒部落盛疆欵塞願和元振即牙帳與計事會大雨雪元振立不動至久凍冽烏質勒已老數拜伏不勝寒會罷即死裂膚涼州都督楊敬述使官屬盧公等勒兵討突厥會大寒裂膚士卒不能張弓矢乃敗引避錢徽拜左丞會宣墨麻群臣在庭方大寒稍稍引避徽素恭謹不去立久而仆歲苦寒李石傳文宗時大臣新族死歲苦寒外情不安卻寒簾杜陽編同昌公主堂中設卻寒簾類玳瑁班有紫色云卻寒鳥骨所為也肌膚生鱗甲衣被如刀鎌韓愈苦寒歌虎豹僵中穴蛟螭死幽潛同上六龍冰脫髯熒惑喪纏次侵爐不覺暖熾炭屢以添探湯無所益何況纊與縑同上蠻夷長老怨苦寒崑崙天關凍應折同上苦寒拂霧盡成霰著水復成冰韋應物詠寒楚江巫峽冰入懷杜甫前苦寒楚江巫峽冰入懷虎豹哀號又堪記漢時長安雪一丈牛馬毛寒縮如蝟上哀哀歌苦寒李白冬夜哀哀歌苦寒鬱鬱獨惆悵硯寒金井水簷動玉壺冰杜甫詩游揚日已西肅穆寒初至李後主填窗塞戶謹勿出韓愈苦寒歌填窗塞戶謹勿出暄風暖景明年日黑帝歸寒而激昂杜甫享太廟賦辟寒香唐杜陽編同昌公主七寶步輦綴五色玉香囊貯辟寒香氣寒鼻莫嗅血凍指不拈韓愈苦寒熱五白夏暑雨夏日之陰萬物歸之言涼也暑往則寒來夏日之日可畏當暑袗絺綌疸暑詩曰我心疸暑蘊隆蟲蟲旱熱之氣炎風畏景火雲赫日流金爍日徂暑六月炎炎滌滌並旱熱氣云我無所言無所庇身如惔如焚惔燎也言熱如火燒憂心如熏熏灼爛雲漢之章言旱熱煎沙爛石成湯旱七年如此大暑溽暑六月土潤溽暑暍者莊子曰暍者反凍於冷風不熱抱朴子曰或問不熱之道答曰立夏或服玄冰丸飛雪散六壬六甲之符交扇世說郗嘉賓三伏日諧謝公當風交扇猶霑汗謝著故衫而食熱粥郗曰非公幾不堪此風雲鬱其如火天地赫以為爐時燠恆燠禋于六宗見寒門注袁紹河朔飲每至夏大飲云以避一時之暑故號河朔飲壽麻之國爰有大暑不可以往山海經云耘管子曰善為國者使寒耕而熱耘祝融淮南子曰南方之極自北方之界主炎風之野赤帝祝融之所司神異經北方層冰之下土中有蹊鼠食冰草木肉重萬斤可作脯食熱見鼠門暑有暍京房易飛候曰有雲如大車蓋十餘此陽水之氣必暑有暍者身熱阪漢書西域傳曰罽賓道歷大小頭痛之山赤土身熱阪令人身熱無色頭痛嘔逆吐忍暑孔三月苦熱獨孤及疏曰三月苦熱錯繆顛倒沴孰大焉熱風觸人西域大流沙多熱風觸人及六畜皆迷仆土熱多雨牂柯無城郭土熱多霖雨稻粟再熟暑濕暴露兵氣熏蒸白居易王承宗叛詔吐突承瓘出討兵老不決居易上言今暑濕暴露兵氣熏蒸雖不顧死孰堪其苦不勝其熱五代郭崇韜莊宗患宮中暑濕不可居思得高樓避暑乃使人問崇韜曰昔吾與梁對壘河上雖祁寒盛暑被甲跨馬不以為勞今居深宮蔭廣廈不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意艱難逸豫為慮不同勢自然也願陛下無忘創業之難常如河上則可使煩暑坐變清涼莊宗默然人皆苦炎熱柳公權與文宗聯句帝曰人皆苦炎熱我愛夏日長欻翕炎蒸景杜甫熱詩探湯汲陰井煬灶開重扉柳宗元苦熱詩大水渺茫炎海接奇峰硉兀火雲升杜甫多病熱詩如坐深甑遭蒸炊自從五月困濕暑如坐深甑遭蒸炊韓愈鄭群贈簟龍沉牛喘納涼聯句龍沉劇煮鱗牛喘甚焚角單絺厭已褫長箑倦還捉辟暑犀杜陽編文宗延學士講易賜辟暑犀暑氣多殘酉陽雜俎逭暑天后逭暑三陽宮訖秋未還銅井炎罏敲九天赫如鑄鼎荊山前李白答杜秀才陶公攫爍呵赤電回祿睢盱揚紫煙同上赤腳踏層冰南望青松架短壑安得赤腳踏層冰杜甫早秋苦熱詩汗踰水漿翻南方六七月出入異中原老少多暍死汗踰水漿翻貽華陽柳少府乘陵炎雲呼吸溫風景熾氣燠往即南方乘陵炎雲呼吸溫風柳宗元送苑論序燉堪輿為甗鏊兮爇雲漢而成霞解宗賦水國鬱蒸六月南方吹白沙吳牛喘月氣成霞水國鬱蒸不可處時炎道遠行無車送蕭十一暑火烘房千里竹室記方大暑火烘爆雷赤壤若堅於罏若燎于原舌呀而不能持支墜而不自運如列千萬炬于室內同上赫赫焰焰如列千萬炬于室內冷蛇段成室酉陽雜俎明皇以申王畏暑賜之冷蛇色白而不傷人如冷雪玩之不復有煩熱也澄水帛唐寶藏庫中有澄水帛亦自外國貢以水蘸之則寒氣蕭瑟暑月辟熱則一堂寒思挾纊細而似布明薄可鑒云上得龍涎故消暑毒也杜陽編乘小駟木陰下注見前卷六月隆熱韓文蔗漿歸廚金碗凍杜詩執熱乃沸鼎同上大雨執熱乃沸鼎纖絺成縕袍乞為寒水玉杜甫熱詩乞為寒水玉願作冷秋菰想見陰宮雪風門颯沓開同上炎赫衣流汗炎赫衣流汗低垂氣不蘇同上懶搖白羽李白夏日詩懶搖白羽扇裸袒青林中脫巾掛石壁露頂灑松風迎涼草注見前卷陰陽六白立天之道曰陰與陽一陰一陽之謂道五月陰陽交死生分月令冬夏不爭陰陽之和三合穀梁傳云獨陰不生獨陽不生獨天不生三合然後得生之萬物負陰而抱陽沖氣以為和老子陰陽家流出於羲和之官敬授人時拘者為之則牽於禁忌泥於小數德刑董仲舒曰陽為德出居大夏生育長養陰為刑居大冬積於空處不用之地以此見天之任德不任刑陰不堪陽愆陽冬暖伏陰夏寒為炭文選陰陽為炭萬物為銅相得禮云陰陽相得望氣保章氏以十二歲之相觀天下妖祥以五雲物辨吉凶水旱豐荒之祲祥以十二風察天地之和命乖別之妖祥十二辰皆有風吹其律以知和否視祲掌十輝之法以觀妖祥一祲祲陰陽氣相侵二象象如赤鳥三鐫鐫日旁氣四監臨日五暗日月食六瞢日月瞢瞽無光七彌白虹彌天八敘雲有次敘如山川在日上九隮隮升氣虹也十想輝光新垣平以望氣見漢文時孔天地莫大於陰陽陳子昂上言天地莫大於陰陽萬物莫靈於人主政莫先於安人故人安則陰陽和陰陽和則天地平乖行又夏商之衰桀紂昏暴陰陽乖行治陰陽又昔黃帝合宮有虞總章堯衢室夏世室皆所以調元氣治陰陽也通陰陽韋顗通陰陽愆候張廷圭開元初上疏頃陰陽愆候五穀失稔關輔尤劇陽而阜生陰而肅殺劉禹錫天論瀆即為災杜景佺陰陽不相奪倫瀆即為災草木黃落而復華瀆陰陽也同上陰陽相主客杜甫七月三日陰陽相主客時序遞回斡陰陽割昏曉望嶽詩混混沌沌陰陽之本楊炯渾天賦漢儒以月令措諸禮其言有十二月七十有二候迎步氣以追寒暑之序類其物宜而逆為之備柳宗元時令論司天司地楊炯渾天賦昔顓頊之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有裨灶魏有石氏齊有甘公唐都之推星王朔之候氣周文之視日吳範之占風有以見天地之情狀識陰陽之變通白正月朔旦月正元日書春王三朝夏正三朝履端於始歲惟更始四序資始正朝元日朔三元歲之元日之元時之元元正首祚開元納祐獻歲發春開甲子於新曆發風光於上春七十二候之初三百六旬之始進酒崔實月令曰正月一日是謂正日潔祀祖禰進酒降神椒酒董勳答曰開歲首祝椒酒以飲之索葦荊楚歲時記曰正月一日懸葦索於戶鬼惡之爆竹荊楚歲時記曰山臊惡鬼犯人則病惡爆竹之聲桃梗磔雞玄羊宋書舊時歲朔縣官殺羊設葦絞桃梗磔雞於門以禳惡氣放鳩孔叢子曰邯鄲人以正朝獻鳩於簡子簡子大愧厚賞之曰正旦放主恩也得賞兢捕之不如勿賞也五辛盤風土記正月元日食五辛練形注云辛菜所以助發五藏也莊子曰春月飲酒茹蔥以通五藏仙木造桃枝著戶謂之山木象鬱壘山桃百鬼所畏稱觴崔實月令云元日進酒降神異室家尊卑次列於先祖之前各上椒酒於家長稱觴舉壽欣欣如也重席東觀漢記戴憑為侍中正旦朝帝命群臣說經不通輒奪其席憑乃獨坐三十席獻椒花之頌劉臻妻元日獻椒花頌稱柏葉之觴歲日進柏酒歲除呂氏春秋注曰前歲一日擊鼓驅疫癘之鬼謂之逐除亦曰儺宿歲荊楚記歲暮家家具肴蔌為歲之儲放鳩地理志榮陽有兔井沛公避項羽雙鳩集井上故漢世王旦放鳩雕胡米揚州雕胡米一斗供正旦進御瑞月玉燭寶典云元日端月爆竹以辟山臊見上又神異經云山臊者在西方深山中長丈餘犯人則病畏爆竹聲進椒柏酒崔實月令曰正日進椒酒柏酒是玉衡之精服之令人卻老柏亦是仙藥又云進酒次第從少年者至老首祚王羲之月儀書曰日往月來元正首祚太簇吉辰微陽始布罄無不宜和神養素帖畫雞於戶上插符於其傍而百鬼畏荊楚歲時記孔大饗含元盧鈞帝元日大饗含元殿鈞年八十升降如儀輸貢請元日陳於廷吳少陽傳元濟誅是歲蔡州始輸貢物戶部以其久不至請元日陳於廷李晟正歲崔氏女歸寧讓曰爾有家而姑在堂婦當治酒食以待賓客即卻之不得進春城回北斗杜甫元日詩春城回北斗郢樹發南枝燕粉荔枝金門歲節曰洛陽人家正旦造絲雞蠟燕粉荔枝初見宗祖正月元日初見宗祖韓愈元和聖德詩元日陳貢篚集於考堂柳晃傳聖唐稽古天下朝集三考一見皆以十月上計京師禮見會尚書省應考績事先日陳貢篚集於考堂唱其考第進賢以興善簡不肖以黜惡故歲去超忽韋蘇州寄諸弟新正加我年故歲去超忽歲朔李周翰文選注元日歲朔也火城國史補宰相禮絶班行元日百官已集而宰相方至珂傘列燭多至數百炬謂之火城絲光催柳色日彩泛槐煙虞世南宴宮臣詩賦詩猶落筆杜甫元日示宗武賦詩猶落筆獻壽又稱觴條風開獻節唐太宗正月臨朝詩條風開獻節灰律動初陽御樓御殿唐輦下歲時記元日御樓御殿發號施令慶賜遂行飲酒相邀法苑珠林唐長安人風俗每至歲元日巳後遞飲酒相邀迎謂之傳坐川谷風景溫城池草木發韋應物分二朋卜歲善惡西域寧遠每元日王及首領判二朋朋出一人被甲斗衆以瓦石相之有死者止以卜歲善惡禮部郎中元正一日陳設于太極殿皇帝袞冕臨軒展宮縣之樂陳歷代寶玉與輅備黃麾仗二王後百官朝集使皇親諸王並朝服陪位皇太子獻壽次上公次中書令奏諸州表黃門侍郎奏祥瑞戶部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻太史令奏雲物侍中奏禮畢然後中書令又與供奉官獻壽殿上皆呼萬歲出唐六典白七日為人董勳問禮俗曰正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人則正旦畫雞於門七日鏤人於上良為此也菜羹金勝歲時記人日以七種菜為羹煎綵為花勝以相遺或鏤金薄為人勝以象瑞圖之形梅花粧武帝壽陽公主人日梅花落額上成五色後人效為梅花粧銘魏東平王倉是日登壽張縣安民山銘曰正月七日厥日惟人此出郭緣生述征記稽董勳之問俗時則罔愆同上注考陳氏之見儀事乃不忒劉臻妻陳氏進見儀曰正月七日上人日人日荊楚歲時記云正月七日為人日鏤人帖屏風上赤戴之頭鬢董勳問禮俗云人入新年容改從新人日八孔初正候才兆涉七氣已弄靄靄野陽浮暉暉水披凍聖朝身不廢佳節古所用韓愈人日城南登高詩鄭公歸唐劉餗傳記鄭公嘗出行以正月七日謁見太宗勞之曰今日卿至可謂人日陰杜甫云元日到人日未有不陰時冰雪鶯難至春寒花較遲清輝閣景龍文館記三年七日上御清輝閣令學士賦詩杯中柏葉休隨酒勝裏金光巧耐寒杜甫劍佩衝星聊暫拔匣琴流水自須彈鏤金作勝傳荊俗剪綵為人起晉風李商隱人日即事中宗景龍四年正月七日宴大明殿賜王公以下綵勝景龍文館記盤蔬冬春雜樽酒清濁共韓愈人日詩淚灑行間杜甫撿書帙中得故高常侍人日在蜀州寄詩淚灑行間自蒙蜀中人日作不意清詩久零落上青韶既肇人為日景龍文館記人日詩升高綴綵人行慶傳芳蟻升高綴綵人同上膳部有節日食料謂正月七日煎餅唐六典注白作膏祠門玉燭寶典曰正月十五日作膏祠門戶祭門見上紫姑卜荊楚歲時記今州里風俗望日祭門先以柳枝插門隨枝所指乃以酒脯飲食及豆粥祭之齊諧記曰月半昔吳縣王成家夜一人立宅東南角謂成曰此地是君蠶室我即地神明日月半宜作白粥泛膏於上以祭我必當令君蠶桑百倍神言訖失所在如其言年年大得蠶或云神降陳氏之家云蠶神也劉敬叔異苑曰其夕迎紫姑神以卜云本人家妾為大婦所妒以其日感激而死故代人至日作其形迎於廁云子胥不在曹夫已行小姑可出子胥壻曹夫姑也祀太一史記樂書曰漢家祀太一昏時祀到明月望上元正月十五日為上元阤國之會西域記摩瑞阤國正月十五日僧徒俗衆集觀佛舍利放光雨花三五之夕三五良辰秉燭之遊行樂月惟中氣日則上元試鼓禰衡被魏武謫為鼓吏正月半試鼓衡揚桴作漁陽操淵淵有金石聲也孔燃百千燈嚴挺之睿宗好音律先天二年正月望夜胡人婆陀請燃百千燈因阤門禁挺之上疏諫帝御咸泰殿大燃燈作樂穆宗皇后蕭氏文宗立上尊號皇太后開成中正月望夜帝御咸泰殿大燃燈作樂迎三宮太后奉觴進壽禮如家人華清宮陳玄禮後在華清宮正月望夜帝將出遊復諫曰宮外曠野無備豫陛下必出遊願歸城闕帝不能奪幸其第賚賜不資韋安石為侍中中宗韋后以正月望夜幸其第賚賜不資探官唐開元遺事都城上元造面璽以官位高下帖之璽中探之天樞巡使影燈記梁鄴上元後忽髮變如血卜曰元夜食牛肺犯天樞巡使夜行禱謝可免百枝燈樹韓國夫人置百枝燈樹上元夜燃之唐開寶遺事千炬燭圍楊國忠子弟上元夜各有千炬燭圍出宮女歌舞唐輦下歲時記先天初上御安福門觀燈太常作歌樂出宮女歌舞朝士能文者為踏歌聲調入雲縱宮女出遊正月望夜中宗與后微服過而倣徉觀覽縱宮女出遊鞭梃歡兢玄宗貴妃楊氏天寶十載正月望夜妃家與廣寧王僮騎相爭鞭挺歡兢王墮馬僅得去王見帝泣乃詔殺楊氏奴大陳影燈唐鄭處誨明皇雜録曰上在東都遇正月望夜移仗上陽宮大陳影燈設庭燎自禁中至于殿庭皆設蠟炬連屬不絶時有匠毛順巧思結創繒綵為燈樓三十間高一百五十尺懸珠玉金銀微風一至鏘然成韻乃以燈為龍鳳虎豹騰躍之狀似非人力火蛾兒金門事節曰正月十五造火蛾兒食玉臨光宴影燈記曰正月十五夜玄宗於長安春殿臨光宴芊郎君洛陽人家上元以影燈多者為上其相勝之詞曰千影萬影又各家造芊郎君食之遊涼州明皇雜録正月望夜上與葉法善遊西涼州燭燈十數里俄頃還而樓下之歌舞未終遊廣陵開元十八年正月望夕帝謂葉仙師曰四方之盛陳乎此夕何處極麗對曰天下無踰於廣陵帝曰何術一觀之師曰侍御皆可俄而虹橋起於殿前板閣架虛欄楯若畫師奏橋成但無回顧於是帝步而上太真高力士及樂官數十人從行步步漸高直造雲中俄頃已到廣陵寺觀陳設之盛燈火之光照灼基殿士女華麗皆仰望曰仙人現於五色雲中帝大悅師曰請敕伶官奏霓裳羽衣一曲後可驗矣後數旬廣陵奏曰正月十五二更仙人乘綵雲自西來臨孝感寺高數十丈又奏霓裳羽衣一曲終西去初元朝禮之晨而慶雲現小臣踐修之地而仙樂陳上覽表大悅方信仙師之不妄也幽怪録晦日十白孟春晦日月晦酺聚飲食荊楚歲時記云元日至月晦並酺聚飲食也湔掌酹酒玉燭寶典曰元日至晦日人並酺食士女悉湔掌酹酒於水湄又臨河以度厄階蓂雕堯階蓂莢月桂盡謂月晦也陳不違晦以犯天忌戰陳避月晦提月公羊傳提月六鶂退飛提月者何近建月是晦日也何休注提月邊也魯人語此是月之幾盡也當蓂盡之辰為節荊楚歲時記曰每月皆有弦望以正月為初年時俗重之以為節孔晦日之朝猶朔日之夕曆志若合於子正則晦日之朝猶朔日之夕也是以月皆不見若合於午正則晦日之晨猶朔之昏也是以月或皆見之矣春氣漸和柔杜甫晦日詩起行視天宇春氣漸和柔泛舟杜甫陪王使君晦日泛舟晦日更禁愁假日無公事白公春寢是時正月晦假日無公事擇勝地追賞貞元元年九月二日敕今方隅無事蒸庶小康其正月晦日三月三日九月九日宜任文武百僚擇勝地追賞為樂出南部新書仍各賜錢以充宴會同上晦賞念前歲京國結良儔韋應物月晦詩晦日膏糜唐六典膳部有節日食料注晦日膏糜罩雲朝蓋上唐太宗月晦詩罩雲朝蓋上穿霧曉珠呈社十一白漢高祖天下定詔御史令治榆社春羊彘祠之荊楚記四人並結綜會社句龍共工氏有子曰句龍能平水土故祀以為社擇元日月令擇元日命人社為社稷春事興故祭之以祈農元日謂近春分前後戊日元吉也白社孔春秋二社張文琮出為建州剌史州尚淫祠不立社稷文琮乃下教曰春秋二社本於農今此州廢不立尚何觀於是始建祠場賜酺則天長壽元年九月大赦改元改用九月社賜酺社日賜酒餅白居易狀杜甕爾來嘗杜牧獨酌田翁逼社日邀我嘗春酒杜甫遭田父泥飲遙思里中會韋蘇州社日寄崔都水及諸弟山郡多暇日社時放吏歸春風動高柳芳園掩夕扉遙思里中會心緒悵微微九農成德業百祀發光輝社日詩社雨報年登韋應物報效神如在馨香舊不違杜甫社日詩社恩思蒸羔韓渥社日記陳平亦分肉太史竟論功杜甫社日中和節十二白時惟太平日乃初吉作為令節以殷仲春發揮陽和幽贊生植敬授人時仲序中和助發生之德覃作解之恩助陰陽之交泰表天地之和同當太平之昭代屬初吉之良辰國家授時建節備物陳儀詩二月初吉朔日孔李泌請以二月朔為中和節李泌帝以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古若何而可泌請廢正月晦以二月朔為中和節因賜大臣戚里尺謂之裁度民間以青囊盛百穀瓜果種相問遺號為獻生子里閭釀宜春酒以祭勾芒神祈豐年百官進農書以示務本帝悅乃著令與上巳九日為三令節中外皆賜緡錢燕會賦詩遣使者寵賜戴叔倫遷營管經略使德宗嘗賦中和節詩遣使者寵賜中者揆三陽之中和者酌仁氣之和於是以八九節七六氣排重陽而扣上巳煦元氣于厚壤則幽蟄蘇而勾萌達噫和風于窮荒則桀驁化而獷俗淳白居易頌又頌和為大和中為大中以暢中氣以播和風萌牙昆蟲昭蘇有融如斡玄化如運神功賜紅牙銀寸尺各一白居易當晝夜平分之時頒度量合同之令同上德宗置中和節唐輦下歲時記二月一日為中和德宗方置此節進鏤牙尺及木畫紫檀尺唐六典中尚署令立中和而視農文粹西都賦寒食十三白荊楚歲時記去冬至節一百五日即有疾風甚雨謂之寒食魏武之令魏武帝時明罰令曰聞太原至鴈門冬至後一百有五日皆絶火食云介子推且北方沍寒之地老小羸弱將有不堪之患今不得寒食若犯者家長半歲刑主吏百日刑令長奪一月俸周舉之書後漢周舉遷并州刺史太原舊俗以介子推焚骸一月斷火舉移書於子推廟云寒食一月老本不堪今則三日而已一月寒食見上注三日斷火鄴中記并州俗為介子推斷火餐食乾粥三日餳粥玉燭寶典曰今人研杏人為酪以煮麥粥以餳沃之鬥雞玉燭寶典曰今此節城市尤多鬥雞卵之戲或雕鏤相遺餉蹴踘劉向別録云蹴踘黃帝所造本兵勢遺麥粥齊魏收遺景元麥粥祭文孫楚祭子推文曰醴酪二盂醴酪大粳米或大麥為也禁火之辰內火傳以出內火注內藏也介子推之遺風魏武帝之舊令火禁周禮司烜司烜司烜氏仲春以木鐸修火禁於國中注謂季春將出其火也清明三月之節日在婁清明為三月節桐始華清明之日鑽燧改火春取榆柳之火以順陽時火氣改火之辰孔禮重拜掃柳宗元貽許孟容書曰近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地野祭而焚紙錢五代周本紀後序寒食野祭而焚紙錢則禮樂刑政幾何其不壞矣寒食假五代王峻請用顏衍陳同代李穀范質為相論請不已語漸不遜日亭午太祖未食峻爭不已是日寒食假太相曰俟假開當為卿行獻毬百官志中尚署寒食獻毬雞毬雷車禮志天寶二年諸陵常以寒食薦餳粥雞毬雷車半仙之戲唐天寶遺事天寶宮中至寒食節競築鞦韆令宮嬪輩笑為宴樂帝嘗呼為半仙之戲都中士民放而呼之萬花輿金門歲節曰寒食裝萬花輿煮楊花粥繡草宣臺唐酉陽雜俎寒食日賜侍臣帖綵毬繡草宣臺寒食上墓禮經無文近代相承寖以成俗明皇詔杏粥榆羹杏粥猶堪食榆羹已可煎佳辰韋蘇州寄諸弟焚火曖佳辰寒食江村路杜甫寒食江村路風花高下飛汀煙輕冉冉竹日淨暉暉御廚分冷食張籍內宴廊下御廚分冷食殿前香騎逐飛毬雨中禁火空齊冷韋應物寒食寄弟雨中禁火空齊冷江上流鶯寂寂聽杜陵寒食草青青把酒看花憶諸弟杜陵寒食草青青春柳南陌態冷花寒露姿李賀虛霑焦舉為寒食杜甫詩今朝寒食行野外緑楊匝岸薄生迸韓文店舍無煙宮樹緑元稹連昌宮祠初過寒食一百六店舍無煙宮樹緑佳辰強飲食猶寒杜甫寒食佳辰強飲食猶寒隱几蕭條帶鶡冠十年蹴踘萬里鞦韆十年蹴踘將雛遠萬里鞦韆習俗同杜甫清明詩花游曲李賀寒食日諸王娛游賀入座賦花游曲與妓彈唱帝自擊毬楊漢外傳會寒食宴近臣帝自擊毬為樂節日食料唐六典膳部有節日食料注謂寒食麥粥漢宮傳燭德宗擇知制誥批曰與韓翊時有同姓名者遂具奏後批曰春城無處不飛花寒食東風御柳斜日暮漢宮傳蠟燭青煙散入五侯家與此韓翊本事集進新綵雞子唐史談皎畫寒食圖一卷唐史藝文志幾年逢熟食萬里逼清明杜甫熟食日示宗武綵繩拂花去輕毬度閣來韋應物清明寒食好春園百卉開綵繩拂花去輕裘度閣來鬥雞戲上在藩邸樂民間清明節鬥雞戲及即位治雞坊東城父老傳拔河之戲景龍文館記清明節命侍臣為拔河之戲以大麻緪兩頭繫十餘小索每索數人執之以挽力弱為輸時七宰相二駙馬為東朋三相五將為西朋節及桐華恩頒銀燭韋綬除宣察鄭處誨為判作謝新火狀節及桐華恩頒銀燭綬削之曰非不巧但非大臣所宜言進火唐輦下歲時記長安每歲至清明尚食內園官小兒於殿前鑽火先得者進上賜絹三匹碗一口延興門都人並在延興門看人出城灑掃車馬喧鬧月燈閣新進士於月燈閣置打毬之宴同上酴醾酒或賜宰臣以下酴醾酒藏煙節過藏煙時當改火白居易狀白上巳漢書禮儀志曰三月上巳日宮人並禊飲於東流水上宋書曰自魏已後但用三月不用上巳元巳辰文選暮春之禊元巳之辰修禊事王羲之序曰永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修禊事也群賢畢至少長咸集云云祓禊風俗通曰周禮女巫掌歲時以祓除疾病禊潔也水上釁潔也溱洧韓詩曰三月桃花水鄭國之俗上巳於溱洧之上執蘭招魂祓除不祥解禊於洛張裴之言竹林七賢論王濟嘗解禊洛水或問昨宵遊有何語議答曰張華善說史漢裴逸人敘前言往行歷歷可聽禊南澗孫綽羲序以暮春之始解楔於南澗之濱會東堂晉起居注泰和六年三月三日臨沭杯池依東堂小會南浮橋夏仲御傳曰仲御詣洛三月三日王公莫不方駕軫並於南浮橋修禊仲御在船中暴所市之藥危坐不搖晉書云曲杯流水荊楚四民三日為流杯曲水之飲取黍曲菜汁和蜜為米以厭時氣犢車搜神記盧充三月禊水旁見水上有犢車還充兒並贈金碗薤露歌後漢梁商上巳日會賓客於洛水酒酣繼以薤露周舉歎之商後果薨八公山宋武帝三月三日登八公山劉安故臺曰城郭如匹帛之繞叢花也周公卜邑於洛羽觴隨波秦王置酒於河金人捧劍續齊諧記云晉武帝問摯虞三日曲水其義何指答云漢章帝時平原徐肇以月初生三女至三日俱死一村以為怪乃相攜水邊盥水因流水以濫觴曲水起此帝曰若如所說便非嘉事尚書郎束皙曰摯虞小生不足以知臣請說其始昔成王卜洛邑因流水以泛酒故逸詩曰羽觴隨波又秦昭王三日置酒河曲有金人自泉而出捧水心劍曰令君制有西夏因立為曲水二漢相沿皆為盛集執蘭見上注曲水見上注祓除暮春之禊永和之春癸丑之歲蘭亭曲洛周禊於曲洛也華林晉朝上巳集宴於華林園也三日沈約宋書曰自魏已後但用三日不復用上巳日東流水宋書漢有郭虞者三月三日上辰産二女上巳日産一女二日産三女並不育俗以為大忌故此月此日諱在家皆祓禊於東流水上三月三十四孔寒食多與上巳同時李泌帝以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古若何而可泌請廢正月晦著令以上巳為三令節宴曲江張建封元巳宴曲江特命與宰相同榻食集龍門宴集杜甫上巳日徐司録林園宴集薄衣臨積水吹面受和風錢龍宴粧樓記長安有妓樂者三月三日結錢為龍為簾作錢龍宴細柳圈唐酉陽雜俎三月三日賜侍臣細柳圈言帶之免蠆毒擇勝地追賞見晦日注酒食出於野文粹魯令三月宴序以酒食出於野曰禊飲古俗也歐陽詹曲水行韋蘇州暮節看已謝茲晨逾可惜風淡意傷春池寒花斂夕誰當曲水行相思尋舊跡燕太學彈琴韓文上巳燕太學聽彈琴序天子肇置三冬節詔公卿群有司率厥官屬飲酒以樂司業武公於是總太學儒官三十有六人列燕于祭酒之堂有一儒生抱琴而來宴龍門命賦詩天后上巳日宴從臣於龍門命賦詩翰林志人和氣稔禊於洛濱白居易開成二年三月三日河南尹李待價以人和氣稔將禊於洛濱召留守裴令公等一十五人各宴于舟中由斗亭歷槐提抵津橋登臨沂沿自晨及暮簪紱交映歌笑間發前佳賓後樂妓左筆硯右壺觴望之若仙觀者如堵盡風光之趣極流泛之娛美景良辰賞心樂事盡得於斯矣禊飲踏青三月三日天氣新杜甫麗人行三月三日天氣新長安水邊多麗人禊逸禮也鄭風有之蓋取諸勾萌發達陽景敷煦握芳蘭臨清川乘和蠲潔用徼介祉厥義存矣蕭頛士逢池禊飲序白端午周處風土記仲夏端午進角黍端始也角黍今之粽子浴蘭大戴禮云五月五日以蘭湯沐浴懸艾荊楚歲時記曰五月五日荊楚人皆踏百草採艾為人懸於門戶以禳毒氣朱索續漢書曰五月五日朱索五色為門戶飾以禳除惡氣赤符抱朴子或問避五兵之道以五月五日著赤靈符於心前祭屈續齊諧記曰屈原以五月五日投於汨羅而死楚人哀之至此日以竹筒貯米祭之建武元年長沙人見之自稱三閭大夫曰常苦蛟龍所竊願以五色絲纏之則蛟龍所畏祠陳後漢陳臨為蒼梧太守推誠而理臨徵去後本郡以五月五日祠東門城外令小童潔服而舞競渡荊楚歲時記屈原此日投汨羅死後人以舟楫救之遂因而為俗胡廣世說云胡廣本姓黃以五月五日生惡之甕盛棄江中胡公見收養為己子曹娥異苑曹娥父盱以五月五日溺水死娥循江號哭七日遂投江三日後與父尸俱出五日良時長命縷辟兵繒見抱朴子菰葉裹粘米以象陰陽相苞裹未分散也風土記云繞臂綵詩曰繞臂雙條達採艾荊楚歲時記曰宗則文常以五月五日未雞鳴時採艾見似人處擾而取之灸有驗蓄藥又曰是日兢採雜藥夏小正云此月畜藥以蠲除毒氣也斗百草荊楚記此日四人踏百草今人又有斗百草之戲競渡越地傳云起於越王勾踐忌蓋屋曝席薦風俗通云此月蓋屋令人頭禿又曰不得曝席薦異苑曰新野庾家嘗於五月五日曝席忽見一小兒於席下俄而失所在因相傳以為忌艾草先生多疾病則艾草先生孔群臣賜襲衣李元紘傳五月五日宴武成殿群臣賜襲衣特以紫服金魚賜元紘及蕭嵩異雀鳴集庭樹崔信明青州益都人信明之生五月五日方中有異雀鳴集庭樹太史良為占曰五月為火火主離離為文日中文之盛也雀五色而鳴此兒將以文顯然雀類微位殆不高耶召見山人李唐肅宗廢后張氏端午日帝召見山人李唐帝方擁幼女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下帝泫然涕下而內制於后卒不敢謁西宮貢獻食貨志端午四方貢獻至數千萬者加以恩澤而諸道尚侈麗以自媚諸陵薦衣扇禮志天寶二年諸陵常以五月五日薦衣扇射團唐開元遺事宮中端午造粉團角黍貯盤中以小角弓射之中者得食都中盛行此戲維摩像鬚劉公嘉話云晉謝靈運美鬚臨刑施為南海祗洹寺維摩誥像鬚寺人寶惜初不虧損中宗朝安樂公主五日斗百草欲廣其物色令馳驛取之又恐為他人所得因剪棄其餘朮羹艾酒金門歲節曰洛陽人家端午朮羹艾酒以花綵樓閣插鬚贈辟瘟扇梳同上重五竹節金門歲節曰重五日午時有雨則急斫一竿竹竹節中必有神水瀝取獺肝為丸治心腹積聚病進五時圖酉陽雜俎北朝婦人五月進五時圖五時花施帳之上是日又進長命縷宛轉皆結為人象帶之賀端午裁縫雲霧成御衣拜跪題封賀端午杜甫惜別行朱明啓節御府賜衣柳宗元謝端午衣物金花器綵絲端午賜臣墨詔並衣一副金花器三事綵絲一軸大將衣四副綵絲五軸寵光洊至慶賜曲霑劉禹錫謝端午表壽索端午賜百索為壽索李肇翰林志符天數明皇詩五日符天數玄武門遊戲唐舊史萬年縣法曹孫伏伽上表近太常於民間借婦女裙襦以充妓衣擬五月五日玄武門遊戲非所以為子孫法也江心鑄鏡揚州進水心鏡參軍李守泰曰五月五日午時於揚子江中鑄之宮衣亦有名端午被恩榮杜甫節日食料唐六典五月五日粽䊦進百索綬帶中尚署白三伏陰陽書曰夏至後第三庚初伏第四庚為中伏立秋後初庚為後伏秋夏交會之辰金火伏藏之日曆忌釋曰立秋以金代火也金畏火故至庚日必伏庚者金也故曰伏日一時之著典略曰劉松袁紹於河朔三伏之際晝夜飲酒至於無知以避一時之暑故河朔間有避暑之飲秦修祠史記秦穆公始為伏祠漢擇日風俗通曰漢中巴蜀高祖用張良之策還定三秦蓋君子所因者本論功加金帛重復寵異令擇伏日不同凡俗祠黃石史記留侯既得黃石留侯死並黃石而葬每上冢伏臘祠黃石賜肉漢書曰伏日賜肉東方朔割肉曰伏當早歸即懷肉而去金藏之日秋夏之交初伏史記秦德公三年初伏注云六月上伏日秦始置亢陽徂暑伏臘之費牧羊沽酪孔伏日寒唐五行志大曆四年六月伏日寒遺冰獸唐開元遺事楊國忠每至伏日取堅冰命工雕為鳥獸之形飾以金鐶縷帶置雕盤中送遺王公惟張九齡不受金數已三伏劉禹錫詩賜醝汁唐輦下歲時記伏日賜宰相學士醝汁京尹公主駙馬蜜炒及漿水伏者謂陰氣將起迫於殘陽而未得升故為藏伏因名伏日顏師古驕陽化為霖杜甫詩三伏適已過驕陽化為霖白牛女吳均齊記云桂陽城武丁有仙遊忽謂其弟曰七月七日織女當渡河暫詣牽牛吾向已被召代人至今云織女嫁牽牛穿針乞巧荊楚歲時記七夕婦人以綵縷穿七孔針陳几筵酒脯瓜果於庭中以乞巧或云見天漢中奕奕白氣有光五色以為徵應見者便拜得福䊦山鶴列仙傳王子喬見桓長曰告我家七月七日待我䊦山頭至時果乘白鶴於山頭望之不到舉手謝時人數日而去曝腹郝隆七月七日曝腹於庭中人問之曰我曝腹中書犢鼻竹林七賢傳七月七日諸阮庭中鋪陳莫非錦繡阮咸時總角乃以長竿標大布犢鼻裩於庭中曰未能免俗七夕秋期西王母漢武故事七月七日上於承華殿齊正中有一青鳥從西方來集殿前上問東方朔朔曰西王母欲來有頃王母至有二青鳥待王母傍靈匹靈幄河鼓爾雅曰河鼓謂之牽牛瑞光代傳竇后少頭禿不為家人所齒遇七夕人皆看織女獨不許后出乃有神光照室為后之瑞作麴合藥崔實四人月令云其日作麴合藥丸蜀漆丸曝經書及衣裳七日良辰孔置酒前蜀王建子元膺是月七夕元膺召諸王大臣置酒而集王宗翰樞密使潘峭翰林學士毛文錫不至元膺怒曰集王不來峭與文錫教之耳蛛絲卜巧唐開元遺事帝與妃子每至七夕夜在華清宮宴時宮女輩陳瓜果酒饌列于庭中祈恩于牛女也又各以蜘蛛內之小金合子中至曉開視蛛絲稀密以為得巧之多少民間亦效焉祈請走兒童杜甫牽牛詩亭亭新粧立龍駕具層空世人亦為爾祈請走兒童乞巧柳宗元乞巧文曰柳子夜歸自外庭有設祠者餰餌馨香蔬果交羅插竹垂緌剖瓜犬牙且拜且祈怪而問焉女隸進曰今茲秋孟七夕天女之孫將嬪於河鼓邀而祠者幸而與之巧驅去蹇拙手目開利組紝縫製將無滯於心焉為是禱也柳子曰吾亦有大拙儻可因是以求去之乃再拜稱臣而進曰臣有大拙智所不化醫所不攻威不能遷寬不能容造明星酒唐金門歲節乞巧使蜘蛛結萬字造明星酒裝同心鱠祭杼織染署七月七日祭杼出唐百官志軿車繡幄郭子儀初從軍沙塞間至銀州數十里將宿既夜忽見左右皆有赤光仰視空中軿車繡幄中有一美女坐床垂足自天而下俯視子儀拜祝云今七月七日必是織女降臨願賜長壽富貴女笑曰大富貴亦壽考言訖冉冉升天猶正視子儀良久而隱子儀後立功貴盛威望烜赫大曆初鎮河中疾甚三軍憂懼公謂幕賓等曰吾此疾自知未便衰殞因話所遇之事衆稱賀欣悅其後拜尚父年九十餘薨出感遇傳蛛絲小人態曲綴瓜果中曝衣遍天下曳月揚微風牽牛出河西織女處其東萬古一相望七夕誰見同並杜詩九孔針七夕宮人向月以九孔針穿五色綵線天寶遺事王時應七夕李賀詩白露含明月青雲斷絳河杜審言袨服鏘環珮香筵拂綺羅同上天回兔將落河曠鵲停飛上機罷猶安石橋成不礙查劉禹錫七夕曝衣樓景龍記太液池西有漢武帝曝衣樓常至七月七日宮女出后衣登樓曝之因賦曝衣篇雞跖集鵲辭穿線月花入曝衣樓李賀七夕豈意靈仙偶相忘亦彌年夕夜清露濕晨駕秋風前韋應物七夕斫餅唐六典膳部有節日食料注謂七月七日斫餅七孔金鈿針中尚署七月七日進七孔金鈿針牽郎何在郭翰少有清標乘月臥庭中視空中有人冉冉而下乃一少女明艷絶代曰吾天之織女也上帝賜命遊人間願乞神契乃升堂共寢柔肌膩體妍艷無比欲曉辭去面粉如故試為拭之乃本質也後夜復來翰戲之曰牽郎何在那敢獨行對曰陰陽變化關渠何事且河漢隔絶無可復知縱復知之不足為慮將至七夕忽不復來數夜方至翰問曰相見樂乎笑曰天上那比人間正以感遇當爾非有它故問曰卿來何遲曰人中五日彼一夕爾忽一夜悽惻流涕曰帝命有程便當永訣以七寶枕留贈騰空而去墨莊冗録白日在張七月中氣日在張建申斗建申位之中孟秋之望十五日三五良辰中氣見上中元道經云七月十五日中元地官勾搜選衆人分別善惡以其日作玄都大獻於王公以世間奇異好妙幡幢寶蓋供養之具精膳飲食獻諸衆聖道士於其日講誦老經十方大聖高詠靈篇盂蘭盆盂蘭盆經云目連以母生餓鬼中佛令作盂蘭盆至七月十五日以百味五果以蓋盒中供養十方大德而後母得食目連白佛凡弟子孝順者以應奉盂蘭盆供養佛言大善後世因之廣為華飾孔宮中造盂蘭王縉傳七月望日宮中造盂蘭盆綴飾鏐琲設高祖以下七聖位幡節衣冠皆具各以帝號識其幡自禁內分詣道佛祠鐃吹鼓舞奔走相屬是日立仗百官班光順門奉迎導從歲以為常觀禮空王韓愈直諫表近聞陛下七月十五日幸安國寺觀禮空王以為崇福施信示天下仁心三元日宜令崇元學士講道德南華等經明皇實録三元日宜令崇元學士講道德南華等經群公咸就觀禮步輦召學士明皇在便殿甚思姚元崇論時務七月十五苦雨不止泥濘盈尺上令待制者抬步輦召學士來時元崇為翰長中外榮之自古急賢待士帝王未有如此也三元日非供祠不採魚唐史百官志河渠令進盂蘭盆唐六典中尚署七月十五日進盂蘭盆白重陽魏文帝書曰歲往月來忽復九月九日為陽數兩月日並應故曰重陽登高續齊諧記汝南桓景隨費長房遊學長房謂曰九月九日汝家當有災異急令家人縫絳囊盛茱萸繫臂上登高飲菊花酒此禍乃消景從其言還家登山夕還見雞犬一時暴死今人九月九日登高是其事白衣菊酒晉陽秋曰陶潛九月九日無酒宅邊摘菊盈把望見白衣人至乃王弘送酒便飲醉而歸龍山落帽孟嘉傳曰嘉為桓溫參軍九月九日溫遊龍山參寮畢集風吹嘉落帽如廁不覺溫令孫盛嘲之嘉亦答之戲馬臺南齊書宋武帝為宋公時在彭城九月九日遊項羽戲馬臺今相承以為舊事佩茱萸西京雜記武帝宮人賈蘭佩茱萸食餌飲菊花酒賜菊魏武帝與鍾繇書曰九月九日草木偏枯而黃菊紛然獨秀今奉一束授衣之月落帽之辰馬射晉書九月九日馬射或說云秋金之節武習射象立秋之禮孔黃菊歌韋綬罷九月九日帝為黃菊歌顧左右曰安可不示韋綬即遣使持往宴群臣曲江韋綬為集賢院學士九月九日宴群臣曲江綬請集賢院學士得別會帝一順聽大宴滕王閣王勃九月九日都督大宴滕王閣宿命其壻作序以夸客因出紙筆遍請客莫敢當至勃泛然不辭賜茱萸杜甫九日詩賜茱萸朝士難得一枝來菊蕊浮觴之日唐中宗詔迎涼脯金門歲節曰洛陽人家重陽作迎涼脯羊肝餅佩癭水符霜風破佳菊嘉節迫吹帽韓愈薦士九日天氣清登高無秋雲李白九日登巴陵黃花不掇手戰鼓遙相聞䠎踀東籬下淵明不足群同上萸房薦馥菊蕊含芬中宗九日登高序糕酒白公九日登西原移座就菊叢糕酒前羅列楚客凜秋時張曲江九月八日登龍山郡庭常窘東涼野求昭曠楚客凜秋時柏公舊臺上插萸把菊插萸登鷲嶺把菊坐蜂臺任百寮追賞貞元敕其九月九日宜任百寮追賞菊花節王維詩四海方無事三秋大有年芍藥和金鼎茱萸插玳筵無窮菊花節長奉柏梁篇泛菊杜甫秋光近青岑季月當泛菊小驛香醪嫩杜甫九日宰相大夫綴席茱萸好浮舟菡萏衰同上登南山文峰唐尹氏女姿容頗麗性識敏慧不因保母而妙善唱歌因重陽與群女戲登南山文峰而同輩命之歌乃顰眉緩頰怡然一曲聲達數十里故俗耆舊云尹氏之歌聞於長安江南野史九日出糕袁師德給事中高之子九日出糕謂坐客曰某不忍喫請諸公食俯首久之嘉話録坐看桑落酒來把菊花枝杜甫詩登高素産源同上九日詩伊昔黃花酒同上登城伊昔黃花酒如今白髮翁重陽獨酌杯中酒抱病豈登江上臺竹葉於人既無分菊花從此不須開上相要舊俗非九日明朝是相要舊俗非集諸人追歡筋力異望遠歲時同同上每恨陶彭澤無錢對菊花如今九日至自覺酒須賒復愁上因招白衣人笑酌黃花菊李白九日登山我來不得意虛過重陽時題輿何俊發送結城南期築土按響山俯臨宛水湄胡人叫玉笛越女彈霜絲同上今日雲景好水緑秋山明同上九日詩攜壺酌流霞搴菊泛寒榮同上遠岫對壺觴澄瀾映簪紱炮羔備豐膳蒙鳳調鳴律崔元翰和詩龍沙宴會龍沙重九會千騎駐旌旗權德輿龍沙宴會詩膳部有節日食料注謂九月九日麻葛糕唐六典閏重九作宴賦詩李嶠云閏節開重九景龍文館記即今蓬鬢改舊日重陽日傳杯不放杯即今蓬鬢改但愧菊花開歲除二十白日窮于次月窮于紀星回于天數將幾終歲且更始大儺旁磔以送寒氣驅疫呂氏春秋注云前歲一日擊鼓驅疫癘之鬼謂之逐除亦曰儺宿歲荊楚記歲暮家家具肴蔌為宿歲之儲日月其除卒歲送寒迎春三百六旬之盡七十二候之窮孔獻鍾馗擊鬼圖吳越錢俶傳佐卒弟倧以次立歲除畫工獻鍾馗擊鬼圖上胡進思見之大悟知倧將殺己是夕擁兵廢倧迎俶立之夜宴竇懷貞會歲除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎盍簪喧櫪馬列炬散林鴉杜甫守歲點水盆燈金門歲節曰洛陽人家除夜則銅刀刻門埋小兒硯點水盆燈商陸火裴度除夜嘆老殆曉不寐爐中商陸火凡數添也煆磨齊僧園逸記都下寺院每用歲除煆磨是日作煆磨齊祭詩賈島常以歲除取一年所得詩祭以酒曰勞吾精神以是補之出金門歲節燃蠟炬燎沉檀歲除日太常卿領官屬樂吏並護童侲子千人晚入內至夜於寢殿前儺燃蠟炬燎沉檀焚煌如晝上與親王妃主已下觀之其夕賞賜甚多出南部新書儺翁儺母李綽秦中歲時記歲除日儺皆作鬼神狀二老人各為儺翁儺母爆竹張說守歲詩爆竹好驚眠階馥舒梅素盤花卷燭紅唐太宗冰池始泮緑梅楥還飄素韋應物詩望家思獻壽算甲又增年歐陽詹詩閏月二十一白以閏月定四時成歲堯典周禮閏月詔王居門終月門露寢門也天子居明堂無室位則闔門左扉立於其中閏以正時歸餘於終閏月也數扐歸奇於扐以象閏閨月不告朔非禮也不告閏朔棄時政也何以為民閏月者附月之餘日積分而成月也餘分說文曰餘分之月五歲再閏閏三月文元年閏三月非禮歸餘於終事則不悖合在僖公末年積閏匪乖期於積閏氣逐閏移孔告朔張齊賢陝人武后詔群臣議告朔于明堂齊賢曰穀梁氏稱閏月天子不告朔閏月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣正時傳云閏者附月之餘日天子不以告朔非禮也閏以正時時以作事不告閏朔棄時政也王方慶明堂告朔議不可謂正孫樵西齊録紫色閏位不可謂正豫懼後世牽以稱臨也盛衰千祀正閏更王文粹賈至虎牢關銘周室微弱虎狼并吞盛衰千祀正閏更王十九年七閏玄始曆以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未達也曆志失閏已久哀公十二年冬十有二月螽開元曆推置閏當在十一年春至十二月冬失閏已久斗柄未回猶帶閏元稹送友封詩白虞不臘矣左傳夏曰嘉平殷曰清祀周曰大蠟風俗通漢改為臘伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之王者各以其行盛日為祖衰日為臘漢以火德火衰於戍故戍日為臘魏以土德土衰於辰故辰日為臘晉以金德金衰於丑故丑日為臘臘與蠟同諸具祭部蠟門注祠黃石史張良於下邳圯上見老人得書云穀城下黃石我也果見取而寶祠之留侯死并黃石葬每上冢伏臘祠黃石報有功漢舊儀曰臘者報鬼神古聖賢有功於民送蔡雍獨斷曰臘者歲之終大祭從吏民宴飲非迎氣故但送不迎也王氏臘謝承後漢書曰沛國陳咸為廷尉監至王莽篡位還家杜門莽改易漢法令及臘日咸嘗言我之先祖何知王氏之臘也盜樹陳留志曰范喬邑人臘夕盜斫其樹有告喬佯不聞邑人愧而歸之喬曰卿臘日取柴欲與父母相歡娛耳竊食袁嵩後漢書曰韓卓字子助陳留人臘月奴竊食祭其先人卓義其心即出免之持椒養生要十二月臘夜令人持椒臥井旁無與人言內椒井中除溫病兔臏風俗通曰兔臏俗說正祖食得兔臏者名之曰幸賞以寒酒幸者善祥令人吉利議晉博士張亮議曰臘接也祭宜在新故交接也俗謂臘之明日為初歲秦漢已來有賀此皆古之遺語秦惠文君十二年初臘史記本紀五孔罷獻狐兔憲宗紀元和九年十一月戊子罷京兆府獻孤兔用周臘則天載初二年臘月巳未始用周臘口脂百官志中尚署臘日獻口脂造脂花餤金門歲節曰洛陽人家臘日造脂花餤山川恣遊矚韋蘇州社臘會高年山川恣遊矚賜臘景龍文館記三年臘日帝於苑中召近臣賜臘晚自北門入於內殿賜食加口脂臘脂盛以碧鏤牙䇶紅雪白居易有臘日謝曰蠟紅雪澡豆等狀伏臘蕭炅李林甫所引不知書嘗與嚴挺之言稱蒸嘗伏臘乃為伏臘挺之白九齡省中有伏臘侍郎乎侵凌雪色還萱草杜甫臘日侵凌雪色還萱草漏泄春光有柳條又口脂面藥承恩澤翠管銀罌下九霄進衣香囊唐六典中尚署臘日進衣香囊冬臘日前寅蠟百神於南郊唐六典賜銀合駐顏膏臘日賜銀合子駐顏膏牙香等繡香袋一枚韓偓未將梅蕊驚愁眼杜甫十二月一日未將梅蕊驚愁眼要取楸花媚遠天上苑花開天授二年臘卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝遊上苑火急報春知花須連夜發莫待疾風吹於是凌晨名花瑞草皆發群臣咸服其異焉卓異記時當臘節候屬祁寒白居易狀
