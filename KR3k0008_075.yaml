body:
  text: 卷第七十五白司刑古曰司刑廷尉秦曰廷尉漢改為大理垂泣具斷獄門高門于公理獄積陰德修宅令高其門以待曰我子孫必有昌者至定國為廷尉棘署聽獄於棘木之下竹刑三尺官尊九寺任重三章郭氏七人吳家三代子孫並為廷尉漢用平允任先張釋魏推明察選在鍾繇況當慎罰之朝宜重典刑之法當恤刑之朝居執法之任舜命皋陶刑惟明允漢尊定國道在寬仁朱博恐為官屬所誣乃以意覆獄具議刑門天下之平高柔字文思魏明時為廷尉每曰廷尉天下之平齊職儀云大理古官也唐虞以咎繇作士士理官也初秦置廷尉漢因之景帝改曰大理武帝又云廷尉哀帝又曰大理王莽改曰作士東漢又曰廷尉魏復為大理復改廷尉五代史百官志云梁加卿字曰廷尉卿後並因之北齊初為廷尉卿後復為大理卿隋因之唐初因之改曰詳刑卿咸亨初復舊光宅初曰司刑卿神龍初復舊大理卿一孔大理寺卿一人少卿二人掌折獄詳刑凡罪抵流死皆上刑部覆於中書門下繫五日一慮百官志龍朔二年改曰詳刑寺武后光宅元年改曰司刑寺同上清直戴胄大理少卿缺帝曰大理人命所繫胄清直其人哉即口命胄長孫無忌被召不解佩刀入東上閣門尚書封德彝論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子於尊極不稱誤法著御溫濟飲食舟船雖誤皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑繇是無忌與校尉皆免法者布大信於人胄時有詭資蔭冒牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下不以信卿賣獄耶卿自守法而使我失信祭何胄曰法者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而置於法此忍小忿存大信也若呵忿違信臣為陛下惜之帝大感悟參處法意至析秋毫戴胄為大理少卿犯顏據正數矣參處法意至析秋毫隨類指擲言若涌泉帝益重之下之寬猛視主之好劉德威入為大理卿大宗問曰比刑網寖密咎安在德威曰在君不在臣之寬猛視上之好律夫入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深文為自營非有教使然也執法平恕方戴胄張文瓘兼大理卿不旬日斷疑獄數百抵罪者無怨言嘗有小疾因相與齋禱願亟視事時以執法平恕方戴胄所守者公法徐有功轉司刑少卿皇甫文備誣有功縱逆黨久之文備坐事下獄有功出之或曰彼嘗陷君於死今生之何也對曰爾所言者私忿我所守公法不可以私害公薦張柬之張柬之傳后它日又求人仁傑曰臣嘗薦張柬之未用也后曰遷之矣曰臣薦宰相而為司馬非用之乃授司刑少卿律令請崇寬簡韓仲良為大理少卿律令請崇寬簡不樂法家元稹遷大理卿不樂法家因謝所居官禍福何常張道原拜大理卿何稠得罪籍其家屬賜群臣道源曰禍福何常更資以衣食遺之諫馳射孫伏伽遷大理少卿帝數出馳射伏伽諫帝悅占對無不盡唐臨纍遷大理卿高宗嘗録囚臨占對無不盡帝喜曰為國之要在用法刻則人殘寬則失有罪惟是折中以稱朕意司刑丞杜景佺徐有功並為司刑丞與來俊臣侯思止同制獄人稱之曰遇徐杜必生遇來侯必死通典狄仁傑儀鳳中為大理丞周歲斷滯獄一萬七千人無冤訴者時武衛大將軍權善才坐誤斫昭陵柏樹仁傑奏罪當免職高宗令即誅之仁傑曰陛下必欲變法請從今日為始臣不敢奉制殺善才陷陛下於不道帝意解善才因而免舊史白司賓一名司賓寺漢尚勳賢寵崇郭況東觀漢記郭況為鴻臚上數幸其宅飲酒賞金帛甚盛京師號況家為金穴魏推恆惟選在崔林魏志崔林字德儒為鴻臚待遇諸外國約故事皆有恆準況當柔遠之朝宜遵典屬之任典屬國鴻臚卿蘇武為之典客大行漢書典客秦官也掌諸侯歸義蠻夷景帝六年更名大行今吏名大鴻臚賓贊漢蕭因為陳留大守入為大鴻臚不任於賓贊掌蠻夷主胡漢書曰典客秦宮秩中二十石掌諸侯及四方歸義蠻夷山濤啓事曰鴻臚主胡事前後為之者率多不善了今缺當選卿史中丞刁攸不審可否掌四方夷贊九賓禮主儐贊九賓之禮王莽初改曰典客東漢又曰大鴻臚其後並因之五代史百官志云至梁加卿字除大字後魏又加大字北齊又除之隋氏因之唐初因之龍朔二年改為同文卿咸亨初復舊光宅初改曰司賓卿神龍初復舊鴻臚卿二孔鴻臚寺卿一人掌賓客及凶儀之事領典客司儀一署凡四夷君長以蕃望高下為簿朝見辨其等位第三等居武官三品之下第四等居五品之下第五等居六品之下有官者居本班百官志海外諸蕃入朝所獻之物先上其數於鴻臚獻藥者鴻臚寺驗覆同上龍朔二年改鴻臚寺曰同文寺武后光宅元年改曰司賓寺同上選親兵巡警郭晞進鴻臚卿河中軍亂父子儀召首惡誅之其支黨猶反及晞選親兵巡警以備非常姦人不得發以功拜殿中監樵貴帛賤劉義節為鴻臚卿時傾府庫為軍賞帑財大乏義節曰今京師屯兵多樵貴帛賤若伐街苑樹為薪以易布帛歲數十萬可致唐史白治粟秦曰治粟內史月卿大農金榖楊雄司農針曰惟時大農爰司金榖漢崇儒學選在鄭玄字康成徵為大司農晉寵貞廉任先崔氏晉崔洪為司農手不執珠玉口不言貸財韓信歸漢漢以為治粟內史典農本藏不給末用漢母將隆君房言大司農錢自供乘不給供養勞賜一出少府蓋不以本藏不給末用不以人力供浮費別公私示正略天倉國泉韓楊天文要集曰天倉者大司農也史遊急就篇司農少卿國之泉也司金掌帛楊雄大司農針曰惟時大農惟司金榖續漢書曰大司農卿一人中二千石掌諸錢榖金帛周曰太府莽改羲和周禮有太府下大夫鄭注云太府為王理藏之長今司農矣羲和見下文高詡方正牟融明達東觀漢記高詡字季回以文學徵而拜大司農在朝以清白方正稱牟融字子優為入司農惟明達稱為明卿漢官儀云初秦置治粟內史掌榖貨漢因之景帝更名大農令武帝更名大司農王莽改曰羲和又改為納言東漢復曰大司農五代史百官志云梁加卿字除大字後魏又加大字北齊又去之隋氏因之唐初因之龍朔二年改曰司稼卿咸亨元年復舊司農卿三孔司農卿一人少卿二人掌倉儲委積之事總上林太倉鉤盾導宮四署及諸倉司竹諸湯宮苑鹽池諸屯等監凡京都百旬官吏祿廩朝會祭祀所須皆供焉籍田則進耒耜百官志龍朔二年改司農寺曰司稼寺同上鄙其聚斂竇靜授司農卿趙元楷為少卿靜鄙其聚斂因會官屬大言曰如煬帝奢侈竭四海自奉司農須公矣今天子躬節儉屈一人安屯庶惡用云哉元楷大慚倒用司農印追兵段秀實朱泚反以秀實失兵必恨憤且素有人望使騎迎秀實與子弟訣而入泚喜曰吾事成矣秀實知不可乃陽與合陰結將軍劉海賓姚令言都虞侯何明禮欲圖泚三人者皆秀實素所厚源休教泚偽迎天子遣將韓旻領銃師三千疾馳奉天秀實以為宗廟之危不容喘乃遣人喻大吏岐靈嶽竊取令言印不獲乃倒用司農印追其兵旻至駱驛得符還秀實謂海賓曰旻之來吾等無遺類我當直搏殺賊不然死乃約事急為繼而令明禮應於外奪象笏擊朱泚段秀實翌日朱泚召秀實計事源休姚令言李忠臣李子平皆在秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反邪遂擊之泚舉臂捍笏中顙流血衊面匍匐走而賊衆未敢動而海賓等無至者秀實大呼曰我不同反胡不殺我遂遇害叢劇杜中立遷司農卿繩吏急反為中傷左徙慶王傳久之復拜司農卿入謝帝曰卿用法深言乎答曰轂下百司養名不肯事如司農尤叢劇陛下無遽信流言假臣數月事可濟帝許之六宮飧錢又初度支度六宮飧錢移司農季一出付吏大吏盡舉所給於人權其子錢以給之既不以時黃門來督責慢罵中立取錢納帑舍率五百一出吏不得為姦遂以為法同上杖而後奏韋機拜司農少卿兼知東都營田甚見委遇有宦者於苑中犯法機杖而後奏高宗嗟賞賜絹十匹謂曰更有犯者卿即鞭之不須奏也農天下之本也故國有九列而司農氏居其一焉元稹裴武授司農卿制農天下之本也故國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不茲選白司府古名少序亦曰司府位列月卿職司天府漢用公勤任先蔡議魏推清白選在常林況當貢賦之口宜重帑藏之司居監臨之官典出入之務領貢獻於四方彼無虛月掌財用於五庫我有司存頒藏用之府周禮太宰貢之入頒藏用之府受藏受用太府周官也周禮曰天官屬有太府下大夫掌貢賦受其貨賄之入掌府藏貨賄秦漢已下不置其官職所司在司農少府矣至梁始置太府卿陳及魏北齊隋皆因梁置之唐龍朔二年改為外府卿咸亨初復舊光宅初改為司府卿神龍初復舊太府卿四孔太府寺卿一人少卿二人掌財貨廩藏貿易總京都四市左右藏常平七署凡四方貢賦百官俸秩謹其出納賦物任土所出定精粗之差祭祀幣帛皆供焉百官志龍朔二年改太府寺曰外府寺武后光宅元年改曰司府寺中宗即位復曰太府同上聚九州之賦辨百貨之名按其度程謹其出納孰為主者外府上卿裴武太府卿制白居易為人嚴愨李襲譽召為太府卿為人嚴愨以威肅聞尹卿筆尹思貞召授司府少卿時卿侯知一亦厲威嚴吏為語曰不畏侯卿仗只畏尹卿筆物經楊卿者無不精麗楊隆禮開元初為太府卿時御府財物羡積如山隆禮性詳密出納雖尋尺皆自按省物經楊卿者無不精麗歲常舜省數百萬本傳任職二十年楊隆禮任職二十年九十餘卒隆禮罷太府玄宗訪其子可代父任者宰相以謹餘謹矜謹名皆得父清白帝喜擢謹矜監察御史知太府出納殿中監五孔殿中監一人從三品少監二人從四品掌天子服御之事其屬有六局尚食藥尚衣尚乘尚舍尚輦凡聽朝率屬執繖扇列于左右大朝會祭祀則進爵行幸則侍奉仗內驂乘百官志武德元年改殿內監曰殿中省龍朔二年曰中御府監曰大監丞曰大夫陪燕私明皇即位召授殿中少監出入臥內陪燕私詔許捨敬坐與妃嬪連榻間擊毬鬥雞呼之不名也賜宮女廄馬及他珍物前後不勝計玩佳樹令徙植其家帝在殿庭玩一佳樹皎盛贊之帝遽令徙植其家後將誅竇懷貞等皎與密議以功進殿中監進圭進爵元稹韋處度制殿中丞段總六尚以供名物當進圭進爵之時不可虛位白成均國子監也太學國學當文理之朝奉成均之職不朝漢時吳王年老以劉氏為祭酒授几杖不朝祭酒講學漢王莽以安車駟馬迎龔勝為祭酒議學傳經戴逵為儒林祭酒刻石傳經漢擢荀卿晉選劉毅並為祭酒也白書堯典曰克明俊德以親九族九族既睦平章百姓周受命封建宗盟百官春秋云周封兄弟之國十有六同姓之國三十有五焉始選宗中之長而董之謂之宗正成王時彤伯入為祭酒掌主親屬也漢秦因之漢平帝更名宗伯王莽改名秩宗東漢復為宗伯至晉以庶姓為之大祭酒漢魏皆同姓為之晉以後雜用庶姓梁加卿除大字北齊又加大字隋人除之漢高祖七年自櫟陽從長安置祭酒官以序之族劉向字子政元帝時蕭望之周堪薦向為宗室忠直明經有行為祭酒劉德字路叔修黃老術少時數言事召見甘泉武帝謂之千里駒昭帝初為祭酒丞後為祭酒妻死大將軍欲以女妻之德不敢畏盛滿也東觀劉平字公子以仁孝著聞永平三年為祭酒劉般字伯與代名忠孝在朝竭忠建初元年拜祭酒也續漢祭酒一人秩二千石掌敘録王國嫡庶之從次及諸宗室親屬遠近郡國歲上宗室名若有犯法當髡以上請國子祭酒七孔國子監祭酒一人從三品掌儒學訓導之政段總國子太學廣文四門律書算凡七學天子視學皇太子齒胄則講義釋奠執經論議奏京文武七品以上觀禮凡授經以諸經各為一經兼習孝經論語老子歲終考學官訓導多少為殿最百官志引學官皆名儒冠陽嶠為國子祭酒引尹知章范行恭趙玄默為學官皆名儒冠當得名儒楊綰是時元載秉政忌綰望高疏薄之宦者魚朝恩判國子監既誅因是建言太學當得名儒汰其選即拜綰國子祭酒外示尊重而實以散地處之載日貪冒而天下士議益歸綰請崇太學以立教本蕭昕擢國子祭酒建請崇太學以立教本帝悟其言詔群臣有籍于朝及神策六軍子弟肄業者聽補生員論罷蚶菜孔戣歷國子祭酒會嶺南節度使崔詠死謂裴度曰嘗論罷蚶菜者誰歟今安在是可往為朕求之度以戣對即拜嶺南節度使請以祭酒為太師氏歸崇敬授國子司業以祭酒司器之名非學官所宜業者請以祭酒為太師氏位三品孔子碑馮審歷國子祭酒監有孔子碑武后所立睿宗署額審請琢周著唐五經掃地祝欽明為國子祭酒帝與群臣宴欽明自言能八風舞盧藏用嘆曰是舉五經掃地矣司業八孔司業二人從四品百官志誦鹿鳴蟋蟀篇山惲纍遷國子司業景龍中帝昵宴近臣及修文學士詔遍為伎餘臣各有所陳皆鄙黷而山惲奏無所習惟知誦詩乃誦鹿鳴蟋蟀篇未畢中書令李嶠以近見諷止之帝嘉其直下詔褒咨修講舍陽嶠遷國子司業嶠資謹飭好學喜誘勸後生修講舍人以為善職生徒斤斤陽城引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明白謁城還養者二十輩有三年不歸侍者斥之簡孝秀德行升堂上沈酗不率教者皆罷官講經籍生徒斤斤皆有法度左師右師歸崇敬請以司業為左師右師從四品三世司業孔穎達為右庶子兼司業子志亦終司業志子惠元又為司業纍太子諭德三世司業時人美之本傳白秦官董仲之文辭史董仲舒景帝時為博士伏生之經學伏生濟南人也為秦博士學官當文明之代居學校之官博士九孔國子博士五人正五品上掌教三品已上及國公子孫從二品以上曾孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人暇則習隸書國語説文字林三倉爾雅每歲通兩經求仕者上於監秀才進士亦如之學生以長幼為序習正業之外教吉凶二禮公私有事則相議百官志龍朔二年改博士曰宣業同上廣文館博士四人掌領國子學生業進士者同上天寶九載置廣文館同上冗不見治韓愈既才高數黜官又下遷乃作進學解以自諭三年博士冗不見洽命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢頭童齒豁竟死何裨不知慮此而反教人為本傳上書言當世事朱朴擢國子毛詩博士上書言當世事議遷都不報本傳師屬博士師屬也韓文少府監十孔少府監一人從三品少監二人從四品下掌百工技巧之政段總中尚左尚右尚織染掌治五署及謁治鑄錢玄市等監供天子器御后妃服飾及郊廟圭玉百官儀物凡武庫袍襦皆識其輕重乃藏之冬至元日以給衛士諸州市牛皮角以供用牧畜角筋腦革悉輸焉百官志龍朔二年改曰內府監武后垂拱元年曰尚方監同上舉劾宗室皋進少府監時殿中侍御史李釣與其弟京兆法曹鍔宦既遂不肯還鄉母窮不自給皋行縣見歎曰入則孝出則弟有餘力則學若二子者可與事君哉舉劾之並錮死白大匠漢以監為大匠漢尊任隗始為置員東觀漢記建武八年始置將作大匠自任隗始晉寵王彬且聞賜爵晉書王彬為將仵大匠省費漢書英仲華為大匠度用省費躬親後漢陳伯直為將作大匠恆帝崩營陵寢皆親作工為士卒先問吏官人數魏志楊阜為大匠卿時治宮殿發女充後宮庭阜欲上疏請省宮人不見幸者乃召御府吏問後宮人數吏守官令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密乃與小吏為密乎帝聞而驚憚將作監十一孔將作監一人少監二人掌土木工匠之政段總左校右校中校甄官等署百丁等監大明興廢上陽宮中書門下六軍仗舍間廄謂之內作郊廟城門省寺臺監十六衛東宮王府諸廨謂之外作自十月距二月休治功自冬至距九月休士功凡治宮廟太常擇日以聞百官志龍朔二年改將作監曰繕工監咸亨元年曰營繕監天寶十一載改大匠曰大監少匠曰少監同上多所賚賞薑確為將作少匠護作九城洛陽宮及諸苑嵮以幹力稱多所賚賞遊幸無不從以工巧進袁怒己將作少匠楊務廉者以工進巧恕己恐其復啓遊娛後麗之漸言於中宗曰務廉位九卿忠言嘉謨不聞而專事營創以媚上不斥之亡以詔德修洛陽宮竇璡貞觀初遷將作大匠詔修洛陽宮鑿池起山務極侈浮費不勝算太宗怒詔毀之免其官軍器監十二孔軍器監一人正四品上掌繕甲弩以時輸武庫段總署二一曰弩坊二曰甲坊百官志武德初有武器監一人七年廢軍器監八年復九年又廢開元三年置十一年復廢十六年復同上邊備修舉韋湊遷太原尹兼北都軍器監邊備修舉都水監十三孔都水監使者二人正五品上掌川澤津梁渠堰陂池之攻段總河渠諸湋監署凡漁捕者禁溉田自遠始先稻後陸斗門長節其多少而均焉府縣以官督察百官志武德初廢都水監為署貞觀六年復為監改令曰使者龍朔二年改都水監曰司津監武后垂拱元年改都水監曰水衡監使者曰都尉開元二十五年不隸將作監同上二伯益唐史杜佑曰伯益為虞今虞部郎中都水使者則二伯益也白太史周官太史掌建邦之六典曰官傳天子有日官諸侯有日御日官太史也底曰日官居卿以底日禮也注位如卿而不在六卿之數故曰居卿底致也平致也掌日之官司天之吏觀乎天文以察時變率由舊典欽若昊天齊七政於銅渾視四時於玉律職非其才則必昏迷天象官宿其業所以敬授人時頌正朔授人時掌邦六典授歲四時日月星辰乾象不忒分至啓閉歲功有成書雲之史窺管之官二十四氣三百六旬協時月正日書有令孟春命太史司天歷候日月星辰宿離不忒無失經紀以初為常歷推策也候古候也宿二十八宿也離猶歷也七曜為經二十八宿為紀初謂孟春歲首也虞書曰乃命羲和欽若昊天歷象日月星辰敬授人時羲和氏掌天地日月之官辰日月所會也歷象分節也人代天工史分日月鳳凰之正傳曰少昊氏以鳥名官鳳鳥氏歷正也注鳳皇知天時故以名歷正之官頒朔周禮太史頒朔于邦國當同文之朝思稟王朔奉太史之職宜察天時行夏之時從周之典渾天儀張衡字平子為太史官遂研窮陰陽妙盡璇璣之正作渾天義以漏水轉之於室內與天相應若符合南正高陽命南正重司天式敘三辰晉書曰高陽命南正帝嚳亦式敘三辰唐虞則羲和夏則昆吾殷則巫咸周則史佚魯梓慎宋子韋齊甘德鄭裨灶魏石由其巫咸高石之詵後代所宗廢職十五白夏書曰羲和湎浮廢時亂日沈湎于酒廢天時亂甲乙俶擾天紀紀文也擾亂也遐棄厥司昏迷于天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦政典夏國典也先後謂歷不合天時有太先太後殺之無赦也星辰不觀焉知天道既不勤於視夜必有失於授時罪既彰於亂日職徒列於觀天正朔失序實亂人時白復陶陶正傳曰昔虞閼父為周陶正注陶正復陶也主君上之衣服齊三服官漢元詔罷齊三服官注春獻冠幩為首服紈素為冬服輕綃為夏服害女工之物無作哀詔齊三服官織綺繡難成害女工之物宜皆止無作輸納也法天地之數舉冬夏之宜丞相蕭何御史大夫周昌等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君及兆人能法天地順四時奉宗廟天下之大禮臣請法之中謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬各奉一時制可注云各主一時禮物朝祭事白門施行馬漢官儀光祿大夫秩用二千石光祿勳門外特施行為以旌別之傳呼甚寵漢王仲翁出蒼頭盧兒傳呼甚寵蕭望之守門顧望之謂曰不肯碌碌反抱關乎望之曰人各有志白馬生漢張湛為光祿大夫數諫上常乘白馬每有異政上輒曰白馬生且復諫者矣白承華太子門名文選曰遵彼承華又曰高步承華皆謂天子諸宮博望太子苑名東朝太子朝也文選曰東朝既建教事諭德輔翼禮曰凡三王之教世子必以禮樂師也者教之以事而諭諸德也保也者慎其身而輔翼之而歸諸道入則有保出則有師是故教諭而德成也司業司成禮曰樂正司業父師司成一有元良萬國以貞注貞正也司生也言樂正教以樂父師教以成元良之輔教諭之司並見上注襁褓之訓賈誼疏曰古之王者太子在襁褓之中置三公導之以教訓去邪人選端上太子見正言行正道三代長久以其輔翼之羽翼之賢漢惠為太子用張良策迎四皓四皓來為太子客高祖見之心解尊敬詩曰尊敬師傳又漢詔曰國之將興尊師里傅也迎於崇賢晉東宮故事皇太子詣崇賢門迎師傅講於宣武晉山濤為太傅講於宣武堂乘步輦導太子親拜晉賀循字彥先為世儒宗除太子太傅命皇太子親往拜之奉觴疏廣字仲翁為太子太傅廣兄子受為少傅宣帝置酒太子躬奉觴以為壽上甚嘉之漢擇名儒任先疏廣晉崇碩德選在山濤況當尊敬之朝宜慎父師之選當元良之日居輔翼之司屬監撫之餘敦師資之本鮑魚賈誼書曰文王使太公望傅太子發發嗜鮑魚望曰鮑不登于安有非禮之物養太子哉太子太師太傅太保十八孔太子太師太傅太保各一人從一品掌輔導皇太子每見迎拜殿門三師答拜每門必讓三師坐太子乃坐三師書前名惶恐後名惶恐再拜太子出則乘路備鹵簿以從百官志請朝願留張茂昭憲宗元和二年請朝五奏乃聽願留不許加兼太子太保召訪政理趙宗儒太和初進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言年八十官太師顏真卿改太子太師李希烈陷汝州盧杞乃建遣真卿四方所信若往諭之可不勞師而定詔可公卿皆失色李勉以為失一元老貽朝廷羞密表固留至河南河南尹鄭叔則以希烈反狀明勸不行答曰君命可避乎既見希烈時朱滔王武俊田悅李納使者皆在坐謂希烈曰聞太師名德久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顏常止否吾兄也祿山反首舉義師後雖被執詬賊不絶于口吾年且八十官太師吾守吾節死而後已豈受若等脅邪諸賊失色本傳年八十升降如儀盧鈞守太子太師帝元曰大饗含元殿鈞年八十升降如儀音吐鴻暢舉朝咨歎讓田于志寧兼太子少師俄遷太傅讓田見賞田門白少傅漢置太子少傅輜車東觀漢記桓榮為太子少傅賜以輜車榮大會諸生陳車馬印綬曰今日之榮是稽古之力小輦晉山濤為少傅拜太子求退帝賜小輦乘之以訓太子也漢用名儒任先疏受受為太子少傅晉推碩德選在羊公羊祜字叔子太子少師少傅少保十九孔少師少傅少保各一人從二品掌曉三師德行以諭太子奉太子以觀三師之道德百官志冀得效愚鄙李綱拜太子少保尚書詹事上書太子曰綱老矣幸未就木備位保傅冀得效愚鄙曰殿下飲酒過量非養生之道凡為人子務孝謹以慰上心不宜聽受邪説與朝廷生惎問太子覽書不懌以政事詣東宮李綱為少師以足疾賜步輿聽乘至閣門以政事詣東宮以老乞身張行成拜尚書左僕射太子少傅永徽四年自三月不雨至五月行成懼以老乞身制答曰古者策免乖罪已之義此在朕寡德非宰相咎乃賜宮女黃金器敕勿復辭行成固請月益仙韶院錢王起改太子少師起治生無檢所得祿賜為僮婢盜有貧不能自存帝詔月益仙韶院錢三十萬議者謂與玩臣分給可恥也起賴其入不克讓卒輔吾兒李綱帝曰知公直士幸卒輔吾兒始詣東宮房玄齡加太子少師始詣東宮皇太子欲罷之玄齡讓不敢謁乃止賓客二十孔太子賓客四人正三品掌侍從規諫贊相禮儀宴會則尚齒百官志貞觀十八以宰相兼賓客開元中定員四人同上左右太子李固言進給事中將作監王堪坐治太廟不謹改太子賓客固言上還制書曰陛下當以名臣左右太子堪以慢官斥居調護地非所宜詔改他王傅調護春闈夫望優四皓然後能調護春闈白居易趙昌制以安車召拜武攸緒中宗初降封巢國公遣杜謹盈齎書以安車召拜太子賓客苦祈還山詔可安樂公主出降又遣通事舍人李邈以璽書迎之將至通事舍人贊就位攸緒趣就常班再拜帝愕然禮不及行朝廷歡息賜豫無所受親貴來謁道寒溫外默無所言及還中書門下學士朝官五品以上並祖城東言天下大本鄭肅力學開成二年召拜吏部侍郎帝以肅嘗輔導東宮詔兼賓客為太子授經既而太子母愛弛為讒所乘廢斤有端肅因入見言天下大本不輕動意致深切帝為動容白漢竇嬰字王孫孝景帝即位為詹事孔霸字次孺宣帝時以經授太子詹事晉記卞壺字望之遷太子詹事代稱壺裁斷朝實忠於事上漢官儀詹事秦官也秩二千石晉公卿禮秩太常始立之云云齊職儀品第三銀章青綬擬尚書令位視領將軍詹事二十一孔詹事府詹事一人正三品少詹事一人正四品上掌統三事十率府之政少詹事為之二百官志論者多其正馮定改太子詹事鄭覃兼太子太師上曰欲會尚書省定據禮當集詹事府論者多其正員外詹事嚴挺之徙絳州帝顧林甫曰嚴挺之安在此其材可用林甫退召其弟損之與道舊諄諄款曲且許美官因曰天子視絳州厚要當以事自解歸得見上且大用因紿挺之使稱疾願就醫京師林甫已得奏即言挺之春秋高有疾幸間官得自養帝恨叱久之乃以為員外詹事詔歸東都挺之鬱鬱成疾太子順納劉憲遷太子詹事時玄宗在東宮雅意墳史憲啓曰殿下儲副若有絶人之才非以尋擲章句要通大意而已侍讀褚元量經明行修耆年宿望宜數召問以察其言太子順納諭德二十二孔左右諭德正四品下掌諭皇太子以道德隨事諷贊皇太子朝宮臣則列侍左階出入騎從百官志宮之有諭德猶上臺之有騎省也清班優秩所選非輕白居易元稹制東朝諭導杜牧郭錥制白掌侍從獻替職授八舍八欠八舍之職班同三舍侍中中書侍郎班次同受命天朝入侍儲幄顏含秦寵蒙恬晉尊孔演演傳授經學並學庶子宮官稱陪臣晉鄭默字思允與郭奕俱為中庶子朝廷以太子官屬宜稱陪臣默上言太子體皇極之尊不同列國官皆天命遂從之庶子二十三孔左庶子掌侍從贊相駁正啓奏右庶子掌侍從獻納啓奏于志寧加常侍太子左庶子是時建議七廟群臣請以涼武昭王為始祖志寧以涼非王業所因獨建議建之當輔以正道帝嘗謂志寧曰古者天子既生負之即置輔弼昔成王以周召為師傳日聞正道習以性成今太子幼卿當甫以正道無使邪僻啓其心勉之官賞可不次得也太子承乾數有過惡志寧欲救止之上諫苑以諷諫多任宦官太子左右多任宦官志寧諫曰奄宦者體非全氣專柔便佞託親近為戚權假出納為禍福故伊吏敗宋易牙亂齊趙高亡秦張讓傾漢近高齊任鄧長顒為侍中陳德信為開府內預宴私外于朝政齊卒顛覆今殿下左右前後皆用寺人輕忽高班凌轢貴仕品命失序經紀不立行路之人咸以為怪太子益不悅更日侍讀東宮孟神慶長安中轉太子右庶子是時突厥使者入見皇太子應朝有司移文東宮召太子神慶諫曰今太子與陛下異宮非朝朔望而別喚者請降墨敕玉契詔可尋詔與詹事更日侍請輟卿以佐太子杜正倫帝詔正倫曰吾兒幼未有就德我常物戒之今當監國不得朝夕見故輟卿於朝以佐太子謹之勉之他日又言朕十八猶在人間情偽無不察及即位處置有失必待諫乃釋然悟況太子生深宮不及知邪且人主不可自驕今若語天下敢諫者死將無復發言矣故朕孜孜延進直言卿其以是曉太子冀裨益之奉入同職事三品王方慶責拜左庶子進封公奉入同職事三品兼侍太子讀書方慶奏人臣於天子未有斥太子名者晉山濤啓事稱皇太子不名孝敬為太子更弘為崇沛王為太子更賢為文今東宮門殿名多嫌觸請一改之以協舊典制可時稱有公望錢徽任左庶子韓公武以賂結公卿遺徽錢二十萬不納或言非當路可無讓徽曰取之在義不在官時稱有公望賜鍾乳高季輔進授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報所薦豪俊士薛元超撿校太子左庶子所薦豪俊士若任希古高智周郭正一王義方孟利貞鄭祖玄鄧玄挺崔融等皆以才自名於時左右中護龍朔二年改左右庶子為左右中護通典屏居恬靜趙宗儒罷為太子右庶子屏居恬朝請而已典機劇許敬宗為高宗在東官遷太子右庶子高麗之役太子監國定州敬宗與高士廉典機劇白屬文宋書王屬文帝召見德陽舍人獻頌潘尼字正叔為太子舍人時獻釋奠頌南土之望晉書顧榮南土秀望為大子舍人起家張華起家為太子舍以授經拜景帝使朝錯詣伏生授尚書還拜太子舍人置驛迎賓鄭當時為太子舍人每五日休沐常置驛馬迎賓客舍人二十四孔太子舍人四人正六品上掌令書表啓諸臣上皇太子大事以箋小事以啓其封題皆上右春坊通事舍人以進百官志來李李義府侍晉王為太子除舍人崇賢館學士與司議郎來濟俱以文翰顯時稱來李洗馬二十五白朝推文士選在陸機機起家為太子洗馬時號玉人擢於衛玠晉衛玠為洗馬時人號為玉人孝聞晉李密字令伯為太子洗馬事祖母劉氏以孝聞先馬漢百官表曰洗馬員十六人秩如謁者如淳曰前驅也國語曰勾踐為夫差馬先或為洗白劉實以祭酒遷晉書遷為廣陵王師阮孚以尚衣領晉書阮孚為吏部東郡王師孚字遙集張昭為長吏侍宴升堂吳記龐秀為司馬位加輔國加輔國將軍被刑申公傳楚太子戊無道疾申公及為王胥靡申公腐刑也減死王式翁思為昌邑王師王無道群臣以不輔導誅式曰臣以詩三百五篇朝夕授王云云書奏減死也戒子孫王吉為昌邑中尉以數諫主得減死髡戒子孫母為王國吏及子駿遷趙內史棄官重師傅清河王慶傅衛欣私贓千萬詔案治並責慶不舉之狀慶曰欣以師傳之尊選自聖朝臣唯知聽從不意有此糾察帝嘉其對王府官二十六孔王府傅一人從三品掌輔正過失友一人從五品下掌侍遊處規諷道義記室參軍事二人掌表啓書疏百官志居府出入十年房玄齡太宗以燉煌公恂渭北枝策上謁轅門一見如舊署渭圠道行軍記室參軍公為秦王即授府記室征伐未嘗不從衆爭取怪珍元珍獨收人物致幕府與諸將密相申結人人願盡死力主嘗曰漢光武得鄧禹門人益親今我有元齡猶禹也居府出入十年軍符檄駐馬即辦文約理盡初不著稿王佐才杜如晦秦王引為府兵曹參軍時府屬多外遷王患之房元齡曰去雖多不足吝如晦王佐才也大王若終守藩無所事必欲經營四方捨如晦無共功者王驚曰非公言我幾失之賦詩尤工杜淹秦王引為天策府兵曹參軍文學館學士常侍宴賦詩尤工賜銀鍾明珠兼乘未若一言薛收授天策府記室參軍嘗上書諫王止畋獵王答曰覽所陳知戒我者卿也明珠兼乘未若一言今賜黃金四十挺小記室薛元敬武德中為祕書郎天策府參軍直記室文學館學士是時收與房杜處腹心之寄更相結附元敬謹畏未嘗申款曲如晦歎曰小記室不可得而親不可得而疏棄官郝處俊再轉滕王友恥為王府屬棄官去以重吾府韋思謙沛王府長史皇甫公義引為倉曹參軍謂曰公非池中物屈公為數旬客以重吾府賴卿師矩劉禕之拜相王府司馬帝謂曰卿家忠孝朕子賴卿師矩冀蓬在麻不扶而挺也識遠文詳韋湊入為相王府屬時姚崇兼府長史嘗曰韋子識遠文詳吾恨晚得之王得自擇劉贊秦王從榮握兵而驕多過失言事者請置師傅以輔翼之大臣畏王不敢決其事因請王自擇秦王即請贊乃拜贊祕書監為秦王傅贊泣曰禍將至矣五代史天下無雙張薦調露初登進士第考功員外郎騫味道見所對稱天下無雙授岐王府參軍吾之相如盧照鄰調鄧王府典簽王愛重謂人曰此吾之相如郎家二賢郎餘令見松柏門舉五孝趙洪智入為陳王師講孝經百福殿洪智舉五孝見講論門甚見尊憚蘇良嗣高宗時為周王府司馬王年少不法良嗣數諫王以法繩府官不職者甚見尊憚帝異之不事江滕蔣虢江安主元祥性慵遴時滕蔣虢三王皆貪暴得其府官者惡之不願行當時語曰寧向儋崖振白不事江滕蔣虢檄雞雞門左右衛二十七孔左右衛上將軍各一人從二品大將軍各一人正三品將軍各二人從三品掌宮禁宿衛凡五府及外府皆段總制焉凡五府三衛及折衝府驍騎番上者受其名簿而配以職皇帝御正殿則守諸門及內廂宿衛杖非上日亦將軍一人押仗將軍缺以中郎將代武德五年改左右翊衛曰左右衛府百官志交戟之下周廬肅然白居易李演左衛上將軍制八屯之警巡士卒之勤惰爾為其正盡得察之同上恐唐官以射為恥泉獻誠天授中以右衛大將軍兼羽林衛武后嘗出金幣命宰相南北牙群臣舉善射五輩中者以賜內史張光輔舉獻誠獻誠讓玉鈐大將軍薛吐摩支摩支固辭獻誠曰陛下擇善射者然皆非華人恐唐官以射為恥不如罷之后嘉納宿衛三十年薛平授右衛將軍宿衛三十年本傳故事諸衛大將軍與尚書更為之韋湊遷右衛大將軍玄宗謂曰故事諸衛大將軍與尚書更為之近時職轉故用卿以重此官其毋辭尋徙河南尹延入閣語字文士及擢右衛大將軍太宗延入門語或至夜分遇休沐往往馳召白金吾緹綺百官志金吾統緹綺二百爪牙之軍豫王之爪牙輦轂之衛環衛警巡西京賦曰警夜巡晝嚴衛禁兵統勾陳之衛權蘭綺之兵歎後漢光武帝歎曰仕宦當為執金吾贖罪楊淮奏梁冀叔父執金吾制以三月之俸贖罪環列之尹中尉有式道漢百官志中尉掌徼巡京師武帝更名執金吾有式道左右中注云式道持麾至宮門門乃開孔左右金吾衛掌宮中京城巡警烽堠道路水草之宜凡翊府之翊衛及外府佽飛番上者皆屬焉師田則執左右營之禁南衙宿衛官將軍以下及千牛番上者皆配以職大功役則與御史循行百官志龍朔二年改左右候衛曰左右金吾同上摧擲姦伏宗室晦遷金吾將軍摧擲姦伏無留隱吏下畏之多識舊儀宗室若水為左金吾衛大將軍兼通事舍人多識舊儀每宣勞揖贊進止闊華有可觀者三至左金吾大將軍張暐再為羽林大將軍三至左金吾大將軍晝夜循行田仁會遷右金吾將軍所得祿估有贏輟入之官人以為尚名然資強摯疾惡晝夜循行有絲毫姦必發廷中擲罰日數百京師無貴賤舉憚之劾巫徙于邊巫傳鬼道惑衆自言能活死人市里尊神仁會劾徙于邊領禁兵戍咸陽張獻甫纍遷至左金吾衛將軍李懷光叛吐蕃盜邊獻甫領禁兵戍咸陽纍年兵農悅安捕惡少優戲杜中立歷左右金吾衛大將軍京師惡少優戲道中具騶唱呵衛自謂盧言京兆驅放自如中立部從吏捕繫立箠死大言國有直臣張萬福拜右金吾將軍陽城等詣延英論門裴延齡事伏閣不去帝震怒左右懼不測萬福大言曰國有直臣天下無慮矣吾年八十與見盛事遍揖陽城等勞之天下益重其名執金入侍杜牧王釗訓伺察城中細事德宗時金吾大將軍李翰好伺察城中細事唐舊史諸衛二十九白傳曰潘崇為太師且掌環列之尹環列之尹宮衛之官列兵而環王宮李將軍李廣嘗夜獵至霸上亭長呵止之從者曰故李將軍亭長曰今將軍猶不可況故也李廣遂宿於亭下分職環衛重名冠軍上將軍處右偏將軍處左孔左右驍衛掌司左右衛凡翊府之翊衛外府豹騎番上者分配之凡八兵守諸門在皇城四面宮城內外則與左右衛分知助輔武德五年改左右驍騎尉曰左右驍騎府龍朔二年省府字左右武衛掌同左右衛凡熊渠番上者分配之左右威衛凡羽林番上者分配之凡分兵主守則知皇城東面同上龍朔二年左右威衛曰左右武威衛光宅元年左右威衛曰左右豹韜衛左右領軍衛凡射聲番上者分配之凡分兵主守則知皇城西面同上龍朔二年左右領軍衛曰左右戎衛咸亨元年改左右武衛曰領軍衛武后光宅元年左右領軍衛曰左右玉鈴衛同上左右監門衛掌諸門禁衛及門籍文武官仗及監門衛以帳報內門凡朝參奏事待詔官及繖扇儀仗出入者閲其數以物貨器用入宮者有籍有傍左監門將軍判入右監門將軍判出月一易其籍行幸則率屬於衙門監守左右千牛衛掌侍衛及供御兵仗以千牛備身左右執弓箭宿衛以主仗守戎器朝日領備身左右升殿列侍親射率屬以從並同上龍朔二年左右千牛府曰左右奉宸衛後又曰千牛同上躍馬挺槍刺於萬衆中秦叔寶每敵有驍將鋭士震耀出入以夸衆者秦王輒命叔寶往取之躍馬挺槍刺於萬衆中莫不如志及平隱巢功拜左武衛大將軍臨難不屈劉洪基京師平功第一授右驍大將軍討薛舉戰淺水原八總管軍皆沒惟洪基一軍戰力矢盡為賊拘帝以臨難不屈優護其家典衛屯兵阿史那社爾率衆內屬十年入朝授左驍衛大將軍處其部於靈州詔尚衡陽長公主為駙馬都尉典衛屯兵宿衛四十八年阿史那忠擢右驍衛大將軍宿衛四十八年無纖隙人比之金日磾脫巾固諫執矢思力授左領軍將軍帝逐鹿苑中思力諫曰陛下為四海父母乃自輕臣竊殆之後復逐鹿思力脫巾帶固諫乃止佩大橫刀王及善除右千牛衛將軍帝曰以爾忠謹故擢三品要職群臣非搜辟不得至朕所爾佩大橫刀在朕側亦知此官貴乎纍從征討柴紹高祖即位拜左翊衛大將軍纍從征討以多進討封霍國公歷二百餘戰秦叔寶拜左武衛大將軍後稍移疾嘗曰吾少長戎馬間歷二百餘戰數重創出血且數斛安得不病乎解金帶投地皇甫無逸轉右武衛將軍王世充篡棄母妻斬關自歸追騎及無逸解金帶投之地餘見忠門安坐遣人彈胡琵琶柴紹轉右驍衛大將軍吐谷渾黨項寇邊虜據高射紹軍紹安坐遣人彈胡琵琶見謀略門毒酒楊思訓帝幸并州右武衛大將軍慕容寶節夜要思訓與謀亂思訓不敢對寶節懼毒酒以進思訓死妻訴之流寶節嶺表至龍門追斬之乃詔以毒置人者重其法白羽林漢置羽林郎嚴衛禁兵羽林衛良家漢羽林材官取三輔良家之子自給鞍馬孤兒漢羽林諸孤兒並父死子代皆武帝時擊胸奴死子子孤不能自活養於羽林羽林三十孔左右羽林軍大將軍各一人正三品將軍各三人從三品掌統北衙禁兵督攝左右廂飛騎儀仗大朝會則周衛階陛巡幸則夾馳道為內伏凡飛騎番上者配其職有敕上南衙者大將軍承墨敕白多於金吾引駕仗官與監門奏覆降墨敕然後乃得人百官志國家設十二衛猶漢之有南北軍而左右羽林尤稱親重自諸衛而移鎮者謂之美遷白居易王元輔制掌勾陳而護建章備巡警而嚴羽衛同上軍有羽林用法星象統之爪士以拱宸居李彥佐制統良家之騎士訓期門之材官王士則制誅二張李多祚以勞改右羽林大將軍遂領北門衛兵張柬之將誅二張以多祚素感概可動以義乃從容謂曰將軍居北門幾何曰三十年矣將軍擊鍾鼎食貴重當世非大帝恩乎今在東官大帝子而嬖豎擅朝危迫宗社國家興廢在將軍將軍誠有意乎答曰苟緑王室惟公所使乃引天地以自誓辭氣毅然柬之遂定謀典兵於禁門之內立侍於交戟之中杜牧張直方制論秦衎衎有大臣風李景略遷羽林將軍對德宗延英殿論奏衎衎有大臣風李聽為羽林時有駿馬帝在東宮使左右諷取之聽自以身宿衛不敢獻餘節度使門孔左右神策軍掌衛兵及內外八鎮兵百官志左右龍武神武神策號六軍貞元二年神策置大將軍十四年置統軍始殿前左右神威軍號天威軍八年廢以軍隸神策有馬軍步軍將軍及指揮使等以大將軍知軍事天復三年廢神策四年復同上募材勇以代士卒柏良器入為左神策大將軍募材勇以代士卒市販者中尉竇文場惡之坐闌入柏良器坐友人闌入換右領軍衛自是軍政皆中官專之同上北落親兵夾峙宮省杜牧梁榮幹制白銀章青綬魏晉官品云冠服如將軍冠鶡漢官儀曰初置期門平帝更名虎賁中郎將冠鶡取其贄也建節漢司馬相如為中郎將建節至蜀蜀太守已下郊迎縣令負弩矢前驅持漢節蘇武字子卿以中郎將持節使胸奴仗節毛盡而不失
