body:
  text: 卷第十六米面一白獻米者操量鼓負子路食藜藿之食為親負米百里之外索長安米東方朔言臣無有用宜棄捐無索長安米聚米馬援對光武説隗囂聚米為山勢受俸求赤米第五倫為會稽受俸祿常求赤米留一月餘皆賤糶與貧人與米吳魯肅以賑貧為務周瑜資糧絶肅時有兩囷米三千斛乃指一囷與瑜賑民言出乎身加乎民口實以治為口實惟口起羞出好興戎有章出言有章大言小言事君大言入則望大利小言入則望小利穆穆皇皇言語之美君子約言小人先言不以言舉人不以人廢言君子也法語之言能無從乎請事斯語辭達而已矣在耳之言吐嘉言如木屑王澄與人書曰胡母輔之字彥國吐嘉言如木屑霏霏不絶誠為後進領袖也清言理服言談林藪樂廣常與裴頠清言欲以理服之而頠為言談之林藪鄙小子之狂簡切先生之餘論我求懿德爾有嘉謀當喻以正義豈移於浮辭雖嘉言可聽而國章難廢懷璧興詠鑠金垂範庶遵季布之諾宜附周任之言其容不改斯言有章一言興邦片言折獄戒在三緘應其千里踐言納言訥於言敏於行同心之言其臭如蘭貌言華也至言實也苦言藥也甘言疾也言忠信孟子之知言詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮慎言古者言之不出恥躬之不逮君子欲訥於言三復南容三復白圭得無訒乎子曰仁者其言也訒曰為之難言之得無訒乎駟不及舌子貢曰耳屬于垣君子無易由言過行君子恥其言而過其行天何言哉子曰豫欲無言一言君子一言以為知一言為不知言不可不慎也訥訥如悅反小兒也趙文子其言訥訥然不出諸口安定辭審言語也桃李無言下自成蹊鸚鵡能言不離飛鳥猩猩能言不離禽獸口容止不妄動易出難悔言易以溺人不可不慎也鉗口結舌大糶太倉五斗米來赴鄭老同襟期以蓬子為面唐史食貨志龐勛反自關東至海大旱冬蔬皆盡以蓬子為面以槐葉為虀玉粒定晨炊紅鮮任霞散杜甫望補稻畦為問淮南米貴賤老大乘與欲東遊解悶月分梁漢米同上飢籍家家米同上時來一顧我笑飯葵與藿李白寄崔侍御白飯食飧牽宰夫掌朝覲會同賓客以牢禮之法飯食飧牽注客始至所致也飧饔漿人掌賓客之飧饔也共飯不擇手摶飯致飽之意不廉放飯去手餘飯於器中君未覆手不敢飧覆手以循咡飧勸饋盤飧僖負羈饋重耳下致璧云云客飧主人辭以疏飧美主人之食魚飧公羊晉趙盾食魚飧觥飯不及壺飧觥小器壺大器喻不能圖遠先一飯矣夫差謂勾踐曰寡人禮先一飯矣言己齒長也脫粟飯公孫弘傳飧韓信令裨將傳飧破趙會食注飧小飯也武王侍文王一飯亦一飯再飯亦再飯飧有陪鼎免粟飯晏子食免粟飯孔飯恩劉從諫傳張榖侍人新聲當從諫潛謀窺脅新聲諫谷曰大文夫勿顧一飯恩以骨肉腥健兒食蒸麥為飯徐敬業武后遣李孝逸兵三十萬往擊之敬業問計於魏思溫思溫曰武王居上蒸麥為飯以待我師奈何欲守金陵投死地乎青精杜詩豈無青精飯使我顏色好飯數匕朱泚賊薄丹鳳門德宗夜至咸陽飯數七而去秩飯魚朝恩判國子監取子錢供秩飯玉屑飯唐段成式酉陽雜俎大和中有二人遊嵩山迷路見一人衣潔白枕一襆物方眠二人且問所自因開襆兩裹授與二人曰分食此雖不足長生可一生無疾乃起與二人指路香飯舂菰米柳宗元飯抄雲子白杜甫滑憶雕胡飯江閣粗飯依他日贈王侍御沙丘無漂母誰肯飯王孫李白送薛九敲火煮飯南嶽僧悟空嶽西原近朱陵洞其處險絶僧遊覽纍日捫蘿垂踵無幽不迹忽見前巖有道士坐繩床僧告以飢困道士欻起指石地曰此有米乃持钁斸石深數寸遂令僧探之得陳米升餘即頭著於釜承瀑敲火煮飯勸僧飧一口未熟道士笑曰君飧止此可謂薄我當畢之遂喫硬飯雜俎粥三白為粥以待衛國之餓者衛公叔文子賦民粥陸續為郡戶曹民飢太守賦粥績簡閲人衆訊以名氏飴餓者王薈為吳國內史年飢作饘粥以飴餓者饘於是粥於是以糊豫口正考父鼎名居喪食粥行麋粥月令八月養衰老豆粥光武至無蔞亭大寒馮異上豆粥上謂諸將曰昨得豆粥飢寒俱解孔屑榆陽城歲飢不過鄰里屑榆為粥白粥呂方毅葬母通人郎餘令以白粥玄酒生芻祭路隅左飧右粥吳少誠傳韓愈平淮西碑曰始時蔡人進戰退戮今眠而起左飧右粥天子食粥食貨志昭宗在鳳翔為梁兵所圍天子食粥為粥燎鬚李績性友愛其姊病嘗自為粥而燎其鬚沸粥獨孤及疏曰百揆隳剌如沸粥紛麻防風粥金鑾密記白居易在翰林賜防風粥一甌食之口香七日牛粥王施避巢賊入天台山主人賀理給以牛粥出芳賢傳楊花粥洛陽人家寒食煮楊花粥金門歲節給麋粥孟詵居尹陽山詔河南春秋給羊酒麋粥羹四白若作和羹爾為鹽梅書羹定定熟也儀禮鄉飲酒也大羹不和無鹽芼羹內則云芼羹菽麥唯所欲羹食自諸侯至庶人無等庶差異也羹齊視夏時宜熱大羹不致傳和如羹焉水火醯醢鹽梅以烹魚肉未嘗君之羹一杯亡國戰國策中山君饗大夫司馬子期在焉羊羹不偏子期怒走投楚説伐中山君君亡曰吾以一杯羹致亡國也爛手劉寬將朝婢翻羹污其衣遽收之寬曰徐徐羹爛汝手陶石公起不受遺贈啖無葺羹無鹽不糝孔子陳蔡間七日不食藜藿不糝蓴羹陸機詣王濟濟指羊酪謂機曰吳中何以敵此機曰千里蓴羹未下鹽豉庾袞藜羹不糝門人進飯曰已食訖頡羹侯高祖兄子識母羹後漢陸續字智伯初繫獄見餉羹知母吏怒以為卒通意績曰識母羹蔥必寸斷肉方正以此知也遺漢高祖謂項羽曰若烹太公遺我一杯羹樂羊食盡樂羊圍中山中山人烹其子遺之羹樂羊食盡黿羹傳楚人獻黿於靈公子家與子公將朝靈公子公之食指動謂子家曰他日我如此必嘗異味及入見靈公進黿子公笑曰果然靈公問笑故且告及食大夫黿召子公而弗與子公怒染指於鼎嘗之而出孔調羹李白召見金鑾殿論當世事帝賜食親為調羹門皆若沸羹王伾當其黨盛門皆若沸羹不二羹胾柳玭常述家計曰余舊府高公先君兄弟三人俱居清列非速客不二羹胾夕食齕蔔萄而已皆保重名於世懲沸傅奕曰懲沸羹者吹冷虀為羹魏元忠復舊官因侍宴后曰卿纍負謗鑠何邪對曰臣猶鹿也羅織之吏如獵者苟須臣肉為之羹爾藜羹盧照鄰字升之客東龍門山布衣藜羹駝蹄羹杜甫詩錦帶香聞錦帶羹香芹香芹碧澗羹甘露羹唐明皇雜録李林甫子壻鄭平為戶部外郎一日林甫就院省女因邀之見其鬢髮班白謂平曰上明日當賜甘露羹鄭郎其食此羹縱華皓亦必鬢黑明日果有中使至林甫第賜食因以羹與平食一夕鬢黑月兒羹雲仙散録字錦曰柳公權以隔風紗作龍城記及八朝名品號錦樣書以進上方御剪刀面月兒羹即命分賜公權術羹洛陽人家端午煮術羹金門歲節池羹群鮮沸池羹韓愈聯句捩手覆羹韓愈送窮文羹煮秋蓴滑杜甫秋日蓴龜蓴龜羹之絶美江東謂之一蓴龜酉陽雜俎白有肉如坻如陵傳濡肉齒決乾肉不齒決鳥獸之肉不登於俎則公不射填堇於肉堇烏頭毒藥也拔劍割肉東方朔伏日藿肉董賢客漿酒藿肉六十非肉不飽宿肉鼠盜張湯為兒守舍鼠盜肉烏攫黃霸使吏食於道旁烏攫其肉吏還霸迎勞曰乃為烏攫肉吏大驚以為霸知其起居不敢有隱也一肉公孫弘食不過一肉束蘊蒯通曰里婦衣亡肉姑以為盜逐之諸母束蘊請火於亡肉家曰犬暮得肉遽呼婦還肉林漢武兼肉漢劉虞為上公食無兼肉舉太山以為肉曹植與吳質書願舉太山以為肉持蒲作肉秦趙高為丞相指鹿為馬以蒲作肉對屠門而嚼桓談新論人聞長安樂出門西向笑如聞肉味美則對屠門而嚼分羊甄宇拜博士每獵詔賜博士羊羊有大小肥瘦博士祭酒議殺羊稱分其肉又欲投鉤宇恥之云傷儒因取瘦者不復爭肉敗不食語孔可割以啖秦叔寶波尉遲敬德功多帝勞曰使朕肉可食可割以啖爾況子女玉帛乎不喜食肉竇建德性約素不喜食肉飯脫粟加蔬具自幼不食楊收字藏之以母奉浮圖法自幼不食肉母約曰爾得進士第乃可食一飯十斤張興一飯肉十斤割肉宇文士及字仁人嘗割肉以餅拭手帝屢目陽若不省徐啖之其機悟率類此饔敗肉腐三翃字宏肱拜京兆尹會涇源兵討李希烈次産水京兆主供擬饔敗肉腐衆怒曰食是而討賊乎遂叛肉食君之祿五代劉贊父玭為縣令贊始就冬衣以青布衫襦每食則玭自肉食而別以蔬食食贊於床下謂之曰肉食君之祿也爾欲之則勤學問以千祿吾肉非爾之食也由是贊益力學帝詔食肉李泌字長源初泌不食肉帝乃強詔食肉機上肉桓彥范誅二張也彥範不欲廣殺因曰三思機上肉爾品肉頡字子疊羅支有至性既舍京師諸婦得供品羅支預焉其母最後至不得給羅支不敢嘗品肉帝聞嘆曰天稟仁孝詎限華夷哉遂給母肉肉非黃羊唐史張説慰安羅拔野部等直詣其部宿帳下副使李憲以虜難信不宜涉不測説報曰吾肉非黃羊不畏其食羊脾歸登性甚慳嗇常爛一羊脾旋割旋噉封其殘者一日登妻誤於封處割食登大怒其內由是沒身不食肉北夢鎖言肥肉大酒徒相邀杜甫詩食必粱肉唐舊史隴西王博義有妓妾數百人皆衣羅綺食必粱肉食兼數人江左王元祥食兼數人白嘬炙禮無嘬炙謂一舉盡臠近貪牛心王羲之年十二周顗異之曰重牛心炙座客來未噉先割啖羲之乃知名行爵食炙傳欒寧處外禮鱠炙處外未熟欒寧將欲飲酒炙未熟欲炙之色顧榮與同僚宴飲見執炙者狀貌不不凡有欲炙之色榮割炙啖之曰豈有終日執之不知其味及趙王倫敗榮被執其人為督率救榮得免馬行炙帝王記曰紂宮九市車行酒馬行炙魚炙國語屈建曰祭典庶人有魚炙之薦爭食而死風土記吳王闔閭女嬌恣嘗與王爭食魚炙怨恚而死孔臠盤炙酒韓愈祭張署文避風大湖七日鹿角鉤登大鮎怒頰豕豹臠盤炙酒群奴餘啄牛炙杜甫字子美客耒陽遊嶽祠大水遽至涉旬不得食縣令其舟迎之令嘗饋牛炙白酒冷炙杜甫詩殘杯與冷炙燔炮胾炙柳宗元嶺南節度饗軍堂記燔炮胾炙之物均飫于卒士驢騣駝峰炙唐酉陽雜俎將軍曲良翰能為驢騣駝峰炙絲竹羅酒炙縣齋詩韓愈熏林塘文粹張説宴薛王山池序炮炙熏林塘啖朱亥李白峽客行將炙啖朱亥蛤蜊炙杜突承璀嗜蛤蜊炙傳芳略記杏炙蛙炙酉陽雜俎飲食有杏炙蛙炙白膾鯉詩云炮鱉膾鯉膾不厭細紅鮮應刃落俎西征賦華魴躍鱗素鱮楊鬐饔人縷切鸞刀若飛應刃落俎霍霍霏霏紅鮮粉其初載賓客聳而遲遲素膚散雪七命曰命支離飛霜鍔紅肌綺散素膚散落婁子之毫不能廁其細秋蟬之翼不足擬其薄鮮鯉之膾七發疊縠七發曰纍如疊縠離若散雪輕隨風飛刃不轉切食魚豈其食魚必河之魴芥醬語魚膾非芥醬不食用蔥禮曰凡鱠春用蔥秋用薤冬宜鮮鮮生魚聶而切之禮牛與羊魚之腥聶而切之為膾處外膾炙處外薑詩母好鱠好江水庭中出水味如江水每日出雙鯉魚以供母膾其孝感如此釣庭中介象字元則與吳王論膾何者最美象曰海中鯔魚為上美也令於殿前庭中作方坎汲水滿之象垂綸於坎中食頃得鯔魚作鱠釣盤中左慈字元放以銅盤盛水釣水中引出魚皆長三尺以作鱠王餘魚吳王行江中食鱠有餘棄於水化為魚今有王餘魚是也亦名膾骨也孔操刀鱠鯉李綱字文紀有進魚者太子使鱠之唐儉趙元楷自言其能太子曰操刀鱠鯉和鼎味公等善之若弼諧審諭固屬綱矣鱠寸魚號鵝闕南詔鱠寸魚以胡瓜椒藙和之號鵝闕銀絲鱠杜甫詩鮮銀絲鱠意在斬巨鰲何論鱠長鯨李白鱠炙之美柳宗元晉問云三河之人則已埴溢饜飫腥膏舄鹵聞鱠炙之美則掩鼻蹙頞賤甚糞土而莫顧者也庖霜韓愈詩庖霜膾玄鯽膾魴唐文粹蘇源明小洞庭宴籍序燔兔膾魴同心鱠雲仙散録金門歲節曰洛陽人家七夕裝同心鱠縠薄絲縷唐酉陽雜俎進士段碩常識南孝廉者善斫膾縠薄絲縷輕可吹起操刀響捷若合節奏因會客衒技先起魚架之忽暴風雨雷震一聲膾悉化為胡蝶飛去南驚懼遂折刀誓不復作鱠法鯉一尺鯽八寸去排泥之羽鯽圓天肉腮後耆門用復腴拭刀亦用魚腦皆能令鱠縷不著刀同上金虀玉鱠吳郡獻松江鱸煬帝曰所謂金虀玉鱠東南佳味也隋唐嘉話鱠飛金盤白雪高饔子左右揮霜刀杜甫觀魚歌蓬池鱠李德裕述夢詩荷淨蓬池鱠凡學士初上賜食悉是蓬池魚鱠魴魚肥美知第一魴魚肥美知第一既飽歡娛亦蕭瑟杜詩膾莫先於鯽魚楊畢膳夫録膾莫先於鯽魚鯾魴鯛鱸次之鱭鱗黃竹五種為下其他皆強為落砧何曾白紙濕放筋未覺金盤空杜甫詩錦縷白居易詩膾長抽錦縷紅肥花落白雪霏李白酬雙魚見贈雙鰓呀呷髮鬣張跋剌銀盤欲飛去呼兒拂機霜刃揮紅肥花落白雪霏鯽魚并鱠手刀子酉陽雜俎安祿山所賜有鯽魚並鱠手刀子白乾肉脯臘周禮臘人掌乾肉凡脯臘膴胖之事注乾肉大臘也小臘小者也脯斤也捶而施薑桂曰腶修膴胖皆謂夾脊肉也腒䐹腒乾雉䐹乾魚不食子曰沽酒市脯不食束修孔子自行束修已上吾未嘗無誨焉左朐右䏞禮既以脯修置左朐右䏞注取便也屈中曰朐音衢乾肉不齒決尹祭祭宗廟之禮脯曰尹祭腶修禮鬼侯紂脯鬼侯以享諸侯捶而食之乾肉則捶而食之噬臘肉遇毒噬乾肉易束國語楚成王聞子文朝不及夕每朝設脯一束濁氏貨殖志濁氏以胃脯而連騎注以湯燖羊胃以椒薑也野蒲變而為脯潘嶽西征賦失脯桑虞宿寄客失脯虞解衣償之也婦人之贄脯修棗栗禮衽受榖梁魯昭公奔齊齊使高子以脯遺公公衽受藥脯以毒驪姬削脯犒師劉表出軍左慈曰有薄禮即以削脯以刀犒師投地百人接脯脯亦不減麟肉脯神仙傳王遠至蔡經家設麟肉脯孔削脯傷指代宗睿真皇后沈氏河南為史思明所沒遂失后所在德宗即位令州縣物色咨訪高力士女頗能言禁中事與女官李真一嘗從后遊年狀差似后嘗削脯哺帝傷左指高以剖瓜傷指以供滋膳元行沖狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯臘膎胰以供滋膳贈王績性嗜酒杜之松歲時贈脯紅虯脯唐杜陽編同昌公主上贈御饌有紅虯脯非虯也但貯於盤中則虯健如虯絲高一尺迎涼脯洛陽人家重陽則製迎涼脯脯芼羹董謹續豫章記陳蕃待客拌飯以鹿脯芼羹以牛脯未嘗別為異饌薦脯酒韓文衡嶽廟詩升階傴僂薦脯酒欲以菲薄明其衷佳節修脯禮元稹詩白遺母陶侃遺母一坩鮓母封鮓還責侃云云又孟宗字武恭為監魚池司馬自結網取魚作鮓寄母母曰汝為魚官而獲鮓奈何不避嫌也遂還之龍鮓世説有人遺張華鮓華曰此龍肉也遂以苦酒沃鮓鮓中有五色光啓齊王融謝司馬賜魚鮓啓曰東越水差實罄乘時之美南荊任上方揖鮓魚之最十斛鮓陶侃故事曰蘇峻上成帝十斛鮓骨青肉紫漢昭帝時釣得蛟長三丈帝曰此魚鱔之類命太官為鮓骨青肉紫食之其美帝更求之不獲孔後池魚韓全誨傳昭宗至鳳翔帝輟所御膳賜全誨等茂貞食鮓美帝曰此後池魚茂貞曰臣養魚以侯天子聞者皆駭鱘鮓地理志潤州士貢鱘鮓蘆蔔鮓蠻甌志白藥天方齋禹錫饋蘆蔔鮓含風鮓叩頭録房壽六月調羊酪造含風鮓野豬鮓唐酉陽雜俎安祿山恩寵莫比其所賜品目有野豬鮓苞蘆杜甫詩香飯兼苞蘆鯉鮒鮓法次第以竹枝齎頭置日中書腹為記出酉陽嗜鮓一啖或至十臠江南野史陳陶所居不與俗接唯嗜鮓一啖或至十臠白女醢二十人周禮醢人職女醢謂女奴曉醢者百二十甕膳夫掌王饋食醬百有二十甕覆醢禮孔子器子路於中庭既器問使者曰醢之矣遂命覆醢四豆之實醢人掌之執醬而饋食三老五更於太學天子執醬而饋不得不食語不得其醬不食蒟醬武帝使唐蒙使南越南越食蒟醬如桑椹取實為醬彭越往年醢彭越千乘之家史記通邑大都醢醬千瓿比千乘之家賣醬張氏賣醬而踰侈覆瓿劉歆謂楊雄曰今學有祿利尚不能易又如太玄何吾恐後人覆醬瓿瓿音部小罌也魚醬晉武帝與山濤書兼致魚醬一斗榆梜醬白處通曰榆梜醬曰𨣱𨣱音末成於鹽風俗通曰醬成於鹽而鹹於鹽南宮長萬宋人醢之啓梁劉孝儀謝蝦醬啓曰龍醬傳甘退誠可陋虹醢稱遺追覺失言芍藥之醬枚乘七發曰芍藥之醬神藥漢武內傳曰西王母謂帝曰神藥上有連珠云醬玉津金醬中有元靈之醬十二香神仙食經十二香醬以沉香等油煎成服之雷鳴風俗通曰雷鳴不得作醬食之令人腹中雷鳴百甕晉襄公葬其夫人醯醢百甕孔掌醢署百官志掌醢署令一人丞二人掌供醢醯之物一曰鹿醢二曰兔醢三曰羊醢四曰魚醢坐須葅醢李嗣業字嗣業高仙芝大食所敗明日復戰嗣業曰事去矣不可坐須葅醢即馳守白石太官醢朱泚劉文喜劫衆以亂詔泚懷光攻之帝為減太官脯醢給軍鹿尾醬祿山進鹿尾醬出安祿山事迹葫蘆醬唐世風俗貴重葫蘆醬出晉公遺語葅醢姦臣況葅醢杜甫北征詩凡祭神祇享宗廟用葅醢以實豆唐掌醢六典白女醯周禮醯人女醯掌供五齊七俎凡醯醬之物玉舉則供虀葅醢物六十甕供后及世子之醬醯調以醯醢醯雞莊子苦酸古詩云食梅常苦酸醯醢醢梅以烹魚肉處肉醯醢處肉禮和羹之用乞醯語孰謂微生高直或乞醢焉乞諸其鄰而與之苦酒魏名臣傳曰中書監劉放曰官販苦酒與百姓爭錐刀之末請停苦酒醋也風林鳴酸漢武內傳西王母謂帝曰仙藥有風林鳴酸孔誤進任迪簡李景略表佐其軍嘗宴客而行酒者誤進醢景略用法嚴迪簡不忍其死飲為釂徐以它辭請易之歸喀血不以聞軍中悅長者注醯于鼻來俊臣鞠囚不問輕重皆注醢于鼻桃花酸晉公遺語唐世風俗貴重桃花酸鹽醯貪食以忘軀斟不調鹽醢韓愈詩以濟百味鹽醯以濟味李大博志醯敖倉之粟以為酸柳宗元與李睦州書資于適口文粹江嶺之南凡是資于適口者若醯非不酸也止於酸而已華之人所以充飢而遽輟者知其鹹酸之外醇美者有所乏耳與李生論詩書司空圖苦酸不為文粹真偽難鬻梅醯之質類而苦酸不為也上李諫議書沈亞之趨君之指文粹醯醢之具必越海逾陸而趨君之指矣同上貯數十甕國史補舊説聖善寺閣常貯數十甕恐為蛟龍所伏致雷燕賓客會百官用醯醬以和羹掌醢令唐六典白鹽曰鹹鹺祭祀之禮鹽曰鹹鹺作鹹書潤下作鹹蜀井蜀都賦云家有鹽泉之井鹽梅若作和羹爾為鹽梅和羹見上注形鹽形虎鹽賓客之供鹽人掌鹽以供百事之鹽苦鹽不練治之鹽祭祀用之散鹽練治之鹽煮海為鹽飴鹽王者膳羞供飴鹽鹽之甜者今戎鹽有之鬻鹽凡齋事供鬻鹽鬻鹽練治者近鹽郇瑕氏之地沃饒而近鹽傳減鹽價漢書宣詔曰鹽人之食而價貴衆庶重困其減天下之鹽價食者之將夫鹽食者之將通行有無魚鹽棗栗上谷有魚鹽棗栗之利梁罝鹽後漢天笁國有有梁罝鹽一名身毒國官鬻張休上言鹽食之急雖貴不可不須官可自鬻載鹽第五倫客河東變姓名曰伯齊載鹽往來煮鹽魏志鄧艾言司馬文王曰今因平蜀之勢以乘吳席捲之時然大舉之後將士疲勞且煮鹽與比為軍農之要渠展之鹽管子曰齊有渠展之鹽燕有遼東之煮虞阪之載騏驥駕鹽車上虞阪遇伯樂而長鳴鹽味生晉符朗元達識味會稽王道子設食食之極江左清饌食訖問曰關內食孰若此朗曰皆好唯鹽味少生即問宰夫果如其言修池徐邈景山為金城守修武威酒泉鹽池以收虜榖軍用豐盈青紫西域記曰西海南有青鹽紫鹽池鹽方寸半食味甚美孔具舟以載杜中立以蔭為義武節度使舊徭東三千乘歲挽鹽海瀕民苦之中立置飛雪將數百人具舟以載自是民不勞軍食足矣鹽屯薑師度為河中尹安邑鹽屯涸廢師度大發卒洫引其流置鹽屯公私收利不資地産瑞鹽韓滉判度支方是時潦敗河中鹽滉奏地産瑞鹽帝遣諫議大夫蔣鎮廉狀鎮畏滉還乃賀帝且請置祠號寶應靈慶池條上新法盧弘正初兩池鹽法弊得費不相償弘正使判官司空輿檢鉤釐正條上新法即表輿兩池使自是課入歲倍用度賴之計口授鹽盧商為蘇州剌史吏以鹽法求贏資民愈困商令計口授鹽無常額人便之榷鹽司空輿當大中時盧弘正管鹽鐵表為安邑兩池榷鹽使先是法疏闊吏輕觸禁輿為立約數十條莫不以為宜烏鹽西域骨咄有四大鹽山山出烏鹽凝樹黑水靺鞨有鹽泉氣蒸薄鹽凝樹顛鹽井南詔初安寧城有玉鹽井人得煮鬻自給玄宗詔特進何復光以兵定南詔境取安寧城及井官自鬻鹽韋處厚再遷中書舍人張平叔以言利得幸以帝建言官自鬻鹽籠天下之財宰相不能詰下群臣議處厚發十難誚其迂謬平叔愧縮遂寢三萬斛劉晏京師鹽暴貴詔取三萬斛以贍關中自揚州四旬至都人以為神正鹽官法劉晏正鹽官法以裨用度致鹽靈座李晟既薨城鹽州復故池以新鹽賜宰相帝思晟乃致鹽靈座佐軍食王重榮中人田令孜怒重榮據鹽池之饒于時巨寇甫定國用大乏諸軍無所仰而令孜為神策軍使建言請二池領屬鹽鐵佐軍食重榮不許奏言故事歲輪鹽三千乘于有司則斥所餘以贍軍天子遣使者諭旨不聽楊行密事見茶門擅取成汭雲安榷鹽本録鹽鐵汭善取之故能畜兵五萬蛤垛鹽池李師古棣州有蛤垛鹽池歲産鹽數十萬斛李長卿以州入朱滔獨蛤垛為李納所據以專利後德棣入武王俊納乃築壘德州南跨河以守蛤垛謂之三汊煮海取鹽鄭畋請以嶺南鹽鐵委廣州節度使韋荷歲煮海取鹽四十萬緡市虔吉米以贍安南穴湧鹽訶陵最富有穴自湧鹽歲給萬三千石南平世家高保融明宗時歲給以鹽萬三千石後不復給及世宗平淮故命泰州給之紅鹽五代于闐晉天福二年遣使來貢紅鹽化若神造非人力之功柳宗元晉問曰猗氏之鹽晉寶之大也化若神造非人力之功神液陰漉甘鹵密起孕靈富媼不愛其美無聲無形結迅詭回眸一瞬積雪百里晶晶幕幕奮僨離析煆圭鎚璧眩轉的樂乍似殞星及地明滅相射冰裂雹碎巃嵷增益大者印纍小者珠剖涌者如坻坳者如缶日晶熠熠螢駭電走亙步盈車方尺數斗鹽如水精唐酉陽雜俎白鹽崖有鹽如水精名為君王鹽鹽田鄯善之東龍城之西南地廣十里皆為鹽田行人所經牛馬皆布氈臥焉出酉陽雜俎吳鹽如花玉盤楊梅為君設吳鹽如花皎白雪李白梁園吟傘子鹽朐腮縣鹽井有鹽方寸中央隆起如張傘名曰傘子鹽酉陽雜俎陸鹽昆吾陸鹽周十餘里無水自生上白以為醴酪禮太玄之酪漢武內傳西王母曰仙藥次有大玄之酪食酪得疾晉陸玩嘗詣王導食酪因得疾與導書曰雖是吳人幾為傖鬼指酪陸機詣王武子武指酪以示機曰東吳何以敵此機曰千里蓴羹未下鹽豉賜晉起居注詔曰尚書令荀勗既久嬴毀可賜乳酪太官隨日給之酪漿文選李陵書曰羶肉酪漿孔珍味穆贊兄弟皆和粹世以珍味目之贊少裕然有格為酪湩酪回鶻駮馬國資湩酪以食婦人食酪南蠻有望蠻婦人食乳酪粟沃以酪五代仲雲國其食粟沃以酪分餉讓皇帝憲帝待益厚凡四方所獻酒酪皆分餉之瓊膏乳唐杜陽雜編懿宗迎佛骨入內道場薦瓊膏乳訶陵國所獻也銀餅餤宣宗賜韋澳孫宏銀飢餤食之甚美皆乳酪膏腴之所為唐托言馬酪酉陽雜俎安祿山其所賜有馬酪授之壺漿子胥始東奔勾吳月涉星遁或七日不火傷弓于飛逼迫於昭關匍匐於瀨渚捨車而徒告窮此汝目色以臆授之壺漿全入自沉形與口滅李白溧陽瀨水貞女碑蜜十四白棗栗飴蜜以甘之子事父母蜜餌騷云粔籹蜜餌有粻餭作甘其味甘鼠矢吳志孫亮方食生梅使黃門以銀碗並蓋就中藏吏取錫一云取蜜漬梅黃門先恨藏吏以鼠矢投餳碗中白亮吏不甘亮令破鼠矢中燥黃門乃伏罪上藥漢武內傳上藥有中華紫蜜云山米蜜買蜜東觀漢記朱祐傳曰光武微時嘗與祐共買蜜合藥後即位乃賜祐白蜜一石問曰何如長安時買蜜蜜房蜀都賦蜜房郁育被其草孔刻廬西域自拂菻西南度磧二千里有國曰磨鄰曰老勃薩刻石蜜為廬如舉狀石蜜天笁濱海出石蜜兒啖西域康者生兒以石蜜啖之置膠於掌欲長而甘言持寶若黏云粳沃以蜜五代仲雲國其食粳沃以蜜液蜜為人崔彥曾署張佛筵液蜜為人和炭開元遺事楊國忠家以炭屑和蜜塑成雙鳳鸞蜂蜜唐杜陽編貞元八年吳明國貢鸞蜂蜜其蜂之聲有如鸞鳳而身被五色大者可重十餘斤為窠於深巖峻嶺間大者占地一二畝國人採其蜜不過二合如過度則有風雷之異若誤螫人則生瘡以石上菖蒲根傅之即愈其蜜色碧常貯之於白玉碗表裏徹如碧琉璃久食之令人長壽顏如童子髮白者應時而黑紅蜜同昌公主疾既甚醫者欲難其藥餌奏云得紅蜜食之可愈上令內庫得紅密數石本兜離國所貴也茶花蜜雲仙散録糖為莫逆傳芳略記陳昉得蜀糖輒以蜜澆之曰與蜜本莫逆交竹蜜蜀中有竹蜜蜂如於野竹上結窠窠大如雞子有蒂長尺許窠與蜜並紺色可愛甘倍於常蜜餅十五白漢書百官表少府屬有湯官主餅餌買餅漢宣帝微時每買餅所從賣者輒大售一笥餅後漢樊曄與世祖少遊舊徵遷河東都尉引見雲臺世祖微時嘗以事拘新野曄為市吏饋餅一笥帝不忘乃賜御服食及乘輿衣物因戲之曰一笥餅得都尉何如曄頓首辭謝賣餅後漢趙岐賣餅印綬易餅魏略太祖啁丁斐曰印綬何在曰易餅耳畫餅盧育言有名士如畫地為餅不可啖食弱如春綿白若秋練束晢餅賦吳均餅説細如華山玉屑白似梁甫銀泥既聞香而口悶亦見色而心迷孔驛吏供餅高元裕兄少逸出為陝虢觀察使中人責懷石驛吏供餅惡鞭之少逸封餅以聞宣帝怒召使者責曰山谷間是餅豈易具邪謫隸恭陵中人皆斂手嗜乾餅西域拂菻俗喜嗜乾餅拭手宇文士及嘗割肉以餅拭手取浮土揉米屑王世充秦王傳城塹而守之世充糧具盡人相食至以水泊泥去礫取浮土揉米屑為餅積餅餌為犀象鍾傳出軍必禱佛祠積餅餌為犀象高數尋棄餅垣外楊瑤光歷沔綏二州剌史姆饋孺子以餅妻偽受而棄之垣外人咨其廉籠餅侯思止懶不治業詭狠無良以告變拜遊擊將軍遷左臺御史嘗命作籠餅謂膳者曰與我縮蔥作之故時人號為縮蔥侍御賣餅黃巢復入京師於時畿民柵山谷自保不得耕士人或賣餅自業袖餅常朝記曰于琮班中有時袖餅而食或遺同列二儀餅豐年録開元中長安物價大減兩市賣二儀餅一錢數對羊肝餅洛陽人家重陽作羊肝餅金門歲節餅師寧王宅畔有賣餅者妻甚美王厚遺其夫而取之經歲問曰頗憶餅師否召之使見淚下如雨本事集一餅熟成一韻詩段維智嗜煎餅一餅熟成一韻詩托言鳴牙餅退耕傳許康年謁劉遜贈鳴牙餅千枚曰雖微物也助廚中兩日之費不暇唱渭城劉伯芻巷口有鬻餅者每當爐謳歌一旦劉憐其貧貸以萬錢自是不聞歌聲心計轉粗不暇唱渭城矣以餅拭刀肅宗為太子上使割羊臑以餅拭刀徐噉之上喜曰保福祿當如是愛惜明皇十七事去餅緣李英公為宰相有鄉人過宅為設食客去餅緣公責之客大慚南部新書銀餅啖宣宗賜韋澳孫宏銀餅啖之甚美皆乳酪膏腴之所為出唐托言以珠易餅原化記賀知章嘗謁賣藥王老問黃白術持一大珠遺之老人得珠即令易餅與賀食賀心念寶珠何以市餅口不敢言老叟乃曰慳吝未除術何由成袖中盛胡餅玄宗實録云楊國中自入市衣袖中盛胡餅五色餅刻木蓮花藉禽獸形按成之纍積五色酉陽雜俎白嗜芰芰菱也國語屈到嗜芰有疾召宗老而告之曰祭我必以芰及祥祭宗老將薦芰屈建命去曰祭國君牛奠享大夫羊士豚犬之奠庶人有魚炙之奠籩豆簠簋上下供之不羞珍異不陳庶侈夫子以私欲干國之典左史倚相曰君子以違而得道故進退周旋惟道之從注屈建屈到之子曾晢嗜羊棗孟子曰曾子不食羊棗公儀休嗜魚人獻不受曰吾祿自可致魚受人魚罪奪祿人寧肯饋我太子嗜鮑魚不與賈誼書曰太公傳太子發發嗜鮑魚公不與曰鮑不登俎不可以非禮食太子薑詩母好江魚見膾門注鄭伯有嗜酒傳伯有良宵也從厥攸好從其所好飲食男女人之大欲存焉是人之所欲好牛心王右軍嗜菖蒲周文好槌鑿聲魏明齊好竽聲孔稻梁膾炙韓愈贈崔群書疑者曰君子當有所好惡不可不明如清河者人無賢愚無不説其善服其為人以是而疑之耳僕應之曰譬之於食物至於遐方異味則有嗜者有不嗜者至於稻也梁也膾也炙也豈聞有不嗜者哉疑者乃解饙飯乾脯崔衛公好食新捻頭杜邠公悰每早食饙飯乾脯出托言蜇吻裂鼻縮舌澀齒柳宗元讀毛穎傳大羹元酒體節之薦味之至者而又設以奇異小蟲水草查梨桔柚苦鹹酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者文王之菖蒲葅屈到之芰曾晢之羊棗柳宗元文文王之菖蒲葅屈到之芰曾晢之羊棗然後盡天下之奇味以足於口白維筐及筥于以盛之維筐及筥疏以達春食麥與羊其器疏以達高以粗夏食菽與彘其器高以粗廉以深秋食稻與魚其器廉以深閎以掩冬食黍與鴈其器閎以掩圜以閎中央土食黍與牛其器圜以閎器之溉者禮御食於君君賜餘器之溉者不寫其餘皆寫注云重污君器溉謂陶梓之器不溉謂雚茅之器操以受命記凡苞苴簞笥門人者操以受命如使之容注苞苴裹魚肉或以葦或以茅或以簞笥熟肉簞食瓢飲顏回奪釜史記曰蔡澤入於趙見逐入韓之魏遇奪釜鬲於塗不置箸上召亞夫食獨置大胾無切肉又不置箸注胾大臠也按上三杯朱博儉借箸張良借前箸以籌之無下箸處何曾日食萬錢既作象箸必作玉杯琉璃晉武幸王氏家食器盡琉璃玉卮無當當底也孔折箸于琮尚永福公主主未降食帝前以事折七箸帝知不可妻士大夫更詔尚廣德公主不過一器柳公綽歲歉饉其家雖給而每飯不過一器歲豐乃復周器止烏漆鄧景山清約子弟饌不過草具用器止烏漆散風奩郭代公愛姬薛氏貯食物以散風奩出品物類聚記玉精碗馬侍中嘗寶一玉精碗夏蠅不近盛水經月不耗或目痛含之立愈泛水磁元載凡飲食冷物用硫黃碗熱物用泛水磁器有三千事出樞要録賽饌木盤簇韓愈城南聯句月光明素槃跪進雕葫飯月光明素槃李白宿五松山下黃金盤李白贈從弟象床綺食黃金盤白甌青竹箸白公過李生詩白甌青竹箸儉潔無膻腥肴核分飣餖韓愈南山詩或如臨食按肴核分飣餖金平脫犀頭匙箸唐酉陽雜俎賜安祿山品目有金平脫犀頭匙箸犀箸杜詩麗人行犀箸厭沃久未下白賜之玉食書惟辟玉食謂美食與之禮食傳晉侯以魏絳為能以刑佐民與之禮食使佐新軍注禮食以表其功公賜之食傳穎考叔有獻于公公賜之食食舍肉飫賜傳將賞為之加膳加膳則飫賜注飫賜以酒食賜下無不飫足食存人欲賜表主恩逮下之澤頒賜周禮凡肉修之頒賜好賜又曰凡王之好賜肉修則饔人供之注好賜王所善而賜之正席先嘗君賜食必正席先嘗之敬君之惠也賜腥君賜腥必熟而薦之注云薦其先祖也侍食於君君祭先飯懷餘肉史記詔賜東方朔食於前飯已盡懷餘肉去衣盡污賜食於家如在上前漢萬石君記曰若賜之食而君客之則命之祭然後祭先飯遍嘗羞飯而俟命之品嘗之然後唯所欲君未覆手不敢飧食勸食也飧者三臣勸如是食多魏都守曲阜好酒食飲兼人每賜食於前大飲長啜左右相屬數人益之乃供太祖壯之賜果禮曰賜果於君前其有核者懷其核後漢桓榮春卿詔賜奇果受者皆懷之榮獨舉手捧以拜帝笑曰真儒生也孔分餉讓皇帝憲帝親待愈益厚尚食總監及四方所獻異饌皆分餉之給政事食蘇頲加知制誥給政事食給食自頲始甘美必賜李林甫凡御府貢遠方珍鮮使者傳賜相望帝食有所甘美必賜之賜食帝前王方翼引見奉天官賜食帝前面豆韓偓李茂貞疑帝間出依全忠以兵衛行在帝行武德殿前因至尚食局會學士獨在宮人招偓偓至再拜器曰崔胤甚健全忠軍必濟帝喜偓曰願陛下還宮無為人知帝賜以面豆而去熱洛河哥舒翰素與安祿山安思順不平帝每欲和解之會三人俱來朝帝使驃騎大將軍高力士宴城東翰等皆集詔尚食生擊鹿取血瀹腸為熱洛河以賜之防風粥見粥門諸王從事翰林學士每遇賜食有物若畢羅形絶大滋味香美號諸王從事雜説慕風迎致張士衡太子承乾慕風迎致謁太宗洛陽宮帝賜食七寶床賜食太白以七寶床賜食御手調羹以飯之集序殿前群公賜食罷驊騮踏路驕且間韓文推食之賜用勸勳勞置醴之恩以待賢彥元稹謝賜設狀空懷滿腹之慚未有沃心之便上召對浴堂門德宗雅尚文學每幸學士院顧問錫賚無所不至御膳珍肴輟而賜之仍詔尚食奉御每日賜寂御膳裴寂以物膳分賜玄宗貴妃楊氏他日以譴還銛第比中仄帝尚不御食笞怒左右高力士欲驗帝意乃白以殿中子帳司農酒餼百餘車送妃所帝即以御膳分賜力士知帝旨是夕請召妃還內出牢饌張説復為右丞相上曰敕所司供帳設樂內出牢饌唐史引坐賜食惟陳覺查文徽得奏事群臣非召見不得入賈崇詣閣求見景曰陛下新即位所信用者何人奈何頓與臣下隔絶臣老即死恐無復一見顏色因泣下嗚咽景為之動容引與坐賜食而慰之江南李景五代史召賜食傅奕初九年太白躔秦分奕奏秦王當有天下帝以奏付王及太宗即位召賜食謂曰向所奏幾敗我雖然自今毋有所諱而不盡言白求食食我少施氏食我以禮嗟來之食豫惟不食嗟來之食以至於此簞食趙宣子見翳桑餓人與之簞食靈輟也乞食史記伍子胥夜行書伏吹竽乞食於吳市君子苟無禮雖美不食禮與塊重耳乞食於野野人與之塊為食於路黔敖以食餓者晨炊蓐食韓信常從南昌亭長寄食數月長妻患之乃晨炊蓐食食時信往而不為具食信乃自絶而去也求餘鵝晉庾悅嘗食鵝劉毅字希樂求其餘不應毅御之義熙中奪悅豫韋解其軍府吏人微示其有悅忿懼而怒孔丐食取給李揆江淮養疾貧無祿丐食取給置甌杓道上陽城為道州剌史日炊米二斛魚一大鬵置甌杓道上人共食之投擲傾脯醬中盤進橙栗投擲傾脯醬韓愈詩捶炮列殄羞我來感意氣捶炮列珍羞過汪氏別業李白授之壺醬溧陽黃山里史氏之女身擊漂以自業子胥始東奔勾吳月涉星遁或七日不火傷弓于飛逼迫於昭關匍匐於瀨渚捨車而徒告窮此女目色以臆授之壺漿全人自沉形與口滅溧陽瀨水貞義女碑李白漂母進食沒受千金之恩同上一臠殘炙姚洪董璋反以書招洪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘炙感恩不已姚洪傳五代史饋食二十白漂母哀王孫而進食漢書漂母飯韓信信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎後信賜以千金僖妻賢公子而饋飧傳僖負羈之妻賢公子重耳乃饋盤飧置璧公子受飧反璧食我以禮孔子曰吾食於少施氏而飽少施氏食我以禮親饋禮主人親饋則拜而食操醬禮獻熟食者操醬虀空器荀彧文若初董昭欲進曹公九錫彧以為不可及彧病操饋之食發視之乃空器也遂飲藥卒孔饋鹿裴休有饋鹿者諸生共薦休不食曰蔬食猶不足令一啖肉後何以繼瓦器饋脫粟鹽蔬宇文融與崔隱兩劾張説引術士王慶則夜祠禱解而奏表其閭兄光刑耳列冤帝遣高力士往視説蓬首垢面席稿家人以瓦器饋脫粟鹽疏為自罰憂歡者求珍味饋從官崔日用為芮城尉則天幸長安路次陝州宗楚客時為剌史日用祗供頓事廣求珍味稱楚客之命偏饋從官楚客知而大加賞歎盛稱薦之舊史白必嘗異味傳子公之食指動以示子家曰它日我如此必嘗異味及宰相將解黿乃染指於鼎嘗之而出炮鱉鱠鯉詩封熊之蹯翰音之跖雞跖燕髀髀股也必爾反猩脣肉之美者猩猩之脣臑鱉炮羔臇鳧煎鴻臇臛也子兗反牛之股芍藥之醬薄耆之炙秋黃之蘇白之茹蘭英之酒凝脂之飯並文選春卵夏筍秋韭冬菁鮮薧之物鮮生肉薧乾肉也體名禽獸支節肉物胾蹯之屬孔異饌議皇帝憲帝親待益厚四方所獻異饌皆分餉之雩肉南蠻室利佛逝有獸類野豕角如山羊名曰雩肉味美以饋膳賓客不能名其饌裴冕每廣會賓客不能名其禽殼韓愈納涼聯句盤宥饋禽殼遐方異味至於遐方異味則有嗜者行不嗜者韓愈與崔群書御廚駱驛送八珍杜甫麗人行清觴異味情屢極贈薑七少府詩異味煩縣尹數杯資好事異味煩縣尹贈鄭十八豹胎歸來煮豹胎饜飫不能飴杜牧詩素麟脂班螭髓謝玄卿遇神仙設素麟脂班螭續神仙傳白膳羞膳夫掌王之食飲膳羞凡王之饋食用六榖膳用六牲飲用六清羞用百有二十品醬百二十甕注此王舉之饌也六榖稻黍稷梁麥菰也六牲馬牛羊豕犬雞也六清水漿醴涼醫酏八物淳熬淳毋炮豚炮羊檮珍漬熬肝膋也一舉王目一舉注云殺牲盛饌日舉一舉謂潮食侑食嘗食以樂侑食膳夫授膳祭品嘗食王乃食注曰侑勸也禮飲食必祭示有所先也每品食皆嘗之不舉大喪大荒大札天地有災邦有大故則不舉燕食謂王者日中與夕食奉膳奉進也稍事非日中大事之時而間食謂之稍事不會歲終惟王及后之膳不會注云不計多少優劣尊也膳以供王之膳孟春食麥與羊孟夏食菽與彘稷與牛季夏中央土乃以彘嘗麥孟夏稻與魚孟秋農乃登榖天子嘗新孟冬黍與鴈孟冬天子之閣左達五右達五共十閣倉庫冬生菜召信臣字翁卿為少府奏大官冬生蔥韭茹覆以屋廡夜燃蘊火待溫氣乃生之不時之物有傷於人奏罷之也注云燃古然字充君之庖天子四食白虎通曰天子日四食明有四方之物平旦食太陽之始晝食太陰之始晡食少陽之始暮食少陰之始孔禁膳劉晏領東都租庸鹽鐵常平使時大兵後京師米斗千鐵禁膳不兼時甸農挼穗以輸晏乃自晏行歲輸始至天子大悅省薄御膳張鎰建中二年同平章事明年以兩河用兵詔省薄御膳及皇太子食物鎰因奏減堂飧錢及百官廩奉三之一以助用度不掌膳晉陽公主薨帝閲三旬不掌膳九飣食盧氏雜説唐御廚進食用九飣食以牙盤九杖裝食味于其間置上前亦謂之香食尚食奉御掌天子之常膳隨四時之禁適五味之宜注春肝夏心秋肺冬脾皆時王不可食唐六典嘗祭食必先嘗同上白薪蒸傳藪之薪蒸虞候守之大曰薪小曰蒸收秩月令季冬命有司收秩薪柴以供郊廟及百祀之薪燎析薪匪斧不克詩析薪如之何匪斧不克鬼薪漢法罪人徒者使伐鬼薪以供宗廟後來居上陛下用人如積薪後來者居其上汲黯謂武帝云負薪朱買臣見夫婦離門不流束薪曳柴遠揚詩取彼斧戕以伐遠揚薪之詩云芃芃棫朴薪之槱之洪燎詩樵彼桑薪邛烘于煁邛我也錯薪詩曰翹翹錯薪言刈其楚委人以法供祭祀之薪蒸木材賓客供其薪芻喪紀供薪蒸木材軍旅供委積之薪芻凡疏材其野委野委謂廬宿止薪芻也又九式七曰芻秣之式桂玉戰國策蘇秦之楚三日乃見王曰楚國食貴於桂薪貴於玉負薪其父折薪其子不克負薪勞薪破車腳枯梧列子曰枯梧樹者鄰父曰枯梧不祥伐之鄰父因請為薪鄰父乃不悅尺燼納薪炙筆硯顏裴字文林為京兆守課人置薪兩束當輸租時納備寒用炙筆硯薪是獲尚可載哀我憚人亦可息大車詩剌人勞也有洌氿泉無浸獲薪見毛詩桐薪巨斧擊桐薪不待利時良日然後破之淮南子綢繆束薪曲突徙薪棄薪汝南先賢傳曰蔡順以至孝稱順少孤養母嘗出求薪有客卒至母望順不還即心動棄薪馳歸問其故母曰有急客來吾噬指以悟汝也如束濕薪史寧成為漢中尉嚴酷時人語曰謹上操下如束濕薪孔伐街苑樹劉義節從平京師時傾府庫為軍賞帑財太乏義節曰若伐街苑樹為薪易布帛歲數十萬可致落葉添薪仰古槐元稹詩玉饌燃薪桂同上負薪杜甫至秦州負薪釆橡栗自給燎薪屬道楊行密傳朱瑾徙屯安豐汴將牛全節苦閫會大雪士多凍死穎州剌史王敬蕘燎薪屬道汴軍免者數千人出城樵拾徐文遠洛陽飢文遠自出城樵拾為李密所得或燻若柴槱韓愈南山詩黃金買尺薪李白送魯郡劉長史積薪就陽劉禹錫管城縣驛記稍柴薪之柳宗元霹靂琴贊桐生石上一夕暴震倒臥道上震旁之民稍柴薪之朴樕皆薪材文粹陸龜蒙送小雞山樵人序土山無大材木率生小櫟朴樕皆薪材歌曰長其船兮利其斧輸其新兮勿豫侮壟阪長李白北上行採薪壟阪長枯薪夫溝中之木與蟻象同體追琢不至坐成枯薪劉禹錫上宰相啓明燃林中薪杜甫攜糧負薪李白詩來日一身攜糧負薪道長食盡苦口焦唇帝負薪馬上助役高麗傳帝至渤錯水阻淖八十里車騎不通長孫無忌楊師道等率萬人斬樵築道聯車為梁帝負薪馬上助役十月兵畢度負填道之薪則精感天地鬻薪自給唐史韓思復以親喪鬻薪自給虞部凡五嶽及名山能蘊靈産異興雲致兩有利於人者禁其樵採唐六典白秩芻月令季冬命有司合秩芻以養犧牲注芻草稅也草刈則墨未發秋政則人不敢草也草刈是刈取草也秋則草木成可刈澤農之貢草貢周官秸服禹貢納秸芻蕘芻秣之式周禮九式七曰芻秣之式峙乃芻茭書編管秉稈傳楚爇郤氏或取一編管焉或取一秉稈焉投之遂不爇注秉杷也既乖草稅無縱莠言宜正竹刑孔水草甘薦裴延齡妄言長安咸陽間得阪艿數百頃願以為內廄牧地水草甘薦與間廄等芻稿李晟言今河中米斗五百芻稿且竭中宮所賣莊宗皇后劉氏好聚斂分遣人為商賈至於市肆之間薪篘皆稱中宮所賣臥一束篘五代馮道居軍中不設床席臥一束篘求篘子固異於牛馬兮寧止乎飲水而求篘韓愈復志賦茭篘填淤瀕海棄地茭篘填淤一夫之勤百畝可獲權德輿文岐公碑峙篘就燥劉禹錫管城驛記以食牛羊文椊劉蛻梓州文冢銘腐為墟壤生篘稿以食牛羊白季秋務蓄菜月令旨蓄詩曰我有旨畜可以禦冬野人獻芹屈到嗜芰踐葵魯漆室女曰昔有客繫馬園中馬逸踐豫葵使豫終歲不飽葵祭韭秋韭冬菁葑菲詩云釆葑釆菲無以下體注葑菲曼菁與葍之類也其蔌維何維筍及蒲蔌菜也烹葵及菽七月其甘如薺釋菜合舞釋菜禮先師菜蘋蘩之屬蔥泄處末泄蒸也處醯醬之末鴽釀之蓼釀謂雜切蔬食語茹葷莊子云顏回不茹葷三月切蔥若薤禮有畦殖貨志云菜茹有畦百本薤龔遂為渤海太守教久種百本薤五十本蔥一畦韭冬生菜見上注噉薤留白庾亮噉薤留白云可以種陶侃歎曰非唯風流兼有為政之實緑葵倉露白薤負霜堇荼如飴詩蔥必寸斷後漢陸續字智伯初下獄知母向餉食曰母所作羹其蔥必寸斷韭曰豐本祭宗廟之禮擇蔥薤禮為君子擇蔥薤必絶其本末注為有萎乾也灌園嵇康與呂安灌園於山陽碧海之琅菜漢武內傳西王母曰仙之上藥有碧海之琅菜孔鬻蔬蘇良嗣尚方監裴匪躬案諸苑建言鬻果蔬儲利佐公上良嗣曰公儀休一諸侯相拔葵去織未聞天子賣果蔬與人爭利遂止渾提蔥西域泥婆羅貞觀二十一年遣使入獻波稜酢菜渾提蔥佛土菜西域傳貞觀二十一年有健達王獻佛土菜莖五葉赤華紫須末祿蔬有果蔥葛藍軍達茇薤掇蔬本以供御渾瑊帝狩奉天朱泚兵薄城人心危惴或夜縋出掇蔬本以供御數杯唐盧懷謹日晏設食菜數杯諸葛菜劉公嘉話云諸葛所止令兵士獨種蔓菁菜取其才出甲可生啖葉軟可煮食比諸菜屬其得不亦博乎三蜀江陵之人今呼蔓菁為諸葛菜是也山谷多薺高力士逐於巫山谷多薺而人不之食因為詩寄意兩京作斤賣五溪無人採夷夏雖有殊氣味終不改出明皇雜録頗陵菜之菠薐者本西國中有僧自彼將其子來國名頗陵語訛為菠薐出嘉話録澗蔬煮蒿芹韓愈陪杜御史遊詩柔蔬傲霜而秀折劉禹錫楚望賦曲江拾菜二月二日曲江拾菜土民遊極盛出李綽秦中歲時記半堂食吳初朝中大臣多蔬食月為十齋齋之明日太官具晚膳始復常珍謂之半堂食至是果盡割淮南之地去唐土封疆之半九國志今一啖肉後何以繼裴休有饋鹿者諸生共薦之休不食曰疏食猶不足今一啖肉後何以繼苦苣剌如針馬齒葉亦繁杜甫園官送菜苦苣剌如針馬齒葉亦繁青青嘉蔬色埋沒在中園畦肥剪韭薤韓文日一蔬食李輔國矯制遷明皇於西宮帝戚戚不樂日一蔬食野蔬拾新柔韓文聯句孟郊孟娘菜江淮有孟娘菜並益肉食酉陽雜俎攜兒挑菜叩頭録曰郭元神空貧無食春月攜兒挑菜野蔬一日有餘三日不出暮苣有蒲採江之菜兮暮苣有蒲笠澤叢書清晨蒙菜把常荷地主恩杜甫園官送菜詩葵昏又如馬齒盛氣擁葵荏昏同上詩野蔬蓬莠獨不樵野蔬暗泉石蒼耳況療風童兒且時摘杜甫驅豎子摘蒼耳詩登床半生熟下箸還小益放筐亭午際洗剝相蒙羃登床半生熟下箸還小益加點瓜薤間依俙橘奴迹同上詩園蔬抱金甲無以供採掇同上鴨腳葵白居易園蔬鴨腳葵野茹紫花菁赴忠州詩同上賸蔬雲矗以委圃歐陽詹德勝頌文粹白伐薪為炭月令季秋豫讓吞炭掌炭林衡掌炭之徵令以時入之權量受之供國用陰陽為炭隧炭楚獲吳舟使隨人守之環而塹之及泉盈其隧炭陳以待命廢於爐炭邾莊公褊急執夷射姑不得怒自投于床廢於爐炭廢墜也蜃炭華元樂舉葬文公用蜃炭注以禦濕也熾炭于位寺人柳有寵太子佐惡之太子居喪柳熾炭于位太子將至則去之欲其溫暖又有寵炭輕重淮南子曰水勝故夏至濕火勝則冬至燥燥則輕濕則重故先冬至夏至懸土炭於衡各一端令適停冬至陽氣至則炭仰而鐵低夏至則炭低而鐵仰也禁王莽欲防人盜鑄禁人不挾銅炭獸炭晉羊琇屑炭和作獸形掘得交州記曰灶頭山越王炊爨之處掘得炭難合淮南子曰譬如冰炭紐繩也何時而合淮曰冰寒炭勢無時得合天帝裝炭越王勾踐有寶劍五薛燭曰當造之時雨師灑掃雷公擊橐蛟龍捧爐天帝裝炭啓庾肩吾云識慚曼倩似見昆明之炭清愧伯鸞不復因人之熱劉孝威謝東官賚炭啓曰洛城雪深不見海神之迹呼沱冰合無待王霸之覘聚而為嶽大壯黑山稱之以船將重牙獸爐生烽焰室蒲紅光雉裘入而識奢鼠布焚而無污孔掌供薪炭百官志鉤盾署令二人丞四人監事十人掌供薪炭三斗楊德幹歷澤齊汴本四州剌史有威嚴時語曰寧食三斗炭不逢楊德幹以木炭歸司農杜佑兼鹽鐵使以木炭歸司農鞴炭五代王彥章晉取鄆州末帝乃召彥章為招討使馳兩日至滑州陰遣人具舟於楊村命甲士六百人皆持巨斧載冶者具鞴炭乘流而下趨德勝舟舉鎖燒斷之立獸炭德宗帝紀大曆十四年十月戊午罷九成宮貢立獸炭瑞炭唐開元遺事西涼國進炭百條各長尺餘其炭五色堅如鐵石名曰瑞炭燒於爐中無焰而有光雙鳳唐開元遺事楊國忠家以炭屑同蜜相和塑成雙鳳至冬月則爇爐中三城絶品炭三賢典語曰李華燒三城絶品炭以龍腦裹芋魁煨之炭精張燕公有石緑鏡臺得自明川道士玄宗聞其異取以炭精十車燒之不變乃已出品物類聚鍊炭洛下有豪子飲食鮮華有李使君為具召之曾不下箸至飯李曰此以炭炊豪子勉食一匙曰凡以炭炊先鍊炭謂之鍊炭方始無煙氣此亦也劇談録飛雪斷道冰成梁侯王燒炭雕玉房蟠龍吐耀虎喙張熊蹲豹躑爭低昂攢巒叢崿射末光丹霞翠霧飄奇香柳宗元行路難白大庖不盈詩君子遠庖廚也廚車載食車良庖庖丁解牛廚食漢詔吏或飾廚傳稱過客言盛庖廚稱過客之意刀匕是供膳夫充君之庖田獵一為乾豆二為賓客三為充君之庖爨當爨無清之人言廚饌之薄也莊子蠟燭炊石季倫以蠟燭炊出世説爨鼎莊子云有人冬爨鼎夏造冰同爨緦禮曰同爨緦孔廚傳李修飾廚傳覆銀瓦爨香火南蠻婆賄伽盧國廚覆銀瓦爨香火武臣私廚郤士美充昭義節度使昭義自李抱真以來皆武臣私廚月費米二千石羊千首酒數十斛潞人困甚士美至悉去之出廩錢市物自給同爨崔鄲崔氏四世緦麻同爨無它爨崔玄暉貧寓郊墅群從皆自遠會食無它爨郇公廚長安後記曰韋陟廚中飲食之得錯雜或人入于中多飽飫而歸俗語曰人欲不飯斤骨舒寅緣須入郇公廚長安四月已後自堂至百司廚謂之櫻筍廚咸鎬故事可十人具常袞故事日出內廚食可十人具袞奏罷之榜廚內廚楊輝僖皇末權樞密事饌甚精四季皆榜樹符江淮大賈使主堂廚李德裕始二省府符江淮大賈使主堂廚食利因是挾貨行天下所至州鎮為右客富人倚以自高德裕一切罷之敕廚倍常羞杜甫鄭典設歸詩敕廚倍常羞杯盤頗狼藉中書堂食不可食五代蘇逢吉已貴益豪侈謂中書堂食不可食乃命家廚進羞水陸曾不下箸韋陟每食視廚所棄其直猶不減萬錢宴公侯家雖極水陸曾不下箸富家廚內臭杜甫摘蒼耳詩竹裏行廚洗玉盤嚴公攜酒饌詩
