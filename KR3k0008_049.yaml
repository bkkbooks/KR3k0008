body:
  text: 卷第四十九白懋賞懋勉寵錫受賜民到于今受其賜天賜何以勸善夫賞國之典也藏在盟府不可廢也傳善則賞之以勸能者不僣聲子曰善為國者賞不僣賞僣則懼及淫人若不幸而過寧僣無濫勸賞古之治人勸賞賞以春夏將賞為之加膳加膳則飫賜賞不踰時何以沮勸賞罰無章君之勸能明而不費管子臣之量力受而勿辭淮南子曰忠臣之事君也計功而受賞不為苟得量力而受官不貪爵祿其所能者受而勿辭無以勸能賞延于世世嗣也大賚賚賜也禹錫玄圭功多有厚賞書費少勸多文子曰善者費少而勸多故聖人賞一人而天下趨之是以至賞不費也開必得之門信慶賞也管子授彤弓於晉莊嘉乃丕績錫玄圭於夏禹告厥成功夫德不旌則勸善之道缺矣勸不賞則報功之典廢矣周禮太宰以八柄馭群臣三曰豫以馭其幸幸謂言行偶合於善則有以賜豫之以勸後也以九式均節財用八曰匪頒之式式謂財用之節度也匪分也頒賜也謂分賜群臣賜豫好賜並周禮時頒以時頒賜之慶賜遂行無有不當月令凡賜君子與小人不同日慎尊卑也禮報功慶賞禮見爵賞之施焉不賞而人勸禮大利小利禮曰事君大言入則望大利小言入則望小利言謂立事者也利祿賞也禮無不答禮曰臣下竭力盡能以立功於國君必報之以爵祿故曰禮無不答言上之不虛取於下也拜貺貺賜也不酬奉上之勤何勸將來之善臣節貴忠國章懋賞賜表主恩拜明臣禮周禮大府以敝餘之賦以待賜豫反賜魯昭公疾賜子家家雙琥一環一璧輕服公薨子家子反賜於府人曰吾不敢逆於君命三賞不及史記晉文公賤臣童叔曰君三行賞賞不及臣公曰導我以仁義防我以德惠以此上賞輔我以行次賞矢石之難汗馬之勞次賞若以力事我三賞之後而及子晉人聞之大悅不吝千金魏志太祖其有勳勞不吝千金無功妄施分毫不與賞不失勞傳賞恭罰否不賞私勞競勸于賞賞之曰發公室示賞也出賞物也示信商君變法恐人未信乃立卜於市南門募人徙置北門者與五十金有一人徙之遂與五十金以示其不欺也史記有功不賞為善失其望姦邪不誅為惡肆其凶賞慶刑威曰君賞賜一孔勞臣不賞不可勸功死士不賞不可勸勇陳子昂八科六勸賞臣聞勞臣不賞不可勸功死士不賞不可勸勇今或勤勞死難名爵不及偷勞尸祿寵秩妄加非所以表庸勵行者也賞不加有功魏徵曰賞不加有功則危亡之期或未可保獻瓜果者欲授試官陸贄帝徙幸梁道有獻瓜果者帝嘉其意欲授試官贄曰爵位天下公器不可輕也帝曰試官虛名且已與宰相議矣卿其無嫌贄曰信賞必罰霸王之資也輕爵褻刑衰亂之漸也非功而獲爵則輕非罪而肆刑則褻厚賜今員外試官與勳散爵號同然而突銛鋒排禍難者以是酬之可謂重矣今獻瓜一器果一盛則受之彼忘軀命乾有以相謂矣曰吾之軀命乃同瓜果瓜果草木也若草木然人何勸哉夫田父野人必欲得其歡心厚賜之可也賚獎優華季德裕字文饒數召見賚獎優華不呰之澤蕭至忠陛下降不呰之澤近戚有無涯之請錫與踵塗田弘正字安道帝遣裴度宣慰賞其軍錢百五十萬緡洪正奉表陳謝制誥褒答且賜與令名錫與踵塗賞以存勸陸贄賞以存勸罰以示懲勸以懋有庸懲以威不恪故賞罰之於馭衆譬輗軏所以行車銜勒所以服馬也人主之柄韋澳字子斐御史周墀節度鄭滑表署募府會墀入相私謂曰何以教我澳曰願公無權墀愕然澳曰爵賞刑罰人主之柄公無以喜怒行之俾庶官各舉其職則公劍衽廟堂上天下治矣烏用權墀歎曰吾先居此得無愧乎上食樂作玄宗貴妃楊氏諸姨上食樂作帝驟賜左右不可資由是愈見寵賜諸姨錢歲百萬為脂粉費帝所得奇珍及貢獻分賜之使者相銜於道五家如一誅亂者一級賞千萬竇易貞字宗玄為宣歙浙西觀察使時江淮旱漕物淹積不能前軍士聞易直嚮言欲賞軍部將王國清指漕貨激衆謀亂易直知之械國清送獄其黨數千群歡入獄篡取之欲大剽易直登樓令曰能誅亂者一級賞千萬衆喜反縳為亂者三百餘人易直悉斬之賞罰明則士盡節鄭俌中宗時歷右補闕默啜入寇敗沙吒忠義詔百官陳破賊勝策獨俌上疏以為治內可以及外賞罰明則士盡節賞無遺功吳武陵信州人元濟叛武陵遺以書曰今天子英武任賢同符太宗寬仁厚德有玄宗之度罰無貸罪賞無遺功前後賜不勝紀郭子儀前後賜良田美器名園甲館不勝紀賜絹萬匹尉遲恭傳秦王為皇太子授左衛率時坐隱巢者百餘家將盡沒入之敬德曰為惡者二人今已誅若又窮支黨非取安之道由是普原論功為第一賜絹萬匹舉齊府金幣什物賜焉賜金銀皿帛王琚從帝至樓下誅蕭至忠岑羲竇懷貞斬常元楷李慈比闕下賈膺福李猷於內客省事平進戶部尚書於是帝召燕內殿賜金銀雜皿皆一床帛二千第一區賞者禮之基魏元忠上封事賞者禮之基禮崇則謀大竭其能賞厚則義士輕其死賞罰者軍國之綱紀政教之藥石賞不行又曰自蘇定方平遼東李績破平壤賞即不行勳亦淹廢賞者士所死盧藏用字子潛云古者為政賞罰申則兵強禮者士所歸賞者士所死禮賞不倦則士爭先賜邊士不時崔群字敦詩會度支廩賜邊士不時物多幣惡李光顏憂甚至欲引佩刀自決皇甫鏄奏邊鄙無事乃群鼓動欲以買直歸怨天子於是罷為湖南觀察使危難不愛惜官賞劉臣容黃巢亂江淮據荊南遷山南東道節度使以扞巢巢浮江朿奔巨容追之率十俘八諸將欲乘勝追斬巢巨容止曰朝家多負人有危難不愛惜官賞事平即忘不如留賊為富貴地諸將謂然故巢復熾載以官車曹確字剛中時帝薄於德昵寵優人李可及唯確屢言之而神策中尉西門季玄者亦剛鯁謂可及曰汝以巧佞惑天子當族滅嘗見共受賜謂曰令載以官車後籍沒亦嘗爾遍賜帝始聽樂賜教坊使等玉帶錦袍往謝洪肇洪肇怒曰健兒為國征行者未有遍賜爾曹何功敢當此乎悉取所賜還官史洪肇傳賞務速而後有勸柳宗元使秋冬為善必俟春夏而後賞則為善者必怠又曰為善者不越月踰時而得其賞則人勇而有勸焉功不見圖則勞者何勸忠不見賞則勃者何誅元稹制勸之以爵祿慶賞之美柳宗元守道論橫恩尉遲恭太宗召讓曰國之大事惟賞與罰橫恩不可數得勉自修飭悔可及乎恭頓首謝禮賜殊縟方伎葉法善召詣京師欲寵以官不拜留內齋場禮賜殊縟賚賜豐饒岑文本既任職久賚賜豐饒皆令弟文昭主之恩洽澤濡武平一戚屬外家恩洽澤濡恩接備厚郭承嘏字復卿每進劉恩接備厚賚問優縟牛元翼見延英賚問優縟僣賞二白古之善為國者賞不僣僣則懼及淫人公冕服公賜公冶冕服將死曰我必無以冕服斂非德賞也言公畏季氏而賞我非以我有德故君子不以小言受大祿不以太言受小祿祿賞也利淫慶賞遂行無有不當月令苟所賞之不當則何勸於將來無功受祿詩伐檀刺貪也在位貪鄙無功受祿云云策勳必在於有勞頒賞亦期於無僣賜銅山漢鄧通無他能文帝愛之賞賜至多復賜蜀郡銅山得私鑄錢鄧氏錢因滿天下傳曰上賞其姦介之推竊功而進明君不賞竊菜而祀明神不享賞不酬功刑不應罪不祥莫大焉孔喪師寵以崇秩李絳字深之突承璀討王承宗宗無功還加開府儀同三司絳奏承璀喪師當抵罪今寵以崇秩後有奔軍之將蹈利于賞陛下何以處之倍百行賞辛替否疏曰陛下倍百行賞倍十增官金銀不供於印束帛不充於錫何所愧於無用之臣無力之士哉爵賞稍易人且偷蔣伸字大直宣宗雅信愛伸每見必咨天下得失伸言比爵賞稍易人且偷帝愕然曰偷則亂矣伸曰否非遽亂但人有凱心亂由是生帝嗟嘆冒賞康承訓字敬辭南詔深入太平裨將陰募勇兒三百夜縋燒蠻屯斬首五百南詔恐明日解而去承訓謬言大破賊告于朝群臣皆賀加檢校右僕射籍子弟姻昵冒賞而士不及怨言歡流用兵以來僣賞者多郭子儀拜尚書令確讓且言自用兵以來僣賞者多至身兼數官冒進亡恥今凶醜略平乃作法審官之時宜從老臣始本傳六十二詔賜兩街僧金幣李蔚傳咸通十四年春詔迎佛骨鳳翔乃詔賜兩街僧金幣京師耆老及見元和事者悉厚賜之不逞小人至斷臂指流血滿道以伶人為刺史莊宗戰於胡柳也嬖伶周匝為梁人所得其後滅梁入汴周匝謁於馬前莊宗得之喜甚賜以金帛勞其良苦周匝對曰身陷仇人而得不死以生者教坊使陳俊內園裁接使儲德源之力也願乞二州以報此兩人莊宗旨許以為刺史郭崇韜諫曰陛下所以共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心不可因格其命五代史格音閣白耐班敗狄宋以門賞之使食其征賞不失勞桓子滅潞晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄士子之功也微子吾喪伯氏矣彤弓天子錫有功諸侯也賞死事死王事者功疑惟重賞從重也功懋懋賞商書功多有厚賞晉侯馱楚俘于王王命為侯伯賜之大輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人傳子展入陳鄭伯賞子展之功賜入陳先輅三命之服先八邑賜子産次輅再命之服先六邑有勳而不廢加重賞也有績而不載書功於册奉之以土田奉賜也撫之以彝器弓旌斧鉞旌之以車服戎輅之服明之以文章旌旗也子孫不忘昭舊福也以庸制祿則人興功言賞也周禮凡賞無常輕重視功報功禮不酬盡敵之功何勸能軍之善捷無虛月賞不踰時臣節在勞國章懋賞矢石之難汗馬之勞次賞史晉文公畢萬匹夫也七戰皆獲有馬百乘死於牖下于奚請曲懸衛孫桓子與齊戰敗新築人仲叔于奚救孫桓子桓子是以免衛人賞之以邑辭請曲懸繁纓以朝許之皮初補太守劉弘為荊州奏皮初有戰功請補襄陽太守朝廷以初雖有功襄陽是名郡宜慎選不可授功以前賞折後功晉馬隆孝興募人討羌梁州平將加將士勳賞有司奏隆將士皆先加顯爵不應更授楊珧駁曰前少加爵命為誘引也今軍完不得以前授塞後功從之軍賞不逾月孔軍還賚貺不資李光顏田縉鎮夏州以叨沓開邊隙故黨項引吐蕃圍涇州郝玭力戰破之光顏聞賊至料兵以赴攽人慢言惱惱騰譟不肯行光顏為陳大義感慨流涕聞者亦泣下遽即路虜走出塞穆宗立召還賜開化里第加同中書門下平章事軍還賚貺不資以戰多進大將軍明字若水以戰多進左威衛大將軍襲封賜錦袍寶帶它物蕃夥賞豫不可計馮盎羅竇叛斬首千餘級賞豫不可計奴婢至萬人斬可突于功張九齡遷中書令范陽節度使張守圭以斬可突于功帝欲以為侍中九齡曰宰相代天治物有其人然後授不可以賞功國家之敗由官邪也帝曰假其名若何對曰名器不可假也有如平東北二虜陛下何以加之遂止以本州相授薑謨薛仁杲平擢秦州刺史帝曰昔人稱衣錦故鄉今以本州相授所以償功七寶鞍分賞戰士肅宗廢后張氏初建寧王倓數短后於帝上皇在蜀以七寶鞍賜后而李泌請分以賞戰士倓助泌請故后怨璽書褒美河間元王孝恭江南平璽書褒美賜甲第一區女樂二部奴婢七百口寶玩不資太宗敗竇建德於虎牢執之王世充乃降六月凱旋太宗獻俘于廟賜袞冕金輅雙璧黃金六千斤前後鼓吹九部之樂班劍四十人本紀請用三張萬福許杲過楚州大掠節度使書元甫使萬福追討未至杲為其將康自勸所逐自勸循淮鈔而東萬福倍道追殺之免者十三盡還所剽於民元甫將厚賞士萬福曰官司健坐仰衣食無所事今一小煩之不足過賞請用三之一帝下詔褒美賜具衣宮錦十雙殫私財賜麾下馬燧字洵美田悅反初將戰燧約衆勝則以家資賞至是殫私財賜麾下德宗嘉之詔出度支錢五千萬償其財脫衣解馬羅士信有所獲悉散戲下有功者脫衣解馬賜之賞厚之過杜牧曰戰小勝則張皇其功奔奏獻狀以邀賞或一日再賜一月纍封凱還未歌書品已崇爵命極矣田宮廣矣金繒溢矣子孫官矣肯外死勤於我哉此賞厚之過賜甲第帷帳什器令狐彰字伯陽移壁杏園渡思明疑之遣薛岌以兵劫彰彰諭衆以大誼皆感附死力遂破岌兵潰圍出以麾下數百入朝賜甲第帷帳什器拜滑亳魏慱節度使李靖平江南賜物千段奴婢百馬百匹勳戶免行楊國忠常領劍南召募使遣戍瀘南餉路險乏舉無還者舊勳戶免行所以寵戰功國忠令當行者先取勳家故士無鬥志縮衣節口文粹杜牧燕將録今天子縮衣節口以賞戰士議勤勞文粹楊炎出師紀聖功頌以大賞義勤勞賜雜綵百段王君廓從戰東都有功詔勞之曰爾以十三人破賊萬自古以少制衆無有也賜雜綵百段優賞將吏扶圭綴組帛推其家粟塞其庾韓文聖德詩唐中宗孝和皇帝賞張仁願制朕聞將帥興功本期於邦國帝王懸賞用答於疇庸右屯大將軍張仁願薊門作牧既無東顧之憂榆塞總兵方釋比乘之慮而乃躬先士卒負士築城卻月於天街劃長雲於地脈宜列山河河之賞式崇帶礪之榮進封韓國公賜物三百段及衣裳一副初學記賞懸香餌柳文賞懸香餌餌令布疾雷賞和戎四白晉侯以樂賜魏絳曰子教寡人和諸戎狄以正諸華夏八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰夫和戎狄國之福也臣何力之有焉夫賞國之典也子其受之魏絳始有金石之樂平國君漢高使侯公説項羽乃約與漢中分歸太公呂后乃封侯公為平國君言能平於邦國也和戎五利晉侯悅之孔賜貂裘西胡珍器裴矩字弘文隋大業三年帝有事常山西方來助祭者十餘國矩使人説高昌伊吾等啖以厚利使入朝又助城伊吾脅處羅入朝帝益喜賜貂裘西胡珍器何惜金石鄭元璹突厥攻太原詔元璹持節往勞既至元璹曰今掠財資皆入所部豈若什旗接好則金玉重幣一歸可汗頡利當其言引還太宗賜書曰知公口伐可汗如約朕何惜金石賜公哉賞諫臣五白齊威王下令曰有能面折寡人者受上賞獻書諫者受中賞謗議於市朝而聞者受下賞臣下不匡其刑墨具訓於蒙士注臣不正君服墨刑伊訓能弼其違宜遵賞典三等賞晉張實字安遜下令國中曰有面刺孤者酬以束帛翰墨陳孤過者答以筐篚謗言於市者致以羊米駮議晉王沉處道遷豫州下教曰能陳長吏可否説百姓所患者有賞言刺史得失陪賞主簿褚啓曰上好下應今示以賞恐拘介之士憚賞不言貪昧之人慕利而妄舉沉從之孔遣使者賜酴醾酒李絳傳方江淮歲儉民荐飢有御史還奏不為災絳曰方隅皆陛下大臣奏孰不實而御史苟悅陛下爾李吉甫嘗盛贊天子威德帝欣然絳獨曰陛下自視今日何如漢文帝今西戎內訌近以涇隴為鄙去京師遠不千里烽燧相接也加以水旱無年倉廩空虛誠陛下焦心銷志永濟時之略渠便高枕而臥哉帝入謂左右曰絳言骨鯁真宰相也遣使者賜酴醾酒賜黃金十斤酬直言商侑為刑部尚書初鹽鐵度支使屬官悉得以罪人繫在所獄或私置牢院而州縣不聞知歲千百數不時決侑奏許糾列所繫申本道觀察使並具獄上聞許之賜黃金十斤以酬直言魏謨為拾遺屢有獻納詔曰謨雖居位日淺朕何愛一官增直臣之氣其以謨為石補闕明珠兼乘未若一言薛收授天策府記室上書諫秦王止畋獵王答曰覽所陳知成我者卿也明珠兼乘未若一言賜黃金四十挺賜黃金一函蕭瑀字文遷遷內史令孜孜抑過繩違無所憚上便宜每見納用手詔曰得公言社稷所賴朕既寶之故賜黃金一函賜帛三百匹孫伏伽武德初上言三事帝大悅曰伏伽至誠慷慨據義懇切指朕失無所諱其以伏伽為治書侍御史賜帛三百匹賜鍾乳一劑高馮授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石報之賜胡瓶一李太亮常有臺使見名鷹諷太亮獻之太亮密表曰陛下絶畋獵久矣而使者求鷹信陛下意邪太宗報書曰有臣如此朕何憂古人以一言之重訂千金今賜胡瓶一雖亡千鎰乃朕所自御示無言不酬之義崔日用會帝誕日日用釆詩大小雅二十篇及司馬相如封禪書獻之藉以諷諭且勸告成事有詔賜衣一副物五十段以示無言不酬之義賜物四十段倪若水為汴州刺史元宗嘗遣中官往淮南捕鵁鶄上疏諫手詔答曰言念忠讜深用慰喜賜物四十段用答至言出唐語林進五品階姚南仲獨孤皇后崩代宗詔近城為陵上疏曰臣聞人臣宅於家帝王宅於國長安乃祖宗所宅其可興鑿建陵其側乎帝嘉納進五品階以酬讜言乃圖厥容於凌煙閣出李晟傳帝幸九成宮姚思廉以離宮遊幸是漢武秦皇之事非堯舜禹湯所為帝諭曰朕若氣疾熱即煩劇豈為遊賞乎賜帛五十匹治洛陽殿張玄素上書秦籍周之餘將遺之萬世及子而亡天下不可以力勝當務儉約薄賦斂以身先之乃能大安向平東都陛下曾觀廣殿皆撤毀之天下翕然一口歌頌豈有初惡侈靡而後好雕麗哉今民力未及隋日而役殘創之人襲亡國弊臣恐陛下之過甚於煬帝詔罷役帝顧房玄齡曰洛陽朝貢天下中朕營之意欲便四方百姓今玄素言如此使後必往雖露坐庸何苦賜綵二百匹魏徵名梗挺聞玄素言歎曰張公論事有回天之力可謂仁人之言哉唐史本傅白汝南之帛漢書鳳凰集于新蔡詔賜汝南太守帛百匹遼東之錢東觀漢記祭彤為遼東太守時帝嘉其功賜錢百萬三公之服使去襜帷郭賀字喬卿為荊州刺史有殊政顯宗巡狩特見嗟嘆賜以三公之服黼黻冕旒行部去襜帷以彰有德民見榮之嘉乃丕績賞政績六孔賜瑞錦雜綵著善政王方慶遷廣州都督議者謂治廣未有如左慶者號第一下詔賜瑞錦雜綵以著善政帝題贊於聽事盧奐早修整為吏有清白稱為陝州刺史開元二十四年帝西還次陝嘉其美政題贊於聽事尋召為兵部侍郎賜璽書袍帶畢構字隆擇按察劍南睿宗嘉構修潔獨行有古人風其治術又為諸使最乃賜璽書袍帶以政最馬植字存之為安南都護州部廢池珠復生以政最檢校左散騎常侍加金紫劉餗字鼎卿進歙州刺史政幹強濟野熅將為虎噬幼女呼號搏虎俱免觀察使韓滉表治有異行加金紫節度使表其政李從晦出為常州刺史鎮海軍節度使李琢表其政賜金紫白胥臣之舉郤缺晉襄公賞胥臣先茅之縣曰舉郤缺之功也有功加錫大戴禮古者諸侯貢士一適謂之好德再適謂之賢者三適謂之有功乃加九錫也漢高之賞鄂君群臣爭功鄂君曰蕭何功第一曹參次之帝曰蕭何雖有功待鄂秋而後明封鄂秋為平安侯賞無知漢封陳平為戶牖侯辭曰非魏無知臣安得進乃賞無知孔賜帛三百匹馬周字賓王至長安舍中即將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之及謁見與語帝大悅詔直門下省明年拜監察御史奉使稱職帝以何得人賜帛三百匹酬於得賢文粹薛登請選舉擇賢才疏子成之居魏相酬於得賢白死知不曠曠棄也賞死事死王事賞延于世世嗣也凡諸侯死王事加二等於是有以袞斂袞上公服孤子死王事者之子周禮養死政之老謂死王事者之父母周禮春饗孤子禮君子聽磬聲則思死封疆之臣禮子云利祿先死者而後生者則民不偕先亡者則民可以託言不偷於死者則生者信之偕死棄死者也蹈白刃而死衽金革死而不厭禮不酬繼死之功何勸將來之善死寇死明臣節賞表王恩齊侯令曰得弊無存尸者以五家免乃得其尸公三禭之先以士服文大夫服次卿服與之犀軒直蓋親推之三犀軒卿車直蓋高蓋也陳成子屬孤子三日朝會死事者之子三日朝以禮之設乘車兩馬繫五色召顏涿聚之子晉賜之曰車服而朝無廢前勞隰之役汝父死焉能執干戈以衛社稷童汪錡羽林孤兒死王事者之子養於羽林教以五兵也立後魏祖令將士絶無後者為求親戚為後授上田給耕牛置師教為立廟也智者不背時而棄利勇士不怯死而減名賞死事八孔三世有罪常降一等周曾傳又有呂賁康秀琳梁興朝賈樂卿侯仙欽皆死希烈之難贈賁秀琳尚書左右僕射興朝等皆秩尚書遣蕭昕致祭境上命李勉哥舒曜訪其家子孫詔雖三世有罪常降一等褒死難之士養死事之孤李翰所善張巡死節肅宗未及知翰傳巡功狀表上之曰臣聞聖主褒死難之士養死事之孤或親推轜車或追建邑封厚死以慰生撫存以答亡君不遺其臣臣亦不背其君也賞邑九白賞胥臣以先茅之縣晉侯賞其舉郤缺之子賞士伯以瓜衍之縣賞桓子狄臣千室亦賞士伯以瓜衍之縣注獲狄上救伯氏之功伯氏謂林父也韓侯奄受北國賜以北方之國詩鄭伯賞入陳之功賜子展先輅三命之服先八邑賜子産次輅再命之服先六邑齊侯與晏子鄁殿其鄙六十邑也不受曰慶氏之邑足欲故亡吾邑不足欲也不受鄁殿非惡富也恐失富也班邑班賞也記曰柳莊死公曰非寡人之臣社稷之臣也與邑裘氏與縣潘氏書而納諸棺于奚辭邑新築人仲叔于奚救孫桓子桓子是以免衛人賞之邑辭請曲懸繁纓云云孔賜實封二百戶劉幽求拜侍中璽詔曰昔西漢行封更擇多戶東京定賞復增大邑宜加賜實封二百戶不宜裂地以封張九齡字子壽同平章事帝將以涼州都督牛仙客為尚書又欲賜實封九齡曰漢法非有功不封邊將積榖帛繕器械適所職耳陛下必賞之金帛可也獨不宜裂地以封賜邑戶三百唐休璟授同中書門下三品酒泉郡公謂曰初欲召公計事以有北狄憂前日直言今未忘也加特進尚書右僕射賜邑戶三百堂封自源乾曜始源乾曜帝嘗自較其考與張説階賜時議者言國執政所以同休戚不崇異無以責功帝乃詔中書門下共食實封戶二百堂封自此始實封通前二千戶郭子儀德宗嗣位召還朝攝冢宰加尚父進位中書令增實封通前二千戶差功大小武德九年太宗又定功臣封戶乃自寂而下差功大小而第之裴寂傳雖胙以土宇而賦八未廣宜加賜實封二百戶劉幽求橫恩特賜韋嗣立上言比諸封家所入已寡國初功臣共定天下食封不三十家今橫恩特賜家至百四十以上白賜田各萬畝史記趙列侯好音鄭歌者二人賜之田云云秦始皇以甘羅説秦攻燕復以甘茂田宅賜之賜公田二頃宅一區漢蘇武自胸奴來云云晉侯朝王王賜之溫原攢茅之田晉於是始啓南陽夫有勳者奉之以土田奉賜也周禮司勳掌賞地之法以等其功等差也凡頒賞地三之一食凡賞田王食其一而臣食其二唯加田無國征征稅也謂既賞之又重賜之若此田則無王稅也與利田宅漢書徙人入關與利田宅利好也孔孔緯僖宗賜天興良田賜藍田田四十頃符璘入朝賜藍田田四十頃願以有餘賜不足者于志寧字仲謐遷太傅嘗與右僕射張行成中書令高季輔俱賜田志寧奏臣家自周魏來世居關中資業不墜今行成季輔始營産土願以臣有餘賜不足者帝嘉之分其田以與一人賜田二十頃元結祖仁基從太宗征遼以功賜宜君田二十頃賜田百畝劉世讓討呂崇茂為賊所囚逃還高祖賜田百畝賜田宅米粟李祐以功還神武將軍賜田宅米粟賜良田千畝劉幽求誅韋庶人以功賜良田千畝賜田園哥舒翰築神策苑秀二軍賜田園手詔賜田隱太子傳秦王以美田給準安王神通而張婕妤為父丐之帝手詔賜田詔至神通已前得不肯與婕妤妄曰詔賜妾父田而王奪與人帝怒召秦王讓曰我詔令不如爾教邪白賜蘇武宅一區見上注以甘茂宅賜甘羅見上注與利田宅見上注孔賜天興良田善和里第孔緯字化及遷尚書左僕射賜號特危啓運保又功臣鐵券恕十死賜天興良田善和里第各一區李光顏賜開化里第劉仁軌賜第一區劉仁軌進六階真拜帶方州刺史賜第一區獨賜狄仁傑后幸三陽宮王公皆從獨賜仁傑第一區入第教坊鼓吹迎導李晟字良器賜第永崇里晟入第京兆供帳教坊鼓吹迎導詔將相送之賜大寧甲第渾鹼繇樓煩郡王徙咸寧賜大寧里甲第符璘賜靖恭弟符璘賜靖恭里弟一區李祐以功遷神武將軍賜宅賜甲第一區河間王孝恭討輔公祐生禽之江南平賜甲第一區賜第一區劉幽求誅韋庶人以功賜第一區讓賜宅于志寧遷太子太傅嘗與右僕射張行成中書令高季輔俱蒙賜地志寧奏曰臣居關右代襲箕裘周魏以來基址不墜行成等新營莊宅尚少田園於臣有餘乞申私讓帝嘉其意乃分賜行成及季輔舊史賜以楊光遠舊第五代李守貞以功拜同平章事賜以楊光遠舊第守貞取官旁民舍大治之為京師之甲出帝臨幸燕錫恩禮出於諸將賞樂十二白禮曰天子之為樂也以賞諸侯有德者也德盛而教尊五穀時熟然後賞之以樂故其治民勞者其舞行綴遠注民勞者德薄故賜舞亦少又云治民逸者其舞行綴短民逸則德盛德盛則賜舞多則舞行相去近者也册魏公九錫文曰以君敦尚謙讓俾人興行少長有禮上下咸和是用錫君軒懸之樂六佾之舞傳晉侯以歌鍾女樂賜魏絳事見賞和戎門禮大夫有功賜樂故傳云魏絳始有金石之樂禮也又天子賜諸侯樂則以祝將之賜伯子男則以鞀將之將謂執以致命也祝鞀皆以所節樂也夔始制樂以賞諸侯舜命夔作樂以賞諸侯比之魏絳魏志大祖賜夏侯惇樂比之魏絳曲懸仲叔于奚有功衛人賞之邑辭賞請曲懸諸侯之樂也孔竇抗東都平賜女樂一部李晟蕩夷凶憝賜女樂一列渾瑊繇樓煩郡王徙咸寧賜女樂五人戴休顏京師平從乘輿至京師賜女樂歌兒舞女歌兒舞女念功賞勞出於曲陽杜牧原十六衛河間王教恭討輔公祐生禽之江南平賜女樂二部築神策苑秀二軍賜音樂哥舒翰賜女樂二人固辭張茂昭復之鎮賜女樂二人固辭車至第門茂昭引詔使辭曰天子女樂非臣下所宜見昔汾陽咸寧西平北平皆有太功故當是賜今臣下述職以朝奈何濫賞後日有功之臣陛下何以加之後賜安仁里第亦遜不受唐史白車服以庸庸功也報其勞也册魏公文曰以君經緯禮律為人軌儀使安職業無或遷志是用錫君大輅戎輅各一玄牝二駟君勸分務本嗇人昏作粟帛滯積天業惟興是用錫君袞冕之服赤舄副焉傳鄭伯賞入陳之功賜子展先輅三命之服子産次輅再命之服先輅次輅皆錫車之總名也蓋請於王而錫之晉侯獻楚俘于王王賜之大輅之服戎輅之服大輅金輅也戎輅戎車也二輅各有服公賜公冶冕服辭固強之而後受及將死曰我死必無以冕服斂非德賞也言公畏季氏而賞我夫有勳者旌之以車服傳君賜車馬乘以拜賜衣服服以拜禮魯昭公疾賜子家子環璧輕服公薨反賜於府人曰吾不敢逆君命也古人之服魏太祖平柳城班所獲器特以素屏風憑几賜毛玠曰以君有古人之風故賜以古人之服再命受服大宗伯以九儀之命為人子者三賜不及車馬三命受車馬車馬所以尊者備矣君子得輿易賞其善謀齊侯皆斂諸大夫之軒惟邪意滋乘軒誇榮所賜桓榮春卿為太子少傳賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力可不勉乎孔郭山惲賜服一稱旌忠狄仁傑轉幽州都督賜紫袍龜帶后自制金字十二於袍以旗其忠賜御袍犀帶鄭畋屯渭橋再進司空兼門下侍郎京城四面行營都統賜御袍犀帶拜而不賀賜金紫服羅珦擢廬州刺史淮南節度使杜祐上治狀賜金紫服牙緋沈佺期為弄辭上悅賜牙緋越等牛叢以司勳為睦州刺史賜金紫謝曰臣今衣刺史所假緋即賜紫為越等乃賜銀緋有司奉紫服魚朝恩養息令徽者尚幼為內給使服緑與同列爭忿歸白朝恩明日見帝曰臣之子位下願得金紫在班列上帝未答有司巳奉紫服于前令徽稱謝帝笑曰小兒章服大稱滋不悅章服中書令張嘉正奏致仕者佩魚終身自是百官賞緋紫必兼魚袋謂之章服車服志金章紫服光飾陋軀元稹詩表錦袍寶帶契苾明征吐蕃以戰多進左威衛大將軍襲封賜錦袍寶帶高宗給五品以上隨身銀魚袋以防召命之詐出丙必合之三品以上金飾袋唐車服志唐垂拱中都督刺史始賜魚天授二年改佩魚皆為龜其後三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋唐初賞朱紫者服於軍中其後軍將亦賞以假緋紫有從戎缺胯之服同上貂裘韋挺帝親解貂裘及中廄馬賜之白素屏風見上注賜榖袁渙耀卿為郎中令卒太祖為之流泣賜榖二千斛一窖云以太倉榖千斛賜郎中令一窖云以垣下榖千斛與耀卿家外不解意教曰以太倉榖者官法也以垣下榖者親舊也寵褒毛義賜榖千斛後漢章帝下詔云云五熟釜鍾繇武帝遷相國文帝在東宮賜繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾是幹心膂賜劍史衛綰上賜之劍綰曰先帝賜臣劍凡六不敢奉詔上曰猶至今乎綰曰具在上使取劍常盛未嘗服也賜劍著名韓稜伯師與郅壽陳寵皆以才能稱肅宗嘗賜諸尚書劍惟此三人特以寶劍手著其名曰韓稜楚龍泉郅壽蜀漢文陳寵濟南推誠也賜水不飲卞蘭苦痟渴時帝信巫女用水方使人持水賜蘭蘭不肯飲曰治病自以方藥何信於此帝為變容蘭渴甚以至於死賜肉伏日詔賜從官肉太官丞日晏不來東方朔拔劍割肉去丞奏之詔令自責嫁所賜生口魏華歆子魚公卿嘗並賜沒入生口歆得而嫁之帝歎息孫盛曰孥戮之家國刑所肅歆獨為君子云云孔靈壽杖李靖乞骸骨賜靈壽杖黃金瓶秦叔寶功多帝賜以黃金瓶解佩刀以賜魏徵帝曰貞觀以前從我定天下間關草昧玄齡功也貞觀之後納忠諫正朕違為國家長利徵而已雖古名臣亦何以加親解佩刀以賜二人賜高昌寶佩刀阿史那社爾太宗賜高昌寶佩刀胡瓶太宗賜李大亮胡瓶一云乃朕所自御賜荀悅漢紀李大亮帝賜荀悅漢紀曰悅論議深慱極為政之體公宜繹味之賜貂裘西胡珍器裴矩助城伊吾脅處羅入朝帝益喜賜貂裘西胡珍器黃柑紫帉包賜黃嵩荊州進黃柑帝以紫帉包賜御奩果裴諗加承旨適會帝幸其院諗即稱謝帝曰可歸與妻子相慶取御奩果以賜諗舉衣跽受命帝即顧宮人取巾裹賜之賜所佩金削刀徐齊聃字將道八歲能文太宗召試賜所佩金削刀賜玉帶寶器紈錦張允伸上米鹽賜玉帶寶器紈錦白玉帶李載義賊平詔同平章事賜白玉帶示殊禮賜袍笏裝器為楊至誠所逐奔易州帝令使者抵太原尉迎賜袍笏裝器同上賜寶器泉男生字元德禽高麗詔遣子齎手制金皿即遼水賜勞還進右衛大將軍汴國公賜寶器賜金銀雜皿皆一床王琚誅太平公主帝召宴內殿賜金銀雜皿皆一床以齊府金幣什器賜焉秦王誅齊王元吉尉遲敬德論功第一以齊府金幣什器賜焉賜錦袍金甲張長遜突厥怒引兵南至河長遜世靖出塞勞之且若專致賻賜者虜引還授總管又討薛舉不待命輒引兵會賜錦袍金甲賞馬十五白虢公晉侯朝王王皆賜馬三匹非禮也名位不同禮亦異數錫晉文侯馬書曰平王錫晉文侯馬四匹注作文侯之命晉康侯用錫馬蕃庶易為人子者三賜不及車馬禮康侯之錫見上大驪後漢世祖以所乘大驪賜李忠孔良馬李光顏為深冀行營節度使臨送賜珍器良馬帝賜所乘馬王君廓鎮幽州擊突厥俘斬二千獲馬五十匹入朝帝賜所乘馬令自廷中乘以出賜馬二匹魏徵陳事帝賜黃金十斤馬二匹賜御馬薛仁貴賜以御馬名馬曲環加太子賓客賜名馬賜馬八十泉男生禽高麗還賜馬八十馬百匹李靖輔公祐據丹陽詔李恭為帥召靖入朝受方略禽之江南平賜馬百匹給芻馬二百匹郭子儀德宗嗣位給芻馬二百匹賜名馬一張行成嘗侍燕賜名馬一錢十萬衣一稱賞寶十六白虢公晉侯朝王王皆賜王五穀見上賞馬門注虞卿説趙王一見賜白璧一雙黃金百鎰史記周書分寶玉於伯叔之國時庸展親伯叔同姓之國也庸用也魯昭公疾賜子家見賞車服門金穴郭況為大鴻臚賞賜金錢錦帛豐盛莫比京師號況家為金穴珠璣委地後漢鍾離意子阿為尚書時交趾太守坐贓詔以其資物班賜群臣意得珠璣悉委地不拜曰孔子忍渴於盜泉云云此贓污物故不敢拜帝歎之卻進所賜漢王讓陳平曰先生事魏不忠事楚而去今又從吾遊信者固多心乎平曰魏王不用臣説故去云云臣計畫可採願用之若不可大王所賜金見在請封輸官得請骸骨漢王深謝之孔賜珍器李光顏為深冀行營節度使帝御通化門臨送賜珍器良馬玉帶賜寶器泉男生禽高麗遷賜寶器等列莫與比論弓仁賜寶玉甲第良田等列莫與比賞賚珍寶不勝計蘇定方所滅三國皆生執其主賞賚珍寶不勝計賜寶玩不資河間王孝恭討輔公祐禽之江南平賜寶玩不資賜于闐玉帶李靖破蕭銑賜于闐玉帶十三胯七方六刓胯各附鐶以金固之賜通天御帶裴度往淮西臨遣賜賜金五十斤江夏王道宗賜金五十斤見賞帛門賜珍物薑皎玄宗任藩邸識其有非常度委心焉及即位賜珍物賜金銀一篋尉遲敬德單雄信騎直趍王敬德大呼橫刺雄信墜乃翼王出賜金銀一篋珍賜不可數張垍尚寧親公主玄宗眷垍厚即禁中置內宅珍賜不可數賜弓矢鈇鉞十七白賜弓矢然後征賜鈇鉞然後殺禮册魏公文曰君龍驤虎視旁眺八維掩計逆節折衝四海是用錫君彤弓一彤矢百玈弓十玈矢千又曰以君糾虔天刑彰厥有罪犯關干紀莫不誅殛是用錫君鈇鉞各一注鈇鉞皆斧也平王錫晉文侯彤弓一彤矢百玈弓十玈矢千得專征伐也彤弓以講武習射傳示子孫也晉文公獻楚俘于王王賜之彤弓一彤矢百玈弓矢千彤弓錫有功諸侯也詩飾怒禮軍旅鈇鉞者先王之所以飾怒也賜劍漢衛綰淳謹景帝賜之劍辭曰先帝賜臣劍凡六不敢奉詔孔錫之鈇鉞征彼不憓皮日休納夏歌賜以弓矢冠劍楚馬希範襲殷官爵封楚王清泰二年賜以弓矢冠劍彤弓盧矢權德輿劉濟銘天子賜以寶劍金甲彤弓盧矢賜汝節斧曰度汝其往衣服飲食豫士無寒無飢以既厥事遂生蔡人賜汝節斧平淮西碑帝臨軒授鉞渾瑊拜奉天行營副元帥帝臨軒授鉞用漢拜韓信故事制曰寇賊于紀授爾節鉞以戡多難往欽哉瑊頓首曰敢不畢力以對揚天子休命乃率諸軍趍京師鏚鉞雕戈權德輿韋皋先廟碑進中書令加司徒太尉鏚鉞秬鬯旗鑾雕戈有嚴有翼乃蔚乃赫賞圭瓚十八白禮曰賜土瓚然後鬯未賜圭瓚則資鬯於天子錫玄圭夏書曰禹錫玄圭告厥成功注禹治水畢堯賜之圭璋以其成功也册魏公文曰以君溫恭為基孝友為德明允篤誠感于朕思是用錫君秬鬯一卣圭瓚朝焉注以圭為柄謂之圭瓚也平王錫晉文侯秬鬯圭瓚作文侯之命孔錫虎臣唐文粹皮日休納夏歌王有虎臣錫之土瓚征彼不享一烘而泮大勳文粹高郢魯議周公有大勳于周秬鬯圭瓚以賜之則可賜虎賁十九白册魏公文曰君秉國之鈞正色處中纖毫之惡靡不抑退是用錫君虎賁之士三百人晉文公獻楚俘于王王命為侯伯賜虎賁三百人孔葬加虎賁平陽昭公主以功給賚不涯薨葬加虎賁甲士壯勇人呂尚文選注錫君虎賁曰莊勇人也羅藝以戰力隋補虎賁將詔以兵屬李景擇一虎臣練萬虎賁使制得自專文粹李觀上宰相書賜戶陛二十白册魏公文曰君翼宣風化爰發四方遠人四面華夏充實是用錫若朱戶以居注云朱戶赤戶也天子之禮也又曰君研其明哲思帝所難官才任賢群善必舉是用錫君納陛以登注刻殿基為陛以登取安也孔天子禮唐呂延濟注文選魏元茂魏公九錫文錫君朱戶以居曰天子禮貴之致於兩階之間唐李周翰注文選九錫文選曰錫君納陛以登曰納陛者致於殿兩階之間使其上殿趨出梐枑顏真卿當闕不乘趨出梐枑賜秬鬯二十一白晉文公獻楚俘于王王賜秬鬯一卣卣器也秬黑黍出鬯香灑所以降神也傳平王錫晉文侯書見上云云諸侯賜圭瓚然後鬯見圭瓚門注册魏公見圭瓚門注不再拜禮曰酒囪之賜不再拜受而已不重拜於室輕也孔乃蔚乃赫唐文粹權德輿韋皋廟碑進中書令加司徒太尉鏚鉞秬鬯旗鑾雕戈有嚴有翼乃蔚乃赫大勳文粹高郢魯議周公有大勳于周秬鬯圭瓚以賜之則可賜彝器二十二白周書曰武王既勝殷邦諸侯班宗彝作分器以宗廟彝器班賜諸侯分器篇名也諸侯尊卑各有分也夫有勳者撫之以彝器撫授也傳云孔賜彝樽龍勺牛僧孺字思黯為山南東道節度使賜彝樽龍勺詔曰精金古器以比況君子卿宜少留僧孺固請乃行範金飾玉李玨牛公碑特賜清廟器六事皆範金飾玉如古時製宣曰以卿精忠用以貺別昆蟲鳥獸文乎彝器文粹劉悅文冢銘白漢蘇武自胸奴來賜錢二百萬賜百萬東觀漢記祭彤為遼東太守三十年嘉其功賜錢百萬後漢明帝時館陶公主為子求郎不許而賜錢百萬受賂反賜漢張武為郎中令受金錢覺文帝更發御府金錢賜之以愧其心不下吏也金穴見上注孔賜一爐裴寂武德四年改鑄錢賜一爐得自鑄賜百萬劉世讓討呂崇茂為賊所囚亡歸高祖賜錢百萬有能斬廷湊者賜錢二萬緡王廷湊亂帝怒詔諸道以兵進計有能斬廷湊者賜錢二萬緡賜錢十萬為解酲具李嗣業入朝賜酒玄宗前醉起舞帝寵之賜錢十萬為解酲具賜張行成帝語山東及關中人意有同異行成曰天子以四海為家不宜以東西為限是示人以隘矣帝稱善賜錢十萬白賜絹萬匹文士傳張華以平吳之計賜絹萬匹鳳凰集于新蔡賜汝南太守帛百匹漢宣詔秦二世賜叔孫通帛二十四衣一襲漢書賜之束帛禮賜降胡縑後漢賜降胡縑孫章誤以十為千不賜蜀志趙雲傳街亭敗有軍資餘絹使分賜將士雲曰軍無利何為賜悉入赤岸須十月為冬賜亮善之賜臣帛郭舍人射覆曰賜臣帛也孔賜高年帛正觀五年十二月癸卯獵于驪山賜新豐高年帛賜粟帛十九年二月庚戍如洛陽官丁已賜所過高年鰥寡粟帛賜五千段杜伏威賜帛五千段賜其家千匹劉世讓授總管率兵拒薛舉與弟寶皆沒於賊秦王方屯高托世讓密遣寶間走王言賊虛實高祖悅賜其家千匹賜物五百段竇琮從劉文靜擊屈突通進兵下陝縣拔太原倉賜物五百段録功李靖御史大夫蕭瑀劾靖持軍無律帝召讓之徐曰赦公之罪録公之功賜絹千匹既而曰向人譖短公朕令悟矣加賜絹二千匹特賚綵千段屈突通從平薛仁杲珍用山積諸將爭得之通獨無所取帝曰清以奉國名實不虛特賚綵千段賜縑三萬張煦振武遂節度使憲宗怒詔煦以本軍進討賜縑三萬為軍資江夏郡王道宗帝討高麗先遣張儉輕騎度遼道宗請以百騎往約其還日將還會高麗兵斷其路更走間道謁帝如期賜絹千匹賜絹五千匹劉師立録功拜左衛率遷左驍衛將軍襄武郡公賜絹五千匹賜雜綵百匹李尚隱妖賊劉定高夜犯通洛門尚隱坐不素覺左遷桂州都督帝遣使勞曰知卿公忠然國法須爾因賜雜綵百匹遣之白石窖齊侯戰敗單還女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也豫之石窖注奔謂走辟君有禮謂先問君後問父石窖邑名賞延于室婦人無爵從夫之爵恩自宸極榮及閨門孔賜以宮人李君羡從破宋金剛於介休加驃騎將軍賜以宮人贈帛賜美人六人郭子儀賜美人六人從者自副車服帷帟咸具玄宗以宮人賜知運等王晙玄宗以宮人賜知運等晙獨不敢取曰臣之事君猶子事父詎有常近闈掖而臣子敢當乎誓死以免見聽賜宮人薑皎太宗在藩邸職其有非常度及即位賜宮人賜女樂一部竇抗從秦王平薛舉功第一賜女樂一部賜宮女二人唐史泉男生攻平壤還進右衛大將軍汴國公賜寶器及宮女二人
