body:
  text: 卷第三十六白孝理化成理定制禮教成悅隨聖人順動而天下悅隨欣戴樂推悅服垂拱恭己法天地之德聲教無為不嚴而理勝殘去殺民猶支體以百姓心為心百度惟貞九功惟序水火金木土榖正德利用厚生謂之九功文治文明休明明備之朝禮樂備也天下和平王道用成天下為公大同同和平也富有天下天子有善讓之於天覆載所及致之於升平照臨所加納之於仁壽帝道王獻四時成萬物睹凝命正位凝命表正萬邦誕膺天命無疆之休澤及四海萬邦作孚帝命式於九圍守在四夷天下有道德配天地明並日月納隍之慮解網之仁湯王解網無為而治泣辜聰明天聽惟德動天承天之休蓋之如天率土之濱莫非王臣罪己禹湯罪己其興勃焉天下自正海外有截言化齊整也作民父母建皇極立大中之德帝德一孔神武聖文冠卓千古長孫無忌帝嘗從容問曰朕聞君聖臣直人嘗苦不自知公宜面攻朕得失無忌曰陛下神武聖文冠卓千古性與天道非臣等愚所及誠不見有所失天下大治魏征帝納之不疑至是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺戶闔不閉行旅不齎糧取給於道帝謂群臣曰此徵勸我行仁義既效矣惜不令封德彝見之清淨寡欲化被荒外徵上疏曰陛下在貞觀初清淨寡欲化被荒外焚寶衣毀廣殿安處卑宮又曰焚寶衣毀廣殿安處卑宮德之上也不悅聲色魏謨上言陛下即位不悅聲色于今十年好文辭張說帝好文辭有所為必使視草太平無象牛僧孺它日延英召見宰相曰公等有意於太平乎何道以致之僧孺曰臣待罪宰相不能康濟然太平亦無象今四夷不內擾百姓安生業私室無疆家上不壅蔽下不怨讟雖未及至盛亦足為治矣而更求太平非臣所及聰明寬厚代宗聰明寬厚喜慍不形於色好學強記通易象澤久而愈深仁增而益高柳宗元貞符曰十聖濟厥治孝仁平寬惟祖之則澤久而愈深仁增而益高人之戴唐永永無窮德邁羲黃一品集陛下文德邁于羲黃武功高于周漢英武任賢寬仁厚物吳武陵吳元濟叛武陵遺以書今天子英武任賢同符太宗寬仁厚物有玄宗之度靈武乞正位號裴冕初冕在河西召還而道遇太子平涼遂從至靈武與杜鴻漸崔倚同辭進曰主上厭于勤且南狩蜀宗社神器要須有歸今天意人事屬在殿下宜正位號有如逡巡失億兆心則大事去矣凡五請卒見聽動物悟人裴劉贊帝王之將興其威靈氣焰有以動物悟人者也上恬下嬉權德輿贊禍難已平上恬下嬉葉氣嘉生薰為太平循吏序乾清坤夷境落騫舉韓愈元和聖德詩垂旒黈纊匿瑕藏疾陸相奏議蓋之如天容之如地垂旒黈纊而黜其聰察匿瑕藏疾而務于包含不示威而人畏之如雷霆不用明而人仰之如日月天子之德也禹不自滿成不敢康罔般于田不邇于色自閨壺以施王教由家道而形國風會昌二年尊號冊文祈玄祖而膏雨降祀靈岳而嘉穀登同上攘祅鏟凶復張太平裴潾萬寓晏清李華含元賦四海寧一柳宗元四海寧一萬類蕃滋海波不驚李庾東都賦開元太平海波不驚煙塵不動劉軻囊琛走道曾無虛日咫尺萬里煙塵不動錢鏟甲兵之問不至於廟堂韓愈風揮日舒咸順號令上天戈所麾莫不寧順潮州刺史謝表陛下即位以來躬親聽斷旋乾轉坤關機闔開雷厲風飛日月清照天戈所麾莫不寧順明照無私幽隱必達上赫赫巍巍超今冠古上經營乎無為之業游息乎混元之宮上地彌天區界軼海外上詫業發神豐編照物偕籍于堯典差光于大陽來鵠聖政頌白惟德動天感于神明書至德馨香感于神明至德光大動于天地戩谷大賚休徵嘉瑞禎祥福應史不絕書有道則見天不愛其道降甘露地不愛其寶出醴泉坤珍降祉呈祥瑞命式揚帝祉靈物瑞圖天降茂祉神表靈貺非天私我皇家天地之心見表無疆之休效靈白魚火烏史記武王渡河中流白魚躍入于王舟鱗介兵象白者殷家色白明殷當授于周又有火復于王屋流為烏嘉榖玄稷金芝九莖漢宣時嘉榖玄稷降于郡國金芝九莖產於函德殿銅池中金芝色如金銅池承霤也威鳳鳳有威儀者神雀山呼萬歲漢武封梁甫時洛出九疇洛出書孔安國云河圖即八卦是洛書即九疇是非煙飲醴光武中元二年幸長安祠長陵還洛陽宮是時醴出京師郡國飲醴者痼疾皆愈獨眇蹇者不差華平朱草蓂莢日曆得其分則蓂莢生慶雲卿雲浪井典略曰浪井不鑿而成孫氏瑞圖曰浪井不鑿而成者清淨則水流有仙人至或云神鼎丹甑醴泉浪井為大瑞式云麟鳳鸞龍騶虞白澤神馬為大瑞隨即奏之應奏不奏杖八十又式云玄珠明珠玉英曰白玉赤文紫玉黃鐵金縢並為上瑞又云秬黍嘉禾芝草華木並為下瑞三秀五雲野榖旅生野蠶成繭光武時異畝同穎唐叔得禾連理景星常見可以夜作皇道無為帝德有象日再中晉羅含在任有白雀棲集堂宇及致仕還家階庭忽蘭菊叢生以為德行之感孔二龍之符高祖皇后竇氏始太宗生有二龍之符后於諸子中愛視最篤飛雉數集宮中褚遂良立晉王為皇太子時飛雉數集宮中帝問是何祥也遂良曰昔秦文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寶雞祠漢光武得其雄起南陽有四海陛下本封秦故雄雌並見以告明德帝悅曰人之立身不可以無學遂良所謂多識君子哉三月大雨雪群臣入賀王求禮久視二年三月大雨雪鳳閣侍郎蘇味道等以為瑞率群臣入賀求禮讓曰宰相燮和陰陽而季春雨雪乃災也果以為瑞則冬月雷渠為瑞雷邪味道不從求禮以瑞何感而來以符瑞自神取山川草樹名有武字者裒類以聞姚璹貶桂州長史后方以符瑞自神璹取山川草樹名有武字者以為上應國姓裒類以聞后大悅新豐山因震突出則天皇后武氏臨朝新豐有山因震突出太后以為美祥赦其縣更名慶山改元五鳳竇建德冬至大會僚吏有五大鳥集其宮群鳥從之又宗城人獻元圭一孔德紹曰昔天以是授禹今瑞與之侔國宜稱夏建德然之改元五鳳嘉禾代宗立為皇太子初太子生之歲豫州獻嘉禾於是以為祥乃更名豫嘉符瑞事岑長倩武后擅位嘉符瑞事群臣爭言之長倩懼間亦開陳瑞石李嶠武后時汜水獲瑞石嶠為御史上皇符一篇為世譏薄柳宗元貞符曰商之王以桑榖昌以雉雊大宋之君以法星壽鄭以龍衰魯以麟弱白雉亡漢黃犀死莽惡在其為符也貓鼠同乳崔祐甫會朱泚軍中貓鼠同乳表瑞詔示袞袞率群臣賀祐甫獨曰可弔不可賀詔使問狀對曰臣聞禮迎貓為其食田鼠以其為人去害雖細必錄今貓受畜於人不能食鼠而反乳之無乃失其性邪休符佳瑞元結時議休符佳瑞相繼而有乾符坤珍唐文粹張說封禪頌乾符坤珍千品萬類雲物告符張曲江龍池頌木火更王雲物告符有若狼銜鉤魚躍舟素靈出黃星見蝸跡成天睿宗為冀王時寢壁間蝸跡成天字掃之數日如初及即位雕玉鑄金為蝸形置道釋像前酉陽雜俎大瑞則百官詣闕奉賀凡景雲氣慶雲為大瑞其名物六十有四白狼赤兔為上瑞其名物三十有八蒼烏朱鴈為中瑞其名物三十有二嘉禾芝草木連理為下瑞其名物十四大瑞則百官詣闕奉賀餘瑞歲終員外郎聞有司告廟百官志白咸五登三七十二家北里之禾一茅三脊史記自古受命曷嘗不封泰山禪梁甫者七十二家北里之禾以為盛一茅三脊以為籍助天報地太山萬物之始封太山助天之高禪梁甫報地之厚也山呼萬歲漢武時禪嵩山有呼萬歲之聲三乃以三百戶封為祠戶漢武勒而虛美相如有請封禪書頌踐三五之遙跡踵八九之遐武文選八九謂七十二君也白雲起風中史記漢武封太山白雲起封中雲氣成宮闕後漢光武封泰山雲氣成宮闕探策風俗通曰封太山者說山上有金匱玉策能知人壽修短漢武探策得十八因倒讀八十其後果壽八十升中禮因天事天因山升中于天於皇時周陟其高山詩壇高廣刻石辭武紀孟康注王者功成化定告成功於天封崇也助天之高刻石紀續有金策玉面金泥玉撿之封應劭曰封者壇廣十二丈高三丈階三等必於其上示崇高也刻石紀績立石三丈一尺辭曰事天以禮立身以義事親以孝育人以仁四守之內莫不為郡縣八蠻四夷咸來貢職與天無極人民蕃息天祿永得上玄酒而俎生魚下禪梁甫祀地主示增廣也此古制成帝封廣一丈二尺有縢書祕語師古曰封上於山而下禪祭於地主也禪云亭管仲曰封禪者七十二家所記十有二無懷封太山禪云亭黃帝禪云亭誰敢欺天後漢建武中群臣言宜封禪詔曰百姓怨氣滿腹誰敢欺天汗出魏蔣濟上疏請封禪詔曰聞斯言汗出流足嵩高六合之中何必太山袁子正論云孔造天樞著功德姚璹後造天樞著己功德命璹為使董督之功費浩廣見金不足乃斂天下農器並鑄以功賜爵揭碑盧龍張仲武請以本軍擊回鶻詔拜仲武副大使會回鶻特勒那頡啜擁赤心部十千帳逼漁陽仲武使其弟仲至與別將游奉寰等率銳兵三萬破之回鶻遂衰名王貴種相繼降捕幾千人仲武表請立石以紀聖功帝詔德裕為銘揭碑盧龍以告後世神武雄斷智出無方陛下神武雄斷智出無方震天威以霆聲掃獯戎而瓦解贊皇集進紀聖功碑豈比周穆犬戎之征荒服不至漢武馬邑之伐群帥無功同上紀軒后之功徒知竭思敘唐堯之德終愧難名漢武臺刻石紀功太宗本紀正觀十九年敗高麗九月癸未班師十月丙辰皇太子迎謁子臨渝關戊午次漢武臺刻石紀功天樞置端門外則天皇后武氏武三思等請作天樞紀太后功德乃使納言姚璹護作乃大裒銅鐵合冶之署曰大周萬國頌德天樞置端門外其制若柱度高一百五尺八面面五尺冶鐵象山為之趾負以銅龍石鑱怪獸環之柱顛為雲蓋出大珠高丈圍二之作四蛟度丈二尺以承珠其趾山周百七十尺度二丈無慮用銅鐵二百萬斤乃悉鏤群臣蕃酋姓名其上白握乾符披皇圖稽帝文俯葉河圖之靈並見文選河出馬圖明王之理天下也天不愛其道地不愛其寶故河出馬圖謂龍馬負圖也有道則見受命之符龍馬出圖於河伏羲觀之以畫八卦神龜負書於洛夏禹負之以成九疇錫禹尚書云天乃錫禹洪範九疇彝倫攸敘藏氣讖緯河洛開奧符命用出文選玄德升聞皇天眷命秘文後漢荀卿臨終戒子統曰吾綈祑中有先祖所傳秘記為漢家所用爾其修之統遂學焉朝廷多訪之以讖命官見司空門尹敏通博經史帝使校圖讖敏增之曰君無可為輔帝不罪亦以沉滯孔姓名已著謠籙許世緒并州人知隋將亡請唐公曰隋政不綱天下搖亂姓名以著謠錄名在圖籙竇杭與高祖少相狎及楊玄感反謂高祖曰為我先耳李氏名在圖籙天所啟也符讖楊嗣復帝問符讖可信乎何從而正嗣復曰漢光武以讖決事隋文帝亦喜之故其書蔓天下班彪王命論有所引述持以止賊亂非重之也李玨曰治亂宜直推人事帝曰然大雲經則天武氏拜薛懷義鄂國公令與群浮圖作大雲經言神皇受命事春官尚書李思文詭言周書武成為篇辭有垂拱天下治為受命之符后喜皆頒示天下唐應為金德裴光廷時有建言唐應為金德者中書令蕭嵩請百官普議光廷以唐符命表著天下久矣不可改亟奏罷之陳符命宗楚客常諷右補闕延禧陳符命以媚帝曰唐有天下當百世繼周陛下承母禪周唐一統其符兆有八天皇再以陛下為周王是在唐興周則天立陛下為皇太子是在周興唐一也天后立文王廟二也唐同泰洛水圖云永昌帝業三也讖曰百代不移宗四也孔子曰百世繼周五也桑條歌應二聖在位九十八年而子孫相承九十八世六也乃二月慶雲五色天應以和七也六月九日內出瑞蒜八也起則天為一世聖朝為二世後子孫相承九十八其數正滿百世唐之曆乃三千餘年帝大喜受命之符仲尼敘書於堯曰克明俊德於舜曰濬哲文明於禹曰文命祗承于帝於湯曰克寬克仁彰信兆民於武王曰有道曾孫稽揆典籍信哉唯茲德實受命之符柳文唐公名在圖籙柳楚賢大業中為河北縣長高祖兵興堯君素劇郡固守楚賢說曰隋之亡天下共知唐公名在圖籙動以誠信豪英景赴天所贊也君子見幾而作俟終日邪君素不從楚賢潛行自歸牛繼馬元行沖初魏明帝時河西柳谷出石有牛繼馬之象魏收以晉元帝乃午氏子冒司馬姓以著石符行沖謂昭成帝名犍繼晉受命獨此可以當之圖緯姜謨薛舉寇秦州以謨山西豪望詔安撫隴外委以便宜將行請曰公天人之望已屬宜膺圖緯光有神器謨老矣恐先朝露幸一見踐祚死不恨高祖嘉納受河圖而定王籙在昔黃帝受河圖而定王籙宓羲得神蓍而垂皇策堯配璇璣玉衡以齊七政繼成六德文王獲赤雀丹書而演道定謨予亦以謂禹探其穴得開世之符見文粹禹穴碑銘鄭魴天寶符出開天傳唐開元末於弘農古函谷關得寶符白石赤文正成桑字識者解之云桑者四十八所以符聖人御曆之數也及帝幸蜀之來歲正四十八年龍負圖而大舜登狼銜鉤而后殷昌元圭錫於夏禹赤伏歸於漢光應運協符希代稱寶張說頌通玄受讖步秘策則天皇后傳治銅匭北曰通玄受讖步秘策封禪五白登封降禪齊乎黃軒文選登岱勒封與黃比崇黃帝封岱勒成以紀太平之功玉牒石紀金字閉以玉撿封以金泥紀聖號編金冊紀禪告成紀德銘功孔封禪大使李勣帝東封泰山為封禪大使贊圖封禪事竇封玄居位數年贊圖封禪事與李勣皆為使劉祥道為司禮太常伯高宗封泰山有司請太常卿亞獻光祿卿終獻祥道建言三代六卿重故得佐祠漢魏以來權歸臺省九卿為常伯屬官今封岱大禮不以八座用九卿無乃徇古名忘實事乎帝可其議以司徒徐王元禮亞獻祥道終獻也四國酋長赴會劉仁軌及封太山仁軌乃率新羅百濟儋羅倭四國酋長赴會天子大悅封禪者所以告成功也裴光廷玄宗有事岱宗中書令張說以天子東巡京師空虛恐夷秋乘間竊發議欲加兵守邊召光廷與謀對曰夫告成功者德無不被人無不安萬國無不懷今將告成而懼夷狄非昭德也大興力役用備不虞非安人也方謀會同而阻戎心非懷遠也此三者名實乖矣倡對禪議張說倡封禪議受詔與諸儒草儀多所裁止禮既畢行物亦隨耗元稹策明皇即位任姚宋而右賢能也雖禹湯文武之俗不能過焉四十年間刑罰不試人用滋殖四海大和於是舉升中告禪之儀則封太山而秩嵩華念歲巡時邁之典則去咸鎬而朝洛陽禮既畢行物亦隨耗果得相如草仍餘封禪文李百器將微君東巡泰山奏功皇天韓愈潮州刺史謝上表宜定樂章以告神明東巡泰山奏功皇天具著顯庸明示德意使永永年代服我成烈李百藥勸封禪表六宗五帝禋祀惟永名山大川饗祀無輟又伏願御六氣之辨順四序之和升彼岱宗具新盛禮聽萬歲之迭饗紹千載之遐蹤大號柳宗元貞符曰漢用大度克懷於有氓而其臣妾乃小取虺蛇上引天光推類號休用誇誣于無知氓增以騶虞神鼎脅敺縱踴俾東之太山石閭作大號謂之封禪皆尚書無所有岑文本勸封禪表禋六宗而報上帝班五瑞而朝諸侯撰玉牒真紀謝偃撰玉牒真紀以勸封禪禪梁甫蘇頲吐番盜邊諸將數敗虜益張秣騎內侵帝怒欲自將兵討之頲復上言陛下發定禍亂方當深視高居制禮作樂禪梁甫登空峒何至厭天居衽金革為一日之敵封禪書房琯開元中作封禪書說宰相張說說奇之奏為校書郎四十六事之著明七十二封之可識表讖記奏河圖四十六事之著明登泰山禪梁甫七十二封之可識嵩山啟毋廟碑文粹崔融以周公之故將孔子之後文粹蘇頲東封朝覲頌序國鄒魯家洙泗乘汶野而圖記可知指泮林而頌聲不墜以周公之故將孔子之後翹然希王者之屬車聖人之清蹕大禋旅之數重褒成之祿墳作四而藉言七也行七十二君壇跡太宗已平突厥而年榖屢豐群臣請封太山太宗初頗非之已而遣中書侍郎杜正倫行太山上七十二君壇跡唐禮志封禪議左僕射房玄齡特進魏徵中書令楊師道博採眾議奏上之其議曰為壇於太山下祀昊天上帝壇之廣十二丈高丈二尺玉牒長一尺三寸廣厚五寸玉檢如之厚減三寸其印齒如璽纏以金繩五周玉策四皆長一尺三寸廣寸五分厚五分每策皆五簡聯以金昊天上帝配以太祖皇地祗配以高祖已祀而歸格干廟盛以金匱匱高六寸廣足容之制如表函纏以金繩封以金泥印以受命之璽而玉牒藏于山上以方石三枚為再累纏以金繩封以石泥印以受命之璽其山上之圓壇土以五色高以尺廣五丈四面為一階天子升自南階而封玉牒已封而加以土築為封高一丈二尺廣二丈其禪社首亦如之其石檢封以受命璽而玉檢別製璽方一丈二分文如受命璽以石距非經不用又為告至壇方八十一尺高三尺四出陛以燔柴告至望秩群神遂著于禮其他降禪朝覲皆不著乾封元年封泰山高宗乾封元年封泰山為圓壇山南四里如圓丘三壝壇上飾以青四方如其色號封祀壇玉策三以玉為簡長一尺二寸二分厚三分刻而金文玉匱一長一尺三寸以藏上帝之冊金匱二以藏配帝之冊纏以金繩五周金泥玉璽璽方一寸二分文如受命璽石䃭以方石再累皆方三尺厚一尺刻方其中以容玉匱䃭旁施檢刻深三寸三分闊一尺當繩刻深三分闊一寸三分石檢十枚以檢石䃭皆長三尺闊一尺厚七分印齒三道皆深四寸當璽方五寸當繩一寸五分檢立於䃭旁南方北方皆三東方西方皆二去䃭隅皆一尺䃭纏以金繩五周封以石泥距石十二分距䃭隅皆再累皆闊二尺長一丈斜刻其酋令與䃭隅相應又為壇於山上廣五丈高九尺四出陛一壝號登封壇玉牒玉檢石䃭石距王匱石檢皆如之為降禪壇於社首山上八隅一成八陛如方丘三壝上飾以黃四方如其色其餘皆如登封其議略定而天子詔曰古今之制文質不同今封禪以玉牒金繩而瓦尊匏爵秸席宜改從文於是昊天上帝褥以蒼地祗褥以黃配褥皆以紫而尊爵亦更焉刊定儀注玄宗開元十二年四方治定歲屢豐稔群臣多言封禪中書令張說又固請乃下制以十三年有事太山於是說刊定儀注立圓壇於山上廣五丈高九尺土色各依其方又於圓壇上起方壇廣一丈二尺高九尺其臺四面為一階積柴為燎壇於圓臺之東南量地之宜柴高一丈二尺方一丈開上南出戶六尺為民祈福玄宗問前世何為秘玉牒賀知章曰玉牒以通意於天前代或祈長年希神仙旨尚微密故外莫知帝曰朕今為民祈福無一祕請即出玉牒以示百僚其登山也為大次於中道止休三刻而後升其已祭燔燎侍中前跪稱具官臣某言請封玉冊皇帝升自南陛北向立太尉進昊天上帝神座前跪取玉冊置於案以進皇帝受玉冊跪內之玉匱纏以金繩封以金泥侍中取受命寶跪以進皇帝取寶以印玉匱侍中受寶以受符寶郎太尉進皇帝跪奉玉匱授太尉太尉退復立太常卿前奏請再拜皇帝再拜退入于次太尉奉玉匱之案於石䃭南北向立執事者發石蓋太尉奉玉匱跪藏於石䃭內執事者覆石蓋檢以石檢纏以金繩封以石泥以玉寶遍印引降復位帥執事者以石距封固又以五色士圜封其配座玉牒封於金匱皆如封玉匱太尉奉匱從降俱服位以金匱內太廟藏於高祖神堯皇帝之石室其禪于社首皆如方丘之禮雷公伐鼓杜甫西岳賦雷公伐鼓而揮汗樂師拊石而具發七十二君罕能兼之封禪之事獨軒轅氏得之夫七十二君罕能兼之其餘或蹶踣風雲碑版祠廟終么麼不足進數告成上云亭考古垂矩矱韓愈聯句神位往古封禪之文皆闕不載其玉檢文亦祕代莫得知開元十三年上封太山乘馬直造山頂亦有一二大臣得從焉其玉檢文為蒼生祈福當時不祕人得以知之矣開元十三年十月封祀泰山去山距五里西去社首山三里帝以靈山清潔不欲多人上欲初獻於山上壇行事亞獻終獻終山下壇行事召禮官學士賀知章講儀注因問知章等奏曰昊天上帝若位五方精帝臣位帝號雖同而君臣各異陛下享君位于山上群臣祀臣位于山下誠足以垂範來葉為變禮之大者也禮成子三初獻亞終合於一處於是五獻悉於山上行事其五方帝及諸神座於山下壇行事玉牒詞曰有唐嗣天子臣某敢昭告于昊天上帝天啟李氏運興土德高祖太宗受命立極高宗升中六合殷盛中宗紹復繼體不定上帝眷祐錫臣忠武底綏內難推戴聖父恭承大寶十有三年敬若天意四海晏然封祀岱岳謝成於天子孫白祿蒼生受福庚寅祀昊天上帝于山上封臺之前壇高祖神堯皇帝配享焉又為其銘曰維天生人立君以理維君受命奉天為子代去不留人來無已德涼者滅道高斯起赫赫高祖明明太宗爰革隋政奄有萬邦罄天張宇畫地開封武稱有截文表時雍高宗稽古德施周溥茫茫九夷削平一鼓禮備封禪功齊舜禹巖巖代宗衍我神主中宗紹運舊邦惟新恭己南面氤氳化淳告成之禮留諸後人緬余小子重基五聖匪功成高匪德務盛欽若祀典丕承永命至誠動天福我萬姓古封太山七十二君或禪繹繹或禪云云其跡不見其名可聞祗通文祖光昭舊勳方士永誕儒書不足佚后求仙誣神檢玉秦災風雨漢汗編錄德未合天或承之辱道在觀政名非從欲銘心絕巖播告群岳通典禪草遺忠空留茂陵之下文粹韓休蘇頲集序藩夷酋長入仗內呂向從帝東巡帝引頡利發及藩夷酋長入仗內賜弓矢射禽向上言鴟梟不鳴未為瑞鳥豺狼雖伏不曰仁獸況突厥安忍殘賊莫顧君父陛下引內從官陪封禪盛禮使飛鏃於前荊卿詭動何羅竊發逼嚴蹕冒清塵縱醢單于汗穹廬何以塞責帝順納東封詔張說撰刻張說倡封禪儀多所裁正天意未合唐褚遂良帝將有事泰山至洛陽星孛太微犯郎位遂良諫曰陛下撥亂反正功越古初方告岱宗而彗輒見此天意有所未合封禪之義有三三者何一位當五行圖籙之序二時會四海昇平之運三德具欽明文思之美張說封禪頌藉三脊盛六德不召斯至擁休之類如山則委曷用而祕蘇頲頌白王有巡狩省四方也傳以大習之大習朝會之禮展義天子非展義不巡狩注所以宣布德義卜征又曰先王卜征五年注先巡五年而卜吉凶也征巡狩也歲習其祥祥習則行五年五卜皆吉則行小有述職大有巡功時巡書曰又六年王乃時巡注十二年一巡以時而巡先王以省方觀民設教易觀卦宣皇明以燭幽究皇儀展帝功乘六龍翠蓋遲遲並文選備法駕上順天時旁求人瘼必蹕禮言觀其旂東巡虞書二月東巡狩至于岱宗柴注岱宗泰山也燔柴以告天肆覲東后遂見東方之君南巡五月南巡狩至于南岳如岱禮西巡八月西巡狩至于西岳如初朔巡十有一月朔巡狩至于北岳如西禮朔北也歸格于藝祖用特五載一巡狩群后四朝東征西怨湯書奚獨後予怨者辭也攸徂之民室家相慶曰徯我后后來其蘇蘇息也撫萬邦巡侯甸周書成王成有歧陽之蒐穆有塗山之會皆示諸侯禮也時邁巡狩告祭柴望詩大明黜陟黜陟幽明膳以犢禮天子適諸侯諸侯膳以犢貴誠也陳詩觀風命市納賈以觀人之好惡春省耕而補不足秋省歛而助不給偽遊雲夢漢高祖擒韓信望幸明黜陟之分則有巡功崇望秩之儀是稱展義述邦職以省方觀人風而展義周禮掌舍掌王會同之舍設梐枑再重注梐枑行馬也設宮車轅門注謂王行止宿險阻之處備非常次車以為藩則御車以為其表門為帷宮則設旌門注謂晝止若食其張帷為宮則樹旌以表門無宮則供人門注謂王行有逢遇若住游觀陳列周衛則立長大人表門也西成之望既登陳巡之禮斯備將順其動無逆於時五載一巡自東而北問其百年視其三老每巡狩皆歲視老三公致仕之老明其三德三德者至德孝德敏德也孔幸東都褚無量開元五年帝將幸東都無量上言昔虞舜之狩秩山川遍群臣漢孝景祠黃帝橋山孝武祠舜九疑高祖過魏祭信陵君墓過趙封樂毅後孝章祠桓譚塚願陛下所過名山大川丘陵墳衍古帝王賢臣在祀典者並詔致祭偃翠華而徘徊建中末德宗南狩偃翠華而徘徊簫勺之音洽于巴漢劉禹錫山南西道節度使廳壁記黃屋順動狩于巴梁建中四年京師急變黃屋順動狩于巴梁公徒步間道以歸王所奚公神道碑同上單車詣行在所文粹皇居失守大駕東狩太傅許公正皇儲立母后朝廷人安單車詣行在所肉袒徒跣雪泣上言曰廟主不行陵寢不告蒼黃順動莫知攸往況西無正名之伐東異省方之行南征無復國之期北濟乏召君之慮當關右不遠王畿未虧巡狩之名免負出君之恥乃睠是邦因駐清蹕文粹少華山佑順侯碑唐鄴馳洛邑騖襄城文粹嵩山啟母碑省方巡狩舉星畢曳雲稍召鳳伯以清塵命山靈而護野馳洛邑騖襄城崔融詔蹕鳴鸞文粹少姨廟碑楊炯譔詔蹕鳴鸞巡漢皇之中嶽告於其方之州天子巡狩告於其方之州曰皇帝以某月巡狩各修乃守沒考乃職事敢不儆戒國有常刑唐禮樂志問高年將發告于圓丘前一日皇帝齋如郊祀告昊天上帝又告于太廟社稷具大駕鹵簿所過州縣刺史令候於境通事舍人兼制問高年祭古帝王名臣烈士既至刺史令皆先奉見將作築告至圓壇於嶽下四出陛設昊天上帝配帝位天子至執事皆齋一日明日望於嶽鎮海瀆山川林澤丘陵墳衍原隰所司為壇肆覲明日乃肆覲將作於行宮南為壝三南陛之西文武官次門外東西刺史令次文官南番客次武官南列輦路壇南文官九品位壝東南武官西南相向刺史令位壇南三尺庭一蕃客位於西又設門外位建牙旗於壝外黃麾大仗屯門鈒戟陳壝中吏部主客戶部贊群官客使就門外位刺史令贄其土之實錦綺繒布皆五兩為束飾以黃帊常貢之物皆篚獻壤奠戶部導貢物入刺史前龜首之金次之丹漆絲纊四海九州之美物重行陳執者退就東西文武前側立通事舍人導刺史一人解劍脫舄執贄升前北向跪奏官封臣姓名敢獻壤奠遂奠贄舍人跪舉以東授所司刺史劍舄復位日轡日轡方旋張說封禪頌幸東京將親征蘇源明史思明陷洛陽有詔幸東京將親征源明上疏極諫天子順動人皆幸之之謂幸人皆病之之謂不幸請先謁陵廟而即宮顏真卿改尚書右丞帝自陝還真卿請先謁陵廟而即宮宰相元載以為迂真卿怒曰用捨在公言者何罪然朝巡事豈堪公再破壞邪載銜之五狩朝恆岱韓愈聯句朝會七白周禮春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同春朝圖天下之事秋覲以比邦國之功夏宗以陳天下之謀冬遇以協諸侯之慮時會以發四方之禁殷同以施天下之政九賓之儀自公侯至士也三揖之禮天子鄒陽云云聲明文物端旒負扆來王九品陳儀四方述職恭已南面垂拱咸造勿褻在王庭造至也褻慢也畢會和見書和見事於周朝而獻功於是有容貌釆章朝會禮之經也周康有酆官之朝穆有塗山之會皆視諸侯禮也講禮傳曰諸侯歲聘以志業間朝以講禮再朝而會以示威也五服有辟六年五服一朝大明黜陟周書駿奔和會無敢不庭罔有後至肅穆退朝正位正君臣之位辨色禮曰朝辨色始入注群臣皆辨色乃入朝也視朝君日出而視朝慢朝懈位趣朝於鳳闕就列於鵷行會以訓上下之則朝以正班爵之義帥長幼之敘禹會諸侯於塗山執玉帛者萬國天子無事與諸侯相見曰朝禁慢朝錯立族譚者周禮皆謂不肅敬者有疾魏鍾繇元帝時有疾拜起不便時華歆亦以高年疾病朝見皆便載輿虎賁上輿上殿就座是後三公有疾以為故事有度霍光每出入下殿進止有常度一二臣衛敢執壤奠書韓侯入覲以其介圭詩庭燎之光君子至止鸞聲鏘鏘諸侯朝正於王傳王覲為可石碏謂州吁云云述職諸侯朝天子曰述職名位有數車服有庸方明儀禮覲禮曰諸侯覲於天子為宮方三百步四門壇十有二尋深四尺加方明於其上方明者木方四尺設六色東青南赤西白北黑上玄下黃設六玉上圭下璧南璋西琥北璜東圭注云深高也四時朝覲受於此時會殷同也宮謂櫃上為壇以象牆璧為宮於國外春會同於東方夏南方秋西方冬北方夫方明者上下四方之神所謂神明也會同而盟明神監之則謂天之司盟猶宗廟之有主王巡狩至岳下諸侯亦為入宮以見之朝既盈矣昌矣高皇帝之朝巡鄧通方倖在上傍怠慢丞相申屠嘉入曰朝廷之儀不可不肅罷朝召通曰高皇帝之朝巡小臣不敬當斬帝使赦通曰此吾弄臣也將朝尚早趙宣子盛服將朝尚早坐而假寐孔張失位違位越班委積膳獻餐牽敝器周禮宰夫凡朝廷會同賓客以禮之法掌其委積膳獻飲食賓牢賜之餐牽與其陳數庭實旅百玉帛相見謂好會也諸侯麇至麇群也庭爭相叱後漢詔議還北虜生口公卿皆言不宜還司徒桓虞改議安帝從鄭弘第五倫皆悵之弘欲激厲虞因大言曰當還者皆不忠虞廷叱之倫皆作色司肄奏謝詔云云何尤而謝又張酺孟侯太尉與司隸晏稱共謝闕下酺因責讓稱其辭語不遜酺遂廷叱之司徒呂蓋奏酺位三司知公門宜屏氣以領詔命反作色大言云云遂策免制朝儀叔孫通與弟子徵魯諸生共起朝儀習之月餘會十月諸侯朝百官各以次陳列臚句傳皇帝輦出房闥帝曰吾乃知皇旁之貴朝有著定著定列位之處會有表表亦位也表著之位所以昭事序脩其班制禮鵷行鳳闕官由位序朝以禮成君召語曰君命召不俟駕行矣禮曰在官不俟屨在外不俟車九儀大行人以九儀辨諸侯之位偏駕不入王門儀禮入王門乘墨車陵三軍者或懼於朝廷之儀左九棘孤卿大夫位焉右九棘公侯伯子男位焉此周禮外朝之位鞭呼司土率其屬以鞭呼趨朝且辟禁慢朝錯立族譚禁慢朝錯立族譚者輟朝而顧不有異事必有異慮朝言不及犬馬濟濟翔翔朝廷之美左嘉石右肺石鞠躬外蕃朝漢宣甘露年匈奴呼韓耶單于款五原塞願奉國珍朝詔議班次有司曰聖人之禮先京師後諸夏先諸夏後夷狄陛下聖德充塞單于嚮風奉珍朝賀自古未之有禮儀宜如諸侯王位下蕭望之以為聖人正朔不及四夷外而不內宜待客禮後不至不為叛臣宜以客禮待之位次諸侯王上詔從之大行臚句傳傳語告下曰臚下告上曰句大行今鴻臚也問朝儀後漢竇融將會大軍先遣從事問會見之儀時軍旅之世帝聞融禮儀甚善之宣告百寮三公領兵入見魏世語曰舊制三公領兵入見皆交戟義頸而後前太祖將討張繡入見天子始復此制帶劍入後漢梁冀帶劍入省尚書張夌呵叱令出冀跪拜謝凌凌不應因劾奏詔以一歲俸贖罪設燈魏武都鄴正會文昌殿用漢儀又設百華燈乃召諸計吏前受戒敕於階下設白獸樽見納諫門注差次功位漢高后欲差次列侯功以定朝位優異漢詔蕭何劍履上殿入朝不趨贊拜不名又後漢包咸為大鴻臚每進見賜以几杖入屏不趨贊事不名經傳有疑輟遣小黃門就舍即問王入朝後漢東平王蒼入朝既至升殿乃拜天子親荅之其後諸王入宮轉以輦迎至省閣乃下蒼以受恩禮過不安上疏辭不朝貶爵削地六師移之孟子諸侯朝天子曰述職一不朝則貶其爵再不朝則削其地三不朝則六師移之召君傅晉侯召王以諸侯見且使三狩仲尼曰以臣召君不可以訓戮防風禹會諸侯於塗山防風氏後至禹乃殺之賜吳王几杖漢文帝時吳王濞詐病不朝賜之几杖務以德化不朝之間無歲不聘鄭太叔謂楚人曰坐家視事河澄為僕射以疾辭詔聽不朝坐家視事不能造朝孟子齊宣王使人召孟子孟子曰不幸而有疾不能造朝奴上朝謁漢霍雲當朝請數稱病而私出多從賓客張圍黃山苑中蒼頭奴上朝謁莫敢譴者孔著位不肅唐臨再遷侍御史大夫韋挺責著位不肅明日挺越次與江夏王道宗語臨進曰王亂班道宗曰與大夫語何至爾臨曰大夫亦亂班挺失色眾皆悚伏入朝張茂昭為節度使入朝為帝從容言河朔事帝悚聽曰恨見卿晚請舉宗還朝入兼太子傅乃請舉宗還朝表數上帝乃許比鎮遣容間說皆不納詔左庶子乘馹往代茂昭奉兩州符節管鑰圖籍歸之先敕妻子上道戒曰吾使而曹出易庶使後出不為汙俗所染未半道迎拜兼中書令宵衣李德裕上丹扆六箴其一曰宵衣諷視朝希晚也朝麟德殿田洪正同門下平章事是歲來朝麟德殿眷勞殊等朝會禮之本柳冕朝會禮之本漢法三載上計以會課最聖唐稽古天下朝集三考一見皆以十月上計京師十一月禮見會尚書省應考績事臣忝牧圉之寄憤不朝之臣思一入覲率先天下使君臣之義親而不疏朝覲之禮廢而復舉德宗許還賦朝天行張建封貞元四年拜御史大夫徐泗濠節度使十三年來朝赴大夫班以示殊寵建封賦朝天行以獻寒生千門裏日照雙闕間禁旅下成列爐香起中天輝輝睹明聖濟濟行俊賢韋應物觀朝詩朝覲國家大禮柳冕鄉國人情之不忘也闕庭臣子所戀也朝覲國家大禮也三者臣之大願累上表其辭哀切月視朝纔三四韋處厚方天子荒暗月視朝纔三四處厚入見即自陳有罪願前死以謝帝曰何哉帝曰臣昔為諫官不能死爭使先帝因畋與色而至不壽於法應誅然所以不死者陛下在春宮十有五矣皇子方襁褓臣不敢避死亡之誅帝大感悟記諸侯朝覲顏真卿希烈僣稱帝使問儀式對曰老夫耄矣曾掌國禮所記諸侯朝覲耳未嘗會朝陸贄上書自安史之亂朝廷因循涵養而諸方自擅攘地未嘗會朝陽墮笏趣意野耄司空圖遷洛陽詔圖入朝圖陽墮笏趣意野耄乃聽還五日一見謂之起居李琪自唐末喪亂朝廷之禮壞天子未嘗視朝而入閤之制亦廢常參之官日至正衙者聞傳不坐即退獨大臣奏事日一見使殿而侍從內諸司日再朝而已明宗初即位乃詔群臣五日一隨宰相入見而內殿謂之起居琪以謂非唐故事請罷五日起居而復朔望入閣然唐故事天子日御殿見群臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見群臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝于衙者因隨以入見故謂之入閤然衙朝也其禮尊閤宴見也其事殺自乾符已後因亂禮闕天子不能日見群臣而見朔望故王衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤其後亦廢至是而復然有司不能講正其事凡五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤琪皆不能正也五代史卷五十四屏營魏闕之思夢想神明之遊劉禹錫請朝覲表企鸞鷺於紫霄獨無羽翼仰星辰於黃道徒竭丹誠柳宗元乞朝覲狀請朝京師郭崇韜名望素出存審下不樂其來因沮其事章累上輒不許存審伏枕嘆曰老夫事二主四十年今天下一家四夷殊俗至於亡國之將射鉤斬祛之人皆得見天子奉觴為壽獨余棄死于此豈非命哉卒于幽州五代符存審傳天威咫尺誠寤寐而無違雲漢昭回固瞻仰而何及柳為崔中丞請朝葵藿之誠彌切犬馬之戀逾深竊國賓五獻之禮希康侯三接之恩同上鳴珮執玉柳宗元邠寧進奏院記鳴珮執玉殿禮天朝皇帝元正冬至受群臣朝賀而會前一日尚舍設御幄于太極殿有司設群臣客使等次於東西朝堂展縣置按陳車輿又設解劍席於縣西北橫街之南唐禮樂志其日將士填諸街勒所部列黃麾大仗屯門及陳於殿庭群官就同上侍中版奏請中嚴諸侍衛之官詣閤奉迎先置者入就位侍中版奏外辨皇帝服袞冕冬至則服通天冠絳紗袍御輿出自西房即御坐南向符寶置于前公主以下及諸客使等就位典儀曰再拜贊者承傳在位皆再拜上公壹人詣西階脫舄跪解劍置于席升當御座前北面跪賀稱某官臣某言元正首祚景福惟新伏惟開元神武皇帝與天同休乃降階詣席跪佩劍俛伏興納履復位在位者皆再拜宣制曰履新之慶與公等同之初群官將朝中書侍郎以諸州鎮表別為一案俟於右延明門外給事中以祥瑞案俟於左延明門外戶部以諸州貢物陳于太極門東禮部以諸蕃貢物可執者蕃客執入就位其餘陳於明堂前上公已賀中書令奏諸方表黃門侍郎又進跪奏祥瑞於案侍郎與給事中引案退戶部尚書進詣階前跪奏稱戶部尚書臣某言諸州貢物請付所司承制退稱制曰可禮部尚書以次進詣階跪奏稱禮部尚書某言諸蕃貢物請付所司承制退稱制曰可太府帥其屬受諸州及諸蕃貢物出歸仁納義門執物者隨之典儀曰再拜通事舍人以次引北面位者出侍中前跪奏稱侍中臣某言禮畢皇帝降坐御輿入自東房侍臣從至閤引東西面位者以次出蕃客先出冬至不奏祥瑞無諸方表禮樂志請三日一朝正觀十三年房元齡奏天下太平萬機事簡請三日朝臨朝許之出通典每日常坐二十三年太尉無忌等奏請視朝坐日高宗報曰朕初登大位日夕孜孜猶恐擁滯眾務自今以後每日常坐同上朝于洛陽五代南平世家以騎士三百為衛朝于洛陽莊宗果欲留之郭崇韜諫曰唐新滅梁得天下方以大信示人今四方諸侯相繼入貢不過遣子弟而季興以身述職為諸侯率宜加恩禮以諷動來者而反縻之示天下以不廣且絕四方內向之意不可莊宗乃止厚禮而遣之天子憑玉按劍履若雲行李白入朝曲天子憑玉按劍履若雲行日出照萬戶簪裾爛明星鴛鷺充朝柳宗元與權補闕書赫奕儼冠蓋百蠻奉選班萬國朝未央赫奕儼冠蓋紛綸盛服章唐太宗正月臨朝詩巢山駕海之群狼纛鳥章之君不期而趨於闕下者四十有三萬楊炎鳳翔出師頌踰沙紛在列德兼三代禮功包四海圖踰沙紛在列執玉儼相趨岑又本奉和臨朝詩負扆延百辟垂旒御九賓師古臨朝詩親望穆穆之光韓愈元和聖德詩曰與群臣序立紫宸殿下親望穆穆之光唐以冬至一陽始生萬物潛動所以自古聖帝明王皆此日朝萬國觀雲物禮之大者莫逾是時其日亦祀圓丘皆令攝官行事質明既畢日出視朝國家以來更無改易緣修新格其日祀圓丘遂改用小冬日受朝通典自今以後每年五月一日御宣政殿與文武百寮相見京官九品以上外官因朝奏在京者並聽就列同上天寶三載冬敕伏以昊天上帝在所尊顯恭惟祀典每用冬至既於是日有事圓丘更受朝賀實深兢惕自今以後冬至宜取以次日受朝永泰二年詔冬至令有司祭南郊復於含元殿受朝賀同上白時聘結好大行人云時聘以結好殷覜以除邦國之慝間問以諭諸侯之志展幣儀禮奠幣還圭儀禮辭玉傳襄仲辭秦玉郊勞謁關關人問從者幾人注具為供也庭實館榖館人為賓三日具沐五日具浴致館禮以安之傳曰叔弓如晉致館辭曰云云多貨傷德聘主禮意多其貨則傷敗其德幣美則沒用幣以副忠美之則主於幣失禮本意沒失也比年小聘三年大聘禮歲聘以志業傳鹿鳴皇皇者華並饗美使臣之詩也周禮野廬氏賓客至將徒聚柝有相翔者誅之注相翔謂四面翔觀視賓客衣物將盜之卿士並聘傳云凡君即位大夫之私覿非禮也為人臣者無外交不敢二君也發幣於公卿致餼餼生肉也餼牽積芻禾禮儀醯醢百壅芻米蕃客准式季友主賓格鴻臚諸蕃官客食宜令御史察有供給不如法隨事紏彈餼客餼二牢米百莒適子之館授子之餐還珪璋尚書如五器卒乃復復還圭璧如五器禮終則還之三帛二生一死之不還傳襄仲辭玉秦伯使西乞術來聘襄仲辭玉曰君不忘舊好重之以大器寡君敢辭玉注云已聘而還其珪璋輕其禮不欲與之為好也儀禮君使卿皮弁還玉於賓君子於玉比德以聘重禮還之者德不可取於人相切磨之義皮弁者始以此服受之不敢不受也孔阿史那突厥阿史那戎狄熾疆古未有也高祖起太原遣府司馬劉文靜往聘與連和二國交驩曰聘唐文粹盛均仲尼不歷聘解夫二國交驩曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘觀夏道則之杞觀殷道則之宋較是而言雖它國可知也安謂歷聘上以黃騮玉帶報聘五代東漢世家劉旻兀欲聞旻自立頗幸中國多故乃遣其貴臣述軋高勳以自愛黃騮九龍十二稻玉帶報聘周制諸侯遣使聘天子皆以卿為使大夫為上介士為眾將並之朝釋幣於禰告為君然後釋幣於行介及眾介皆從遂受命于朝受聘珪享束帛加璧遂行至天子畿更張旃先謁關人關人報王使請事遂導以入王使大夫授館遣人致飧將行聘之前皆遣人授館於文王廟門外行聘之朝釋幣於禰服冕服乘車逮旃至大門外下車王服皮弁服受聘受訖王更服服袞冕入廟當扆而立賓入次改服裨冕而入士介皆隨賓後入行享于廟亦升堂進玉王前撫之亦行三享王禮之出廟門更行私覿之見王出至大門內使問其君及勞聘賓還館主人致饔餼明日發幣於公卿然後受饗受燕而還王亦使送出境通典若諸侯相聘之制則比年小聘三年大聘相勵以禮則外不相侵內不相凌此天子所以養諸侯而諸侯自為正之具也以珪璋聘重禮也已聘而還珪璋比輕財重禮之義也諸侯相勵以輕財重禮則人皆讓矣同上白原農事管子曰先王之遊也春出原農事之不本者謂之遊注原察也不本謂不修本務也補不足秋出補人之不足者謂之豫秋為西成尚有不足者也從樂而不反者謂之荒先王有遊豫之業無荒亡之行桓公再拜曰寶法言其法可寶為諸侯度孟子曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫為諸侯度春遊以發生啟諸蟄於潛戶秋豫以收成觀豐年之多稌文選漢高過沛擊筑為大風之歌曰大風起兮雲飛楊云云泛舟兮濟汾河漢武秋風詞曰駕六龍乘八輿崆峒問道黃帝之拜廣成瑤池舉觴漢武之宴王母楚襄王遊蘭臺之宮有風颯然而至句陳法駕天仗仙衛遊赤水黃帝皇儀帝容從游必蹕佚遊欲肆其心車轍馬跡左傳昔穆王欲肆其心周行天下將皆必有車轍馬跡祭公謀父作祈招之詩以止王心王是以護沒於祗宮遊海齊景公游海十月而不歸畋有洛太康畋于有洛之表十旬不反楚昭王登荊臺而游其樂遺老忘死罔游于逸罔淫于樂大禹謨怠荒無怠無荒書盤遊無度樂遠出而露威靈數搖動而勞軍旅本非人主急務也長揚賦樂佚遊語孔幸華清宮張仲方為諫議大夫詔幸華清宮仲方曰萬乘之行必具葆衛易則失威重不從猶見慰勞幸芙蓉園房玄齡帝幸芙蓉園觀風俗玄齡敕子弟洒掃庭堂曰乘輿且臨幸有頃帝幸其第因載玄齡還宮校獵溫泉薛元超帝校獵溫泉諸蕃酋長得持弓矢從元超奏夷狄野心而使挾兵在圍中非所宜也本傳微服潛遊李嶠上書曰元首之尊居有重門擊拆之衛出有清警戒道之禁所以備非常息異望誠不可易舉動慢防閑也陛下厭崇邃輕尊嚴微服潛遊閱廛過市行路私議朝廷警懼如禍產意外縱不自惜奈宗廟蒼生何五陵姚崇子奕開元中有事五陵有司以鷹犬從奕曰非禮也奏罷之臨幸楊國忠帝常歲十月幸華清宮春乃還而諸楊湯沐館在宮東垣連蔓相照帝臨幸必遍五家幸郭鏦別墅郭鏦別墅在都南尤勝塏穆宗常幸之置酒極歡掌舍設帟金吾劃次唐文粹張說東山記緹騎環山緹騎環山朱旆焰野人君山入則撞鍾庭設樂宮道路有鹵簿鼓吹禮官百司必備物而後動蓋所以為謹重也謹重則尊嚴尊嚴則肅恭唐儀衛志九重繡轂翼六龍而畢降歐陽詹曲江池記九重繡轂翼六龍而畢降千門錦繡同五侯以偕至若騎從輕馳則道途乏拱辰之備若乘輿稍具則邑縣有駕肩之憂元稹諫駕幸溫湯狀累聖已來深懲覆轍驪宮圯壞永絕修營官曹盡復於田萊殿宇半堙於巖谷深林有逸才之獸環山無匡衛之廬陛下若騎從輕馳則道途乏拱辰之備若乘輿稍具則邑縣有駕肩之憂若臥殿宿張則原野無徼巡之所若鑾車久入則門禁失啟閉之時六軍守衛於空宮百吏宴安於私室忝為臣子誰不惕然時乘六龍肆覲東后韓愈賀冊尊號表當議明堂辟雍之事撰泰山梁甫之儀搜三代之逸禮補百王之漏典時乘六龍肆覲東后白湛露天子宴諸侯也湛湛露斯匪陽不晞厭厭夜飲不醉無歸鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心也式宴以樂和樂且湛東與賢者共之莫不令儀既醉以酒既飽以德王在在鎬凱樂飲酒鈞臺夏啟有鈞臺之享塗山周穆有塗山之會萬樞之暇堯酒千鐘堯樽柏梁之宴會金罍玉飲肅穆之容皇情歡洽享以訓恭儉宴以示慈惠恭儉以行禮慈惠以布政左傳觀威儀省禍福寧子曰古之為享食以觀威儀省禍福加籩之禮折俎之歡我有旨酒從游侍食資飲食以合歡用歌舞而飾喜周文有在鎬之樂漢武有濟汾之歌周穆舉觴為瑤池之宴宴西王母也漢高擊筑為沛人之歌大風之歌也孔不宜待游宴王及善時二張怙寵每傳侍宴無人臣禮及善數裁抑之后不悅曰卿年高不宜待游宴但檢校閤中法曲弟子二十侑宴李訓遷周易博士兼翰林侍講入院詔法曲弟子二十人侑宴示優寵宴麟德殿張茂昭召宴麟德殿宴廣達樓王君㚟破吐蕃以功遷大將軍凱旋明皇宴君㚟及妻夏於廣達樓賜金帛夏亦自以戰功封武成郡夫人與百官高會李玨穆宗即位荒酒色景陵始復土即召李光顏于邠寧李愬于徐州期九月九日大宴群臣玨與宇文鼎溫畬韋瓘馮藥同進曰道路皆言陛下追光顏等將與百官高會且元朔未改陵上新復三年之制天下通喪今同軌之會適去遠夷狄之使未還遏密弛禁本為齊人鐘鼓合饗不施禁內夫王者之舉為天下法不可不謹且光顏愬忠勞之臣方盛秋屯邊如令訪謀猷付疆事召之可也豈以酒食之歡為厚邪帝雖置其言然厚加勞遣宴同明殿齊澣中宗在廬陵澣上言請抑諸武迎太子東宮不報及太子還武后召澣宴同明殿諭曰朕母子如初卿豫有力焉宴禁中鄭裔綽遷給事中會賜宴禁中天子擊毬至門下官謂二人曰近論漢公事類朋黨者九夷簉瑤席五狄列瓊筵唐太宗玄武門宴群臣雲標金闕迥樹杪玉堂懸杜審言蓬萊三殿侍宴夏宴蒲萄園李適為學士凡天子饗會游豫唯宰相及學士得從夏宴蒲萄園賜朱櫻大會群臣命婦合宴宣政袁利貞高宗時為太常博士周王侍讀及王立為太子百官上禮帝欲大會群臣命婦合宴宣政殿設九部伎散樂利貞上疏諫以為前殿路門非命婦宴會倡優進御之所請徙命婦別殿九部伎從左右門入罷散樂不進帝納之既會帝傳詔曰卿奕葉忠鯁能抗疏規朕之失不厚賜無以勸能者乃賜物百段但宴武臣元行欽遷武寧軍節度使莊宗宴群臣於內殿酒酣樂作道平生戰陣事以為笑樂而怪行欽不在因左右顧視曰紹榮安在所司奏曰奉敕宴使相紹榮散官不得與也莊宗罷會不樂明日即拜行欽同中書門下平章事自此不召群臣入內殿但宴武臣而已五代史天歡李宗楚等謝曰既陪大歡不敢不醉景龍文館記天杯又曰敬舉天杯飲薛幄列簪裾宴韋嗣立莊後罰三杯宴白鹿觀御詩序人題四韻後罰三杯上瓊筵張說玉斝飛千日瓊筵薦八珍尚含設群官升殿者坐文官三品以上於御座東南西向介公酅公在御座西南東向武官三品以上又於其後朝集使都督刺史蕃客三等以上座如立位設不升殿者座各於其位又設群官解劍席於縣之西北云云侍中版奏外辦皇帝改服通天冠絳紗袍御輿出自西方即御座侍中奏請延諸公王等升曲儀承傳階下贊者又承傳在位者皆再拜應升殿者詣東西階至解劍席脫舄解劍升上公一人升階少東西面立於座後光祿卿進詣階間跪奏稱臣某言請賜群臣上壽殿中監受爵奉進皇帝舉酒訖殿中監進受虛爵以授尚食尚食受爵於坫初殿中監受虛爵殿中典儀唱再拜階下贊者承傳在位者皆再拜上公就座後立殿上典儀唱就坐階下贊乾承傳俱就坐歌者琴瑟升坐笙管立階間尚食進酒至階殿上典儀唱酒至興階下贊者承傳皆俛伏起立於席後殿中監到階省酒尚食奉酒進皇帝舉酒大官令又行群官酒酒至殿上典儀唱再拜階下贊者承傳皆再拜搢笏受觶殿上典儀唱就座階下贊者承傳皆就座皇帝舉酒尚食進受虛爵復於坫觴行三周尚食進御食至階殿上典儀唱食至興階下贊者承傳座者皆起立座後殿中監到階省按尚食品嘗食訖以次進置御前大官令又行群官按設食訖殿上典儀唱就座階下贊者承傳皆就座皇帝乃飯上下俱飯御食畢仍行酒遂設庶羞二舞作若賜酒侍中承詔詣東階上西面稱賜酒殿上典儀承傳階下贊者承傳坐者皆起再拜立受觶就席坐飲立授虛爵又再拜就座酒行十二遍會畢殿上典儀唱可起階下贊者承傳上下皆起降階佩劍納舄復位位於殿庭者仍立於席後典儀曰再拜贊者承傳在位者皆再拜若有賜物侍中前承制降詣群官東北西面稱有制在位者皆再拜侍中宣制又再拜侍中前跪奉稱侍中臣某言禮畢皇帝興御輿入禮樂志白帝藉千畝三推禮天子正月擇元辰親載耒耜率公卿諸侯大夫躬耕藉田天子三推公五推卿諸侯九推也耕藉然後諸侯知所以敬秉耒天子為藉千畝躬秉耒以事天地社稷以為醴酪齊盛於是乎取敬之至也教養耕藉所以教諸侯之養天子親耕於南郊諸侯耕於東郊以供齊盛身致其誠信嗇夫下種農祥辰正土膏脈起天田地利以給宗廟以供禘郊懋力務本敦孝致敬勤己勸人春藉青壇修六府榖之為本陳八政食以為先具田器布農事播穜稑之種撰播殖之器藉田賦蔥犗黛耜存救之要術並藉田賦勞酒親耕還乃宴飲於大寢公卿大夫御命曰勞酒戒農用國語司空除壇于藉農大夫戒農用王耕一撥公卿大夫以次耕庶人終于千畝鉤盾弄田漢昭紀上耕鉤盾弄田在未央宮中廢藉田國語宣王不藉千畝虢文公諫三國之大事在農上帝粢盛於是乎出是以稷為大官又藉田之禮廢則王教之典闕矣勸農之道缺矣又文選策秀才文云昔周宣惰千畝之禮虢公納諫漢文缺三推之義賈生置言是知食為民天農為國本將率三推誠本農於后稷不藉千畝豈貽諫於虢公后稷躬耕既種既戒將耒耜以率先不躬不親豈粢盛之致信金根晉輿服志金根車天子親耕所乘也置耒耜於軾上親祀先農晉禮志云尚書符問藉田至尊應親祀先農否賀修答曰漢儀無正自祭之文然王者祭四望則毳冕祭社稷五祀則絺冕以此為親祭之義也后稷播殖夏禹躬耕降靈壇撫御耦王藉周禮甸師帥其屬而耕耨王藉以時入之以供粢盛注云入其黍稷以供粢盛先蠶東觀漢記曰馬皇后置織室蠶於濯龍中又皇后採桑壇在蠶宮西南蠶事既登分繭稱絲又以桑為均皇后躬桑將一條執筐受桑蠶始生後食之三灑而止大人繅三盆孔種麥苑中太子瑛帝種麥苑中瑛及諸王侍登帝曰是將薦宗廟故親之亦欲若等知稼穡之難因分賜侍臣曰春秋書無麥禾古所甚重比詔使者閱田畝所對不以實故朕自蒔以觀其成躬藉田陳子昂上言曰臣願陛下躬藉田親蠶以勸農桑舉數十年之墜典有北人來示將藉田敕是舉數十年之墜典必有大恩澤柳宗元與楊誨之書悼藉田之罷意忍懇懇誠愛我厚者同上報楊誨之書星紀既周土膏將動張曲江藉田制惟是千畝未展三推今星紀既周士膏將動去農祥之不日考帝藉之以特皇帝孟春吉亥享先農遂以耕藉前享一日奉禮設御座於壇東西向望瘞位於壇西南北向從官位於內壝東門之內道南執事者居後奉禮位於樂縣東北贊者在南又設御耕藉位於外壝南門之外十步所南向從耕三公諸王尚書卿位於御座東南重行西向北上介公酅公於御位西南東向北上尚舍設御耒席於三公之北少西南向奉禮又設司農卿之位於南少退諸執耒耜者位於公卿耕者之後非耕者之前西向皇帝已享乃以耕根車載耒耜於御者間皇帝乘車自行車降大次乘黃今以耒耜授廩犧令橫執之左耜寘于席遂守之皇帝將望瘞謁者引三公及從耕侍耕者司農卿與執耒耜者皆就位皇帝出就耕位南向立廩犧令進耒席西北向解韜出宋執以興少退北向立司農卿進受之以授侍中奉以進皇帝受之耕三推侍中前受耒耜反之司農卿卿反之廩犧令令復耒於韜執以興復位皇帝初耕執耒者皆以耒耜授侍耕者皇帝耕止三公諸王耕五推尚書卿九推執耒者前受之皇帝還入自南門出內壝東門入大次享官從享者出太常卿帥其屬耕于千畝皇帝還宮明日班勞酒於太極殿如元會不賀不為壽藉田之榖斂而鍾之神倉以擬粢盛唐禮樂志帝社壇太常少卿韋叔夏博士張齊賢等議曰祭法王者立太社然後立王社所置則無傳也乃奏言經無先農與社一神今先農壇請改曰帝社壇以合古王社之義其祭唯令以孟春吉亥祠后土以勾龍氏配於是為帝社壇又立帝稷壇於西如太社太稷而壇不設方色以異於太社躬耕盡壟止開元二十三年親祀神農於東郊酌以勾芒遂躬耕盡壟止肅宗乾元二年詔去耒耜雕刻命有司改造之天子出通化門釋祓而入壇遂祭神農氏后後稷配冕而朱紘躬九推焉九農壇高五尺廣五丈四出陛其色青太宗親祭先農藉于千畝之甸初議藉田方面所在給事中孔穎達曰禮天子藉田於南郊諸侯於東郊晉武帝猶於東南今於城東不合古禮太宗曰禮緣人情亦何常之有且虞書云平秩東作已在東矣又乘青輅推黛耜者所以順於春氣且朕見居少陽之地田於東郊蓋其宜也於是遂定通典憲宗元和五年詔以來歲正月藉田皇帝夾侍二人正衣二人侍中一人奉耜中書令一人禮部尚書一人侍從司農卿一人授耒耜于侍中太僕卿一人執牛左右衛將軍各一人侍衛三公以宰相攝九卿以左右僕射尚書御史大夫攝三諸侯以正員一品官及嗣王攝推數一用古制禮儀使一人太常卿一人贊禮三公九卿諸侯執牛三十人用六品以下官皆服褲褶御耒耜二并韜皆以青其制度取合農用不雕飾畢日收之每牛各一人絳衣赤幘取閑農務者禮司以人贊導之執耒持耜以高品中官二人不褲褶皇帝詣望耕位通事舍人分導文武就耕所草具其儀時雖草具其儀如此以水旱用兵而止岑文本藉田頌迴輿南畝駐蹕東廛親耕帝藉躬稼大田方期多稼介此豐年富寔教資農惟政本上敦播植下勤藨蔉耕藉田玄宗本紀開元二十三年正月乙亥耕藉田大赦侍老百歲以上版授上州刺史九十以上中州刺史六十以上上州司馬賜陪位官勳爵征防兵父母年七十者遣還民酺三日帝躬乎天田李白明堂賦
