body:
  text: 卷第七十六留守一白初太宗伐高麗置京城留守其後車駕不在京都則置留守以右金吾大將軍為副留守百官志關中事一以屬公宗室晦高宗將幸洛詔晦居守謂曰關中事一以屬公然法令牽制不可以成政法令外苟可以利人者行之毋須以聞故事留司官入宮城門列晨衙見留守崔從寶曆初為東都留守故事留司官入宮城門列晨衙見留守吏誕傲久廢至是復行繕三宮城杜暹帝東幸以暹為留守暹率當番衛士繕三宮城浚池督役不少懈帝聞嘉之數賜書褒勞治尚寬簡源乾曜帝東幸以京兆尹留守京師治尚寬簡人安之居三年攻如始至以兵屬居五年張延賞時罷河南山南等副元帥兵屯東都詔延賓知留守以兵屬居五年治行第一召還自變生倉卒賴子儀復安郭子儀射生將王撫自署京兆尹亂京城子儀斬以徇帝以子儀為京城留守自變生倉卒賴子儀復安留守不賜旗甲呂元膺拜東都留守故事留守賜旗甲至元膺不給或上言用兵討淮西東都近賊損其儀沮威望請比華汝壽三州帝不聽並三州罷之留守不賜旗甲自此始吳少誠叛獨東畿為有備王詡徙東都留守既至開田二十餘屯修器械皆良金壽革練士卒號令精明俄而吳少誠叛獨東畿為有備關束賴之賜賚優渥宋璟十二年東巡泰山璟復為留守帝將發謂曰卿國元老別方歷時宜有嘉謀以遺朕璟因一二極言手制答曰所進當書之坐右出入觀省以誡終身賜賚優渥未遑時巡方委留鎮韓皋留守制白居易元帥二孔高祖定京師置左右元帥太原道行軍元帥西討元帥皆親王領之天寶末置天下兵馬元帥大曆八年罷天下兵馬元帥建中四年以李希烈反置諸軍行營兵馬都元帥會昌中置靈夏六道元帥天福二年置諸道兵馬元帥尋復改曰天下兵馬元帥百官志議者疾其長亂杜鴻漸廣德二年同中書門下平章事崔旴殺郭英乂據成都蜀劍大亂命鴻漸以宰相兼成都尹山南西道劍南東川副元帥西川節度副大使往鎮撫之鴻漸性畏怯無他遠略而晚節溺浮屠道畏殺戮且憚旴雄武先許以不死既見禮遇之且不敢加譙責反委以政日與從事杜亞楊炎縱酒高會因薦旴為成都尹乃請入朝許之及見帝盛言旴威略可任宜為留後獻寶器五床羅錦十五床麝臍五石復輔政議者疾其長亂悉誅元惡諸鎮惕息郭子儀光弼敗邙山失河陽又明年河中亂殺李國貞太原箋鄧景山朝廷憂二軍與賊合而少年新將望輕不可用遂以子儀為朔方河中北廷路儀澤心等州節度行營兼興平定國副元帥屯絳州時帝已不豫引至臥內謂曰河東事一以委卿子儀嗚咽流涕子儀至屯悉誅元惡諸鎮惕息兼三副元帥李抱玉兼三節度副元帥位望隆赫乃上言隴抵達扶文綿地二千里虜孔道不一梁岷重則關輔輕願擇能臣帥西道當一面臣得專事關隴帝多其讓許之不恤其家李晟進京畿渭北鄜坊商華兵馬副元帥及晟家皆為賊質左右有言者晟涕數行下曰陛下安在而恤家乎軍政得專李晟帝議諸軍與神策等力且不贍遣翰林學士陸贄臨詔懷光令與晟計所宜者懷光曰廩賜不均軍何以戰贄數顧晟晟曰公元帥軍政得專之晟將一軍唯所命其增損費調敢不聽懷光默然計塞臨軒授鉞渾瑊檢校尚書左僕射同中書門下平章事行營副元帥帝臨軒授鉞用漢拜韓信故事制曰寇賊干紀授爾節鉞以戡多難往欽哉瑊頓首曰敢不畢力以對揚天子休命都督三孔景雲二年置都督二十四人察刺史以下善惡揚益並荊四州為大都督汴兗魏冀蒲綿秦洪潤越十州為中都督皆正三品齊鄜涇襄安潭遂通梁夔十州為下都督從三品當時以為權重難制奏罷之唯四大都督府如故百官志欲以威重夸遠俗宗室孝恭為揚州行臺大都督孝恭再破巨賊北自淮東抱江度嶺而南盡統之欲以威重夸遠俗乃築第石頭城陳廬徼自衛或誣具反鐫詰無狀赦為宗正卿以治狀聞宗室晦乾封中為營州都督以治狀聞璽書賜勞政務清淨漢陽郡王瑰為荊州都督政務清淨嶺外酋豪數相攻瑰遣使諭威德皆如約不敢亂區落降從膠東王道彥拜岷州都督間遣入黨項諭國威靈區落降從少威嚴襄邑恭王神符遷楊州大都督自丹陽渡江治隋江故郡楊人利之然少威嚴不為下所畏輕騎按部許欽明為涼州都督嘗輕騎按部會突厥默啜兵奄至被執賊與皆至靈州使說之降欽明至城下呼曰有美醬乎有梁米乎並乞黑一枝時賊營四面阻水惟一路行入欽明欲選將柬兵乘夜襲賊也而城中無寤其瘦者遂見害兄弟死王事世名其忠威信盛行竇軌為洛州都督周洛間因隋亂人不士著軌下令諸縣有游手末作者按之由是威信盛行民皆趨木密表求鷹李大亮為涼州都督嘗有臺使見名鷹諷大亮獻之大亮密表曰陛下絶畋獵久矣而使者求鷹信陛下意邪乃乖昔旨如其擅求是使非其才太宗報書曰有臣如此朕何憂勸墾田力耕張儉徙代州檢校都督勸墾田力耕歲數稔私蓄富實儉恐虜易驕乃建平糴法入之官虜悅喜由是儲斛流贏刻石頌德王晙景龍末授桂州都督州有兵舊常仰餉衡永晙始築籮郛罷戍卒棣江開屯田數千頃以息轉漕百姓賴之期年人丐刻石頌德便驛走官馮元常拜廣州都督詔便驛走官安南酋領李嗣仙殺都護劉延祐劫州縣詔元常討之率士卒航海馳檄先示禍福賊黨多降元常縱兵斬首惡而還本傳境內清畏王方慶武后時纍遷廣州都督南海歲有崑崙舶市外區琛琲前都督路元睿冒取其貨舶首不勝忿殺之方慶至秋毫無所索始部中首領沓墨氏詣府訴府曹素相餉謝未嘗始方慶約官屬不得與交通犯者痛論以法境內清畏議者謂治廣未有如方慶者號第一下詔賜瑞錦雜綵以著善政建議罷都督李景伯景雲中進右庶子時有議者置都督府非是詔群臣著議景伯與太子舍人盧俌議今天下諸州分隸都督專生殺刑賞使授非其人則權重釁生非彊幹弱枝經邦軌物之議願罷都督留御史以時按察秩卑任重以制姦宄便繇是停都督擇最吏陽嶠時議建都督府擇最吏故嶠為涇州都督性分不易李尚隱遷廣州都督及還人或褒金以贈尚隱曰吾自性分不可易非畏人知也修復堰坊張守圭為瓜州都督州地沙塉不可藝是時渠堰為虜毀材木無所出守圭密禱于神一夕水暴至大木散千章塞流下因取之修復堰坊耕者如舊州人神之刻石紀事政尚清省李襲志轉桂州都督襲志守桂二十八年政尚清省南荒便之酌貪泉舊史馮立拜廣州都督前後作牧者多以黷貨為蠻夷所患由是數怨叛立到不營産業衣食取給而已嘗至貪泉嘆曰此吳隱之所酌也遂畢飲而去俗始知棟梁利宋璟為廣州都督事見火門善撫御唐史郭元振遷涼州都督治涼五歲善撫御道不舉遺見不拾遺門為政嚴肅張嘉貞歷秦州都督為政嚴肅甚為人吏所畏孔上破賊方略孔巢父孔子三十七世孫為河中陝華招討使巢父纍上破賊方略帝嘉納本傳一劍撗陳萬夫莫前陰則難窺勇則重閉亞夫緩急之任繼父絳侯祭遵禦侮之才為吾子路一品集王宰制招懷撫諭元稹裴度制前命相臣招懷撫諭矜而詿誤示以生門期於盡脫網羅豈欲驅之陷阱而豺狼當道荊棘牽衣雖欲歸之於仁厥路無由而至孔縱戰艦放江中孝恭信州總管蕭銑據江陵俄進荊湘道總管統水陸十二軍發夷陵破銑二鎮縱戰艦放江中諸將曰得舟當濟吾用棄之反資賊奈何孝恭曰銑之境南際嶺左薄洞庭地險士衆若城未拔而援至我且有內外憂舟雖多何所用之今銑瀕江鎮戍見艦船蔽江下必謂銑已敗不即進兵覘候往反以引救期則吾既拔江陵矣已而救兵到巴陵見船疑不進銑內外阻絶遂降掠其牛羊膠東王道彥從李靖擊吐谷渾詔為赤水道總管帝厚以利啖党項使為鄉導其酋柘拔赤辭詣靖自言隋擊吐谷渾我資其軍而隋無信反見仇剽今將軍若無他我願資糧將復如隋乎諸將與歃血遣之道彥至闊水見無備因掠其牛羊諸羌怨為赤辭所乘軍大敗冒矢石先登張士貴為龔州道行軍總管破反獠還太宗聞其冒矢石先登勞之曰嘗聞以忠報國者不顧身於公見之宣布恩意李靖授嶺南撫慰大使檢校桂州總管以嶺海陋遠久不見德非震威武示禮義則無以變風即率兵東巡所過問疾苦延見長老宣布天子恩意遠近歡服以全軍歸靖為行軍總管以江淮兵萬人屯太谷時諸將多敗獨靖以全軍歸俄權檢校安州大都督蹀血虜庭李靖以兵部尚書為定襄道行軍總管率徑騎三千由馬邑趨陽嶺頡利可汗大驚曰兵不傾國來靖敢提孤軍至此於是帳部數恐靖縱諜者離其腹心夜襲定襄破之可汗脫身遁帝曰李陵以步卒五千絶漠然卒降胸奴其功尚得書竹帛靖以騎三千蹀血虜庭遂取定襄古未有輩澡吾渭水之恥矣頡利請舉國內附奠長率部落五萬降李績為通漠道行軍總管出雲中與突厥戰走之引兵與李靖合因曰頡利若度磧保於九姓果不可得我若約齎薄之不戰縛虜矣靖大喜以與己合於是意決靖率衆夜發績勒兵從之頡利欲走磧績前屯磧口不得度由是奠長率部落五萬降于績拜大都督府長史裂其地州縣之李績高麗莫離支男生為其弟所逐遣子乞師詔績為遼東道行軍總管率兵二萬討之破其國執長藏男建等裂其地州縣之詔績獻俘昭陵戰可汗襄邑恭王神符遷并州總管頡利可汗盜邊神符與戰汾東斬級五百獲馬二千及戰沙河獲乙利達官得可汗所乘馬及鎧以便宜決事裴寂授晉州道總管討賊以便宜決事賊將宋金剛據介州寂屯度索原賊埭水上流寂徙屯為賊所薄兵大潰擊下十餘城李大亮擢金州總管府司馬王洪烈據襄陽詔大帝亮安撫樊鄧因圖之進擊下十餘城俘其名王李大亮為河東道總管與李靖俱出北道涉清海觀河源與虜遇蜀渾山大戰破之俘其名王獲雜畜數萬請斷石嶺竇靜請斷石嶺以為障塞制突厥之入進拔八城契苾何力蓋蘇丈死男子為弟所逐使子詣闕請降乃拜何力為遼東道行軍大總管安撫大使經略之副李績同趨高麗績已拔新城乘勝進拔八城引兵還與績會何力率兵五十萬先趨平壤虜其王以獻詔入朝所過作鼓吹泉男生授平壤道行軍大總管兼持節安撫大使舉哥勿南蘇倉巖等城以降帝命舍人李虔繹就軍慰勞賜袍帶金扣七事明年召入朝詔所過州縣傳舍作鼓吹右羽林將軍李同以飛騎伏迎寵璽書褒勞郭孝恪焉耆王叛孝恪請擊之即拜西川道行軍總管率步騎三千出銀山道夜襲其王龍突騎支虜之帝悅降璽書褒勞復征賀魯蘇烈擢伊麗道行軍大總管復征賀魯俟斤懶獨祿擁衆萬帳絳烈撫之賀魯率十姓兵十萬拒戰輕烈兵少舒左右翼包之烈令步卒據高攢槊外向賊三突步陳不能入因其亂擊之賊大奔建唐旗幟蘇烈出為神丘道大總管率師討百濟賊傾國來酣戰破之殺虜萬人乘勝入其郛王義慈及太子隆北走烈進圍其城義慈子泰自立為王率衆固守義慈之孫文思曰王與太子出而叔豈得擅為王烈使士登城建唐旗幟於是泰開門請命其將禰值與義慈降白方伯元戎總元帥之任殿天子之邦上將外鎮軍大藩重鎮雄藩旌旗重寄河洛要衡分麾授律節制諸侯糾繩列郡蘊佐命之才有經邦之策作捍方隅以獎王室有國柱石豫王爪牙建牙大任分閫重寄轅門幕府將星人傑鎮撫方城藩屏邦國外威夷狄內撫黎元當注意之朝居建牙之任偶唐虞之代立方邵之勳孔節度使掌總軍旅顓誅殺初授具帑抹兵仗詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送次一驛輒上聞入境州縣築節樓迎以鼓角衙伏居前旌幢居中大將鳴珂金鉦鼓角居後州縣齎印迎于道左視事之日設禮案高尺有二寸方八尺判三案百官志以八月考其治否銷兵為上考足食為中考邊功為下考同上其後有持節為節度副大使知節度使者正節度也諸王拜節度大使者皆留京師同上申厲禁條李皓檢校太原以北諸軍節度使太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黃坑有狗數百頭習食胔頗為人患吏不敢禁皓至遣吏捕群狗殺之申厲禁條約不再犯遂華其風南裔肅然宗室復轉嶺南節度使時安南經略使高平正張應繼卒其佐李元度胡懷義等因阻兵脅州縣肆為姦贓復至誘懷義杖死流元度南裔肅然教民作陶瓦鐫諭蠻獠收瓊州置都督府以綏定其人賦不及民宗室復為鄭滑節度使復下令墾營田以廩其軍而賦不及民衆悅受命日不宿家宗室皋李希烈反遷江西節度使受命日不宿家至豫章大令將吏日有功未申與懷器謀不發者皆自言得裨校伊真李伯潛劉旻悉補大將擢王鍔為中軍以馬彝許孟容為幕府治虞艦裒兵二萬以士二千五百委真等教之自將五百人教以秦兵團力法聯其賞罰弛張如一乃約以五百人擊真卒二千五百莫能當其鋒江漢倚皋為固皋遷荊南節度使凡戰大小三十二取州五縣二十斬首三萬三千生擒萬六千未嘗敗師所過不敢伐桑棗踐禾稼朝廷仰食江淮而淮西道出九江至大別皆與賊接皋轉戰數千里餉路遂通江漢倚皋為固復坊口堰溫造節度河陽奏復懷州古秦渠坊口堰以溉濟源河內溫武陟四縣田五千頃畏遠權勢裴玢同州劉公濟卒授玢節度使元和三年徙山南西道玢為治嚴稜畏遠權勢不務貢奉蔬食弊衣居處取庇風雨而已倉庫完實百姓安之頗有治名薛嵩相衛洺邢等州節度使方大亂後人亦厭禍嵩謹奉職頗有治名入朝民鄣路願留薛平李師道平詔分淄青齊登萊五州為平盧軍徙平為節度在嶺六年兵鎧完礪徭賦均一寶曆初入朝民鄣路願留河北河西等軍盡屬王晙代張說為兵部尚書同中書門下三品充朔方軍節度大使河北河西隴右河東等軍盡屬之本傳置備征軍徐商拜河中節度使突厥殘種保特峨山以千帳度河自歸詔商綏定商表處山東寬鄉置備征軍凡千人襞紙為鎧徑矢不能洞寇所發跡捕捕必得徙節山南東道襄多山棚為剽賊商取財卒為捕盜將別為屯營寇所發輒跡捕捕必得遂為精兵上下皆重足畏之崔從長慶初繇尚書左丞領鄜坊節度屬部多神策屯軍數亂法驕橫吏不能制從一繩以法下皆重足畏之本傳俸帛加倍崔從檢校尚書左僕射淮南節度副大使知節度事楊州凡交易資産奴婢有貫率錢畜羊有口算又貿麴牟其嬴以佐軍用度從皆觸除之官吏俸帛常加倍以給獨節度使則否從與之同父子皆秉節居鎮崔從子能奏以自代授嶺南節度使與從皆秉節居鎮世傳為滎更除繆政安潛代高駢領西川節度使吏倚駢為姦利者安潛皆誅之數更除繆政於是盜賊衰不踰年境內稱治韓滉為鎮海軍節度使綏輯百姓均租調不踰年境內稱治帝在奉天淮汴震騷滉訓士卒分兵戍河南既狩梁州又獻縑十萬匹請以鎮兵三萬助討賊有詔嘉勞行無稽壅張延賞出為淮南節度使歲旱民他遷吏禁之延賞曰拘此而斃不如適彼而生苟存吾人何限為乃具舟遣之敕吏為修室廬已逋債而歸者更增於舊瓜步舟艫津溱而遙繫江南延賞請度屬楊州自是行無稽壅事為之制延賞纍遷荊南劍南西川節度使建中中西山兵馬使張朏襲成都為亂延賞奔鹿頭戍朏酣亂不設備延賞諜知之遣將叱干遂捕斬朏復成都自楊國忠討南蠻三蜀疲罄及乘輿臨狩縻用百出後更郭英又崔寧楊子琳亂益矜僣公私肅然延賞事為之制薄入謹出府庫遂實民便安之張洪靜徙節宣武承韓洪虐政代以寬簡民便安之一言之悅賞至百萬嚴武復節度劍南破吐蕃七萬衆於當狗城遂收鹽川武在蜀頗放肆用度無藝或一言之悅賞至百萬蜀雖富饒而峻掊亟斂閭里為空然虜亦不敢近擊虜取都護還郭知運徙隴右諸軍節度大使鄯州都督突厥降戶阿悉爛𨁂跌思泰率衆叛執單于都護張知運詔以朔方兵追擊至黑山呼延谷敗之虜棄仗走取副都護還乘冰度青海王君㚟為河西隴右節度使判涼州都督事開元十四年土蕃酋悉諾邏寇大計拔谷君㚟聞其怠率秦州都督張景順乘冰度青海襲破之以功遷大將軍斷山峻塹張獻甫貞元四年代韓游環領邠寧節度使邠寧軍素驕憚獻甫嚴因游瑰去遂縱掠邀范希朝為帥都將楊朝晟誅首亂者獻甫乃得入於是斷山峻塹選巖要地築峰堡請復鹽州及洪門洛原鎮屯兵詔可佩四將印王忠嗣為河西隴右節度使權朔方河東節度佩四將印徑兵重地控制萬里近世未有也收黃河九曲哥舒翰兼河西節度使攻破吐蕃洪濟大莫門等城收黃河九曲以其地置洮陽郡築神策宛秀二軍賞罰分明封常清北庭都護持節伊西節度使常清性勤儉耐勞苦出軍乘騾私廄裁二馬賞罰分明罷軍中雜徭李光弼子彙遷涇原節度使罷軍中雜徭出俸錢贖將士質賣子還其家軍中畏肅張伯儀為江陵節度使朴厚不知書然推誠遇人軍中畏肅民亦便之解臨洺之圍李抱真領昭義節度使田悅反圍邢及臨洺詔抱真與河東馬燧合神策兵救之敗悅於雙岡斬其將楊朝光又破之臨洺遂解臨洺之圍鋭功名崔圓遷御史中丞劍南節度副大使圓鋭功名初聞難刺國忠意乃治城浚隍列館宇儲什俱具帝次河池圓跪具陳蜀土腴榖羡儲供易辦帝省書泣下曰世亂識忠臣即日拜中書侍郎同中書門下平章事仍兼劍南節度使天子至朝廷百司殿宇帷慢皆具益嗟賞之鼉集城門鄧景山拜青齊節度使從淮南為政簡肅有鼉集城門鄧班謂景山曰鼉介物也失所次金不從革之象其有兵乎未幾宋州節度使劉展反輯綏撫安李承改山南東道節度使時希烈猶據襄州帝慮不授命欲以禁兵衛送承承辭請以單騎入既至希烈舍承外館迫脅日萬端承晏然誓以死守希烈不能屈遂大掠去襄漢蕩然承輯綏撫安之居一年闔境完復商賈饒盈徐申進嶺南節度使前使死吏盜印署府職百餘員畏事泄謀作亂申覺殺之詿誤一不問遠俗以攻劫相矜申禁切無復犯外藩歲以珠玳瑁香文犀浮海至申於常貢外未嘗賸索商賈饒盈劉關反表請發卒五千循馬援故道繇爨蠻抵蜀搗闢不備詔可罷武臣私廚郗士美充昭義節度使昭義自李抱真以來皆武臣私廚月費米六千石羊千首酒數十斛潞人困甚士美至悉去之出廩錢市物自給又廬從史時日具三百人膳以餉牙兵士美曰卒衛於牙固職也安得廣貢為私恩亦罷之威震兩河討王承宗也遣大將王獻督萬人為前鋒獻恣橫逗撓士美即斬以徇下令曰敢後者斬親鼓之大破賊下三營環柏鄉時諸鎮兵合十餘萬繞賊多玩賊犯法獨士美兵鋭最先有功憲宗喜曰固知士美能辦吾事承宗大震懼亡幾會詔班師然威震兩河隱然復完鎮辛祕拜昭義軍節度使是時承討常趙之後路人雕耗祕至則約出入嗇用度比四年儲錢七十萬緡糧七十萬斛器械堅良隱然復為完鎮舉動安重來瑱徙山南東道節度使賊圍南陽急瑱能撫訓士卒舉動安重賊不得侵居三歲奏蠲逋租數百萬李吉甫為淮西節度使居三歲奏觸逋租數百萬築富人固本二塘溉田且萬頃漕渠庳下不能居水乃築堤淤以防不足泄有餘名曰平津堰江淮旱浙東西尤甚有司不為請吉甫白以時救恤帝驚馳道使分遣賑貸資餉不仰有司李鄘拜淮南節度使王師討蔡方急李師道謀撓淚之鄘以兵二萬分壁鄆境資餉不仰有司是時兵興天子憂財乏使程異馳驛江淮諷諸道輸資助軍鄘素富強即籍府庫留一歲儲餘盡納于朝由是悉索以獻繇鄘唱之南夏以完魯炅俄拜襄鄧十州節度使以會二京平賊走河北時襄漢數百里鄉聚蕩然舉無樵煙初賊欲剽亂江湖賴炅適扼其衝故南夏以完勤身節用曲環喜兵法改陳許節度二州北為寇衝民苦剽鹵客他縣環勤身節用寬賦斂簡條教不三歲歸者襁係訓農治兵榖食豐衍法今嚴無敢犯者令狐彰拜滑毫魏博節度使始滑當寇衝城邑墟榛彰躬訓吏下檢軍力農法令嚴無敢犯者田疇大闢庫委豐餘歲時貢賦如期南詔不敢犯邊劉潼拜昭義節度使徙西門時李福討南詔兵不利潼至填以恩信蠻皆如約六姓蠻持兩為南詔間候有卑籠部落者請討之潼因出兵襲擊俘五千人南詔大懼自是不敢犯邊受命不召兵董晉為宣武節度副大使知節度事萬營死鄧惟恭總其軍晉受命不召兵惟幕府騶傔從之即日上道至鄭逆者不至人勸止以觀便宜晉不聽直造汴及郊惟恭始出迎謁既入即委以軍政無所改更衆服晉有體莫測其謀始惟恭謀代萬滎攻不遣吏以疑晉令不敢入及晉至情得則怏怏不能平汴士之驕怙亂嘗介勇士伏幕下早暮番休晉一罷之惟恭乃結大將相里重晏等謀亂晉覺之殺其黨械送惟恭京師嚴備而推誠信袁滋徒義成節度使滑用武地東有淄青北魏博滋嚴備而推誠信務在懷來李師道田季安畏服之居七年百姓立祠祀祭本傳開府極一時選武元衡憲宗時為劍南西川節度使帝御安福門慰遣之元衡至綏靜約束儉己寬民比三年上下完實蠻夷懷歸雅性莊重雖淡於接物而開府極極一時選議軍政不及私段秀實拜四鎮北庭行軍涇原鄭穎節度使數年吐番不敢犯塞又按格今官使二科取其一非公會不舉樂飲酒室無妓媵無贏財賓佐至議軍政不及私旬日踐父兄兩鎮李訴帝方經略隴右故徙訴節度鳳翔詔訴代願帥武寧軍旬日踐父兄兩鎮世以為榮訴與賊戰金鄉破之凡十一遇禽其隊帥五十俘馘萬計淄青平進同平章事擇名臣節度太原李聽穆宗初立幽鎮反擇名臣節度太原者代裴度使統兵北討始聽為羽林時有駿馬帝在東宮使左右諷取之聽自以身宿衛不敢獻於是帝曰李聽往在軍中不與朕馬是必可任乃授河東節度使境內肅然李願領夏綏銀宥節度使部有失馬者願署牒于道以金求之三日失馬並良馬一繫署下且曰逸而至不告罪當死謹以良馬贖悉歸失馬而縱其良境內肅然斬虜右支韋皋張延賞為劍南西川節度使初雲南蠻羈附吐蕃其盜塞必以蠻為鄉道皋計得雲南則斬虜右支乃間使招徠之稍稍通西南夷秉正自將呂元膺改河中節度使時方鎮多姑息獨元膺秉正自將監軍及中人往來者無不嚴憚閭里相約不敢犯孔戣拜嶺南節度使既至免屬州逋負十八萬緡米八萬斛黃金稅歲八百兩先是屬刺吏俸率三萬又不時給皆取部中自衣食戣乃倍其俸約不得為貪暴稍以法繩之南方掠人為奴婢戣峻為之禁吏得嬰兒於道收育之戣論以死由是閭里相約不敢犯交廣晏然鄭從讜改嶺南節度先是林邑蠻內侵召天下兵進援會寵勛亂不復遣而比兵寡弱從讜募士豪職其酋右署為約束使相捍禦交廣晏然有大臣體杜悰武宗詔楊州監軍取倡家女十七人進禁中請悰同選又欲閲良家有姿相者悰曰吾不奉詔而輒與罪也監軍怒表于帝帝以悰有大臣體乃詔罷所進妓疏析廛閈以息火災杜佑嶺南節度疏析廛閈以息火災宋崖黎民三世保險不濱祐討平之仁惠商侑拜義昌節度於時痍荒之餘體骨蔽野墟里生荊刺棘侑單身之官粗淡與下其勞苦以仁惠為治歲中流戶襁屬而還遂為營田丐耕牛三萬詔度支賜帛四萬匹佐其市初州兵三萬仰廩度支侑始至一歲自以賦入贍其半二歲則周用乃奏罷度支所賜戶口滋饒廥儲盈腐上下便安請立石紀政民不勞軍食足杜中立出為義武節度使舊徭車三千乘歲挽鹽海濱民苦之中立置飛雪將數百人具舟以載自是民不勞軍食足矣大中十二年大水泛保兗青鄆而滄地積卑中立自按行引御水入之毛河東江海州無水災人皆悅賴杜亞拜淮南節度使至則治漕渠引湖陂築防庸入之渠中以通大舟夾堤高邛田因得灌溉疏啓道衢徹壅通堙人皆悅賴本宿將子且寬厚高固邠軍劫固為帥固曰然能聽吾言乃可衆唯唯固徇曰毋殺人毋肆掠三軍皆順悅帝亦念固功乃拜邠寧節度使固本宿將子且寬厚人皆安之然久在散位數為儕類輕笑乃受命衆多懼固一釋不問四鎮節度朱忠亮四鎮節度使隱核軍籍得竄名者三千人歲收乾沒十餘萬緡吏白耄卒不任戰者可罷答曰古於老馬不棄況戰士乎聞者莫不感奮師屯大逵市井不移高崇文劉闢反拜崇文東川節度使趣成都闢走追禽之送京師崇文入成都也師屯大逵市井不移珍貨如山無秋毫之犯邢能已歸而二斬于軍衣冠脅汙者詣牙請命崇文為條上全活之本傳非我去卿韋澳授河陽節度使入辭帝曰卿自便而遠我非我去卿盡知虜情僞李德裕徙節劍南西川蜀自南詔入寇敗杜元穎而郭釗代之病不能事民失職無聊生德裕至則完殘奮怯皆有條次乃建籌邊樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餫遠近曲折咸具乃召習邊事者與之指畫商訂凡虜之情僞盡知之蜀風大變李德裕蜀人多鬻女為人妾德裕為者科約凡十三以上執三年勞下者五歲及期則歸之父母毀浮屠私廬數千以地與農蜀先主祠旁有柔村其民剔髮若浮屠者畜妻子自如德裕下令禁止蜀風大變於是二邊寖懼專以清靜治盧鈞擢嶺南節度使時稱潔廉專以清靜治華蠻數千走闕下請為鈞立生祠餘見廉門軍中樂劉瑑進宣武節度使先時大饗雜進倡舞瑑曰豈軍中樂邪取壯士千人被鎧擁矛盾習擊刺與吏士臨觀又下令不呵止夜行使民自便羌人皆順向畢諴出為邠寧節度使諴到軍遣吏懷諭羌人皆順向時戍兵常苦調餉之諴募士置屯田歲收榖三十萬斛以省度支經費詔書褒美撫循有威惠崔彥昭繇河陽節度使徙河東先是沙陀諸部多犯法彥昭撫循有威惠三年境內大治境中盜不敢發鄭畋為鳳翔隴右節度使募鋭兵五百號病雷將境中盜不敢發發輒得以恩信撫諸夷落李承約拜黔南節度使承約以恩信撫諸夷落勸民農桑興起學校居數年當代黔南人詣京師乞留為許留一年去苛弊二十餘事王周歷貝州涇州節度使涇州張彥澤為政苛虐民多流亡周乃更為寬恕問民疾苦去其苛弊二十餘事民皆復歸歷四鎮皆有善政政有惠愛夏魯奇遷河陽節度使為政有惠愛徙鎮忠武河陽之人遮留不得行父老詣京師乞留明宗遣中使往諭之魯奇始得去擁節總戎率身和衆劉禹錫令狐先廟碑杖鉞作藩李紳自高宗永徽以後都督帶使持節者始謂之節度使然猶未以名官景雲二年以拔延嗣為涼州都督河西節度使自此而後接平開元朔方隴右河東河西諸鎮皆置節度使及范陽節度使安祿山反犯京師天子之兵弱不能抗遂陷兩京肅宗起靈武而諸鎮之兵共起誅賊其後祿山子慶緒及史思明父子繼起中國大亂肅宗命李光弼等討之號九節度之師久之大盜既滅而武夫戰卒以功起行陳列為侯王者皆除節度使唐史兵志郭子儀收長安見陳勝門李晟收長安秋毫無所擾見攻守門李訴入蔡州黎明駐元濟宅見謀略門王式討仇用麾幟東靡見發軍門天下無債帥高瑀事見債負門誅舞文吏柳公綽山東節度治垣舍亟使新之李聽邠寧節度邠署相傳不利治垣舍亟使完新之得無名書唐史王鍔在淮南時得無名書內靴中異日以所告窮驗烏集升平第戟架柳仲郢咸通五年為天下節度使初仲郢為諫詭計大夫後每遷必烏集升平第庭樹戟架皆滿五日乃散由是不復集卒於鎮孔許以便宜唐儉為并州道安撫大使許以便宜盡簿懷恩資産賜儉馳入其部契苾何力鐵勒九姓叛詔何力為安撫大使何力以輕馳五百人馳入其部虜大驚何力喻曰朝家知而詿誤遂及翻動使我貰南邊得自新罪及凶渠取之則已九姓大喜共擒僞葉護及特勒等二百人以歸何力數其罪誅之餘衆遂安士服其威愛程務挺為單于道安撫大使禦突厥務挺善綏禦士服其威愛突厥憚之不敢盜邊白紅旆將軍白居易詩紅旆將軍昨日歸注藩鎮例驅紅旆奉上益謹田洪正充魏博節度使又遣司封郎中知制誥裴度宣慰賚其軍錢百五十萬緡六州民給復一年赦見囚存問高年惸獨廢疾不能自存者度明辨具陳朝廷厚意洪正不覺自失乃深相結納奉上益謹復請度遍行其部宣示大子恩詔恩令節度僉謀布衣崔權奉表陳謝眷勞殊等田洪正同中書門下平章事是歲來朝對麟德殿眷勞殊等引見僚任將校二百餘人皆有班賜進兼侍中同上為朕長城田洪正數上表固請留闕下帝勞曰昨韓洪以疾辭不就軍朕既從之矣今卿復爾我不應違但魏人樂卿之政四鄰畏卿之威為朕長城父子同日受命田布洪正徒成德以布為河陽節度使父子同日受命時韓洪與子公武亦皆領節度天下以忠義多田氏天下以忠義多田氏布所至必省冗將募戰卒寬賦勸穡人皆安之元從功臣李惟簡父范陽內屬奚也兄惟嶽叛惟簡以家僮票士百餘奉母鄭奔京師帝拘于客省及出奉天惟簡將赴難謀於鄭鄭曰爾父立功河朔位宰相身未嘗至京師兄死於人手爾入朝未識天子不能效忠吾不子汝矣督其行曰而能死王事吾不朽矣乃斬關出道更七職得及行在帝見厚撫之拜太子諭德討賊有功帝徙山南惟簡以三十騎從夜失道馳至盩厔西聞中人語問天子所在密語曰上在此帝見之流涕執其手曰爾有母乃能從朕邪對曰臣誓以死比明北方有塵起帝憂懼惟簡登高曰渾瑊以騎來瑊至遂決趨興元惟簡前導及帝還封武安郡王號元從功臣圖形凌煙閣帝嘉其忠程懷直願析東光景城二縣置景州且請刺史河朔刺史不廷授幾三十年帝嘉其忠以徐申為景州刺史擢懷直為留後九年來朝寵遇加等上米鹽佐用度張允伸龐勛反上書欲遣弟允皋領兵討賊不許上米五十萬斛佐用復詔嘉美賜玉帶寶器紈錦進兼侍中其行道也得以阜俗其行法也得以刑人賞人杜牧盧籍等制環千里之疆綰三軍之衆諸侯之任重矣大者敦化風俗小者惠養整衆環千里之疆綰三軍之衆杜牧豹尾神旗韓文巨封劇鎮杜牧追咎長慶以來朝廷措置亡術復失山東巨封劇鎮所以擊天下輕重不得承襲輕授方鎮相望於內地大者連州上餘小者猶兼三四故兵驕則逐帥帥彊則叛上或父死子握其兵而不肯代或取捨由於士卒往往自擇將吏號為留後以邀命於朝天子顧力不能制則忍恥含垢因而撫之謂之姑息之政蓋姑息起於兵驕兵驕由於方鎮姑息愈甚而兵將愈俱驕由是號令自出以相侵擊兵志治中司馬九孔武德元年改贊治曰治中高宗即位曰司馬下州亦置焉顯慶二年置洛州司馬武后大足元年東都北都雍荊楊益州置左右司馬神龍二年省太極元年雍洛四大都督府增司馬一人亦分左右百官志往贊坐棠之理鄭公逵司馬制白居易人得就耕崔知溫靈州司馬境有渾斛薩萬帳數擾齊民農皆釋耒習騎射以捍賊知溫表徙河北虜不樂遷契苾何力為言乃止知溫固請疏十五報卒徙河北自是人得就耕斛薩至徙地顧善水草亦忘遷後入朝過州謝曰初徙且怨公今地膏腴衆孳夥更荷公恩皆再拜本傳方直劉齊賢出為晉州司馬帝以其方直尊憚之時將軍史興宗從獵苑中言晉州出佳鷂可捕取帝曰齊賢豈捕鷂人邪卿安得以此待之宰相材張東之為荊州大都督府長史長安中武后謂狄仁傑曰安得一奇士用之仁傑曰荊州長史張東之雖老宰相材也用之必盡節於國即召為洛州司馬有善政韋安石遷并州司馬有善政后手制勞問州司馬折威風杜景佺見録事參軍門既失志能順適所遇白居易貶江州司馬既失志能順適所遇託浮屠生死說若忘形骸者久之掌弼戎政居則習搜狩有役則申戰守之法器械桿備軍籍賜豫皆專焉百官志白連帥廉察諸侯糾繩列郡明闡使威勤宣王命澄清郡邑鎮撫黎元觀風察俗提綱振領求人瘼宣埋輪之威布露冕之政藩維寄重江海要衝持節使分郡節當聖治之朝委廉察之寄孔觀察處置使掌察所部善惡舉大綱凡奏請皆屬於州百官志景雲二年置十道採訪使道各一人開元二年曰十道按察採訪處置使至四年罷八年復置十道按察使秋冬巡視州縣十年又罷十七年復置十道京都兩畿按察使二十年曰採訪處置使分十五道天寶末又兼黜陟使乾元元年改曰觀察處置使同上觀察以豐稔為上考省刑為中考辦稅為下考同上降王國良宗室皋拜湖南觀察使前帥辛京杲貪暴虐使部將王國良戍武岡賴其富即劾以死國良恐據縣反斂荊黔洪桂兵討之再歲不能下皋至遺書曰觀將軍非敢大逆者特逃讒抗死爾將軍遇我可以降我固為京杲誣者幸蒙雪何忍以兵加將軍哉國良得書喜且畏因請降然尚首鼠皋即日單騎稱使者造國良壘賊延使者入皋大呼其軍曰有識曹王者乎乃我也來受良降良今安在一軍愕貽不敢動國良迎拜叩頭請罪皋執手約為兄弟則盡焚攻守器具散其兵風績不立唐扶為福州觀察使濫殺人風績不立會卒奴婢爭財有司按其資至十餘萬宣國詔條狄兼謨江西觀察使吳士矩加給其軍擅用上供錢數十萬兼謨劾奏觀察使為陛下守土宣國詔條知臨戎賞士州有定數而與奪由己貽弊一方為衆道觖望請付有司治罪士矩由是貶蔡州別駕長撫民短治軍崔彥曾為徐州觀察使曉律令然辨急為政剛猛徐軍素驕而彥曾長干撫民短於治軍士多怨之豪右畏戢韓佽纍遷桂觀察使部二十餘州自參軍至縣令毋慮三百員吏部所補才十一餘皆觀察使商才補職佽下車悉來謁一吏持藉請補缺員佽下教曰居官治吾不奪其不奉法無望縱舍缺者須按藉取可任任之會春服使至鄉有豪猾厚進賄使者求為縣令使者請佽佽許之既去召鄉豪責以撓法笞其背以令部中目是豪右畏戢於吏治明吏不敢罔沈傳師出江西觀察使徙宣州傳師於吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論決嘗擇邸吏尹倫遲魯不及事官屬屢白易之傳師曰始吾出長安戒倫曰可闕事不可多事倫如是足矣邀擊淮西逃兵李泌拜陝號觀察使始鑿出開車道至三門以便餉漕淮西兵防秋屯鄰州已而四千人亡歸或曰吳少誠密招之既入境泌邀阻悉擊殺無閉糴以重困民崔陵遷湖南觀察使湖南舊法雖豐年貿易不出境陵部災荒不恤也陵至謂屬吏曰此豈人情乎無閉糴以重困民削其禁自是商賈流行資物益饒設鄉校使作為文章常袞為福建觀察使閩人未知學袞至設鄉校使作為文章親加勸導與為主客均禮觀游宴饗與焉由是俗一變歲貢士與內州等獻銀瓶齊映為桂管江西觀察使始映罷不以罪冀復進乃掊斂獻貢以中帝欲初諸蕃大瓶止五尺李兼為江西始獻六尺至映乃八尺繕陴隍益治兵張建封為觀察使是時四方尚多故乃繕陴隍益治兵四鄙附悅希烈使票帥捍卒來戰建封皆沮恤之清而忠能惠養民王緯與李泌俱為路嗣恭江西觀察判官泌執政奏於己有私恩德宗許為泌報故進緯給事中浙西觀察使缺泌擬緯帝曰是朕為君報德者乎黃門要地獨不留議事邪對曰浙西賦入而尤劇緯清而忠能惠養民故請遣之制可美譽四騰吳溱為福建觀察使政勤清美譽四騰與宰相竇參有憾參數加短毀又言湊風痺不良趨走帝召還驗其疾非是繇是不直參夜登城呂元膺為御名中丞拜鄂嶽觀察使嘗夜登城守者不許左右曰中丞也對曰夜不可元膺乃還明日擢守者為大將入拜尚書左丞蠲橫租錢衛次公為陝虢觀察使蠲橫租錢歲三百萬吏稱為神崔咸遷陝虢觀察使日與賓客僚屬痛飲未嘗醒夜分輒決事裁剖精明無一毫差吏稱為神處身儉勤敬晦歷浙西觀察使時南方連饉有詔弛榷酒茗官用告乏晦處身儉勤資力遂充賦物充牣李德裕為浙西觀察使初潤州承王國清亂竇易直傾府庫賚軍資用空殫而下益驕德裕自檢約以留州財贍軍雖儉而均故士無怨每朞則賦物充牣天子詔褒揚南方信禨巫雖父母厲疾子棄不敢養德裕擇長老可語者諭以孝慈大倫患艱相收不可棄之義使歸相曉敕違約者顯置以法數年惡俗大變又按屬州非經祠者毀千餘所撤私邑山房十四百舍寇無所庾蔽天子詔褒揚禁止剽劫周墀徙江西觀察使劾齊部刺史剪補據賊出兵戍彭蠡湖禁止剽劫厲兵睦鄰李勉徙江西觀察使厲兵睦鄰平賊屯軍禮迎謁柳公綽見戎服門易三鎮聲樂不聞于家薛蘋治第過制范傳正見僣門按俗守封是其所善白居易行薛伾制俾宣風於廉察同上勞徠諸部綱紀列城奉詔條以安人參戎索以訓旅鏡湖秦望之遊元稹為浙東觀察使會稽山水奇秀稹所辟幕職皆當時文士而鏡湖秦望之遊月三四焉舊史言條綾李德裕事見綾門丹扆六針李德裕見針門賜鞭張建封為徐州觀察使事見節操門防禦使十一孔防禦使以無虞為上考清苦為中考政成為下考百官志市馬益軍唐承訓宣宗擢為天德軍防禦使軍中馬乏虜來戰數負承訓罷冗費市馬益軍軍乃奮張聲雄北疆李景略窮塞苦寒地塉鹵邊戶勞悴景略至節用約己與士同甘苦鑿咸應永清二渠溉田數百頃儲廩器械畢具威令肅然聲雄北疆回紇畏之團練使十二孔團練使以安民為上考懲姦為中考得情為下考百官志官號重復楊綰時諸州悉帶團練使綰奏刺史自有持節諸軍事以掌軍旅司馬古司武所以輔軍即今副使司兵參軍今團練判官官號重復可罷天下團練守捉使詔可請罷唐史李少良傳大曆八年晉州男子郇謨以麻總發行哭長安東市人問之曰我有字三十欲以獻上其言團者請罷諸州團練使白均天下賦稅制海內財用典茲邦本繫在生民必俟良臣以委重務制國用計軍儲晉文帝立度支尚書以計軍儲周之國用制之於冢宰漢之軍食領之於丞相既重於任亦難其人惟彼度支掌斯國用苟有成敗屬於安危納于天府計在官地得之則征賦克均失之則財用不足平均貢賦充羡帑藏元凱之計杜元凱為度支尚書奏轉運之計也茂先之功張華茂先為度支尚書決河渠地延萬里均節財用周禮太宰以九式均節財用式謂財之節度要會計等移用謂轉之財用也周禮為要會之司掌出入之賦家宰制國用必於歲之抄量入以為出制國用如今度支經用歲成禮記司會以歲之成質於天子注要計也質平也平其計要於天子受百官之成亦質於天子然後成歲事事計經費經常孔運江南租米給京師韓滉加度支諸道轉運鹽鐵等使右丞元琇判度支也以關輔旱請運江南租米給京師帝委滉專督之而琇畏其剛愎難其事請自江至楊子滉主之自楊子以北自主之由是御琇視年豐耗發斂韓洄劉晏被罪天下錢榖歸尚書省而省司廢久無綱紀莫總其任乃擢為戶部侍郎判度支洄上言江淮七監請皆罷又言天下銅鐵冶乃山澤之利當歸王者請悉隸鹽鐵從之復罷省胥吏冗食二千人積米長安萬年二縣各數十萬石視年豐耗發斂焉故人不艱食國無橫斂元琇以尚書王丞判度支國無橫斂而軍旅濟歲得江淮米五十萬斛班宏竇參又以江淮兩稅置巡院官令宏張滂共差擇滂欲得簿最宏不與滂奏有詔分掌宏見宰相辭曰宏主漕歲得江淮米五十萬斛前年至七十萬今職移於人敢請罪滂在測儳曰公所言非也朝廷不奪公職乃公喪官緡縱姦吏自取咎爾凡為度支史不一歲家輒巨億僮馬産第侈王公非盜縣官財何以然上既知之故令滂分掌今公無乃歸怨上乎宏不答於是移病歸第宰相白其狀許如劉晏韓滉故事以東都河南淮南江南山南東道兩稅滂主之關內河東劍南山南西道宏主之課入歲倍盧洪正拜工部侍郎以戶部領度支初兩池鹽法弊得費不相償洪正使判官司空輿檢鉤釐正條上新法即表輿兩池使自是談入歲倍用度賴之職務簡修杜佑始度支嗇用度多署吏權攝百司繁而不綱佑以營繕還將作木炭歸司農練染還少府職務簡修由聚斂句剝為宰相皇甫鏄同平章事猶領度支鎛以吏道進既由聚斂句剝為宰相至雖市道皆嗤之假領度支裴延齡會班宏卒假領度支延齡素不善財計乃廣鉤距取宿奸老吏與謀以固帝幸因建言左藏歲入不資見庫藏門精於吏職李巽為度支鹽鐵使掌使一年征課所入類晏之多歲明年過之又一年加一百八十万貫巽精於吏職雖在私家亦置案牘簿書勾檢如公署焉人吏有過絲毫無所貸舉吏程異勾檢簿籍又精於巽故課最加衍亦異之助舊史白當軍戎之時宜充國用委榷管之務必仗時賢雖仁無禁利而道有從權用之不窮實惟贍國取之以道豈曰奪人漢法鹽鐵始自於漢弘羊之計牢籠地財侵削人吏然則政先圖大事貴舉中執漢法而行務雖苟得奪齊民之利敝將若何公無禁利左傳佐賦濟時煮海之利鹽鐵論昭帝昭賢良文學對策願罷鹽鐵酒榷均輸官桑弘羊云制四夷安邊足用之本往反相詰因集之為鹽鐵論孔僅領之漢武時治鑄煮鹽財或纍至萬金而不佐公家之急乃以東郭咸陽孔僅為大司農承領鹽鐵事咸陽人名牢盆孔僅咸陽上言願募自給費因官器作鹽鐵官與牢盆注取其牢盆之價直不得私鑄鹽器矯制令鑄博士徐偃行風俗矯制使膠東魯國鼓鑄張湯知劾之罷而復置武帝至平帝不變鹽鐵之法武帝嘗罷鹽鐵官三年而復置之鹽賣魏衛顗與荀彧書曰鹽鐵國之大寶宜依舊置使者鹽賣幹鹽鐵而榷酤漢書取蠻夷鹽鐵張嶷為越嶲太守定笮臺登平甲水三縣舊出鹽鐵去郡三百餘里夷之邊徼自固張嶷盡取得用鹽鐵使十四孔宰相時急財用則為鹽鐵轉運用百官志餉四節度糧崔縱為汴西水陸運兩稅鹽鐵等使王師圍田悅乏食詔縱餉四節度糧軍無乏食問榷酤利裴諝拜河東租庸鹽鐵使時關輔旱諝入計帝召至便殿問榷酤利歲出納幾何諝久不對復問曰臣自河東來涉三百里而農人怨歎榖菽未種誠謂陛下軫念元元而乃責臣以利故未敢即對帝曰微公言朕不聞此京師鹽暴貴詔取三萬斛以贍關中自揚州四旬至都人以為神劉晏第五琦始擢鹽鐵使乃榷鹽晏代之法益密利無遺入初歲收緡錢六十萬末乃什之計歲入千二百斛而榷居太半民不告勤京師鹽暴貴詔取三萬斛以贍關中自揚州四旬至都人以為神至湖嶠荒險處所出貨皆賤弱不償所轉晏悉儲淮楚間貿銅易薪歲鑄緡錢土餘萬其措置纖悉如此權萬貨重輕同上置驛相望四方貨殖低昂及他利害雖甚遠不數日即知是能權萬貨重輕使天下無甚貴賤而物常平自言如見錢流地上鹽鐵名使自第五琦始第五琦肅宗駐彭原賀蘭進明遣琦奏事既謁見即陳今之急在兵兵強弱在賦賦所出以江淮為淵若假臣一戰請悉東南寶資飛餉函各惟陛下命帝悅拜鹽察御史勾當江淮租庸使遷司金郎中兼侍御名諸道鹽鐵鑄錢使鹽鐵名使自第五琦始當軍興隨事趨辦人不益賦而用以饒遷戶部侍郎縱錢以起萬貨李若初代王緯為浙西觀察諸道鹽鐵使時天下錢少貨輕州縣禁錢不出境商賈不通若初始奏縱錢以起萬貨而若初持綱檢下吏民畏服合度支鹽鐵為一使王涯自李師道平三道十二州皆有銅鐵官歲不治賦供百萬觀察使擅有之不入公上涯始建白如建中元年九月戊辰詔書收隸天子鹽鐵詔可久之以亦官同中書門下平章事合度支鹽鐵為一使兼領之乃奏罷京畿榷酒錢以悅衆白轉隃止悅漕運貢賦漕引土貢充美天府東自江淮西至渭洛書審遠近之害人不告勞課遲速之程事無愆素國用軍儲徵爾貢於任土興我役於泛舟節省勤王力宣贍國漢通糧道委於丞相漢高帝曰鎮國家不絶糧道吾不如蕭何之功府無虛月國有餘資晉開較運任在尚書札元凱事見上注況當庶富之朝宜崇遭運之任當豐穰之時所宜畜積漕船事見漢書節遠邇之期率一鍾致一釜漢書言運糧費一鍾之用致一釜之至也領漕挽之務必在公勤漕轉山東史記漢時漕轉山東栗以給中都官歲不過十萬石驢輦永平中治石曰河從郁盧至羊腸倉欲令通漕吏民苦役死者無數使鄧訓平叔往監之訓知難成奏罷之用驢輦歲有億萬全活徒數千人木牛流馬諸葛帝作木干流馬運糧特行數十里日行二十里孔置河陰集津三門倉裴耀卿同中書門下平章事充轉運使於是置河陰集津三門倉引天下租繇盟津泝河而西三年積七百萬石省運員三十萬緡或曰以此緡納於上足以明功答曰是謂以國財求寵其可乎敕吏為和市費鑿潭通漕韋堅為水陸運使初涯水銜苑左有望春樓堅于下鑿為潭以通漕二年而成帝為升樓詔群臣臨觀漕運利害各有四劉晏領東都河南江淮轉運使時大兵後㪷京師米千錢禁膳不兼時甸農援穗以輸晏乃自按行浮淮泗達于汴入于河右循底柱硤石觀三門遺跡至河陰鞏洛見宇文愷梁公堰廝河為通齊渠視李傑新隄盡得其利病乃移書於宰相元載以為大漕運之利與害各有四見漕運門增百八十萬緡李巽杜佑表為鹽鐵轉運副使俄代佑使任自劉晏後職廢不振賦入朘耗巽蒞職一年較所入如晏最多之年明年又過之又明年增百八十萬緡朝廷仰其須崔造又以戶部待郎元琇判諸道鹽鐵榷酒事吉中孚度支諸道兩稅事而浙江東西歲入米七十五萬石方歲飢更以兩稅準米百萬濠壽洪潭二十萬責韓滉杜亞漕送東渭橋諸道有鹽鐵處仍置巡院歲盡宰相計殿最以聞時滉方領轉運有寵于帝朝廷仰其須滉持不可改帝重違之復以滉為江淮轉運使余如詣請是秋江淮米大集帝美滉功以滉專領度支諸道鹽鐵轉運等使造懼檄取資糧穆寧佐鹽鐵轉運住甬橋李光弼屯徐州餉不至檄取資糧寧不與李光弼怒召寧欲殺之餘見軍資糧門劫掠為衰當是時河漕不通自漢沔徑商山以入京師淮西節度使李忠臣不奉法設戍邏以征商賈又縱兵剽行人道路幾絶與寧夾淮為治憚寧威劫掠為衰漕賈得通鉤校奸贓末減賦取公財不耗疲人樂生杜牧裴諗制漕挽之職綰牢籠漕挽之職同上一粒不運劉晏與元載書一水不通思荷鍤而先往一粒不運願負米而先趨焦心苦形期報明主白京尹尹茲京邑鎮撫畿甸肅清京師統千里之封畿領萬戶之版籍表則四方監臨三輔銀章青綬漢書景帝分置左右內史武帝更名京兆尹服銀章青綬佩水蒼玉也桴鼓稀鳴張敞為京兆尹桴鼓稀鳴市為盜賊鉤距趙廣漢為京兆尹善為鉤距捕治盜賊如神人皆稱伏趙張三王京師稱曰前有趙張後有三王謂趙廣漢張敞王遵王章王駿執版漢書典職曰京兆秩中二千石見尚書令僕射執版揖之間閣漢韓延壽為左馮翊歲餘不出行縣丞掾請之至高陵有昆弟訟延壽傷之曰骨肉爭訟是吾教不行也乃入傳舍閉閣自思迥於是訟者遞相責讓皆肉袒願以田相移至死不爭延壽恩信周二十四縣無訟者吏不忍欺平反漢雋不疑為京兆尹每隸囚徒其母問以平反則美而食若無所出則母怒而不食故不疑為吏嚴而不殘朝許政能任先廣漢時推明察選在不疑況屬休明之朝宜尊表則之位當堯舜之朝繼張趙之位五日京兆張敞被劾使吏絮舜有所案問絮舜以敞被劾當不久在職遂慢其事曰五日京兆尹耳何足畏言祇應五日為京兆尹耳敞聞殺舜書簡示曰五日京兆尹如何竟免罪浩穰張敞傳曰浩穰於三輔尤劇劇注浩大穰盛言人衆多也京兆翼翼四方是則詩取則之地謂京邑也救罪趙廣漢坐罪吏人守關訴號泣曰臣生無益縣官願代趙京兆死使牧養小人竟坐腰斬搏擊擢方進為京兆尹搏擊豪彊京兆畏之京兆尹十六孔武德元年雍州置牧一人以親王為之然常以別駕領州事永徽中改尹曰長史百官志開元元年改京兆府長史復為尹通判府務牧缺則行其事同上分渭水入金光門韓朝宗天寶初召為京兆尹分渭水入金光門匯為潭以通西市材木脂韋張仲方為京兆將軍人橫恣仲方脂韋坐不稱職出為華州刺史入侍宴樂出主京邑張曄進京兆尹入侍宴樂出主京邑時人以為寵然自以幹治稱獨無所獻李峴選京兆尹元宗幸溫陽甸內巧供億以媚上峴獨無所獻帝異之出為零陵太守時京師米翔貴百姓乃相與謠曰欲粟賤追李峴不待魚朝恩李勉為京兆尹兼御史大夫魚朝恩領國子監威寵震赫前尹黎幹諂事之須其入敕吏治數百人具以餉至是吏請勉不從曰吾候太學彼當見享軍容幸過府即修具朝恩銜之亦不復至太學募官攝府縣崔元遠元宗西狩詔留光凌為京兆尹乘輿已出都人亂火左藏大盈庫爭輦財珍至乘驢入宮殿者光遠募官攝府縣誰何宮闕斬十數人乃定四為京兆魏少游四為京兆雖無赫赫名然善任人緣飾規檢有足稱者承大化柳渾帝嘗親擇吏宰畿邑而政有狀召宰相語皆賀帝得人渾獨不賀曰北特京兆尹職爾陛下當擇臣輩以輔聖德臣當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之頗以治稱黎幹遷京兆尹頗以治稱京師苦樵薪乏幹度開漕渠興南山谷口尾入于苑以便運載幹密具同船作偈優水嬉冀以媚帝久之渠不就號稱職尹嚴郢大曆末進拜京兆尹嚴明持法令疾惡撫窮敢誅殺賊盜一衰減隸宮匠丁數百人號稱職尹前尹赫赫具瞻允若後尹熙熙具瞻允斯李叔明遷京兆尹長安歌曰前尹赫赫具瞻允若後尹熙熙具瞻允斯不為灼灼名顧少連改京兆尹政尚寬簡不為灼灼名先是京畿租賦薄厚不能一少連以法均之自內署擢尹京邑韋澳帝舅鄭光主墅吏豪肆積年不輸官賦澳繫之他日延英帝問其故澳具道奸狀目言必置以法帝曰可貨否答曰陛下自內署擢臣尹京邑安可使畫一法獨行於貧下乎帝入白太后曰是不可犯后為輸租乃免不徹扇蓋王播再遷京兆尹自李諒後政條隳斁奸豪浸不戢播修舉政有名負望崔洪遷京兆尹會大旱奏析滻入禁中者取十九溉民田仇士良使盜擊宰相李石於親仁里跡出禁軍珙坐不能捕以為負望少衰輦轂之下先彈壓柳仲郢出河南尹以寬惠為政或言不類尹京兆曰輦轂之下先彈壓郡邑之治本惠養烏可類乎頭上尹劉栖楚改京兆尹峻誅罰不避權豪先是諸惡少竄名北軍凌藉衣冠有罪則逃軍中無敢捕栖楚一切窮治不閲旬宿奸老蠹為斂跡一日軍士乘醉有所凌突諸少年從旁噪曰癡男子不記頭上尹邪政號嚴明柳仲郢為京兆尹北司吏入粟違約仲郢殺而尸之自是人無敢犯政號嚴明上下愛向吳湊為人彊方劬儉瞿瞿未嘗擾民上下愛向京師苦宮市彊估取物而有司附媚中官率阿從無敢爭湊見便殿因言中人所市不便宵民徒紛紛流議宮中所須責臣可辦若不欲外吏與聞禁中事宜料中官高年謹信者為宮布令平賈和售以息衆歡職司輦轂許孟容遷京兆尹神策軍自興元後日驕恣府縣不能制軍吏李昱貸富人錢八百萬三歲不肯歸孟容遣吏捕詰與之期使償曰不如期且死一軍盡驚訴於朝憲宗詔以昱付軍治之再遣使皆不聽奏曰不奉詔臣當誅然臣職司輦轂當為陛下抑豪彊錢未盡輸昱不可得帝嘉其守正許之京師豪右大震請中書門下五品以上親不得任京官魏少游復為京兆尹始請中書門下省五品尚書省四品諸司正員三品諸王駙馬期以上親及壻若甥不得任京兆官詔可白以尹王都楊雄河南尹針曰爰作卿士以尹王都也尹茲洛邑四方表則晉庾純字謀甫為河南尹為四方之表則萬國承流崔駟為河南尹曰萬國承流東郊書曰保釐東郊取則之地謂帝邑也成周東都京邑翼翼四方是則詩遷殷頑民書成周既成都輦重職山濤啓曰河南尹京輦重職前代皆用名人聖代已來有李胤杜預王恂不疑復今減此者也京師肅清袁安為河南尹為政公平未嘗以贓罪鞠人朝廷京師肅清居曰嚴明朝廷深重之計日受俸羊陟為河南尹計日受俸絶豪友屬託書使優賢養人華嵩為河南尹優賢養抑彊扶弱魏志司馬芝為河南尹抑彊扶弱私情不行居官十二年自魏及今為河南尹者莫及天下四會傅子曰河南帝都統領京畿兼右職右卿遂多豪門商賈胡貌天下四會奸之所生前尹司馬芝舉其綱而太簡次尹劉靜綜其因而太密後尹李勝毀常法取一時之聲也郡中多怪晉樂廣為河南尹前時郡中多怪無敢在廳中者惟廣處之漢推能政選在袁安晉擇公才任先孔坦字君平偶唐虞之代尹河洛之都當文明之代居表則之官河南尹十七孔開元元年改河南府長史復為尹通判府務牧缺則行其事百官志河洛千里都畿在焉俾之乂安屬在尹正崔陵河南尹制白居易洛有前賈後張敵京兆三王張仁願神龍中檢校洛州長史會榖貴多盜仁願一切捕殺胔積府門畿甸震懾無敢犯先是賈敦頤嘗為長史有政績時人為之語曰洛有前賈後張敵京兆三王征乘牛之出入市者宗室巨兼河南尹征乘牛之出入市者斥所得而佐用度然稍自盜沒都闕完雄張延賞大曆初除河南尹河洛當兵衝邑里墟榛延賞政簡約輕徭賦疏河渠築宮廟數年流庸歸附都闕完雄有詔褒美絶胥吏之私崔縱為河南尹時兵雖定民雕耗縱治簡易蠲略細苛先是戍邊者道由洛儲餼取於民縱始今官辦使五家相保自占發斂以絶胥吏之私又引伊洛溉高仰通利里閈人甚宜之政嚴清姦人不容息李朝隱擢河南尹政嚴清姦人不容息太子舅趙常奴怙勢橫閭里朝隱曰此不繩不可為政執而榜辱之帝賜書慰勉不屈附權貴裴寬徙河南尹不屈附權貴河南大治五世為河南裴諝進河南尹東都副留守凡五世為河南諝視事未嘗敢當正處以寬厚和易為治不鞠人以贓其政不苛細李適之徙河南尹其政不苛細為下所便玄宗患榖洛歲暴耗徭力詔適之以禁錢作三大防曰上陽積翠月陂自是水不能患刻石著功都鄙安之房式改河南尹會討王承宗鎮州索餉軍其四千乘民不能具式建言歲凶人勞不任調發御史元積亦言賊木禽而河南民先困詔可都鄙安之清淨惠下鄭珣瑜為河南尹未入境會德宗生日尹當獻馬吏欲前取印白珣瑜視事且納贄珣瑜徐曰未到官而遽事獻禮歟不聽性嚴重未嘗以私託人而人不敢謁以私至河南清淨惠下賤斂貴發以便民不為萬人産沴鄭珣瑜韓全義將兵伐蔡河南主饋運珣瑜密儲之陽崔以給官軍百姓不知僦運勞凡迎送敕使皆有常處吏密識其馬進退不數步差也全義與監軍別檄有所取輒掛壁不酬至軍罷凡數百封有諫者曰軍須期會為急公可不報答曰武士統戎多持以取求苟以為罪尹宜坐之終不為萬人産沴也榜殺姚文壽部曲馮宿拜河南尹洛苑使姚文壽縱部曲奪民田匿于軍吏不敢捕府大集部曲輒與文壽偕來宿掩取榜殺之惡少惡風遁去李紳為河南尹河南多惡少或危帽散衣擊大球尸官道車馬不敢前紳治剛嚴皆望風遁去不務苛細李適之為河南尹適之性簡率不務苛細人吏便之舊史少尹十八孔少尹二人從四品下掌二府州之事歲終則更次入計百官志亞尹故事內名缺未補間亞尹得行大京兆事長平叔制白居易尹總牧務少尹副焉郭行餘擢纍京兆少尹嘗值尹劉栖楚不肯避栖楚補導從繫之自言宰相裴度頗為諭止行餘移書曰京兆府漢時有尹有都尉有丞皆詔自除後循而不改開元時諸王為牧故尹為長史司馬即都尉丞耳今尹總牧務少尹副焉未聞道路間有下車望塵避者故事猶在栖楚不能答裁押其謬李憕出為河南少尹尹蕭炅內倚權骫法殖私憕裁押其謬吏下頓之疏決三輔唐舊史李元紘為京兆少尹有詔疏決三輔權要之家皆緣渠立磑以害水田元紘一切毀之人獲其利白參畫幕掌軍謀膺使檄載筆旌旄運籌惟幄受命辟書袛事戎府任在軍要權制兵機任為從事禮以上賓交辟苟進從軍則望重仲宣王粲也參謀幕府制勝樽俎盛府求賢戎書辟士魯連飛書燕將得而自殺青油幕蓮幕花幕佐幕則才高阮瑀字元瑜戲談陶侃為督諸參佐戲談廢事侃責之曰君子當攝其威儀何有亂頭養望自謂宏達耶陳琳草檄魏祖讀以愈風朝廷重寄委之以侯伯軍府庶務制之以賓客賓佐賓僚賓榮主禮入幕之賓郤起在桓溫帷下謀謝安在外望見郤生可謂入幕之賓也難進易退三揖而進一辭而退不可則止無自辱焉幕府十九孔趙璟審官議六藩府官屬曰諸使辟署務得才以重府望能否已試則引而置之朝無俾久滯列傳護解王緯與李泌俱為路嗣恭江西觀察判官泌見惡於元載嗣恭希意欲殺之緯護解僅免諸將慚懼盧坦為鄭滑節度使判官監軍薛盈珍數干政坦每據理拒之有善笛者大將等悅之詣帥請為重職坦笑曰大將久在軍積勞亟遷乃及右職奈何自薄欲與吹笛少年同列耶將慚懼遽出就坦謝平朱泚露布于公異李晟表為招討府掌書記朱泚平露布於德宗曰臣既肅清宮禁祗奉寢園鍾虡不移廟貌如故帝覽泣下曰誰為之辟或以公異對帝咨歎一再佐於賓席諸侯辟之以佐於賓席杜牧李承慶制各宜良士以佐賢侯高湜制上太原奏令狐楚李說嚴綬鄭儋繼領太原高其行引在幕府由掌書記至判官德宗喜文每省太原奏必能辨楚所為數稱之尤相引重柳公綽武元衡節度劍南與裴度俱為判官尤相引重軍府之要掌在賓寮白居易路貫制以師禮禮之劉蕡對後七年有甘露之難令狐楚牛僧孺節度山南東西道皆表蕡幕府以師禮禮之與均禮崔咸元和初擢進士第又中宏辟鄭餘慶李夷簡皆表簡幕府與均禮三佐社悰畢諴碎忠武杜悰幕府悰領度支表為巡官又從辟淮南入拜侍御史持刀負棺賈直言後署李師道府屬及師道不軌持刀負棺入諫曰願前死不見城之破又畫縛載檻車狀而妻子繫纍者以獻師道怒囚之劉悟既入釋其禁辟署義成府後徙潞亦隨府遷穆宗召為諫議主留務徐彥若為清海軍節度使卒于鎮而行軍司馬劉隱因主留務方時多難彥若最見信于帝有以事自陳者帝曰汝當問彥若其所倚任如此料精兵赴難李栖筠遷安西封常清節度府判官常清被召攝行軍司馬肅宗駐靈武發安西兵栖筠料精兵七千赴難擢殿中侍御史神安思敏李巨川河中王重榮辟為常書記重榮討黃巢書檄奏請紛沓須報趣發皆屬巨川神安思敏言趣中理鄰藩皆驚檄筆無與讓幕謀誰其膺韓愈送侯參謀詩異席咨事浙西觀察使其所擇從事望幕府盛選材彥觀察判官許鴻謙有學識栖筠嘗異席事多咨之獨禮敬崔衍遷宣歙池觀察使其所擇從事多得名流時有士者待賓僚率輕傲衍獨加禮敬幕中之士後多顯達
