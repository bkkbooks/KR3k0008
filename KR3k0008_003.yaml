body:
  text: 卷第三白氛霧冥冥月令仲冬行夏令則氛霧冥冥積水上溢故為霧莊子霧不塞望西京雜記曰太平之世霧不塞望浸淫被泊而已三日世紀黃帝時天大霧三日帝游洛水之上見大魚乃得圖書五里張楷字公超能為五里霧所居學者成市故有公超市三里裴優能為三里霧後因霧而作賊豹隱陶答子妻曰南山有玄豹霧雨七日不下食欲以澤其毛羽成其文章蛇遊韓子飛龍乘雲騰蛇遊霧戰涿鹿黃帝與蚩尤戰于涿鹿之野蚩尤乃作大霧圍平城高祖於平城之圍大霧三日迷雲夢曹公至赤壁過雲夢澤中大霧遂迷失道丹山銀山并出霧也銀山常山素霧四塞漢王氏五侯同日封其日黃霧四塞開而睹天衛瓘見樂廣曰此人若冰鏡每見瑩然若開雲霧而睹青天行不迷道魏略劉翊鳴每出行雲霧中識道不迷時人因謂之能為雲霧如晦高褰蹇開也蒙昏隱翳助海成深見露門浪泊西馬援在浪泊西里間虜未滅時下潦上霧毒氣薰蒸仰觀烏鳶點點墜水中夕霧朝煙冒重霧博物志云王爾張衡王均三人冒重霧行一人無恙一人病一人死問其故無恙人曰我飲酒病者食死者空腹終隱南山霧謝眺詩曰雖無玄豹姿終隱南山霧睹青天徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之若披雲見日月開霧睹青天孔如墮崔彥曾為徐州觀察使龐勳陷宿州曾料丁男乘城俄而勳傅城城中大霧如墮塞庭崔沆乾符五年同平章事昕旦告麻大霧塞庭中晝冥竇建德隋右翊衛將軍薛世雄督兵三萬討之屯河間七星井會大霧晝冥跬不可視隋軍驚潰紛霧如雪五行志大曆二年十一月紛霧如雪宿霧洞開髣佛有像神仙下來皓氣氤氳仙都山銘白霧生而匝地文粹楊炯少室廟銘曰白霧生而匝地霧雨如泣五代郭允明謀殺楊邠等是日無雲而昏霧雨如泣百邪之氣五行志霧者百邪之氣為陰冒陽本于地而應于天乘霧行蘇烈貞觀初從李靖襲突厥頡利於磧口為前鋒乘霧行去賊一里許霧霽能為數里霧韓似在桂州有妖賊封盈能為數里霧聲言某日將攻桂州有紫氣者我必勝至期果紫氣如匹帛自山亙于州城白氣直衝之紫氣遂散天忽大霧至午稍開霽酉陽雜俎霏微誤噓吸膚腠生寒栗韋蘇州凌霧行才看含鬢白稍視霑衣密道騎全不分郊樹都如失霏微誤噓吸膚腠生寒栗每殺不辜天必大霧希聲矯殷令殺高郁是日大霧四塞殷怪之曰吾嘗從孫儒每殺不辜天必大霧豈馬步獄有冤死乎明日吏以狀白殷撫膺大哭五代史楚世家晝昏天寶間霧昏暗十步外不見人是謂晝昏占曰有破國霧連日不解其國昏亂景龍三年十一月甲寅日入後昏霧四塞經二日乃止占曰霧連日不解其國昏亂同上寒日出霧遲杜甫早發射洪詩碧窗宿霧濛濛濕同上天景晴麗必有素霧三水小牘汝南臨汝縣南十八里廣城陂之西垠有小山曰崆峒耆老云若九春三秋天景晴麗必有素霧自山巖赽須臾粉堞青甃彌亙數里樓殿轇轕花木煥爛數息中霧勢映漫不復見矣庸輩不知神仙窟宅謂廣成子化城乃俚談也天大昏霧五代康懷英莊宗謂周德威曰梁謂我新立宜出其不意擊之疾馳六日至北黃碾會天大昏霧伏兵三垂岡直趨夾城攻破之懷英大敗宿霧浥高旻韓愈詩霽霧搴高牖杜甫大雲寺晝霧夜晴臣志得申唐五行志黃霧昏濁不雨景龍二年八月甲戍黃霧昏濁不雨同上白霧四塞至德二載四月賊將武令珣圍南陽白霧四塞黃霧四塞日無光貞元十年三月乙亥黃霧四塞日無光同上大霧昏塞咸通九年十一月龐勳圍徐甲辰大霧昏塞至于丙午白履霜堅冰積水所成增冰為積水所成積水曾微增冰之凜渙若冰將釋履薄戰戰兢兢如履薄冰涉春心之憂危如涉春冰固沍凝也淋漓泮也冰以風壯風解立春日冬風解凍月令冬凝春泮淮南子水冬則凝而為冰春則泮而為水皚皚思玄賦云行積冰之皚皚清泉沍而不流清如玉壺冰始冰立冬日水始冰月令水有時以凝周禮不冶之冰陽冰不冶海賦時燠公羊冬無冰時燠也六尺朝錯上書曰胡貉之地冰厚六尺百丈神異經曰北有冰万里厚百丈東海蠶拾遣記東海員嶠山有冰蠶以霜雪覆之則為繭色有五彩增冰峨峨楚辭未泮逮冰未泮馴致易曰履霜堅冰陰始凝也馴致其道至堅冰也渙然冰釋飲冰莊子曰朝受命而夕飲冰我其內熱與蟲疑莊子曰夏蟲不可與語冰天臺山賦哂夏蟲之疑冰魚上立春日東風解凍後五日魚上冰月令光武渡河光武至呼沱河追兵至河水流澌無船可渡使王霸往視霸恐驚衆還曰冰堅可渡比至冰合帝遂得渡慕容蹈海王隱晉書慕容晃上言躬征郭遠假陛下天地之威精誠感靈為結冰凌行海中三百里鳥覆姜源踐大人跡生子棄之寒冰上鳥翼覆之魚躍王祥母欲生魚祥解衣將剖冰求之冰忽自解雙鯉躍出狐聽述征記曰河水始合要狐先行方得渡言狐欲渡河冰先聽無水聲而後過陷冰丸後漢青州刺史焦和召治戎烈巫史禜禱又恐賊乘冰過多作陷冰丸投河衆賊遂潰袁談魏志初袁談時民亡椎冰注時川凍合不得降火冰博物志曰削冰令圓舉以向日又以艾承其影則有火出琢冰文子曰巧冶不能銷木良匠不能琢冰負重鄧拱上書曰明君之御民若乘奔而無轡履冰而負重寒冰荀卿子冰生水而寒於水瓶中冰淮南子曰見一葉之落知歲之將暮睹瓶中之冰知天下之寒以近論遠誕置之寒冰鳥覆翼之詩姜嫄尺冰見火門一苣火注抱冰吳越春秋曰越王念欲復怨非一旦也苦思勞心夜以接日寒則抱冰當白日見火門猛火注凝池束皙集曰澗薄冰凝非登廟之寶零露垂林非綴冠之飾必將採素璧於層山撰圓珠於重泉北方鼠神異經曰北方冰厚百尺有鼠在冰下其鼠毛長百尺藏冰二之日鑿冰沖沖聲也三之日納于凌陰冰室也今正月四之日其蚤獻羔祭韭北陸日在北陸而藏冰今十二月取之窮谷深山窮谷固陰沍寒於是取之享司寒其藏之也黑牡秬黍以享司寒司寒玄冥北方神也山人取之縣人傳之輿人納之隸人藏之藏之也周周密也七月之卒章藏冰之道也豳國風詩方盛季冬天子命有司冰方盛命取而藏之禮納於冰室取以山人當粟烈之辰入沍寒之室文選雅協豳詩未乖周禮慮蟲疑之時不可闕也及狐聽之日于以藏之斬冰周禮凌人掌冰歲十二月令斬冰三其凌注三倍其冰為消釋無或失時令藏川池之冰棄而不用言不取於山谷又頒用之餘棄之開冰四之日其蚤獻羔祭韭西陸朝覿而出之今三月出入以時開冰春分後天子獻羔開冰先薦寢廟朝之祿位賓食喪祭於是乎用之桃弧棘矢其出之也桃弧棘矢以除其災食肉之祿冰皆與焉喪浴大夫命婦喪浴用冰獻羔而啓之火出而畢賦老疾大夫命婦至于老疾無不受冰以風壯而以風出其用之遍山人冬鑿冰室春開玉壺夏薦取順沍寒用資清暑致夏蟲之疑闕而為罪遇時燠之變責則難加春始治鑑鑑盛冰器也將獻羔啓冰也夷盤亦器也喪事供夷盤冰所以寒尸置床也頒冰夏頒水注夏暑氣盛乃頒賜冰也伐冰之家不畜牛羊夏頒秋刷刷除冰室更納新冰凌人職祭祀供鑑賓客供冰大喪供夷盤冰冰二孔冰一昔合王方翼七月次葉河無舟而冰一昔合時以為祥次鴨緑水契苾何力拜遼東大總管次鴨緑水蓋蘇文遣男以精兵數萬拒險衆莫敢濟會兵合何力引兵譟而濟賊驚遂潰逐鹿回鶻拔野古族乘木逐鹿冰上木冰五行志永徽二年十一月甲申陰霧凝凍封樹木數日不解劉向以為木少陽貴臣象此人將有害則陰氣脅木先寒故得雨而冰也亦謂之樹介介兵象也海冰長慶元年二月海州海水冰南北二百里東望無際有文如畫五行志景福中滄州城塹中冰有文如畫大樹華葉芬敷者時人以為其地當有兵難近華孽也冰井百官志上林署季冬藏冰千段先立春三日納之冰井以黑牡秬黍祭司寒啓冰亦如之乘木馬馳冰上回鶻俗乘木馬馳冰上以板藉足屈木支腋蹴輒百步勢迅激糜冰吐谷渾任城王道宗行空荒二千里乏水草士糜冰踐冰東夷流鬼以木廣六寸長七尺系其上以踐冰常堅冰唐杜陽編順宗即位歲拘弭國貢常堅冰其國有大凝山中有冰千年不釋及齎至京師潔泠如故雖盛暑赫日終不消嚼之即與中國者無異冰筋唐開元遺事冬日雪霽寒結簷溜皆為冰條妃子使侍兒取玩帝晚朝回問之妃子答曰所玩冰筋也粉壁生寒象筵布韋蘇州夏冰歌碎如墜瓊方絶璐粉壁生寒象筵布玉壺紈扇亦玲瓏座有麗人色俱素又出自玄泉杳香之深井浮彩浩浩仰吞素靈韋蘇州冰賦壯以烈風積如群玉浮彩浩浩仰吞素靈古者祭之以黑牡其蕆以節祓之以桃弧其出以潔又云碎似墜瓊方如截璐況粉壁雲矗象筵霜布坐有麗人皎然俱素紅冰唐開元遺事楊妃初承恩召與父母相別泣涕登車時天寒淚結紅冰長安冰雪至夏價等金璧止戈集千歲積冰結為玻璃出酉陽雜俎冰脈勾沚冰解脈杜牧遊石盎夏至頒冰及酒以酒味濃和冰而飲李德裕一品集注冰梁飛雪斷道冰成梁柳宗元冰山避暑楊氏子弟至伏中取大冰琢成山周圍宴席坐客雖酒酣各有寒色有挾纊者開元遺事敲冰煮茗逸人王休居太白山下每冬時取溪冰琢其精瑩者煮茗以供賓客冰獸見伏日門峻塗拖長冰直上若懸溜韓愈南山詩池冰作花如纈開成末河陽黃魚池池冰作花如纈酉陽雜俎崢嶸如山出酉陽雜俎皓曜群玉發淒清孤景澄韋應物詩盛夏常凍西域弗栗恃護苾那城東北大雪山盛夏常鑿冰乃可渡白火就燥易炎上書作苦炎上作苦鑽燧改火燧人氏始用火春取榆柳之火夏取棗杏之火秋取祚槱之火冬取槐檀之火一年中攢火各異逐時色燎原若火之燎于原不可嚮邇火烈人望而畏之則鮮死焉災輝國語火無災曰輝焰焰無若火始焰焰厥攸灼序不其絶嚮邇不可嚮邇撲滅其猶可撲滅言不可近自焚兵猶火也弗戢將自焚盛德在火立夏月令方陽詩云燎方陽烈烈如火烈烈詩望畏見上注蹈死見論語鬱彼火氣尊而不親火之於人也尊而不親丹丘拾遺録云丹丘千年之燒陽精炎德生木克金抱薪救火文子回祿火神陽精上騰炎氣旁達餘燼司爟周禮司爟掌行火之政令四時變國火以救時疾內火出火季春出火季秋納火注云順火星藏見而出納火也火令時則施火令注謂今焚菜之時火禁宮正春秋以木鐸修火禁因火星入戒司烜司烜氏以陽燧取火於日以供祭祀之明燭以照祭也無焚山林月令仲春火化器食皆以火化修火之利火之利人也禮金燧注云取火於日焚巫尪魯旱公欲焚之閼伯陶唐氏火正食心食咮古火正或食於心或食於咮謂有功於職得配享火星心鶉星咮鶉首也火紀炎帝以火紀為火師而火名官燔柴祭天蜀井蜀都賦火井沉熒於幽泉高焰飛扇齊牛齊將田單燒牛以破燕軍楚象傳曰楚昭王使執燧象以奔吳師謂以火繫象尾燒秦宮室史項羽燒秦宮室火三月不滅燒棧張良勸漢王焚舟秦孟明爝火不息莊子堯讓許由曰日月出矣而爝火不息其光也不亦難乎束蘊蒯通請火更火馬融云周月令有更火配五行而攸序備六府而孔修燒券馮歡燒券市義於薛人焚山晉侯焚山求賢於介子焚裘晉帝焚雉頭裘冰火見冰門火冰注一苣火論衡曰夫然一苣火爨一尺冰終日不熱持一尺冰置庖廚中終夜不寒何也微之感大不能動也今鄒子不過如苣火尺冰而皇天巨大不徒鑊水庖廚也一仰天嘆天為雨霜何天之易感霜之易降握吳越春秋越王欲報吳王苦思勞心夜以接日夏熱則握火出入則嘗膽吐火葛仙公別傳曰公與客談話時天寒公謂客曰居貧不能人人得爐火請作一大火以共暖焉仙公因吐氣火赫然從口而出須臾火滿室坐客皆熱脫衣矣愛火韓詩曰不數易非愛火也火災人火曰火天火曰災俱焚火炎崑岡玉石俱焚不戢將自焚廄焚吳宮燕秦始皇時吳宮吏以火照燕窠因燒吳宮夷陵白起攻楚燒夷陵禍之釁必始於火商人窺其禍敗必始於火是以知天道將有火士伯對晉侯鑄刑書鄭鑄刑書士文伯曰火見鄭其火乎火而出而作火火出而象之叫宋廟焚吳宮鳥鳴或叫宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻書焚室而寬其征與之財鄭子産宋伯姬介子推哭禮有焚先人之廟者則哭三日拜廄焚孔子拜鄉人之為火來者劍飛出晉武庫火纍代寶盡焚見斬蛇劍飛出屋池魚殃及池魚宮燕天火蜀糜竺子仲自洛歸去家數十里路旁有好新婦求載行二十餘里告曰我天使也使燒東海糜竺家竺因愁請之婦曰不得不燒但君馳去我緩行日中火必發竺乃急歸出財物日中火果大發官署失火近廟晉尚書荀顗曰近太祝署失火燒三間半署在廟北隔道在重牆之內又即已滅頻為詔旨所問主者以詔聞顗責尚書不按行禁止此輩皆為過當償財梁鴻家貧牧豕誤燒火延及他舍鴻乃尋訪燒者問所失悉以其豕償之其主猶以為少鴻曰無他財願以身傭力償之失火有刑司爟掌行火之政令凡國失火野焚萊則有刑罰焉注野焚萊擅放火者救火濟濡帷幕鬱攸從之象葺公屋徹屋樂喜火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗巡丈城繕守備表火道具正徒令燧正奔火撲滅見前行火所焮子産令焮炭也抱薪去稿傳去表之稿注表火道稿草也曲突徙薪無恩澤焦頭爛額為上客漢時人有上書論徐福先言霍氏也先言魏勃曰失火之家豈暇先言後救火襦褲廉范為蜀守不禁火但嚴水備人歌曰不禁火人安堵昔無襦今五褲降雨江陵令劉昆向火叩頭能反風降雨滅火徵拜議郎三噀郭憲救齊火噀酒欒巴救蜀火雖政在救災而仁唯愛物季桓為政猶止傷人尼父退朝不問乎馬徒望成都之雨誰反江陵之風望而畏之蹈而死者濡馬褐救火起屋漢書言越俗起屋以厭火柏梁災而作建章以厭火囚脫械救火劉榮坐事郡付縣獄為野火所及榮脫械救火事畢還獄自著械禳祭宋樂喜使祝宗用馬於四墉墉城也積陰之氣故祝之祀盤庚西門之外天災有幣無牲用馬祀盤庚皆非禮玄冥回祿鄭子産禳火於玄冥回祿玄冥水神回祿火神祈于四墉子産三日哭國不市大為社祓禳於四方振除火災禮也子産祭爟爟火也祭之者報其為明之功也周禮孔設燎太平公主下降自興安門設燎相屬道樾為枯昭德寺火溫造大和二年內昭德寺火延禁中野狐落野狐落者宮人所居也死者數百人是日宰相兩省官京兆尹樞密皆集日華門督神策兵救火獨御史府不至造自劾曰臺擊賊恐人緣以結姦人火姚璹證聖初加秋官尚書明堂火后欲退正殿應天變璹奏此人火非天災也多火宋璟徙廣州都督廣人以竹茅茨屋多火璟教之陶瓦築堵列邸肆越俗始知棟梁利而無患禁中火近東宮趙涓始永泰時禁中火近東宮代宗疑之涓以監察御史為巡使驗治明諦跡火所來乃宦人直舍天火鍾傳圖撫州天火其城燧人有興火食之利柳宗元爐存火似紅杜甫詩畬田費火聲同上堤松江為路變屋瓦王仲舒徙蘇州堤松江為路變屋瓦絶火災開大衢忠疏析廛閈杜佑遷嶺南節度為開大衢疏析廛閈以息火災夜焚槁積約救火則亂段秀實大曆二年徙涇州是軍自四鎮北庭赴難征伐數有功既驟徙相與出怨言別將王童之謀作亂明日人有以其謀告者曰夜焚槁積約救火則亂秀實嚴警備夜中果火發令軍中曰敢救者斬童之居外請入不許明日捕之並其黨八人斬以徇曰後徙者族軍遂遷涇州野火逮塋樹孝友許伯會越州蕭山人母喪野火將逮塋樹悲號于天俄而雨火滅登燕子樓自焚時溥朱全忠使龐師古代友裕溥分兵固保石佛山師古攻拔之自是完壘不戰王重師牛存節等梯其堞時溥取金玉與妻子登燕子樓自焚死火輒隨發吳越錢元瓘天福六年杭州大火燒其宮室逮盡元瓘避之火輒隨發元瓘大懼因病狂孽煨潛扇劉承慶明堂災疏孽煨潛扇倏忽成災熛焱熾突哥舒翰傳負薪塞路順風火其車熛焱熾突騰煙如夜滅炬弗焚黃巢圍福州過崇文館黃璞家令曰此儒者滅炬弗焚燭天吐蕃入豐義圍華亭守將求救於隴州刺史蘇清沔合兵赴之虜積薪將焚華亭清沔潛兵大象龕夜半約城中舉火燭天虜驚因襲其營乃去士寒附火嚴震朱泚反奉天危蹙震聞馳表奉迎遣大將張用誠以兵扞衛至盩厔有反計會震牙將馬勳嗣至用誠未知其謀陰令焚草館外士寒爭附火景亂水中永王璘領山南江西嶺南黔中四道節度使李銑陳江北夜然束葦人執二炬景亂水中覘者以倍告璘軍亦舉火應之璘疑王師已濟攜兒女及麾下遁去遲明覺其紿復入城鬱焰四興高麗九月藏遣男産率首領百人樹素幡降且請入朝李績以禮見而男建猶固守出戰數北大將浮屠信誠遣諜約內應五日闔啓兵燥而出火其門鬱焰四興叱火九國志吳盧文進遷潤州節度使中火救之不息文進怒自出州門使召馬步使將斬之聲至火即滅廣壽殿火明宗廣壽殿火災有司理之請加丹雘喟然嘆曰天以火戒我我豈宜增以侈耶五代史明宗本紀截然高周燒四垣神焦鬼爛無逃門陸渾山火詩韓文彤幢絳旃彤幢絳旃紫纛幡炎官熱屬朱冠褌同上霞車紅靷日轂轓丹蕤縓蓋緋翻㠾同上八人翟天師乾祐常入夔州市大言曰今夕當有八人過此可善待之人不之悟其夜火焚數百家八人乃火字也出酉陽雜俎火泄於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣韓文火傘光華閃壁見神鬼赫赫炎官張火傘韓愈青龍寺燉于融風潛火煽孽燉于融風柳宗元湘源妃碑赤龍遊玄都金烏入梵天赤龍遊玄都武陵觀火劉禹錫星雨灑中衢火出摧半空星雨灑中衢同上驗火登仙文粹渾天賦師門何術兮驗火而登仙楊炯長熛長熛烘舳艫觀火詩吹熒吹熒照水府同上女丁婦壬傳世婚韓文陸渾山火卻火錐唐順宗時拘彌國所貢杜陽編雷門四石事略王維輞川林下坐用雷門四老石燈滅則石中鑽火玉火唐東夷所貢色赤見玉門杜陽編卻火鳥順宗朝拘彌國貢雀一雌一雄純黑色大小似燕其聲清厲殆不類尋常禽鳥若置於列火中而火自散去帝嘉其異以水精籠盛之宮人以蠟炬燒之終不能損毛羽永州多火災五年之間四為大火所迫跣足出壞牆壁穴牖僅免燔灼一遇火恐纍日茫洋不能出言柳文紅衣尼芝田録唐相賈耽退歸第令召上東門卒嚴戒之曰明日當午有異色人入門爾必痛擊之死且無妨門卒稟命自巳至午果有二尼自東相序而至施朱傅粉冶容艷佚如倡人之婦其衣紅色卒因以撾痛擊之行去百步忽不見卒以告耽耽嘆曰然不免小有災矣翌日東市奏火延百十家灰四白積而止水女媧取以救災淮南子云古往之時水浩蕩不息於是女媧積蘆灰以止水散以從風楊琰用而破敵後漢楊琰為零陵太守時蒼梧群賊攻劫琰乃制車數十乘置灰車中從風散灰賊不得視因以敗之禁其棄道史商君之法禁棄灰於道死而不然韓安國字長孺坐枉法獄吏田甲辱之安國曰死灰獨不然乎甲曰然則溺之環月暈淮南子畫隨灰而暈闕注云以蘆灰環月闕其一面暈亦隨而闕應律飛續漢書以葭莩灰實律之端按曆而候之其月氣至則飛灰而管通昆明劫灰武帝穿昆明池悉是灰墨有外國胡道人云此是天地劫灰之餘心若死灰莊子煨燼洗腸之用三斗孔取煨汰寶文懿公主薨以金貝寓車廞服火之民爭取煨以汰寶灰埃儒學序集賢殿部分典籍乾元殿博匯群書經籍大備又稱開元焉祿山之禍兩京所藏一為灰埃典策埃滅唐公主贊僖昭之亂典策埃滅故亡者闕而不書采灰食貨志奉天鹵池生水柏以灰一斛得鹽十二斤利倍鹼鹵文宗時采灰一斗比鹽一斤論罪地有殘灰咸通十四年成都童謠曰蛇去馬來道路稍開頭無片天地有殘灰白檀灰唐開元遺事楊國忠冬月以白檀灰鋪爐底餘灰可參雜也煨塵魏元忠上封事士之懷琬琰就煨塵灑灰周公所不堪灑灰垂教典韓愈食蝦蟆詩吟詠思管樂此人已成灰李白玉真別館寒灰重暖愁來飲酒二千石寒灰重暖生陽春江夏贈韋冰詩輕我土與灰遂令世上愚輕我土與灰酬張卿詩階除灰死燒丹火憶昔行寒燼劉禹錫福成寺高門修廊委為寒燼寒爐委灰劉禹錫傷往賦風臺露榭生光飾死灰棄置參與商柳宗元潰為埃煤劉禹錫驛路記潰為埃煤篲可掃自然灰酉陽雜俎凡雕琉璃先以自然灰煮令軟灰出海南間夷陵土黑有秦灰劉禹錫望硤中灰劫問胡僧杜甫寄劉峽州燼火滿庭灰元稹詩白生羅襪羅襪生塵化素衣京洛多風塵素衣化為緇生甑中范丹為萊蕪令甑中生塵動梁上虞公善歌發聲動梁塵浮清路君為清路塵妄為濁水泥浮沉各異勢古詩云增高山山不讓塵故能成其高大揚滄海神仙傳王君平曰聖人言海中復揚塵紅塵四合黃埃紅塵晝昏清塵維塵冥冥詩望之而拜潘嶽芳塵凝榭滿席輿曳柴而僞遁傳晉楚戰狐毛設二旆而退之欒枝使輿曳柴而僞遁注曳柴起塵詐為衆走塵上而囂伯州犁望楚軍望塵知馬步多少名將車軌塵長者禮凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及於長者鳴鳶前有塵埃則戴鳴鳶禮同其塵老子曰和其光而同其塵野馬莊子曰野馬動塵埃也世俗之塵楚辭曰安以皓皓之白蒙世俗之塵埃歸東南淮南子地不滿東南故水潦塵埃歸焉撫塵應璩與曹公書曰昔漢光武與黃子高有撫塵之好也玄蛇山海經曰黑水之南有蛇日食塵又大人之國有玄蛇頭方食塵蚓蔡雍云蚓無爪牙軟弱不便穿穴地洞食塵飲泉蓬塊拔坱博物志云徐州人謂塵為蓬塊吳人謂塵土為拔坱棲弱草李康遊山序曰蓋人生天地之間也若流電之過戶牖輕塵之棲弱草污人郭子曰庾公名位漸重足傾王公時庾在石城王導在都城因風起揚塵王以扇拂之曰元規塵污人元規庾亮字也塵五孔煙塵漫數十里張介然安祿山反守陳留到屯不三日賊已渡河車騎躁騰煙塵漫數十里日為奪色曳柴揚塵顏杲卿檄河北言王師二十萬入土門遣郭仲雍為先鋒馳而南曳柴揚塵望者謂大軍至流積武攸暨盤桓龍門少室間所賜金銀鐺鬲野服王公所遺鹿裘素障癭杯塵皆流積不御也三斗塵寧食三斗塵無逢權懷恩煙塵漲天裴行儉阿史那伏念僞稱可汗行儉總諸軍頓涇口後數日煙塵障天而南斥候惶駭飛埃結紅霧唐開元遺事長安春時盛於遊賞故學士蘇頲應制詩云飛埃結紅霧游蓋飄青雲帝覽詩嘉焉以御花親插頲巾上肥馬塵杜甫詩暮隨肥馬塵滿席楊綰凝塵滿席淡如也埃霧囂塞李密王世充決戰既兩軍接埃霧囂塞辟塵巾高瑀在蔡州有軍匠田知回易折缺數百萬令錮勘有處士皇甫貞玄者謂田曰當為君解此難遂謁高曰某於新羅獲一辟塵巾欲獻此贖田高才熱已覺體中虛涼請試之翌日宴于郭外時久旱埃塵且甚高顧視馬尾鬣及左右騶卒數人並無塵埃監軍固求見皇甫具述救田之意且言餘一針可令一身無塵針金色大如布針試之塵唯及馬髮尾焉出酉陽雜俎辟塵針見上隔兩塵異人丁約隱於卒伍韋子威師事之一日辭去謂子威曰郎君得道尚隔兩塵子威問其故約曰儒謂之世釋謂之劫道謂之塵續仙傳煙埃韓昌黎詩薄暮耿耿和煙埃立馬塵坌中劉禹錫汴州新亭記兩童縛帚洛陽要記王維輞川宅宇既廣山林亦遠不容浮塵日有十數掃飾者兩童縛帚時有不給大漲竇建德傳秦王麾軍先登騎怒塵大漲逆胡冥漠隨煙燼杜甫詩歡走塵起李石道路妄言兵且至京師歡走塵起白變通莫大乎四時敬授人時動二氣之和以四時為柄廢時亂日行夏之時馮相氏辨四時之序以日影知氣至否天地革而四時成敘四時之大順不可失也司馬遷論陰陽家天吏淮南子四時天之吏讀時令晉禮志曰太史每歲上其年曆先立春立夏大暑立秋之冬讀五時令服各隨五時色帝御坐尚書令已下就席訖賜酒一卮又魏明帝讀四時令服黃之時闕不讀又晉咸和元年六月有司奏讀秋令兼侍中荀奕駮云云又漢宣帝時魏相奏請明經通知陰陽者四人各主一時之至明言所職以和陰陽如高祖時令謁者趙堯舉春李辭舉夏倪陽舉秋貢禹舉冬之類宣帝從之敘四時六孔天有四時五行寒暑迭居孫思邈同上無形而運於下曆志四時寒暑無形而運於下天日月星有象而見於上置直學士象四時李適初中宗景龍二年始於修文館置直學士十二員象四時天有五星運而為四時許敬宗傳代為節序呂向注文選秋興賦四時代為節序四序嬰我懷杜甫詩誰揮鞭策驅四運李白日出行四時各平分一氣不可兼韓文君子法天運四時可前知無日休息四時之間無日休息陸贄考星中以正四時天文志昔者堯命羲和出納日月考星中以正四時星辰辨其分張說華山碑天有四序星辰辨其分四時轉續變於所極人稟五行動止有則四時轉續變於所極四時之序天地不能變變之則霜露不均水旱交錯敬暉表天地之運必合乎四時寒往則暑來暑退則寒集同上白其日甲乙帝太皞以木德王神勾芒木正春為青陽為發生載陽春日遲遲春日性仁事貌味酸臭膻數八食麥與羊器疏以達牲無用牝禁伐木獻穜稑主后率六宮之人獻穜稑之種於王獻鱉蜃舍菜春入學舍菜合舞風人管子曰吾不能以春風風人夏雨雨人吾道窮矣夤賓出日平秩東作登臺如登春臺徇路木鐸傷春目極千里傷春心司春漢魏相曰陰陽之分以日為紀各有常職不得相干東方之神太皞乘震執規司春蟲鱗音角祀戶祭先脾立春立春盛德在木迎春於東郊條風至並立春日啓閉立春立秋出土牛以示農耕之早晚立春早則策牛人近前立春晚則人在後所以示人之早晚司啓青鳥氏司啓者立春立春日東風解凍後五日蟄蟲始振後五日魚上冰纂要梁帝纂要春為青陽芳春青春三春九春天曰蒼天風曰陽風柔風惠風景曰媚景和景韶景時曰良時辰曰良辰嘉辰節曰華節良節嘉節韶節淑節草木草曰弱草芳草芳卉木曰文木華樹芳樹陽林茂林鳥陽鳥時鳥陽禽候鳥時禽好鳥春分春分日玄鳥至日中星鳥分至春分秋分司分之官少皞氏以玄鳥為司分者以春分來而秋分去故為司分也祠高禖玄鳥至日同道傳曰分同道也注云日夜等日月同道日夜分分平正月日在虛律中太簇中氣日危每歲孟春遒人以木鐸徇于路太皞之月其帝太皞行慶施惠下及兆人迎春還命太史司天歷候祭風師立春後五日也釁龜策占兆審卦吉凶周禮龜人上春釁龜上春建寅月雨水之日獺祭魚中氣也後五日鴻鴈來後五日草木萌動布農事舍東郊修封疆端經術善相丘陵云云元日祈穀謂上辛祈穀郊祀昊天上帝於圜丘親耕樂正習舞修祭典命祀嶽鎮海瀆無用牝禁止伐木無麛無卵無聚大衆無置城郭為妨農掩骼埋胔不可稱兵注稱兵必有天殃無絶地之理三之日于耜正月也始修耒耜豳土晚寒農晚也三之日納于凌陰凌陰冰室孟陽梁元纂要云正月為孟陽亦為孟春孟陬上春初春開春發春亦曰初歲開歲獻歲肇歲芳歲華歲首歲也二月日在營室律中夾鍾仲月中氣日在胃仲春擊土鼓吹豳詩以迎春去桎梏無肆掠上獄訟祭馬祖用剛日修闔扇助通陽氣驚蟄日桃始華二月節也後五日倉庚鳴後五日鷹化為鳩養幼少存諸孤樂正習舞謂將釋奠上丁釋奠於國學命人社春分前後戊日春分之日玄鳥至二月中氣後五日雷乃發聲後五日始雷祀朝日於東郊獻羔開冰先薦寢廟同度量平權衡謂晝夜平則正之祠高禖天子親征后妃從祭馬祖無作大事以妨農事兵役之屬無竭川澤無漉陂池無焚山林順陽氣養物也四之日舉趾周之四月今二月人皆舉足而耕獻鳩周禮羅氏仲春獻鳩於國老鄭玄注云春以鷹化為鳩變舊為新宜以養老助生氣仲陽梁元纂要二月仲陽亦曰仲春亦曰中春上戊釋奠於太公廟三月日在婁中氣日在胃律中姑洗日躔胃維暮春者春服既成薦鞠衣乘舟薦鮪勾萌達覆舟五反聘名士禮賢者修利堤防導達溝瀆修蠶器審五庫之量金革筋角之類無或不良合纍牛騰馬遊牝于牧駒犢舉書其數大合樂磔禳以畢春氣清明之日桐始華三月節也後五日田鼠化為鴽後五日虹始見不可以內時可宣出不宜收斂布德行惠發倉廩賜貧窮賑乏絶穀雨之日萍始生中氣也後五日鳴鳩拂其羽後五日戴勝降于桑罝罘畢翳餧獸之藥無出國門鳥獸孚乳不可傷之傷之逆天時也無伐桑柘愛蠶食享先蠶而躬桑以勸蠶事暮春梁元纂要曰三月暮春亦曰季春晚春大春餘春孔幸黎園李適為學士凡天子饗食游豫唯宰相及學士得從春幸黎園並渭水褉除則賜細柳圈辟厲講武王方慶后欲季冬講武有司不時辨遂用明年孟春方慶曰按月令孟冬天子命將帥講武習射御角力此乃三時務農一時講武安不忘危之道孟春不可稱兵兵金也金勝木方春木王而夆金以害盛德逆生氣孟春行冬令則水潦為敗雪霜大摯首種不入今孟春講武以陰政犯陽氣害發生之德臣恐水潦敗物雪霜損稼夏麥不登願陛下不違時令前及孟冬以順天道手制褒允擲金錢為戲唐開元遺事云內庭嬪妃每至春時於禁中結伴擲金錢為戲迎氣東鄭玄宗開元二十六年正日丁丑迎氣于東郊二月獻牙尺百官志中尚署獻牙尺布德和令柳宗元時令論古之為政者非春無以布德和令行慶施惠養幼少省囹圄賜貧窮禮賢者則其闕政亦以繁矣候啓新風陽開初蟄唐文粹魏徵祀青帝曲候啓新風陽開初蟄吞花臥酒曲江春宴録握月擔風且留後日吞花臥酒不可過時問柳尋花到野亭嚴中丞見過杜甫盤出高門行白玉菜傳纖手送青絲立春置惜春御史唐玉塵集穆宗每宮中花開則以重頂帳蒙蔽欄檻置惜春御史掌之綵花樹唐酉陽雜俎立春日侍臣綵花樹挂紅餤曲江春宴録春遊之家以脂粉作紅餤挂竿上前引車馬進春書以青繒為幟酉陽雜俎北朝婦人立春進春書以青繒為幟刻龍像銜之或為蝦蟆有腳陽春宋璟愛民惜物朝野歸美人咸謂有腳陽春出天寶遺事臘月寒盡溫風發榮劉禹錫楚望賦觸類皆滋陽春播澤觸類皆滋張九齡龍池聖德頌序歲始春者歲之始劉蕡制策懸法象魏文粹含元殿賦及乎獻歲元辰東風發春懸法象魏與人惟新李華萬木華發文粹獨狐及郎邪溪遊序仲春氣至萬木華發觥濁醪而藉落英文粹獨孤及仲春裴宅燕集序與君觥濁醪而藉落英不知年華之相親風景融韋蘇州春序風景融百花師子曲江春宴録曲江家遊賞則剪百花裝成師子互相送遺師有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看春之氣兮悅萬族獨含嚬兮千里目以鳥鳴春韓文護花金鈴寧王每花時綴金鈴於花下以驚禽謂之護花金鈴裙幄長安士女遊春野步遇名花則藉草而坐解裙四圍遮繞如奕棋焉故謂之裙幄春滋乎堇荼未嘗擇善劉禹錫天諭川波岸柳韓文感春洛陽東風幾時來川波岸柳春全回暄風暖景同上暄風暖景明年日岸柳動兮渚蒼落白易易泛渭賦習習兮春風岸柳動兮渚花落春冉冉其將盡豫何為乎不樂披香殿前蒼始紅李白歌披香殿前花始紅流芳發色繡戶中水蕩漾兮碧色蘭葳蕤兮紅芳平原萋兮綺色愛芳草兮如剪李白惜餘春賦景物明媚羯鼓録帝當春曉景物明媚曰對此豈可不與他判斷取羯鼓擊之自製一曲春光好曲終桃杏皆折笑謂侍臣曰此一事不喚我作天工可乎燕草如碧絲李白春思燕草如碧絲秦桑低緑枝寒盡春生洛陽殿杜甫立春日親迎春于東郊開元詔雜花粧林草蓋地白日坐上傾天維蜂喧鳥咽留不得紅蔓萬片從風吹韓文插花賞詩見前斗花天寶遺事長安士女春時斗花戴插以奇花多者為勝皆用千金市名花植於庭苑中以備春時之斗山明宿雨霽風暖百卉舒韋應物休沐詩新黃舍遠林微緑生陳根送豆盧詩冥冥花正開揚揚燕新乳長安遇貧者暄節西郊新禽弄暄節南亭草心緑春塘泉脈動南亭上樓迎春新春歸李賀正月樂辭上樓迎春新春歸暗黃著柳宮漏遲薄薄淡靄弄野姿復宮深殿竹風起三月流水飄香去不歸梨花落盡成秋苑同上三月樂辭始見洛陽春桃枝綴紅糝韓文白其日丙丁帝炎帝神祝融夏日可畏朱明夏為南交春與夏交之際南訛訛化也南方化育之事暑雨小人怨咨長嬴夏為南交之序政失於夏文子其蟲羽音徵律中仲呂數七性禮事視味苦臭焦祀灶祭先心夏之日食菽與彘當暑司夏魏相南方之神炎帝乘離執衡司夏其器高以粗朱夏梁元帝纂要曰夏曰朱夏亦曰長嬴炎夏三夏九夏也天曰昊天風曰炎風節曰炎節亦曰暑節也草木草曰茂草雜草林曰蔚林茂林樹曰茂樹維夏亦曰孟夏首夏初夏甘瓜朱李魏文與吳質書曰浮甘瓜於清泉沉朱李於寒水象德范子與計然書曰德取象於春夏景曰畏景立夏立夏日螻蟈鳴盛德在火迎夏於南郊立夏日啓閉啓立夏也司閉丹鳥氏以立夏來立冬去夏至夏至日鹿角解曰長至陰陽爭日永星火陽極陰生夏至日一陰生分至至冬至也司至伯趙氏以夏至來冬至去伯趙伯勞也漢雜事冬至陽事起君道長故賀夏至陰事起君道衰故不賀受餉齊春秋何敬叔為長城令清廉夏節忽榜門受餉得米二千八百斗代貧人輸租稅閉關易曰君子至日閉關商旅不行后不省方影長尺有五之中禮云夏至日在東井四月日在昴律中仲呂維夏四月維夏清和首夏猶清和正陽之月匿未作匿隱也未作氣未挺祈雨師祈穀實小暑至挺重囚挺寬也出輕繫繼長增高無有隳壞驅獸無害五穀飲酎以彘嘗麥溺金象世說四月八日孫皓溺金象云浴佛後陰病懺悔乃差立夏日螻蟈鳴四月節也後五日蚯蚓出後五日王瓜生慶賜遂行無不欣悅贊傑俊遂賢良舉長大行爵出祿必當其位習盛樂大雩帝自鞀鞞至柷敔皆作曰盛樂禱祝山川古卿士有益於人者以祈穀實小滿之日苦菜秀中氣也後五日靡草死後五日小暑至無起土功無發大衆無伐大樹妨蠶農也無大田獵驅獸類也恐傷生類登麥天子乃以彘嘗麥羞以含桃先薦寢廟收繭稅秀葽豳詩五月日在參律中蕤賓麥秋五月鳴蜩反舌無聲關市無索遊牝別群縶騰駒班馬政祭先牧芒種日螳蜋生五月節也後五日鵙始鳴後五日反舌無聲聚蓄百藥草木蕃時夏至日鹿角解中氣也後五日蜩始鳴後五日半夏生祀黃地祗於方丘嶽瀆等神從祀夏至日百官靜事無刑以定晏陰之所成晏安也陰猶安也無用火南方害微陰也可以居高明斯螽動股豳詩掩身無躁君子處必掩身無躁六月日在東升律中林鍾徂暑六月徂暑土潤溽暑大雨時行燒剃行水利以殺草糞田疇入山行木無有斬伐暑退火中寒暑乃退謂季夏及季冬小暑日溫風至六月節也後五日蟋蟀居壁後五日鷹乃學習染采黼黻文章必以法故以給郊廟之服以為旗章大暑日腐草為螢中氣也後五日土潤溽暑後五日大雨時行不可以興土功不可以合諸侯不可以起兵動衆注云土將用事欲靜莎雞振羽食鬱及薁並豳詩鬱棣屬也薁櫻薁也孔造榜天陸扆纍遷翰林學士始扆舉進士時方還率而六月榜出至是每盛暑他學士輒戲曰造榜天也以譏扆進非其時宴葡萄園李適為學士凡天子饗會遊豫惟宰相及學士得從夏宴葡萄園賜朱櫻上下歊赩韓愈文六月隆熱上下歊赩曉涼暮涼樹如蓋李賀四月曉涼暮涼樹如蓋千山浪緑生雲外依微香雨生氤氳膩葉蟠花照曲景熾氣燠柳宗元文五月獻綬帶百官志中尚署五月獻綬帶薰風自南來文宗嘗與柳公權聯句帝曰人皆苦炎熱我愛夏日長公權屬和曰薰風自南來殿閣生微涼節嗜欲柳宗元時令論炎月李德裕傳迎涼草唐蘇鶚杜陽編曰李輔國家夏則於堂中設迎涼草其色類碧而幹似枯竹葉細如杉雖若乾枯而未嘗凋落盛暑掛之窗戶間則涼風自至冰雪價等金璧止戈集長安冰雪至夏月價等金璧白少傅詩名動於閭閻每須冰雪論筐不復償價日日如是進扇北朝婦人夏至日進扇按轡木陰玄宗幸洛至繡嶺宮時屬炎暑上曰姚崇多計令力士探回奏曰崇方紾絺乘小駟按轡木陰上乃命小駟頓忘繁溽出開元記晝蠅宵蚋韓愈納涼聯句晝蠅食案繁宵蚋肌血渥曦赫敲蒸涉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀咮垂翅曦赫敲蒸陽極反陰劉禹錫楚望賦鬱蒸之候槿榮芳園蟬嘯珍木蓋紀乎南火之月也李白夏日登龍興閣序解帶外堂呂溫虢州三堂記濯濯漣漪解帶外堂以雷鳴夏韓文結棚避暑長安富人每至暑伏中各於林亭內植畫柱以錦結為涼棚設坐具召長安名姝間坐遞請為避暑會人皆愛羡開元遺事緑筠尚含粉圓荷始散芳於焉灑煩抱可以對華觴韋應物避暑北池鏡湖三百里李白子夜吳歌鏡湖三百里菡萏發荷花五月西施採人看隘若耶喬樹落疏陰微風散煩燠韋應物寄子西清夏養病愜清夏郊園敷卉木長風始飄閣疊雲才吐嶺立夏日池荷初貼水林花已掃園同上重門永日掩清池夏雲生同上夏景端居即事郊園夏雨歇間院緑陰生同上答端井汲鉛華水扇織鴛鴦文李賀五月樂辭夏至獻雷車百官志中尚署白其日庚辛帝少皞神蓐收秋為白藏歲云秋矣悲哉秋之為氣秋日淒淒秋風嫋嫋一葉落知天下秋金方戒序白帝用事其蟲毛音商數七性義事言味辛臭腥祀門祭先肺食稻與魚器廉以深夤餞納日平秩西成獻龜魚周禮草木搖落而變衰敗蘭文子曰叢蘭欲芳秋風敗之秋毫離婁百步見秋毫之末素秋戒以白露申之嚴霜悲秋騷皇天平分四時竊獨悲此凜秋司秋魏相曰西方之神少昊乘兌執矩司秋商風清風收成梁元纂要曰秋曰收成亦曰白藏亦曰三秋九秋素秋高秋商秋天曰旻天風曰商風金風素風淒風高風涼風激風悲風景曰朗景澄景清景時曰淒辰霜辰節曰素節草木衰草木曰疏木衰林霜柯霜條肇秋亦曰孟秋初秋上秋早秋首秋蘭秋西成之序政失於秋文子立秋立秋日涼風至盛德在金迎秋於西郊立秋日署吏孫寶為京兆尹署侯文為東都督郵敕曰今鷹隼始擊當從天氣取姦惡以成嚴霜之誅漢儀斬牲晉書曰漢儀立秋日自郊禮畢始揚威武斬牲於東門薦陵廟其儀乘輿御戎車白馬朱鬣躬執弩射牲牲薦鹿麛謁者各一人載以獲車馳送陵廟還宮遣齎束帛賜武官武官肄兵習戰之儀斬牲之禮名曰貙劉兵官皆肄孫吳之兵法六十四陳也迎氣司馬彪續漢書曰立秋之日夜漏未盡五刻京都百官皆衣帛施皂領緑中衣迎氣西郊秋分雷乃收聲日夜分司分玄鳥歸同道傳曰分同道也注云日夜等故曰同道七月日在張律中夷則流火七月流火天地始肅秀登繕囹圄具桎梏斷薄刑決小罪納材葦壞牆垣修宮室立秋日涼風至七月節也後五日白露降後五日寒蟬鳴賞軍帥武人乃命將帥選士勵兵簡練傑俊專任有功以征不義詰誅暴慢以明好惡順彼遠方處暑日鷹乃祭鳥中氣也後五日天地始肅後五日禾乃登築場圃登穀天子嘗新先薦寢廟鳴鵙豳土晚寒伯勞七月始鳴烹葵及菽食瓜並豳詩肇秋見上注八月日在翼律中南呂宵中星虛迎寒周禮仲秋擊土鼓吹豳詩以迎寒養衰老授几杖行糜粥循行犧牲視全具乃儺以達秋氣習吹享壽星於南郊祭馬社申嚴百刑無或枉撓斬殺必當勸人種麥白露日鴻鴈來八月節後五日玄鳥歸後五日群鳥養羞案芻豢瞻肥腯察物色必比類量小大五者備當上丁釋奠於國學上戊釋奠於太公廟擇元日命人社近秋分前後戊日秋分日雷乃收聲中氣也後五日蟄蟲壞戶後五日水始涸祀夕月於西郊秋分日同律度量平權衡因晝夜平則正之天子嘗麻先薦寢廟八月載績載玄載黃為公子裳八月其獲剝棗斷壺壺瓠也自載績以下並豳詩仲商梁元纂要亦曰仲秋仲商八月獻良裘周禮司裘氏掌大裘以供王裘禮天之服仲秋獻良裘天子居總章太廟是月也衰老授几杖九月日在角律中無射授衣九月授衣九秋霜降九月肅霜務納百官貴賤無不務納以會天地之藏無有宣出伐蛟取鼉登龜取黿咸俯蟄蟲咸俯神倉有司舉五穀之要藏帝藉於神倉祗敬必飾伐薪為炭玄月九月寒露日鴻鴈來賓九月節也後五日雀入大水為蛤後五日菊有黃花申嚴號令霜降日豺乃祭獸中氣也後五日草木黃落後五日蟄蟲咸俯百工休膠漆之作停也入室命有司寒風總至人力不堪其皆入室注云霜降清風戒寒所以令人入室具飭衣裳文繡有恆衣服有量冠帶有常必循其故嘗稻先薦寢廟舉五穀之要農事備收合秩芻養犧牲以供皇天上帝名山大川四方之神以祠宗廟社稷之靈為人祈福習吹大享帝於明堂注謂祀昊天於明堂五方帝五官從祀命有司嘗嘗群神也趣人收斂務蓄菜注始為禦冬之備九月築場圃豳詩也豳土晚寒也菽苴采荼薪樗食我農夫並豳詩季商梁帝纂要云九月季秋亦曰暮秋末秋暮商季商杪秋亦曰授衣亦曰玄月獻功裘見八月獻衣裘注孔登慈恩浮圖李適凡天子饗會遊豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱壽季秋出畋欲改月李程德宗季秋出畋有寒色顧左右曰九月猶衫十月而袍不為順時朕欲改月謂何左右稱善程獨曰玄宗著月令十月始裘不可改帝矍然止搖落肅殺韓皋曰秋者天將搖落肅殺其歲之衰乎金風蕩佳節李密詩七月獻鈿針百官志尚署七月獻鈿針申嚴百刑柳宗元時令論晚枝多露蟬之思夕蔓起寒螿之愁松竹今韶梧相早脫驚綺疏之曉吹墮碧砌之涼月禹錫秋聲金籠蟋唐開元遺事每至秋時妃妾以金籠閉蟋蟀置枕函畔夜聽其聲庶民之家皆效之也秋風一披拂窗前兩好樹衆葉光薿薿秋風一披拂策策鳴不已韓愈秋懷詩金柔火老韓愈納涼聯句金柔氣尚低火老候愈濁曲江蕭條秋氣高菱荷枯折隨風濤杜甫曲江玄蟬無停號秋燕已如客立秋後題水雲秋景初杜牧詩風霜始嚴鷹隼初擊漢家授御史多於立秋蓋以風霜始嚴鷹隼初擊裴德融制猿吟鳥思江山絶域登臨已秋猿吟鳥思草衰木墜上高尚書狀夕陰之中景物澄鮮丹葉星房燭耀川原夕月既望曜于丹泉上鏡下冰湔塵濯煙劉禹錫楚望賦廢井苔冷荒園露滋秋聲賦蓐收肅金氣西陸弦海月李白古風金飆掃林景物廓如月委皓素水涵空虛呂溫虢州三堂記露滴高梧同上鳥驚寒沙露滴高梧秋涼歸期眇秋涼韓愈遠遊聯句草木辭榮風霜入候文粹盧肇海潮賦以蟲鳴秋韓文水木澄秋景韋應物詩長安一片月李白子夜吳歌長安一片月萬戶搗衣聲秋風吹不盡總是玉關情秋顏入曉鑑秋日鑷白秋顏入曉鑑壯髮凋危冠我覺秋興逸同上秋日魯郡我覺秋興逸誰云秋興悲火西飛而獻秋汀葭颯然海草微落同上送黃鍾之鄱陽序秋色何蒼然際海俱澄鮮同上秋風高南卓羯豉録明皇製秋風高一曲每奏之則秋風徐來夜葉交墜秋天漠漠向昏黑杜詩秋天漠漠向昏黑布衾多年冷如鐵胡兵沙塞合李白秋思胡兵沙塞合漢使玉關回侵陽日沉玄剝節風搜兌秋雨聯句翠嶺明華秋高天澄遙滓韋應物九日澧上碧天如水兮窅窅悠悠百蟲迎暮兮萬葉吟秋劉禹錫秋聲賦白其日壬癸帝顓頊神玄冥蟲介音羽數六性智事聽味鹹臭朽祀行祭先腎食黍與鴈器閎以掩冬為玄英沍寒歲將暮時既昏玄律窮嚴氣升烈烈冬日閉塞而成冬可愛冬日可愛日短星昴謹蓋藏日窮于次月窮于紀星回于天冬民既入婦人同巷相從績女工一月得四十三日所以省費燎火同巧拙令習俗三餘董遇讀書當以三餘冬歲之餘夜日之餘陰雨時之餘執權司冬魏相曰北方之神顓頊乘坎以執權司冬穹窒熏鼠塞向墐戶向北墉也穹窮窒塞也墐塗也庶人蓽戶為此者備寒入此室處並豳詩玄英梁元帝纂要云冬曰玄英亦曰安寧亦云玄冬亦曰三冬天曰上天風曰寒風嚴風厲風辰風景曰冬景寒景時曰良時鳥曰寒鳥寒禽亦曰哀禽草木草曰寒草寒卉木曰寒木寒柯寒條祁寒歲云暮矣政失於冬平秩朔易立冬立冬日水始冰盛德在水迎冬於北郊立冬日啓閉立秋立冬書雲物司閉丹鳥氏以立夏來立冬去冬至冬至之日蚯蚓結水泉動日短至陰陽爭日短星昴宵長晝短陰極陽生冬至一陽生僖五年正月辛亥朔日南至公視朔遂登觀臺以望而書禮也書雲物為備履長玉燭寶典曰十一月建子周之正月冬至日極南影表陰陽日月萬物之始當黃鍾律其管最長故有履長之賀朝賀宋書朝賀享祀皆如元日之儀又曰魏晉冬至日百寮稱賀因大會其儀亞於歲朝漢雜事見夏至門注閉關商旅不行后不省方易曰先王以至日祀昊天上帝見十一月注進履襪後魏北涼司徒崔浩女儀云近古常以冬至進襪履於舅姑也又崔實襪銘有建子之月助養元之事禳荊楚歲時記曰共工氏不才子以冬至日死為人厲畏赤豆故作赤豆粥以禳之影長影長一丈三尺夏至日在東井影長尺有五寸見上注十月日在房律中應鍾地始凍賞死事恤孤寡祭司寒命有司祭司中司命司人司祿於國城西北亥日祭之壞城郭戒門閭修鍵閉備邊境塞蹊徑飭喪紀辨衣裳審棺槨之厚薄陳祭器物勒工名以考其誠工有不當必行其罪秫稻必齊曲櫱必時湛熾必潔水泉必香火齊必得兼用六物酒官監之無有差貸良月十月也就監數也十月之交詩立冬日水始冰十月節也後五日地始凍後五日野雞入大水化為蜃察阿黨則罪無有掩蔽築域郭造宮室穿竇窖修囷倉禮天子始裘祀神州地祗於北郊注云立冬日小雪日虹藏不見中氣也後五日天氣上騰地氣下降後五日閉塞而成冬謹蓋藏循行積聚無有不斂注府庫倉囷有藏物大飲蒸勞農以休息之十月農功畢黨正屬人飲酒正齒位易關市來商旅納貨賄便人事四方來集遠鄉皆至則財不匱上無乏用百事乃遂收水澤之賦無令侵削兆人以為天子取怨于下注川賦魚鹽蛤澤賦萑蒲隕蘀豳詩十月隕蘀隕墜也蘀落也蟋蟀入我床下詩滌場滌掃也場功畢入也詩穫稻納禾稼黍稷穜穋禾麻菽麥並豳詩上入執宮功晝爾於茅宵爾索綯亟其乘屋其始播百穀注十月定星將中急治室屋儲蓄崔實注月令曰十月農人事畢五穀既登家家儲蓄乃順時令祈年周禮天府掌季冬陳玉以貞來歲之美惡鄭注云問事之正曰貞問歲之美惡問謂問龜也孟冬梁元纂要云十月孟冬亦曰上冬亦曰陽月也注此純陰用事嫌於無陽故曰陽月十一月日在箕律中黃鍾一之日觱發十一月也內宰申宮令審門閭貴戚近習無有不禁祈祀大川名源井泉農有不收藏積聚者馬牛禽獸有放逸者取之不詰有能取蔬食獵者有司教導之祭馬步日短見上周官斬木之時豳詩鑿冰之月大雪日鶡鳥不鳴十一月節也後五日虎始交後五日荔挺出土事無作無發室屋及起大衆以固而閉地氣且泄是謂發天地之房諸蟄則死人必疾疫又隨以喪伐木取竹箭此時堅成可取君子處必掩身無躁事欲靜以待陰陽之所定注順時氣也罷官之無事去器之無用者注先時權有建作者天地閉藏萬物休可以去之一之日于貉取彼狐狸為公子裘于貉往搏貉自為裘狐狸獻尊者十二月日在南斗律中大呂二之日栗烈十二月僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢撲北面而誓之誓衆以軍法也修祭禽之禮日窮于次月窮于紀星回于天數將幾終歲且更始專其農久無有所使注役則志散失業大儺旁磔以送寒氣小寒日鴈北鄉十二月節也後五日鵲始巢後五日野雞始雊將帥講武習射御角力注備田獵也乃教田獵以習五戎班馬政乃䄍百神於南郊為來年祈福於天宗天宗日月星辰之屬大寒日雞始乳中氣也後五日鷙鳥厲疾後五日水澤腹堅始漁天子親往嘗魚先薦寢廟冰方盛命取而藏之冰已入令告人出五種命農計耦耕修耒耜具田器注云農事將興修田器也出土牛以示農耕之早晚見立春注飭國典論時令以待來歲之宜注正月懸法象魏故於此與公卿先飭之制百縣合諸侯制百縣為來歲受朔日與諸侯所稅於人輕重之法貢職之數以遠近土宜為度以給郊廟之事無有所私咸獻凡在天下九州之人無不咸獻其力以供皇天上帝社稷寢廟山林川澤之祀注人非神福不生大習吹而罷收秩薪柴以供郊廟及百祀之薪燎獻豜豳詩二之日其同載纘武功各私其豵獻豜于公鑿冰沖沖豳詩季冬梁元纂要云十二月為季冬亦曰暮冬塗月亦曰暮節歲窮稔窮冬十孔五大鳥集宮竇建德冬至大會僚吏有五大鳥集其宮群鳥從之本傳卦轉習坎韓愈送無本詩遂來長安里時卦轉習次山雪河冰山雪河冰野蕭飆杜詩易關市柳宗元時令論誠使古之為政者非冬無以賞死事恤孤寡舉阿黨易關市來商旅審門閭正貴戚近習罷官之無事者去器之無用者則其闕政亦以繁矣一陽巾雲仙散録金門歲節曰洛陽人家冬至煎錫緑珠戴一陽巾進履襪酉陽雜俎北朝婦人常以冬至進履襪及襪暖香寶雲溪有僧舍盛冬若客至不燃薪火暖香一炷滿堂如春人歸更收餘燼出雲林異景志草木萌荑如正月長慶二年冬少雪水不冰凍草木萌荑如正月出五行志時時北風振槁揚埃蕭條邊聲與鴈俱來劉禹錫楚望賦陰凝雪飛天地盡閉文粹段文昌平淮西碑不衣之俗亦垂繒帛李周翰文選雪賦注大雪盈尺呂溫虢州三堂記同雲千里大雪盈尺以風鳴冬韓文冰霜辰韋應物送劉評事況復歲云暮凜凜冰霜辰寒氣凜冽李白大獵賦嚴冬慘切寒氣凜冽不周來風玄冥掌雪土囊煙陰火井冰閉上明朝驛使發一夜絮征袍素手抽針冷那堪把剪刀李白子夜吳歌碧瓦初寒外杜甫冬日謁玄元廟碧瓦初寒外金莖一氣旁杖藜雪後臨丹壑杜甫冬詩杖藜雪後臨丹壑鳴玉來朝散紫宸星回節廣記玉溪編事南詔以十二月十六日為星回節是日登避風臺命清平官詩略曰自我居震旦翊衛賴稷契注彼國謂詞臣曰清平官天子曰震旦寒月野無緑寥寥天宇空韋應物擬古玉壺銀箭稍難傾李賀十月玉壺銀箭稍難傾缸花夜笑凝幽明珠帷怨臥不成眠金鳳南衣著體寒宮城團回凜嚴光十一月宮城團回凜嚴光白天辟碎墮瓊芳御溝泉合如環素火井溫水在何處上玄冥蔚強梁杜甫蓐牧困用事玄冥蔚強梁冬之日祀黑帝於北郊唐六典冬至至後日初長遠在劍南思洛陽杜甫
