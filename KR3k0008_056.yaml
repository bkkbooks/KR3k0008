body:
  text: 卷第五十六白帝舜舞干而苗格周文因壘而崇降德攻義勝禁暴寒者衣之左傳叔弓圍費不克治歐夫曰若見費人寒者衣之飢者食之供其乏困費來如歸南氏亡矣季平子從之費人叛南氏羊祜晉漢春秋曰羊祜還鎮專修德信以懷吳人陸抗告邊戍曰彼專為德我專為暴是不戰而自服也名保分界無求小益也遺藥見單車入賊門文德者帝王之利器威武者文德之輔助也漢刑法志鄧訓祭彤事見四夷門不重傷鄰國望我歡若親戚荀吳圍鼓鼓人請以城叛穆子不許曰猶有食邑姑修而城食竭力盡而後取不戮一人曰吾以事君也晉文伐原命三日之糧原不降命去之諜出曰原降矣公曰得原失信不可退一舍而原降撫敵人吳呂蒙在公安得關羽及將士等家屬輒厚遇之殯敵師吳將陳尚潘景為寇羊祜追斬之美其死節厚加殯斂二子弟迎喪祜禮遣之以絹償稻羊祜出軍至吳境刈稻為糧計所取送捐償之務德勝一孔王者之兵弔人而取有罪李靖蕭銑降靖入其都或請靖籍銑將拒戰者家資以賞軍靖曰王者之兵弔人而取有罪彼其脅驅以來籍以拒師本非所情不容以叛逆比之今新定荊郢宜示寬大以尉其心若降而籍之恐自荊而南堅城劇屯歐之死守非善計也止不籍由是江漢列城爭下裴度復兼平章事長慶四年王廷湊屠元翼之家敬宗羞惋歎宰輔非其人吏凶賊熾肆學士韋處厚上疏曰臣聞汲黯在朝淮南寢謀于木處魏諸侯息兵王霸之理以一士止百萬之師以一賢制千里之難裴度元勳巨德文武兼備若位巖廟委參決必使戎虜畏威幽鎮自臣管仲曰人離而聽之則愚合而聽之則聖治亂之本非有它術陛下當饋而歎恨無蕭曹今一裴度擯棄于外所以馮唐知漢文帝有頗牧不能用也帝感悟於是度復兼平章事綏懷贊皇一品集賜王宰詔意卿宜大布誠信且務綏懷不得焚其室廬翦其桑梓自當壺漿塞路襁負以歸先招懷後掩襲蕭俯帝因問兵法有必勝乎俯曰兵凶器聖人不得已用之故武不可玩玩則無震天以仁討不仁以義討不義先招懷後掩襲故有不殺厲不禽二毛不犯田稼其救人如免水火此必勝術也白李陵以少擊衆與蘇武書曰以五千之衆對十萬之軍當百王尋王邑百萬圍昆陽世祖自將步騎千餘纍捷無不一當百邑等敗績疲兵再戰一以當千客主之形既不相如李陵書曰效死之日晉周處隸夏侯駿西征賊屯梁山衆七萬駿遣處以五千人擊之自旦至暮斬首萬計弦絶矢盡潘系不救左右勸退處曰吾效死之日遂戰沒黥布嘗以少擊衆孔提孤軍李靖突厥部種離畔帝方圖進取餘見軍勝門賊望兵少張巡欲乘勝擊陳留子琦聞復圍城巡語其下曰吾蒙上恩賊若復來正有死爾諸軍雖捐軀而賞不直勳以此痛恨聞者感概乃椎牛大饗悉軍戰賊望兵少大笑巡遠親鼓之賊潰追北數十里以十三人破賊萬王君廓從戰東都有功為右武衛將軍詔勞之曰爾以十三人破賊萬自古以少制衆無有也馬將軍馬璘肅宗奇之委以東討初戰衛南以百騎破賊五千衆從李光弼攻洛陽史朝義衆十萬陳北邙山旗鎧昭日諸將沈疑未敢擊璘率部士五百薄賊屯出入三反衆披靡乘之賊遂潰光弼曰吾用兵三十年未見以少擊衆雄捷如馬將軍者一壯士當十夫吳武陵吳元濟叛武陵遺以書夫一壯士不能當十夫者以其左右前後咸敵也矧以一卒欲當百人哉常以寡鬥衆朱延壽用軍常以寡鬥衆還者盡斬之宜以計勝薛萬均傳竇建德帥衆十萬寇范陽羅藝迎拒之萬均曰衆寡不敵宜以計勝即教藝羸兵阻水以誘之萬均自以精騎百匿城左建德師度水邀半度擊之大敗其罪能以少擊衆張歸厚為將善用弓槊能以少擊衆張晊屯亦岡歸厚與晊獨戰陳前晊憊而卻諸將乘之晊遂大敗五代史左右奮擊一當數人荔非元禮光弼守河陽周摯攻北城元禮以敵堅未可以馳還軍示弱怠其意光弼怒使召元禮欲按軍法答曰方戰不及往請破賊以見因休柵中良久顧麾下曰向公來召殆欲斬我鬥死有名無庸受戮乃下馬持刀嗔目直前鋭上者而進左右奮擊一當數人斬賊數百首賊遁去以兵寡勸止薛仁貴負鋭提卒二千進攻扶餘城諸將以兵寡勸止仁貴曰在善用不在衆身帥士遇賊輒殺萬餘人拔其城因旁海略地與李績軍合扶餘城既降宅四十城率送款白文不犯順陷堅摧剛因壘而降文王伐崇軍三旬不降退而修德而復伐之因壘而降舞干而格舜征有苗舞干羽于兩階七旬有苗格晉侯示信三日而原降帝舜修文七旬而苗格服而舍之示之以整使謀而來犯順不祥文王伐崇再駕而降受服服降也王師有征無戰降將李陵武安君白起坑趙降卒四十萬於長安後賜劍死於杜郵許男面縳銜璧士輿襯鄭伯肉袒牽羊秦王白馬素車係頸以組降漢王於軹道帝疏勒井竭將軍猶守耿恭居延兵盡都尉遂降李陵降圍邑周禮司寇主降去殺來降禍莫大於殺降李廣所以不封侯相者王翔云三驅之禮禽逆前來者不射唯有去者射之愛其來而惡其去也以喻來降者則不殺之鼓人請降穆子不受荀吳事見上注漢築受降城侯降者漢胸奴徐廬降景帝欲侯之周亞夫曰彼背其主而侯何以責人臣不守節上曰丞相議不可用待以不死後漢光武與赤眉相遇劉恭靖曰盆子以百萬衆待陛下陛下何以待之帝曰待以不死也發車馬迎降渾邪王來降漢發車二百乘縣官無錢從人貰馬或匿人馬不具上怒欲斬長安令汲黯曰無罪且胸奴叛其主來降徐以縣次傳何至騷動疲國甘心夷狄之民乎畫降狀魏于禁降關羽歸文帝慰諭遣誼鄴高陵先令於陵屋畫關羽戰克龐德積怒禁降伏之狀禁遂薨焉訊問周至郭淮為雍州刺史每羌胡降淮款曲訊問周至咸稱其神明殺降吳程普殺降者數百人背使投火即自病瘖百餘日而卒日磾出於降虜不受降後漢禾雋字公健攻黃巾黃巾乞降雋曰秦項之際民無定主故賞附以勸來今海內一統納降無以賞勸討之足以懲惡縱敵受寇非良策遂破之此事與荀吳事同意異又漢晉春秋曰初霍光使楊稷毛炅屯交趾曰賊圍未百日而降者家屬誅過百日而降刺史受其罪及吳陶與圍之日未滿而糧盡乞降璜不許而給糧日滿糧盡救不至乃受降與荀吳事正類也譬諭降之後漢李憲屯灊山楊州刺史歐陽歙攻下廬江人陳衆請得譬諭降之單車白馬往説而降之灊山人生為立祠號白馬從事受降如受敵耿秉擊車師云受降令自縳康居太子保蘇臣匿率衆數萬餘欲降段會宗漢遣衛司馬逢迎司馬畏其衆欲受降者皆自縳蘇匿怨舉衆亡矣放歸羊祜與吳人開布大信降者欲去聽之詐降吳將孫布請詐王降頓兵迎滿寵伯寧曰必降也陵遣七百人往迎布夜掩擊破之圍而後降不赦昌狶降于禁諸將皆以當送太祖禁又與狶有舊禁曰諸公不聞令乎圍而後降不赦雖舊不敢失法垂涕斬之榖梁曰誅不慎服來服者不復慎厭也孔七十二國降附高仙芝小勃律其王為吐蕃所誘妻以女故西北三十餘國皆羈屬吐蕃自田仁琬以來三討之皆無功詔仙芝出討與監軍邊令誠自護密俱入遣將車席元慶曰若酋領逃者第出詔書呼之賜以繒綵至皆縛以待我元慶如言仙芝至悉斬之王及妻逃山穴不可得仙芝招諭出降因平其國於是拂菻大食諸胡七十二國皆震懾降附就館而降劉潼山南有劇賊依山為剽宣宗怒欲討之宰相崔鉉曰比陛下赤子迫於飢寒弄兵山谷間不足討請遣使喻釋之詔潼馳往潼挺直叩其壘曰有詔赦爾罪盜皆列拜約潼就館而降度勢窮即舉衆降延壽收餘衆負山自固無忌績合圍之徹川梁斷歸路帝按轡觀虜營壘曰高麗傾國來一麾而破天贊我也下馬而拜謝況于天延壽等度勢窮即舉衆降東夷傳梁亡莊宗入汴張全義自洛來朝泥首待罪莊宗勞之曰卿家弟侄幸復相見全義俯伏感涕年老不能進趨遣人掖扶而登宴犒盡命皇子皇弟等皆見事之張全義一日降數千人張建封盜起蘇常門代宗詔中人與李光弼皆討建封見中人請前喻賊可不須戰因到賊屯開譬禍福一日降數千人縱還田里單騎白衣李訴入蔡駐元濟外宗蔡吏驚曰城陷矣元濟尚不信曰是洄曲子弟來索褚衣爾及聞號令曰常侍傳語始驚曰何常侍得至此率左右登牙城田進誠兵薄之訴計元濟且望救於董重質訴乃訪其家慰安之使無怖以書召重質單騎白衣降訴待以禮進誠火南門元濟請罪梯而下檻送京師由光諸屯尚二萬皆降訴不戮一人皆以州降馬燧李懷光反河中詔燧為行營副元帥時賊黨安廷珍守晉毛朝揚守隰鄭抗守慈燧移檄鐫諭皆以州降西向受命同上賊將徐廷光守長春宮城燧度長春不下則懷光固守久攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧顧其心已屈徐曰我自朝廷來可西向受命廷光再拜即率衆降請降宗室皇建中元年進拜湖南觀察使前帥辛京杲貪虐使部將王國良戍武岡賴其富即劾以死國良恐據縣反斂荊黔洪桂兵討之再歲不能下皋至遺書曰觀將軍非取大逆者特逃讒抗死爾將軍遇我可以降我固為京杲誣者幸蒙雪何忍以兵加將軍哉以為不然我以陳術破將軍陳以改法屠將軍城非將軍所度也國良得書喜且畏因請降蕭銑降李靖蕭銑將文士弘以卒數萬屯清江孝恭留靖守屯自往與戰大敗還賊委舟散掠靖視其亂縱兵擊破之即率輕兵五千趨江陵薄城而營破其將楊君茂鄭文秀俘甲士四千孝恭軍繼進銑六懼檄召江南兵不及到明日降敕嚴備遣單使往勞裴行儉阿史那伏念偽稱可汗復與溫傳合明年行儉還總諸軍屯代川之陘口縱反間説伏念令與溫傳相二伏念懼密送款宜請縳傳自效行儉祕不布密以聞後數日煙塵漲天而南斥候惶駭行儉曰此伏念執溫傳來降非它也且受降如受敵乃敕嚴備遣單使往勞既而果然相率降宋敬則嶺表蠻叛以裴懷古有文武才用為桂州都督蠻服其威惠相率降懷輯降附李晟拜鳳翔隴右涇原節度使晟常曰河隴之陷非吐蕃能取之皆將臣沓貪暴其種落不得耕稼日益東徙自棄之爾且十無繒絮人若役擾思唐之心豈有既乎因悉家資懷輯降附愚人不足語降高仁厚邛州賊阡能衆數萬略州縣列壁數十陳敬瑄召仁厚還使督兵四討屯永安阡命諸將毀柵鼓而前賊渠羅渾擎設伏詐降仁厚遣將不持兵入諭其衆皆真降渾擎詐窮而逸吏執之仁厚曰愚人不足語降衆署皆得免則告諸壁大軍至賊帥句胡僧大驚斬之莫能禁衆執胡僧以降委身逆虜張興束鹿人為饒陽裨將城破思明縳之馬前好謂曰將軍壯士能屈節當受高爵對曰昔嚴顏一巴郡將猶不降張飛我大都將安能委身逆虜名王貴種相繼降藩鎮張仲武烏介失勢往依康居盡徙余種寄黑車子部回鶻遂衰名王貴種相繼降捕幾千人降斬其首令狐楚皇甫鏄既相擢楚河陽懷節度使代烏重胤始重胤徙滄州以河陽士三千從士不樂半道潰歸保北城將轉掠旁州楚至中澤以數騎自往勞之衆甲而出見楚不疑乃皆降斬其首惡衆遂定素衣牽羊繼岌同光三年封魏王是歲伐蜀為西南面行營都統郭崇韜為都招討使繼岌至綿州衍上筏請降丙辰入成都乘竹輿至升仙橋素衣牽羊草索繫首肉袒銜璧輿櫬群臣衰絰徒跣以降繼岌下而取璧崇韜解縳焚櫬自出師至降衍凡七十五日兵不血刃自古用兵之易未有如此然繼岌雖為都統而軍政號令一出崇韜五代史降幡夜豎腹敗肢披不敢保聚擲首陴外降幡夜豎韓愈詩繫頸求活繫頸求活投戈乞降于公異破朱泚露布潛出盧龍長驅綿竹段文昌平淮碑魏軍得田疇為導潛出盧龍鄧艾得田章即登長驅綿竹請命而後降世宗復南征遂圍濠州濠州刺史郭廷謂告于周曰臣不能守一州以抗王師然願請命于唐而後降世宗為之緩攻廷謂遣人請命于景景許其降乃降赦降慕容彥超常以金帛募海上客得五百餘及周師圍城客説彥超曰今圍急城且將陷請開門為公決勝敗安能於危窘之地坐守誅戮彥超不能從周祖聞而義之城陷使戒之曰朕既赦汝所邊城邑無害民人對曰臣皆海曲之民少負節義偶為彥超所誤不能成功臣之恥也今陛下既釋臣等願歸漁農以奉聖朝敢有它志再取亡歿言訖皆山呼而去太祖既平彥超乃釋所俘五代史放降卒八百歸于蜀周世宗本紀白軍有敗謀師無成命大崩曰敗績軍志曰知難而退商周之不敵彼竭我盈援再衰三竭之鼓呼再戰再北之師晉人拔數奔之旆衛侯去甚敗之旗聞敵強而退非夫也師不用命失屬亡師為罪巳重莫有闕志師徒撓敗子喪師徒何以復命再敗軍師死且有罪薳越曰蔑有鬥志席卷瓦解覆師宵遁宵潰日尋干戈罔有敵于我師前徒倒戈攻于後以北此無遺鏃之費彼有倒戈之功逗撓鼓儳旗靡有令出征且期後徑無剛嘗寇遽見出奔失道之將既未知兵有以為將戰士不能深入大夫無乃淺為無敵不支棄甲復來華元轍亂旗靡齊師敗曹劌視其轍亂望其旗靡故逐之幸而後敗魏志令曰司馬法將軍死綏有前一尺無卻一寸故趙括母乞不坐是知古之將軍破於外而家罪於內其令敗軍者抵罪失利者免官爵蔡衛不枝固將先奔一眚孟明敗秦師秦伯不替曰吾不以一眚掩大德七遇皆北北戰敗也敗衄師不功則厭而奉主厭喪冠也周禮三戰三北管仲曰吾嘗三戰三北鮑叔不以我為怯知我親在故也風聲鶴唳晉符堅以百萬入寇謝玄謝石以八萬拒之大敗堅師堅衆奔潰投江水為之不流聞風聲鶴唳皆以為王師已至孔願罷兵裴度李克融王廷湊亂度行移書開説淳沓傳以大誼二人不能禁皆願罷兵跳奔郭子儀與光弼僕固懷恩渾釋之陳回光等擊賊嘉山斬首四萬級獲人馬萬計思明跳奔博陵於是河北諸郡往往斬賊首迎王師潼關初潰散萬乘猶辟易偏裨無所施元戎見手格杜甫贈司空王公腥膻解遁雷霆既震犬羊遂潰疣贅被抉腥膻解遁鄭亞贊皇一品集序狼狽就道周太玄彈李聽疏委貝州而不守燒劫無遺望棧口而疾馳狼狽就道自徒苟免不憚包羞收散卒王重師從龐師古攻楊行密師古敗青口懷玉獨全一軍行收散卒萬餘人以歸棄潰略盡哥舒翰與崔乾祐戰士自相鬥殺尸血狼籍久乃悟又棄甲奔山谷及陷河死者十一二有糧艘百餘軍爭濟艘輒沉至縳矛楯乘以渡喧叫震天地賊乘之棄潰略盡或走或降皆不能守劉仁贍世宗復至淮上李景兵大敗諸將往往見擒守將或走或降皆不能守白善敗者不亡王亦能軍鄭敗王師祝聃射王中肩王亦能軍言雖軍敗身傷猶能殿師以退故曰能軍孟明再敗後增修德政重施於人晉趙衰曰秦師又至將必避之懼而增德不可當也知懼如是斯不亡矣垂翅奮翼後漢馮異鄧禹被赤眉所敗異棄馬步走至回溪阪也麾下數人歸勞堅壁約期復戰大破於崤辰降男女八萬餘人帝聞之璽書勞異曰始雖垂翅回溪終能奮翼澠池可謂收之桑榆意氣自若吳漢字子顏諸將見戰不利失其常度漢意氣自若方整勵器械帝歎曰吳公羞疆人意隱若一敵國收合餘燼背城借一察夷傷補卒乘易地再戰民忘其敗漢晉春秋街亭敗後或勸諸葛亮更發兵亮曰欲減兵思過則功可翹足而待於是考微勞甄壯烈引咎責躬以為後圖民忘其敗孔示弱怠意荔非元禮周摯兵小卻元禮還軍示弱怠意憚敵而奔非勇段秀實事高仙芝討大食圍怛羅斯城會魯救至仙芝兵卻士相失秀實責副將李嗣業曰憚敵而奔非勇也免己陷衆非仁也嗣業慚與秀實收散卒復成軍白馬朱甲五代周德威有驍將陳夜叉常乘白馬被朱甲以自異德威因戒其部兵曰見白馬朱甲者當佯走以避之兩軍皆陳德威微服雜卒伍中陳章出挑戰兵始交德威部下見白馬朱甲者因退走章果奮稍急追之德威伺章巳過揮鐵鎚擊之中章墜馬遂生擒之取紙為書李希烈據滑汴副都統劉洽率軍十餘萬戰白塔不利夜入宋州時洽將高彥昭劉昌共嬰壘其屬作書言城且危彥昭視曰君輕我耶取紙自為書洽得書曰健將在西吾何憂選士八百夜艾而入賊不知詰旦傳城士奮出希烈大敗間道馳去五代東漢世家旻又大敗輜重器甲乘輿服御物皆為周師所獲旻獨乘契丹黃騮自雕窠嶺間道馳去夜失道山谷間得村民為卿導誤趨平陽得它道以歸楚昭王遭闔廬之禍國滅出亡父老送之王曰父老返矣何患無君父老曰有君如是其賢也相與從之咸奔走赴秦號哭請救秦人為之出兵昭王返國所謂善敗不亡者也通典大唐武德中李靖隨河間王孝恭討蕭銑於江陵王不從靖謀致敗賊委舟大掠人皆負重靖見其軍亂進兵擊之賊大敗通典敗將六白楚殺得臣再世不競秦用孟明卒復東征漢用馮異而建元勳見上門棄甲復來華元戰而不捷參之肉其得食乎任參勤戰孫叔敖云謀之軍師敗則死之困獸猶鬥況國相乎荀林父敗晉侯將殺之士貞子諫云漢將失道呼疲兵以當千齊師背城收餘燼而借一范蠡不徇會稽之恥曹沫不死三敗之辱卒復勾踐之讎報魯國之羞區區之心竊慕此爾李陵書問失道狀李廣事見上注疏勒井竭將軍未降耿恭居延矢窮都尉已沒李陵既謀之不臧盍死而無悔死寇賁軍之將賁敗也音奔淺為大夫不可以師何以為將亦既敗軍未及楚殺子玉不能死寇猶望秦用孟明責功補過使過將有敗謀軍無成命失屬亡師降將李陵孔不應有事西方薛仁貴吐蕃入寇命為邏娑道行軍大總管率將軍郭待封擊之待封嘗為鄯城鎮守與仁貴等夷及是恥居其下頗違節度至河口遇賊破之多所殺獲進至烏海城以待後援待封初不從領輜重踵進吐蕃率衆二十萬激擊取之仁貴退居大非川吐蕃益兵四十萬來戰王師大敗仁貴與吐蕃約和乃得還仁貴歎曰今歲在庚午星在降婁不應有事西方鄧艾所以死於蜀吾固知必敗即軍中斬高仙芝祿山反詔監門將軍邊令誠監軍次陝郡而常清敗還初令誠數私於仙芝仙芝不應且云常清以賊搖衆帝大怒即軍中斬待罪于朝郭子儀安祿山反充關內河東副元帥率師趨長安次潏水上賊安守忠等軍清渠左大戰王師不利委仗奔子儀收潰卒保武功待罪于朝房琯請自將平賊帝猶倚以成功乃詔琯以持節招討西京防禦蒲潼兩關兵馬節度等使琯分三軍趨京師楊希文將南軍自宜壽入劉哲將中軍自武功入李光進將北軍自奉天入琯身中軍先鋒十月庚子次便橋辛丑中軍北軍遇賊陳濤鈄戰不利琯欲持重有所伺中人邢延恩促戰故敗士死麻葦癸卯率南軍復戰遂大敗之希文哲將降賊死失殆半李聽史憲誠既請朝魏人怨詔聽兼帥魏博聽遷延不即赴魏遂亂殺憲誠共推大將何進滔乘城拒守聽不得入乃屯館陶又不設備魏人襲之師驚潰死失殆半輜械盡棄之聽晝夜馳以免於是御史中丞溫造等劾奏魏州亂憲誠死職繇于聽請論如法天子不罪也奔散元結時議今臨敵將士多喜奔散白刃交兮寶刀折兩軍蹙兮生死決李華弔古戰場文鼓衰兮力盡矢竭兮絃絶白刃交兮實刀折兩軍蹙兮生死決太平久不知戰祿山反太平久不知戰介然到屯不三月賊已渡河車騎蹂騰煙塵漫數十里日為奪光士聞鉦鼓聲皆褫氣不能授甲凡旬六日城陷張介然傳多喪兵士顛翻大都則跳身而來刺邦而去回視刀鋸菜色甚安一歲未安已立於壇墀之上此輕罰之過杜牧見突厥傳脫身遁李靖為定襄行軍總管率徑騎三千繇馬邑趨惡陽嶺頡利可汗大驚曰兵不傾國來請敢提孤軍至此於是帳部數恐靖縱諜者離其腹心夜襲定襄破之可汗脫身遁孫儒自逐行密入廣陵行密欲走銅官其客戴友規曰儒來氣鋭而兵多蓋其鋒不可當而可以挫其衆不可敵而可久以斃之若避而走見就擒也劉威亦曰背城堅柵可以不戰疲之行密以為然久之儒兵飢又大疫行密悉兵擊之儒敗被擒將死仰顧見威曰聞公為此策以敗我使我有將如公者其可敗耶五代史白轅門以軍轅為門亞夫屯於細柳行將軍之令連營幕府衛青為車騎將軍以幕為府屯軍鴈門後漢程不識為將軍軍飛狐胸奴入雲中郡上命車騎將軍軍飛狐領是大軍屯于中壘漢法偏將別屯則許專殺以藩為軍晉楚盟時示不相疑也趙充國曰校聯不絶用本相貫穿自固周禮校人字從本營壘相次也衛青令琥剛車自環為營偃月吳志朱異使任度為浮橋夜渡築偃月壘諸葛營壘諸葛亮軍退司馬宣王行其營壘處曰天下奇才君子營晉書劉超為射聲校尉無兵號曰君子營換屯吳志陸抗遷立節中郎將與諸葛恪換屯屯柴桑抗臨去更繕完城圍葺其牆屋居廬桑果不得妄敗恪入儼然若新而恪柴桑故屯頓有毀深以為慚營地惡後漢岑彭伐公孫述乘勝直進大驚懼所屯營地名彭亡惡之欲徙會日暮其夜蜀刺客詐稱亡奴來降刺殺彭又典略眭固字白兔軍屯犬丘有巫誡田將軍字兔屯邑名大兔見犬必驚宜急移不從遂戰死行營魏太祖行諸營士卒皆離陳徐晃獨駐陳不動祖歎曰有匹夫之風兵法右背丘陵前左水澤易曰左次無咎行師之法欲左背水右背高指畫軍營鄧艾年十一每見高山大澤輒度指畫軍營處時人多笑焉後為將多立大功衛青渡漢出塞見單于精兵乃令剛車自環為營而縱騎擊殺之孔請復屯兵張獻甫為邠寧節度使請復鹽州及洪門洛原鎮屯兵詔可屯普潤李吉甫劉澭舊軍屯普潤數暴掠近縣吉甫奏還涇原畿民賴之繕屯壁為戰守具馬璘在涇八年繕屯壁為戰守其令肅不殘人樂為用徙營高岡裴行儉為定襄道總管太軍次單于北暮已立營塹壕既周行儉更命徙營高岡吏白士安堵不可擾不聽促徙之比夜風雨也本傳增營壘韓滉以親吏盧復為宣州刺史增營壘教習長兵屯襄城哥鄶曜討李希烈有詔督戰曜進次穎橋雷震軍中士馬斃曜懼還屯襄城岡阜隆起謝彥章為梁騎將與賀環行視郊外環指一地語彥章曰此地岡阜隆起其中坦然營柵之地也已而晉兵柵之環疑彥章陰以告晉益惡之埋懷村馬燧討李懷光自太原引實鼎下營問其地名曰此埋懷村也燧甚喜果敗懷光國史補爭戰地八白趙奢先據北山秦爭山不得本許歷計所爭北原魏志諸葛亮出斜谷司馬宣王屯渭南郭淮策亮必爭北原宜先據之若亮跨渭登原連兵北山隔絶隴右搖蕩民夷非中國利也宣王善之壘塹木成蜀兵大至擊之死地謂韓信背水為陳孔得山者勝王建及從戰胡柳晉兵已敗與梁爭土山梁兵先至登此而陳莊宗至山下望梁陳堅而整呼其軍曰今日之戰得山者勝因馳騎犯之王建及以銀槍軍繼進梁兵下走陳山西晉兵遂得土山諸將皆言潰兵未集旦暮不可戰閻寶曰彼陳山上吾在其下尚能擊之況以高而擊下不可失也建及以為然即馳而犯梁陳梁兵大敗橋為梁奪則吾軍危晉王建及梁晉戰柏鄉距鄗邑野河上鎮定兵扼河橋梁兵急擊之莊宗登高望見鎮定兵將敗顧建及曰橋為梁奪則吾軍危建及選二百人馳擊梁兵梁兵敗解去梁軍戰晉軍敗梁軍已登無石山莊宗遣李昭嗣轉擊山北而自以銀槍軍趨而呼曰今日而戰得山者勝晉皆爭登山梁軍遽下陳於山西晉軍從上急擊大敗之於是晉城德勝矣李昭嗣傳賊得地勢李光弼思明乘勝西向光弼謂留守韋陟曰益陝兵公保潼關可以持久光弼曰兩軍相敵尺寸地必爭今委五百里而守關賊得地勢益張不如移軍河陽北阻澤潞勝則出敗則守表裏相應賊不得西此猿臂勢也白三覆傳公子突曰君為三覆以待之注覆伏兵也設伏踏伏傳曰前茅慮無杜預云前慮有無若今踏伏也軍旅思險險阻出奇伏之處當思念之隱情以虞言私度己之所能以度彼之所能用戒不虞孫臏敗龐涓孫臏減灶偽走涓逐臏度涓夜至之處伏弩萬人見火則發乃斫樹令白書龐涓死此樹下涓夜至樹果舉火照讀之萬弩齊發涓自刎潛師銜枚令無聲覆諸山下傳楚伐絞坐其北門而覆諸山下大敗之坐猶守也大軍之誘見持重門李廣解鞍事伏兵九孔伏起薄戰皆奮死鬥哥舒翰賊將崔乾祐為陳十十五五或卻或進而陌刀五千列陳後王視其陳無法指伏觀嗤笑曰擒賊乃會食及戰乾祐旗少偃如欲遁者王師懈不為備伏起薄戰皆奮死鬥羸師段秀實從封常清討大勃律次賀薩勞城與虜戰勝之常清逐北秀實曰賊出羸師弭我也請大索悉得其廋伏布伏騎數百田布授御史中丞裴度輕出觀兵沱口賊將董重質以奇兵掩擊伏騎數百突出薄之諸軍繼至賊驚引還伏汧陽李晟吐蕃君臣大懼相與議尚結贊善計即遣使委辭因馬燧請和且求盟因盟謀執渾瑊以賣燧於是結贊大興兵踰隴歧無所掠陽怒曰召吾來乃不牛酒犒軍徐引去以是間晟晟選兵三千使王佖伏汧陽旁擊其中軍幾獲結贊伏精騎溝下李光弼平蔡裴度築赫連城於沱口賊以奇兵自五溝至大呼薄戰城為震壞度危甚先是光顏策賊必至密遣田布伏精騎溝下扼其歸賊敗棄騎去顛死溝中者千餘由是賊悉鋭士當光顏而李訴得乘虛入蔡矣伏兵山谷王雄誕歙賊汪華據郡稱王且十年雄誕還師攻之華以徑甲出新安洞拒戰雄誕伏兵山谷以弱卒數千鬥輒走壁華來功壁中奮殊死不可下會暮還雄誕伏兵已據洞口不得還遽面縳降蔽山伏王世充密軍偃師北山新破敵有輕世充心不設壁壘世充夜遣二百騎蔽山伏因秣馬蓐食遲明薄之密陳未成伏兵上北原乘高馳下壓其營縱焚廬落密衆大潰匿城左薛萬均竇建德寇范陽羅藝迎拒之萬均目以精騎百匿城左建德師渡水邀半度擊之大敗其衆裴行儉討突厥詐為糧車三百乘車伏壯士又伏精兵踵其後虜果掠車羸兵走險賊驅就水草解鞍牧馬方取糧車中而壯士突出伏兵至殺獲幾盡賊驚疑伏在旁王晙開元二年吐蕃以精甲十萬寇臨洮次大來谷其酋坌達延以兵踵而前晙率所部二千與臨洮軍合料奇兵七百易胡服夜襲去賊五里令曰前遇寇士大呼鼓角應之賊驚疑伏在旁自相鬥死者萬計伏甲士三百杜慆咸通中為泗州刺史會龐勳反圍城賊將李圓易慆馳勇士百人欲入封府庫慆為好言厚禮迎勞賊不虞慆之謀也明日伏甲士三百宴毬場賊皆殲焉為伏所掩高霞寓討吳元濟析山南東道為兩鎮以霞寓宿將拜唐鄧隋節度使遏賊南衝霞寓雖悍而寡謀統制尤非所善始引兵趨蕭陂戰小勝進至文城柵賊偽北逐之為伏所掩遂大敗才以身免選善射三千伏壁內郭子儀自杏園濟河圍衛州陵緒分其衆為三軍將戰子儀選善射三千伏壁內誡曰須吾卻賊必乘壘若等譟而射既戰偽遁賊薄營伏發注射如兩賊震駭王師整而奮斬首四萬級獲館胄數十萬執安慶和收衛州設伏以待諸葛爽朱溫為賊守同州爽率輕兵入之溫偃旗設伏以待爽謂賊遁解用就舍伏發爽爽悉棄鎧馬奔還遇伏大敗田頵臺濛之行為狹營小舍覘者以為才容二千人頵輕之不復召兵與戰黃池矢石始交而濛遁兵淨逐北遇伏大敗為賊設伏哥舒曜討李希烈遣部將與劉德信趍許未至有詔切讓使班師德信等惶惑還軍無斥候至扈澗為賊設伏詭擊死者殆半器械輜重皆亡伏莽間李密滎陽太守楊慶河南討捕大使張須陀合兵討翟讓讓素憚須陀欲引去密曰須陀健而無謀且驟勝易驕吾為公破之讓不得已陳而待密卒驍勇常何等二十人為遊騎伏千兵莽間須陀素輕讓引兵摶之讓少卻伏發與遊軍乘之遂殺須陀伏道側竇建德秦王進據虎牢翼日以騎五百覘建德營設伏道側獨以數騎去賊營三里覺賊出騎追之王漸郤誘至伏所卒起奮擊賊騎驚引去追斬三百級夜半食馬燧事見軍詐門以水醒面而告以難朱全忠饗李克用於上源驛夜酒罷克用醉臥伏兵發起侍者郭景銖滅燭匿克用床下以水醒面而告以難天大雨克用得從者薛鐵山等隨電光縋尉氏門出以弓手五百人伏湟中張歸霸秦宗權攻汴張晊軍赤岡梁太祖使以弓手五百人伏湟中太祖以騎數百為遊兵過晊柵晊出追太祖歸霸發伏殺晊兵千人奪馬數十匹五代史伏大冢間秦宗權至蔡復遣張晊攻汴王聞晊復來登封禪寺後岡望晊兵過遣朱珍躡之曰晊見吾兵必止珍即馳還王令珍引兵蔽大林而自率精騎出其東伏大冢間晊止而食食畢拔旗幟馳擊珍珍小卻王引伏兵橫出斷晊軍為三而擊之晊大敗梁本紀太宗圍世充於東都竇建德自河朔率兵十二萬來救太宗自率騎二千五百步卒千人趣武牢東二十餘里將挑戰先伏李績程咬金秦叔寶令尉遲敬德執稍造建德壘下大呼致師賊衆大驚撓出兵數千騎太宗逡巡漸卻遂引賊以入伏內李績等奮擊大破之獲其大將殷秋石瓚斬首數百級通典擒獲十白獲則取之七擒七縱諸葛亮至南中擒孟獲使觀己營陳獲曰若秪如此易敗爾亮縱之使更戰七擒七縱而亮猶遣獲獲止不去曰公天威也南人不復反矣往遺之禽君子不擒二毛雖有胡耇獲則取之何有二毛傳衛青擊胸奴獲左右賢王雖多衛俘也系虜之功汝勿佚盡執拘以歸于周豫其殺書繫單于頸釋縳韓信破趙有縳廣武君李左車至麾下者信解縳東向坐西向對而事之佚獲三軍州綽射殖綽中肩謂曰止將為三軍獲不止將取其衷縲臣辭不屈張飛破劉璋獲嚴顏阿之曰大軍至何不降顏曰卿無狀侵我州我州但有斷頭將軍也飛怒令斬頭顏容色不變曰斫頭便斫頭何為怒飛壯而釋之引為客也孔討滅三國皆生執其王蘇烈討百濟及滅三國皆生執其王三騎往擒尉遲恭竇建德營板渚王命恭執槊時世充兄子琬吏於建德乘隋帝廄馬鎧甲華整出入軍中以誇衆王望見問誰可取者恭請與高甑生梁建方三騎馳往擒琬引其馬以歸賊不敢動叛黨禽夷裴行儉帝親勞宴曰行儉提孤軍深入萬里兵不血刃而叛黨禽夷可謂文武兼備矣王式寧國劇賊仇甫亂胡越觀察使鄭祗德不能討宰相選式往代聞賊用騎兵閲所部得吐蕃回鶻遷隸數百發龍陂監牧馬起用之集土團諸兒為向導擒甫斬之生擒二萬郭子儀從元師廣平王率蕃漢兵十五萬收長安陳香積寺之北距澧水臨大川彌亙一舍賊李歸仁領徑騎薄戰官軍囂嗣業以長刀突出斬賊數十騎乃定回紇以奇兵繚賊背夾攻之斬首六萬級生擒二萬揮鐵鎚周德威梁軍圍晉太原有驍將軍陳夜叉常乘白馬被朱甲以自異出入陳中求周陽五欲必生致之德威笑曰陳章好大言因戒其部兵曰見白馬朱甲者當佯走以避之兩軍皆陳德威微服雜卒伍中陳章出挑戰兵始交德威部下見白馬朱甲者因退走章果奮槊急追之德威伺章已過揮鐵鎚擊之中章墮馬遂生擒之五代史唐臣傳擒單廷圭圍劉守光於幽州守光驍將單廷圭望見德威於陳曰此周陽五也乃挺槍馳騎追之德威佯走度遷圭垂及側身少卻廷圭馬方馳不可止縱其少過奮撾擊之廷圭墜馬遂見擒擒其王阿史那社爾討龜茲韓威以千騎先進曹繼叔次之其王率衆五萬拒戰威與繼叔合殊死戰大破之社爾拔都城王輕馳遁王據大撥換城嬰險自固社爾攻凡四十日入之擒其王左翦右屠聿擒其良柳宗元平淮夷逆頸盡徽索仇頭恣髡鬜韓文征蜀聯句白兵革不試試用也宋向戍欲弭諸侯之兵以為名韓宣子曰兵民之殘也財用之蠹也小國之大災也將或弭之雖曰不可必將許之子罕謂向戍曰天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌昭文德聖人以興亂人以廢子求去之不亦誣乎左師之欲去兵是謂誣道主父之謂忘戰實曰危機張而不弛文武不能也弛而不張文武不為也一張一弛文武之道何以伐為記曰倒載干戈禮曰武王克殷倒載干戈包之以虎皮名曰建櫜然後天下知武王之不復用兵也忘戰必危主父偃曰國雖大好戰必亡天下雖平忘戰必危史記兵者聖人所以討強暴救危殆昔黃帝有涿鹿之戰以定火災顓頊有共工之陳以平水害而世儒暗於大較猥云不當用兵大至失守小至削弱故刑罰不可捐於國誅伐不可偃於天下但用之有巧拙與之有逆順也去不祥之器佳兵非君子之器兵者凶器恬淡為上載戢干戈載櫜弓矢詩歸馬放牛書歸馬于華山之陽放牛于桃林之野示天下不復用也偃武修文不教民戰是謂棄之不戢將自焚兵猶火也武有七德一曰禁暴二曰戢兵罷兵晉吳平議悉去兵郡置武吏百人小郡五十人山濤盧欽云不宜去武備何以伐為孔勸帝偃革尚文蕭俯穆宗初兩河底定俯與段文昌當國用四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之歲限一為逃死不補謂之銷兵即而籍卒逋亡無生業曹聚山林間為盜賊會朱克融王廷湊亂燕趙一日悉收用之朝廷調兵不充乃募市人烏合戰輒北遂復失河朔矣蕭俯贊俯議銷兵寧不野哉當此時河朔雖挈地還天子而旱卒頑夫開口仰食者故在彼皆不能自返於本業者也朱克融等客長安餓且死不得一官而俯未有以措置使欲去兵使群失職一日叫呼其從如市以兵為戒李德裕帝既數討叛有功德裕慮怯于武不可戢即奏言曹操破袁紹於官渡不追奔自謂所獲已多恐傷威重養由基古善射者柳葉雖百步必中觀者曰不如少息若弓撥矢鉤前功皆棄陛下征伐無不得所欲願以兵為戒乃可保大功帝嘉納其言息兵修德張文瓘拜侍中兼太子賓客新羅叛帝將出兵討之時文瓘病臥家自力請見曰吐蕃盜邊兵屯境未解新羅復叛議者欲出師二虜俱事臣恐人不堪弊請息兵修德以懷異俗詔可兵之為患猶癰也獨孤及舉高第代宗以左拾遺召既至上疏陳政曰夫療癰者必沫之使潰今兵之為患猶癰也不以漸戢之其害滋大大而圖之必力倍而功寡豈易不俟終日之義耶偃旗息鼓裴光廷玄宗有事岱宗張説以京師空虛恐夷狄竊發議欲加兵守邊召光廷與謀對曰吐蕃突厥為大贄幣往來願修和好有年矣若遣一使召其大臣使赴行在必欣然應命突厥受詔則諸蕃君長必相率而來我偃旗息鼓不復事矣韜刃卷鎧陳少遊李希烈陷汴聲言襲江淮少遊懼遣參謀送款曰豪壽舒盧既韜刃卷鎧惟君命包虎戢戈一掃清天漢包虎戢金戈李白發白馬歸牛休馬豐稼于野柳宗元平淮雅溟澥無波舒元輿問國庠記今溟澥無波兵器可以蒙之虎皮矣乃大修周公仲尼之道之時也罷警一品集與紇扢可汗書邊陲罷警弓矢載櫜罷柝鍇鋒劉禹錫表終軍誕譎險薄不能以道匡漢王好戰之志視天下之勞若觀蟻之移穴玩而不戚人之死於胡越者赫然千里不能諫而又聳踴之己則決起奮怒繼強越挾淫夫以謀老婦欲蠱奪人之國智不能斫而俱死焉柳宗元書邊封脫兜鍪佇繼正觀烈邊封脫兜鍪韓愈詩一拒越師江南野史李升曰民各生父母安用爭城廣地使之膏血塗于野草乎自握王權至禪位凡數十年止一拒越師蓋不得已而為之幅裂其旗章鑠煉其鋒刃元稹策古之所謂銷兵革者非謂幅裂其旗章鑠煉其鋒刃而已也蓋誠信著於上則忠孝行於下富壽立於內則夷狄和於外夷狄和則邊鄙之兵息富壽立則爭奪之患銷車甲永藏馬牛勿用柳宗元表烽燧不驚兵戎以息上和氣遠同罷七旬之干羽仁風溥暢牧六月之車徒柳宗元狀雖被馮陵不足校劉禕之儀鳳中吐蕃寇邊帝訪侍臣所以置之討之之宜人人異謀禕之獨勸帝夷狄猶禽獸雖被馮陵不足校願戢威紓百姓之急有漆弓百五十斤每韜之示無所用王嗣忠傳中興三十年而兵未戢者將帥養寇藩身也若以亡敗為戒則總干戈必圖萬全而不決戰李吉甫議張伯儀傳念將士鋒刃之殃愍黎元塗炭之酷以致寇為戒陸贄疲兵十二白勞師以襲遠非所聞也蹇叔曰傳老師費財師久出為老師勞力竭一以當千振臂一呼創病皆起李陵書兵盡矢窮人無尺鐵漢將失道呼疲兵以當千齊師背城收餘盡而借一困獸猶鬥疏勒重圍而井竭耿恭居延苦戰而矢窮李陵師老敵強宋殤公立十年十一戰民不堪命孔疲老韓收曰大王親督精鋭據成皋厲兵按甲邀建德路彼以疲老當吾堂堂之鋒縳致摩下勇廢為尪衆失為弱陸贄機會不及則氣勢自衰斯乃勇廢為尪衆失為弱困獸當猛虎窮魚餌奔鯨李白古風縱敵十三白長寇讎無畏衆武不違敵敵不可縱縱敵患生秦伯修德晉其避之寇不可玩一日縱敵數世之患非夫成師以出間敵強而退非夫也莫有鬥志有敵而不從不可謂武軍既失謀寇將得計聊固吾圉罔敵我師狎敵榖梁敵至不擊趙穿曰裹糧坐甲固敵是求敵至不擊將何俟遷延卻退之義七縱諸葛孔明玩寇勞師孔縱以資敵不如盡抗之李軌舉兵入內苑會薛舉遣兵來侵軌遣將敗之悉虜其衆軌縱還之李贇曰今力戰而俘又縱以資敵不如盡抗之時不重得康承訓賊龐勛欲乘勝攻承訓父舉直曰時不重得願將軍無縱敵時承訓方攻臨渙聞勛計追還兵仗以待勛軍皆市人囂而狂未陳即奔相陷藉死者四萬騰檄輒下河間王孝恭拜山南招討大使徇巴蜀下三十餘州進擊朱粲破之俘其衆諸將曰粲徒食人摯賊也請坑之孝恭曰不然今列城皆吾寇若獲之則殺後渠有降者乎悉縱之由是騰檄所至輒下留賊作富貴地劉巨容遷山南東道節度使巢浮江東巨容追之率十俘八以功遷禮部尚書諸將欲乘勝追斬巢巨容止曰朝家多負人有危難不愛勝官賞事平即忘之不如留賊為作富貴地諸將謂然故巢復熾白觀兵以示威也示衆晉軍耀武黷武佳兵夫兵者凶器云云見上注果而勿矜勝而不美制勝而已不為美也而美之者是樂殺人夫樂殺人者不可得志於天下阻兵安忍州吁竊弄凶器啓迪禍階夫兵猶火也不戢將自焚武有七德見上踴躍用兵州吁好戰必亡主父偃見上注我武惟揚陳若林之衆訓如虎之師驕兵文子曰恃國家之大務人民之衆謂之驕兵驕兵者滅惟甲胄起戎言兵不可易用易用則起寇戎惟干戈省厥躬省審也不可任以非才也且昧善經是生禍兆暴而不戢謀動干戈於邦內師必有名善惡之名戎容戎昭武烈取威孔耀兵磧北而歸執失思力領突厥扞薛延陀延陀兵十萬寇河南思力示羸不與確賊深入至夏州乃整陳擊敗之追攝八百里會毗伽可汗死耀兵磧北而歸日討金鼓以侈士志高駢會二雉雊署寢占者曰軍府將空駢惡之悉出兵營東塘舟二千艘戈甲鎧完鋭日討金鼓以侈士志梁遣王景仁將兵七萬擊趙王容乞師于晉晉遣周德威先屯趙州梁兵至于柏鄉趙人告急莊宗自將出贊皇會德威于石橋晉兵少而景仁所將神威龍驤拱宸等軍皆梁精兵人馬鎧甲飾以組繡金銀其光耀日晉軍望之色動德威勉其衆曰此汴宋庸販兒徒飾其外爾其中不足懼也景仁大敗五代史周德威傳白伏兵于莽敵剛義易自我致寇又誰咎也擊蒙不利為寇利用禦寇需于泥致寇至敬慎可以不敗也惕號暮夜有戎勿恤吉夬卦國之大事在祀與戎戎祭周禮凡國之大事致民戎祭事也大故致餘子餘子卿大夫守官大事寇戎也都宗人若有寇戎之事則保群臣之壝壇壝域也寇戎來征月令寇不可玩玩則生禍傳速寇黃巾緑林赤眉負且乘致寇至先張之弧易孔戎狄國之寇于休烈疏寇之來則棄民而相保寇之去則冒賞而稱庸李觀上宰相安邊書今國家一垂控戎纍所暴兵兵不問堪將不擇良當守者爭險易當攻者避後先寇之來則棄民而相保寇之去則冒賞而稱庸此所謂戎無卻年矣自度不能留孫樵書田將軍邊事田將軍刺嚴道其戍兵踐吾也地日深而疫死者日衆自度不能留亦輒引去攻劫焚燒陸贄奉天赦京畿之內屬此寇戌攻劫焚燒靡有寧室軍令從權張曲江集敕張守信書寇戎未滅軍令從權
