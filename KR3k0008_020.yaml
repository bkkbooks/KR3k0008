body:
  text: 卷第二十白賢女淑女處女處子處室也如玉有女如玉懷春有女懷春聞琴蔡琰字文姬雍之女也雍夜鼓琴弦絶琰年六歲曰第二弦雍曰偶中耳琰曰吳季札觀風知興亡之國師曠吹律識南風不競由此言之何足不知也詠雪見姪女門謝道韞事贖父罪史記太倉令淳于公有罪當刑無男有女五人公罵其女曰生女不生男緩急非有益其女緹縈自傷泣乃上書曰妾父為吏齊中皆稱廉平今坐法當刑願沒入官為婢贖父刑罪合得改過自新書奏文帝哀憐其意乃下詔曰夫斷支體剋肌膚楚痛者其除肉刑憂國危魯漆室邑之女過時未適人倚柱而嘯鄰婦曰子欲嫁乎曰非也豫憂者魯君老太子幼鄰婦曰此丈夫之憂也女曰不然昔有容過繫馬園牛馬逸踐豫葵使豫終歲不飽葵鄰女奔使豫兄追之逢水溺死使豫終身無兄豫聞河潤九里漸洳三百步今魯國有患君臣父子被其辱婦人獨安所避乎知肉味後漢孔融被誅女年七歲男年九歲寄他舍主人有遺肉汁男渴而飲之女曰今日之禍豈得久活何顏知肉味乎女工詩序曰后妃在父母之家則志在女工之事尊敬師傅可以歸寧父母晚嫁黃公有女至美其父常謙曰醜人謂實然故過時無娉者笄年禮女子十有五而笄二十而嫁從人禮婦人從人者幼從父兄嫁從夫設帨禮女子生設帨於門右帨佩中也鞶絲禮女子生能言教之鞶絲女工十年不出禮女子十年不出漸長可居內姆教女師婦寧詩歸寧父母傳曰杞伯姬來歸寧問父母安否女中王魏文帝郭皇后少而父永奇之曰此乃吾女中王遂以女王為字愛女張禹病帝臨問因言臣四男一女愛女甚於男遠嫁張掖太守蕭咸不勝父子私恩願與相近帝即日徙咸為弘農太守沉江叔先雄沉水求父尸事具孝感門喜書魏文帝甄后九歲喜書視字輒識數字用諸兄弟筆硯兄謂曰汝當習女工用筆為學當作女博士耶后曰古者賢女未有不覽前世成敗不知書何以見之供賓客周顗母李氏字絡秀顗父浚為將軍出獵遇雨止李氏會其父兄不在絡秀聞浚至與婢於內宰豬羊具饌甚辦不聞人聲浚怪使人窺之見一女甚美因求為妾父兄不許秀曰門戶殄瘁何惜一女遂許之邦之媛也美女為媛彤管有煒悅懌女美孔歸寧李晟正歲崔氏女歸寧責曰爾有家而姑在堂姊當治酒食具以待賓客即郤之不得進達禮敦教類如此願備後庭王世充啓帝江淮良家女願備後庭無由進帝喜令閲端麗者美而才魏徵鄭仁基息女美而才皇后建請為充華典冊具或言許聘矣徵諫曰陛下處臺榭則欲民有棟宇食膏梁則欲民有飽適顧嬪御則欲民有室家今鄭已約婚陛下取之豈為人父母意子女是求魏徵曰隋帝子女是求續曹大家女訓韋溫一女歸薛家女工屬文續曹大家女訓行于世嫁為民妻李白元和末宣歙觀察使范傳正採訪後裔惟二孫女嫁為民妻進止仍有風範因泣曰先祖志在青山頃葬東麓非本意傳正為改葬立二碑焉告二女將改妻士族辭以孤窮失身命也不願更嫁傳正嘉歎獻二女柳公權開成三年召問得失因言郭旻領邠寧而議者頗有臧否帝曰旻尚父從子太皇太后季父官無玷缺自大金吾位方鎮何所更議答曰旻誠勳舊然人謂獻二女乃有是除信乎帝曰女自參承太后豈獻哉公權曰疑嫌間不可戶曉因引王圭諫廬江王妃事是日帝命中官自南內送女還郭旻家聞家令姓列女序婦訓姆則同上幽閨婦女奉渤傳幽閒之德其子女聞教訓有幽閒之德韓墓志作門堳楊妃外傳楊妃寵幸時有謠曰男不封侯女作妃君看女卻作門堳桃紋不嫁元積織女詩東家頭白雙女兒為解桃紋嫁不得注余掾荊時目擊貢綾戶有終老不嫁之女生女灸破其面樂史緑珠傳昭君村生女炙破其面故樂天詩云不取往者戒恐貽來者冤至今村女面燒灼成瘢痕女子之行於親也孝婦也節母也義而慈止矣列女傳自古女禍大者亡天下其次亡家其次亡身身苟免矣猶及其子孫雖遲速不同未有無禍者也五代史嗚呼女子之禍於人者甚矣自高祖至於中宗數十年間再罹女禍唐祚既絶而復續中宗不免其身韋氏遂以滅族贊玄宗又敗以女子玄宗親平其亂可以鑒矣而又敗以女子白玉潤吾樂廣字彥輔人謂之水鏡女壻衛玠字權寶時號玉人故時語曰婦翁冰清女壻玉潤玉鏡臺世說溫嶠字太真姑劉氏有女甚麗姑囑嶠曰佳壻難得但如嶠比如何曰何敢希汝比數日白姑已得壻身盡不減嶠因下玉鏡臺一枚姑大悅既婚交禮女以手披紗扇撫掌大笑曰吾固疑是老奴果如所卜愛壻子壻丈人行之以子妻之子謂公治長可妻也雖在縲紲之中非其罪也以其子妻之佳壻從服禮從服者有從重而輕夫為妻之父母也承子授壻禮婚禮壻親見於舅姑舅姑承子以授壻恐事之違也注舅姑妻父母也以女授壻而戒之無令違於婦道親受禮壻揖讓而升堂蓋親受之於父母甘公之遇恭祖後漢陶謙字恭祖同縣甘公出遇之見其容貌駐車與語甚悅因許與女夫人怒甘公曰彼有奇表長必大成遂與之太守之器伯圭魏志公孫瓚字伯圭為郡門下書佐有姿儀音聲太守器之以女妻之又張華字茂先少孤貧牧羊鄉人劉放奇其才以女妻之又吳志呂範子衡少為縣吏有姿容邑人劉氏家富女美範求之母嫌欲勿與劉氏曰觀呂子衡寧久貧賤耶遂與婚之妻以孫女漢陳平貧以席為門富人張負見其門多長者車曰豈有如陳平而久貧賤者乎遂以孫女妻之再嫁漢張耳亡命游外黃外黃富人女甚美庸奴其夫夫去投父客父客素知張耳而遂嫁之絶婚魏志袁術公路為子索呂布女後布怨術女已在途追還絶婚出贅漢賈誼曰商君遺禮義棄仁恩并心於進取行之二歲俗日敗故秦人家富丁壯則分出贅注分音扶問反不當出在妻家猶體有贅一曰贅質也以身為質友壻嚴助侍宴上問所欲對曰家貧為友壻所辱願為會稽太守撾婦翁後漢帝戲第五倫曰聞卿為吏撾婦翁不過從兄飯有諸對曰臣之三娶妻皆云無父請倩史記黃氏請倩注倩女壻東齊間謂壻為倩吾兒誤我魏略太祖以下儀令士未見欲妻之問五官將五官將不可及辟儀到嘉其才曰丁掾即兩目盲亦當與女況但眇吾兒誤我五官將即文帝也禁臠晉武為晉陵公主求壻謂王珣曰如真長子敬使足珣曰謝渾不及真長不減子敬未幾帝崩袁嵩欲以女妻之珣曰卿莫近禁臠東床坦腹太尉郤鑒使門生求女壻於王導導命東廂遍觀子弟歸謂鑒曰王氏諸子弟咸自矜持唯一人東床坦腹食若不聞訪問乃羲之遂妻之孫壻李膺祖修以鍾瑾好學似我家性妹孔蔣繒蔣子謹子繒往見高智周智周方貴以女妻之齊映滑毫節度使令狐彰署掌書記彰疾甚引映托後事因說彰納節婦諸子京師彰從之即以女妻映有子必位宰相楊嗣復父於陵始見識於浙西睹察使韓滉妻以其女歸謂妻曰吾閲人多矣後貴且壽無若生者有子必位宰相既而生嗣復高選世族獨孤郁最為權德與所稱以女妻之德輿輔政以嫌去內職憲宗嘆德輿乃有佳壻詔宰相高選世族故杜悰尚岐陽公主然帝猶謂不如德輿之得郁也張廷賞雖蚤孤而博涉經史通吏治苗晉卿尤器許以女妻之佳壻楊於陵節度使韓滉剛嚴少許可獨奇於陵謂妻柳曰吾求佳壻無如於陵賢因以妻之以嫌自白杜悰權德輿為相其壻翰林學士獨孤郁以嫌自白憲宗見郁文雅歎曰德輿有壻乃爾時岐陽公主始召擇大臣子唯悰以選召見授駙馬都尉貴顯朝廷郭子儀七壻皆貴顯朝廷蘇頲李至遠蘇頲其出也少失母至遠愛視甚謹以女妻之柳談穎士愛其才以女妻之李頻給事中姚合各為詩士多歸重頻走千里丐其品合大加獎挹以女妻之愛重宗室漢少事韓愈愛重以女妻之識非庸人王琚謀剌武三思事泄亡命自傭於楊州富商家識非庸人以女嫁之呂諲里人程氏財雄于鄉以女妻諲不禮杜黃裳初不為執誼所禮及敗悉力營敕既死表還其柩葬焉崔謙之崔行功祖謙之在北齊終巨鹿太守少好學唐儉受其才妻以女因倩作文奏書報未嘗輒開潘炎方劉晏任權炎乃其壻雖書疏報答未嘗輒開時稱有古人節撫座封德彝即楊素之壻素為僕射嘗撫其座曰封郎必居此座後果如其言南部新書張延賞李彥允韋皋見辱於張延賞崔圓受薄於李彥允皆丈人子壻後韋為張西川交代崔救李娣死同上碧鸛雀裴寬事見擇夫門婦翁與壻張垍尚主在翰林獨以珍玩常誇於同列張淑曰此婦翁與壻非天子賜學士者也李肇國史補壻半子回紇明年可汗遣宰𨁂跌都督等衆千餘并遣其妹骨咄祿毗伽公主率大酋之妻五十人迎主且同鄉會聘𨁂跌至振武為室韋所鈔戰死有下七百皆聽入朝舍鴻臚帝御延喜門見使者是時可汗上書恭甚言皆為兄弟今壻半子也陛下若患西戎子請以兵除之一見以為奇姚覬少蠢不修容止時人莫之知中條山處士司空圖一見以為奇以其女妻之五代史白姒婦娣婦爾雅曰長婦謂雉婦為娣婦娣婦謂長婦為姒婦不以妾為姒傳聲伯之母不聘穆姜曰吾不以妾為姒注兄弟之妻相謂為姒鍾郝之禮法晉王渾妻鍾氏字琰弟湛妻郝氏皆有德行琰雖門高與郝氏相親重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人郝夫人之禮法孔命主家事李光進弟光顏先娶而母委以家事及光進娶母已亡弟婦籍資貯納管鑰於姒光進命反之曰姊逮事姑且嘗命主家事不可改因相持泣乃如初順和李翱楊烈婦傳婦人女子順和於娣姒則賢矣諸娣姒皆畏莫敢侍高祖太穆順聖皇后竇氏太后羸老有疾而性素嚴諸娣姒皆畏莫敢侍后事之獨怡謹盡孝使吾姒至此梁太祖皇后張氏太祖已破朱瑾納其妻以歸后迎太祖於封丘太祖告之后遽見瑾妻瑾妻再拜后亦拜悽然泣下曰兗鄆與司空同姓之國昆仲之間以小故興干戈而使吾姒至此若不幸汴州失守妾亦如此矣言已又泣太祖為之感動乃送瑾妻為尼五代史白特豚禮曰婦以特豚饋明婦順雙鯉姜詩字士游母好生魚及江水其妻取水不及時詩乃棄妻寄鄰舍常作膾請鄰母送詩母母感之呼還舍傍輒有泉脈如江水兼躍雙鯉以供母膳為婦三歲為婦靡室勞矣執婦道婦禮四德婦德婦言婦容婦功婦順家肥廟見家和姑慈婦婉傳曰姑慈而從婦聽而婉禮之善物也注從專也婉順也授室禮舅姑降自西階婦降自阼階授之室也宜家宜爾室家雞鳴盥漱禮曰婦事舅姑如事父母雞初鳴咸盥漱也婉娩聽從婉言語娩容貌叱狗東觀漢記鮑永妻嘗於母前叱狗永即去之肅雍之德柔正之道恭承舅姑和協娣姒父戒母戒爾舅爾姑榖梁曰送女父不下堂母不出祭門父戒之曰謹懼從爾舅之言母戒之曰謹慎從爾姑之言夫夫婦婦所謂順也取婦之家三日不舉樂思嗣親也成婦之義禮三月而廟見稱求婦也擇口而祭於禰成婦之義也謂舅姑沒也內和禮曰婦順備而後內和內和理然後家可長久也婦式婦人模式周禮姑喪南宮縚妻姑之喪夫子訓其髽親饋禮婦既嫁婦盥親饋舅姑卒食婦餕餘私之也私猶恩也私貨子婦無私貨無私蓄無私器不敢私假不敢私與藏以待乏禮婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如親受賜若反賜之則辭不得命姑更受賜藏以待乏注或賜之謂婦之兄弟待舅姑之乏以進之請其故賜婦若有私親兄弟將與之則必復請其故賜而後與之注故賜謂前舅姑所反賜之物者明禮讓於賜也婉容禮不至禮曰以此防人婦猶有不至者謂不親夫事舅姑之側也婦本於孝家統於尊女既辭家婦將授室孔唐休璟始老已踰八十猶托倚權近求復用於是賀婁尚宮方用事附者輒榮赫休璟乃為子娶其義女故復起宰相頗為時譏訾乳姑崔琯諸崔自咸通後有名歷臺閣藩鎮者數十人天下推士族之冠始其曾王母長孫春秋高無齒祖母唐事姑孝每旦乳姑一日病召長幼言吾無以報婦願後子孫皆若爾孝世謂崔氏昌大有所本云珍美非經獻不先嘗楚王靈龜妃上官者舅姑在妃朝夕侍奉謹甚凡珍美非經獻不先嘗嚴奉舅姑夙夜勤事太中二年以起居郎鄭影尚公主詔曰女人之德雅合謹修嚴奉舅姑夙夜勤事此婦人之節也南部新書白如事父母內則婦事舅姑如事父母雞初鳴咸盥漱擳縰縰謂束髮笄總首飾衣紳紳帶左佩紛帨帨拭巾也右佩針管線纊施縏帙大觿木燧備尊者之所用襟纓襟結也襟音其朕反綦屨綦繫也綦音忌以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之待舅姑之禮也不傳舅姑之衣衾簞席枕几不傳傳移也杖履祗只敬之勿敢近優餕凡朝夕恆食婦伉餕應唯敬對在舅姑之所有命應唯敬對也進退周旋慎齊升降出入揖遊不敢噦噫嚏咳缺伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔勿逆勿怠子婦孝者敬者舅姑之命勿逆勿怠必嘗而待必服而待若飲食之雖不嗜必嘗而待加之衣服雖不欲必服而待是善事我子不宜其妻母曰是善事我子行夫婦之道沒身敬之不衰也舅沒而姑老傳家事於子婦必請於姑冢婦所祭祀賓客每事必請於姑不敢專擅也介婦請於冢婦也命適私室凡婦不命適私室不敢退待之以誨也大小必請婦將有事大小必請於舅姑也勿庸疾怨子婦未孝未敬勿庸疾怨姑教之若不可教而後怒之先舅先姑沒則曰先舅先姑不幸子夏曰嫁不及舅姑謂之不幸柔色以溫之孔以禮聞莊淑公主事舅姑以禮聞姑疾姑寢疾不解衣藥糜不嘗不進行見舅姑禮王圭子敬直尚南平公主是時諸王下嫁以帝女貴未嘗行見舅姑禮圭曰主上循法度吾當受公主謁見豈為身榮將以成國家之美於是與夫人坐堂上主執笄盥饋乃退其後公主降有舅姑者備婦禮本於圭鞭婦柳公綽為刑部尚書京兆獄有姑鞭婦至死者府欲殺之公綽曰尊歐卑非鬥也且子在以妻而戮其母不順遂減論事如父母襄城公主下嫁有司告營別弟辭曰婦事舅姑如事父母異宮則定省闕白疾怨子婦未孝未敬勿庸疾怨表禮若不可怒子放婦出而不表禮焉注雖當出猶為之隱表禮謂不明其過犯也甚宜不悅禮曰子甚宜其妻父母不悅則出之婦當喪而出則除之當舅姑之喪也為父母喪為父母喪未練而出則三年既練而出則止未練而反則期既練而反則逐之禮女嫁為父母期若出者卻服三年不宜其妻見上束蘊蒯通曰臣之里有婦姑使守肉夜亡其夜姑以為婦盜逐之嘗有里婦束蘊請火曰昨暮犬得肉姑慚追其婦還水遲姜詩母好江水妻常取之一日來遲母渴詩遂遣其妻孔凡四五娶崔皓娶妻惟擇美者俄又棄之凡四五娶既啓飛鳳之兆遂操別鶴之音白居易出妻判姜詩出妻蓋為小瑕鮑永去妻亦非大過同上不待白頭春天百草秋始衰棄我不待白頭時張籍白頭吟歲華逐霜霰賤妾何能久李白去婦詞溺姬侍李元素其妻石泉公王方慶之孫前妻子皆不肖而元素溺姬侍王不見答元素久疾益昏惑遂出之王訴諸朝免元素官且令畀王資五百萬門內斗粟尺帛無所私劉君良四世同居族兄弟猶同産也門內斗粟尺帛無所私大業末荒饉妻勸其異居因易置庭樹鳥雛合鬥且鳴家人怪之妻曰天下亂禽鳥不相容況人邪君良即與兄弟別處月餘密知其計因白去其妻曰爾破吾家召兄弟流涕以告更復同居李迥秀母少賤妻嘗罵媵婢母聞不樂迥秀即出其妻或問之答曰娶婦要欲事姑苟違顏色何可留本傳白六親老子曰六親不知有孝慈九族以親九族九族既睦內睦外侮傳周之有懿德猶懼有外侮捍禦侮者莫如親也敦敘協貴親綏族既睦不咸和同德惟昵近仁不遺親厚骨肉之愛廣枝葉之庇親親之殺長長尊尊立愛惟親立敬惟長葛藟剌桓王也周室道喪棄其九族骨肉將離無親宗族枝葉先落不庇本根義惟立愛仁貴篤親遠間親六逆血屬周親棣華之詩葛藟之剌不睦之刑周禮以八刑紏萬民三曰不睦之刑不獨親其親大道之行各親其親大道既隱旁殺謂親屬之喪服以親疏為殺也從服禮曰從服謂夫為妻父母妻為夫之黨也見親疏之殺焉禮三族失其和禮協比其鄰婚姻孔云瑣瑣姻婭兩壻相謂為婭瑣瑣細小貌掩義禮門內之理以恩掩義親叛傳楚公子比族盡親叛可謂無主也分親傳庶人工商各有分親皆有等衰分扶問反親去聲無絶其愛情雖不同無絶其愛親之道也展親書時庸展親棄親用羈周鞏簡公衆叛親離州吁杕杜晉人剌其君不親宗族縱斧宋昭公欲去群公子樂豫曰公室之枝葉也不可縱尋斧焉孔周恤親戚宇文士及好周恤親戚合疏屬以居裴贄韓偓門內雍友合疏屬以居餘見淫亂門求宗屬顏杲卿被殺真卿方為蒲州剌史令泉明到河北求宗屬始一女及姑女並流離賊中及是並得之悉錢三萬贖姑女還取資復往則己女復失之托外祖母呂向少孤托外祖母蒙擯高季輔以為今尚書八座人主所責成者也宜擇溫厚修潔者任之使不昵者蒙擯於親無所賑施魏元忠為僕射謁告上冢到家於親戚無所賑施友壻蔣係宰相李德裕惡李漢以係友壻出為桂管觀察使依外家孫逖少孤依外家白父黨爾雅父黨為宗族也稱孝宗族稱孝焉吾宗傳曰晉吾宗也豈害我哉紏合宗族本枝白世宗族既睦道雖無頗親疏本恩禮則有殺先親後疏杕杜見上宗族不親本根無庇傳叔向曰肸聞之公族將卑其宗族枝葉先落根本從而亡也無縱斧於葛藟宜解綱於竹刑道乖綏族義爽篤親小忿雖有小忿不廢懿親散金史記蘇秦既歸散金宗族散財史記范勝字無忌散財五百萬以施宗族也宗人族子宗易於下禮祖遷於上宗易於下故敬宗所以尊祖也易疏也親屬竭矣禮四世緦服之窮也五世袒免殺同姓也六世則親屬竭矣戚單於下婚姻不通禮曰庶別姓於上戚單於下婚姻可以通乎子曰繫之以姓而弗別綴之以食而不殊雖百世而婚姻不通周道然也言雖疏遠不可通婚也繫之謂宗籍也戚單言親盡漸疏也父母之黨禮睦於父母之黨可謂孝敦敘九族親以飲食之禮周禮大宗伯以飲食之禮親宗族兄弟注人君有食宗族之禮以親之文三世子曰族食世降一等大傳曰繼之以姓而不別繼之以食而不殊三族不虞儀禮士婚禮請期曰唯是三族之不虞注三族父昆弟己昆弟子昆弟宜吊不吊宜免不免禮族之相為也宜吊不吊宜免不免有司罰之至于賵賻承命皆有正焉謂宗族之相為也承讀為贈宗子雖七十無主婦諸婦不可無統也合族君子因睦以合族合族謂與宗人燕也亢宗子太叔曰吾不能亢身安能亢宗奪宗奪適漢書梅福曰諸侯奪宗聖庶奪適注奪宗始封之君尊為諸侯則奪其舊為宗子之事也奪適謂文王舍柏邑考而立武王也老而納王室見壻姻門注宗子禮適于庶子祗事宗子不敢以富貴加於宗子之門以寡約入必獻其上而服其次若非所獻則不敢入宗子之門宗子正宗敬宗者也族類傳曰非我族類其心必異聚族保族其家宗羞展親分寶玉於伯叔之國時庸展親棄親用羇周羇簡公棄親用羇用卿士也縱斧見上衆叛親離州吁孔周恤王圭宗族匱之周恤之田宅盡分宗族蕭瑀初瑀關內田宅悉賜勳家是還給之瑀盡以分宗族撫養宗屬韋繩撫養宗屬孤幼無異情宗人欲籍高蔭李懷遠少孤宗人欲以籍高蔭懷遠退而曰因人之勢高士恥之假蔭而官吾志邪護乏畢誠既貴所得祿奉養護宗屬之乏無士間為名族裴皞裴氏自晉魏以來世為名族居燕者號東眷居京者號西眷居河東者號中眷族清胄貴杜牧鄭處晦制望閥高華蕭復三世不異居崔玄暐三世不異居家人怡怡如也貧寓郊墅群從皆自遠會食無他爨族人孤貧者撫養教勵同上奉廩推散蘇頲性廉儉奉廩悉推散親族儲無長資九世同居張公藝九世同居高宗有事泰山臨幸其居問本末書忍字以對天子流涕出孝友傳各為大家裴為顯姓入唐尤盛支分族離各為大家韓文河南少尹裴君墓志白贓獲風俗通古制無奴婢即犯事者也贓者被贓罪沒入為官奴婢獲者逃亡獲得為奴婢者也丹書傳裴豹隸也著於丹書欒氏之力臣曰督戎國人懼之裴豹曰苟焚丹書我殺督戎宣子喜曰所不焚丹書者有如皎日遂殺督戎注豹犯罪沒入官奴以丹書其罪家僮僮僕應門李令伯表曰內無應門五尺之僮蒼頭後漢彭寵蒼頭子密等三人殺寵封侯相衛青與諸群奴居有一鉗徒相青曰汝當封侯青曰為人奴虜免笞罵足矣敢望封侯鉗徒見上注略賣欒布為人所略賣得翁風俗通龐儉少失父不知所在後穿井得錢行求蒼頭乃父也時人語曰鑿井得銅買奴得翁遺陸賈史記陳平結歡太尉勃陸賈之力於是乃遺陸賈以奴婢百人也賜霍光漢宣帝詔大將軍霍光賞奴婢七十人同席史記任安為衛將軍舍人過平陽主家主令與騎奴同席而食乃援刀而斷席別坐也八百卓氏富家僮八百人入于罪隸周禮其奴男子入于罪隸女子入于春槁注云謂坐盜賊則沒入官為奴即今之奴婢古之罪人也不為奴又曰凡人有爵者與七十者與未齔者皆不為奴注有爵者謂命士已上齔七八歲初毀齒者是也奴僕衛青奮於奴僕囚奴正士尚書箕子為之奴奴虜黠奴齊俗賤奴虜而力聞愛貴之禁黠奴人之所患雅也力聞收使之逐魚鹽商賈之利終各得其力起富數千萬也殺奴田儋陽為縛其奴從少年之逞欲得殺其奴注古者殺奴婢皆告官如不告者罪之限數哀詔諸侯王已下及豪富人多畜奴婢有司條奏諸侯王奴婢二百人列侯公主百人關內侯吏人四十人年六十已上七十已下不在此數犯者以律論過節則沒縣官指千漢僮手指千比千乘之家奴誤殺子宋則逃而舍之是無陪臺私屬王莽曰秦置奴婢之市與牛馬同簡今改奴婢曰私屬禁不得買賣也賣良人鬻良賢行奴李善字次孫本李元蒼頭也建武中元家疾疫相繼死沒唯孤子續始生數旬諸奴婢欲殺續分産善傷不能止負續逃亡瑕丘界中親自奉養乳為生汁推燥居濕雖在孩時奉之如長君每事長跪請白而後行閭里感之續年十歲然後與善歸本縣理舊業告奴婢於長吏悉收殺之鍾離意上書言狀世祖詔拜善及續並為太子舍人後為本郡太守路經元墓躬自除草灑道自執爨修饌祭祀拜辭涕泣而去班氏奴初班孟堅有竇憲幕府有奴干洛陽令种兢車騎吏呵之奴醉罵兢兢大怒時畏憲不敢發及憲敗賓客皆逮栲兢捕繫固固遂死於獄中有士風雄翹嘗為石崇蒼頭性廉直有士風潘嶽見而稱異勸崇免之乃還鄉里禁殺光武詔天地之牲人為貴殺奴婢者不得減其罪炙灼光武詔敢炙灼奴婢論如律免所炙灼者為庶人射傷人光武又除奴婢射傷人棄市律長命奴世說云并州剌史畢軌送故漢渡遼將軍范明友鮮卑奴年二百五十歲言語飲食如常人知文章郤愔字方回有蒼頭善知文章王羲之愛之每稱奴于劉惔惔問何如方回羲之曰小人耳何得比郤公惔曰不如方回故常奴耳煩辱執煩辱之事先掠光武詔吏人遭亂為青徐賊所掠賣為奴婢欲恣聽之敢拘制以掠人論也報讎欒布為奴於燕為家主報讎也家僕史記與家僕雜居齊齒也乏使謂無使也怒頑左傳忿嫉于頑書庸奴其夫封不義侯後漢詔討彭寵者封侯寵蒼頭奴子密殺寵朝廷以奴殺主不義復不可不封乃封為不義侯平頭奴子提履箱古詩婢贓獲見上注奚人周禮奚三百人注云今官婢也官婢史記太倉令淳于公將刑少女緹縈上書請沒身為婢贖父罪女奴侍婢遺陸賈賜霍光見上注污朝衣東觀漢記劉寬簡略夫人欲試寬伺當朝裝訖使婢奉羹翻污朝衣婢欲遽收之寬徐徐曰羹爛汝手覆毒酒列女傳主父妻淫於鄰主父還為毒酒使媵婢進之婢欲言恐遂主母不言害主父於是佯僵覆酒主怒笞之妻恐婢言欲殺婢婢就杖將死不言主父弟告主父乃去妻納其婢為妻青衣微賤裴秀母婢也秀年十八有令望而嫡母猶妒令秀母親下食衆賓皆起拜之母曰微賤如此應為此兒必貴史記姑布子卿見無恤曰此真將軍也簡子曰此母賤翟婢也曰天之所授母雖賤子必貴也泥中之怒劉義慶世說曰鄭玄家奴婢皆讀書嘗怒一婢拽於泥中一婢問曰胡為乎泥中答曰薄言往訴逢彼之怒代死列女傳曰翟素者翟氏之女也遭賊欲犯之臨以白刃素婢名青乞代賊遂殺素欲犯青青曰我代素者恐其被恥獲害耳今素尚死何以生為又殺之乃生無恤終因子貴作殯王父未爽失賢苟古今之司徵雖微賤而何害侍婢殺主漢大司空扶平侯王崇就國歲餘為侍婢所殺也認孫守藏後漢梁冀認孫奮母以為守藏婢盜白珠紫金限數見奴門逃而舍之其無陪臺私屬見奴門誦賦蜀人劉琰侍婢十人皆能為聲樂又悉讀書誦魯靈光殿賦敬啓緑珠石崇有妓曰緑珠美而艷善吹笛孫秀使人求之崇盡出婢妾示之使曰美矣然奉命求緑珠曰吾所愛不可得也秀竟誅崇纍騎阮咸素幸姑婢婢從姑去時方有客咸借客馬追姑家婢既及與婢纍騎而還客非之團扇歌晉樂志團扇歌者中書令王玫與嫂婢有情愛甚篤嫂箠婢過苦其婢素善歌而玫好把團扇故制此歌奴價倍婢價祖訥字士言貧常自炊爨養母北下將軍王敦聞之遺其一婢辟為從事中郎人戲曰奴價倍婢價祖曰百里奚何必輕於五羖羊皮耶作法買婢郭璞愛主人婢無由得乃取小豆三十繞主人舍散之主人晨起見赤衣人數十圍其家就視即滅主人詣璞曰君家不宜畜此婢可於東南二十里賣之勿爭價妖可滅主人從之璞陰使人賤買此婢復為符投井中赤人一一皆反縛自投井中主人悅璞乃攜婢而去周禮女酒女漿女籩女醯女鹽女冪已下皆免其事在者從坐男女沒入縣官為奴今之侍史官司婢也以巾覆物曰冪女祝女婢曉祝之事女史曉書女工曉裁縫豈唯炊爨之勞抑亦中箱之寵九藥陳壽居喪使婢九藥客見之沉纍數年隨軍馮緄字鴻卿時荊州監軍張敞承宰官日而奉緄將侍婢二人戎服自隨孔給諸子劉洪基始病給諸子奴婢各十五人謂所親曰使賢固不籍多財即不賢守此可以脫飢凍奴伯嫗監太平公主奴伯嫗監千人廝臺掠民子女安樂公主與長寧定安三家廝臺掠民子女為奴婢左臺御史袁從一縛送獄主入訴帝為手詔喻免從一曰陛下納主訴縱奴騶掠平民何以治天下臣知放奴則免罪刻奴則罪於主然不忍屈陛下法以偷生也不納乘驢不肉食歧陽公主所賜奴婢偃蹇皆上還丐直自市悰為澧州剌史主與偕從者不二十婢乘驢不肉食賜奴婢李大亮初破公祐以功賜奴婢百口謂曰而曹皆衣冠子女不幸破亡吾何忍録而為隸乎縱遣之高祖聞咨美更賜俾婢二十後破吐谷渾復賜奴婢百五十口悉以遺親戚奴婢爭財唐扶卒奴婢爭財有司按其資至十餘萬視疾大老嫗李靖五世孫彥芳家故藏高祖太宗賜靖詔書數函上之一日有詔夜視公疾大老嫗遣來吾欲熟知公起居狀賜七十人姜譽子確平高昌還賜奴婢七十人奴訴主魏謨大理卿馬曙有犀鎧數十首懼而瘞之奴王慶以怨告曙藏甲有異謀按之無它狀投曙嶺外慶免議者謂奴訴主法不聽謨引律固爭卒論慶死貫率錢崔從授淮南節度副大使楊州凡交易資産奴婢有貫率錢從皆蠲除之詔市荊益奴婢張廷圭會詔市荊益奴婢圭上書曰荊益奴婢多國家戶口姦豪掠買一入於官永無脫期南北異宜必至生疾此有損無益也訪親戚原縱宗室復改容州剌史先是西原亂吏獲反者沒為奴婢長役之復至使訪親戚一皆原縱童獲猶儒先生家趙憬位台宰而第室童獲猶儒先生家也奴告張鎰郭子儀壻趙縱為奴告下御史劾鎰奏言正觀時有奴告其主謀反者太宗曰謀反理不獨成尚有它人論之豈籍奴告邪乃著令奴婢告主者斬由是賤不得干貴下不得凌上教本既修悖亂不萌頃者長安令李濟以奴得罪萬年令霍晏因婢坐譴輿臺下類王反畏之悖慢成風漸不可長持兵呵衛武元衡被害公卿朝以家奴持兵呵衛殺主竇建德滑州剌史王軌為奴所殺奴以首奔建德建德曰奴殺主大逆納之不可不賞賞逆則廢教將焉用為命斬奴而返軌首厭酒內獨孤及上疏曰人之生産空於杼柚擁兵者第管亙街奴厭酒肉而貧人羸餓就役名姝異技元載名姝異技雖禁中不逮為倡優褻戲載諸子牟賊聚斂蓄妓妾為倡優褻戲親族環睹不愧也奴私侍兒沈詢為昭義節度使奴私侍兒詢將裁之奴懼結牙將為亂夜攻詢滅其家本傳春草楊岑謹矜父冢草木皆流血懼問所善胡人史敬忠使身桎梏裸而坐林中厭之會婢春草有罪將殺之敬忠曰勿殺賣之可市十牛歲耕田十頃謹矜從之婢入貴妃姊家因得見帝帝愛其辨惠留宮中寢侍左右帝問所從來婢奏為謹矜家所賣具言敬忠夜過謹矜坐庭中步星變夜分乃去帝怒而婢漏言于楊國忠國忠與王珙陰相語未有發也乃與李林甫作飛牒告謹矜有詔賜死黃芩高固生微賤為家所賣轉渾童奴字黃芩性敏惠掠為奴婢孔戣拜嶺南節度使南方鬻口為貨掠人為奴婢戣峻為之禁親吏得嬰兒于道收育之戣論以死由是閭里相約不敢犯青衣柳玭永寧王相國涯居位竇氏女歸請曰玉工貨叉直七十萬錢王曰七十萬錢豈於女惜但叉直若此乃妖物也禍必隨之女不復收言後叉為馮球外郎妻首飾馮為賈相國餗門人賈有奴頗橫馮愛賈召奴責之奴乃泣罪未幾馮晨謁賈賈未出有二青衣齎銀罌出曰公恐君寒奉地黃酒三杯馮悅盡舉之俄病渴且咽因暴卒本傳主藏奴柳公權凡公卿以書貺遺蓋巨萬而主藏奴或盜用常貯杯盂一笥滕識如故而器皆亡奴妄言叵測者公權曰銀杯羽化矣不復詰以奴主務柳子華為昭應令宰相元載有別墅以奴主務自稱郎將怙勢縱暴租賦未嘗入官子華囚奴入謁收付獄劾發宿罪杖殺之一邑震伏載不敢怨買婢遷約張又新嘗買婢遷約為牙儈搜索凌突御史劾舉逢吉庇之事不窮治譖柏耆李同捷反授計會使宦人馬國亮譖耆受同捷先所得王稷女及奴婢珍資都兒陽城歲飢屏跡不過鄰里屑榆為粥講論不輟有奴都兒化其德亦方介自約或哀其餒與之食不納後致糠核數杯乃受願為奴以償德山東節度府聞城義者發使遺五百縑戒使者不令反城固辭使才委而去城置之未嘗發會里人鄭叔欲葬親貸於人無得城知其然舉縑與之俶既葬還曰蒙君子之施願為奴以償德城曰非也能與我為學乎俶泣謝即教以書云云數人王績有奴婢數人漁童樵青張志和帝嘗賜奴婢各一志和配為夫婦號漁童樵青田宅財資分給奴婢崔覲老無子乃以田宅財資分給奴婢各為業皆為官所賣羅讓或以婢遺讓者間所從答曰女兄九人皆為官所賣留者獨老母耳讓慘然為焚券召母歸之愛才蕭穎士有奴事穎士十年笞楚嚴慘或勸其去答曰非不能愛其才耳奪取武承嗣聞左司郎中喬知之婢窈娘美且善歌奪取之知之作緑珠篇諷婢得詩恨死承嗣怒告酷吏殺之殘其家沒為官奴王毛仲父坐事沒為官奴生毛仲故長事臨淄王王出潞州有李守德者為奴善騎射王市得之並侍左右擾民李絳出為華州剌史承璀田多在部中主奴擾民絳捕繫之家僮上變於頔同中書門下平章事時宦者梁守謙幸於帝頗用事有梁正言者與頔子敏善敏因正言厚賂守謙求頔出鎮久不報敏怒其給責所饋誘正言家奴支解之棄溷中家僮上變詔捕頔吏沉璧及他奴送御史獄轉側民間李源家覆俘為奴轉側民間及史朝義敗故吏識源於洛陽者贖出之歸其家屬細過輒殺張直方婢婢細過輒殺祿賜僮婢盜有王起治生無檢所得祿賜為僮婢盜有男女質錢柳宗元從柳州剌史柳人以男女質錢過期不贖子本均則沒為奴婢宗元設方計悉贖歸之會兒五代朱守殷少事唐莊宗為奴名曰會兒姑息僮僕史洪肇李嵩坐奴告變族誅洪肇取其幼女以為婢於是前資故將失職之家姑息僮僕而廝養之輩往往脅制其主同上金鳳閩王鏻妻早卒繼室金氏賢而不見答審知婢金鳳姓陳氏鏻嬖之遂立以為后衣羅紈鳴珥環房魯上節度使書侍妾娟然衣羅紈鳴珥環出聲態者纍百免為官婢嚴武卒母哭且曰而今而後吾知免為官婢矣市寒賤可制指者始與尚書合諫曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者杜牧岐陽公主碑淚爛犀簾蜀普録曰閬州參軍黃涉婢曰笑春紅死涉念之灑淚至爛犀捐簾愛姬江陵有士子遊交廣間而愛姬為太守所放高麗坡底及歸因寄詩曰惆悵高麗坡底宅春光無復下山來太守見詩遂遣還南部新書借頭以明法竇軌戒家奴無出外忽遣奴取漿公廚既而悔焉曰要當借汝頭以明法命斬奴謫仙奴酉陽雜俎權同休友人雇得僕遇疾貧窘褫垢衣令辦酒食曰豫將會村老丐道里資僕曰此固不足辦某當營乃斫桑札噀成牛肉復汲數瓶水頃之乃旨酒也且曰某固異人白得僮僕貞易僕臣臺傳曰人有十等廝輿之卒漢書淮南王書廝輿之卒有一不備而歸注廝析薪輿主駕僕賃傳申鮮虞僕賃於野以喪莊公賃身為僕也我僕痡矣從者病僕人役人賤隸僕使孔多僮僕李績客衛南家富僮僕廝豎崔蕘為陝虢觀察使是時王仙芝亂漢上河南群盜興蕘簡悅不曉事以器韻自高委政廝豎待以誠信曹華至廝豎皆待以誠信人以為難僮千人王處存侈靡自奉家僮千人五代史家僮至數千李謹行家僮至數千以賄自雄恨不得為騶虞倪若水為汴州剌使班景倩入為大理少卿過州若水顧左右曰班公是行若登仙吾恨不得為騶虞我僕或歌愕韓愈晚秋郾城聯句兼之僕隸小人緣此得親左右亦既奉承顏色能不恃托恩光作福作威莫不由此時太子與戶奴款狎韋承慶上書諫舊史饑寒奴僕賤杜甫贈畢四詩未嘗有十歲之僮元德秀侈僕妾鄭餘慶常語人曰祿不及親友而侈僕妾者吾鄙之白慈母昔者魯昭公少喪其母有慈母良及其死也欲喪之有司以聞曰古之慈母無服今君為之服是逆古典公不忍為之練冠自昭公始也君命所使教子也禮外有師傅內有慈母君命所使教子也何服之有徙邊史記漢武少時東武乳母常養帝詔令乘車馳送乳母子孫奴婢橫暴不忍致法有司請徙於邊郭舍人謂乳母曰入辭去勿疾行而數回顧乳母如其言舍人叱之曰何不疾行陛下壯矣寧須汝乳帝悟乃不令乳母徙邊抱子桓玄初生魁偉妳母抱詣溫易人而後至重兼常兒也令取玉環羊祜五歲時令乳母取所弄玉環即詣鄰人李氏東垣桑樹中探得人以李氏子祜前生也葬以卿禮列女傳曰魏節乳母者魏公子乳母也秦破魏皆誅諸公子乳母與公子俱亡秦軍追見爭射之乳母身蔽公子公子與乳母俱亡秦王義之葬之以卿禮食我之恩推燥就濕孩子實覃實訐厥聲載路誕實匍匐克岐克嶷以就口食路大也覃始能坐訐張口也嶷識岐知人意五月能言莊子老聃曰舜之治天下使民心競民孕婦十月生子子生五月能言注教人之速不至乎孩幼而始誰別人之意未孩而已擇人言競教之速成矣嬰兒老子云嬰兒之未孩終日號而不嘎重兼常兒見上注襁褓三月童丱雉齒十歲兒戲竹馬之戲三赦周禮三赦一赦曰幼弱隅坐童子隅坐而執燭隅坐者不與成人並禮晏起禮孺子早寢晏起唯所欲食無時注孺子幼子也居喪禮童子苦不偯不踴不杖不非不廬注不備禮也竹馬是乘期郭伋以敦信雉雛不捕咸曾恭以懷仁不衣裘裳禮童子不衣裘裳言太溫也童心魯昭公年十九猶有蘭心奉雉豎牛母曰豫子長矣能奉雉以從我蓋五六歲常視無誑禮云幼子常視無誑童子何知傳齠齔綺紈之歲佩觿詩云童子佩觿佩韘幼儀禮生六年學幼儀成童舞象學禮舞勺十三學樂誦詩舞勺七年曰悼禮七年曰悼雖有罪不加刑焉幼沖侗願子曰侗而不願吾不知之矣無知詩樂子之無知互鄉難言猶能潔已論語互鄉難與言童子見門人惑子曰人潔已以進與其潔也不保其往也闕黨童子何欲成人闕黨童子將命者出戶或問之曰益者與子曰吾見其居於位見其與先生並行非求益者欲速成者也幼學禮十年曰幼學總角丱兮孩提負劍辟咡詔之則掩口而對謂若負劍抱之也扶床羈貫榖梁云子生羈貫成童不就師父之罪也羈貫謂交午翦髮也幼敏對日後漢黃涴字子琰年七歲詔問曰蝕多少對曰日蝕之餘如月之初京師知名後乃拜童子郎參玄楊子決言曰吾家童烏九歲預吾玄文也家禽郭子曰楊氏子年九歲聰惠孔君平指楊梅謂之曰此君家果答曰未聞孔雀是夫子家禽辨鬥孔子見二小兒辨鬥一兒曰日初出大如車蓋及中則小是上下遠東西近也小兒曰日初出則陽微及中則熱是上下近東西遠也孔子竟不能夬甘羅十二為秦相克岐克嶷謂幼有知識遜悌幼而不遜悌長安遠于日晉明帝年五六歲元帝坐之膝上適有人從長安來帝問之曰長安何如日遠明帝曰只聞人從長安來不聞人從日邊來以此可知帝奇之後集群臣言其對因復問之明帝曰日近元帝問何以異昨日之對對曰舉首即見日不見長安稟生知之性有老成之風弱不好弄傳夷吾弱不好弄弄戲也弱幼也奇骨晉桓溫相彝之子未期溫嶠見之曰此兒有奇骨可試使啼曰真英物也彝以嶠賞遂名之曰溫成人之風奇童九歲屬文班孟堅九歲善屬文不治屋宇陳蕃字仲舉年十五居室不治人曰孺子何不掃除曰當掃除天下諫父吳祐字季英父恢為南海太守欲殺青簡寫書祐年十二諫父曰南方素多珍怪此書成載之兼兩昔馬援以薏苡與謗無雙黃香幼歧嶷人語曰天下無雙江夏黃香造謁孔融字文舉九歲詣李膺門謂門者曰與府君有親門者為通膺見曰與僕何親融曰先君孔子與老聃有師資之道僕與公亦纍世通家膺大奇任氏童魏任嘏先世皆早成人人語曰蔣氏翁任氏童遺客書虞翻字仲翔年十二有客候其兄不遇翻進與之書曰僕聞琥珀不取腐芥磁石不受曲針客奇之苦李當路有李群兒競取王戌年七歲獨不取曰李當路而繁必苦李也果然不惜環傳暢小時父友戲解其金環都不言惜見故吏桓玄七歲服終州府文武辭其叔沖沖撫玄曰此汝家故吏玄流涕被面鼠嚙衣魏鄧王蒼舒操子也操馬鞍為鼠所嚙庫吏懼死沖乃以刀穿破衣而憂曰俗以鼠嚙衣不吉操曰無害俄而庫吏白鞍事操曰小兒衣裾尚被嚙況鞍乎不罪吏也賈誼年十八名稱郡中河南尹吳公舉之終童終君年十八歲時號終童西征賦曰終童山東之英妙英妙見上注懷橘吳陸績字公紀六歲見袁術術出橘食之績懷三枚去拜辭墮地術曰陸郎作賓客而懷橘乎績跪答之曰欲以遺母術大奇之劾鼠張湯為兒守舍鼠盜肉父笞湯湯乃掘得鼠及餘肉劾鼠掠治訊鞫論報具獄磔于堂下父視其文辭如老獄吏稱象孫權獻象於魏魏祖欲稱之不可得之蒼舒曰載於舟刻其木入多少以他物校之即知輕重乃從之觀師秦師伐滑過周王孫滿尚幼觀之曰秦師輕而無禮必敗果於殽聖童任延長孫年十二學於長安明詩易春秋號曰任聖童小器速成朱勃字叔陽年十二詣馬援兄侃侃方飲言辭間雅援見之自失侃乃酌酒慰援曰朱勃小器速成終當從汝稟學勿畏慢人者魏司馬朗九歲有人道其父字者郎曰慢人者不敬其親怒字父魏常林字伯槐年七歲父黨造門問曰伯先在否何不拜林曰臨子字父何拜之有客大嘉之從軍呂蒙年十五六竊隨姊夫鄧當戰當見驚呵叱不能止歸告蒙母母怒之蒙曰貧賤難可居誤有功當富貴又張昭弟子奮年未二十造打城具步騭薦之以其年少不顧奮曰昔童汪踦奮不才為少也遂領兵又孫策年少領父舊兵號孫郎殺父侍兒見母子門狡童狡童剌忽也昭公有狂狡之志不與大臣圖國而使祭仲專于鄭狂童恣行謂突與忽爭國不見子充乃見狡童孔竇懷貞納韋后乳媼乳保之母宋務光上言願乳保之母妃主之家以時接見無令媒瀆疏奏不省解衣以褓安樂公主帝遷房陵而主生解衣以褓之名曰褁兒六歲間關江左楊於陵父清倦宦客河朔死祿山之亂於陵始六歲間關至江左重遲不好戲劉昌裔幼重遲不好戲常若有所思度與群兒戲常為旗幟戰陳狀楊行密少孤與群兒戲常為旗幟戰陳狀指顧群兒趙犨兒弄時好為營陳行列自號令指顧群兒無敢亂父叔文見之曰是當大吾門不喜兒弄王潛幼莊重不喜兒弄土城竹馬童兒樂也龜茲傳同隊魚少長聚嬉戲不殊同隊魚韓愈符讀書萬金産薄暮歸見君迎我笑而莞指渠相實言此是萬金産同上贈張籍視保李氏入韓氏家乳其兒愈孤失怙恃李氏憐不忍棄去視保益謹娟好靜秀幼子娟好靜秀瑤環瑜珥蘭茁其芽稱其家兒也馬君志上攤書解蒲床杜甫示宗武覓句新知律攤書解蒲床試妗青玉案莫羡紫羅囊褓負皆補清官李義甫諸子雖褓負皆補清官孺褓授柱上國契苾子明孺褓授柱上國本傳孔七歲誦經呂才子方毅七歲能誦經舉神童吳通立舉神童補祕書正字國瑞劉晏玄宗封泰山晏始八歲獻頌行在帝奇其幼命宰相張說試之國瑞也屬文李百藥七歲能屬文又子安期亦七歲屬文夙敏章懷太子賢甫數歲讀書一覽輒不忘至論語賢賢易色一再誦之帝問故答曰性實愛此帝語李世績稱其夙敏幼警敏房玄齡幼警敏奇童李百藥父友陸義等共讀徐陸文有刈琅邪之稻之語嘆不得其事百藥進曰春秋鄅子藉稻杜預謂在琅邪客大驚號奇童對詔高第員半千羈丱通書史客晉州州舉童子房玄齡異之對詔高第已能講易老子為文徐彥伯七歲能為文結廬太行山下薛元超表其賢對策高第本傳生七月能展書白居易其始生七月能展書姆指之無兩字雖試百數不差九歲暗識聲律其篤於才章蓋天稟然在幼丱已不凡盧懷謹屬文張九齡七歲知屬文五月能言太宗賢妃徐惠生五月能言圖史一經目輒志于心褚亮少警敏得見圖史一經目輒志于心屬文楊嗣復八歲知屬文讀孝經獨孤及為兒時讀孝經父母試之曰兒志何語對曰立身行道揚名於後世宗黨奇之一覽千言覆誦蘇廷碩弱敏悟一覽至千言覆誦擢童子舉裴耀卿數歲能屬文擢童子舉作八卦論蘇晉數歲知為文作八卦論擢童子科獨屬文王丘十一歲擢童子科它童皆專經而獨屬文由是知名共師學劉鄴六七歲能屬辭李德裕憐之使與其子共師學擢明經元稹九歲工屬文十五擢明經判入等羈丱屬文章表微羈丱能屬文高定辨惠七歲讀尚書至湯誓跪問郢曰奈何以臣伐君郢曰應天順人何云伐邪對曰用命賞于祖不用命戮于社是順乎人郢異之小字董二世重其早慧四歲能賦權德輿生三歲知變四聲四歲能賦詩能為辭章令狐楚生五歲能為辭章二郤郤士美年十二通五經史記漢書皆能成誦父友蕭穎士顏真卿與相論繹嘗曰吾曹異日當友二郤之間矣李泌開元十六年悉召能言佛道孔子者相答禁中有員俶者九歲升座詞辨注射坐人皆屈帝異之曰半千孫固當然因問童子豈有類若者叔跪奏臣舅子李泌帝即馳召之泌既至帝方與張說觀奕因使說試其能說請賦方圓動靜泌逡巡曰願聞其略說因曰方若棋局圓若棋子動若棋生靜若棋死泌即答曰方若行義圓若用智動若聘材靜若得意說因賀帝得奇童帝大悅曰是子精神要大於身賜束帛敕其家曰善視養之張九齡尤所獎愛嘗引至臥內九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦徑然蕭軟美可喜方命左右召蕭泌在旁師爾曰公起布衣以直道至宰相而喜軟美者乎九齡驚改容謝之因呼小友有海內名李乂年十二工屬文中書令薛元超曰是子且有海內名所賦輒就楊收七歲而孤母長孫親授經十三通大義善屬文所賦輒就暗記三禮義宗孔穎達八歲就學誦誦記日千餘言暗記三禮義宗本傳召試徐齊聃八歲能文太宗召試賜所佩金削刀授紙為賦徐堅幼有敏性沛王聞其名召見授紙為賦異之指擲王勃六歲善文辭九歲得顏師古注漢書讀之作指瑕以擲其失授校書郎楊炯舉神童授校書郎賦詩駱賓王七歲能賦詩賦土火爐孫逖幼有文屬思警敏年十五見雍州長吏崔日用令賦土火爐援筆成篇理趣不凡日用駭嘆遂與定交通詩書李白十歲通詩書屬辭王維九歲知屬辭十歲補太學生蕭穎士四歲能屬文十歲補太學生觀書一覽即誦通百家譜繫書籀學善詩皇甫冉十歲便能屬文張九齡歎異之與弟曾皆善詩賦高軒過李賀七歲能辭章韓愈皇甫湜始聞未信過其家使賀賦詩援筆輒就如素思自目曰高軒過二人大驚自是有名工辭賦柳公權年十二工辭賦著語默賦高郢九歲通春秋工屬文著語默賦諸儒稱之器大孫思邈通百家說善言老子莊周洛州總管獨孤信見其少異之曰聖童也顧器大難為用爾治尚書左氏春秋李至遠少秀晤能治尚書左氏春秋絶乳即能詩李甘始河南人楊牢有至行甘以書薦于君曰牢絶乳即能詩洛陽兒曹壯于牢者皆出其下奇名劉禹錫柳宗元文集柳子厚始以童子有奇名於貞元初神仙童子唐元稹聰敏年少號神仙童子朝野僉載耳目明達神器以靈韓愈送張童子十過誦萬言封氏見聞集開元初嘗敬忠十五歲上書言能一過誦千言張燕公召問曰能十過誦萬言乎曰能以萬言試之七過已通熟矣甘露頂裴敬彝七歲能文章性謹敏宗族重之號甘露頂自七歲屬辭杜甫上賦頌自稱臣賴緒業自七歲屬辭且四十年安陵蓋夫子十歲與天通李白詩安陵蓋夫子十歲與天通懸河與微言談論安可窮能令二千石撫背驚神聰揮毫贈新詩高價掩山東自然生知公神秀穎發自然生知五歲便措意於文每坐臥吟諷未嘗暫輟至于八九歲則有若大成焉一覽誦千言有若素習十七遊太學對策甲科韓休蘇頲序集十三弄文史揮筆如振綺李白送魏萬誦憶略遍韋述弘機曾孫家儲書二千卷述為兒時誦憶略遍元行沖常載書數車自隨述入其室觀書不知寢食行沖異之曰外家之寶也再讀輒誦蔣乂性鋭敏七歲時見庾信哀江南賦再讀輒誦幼從外祖家學得其書博覽強記本傳授以屬辭之要梁肅李泌集序七歲見丞相張九齡九齡駭其聰異授以屬辭之要治孝經論語蘇世長十歲上書帝異其幼問讀何書對治孝經論語帝曰何言可道曰為國者不敢侮於鰥寡為政以德帝善之此兒器不可量父友監察御史韓思彥歎曰此兒器不可量盧懷謹傳五歲誦六甲十歲觀百家李白上裴長史書七歲能誦數經李華蕭穎士文集序七歲能誦數經十歲以文章知名尚宮有品當拜舒王元名高祖之在大安宮太宗晨夕使尚宮問起居元名才十歲保媼言尚宮有品當拜元名曰此帝侍婢耳何拜為太宗壯之曰真吾弟也
