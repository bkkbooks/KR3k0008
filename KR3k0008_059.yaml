body:
  text: 卷第五十九禮一白禮以防德禮節人心大禮與天地同節其理辨者其禮具禮備而不偏其惟大聖禮國之幹也林放之問鄒子之知禮者人之急子産曰禮者天之經地之義人之行天地之經而人實則之乃能協于天地之性禮上下之紀也禮者與天地並子曰禮云禮云玉帛云乎哉禮以飾情曲禮三千無體之禮禮為人防以禮制心國有四維一曰禮管子魯秉周禮齊仲孫湫曰魯猶秉周禮未可取也禮煩則亂秕稗之禮不備明備必簡安上治民莫善於禮行為人紀張為國維韓宣子曰周禮盡在魯矣三年不為禮禮必壞委巷之禮鄙俚之義君子表微謂禮節文禮文等數禮所以定親疏決嫌疑別同異明是非也是逆古之禮建中禮立中道於人修外禮所以修外也無輕議禮著誠去偽禮之經也禮之本也治躬致禮以治躬則莊敬莊敬則威嚴由文由用也用禮之文也敬自中出禮由外作禮之失煩深於禮者專以禮許人汰哉叔氏專以禮許人叔氏子云云於禮謬繆失也況以禮終始乎伯石一為禮於晉猶荷其祿況以禮終始乎禮無違者天秩有禮以洽百禮詩率履不越履禮也大司徒以陰禮教親陽禮教讓防偽以五禮防萬民偽而教之中大宗伯以吉禮事邦國之鬼神以嘉禮親萬民別嫌明微苟無忠信之人則禮不虛道是故得其人之為貴末節鋪延席陳尊俎列籩豆以升降為禮者禮之末節故有司掌之夷禮杞成公用禮勝則離禮以治內為同樂以修外為異不可斯須去身禮者理之粉澤夏造殷因上下有禮其可用也晉文觀師禮則然矣禮樂所以立人倫正情性人足以防其失也叔孫通製作其儀品異數名位不同禮亦異數菲廢美沒君子不以菲廢禮不以美沒禮信讓以求役禮夫子縱言至於禮講求隋武子講聚三代典禮聘周歸國語我愛其禮緣飾苛禮漢書孔宴積翠池酣樂賦詩魏徵帝宴群臣于積翠池酣樂賦詩徵賦西漢其卒章曰終藉叔孫禮方知皇帝尊帝曰徵言未嘗不約我以禮以禮自間衛楊恭仁性沖厚以禮自間衛尤精三禮王方慶尤精三禮淹識古今典禮王彥威穆質貞元初為太常博士昭德皇后崩中外服除皇太子諸王將服三年詔太常議太子服穆質曰今有司之議虧化敗俗常情所鬱夫政以德為本德以孝為大後世記禮之失自今而始顧不重哉非諸侯可擅制李夷簡謂禮樂非諸侯可擅制輕禮陳子昂上言君子三年不為禮禮必壞三年不為樂樂必崩奈何為天下而輕禮樂哉人譏其失禮呂諲同平章事會母喪解三月復召上元加同中書門下三品當賜門戟或勸諲以凶服受吉賜不宜諲釋縗拜賜人譏其失禮焉善禮學徐堅王方慶善禮學嘗就質疑晦堅為申釋常得所未聞以禮法治下李瀕丐建州刺史既至以禮法治下禮傔而不進則銷武平一上書禮地之序同上禮配地同上為之禮以次其先後韓文原道號為周禮庫李涪博學禮樂之事人多咨之號為周禮庫北夢瑣言將興禮樂必先富黎人元稹制策將興禮樂必先富黎人將欲富黎人必先息兵革序人倫安國家莫先於禮白居易議善沿禮者沿其意不沿其名同上古者宮室車輿以為居衣裳冕辨以為服尊爵俎豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其歲時聚會以為朝覲聘問歡欣交接以為射鄉食饗合衆興事以為師田學校下至鄉閭田畝吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友悌忠信仁義者常不出於居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出於一而禮樂達天下使天下安習而行之不知所以遷善遠罪而成俗也後之有天下者三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名也已上唐禮志自漢以來史官所記事物名數降登揖讓拜俯伏興之節皆有司之事爾此所謂禮之末節也同上凡五禮之儀一百五十有二唐六典凡五禮之儀一百五十有二一曰吉禮其儀五十有五二曰賓禮其儀有六三曰軍禮其儀二十有三四曰嘉禮其儀有五十五曰凶禮其儀一十有八三代已亡遭秦變古後之有天下者自天子百官名號位敘國家制度宮室車服器用一切用秦其間雖有欲治之主思所改作不能超然遠復三代之上而牽其時俗稍即以損益大抵安於苟簡而已然用之郊廟朝廷自搢紳大夫從事其間者皆莫能曉習而天下之民至於老死未之見也況欲識禮樂之盛乎所謂朝覲聘問射鄉食享師田學校冠昏喪葬之禮在者幾何同上民性多縱聖人導之以其禮皮日休鹿門書阮籍焉知禮法疏杜甫酬嚴公詩白威儀棣棣不可選也有威可畏謂之威有儀可像謂之儀君有君之威儀其臣則而像之臣有臣之威儀其下畏而愛之是以上下能相固朋友攸攝攝以威儀容止可觀物有其容子太叔曰揖讓周旋是儀也非禮也威儀遲遲翼翼人受天地之中以生所謂命也是以有動作威儀之則以定命也能者養之以福養威儀以致福不能者敗以致禍女叔齊曰魯侯焉知禮而屑屑焉習儀以亟亟急也言善於禮不亦遠乎拜迎而進揖讓而升其儀不忒薛廣德字長卿為人溫雅有蘊藉漢好修容儀馮參字平叔為人矜嚴好修容儀動作可觀好禮修整後漢李忠字仲都為郎云云有威容侯霸矜嚴有威容字君房張湛字子孝矜嚴好禮動止有則居處幽室必自修整雖遇妻子若嚴君焉牟融舉止方重甚得大臣體第五倫字伯魚少蘊藉不修威儀亦以此見輕也諸儒稱其高朱暉字文季守業於太學性矜嚴進止以禮云云家人不見惰容魏郎字少英矜嚴修整間居威儀不減魏志司馬防字建公雖間居威儀不減諸子雖成人不命進不敢進不命坐不敢坐不指有所問不敢言也敬慎威儀以近有德詩不愆于儀維人之德淑慎爾止云云巧趨蹌兮必敬爾儀觀玉聲既服習容觀玉聲出揖私朝輝如也慎儀引之表儀動作有文善為威容後漢何熙字孟孫善為威容贊拜殿中音動左右帝偉之擢為中丞和帝時足容目容誠宜進退有度接武布武能使威儀不忒惰以受玉知晉侯之將終內史過言晉惠傲以執幣辨若敖之必滅叔仲惠伯言楚越椒樂且有儀慎爾出話敬爾威儀雜儀登席不由前為躐席也禮徒坐不盡席尺周禮九儀周禮太宗伯以九儀之等正邦國之位每命異儀樂且有儀敢不慎儀凡祭於室中堂上無跣燕則有之祭不跣主敬也燕有跣謂歡也失儀禮失則昏人而無儀受玉邾子來朝執玉高其容仰公受玉卑其容俯子貢曰夫禮死生存亡之體也高仰驕也卑俯贊也皆有死亡焉不能者敗以取禍注敗失威儀以取禍也苟服位之或愆在禮容而奚取委巷之儀謂鄙俚之禮也表微逆古是逆古之禮不達於禮於禮繆無禮則危苟或愆於威儀是乃易其紀律人而無止吾何以觀孔張失位立在懸間客從而笑之遊楚稱諾魏志遊楚字仲元為隴西太守以功封侯帝嘉之詔入覲楚自謂初不朝覲不知儀式帝敕侍中贊引呼隴西太守前楚稱諾帝顧之而笑孔臺儀復振薑晦擢御史中丞先是永徽顯慶時御史不拜宰相御命使四方者廷中揖見後稍屈下至晦獨徇舊體謂御史曰不如故事且奏譴公家由是臺儀復振久去朝儀矩梗野韓思彥上元中復召見思彥久去朝儀矩梗野拜忘蹈舞進止中禮李巖年十餘歲會中宗祀明堂以近臣子弟執籩豆巖進止中禮動必由禮曹華雖出戎伍而動必由禮愛重士大夫不以貴倨人居曰衙行曰駕唐制居曰衙行曰駕皆有衛有嚴羽葆華蓋旌旗罕畢車馬之衆盛矣皆安徐而不譁其人君舉動必以扇出入則撞鍾庭設樂宮道路有鹵簿鼓吹禮官百司必備物而後動蓋所以為謹重也儀衛志儀衛尊君而肅臣衙凡朝會之仗三衛番上分為五仗號衙內五衛一曰供奉仗以左右衛為之二曰親衛仗以親衛為之三曰勳仗以勳衛為之四曰翊仗以翊衛為之皆服鶡冠緋衫夾五曰散手仗以親衛翊衛為之同上制禮三白道有弛張禮從損益誠宜達節安可拘文所以去彼取此不可以古制今禮樂代興文質迭出夏造殷因豈煩改制漢除秦敝亦為便時所務便宜寧拘損益言之不中雖新意而奚為事且有初率舊章而可則夫魯有初采周之舊適道在權救時貴變寧辭改作所務便時禮自外作敬在貌也禮以地制王者治定制禮故事與持並制禮以配地禮由陰作禮者因人之情而為之節文以為人防也叔孫通制禮以定漢朝之儀禮者所以便事也史記聖人因事以制禮故事異而禮易帝王不相襲何禮之拘五帝三王隨時制事法度制令各順其宜衣服器械各便其用聖人之興不相襲而治夏殷之衰也不易禮而滅然則反古未可非而修禮未足多也以書御者不盡馬之情以古制今者不達事之變史記周書曰無作聰明亂舊章章典也罔以側言改厥度度法也國將亡必多制叔向曰仲尼曰夫晉守唐叔之法度以經緯其民宜守彝倫勿從亂制言雖念於芻蕘禮雖從其秕稗簡乃易從煩而則亂稽彼古今考諸損益殷人之因夏禮政是以和稷嗣之制漢儀事則不悖苟用捨之必中雖沿革而同歸禮載從宜之文易有隨時之義將立國幹必節人心三王異代不相襲禮利百變法仍舊貫語立新意何必改作所宜守常自天子出天下有道禮樂征伐云云禮曰變禮易樂為不從不從者君流之流放也謂諸侯無輕議禮相沿禮曰禮樂之情同故明王以相沿也言不改革也過制則亂過作則暴匿禮匿不改政禮禮主其減禮者人所倦故久則減省禮減而進以進為文文美也進自嘉行禮禮減而不進則銷銷盡也去舊禮禮曰以去舊為無所用而去之者必有亂患非天子不議禮不制度不考文禮自謂使人禮瀆禮擇其善者而從之綿蕝叔孫通制禮儀以正君臣之位與弟子百餘人為綿蕝野外所撰禮與律令同録藏於禮官法家者也述舊禮漢王吉為諫議大夫上言願與太臣延及儒生述舊禮明王制驅一世之人躋之仁壽之域慕叔孫通後漢曹褒常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沉吟專思寢則懷抱筆札行則讀習文書餘見下注嫁娶喪祭朝延壽字長公為潁川令嫁娶喪祭儀品令諸生皮辨執俎豆為吏人行禮制禮寫於二尺四寸簡曹褒慕叔孫通次序禮事依舊典雜以五經識記撰次天子至庶人冠吉凶終始制度又作章句和帝遂用新禮冠擢褒為右散騎後張酺張敏等奏褒擅制漢禮破聖術宜加誅帝雖寢其奏而漢禮遂不行孔裁定制度竇威方天下亂禮典湮缺威多識朝廷故事乃裁定制度帝語裴寂曰威今之叔孫通也憲物容典殷盈孫時喪亂後制度雕紊追補容典皆盈孫折衷焉草儀王元感武后時已郊遂享明堂封嵩山詔與韋叔夏等草儀具衆推其練冶從上泰山參定典儀徐堅從上泰山以參定典儀加光祿大夫堅於典故多所參識參綴典儀張薦貞元元年帝親郊時更兵亂禮物殘替用薦為太常博士參綴典儀略如舊章常歎士大夫不能用古禮楊瑒常歎士大夫不能用古禮因其家冠昏喪祭乃據舊典為之節文揖讓威儀哭踊衰殺無有違者後之制禮作樂宜取周書孔策為標準也漢氏受命禮壞勸即位草儀杜鴻漸既至靈武即與冕等勸即皇帝位以系中外望六請見聽鴻漸明習朝章采舊儀設壇壝城南先一日草其儀上之太子曰聖皇在遠寇逆方結宜罷壇場它如奏太子即位是為肅宗明練典故李吉甫貞元初為太常博士年尚少明練典故昭德皇后崩自天寶後中宮虛恤禮廢缺吉甫草具其儀德宗稱善定敬宗廟室祝禮崔元式太和初遷太常博士最明禮家沿革問不虛酬定敬宗廟家祝禮有禮學許孟容有禮學每所折衷咸得其正多識容典歸崇敬治禮家學多識容典有事泰山雜定其儀顏師古帝將有事泰山詔公卿博士雜定其儀而論者爭為異端師古奏臣撰定封禪儀注書在十一年于時諸儒謂為適中通典杜佑先是劉秩托百家侔周六官法為政典三十五篇房琯稱才過劉向佑以為未盡因廣其闕參益新禮為二百篇自號通典奏之優詔嘉美儒者服其書約而詳正觀顯慶二禮唐初即用隋禮至太宗時房玄齡魏徵等因禮增修是為正觀禮高宗又詔長孫無忌杜正倫等增修之是為顯慶禮其文雜以式令而李義府許敬宗方得幸多希旨傅會事既施行議者皆以為非上元中詔復用正觀禮由是終高宗世正觀顯慶二禮兼行明皇開元中詔徐堅李鋭等撰述歷年未就至蕭嵩王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也唐禮志起復冥婚之制劉嶽為太常卿初鄭餘慶常采唐士庶吉凶書疏之式雜以當時家人之禮為書儀兩卷明宗見其有起復冥婚之制歎曰儒者所以隆孝悌而端風俗且無金革之事起復可乎婚吉禮也用於死者可乎乃詔嶽選文學通知古今之士共刪定之嶽與博士段顒田敏增損其書而其事出鄙俚皆當時家人女子傳習所見往往轉失其本然猶時有禮之遺制其後亡夫愈不可究其本末其婚禮親迎有女坐壻鞍合髻之説尤為不經公卿之家頗遵用之至其久也又益訛謬可笑其類甚多歐陽修曰嗚呼甚矣人之好為禮也在上者不以禮示之使人不見其本而傳其習俗之失者尚拳拳而行之五代干戈之亂不暇於禮久矣明宗武君出於夷狄而不通文字乃能有意使民知禮而嶽等皆當時儒者卒無所發明但因其書增損而已然其後世士庶吉凶皆取嶽書以為法而十又轉失其三四也可勝歎哉無禮四白禮不行則上下昏相鼠詩刺無禮也相鼠有體人而無禮遠禮多行無禮禍必自及鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎禮無禮則危君子曰禮也者不可斯須去身必多曠於禮矣孔不讓席坐崔澄帝在藩與同里居澄侍左右與諸王不讓席坐見天子不舞韓思彥中書令李敬玄劾奏思彥見天子不舞蹈負氣怏怏不可用小兒無禮崔皓初李雍聞其名虛舍邀之皓至獻詩其首章曰十五嫁王昌雍叱小兒無禮不與接而去慢於奉上于頔待下益急而慢於奉上棄蔑典禮溫造道遇左補闕李虞恚不避捕從者笞辱左拾遺舒元褒等建言故事供奉官惟宰相外無屈避造棄蔑典禮無所思辱天子侍臣性誕蕩無禮撿喬琳無法度肅宗於靈武擢監察御史時武臣崛起無法度大將管崇嗣背闕坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊李勉傳方飯它客不召嚴綬未顯過于閺鄉尉李達達不禮方飯它客不召綬後達罷彭城令過并州晨入謁不知綬也綬方大宴召達至戒客勿起讓綬曰吾昔羇旅閺鄉君方召客而不顧我今我召客亦不敢留君達慚不得去左右引出懼而瘖臥館數月其佐令狐楚為請乃免新史白過數過禮之數也雖多奚以為過猶不及哀樂昔以禮終先王制禮過之者俯而就之不至者跂而及之先王制禮患其過於制也孔子曰易而生亂過則有盈過制則亂過作則暴禮煩則亂孔太重裴均入為尚書右僕射上曰唱受按送印皆尚書郎為之文武四品五品郎官御史拜廷下御史中丞左右丞升階答拜時以為禮太重具戎容太過柳公綽使山南時牛僧孺罷相鎮江夏公綽具戎容於郵舍候之軍吏以漢上地高於鄂禮太過公綽曰奇章才離台席方鎮重宰相是尊朝廷也竟以戎容見之舊史白林放問禮之本子曰大哉問禮與其奢也寧儉哀公問禮於孔子曰大禮何如君子之言禮也何其尊也孔子曰丘也小人不足以知禮問揖讓左傳會于黃父趙簡子問子太叔揖讓周旋之禮焉子太叔曰是儀也非禮也問會見之儀後漢竇融字周公會高平弟一先遣從事問會見之儀適適注也是時軍旅代諸將與三公交錯道中或背使者交私語帝聞融問禮儀甚喜子入太廟每事問或曰孰謂鄒人之子知禮乎子聞之曰是禮也好問則裕疑思問不恥下問孔仲春告瑞儒學傳賈大隱儀鳳馮中為太常博士會太常仲春告瑞太廟高宗問禮官何世而然大隱對曰古者祭以首時薦以仲月近世元日奏瑞則二月告廟告得必有薦本于始不得其時焉攢辨如星連襟成帷歐陽詹張博士講禮記沒階雲來即席鱗差攢辨如星連襟成帷公先申禮之本次陳禮之要注乎學者之耳鎔乎作者之意注乎學者之耳同上博學禮樂之事人多咨之見禮門問酬崔元式明禮問不虛酬談糟粕棄醇醪王績刺史請講禮答曰不能揖遜邦君門談糟粕棄醇醪也有所資質酬復淵詣王方慶尤精三禮學者有所資質酬復淵詣故門人次為雜禮答問白移風易俗莫善於樂安上治民莫善於禮不易其俗禮曰修其教不易其俗齊其政不易其宜也使從俗禮從宜變俗君子行禮不求變俗入國而問俗化民成俗其必由學乎君子之德風小人之德草草上之風必偃便俗制宜雖政不易宜章甫難施於越俗而化之可漸紫服尚變其齊風異宜殊俗誘人孔易導之以禮自謂便人俗猶禮變人以化遷立訓齊俗作法導人將欲救時寧辭變俗抑淫革弊政有弛張法存沿革孔變風俗邢文偉為內史后曰移風易俗莫善於樂伯牙鼓琴鍾期聽之知音在山水是人能移風易俗矣何取樂邪文偉曰聖人作樂平人心變風俗末世樂壞則為人所移不必提耳而口授泉州席使君宴序樂遍作而性情不流爵無算而儀形有肅於戲行其教不必提耳而口授移其風不必門扇而戶吹公斯宴則風移教行其間矣歐陽詹燕昭好馬則駿馬來庭葉公好龍則真龍入室薛登請選舉擇才疏冀缺以禮遜升朝則晉人知禮文翁以儒林獎俗則蜀士多儒燕昭好馬則駿馬來庭葉公好龍則真龍入室蓋未有上之所好而下不從其化者也浹辰之間可使丕變文粹化強梗為欣合易怨謗為謳歌浹辰之間可使丕變人心自化楊綰久積公輔之望及拜相詔出朝野相賀綰質性貞廉重服儉朴居廟堂未數日人心自化御史中丞崔寬劍南西川節度使寧之弟也家富於財寬即日毀折池館臺榭郭子儀在邠州行營聞綰拜相座內音樂減散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損車騎其餘望風變奢從儉者不可勝數其鎮俗移風若此舊史冠禮八白二十曰弱冠謂之成人適子冠於阼階以著代也醮於客位加有成也有成人之道也三加彌尊喻其志也始加緇布冠次加皮辨次加爵辨冠益尊則益大冠而字之敬其名也禮義之始在於冠也故冠而後服備服而後容體正顏色齊辭令順故曰冠者禮之始也是故古之聖王重冠古者冠禮筮日筮賓所以敬冠事所以重禮也已冠而字之成人之道也見於母母拜之見於兄弟兄弟拜之成人而與為禮也成人者將責成人禮焉故曰冠者嘉禮之重者也重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖謂冠於廟也儀禮曰冠者禮賓一獻之禮主人酬賓束帛筮於廟門以重成人之道不於堂嫌蓍於神廟未幾見兮突而辨兮詩國君十五而冠冠而生子禮也傳季武子曰君冠必以裸享之禮行之以金石之樂節之先君之祧處之魯襄公自晉還及衛冠於成公之廟假鍾磬焉禮也傳冠具晉悼公謂季武子曰君可以冠矣大夫盍為冠具辨旄童子始冠成禮則辨之緇布禮始冠緇布冠孔子長居宋冠章甫之冠宋其祖也揆以吉日登于弱年棄爾幼志儀禮總角丱兮服以旌禮冠以草身備適子之儀責成人之禮醮於客位筮於廟門將行嘉事必慎令儀儀禮筮人執策抽上韥韥盛策器東面旅占卒進告吉旅還也還與其屬共占之不吉則筮遠日如初前期三日筮賓如求日之儀云云冠者立於西階東南面賓客之請醴醴當為禮冠者見兄弟兄弟再拜冠者答入見姑姊如見母乃易服服玄端冠玄冠爵縪也奠贄見于君遂以贄見鄉大夫鄉先生鄉中老人為大夫而致仕者乃醴賓以一獻之禮主人酬賓束帛庶子則冠於房外遂醮焉房外謂尊東不於阼非代父也不醮於客位成而不尊祝醴醮字皆有辭祝曰令月吉日始加元服棄爾幼志順爾成德云云醮惟厚嘉薦令芳醴辭曰旨酒既清嘉薦亶時再醮三醮字辭曰云云記曰公侯之有冠禮夏之末造也當冠有喪曾子問曰當冠者至而有齊衰大功之喪如之何孔子曰內喪則廢外喪則冠而不醴徹饌而歸即位而哭如冠者未至則廢注內喪同門也廢者因喪而冠未及期而有齊衰大功之喪則因喪服而冠除喪不改冠乎父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而后饗冠者饗謂醴也大功之未可以冠子嫁子小功之未可以冠子取妻小功卒哭可以冠子要妻下殤之小功則不可以大功齊衰之親故也國語趙文子冠見欒武子武子曰美哉成人在始戒之也崇其著代責以成人采衣朱紃盛將冠之容束帛儷皮厚酬賓之禮終一獻之儀以病吾子備三加之禮將責成人雖啐醴之始是能淑慎于儀而序賓之時不聞昭告爾字可以冠矣則重於承宗將有事焉必先乎大禮處阼階而展敬式備三加筮廟門以成儀終陳一甒兄弟畢袗之忍反同也與三人同服玄端朝服三人即冠者父兄也晉冠諸王晉書曰漢魏遣使冠諸王非古典於是制王十五而冠不復加使命孔太子冠邢文偉歷太子典膳丞時孝敬罕見宮臣文偉即減膳上書曰古者太子既冠則有司過之史虧膳之宰史不書過死之宰不徹膳死之有司豫奏司徒一人為賓卿一人為贊冠皇帝服通天冠絳紗袍乘輿出自西房即御座侍中及舍人前承制侍中降至賓前稱有制公再拜侍中曰將加冠於某之首公其將事公少進北面再拜稽首辭曰臣不敏恐不能供事敢辭侍中升奏又承制降稱制旨公其將事無辭內直郎陳服於帷內東領北上袞冕金飾象笏遠遊冠緇布冠服玄衣素裳素韠白紗中單青領褾籛裾履襪革帶大帶笏緇纚犀簪二物同箱在服南櫛實於箱又在南莞筵四藻席四又在南良醞令實側尊甒醴於序外帷內設壘洗於尊東實巾一角觶柶各一太官今實饌豆九籩九於尊西俎三在豆北袞冕遠遊三梁冠黑介幘緇布冠青組纓屬於冠冠冕各一箱皇太子乃出迎賓宗正卿時拜賓不答拜賓入主人從入立於縣東北西面皇太子詣受制位北面又立節脫節衣賓稱有制皇太子再拜宣詔曰有制皇太子某吉日元服率由舊章命太尉某就官展禮皇太子再拜少傅進詣賓前受制書以授皇太子付于庶子贊冠者引皇太子出立於席東西面賓贊冠者取纚櫛二箱坐奠於筵贊者脫幘置於箱櫛畢設纚興冠緇布冠祝曰令月吉日始加既服棄厥幼志謹其成德壽考惟祺以介景福乃跪冠興贊冠者引適東序帷內服玄衣素裳之服以出立於席東西面皇太子就筵西南面立執緇布冠者升賓降一等受之左執項右執前北面跪冠興復西階主人立於席後西面賓詣酒尊所酌酒進皇子筵前北面立祝曰旨酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之贊冠者跪脫緇布冠置於箱賓降二等受遠遊冠冠之賓揖皇子皇子進立於席後南面賓詣尊所取爵酌酒進皇子筵前北自立祝曰旨酒既湑嘉薦伊脯乃申其服禮儀有序祭此嘉爵承天之祐贊冠者跪脫進賢冠賓揖皇子適房服袞冕以出諸臣之嫡子三加皆祝而冠又祝而酌又祝而字庶子三加既加然後酌而祝之又祝而字其始冠皆緇布再加皆進賢其三加一品之子以袞冕二品之子以鷩冕三品之子以毳冕四品之子以絺冕五品之子以玄冕六品至于九品之子以爵辨其服從之其即席而冠也嫡子西面庶子南面其筮日筮賓贊遂戒之及其所以冠之禮皆如親王儺九白月令季春命國儺九門磔攘以畢春氣犬屬金也磔之所以抑金扶木畢成春氣仲秋天子乃儺以達秋氣此儺恐陽暑至此不衰而害於人故儺之以通秋氣季冬命有司大儺旁磔以送寒氣大儺謂歲終遂除陰疫以送寒氣旁謂十二門也磔犬扶陽抑陰之義也春木也殺余以助木氣周官命方相氏率百隸索室驅疫以逐之大儺也周禮方相氏玄衣朱裳執戈揚盾小兒從後以逐疫鬼執桃弧棘矢也卒歲大儺驅除群癘方相秉鉞巫覡操茢文選大儺逐疫令侲子以赤幘皂衣漢書禮儀志儺也逐赤疫於四裔京邑密清率隸驅疫磔犬送寒鄉人儺孔子朝服而立於阼階存室神也銷沴納祥周禮季冬始儺驅疫疫癘也方相氏率百隸而時儺以索室驅疫時儺四時儺也索搜也孔磔雄雞于宮門城門百官志太上署令一人丞二人卜正博士各二人季冬帥侲子堂贈大儺天子六隊太子二隊方相氏右執戈左執楯而導之唱十二神名以逐惡鬼儺者磔雄雞于宮門城門逐惡鬼于禁中禮志大儺之禮選人年十二以上十六以下為侲子假面赤布褲褶二十四人為一隊六人為列執事十二人赤幘赤衣麻鞭工人二十二人其一人方相氏假面黃金四目蒙熊皮黑衣朱裳右執楯其人為唱帥假面皮衣執棒鼓角各十合為一隊隊別鼓吹令一人大十令一人各監所部巫師二人以逐惡鬼于禁中鼓譟而進前一日之夕儺者赴集所具其器服以待事其日未明諸衛依時劾勒所部屯門列仗近仗入陳於階鼓吹令帥儺者各集於宮門外內侍詣皇帝所御殿前奏侲子備請逐疫出命寺伯六人分引儺者於長樂門永安門以入至左右上閣鼓譟而進方相氏執戈揚楯唱侲子和曰云云上燃蠟炬燎沉檀如晝歲除日太常卿領官屬吏並護僮侲僮子千人晚入宮至夜於寢殿前儺燃蠟炬燎沉檀如晝上與親王妃主已下觀之其夕賞賜甚多是夜衣冠子弟多覓侲子衣竊入宮中南部新書樂正大儺則帥鼓角以助侲子之唱唐六典享十白享以成禮是敦恭儉賓由賢序必慎威儀夏啓有鉤臺之享所以示諸侯禮也享禮有容色恭敬也享俯有璋璋以為信俯見也設几而不倚爵盈而不飲肴乾而不食言務行禮享以訓恭儉恭儉以行禮謂不飲不食也周定王享晉士會殽蒸蒸升也升殽於俎也武子私問其故享當薦體而殽蒸故怪而問之武子王會也王曰季氏而不聞乎王享有體薦享其半解其體而薦之宴有折俎公當享公諸侯也卿當宴士會卿也王室之禮也晉卻至如楚楚子享之貺之以大禮重之以備樂宋人享趙文子司馬置折俎禮也今卿當宴之禮故曰禮也宋人兼享晉楚之大夫趙孟為客客一坐所尊楚子入享于鄭為鄭所享九獻用上公之禮九獻而禮畢庭實旅百庭中所陳品數百也加籩豆六品周公閲曰國君文足昭也武可畏也則有備物之享以象其德享有昌歜蒲葅也白黑白熬稻黑熬黍形鹽刻鹽為虎形皆備物之享也禮無違者籩豆有踐容止有觀肴乾示禮將省以威儀禮薦訓恭不專於醉飽仲尼曰夫享所以昭德也行出門之恭拜迎而入展至階之敬揖讓而升食饗之禮非致味也言務行禮周禮掌客王合諸侯而饗則具十二牢具百物諸侯為賓大饗尚暇修而已矣不享味也虢公晉侯朝王王享醴命之宥以幣物助歡也管仲辭上卿之享卒受下卿之禮而還賓榮主禮秕稗言享禮不具是用秕稗也賓至百拜一獻之禮孔大饗含元殿盧鈞守太子太師帝元日大饗含元殿鈞年八十升降如儀音吐鴻暢舉朝咨歎大饗雜進倡舞劉瑑進宣武節度使先時大饗雜進倡舞瑑取壯士千人被鎧擁矛盾習擊刺與吏士臨觀感時致饗韋彤議曰聖人等牲牢布籩豆昆蟲草木可薦者莫不咸在所以饗宗廟交神明全孝敬也潔膳羞八珍百品可嗜之饌美膬甘旨謂之褻味所以燕賓客接人情示慈惠也是則薦與宴聖人判為二物不可亂也今若熟饗而饗非所以異為敬之意且祭不欲數亦不欲疏感時致饗以制中也一陪宴享閣下為世之偉人巨德小生一陪宴享則亦榮矣杜牧之投知已書春秋時饗每常春秋時饗孑立捧奠顧盼無後繼者柳宗元答許京兆宴十一白周禮合宴以賢序賓賓由主擇宴以禮也宴有好貨飧有陪鼎贈貨如鼎以終歡也入有郊勞迎於郊也出有贈賄送以貨也禮之至也宴以示慈惠慈惠以布政謂折俎而食也定王享士會蒸見享門注武子私問其故見享門注王宴有折俎體解節折升之於俎物皆可食所以示慈惠卿當宴天子享卿當用宴禮王室之禮也晉侯以魏絳為能以刑佐民反役與之禮食使佐新軍群臣旅會今欲異絳故特為設具禮食也自郊勞至于贈賄禮成而加之以敏齊國莊子來聘鹿鳴宴群臣嘉賓也詩陳饋八簋天子八簋禮食示慈不惠於醉飽蒸式宴將省以威儀樂且有儀初筵終宴君子維宴夫享所以昭德見享門注食饗之禮見享門嘉好之事陳既臧之酌成禮之酒列有楚之籩終宴不知疲文選管子曰桓公與管仲飲酒行飲酒禮以尊顯之掘新井而柴焉柴以蓋新井示其潔敬十日齋戒召仲至分執爵夫人執尊觴三行管仲趨出備施氏之禮加晉侯之籩晉侯享委武子加籩資飲食以合歡用歌舞而飾喜宴私儀禮若與四方賓宴賓為苟敬苟且小敬與卿宴則大夫為賓式宴宴有好貨品有加籩靜其中幕主人酬賓束帛儷皮記曰宴毛序齒則異姓為賓同姓無相賓之道君與族人宴則膳宰為主人君不親酌臣侍君宴過三爵非禮也雖無好友式宴且喜孔子曰敬則用祭器祭器簋鉶之屬有好事於賓客則用之謂饗食也賓主百拜一獻之禮合樽促席宴笑語兮所謂伊人於焉嘉客棠棣宴兄弟也伐木宴朋友故舊也酒所以合歡食饗所以仁賓客促坐褰重帷傳滿騰羽觴文選宴詩終食之間好賄傳曰虢公晉侯朝王王饗醴命之宥先行享禮次行宴飲也宥助也宴則命幣物所以助歡敬意晉侯獻楚俘于王王享醴命晉侯宥命以幣帛助晉侯歡也介葛盧來朝禮之加宴好宴宴禮也好好貨也宴有好貨宴飲以貨為好晉侯享季武子以為知禮重其好貨加貺得貺為歡助歡是厚主禮以崇賓榮鹿鳴燕群臣嘉賓也既飲食之又其心矣小雅命承筐之貺幣帛之式周禮太宰以九式均節財用六曰幣帛之式謂用財之節度也幣帛所贈勞賓客也好用之式九曰好用之式謂燕好所賜用之物也加籩傳曰鄭伯享楚子加籩豆六品食器六品加於籩豆也籩豆禮食之器餐有陪鼎陪加也熟食曰餐加於鼎所以厚殷勤也季孫宿如晉晉侯享之有加籩籩豆之數多於常禮武子曰得貺不過三獻大夫之禮今豆有加下臣不堪無乃戾也固請徹加然後卒事晉人以為知禮命示慈之宴加有踐之籩以為賓榮用備主禮失儀周公閲來聘享有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之享以象其德吾何以堪之衛寧子來聘公與之宴賦湛露及彤弓不辭又不答賦使行人私焉對曰臣以為隸業及之此天子宴諸侯之禮也其敢干大禮以取戾乎衛侯享苦成叔成叔傲寧惠子曰古之為享也以觀威儀省禍福今成叔傲其亡乎苦成叔郤犨齊侯將享魯侯孔子曰犧象不出門嘉樂不野合君苟無禮雖美不食相鼠之刺賓宜敬於升階禮且同於委巷宴以禮成賓由主擇是崇嘉事合慎令儀楚子享郤至為地室而懸焉郤子將登金奏作於下驚而走出非常所聞故驚也宋華定來聘公享之為賦蓼蕭不知又不答賦昭于曰必亡宴語之不懷寵光之不宣衛孫林父來聘公登亦登與公敵禮孟獻子曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過孫子無辭亦無悛容穆子曰孫子必亡為臣而君過而不悛亡之本也公如楚孟僖子相不能相儀及楚不能答郊勞歌薤露後漢梁商三月上已會親懿歌極歡酒闌罷唱繼以歌薤之露座中皆掩淚周舉宣光以病不預聞之曰哀樂失節云云秋果商薨歌驪駒漢王式字翁卿徵為博士既至諸博士持酒肉勞式博士江翁心嫉式請歌吹諸生曰歌驪駒客欲去也式曰聞於師客歌之主人歌客無庸歸今日諸君為主人日尚早未可也江翁曰經何以言之王式對之曰出曲禮江翁曰何拘曲禮式恥見辱佯醉後免飫儐爾籩豆飲酒之飫飫私也不脫履上堂謂之飫固非常之事若議大疑於堂則有飫禮飫賜傳曰將賞為之加膳加膳則飫賜也國語曰夫王公諸侯之有飫將以講事成章建大德昭大物故立成禮蒸而已立成不坐飫以顯物示物備也宴以合好歲飫不倦時燕不淫又曰萇弘其不沒乎周詩曰天之所壞不可支也昔武王克殷作詩以為飫孔詔三貴妃齎玉食寶器宴其家裴寂麟州刺史韋雲起告寂反按訊無狀帝謂曰朕有天下卿推轂成之也容有二哉所以訊吏欲天下人信公不反耳昭三貴妃齎玉食寶器宴其家經宿去弗豫饗宴王方慶嘗以令期及大功喪未葬弗豫饗宴未嘗居賓位盧汝弼李克用表為節度副使太原府子亭簡求所署多在每亭中未嘗居賓位西向俯首人美其有禮敖宴私第封敖為太常卿始視事許設九部樂敖宴私第為御史所劾宴集賢院張説後宴集賢院故事官重者先飲説曰吾聞儒以道相高不以官閥為先後盡歡蕭穎士賊圍雍丘脅泗上軍李承式遣兵往救大宴賓客陳女樂穎士曰天子暴露豈臣下盡歡時邪夫投兵不測乃使觀聽華麗一日思歸誰致其死哉弗納夜宴娛李適之遷刑部尚書夜宴娛晝決事案無留辭宴曲江李栖筠故事賜百官宴曲江教坊倡優雜侍栖筠以任國風憲獨不往臺遂以為法野庖薦嘉魚激澗泛羽觴盛時易徂謝浩思坐飄揚韋應物西郊燕庭中九劍闌堂上歌吹新軍中燕深卮羽觴李後主傾碗更為壽深卮遞酬賓又羽觴無籌酌雕盤綺食會衆客吳歌趙舞香風吹李白扶風豪士歌堂上二千珠履賓甕中百斛金陵春上宴酌韋應物纍宵同燕酌十舍攜征騎喚取佳人舞繡筵杜甫詩魚朝恩修具郭子儀傳魚朝恩嘗約子儀修具元載告以軍容將不利公其下哀甲願從子儀不聽但以家僮十數往朝恩曰何車騎之寡告以所聞朝恩曰非公長者得無致疑乎宦人趨走宴賜渾瑊帝狩奉天瑊率家人子弟以從朱泚方據乾陵下瞰城翠翟紅袍左右宦人趨走宴賜拜舞賜宴月池張後胤太宗賜宴月池宴賓客列倡優如大府羅立言公以賓宴其鼓駭駭公宴溪堂賓校醉飽韓文溪堂詩開筵交履舄爛熳倒家釀杯行無留停高柱送清唱中盤進橙栗投擲傾脯醬韓愈別竇司直屬猒及於輿臺孫逖伯樂川記咠樂周于卒乘屬猒及於輿臺以昭饗宴同上地主致餼以昭饗宴方飯他客不召嚴綬事見無禮門小洞庭宴籍東平太守蘇源明天寶中濮陽魯郡等太守會燕于回源亭自回源起廣洎左拂蠶尾右繞吳山酣宴而歌因命泊小洞庭庭遂作小洞庭五太守宴籍置酒張燈促華饌劉皓宅宿宴醉歌杜甫一宴費十萬代宗朝魚朝恩出神功郭子儀等以寇難漸平各致酒於私第一宴費十萬雞跖集宴朝堂居下坐宋璟有大節嘗宴朝堂二張列卿三品璟階六品居下坐易之諂事璟虛位揖曰公第一人何下坐璟曰才劣品卑卿謂第一何邪是時朝廷以易之等內寵不名其官呼易之五郎昌宗六郎鄭善果謂璟曰公奈何謂五郎為卿璟曰以官正當為卿君非其家奴何郎之云四方朝玉帛干品會裾簪張説食祭十二白周禮春官太祝辨九祭一命祭若禮云君命客祭而祭之是也二衍祭主人延賓祭三炮祭炮讀為包若兼祭于豆四周祭謂之序遍祭之五振祭六擩祭振擩亦本同不食者擩則祭之將食者既擩必振乃祭也擩而泉反七絶祭八繚祭九共祭絶繚亦本同禮多者繚之略者絶之則祭也其猶授拜王祭食宰夫授祭者也記曰主人延客祭祭先君子有食不忘本也客不降等則先祭祭食祭所進之序遍祭之若賜之食君命之祭然從祭之唯水漿不祭為已偞卑卑已太也裸厭之也瓜祭上環魚祭膴膴大臠謂刳魚腹也孔子曰少施氏食我以禮而飽吾祭作而辭曰蔬食不足祭也餕餘不祭父不祭子夫不祭妻傳曰叔孫穆子食慶封慶封泛祭謂遠散不恭也恩必逮下子道或霑於食餘禮必有先神理詎歆於餕祭既比慶封之泛難許叔氏之禮孔肥濃楊仲昌宗廟加籩豆議明君人者有國奉先敬神嚴享豈肥濃以為上將儉約以表誠褻味又曰薦肥濃則褻味有登薦新於諸陵其物五十有六品始將進御所司必先以送太常與尚食滋味薦之如宗廟禮志鉶俎籩豆簠簋尊罍之實皆周時饌也其用通燕享賓客而周公與毛血元酒同薦於先祖晉盧諶家祭禮所薦皆晉時常食不純用古此聖賢變文而通其情也然當時飲食不可闕於祭明矣國家清廟時禮饌具設周制也古物存焉園寢上食時膳備列漢法也它珍極焉職貢來祭致遠物也有新必薦順時令也苑園躬稼所以收搜狩親中莫不薦而後食盡誠敬也崔沔諸珍羞鮮物第敕有司悉使著於今因宜而薦不必加豆籩豆以為嗛也同上鄉飲酒十三白飲以序賓獻酬無失鄉唯尚齒長幼有倫既崇嘉事必慎令儀鄉飲酒之義主人拜迎賓於庠門之外入三揖而后升所以致尊讓也與水揚觶所以致潔也拜至拜洗拜受拜送所以致敬也尊讓潔敬者君子所以相接也賓主象天地介僎象陰陽也三賓像三光也讓之三日象月之三日而成魄也四面之坐象四時也鄉飲酒之禮六十者坐五十者立侍所以明尊也六十者三豆八十者五豆九十者六豆所以養老也人知尊長養老而後乃能出入孝悌而後教成教成然後國可安也孔子曰吾觀於鄉而知王道之易易也鄉鄉飲酒也易易教化之本也鄉飲酒之禮所以明長幼之序也立賓以象天立主以象地主人拜賓貴賤之義別矣獻酬辭讓之節繁繁盛也坐祭立飲不酢而降隆殺之義辨矣貴賤明隆殺辨和樂而不流悌長而無遺安宴而不亂此五者足以正身安國矣修之於鄉其德乃長老子鄉人飲酒杖者出斯出矣始出門以見賓再拜而進及至階而展禮三讓以升以陽禮教讓則人不爭陽禮鄉射飲酒之禮周禮鄉飲酒之禮廢則長幼之序失而爭鬥之獄繁矣禮曰凡飲養陽氣也儀禮鄉飲酒禮主人就先生而謀賓介主人戒賓賓拜辱主人速賓速召也明日賓服鄉服拜賜拜賜謝恩惠鄉服胙曰與鄉大夫飲之朝服也記曰其牲狗狗取擇人烹于堂東北祖陽氣所始也俎由西階升烹狗載之俎也天地嚴凝之氣始於西南而盛於西北天地之尊嚴義氣也天地溫厚之氣始於東北而盛於東南此天地之盛德仁氣也主人尊賓故坐賓於西北而坐介於西南以輔賓賓者接人以義故坐西北二賓未成主人之德主人者接人以仁以德厚者也故坐於東南而坐僎於東北以輔主人也以其仕在官也非專飲食先禮後財則民作敬讓而民不爭鄉飲酒之禮朝不廢朝既朝乃飲暮不廢夕既夕而罷十月滌場朋酒斯饗詩奏行鄉飲酒禮後漢伏湛造次必修文德云云爵以上尊式遵用酒饗斯用酒是法豳詩將休老以勞農則合歡序齒三命不齒不齒在父母之列五十六十分坐立之儀東北西南辨介僎之位禮曰主人速賓及介而衆賓自從之至于門外拜賓及介而衆賓自入貴賤之義別矣三揖至階三讓以賓升拜至獻酬辭讓之節繁及介省矣至于衆賓升受爵坐祭立飲不酢而隆殺之義辨矣孔季冬行鄉飲酒禮百官志縣令每歲季冬行鄉飲酒禮登歌降飲李栖筠為常州刺史為鄉飲酒禮登歌降飲人人知勸請州縣貢士作鄉飲酒禮五代李愚守左僕射是時兵革方興天下多事而愚為相請州縣貢士作鄉飲酒禮時以其迂闊不用鄉飲酒之禮皆刺史為主人先召鄉致仕有德者謀之賢者為賓其次為介又其次為衆賓與之行禮而賓興之唐禮樂志鄉飲酒主人曰吾子學優行高應茲觀國某日展禮請吾子臨之賓曰某固陋恐辱命敢辭主人曰某謀於父師莫若吾子賢敢固以請賓曰夫子申命之某敢不敬須質明設賓席於楹間近北南向主人席於阼階上西向介席於西階上東向衆賓席三於賓席之西南向衆賓席於西階西南東面北上設兩壺於賓席之東少北玄酒在西加勺冪置篚於壺南東肆實以爵觶設贊者位於東階贊者薦脯醢於賓前設折俎賓跪取脯擩於醢又薦脯醢設折俎於主人主人與賓一揖一讓升賓介衆賓序升工四人先以瑟後二歌工持瑟升自階就位坐工鼓鹿鳴卒歌笙入立於堂下北面奏南陔乃間歌歌南有嘉魚笙崇丘乃合樂周南關睢召南鵲巢季冬之月正齒位則縣令為主人鄉之老人年六十以上有德望者一人為賓次一人為介又其次為三賓又其次為衆賓年六十者三豆七十者四豆八十者五豆九十者及主人皆六豆賓主燕飲則司正北面請賓坐賓主各就席立司正適篚跪取觶興賓之進立于楹間北面乃楊觶而戒之以忠孝之本賓主以下皆再拜正觀六年詔天下行鄉飲酒太宗本紀六年之詔詔曰比年豐稔闕里無事乃有墯業之人不顧家産朋遊無度酣宴是耽敗危身德咸由於此自非澄源正本何以革茲敝俗可先録鄉飲酒禮一卷頒示天下每年令州縣長官親率長幼依禮行之庶乎時議廉恥人知敬讓通典鄉飲酒開元十八年宣州刺史斐耀卿上疏曰州牧縣宰所主者宣揚禮樂典策經籍所教者返古還淳上奉君親下安鄉族外州遠郡俗習未知徒聞禮樂之名不知禮樂之實切見以鄉飲酒禮頒行於天下比來唯貢舉之日略用其儀閭里之間未通其事臣在州之日率當州所管一一與父老百姓勸遵行禮奏樂歌至白華華黍南陔出庚等章言孝子養親及物遂性之義或有泣者則人心有感不可盡誣但以州縣久絶雅聲不識古樂伏計太常具有樂器久備和聲請令天下三五十太州簡有性識人於太常調習雅聲仍付笙竽琴瑟之類各三兩事令比州轉次造習每年各備禮儀準令式行稍加勸獎以示風俗同上
