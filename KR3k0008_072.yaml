body:
  text: 卷第七十二白天官吏部為天官尚書冢宰亦曰太宰侍郎小宰會府掌邦治周禮乃立天官而掌邦治以佐王均邦國太宰之職掌建邦之六典以佐王治邦國主司理典周禮太宰掌理典也銓管晉起居注云太康四年制曰選曹銓管人才宜以忠恪尚書朱整以道素自居衡鏡亦曰藻鏡銓衡官人之法魏略陳群字長文延康元年群始建九品官人之法拜吏部尚書考課之典魏志韓暨為吏部立考課之典法也毛玠之公魏志山濤之識並為吏部尚書贊曰山吏部官人稱允著針李重為吏部尚書著針選曹置之左右刊令晉諸公贊李胤為吏部尚書稱正身率職刊定選例而著于令擢舊何晏字平叔遷侍中主選宿與之舊者多擢用不退虛名晉起居注王戎領吏部未嘗進寒素退虛名田園遍於天下得才吳書李肅知選世號得才舉魏盧育遷吏部尚書乃舉孫雍自代之讓薛綜為選曹尚書因讓顧談曰才昭人物德服衆望臣不如也遂代綜清通簡要鍾會曰裴楷清通王戎簡要後十二年二賢當為吏部冀天下無滯才也後並為吏部尚書就家晉玩李遙集轉吏部尚書稱疾不拜詔惜其大才就家用之品藻九流四科取士持衡掄材采葑采菲刈楚知人取士統百官書冢宰掌邦理統百官均四海注天官卿也統理百官兼領書召公奭為太保兼領冢宰之職射策之初既無失於正鵠掄材之際必有適於輪轅魏擇公方任先毛玠晉推簡要選在王戎當垂拱之朝實資共理奉持衡之職必在至公密啓山濤為吏部尚書用人皆先密啓然後公舉儉鄧攸遷吏部尚書飲馬於家妻悉素餐不受一飯於人舉用魏諸葛誕為吏部郎中有所屬輟承其言而用後有當不則疏議得失百寮皆慎其所舉賜衣魏氏春秋曰許士宗為吏部郎帝見其衣敗曰清哉賜之衣也賜錢榖晉山濤為吏部郎清貧文帝賜金錢二百萬絲百斤榖百斛用捨王蘊為吏部郎曰欲使時無屈滯先任草菜杜錫為吏部郎不敢用鄉親一人黜晉陸抗為吏部郎以務私被黜嗜酒畢卓為吏部郎嗜酒比舍郎酒熟卓醉夜往飲臥於甕間酒吏繫之明日視乃畢吏部舉山公舉阮咸為吏部郎曰清直寡欲萬金不移矣吏部一孔吏部尚書一人正三品侍郎二人正四品上郎中二人正五品上員外郎二人從六品上掌文選勳封考課之政以三銓之法官天下之材以身言書判德行才用勞效較考其優劣而定其留放為之注擬五品以上以名上而聽制授六品以下量資而任之其屬有四一曰吏部二曰司封三曰司勳四曰考工劉祥道字同壽魏州觀城人父林甫武德時為內史舍人典機密以才稱與蕭瑀等撰定律令著律議萬餘言歷中書吏部二侍郎賜爵樂平縣男唐沿隋制十二月選集至春停日久事叢有司不及研諦林甫建請四時聽選隨到輒擬於是官無滯人始天下初定州府及詔使以赤牒授官至是罷悉集吏部調至萬員林甫隨才銓録咸以為宜論者方隋高孝基祥道少襲爵歷御史中丞顯慶中遷吏部黃門侍郎知選事六事上疏陳六事一曰今取士多且濫入流歲千四百多也雜色入流未始銓汰濫也故共務者善人少惡人多臣謂應雜色進者切責有司試判為四等二曰內外官一品至九品萬三千四百六十五員大抵三十而仕六十而退取其中數不三十年存者略盡若歲入流五百人則三十年自相充補況三十年外在官猶多不應其少三曰永徽以來在官者或以善政擢論事者或以單言進而庠序而諸生未聞甄別四曰唐有天下四十年未有舉秀才者請自六品以下至草野審加搜訪無令赫赫之辰斯學遂絶五曰唐虞三載考績黜陟幽明二漢用人亦久其職今任官率四考罷官知秩滿則懷去就民知遷徙則苟且六曰三省都事主事主書比選補皆取流外雖欲參用士流率以儔類為恥設長名榜銓注等法裴行儉遷吏部侍郎與李敬元馬載司典選有能名時號裴馬行儉姶設長名榜銓注等法又定州縣升降資擬高下為故事冬初選集唐皎正觀中官為吏部侍郎先是選集四時補擬不為限皎請以冬初集盡季春止後遂為法傳三十八凡三掌選韋承慶轉天官侍郎凡三掌選銓授平允議者公之傳四十一貴幸憚其嚴韋洪景再遷吏部侍郎銓綜平序貴幸憚其嚴不敢慁以私白衣領職陸元方擢天官侍郎或言其薦引皆親黨后怒免官令白衣領職元方薦人如初平判皆誦於口唐史傳載韋見素遷吏部侍郎平判皆誦於口銓叔平允官有丐求輒下意聽納人多德之請謁不行李乂進吏部侍郎仍知制誥與宋璟等同典選事請謁不行時人語曰李下無徯徑傳四十四當公介然不受私謁崔玄暐為天官侍郎當公介然不受私謁執政忌之改文昌左丞不踰月武后曰卿向改職乃聞諸令史設齋相慶此欲肆其貪耳乃復拜天官侍郎厚賜綵物銓綜號為公平韋陟遷吏部侍郎選人多偽集與正調相冒陟有風采擲辨無不伏者黜正數百員銓綜號為公平傳點頭者更擬蘇晉立戶部侍郎遷吏部時宋璟兼尚書晉與齊浣更典二都選更糊名校判而晉獨事賞拔當時譽之及裴光廷知尚書有過官被卻者就籍以朱點頭而已晉國因榜選院曰門下點頭者更擬光廷以為侮己出晉汝州拔寒遠士多至臺閣席豫入拜吏部侍郎玄宗曰考功職詳事允故有令授豫典選六年拔寒遠士多至臺閣當時推知人號席公云臺選齊浣中書令張説擇丞轄以王丘為左浣為右李元絃杜暹當國袁宋璟為吏部尚書浣及蘇晉為侍郎世謂臺選嘗奏事帝指政事堂曰非卿尚誰居者吏選自中宗後綱紀耗蕩盧從願睿宗立拜吏部侍郎吏選目中宗後綱紀耗蕩從願精力于官偽牒詭功擲撿無所遺銓綜六年以平允聞特官其一子裴馬盧李初高宗時吏部稱職者裴行儉馬載及是從願與李朝隱為有名故號前有裴馬後有盧李與盧從願並授一子官李朝隱開元初遷吏部侍郎銓敘門審與盧從願並授一子宮洪州調補劉滋興元元年以吏部侍郎知南選故命滋至洪州調補以振職聞積寬縱苗晉卿纍遷吏部郎中久之進侍郎性寬縱而吏下因緣作姦品裁清允楊綰歷禮部侍郎俄遷吏部品裁清允人服其公曩與先臣並命尚念之耶趙宗儒罷為太子右庶子屏居謹靜奉朝請而已遷吏部侍郎召見勞曰知卿杜門六年故有此拜曩與先臣並命尚念之耶宗儒俯伏流涕私謁盈几一不省孔緯遷吏部侍郎權要私謁盈几一不省笏擊裴延齡顧少連歷吏部侍郎裴延齡方橫無敢忤者裴嘗與少連會田鎬第酒酣少連捉笏曰段秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直在坐勸解之毀懷不受金韋夏卿為吏部侍郎時從弟執誼在翰林受人金有所干請密以金內夏卿懷中夏卿毀懷不受曰吾與爾賴先人遺德致位及此顧當是哉有台宰望呂元膺拜吏部侍郎正色立朝有台宰望處事裁宜人服其有體時議嘉仰岑羲進吏部侍郎崔湜鄭愔及大理卿理元恭分掌選皆以賄聞獨羲徑廉為時議嘉仰調者丐留張讀為吏部侍郎選牒精允調者丐留二年詔可榜其事曹門以選事委令史許子孺長壽中歷天官侍郎以選事委令史句直日偃臥不下筆時人語曰句直平配既而補授失序傳為口實書判分甲乙丙科苗晉卿進吏部侍郎天寶二載判入等者凡六十四人書判分甲乙丙三科以張奭為第一奭御史中丞倚之子倚新得幸於帝晉卿欲附之奭本無學故議者囂然不平安祿山因間言之帝為御花萼樓覆實中裁十一二奭持紙終日筆不落人謂之曳白帝大怒貶倚及晉卿先收寒素抳吏姦李固言為吏部侍郎既領選按籍自擬先收寒素抳吏姦吏蕭然斂手李至遠遷天官侍郎知選事疾令吏受賄多所絀易吏蕭然斂手有王忠者被放吏繆書其姓為士欲擬訖增成之至遠曰調者三萬無士姓此必王忠吏叩頭服罪尚書六職天官首之辨論官材澄汰流品比諸內史選妙秩清白居易柳公綽吏部侍郎制領選號清平石抱忠為侍御史進檢校天官郎中與侍郎劉奇張詢古共領選寡廉潔而奇號清平史給選者成牒以先後丐賕崔融遷吏部員外郎異時史給選者成牒以先後丐賕從一限出之後遂為法蒞南曹五年韓滉遷吏部員外郎性強直明吏理蒞南曹五年簿最詳緻罷斜封千四百員李朝隱遷侍御史吏部員外郎時政出權幸不關兩省而內受官但斜封其狀付中書即宣所司朝隱執罷千四百員怨誹歡騰朝隱胖然無避屈選人訴索好官苗晉卿纍遷吏部郎中中書舍人知選事選人訴索好官厲言倨色紛于前晉卿與相對於日無慍顏世稱吏事第一裴遵慶擢吏部員外郎判南曹天寶時選者歲萬計遵慶性強敏視簿牒詳而不苛稱吏事第一有條李栖筠三遷吏部員外郎時大盜後選簿亡舛多冒偽栖筠判析有條吏氣奪號神明寒遠無留才崔郾遷吏部員外郎下不敢姦每擬吏親挾格褒黜必當寒遠無留才右闥白居易獨孤郁自考功遷司勳郎中制選自外郎擢居右闥三列宿韋湊祖叔諧正觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武同省時號三列宿黜陟詳當趙宗儒再遷司勳員外郎貞元六年領考功事自至德後考績失實內外悉考中上殿最混淆至宗儒黜陟詳當無所回憚考功多請託王丘開元初遷考功員外郎考功異時多請託進者濫冒歲數百人丘務核實歲登科才滿百議者謂自武后至是數十年采録精明無丘比其後席豫嚴挺之亦有稱焉出丘下挾考功南曹印赴行在裴諝遷考功郎中數燕見奏事代宗幸陝諝徒步挾考功南曹印赴行在帝曰疾風知徑草果可信改考功員外取海內名士取顏真卿李華蕭穎士趙驊等皆海內名士孫逖核取實材馬懷素遷考功核取實材權貴謁請一不能阿撓考簿用墨王徽進考功員外郎故事考簿以朱注上下為殿最歲久易漫吏輒竄為姦徽始用墨遂絶妄欺六官之屬選部郎首之白居易除李建吏部員外郎制六官之屬選部郎首之歷代以來諸曹郎之中擇其踐歷久考第高加以有器局律度者遷焉選部以清有簿書以旌淑慝擇刀筆決否臧否剖疑折滯揮翰如流選部以清翳公是賴席豫楊吏部郎中碑銘序詞人之冠張九齡改司勳員外郎時張説為宰相親重之與通譜系常曰後出詞人之冠也白地官尚書大司徒侍郎小司徒掌土地之圖周禮大司徒之職掌邦國土地之圖與其民人之數以佐王安邦國民部登其衆寡周禮地官之職戶部二孔戶部尚書一人侍郎二人掌天下土地人民錢榖之政貢賦之差百官志戶部郎中員外郎掌戶口土田賦役貢獻蠲免優復婚姻繼嗣之事其後以諸行郎官分判錢榖而戶部度支郎官失其職矣會昌二年著令以本行郎官分判錢榖高宗即位改民部曰戶部龍朔二年改戶部曰司元光宅元年改戶部曰地官同上度支掌天下租稅物産豐約之宜水陸道塗之利歲計所出而支調之龍朔二年改度支曰司度金部掌天下庫藏出納權衡度量之數龍朔二年改金部曰司珍天寶十一載改司金倉部掌天下庫儲出納租稅祿糧倉廩之事龍朔二年改倉部曰司庾天寶十一載以司儲從獵洛陽唐儉為民部尚書從獵洛陽苑群豕突出于林帝射四發輒殪四豕一豕躍及鐙儉投馬搏之帝拔劍斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢高祖以馬上得天下不以馬上治之陛下神武定四方豈復快心於一獸帝為罷獵好鬚李緯為民部尚書帝曰元齡謂何曰惟稱好鬚無他語奉法持正鄭善果兼民部尚書奉法持正風績顯公卿間詔每奏事若侍得升殿而從伏獵侍郎嚴挺之傳戶部侍郎蕭炅林甫所引不知書嘗與挺之言稱蒸嘗伏臘乃為伏獵挺之言九齡省中而有伏獵侍郎乃出炅歧州言利病尤詳楊瑒歷戶部侍郎嘗召宰相大臣議天下戶版延英殿瑒言利病尤詳帝咨賞於是宇文融建言檢脫戶除口陽執不便融方貴公卿啽默唯唯獨瑒抗議故出華州刺史帝才之謂可丞輔李元紘帝欲擢為尚書宰相以資薄乃為戶部侍郎條陳利害及政得失帝才之謂可丞輔戶部無獻李絳遷戶部侍郎判本司帝以戶部故有獻而絳獨無何哉答曰凡方鎮有地則有賦或嗇用度易羡餘以為獻臣乃為陛下謹出納烏有羡羸哉若以為獻是徙東庫物實西庫進官物結私恩帝矍然歲以四萬緡上度支庾敬休為戶部侍郎初劍南西川山南道歲征茶戶部自遣巡院主之募賈人入錢京師崔元略奏責本道主當歲以四萬緡上度支之逗留多不至請置院秭歸收度支錢乃無逋沒又言蜀道米價騰踊百姓流亡請以本道闕官職田賑貧民詔可出入米鹽非所長王彥威為戶部侍郎判度支彥威於儒學固該邃亦善吏事但經總財用出入米鹽非所長也救敝莫若省用杜侃建中初河朔兵拏戰民困賦無所出侃以為救敝莫若省用省用則省官乃上議代貧民租歸融為戶部侍郎湖南觀察使盧周仁以南方屬火取羡錢億萬進京師融劾奏天下一家中外之財皆陛下府庫周仁陳小利假異端公違詔書徇私希恩恐海內效之因緣漁刻生人受弊罪始周仁請重責還所進代貧民租入詔不從裒會嚴亟以辦皇甫鏄改戶部侍郎憲宗方伐蔡急於用度鏄裒會嚴亟以辦帝悅戶部侍郎周之地官小司徒也掌天下田戶之圖生齒之籍賦役貨幣之政以待國用而質歲成善其職者多登大任白居易牛僧孺制授以耗登之書俾陳生聚之術元稹崔稜授戶部侍郎制問歷代戶版盧承慶遷民部侍郎帝問歷代戶版承慶引據該詳克賊破日韋表微進戶部侍郎開志詔叛詔李聽帥師討之次河上天子憂無成功表微曰以聽軍勢不十五日必破賊及捷書上止浹日國之材臣張平叔國之材臣也計能折秋毫吏畏如夏日司會逾月綱條甚張兄師旅米息調食方急倚成取濟非爾而誰白居易張平叔戶部侍郎制世號郎官家初維為郎乃蒔柳于庭及虛心兄弟居郎省對之輒斂容自叔謙後至郎中者數人世號郎官家韋維戶部二妙韋維遷戶部郎中善裁剖時員外宋之問善詩故時稱戶部二妙內舉得人狄光嗣聖歷初為司封丞武后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚內舉得人地官為郎杜牧韋退之制奏課第一裴向纍為櫟陽渭南令奏課皆第一擢戶部員外郎郎官皆為清秩杜牧韓賓制戶部分兩稅出都官故事俊拔唐新語呂大一為戶部員外郎移牒戶部令於牆宇悉樹棘以防令史交通太一報牒曰眷彼吏部銓總之司當須簡要清通何必設籬種棘省中賞其俊拔判入唐故事度支按郎中判入員外郎判出侍郎總領押案而已奏度支財物數千言崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令黃門侍郎杜正倫齎本與仁師對唱一無差殊大宗大奇之舊史理冤張位方少穎秀為兒時父友高郢見奇之曰此子非常必為國器後為金州刺史郡人有田産為中人所奪仲方三疏奏聞竟理其冤入為度支郎中坊州貢杜若正觀中敕下度支求杜若省郎以謝眺詩芳州採杜若乃責坊州貢之當時嗤笑獻糗餌舊史張濬為度支員外郎黃巢將逼關輔濬託疾請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供頓衛軍不得食漢陰令李康獻糗餌數百騾綱軍士始得食僖宗乃召康閣卿為縣令安操心及此對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之委錢榖唐德宗建中初罷劉晏鹽鐵等使天下錢榖委金部貪猥舊史李石用金部員外郎韓益判度支按益坐贓繫臺石奏曰臣以韓益曉錢榖録用之不謂貪猥如是帝謂曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之此大謬也受命恬然舊史畢誠歷駕部員外郎倉部郎中故事勢門子弟鄙倉駕二部居之者不悅惟諴受命恬然恭遜執政多之改職方郎中中立正色孟簡為倉部員外郎王叔文驟為戶部侍郎簡為其屬中立正色挺然不附叔文忌之不敢退黜言於宰相韋執誼換刑部員外郎出給必吝有司之常元稹范季勝倉部制出給必吝有司之常惑上下之價則茫昧者受弊雜苦良之貨則豪力者羸惟一惟公乃罔不同惟平惟石乃罔不吉民不絓網而國用益饒劉禹錫崔公倕碑檢校戶部郎中斡池鹽于蒲修牢盆謹衡石煎和既精飴散乃盈商通而荐至吏懼而循法民不絓網而國用益饒歲杪會其所入羸羡什百詔下褒其能白春官大宗伯亦曰春卿侍郎小宗伯亦曰秩宗禮闈禮闥主司禮典周禮宗伯掌禮典以和邦國以統百官以諧萬人掌邦禮周禮乃立春官而掌邦禮以佐王和邦國建保邦國周禮大宗伯之職掌邦之天神人鬼地祗之禮以佐王建保邦國治神人和上下書宗伯掌邦禮治神人和上下注云春官卿也宗廟神官長主國禮治天神地祇人鬼之事及國之吉凶賓軍嘉之禮以和上下尊卑典三禮夙夜惟寅尚書舜典曰有能典朕三禮僉曰伯夷帝曰汝作秩宗夙夜惟寅直哉惟清注三禮天地人禮彤伯書注成全命彤伯入為宗周當同和之代先務化成居禮樂之司必資明備禮部三孔禮部尚書一人侍郎一人掌禮儀祭饗貢舉之政唐志禮部郎中員外郎掌禮樂學校衣冠符印表疏圖書册命祥瑞鋪設及百官宮人喪葬贈賻之數武德三年改儀曹郎曰禮部郎中龍朔二年改禮部曰司禮光宅元年改禮部曰春官同上祠部掌祠祀饗祭天文漏刻國忌廟諱卜筮醫藥僧尼之事龍朔二年改祠部曰司禋膳部掌陵廟之牲豆酒膳諸司供奉口味龍朔二年改膳部曰司膳主客掌諸王後諸蕃朝見之事武德三年改司藩郎曰主客郎中失德以卻災媚神以丐助韋授進位禮部尚書帝問所以振災邀福者對曰宋景公以善言退法星三舍漢文除祕祝敕有司祭而不祈此二若皆受自至之福書美前史如失德以卻災媚神以丐助神而有知且因以譴也時帝不德故託以諷焉抑浮華先行實韋貫之為禮部侍郎所取士抑浮華先行實于時流競為息古柳復榮令貢士賦呂渭遷禮部侍郎始中書省有古柳建中末枯死德宗自梁遷柳復榮茂人以為瑞柳渭今貢士賦之帝聞不以為善甄幽獨抑浮華高郢為侍郎時四方士務朋比更譽薦以動有司徇名亡實郢疾之乃謝維請設顓行藝司貢部凡三歲甄幽獨抑浮華浮競之俗為衰於鑒裁尤長韋陟遷禮部侍郎陟於鑒裁尤長故事取人以一日試為高下陟許自通所工先就其能試之已乃程考由是無遺材列傳四十七建復孝廉力田等科楊綰為侍郎建復古孝廉力田等科天下高其議人人稱美李揆俄兼禮部侍郎揆病取士不考實徒露搜索禁所挾而適學陋生藉枕圖史且不能自措于辭乃進諸儒納曰上選士第務得才可盡所欲言由是人人稱美使上聞所未聞鮑防進禮部侍郎得穆質等時比歲旱策問陰陽祲袗質對漢故事免三公卜式請烹弘羊指當時輔政者右司郎中獨孤愐欲下質防不許曰使上聞所未聞不亦善乎卒致質高第帝見策嘉揖抵帽于地高是咸通末為禮部侍郎時士多繇權要干請湜不能裁既而抵帽于地曰吾決以至公取之得譴固吾分乃取公乘億許棠聶夷中等頗得才實高錯遷中書舍人開成元年權知貢舉文宗自以題畀有司鍇以籍上帝語侍臣曰比年文章卑弱今所上差勝於前鄭覃曰陛下矯革近制以正頽俗而鍇乃能為陛下得人帝曰宜流宕即以鍇為禮部侍郎閲三歲頗得才實始歲取四十人才益少詔減十人猶不能滿得士多名卿宰相賈餗歷禮部侍郎凡三典貢舉所得士多名卿宰相典册必出其手于邵進侍郎朝廷有大典册必出其手請討李朅王起拜禮部侍郎李朅叛與播俱上疏請詔王智興討之卒定其亂賜金紫典郊祀之禮獻賢能之書今小宗伯實兼二事非直清明正者介足以處之白居易韋貫之授禮部侍郎制斥華取實衛次公知禮部貢舉斥華取實不為權力侵撓甄品詳諦權德輿知禮部貢舉直拜侍郎凡三歲甄品詳諦所得士相繼為公卿宰相為外郎帝嘉其守許孟容拜禮部員外郎公子求補崇文生者孟容固謂不可帝問狀以著令對帝嘉其守祠曹白居易張上階除郎中制悉浮屠隸主客韋博進主客郎中時詔毀佛祠悉浮屠隸主客博言令大暴宜近中宰相李德裕惡之尚書左侍郎自奏議彌綸外凡邦之牲豆之品醴膳之數實糾理之命文昌長佐春官卿白居易膳部郎中制大才當大用韋安石永昌元年遷雍州司兵參軍蘇良嗣當國謂安石曰大才當大用徒勞州縣可乎薦于武后擢膳部員外郎學該典禮拜祠部員外郎李華崔沔集序官有秩清而選妙者其儀曹員外郎之謂乎白居易張元夫禮部員外郎制論回鶻杜牧改膳部員外郎宰相李德裕素奇其材會昌中黠戛斯破回鶻種落潰入漠南説德裕不如遂取之以為兩漢伐虜常以秋冬當胸奴徑弓折膠重馬免乳與之相校故敗多勝少今若以仲夏發幽並突騎及酒泉兵出其意外一舉無類矣德裕善之白夏官尚書大司馬也亦曰夏卿侍郎小司馬五兵晉蔡道明遷五兵尚書疏讓之六師見司馬門兵部四孔尚書一人侍郎二人掌武選地圖車馬甲械之政百官志郎中一人判帳及武官階品衛符衆寡校考給告身之事一人判部及軍容調遣之名數朝集祿賜假告之常同上員外郎一人掌貢舉雜請一人判南曹歲選解狀則核簿書資歷考課同上龍朔二年改兵部曰司戎光宅元年改兵部曰夏官天寶十載曰武部同上職方掌地圖城隍鎮戍烽候防人道路遠近及四夷歸化之事龍朔二年改曰司城駕部掌輿輦車乘傳驛廄牧馬牛雜畜之籍龍朔二年改駕部曰司輿天寶十一載曰司駕庫部掌戎器鹵簿儀仗龍朔元年改庫部曰司庫清以奉國屈突通授兵部尚書蔣國公為秦王行軍元帥長吏從平薛仁杲時賊珍用山積諸將爭得之通獨無所取帝聞曰清以奉國名定不虛特賚金錢六百兩綵十段忠於所事杜群懿為尚書朱玖兵逼乘輿帝走寶雞獨群懿從是時棧道為山南石君涉所毀天子間關險澀群懿未嘗暫去側帝勞曰朕失道再違宗廟方艱難時卿不少捨朕蓋古所謂忠於所事邪群懿頓首曰臣世蒙國厚恩陛下不以臣不肖使扞牧圉臨難苟免臣之恥也通知四夷情偽崔敦禮拜兵部尚書詔撫輯回紇鐵勒部姓會薛廷寇邊與李績合兵破之置祁連州處其餘衆幹海都督回紇吐述度為下所殺詔往綏定立其嗣而還敦禮通知四夷情偽其少慕蘇武為人故屢使突厥前後建明允會事機宰相兼兵部姚崇三為宰相常兼兵部故屯戍斤堠士馬儲械無不暗記坐軍容不整郭元振為兵部尚書元宗於驪山講武坐軍容不整將斬以徇張説於馬前諫曰元振直詡贊大功雖有罪當從原乃赦之流于新州舊史改名順宗册廣陵王純為太子兵部尚書王純請改名時議非之皆云皇太子亦人臣也東宮之臣改之宜也非其屬而改之諂也乘款段馬李懷遠見馬門人指樹懷之吳湊方鎮參辭就兵部令狐楚奏諸道節度使等具帑抹帶器仗就尚書省兵部參辭伏以軍國異容古今定制未聞省闥之門忽納弓刀之器鄭注首創姦謀將興亂兆致王璠郭行餘之輩敢驅將吏直詣闕庭霆驚乘輿騷動京國伏乞速令停罷如須參謝即貝公服從之檢校夏官侍郎仍領選李迥秀大定初檢校夏官侍郎仍領選銓汰文武號稱職墨污爾婁師德授夏官侍郎判尚書事注選選者就案閲簿師德曰容我擇之可乎選者不去乃灑筆曰墨污爾領步騎出賊背楊弘禮太宗征遼東拜兵部侍郎駐蹕之役領步騎二十四軍跳出賊背所向摧靡帝自山上下望其衆袍仗精整人人盡力壯之謂許敬宗曰越公兒郎故有家風擇澤路帥權德輿還前官時澤路盧從史詐傲寖不制其父虔卒京師而成德王承宗父死求襲德輿諫以謂欲變山東先擇昭義之帥從史拔自軍校偃蹇不法今可因其喪選守臣代之成德習俗既久當制以漸許成德之請則可許昭義則不可宣諭王庭湊韓愈轉侍郎鎮州亂殺田洪正而立王庭湊詔愈宣撫愈至廷湊嚴兵迓之甲士陳庭既坐廷湊曰所以紛紛者乃此士卒也愈大聲曰天子以公為有將師才故賜以節豈意同賊反邪語未終士前奮曰光太師為國擊朱滔血衣猶在此軍何負乃以為賊乎愈曰以為爾不記先太師也若猶記之固善天寶以來安祿山史思明等有子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰洪正刻故三軍不安愈曰然爾曹亦害田公又踐其家矣復何道衆歡曰善廷湊慮衆變疾麾去志簡淡敬括果州刺史纍進兵部侍郎志簡淡在職不求名惟茲夏官實掌戎政白居易柳公綽兵部侍郎制選事在尚書盧承慶俄兼檢校兵部侍郎知五品選辭曰選事在尚書臣掌之為出位帝不許曰朕信卿卿何不自信無不召見韋澳遷兵侍郎與同同寮蕭置深為宣宗所遇每二人同直無不召見詢訪時事每有邦國刑政大事中使傳宣草詞澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否上旨多從之舊史勳在王府豈限常格衛次公為兵部侍郎選人李績徐有功之孫名在黜中次公召而謂之曰子之祖先勳在王府豈限常格並優秩而遣之擢兵部員外郎杜正倫太宗素知名表直秦王府文學館擢兵部員外郎帝勞曰朕舉賢者非朕獨私以能益百姓也我於宗婭故人苟無能終不得任卿思有以稱吾舉者庭無稽牒張嘉貞遷兵部員外郎時功狀盈几郎吏不能決嘉貞為詳處不閲旬庭無稽牒本傳仍遷秩為五兵郎中白居易馮宿訓倉駕二曹為辱畢諴纍官駕部員外郎倉部郎中故事要家勢人以倉駕二曹為辱諴怡然如處美官無異言座右置水一石孔若思勵學擢明經歷庫部郎中嘗曰仕官至郎中足矣座右置水一石明自足意農國之本李渤擢為庫部員外郎會皇甫鎛輔政務剝下佐用度渤上言渭南源鄉戶四百今才四十闐鄉戶三千今遷他州縣大抵類此其敝始於攤逃人之賦願下詔賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣家畜聲伎王翰擢通事舍人駕部員外郎家畜聲伎目使頤令自視王侯人莫不惡之本傳掌五兵六師之重杜裴諗制職方觀圖韋執誼始未顯時不喜人言嶺南州縣既為郎嘗詣職方觀圖至嶺南輒瞑目命左右徹去及為相所坐堂有圖不就省既易旬試觀之崖州圖也以為不祥惡之果貶死沉靜少言裴光庭轉兵部郎中沉靜少言寡交遊既歷清要時人初未之許及在職公務修整衆方嘆服有吏幹李憕驟歷兵部郎中給事中憕有吏幹明於几案甚有當官之稱所歷有聲盧奕懷謹之少子與其兄逸齊名聞元中任京兆司録參軍天寶初為鄠縣令兵部郎中所歷有聲皆如逸之所治掌告身印五代蕭願性嗜酒無節職事弛慢為兵部尚書郎中日掌告身印潘孟陽公卿多父行擢兵部郎中皆有美譽陸象先弟景倩景融景獻景裔歷河南令庫部郎中皆有美譽僧一行少時嘗與象先昆弟相善嘗謂人曰陸氏兄弟皆有才行古之荀陳無以加也其為當時所稱如此舊史拊床舊史李靖為駕部員外郎事見床門母戒崔玄暐為庫部員外郎事見母門以公事犯李巽韓文胡珦碑尚書駕部郎中數以公事犯尚書李巽巽時主鹽鐵事富驕恃勢以語宰相使江東有功同上路應碑為尚書職方郎中佐鹽鐵使使江東有功白秋官尚書大司寇亦曰秋卿侍郎小司寇刑官周禮刑部五孔刑部尚書一人侍郎一人掌律令刑法徒隸按覆讞禁之政凡鞫大獄以尚書侍郎與御史中丞大理卿為三司使志郎中員外郎掌律法按覆大理及天下奏讞同上龍朔二年改刑部曰司刑光宅元年改刑部曰秋官天寶十一載改刑部曰司憲同上都官掌俘隸簿録給衣糧醫藥而理其欣免龍朔二年改都官曰司僕比部掌勾會內外賦斂經費俸祿公廨勳賜贓贖徒役課程逋欠之物及軍資械器和糴屯收所入京師倉庫三月一比諸司諸使京都四時勾會於尚書省以後季勾前季諸州則歲終總勾焉龍朔二年改比部曰司計同上司門掌司關出入之籍及闌遺之物凡有召者降墨敕勘銅魚木契然後入龍朔二年改曰司關上不習文屈突通為刑部尚書自以不習文固辭每覆大獄必歔欷劉祥道遷司刑太常伯每覆大獄必歔欷纍漢奏決日為再不食案無留辭李適之遷刑部尚書喜賓客飲酒至斗餘不亂夜宴娛晝決事案無留辭在朝堂流涕韋倫從狩奉天關播罷為刑部尚書倫在朝堂流涕曰宰相無狀使天下至此不失為尚書後何勸聞者憚其公議姑償死柳公綽為刑部尚書京兆人有姑鞭婦致死府斷以償死公綽議曰尊歐卑非鬥且其子在以妻而戮母非教也竟減死出舊史侍郎缺宰相屢進名李道裕貞觀末為將作匠有告張亮反者詔百官議皆言亮當誅獨道裕謂反形未具帝怒不暇省斬之歲餘刑部侍郎缺宰相屢進名不可帝曰朕得之矣是嘗議張亮者頃時雖不從今尚悔之遂命道裕言佛骨韓愈遷刑部侍郎憲宗遣使者往鳳翔言佛骨入禁中三日乃送佛祠王公士人奔走膜唄至為夷法灼體膚委珍具騰沓繫路愈聞惡之乃上表以諫爭帝曰愈言我奉佛太過猶可至謂東漢奉佛以後天子咸夭促言何惟刺耶貶潮州刺史裒彙敕令可用者劉瑑遷刑部侍郎乃裒彙敕令可用者由武德訖大中凡二千八百六十五事類而析之參訂重輕號大中刑律統類以聞法家推其詳決剖如流王播進刑部侍郎是時天下多故大理議讞科條叢繁播悉置格律坐隅商處輕重決剖如流吏不能竄其私惡緣黨人斥白居易分司東都召拜刑部侍郎二李黨事興險刻乘之更相奪移進退毀譽若旦暮然楊虞卿與居易姻家而善李宗閔居易惡緣黨人斥乃移還東都除太子賓客分司本傳刑曹既清奚陟轉刑部侍郎時主計臣延齡以險刻貴幸而與京兆尹充相惡以危事中之充坐譴已又逮繫其吏峻繩之事下司寇主奏議者欲文致而甘心焉公侃焉持平挫彼嶽嶽君子聞之善知其道不私刑曹既清以餘刃兼領選事劉禹錫奚公碑倡飲省中冉祖雍歷刑部侍郎倡飲省中為御史劾奏滯郎位蔣沇以刑部郎中兼侍御史元載持政守道士類不遷沇以故滯郎位不得調袞代相問士議恨沇屈故擢御史中丞元稹馮宿刑部郎中制亟則失情緩則留獄深則礙恕縱則生姦維是四者持刑之難宰畿甸韋夏卿遷刑部員外郎時仍歲旱蝗詔以郎官宰畿甸受奉天令課第一改長安令應得不望李林甫源乾曜執政乾曜子潔為林甫求司門郎中乾曜素薄之曰郎官應得才望哥奴豈郎中材邪哥奴林甫小字也草册劉乃大歷中召拜司門員外郎德宗初進郭子儀為尚父時册禮廢視詔文者不適所宜宰相崔裕甫召乃至閣草之少選成文詞義典裁溫敏靜專白居易王鎰刑部員外郎制刑曹郎秩朕詔執事擇可以善於其職者而殿中侍御史王鎰自居殿中能察非決連鞫庶獄多葉平允加以溫敏靜專可當是選一歲之獄決在秋冬今方其時宜敬乃職求郎之難豈敢輕易書曰庶獄庶事豫敢罔知此乃周文王之所理天下也惟獄惟事會於南宮求郎之難豈敢輕易今者各有所授皆為清秩杜牧刑部都官員外郎制德宗欽其才召拜比部員外郎武元衡比盤比部得廊下食以飯從者號比盤國史補白冬官尚書大司空亦曰冬卿侍郎小司空工部六孔工部尚書一人侍郎一人掌山澤屯田工匠諸司公廨紙筆墨之事百官志工部郎中員外郎掌城池土木之工役程式同上武德三年改起部曰工部龍朔二年曰司平光宅元年曰冬官同上屯田掌天下屯田及京文武職田諸司公廨田以品給焉同上虞部掌京都衢哄苑囿山澤草木及百官蕃客時蔬薪炭供頓畋獵之事同上水部掌津濟船艫渠梁湜堰溝洫漁捕運漕碾確之事同上以工部尚書持節宗室皓以工部尚書持節使吐蕃既還金城公主請明疆場石赤嶺上盟遂定還以奉使有旨再遷吏部兄弟相代閻立本代立德為工部尚書兄弟相代為入座時論榮之今之尚書漢公卿也言動可否屬人耳目焉固不專率四屬程百工備位於冬官而已白居易韋貫之工部尚書制以東宮恩拜侍郎歸登諫獻女柳公權為侍郎召問得失因言郭收領邠寧人謂獻二女乃有是除信乎帝曰女自參承太后豈獻哉公權曰嫌疑間不可戶曉因引王圭諫盧陵王妃事是日帝命中官自南內送女還旻家於制兄弟不並臺閣出為雲陽令張文瓘再遷水部員外郎時兄弟為戶部侍郎於制兄弟不並臺閣出為雲陽令入省不數省中司門都官屯田虞部主客皆閉簡無事時諺曰屯田水部入省不數出南部新書參來瑱府元結進水部員外郎參來瑱府結説曰將士父母宜給以衣食泣諫於玉階之下蔣係轉工部員外郎又遷本司郎中皆兼史職宰相宋申錫為北軍羅織罪在不測係與諫官崔元亮泣諫於玉階之下申錫方減死時論稱之固請間官侍養崔沔拜中書舍人時母疾在東都沔不忍捨之固請間官以申侍養由是改虞部郎中舊史辭控鶴之職舊史員半千長安中五遷正諫大夫兼右控鶴內供奉半千以控鶴之職古無其事又授斯任者率多輕薄非朝廷進德之選上疏請罷由是忤旨左遷水部郎中以水曹郎處張籍白居易張籍制文教張則儒行顯王澤流則歌詩作若上以張教流澤為意則服儒叢詩者宜稍進之頃籍自校祕文而訓國胄今又覆名揣稱以水曹郎處焉虞曹同上李甑虞部郎中制虞曹郎缺命以序遷白八座之尊百揆之首賈稱為尚書稱百揆之首端右之職王戎為尚書稱端右之職尚書兵鮑永拜尚書僕射行大將軍事將兵集河東皂襜稱鮑尚書兵也尚書履聲鄭崇字子遊數上諫嘗曳革履上笑曰我識鄭尚書履聲白衣後漢鄭均病章帝東巡幸均舍敕賜尚書録終身時人號曰白衣尚書典樞機張安世拜大司馬領尚書事典樞機回車駕陳矯為尚書車駕卒至尚書門矯跪曰陛下何之曰欲案行文書矯曰此臣職分陛下不宜臨臣不稱職請黜退帝慚回車駕天子喉舌後漢李固上書曰陛下有尚書猶天有北斗北斗是天之喉舌尚書是天子之喉舌就家晉阮孚事見吏部門賜劍陳寵為尚書帝賜諸尚書劍署陳寵劍曰濟南推誠納言應邵漢官儀曰尚書處官也書曰龍汝納言帝命惟允詔漢明帝詔曰尚書蓋古之納言出納朕命機事不密則害成可不慎歟鍾離尚書鍾離意為尚書胸奴羌胡歸義詔賜縑郎暨酆詔以三百為三千詔鞭之欲死意諫曰云云上曰非鍾離尚書朕擬降威於此耶清哉詔以贓物賜百官鍾離意得珠下獨委地不拜曰此贓污之物臣不敢受命曰清哉尚書以庫錢二十萬賜之當垂拱之朝居端右之職白星郎仙郎臺郎含香含雞古香握蘭起草錦帳並見漢百官志粉署仙署蘭省仙省華省上應列宿後漢館陶公主為子求郎光武不許賜錢十萬曰郎官上應列宿出宰百里任非其人人受其害出宰百里漢書郎署之官出宰百里水鏡樂廣為尚書郎何晏謂之水鏡雉集蕭芝為尚書郎有雉數千恆集芝舍當直送至洛陽及應休飛迎上其車三臺之妙王談除尚書郎習練國典三臺之妙題柱田鳳為郎容貌端正每入奏靈帝目送之題柱曰堂堂乎張京兆田郎鳳字季宗伏閣馮豹為郎每奏事未報常休省閣或乃從昏至明天子默使小黃門持被蓋之帝曰勿驚也駐車待漏樊梵字文濟為郎每欲奏事常駐車待漏袱被魏舒為郎時選郎或非其人論者沙汰之舒曰我則其人袱被而歸同舍償金直不疑事見錯誤門避杖藥嵩為郎漢明帝性褊以事怒之嵩乃走入床下帝引杖橦之曰郎出嵩曰天子穆穆諸侯皇皇未聞人君以杖橦郎帝乃止解縛韓宜字景仁為郎以事受罰文帝輦過問此誰縛曰尚書郎韓宜上念臨淄侯乃輕車解縛白首漢文帝時唐馮白首為郎帝問之曰臣三朝不遇三朝不遇見上十年無過徐防性周慎在臺閣十年奏事無過分曹寓直為郎居列宿之位入粟漢有入粟為郎父任張安世以父任為郎三入承明廬文選建禮漢官僕制尚書郎主作文字起草更直於建禮門內懷香握蘭趍走於丹墀青縑漢官儀典職尚書郎給青縑白綾被或以錦被山郎漢楊揮為中郎將故事令郎出錢布市財用給文書乃出休名曰山郎注財用之所出故名曰山郎終歲不得休而富郎遨遊於外惲乃罷山郎移吏度大司農給財用注總計一歲所用移以官錢供不取於郎比秩後漢和帝初令郎官詔除者得占丞郎以比秩為真也直臺上藥嵩以郎家貧獨臺上一無被枕食糟粳帝夜入臺見嵩問其故甚嘉有此制大官賜尚書已下朝夕餐給帷被皂袍及侍吏二人交禮晉職官志八座初拜皆沿其舊制並集都座交禮遷又解交焉補缺每一郎缺自試孝廉能給文案者五人謹封奏其名以補之郎選衰射記漢武時入財者得補郎郎衰者也內翰九孔學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮尤寵而翰林院者待詔之所也百官志自太宗時名儒學士時時召以草制然猶未有名號乾符以後始號北門學士同上玄宗初置翰林待詔以張説陸堅張九齡等為之掌四方表疏指批答應和文章既而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書敕開元二十六年又改翰林供奉為學士別置學士院專掌內命凡拜免將相號令征伐皆用白麻其後選任益重而禮遇益親至號為內相又以為天子私人凡充其職者無定員自諸曹尚書下至校書郎皆得與選入院一歲則遷知制誥未知制誥者不作文書班次各以其官內宴則居宰相下一品上憲宗時又置學士承旨唐文學士洪文集賢分隸中書門下省而翰林學士獨無所屬也顧問率至夕段文昌為翰林學士遷中書舍人遂為承旨穆宗即位屢召入思政殿顧問率至夕乃出論書詔勤杜元穎以右補闕為翰林學士敏文詞憲宗特所賞嘆吳元濟平論書詔勤遷司勳員外郎知制誥多識朝章穆宗以元穎多識朝章尤波寵拜中書舍人戶部侍郎為學士承旨居翰林最久杜審權入翰林遷學上承旨居翰林最久終不漏禁近語凡號令行下處事值機無所遺算杜群懿為翰林學士方關東兵興調發綏徠書詔叢浩群懿思精敏凡號令行下處事值機無所遺算帝倚重辭不如旨韋洪景以左補闕召為翰林學士蘇光榮為涇原節度使洪景當草詔書辭不如旨罷學士北門學士劉禕之遷洪文館直學士上元中興元萬頃等皆召入禁中論次新書凡千餘篇高宗又密與參決時政以分宰相權時謂北門學士八磚學士李程召為翰林學士入署常視日影為候程性懶日過八磚乃至時號八磚學士學士院長參天子密議沈傳師入翰林學士改中書舍人翰林缺承旨次當傳師穆宗欲面命辭曰學士院長參天子密議次為宰相臣自必知不能願治人一方為陛下長養之因稱疾出弟兄踵召吳通玄德宗立弟兄踵召為翰林學士頃之通微遷職方郎中通玄起居舍人並立制誥凡帝有撰述非通玄筆未嘗慊與陸贄吉中孚韋執誼並位贄文高有謀特為帝器遇目險難有功通玄等特以東宮恩舊進昵而不禮見贄驟擢頗媢恨制書職分宜歸中書舍人陸贄自恃徑正屢短通玄於帝前欲斥遠之即建言承平時工藝書畫之冗皆待詔翰林而無學士至德宗以來命集賢學士入禁中草書詔待進止於翰林院因以名官今四方無事制書職分宜歸中書舍人請罷學士帝不許通玄怨日結求兼京兆戶曹薑公輔為翰林學士歲滿當遷尚書以母老賴祿而養求兼京兆戶曹參軍事美哉斯言李絳元和二年授翰林學士俄知制誥帝嘗稱太宗玄宗之盛朕不德欲庶幾二相之道德風烈無愧諡號不為宗廟羞何行而至此乎絳曰陛下誠能正身勵己尊道德遠邪佞每進忠直與大臣言敬而信無使小人參焉與賢者遊親而禮無使不肖者與焉法官無益於治者則材能出斥宮女之希御者則怨曠銷將相擇士卒勇矣官師公吏治輯矣法令行而不下違教化篤而俗不遷如是可與祖宗合德號稱中興夫何遠之有言之不行無益也行之不至無益也帝曰美哉斯言朕將書諸紳即詔絳與崔群錢徽韋洪景白居易等搜次君臣成敗五十種為連屏帳便坐腹心之地絳又數論宦官橫肆方鎮進獻等事自知言切且斥去悉取內署所上疏稿焚之以俟命帝果怒絳謝曰陛下憐臣愚處之腹心之地而惜身不言乃臣負陛下若上犯聖顏旁忤貴幸因如獲罪乃陛下負臣於是帝動容曰卿告朕以人所難言疾風知徑草卿知之矣常以輩行呼而不名陸贄入翰林年尚少以材幸太子常以輩行呼而不名在奉天朝夕進見然小心精潔未嘗有過由是帝親倚至解衣衣之同類莫敢望雖外有宰相主大議而贄常居中參裁可否時號內相周盡事情陸贄從狩奉天機務填總遠近調發奏請報下書詔曰數百贄初若不經思逮成皆周盡事情衍繹熟復人人可曉旁吏承寫不給他學士筆閣不得下而贄沛然有餘數陳讜言崔群遷翰林學士數陳讜言憲宗嘉納因詔學士凡奏議待群署乃得上群以禁密之言八人當自陳一為故事後或有惡直醜正則他學士不得上言矣固辭見聽本傳夜被旨草詔韋澳進學士承旨與蕭置皆為宣宗禮遇每二人直必偕召問政得失夜被旨草詔書事有不安者即遷延須見帝開陳可否未嘗不順納一日召入屏左右問曰朕於敕使何如澳陳帝威制前世無比帝搖首曰未也策安出澳倉卒答曰若謀之外廷則太和事可用追鑒不若就擇可任者與計事帝曰朕固行之矣自黃至緑至緋猶可衣紫即合為一矣澳愧汗不能對乃罷父誡不得任近職韋溫為翰林學士先是父綬在禁庭積憂病廢故誡溫不得任近職至是固辭帝怒曰寧綬治命邪禮部侍郎崔蠡曰溫用亂命益所以為孝帝意釋換知制誥不專取辭藝韋貫之帝以段文昌張仲素為翰林學士貫之謂學士所以備顧問不專取辭藝奏罷之蜀纈袍韋綬為翰林學士密政多所參逮帝嘗幸其院韋妃從會綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀纈袍覆而去其待遇如此金蓮炬令狐綯入翰林為學士他夜召與論人間疾苦帝出金鑑書曰太宗所著也卿為我舉其要綯擲語曰至治末嘗任不肖至亂未嘗任賢任賢享天下之福任不肖罹天下之禍帝曰善又夜對禁中燭盡帝以乘輿金蓮華炬送還院吏望見以為天子來綯至皆驚帝稱其長者錢徽為翰林學士三遷中書舍人加承旨憲宗嘗獨召徽從容言他學士皆高選宜預聞機密廣參決帝稱其長者諫無名貢是時內積財圖復河湟然禁無名貢獻而至者不甚卻徽懇諫罷之帝密戒後有獻毋入右銀臺門以避學士梁守謙為院使見徽批監軍表語簡約嘆曰一字可益耶銜之以論淮西事罷學士缺人爭薦丞相所善者韋袁微我為翰林學士是時李紳忤宰相貶端州龐巖蔣防皆擲去學士缺人人爭薦丞相所善者表微獨薦韋處厚後與處厚議增選學士復薦路隋處厚以諸父事表微因曰隋位崇入且居翁右奈何答曰選德進賢初不計私也武宗賜以宮錦德裕贈以玉帶封敖會昌初以左司員外郎召為翰林學士敖屬辭贍敏不為奇澀語切而理勝武宗使作詔書慰邊將傷痍者曰傷居爾體痛在朕躬帝善其如意出賜以宮錦劉稹平李德裕以定策功進太尉時敖草其制曰謀皆豫同言不他惑德裕以能明專任己以成功謂敖曰陸生恨又不逮意如君此等語豈易得邪解所賜玉帶贈之近世學士超省郎進官者惟鄭皓以尚主而璩以寵升云高璩以拾遺為翰林學士近世學士超省郎進官者惟鄭皓以尚主而璩以寵升云詔假光宅里官第王涯再為翰林學士涯文有雅思永貞元和間訓誥溫麗多所稿定章以其孤進自樹立數訪逮以私居遠或詔不時至詔假光宅里官第諸學士莫敢望凡號令大典册皆更其手李德裕穆宗即位擢翰林學士帝為太子時已聞父吉甫名由是顧德裕厚凡號令大典册皆更其手數召見賚獎優華三俊李紳為翰林學士與德裕元稹同時號三俊捉筆遽成辭皆允切劉彖大中初擢翰林學士宣宗始復關隴裁處叢繁書詔夜數十捉筆遽成辭皆允切頗牧在禁中畢諴召入翰林為學士黨項擾河西宣宗嘗召訪邊事諴援質古今條破羌狀甚釋帝悅曰吾將擇能帥者孰謂頗牧在禁中署卿為朕行乎諴唯唯一時書命同僚自以為不及陸房纍進翰林學士中書舍人扆工屬辭敏速若注射然一時書命同僚自以為不及昭宗優遇之帝嘗作賦詔學士皆和扆獨先就帝覽之嘆曰貞元時陸贄吳通玄兄弟善內庭文書後無繼者今朕得之腕可斷麻不可草韓偓為翰林學士宰相韋貽範母喪詔還位學士使馬從皓逼偓求草制偓曰腕可斷麻不可草從皓曰君求死邪偓曰吾職內署可默乎明日百官至而麻不出宦侍合譟茂貞入見帝曰命宰相而學士不草麻非反邪艴然出帝畏茂貞卒詔貽範還相成文粲然鄭畋入翰林為學士俄知制誥會討徐州賊龐勛書詔紛委畋思不淹晷成文粲然無不機要當時推之掌書王命白居易馮宿知制誥制吾聞武德暨開元中有顏師古陳叔達蘇頲稱大手筆掌書王命故一朝言語煥成文章朕承祖宗思濟其美馮宿為文甚正而我誥命忽思潤色之聽諸人言曰宿也可勉繼顏陳無辱吾舉訓辭溫厚有典誥風崔元翰知制誥訓辭溫厚有典誥風然性剛褊不能取容于時孤特自恃掌誥凡再期不遷父子繼美賈至拜起居舍人知制誥帝傳位至當撰册既進稿帝曰昔先天誥命乃父為之辭今茲命册又爾為之兩朝盛典出卿家父子可謂繼美至頓首鳴咽流涕對掌書命蘇頲陸象先歿紫微侍郎未嘗補朕思其人無易卿者頲頓首謝明日加知制誥給政事食給食自頲始時李乂對掌書命帝曰前世李嶠蘇味道文擅當時今朕得頲與乂何愧前人哉上疏極諫蘇源明擢考功郎中知制誥史思明陷洛陽有詔幸東都將親征源明因上疏極諫其不可者十臣聞子不諫於父不孝也臣不諫於君不忠也不孝不忠苟榮昌祿圈牢之物不若也臣雖至賤不能委身圈牢之中將使樵夫指而笑之帝遂罷東幸翰林侍講崔郾拜翰林侍講學士謝曰陛下使臣侍講歷半歲不一問經義臣無功不足副厚恩帝慚曰朕少間當請益高鉞適在旁因言陛下樂善而無所咨詢天下之人不知有向儒意帝重咎謝咸賜錦幣稡擷經史為要録鄭浣本名涵入翰林為侍講學士帝使稡擷經史為要録愛其博而精試舉諸條擲問之隨即酬析無留答每以厚風俗黜朋比為天子言鄭覃為侍講每以厚風俗黜朋比為天子言之故終為相世榮其遷高元裕自侍讀為中丞文宗難其代元裕表言兄少逸才可任因以命之世榮其遷迎以師禮馬懷索元宗詔與褚無量同為侍讀更日番入既叩閣肩輿以進或行在遠聽乘馬宮中每宴見帝目送迎以師禮問閽何人許康佐為翰林侍講學士與王起皆為文宗寵禮帝讀春秋至閽殺吳子餘祭問閽何人邪康佐以中官方強不敢對帝嘻笑罷後勸書蓬萊殿召李訓問之對曰古閽寺今宦人也君不近刑臣以為輕死之道孔子書之以為戒帝曰朕邇刑臣多矣得不慮哉訓曰列聖知而不能遠惡而不能去陛下念之宗廟之福也於是內謀剪除矣康佐知帝指因辭疾唐故事學士草制有所改者當罷職崔梲初梲為學士常草制為宰相東維翰所改梲以唐故事學士草制有所改者當罷職乃引經據爭之維翰頗不樂五代史翱翔禁闈出入諷議杜牧蘇滌制兼京兆戶曹白居易為翰林學士初歲滿當遷帝以資淺且家素貧聽自擇官居易請如薑公翰以學士兼京兆戶曹參軍以便養詔可元稹翰林制使吾言語文章與三代同風引之而成論綍垂之而為典訓白居易
