body:
  text: 卷第十四白似明月班婕妤詠扇詩曰新裂齊紈素皎縈如霜雪裁為合歡扇團圓似明月出入君懷袖動搖微風發常恐秋節至涼飆奪炎熱棄捐篋笥中恩情中道絶揚仁風袁宏為東陽太守謝安授以一扇聊以贈行宏曰即當奉揚仁風慰彼黎庶晉書白羽顧榮伐陳敏以白羽扇麾之賊衆大散晉書蒲葵晉謝安有盛名時多愛慕鄉人有罷中宿縣詣安安問歸資答曰唯有五萬蒲葵扇又以非時安乃取其中者執之士庶競慕價數倍團扇東府詩曰青青林中竹可作白團扇合歡上注掌握扇握用翣淮南子曰夏不披裴非愛之暖有餘也冬不用翣非簡之清有餘也披裘而扇淮南子曰失火鑿池披裴而扇九華扇賦曹子建九華扇賦序曰昔吾先君侍奉漢桓帝時賜上方竹扇其扇不圓不方其中結成文名曰九華扇辭曰方不中矩圓不中規隨皓腕以徐轉發惠風以寒微云云獻故扇庾懌常以白扇獻成帝帝嫌其新反之劉邵曰柏梁雲構大匠先居其下管絃繁奏夔牙先聆其音懌上扇以故不以新晉書右軍六角扇王羲之字逸少見老姥持六角扇賣之因書其扇各五字老姥初有慍色羲之謂曰但云五右軍書以求百金姥從之人競買晉書畫水成陸搜神記吳猛好道術將弟子回豫章江水大急人不得渡猛乃以手中扇畫江水橫流遂成陸路徐行而過過訖水復依舊晉書自關而東謂之箑自開而西謂扇楊雄方言武王作翣世本曰五明扇崔豹古念注曰舜廣視聽求賢人以自輔作五明扇雉尾扇又曰殷高宗有雉雊之徵服章多用翟羽故有雉尾扇周制以為王后夫人車服羽扇繒扇西京雜記天子夏則設羽扇冬則設繒扇同心竹扇晉東官舊事曰皇太子初拜供漆要扇青竹黃竹扇納妃用同心竹扇三十單扇二十禁絹扇謝靈運晉書曰武帝時禁絹扇鵲翅扇王子年拾遺記周昭王時塗修國獻青鳳丹鵲各一雌雄孟夏取鵲翅為扇一名條融一名反景象牙扇陸翽鄴中記石季龍作象牙扇翟羽扇西京雜記趙飛燕為皇后其弟上遺翟羽扇白羽扇裴啓語林曰諸葛武侯持白羽指麾三軍雲母五明金薄莫難扇鄴中記曰石季龍作雲母五明金薄莫難扇此一扇之名金薄打純金如蟬翼二面采畫列仙奇鳥異獸其五明分中辟方三寸或五寸隨扇大小雲母帖其中細縷緣其際維掩畫而彩色明徹看之如謂可取故名莫難也季龍出以扇挾乘輿七華扇趙飛燕為皇后其弟上遺七華扇西京雜記白綺扇班孟堅僕有白騎扇賦畫扇曹毗扇贊序曰會稽王使王仲祖畫扇孔三衛執扇閻知微遷右衛郎將始有司以三衛執扇登殿用之奏三衛皆趙悍不宜升陛邇御坐請以宦者代遂為故事揮扇武儒衡遷中書舍人時元稹倚宦官知制詰儒銜鄙厭之會食瓜蠅集其上儒衡揮以扇曰適從何處來遽集於此一坐皆失色持扇南蠻婆賄伽盧國婦人行持扇白羽扇賦張九齡因帝賜白羽扇乃獻賦自況其末曰苟效用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩於篋中操扇五代范延光兵行張蓋操扇小雉尾朱畫團扇儀衛志次小雉尾朱畫團扇皆十二寶扇竇懷貞會歲除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎俄而禁中寶扇鄣衛有衣翟衣出者扇織鴛鴦文李賀詩肅肅鳥羽穆如清風唐文粹張九齡白羽扇賦九光扇唐蘇鶚杜陽編曰上崇奉釋氏新羅國獻萬佛山上因置九光扇於巖巘間四月八日召兩街僧入內道場禮萬佛山睹九色光於殿中咸請之佛光即九光扇也龍皮扇唐開元遺事王元寶家有一皮扇製作甚質每暑月宴客置於座旁使水灑之颯然風至明皇曾遣中使取之愛而不受曰此龍皮扇奉君清暑殿團扇復團扇奉君清暑殿秋風入庭樹從此不相見劉禹錫扇歌桃核扇水部員外郎杜陟常見江淮市人以桃核扇量米正容一升言於九疑山溪中得酉陽雜俎狀扇于壁客至誤取王元俊精於圖畫嘗狀一扇于齊中壁上客至遂誤取之出吳越備史平頭奴子搖大扇梁園吟平頭奴子搖大扇五月不熱疑清秋李白獨坐怨秋風誰憐團扇妾獨坐怨秋風李白長信宮手持白羽玄冥祝融氣或交千持白羽未敢釋杜甫甚暑不執扇韓滉扇一百五十六尚輦局大朝會大祭祀皆扇一百五十六既事而藏之常朝則去扇左右留者三唐史百官志梳篦二白說文梳篦總名也其比如櫛詩男女不同巾櫛禮侍執秦嬴謂晉太子圉曰寡君之使婢子侍執中櫛以固子奉巾櫛樊夫人謂樊莊王曰妾得奉巾櫛非不欲專寵以為傷王之義墮櫛十洲記臨海興安縣東界有平石俗云越王溪墮櫛於此櫛風沐雨文選多在道路櫛賦晉傅咸櫛賦曰我嘉茲櫛惡亂好理一髮不順實以為恥雖日用而匪懈不告勞而自已苟以理而委作庶竭力以沒齒叉玳瑁叉續漢書貴人助簪玳瑁叉靈叉華陽國志曰涪陵山有大龜甚甲可卜其緣可作叉世號靈叉叉銘崔瑗字子玉叉銘曰蟬鬢如雲乃象衆星三珠叉橫攝媛贊靈雀叉賦晉夏侯淳雀叉賦曰希太陽而擬法妙團團而應規謝花叉啓梁文帝謝花叉啓曰田文之囷慚於寶葉王燦之詠惡此垂蓮九宮之璫豈直黃香之賦三珠之叉取高崔瑗之說泄井得楊僧濟泄井得金叉詩曰翟羽底泥去黃金尚如光髮晞用象櫛禮續漢書李文德素善延篤謂公卿曰延篤有王佐之才欲令引之延篤為書止之曰吾常昧爽櫛梳坐於客堂則誦虞夏之書歷公旦之典禮覽仲尼之春秋當此時不知天之為蓋地之為輿慎勿迷其本棄其生也名璫魏太祖當得名璫數具令卞后自選一具后取其中者上問其故后曰取其上者為貪取其下者為僞故取其中玉珥齊威王欲立夫人臣下莫知所從郭靜君獻王玉珥觀王賦珥所在孔玉工貨叉柳玭家訓曰永寧王相國涯居位竇氏女婦請曰王工貨叉直七十萬錢王曰七十萬錢豈於女惜但叉直若此必妖物也禍必隨之後叉為馮球外郎妻首飾涯曰為郎吏妻首飾有七十萬錢其可久乎琉璃為叉五行志唐末世俗尚以琉璃為叉釧近服妖也流離播遷之兆龍角叉唐杜陽編大曆中日林國獻龍角叉類玉而紺色上刻蛟龍之形精巧奇麗非人所制上因賜獨孤妃與上同邊龍舟池有紫雲自叉上生俄頃滿于舟楫上命置掌中以水噴之遂化為二龍騰空東去九鸞叉同昌公王有九玉叉上刻九鸞皆九色上有字曰玉兒工巧妙麗殆非人工所製有金陵得者以獻公主酬之甚厚一日晝寢夢絳衣奴授語云南齊潘淑妃取九鸞叉及覺以夢中之言言於左右涓公主薨其叉亦亡韋氏異其事或有云玉兒即潘妃小字百齒梳樵人直說曰孫思邈以交加木造百齒梳用之養生祕法也虎紋金髀別時提劍救邊去遺此虎紋金髀叉李白北風行寶叉墜井無顏色百尺泥中今復得鳳凰宛轉有古儀欲為首飾不稱時張籍古叉歎蘭膏已盡股半折雕文刻樣無年月同上鴛叉韋應物長安道麗人綺閣情飄飄頭上鴛叉雙翟翹玉步搖唐孫棨題妓王福娘牆詩云移壁同窗廢幾朝指環偷解博蘭椒無端鬥草輸鄰女更被拈將玉步搖北里志鍾乳金叉白樂天訓牛思黯戲贈之鍾乳三千兩金叉十二行注云思黯自誇前後服鍾乳三千兩甚得方而歌舞之妓頗多本集金叉客李賀緑鬢少年金叉客白蘭膏楚辭蘭膏明燭燭不見跋禮跋本也謂聚殘本客見之知夜深淺而慮主人之倦三夜不息禮記嫁女之家三夜不息燭思相離也夜行禮男子入內女子出門夜行以燭無燭則止秉燭古詩曰晝短苦夜長何不秉燭游自煎漢書膏以明自煎幽室禮曰治國而無禮譬如終夜有求於幽室之中非燭何見九光九微燈漢武帝祈王母於宮中燃九光九微之燈穿壁西京記匡衡勤學無燭穿鄰舍壁引光而讀書貧女分光後蘇武代使於齊甘茂謂曰吾聞貧人女與富人女會續貧人女曰我無所買而子之燭幸有餘光無損子之明而得一斯便為魑魅爭光語林嵇中散燈下彈琴見一人黑衣康乃吹燈滅曰恥與魑魅爭光然臍為燈董卓蓮花燈焰明燭銀燭銀燈蘭燈鶴焰魚形百枝燈樹火繼傳曰以火繼之金枝秀華庶翠旌金枝銅燈百二十枚秀華中出有光金羊燈銘後漢李光金羊燈銘曰賢哲勉移惟日不足金羊載輝作明以續晉孫惠百枝燈賦曰曄若雲亭爛似希星嵇康燈銘肅肅宵征造我友盧光燈吐耀華縵長舒范堅蠟燭賦曰凝脂浮炷穎其始然燭至起記侍長者之禮蠟燭炊世說石季倫以臘燭炊飲晉傅咸燭賦曰揚丹輝之煒煒熾朱焰之煌煌又煌煌丹燭御潤飛光取則景龍擬象扶桑隅坐童子隅坐而執燭禮金麻油燈王子仙傅白羊偃夜宴設琉璃屏風列金麻油燈於內外如無屏風人魚膏始皇冢中以人魚膏為燈燭簡文燈賦曰九策間吐百枝交布聚類炎洲疏同火樹蘭膏馥氣芬炷擎心寒生色淺露染光沉江淹賦燈曰若大王之燈者銅華金擎錯質錢形碧為雲氣玉為仙靈若庶人之燈者非銀非昧無藻無纏心不貴麗器窮於朴庾信賦燈曰九龍將瞑三爵行栖如瓊半土若木全低乃有百枝同樹四照連盤香添然密氣推燒蘭燼長宵反光青動寒輝朱燼焰焰紅榮乍九光而連影或雙花而並明執燭晉平公問師曠曰吾年七十欲學答曰臣聞老仰學者如執燭燭之明孰與昧夜行膏燭以明自銷文子云不燃官燭後漢巴祗與客暗坐不燃官燭浮光燭綺席凝滴污垂花傅咸燈賦火院花枝猶未長金枝密焰已流芳向晦入冥匪火不章誤書舉燭韓子鄭人有遺燕相國書者夜書謂持燭者舉燭而設書舉燭字燕相國授書曰舉燭者欲高明高明者舉賢而任之無足曰燈呂靜韻集曰無足曰燈有足曰錠錠音定青玉五枝燈西京雜記曰高祖入咸陽宮秦有青玉五枝燈高七尺五寸有蟠螭口銜燈然之鱗甲皆動煥炳列星恆滿又曰長安巧工丁緩作恆滿燈九龍五鳳雜以芙蓉蓮藕之奇百華燈樹王朗秦故事曰百華燈樹上月朔朝賀於殿下設於三階之間端門外設五尺三尺燈曰照星明雖夜猶晝銅鴨頭燈張敞東宮舊事曰太子有銅鴨頭燈銅倚燈納妃有金塗四尺長燈金塗二尺連盤燈龍膏王子年拾遺記曰海人乘霞舟以雕囊盛數升龍膏以獻燕昭王王坐通雲之堂然龍膏為燈火色曜百里煙色丹芳苡燈洞冥記曰漢武然芳苡燈於閣上光色紫有白鳳黑冠黑龍憑足來戲於前丹豹髓白鳳膏又曰丹豹髓白鳳膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨火光不滅以麟須拂霜蛾赴燈者芳苡草出奔馬國霜蛾如蜂蚖脂燈淮南萬畢術曰取蚖脂為燈置水中即見諸物常生之燈周穆王設常生之燈以自照列璠膏之燔遍於宮內行有鳳腦之燈冰荷以蓋其上璠膏鳳腦見上葛燈籠沈約宋書曰宋高祖清簡寡欲床頭有土障壁上有葛燈籠九光之燈漢武帝傳曰西王母遣使謂帝曰七月七日我當暫來帝至日掃除燃九光燈孔金蓮花令孤綯為翰林承旨夜對禁中燭盡帝以乘輿金蓮花炬送還院吏望見以為天子來及綯至皆驚蠟液濡紙柳公權為翰林書詔學士嘗夜召對于亭燭窮而語未盡宮人以蠟液濡紙繼之碼瑙燈樹吐光羅永徽二年獻碼瑙燈樹高三尺斷帶為炷皇甫無逸嘗按部宿民家燈炷盡主人將續進無逸抽佩刀斷帶為炷炬密如晝玄宗貴妃楊氏韓虢每入謁炬密如晝燭火滿街張弘靖充盧龍節度使官屬輕侻酣肆夜歸燭火滿街脂炬舒元輿舉進士既試脂炬皆人百將因上書香蠟燭唐杜陽編同昌公主始有疾召術士采賓為法乃以香蠟燭遺之其燭方二寸上被五色文卷而燃之竟夕不尺郁烈之氣可聞於百步蠟中有蜃脂香蠟燭煙出其上即成樓閣臺殿之狀或云蠟中有蜃脂故也燭圍長安後記韋陟家宴使每婢執一燭四行立人呼燭圍息煙燈唐酉陽雜俎建中中光宅寺僧竭禱銅蟾為息煙燈天下傳之雷門四老事略王維輞川林下坐用雷門四老石燈滅則石中鑽火白鷺轉花黃龍吐水玄宗張臨光宴白鷺轉花黃龍吐水皆燈也出影燈記浮花洞攢星閣同上龍鳳燭南唐近事韓夤亮渥之子常言渥亡之日溫陵帥聞其家藏箱笥頗多使親信發觀惟得燒殘龍鳳燭金縷紅巾百餘條奔䱐非魚非蛟大如船長二三丈色如鮎有兩乳在腹下相傳懶婦所化一頭得膏三百斛取之燒燈照讀書紡續輒暗歡樂之處則明云長明公唐李政異聞録楊穆於昭應寺讀書每見一紅裳女子日誦詩曰金殿不勝秋月斜石樓冷誰是相顧人寒韓弔孤影問甚姓氏曰遠祖名無忌姓宋十四代宜因顯揚釋教封長明公開元中明皇與楊妃建此寺立經幢封妾為西明夫人因賜珊瑚寶帳居之自此巽生蛾郎不復強暴矣後驗之乃經幢中燈也西明夫人見上妖燭寧王夜集有戲煙似蠟非蠟似脂非脂每酒酣往作則必昏翳否則明謂之妖燭遺事華燭光爛爛韓愈江漢詩妝燭已銷檠城南聯句百枝燈韓國夫人造百枝燈高八十尺每點之光照數十里天寶遺事青凝金燈青疑李白夜坐婢燈寧王宮中帳前羅列木雕矮婢飾以綵繪各執華燈自昏達旦目為青疑開元遺事神燈見玄宗朝謁毫州太清上尊號是夜神燈見洛中紀異燭圍遺事楊國忠子弟每上元人秉千炬紅燭謂之燭圍冷翠燭季賀冷翠燭光彩蠟蜜垂蘭燼上銅盤燒蠟光吐日杜甫銅盤燒蠟光吐日夜如何其初促膝寒房燭影微同上饞燈南方有魚多脂束以為油點蜀紡績則暗照宴樂則明謂之饞燈天寶遺事授以雙燭淮南用兵劉沔為小將其兵魁頗易之後因月黑風令沔捉生沔憤激深入意必死行十餘里因坐將睡忽有人授以雙燭曰君方大貴但心存此燭在即無憂也沔後拜將常見燭在雙旌上酉陽雜俎華燭燔長燈杜甫燈魚後主詩九重開扇鵠四牖炳燈魚火城元日冬至立仗大官皆備珂傘列燭有至數百炬謂之火城將至皆滅燭以避國史補連枝錦燈燭李白搗衣篇連枝錦燈燭熒熒照孤寢落月低軒窺燭盡春怨同上君看燈燭張杜甫寫懷君看燈燭張傳使飛蛾密風起春燈亂杜甫宿夔州燈花何太喜杜甫獨酌更長愛燭紅孟雲卿頭白燈明裏何須花燼繁日暮紫殿九華燈寄劉峽州詩燭奴申王以龍檀木刻童子緑衣束帶每遇夜集列執晝燭謂之燭奴山燈于蝢為襄陽點山燈白幔蓋六韜曰冬不服裘夏不操扇天雨不張幔蓋名曰三禮以縑幔盛土後漢岑彭圍隗囂壅谷以縑幔盛土為隄灌城軍令曰戰時皆取船上布幔漬水中賊有火炬火箭以掩滅之絳紗幔韋逞母宋氏傳父業得周宮義旨乃就宋家立講堂書生百餘人隔絳紗幔受業焉詩齊王融詠幔詩幸得與珠綴羃歷君之楹月映不辭卷風來輒自輕每聚金爐氣時駐玉琴聲孤琴暖幽幔古詩孔油幔馬璘治第京師侈甚其寢堂無慮費錢二十萬緍方璘在君守者覆以油幔帷幔周世宗宣懿皇后符氏初適李守真子崇訓守真反漢遣周太祖討之崇訓手自殺其家人次以及后后走匿以帷幔自蔽褰輕銷之碧幔處世南秋賦長幔繡沓褰長幔李白白夜飲帳中項羽聞楚歌虎帳公孫弘燕見上或時不冠上堂虎帳中汲黯前奏事上不冠望見黯避帳中使人可奏其見憚如此甲乙之帳東方朔曰誠用臣之計推甲乙之帳燔於四達之衢居神漢武故事上以琉琉珠玉明月夜光雜錯天下珍寶為甲帳次為乙帳甲以居神乙以自居賜後漢桓榮常寢疾太子賜以幃帳奴婢曰如有不諱無憂家室絳紗帳馬融達生任性不拘儒者之節常坐高堂施絳紗帳前授生徒後列女樂紺幄帳舊儀以紺幄帳祭天集囊魏文帝集上書囊以為帳壞為襦褲謝尚為江夏相都督始到官都以三十四布為尚造烏布帳尚壞之以為軍士襦褲皂帳傳子曰太祖武帝愍娉娶之僣上公主適人不過皂帳從婢土人而已孔賜帷帳令狐彰入朝賜帷帳寶帳王居自以立勛至天寶時為舊臣性豪侈寶帳備具七寶帳五行志武后時嬖臣張易之為母臧作七寶帳有魚龍鸞鳳之形慘紫帳則天皇后武氏常禦紫宸殿施慘紫帳九龍帳閩王鏻命錦工作九龍帳白紬帳酷吏吉溫楊國忠當國引拜京畿關內採訪使安祿山敕吏設白紬帳于傳以俟命珠玉為帳李蔚咸通十年詔迎佛國乃以珠王為帳翠羽帳玄宗皇后王氏廢為庶人當時王諲作翠羽帳賦諷帝九華帳唐陳鴻長帳傳褰九華帳紫綃帳唐杜陽編元載藝輝堂戶牖內設紫綃帳得於南海溪洞之中酋帥則鮫綃之類也輕疏而薄如無所礙雖屬疑冬而風不能入盛暑則涼自至其色隱隱焉忽不知其帳也謂臥內紫氣金絲帳元載寵姬薛瑤英載為處金絲帳玳瑁帳武宗起望仙臺設玳瑁帳連珠之帳同昌公主堂中設連珠之帳續真珠為之也鎖子帳唐明皇雜録楊國忠鎖子帳稀世之寶時人莫能計其直青練帳錢鏐恭穆夫人嘗以王寢帳隳裂乃造青練帳將易之王曰作法於儉猶恐為奢但慮後代皆施錦繡耳卒不用吳越備史一百二十鳳皇羅列含明珠韋蘇州長安道歌中有流蘇合懼之寶帳一百二十鳳皇羅列含明珠五王帳鄭處誨明皇雜録帝友愛至厚殿中設五幄與諸王處號五王帳重頂帳穆宗宮中花開以重頂帳蒙蔽欄檻史諱録李嶠當則天朝拜相帝幸宅見臥青絁帳賜御用繡羅帳嶠臥不安席明日奏少時相者謂不當華欲用舊帳知命録靚粧盈里不施幃帳楊貴妃妹虢國夫人素與國忠亂頗為人知不恥也每入謁並驅道中從監侍姆百餘騎炬密如晝靚粧盈里不施幃帳時人謂之雄狐流穌李賀桂帳流穌暖錦帳三十里紀聞談京師名娼嬌陳如姿藝俱美陸州尹一見求納焉陳如曰得錦帳三十里乃可蓋戲之也翌日載錦帳數十車張之陳大驚乃如前約深幃金鴨冷李賀神女廟白雲母屏風後漢鄭弘為太尉時舉第五倫為司空班次在下每正朔朝見弘曲躬自卑上遂聽置雲母屏風分隔其間由此為故事列女屏風東觀漢記宋弘嘗見御座施屏風畫列女帝數顧弘曰未見好德如好色者也畫屏曹不興善畫屏風誤落筆點素因就以作蠅孫權以為生蠅舉手彈之隔坐吳録景帝時紀亮為尚書令子騭為中書令每朝會詔以御屏風隔其坐刻縷三輔史録曰保敞為汝南太守章帝巡過郡設刻縷屏風帝命侍中黃香名之曰右典務農雕刻傷民忠則謁節義在修身賦淮南子屏風賦惟新屏風出自幽谷不逢仁人永為枯木銘李尤銘曰舍則潛辟用則誤張壅遏風邪霧露是抗謝碁子屏風啓梁簡文帝謝碁子屏風啓曰雲母之窗慚其麗色琉琉之扇愧其含影皇邸屏風也周禮屏隔之位屏風隔形如今腰扇賜太祖平柳城班所獲特以素屏風賜毛玠曰君有古人之風故賜古人之器玠字孝先步障晉王愷君夫作紫絲步障四十里石崇作錦步障以敵之廣五十里屏風六孔以所上疏列為屏障魏徵疏奏帝曰方以所上疏列為屏障庶朝夕見之集家誡房玄齡集古今家誡書屏風連屏李絳帝詔絳等搜次君臣成敗五十種為連屏張便坐席每閲視顧左右曰而等宜作意勿為如此事寫烈女傳虞世南帝嘗命寫烈女傳於屏風金雞障安祿山帝登勤政樓幄坐之左置金羅大障懸黎屏風唐杜陽編元載嘗造藝暉堂戶牖內設懸黎屏風本揚國忠之寶也屏上刻前代美人妓樂之形外以玳瑁水犀為押絡以真珠瑟瑟其為精妙殆非人工所及八角化鳥屏風唐酉陽雜俎安祿山恩寵莫比錫賚無數其所賜品目有八角花鳥屏風虹霓屏風唐太真外傳玄宗語如憶得一屏風今在訪以賜汝屏乃虹霓為名雕刻前代美人之形可三寸許其餘執玩之器衣服皆甲衆寶相廁而成水晶為地以玳瑁水犀為押絡以真珠瑟瑟間綴精巧殆非人力所製乃隋文帝所造賜義成公主墮在北胡貞觀初滅胡蕭后同歸中國上因而賜焉屏上婦人酉陽雜俎元和中有士人因弊臥廳中及醒見古屏上婦人等踏歌曰長安兒女踏春陽無處春陽不斷腸舞袖弓腰渾忘卻蛾眉空帶九秋霜其中雙發者問如何是弓腰歌者乃反首髻及地勢如規焉士人驚懼因叱之忽然上屏手印明皇所幸美人王氏數夢人召飲客具言於上曰此必術士所為若再往以物志之其夕夢中又往因就硯中濡手印於屏風上既寤即告帝素於外果於東明觀中得其手紋而道士已遁去矣出唐末遺事水晶屏楊妃外傳水晶屏上刻美人形可二三寸妃以遺國忠置之樓上常偃息其下一日國中獨臥屏上諸女悉下各通名曰當壚人也步蓮人也桃源人也拾翠人也竊香人也金屋人也解佩人也為云人也畫眉人也吹蕭人也笑嬖人也許飛瓊也趙飛燕也金谷人也結綺臨春人也國忠驚叱皆復歸屏自是不登樓未幾果敗漢魏臣貞元十一年上宴宰相於麟德殿東亭令施屏風於坐位之後畫漢魏臣并列善言美事南部新書金鵝李賀金鵝屏風蜀山夢屏開金孔雀杜甫嘗書四十二幅屏徐浩嘗書四十二輻屏八體皆備白五几周禮司筵掌五几玉雕彤漆素為五几國賓雕几彤几國賓謂諸侯來朝孤卿大夫來聘朝者雕几聘者彤几熊席漆几甸役則設熊席右漆几謂王甸有司祭表貉所設席几言事變几凶事仍几吉事王祭宗廟裸於室饋食於堂繹於祊每事易几神事示新喪奠几相因喪禮略奮髯抵几朱博見齊吏舒緩投之以几晉伐逼陽城荀偃士南請班師智伯怒投之以几出於其間注云出偃丏之間智伯荀罃字省中置几平詔太師孔光每十日一賜食賜靈壽杖令為太師省中置几入小用杖孔融憑几孔融為北海袁覃來攻流矢雨集然融憑几安然而坐賜素几毛玠事與素屏風同上注黃金几漢武內傳曰帝受太甲靈符十二事於西王母盛以黃金几封以白王函以珊瑚為床化曰麂神仙傳葛仙公憑桐木几於女几山學仙得道後几化為白麂三足時出於山上孔賜几杖甄權許州扶溝人貞觀中權已百歲太宗幸其舍賜几杖衣服烏皮几拂拭烏皮几杜詩狐文几雲仙散録叩頭録房壽六月召客憑狐文几肉几唐酉陽雜俎黃㼐見矮陋機惠玄宗嘗憑之行問外間事動有錫賚號曰肉几憑几而聽閣下無事時一致之坐側使跪進其所有閣下憑几而聽之未必不如聽吹竹彈絲敲金擊石也韓文朽機懼傾撲納涼聯句撫几雲車何來遲撫几空嘆息李白日夕山中烏几半棲遲杜甫扶几導之言韓愈病中贈張十八白底席綴純底蒻也綴雜採也純緣也純音準豐席畫純豐苑席也並天子朝燕之席不同孔子曰父子不同席男女不同席可卷我心匪席不可卷也不暖孔席不暖避席曾子避席為門陳平以席為門獨坐五十餘席後漢元日上令講論不勝者輒奪其席與通者戴憑獨坐五十餘席棄席鮑照詩棄席思君幄願垂晉主惠文文公令席褥捐之子犯曰席褥而君臥棄之不可文公乃止綺席瑤席蘭席重席正席王人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐正席重席貴賤有重數函丈禮布席席間函丈注涵容也謂講問之時其席相對席間足以指畫衽席衽席臥席也禮曰請席何向請衽何趾坐同向臥問趾盡後虛坐盡後食坐盡前注云嫌污席也禮有以多為貴者謂天子之席五重諸侯三重大夫再重士不重斂席收之也禮奉席如橋衡奉之令左昂右低如有首尾焉爭席陽子居問過於老聃其往也舍者迎將其家公執度妻執申櫛舍者避席煬者避灶注云尊形自異故憚而避之其反也舍者與之爭席注云去其矜夸故也莞為席東方朔曰孝文以莞為席半席漢相田蚡為壽坐者避席伏及竇嬰為壽故人避席餘半膝席絶席正常為橫野大將軍位次與諸將絶席來歙攻隗囂帝自勞之飲燕與諸將絶席張禹為太傅鄧太后以傷帝幼弱欲令重臣居禁中乃詔與三公絶席專席宣秉為中丞上特詔中丞司棣尚書今會司並專席而坐故京師號曰三獨坐寢處其皮傳曰臣食其肉寢處其皮矣割席管寧華歆同席讀書有乘軒冕過者歆廢卷觀之寧割席分半而坐曰子非吾友三經之席說苑孔子困陳蔡之間環堵之內席布三經又專席禮有喪者專席而坐側席有憂者側席而坐馬席蔡秦激張儀以馬席坐之王勤坐無空席見待士門中席為人子者坐不中席不敢當尊必異群居五人則長者必異席不坐席不正不坐不重傳闔廬居不重席前席賈誼傳文帝前席注云促席近聽誼言南嚮北嚮以西方為上東嚮西嚮以南方為上斷席許敬字鴻卿與誣君者會於縣敬校刀斷席曰不敢與惡人同席織席蜀先生賣屨織席為業又臧文仲三不仁妾織蒲注云家人賣席也羊皮羊茂為東郡守坐羊皮溫席黃香家素貧盡心孝養暑則扇床枕寒則溫席茅葭先賢傳鄭敬以茅葭為席織席自給李恂為武城太守步歸結茅屋與諸生織席自給後為兗州牧孔豹席張志和豹席蓬席陸龜蒙升舟設蓬席舉席自障盧懷謹門不施箔風雨至舉席自障綵席藉步穎王璬濟江舟中以綵席藉步命撤之曰此可寢奈何踐之龍鬚地理志鳳翔府土貢龍鬚席鳳翮相州土貢鳳翮席水蔥登州士貢水蔥席椰葉唐南蠻環王椰葉為席紫茭席唐杜陽編曰言士田佐元唐大通皆入宮禁時有處士伊祁玄上知其異人召入宮設紫茭席席色紫而類茭葉光軟香淨冬溫夏涼此本烏弋山離國獻龍鱗之席憲宗迎佛骨入內道場設龍鱗之席同上緑白平細背席唐酉陽雜俎安祿山所賜品目有緑白平細背席織作玉床席李白觀刈蒲魯國寒事早初霜刈渚蒲此草最可珍何必貴龍鬚織作玉床席欣承清夜娛雨來霑席上杜甫異席咨事舊史浙西觀察使李栖筠有重望虛心下士幕府盛選才彥觀察判官許鴻謙有學識栖筠常異席事多咨之壬癸席河東備録申王取豬毛刷淨令考工織壬癸席滑而且涼餘見豬門簟九白書蔑廣黼純篾桃竹席也白黑之繒以純緣也筍席玄純筍弱竹也玄純黑緣也並天子朝燕之簟詩下莞上簟乃安斯寢桃笙象簟韜於筒中珍簟玉簟夏簟清兮晝不暮斂席與簟禮斂簟而襡之襡韜也音毒禮管簟之安橐秸之設席上之管簟樽之上先玄酒淮南子象牙細簟王隱晉書曰車永為廣州剌史子溢多使工作象牙細簟工甚患之竹席說文簟竹席也方言曰簟宋魏之間謂之笙今江東通言笙也三伏餘炎九折成用梁簡文答定襄侯餉臥簟書云筠簟多品篠蕩雜名三伏餘炎九折成用又答南平王書曰未若五離九折生桃枝之翠筍賜晉公卿禮秩太宰何曾遜位賜簟褥各一具求六尺簟王悅見王恭六尺簟謂有餘求之恭即送後悅見恭更無簟恭曰平生無長物劉孝儀謝始興王賜花紈簟啓曰麗并桃象周洽昏明便覺虛室以寒狐裘可襲雖九日煎沙香粉不棄三旬沸海圓扇可捐孔黃琉璃韓愈鄭群贈簟詩攜來當晝不得臥一府傳看黃琉璃含風漪又誰謂故人知我意卷送八尺含風漪文簟納涼聯句青熒文簟施犀簟五行志武后時嬖臣張易之為母為犀簟白角簟地理志蘇州土貢白角簟糠竹簟雲仙散録叩頭録房壽六月召客坐糠竹簟體堅色淨體堅色淨又藏節滿眼凝滑無瑕疵韓文清簟華榻有清簟陪杜侍御遊同上光彩照耀呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤虱避肅肅疑有青飆吹贈簟詩簟色寒微霜淒淒簟色寒長相思李白玲瓏透象床韋蘇州橫塘行寶簟玲瓏透象床金簟侯君集破高昌所得金簟甚精御府聽無唐盧氏雜記長簟韋蘇州雨夜詩獨驚長簟冷鳳窠李賀長簟鳳窠斜酒醒思臥簟杜甫何氏山林掃地青玉簟李白詩恩分夏簟冰杜甫奇劉陝州白文茵詩文茵暢轂文茵虎皮不敢均汲黯與周陽游同車未嘗敢均茵褥皮褥後漢荀爽慈明為三公食不過一肉脫粟飯坐皮褥賜吳張昭非魯肅孫權不以介意賜肅毋幃帳氈褥賜何曾見簟門污邴吉日馭吏醉不覺污丞相車茵無緣飾魏帝本紀曰上儉率茵褥取質無有緣飾纍茵世說晉武帝年十三四時冬天晝日不著復衣夜則纍茵褥謝公曰體宜令有常陛下晝過冷夜過熱又子路曰纍茵而坐吐茵馭吏酒困吐茵而少卿不責氈氈案周禮有氈案我家舊物晉王子敬臥齊中盜取物敬曰青氈我家舊物見盜門孔素褥魏徵帝賜素褥以從其尚無裀褥岑文本貴常自以興孤生居處卑室無裀褥帟坐客寒無氈杜甫戲簡鄭廣文才名三十年坐客寒無氈芳茵同上贈汝陽王永懷侍芳茵敗氈敝席五代李愚渤海無棣人愚有疾明宗遣宦官視之見其敗氈敝席四壁蕭然明宗嗟嘆命以供帳物賜之十年一易韓滉雖宰相子茵衽十年一易褥壽百官志守宮署掌供蕃客帷帟則題歲月褥壽七年不及期而壞有罰卻塵褥唐杜陽編元載寵姬薛瑤英載為處卻塵褥其褥出自句驪國一云是卻塵之獸毛所為也其色殷鮮光軟無比龍罽鳳褥同昌公主堂中設龍罽鳳褥繡氈唐酉陽雜俎安祿山恩寵莫比其所賜有繡鴟毛氈兼令姚令瑤就宅張設花裀學士許謹選放曠不拘小節多與親友結宴花圃中未嘗具帷幄設坐只使童僕輩聚落花鋪坐下曰吾自有花裀出唐開元遺事深羅大絪見龍鬚志翠織成杜甫張舍人遺織成褥段客從西北來遺我翠織成五色覆安革氈唐史五行志以氈蒙馬哥舒翰與崔乾佑戰以氈蒙馬冰蠶絲錦褥唐老子堂買一舊錦褥有波斯見之乃曰此冰蠶絲所織暑月陳於坐滿室清涼樂府雜録褥隱繡芙蓉杜甫鼲貂之褥蛩蚊之氈張昜之母有牙席犀簟鼲貂之褥蛩蚊之氈床十一白華睆大夫之簀曾子寢疾病童子曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易起易簀簀床笫萆畫也睆文床笫之言不踰國易簀見上象床孟嘗若至楚楚獻象床直千金公孫戍諫令勿受孟嘗君乃止載寢之床乃生男子息偃詩云息偃在床玳瑁床珊瑚漢武內傳曰帝以珊瑚為床安身夜以安身養體史記剝床以足巽在床下踞床漢書高陽酈食甚求見高祖高祖方踞床兩艾洗足藜床欲穿漢書管寧家貧在藜床欲穿為學不倦龜搘江淮間有人得龜用搘床三十年放之猶活沉香床異苑曰沙門支法存有八尺沉香床木懸床列仙傳羊公華陰山峰中人懸一食床踞我床論衡曰孔子將死遺祕書曰不知何一男子自稱秦始皇上我堂踞我床顛倒我衣裳至沙丘而亡後始皇至魯觀孔子宅至沙丘而崩孔引貴臣共榻劉文靜唐公踐天子位擢納言時多引貴臣共榻文靜諫曰今率土莫不臣而延見群下言尚稱名帝座嚴尊屈與臣下均席此王導所謂太陽俯同萬物者也自投高祖順聖皇后竇氏聞隋高祖受禪自投床下曰恨我非男子不能救舅家禍拊床李靖左僕射楊素拊其床謂曰卿終當坐此終當據此封倫內史令楊素生撫其床曰封郎終當據此云政事堂巨床李吉甫初政事堂會食有巨床相傳徙者宰相輒罷不敢遷吉甫笑曰世俗禁忌何足疑耶撤而新之金床盧簡辭盧昂坐贓簡辭窮按乃得金床玉床搖夏侯端大業中密語祖曰玉床搖帝坐不安醉登杜甫嘗醉登武床瞪視曰嚴挺之乃有此見武亦暴猛中銜之匿床下孟浩然王維私邀入內署俄而玄宗至浩然匿床下維以實對帝喜曰朕聞其人而未見也何懼而匿詔浩然出置榻李峴同平章事故政事堂不接客自元載為相中人傳詔者引升堂置榻待之峴至即敕吏撤榻引同榻坐李勉父擇言張擇貞為益州都督性簡貴接部剌史倨甚擇言守漢州獨引同坐榻引升御榻李綱帝引綱升御榻碼瑙床西域波斯開元天寶間遣使者十輩獻碼瑙床不過一床南蠻傳故蜀孺老得扶攜悉入成都閭里皆滿尸所占地不得過一床施特榻崔渙超家亳州司功參軍還調於是入判者千餘吏部侍郎嚴挺之施特榻連榻坐王毛促與諸主及姜皎等侍禁中至連榻而坐謁床下李林甫病劇國忠至自蜀謁林甫床下象牙床訶陵以象牙為床床幃多飾金玉郭孝恪之在軍床幃多飾金玉見龍床唐杜陽編穆宗飛龍衛士韓志和更雕踏床高數尺其上飾之以金銀綵繪謂之見龍床置之則不見龍形踏則鱗鬣爪牙俱出始進上以足履之而龍天矯若得雲上怖畏遂令撤去火齊床武宗築望仙臺設火齊床搘以金龜銀螯同昌公主製水精等床悉搘以金龜銀螯溫清床懿宗迎佛骨入內道場設溫清床水精床杜陽編同昌公主製精火齊琉璃玳瑁等床七寶床李白序明皇以七寶床賜食帖花檀香床唐酉陽雜俎安祿山所賜品目有帖花擅香床風床殿書卷杜甫水閣詩常侍登床太宗作飛白群臣就帝手中競取劉泊登床得之太宗笑曰昔聞婕妤好辭輦今見常侍登床墨藪馮道軍中不設床席臥一束芻而已五代史金繩床南蠻驃古朱波王出輿以金繩床立床下拜韓愈石鼎聯句序二子大懼皆起立床下拜茅棟蓋一床杜甫柴門詩床上書連屋何氏山林詩支床錦石圓季秋江行詩同上白角枕粲號詩曲肱子曰飲水曲肱而忱之樂亦在其中不加漢書覆雖新不加於枕安寢載寢斂枕簟雞初鳴也安枕薛公曰使黥布出下計陛下安枕而臥扇黃香盡心供養暑則扇床枕銘蔡雍枕銘曰哲人降鑒居安問傾高枕王千里酈寄說呂産呂祿夜以安身傳載安斯寢琥珀宋武帝時獻琥珀枕碎之為刀瘡藥三十二物神仙傳曰泰山父老時漢武東巡見父鉏於道頭上白光高數尺呼問之對曰有道士教臣作枕枕有三十二物應二十四氣八物應八風臣年轉少齒生芳松枕劉向別録曰芳松枕龍頭枕東宮故事曰太子納妃有漆龍頭支結枕枕鴻書漢淮南王有枕鴻書書中有神仙為金術孔金寶神枕合浦公主御史劾盜得浮屠辨機金寶神枕自言主所賜瑟瑟枕盧簡辭盧昂坐贓簡辭窮按得瑟瑟枕大如斗高枕而臥李絳曰加此水旱無年倉廩空虛誠陛下焦心銷志求濟時之略渠便高枕而臥哉家惟枕履元德秀家惟枕覆丙夜不安枕循吏傳太宗嘗曰朕思天下事丙夜不安枕不得高枕而瞑恆彥範盧襲季亦坐與敬暈善為冉祖雍所按祖雍曰且君下獄諸弟皆縱酒無憂色何耶對曰今盡殺諸弟則已如獨殺襲秀恐公不得高枕而瞑祖雍色動曰當活公遂得不坐太衾長枕玄宗為太子嘗製大衾長枕將與諸王共之睿宗知甚喜或枕或欹文粹羅袞枕銘曰或枕或欹有安有危勿邪其思韋氏三枕五行志韋后妹嘗為豹頭枕以辟邪白澤枕以辟魅伏熊枕以宜男亦服妖也玉枕五代史弘肇鄭州滎澤人燕人何福進直玉枕直錢十四萬遣僮賣之淮南以鬻茶僮隱其錢福進笞責之僮乃誣告福進得趙延壽玉枕以遺吳人弘肇捕治福進棄市遊仙枕唐開元遺事龜茲國進枕一其色若碼瑙溫潤如玉製作甚工枕之而寐則十洲三島盡在夢中帝因號遊仙枕後賜楊國忠夜明枕唐開元遺事虢國夫人有夜明枕置於堂中紅光照室不假燭燈紅麩枕唐張瀆宣室志韋弇遇王清之女持寶以贈出一枕似玉微紅有文加粟奇光炳然曰紅麩枕也質錢卓行陽城常以木枕質錢重明枕唐杜陽編元和八年大軫國貢重明枕長一尺二寸高六寸潔白如水晶中有樓臺之狀四方中有十道持香執簡循環不已謂之行道真人其瓦木丹青衣服簪紱纖悉備具通瑩如水睹物鷓鴣枕同昌公主有鷓鴣枕其枕以七寶合成為鷓鴣狀同上磁石枕豐寧傳益眼者無如磁石為盆枕可老而不昏寧王宮中多用之色綾枕酉陽雜俎臺山有色綾木理如綾紋窠百姓取為枕呼色綾枕警枕吳越備史武肅王錢鏐在軍中未嘗安寢復用圓木小枕睡熟則欹由是得悟名曰警枕及鎮撫二國至于末年每夕列侍女戒之曰外有報事當震聲以為警自是聞報即時而遣且留琥珀枕李白白頭吟且留琥珀枕還有夢來時神雞枕常新録曰史鳳宣城妓也待客異者有神雞枕拗枕皮光業見聞録曰崔謹以元和元年登第至開成已入翰林因偶止之夕二更以來中使宣召引入數重門至一處堂宇華煥簾幕俱垂見左右二門然蠟而坐謂謹由曰上不豫已數日奉太后旨命學士草廢立謹由大驚曰某有中外親族數千口列在縉紳長行兄弟甥姪三百人一日聞此覆族之言寧死不敢承命況聖上高明之德覆乎八方豈可輕議二閹默然良久引謹由至一小閣文宗坐於殿上二閹經歷階而疏上唯俯首又曰不為此拗木枕措大更不復在此坐矣仍戒謹由曰事泄即是此措大也青瓷枕唐沈既濟枕中記道者呂公經邯鄲道上邸告授盧生枕曰子枕此當令榮適如願其枕青瓷而竅其兩端遂至其家歷三台乃寤高枕笑浮生杜甫遣悶詩是非何處定高枕笑浮生堂中特設夜明枕銀燭不施光鑒帷主虢國夜明光燭一室鄭愚津陽門詩白持案史記高祖過趙趙王張放持梁進食禮甚恭高祖箕踞罵之對案不食萬石君石歷子孫有過不誚讓為之對案不食案上不過三杯朱博儉案上不過三杯屏案尹敏與班虎相厚善語常屏案不食舉案齊眉梁鴻妻孟光每上鴻食舉案齊眉等案而食燕丹子曰太子常與軻等案而食金案茅君嘗授神仙之職衆賓皆至剩忽然自有青縑帳於屋下敷數理白氈金案玉杯人皆醉飽鳩入案下烈士傳魏公子無忌方食有鳩入其案下公子怪之比有何急來投無忌邪命名人於殿下視之左右顧望見一鷂從屋上飛去書案書案銘梁簡文帝曰性廣知平文雕非曲廁質錦帳承芳綺褥被召通今案奸治俗刻香鏤彩纖銀卷足抵破書案東觀漢記更始韓夫人嗜酒每侍飲奏事輒抵破書案短人行案上漢武帝故事時東都獻短人長五寸上疑是山精常令行案上方朔問曰巨靈王何叛阿母健否抵案朱博子元為琅邪太守怒吏抵案斫案江表傳曰曹公平荊州欲伐吳張昭等皆勸迎唯因瑜陳拒之之計孫權乃斫前奏案曰復有欲迎北軍者與此案同青玉案張平子詩曰美人贈我錦繡段何以報之青玉案陳楚謂之寫方言陳楚之間謂案為寫孔據案劉玄佐貴母尚在賢婦人也見縣令走廷中白事退戒曰長吏恐懼甲甚吾思而父吏於縣亦當爾而據案當之可安乎玄佐感悟待下益加禮以紙筆置于案郭翰巡察隴右狄仁傑為刺史民爭言有異政翰就館以紙筆置于案謂僚屬曰願薦使君美于朝指香案鄭覃帝嘗謂百司不可使一日弛惰因指香案爐曰此始華好用夕則晦百寶案唐杜陽編同昌公主琢百寶為圓案食案或如臨食案肴核分釘餖韓愈南山銀案舉人多以白紙糊案子面鄭昌圖詩曰新糊案子其白如銀出托言晝蠅食案繁韓詩玉案李白鼓吹入朝曲王子馮玉案劍履若雲行瓊杯綺食青玉案李白憶舊遊瓊杯綺食青玉案使我醉飽無歸心君門曉日開杜牧李甘詩君門曉日開赭案橫霞布玉皇香案元稹詩我是玉皇香案吏謫居猶得在蓬萊傳觴青玉案李白別設案高士廉皇太子監國又攝太傅太子令曰寡人資公訓導而比聽政據案對公情所未安所可宜別設案奉太傅士廉固辭孜孜憑書案譬彼鳥黏黐韓文寄崔念六仆香案前韋慶厚太和二年方奏事恭疾付香案前帝令中人翼扙之輿還第一夕薨白齒杖杖函夏官伊祁氏掌供王之齒杖齒杖謂賜老者杖供其杖函藏之既事受之杖者鄉人飲酒杖者出嚗然莊子曰神農嚗然放杖而笑嚗然放杖聲也曲杖韓子周王下令索曲杖吏求之不得使和求得之乃知吏不事邛竹杖張騫在大夏時目邛竹杖云賈人市人於身毒國積竹杖漢書云昌邑王買積竹杖注云合竹作杖靈壽杖後漢賜孔光靈壽杖龍後漢壺公與費長房一竹杖曰騎此任之則自至因以投葛陂顧視則化龍而去六尺之杖呂氏春秋曰孔子弟子從遠方來者孔子荷杖問之曰子之父不有患乎摶杖問之曰子母不有患乎置杖問之曰子之兄弟不有患乎杖步而問之曰子之妻子不有患乎故孔子六尺之杖論貴賤之禮辨親疏之義鄧林山海經曰夸父死棄杖化為鄧林扶危郭璞桃杖贊曰簟以寧寢杖以扶危鳩杖五十杖於家六十杖於鄲七十杖於國八十杖於朝函杖席間函杖投杖子夏投其杖而拜曳孔子曳杖植其杖而耘植倚也荷篠以杖荷篠叩原壤之脛原壤夷俟孔子以杖叩其脛策杖而去魯連卻秦軍平原欲封之連遂策杖而去後漢李尤靈壽杖銘曰亭亭奇幹云云乃制為杖扶危定傾後周庾信賦曰桓宣武平荊州外白有人稱楚丘先生來請門下桓公曰名父之子流離江漢孤之責矣乃令引進乃曰噫子老矣雞皮鶴髮蓬頭歷齒乃是江漢英靈荊衡杞梓雖有聞於十室幸無求於千里寡人有銅鈽靈壽銀角桃枝開水瓜而未落養蓮花而未萎迎仙客於錦市送遊籠於葛陂先生將以養老將以扶危先生笑而言曰中國明於禮義暗於知人心之憂矣惟我生民雖復孤條徑柘促節貞筠杖端刻鳥角首圖麟豈能將余此身余之衰矣雖然有以非鬼非蜮心之憂矣未見縱心先求順耳伯玉何嗟丘明惟恥別有九棘龐眉三槐暮齒孔光謝疾袁適致仕明公此贈或非乖理後漢馮衍銘曰杖莫如信行莫如仁惠而無實怨及爾身趙武之珍子罕之寶二子之跡蓋近於道又晉傅咸邛竹杖銘曰立此高節承世矜式又梁簡文楊杖銘曰妙飾佳木游聖振灼排空霧轉騰雲鳳躍厖異玉伸長踰金錯梁劉溉餉任新安因贈詩曰邛竹籍舊聞靈壽堂前識復有冒霜筠寄生桂潭側文彩既斑瀾質性其調直所貴夭夭真為有乘危孔杖而後興柳宗元貶求州司馬雅善蕭俯詒書曰出門見適州閭市井閭市井者其十八九杖而後興自料居此尚復幾何杖履經過齊浣嚴挺之與浣杖履經過杖策柏耆杖策詣淮西行營謁裴度杖銘文粹羅袞杖銘曰身之疲杖以扶之國之危賢以圖之扣杖劉季述以所持扣杖畫地責帝賜靈壽杖李靖賜靈壽杖杖而入見後蜀孟昶即位數月是時李肇自鎮來朝杖而入見稱疾不拜及聞李仁罕死遽釋杖而拜末曲杖唐酉陽雜俎河雲院庫中有劉晏末曲杖是尋運路所乘者木拐契丹犯京師王遣牙將王峻奉表契丹耶律德光呼之為兒賜以木拐一木拐虜貴之如中國几杖非優大臣不可得峻持拐歸虜人望之皆避道五代史高祖本紀若侍穎杖驚神馳思若侍穎杖夢得書緑玉杖手持緑玉杖朝登黃鶴樓李白縮節杖陶家瓶餘事曰徐鳳有一杖直如筆管其後每年生一節二十年後每年縮一節三月即杖之四面青赤白黑各開一花不知何木也杖化懸崖宣室志楊隱之謁唐先生將歸先生以杖畫地視其庭忽杖化縣崖萬仞巖谷重疊謂隱之曰陵谷遽遷子將安歸隱之泣告乃以帚掃之其庭戶如故乃得歸赤藤為杖世未窺臺郎始攜自滇池韓愈和虞部盧汀酬翰林錢徽赤藤杖歌空堂晝眠倚牖戶飛電著壁搜蛟螭上筇筆杖李德裕罷浙西遊甘露寺遺老僧筇竹杖其杖雖竹而方所持向上節眼鬢牙四面對出後數歲再飲朱方居三日到院問前杖何在則老僧規圓而漆之矣公嗟嘆彌日芝田録別杖留青竹李白餞高尊師惟有紅藤杖相隨萬里來紅藤杖白居易詩杖藜長松陰杜甫曰水崔少甫詩杖藜復恣意免值公與侯晦日杖藜出嶇嶔焉得輟兩足杖藜出嶇嶔緩步仍須竹杖扶寒雨接宴身兼杖題壁過眉柱杖班入宅詩杖藜還容拜秋清詩夜明杖隱士郭休有杖夜光明照十步開元腸斷春江欲盡頭杖藜徐步入芳洲杜詩囊橐十五白于橐于囊乃褁餱糧褚中鄭虞人將置荀罌于褚中而出未行而楚人歸之褚小不可懷大綆短不可汲深錐處平原謂毛遂曰賢士若錐處囊今先生未有所稱遂曰使早得處囊必穎脫而出持囊簪筆漢張安世常然有底曰囊無底曰橐千金陸陛使南越越王他賜賈囊中裝直千金一囊錢後漢趙一詩曰文籍徒滿腹不如一囊錢囊衣王陽倫遷徒不過囊衣囊滿褚中弓亡楚地囊粟東方朔言奉一囊粟集上書囊為殿帷漢文帝故事樗里子杜預桓範朝錯人並號為智囊香囊古詩何以致區區耳中雙明珠何以致叩叩香囊懸肘後孔算囊李靖五代孫彥芳其舊物有火鑑大觿算囊等物天子悉留禁中笏囊張九齡體弱有醞藉故事公卿皆搢笏于帶而後乘馬九齡獨常使人持之因設笏囊自九齡始囊橐惟衾衣歸崇敬充吊祭冊立新羅使囊橐惟衾衣古錦囊李賀每旦日騎弱馬從小奚奴背古錦囊遇所得書投囊中未始先立題然後為詩如它人牽合程課者及暮歸足成之香囊玄宗貴妃楊氏縊帝密遣中使具棺槨它葬焉啓瘞故香囊猶在中人以獻帝視之悽感流涕土囊孟簡親吏陸翰主奏邸數傲很簡怒追還以土囊斃之布囊盧懷謹赴東都掌選奉身之具止一布囊油囊穎王璬之出不及受節司馬史賁請建大槊蒙油囊完驅以威道路璬笑曰既為真王安用假節為藥囊晉高祖皇后李氏出帝冊尊為皇太后開運三年十二月邪律德光已降晉兵遣張彥澤以書遺太后目曰吾有梳頭妮子竊一藥囊以奔于晉今皆在否繡囊李蔚始懿宗成安國祠寶坐繡囊錦襜珍麗精絶五色玉香囊唐杜陽編同昌公主乘七寶步輦四面綴五色玉香囊囊中貯辟寒香辟邪香瑞麟香皆異國所獻也仍雜以龍腦金屑刻鏤水晶碼瑙辟塵犀為龍鳳花其上仍絡以真珠玳瑁文金絲為流蘇雕玉為浮動每一出遊則芬馥滿路晶熒照灼觀者眩目承露囊唐姚汝能安祿山事跡天長節祿山進玉石功德等優詔褒美賜承露囊映日紗囊纂異記三方鏡上平都邑以映日紗囊取入禁中麗水囊事略朝真觀九院有三賢松三株如古君子梁閣老妓英奴以麗水囊貯香游之松不數日半枯絲囊隋唐嘉話千秋節士度結承露絲囊相遺瑞龍腦香酉陽雜俎時風吹貴妃領巾於賀懷智巾上良久回身方落賀懷智歸覺滿身香氣非常乃卸袱頭貯於錦囊中及上皇復宮闕追思貴妃不已懷智乃進所貯袱頭具奏他日事上皇發囊泣曰此瑞龍腦香也腰垂虎盤囊李白探囊中物五代南唐世家韓熙載北海將家子也初與李榖相善明宗時熙載南奔吳榖送至正陽酒酣臨訣熙載謂谷曰江左用吾為相取江南如探囊中物爾及周師之徵淮也命榖為將以取淮南而熙載不能有所為也尚書蛟綃皂香囊松窗記白五色江淹夢授五色筆由是文藻日新筆端君子有三端文士之筆端載筆史載筆動則左史書之言則右史書之投筆班超字仲升乃投筆而嘆曰大丈夫安能久事筆硯乎焚筆陸雲與兄機書曰君苗能文每見兄文輒欲焚其筆硯簪筆魏略曰殿中侍御史簪白筆側階而立上問曰此何官也辛毗對曰御史簪筆書過以奏不依古法著於庭戶左思作三都賦門庭戶牖皆著筆硯置於牆柱後漢王充於門戶牆柱置筆硯見事而著論衡八十五篇彤管女史所載詩曰彤管有煒下筆漢陽興賈捐之曰君房下筆言語妙天下君房捐之字也白筆見上注彩毫彩筆不律爾雅曰不律謂之筆蒙恬之制博物志秦蒙恬製筆筆耕班超嘆安能久事筆耕閣筆王粲才既高至於朝廷奏議皆閣筆不敢措手同筆硯漢宣帝微時與張彭祖同筆硯學書筆硯方略薛宣為左馮翊性密靜有思省吏職求其便安至於用筆硯皆為方略利用而費省也納薪灸筆硯魏顏裴字文林為京兆守課人當租輸時車各因便置薪兩束為冬寒炙筆硯於是吏不煩民絶筆獲麟仲尼作春秋絶筆於獲麟染翰含毫陸土衡文賦曰或含毫而邈然不停輟禰衡作鸚鵡賦筆不停輟纖纖端積潤梁徐瑀筆詩纖端功積潤山吳都有硯石山傅玄筆賦曰柔不絲屈剛不玉折傅子象齒之管陳思狡兔之毫孔以筆硯事溫廷皓咸通中署徐州觀察使崔彥曾幕府龐勛反以刃逼廷皓使為表求節度使明日復見勛索表倨答曰我豈以筆硯事汝邪佩筆李靖五世孫彥芳其舊物有佩筆以未為管韜刻金其上別為環以限其間筆尚可用也捉筆賦詩楊師道帝曰聞公每酣賞提筆賦詩如宿創者試為朕為之師道再拜少選輒成無所竄定一坐嗟伏尹卿筆尹思下為司府少卿吏為語曰秪畏尹卿筆治筆研王仲舒召為中書舍人既至視同列率新進少年居不樂曰豈可復治筆研於其間哉筆諫柳公權帝問用筆法對曰心正則筆正筆正乃可法矣時帝荒縱故公權及之帝改容悟其以筆諫也不敢秉筆程异至宰相自以非人望不敢秉筆求掘筆著家傳李繁下嶽從吏求掘筆著家傳援筆皇甫湜裴度辟為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而遠取居易請從此辭度謝之湜即請斗酒飲酣援筆立就十金易一筆彭玕嘗募求西京石經厚賜以金揚州人至相語曰十金易一筆百金償一篇況得士乎斷大事黃碣閩人同列有假其筆者碣怒曰是筆它日斷大事不可假穴石為研秦系客泉州南安有九日山系結盧其上穴石為研注老子狸毛為筆毆陽詢子通晚自矜重以狸毛覆以兔毫管皆象犀非是未嘗書同僚閣筆鄭畋遷中書舍人王師討徐方禁庭書詔旁午畋灑瀚泉涌動無滯思言皆破的同僚閣筆推之仙筆四譜云石晉之末有一高士不顯姓名每夜作筆付其家室至曉闔戶而出以百筒銜壁外向如引水者置錢其中則一管躍出筆盡雖官府勢要無復有也匠婦亦怡然自得如此三十歲時人謂之仙筆酒中下筆胡楚賓秋浦人屬文敏甚必酒中然下筆呼叫狂走下筆張旭蘇州吳人每大醉呼叫狂走乃下筆筆不停書賀知章每醉輒屬辭筆不停書具筆研善草隸好事者具筆研從之供筆札柳璟交宗開成初為翰林學士初芳永泰中按宗正諜斷自武德以昭穆系承撰永泰新譜二十篇璟因召對捃托永泰後事復成之復為十篇戶部供筆札賜筆札陳子昂后召見賜筆札中書省令條上利害管城子韓愈毛穎傳封諸管城虢管城子善隨入意正直斜曲巧拙一隨其人又穎善隨人意正直斜曲巧拙一隨其人雖後見廢棄終默不泄惟不喜武士然見請亦時往纍并中書令高常硯銘又高常硯銘與豫下天壇中路獲硯石似馬蹄狀外稜孤聳內發墨色幽奇天然疑神仙遺物寶而用之請豫銘底弘農陶泓毛穎與弘農陶泓相友善相推致其出處必偕毛錐子五代漢史供肇位方鎮兼中書令洪肇不喜賓客嘗言文人難耐呼我為卒弘肇議帶樞密蘇逢吉以為不可恨之會飲竇貞固第洪肇厲聲曰安朝廷安禍亂直須長槍大劍若毛錐子安足用哉三司使王章曰無毛錐子軍賦何從集乎洪肇默然鐵硯五代桑維翰鑄鐵硯以示人曰硯弊則改而他事卒以進士及第玉硯吳世家楊溥顯德三年世宗征淮南下詔撫安楊氏子孫而李景聞之遣人盡殺其族周先鋒劉重進得其玉硯以獻賜筆渾堿帝狩奉天朱泚方據乾陵帝召堿募突將死士當賊賜瑊筆仗量功署詔不足則署衣以授鹿毛筆地理志蘄州土貢鹿毛筆以木為筆於闐以木為筆獻畫日筆五代蘇循始至魏州晉王大悅明日又獻畫日筆三十管幽人筆汗漫録曰司空圖隱于中條山笈松枝為筆管人問之曰幽人筆當如是洗筆文覽曰白樂天每一詩成輒洗其筆黑水郡王龍鬚志薛稷為筆封墨曹都統黑水郡王表兼毛州刺史離石鄉侯鳳翔退耕傳薛稷為硯封九錫拜離石鄉侯使持節即墨軍事長鐵面尚書見上旋風筆方鎮編年曰魏博田承嗣簽治文案如筒流水吏人私相謂曰世罕有此旋風筆也筆冢李肇國史補長沙僧懷素好草書自然得草書三昧棄筆堆積埋於山下號曰筆冢本傳硫黃酒又房寶師養筆以琉黃酒舒其毫養硯以綾文蓋貴乎膈塵文章貨龍鬚志羅隱喜筆工萇鳳語人曰筆文章貨也吾以物助子取高價即贈鷹頭箋百幅士大夫聞之懷金問價或以深羅大絪換之湧若耶溪徵文玉并張曲江語人曰學者嘗想胸次吞雲夢筆頭湧若耶溪量既并包文亦浩浣毛穎上嘗呼為中書君韓愈毛穎傳中書君老而禿不任吾用吾嘗謂君中書今不中書耶同上楚王廟多磚可為書硯韓愈宜城驛記巨璞禹鑿餘杜甫石硯詩長嘯得石硯巨璞禹鑿余異狀君獨見其滑乃波濤其先或雷電聯坳各盡墨多不遞隱見平侍御硯秀石可硯其壁曰龍壁其下多秀石可硯柳宗元柳州山水記清池韋蘇州對韓少尹所贈硯白水浮香墨清池滿夏雲紫石潭異聞實録徐玄之夜讀書見人物如粟米數百皆具甲胄擁一紫未者行案上傳呼曰蚍蜉王欲觀渙於紫石潭漁具數十入硯中皆獲小魚琉璃硯李白自漢陽歸詩去歲左遷夜郎道琉璃硯水常枯槁管子文文書奇事有書生謁李林甫謂管子文後化為筆也夢遺雙筆李嶠為兒時夢人遺雙筆自是有文辭十五通五經薛元超稱之夢筆花李白少時夢筆頭生花自是才思贍逸天寶遺事官嬪阿筆李白於便殿草詔特大寒筆凍帝使宮嬪阿筆授白同上圓如錐錼如鑿柳公權有筆偈曰圓如錐錼如鑿不得出只得卻蓋是毛出則不堪用南部新書瑩管如玉開元中筆匠能瑩管如玉莫傳其法雜俎旬濡數鋒月禿一把編如蠶頭號汝實切也有兔千萬挾毛止皮圓而不流銛而不欺又載筠束毫既勝且便出笠澤叢書纖鋒細管白樂天與元微之應制各有纖鋒細管筆攜以就試相顧而笑目為毫錐故贈元月穿如毫鋒鋭如錐墨花春李賀研銘紗帷晝暖墨花春端州石匠巧如神踏天磨刀害紫云庸刓抱水含滿脣暗灑萇弘冷血痕兔千五百皮集賢書院歲給河間太原清河洛平四郡兔千五百皮為筆材七寶爐內中有七寶爐硯爐冬寒硯水自銷李政異聞實録非右軍不能諸葛筆宣州諸葛氏能作筆柳公權求之先與三管語其子曰柳學士如能書當留此筆不爾退還即以常筆與之未幾柳以不入用別求筆遂以常筆與之先與者三管非右軍不能諸葛筆也文房四譜結鄰李衛公蓄硯至多其絶妙者曰結鄰言與緑結為鄰也硯有聲鄭朗覆落甚不得志其几案之硯忽作數聲時洪法師在上座曰有聲價之象朗果後入台輔出北夢瑣言博山筆床皇太子初拜給漆筆四枝銅博山筆床副焉東宮宿事瘞破硯文韓文李觀元賓始從進士貢在京師或貽之硯既四年悲歡窮泰未嘗廢其用行於褒谷間役者劉能誤墜之地毀焉乃匣歸埋于京師里中昌黎韓愈其友人也贊且識云土乎質陶乎成器復其質非生死類全斯用毀不忍棄埋而識之仁之義硯乎硯乎與瓦礫異瓦棺筍筆上元縣尾棺寺閣南隅有雙籠閉之忘記歲月會昌中詔折浮圖因開有荀筆余頭藏書秩中有生日藤紙題為南部煙花録僧志徹得録及焚澤氏郡僧經人惜其香軸爭取紙尾折去視其軸皆有魯郡顏公名題云手寫是録即前之苟筆可舉而知也大業拾遺後序銀筆唐韓定辭酬馬或詩盛德好將銀筆述注梁湘東王著書筆有三種忠孝事以金管書之德行以銀管書之文章以竹筆書之夢神授二筆唐末帝時宰相馬裔孫初為河中從事因赴闕宿邏店其地有邏神祠夜夢神見召待以殊禮手授二筆一大一小及為翰林學士以為契鴻筆之兆洎入中書上事堂使奉二筆大小如夢中所得者宮硯玉蟾蜍杜甫雕章五色筆同上筆鋒韓愈題詩尚倚筆鋒徑筆端風生聽者耳駭唐文粹獨孤及李華集序白寸紙張芝伯英善書寸紙不遺紈素韋誕非紈素不妄下筆蔡侯紙後漢蔡倫字敬仲造意用樹皮及敝布庶綱以為紙奏上帝善其能自是莫不用故天下咸稱蔡侯紙花箋桓玄詔命青赤縹緑桃花箋舒卷隨人藤角紙范寧作五色箋石虎詔以五色箋著鳳皇之中乞謝玄就王右軍乞箋紙江洪有詠紅箋詩紙十七孔求廢紙著家傳李繁從吏求廢紙著家傳丐官筆楮王元感所撰書凡數十百篇長安時上之丐官筆楮寫藏祕書徒喪紙札吳筠曰深於道者無如老子五千文其餘徒喪紙札耳似繭而澤日本建中元年使者真人興能獻方物興能善書其紙似繭而澤人莫識以紙萬番贐杜溫補婺州參軍秩滿歸吏以紙萬番贐之暹為受百番毛穎與會稽楮先生友善韓愈毛穎傅毛穎與會稽楮先生友善相推致其出處必偕榖紙蕭廩之放嶺南海多榖紙敕諸子繕補殘書書盈尺之紙韓愈文繡紙文筆襟喉曰蕭穎士以夢有人授紙百番開之皆是以夢有人授紙錦文思乃大進楮國公事略曰薛稷為紙葑九錫拜楮國公白州剌史統領萬字軍略道中郎將桃花紙鳳池編曰楊炎在中書後閣糊窗用桃花紙塗以水油取其甚明柳綿肝文房寶飾毛重教授於導江春日主人宴乃賦散語曰蟣肝之奉何堪龍首之攀可望主人大喜勸以陸源酒賞以柳綿肝洪兒紙童子神通録姜澄十歲苦無紙澄乃燒糠熁竹為紙以供文澄小字洪兒鄉人號洪兒紙養紙以芙蓉粉文房寶飾養紙以芙蓉粉惜其色以五采箋為書記韋陟薛濤箋元和之初薛濤好製小詩惜其幅大不欲長賸乃挾小之蜀才子後減諸箋如是號薛清箋南部新書鴈頭箋羅隱喜筆工萇鳳贈鷹頭箋百幅出龍鬚志烏絲欄唐李肇國史補宋毫間紙有織成界道者謂之烏絲攔紙琅玕紙十幅可為札墨子詞雜俎金花箋帝與妃賞牡丹命李龜年持金花箋賜李白太其外傳造五鳳樓手韓浦洎皆有辭洎常輕浦語人曰吾兄為文譬如繩樞草舍聊避風雨豫之為文是造五鳳樓手浦聞之因親知寄蜀箋題詩贈洎曰老兄得此全無用助爾添修五鳳樓悲剡溪古藤文舒元輿文剡溪多古藤樹方奉且死有言溪中多紙工斬伐無時今士人自言能文者其數與麻竹相多孰非書剡藤者耶雖舉天下為剡溪不足給余謂今之為文者皆天閼剡藤者也巴箋染翰光杜甫寄高岑詩衡陽紙價頓能高杜甫員外春與不知凡幾首衡陽紙價頓能高同上佳句梁華箋暮懷諫紙賜箋藤元稹詩戶部蠲紙五代何鐸戶部歲給蠲符不可勝數而課州縣出號為蠲紙澤上書言其弊明宗下詔悉廢戶部蠲紙手請諫紙白居易與元稹書云身是諫官手請諫紙白臨池張芝伯英臨池學書水盡墨淵雲墨妙嚴樂筆精松上黨郡松心作墨污屏作蠅見屏風門孔燎松丸墨王方翼燎松丸墨為富家腹稿王勃屬文初不精思先磨墨數升則酣飲引被覆面臥及寤援筆成篇不易一字時人謂勃為腹稿濡墨張旭蘇州吳人每大醉以頭濡墨而書絳人陳玄韓愈毛穎傳與絳人陳玄友善非佳墨未嘗輒書裴行儉每曰褚遂良非精筆佳墨未嘗輒書漬墨韓愈詩漬墨竄舊史墨油暈老成相墨經曰墨文如履皮磨之油暈者一兩可染三萬筆黑松使者陶家瓶餘事曰玄宗御按墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬歲曰臣墨之精黑松使者也若世人有文者其墨上皆有龍賓十二上神之乃以墨分賜掌文官善和瘞墨大唐龍髓記曰許足有妙墨八廚巢賊亂瘞于善和里第事平取之墨已不見惟石蓮匣存松煙督護篡異記薛稷為墨封九錫拜玄香太守兼亳州楮郡平章事是日墨吐異氣結成樓臺狀鄰里來觀食久乃滅墨狻猊大唐龍髓記除峰善碁段成式欲盡窮其術峰曰子若以墨狻猊與我當使子過我十倍字能三年不昏相墨經墨染紙三年字不能昏暗者為上天峰煤龍髓記盧杞與馮盛相遇一橐杞發盛囊有墨一枚杞大笑盛正色曰天峰煤和針魚腦入金溪子手中録離騷古本如公止提綾紋剌三印為名利奴顧當熟勝已而搜杞囊果三百剌養墨以豹皮囊文房寶飾曰養墨以豹皮囊貴乎遠濕歲磨半寸相墨經曰凡墨日日用之一歲才減半寸者萬金不換夢墨王勃夢人遺以丸墨盈袖自是文章日進雜俎白彈人避丸傳曰晉靈公不君從臺上彈人觀其避丸以為樂柘彈西京記長安五陵人柘木為彈真珠為丸以彈烏鵲珠丸呂氏春秋曰以隋侯之珠彈千仞之雀世必笑之何也所用重而所要輕蘇合俠客以蘇合本為彈左挾彈右挾丸見戰國策求梟莊子曰見彈而求梟灸敏手暴彈榖梁言晉靈公金彈丸韓嫣以金丸彈射時人語曰若飢寒逐金丸挾彈吳伐齊太子諫曰向來挾彈於後園螳蜋之捕蟬也不知黃雀在傍黃雀不知臣挾彈在後懷丸大丈夫不扶犁鉏而自懷丸挾彈彈梟蕭人惡其聲而彈射之將適吳或謂之曰若能變其聲在楚可也若不能變其聲吳人亦彈射之善彈蕭子顯齊書曰桓崇祖善彈彈鳥毛盡而不死有海鷗群飛崇祖登城西樓彈之無不折翼明珠彈飛肉太玄經云明珠彈於飛肉其得不復泥丸東方朔對驃騎將軍難曰以金丸彈不如泥丸各有所用彈生於古之孝子吳越春秋陳音對越王云弩生於弓弓生於彈彈生於古之孝子古者人民質朴死裹以白茅投之中野孝子不忍父母為禽獸所傷則作彈以守之故古人歌之曰斷竹屬木飛土逐肉孔以丸彈人滕王元嬰以丸彈人觀其走避則樂彈巾王準為衛尉少卿以鬥雞供奉禁中過駙馬都尉王繇以彈彈其巾折玉簪為樂彈捕得鳥玉世克羅取飛鳥書符命於帛繫鳥頸縱之有彈捕得鳥而獻者亦拜官升樓彈射藩鎮王紹鼎升樓彈射路人以為樂以狗馬彈射為樂五代王仁裕少不知書以狗馬彈射為樂巧丸兒韓愈詩遭逢巧丸兒槐膠彈子放懷集李少微子女頗多每退朝於庭樹撤槐膠彈子數百枚令諸小兒爭取之以為戲笑終日不倦戲已復收于篋好彈射徐敬業十餘歲好彈射出雜俎僧靈鑒善彈用洞庭沙岸下土炭末瓷末榆皮泔澱紫礦細紗藤紙渴榻汁九味和齊手丸之陰干出酉陽雜俎鄭寅常詣靈鑒角放彈鄭寅常詣靈鑒角放彈指一樹節其節目相去數十步曰中之獲五千一發而中彈丸及射不破至靈鑒乃陷節碎彈焉出酉陽雜俎五發中心建中初士人韋生路逢一僧因與連鑣言論頗密僧指路謂曰此數里貧道蘭若郎君豈不能左顧乎士人許之行十餘里不至日已沒韋生疑之素善彈乃密於靴中取張御彈懷銅丸十餘乃彈之正中其腦僧初若不覺又五發中之僧始捫中處見阻力至一莊延韋生坐一廳中執韋生手曰貧道盜也君彈悉在手搦腦後五丸墜地焉蓋腦銜彈丸而無傷出酉陽雜俎彈金丸錢鏐每夕彈金丸于牆樓之外宿直者畢應吳越備史挾彈章臺左青雲少年子挾彈章臺左李白少年子挾彈中鶴一目祕書省內薛稷畫鶴元和中韓公武挾彈中鶴一目時謂五絶南部新書健犢須走車破環劉公嘉話丈人曰石季龍挾彈彈人其父怒其母曰健犢須走車破環良馬須逸鞅泛駕然後能負重致遠蓋言童稚不奇不惠非異器也
