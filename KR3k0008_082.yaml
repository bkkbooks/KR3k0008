body:
  text: 卷第八十二白旱暵國乃大旱天災流行天降之災天厲不戒上天降災山陵不收高田不熟水旱咸竭時雨不降百榖不成五榖不滋害於粢盛為災自十月至于五月不雨不為災野無青草雲漢美宣王遇災能懼詩曰旱既大甚耗斁下土旱魃為虐赫赫炎炎如惔如焚滌滌山川歲旱時災若歲大旱用汝作霖雨八月不雨君不舉七年呂氏春秋曰成湯之旱七年煎沙爛石流沙鑠石湯七年旱未睹鸛鳴詩鸛鳴于垤將雨之候也且憂狼顧賈誼曰失時不雨人且狼顧狼顧恐懼貌仰夫膏雨已愆天降之期望彼畢星未及月離之候天厲流行地財耗斁詩耗斁下土注旱害此斁敗也東作既嗟於歲旱南山空望於朝躋屯西郊之雲且聞不雨廢南畝之稼豈望有秋一溉之功夫為稼於代編一有溉之益雖歸燋爛而一溉之旱苗必後枯也大時不齊同年有豐凶之異也禮記懸耜其兩其雨杲杲日出人專望雨而日出也愆陽陽驕憤歎成陰歡娛為旱晉石珩問袁甫曰壽陽已西恆旱已東恆潦何也甫曰壽陽已東吳人也夫亡國之音哀鼎足強邦一朝失職憤歎成陰陰積成冰故恆潦也壽陽已西中國新平強洖美寶盡入志蒲心盈長為旱故公羊曰魯僖公甚悅故旱是以京師若抑強扶弱則天下和平密雲徒自西郊零雨未沾南畝雲重積而又散雨垂下而復收文選水旱免稅令令曰諸田有旱蟲霜處拘見營田州縣撿實具帳申省十損四已上免租稅調七已上課役俱免若桑麥損盡各免其所輸聽折來年經二年後不在折限其應免者通計麥用為分數孔自三月不雨至五月張行成拜左僕射永徽四年自三月不雨至五月行成懼以老乞身訴旱崔蕘出為陝虢觀察使不恤人疾苦或訴旱者指廷樹示之曰柯葉尚爾何旱為即榜笞之頻年霜旱魏徽上疏曰貞觀初頻年霜旱關西小旱耕稼是憂張説疏石然十三年雲陽石然自冬至五月不雨徵上疏極言旱熯之災疏又曰今旱熯之災遠被郡國詔求直言張廷圭玄宗開元初大旱關中飢詔求直言廷圭上疏入秋亢旱辛替否疏曰入秋亢旱草木枯黃下人咨嗟未知所濟雨不時降夏陽驕愆李中敏大和六年天旱文宗內憂詔詢所以致雨者中敏上言雨不時降夏陽驕愆苗欲稿枯陛下憂勤降德音俾下得盡言昔東海誤殺一孝婦大旱三年宋申錫位宰相生平饋致一不受其道徑正姦人忌之陷不測之辜獄不參驗銜恨而歿天下士皆指目鄭注臣知數冤必列訴上帝天之降災殆有由然漢武帝國用空竭然卜式請烹桑弘羊以致雨況申錫之枉天下知之何惜斬一注以快忠臣之魂則天且雨矣帝不省大旱責民逋賦李渤遷江州剌史上言臣州治田二千頃今旱死者千九百頃若徇度支所斂臣懼天下謂陛下當大旱責民三十年逋賦以時救恤李吉甫江淮旱浙東西尤甚有司不為請吉甫曰以時救恤帝驚馳遣使分道賑貸馬燧徙懷州時師旅後大旱田茀不及耕燧務勤教化農告無入段秀實為營田判官是歲大旱農告無入涇大將焦令諶曰我知入不知旱也責之急農無以償往訴秀實秀實書牒免之江淮大旱李絳時江淮大旱帝下赦今有所蠲弛絳言江淮流亡所貸未廣而宮人猥積有怨鬲之思當大出之以省經費問陰陽祲沴鮑防時比歲旱策問陰陽祲沴質對漢故事免三公卜式請烹弘羊指當時輔政者避正殿減膳張薦初貞元時京師旱帝避正殿減膳薦白恨日以應古制上疏許孟容貞元十九年夏大旱上疏理囚繫盧商大中元年春旱詔商與御史中丞封放理囚繫於尚書奏析滻水水溉民田崔珙遷京兆尹會大旱奏析滻水入禁中者取十九溉民田劉蕡策曰臣前所謂救災旱在乎致精誠者臣謹按春秋魯僖公七月之中三書不雨者以人君有恤人之志也文公三年之中一書不雨者以人君無閔人之心也故僖致精誠而旱不害物文無恤閔雨旱則成災矣陛下有恤人之志則無成災之變逋捐系路李翱為廬州時州旱遂疫逋捐係路人情愁惴裴延齡帝罷陸贄宰相時大旱人情愁惴延齡言贄等失權怨望多出宮人鄭覃開成三年旱帝多出宮人李班入賀覃又推贊菽麥失時高郢代宗為太后營章敬寺郢以白衣上書諫曰比八月雨不潤下菽麥失時黔首狼顧憂在艱食若遂不給將何以救之上陳闕政權德輿貞元十九年大旱德輿因是上陳闕政乞盡免江淮兩賦白居易元和四年天子以旱甚下詔有所蠲貸振除災沴居易見詔節未詳即建言乞盡免江淮兩賦歲旱用屈崔貞元元年天子郊見為大禮使歲旱用屈縱撙裁文物儉而不陋災暵成沴盧懷謹曰今民力敝極儻災暵成沴何以濟之乖政之氣張九齡言乖政之氣發為水旱天道雖遠其應甚邇昔樂海枉殺孝婦天旱久之一吏不明匹婦匪命則天昭其冤久旱入境輒雨斐寬出為蒲州刺史州久旱寬入境輒雨時暵之孽裴漼進中書舍人睿宗造金仙玉真二觀時旱甚役不止漼上言今自冬徂春雨不時降人心惟然莫知所出而土木方興時暵之孽職為此發今東作云始丁壯就功妨多益少飢寒有漸春秋莊公三十一年冬不雨是時歲三築臺僖公二十一年夏大旱是時作南門陛下以四方為念宜下明制令二京營作和市木石一切停止不報陰侵於陽吳兢上疏曰自春以來亢陽不雨傳曰敬德不用厥災旱上下蔽隔庶位踰節侵於陽則旱災應煬旱楊炎為相劉文喜不奉詔時方煬旱情騷雋群臣皆請赦文喜帝不聽請蠲租稅嚴郢兼御史中丞會秋旱郢請蠲租稅歲仍旱李栖筠出為常州刺史歲仍旱疫旱王仲舒為婺州刺史州疫旱人徙死幾空居五年里閭增完加金紫服徙蘇州民賦不入除江西觀察使水旱民賦不入歎曰我當減燕樂他用可乎為出錢二萬代之上流亡藉藉杜悰復鎮淮南時方旱道路流亡藉藉權德輿十九年大旱上言十四年夏旱吏趣常賦至縣令為民歐辱者不可不察不害有秋李實拜河南尹貞元二十年旱闕輔飢實方務聚斂以結恩民訴府上一不問德宗訪外疾苦實詭曰歲雖旱不害有秋江淮旱歉韋溫會群臣請上尊號溫固諫今河南水江淮旱歉京師雪積五尺此非崇飾虛名時帝順納無年高瑀領忠武節度使州比水旱無年見堤渠門榖價騰踊紀處訥神龍元年夏大旱榖價騰踊中宗召問所以救之者天乙之武也焦土而爛石楊炯渾天賦旱鉢嚴司空在太原時市童因於水際泅戲見流下一物爭取之乃一瓦瓶重帛羃之市童因就岸撲破有嬰兒長尺餘遂迅走逐之頃刻足下旋風起己蹈數尺近岸舟子遽以篙擊殺之髮朱色日在頂上謂之旱鉢一云旱魃雜俎夏建亢旱韓文論天旱狀今年已來京畿諸縣夏建亢旱秋又旱霜田種所收十不存一女魃五行志人痾永隆元年長安獲女魃長尺有二寸其狀怪異詩曰旱魃為虐如炎如焚是歲秋不雨至于明年正月旱有三唐文粹盛均人旱解涒灘歲越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴士龍舞巫峴愈不雨或言邦有術人能捕退龍而譟之昔歲嘗然濃剩其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其遺囊有書一幅目曰人旱旱有三曰天旱國旱人旱曷為天旱蹇陽肆凶下土祗敬雖六七歲黎民不飢曷為國旱君道熾災德涸仁枯貪風暴氣蒸為時癘曷為人旱邦毀其政吏贓其行千里人心燥不為陰京師孟夏以後旱則先祈嶽鎮海瀆及諸山川能興雲雨者皆於北郊祭又祈祔稷又祈宗廟每月七日皆一祈不雨還從嶽瀆如初旱甚則修雩秋分後雖旱不雩雨足則報祀若州縣則祈社稷及境內山川通典里巷為土龍馬璘拜行營節度使天大旱里巷為土龍聚巫以禱璘曰旱由政不修即令徹之明日雨是歲大穰田不及耕馬燧徙懷州時師旅後歲大旱田茀不及耕燧止橫調畫龍致雨盧氏雜説明皇一年亢旱內中起龍祈雨將作少監馬紹正於屋壁畫西方龍繪事未畢覺黑雲往梁棟俄而龍拿櫻穿屋飛去雨遂足分道賑贍劉思立在高宗時為名御史于時河南北大旱詔進御史中丞崔謐等分道賑贍秋苗耗半蘇源明史思明陷洛陽有詔幸東京將親征源明因上疏極諫曰自春大旱秋苗耗半斂穫未畢先之以清道之役申之以供頓之苦其不可二也青天湛然旱氣轉甚韓愈賀雨表田畝少收是年京師旱田畝少所收上憐民無食兵賦半已休韓愈赴江陵詩有苗盈野而天不雨今農既勤於稼有苗盈野而天不雨祭竹林神文龍怪潛溟波候時救災旱李白流夜郎到西塞驛雨降不濡物良田起黃埃杜詩飛鳥苦熱死池魚涸其泥同上九泉焦枯而四海滲涸兮柳宗元解崇賦天作旱災嘉榖將稿韓文曲江祭龍文求蛇醫王彥威鎮汴夏旱袁王傳李杞過汴因宴王以旱為言李醉曰可求蛇醫數頭作大甕前後設香席選十歲以下小兒十餘令執小青竹晝夜更互擊其甕不令少輟王如言試之雨大注數百里舊説龍與蛇為親家南部新書皇帝親臨長安萬年二赤縣決獄膏雨沾足杜甫説旱冬麥黃枯春種不入上怨氣積冤氣盛亦能致旱同上稚老孤窮指苗然鼎將穗秀矣忍令莠死以絶民命杜牧祭神苗方甲而水湮之苗秀好而旱秀之同上以蓬子為麵懿宗時自關中至海大旱冬蔬皆盡貧者以蓬子為麵槐葉為虀唐食貨志前年關中旱閭里多死飢韓愈歸彭城大旱許孟容上疏言陛下齋居損膳具牲玉走群望而天意未答豈豐歉有定陰陽適然乎切惟天人交感之際繫教令順民與否今順人奉天而神弗祐歲弗稔未之聞也種不入土野無青草韓愈上李尚書今年以來不雨者百有餘日種不入土野無青草若旱之望雨廬陵郡王瑗為幽州都督兵曹參軍王利涉説瑗曰若諸刺史召之不至將何以全瑗曰奈何對曰山東豪傑嘗為竇建德所用今失職與編戶夷此其思亂若旱之望雨退藏恨雨師健步聞旱魃杜甫白修城勸分魯大旱欲焚巫尪臧文仲曰非旱備也修城郭貶食省用務嗇勸分此其務也徙市見下祈禱門恤人之心救患之策有備無患無虞耗斁為災雖爽月離之作流行有備則無歲取之虞愆陽為沴歲不順布布政有經衆無匡懼存救之術禮曰九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂方二三千里賈誼曰不幸有方二三千里之旱胡以相恤孔置錢河陰院以虞水旱歸融盧周仁取羡錢進京師融劾奏詔不從置錢河陰院以虞水旱義倉薛訥為藍田令有富商倪氏於御史臺理其私債中丞來俊臣受其貨財斷出義倉米二千石以給之訥曰義倉本備水旱以為儲蓄安敢絶衆人之命以資一家之産竟報上不與白有事於山川衛大旱有事於山川不吉興師伐邢而雨龍見而雩龍見建巳之月祭天為百榖祈甘雨桑林之禱湯克夏大旱湯乃以身禱于桑林剪瓜髮自以為犧牲以祈於天雨大至人悅之潛龍蟠於沮澤應鳴鼓以降雨蜀都賦靡神不舉雲漢詩曰自郊徂宮上下奠瘞靡神不舉靡愛斯牲圭璧既卒寧莫我聽詩禜之鄭子産曰山川之神則水旱厲疫之災於是乎禜之雩禜精誠隨車百里嵩為徐州境內旱嵩行部所經雨輒隨車而霪禮崇禋祀鑒享精誠信天厲之可移冀地財之不害設玄寺建靈寺並祈雨之所見文選土龍矯首而立女巫頓足而舞歲屬亢陽禮修禱祝念夫膏澤既愆天降之期感以精誠惟望月離之應祈年求豐年也望歲曝身祝長字幼卿為洛陽令時亢旱長為曝身階庭引罪自咎甘雨乃降人歌詠之積薪後漢諒輔為五官掾時太守禱無應輒自曝身庭中自責祝曰日中不雨以身寒無狀乃積薪自環日未中霪雨一郡皆沾足又戴封為西華令大旱封欲焚軀俄而雨至春至秋禜謂雩禜水旱之神周禮俾率舞於小巫庶祈年於大有並走群望展禮雩壇焚巫尪魯大旱公欲焚巫尪臧文仲曰天欲殺之則如勿生若能為旱焚之滋甚也暴巫尪禮歲旱穆公召縣子而問焉曰吾欲暴巫而奚若對曰天則不雨而暴人之疾不可吾欲暴尪而奚若對曰天則不雨而望之愚婦人無乃疏乎為之徙市不亦可乎周禮春官女巫職歲旱暵則舞雩邦有大災則歌哭以請或歌或哭冀以悲哀感神明也月令孟夏大雩帝禱祠山川古之卿士有益於人者以祈榖實雩祭天祈雨也山川古卿士能致雲雨者皆祭之徙市見上用師衛大旱卜有事於山川不吉寧莊子曰昔周飢克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而雨傳洗兵武王伐紂大雨洗兵閉陽門董仲舒曰以春秋災異之變推陰陽之所錯行故求雨閉陽門雨甚欲止則反是斬山木鄭大旱使屠擊祝頴豎拊有事於桑山斬其木不雨子産曰有事於山藝山林而斬其木其罪大矣奪之官邑秋再雩春秋昭二十五年秋九月上辛大雩季辛又雩傳曰秋書大雩旱甚也凡天災有幣無牲祈以幣更以幣代牲殺孝婦桔旱東海孝婦養姑甚謹姑恐纍不得嫁遂自縊死姑女告婦殺姑婦自誣服罪其獄上府於公為縣吏明其枉竟殺此婦東海枯旱三年後太守至問其故於是殺牛祭孝婦冢即日而注大雨上虞寡婦上虞寡婦養姑姑死夫女弟素與婦不協誣婦鴆殺母縣竟殺之旱二年孟嘗是時明之不得後太守殷舟至嘗具言之祭婦遂雨去姦河南春夏旱太守魯褒至屏退姦殘澍雨數降録囚後漢和帝時旱帝行洛府寺録囚舉冤滯收洛陽令抵罪司隸河南尹左降未及還宮澍雨也請修政周舉宣光時三輔旱請雨舉書云云宜出後宮不御之女治天下冤滯之獄除大官重職之費云云請烹大臣桑弘羊為御史大夫興榷酤鹽鐵之利時天下大旱卜式曰弘羊為天子大臣而與小人爭利烹弘羊天乃大雨掩骼周暢為河南尹時久旱祈雨無應暢因收葬洛陽城旁客死骼骨以萬餘人應時雨大豐稔天文推步楊統授河洛書及天文推步之術為彭城令時旱統推陰陽消復縣蒙澤太守使為郡求雨亦降自是朝廷災異多訪之至誠束晰為廣陵郡纍大旱晰請雨三日雨澍衆謂晰至誠乃歌曰束先生通神明祈禱令祠令云京師四月已降旱則祈雨理冤獄賑窮乏掩骼埋胔先祈嶽鎮海瀆及祈山川能出雲者北郊望而告之又祈社稷不雨則徙其市孔祠曲江池孔戢授京兆尹歲旱文宗憂甚戢躬祠曲江池一夕大澍造土龍黎幹復為京兆尹時大旱幹造土龍自與巫峴對舞彌月不應又禱孔子廟帝笑曰丘之禱久矣使毀土龍帝減膳節用既而霪雨由政不修馬璘邠寧節度使天大旱里巷為土龍聚巫以禱璘曰旱由政不修即命徹之明日雨自暴以祈田仁會為平州刺史歲旱自暴以祈而雨大至榖遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廩實兮禮義申願君常在兮不患貧禱乾陵而雨外戚武三思明年春大旱帝遣三思攸暨禱乾陵而雨帝悅周王徒勤于方嶽商帝虛美于桑林柳宗元文商后徒勤於自剪周公空愧於舞雩同上瑞鳥迎舟掩商羊之舞仙雲覆水協從龍之徵同上木神不空每祈曰無它軌則但設敷繡座手簸旋數寸木神念咒擲之自立於座上伺木神吻角牙出目瞑則雨至酉陽雜俎鏡龍僧一行開元中嘗旱玄宗令祈雨一行言當得一器上有龍狀者方可令於內庫中遍視之皆言不類數日後指一古鏡鼻瀊龍喜曰此有真龍矣乃持入道場一夕而雨同上指拂雲氣從容録魏郡開成中大旱遍禱山嶽不應或言西況山陸先生道行精明請之必驗太守已下乃攜杏酒青羊以備牲醪告于山中先生受禮訖對太守呼吸數過五指連拂之爪甲間皆出雲煙之氣惟中指氣象甚盛先生曰郡中雨得周足諸縣皆獲八分亦可小稔已而其説不誣清風時興白日顯行若響若答糞除天地山川清風時興白日顯行韓愈潮州禱晴文劃蠫雲陰卷日月也同上雖屢舞仙仙而靈應未若王維京兆張公德政碑仍歲大旱郡祠介推雖屢舞仙仙而靈應未若公命束蘊取火伐樹置薪釃酒而祝曰有功於人祀為明神無德而祿禍亦覆餗自絳已來人實祀子純犧大璧不敢愛必以薦也童兒季女不敢黷必以敬也神既靡答人將安仰若亭午而雨則植其鷺羽執此騂毛不然者火燎將至焮天燦地靈衣且為煨燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周於闔境無畏致雨上今無畏求雨曰旱數當然求龍適足致暴雨爾乃盡去求雨之具以一鉢水小刀攪之作胡言須臾龍如指大入鉢中復攪咒之白氣自鉢中出加煙一匹練少頃大風雨震雷零雨隨車或當宵而應唐贊皇公禱祝論歲或大旱必先令掾屬祈請積旬無效乃自躬行未嘗不零雨隨車或當宵而應其術無他唯至誠而已將與祭必間居三日清心齋戒雖禮未申於泂酌而意已接於神明所以理郡八年歲皆大稔江左黎庶謳謠至今剪爪致詞積薪自誓古人乃有剪爪致詞積薪自誓精意上達而雨必滂沱此亦至誠同上玉龍明皇別録玉龍子太宗於晉陽得之開元中三輔大旱帝命密投玉龍於南內龍池雲雨隨作雞跖集絳幡祈雨唐文粹羅隱請旱癸巳日詔疏夏五月京畿旱癸巳日聞詔大京兆用器水爐香蒲蕭絳幡輩致於坊市門將用舊法而召雨也臣聞天之有雨澤猶陛下之有渥恩雨澤可以委曲于之則陛下渥恩亦可以委曲于之矣彼蒲蕭輩何足以動天臣請追癸巳日詔敢告誅黑蜧抶陰霓柳宗元祈晴文納其雲氣復我川澤禜門文同上衆靈受職薈蔚且躋於南山百榖仰榮滂濡遂霑於東作柳宗元焚白檀香龍明皇又嘗詔術士羅公遠與不空同祈雨令校功力上俱召問之不空曰臣昨焚白檀香龍上令左右掬庭水嗅之果有檀香氣段文昌徙荊南州或旱禬禱必雨或久雨遇出遊必霽民為語曰旱不苦禱而雨雨不愁公出遊唐史水潦四白平原出水為大水天作淫雨害於粢盛宋大水公使人吊之云云天降之災秋大水鼓用牲于社于門非常也鄭大水龍斗於時門之外洧泉水潦將降懼不得歸荀偃士丐請於荀罃請班師高下有水災為大水榖梁水訛言水至漢建始三年秋京師相驚言大水至百姓奔走相蹂躪王鳳言太后上及後宮可御船王商曰自古無道水猶不冒城郭今政化和平此必訛言俄而定鳳大慚先徙高地公沙穆為弘農令元壽元年三輔已東漂沒穆曉占乃預告百姓徙高地遂得免沒溺之憂下民昏墊凡雨自三日已往為霖救水以鼓衆榖梁雨水不時禮下水上騰水潦為敗苦雨數來墊溺水損免稅具旱門注水潦敗國禜用赤幘晉書雨多則禜祭用赤幘朱衣閉諸陰朱紫禜社伐朱鼓孔漂居人六百家魏徵是歲大雨榖洛溢毀官寺十九漂居人六百家徵陳事山東及江淮大水虞世南貞觀八年山東及江淮大水帝憂之問世南對恐有冤獄枉大宜省録纍囚水氣勃戾宋務光神龍元年大水詔九品以上官直言極諫務光上書曰切見自夏以來水氣勃戾天下多懼其災洛水瀑漲漂損百姓傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗自陛下御極郊廟山川不時薦見又水者陰類臣妾之道氣盛則水泉溢須虹蜆紛錯著雨滯霪陰勝之沴也後廷近習或有離中饋之職以干外政願深思天變杜絶其萌壞廬舍權德輿貞元八年關東淮南浙西州縣皆大水壞廬舍漂殺人德輿建言宜擇群臣明識通方者持節勞徠韋巨源遷侍中武三思封戶貝州屬大水刺史宋璟義免其租巨源以為蠶桑可輸繇是河朔人多流徙者秋雨害稼裴耀卿開元二十年遷京兆尹明年秋雨害稼帝將幸東都召問所以救人者雨潦敗稼崔沔為魏州刺史雨潦敗稼沔弛禁便人行水魏王堤李訥為河南尹時久雨洛暴漲訥行水魏王堤懼漂溺疾馳去水遂大毀民廬損田韓滉以戶部侍郎判度支大歷十二年秋大雨害稼什八京兆尹黎幹言狀滉恐有所蠲貸固表不實代宗命御史行視實損田三萬餘頃始渭南令劉藻附滉言部田無害御史趙計按驗如藻言帝又遣御史朱敖覆實害田三千頃帝怒曰縣令所以養民而田損不問豈恤隱意耶貶南浦員外尉計亦斥為豐州司戶員外參軍霖潦戴胄帝將修復洛陽宮胄諫曰七月以來霖潦未止濱河南北田正汙下年之有無未可知三鴉谷水五行志景龍八年鄧州三鴉口大水塞谷或見二小兒以水相沃須臾有蛇大十圍張口俾天人或斫射之俄而暴雷雨漂溺數百家岸有善崩流或斷堤泛濫疇壟破阤圃畦柳宗元祈晴文野夫興憂官守增惕敬用瓢齊以展周索同上天涯歇滯雨粳稻臥不翻杜甫霖雨閉坊門宋務光今霖雨閉坊門豈一坊一市能感發天道哉必不然矣故里人呼坊門為宰相謂能節宣風雨天工人代乃為虛設六陰作潦而不就歐陽詹德勝頌水潦為災竇建德方今水潦為災民力刓敝主上不是恤而親駕臨遼去歲東郡水生民為流尸韓愈歸彭城白懸磬傳室如懸磬野無青草凶年荒政百姓不足君孰與足五穀不熟其國乃虛歲凶年榖不登年雖大殺殺飢年不順成天災流行國家代有大侵榖梁五穀不熟為大侵大侵之禮君膳不祭肺馬不食榖陽九之厄甚虛之食四阻防飢百姓艱食人困國虛土虛人耗不飢何為流亡詩曰瘼我飢饉民卒流亡瘼病也大荒凶年年無儲蓄之歲祈年不應周禮祈年祈豐年也野荒人散周禮餒在其中大時不齊同年有豐凶之異風雨不節則飢翔踴翔貴懸耜水旱為災蒸犁孔疼軍無見糧歲惡不入人賣爵子賣爵及子堯水湯旱孔給米孝敬皇帝弘帝幸東都詔監國時關中飢弘視廡下兵食有榆皮蓬實者悄然命家令寺給米飢人就食李績破王世充密署東海郡公是時河南山東大水隋帝令飢人就食黎陽倉吏不時發死者日數萬百姓荐飢陳子昂高宗崩將遷梓宮長安於是關中無歲子昂盛言東都勝塏可營山陵上書曰頃遭荒饉百姓荐飢薄河而右惟有赤地循壟以北不逢青草父兄轉徙妻子流離賴天悔禍去年薄稔重繭走治下王方翼遷肅州刺史它郡民或綏死皆重繭走方翼治下乃出私錢作水磑薄其贏以濟飢瘵創舍數十百楹居之全活甚衆拾橡實以飯崔從歲飢拾橡實以飯荒饉日甚張廷圭疏曰或謂天戒不足畏而上帝馮怒風雨迷錯荒饉日甚則無以濟下矣南方連饉敬晦歷浙西觀察使時南方連饉有詔弛榷酒茗官用告要晦處身儉勤資力遂充請出米三十萬石贍貧民楊於陵遷浙東觀察使越人飢請出米三十萬石贍貧民賜米使賑飢捐丁公著長慶中浙東災癘拜觀察使詔賜米七萬斛使賑飢捐削木皮以食李密淮陽歲飢削木皮以食斂封植宋璟檢校貝州刺史時河北水歲大飢三思使斂封植璟拒不與故為所擠採木實野蔬而食五代晉高祖皇后李氏從帝而北出榆闕行砂磧中飢不得食遣宮女從官採木實野蔬而食斗易一縑陸贄奏議正觀之初薦屬霜旱自關輔綿及三河之地米價踴貴斗易一縑道路之間餒而相藉路有委骨文粹王維張公公德政碑野無遺粳路有委骨減雙雞之膳同上王維張公德政碑饔人減雙雞之膳圉人省五馬之秣陶不獻服污不塓館自身以往振廩同食雖人煙不動道饉相望見饉不驚李華中書政事堂記聞荒不救見饉不驚此堂得以殺之民漉漕渠遺米杜悰方旱道路流亡藉藉民至漉漕渠遺米自給呼為聖米取陂澤茭蒲實皆盡歲飢骨相枕於野劉武周為鷹楊府校尉見天下已亂陰有異計因宣言于衆曰今歲飢死者骨相枕於野府君閉倉不恤豈憂百姓意乎以市怒其軍皆憤怨人大餒死者係路朱粲傳至有樵蘇莫爨粳麧靡資不暇聊生方憂轉死張廷圭請崇儉約疏白家室相棄道殣相望殣餓死也菜色病莫能興隱人多取食焉隱困窮也貿貿然來嗟來之食齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫惟不食嗟來之食以至於斯也從而謝焉終不食而死曾子聞之曰微與其嗟也可去其謝也可食貿貿目不明貌在陳子在陳絶糧首陽伯夷叔齊餓于首陽之下相食漢河內飢父子相食汲黯開倉而賑之棄子文選路逢飢婦人抱子棄草間囂然思食文選野有餓殍孟子餒在其中有餒而已衛寧惠子曰吾餒而已不來食之易子而食楚人圍宋翳桑之餓人趙宣子初田於首山舍翳桑見靈輒餓曰不食三日矣與之簞食後倒戈以報宣子惄如調飢餒而食雀鷇史主父餓採而食雀鷇之主父趙武靈王也半菽漢書今歲飢人困卒食半菽軍無見糧言士卒菜半以菽雜之飢色漢千里饋糧士有飢色師不宿飽樵蘇晚爨云云人不能二釜周禮廩人職二釜月糧也食蒲螺吳志人飢移就食蒲螺於東海之濱孔絶廩徐曠世充僣號以為國子博士子士會奔長安世充怒絶其廩文遠餓幾死數矣仆于行間史思明陷洛陽有詔幸東京將親征蘇源明因上疏極諫曰每立殿廄見旌旗之下餓夫執殳仆于行間日見二三市井殍餒求食死于路旁日見四五甚不可三也人餓死牆壁間李晟言赦懷光有五不可今河中米斗五百芻稿且罄人餓死牆壁間其大將殺戮盡朱克融等客長安餓且死不得一官蕭俯贊持男易斗粟掉臂莫肯酬韓文有司恤經費未免煩徵求富者既云急貧者固已流傳聞閭里間赤子棄渠溝持男易斗粟掉臂莫肯酬我時出衢路餓者何其稠親逢道死者佇立久咿嘎顏回忍飢面秦韜玉貴公子行云階前莎毯緑不捲銀龜噴香挽不斷亂花織錦柳撚線粧點池臺畫屏展主人功業傳國初六親聯絡馳朝車斗雞走狗家世事抱來皆著黃金魚卻笑儒生把書卷學得顏回忍飢面使不至於凍餒人凍而後衣之人餒而後食之惠則惠矣不若輕其徭薄其稅使不至於凍餒也白居易策朱門酒肉臭路有凍死骨杜甫荒政七白歲凶年榖不登君膳不祭胏不殺牲也馬不食榖馳道不除祭祀不懸不懸徹樂也是故年雖大殺衆不匡懼年不順成則天子素服乘素車食無樂君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬也凶年則乘駑馬祀以下牲取易供也臧文仲曰貶食省用務穡勸分此其務也歲凶君食不兼味廷道不除百官布而不制鬼神禱而不祀施舍施恩惠舍役力巳責止逋責周禮以荒政十二聚萬人一曰散利貨糧食也二曰薄征謂輕租稅三曰緩刑四曰弛力謂息力役五曰舍禁公無私禁六曰去幾去關中之征七曰省禮謂省吉禮八曰殺哀謂省凶禮九曰蕃樂藏樂器不作十曰多婚不備禮而婚娶十一曰索鬼神求廢祝而修十二曰除盜賊飢則多盜不可不去喪荒之式太宰以九式均節財用二曰喪荒之式用財之節度也荒凶年也荒禮凶年之禮不儉祭豐年不奢凶年不儉移人就榖周禮廩人以歲上下數用凡民食上歲人四釜中歲人三釜下二釜若食人不能二釜則移人就榖注四釜三釜人一斤米也輸粟周禮大荒令邦國移人人有守不可移者令輸粟國凶荒禮喪則市不征而作布物歸市不稅民困金銅每荒年因物貴大鑄泉布饒也賙委卜行人凶荒令賙委蠟不通年不順成其蠟不通以謹民財也順成之方其蠟乃通以移民也急疾就食漢關中飢高祖令人得賣子就食蜀漢煮木為酪王莽時南方枯旱榖翔踴使民煮木為酪又不可食重為煩擾注為杏酪之屬也載榖入關無用傳宣語種蕪菁後漢令水傷處種蕪菁助食掘鳧茈王莽末南方飢人掘鳧茈食之國語天災則棄責薄斂市無赤米赤米米之姦言飢也凶年則力政不均地亦不平計地稅也均人職云云孔仍歲無年韋雲起時議討王世充雲起上言京師初平人未堅附百姓流離云云州縣刓敝陸希聲為右拾遺時憸腐秉權歲數歉梁宋尤甚希聲見州縣刓敝上言當謹視盜賊養人息兵張廷圭將襲回紇廷圭陳五不可天下無年當養人息兵五也衣馬牛之衣食犬彘之食宋務光疏曰數年以來公私乏竭戶口減耗家無接新之儲國乏俟荒之蓄陛下近觀朝市則以為既庶且富試踐閭陌則百姓衣馬牛之衣食犬彘之食薄河而右惟有赤地循隴以北不逢青草陳子昂上言頃遭荒饉百姓荐飢薄河而右惟有赤地循隴以北不逢青草山東飢關隴弊生人流亡誠陛下寧靜思和天人之時安可動甲兵興大役同上痍荒之餘殷侑拜義昌軍節度使於時痍荒之余骸骨蔽野壚里生荊棘居無尺椽爨無盛煙劉晏移書於宰相元載以為大抵運之利與害各有四起宜陽熊耳虎牢成皋五百里見戶才斗餘居無尺掾爨無盛煙獸遊鬼哭而使轉車挽漕功且難就為一病雖有數斗玉不如一盤粟李白書懷贈南陵宮贊府富者既云急貧者固已流韓愈赴江陵持男易斗粟傳聞閭里間赤子棄渠溝持男易斗粟掉臂莫肯酬屬歲無秋崔衍國儲無兼年張玄素遺粳野無遺粳路有委骨張公德政碑文粹王維荒歉韋蘇州始至郡詩旱歲屬荒歉舊逋積如坻埃壒塵勃吳興不雨埃壒塵勃葩拆穗結十無一二群鼠夜出嚙而僵之信宿食殆盡雖盧守板擊驅而駭之而不能勝笠澤叢書人之生産空於杼軸獨孤及上疏師興不息十年矣人之生産空於杼軸擁兵者第館亙街陌奴婢厭酒肉而貧人羸餓就役剝膚及髓長安城中自晝椎剽吏不敢詰官亂職廢將墮卒暴百揆隳剌如沸粥紛麻民不敢訴於有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子咬骨矣陛下不以此時厲精更始思所以救之之術忍令宗廟有纍卵之危萬姓悼心失圖臣實懼焉白周急不繼富君子云云救災開倉漢河內飢父子相食汲黯使至河內因矯制開倉賑之朝廷不坐罪滯積困人傳曰晉飢悼公謀息人乃輸積聚以貸自公已下苟有積者盡出之國無滯積亦無困人振廩楚大飢莊公乃睚廬以往振廩同食注振廩開倉同食上下無異食也竭粟宋公子鮑禮於國人宋飢竭其粟而貸之一鐘之餼鄭飢人未及麥人病子皮以子展之命餼國人粟戶一鐘貸而不書施而不德宋飢司城子罕請出粟以貸司城氏貸而不書宋無飢人叔向曰樂氏其以宋升降乎施而不德貸而不書公粟見上施取其厚傳有施於人釜鐘之數傳陳氏有施於人人歸之矣豆區釜鐘之數其取之公也薄其施之民也厚謂陳氏三量皆登一焉以家量貸而以公量收之博施濟衆子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸匡乏匡救厚施散利具荒政門野有餓殍而知發發散也儲蓄虞災振窮振乏絶月令季春天子乃命有司發倉廩賜貧窮振乏絶賙萬人之艱厄周禮鄉師以歲時巡國及野而賙萬人之艱厄以王命施惠注厄飢困也棄債晉王長文德濬太康中蜀土荒饉開倉賑貸長文居貧多無以償郡縣切責送到州刺史徐幹舍之不謝而去擅賑施後漢王望為青州刺史行部見飢寒者愍之以便宜出所在布粟賑給之上欲罪之鐘離意云云乃赦之不待奏報第五訪仲謀為張掖守歲飢開倉賑給吏爭欲上言訪曰若須奏報是棄人也寧以身救百姓上嘉之又韓韶仲黃為贏長開倉賑贍民主者謂不可韶曰以此伏罪含笑入地太守知韶名德不坐擅賑左降晉王蘊叔仁為吳興守郡荒賑恤主簿爭云朝廷以為枓罪免官士庶諸闕特左降晉陵守除名劉頌子雅奉使于蜀表請賑貸不待報乃行而除名也免官鄧攸伯道以吳郡守表賑貸未報開倉坐免官貸喪祭漢王莽時人欲祭祀喪紀而無用者錢府以所入工商之貢但賒之祭祀無過每日喪紀無過三月依周禮也取利晉張駿境內飢談詳時出倉榖貸取三倍利陰據曰是因飢要利乃止也孔發廩自劾宗室皋貶溫州長史俄攝州事州大飢發官廩數十萬石賑餓者僚史叩庭請先以聞皋曰人日不再食日死何俟命後發哉苟殺我而活衆其利大矣既貸乃自劾出粟賑鄉里陳子昂父元敬世高資歲飢出粟萬石賑鄉里遣使賑飢民虞世南貞觀八年隴右山崩大蛇屢見山東及江淮大水帝憂之以問世南對宜省録纍囚於是遣使賑飢民開廩賑民王珣出許州長史珣歲旱時假刺史事開廩賑民即自劾玄宗赦之璽書褒美韓思彥巡察劍南會蜀大飢開倉賑民然後以聞璽書褒美下賴以濟員半于調武陟尉歲旱勸令殷子良發粟賑民不從及子良謁州半千悉發之下賴以濟大旱輒開倉韓思復調梁府倉曹參軍會大旱輒開倉賑民州劾責對曰人窮則濫不如因而活之無趣為盜賊州不能詘以時救恤李吉甫江淮旱吉甫曰以時救恤帝遣使分道賑貸賑民無所計潘孟陽罷為大進卿其後左司郎中鄭敬宣慰江淮帝誡曰朕宮中用尺寸物皆有籍惟賑民無所計卿是行宣諭朕意職田賑貧民庾敬休言蜀道米價騰踴百姓流亡請以本道闕官職田賑貧民詔可李玨江淮皋發倉廩賑流民崔沔改虞部郎中請發太倉粟及減苑囿鳥獸所給以賑貧乏人賴其利發倉廥盧從願開元二十年河北飢詔為宣撫處置使發倉廥賑飢民雖旱人不流捐崔衍嗇用度府庫充衍及穆贊代州以錢四十萬緡假民賦故雖旱人不流捐由衍蓄積有素也具餰鬻李萼遷南華令大水它縣飢人至相屬萼為具餰鬻及去糗糧送之救災者勿使至賑給劉晏每州縣荒歉有端則計官所羸先令曰蠲某物貸某戶民未及因而奏報已行矣議者或譏晏不直賑救而多賤出以濟民者則又不然善治病者不使至危憊善救災者勿使至賑給故賑給少則不足活人活人多則闕國用國用闕則復重斂之矣問米救旱芝田録令狐文公除守兗州州境方旱米價甚高迓吏至公首問米價幾何用有幾倉問訖屈指獨語曰舊價若十四倉各出米若干定價出糶則可以賑救矣左右聽之流語達郡中富人競出其所蓄物價頓平民心欣然得雨遂成豐年矣每旱潦必貸匱蠲負里無逋家柳仲郢又賑給近僥幸劉晏既被誣而舊吏推明其陳諫以為管蕭之亞著論紀其詳又賑給近僥幸吏下為姦強得之多弱得之少雖刀鋸在前不可禁以為二害災沴之鄉所乏糧耳它産尚在賤以出之易其雜貨因人之力轉於豐處或官自用則國計不乏多出菽粟恣之糶運散入村閭下戶力農不能詣市轉粗沾逮自免阻飢不待令驅以為二勝家得儲三十斛王起歷河中節度使方蝗旱粟價騰踴起下令家得儲三十斛斥其餘以市否者死神策士怙勢不從置于法由是廥積咸出民賴以生本傳以賤直售民為信州刺史歲大旱發倉以賤直售民故飢而不亡再斯增戶五千孫成李襲譽三輔盜蟻聚襲譽請以兵據永豐倉發粟賑窮乏劉思立時遣御史分道賑贍思立建言賑給須立簿最稽出入往返停滯白請糴傳曰京師來告飢魯俟為請糴於宋衛齊鄭禮也乞糴泛舟晉荐飢乞糴于秦百里奚曰天災流行國家代有救災恤鄰道也秦於是輸粟於晉自雍及絳相繼命之曰泛舟之役閉糴傳曰晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉獲晉侯告糴傳曰冬無麥禾臧孫臣告糴于齊卿出告糴古之制也鬯圭玉磬敢告滯積國語魯飢臧文仲請糴于齊公曰誰使之文仲曰卿出告糴古之制也幸備卿公使往遂以鬯圭玉磬如齊告糴曰敝邑荐飢大懼周公太公之命祀而獲戾不腆先君之敝器敢告滯積以紓執事救敝邑使能供職榖梁傳臧孫辰告糴于齊國無三年之蓄曰國非其國也一年不升告糴諸侯不正也故舉臧孫辰以為私行也為內諱故不言使若私行也言內無外交榖梁臧孫辰告糴于齊諸侯相歸粟正也告然後與之言內之匡救其災同恤災危備救凶患乞糴葵丘盟曰無乞糴蘊年無蘊年謂蘊蓄年榖而閉糴也若虛其請凶年補敗或闕於宿儲善鄰恤災方資於乞糴周急矜無所宜歸粟歸粟于蔡以周亟矜無資幸災斂怨安可蘊年見上災維代有宜酌義於泛舟仁必矜無豈忘情於歸粟匡困資無孔貿易不出境崔倰遷湖南觀察使湖南舊法雖豐年貿易不出境鄰部災荒不恤也倰至謂屬吏曰此豈人情乎無閉糴以重困吾民削其禁閉粟李軌屬荐飢人相食軌毀家資賑之不能給議發倉粟曹珍亦勸之謝統師語珍曰百姓餓死皆弱不足事者壯勇士終不肯困且儲廩以備不虞豈宜妄散惠孱小乎僕射苟附下非國計軌曰善乃閉粟下益怨多欲叛去白蠶事繭稅月令桑土既蠶書八月載績詩無伐桑柘月令季春受蠶食也蠶事既登孟夏蠶室具下蠶則績而蟹有筐蠶織詩曰婦無公事休其蠶織桑于南陌蠶于南郊禹貢厥篚檿絲桑之絲可中琴瑟弦書遵乃修之文器宜合禮月令季春乃修修蠶器趨既登之日事必及時不衰不帛周禮庶人不蠶者不帛不績者不衰所以恥不勉女事禁原蠶原再也蠶與桑馬同氣物莫能兩大禁再蠶為傷馬也周禮孔河內千樹李襲譽嘗謂子孫曰河內千樹桑事之可以衣以蠶折租張廷圭出為沔州刺史頻徙蘇宋魏三州景龍中宗楚客紀處訥武延秀韋溫等封戶多在河南河北諷朝廷詔兩道蠶産所宜雖水旱得以蠶折租廷圭願依貞觀永徽故事準令折免詔可蠶歲四熟尹思貞為青州刺史治州有績蠶至歲四熟蠶桑可輸韋巨源武三思封戶在貝州屬大水刺史宋璟議免其租巨源以為蠶桑可輸何易于曰方春百姓耕且蠶見耕耘門蠶務劉思立于時河南北大旱詔遣御史中丞崔謐等分道賑贍思立建言蠶務未畢而遣使撫巡所至不能無勞春耕夏蠶突厥序孫樵謂春耕夏蠶以資衣食白眼蜂豐寧傳蠶退之後多為乾臘貨之開元中春末兩市白眼蜂如山市人以此卜絲帛之豐儉吳地桑葉緑吳蠶已三眠李白寄東魯及此柔桑緑春蠶起中國同上若布與帛必蠶績而后成也韓愈圬者傳椹黑老蠶蠋城南聯句滿箔春蠶看滿箔堰城聯句初無桑蠶于闐初無桑蠶丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中關守不敢驗自是始有蠶女約刻石無殺蠶蛾飛盡得治繭秦地羅敷女採桑艱水邊素手青條上紅粧白日鮮蠶飢妾欲去五馬莫留連李白詩蠶經三臥行欲老元稹織婦詞織婦何太忙蠶經三臥行欲老蠶神女聖早成絲今年絲稅抽徵早越婦未織作吳蠶始蠕蠕李賀感諷長畛徘徊桑柘重新夏野蠶成繭太宗本紀貞觀十三年是歲滁州野蠶成繭蠶婦一人供自身林蘊田間樹之以桑凡樹桑人百之所沐者謂之功桑太寡則乏于帛桑太多則暴于田是故十畝之田植桑五功一功之蠶取不宜歲度之雖不能盡其功者功不下一匹帛平賦書繭厚絲美陸龜蒙蠶賦逮蠶之生繭厚絲美機杼經緯龍鸞葩卉蠶凋桑柘空李白五月東魯行蠶老客未歸白田已繅絲李白桑者不絲身韓愈三器論繭稅十一白孟夏蠶事既登后妃獻繭乃收繭稅以桑為均貴長幼如一以給郊廟之服繭稅十取一也以桑為均老隨桑多少而稅貴賤長幼如一各以桑為平不以貴賤為差蠶事懋而既登繭稅收而先定絲入周禮典絲堂絲入絲入收而稅之頒絲謂出之也孔蠶絲盡輸蠶絲盡輸稅機杼空倚壁柳田家詩半天下西界制河東奄左海其間繭稅魚鹽衣食半天下李訥制杜牧不逋繭稅不逋於鄉井謝絲表盡取後已陸龜蒙蠶賦官誕益讒盡取後已織絹未成匹繅絲未成斤里胥迫我納不許暫逡巡白居易秦中吟採桑十二白十畝之間桑柘間間女執懿筐遵彼微行爰求桑桑微行牆下徑也蠶月條桑取彼斧戕以伐遠揚猗彼女桑詩秦氏之女羅敷秋胡之妻並採桑者城南古詩羅敷善採桑采城南隅青絲為籠繩桂枝為籠鉤桑之未落其葉沃若帝女之桑蠶妾公子重耳與從者謀於桑下蠶妾在其上工女奉種于川具宜合禮執筐於陌無或失時南陌桑也無伐我樹桑翳桑孔翟車採桑祝明欽曰禮家説后以翟車採桑緑條映素手妾本秦羅敷玉顏艷名都緑條映素手採桑向城隅李白陌上桑採桑緑水邊同上爭桑十三白楚邊邑卑梁處女與吳邊邑處女爭桑而傷卑梁女卑梁人讓吳人吳人應不恭怒而殺之吳往盡屠其家於是吳楚大爭呂氏春秋環廬樹桑周禮維桑與梓必恭敬止桑椹翩彼飛鳩集于泮林食我桑椹懷我好音孔據黨人桑顏翊季父非理據黨人桑牙詣邑求治時令尹下翊因私評之私出己緡償之其訟遂息然使終身不之知江南野史后妃桑蠶十四白月令季春后妃齋戒享先蠶而躬桑以勸蠶事先蠶天駟星也后妃躬桑率先天下也后妃獻繭孟夏蠶事既登后妃獻繭乃收繭稅月令古者天下諸侯必有公桑蠶室近川而為之築宮仞有三尺棘牆而外閉之及大昕之朝季春朝日之朝君皮辨素幘卜三宮夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之風戾者恐露濕葉傷蠶風之使燥而後食之歲既單矣謂三日盡之事世婦卒蠶奉繭以示君遂獻繭于夫人夫人曰此所以為君服與遂副禕而受之因少牢以禮之古之獻繭者其率用此歟及良日夫人繅三盆手遂布于三宮夫人世婦之吉者使繅遂朱緑之玄黃之以為黼黻文章君服以祀先王先公敬之至也三盆于三淹也凡繅每淹人總而手振之以出絲緒王后親蠶於北郊以供緇服夫人蠶於北郊以供冕服王后夫人非莫蠶也身致其誠信也蠶宮桑壇晉元康議皇后採桑桑壇於蠶宮之西南繭館漢孝元皇后採桑繭館織室東觀漢紀明帝馬皇后數來往視之三灑古今事曰蠶始生蠶后食之三灑而已宿瘤齊王后也王遇其採桑可之遂娶為后採帝女之桑爰求十畝獻后妃之繭遂布三宮周禮仲春詔后率外宗內命婦始蠶於北郊以為祭服昕朝良日苟三宮夫人時展北郊之禮則十畝桑柘盡趍南陌之功漢儀晉禮志漢儀皇后親蠶桑東郊苑中蠶室祭蠶神曰苑窳婦人寓氏公主祠用少牢侍中成齊草定其儀取列侯妻六人為蠶母擇吉日皇后著十二笄步搖衣青乘油蓋雲母安車駕六醜馬女尚書陪載筐鉤外命婦皆步搖青衣各載鉤筐先桑二日蠶室生蠶著薄上桑日皇后未到太祝質明以太牢祀之祠畢班餘昨於從桑后東面躬桑採三條諸妃公主采五條郡縣已下九條以桑受蠶母也一條皇后義日皇后躬桑始將一條執筐受葉三灑見上孔后採桑祝欽明曰禮家説文言后以翟車採桑上桑條歌中宗庶人韋氏太史迦葉志忠表上桑條歌十二篇蓋后妃之德專蠶桑共宗廟事也享先蠶唐禮志皇后歲祀一季春吉已享先蠶遂以親桑散齋三日后服鈿叉禮衣結佩乘輿出自西房華蓋警蹕后即御座尚儀妾姓言請就齋室尚儀版奏外辨后服鞠衣乘輿以出華蓋侍衛警蹕尚儀妾姓言請降車皇后降車乘輿之大次尚宮曰有司謹具備行事尚儀跪取幣於篚皇后受幣進北向跪奠於神座少退再拜皇后已奠幣乃奉血毛入尚儀持版進於神座之右東面跪讀祝文皇后再拜尚宮曰禮畢尚功奉金鉤皇后受鉤採桑典制以筐受之皇后采三條止各以鉤受內外命婦司賓客引內外命婦採桑者以從至蠶室尚功以桑受蠶母母功之以受婕妤食蠶一絺止尚儀曰禮結皇后還太次車駕還宮后親於郊桑李白貞觀元年三月癸巳皇后親蠶太宗本紀親蠶苑中群命婦相禮肅宗廢治張氏親蠶苑中群命婦相禮儀物甚盛白八蠶吳都賦鄉貢八蠶之綿六測記曰一歲八蠶出日南冰蠶之繭拾遺録東海圓嶠山有水蠶長七寸有鱗角以霜雪覆之則為繭五色絲織為文錦入水不濡園客之絲列仙傳有園客種五色香草上有蛾上草客收養之生桑蠶得繭大如盆有女稱客妻繅訖俱去歐絲山海經諸天之野有女子跪樹歐絲注蠶類也孔南詔自曲靖州至滇池人水耕食蠶以柘蠶生閲二旬而繭織錦縑精緻于闐初無桑蠶丐鄰國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶帽絮中守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡得治繭四熟尹思貞治州有績蠶歲至四熟黜降使路敬潛至部嘆曰是非善政致祥于表言之正月蠶南蠻莊蹻之裔正月蠶生二月熟扶桑蠶白公丁記扶桑蠶長七尺卵大如燕宮北田塍曉氣酣黃桑飲露窣宮簾長腰健步偷攀折將餧吳王八繭蠶李賀南園色金杜陽編彌羅國有桑連延十數頃其上有蠶長四寸其色金其絲碧餉池中大軫國以五色石甃池塘采大柘葉飼蠶于池中始生如蚊睫及老可長五六寸池中有挺荷大者可闊四五尺蠶經十五月即入荷中成繭形如斗同上織紝十六白詩婦無蠶事休其蠶職休者刺其廢職事也女功恤緯傳曰嫠不恤緯注緯少寡婦之所宜憂報章詩曰跂彼織女終日七襄雖則七襄不成報章回文竇滔妻蘇氏織錦回文字織素新人工織縑故人工織素織縑日一匹織素日五丈精粗中數廣狹中量龍梭女手金梭焚機公儀休焚機去織婦曰欲使女二織婦安所售其利哉機杼王丹持縑一匹與友人曰如丹此縑出自機杼投杼魯參母方織人告參殺人始言不信及三告而投杼驚疑淵室之人雖聞潛織淵室潛織以卷綃淵室鮫人之所居河漢之女不見報章古詩皎皎河漢女札札弄機杼終日不成章泣涕漣如雨札札弄機杼之聲霜降季秋霜始降則百工休化理絲枲周禮太宰以丸織任萬民七曰嬪婦化理絲枲嬪亦婦人之稱化材絲枲周禮展其功織婦功也周禮女事周禮任婦以女事貢布帛也理其絲麻以成布帛執麻理絲禮女子十年不出母教以婉娩執麻枲理絲繭織紝組紃學女事以供衣服稽其女工周禮婦工周禮絲枲以成之謂之婦工注謂成布帛一婦不織賈誼曰一婦不織有受其寒者斷織樂羊子學未就而歸其妻執刀欲斷織曰此織未畢而繼之則不成功學未就而歸猶婦斷織三盆既繅八月載績載玄載黃無衣無褐勸課後漢崔實子真為五原守土宜麻枲而俗不知織績實為作紡績織紝練縕以教之得免其寒苦孔嫂為績織張志和常欲以入布制裘嫂為躬績織衣之織紝列女饒娥饒州樂平人生小家勤織紝紝戎衣給戰士鄭略為鳳翔隴節度使會黃巢陷京都妻自紝戎衣給戰士蚤織而縷柳宗元種樹郭橐駝傳蚤繅而緒蚤織而縷經而不緯文粹陸龜蒙論文書譬猶織也經而不緯可成幅乎蠶婦凍而織陸贄蠶婦凍而織殫力忍死以供十倍之賦竭力蠶織陸相奏議論邊守狀使傷耗遺毗竭力蠶織西輸賄幣北償馬資尚不足塞其煩言繅絲鳴機杼李白贈清漳明府繅絲鳴機杼百里聲相聞越婦拜縣官桑牙今尚小會待春日晏絲東方擲掉李賀婦不知織韓文杼軸和鳴機罕嚬蛾之女李白任城廳記美人懶態燕脂愁春梭拋擲鳴高樓李賀染絲
