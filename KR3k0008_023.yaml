body:
  text: 卷第二十三姓氏一白舜典曰別生分類生姓也別其姓氏分其族類夏書曰錫土姓以新生之土賜之為姓保姓受氏傳曰若夫保姓受氏以守宗祊世不絕祀無國無之請族傳無駭卒羽父請謚與族因生以賜姓因其所生以賜姓若舜由媯汭生故以陳為姓胙之土而命之氏報之以土而命氏國陳之類也諸侯以字諸侯位卑不得賜姓故臣因其王父字也為謚因以為族或以先人之謚稱以為族官有世功則有官族邑亦如之謂取其舊官舊邑之稱以為族公命以字為展氏無駭公子展孫故為展氏因功命氏居官以為姓氏漢食貨志言武帝初如此倉氏庾氏之類也第五後漢第五倫其先齊諸田徙園陵多以次第為氏也爭先後晉王導與諸葛恢戲爭族氏王曰人言王葛不言葛王何也恢曰譬如驢馬驢能勝馬乎庶姓薛庶姓也我不可以後之族類賜姓金日殫七世內侍本以休屠作金人祭天故賜金氏以官漢武時為吏者長子孫居官者以為姓氏今倉氏庾氏也品官晉摯虞字仲治撰族姓昭穆十捲上疏進之以為足備物廣多聞人以為定品達法司徒劾之詔原之改姓推律漢書京房字君明本姓李氏推律自定京氏而姓指樹伯陽生於李樹下遂指李樹為姓劉婁之賜婁敬賜姓劉氏曰婁者劉也疏束晉束晰其先疏姓避亂改姓因去疏之足為束馬矢大司徒馬害本姓馬矢遂稱馬氏張祿范睢變姓名曰張祿先生冒姓衛青父鄭季給事平陽侯主家與少兒通生青故冒姓衛氏又漢張孟為灌則舍人得幸進之二千石蒙姓灌氏孟灌夫父也民無上吳志氏儀本姓氏孔融嘲之曰氏字民無上可改為是遂改徐眾評曰古之建姓或以所生或以官號或以祖名今離析文字橫生諱忌本誣祖也避仇改姓棗據本姓棘避仇改姓為棗又嵇康其先姓奚以避怨嵇山以為氏又范蠡浮海出齊易名為鴟夷子後至陶為陶朱公妨父晉陳元達字長宏後部人也本姓喬以生月妨父故改姓陳也載鹽第五倫官未達客河東變姓名稱王伯齊載鹽往來太原上當所過糞除孔賜姓李勣本姓徐氏武德二年李密歸朝廷詔授黎州授管封英國公賜姓附宗正屬籍世族志高士廉太宗詔士廉與韋廷岑文本令狐德棻責天下譜牒參考史傳撿正真偽進忠賢退悖惡先宗室後外戚退新門進舊望石膏梁左寒畯合二百九十三姓千六百二十一家為九等號曰世族志姓氏錄高宗時許敬宗以不敘武后世又李義府恥其家無名更以孔志約楊仁卿史玄道呂才等十二人刊定之合二百三十五姓二千二百八十七家帝自敘所以然改為姓氏錄定四海望族先是後魏太和中定四海望族以崔寶等為冠其後矜尚門地故氏族志一切降之推敘昭穆贊曰古者受姓受氏以旌有功是時人皆土著故名宗望姓舉郡國自表而譜系興焉所以推敘昭穆使百代不得相亂也肉譜李守素王世充平召署天策府倉曹通氏姓學世號肉譜虞世南與論人物始言江左山東尚相酬對至北地則笑而不荅歎曰肉譜定可畏許敬宗曰倉曹此名豈雅目邪宜有以更之世南曰昔任彥升通經時稱五經笥今以倉曹為人物志可乎時渭州剌史李淹亦明譜學守素所論惟淹能抗之古未有姓若夷狄然張說后嘗問諸儒言氏族皆本炎黃之裔則上古無乃百姓乎說曰古未有姓若夷狄然自炎帝之姜黃帝之姬始因所生地而為之姓其後天子建德因生以賜姓黃帝二十五子而得姓者十四德同者姓同德異者姓殊其後或以官或以國或以王父之字始為賜族久乃為姓唐虞抵戰國姓族漸廣周衰列國既滅其民各以舊國為之氏下及兩漢人皆有姓故姓之以國者韓陳許鄭魯衛趙魏為多后曰善蟒梟高宗廢后王氏及良娣俄為武后所殺改后姓為蟒良娣為梟宰相不以姓著張開說元後宰相不以姓著曰燕公與通譜系張九齡張說為宰相親重之與通譜系乞宗姓列屬籍李叔明本嚴氏少孤養外家冒鮮于姓請還宗如可叔明初不知意醜之乞宗姓列屬籍代宗從之民生子以姓字韓愈論宮市貶陽山令有愛在民民生子多以其姓字之恥與逆臣共宗李抱玉上言世占涼州恥與逆臣共宗有詔賜之姓因徙籍京兆舉族以李為氏詭姓權皋永王舉兵脅士大夫皋詭姓名以免尤明姓系路敬淳兼修國史尤明姓系自魏晉以降推本其來皆有條序著姓略衣冠系錄等百餘篇姓系柳沖修國史初太宗命諸儒撰氏族志甄差群姓其後門胄興替不常沖請改修其書帝詔魏元忠張錫蕭至忠岑羲崔湜徐堅劉憲吳兢及沖共取功德時望國籍之家等而次之夷蕃酋長襲冠帶者析著別品會魏元忠等繼物故至先天時復詔沖及堅兢與魏知古陸象先劉子玄等討綴書乃成號姓系錄柳芳著論柳芳著論甚詳芳之言曰氏族者古史官所記也昔周小史定世系辨昭穆故古有世本錄黃帝以來至春秋時諸侯卿大夫名號繼統左丘明傳春秋亦言天子建德因生以賜姓胙之土命之氏諸侯以字為氏以謚為族昔堯賜伯禹姓曰姒氏曰有夏伯尼姓曰姜氏曰有呂下及三代官有世功則有官族邑亦如之後世或氏於國則齊魯秦吳氏於謚則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫氏於居則東門北郭氏於忠則三烏五鹿氏於事則巫乙匠陶於是受姓命氏粲然眾矣明世族學孔至明世族學與韋述蕭穎士柳沖齊名撰百家類例以張說等為近世新族剟去之說子垍方有寵怒曰天下族姓何豫若事而妄紛紛邪求同譜杜正倫與城南諸杜昭穆素遠求同譜不許銜之詔附屬籍韋嗣立與韋后屬疏帝特詔附屬籍變姓名李密夫之淮陽變姓名為劉智遠教授諸生自給呂才卜宅篇曰近世乃有五姓謂宮也商也角也徵也羽也以為天下萬物悉配屬之以處吉凶然吉皆不類如張王為商武庾為羽是以竟相諧附至柳為宮趙為角則又不然其間一姓而兩屬復姓數字不得所歸是直野人巫師說爾好譜學韋述好譜學見柳沖所撰姓族系錄每私寫懷之還舍則又繕錄故於百氏源派為詳乃更撰開元譜二十篇譜系疏晦李憕或言其先出與聖皇帝譜系疏晦不復傳楊復恭常肩輿抵太極殿宰相對延英論叛臣事孔緯曰陛下左右有將反者帝矍然緯指復恭復恭曰臣豈負陛下者緯曰復恭陛下家奴而肩輿至前殿廣樹不逞皆姓楊非反邪復恭曰欲收士心輔天子帝曰誠欲收士心胡不假李姓乎復恭無以對賜姓李全略本王氏名曰簡田弘正遇害穆宗以全略故鎮州將召問所欲言全略多陳利害冀合帝意且請盡死力以報遂授德州剌史是時杜叔良兵敗博野故以全略為橫海節度滄德棣觀察使賜今姓名矜氏族林蘊辯給嘗有姓崔者矜氏族蘊折之曰崔杼弒其君林放問禮之本優劣如何其人俯首不能對桑喪同音桑維翰初舉進士主司惡其姓以為桑喪同音人有勸其不必舉進士可以從它求仕者維翰慨然乃著日出扶桑賦以見志五代史裴氏自晉魏以來世為名族居燕者號東眷居涼者號西眷居河東者號中眷五代裴皞徵籍考名陳章甫與吏部孫員外書傳說無姓商后致鹽梅之地屠羊隱名楚王延三姓之位未聞徵籍也范睢折脅於魏名為張祿先生秦用之為相張良避仇變名姓而亡漢祖因之實取天下何必考名也海內望族李訓四弊尚婚婭者先外族後本宗尚人物者進庶孽退嫡長尚冠冕者略伉儷慕榮華尚貴戚者徇勢利亡禮教四者俱弊則失其所尚矣柳沖名門右族柳玭良家茂族李華天下諸胡悉帶令令狐相綯以姓氏少族人有投者不吝其族由是遠近趨之至有姓胡胃令者溫庭筠戲為詞曰自從元老登庸後天下諸胡悉帶令南部書方相姪唐有土人姓方好矜門地但姓方貴人必認為親或戲之曰豐邑公相何親遽曰再從伯父戲者笑曰既是方相姪只堪嚇鬼豐邑坊造凶器出賣之所也朝野僉載以易自筮陸羽字鴻漸不知所生或云僧得之水濱畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之與諸李敘穆李義甫已貴乃言系出趙郡與諸李敘穆嗜進者往往尊為父兄給事中李崇德引與同譜既謫普州亟削去言李出隴西言劉悉出彭城至中葉風教又薄譜錄都廢公靡常產之向士云舊德之傳言李悉出隴西言劉悉出彭城悠悠世祚訖無孝按冠冕皁隸混為一區鈒鏤王家國史補四姓滎陽鄭崗頭盧澤底李士門崔皆為鼎甲太原王亦四姓之匹而呼為鈒鏤王家喻銀質而金飾族望高士廉傳高宗朝以太原王范陽盧滎陽鄭清河博陵三崔趙郡隴西二李其族望恥與諸姓為婚也別洞尚書故實唐黃生登進士第人問與頗同房否對曰別洞黃氏王黃姓柳宗元黃溪記大冥之川山舒水緩有土田始黃神為人時居其地傳者曰黃神王姓莽之世也莽既死神更號黃氏逃來擇其深峭者潛焉始莽嘗曰余黃虞之後也故號其女曰黃皇室主黃與王聲相邇而又有本其所以傳言者益驗世有負其姓而立於天下者柳宗元鐵爐步志世有負其姓而立於天下者曰吾門大他不我敵也門其位與德曰久矣其先也然而彼猶曰我大也世亦曰某氏大其冒於號有以異於茲步者乎問家世及年溫造天子愛其才問造家世及年對曰臣五世祖大雅外五世祖李勣臣犬馬之齒三十有二帝奇之唐正觀氏族志凡第一等則為右姓柳沖唐正觀氏族志凡第一等則為右姓路氏著姓略以盛門為右姓柳沖姓族系錄凡四海望族則為右姓不通歷代之說不可與言譜也今流俗獨以崔寧李鄭為四姓加太原王氏號五姓蓋不經也金陵李氏始以唐號國錢文穆王問之曰金陵冒氏族於巨唐不亦駭人乎沈韜文曰此可取譬也且如鄉校間有姓孔氏者人則謂之孔夫子復何怪哉王大笑賞卮酒撰劉氏家史齊子玄別撰劉氏家史及譜考上推漢為陸終苗裔非堯後彭城叢亭里諸劉出楚孝王嚚魯孫居巢侯殷不承元王按據明審議者高其博白幼名冠字正名名不正則言不順男子二十冠而字父前子名君前臣名名以制義晉穆侯條之役生太子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以成禮易則生亂君命太子曰仇弟曰成師始非亂矣兄其替乎子同生魯侯問名於申繻對曰凡名者有信有義有象有假有類以名生為信若唐叔虞魯公子友以德命為義若文王名昌武王名發以類命為象若孔子首象尼丘山遂名取於物為假若伯魚生有人饋之魚因名之曰鯉取於父為類若子生與父同日名曰同不以國不以官不以山川不以隱疾不以畜生不以器幣以國則廢職以山川則廢主以畜生則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空改司空為司城也魯以獻武廢二山二山具敖也魯獻公武公故廢二山大物不可以名是以大物不可以名嘉名楚詞朕皇考曰伯庸肇錫予以嘉名三月而名禮云子生三月父親名之既冠而字之名者所以正體定心意字者所以崇仁義敘長幼不以日月山川禮曰名子者不以日月不以山川有文在手成季生而有文在手遂以命之為友又唐叔虞生有文在手曰虞遂名虞咳而名之禮子生三月父執子之右手咳而名之咳謂無子頭不敢同名禮大夫士之子不敢與世子同名寤生鄭莊公寤生驚姜名曰嘉生名終將諱傳曰周人以諱事神名終將諱之待事而名之莒越生子將待事而名之揚州之役獲焉明曰揚州叔孫獲長狄僑如因名子曰僑如莒越欲比之求名而亡此謂名聲之名二名非禮公羊曰仲忌此何忌也譏二名非禮也注云難為諱一字為名難言而易諱所以長臣子之敬不通下君臣同名公羊叔向曰臣有名惡今曰衛禮惡為君臣同名君子不奪人之名不奪人之親所名君不聽臣易名所以重父之命也小同後漢郭玄字思益有遺腹子玄以其有手文似己名之曰小同三明後漢段穎字紀明與皇甫威明然明並知名京師稱梁州三明二稚後漢周澤字稚朝孫堪字子稚京師號二稚難犯易避吳主孫權曰禮名子難犯易避令太子名𩅦𩅦彎弓之彎也因賞桓彝生子溫嶠賞之曰有奇骨真英物遂名之溫祖有陰德虞詡祖父為獄吏有陰德曰吾子孫何必不為九卿者遂名詡字升卿晚有子賈充父逵晚始生充言後有充閭之慶因名充字公閭名失則愆傳依謙晉王杞文舒為其子弟作名皆依謙以見其意故後兒子默字居靜沈字處道子渾字仲玄深字道沖遂作書戒之曰以玄默沖虛為名欲使汝曹稱名思義不通越也應童謠晉桓壑字郎子聞符堅國中有謠云誰謂堅石打碎有子二十人皆以石為名以應之同名字小冠子夏漢杜欽字子夏時杜欽亦字子夏俱有令名欽損目時人號為盲子夏欽惡其號稱疾見抵更暑小冠自別時人因號小冠子夏南北玄吳郡太守張玄之與謝玄同年名亞於玄時稱南北玄三明二稚並見上驚座漢陳遵字孟公豪俠所在人懷之唯恐在後時列侯有與遵同姓名者每至門人曰陳孟公座中莫不振動既至而非遵因號其人為陳驚座投杼之疑魯有與曾子同姓名而殺人者人以告曾子母母織如舊不信之及三人來告投杼而驚起改名君子已孤不更名慕藺史司馬長卿名犬子慕藺相如之為人遂改名相如改命楚王曰子文無後何以勸善使復其所改命曰生注云易其名也子文孫克廣也變名梅福變名姓隱於吳市門卒避難改名後漢趙岐字邠卿初名嘉生御史臺字臺卿後避難改名字以京兆長陵人示不忘本工也因夢改名魏程昱本名立少時夢上天兩手捧日太祖曰卿當為吾腹心乃於立上加日而為昱改字諸葛喬字伯松瑾第二子本字仲慎亮未有子求喬為後瑾啟吳王而遣之故改其字孔慕張綱改李綱始名暖慕張綱為人改焉手敕未嘗名帝以綱隋名臣手敕未嘗名五百歲一賢者生員半千始名餘慶與何彥先同事王義方以邁秀見賞義方常曰五百歲一賢者生子宜當之因改今名覆金甌崔琳初玄宗每命相皆先書其名一日書琳等名覆以金甌會太子入帝謂曰此宰相名若自意之誰乎即中且賜酒太子曰非崔琳盧從願乎帝曰然賜太子酒象賢陸象先始象先名景初睿宗曰子能紹先創是謂象賢者乃賜名焉龜龍崔液尢工五言詩湜歎因字呼曰液子我家龜龍也斥太子名王方慶奏人臣於天子未有斥太子名者晉山濤啟事稱皇太子不名孝敬為太子更弘為崇沛王為太子更賢為文今東官門殿名多嫌觸請一改之以協舊典制可忘名張嘉真帝欲果用嘉真而忘其名夜詔中書侍郎韋抗曰朕嘗記其風操而今為北方大將張姓而復名卿為我思之抗曰非張齊丘乎今為朔方節度使帝即使作詔為相夜且半因閱大臣表疏舉一則嘉真所獻遂得其名即以為中書侍郎同中書門下平章事詭名伏匿城中張薦朱泚反詭姓名伏匿城中著史遁先生傳謬稱段平仲嘗曰上聰明神武但臣下畏怯自為循默爾使我一日得召見宜大有開納會京師旱詔擇御史郎中平仲與考員外郎陳歸被選同得對粗陳振恤事帝察其意有所畜以歸在側未言事訖平仲方獨進帝乃并留歸正色問之雜以他語平仲錯悟不得言乃謬稱名帝怒叱去之然名由此顯曲江公張九齡開元後天下稱曰曲江公而不名不敢有斥李栖筠天下士歸重不敢有所斥稱贊王公官而不名李吉甫帝尊任之官而不名請改名乂蔣乂初名武憲宗時因進見請曰陛下今日偃武修文群臣當順承上意請改名乂帝悅時討王承宗兵方罷乂恐天子銳於武亦因以諷始名重璋李抱玉始名重璋明皇以其戰西河有大功為改今名嗣漢魯恭路嗣恭始名劍客連徙神烏姑藏二縣令考續為天下最明皇以為可嗣漢魯恭因賜名呼為大臣郭子儀代宗不名呼為大臣名與位皆踰其父楊嗣復韓滉撫其頂曰名與位皆踰其父楊氏之慶也因字曰慶門元魯山元德秀天下高其行不名謂之元魯山待事名子李素立孫志遠始名鵬而素立方奉使謂家人曰古有待事名子吾此役可命子孫矣遂以名之陸堅初名犮悌玄宗嘉其剛正更賜名不虛魏元忠始名真宰以諸生見高宗高宗慰遣不知謝即出儀舉自安帝目送謂薛元起曰是子未習朝廷儀然名不虛謂真宰相也於文從戈柳渾朱泚亂平奏言臣名向為賊汗且載於文從戈非偃武所宜乃更今名德素王紹少為顏真卿所器字之曰德素以輩行呼陸贄入翰林年尚少以材幸天子以輩行呼而不名也臧孫韋正貫少孤皋謂能大其門名曰臧孫父名呂渭李涵由御史大夫擢太子少傅謂建言涵父名少康當避宰相崔祐甫善其言擢司門員外郎天子尊禮杜祐每見進天子尊禮之官而不名人不敢指劉禹錫凡所進退視愛怒重輕人不敢指其名號二王劉柳呼官而不名裴垍帝在殿中常呼垍官而不名更姓名成汭少無行使酒殺人亡為浮屠後入蔡賊中為賊帥假子更姓名為郭禹避祖名源乾曜遷太子少師避禮名更授少傅名相甲乙席豫為中書舍人與韓休許景先徐安貞孫逖名相甲乙名子與帝王同苗晉卿子粲德宗時官至郎中陸贄欲進粲官帝不許曰晉卿往攝政有不臣之言又名其子皆與帝王同粲等宜與外官以方榖為字李載義會吏下請立碑紀功詔李程為之辭未有字詔曰用書凡厥正人既富方榖卿宜當之以方榖為字其寵待如此賢者名不可斥孟浩然初王雒過郢州畫浩然像于剌史亭因曰浩然亭咸通中剌史鄭諴謂賢者名不可斥更署曰孟亭文章李益李益時又有太子庶子李益同在朝故世言文章李益以辨云賜名劉玄佐李希烈攻陳州玄佐救之希烈走遂進取汴州詔加汴宋節度使陳州行營都統玄佐本名洽至是賜名以尊寵之避太子諱李藩憲宗為皇太子王紹避太子諱始改名時議者以為諂藩曰自古故事由不識體之人敗之不可復正雖紹何誅邈佶烈五代王彥章莊宗遣明宗往諭之彥章病創臥不能起仰顧明宗呼其小字曰汝非邈佶烈乎我豈苟活者遂見殺為龑字音儼以名南漢劉龑初名巖九年白龍見南官三清殿改元白龍又更名龑也以應龍見之祥有胡僧言讖書滅劉氏者龑也龑乃採周易飛龍在天之義為龑字音儼以名焉世家趨廝走養朝夕各於剌史前皮日休郢州孟亭記春秋書紀季公子仲孫湫字者貴之也故書字曰貴先是亭之名取先生之諱公曰焉有賢者之名為趨廝走養朝夕各於剌史前耶命易之以先生姓陳留八俊格輔元與同郡王孝逸繁師元靖君亮鄭祖咸鄭師善李行簡盧協皆有名號陳留八俊益曰日華程日華始名華德宗以其有功益曰日華父子似兄弟名杜鵬舉宰相鴻漸之父名鵬舉父子而似兄弟之名父嘗夢有所之見大碑云是宰相看之記得姓下偏旁曳腳而忘字乃名鵬舉而謂之曰汝不為相即世世名字鳥旁而曳腳也事蓋亦前定出嘉話錄書字記姓名李湯題名於昭應縣僂韋謔渭川秦川拂眼明希仁何事寡詩情只應學得虞姬婿書字纔能記姓名楊氏名子楊遺直為蘭陵簿四子發假收嚴皆登進士第收即大拜發已下皆至丞相發以春為義假以夏為義收以秋為義嚴以冬為義皆有文學登第居修行里楊氏比靖恭諸楊之華盛焉靖恭即楊汝士父子並為公卿門族昌盛所居靖恭里號靖恭揚家百藥為名李百藥隋內史德林之子幼時多疾祖母趙氏故百藥為名齊先聖以立名宋齊丘汪台符貽書訐之足下齊先聖以立名超亞聖而稱字齊丘慚而改為子嵩後使人誘與飲酒縛其尸沉石城下出江南野史以父嫌名不拜賈魯擢中書舍人以父嫌名不拜生子因其官字甄濟為著作佐郎兼侍御史濟生子因其官字曰禮闈憲臺有時讌語不以公卿指名但呼陸九權德輿陸贄集序姚崇始名元崇以與突厥叱剌同名武后時以字行至開元世避帝號更以令名白卒哭乃諱聞名心瞿終將諱之傳周人以諱事神名終將諱之辭曹羊祜為荊州剌史及卒有遺愛故荊州人為諱改戶曹為辭曹諱新禮本哭以木鐸徇于路捨故而諱新注云故謂高祖之諱新謂新死者之諱詔王之忌諱周禮小史王有事詔王之忌諱注忌先王死日諱先王名逮事禮逮事父母則諱王父母不逮事父母則不諱王父母注逮及也士以二廟事袒雖不逮亦諱之大夫之所有公諱避先王諱婦諱不出門母之諱宮中諱妻之諱不舉諸其側與君之諱同則稱字入門問諱名其二諱國語范獻子聘魯問具敖二山對曰先君獻武之諱也獻子歸告人曰人不可不學吾適魯名其二諱請長史諱晉書王述字懷祖為楊州長史主簿請諱報曰亡祖先君名播海內內諱不出門餘無所諱改選晉江統叔父春為宜春令統因上疏曰故事祖父官與名同者皆後改未有身與官職同改選列臣以為臣子開地春秋不奪人親之義朝廷從之同官犯諱禮志云大元十三年召孔安國為寺中表以王瑜名犯諱不得連署求解有司議云公所無私諱豈公奪私王制屈家禮也王祜許換曹是出制外夫皇朝禮大百僚備職遍官列署動相關涉若人遂其心則易官易職遷流莫已改郡字晉成和元年當徵蘇峻司徒王導欲出王舒為外援乃拜撫軍將軍會稽內史上疏以父名會不作會稽廷尉以字同音異於禮無嫌舒陳狀音雖異而字同乞換他郡於是改會為鄶二名非禮廢名廢主廢禮廢職廢祀並見名字門奉諱惡太史典禮執簡記奉諱惡王父母兄弟世父叔父姑姊妹子父同諱父為其親諱則子不敢不從諱不諱臨文不諱詩書不諱廟中不諱二名不偏諱夫子之母名徵在言在不言徵言徵不言在父前子名君前臣名對至尊無大小皆稱名也禮不諱嫌名謂聲相近不逮事父母則不諱王父母謂孤幼不及識父母思不及於祖此庶人也適士二廟事祖雖不逮猶諱祖也君所無私諱臣於君前不避家諱尊無二也大功小功不諱士於大夫之所有公諱無私諱不敢自諱凡祭不諱教學不諱孔尊諱韋暢皋沒蜀人德之凡刻石著皋名者皆鑱其文尊諱之對千人可不犯一人諱柳沖傳晉太元中散騎常侍河東賈弼譔姓氏薄狀十八州百十六郡合七百一十二篇甄別士庶無所遺宋王弘劉湛好其書每日對千人可不犯一人諱更其姓曰右五代石昂節度使符習高其行召以為臨淄令習入朝京師監軍楊彥朗知留後昂以公事至府上謁贊者以彥朗諱石更其姓曰右昴趨于庭仰責彥朗曰常待柰何以私害公昂姓石非右也彥朗大怒拂衣起去昂即趨出解官諱辯李賀以父名晉肅不肯舉進士韓愈為作諱辯然卒亦不就舉改弘文館為崇文五代郭崇韜宰相豆盧革等皆諂事之崇韜父諱弘革等即因他事奏改弘文館為崇文轉喉觸諱韓愈送窮文今上章及詔不聞諱滸勢秉機也惟宦官女子不敢言諭及機以為觸犯諭近代宗諱機近玄宗諱諱辯不諱嫌名韓文同上律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類若父名仁子獨不得為人乎周公作詩不諱若曰克昌厥後又曰駿發爾私孔子不偏諱二名若曰宋不足徵又曰某在斯春秋之時不諱謙名若衛桓公名完康王釗之孫實為昭王曾參之父名晰曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何報德四白無德不報何以報德厚報求仁得仁以德報德則人有所勸大惠敢忘大惠欲報之德惠不可棄寬身以德報怨則寬身之人也以怨報德則刑戮之人也修舊好也重施而報子桑曰重施而報君將何求重施而不報其人必攜攜離也背施無親三施而無報謂秦閉晉糴何以報我何以報君報者倦矣施者未厭背惠忘舊仁不遺舊不敢志德感國士之恩人惟求舊施報禮曰太上貴德其次務施報禮尚往來禮曰往而不來非禮也來而不往亦非禮也不望其報儒有推賢而進達之不望其報禮小人懷惠語報余莊子忘我道不虛行仁無遺舊故人念舊感恩忘我實多則吾豈敢瓊瑤木瓜美齊桓公也衛有狄人之敗齊桓公救而封之衛人思之欲厚報之云投我以木瓜報之以瓊瑤投我以木李報之以瓊玖匪報也永以為好也鬼結草晉魏顆見老人結草以亢杜回杜回秦將也夜夢之曰予是所嫁婦人之父也爾用先君之治命余是以報之三舍子犯曰微楚之惠不及此退三舍避之所以報也一餐戰國策楚王伐中山中山君亡有二人執戈隨其後二人曰臣之父嘗餓君以一餐鋪之父死且曰中山有事汝必死救之一飯范睢云一飯之恩必償餓人宣子舍於翳桑見靈輒餓不食三日矣與簞食既而為公介倒戟以禦公徒而免宣子問其故曰翳桑之餓人也問其名居不告而退遂自亡言其不望報也僖妻之饋公子晉公子重耳至曹僖負羇之妻而饋盤餐寘壁焉後晉俟伐曹令無入僖負羇之宮而免其族報德也綈袍范睢寒須賈取綈袍遺之後去吾不殺汝以汝有綈袍之恩也報國士豫讓曰范中行以眾人遇我我以眾人報之智伯以國士遇我我以報國士之絕纓之臣竟荅恩於楚王啖炙之士終酬德於顧榮蛇銜珠隋侯見傷蛇以藥治之後銜夜光珠以報恩龜顧印見印綬門注客泣珠淵客宿將去泣珠於盤以酬主人雀持環後漢楊寶見病雀憐之因將歸置巾箱中採黃花蕊食之瘡愈飛去旦為黃衣少年持玉環來報之綈袍雖薄尚繫須賈之仁簞食且微終酬宣子之惠食為秦繆公亡善馬岐下人得而食之秦赦之後擊晉見繆公窘皆推鋒爭死以報食馬之德骨肉薳子憑曰吾見申叔夫子所謂生死而骨肉也褚中荀罃在楚鄭賈人將寘褚中以出既謀而未行而楚自歸之後賈人如晉荀罃善待之如實出己者投金於承塵後漢雷義常濟人於死罪後以金二斤謝之義不受金主默然乃投金於承塵而去蔑我大惠傳報生以死報死以力制服祭祀韋泓遇喪亂親屬並盡客游洛陽素聞應詹名遂托焉詹與分甘苦樂情若兄弟遂隨積年為營伉儷置居宅升薦於元帝帝辟公府後泓至少府詹卒感生成之恩遂為詹制朋友之服哭止宿草也父事張蒼當斬王陵言赦之及貴常父事陵陵卒後蒼為丞相洗浴朝陵夫人上食然後歸祠以賓位李固既誅門生王成匿其少子燮得免成卒燮以葬之每節為設上賓之位而祠之孔厚報王珪少孤且貧人或饋遺初無讓及貴厚報之雖已亡必酬贍其家上書直冤李德裕丁柔立者德裕當國時或薦其直清可任諫諍官大中初為左拾遺既德裕被放柔立內愍傷之為上書直其冤坐阿附貶南陽尉損怨鄭畋傳鄭榖者薰子也方畋秉政擢為給事中至侍郎其損怨類如此故主無寸祿請解官授王毛仲傳李守德位武衛將軍嘗遇故主於道主走避守德命左右迎之至第親上食奉酒主流汗不敢當數日入奏曰臣蒙國恩過分而故主無寸祿請解官授之帝嘉其志擢為郎將路應路嗣恭子應德宗時李泌為相號得君帝曰誰於卿有恩者朕能報之泌乃言曩為元載所疾謫江西路嗣恭與載厚臣嘗畏之會與其子應並驅馬囓其脛臣惶恐不自安應閟不言勉起見父臣常媿其長者思有以報帝曰善即日加應檢校屯田郎中賜金紫李泌奏王緯於已有私恩王緯大曆中與李泌俱為路嗣恭江西觀察判官泌見惡於元載嗣恭希意欲殺之緯護解僅免泌執政奏王緯於己有私恩德宗許為泌報故進緯給事中浙西觀察使缺泌擬緯帝曰是朕為君報德者乎黃門要地獨不留議事耶誓同死生楊晟降王建愛將安師建者勇而有禮既就執建顧曰爾報楊司徒足矣能從我乎謝曰司徒誓同死生不忍復戴日月三謂不回乃戮之願悉官爵授之李大亮嘗以張弼脫其死及貴念有以報之時弼為將作丞匿不見大亮求之不能得一日識諸塗持弼泣悉惟家財與之弼拒不受乃言於帝曰臣及事陛下張弼力也願悉臣官爵授之帝為韆弼中郎將直其枉李晟篤分義隆于故舊嵐州剌史譚元澄嘗有德於晟元澄死晟既貴直其枉晟撫其二子為成就之感國士而能漆張九齡上姚令公書禽息之首為知已而必碎豫讓之身感國士而能漆報飯嫗南卓貧遊上蔡蔡收待之為客吏所沮每宴集令召即云卓自以衣冠弊故不敢赴卓由是會窘困惟城南鬻飯嫗待之不厭也後十七年守蔡乃曰古人一飯必報睚眥必讎吾雖位微適當斯日也逐刑吏而報嫗焉雲溪友議昔傷蛇傅藥而能報以怨報德者不及傷蛇遠矣窮愁志垂恩儻丘山報德有微身李白贈崔司戶詩有德必報之千金恥為輕李白竅感荀罃柳宗元啟竊感荀罃如實出己之德報速尉遲恭從擊王世充是口獵榆窠會世充自將兵數萬戰單雄信者賊驍將也騎直趨王恭躍馬大呼橫剌雄信墜乃翼王出率兵還戰大敗之王顧曰此眾人意公必叛我獨保無它何相報速耶崔湜在襄州與譙王敳相同遺王敗湜當死賴劉幽求張說獲免及為宰相陷幽求嶺表密諷廣州都督周利正殺之不克又與太平公主逐張說其猜詭險殆天性雖蠆虺不若也養蝦蟆得水病牛羊日曆大和中裴度再任中書薦引李宗閔既得志譖度度謂人曰養是蝦蟆得水病附下罔上如此白展謝叔向不謝祁奚之免已傳晏子贖越石父史越石父賢在縲絀晏子解左驂贖之載歸不謝而入石父逐請絕晏子攝衣謝之延為上賓恨謝漢張安世薦士士謝之大恨不為通為國魏陳群言劉翼於太祖太祖赦之翼深德群群曰議刑為國非為私拜官公門謝恩私室非義也張安世云不謝范滂孟博繫獄霍諝理之免後詣諝不謝或譏之滂曰叔向祈奚云云孔以身徇恩尉遲恭隱太子贈金皿辭曰恭起幽賤天下喪亂久陷逆地秦王實生之方以身徇恩今於殿下無功其敢當賜過謝徐晦中丞李夷簡表為監察御史晦過謝問所以舉之之由夷簡曰君不負楊臨賀肯負國乎歐陽詹卒初徐晦舉進士不中詹數稱之明年高弟仕為福建觀察使語及詹必流涕明目張膽韋思謙曰丈夫當敢言之地要須明目張膽以報天子焉能錄錄保妻子劾交通術士李吉甫本善竇群羊士諤呂溫薦群為御史中丞群即奉士諤侍御史溫知雜事吉甫恨不先曰恃之久不決群等銜之俄而吉甫病醫者夜宿其第群捕醫者劾吉甫交通術士帝大駭訊之無狀群等皆貶之卒上書告不法韋丹江南西道觀察使有卒違令當死釋不誅去上書告丹不法詔丹解官待辨會卒驗卒所告皆不實丹治狀愈明凡號門生而不知恩之所自者非人也纓冠束衽而趨以進者咸曰我知歷恩知恩則惡乎辨然而辨之亦非難也大抵當隆赫柄用而蜂附蟻合煦煦趄趄便僻匍匐以非乎人而售乎己一旦勢異則電滅飆逝不為門下用矣柳宗元顧十一郎書白吉夢維何維熊維羆夢美傳宋得臣曰予夢美不立我夢乃占我夢吾夢傳吾夢如是爾何夢矣文王謂武王曰無夢文中子曰至人其寢無夢休徵咎徵髣佛若夢文選胡蝶莊子夢為胡蝶詡詡然飛夢友死范式字巨卿與張元伯為友巨卿病卒夢元伯曰吾死某日葬子能相送乎及葬柩不進母曰必待張元伯元伯至柩乃進論夢衛玠問樂廣夢云是想玠曰形神不接而夢豈是想玠思之經日不得成疾廣故命駕往剖析之則愈廣歎曰此賢胸中必無膏肓之疾也又或問殷浩曰得位而夢棺得錢夢糞何也浩曰官本臭腐故得官而見屍錢本糞土故得財而夢穢時以為名言草蛇書王隱晉書唐琮夢蛇繞身遂效其形而作草蛇之書夢協二人夢同同夢詩甘與子同夢魂交莊子云其夢也魂交其覺也形開占六夢之吉凶周書六夢想邪思悟喜懼侯五旬之虛實列子曰西極有人不食不前而多眠五旬二覺以夢中所為者為實堯舜上聖符域內之休徵夢書曰堯夢乘青龍上太山舜夢擊鼓桀紂下臨作寰中之不軌桀帝夢黑風破其宮紂帝夢大雷擊其首剌出眼中遽獲金鐶之報述征記陳留周氏婢入山採樵夢見一女子曰吾眼中生剌乞拔之當厚報此婢乃於朽棺中見髑髏草生眼乃拔之即於其處得金鐶一雙角生頭上旋聞刀用之災蜀魏延年丞相長男掘得錢而被買幽明錄丞相茂弘夢人欲以百錢買大兒長豫後掘得一窟錢其數百萬長豫無病而死秣陵陶令枉殺人而致殂述征記陶繼為秣陵令枉殺樂伎後夢伎來曰許天得理令來相取遂跳入口中繼斯須而死賈弼易頭之時文章可玩幽明錄賈弼夢見人曰愛君美兒欲易君頭遂許之後能半面笑半面啼兩手把筆文詞各異謝奉說夢之日凶具被臻搜神記謝奉與鄭猷善忽夢猷與人爭錢因落水死奉為凶具忽覺即往猷處具說猷曰吾昨夜夢與人爭錢惆悵不語落廁而死奉為凶具一如前夢吉夢得說書高宗夢得說乃營求諸野曰夢帝賚予良弼說築傳巖之野惟肖九齡武王曰夢帝與我九齡男女之祥吉夢維何維熊維羆男女之祥維虺維蛇女子之祥徵蘭燕吉夢天使與己蘭曰妾不才幸而有子將不信敢徵蘭乎文公曰諾生穆公名之曰蘭周公孔子曰吾不復夢見周公龜思解網托彼元君魚求去鉤感諸武帝豐年詩牧人乃夢大人占之眾維魚矣實維豐年旐維旟矣室家蓁蓁豐之兆也天樂秦穆公夢游天上觀鈞天廣樂帝錫無命秦遂大昌懷蛟董仲舒吐鳳楊雄作甘泉賦成夢吐白鳳授筆江淹夢授五色筆文詞日麗吞鳥羅含夢吞五色鳥詞學乃日新日入懷吳志堅夫人夢日入懷中而生策松生腹吳丁固夢松生腹上占夢曰松十八公也後十八年當為公三刀王濬夢三刀後為益州剌史為烏宋昭公夢為烏咮加於南門尾加於北門曰予夢必立樹梓周書太姒夢見商之庭產棘小子發取周庭之樹梓化為松枯域柞驚寤告文王文王召太子占之於明堂王乃與太子發並拜吉夢受商之大命於皇天腸繞吳門孫堅母夢腸繞吳昌門鄰母曰安知其非吉徵也吞三爻吳虞翻立易注奏上曰臣郡吏蝀桃夢臣與疲乏士相遇放髮被鹿裘布易六爻繞其身其三以飲臣臣乞盡吞之道士曰易道在天三爻足矣豈臣當受經也禾三穗蔡茂子禮夢坐大殿殿前有禾三穗茂取中穗輒復失問主簿郭賀賀曰殿前有禾人臣上祿也中穗中台也禾失為秩君其為公果如言凶夢豎牛叔孫夢豎牛卒以餒死曹人社宮傳曹人或夢眾君子立於社宮而謀亡曹曹叔振鐸請待公孫彊許之聲伯涉洹傳聲伯夢涉洹歌曰齊洹之水贈我以瓊瑰懼不敢占之三年而後言言之至暮而卒兩楹之奠子曰余疇昔之夜夢坐奠於兩楹之間予殆將死矣遂寢疾七日而沒白虎史秦二世夢白虎嚙左驂上曰涇水為財富黃熊傳晉侯有疾夢黃熊入于寢門子產曰黃熊鯀化入于羽淵晉侯禮于夏郊疾乃有間首墮地而荀偃死肉挂車而揚雄誅二豎之災晉侯病夢二豎子曰居膏之下肓之上其奈我何咎徵惡夢周禮妖夢是踐秦伯執晉侯云亦晉之妖夢是踐歲在辰鄭玄夢孔子告之曰起今年歲在辰來歲在己既寤知命將終有頃寢疾其年六月中卒夢賦王延壽字文考曾有異夢意惡之乃作夢賦自厲後溺水死年二十山上有水魏鄧艾伐蜀夢坐山上有水流問袁邵邵曰山上有水蹇蹇利西南往有功也不利東北其道窮也往必克蜀其不還者乎井中生桑蜀何祗夢井中生桑趙直曰桑非井中物井中非桑生之所桑字四十八恐君壽不得過此祗曰足矣占夢乃占我夢大人占之召彼故老訓之占夢張茂問象意為大郡之徵後漢張茂字子禮夢象意為不善問萬推推曰君當為大郡而不善終象大獸獸者守也然象以齒焚身後為吳內史為沈充所害蔣琬占牛卒踐上公之位蜀蔣琬字公琰夜夢有一牛頭懸在門下流血滂沱趙直曰見血者事分明也牛角及鼻公字之象位當至三公果為中書令吉凶之兆休咎之徵六夢周禮占夢以日月星辰佔六夢之吉凶謂以日月會合辰參之以占夢也一曰正夢謂無所感動平安自夢二曰噩夢噩愕也謂驚愕而夢也三曰思夢四曰寤夢謂覺所道而為夢也五曰喜夢謂喜悅而夢六曰懼夢恐懼而夢季冬主夢聘問獻吉夢於王拜受之獻群臣之吉夢也乃舍萌于四方以贈惡夢注云舍萌釋菜也贈送也得天傳晉侯夢與楚子搏楚子伏己而鹽其腦子犯曰吉我得天楚伏其罪吾其柔之射月傳晉呂錡夢射月中占之曰姬姓日也異姓月也必楚王也聲伯夢涉洹見凶夢門夢中占夢莊子長吾子謂瞿鵲曰夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢中之占又夢焉無異寤也固乃非常人所知水邊女子鄧殷為淮南太守夢行水邊見女子猛獸自後斷其鞶囊占者曰水邊女汝字也斷鞶囊者新獸頭代故獸頭也不作汝陰作汝南太守也後漢時二棺後漢李充夫人夢天落二棺於充前問索紞曰棺者職也當有人舉君二官再遷果然虜脫上衣李充又見一虜脫上衣索紞曰虜去上男字也夷狄陰類君婦當之男也果如其言內中有人打宋桶夢內中有人打著赤衣桶手把兩赤杖極打之問索紞曰內中有人肉也兩赤杖者著也極打之君必遇飽肉食也二角索綏夢東有二角書詣綏大角朽敗小角有題所詣一在前為凶也一在後為背也當有凶背之問時綏父在東居三日凶問果至咬腳張邈奉使夜夢狼咬一腳紞曰腳肉被咬為卻字當不行不應命而卒立冰上崔鴻三十國春秋月令孤策夢立冰上與冰下人語紞曰冰上為陽冰下為陰冰上人與冰下人語為陽請陰媒介事也士如歸妻迨冰未洋君其為人作媒乎策曰老夫耄矣不為媒矣既而太守田約因策為子求張氏女拾至仲春而成婚芻狗魏志周宣字孔和太史問宣夢見芻狗得飲食又云夢見芻狗曰當墮車折腳又云夢見日有火災皆驗太史曰三問皆不夢即試君耳何以皆應曰神靈祐君與夢無異帶夫印綬張奐為武威太守妻懷孕夢帶夫印綬登樓占者云當生子復此郡終此樓果然馬舞黃平夢居中馬舞數十人向馬拍手素紞曰馬火也馬舞火起也向焉拍手救火也平未歸而火發孔精爽可畏李德裕既沒見夢令狐綯曰公幸哀我使得歸葬綯語其子滈滈曰執政皆其憾可乎既夕又夢綯懼曰衛公精爽可畏不言禍將及白于帝得以喪還夢紫文大鳥張鷟為兒時夢紫文大鳥五色成文止其庭大父曰吾聞五色赤文鳳也紫文鸑鷟也若壯殆以文章瑞朝廷乎遂命以名夢雙陸不勝狄仁傑武后謂曰朕夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無子也天其意者以儆陛下乎且太子天下本本一搖天下危矣乘舟判為二義陽王琮子行休始琮與二弟同死桂林開元四年行休請身迎柩既至無封樹議者謂不可復得行休歸地布席以祈是夜夢王乘舟舟判為二既而適野見東州中斷乃悟在洛南洲行休既至趣其所發之如言而一節獨闕行休號而寢夢琮告曰在洛南洲明日直殯南得之於是以三喪歸帝夢惠宣太子業有疾帝憂之一昔容髮為變因假寢夢獲方寤而業少間年踰四十當貴裴寂過華山祠祈神自卜夜夢老人謂曰君年踰四十當貴杜如晦甍帝後忽夢如晦若平生魏徵疾甚帝與太子至徵第是夕帝夢徵若平生及旦甍薛收卒秦王即位嘗夢收如平生夢進讜言虞世南卒帝後數歲夢進讜言若平生夢人遺雙筆李嶠為兒時夢人遺雙筆自是有文辭王涯既族女為竇訓妻以痼病免家人紿告涯當貶忽夢涯自提首告曰族滅矣惟若存歲時無忘我女驚號墮地乃以實告賈餗少與沈傳師善傳師前死嘗夢云君可休矣餗寤而祭諸寢復夢曰事已爾叵奈何遂及誅伊謹葬父喪母將合葬而不知父墓晝夜哭夢若有導者既然發之舊志可按也乃得葬劉昌初城平涼當劫盟後將士骸骨不藏昌始命瘞之夕夢若詣昌厚謝者昌其以聞德宗下詔哀痛出衣數百稱官為賽具斂以棺槥書皎皎白駒字杜牧初牧夢人告曰爾應名畢復夢書皎皎白駒字或曰過隙也牧曰不祥也顏杲卿初杲卿被殺徇首于衢莫敢收有張湊者得其髮持謁上皇是昔見夢帝寤為祭夢日墜以首承之賈隱林奏曰臣嘗夢日墜以首承之帝曰非朕邪因紏察行在夢游帝居賀知章天寶初夢遊帝居數日寤乃請為道士還鄉里詔許之楓生腹上張志和母夢楓生腹上而產志和持巨鑿破其心尹知章少雖學未甚通解忽夢人持巨鑿破其心內若劑焉驚悟志思開徹遂遍明六經王勃夢告易王勃嘗讀易夜夢若有告者曰易有太極子勉思之寤而作易發揮數篇與人論大衍數李適嘗夢與人論大衍數寤而曰吾壽盡此乎長庚李白之生母夢長庚星因以命之鳳集其身王遠知母晝寢鳳集其身因有娠男子求為妻堅貞節婦李者十七嫁為鄭廉妻未踰年廉死夜夢一男子求為妻初不許後數數夢之李自疑容貌未衰醜所召也即截髮夢帝騎而上天武士約自言嘗夢帝騎而上天帝笑曰爾故王威黨也御大車載日月行中衢鄭光孝明皇太后弟會昌末夢御大車載日月行中衢光輝洪洞照六合寤而占之工曰君且暴貴澄湛露殿傳游藝嘗夢登湛露殿既寤以語所親有告其謀友者下獄自殺夢人晰而髯逼已李林甫夢人晰而髯逼己寤而物色得裴寬類所夢曰寬欲代我因李遇之黨逐之其後楊國忠代林甫貌類寬云夢李靖李勣安祿山起軍擊契丹還奏夢李靖李勣求食於臣乃祠北郡芝生于梁其詭詐敢言不疑如此夢神決脅以入肅宗章敬皇后吳氏肅宗在東宮后因蒙幸忽寢厭不寤太子問之辭曰夢神降我介而劍決我脅以入殆不能堪燭至其文尚隱然生代宗為嫡皇孫解佩帶履而行樂彥禎嘗夢解佩帶履而行既寤曰此神告我下將有背乎已而軍亂果因彥禎迫為乘門尋殺之大幡出指端劉仁恭嘗自言夢大幡出指端年四十九當建旄節李國威惡之補景城令上相儀衛甚盛方式卒謚曰頃吏部郎中韋乾度曰始式謚蜀用劉闢結難即謂闢曰向夢公為上相儀衛甚盛幸無相忌闢喜以為祥後闢發兵署牒首曰闢副曰式參謀曰符載大節已虧不宜得謚夢持金劉漢宏董昌使斬于市叱刑者曰吾節度使非庸人可殺我嘗夢持金殺我者必錢鏐也昌命鏐斬之夢巨人畀大稱上宮昭容者名婉兒初鄭方妊夢巨人畀大稱曰持此稱量天下婉兒生踰月母戲曰稱量豈爾邪輒啞然應後內秉機政符其夢夢以西江水滌腸五代王仁裕喜為詩其少也嘗夢剖其腸胃以西江水滌之顧見江中沙石皆為篆籀之文由是文思益進乃集其平生所作詩萬餘首為百卷號西江集諸門悉署權字蕃鎮程權始名執恭嘗夢滄諸門悉署權字乃改名以應之及入朝詔剌史鄭權代之群鹿度水史思明愛優諢寢食常在側優者以其忍恨之是夜思明驚據床叱吒優問故荅曰我夢群鹿度水鹿死而水乾云何俄如匽優相謂曰胡命盡乎少選駱悅以兵入妖夢燕王忠徙房州剌史數有妖夢封陽城侯許超夢盜羊入獄元稹曰當得城陽令後封陽城侯酉陽雜俎
