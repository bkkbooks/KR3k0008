body:
  text: 卷第九十三詬罵一白詩曰覆背善詈書曰小人怨汝詈汝惡聲至必反之北宮黝之養勇褊心惎口善詈惡聲語侵灌夫以語侵田蚡言悖薄言誶語漢書衛孫蒯飲馬于重丘毀其瓶重丘人詬之曰爾父為厲云云冉堅射陳武子中手失弓而罵慢罵疾惡惡聲隨之莊子言悖而亦悖而入怒不至罵禮言老子訴辨訟有孚窒惕中吉訟下可終必見塞而懼中道而止乃吉也天與水違行訟君子以作事謀始明則無訟契之不明訟所由興歸逋不克訟歸而逋其邑易掇患自下訟上患至掇也褫服易曰錫之鞶帶終朝三褫之注云以訟受錫榮何可保故終朝褫之者三分爭辨訟非禮勿決薄言往訴甘棠召公聽訟之所盈庭發言盈庭虞芮質厥成速獄盈庭周禮以兩劑禁人訟不滿萬錢不移書薛宣貢君為宰相相府辭訟例不滿萬錢不為移書後皆遵薛侯之故事受辭朱安世曰南山之竹不足受我辭曉譬曲直陳實仲弓為太丘長人有爭訟曉譬曲直而退無怨也諦思杜畿為河東守寬惠人相訟為陳大義令歸思之意不盡更來鄉邑咨嗟之坐獄王庭對事也傳合要舉契晉使王叔與伯與合要王叔氏不能舉其契執競爭端曲直就直助彊人謂子産辨而不德必加於戮辨爭膚受之訴不行焉煩言對簿孔嫚罵邇臣裴延齡恃得君謂必輔政少所降下至嫚罵邇臣時人側目人都不憾劉子翼嘗面折僚友短退無餘訾李伯藥曰子翼詈人人都不憾訾大臣毀朝政韋雲起大理卿鄭善果奏雲起訾大臣毀朝政所言不情貶司直於坐嫚罵張嘉貞詔宴中書省與宰相會嘉貞銜張說不已於坐嫚罵說源乾曜王晙共平解乃得去一坐失色武儒衡遷中書舍人時元稹倚宦官知制誥儒衡鄙厭之會食瓜蠅集其上儒衡揮以扇曰適從何處來遽集于此一坐皆失色坐上嫚罵張茂昭為節度使弟升璘薄王武俊為人坐上嫚罵武俊怒茂昭遣人謝乃止責罵衣冠嚴挺之名浚以字行侍御史任正名恃風憲至廷中責罵衣冠挺之讓其不敬反為所劾加右足馬鬣上嫚罵白孝德事李光弼為裨將史思明使驍將劉龍仙以騎五十挑戰加右足馬鬣上嫚罵光弼光弼登城顧諸將曰孰能取是賊孝德願以五十騎見可而進追斬其首以還似婦女高仙芝代靈察為四鎮節度使副都護程千里衙將畢思琛行宮王滔康懷順陳奉忠等皆嘗譖仙芝於靈察者既視事呼千里嫚罵曰公面雖男兒而心似婦女何邪謂琛曰爾奪吾城東千石種田憶之乎對曰公見賜者仙芝曰爾時吾畏汝威豈憐汝而賜邪又召滔欲捽辱良久皆釋曰吾不恨矣由是舉軍安之侮斥其祖李元諒李懷光反與馬燧渾瑊討之其將徐廷光素易元諒數嫚罵為優胡戲侮斥其祖又使約降曰我降漢將耳及馬燧至烽於燧元諒見韓游環曰彼詬吾祖今日斬之子助我乎許諾既而遇諸道即數其罪叱左右斬之詣燧謝劉感事見射門罵賊不空口盧奕安祿山陷東都被執臨刑罵賊不空口逆黨為變色人有告人辱罵其妹與妻為其長者得不追而問之乎追之而不至為其長者得不怒而杖之乎韓愈為河南令上人書時遭訕罵柳宗元與楊誨之書時遭訕罵不為之面則為之皆積八九年日思摧其形鉏其氣雖甚自折挫然已得號為狂疏人矣罵先生者不忌柳宗元答問盲宰相關播李希烈縛李元平因嫚罵曰盲宰相使汝當我何待我淺邪瞋目為鄙語辱密宇文化及瞋目為鄙語辱密密顧左右曰此庸人圖為帝吾當折箠驅之李密傳大罵之五代楊行密傳安仁義焚東塘以襲常州常州剌史李遇出戰望見仁義大罵之仁義止其軍曰李遇乃敢辱我如此其必有伏兵遂引軍卻而伏兵果發或至詈詰韋陟遷吏部侍郎銓號為公平然任威嚴或至詈詰議者訾其峻廷中責詈衣冠嚴挺之侍御史仕正名恃風憲至廷中責詈衣冠挺之讓其不敬反為所劾相詈訾劉崇魯見田令孜沒階趍廢制度自崇始其相詈訾俚淺稽校譬市人然讒謗二白小人在側君子信讒惑蠱君臣交亂邦國讒慝之口采苓刺讒也晉獻公好聽讒讒慝弘多魯不堪晉浸潤之譖膚受之訴不行焉可謂明也已矣盜言孔甘巧言如簧職為亂階貝錦之刺刺幽王也彼譖人者亦以太甚取彼譖人投畀豺虎敗言為讒世亂讒勝讒諂並進青蠅之刺詩曰營營青蠅止于棘讒人罔極交亂四國止于樊愷悌君子無信讒言費無極楚之讒人也屏楚王之耳目使不聰明也智者除讒以自安子常愛讒以自危子常囊瓦字衆口鑠金毀積銷骨掩鼻之譖鄭袖之計靖譖服讒掇蜂之謗尹吉甫妻譖子伯奇小人在位讒口囂囂君子退身憂心悄悄讒臣在中主人蠹也史讒諛得志投杼之疑讒言至三慈母投杼曾參之母僞言惑志聞流言不信讒說殄行讒言能絶君子之行驕人好好吠犬狺狺薏苡之謗馬按從南方歸載薏苡及援死得罪人皆譖言前所載者皆明珠文犀人之多言亦可畏也讒人罔極交亂四國采葛懼讒也萋斐萋兮斐兮成是日錦厚誣謗書一篋史甘茂曰樂羊攻于山三年拔之樂羊反語功文侯示之謗書一篋也胥動以浮言僔沓背憎緝緝扁扁謀欲譖言人之為言胡得焉官謗服讒搜慝掩謗興謗謗言乃止子常殺費無極內讒狐突謂甲生曰雖盡外敵猶有內讒蝎譖蝎木蟲謂從中起國語媒孽其短以一人毀去官上召季布至無所受令歸布曰陛下以一人譽召臣以一人毀去官臣云云上曰河東吾股肱郡故召君分謗惡有所分分謗生民子罕執撲宋築城謳曰澤門之皙實興我役皇國父也邑中之黔實畏我心子罕也罕聞之親執撲以行築者抶其不勉者乃止傳言子罕能分謗也獻子徇囚韓獻子將斬人郤獻子救之至則已斬矣郤子使速以徇曰吾以為分謗也恥獨為君子孔囂囂嗷嗷柳宗元貶永州司馬詒蕭俯書曰讒語轉侈囂囂嗷嗷漸成狂人飾智求仕者更詈僕以悅仇人之心不能自明又書自古賢人才土秉志遵分被謗議不能自明者以百數故有無兄盜嫂娶孤女撾婦翁者然賴當世豪傑分明辨列辛光史冊管仲遇盜升為功臣匡章被不孝名孟子禮之今已無古人之實為而有詬欲望人之明已不可得也詆所進兵皆鏤定秦字韋皋不與皋者詆所進兵皆鏤定秦字有陸暢上言臣何在蜀知定秦者匠名也由是議息連城白璧遭讒毀李白鞠歌行楚國青蠅何太多連城白璧遭讒毀荊山長號泣血人忠臣死為刖足鬼白玉棲青蠅君臣忽行路贈宋少府上停詔免王晬死李勉遷梁州都督山南觀察使勉以故吏前密縣尉王晬勤幹俾攝南鄭令俄有詔處死勉問其故乃為權幸所誣勉詢將吏曰上方藉牧宰為人父母豈以譖言而殺不辜乎即停詔枸晬飛表上聞晬遂獲免舊史知佞之讒讒忠沈顏讒國宰嚭讒子胥而吳滅趙高讒李斯而秦亡無極讒伍奢而楚昭奔靳尚讒屈原而楚懷囚故曰知佞之讒讒忠不知佞之讒讒國張口沫舌文粹段成式毀古之非人也張口沫舌指數於衆人人得而防之今之非人也有張其所違嚬戚而憂之人不得而防也豈雕刻機杼有淫巧乎言非有乎群邪沮謀裴延齡以姦回得幸害時蠹政物議莫敢指言公獨以身當之屢言不可翰林學士吳通玄忌公光達每切中傷陰結延齡互言公短宰相趙憬公之引拔日升為同列以公排邪守正心復異之群邪沍謀直道不勝十年罷政事陸贄贊德宗之不亡顧不幸哉在危難時聽贄謀及已平追仇盡言拂然以讒幸逐猶棄梗至延齡輩則寵任盤桓不移如山昏佞之相濟也夫君子小人不雨進邪諂得君則正士危何可訾邪陸贄贊詩人斥譖人最甚投之豺虎有比不置也如群栖楚輩則然肆訐以示公結黨以植私其言纚纚若可聽卒而入于敗亂也孔子所謂順非而澤者歟利口覆邦家者歟竇群劉栖楚贊出醜言裴度五坊小使方秋閲鷹狗所過撓官司厚得餉謝乃去下邽令裴寰才史也不為禮因誣寰出醜言送詔獄度見延英言寰無辜乃釋信讒竇建德大將王伏寶數持兵功略在諸帥上或讒其反建德殺之伏寶臨死呼曰我無罪王何信讒自刈左右手乎奇詆段文昌憲宗數欲親用頗為韋貫之奇詆偃蹇不得進為辨謗略唐次竇參數薦之參敗出為開州剌史積十年不遷韋皋鎮蜀表為副史德宗諭皋罷之次身在遠久抑不得申以為古忠臣賢士罹讒毀被放至殺身君且不悟者因采獲其事為辨謗略三篇上之帝益怒曰是乃以古昏王方我改夔州剌史不以讒害良士尉遲恭從擊王世充會尋相叛諸將疑恭且亂囚之行臺左僕射屈突通尚書殷開山曰恭慓敢令執之猜二巳結不即殺後悔無及也王曰不然恭必叛寧肯後尋相者邪釋之引見臥內曰丈夫以氣相許小嫌不足置胸中我終不以讒害良士下令求謗者崔善為纍左丞用清察稱諸曹史惡之以其短而傴嘲曰曲如鉤例封侯欲沮罷所任帝聞勉之曰昔齊末姦吏歌斛律明月而高緯暗不察至滅其家朕雖不德幸免是因下令求謗者謗乃止正直為佞人憎皇甫無逸有告遠逸交通蕭銑者時無逸與行臺僕射竇璡不協因表自陳並上璡罪有詔劉世龍溫彥博按之無狀遂斬告者而黜璡及還帝勞曰比多譖毀但以正直為佞人憎爾無逸頓首謝毀短百為魏徵亡帝恩不已登凌烟閣觀畫像賦詩悼痛聞者媢之毀短百為魏徵上疏曰夫行有素履事有成跡一人之毀未必可信積年之行不應頓虧陛下不察其原以為臧否使讒佞德行守道疏間讒邪者進又疏隋煬帝外示威重內行險忌讒邪者進忠正者退勿令讒毀者害長孫無忌二十三年帝疾甚翌日與遂長曰我有天下無忌力也爾輔政勿令讒毀者害之厚謗醜言韓瑗褚遂良貶潭州都督明年瑗上言遂良遭厚謗醜言損陛下之明折志士之鋭被讒謝病李百藥開皇初授太子通事舍人被讒輒謝病去不願知狄仁傑武后謂曰卿在汝南有譖卿者欲知之乎謝曰陛下以為過臣當改之以為無過臣之幸也譖者乃不願知賞皆讒慝辛替否上疏曰國家所愛者賞賞皆讒慝不受讒言褚遂良帝曰朕行有三二斥遠群小不受讒言契苾何力或讒之帝曰可力入延陀如涸魚得水其脫必遽帝曰若人心如鐵石殆不背我譖短李昭德武承嗣任文昌左相昭德諫承嗣已王不宜典機衡以惑衆庶且父子猶相篡奪況姑姪乎后乃罷承嗣為太子少保承嗣恨譖短之后曰吾任昭德而獲安枕是代我勞非而所知也激切魏徵奏人臣上書不激切不能起人主意激切即近訕謗被飛謗左右有毀徵阿黨親戚者帝使溫彥博按訊非是彥博曰徵為人臣不能著形跡遠嫌疑而被飛謗是宜責也得入其訾則天皇后武氏為昭儀潛斃兒衾下伺帝至陽為歡言發衾視兒死矣又驚問左右皆曰后適來昭儀即悲涕不自勝帝怒曰后殺吾女往與妃相讒媢今又爾邪由是昭儀得入其訾以讒下遷宗室孝逸威名稜然武承嗣等忌之以讒下遷施州剌史中傷隱太子建成秦王偶獨泣帝顧不樂妃緩因得中傷之為建成游說曰陛下春秋高當自娛秦王輒悲泣正為嗔忌妄屬耳陛下萬歲後王得志妄屬無遺類東宮慈愛必能全養乃皆悲不自勝帝惻然遂無易太子意為姦臣所擠段秀實晚節偃蹇為姦臣所擠見殞賊手專情謷色李實公卿為讒短遷斥者甚衆專情謷色見顏間詆切時政李宗閔與牛僧孺詆切時政觸宰相李吉甫惡之讒短百緒陸贄與裴延齡姦佞得君天下仇惡無敢言竟以太子賓客罷贄延齡揣帝意薄讒短百緒帝遂發怒欲誅贄賴陽城等交章論辨乃貶中州別駕避謗又或規其太過對曰吾上不負天子下不負所學皇它恤乎既放荒遠嘗闔戶人不識其面又避謗不著書同上以讒幸逐陸贄贊德宗在危難時聽贄謀及已平追仇盡言怫然以讒幸逐猶棄梗至延齡輩則寵任盤石不移如山昏佞之相濟也訕短時政張鸑多口語訕短時政巧文詆毀張說宇文融恚恨劾奏說引術士夜祠禱說既罷恐說復用巧文詆毀素忿說者又著疾邪篇帝聞因令致仕讒焰少衰李德裕王璠入為左丞與李漢共譖德裕嘗賂仲陽導王為不軌帝惑其言召王涯李固言路隋等質之涯璠漢三人語益堅獨隋言德裕大臣不宜有此讒焰少衰遂貶德裕為太子賓客要近譖短李峴奏常參官舉才任諫官憲官者無限員不逾月為要近譖短遂失恩罷待之以誠糾之以德崔群帝嘗語宰相聽受之際不亦難乎比詔學士集前世事為辨謗略以自警鑒其要云何群對無情曲直辨之至易有情則欺為難審也故孔子有衆惡譖潤膚受之說以其難辨也若陛下擇賢而任待之以誠糾之以德則人自歸正而不敢以欺帝韙其言疾讒韋處厚李逢吉得柄讒李紳逐為端州司馬其黨劉栖楚等欲致紳必死處厚上言逢吉黨與以紳之斥猶有餘辜人情危駭詩云萋兮斐兮成是貝錦比古人疾讒之深也紳由是免日肆讒惎馮宿詔權知諫議大夫宰相崔群王涯請授它官不聽使中人宣授馮宿怨執政不與己乃日肆讒惎與皇甫鎛相附離多中傷正人君子陸扆天復初帝密語韓偓曰陸贄裴扆孰忠於我偓曰扆等皆宰相安有它腸帝曰外言扆不喜我復位元日易服奔啓夏門信不偓曰孰為陛下言此曰崔胤令狐渙偓曰設扆如是是亦不足責陛下反正扆素不知謀忽聞兵起欲出奔耳陛下責其不死難則可以為不善乃讒言也帝遂悟指馬獻蒲先害忠良蘇安恆魏元忠為張易之兄弟所誣獄方急安恆獨申救曰易之兄弟無功德但以馮附不閲數期位勢隆極指馬獻蒲先害忠良張嘉貞遷中書令帝數幸東都洛陽主簿王鈞者為嘉貞繕第會以贓聞有詔杖之朝堂嘉貞畏衊染促有司速斃以滅言離結百計郭子儀代宗立程元振自謂於帝有功忌宿將難制離結百計因罷子儀副元帥為肅宗山陵使子儀懼讒目成盡裒肅宗所賜詔數千餘篇上之飛語楊炎開元時蕭嵩嘗度曲江南欲立私廟以為天子臨幸處乃止後炎復取以立廟飛語云地有上氣故炎取之帝聞震怒會獄具詔三司同覆貶崖州司馬同上張滂班宏竇參又以江淮兩稅置巡院官令宏張滂共擇張滂欲得簿最宏不與滂奏有詔分掌宏見宰相辭曰宏主漕歲得江淮米五十萬斛前年至七十萬今職移於人敢請罪滂在側讒曰公所言非也朝廷不奪公職乃公喪官緡縱姦吏自取咎爾凡為度支使不一歲家輒巨億僮馬産第侈王公非盜縣官財何以然上既知之故令滂分掌今公無乃歸怨上乎宏不答於是移病歸其言虛誣顏真卿元載多引私黨畏群臣奏事多挾讒毀請每論事先皆白長官白宰相詳可否以聞真卿三疏曰其言虛誣則讒人也宜誅殛之其言不誣則正人也宜獎勵之捨此不為使衆人為陛下不能省察密言晟不可久持兵李晟張延賞當國故與晟有隙後雖詔講解而陰不與也密言晟不可久持兵更薦劉玄佐李抱真經略西北俾立功以間晟帝惑其言譖煩碎非廟器柳玭昭宗欲倚以相中官譖玭煩碎非廊廟器乃止為所譖短楊於陵拜中書舍人時京兆李實恃恩暴橫於陵與所善許孟容不離附為所譖短徙祕書少監為飛語聞京師出為嶺南節度使監軍許遂振者悍戾貪肆憚於陵不敢撓以私則為飛語聞京師憲宗不能無惑有詔罷歸被譖繫獄顏春卿調犀浦主簿長史陸象先異之轉蜀尉蘇頲代為長史被譖繫獄為棕櫚賦自託頲遽出之造為醜辭鄭絪遷門下侍郎始盧從願陰與王承宗連和有詔歸潞從史辭潞乏糧請留軍山東李吉甫密譖絪漏言於從史帝怒坐浴堂殿召學士李絳語其故絳曰誠如是罪當族然誰以聞陛下者帝曰吉甫為我言絳曰絪任宰相識名節不當如犬彘梟獍與姦臣外通恐吉甫勢軋內忌造為醜辭以怒陛下帝良久曰幾誤我受謗輿人邵說德宗立擢吏部侍郎說因自陳疇昔本末先帝知之今又擢以不次雖自天斷尚恐受謗輿人傷陛下之明今吏員末乏而調者多益以功優準平格以判留人去者十七彼且鼓讒說以投疑于上此臣所大懼也陽讒陰謗傅奕疏昔高齊章仇子他言僧尼塔廟外見毀宰臣內見疾妃嬙陽讒陰謗卒死都市讒口亂善人唐次元和辨謗略序正言勝則為忠為讜邪言勝則為讒為諛語曰邪徑敗良田讒口亂善人惡其莠言之蠹政也蓋謂似信而詐似忠而非便便可以動心捷捷可以亂聽薏苡惑珠豈止鵜鴂雕卉薏苡惑珠哉讒勝則忠義靡彰同上周公之聖不免流言霍光之忠亦遭告訐陸宣公奏議大抵任重勢疑易生嫌謗以周公之聖不免流言霍光之忠亦遭告訐向非成王覺寤昭帝保明則二主之德美不傳二臣之冤誣莫辨秦鏡破膽元槇戒風俗文苟非秦鏡破膽堯羊觸邪時君聽之肉腰刀李林甫嫉賢妒能潛行讒毀多被其害謂之肉腰刀天寶遺事李義府號曰人貓本傳笑中有刀同上多田翁宇文融為括田使恃權譖毀不附己者奏言從願田園數百帝聞果不喜呼從願願為多田翁聖慮先辨謗何由興辨謗略序乃詔掌文之臣令狐楚等上自周漢下洎隋朝求史籍之忠賢罹讒謗之事跡敘瑕亹之本末紀謠詠之淺深編次指名勒成十卷備乙夜之觀則聖慮先辨謗何由興宦豎切齒房琯宋申錫為讒所死宦豎切齒時宰無敢辨者琯固請出獄付外與衆治之天下重其賢猜譖遽行魏徵贊君臣之際固不難哉以徵之忠而太守之睿身沒未幾猜譖遽行始徵之諫纍數十餘萬言至君子小人未嘗不反復為帝言之以伎邪之亂忠也久猶不免浩浩者易污嶢嶢者難全同上姦人排恨幾不免張說贊中為姦人排恨幾不免自古功名始終亦幾希黃金消衆口白璧竟難投李白送薛九詩賢聖遇讒慝不免人君疑天風拔大木禾黍成傷萎寓言同上二桃殺三士詎假劍如霜衆女妒蛾眉雙花竟春芳懼讒上辨讒貴於明恕明者在驗之以跡恕者在求之以情陸贄奏議論所宣事狀竹籠沉京口南唐徐融夜宿金山詩淮船分蟻點江岸聚蠅聲烈祖性嚴忌宋齊丘譖之竹籠沉京口南唐近事不附者潛被瘡痏牛羊日曆李逢吉惡其為人牛僧孺乃與楊虞卿兄弟驅駕輕薄毀短逢吉又惡裴度之功曾進曹馬傅以謀陷害虞卿又結李宗閔之門人盡驅之牛門此外有不附者潛被瘡痏遭之者謂之陰毒傷寒京口語曰太牢筆少牢口東西南北何處走太牢僧孺少罕虞卿禍階初負謗杜詩終悲洛陽獄事近小臣敝禍階初負謗易力何深擠似錦言應巧如絃數易欺元稹百韻詆訕盈朝萋斐成市柳宗元上裴相書廣略初定異議紛然詆訕盈朝萋斐成市世道難於劍讒言巧似簧元稹詩人君之德莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也年十四而知燕王書詐後有譖霍光者上輒怒曰敢有譖毀者坐之周成王有慚德矣高祖文景俱不如也李德裕窮愁志涸魚得水其脫必遽契苾何力被執也或讒之帝曰何力入延陀如涸魚得水其脫必遽帝曰不然若人心如鐵石殆不背我會使至言狀帝泣下即詔兵部侍郎崔敦禮持節許延陀尚主得求何力乃得還有喙有耳相郵傳作醜語柳子蜀之寶貨皆入崇韜唐臣郭崇韜莊宗聞破蜀遣宦官向延嗣勞軍崇韜不郊迎延嗣大怒因與李從襲等共誣之延嗣還上蜀簿得兵三十萬馬九千五百匹兵器七百萬糧二百五十三萬石錢一百九十二萬緡金銀二十二萬兩珠玉犀像二萬文錦綾羅五十萬匹莊宗曰人言蜀天下之富國也所得止於此邪延嗣因言蜀之寶貨皆入崇韜且誣其有異志將危魏王莊宗怒遣宦官馬彥圭至蜀視崇韜去就彥圭以告劉皇后后教彥圭矯詔魏王殺之朋讒奇中桓彥範傳是時武三思以遷太后恚慮不利諸武而韋后雅為帝寵且畏三思與蒸亂由是朋讒奇中未幾罷彥範等政事白辱在泥塗絳老城下之盟恥辱之事雖死不辱宋公靳之宋南宮長萬為魯獲宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣萬疾之遂殺公注戲而相愧曰靳廷辱辱莫大焉恥辱辱以激之蘇秦貴達張儀詣之秦坐之堂下食以僕妾之食曰張君吾才不及而未達故恥辱以激之儀大恨乃之秦蘇秦密使人持金濟窮困不使言之儀達方知曰為我謝蘇君食以莝豆范睢大具請賓客使坐須賈於堂下置莝豆使黔徒夾馬而飼之胯下韓信被淮陰少年辱之曰能死刺我不能出胯下信俯而出於胯下淮陰市人皆大笑之困辱為榮史呂起知足不辱老子壽則多辱莊子孔小兒所辱高銖徙太常卿嘗罰禮生博士李愨慍見曰故事禮院不關白太常故卿蒞職博士不參集罰小史隳舊典銖嘆曰吾老不能退為小兒所辱耐辱居士司空圖自目為耐辱居士省吏眙駭裴坦令狐綯薦為知制誥而裴休持不可不能奪故事舍人初詣省視事回丞相送之施一榻堂上壓角而坐坦見休重愧謝伏勃然曰此令狐丞相之舉休何力顧左右索肩輿亟出省吏眙駭以為唐興無有此辱人為垣羞之至加捽辱裴潾遷左補闕於是兩河用兵憲宗任官人為館驛使檢稽出納育曹進玉者恃恩倨甚使者過至加捽辱宰相李吉甫奏罷之會伐蔡復以中人領使潾諫之婦人過忤更使外辱乎玄宗貴妃楊氏復得譴還外弟國忠謀於吉溫溫因見帝曰婦人過忤當死然可惜宮中一席廣為鐵鑕批更使外辱乎帝感動癡物辱九卿五代盧程有假驢大於程者帖興唐府給之府吏啓無例程怒笞吏背少尹任圜莊宗姊壻也詣程訴其不可程載華陽巾衣鶴氅據案決事視圜罵曰爾何蟲豸恃婦家力邪圜不對而去夜馳至博州見莊宗莊宗大怒謂郭崇韜曰朕誤相此癡物敢辱豫九卿趣令自盡以事凌辱慕容彥超杜仲威反於魏高祖以天平軍節度使高行周為都部署以討之以彥超為副彥超數以事凌辱行周行周不能忍見宰相涕泣以屎塞口以自訴高祖知曲在彥超遣人慰勞行周召彥超責之又遣詣行周謝過行周意稍解五代史摧折氣愈下韓愈書懷數使酒辱周太祖于軍中漢臣蘇逢古嘗從高祖征鄴數使酒辱周太祖于軍中太祖恨之五代史身幽辱不忘朝廷唐儉為劉武周所擒武周敗入突厥儉封府庫籍兵甲以待秦王帝嘉儉身幽辱不忘朝廷詔復舊官白苞羞或承之羞君子有恥有其位無其言有其言無其行君子有恥若撻于市其心愧不恥不仁小人不以人之所不能者愧人勝而無恥恥過作非恭近於禮遠恥辱也一慚之不忍終身慚之知恥近乎勇無羞惡之心非人也不恥惡衣惡食衣敝縕袍與衣狐貉者立而不恥者其由也歟畢陬失色莊子言子貢赧然流汗會稽之恥范蠡三敗之辱曹沫宿恥刷恥並漢書孔趙惠伯殯嚴郢楊炎之罷盧杞引郢為御史大夫共謀炎罪即逮捕河中觀察使趙惠伯下獄楚掠慘棘煆成其罪卒逐炎崖州惠伯貴州天下以郢挾宰相執仇為不直然杞用郢敗炎內忌郢才因按蔡廷玉事殺御史鄭詹出郢為貴州刺史道逢柩殯問之或曰趙惠伯之殯郢內慚忽忽歲餘卒羞悵流汗閻立本初太宗與侍臣泛舟春苑池見異為容與波上召立本侔狀閣外傳呼畫師閻立本是時巳為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗縮頸羞汗法陀贊熟視帝劫遷縮頸羞汗不亦鄙乎面頸發赤抑首吐氣盧從史為不法君陰爭不從則於會肆言以折之從史羞面頸發赤抑首吐氣不敢出一語以對之韓文孔君志慚顏如甲進士王光遠于索豪權無厭或遭笞辱亦不愧恥時人語曰光遠慚顏厚如干重鐵甲也天寶遺事覘歌姬命飾粧使詳視柳棠應進士舉時嚴舍人重之諸歌姬方戲於階問輒覘之牆頭何人也曰柳生也遽使姬者飾粧使視恐墻上遠見不甚分明請細觀矚棠深大慚而去雲溪友議韓信羞將絳灌比禰衡恥逐屠沽兒李白答王十二蹙然汗出以慚韓文或面窮詰無不羞汗劉洎頃上書有不稱旨或面窮詰無不羞汗厚顏懷愧柳宗元送苑論序余不厚顏懷愧而陪其游久矣顏忸怩而心不寧者數月韓文博士紛汩非病士所宜裴耀卿改右僕射而李林甫代之上曰林甫至本省具朝服劍佩博士導郎官唱接禮畢就耀鄉聽事乃常服以贊者主事導唱林甫驚曰班爵與公同而禮數異何也耀卿曰比若眩不堪重衣又郎傳士紛汩非病士所宜林甫默然慚愧生於中顏變於外韓文淫汙靦然武三思二張方蒸蠱三思痛屈節為懷義御馬倡言昌宗為王子晉後身引公卿歌詠淫汙靦然如人而不恥也縮縮愧沮吐蕃弄贊見中國服飾之美縮縮愧沮羞愧以手掩面閩王繼鵬既立更名昶晉高祖遣散騎常侍盧損冊封昶閩王損至昶稱疾不見遣中書舍人劉乙勞損于館乙衣冠偉然騶僮甚盛它日損遇乙于塗布衣芒屩而已損使人誚之曰鳳閣舍人何逼下之甚也乙羞愧以手掩面而走昶聞之怒損稍侵辱之昶還無所答痛心疾首思刷厥恥蕭銑報董景珍書曰我先君昔事隋職貢無廢乃貪我土宇滅我宗祐我是以痛心疾首思刷厥恥羞縮待之如初則天皇后召方士郭行真入禁中為蠱祝宦人王伏勝發之帝怒因是召西臺侍郎上官儀儀指言后專恣失海內望不可承宗廟與帝意合乃趣使草詔廢之左右馳告后遽從帝自訴帝羞縮待之如初白悔而不及雖悔可追往者不可諫食己伍員曰不滅越後雖悔之不可食己言何悔事不可消動而有悔悔自動而生魏其侯灌夫恨相知之晚也孔自恨死段秀實初為營田官涇大將焦令諶取人田自占紿與農約熟歸其半是歲大旱農告無入令諶曰我知入不知旱也農往訴秀實署牒免之令諶怒召農責曰我畏段秀實邪以牒置背上大杖擊二十輿致庭中秀實泣曰乃我困汝即自裂裳裹瘡注藥賣己馬以代償淮西將尹少榮罵令諶曰汝誠人乎段公仁信大人惟一馬賣而市榖入汝汝取之不恥令諶大愧流汗曰吾終不可見段公一夕自恨死椎坐悵恨彈指流血敬暉三思濁亂暉每椎坐悵恨彈指流血尋及貶銜悔張嘉貞遷中書令出為豳州剌史說代其處嘉貞銜悔謂人曰中書令幸二員何相迫邪勸朱泚入朝蔡廷玉勸朱泚入朝泚將聽諸校怒縛廷玉辱之無撓辭泚不忍殺囚歲餘出之謂曰而亦悔乎廷玉曰導公為逆即悔勉公以義何悔為復縶滿歲忿恨薛逢初與彭城劉瑑交瑑文辭出逢數人下棠易之瑑稍親近逢不得意遂相忿恨扼腕悵恨李全略縮氣悵恨高駢黃土覆面無恨九原元稹謝表萬一歸還不敢更望得見天顏但得再聞京城鐘鼓之音臣雖黃土覆面無恨九原臣無任自恨自慚攀戀聖慈之至忠正負冤恨杜甫詩恨悵崔元略初中丞闕議者屬崔植而元略謬謂植入閣不如儀使御史彈治及宰相以二人進元略果得之植恨悵威虐六白北風剌虐也衛國並威虐滅德作威依勢作威敷虐於百姓罹其凶害虐我則讎播戎毒于遠邇戎夫也敢行暴虐殘害于爾萬姓流毒下國謂暴無傷毒痡四海痡病也結怨于人洪惟作威暴殄天物害虐蒸民其虐滋甚將戕于豫我殘殺也唯戮是聞以人為土芥視人如讎不教而殺謂之虐不戒視成謂之暴政暴刑肅俗弊苛政猛於虎虐使其人忍人疵國威克厥愛以戕害為藝是樂殺人剝喪元良賊虐諫輔亂罰無罪殺戮無辜哀矜庶戮之不辜報虐以威言誅其虐脯醢紂脯鬼侯醢刑侯焚灸忠良刳剔孕婦斫朝涉之脛剖賢人之心暴政淫刑政荒民散塗炭土芥賊賢害人暴內內國中刑也糾暴周禮以國刑糾暴虐用其人怨毒之氣懊烈之聲孔殘忍為政李實吏乞貸毫釐輒死按之無罪者猥曰死亦非枉復殺之專以殘忍為政實貶通州長史市人爭懷瓦石邀劫之實懼夜遁去姦邪苛刻皇甫鎛裴度表罷政事極論鎛姦邪苛刻天下怨之將食其肉小忤己不得死地不止盧杞狙害隱毒李希烈反杞素惡顏真卿挺正敢言即令宣慰其軍卒為賊害故宰相李揆有雅望遣為吐蕃會盟使卒于行季洧以徐州降有所經略使人誤先白鎰杞怒沮解之不使有功其狙得害隱毒天下無不痛憤以杞得君故不敢言忍於傷殘陸贄傳李希烈果於奔噬忍於傷殘據葵許富全之地而益以鄧襄虜獲之實東寇則餉道阻北窺則都邑震比所謂急也當其忍斷雖甚愛不少隱則天皇后武氏每視朝殿中垂簾帝與后偶坐生殺賞罰惟所命當其忍斷雖甚愛不少隱也姦臣肆虐王義方擢侍御史不再旬會義府縱大理囚婦淳于迫其丞畢正義縊死無敢白其姦義方問計於母即上言今陛下撫萬方而有之蠻區夷落罪無逃罰況殺人滅口此生殺之柄不自主出而不移佞臣履霜堅冰彌不可長請下有司雜治恐懼七白齎咨涕洟夕惕若厲困于臲卼涉于春冰如臨深淵如履薄冰若蹈虎尾憂心如醉如醒心之憂矣知我者謂我心憂隱憂憂心悄悄慍于群小如燕之巢幕危懼也內省不疚何憂何懼子畏於匡君子有三畏有威可畏亦可畏也不足畏也惴惴其栗魏勃股戰則志不懾貧賤好禮吁可畏也搶攘不安貌惴恐使民戰栗孔為危惴可憐者蘇味道證聖元年與張錫俱坐法繫司刑獄銀雖下吏氣象自如味道獨席地飯蔬為危惴可憐者武后聞之放錫嶺南才降味道集州剌史懾憚李訓天子傾意宦官衛兵皆懾憚迎拜雖盛寒必流汗安祿山李林甫以宰相貴甚群臣無敢鈞禮惟祿山倚恩入謁倨林甫欲諷寤之使與王鉷偕鉷亦位大夫林甫見鉷鉷趍拜卑約祿山惕然不覺自罄折林甫與語揣其意迎剖其端祿山大駭以為神每見雖甚寒必流汗朝廷重足許敬宗朝廷重足事之威寵熾灼當時莫與比劉總比年上書請覲使問行期乃不報卿為我行諭意造至范陽為開示禍福總懼矍然若兵加於頸溫造百僚謁事畏惕未嘗敢及以私韋處厚輔政須大怖乃得玄宗時有金梁鳳者頗言人貴賤壽夭鳳謂呂禋曰君且輔政須大怖乃得諲責驛史榜之史突入射諲兩矢幾中走而免明年知政事毛髮為森豎李德裕宣宗即位德裕奉冊太極殿帝退謂左右曰自行事近我者非太尉耶每顧我毛髮為森豎懼形于色五代趙瑩晉高祖將起兵太原以問諸將吏或贊成之瑩獨懼形于色勸高祖毋反高祖雖不用其言心甚愛之聞人足聲輒悸韋執誼已失形勢知禍且及雖尚在位而臨事奄奄無氣聞人足聲輒悸動至于敗雖冬月未嘗不流汗桑維翰狀貌既異素以威嚴自持晉之老將大臣見者無不屈服張彥澤以驍悍自矜每往候之雖冬月未嘗不流汗五代史為國家深可畏者六大理少卿康澄上疏言時事其言曰為國家有不足懼者五深可畏者六三辰失行不足懼大象變見不足懼小人訛言不足懼山崩川竭不足懼水旱蟲蝗不足懼也賢士藏匿深可畏四人遷業深可畏上下相徇深可畏廉恥道消深可畏毀譽亂真深可畏真言不聞深可畏也識者皆多澄言切中時病五代史明宗本紀芒剌在背崔日用嘗謂人曰吾平生所事皆適時制變不專始謀然每一反思若芒剌在背云持軍嚴雖盛夏號令士皆若負霜雪李密傳白愚人老子曰我愚人之心也純純然下愚子曰唯上智與下愚不移古之愚也直今之愚也詐無惠傳曰周子有兄無惠不能辨菽麥智者詐愚如愚吾與回言終日不違如愚蠢而愚夏尚忠其人之敝愚夫愚婦其愚不可及好仁不好學其敝也愚詩之失愚一得愚者千慮亦有一得高柴見非於孔門子曰柴也愚王陵獲稱於漢氏漢高祖曰王陵少蠢愚者暗於成事三赦周禮三赦三曰蠢愚謂癡愚也愚而好自用禮陳大夫齧壯而頑愚谷愚公移山之谷善畏月孫卿子曰夏首之南有人曰消蜀良其人愚善畏月明行俯見其影以為伏鬼仰見其髮以為伏魅而走氣絶而死昧者不知詩曰哲人之愚佯愚也蔽蒙之人莊子被髮童子日月照之則行莊子童子何知比頑童書我愚人也不知義之所適禮之所將甚乎無適莊子宋人有守株之愚刻舟膠柱趙大夫也孔陽為愚安祿山時宰相李林甫嫌儒臣以戰功進尊寵間己乃請顓用蕃將故帝寵祿山益牢群議不能軋卒亂天下林甫啓之也祿山陽為愚不敏蓋其姦陸上書曰所謂民者至愚而神夫蚩蚩之倫或昏或鄙此似於愚也然上之得失靡不辨好惡靡不知所祕靡不傳所為靡不效馭以智則詐示以疑則偷接不以禮則其徇義輕撫不以情則其效忠薄明王之時智者用愚者伏用者宜邇伏者宜遠柳宗元愚溪對寧武子邦無道則愚智而為愚者也顏子終日不違如愚睿而為愚者也皆不得為真愚柳宗元愚溪詩序剛正者謂愚唐史韓琬上書愚不可教后妃尚宮宋若昭父廷芬能辭章生五女皆警惠善屬文廷芬男獨愚不可教為民終身顓嚚蒙愚不知所如柳宗元答問僕乃單膚撇莩離疏空虛竊聽道塗顓嚚蒙愚不知所如固不足以抗顏搖舌而與之俱愚者果於自用柳懲咎賦愚者果於是用兮惟懼夫誠之不一亂國之君常置愚不肖於上而強其不能以暴其短惡置賢智於下而泯沒其材能使君子小人皆失其所而身蹈危亡周臣傳蠢甚丹陽公主下嫁薛萬徹萬徹蠢甚公主羞不與同席者纍月太宗聞而笑焉課愚對聖劉洎諫帝王之與臣庶聖哲之與庸愚等級遼絶勢不倫擬故課愚對聖持卑抗尊雖思自彊不可得已外愚而內敏婁師德外愚而內敏表晦而裏明出朝野僉載妖訛九白僞言難信何必徵辭聾俗易驚宜所知禁國時有恐以妖訛相驚執左道以亂政左道巫蠱假鬼神以疑衆時日卜筮疑衆殺熒惑於人言經營惑亂也宜遵國禁無俾世迷而胥動以浮言恐沉于衆譸張為幻譸張作詐以為幻惑崇飾訛言肆行幼術惑蠱虛詭去邪勿疑除惡務本亂常連戾納邪既協前言則非左道姦之大者法可逃乎妖由人興咎將誰執造言之刑亂人之刑周禮八刑糾萬人七曰造言之刑八曰亂人之刑注造言造作訛言惑衆也亂人亂名改作執左道以亂政辨惑知防執禁亦秪以異驚俗變風他能自咎無妄憑虛狹邪人無釁焉妖不自作人棄常則妖興氣焰人之所忌氣焰以取之行非正法思豈無邪動以浮言衆寧不惑不得中行寧非左道左道雖則非妖於人且為無益政先去惑人貴知常苟於衆而可疑雖非妖而必禁去邪除惡宜絶本根作僞飾辭勿聽枝葉思匪無邪動必有悔辭雖徵於捕影罪難逭於麗刑謀則不臧言非無罪孔化為男子崔義玄遷婺州剌史時睦州女子陳碩真自言仙去與鄉鄰辭訣或告其詐已而捕得詔釋不問於是姻家章叔胤妄言碩真自天還化為男子能役使鬼物轉相熒惑用是能幻衆自稱文佳皇帝以叔胤為僕射破睦州攻歙殘之分遣其黨圍婺州義玄發兵拒之治丹剔小兒肝心楊虞卿大和九年京師訛言鄭注為帝治丹剔小兒肝心用之民相驚扃護兒曹帝不悅注亦內不安而雅與虞卿有怨即約李訓奏言語出虞卿家蛇虎導軍薛季昶擢給事中夏官郎中侯味虛將兵討契丹不利妄言賊行有蛇虎導軍后惡其詭拜季昶為河北道按察使季昶馳至軍斬味虛以聞威震北方以左道惑衆班宏高適鎮劍南表為觀察判官青城人以左道惑衆謀作亂事覺誣引屯將規緩死衆凶懼宏驗治即殺之人心大安金頭王李匡威留深州遣其屬李抱貞上書願入朝時京師數寇難人人危懼傳言金頭王且來皆亡竄山谷馮詭惑說妖祥李雍中宗立鄭普思以方伎幸雍諫曰陛下躬政日淺有九重之嚴未聞道路橫議今籍籍皆言普思馮詭惑說妖祥陛下不知猥見驅使託神詭衆董昌託神以詭衆始立生祠刳香木為軀內金玉紈素為肺腑冕而坐妻媵侍別帳百倡鼓吹於前屬兵列護門所屬州為土馬獻祠下列牲牢祈請或紿言土馬若嘶且汗皆受賞昌自言有享我者我必醉訛言韓朝宗始開元末海內無事訛言兵當興衣冠潛為避世計朝宗廬終南山為長安尉霍仙奇所發玄宗怒使侍御史王鉷訊之貶吳興別駕非衣小兒裴度寶曆二年度請入朝逢吉黨大懼權輿作僞謠云非衣小兒坦其腹天上有口被驅逐以度平元濟也都城東西岡六民間以為乾數而度第平樂里直第五岡權輿乃言度名應圖讖第據岡原不召而來其意可見欲以傾度天子獨能明其誣㹫毋鬼五行志咸通十四年秋成都訛言有㹫毋鬼夜入人家民皆恐夜則聚坐或曰某家見鬼眼晃然如燈焰民益懼去君著黃黃巢贊廣明元年巢始盜京師自陳唐去君而著黃明黃且代唐也鳴呼其言妖與右廂天子僖宗時閭巷鬥者激怒言任見右廂天子五行志族鹽武后時民飲酒謳歌曲終而不盡者謂之族鹽曲遍繁聲謂之入破五行志天寶後樂曲亦多以邊地為名有伊州甘州梁州等至其曲遍繁聲皆謂之入破又有胡旋舞本出康居以旋轉便捷為巧時又尚之破者蓋破碎云築臺以侯玉女李軌有胡巫妾曰上帝將遣玉女從天來遂召兵築臺以侯女多所靡損白厥口咒詛言怨上也三物詩曰出此三物以詛爾私咒我范文子使祝宗祈死曰愛我者惟咒我使我速死無及於難范氏之福也有咀有咒子罕曰宋國區區有詛有咒亂之本也有損晏子者祝有益也詛亦有損雖有善祝豈勝億兆人之詛者行出犬雞鄭莊公使卒出猳行出大雞以詛射穎考叔者君子謂莊公失政刑矣既無德政又無威刑是以及邪邪而詛之將何益矣夫婦皆詛左傳云善祝孔與下咒誓秦瓊後歸王世充與程咬金許曰世充多詐數與下咒誓乃巫嫗非撥亂主也致龍起雨西域天竺國信盟誓傳禁咒能致龍起雲雨向殿哭劉崇望李磎言崇望為宰相使親吏日夕謁左軍與復恭相親厚純巾慘帶不入禁門崇魯向殿哭厭詛天祚殆人之妖禁咒莫不有五代王建及莊宗積金帛於軍門募能破梁戰艦者至於吐火禁咒莫不有詛師毒口牙舌作霹靈飛韓愈譴瘧鬼詩咒禁教以博士大醫署四曰咒禁師皆教以博士考試登用如國子唐史百官志告以厭詛徐有功竇考諶妻龐為其奴怖以妖崇教為夜解因告以厭詛給事中薛季昶鞫之淫亂十一白內作色荒朋淫于家妻妾亂也冒色商王受沉湎冒色言貪色也淫風徇于貨色時謂淫風汙行管子曰桓公云寡人有所行不幸而好色姑姊妹有不嫁者管仲曰惡則惡然非其惡荒腆于酒腆厚也淫風流行雖有七子之母不安有室衛風宣淫陳靈公與孔寧儀行父通於夏姬皆衷其袒服以戲於朝泄治諫曰公卿宣淫人無效焉淫破義傳貪色為淫淫為大罰禮無縱欲神亦禍淫無別無義禽獸之道漁色諸侯不下漁色謂娶國中之女防淫禮者所以防淫遠色君子遠色以為民紀易色賢賢易色鳥獸行周禮內外亂鳥獸行則滅之父子聚麀禮謂禽獸無別綴淫禮者所以防民之綴淫也淫溺大欲飲食男女人之大欲存焉戒之在色血氣未定惑以喪志惑蠱之疾晉侯疾求醫於秦秦伯使醫和視之曰不可為也是謂近女色疾如蠱非鬼非食惑以喪志公曰女不可近乎對曰節之女陰物也而晦時淫則生內熱惑蠱之疾君今不節不時能無及此乎趙孟曰何謂蠱對曰淫溺之所生也在周易女惑男謂之蠱也夫有尤物足以移人苟非德義則必有禍禮曰民猶以色厚於德未見好德如好色者也好內齊桓公寧思易色之賢但慕冶容之誨淫奔蝃蝀剌奔也淫奔之恥國人不齒相奔男女不待禮而相奔既汙貞信之教宜科淫僻之愆有女懷春吉士誘之自獻其身桑中衛之男女相奔至於世族在位相切妻妾期我於桑中要我乎上宮中冓之言不可道也謂內淫之言奔誘遂相奔誘桑中之喜巫臣聘夏姬以奔楚申叔曰夫子有桑中之喜將切妻以逃以懲淫慝棄位而姣穆公曰棄位而姣我則取惡能無咎乎淫泆擲蜾潘嶽竊香韓壽賈充女奔之文君之奔長鄉既奸人紀難逭國章男女有別室家無瀆奔則為妾始因怨曠之思遂乃淫奔之恥芍藥之歌既以身而投贈鳳皇之曲不待禮而來奔仲春不禁周禮仲春令男女於時奔者不禁注云重天時泉丘之女泉丘人有女夢以其帷幕孟氏之廟遂奔其僚從之盟曰無相棄也左傳無夫家詩序曰古者國不足則殺禮而多昏會男女之無夫家者夷狄昏禮鳥桓嫁娶則先略女通情或半年者然後送牛馬羊為聘禮抱布貿絲匪來貿絲來即我謀詩氓篇姧犯禮為奸在內為奸挑鄰女而投梭折齒引美人而牽衣絶纓淫奔折齒謝鯤字幼輿淫奔之女肆心彊暴之男置力無展委之貞有宋朝之美沐貞信之教心尚不悛速淫泆之辜法宜無捨將懲奸慝請正科條既亂人紀宜展國章去惡宜絶其本根節辭勿聽於枝葉陽侯殺穆侯而竊其夫人故饗廢夫人之禮目逆而送之華父督見孔父之妻拊楹而歌齊莊公通東郭姜不能自還原涉曰寡婦欲慕宋伯姬不幸一為盜賊所汗遂為淫泆知非禮然不能自還亂族禮以此防民猶淫泆而亂族彊暴之男不能侵陵貞女詩蒙衣齊慶克通於聲孟氏蒙衣乘輦而入蒙衣謂著婦人衣陰訟周禮男女之陰訟音聽於勝國之社其附于刑者歸之於士注陰訟爭中冓之事勝國亡國之社淫僻之罪禮婚姻之禮廢則夫婦之道缺而淫僻之罪多也自戒顏叔之有節揚秉之不惑秉字叔節言我有三不惑謂酒色財也誨淫之容易曰冶容誨淫伐性之斧皓齒蛾眉伐性之斧道貴寡欲天惟禍淫晉侯惑蠱而身喪靈公宣淫而國亡淫為大罰淫破義防淫君子刑以防淫遠色易色戒之在色不腆于色不淫其色可無懲乎以禮自間惟王不邇聲色以禮制心三代之亡皆是物也言皆以色致女之戒羅氏致鹿與女以戒諸侯曰好畋好女者亡其國也禮蠟祭云孔邪人穢夫爭候門下上官昭容名婉兒是時左右內職皆聽出外不可止婉兒與近嬖至皆營外宅邪人穢夫爭候門下高陽公主房遺愛尚高陽公主王稍失愛意怏怏與浮屠辨機亂帝怒斬浮屠殺奴婢數十人淫蠱顯行張易之后每燕集則二張諸武雜侍摴博爭道為笑樂或嘲詆公卿淫蠱顯行無復羞畏宣淫於外崔湜附托昭容上官氏數與宣淫於外紀處訥妻武三思婦之姊縱使通三思由是款昵調笑嬉褻陸長源徙宣武判官孟叔度淫縱數入倡家調笑嬉褻長源輒裁正之郭英乂崔寧郭英乂為節度使徙寧家於成都而淫其妾媵曹芬竇參遷奉先尉男子曹芬兄弟隸北軍醉暴其妹父救不止恚赴井死參當兄弟重辟衆請俟免喪參曰父由子死若以喪延是殺父不坐皆榜殺之閨薄汙慢陳叔達後閨薄汙慢為有司露劾帝以名臣為護掩宣淫不止楊國忠至京師見群女弟致贈遺於時虢國新寡國忠多分賂宣淫不止調笑施施若禽獸然虢國居宣陽坊左國忠在其南自臺禁還趣虢國第郎官御史白事者皆隨以至居同第出駢騎相調笑施施若禽獸然不以為羞道路為恥駭悅神亭前蜀王衍作悅神亭與諸狎客婦人日夜酣飲其中宮中戲五代毛璋在華州得魏王繼岌餘資既富而驕益為淫侈嘗服赭袍飲酒使其所得蜀妓為王衍宮中之戲于前明宗聞而惡之淫戲南唐劉鋹宦者龔澄樞等既專政鋹乃與官婢波斯女等淫戲後宮不復省事出入民家南唐劉玢襲在殯召伶人作樂飲酒宮中裸男女以為樂或衣墨縗與倡女夜行出入民家虢國素與國忠亂不恥每入謁並驅道中從監侍姆百餘騎炬密如晝靚粧盈里不施帷障時人謂為雄狐貴妃傳與武三思升御床博戲中宗庶人韋氏初帝幽廢與后約一朝見天日不相制至是與武三思升御床博戲帝從旁典籌不為忤三思諷群臣上后號為順天皇后縱宮女出游皆淫奔不還明年正月望夜帝與后微服過市倣徉觀覽縱宮女出游皆淫奔不還同上別嫌疑十二白君子防未然不處嫌疑間瓜田不納履李下不整冠古詩禮者所以決嫌疑禮為人防君子表微孝子不服暗暗中為事好生物疑服事也禮曰內外不通乞假男女非受不親非祭非喪不相授器其相授則男授以篚無篚則皆坐奠之而後取之奠置於地寡婦不夜哭掇蜂之疑尹吉甫妻誣其子伯奇馬援以薏苡興謗嫌疑之間誠先賢所慎吳祐字季英云云內言不出於閫外言不入於閫曲禮嫂叔不親授遠嫌避疑孔薏苡嫌蕭倣嶺南海解官南海多榖紙倣敕諸子繕補殘書廩諫曰州距京師且萬里書成不可露齎必貯以囊笥貪者伺望得無薏苡嫌乎倣曰善不疑李靖贊曰若靖闔門稱疾畏遠權逼功大而主不疑雖古哲人何以尚茲善避嫌長孫無忌善避嫌求於古人未有其比不免疑嫌裴垍京兆少尹裴武使王承宗還得德棣三州已而地不入或言武還先且垍明日乃朝帝怒召學士李絳議斥武絳言垍身備宰相明練時事勢不容先見武帝悟釋之議者謂帝知垍明倚任方駕尚不免疑嫌以信處位之難云進所賜詔敕郭子儀代宗立稷元振自謂於帝有功忌宿將難制離毀百計因罷子儀副元帥加貫戶七百為肅宗山陵使子儀懼讒且成盡裒肅宗所賜詔敕千餘篇上之因自明詔曰朕不德詒大臣憂朕甚自愧自今父母有疑
