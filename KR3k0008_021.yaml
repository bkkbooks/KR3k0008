body:
  text: 卷第二十一白彼美人兮難能子遊曰吾友張也為難能也然而未仁言子張容貌人難能也堂堂曾子曰堂堂乎張也難與並為仁矣冠玉漢書陳平美丈夫如冠玉耳其中未必有也傅粉何晏字平叔美姿儀而絶白魏文帝疑其傅粉遺帽晉書王蒙字仲祖美姿容常覽鏡自照稱其父字曰文開生如此兒耶嘗帽破入市買之群嫗悅之爭遺之帽擲果晉潘嶽字安仁至美每行於道群嫗常擲果滿車中明珠玉人羊車衛玠字叔寶在齠齔之中乘羊車於洛陽市市人咸曰誰家玉人王武子玠之舅也語人曰吾與外甥並坐炯然若明珠之在我側後卒人謂之看殺麈尾晉書王夷甫美貌嘗執玉柄麈尾與手無別龍章鳳姿嵇康字叔夜長七尺八寸好容貌雖土木形骸不自飾然而龍章鳳姿天質自然凝脂點漆晉王右軍目杜弘理曰面如凝脂目如點漆此神仙中人也如瓠漢書張蒼肥白如瓠白晰傳陳武子字子強白晰而鬒鬒髮甚黑也間麗宋玉體貌間麗甚美直不疑狀貌甚美美艷傳宋公子鮑美而艷端正吳志孫垣儀容端正彼姝者子詩云邦之彥兮鄒忌之慕徐公問其妻妾與客曰我與城北徐公孰美子遊之稱張也見上注貌先五事洪範五事一曰貌且高柴甚惡推至孝於孔門子張難能稱未仁於言偃苟德行之無取雖容貌而何為望其容貌使無慢易之心漢相漢王商長八尺餘體甚鴻大容貌絶人單于來朝仰視遷延卻退天子聞而嘆曰真漢相目若懸珠齒如編具並東方朔若畫後漢馬援眉目如畫美秀而文子太叔鄭大夫父母遺德莊子盜跖謂孔子曰長大美好人見而悅者此吾父母遺德丘雖不吾譽吾不自知耶連璧潘安仁夏侯湛並美姿容每同行人謂之連璧堂堂田郎田鳳為郎端正入奏事靈帝目送題柱曰堂堂乎京兆田郎字秀宗美丈夫一孔美鬚眉峻風宇楊炎退居求志肅宗即家拜散騎常侍號玄靜先生美鬚眉峻風宇人物當世第一李揆美風儀善奏對帝嘆曰卿門地人物文學皆當世第一信朝廷羽儀乎故時稱三絶美儀矩盧承慶美儀矩美姿容薑柔遠美姿容奇其風度李嗣真嘗引工展器于庭后奇其風度應對召相王府參軍閻玄靜圖之美容儀竇抗體弱美容儀美姿質陸景融美姿質秀眉美鬚髯楊元琰秀眉美鬚髯容貌瑰偉宗室若水容貌瑰偉傅朱粉衣紈錦盛飾自喜張易之頎晢美姿製出入禁中傅朱粉衣紈錦盛飾自喜體貌偉麗路嚴體貌偉麗舉止秀峙時謂玉而冠者崔淡舉止秀峙時謂玉而冠者儀幹秀偉楊謹矜兄弟儀幹皆秀偉謹名嘗視鑑嘆曰兄弟皆六尺餘此貌此才欲見容當世難矣胡不使我少體弱邪世哀其言姿幹瑰肚張守圭姿幹瑰肚人望而慕之崔郾姿儀秀偉人望而慕之然不可狎也容止端秀裴皞出於名家容止端秀五代偉儀質李絳偉儀質狀貌若畫高儉狀貌若畫白神清晉謝尚論中朝人物劉琰云杜又膚清衛叔寶神清為有識所重如此視日不眩王戎字濬沖幼穎悟神彩秀徹視日不眩裴楷目之曰爛爛如巖下電風塵外物王戎曰王衍神彩高徹如瑤林瓊樹自是風塵外物太俊王衍神清明秀王澄曰兄形似遁則神鋒太俊容儀美鬚髯霍光白晢疏眉目美鬚髯奇士漢江充魁岸容貌甚壯帝望見之曰燕趙固多奇士甚都司馬相如車騎雍容間雅甚都都間雅之稱玉人裴楷字叔則為吏部侍郎風神高邁容儀俊爽博涉群書特精義理時楚人謂之為玉人如鐘陸機身長七尺其聲如鐘狀異常人蔡雍字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異常人每行觀者盈集以此自匿不亦難乎乃止以容為官漢徐生善為頌孝文時以頌為禮官大夫傳子至孫延襄襄之姿性善為頌不能通經延頗能未善也襄亦以容為大夫至廣陵內史頌音容取貌失人新野功曹鄧衍以外戚小子侯預朝容姿趨步有出於衆顯宗目之特賜輿服虞延雖有容儀而無實行未常加禮帝後拜衍郎中延司馬衍在職不服父喪帝聞乃嘆曰知人則哲以延為明神彩容儀二孔進止詳華人拭目觀溫彥博進止詳華人皆拭目觀姿表瑰傑溫造姿表瑰傑凡有獻納搢紳皆屬以目高士廉進止誠意華凡有獻納搢紳皆屬以目姿表魁秀魏謨姿表魁秀善為容陳叔達善為容姿宇秀偉蕭得聖姿宇秀偉氣孤峻風采峭整既當國風采峭整神情爽拔李義琛太宗目義琛曰是人神情爽拔見奉使門容止嚴峭韋斌容止嚴峭觀者皆竦崔敦禮善辭令進止觀者皆竦姿質軒秀嚴挺之姿質軒秀宣勞捐贊宗室若水在朝三十年多識舊儀每宣勞揖贊進亡間華有可觀者無威儀陸長源好諧易無威儀無儀矩趙宗儒以文學歷將相位任崇劇然無儀矩姿儀瑰秀呂元膺姿儀瑰秀舉止都雅張垍舉止都雅帝悅之儀矩峻整王璠儀矩峻整著稱于時姿采如峙玉鄭畋姿采如峙玉簡侻李程簡侻無儀檢端凝若植馮定偉儀觀與宿齊名人方漢二馮文宗詔開元霓裳羽衣舞參以雲韶列于庭部諸工立縣間端凝若植帝異之飣座梨崔遠有文而風致整峭世慕其為目曰飣座梨言所珍也進止雍間裴休為人醞籍進止雍間宣宗嘗曰休真儒者儀舉自安魏元忠始以諸生見高宗高宗慰遣不知謝即出儀舉自安帝目送謂薛元超曰是子未習朝廷儀宜相天子蕭至忠出為晉州剌史治有名默啜遣大臣來朝見至忠風采逡巡畏俯謂人曰宜相天子何乃居外乎舉止不煩裴諝性通綽舉止不煩風度高嚴劉伯芻風度高嚴姿制間美李藩姿制間美進止雍如崔沔性舒遲進止雍如也儀狀瑰偉張鎬儀狀瑰偉神采軒異趙昶神采軒異精神爽秀蘇逢吉漢高祖鎮河東父裞為高祖從事逢吉嘗代悅作奏記悅乃言之高祖召見逢吉精神爽秀憐之乃以為判官狀貌雄偉閩王審知為人狀貌雄偉隆準方口五代巉巖李白上雲樂巉巖容儀戎削風骨神觀爽邁裴度退然才中人而神觀爽邁為人嚴偉立朝稜稜有風望崔從風骨秀爽趙彥昭風骨秀爽風度凝遠宋璟風度凝遠人莫涯其量昭昭乎若玉山上行朗然映人也李白上裴長史書蕭嵩虛有其表明皇雜録帝拜蘇頲為相命蕭嵩草制不工帝欲令換之不欲斥言因制中有云國之瑰寶乃指瑰字白不可言其父名卿宜易之嵩不悟但改瑰為珍帝見擲于地曰虛有其表以嵩魁偉多髯骨重神寒天廟器一雙瞳人剪秋水李賀唐兒歌華嶽峰尖見秋準杜甫魏將軍歌魏侯骨聳精爽緊華嶽峰尖見秋準神氣清爽上令左右求堪為王府長史大常卿薑皎奏源乾曜公清有吏幹因召見與語乾曜神氣清爽對答皆有倫序上甚悅拜少府少監邠王長史神清韻遠孔季詡永昌初擢制科授祕書郎陳子昂嘗稱其神清韻遠可比衛玠終左補闕神昏形滓齊浣劾奏裴談神昏形滓挾邪以罔上氣挺特不俗吳保安氣挺特不俗白六極洪範六極六曰惡惡醜也孔醜亦孔之醜不臧霄貌叢陋陋質詭容擲瓦張孟陽醜每出人惡之輒擲瓦礫盈車眇小丈夫孟嘗君田文也一言而善傳晉叔向適鄭鬷蔑惡而立於堂下一言而善叔向聞之曰必然明也下執其手以上三年不笑傳昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言狂且古之醜人也詩曰不見子都乃見狂且名動孫卿子曰衛靈公有臣曰公孫呂身長七尺面長三尺廣三尺名動天下睅目華元睅其目皤其腹睅睛大皤腹大欽頤周燮字彥祖椎顙呂氏春秋陳有惡人曰敦治犨麜椎顙色如漆黑也折頞哆噅辨命論哆噅蹙頞形之異也哆噅口張不正音侈撝子羽甚惡以貌失人史記淡臺滅明字子羽狀貌甚惡孔子以為才薄既而受業名振諸侯孔子曰吾以言取人失之宰我以貌取人失之子羽鬷蔑不揚因言見用傳叔向謂宗蔑曰今夫子少不揚子若無方吾其失子矣遂如故交注不揚顏貌不揚顯也睅目佐宋華元蹙頞相秦史記蔡澤魋顏蹙頞頞鼻莖也澤為秦相子張難能稱未仁於偃言高柴甚惡推至孝於孔門家語高柴子羔貌甚惡為人篤孝知名於孔子門苟盡美之可嘉雖孔醜之何害雖伯倫之形不妨賢士劉伶字伯倫形貌醜然肆意放蕩名與士賢而承宮之狀難示遠人後漢承宮名播單于單于使求見宮宮曰夷狄眩名非識真也臣貌醜不可以示遠人乃以大鴻臚魏應代之無以貌取何陋之有行步俯僂漢蔡義年八十餘為丞相短小無鬚眉貌似老嫗行步俯僂母欲棄周燮字彥祖生而欽頤折頞醜狀駭人其母欲棄之父不聽曰吾聞賢聖多有異貌興我宗者此兒也黑而上僂豎牛黑而上僂深目而猳喙陳豹長而上僂恐似己莊子厲人夜半生子其父取火視之恐其似己厲人醜人也孔貌么醜盧杞秉政無學術貌么醜楊炎薄之陋甚永王璘貌陋甚柔野陳子昂貌柔野少威儀容貌蕞陋張鎰盧杞忌鎰剛直欲去之時朱泚以盧龍卒戍鳳翔帝擇人以代杞曰陛下必以臣容貌蕞陋不為三軍所信恐後生變臣不敢自謀惟陛下擇之乃以鎰為鳳翔節度姿陋盧攜姿陋而語不正陋其貌不納封常清素瘠又腳跛高仙芝陋其貌不納常清怒曰以貌取士失之子羽公其念之矬陋王伾貌矬陋楚語無它大志類不勝衣史恭奉矬陋類不勝衣侻陋陸羽貌侻陋寢侻歐陽詢貌寢侻敏悅絶人鬼貌藍色盧杞陋甚鬼貌藍色儜陋李輔國貌儜陋醜怪五代桑維翰為人醜怪黑色胡髯慕容彥超嘗冒姓閻氏黑色胡髯號閻崑崙五代史外陋內險盧杞初尚父郭子儀病甚百官造省不屏姬及杞至則屏之隱几而待家人怪問其故子儀曰彼外陋內險左右見必笑使後得權吾族無類矣貌醜異許敬宗改中書舍人文德皇后喪群臣衰服率更令歐陽詢貌醜異敬宗侮笑自如白彼美人兮彼姝者子美人麗人佳人其姝靜女其姝婉兮孌兮窈窕淑女邦之媛兮鍾美傳天鍾美於是鍾聚也桃李詩華如桃李蕣華顏如蕣華國色見公羊傳巧笑倩兮美目盻兮如玉燕趙多佳人美者顏如玉千金之笑千金買笑洵美且都蛾眉詩手如柔荑膚如凝脂秦首蛾眉光可以鑑傳昔仍氏生女鬢髮甚美光可以鑑名玄妻夔娶之是不嗣焉西施南威戰國策晉文公得西施三日不聽朝遂惟南威遠之曰後世必以色亡國巫峽之女浦川之神傾城絶代李延年歌曰北方有佳人絶代而獨立一顧傾人城再顧傾人國北方南國曹植詩云北方有佳人容華若桃李東鄰宋玉曰東鄰之女增之一分則太長減之一分則太短施朱則太赤施粉則太白盈盈樓上女古詩靡顏膩理楚辭云不待脂粉淮南子不待脂粉西施陽文傾國專房宜笑楚詞曰既含皓兮又宜笑注皓齒也袨服靚裝妍姿麗質一笑再顧金鈿飾首羅縠被身丹脣皓齒詩稱女德必在於賢禮載婦容不專於色揆五事莫先於貌稽四德無大於容姱容楚詞曰姱容修態晤言彼美淑姬可與晤言灼灼其華姬薑令色孟娵古之好女也音鄒楚詞玄鬢翠蛾美艷美色害德甚美甚惡叔向欲娶申公巫臣氏其母曰吾聞甚美必有甚惡而天鍾美於是必以是有敗也夫有尤物足以移人苟非德義則必有禍尤物見上傾國移人易色子夏曰賢賢易色冶容誨淫易代性之斧三代之亡恭子之廢皆此物也言皆因太寵恭子申生魚入鳥飛莊子西施毛嬙人之美也魚見之深入鳥見之高飛孔妻美艷宋華父督見孔父嘉之妻于路目逆而送之曰美而艷遂殺嘉父而娶其妻殤公怒督遂弒殤公孫壽媚惑後漢梁冀妻孫壽色美善為妖態作墜馬髻折腰步以為媚惑縱恣日甚後與妻皆自殺也奇邪媚也周禮有南威之容乃可以論於淑媛有龍泉之利乃可以議於斷割艷妻煽方處難濟釋羑里之縶史紂囚西伯於羑里閎天之徒以有莘氏之美女獻於紂紂大悅乃釋西伯而歸解平城之圍桓談論曰高祖被圍平城説閎氏言漢有美女天下無雙急則進單于單于必得大重之則閼氏之寵衰矣是謂出奇計也孔王圭進見它日進見有美人侍帝側本廬江王瑗姬也帝指之曰廬江左道賊其夫而納其室何有不亡乎圭避席曰陛下以廬江為是邪非邪帝曰殺人而取其妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢若也何至於亡父老曰不然郭君善善不能用惡惡不能去所以亡今陛下知廬江之亡其姬尚在竊謂陛下以為是審知其非所謂知惡而不去也帝嗟美其言便詖艷嬖張元素太子久不見賓友元素曰宮中所見止婦人不知如樊姬等何與益聖德者幾何若無之則便詖艷嬖何足顧哉秀曼都雅一軍驚視李光顏初都統韓弘惡光顏忠力思有以抗衊之乃飾名姝教歌舞六博襦襡珠琲舉止光麗費百巨萬遣使以遺光顏曰公以君暴露于外恭進侍者慰君征行之勤光顏約旦日納焉乃大合將校置酒引使者以待姝至秀曼都雅一軍驚視光顏徐曰我去室家久以為公憂誠無以報德然戰士皆棄妻子蹈白刃奈何獨以女色為樂為我謝公天子於光顏恩厚誓不與賊同生指心曰雖死不二因嗚咽泣下將卒數萬皆感激流涕乃厚賂使者還之獻麗姝畢誠始誠被知於宣宗嘗許以相令孤綯忌之自邠寧凡三徙不得還誠思有以結綯至太原求麗姝盛飾使獻綯曰太原於我無分今以是餌將破吾族矣不受娟秀光麗高駢傳呂用之左右姬侍百餘皆娟秀光麗善歌舞巾㡚束帶以侍姿質天挺明皇貴妃楊氏始為壽王妃開元二十四年武惠妃薨後廷無當帝意者或言姿質天挺宜充掖庭遂召內禁中異之即為自出妃意者丐籍女官號太真軍中有女子王智興進破姚海兵五萬於豐北獲美妾三人智興曰軍中有女子安得不敗即斬以徇曲眉而豐頰清聲而便體秀外而惠中韓愈盤谷序曲眉而豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妒寵而負恃爭妍而取憐秦以金牛美女啖蜀陳子昂昔蜀與中國不通秦以金牛美女啖蜀花見羞明宗淑妃王氏有美色號花見羞婉冶之姿突厥序婉冶之姿毀節異類淑姿修態權德輿郊居記淑姿修態回風遏雲之勢流光含睇中飲笑抃傾都之艷獨孤郁書有傾都之艷而深帷之長安水邊多麗人態濃意遠淑且真肌理細膩骨肉勻繡羅衣裳照暮春杜甫麗人行秀色如瓊花西門秦氏女秀色如瓊花李白秦女休行吳娃越艷吳娃與越艷窈窕誇鉛紅同上憶舊遊秀色掩今古荷花妖玉顏西施詩愛君芙蓉嬋娟之艷色可飧兮難再得寄遠上灼灼芙蓉姿美人出南國灼灼芙蓉姿同上古風眉目艷皎月同上眉目艷皎月一笑傾城歡翠茁鳳生尾丹葉蓮合跗杜牧張好好詩青鏡理雲髮褰簾出深重韋蘇州擬古詩美人奪南國一笑開芙蓉青鏡理雲髮褰簾出深重素面朝天楊妃外傳虢國夫人不施粧自有美艷常素面朝天花月之妖武三思妓素蛾有殊色人梁公請出之忽失所在於堂奧中聞蘭麝芬馥附耳而聽即素娥語曰某花月之妖帝遣奉公言笑梁時之正人不敢見甘澤謠薛瑤英元載未年納薛瑤英為姬處以金絲帳卻塵褥衣以龍衣一襲無一兩載以瑤英體輕不勝重衣於異國求此服惟賈至楊公南與載友善往往得見其歌舞杜陽編楚蓮香都下名妓楚蓮香者國色無雙每出則蜂蝶相隨聞其香天寶遣事飲乳而美隋唐嘉話侯君集死其家有三美人容色絶代言常飲人乳而不飯第一開元遺事念奴有色善歌宮妓中第一帝嘗曰此女眼色媚人雙角井樂史緑珠傳緑珠雙在角井山下汲者誕女必美識者以美女無益於時以巨石鎮之後有産女者七竅四支多不完具紅拂李靖謁楊素一妓執紅拂侍側目靖久之靖歸逆旅夜有紫衣戴帽人杖挂一囊叩門遽延入脫衣去帽乃十八九一美人也靖驚詰之告曰妾楊家紅拂妓也侍司空閲人多矣未有如公者絲蘿願托喬木也公來觀其姿真天人也乃與俱適太原西子毛嬙之蹈後宮也皎朝日煥浮雲而無鹽逐於鄉里柳宗元答問薛瑤英能詩書善歌舞仙姿玉質肌香體輕雖旋波移光飛燕緑珠不能過也楊炎贈楊英歌雪白淡眉天上女鳳簫鸞翅欲飛去玉叉翹翠步無塵楚腰如柳不勝春善自塗澤則天皇后武氏雖春秋高善自塗澤雖左右不悟其衰一枝紅艷露凝香李白雲想衣裳花想容春風拂檻露華濃若非群玉山頭見會向瑤臺月下逢同上白甚惡宵形宵形叢陋嫫母醜女鍾離之后列女傳齊邑之女曰鍾離齊宣王之正后也為人極醜凹頭深目大節叩鼻結喉肥頭少髮折腰出胸皮膚若漆行年四十無所容入衒嫁不售乃拂拭短褐自詣宣王願備後宮宣王納之以為后登徒之妻宋玉曰登徒子之妻蓬頭攣耳侃脣歷齒旁行踽僂又疥者痔登徒子悅之生五子許允之婦郭子許允之婦奇醜交禮竟不復入房許曰婦有四德卿有幾答曰新婦所乏者容耳士有百行君有幾許曰皆備婦曰君好色不好德何謂皆備許有慚色遂相敬重晉惠妃賈充女醜而短黑色陋質詭容鄙貌效顰西施病捧心而顰鄰之醜女亦學而顰況賢惟易色醜不誨淫徵美艷之妻目聞亂宋稽宿瘤之女終見興濟苟德行之可稱雖鄙陋而何害苟宵貌之不臧雖效顰而孔醜首若飛蓬膏沐無用膚如點漆脂粉何施雖天地之秀形合齊美惡而男女之大欲亦本妍嗤無徵怨於下山宜鑒形於止水稽六極且聞於惡考四德不見其容詩稱女美必在於賢禮載婦容不專於色苟以德稱曷宜貌取龐廉楚詞哀時命云古之醜婦人龐音龍孔陋而淫閩王延翰審知長子其妻崔氏陋而淫嫫母衣錦李白鳴皋歌錦縠西子不華嫫母錦縠是不能易其美惡房千里文敦洽騁姿皮日休子都蒙袂兮敦洽騁姿悅醜兵部郎中朱凝妻有美色天后時洛中殖業坊酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無朱悅之殆忘寢食朝野僉載醜女來效顰李白古風醜女來效顰還家驚四鄰壽陵失本步笑煞邯鄲人逐於鄉里柳宗元無鹽逐於鄉里老且醜張萬福初在泗州遇李希烈反陳少遊悉以部剌史妻子質揚州萬神獨不遺謂使者為我白公妻老且醜不足慁公意卒不行視姬薑而自退其陋質劉太真上楊相啓文粹長大人六白埋首於子駒之門傳魯叔孫得臣敗長狄于鹹獲長狄僑如富父終生春其喉以戈殺之埋其首于子駒之北門鄋瞞伐齊齊獲其弟榮如埋其首於周之止門鄋瞞由是遂亡注鄋瞞長狄國名蓋長三丈骨節非常恐後代怪之故記其處所長狄眉見軾榖梁傳獲僑如兄弟三人造宮中國凡射不能害得臣善射射其目身橫九畝斷首而載之眉見於軾防風骨專車家語吳伐越墮會稽獲骨專車吳子使來問仲尼仲尼曰禹會諸侯於塗山防風氏後至禹戮之其骨節專車身橫九畝長狄身橫九畝腰闊十圍晉書尹緯字景亮長八尺腰帶十圍魁梧有大志十丈國語曰人之長者不過十丈數之極也龍伯國之大人列子帝令巨鰲負五山龍伯國之大人釣兩鰲合負而歸帝怒之蓬萊山之奇士漢書王莽時有奇士長丈六腰十圍出自蓬萊山自言臣無霸車不能載三馬不勝臥則枕鼓視迹於襄武魏志咸熙二年襄武縣有大人見長三丈餘迹長二尺二寸白髮著黃單衣見體於臨洮史記秦始皇時有大人見臨洮長五丈腳迹長六尺鴻大漢長樂時馬騰身長八尺身體鴻大面鼻雄異魁梧後漢趙一字元叔體貌魁梧身長九尺望之甚偉恃才倨傲乘土禮斗威儀曰君乘土而王者其人長大禹長九尺九寸湯長九尺孔子長九尺伍子胥長一丈韓信長八尺九寸東方朔長九尺三寸金日磾長八尺車千秋長八尺頎而長兮千仞楚詞曰東方長人千仞唯鬼是索乾坤賦象宗類分形非無長短之差自有洪纖之別孔偉容貌裴寂極長偉容貌婁師德長八尺侯希逸長七尺姿貌魁秀劉德威姿貌魁秀宗楚客長六尺八寸魁岸紀處訥為人魁岸陸景融長七尺吉頊洛明河南人長七尺姿質偉岸宗室從晦姿質偉岸黑齒常之百濟西部人長七尺餘白晰長大齊映為人白晰長大李晟長六尺姿狀秀偉武儒衡姿狀秀偉張忠孝魁偉長六尺楊收長六尺二十廣顙深頤疏眉目楊謹矜兄弟皆六尺餘見美丈夫門郭知運長七尺猿臂虎口張巡長七尺魁岸有力程千里長七尺魁岸有力張興長七尺郭子儀長七尺二寸李嗣業長七尺姿度魁傑馬燧姿度魁傑長六尺二寸楊守亮身長七尺餘色如鐵段志玄姿質偉岸獻長人五行志開元二十二年四月冀州獻長人李家龐八尺有五寸矣暴長太和十三年民皇甫及年十四暴長七尺餘長啜大嚼三倍如初類長三丈東夷長人者類長三丈鋸牙鉛爪黑毛覆身不火食噬禽獸或博人以食美晰如玉王延翰為人長大美晰如玉五代身長九尺鬢眉蒼杜甫洗兵馬張公一生滄海客身長九尺鬢眉蒼白而長身孔子世三十八吾見其孫白而長身韓文白侏儒傳臧紇戰敗國人歌曰侏儒侏儒使我敗于邾注臧紇短小故也瑣質僬僥國語僬僥氏長三尺短之極也注西蠻也優旃史優旃秦倡侏儒也巨靈漢武故事東郡送一短人長七寸名巨靈眇小丈夫孟嘗君飽欲死東方朔曰臣長九尺三寸俸一囊米錢二百四十侏儒身長三尺亦一囊米錢二百四十侏儒飽欲死臣朔餓欲死二尺廣延之國人長二尺一寸神異經西北荒有小人長一寸朱衣朱冠晏子短小相齊晏子長不滿三尺而相齊蔡義小而佐漢漢蔡義為丞相年八十短小無鬢髮行步俯仰常兩吏夾持乃能行也短主簿王恂為桓溫主簿為人短小故號曰短主簿若不勝衣孫卿子葉公子高短小行若不勝衣侏儒漢書東方朔謂侏儒曰帝以若曹耕田力不及人從軍不任軍事無益於時今欲盡殺若曹侏儒大懼長七寸神異經西海有一鶴國人長七寸日行千里如飛百物不敢犯畏海鵠鵠吞之壽二百歲在鵠腹中不死或云李子敖也短黑賈充女晉惠妃醜而短小是以區區蕞質還為楚國之賓瑣瑣微容遂入蔡雍之賦僬僥不可使舉侏儒不可使援孔短李李紳為人短小精悍時號短李儀質陋侻韋述方少儀質陋侻臞短才及中人辛讜陋短俯傴武懿宗貢侏儒陽城為道州剌史州産侏儒歲貢諸朝城奏州民盡短自是罪眇小無髯關播盛稱李元平帝拜汝州別駕李希烈陰使亡命應募縛元平希烈以其眇小無髯戲李克城曰使爾取元平乃以其子來邪人臘酉陽雜俎李章武有人臘長三尺餘頭項髀肋成就言是僬僥國人短而傴崔善為用清察稱諸曹史惡之以其短而傴嘲曰曲如鉤封烈侯三箇半人桑維翰身短面廣每對鑑自嘆曰七尺之身何如一尺之面後登第同榜四人秦王幕客陳保極戲謂人曰今歲有三箇半人及第以維翰短陋故謂之半人孔平仲續世説白圓首方足首圓象天足方象地乾為首坤為腹離為目艮為手震為足坎為耳巽為股兌為口易説卦筋骸之束禮云人陰陽之交五行之秀肌膚之會筋骸之束駢脅晉公子重耳駢脅蜂目豺聲楚公子商臣忍人也熊虎之狀豺狼之聲越椒深目豭喙豎牛睅目皤腹華元睅其目皤其腹睅目出也皤腹大也肖形天地漢書肖類也謂圓首方足頭小而鋭史記平原君武安君頭小而鋭婦人女子人聞張良勇智以為其狀貌魁梧奇偉乃若婦人女子猿臂李廣真漢相漢王商長八尺餘體鴻大容貌絶人單于來朝仰視遷延而退天子聞而嘆曰真漢相也顧見耳蜀先主劉備燕頷班超燕頷行食飛鳥肉萬里侯相後封為定遠侯鳶肩梁冀魁岸江充龍章鳳姿嵇康雖土木形體人以為龍章鳳姿天質自然修容目容端口容止不妄動頭容直足容重黑而上僂豎牛眼如紫石稜鬚如蝟毛磔桓溫奇表後漢李固字子堅貌有奇表頂角區犀足履龜文影日中無影仙人與虛合體故日中無影雪中無迹服丹韓終久服丹無影問魍魎莊子云衆魍魎問影處陰休影疾行遁影人有惡影而走者不知處陰而影滅老人子無影捕影隨形若捕影隨形也顧影何晏自喜行步顧影欲影之直必端其表相似有若史記孔子既沒弟子思慕以有若似孔子相與立為師師事如孔子優孟優孟為孫叔敖衣冠抵掌談論象孫叔敖楚王及左右不能別陽虎子晨於匡蓋孔子貌以陽虎匡人趨而圍之陽虎陽貨也逢丑父公羊逢丑父似齊傾公故代傾公為晉獲也且有典形後漢孔融與蔡雍素善雍卒有虎貴士貌類於雍融每酒酣引與同座曰雖無老成人且有典形張衡後身語林曰張衡死蔡雍母始孕二子才貌相似時人云雍是張衡後身兄弟陳國張伯喈弟仲喈相似妻子不能別惟肖肖似也尚書吾面人心不同其如面焉吾豈敢謂子面為吾面焉厲人見上醜丈夫門注紀信詐降紀信貌似漢王乘黃屋車左纛詐稱漢王出降項羽孔狀魁梧李訓狀魁梧不踰中人魏徵狀貌不踰中人有志膽偉秀蕭嵩貌偉秀姿體魁秀李義琰姿體魁秀髭貌雄偉宗晉卿髭貌雄偉姿貌魁異柳澤姿貌魁異土木形體郝處俊土木形體容而才張知謇自德州剌史入計后奇其貌詔工圖之稱其兄弟容而才謂之兩絶儒謹虞世南貌儒謹貌類王孝傑戰大非川為虜執贊晉見之曰貌類吾父故不死歸之風骨秀爽趙彥昭風骨秀爽儀止秀偉張喜貞儀止秀偉奏對侃侃武后異之氣象清古王丘氣象清古奇其狀貌五代楊行密唐乾符中江淮群盜起行密以為盜見獲剌史鄭綮奇其狀貌釋縛縱之十圍江安王元祥魁大帶十圍鑒形美惡魏元成傳鑒形之美惡必就止水神觀爽邁裴度退然才中人而神觀爽邁使外國者其君長必同度狀貌孰似貌類王世充陰索貌類李密者使縳之既兩軍接使索類類者過陳譟曰獲密矣士皆呼萬歲密軍遂亂偉其貌賈循從子隱林為永平兵馬使屬朱泚難率衆扈行在德宗見隱林偉其貌偉儀貌宋之問偉儀貌阡陌聚觀李雍既入朝人間傳其眉目瑰異至阡陌聚觀後生望風內謁門巷填隘貌豐偉崔恭貌豐偉資貌瑰傑郭曜資貌瑰傑偉岸薛存慶貌偉岸異其貌楊行密年二十亡入盜中剌史鄭綮捕得異其貌曰而且富貴何為作賊縱之狀貌非常劉知謙為清海牙將節使韋宙以兄女妻之衆謂不可宙曰若人狀貌非常吾以子孫托之疏眉目豐下盧奕疏眉目豐下望其狀貌李藩張建封卒濠州剌史杜兼疾驅至陰有覬望因誣奏建封死藩撼其軍有非望帝亟追藩既入帝望其狀貌是豈作亂人邪釋之赤心安祿山帝視其腹曰卿腹中何有而大答曰唯赤心耳腰腹十圍朱泚資壯偉腰腹十圍纖瘦李賀為人纖瘦通眉長指爪能疾書體貌軒特李栖筠體貌軒特質狀頎省王涯質狀頎省長上短下形神秀發五代和凝形神發秀狀貌堂堂同上華溫琪少從黃巢為盜敗溫琪走滑州顧其狀貌魁偉懼不自容乃授白馬河流數十里不死河上人援而出之又自經於桑林輒枝折乃之胙縣有田父見之曰子狀貌堂堂非常人也乃匿于家燕頷吳元濟燕頷貌似而心不同昔之聖人其首有若牛者其形有若蛇者其喙有若鳥者其狀有若蒙倛者彼皆貌似而不同焉韓愈雜説牛首鳥身皮日休鹿門隱書神農牛首蜚仲鳥身信乎哉曰非形也像也天光睟清日華明潤古之至聖必有奇相是以黃熊之瑞應於龍體赤精之符協於國表頎然而長文王所以上天下也體貌多奇漢高所以威海內也然則繢事之微極於惟肖至於天光睟清日華明潤非可圖也李德裕唐武宗皇帝真容讚序踔越之姿裴劉贊觀二子非有踔越之姿娶與我異類則自堯舜以下皆宜縱目邛鼻四手八足鱗毛羽鬣飛走變化然後乃可苟不為是則亦人耳柳宗元與楊誨之書姿狀如甚懦者韋處厚姿狀如甚懦者居家亦循易人生非寒松年貌豈長在李白古風願繪而觀藩鎮李寶臣謬謂滔使曰吾聞朱公貌若神願繪而觀可乎滔即圖以示之寶臣置圖射堂大會諸將熟視曰信神人也密選精卒二千夜馳三百里欲劫滔戒曰取彼貌如射堂者時二軍不相虞忽聞變滔大駭戰瓦橋敗衣它服得脫禽類滔者以歸承嗣額鋭角方李密額鋭角方瞳子黑白明徹貌必儒人五代張廷蘊武人所識不過數字而平生重文士嘗從明宗破梁鄆州獲判官趙鳳廷蘊謂曰吾視汝貌必儒人可無隱也鳳以實對廷蘊亟薦於明宗狀貌堂堂而不通文字五代安叔千狀貌堂堂所為鄙陋時人謂之沒字碑黑色胡髯同上慕容彥超黑色胡髯號閻崑崙人影數至九酉陽雜俎道士郭采真言人影數至九常試之至六七而已外亂莫能辨郭言漸益炬則可別取人本命日五更張燈相人影同上寶曆中有王山人取人本命日五更張燈相人影知休咎言人影欲深深則貴而壽影不欲照水照井及浴盆中古人避影亦為此同上白五福二曰富富而可求語哿矣富人詩聚斂李氏富於周公而求也為之聚斂而附益之子曰非吾徒也小子鳴鼓而攻之可也語貨殖子曰賜不受命而貨殖焉家富禮家富不過百乘多積儒有不祈多積積財貨也潤屋曾子曰富潤屋藩身傳貨以藩身發身禮仁者以財發身言仁者務施故發身於令名發財不仁者以身發財言不仁者不務施故發財於令名也素封史記富者無祿秩之俸爵邑之入而與之比者命曰素封金穴郭況富號金穴積財晉書石崇善營生積財如山嶽也藏鏹巨萬卓鄭猗陶蜀卓氏程鄭猗朱陶頓四人並古人之富者日食萬錢何曾千駟齊景公有馬千駟貨利惟王不殖貨利豐財徇財貪夫徇財憂貧好利生厚德正傳人生厚而德正言才足則思無邪雖生厚而德正忠則無邪苟恬富而恃盈驕而生亂安富周禮以保息養萬民六曰安七曰富謂平其稅不專取也既富子適衛曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之家纍千金子貢田農漢秦陽以田農而富一州販脂翁伯販脂而傾縣邑賣漿張氏以賣漿而踰侈灑削質氏以灑削而食灑削治刀劍濁氏以胃脯而連騎張里以馬醫而擊鍾善人富謂之賞淫人富謂之殃子服惠伯謂叔孫曰大始富淫慶封又富矣穆子對曰云云貨財山積牛也榖量放利而行以財自衛指千僮僕指千巨萬貨財巨萬財雄班固自敘云遠社以財雄北邊富埒王者瞻烏爰止于誰之屋言烏集富人屋朝請史貨殖傳烏氏裸畜牧及衆斤賣求奇繒物間遺戎王戎王什倍其賞與畜畜至用谷量牛馬秦始皇令裸比封君以時與列臣朝請資次如苴成都羅衰資至巨萬初褒賈京師為平陵石氏持錢石氏資次如苴親信之厚資遺令往巴蜀數年間致十餘萬褒舉半遺曲陽侯依其權勢時當物備力餘貸郡國人莫敢負如苴如氏苴氏皆富人也高資晉楚之富孟子曾子曰晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊哉為仁不富為富不仁用財自衛巴寡婦清史戒懼幅利傳晏子不受邑子尾問之曰吾不受邑非惡富也恐失富也富如布帛有幅焉為之制度使無遷夫人生厚而利於是乎正德以福為幅幅利過則敗吾不敢貪多所謂如幅焉富而無驕富而好禮人之所欲子曰富與貴是人之所欲不以其道德之不處也不義如浮云不義而富且貴於我如浮雲不淫禮富貴而知好禮則不驕不淫能散積而能散辭富君子辭富不辭貧不仁為富不仁不仁不富去泰聖人去甚去奢去泰損之而益益之而損知足知止念失富之由必因厚利思速貧之誡孰敢多藏居利思義聖人不積君子誡盈戒之在得辭宋人之寶曾是不貪讓齊國之封殊非惡富夫物惡盛惟神害盈知止者富老子念其潤屋無欲實難慮以焚身非道不處資富能訓書言資富而能順教訓也善富貨殖志任氏折節為力田畜人爭取賤價任氏獨取貴善富者數世散施後折象父國為鬱林太守有資二億家童八百人及國卒象感多藏厚亡之義乃以金帛資産周施親疏須知止足之由遽絶錐刀之末驕逸處樂子曰不仁者不可以長處樂怙富子太叔曰無怙富又子晰怙富而卑其上不亡傳曰富而不驕驕而不亡未之有也斯亂子曰小人富斯驕驕斯亂故聖人之制使人富不足以驕也充詘不充詘於富貴注充詘失節服服文彩而驕易生老子曰服文彩厭飲食是為盜夸食膏梁而性難正國語曰膏梁之性難正言易驕難正持盈老子遺咎富貴而驕自遺其咎位不期驕祿不期侈貴位不期而驕自至然富祿不期而侈自來驕侈以行己所以速亡禍敗怙富子晰怙富而卑其上不能久也蘊利生孽傳鄭殺駟秦傳鄭駟秦富而侈嬖大夫也而常陳卿車服於其庭鄭人惡而殺之偏重必離子高曰言聞所求無厭偏重必離言如物偏重必離敗焚身傳象有齒以焚身貨纍也賈害傳厚亡多藏必厚亡老子既生生之太厚亦安安而能遷富謂之殃傳慶封奔吳吳與之朱方富於其舊惠伯曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殘之也其將聚而殲旃覆餗之凶必毀盈必毀天之道禍生腐鼠列子曰虞氏梁之富人財無量登高臨大道陳酒擊博俠客相隨行樓下博者射中兩掩而笑飛鳶適墜其腐鼠而中俠客俠客相謂曰虞氏富樂久矣我不侵犯乃辱我以腐鼠必當滅之乃聚衆攻之滅其家注驕侈之致禍非一塗也象有齒而焚身人懷璧而賈害貪富專利而不厭申侯豫取豫求不汝瑕疵敗類貪人敗類盈厭叨餮貪于飲食胄于貨賄侵欲崇修不可盈厭叨餮貪財食也逞無疆之欲以不貪為寶子罕無欲實難放利而行多怨敗度欲敗度貪婪貪冒屬厭願以小人之腹得為君子之心屬厭而已懲肆去貪載寶孔子曰南宮敬叔寶反必載而朝孔子曰喪不如速貧之愈也欲不可縱志不可滿苟得臨財無苟得禮貧無求多貪多也是無厭也不可厭也其能久乎爭利禮不縱欲神亦害盈貪夫徇財傷廉害義可欲罪莫大於可欲不以義制將由惡終無醉飽之心廉恥無德而貪不義而富以徼大利必有近憂小人喻於利語無德而貪子罕謂之喪寶不義而富仲尼喻於浮雲貨力而已禮貪泉南海有貪泉人飲之皆貪吳隱之酌飲曰若使夷齊飲終當不易心廉恥缺詩云白華廢則廉恥缺矣黷貨無厭戒得戒之在得行妨難得之貨令人行妨老子楊公不惑楊公云不惑酒色財憂貧溪壑可盈是不可厭國語叔向云人道惡盈吝嗇坤為地為吝嗇不足觀子曰如有周公之才之美使驕且吝其餘不足觀也短於財仲尼不假蓋於子夏曰商之為人也短於財吾聞與人交護其短取其長所以能久曹洪魏志曹洪家富性吝嗇文帝在東宮時從洪貸絹不如意恨之牙籌晉王戎園田水磑周遍天下自執牙籌晝夜算計儉嗇不自奉養天下人謂之膏盲之疾女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃歡從子將婚戎遺其軍衣婚訖而更責取家有好李賣恐人得種恆鑽其核以此獲譏錢癖和嶠富擬王者而至吝人謂之有錢癖食不足鄭太有田四百頃食常不足甚愛必大費老子既孅周人既孅孅者儉嗇也而師吏尤甚轉榖百數賈郡國無不至雒陽街君在齊秦楚趙之中富貴相矜以久賈過邑不入門設用此等故師吏能致十千萬也孅嗇説苑孔氏南陽人鼓鑄連騎遊諸侯有遊間公子之名然其嬴得過愈於孅嗇也儉嗇魯人儉嗇而丙氏尤甚家自父兄子弟約順有拾仰有取富至臣萬公侯富儉張安世字少孺尊為公侯食邑萬戶然而身衣弋綈夫人自紡績家僮七百人皆有手役孔富不學奢馬周生於富者驕柳澤上書生於富者驕田彭郝處俊江淮間為語曰富如田彭見貴門富有金玉韓思復家富有金玉以資甲天下馬燧子暢燧沒後以資甲天下暢亦善殖財家益豐晚為豪幸牟侵財役里閭嚴震本農家子以財役里閭數出資助邊多藏者以叔明為鑒李叔明豪侈在蜀殖財廣地舍田産歿數年子孫驕縱資産皆盡世言多藏者以叔明為鑒不立田園張嘉貞雖貴不立田園有勸之者答曰吾嘗相國矣未死豈有飢寒憂苦以譴去雖富田産猶不能有也京師高訾胡證拜嶺南節度使卒廣有舶具奇寶證厚殖財自奉養奴數百人營第修行里彌亙閭陌車服器用珍侈遂號京師高訾積賄陳儒前此數殺大將富商故積賄每曝衣紈繡不可計世富于財李育德世富于財家僮百人天下亂乃私完械甲嬰武陟城自保人多從之遂為長專居賄五年至數千萬裴胄先流北庭無復名檢專居賄五年至數千萬娶降胡女為妻妻有萬金駿馬牛羊以財自雄養客數百人自北庭屬京師多其客詷候朝廷事聞知十常七八家富多僮僕積粟常數千鍾李績本姓徐家富多僮僕積粟常數千鍾富埒王者丘和富擬王侯五代王處直父宗善殖財貨富擬王侯為天下高資王處存家勝業里為天下高資寶精王處回積巨萬計蜀中富家罕與比在太原家甚貧善相者周玄豹每指謂知祥曰此子寶精也它日當大富果如言出九國志藏鏹積粟韓琬飲醲嚙肥被鮮曳華房魯饒財家故饒財韓愈薦樊宗師帑櫝之積陸相奏議務鳩斂而厚其帑賣之積者匹夫之富也務散發而收其兆庶之心者天子之富也至富可敵貴玄宗御含元殿望南山有白雲橫亙山間左右皆不見令急召元寶曰見一白物橫在山頂不辨其狀左右貴臣啓曰臣等不見玄宗曰我聞至富可敵貴朕天下之寶天下之福南部新書金銀屋壁王元寶巨豪常以金銀疊為屋壁上以紅泥泥之又置禮賢堂以沉香為軒檻以碔砆甃地面以錦紋石為柱礎又以銅線穿錢甃於後園花徑中貴泥雨不滑人呼王氏富窟陳子昂以富家子尚氣俠弋博自如資貨盈衍崔玄暐母盧常戒玄暐曰我聞姨兄辛亥馭云子姓仕宦有言其貧窶不自存此善也若資貨盈衍惡也
