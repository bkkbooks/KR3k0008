body:
  text: 第二十二白人之所欲子曰富與貴是人之所欲不以其道得之不處也尊貴傳囗人是以能尊其貴貴是以能守其業常尊貴有常尊在天富貴在天金張漢功臣家唯金張二人親近貴寵比於外戚許史許氏史氏皆漢之外戚並重侯累將窮富極貴冠蓋如雲貂蟬飛翠緌拖鳴玉念榮身以庇族無欲實難思挈已而立身非道不處衣錦漢書富貴不歸故鄉如衣錦夜行紆青拖紫綰玉鏘金榮曜繁華議貴周禮暴貴禮崇高莫大於富貴西園待士筳列八珍東閣迎賓樽浮九醞爵位青紫之秩七葉左思詩云金張籍舊業七葉珥漢貂五侯漢成帝同日封舅五人為列侯垂三組漢楊僕為樓船將軍梁使歸家懷銀黃垂三組以誇鄉里佩六印蘇秦歸洛陽佩六國相印朱輪十人漢楊惲書曰惲家金盛時乘朱輪十人一門三后後漢梁冀一門三后六葉九公荀卿子家傳六葉九公漢庭七貴周禮九命百乘之家卿大夫也萬石君石建父子珥貂七代金張九遷四至九卿三入承明廬席寵尚書代綰青縲門傳朱紱四代五公後漢袁氏戒懼寵辱若驚老子曰得之寵辱失之若驚知懼思降傳貴而知懼懼而思降既登而求隆階智人也不在程鄭浮雲不義而富且貴於我如浮雲不處不以其道得之不處也邦無道富且貴焉恥也必毀盈必毀天之道持盈好禮富貴而好禮則不驕不淫不慊禮曰聖人之制富貴也使之富不足驕貴不慊於上慊恨不滿貌口斂反辭貴君子辭貴不辭賤三命益恭傳三命益恭故鼎銘曰一命而僂再命而偃三命而俯正考父也身退功成名遂身退大之道去甚聖人去甚去奢去泰下人家語以富貴而下人何人不與物惟惡盛神亦害盈知止知足寡悔寡尤有寵辱之驚老子無喜慍之色令尹子文貴而能貧懼以知降鄭子張黜官傳鄭子張有疾使黜官歸邑曰貴而能貧可以後亡二三子坐在敬戒不在富也君子曰善戒之齊晏嬰辭色見誡富門寵辱必驚已而無慍止足史蔡澤曰吳君白起越大夫種功成不去禍至范蠡知止足超然避世長為陶朱公孰見與禍至忍不能離疑不能決云云應侯曰吾聞欲而不知止則失其所欲也成功之下不可久處不過六百石後漢邴渙兄曼容亦養志自修為官不過六百石輟自免去張良曰家世相韓及韓滅不愛萬金之用為韓報仇彊秦天下震動今以三寸舌為帝者師封萬戶侯於良足矣願棄人間事欲從赤松子游乃學道引欲求輕舉也疏廣謂受曰知足不辱遂乞骸骨歸驕佚處樂子曰不仁者不可以長處樂不驕君子泰而不驕恃寵子太叔曰無帖富無恃寵繇禮尚書世祿之家鮮克繇禮其亡傳戍也驕其亡乎公叔戌也斯亂驕斯亂充詘禮不充詘於富貴充詘喜夫節貌服文采而驕易生食膏梁而性難正並見上注持盈老子遺咎富貴而驕自遺其咎期驕位不期驕見上注聖人去泰君子戒盈代祿之家伯有侈不能久矣公孫驕其將亡乎宣驕崇多貪貴進取在者進取志不可滿知足不辱知止不殆躁求苟得曼滿之欲為卿且聞及禍傳鄭公子曼滿與王子伯廖語欲為卿伯廖曰無德而貪後鄭人果殺之駟秦不守其位終見伏誅傳駟秦富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰不守其位而能終者鮮矣不義而貴無德而祿無德而貪逞無疆之欲爭名於朝敗度欲敗度以徼大利必有近憂貪冒之人將寘力焉禮不縱欲人亦惡盈罪莫大於可欲不以義制將由惡終無以寵利居成功謂貪而不退也貪以敗官為墨受爵不讓詩朝廷之位讓而就賤禮暴貴伐檀詩刺在位貪鄙無功受祿也知進而不知退孔貴震當世裴寂拜右僕射入閤則延臥內言無不從呼為裴監不名也貴震當世世榮其貴高士廉遷尚書右僕射士廉三世居此官世榮其貴竇抗帝貴退入臥內從容談笑及平生歡得君日貴盛虞世基得君日貴盛妻妾被服擬王者而世南躬貧約一不改天將富貴此翁劉仁軌始仁軌任帶方州謂人曰天將富貴此翁邪習於貴者傲柳澤上書云郝許郝處俊與舅許圍師同里俱宦達鄉人田氏彭氏以高貲顯故江淮間為語曰貴如郝許富如彭田進爵為公劉仁軌進爵為公子及兄子授上柱國者三人州黨榮之引升御榻帝或引升御榻呼為蕭郎萬石張家張文瓘四子潛魏州刺史沛同州刺史洽衛尉卿涉殿中監父子皆至三品時謂萬石張家冠蓋騶哄相望崔琳長子儼諫議大夫其群從數十人自興寧里謁大明宮冠蓋騶哄相望驕奢起於親貴柳澤上書驕奢起於親貴紀綱亂於寵倖禁之於親責則天下從制之於寵倖則天下畏驕盈貴奢可戒不可恃漢陽公主嘗誨諸女曰先姑有言與若皆帝子驕盈貴奢可戒不可恃在清要岑義兄獻為國子司業仲翔陝州刺史仲休商州刺史兄弟子姪在清要者數十人儀物貴甚蕭嵩子衡尚新昌公主嵩妻入謁帝呼為親家儀物貴甚眷禮卓異狄仁傑眷禮卓異時無輩者職宦光顯裴席帝常從容曰公華胄職宦光顯廁跡名臣垂榮無窮高竇贊曰高竇雖緣外戚姻家然自以才猷結天子廁跡名臣垂榮無窮貴不期驕魏徵曰貴不與驕期而驕自至富不與奢期而奢自至非徒語也恩寵過幸數入禁閫唐休璟檢校安東都護將中宗為皇太子休璟將行進啟曰易之兄弟恩寵過幸數入禁閫非人臣所宜願加防察四第同時列戟韋斌拜銀青光祿大夫時陟守河東而從兄宙為右金吾衛將軍縚為太子少師四第同時列戟衣冠罕比者貴赫為冠族楊漢公楊氏自汝士後貴赫為冠族所居靜恭里兄弟並列門戟咸通後在臺省方鎮率十餘人暴貴柳璨以諫議大夫同中書門下平章事起布衣至是不四歲其暴貴近世所未有也儻來物幼王謹女東光縣主時妃主多恃貴以奢侈相矜主獨儉素姊弟誚曰人生富貴在得志獨勤苦欲何求荅曰我幼好禮今行之不違非得志謂何且自古賢紀淑女以恭遜著名驕縱敗德況榮寵貴盛儻來物也可恃以凌人乎自懼貴且亢長孫無忌進右僕射無忌自懼貴且亢后又數言之遂解僕射持寵曠貴之譏白敏中召拜司徒數月足疾固求避位不許右補闕王譜奏願聽其請無使有持寵曠貴之譏無貴驕氣不類勳家郭承嘏帝嘗稱其儒素無貴驕氣不類勳家以勳力相高李峴兄峘嶧峘從上皇峴翊戴肅宗以勳力相高同時為御史大夫俱判臺事又合制封公而嶧為戶部侍郎銀青光祿大夫同居長興里第門列三戟朱紫滿門田弘正朱紫滿門榮冠當時寵絕一時徐皓又參太上皇誥冊寵絕一時無貴胄氣王龜無貴胄氣鳳閣王氏上徽曾祖擇從兄弟四人曰易從朋從言從皆擢進士第至鳳閣舍人者三人故號鳳閣王氏自是訖大中時登進士者八十人位臺省牧守者四十人置止水明自足意孔若思歷庫部郎中常曰仕宦至郎中足矣座右置止水一石明自足意為一代法李靖懇乞骸骨帝遣中書侍郎岑文本諭旨曰自古富貴而知止者蓋少雖疾頓憊猶力于進公今引大體朕甚嘉之欲成公美為一代法不可不聽乃授檢校特進口未嘗言家事岑文本或勸其營產業者文本嘆曰吾漢南一布衣徒步入關所望不過祕書郎縣令耳今無汗馬勞以文墨位宰相奉稍已重尚何殖產業邪故口未嘗言家事一歲至宰相李訓起流人一歲至宰相世素貴李密權勢可炙張巡傳楊國忠權焄天下吉溫不並處貴者不並處崔彥曾每宴私自比東晉王謝崔湜與弟液澄從兄蒞並以文翰居要官每宴私自比東晉王謝嘗曰吾一門入仕歷官未嘗不為第一本傳位勢隆極蘇安常聲焰熏灼王鉷門閥有素質望自高魏元同權焰震朝廷張若虛不能事新貴韓皋王叔文用事嫉之謂人曰吾不能事新貴一門盡貴唐宣州夏榮相陸象先蕭嵩曰陸郎位極人臣然不及蕭嵩一門盡貴位高而有壽百人緩帶唐諺云一人在朝百人緩帶言一人貴而親友皆榮之也雞跖集貴不足尚柳宗元六逆論晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也自武德後楊恭仁兄弟位益盛楊執柔始雄在隋以同姓貴自武德後楊恭仁兄弟位益盛又以武后外家尊寵兒尚主者三人女為王妃五人贈后一人三品以上二十餘人榮盛冠時張垍尚寧新公主時說居中秉政均為舍人諸父光為銀青光祿大夫榮盛冠時白懸空室如懸空言空也傳屢空子曰回也其庶乎屢空我艱詩終窶且窮莫如我艱惡衣惡食子曰士志於道而恥惡衣惡食者未足與議也不以貨財為禮貧者君子不辭子曰君子辭富不辭貧貴而能貧見注上食貧三歲食貧拜有道貧且賤焉恥也身安白社業保青氈賑窮恤貧周禮以保息六養萬人三曰賑窮四曰恤貧大惡禮曰死亡貧苦人之大惡存焉始因十盜之由六韜曰貧者十盜竊謂收種不時娶婦無能養女太多之類終摽六極之數洪範六極二曰貧也處約凍餒國語叔向見韓宣子憂貧叔向賀之曰吾有卿名而無卿實無以從二三子吾是以憂子賀我何故對曰昔欒武子無一畝之田諸侯親之戎狄懷之以正晉國今吾子有欒武之貧吾以為能修其德所以賀若患貨之不足子何暇賀之將轉溝壑蓬門下客萬戶輕生乏於貨財闕於禮義安貧無諂貧而無諂未若貧而樂樂道居常榮啟期曰貧者士之常居常而待終不去貧與賤是人之所惡不以其道得之不去也不改其樂一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也飲水曲肱而枕之樂亦在其中矣顏子簞食無憂顏回琴歌自樂榮啟期云雖富哉是人所欲而貧者亦士之常非病原憲居蓬戶之中併日而食子貢連騎詣之憲杖藜而出子貢曰先生何病憲曰今貧也非病子貢慚之有守心無淫行魏武子不憂君子憂道不憂貧論語不懾貧賤而知好禮則志不懾君子居易似侯命樂道安德文子樂道而忘賤安德而亡貧也晏如楊雄家產不過十金無儋石之儲晏如也雪不干人大雪丈餘洛陽令按行見人家皆除雪而袁安門無行路謂安死矣令看之見安偃臥問之荅曰大雪人餓不宜干人令以為賢遂舉為孝廉荷鍤樂阪且棲遲於衡泌帶經南畝常偃息於蒿萊黔婁貧人孤貧天窮禮曰老而無夫曰寡老而無妻曰鰥老而無子曰獨少而無父曰孤此四者天下之窮而無告者皆有常餼保息賑窮周禮見上注地著不分孤寡傳不分救也煢獨煢嫠介獨以養老孤周禮恤人之艱阨窮困以胏石達窮民周禮以胏石達窮民凡遠近煢獨老幼之欲有達其上而不為達者立於胏石三日士聽其辭以告於上而罪其長人是以息小人懷惠語布德施惠月令仲春養幼少存諸孤月令孟冬恤孤寡以逮不足大道之行使老有所終幼有所長鰥寡孤獨廢疾皆有所養老幼孤獨不得其所禮老窮不匱化將行於邦家惠宜達於孤獨惠必及下禮上恤孤則人不倍介特單獨子惠困窮撫俗字人邦不施惠老將疇依道存愛物政在養民窮濫窮斯濫矣子曰君子固窮小人窮斯濫矣不仁處約子曰不仁者不可以久處約不能居常姑欲行險疾貧子曰好勇疾貧亂也無怨子曰貧而無怨難利回君子不為利回回邪也憂貧喻利斯約斯盜子曰小人窮斯約約斯盜故聖人之制富貴也使貧不至於約隕獲禮不隕獲於貧賤隕獲困迎失節之貌居處環堵蓽門罋牖儒有一畝之宮環堵之室蓽門圭竇蓬戶罋牖四壁司馬相如居徒四壁蓬蒿張仲蔚所居蓬蒿沒人白社董威輦常宿洛陽白社中時乞於市蝸舍席門陳平立錐史孫叔敖為楚相及死其子無立錐之地懸罄之室繩樞之子陋巷顏子蓬戶不完原憲蒿萊之下且甘原憲之貧單陋范丹字史雲結草而居所止單陋隘陋衣惡衣恥惡衣惡食者未足與議也易衣而出禮藍縷敝衣風塵化緇古詩京洛多風塵素衣化為緇百結董先生百結衣縕袍衣敝縕袍與衣孤貉者立而不恥者其由也與被褐帶絲牛衣王章貧臥牛衣懸鶉子夏之衣蓋衣圉寒文子無表肘見踵決莊子云曾子在衛縕袍無表十年不制衣正冠而纓絕捉禁而肘見納履而踵決衣無卒夜之虞食空兼晨之畜人生到此天命何知食惡食見注上一簞食一瓢飲飲水曲肱而枕之樂亦在其中矣併日而食禮言二日用一日食塵甑范丹甑中生塵釜中生魚擔石之儲魏志華歆清貧家無擔石之儲絕糧子在陳絕糧從者病莫能興霖雨莊子子輿與子桑為友霖雨十日子輿曰子桑殆病矣褁飯往食之十旬九食子思甘藜藿文選充虛接氣文子曰聖人食足以充虛接氣也菜色不舉火莊子曾子在衛三日不舉火糠豆不贍貢禹妻子藜羹不糝半菽蔬菽相半傭賣賣樵朱買臣賣樵薪其妻恥之請去鬻畚晉書王猛少貧賤鬻畚販繒灌嬰晝賃王高晝則傭賃夜則燒塼賃舂梁鴻字伯鸞賃舂多能鄙事子曰吾少也賤故多能鄙事傭書後漢班超家貧常傭書又吳闞澤德潤居貧常為人傭書以供紙筆所寫既畢誦之亦訖窶狹馬周家窶狹無正寢溫彥博家貧無正寢貧不學儉馬周上疏里語曰貧不學儉富不學奢言自然也躬貧約虞世南與妻息惡食不贍裝守真關中旱與妻息惡食不贍也以厚蓄為戒馬燧子暢神策中尉楊志廉諷使納田產中官往往逼取暢畏不敢吝以至困窮當時視暢以厚蓄為戒諸子無室廬自托同上三揖窮鬼而告之韓愈送窮文元和六年正月乙丑晦主人與奴星結柳作車縛草為舡載糗輿粻牛繫軛下引帆上檣三揖窮鬼而告之曰聞子行有日矣鄙人敢不問所途躬具舡與車備載糗糧日吉時良利行四方子飯一盂子啜一觴攜朋挈儔去故就新駕塵彉風與電爭光子無底滯之尤我有資送之恩子有意於行乎屏息潛聽如聞音聲被病醫藥不具韋表微始被病醫藥不能具所居堂寢隘陋既沒弔客咨嗟噉豆糜韋貫之居貧噉豆糜自給窶困盧商蚤孤家窶困丐補廬州剌史鄭綮累擢右司郎中困窶甚無慍嘆顏泉明遷彭州司馬家貧居官廉而孤藐相從百口饘鬻不給無慍嘆閉口不食路文逸遇隋末大亂闔門死於盜文逸遁免流離辛苦自傷家多難閉口不食行者哀其窮疆飲食之貧狹王紹宗少貧狹無資馬懷素貧無資書樵夜輒燃以讀書常苦皸濕劉蛻獻崔尚書俊臘不足於糗糧冬夏常苦於皸濕所取者廣其得必多所取者深其身必窮孫樵與賈生書六經作孔子跡述不滿矣孟子述子思坎軻齊魯於馬遷以史記禍班固以西漢禍楊雄以法言太元窮元結以浯溪碣窮陳拾遺以感遇詩窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也在官貧約甚鄭虔在官貧約甚澹如也杜甫嘗贈以詩曰才名三十年坐客寒無氈空短鄭光孝明皇太后弟太后言其家空短帝厚賜金繒安於窮槁李華居顯官衣常乏五代瞿居儉拙於為生居顯官衣常乏衣不盡體常寄食於人杜甫傳家貲不滿千錢員半千上書自陳臣家貲不滿千錢五窮子之儔朋非三非四在十去五滿七除二各有主張私立名字捩手覆羹轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次名曰學窮傲數與名摘抉杳微高挹群言執神之機又其次曰文窮不專一能怪怪奇奇不可時施柢以自嬉又其次曰命窮影與形殊面醜心妍科居眾後責在人先又其次曰交窮凡此五鬼為吾五患飢我寒我興訛造訓繩營苟苟驅去復還韓文褚無長貲蘇頲貲無千日計陸龜蒙被褐短窄社陵野客人更嗤被褐短窄鬢如絲日糴太倉五升米時赴鄭老同襟期杜甫醉時歌伎能虛富家逾窘韓愈贈崔立之詩判筒而槽童稚戲為送窮舡判筒而槽比籜而閭細絲纏幅褚飾木偶家督被酒請禳窮將成式送窮文家無宿舂之儲李揚冰論古篆書家無宿舂之儲出無代步之乘長往之計呂才東皋序欲定長往之計而困於貧饑不飽菜寒無襲衣孫樵文傭室寓食柳宗元送辛殆庶囊如縣傭室寓食以下士之祿持窘絕之家元稹誨姪書以下士之祿持窘絕之家其間半是乞丐羈游以相給足囊空甑倒誰救之我今一食日還併韓文寒食詩無僦屋賃僕之資無縕袍糲食之給韓愈上崔虞部書今所病者在於窮約無僦屋賃僕之資無縕袍糲食之給驅馬出門不知所之尺布不掩體皮膚劇枯桑李白北上行衣不布體食不充腸元稹謝表朝食不盈腸冬衣纔掩骼韓愈縣齋冬暖而妻號寒年登而妻啼饑進學家貧不足以自治韓愈上李侍郎家無錢財寸步不能自致代張藉書八九年無所取資日求於人以度月日當時行之不覺也今如痛定之人思當痛之時何能自處也僕之家本窮空重遇攻劫衣服無所得養生之具無所有家累僅三十口攜此將安所歸托乎羸餒柳宗元與李達書貧者士之常今僕雖羸餒亦甘如飴矣無使令之童闕交易之財柳宗元送元生序寓居側陋無使令之童闕交易之財可謂窮躓矣賣藥都市寄食朋友杜甫常困於衣食同上封西岳賦窮愁但有骨同上白蓽門圭竇蓬戶甕牖之人謂貧賤也是人之所惡子曰貧與賤是人之所惡也不以其道得之不去也拜有道貧且賤焉恥也論語吾少也賤故多能鄙事朝不坐宴不與言賤也白屋周公下白屋之士馬韉蘇秦先貴張儀來謁坐於馬韉而食之為本老子貴以賤為本繩樞之子漢陳涉甕牖繩樞之子甿隸之人布衣何賤之有妨貴賤妨貴所謂六逆傳甘賤執鞭子曰富而可求也雖執鞭之士吾亦為之好禮不懾貧賤而知好禮則志不懾君子不辭子曰君子辭貴不辭賤俟命君子居易以俟命不隕獲於貧賤樂道文子曰樂道而忘賤有守心而無淫行在約思純雖賤者是人所惡而貧者亦士之常賤而知命何必躁求貴且在天豈宜苟得降志辱身柳下惠字展禽辱且不驚老氏之戒己而無慍子文之賢孔起寒賤李修起賤微惠文太子範時王毛仲等起賤微暴貴諸王見必加禮獨範接之自如出貧賤魏元忠上封事曰若陳湯呂蒙馬隆孟觀悉出貧賤而勳閥甚高寒人張宿者本寒人自名諸生為人操舟南霽雲少微賤為人操舟家素寒韓全義家素寒史失其先世羈賤劉文靜與裴寂善夜見邏堞傳烽叱曰天下方亂吾將安舍文靜笑曰如君所言豪傑所資也吾二人者可終羈賤乎路無回眸之舊歐陽詹朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家灌溉所不沾無貴相王顯與太宗皇帝有嚴子陵之舊每掣禈為戲捋帽為歡帝微時常戲顯曰王顯抵老不作繭及帝登極而顯謁因奏曰臣今日得作繭耶帝笑曰未可知也召其三子皆授五品顯獨不及謂曰卿無貴相朕非為卿惜也曰朝貴而夕死足矣時僕射房元齡曰陛下既有龍潛之舊何不試與之帝與之三品取紫袍金帶錫之其夜卒白在心為志匹夫不可奪志隱居以求其志詩言志子有四方之志盍各言爾志願聞子之志言以足志不言誰知其志過橋而題果乘駟馬漢司馬相如字長卿蜀郡北有升遷橋相如往長安乃題橋柱曰丈夫不乘駟馬不復過此遷中郎果如志入關而歡終擁使車漢郭丹字少卿入關而嘆曰不乘使者車不復出門後奉使南陽果乘高車宰天下之志漢陳平少時為里中社宰分肉甚均父老謂陳孺子曰善為宰乎曰使宰天下亦如之後漢用其策遂定天下埽天下之心後漢陳蕃仲舉室有糞不除薛勤曰孺子何不埽洒荅曰丈夫當埽天下安能事一室乎勤大奇之澄清之志後漢以范滂為詔使攬轡慨然有澄清天下之志棄繻漢終軍字子雲西遊入關關吏受軍繻軍曰丈夫西游終不徒還遂棄繻而去後拜謁者持節出關關吏曰此前棄繻生也投筆後漢班超字叔仲家貧傭書嘆曰大丈夫當學張騫傅介子立功異域以取封侯安能久事筆硯乎後果立功封定遠侯鴻鵠之志漢陳勝字涉少時嘗與人傭耕輟之壟上甚久曰苟富貴無相忘傭者笑而應曰若為傭耕何富貴也勝太息曰燕雀焉知鴻鵠之志哉卿相之盟史吳起出衛郭門與母訣齧臂而盟曰起不為卿相不復入衛門也後果如言有志無時後漢趙歧字邠卿嘗病戒兄姊曰我死爾乃置一圓石於墓刻之云漢有人姓趙名歧有志無時命也奈何後疾瘳仕至太僕歧本名嘉希顏之志慕藺之誠人之所欲天必從之大志遠略砥礪名節擲版後漢逢萌給事縣為亭長時尉過萌迎拜謁既而擲版歎曰大丈夫安能為役遂之長安學焉不從斗筲郭泰林宗世貧賤母令給事縣庭林宗曰大丈夫安能不從斗稍之役遂就屈彥宗學孔崖然有大志來瑱尚名節崖然有大志志節完整秦叔寶始為隋將來護兒帳內護兒曰是子才而武志節完整豈久處卑賤耶志趣奇謪張亮起畎畝志趣奇譎丈夫遭遇當以功名取富貴李靖嘗謂所親曰丈夫遭遇當以功名取富貴何至作章句儒憂天下房玄齡顧中原方亂慨然有憂天下志大志魏徵有大志以王佐自任蕭曹負大節以王佐自任願宰天下來濟初與高智周郝處俊孫處約客宣城私相與言志處俊曰願宰天下濟及智周亦然處約曰宰相或不可冀願為通事舍人足矣後領吏部處約以瀛州書佐入調濟遽往曰如志遂以處約為通事舍人後皆至公輔修飾陳子昂十八未知書以富家子尚氣決弋博自如它日入鄉校感悔即痛修飾中節顏真卿字希烈陷汝州廬杞乃建遣真卿曰四方所信若往諭之可不勞師而定時朱滔王武俊使皆在坐謂希烈曰聞太師名德久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顏常山否吾兄也祿山反首舉義師後雖被執詬賊不絕口吾年且八十官太師吾守吾節死而後已內負大節杜如晦內負大節臨機輒斷不屈李晟朱泚西走晟引軍屯含元外舍表著節不屈者自許以功名顯張建封慷概尚氣自許以功名顯名節自將劉瑑以名節自將凡議論處事不私趨於當乃止未嘗以言色借貴近時人高其節顏春卿魏徵遠孫贍罪抵死春卿為請玉真公主得不死時人高其節略細節張巡氣志高邁略細節朝官不可為為清河令秩罷還都於是楊國忠方專國權勢可炙或勸一見且顯用荅曰是方為國怪祥濟時辛讜罷居揚州年五十不肯仕而慨然常有濟時意軒然有志尚黃碣軒然有志尚潔身亂世權皋召拜起居舍人固辭嘗曰吾潔身亂世以全吾志欲持是受名邪囚軍中裴懷古閻知微之使突厥懷古監其軍默啜脅知微稱可汗又欲言懷古不肯拜將殺之辭曰守忠而死與毀節以生孰與請斬不避也遂囚軍中因得亡慷慨尚節義羅道宗賜號文簡先生吳融祖翥有名大中時觀察府召以署吏不應高其概言諸朝賜號文簡先生折節長孫順德復爵邑素少檢侈放自如至是折節卓邁崔圓少孤貧志向卓邁整飭呂諲志行整飭濟世段秀實及長沈厚能斷慨然有濟世意功濟四海馬燧與諸兄學輟策嘆曰方天下有事丈夫當以功濟四海渠老一儒哉更學兵書戰策軒軒甚得孔戣擢諫議大夫中人劉希光受財三十萬緡抵死吐突承璀坐厚善逐為淮南監軍太子舍人李涉知帝意投匭上言承璀有功不可棄戮劾奏涉結近倖營罔上聽有詔斥涉峽州司馬官寵側目人為危之戣自以適所志軒軒甚得身可殺名不可死忠義序身可殺名不可死志也張守珪慷慨尚節義浩然有捄世意劉蕡厲名節蕭以志欲移山必能移山天地之心與人不遠昔犬戎滅周申甫復之無知亂齊管仲霸之晉室中絕王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子正救時運有其才必有其志有其言必有其事今一言未行其志乃襄是無志也柳冕荅張僕射書鳴珂遊帝都李泌少為詩曰天覆吾地載吾天地生吾有意無不然絕粒升天衢不然鳴珂遊帝都安能不貴復不去空作昂藏一丈夫可謂有志也鄴侯家傳李渤屢以言斥而悻直不少衰守節者尚之士之有志氣而思富貴者必能建功業有志氣而輕爵祿者必能立名節二者雖其志不同然時危世亂者人君之所急也郭代公倜儻不羇之士也少不以名節自撿當蕭岑內難竟全臣節贊皇公臣子論長驅以定中原五代韓熙載北海將家子也初與李榖相善明宗時熙載南奔吳榖送至正陽酒酣臨訣熙載謂榖曰江左用吾為相當長驅以定中原榖曰中國用吾為相取江南如探囊中物爾及周征淮南命榖為將以取淮南而熙載不能有所為也獨覺志士甘漁樵嗚呼古人已糞土獨覺志士甘漁樵杜甫嚴氏溪枚歌白高尚其事退藏於密身中清廢中權養素素履絜身避地樂天德成而上樂在其中作者七人隱居以求其志逸人放言不言世事論語虞仲夷逸隱居放言夷齊巢許避秦桃源蓬蒿張仲蔚隱居蓬蒿沒人小隱隱山林賣藥後漢韓康者字伯休賣藥不二價長安女子就買伯休執價不移女子曰君乃韓伯休耶何不二價康且惡其名聞乃遁灞陵山連徵不至竟不復出採薇史伯夷叔齊不食周粟乃採薇後人詰之餓死首陽山名振京師漢鄭子真不屈其志耕於巖谷中名振京師谷口鄭子真隱居所逍遙放曠至人遺物文選慕山林之操晉陶潛字淵明少慕山林之操志行高絜退居山林以琴酒自娛外臣上士考槃在澗白駒在谷玄豹隱山玄豹隱霧鳴鶴在陰嘉遁高蹈肥遁終身不仕禮名因跡晦志以道寧遺形塵累反性混元逃名放性畢婚娶尚長字子平變姓名梅福自謂羲皇之人安知堯舜之世獨樂其志闇章君子之道闇然而日章禮非時不見禮韞跡匿光銷聲藏影方外之人高名獨行率性逃名遺榮無悶易遁世無悶蒙以養正育德養德棲遲衡門之下可以棲遲棲遲偃仰離俗抱罋漢陰丈人抱罋灌園渾沌之術孔子曰彼渾沌之術丘惡乎知之蜀嚴沈冥漢書蜀郡嚴君平四皓七人采榮四皓采榮南山不觀車駕桓帝車駕過漢濱人皆觀之有一丈夫耕如故帝問之不觀車駕云云不告姓名隱居之服妾有隱居之服梁鴻妻蝸牛廬焦元孝然作蝸牛廬呻吟其中蘇門阮籍詣蘇門隱者有竹實數斛杵曰而已籍長嘯而喜月犯少微吳中隱士當死謝敷乃卒五柳陶潛五柳三徑蔣詡歸杜陵有三徑富春渚嚴陵釣所往來屑屑王良病歸就徵過友人友人不肯見曰有忠言奇謀當取大位何其往來屑屑不憚煩也非聘則徵申屠蟠子龍太尉黃瓊辟不就後會葬瓊名豪譚論莫及蟠唯南郊一生與酬對臨別執蟠手曰君非聘則徵不久當相見上國蟠作色振手而去鴻飛冥冥弋者何摹喻高道不仕也剌史贄後漢臺終孝威剌史行部執贄見曰孝威居身如是甚苦終曰幸得保性命如使君夕惕庶事反不苦耶露寢魏志高士傳焦先孝然結草廬於河間後野火燒之乃露寢雪中袒臥人視之並如故後至百餘歲方乃平編草為裳魏孫登公和無家屬土窟中居夏則編草為裳冬則被髮也人中龍晉宋纖令艾隱居太守馬岌具威儀鐃鼓造之纖不見岌歎曰名可聞身不可見德可仰形不可睹人中龍也來祝母疾晉夏統仲御隱居不與親族相見後母疾統侍藥宗族因得見敕斷家事尚長字子平建武中婚嫁畢敕斷家事勿復相聞當如我死遂肆意與同志好會廣游五岳名山不知所終門室有名嵇含君道在鞏縣豪丘自號豪丘子門曰歸厚之門室曰慎終之室守道自貴人各有能物仟其性斯遠暴慢於焉逍遙辰祥降靈山河葉瑞味太玄而拔俗守虛白而辭榮洗耳潁川垂綸獛水俯臨盤石仰對貞崧名利不混其情榮辱匪易其操攀桂紉蘭則自高尚衣荷製芰早慕幽貞亭亭朗月遠照山扉肅肅清風傍來澗牖應曜本自周武王左傳曰邢晉應韓武之穆也漢有應曜隱於淮陽山中與四皓俱徵曜獨不至時人謂之曰南山四皓不如淮陽一老八代孫應劭集解漢書云大隱朝市大隱朝市牆東後漢王君公遭亂不仕隱牆東也降志辱身同塵和光薄游于朝不貴軒冕之榮自得山林之趣捕捉逢萌養志人皆化其德大守遣使奉謁不荅太守恨使捕捉吏曰子康賢天下之所知莊處人敬往必不獲勞山民果相率持兵弩禦吏被傷而還子真隱於吳市梅福字子真變姓名為吳市門卒曼倩游於漢朝東方朔字曼倩韞光混俗隨時出處與道沉浮貞不絕俗隱不違親范滂美袁閎也吏隱王喬鄴令老聃柱史君平之居卜肆莊子之吏漆園於陵灌園伯休賣藥吾無隱乎爾偃息藩魏叚干木鼓刀朱亥夷門侯嬴被髮董京威輦至洛陽行吟常宿白社之中時乞市肆之間得碎繒結以自覆得金帛佳錦則不受孫楚數就白社與語載歸而不肯也坐晦跡後漢郭林宗雖善人倫不為危言覈論黨事起唯林宗袁閎得免築土自周後漢袁閎夏甫黨事將作閎遂散髮絕世欲投深林以母老不宜遠遁乃四周築土於庭以為房室自牖納食且於室中東向拜母母思閎時往視之去便掩閉兄弟妻子莫得見之似狂向栩甫與少為書生卓犖講老子狀如學道又似狂被髮著絳綃頭常於灶北坐版床久有膝踝之處不語人來伏而不視之孔世推高節溫輔國薛嵩薦之朝授太常丞一謝嵩即去屏處郊野世推其高節隱王屋山溫造氣盛少所降屈不喜為吏隱王屋山人號其居曰處士墅棲白鹿山鄧世隆洛陽平亡命變姓名號隱玄先生棲白鹿山隱豹林谷令狐峘天寶未及進士第遇祿山亂去隱南山豹林谷遁舍嵩山杜如晦弟楚客方建成難作楚客遁舍嵩山為不仕者杜淹隋開皇中與其友韋福嗣謀曰上好用隱民蘇威以隱者召得美官乃共入太白山為不仕者文帝惡之乃謪戍江表養親未仁軌隱居養親自放山野蕭俛既老舍濟源墅自放山野優游窮年皆隱盧藏用與兄徵明皆隱終南少室二山徑返江東宗室戡舉進士就禮部試吏唱名乃入戡恥之明日徑返江東隱陽羨里數遊山林舒王元名治石州二十年數遊山林有高蹈意署其居曰大隱洞韋夏卿晚歲將罷歸署其居曰大隱洞鏟蹟民伍孔巢父少力學隱徂徠山永王璘稱兵江淮辟幕府不應鏟蹟民伍以處士客隱毗陵竇群兄弟皆擢進士第獨群以處士客隱毗陵居青巖山甄濟居青巖山十餘年遠近伏其仁環山不敢畋漁假隱自名至號中南嵩少為仕塗捷徑隱逸傳為林墟之適顏師古頻被譴仕益不進罔然喪沮乃闔門謝賓客巾褐裙被放情蕭散為林墟之適退隱白鹿山王恭累除越王東閤祭酒退隱白鹿山隱陸渾呂向隱陸渾山伊川田父郤純辭疾還東都號伊川田父十年不出自放江湖薛戎柳冕辟佐其府冕病死得解自放江湖間四明狂客賀知章晚即尤誕放遨嬉里巷自號四明狂客煙波釣徒張志和居江湖自稱煙波釣徒著玄真子亦以自號桑苧翁陸羽上元初更隱苕溪自稱桑苧翁天隨子陸龜蒙時謂江湖散人或號天隨子甪里先生自比涪翁漁父江上丈人不諧際人事房琯與呂向偕隱陸渾山十年不諧際人事半隱亭王龜嘗以光福第賓客多更往永達里林木窮僻創半隱亭以自適沈浮人間元結會天下大亂沈浮人間棲遲不出尹元凱由慈州司倉參軍坐事免棲遲不出者三十年屏居李華自傷踐危亂不能全節又不能安親欲終養而母亡遂屏居江南醉吟先生白君易於所居履道里疏沼種樹創石樓香山鑿八節灘自號醉吟先生為之傳暮節惑浮屠道尤甚稱香山居士本傳隨駕隱士盧藏用始隱山中時有意當世人目為隨駕隱士晚乃徇權利務為驕縱素節盡矣司馬承禎嘗召至闕下還山藏用指終南山曰此中大有嘉處承禎徐曰以僕視之仕宦之捷徑耳藏用大慚聱叟元結作自釋云逃亂入猗玕洞始稱猗玕子後家瀼濱乃自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎既客樊上左右皆漁者少長相戲更曰聱叟七松處士鄭薰端勁再知禮部舉引寒俊士類多之既老號所居為隱巖號七松處士松菊主人韋表徵為監察御史裹行不樂曰爵祿譬滋味也人皆欲之吾年五十拭鏡揃白冒遊少年間取一班一級不見其味也將為松菊主人不傀陶淵明云耐辱居士司空徒本居中條山王官谷有先人田遂隱不出作亭觀素室悉圖唐與節士文人名亭曰休休自號曰耐辱居士其言詭激不常以免當時禍災云東皋子王績有田十六頃在河渚間奴婢數人種黍春秋釀酒養鳧鴈蒔藥草自供以周易老子莊子置床頭它書罕讀也欲見兄弟輒渡河還游北山東皋著書自號東皋子居士屩朱桃椎隱山中贈遺無所受嘗織十芒屩置道上見者曰居士屩也為鬻米茗易之置其處輒取去田東鄰田游巖入箕山居許由祠旁自號為田東鄰回軒巷張志和兄鶴齡恐其遁世不還為築室越州東郭茨以生草椽棟不施斤斧豹蓆棕履每垂釣不設餌志不在魚也觀察使陳少游以其門隘為買地大其閎號回軒巷先是門阻流水無梁少游為創之號大夫橋竹溪六逸李白客任城與孔巢父韓準裴政張叔明陶沔居徂徠山曰沈飲號竹溪六逸居百丈山蕭希甫王鎔以希甫為參軍尤不樂居歲餘又亡之易州削髮為僧居百丈山莊宗將建國于魏置百官求天下隱逸之士幽州李紹宏薦希甫為魏州推官五代五代之亂極矣傳所謂天地閉賢人隱之時歟自古天下未嘗無人也吾意必有潔身自負之士嫉世遠去而不可見者自古材賢有韞於中而不見於外或窮居陋巷委身草莽雖顏子之行不遇仲尼而名不彰況世變多故而君子道消之時乎吾又以謂必有負材能修節義而沉淪於下泯沒而無聞者放身而自得處乎山林而群麋鹿雖不足以為中道然與其食人之祿俛首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明逍遙先生鄭遨見天下已亂有拂衣遠去之意唐明宗時以左拾遺晉高祖時以諫議大夫召之皆不起即賜號為逍遙先生上絕人事趙光逢以世亂去官居洛陽杜門絕人事者五六年五代史麋鹿之與處猿狖之與居今所以惡衣食窮體膚麋鹿之與處猿狖之與居因自以其身不能與時俗順俯仰故目心自絕而不悔焉韓文起居惟適之安窮居而野處升高而望遠坐茂樹以終日濯清泉以自潔采於山美可茹釣於水鮮可食起居無時惟適之安韓文盤谷序奈何天地間而作陷淪客貴道皆仝真潛輝臥出鄰探元入窅默觀化遊無垠李白送岑徵君詩築巖釣渭唐贊耕延陵之皋荷石門之條沉如魚頑冥若鴻翔杜牧處士制耦而耕狂而歌鑿坯以逃荷蓧以游而晦德避難不成乎名非斯人之徒則誰與哉梁肅梁高士碣羔鴈不行崔群送廬嶽處士序旄頭光明垂三十載不習俎豆化為王侯者十有八九焉由是隱逸憔悴羔鴈不行蒼山沉沉側陋不顯商山拂衣漢且求之不得穎川洗耳堯亦存而勿論白居易泉石膏盲煙霞痼疾田游巖頻召不出高宗幸嵩山親至其門游巖野服出拜儀止謹樸帝曰先生比佳否曰臣所謂泉石膏盲煙霞痼疾者惟恐入山之不深入林之不密韓愈書埋光鏟采高竇贊埋光鏟采與草木俱腐剡川一曲賀知章詔賜鑑湖剡川一曲龐公隱時盡室去杜甫寄從孫龐公隱時盡室去武陵春樹它人迷端居室李泌得請乃於衡嶽隱居詔即所居為端居室鄴侯家傳喚鐵太白山隱士郭休所居有白雲亭客至則擊一片其聲清遠山中烏獸聞之群集亭下以為翫號喚鐵天寶遺事高逸賀知章時謂之高逸翰林志拾橡實以飯崔從與兄皆隱太原山中會歲飢拾橡實以飯講學不廢白仄席之求軟輪之聘用之則行舍之則藏有道則見無道則隱安車漢四皓隱商山惠帝為太子為書卑辭安車迎以為客乃出德成而上祿在其中旁求俊乂兼濟天下玄豹隱霧雖欲退藏白駒在場亦宜維縶弓旌蒲帛翹車翹翹車乘招我以弓在聘士之車古者聘士以弓也賁帛易曰賁于白園束帛戔戔蒲輪蕙帳漢以蒲輪徵枚生鶴書賢遺林藪帛賁丘園將弘濟濟之多必在戔戔之賁縻之好爵寘彼周行在谷及門仕進之門聘以尊賢仕而貴義舉逸民天下之人歸心焉辟命詔書沽諸求善價而沽諸身勸為之駕高詔有稱明德者長吏必身勸為之謂身自往勸以車駕而遣之為駕哀帝徵賢龔勝曰竊見國家徵醫巫為駕徵賢者宜駕之帝曰大夫乘私車來耶勝曰唯唯詔為駕也羔鴈成群陳寔父子世號三君每宰府辟命嘗同日至羔鴈成群當世榮之慰遣黃瓊聘辟不應有司劾不敬詔命郡縣以禮慰遣之乃至初不起後應郇恁世祖召不至東平王蒼為驃騎將軍辟而應焉後朝會戲之對曰先君秉德以臨下故臣可得不來驃騎執德以檢下故臣不敢不至月餘卻歸又李喜季和少有高行累辟三府不就景旁命為從事中郎引見曰先君辟君不應今至何也對曰先公以禮見待喜得以禮進退明公以法臨下故不敢不來席上禮儒有席上之珍以待聘席猶鋪陳也陳上古之道貪議治國白虎通天子聘求士者貪議治國之道三旌之禮聘士之禮續食武詔民有明當世之務習先聖之術者縣次續食與計偕式廬魏文侯過叚干木之廬必式之往來屑屑見隱逸門注奪牛翁韓康伯休桓帝徵不得已辭安車自乘柴車先使者行亭長以韓徵君當過發人牛治道見康以為田叟也奪其牛康釋駕與之使者至曰奪牛翁即徵君也敷求哲人夢得高宗夢得說曰夢帝賚予良弼其代予言乃審厥象營求諸野說築傅巖之野惟肖聘丘園之耿介辟郡國之賢良選就賢辟命皎皎白駒賁然來思五反伊尹史伊尹隱居使人聘之五反然後肯三謁孔明徐庶謂先主曰諸葛孔明臥龍也可就見不可致屈先主遂詣亮三往乃見失望樊英李齊順帝備禮徵聘詔責郡縣群縣載上道到猶稱疾彊輿入殿猶不屈使就太醫致羊酒後天子為設壇席有司奉引賜几杖拜五官郎將譚者初為不必降志及引問又無奇謀深仁帝失望不起迷邦陽貨謂孔子曰懷其寶而迷其邦可謂仁乎鳥獸不可與同群孔子曰不降其志不辱其身者伯夷叔齊與願守所志後漢周黨字伯況好清節被徵不得已乃著短布單衣榖皮悄頭及引見伏而不謁因陳願守所志帝許之不辱其身見上注洗耳許由隱於箕山堯聞其賢聘為九州長由聞其聲乃洗耳於穎川之側唐堯高許由之風見上注漢帝重嚴陵之志後漢嚴光字子陵光武欲授之官子陵曰昔帝堯大聖許由洗耳於河濱今臣欲郭箕山之操陛下遵帝堯之跡光武雅重之宜欽高士之風難奪匹夫之志雖全獨行儒有獨立特行且亂大倫子路曰不仕無義欲絜其身而亂大倫名穢七啟曰名穢我身位累我躬抗高尚之風則宜矯俗遇休明之日安可迷邦不仕無義迷邦非仁不事王侯高尚其事終傲三旌之禮雖勤五反之命樂而無悶寵則可驚遺榮自污高鳳自言巫家以辭辟命復恐不免乃與寡嫂爭田以自污與夫僶俛從公未若逍遙樂道育白駒之德亦既逢時蘊玄豹之心猶思避世時有昏明理亂道包舒卷行藏優詔獎遺物累不召之臣公車詔揚秉韋著並稱疾不至有司劾大不敬正罪周景邊韶等議秉以退讓為節誠違仄席之望然逶迤退跡是抑苟進之風明王之世必有不召之臣也後應聘見上注圖形後漢桓帝徵姜肱不至遣工圖具形狀肱臥幽室以被韜面竟不出慰遣見上注愍勞以官職昭帝徵涿郡韓福至年老賜帛冊書曰朕愍勞以官職之事大夫其歸修孝悌以敦鄉里行道傳舍縣次具酒食從者及長吏存問八月帝賜複衾飼以中牢持毒藥公孫述持毒藥徵李僕僕曰欲誘我以高位重餌遂飲毒藥而死以明自煎龔勝被王莽徵不食而死有老父來吊甚哀曰膏以明自煎龔生竟天天年非吾徒也遂出不知其姓名詭辭王莽徵薛方方辭曰堯舜在上下有巢許陛下興唐虞之風臣亦欲守箕山之志莽喜其言不彊也從吾所好與子偕隱不可詘李彊為益州牧謂楊雄曰吾真得嚴君平矣雄曰君備禮待之此人可見而不可詘及相見平不敢請為從事不稱臣後漢王霸字儒仲徵到尚書拜稱名不稱臣有司問其故霸曰天子有所不臣偃仰以沐堯曦棲遲而歌舜塗杖藜含糗雅符三徑之歡飲水曲肱取逸一瓢之樂閉門卻埽以慰餘人結宇幽巖時堪養性不事王侯有輕軒冕曳尾塗中楚王使使聘莊周周謂使者曰吾寧曳尾於塗中商賈自穢王烈太守欲以為長史烈為商賈自穢得免孔書幣招禮溫造隱王屋山壽州剌史張建封聞其名書幣招禮造欣然曰可人也往從之即山郭促不拜李渤詔以右拾遺召於是河南少尹杜兼遣吏持詔幣即山郭促不拜洛陽令韓愈遺書今可為之時自藏深山牢關而固拒則與仁義者異守矣想遺公冠帶就車惠然肯來舒所畜積以補綴盛德之缺渤心善其言始出家東都就家致聘張鎰時黜陟使裴伯言薦潞州處士田佐時詔除右拾遺集賢院直學士鎰以為禮輕恐士不勸復詔州縣吏以絹百匹粟百石就家致聘佐時卒不至詔十至堅臥不起甄濟居青巖山採訪使苗晉卿表之之諸府五辟詔十至堅臥不起封刀召甄濟安祿山反使蔡希德封刀召之曰即不起斷其頭見我濟色不動左手書曰不可以行使者持刀趨前濟引頸待之希德戲欷嗟歎止乃以實病告還詔陽城陝虢觀察使李泌數禮餉城受之泌欲辟致之府不起乃薦諸朝詔以著作佐郎召并賜緋魚泌使參軍事韓傑奉詔至其家城封還詔自稱多病老憊不堪奔奉惟哀憐泌不敢強頻召不出田游巖愛夷陵青溪止廬其側長史李安期召赴京師行及汝辭疾入箕山頻召不出表以蒲車王友貞玄宗在東宮表以蒲車召不至具書幣邀辟石洪罷黃州錄事參軍隱居不出公卿數薦辟皆不答烏重嗣鎮河陽求賢者以自重或薦洪重嗣曰彼無求於人其肯為我來耶乃具書幣邀辟洪亦為重嗣知己故欣然成行重嗣喜其至禮之主上感傷山林之士有逸遺者屢詔內外之臣旁求儒雅于四海而其至者蓋闕焉豈無其人哉亦見國家不以非常之道禮之而不來耳韓文風雲入壯懷泉石別幽耳同上送石處士赴河陽幕詩幣帛數四江南野史江夢孫先王聞其德業遂以幣帛聘之數四不得已乃起徵君已去獨松菊哀壑無光留戶庭杜甫覃山人隱居招聘孔述睿事親以孝聞既孤德宗踐祚以諫議大夫銀章朱綬纏束帛就嵩山以禮招聘徵再不至隱逸盧鴻廬嵩山玄宗開元初備禮徵再不至五年詔曰鴻有泰一之道中庸之德鉤深訪微確乎自高詔書屢下每輒辭托使朕虛心引領于今數年雖得素履幽人之介而失考父滋恭之誼豈朝廷之故與生殊趣邪將縱欲山林往而不能反乎禮有大倫君臣之義不可廢也今城闕密邇不足為勞有司其齎束帛之具重宣茲旨想有以翻然易節副朕意焉鴻至東都謁見不拜帝召升內殿置酒拜諫議大夫固辭復下制許還山
