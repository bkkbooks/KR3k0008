body:
  text: 白孔六帖卷一百唐白居易原本宋孔傳續撰蒲桃一荔枝二甘蔗三木𤓰四柿五𤓰六竹七松栢八桂九桐十柳十一蘭十二芝十三蓮十四菊十五茅十六萍蘋十七桑十八蒲桃一白釀酒史大宛以蒲桃醸酒富人藏酒至萬石數十年不敗罽賔漢書無雷國罽賔國皆有蒲桃遺人續漢書燉煌張氏傳曰扶風孟陀以蒲桃酒一斗遺張譲拜陀為凉州刺史設酒漢武内傳西王母常下帝為設蒲桃酒善醉易醒魏文帝詔羣臣曰旦設蒲桃解酒宿醒掩露汁多除煩解熱善醉易醒𤣥圃鍾士秀蒲桃賦曰託靈根於𤣥圃植岷山之髙根蔓衍潘岳閒居賦曰若榴蒲桃之珍磊落蔓衍於其側蔓蒲桃也孔奉母陳叔逹嘗賜食得蒲桃不舉帝問之對曰臣母病渴求不能致願歸奉之帝流涕曰卿有母遺乎因賜之笯赤建國西域有笯赤建國多蒲桃雞卵磨鄰老勃薩嵗獻貴人蒲桃大者如雞卵為酒五代于闐蒲桃為酒黄白黒三種蒲桃出于大宛張騫所致有黄白黒三種成熟之時子實逼側雜俎蒲桃若榴西域勃律地寒蒲桃若榴太原食尹河東備録曰楊炎食蒲桃曰汝若不澁當以太原食尹相授草龍珠帳貝邱之南有蒲桃谷谷中蒲桃可就其所食之或有取歸者即失道世言王母蒲桃也天寳中沙門曇霄因遊諸岳至此谷得蒲桃食之又見枯蔓堪為杖大如指五尺餘持還本寺植之遂活長髙數仞䕃地幅員十丈仰觀若帷蓋焉其房實磊落紫瑩如墜時人號為草龍珠帳出雜俎李直方第果品蒲萄為五國史補劉禹錫蒲桃歌分岐浩繁縟脩蔓幡詰曲繁葩組綬結垂實珠璣蹙馬乳帶輕霜龍鱗躍初旭同上蒲桃開景風昔我初來時蒲桃開景風李白將遊衡山出漢宫蒲桃出漢宫同上行樂詞蒲桃宫匈如繫頸數應盡明年應入蒲桃宫送族弟從軍普賢堂天后蒲桃垂實則幸此堂雜俎馬乳韓文蒲桃詩若欲滿盤堆馬乳莫辭添竹引龍鬚土宜西域焉耆國土宜蒲桃蒲桃實大如棗至熟時常取之或賜宫人伽藍記味兼醍醐太宗破髙昌收馬乳蒲桃種於苑中并得酒法仍自損益逆造酒成緑色芳香酷烈長安始識其味出南部新書荔枝二白龍眼後漢單于來朝賜龍眼荔枝交州貢唐堯為臨武長縣接交州交州舊貢荔枝堯上書諫乃止甘液王逸荔枝賦曰暖若朝雲之興森如横天之彗口含甘液心受芳氣卓絶類而自異超衆果而獨貴南方魏文帝詔曰南方有龍眼荔枝寧比西國之蒲桃石密恐腐仲長統昌言今人主不思廿露零醴泉湧而患枇杷荔枝之腐亦鄙矣滋梁劉霽荔枝詩曰叔帥貴其珍武仲稱其美良由自逺至含滋不留齒孔置騎傳送𤣥宗貴妃楊氏嗜荔枝必欲生致之乃置騎傳送走數千里味色未變已至京師荔子丹韓愈羅池廟碑文荔子丹兮蕉葉黄殻如紅繒膜如紫綃白居易荔枝圖序殻如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴酪若離本支一日而色變二日而香變三日而味變四五日外色香味盡去紫文紺理黛葉緗枝張九齡荔枝賦肇氣合滋芬敷謐溢緑穂靡靡青英苾苾蔕葯房而粹萃皮龍鱗以駢比膚五英而含津色紅萍以吐日朱苞剖明當出信琱盤之仙液實玳筵之綺繢同上荔枝圖劉崇龜姻舊或干以財率不荅但寫荔枝圖與之鮮明芳潔杜陽編羅浮先生軒轅集上因語京師無荳䓻花及荔枝俄頃一花皆連枝葉凡數百鮮明芳潔如新折閩江紅錦正月十五夜𤣥宗於常春殿撤閩江紅錦荔枝令宫人拾出影燈記紫羅裁襯殻白玉褁填瓤白居易詩炎方每續朱櫻獻玉座應悲白露團杜甫解閲先帝貴妃今寂寞荔枝還復入長安炎方毎續朱櫻獻玉座應悲白露團甘蔗三白為杖典略文帝與奮威將軍鄧展飲酒酣方食甘蔗展以為杖左右大笑之都蔗曹植詩曰都蔗雖甘杖之必折巧言雖美用之必滅療渴晉張協都蔗賦曰九秋凉期𤣥甘初出華黄浮觴酣飲累日挫斯蔗而療渴若潄醴而含蜜孫亮取吴志孫亮方食生梅使黄門以銀椀并盖就中藏吏取甘蔗餳黄門著䑕屎於􅄳中一云取蜜漬梅云云漸入佳景顧愷之喫甘蔗從尾食至頭曰漸入佳景孔色味愈西域西域傳摩揭陀太宗遣使取熬糖法即詔揚州上諸蔗杵瀋如其劑色味愈西域逺甚若脛南蠻婆賄伽盧國蔗大若脛曲名西舍利曲名凡十有二八曰甘蔗王驃云遏思略謂佛教民如蔗之甘皆恱其味也噉蔗初味猶噉蔗韓愈荅張澈春雨餘甘蔗杜甫遣興薑蔗傍胡田韋應物送唐明府食蔗即愈江南野史盧絳中痁疾逾月既乏資給疲瘵且極忽夢一白衣婦人頗有姿色謂之曰子之疾當食蔗即愈既詰朝見鬻絳揣囊中且乏一鏹唯有唐韻一册遂詣易之其人曰吾軰乃負販者將此安用哀君欲之志切遂貽數挺絳喜而食之至旦疾損甘蔗銷殘醉元稹詩木𤓰四白衛風木𤓰詩美齊桓公也投我以木𤓰報之以瓊瑶匪報也永以為好也詩木𤓰次之周禮中州嘉木宋何承天賦云孔李樹生木𤓰五行志大和三年成都李樹生木𤓰空中不實鹽山木𤓰地理志鹽州貢鹽山木𤓰嘉木詩孫逖宰相蕭嵩㑹百官賦嘉木詩使逖序所以然花作房蜀本草云其樹枝狀如柰花作房生子形似栝樓火乾甚香獻木𤓰明皇雜録元獻皇后思食酸味明皇以告張説因進經袖出木𤓰以獻一百二十一節酉陽雜俎木𤓰一尺一百二十一節木𤓰山維㑹昌六年敬告于木𤓰山之神維神聰明格天能降雲雨杜牧祭木𤓰神文芳脆易損崔涓守杭州湖上飲餞客有獻木𤓰所未嘗有也有中使即袖歸曰禁中未嘗有宜進于上頃之解舟而去守懼得罪欲輟飲官妓作酒糾者白守某度木𤓰經宿必委中流也㑹送者還云果潰爛弃之矣守異其言召問之曰此物芳脆易損必不能入獻守取香錦面賚之出唐語林布護滋蔓枯木無生物之理而布䕶滋蔓碩大殊尤時果有常形之分而碩大殊尤王維木𤓰頌客心自酸楚況對木𤓰山李白望木𤓰山土貢杭州潭州湖州土貢木𤓰地理志柿五白烏枇之柿潘岳閑居賦曰梁侯烏枇之柿記曰榛柿𤓰桃李梅朱實説文云柿朱實果也華林晉宫闕名曰華林園柿六十七株殊本合條吴令顧修期言縣西鄉有柿樹合條金衣梁簡文帝謝柿啓曰懸霜昭采凌冬挺潤甘清玉露味重金衣孔取葉肄書鄭虔好書常苦無紙於是慈恩寺貯柿葉數屋遂往日取葉肄書歲久殆遍枯死復生五行志景雲二年髙祖故第有柿樹自天授中枯死至是復生許州土貢地理志許州土貢柿梁矦張九齡賦柿何稱乎梁矦七絶酉陽雜俎俗謂柿樹有七絶一壽二多隂三無鳥巢四無䖝五霜葉可翫六嘉實七落葉肥火柿盤木中根固柿為最俗謂之柿盤出酉陽雜俎緑隂合白公朝歸詩柿樹緑隂合霜天熟柿栗收拾不可遲韓文送張道士序詩頳虬卵然雲燒樹大實駢金烏下啄頳虬卵韓愈遊青龍寺𤓰六白禮曰為天子削𤓰者副之巾以絺副析也四析之也以巾覆焉副披偪反為國君者華之巾以綌華中裂也音話為大夫累之累傫也為不巾覆累力果切士疐之不中裂横截去疐而已疐音丁𨽻切庶人齕之齕者齧也七月食𤓰五月治𤓰大戴禮五月乃治𤓰之亂五色阮籍𤓰詩曰五色曜朝陽東陵青門漢書邵平者故秦東陵侯也秦破為布衣種𤓰長安城東𤓰美故世號東陵𤓰從邵平始也青門亦東門也是剥是葅詩曰疆埸有𤓰是剥是葅繫而不食子曰吾豈匏𤓰也哉焉能繫而不食緜緜之𤓰詩𤓰之初生緜緜𤓰瓞詩及𤓰而代傳曰齊使連稱管至父戍葵邱𤓰時而往曰及𤓰而代三年一熟積石山有𤓰云云祥異漢哀帝二年𤓰異本同蔕共生一𤓰時以為嘉𤓰又李融為政得吏人有祥𤓰生六子而共一蔕𤓰田不納履文選詩龍蹄貍首並𤓰名浮甘𤓰於清泉魏文帝書甘𤓰見上滋蔓甘實春播夏成孫鍾之業孫鍾貧以種𤓰為業𤓰剖而豆分邵平之園見上注𤓰瓠不成月令𤓰祭禮𤓰祭尚環食中弃所操上環𤓰頭也祭祭先芸家語曽子芸𤓰誤㫁其根父晳擊之仆地有頃方蘇灌𤓰賈誼書梁大夫就為邉縣令與楚邉亭皆種𤓰梁亭劬數灌其𤓰美楚人窳而希灌其𤓰惡楚人以梁𤓰美因夜竊搔梁𤓰梁欲報搔楚𤓰就曰是搆怨之道乃夜往竊為楚灌𤓰楚王乃謝以重幣梁楚交歡因宋就也步騭吴志步騭種𤓰自給嘉𤓰晉王濬園生嘉𤓰二莖一實鉤蔕阮籍詩連畛距阡陌子母相鉤蔕孔獻陸贄帝幸梁有獻𤓰果者帝嘉其意欲授以試官贄曰爵位天下公器不可輕也今獻𤓰一器果一盛則受之彼忘軀命者有以相謂矣曰吾之軀命乃同𤓰果𤓰果草木也若草木然人何勸哉瑞𤓰三蔓舊唐書曰貞元四年夏右神策軍獻瑞𤓰三蔓合為一蔕而生三𤓰食𤓰武儒衡㑹食𤓰蠅集其上事見蠅奠杜如晦帝他日食𤓰美輟其半奠焉緱氏𤓰明崇儼四月帝憶𤓰崇儼索百錢須􅁷以𤓰獻曰得之緱氏老人圃中帝召老人問故曰埋一𤓰失之土中得百錢云黄臺承天皇帝倓傳李泌曰陛下嘗聞黄臺𤓰乎見歌門西𤓰五代史載陷敵記而真珠寨始食西𤓰云契丹破回紇得此種以牛糞覆棚而種大如中國冬𤓰而味甘求傍舍𤓰王𢎞義始賤時求傍舍𤓰不與乃騰文言園有白兎縣為集衆捕逐畦蓏無遺剖𤓰傷指代宗皇后沈氏河南為史思明所没失后所在徳宗即位令咨訪髙力士女嘗從后遊年狀差似后嘗削脯哺帝傷左指髙亦剖𤓰傷指斬𤓰試劒南漢劉晟嘗夜飲大醉以𤓰置伶人尚玉樓項拔劔斬之以試劒因斬其首獻生子李泌請以二月朔為中和節民間以青囊盛𤓰果種相問遺謂之獻生子分蔕𤓰杜陽編滄州産分蔕𤓰長二尺其色如栮一顆二蔕沈浮亂水玉愛惜如芝草落刄嚼冰霜開懐慰枯槁杜甫園人送𤓰詩許以秋蔕除仍看小童抱同上空洞靈𤓰謝𤣥卿遇神仙設空洞靈𤓰續仙傳種𤓰馬湘有道術嘗於江南刺史馬植對冬月以酒杯盛土種𤓰須􅁷引蔓生實食之甚美尋支𤓰大食國有尋支𤓰大者十人食乃盡豈傍青門學種𤓰丈人文力猶強健豈傍青門學種𤓰杜甫曲江陪飲𤓰剖銛刃巾之以踈絺蘇源明小洞庭讌籍霜蔓縋寒𤓰柳宗元詩淡澉甘𤓰濯韓愈納凉聯句𤓰畦爛文貝秋雨聯句傾筐蒲領青蒲眼顔色好杜甫𤓰詩七月而食五色稱珍柳宗元賀嘉𤓰表七月而食豳土歌王業之難五色稱珍東陵詠嘉賔之㑹每見秋𤓰憶故邱杜甫詩𤓰嚼水精寒杜甫詩陽陂可種𤓰竹七白東南之美爾雅曰東南之美者有㑹稽之竹箭焉千畆史記渭川千畆竹其人與千户侯等有筠禮之於人猶竹箭之有筠松栢之有心二者居天下之大端也故貫四時而不改柯易葉注云竹箭篠也端本也二物天地氣之本故不變也梁園梁孝王有脩竹園染淚湘妃泣舜揮淚染竹成斑龍化費長房隨壺公入山公以竹杖與騎至家以竹杖投葛陂中化為龍鳳食非竹實不食此君何可一日無此君掃壇永嘉記小江縁岸有仙石壇有竹嬋娟青翠風來枝動掃石壇壇上無塵也嬋娟青翠見上注篠簜箘簵楛禹貢揚州厥貢篠簜荆州厥貢箘簵注皆中矢之善者也竹林七賢世説嵇康阮籍等七人常集於竹林之下世謂之竹林七賢脩竹冬青選緑葉翠莖冒霜停雪選玉潤碧鮮嬋娟之竹生於江潭楚詞如竹苞矣詩苞本也歲寒之心脩竹檀欒既四時之不改豈一日之可無擢本千尋孔采恠竹蘇良嗣遷荆州長史帝遣宦者采恠竹江南將蒔上苑宦者所過縱暴至荆良嗣囚之上書言狀帝下詔慰奬取竹弃之射竹党項宣宗大中四年内掠邠寧詔鳯翔李業河東李拭合節度兵討之宰相白敏中為都統帝出近苑或以竹一筒植舍外近纔尺許逺且百步帝屬二矢曰党項窮冦仍歲暴吾鄙今我約射竹中則彼當自亡不中我且索天下兵剪之終不以此賊遺子孫左右注目帝一發竹分矢徹諸外左右呼萬歲不閲月羗果破庭竹五代扈載遊相國寺見庭竹可愛作碧鮮賦題其壁世宗聞之遣小黄門就壁録之覧而稱善鳯翔千畮五代李從儼有竹千畮在鳯翔懼侵民利未甞省理縹節黄苞韓愈詩縹節已儲霜黄苞猶掩翠電斑竹地理志雷州土貢電斑竹擲竹枝為橋明皇雜録羅公逺引明皇遊月宫擲一竹枝於空中為大橋色如白金行十數里至一大城闕羅曰此乃月宫也竹里館王維别墅在輞川地竒勝有竹里館竹溪六逸李白與孔巢父韓準裴政張叔明陶沔居徂萊山日沈飲號竹溪六逸竹類有三十九酉陽雜俎竹譜云恨竹淚空幽韓文逺遊聯句何時聞秋聲翛翛北忩竹李白感秋龍影貞幹鄣曲砌翠葉負寒霜拂牖分龍影臨池待鳯翔唐太宗詩新筍踴犀株元稹詩剥苔吊斑林韓愈㑹合聯句羅浮巨竹貞元中有人遊羅浮第三嶺見巨竹有三十九節長二丈祖竹藂新筍元稹詩翠乾宜棧竹杜甫詩松栢八白子曰歲寒然後知松栢之後凋不易葉於四時方偃盖於千秋有心具竹門注如松茂矣詩秦封秦始皇封太山遇雨避於松下遂封松為五大夫培塿無松栢草不植松栢之下草不植偃蓋松千歲如偃蓋山有喬松詩鬱鬱澗底松離離山上苖愛彼徑寸莖䕃此百尺條青青陵上栢落落亭亭鶴棲千歲之鶴棲於松栢徂來之松新甫之栢徂來新甫並山名問社哀公問社於宰我宰我對曰夏后氏以松殷人以栢女蘿附於松栢松桷有埏勑延切詩陟彼景山松栢桓桓是斷是遷登景山取松栢易直者斷遷也孔七松居士鄭薰既老號所居為隠巖蒔松于庭號七松居士仰射不能及顛回鶻黠戛斯木松髙者仰射不能及顛化石回紇拔野古有川曰康干河㫁松投之三年輙化為石色蒼緻然節理猶在世謂康干石者隠背李泌嘗取松樛枝以隠背名曰養和後得如龍形者因以獻帝四方爭效之餌葉王希夷餌松栢葉雜華百餘章秦系客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上為林郎餘令授霍王元軌参軍從父知年亦為王友元軌毎曰郎家二賢皆入府不意培塿而松栢為林也十松李適卒勒其子曰覇陵原西可營墓樹十松焉二栢桑道茂居有二栢甚茂曰人居而木蕃者去之木盛則土衰土衰則人病乃以鐡數十鈞埋其下復曰後有發其地而死者大和中温造居之發藏鐡而就死若龍攣虎跛狀陸龜蒙恠松賛曰有道人自天台來示余恠松圗披之甚駭人自盤根于嵓穴之内輪菌逼側而上身大數圍而髙不四五尺礧碋然蹙縮然榦不假枝枝不假葉有若龍孿虎跛壯士囚縛之狀孤生挺特無所因倚李徳裕進戒帝辨邪正請借物為喻松栢之為木孤生挺特無所因倚蘿蔦則不然弱不能立必附它木五粒松脂五代鄭遨聞華山有五粒松脂淪入地千嵗化為藥能去三尸因徙居華隂欲求之枯松復生天寳遺事明皇遭禄山之亂鑾輿西幸禁中枯松復生枝葉葱蒨宛如新植者後肅宗平内難再興唐祚祥不誣矣偃蓋山金陵記芳山有野人見一使者異服牽一白犬野人問居何地曰偃蓋山隨至古松下而没松形果如蓋意使者乃松樹精犬乃茯苓耳髙直聳秀條暢碩茂貞松産於嵓嶺髙直聳秀條暢碩茂粹然立於千仞之表和氣之發也禀和氣之至者必合以正性於是有貞心勁質用固其本禦攘冰霜以貫歲寒故君子儀之柳子厚送崔羣勁色不改舊芳心與誰榮柳子厚松詩雖當霰雪嚴未覺栝栢枯杜甫别張十三建封詩采栢動盈掬佳人蛇子蛇孫鱗宛宛新香幾粒紅催飯緑坡浸葉滿濃光細束龍髯絞刀剪李賀小松碧澗蒼松五粒稀侵雲采去霞沾衣韋應物東林賜松英丸詩五松受職李白送人遊桃源序登封太山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛壽倒三松下元夫人降封陟謂陜曰我能令君壽倒三松太平廣記不空三藏塔前多老松歲旱則官伐其枝為龍骨以祈雨盖三藏役龍意其樹必有靈也酉陽雜俎孔明廟前有老栢古栢行苦心香葉苦心豈免容螻蟻香葉終經宿鸞鳯同上兩株慘裂苔蘚皮屈鐡交錯廻髙枝白摧朽骨龍虎死黒入太隂雷雨垂雙松歌偃蹙龍虎姿主當風雨㑹病栢詩意鍾老栢青送率府程録事切切交風松數十株切切交風如冠劒大臣國有急難庭立而議杜牧晚晴賦栢曰蒼宫樊宗師園林記摩頂松𤣥裝往西域見其松以手摩其枝曰吾西去求佛教汝可西長吾歸即東回使吾弟子軰知之既去松枝年年西指一年忽東回弟子曰教主歸矣果還至今謂之摩頂松廣異記兩粒五粒酉陽雜俎松今言兩粒五粒粒當言鬛成式修行里私第大堂前有五鬛松兩株大財如椀甲子年結實味與新羅南詔者不别五鬛松皮不鱗中使仇士良水磑亭子在城東有兩鬛皮不鱗者又有七鬛者不知自何而得俗謂孔雀松三鬛松也松命根遇石則偃蓋不必千年也松圍三尺摭言鍾輻作松齋手植一松夢朱衣吏曰松圍三尺吾子當登第後三十年成名其松圍果三尺桂九白香宜泛酒味可蠲痾小山楚辭曰桂樹叢生兮小山之幽偃蹇連拳兮枝相樛攀桂兮聊淹留劉安隠詩云云月中有仙桂樹一枝晉郤詵對武帝曰臣對策為天下第一猶桂林一枝八桂森挺以陵霜天台山賦冬榮楚辭曰嘉南方之炎徳美桂樹之冬榮薑桂因地而生不因地而辛草木之滋記䘮有疾飲酒食肉必有草木之滋焉以為薑桂之謂也楚國之薪蘇秦曰楚國之薪貴於桂也丹桂朱桂黝儵於南北見靈光殿賦孔小山篇太宗賢妃徐惠小山篇曰撫桂枝以凝想以防疾疢元行冲謂狄仁傑曰參术芝桂以防疾疢山桂酉陽雜俎山桂葉如麻細花紫色黄華簇生如䕶火草花出丹陽山中團團韓愈羅池廟碑文桂樹團團桂花三月開雜俎衛公言桂花三月開黄而不白幽桂窮冬百草死幽桂乃芬芳韓愈重雲詩誰憐松桂性競愛桃李隂孟先生桂樹青雲端相思在何處桂樹青雲端李白贈參寥子桂蠧花不實古風芳桂不采芳桂枝反棲惡木根桂林坐蕭瑟宿龍門寺桂子落秋月送崔十二鼯啼桂方秋日夕山中桂花香帶雪杜牧送孟遲子把一枝物桂花香帶雪芳香而正堅文選直學省詩山中有桂樹李翰注桂樹芳香而正堅故君子依之天竺桂白公詩曰宿因月桂落醉為海榴開題天竺寺所作也舊説杭州天竺寺毎歲秋月有桂子墜山中有桂花莫將花如霰王維離披得幽桂芳本欣盈握柳宗元衡陽柳桂聯翩桂花墜秋月李賀山頭老桂吹古香同上青桂隠遥月李白方從桂樹隠不羡桃花源同上桂露對仙娥李賀感諷桂露對仙娥星星下雲逕雪下桂花稀同上兎寒蟾冷桂香白唐李商隠詩雨桂子于台州五行志垂拱四年三月雨桂子于台州旬餘乃止占曰天雨草木人多死霧密前山桂柳宗元述舊言懐詩桐十白棲鳯之枝剪圭之葉嶧陽禹貢徐州貢嶧陽孤桐注特生也材中琴瑟詩曰梧桐生矣于彼朝陽又曰菶菶萋萋鳯棲鳯皇非梧桐不棲入爨吴人有燒桐以爨者蔡伯喈聞其爆聲曰良桐因請削為琴尾尚焦故號焦尾琴翦桐為圭成王剪梧葉為圭與唐叔曰封汝於唐周公請擇日成王曰吾與戯之耳周公曰天子無戯言遂封之龍門之桐七發曰龍門之桐髙百尺而無枝又曰半生半死清明之日桐始華月令半死見上注雙桐生空井魏明帝詩云云其桐其椅其實離離詩孔更植契苾何力司稼少卿梁脩仁新作大明宫植白楊于庭示力曰此木易成不數年可庇何力不荅但誦白楊多悲風蕭蕭愁殺人之句脩仁驚悟更植以桐破一桐葉附使以進李泌徳宗在奉天召赴行在時李懐光叛嵗又蝗旱議者欲赦懐光帝博問羣臣泌破一桐葉附使者以進曰陛下與懐光君臣之分不可復合如此葉矣由是不赦桐之良柳宗元霹靂琴賛序琴莫良於桐桐之良莫良於生石上青桐樹北夢𤨏言王義方初拜御史置宅酬直訖數日忽對賔朋指庭中青桐樹一雙曰此忘酬直召宅主付之錢四千鳯條歴城房家園齊博陵君豹之山池其中雜樹森竦或有人折其桐枝者君曰何謂傷吾鳯條自後人不復敢折雜俎空䃈一片下琤若摧琅玕霜風侵梧桐衆葉著樹乾空䃈一片下琤若摧琅玕韓文秋懐詩青桐君龍門古寺庭多古桐桐花盛開有異蜂甚大其聲如人㣲吟花間僧異之網取一枚置籠中中夜聞歎息之聲翊日大蜂羣集柳十一白詩曰有苑者柳不尚息焉苑茂皃言人息其隂苑彼柳斯鳴蜩嘒嘒詩金堤柳選折柳樊圃詩鑚燧改火春取榆柳之火彭澤柳五柳先生晉書陶潜字淵明為彭澤令宅邉栽五株柳自號為五柳先生竊植武昌晉陶侃士衡明識過人武昌道上種柳人有竊之種於家侃見識之人因服罪昔我往矣楊柳依依詩鬱鬱園中柳古詩未若柳絮因風起謝道韞雪詩孔蒔柳于庭韋虚心維子初維為郎蒔柳于庭及虚心兄弟居郎省對之輙歛容檉柳吐蕃赤嶺藏河夾河多檉柳瑞柳吕渭遷禮部侍郎始中書省有古柳建中末枯死徳宗自梁還復榮茂人以為瑞柳渭令貢士賦之帝聞不以為善數歲成林范希朝遷振武節度使初單于城池不樹希朝命蒔柳數歲成林柳浪王維有别墅在輞川有柳浪踈楊掛緑絲李白詩植白楊于庭梁脩仁作大明宫事見桐門細柳圏李適天子春幸梨園并渭水祓除則賜細柳圈辟癘柳花為酒南蠻訶陵以柳花為酒九烈君三峯集曰李固言未第前行古柳下聞有彈指聲固言問之曰吾柳神九烈君也用柳汁染子衣矣科第無疑果得藍袍當以棗餻祀我固言許之未久及第花開玉關雪葉暖金忩煙李白折楊柳垂楊拂緑水揺艶東風年花開玉闗雪葉暖金忩煙柳將軍有人於古宅遇柳將軍者驗之乃一株枯柳爾宣室志折柳結帶麗情集柳枝詩洛中里娘也聞誦義山燕䑓詩乃折柳結帶贈義山乞詩㸃翠柳含萌白居易詩及歸柳嘶􅘪韓文征蜀聯句女媧陵雙柳虢州刺史王竒光奏女媧墳云天寳十三載大雨晦冥忽沈一夜河上有人覺風雷聲曉見其墳踴出上生雙柳樹髙丈餘下有巨石兼盡圖進酉陽雜俎幽蘭十二白幽蘭芳蘭春蘭秋蘭秋蘭兮青青緑葉兮紫莖楚辭光風轉蕙泛崇蘭同上芝蘭生於深林不以無人而不芳家語生庭語林曰譬若芝蘭玉樹欲使其生庭芳蘭當門不得不鉏古人有言國香傳鄭文公賤妾曰燕姞夢天使與已蘭曰以是為爾子以蘭有國香人服媚之如是既而文公與之蘭而御之辭曰妾幸而有子將不信敢徴蘭乎穆公名曰蘭刈蘭而卒傳鄭穆公有疾曰蘭死吾其死乎吾所因蘭而生刈蘭而卒與善人居如入芝蘭之室久而知其芳家語蘭以秋芳古詩紉秋蘭以為佩楚辭南陔美孝子也循彼南陔言采其蘭以為佩也修禊韓詩三月上巳桃花水時時俗於溱洧水執蘭修禊祓除不祥又晉永和九年王羲之集羣賢㑹山隂之蘭亭在握郎官握蘭含香叢蘭欲茂而風敗之文子十歩説苑十歩之内必有芳蘭九畹楚辭予既滋蘭之九畹蘭以香而自焚同心之言其臭如蘭易賜禮婦或賜之茝蘭則受而獻諸舅姑民之好我芳若椒蘭孫子卿謝庭晉謝太傅諸子若芝蘭玉樹生於階庭清露被蘭臯古詩秋蘭隂墀窮谷既芳蘭孔蘭澤李適帝冬幸新豐賜浴湯池給香粉蘭澤揚揚其香韓愈猗蘭操蘭之猗揚揚其香不採而佩於蘭何傷風蘭文粹孟遲詩風蘭舞幽香蘭菊異芬裴子餘同舍李尚隠程行湛或問優劣於長史陳崇業曰蘭菊異芬胡有廢者英英有蘭孫逖為集賢院修撰宰相蕭嵩㑹百官賦蘭等詩繼雅頌體使逖序養以綺石汗漫録王維貯蕙蘭必黄磁斗養以綺石累年彌盛挿帽曲江春宴録霍定與友生遊曲江以千金求人竊貴矦亭榭中蘭花挿帽兼自持往羅綺叢中賣之士女争買抛擲金錢生谷底蘭生谷底人不鋤李白贈從弟詩至秋色紅李周翰注文選别賦緑艶飛霜早淅瀝緑艶恐休歇李白古風逕蘭銷晚馤韓愈秋雨聯句紫蘭含幽色韋應物詩蘭葳蕤兮紅芳李白賦芳蘭哀自焚同上香風逺蘭秋香風逺同上孤蘭生幽園衆草共蕪没同上煙開蘭葉香風暖李白鸚鵡洲詩水光蘭澤葉李賀一心衰謝如枯蘭李賀開愁歌我甞二十不得意一心衰謝如枯蘭衰蘭送客咸陽道金人辭漢歌衰蘭送客咸陽道天若有情天亦老光風催蘭吹小殿春晝芝十三白彼茁者芝茁出地皃靈芝紫芝九莖一年三秀漢歌漢甘泉宫生芝草九莖連葉乃作芝房之歌以薦郊廟也芝蘭囷蠢生其隈選五芝含秀而晨敷天台山賦車盖之狀煌煌靈芝一年三秀孔孝感李迥秀所居堂産芝草中宗以為孝感芝出北墉賈循母亡將葬芝出北墉以為瑞青芝韓愈進學解赤箭青芝俱收並蓄美瑞又書鳯皇芝草賢愚皆以為美瑞芝生于梁安禄山擊契丹還奏夢李勣李靖求食於臣乃祠北郡芝生于梁紫芝楊炎父䘮廬墓側有紫芝之祥靈芝藩鎮李寳臣既貯異志引妖人為丹書靈芝朱草神芝文粹中宗諡册嘉禾神芝日獻于府屋柱木無故生芝黒為賊黄為喜酉陽雜俎五徳芝如車馬同上菌芝如樓同上黄芝韓思復遷滁州刺史有黄芝五生州署民為刻頌其祥玉芝舊史肅宗延英殿御座梁上生玉芝一莖二花上製靈芝詩蒸出芝菌柳宗元貽蕭俛書使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物雙麟芝杜陽編處士伊祁𤣥解於衣帶間出三年藥實為上種於殿前一曰雙麟芝色褐一莖兩穂隠隠形似麟頭尾悉具其中有子如瑟瑟色如紅玉武宗起望仙臺室中生靈芝二株皆如紅玉螢火芝酉陽雜俎良常山有螢火芝其葉似草實大如豆紫花夜視有光食一枚心中一孔明食至七心七竅洞徹可比夜書形類天尊同上天寳初臨川郡人李嘉允所居柱上生芝草形類天尊太守張景儉截柱獻之石芝得池仙同上羅門山食石芝得池仙瑞芝産廟柱杜詩紫芝曲隠士休歌紫芝曲同上蓮十四白蓮荷芙蕖也其莖茄其葉葭其花菡蓞其實蓮其根藕為衣緝裳楚辭荷為衣兮蕙為帶又緝芙蓉以為裳魚戯蓮葉下古詩龜游龜千歲游於蓮葉上渉江采芙蓉古詩千葉蓮花華山記華山峯上有池池中生千葉蓮花孔蓮華似六郎楊再思張昌宗以姿貌倖再思毎曰人言六郎似蓮花非也正謂蓮花似六郎耳蓮華賦參方本作蓮華賦秋房韓愈議池蓮拆秋房芳敷竟發文粹宋之問秋蓮賦見白露之先降悲紅蕖之已秋昔之菡蓞齊秀芳敷竟發緑蔕青枝縁溝覆池青房圓實張籍採蓮曲青房圎實齊戢戢金蓮華杜陽編滄州金蓮華州人研之如泥竹間彩繪光影煥爛與真金無異但不能入火而已更有莖出其花如蝶毎㣲風則揺蕩如飛婦人競採之以為首飾即語曰不戴金蓮華不得到仙家墮蘂黦顔杜牧晚晴賦復引舟於深灣忽八九之紅芰姹然如婦歛然如女墮蘂黦顔似見放棄分香蓮三堂往事其宅有鈞仙池一種蓮子一歲再結實毎實子十雙其花時香兼桃菊梅英郡人傳分香蓮不論錢睡蓮酉陽雜俎南海有睡蓮夜則花低入水屯田韋郎中從事南海親見玉井蓮太華峯頭玉井蓮開花十丈藕如船冷比霜雪甘比蜜一片入口沈痾痊韓愈古意雙花擢秀連蔕垂芳柳宗元雙蓮表解語花太液池千葉白蓮開帝與妃子共賞指妃謂左右曰何如此解語花出天寳遺事菊十五白菊有黄華季秋盈把晉陶潜九月九日無酒宅邉有叢菊潜摘之盈把望見白衣人至乃王𢎞送酒便醉而歸賜鍾繇魏文帝賜鍾繇菊一束菊花酒費長房謂桓景九月九日可登髙飲菊花酒以消災東籬下秋菊金菊時菊黄菊服花得仙神仙傳康風子服菊花栢實噉乃得仙夕餐秋菊之落英楚辭花似薏以甘苦别之菊甘薏苦孔獻菊花酒稱壽李適秋登慈恩浮圖獻菊花酒稱壽懿此貞色蕭頴士菊榮篇曰豈㣲春華懿此貞色蘭菊異芬見蘭門歌韋綬九月九日帝為黄菊歌示綬青蘂簷前甘菊移時晚青蘂重陽不堪摘杜甫時過菊潭上縱酒無休歇泛此黄金花頽然清歌發李白蕪没湘岸千株菊杜甫在道州手札鮮鮮鮮鮮霜中菊既晚何用好韓文秋懐詩細葉彫輕翠圓花飛碎黄唐太宗詩采采黄金花何由滿衣袖杜甫九日詩紫英黄蕚文粹菊榮篇紫英黄蕚照灼丹墀又舊根新莖布葉垂英又隂槐翳柳邇楹近宇既低其枝又弱其榦愷悌君子佩服攸宜蕭頴士茅十六白苞匭菁茅禹貢荆州貢苞匭菁茅注云匭匝也菁以為菹茅以縮酒野有死麕白茅苞之詩苴土王者建諸侯受之以土苴以白茅三脊王者封禪必須三脊之茅以為藉杜預云江淮之間一茅三􅆃此靈物也連茹拔茅連茹以其彚征吉孔冬蔽武攸緒盤桓龍門少室間冬蔽茅椒類生於澤季全忠有蘆生其室一尺三節問張建建曰蘆茅類生於澤公茅生兆也傳節者其三世乎賦蓑茅牛僧孺為武昌節度使鄂城土惡亟圯歲増築賦蓑茅於民吏倚為擾荒茅夾江荒茅叢竹之間韓愈送區冊序斬茅而嘉樹列宴喜亭記結茅錬金液所期俱卜築結茅錬金液李白涇溪卜築詩茅蒐七千兩歲貢茅蒐七千兩劉禹錫和州刺史壁記茨藉養茅菅以為茨藉文粹君陽遁叟山居記荆之茅皆可以縮柳宗元與崔連州書酌以茅明杜甫太廟賦蓬茅韓愈送文暢師北遊詩萍蘋十七白浮萍緑萍紫萍白蘋青蘋緑蘋崐崘吕氏春秋曰菜之美者崐崘之蘋焉得實楚王渡江得蘋實大如斗赤如日剖而食之甜如蜜薦鬼神傳蘋蘩之菜可以薦鬼神可以羞王公汀洲採白蘋于以採蘋南澗之濵大者蘋小者萍浮水無根濟江得實榖雨之日萍始生禮季春孔萍蓋汙池靜韓愈閒遊詩風約風約半池萍同上芣萊陳藏器云水萍有三種大者曰蘋一名芣萊風有季女之奠文粹李直方白蘋亭記蘋之為用風有季女之奠騷有放臣之望為鴨作茵褥雲林異景誌浮光多美鴨太原少尹樊千里買百隻置後池載數車浮萍入池使為鴨作茵褥琉璃板中貯江水及萍藻魚朝恩宅有洞房四壁大安琉璃板中貯江水及萍藻諸色魚鰕號魚藻洞出南康記組繡一川李華言醫蘋荇荷花組繡一川風水悲流萍劉禹錫送李䇿沈沈水中萍張籍别孟郊水底蘋太原晉祠東有水底蘋不死食之甚美酉陽雜俎夫以澗谿之賤㣲而可充王公之殷薦白蘋亭記桑十八白亳有祥桑榖共生於朝七日大拱夢生井何祗夢桑生井問趙直直曰桒字四十八君壽不過此矣果然餓人傳宣子見靈輒餓於桑下三日矣與簞食食之餘具報徳門終朝採桑不盈一筐贈金魯秋胡贈桑下美人金乃妻也探得金環羊祜叔子五歲時令乳母於東家桑樹中探得金環戴勝降桑三月期我乎桑中詩變海淮南子東海三變于桑田以桑為均月令為桑多則繭多以桑少則繭少無伐桑柘桑之落矣其黄而殞桑之未落其葉沃若桑田説于桑田説勸也南山有桑充養母蔡順採桑椹充養母雉馴魯恭為中牟令雉馴桑下以桑為弧子初生桑間濮上衣食之源蠶月條桑行採秋胡詩五畆之宅隰有起寒煙末光懐我好音衣食之源空桑扶桑桑樞蔽野孔一夕再生賈循母亡將葬宅有枯桑一夕再生人以為瑞紫披襖出汝身五代㑹同二年契丹南掠邢洺磁至于安陽河焚剽殆盡契丹見大桑木罵曰吾知紫披襖出自汝身吾豈容汝活耶束薪於木而焚之桑條歌中宗庶人韋氏太史迦葉志忠表上桑條歌十二篇言后當受命田畆樹桑憲宗元和七年四月癸巳詔民田畆樹桑生石上南詔永昌之西野桑生石上其材上屈南向而下植取以為弓桑䕃不徙尉遲恭賛太宗以赤心付之桑䕃不徙而大功立桑木想雲仙散録常新録裴休得桑木根曰若作沈香想更無異相雖對沈水香反作桑木想終不聞香諸相從心起宅邊青桑葉宛宛野蠶食葉還成繭張籍廢居行扶桑丹椹謝𤣥卿遇神仙設扶桑丹椹續仙傳桑柘葉如雨飛藿共徘徊杜甫昔遊詩舍西柔桑葉可拈漫興詩秦桑低緑枝李白春思蠶眠桑葉稀王維渭川田家桑柘羅平蕪李白得之桑榆吴兢其能直言正諫不避死亡之誅者特加寵榮待以不次則失之東隅冀得之桑榆矣唐史白孔六帖卷一百
