body:
  text: 白孔六帖卷八十八唐白居易原本宋孔傳續撰學校一勸學二同學三師四尊師五善誘六失師道七扑刑八死䘮九從學十詩十一書十二易十三春秋十四書籍十五借書十六學校一白古之教者家有塾黨有庠遂有序國有學槐市杏壇學名子衿刺廢亂世則學不修毁鄉校傳曰鄭人游鄉校以議執政毁鄉校何如子産曰人議善者吾則行之否者吾則改之是吾師也若何毁之開設學校開士林之學小雅盡廢遊講肆入學以齒學不可廢教所由興將崇洙泗之風必立膠庠之學文翁立學漢文翁為蜀郡守及諸郡縣小吏起學宫設官使弟子授業遂變鄒魯之風天下並令立學成均五立學名天子命之教然後為學小學在公宮南之左大學在郊夏后庠序殷瞽宗周頖宮天子立四學周立四郊之養養國老於東郊養庶老於虞庠大學之道在明明徳稷下關西告往知來子貢曰告諸往而知來者大設庠序范寗字武子為豫章太守大設庠序取交州石為磬以革舊制學者千人以私俸給又起學臺不改作而修學晉盧浦字允源為鄱陽内史修庠序祭酒求更起屋行禮浦曰孔子射於矍相之圃而行禮大樹下況今學史序高望顯敞乎避疾後漢魯平字叔陵為相趙王欲移居學舍平諫不聽遂上言詔下詰平平奏曰禮諸矦甍於路寢未有逃避之典學校教化之處不可詔從平言修孔子廟階前除草得璧後漢鍾離意為魯相出私錢付户曹孔訢修孔子廟身入廟拭枕席劔履男子張伯除堂下草得璧七枚伯藏一枚以六白意意啟前甕中丹書云云具璧門注孔學校復興高士廉進益丱長史引諸生講授經義學校復興學堂陳子昻學堂至今猶存韋嗣立上書極陳永淳後庠序隳散胄子衰缺儒學之官輕章句之選弛貴閥後生以徼倖升寒族平流以替業去陛下誠下明詔追三舘生徒敕王公以下子弟一入太學尊師尚儒發揚勸奬海内知鄉然後審畀銓揔各程所能以之臨人則官無曠民樂業矣請廣學校賈至以謂今鄉舉取人未盡請廣學校増國子博士貟十道大州得置大學舘増學廬李栖筠増學廬表宿儒河南禇冲呉何貟等拜學官為之師身執經問義逺邇趍慕至徒數百人興州縣學廬倪若水為汴州刺史増修孔子廟興州縣學廬勸生徒為教誨風化興行修講舍陽嶠修講舍人以為善千二百區劉禹錫甞嘆天下學校廢乃奏記宰相曰言者謂天下少士而不知養才之道大堙不揚貞觀時學舍至千二百區生徒三千餘外夷遣子令入附者五國今室廬圯廢生徒衰少非學官不振病無貲以約也月俸完葺鄭餘慶建言兵興以來學校廢諸生離散今天下承平臣願率文吏月俸百取一以資完葺詔可大起學校李栖筠為常州刺史乃大起學校堂上􅀞孝友傳示諸生為鄉飲酒禮登歌降飲人人知勸督生徒興愷悌韓退之潮州請置鄉校牒以督生徒興愷悌之風刺史出已俸百千以為學本收其贏餘以給學生㕑饌陸䞇八計曰視學校興廢以稽教導四門義學王潮昭宗假潮福建等州團練使乃作四門義學設鄉校常衮始閩人未知學衮至為設鄉校使作為文章親加講導與為客主鈞禮觀㳺燕饗與焉由是俗一變歳貢士與内州等其後閩人春秋配饗衮于學官葺儒宮高承簡拜刺史葺儒宮備俎豆歳時行禮大屋加塗蔇題衡山文宣王廟講堂非褁建大屋加塗蔇杜甫詩鞠為荒圃文粹舒元輿國庠記雖舘千雲合鞠為荒圃邦民之良弁服是纓公躬講講論虔黙以聽栁宗元道州先聖廟碑俾是荒服移為闕里在周則魯侯申能修泮宫詩有其歌在漢蜀守文翁能首儒學史有其賛今公法古之大同于魯化人之艱侔于蜀同上廟舍峻整階序廓大同上薛公祭于先聖然其堂庭庳陋椽梀毁墜曽不及浮圖外説克壯厥居水潦仍至歳加蕩汰公蹙然不寧若罔獲承既祭而出登墉以望爰得羙地豐衍端夷水環以流有泮宮之制是日樹表列位由禮考宜然後節用以制貨財乗時以僦功役逾年而克有成廟舍峻整階序廓大講肄之位師儒之室立廩以周食圃畦以毓蔬權其子母贏且不竭由是邑里之秀民感道懷和更來門下咸願服儒衣冠徴工僦功完舊益新州之廟屋壞㡬毁神位刺史桞宗元始至大懼不任以墜教基丁未奠薦法齊時事禮不克施乃合初亞終獻三官衣布洎于贏財取土木金石徴工僦功完舊益新栁州碑勸學二白敬教勸學衛文公文翁化蜀劉渠起舍劉渠字曼生除新成長告縣曰昔文翁化蜀乃更大造學舍聚生徒也三餘董遇有從學者苦無日遇言以三餘冬歳之餘夜日之餘隂雨月之餘無貟數漢元設博士弟子無致貟數以廣學也公卿子為諸生左雄伯豪奏徴海内名儒為博士公卿子弟為諸生有志操者加其俸禄也别立學舍明帝為功臣子孫别立學選高能以受業自期門羽林之士悉通孝經章句自始亦遣子入學濟濟洋洋莫盛於永平也孔歲饑講學不廢崔從㑹歲饑拾橡實以飯講學不廢賜市書絹隴西恭王驕侈其弟奉慈亦荒縱皆為帝所鄙甞曰吾仇人有善且用之況親戚乎墳典不聞學何以為善哉各賜市書絹二百匹以愧切之然不自克也身為教誨倪若水為汴州刺史勸生徒身為教誨風化興行誘勸後生陽嶠好學善誘勸後生六經法言韋處厚穆宗立為翰林學士處厚以帝冲怠不向學即與路隋合易詩書春秋禮孝經論語掇其粹要題為六經法言二十篇上之兾助省覽帝稱善廣學廬盧鴻至山中廣學廬聚徒至五百人業患不能精無患有司之不明行患不能成無患有司之不公韓愈進學解同學三白有朋自逺方來不亦樂乎儒有合志同方營道同術竝立則樂相下不厭孫臏與龎㳙俱學兵法事魏惠王為將軍龎㳙以能不及臏以法斷兩足臏之齊後伐魏殺㳙史記蘇秦張儀俱事鬼谷先生同硯席書漢宣帝與張彭祖云云收斂後漢戴封同學石敬之卒封收斂送䘮到其家其家見平生書物皆在棺中大異之吊同門生王丹有同門生遭䘮子請吊丹撻之令遺縑而已割席魏管寧與革歆同學聞門外車馬聲歆出觀之寧割席曰子非我友獨學無友則孤陋而寡聞遜友視志敬業樂羣索居離羣莊子妸荷甘與神農俱學於老龍吉神農隱几闔戸晝瞑妸荷甘日中奓戶而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰知子僻陋漫誕故棄子也孔同學相愛許紹父法光為刺史元皇帝為安州撫管紹時為兒與高祖同學相愛也講徳討儒君昔與余講徳討儒時中之奥希聖為徒吕衡州誄栁文遭時致力必濟謨庸文粹司空圖三賢賛隋大業間房公李公魏公同師文中子甞謂其徒曰𤣥齡也志而宻靖也惠而斷徴也直而遂俾其遭時致力必濟謨庸賛曰三賢志同夙尚儒風以植公忠出遇太宗師四白我師三人同行必得我師吾師子産曰是吾師主善子曰徳無常師主善為師吾道鄭𤣥字康成初事馬融學解歸北海融曰鄭生今去吾道東矣教學相長親師安其業而親其師人師然後可以為人師擇師不可不慎肄業習也無犯顔而諫無隱隱過失也就養無方洙泗之間西河之上曾子謂子夏曰吾與汝事夫子於洙泗之間退而老於西河之上使民疑也青衿胄子絳紗宋宣文君立講堂生徒隔絳紗幔受業不見靣董仲舒下帷讀書弟子以相次受或不見其靣也五經笥邉孝先荅弟子嘲曰腹便便五經笥請益無倦胄筵講肆絶帳發矇童蒙求我周禮太宰以九兩繫國民三曰師以賢得民能自得師者王自行束修以上吾未甞無誨焉從吾所好既多知十之賢博我以文必重在三之義杏壇講論槐市請師門人門生弟子當仁不讓於師教然後知因師貴自彊道宜馴致茍誨而不倦則教所由興示以一隅教其四失始發蒙以求我終論道而起予拳拳服膺聖人無常師師無當於五服弗得不親禮接待張禹字子文弟子彭宣恭儉有法度戴崇愷悌多智禹受業愛崇而敬宣崇候禹將入後堂燕飲昬夜極樂宣之來便坐講論經義日晏賜食不過一肉巵酒兩人皆自得也救師魏揚政從范叔受易权為出妻告繫獄政以箭貫耳抱叔子㐲道側訟叔帝感曰乞賜揚生師也質疑其勤學門少學徒董遇善左傳更為作宋墨别墨有從學遇不肯教謂之曰必當先讀百徧而義自見於是生徒少從遇學無為朱墨也不求資邴原年十一䘮父家貧隣有書舎原過之必泣其師問之曰何泣原曰孤者易傷貧者易感夫學者必有父兄羡其不孤而得學師感之曰欲學何書原曰無錢資師曰茍有志徒相教不求資遂從學也不往教孫寶字子嚴御史大夫張忠欲令授子經乃為除舎寶遂去忠遂署為主簿以屈之寶曰君男欲學而移寶自近禮有來學無往教道不可屈屈身何傷且不遇者無所不為況主簿乎忠聞之大慙遂薦寳又包咸字子良太守黄讜署户曹欲召咸入授其子咸曰學無往教讜遂遣子就師公超市張楷字公超隱居學道者從之所在成市今華隂山南有公超市擬十哲晉文立字廣休事譙周周門人以立為顔回陳受字季虔為子夏羅憲為子貢連坐樂恢字伯奇事焦永為河東守隨之官閉廬讀誦不交人物後永被考諸弟子以關通被繫恢獨皎然不千法也追訟罪鄭𢎞字巨君師焦貺楚王英反引貺貺被收疾病於道亡殁妻子禁制獄諸生懼連乃皆變姓名逃罪𢎞獨髠頭負鑕訟貺罪顯宗赦其家𢎞躬送貺䘮及妻子還鄉里舉羣盜漢叔孫通無所言皆進故羣盗弟子或竊言曰數歳事先生今不能進專言大滑何也通曰漢王方蒙矢石諸生寧能闘乎乃薦之自表連罪李膺以黨錮死獄中門生故吏並被禁侍御史景毅子峴為膺門徒而未有牒録故不及譴毅曰謂膺賢遣子師之遂自表以免歸請罪人晉嵇康將刑東市學生三千人上書請為師帝不許不薦弟子孔光為三公弟子多就見師居位幾得其助光終無所薦舉至有怨者其公如此又後漢魯恭仲康在公位選羣高弟至郡守者數十人而其耆舊大生或不蒙薦舉有怨者恭聞之曰學之不講是吾憂也諸生不有鄉薦者終無言也免門生役王襃字偉元門人為縣役襃不囑縣令乃歩擔乾飯立路旁磬折云云門生為役故來送令即放之孔以師自居王珪兼魏王泰師王見之為先拜珪亦以師自居起學廬講授袁滋彊學博記少依道州刺史元結讀書自解其義結重之後客荆郢間起學廬講授文章老李嶠為文章老宿一時學者取法焉栁宗元徙栁州刺史南方為進士者千數千里從宗元逰經指授者為文辭皆有法來學者跡接于道陽城逺近慕其行來學者跡接于道不拒曲士出為道州刺史太學諸生二百人請留城栁宗元聞之遺何蕃等書曰俞扁之門不拒病夫繩墨之側不拒散財師儒之席不拒曲士翼贊一人張後􅉙髙祖鎮太原引為客以經授秦王太宗即位賜燕月池帝從容曰今日弟子何如􅉙曰昔孔子門人三千逹者無子男之位臣翼賛一人乃王天下計臣之功過於先聖帝為之笑講授諸生李善坐與賀蘭敏之善流姚州遇赦還居汴鄭間講授諸生四逺至傳其業號文選學矮國願得為師蕭頴士矮國遣使入朝自陳國人願得蕭夫子為師者中書舎人張漸等諌不可而止表宿儒河南禇冲呉何貟等起拜學官為之師身執經問義逺邇趍慕至徒數百人李栖筠傳受業解惑古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣韓昌黎文師説聖人無常師孔子師萇洪師㐮老聃郯子之徒其賢不及孔子故弟子不必不如師通其業成就其道徳古之學者必有師所以通其業成就其道徳由漢自來師道日微取揆宏襟詢謀逹識韓休蘇頲集序拘戈考篆魯鼎看銘書有亡篋文稱墜簡疑絳老之年走朝有門卜晉侯之􅔂訪史莫知莫不取揆宏襟詢謀逹識使自直之箭則百代無一矢俟自圓之木則千載無一輪執矯揉之噐有視之灌藂無非良材耳夢得文今之世為人師者衆笑之舉世不師故道益離吾欲從師可從者誰舉世笑之栁宗元師友箴病不喜閙豈可使呶呶者早暮咈吾耳騷吾心則固僵什煩憒愈不可過矣栁宗元荅韋中立書取其實而去其名無招越蜀吠怪同上由魏晉以下人益不事師今之世不聞有師有輒譁笑以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顔而為師世果羣怪􅀢罵指目牽引而憎與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南常雨少日日出則犬吠予以為過言僕來南冬幸大雪踰嶺被南越中數州之犬皆蒼黄吠噬狂走者累日今韓愈既自以為蜀之日吾子又欲使吾為越之雪不亦病乎誰敢衒怪於羣目以召閙取怒乎同上荅韋中立書獨欠為人師平居望外遭齒舌不少獨欠為人師耳同上巫醫樂師百工之人不恥相師韓文師說巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官大則近䛕嗚呼師道之不復可知矣言道講古窮文辭以為師栁宗元荅嚴厚輿書馬融鄭𤣥者二子獨章句師耳今世固不少章句師僕幸非其人吾子欲之其有樂而望吾子者矣言道講古窮文辭以為師則固吾屬事僕才能勇敢不如韓退之故又不為人師人之所見有同異吾子無以韓責我若曰僕拒千百人又非也僕之所拒拒為師弟子名而不敢當其禮者也若言道講古窮文辭有來問我者吾豈常嗔目閉口邪三年國子師腸肚集藜莧韓愈詩學生謁師䞇用腶脩一束酒一壺衫布一裁色如師所服師出中門延入與坐割修􅝥酒三爵止乃發篋出經摳衣前請師為說經大略然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬省月試時考歲貢唐埽崇敬傳尊師五白敬業敬道嚴師敬學無北靣太學之禮雖詔於天子無北靣所以尊師也請業則起請益則起漢尊桓榮而設几後漢明帝尊桓榮以師禮上幸太常府令榮坐東靣設几燕敬鄒子而築宫史鄒衍如燕昭王擁彗請列弟子而受業築碣石宫而親事之禮聞來學不聞往教王者化人義存敬學生徒肄業禮必尊師茍匪師嚴則為儒戱經國化人學實為本嚴師敬業教所由興摳衣函丈于定國為廷尉迎師受春秋身執經北靣備弟子禮孔著九經師授譜韋表㣲以學者薄師道不如聲樂牋工能尊其師著九經師授譜詆其違超僕以宗師之位栁宗元荅蕭纂求書祝以高文開其知思又超僕以宗師之位貸僕以邱山之號尊尚師儒韋嗣立上書榎楚廢弛尊嚴而威栁宗元陽城碣雖自君恩亦因儒訓前試宣州溧水縣尉胡震博通六經華皓一志家在海郡筋力未衰臣童㓜之時胡震受業豈謂年逾四紀位列三公雖自君恩亦因儒訓㐲以元和二年前揚州士曹參軍薛𤣥造縁與臣亡父先授經具表論薦憲宗授越州諸暨縣令臣幸因家門舊事輙敢薦聞伏希聖慈特授浙東管内官異臣報其舊恩獲繼先志既顯華門之士實為儒者之榮奉宣卿官至將相不忘本師朕深所嘉嘆宜依所奏賛皇一品制集順宗重師傅見輒先拜唐本紀兼魏王師王見之為先拜珪亦以師自居王珪唐史豈不能正平公之坐敬養亥唐屈文矦之膝恭師子夏文粹杜之松荅王績書道既知尊榮何足恃同上官守有限就學無因延頸下風我勞何極誠恐燉煌孝亷檢對書而不出酒泉太守列鐘鼔而不迷同上善誘六白存心時觀而不語存其心也使之悱悱憤憤然後啟發救失學者有四失敎者必知之人之學也或失則多或失則易或失則止此者心之莫同也知其心然後能救其失也善教者使人繼其志善學者師逸而功倍善待問者如撞鐘叩之以大者大鳴叩之小者小鳴温故而知新可以為師矣循循善誘夫子循循然善誘人憤啟悱發一隅子曰舉一隅不以三隅反則不復也教誨不倦日長𫝊習教授討論日就月將𫝊先儒之訓為後學之宗善道欲罷不能夫子循循善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾人能𢎞道師貴受方教所由興學而不厭師能善道人欲發曚喻所由誠由用也長善善誘人孔易道難為性教貴受方師過而商不及俱未得中求退而由兼人各宜救失能博喻然後能為師自彊不息克勤無怠激勸犯法者後漢郭林宗左原為郡學生犯法見斥林宗遇於路乃設酒肴以慰之人譏林宗不絶惡人林宗曰人而不仁疾之已甚亂也原後結客報諸生值林宗在學愧負前言遂罷去人乃服其知識孔魏王師王珪兼魏王師王曰願聞所習珪曰漢東平王蒼稱為善最樂願王志之帝聞喜曰兒可以無過矣講教生徒張鎰為濠州刺史政條清簡延經術士講教生徒比去州升明經者四十人獲趨門館荷深仁于哲匠文粹劉太真上楊相公啟又念頃日曽霑引問擊蒙而甞失所對獲趨門館荷深仁于哲匠被君子之善誘雖其頑魯或有庻幾之道焉劉贊父玭為縣令贊始就學衣以青布襂襦每食則玭自食肉而别以蔬食食賛於牀下謂之曰肉食君之祿也爾欲之則勤學問以干禄吾肉非爾之食也由是賛益力學舉進士五代史叔達亡國之餘幸頼前烈有隋之末濫尸貴郡因霑善誘頗識大方文粹陳叔達書建中貞元時文思崛興遂大振耀㑹故相常衮來為福建觀察使有文章高名又性頗嗜誘進微生推抜寒素中唯恐不及至之日比君為芝英每有一作屢加賞進逰娱燕饗必召同席君之聲漸騰於江淮且逹京師矣毆陽詹集序失師道七白教然後知困佔畢佔視也畢簡也謂多其問難隱學疾師教之不誠使人不由其誠教人不盡其材由用也材道也以我為隱乎吾無隱乎爾施悖求佛言教者亦言非則學者失問教之所由廢師勤而功半不善問者云逆師廢學不閑於教訓傳化而成俗孝則為先師或非人教所由廢記問之學不足以為人師嘲詠邉韶事見廢墯門相非夏侯勝從兄子建師事勝勝非之曰建所為章句小儒破碎大道建亦非勝為學䟽略難以應敵孔無所從學唐韓愈潮州請置鄉校牒刺史縣令不躬為之師里閭後生無所從學爾倚席唐文粹博士有倚席之譏請崇國學䟽李絳居其位者不愧其道足下出文閫為諸生之蓍龜作後來之綿蕝得不思其居其位者不愧其道處于職者不墮其業乎否則市大易負乘之譏招詩人伐檀之刺矣移成均博士書皮日休日戒其屬月勵其徒嗚呼西域氏之教其徒日以講習決釋其法為事吾之視太學又足為西域氏之羞矣奚不日戒其屬月勵其徒年持六籍日决百氏俾諸生於聖典也洞知大曉同上扑刑八白扑作教刑檟楚二物收威也二者荆類扑建也收者歛也禮記孔榎楚之政栁宗元四門記四門學之制助教之職佐博士以掌榎楚之政分其人而教育之不率教者檟楚之歸崇敬抵生徒及第多少為博士考課上下有不率教者檟楚之督以鞭楚陽嶠為國子祭酒生徒㳺墮者至督以鞭楚人怨之乗夜毆嶠劉知幾年十二父藏器為授古文尚書業不進父怒楚督之唐史廢業怠教者寘之以刑自然儒雅日興典墳日重先生之道日盛太學之訓日崇李絳請崇國學䟽死䘮九白事師左右就養無方方常也服勤至死心䘮三年哭寢師吾哭諸寢無服孔子䘮門人疑所服子貢曰昔者夫子之䘮顔回若䘮子而無服䘮子路亦然請䘮夫子若䘮父而無服視猶父也回也視予猶父也予不得視猶子也孔子之䘮二三子皆絰而出天䘮予顔淵死子曰天䘮予哭於廟門哭師云云負土成墳後漢桓榮字春卿事九江朱普普卒榮乃奔䘮負土成墳素服夏侯勝授太后尚書及卒太后素服以報師傅之恩子路死夫子哭之於中庭既哭進使者而問故使者曰醢之矣服斬郭禹師郭荷荷卒曰五服之師者重服聖人嫌也遂服斬居廬羣居則絰出則否廬冢六年史孔子䘮弟子三年䘮畢唯子貢廬墓六年而去思慕孔子卒弟子思慕以有若似孔子相與立為師以事如孔子議服晉禮志曰古無師制新禮齊衰三年摰虞議宜依舊無服詔從之其萎梁木其壊哲人其萎吾將安放夢奠子曰予疇昔之夜夢坐奠於両楹之間子哭之慟吊服加麻棄官行服魏王朗師楊賜賜卒云云孔子廟藏孔子衣冠琴書至漢二百餘年不絶孔門人行䘮王義方既死門人貟半千何彦先行䘮蒔松栢墓側三年乃去弟子共葬之啖助傳施士匄呉人兼善左氏春秋以二經教授由四門助教為博士秩滿當去諸生封䟽乞留凡十九年卒于官弟子共葬之葬之日自逺至者幾千人江夢孫集門生弟子說釋經義卒時年八十五葬之日自逺方至者幾千人而服縗絰時跣者百許江南野史從學十白來學鼔篋負笈摳衣虛往實來莊子行不言之教善問者如攻堅木先其易者後其節目不善者反此蟻術蟻子時術之言蟻蟲時術其功乃大學歩莊子壽陵餘子學歩邯鄲失其故歩匍匐而歸青出於藍而青於藍氷生於水而寒於水百徧有從董遇學者曰必先讀百徧其義自見犯夜晉王承為東海吏錄一犯夜人來云從師不覺日暮承曰鞭撻寗越以立威名恐非正化之本遣吏送歸家告往知來賜也始可與言詩已矣絶問後漢趙偉字君長耻於厮役遂弃車馬詣資中杜撫授書二十年絶問家為發䘮制服撫後乃歸遁去范丹字史雲為小吏恥之乃遁去受學於樊英又就馬融學也東家丘鄭邴原字根矩欲遊學詣孫崧崧曰君鄉里鄭君學覽古今博聞多識而君捨之履千里所謂鄭為東家丘也原曰人各有志或登山採玉或入海求珠豈可謂登山者不知海之深也先生謂僕以鄭為東家丘亦以僕為西家愚人崧辭謝之稱官求學應劭造鄭𤣥曰故太守應仲逺北靣稱弟子如何𤣥嘆曰仲尼之門考以四科回賜之徒不稱官閥劭大慙孔從外家學蔣乂㓜從外家學得其書博覽強記逮冠該綜羣籍翺籍相上下近李翺從僕學文頗有所得然其人家貧多事未能卒其業有張籍者年長於翺而亦學於僕其文與翺相上下一二年業之庶幾至乎至也韓愈與馮宿書無限其門文粹林簡言上韓吏部書人有儒其業與孟軻同代而生不遂師於軻不得聞乎道閤下豈不謂之惜乎去人夫子千有餘載孟軻揚雄死今得聖人之㫖能傳說聖之道閤下耳今人睎閤下之門孟軻揚雄之門也閤下無限其道為異代惜焉問文章為事韓愈荅竇存亮書今乃乗不測之舟入無人之地以相從問文章為事身勤而事左辭重而請約非許之得也詩十一白詩序曰正得失動天地感鬼神者莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風俗六義一曰風二曰賦三曰比四曰興五曰雅六曰頌四始刪詩為三百篇温柔敦厚詩教也温柔敦厚而不愚則深於詩也不學詩無以言鯉退而學詩牆靣而立子謂伯魚曰人而不為周南召南其猶正牆靣而立小子何莫學夫詩詩可以觀可以興可以羣可以怨多識於鳥獸草木之名雅言詩書執禮皆雅言也義府詩書義之府思無邪詩三百一言以蔽之曰思無邪起予者商也始可與言詩已矣王澤竭而詩不作文選成康没而頌聲寢云云夫子自衛反魯然後樂正雅頌各得其所興於詩修身當先學詩也小雅盡廢則四夷交侵中國微矣刪以煩文孔子詳其大義毛萇若過庭之子不學風雅之言則入國之人焉知敦厚之教子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為民風命太史陳詩以觀民風陳詩謂採詩以觀之唐虞之代教在修文殷周之時學難廢業採周之舊反魯而制冬夏教以詩書書屬禮禮隂也故以屬冬詩屬樂樂陽也故以屬夏春誦月將夏弦以􅁝播樂章義則有六詩有六義學而肄三肄習也三謂小雅三章鹿鳴四牡皇皇者華不學博依不能安詩博依廣博興喻也分為四藝文志仲尼没而微言絶七十弟子䘮而大義乖故詩分為四注云謂毛齊韓魯也習奉曰詩有五際君臣父子兄弟夫婦朋友又詩内傳曰卯酉午戌亥解頥匡說詩解人頥牆靣見上孔馬周嗜學善詩誦鹿鳴蟋蟀山惲中宗昵宴近臣詔徧為技山惲奏無所習惟知誦詩乃誦鹿鳴蟋蟀二篇未畢中書令李嶠以其近規諷止之帝嘉其直下詔賜服一稱獻詩纂義許叔牙於詩禮尤􅃉獻詩纂義十篇詩正而葩韓愈進學解曰詩正而葩詩有魯逹徐曠傳時許善心薦曠及魯逹爲學官時稱詩有魯連皆一時冠詩以紀興衰誦嘆六典書十二白義府趙衰曰郤縠敦詩書詩書義之府也雅言見上孔子曰入其國其教可知也其為人也䟽通知逺而不誣則深於書者也禮上古之書謂之尚書虞夏商周之書典謨訓誥誓命之文雅誥奥義百篇之義歴代寳之以為大訓上世帝王遺書足以垂世立教藏於屋壁魯恭王時嘗欲以孔子宅為宫得古文虞夏商周之書伏生傳授漢濟南伏生年過九十失其本經口以傳授孔子訓傳孔安國作傳其序曰研精覃思博考經籍反魯之刪仲尼自衛反魯書暴秦之剗秦剗古文藏之書府治以學官文之將䘮焚棄於秦坑道之既行啓發於魯壁羲軒之化必在修文虞夏之書所宜立學臯陶之謨周公之誥蜀志或怪諸葛亮文彩不豔而過丁寧周至時議以臯陶大賢周公聖人考之尚書臯陶之謨略而雅周公之誥煩而悉則臯陶與舜禹談周公與羣臣誓故也亮所與言盡衆人凡士故其文㫖不得遂志也古文後漢杜林字伯山於西州得陳書古文尚書一卷常愛之衛宏徐巡皆受林學士古文示人曰林離流兵亂常恐此經將絶何意衛子餘生復能傳之是斯道竟不墜地古文雖不合時務然禮失求之於野古文不猶愈於野乎願生無悔所學古文遂傳於世孔王審邽通書讀湯誓高定七嵗讀尚書至湯誓跪問郢曰奈何以臣伐君郢曰應天順人何云伐耶對曰用命賞于祖不用命戮于社是順人乎郢異之世重其早慧本之書以求其質栁宗元荅韋中立書本之書以求其質此吾所以取道之原也改頗為陂唐𤣥宗詔典謨既作雖曰不刋文字或訛豈必相襲朕聽政之暇乙夜觀書匪徒說於微言實欲暢於精理每讀古書洪範至無偏無頗遵王之路三復斯文並皆協韻唯頗一字實則不倫又周易泰卦中無平不陂釋文陂字亦有頗音陂之與頗訓詁無别為陂則文亦㑹意為頗則聲不成文應由煨燼之餘簡編墜缺傳授之餘差舛相仍原始要終須有刋革朕雖先覺兼訪諸儒僉以為然終非獨斷宜改頗字為陂仍宣示國學糾謬王元感撰書糾謬詆先儒同異易十三白畫八卦古者伏羲氏始畫八卦九聖之微言自伏羲至孔子八索八卦之説謂之八索求其義也又仲尼讚易道以黜八索絜静精微易教也易之失賊知周公之德傳曰韓宣子觀書太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也易象與周公所作彖辭也故云乃知周公之徳六爻之變三絶之勤孔子讀易韋編三絶斷志子曰昔者聖人之作易也建隂陽天地之情位以為易雖有明智之心進必斷其志焉孔子曰加我數年五十而學易知命之年乃讀至命之書窮理盡性以至於命鉤深索隱通幽洞𤣥𤣥奥之言精㣲之義易與天地準下學上逹上天知命頥天地之奥知鬼神之情讚以微言仲尼詳其大義輔嗣以斷天下之疑知性命之理彰往考來設卦明象觀爻立辭撮造化之樞逹剛柔之變羲文之易文選孔七十六家藝文志易類七十六家六百六十五卷縣解尹知章覃思經術於易尤縣解佗書罕讀王績字無功以周易老莊置牀頭佗書罕讀也著大易張志知著大易十五篇其卦三百六十有五為一時冠易有陸徳明為一時冠膚末於學栁宗元與劉禹錫書見興董生論周易九六義取老而變以為畢中和承一行僧得此説異孔頴逹䟽而以為新奇彼畢子董子何膚末於學而遽云云春秋十四白魯史春秋者魯史記之名晉乘晉謂之乘撥亂反正莫近於春秋獲麟之史春秋感麟而作故絶筆於獲麟之一句記事繫年記事者以事繫日以日繫月以月繫時以時係年所以紀逺近别同異也屬辭比事春秋教也不刋之書以一字為襃貶春秋之稱微而顯志而晦宛而成章盡而不汙懲惡而勸善非聖人孰能修之筆削史記仲尼筆削春秋游夏之徒不能措一辭知丘子曰後世知丘者以春秋罪丘者亦以春秋立一王之法周禮盡在見易門注善志志記也春秋善記事也經國之典帝王之准式經者夫子之文章傳者邱明之善志子夏不能措辭見上元凱猶其成癖杜預有春秋之癖藏之書府講以學官仲尼明周公之志傳序曰蓋周公之志仲尼從而明之丘明授夫子之經序曰左邱明授經於仲尼周禮小史掌邦國之志即序所謂諸矦各有國史分為五漢藝文志云仲尼沒而㣲言絶七十子䘮而大義乖故春秋分為五注謂左氏公羊榖梁鄒氏郟氏三傳異同後漢何休著公羊墨守左氏膏肓榖梁廢疾鄭𤣥乃發墨守鍼膏肓起廢疾休見嘆曰康成入吾室操吾戈矛以伐我春秋調人晉劉延以春秋一經而三家殊塗諸儒是非反為讐敵乃思一家之異合而通之以周禮有和怨調人之官遂作春秋調人七萬餘言論其首尾使大義無相乖有不可合者攀長短以通名也立博士劉歆字子駿上䟽請立左氏博士下議范叔超曰左氏不祖孔子而出邱明師徒相傳又無其文非先帝所道無因得立上䟽論陳元上䟽陛下知丘明至寳親受孔子而公羊榖梁傳聞於後故立左氏博士詢可否此聖人得人之謙示不專已盡之羣下也論者沉溺所習玩守舊聞左氏孤學少與遂為墨家所排之公羊爭長嚴翰公仲善公羊鍾繇好左氏為太官㕑謂公羊為賣餅人家數與翰㑹辨析長短繇機㨗翰訥口時屈無以應繇曰公羊高竟服邱明矣翰曰直故吏為邱明公服耳公羊未肯也孔實辭孔子作春秋以一王法記言事以為襃貶盡聞見以為實辭舉凡例以為異同振滯王元感撰春秋振滯等數十篇魏知古見其書歎曰五經指南也敗績武平一初崔日用自言明左氏春秋諸矦官族它日學士大集日用折平一曰君文章固耐久若言經則敗績矣著通例及天文事序議韓滉善治春秋著通例及天文事序議各一篇袁滋能為春秋嘗以劉惲悲甘陵賦褒善斥惡戾春秋指然其文不可廢乃著後序著三傳揔例韋表微尤好春秋病諸儒執一槩是非紛然著三傳揔例完㑹經趣外傳劉貺以竹書紀年序諸矦列㑹皆舉諡後人追修非當時正史如齊人殱于遂鄭弃其師皆孔子新意師春一篇録卜筮事與左氏合知按春秋經傳而為也因著外傳于休烈吐蕃金城公主請文籍𤣥宗詔秘書寫賜休烈上䟽曰若陛下慮其失情示不得已請去春秋當周徳既衰諸矦盛强征伐競興情偽於是乎生變詐於是乎起有以臣召君取威定覇之事誠與國之患也樊澤著春秋傳彭玗通左氏春秋王審邽通春秋朱子奢貞觀初高麗百濟同伐新羅連年病兵不解帝假子奢侍郎持節諭㫖至其國為發春秋題納其美女帝責違旨而猶愛其才集傳啖助善為春秋考三家短長縫綻漏闕號集傳凣十年乃成復攝其綱條為例統可讀施士匄撰春秋傳未甚傳後文宗喜經術李石因言士匄春秋可讀凡史氏褒貶大法春秋已備之矣孔子聖人作春秋辱於魯衛陳宋齊楚卒不遇而死韓文論史書非聖人之作春秋周室卑而諸矦僣矣文粹常仲孺文宣王廟記著後梁春秋蔡允恭記諸侯戰争之事五代敬翔太祖問曰聞子讀春秋春秋所記何等事翔曰記諸侯戰争之事耳太祖曰其用兵之法可以為吾用乎翔曰兵者應變出竒以取勝春秋古法不可用於今太祖大喜三代聖王死其道盡留於春秋文粹劉軻與焉植書自洙泗渡于淮逹于江浮滄濵抵羅浮始得師于夀春楊生楊生以傳書為道者也始則三代聖王死其道盡留於春秋紀事文粹陸龜蒙春秋者紀事之史憑私臆決啖助摭訥三家不本所承自用名學尊之曰孔子意徒令後生穿鑿詭辨詬前人捨成説自為紛紜左氏有文逺徐曠字文逺幽厲雖衰雅未為風逮平王之東人習餘化啖助幽厲雖衰雅未為風逮平王之東人習餘化茍有善惡當以周法正之故斷自平王之季以隠公為始所以拯薄勉善救周之弊革禮之失書籍十五白五車莊子曰惠施其書五車羣書班游受詔進讀羣書閱市王充貧無書游洛陽市閱所賣書一見必誦遂通百家文史溢几篋張華字茂先雅愛書籍身死日無餘財唯文史溢几篋嘗徙居載書三十車秘書監虞志撰定書皆資華本取定孔以墜鬻為不孝戒子孫杜兼家聚書至萬卷署其末以墜鬻為不孝戒子孫數車李襲譽以餘資寫書罷揚州書遂數車載好書矦君集本以行伍奮不知學後貴益自喜好書校集秘書魏證奏引諸儒校集秘書國家圖籍粲然完整聚書至二萬卷蘓弁聚書至二萬卷手自言定當時稱與秘府埒本傳不減秘府王方慶家聚書多不減秘府令狐徳棻贊曰典章圖史有國者尤急所以考存亡成敗陳諸前而為之戒方天下初定徳棻首發其義而後唐之文物粲然誠知治之本歟求天下遺書令狐徳棻大亂後經籍亡散秘書湮缺徳棻始請帝重購求天下遺書置吏補録不數年圖典略備手寫書百卷李大亮在越州手冩書數百卷及去留都督署吐蕃請文籍四種于休烈吐蕃金城公主請文集四種𤣥宗詔秘書冩賜休烈上䟽吐蕃之性慓悍果決善學不回若逹於書則知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於春秋則知用師詭詐之計深於文則知往來書檄之制此何異假㓂兵資盗粮也一書進官一資於時經大盜後史籍燔缺休烈奏請下御史覈史館所由購府縣有得者許上送官一書進官一資一篇絹十疋几數月止獲一二篇讎定羣書王珪父顗隋開皇十三年召入秘書内省讎定羣書自寫筆不釋手張文􅀈自寫筆不釋手子弟諫止曰吾好此不為倦侔秘府張𢎞靖家聚書侔秘府以古文字參定同異韓王元嘉藏書至萬卷皆以古文字參定同異文句詳正宗室沖譔時籍没者衆惟沖譔家書為多皆文句詳正秘府所不及開陳經書王義方為吉安丞吉安介蠻夷梗悍不馴義方召首領稍選生徒為開陳經書左右圖史楊綰獨處一室左右圖史賜書栁宗元貽京兆尹許孟容書曰家有賜書三千卷尚在善和里舊宅宅今三易王書存亡不可知熟誦乃録陸龜蒙得書熟誦乃録讐比勤勤朱黄不去手所藏雖少其精皆可傳四庫完治禇無量初内府舊書自高宗時藏宫中甲乙叢倒無量建請繕錄補第以廣秘籍天子詔於東都乾元殿東廟部彚整比無量為之使因表盧僎陸去泰王檡從徐楚壁分部讐定衛尉設次光祿給食又詔秘書省司經局昭文崇文二舘更相檢讐采天下遺書以益闕文不數年四庫完治帝詔羣臣觀書賜無量等帛追紬故書鄭虔為博士初虔追紬故書可誌者得四十餘篇括遺書蕭穎士奉使括遺書趙衛間淹久不報為有司劾免藏家書於箕潁間安禄山反潁士因藏家書於箕潁間身走山南唐元宗置集賢院部分典籍乾文殿博覽羣書至六萬卷經籍大備又稱開元焉炱朽蟫斷籖秩紛舛焉懐素有詔句校秘書是時文籍盈漫皆炱朽蟫斷籖秩紛舛懐素建白願下紫㣲黄門召宿學巨儒就校繆缺又言自齊以前舊籍王儉七志已詳請采近書篇目及前志遺者續儉志以藏秘府詔可聚書為樂翟光鄴日與賔客飲酒聚書為樂竒篇秘籍段成式多竒篇秘籍取民藏書獻董昌僖宗始還京師昌取越民裴氏藏書獻之補秘書之亡家藏書至萬五千卷蔣乂起文思殿前蜀王建起文思殿以清資五品正員官購羣書以實之縹帙李白詩林軸麗麗來鵠讀鬼谷子其天下之書則墻褰整林軸麗麗斯可謂教導之備者也年代浸逺謬誤滋多文粹李陽氷論古篆書孔壁遺文汲冡舊簡年代浸逺謬誤滋多黄墨精謹韋述蓄書二萬卷皆手校定黄墨精謹内秘書不逮也鄴矦家多書挿架三萬軸一一懸牙籖新若手未觸韓愈送諸葛詩數車韋述元行冲為時儒宗常載書數車自隨家有書至萬卷世號李書樓李蹊藏書之盛莫盛於開元其著録者五萬三千九百一十五卷而唐之學者自為之書者又二萬八千四百六十九卷嗚呼可謂盛矣軸𢃄籖帙两都聚書四部以甲乙丙丁為次列經史子集四庫其本有正有副軸帶籖帙皆異色以别之四部書景龍文舘記薛稷知集庫馬懐素知經庫沈佺期知史庫武平一知子庫謂之四部書乙夜觀書唐文皇帝每視朝後即閱羣書嘗謂左右曰若不甲夜觀事乙夜觀書何以為人君也洋洋滿車好古書百家言洋洋滿車行則與俱止則相對積為義府溢為髙文栁子愛古書樂而成之吾嘗病其畔散不属欲采此義幸吾弟宗直愛古書樂而成之搜討磔裂攟摭融結離而同之與類推移不易時月而咸得從其條貫森然炳然若開羣玉之府指撝聮累圭璋琮璜之状各有列位不失其序栁宗元文字魯恭留杜詩家有書萬卷所藏必三本栁仲郢家有書萬卷所藏必三本上者貯庫其副常所閱下者幼學焉隋平之後經籍漸備大唐平王世充收其圖書泝河西上多有漂没存者猶八萬自是圖籍在秘書𢎞文舘集仙所寫皆御本也書有四部一曰甲為經二曰乙為史三曰丙為子四曰丁為集故分為四庫毎庫二人知寫書出納名目次序以備檢討焉四庫之書两京各一本共一十二萬五千九百六十卷皆以益州麻紙寫其經庫書綠鈿白牙軸黄帶紅牙籖史庫書鈿青牙軸縹帶綠牙籖子庫書雕紫檀軸紫帶碧牙籖集庫書綠牙軸朱帶白牙籖以分别六典藏書聞禹穴杜甫秦州雜詩黄卷真如律同上呈嚴鄭公借書十六白桓生欲借班嗣書班游受詔進讀羣書上器其能賜以秘書之副游生穉穉生彪彪與從兄嗣共游學家有賜書桓生借其書嗣報曰吾子已貫仁義之羈糾何不用大道昔有學歩邯鄲失其故歩匍匐而歸恐似此故不進之嗣貴老莊故云云桓生譚也好寫留本漢河間獻王從民約借善書必為好寫之留其真本加金帛賜以招之由是四方不逺千里或有先祖舊書必奉以獻之從帝借書晉皇甫謐從晉武借書帝載一車而賜之不借蜀志許慈與胡替為博士更相克伐分争書籍有無皆不相通借也孔篇帙壊舛必為輯禠陸龜蒙借人書篇帙壊亂必為輯禠刋正假異書五代四夷録元欲知書自契丹歸中國載書數千卷樞密使趙延壽每假其異書醫經皆中國所無者束修投羊唐餘録倪若水藏書甚多列架不足疉窻安置不見天日子弟直曰看書借書者先束修投羊借人編簡壊者緝之文字繆誤者刋之笠澤叢書借御書讀唐舊史李敬𤣥高宗在東宫馬周啓薦之召入崇賢舘兼預侍讀仍借御書讀之白孔六帖卷八十八
