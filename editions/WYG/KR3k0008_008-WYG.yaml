body:
  text: 白孔六帖卷八唐白居易原本宋孔傳續撰金一銅二錢三貨財四錦五絲六織績七絹八緜九素十帛十一練十二綃十三綺十四羅十五布十六綾十七絺綌十八麻十九縠二十金一白兼金金價倍也雙南金淮南有金備六府而惟修六府金木水火土糓惟修也配五行而攸叙洪範五行四曰金金曰從革從革作辛鼓鑄鎔範成器從革滿籝黄金滿籝不如一經滿堂金玉滿堂莫之能守三品九牧百鎰麗水之珍捐山之寳百鍊之精言百鍊之不耗三品之貢難得之貨是吾寳也不汝容焉貢禹貢揚州厥貢惟金三品又傳夏方有徳黄金九牧鑄鼎象物注九州之牧瑞史記秦獻公十八年雨金於櫟陽公自以為金瑞漢武帝詔曰往者太山見金又有白麟神馬之瑞宜以黄金鑄麟趾褭蹄以叶瑞焉瑞圖曰王者不藏金玉乗金而王其政平則黄金見深山不受遺漢書王宻懷金遺楊震曰夜無知者震曰天知地知子知我知是四知遂不受宻慙而退固辭韓詩楚襄王遣使持千金聘荘子荘子不受妻讓列女傳樂羊子得遺金一餅妻曰妾聞君子不以利汚行羊子慙而棄之母責韓詩外傳曰田子持金百鎰奉其母母曰不義之物不入於館子慙而出誣盗漢書直不疑為郎同舍郎有失金者而意猜不疑不疑乃買金償之後乃知疑史記陳平嘗負載渡河舟人疑平腰下有金隂欲害之平乃脫衣而渡遂能免於難也置燕臺燕昭王置千金扵臺上以延天下之士故謂之黄金臺懸秦市史記吕不韋使其客著吕氏春秋乃懸千金扵咸陽市門有能増减得一字者與之披沙揀金往往見寳擲地晉書孫綽字興公作天台山賦擲地作金聲捐文選曰捐金於山藏新語曰舜藏金於嶄巖之山以塞淫邪之路鑠衆口鑠金鳴拾遺記少昊時金鳴於山感孝孝子傳曰郭巨至孝妻生男巨曰養子則妨於供養將殺而埋之掘得䥫券曰黄金一釡賜孝子郭巨贈賜蘇季子抵掌而談李兊賜黄金百鎰虞卿躡蹻而説趙王賜金百鎰鎰秦幣黄金一寸重一斤以鎰為名買笑千金買笑掲而璽之周禮職金掌凡金玉錫石丹青之戒令受其入征者辨其物之美惡與其數量掲而璽之入其金錫于為兵器之府一諾諺曰黄金百斤不如季布一諾食貨志黄金為上白金為中赤金為下六齊金有六齊攫列子曰齊人有欲金者清旦衣冠之市道適見鬻金者因攫其金而去吏捕得問之問曰人在前子攫何故答曰取金時不見人徒見金印張顥得飛石破之得金印見石門注昆田珍物化黄金武帝祠首山土同價南史金土同價如粟後漢張奐為安定屬國人遺金以酒酹曰使金如粟不以入懐鑄范蠡范蠡去越越王勾踐思之乃以良金鑄其形訪主後漢黃向字文徳豫章人嘗行於路得遺金嚢乃訪主還之端木辭家語端木賜字子貢國之法贖人臣妾于諸侯皆取金於府子貢贖之辭不取金孔子聞之曰賜失之矣夫聖人舉事可以移風易俗非獨適身之行也受金即為不亷則何以相贖自今已後魯國不復贖人於諸侯送縣後漢陳重字仲翁嘗濟人死罪人宻投金於承塵以報重㤙重不知後毁屋得金訪金主已死乃将金送縣不寳禮儒有不寳金玉忠信以為寳南金詩大路南金金穴郭况之家號為金穴孔載金一舸自隨馮子猷以豪俠聞貞觀中入覲載金一舸自隨造常滿樽李元素為武徳令刺史李文棟横調民黄金造常滿樽以獻官屬無敢諫元素固争文棟為少損複垣洞穴王鍔常請籍坊以廣第舍作􅃨垣洞穴實金錢其中藥金孟銑遷鳳閣舍人它日至劉槿之家見賜金曰此藥金也燒之火有五色起試之驗毁懷不受韋夏卿為吏部侍郎時從弟執誼在翰林嘗受人金有所干請宻以金内夏卿懷中夏卿毁懐不受曰吾與汝頼先人遺徳致位及此顧當是哉執誼大慙置餘金棺下李勉少貧挟客梁宋與諸生共逆旅諸生疾且死出白金曰左右無知者幸君扵此為我𦵏餘則君自取之勉許之托𦵏宻置餘金棺下後其家謁勉共啓墓出金付之厚啖元載盗殺李國輔載隂與其謀及復結中人董秀厚啖以金使刺取宻㫖帝有所屬必先知之持金去劉乂因持愈金數斤去云此䛕墓中人耳不若與劉君為壽愈不能止拂菻重石為都城廣八十里東門髙二十丈䤾以黄金中門中有金巨稱一作金人在其端属十二丸率時改一丸落刻玉扶南出剛金状類紫石英生水底石上人沒水取之可以刻玉能化黄金劉巨容始揚州人申屠生能化黄金髙駢客之為吕用之所譛犇襄漢見巨容自言其術能作黄金孝友章金益自言能作黄金石國髙仙芝時石國獲黄金五六槖駞紫金西域鉢露種多紫金鑄金象郝玭封寳定郡王賛普常等玭身鑄金象令于國門得生玭者以金玭償之朝廷畏失名將徙為慶州刺史埋金杜暹突厥以金遺暹隂埋幕下良金張説曰宋之問之文如良金熠熠珠姿桞宗元披沙揀金賦見熠熠之珠姿華山生金李林甫謂李適之曰華山生金琢石取金西域俱晉河出金精琢石取金繁光熠爚求金諸溪淘汰瀺灂流注潰沱繁光熠爚貪賈来貿發扵懷握無翼而飛潤于豐屋劉禹錫楚望賦雨金垂拱三年七月廣州雨金位正秋為刑為兵占曰人君多殺無辜五行志一篋唐尉遲敬徳單雄信騎直趨秦王敬徳躍馬大呼刺雄信墜馬乃翼王出賜金一箧積金至斗同上隱太子以書招之贈金皿一車辭曰其敢當賜王曰公之心如山岳雖積金至斗豈能移之埋金九里豐年録雲陽段氏值豐年則盡取金錢埋之九里皆滿曰有得意日遂無用金蕨化金釵清異志王鯨遇賣蕨嫗黄衣破結有飢色憫之乃以千文買蕨謝而去及歸蒸扵烏豆甑盡成黄金獻生金徳宗時南詔異牟謝天子長川諸山往往有金或披沙得之麗水多金麩南蠻傳藥塗紙皆成金陳允升好道無金諷有姻禮而黄金郡中少不足用呵責其下允升曰無怒吾得為之取厚藥以塗其紙投火中皆成金因以足用獻金示順革南詔異牟尋贈常臯黄金丹砂臯䕶送使者奏異牟尋請歸天子為唐籓輔獻金示順革丹赤心也德宗嘉之賜以詔書二道比黄衣白衣陳尚書言其昔在鄉里好為詩俚人謂之陳舍人比樂天也性踈簡嘉賔客常有二道比一黄衣一白衣詣其家求宿舍之㕔事夜聞二客床上鍧然有聲乆之若無人秉燭視之見白衣下乃銀人也黄衣不復見家遂富稽神録銅二白凡律度量用銅漢書凡律度量衡用銅者所以同天下齊風俗也銅為物至精不為燥濕寒暑變其節不為風雨暴露改其形似士君子之行是以用銅也即山鑄錢吴王濞賜銅山漢文賜鄧通蜀道銅山鑄錢布天下世號鄧通錢銅臭後漢崔列入錢五百萬得為司徒問其子曰我為三公人以為何如其子曰人嫌大人銅臭萬物為銅文選鑿井得銅龐儉銅鉤三輔漢録記張氏先為京都功曺晨時早起忽有鳩從内飛下張氏謂曰為禍止為福入懷鳩乃投入張氏懷中探之得一銅鉤官至數郡太守後失鉤官亦絶矣孔鏟鑿尤苦韓思復還滁州刺史州有銅官人鏟鑿尤苦思復為賈他郡費省尤多鑿山取銅韓泗上言今商州紅崔冶産銅而洛源監久廢議鑿山取銅即詔治舊監置十鑪鑄之嵗得錢七萬二千緡柱馬緫遷安南都䕶建二銅柱於漢故處鑱著唐徳以明伏波之裔市銅髙麗髙麗地産銀銅周世宗時遣尚書水部貟外郎韓彦卿以帛數千疋市銅于髙麗以鑄錢銅神唐酉陽雜俎衡陽唐安縣東有畧塘塘有銅神往往銅聲激水水為變緑作銅腥魚盡死為兵不如鐡為器不如漆唐史銅之為兵不如鐡為器不如漆禁銅則人無所用盗鑄者少食貨志劉祕鑑磬釘鐶鈕得用銅太和三年詔佛像以鉛錫土木為之飾帶以金銀䃋石烏油藍鐡唯鑑磬釘鐶鈕得用銅餘皆禁之唐史百官志銅渠令歲采銅二十六萬六千斤元和天下嵗采銅二十六萬六千斤及宣宗嵗率銅六十五萬六千斤唐史食貨志詔悉毁天下銅佛像以鑄錢五代史周世宗是時中國乏錢乃詔悉毁天下銅佛像以鑄錢嘗曰吾聞佛説以身世為妄而以濟人為急使其真身尚在苟利於世猶欲割截况此銅像豈其所惜哉由是羣臣皆不敢言貢銅五萬五代髙麗錢三鑄附白泉布言寶貨之行如泉之布故名之母子輕重漢以秦錢重更令人鑄榆莢錢有子母權而行子母者錢之輕重也民患輕為重是母權子患重作輕亦不廢重是子權母也九府漢書太公為周立九府園錢法三官漢書楚郡國無得專鑄唯上林三官鑄令下非三官錢不得行五銖漢髙二年行八銖錢六年行五銖錢注云榆莢錢也皷鑄流行鎔範鎔鑄而合法度銷漏文選曰消漏參倍言錢之消磨缺漏青鳬鳬或作蚨赤仄漢武帝以錢多輕命京鑄赤仄注以赤銅為郭潤屋之資藩身之貨採山鑄錢榆莢見上注鵞眼宋畧太始中通私鑄錢大壞矣一貫長三寸謂之鵞眼十萬不盈一掬後禁之藏鏹巨萬累百囊中杖頭百錢範金禮銅山見銅門注金埒王武子布錢買地為埒時人曰金埒臭見銅門注癖和嶠貪財人謂之有錢癖法錢漢書曰錢法不立貫朽而不可校放鑄孝文除盗鑄錢令使人放鑄之雜賈誼曰銅錫為錢敢雜以鉛鐡為他巧者其罪黥即山吴王即山鑄錢磨質取鎔屑也肉好子紺錢王莽造契刀錯刀赤仄所謂子紺錢以赤銅為郭請罷鑄貢禹請罷鑄錢官以便農除其租銖之律注云依田畆欲其除市井銖兩之租削其律也使百姓歸農復古之道無名錢張安世辭不受禄詔都内别藏張氏無名錢白金白撰漢武帝有司言今半兩錢法重四銖其文半兩實重五銖而姧或盗磨錢質而取鎔錢益輕薄而物貴乃以白鹿皮方尺縁以績繡為皮幣直四十萬又造銀錫白金以天用莫如龍地用莫如馬人用莫如龜故白金三品其一重八兩圜之其文龍名曰白撰直三千二百差小方其文馬直五百復小撱之其文龜直三百更用五銖錢周郭其質令不可得磨而取鎔封錢勿出後漢張林議以為宜令天下悉以布為租市買皆用之封錢勿出尚書朱暉議布泉為租則吏多姧官自賣鹽則與下争利受一大錢劉寵為會稽太守徴還吏民送錢十萬寵為人受一大錢督鑄長安鑄錢多姧巧乃署第五倫督鑄錢掾領長安市市無阿枉買官崔列贖罪漢隆慮公主以金千斤錢十萬為子昭平君贖罪武帝許之不言王衍字夷甫疾妻郭氏貪口不言錢云舉阿堵物著論魯襃字元道著錢神論曰其積如山其流如水故能長久為世神寳親之如兄字曰孔方失之則貧弱得之則富昌無翼而飛無足而走解嚴毅之顔開難發之口多者處前少者處後前者為君長後者為臣僕錢之所祐吉無不利何必讀書然後富貴無徳而尊無勢而熱危可使活貴可使賤生可使殺忿争非錢不勝幽滯非錢不拔怨讎非錢不解令聞非錢不發鑿井見銅門注飲馬郝亷飲馬投錢一囊趙一詩曰文籍徒滿腹不如一囊錢贏二髙祖益封蕭何二千户曰以送我錢獨贏一奉二食萬何曾日食萬錢嫌無下箸處笇緡漢武初笇緡錢夢磨魏文帝問周宣曰夢磨錢文令滅乃更明何也宣曰陛下家事應之時陳思王云云夷甫不言魯襃作論見上子母之錢隂陽之炭散金蔵鏹無名漢祖無名有癖晉臣有癖龜貝漢時人上書言古今以龜貝為貨今以錢易之以此貧宜改敝上問於師丹丹曰可改章下有司皆云卒難易丹老耄遂䇿免之契刀錯刀王莽居攝以周錢有子母相權于是始造大錢重十二銖文曰大錢五十又造錯刀契刀鐶如大錢身形如刀長二寸以黄金錯其文與五銖四品並行使用後以劉家有金刀罷契刀錯刀更作金銀龜貝之文半兩漢書秦并天下幣為二等黄金為上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寳藏不為幣也顧金錢曺兵生數招權顧金錢注招求也以金錢事權貴而求得其形勢也鑄冶鑄史記趙國以冶鑄為業王數訟錢事張湯常排趙王呉鄧漢文時榆莢錢輕乃更鑄四銖令民縱自鑄故吴以即山富埒天子鄧通財過王者吴鄧錢乃布天下馬排人排水排韓暨公至為監冶謁者舊時冶作馬排一熟石用百匹更作人排又費功曁乃因長流為水排計其利三倍於前沈郎錢吴興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴廢錢議晉桓元輔政議欲廢錢用穀帛孔琳之議巧偽之人濕榖以要利薄絹以充資故用錢非唯豐國亦以省刑耳鑄錢歛貨蜀劉備収成都士衆皆掠盡府庫財寳軍用不足備憂之劉巴子初曰鑄直百錢平物價令吏為官市備從之數月充實血塗漢時有青鳬錢以血塗之去又来圎而函方立泉貨之法母以權子制輕重之宜輕重相權大小兼利榆莢五銖既將私鑄竹刑三尺難逭國章孔改錢弊法崔神度拜并州長史始至有詔改錢弊法州縣布下俄而物價踴昻百賈驚憂神度質其非于朝萬選萬中張鷟員半千稱鷟文辭猶青銅錢萬選萬中時號鷟為青錢學士壞銅象為錢柳仲郢拜京兆尹㑹廢浮屠法盡壊銅象為錢仲郢為鑄錢使吏請以字識錢者不答既淮南鑄會昌字久之僧反取為鐘鼓鈆鐵錢劉劒絳拜湖南留後教馬殷鑄鉛鐵錢十當銅錢一本倍於子韓洄上言江淮七監嵗鑄錢四萬五千緡輸京師工用運轉毎緡度工于是本倍於子嵗進億萬王鈇歲進錢鉅億萬羡進京師韓融拜中丞湖南觀察使盧周仁以南方屢火取羡錢億萬進京師融劾奏天下一家中外之財皆陛下府庫周仁陳中利假異端公違詔書循私希恩恐海内效之因縁漁刻則生人受弊罪始周仁請重責還所進代貧民租入詔不從置銀河隂院以虞水旱治牆李景讓母鄭治家嚴身訓勤諸子始貧乏時治墻得積錢僮婢犇告母曰士不勤而禄猶菑其身况無妄而得我何取亟使閉坎光院陸扆徙戸部侍郎同中書門下平章事自三省得宰相有光署錢留為錢資學士院来始有至扆送光院錢五千萬以榮近司鄭使君錢鄭綮補廬州刺史嵗滿去贏錢千緡藏州庫後宅盗至終不犯鄭使君錢淮南府錢八十萬緡李徳裕遷淮南節度使代牛僧孺僧孺聞之以其軍事付其副張鷺即馳去淮南府錢八十萬緡德裕奏言止四十萬為張鷺用其半榆莢南蠻投和在真臈南銀作錢類榆莢歲鑄十餘萬劉晏至湖嶠荒險處所出貨皆賤弱不償所轉晏悉儲淮楚間貨銅易祈嵗鑄緡錢十餘萬錢尋廢開元中以錢濫惡江淮間尤甚在勑業㫁令御史往江淮間収歛納官鎔之其費稍廣州縣恐錢數不充隨以好錢繼之自是百姓財弊耗損御史坐此左遷舊法毎一千重六斤四兩近鑄者各重七斤歐陽詢所書六典注錢爐皇朝少府置十爐諸州皆属焉及少府罷鑄錢諸州遂別合絳州三十爐楊宣鄂蔚各十爐益鄧桞各五爐岸三爐定一爐同上錢流地上晏能權萬貨重輕使天下無甚貴賤而物常平自言如見錢流地上劉宴縱錢李若初代王維為浙西觀察時天下錢少貨輕州縣禁錢不出境商賈不通若初始奏縱錢以起方貨詔曰可請鑄第五琦少以史幹進初琦請鑄乾元重寶錢以一代十既當國又鑄重以一代五十會物價騰踊飢饉相望議者以為非是詔貶忠州長史本分錢裴延齡帝謂延齡曰朕所居浴堂殿一棟將壓念易之未能也延齡曰宗廟至重殿棟微矣且陛下本分錢用之無窮何所難成帝驚曰本分錢奈何對曰此在經誼愚儒不能知臣能言之按禮天下賦三之一以充乾豆一以事賔客一以充君之庖厨陛下奉宗廟能竭天下賦三之一乎鴻臚禮賔勞于四夷用什一為有嬴陛下奉宗廟所御饔餼簡儉以所餘為百官廪料飡錢未盡也則所不盡者為本分錢以治殿數十尚不乏况一棟哉帝顧曰人未嘗為朕言之陸贄極論其譎妄賜歳錢百萬為脂粉費貴妃楊氏傳賜諸姨嵗錢百萬為脂粉費積錢盈室五代袁正辭積錢盈室室中常有聲如牛人以為妖勸其散積以禳之正辭曰吾聞物之有聲求其同類爾宜益以錢聲必止永通錢貨南唐李景鍾謨請鑄大錢以一當十文曰永通泉貨謨得罪而大錢廢韓熈載又鑄鐵錢以一當二半月驃國以金銀為錢形如半月順天得一史思明建元順天鑄順天得一錢錢徧天下王鍔毎燕饗輒録其餘賣之以収稱故鍔錢徧天下飛錢食貨志憲宗以錢少復禁用銅器時商賈至京師委錢諸道進奏院及諸軍諸使富家以輕装趨四方合劵乃取之號飛錢買春錢承平舊纂曰進士不第者諸知供酒肉之費號買春錢授金錢八月望夜師與上遊月宫還潞州城上俯視城郭悄然而月光如晝師因請上吹以玉笛在寝殿中師令人取頃之而至既奏曲授金錢於城中而還旬日潞州奏八月望夜有天樂臨城兼獲金錢出唐逸史錢文初王氏之鎮閩城罍甓皆有錢文有曰此城終歸錢氏諸王氏惡之因命剗去而錢文愈明又謡言曰風吹楊葉皷城下不得錢来戈不罷吴越備史黄金鑄為臣錢廢王倧即位以黄金一鎰命近侍袁文昌鑄為臣錢文昌意有所求䜟且懼不就乃宿謀於匠者别鑄一以為備以所授鑄之廢王臨視果不就因潜以宿鑄者獻之同上緡貨通行詳求適變可以便人所貴緡貨通行里閭寛息韓愈錢重物輕鈆錫和青銅往日用錢捉私鑄今許鈆錫和青銅刻泥為之最易得好惡不合長相蒙杜甫詩雜以鈆鐵則惡文粹劉秩禁私鑄錢議鑄錢不雜以鈆鐵則無利雜以鈆鐵則惡惡則不重歛輕為重散重為輕陸宣公奏議峻用銅為器之禁茍制持得所則錢不乏矣有強監以入其直有𣙜酒以納其資茍消息合宜則錢可収固可以歛輕為重錢不足固可以散重為輕弛張在官何所不可富埒天子文粹劉秩禁私錢議漢文時吴王濞諸侯也富埒天子鄧通大夫也財侔王者此皆鑄錢之所致也古之為錢以通貨幣張曲江集議私鑄錢布帛不可以尺寸為交易菽粟不可抄勺貿有無故古之為錢以通貨幣王老王元寳人以錢文有元寳字因呼錢為王老出南部新書一爐裴寂改鑄錢賜一得自鑄王元寳以錢為花逕開元天寳遺事王元寳以錦綉石為柱以錢為甃花逕錢文甲跡昔因文徳皇后于武徳中行開元通寳錢命名及書皆歐陽詢所為初進鑄様后搯一甲㾗因鑄之出譚賔録錢鬼復有和長興者鉅萬藏家貫朽仄磨鱗差螭縮陣陣腥澁死而有知是謂錢鬼出孫權文通神幽閑皷吹張延賞問度支有一寃獄久不决及公判度支期以旬日平反視事日案上一帖云奉錢三萬貫乞不問其獄公怒悉収吏訊之次日於盥洗處又一帖云奉錢十萬貫公嘆曰錢至十萬通神矣堂厨食利錢兩省以江淮冨人給文牒周行天下利堂厨食利錢方鎮令預宴諸道大将之上富屋虛有影占之名徳裕判曰萬錢已厚常愧素餐百姓尚貧豈宜争利既異抜葵之意尤傷脫粟之名將欲率人且宜正本遂罷之獻替録将以平率輕重權本末齊威得其術而國以覇周景失其道而人用幣考諸載籍國之興衰實繫於是劉秩請禁私鑄錢挼葉成錢大中遺事軒轅先生居羅浮山宣宗召入禁中能以桐竹挼滿手之葉悉成錢禁人無得以銅為器在塞其隙無使之洩禁人無得以銅為器皿禁鑄銅為浮屠佛像鐘磬蓄銅過千斤者鑄錢以為他物者皆罪死不赦韓愈錢重物輕状言錢弊之輕重者熟矣元稹錢貨議状古今言錢弊之輕重者熟矣或受大錢或放私鑄或龜或貝或皮或刀或禁埋藏或禁銷毁或禁器用或禁滯積皆可以救一時之弊也上清童子貞觀中岑文本退朝於小亭避暑寐覺忽有叩門者報云上清童子文本慕道即命入乃年二十以下道士儀質爽邁冠淺青圎帔履衣服輕細乃曰僕上清童子自漢朝得果成本生於吴得夫不凝滯之道文本語以漢魏宋齊梁間君臣社稷之事了如目覩文本曰吾人冠帔何制度之異對曰夫道在於方圎之中僕外服圎而心方正相時儀也又問曰衣服皆輕細何王所出對曰此是上清五銖服又問曰比聞六銖者天人衣何五銖之異對曰尤細者則五銖也後令人潜送詣其所止出門於院墻下瞥然不見命工掘之至一古墓墓中無餘物惟得古錢一枚文本悟上清童子是銅名元寳錢之文也外圎心方錢之状也青衣銅衣也五銖亦錢之文也漢時於吴是漢時鑄五銖錢於吴王也自晉以東厥錢用青金自河而北厥錢用黒金吴殊異之禁不行矣牛僧孺䇿取尉遲公帖隋末一書生居太原苦於貧所居抵官庫因此而見有錢數萬貫遂欲携挈見一金甲人持戈曰汝要錢可取尉遲公帖来此尉遲公錢也書生訪求至鐵冶處有尉遲敬徳者方袒露蓬首鍜煉之次乃前拜之公問曰何故曰乞錢五百貫以濟貧困尉遲怒曰打鐵人安得錢乃侮我耳生曰足下他日富貴若能哀憫但乞一帖公不得已令生執筆曰錢付某乙五百貫具日月著名書生持去公與隨從大笑以為妄也書生却至庫復見金甲人令繫于梁上髙處書生取錢止五百貫後敬徳佐神堯立殊功勑賜錢一庫開庫欠五百貫將罪主者忽於梁上得帖手視之乃打鐵時書帖累日驚嘆求書生具陳所見厚遣之出逸史幣輕則物價騰踴古今之言錢弊者多矣而又可一貫以其時之升降輕重也幣輕則物價騰踴幣重則農無所集皆害也就而言之孰為利曰幣重則利曰奈害農何曰賦不以錢而制其罪布帛之數則農不害以錢則多出市帛而價則害矣桞文請天下以州名鑄錢唐志武宗廢浮屠法永正監官李郁彦請以銅像鐘磬罏鐸皆歸廵院州院銅益多矣鹽鉄使以工有常力不足以加鑄許諸道觀察使皆得鑄錢坊淮南節度使李紳請天下以州名鑄錢京師為京錢交易禁用舊錢時患錢輕以至於量資帛權子母代復改鑄攸行榆莢契刀厚薄輕重何人所制杜甫進士䇿置錢萬緡崔戎為華州刺史吏以故事置錢萬緡為刺史私用戎不敢及去召吏曰籍所置錢享軍以紙寓錢王璵漢以来葬䘮皆有瘞錢後世里族稱以紙寓錢為鬼事至是稱乃用之鑄大鐡錢又閩王延義改元永隆鑄大鐡錢以一當十五代史武徳四年鑄開元通寳徑八分重四銖四參積十錢重一兩得輕重大小之中其文以八分篆𨽻三體洛并幽益桂等州皆置監賜秦王齊王三爐右僕射裴寂一爐以鑄盗鑄者論死沒其家屬已上唐食貨志今之錢古之下幣也開元二十二年宰相張九齡建議古者以布帛穀粟不可尺寸抄勺均乃為錢以通貿易官鑄所入無幾而工費多宜縱民鑄議下守官宰相裴耀卿黄門侍郎李林甫河南少尹蕭炅秘書監崔沔皆以為嚴㫁惡錢則人知禁稅銅折役則官冶可成計估度庸則私錢以利薄而自息若許私鑄則下皆棄農而競利矣左監門衞録事叅軍劉秩曰今之錢古之下幣也若舎之任人則上無以御下下無以事上不可一也物賤傷農錢輕傷賈物重則錢輕錢輕自卑物多則作法収之使少物少則作法布之使輕柰何假人不可二也鑄錢不雜鈆鉄則無利雜則錢惡今塞私鑄之名人猶冒死况設陷穽誘之不可三也鑄錢無利則人不鑄有利則去南畆者衆不可四也人富則不可以賞勸貧則不可以威禁法不行人不理繇貧富不齊若得鑄錢貧者服役於富室富者乗利而益恣不可五也夫錢重繇人日滋於前而鑢不加舊公錢與銅價頗等故破重錢為輕錢銅之不増在採用者衆也出唐食貨志王清本元和初次陽村百姓王清傭力得錢五鐶因買田畔一枯栗樹将為薪以求利經宿為鄰人盗斫創及腹忽有黒蛇舉首如臂語人曰我王清本也汝勿斫其人驚懼失斤而走及明王清率子孫薪之復掘其根根下得大瓮散錢實之王清因是獲利而十餘年巨富遂甃錢形龍號王清本酉陽雜俎貨財四白聚人易曰何以聚人曰財利用厚生注利用以阜財厚生以養民二曰貨洪範八政不殖貨利貨悖而入亦悖而出以財發身仁者貨惡其弃於地不必藏諸已兵者財用之蠧生孽藴利生孽露積晉平原王幹雖有爵禄若不在已秩奉布帛皆露積腐爛能散積而能散藩身左傳曰貨以藩身子何愛焉孔壞寳若山太平公主賜死壞寳若山饒財蕭嵩家饒財財力傾殫李嶠上書曰易稱何以聚人曰財今倉儲蕩耗財力傾殫不足以聚人營財産無厭江安王元祥性庸吝所致營財産無厭厚殖胡鉦拜嶺南節度使廣有舶具竒寳鉦厚殖財家無羡財韋貫之沈厚生平未嘗通饋遺故家無羡財財貯鉅萬王涯李訓罷乃及禍是時十一族貲貨悉為兵掠而涯居永寧里乃楊慿故第財貯鉅萬取之彌日不盡居財不訾外戚獨孤懐恩居財不訾嗜財徐浩晚節頗嗜財以財自雄裴曲先流北廷無復名撿專居賄二年至數十萬娶降胡女為妻妻有黄金駿馬牛羊以財自雄裒貨財遺謝貴幸齊澣為兩道採訪使裒貨財遺謝貴幸聚所得財武攸寧築大庫百餘舍聚所得財一夕火不遺一錢抽擢私昵廣納貨財牛羊日厯李宗閔與牛僧儒更相唱和抽擢私昵廣納貨財門大啓而公道奄矣外國之貨日至韓愈序外國之貨日至殊香象犀玳瑁竒物溢於中國不可勝用錦五繡附白重錦傳曰歸夫人重錦三十兩注言錦細熟者以二丈雙行故曰兩盖二十疋貝錦萋兮斐兮成是貝錦萋斐錦文也廻文竇滔妻蘇氏織錦為廻文詩以寄滔宛轉循環文甚悽惋織文禹貢厥篚織貝文錦之屬美錦子産謂子皮曰子有美錦不使人學製焉大官大邑所以庇身也其為美錦不亦多乎精麤中數廣狹中量蜀錦成都有錦城爛兮錦衾爛兮詩厥篚見上注如金釋名曰錦金也作之功重其價如金靡麗纎縟如貝之文若金之價盈尺有幅袤丈成疋文織錦繡之屬也見周禮衣夫錦孔子謂宰予曰衣夫錦於汝安乎車漢書馮夫人出塞以錦車㠶䌫吴書甘寧以錦維舟去則弃之隋煬帝以錦為帆衣詩衣錦褧衣裳錦褧裳歩障世說石崇錦歩障四十里翻鴻走龍廻鸞舞鳳盖古錦之文衣錦漢書項羽曰冨貴不歸故鄉如衣錦夜行還鄉武帝拜朱買臣為會稽太守曰如衣錦還鄉又後漢光武封景丹為櫟陽侯並如此段美人贈我錦繡段氷蠶拾遺記東海有氷蠶其繭五色織為文錦入水不濕濯蜀有濯錦江帳郎官有錦帳束錦儀禮婚舅享婦之送者酬以束錦注送者謂𨽻子弟妻妾一篋衛人饋叔向羮與一篋錦錦不相佀魏文帝詔羣臣前後每得蜀錦皆不相佀束髮禮童子以錦束髪不鬻石山有錦石庾肩詩曰鬻石鎮浮橋黼黻文章斐成文選貝錦斐成濯色江波繡文繡繡段見錦門御史之服御史以繡為衣夫人之衣衛侯與夫人繡衣曰聴於二三子二三子大臣也繡取其文章順序五采周禮五采備謂之繡也成六幣周禮六合幣以繡充邦國之幣具見周官禁商賈之衣亦聞漢詔漢詔曰錦繡纂組害女工也商賈不得衣之難崇衣馬之奢史楚荘王有愛馬衣以文繡宜禁被牆之僭漢書曰黼繡古天子之服也今富人大賈嘉㑹召客以被牆布地天子以文繡布地針縷論衡曰繡之未刺絲帛何以哉及加五采之功施針縷之飾則文章炫燿而學者亦如之靡麗纎縟與黼同文為天子之服書曰黼黻絺繡映騘俱麗為御史之衣彰施五采綦組九文文繡有恒月令文織見錦門典絲周禮典絲冝文繡刺文史刺繡文不如倚市門罷漢哀詔齊三服官諸織綺繡難成女工之物皆止無有所輸也孔曵繡為颿杜亞拜淮南節度使泛九曲池曵繡為颿詫曰要當稱是林沼李衡曰未有錦䌫云何亞大慙錦裘繡帽李晟毎與賊戰必錦裘繡帽自表指顧陣前視錦繡元徳秀視錦繡未嘗求足賜瑞錦服東女真王歛臂使大臣求請官號武后冊拜左右玉鈴衛將軍賜瑞錦服織錦新羅真徳襲王遣春秋子法敏入朝真徳織錦為頌以献曝衣紈繡不可計陳孺每曝衣紈繡不可計賜以宫錦封敖武宗使作詔書賜以宫錦錦繡堆舊唐史謝延皓大順中以詞賦擅名與徐寅不相上下時號錦繡堆貢重錦裴胄拜荆南節度使是時方鎮争剥下希恩制貢重異綾名貢奉有中使者即悉公帑市歡胄待之有節朝霞錦五代阿保機遣使者觧俚隨頃以朝霞錦聘梁文錦郭崇韜荘宗聞破蜀遣宦官向正嗣勞軍正嗣還上蜀簿得文錦五十萬匹波斯錦吐藩其所貢波斯錦毛錦五代室韋其人工巧善織毛錦山林皆覆以錦吴越錢鏐㳺衣錦城宴故老山林皆覆以錦獻錦十五床杜鴻漸兼成都尹入朝獻錦十五床錦裘范君瑾執元普送突厥頡利得之遺以錦裘衣錦晝游張士貴虢州人授虢州刺史帝曰顧令卿衣錦晝㳺耳廣陵錦韋堅通漕成舟署某郡以所産暴陳其上若廣陵錦竒錦崔寧嚴武白寧為利州刺史及武為劒南節度獻誠見􅅃以竒錦珍貝遺獻誠且求寧明霞錦唐酉陽編宣宗大中初女蠻國獻明霞錦練水香麻以為貢光耀芬馥著人五色相間而美麗於中國之錦魚油錦女王國貢魚油錦紋綵尤異入水不濡濕云有魚油故也氷蠶絲錦唐樂府録康老子嘗賣一錦褥有波斯見之者乃曰此氷蠶絲錦所織暑月陳於座滿室凊凉大食有重錦其載二十槖駞乃勝既不可兼負乃裁為二十匹每三嵗一餉黠戞斯様與前不同有錦衣𨽻宫錦坊禄山亂後人尋其舊坊不収曰如今花様與前不同遣之盧氏記池底鋪錦李石開城録文宗論徳宗奢靡云聞得禁中老宫人每引泉先於池底鋪錦王建宫詞魚藻宫中鎻翠蛾先皇行處不曾過只今池底休鋪錦菱角鷄頭積漸多是也瑞錦送麒麟杜甫詩每掖庭經錦則給酒唐史百官志小襦繡芳蓀杜甫詩誰家挑錦字滅燭翠眉顰江月詩鬭鷄初賜錦上獸錦奪袍新送李白改張思婦錦元禎送侍御貝錦無停織杜甫賜瑞錦以著善政王方慶累遷廣州都督境内清畏議者謂治廣未有如方慶者號第一下詔賜瑞錦雜采以著善政風生錦繡香泛江必取著于粉純文繡之飾杜甫南郊機中織錦秦川女李白烏夜啼機中織錦秦川女碧紗如煙隔窓語翡翠黄金縷繡成歌舞衣上詔制皆錦翠池飾唐史代宗皇后沈氏傳絲六白厥篚檿絲禹貢青州貢檿絲注云檿桑絲中琴瑟絲篚筐也當旣蠶之時且徵繭稅書曰桑土既蠶及載績之日爰成婦功詩八月載績治而棼之衆仲曰以亂治亂猶治絲而棼之受采之悲墨翟悲素絲之受采積微之誡郄長倩贈公孫宏素絲禭以為積微成大之誡王言如絲其出如綸貿絲詩氓之蚩蚩抱布貿絲朱繩直如朱絲繩青轡有青絲轡有條而不紊素絲五紽五緎五縂詩厥篚之貢典絲周禮典絲掌絲入而辨其物以其賈掲之注絲入謂九職之嬪婦所貢絲湅絲周禮帨氏湅絲以涗水漚其絲七日去地尺暴之晝暴諸日夜宿諸井七日七夜是謂水湅注涗水以灰湅水者漚之宿諸井懸井中詩緑兮絲兮女所治兮素絲紕之組之詩與絮同價孟子曰有許行欲令絲絮輕重同布帛長短同則價相若色絲曺娥碑云色絲絶字也寒女衣詩皎皎白素絲織成寒女衣園客琴賦絃以園客之絲孔身所蠶素絲李元􅀈邢州人洛州刺史元行冲邀致之問經義畢贈衣服辭曰吾軀不可服新麗懼不稱以速咎也行冲垢衊復與之不獲已而受俄報身所蠶素絲曰義不受妄財也絲枲突厥傳魏晉羗狄居塞垣絲枲所生散於數萬里之外絲不容織食貨志絲不容織有不恕物之病五兩為鈎百官志織染著絲五兩為鈎獻十萬兩房知温卒後其子彦儒獻其父絲十萬兩五代碧金絲唐杜陽編代宗嘗幸興慶宫於􅃨壁間得寳匣匣中軟玉鞭遂命碧金絲為鞘絲即永泰元年彌羅國所貢云其國有桑枝榦盤屈履地而生大者連延十數頃小者隂百畆其上有蠶可長四寸其色金其絲碧亦謂之金蠶絲縱之一尺引之一丈撚而為鞘表裏通瑩如貫琴瑟靈泉絲大軫國以五色石甃池塘採大柘葉飼蠶于池中始生如蚊睫及老可五六寸池中有挺荷雖驚風疾吹不能傾動大者可濶三四尺而蠶經十五日即入荷中成蠒形如斗自然五色國人繰之以織神錦故謂靈泉絲一絲兩絲雲仙散録浣花旅地志曰杜甫寓蜀每蠶熟即與妻兒躬行而乞曰如或相憫惠我一絲兩絲晶比凝霜瑩如委霧杜牧謝新絲表華絲文粹張說鄎國公主碑華絲繡像為綫補君衮為絃繫君桐左右脩闕職宫商還古風端然潔白心可與神明通龜蒙素絲園客麗獨繭詩人吟五緵同上荆州麥熟繭成蛾繰荒憶君頭緒多李白荆州歌繭絲之租兩耗其二銖杜牧祭城神織績七白不績者不縗周禮蠶則績而蟹有筐織室漢書百官表少府屬有東織室西織室注成帝各名織室夜績食貨志曰冬民既入婦人同巷相從夜績女工一月得四十五日注一月中又得夜半為十五日織蒲臧文仲妾織蒲為不仁與民争利也又周勃以織蒲曲為生注葦薄一名曲織屨翟方進母織屨蠶織詩云婦無功事休其蠶織教織後漢崔寔為五原太守土宜麻枲而俗不知織寔斥賣儲跱乃作紡績織絍練緼之具以教民得免寒苦斷織樂羊逺逰尋師學業一年来歸妻跪問其故羊曰久行在外懐思無他妻乃引刀趨機曰此織生自蠶繭成於機杼一絲而累以至寸累寸不已遂成於尺累尺遂成丈匹今若㫁之則損前功稽廢時日當日知所亡以就懿徳羊感之七年不返織紝承筐杼軸公父文伯母公父文伯母退朝其母紡績文伯止之母怒曰使童子備官云云織組異善吴起使妻織組曰如所示妻織異善起曰非詔也歸之弄杼軋軋弄機杼支機石女脩織絍男務耕耘文選方織孟軻母方織見軻學歸母問學所至孟子曰未能博習母以刀㫁機曰子之廢學若予之㫁機也孟子後遂勗勵成天下之名龍梭棼機㫁機嫠婦不恤其緯而憂宗周之隕紡焉莒之嫠女工織新人工織縑故人工織素濳織吴都賦云泉客潜織而卷綃牽挺列子云牽挺機躡也不為下機史記蘇秦歸妻不為下機乞餘光貧人女謂富人女曰願以餘光振之辟纑仲子避兄離母居於陵身織履妻辟纑以易食孟子責之績麻曰辟練麻曰纑風驚蟋蟀聞織婦之鳴機月滿蟾蜍見天河之弄杼教以婦功供其女事終日七襄詩曰跂彼織女終日七襄注云襄駕也孔晝田夜紡楊三安妻李舅姑亡三安又死子㓜孤窶晝田夜紡凡三年葬舅姑及夫兄弟凡七䘮逺近嗟涕常月織絶一端劉元佐貴母尚在賢婦人也常月織絶一端示不忘本象牀玉手亂殷紅萬草千花動凝碧已悲素質隨時染裂下鳴機色相射杜甫白絲行機杼鳴簾櫳魯人重織作機杼鳴簾櫳李白五月詩流黄機愁苦不窺隣泣流上黄機天寒素手冷長夜燭復微一日不滿匹鬂蓬亂若絲贈裴司馬機中織錦秦川女烏夜啼搔絲鳴杼機百里聲相聞贈清漳明府姪革挑紋嫁不得元稹織女詩績而後成韓文若布與帛必蠶績而後成者也魯女驚莎鷄鳴機應秋節李白絹八白纎縞厥貢纎縞新人織縑古詩新人工織縑故人工織素織縑日一疋織素五丈餘持縑将比素新人不如故氷紈黄絹色絲賜絹萬疋張華以平吴之功賜絹萬疋織而軋軋束以戔戔盈尺有幅袤丈胡威之問胡質為荆州刺史賜其子威絹一匹威曰大人清髙何得此絹父曰俸禄之餘陳寔遺盗陳寔見梁上之盗乃遺絹兩疋辨其苦良周禮凡布絹辨其苦良比其大小而賈之物書而楬之注云别其麤細廣狹書其賈於物也若今時題署絹帛一其淳制淳廣狹也制長短也周禮縑緗漢賜降胡縑緗孫章誤以十為千貸魏文帝在東宫嘗從曺洪貸絹百匹洪不與及洪犯法甘分必死既得原上書謝遺王丹持一縑往吊人曰如丹此縑出自機杼魯縞胡質俸禄之餘見上注王丹機杼之出孔縑直權德輿又言大厯中一縑直錢四千今止八百稅入加舊則出於民者五倍其初置虞鄉司空圖王重榮父子雅重之嘗為作碑贈絹數千圖置虞郷市人得取之一日盡縑去馬来五千匹縑易一匹馬縑去馬来無了日縑絲不足女工苦踈織短裁充匹數藕絲蛛網三丈餘廻鶻訴稱無用處白居易隂山道輕縑素練張九齡之文如輕縑素練實濟時用而窘邊幅張說論文東絹我有一匹好東絹重之不减錦繡段已令拂拭光零亂出杜詩受饋縑太宗疾貪吏欲痛懲刈之乃間遣人遺諸曺一吏受饋縑帝怒詔殺之矩曰吏受賕死固宜然陛下以計給之因即行法所謂罔人以罪非道之以徳之誼帝恱遇我薄皇甫湜為福先寺碑援筆立就度贈以車馬繒綵甚厚湜大怒曰自吾為顧况集序未嘗許久今碑字三千一字三縑何遇我薄耶度笑曰不覊之才也綿九白鄉貢八蠶之綿一歳八蠶出日南挾纊傳師人多寒王廵三軍撫而勉之三軍之士皆如挾纊麗宻聖主得賢臣頌云荷氊被毳者難與道純綿之麗宻重繭衣裘楚子使薳子慿為令尹遂以疾辭重繭衣裘鮮食而寝注繭綿衣纎纊禹貢厥篚纎纊細綿也懷氷古詩挾纊如懐氷素十白如霜雪新裂齊紈素皎潔如霜雪故人織見絹門素書古詩呼兒烹鯉魚中有尺素書尺素文賦非尺素之所擬濯手古詩纎纎濯素手束腰洛神賦曰纎腰如束素列素縑素孔將縑比素韓愈自河南令除職方員外郎歸朝問前後之政如何對曰將縑比素出南部新書寒衣一匹素夜借鄰人機杜牧秋娘詩經刀尺殘工委筐篋餘素經刀尺韋應物東園素染毫東園素栁宗元書事帛十一白束帛戔戔精麤廣狹布帛精麤不中數廣狹不中量不鬻於市有幅無遷晏子曰富如布帛之有幅焉為之制度使無遷妾不衣帛季孫相魯無衣帛之妾非帛不暖七十賜宣詔曰鳳皇集於新蔡其賜汝南太守帛百匹又東方朔射覆為卜中則賜臣帛裂帛恨賦裂帛繫書五十可以衣帛販灌嬰販繒繒亦帛裂繒史記周幽王后襃姒好裂繒聲涷帛周禮慌氏湅帛以欄為灰渥淳其帛寔諸澤器滛之以蜃注以欄木灰漸澤其帛澤器謂滑澤之器滛薄粉令帛白也蜃蛤也蛤灰今海旁有之渥音漚清其灰而盝之而揮之注清澄也於灰澄而出盝希之希而揮去其蜃而沃之而盝之而塗之而宿之注更沃淳明日沃而盝之注朝更沃至夕盝之更沃至旦盝之亦七日而漚枲暴諸日夜宿諸井七日七夜是謂水湅贈先生家語孔子之剡遇程子於途傾盖語終日相恱謂子路曰取束帛贈先生傾盖駐車也實筐篚詩鹿鳴序云既飲食之又實幣帛筐篚以將其意承筐是將注所以行幣帛也與布同價孟子許行事具布門注孔樵貴帛賤劉義節并州人從平京師為鴻臚卿時傾府庫為軍賞帑財大乏義節曰今京師屯兵多樵貴帛賤書帛狄仁傑送制獄丏筆書帛置禇衣好謂吏曰方暑請付家徹絮太府之帛為殫魏知古拜黄門侍郎㑹造金仙玉真觀諫曰諸司試補員外檢校官嬴二太府之帛為殫不受馮伉膳部員外郎李抱真卒伉持節臨吊歸之帛不受又致京師伉上表固拒澄水帛唐杜陽雜編同昌公主一日大會韋氏族暑氣特甚主命取澄水帛以水蘸之掛于南軒良久滿座皆思挾纊澄水帛長八九尺似布而細明薄鑒中有涎能消暑毒也人之仰而生者在穀帛穀布既豐無飢寒之患韓愈䇿問公藝賜帛張公藝九世同居髙宗有事太山臨幸其居問本末書忍字以對賜縑帛而去囊中帛杜甫北征詩那無囊中帛救汝寒凜慄彤庭所分帛本自寒女出鞭撻其夫家聚歛貢城闕同上内帛擎偏重送許拾遺以䟽易良突厥序為將者刻薄自入給帛則以䟽易良補雜費劉義節請軸舒藏内見繒取羡尺補雜費得十餘萬叚練十二白澄江静如練呉門之馬孔子曰望吴門之曵練視之乃白馬季孫練冠待罪王導衣晉王導為太保時軍藏竭唯有練千端鬻不售導乃製練布單衣皆效之乃貴也孔輕縑素練文藝傳開元中張說與齊堅論近世文章張九齡如輕縑素練實濟時用而窘邊幅􅜵襠唐車服志文舞即白練􅜵襠楚練杜甫詩越羅與楚練照耀輿臺軀縞練吹組帳韓愈岳陽樓詩練帨長姬香御四羅列縞裙練帨無等差韓愈李花天清小城擣練急杜甫秋風月出砧杵動白公秋霽月出砧杵動家家擣秋練白練為衣唐則天長壽二年詔應天下尼當用白練為衣組練照楚國李白素練風霜起杜甫畫鷹詩綃十三白蟬翼魏文帝詩絹綃白如雪輕華比蟬冀卷綃鮫人潜織以卷綃鮫人泉客織輕綃於泉室出以賣之輕綃見上孔襲紈綃吐蕃弄賛妻文成公主弄賛見中國服飾之美自裭氊􅄢襲紈綃為華風綘綃唐張瀆宣室志滎陽鄭氏子見婦人自稱汜人後汜人於筐中出絳綃一端令鬻之有胡人千金償其價霞綃帔唐陳鴻長恨侍上皇得成都方士入蓬莱宫見一人霞綃帔鮫綃北夢𤨏言張建章為幽州司馬曽以府命往渤海遇水仙遺鮫綃自齎以進將事者為之傳亳州太清宫道士有収得其本者曰明宗皇帝有事郊邱建章鄉人掌東序之寳且言國璽外惟有二物其一即建章所進鮫綃篋而貯之軸之如箸以紅線纒之亦云夏天溽暑展之滿室凜然胡綃半尺唐豐年録開成中物價至賤村路賣魚肉者俗人買以胡綃半尺士大夫買以樂天詩三破紅綃辨音集李龜年至岐王宅岐王贈三破紅綃輕霧霏杜甫送魏六丈詩綃綺輕霧霏紫綃帔幽恠録巴卭人橘有老叟象戯一叟曰我輸紫綃帔一副紫綃帳元載造芸暉堂堂内設紫綃帳見帳門龍綃衣元載納薛瑶英為姬以龍綃衣一襲無一兩載以薛瑶英體輕不勝重衣於異國求此服也杜陽編染朝霞誰為虞卿裁道帔輕綃一匹染朝霞李賀綺十四白一端古詩客從逺方来遺我一端綺雙鴛之文又曰文彩雙鴛鴦裁為合歡被餘霞散成綺厥篚織文織文錦綺之屬下裳古詩緗綺為下裳紫錦為上襦琴名司馬相如之琴名緑綺雉翼射雉賦鶯綺翼以赬撾士不衣織織綺也孔未嘗衣紈綺竇建徳妻曹未嘗衣紈綺宣州綺地理志宣州土貢綺細綺杜甫詩輕紈細綺相追飛無文綺之飾盧懐慎服無文綺之飾雙鴛韋蘇州擬古詩别時雙鴛綺留此千恨情深宫皆羅綺李白金陵解我紫綺裘且換金陵酒上聞有鴛鴦綺特為美人贈陳子昻詩五兩為束唐史天子廵狩刺史令贄其土之寳錦綺繒布皆五兩為束羅十五白雲羅鳯文蟬翼並羅名纎宻羅襪羅衣何飄揺裳洛神賦綴羅裳以深軀帷羅帷扇羅扇三代服馮房父子兄弟三代為侍中並帶青紫羅綺紅羅魏都賦云紅羅颯洒綺組繽紛絶袖史記荆軻把秦王羅袖絶霑裙别賦送愛子兮霑羅裙似雪如雲言羅白似雪薄如雲生塵洛神賦羅襪生塵紫羅囊孔賜五色羅新羅遣子弟入太學學經術帝賜五色羅孔雀羅𤓰子羅地理志鎮江貢孔雀羅𤓰子羅春羅寳花羅越州貢寳花花紋等羅冠髙麗王以白羅裂冠大臣青羅冠會稽羅韋堅鑿潭通漕成帝為升樓堅取小斛舟毎舟署某郡以所産暴陳其上若會稽則羅獻羅杜鴻漸兼成都尹入朝獻羅十五牀輕春風羅衣輕春風李白寄逺曵紫烟羅衣曵紫烟李白詩垂羅垂羅舞縠揚哀音白苧詞越羅繅絲須長不須白越羅蜀錦金粟尺杜甫白絲行心精煙霧色指歴千萬緒韋蘇州雜體春羅雙鴛鴦出自寒夜女心精煙霧色指歴千萬緒長安貴豪家妖艶不可數裁此百日功惟将一朝舞舞罷復裁新豈思勞者苦霜羅曵曵文粹崔融啓母廟碑秋雲羅帕賈知微遇曽城夫人杜蘭香以秋雲羅帕裹丹五十粒與生曰此羅是織女繰玉繭織成遇雷雨而宻藏之後大雷雨失帕所在麗情集花羅封蛺蝶杜甫詩少答胡王萬匹羅杜甫入朝口號布十六白精麤廣狹布帛精麤不中數廣狹不中度不鬻於市有幅無遷布帛有幅為之制度使無遷也抱布貿絲南炎火浣火鼠之毛為布浣之於火振之如雪西蜀橦華蜀都賦云布有橦華衛侯衣大布之衣漢相被公孫宏為漢丞相卧布被孟光裙孟光荆釵布裙而嫁梁鴻王孫囊楊王孫以布囊盛其屍而瘞之髙祖奮布衣而取天下燔機史記公儀休見布好疾出家婦燔其機恐奪人之利遺盗王烈遺盗布令其改過勸善麻衣如雪曹風一尺漢文帝徙淮南王道死時人歌曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容百匹燕書宋該字宣宏太祖以該性貪賜布百匹令負而歸重不能勝乃至僵頓以愧之懸主人懸布堇父登之及堞而絶之蘇而復上者三主人辭焉乃退帶其㫁布以徇於軍三日春秋襄十年齋必有明衣布也廣狹踈密辨其苦良反女功之始禮曰大祭以䟽布為尚反女功之始蜀布張騫在大夏見蜀布笻竹杖越布後漢陸績祖父閎建武中為尚書令美姿貌著越布單衣世祖見而好之自是常勑㑹稽獻越布露積王幹字子良雖有爵禄若不在己秩俸布帛皆露積腐爛黄潤比筒蜀都賦黄潤比筒籝金所過黄潤細布也贈王戎罰吴南郡太守劉陂十贈戎細布五十端為司𨽻所紏以知而未納不坐帝曰戎豈懷私苟得不欲為異耳然而為清慎者所鄙由是損名紵衣子産獻延陵季子火浣布魏志云漢時梁兾以火浣布為單衣嘗會賔客兾佯争酒失杯而汙之偽怒觧之曰燒之布得火燃如灰凡布垢盡火㓕粲然絜白若用灰水洗中間久絶魏文帝以火性酷烈而無含育之氣必不然之事遂著典論言必無乃刋石於廟門外與石經並至明帝立西域重譯而来獻之於是大臣乃試以示百寮遂滅此論天下笑之矣羲皇作孔子冠羲皇造布孔子作緇布冠與帛同價孟子許行曰布帛長短同則價相若泉天台山有瀑布泉孔衣盧照隣客東龍門山布衣藜羮海西布波西織水羊毛為布曰海西布蔽身西域尼婆羅一幅布蔽身髙昌草髙昌有草名曰白疊纈花可織為布朝霞布南蠻環王真觀時王頭藜獻朝霞布胡女地理志慶州土貢胡女布錦貲泗州土貢錦貲布絲布花布嶲州土貢賜布九萬郭子儀屯絳州時帝已不豫引至卧内帝賜絹布九萬大幅布日本開元初栗由復朝請從諸儒授經詔四門助敎趙元黙即鴻臚寺為師獻大幅布㠿布劉悟傳王釗守洛州給土㠿布一端禎檄代歳廪疊布積水大中末京師小兒疊布積水紐之向日謂之曰枝暈五行志紫絲布明皇十七年真卿問范氏尼曰吾得五品否尼指坐上紫絲布云顔卿彩色如此粗曰貝精曰㲲南蠻環王草吉貝也緝其花為布粗曰貝精曰㲲綾十七白鶴文謝恵連詩客從逺方來贈我鶴文綾五十絲傅元烏先生傳曰舊綾機五十絲為五十躡先生易以十二竒文異變因而作成金縷昔秦國以金縷為綾青衾漢内臣卧青綾被竹根柹蔕馬眼蛇皮已上四種今時綾名紈扇江淹詩紈扇如團月孔官端綾吴綾方丈綾韋堅鑿潭以通漕二年而成帝為登樓召羣臣臨觀堅豫取洛汴宋山東小斛舟三百首貯之潭毎舟署某郡以所産暴陳其上若廣陵則官端綾㑹稽則吴綾吴郡方丈綾船皆尾相銜進數十里不絶禁代宗帝紀大厯六年四月戊寅禁文紗吴綾為龍鳳麒麟天馬辟邪者出綾一端募麥一斗吐蕃賛普始沙州刺史周鼎為唐固守賛普使尚綺心兒攻之都知兵馬使閻朝執鼎殺之自領州事城守者八年出綾一端募麥一斗應者甚衆異綾裴胄荆南節度使是時方鎮争剥下希恩制重錦異綾名貢奉有中使者即悉公帑市歡胄待之有節鳥眼湖州貢鳥眼綾魚口潤州貢水紋方紋魚口繡葉花文紋龜甲溪鶩等綾地理志蔡州上貢四窠雲花龜甲溪鶩等綾立鵞天馬盤絛掬豹李德裕敬宗立詔索盤絛繚絞千疋復奏言立天鵞天馬盤絛掬豹文彩怪麗怪乗輿當御今廣用千疋臣所未喻犒軍韓滉劉元佐不朝帝宻詔滉以綾二十萬犒軍龍油綾唐杜陽編貢龍油綾紋彩尤異入水不濡濕云有龍油故也𤣥綾樵人指說樂天飛雲履𤣥綾為質完封不發韓思復永淳中家益窶歲饉京兆杜瑾以百綾餉思復思復方併日食而綾完封不發請借左藏庫綾萬匹五代王峻請借左藏庫綾萬匹太祖勉從之十様花紋綾地理志越州土貢絺綌十八白為絺為綌詩曰葛之覃兮施于中谷是刈是穫為絺為綌服之無斁葛之覃兮見上絺兮綌兮凄其以風當暑紾絺綌必表而出之論語蕉葛升越弱於羅紈夏日葛衣堯儉衣葛嘗苦寒葛屨紏紏葛屨可以履霜履霜之屨見上削𤓰之巾為天子削𤓰者副之巾以絺為諸侯削𤓰者華之巾以綌掌葛周禮掌葛以時徴絺綌之財蒙彼縐絺葛之美者荃葛漢書江都王建遣通越閩侯遺建荃葛注荃葛細布字作銓紾絺綌不入公門禮暑服月令孟夏天子初衣暑服注云絺綌孔采絺不御烈女盧惟清妻徐惟清貶播州尉徐采絺不御不服紉絺和政公主諸子不服紉絺氷雪之交衆裘我絺文粹栁宗元愚谿對絺而清栁宗元八駿說圓首横目食穀而飽肉絺而清裘而燠一也九月猶絺綌焉知南鄰客九月猶絺綌杜甫遣興詩慣習炎蒸穢絺綌同上苦寒黄葛生洛溪黄花自緜羃青煙蔓長條繚繞幾百尺閨人費素手採綴作絺綌又暑服莫輕擲李白葛篇冬暖更纎絺杜甫書懐治絺葛供女事栁宗元饒娥廟碑纎葛絺紵克供以脩同上麻十九白藝麻如之何横縱其畒漚麻東門之池可以漚麻漚紵東門之池可以漚紵漚菅左傳拘鄫人漚菅者曰何故使吾水滋邱中有麻蓬生麻中不扶自直如雪之衣麻衣如雪黂實爾雅黂枲實枲麻也黂音墳藝之於畝漚之於池是刈是穫載紡載績八月載績有條而不紊化理絲枲枲麻也典枲周禮典枲掌布絲縷紵之麻草之物以待時頒功而受齎及獻功受苦功以其賈掲而藏之以待時頒五原後漢五原宜麻枲崔寔為太守斥賣儲跱作紡績織絍練緼之具爭漚石勒與李揚争漚麻池相毆擊孔給麻二車􅅬王元嬰帝嘗賜諸王綵五百以元嬰及蔣王貪黷但下書曰滕叔蒋弟不須賜帛給麻二車助為錢緡二王大慙紛麻獨孤及上䟽曰百揆隳刺如沸粥紛麻三斤為唐百官志織染署麻三斤為綟緫髪李少良傳大厯八年有晉州男子郇謨以麻緫髪行哭長安東市人問之曰我有字三十欲以獻上樊鄉換麻雲仙散録字錦曰有人収得虞世南與圓機畫紙剪開字二賣之至樊鄉一字得麻一斗麻㝠㝠失路麻㝠㝠韓愈詩髙如墉劉餗嘉話蔡州紫極宫階前種麻生髙如墉道士葺為藩屏其醮日霹靂屏下忽有狸迹尋之上屋蹤大如馬蜀麻久不来杜甫客居詩蓬心頼倚麻栁宗元詩蓬心賴倚麻踈麻方寂歴栁宗元田家詩庭際秋蟲鳴踈麻方寂歴舟楫通鹽麻杜甫柴門行楚人四時皆麻衣詩學士閤麻生梁相國鄭珏與李相國愚同為楚人一日鄭閤子下有一麻生李曰承㫖入相矣乃指麻視鄭曰天命也時亢陽其麻茂盛若髙丈餘如雨露之徧滋暨霜降成實乃白麻也李賀鄭曰必然矣是夜制出鄭果登庸紀異縠二十白細如霧子虚賦鄭女曼姬垂霧縠徐歩洛神賦云動霧縠以徐歩輕如煙沈休文詩長煙引輕素言如縠之状孔輕明唐文粹崔融啓母廟銘曰羅縠輕明繒縠地理志河南府土貢繒縠白縠唐絳州土貢白縠輕容生縠唐地理志越州貢輕容生縠中官不衣唐車服志中官不衣紗縠綾羅曼姬始縠唐文粹王維逍遥谷讌集序曼姬始縠白孔六帖卷八
