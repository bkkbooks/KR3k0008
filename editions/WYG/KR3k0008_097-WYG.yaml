body:
  text: 白孔六帖卷九十七唐白居易原本宋孔傳續撰虎一象二獅子三犀四駱駝五熊六狼七豹八鹿九麋十狐十一兎十二猿十三驢十四虎一白於音烏莵音徒楚人謂虎於莵猛噬從風挐攫哮闞火檻切咆哮𤓰牙鉤瓜鋸牙鮮食食鮮肉也眈眈之視逐逐之欲不義自斃雖猛何為渡河劉琨為𢎞農守有異政虎乃負子而渡河去鬪刺卞莊子刺虎管堅子止之曰兩虎方食牛牛甘必争闘則大者傷小者亡從傷而刺一舉必有兩獲莊子然之果獲二虎鬪藺相如曰今兩虎闘勢不俱全苛政猛於虎孔子過太山聞婦人哭子問之曰吾舅與夫及子俱死於虎子曰何為不去曰無苛政孔子曰苛政猛於虎夢澤之乳令尹子文初生棄於夢澤虎乳之楚人謂乳為榖奴斗反謂虎為於莵命之曰鬪榖於莵徒搏暴虎馮河死而無悔者吾不與也蹈尾心之憂危若蹈虎尾編鬚莊子掩虎頭編虎鬚幾不脫虎口履尾易曰履虎尾不咥人亨咥人見上措爪老子曰善攝生者虎無所措其爪傅翼擇肉為虎傅翼將飛入邑擇人肉而食虎兕出於柙是誰之過與畫馬援戒兄子曰畫虎不成反類於狗也人化淮南子曰牛哀病七日化為虎其兄入視哀摶而殺之思𤣥賦曰牛哀病而化虎雖逢昆而必噬遺患張良曰所謂飬虎自遺患也謂漢不取楚委肉侯嬴曰譬如委肉於餓虎之口狐假江乙謂楚莊王曰狐假虎威斬周處斬南山白額虎以除害也拉虎摧班七啟云云感孝而存樹呪刀黃公呪赤刀伏白虎養虎不以生物與之謂其有殺之怒不以全物與之謂其有決者也報恩晉郭文嘗有虎忽張口向文文視其口有横骨乃以手探去之虎至明日乃獻一鹿於堂前殺害人者童恢者字漢宗為太守有虎害人檻捕生得二虎恢祝曰殺人者當垂頭非者當號吼稱寃於是一虎低頭閉目如懼即時殺之其一鳴吼自奮遂放之投譛人詩取彼譛人投畀豺虎豺虎不食投畀有北大寒之日虎始交月令熊虎之狀傳楚司馬子良生子越椒云云䝉皮傳城濮戰晉胥臣蒙馬以虎皮先犯陳蔡奔楚右師潰虎豹之鞹猶犬羊之鞹語七月而生家三九二十七主星虎七月而生猛虎行文陸機猛虎行渴不飲盜泉水熱不息惡木隂軒鬐靈光殿賦奔虎攫拏以梁倚仡奮舋而軒鬐仡魚乙切女子搤異苑楊豐為虎嚙有女年十四手無刀刃直搤虎頭免父難言市有甘茂曰今有一人言市有虎信之乎曰二人言由疑三人言信之今讒臣豈非三人乎色白抱朴子曰鼉之為虎牛哀成虎壽千嵗五百年色白也文炳蜀志夫虎生而文炳豈以彩自飾畫哉性自然也放虎自衛先主入蜀至巴郡嚴顔拊心而歎曰此所謂坐空山放虎自衛隂精魏志夫虎隂精而君子隂依木長嘯疑而注矢訝飛將之雄大人虎變象曰其文炳也勇者不懼人之所畏風嘷雨嘯乳血飱膚皃足畏色足憚煥乎執文執雕虎以拭虎也虎嘯而谷風生孔虎不為暴韋璪徙西河太守屬邑多虎前守設檻穽璪至徹之而虎不為暴虎入宣陽里建中三年九月己亥夜虎入宣陽里傷人二詰朝獲之五行志猛虎行草木偃宋子嵩化書狂怒萬變不能免於柙同上移文嶽神顧少連補登封主簿邑有虎孽民患之少連命塞陷穽獨移文嶽神虎不為害哮躍山林裴度朱克融執賜衣使者楊文端帝怒患之欲遣重臣臨慰度曰克融無恚而悖是將亡譬猛虎自哮躍山林憑窟穴則然勢不得離其處人亦不為懼矣霍山李紳遷除夀二州刺史霍山多虎擷茶者病之治機穽發民跡射不能止紳至盡去虎不暴南山白額吉温嘗曰若遇知己南山白額虎不足縳搏虎鍾傳少射獵醉遇虎與闘虎搏其肩而傳亦持虎不置㑹人斬虎然後免既貴悔之戒諸子曰士處世尚智與謀勿效吾暴虎也乃畫摶虎狀以示子孫盜請格虎元徳秀為魯山令㑹虎為暴盜請格虎自贖許之吏曰彼詭計且亡去無乃為累乎徳秀曰許之矣不可負約即有累吾當坐不及餘人明日盜尸虎還舉縣嗟歎真虎裴旻以龍華軍使守北平北平多虎旻善射一日得虎三十一休山下有老父曰此彪也稍北有真虎使將軍遇之且敗旻不信怒馬趍之有虎出叢薄中小而猛據地大吼旻馬辟易弓矢皆墮自是不復射藜藿不採吴兢曰猛虎在山林藜藿為之不採忠諫之有益如此擇肉於人李翰射虎圖賛云北平連山廣野地實多虎擇肉於人有如飛翼鋸牙鈎爪雷聲電視同上虎子五代吴越柱建徽稜子也治軍嚴整累從征伐未嘗介甲所至輒有功軍中謂之虎子周虎子十國紀年五代吴周本少倜儻有猛虎為暴本與二兄往視之遇於篁竹間奮躍前搤虎喉二兄同擊之虎敗死於穴由是知名初仕宣州趙鍠常衣緋衫褌持劒出入行陣軍中壯之後與楊行密戰被執行密曰吾久聞周虎子之名恨見之晚釋縳以為裨將虎殺人酉陽雜俎虎殺人能令屍起自解衣方食之虎之饑下巉巗杜詩虎連里閭隄防舊風俗同上有手莫辮猛虎鬚李白虎行風捷獵元稹大雲寺射虎於武徳北山太宗本紀旅次于小安山有虎知禁若得爪牙之利必昬黒摚突杜牧課伐木序飛虎子李克用年十五從征摧鋒陷陣出諸將之右軍中目為飛虎子鄭家羣虎五代鄭元弼父昌士博學善屬文有子八人皆以詞學號鄭家羣虎元弼最長尤雋爽文采遒麗下筆成篇呼號搏虎劉餗進歙州刺史野媪將為虎噬幼女呼號搏虎俱免百獸畏段秀實曰猛虎所以百獸畏者為爪牙也若去之則犬彘馬牛皆能為敵入元載家廟大厯四年虎入京師長壽坊宰臣元載家廟射殺之虎西方之屬威猛吞噬刑戮之象唐五行志黒虎王以錦城兵寇命閭邱方逺建下元金籙齋於東府龍瑞宫有黑虎一蹲宫前醮罷失之吴越備史倒石人前尋陽山上有石人髙丈餘虎至此輒倒石人前酉陽雜俎虎威如乙字長一寸在脇兩旁皮内尾端亦有之佩之臨官佳無官人所憎嫉見上夜視虎夜視一目放光一目看物獵人候而射之光墜入地成白石主小兒驚假虎翼而責其搏人裴炎賛異乎炎之暗于幾也知中宗之不君不知武后之盜朝假虎翼而責其搏人死固宜哉虎鬚治齒許隠齒痛求治鄭曰唯得虎鬚及熱挿齒間即愈即為拔數莖與之因知虎鬚治齒也酉陽雜俎寅年足虎􅓔白居易詩磨牙皓秋霜李白北上詩猛虎又掉尾磨牙皓秋霜虎鞹李賀虎鞹先蒙馬黒虎入觀天寳中河南緱氏縣仙鶴觀毎年九月二日夜有一道士得仙其夜皆不扄户以求上昇之應後張竭忠攝令疑之至時乃令二勇者以兵器潜覘之至三更後見一黒虎入觀湏􅁷衘出一道士二人射之不中棄而往竭忠申府請弓矢大獵于太子陵東石穴中格殺數虎或金簡玉籙或冠帔人髪甚多出傳異志象二白南山之美者有犀象焉云云象有齒以焚其軀傳燧尾傳曰吴伐楚王使執燧象以奔吴師注燒火以繫象尾使驚奔吴師泣子莊子象見子皮無逺近而泣身毒之戰大宛傳身毒國人乗象以戰昆陽之陣王莽與世祖戰昆陽驅羣象周驅周公驅羣象而逺天下恱之越致晉時南越致馴象令駕車黄門鼔吹數十人毎正朝㑹皆入充庭帝行則前導引垂鼻轔囷刻舟以秤魏太祖欲知象輕重而不可秤少子蒼舒曰置象以舟刻其水痕而以土實則知其數也帝悦之教習外國傳扶南王少而雄傑生捕大象而取之教習乗騎諸國聞之皆伏夢後漢張茂夢大象問萬推推曰象者獸也獸者守也君當為郡然不能善象有齒以焚身後皆如其言孔阜孔碩既閑既佶馴象竒獸拜跪成帝六年林邑王獻馴象而能拜跪獻魏江表傳曰孫權獻馴象二頭於魏國也揺光散而為象運斗樞曰垂鼻流泣晉時南越獻象作車帝行以象導引以試橋梁後象以鼻害人有司祝之而殺象垂鼻而泣不敢動後朝議以象無益於事悉送還逸才之獸相如諫獵云云五歳一乳説文云云日南地理志九真郡及日南饒之哀雌張華博物志曰南方有象各有雌雄其一雌死百有餘日泥土著身獨不飲食長吏問其所以輙流涕若有哀之情狀行孕文白象行孕垂鼻出骼出象骼象讃郭璞象讃曰象金魁梧骼巨皃詭肉兼十牛目不踰豕蛇吞楚詞曰一蛇吞象蛇大若何藏牙役鼻沈懐逺南越志曰象牙長一丈餘脱其牙則藏之削木代之可得不爾則窮其主得之乃噬也鼻為口使萬震南州異物志曰象之為獸形體特詭鼻為口使望頭如尾馴良承教聽言則詭服重致逺行如邱徙天竺戰蒼梧耕世紀曰舜葬蒼梧之野有羣象為之耕師子擊宗慤字充幹與林邑王戰泛海迷入象浦林邑王范陽邁傾國來坐以其裝象前無際慤曰吾聞外國有師子威服百獸乃制其形相禦之象果驚奔賊衆因潰亂乃奮擊陽邁逆走遂克林邑收其珍異皆是未名之寳也素牙玉絜孔非土性不可畜魏謨詹毗國獻象謨以為非土性不可畜請還其獻詔可不弛鞍天竺國武徳中國大亂王尸羅逸多勒兵戰無前象不弛鞍有罪者使象踐之南蠻環王衛兵五千戰乗象率象千馬四百分前後不設刑有罪者使象踐之戰以百象為隊盤盤毎獸以百象為一隊一象百人鞍若檻四人執弓鞘在中擢象之齒舒元輿擢象之齒見自舉門馴象真臘徳宗初即位蠻夷所獻馴象畜苑中元㑹充庭者凡三十二悉於荆山之陽野象贍博多野象羣行駕車南蠻環王以象駕車如牛茫蠻象纔如牛飬以耕拜舞中音律明皇雜録上毎賜酺御樓引大象犀牛或拜或舞動中音律首垂四牙酉陽雜俎咸亨二年周澄國遣使上表言訶加國有白象首垂四牙身運五足象之所在其上必豐以水洗牙飲之愈疾請發兵迎取象性久識舊説象性久識見其子必泣一枚重千斤釋氏書言象七支柱地六牙牙生理必因雷聲同上龍象六十歳骨方足今荆地象色黑兩牙江猪也毛竒毛竒親象犀韓愈同宿聯句陷陂湖吴越備史錢俶天成三年東陽有大象自南方來陷陂湖而獲之妬惡犬聲酉陽雜俎南人言象妬惡犬聲獵者裹糧登髙樹創熊巢伺之有羣過則為犬聲悉舉鼻吼叫循守不復去或經五六日困倒其下因潛殺之象孕五歲始生同上山腹雨餘添象跡柳宗元嶺南江行詩野象埋牙劚石磯元稹送崔侍御鳴珮剡爚杜甫太廟賦象不敢去而鳴珮剡爚以星羅野象羣暴西域迦摩其東南多野象羣暴故戰用象軍有戰象五千良者飼以肉真臘鼻端有爪象鼻端有爪可拾針酉陽雜俎食象肉令人體重同上象一給二丁唐六典典廐象日給藁六圍稻菽各三斗鹽一升同上探牙象口李白大獵賦舞象嶺表録異蠻王設漢使於百花樓前設舞象曲動樂即倡優引入一象以金覊絡首錦襜垂身隨拍膝踏動蹄頭揺尾皆合節奏即舞馬之類野象牙小而紅堪為笏同上楚越之間象皆青黑惟西方拂菻國大食國多白象同上師子三白狻猊如虥猫食虎豹也安息漢章元年安息國獻獅子形似麟而無角烏弋漢烏弋國有師子似虎正黄尾端大如牛成敬則之夢齊書王敬則夢騎五色師子位至太尉也破林邑之軍宋書見象門注神獸竒獸毛羣之長逸才之獸虓呼交切説文曰師子也狻猊爾雅曰狻猊如虥猫食虎豹郭璞曰即師子也虥在姦反日走百里穆天子傳狻猊云云在西海海上十洲記聚窟在西海中申未地面各三千里北接崑崙二十六里有師子辟邪鑿齒天鹿牙銅頭鐵額獸也獻後漢孝宣帝章和元年月支國使獻扶祓師子又孝順帝陽和四年夏䟽國獻􅈊牛師子服狸擊象張華博物志魏武伐冒頓經白狼山逢師子使格之殺傷其象見一物從林中出如狸上帝車軌上師子將至便跳上師子頭師子伏不敢起遂殺之得師子還至四十里雞犬皆無鳴吠又宗炳師子擊象圖序曰梁伯王記沙門釋僧吉云嘗從天竺欲向大秦其間忽聞數千里外哮哮檻檻驚天怖地頃之但見百獸率走蹌地足絶既而四巨象俄焉而至以鼻卷泥自厚塗數尺數數噴鼻偶立有師子三頭崩石折木輒見於山蹴之直搏四象以殪盤石血若溢泉巨樹草偃也毛淺若虥尾大如斗爾雅曰虥淺毛下見上注賦虞世南師子賦曰有絶域之神獸因重譯而來擾其為狀也則筋骨糾纏殊姿異制濶臆修尾勁毫柔毳鉤爪鋸牙藏鋒蓄鋭弭耳跪足伺間借勢暨一呼而奮鬛䑛脣倐來忽往怒目電曜發聲雷響拉虎吞貔裂犀分象碎隨兕於斷腭握巴虵於指掌踐籍則林麓惟殘哮呼則江湖振蕩復猜心與猛氣遂感徳以依仁伺百獸之率舞共六擾以來馴斯則物無定性從化如神譬鱗羽變質於江海金錫成器於陶鈞孔停獻姚璹大食使者獻師子璹曰是獸非肉不食自碎葉至都所費廣矣陛下鷹犬且不畜而厚資養猛獸哉有詔大食停獻天竺濵海出師子獻師子總章間訶毗施王捺塞獻師子命虞世南作賦西域康者遣使獻師子獸帝珍其逺命秘書少監虞世南作賦毛羣之特張九齡師子賛序天骨雄詭材力傑異得金精之剛為毛羣之特怒猊徐浩善書世狀其法曰怒猊抉石樂趙宗儒守太常卿太常有五方師子樂非大朝㑹不作帝嗜聲色宦官領教坊者乃移書取之宗儒不敢違馴養西域師子能馴養師子因以名國黒師子酉陽雜俎西域有黒師子捧師子師子尾拂集賢校理張希復言舊有師子尾拂夏月蠅蚋不敢集其上同上筋為絃鼔之衆絃皆絶釋氏書言師子筋為絃鼓之衆絃皆絶同上剪百花裝師子元相送遺曲江春宴録濕耳師子西明慈恩多名畫塔前壁濕耳師子時所重也南部新書近井哮吼開元末西國獻師子至安西道中繫於驛樹近井哮吼若不自安俄頃風雨大至有龍出井而去雞跖頃有至自南海厥繇西極獻其方物而師子在焉爾雅所謂狻猊如虥猫食虎豹今之所見信然絶猛者也仡立不動而九牛相去眈視且噴則百獸皆伏所以肉視犀象孩撫熊羆其餘𤨏細不置牙齒故其受羈絏伏閑皁馴而為用鋒莫可當張九齡師子賛陸探㣲畫師子潤州甘露寺有唐李衛公所畜陸探㣲畫師子板使工人模置師子堂中圓其目昂其鼻奮髯吐舌威見齒舞其足前其耳左顧右擲喜見尾雖猛而和葢其戲置之髙堂䕶燕几嗚呼妙哉犀四白梁山之美爾雅南方有梁山犀象焉駭雞之寳犀角通天之珍亦角獻於紂韓詩外傳太公使南宫适至義梁得駭雞犀以獻於紂驅於周孟子曰周公驅犀象逺之天下大恱刻石蜀記水為害蜀守李氷作石犀五枚沈於江中以厭水精馳烏弋之名摽黄支之美皆出犀處捩角蜀都賦曰捩犀角尚多傳犀兕尚多棄甲則那竒獸逸才之獸豕形如豕形如水牛豬頭大腹庳脚三蹄黒色二角一在鼻一在額鼻上食角也小而不隳食榆棘獻史漢平元始三年黄支獻犀巴浦之犀其可遇乎水開田球子曰得通天一尺刻作魚衘入水水開三尺孔通天犀南蠻環王鎮龍立獻通天犀墮和羅墮和羅多美犀世謂墮和羅犀拔犀之角舒元輿拔犀之角見自舉門竒犀五代占城獸之竒犀辟寒犀開元遺事開元元年冬至交趾國進犀角一株色如金使者請以金盤置於殿中温然暖氣襲人上問其故使者對曰此辟寒犀也文犀邱和拜交趾太守林邑西諸國數遺文犀秃角犀杜悰未嘗薦進幽隠佑之素風衰焉時號禿角犀卧魚犀北夢𤨏言楊收女適裴坦長子嫁資豐厚坦尚儉聞之不樂一日與夫人至新婦院䑓上視菓楪乃卧魚犀遽拂袖出夜明犀杜陽編敬宗寳厯元年南昌國進夜明犀其狀類通天夜則光明可照百步覆繒千重終不能掩其輝煥上令解為腰帶毎遊獵夜則不施蠟炬有如晝日辟暑犀文宗延學士於内庭李訓講周易時方盛夏上命取辟暑犀以賜雙龍犀大中初女蠻貢雙龍犀有三龍鱗鬛爪角悉備蠲忿犀同昌公主帶蠲忿犀犀株如彈入土不朽帶之令人蠲去忿怒黒暗波斯謂犀為黒暗酉陽雜俎犀之通天者必惡影常飲濁水同上取犀先於山路多植木如狙􅍻云犀前脚直常倚木而息木爛折則不能起同上犀牛一名奴角有鴆處必有犀響犀杜陽編宫人沈阿翹自言吴元濟之女進白玉方響言其槌則響犀也凡物有聲乃響花犀班犀唐車服志諸親王朝賀宴㑹之服一品二品服玉及通犀三品服花犀班犀貞元之歲貢馴犀上林置圏官司養元稹馴犀詩貞元之歲貢馴犀上林置圏官司養養玉盆金棧非不珍虎啖狴牢魚食網水犀唐太真外傳虹霓屏風以玳瑁水犀為匣張易之為母為犀簟五行志搜家所蓄珍犀投江中李勉嶺南節度使被召至石門盡搜家人所蓄珍犀投江中犀角通者是其病酉陽雜俎或云犀角通者是其病然其理有倒挿正挿腰鼔挿倒者一半已下通正者一半已上通腰鼔者中㫁不通墮角埋之劉孝標言犀墮角埋之以假角易之同上鎮帷犀杜牧詩金盤犀鎮帷駭雞犀為上瑞唐六典禮部犀大約似牛而蹄脚似象二角一在額上為兕犀一在鼻上差小為胡㡌犀鼻上者皆裙口束而花㸃小多有竒文枯犀小二甬皆謂毛犀俱有粟文堪為帶事見嶺表録異辟塵犀為婦簮梳塵不着髪同上辟水犀行於江海水為開置霧露經夕不濕同上脱角犀頂李白獵賦慮傷物性山南西道觀察使奏渠州犀牛見差官押赴闕庭既至上於便殿閲之乃於月華門外宣示百官上慮傷物性命使中使押還本道放於渠州之野奏記駱駝五白負千斤山海經曰號山陽光之山其獸多橐駝若流沙日行二百里負千斤任重致逺孔阜阜大也旣閑閑習也鬬東觀漢記單于於龍祠中鬬槖駝為樂竒畜見郭璞賛出泉渠本出云云一封漢書大月氏本行國也出一封槖駝注脊上有一封封髙也若封土然實外廐史蘇秦説楚成王王誠能用臣愚計則燕代槖駝良馬必實外廐也鄯善漢鄯善多石駝異域志西南夷國山上有石駝腹下出水飲之令人身白浄衘尾入塞知風候識泉源知水脈郭璞橐駝賛曰駝惟竒畜肉鞌是被迅騖流沙顯功絶地潜識泉源徴乎其智又張華博物志焞煌西渡流沙往外國步千餘里中無水時沃流處人不能知皆乗橐駝知水脉遇其處停不肯行以足蹋地人於蹋處掘之得水量力而行孔助軍田縉拜夏綏銀節度使王師伐蔡縉上橐駝牛馬助軍獨峯駝吐蕃賛普其獸獨峯駝日馳千里羸橐駝給行回紇大厯三年光親可敦卒以兵部侍郎李涵持節冊拜可敦是時財用屈税公卿羸橐駝給行收橐駞數千張光晟勤兵盡教回紇羣胡收橐駝數千望柳橐駝朝野僉載曰天官侍郎吉頊長大好昻頭行視髙而望逺郎中張元一目之為望柳橐駝王槖駝北夢𤨏言五代蜀龍州軍事判官王延鎬頎然而長書扎飲博觸事不能時號王槖駝以橐駝耕五代回紇以橐駝耕而種飛龍駝食貨志貞元初闗輔宿兵以飛龍駝負永豐倉米給禁軍載珍寳史思明賊之陷兩京嘗以橐駝載禁府珍寳貯范陽若邱阜然鬬駝卜歳西域龜兹歲朔鬭橐駝七曰觀勝負以卜歲盈虚白橐駝五代四夷附録晉軍擊契丹大敗徳州䘮車騎一白橐駝而走駝牛豹南蠻室利佛逝有橐駝豹文而犀角以耒且耕名曰駝牛豹駝性羞酉陽雜俎廬山精三水小牘劉秉仁為江州刺史自京將橐駝至郡放之山下野人見而大驚共射之乃以狀白州曰獲廬山精於某處劉命致之乃所放駝耳明駝明駝千里脚鳴當作明謂駝卧屈足腹不著地而漏明者最能行逺雜俎載實駝鳴􅕫韓文聯句獻駝馬則陳于朝堂唐百官志金駱駝五行志神龍以後民謡曰山南烏鵲窠山北金駱駝䥥柯不鑿孔斧子不施柯山南唐也烏鵲窠者人居寡也山北羌也金駱駝虜獲而重載也埋鼻沙中吐谷渾西北有流沙數百里夏有熱風傷行人風將發老駝引項鳴埋鼻沙中人候之以氊蔽鼻口乃無恙風脚駝洽聞記于闐有風脚駝日行七百里其疾如風駝牛騾各四給一丁典廐令凡駝牛日給藁各一圍同上駝鹽三合同上駝之羣以七十熊六白帝師之兆周文王卜獵曰非熊非羆天遺帝師乃太公吕望也男子之祥詩吉夢維何惟熊惟羆男子之祥射史記趙簡子病五日及寤曰我之帝所見一熊欲攫我帝令射之中熊熊死滅二卿之象冬蟄説文曰熊居山春出冬蟄如熊如羆武王誓師夢晉侯夢黄熊入寢問子産曰其何厲也子産曰昔堯殛鯀于羽山其神化為黄熊夏祀之得人則止漢元帝時幸虎圏有熊云云上問昭儀昭儀曰猛獸得人則止冀不及乗輿帝歎之批熊碎掌七啓曰食蹯楚太子以宫甲圍成王王請食熊蹯而死不聽乃縊死注熊蹯難熟冀外救也宰夫胹晉靈公不君使宰夫胹熊蹯不熟殺之寘諸畚遂使婦人載以過朝也孟軻所欲孟子曰魚我所欲也熊掌亦我所欲也二者不得兼捨魚而取熊掌似子越椒傳楚司馬子越椒熊虎之狀而豺狼之聲赤熊瑞應孝經援神契赤熊神靈滋液百珍寳用有赤熊見也黄熊瑞獸也周文王拘於羑里散宜生得黄熊獻紂免西伯之難又周書王㑹成時東胡獻黄熊𤣥熊蚺䗊上天念反下七壍反靈光殿賦𤣥熊蚺䗊㫁齗却負戴而蹲跠齊首目以瞪眄徒脈脈而獼獼蚺䗊視皃五百歲蟄獸熊羆之屬周禮云云逸才之獸孔晝入揚州五行志開元三年有熊畫入揚州城熊膽丸柳仲郢母韓善訓子故仲郢幼嗜學嘗和熊膽丸使夜咀嚥以助勤登樹自擲文粹招北客文寒熊孔碩登樹自擲見人則擘相王晙時謂為熊虎相六雄將軍張瀆宣室志張鋋歸蜀次巴西有人拜曰巴西侯奉邀既見置酒邀六雄將軍至有六人皆黑衣贔然其狀天將曉鋋悸寤見巨熊卧于前者所謂六雄將軍也烏熊南蠻東謝蠻貞觀三年其酋元深入朝冠烏熊皮熊經謂以前足憑木而立吕延濟注文選笛賦狼七白跋胡㚄尾狼跋其胡載㚄其尾美周公也詩衘鉤湯時有白狼衘鉤入朝以為祥瑞當路漢張綱為御史充八使之數綱埋輪於都亭曰豺狼當路安問狐狸遂劾梁冀也野心楚子良生子越椒子文曰豺狼之聲不殺必滅若敖氏諺曰狼子野心其可畜乎傳冬獻周禮獸人冬獻狼注時之味也狼去膓不堪食禮兩狼詩齊哀公好田獵並驅從兩狼兮揖我謂我臧兮白狼瑞應曰白狼金精也有力爾雅牝熊其檄絶有力似犬選宣王得白狼而戎狄賔狼白狼鋭耳頭白也逐羣羊史譬使豺狼之逐羣羊也嚙宫人江都易王非卒子建立宫人有過縱狼嚙殺之觀以為樂乳烏孫烏孫昆莫棄於野狼乳之時初生也衘王懿衣宋王懿字軍徳義兵窘迫暴雨洪潦不知津梁有一白狼至前仰天而號訖衘王懿衣因渡隨之得濟也三百歲抱朴子曰狼壽三百歲則解暫變化為形入咸市洪範五行傳秦時狼入咸市也知殷興白狼知殷家之興孔馴墓程袁師母終負土築墳常有白狼馴墓虎子狼孫舊史李寳臣王武俊王庭奏及其子孫賛曰鵂鶹為怪必取其昬人君失政為盜啓門牙旗金鉞虎子狼孫茫茫黔首於何叫閽晝入軍門五行志永徽中河源軍有狼三晝入軍門射之斃白狼見調露元年十一月壬午秦州神亭治北霧開如日初耀有白鹿白狼見滄浪君張清宣室記張鋋巴西侯置酒邀滄浪君至一人衣蒼其質魁岸天將曉鋌悸寤見一狼卧于前葢所謂滄浪君也狼噬王鉷林甫方興大獄憾東宫誅不附已者以鉷險刻可動以利故倚之使鷙擊狼噬羣嘷郭子儀奏洛陽井邑如墟豺狼羣嘷狼狐入城髙麗虜仍薦飢狼狐入城一彪一狼龍朔中楊思𤣥恃外戚典選多排斥選士為選人夏彪訟之中丞郎餘慶彈奏免官許南陽曰故知楊吏部之敗或問之許曰一彪一狼共看一羊不敗何待南部新書作聲諸竅皆沸酉陽雜俎狽前足絶短毎行常駕兩狼失狼則不能動故世言事乖稱狼狽狼糞煙烽火用之煙直上也手弛檻緤縱虎狼崔植賛手弛檻緤縱虎狼焉日而亡地數千里為天下笑一狼子豽孫李商隠元結集序狼子豽孫競而跳走白狼為上瑞六典禮部神山民妻晉州神山民黄張妻忽夢一黄褐人腰腹甚細留淫之兩接而去遂姙娠好食生肉䑛脣咬齒而性狼戾生二狼生即走其夫擊殺之稽神録豹八白隱霧陶答妻曰南山有𤣥豹隠霧雨而十日不下食君子之變易曰君子豹變其文蔚也赤豹楚辭曰乗赤豹兮從文貍為罪韓子狄人獻𤣥豹皮於秦秦文公受皮而歎之曰以皮之美自以為罪也虎豹之鞹文蔚爾雅西方之美有文蔚之皮焉在檻穽莊子虎豹在檻穽之中揺尾而求食即谷山瑞應幽都即谷山上多𤣥豹獻宣王時錫韓侯退其豹奄受北國因以其獻赤豹也落落吴都賦云掠虎豹之落落居處也窺晉管中窺豹時見一班也裘管子曰武王侈靡命貂襜豹裘方得入廟故豹皮曰千金功臣之家糶千鍾米得一豹皮與鼷䑕同威韓子虎豹不用爪牙與鼷䑕同威炳蔚文心虎豹以炳蔚凝姿水豹駭人其駭人也可畏呀可畏也勇者不懼孔三豹王旭時監察御史李嵩李全交皆嚴酷取名與旭埒京師號三豹嵩為赤全交為白旭為黑里閭至相詛曰若違教值三豹韓愈守戒鹿之與豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也瀕海出豹南天竺瀕海出豹文豹吐火羅開元十五年君忽必多獻文豹赤豹骨咄多赤豹停貢豹肅宗帝紀寳應元年建卯月辛亥停貢豹枕五行志韋后妹嘗為豹枕以辟邪五豹將軍出唐宣室志悉縱之徳宗即位放諸國所獻豹豽之類悉縱之舊史獻豹無估則鴻臚定所報輕重諸蕃獻應鶻狗豹無估則鴻臚定所報輕重百官志南山豹李白贈崔宣城我垂北溟翼且學南山豹豹死留皮五代王彦章嘗謂人曰豹死留皮人死留名咆闞柳宗元囚山賦攅林麓以為叢棘兮虎豹咆闞豹隱深愁雨杜甫鹿九白呦呦鹿鳴食野之苹隨車鄭𢎞為臨淮太守行春有兩白鹿馴而隨車擇隂走險古人言曰鹿死不擇隂挺而走險急何能擇掎角戎子駒支曰譬如捕鹿晉人掎之諸戎角之白鹿遊上林古詩逐中原逐鹿中原未知鹿死誰手喻爭天下游姑蘇子胥曰吾見鹿游姑蘇臺言吴亡也野有死鹿白茅純束麀鹿麌麌仙瑞圖黄帝時西王母使乘白鹿獻白環又蘇耽常乗鹿過絶險之地皆能超越乃龍也生致管子告楚人曰為我致生鹿與子致百斤金也指為馬趙髙指鹿示二世曰馬二世曰丞相誤取鹿為馬夏至之日鹿角解月令山鹿荀陸朝事見龍門注感孝丁茂至孝有白鹿來馴遊於墓側充庖居澤不以鹿豕為禮即鹿无虞易曰不取死鹿晉郭文有猛獸殺大鹿於文菴側文以語人人取賣之分錢與文文曰若湏自當賣之所以相語正不爾聞者皆歎之甡甡瞻彼中林甡甡其鹿為幣史古者皮幣諸侯以聘享乃以白鹿皮尺縁以藻繢為幣直四十萬王侯朝覲享聘必以為幣圭璧然後得行也千歲抱朴子鹿千歲滿五百嵗色白瑞王者承先聖度無所大失則白鹿見三角七星伏侯古今注曰漢明帝永平九年三角鹿出江陵兩角間有道家七星符其祖名字鄉里年月存焉遂㫁射獵紫纈捜神記淮南朱氏於田種豆忽見二女姿容甚美著紫纈襦衣裾天雨而衣不濡其臂先挂一銅鏡鏡中見二鹿以刀斫之高九尺古今注和帝十二年豫章得白鹿髙九尺擾墓皇甫山逸士傳曰羅威字徳仁南海畨禺人也母没盡哀墓側白鹿乃馴擾其墓也哺孝子蕭廣孝子傳杜牙至孝母卒傭力營墳結茅墓側牙病實嘗有一鹿衘哺之及牙卒乃掘地埋之踞墳又五襲公世丁憂居廬有鹿毎至襲哭輒踞墳悲鳴孝子傳六月生家四九三十六云為律鹿至六月生養晉陶琰字處静隠士也常養一白鹿以自生有角不能鬬素毳呈霜虞世南白鹿賦或騰或倚文白鹿麕鹿兮或騰或倚劉安招隠求友楚辭飛鳥號其羣兮鳴鹿求其友應嘉賔於雅什偶仙客於上天麃薄交切大鹿也跂跂詩鹿斯之奔維足跂跂致大羅氏致鹿黄衣劉義幽明録曰陳郡謝鯤嘗在一亭中宿此亭從來殺人四更有一人黄衣呼於門外鯤因令申臂於窓中於是鯤即極力掣之臂脱而去明日看乃鹿膊尋血得鹿焉町疃俟俟儦儦呦呦鹿鹿争逸食蒿食芩濯濯騕騕孔以鹿為餉裴寛刺史韋詵沐日登樓見人於後圃有所瘞藏訪諸吏曰参軍裴寛居也問狀荅曰寛義不以苞苴汙家適有人以鹿為餉致而去不敢自欺故瘞之詵嗟異饋鹿裴休有饋鹿者諸生共薦之休不食曰䟽食猶不足今一啖肉後何以繼扶餘之鹿北狄渤海俗所貴者曰扶餘之鹿至京師西市門五行志貞元四年三月癸亥有鹿至京師西市門獲之仁鹿五代東女直多仁鹿羣鹿飾鈴鐶龜兹自素葉水城至千泉他羸二百里突厥可汗歲避暑其中羣鹿飾鈴鐶可狎也白鹿前蜀王建諸州皆言白鹿之瑞夢羣鹿渡水史思明夜驚據牀叱咤優問故答曰我夢羣鹿渡水鹿死而水乾云何俄如偃優相謂曰胡命盡乎食苔回鶻斛薛處人豢鹿若牛馬惟食苔俗以駕車黒尾黠戛斯有鹿黒尾黒尾者似麞尾大而黒蹄有銅鐶胡珦為虢州時獵人殺得鹿重一百八十斤蹄下貫銅鐶上有篆字博物者不能識雜俎毛斑如畫陸紹弟為盧氏縣尉嘗觀獵忽遇鹿五六頭臨澗見人不驚毛斑如畫獵者言此仙鹿也射之不能傷且復不利麑班始力直麚角已蒼然韋應物詩仰首嚼園柳俯身飲清泉同上二鹿隨騶虞五代史王建永平三年五月騶虞見璧山有二鹿隨之由鹿野人摯鹿而至者曰此由鹿以誘致羣鹿風嘷澤而比至日掩山而西没走駭侣於巖煙叫飢麛於澗月吕温賦角芟尾促促張籍山頭鹿鉅鹿侯宣室志鹿腸注酒酒中𤣥曰虢國夫人就屋梁懸鹿腸於半空筵宴使人於梁上注酒於腸中結其端欲飲則解開流於盞中號洞天聖酒將軍羣鹿馴擾禇無量母䘮廬在墓鹿犯所植松栢無量號訴自是羣鹿馴擾不復棖觸鹿嚼豆葉解箭毒白居易禽蟲章注須肉為羮魏元忠武后曰卿累負謗鑠何邪對曰臣猶鹿也須臣肉為之羹爾彼將殺臣以求進臣顧何辜鹿走山林命繫庖廚徐有功曰臣聞鹿走山林而命繫庖廚者勢固自然陛下以法官用臣臣守正行法必坐此死矣后固授之鹿吾名去之沙河安祿山至鉅鹿欲止驚曰鹿吾名去之沙河或言如漢髙祖不宿栢人以佞賊宜春苑鹿津陽門詩上嘗於芙蓉園中獲白鹿惟王山人識之曰此晉時鹿也上異之令左右周視乃於角際雪毛中得銅牌刻之曰宜春苑中白鹿上愈愛長生鹿痩銅牌垂同上白鹿為上瑞唐六典麋十白麗龜傳晉鮑癸逐楚樂伯樂伯射麋麗龜以獻癸乃止龜麋背多春秋莊八年多麋注麋多則害五榖角解仲冬六麋傳楚潘黨逐晉魏錡見六麋錡射以顧獻黨黨乃不逐也介麋傳迹人來告曰逢澤有介麋焉野麋見上注瑞魏畧文帝將受禪有白麋見澤中史若使澤中之麋蒙虎皮人攻必虎也乞角北齊河間守崔謀恃弟暹勢從李繪乞麋角翎羽繪荅書曰翎有六羽飛則沖天麋有四足走則入澤下官手足遲鈍不能追飛捉走以事佞人孔川谷曠深多麋鹿吕元膺拜東都留守畿西南道通鄧虢川谷曠深多麋鹿臨江麋柳宗元曰臨江之人畋得麋麑畜之入門羣犬垂涎揚尾皆來其人怒怛之自是日抱就犬習示使勿動稍使與之戲積久犬皆如人意麋麑相犬忘已之麋也三年麋出門見犬在道甚衆走欲與戲外犬見喜且怒共殺食之方託麋鹿羣同上詩機心乆已忘何事驚麋鹿同上荆扉對麋鹿應共爾為羣杜詩負山多麋突厥頡利帝以虢州負山多麕麋有射獵之娱乃拜為刺史巨麋之牛文粹招北客文巨麋如牛脩角如劒狐十一白莫赤匪狐詩狐死正丘首樂其所生正首不忘本也綏綏詩曰有狐綏綏在彼淇梁又曰雄狐綏綏青丘之獸九尾之端山海經曰青丘之狐九尾仁徳至乃來濡尾易曰小狐汔濟濡其尾汔近也安問張綱事具狼門詐鳴陳涉欲威衆於叢祠中篝火作狐鳴有芃詩曰有芃者狐率彼幽草芃小皃假威具虎門注三徳説文曰狐妖獸三徳者其色中和小前大後死則丘首謂之三徳尾大不掉左傳聽冰述征記河冰合須狐聽而行應娶禹年三十未娶曰吾娶必有應後乃有白狐九尾而應之也一腋千羊之皮不如一狐之腋阿紫名山記曰狐者古之淫婦化為名之阿紫封狐楚辭曰封狐千里大狐健走千里也去首首不可食獲三田獲三狐狐不蠱神獸也出於青丘山音如嬰兒食之不蠱七尾晉録咸寧二年有白狐七尾見汝南獻紂文王拘羑里散宜生之西海之濵取白狐獻紂以免文王黒狐周成王見之𤣥狐山海經武都山有𤣥狐葺首裘史孟嘗君有狐白裘變抱朴子狐壽八百嵗三百嵗即解變為人又郭氏𤣥中記千嵗之狐為淫婦百嵗狐為美女粹白吕氏春秋天下無粹白之狐鬼乗説文妖獸鬼所乗持火管輅傳曰夜有小物如獸手持火以口吹之書生舉刀斫斷視之狐也自後無火也忌犬異苑曰胡道拾自云廣陵人好音樂毉術之事體有臊氣恒以名香自防惟忌猛犬自審死日戒弟子曰氣絶勿令狗見我屍也死於山陽歛畢覺棺空即開不見其屍體時人咸謂狐也𤣥色獻周成白容來晉武瑞周文應夏禹風嘷雨嘯昏見晨趍赴穴穴處假虎為威憑城作固赤氣青翰三徳九尾孔狐鳴於旁李密及即位狐鳴於旁惡之雄狐𤣥宗貴妃楊氏傳韓虢毎入謁並驅道中從監侍姆百餘騎炬密如晝靚粧盈里不施幃障時人謂為雄狐夜艾自捕狐狸劉克明傳帝夜艾自捕狐狸為樂謂之打夜狐賦兩脚狐楊再思張昌宗坐事桓彦範劾免其官再思曰昌宗為陛下治丹此為有功后悦昌宗還官自是天下貴彦範賤再思戴令言賦兩脚狐以譏之夜狐狸鳴沙陁列傳初長安自石門之奔宮殿焚圮及岐人再逆火閭里皆盡宫城昏夜狐狸鳴啼無人跡𤣥丘校尉張瀆宣室志張鋋巴西侯置酒邀𤣥丘校尉至一人衣黑衣天將曉鋋悸寤一狐卧于前葢所謂𤣥丘校尉也向窟嘷哥舒翰曰諺云狐向窟嘷不祥以忘本也狐媚飜覆髙宗后王氏及良娣俄為武后所殺良娣罵曰武后狐媚飜覆至此㜸狐封徳彜賛妖禽㜸狐當晝則伏自如得夜乃為不祥出勤政樓乾元二年詔百官上勤政樓觀兵赴陜州有狐出于樓上獲之五行志紫狐酉陽雜俎野狐名紫狐夜擊尾火出將為怪必戴髑髏拜北斗髑髏不墜則化為人矣通天狐長慶中舉人歌曰欲入舉場先問蘇張蘇張猶可三揚殺我故輦下謂三揚為通天狐出牛羊日厯毛上坌灰漢平陵王墓多狐自穴出者皆毛上坌灰雜俎登木而墜晉天福甲辰嵗公安滄渚民家犬逐一婦登木而墜為犬咬死乃老狐也尾長七八尺南部新書梟狐不神天與之昬宦者傳狐蹲鄭愔狐蹲貴介朝野僉載野犬蜀人號為野犬南部新書金鑷玉壺雜俎魏末有人至狐穴前得金刀鑷玉唾壺垂狐尾唐㑹要賛普臨陣奔北者縣狐尾於首以表其狐之性怯天狐術中有天狐言九尾金色役於日月宫可洞逹隂陽雜俎巨狐鳴噪于庭集異記李揆夏夜宿堂之前軒有巨狐鳴噪于庭乃人立而跳月光逆射久逾垣而去揆甚惡及將曉入朝其日正拜有狐入李承嘉第五行志兎十二白狡兎毚兎三窟馮諼曰狡兎三窟僅得免死云云趯趯詩趯趯毚兎遇犬獲之爰爰詩有兎爰爰得兎忘蹄易守株韓子曰宋人有耕田中有株兎走觸株折頸而死因釋耕守株冀復得之無得路人笑之明視禮兎曰明視感孝後漢方瀦遭母䘮負土成墳種松千株有白兎遊其下又蔡邕廬墓亦有白兎環山戰國策韓盧者天下俊犬也東郭狻者海内之狡兎也韓盧逐東郭狻騰山者五環山者三兎極於前犬疲於後田父無倦勞之苦而獲之也禀星精握斗樞玉衡星發於兎炰燔有兎斯首炰之燔之刻毛後漢梁冀起兎苑刻毛以為識有取者死逐上蔡李斯臨刑謂其子曰思與汝牽黄犬出上蔡東門逐狡兎豈可得乎走平岡沈約詩平岡走寒兎兎去尻棲月魄月中有𤣥兎目赤古今注漢哀帝建平元年山陽得白兎日赤如朱依山基文秋兎依山基㺦􅋟文毚兎㺦􅋟兎走兒跧伏靈先狡兎跧伏樹側遊兎園梁王不恱遊於兎園狡兎死良犬烹漢馬名漢吕布所乗馬名赤兎走深山漢夫兎走深山千人競逐以其未定逐麋之狗非顧兎耶䑛雄豪論衡曰兎䑛雄豪而孕及生其子孫從口中出也擾室蔡邕廬墓兎擾其室擣藥和丹枹朴子和女丹以兎而擣藥服之有神女三人來待可役使之舞鎬紀年曰宣王四十年有兎舞鎬射首後漢劉琨授弟子射兎首穴處凌巒越壑穴山東郭之名施罝肅肅兎罝施于中逵充庖之用背飛括地圖天池有獸如兎䑕首以其背飛名飛兎以背上毛飛也孔白兎御史王𢎞義始賤時求傍舍𤓰不與乃騰文言園有白兎縣為集衆捕逐畦蓏無遺内史李昭徳曰昔聞蒼鷹獄吏今見白兎御史廬墓梁文貞廬墓有白兎馴擾射王武俊嘗與賔客獵一日射兎九十五觀者駭伏馮子華廬墓有白兎唐史翦禾豆元稹詩見豆門缺口而長鬚八竅而趺居毛頴傳獨取其髦簡牘是資同上逐兎苑中執失思力帝逐兎苑中思力諫有如兎脫跡安用東西跳韓愈詩赤兎上瑞唐六典禮部白兎中瑞同上姦兎五代周張可復略通儒術少習吏事唐開成初依翟宜威於青州為從事滑稽避事彦威目為姦兎白兎安重誨宿州進白兎重誨曰兎隂且狡雖白何為遂却而不受千萬為羣五行志永淳中嵐勝州兎害稼千萬為羣食苗盡兎亦不復見舞吐蕃傳蕭炅為河西留後虜絶臨洮道炅遣將追尾有白兎舞大破吐蕃獻黒水靺鞨開元天寳間入來獻白兎䜟兎上金床董昌傳昌曰䜟言兎上金床我生於卯明年嵗旅其次二月朔之明日皆卯也我以其時當即位貍斑酉陽雜俎韋絢言巴州兎作貍斑明月兎同上明月兎狀如兎前脚長數寸後脚長尺餘尾長白而彎趫㨗善走出河西衣褐之徒今日所獲不角不牙衣褐之徒毛穎傳一鵰挾兩兎李林甫初三宰相就位二人磬折趨而林甫在中軒鷔無少讓觀者竊言一鵰挾雙兎驚麏游兎在我旁張籍隂類兎隂類也又窟居狡而伏逆象也今白其色絶其羣也韓文毛質全白天馴其心同上迫之不逸人立而拱同上封於卯地毛頴其先明視佐禹治東方生養萬物有功因封於卯地死為十二神嘗曰吾子孫神明之後不可與物同當吐而生已而果然同上明視八世孫䨲世傳當殷時居中山得神仙術能匿光使物竊嫦娥騎蟾蜍入月居東郭者號東郭兎狡而善走與韓盧争能盧不及同上猿十三白置檻淮南子置猿檻中非不巧捷無所肆其能升木無教猱升木注猱猿屬巫峽三聲荆州記曰巴東三峽猿長鳴至三聲聞者垂淚也抱樹號養由基調弓矯矢未發而猿抱樹以號服䑕論衡曰鹿制以伏猿大於鼠鬬狗漢許伯入第宴樂長信少卿起作沐猿與狗鬬舞變吴越春秋越王問劒於處女處女將見王道逢猿公公曰聞子善劒術女子曰願試也公即挽以刺女女舉杖擊之公即上樹化為白猿王張莊子語魏王曰王獨不見騰猿乎其得柟梓豫章攬蔓其枝王張其間造棘刺韓子燕王好㣲才衛人曰臣能於棘刺之端造沐猴及成其術乃逃冠韓生曰人謂楚人沐猿而冠果然亡淮南子楚莊王亡其猿而林木為之殘害言殘林木以求之輕趫騰擲犇林晉書窮猿犇林豈暇擇木騰猿𤣥猿拔箭塞瘡蜀鄧艾見𤣥猿抱子在樹上引弩射之中猿母其子為拔箭卷樹葉塞艾歎曰吾違物性其將死矣乃投水中五月生家語五九四十五故主猿五月生也寒猿擁條吟文𤣥猿嘯而長吟臨崖𤣥猿臨崖命騰趠飛超爭接懸垂攀縁靈光猿狖攀縁而相追朱木淮南猿顛蹷而朱木八百歲抱朴壽八百歲而變引氣繁露曰猿似猴大黒色長臂所以夀好引其氣也􅀈如豹而形似獼猴多鬚奮迅其頭能舉石以磔人好吟能空中輪轉好吟雌為人所得而終不復生通臂孝子傳猿寓屬也或黄或黒通臂脛身善縁也騰虚文猿狖騰虚而競捷響山椒擁條挂飲醜儀孔猿鳥為伍吴武陵遺孟簡書曰子厚之斥十二年且程劉二韓皆已枚拭獨子厚與猿鳥為伍誠恐霧露所嬰則柳氏無後矣嗷嗷柳宗元作懲咎賦曰聽嗷嗷之哀猿不踐土石超遥於萬木之間吴筠𤣥猿賦序云雨昏則無聲景霽則長嘯不踐土石超遥於萬木之間連肱澗飲命侣煙嘯同上弄遊雲之亂飛嬉落日之横照連肱澗飲命侣煙嘯綠楓鳴愁猿李白徳靜以常柳宗元憎王孫文嘯呼羣萃木實未熟相與視之謹既熟嘯呼羣萃然後食同上山公唐異聞録王績遊嵩少選一散嵓石堂績棲止焉月夜見一鬍鬚眉白而瘦稱山公與績談論往往有異績疑其怪取鏡光出而胡者走失化為猿而殞猿執㸑廣異魏元忠素強正其㣲時家貧止一婢厨中方㸑出外汲水還乃見老猿為其守火婢驚白元忠猿執㸑曰猿恐我乏使為我㸑不亦善乎後亦無他巴西侯張瀆宣室志吴郡張鋌罷秩歸蜀行次巴西有人道左出拜曰吾君奉邀乃巴西矦耳既見飲酒命樂夜將半鋌亦假寐將曉悸而寤見身卧石龕中有一巨猿狀如人醉卧于地臂可為笛酉陽雜俎猿臂可為笛吹之其聲圓於竹交臂玉猿隋内庫有交臂玉猿二臂相貫如連環將表其轡上後嘗騎與侍臣遊惡其飾以鞭擊碎之同上清猿斷人腸淹留惜將晚復聽清猿哀清猿㫁人腸游子思故鄉李白詩滅琴聽霜猿答崔少府碎客心君莫向秋浦猿聲碎客心秋浦歌山猿飲相喚杜甫白沙渡或聚而閑棲或分而逈趠吴筠𤣥猿賦裊裊啼虚壁蕭蕭掛冷枝杜甫詩上陽宫猿廣記孫恪娶袁氏女後從南海辟挈家過端州袁欲遊峽山寺云舊老門徒既至若熟其道徑持碧玉環獻僧及齋罷野猿數十聯臂䑓上袁氏惻然題壁不如逐伴歸山去長嘯一聲煙霧深擲筆化去猿追嘯者而去恪驚怛詢僧僧乃言為沙彌時所養開元中力士過此憐其慧強以束帛易之歸獻天子後聞馴擾于上陽宫内碧玉環本胡人所施亦當時隨猿者牽引條上兒飲弄山中月李白秋浦歌檻束哀猿叫杜詩有猿揮淚盡同上殊方日落猿同上報時猿商山隠士髙太素所居曰清心亭毎一時至則有猿啼於庭下謂之報時猿天寳遺事歴千尋之喬木俯萬仞之危嶠吴筠賦踴躍萬變籠中之猿踴躍萬變不能出於籠宋子嵩化書使幽人之思清暢羇客之淚霑襟吴筠猿賦侯氏家弋陽潁川陳巖景龍初舉孝亷於京師至渭南縣見一婦人皃甚殊衣白衣立於路隅掩袂而泣生叩之婦人對曰妾楚人也侯氏子家弋陽先人以髙尚聞於湘楚間由是隠迹山林雖一女子亦有箕山之志驢十四白阮籍所乗晉文帝大視阮籍籍曰願得東平太守帝大恱籍便騎驢到郡十餘日教令清肅却乗驢而返操轡後漢靈帝於宫中駕四驢躬操轡公卿相倣効蹇驢價遂齊良馬服駕楚辭曰驥垂兩耳中坂蹉跎蹇驢服駕無口用多任重致逺長鳴子瑜面吴志諸葛恪父瑾面長似驢孫權大㑹客使人牽驢入題其面曰此諸葛子瑜恪請筆續兩字於下曰之驢舉坐歡笑乃以賜與恪也車張楷公超隱華隂山乗驢車至縣賣藥輦後漢鄧訓用驢為輦母好戴良母喜驢鳴良常作之以樂其母詣劉兆晉劉兆字延世博學受業者數千人嘗有人著鞞騎驢至兆門云欲見劉延世門人大怒白兆兆曰聽前進則倨床問兆經義因為兆辨難兆不能對去不知姓名也孫楚聲晉王濟武子好驢鳴武子死孫子荆來弔之哀甚曰公平生好驢鳴乃上靈牀作驢鳴形體俱似弔客皆笑荆怒曰諸君不死而使武子死乎送葬世説王仲宣好驢鳴將葬文帝臨其䘮顧同遊客曰王府君好驢鳴乃各作一聲以送之客於是各作鳴胡威晉胡威志尚厲操父質為荆州威自京省父自驅驢單行至客舍自放驢取柴薊子訓乗驢車入市後漢向栩興甫狀若狂好被髪跣足騎驢入市乞匄後徴拜趙相時人謂其必脫素從儉而栩更乗鮮車御良馬世疑之蹇疲郭璞云蹇疲驢之仵漢驪何承天纂文曰驢一名漢驪五百歲符子曰有驢仙享年五百歲負乗而不輟厯無定主大驛天下騾父説文騾驢父馬母駃騠馬父驢母也死後漢薊子訓與諸生詣許駕驢車道上過主人驢忽死蟲蛆流出主人遽白訓訓乃安坐飲食畢徐以杖叩之驢遂如初運糧石勒將劉堂以驢千頭運糧祖逖追擊之於汴遇獲之名駒竒畜臧道弔驢文聰敏寛祥髙音逺暢真驢氏之名駒也又匈奴竒畜即驢騾也􅐒爾雅曰驢子曰􅐒音蒙宋袁淑驢山公九錫文砉乃三軍陸運糧餉謀臣停算武士吟歎爾乃長鳴山黨慷慨應官﨑嶇千里荷囊致飡因捷大勲冠古不刋斯實爾之功也音隨時興晨夜不黙仰契𤣥象俯協漏刻應更鳴聲毫分不易雖挈壺著稱未足比徳斯又爾之智也青脊隆身長頰廣額脩尾後垂巨耳雙磔斯又爾之形也嘉麥既熟實維精麫員磨迴衡迅若風轉恵我衆庶神祇獲薦斯又爾之能也是用遺爾中大夫衘勒大鴻臚官亭矦封爾為中驢山公孔角觝敬宗寳厯二年六月甲子觀驢鞠角觝于三殿駃驢入宣政紫宸蘇源明疏曰聖皇巡蜀之初都内財貨吏民財産糜散于道路之中至有乗馬駃驢入宣政紫宸者見京兆尹跨驢不避賈島當其苦吟雖逢公卿貴人皆不之覺也一日見京兆尹跨驢不避謼詰之久乃得釋素服乗驢歸梁五代劉鄩生師範敗降梁從周為具齎裝送鄩歸梁鄩曰降將蒙恩不誅幸矣敢乗馬而衣裘乎乃素服乗驢歸梁道子畫驢盧氏雜説道子訪僧僧不加禮遂於壁畫驢而去一夜家具皆被踏破僧知道子邀到懇求塗畫即止教女伎乗驢擊毬郭英乂拜劒南節度使教女伎乗驢擊毬驢耳李忠臣帝嘗謂卿耳大真貴兆對曰臣聞驢耳大龍耳小帝喜其野而誠夏侯驢子北夢𤨏言曰唐夏侯籍學吟詩遊西川依託勲臣為幕下從事時人號為夏侯驢子言其鄙也驅驢宰相朝野僉載王及善後為右相無甚施設惟不許令史軰將驢入堂終日驅逐號驅驢宰相黔之驢黔之驢有好事者船載以歸放之山下虎見之尨然大物也驢一鳴虎大駭噫形之尨也類有徳聲之宏也類有能柳文乗驢自歸李訓下詔暴訓涯等罪賈餗匿民間羸服乘驢自歸驛驢食貨志天寳三載海内富實道路列肆具酒食以待行人店有驛驢出軍乘驢封常清運糧西域猒逹國有寺户以驢數頭運糧上山無人驅逐自能往返寅發午至酉陽雜俎金驢昔有僧住金榆山及卒所乗驢上山失之時有人見乃金驢矣樵者往往聽其鳴響上人言金驢一鳴天下太平同上東家蹇驢許借我泥滑不敢騎朝天杜甫偪仄行跨長耳咸通中以進士車服僣差不許乗馬時場中不下千人皆跨長耳或嘲之曰今年勅下盡騎驢短轡長鞦滿九衢清痩兒郎猶自可就中愁殺鄭昌圖相公肥偉故云詩話四足迅行驢走少有雙擲者但四足迅行耳雜俎號騾子軍唐史吴少誠地少馬乗騾以戰號騾子軍尤悍鋭甲皆畫雷公星文驊騮拳跼不能食蹇驢得志鳴春風李白詩跛驢不出泥滓柳文白蟻騄耳之得康莊也逐奔星先飄風而跛驢不出泥滓碧驢李賀苦書歌誰使狂公子雲中騎碧驢詩思在灞橋風雪中驢子上𤨏言鄭棨張果常乗一白驢日行百里夜即疊之置箱中乃紙耳雜録騎驢三十載旅食京華春杜詩白孔六帖卷九十七
