body:
  text: 白孔六帖卷四十六唐白居易原本宋孔傳續撰議讞一謹刑二灋官獄吏三舉按四誅罰五滛刑六峻刑七酷吏八失入九失岀十用灋不平十一刑措十二改制灋令十三死罪十匹流罪十五貶黜十六徒役十七議讞一白讞平天下獄朱博遷廷尉職當讞平天下獄恐爲官屬所誣謂掾吏曰本起武吏不通法律然三尺律人事出其中諸君試取吏議難知者來爲諸君覆之乃爲平處十中八九吏大驚異議驚乗輿張釋之爲廷尉上行中渭橋有人行從橋下走誤驚乗輿釋之奏犯蹕罰金上怒其輕釋之曰法者天下所公共其時上誅則已既付廷尉廷尉天下之平用法一傾人安所措議盜環又有盜高廟坐前玉環奏棄市上怒令族之釋之曰如盜長陵一抔土何以加於法乎傳命誤後漢兄弟共殺人帝以兄不訓弟報闕有常侍孫章宣詔誤言兩報重尚書奏矯詔當斬郭躬曰法故誤傳命誤當罰金帝曰疑其故也躬白曰君子不逆詐帝曰善争死上讞張儉元節亡投孔融兄褒褒不在融匿之事發并收褒融争死問母曰家事當在長妾合當辜一門爭死郡不能決乃上讞詔坐褒讞不當不罪景詔曰獄重事也人有愚智有令罪而後不當讞者不爲失信欲令務先寛也心不厭景前詔曰疑獄雖文致於法而於人心不厭者輙讞之再却廷尉張湯有疑奏已再却矣倪寛爲言其意因使寛爲奏成讀之皆伏寛所奏即得可上曰前奏非俗吏之所爲也移讞讞疑也讞于公禮獄成有司讞于公奏讞掾張湯舉倪寛爲云云孔衣冠蒙更生李峴初東京平陳希烈等數百人待罪議者將悉抵死崔器等附致深文峴獨曰法有首有從有重有輕若一切論死非陛下與天下惟新意且羯胡亂常誰不凌汙衣冠奔亡各顧其生可盡責即陛下之親戚勲舊子若孫一日皆血鐵砧尚爲仁恕哉衣冠蒙更生例不覆讞嚴郢字叔敖曰京師天下聚論徒者至廣例不覆讞今若悉待報有司斷決有程月不啻五千獄正恐牒案塡委章程紊撓獄當與衆共魏謩中尉仇士良捕妖民賀蘭進興及黨與治軍中反狀具帝自臨問詔命斬囚以徇御史中丞高元裕建言獄當與衆共之刑部大理法官也決獄不與知律令謂何請歸有司未報謩上言事繫軍即推軍中如齊民宜付縣今獄不在有司法有輕重何從而知帝停決狀讞李日知厯同刑丞時法令嚴吏爭爲酷日知獨平寛無文致嘗免一囚死少卿胡元禮執不可曰吾不去曹囚無生理日知曰僕不去曹囚無死法皆以狀讞而后用日知議詳讞韋𢎞景吏部員外郎楊虞卿以累下吏詔𢎞景與御史詳讞科條叢繁王播進刑部侍郎是時天下多故大理議讞科條叢繁播悉置格律坐隅慷慨論正孔戣字君嚴改給事中江西觀察使李少和坐贓獄寢不下博陵崔易簡殺從父兄鞫獄其京兆尹左右之翻其情戣慷慨論正貶少和殺易簡奪尹三月俸議斧陵栢狄仁傑左威衛大將軍權善才右監門中郎將范懐義坐誤斧昭陵栢罪當免高宗詔誅之仁傑奏不應死帝怒曰是使我爲不孝子必殺之仁傑曰漢有盜高廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一抔土何以加其法於是罪止棄市陛下之法在象魏固有差等犯不致死而致之死何哉今誤伐一栢殺二臣後世謂陛下爲何如主帝意解即免死論顔餘慶徐有功時博州刺史王冲責息餞于貴卿遣家奴督斂與尉顔餘慶相聞知奴自市弓矢還㑹冲坐逆誅魏州人告餘慶豫冲謀魏元忠謂餘慶爲冲督償通書合謀明甚非曰支黨請誅死藉其家詔可有功曰永昌赦令與虺貞同惡魁首已伏誅支黨未發者原之餘慶赦後被言是謂支黨今以支爲首是以生入死赦而復罪不如勿赦生而復殺不如勿生切謂朝廷不當爾后怒曰何謂魁首有功答曰魁者大帥首者元謀后曰餘慶安得不爲魁首答曰若魁首者虺貞是已既已伏誅餘慶今方論罪非支黨何后意解乃曰公更思之遂免死當此時左右衛仗在廷陛數百人皆縮頸不敢息而有功言定氣詳截然不撓受賕當死蕭齡之任廣州都督受賕當死詔羣臣議請戮於朝唐臨建言羣臣不知陛下議之之意在律王族戮於隱議親也刑不上大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異于它囚故議之有司又令入死不可爲後世法帝然之齡之齊高帝五世孫由是免死唐臨字本德置笏在陛崔𤣥亮右散騎常侍字晦叔鄭注誣宋申錫捕逮倉卒内外震駭𤣥亮率諫官叩延英苦諍反覆數百言文宗未諭置笏在陛曰孟子有言衆人皆曰殺之未可也卿大夫皆曰殺之未可也天下皆曰殺之然後察之乃寘於法令今殺一凡庻尚稽典律况欲誅宰相乎臣爲陛下惜天下法不爲申錫言也帝感悟覆奏張藴古除大理丞初河内人李好德素有風疾而語渉妄妖藴古究其獄稱好德瘨疾有懲法不當坐御史權萬紀劾藴古情在阿縱奏事不實太宗大怒曰小子乃敢亂吾法耶令斬於東市尋悔因發制凡決死者命所司五覆奏自藴古始也舊唐史謹刑二白一人刑善百姓休和傳視民如傷國之興也哀矜孟氏使陽膚爲士師問於曾子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜三刺禮司寇正刑明辟必主刺一曰訊羣臣二曰訊羣吏三曰訊萬民其有罪方殺之以示不枉濫者一成盡心刑者成也一成而不可變故君子盡心焉伏念五六日至于旬時哀敬折獄泣持丹筆盛吉明慎易君子以明慎用刑而不留獄明而不留愼而不擾史死者不可復生漢書獄者人之大命云云欽恤欽哉欽哉惟刑之恤哉文而不害蕭何嚴而不殘雋不疑簡孚核其罪有信文審克詳審閲實罪罰相當制短長之命死者不生念輕重之刑欽哉惟恤中典用情周禮八辟周禮以八辟麗邦法一議親二議故三議賢四議能五議功六議貴七議勤八議賔麗事麗附也謂當其本罪之事辭貴明徵法宜慎測審慎國章斯抵誠合申刑輕無赦禮凡制五刑法輕無赦慎惟不變必在惟精恤在一成慎其三復奏讞漢宣令季秋後讞時士常幸宗室齋居而決事獄刑號平去酒肉杜緩爲守治諸陵縣毎冬月封具獄日常去酒肉省食官屬感其恩惠涕泣漢張歐叔明爲御史大夫嘗言案人上具獄事有可却却之不得已者涕泣靣付之人命所懸孔謹重刑法沈傳師字子言爲宣州於吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論決請如令覆奏徐堅字元固遷萬年主簿天授三年上書言囚有五聽令有三覆慮失情也比犯大逆詔使者勘當得實輙決人命至重萬有一不實欲訴無由以就赤族豈不痛哉此不足檢下之姦亂適長使人威福耳臣請如令覆奏則死者無恨敕法謹罰陳子昻字伯玉上言近日詔獄稍滋鈎捕支黨株蔓推窮蓋獄吏不識天意以抵慘刻誠宜廣愷悌之道敕法謹罰省白誣寃此太平安人之務也決刑無進酒肉太宗貞觀五年十二月丁亥詔決死刑京師五覆奏諸州三覆奏其日尚食決刑無進酒肉既盡哀敬能致治平士師臯陶之恤刑司㓂蘇公之用獄既盡哀敬能致治平杜牧畢諴除刑待制一輕一重理亂攸生陸贄奏議今京邑初平所用刑章元宜審謹一輕一重理亂攸生唐中宗慮囚制欲申作解之恩慮開人徼倖之路非所以納軌物垂裕後昆既屬陽和之辰宜敦耕稼之業三農啓候方陳敬愛之規百姓爲心爰軫泣辜之念將申慮降再釋狴牢庻無滯禁之寃仍示小懲之誡其都城之内見禁囚徒朕特親慮初學記於刑灋尤謹刑法志太宗以英武定天下然其天資仁恕初即位有勸以威刑肅天下者魏徵以爲不可因上言王政本於仁恩所以愛民厚俗之意太宗欣然納之遂以寛仁治天下而於刑法尤謹臣願依覆奏灋則死者甘伏知泣辜大恩生人歡悦見祥刑之意徐堅疏出六典灋官獄吏三白過聽殺人史李離晉文公理官也過聽殺人自拘當死文公曰官有貴賤罰有輕重下吏有罪非子之過也離曰臣居官爲長不與吏讓受祿爲多不與吏分過聽殺人傳罪下吏非所聞伏劎而死練灋令孔光爲廷尉灋令號詳平治獄之吏漢路温舒曰秦有十失其一尚存治獄之吏是也今治獄者上下相繼以刻爲明深者獲功名平者多後患故治獄者皆欲人死非憎之也自安之道在人之死也増秩宣詔曰今廷平任輕祿薄爲立廷平秩六百石員四人務公平之選求明察寛恕于定國求明察寛恕黃霸以爲廷平𫝊古義武帝方向文學張湯決大獄欲𫝊古義乃請博士弟子治春秋補廷尉吏也嚮學倪寛射策補廷尉文學卒吏爲人温厚口不能言語發明張湯盡用法律吏謂寛不習事不署從事世非灋家楊賜爲尚書令數日岀爲廷尉自以世非灋家遂辭以特進就第三世廷尉吳雄子訢孫恭三世廷尉爲法名家理曹掾魏置理曹掾蓋法曹身無王爵非廷尉所料晉王彪之字叔武爲廷尉有永嘉太守謝毅後殺同郡人周矯矯從兄球詣州訴寃楊州刺史殷浩收毅付廷尉彪之以球爲獄主身無王爵非廷尉所料不肯受與相反覆詔令受之彪之疏引據時人比之張釋之請置律博士晉衛覬奏刑法國家所重而私議所輕獄者人命所懸而選用者所卑請置律博士相教授遂施行斷獄飲酒于定國飲酒數石不亂冬月請治讞飲酒益精明爲廷尉去酒肉見慎刑門不讀律而得廷尉之稱陳矯方知獄吏之尊周勃死灰不然見獄囚門如老獄吏見推斷門不用三冬見推斷門孔羅織之吏如獵者魏元忠爲中丞歲餘䧟侯思止獄仍放嶺南酷吏誅人多訟元忠者乃召復舊官因侍宴后曰卿累負謗鑠何邪對曰臣猶鹿也羅織之吏如獵者狗須臣肉爲之羮矣彼將殺臣以求進臣願何辜奉灋持正鄭善果檢校大理卿奉灋持正風績顯公卿間持平守正徐有功轉司刑少卿嘗謂所親曰大理人命所繫不可阿㫖詭辭以求茍免故有功爲獄持平守正專治詔獄杜景佺冀州武邑人入爲司刑丞與徐有功來俊臣侯思止專治詔獄時稱遇徐杜者生來侯者死獻獄官箴裴諝字士明惡法吏舞文或挾宿怨爲重輕因獻獄官箴以諷作大枷各爲號來俊臣作大枷各爲號一定百脈二喘不得三突地吼四著即臣五失魂膽六實同反七反是實八死猪愁九求即死十司求破家刑無鬼哭之庭大理有烏巢之獄李庾西都賦唐文粹舉按四白按事發姦漢尹翁歸補河東卒吏按事發姦太守田延年重之司察蓋寛饒次公爲司𨽻無所迴避王生與書曰明主知君公正命君司察之位然既明且哲以保其身不納竟自刎逢諸葛諸葛豐字少君司𨽻刺舉無所迴避王生與書曰逢諸葛舉節按侍中許章遂詔司𨽻去節司𨽻去節自豐始也埋輪後漢舉八使天下舉按不法張綱爲侍御史充使最年少官卑受命訖乃埋輪於洛陽道中曰豺狼當路安問狐狸遂舉奏太尉梁冀奢淫不法朝廷振竦鷹隼始擊漢孫寳字子嚴爲京兆尹立秋日辟侯文爲東郡督郵引見曰今日鷹隼始擊當順天氣成嚴霜之誅掾頗有人乎文曰無其人不敢空受職寳曰誰也文曰杜穉季寳氣索良乆曰其次誰文曰豺狼當路安問狐狸穉季聞之懼杜門不通水火搏擊翟方進爲京兆摶擊亮彊爲丞相奏陳咸冒濁茍容云云咸遂廢錮也二天後漢蘇章爲冀州刺史按故人清河太守設酒饌太守喜曰人皆有一天我獨有二天章曰蘇孺文與故人飲私歡也明日冀州刺史按清河太守公法也遂正其罪所劾多范滂爲太尉黃瓊所辟召三府掾屬舉謡言滂奏二史二千石權豪二十餘人尚書責所劾猥多疑有所私也斂手避二鮑鮑永爲司𨽻以鮑恢爲從事俱抗直不避彊禦世祖曰貴戚且斂手避二鮑怪鳥孫盛爲長沙太守頗營貲貨從事至郡服高名不劾盛與桓温牋辭㫖放蕩曰從事進無威鳯來儀之羙退無鷹鸇搏擊之用徘徊湘川有似怪鳥温怒遣按贓私檻車收到州不坐不避權貴後漢祭遵爲車市令世祖舍中兒犯法遵殺之縣令收督郵魏志滿寵爲高平令市人張包爲郡督郵貪穢因來在傳舍率吏卒收之即日考竟遂棄官白簡坐而待旦晉傅𤣥字休奕爲司𨽻校尉天性峻急每當奏劾或値日暮捧白簡整簪帶竦懼不寢坐而待旦不避豪貴趙廣漢將吏至霍禹第突入其門搜索私屠酤椎破爐罌斬關而去不劾賢者晉羅含君章桓温使檢劾謝尚含至不問郡事與尚酣飲而還温問所劾含曰公以尚何如人温曰勝我含曰豈有勝公而行非耶温義之孔搒殺馮宿字拱之拜河南尹洛宛使姚文壽縱部曲奪民田匿于軍吏不敢捕府大集部曲輙與文壽偕來宿掩取搒殺之膽落温造字簡輿授侍御史夏州節度使李祐拜大金吾進馬造正衙枰刻祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於温御史威望隱然造彈擊無所回畏威望隱然發南曹僞官九十人主吏皆論死輙繩惡吏李向隱三入御史府輙繩惡吏不以殘騺失名所發當也素議歸重劾奏常先風教齊澣字洗心爲監察御史凡劾奏常先風教號善職百官肅然顔眞卿字清臣遷御史大夫廣平王總兵二十萬平長安辭曰當闕不敢乗趨出梐枑乃乗王府都虞侯管崇嗣先王而騎眞卿劾之帝還奏慰答曰朕子每出諄諄教戒故不敢失崇嗣老而躄卿姑容之百官肅然劾矯使李晟字良器宦者尹元貞持節到同華擅入河中諭慰李懐光晟劾元貞矯使欲洗宥元惡請治罪發姦擿伏賈敦頥遷洛州刺史發姦擿伏下無能欺使者十輩臨按郎餘慶下遷交州都督驩州司馬裴敬敷與餘慶雅故以事笞餘慶婢父婢方嬖譖敬敷死獄中又裒貨無藝民詣闕訴之使者十輩臨按餘慶謾讕不能得其情最後廣州都督陳善𢎞按之餘慶自恃在朝廷乆明法令輕善𢎞不置對善𢎞怒曰舞文弄法吾不及君今日以天子命治君吾力有餘矣欲榜械之餘慶懼伏罪知朝廷尊李勉字𤣥卿擢監察御史時武臣崛興無法度大將管崇嗣背闕坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊條姦李乂字尚眞擢監察御史劾奏無避景龍初葉静能怙勢乂條其姦中宗不納帝䟽韋陟字殷卿會杜甫論房琯詞意迂慢帝令殷卿與崔光遠顔眞卿按之陟奏甫言雖狂不失諌臣體帝繇是䟽之不畏彊禦裴諝字士明除右金吾將軍德宗新即位以刑名治天下百吏震時大行將藏陵事禁屠殺尚父郭子儀家奴宰羊諝列奏帝謂不畏彊禦善之反爲所擠崔隱甫遷殿中侍御史内供奉浮屠慧範倚太平公主脅人子女隱甫劾狀反爲所擠貶邙州司馬摘其姦贓萬計尹思貞調隆州參軍事屬邑豪蒲氏驁肆不法州檄思貞按之摘其姦贓萬計卒論死部人稱慶刻石挾邪亂政劉禹錫字夢得御史竇羣劾禹錫挾邪亂政羣即日罷權倖側目韋貫之劾金忠義不宜汙朝籍忠義竟罷於是權倖側目劾按不撓李華字遐叔遷監察御史宰相楊國忠支婭所在橫猾華出使劾按不憢州縣肅然劾中人竇懷貞監察御史魏傳弓嫉史輔信義欲劾其姦懐貞曰是安樂所信任者奈何繩之傳弓曰王綱壞矣正坐此屬今日殺之明日殊無所悔彈李義府唐文粹王義方䟽義方對仗叱義府不退義方三叱上既無言義府趨岀義方乃讀彈文曰義府善柔成性佞媚爲心昔事馬周分桃見寵後交劉洎割䄂承恩生其羽翼長其光價因緣際㑹遂皆通逹不能盡忠端節對􅆒王休䇿蹇勵駑祗奉皇眷而反憑附社蔽虧日月請託公行交遊羣小貪冶容之好原有罪之淳于恐洩漏其謀殞無辜之正義雖挾山超海之力望此猶輕迴天轉日之光方斯更劣此如可恕孰不可容誅罰五白失財者誅之周禮太宰治都縣鄙之治乗其財用之岀入凡失財用物辟名者誅之注辟名謂爲文書與實不相應考羣吏之理太宰以八柄歲終令百官府名正其治受其會注會大計也其三歲大考羣吏之理而誅賞之善罰者刑省而姦禁文子謫滿百漢陳遵爲掾不視事曹吏白陳掾今日以某事謫遵曰滿百乃相聞舊事謫滿百當免自省晉宣帝問諸葛公起居何如而使者曰罰三十以上皆自省覽帝曰其能乆乎議罰漢韓延壽爲東都守臨出上車騎吏後至勑功曹議罰門下卒白曰明府早駕乆駐未岀騎吏父來不敢入吏出趨謁父以敬父見罰得無傷大化乎延壽曰微子之言太守不知過族誅豪猾齊南三百豪猾二千石不能制郅都爲太守族誅之孔濫罰李綱字文紀元吉爲并州總管縱左右攘奪民愁苦宇文歆諫不聽并州䧟帝怒謂綱曰王年少不習事故以歆及竇誕佐之太原興王地兵十萬粟支十年奈何一旦棄去歆建此計我當斬于軍綱曰王過惡誕養成之歆事王淺有闕必諍今頼歆計陛下不失愛子且有功又何加罪乎翌日帝悟引綱升御榻勞曰卿不言我幾濫罰誅張易之桓彦範字士則張柬之將誅張易之等引與定䇿中宗至𤣥武門彦範等斬闕入士皆鼓噪時武后處迎仙宫之集仙殿斬易之等廡下后聞變而起見中宗曰乃汝耶豎子誅可還宫誅韋氏太平公主𤣥宗誅韋氏主與狄計遣子崇簡從事定將立相王未有以發其端者主顧温王乃兒子可刼以爲功乃入見王曰天下事歸相王此非兒所坐乃掖王下取乗輿服進睿宗臨刑極罵郝處俊孫象賢后素衘處俊故因事誅之臨刑極罵乃死后怒令離磔其尸斵夷祖父棺冡自是訖后世將刑人必先以木丸窒口云汙戮善良王及善留拜内史來俊臣繫獄當死后欲釋不誅及善曰俊臣凶狡不道引亡命汙戮善良天下疾之不勦絶元惡且揺亂禍胎憂未既也后納之臨誅洗沐神色自若劉禕之賜死于家臨誅洗沐神色自若命其子執筆占爲表子號塞不能書禕之乃自捉筆得數紙詞懇哀到今皆傷之罰不及有罪魏徵曰罰不及有罪則危亡之期或未可保劉洎贊曰洎欲身任安危以言掩其衆爲媚忌所乗卒䧟罪誅誅棄骨鯁大臣李義府武后已立義府與敬宗德儉及御史大夫崔義元中丞袁公瑜大理正侯善業相推轂濟其姦誅棄骨鯁大臣故后得肆志誅舞文者柳公綽字寛行部至鄧縣吏有納賄舞文二人同繫獄縣令以公綽素持法謂必殺貪者公綽判曰贓吏犯法法在姦吏壞法法亡誅舞文者罰一勸百權德輿字載之董溪于臯謩以運糧使盜軍興流嶺南帝悔其輕詔中使半道殺之德輿諫溪等方山東用兵乾沒庫財死不償責陛下以流斥太輕當責臣等謬誤審正其罪明下詔書與衆同棄則人人懼法臣知己事不諍然異時或有此比要須有司論報罰一勸百孰不甘心帝深然之立釘趙思綰叛高祖遣郭崇義王峻討之至則擒之思綰問曰何以用刑告者曰立釘也思綰厲聲曰爲吾告郭公吾死未足塞責然釘磔之醜壯夫所恥幸少假之崇義許之父子俱斬於市五代史五十三狡敵既縻輸于國都示之市人即社行誅栁宗元皇武篇狡敵既縻輸于國都示之市人即社行誅分體燃臍于公異朱泚露布尚稽分體未即燃臍揮刀紛紜爭切膾脯韓愈元和聖德詩解脱攣索夾以砧斧婉婉弱子赤立傴僂牽頭曵足先斷腰膂以及其徒體骸撑拄末乃取闢駭汗如雨揮刀紛紜爭切膾脯元舅大臣怫㫖不閲歲屠覆道路目語及上官儀見誅政歸房帷天子拱手矣則天傳蠻區夷落罪無逃罰唐史王義方上言淫刑六事與暴政酷政相類白哀刑政之苛淫刑以逞誰則無罪傳僣濫頗邪懼及善人刑濫楚多淫刑其大夫逃死於四方繁政齊景公繁於刑有鬻踊者故晏子曰踊貴屨賤淪胥以鋪若此無罪無所措手足謂刑罰不中淫縱枉撓曲人入罪殺不辜書與其殺不辜寧失不經明刑不暴管子秦設重刑赤衣半道漢名臣奏云雖鄭傳猛政則曰寛難而楚用滛刑誰能救療弄灋濫施殺餉獄者義縱爲定襄至則掩獄中輕重罪四百餘人兼昆弟親戚私入相親或餉者亦二百餘人鞫爲解脱死罰之罪盡殺之焚林斷木不時命曰傷地斷獄立刑不當命曰傷人緩深固之罪急縱岀之誅孔刑濫人懼韓滉右丞元琇判度支也以關輔旱請運江南租米西給京師委滉督之其剛愎難共事請自江至楊子滉主之楊子以北自主之滉由是衘琇誣劾琇饋米與淄青李汭河中李懐光帝怒貶琇雷州司戸參軍左丞董晉白宰相劉滋齊映曰昨關輔用兵方蝗旱琇不増一賦而軍興皆濟可謂勞臣今被謫無名刑濫人懼假令權臣逞忠公何不請三司鞫之滋映不能用過刑劉洎死顯慶中其子𢎞業詣闕訴遂良譖死狀李義府右之高宗問近臣給事中樂彦瑋曰辨之是暴先帝過刑事寢慘文峭詆楊國忠李林甫興韋堅等獄欲危太子獄事畏卻以國忠怙寵摶擊可用倚之使按劾國忠乃慘文峭詆逮係連年誣衊被誅者百餘族淫刑以逞高駢字千里駢之自將出屯也突將亂乗門以入監軍取役夫數百名叛卒藉斬其首乃定駢徐出以金帛厚賞士開府庫悉還其衣廪然密藉所給姓名夜遣牙將擊殺之夷其族雖孕者不貰投尸於江有一婦方踞而乳子將就刑媪傷之疑其畏死謂曰以子丐我一詣曹司也婦蹶起曰我知之且飽吾子不可使以饑就戮也見刑者拜曰渠有節度使奪戰士食一日忿怒淫刑以逞國家法令何有也我死當訢於天使此賊闔門如今日寃也逮死神色晏然蜀人聞者爲垂泣有犯令者誅及鄰伍韓滉婺州屬縣有犯令者誅及鄰伍坐死數十百人又遣官察境内罪渉疑似必誅一判輒數十人下皆愁怖煎熬生人若墜大火昔祖龍滅古道嚴威刑煎熬生人若墜大火李白尋桃源序每笞一人以責其負每笞一人以責其負則諸案吏各持其簿列于庭凡一簿所負唱其多少量爲笞數已則以次唱而笞之少者猶積數十多者至笞百餘人不勝其苦吳越世家錢俶好行殺戮漢蔡王信高祖之後弟也所至好行殺戮軍士有犯法者信召其妻子對之刲剔支解使自食其肉血流盈前信命樂飲酒自如也爲鐵籠鐵刷人有過者坐之籠中外燎以火刷剔其皮膚以死五代劉守光捶人畏不免嚴安之捶人畏不免視腫青復笞之至血流乃喜鐵籠􅀢囚首索元禮爲推使􅀢囚首加以楔至腦裂死又橫木闗手足轉之號曬翅或紡囚梁上縋石於頭造檻車閩王鏻初薛文傑爲鏻造檻車以謂古制疎濶乃更其制令上下通中以鐵芒内嚮動輙觸之既成首被其毒五代史六十八百口保無反者則天謂近臣曰自周興來俊臣死後更不聞有反逆者然則已前受戮者不有寃濫乎夏官侍郎姚元崇對曰自垂拱已後被告者皆枉酷自誣而死天下號爲羅織甚於漢之黨錮頼上天降靈聖情發寤誅鋤凶惡朝廷乂安今日已後臣以微軀及一門百口保見在内外官吏無反者則天大悦曰已前宰丞皆順成其事䧟朕爲淫刑之主聞卿所説甚合朕心乃賜元崇銀千兩峻刑七白吏乞貸毫􅈊輒死李實爲京兆尹吏乞貸毫􅈊輙死按之無言者猥曰死亦非枉復殺之專以殘忍爲政順帝在諒闇不踰月實殺數十人于府貶通州長史市人爭懐瓦石邀刼之實懼夜遁去刑殺太甚則致隂沴李石字中玉唐宗室文宗時大臣新族死歲苦寒外情不安帝曰人心未舒何也石曰刑殺太甚則致隂沴刑網寖密劉德威爲大理卿太宗問曰比刑網寖密咎安在德威曰在君不在臣下之寛猛視王之好律失入者減三失出者減五今坐入者無辜坐出者有罪所以吏務深文爲自營計非有教使然也㧻斮屠剔膏流節離栁宗元㧻斮屠剔膏流節離之禍不作而人乃克貌平舒愉執憲者以深刻爲奉灋高逢列五事以爲今天下大定而刑未措何哉蓋謀猷之臣臺問之吏不崇簡易而昧經逺故執憲者以深刻爲奉灋當官者以侵下爲益國楚掠凝慘徐有功武后僣位畏唐大臣謀己於是周興來俊臣邱神勣王𢎞義等揣識后指置總監牧院諸獄捕將相俾相鈎逮掩搦䕶送楚掠凝慘爲炮燻刳斮法南蠻傳蔡京經制嶺南峻條令爲炮燻刳斮法愁毒爲軍中所逐眞蛟蜃南漢劉龔性聰悟而苛酷爲刀鋸克解刳剔之刑每視殺人則不勝其喜不覺朶頥垂涎呀呷人以爲眞蛟蜃也爲斷舌決口斮筋折足之刑史洪肇字化元凡民抵罪吏以白洪肇洪肇但以三指示之吏即腰斬之又爲斷舌決口斮筋折足之刑五代史三十崔元綜雖外示謹厚而情深刻薄每受制鞫獄必披毛求疵隱於重辟人多鄙之唐史武宗用李德裕誅劉稹等大刑舉矣而性嚴刻故時竊盗無死所以原民情廹於饑寒也至是贓滿千錢者死至宣宗乃罷之而宣宗亦自喜刑名常曰犯我法雖子弟不宥也然少仁恩唐德自是衰矣唐刑法志峻刑暴禁王世充顧下多背已乃峻刑暴禁以威之户一人逃家無少長皆坐父子兄弟夫婦許相告免令五五相保一家叛舉伍誅酷吏八白唯戮是聞子玉鞭貫子玉治兵終日而畢鞭七人貫三人耳安忍無親以民爲土芥國其亡也刀鋸鑽鑿國語大刑用兵甲鈇鉞次刑用鑽鑿薄刑用鞭扑也既乖勿喜之言豈念如傷之見夫樂殺人者不得志於天下也以苛爲察以刻爲明漢書斷之以剛傳依勢作威勢位也倚灋以削倚刑灋以行刻削之刑報虐以威言以威刑報上爲虐于公高門以待封嚴母掃墓而迎喪文選蒼鷹之目郅都擊摶豪彊時號云云乳虎之稱甯成苛酷人語曰寧値乳虎無値甯成之怒屏棄仁惠專行毒痛鞭貫立威筆削入罪商鞅嚴刑自敝爲法自敝延年酷灋見誅漢書嚴延年爲河南守峻刑酷灋時人號爲屠伯後坐枉法殺人被誅其母不哭之周紆父子伏誅後漢周紆字文通爲渤海太守酷虐每赦至先決刑後宣赦後坐事父子皆伏誅茍晞兄弟見害字道將北風刺虐也衛國並爲威虐視人如讎殘人以逞將戕於餘戕殘人也忍人是可忍也不得其死吹毛刻骨束濕寗成操下如束濕言急也巧詆雖稱疾惡無乃忍人吏惟巧詆刑則濫施法家少恩文吏巧詆慘礉史韓非喜刑名極慘礉少恩也渭水盡赤商君臨渭水論囚七百餘人渭水盡赤酷烈楊雄解嘲曰吕刑靡敝秦法酷烈虎穴尹賞爲長安令穿地深數丈内人於中百人爲一輩覆以大石數日一發相枕藉死人號虎穴杜周内深次骨操切服下臧宣㣲文深詆張湯舞智御人急縱出之刑刑法志緩操故之法急縱岀之刑言縱罪失岀者誅急地臼木杵陳咸爲南郡太守以殺伐立威豪猾大姓犯法輙計具符下以律程作司空司空主役官也爲地臼木杵不中程或私脱鉗鉞及衣服不如法輙加罪督作劇不勝痛自剄死者歲數千百人乆者至腐爛家不得收注鉗在項鉞在足者展月見暴政門鬻棺之喻今獄吏以苛爲察以刻爲明深者獲功名平者多後患諺曰鬻棺之喻欲歲人疫非憎人欲殺之利於人死獄吏之深刻亦猶此也史埽墓之譏嚴延母事見上注泥塗罪人不與食晉王宏字正宗爲河南尹無能名爲苛碎桎梏罪人以墨塗面置深坑中餓不與食後有罪帝以宏累有政聲以贖論也王灋大刑不可以委曲生情毁身焦膚分骸斷首孔公卿被誅死者踵相及劉子元名知幾武后時吏橫酷淫及善人公卿被誅死者踵相及子元悼士無良而甘於禍作思謹賦以刺時酷烈賈敦頥洛陽令楊德幹矜酷烈杖殺人以立威敦頥喻正曰政在養人傷生過多雖能不足貴也德幹爲衰減李嗣眞諫來俊臣獄方熾嗣眞上書諌昔陳平事漢祖謀疎楚君臣行反間項羽遂亡今殆有如平者謀陛下君臣恐爲社稷禍不納澡垢索疵崔元綜每受制鞫獄必澡垢索疵不入死不肯止人畏鄙之笞掠嚴楚穆贊元和時鹽鐵轉運諸院擅繫囚笞掠嚴楚人多死贊奏請與州縣吏參決自是不寃父嫌其酷郎餘慶始治萬年父知運嫌其酷將杖之餘慶避免父嘆曰國家用之矣吾尚奈何及爲御史中丞復嘆曰郎氏危矣以憂死餘慶卒以貪殘廢汙㸃善良破壞其宗武三思凡搆大獄汙㸃善良破壞其宗天下皆蕩然深排巧引内刑壍中武懿宗天授間受詔訊大獄誅大臣王公皆深排巧引内刑壍中無有脱者其險酷雖周來等不能絶也酷吏破家桓彦範字士則内史李嶠等屢奏往爲酷吏破家者請皆宥雪依違未從彦範復上言噬紳纓若狗豚然索元禮來俊臣之徒揣后密㫖紛紛並興澤吻磨牙噬紳纓若狗豚然至叛胔臭逹道路寃血流離刀鋸忠鯁貴彊之臣朝不保昏而后因以自肆不岀帷闥而天命已遷出唐酷吏傳獄持宿囚至載初右臺御史周矩諫后曰凶人告訐遂以爲當推劾之吏以險責痛詆爲功鑿空投隙相矜以殘泥耳籠首枷楔兼暴拉脅籖爪懸髮熏目號曰獄持晝禁食夜禁寐敲撲揺揺使不得暝號曰宿囚人茍賖死何求不得時誘之爲酷唐史臣云嗚呼非吏敢酷時誘之爲酷觀俊臣輩怵利放命内懐滔天又張湯郅都之土苴云狼毒野葛王𢎞義每移檄州縣輒詫曰我文檄如狼毒野葛驢駒㧞橛犢子縣等以怖下王旭裂獄械率有名曰驢駒拔橛犢子縣等以怖下又縋髮以巨石脅之三豹同上時監察御史李嵩李全交皆嚴酷取名與旭埒京師號三豹嵩爲赤全交爲白旭爲黒閭里至相謂曰若違教値三豹􅬷尾榆敬羽凶態不能忍乃作巨枷號􅬷尾榆囚人多死羅鉗吉網李林甫隂搆大獄誅不附已者引吉温門下與錢塘羅希奭爲奔走推鍛相朂以虐號羅鉗吉網震以烈威吉温推事未窮而先計贓成奏乃引囚問震以烈威隨問輒承無敢􅘅鞭楚未收于壁而獄具矣鞫囚不問輕重來俊臣鞫囚不問輕重注醯于鼻掘地爲牢或寢以匽溺或絶其糧囚至齧衣絮以食大抵非死終不得岀門壯轢腹敬羽以門壯轢腹掘地實棘席蒙上瀕坎鞫囚不服則擠之坎多死用慘刻奮肅代間渠檢宿狡頗用慘刻奮然不得如武后時敢搏擊殺戮矣訊囚名狀朝野僉載李嵩武后時爲御史鞫備諸慘酷其訊皆有名號如仙人獻果玉女登梯犢子懸銅驢兒㧞橛鳯凰曬翅猴鎻大上麦索下攔單之類危坐小牀敬羽累遷御史中丞宗正卿鄭國公李遵坐賄下獄羽參按遵肥而羽瘠則引遵危坐小牀痺且仆遵欲伸足羽曰公乃囚我延公坐何可慢遵仆三四俆受所言得贓至數百萬論殺最多酷吏索元禮訊一囚窮根柢相牽聨至數百未能訊衣冠氣禠后數引見賞賜以張其威故論殺最多來俊臣周興踵而奮天下謂之來索同上每擿一事千里同時輒發來俊臣拜左臺御史中丞中外累息至以目語俊臣乃引侯思止王𢎞義郭𢎞霸李仁敬康暐衛遂忠等隂嘯不逞百輩使飛語誣衊公卿上急變每擿一事千里同時輙發契騐不差時號爲羅織牒左署曰請付來俊臣或侯思止失入九事具錯悞門白刑僣則懼及善人枉撓不當反受其殃枉撓曲入人罪也察阿黨謂獄官以私恩曲斷情匪哀矜理乖明啓明啓刑書入人之罪罰既爽於躬行罪宜甘於反坐制短長之命豈可復生斷岀入之刑不聞惟恤重典平人國章斯抵誠合申嚴人命所懸豈宜失入過當傷深濫施未聞情得旋見獄成罪雖自掇既有常刑死不復生曷宜過當不平謂何孔失入無辜刑法志自張藴古之死也法官以大出爲戒有失入者又不加罪自是吏法稍密帝以問大理卿劉德威對曰律失入減三等失出減五等今失入無辜而失出有罪故吏皆深文帝矍然遂命失岀入者皆如律求食揺尾見吏垂頭文粹獄箴寂寂圜土纍纍繫囚求食揺尾見吏垂頭自古立名此爲非所逼隘狹室欹傾漏宇冬有祈寒夏多隆暑焉可失入焉可妄處張説作匹婦含寃三年亢陽文粹張説獄箴匹婦含寃三年亢陽匹夫結憤六月飛霜敢告司憲無輕國章失入者減三見上刑法志詐忠者迫我以社稷計文宗開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉乆未原雪帝慙曰我當時亦悟其失詐忠者迫我以社稷計故耳宋申錫傳不可爲後世灋唐臨字本道御史大夫蕭齡之任廣州都督受賕當死詔羣臣議臨曰齡之貪贓狼扈死有餘咎陛下以異於他囚故議之有司又令入死非堯舜所以用刑也不可爲後世灋帝然之失出十事具錯悞門白利淫與其殺不辜寧失不經寧僣無濫賞不僣刑不濫不幸而過寧僣無濫察阿黨見失入門罪無掩蔽禮既乖明啓之文宜寘利淫之罪急縱岀之誅刑法志輕典容姦禮情非故縱罪則減論寛惡刑法志殺人不死傷人不刑是惠暴而寛惡也孔小過徐有功后召詰曰公比斷獄多失出何耶對曰失出臣小過好生陛下大德后黙然誤縱盧商字爲臣同平章事大中元年春旱詔商與御史中丞封敖理囚繫於尚書省誤縱死罪罷爲武昌軍節度使失岀者減五劉德威太宗問比刑網寖密咎安在德威曰在君不在臣下之寛猛視主之好失出者減五今失岀者有罪所以吏務深文爲自營計灋官以失出爲戒自張藴古之死也灋官以失出爲戒有失入者又不加罪自是刑法稍密刑法志怖以妖祟竇孝諶妻龎謂為其奴怖以妖祟教爲夜解因告以厭詛薛季昶鞫之龎當死有功明其枉季昶劾有功黨惡逆當棄市有功方視事令吏泣告有功曰豈吾獨死諸人長不死耶安歩去后詰有功失岀餘見上小過注用灋不平十一白菀柳詩刺刑罰不平同罪異罰非刑也傳上下其手王子圍與穿封戍爭囚伯州犂問上下其手曰王子圍寡君之貴介弟戍方城外之縣尹也注上下其手所以導囚意也隨上意漢張湯爲廷尉上意所欲釋予監吏輕平者所治即豪必舞文巧詆是以湯雖文深意忌得此聲譽而深刻吏多爲爪牙用者也以主意爲獄杜周爲廷尉客謂之曰君爲天下決平不循三尺法專以人主意㫖爲獄固當如是乎周曰三尺安岀哉前王所是者疏爲律後王所是者定爲令以善疾惡後漢朱暉爲臨淮太守好節槩所㧞用皆勵行士諸報怨以義犯法者皆爲求理多得出濟不義之囚即時僵仆也兩劾嚴延年爲涿郡遣吏趙繡案大姓東高氏繡爲兩劾先白輕者欲觀延年意怒即岀其重劾延年察知遂殺繡漢史抑彊扶弱嚴延年爲河南守其法務抑疆扶弱弱者雖䧟法曲文出之豪彊者以入内之當生者詭殺之人莫之測也撓灋周陽由夷豪傑愛者撓法活之憎者曲法殺之不當罪則侮當罪則威刑也古者刑不過罪爵不踰德荀卿子云刑不應罪賞不酬功張敞爲京兆尹賞罰明時越法縱捨也枉撓反坐頗類偏黨其罪惟均所罰不一罪無等差刑有輕重高下其心孔撓灋貸減王世充字行滿拜江都通守有繫獄者皆撓法貸減以樹私恩温舒不足文粹李庾西都賦斤差衡之失論罪温舒之不足以輕入重以生入死文粹李華中書堂記事不可以輕入重罪不可以生入死不能一灋齊衆陸宣公奉天赦文上下其手希合盛㫖酷吏傳序周矩諫武后曰陛下不諒試取告牒判無驗者使推其情有司必上下其手希合盛㫖灋司推斷舞灋深詆徐有功上疏誠令天官銓注有所不平灋司推斷舞法深詆三司理匭受所上章壅塞不白者皆許臣按驗劾發奪祿貶勞希㫖用刑李峴因侍御毛若虚覆按謝夷甫罪用法不平峴白於帝曰若虛希㫖用刑亂國法陛下信爲重輕示無御史臺岀爲蜀州刺史出新唐史刑措十二白五刑不用善人爲邦百年勝殘去殺虞夏之道寡怨於人少文法也刑不施而人咸服畫冠堯畫冠爲刑而人不犯罔或干政帝曰臯陶惟兹臣庶罔或干予政言下順命也期于無刑書曰刑期于無刑民協于中注云以殺止殺而刑措不犯有司書兹用不犯于有司言人不犯罪昔唐虞畫刑而人不犯周之成康刑措而不用漢武詔周之成康見上漢之文景文帝用張釋之爲廷尉罪疑者予輕是以刑罰大省至於斷獄四百有刑措之風景帝定箠令而笞者得全辟以止辟刑期無刑孔歲斷死二十九魏徵傳帝即位四年歲斷死二十九幾致刑措一歲斷刑不滿三十太宗之朝勤儉化人人用富庶加以德教致于升平故一歲斷刑不滿三十雖則聖明謹刑賢良恤獄之所致也白居易䇿止獄刑措從善逺惡必使爲善者不越月踰時而得其賞則人勇而有勸焉爲不善者不越月踰時而得其罰則人懼而有懲焉爲善者日有勸爲不善者日有懲是敺天下之人而從善逺惡是刑所以措而化之所以成也柳宗元斷刑論不越月踰時可致刑措徐有功誠令天官銓注有所不平法司推斷舞法深詆三司理匭受所上章壅塞不白許令臣按驗劾發貶勞奪祿不越月踰時可致刑措后納之本傳開元二十五年刑部斷天下死罪唯有五十八人大理卿徐嶠上言大理獄由來相傳殺氣太盛鳥雀不栖至是有鵲巢其樹於是百寮上表賀以謂幾致刑措通典改制灋令十三白灋若易方人難知禁政有弛張法存沿革誠宜適變安可執迷所宜去彼取此不可以古制今灋不前定官將疇依夏造殷因豈煩於制漢除秦敝亦便於時言之不中雖新意而奚爲事必有初率舊章而則可若議事之刑滋章多制則舞文之吏因緣爲姧無作聰明亂舊章章典也書罔以側言改厥度度法也晉鑄刑鼎鑄范宣子所為刑書仲尼曰晉其亡乎失其度矣夫晉國將守唐虞之法度以經緯其人范宣子之刑是晉國之亂刑也惟聖作則則法也畫一漢蕭何爲法講若畫一曹參代之守而不失不刋之典茍可彊國利人何憚改革法律史商鞅欲變法曰可與樂成不可與慮始茍可以彊國利人何憚改革法律甘龍曰聖人不易人而教智者不變法而理因人而教不勞而成功因法而治吏習而人安鞅曰龍世俗之言也常人安於故俗學者溺於所聞若然者居官守法可也非所以論彊國利人之術也三代不同禮而王五伯不同法而霸智者作法愚者制焉賢者更禮不肖者拘焉是以治不一道也故湯武不循古而王夏殷不易禮而亡反古者不可非而循禮者未足多也周因殷禮政亦不愆漢除秦刑人是以息茍用捨而合道蓋㳂革而同歸簡要滋章法令滋章盜賊多有協中書合大中之法建中立大中之法中行之作晉鼎見誚仲尼見上子産之鑄鄭書終慙叔向鄭人鑄刑書叔向詒子産書曰先王議事以制不爲刑辟懼人之有爭心也民知有辟則不忌於上並有爭心以徴於書而徼倖以成之夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國制三辟鑄刑書將以靖民不亦難乎民知爭端將棄禮而徵於書終子之世鄭其敗乎肹聞之國將亡必多制其此之謂乎子産曰僑不才不能爲子孫吾以救世也既不承命敢忘大惠利百變變法也官或變灋人豈懷刑非利百之謀豈宜變法遵畫一之義自合守文仍舊貫貫事也論語新意何必改作相㳂不改也禮前定禮事前定則不困析言破律殺無赦易其紀律易則生亂舞文弄灋若從私議是舞公文灋無改度義有隨時適道在權救時貴變革故取新捨舊謀新相時革敝作古有初壞灋亂紀蕭何定律參夷連坐無自立辟辟法也三尺安出客謂杜周曰君不循三尺法周曰三尺安出哉先王所是者疏爲律後王所是者定爲令也删定奏上後漢應劭刪定律令撰律本章句尚書舊事廷尉版令決事比例司徒都目五曹詔書及春秋治獄凡二百五十篇蠲去重復奏之請删削陳寵昭公奏律令條法溢於甫刑九千百八十九宜令三公廷尉平定應經合義刪條其餘越律馬援條奏越律與律駁者十餘事申明舊制約束之也自敝商鞅孔輕重㳂愛憎趙冬曦神龍初上書曰古律條目千餘隋時姦臣侮法著律曰條無正條者岀罪舉重以明輕入罪舉輕以明重一辭而發條目數百自是輕重㳂愛憎被罰者不知其然使賈誼見之痛哭必矣不務省事而務捉搦夫捉搦者灋也法設而滋章滋章則盜賊多矣法而益國殺之可也比法令數改或行未見益止未知損譬奕者一碁爲善而復之者愈善故曰設法不如息事韓琬凡有未發及已發未斷而逢格改者若格重則依舊條輕從輕法唐六典貞觀初有蜀王法曹裴洪獻奏駮律令命長孫無忌房𤣥齡釐正凡五百餘條減開皇太尉入流者九十三條比古死刑殆除其半永徽中復撰律疏三十卷至今並存出唐六典云死罪十四白死者不可復生漢文詔制短長之命書死者不恨宣詔曰獄者萬人之命能使生者不怨死者不恨則可謂文吏矣斬殺必當月令鈇鉞肆諸市朝景伯云於公伯寮吾力猶能肆諸市朝仲春無肆掠肆暴屍也月令以殺止殺書吕刑曰大辟疑赦其罰千鍰大辟死刑也死罪有疑即赦之罰千鍰以贖死罪也致辟誅殺也罪在大辟禮念施行之後不可復生當結罪之前所宜惟恤死刑周禮是全要領禮無所加誅一死國章斯抵誠合申嚴人命所懸亦宜審慎議獄緩死易莫大之刑刑故無小孔誤伐一栢而殺二臣狄仁傑官懐英遷大理丞左威衛大將軍權善才石監門中郎將范懐義坐誤斧昭陵栢罪當死高宗詔誅之仁傑奏不應死帝怒曰是使我爲不孝子必殺之仁傑曰漢有盗高廟玉環文帝欲當之族張釋之廷諍曰假令取長陵一杯土何以加其法於是罪止棄市陛下之法在象魏固有等差犯不至死而致之死何哉誤伐一栢而殺二臣後世謂陛下爲何如主帝意遂解免死凡京城決死囚之日尚食蔬食内教坊及太常徹樂每歲立春後至秋分不得決死刑唐六典決死刑皆於中書門下詳覆同上凡決大辟在京者決三司五覆奏在外者刑部三覆奏唐六典老奴死罪李輔國乞解官有詔進封博陸郡王仍爲司空尚父許朝朔望輔國欲入中書作謝表閽者不納曰尚父罷宰相不可入輔國氣塞乆乃曰老奴死罪事郎官不了請地下事先帝矣帝優辭諭遣三坐大辟將死泰然不憂徐有功凡三坐大辟將死泰然不憂赦之亦不喜復死刑三覆奏上元元年肅宗本紀貞觀四年天下斷死罪者二十九人太宗本紀裴寂有死罪四裴寂字𤣥眞浮屠法雅坐妖言辭連寂坐免官削封邑半歸故郡未幾汾隂狂男子謂寂奴曰公有天分寂遣奴殺所言者奴盜寂封邑錢百萬寂捕急遽上變帝怒曰寂有死罪四乃放靜州流罪十五白舜典曰流宥五刑宥寛也以流放之法寛其五刑屏之逺方以禦魑魅舜流四凶投諸四裔以禦魑魅投畀有北俟罪長沙五流有宅五宅三居居罪人逺近有三等四裔是投罪輕重而不等五流斯宅居逺近而有差黜惡禮流凶四凶去邪勿疑去父母之邦緩死申恩徙於瘴癘移人禦魅放流𤣥冠縞武不齒之服所放不率教者禮宥汝以逺傳子産謂子南曰君不忍殺宥汝以逺勉速行乎晉放大夫胥甲父于衛古者大夫已去三年待放君放之非也大夫待放正也見公羊傳莊舄曰越之流人去人滋乆思人滋深流在裔土以實裔土國語信無罪而棄逐騷雖處罪放講學不倦吳志虞飜性疎直孫權怒徙交州雖處罪放講學不倦上書曰長没海隅生無可與語死以青蠅爲弔客云云罪窮兩造既明豪奪吾人流宥五刑自宜離逖爾土聖代好生既宥爾以逺也小人懷土尚於我有尤乎四罪而天下咸服舜流共工等播棄譴謫徙之於蜀漢放韓信投荒孔徙邊嚴郢字叔敖御史臺請天下斷獄一切待報唯徒者得悉徙邊郢言罪徙邊即流也流有三而一用之誠難且殺人外猶有十惡僞造符印彊光大諸盜今一徙之法太輕茍刑禍及流竄文粹皮日休鹿門隱書今之士爲名與勢茍刑禍及流竄至是監刀鋸者必名人司流竄者必勢士繼其踵者惟恐其位之不速也名與勢然也别勑長流長孫無忌奏别勑長流以爲永例後趙公犯罪勑長流嶺南至死不復回此亦爲法自敝也決杖百流嶺南李朝隱爲大理卿武彊令裴景仙丐贓五十疋帝怒杖殺之曰景仙其先寂有國功又丐乞贓無死比籍當死坐猶將宥之固請決杖百流嶺南四曰流書云流宥五刑謂不忍刑殺宥之于逺也唐刑法志得罪當流李安逺與王珪最善珪坐王頗得罪當流安逺爲營䕶免矣長流登州五代王殷廣順三年秋九月永壽節殷求入爲壽太祖許之而懼其疑也復遣使止之明年太祖有事於南郊是冬殷來朝殷握兵柄職當警衛岀入多以兵從又求甲兵以備非常是時太祖臥疾疑殷有異志乃力疾御兹德殿殷入起居即命執之削奪在身官爵長流登州已殺之詔流罪無逺近皆徙邊要州太宗十四年詔流罪無逺近皆徙邊要州後犯者寖少出刑法志諸王子孫雖嬰褓亦投嶺南則天皇后武氏諸王牽連死戮殆盡子孫雖嬰褓亦投嶺南悉投放醜裔薛懐義隂募少年千人爲浮屠有逆謀侍御史周矩劾狀請治驗太后曰是道人素狂不足治力少年聽窮劾矩悉投放醜裔懐義搆矩免官貶黜十六白三黜栁下惠爲士師三黜曰直道而事人焉往而不三黜三已令尹子文三已之無愠色降階白衣領職晋周顗伯仁爲吏部尚書醉酒爲有司所糾詔令白衣領職左遷左降左轉左授思過之地放黜師保書絀爵禮簡不肖以黜惡禮事君三違不岀境則利祿也雖曰不要君吾不信奪之官邑咸黜不端再免潘安仁再免官黜乃亂也楚太子放臣逐臣遷客禦魅見上注行吟澤畔屈原既放乃行吟澤畔爲懷沙賦沉汨羅而死召歸宣室賈誼謫居長沙長沙卑濕自傷悼爲鵬鳥賦後歲餘文帝思誼徵還上在宣室詔誼入語俟罪長沙賈誼謫爲長沙王傅既已謫去渡湘爲賦弔屈原曰恭承嘉惠兮俟罪長沙側聞屈原兮自沉汨羅云云罪人黜伏謫去謫居直道獨醒謫居三年屏去失息禁闥俟罪荒陬瘴癘賈誼長沙之中實傷鵩鳥屈原汨羅之上見著離騷將不甘心故無鉗口投諸四裔孔聘邵王妓宗楚客坐聘邵王妓貶原州都督絀放權德輿言比經絀放者自謂􅋞拭無期坐爲匪人以動和氣而冬薦官踰三年未受命衣食既空溘然就斃此亦窮人之一端也廢黜者因姦冒進栁澤疏遷貶無闋日李訓字垂訓本挾竒進及大權在已鋭意去惡故與帝言天下事無不如所欲挾注相朋比務報恩復讎素忌李德裕宗閔之寵及因楊虞卿獄指爲黨人嘗所惡者悉䧟黨中遷貶無闋日班列幾空中外震畏削跡朝端李邕字泰和貶遵化尉妻温復爲邕請戍邊自贖曰頻謫逺郡削跡朝端不啻十載歲時歎戀聞者傷懐願寛逐臣過惡王起字舉之帝數訪逮時政因積雨願寛逐臣過惡雖坐貶黜俄而遷復盧懐慎諫竊見内外官有賕餉狼藉劓剝烝人雖坐貶黜俄而遷復還爲牧宰任以江淮嶺磧粗示懲貶内懷自棄徇貨掊貲訖無悛心明主之於萬物平分而無偏施以罪吏牧遐方是謂惠奸而遺逺坐小灋貶唐儉字茂系坐小法貶光祿大夫三貶朱崖大中中李太尉三貶至朱崖兩判皆爲擬進用者而令狐綯之詞未知孰是有俗傳云虵用兩頭狐揺九尾鼻不正而身豈正服既斜而心亦斜仇家謗也南部新書屈平顦顇滯江潭亭伯流離放遼海折翮翻飛隨轉蓬李白送族弟中使臨門遣頃刻不得留病妹卧牀褥分知隔明幽悲啼乞就列百請不頷頭韓愈赴江陵乆作朝士貶得非命所施韓愈崔立之詩趙璧爲誰㸃隋珠枉被彈李白送竇司馬望望思得效用栁宗元與京兆書凡人之黜棄皆望望思得效用放臣不宜與善地劉禹錫字夢得叙張九齡爲宰相建言放臣不宜與善地悉徙五谿不毛處然九齡自内職出始安有瘴癘之歎罷政州守荆州有拘囚之思身出遐陬一失意不能堪矧華人士族必致醜地然後快意哉議者以爲開元良臣而卒無嗣豈忮心失恕隂責最大雖他美莫贖邪㾗廢程异字師舉爲鹽鐵楊子院留後叔文敗貶郴州司馬李巽領鹽鐵薦异心計可任請拔擢用之乃復爲楊子留後异起㾗廢能厲已竭節悉矯革征利舊弊曠然無黜免意栁渾字夷曠免後數日置酒召故人出遊酣肆乃還曠然無黜免意醜地李朝隱字光國擢大理丞武三思搆五王而侍御史鄭愔請誅之朝隱獨以不經目實不宜輕用法忤㫖斥醜地徒役十七白于役計年斷徒配役驅以就役計徒傳曰計徒庸也役諸司空周禮凡萬人有罪者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞月役則宥而赦之注云役者使給百工之役也伐薪之年鬼薪徒也就役計日徒坐舂藁徒役女子之所凡害人者寘之圜土而施諸職事以明刑恥之明刑書罪惡於大方版著背也不齒三年不得列於平人不能改岀乎圜土者殺之司圜掌收教罷人凡害人者不使飾冠著墨幪與古象刑同任之以事若今罰征上罪三年而捨中罪二年下罪一年凡圜土之刑人也不虧其財漢惠詔上造以上内外公孫有罪當刑及當爲城旦舂皆耐爲鬼薪白粲城旦謂旦旦起治城舂者婦人不預外徭役俱舂作米四歲刑取薪給宗廟白粲令擇米皆三歲刑張蒼定律諸當髠髠當爲完者完爲城旦舂滿三歲爲鬼薪白粲鬼薪白粲一歲入于𨽻臣妾𨽻臣妾一歲免爲庶人男子爲𨽻臣女子爲𨽻妾逃亡及耐罪以上不用此令有爵者七十者未齓者皆不爲奴有爵謂命士已上男子八歲女子七歲而毁齒此司厲之職也復作邴吉使女徒復作復作弛刑徒弛刑徒不私鎻但責保顧山錢平紀天下人徒已論歸家出顧山錢月三百王陵爲刑徒於道魏王陵過事髠五歲當掃道孔徒者得悉徙邊嚴郢字叔敖御史臺請天下斷獄一切待報徒者得悉徙邊郢言罪人徙邊即流也本傳三曰徒徒者奴也蓋奴辱之周禮曰其徒男子入于罪𨽻任之以事寘之圜土而教之量其罪之輕重有年數而捨見刑法志長役之宗室李復字初陽改容州刺史先是西原亂吏獲反者沒爲奴婢長役之復至使訪親戚一皆原縱罷役徒梁本紀乾化二年五月丁亥德音降死罪已下囚罷役徒五代史徒非重刑天子惻然詔曰徒非重刑而役者寒暑不釋唐刑法志私罪徒以上會赦免徐有功時有詔公罪流私罪徒以上㑹赦免踰百日不首復論有功奏曰陛下寛殊死罪已發者原之於是通改過之心自新之路故肆告赦前事以其罪罪之若無告言所犯終不自發如告言赦前事則與律乖今赦前之罪不自言者還以法論則恩雖布天下而一罪不能貸臣竊爲陛下不取隋徒刑五自一年至于三年唐因之白孔六帖卷四十六
