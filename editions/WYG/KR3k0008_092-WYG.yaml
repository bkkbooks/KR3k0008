body:
  text: 白孔六帖卷九十二唐白居易原本宋孔傳續撰詐偽一謟佞二小人三惡四讎怨五父母讎六兄弟讎七交遊讎八爭九詐偽一矯飾附白莫大之姧無赦之罪事則憑虛罪宜閱實作偽心勞日拙其行也詐詐謀行偽而堅言偽而辨無載爾偽無行險偽人之偽言防偽周禮以五禮防萬人之偽詐偽之心行詐由之行詐著誠去偽鄙詐之心入之矣君子審禮不可誣以奸詐詭譎情偽予欺詭辭辟名周禮凡失財用物辟名皆誅之辟名謂巧詐為文書與實不相應也矯飾詐善矯名釣名誠為小節未得中行為善無近名矯誣詐也非其矯節是不知言情偽掠美譎而不正華而不實孔専以憸偽罔上裴延齡剥下附上肆騁譎怪其進對皆他人莫敢言而延齡言之不疑亦人之所未聞者帝頗知其詐是時陸贄為宰相極論其譎妄不可任㑹鹽鐵使張滂京兆尹李充司農卿李銛皆劾延齡專以憸偽罔上帝怒罷贄宰相左除滂等官内不情張亮外敦厚而内不情莫能探其膺肺封倫善矯飾居之自如人莫能探其膺肺隱刺之亂數進忠策太宗以為誠横賜累萬披香殿蘇世長侍宴披香殿酒酣進曰此煬帝作邪何雕麗底此帝曰卿好諫似直然詐也豈不知此殿我所營乃詭云煬帝邪引咎自撻初在陜邑里犯法不能禁乃引咎自撻於㕓五伯疾其詭鞭之流血世長不勝痛楚而走人笑其不情詭激竇懷貞少詭激攝提入太微紀處訥神龍元年大旱中宗召問所以救人者武三思知之隂諷太史迦葉志忠奏是夜攝提入太微近帝座此天子與大臣接有納忠之符帝信之下詔褒美賜處訥衣一副綵六十叚託疾盧祖尚太宗召見内殿謂曰交州去朝廷逺前都督不稱職公為我行無以道逺辭也祖尚頓首奉詔既而託疾自解欺神誣君宗楚客嘗諷右補闕趙延禧陳符命以媚帝帝大喜權延禧諌議大夫識者以楚客欺神誣君且有大咎多詐宗室巨安禄山䧟東都授河南節度使詔兼御史大夫巨奏方艱難時賊多詐有如陛下召臣何以取信乃析契授之詐為可喜事王世充突厥圍帝鴈門世充悉發江都兵赴難詐為可喜事以邀聲譽在軍蓬首垢面日夜悲泣不釋甲卧必席藁帝以為忠愈屬信之乗險抵􅇖劉栖楚其性詭激敢為怪行乗險抵􅇖若無顧藉聖米杜佑鎮淮南時方旱道路流亡籍籍民至漉漕渠遺米自給呼為聖米權德輿上䟽斥言延齡裴延齡以巧倖進判度支權德輿上䟽斥言延齡以常賦正額用度未盡者為羡利以誇已功用官錢售常平雜物還取其直號别貯羡錢因以罔上辯給多詐宇文融拜御史中丞中書令張説素惡融融每建白說輒引大體廷爭融揣說不善欲先事中傷之張九齡謂說曰融新用事辯給多詐公不可以忽說曰狗鼠何能為侈言誕計闗播時李元平陶公逹張愻劉承誠率輕薄子游播門下能侈言誕計以功名自喜播謂皆宰相材數請帝用之詐忠宋申錫開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉久未原雪帝慙曰我當時亦悟其失而詐忠者廹我以社稷計故耳使逢漢昭宣時當不坐此因追復右丞飾情希進韓滉晚節益苛慘故論者疑其飾情希進陸贄上書推至誠去逆詐妄作符命徐浩東都留守王倕表署其府民有妄作符命者衆不為疑浩獨按篆詰狀果詐為之險躁譎詭吕温性險躁譎詭而好利妄言陂葦裴延齡擢司農少卿帝京右偏故有葦地數頃請以為内厩牧地水甘草薦與序厩等帝信之以問宰相皆曰當無有帝遣使按覆果詐延齡大慙帝不責也同州大谷木又造神龍佛祠須材五十尺者延齡妄奏同州大谷木數千章度皆八十尺譎妄是時陸贄為宰相帝素所信重極論其譎妄不可任帝以為排媢愈益厚延齡歲旱不害有秋李實貞元二十年旱徳宗訪外疾苦實詭曰歳旱不害有秋權詭王重榮多權詭衆所嚴憚雖主帥莫不下之灸無完膚劉廼帝狩奉天廼卧疾私第朱泚遣人召之面稱疾篤復遣偽相蔣鎮慰誘廼佯瘖不荅灸無完膚權臯安禄山藉其名表為薊尉署幕府臯度禄山且叛天寶十四載使獻俘京師還過福昌尉仲謩謩妻臯妹也宻約以疾召之謩來臯佯喑直視謩而瞑謩為盡哀自唅斂之臯逸去人無知者云積薪自焚郎餘令徙幽州録事參軍有為浮屠者積薪自焚長史裴㷡率官屬將觀焉餘令曰人好生惡死情也彼違蔑教義反其所欲公當察之毋輕往㷡試廉按果得所奸下痢陽瘖王維遷給事中安禄山反𤣥宗西狩維為賊得以藥下痢陽瘖禄山素知其才迎置洛陽詭言馬殆不進喬琳從幸奉天進幸梁州次盩厔詭言馬殆不進帝素以舊老禮之給乗輿馬辭病甚力帝賜所執策曰勉為良圖與卿别矣鐵胎銀五代慕容彦超為人多智詐而好聚斂在鎮常置庫質錢有姧民為偽銀以質者主吏久之乃覺彦超隂教主吏夜穴庫垣盡徙其金帛于他所而以盗告彦超即榜于市使民自占所質以償之民皆争以所質物自言已而得質偽銀者寘之深室使教十餘人日夜為之皆鐵為質而包以銀號鐵胎銀其被圍也勉其城守者曰吾有銀數千鋌當悉以賜汝軍士私相謂曰此鐵胎爾復何用哉皆不為之用䛕詐陸贄奏議𤣥宗甘䛕詐之從詔漸漬不聞其失左右使令詐難憑謹勿浪信常兢兢韓愈永貞行矯詐險賊盧杞作相矯詐險賊排斥忠良詭詐牛羊日厯牛僧孺外惟簡黙内詭詐瑞鹽蔣鎮天寶末轉户部侍郎韓滉上言河中鹽生瑞鹽上以秋霖稍多水潦為患不宜生瑞命鎮馳驛撿行之鎮奏與滉同請置神祠錫其嘉號寶應靈慶池時霖潦彌月鹽池為潦水所入其味多苦鎮庇之飾詐識者醜之詐紿百情吐蕃詐紿百情懐惡相濟謟佞二白逺佞人便辟巧媚善柔面柔便佞佞而辯謟䛕佞倖佞臣漢武帝時朱雲上言願賜上方斬馬劍斷佞臣頭以勵其餘上問誰曰永昌侯張禹取媚茍容而難任人難拒也任佞也素議所斥竇懐貞附宗楚客安樂公主等以取貴位為素議所斥張廷珪上書願登端士放佞人衣笥有五色雲勸宣布韋巨源與安石同系景龍二年韋后自言衣笥有五色雲巨源倡其偽勸中宗宣布天下帝從其言因是大赦盛贊天子威德李絳李吉甫甞盛贊天子威德帝欣然絳獨曰陛下自視今日何如漢文帝帝曰朕安敢望文帝對曰是時賈誼以為厝火積薪下火未及然因以為安其憂如此甘言阿匼李齊運常次進帝與參决大事既無學暗于大體第以甘言阿匼而已人之甚利陸贄趨和求媚人之甚利存焉邪謟得君則正士危乂陸贄賛曰夫君子小人不兩進邪謟得君則正士危何可貲耶側媚張仲方李吉甫卒上議曰吉甫雖多才多藝而側媚取容疉致台衮又言吉甫名不配行請俟蔡平然後議之佞柔楊虞卿佞柔善諧麗權幸倚為姦利以幸進韋貫之皇甫鏄張宿皆以幸進宿使淄青裴度欲為請銀緋貫之曰宿姦佞吾等縱不能斥奈何欲假以寵乎謟事嚴挺之遷太府卿宰相張九齡雅知之用為尚書左丞知吏部選李林甫與九齡同輔政以九齡方得君謟事之内實不善也陸贄上書逺憸佞嗜䛕人務辨君子小人而惡直嗜䛕則君子小人固不可辨矣姦佞營蠱陳京傳憲宗甞問宰相李吉甫我在藩邸聞德宗播遷梁漢久乃復誰實召亂為我言之對曰德宗始即位躬行慈儉引崔祐甫輔政四方企望至治祐甫歿宰相非其人姦佞營蠱謂河北叛臣可以力服甘語先入主聽惑焉而陳京趙賛為帝稅屋架貸賈緡内怨外忿身及大亂咎興信宵人剝下佐上賴天之靈敗不抵亡也狎猥佻佞忘君臣禮法李適為學士帝有所感即賦詩學士皆屬和當時人所歆慕然皆狎猥佻佞忘君臣禮法唯以文華取幸奉溺器宋之問于時張易之等承昵寵甚之問與閫朝隱沈佺期劉允濟傾心媚附易之所賦諸篇盡之問朝隱所為至為易之奉溺器景龍中謟事太平及安樂權盛復往諧結故太平深疾之伏身俎盤為犧閻朝隱后有疾令往禱少室山乃沐浴伏身俎盤為犧請代后疾還奏㑹后亦愈大見褒賜其資佞讇如此絀左右之纎佞劉蕡策宜絀左右之纎佞用憸巧中帝意韋渠牟特用憸巧中帝意非有嘉謨正辭感悟得君也巧媚自固皇甫鏄帝以天下略平亦欲崇臺沼宫觀自娱樂鏄與程异知帝意故數貢羡財隂佐所欲又賂吐突承璀為奥援故帝排衆論决任之反以度為朋黨不内其言鏄乃益以巧媚自固迂媚武士彠嘗自言夢帝騎而上天帝笑曰爾故王威黨也以能罷繫劉宏基等其意可録且嘗禮我故酬汝以官今胡迂妄媚我耶專徇帝嗜欲楊國忠便佞專徇帝嗜欲不顧天下成敗以便佞得大任李林甫始九齡繇文學進守正持重而林甫特以便佞故得大任善養君欲林甫善養君欲自是帝深居燕適沈蠱衽席主德衰矣林甫毎奏請必先餉遺左右審伺微㫖以固恩信至饔夫御婢皆所欵厚故天子動静必具得之茍非秦鏡照膽堯羊觸邪安能不惑元稹戒勵風俗德音善柔成性佞媚為心昔事馬周分桃見寵後交劉洎割袖承恩生其羽翼長其光價王義方彈李義府䟽姧邪善害人文粹皮日休鹿門書􅀈蚄害稼不能害人姧邪善害人害稼者有時而稔是不害也雖有祝鮀之佞宋朝之美其害人也可勝道哉蔽欺天子林甫居相位凡十九年固寵市權欺蔽天子耳目諫官皆持禄養資無敢正言者神降丹鳳門以為老子告錫靈符陳希烈天寶元年有神降丹鳳門以為老子告錫靈符希烈因是上言臣侍演南華真經至七篇陛下顧曰此言養生朕既悟其術而德充符詎無非常應哉臣稽首對陛下德充於内符應於外必有絶瑞表之今靈符降錫與帝意合宜示史官著顯祥樆照無窮其媮佞類如此陳子昻八科以正攻佞勢不相利希進取房孺復多招術家言已五十當得宰相以熏權近希進取為人巧佞五代蘇循為人巧佞阿䛕無恥惟利是趨也本傳邇佞䛕者非治安之宜柳澤䟽請視便液郭宏霸再遷右臺侍御史大夫魏元忠病僚屬省候宏霸獨後入憂見顔間請視便液即染指嘗驗疾輕重賀曰甘者病不瘳今味苦當愈喜甚元忠惡其媚暴語于朝謟附貴宦若子姓奉父兄吉温裴均初均與崔太素俱事中人竇文場太素嘗晨省文場入卧内自謂待之至厚徐觀後榻有頻伸者乃均也願令公速愈成敬苛與姚崇有親姻崇寢疾敬苛造宅省焉對崇涕淚懐中置生雀數頭持出放之祝云願令公速愈崇忿其䛕媚自兹不復接遇唐新語以笏叩顙呼明主五代何澤外雖直言而内實邪佞嘗於内殿起居班退獨留以笏叩顙北望而呼曰明主明主聞者皆哂之鳴靴鼻張說謟事王毛仲其拜相王有力焉說往謝之抱之而舞鳴其靴鼻出朝野僉載唐太宗知士及之佞為游言自解宇文士及賛唐太宗知士及之佞為游言自解亦不能斥彼中材之主求不惑於佞難哉指野鳥為鸞舊史髙祖使建成世民將兵擊西河郡攻拔之執郡丞髙德儒世民歎之曰汝指野鳥為鸞以欺人主取髙官吾興義兵正為誅佞人耳遂斬之順是非以事之元稹獻事表其小人擇利而喜曰君之所惡者拂心逆耳之言也吾將苟順是非以事之可也由是進見者革而不内言事者寢而不聞性謟詐善諧結權貴竇懐貞性謟詐善諧結權貴宦者用事無不畏奉或見無鬚者誤為之禮君非其家奴何郎之云宋璟時朝廷以易之等内寵不名其官呼易之五郎昌宗六郎鄭善果謂璟曰公奈何謂五郎為卿璟曰以官正當為卿君非其家奴何郎之云遽能結交游識時知變傾心面北事三五人牛羊日厯常曰人生一世成童之後精方壯遽能結交游識時知變傾心面北事三五人可不下床使名譽若轉丸走坂又何必如老書生輩矻矻於筆硯間暗記六經思溺詩賦髪白齒落曾不沾寸禄而覊窮不暇如此豈在讀書業文乎佞存真妾婦諌死是男兒元稹邪佞每思當面唾杜牧商山欲學為佞韓愈上崔虞部書欲學為佞則患言訥辭直卒事不成徒使其躬儳焉如不終日叛人佞子劉子元賛聖主賢臣叛人佞子善惡汩汩有所未盡禠朝服以項挽車安樂公主趙履温謟事主嘗禠朝服以項挽車韋庶人死蹈舞承天門呼萬歲臨淄王斬之小人三白小人從邇難事易恱使人求備比而不周同而不和不恥不仁不畏不義不見利不勸不威不懲難養唯女子與小人為難養也喻利小人喻於利釁勇嗇禍小人之性近之則不遜逺之則怨以小惡為無傷小人以小惡為無傷而不去故惡積而不可掩罪大而不可解孔魏徴上䟽曰在貞觀初親君子斥小人比來輕䙝小人禮重君子重君子也恭而逺之輕小人也狎而近之近之莫見其非逺之莫見其是莫見其是則不待間而䟽莫見其非則有時而昵昵小人䟽君子而欲致治非所聞也又陳事曰若欲令君子小人是非不雜必懐之以德待之以信厲之以義節之以禮然後善善而惡惡審罸而明賞無為之化何逺之有昵小人李乾佑雖彊直然昵小人狄仁傑䟽曰比縁軍興官吏侵漁州縣科役督趣鞭笞情危事廹不循禮義投跡犬羊以圖賖死此君子所愧而小人之常辨邪李德裕臣在先朝嘗獻大明賦以諷五曰辨邪諷任羣小也咎惡暴天下鄭注薦李訓使待詔帝欲授諫官徳裕曰昔諸葛亮有言親賢臣逺小人漢所以興隆也親小人逺賢士後漢所以傾頽也今訓小人頃咎惡暴天下不宜引致左右治亂繫信任又謂治亂繫信任引齊桓公問管仲以害霸者仲對琴瑟笙竽弋獵馳騁非害霸也惟知人不能舉舉不能任任而又雜以小人害霸也二張勢傾朝廷魏元忠為左庶子時二張勢傾朝廷元忠嘗奏曰臣承先帝之顧且受陛下厚恩不能徇忠使小人在君側臣之罪也易之等恨怒陸贄上書務接下而不辨君子小人則下固不可接矣塞隂邪之路屏䙝狎之臣劉蕡策姦回人也李珏始鄭注以醫進文宗一日語珏曰卿亦知有鄭注乎宜與之言珏曰臣知之姦回人也帝愕然險薄小人周利貞貶涪州刺史未㡬復授黔州都督黄門侍郎張廷珪又奏還制書曰利貞險薄小人附㑹三思傾危朝廷何往日罸之而今日賞之𤣥宗乃止五鬼南唐李景以馮延已常夢錫為翰林學士馮延魯為中書舍人陳覺為樞宻使魏岑查文徽為副使夢錫直宣政殿專掌宻命而延已等皆以邪佞用事呉人謂之五鬼揣所說意度所惡聞陸贄奏議夫流俗之敝多徇謟䛕揣所說意者則侈其言度所惡聞者則小其事蔽明害理同上夫小人於蔽明害理如目之有眯耳之有充嘉榖之有蟊粱禾之有蠹蠅營狗茍韓文送窮夫口道先生語行如市人其名曰盜儒牛僧孺傳賛羣沙穢明珠衆草凌孤芳李白古風叔文沾沾小人竊天下柄與陽虎取大弓春秋書為盗無以異本賛鄭注嶄嶄小人本賛輸金袖璧可以不讀書為名儒牛羊日厯京兆尹楊虞卿上達宰相下干有司若黨附者朝為布衣暮拾青紫其或能輸金袖璧可以不讀書為名儒不識字為博學今其黨赤舌而攻之楊虞卿黨嫉不附已者今其黨赤舌而攻之輦下謂三楊為通天狐三十餘年為朝廷之隂蠧又曰門生故吏不牛則李又曰丑􅇋膿女紅切多用半裝言僧孺取人多取登朝及宗閔之門生故吏謂之多用半裝罄室相結牛僧孺辛秘為考官時以女妻之有應科目人楊承和當秘為考官時與登科中書覆落承和甚恩秘一日乃為内臣以至朱紫秘不知之元和中秘為禮於宣政殿方與承和相見且曰坐主記得門生否既之知曰老夫不忘也有一子壻仰累承和且言於帝呼為牛即乃罄室相結元和末僧孺乂引三楊與承和結識穆宗立承和有定策之功僧孺與焉洎承和掌樞宻僧孺不數年登台坐内有奥主及宗閔為相又引僧孺凡在宗閔門生雖卑官不周歲皆至大僚目内有奥主謂承和也凡在朋黨四十人􅏽人魏徵甞薦杜正倫矦君集才任宰相及正倫以罪黜君集坐逆誅􅏽人遂指為阿黨也浮狹少年貟半千累兼右控鶴内供奉半千以控鶴在古無有而授任者皆浮狹少年非朝廷德選請罷之邪薄之夫陽城傳柳宗元遺何蕃等書曰陽公在朝四方聞風貪冒茍進邪薄之夫沮其志漢唐之末舉其朝皆小人也五代史嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉予甞至繁城讀魏受禪見漢之羣臣稱魏功德而大書深刻自列其姓名以誇耀于世又讀梁實録見文尉等所為如此未甞不為之流涕也夫以國予人而自誇耀及遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉鑒其方鳩僝功辨其順非堅偽陸相奏議堯代之共工魯邦之少夘伏惟陛下協放勲文思之德而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽惡四朋黨附白惡之易也如火之燎于原不可嚮邇其猶可撲滅乎聚慝慝惡也惡不可長長惡不悛見惡如農夫之務去草必絶其根本勿使能植同惡相濟復惡已甚髙伯其為戮乎小人以小惡為無傷見上注惡積不可掩起穢自臰腥聞人之無良多僻爵罔及惡德惟其賢癉惡彰善癉惡癉去也樂禍惡惡如巷伯佗膓内惡朋黨君子周而不比小人比而不周邪朋朋黨使正不正三室如一傳同惡相求同求相合朋家作仇黨附後漢皇甫規自陳黨附黨與景毅恥不在録牒後漢誅黨固李膺杜宻等侍御史景毅遣子事膺而未在録牒不預難毅曰本令子事膺是尊李公之道今遇難豈茍免乎遂自劾枝葉相持漢書魏其矦灌夫相為引重近相稱舉三互法靈帝時以州郡相黨制婚姻及二州人士不得相對監臨後有三互法上下雷同有黨必有讎言妄人無黨孔疾惡韋雲起太學博士王頗每嘆曰韋生識悟富貴可自致然疾惡甚恐不得死訖如言果為竇軌敷奏殺之又劉暹天資疾惡又鄭覃疾惡多所不容世以為大過憚之又田仁㑹資彊摯疾惡疾惡如讎李邕貶遵化尉妻温復為邕請戍邊自贖曰邕疾惡如讎誅四凶李義府三子及壻尤凶肆既敗人以為誅四凶或作河間道元帥劉祥道破銅山大賊李義府露布榜于衢險賊寖露盧杞既得志險賊寖露賢者媢能者忌朋黨盗權蕭瑀素貴但中狹毎燕見輒言𤣥齡輩朋黨盗權若膠固然特未反耳帝曰知臣莫若君朕雖不明寧頓懵臧否李安期曰比見公卿有所薦唯皆劾為朋黨滯抑者未伸而主薦者已訾所以人人争禁黙以被囂謗附下罔上韋雲起大業初改謁者建言今朝廷多山東人自作門戸附下罔上為朋黨不抑其端必亂政因條陳姧狀煬帝屬大理推究於是左丞郎蔚之司𨽻别駕郎楚之等皆坐免雅惡朋比唐憲宗雅惡朋比傾䧟者嘗覽辯謗略善之坐宗閔黨宗室漢坐宗閔黨出為汾州刺史公為我引楊執柔為黨狄仁傑為來俊臣所搆捕送制獄其屬王得壽以情謂曰我意求少遷公為我引楊執柔為黨公且免死仁傑嘆曰皇天后土使仁傑為此乎即以首觸柱血流沫而得壽懼而謝窮治忠羲等黨陸象先時窮治忠羲等黨與象先宻為申救保全甚衆當時無知者挾黨背公房琯帝以琯虛言浮誕内怏怏挾黨背公非大臣體乾元元年出官為邠州刺史附㑹嬖近黎幹附㑹嬖近挾左道希主恩市人羣噪投礫幹除名長流既行市人數百羣噪投礫從之上阿容則下朋黨班宏擢京官考使右僕射崔寧署兵部侍郎劉廼為上下考宏不從曰夫上多虚美則下趍競上阿容則下朋黨因削之乃聞謝曰敢掠一美以邀二罪乎李絳論朋黨李絳帝患朋黨以問絳荅曰自古人君最惡者朋黨小人揣知故常藉口以激怒上心朋黨者尋之則無跡言之則可疑小人常以利動不顧忠義君子者遇主知則進疑則退安其位不為它計故常為姦人所乗夫聖人同跡賢者求類是同道也非黨也陛下奉遵堯舜禹湯之德豈謂上與數千年君為黨耶道德同爾漢時名節骨鯁之士同心愛國而宦官小人疾之起黨錮之獄訖亡天下趍利之人常為朋比同其私也守正之人常遭構報違其私也小人多譛言常勝正人少直道常不勝可不戒哉絳居中介時為左右所不恱遂因以自明多引私黨顔真卿知省事時元載多引私黨畏羣臣論奏乃紿帝曰羣臣奏事多挾讒毁請每論事皆先白長官長官以白宰相宰相詳可否以聞真卿上䟽惡朋黨李晟尤惡下為朋黨者投殛姦黨韋臯知叔文多釁請皇太子監國又上牋暴叔文伾之姦太子遂受禪因投殛姦黨論李逢吉黨薛廷老論李逢吉黨張權輿程昔範不宜居諫争官逢吉怒孔緯疾惡若讐中外聞風未繩輒肅帝惡大臣朋比屛居華隂李茂貞入殺韋昭度帝惡大臣朋比與藩臣交更召緯入朝忌其親近鄭覃文宗召為侍講李宗閔牛僧孺知政以覃與李德裕厚忌其親近為助陽遷工部尚書罷侍講欲推逺之疾惡多所不容覃疾惡多所不容世以為太過憚之詣附王叔文隂結天下有名士而士之欲速進者率詣附之若韋執誼陸贄吕温李景儉韓景韓泰陳諫柳宗元劉禹錫為死友而凌凖程异又因其黨進出入詭秘外莫得其端柳宗元書今其黨與幸獲寛貸各得善地無公事坐食奉禄德至渥也務交結殷侑晚節内兾台輔稍務交結而素望少衰小人之徒同惡裴度帝嘗語曰臣事君當勵善底公朕惡夫樹黨者度曰君子小人以類而聚未有無徒者君子之徒同德小人之徒同惡外甚類中實逺在陛下觀所行必辨本傳種支黨李逢吉既代相思有以牙孽之引所厚李仲言張又新李續張權輿等内結宦官種支黨醜沮日聞乃出度山南西道節度使隂結近倖李逢吉憲宗惡之出為劍南東川節度使穆宗即位徙山南東道縁講侍恩隂結近倖召入為兵部尚書有所求請先賂闗子其黨有張又新李續張權輿劉栖楚李虞程昔範姜治及訓八人而傅㑹者又八人皆任要劇故號八闗十六子有所求請先賂闗子後逹於逢吉無不得所欲樹黨相磨軋四十年李宗閔長慶初錢徽典貢舉宗閔託所親於徽而李徳裕李紳元稹在翰林有寵於帝共白徽納于丏取士不以實宗閔坐貶劍州刺史由是嫌怨顯結樹黨相磨軋四十年大和中以吏部侍郎同平章事時德裕自浙西召欲以相而宗閔中助多先得進即引僧孺同秉政相唱和去異已者德裕所善皆逐之魁德裕為相與宗閔共當國德裕入謝文宗曰而知朝廷有朋黨乎德裕曰今中朝半為黨人雖後來者趨利而靡往往䧟之陛下能用中立無私者黨與破矣帝曰衆以楊虞卿張元夫蕭澣為黨魁德裕因請皆出為刺史帝然之去河北賊易去此朋黨難時訓注欲以權市天下凡不附巳者皆指以二人黨逐去之人人駭慄連月雺梅帝乃詔宗閔德裕姻家門生故吏自今一切不問所以慰安中外嘗嘆曰去河北賊易去朝廷朋黨難朋比憸佞楊嗣復輔政與宗閔善欲復用而畏鄭覃乃託宦人諷帝帝因紫宸對果曰朕念宗閔久斥應授一官覃曰陛下徙令少近則可若再用臣請前免陳夷行曰宗閔之罪不即死為幸寶厯時李續張又新等曰八闗十六子朋比憸佞朝廷幾危李珏曰此李逢吉之罪今續䘮闋不可不任以官夷行曰不然舜逐四凶天下治朝廷何惜數憸人使亂紀綱崇私黨薰熾中外宗閔初為裴度引拔後薦德裕可為相宗閔遂與為怨韓愈為作南山猛虎行規之而宗閔崇私黨薫熾中外卒以是敗以朋黨獲譏楊嗣復紫宸奏事嗣復為帝言陸洿屏居民間而上書論兵可勸以官珏趣和曰士多趍競能奬洿貪夫廉矣比竇洵直以論事見賞天下釋然况官洿耶帝曰朕賞洵直褒其心爾鄭覃不平曰彼包藏固未易知嗣復曰洵直無邪臣知之覃曰陛下當察朋黨嗣復曰覃疑臣黨臣應免即再拜祈罷珏見言切繆曰朋黨固少弭覃曰附離復生帝曰向所謂黨與不已盡乎覃曰楊漢公張又新李續嗣復曰臣聞左右佩劒彼此相笑未知覃果謂誰為姦邪因當香案頓首曰臣位宰相不能進賢退不肖以朋黨獲譏非所以重朝廷固乞罷帝方委以政故慰安之八闗十六子張又新李逢吉用事與拾遺李續劉栖楚等為逢吉摶吠所憎故有八闗十六子之目植私竇劉二張賛詩人斥譛人最甚投之豺虎有北不置也如羣栖楚輩則然肆訐以示公搆黨以植私其言纚纚若可聽卒而入于敗亂也孔子所謂順非而澤者歟利口覆邦家者歟不敢負約韋執誼與王伾居中竊命欲執誼据以奉行因用迷奪朝權執誼既為所引然外廹公議欲示天下非黨與者乃時時異論相可否而宻謝叔文曰不敢負約欲共濟國家事爾傅匪人韋王陸劉柳程賛曰彼若不傳匪人自勵材猷不失為名卿大夫惜哉無邪心李徳裕帝嘗從容謂宰相曰有人稱孔子與顔回子貢相稱譽不為朋黨禹稷與臯陶轉相汲引不為比周無邪心朋黨益熾李珏開成中楊嗣復得君引珏同中書門下平章事與李固言皆善三人者居中秉權乃與鄭覃陳夷行等更持議一好惡相影和朋黨益熾矣以黨語汙搢紳周墀太和中訓注亂政以黨語汙搢紳有名士分逐之獨墀雖嘗為宗閔所禮不能以罪誣也牛頭阿旁路巖俄與韋保衡同當國二人勢動天下時目其黨為牛頭阿旁言如鬼隂惡可畏也蚩謫李商隱王茂元鎮河陽愛其才以子妻之得侍御史茂元善李德裕而牛李黨人蚩謫商隱以為詭薄共排斥之託其權武三思司農少卿趙履温中書舍人鄭愔長安令馬構司勲郎中崔日用監察御史李􅞥託其權熏炙中外狡獪張鎬言滑州防禦使許叔兾狡獪臨難必變宜追還宿衛書入不省進朋黨之說夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者故甞寡過而小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交游執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣五代史孔子其徒三千不可謂之朋黨於延英殿侍講陛下謂臣等云孔子其徙三千不可謂之朋黨後漢太學諸生頗干時政其時謂之處士横議皆是亂風深要懲絶伏望陛下知其邪計從朋黨中來毎事明察遏絶將來之漸則朝廷安静邪黨自消賛皇一品集渠憸宿狡酷吏序痛詆當路李德裕初吉甫相憲宗牛僧孺李宗閔對直言䇿痛詆當路條失故吉甫訴于帝且泣有司皆得罪遂與為怨黨人牢不可破李德裕裴度薦材堪相而李宗閔以中人助先秉政且得君而出德裕凡德裕所善悉逐之於是二人權震天下黨人牢不可破矣讎怨五必報不報附白始因胥怨終乃交讐代為仇讎乃伏代讐虐我則讐讎不逺矣鄭息違言違恨之言也周鄭交惡兩相疾惡也蓄憾毫髪為瑕毫髪一為瑕邱山不可勝復讎因疾猶慙義士之心趙喜結客報讐遇讎家病不殺後竞殺之見下注加怒及屍豈為仁者之勇杯酒失意失意杯酒間白刃起相讐忘我大德思我小怨相為敵讎結怨于人怨不在大亦不在小和難難仇讐也和平也書於士周禮報怨仇讐者書於士殺之無罪注云同國不相避也將報則無罪也怨耦曰仇仇家怨汝詈汝怨豈在明不見是圖圖於其所不見易曰我仇有疾不我能即吉調人職曰凡鬬怒者成之不可則書之先動者誅之謂不可和調者仇予書曰萬姓仇予雖有忮心不怨飄瓦瓦落中人人不怨也以無情故内隙憾而能胗胗重安也怨府聚怨也禮著復讎傳明敵怨若枕干之志無已則推刃之禍難勝必報奮其武怒以報其大耻傳唯思舊怨子常思舊怨以敗殄殱乃讎書復修舊怨呉子伐陳復修怨也舊曰夫差不修德而修怨也逃讎不如死楚昭王曰弃盟逃讎不如死死之一也其死讐乎以怨報怨以怨報怨則人有所懲釋憾請君釋憾于宋甘心管仲讐也請受而甘心焉言殺以快意也襲讎婦人不忘襲讐我反忘之以亢其讎亢當雪恥肆其忿悁悁恚也睚眦之讎必報獲魏齊之首范睢被魏齊􅀈脅折齒投於厠中後於秦卒獲齊首盗楚相之城張儀飲於楚相門意儀盗璧笞數百後相秦檄楚曰昔不盗爾璧今將盗爾城百金嚴仲子仇於韓相俠累乃以百金於聶政刺殺之私憾敗國宋將戰鄭華元殺羊食士其御車者羊斟不與食及戰斟曰疇昔之羊子為政今日之事我為政與入師故敗君子謂斟非人以私憾敗國殄人刑莫大焉白刃相讎失意杯酒間白刃起相讐無能渉河卻克怒婦人之笑􅊎曰所不此報無能渉河伐齊嫠婦莒有婦人莒子殺其夫巳為嫠婦紡纑以度莒城而去之以獻齊齊師以得夜縋以登莒城傳云怨不在大寃禽精衛鳥常衘西山木石填東海以其曾溺海内以報東門之役北宫黝之養勇惡聲至必反之交讎反殺地官調人職凡殺人則邦國交讐之注反復也此欲除害弱敵邦國交讎明不和諸矦諸矦得即誅之鄭云謂重殺也讎有釁不可失傳鬭伯比楊阿若常以執仇解怨為事故語曰東市相殺楊阿若西市相斫楊阿若欒布為人所掠為奴與主報怨後為燕相曰富貴不快意非賢者有怨以法滅之也李廣覇陵尉呵止廣廣後為北平太守請與俱至則斬之釋憾怨若怨焉國語尹鐸以其賞如伯樂氏伯樂氏曰吾為主圖怨若怨焉云云不受謝葢勲與蘇正和有怨刺史梁鵠欲殺正和勲救免正和詣謝勲不見曰吾為梁使君不為正和復自殺之報纎介之忿虐我則讎不報犯而不校校報也曾子曰犯而不校吾友常從事於斯矣顔回也怨是用希伯夷叔齊不念舊惡怨是用希小白用管寧報射鉤之讎重耳見披豈念斬祛之怨睚眦必報身則怨多仇讎不念人無所懲毫髪之隙則宜推而逺之骨肉之仇不可莫之報也思小怨而不可忘大恥而亦難念虐我之讎一之謂甚思寛身之戒兩不相傷伐讎不可及公私憾豈宜敗國將叶南方之强宜釋東門之怨益仇害公㬰駢曰前志有之曰敵怨不在後嗣忠之道也介人之寵以報私怨非勇也損怨益仇非智也以私害公非良也損怨子産曰忠信以損怨不聞作威以防怨匿怨而友其人私忌惠伯曰公事有公利無私忌之讐也以德報怨以直報怨崇讎是墮黨而崇讎寛身之仁也不尋諸仇讐而忘大恥思小惠也兩不相傷私憾豈宜敗國見上文私讎不及公王生言也勿讎周禮凡殺人有義者不同國勿令讎讎之則死義殺者雖父兄不使報也寛柔以教不報無道南方之强也君子居之不報無道謂犯而不校也孔飲酣怨言劉文靜自以材能過裴寂逺甚而寂獨用故舊恩居其上意不平毎論政多戾駮遂有隙甞與弟散騎常侍文起飲酣有怨言拔刀擊柱曰當斬寂人與為怨令狐峘性愎且介人人與為怨封倫始倫之歸蕭瑀數薦之及是瑀為左僕射毎議事倫初堅定至帝前輒變易由是有隙自訴于帝武儒衡知諫議大夫皇甫鎛以宰相領度支剥下以媚天子儒衡䟽其狀鏄自訴於帝曰乃欲報怨邪鏄不敢對縁私怨楊憑與御史中丞李夷簡素有隙德宗時假借方鎮習為僣擬事夷簡首按憑時以為直而縁私怨論者亦不與使怨歸上楊炎惡嚴郢異巳隂諷御史張著劾郢匿發民浚渠使怨歸上削兼御史中丞盧杞引郢為御史大夫共謀炎罪逐炎崖州修怨楊炎及再輔政稍修怨罷李藩宰相而裴頓左遷皆其謀也牛李之憾李德裕誅裴度使與元稹相怨奪其宰相而已代之欲引僧孺益樹黨乃出德裕為浙西觀察使俄而僧孺入相由是牛李之憾深李吉甫相憲宗牛僧孺李宗閔對直言策痛詆當路條失政吉甫訴于帝且泣有司皆得罪遂與為怨吉甫又為帝謀討兩河叛將李逢吉沮解其言功未既而吉甫卒裴度實繼之逢吉以議不合罷去故追衘吉甫而怨度擯德裕不得進至是間帝暗庸乃出李德裕織成其罪李紳部人訟呉湘受贓狼藉身娶民顔悦女紳使觀察判官魏鉶鞫湘罪明白論報殺之議者謂呉氏世為宰相有嫌疑紳内顧望織成其罪媢恨呉通元與陸贄吉中孚韋執誼竝位贄文髙有謀特為帝器遇且更險難有功通元等特以東宫恩舊進昵而不禮見贄驟擢頗媢恨挾素怨牛僧孺吐蕃請和約弛兵大酋悉坦謀舉維州入之劍南於是李德裕請擣虜之虚可以得志僧孺持不可遂詔返降者時皆謂僧孺挾素怨横議沮解之果於復怨竇羣狠自用果於復怨始召將大任之衆皆懼及聞其死乃安本傳二怨相濟李德裕大和三年召拜兵部侍郎裴度薦材堪宰相而李宗閔以中人助先秉政且得君出德裕為鄭滑節度使引僧孺協力罷政事二怨相濟凡德裕所善悉逐之於是二人權震天下黨人牢不可破矣疾其怨望王徽權京兆尹罷帝還京師復申前授稱疾不任奉謁宰相疾其怨望貶嶲州刺史以怨報德白敏中李德裕薦知制誥遷刑部尚書德裕貶敏中抵之甚力議者訾惡德裕著書亦嘗言惟以怨報德為不可測葢斥敏中云鬱怏散職有怨言劉幽求罷姚崇素忌之奏幽求鬱怏散職有怨言有詔鞫治飾情復怨張延賞更四鎮所至民頌其愛及當國飾情復怨不稱所望宿嫌李泌初帝在東宫李林甫數構譛勢危甚及即位怨之欲掘冢焚骨泌以天子而念宿嫌示天下以不廣眦睚必讎楊炎㑹元載抵罪俄而得政然忮害根中不能自止眦睚必讎果於用私大怨望呉通元拜諫議大夫自以久次當得中書舍人大怨望本傳銜宿怒劉晏始楊炎為吏部侍郎晏為尚書盛氣不相下晏治元載罪而炎坐貶及炎執政衘宿怒將為載報仇變更裴垍傳垍之進李吉甫薦頗力及居中多變更吉甫時約束吉甫復用衘之㑹垍與史官蔣武等上德宗實録吉甫以垍引疾解史任不宜冒奏乃徙垍太子賔客罷武等史官挾私怨李德裕遷淮南節度使代牛僧孺僧孺聞之以軍事付其副張鷺即馳去淮南府錢八十萬緡德裕奏言止四十萬為鷺用其半僧孺訴于帝而諫官姚合魏謩等共劾奏德裕挾私怨沮傷僧孺以私怨殺誼士乎李靖髙祖已定京師將斬之靖呼曰公起兵為天下除暴亂欲就犬事以私怨殺誼士乎飯客不召嚴挺之從孫綬初綬未顯過于閺鄉尉李逹逹不禮方飯他客不召綬後逹罷彭城令過并州晨入謁不知綬也綬方大宴賔客召逹至戒客勿起讓曰吾昔羈旅閺鄉君方召客食而不顧我今召客亦不敢留君逹慙不得去左右引出悸而瘖卧館數月狠于自用韋挺初挺為大夫時馬周為監察御史挺不甚禮及周為中書令帝欲湔拭用之周言挺狠于自用非宰相器遂止釋憾於兄太宗皇后長孫氏異母兄安業無行父䘮逐后無忌還外家后貴未嘗以為言後與李孝常等謀反將誅后叩頭曰安業罪無赦然向遇妾不以慈户知之今論如法人必謂妾釋憾於兄無乃為帝累乎遂得減流越嶲仇不共天竇建德釋斬祛之怨陸宣公奏議置射鉤之賊以任其才釋斬祛之怨以免於難此桓文所以宏霸業也仇讎不得不用同上適時之宜雖仇讎不得不用所不與公者有如此觴劉仁軌為御史袁異式所劾慢辱之及仁軌拜司憲而異式自解仁軌曰所不與公者有如此觴夢裏贏輸王起大和中未第流落河朔為從事多怨朝廷之執政有詩云勸君不用誇頭角夢裏贏輸總未真南部新書頻蒙怨句刺棄遺韓愈贈崔評事頻蒙怨句刺棄遺豈有閑官敢推引盧杞忌張鎰剛直欲去之張鎰盧杞忌張鎰剛直欲去之時朱泚以盧龍卒戍鳳翔帝擇人以代杞即謬曰鳳翔將校班秩素髙非宰相信臣不可鎮撫臣宜行帝不許杞復曰陛下必以臣容貌最陋不為三軍所信恐後生變臣不敢自謀惟陛下擇之帝乃顧鎰曰文武兼資望重内外無易卿者為朕撫盧龍士乃以中書侍郎為鳳翔隴右節度使鎰知為杞隂中然辭窮因再拜受詔置怨結懽李吉甫李泌竇參器其才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州刺史使甘心焉既至置怨結懽人益重其量貞觀初房元齡杜如晦新得君事任稍分瑀不能無少望乗罅切詆辭㫖䟱躁太宗怒廢於家蕭瑀傳怨仇所報李紳以文藝節操見用而屢為怨仇所報却卒能自伸其才父母讎六白子夏問曰居父母之仇如之何子曰寢苫枕干不仕弗與共天下不可與竝生遇諸市朝不反兵而鬬常不釋兵禮曰父母之讎不與共戴天棠君尚謂其弟伍貟曰親戚為戮不可以莫之報也楚殺其父兄君討臣誰敢讎之君命天也若死天命將誰讎之謂君殺其父不可報也王孫彌庸見姑蔑之旗曰吾父之旗也不可以見讎而不殺乃汝伐讎死而無悔伍子胥伐楚以報父讎周禮調人掌萬人之難而和諧之難仇讎也父母之讎避諸海外君之讎視父各親其親以怨報怨子無忘孝人有所懲辱親結怨孝不忘親仁輕侮法後漢侮辱人父其子殺之肅宗貫其死自後因以為比遂定議以輕侮法張敏駮曰春秋之義子不報讎而法不滅以相殺路不可開也不葬報讎蘇不韋父謙為督郵按美陽令李嵩輸左校嵩後為司𨽻刑謙至死不韋乃穿地逹嵩在厠遂殺其妻子嵩乃以版籍地不韋知有備乃掘嵩父墓斷頭祭父墳標之於市嵩不敢言退位掩塞捕不韋不得歐血而卒不韋遇赦遂得改葬行䘮何休方之伍貟郭林宗曰子胥因呉不韋單特優于貟也走馬引琴操曰走馬引摴里牧恭作也為父報讎亡藏山林之下夜有馬圍其室明旦視之天馬迹也暢然悟曰吾以義殺人何以藏遂作走馬引甞膽夫差甞膽以報父讎毁父讎漢申咸毁薛宣不孝宣子祝賕客楊明遮斫咸於宫門外中丞議不以凡鬭論當弃市朝廷直以為遇人不以義而見疻者宜與疻人同罪竟减死讎疾不殺後漢趙喜字伯陽兄為人殺無子喜結客往復讎家盡疾病喜以因疾殺人非仁不殺後仇家自縛詣喜喜不見竟殺之孔請償母怨李載義初載義母葬范陽為楊志誠掘發後志誠被逐道太原載義奏請剔其心償母怨不許又欲殺之官屬苦救乃免然盡戕其妻息士卒其天資驕暴云手殺讎人張琇傳髙宗時絳州人趙思舉父為人殺思舉㓜母改嫁仇家不疑思舉長為人傭夜讀書久之手殺讎人詣官自陳帝原之下邽人徐君父為縣吏趙師韞所殺卒能手刃父讎束身歸罪時諫臣陳子昻議誅之而旌其閭柳宗元駮其議曰若君之父不䧟於公罪師韞之誅獨以其私怨奮其吏氣虐于非辜州牧不知罪刑官不知問上下蒙冒籲號不聞而君能以戴天為大恥枕戈為得禮處心積慮以衝讐人之胷介然自克即死無憾是守禮而行義也執事者宜有慙色將謝之不暇又何誅焉其或君之父不免於罪師韞之誅不愆於法是非死于吏也死於法也法其可讐乎讐天子之法而伐奉法之吏是悖驁而凌上也執而誅之所以正邦典又何旌焉父母之仇不同天雖及匹夫而猶寢苫枕干以期必報是以子胥不徇伍奢之死卒能發既葬之墓鞭不義之屍取貴春秋垂名萬古元稹授田布節度使制審言有孝子杜審言貶吉州司户參軍司馬周季重司户郭若訥誣其罪繫獄將殺之季重將死曰審言有孝子吾不知若訥故悞我誣冒戰級私庸兵張琇父審素為嶲州都督有陳纂仁者誣其冒戰級私庸兵詔御史楊注即按纂仁復告審素與總管董堂禮反堂禮不勝忿殺纂仁以兵七百圍注脅使露章雪審素罪既而吏共斬堂禮注得出遂當審素實反斬之琇與兄瑝尚㓜徙嶺南久之逃還注更名萬頃瑝時年十三琇少二歲夜狙萬頃于魏王池瑝斫其馬萬頃驚不及鬭為琇所殺條所以殺萬頃狀繫于斧奔江南將殺誣父罪者然後詣有司氾水吏捕以聞中書令張九齡等皆稱其孝烈宜貸死侍中裴耀卿等陳不可帝亦喟然謂九齡曰孝子義不顧命殺之可成其志赦之則虧律凡為子孰不願孝轉相讎殺遂無已時葢以寃抑沉痛而號無告也柳宗元駮復讎議禮之所謂讎者葢以寃抑沉痛而號無告也非謂抵罪觸法䧟子大戮而曰彼殺之我乃殺之不議曲直暴寡脅弱而已推刃之道同上父受誅子復讎此是推刃之道復讎不除害今若取此以斷兩下相殺則合于禮矣且夫不忘讎孝也不愛死義也是必逹理而聞道者也願歸死有司太宗時有即墨人王君操父隋末為鄉人李君則所殺亡命去時君操尚㓜至貞觀朝世更易而君操窶孤讎家無所憚詣州自言操宻挾刃而殺之剔其心肝噉立盡趨告刺史曰父死凶手厯二十年不克報乃今刷憤願歸死有司州上狀帝為貸死兄弟讎七白為仇且因斷手報怨誠謂甘心子夏問曰居昆弟之仇如之何子曰仕不與共國衘君命而使雖遇之不鬬居從父昆弟之仇不為魁魁首主人能則執兵而陪其後禮曰兄弟之讎不反兵恒執殺具周禮調人凡和難兄弟之讎避諸千里之外從父昆弟之仇不同國此謂諧和不執仇也孔捨則崇讎報為傷義白居易集戊兄為辛所殺戊遇辛不殺居易判云捨則崇讐報為傷義戊居兄之讎當執兵而不返辛殺人以義將剚刃而攸難同上救兄有急難之戚中臂非必死之瘡柳宗元柳州上本府狀救兄傷以竹刺莫果右臂經十二日身死人莫誠竊以莫誠赴急而動事出一時解難為心豈思它物救兄有急難之戚中臂非必死之瘡不幸致殂揣非本意伏乞俯賜興哀特從屈法交游讎八白交游之讎不同國禮史豫讓為智伯報讎乃漆身為癘吞炭為啞而求殺趙襄子乃伏劒三躍呼天而擊其衣曰吾可以地下報智伯矣因自殺厲匹夫之志報國士之恩士為知己者死周禮凡和難師長之讎視兄弟避之千里外主友之讎視從父昆弟不同國也為交友報父讎何顒友人虞高讐未報病甚顒候之高泣訴顒顒感義為復讎後漢人孔楊炎為元載報仇劉晏始楊炎為吏部侍郎晏為尚書盛氣不相下晏治元載罪而炎坐貶及炎執政衘宿怨將為載報仇爭九不爭附白情因利動忿則争興憑貪惏以肆心恃彊暴而逞力讓為義所争乃患先爭端人知云云狠無求勝狠争訟也錐刀之末將盡爭之凡有血氣皆有爭心晏子曰分爭辨訟在醜夷不爭醜衆也夷齊也爭鬬之獄繁止爭律者所以定分而止爭也事末范蠡曰爭者事之末爭心叔向曰先王之議事以制不為刑辟懼有爭心爭奪相殺謂之人患禮見利而讓義也嘖有煩言言悖而出亦悖而入惡言忿言違言惡聲之至必反之陵犯司虣禁出入相陵犯者勝而無恥不爭不爭無競致讓法争善勝不争而善勝柔勝剛弱勝强夫唯不爭故天下莫能與之爭讓為禮出争為禍門彊在守柔勝由不競自勝者彊惡言不出於口忿言不及於身禮無求勝道貴不爭伏不競伏湛世傳授經清浄無競東州號伏不競理遣衛玠字叔寶常云人非意相干可以理遣故不見喜愠之容孔忿爭御前蕭瑀坐與陳叔逹忿争御前不恭免歲餘犯顔爭枉直徐有功武后僣位以急變相告言者無虚日朝野震恐莫敢正言獨有功數犯顔争枉直后厲語折抑有功争益牢囂競韋博為京兆尹與御史中丞囂競不平皆得罪大臣爭口語鄭畋同平章事乾符六年黄巢勢寖盛據安南騰書求天平節度使畋欲因授嶺南節度使而盧擕方倚髙駢使立功即抗論至相詬嫚擕怒拂衣去裾衊於硯因抵之帝以大臣争口語無以示百官乃俱罷古初孰稱古初朴蒙空洞而無争厥流以訛越乃奮敓鬭怒振動静專肆為浮威柳宗元貞符架巢空穴挽草木取皮革飢渴牡牝之欲歐其内於是乃知噬禽獸咀果榖合偶而居交焉而争際馬而鬭力大者搏齒利者齧𤓰剛者决羣衆者軋兵良者殺披披籍籍草野塗血然後强有力者出而治之同上開口爭事闗播盧杞讓播曰以君寡言故至此奈何欲開口争事邪餘見言門紛爭帳中韓全義為淮西行營招討使每議攻戰宦豎十數紛争帳中人好自異互詆訾不能决民有鬭爭不决李戡隱陽羡里陽羡民有鬭争不决而詣戡以辨數辨爭李元紘與杜暹數辨争帝前帝不懌皆罷之辨爭殿上李吉甫帝進李絳遂與有隙數辨争殿上帝多直絳嚴語侵之無所容假唐史吉頊時武懿宗討契丹退保相州後争功殿中懿宗陋短俯僂頊嚴語侵之無所容假后怒曰我在乃籍諸武它日安可保御之驅使必爭唐史吉頊貶琰州尉及辭召見泣曰臣去國無復再謁願有所言然病棘請須㬰間后命坐頊曰水土皆一盎有争乎曰無曰以為塗有争乎曰無曰以塗為佛與道有争乎曰有之頊頓首曰雖臣亦以為有夫皇子外戚有分則兩安今太子再立而外諸王並封陛下何以和之貴賤親䟱之不明是驅使必争臣知兩不安矣后曰朕知之業已然且奈何白孔六帖卷九十二
