body:
  text: 白孔六帖卷十四唐白居易原本宋孔𫝊續撰扇一梳篦二燈燭三幔四帳五屏風六几七席八簟九裀褥十牀十一枕十二案十三杖十四囊槖十五筆硯十六紙十七墨十八彈十九扇一白似明月班媫妤詠扇詩曰新裂齊紈素皎㓗如霜雪裁為合歡扇團圓似明月出入君懐袖動揺微風發常恐秋節至涼飈奪炎熱棄捐箧笥中恩情中道絶揚仁風袁宏為東陽太守謝安授以一扇聊以贈行宏曰即當奉揚仁風慰彼黎庶晉書白羽顧榮伐陳敏以白羽扇麾之賊衆大散晉書蒲葵晉謝安有盛名時多愛慕鄉人有罷中宿縣詣安安問歸資答曰唯有五萬蒲葵扇又以非時安乃取其中者執之士庶競慕價數倍團扇樂府詩曰青青林中竹可作白團扇合歡上注掌握扇握用翣淮南子曰夏不披裘非愛之煖有餘也冬不用翣非簡之清有餘也披裘而扇淮南子曰失火鑿池披裘而扇九華扇賦曹子建九華扇賦序曰昔吾先君侍奉漢桓帝時賜尚方竹扇其扇不圓不方其中結成文名曰九華扇因賦曰形五離而九折􅑪釐解而縷分傚虬龍之蜿蜒法雲霓之絪縕方不應矩圓不中規隨皓腕以徐轉發惠風以寒微云云獻故扇庾懌常以白扇獻成帝帝嫌其非新反之劉邵曰栢梁雲構大匠先居其下管絃繁奏䕫牙先聆其音懌上扇以故不以新晉書右軍六角扇王羲之字逸少見老姥持六角扇賣之因書其扇各五字老姥初有慍色羲之謂曰但云王右軍書以求百錢姥如其言人競買之後姥復持扇來請書羲之笑而不答晉書畫水成陸捜神記呉猛好道術將弟子回豫章江水大急人不得渡猛乃以手中扇畫江水横流遂成陸路徐行而過過訖水復依舊晉書自闗而東謂之箑自闗而西謂之扇楊雄方言武王作翣世本曰五明扇崔豹古今注曰舜廣視聽求賢人以自輔作五明扇雉尾扇又曰殷髙宗有雉雊之徵服章多用翟羽故有雉尾扇周制以為王后夫人車服羽扇繒扇西京雜記天子夏則設羽扇冬則設繒扇同心竹扇晉東宫舊事曰皇太子初拜供漆要扇青竹黃竹扇納妃用同心竹扇三十單扇二十禁絹扇謝靈運晉書曰武帝時禁絹扇鵲翅扇王子年拾遺記周昭王時塗修國獻青鳯丹鵲各一雌雄孟夏取鵲翅為扇一名條融一名反景象牙扇陸􅔘鄴中記石季龍作象牙扇翟羽扇西京雜記趙飛鷰為皇后其弟上賜翟羽扇白羽扇裴啓語林曰諸葛武侯持白羽指麾三軍雲母五明金薄莫難扇鄴中記曰石季龍作雲母五明金薄莫難扇此一扇之名金薄打純金如蝉翼二面采畫列仙竒鳥異獸其五明分中辟方三寸或五寸随扇大小雲母帖其中細縷縁其際維掩畫而彩色明徹看之如謂可取故名莫難也季龍出以扇挾乗輿七華扇趙飛鷰為皇后其弟上賜七華扇西京雜記白綺扇班孟堅有白綺扇賦畫扇曹毗扇讃序曰會稽王使王仲祖畫扇孔三衛執扇閻知㣲遷右衛郎將始有司以三衛執扇登殿用之奏三衛皆趫悍不宜升陛邇御坐請以宦者代遂為故事揮扇武儒衡遷中書舍人時元稹倚宦官知制誥儒衡鄙厭之㑹食𤓰蠅集其上儒衡揮以扇曰適從何處來遽集于此一坐皆失色持扇南蠻婆賄伽盧國婦人行持扇白羽扇賦張九齡因帝賜白羽扇乃獻賦自况其末曰茍效用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩於篋中操扇五代范延光兵行張盖操扇小雉尾朱畫團扇儀衛志次小雉尾朱畫團扇皆十二寳扇竇懐貞㑹嵗除中宗夜宴近臣謂曰聞卿䘮妻今欲繼室可乎俄而禁中寳扇鄣衛有衣翟衣出者扇織鴛鴦文李賀詩肅肅鳥羽穆如清風唐文粹張九齡白羽扇賦九光扇唐蘇鶚杜陽編曰上崇奉釋氏新羅國獻萬佛山上因置九光扇于巖巘間四月八日召兩街僧入内道場禮萬佛山覩九色光於殿中咸謂之佛光即九光扇也龍皮扇唐開元遺事王元寳家有一皮扇製作甚質每暑月宴客置於座旁使水洒之颯然風至明皇曽遣中使取之愛而不受曰此龍皮扇奉君清暑殿團扇復團扇奉君清暑殿秋風入庭樹從此不相見劉禹錫扇歌桃核扇水部貟外郎杜陟常見江淮市人以桃核扇量米正容一升言於九疑山溪中得酉陽雜俎狀扇于壁客至誤取王元俊精於圖畫嘗狀一扇于齋中壁上客至遂誤取之出呉越備史平頭奴子揺大扇梁園吟平頭奴子揺大扇五月不熱疑清秋李白獨坐怨秋風誰憐團扇妾獨坐怨秋風李白長信宫手持白羽𤣥冥祝融氣或交手持白羽未敢釋杜甫甚暑不執扇韓滉扇一百五十六尚輦局大朝㑹大祭祀皆扇一百五十六既事而藏之常朝則去扇左右留者三唐史百官志梳篦二釵附白說文梳篦摠名也其比如櫛詩男女不同巾櫛禮侍執秦嬴謂晉太子圉曰寡君之使婢子侍執巾櫛以固子奉巾櫛樊夫人謂楚莊王曰妾得奉巾櫛非不欲専寵以為傷王之義墮櫛十洲記臨海興安縣東界有平石俗云越王溪墮櫛於此櫛風沐雨文選多在道路櫛賦晉傅咸櫛賦曰我嘉兹櫛惡亂好理一髪不順實以為恥雖日用而匪懈不告勞而自巳茍以理而委作庶竭力以沒齒釵瑇瑁釵續漢書貴人助簮瑇瑁釵靈釵華陽國志曰涪陵山有大龜其甲可卜其縁可作釵世號靈釵釵銘崔瑗字子玉釵銘曰蝉鬢如雲乃象衆星三珠釵橫攝媛賛靈雀釵賦晉夏侯淳雀釵賦曰希太陽而擬法妙團團而應規謝花釵啓梁文帝謝花釵啓曰田文之囷慙於寳葉王粲之詠惡此垂蓮九宫之璫豈直黃香之賦三珠之釵取髙崔瑗之說渫井得楊僧濟渫井得金釵詩曰翠羽成泥去黃金尚有光髮晞用象櫛禮續漢書李文徳素善延篤謂公卿曰延篤有王佐之才欲令引之延篤為書止之曰吾常昧爽櫛梳坐於客堂則誦虞夏之書歴公旦之典禮覽仲尼之春秋當此時不知天之為盖地之為輿慎勿迷其本棄其生也名璫魏太祖當得名璫數具令卞后自選一具后取其中者上問其故后曰取其上者為貪取其下者為偽故取其中玉珥齊威王欲立夫人臣下莫知所從郭静君獻王玉珥觀王玉珥所在孔玉工貨釵桞玭家訓曰永寧王相國涯居位竇氏女婦請曰玉工貨釵直七十萬錢王曰七十萬錢豈於女惜但釵直若此必妖物也禍必随之後釵為馮球外郎妻首飾涯曰為郎吏妻首飾有七十萬錢其可久乎琉璃為釵五行志唐末世俗尚以琉璃為釵釧近服妖也流離播遷之兆龍角釵唐杜陽編大厯中日林國獻龍角釵類玉而紺色上刻蛟龍之形精巧竒麗非人所製上因賜獨孤妃與上同遊龍舟池有紫雲自釵上生俄頃滿于舟檝上命置掌中以水噴之遂化為二龍騰空東去九鸞釵同昌公主有九玉釵上刻九鸞皆五色上有字曰玉兒工巧妙麗殆非人工所製有金陵得者以獻公主酬之甚厚一日晝寢夢絳衣奴授語云南齊潘淑妃取九驚釵及覺以夢中之言言於左右洎公主薨其釵亦亡韋氏異其事或有云玉兒即潘妃小字百齒梳樵人直說曰孫思邈以交加木造百齒梳用之養生祕法也虎紋金髀别時提劍救邊去遺此虎紋金髀釵李白北風行寳釵墜井無顔色百尺泥中今復得鳯凰宛轉有古儀欲為首飾不稱時張籍古釵歎蘭膏已盡股半折雕文刻様無年月同上鴛釵韋應物長安道麗人綺閣情飄飄頭上鴛釵雙翠翹玉歩揺唐孫棨題妓王福娘墻詩云移壁同窻廢幾朝指環偷觧博蘭椒無端鬪草輸隣女更被拈將玉歩揺北里志鍾乳金釵白樂天詶牛思黯戯贈之鍾乳三千兩金釵十二行注云思黯自誇前後服鍾乳三千兩甚得力而歌舞之妓頗多本集金釵客李賀緑鬢少年金釵客燈燭三白蘭膏楚辭蘭膏明燭燭不見跋禮跋本也謂聚殘本客見之知夜深淺而慮主人之倦三夜不息禮記嫁女之家三夜不息燭思相離也夜行禮男子入内女子出門夜行以燭無燭則止秉燭古詩曰晝短苦夜長何不秉燭游自煎漢書膏以明自煎幽室禮曰治國而無禮譬如終夜有求於幽室之中非燭何見九光九微燈漢武帝祈王母於宫中燃九光九微之燈穿壁西京記匡衡勤學無燭穿鄰舍壁引光而讀書貧女分光後蘇代使於齊甘茂謂曰吾聞貧人女與富人女㑹績貧人女曰我無所買燭而子之燭幸有餘光無損子之明而得一斯便焉魑魅争光語林嵇中散燈下弹琴見一人黑衣康乃吹燈滅曰恥與魑魅争光然臍為燈董卓蓮花燈㷔明燭銀燭銀燈蘭燈鶴熖魚形百枝燈樹火繼傳曰以火繼之金枝秀華庶翠旌金枝銅燈百二十枚秀華中出有光金羊燈銘後漢李尤金羊燈銘曰賢哲勉移惟日不足金羊載輝作明以續晉孫惠百枝燈賦曰華若雲亭爛似稀星嵇康燈銘肅肅宵征造我友盧光燈吐耀華縵長舒范堅蠟燭賦曰疑脂浮炷頴其始然燭至起記侍長者之禮蠟燭炊世説石季倫以蠟燭炊飲晉傅咸燭賦曰揚丹輝之煒煒熾朱㷔之煌煌又煌煌丹燭衘潤飛光取則景龍擬象扶桑隅坐童子隅坐而執燭禮金麻油燈王子仙傳曰羊偃夜宴設琉璃屏風列金麻油燈於内外如無屏風人魚膏始皇塜中以人魚膏為燈燭簡文燈賦曰九微間吐百枝交布聚類炎洲踈同火樹蘭膏馥氣芬炷擎心寒生色淺露染光沉江淹賦燈曰若大王之燈者銅華金擎錯質鏤形碧為雲氣玉為仙靈若庶人之燈者非銀非珠無藻無縟心不貴麗器窮於樸庾信賦燈曰九龍將瞑三爵行栖如瓊半上若木全低乃有百枝同樹四照連盤香添然蜜氣雜燒蘭燼長宵久光青夜寒煇煇朱燼㷔㷔紅榮乍九光而連彩或雙花而竝明執燭晉平公問師曠曰吾年七十欲學答曰臣聞老而學者如執燭燭之明孰與昧夜行膏燭以明自銷文子云不燃官燭後漢巴祇與客暗坐不燃官燭浮光燭綺席凝滴汚垂花傅咸燈賦火浣花枝猶未長金枝宻㷔已流芳向晦入冥匪火不章誤書舉燭韓子鄭人有遺燕相國書者夜書謂持燭者舉燭而適書舉燭字燕相國授書曰舉燭者欲髙明髙明者舉賢而任之無足曰燈吕静韻集曰無足曰燈有足曰錠錠音定青玉五枝燈西京雜記曰髙祖入咸陽宫秦有青玉五枝燈髙七尺五寸有蟠螭口衘燈然之鱗甲皆動煥炳列星恒滿又曰長安巧工丁緩作恒滿燈九龍五鳯雜以芙蓉蓮藕之竒百華燈樹王朗秦故事曰百華燈樹正月朔朝賀於殿下設於三階之間端門外設五尺三尺燈月照星明雖夜猶晝銅鴨頭燈張敞東宫舊事曰太子有銅鴨頭燈銅倚燈納妃有金塗四尺長燈金塗二尺連盤燈龍膏王子年拾遺記曰海人乗霞舟以雕囊盛數升龍膏以獻燕昭王王坐通雲之堂亦曰通霞臺然龍膏為燈火色曜百里煙色丹芳苡燈洞冥記曰漢武然芳苡燈於閣上光色紫有白鳯黑冠黑龍馵足來戲於前丹豹髓白鳯膏又曰丹豹髓白鳯膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨火光不滅以麟須拂霜蛾赴燈者芳苡草出奔馬國霜蛾如蜂蚖脂燈淮南萬畢術曰取蚖脂為燈置水中即見諸物常生之燈周穆王設常生之燈以自照列璠膏之燭徧於宫内行有鳯腦之燈冰荷以盖其上璠膏鳯腦見上葛燈籠沈約宋書曰宋髙祖清簡寡欲牀頭有土障壁上有葛燈籠九光之燈漢武帝傳曰西王母遣使謂帝曰七月七日我當暫來帝至日埽除燃九光燈孔金蓮花令狐綯為翰林承㫖夜對禁中燭盡帝以乗輿金蓮花炬送還院吏望見以為天子來及綯至皆驚蠟液濡紙桞公權為翰林書詔學士嘗夜召對于亭燭窮而語未盡宫人以蠟液濡紙繼之碼碯燈樹吐光羅永徽二年獻碼碯燈樹髙三尺斷帶為炷皇甫無逸嘗按部宿民家燈炷盡主人將續進無逸抽佩刀斷帶為炷炬宻如晝𤣥宗貴妃楊氏韓虢每入謁炬宻如晝燭火滿街張𢎞靖充盧龍節度使官屬輕㣞酣肆夜歸燭火滿街脂炬舒元輿舉進士既試脂炬皆人自將因上書香蠟燭唐杜陽編同昌公主始有疾召術士米賨為法乃以香蠟燭遺之其燭方二寸上被五色文卷而爇之竟夕不郁烈之氣可聞於百歩蠟中有蜃脂香蠟燭煙出其上即成樓閣臺殿之狀或云蠟中有蜃脂故也燭圍長安後記韋陟家宴使每婢執一燭四行立人呼燭圍息煙燈唐酉陽雜俎建中中光宅寺僧竭禱銅蟾為息煙燈天下傳之雷門四老事畧王維輞川林下坐用雷門四老石燈滅則石中鑚火白鷺轉花黃龍吐水𤣥宗張臨光宴白鷺轉花黃龍吐水皆燈也出影燈記浮花洞攅星閣同上龍鳯燭南唐近事韓寅亮渥之子常言渥亡之日温陵帥聞其家藏箱笥頗多使親信發觀惟得燒殘龍鳯燭金縷紅巾百餘條奔䱐非魚非蛟大如舡長二三丈色如鮎有兩乳在腹下相傳懶婦所化一頭得膏三百斛取之燒燈照讀書紡績輙暗歡樂之處則明云長明公唐李政異聞録楊穆於昭應寺讀書毎見一紅裳女子一日誦詩曰金殿不勝秋月斜石樓冷誰是相顧人褰幃弔孤影問甚姓氏曰逺祖名無忌姓宋十四代祖因顯揚釋教封長明公開元中明皇與楊妃建此寺立經幢封妾為西明夫人因賜珊瑚寳帳居之自此巽生蛾郎不復强暴矣後驗之乃經幢中燈也西明夫人見上妖燭寧王夜集有戯煙似蠟非蠟似脂非脂每酒酣狂作則必昏翳否則明謂之妖燭遺事華燭光爛爛韓愈江漢詩粧燭已銷檠城南聮句百枝燈韓國夫人造百枝燈髙八十尺毎㸃之光照數十里天寳遺事青凝金燈青凝李白夜坐婢燈寧王宫中帳前羅列木雕矮婢飾以綵繪各執華燈自昏逹旦目為青凝開元遺事神燈見𤣥宗朝謁亳州太清上尊號是夜神燈見洛中紀異燭圍遺事楊國忠子弟每上元人秉千炬紅燭謂之燭圍冷翠燭李賀冷翠燭勞光彩蠟蜜垂蘭燼上銅盤燒蠟光吐日杜甫銅盤燒蠟光吐日夜如何其初促膝寒房燭影微同上饞燈南方有魚多脂束以為油㸃燭紡績則暗照宴樂則明謂之饞燈天寳遺事授以雙燭淮南用兵劉沔為小將其兵魁頗易之後因月黑風狂令沔捉生沔憤激深入意必死行十餘里因坐將睡忽有人授以雙燭曰君方大貴但心存此燭在即無憂也沔後拜將常見燭在雙旌上酉陽雜俎華燭燔長燈杜甫燈魚後主詩九重開扇鵠四牖炳燈魚火城元日冬至立仗大官皆備珂傘列燭有至數百炬謂之火城將至皆滅燭以避國史補連枝錦燈燭李白擣衣篇連枝錦燈燭熒熒照孤寢落月低軒窺燭盡春怨同上君看燈燭張杜甫冩懐君看燈燭張傳使飛蛾宻風起春燈亂杜甫宿䕫州燈花何太喜杜甫獨酌更長愛燭紅孟雲卿頭白燈明裏何須花燼繁日暮紫殿九華燈寄劉峽州詩燭奴申王以龍檀木刻童子緑衣束帶毎遇夜集列執畫燭謂之燭奴山燈于頔為㐮陽㸃山燈幔四白幔蓋六韜曰冬不服裘夏不操扇天雨不張幔蓋名曰三禮以縑幔盛土後漢岑彭圍隗囂壅谷以縑幔盛土為隄灌城軍令曰戰時皆取船上布幔漬水中賊有火炬火箭以掩滅之綘紗幔韋逞母宋氏傳父業得周官義旨乃就宋家立講堂書生百餘人隔綘紗幔受業焉詩齊王融詠幔詩幸得與珠綴羃歴君之楹月映不辭卷風來輙自輕毎聚金爐氣時駐玉琴聲孤琴煖幽幔古詩孔油幔馬璘治第京師侈甚其寢堂無慮費錢二十萬緡方璘在郡守者覆以油幔帷幔周世宗宣懿皇后符氏初適李守真子崇訓守真反漢遣周太祖討之崇訓手自殺其家人次以及后后走匿以帷幔自蔽褰輕綃之碧幔虞世南秋賦長幔繡沓褰長幔李白帳五白夜飲帳中項羽聞楚歌虎帳公孫𢎞燕見上或時不冠上嘗坐虎帳中汲黯前奏事上不冠望見黯避帳中使人可奏其見惮如此甲乙之帳東方朔曰誠用臣之計推甲乙之帳燔於四逹之衢居神漢武故事上以琉璃珠玉明月夜光雜錯天下珍寳為甲帳次為乙帳甲以居神乙以自居賜後漢桓榮常寢疾太子賜以幃帳奴婢曰如有不諱無憂家室綘紗帳馬融逹生任性不拘儒者之節常坐髙堂施綘紗帳前授生徒後列女樂紺幄帳舊儀以紺幄帳祭天集囊魏文帝集上書囊以為帳壊為襦袴謝尚為江夏相都督始到宫都以三十四布為尚造烏布帳尚壊之以為軍士襦袴皁帳傳子曰太祖武帝愍聘娶之僣上公主適人不過皁帳從婢十人而已孔賜帷帳令狐彰入朝賜帷帳寳帳王居自以立勲至天寳時為舊臣性豪侈寳帳備具七寳帳五行志武后時嬖臣張易之為母臧作七寳帳有魚龍鸞鳯之形慘紫帳則天皇后武氏常御紫宸殿施慘紫帳九龍帳閩王鏻命錦工作九龍帳白紬帳酷吏吉温楊國忠當國引拜京畿闗内採訪使安禄山敕吏設白紬帳于傳以俟命珠玉為帳李蔚咸通十四年詔迎佛骨乃以珠玉為帳翠羽帳𤣥宗皇后王氏廢為庶人當時王諲作翠羽帳賦諷帝九華帳唐陳鴻長悵傳褰九華帳紫綃帳唐杜陽編元載芸輝堂户牖内設紫綃帳得於南海溪洞之中酋帥則鮫綃之類也輕踈而薄如無所礙雖屬凝冬而風不能入盛暑則凉自至其色隐隐焉忽不知其帳也謂卧内紫氣金絲帳元載寵姬薛瑶英載為處金絲帳玳瑁帳武宗起望仙臺設玳瑁帳連珠之帳同昌公主堂中設連珠之帳續真珠為之也鏁子帳唐明皇雜録楊國忠鏁子帳稀世之寳時人莫能計其直青練帳錢鏐恭穆夫人嘗以王寢帳隳裂乃造青練帳以易之王曰作法於儉猶恐為奢但慮後代遂爲錦繡耳卒不用呉越備史一百二十鳯皇羅列含明珠韋蘇州長安道歌中有流蘇合懽之寳帳一百二十鳯皇羅列含明珠五王帳鄭處誨明皇雜録帝友愛至厚殿中設五幄與諸王處號五王帳重頂帳穆宗宫中花開以重頂帳蒙蔽欄檻史諱録李嶠當則天朝拜相帝幸宅見卧青絁帳賜御用繡羅帳嶠卧不安席明日奏少時相者謂不當華欲用舊帳知命録靚粧盈里不施幃帳楊貴妃妹虢國夫人素與國忠亂頗為人知不恥也毎入謁並驅道中從㜮侍姆百餘騎炬宻如晝靚粧盈里不施幃帳時人謂之雄狐流蘇李賀桂帳流蘇煖錦帳三十里紀聞譚京師名娼嬌陳如姿藝俱美陸州尹一見求納焉陳如曰得錦帳三十里乃可盖戯之也翌日載錦帳數十車張之陳大驚乃如前約深幃金鴨冷李賀神女廟屏風六白雲母屏風後漢鄭𢎞為太尉時舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上遂聽置雲母屏風分隔其間由此為故事列女屏風東觀漢記宋𢎞嘗見御座施屏風畫列女帝數顧𢎞曰未見好徳如好色者也畫屏曹不興善畫屏風誤落筆㸃素因就以作蠅孫權以為生蠅舉手弹之隔坐呉録景帝時紀亮為尚書令子騭為中書令每朝㑹詔以御屏風隔其坐刻鏤三輔史録曰何敞為汝南太守章帝巡過郡設刻鏤屏風帝命侍中黃香銘之曰古典務農彫刻傷民忠則竭節義在修身賦淮南子屏風賦惟新屏風出自幽谷不逢仁人永為枯木銘李尤銘曰舍則潜辟用則誤張壅遏風邪霧露是抗謝碁子屏風啓梁簡文帝謝碁子屏風啓曰雲母之窻慙其麗色琉璃之扇愧其含影皇邸屏風也周禮屏隔之位屛風隔形如今腰扇賜太祖平桞城班所獲特以素屏風賜毛玠曰君有古人之風故賜古人之器玠字孝先歩障晉王愷君夫作紫絲歩障四十里石崇作錦歩障以敵之廣五十里孔以所上䟽列為屏障魏徵䟽奏帝曰方以所上䟽列為屏障庶朝夕見之集家誡房𤣥齡集古今家誡書屏風連屏李絳帝詔絳等捜次君臣成敗五十種為連屏張便坐席每閲視顧左右曰而等宜作意勿為如此事冩烈女傳虞世南帝嘗命冩烈女傳於屏風金雞障安禄山帝登勤政樓幄坐之左置金雞大障懸黎屏風唐杜陽編元載嘗造芸暉堂户牖内設懸黎屏風本楊國忠之寳也屏上刻前代美人妓樂之形外以玳瑁水犀為押絡以真珠瑟瑟其為精妙殆非人工所及八角花鳥屏風唐酉陽雜俎安禄山恩寵莫比錫賚無數其所賜品目有八角花鳥屏風虹霓屏風唐太真外傳𤣥宗語如憶得一屏風今在訪以賜汝屏乃虹霓為名雕刻前代美人之形可三寸許其餘執翫之器衣服皆用衆寳相厠而成水晶為地以玳瑁水犀為押絡以真珠瑟瑟間綴精巧殆非人力所製乃隋文帝所造賜義成公主堕在北胡貞觀初滅胡蕭后同歸中國上因而賜焉屏上婦人酉陽雜俎元和中有士人因醉卧㕔中及醒見古屏上婦人等踏歌曰長安兒女踏春陽無處春陽不㫁腸舞袖弓腰渾忘却蛾眉空帶九秋霜其中雙鬟者問如何是弓腰歌者乃反首髻及地勢如規焉士人驚懼因叱之忽然上屏手印明皇所幸美人王氏數夢人召飲客具言於上曰此必術士所為若再往以物誌之其夕夢中又往因就硯中濡手印於屏風上既寤即告帝索於外果於東明觀中得其手紋而道士已遁去矣出唐末遺事水晶屏楊妃外傳水晶屏上刻美人形可二三寸妃以遺國忠置之樓上常偃息其下一日國忠獨卧屏上諸女悉下各通名曰當壚人也歩蓮人也桃源人也拾翠人也竊香人也金屋人也解佩人也為雲人也􅀞眉人也吹簫人也笑躄人也許飛瓊也趙飛燕也金谷人也結綺臨春人也國忠驚叱皆復歸屏自是不登樓未幾果敗畫漢魏臣貞元十一年上宴宰相於麟徳殿東亭令施屏風於坐位之後畫漢魏臣并列善言美事南部新書金鵝李賀金鵝屏風蜀山夢屏開金孔雀杜甫嘗書四十二幅屏徐浩嘗書四十二幅屏八體皆備几七白五几周禮司筵掌五几玉彫彤漆素為五几國賔彫几彤几國賔謂諸侯來朝孤卿大夫來聘朝者彫几聘者彤几熊席漆几甸役則設熊席右漆几謂王甸有司祭表貉所設席几吉事變几㓙事仍几吉事王祭宗廟祼於室饋食於堂繹於祊每事易几神事示新䘮奠几相因䘮禮略奮髯抵几朱博見齊吏舒緩投之以几晉伐偪陽城荀偃士匄請班師智伯怒投之以几出於其間注云出偃匄之間智伯荀罃字省中置几平詔太師孔光每十日一賜飡賜靈壽杖令為太師省中置几入省用杖孔融憑几孔融為北海袁譚來攻流矢雨集然融憑几安然而坐賜素几毛玠事與素屏風同上注黃金几漢武内傳曰帝受太甲靈符十二事於西王母盛以黃金几封以白玉函以珊瑚為牀化白麂神仙傳葛仙公憑桐木几於女几山學仙得道後几化為白麂三足時出於山上孔賜几杖甄權許州扶溝人貞觀中權已百嵗太宗幸其舍賜几杖衣服烏皮几拂拭烏皮几杜詩狐文几雲仙散録叩頭録房壽六月召客凭狐文几肉几唐酉陽雜俎黃㼐兒矮陋機惠𤣥宗嘗憑之行問外間事動有錫賚號曰肉几憑几而聽閣下無事時一致之坐側使跪進其所有閤下憑几而聽之未必不如聽吹竹弹絲敲金擊石也韓文朽机懼傾撲納涼聮句撫几雲車何來遲撫几空嘆息李白日夕山中烏几伴棲遲杜甫扶几導之言韓愈病中贈張十八席八白底席綴純底蒻也綴雜採也純縁也純音凖豐席畫純豐莞席也並天子朝燕之席不同孔子曰父子不同席男女不同席可卷我心匪席不可卷也不煖孔席不煖避席曾子避席為門陳平以席為門獨坐五十餘席後漢元日上令講論不勝者輙奪其席與通者戴憑獨坐五十餘席棄席鮑昭詩棄席思君幄願垂晉主惠晉文公令席褥捐之子犯曰席褥而君卧棄之不可文公乃止綺席瑶席蘭席重席正席主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐正席重席貴賤有重數函丈禮布席席間函丈注函容也謂講問之時其席相對席間足以指畫祍席祍席卧席也禮曰請席何向請祍何趾坐問向卧問趾盡後虚坐盡後食坐盡前注云嫌汚席也禮有以多為貴者謂天子之席五重諸侯三重大夫再重士不重斂席收之也禮奉席如橋衡奉之令左昻右低如有首尾焉争席陽子居周過於老􅅨其往也舍者迎將其家公執席妻執巾櫛舍者避席煬者避竈注云尊形自異故惮而避之其反也舍者與之争席注云去其矜夸故也莞為席東方朔曰孝文以莞為席半席漢相田蚡為壽坐者避席伏及竇嬰為壽故人避席餘半膝席絶席王常為横野大將軍位次與諸將絶席來歙攻隗囂帝自勞之飲燕與諸將絶席張禹為太傅鄧太后以殤帝幼弱欲令重臣居禁中乃詔與三公絶席專席宣秉為中丞上特詔中丞司𨽻尚書令㑹司並專席而坐故京師號曰三獨坐寢處其皮傳曰臣食其肉寢處其皮矣割席管寧華歆同席讀書有乗軒冕過者歆廢卷觀之寧割席分半而坐曰子非吾友三經之席說苑孔子困陳蔡之間環堵之内席布三經又專席禮有䘮者專席而坐側席有憂者側席而坐馬席蘇秦激張儀以馬席坐之王勤坐無空席見待士門中席為人子者坐不中席不敢當尊必異羣居五人則長者必異席不坐席不正不坐不重傳闔廬居不重席前席賈誼傳文帝前席注云促席近聽誼言南嚮北嚮以西方為上東嚮西嚮以南方為上斷席許敬字鴻卿與誣君者㑹於縣敬挍刀斷席曰不敢與惡人同席織席蜀先主賣屨織席為業又臧文仲三不仁妾織蒲注云家人賣席也羊皮羊茂為東郡守坐羊皮温席黃香家素貧盡心孝養暑則扇牀枕寒則温席茅葭先賢傳鄭敬以茅葭為席織席自給李恂為武城太守歩歸結茅屋與諸生織席自給後為兖州牧孔豹席張志和豹席蓬席陸龜蒙升舟設蓬席舉席自障盧懐謹門不施箔風雨至舉席自障綵席藉歩頴王璬濟江舟中以綵席藉步命撤之曰此可寢奈何踐之龍鬚地理志鳯翔府土貢龍鬚席鳯翮相州土貢鳯翮席水葱登州土貢水葱席椰葉唐南蠻環王椰葉為席紫茭席唐杜陽編曰方士田佐元唐大通皆入宫禁時有處士伊祁𤣥上知其異人召入宫設紫茭席席色紫而類茭葉光軟香浄冬温夏涼此本烏弋山離國獻龍鱗之席憲宗迎佛骨入内道場設龍鱗之席同上緑白平細背席唐酉陽雜俎安禄山所賜品目有緑白平細背席織作玉牀席李白觀刈蒲魯國寒事早初霜刈渚蒲此草最可珍何必貴龍鬚織作玉牀席欣承清夜娯雨來霑席上杜甫異席咨事舊史浙西觀察使李栖筠有重望虚心下士幕府盛選才彦觀察判官許鴻謙有學識栖筠常異席事多咨之壬癸席河東備録申王取猪毛刷浄令考工織壬癸席滑而且涼餘見猪門簟九白書篾席黼純篾桃竹席也白黑之繒以純縁也筍席𤣥純筍弱竹也𤣥純黒縁也並天子朝燕之簟詩下莞上簟乃安斯寢桃笙象簟韜於筒中珍簟玉簟夏簟清兮畫不暮斂席與簟禮斂簟而襡之襡韜也音毒禮莞簟之安藁秸之設席上之莞簟樽之上先𤣥酒淮南子象牙細簟王隐晉書曰車永為廣州刺史子溢多使工作象牙細簟工甚患之竹席說文簟竹席也方言曰簟宋魏之間謂之笙今江東通言笙也三伏餘炎九折成用梁簡文答定襄侯餉卧簟書云筠簟多品篠簜雜名三伏餘炎九折成用又答南平王書曰未若五離九折生桃枝之翠筍賜晉公卿禮秩太宰何曾遜位賜簟褥各一具求六尺簟王恱見王恭六尺簟謂有餘求之恭即送後恱見恭更無簟恭曰平生無長物劉孝儀謝始興王賜花紈簟啓曰麗竝桃象周洽昏明便覺虚室以寒狐裘可襲雖九日煎沙香粉不棄三旬沸海團扇可捐孔黃琉璃韓愈鄭羣贈簟詩攜來當晝不得卧一府傳看黃琉璃含風漪又誰謂故人知我意卷送八尺含風漪文簟納凉聮句青熒文簟施犀簟五行志武后時嬖臣張易之為母為犀簟白角簟地理志蘇州土貢白角簟糠竹簟雲仙散録叩頭録房壽六月召客坐糠竹簟體堅色浄體堅色浄又藏節滿眼凝滑無瑕疵韓文清簟華榻有清簟陪杜侍御遊同上光彩照耀呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤虱避肅肅疑有青飈吹贈簟詩簟色寒微霜淒淒簟色寒長相思李白玲瓏透象牀韋蘇州横塘行寳簟玲瓏透象牀金簟侯君集破髙昌所得金簟甚精御府所無唐盧氏雜記長簟韋蘇州雨夜詩獨驚長簟冷鳯窠李賀長簟鳯窠斜酒醒思卧簟杜甫何氏山林掃地青玉簟李白詩恩分夏簟冰杜甫寄劉陜州茵褥十氈附白文茵詩文茵暢轂文茵虎皮不敢均汲黯與周陽游同車未嘗敢均茵褥皮褥後漢荀爽慈明為三公食不過一肉脫粟飯坐皮褥賜呉張昭非魯肅孫權不以介意賜肅母幃帳氈褥賜何曽見簟門汚邴吉曰馭吏醉不覺汚丞相車茵無縁飾魏帝本紀曰上儉率茵褥取質無有縁飾累茵世説晉武帝年十三四時冬天晝日不著複衣夜則累茵褥謝公曰體宜令有常陛下晝過冷夜過熱又子路曰累茵而坐吐茵馭吏酒困吐茵而少卿不責氈氈案周禮有氈案我家舊物晉王子敬卧齋中盗取物敬曰青氈我家舊物見盗門孔素褥魏徵帝賜素褥以從其尚無䄄褥岑文本貴常自以興孤生居處卑室無䄄褥帟坐客寒無氈杜甫戯簡鄭廣文才名三十年坐客寒無氈芳茵同上贈汝陽王永懐侍芳茵敗氈敝席五代李愚渤海無棣人愚有疾明宗遣宦官視之見其敗氈敝席四壁蕭然明宗嗟嘆命以供帳物賜之十年一易韓滉雖宰相子茵祍十年一易褥壽百官志守宫署掌供蕃客帷帟則題嵗月褥壽七年不及期而壊有罰却塵褥唐杜陽編元載寵姬薛瑶英載為處却塵褥其褥出自句驪國一云是却塵之獸毛所為也其色殷鮮光軟無比龍罽鳯褥同昌公主堂中設龍罽鳯褥繡氈唐酉陽雜俎安禄山恩寵莫比其所賜有繡鴟毛氈兼令姚令瑶就宅張設花裀學士許謹選放曠不拘小節多與親友結宴花圃中未嘗具帷幄設坐只使童僕軰聚落花鋪坐下曰吾自有花裀出唐開元遺事深羅大絪見龍鬚志翠織成杜甫張舍人遺織成褥段客從西北來遺我翠織成五色覆安革氈唐史五行志以氈蒙馬哥舒翰與崔乾祐戰以氈蒙馬冰蠶絲錦褥唐老子嘗買一舊錦褥有波斯見之乃曰此冰蠶絲所織暑月陳於坐滿室清涼樂府雜録褥隠繡芙蓉杜甫鼲貂之褥蛩蟁之氈張易之母有牙席犀簟鼲貂之褥蛩蟁之氈牀十一白華睆大夫之簀曾子寢疾病童子曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易起易簀簀牀笫華畫也睆文牀笫之言不踰閾易簀見上象牀孟嘗君至楚楚獻象牀直千金公孫戌諫令勿受孟嘗君乃止載寢之牀乃生男子息偃詩云息偃在牀瑇瑁牀珊瑚漢武内傳曰帝以珊瑚為牀安身夜以安身養體史記剥牀以足巽在牀下踞牀漢書髙陽酈食其求見髙祖髙祖方踞牀兩艾洗足藜牀欲穿漢書管寧家貧在藜牀欲穿為學不倦龜搘江淮間有人得龜用搘牀三十年放之猶活沉香牀異苑曰沙門支法存有八尺沉香牀木懸床列仙傳羊公華陰山峰中人懸一石床踞我牀論衡曰孔子將死遺祕書曰不知何一男子自稱秦始皇上我堂踞我牀顛倒我衣裳至沙丘而亡後始皇至魯觀孔子宅至沙丘而崩孔引貴臣共榻劉文静唐公踐天子位擢納言時多引貴臣共榻文静諫曰今率土莫不臣而延見羣下言尚稱名帝座嚴尊屈與臣下均席此王𨗳所謂太陽俯同萬物者也自投髙祖順聖皇后竇氏聞隋髙祖受禪自投牀下曰恨我非男子不能救舅家禍拊牀李靖左僕射楊素拊其牀謂曰卿終當坐此終當據此封倫内史令楊素每撫其牀曰封郎終當據此云政事堂巨牀李吉甫初政事堂會食有巨牀相傳徙者宰相輙罷不敢遷吉甫笑曰世俗禁忌何足疑耶撤而新之金牀盧簡辭盧昻坐贓簡辭窮按乃得金牀玉牀揺夏侯端大業中宻語髙祖曰玉牀揺帝坐不安醉登杜甫嘗醉登武牀瞪視曰嚴挺之乃有此兒武亦暴猛中銜之匿牀下孟浩然王維私邀入内署俄而𤣥宗至浩然匿牀下維以實對帝喜曰朕聞其人而未見也何懼而匿詔浩然出置榻李峴同平章事故政事堂不接客自元載為相中人傳詔者引升堂置榻待之峴至即敕吏撤榻引同榻坐李勉父擇言張嘉貞為益州都督性簡貴接部刺史倨甚擇言守漢州獨引同坐榻引升御榻李綱帝引綱升御榻碼碯牀西域波斯開元天寳間遣使者十軰獻碼碯牀不過一牀南蠻傳故蜀孺老得扶携悉入成都閭里皆滿戸所占地不得過一牀施特榻崔渙起家亳州司功參軍還調於是入判者千餘吏部侍郎嚴挺之施特榻連榻坐王毛仲與諸主及姜皎等侍禁中至連榻而坐謁牀下李林甫病劇國忠至自蜀謁林甫牀下象牙牀訶陵以象牙為牀牀幃多飾金玉郭孝恪之在軍牀幃多飾金玉見龍牀唐杜陽編穆宗飛龍衛士韓志和更雕踏床髙數尺其上飾之以金銀綵繪謂之見龍牀置之則不見龍形踏則鱗鬛爪牙俱出始進上以足履之而龍夭矯若得雲上怖畏遂令撤去火齊牀武帝築望仙臺設火齊牀搘以金龜銀螯同昌公主製水精等床悉搘以金龜銀螯温清牀懿宗迎佛骨入内道場設温清牀水精牀杜陽編同昌公主製水精火齊琉璃玳瑁等牀七寳牀李白序明皇以七寳牀賜食帖花檀香牀唐酉陽雜俎安禄山所賜品目有帖花檀香牀風牀展書卷杜甫水閣詩常侍登牀太宗作飛白羣臣就帝手中競取劉泊登牀得之太宗笑曰昔聞媫妤好辭輦今見常侍登牀墨藪馮道軍中不設牀席卧一束芻而已五代史金繩牀南蠻驃古朱波王出輿以金繩牀立牀下拜韓愈石鼎聮句序二子大懼皆起立牀下拜茅棟蓋一牀杜甫柴門詩牀上書連屋何氏山林詩支牀錦石圓季秋江行詩同上枕十二白角枕粲兮詩曲肱子曰飲水曲肱而枕之樂亦在其中不加漢書履雖新不加於枕安寢載寢斂枕簟鷄初鳴也安枕薛公曰使黥布出下計陛下安枕而卧扇黃香盡心供養暑則扇床枕銘蔡邕枕銘曰哲人降鑒居安問傾髙枕王千里酈寄説呂産呂禄夜以安身傳載安斯寢琥珀宋武帝時獻琥珀枕碎之為刀瘡藥三十二物神仙傳曰泰山父老時漢武東廵見父鉏於道頭上白光髙數尺呼問之對曰有道士教臣作枕枕有三十二物應二十四氣八物應八風臣年轉少齒生芳松枕劉向别録曰芳松枕龍頭枕東宫故事曰太子納妃有漆龍頭支結枕枕鴻書漢淮南王有枕鴻書書中有神仙為金術孔金寳神枕合浦公主御史劾盗得浮屠辯機金寳神枕自言主所賜瑟瑟枕盧簡辭盧昻坐贓簡辭窮按得瑟瑟枕大如斗髙枕而卧李絳曰如此水旱無年倉廪空虚誠陛下焦心銷志求濟時之略渠便髙枕而卧哉家惟枕履元徳秀家惟枕履丙夜不安枕循吏傳太宗當曰朕思天下事丙夜不安枕不得髙枕而瞑桓彦範盧襲秀亦坐與敬暉善為冉祖雍所按祖雍曰君且下獄諸弟皆縱酒無憂色何耶對曰今盡殺諸弟則已如獨殺襲秀恐公不得髙枕而瞑祖雍色動曰當活公遂得不坐大衾長枕𤣥宗為太子嘗製大衾長枕將與諸王共之睿宗知甚喜或枕或欹文粹羅衮枕銘曰或枕或欹有安有危勿邪其思韋氏三枕五行志韋后妹嘗為豹頭枕以辟邪白澤枕以辟魅伏熊枕以宜男亦服妖也玉枕五代史𢎞肇鄭州滎澤人燕人何福進有玉枕直錢十四萬遣僮賣之准南以鬻茶僮隐其錢福進笞責之僮乃誣告福進得趙延壽玉枕以遺呉人𢎞肇捕治福進棄市遊仙枕唐開元遺事龜兹國進枕一其色若碼碯温潤如玉製作甚工枕之而寐則十洲三島盡在夢中帝因號遊仙枕後賜楊國忠夜明枕唐開元遺事虢國夫人有夜明枕置於堂中紅光照室不假燭燈紅麩枕唐張瀆宣室志韋弇遇玉清之女持寳以贈出一枕似玉微紅有文如粟竒光炳然曰紅麩枕也質錢卓行陽城常以木枕質錢重明枕唐杜陽編元和八年大軫國貢重明枕長一尺二寸髙六寸潔白如水晶中有樓臺之狀四方中有十道持香執簡循環不已謂之行道真人其瓦木丹青衣服簮紱纎悉備具通瑩如水覩物鷓鴣枕同昌公主有鷓鴣枕其枕以七寳合成為鷓鴣狀同上磁石枕豐寧傳益眼者無如磁石為盆枕可老而不昏寧王宫中多用之色綾枕酉陽雜俎臺山有色綾木理如綾紋窠百姓取為枕呼色綾枕警枕呉越備史武肅王錢鏐在軍中未嘗安寢復用圓木小枕睡熟則欹由是得悟名曰警枕及鎮撫二國至于末年每夕列侍女戒之曰外有報事當震聲以為警自是聞報即時而遣且留琥珀枕李白白頭吟且留琥珀枕還有夢來時神雞枕常新録曰史鳯宣城妓也待客異者有神雞枕抝枕皮光業見聞録曰崔謹由元和元年登第至開成已入翰林因偶止之夕二更以來中使宣召引入數重門至一處堂宇華煥簾幙俱垂見左右二閹然蠟而坐謂謹由曰上不豫已數日奉太后旨命學士草廢立謹由大驚曰某有中外親族數千口列在縉紳長行兄弟甥姪三百人一日聞此覆族之言寧死不敢承命况聖上髙明之徳覆乎八方豈可輕議二閹黙然良久引謹由至一小閤文宗坐於殿上二閹經歴階而疏上唯俛首又曰不為此抝木枕措大更不復在此坐矣仍戒謹由曰事泄即是此措大也青甆枕唐沈既濟枕中記道者呂公經邯郸道上邸告授盧生枕曰子枕此當令榮􅆘如願其枕青甆而竅其兩端遂至其家歴三台乃寤髙枕笑浮生杜甫遣悶詩是非何處定髙枕笑浮生堂中特設夜明枕銀燭不施光鑒帷注虢國夜明光燭一室鄭愚津陽門詩案十三書案附白持案史記髙祖過趙趙王張敖持案進食禮甚恭髙祖箕踞罵之對案不食萬石君石奮子孫有過不誚譲為之對案不食案上不過三杯朱博儉案上不過三杯屏案尹敏與班虎相厚善語常屏案不食舉案齊眉梁鴻妻孟光每上鴻食舉案齊眉等案而食燕丹子曰太子常與軻等案而食金案茅君嘗授神仙之職衆賔皆至剰忽然自有青縑帳於屋下敷數重白氊金案玉杯人皆醉飽鳩入案下烈士傳魏公子無忌方食有鳩入其案下公子怪之比有何急來投無忌邪使人於殿下視之左右顧望見一鷂從屋上飛去書案書案銘梁簡文帝曰性廣知平文彫非曲厠質錦帳承芳綺褥被召通今案奸治俗刻香鏤彩纎銀卷足抵破書案東觀漢記更始韓夫人嗜酒每侍飲奏事輙抵破書案短人行案上漢武帝故事時東都獻短人長五寸上疑是山精常令行案上方朔問曰巨靈王何叛阿母健否抵案朱博子元為琅邪太守怒吏抵案斫案江表傳曰曹公平荆州欲伐呉張昭等皆勸迎唯周瑜陳拒之之計孫權乃斫前奏案曰復有欲迎北軍者與此案同青玉案張平子詩曰美人贈我錦繡段何以報之青玉案陳楚謂之冩方言陳楚之間謂案為冩孔據案劉𤣥佐貴母尚在賢婦人也見縣令走廷中白事退戒曰長吏恐懼卑甚吾思而父吏於縣亦當爾而據案當之可安乎𤣥佐感悟待下益加禮以紙筆置于案郭翰廵察隴右狄仁傑為刺史民争言有異政翰就舘以紙筆置于案謂僚屬曰願薦使君美于朝指香案鄭覃帝嘗謂百司不可使一日弛惰因指香案爐曰此始華好用久則晦百寳案唐杜陽編同昌公主琢百寳為圓案食案或如臨食案肴核分飣餖韓愈南山銀案舉人多以白紙糊案子面鄭昌圖詩曰新糊案子其白如銀出摭言書蠅食案繁韓詩玉案李白鼓吹入朝曲天子憑玉案劍履若雲行瓊杯綺食青玉案李白憶舊遊瓊杯綺食青玉案使我醉飽無歸心君門曉日開杜牧李甘詩君門曉日開赭案横霞布玉皇香案元稹詩我是玉皇香案吏謫居猶得在蓬萊傳觴青玉案李白别設案髙士㢘皇太子監國又攝太傳太子令曰寡人資公訓𨗳而比聽政據案對公情所未安所司宜别設案奉太傅士㢘固辭孜孜凭書案譬彼鳥黏黐韓文寄崔念六仆香案前韋虔厚太和二年方奏事暴疾仆香案前帝令中人翼扶之輿還第一夕薨杖十四白齒杖杖函秋官伊耆氏掌供王之齒杖齒杖謂賜老者杖供其杖函藏之既事受之杖者鄉人飲酒杖者出嚗然莊子曰神農嚗然放杖而笑嚗然放杖聲也曲杖韓子周王下令索曲杖吏求之不得使和求得之乃知吏不事杖卭竹杖張騫在大夏時見卭竹杖云賈人市之於身毒國積竹杖漢書云昌邑王買積竹杖注云合竹作杖靈壽杖後漢賜孔光靈壽杖龍後漢壺公與費長房一竹杖曰騎此任之則自至因以投葛陂顧視則化龍而去六尺之杖吕氏春秋曰孔子弟子從逺方來者孔子荷杖問之曰子之父不有患乎搏杖問之曰子之母不有患乎置杖問之曰子之兄弟不有患乎杖歩而問之曰子之妻子不有患乎故孔子六尺之杖論貴賤之禮辨親踈之義鄧林山海經曰夸父死棄杖化為鄧林扶危郭璞桃杖賛曰簟以寧寢杖以扶危鳩杖五十杖於家六十杖於鄉七十杖於國八十杖於朝函杖席間函杖投杖子夏投其杖而拜曵孔子曵杖植其杖而耘植倚也荷篠以杖荷篠叩原壌之脛原壌夷俟孔子以杖叩其脛䇿杖而去魯連却秦軍平原欲封之連遂䇿杖而去後漢李尤靈壽杖銘曰亭亭竒榦云云乃制為杖扶危定傾後周庾信賦曰桓宣武平荆州外白有人稱楚丘先生來請門下桓公曰名父之子流離江漢孤之責矣乃令引進乃曰噫子老矣雞皮鶴髮蓬頭歴齒乃是江漢英靈荆衡杞梓雖有聞於十室幸無求於千里寡人有銅鐶靈壽銀角桃枝開木𤓰而未落養蓮花而未萎迎仙客於錦市送遊龍於葛陂先生將以養老將以扶危先生笑而言曰中國明於禮義闇於知人心之憂矣惟我生民雖復孤條勁柘促節貞筠杖端刻鳥角首圖麟豈能將余此身余之衰矣雖然有以非鬼非蜮心之憂矣未見縱心先求順耳伯玉何嗟丘明惟耻别有九棘龎眉三槐暮齒孔光謝疾袁逢致仕明公此贈或非乖理後漢馮衍銘曰杖莫如信行莫如仁惠而無實怨及爾身趙武之珍子罕之寳二子之迹盖近於道又晉傅咸卭竹杖銘曰立此高節承世矜式又梁簡文楊杖銘曰妙飾佳木游聖振灼排空霧轉騰雲鳯躍厖異玉伸長踰金錯梁到溉餉任新安竹杖因贈詩曰卭竹籍舊聞靈壽資前識復有冒霜筠寄生桂潭側文彩既斑斕質性其調直所貴夭夭真為有乗危力孔杖而後興桞宗元貶求州司馬雅善蕭俛詒書曰出門見適州閭市井者其十八九杖而後興自料居此尚復幾何杖履經過齊澣嚴挺之與澣杖履經過杖策栢耆杖策詣淮西行營謁裴度杖銘文粹羅衮杖銘曰身之疲杖以扶之國之危賢以圖之釦杖劉季述以所持釦杖畫地責帝賜靈壽杖李靖賜靈壽杖杖而入見後蜀孟昶即位數月是時李肇自鎮來朝杖而入見稱疾不拜及聞李仁罕死遽釋杖而拜末曲杖唐酉陽雜俎河雲院庫中有劉晏末曲杖是尋運路所乗者木柺契丹犯京師王遣牙將王峻奉表契丹耶律徳光呼之為兒賜以木拐一木拐契丹貴之如中國几杖非優大臣不可得峻持拐歸彼人望之皆避道五代史髙祖本紀若侍頴杖驚神馳思若侍頴杖夢得書緑玉杖手持緑玉杖朝登黃鶴樓李白縮節杖陶家瓶餘事曰徐鳯有一杖直如筆管其後每年生一節二十年後每年縮一節三月即杖之四面青赤白黑各開一花不知何木也杖化懸崖宣室志楊隐之謁唐先生將歸先生以杖畫地視其庭忽杖化懸崖萬仭嵓谷重疊謂隐之曰陵谷遽遷子將安歸隐之泣告乃以箒掃之其庭户如故乃得歸赤藤為杖世未窺臺郎始攜自滇池韓愈和虞部盧汀酬翰林錢徽赤藤杖歌空堂晝眠倚牖户飛電著壁搜蛟螭上笻竹杖李徳裕罷浙西遊甘露寺遺老僧笻竹杖其杖雖竹而方所持向上節眼鬢牙四面對出後數嵗再飲朱方居三日到院問前杖何在則老僧規圓而漆之矣公嗟嘆彌日芝田録别杖留青竹李白餞髙尊師惟有紅藤杖相随萬里來紅藤杖白居易詩杖藜長松隂杜甫白水崔少府詩杖藜復恣意免值公與侯晦日杖藜出嶇􅋂焉得輟兩足杖藜出嶇􅋂緩步仍須竹杖扶寒雨接宴身兼杖題壁過眉柱杖班入宅詩杖藜還客拜秋清詩夜明杖隐士郭休有杖夜光明照十步開元遺事腸斷春江欲盡頭杖藜徐步入芳洲杜甫漫興詩囊槖十五白于槖于囊乃裹餱糧禇中鄭虞人將寘荀罃于禇中而出未行而楚人歸之禇小不可懐大綆短不可汲深錐處平原謂毛遂曰賢士若錐處嚢今先生未有所稱遂曰使早得處嚢必穎脫而出持囊簮筆漢張安世常然有底曰嚢無底曰槖千金陸賈使南越越王佗賜賈嚢中裝直千金一囊錢後漢趙壹詩曰文籍徒滿腹不如一嚢錢囊衣王陽儉遷徙不過嚢衣囊滿禇中弓亡楚地囊粟東方朔言奉一嚢粟集上書囊為殿帷漢文帝故事樗里子杜預桓範晁錯人並號為智嚢香嚢古詩何以致區區耳中雙明珠何以致叩叩香嚢懸肘後孔筭囊李靖五代孫彦芳其舊物有火鑑大觹筭嚢等物天子悉留禁中笏囊張九齡體弱有醖藉故事公卿皆搢笏干帶而後乗馬九齡獨常使人持之因設笏嚢自九齡始囊槖惟衾衣歸崇敬充吊祭册立新羅使嚢槖惟衾衣古錦囊李賀每旦日騎弱馬從小奚奴背古錦嚢遇所得書投嚢中未始先立題然後為詩如他人牽合程課者及暮歸足成之香囊𤣥宗貴妃楊氏縊帝宻遣中使具棺槨他塟焉啓瘞故香嚢猶在中人以獻帝視之悽感流涕土囊孟簡親吏陸翰主奏邸數傲狠簡怒追還以土嚢斃之布囊盧懐謹赴東都掌選奉身之具止一布囊油囊頴王璬之出不及受節司馬史賁請建大槊蒙油嚢完驅以威道路璬笑曰既為真王安用假節為藥囊晉髙祖皇后李氏出帝册尊為皇太后開運三年十二月邪律徳光已降晉兵遣張彦澤以書遺太后且曰吾有梳頭妮子竊一藥嚢以奔于晉今皆在否繡囊李蔚始懿宗成安國祠寳坐繡嚢錦䄡珍麗精絶五色玉香囊唐杜陽編同昌公主乗七寳步輦四面綴五色玉香嚢嚢中貯辟寒香辟邪香瑞麟香皆異國所獻也仍雜以龍腦金屑刻鏤水晶碼碯辟塵犀為龍鳯花其上仍絡以真珠玳瑁文金絲為流蘇雕玉為浮動每一出遊則芬馥滿路晶熒照灼觀者眩目承露囊唐姚汝能安禄山事迹天長節禄山進玉石功徳等優詔褒美賜承露嚢映日紗囊纂異記三方鏡上平都邑以映日紗嚢取入禁中麗水囊事畧朝真觀九院有三賢松三株如古君子梁閣老妓英奴以麗水嚢貯香遊之松不數日半枯絲囊隋唐嘉話千秋節士庶結承露絲嚢相遺瑞龍腦香酉陽雜俎時風吹貴妃領巾於賀懐智巾上良久廻身方落賀懐智歸覺滿身香氣非常乃卸幞頭貯於錦嚢中及上皇復宫闕追思貴妃不已懐智乃進所貯幞頭具奏他日事上皇發嚢泣曰此瑞龍腦香也腰垂虎盤囊李白探囊中物五代南唐世家韓熙載北海將家子也初與李穀相善明宗時熙載南奔呉穀送至正陽酒酣臨訣熙載謂穀曰江左用吾為相取江南如探嚢中物爾及周師之征淮也命穀為將以取淮南而熙載不能有所為也尚書蛟綃皂香囊松忩記筆硯十六白五色江淹夣授五色筆由是文藻日新筆端君子有三端文士之筆端載筆史載筆動則左史書之言則右史書之投筆班超字仲升乃投筆而嘆曰大丈夫安能久事筆硯乎焚筆陸雲與兄機書曰君苖能文每見兄文輙欲焚其筆硯簮筆魏畧曰殿中侍御史簮白筆側階而立上問曰此何官也辛毗對曰御史簮筆書過以奏不依古法著於庭户左思作三都賦門庭户牖皆著筆硯置於牆柱後漢王充於門户墻柱置筆硯見事而著論衡八十五篇彤管女史所載詩曰彤管有煒下筆漢陽興賈捐之曰君房下筆言語妙天下君房捐之字也白筆見上注彩毫彩筆不律爾雅曰不律謂之筆蒙恬之制博物志秦蒙恬製筆筆耕班超嘆安能久事筆耕閣筆王粲才既髙至於朝廷奏議皆閣筆不敢措手同筆硯漢宣帝微時與張彭祖同筆硯學書筆硯方略薛宣為左馮翊性宻静有思省吏職求其便安至於用筆硯皆為方略利用而費省也納薪炙筆硯魏顔裴字文林為京兆守課人當租輸時車各因便置薪雨束為冬寒炙筆硯於是吏不煩民絶筆獲麟仲尼作春秋絶筆於獲麟染翰含毫陸士衡文賦曰或含毫而邈然不停輟禰衡作鸚鵡賦筆不停輟纎端功積潤梁徐瑀筆詩纎端功積潤山呉都有硯石山傅𤣥筆賦曰柔不絲屈剛不玉折傅子象齒之管陳思狡兎之毫孔以筆硯事温廷皓咸通中署徐州觀察使崔彦曾幕府龐勛反以刄逼廷皓使為表求節度使明日復見勛索表倨答曰我豈以筆硯事汝邪佩筆李靖五世孫彦芳其舊物有佩筆以禾為管弢刻金其上别為環以限其間筆尚可用也捉筆賦詩楊師道帝曰聞公每酣賞捉筆賦詩如宿創者試為朕為之師道再拜少選輙成無所竄定一坐嗟伏尹卿筆尹思正為司府少卿吏為語曰祗畏尹卿筆治筆研王仲舒召為中書舍人既至視同列率新進少年居不樂曰豈可復治筆研於其間哉筆諫桞公權帝問用筆法對曰心正則筆正筆正乃可法矣時帝荒縱故公權及之帝改容悟其以筆諫也不敢秉筆程异至宰相自以非人望不敢秉筆求掘筆著家傳李繁下獄從吏求掘筆著家傳援筆皇甫湜裴度辟為判官度修福先寺將立碑求文於白居易湜怒曰近舍湜而逺取居易請從此辭度謝之湜即請斗酒飲酣援筆立就十金易一筆彭玕嘗募求西京石經厚賜以金揚州人至相語曰十金易一筆百金償一篇况得士乎斷大事黃碣閩人同列有假其筆者碣怒曰是筆他日㫁大事不可假穴石為研秦系客泉州南安有九日山系結廬其上穴石為研注老子狸毛為筆歐陽詢子通晚自矜重以狸毛覆以兎毫管皆象犀非是未嘗書同僚閣筆鄭畋遷中書舍人王師討徐方禁庭書詔旁午畋灑翰泉湧動無滯思言皆破的同僚閣筆推之仙筆四譜云石晉之末有一髙士不顯姓名毎夜作筆付其家室至曉闔户而出以竹筒衘壁外向如引水者置錢其中則一管躍出筆盡雖官府勢要無復有也匠婦亦怡然自得如此三十嵗時人謂之仙筆酒中下筆胡楚賔秋浦人屬文敏甚然必酒中下筆呼呌狂走下筆張旭蘇州呉人毎大醉呼呌狂走乃下筆筆不停書賀知章每醉輙屬辭筆不停書具筆研善草𨽻好事者具筆研從之供筆札桞璟文宗開成初為翰林學士初芳永泰中按宗正諜斷自武徳以昭穆系承撰永泰新譜二十篇璟因召對攟摭永泰後事綴成之復為十篇户部供筆札賜筆札陳子昻后召見賜筆札中書省令條上利害管城子韓愈毛頴傳封諸管城號管城子善隨人意正直斜曲巧拙一隨其人又穎善隨人意正直斜曲巧拙一隨其人雖後見廢棄終黙不洩惟不喜武士然見請亦時往累拜中書令髙常硯銘又髙常硯銘與予下天壇中路獲硯石似馬蹄狀外稜孤聳内發墨色幽竒天然疑神仙遺物寳而用之請予銘底𢎞農陶泓毛穎與𢎞農陶泓相友善相推致其出處必偕毛錐子五代漢史𢎞肇位方鎮兼中書令𢎞肇不喜賔客嘗言文人難耐呼我為卒𢎞肇議帶樞宻蘇逄吉以為不可恨之㑹飲竇貞固第𢎞肇厲聲曰安朝廷定禍亂直須長槍大劍若毛錐子安足用哉三司使王章曰無毛錐子軍賦何從集乎𢎞肇黙然鐵硯五代桑維翰鑄鐵硯以示人曰硯弊則改而他事卒以進士及第玉硯呉世家楊溥顯徳三年世宗征淮南下詔撫安楊氏子孫而李景聞之遣人盡殺其族周先鋒劉重進得其玉硯以獻賜筆渾瑊帝狩奉天朱泚方據乾陵帝召瑊募突將死士當賊賜瑊筆使量功署詔不足則署衣以授鹿毛筆地理志蘄州土貢鹿毛筆以木為筆于闐以木為筆獻畫日筆五代蘇循始至魏州晉王大恱明日又獻畫日筆三十管幽人筆汗漫録曰司空圖隐于中條山芟松枝為筆管人問之曰幽人筆當如是洗筆文覽曰白樂天每一詩成輙洗其筆黒水郡王龍鬚志薛稷為筆封墨曹都統黑水郡王表兼毛州刺史離石鄉侯鳯翔退耕傳薛稷為硯封九錫拜離石鄉侯使持節即墨軍事長鐵靣尚書見上旋風筆方鎮編年曰魏博田承嗣簽治文案如筒流水吏人私相謂曰世罕有此旋風筆也筆塚李肇國史補長沙僧懐素好草書自然得草書三昧棄筆堆積埋於山下號曰筆塜本傳硫黃酒文房寳飾養筆以硫黃酒舒其毫養硯以綾文盖貴乎隔塵文章貨龍鬚志羅隐喜筆工萇鳯語人曰筆文章貨也吾以物助子取髙價即贈鴈頭牋百幅士大夫聞之懐金問價或以深羅大絪換之湧若耶溪徵文玉并張曲江語人曰學者嘗想胷次吞雲夢筆頭湧若耶溪量既并包文亦浩澣毛穎上嘗呼為中書君韓愈毛穎傳中書君老而秃不任吾用吾嘗謂君中書今不中書耶同上楚王廟多甎可為書硯韓愈宜城驛記巨璞禹鑿餘杜甫石硯詩長嘯得石硯巨璞禹鑿餘異狀君獨見其滑乃波濤其先或雷電聮坳各盡墨多水逓隐見平侍御硯秀石可硯其壁曰龍壁其下多秀石可硯桞宗元桞州山水記清池韋蘇州對韓少尹所贈硯白水浮香墨清池滿夏雲紫石潭異聞實録徐𤣥之夜讀書見人物如粟米數百皆具甲胄擁一紫衣者行案上傳呼曰蚍蜉王欲觀漁於紫石潭漁具數十入硯中皆獲小魚琉璃硯李白自漢陽歸詩去嵗左遷夜郎道琉璃硯水常枯槁管子文文書竒事有書生謁李林甫謂管子文後化為筆也夢遺雙筆李嶠為兒時夢人遺雙筆自是有文辭十五通五經薛元超稱之夢筆花李白少時夢筆頭生花自是才思贍逸天寳遺事宫嬪呵筆李白於便殿草詔時大寒筆凍帝使宫嬪呵筆授白同上圓如錐錼如鑿桞公權有筆偈曰圓如錐錼如鑿不得出只得却盖是毛出則不堪用南部新書瑩管如玉開元中筆匠能瑩管如玉莫傳其法雜俎旬濡數鋒月秃一把編如蚕潔汝寔切也有兎千萬挾毛止皮圓而不流銛而不欺又載筠束毫既勝且便出笠澤叢書纎鋒細管白樂天與元微之應制各有纎鋒細管筆携以就試相顧而笑目為毫錐故贈元月穿如毫鋒鋭如錐墨花春李賀硏銘紗帷晝暖墨花春端州石匠巧如神踏天磨刀割紫雲庸刓抱水含滿脣暗洒萇𢎞冷血痕兎千五百皮集賢書院嵗給河間太原清河洛平四郡兎千五百皮為筆材七寳爐内中有七寳爐硯爐冬寒硯水自銷李政異聞實録非右軍不能諸葛筆宣州諸葛氏能作筆桞公權求之先與三管語其子曰桞學士如能書當留此筆不爾退還即以常筆與之未幾桞以不入用别求筆遂以常筆與之先與者三管非右軍不能諸葛筆也文房四譜結鄰李衛公蓄硯至多其絶妙者曰結鄰言與結緑為鄰也硯有聲鄭朗覆落甚不得志其几案之硯忽作數聲時洪法師在上座曰有聲價之象朗果後入台輔出北夢瑣言博山筆床皇太子初拜給漆筆四枝銅博山筆床副焉東宫宿事瘞破硯文韓文李觀元賔始從進士貢在京師或貽之硯既四年悲歡窮泰未嘗廢其用行於襃谷間役者劉𦙍誤墜之地毁焉乃匣歸埋于京師里中昌黎韓愈其友人也賛且識云土乎質陶乎成器復其質非生死類全斯用毁不忍弃埋而識之仁之義硯乎硯乎與瓦礫異瓦棺筍筆上元縣瓦棺寺閣南隅有雙籠閉之忘記嵗月會昌中詔拆浮圖因開有筍筆餘頭藏書秩中有生日藤紙題為南部烟花録僧志澈得録及焚澤氏郡僧經人惜其香軸争取紙尾折去視其軸皆有魯郡顔公名題云手冩是録即前之筍筆可舉而知也大業拾遺後序銀筆唐韓定辭酬馬彧詩盛徳好將銀筆述注梁湘東王著書筆有三種忠孝事以金管書之徳行以銀管書之文章以竹筆書之夢神授二筆唐末帝時宰相馬裔孫初為河中從事因赴闕宿邏店其地有邏神祠夜夣神見召待以殊禮手授二筆一大一小及為翰林學士以為契鴻筆之兆洎入中書上事堂吏奉二筆大小如夣中所得者宫硯玉蟾蜍杜甫雕章五色筆同上筆鋒韓愈題詩尚倚筆鋒勁筆端風生聽者耳駭唐文粹獨孤及李華集序紙十七白寸紙張芝伯英善書寸紙不遺紈素韋誕非紈素不妄下筆蔡侯紙後漢蔡倫字敬仲造意用樹皮及敝布魚網以為紙奏上帝善其能自是莫不用故天下咸稱蔡侯紙花牋桓𤣥詔命青赤縹緑桃花牋舒卷隨人藤角紙范寗作五色牋石虎詔以五色牋著鳯皇之中乞謝𤣥就王右軍乞牋紙江洪有詠紅牋詩孔求廢紙著家傳李繁從吏求廢紙著家傳丏官筆楮王元感所撰書凡數十百篇長安時上之丏官筆楮冩藏祕書徒䘮紙札呉筠曰深於道者無如老子五千文其餘徒䘮紙札耳似蠒而澤日本建中元年使者真人興能獻方物興能善書其紙似蠒而澤人莫識以紙萬畨贐杜温補婺州参軍秩滿歸吏以紙萬畨贐之暹為受百畨毛穎與㑹稽楮先生友善韓愈毛穎傳毛穎與㑹稽楮先生友善相推致其出處必偕榖紙蕭廪之放嶺南海多榖紙敕諸子繕補殘書書盈尺之紙韓愈文繡紙文筆襟喉曰蕭穎士以夣有人授紙百畨開之皆是繡花又夢裁錦文思乃大進楮國公事略曰薛稷為紙封九錫拜楮國公白州刺史統領萬字軍略道中郎將桃花紙鳯池編曰楊炎在中書後閣糊忩用桃花紙塗以冰油取其甚明桞綿肝文房寳飾毛重教授於導江春日主人宴乃賦散語曰蟣肝之奉何堪龍首之攀可望主人大喜勸以陸源酒賞以桞綿肝洪兒紙童子神通録姜澄十嵗苦無紙澄乃燒糠熁竹為紙以供文澄小字洪兒鄉人號洪兒紙養紙以芙蓉粉文房寳飾養紙以芙蓉粉惜其色以五采牋為書記韋陟薛濤牋元和之初薛濤好製小詩惜其幅大不欲長賸乃狹小之蜀才子後減諸牋如是號薛濤牋南部新書鴈頭牋羅隐喜筆工萇鳯贈鴈頭牋百幅出龍鬚志烏絲欄唐李肇國史補宋亳間紙有織成界道者謂之烏絲欄紙琅玕紙十幅可為札墨子詞雜俎金花牋帝與妃賞牡丹命李龜年持金花牋賜李白太真外傳造五鳯樓手韓浦洎皆有辭洎常輕浦語人曰吾兄為文譬如繩樞草舍聊避風雨予之為文是造五鳯樓手浦聞之因親知寄蜀牋題詩贈洎曰老兄得此全無用助爾添修五鳯樓悲剡溪古藤文舒元輿文剡溪多古藤樹方春且死有言溪中多紙工斬伐無時今士人自言能文者其數與麻竹相多孰非書剡藤者耶雖舉天下為剡溪不足給余謂今之為文者皆夭閼剡藤者也巴牋染翰光杜甫寄髙岑詩衡陽紙價頓能髙杜甫員外春興不知凡幾首衡陽紙價頓能髙同上佳句染華牋暮懐諌紙賜牋藤元稹詩户部蠲紙五代何澤户部嵗給蠲符不可勝數而課州縣出號為蠲紙澤上書言其弊明宗下詔悉廢户部蠲紙手請諫紙白居易與元稹書云身是諫官手請諫紙墨十八白臨池張芝伯英臨池學書水盡墨淵雲墨妙嚴樂筆精松上黨郡松心作墨汚屏作蠅見屏風門孔燎松丸墨王方翼燎松丸墨為富家腹藁王勃屬文初不精思先磨墨數升則酣飲引被覆面卧及寤援筆成篇不易一字時人謂勃為腹藁濡墨張旭蘇州呉人每大醉以頭濡墨而書絳人陳𤣥韓愈毛頴傳與絳人陳𤣥友善非佳墨未嘗輙書裴行儉每曰禇遂良非精筆佳墨未嘗輙書漬墨韓愈詩漬墨竄舊史墨油暈老成相墨經曰墨文如履皮磨之油暈者一兩可染三萬筆黒松使者陶家瓶餘事曰𤣥宗御按墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬嵗曰臣墨之精黒松使者也若世人有文者其墨上皆有龍賔十二上神之乃以墨分賜掌文官善和瘞墨大唐龍髓記曰許足有妙墨八㕑巢賊亂瘞于善和里第事平取之墨已不見惟石蓮匣存松煙督護纂異記薛稷為墨封九錫拜𤣥香太守兼亳州楮郡平章事是日墨吐異氣結成樓臺狀隣里來觀食久乃滅墨狻猊大唐龍髓記除峯善碁叚成式欲盡窮其術峯曰子若以墨狻猊與我當使子過我十倍字能三年不昏相墨經墨染紙三年字不能昏暗者為上天峯煤龍髓記盧杞與馮盛相遇於道各携一嚢杞發盛嚢有墨一枚杞大笑盛正色曰天峯煤和針魚腦入金溪子手中録離騷古本如公止提綾紋刺三百為名利奴顧當孰勝已而捜杞嚢果三百刺養墨以豹皮嚢文房寳飾曰養墨以豹皮嚢貴乎逺濕嵗磨半寸相墨經曰凡墨日日用之一嵗纔減半寸者萬金不換夢墨王勃夢人遺以丸墨盈袖自是文章日進雜俎彈十九白彈人避丸傳曰晉靈公不君從臺上彈人觀其避丸以為樂柘彈西京記長安五陵人柘木為彈真珠為丸以彈烏鵲珠丸吕氏春秋曰以隋侯之珠彈千仭之雀世必笑之何也所用重而所要輕蘇合俠客以蘇合木為彈左挾彈右挾丸見戰國䇿求鴞莊子曰見彈而求鴞炙敏手暴彈榖梁言晉靈公金彈丸韓嫣以金丸彈射時人語曰若飢寒逐金丸挾彈呉伐齊太子諫曰向來挾彈於後園螗蜋之捕蝉也不知黃雀在傍黃雀不知臣挾彈在後懐丸大丈夫不扶犂鉏而自懐丸挾彈彈鴞楚人惡其聲而彈射之將適呉或謂之曰若能變其聲在楚可也若不能變其聲呉人亦彈射之善彈蕭子顯齊書曰桓崇祖善彈彈鳥毛盡而不死有海鷗羣飛崇祖登城西樓彈之無不折翼明珠彈飛肉太𤣥經云明珠彈於飛肉其得不復泥丸東方朔對驃騎將軍難曰以金丸彈不如泥丸各有所用彈生於古之孝子呉越春秋陳音對越王云弩生於弓弓生於彈彈生於古之孝子古者人民質朴死裹以白茅投之中野孝子不忍父母為禽獸所傷則作彈以守之故古人歌之曰㫁竹屬木飛土逐肉孔以丸彈人滕王元嬰以丸彈人觀其走避則樂彈巾王凖為衛尉少卿以闘雞供奉禁中過駙馬都尉王繇以彈彈其巾折玉簮為樂彈捕得鳥王世充羅取飛鳥書符命於帛繫鳥頸縱之有彈捕得鳥而獻者亦拜官升樓彈射藩鎮王紹鼎升樓彈射路人以為樂以狗馬彈射為樂五代王仁裕少不知書以狗馬彈射為樂巧丸兒韓愈詩遭逢巧丸兒槐膠彈子放懐集李少微子女頗多每退朝於庭樹撤槐膠彈子數百枚令諸小兒争取之以為戱笑終日不倦戯已復收于篋好彈射徐敬業十餘嵗好彈射出雜俎僧靈鑒善彈用洞庭沙岸下土炭末瓷末榆皮泔澱紫礦細沙藤紙渇搨汁九味和齊手丸之陰乾出酉陽雜俎鄭寅常詣靈鑒角放彈鄭寅常詣靈鑒角放彈指一樹節其節目相去數十歩曰中之獲五千一發而中彈丸及射不破至靈鑒乃䧟節碎彈焉出酉陽雜俎五發中心建中初士人韋生路逢一僧因與連鑣言論頗宻僧指路謂曰此數里貧道蘭若郎君豈不能左顧乎士人許之行十餘里不至日已沒韋生疑之素善彈乃宻於靴中取張御彈懐銅丸十餘乃彈之正中其腦僧初若不覺又五發中之僧始捫中處見僧方至一庄延韋生坐一㕔中執韋生手曰貧道盗也君彈悉在手搦腦後五丸墜地焉盖腦衘彈丸而無傷出酉陽雜俎彈金丸錢鏐每夕彈金丸于墻樓之外使宿直者畢應呉越備史挾彈章臺左青雲少年子挾彈章臺左李白少年子挾彈中鶴一目祕書省内薛稷畫鶴元和中韓公武挾彈中鶴一目時謂五絶南部新書健犢須走車破環劉公嘉話丈人曰石季龍挾彈彈人其父怒其母曰健犢須走車破轅良馬須逸鞅泛駕然後能負重致逺盖言童稚不竒不惠非異器也白孔六帖卷十四
