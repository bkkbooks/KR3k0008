body:
  text: 白孔六帖卷十一唐白居易原本宋孔傳續撰倉廪一庫藏二管籥三園圃四藩籬五牆壁六竇七竈八車九舟十倉廪一擅開倉常平附白倉虛老子田甚蕪倉甚虛廩實管子倉廪實知禮節千倉乃求千斯倉乃求萬斯箱太倉紅腐太倉之粟紅腐而不可食海陵流衍觀海陵之倉則紅粟流衍鄧攸免官又第五訪仲謀為張掖守歲饑開倉賑給曰若須報是弃人也樂以身救百姓詔嘉之修囷月令孟冬命有司穿竇窖修囷倉謹蓋藏務積聚出納之吝謂之有司藏於天下韓詩外傳曰王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥賑廩傳曰楚莊王賑廩同食注賑廩開倉同食上下無異饌也我倉詩曰我倉既盈我庾維億儲蓄收藏委積收歛庾庾露積也詩曰曾孫之庾如坻如京鉅橋武王克殷發鉅橋之粟大賚于萬姓鉅橋紂倉不盈管子曰不務地利則倉不盈發倉廪月令季春發倉廪賑貧窮粟入周禮倉人掌粟入之藏辨九穀之物以待邦用量入禮曰五穀皆入必量於歲之杪九年之蓄陳陳相因匪頒周禮廪人掌九穀之數以待國之匪頒賙賜稍食以歲之上下數邦用以知足否注稍食祿廪也露積太倉粟陳陳相因充溢露積敖倉下有積粟滯積公無滯積神倉藏帝籍於神倉祗敬必飭囷鹿國語廥積貴庾藏穀以防貴庾謂積穀待價蘇章後漢為武原令歲饑開倉廪活三千餘人喬𤣥公祖為梁州刺史歲饑開倉給之主者以為舊典宜先表聞𤣥曰方待奏民且死矣開倉訖乃上聞天子嘉之吳中有均輸之號吳倉春申君所造名均輸洛陽有常滿之名見洛陽記御廪災桓十四年八月壬申御廩災乙亥嘗以為未易災之餘而嘗也白帝倉漢記公孫述有白帝倉細柳倉三輔故事曰漢文大將軍周亞夫軍於細柳今呼古徼是也徼西有細柳倉城東有嘉倉擅開倉汲黯因使矯制發倉救河内上釋罪韓韶後漢韓韶字仲黄為嬴長賊不入界餘縣多被冦廢耕入縣界求索衣糧甚衆韶愍其饑困開倉賑之萬餘戸主者爭為不可韶曰此活溝壑之民而伏罪含笑入地太守素知名徳竟不坐鄭黙晉鄭黙為東郡守歲凶開倉賑給待罪詔書襃嘆比之汲黯班告天下王藴字仁叔為吳興守郡人饑開倉賑恤主簿諌請先上聞待報藴曰行仁義敗無所恨朝廷以違科免之士庻詣闕左降晉陵太守常平夀昌之計食貨志漢宣帝時年豐人少利時大司農中丞耿夀昌上計令郡國皆築倉以穀賤時増其價而糴以利農穀貴時減價而糶以利人名曰常平倉百姓利之平糴管氏之輕重李悝之平糴宏羊之均輸夀昌之常平人皆賴其利不涸之倉管子曰積於不涸之倉者務五穀也不盡文子曰積於不盡之倉存救存救之要術儲蓄以虞災以待凶而頒之周禮豐凶不常歛散有典既有無之相均亦豐儉而交利智合於權利和其義均節豐儉適宜公私交利苟栖畝之餘糧豐年不斂則在野之餓莩凶歲疇依羨耗出納有倉出如珠玉取如糞土史監臨當其豐歲雖多京坻之謡守在職司宜謹豆區之量秋斂春頒孔依髙為廥姜師度為陜州刺史太原倉水陸運所湊轉屬諸河師度使依高為廥而注米于舟以故人不勞儲廥嬴衍鄧景山王思禮在太原儲廥嬴衍請輸半以實京師㑹卒管崇嗣代之政弛不治數月為下盜費畧盡帝聞即以景山為太原尹帑廥􅎊虛張文瓘高宗征討四夷京師養廐馬萬匹帑廥􅎊虛文瓘諌發義倉粟薛訥遷藍田令富人倪氏訟息錢於肅政臺中丞來俊臣受財發義倉粟數千斛償之訥曰義倉本備水旱安可絶衆人之仰私一家報上不與倉廪未實吕元泰上書曰今倉廪未實不謂國富倉廥充宋慶禮兼營州都督不數年倉廥充倉庫積鉅萬牛仙客始在河西􅞋事省用倉庫積鉅萬愈匱盧懐謹陳時政曰比州牧或一二歲或三五月即遷倉庫愈匱職為此耳條士馬倉廥宗室涵郭子儀表為關内鹽池判官肅宗至平凉未知所從朔方留後杜鴻漸等條士馬倉廥使涵奉牋馳謁廥儲盈腐殷侑拜義昌軍節度廥儲盈腐太倉武庫竝在都邑張說䟽太倉武庫並在都邑紅粟利器藴若丘山新倉李憲遷衞州刺史河中兵仰食于綘憲治新倉以儲粟綘人頼利主倉韋丹徙為江南西道觀察使有吏主倉十年丹覆其糧亡三千斛丹曰吏豈自費徙籍其家盡得文記乃權吏所奪召諸吏曰若恃權取於倉罪也與若期一月還之皆頓首謝及期無敢違收穀羨餘丹子宙為永州刺史州負嶺傳餉艱險毎饑人輒莩死宙始築常平倉收穀羨餘以待乏罷並建常平倉宇文融拜御史中丞請馳傳行天下詔以客賦所在並建常平倉益貯九穀權發斂儲三百萬斛劉晏又以常平法豐則貴取饑則賤與率諸州常儲三百萬斛豈所謂有功者耶有白雀集于髙豐屯廪蓋大穰之證也李翰蘇州屯田紀頌罕畜劉蕡䇿曰國廪罕畜本乎冗食尚繁太原廥鉅萬之倉陳子昻上書稻米流脂粟米白公私倉廪與豐實杜詩憶昔積粟埋梁文粹皇甫湜吉州刺史㕔記向覆官倉倉無斗糧公來㡬時積粟埋梁翬飛雲矗巨廪崇創翬飛雲矗縮以板幹積如京坻得蓋藏之宜協出入之制岐公遺愛碑廣關輔之糴廣關輔之糴京師糧廪益羨粟十七萬斛皆糴於關中號為和糴憲宗即位有司以歲豐熟請畿内和糴當時府縣配戸督限有稽違則廹蹙鞭撻甚於稅賦號為和糴其實害民計墾田秋熟所在為義倉戴胄建議自王公以下計墾田秋熟所在為義倉歲凶以給民太宗善之唐史食貨志粟藏九年米藏五年唐食貨志其後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著于令倉儲盈衍唐史韓琬上言往年倉儲盈衍今所在空虚倉空戰卒饑韓愈詩庫藏二主守附白庫月令季春命有司開府庫出幣帛聘名士帑藏說文庫兵噐所藏帑金布所藏五庫禮曰季春審五庫之量天子之庫冇五藏於天下王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥武庫漢立武庫以藏禁兵王府御府大内竊藏晉文之䜿頭須守藏者及其出竊藏以逃焚臺韓詩外傳曰晉文公藏寶之臺燒三日公子晏賀曰臣聞王者藏於天下諸侯藏於百姓今賦斂無已皇天降災於藏是君之福故賀之東山窺東山之府則恠寶溢目充府庫周禮凡萬人之貢以充府庫貨賄之藏長府藏名白藏魏之藏名充牣積滯鹿臺紂所積之府庫曰鹿臺不竭之府管子曰藏於不竭之府謂之養桑麻育六畜受藏周禮頒其貨於受藏之府内府周禮内府掌受九貢九賦九功之貨賄良兵噐以待邦家之大用注謂朝覲頒賜外府掌邦之出入以供百物而待邦之小用注布帛也藏曰泉行曰布小用謂賜也管庫禮記晉趙文子舉管庫之士七十有餘家府實子産曰其輸之則君府實餘財武帝初府庫餘財京師錢累百巨萬餘貫朽而不可校六府周禮天子六府曰司土司木司水司草司器司貨典司六職注府謂主藏物之稅禁庫無聚水衡錢天子私藏乗輿供養所出母將隆君房言大司農錢自供乗輿不以給供養供養勞賜一出少府蓋不以本藏給末用本藏給末用見上注五庫車庫兵庫祭噐庫樂庫宴噐庫大庭之庫魯自壞後漢靈帝光和武庫屋自壊魚魏嘉平中魚二集武庫屋上主守出納之吝謂之有司出柙虎兕出於柙龜玉毁於櫝中是誰之過與守藏委質監臨所守攸守晉侯之䜿頭須守藏者也竊藏以逃孔庫委豐餘令狐彰拜滑亳節度使庫委豐餘瓊林大盈陸贄始帝播遷府藏委弃衞兵無禇衣至是天下貢進稍至乃於行在夾廡署瓊林大盈二庫别藏貢物贄諌以為瓊林大盈於古無傳舊老皆言開元時貴臣飾巧以求媚建言郡邑賦稅當委有司以制經用其貢獻悉歸天子私有之蕩心侈欲亦終以餌冦廥藏殫耗牛徽改給事中留陳倉張濬伐太原引為判官敕在所敦遣徽太息曰王室方復廥藏殫耗當協和諸侯以為藩屏而又濟之以兵諸侯離心必有後憂不肯進後濬果敗薄入謹出府庫遂實張延賞累拜荆南劍南西川節度使自楊國忠討南蠻三蜀疲罄及乗輿臨狩靡用百出後更郭英乂崔寧楊子琳亂益矜僣公私蕭然延賞事為之制薄入謹出府庫遂實令史直曹關播再遷給事中故事諸司甲庫以令史直曹刓脫為奸播悉易以士人時韙其法倉無久儲段秀實遷涇州于時倉無乆儲郛無居人朝廷患之詔百官觀庫物楊國忠因言古者二十七年耕餘九年食今天下太平請在所出積滯變輕齎内富京師又悉天下義倉及丁租地課易布帛以充天子禁藏明年帝詔百官觀庫物積如丘山賜羣臣各有差錫國忠紫衣金魚楊炎言大盈見稅門負賸季月裴延齡建言左藏天下歲入不貲耗不可校請列别舍以檢盈虛於是以天下宿負八百萬緡析為負庫抽貫三百萬緡為賸庫様物三十萬緡為季庫帛以素出以色入者為月庫帝皆從之廢内藏庫明宗廢内藏庫四方所上物悉歸之有司五代史本紀庫無尺繒文粹皇甫湜吉州刺史㕔記向閱官庫庫無尺繒公來㡬時山積層層諸道貢珍遽私别庫陸宣公奏議忽觀古廊之下榜列三庫之名竊揣軍情或生觖望合入官則納于其内合給用則出乎其中奏議云錢餘於庫韓文王仲舒誌宫庫饒豐劉文靜曰晉陽士健馬彊宫庫饒豐管籥三白管庫之士見前北門之管杞子云鄭人使我掌其北門之管琅當鐵鎻琅當長鎻橐籥老子曰天地之間其猶橐籥乎謹守管籥漢書啓籥書啟籥見書乃并是吉金縢司門周禮司門掌授鍵以啟閉國門戒門閭脩鍵閉善閉老子曰善閉者無關鍵而不可開扃鐍莊子則必攝緘縢固扃鐍孔不為扃鑰元徳秀愛陸渾佳山水乃定居不為扃鑰自持管籥徐岱吝嗇自持家管籥世所譏云掌六軍管鑰楊復恭見帝賜姓李名順節使掌六軍管鑰納四金鑰朱滔反僣相王與王武俊田悅納四金鑰於囘紇曰四國願聽命於可汗謹上金鑰啓閉出納唯所命至是乞師焉銀鑿鏤鐵鏁唐酉陽雜爼安祿山恩寵莫比其所賜品目有銀鑿鏤鐵鏁掊鏁擴門及州不解衣下令掊鏁擴門悉弃倉廪與民韓文曹成王廟碑金鏁罽賔國武徳二年遣使貢金鏁抱關掌管就車于司馬門外聞之於抱關掌管者柳文太學諸生書出管鑰數篋吳越世家諸將泣下皆曰元瓘從王征伐最有功請立之鏐乃出管鑰數篋詔元瓘與之曰諸將許爾矣下鑰開金坊門𤣥宗貴妃楊氏以譴還第高力士知帝㫖是夕請召妃還下鑰開金坊門馳入城門郎掌京城皇城宫殿諸門開闔之節奉管鑰而出納之武徳五年置門僕八百人畨上送管籥園圃四灌園附白老圃樊遲請學為圃子曰吾不如老圃折柳詩曰折柳樊圃注云樊蕃也不窺董仲舒勤學三年不窺園圃踐葵魯漆室之女曰昔有客繫馬園中馬逸踐葵使予終歲不飽葵百畦莊子云子貢過漢隂見一丈人鑿隧抱甕而灌園子貢曰有機於此日浸百畦挈水若抽名曰桔橰丈人曰吾知之耻而不為外圃左傳孔氏之外圃九畹楚辭曰予既滋蘭之九畹又樹蕙之百畝西園曹子建詩清夜游西園飛蓋相追隨北園㳺于北園樹果樹菜說文園樹果圃樹菜樹藝周禮二十而一周禮園㕓二十而一注云以利少故二十而稅一也㕓城市中空地不樹者無槨罰之樹事周禮任圃以樹事貢草木謂果𤓰葵韮灌於陵子辭卿相而桔橰灌園又戴宏為河間相自免歸而灌蔬以經教授山陽餘利向秀傳曰秀與吕安灌園山陽收其餘利以供酒食之費自賃范丹學通三經常自賃灌園鬻蔬潘岳賦序灌園鬻蔬使吏鉏治魏顔斐文材為京兆守於府下起菜園使吏投間鉏治之請美史王翦為秦伐楚請美田宅園圃悉與貧人後孝和鉏園得黄金印後漢戴異園公陳留志園庾居園中世謂之園公孔子嘗為魯乗田吏苑囿之吏九月築場圃注春夏為圃秋冬為場園有桃有棘孔市取宗室臯遷山南節度使張柬之有園圃在襄陽臯宴集將市取之馬彛曰漢陽有中興功今遺業當百世共保奈何使其子孫鬻乎臯謝曰主吏失詞以為君羞微君安得聞此言脩蒔蕭嵩請老退脩蒔園區延平門林園李晟賜延平門之林園我圃日蒼翠杜甫雨詩築室茨草為圃乎湘之西柳宗元送從弟謀序名園依綠水何將軍山林杜奉誠園馬燧子暢終少府監諸子無室廬自託奉誠園亭觀即其安邑里舊第治園沼林藪李簡求還東都治園沼林藪左浮飛閣右列閒館柳文訾家洲亭記抗月檻於廻谿出風榭於篁中同上青林重複緑城瀰漫景龍文館記芙蓉在京羅城東南隅有青林重複綠城瀰漫蓋帝城勝景駕時幸之故園秦地杜牧望故園賦霜中登故畦杜詩百畦凡闢地南北東西若干圃百畦柳文决溪泉為圃但當把鉏荷鍤决溪泉為圃以給茹其隟則浚溝池藝樹木柳文藩籬五白羝羊觸藩易折柳樊圃詩游藩莊子曰願游其藩藩籬之鷃授條晉書庾衮與弟子樹籬跪而授條曰幽顯易操非君子意鷦鷯長於藩籬之下鷦鷯賦云芳枳樹籬閑居賦為軍傳晉楚弭兵以藩為軍注示不相疑孔里人多造門觀賦詩至壓敗其藩楊收吳人號神童里人多造門觀賦詩至壓敗其藩收嘲之曰爾非羸角者奚用觸吾藩斥鷃笑李太白大鵬賦而斥鷃之輩空見笑於藩籬周棘扈藩姜晦除吏部侍郎主選曹吏嘗請託為奸前領選者周棘扈藩檢窒内外猶不禁至晦悉除之示無防限枳棘茅屋枳棘籬韓詩是缺是補我有藩籬是缺是補杜甫課伐木序失固文粹于公異破朱泚露布曾乏鑄刄之鋒已失藩籬之固藩籬帶松菊杜甫赤谷藩籬生野徑斤斧任樵童杜詩洞無藩籬元稹册燕冦勃起洞無藩籬踸踔藩籬之際文粹李嶠上高長史重此藩籬䕶柳宗元商山臨路孤松詩幸逢仁惠意重此藩籬䕶牆壁六奢侈築牆葺壊穿窬附白厚其牆垣傳數仞及肩論語耳屬于垣藏書魯恭王壊孔子舊宅於壁中得古文尚書皆科斗文字環堵之室循墻而走正考父有茨牆有茨不可掃茨蒺蔾也蔽惡叔孫曰人之有墻蔽惡也墻既壊誰之咎注咎在墻以禦風雨以避燥濕大為之防猶有踰者高墉射隼高墉既勤垣墉惟其塗蔇茨牆面不學牆面勿仞漢書牆藩勿仞三尺周禮牆厚三尺崇之注云高卑為率足以相稱短垣國語曰君有短垣而自踰負牆子貢負牆而起郤壊牆之郤壊百堵皆作制淮南子舜作室築墻茨屋令人皆知去巖穴各有家室此其始也相如成都唯四壁負牆而立奢侈雕墻尚書峻宇雕墻傳曰晉靈公不君厚斂以雕墻不露形土被朱紫並文選椒塗取其温香粉壁紫素漢官儀郎省中皆胡粉塗壁紫素界也黼繡漢書黼繡古天子服也今商人大賈嘉㑹召客者皆用以被牆金銀後漢琅琊王好治宫室殿壁皆飾以金銀牆藩甘泉賦電倐忽於牆藩以琉璃為牆南州異物志大秦國築牆登登築之登登用力也百堵之子于垣百堵皆作版築高卑薄厚廣袤數仞之制一簣之功啓塞從時城郭垣塹謂之塞皆隨其壊則治不限土功之時平版幹稱畚築程土物畧基址土物既程高卑是揣計徒庸順時屬役其繩則直縮版以載以索縮其版上下相承垝垣毁墻葺壊葺墻傳曰繕完葺墻一日必葺叔孫所居舘雖一日必葺其墻屋百堵皆興見上注騫崩陁陊糞糞土之墻不可杇也圬人傳圬人以時塓舘宫室圬人塗者塓亦塗也塗塈塈泥也見上毁垣穨墉坏牆垣月令孟秋穿窬穿窬之盜鑿壁匡衡讀書無燭鑿鄰家壁因燭以照之穿墉誰謂鼠無牙何以穿我墉踰垣而走鄰女宋玉東鄰女登墻而窺者三年矣連牆列子師壺丘子林友伯昏瞀人交居東郭與南郭子連牆二十年不相謁請相遇於道及肩屬耳被誅齊莊公私崔杼之室牆下被誅無踰我牆詩短垣君有短垣而自踰之踰書曰踰垣墻竊牛馬則有常刑乗彼垝垣孔盛夏治垣王遂盛夏治署舍墻垣程督慘峭環堵庳陋盧懐謹卒帝後還京因校獵樗杜間望懐謹家環堵庳陋家人若有所營者馳使問焉還白懐謹大祥帝即以縑帛賜之梯牆出首賀知章遷太子右庻子充侍讀申王薨詔選挽郎而知章取捨不平蔭子喧訴不能止知章梯墻出首以决事人皆靳之鐵簮畫壁漢陽公主常用鐵簮畫壁記田租所入不為墻垣元徳秀不為墻垣負墻立于頔家童上變詔捕頔吏沈壁及他奴送御史獄頔與諸子素服待罪建福門吏不納屏營負墻立牆置耳九國志吳崔太初多疑好察每通街交㑹之所墻必置耳謂人曰還聞墻有耳否非墻耳乃吾耳行路之人鮮敢偶語粉堵月色輝粉堵杜牧開元寺詩大壁曠凝淨韓愈納涼聯句椒壁懸錦幕杜甫杜秋娘詩短垣三面遶逶迤韓愈泗汴交流疥壁酉陽雜爼大厯末禪師元覽住荆州陟屺寺道髙有風韻人不可得而親張璪嘗畫古松於齋壁符載讃之衞象詩之亦一時三絶覽悉加堊焉人問其故曰無事疥吾壁也重關複壁李林甫所居重關複壁左壁頽剥蔣乂帝嘗登凌煙閣視左壁頽剥題文漫缺行纔數字命錄以問宰相無能知者遽召乂至答曰此聖厯中侍臣圖賛帝前口以誦補不失一字運土塞路不充牆壁辛替否諌造佛寺疏竇七白宫中之竇其崇三尺周禮考工記圭竇傳蓽門圭竇之人皆陵其上逃出自竇有過氏滅夏后相后緍方娠逃出自竇大竇先王之大竇孔食自竇進劉季述囚帝少陽院食自竇進爭水竇于嶠詆訾趙鳯鳯心銜之而未有以發而嶠與鄰家爭水竇鳯由是左遷嶠虵竇梟驚墮梁虵走竇韓愈乾竇逍遥越坤位詆訐陷乾竇南山詩私開四竇澤不及下涇田獨肥髙陵令劉君請杜私竇使無弃流請遵田令使無越制劉禹錫洩水脉白公春遊隂竇洩水脉一竇之泉一竇之泉其音清也兹吾方在懸得乎人得乎天吾不知所以然笠澤叢書不得謁面陸宣公貶忠州土塞其門家人由於狗竇中州將不得謁面芝田錄引泉竇以滌塵垢文粹許堯佐東林寺碑旁引泉竇以滌塵垢齊映自竇出張鎰撫盧龍楚琳亂軍司馬齊映自竇出免生魚上元二年秋霖雨連月渠竇生魚志竹竿接嵌竇引注來鳥道杜甫園人送𤓰詩引泉開故竇柳宗元詩嵌竇潜洩瀬杜甫詩逺川通曲流嵌竇潜洩瀬從水竇入梁臣劉鄩梁已破朱瑾等悉有兖鄆以葛從周為兖州節度使從周將兵在外鄩乃使人負油鬻城中悉視城中虚實出入之所由者得羅城下水竇可入鄩乃以歩兵從水竇入襲破之竈八祭附白夷竈傳塞井夷竈踞竈觚仲尼讀春秋老􅆅踞竈觚聽之竈觚額也媚竈王孫賈曰與其媚於奥寧媚於竈騷除史記李斯曰竈上騷除萬世一時也騷音埽減孫臏減竈增虞詡増竈曲突漢書曲突徙薪無恩澤向栩後漢向栩性不恒又似狂坐於竈北版屋上避竈莊子云煬者避竈風吹李南少明風角女見疾風卒起吹竈突及井泣辭白姑此主爨者當之果卒也生䵷戰國策曰智伯攻晉陽而水之城不没者三版臼竈生䵷人馬相食無黔突墨子竈銘李尤曰燧人造火竈五突魯連子竈五突分煙者衆矣祭竈禮有五祀竈居一焉孟夏其祀竈祭先肺陽氣盛熱外祀之於竈從熱類也老婦之祭禮曰竈者老婦之祭盛於盆尊於瓶注老婦先炊器也祭竈以祭先炊也燔柴於爨非禮也時多失禮燔於竈祀火神失祀竈之義孫寶後漢張忠署孫寶為主簿遂祭竈請比鄰臘日後漢隂子方臘日晨炊而竈神見黄羊因祀之三世至識繁昌遂當以臘日祭也風吹風吹竈神主婦當死庻人祭竈天子親祠李少君言祀竈皆可致神而丹砂可化為黄金黄金成以為器飲食則益夀夀益則海中蓬萊仙者皆可見之封禪則不死黄帝是也於是天子親祠竈焉又抱朴子曰孟夏可以祠竈竈神毎月晦日上天言人罪狀大者奪紀小者奪算紀三百日算一百日孔茶竈陸龜蒙升舟齎束書茶竈筆牀釣具往來作竈堂中東夷新羅冬則作竈堂中厨竈無青煙李白玉真公主别館詩不燭貧薪不燭竈韓愈秋雨聨句詩井竈任塵埃杜甫咏懐炊稻烹鯉白公舟行詩床頭有行竈炊稻烹紅鯉列三四竈王彦伯醫既著列三四竈煮藥於庭老㓜塞門來請彦伯指曰熱者飲此寒者飲此風者氣者飲此皆飲而去出唐語林壤子竈神名出酉陽雜爼竈有馬狀如促織穴於竈側俗有謂竈有馬足食之兆酉陽雜爼擇日以祀竈之煬者請新之又請擇日以祀之曰竈在祀典聞之舊矣祭法曰王為羣姓立七祀其七曰竈達於庻人立一祀或立戸或立竈飲食之事先自火化生民以來頼之孫樵文竈鬼以時録人功過此出漢武時方士之言室暗不欺屋漏不愧雖歲不一祀其誣我乎同上竈神名隗狀如美女酉陽雜俎竈神名隗狀如美女又姓張單字子郭夫人字卿忌有六女皆名察竹齋燒藥竈杜甫寄高岑詩丹竈熾東序元稹車九造車戎車美車使車覆破騁車同載無車借車走馬車附白肇牽車牛同軌車同軌以爾車來詩大車轞轞載馳載驅不馳不驅有車轔轔脂轄巾車巾車王車官也流水漢書車如流水馬如龍立而至秦慎子曰行陸者立而至秦有車任重致逺百兩之子于歸百兩御之十乗元戎十乗以先啓行棘軸史記狶膏棘軸所以為滑也不能運方穿任載持重致千里莊子曰軸不運而致千里載物服箱公車周禮巾車掌公車之政令公官也退與人謀周禮輈之和也進則與馬謀退則與人謀注云言車進退之易與人馬之意相應此為輈之善所致也勸和馬力言輈和勸馬用力壹取周禮馬力既竭輈猶能壹取焉象天地日月軫之方象地蓋之圓象天輪輻三十象日月牽傍車轅之外輓牛曰牽傍乗殷之輅命車九命三命而賜車馬也禮獻車獻車馬者執䇿綏禮暢轂詩文茵暢轂謂長轂也有棧之車行彼周道役車其休庻人車也言農功畢匪車朅兮疾車五楘梁輈梁輈上鈎衡長者轍陳平門多長者轍魚軒蓽路柴車車甚澤澤美也鍥軸陽虎盡借邑人之車鍥其軸鍥刻也借車見上爭車公孫閼與頴考叔爭車考叔挾輈以走子都逐之不及輦車駕輦五輅金輅玉輅象輅革輅木輅夏縵卿乗也墨車大夫乗棧車士車役車庻人車行陸作車以行陸察車自輪始一器而工聚者車為多推轂漢書還轅輿不及還轅轂擊車馳轂還擊六飛袁盎曰陛下馳六飛熊軾後漢列侯伏熊軾皂蓋虛左魏公子乗車虛左自迎侯生戯車衞綰以戲車為郎驢車張楷公超家貧無業常乘驢車至市賣藥足給而還又薊子訓常乗驢車上殿魏鍾繇有膝疾拜起不便時華歆亦以高年有疾帝皆使乗輿上殿壹馬鮑宣子都為豫州牧郭欽奏宣行部乗傳去法駕駕壹馬舍宿鄉亭坐免罪賜車蓋黄覇字次公任揚州刺史宣帝下詔賜車蓋特高一丈别駕主簿車緹油屏泥於軾前以章有徳褰帷見刺史門葦車袁閎夏甫為沛相乗葦車柴車謝夷吾堯卿遷鉅鹿守行春乗柴車刺史上其儀序失中損國典左遷為下邳令羊車晉輿服志䕶軍羊琇輒乗羊車司𨽻劉毅劾其罪官給太康四年詔依漢故事給九卿朝車駕駟馬及安車各一乗詔諸尚書軍校加侍中常侍者皆給傳車給劍得入殿省與侍臣相隨雨隨車漢百里嵩事見雨門注牛車漢初將相或乗牛車乗入宫殿車千秋年老上憂之朝見得乗小車入宫殿因號車丞相徳車結旌徳車乗車也結謂收斂不飾車中不内顧舍車而徒易造車轉蓬淮南子聖人觀轉蓬而為車椎輪文選夫椎輪為大輅之始大輅寧有椎輪之質伐輪坎坎伐輪伐輻有車之用三十輻共一轂當其無有車之用象日文子曰轉輪而無窮象日月之運行輪轅之材文選遵途合轍季材穉材也以柔靭故為車也作車以行陸聚工一器而聚工者車為多樸屬凡察車之道欲其樸屬不樸屬無以為完乆㣲至不㣲至無以為蹙速也注謂輪圓甚則著地㣲少也蹙速疾行貌三材輪人為輪斬三材必以其時三材既具巧者和之注三材轂輻牙利轉轂者以為利轉也輻者以為直指也牙者以為固抱也牙音訝謂車網幎爾莫厯反輪貌揱爾音消輻貌皆謂其美容轂必直轂之為容取之於直揉輻必齊揉以火矯之取之於直杼以行澤侔以行山凡為輪行澤者欲杼之行山者欲侔之杼以行澤則是刀以割塗故塗不附侔以行山則是摶以行石也輪雖弊不甐於鑿摶徒端反注杼謂削薄也侔厚也摶亦厚也弊盡也甐動之也平沉必均謂以輪沉於水考其輕重四平輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸軸有三理一者為美無節目也二者以為久堅刃也三者以為利滑宻也揉輈凡揉輈欲其遜而無弧深輈欲頎典頎苦狠反典讀為殄輈欲弧而無折經而無絶太深則折經亦謂順理也進則與馬謀退則與人謀勸登馬力注登上也謂輈和勸馬用力也馬力既竭輈猶能取焉注正馬取道喻易進人謀馬謀契需袵弊軫方軫之方以象地蓋之圓以象天周禮奚仲薛祖奚仲居薛以為夏車正掌車之官庳車使髙史記孫叔敖為楚相俗好庳車楚王以為不便馬欲下令使髙其車相曰令數下人不知所從王必欲高車臣請教閭里使高其梱乗車皆君子君子不能數下車從之半歲民悉自高其車此不敎而人從化也司南車記里車晉輿服志司南記里諸車過江亡失制度而謝安率意造焉及獲京師舊輦形制無差千里振䇿終不契需五馭和鸞罕能反覆既勸登於馬力亦退與於人謀美車服美不稱傳曰慶季之車不亦美乎叔孫曰服美不稱必以惡終美車何為美澤可鑑慶封獻車於季武子美澤可鑑展莊叔見之曰車甚澤人必瘁宜其亡也不飾闔廬舟車不飾儉也七香五雲並美車名如輊如軒詩戎車既安如輊如軒疾驅於通道大都詩序載驟駸駸詩過國如厯塊晉阮裕有好車有人𦵏母意欲借不敢言裕聞歎曰有車使人不敢借何以車為遂命焚之紺轅翠轂車不雕㡬謂國家靡弊也周禮鮮車後漢向栩甫興狀若狂生好被髮裸足或騎驢入市乞匄後徴拜趙相及之官時人謂其必脫素從儉而栩更乗鮮車御良馬世疑其始偽也宜稱朱轓漢詔吏者人之師也車服宜稱六百石以上皆長吏也而與民無異令二千石朱兩轓千石至六百石朱左轓流水馬皇后見親戚車如流水馬如龍甚不悅茱茰輞石崇作及白槐之輻黜車子駟黜豐止車曰爾非禮也注過制覆破僨濟鄭伯之車奔于濟僨風飄入濟水也載輸爾載詩曰載輸爾載輸墮也棄爾輔詩曰其車既載乃棄爾輔無輗論語脫輻傳車脫其輻不利行師說輹易曰輿說輹摧輪魏武帝時北登太行山羊腸坂詰曲車輪為之摧前覆後戒漢書前車覆後車戒或載或隳老子折軸史記羣輕折軸毁折周禮謂車損也敝車故敝之車勞薪荀朂食知破車脚為柴恥弊車見同載門將泛駕泛覆也中道而廢輔車既不相依脫輻如何前進同載同載而歸文王得吕望為師乃同載而歸虛左以迓信陵君聞侯嬴乃虛左以迓執轡親御共載均茵憑汲黯與周陽由同列共車未嘗敢均茵憑惠而好我攜手同車耻敝車董允少與費褘齊名許靖䘮子允父和與褘同㑹其葬父和遣開後鹿車給之允有難色褘便前上和謂允曰始吾嘗疑汝於禕而今而後吾意了矣兄弟也張骼謂宛射犬曰公孫同乗兄弟也注云同乗之恩若兄弟也監令晉和嶠為中書令荀朂為監舊監令同車嶠嫉朂諂乃先登專坐不容朂朂乃自備車自此始異車王徽之嘗從桓冲行遇雨因下馬排入冲車謂曰公豈獨擅一車獻帝與趙温同車後漢獻帝西都與侍中趙温同輿輦至長安封江南侯為司空温字子柔天子不與同姓同車與異姓同車不同服禮以朝服異也夏侯惇魏太祖與夏侯惇同車載諸將無得比也戎車十乗元戎十乗以先啓行左輪朱殷小戎戎車輕車即戎輕車疾者以即戎同禮也不鬻禮兵車不中度不鬻於市不式兵車不式尚威武也武車綏旌綏謂張也武車兵車戰車晉馬隆孝興討羌依八陣圖作偏箱車地廣為鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應弦而倒使車埋輪張綱為御史在八使之中埋輪於洛陽都亭云豺狼當道安問狐狸遂劾梁冀也使者車軺車並使車攬轡慨然有澄清天下之志軺傳晉輿服志軺車古之將軍車也一馬曰軺車二馬曰軺傳車漢貴輜軿而賤軺車晉重軺車而賤輜軿騁車翹翹車乗招我以弓豈不欲往畏我友朋軟輪蒲輪安車公車為駕漢龔勝曰竊見國家徴毉巫皆備駕徴賢者亦宜為駕上曰大夫乗私車來耶勝曰唯唯無車彈鋏馮煖彈鋏歌曰長鋏歸來乎出無車徒行語顔回死顔路請子之車以為之槨子曰以吾從大夫之後不可以徒行蔡誼以明經給事大將軍幕府無車嘗步行衆門下好事者相合為買犢車借車借車東方朔為尚書從公孫宏借車借邑人車陽虎囚於西鄙盡借邑人之車鍥其軸麻約而歸之注鍥刻也走馬車入國不馳馳恐藺人䘏勿驅禮記國中以䇿篲䘏勿驅塵不出軌注謂不馳也子有車馬弗馳弗驅塵不出軌見上注長楸詩走馬長楸閭馳騁知禁蹍市人之足莊子蹍市人之足則辭以放傲兄則傴大親則已矣章臺街張敞為京兆尹走馬章臺街馳六飛袁盎曰陛下馳六飛賭逐射田忌數與齊諸公子馳逐重射孫子曰臣能令君勝與君及公子賭千金孫子曰以君之下駟與彼上駟君以上駟彼以中駟君以中駟彼以下駟卒得王千金過華臣之門必騁怒馬注林楚及衢而騁孔乗小輿濮恭王恭帝以泰大腰腹聽乗小輿至朝金根趙國莊懿公主下嫁魏博節度使田緒厭翟敝不可乗以金根代之易銅萬夀公主下嫁鄭顥舊制車輿以鐐金為飾帝曰我以儉率天下宜自近始易以銅命升金輅裴寂太宗命寂與長孫無忌升金輅寂辭帝曰公有佐命勲無忌宣力王室非二人誰可參乗者遂同載歸歩輿李綱以足疾賜歩輿聽乗至閣登輿夾侍李多祚帝祠太廟特詔多祚與相王登輿夾侍肩輿入殿房元齡病稍間詔許肩輿入殿肩輿以朝韋思謙轉納言辭疾不許肩輿以朝聽子孫侍三衞挾輿襄邑恭王神符以足不良太宗令乗小輿入紫微殿三衞挾輿以升肩輿至中書崔祐甫被疾詔肩輿至中書卧而承㫖許乗入殿中禇無量復故官以耆老隨仗聽徐行又為設腰轝許乗入殿中一乗賈敦頤入朝常盡室行車一乗敝甚不知其刺史也以牛駕車劉子元皇太子將釋奠國學有司具儀從臣著衣冠乗馬魏晉後以牛駕車江左尚書郎輒輕乗馬則御史劾治顔延年罷官乗馬出入閭里世稱放誕此則乗馬宜從䙝服之明驗宦士肩舁以見李叔明後朝京師以病足賜錦輦令宦士肩舁以見七寶輿崔寧嚴武奏為漢州刺史吐蕃引雜羌冦西山於是武遣寧將而西既薄賊城城皆累石不得攻惟東西不合者丈許諜知之乃為地道再宿而抜拓地數百里虜衆驚相謂曰寧神兵也及還武大悅装七寶輿迎入成都以誇于軍朱輪華轂武平一上言臣一宗階三等家數侯朱輪華轂過許史梁鄧逺甚送車二乗陸長源為汝州刺史送車二乗曰吾祖罷魏州車一乗而圖書半之吾媿不及先人云紅網朱網畵香車楊復恭帝問游幸費對曰聞懿宗以來每行幸無慮用錢十萬金帛五車十部樂工五百犢車紅網朱網畵香車百乗諸衞士三千凡曲江温湯若田獵曰大行從宫中苑中曰小行從帝乃詔類減半輜軿車五代史王出入閭里乗輜軿車錦車繡輿李蔚傳咸通十四年迎佛骨鳯翔京師錦車繡輿載歌舞從之乗黄金輿黄巢乗黄金輿衞者皆繡袍華幘陷京師自入春明門牛不能引明皇雜録上將幸華清宫貴妃姊妺競飾車服各為一犢車展以金翠間以珠玉一車之費不啻數十萬既成甚重而牛不能引醉輿申王毎至冬月醉即使宫妓將錦綵兠子舁歸寢室本宫呼醉輿出開元遺事䨇轂長轅礙荆棘緣崗入澗投田家張籍羈旅行輕轂韋蘇州車鬬風元稹連昌宫鈿車珠映摭言三輪車蜀林知元所居有茂林修竹為山石之娛嘗駕三輪車命童牽之隨意所止九國志大車揚飛塵亭午暗阡陌李白古風凡天子之車唐車服志凡天子之車曰玉輅者祭祀納后所乗也青質玉飾末金輅者饗射祀還飲至所乗也赤質金飾末象輅者行道所乗也黄質象飾末革輅者臨兵廵守所乗也白質鞔以革木輅者蒐田所乗也黒質漆之五輅皆重輿左青龍右白虎金鳯翅畫龍文鳥獸黄屋左纛金鳯一鈴二在軾前鸞十二在衡龍輈前設鄣塵青蓋三層繡飾上設博山方鏡下圓鏡樹羽輪金根朱班重牙左建旂十有二旒畫升龍其長曵地青繡綢杠右載闟㦸長四尺廣三尺黻丈旂首金龍銜錦結綬及緌帶垂鈴金鑁方釳押翟尾五焦鏤鍚鞶纓十二就旌旗蓋鞶纓皆從輅質唯蓋裏皆用黄五輅皆有副耕根車者耕籍所乗也青質三重蓋餘如玉輅安車者臨奉所乗也金飾重輿曲壁紫油纁朱裏通幰朱絲絡網朱鞶纓朱覆髮具絡駕赤駵副輅耕根車安車皆八鸞四望車者拜陵臨弔所乗也制如安車屬車十乗一曰指南車二曰記里鼓車三曰白鷺車四曰鸞旗車五曰辟惡車六曰皮軒車七曰羊車與耕根車四望車安車為十乗行幸陳于鹵簿則分前後大朝㑹則分左右皇后之車六重翟車厭翟車翟車安車四望車金根車皇太子之車三金輅軺車四望車親王及武職一品有象輅青油纁朱裏通幰朱絲絡網二品三品有革輅朱裏青通幰四品有木輅五品有軺車皆碧裏青偏幰象飾朱班輪八鸞左建旂畫升龍右載闟㦸革輅木輅左建旜軺車曲壁碧裏青通幰諸路朱質朱蓋朱旗朱班輪一品之旜九旒二品八旒三品七旒四品六旒鞶纓就亦如之三品以上珂九子四品七子六品以下去通幰及珂王公車輅藏于太僕受册行冊命廵陵昬葬則給之餘皆以綺代車以上並車服志衆車之用具任而安之者箱達而行之者輪常中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅却暑與雨蓋敬而可伏者軾服而制者馬若牛然後衆車之用具柳文說車高以逺乎汚若蓋下以成乎禮若軾其為工也攻果若恢其量若箱周而通之若輪守大中以動乎外而不變乎内若軸攝之以剛健若蚤引焉而宜御乎物若轅高以逺乎汚若蓋下以成乎禮若軾險而安易而利動而法則庻乎車之全也車畜雷杜甫朝獻太清宫賦名馬工車叛臣賛蒼頭女奴名馬工車惴惴常畏捕取乗庳車舍他所宋璟張易之初兾璟出則劾奏誅之計不行乃伺璟家㛰禮將遣客刺殺之有告璟者璟乗庳車舍他所刺不得發舟十造舟路戰舡開水附覆舟御舡白濟巨川若濟巨川用汝作舟楫書藏夜壑莊子夫藏舟於壑謂之固矣然而夜半有力者負之而走昧者不知汎彼柏舟在彼中河一葦誰謂河廣一葦杭之汎汎楊舟載沉載浮神仙後漢郭林宗自京師歸諸儒送至河上林宗唯與李膺同舟而濟衆賔望之以為神仙坐而至越慎子曰行海者坐而至越有舟故也鷁舟淮南子龍舟鷁首青雀舟名鳥舟七命曰乗鳥舟兮為水嬉艅艎吳王敗楚獲吳之乗舟名艅艎不繫汎兮若不繫之舟任重致逺篙工楫師榜人水行老子利渉大川渉川行海川惟設險舟以濟人持載一葉桂葉舟千艘萬舸臭厥載書曰若乗舟汝不濟臭厥載行舟書罔水行舟言丹朱無道習於無水行舟荃橈桂櫂蘭栧並見楚辭布帆錦纜檜楫松舟作舟以行水周禮虛舟莊子同舟而濟胡越何患乎異心容舠誰謂河廣曽不容舠小舡舳艫千里繒帛維舟吳甘寧輕俠以繒帛維舟去則割棄之以示奢也紼纚維之泛泛楊舟紼纚維之隱遁乗桴子曰道不行乗桴浮於海扁舟句踐既滅吳范蠡乗扁舟泛五湖仙槎海客犯牛斗野人之舩晉郭翻字長翔乗小舩歸武昌安西將軍庾造之以其舩狹小就引大舩翻曰使君不以鄙賤而辱臨之此固野人之舩櫂舩漢鄧通以櫂舩為黄頭郎土舡晉書曰昔武落鍾山崩有石穴二其一赤如丹其一黒如漆有一人出赤穴者名務相出黒穴者凡四姓又五姓爭為神以土為舡雕畫之浮者以為廪君務相舡獨浮遂稱廪君舩相避虞翻仲翔行逢糜芳人謂翻避將軍舩翻曰失忠與敬何以事君傾人二城稱將軍可乎芳闔戸不應刻舟求劍孝廉舩劉惔真長為丹陽尹張憑長宗詣惔惔留宿明旦還舩須㬰惔出傳教見張孝廉舩召同載之為梁詩造舟為梁操舟莊子顔回問仲尼曰吾嘗濟乎觴深之泉津人操舟若神吾問曰操可學乎曰可善㳺者數習而後能金人乗舩瑞圖王者徳茂則金人乗舩逰王後池泛棹扣枻輕枻縱枻秤象蒼舒以舟秤象得失韓子曰千鈞得舟則浮錙銖失舟則沉非千鈞輕而錙銖重有勢之與無勢舟非水不行水入舟則舟没君非民不治民犯上則君危造舟刳木易曰聖人刳木為舟剡木為楫以濟不通以利天下五覆月令季春命有司覆舟五覆五反乃告舟備天子乃乗舟不飾闔廬舟車不飾乃告舟備見上注舳艫千里舟之前後落葉古者觀落葉因以為舟作舟以行水修艦晉王濬拜益州修艦作大舩連舫方一百二十歩受二千人為城起樓櫓四門其上皆馳馬往來又畫鷁首怪獸於舩首以懼江神舟楫之盛自古未有造舩於蜀柹蔽江而下將伐吳造舟為梁吳子觀舟左氏曰吳伐越獲俘以為閽使守舩吳子餘祭觀舟閽人以刀殺之戰舩焚舟秦伯伐晉濟河焚舟戈舩漢武作昆明池以習水戰中有戈舩樓舩百般上建樓櫓戈矛四角垂幡髦旌葆麾蓋樓舩漢楊僕征南越為樓舩將軍青龍飛鷰戰艦名蒼鷹赤雀鐵軸牙檣並戰舩名舩械晉朱伺擊賊開諸舩底以水淹之名為舩械伺傷退入舩從底沉行五十歩乃逸以運舩為戰艦陶侃以運舩為戰艦或言不可侃曰以官物討官賊試舩没見溺門覆舩覆舟家語夫水所以載舟亦所以覆舟懼齊侯與蔡姬乗舟于囿蕩公公懼變色禁之不可載沉載浮魚吞鯨魚吞舟風波漢書渡江河無楫中流而遇風波舩必覆之積羽沉舟史漂蕩沉溺顛覆膠舟御舩五覆始乗月令季春天子命有司覆舟五覆五反乃告舟備具于天子焉天子始乗舟有司舩官也覆反者慎之至也魚跳武王伐殷有白魚跳入王舟龍負夏禹南渡江黄龍負舟濟汾泛樓舩汾河漢武帝諫御舩漢成帝酎祭出便門欲御樓舩薛廣徳諫宜從橋免冠曰陛下不聽臣言臣自刎以血汚車輪上乃止試御舟遇風波見溺門開水路鑿離堆溝洫志蜀守李冰鑿離堆穿二江城都中皆可舩行百姓享其利往往引水溉田引渭水鄭莊當時引渭水渠傍南山下漕粟為便上為然乃穿三歲方通通褒斜溝洫志有人上書欲通褒斜道行漕言褒水通沔斜水通渭可以舩行漕漢中上發數萬人作褒斜而水多湍石不可漕也開漕引擘華山擘山以通河流鑿砥柱大禹鑿砥柱為三門濬川之功泛舟之利揣高卑議逺近舟師造戰船見上注孔舟艦相屬李勣翟讓為盜往從之說曰宋鄭商旅之㑹御河在中舟艦相屬往邀取之可以自資五百艘閻立徳即洪州造浮海大航五百艘遂從征遼㡬壞歸崇敬册立新羅使海道風濤舟㡬壞衆驚謀以單舸載而免答曰合共舟數十百人我何忍獨濟哉少頃風息競渡舟張仲方帝時詔王播造競渡舟三十艘仲方見延英論諍堅苦帝為減三之二樓艦韓滉遷浙東西觀察使造樓艦三千柁以舟師由海門大閱至申浦乃還以二小舸趨官楊收貶端州司馬吏具大舟以須收曰方謫去可乎以二小舸趨官以舟千二百柁入蛉子湖楊行宻封吳王天祐二年王彦章李徳誠拔潤州殺安仁義以王茂章為潤州團練使聶彦章等率舟師伐殷攻岳州許徳勲詹佶以舟千二百柁入蛉子湖􅀈山之南為木龍鏁舟夜徙三百舸斷楊林岸彦章入荆江將趍江陵佶躡之徳勲以梅花海鶻迅舸進斷木龍舟蔽江車弩亂發執彦章溺死萬人殷釋彦章還徳勲謂曰為我謝吳王僕等數人在湖湘不可冀也巨艦堂皇悉備成汭青州人天復三年帝詔淮南節度使楊行宻圍鄂州朱全忠使韓勍救之諷汭與馬殷當彦威犄角汭身自將而行為巨艦堂皇悉備行至公安卜不吉欲還楊師厚曰公舉全軍中道還何以見百姓汭乃行野艇纔留野艇語浮家泛宅張志和顔真卿為湖州刺史志和來謁真卿以舟敝漏請更之志和曰顧為浮家泛宅往來苕霅間辯捷類如此拏野人船張伯儀李希烈反賊追及奮力以禦之兩刃相嚮不得下㑹救至免至漢水拏野人舩以達沔州索民挽繂何易于為益昌令縣距州四十里刺史崔朴常乗春與賔属泛舟出益昌旁索民挽繂易于身引舟朴驚問狀易于曰方春百姓耕且蠶惟令不事可任其勞朴愧與賔客疾驅去著宫錦袍坐舟中李白嘗乗月與崔宗之自采石至金陵著宫錦袍坐舟中旁若無人泛舟飲餞歐陽詹泉州晉江人常衮罷宰相為觀察使詹與羅山甫同隱潘湖往見衮衮奇之辭歸泛舟飲餞獲鬭艦千艘蕭銑遣將文士引拒孝恭戰清江口孝恭大破之獲鬭艦千艘泛舟海池尉遲恭隠太子死時帝泛舟海池秦王命恭不解甲趨行在帝驚曰今日之亂為誰爾來何耶對曰秦王以太子齊王作亂舉兵誅之恐陛下不安遣臣宿衞帝悅與侍臣泛舟苑池閻立本初太宗與侍臣泛舟苑池見異鳥容與波上悅召立本侔狀請御舩韋安石中宗幸安樂公主池主請御舩安石曰御輕舟乗不測非帝王事乃止鶩没鑿舟高仁厚陳敬暄與仁厚謀曰秀昇未禽公能破賊當以東川待公詔拜行軍司馬仁厚聞賊儲械子女皆在屯乃以銳兵瀕江伐木頽水礙舟道負岸而陣使游軍逼賊久不戰則夜以千卒持短刀彊弩直薄營火而譟之秀昇率舟兵救火仁厚使人鶩没鑿舟皆沉拏飛艫入其軍張雄傳馮宏鐸大敗收殘士欲入海行宻懼復拒遣人迎犒東塘好謂曰兵有勝負今衆尚彊乃自棄于海奈何吾府雖隘尚可以居若欲揚州我且讓公宏鐸舉軍盡哭行宻拏飛艫不持兵入其軍執宏鐸手慰勉遂以歸龍舟畫舸前蜀王衍乾徳二年北廵狩至于西縣其還也自閬州浮江而上龍舟畫舸照耀江水輕艫循流下安祿山之還至淇門輕艫循流下萬夫挽繂而助日三百里舟檝皆飾金寶南蠻驃帛舫水嬉許景先為刺史治虢州有治行詔宰相盛具奏太常樂帛舫水嬉綵艦順宗為皇太子侍宴魚藻宫張水嬉綵艦宫人為櫂歌衆樂間發徳宗驩甚顧太子曰今日何如太子誦詩好樂無荒以為對輕艫緩棹權徳輿岐國公郊居記輕艫緩棹㳂洄上下凌風舸唐杜陽編處士元藏㡬達滄洲既久忽思中國洲人遂製凌風舸以送之激水如箭不數日達東萊大艎偶舫帝决取虜故詔越州都督治大艎偶舫以待出唐高麗傳齊山絶海荆南成汭造巨艦一艘三年而成號曰和州載又有齊山絶海之名華狀可知出摭言儆舟劉子浮于汴渉淮而東亦既釋紼纚榜人告予曰方今湍􅗭而舟艦宜謹其備以虞焉繇是袽以塞之灰以墐之㪺以乾之儆舟偃檣弭櫂偃檣弭櫂次于淮隂同上小舟若鳬鴈大舟若鯨鯢李白送族弟詩舟艫津湊張延賞傳連檣挾櫓韋堅游舸羅洪信棹歌揺艇月中尋李白江上煙艇杜甫軒輊泛浮亦有輕舟軒輊泛浮劉禹錫望楚賦竹葉舟陳季卿家于江南舉進士不成常訪僧于青龍寺遇僧它適有終南山翁亦候僧歸東壁有寰􅌡圖季卿乃尋江南路而長嘆曰得自渭泛河達于家亦不悔山翁笑曰此不難致命僧僮折堦前一竹葉作舟置圖上季卿熟視久之稍覺渭水波浪一葉漸巨席帆既張恍然若登舟旬餘至家一更復登舟泛江遵舊途而去復逰青龍寺見山翁尚擁褐而坐季卿曰非夢乎山翁曰六十日當自知爾後季卿妻子自江南奔來謂季卿厭世矣妻曰某日歸是夕題詩於西齋及留别二章始知非夢出異聞實錄人疑天上坐樓船水浄霞明兩重綺李白江上贈竇長史聞道青雲貴公子錦帆逰戲西江水人疑天上坐樓船水浄霞明兩重綺利檝馳深鼓利檝韓愈逺遊白孔六帖卷十一
