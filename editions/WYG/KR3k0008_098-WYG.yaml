body:
  text: 白孔六帖卷九十八唐白居易原本宋孔傳續撰豬一狗二蛇三鼠四騶虞五獬廌六猰㺄七蒲牢八貘九貀十髴髴十一䕫十二六駁十三兕十四魚十五龜十六黿十七龞十八鳥獸十九豬一白剛鬛祭廟名坎象易坎為豕食彘孟夏食菽與彘饋豚陽貨饋孔子豚長垣牧豕之澤牧公孫𢎞牧豕於海上士無故不殺犬豕信及豚魚易中孚卦妖傳齊侯田于貝邱見大豕人立從者曰彭生也公怒射之豕人立而啼公乃懼之白蹢詩有豕白蹢烝涉波矣蹢蹄烝衆也涉水而起遼東之獻朱浮字叔元與彭寵書曰遼東有豕生而白異以獻之行至河東見羣豕皆白懐慙而還夢符子曰朔人有獻燕相大豕者令宰夫膳之豕乃見夢於燕相曰造化營我以豕形食以人穢而仗君之靈而化始得為魯津之伯婁豬傳曰既定爾婁豬盍歸吾艾豭婁豬求子豬也喻衛夫人南子也老豕喻子朝也見豕負塗易擊刺史竇太后怒袁固使下圈擊豬景帝假固利兵下圈刺豕正中應手而倒也殺買孟子少時東家殺豬云云事具賢母門牧吴祐年二十䘮父家貧牧豕於長垣澤遇父故人謂之曰卿二千石子而杖鞭牧豕縦子不恥奈先人何祐謝之守志如初誤認董正列傳曰司馬徴字徳操有誤認徴豬便與之後亡豬在乃以豬還徴叩頭自責封豕吴為封豕長虵以薦食上國封大也期年文子曰先王之法也大豕不期年不食食人之食孟子年豐狗彘食人之食而不知檢宜稷周禮捭豚上音擘古禮也禮記去腦禮豚去腦豕望視而交睫腥不可食豶豕之牙豕牙獷滑剛暴難制之易千足彘與千户矦等貨殖志肝後漢閔仲叔居安邑家貧不能得肉日買猪肝一片屠者不與安邑令聞勑吏給焉仲叔曰豈以口腹累安邑哉遂去五尺爾雅曰五尺為豝大猪為􅙊居澤者不以鹿豕為禮禮豰説文曰豰小豚參軍猪一名参軍古今注千斤山海經猫猪大者肉重千斤白蹄青爪養生要曰白蹄青爪不可食一發五豵詩獻豜于公同上四月生家語六九五十四四主時時主豕故豕四月生字誤古人有讀史者云三豕日渡河子夏曰己亥日渡河校之果然以己為三以亥為豕逼賈姬史上林有野彘東萊賈姬如厠彘入厠帝欲自持㦸殺彘郅都諫乃止彘亦去豭豚子路佩之賜肩項羽賜樊噲巵酒彘肩蒸㹠晉王濟性豪侈帝嘗幸之供饌甚豐蒸㹠尤美上問其故對曰以人乳􅀈之上色不平食未畢而去齊豕性卑而率不掩豆禮晏平仲儉祭先人豚肩不掩豆食圏紫姑毎食於圈裏孫期後漢書孫期少為諸生通京氏易家貧牧豕於大澤中糟糠薦食孫𢎞放於海上上林牧梁鴻牧豕於上林苑中大蘭橋襄王橋曰大蘭橋者今之猪蘭橋也劉𢎞季以此橋近荻有蕺菜於橋東大養猪襄陽太守府君曰依此猪尿當易名作蘭橋耳復大蘭橋也初如戯之而百姓遂易其名也夢魏志闗侯夢猪嚙其脚孔射殪四豕唐儉從獵洛陽苑羣豕突出於林帝射四發輙殪四豕一豕躍及鐙儉投馬搏之帝拔劒㫁豕顧笑曰天䇿長史不見上將擊賊邪何懼之甚儉對曰陛下神武定四方豈復快心於一獸哉本傳鄚頡之豕北狄渤海俗所貴者曰鄚頡之豕豪猪南詔尋傳蠻射豪猪生食其肉為民患盧杞為虢州刺史奏言虢有官豕三千為民患徳宗曰徙之沙苑杞曰同州亦陛下百姓臣謂食之便帝曰守虢而憂它州宰相才也詔以豕賜貧民遂有意柄任矣出圂舞咸通七年徐州蕭縣民家豕出圏舞又牡豕多將隣里羣豕而行復自相噬齧鬬猪扶南人喜鬭猪江猪南蠻婆賄伽盧國興諸蠻市以江猪相易巨豕北狄室韋有巨豕食之韋其皮為服若席本傳給貧民徳宗大厯十四年十月以沙苑豢豕三千給貧民壬癸席河東備録申王謂猪既供飱不宜處于穢弊乃以氊龕粟粥待之取其毛刷凈令巧工織壬癸席光而且滑化黒猪姚汝能安祿山事迹祿山常夜宴醉卧化為一黑猪而龍首左右遽言之𤣥宗曰猪龍也無能為也黒面郎桂林人風俗日食以蛙有來中朝為御史者朝士戯之曰汝之居乃蛙䑓也御史荅此非蛙名圭虫而已然較圭虫之奉養豈不勝於黒靣郎哉黑靣郎謂猪也承平舊纂御桉缶乾符六年越州山隂民家有豕入室内壊器用御桉缶置于水次出唐五行志烏金拱州有人畜猪以致富因號猪為烏金見張鷟朝野僉載三耳八足元和八年長安西市有豕生子三耳八足五行志狗二白周狗公羊曰靈公有周狗謂之獒畜狗敝蓋仲尼畜狗死使子貢埋之曰吾聞敝蓋不棄為埋狗也守禦犬有守禦之勞吠堯史蒯通曰跖之犬吠堯非其主也猰狗傳曰國狗之猰無不噬也又曰國人逐猰狗入華臣氏猰狂狗也左氏嗾獒晉靈公嗾夫獒其右提彌明摶而殺之趙盾曰棄人用犬雖猛何為屠漢樊噲以屠狗為事烹史狡兎死良犬烹迎吠猛犬狺狺而迎吠以喻姦臣叱後漢鮑永君長妻於母前叱狗遂去之又尊客之前不得叱狗䘮家孔子去魯至鄭東郭有人見曰累累若䘮家之狗烏龍古犬名傳書陸機有犬名黄耳傳書歸吴金畜斗精犬者金精狗者斗精所生傷張收宋張收為猘犬所傷醫云宜食蠶鱠食之愈吠深巷文色黑犬白耳大王犬也畜之富貴黑犬前兩足白宜子孫白犬黄頭家大吉宋鵲韓盧四尺為獒髙四尺也百里穆天子犬走百里執虎豹歇驕載獫歇驕重鐶詩盧重鐶又曰盧重令重鋂令狗鐶聲也東郭管子曰管仲將死謂桓公曰有犬嘊嘊旦暮欲噬我猳而不使也君必去之言易牙豎貂必為亂也牽出上蔡李斯指蹤漢祖曰諸公知獵狗乎為人逐獸狗也指蹤示獸者人也蕭何功人也戀主噬人吠楊朱之弟布素衣出黒衣返其犬迎吠之布欲殺犬朱曰若使狗白而出黒而入爾能無怪乎至於犬馬皆能有養不敬何以别乎宜粱周禮犬宜梁效犬者左牽去腎狗赤股躁臊不可食犬則執緤問名獻犬者既受乃問犬名識家漢祖移新豐事具雞門毒晉太子申生歸胙與犬犬斃吠狗傳叔孫居於箕吏請其吠狗不與將歸乃殺之而與食官漢楊得意為狗監五色搜神記盤瓠者本髙辛氏宫中老婦有疾斃桃沼中有物大如璽以瓠盛之以盤覆之有頃化為犬其文五色因名之殺賊髙辛氏犬戎為寇帝患之曰若能得犬戎將軍首者賜金妻以公主犬盤瓠獲㓂首致闕下帝以五采致其負女入南山云云衘衣吴志諸葛恪元遜孫峻謀害恪將出犬衘其衣恪曰不欲我行出乗入坐少頃入衘衣恪令從者逐之升車果被害虎文五行書曰犬虎文南斗君畜之可致萬石與骨禮長者之前無投與犬骨三月生家語七九六十三三主斗斗主狗狗三月而生􅀈犬瑞應周成王時渠被國獻􅀈犬能飛食虎豹犬又匈奴獻豹犬錐口赤身四尺吠形一犬吠形百犬吠聲逐麋之犬不顧兎耶求大也犬種盤瓠負女入南山石室中經二年生子十二人六男六女後自相為夫妻滋名蠻夷有君長今長沙武陵蠻是其種賣嫁女晉吴隠之字處黙將嫁女貧牽狗賣之此外蕭然無辦屍以訴寃齊諧志云竦耳注精張然滯役多年婦遂與奴私通後歸奴與婦謀然狗注精䑛脣視奴然曰烏龍與狗應聲盪奴奴失刀仆然取刀殺奴也衘卵述征記古徐國宫人娠而生卵棄之水濵有犬名倉衘卵而歸咈而成人遂為徐君之嗣白犬魏志晉俗語曰太康七年郊天壇下有一白犬髙三尺光色鮮明恒卧見人則去賦晉傅𤣥走狗賦曰足懸鉤爪口含素牙盜孟嘗君客能為狗盜無使厖也吠詩犬不夜吠無事升仙具雞門犬馬非其土性不畜傳獻獒西旅搏噬曹植表盧狗悲號國知其材乃試之用於搏噬送陸機書取魏明箭飛龍犬武子犬白雀犬青鸇犬戀主懐仁躡遺蹤尋漏迹猛相雄姿孔為國一犬突厥傳思摩遣使謝曰蒙恩立為落長實望世世為國一犬守吠天子北門乳猫李迥秀所居犬乳鄰猫中宗以為孝感曳馬衘燭髙昌子文泰立後五年獻狗髙六尺長數尺能曳馬衘燭云出拂菻中國始有拂菻狗唯知識主史憲誠聞斬李㝏更恭謹謂韋文恪曰我本奚奴狗也唯知識主雖日加箠不忍離其譎獪類此里無吠狗李栖筠為常州刺史里無吠狗五狗武三思嘗與宗楚客兄弟紀處訥崔湜甘元東相驅煽王同皎周憬張仲之等不勝憤謀殺之為冉祖雍宋之愻李悛所白皆坐死因逮染五王而崔湜遣周利貞就殺之時人號祖雍姚紹之等五人為三思五狗野狗五代東女真多野狗犬百餘共一牢食南唐世家江州陳氏宗族七百口畜犬百餘共一牢食一犬不至諸犬為之不食馳犬為樂讓皇帝憲天子或就幸第馳犬為樂犬夜羣號突厥處羅復㑹天雨血三日國中犬夜羣號求之不見遂有疾犬鹿相擾安金藏毋䘮廬之側犬鹿相擾殿中多惡犬五代史伶官敬新磨嘗奏事殿中多惡犬新磨去一犬起逐之新磨倚柱而呼曰陛下毋縱兒女嚙人莊宗家世夷狄夷狄之人諱狗故新磨以此譏之豺之舅酉陽雜俎狗豺之舅豺遇狗輙跪如拜狀胡麻麨好事集以胡麻麨啖犬則光黒而駿獵必大獲狐兎又可十歲晝夜吠鳴武后初酷吏丘神勣家狗生子皆無首當項有孔如口晝夜吠鳴俄失所在五行志生男為狗北狗國人身狗首長毛不衣手搏猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自相婚嫁穴居食生而妻女人食熟嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其毎走十餘里遺一筯狗夫追之見其家物必啣而歸則不能追矣其説如此五代史四夷附録職吠以守禦咸通中㑹稽有狗生而不能吠擊之無聲狗職吠以守禦其不能者象鎮守者不能禦㓂之意烏龍韋善俊携犬號烏龍後化為龍乗之飛昇而去續仙傳盧狗之遇嗾呀呀而走不顧險阻惟嗾者之從柳宗元與楊誨之孝順狗廣異魏元忠嘗呼蒼頭未應犬輙代呼之元忠曰此孝順狗也乃能代我勞後亦無恙庸蜀之南常雨少日出日出則犬吠柳宗元書僕往聞庸蜀之南常雨少日出日出則犬吠予以為過言前六七年僕來幸大雪踰嶺被南越中數州數州之犬皆蒼黄吠噬狂走者累日至無雪乃已然後始信前所聞者舊犬喜我歸低徊入衣裾杜甫草堂犬迎曾宿客重過何氏躍犬疾翥鳥韓愈詩獻兩首犬神功元年安國獻兩首犬首多者上不一也唐五行志蛇三白腹行荐食傳曰吴為封豕長蛇荐食上國斬漢祖夜行至大澤中前大白蛇當路髙祖拔劒斬之後人見嫗哭曰吾子白帝子今為赤帝子殺之妖鬭傳内蛇與外蛇鬭於鄭南門之中内蛇死六年而鄭厲公入殺鄭子申繻曰妖由人興人無釁焉妖不自作人棄常則妖興也云云螫手漢書齊王曰蝮螫手則斬手螫足則斷足陣孫子善用兵者言陣如常山蛇擊其首則尾至擊其中則首尾俱至擊逢丑父擊蛇以肱而傷為晉獲衘珠隋侯見傷虵以藥治之後衘明月珠以報之吞象山海經巴虵吞象三歳而出其骨遶崑崙𤣥中記云崑崙山周三萬里巨虵遶之三周長九萬里笥風俗通馮緄發綬笥有二赤蛇分南北走卜云此吉祥君當為邉將以東為名後果為大將軍遼東太守入棺陳留風俗傳沛公野戰䘮皇妣天下既定為新棺招魂於是有丹虵在水自洗濯入新棺故諡曰昭靈夫人人産搜神記竇武母産武并虵送之山林後母卒而虵來以頭叩棺涕泣頃方去人以為竇氏之祥化龍史見龍門鳴風夫螣蛇雄鳴上風而化成形精之至畫足戰國䇿陳軫曰虵本無足為蛇畫足云云夢吉夢維何維虺維蛇女子之祥殺孫叔敖為兒時見兩頭虵見者則死吾畏後人見則殺之母曰子有隂徳天必報之也存身龍虵之蟄以存身者也靈蛇之珠深山大澤實生龍蛇傳出泉宫傳有蛇自泉宫出入于國如先君之數秋聲姜薨遂毁泉䑓九首文雖有雄蛇九首請抗而蹋之黒蜧躍重泉自糾騰蛇蜿而自糾文壇羅虺蜮蕪城賦屠巴蛇田蛇水人弄素靈哭夜歎云云鬭漢孝武帝太康三年七月趙有蛇從郭外入與邑蛇羣鬭孝文帝廟夢蛇生四足魏劉楨為夫四公子傳西海邉無慮北有汝國以蛇為夫不嚙人為女臣僕宫室習俗無契而從呪咀可信平者無他曲者立死神道設教人莫能化髯蛇齊虞愿為晉安太守郡舊出髯蛇膽可為藥有餉愿者愿不忍殺放三十里外經宿復來故處愿使送他處又復歸論者以為仁心所致也射宋武帝微時伐荻新洲射大蛇長數丈傷明日復往聞杵臼聲覘見數青衣童子擣藥問故荅曰我王為劉寄奴所射今合藥傅之帝曰王何神不致荅帝叱之皆散收得藥時人因此草名劉寄奴也孔大蛇屢見虞世南貞觀八年進封縣公㑹大蛇屢見帝憂之以問世南對曰漢靈帝時青蛇見御座晉恵帝時大蛇長三百步見齊地經市入廟蛇宜在草野而入市此所以為怪爾今蛇見山澤適其所居恐有寃獄枉繫宜省録纍囚褥蛇西域波斯貞觀十二年使者没以半朝貢又獻活褥虵狀類䑕色正青能捕穴䑕青蛇楊朝晟師次方渠水乏有青蛇降險下走視其跡水從而流夜有蛇環其所成汭更姓名為郭禹結千人奔入峽夜有蛇環其所祝曰有所負者死生唯命既而蛇亡禹乃襲歸州劉漢宏見木門金色董昌先是州寢有虺長百尺餘金色見思道亭昌署亭曰黄龍殿以自神長百尺天寳中洛陽有巨蛇髙丈餘長百尺出芒山下胡僧無畏見之曰此欲決水瀦洛城即以天竺法呪之數日蛇死夢五代范延光為天雄軍節度使延光嘗夢大蛇自臍入其腹半入而掣去之以問門下術士張生張生賛曰蛇龍類也龍入腹中王者之兆也由是頗畜異志見碑樓五代王處直初有黄蛇見于碑樓處直以為龍藏而祠之處直以為己徳所致而定人皆知其不祥曰蛇穴山澤而處人室小人竊位而在上者失其所居之象也已而處直果被廢死石蛇郭誼兄岌事劉悟為牙將常樂滏山秀峻曰我死必葬此誼以岌假刺史穿三十丈得石蛇并卵工破之皆流血黄色蛇杜陽編開成初宫中有黄色蛇夜自寳庫中出遊於階庭間光彩照灼宫人以珊瑚玦擲之遂并玦亡去遍捜庫中乃得黄金蛇珊瑚玦無其首上熟視之曰隋煬帝為晉王時以黄金蛇贈陳夫人乃此蛇䑕四白晝伏夜動臧武仲謂齊公曰抑君似䑕晝伏夜動不穴於寢廟畏人故也盜肉張湯事具獄吏門相䑕有齒有皮有體詩誰謂䑕無牙何以穿我墉同上畏人詩碩䑕刺貪也刺其君蠶食於民貪而畏人若大䑕也忌器投䑕忌器恐傷器也鼹䑕飲水於河不過滿腹食角鼷鼠食郊牛角穴社社䑕者不可灌君之左右出則異入則比周此之謂也燻灌見上廁中史李斯為卿吏見廁中䑕食不絜遇人大數驚之見倉中䑕居大廡下無人之驚乃歎曰人處身亦如䑕耳充糧臧洪為太祖所囚糧乏乃掘野䑕而食又蘇武在北海牧羊掘野䑕草實而食易膓唐房升仙雞犬并去唯䑕惡其不净不將去䑕自悔一月三易腸故號之穴蟲䑕也艮為䑕易猫食大蜡迎猫為食田鼠也犬捕使犬捕䑕狸狌驊騮騏驥使之捕鼠不如狸狌白䑕晉恵帝元康元年五月有白䑕見于東宫又齊武帝白䑕見芳林園中又抱朴鼠壽三百歲滿則色白善憑人卜名曰仲能能知一年之事吉凶也養㑹稽山中有人姓蔡隠山中養䑕千頭呼之即來遣之即去時人謂之稻仙也蟹捕淮南子使蟹捕䑕必不得千鈞之弩不及鼷䑕發機嚙鞌魏志太祖馬鞍為䑕嚙庫吏懼死澄王沖曰汝待三日當報沖以刀穿衣如䑕嚙遂失意皃有憂色太祖曰妄言耳俄而庫中以報嚙鞍太祖曰衣在側猶被嚙况鞍懸於柱乎乃免鼷郭璞曰狀如小狐食煙火飲泉南越志齕䑕似常䑕而穴居飲泉嚙竹尾白毛蒼洞林曰宣城郡有隠䑕大如牛似䑕身赤胷尾白異物志鼠母頭脚似鼠毛蒼中鋭大如牛而畏狗水田有水災即母鼠起也有皮無肉捜神記晉太康中㑹稽縣蟛蜞及羊皆化為䑕大食稻及災始成者有毛亦無肉食鳥郊牛爾雅鼷䑕郭璞注江東呼鼠而大食鳥在樹分木上也魏文與王朗書鼷鼠至㣲猶食郊牛也䑕地中行也伯勞之所化也飛䑕山海經丹重之山有獸其狀如䑕兎首鹿耳其音如獋犬以其尾飛名曰飛䑕郭璞飛䑕賛曰或以尾翔或以髯凌飛鳴鼓翰倐然背騰用無所為唯神所憑辟毒魏略曰大秦國出辟毒䑕如狗異苑曰西域有䑕之國大者如狗中者如兎小者如常䑕頭悉白商賈有經過其國不祈祀則嚙人衣裳化郭氏𤣥中記百嵗䑕化為蝙蝠鳥同穴太康地記鳥鼠山西隴西首陽鼠尾短如常穴入三四尺鼠在内鳥在外賦後魏盧元明劇鼠賦耳若槐葉初生尾如酒杯餘滴卭卭終朝轟轟竟夕領其羣黨悠悠奕奕衘炷釋法顯仙遊本記曰祗垣精舍燒香然燈續明日夜不絶䑕衘炷燒幡盖精舍都盡益肉捧朱異苑曰景平中東陽大水永康蔡喜夫避水住南龔夜有䑕浮水來狀望喜夫奴牀角愍而不犯毎以食與之退喜夫返居䑕前脚捧帋裹三片許朱著奴前啾啾如欲語也孔白䑕入營王孝傑為清邊道總管初進軍平州白䑕晝入營頓伏皆謂䑕精胡象也白質歸命天亡之兆及戰乃孝傑覆焉渡河崔義元河内賦黄君漢為密守拍崔義元見羣䑕渡河曰此王敦亡兆也因説君漢以城歸袁客師見射覆門獻北狄黒水靺鞨開元天寳間入來獻鯨晴貂䑕白兎褥特䑕􅄢賔隋漕國也武徳十六年獻褥特鼠喙尖尾赤能食蛇螫者嗅且尿瘡即愈沙磧䑕于闐西有沙磧䑕大如蝟色類金出入羣鼠為從食張巡士多餓死至掘鼠以食衘尾渡洛李宻將敗屯營羣鼠相衘尾渡洛經月不絶失窟䑕朝野僉載云唐蘇徴任汜水縣令舉止輕薄郎中張元一目為失窟鼠竊囓鬭暴柳宗元永某氏之鼠晝纍纍與人兼行夜則竊囓鬭暴其聲萬狀不可以寢隂類惡物同上䑕入牛角勢當漸小南唐劉玢初名洪度龑子龑病卧寢中召右僕射三翻與語呼洪度小字曰壽雋雖長然皆不足任吾事惟洪冒類我吾欲立之奈何吾子孫不肖後世如鼠入牛角勢當漸小爾因泣下欷歔走穴黄巢進取陜虢檄闗戍曰吾道淮南逐髙駢如䑕走穴爾無拒我猫䑕同乳崔祐甫傳朱泚軍中猫䑕同乳祐甫曰可弔不可賀廟垣之䑕魏元忠袁楚客以書規之曰閹竪君側之人衆所畏懼所謂廟垣之䑕也食稼吐蕃逹磨國中䑕食稼使武后為䑕髙宗后王氏及良娣俄為武后所殺良娣罵曰我後為猫使武后為䑕吾當㧖其喉以報后聞詔六宫毋畜猫鼷䑕北方冰下䑕也其尾毛所在處能聚集天下䑕雜俎擁杖而號路敬潜為遂安令到官䑕數十走于前左右驅之擁杖而號隠伏象盜竊龍朔元年十一月洛州猫䑕同處䑕隠伏象盜竊猫職捕囓而反與䑕同象同盜者廢職容姦五行志䑕循魚潜䑕循無入仕路杜牧書䑕燒尾𤨏言竇璠久不第晚娶宇文翊女遂登科時杜尚澤遺火云因䑕尾戔火而作韋説因謂璠曰魚將化龍雷為燒尾近日䑕亦有燒尾者璠大慙野䑕拱亂穴杜甫北征焚符斷䑕僖宗末廣陵丏者杜可均嘗大雪訪街西酒家姓樂者求飲見主事者白人以衣換酒收藏不謹䑕囓其衣杜即令治浄室曰頃年記一符能却䑕試書之既有驗可盡此室永無䑕矣生得符焚之䑕遂絶唐桂苑叢談化為蒼犬李林甫將病一日取書囊訝其重開而視之乃一大䑕躍出化為蒼犬怒目張牙仰視林甫乃以物擊之應手而斃林甫惡之月餘而卒鼨䑕盧若虚為職方有獲異䑕者豹首虎臆大如拳或謂之􅂒䑕而賦之若虚曰非也此許謹所謂鼨䑕西閣舍人李知微宿文昌宫月微明見古槐下有小䑕數人或稱殿前録事或曰馳道都尉或曰司城主簿西閣舍人須􅁷入一大穴中明日鍤視之乃䑕也出唐小説蒼䑕竄古瓦杜詩禮䑕禮䑕拱而立韓愈聮句永某氏䑕柳宗元文永某氏䑕言永有某氏拘忌以已生嵗直子䑕子神也因愛䑕不畜猫犬禁僮勿擊由是䑕相告皆來某氏飽食而無禍某氏室無完器椸無完衣飲食大率䑕餘也數嵗某氏徙居他州後人來居䑕為態如故假五六猫闔門撤瓦灌穴捕之殺䑕如丘嗚呼彼以飽食無禍為可常也哉横庭䑕逕空土澁李賀雜叙縮縮循墻䑕杜牧李甘詩䑕不穴寢廟循墻而走柳文説鶻孤雛腐䑕吴武陵元濟叛武陵遺以書曰孤雛腐䑕求責不暇天䑕吐蕃天䑕之皮可為裘䑕無故皆夜去邑有兵五行志有大䑕見于庭顯慶三年長孫無忌第有大䑕見於庭月餘出入無常後忽然死大䑕長二尺餘𢎞道初梁州倉有大䑕長二尺餘為猫所囓數百䑕反囓猫少選聚萬餘䑕州遣人捕擊殺之餘皆去同上蛇䑕鬭景雲中有蛇䑕鬭于右威衛營東街槐樹蛇為䑕所傷鬭者兵象同上去穴登木咸通十二年正月汾州孝義縣民家䑕多衘蒿芻巢樹上䑕穴居去穴登木賤人將貴之象同上穴屋壊衣乾符三年秋河東諸州多䑕穴屋壊衣三月止䑕盜也天戒若曰將有盜矣同上中有人乗馬鎧甲鮮明大盈尺手執長槊徑寸刺魚頭馳入穴中如是數次即掘地求土見數大䑕魚頭在旁唯有筯一隻不見甲馬之狀未幾其人卒稽神録騶虞五白鵲巢之所應詩騶虞之化行則人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成矣吁嗟乎騶虞右射禮武王克殷後散軍左射貍首右射騶虞貫革之射息也義獸瑞應義獸也白虎黒文不食生物有至信之徳應之一名騶虞仁獸白虎漢宣帝時東立宗廟告祠仁獸衘肉致于殿前神雀元年詔曰南郡獲白虎朕之不明震于珍物又元命包女華之妃曰扶始升邱見白虎其上赤雲感以生咎繇又王業字子春為荆州刺史卒於枝江住䘮亭有白虎來震側出入人間及䘮發又踰境吏民為立廟號白虎吏又吴王闔閭葬於吴縣三月有白虎居上號虎邱又太公六韜文王拘羑里散宜生林氏得白虎以獻紂免西伯難又選今南郡獲白虎偃武脩文之應獲之者張武白虎張而猛服也是以北狄賔今邉不恤㓂甲士寢而旌旗仆虎從宋元嘉二十六年琅邪有虎從騶虞云云素質女騶虞丞獻素質仁形彰瑞之休顯也樂囿逺牧之來廷卞騶虞之獸我之囿漢武帝時也白質黒章其儀可嘉皎皎穆穆君子之態盖聞其聲今視其來厥塗靡從天瑞之徴兹舜氏興也嘯蜀志谷煙發而騶虞嘯如虎山海經騶虞如虎五色其間尾長如身出孟山亦出鳥䑕同穴山亦林氏之國日行千里林氏文圍林氏之騶虞林氏山名應召伯行化陜西有騶虞應也孔仁瑞之獸白居易騶虞盡賛序騶虞者仁瑞之獸外猛而威内仁而信同上仁心毛質賛曰孟山有獸仁心毛質不踐生芻不食生物白質黒章猊首虎軀同上騶虞見前蜀王建武成元年七月騶虞見騶虞不虗來李白二鹿隨永平三年五月騶虞見壁山有二鹿隨之出於近世之説五代史騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以謂騶者文王之囿虞者虞官也然則以之為獸者其出於近世之説乎騶虞不折生草莖李白梁甫吟有道則見非時不出白居易騶虞賛道逢騶虞牛哀不平李賀猛虎行騶虞馴擾李華徑山大師碑於是騶虞馴擾表仁之至也獬廌六白神竒説文獬廌神竒之獸一名任法狀如牛古者決訟令之以觸不直黄帝時有遺者帝問何食飲曰食薦春夏處水澤秋冬處松栢性忠神異經獬廌性忠而邪則觸之困則未止故立獄皆東北依所在也東北荒之獸也毛為帳田求子堯時有獬廌緝其毛為帝帳一角論衡獬廌一角羊也青色四足或曰似熊能知曲直性識有罪獄者令羊觸之臯陶敬羊跪坐事也神羊輿服志獬廌神羊也孔不學侯思止髙元禮密教曰上不次用人如問君不識字宜對獬廌不學而能觸邪陛下用人安事識字無何后問思止以對后大悦黒豸百官志殿中侍御史元日冬至朝㑹則乗馬具服戴黒豸升殿性觸牛僧孺象化解獬豸之性觸而瑰飾獬豸冠足以象觸邪富平神羊𤣥宗時富平縣産一神羊肉角當項白毛上捧議者以為獬豸出酉陽雜俎猰㺄七白虎爪猰㺄類􅓔虎爪食人迅走鷙獸人之所畏我獨怕兮勇者不懼孔亡精而墜巔猰㺄亡精而墜巔李白賦若猰㺄之能冠兮皮日休九諷慨天道之不明兮何獨生此大佞若猰㺄之能冠兮當一國而持柄磨牙競肉李白梁甫吟猰㺄磨牙競肉類人皮日休鹿門書夫梟羊猰㺄尚猶類人況聖賢也哉擇肉馳道陸贄收河南請罷兵議猰㺄擇肉於馳道猰狗于公異破朱泚露布猰狗吠豢牢之主爭人張説起義堂頌序猰狗爭人猰㺄當前路元稹代曲江老人公時呵猰㺄杜甫狄明府詩狻猊猰㺄吐饞涎李賀公無出門蒲牢八白畏鯨李善注文選海畔有獸名蒲牢畏鯨毎食于海畔鯨躍之蒲牢則鳴聲如鐘今人多作蒲牢之形於鐘上斲橦為鯨形擊鐘天子出則擊之孔鳴聲如鐘李善注文選蒲牢畏鯨毎食于海畔鯨躍之蒲牢則鳴聲如鐘今人多作蒲牢之形於鐘鑄蒲牢於鐘上李善注文選海内有鯨魚海畔有蒲牢戰鯨魚毎擊此獸輙大叫故為鐘者鑄蒲牢於鐘上叩擊偽蜀時梓州佛寺鐘樓直傾欹欲摧忽有一人入寺謂僧曰只銷錢一千即整一僧以為戯言其人堅令捨錢僧纔移步入院鍾樓已立人即不見蒲牢至今叩擊樵牧濶談發聲脞説王仁裕晉都洛下丙申年春翰林學士王仁裕夜直閣禁中蒲牢毎發聲如扣頂腦之間其鐘忽撞作索索之聲有破裂如是者旬餘與同職黙議罔知其何朕焉其年仲春晉帝果幸於梁汴石渠金馬移在雪宫迄今十三年矣索索之兆信而徴焉貘九白十頭白獏似熊十頭髀黒脚白能食蛇銅鐡及竹骨節節彊直中實少髓皮辟温也孔賜貘皮薛萬均卒後嘗賜羣臣貘皮及萬徹而誤呼萬均愴然曰萬均朕勲舊怱口其名豈死者有知冀此賜乎因命取焚之寢其皮辟温圖其形辟邪白居易貘屏賛序曰貘者象鼻犀目牛尾虎足生南方山谷中寢其皮辟温圖其形辟邪賛邈哉竒獸生于南國其名曰貘非鐡不食白豹郭知𤣥韻食鐡獸似熊黄黒色一曰白豹貀十白無前足爾雅貀無前足晉太康十年邵陵秋夷檻得一獸似貀豹文無兩脚即此類也孔似貍郭知𤣥唐韻云豽獸名似貍蒼黒色無前足善捕䑕説文作貀獵豽傷面李林甫數危太子帝曰慶王往年獵豽傷面甚荅曰破靣不愈於破國乎帝頗惑獻豽于闐開元時獻豽跳鋒狀驚豽韓文征蜀聮句孟郊服貴貂豽唐回鶻傳黠戛斯國服貴貂豽髴髴十一白如人笑文笑而被格吴都賦又山海經其狀如人面長黑身有尾踵見人則笑笑則上脣掩目交及南康郡山中有大者丈餘俗呼山都也孔凌人吴筠猿賦詎若狒狒凌人以就戮髪可為髲雜俎狒狒飲其血可以見鬼力負千斤笑輙上吻掩額狀如獼猴作人言如鳥聲能知生死血可染緋髪可為髲舊説反踵獵者言無膝睡常倚物穿筒格元稹詩髴髴穿筒格注南人俗法嘗用竹筒穿臂以受之狒狒執臂輒笑笑則脣蔽兩目人因自筒中出手以劒釘之於樹夔十二白一足跉踔而行山有夔如鼔一足翹跬文夔翹跬於夕陽孔踸踔劉禹錫何卜賦夔何罰而踸踔靈夔吼唐紹韋庶人請妃以上葬給鼓吹詔可紹曰鼓吹本軍容黄帝戰涿鹿以為警衛故曲有靈夔吼山夔柳文塊守窮荒山夔與居有眉不伸有志不舒六駁十三白如馬詩隰有如馬形如馬鋸牙食虎豹孔食虎豹郭知𤣥韻云云駮獸名似馬鋸牙食虎豹木乗杜甫朝饗太廟賦吟翠駮而木乗食猛武送張秀才從軍六駁食猛武耻從駕馬羣一朝長鳴去矯若龍行雲李白中曲之山有獸焉其狀如馬音如鼓音其名曰駮食虎豹可以禦兵飛駁李白賦别有白􅀈飛駮窮竒貙􅀈牙若錯劒鬛如叢竿口吞殳鋋目極槍櫓兕十四白殪此大兕詩率彼曠野既張我弓周宣時虎兕出於柙檻也投角老善攝生者兕無所投角陸行不遇兕虎老子不避莊陸行不避兕虎獵夫之勇觸魯縞文若奔兕之觸魯縞未足以喻其易觸蹷狂兕觸蹷西都孔呀偃蹇而矍鑠盧肇海潮賦驅貙虎與兕象呀偃蹇而矍鑠忽劃礫而齹􅀈齹此何反􅀈意宜反齒露不齊狀犇兕李白大獵賦曰施犇兕以却走水兕五代占城水兕青兕杜甫詩幕前生致九青兕雲霧埋山蒼兕吼同上山寒青兕叫同上松風澗水聲合時青兕黄熊啼向我注兕如野牛青皮堅厚可以為鎧嶓冢之山其數多杜詩憶昔行白兕上瑞唐六典禮部東南有狂兕獵者西北矢利塵白㝠㝠獨此清夜止陸龜蒙雜諷披林逐虎兕遇其患是人不為天幸也非天也皮日休鹿門隠書窮山人盡行也不幸者有遇虎兕之暴同上魚十五網食釣烹附饋獻白水物水族鱗蟲在藻依蒲戲蓮古詩水煩則魚鼈不大禮南有詩南有嘉魚蒸然罩罩潜淵魚潜在淵或在于渚登龍三秦記江海集龍門下登者化龍不登者㸃額暴腮在沼魚在于沼亦匪克樂濠梁之樂莊子與恵子觀魚濠梁上冰立春之日魚上冰車轍之窮莊子見車轍中鮒鮒曰豈無升斗之水而活我乎莊子曰待我當決西江之水而逝汝鮒曰如君言不如早索我於枯魚之肆涵泳游行噞喁文子水濁則魚噞喁聽琴瓠巴鼓琴鱏魚出聽紫鱗頳皂赤鱗錦鱗感孝王祥至孝後母冬月思生魚祥遂泣于冰上氷忽開有雙鯉躍出魚不可脫於泉竭澤求魚非不得魚恐後無魚也吞舟之魚掉尾水濁則無掉尾之魚螻蟻制之莊子曰吞舟之魚失水則螻蟻而能制之江湖莊子曰水涸魚相與處於陸相煦以濕相濡以沫不如相忘於江湖報恩昆明之池去鉤魚後衘明月珠報漢武帝書帛陳勝以丹帛書勝王字置魚腹中令賣之買者烹之得書奮鬛鼓鬛失水吞舟之魚蕩而失水鱣鮪發發鱨鯋魴鱣魚鼈咸若避盜後漢陳嚻少時捕魚有盜者嚻於草中以魚遺之盜慙不受魚征周禮􅈄人凡魚征入于府注魚之租稅入王府不淰龍以為畜魚鮪不淰鮮食庶艱食鮮食匪鱣匪鮪莘尾頒首有莘其尾有頒其首依于蒲腹疾傳曰河魚腹疾奈何就食史記河魚大上輕車重馬來就食盜具盜賊門海魚不出蕭望之曰昔武帝作魚征海魚不出江魚寧葬江魚之腹賣取常價任嘏家貧賣魚㑹官發魚魚倍嘏取其直如常也字誤古語曰事歴終古以魚為魯網麗罶詩曰魚麗于罶鱨鯋臨河之羨淮南子曰臨河羨魚不如退而結網網漏鱨鯢無餌文子釣魚不可以無餌守坻釣魚不得由守坻不堅忘筌莊子曰筌者所以在魚得魚而忘筌絲緡其釣維何維絲伊緡施罛濊濊九罭美周公九罭之魚鱒魴魚網作為網罟以畋以漁蓋取諸離易鴻離魚網之設鴻則離之魚不畏網而畏鵜網無情故也莊子網罟不入水獺未祭魚云云釣籊籊竹竿以釣于淇詩子釣而不綱謂不絶水渭濵吕望釣於渭濵獲玉璜銘桂餌閭子曰魯人有好鉤者以桂為餌黄金為鉤垂翡翠之綸任公之術莊子曰任公為大鉤十五犗為餌蹲於㑹稽投餌於東海朞年不得魚一旦有大魚牽巨鉤任公子得其魚而腊之自制河以東莫不厭若魚者詹何之能列子詹何楚人也以獨繭絲為綸芒針為鉤剖粒為餌於百仞之泉引盈車之魚芳餌隂符曰芳餌之下必有懸魚濮水莊子口釣魚於濮水吞鈎歸田賦曰貪餌而吞鈎五年詹何學釣五年然盡其道為綸史記曰游者可為綸之子于釣詩繼子陵之跡嚴光子陵漢光武時釣於富春富春有嚴陵釣䑓釣鼇於海釣道楊晝以釣道宓子曰迎釣而吞者陽橋也其為魚薄而無味宓子至單父冠葢迎者交於道宓子曰此楊晝所謂陽橋者遂聘賢人而訪政事單父大治觀漁傳曰公矢魚于棠又曰公將如棠觀漁者遂往陳魚而觀之非禮也網罟盈尺􅘋人周禮􅘋人掌以時魚為梁注梁水以取漁禁澤之沈者具禁令門始漁季冬命有司始漁天子往嘗漁獺祭之期獺祭魚然後虞人入澤梁中殺禮曰魚鼈不中殺不鬻於市鯤鮞之禁禁取鯤鮞鯤鮞小魚名敝笱在梁其魚魴鰥時籍鼈人掌取𤣥物以時籍魚鼈籍謂以杖刺泥中博取之君子田則不漁登來百金公羊曰公如棠觀漁譏百金之魚公張之注云張網羅也登來美大得也注耻公去南靣逺與人争利便逺觀之魚孕國語魯宣公夏濫于泗泉注濫漬取魚器里革斷其罟而弃之曰夫魚禁鯤鮞獸長麑麌今魚方孕而行罟網貪無藝也公曰吾過而里革匡我不亦善乎漁父魚舟魚亂於水莊子曰笱多則魚亂於水舜漁於雷澤晝戰夜捕陶侃將吴寄救荆州曰晝戰當擊賊夜分捕魚也灌瀆莊子曰夫揭竿累趣灌瀆守鯢鮒於得大魚難乎注累釣繩灌瀆謂小瀆也取既有時殺宜中禮俾遂生成勿令暴殄饋獻獻之不受韓子公儀休相魯而嗜魚邦人獻之曰吾以為相自可致魚以受魚退人誰遺我魚饋之則懸羊續事名子孔子生子三日有饋魚者因名子曰鯉字伯魚也遺我雙鯉魚客從逺方來遺我雙鯉魚古詩獻孔子孔子之楚有漁父獻魚不受父曰市逺無所貨欲弃之溝不如獻君子孔子乃受之以命弟子掃地而祭也賜絃章齊景公賜絃章魚十五乗春獻王鮪水潦降不獻魚鼈居山者不以魚鼈為禮烹食薦鮪二月天子始乗舟薦鮪于寢廟食稻與魚孟秋天子云云河魴詩豈其食魚必河之魴必河之鯉溉釡誰能烹魚溉之釡鬵治大國若烹小鮮呼兒烹鯉魚古詩彈鋏馮驩彈鋏歸去來食無魚孟嘗君與魚在鼎文在鼎之魚期於焦爛遊釡後漢張嬰詣張綱降曰某等若魚遊釡中秋獻龜名鱻薧上鮮魚下乾魚宜苽魚宜苽川奠魚蜃之物以充饋食商祭脡祭祭廟薧魚曰商祭鮮魚曰脡祭去乙骨如乙字不可食進尾羞濡魚者進尾寘劒吴公子光饗王僚専諸寘劒於魚中以進之遂抽劒刺王僚世家包有魚不利賔象曰義不及賔也擅人之物以為己恵故不及賔也嗜文王既任公望傅太子發發嗜鮑魚太公不令進曰鮑魚不登俎豈有非禮之物可以養太子哉魚飱公羊趙盾食魚飱尺澤之鯢豈量江海獻人有獻子産生魚者令校人育之於池校人烹之以告曰既釋之矣始則圉圉焉終乃洋洋焉而逝子産曰得其所哉校人笑曰孰謂子産智也孔為魚薛仁貴貶象州㑹赦還帝思其功召見曰疇歲萬年宫微卿我且為魚魚鄭鄭注本姓魚冒為鄭故當時號魚鄭及用事人更謂曰水族闌魚周利貞武后時調錢塘尉時禁捕魚刺食飯蔬利貞忽饋佳魚刺史不受利貞曰此闌魚公何疑問其故荅曰適見漁者禽不獲而有魚焉闌得之涸魚得水其脫必遽契苾何力或讒之帝曰何力入延陀如涸魚得水其脱必遽墜市元和十四年二月晝有魚長尺餘墜於鄆州市良久乃死魚失水而墜于市敗滅象也自海入淮開成二年三月壬申有大魚長六丈自海入淮至濠州招義民殺之近魚孽也雨魚光啟二年揚州雨魚魚得水而游元徽之論教本書惡溪鱷魚韓愈初至潮問民疾苦皆曰惡溪有鱷魚食民畜産且盡民以是窮數日愈自往視之令其屬秦濟以一羊一豚投溪水而祝之祝之夕暴風震電起谿中數日水盡涸西徙六十里自是潮無鱷魚患鯄魚地里志利州土貢鯄魚吞舟之魚賈至議貢舉疏曰夫以蝸蚓之餌雜垂滄海而望吞舟之魚至不亦難乎所以食垂餌者皆小魚獺衘魚張士岩父病藥須鯉魚冬月冰合有獺銜魚魚當乳酉陽雜俎太宗嘗觀魚于西宫見魚躍焉問其故漁者曰此當乳也於是中網而止赤鯶公國朝律取得鯉魚即宜放仍不得號赤鯶公賣者杖酉陽雜俎丙穴魚食乳水食之甚温同上魚駭契苾何力討吐谷渾欲襲之薛萬均懲前敗以為不可何力曰不乗其不虞正恐鳥驚魚駭後無以窺其巢穴鱖魚肥張志和號𤣥真子嘗歌漁父詞云西塞山邉白鳥飛桃花流水鱖魚肥續仙傳龜十六祥瑞感應附白靈龜寳龜見爾雅介蟲之長水族之靈居蔡臧文仲居蔡何如其知也注蔡國君之守龜龜出蔡地因名之遊蓮史太史公曰余聞江老曰龜千年乃逰於蓮葉之上伏蓍淮南子曰上蔡叢蓍龜伏其下曵尾楚王聘莊子莊子曰吾聞楚有神龜死三歲矣王巾笥而藏之於廟堂之中此龜寧其死留骨而貴乎寧其生而曳尾於泥塗中乎使者曰生而曳尾莊子曰吾將曵尾矣支牀史南老人以龜支牀猶活以其能行氣導引九江納錫大龜祀骨文選龜祀骨於宗祧寧反身於渌水巢蓮見上秋獻見上登龜九月登龜取黿𤣥物見上介物周禮十朋之龜十多也昭兆靈龜名成之昭兆也僂句不予欺也僂句寳龜名決疑之物舍爾靈龜喻已之明徳也天生神物謂蓍龜也昆命于元龜寧王遺我大寳龜爰契我龜先知龜為前列先知天龜曰靈屬地龜曰澤屬上春釁龜封父封父之龜天子之器國名也青純公羊龜青純純縁也謂甲髯千歲龜青髯明吉凶也畜史記江旁有人家常畜龜為能導引致氣有益於衰氣也從長筮短龜長不如從長既厭我龜既厭不我告猷僭漢貨殖𫝊曰元龜為蔡非四民所得有知石祁子曰不沐浴佩玉而得吉兆以龜為有知也不藏家不寳龜不藏圭祥瑞四靈麟鳯龜龍謂之四靈王者之嘉瑞為畜龜以為畜故人情不失負圖王者徳至川泉則𤣥龜負圖也九疇書曰天乃錫禹洪範九疇注天與禹出書神龜負文而出列於背有數至九五色抱朴子曰千歲之龜五色見靈感入夢刳膓莊子曰宋元君夢人被髪曰予為清江使者河伯被漁者預且得予元君使人占之曰此神龜也乃召預且預且釣得白龜五尺使獻之乃刳之以七十二鑚而無遺䇿仲尼曰龜能夢於元君不能避預且之網智能七十鑚無遺策不能避刳膓之患如是則知有所困能有所不及也元緒焚桑元緒龜名千年桑乃可烹之事見異苑三顧㑹稽傳孔愉見人籠龜乃買而放之中流龜乃反顧愉及封侯鑄印龜乃迴首而三有似所放之龜愉乃悟而佩之報徳搜神記毛寳見漁人釣得白龜贖放之江中寳後將戰敗投江如躡著物漸浮至岸視之乃所放龜衘珠赤龜衘夜光之珠以報燕相之恵財歸史記曰天下得名龜者財歸之富至千萬一曰北斗二曰南辰三曰七星四曰八風五曰二十八宿六曰日七曰月八曰九州九曰王龜有文腹下必滿尺二寸人若得七八寸者可寳之每歲納入山不惑史記神龜出江水中廬江都嵗特生龜尺二寸二十枚輸太官太官以吉日刳取甲千歲乃二寸取前足臑骨穿佩之取龜置堂西子隔懸之入深山大澤不惑也無虎狼毒萬畢傳曰在江南嘉林中無虎狼鴟梟草木無毒螫火不及龜常在齋戒以待如人來因醮以酒得名龜置之家富因夢送我水中殺之身死家亦不利藏則不靈太史公曰夏殷欲卜乃取蓍龜已則棄之以為龜藏則不神蓍久則不靈至周周官常寳藏蓍龜也孔五緫龜殷踐猷賀知章嘗號為五緫龜謂龜千年五聚問無不知也六眼龜五行志大足初虔州獲龜六眼一夕而失元魭生靈龜靈龜生庶龜酉陽雜俎文龜地理志溱州出文龜以無逸為元龜崔植曰𤣥宗在天后時踐憂患既得位得姚崇宋璟此二人早夜孜孜納君於道璟嘗手寫尚書無逸為圖以獻今願陛下以無逸為元龜則天下幸甚介蟲之智王嶽靈責龜文介蟲之智者龜也龜惟神文粹潜伏奫灣違禍罾罟同上投龜于地張公瑾投龜于地曰凡卜以定猶豫決嫌疑今事無疑何卜之為𤣥夫韓愈詩乃呼大靈龜騎雲欵天門云云東野夜得夢有夫𤣥衣巾闖然入其戸三稱天之言再拜謝𤣥夫收悲以歡忻洞𤣥先生張瀆宣室志張鋋見巴西侯飲酒命樂久之有告者曰洞𤣥先生在門言訖有一人被黑衣頸長而身甚廣揖之與坐曰席上人將有圖君巴西怒曰歡宴方洽何遽有怪命殺之天將曉鋋悸悟見身卧石龕中一龜形甚巨於龕前乃向所殺洞𤣥先生也毛生異聞集王度古鏡記王績先遊嵩少日暮遇一散嵓有一石堂月夜二更後有一人靣濶鬚長黑而矮稱毛生與績談論築城依龜行張儀築城都依龜行路築之李徳裕鎮西川龜殻猶在後為髙崇文截作腰帶胯聖龜不可殺雜俎福州貞元末有人賣一籠龜其數十三徐仲以五鐶獲之村人云此聖龜不可殺徐置庭中一龜藉四龜而行八龜為導悉大六寸一夕而失白龜化石武徳末文皇欲平内難苑池内得白龜化為石故登極後降制曰皇天眷祐錫以寳龜出南部新書南溪白龜鳴窟中天欲雨有東南風南溪白龜鳴窟中張籍詩搘床龜燕文貞公女嫁盧氏嘗為舅盧公求官候公下朝問焉公但招搘床龜視之女拜而歸室告其夫曰舅得詹事矣朝野僉載龜寳劉崇逺金華子徐太尉彦若赴廣南渡小海於棧中得一琉璃瓶中有一龜及寸旋轉不停而瓶口極細不知何自而入置之舟中夜半覺舟偏重視之則羣龜層疊遶其瓶子懼而棄之後問舶主曰此乃龜寳也靈龜山淳于芬夢大獵于國西靈龜山山峯峻秀川澤廣逺師徒大獵竟夕而還及悟尋穴究源一穴中有一腐龜殻積雨浸潤小草叢生即所獵靈龜山也出李公佐南柯太守傳金色龜明皇嘗有方士獻一小龜徑寸而金色可愛云神明而不食置之枕笥中辟巨蛇之毒録異記龜開萍葉過杜詩龜𤣥物也汙泥川澤不勝數其死而貴於卜官者用適有宜爾而戴氏禮以其在宮沼為王者難致之瑞戴禮雜出於諸家其失亦以多矣五代史監前成敗褚遂良帝曰朕行有三一監前代成敗以為元龜穹龜韓愈南海廟碑穹龜長魚踴躍後先寧晉三龜建中二年夏趙州寧晉縣沙河北有棠樹甚茂民祠之為神有蛇數百千自東西來趨北岸者聚棠樹下為二積留南岸者為一積俄有徑寸龜三繞行積蛇盡死而後各登其積野人以告蛇腹各有瘡若矢所中刺史康日知圖其事奉三龜來獻五行志蟲狀如龜大和三年魏博管内有蟲狀如龜其鳴晝夜不絶近龜孽也巨龜吹水歸登尚書毎浴皆屛左右自於浴盤中坐移時或有窺者見一巨龜吹水也出北夢𤨏言黿十七白月令九月命有司登龜取黿甲蟲秋乃堅成九月方可取之為梁紀年曰周穆王四十七年東至於九江北黿鼉以為梁而復之矣染指之味楚人獻黿於鄭靈公子公之食指動謂子家曰必嘗異味及宰夫將解黿食大夫不與子公子公染指於鼎嘗之而出𤣥物甲蟲之屬籍時周禮鼈人掌取𤣥物以時籍魚鼈蜃凡貍物注籍初捉反謂以杖刺取貍物貍謂鼈藏於泥中也籍事黄氏化為黿孔蹙縮盤渦下漩黿鼉文粹招北客文蜀之東則有大江蹙縮盤渦下漩黿鼉天黿厯志其始王也次于鶉火以逹天黿絶岸黿鼉驕杜甫詩詭怪柳宗元晉問其可則濬河崑崙入于天淵龜鼉詭怪于于汩汩腸屬於頭酉陽雜俎黿腸屬於頭元濬之韋丹未第時於洛陽橋見漁者得一黿甚大丹心異之贖投於河後有元長史名濬之來謁丹即其黿也吉凶響應録瀟湘水國旁黿鼉杜甫酬髙蜀州江清日抱黿鼉游同上江光隠見黿鼉窟玉䑓觀上近有漁人泊舟馬當山下月明風恬見一大黿出水直上山頂四望頃之江中踴出一彩舟有十餘人㑹飲酒妓樂陳設甚盛獻酬久之上流有巨艦來下櫓聲振于坐中彩舟乃没前之黿亦下未及水忽死于岸側意者水神使此黿為望候不知艦之來故殛之鼈十八白書曰鳥獸魚鼈咸若水煩則魚鼈不大禮水潦降不獻魚鼈禮謂多也春獻周禮春獻鼈蜃也無耳文子云三足爾雅鼈三足為能傳曰堯殛鯀于羽山其神化為黄能以入于羽泉云云𤣥物見上中殺見上居山者不以魚鼈為禮濡鼈醢醬實蓼烹也不食雛鼈為伏乳鼈去醜醜竅也禮籍事周禮鼈人掌凡邦之籍事怒鼈小國語公父文伯飲南宫敬叔路堵父怒鼈小曰長而食之遂出文伯母曰聞祭養尸享賔鼈於何有而使夫人怒擉莊子閲休冬則擉鼈于江刺取之孔人死餌鼈天竺國人死或委野中及河餌烏獸魚鼈衣食所資李義帝遣使江南發在所庫貲以贈生義上疏以為江南魚鼈之利衣食所資江湖之生無既而府庫之財有限與其拯物不如憂民蔽江而下五行志貞元三年潤州魚鼈蔽江而下皆無首夏鼈盧仝月蝕詩寒龜夏鼈一種味石鼈衘題雲仙散録湘潭記曰髙郢夜課于豐亭忽見一鼈在案上視之乃石也郢異其事取千題散置箱中祝令石鼈衘之以卜來事既而石鼈舉頭乃是沙洲獨烏賦題中果然其年首選鼈無耳為守神雜俎吏人之化鼈水陷歴陽有吏人之化鼈文粹嵩山啟母廟碑崔融黄氏母文粹化鼈於黄氏之母檄水伯文樊傳慕臭皮日休紀祀彼羣小之茸茸兮如慕臭之鼈鼎鼈今黄家峒賊熾邕容兵連敗縮首不出猶鼎鼈耳杜牧沅江鼈甲九肋者稀摭言曰盧肇袁州人初起舉先逹問袁州出舉人邪荅曰亦有也沅江鼈甲九肋者稀長髪鼈為曜數食可長髪酉陽雜俎已看能類鼈柳宗元詩伊余何所擬趿鼈詎能踊韓文聯句莧割鼈世人皆言莧可以割鼈化書鼈目白鼈目白腹下王字者不可食酉陽雜俎鳥獸言十九白鳥言周禮秋官夷𨽻掌役牧人掌牛與鳥言注夷狄之人或曉鳥獸之言獸言秋官豹𨽻掌役服不或養獸而掌與獸言也牛鳴左傳介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信鵲言殺魏安徳令劉長仁有鵲來屋上鳴管輅曰鵲云東北一婦昨殺夫牽引西家大離婁有頃果有婦人殺夫詐訟西家殺也公冶長解鳥語免罪孔馬鳴哀裴知古人有乗馬者知古聞其嘶乃曰馬嘶哀主必墜死訪之然人言萬歲樂志鳥歌武后作也有鳥能人言萬歲因以制樂牛人言五行志光啟元年河中有牛人言其家殺而食之黒石白文西域隋大業中有波斯國人牧于俱紛摩地耶上有獸言曰山西三穴有利兵黑石而白文得之者王走視如言獸語可徴白氏聞牛鳴判四馬分飛聽音既稱有信三犧皆用聞鳴豈可為妖揆以周官業將同於夷𨽻詳夫魯史責不及於葛盧獸語可徴人言奚恤五色能言鳥西域南天竺獻五色能言鳥白孔六帖卷九十八
