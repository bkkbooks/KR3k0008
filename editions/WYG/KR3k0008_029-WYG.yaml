body:
  text: 白孔六帖卷二十九唐白居易原本宋孔傳續撰謙讓一恥尚二貞三恭敬四謹五慎六傲慢七勇八壯九謙讓一謙損以貴下士附白謙尊而光易君子有終益謙天道虧盈而益謙流謙地道變盈而流謙福謙鬼神害盈而福謙謙謙君子卑以自牧牧養也鳴謙撝謙謙徳之柄用九天徳不可為首誰敢不讓書推賢讓能書陽禮敎讓則民不争周禮讓徳於天天子有善讓徳于天諸侯有善歸諸天子士庶人有善本諸父祖讓善善則稱人過則稱己則民讓善大讓如慢小讓如偽不争道塗不争險易之利冬夏不争隂陽之和讓而受惡觴酒豆肉讓而受惡人猶犯齒讓而坐下衽席之上讓而坐下人猶犯貴讓而就賤朝廷之臣讓而就賤人猶犯君能以國讓仁孰大焉宋公疾太子兹父固請曰目夷長且仁目夷曰云云范宣子讓其下皆讓䇿其馬孟之反後入為殿抽矢策其馬曰非敢後也馬不進也三以天下讓太伯能以禮讓為國乎何有謙受益棄徳不讓韋𤣥成謙遜下士遇知識步行必下從者轝載送之王伯有平吳功無矜滿之色不以名位格物陸玩通雅不以名位格物誘納後進謙若布衣由是搢紳莫不䕃其徳宇也一家讓而一國興讓不以能驕人尹翁歸讓徳之主上能下競能以禮讓不為禍先雖質而已矣然陋如之何問高難對調下易悲向鵬衢而自愧瞻鶂路以驚魂太伯三讓晉侯三辭夷齊讓國虞芮讓畔不讓當仁不讓于師崇讓論劉寔子真以世多進趍著崇讓論謙損損益盈虛與時偕行酌捐損上益下人說無疆滿招損謙受益自卑而尊人難進易退曲則全窪則盈敝則新老子尹翁歸謙退不以能驕人慮以下人不自滿假書裒多益寡以貴下士結韤王生處士也於庭中三公九卿盡㑹立王生顧謂張釋之曰吾韈解庭尉為我結韈釋之跪而結之或謂王生傲也執轡魏公子無忌自執轡虛左迎侯嬴嬴曰臣有友人在屠請共過之即朱亥也賔從怪公子久立朱亥之家公子貌愈謹爾以貴下賤大得民也易降尊就卑貴而能降降心相從孔周公下白屋吐哺不及飡選時稱長者竇徳元兄徳明高祖兵叩長安而宗室孝基神符道宗及竇誕趙慈景等竝繫獄隋将衛文昇隂世師欲殺之徳明諌曰罪不在此殺之無傷於彼祇取怨焉不如縱之乃止長安平謁高祖終不自言時稱長者謙謹自守楊𢎞武無他才特謙謹自守昔時一尉陽嶠常語人曰吾備位方伯而心亦昔時一尉耳降禮賞接封倫楊素負才藝多所凌藉惟于倫降禮賞接輔政謙不肯事齊映與崔造劉滋竝輔政滋端重寡言映謙不肯事否可一顓於造㑹造疾映乃當國若不在勢位者路巖居循循謙飭若不在勢位者遇人長幼如一陽城謙恭簡素遇人長㓜如一聖人敎人謙孔穎達帝問孔子稱以能問于不能以多問于寡有若無實若虛何謂也對曰此聖人敎人謙而已雖能仍就不能之人以咨所未能已雖多仍就寡少之人更資其多内有道外若無中雖實容若虛非特匹夫君徳亦然本傳謙謹下人鄭餘慶遷御史中丞務謙謹下人引御史坐與論議撤集賢幔舍徐堅𤣥宗為集賢院以堅副張說知院事帝大酺集賢幔舍在百司上說令掲大牓以侈其寵堅見遽命撤之曰君子烏取多尚人無為出人上劉延祐李勣戒之曰子春秋少而有美名宜少自抑無為出人上延祐欽納自敘著行紀渾瑊嘗自敘著行紀一篇其辭一不矜大天性忠謹功高而志益下毎有賜予下拜跪受常若在帝前帝美其誠薛放穆宗為太子拜侍讀及即位參賛機命帝謂曰小子新立懼不克荷先生宜相以輔不逮放叩頭曰臣庸淺不足塵大任自有賢能處之帝美其誠寵待尤至不以貴倨人曹華雖出戎伍愛重士大夫不以貴倨人謙柔敦厚為三朝所推苗晉卿徳宗時官至郎中陸贄欲進粲官帝不許曰晉卿往攝政有不臣之言贄奏陛下以晉卿姦邪粲等當坐則當公議其罪若知見誣亦宜擢粲等以示天下且晉卿起文儒致位台輔謙柔敦厚為三朝所推安肯為滅族計雖甚狂險猶不為之况老臣乎帝然之不敢以貴權自處趙隠性仁悌不敢以貴權自處謙卑自將吳奏才敏銳而謙卑自将終身讓路不枉百步朱仁軌常誨子弟曰終身讓路不枉百步終身讓畔不失一段本傳每遷官讓形於色雀𤣥亮讓成美徳毋多房𤣥齡進司空固辭帝遣使謂曰讓誠美徳也然國家相眷賴久毋多讓推避以文墨事栁宗元答韋珩書封示退之書云欲推避以文墨事且以勵足下若退之之才過僕數人尚不宜推避于僕非其實可知故相假借為之詞耳幕中謙謙李藩張建封在徐州辟為從事居幕中謙謙未嘗論細㣲克己自下雖不肖人至未嘗敢以貌慢之况時所尚者邪韓文謙謹好禮五代周臣鄭仁誨謙謹好禮不自矜伐為士大夫所稱謙謹未嘗與物忤霍王元軌兄弟讓國尉遲勝本王于闐貞元初曜上言國中以嫡承嗣今勝讓國請立其子銳帝欲遣銳襲王勝固辭以曜久行國事人安之銳生京華不習其俗不可遣當是時兄弟讓國人莫不賢之謙靖免禍楊涉哀帝時為中書門下平章事受命與家人泣與其子凝式曰世道方極吾嬰綱羅不能去将重不幸禍且累汝然以謙靖終免于禍恥尚二白其心愧恥若撻于市伊尹恥其君不及堯舜有恥且格格止也恭近於禮逺恥辱也衣敝緼袍與衣狐貉者立而不恥者其由也與不恥惡衣惡食不恥縲紲管子曰不恥縲紲恥天下之不治非人孟子曰無羞惡之心非人也知恥彭薛知恥恥之左丘明恥之丘亦恥之恥躬之不逮坐於塗炭孟子曰伯夷與鄉人處如朝衣朝冠坐于塗炭之上行之望望焉若将凂焉凂汙也知恥近乎勇地有餘而民不足君子恥之孔識元紫芝元徳秀字紫芝蘇源明常語人曰吾不幸生衰俗所不恥者識元紫芝也徒步而恥濡足徒步而恥濡足寧能自信其言哉皇甫湜答李生書三王用明而恥察三皇用真而恥聖五帝用聖而恥明三王用明而恥察李商隠元結文集序有恥者得賜甚於戮長孫順徳以受賕為有司劾發帝因賜帛數十愧切之大理少卿胡演曰順徳以賂破法不可赦奈何又賜之帝曰使有恥者得賜甚于戮如不能乃禽獸也殺之何益無怍於心無愧於色栁宗元啟不從枉羞為非同上四維論管子以禮義亷恥為四維彼所謂恥者曰不從枉也人之命恥者曰羞為非也吏唱名乃入李戡年三十明六經舉進士就禮部試吏唱名乃入戡恥之明日徑返江東貞三白貞勝吉凶者貞勝者也貞者事之幹也利貞者性情也天地之道貞觀者也日月之道貞明者也公叔文子卒公曰衛國有難夫子以其死衛寡人不亦貞乎送往事居偶俱無猜貞也傳貞而不諒貞夫天下之動貞夫一者也一人元良萬邦以貞共貞我二人共貞徳貞恒其徳貞師貞文人吉易貞正也卜貞周禮卜來歳之貞孔峭正虞世南煬帝雖愛其才然疾峭正弗甚用也勁正不顧患李渤時政移近倖紀律蕩然渤勁正不顧患鯁正蕭放以鯁正為權近所忌韓琬景雲初上言自兹以來趋勢者進守道者退諧附者無黜剥之憂正直者有後時之歎持正無違附武元衡李吉甫李絳數争事帝前不叶元衡獨持正無所違附帝稱其長者莊詞正色武儒衡上謁宰相鄭餘慶未嘗有所易以莊詞正色見重于餘慶侃侃不干虛譽薛廷老在公卿間侃侃不干虛譽推為正人秉正自将吕元膺時方鎮多姑息獨元膺秉正自将監軍及中人往來者無不嚴憚入拜吏部侍郎正色立朝當官則正言不可得而詘崔沔正必去邪邪必害正李徳裕嘗建言朝廷惟邪正二途正必去邪邪必害正然其辭皆若可聴願審所取舍鯁正讒擠劉瞻貶驩州天下謂瞻鯁正特為讒擠舉以為寃辨邪正李徳裕既入謝即進戒帝辨邪正夫正人既呼小人為邪小人亦謂正人為邪何以辨之請借物為喻松柏之為木孤生劲特無所因倚蘿蔦則不然弱不能立必附他木故正人一心事君無待于助邪人必更為黨以相蔽欺操行堅正韓愈操行堅正鯁言無所忌處正特立崔咸為御史處正特立風采動一時李翺陛下既以武功定海内若遂革敝事復高祖太宗舊制用忠正而不疑屏邪佞而不邇此政之根本任骨鯁正直同上陛下資上聖如不惑近習容恱之辭任骨鯁正直與之脩復故事以興大化可不勞而成也正人用則佞人憂李邕貶遵化尉妻溫復為邕請戍邉曰妾聞正人用則佞人憂邕之禍端故自此始不為權近所持裴璘以道自任悉心事上疾黨附不為權近所持不詭隨蕭至忠為中書令時楚客懐姦植黨而韋巨源楊再思李嶠務自安無所弼正至忠介其間獨不詭隨時望翕然歸重不事新貴韓臯王叔文用事臯嫉之謂人曰吾不能事新貴從弟􅋫以告叔文叔文怒出為鄂州蘄沔觀察使孤立一意陸贄初劉從一姜公輔等才下不逮贄逺甚徒以單言暫謀偶有合由下位建台宰而贄孤立一意為左右權倖沮短又言事無所囘諱隂失帝意久之不得宰相毅然寡合穆寜性不能事權右毅然寡合始終不失其正楊於陵節操堅明始終不失其正謝絶薛萃父順為奉天尉與楊國忠有舊及用事将引之輒謝絶中立自将王質雖與李徳裕厚善而中立自将不為黨不屈附權貴裴寛徙河南尹不屈附權貴不恤近倖李石起為相以身徇國不恤近倖十年無書賄入權家沈傳師更二鎮十年無書賄入權家堅正有守武元衡帝素知元衡堅正有守故睠禮信任異它相以不附離見疾孟簡王叔文在户部簡以不附離見疾竇羣王叔文黨盛雅不喜羣羣亦悻悻不肯附貪冒茍進邪薄之夫沮其志陽城出為道州刺史栁宗元聞之遺何蕃等書曰陽公在朝四方聞風貪冒茍進邪薄之夫沮其志何蕃初朱泚反諸生将從亂蕃正色叱不聼故六舘士無受汙者陽城傳是子堅正韋溫李徳裕擢部貟外郎或言雅為牛僧孺厚徳裕曰是子堅正可以私廢乎獻書謁皇帝杜甫别蔡十四獻書謁皇帝志己清風塵流涕灑丹極萬乗為酸辛天地則創痍朝廷多正臣姚宋為相邪不如正太平用事正不如邪栁澤停斜封官疏居與正為鄰游與邪分歧居與正為鄰白居易座右銘天子素重其正李勉召為大理少卿然天子素重其正擢太常少卿欲遂柄用論議持正虞世南貌懦謹外若不勝衣而中抗烈論議持正左右前後皆正人也欲其身之不正烏可得邪韓文正聲諧韶濩韓愈詩不喜由官倖進李􅅠稍厚善吐突承璀承璀歸數稱薦之召拜門下侍郎同中書門下平章事􅅠不喜由官倖進及出相樂作泣下謂諸将曰吾老安外鎮宰相豈吾任乎至京師不肯視事引疾固辭改户部尚書不邇讒邪韓愈釋言公正則不邇讒邪貞之為言正也栁宗元非國語凡所陳諭感動物情裴度同中書門下平章事度劲正而言辨尤長于政體凡所陳諭感動物情鳴玉拖金盡正臣杜甫入朝恭敬四白天道敬親人道好謙敬逺恥恭寡過能自中出肅乎容貌禮由外作慎爾威儀相下以卑起敬思恭徳由慎立名以恭聞毋不敬禮事思敬貌思恭居處恭執事敬如祭之敬若思之荘出門如見大賔使民如承大祭恭近於禮逺恥辱也卑讓禮之宗也敬可棄乎恭敬徳之聚也能敬必有徳恭則不侮慮以下人謙也允恭克讓為人上者奈何不敬恭人詩云戰戰兢兢溫溫恭人兢兢業業業業戒慎慄慄危懼敬之敬之命不易哉君子正其衣冠尊其瞻視儼然人望而畏之乾乾夕惕若厲易接下思恭貌曰恭洪範自卑君子自卑而尊人致敬禮君子致敬所以免過致恭易君子致恭以存其位各敬爾儀敬爾威儀敬禮之輿也傳勤禮莫如致敬夙夜惟寅寅敬也謙受益傴僂恭貌怵惕敬貌克己復禮檢身恭己其行己也恭子産讓為禮宗敬乃徳聚恭而無禮子曰恭而無禮則勞慎而無禮則葸葸畏懼也鞠躬入公門鞠躬如也踧踖恭貌禮至於敬行先乎恭理躬禮曰致禮以理躬則荘敬荘敬則威嚴子曰敬而不中禮謂之野恭而不中禮謂之野文以君子之容敬慎者仁之地也色莊者乎三命傴僂傳正考父三命益恭故鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫敢予侮假寐晉趙盾将朝尚早坐而假寐鉏麑曰不忘恭敬民之主也循墻而走見上注執轡迎侯嬴見上注軾廬魏文侯軾廬於段干木止戈于秦握髮周公下白屋之士一飯三吐哺一沐三握髮昔三代明王之政必敬其妻子也遇妻子若嚴君張湛萬石君恭敬過宫闈門必下車趍見路馬必式上賜食于家必稽首俯伏而食如于上前終日危坐陶侃為荆州恭而近禮終日斂膝危坐役仁恭儉以求役仁卑以自牧敬以直内敬慎不敗天道虧盈而益謙鬼神害盈而福謙孔足恭未嘗忤物楊再思畏謹足恭未嘗忤物恭勤樸忠婁師徳揔邉要為将相者二十年恭勤樸忠心無適莫唯唯恭愿牛仙客為相謹身無它與時沉浮唯唯恭愿端重有禮灋楊涉為人端重有禮法性恭謹未嘗敢語人李元愷心為君君尚恭故欲小孫思邈心之恭者禮必敬焉栁宗元恭謹不與人交高郢恭黙為本栁玭家訓立己以恭黙為本酒至必立飲苗晉卿充河北採訪使嘗入計謁歸壺闗望縣門輒步吏諌止晉卿以公門當下况父母邦乎郡太守迎犒吏所屬令行酒酒至必立飲白釂侍老有獻降西階拜而飲時美其恭謹五白庸行之謹庸常也易謹於事先王克謹天戒書謹厚丞相車千秋謹厚全身張安世以謹厚全身老謹石慶為丞相上以老謹無能不責鄧通以謹媚上履霜堅氷盖言謹也易謹而信汎愛衆而親仁子曰謹而信有愧先臣無累後人孔性周謹楊師道性周謹未嘗語禁省事嘗曰吾讀孔光傳想其餘風或庶幾云必正衣冠唐臨見妻子必正衣冠謹厚崔元宗外若謹厚而中刻薄與子弟屬吏書不草字席豫性謹畏與子弟屬吏書不草字或曰此細事耳何留慮答曰細不謹况大事耶韋斌毎朝㑹不敢離立笑言嘗大雪在廷者皆振裾更立斌不徙足雪甚幾至靴亦不失恭循謹無所駮異董晉同平章事方竇參得君裁可大事不闗咨晉晉循謹無所駮異天性忠謹渾瑊天性忠謹功高而志益下歳時貢奉必躬關視每有賜予下拜跽受若在帝前世方之金日磾本傳崔沔純謹無二言起居皆有禮灋栁公綽性質嚴重起居皆有禮灋宣麻大寒不去位錢徽拜尚書左丞㑹宣墨麻羣臣在廷方大寒稍稍引避徽素恭謹不去位久而仆老而彌謹裴遵慶老而彌謹毎薦賢有來謝者以為恥諌而見從即内益畏不甚斥是非得失苗晉卿再秉政出入七年小心謹畏不甚斥是非得失故能安保寵名内謹重李華外坦蕩内謹重坐必斂衽杜審權在方鎮視事有常處要非日入未始就内寝坐必斂衽常若對大賔或畫日少息則顧直将解簾即旁無人自起徹鈎手擁簾徐下乃退束帶終日不休偃崔元綜坐政事堂束帶終日不休偃慎六慎宻附慎終鑒誠白敬慎不敗易不自滿假書涉于春冰兢兢業業夕惕若厲怵惕惟厲怨豈在明不見是圗不矜細行終累大徳克自抑畏慎而無禮則葸葸畏懼意君子無易由言耳属于垣執虛如執盈入虛如有人戒慎乎其所不覩恐懼乎其所不聞慎獨莫見乎隠莫顯乎㣲故君子慎其獨清不必慎晉李緒至秦州刺史司馬景王曰為官長清慎勤上曰不得已何去曰慎為大清者不必慎慎者不必清石慶數馬石慶為太僕卿出上問車中幾馬慶以䇿數馬畢舉手曰六馬慎如此也慶于兄弟中最為簡君子思患而預防之可不慎乎言行君子之樞機也繫于苞桑其亡其亡易犇車之上無仲尼覆車之下無伯夷淮南子慎㣲董仲舒云盡小者大慎㣲者著宿衛忠慎魏許緒字仲康為武衛中郎曺仁自荆州來朝謁太祖未出于殿外召入便坐語緒辭天子将出還入殿人問之緒曰彼雖貴外藩也入室語何私乎相聞善之謝絶知友史趙禹為人亷倨為吏已來舍無食客公卿相造請禹禹終不報務在謝絶知友賔客之請孤立行一意而已惟精惟㣲不可不察死生在天善敗由己行不三思還同捨魯之役智乖百慮頗涉謂秦之譏位其可不慎乎一失其位不得列于諸侯况其下乎慎言語節飲食執輕如不克克勝也禮慎於行慎宻君子慎宻而不出也君不宻則失臣臣不宻則失身幾事不宻則害成慎以避禍不言溫樹孔光守法度修故事上有所問據經對時有所上言輒削藁典樞宻歸家燕語不及朝省事或問溫室樹何木光對以他事不畏慎後漢陳寵為尚書性周宻常稱人臣苦不畏慎在樞宻拒絶親友壊本任放為黄門侍郎每納忠言輒手壊其本有智防魏荀攸謀宻自從太祖征伐有智防謀帷幄時人子弟莫知所言焚草羊祜叔子典樞要嘉謀讜議皆焚其草決政已輒病張安世職樞宻以謹慎周宻自著毎定大政決己輒病莫敢出聞有詔令乃驚使吏之丞相府問焉朝廷大臣莫知其預議毁草樊宏靡節所上便宜及言得失輒手自書冩毁削草本公朝訪逮不敢對衆小吏為宻楊阜義山為将作大匠欲上疏省宫人不見幸者召御府吏問後宫人數吏守舊令曰禁宻不得宣露阜怒杖吏一百數之曰國家不與九卿宻乃與小吏為宻乎帝聞敬憚之慎終知終易曰知終終之可與存義也乃終有慶伊訓曰其後嗣王罔克有終相亦罔終無初有終慎始敬終靡不有初鮮克有終終之實難半塗而廢君子遵道而行半塗而廢吾不能已矣君子之道思其始也思其終也慎終如始慎終追逺民徳歸厚矣鑒戒終日乾乾夕惕若厲易視履考祥君子安不忘危存不忘亡治不忘亂人無水鑒當于民鑒鑒于后羿殷鑒不逺在夏后之世鑒于后羿而用徳度宜鑒於殷鑒明則塵垢不止亡國之社每國立亡國之社以為鑒戒雖休勿休日慎一日諸臣不佞晉入楚軍三日舘榖范文子立於戎馬前曰君㓜弱諸臣不佞何以及此君其戒之申之炯戒小懲大戒孔謝賔客不通溫彦博性周慎既掌機務謝賔客不通過自畏慎皇甫無逸過自畏慎每上表疏議數十猶懼未審使者上道追省再三乃得遣人莫見其際蕭嵩慎宻人莫見其際勤揔衆職吕諲哥舒翰表度支判官性静慎勤揔衆職諸僚或出游諲獨頽然據案鈎視簿最翰益親之本傳羸服宗室暠為汝州刺史昆弟繇東都候之輒羸服往州人無知者其清慎舉如此篤慎徐岱性篤慎至宫殿中吾未嘗近小心慎黙裴垍中外機筦垍多所參與以小心慎黙稱帝意毁藁郭縱性周畏不立赫赫名有諫于上退必毁藁家人子弟無知者莫知所言裴遵慶諌而見從即内益畏雖親近但記其削藁疏數而莫知所言以道自将陸餘慶初武后時酷吏用事中宗朝倖臣貴主斜封大行蹈利嗇禍之人雖亟貴驟用而戮不反踵餘慶以道自将雖仕不赫赫訖無悔尤劉蕡䇿春秋晉狐射姑殺陽處父書㐮公殺之者以其上漏言也㐮公不能固隂重之戒處父所以及戕賊之禍故春秋非之夫上漏其情則下不敢盡意上泄其事則下不敢盡言故傳有造膝詭辭之文易有失身害成之戒今公卿大臣非不能為陛下言之慮陛下不能用也忽而不用必泄其言内頗周宻何瓉為人明敏通于吏事外若疎簡而内頗周宻五代史笏端親書慎宻崔澄侍左右與諸王不讓席坐性滑稽帝恐漏禁中語以慎宻字親書笏端積慎如觸蠆韓文雨中聮句以畏為本孫思邈曰養性必先知自慎也慎以畏為本重慎未嘗語禁中事元萬頃為性嘗重慎未嘗語禁中事人及其醉問之亦熟視不答小心畏慎苗晉卿寛厚亷謹為政舉大綱不問小過所到有恵化及秉鈞衡小心畏慎未嘗忤人意立己以畏怯為務栁玭家訓竟無一言漏泄房𤣥齡以譴歸第時長孫皇后疾将大漸與上辭决曰𤣥齡事陛下最久小心謹慎皆所預聞竟無一言漏泄非有大故願勿棄之禇遂良又抗疏理之乃召房𤣥齡復位悼士無良而苦於禍劉子𤣥悼士無良而苦于禍作思慎賦以刺時蘇味道李嶠見而歎曰隆機豪士之流乎周身之道盡矣新史未嘗有過張儉弟延師亷謹周慎典羽材屯兵三十餘年未嘗有過朝廷以此稱之舊史推為長者馬懐素為昭文舘學士篤學手未嘗廢卷謙恭慎畏推為長者勑書一匣陸元方為宰相有書一匣嘗自緘封家人莫有見者及卒視之乃前後勑書其慎宻如此著樞機論徐彦伯累除給事時王公卿士多以言語不慎宻為酷吏周興來俊臣等所陷彦伯乃著樞機論以誡于代舊史精敏小心未嘗有過文粹陸贄翰苑集宇文士及太宗延入閤語或至夜分出遇休休往往馳召士及益自謹其妻嘗問向遽召何所事士及卒不對慠慢七驕狂附白天命祐敬人道惡盈禮不長慠神亦害盈傲狠威儀而驕近亂傲不可長禮記無怠無荒自暇自逸或敢侮予何以卑我傳彼皆偃蹇驕傲之貌使驕且吝其餘不足觀也驕君子㤗而不驕不仁者不可與長處樂自廣自滿直而不倨倨傲也敬親者不敢慢于人立無跛跛不敬也跛音祕坐無箕箕踞不敬也所自邪也安肆日偷偷苟且也肆恣也忘僂傴之恭肆偃蹇之傲滿招損謙受益志自滿無傲從康荒怠弗敬乃逸乃㟁畔㟁也位不期驕不敬則何以承守其官位燕䘮威儀何禮之拘倨見長者夷俟夷倨也俟待也敬乃行先傲為禍始斯須不敬致禮以理躬則荘敬荘敬則威嚴故外貌斯須不荘不敬則慢易之心入矣失恭與義信義苟而行之使驕且吝執幣越椒來聘執幣傲叔仲惠伯曰必滅傲其先君神不福也獻俘原叔獻俘于王不敬劉康公曰不及十年原叔必有大咎天奪之魄矣取禍苦成叔傲甯子曰取禍之道怠位滕成公來㑹𦵏甚哀多涕子服恵伯曰怠于其位而哀已甚兆于死所矣受玉惰天王賜晉恵公命受玉惰召公曰晉侯其無後乎先自棄也棄命郤錡來乞師将事不敬孟獻子曰棄君命也不亡何為受脤成肅公将伐秦受脤於社不敬劉子曰民有禮義威儀之則能者養之以福不能者敗以取禍今成子惰其不反乎富而不驕者鮮矣驕而不亡者未之有也戍也驕其亡乎公叔戍汲黯性倨少禮長揖衛青申脚局下晉王武子與晉帝棊申脚局下問孫皓曰何以剥人面皮皓曰見無禮于君者則剥也唐突諸侯魏宣子景然常步入宫見植使問何官宣曰丞相軍謀掾也植曰應得唐突列侯否宣曰王人雖㣲列在諸侯之上植復曰為人父吏見其子應禮否宣曰臣子之例一也箕踞郭解出入人皆避有一人獨箕踞視之解問其名客欲殺之解曰居邑之不見敬是吾徳不修陵長吏甯成為小吏必陵長吏郅都為濟南守成為都尉直陵都出其上也倨見長者酈食其謂沛公曰方欲圗天下不宜倨見長者狂楚狂接輿歌而過孔子清狂不惠晉宣時山陽太守昌邑王賀清狂不惠狂簡斐然成章孔子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之狂生酈食其家貧落薄無衣食業為縣監門吏皆謂狂生佯狂為巫蒯通屢說韓信貳於沛公三分天下信不用其言乃徉狂為巫古之狂也肆肆直意敢言也今之狂也蕩無所據也一國之人皆若狂狂狷狂者進取後漢仲長統倜儻不務小節語黙無常人謂之狂生太公云大智似狂不顛不狂其名不章陳平飲人狂藥馳騁田獵令人心發狂老子文子姓辛氏状貌似不足而博學多聞狂夫孔誕傲崔從為東都留守故事留司官入宫城門列晨衙見留守吏誕傲久廢至是復行生於富者驕生於貴者傲栁澤書負氣鞅鞅韓思彦中書令李敬𤣥劾奏思彦見天子不蹈舞負氣鞅鞅位卑者倨見王毛仲不甚恭位卑者或倨見迕意即侮誶以氣凌之直出其上遇官屬尤嫚虢莊王鳯接下脫略楊憑性簡傲接下脫略人多怨之恃才狎侮王縉時元載專朝天子拱手縉布意附離無敢忤又恃才多所狎侮雖載亦疾其凌靳也倨下傲上羅立言倨下傲上出具弓矢呵道宴賔客引倡優如大府傲縱多所凌藉鄭仁表擢起居郎嘗以門閥文章自高曰天瑞有五色雲人瑞有鄭仁表傲縱多所陵藉人畏薄之倨不冠帶崔彦昭與王凝外昆弟也常見凝凝倨不冠帶嫚言曰不若從明經舉彦昭為感厲色慢辭劉栖楚詣宰相厲色慢辭韋處厚惡之作慢語斥訕大臣高霞位既高言多不遜又詒侮僚属作慢語斥訕大臣視軰行傲然顔師古性簡峭視軰行傲然罕所推接既負其才早見驅䇿意望甚高視選者不以禮郎餘慶遷御史中丞吏部侍郎楊思𤣥倨貴視選者不以禮餘慶劾免其官恌輕忤物崔信明蹇亢以門望自負嘗矜其文謂過李百藥議者不許楊州錄事㕘軍鄭世翼者亦傲倨數恌輕忤物遇信明江中謂曰文公有楓落吳江冷願見其餘信明欣然多出衆篇世翼鑒未終曰所見不逮所聞投諸水引舟去造化小兒相苦杜審言恃才高以傲世見疾初審言痛甚宋之問武平一等省侯何如答曰甚為造化小兒相苦尚何言然吾在久壓公等今且死固大慰但恨不見替人云褊躁傲誕杜甫嚴武以世舊待甫甚善親詣其家甫見之或時不中而性褊躁傲誕嘗醉登武床瞪視曰嚴挺之乃有此兒武亦暴猛外若不為忤中銜之褊傲薛逢王鐸為宰相逢又以詩訾鐸鐸怒中外亦鄙逢褊傲故不見齒軒傲李林甫初三宰相就位二人磬折趍而林甫在中軒驁無少讓喜津津出眉宇間觀者竊言一鵰挾兩兎視僚黨謷然韋陟自以門品可坐階三公居常簡貴視僚黨謷然辱京兆尹于禁中郗純遷中書舍人時魚朝恩以牙将李琮署兩街功徳使琮恃勢桀横衆辱京兆尹崔昭于禁中純曰此國恥也即詣載請速處其罪載不納恃奥主氣豪倨潘孟陽奏仁傑不遜狄仁傑初宰相張光輔討越王軍中恃功多暴索仁傑拒之光輔怒曰州将輕元帥邪仁傑曰亂河南者一越王公董士三十萬以平亂縱使暴横使無辜之人咸墜塗炭是一越王死百越王牛也且王師之至民歸順以萬計自縋而下四面成蹊奈何縱邀賞之人殺降以為功寃痛徹天如得上方斬馬劍加王頸雖死不恨光輔還奏仁傑不遜左授復加刺史倚才陵籍王勃聞虢州多藥草求補參軍倚才陵藉為僚吏共嫉本傳傲雖凶徳必有恃而敢行愈之族親鮮少無板聫之勢又不善交人無相先相死之友于朝無宿資蓄貨以釣聲勢弱于才而腐于力不能奔走乗機抵巘以要權利夫何恃而傲韓文釋言狂惑䘮心之人蹈河而入火妄言而詈罵者則有之矣傲相國又傲翰林今二公合處而㑹言若及愈必曰韓愈亦人爾彼傲相國又傲翰林其将何求必不然同上人之所趨僕之所傲與已合者則從之游不合者雖造吾廬未嘗與之坐此豈徒足致謗而已不戮于人則幸也韓愈書莫肯低華簪朅來于公卿莫肯低華簪同上詩慢倨不為禮嚴武房琯以故宰相為廵内刺史慢倨不為禮矜己傲物張昌齡正觀末翠㣲宫城成獻頌闕下召見試息兵詔少選成文帝大恱曰昔禰衡潘岳矜己傲物不得死卿才不減二子宜鑒于前副朕所求意㟁軒傲酷吏姚紹之意岸軒傲朝野注目倨野栁宗元與裴塤書性又倨野不能摧折以故名益惡勢益險有啄有耳者相郵傳作醜語爾目視飛鴻房魯上節度使書目視飛鴻氣如横蜺文章倚豪横韓愈東都遇春不撤扇賈餗太和九年上已詔百官㑹曲江故事尹自門步入揖御史餗自矜大不撤扇盖騎而入御史楊儉蘇特固争餗曰黄面兒敢爾儉曰公為御史能嘿嘿耶大夫溫造以聞坐奪俸倨見權貴韋方質遷地官尚書嘗属疾武承嗣兄弟往候方質據床自若或曰倨見權貴且速禍答曰吉凶命也丈夫豈能折節近戚以苟免耶襄陽兒杜易簡殿中侍御史嘗道遇吏部侍郎李敬元不避敬元恨召為考功員外郎屈之而侍郎裴行儉與敬元不平故易簡上書言敬元罪敬元曰襄陽兒輕薄乃爾以大自負李琪少以文章知名亦以大自負既貴乃刻牙版為金字曰前鄉貢進士李琪常置之坐為人少持重故為時所沮奏請鞫之晉承永嘉之後囂風未除廷臣中猶以謝鯤輕佻王澄曠誕競相祖習以為高達卞壺厲色于朝曰帝祚流移社稷傾蕩職兹浮偽奏請鞫之楊䕫原晉亂說間氣布衣皮日休傲誕自號間氣布衣北夢瑣言卿自難記許敬宗性輕見人多忘之或謂其不聰乃曰卿自難記若遇曺劉沈謝暗中摸著亦可識也國史纂要聖賢不過五人殷安嘗謂人曰自古聖賢不過五人伏羲以八卦窮天地之旨一也乃屈一指神農殖百榖濟萬民二也乃屈二指周公制禮作樂百代常行三也乃屈三指孔子前知無窮却知無極㧞乎其萃出乎其類四也乃屈四指自是之後無屈得安指者良久曰并安五也不遜如此出朝野僉載悔讀南華第二篇進士溫岐即庭筠也大中好文以金步搖未能對岐以玉跳脫應之宣皇賞焉令以甲科處之為令狐綯所沮除方城尉綯曽問其事於岐曰出南華真經非僻書也冀相公燮理之暇時宜覽古綯怒甚後岐有詩云悔讀南華第二篇出南部新書南方君子京兆尹黎幹嘗白事于王縉縉曰尹南方君子也安知朝禮其慢而侮人率如此南部新書中人處之不能無傲若子者生有黼繢粱肉之美不知耕農之勤勞物役之艱難趨其庭有魏絳之金石焉侯其門有亞夫之棨焉中人處之不能無傲栁文送嚴生傲㟁一生傲㟁苦不諧李白宦寺氣盛暴陵李石氣雄逺當軸秉權亡所撓方是時宦寺氣盛暴陵朝廷每對延英而仇士良往往斥訓以折大臣石徐謂曰亂京師者訓注也然其進孰為之先士良等恧縮不得對氣益奪縉紳賴以為彊屈宋作衙官杜審言為隰城縣尉蘇味道為天官侍郎審言集判出謂人曰蘇味道必死人驚問故答曰彼見吾判即當羞死又常語人曰吾文章當得屈宋作衙官吾筆當得王羲之北面其矜誕類此出山揖穆伯長嘯輕衣簪李白詩輕薄團頭梁祖嘗言于昭皇趙崇是輕薄團頭于鄂州座上佯不識駱駞呼山驢王遂阻三事新書謗齊丘之文江南野史宋齊丘凡建碑碣皆齊丘之文命韓熙載八分書之常曰其文穢而且臭時見謗誹風敎偷薄進士尤甚皇甫湜答二生書近風敎偷薄進士尤甚廼至有一謙三十年之說争為虛張以相高自謾詩未有劉長卿一句已呼阮籍為老兵矣筆語未有駱賔王一字已罵宋玉為罪人書字未識偏傍高談稷契讀書未知句度下視服鄭此時之大病所當嫉者土俗輕揚李濟翁嘗謂揚州者以其土俗輕揚故名其州狂疎人栁宗元與楊誨之書積八九年日思摧其形鋤其氣雖甚折挫然己得號為疎狂人陸羽更隠苕溪自稱桑苧翁闔門著書或獨行野中誦詩擊木裴囘不得意或慟哭而歸故時謂今接輿也病狂陳京帝器京謂有宰相才欲用之㑹病狂忽自刺弗殊又言中書舍人崔邠御史中丞李泌訕己帝使詰辨無状狂態蘇世長從獵涇陽大獲帝詫曰今日畋樂乎世長曰陛下察萬機事游畋不滿十旬未為樂也帝色變既而笑曰狂態發邪曰為臣計則狂為陛下計忠矣艾氣韓熙載性好謔浪有投䞇太荒惡者使妓炷艾燻之俟來即歸之出乃嗅之曰子之巻軸何多艾氣也聞者大笑負寵而驕蕭穎士安祿山寵恣穎士隂語栁并曰胡人負寵而驕亂不久矣東京其先限乎盛氣驕愎楊國忠性疏恱㨗給硜硜處决樞務自任不疑盛氣驕愎百僚莫敢相可否夸言驕色裴耀卿特進盖嘉運破突騎施還詔為河西隴右節度使因令經畧吐蕃嘉運以新立功日酣遨未赴屯耀卿言于帝曰嘉運精進勇烈誠有餘然臣見其夸言驕色切憂之恐不足與立事氣驕蹇張九齡安祿山初以范陽偏校入奏氣驕蹇九齡謂裴光廷曰亂幽州者必此胡雛也驕侈不循法度隴西恭王博乂高宗時擢累禮部尚書恃進驕侈不循法度帝賜市書絹二百匹以愧切之然不自克也勇八無勇附白節因危見名以勇聞達徳智仁勇三天下之達徳勇者不懼用人之勇去其怒仁者必有勇勇者不必有仁率義之謂勇見義不為無勇也威而不猛雖猛何為勇而無禮則亂致身事上見危致命好勇而不好學其蔽也亂禮所貴於勇敢者貴其能行禮義也故勇敢彊有力者天下無事用之于禮義天下有事用之于戰勝用于戰勝則無敵用之于禮義則順理外無敵内順理此之謂盛徳故盛王之貴勇敢彊有力如此也若不用于禮義戰勝而用于争闘則謂亂人刑罰行于國所誅者則亂人也勇而不中禮謂之逆君子尚勇乎君子有勇而無義為亂小人有勇而無義為盗君子惡勇而無禮者子貢惡不遜以為勇者遜順也勇爵傳齊荘公朝指州綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之役先二子鳴荘公為勇爵注設爵位以命勇士也期死期必也不顧義理期于必死也狼瞫曰供用謂之勇死國用也勇不作亂勇則害上不登於明堂死而不義非勇也勇夫仡仡勇夫射御不違我尚不欲銳氣凌雲精誠貫日銳敏精勇是無勇也忘家忘身百夫之防萬人之敵勇者若怯訓勇力之士時使晉侯使荀賔為右如虎如貔桓桓赳赳客氣非真勇也素厲空猛無勇陵弱違彊􅇒弱非勇也毛遂之氣終出三千宜僚之才可當五百内亂不與外患不避我武惟揚仡仡勇氣洸洸武威勇於敢則殺一何壮也臨辜而屢斷勇也白刃可蹈佽飛之官以斬蛟楚佽飛以寶劍渡河有兩蛟夾船乃斬之楚王聞其勇乃置佽飛之官刺兩虎子曰卞莊子之勇可謂成人矣謂刺兩虎賈餘勇齊高固入晉師桀石以投人以徇衆曰欲勇者賈餘勇帶布主人懸布堇父登之及堞而絶之蘇而復上者三主人辭焉𢃄其斷布以徇于軍三日􅞋禍子産曰小人之性釁于勇􅞋于禍以足其性而求其名焉非國家之利也子曰由也好勇過我賈餘見上注奪志匹夫不可奪志動心孟子曰我四十不動心弟子曰若是則夫子過孟賁逺矣眥張血迸朱亥髮上衝冠藺相如攫戾執猛納堅摧剛斬龍澹臺滅明字子羽齊璧渡江乃㧞劍斬龍啗彘飲巵樊噲之誚項羽持璧睨柱相如之懼秦王子路曰搴旗執馘由也能之夫子曰勇哉由之勇賢於丘無拳無勇詩州綽乃欒氏之勇郭最為齊侯之雄相如進缶以搦秦澠池之㑹毛遂捧盤而盟楚遂按劍歴階捧銅盤跪令楚王插血而盟好勇太叔多材而好勇袒裼暴虎詩行行子路行行如也子曰由也不得其死焉行行勇也義勇冠三軍李陵李廣斬蛟晉鄧遐澠水有蛟為人害遐㧞劍入水蛟繞其足截蛟數斷而出也㧞虎箭桓石虎趫㨗絶倫獵圍中見猛獸被數箭諸将知其勇戲令㧞箭石虎急徃㧞箭獸跳虎亦跳高于獸獸伏又㧞得一箭而歸刺虎上召李廣男禹使刺虎懸下圈中未絶詔令出之禹從落中以劍斫地累欲刺虎上壮之遂止焉好勇疾貧亂也拳勇見壮門注是子之勇也有勇且知方也以賢勇智無勇是無勇也何以堪之素厲容氣見上非夫非丈夫也不武臨事而懼戰陣無勇非孝也無拳無勇拳力也末之卜也末㣲也言其無勇而卜國不占失軾崔杼作亂陳不占将往食則失哺車則失軾比至聞戰聲于門外驚怖而死蒯聵投車衛太子蒯聵與鄭人戰于䥫望見鄭師懼而自投車下子良援而乗之曰婦人也趙羅之痁作傳䥫之役趙羅無勇縻之吏詰之御曰痁作而伏縻束之也淺為丈夫傳畏威若怯勇者若怯也違彊陵弱非勇也威惕氣衰奪氣褫魄有命出征不思後勁無剛嘗寇終愧先奔懦夫懦弱也宫之竒為人也懦勇於不敢則活老子勇可習魏九州春秋曰劉表攻西州州長杜子緒守拒時栢季長在城中聞兵勢恐入室牽被覆頭攻半日稍出面明日側立而聴三日出問消息四五日負楯親闘謂子緒曰勇可習者也孔票果殺志𤣥大業末從父客太原以票果諸惡少年畏之發憤大呼鼻耳流血王君廓帝謂侍臣曰昔藺相如叱秦王目眥皆裂君廓往擊建徳李勣遏之至發憤大呼鼻耳流血其勇何特古人哉李𤣥道李宻據洛口署記室宻敗為王世充所執衆懼不能寐獨𤣥道曰死生有命憂能了乎寝甚安及見世充辭色不撓釋縛為著作佐郎勇不為怯者死陳子昻八科勇者徇死怯者所不從同上性沉勇寡言薛訥性沉勇寡言其用兵臨大敵壯本傳任氣崔光逺其勇無前劉仁軌賛曰仁軌等以兵開定四夷其勇無前至奉上則瞿瞿若不及為人蹻勇史洪肇為人蹻勇走若奔馬五代史力兼數人李罕之為人蹻勇力兼數人同上大節不撓者勇盧藏用紀信碑府君乃咨謀僚吏稽古訓典以謂大節不撓者勇也握鈎伸鐵撫梁易柱皮日休鹿門隠書桀紂之君握鈎伸鐵撫梁易柱手格熊羆走及虎兕力甚也聖人隠而不言懼尚力而虐物貪勇以䘮生雖白面書生有雄胆大畧崔顥薦樊衡臨難不决非勇尉遲敬徳投石賈勇思憤栁宗元送獨孤書記投石而賈勇思所以奮力遇不可必達其志段秀實賛曰大尉為人姁姁常低首拱手行步言氣卑弱未嘗以色待物人視之懦者也遇不可必達其志非偶然者非孔子所謂仁者必有勇乎壯九壯士不尚力附白孔武有力有力如虎筋骨秀出見下注蔽才管子曰鄉有拳勇股肱之力筋骨秀出于衆者則以告有司有而不告謂之蔽才有罪也勇力時使傳晉悼公使荀賔為右司士属焉使士訓勇力之士時使之也壯有所用禮仡仡勇夫仡仡壮貌方剛及其壮也血氣方剛戒之在闘百夫之特之防獷猤壯貌勝人有力自勝者彊用於戰勝見上萬夫之敵一何壮也不務仁人惟力是恃犖投盖於稷門奡行舟於陸地壯士角力壮士角力校量其力也論力校論其力臝股肱言出其臂脛以示壮也小人用壯投盖見上注桀石齊高固入晉軍桀石以投人建大車狄虒彌建大車輪而䝉之以甲以為櫓左執之右㧞㦸以成一隊孟獻子曰有力如虎抉懸門叔梁紇抉懸門使開以出門手搏熊彘廣陵属王胥挾輈公孫閼與潁考叔争車考叔挾輈以走六鈞顔高之弓六鈞鈞三十斤七札養由基蹲甲射之徹七札負舟荘子曰藏舟於壑自以為固夜半有力者負之以趨昧者不知也㧞山項羽歌曰力㧞山兮氣盖世扛鼎烏獲扛鼎舉千鈞㧞距甘延夀投石抜距絶于等倫㧞木楚詞曰一夫九首㧞木九千言多力曰㧞盡九千盪舟奡能陸地行舟項羽力能扛鼎才氣過人曵牛魏許禇仲康禦冦粮乏以牛與賊易食賊來取牛牛輒奔還禇乃以手逆曵牛尾行百餘步賊不敢取牛而走力巨舒鈎索鐵並紂能也不尚力子不語怪力亂神四者無益于敎化驥不稱其力而稱其徳恃力者亡無所用之雖壯奚為羿善射奡盪舟俱不得其死自勝者彊柔弱勝剛彊梁者不得其死老子㧞山而終見自亡盪舟而不得其死孔持牛折角辛讜方讜之少耕于野有牛闘衆畏奔踐讜直前兩持其角牛不能動久而引觸竟折其角里人駭異有力絶人宋之問父令文有力絶人都下有牛善觸人莫敢嬰令文直往㧞取角折其頸殺之封常清天寶末入朝而安祿山反帝引見問何䇿以討賊常清見帝憂因大言曰天下太平久人不知戰然事有逆順勢有奇變臣請馳至東都悉府庫募驍勇排馬箠渡河計日取逆賊首以獻闕下天子壮之王思禮高麗人哥舒翰以功授右衛将軍從討九曲後期當斬臨刑翰釋之思禮徐曰死固分也何復貸為諸将北之舒鈎梁崇義力能舒鈎抉闗李國臣力能抉闗手舉百斤五代楊行宻為人長大有力能手舉百斤開兩弧而脉不僨徙巨石而􅒥如流有盪舟如㳂者有抉鼎如飛者有綯鍵如昩者開兩弧而脉不僨徙巨石而􅒥如流異哉果以力駭世而聞于上也劉禹錫原力誇敵人而戲角抵捽期門而振礿服同上膂力絶人王雄誕少彊果膂力絶人舉七尺碑張芬曽隨韋南康軍曲藝過人力舉七尺碑定雙輪水磑酉陽雜爼羅穎膂力過人常嗜擲弄石毬可三鈞餘野史壯士血相見杜甫贈嚴僕射燕趙饒壮士盖風俗之然李白送趙四曵裾戎幕之下専弄文墨為壮夫捧腹甚未可也栁宗元送獨孤書記力搏虎長孫詮力排南山三壮士李白梁甫吟力排南山三壯士齊相殺之費二桃背船綿竹王俳優有巨力腰背一船船中載十二人背船舞河傳一曲無困乏百家鱠力者不在於角觝而在於侵陵皮日休鹿門隠書白孔六帖卷二十九
