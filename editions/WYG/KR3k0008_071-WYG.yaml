body:
  text: 白孔六帖卷七十一唐白居易原本宋孔傳續撰侍中一中書令二尚書令三太師四太傅五太保六太尉七司馬八司徒九司空十門下侍郎十一中書侍郎十二僕射十三樞宻十四左右丞十五侍中一白貂蟬之貴金貂之寵漢書曰侍中以金蟬貂冠也金取堅蟬取潔貂取温也㗋舌之司應瑗曰侍中㗋舌萬機珥貂即貂冠也佩璽見漢官入侍帝帷出負國璽侍中親侍帷幄山濤爲侍中親侍帷幄血湔御衣晉嵇紹爲侍中王師敗百官皆奔惟紹不去被害于帝側血湔御衣及定左右欲浣之帝曰此嵇侍中血勿令去也七車漢武時張寛爲侍中從行車第七車有對星之事三代漢慿魴字老孫父子兄弟三代爲侍中七葉金張之家七葉爲漢侍中鵕䴊漢書侍中皆冠鵕䴊戰國䇿曰秦始皇破趙得以賜侍中重席戴慿事見講論門四代晉呉郡陸仲元晉太尉玩曽孫也自玩至仲元四代爲侍中時人方之金張二族也宻近應劭漢官儀曰侍中周官也侍中便蕃左右與帝升降卒思近對拾遺補闕百寮之中莫宻於兹也桑宏羊年十三爲侍中辟強留矦子張辟強爲侍中年十五從容諷諫張衡拜侍中恒居幄内從容諷諫拾遺左右漢尊儒學選在戴慿晉任忠貞事先嵇紹居金貂之貴孔門下省侍中二人正二品掌出納帝命相禮儀凢國家之務與中書令参總而顓判省事百官志自露布以上乃審其餘覆奏畫制可而授尚書省行幸則負寳而從版奏中嚴外辨還宫則請降輅􅄙嚴皇帝齊則請就齋室将奠則奉玉幣盥則奉匜取盤酌罍水賛洗酌泛齊受虗爵進福酒皆左右其儀饗宗廟進瓉而賛酌鬱酒既祼賛酌醴齊藉田則奉耒四夷朝見則承詔勞問臨軒命使冊皇后太子則承詔降宣命慰問聘召則涖封題發驛遣使則給魚符凢官爵廢置刑政損益授之史官既書復涖其記注職事官六品以下進擬則審其稱否而進退之百官志武徳元年改侍内曰納言三年曰侍中龍朔六年改門下省曰東䑓侍中曰左相武后光宅元年曰納言垂拱元年改門下省爲鸞䑓開元元年曰黄門省侍中曰監天寳元年曰左相同上平治尚書省滯訟魏徴為侍中尚書省滯訟不决者詔徴平治徴素不習法但存大體處事以情人人悦服進鄭國公帝嗟其言王珪遷侍中它日進見有美人侍帝側本廬江王媛􅁎也帝指之曰廬江王不道賊其夫而納其室何有不亡乎珪避席曰陛下以廬江王是耶非耶帝曰殺人而取其妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡父老曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡今陛下知廬江之亡其姬尚在竊為陛下以為是審知其非所謂知惡而不去也帝嗟美其言恐女謁用事大臣隂謀張行成遷侍中兼刑部尚書晉州地震不息帝問之對曰天陽也君象地隂也臣象君宜動臣宜静今静者顧動恐女謁用事大臣隂謀又諸王公主參承起居或伺間隙宜明設防閑且晉陛下夲封應不虗發伏願杜未萌帝然之位上衮竇懷貞再遷侍中方太平公主干政傾已附離日視事退輙詣公第刺取所欲睿宗為金仙玉真二公主營觀費鉅萬諫者交䟽不止惟懷貞勸成之躬䕶後作族弟維鍌諫曰公位上衮當思獻可替否輔天子而計較尾木雜厠工匠間使海内何所瞻仰乎不答督繕益急傳三十四諸司奏議悉心糾駮張文瓘後拜侍中兼太子賔客諸司奏議悉心糾駮故帝委之或時移疾它宰相奏事帝必問與文瓘議未若不者曰徃共籌之或曰已議則皆報可傳三十八諷獵魏知古先天中為侍中從獵渭川獻詩以諷乎制褒荅并賜物五十叚明年封梁國公傳五十一不可以賞功張九齡范陽節度使張守珪以斬突可汗功帝欲以為侍中九齡曰宰相代天治物有其人然後授不可以賞功國家之敗由官邪也帝曰假其名若何對曰名噐不可假也有如平束北二㓂陛下何以加之遂止請出二息補外源乾曜進位侍中建言大臣子并求京職俊乂率仕外官非平施之道臣三息俱任京師請出二息補外以示自近始詔曰乾曜身率庻僚以譲既請外其子又復下遷傳不云乎范宣子譲其下皆讓晉國之人於是大和道之或行仁豈逺哉其令文武官父子昆仲三人在京司者分任于外由是公卿子弟者皆出補列傳五十二賜妓樂奉朝請馬燧拜司徒兼侍中賜妓楽奉朝請而已與李晟皆圗像凌煙閣九年卜月自來朝詔無拜時李晟已卒帝顧曰尚記與太尉晟俱來邪今乃獨見公因悲涕燧亦疾而仆帝親掖之詔左右扶去送至陛遂乞骸倚侍中如衡華蜀人見継岌請留崇韜鎮蜀從襲䓁因言崇韜有異志繼岌謂崇韜曰陛下倚侍中如衡華尊之廟堂之上期以一天下而制四夷必不棄元老於蠻夷之地此事非千敢知也五代史十四賜宸扆台衡二銘馬燧事見銘門特免十死劉幽求拜侍中璽詔曰頃王室不造中宗厭代戚孽專亂将愪社稷朕與王公皆幾于難幽求處危思奮翊賛聖儲協和義士震殄元惡國家之復存繄幽求是賴厥庸茂焉朕用嘉之雖胙已土宇而賦入未廣昔西漢行封更擇多戸東京定賞復増大邑宜加賜實封二百户子子孫孫傳國無絶特免十死銘諸鐡劵以傳其功得蒲萄不食陳逹叔事見蒲萄門頡利懼而走楊恭仁收黄門侍郎尋為凉州總管就加納言突厥頡利率衆數萬獵其境恭仁應機設拒張疑屯虗幟示之頡利懼而走諫金塗九鼎九鼎欲成用黄金塗之納言姚璹曰鼎者神噐貴在質朴豈待塗金為符曜耶請率先百官出任刺史張安中則天嘗與宰臣議及州縣官吏納言李嶠等奏曰臣等謬膺大任不能使兵革止息倉府殷盈戸口尚有逋逃官人未免貪濁風夜惶懼不知啟處㐲思當今要務莫過富國安人富國安人之方要擇刺史竊見朝廷物議英不重内官輕外職毎除授牧伯皆再三披訴比來所遣外任多是貶累之人風俗不澄實由於此臣等請輟近侍率先具寮韋嗣立對曰臣以庸愚謬膺奨懼承乏外臺庻當盡節於是帶夲官撿挍汴州刺史舊史真宰相韋安石知納言時二張武三思寵横安石數折辱之㑹侍宴殿下易之引蜀商宋覇子等博塞后前安石跪奏商等賤類不當戲殿上顧左右引出坐皆失色后以安石辭正改容慰勉鳳閣侍郎陸元方自以為不及退告人曰韋公真宰相陛下負臣臣不負陛下珪遷侍中帝使祖孝孫以樂律授宫中音家妓不進數被讓珪與温彦博同進曰孝孫脩謹士陛下使教女樂又責譙之天下其以士為輕乎帝怒曰卿皆我心腹乃附下罔上為人㳺説邪彦博懼謝罪珪不謝曰臣夲事前宫罪當死陛下矜其性命引至樞宻責以忠効今疑臣以私是陛下負臣臣不負陛下帝黙然慙遂罷韓宏以功加韓宏宣武節度憲宗用兵淮西拜宏行營都統使扞両河元濟平以功加侍中上書戒中宗中宗復位以桓彦範為侍中上書戒帝曰伏見陛下臨朝視政皇后必施帷殿上預聞政事臣愚謂古王者謀及婦人皆破國亡身傾輈繼路且以隂承陽違天也以婦凌夫違人也違天不祥違人不義故書曰牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預外政也伏願上以社稷為重令皇后無居正殿干外朝深居宫掖修隂教以輔佐天子挺直安樂公主舘第成中宗臨幸宴從官賦詩御史大夫知政事李日知卒章獨以規戒睿宗他日謂曰嚮時雖朕亦不敢諫非公挺直何能爾即拜侍中焚藁高儉為侍中進上詳整允有獻納縉紳皆属以日奏議未嘗不焚藁家人無見者甚得大臣體郝處俊為侍中自參綜朝政毎與上言議必引經籍多所匡益甚得大臣之體以應對舊史諫廢王后韓瑗進侍中兼太子賔客后之廢瑗雪泣言曰皇后乃陛下在藩時先帝所娶今無罪輙廢非社稷計不納明日復諫曰王者立后配天地象日月匹夫匹婦尚知所擇况天子乎詩云赫赫宗周褒姒滅之臣讀至此常輟卷太息不圖夲朝親見此祸宗廟其不血食乎帝大怒詔引去出禇遂良貶潭州都督明年瑗上言遂良受先帝顧託一徳無二向日論事至誠懇切詎肯令陛下後堯舜而塵史䇿哉願寛無辜以順衆心帝曰遂良之情朕知之矣其悖戾好犯上朕責之詎有過邪瑗曰遂良社稷臣蒼蝇㸃白傳致有罪昔㣲子既去商以亡張華不死晉不及亂陛下富有四海安於清泰忽驅逐舊臣遂不省察乎帝愈不聴瑗憂憤自表歸田里不報王侍中在唐王智興曽自郡賫事赴上都宿郾城逆旅遇店婦将産見二人入智興所寝之舍驚曰徐州王侍中在此又曰所生子後五嵗當以金瘡死智興志之及至期復過店問婦所生子云近因斧傷已卒矣廣記中書令二白􅃫池晉荀公曾為中書監除尚書令人賀之荀曰奪我鳳凰池諸人反相賀邪雞樹中書省有雞棲樹專車之貴晉和嶠為令茍朂為監例同車嶠嫉朂邪謟先登車專席而坐不容朂朂乃引偹車監令異車自此始也隔座之榮呉録紀隲為中書令父亮為尚書令毎朝㑹帝以雲毋屏風隔其坐也丞相之上應劭注中書令位在丞相之上儒宗晉賀循字彦先為中書令時朝廷凝滯皆諮焉為世儒宗同處機宻晉陳淮為中書令張華為監淮與華同處機宻而雅崇華每至直月有詔書無大小取先示華華了不措意華得詔書不以示准孔中書省令二人正二品掌佐天子執大政而總判省事百官志凢王言之制有七一曰冊書二曰制書三曰慰勞制書四曰發敕五曰敕㫖六曰論事敕書七曰敕牒皆宣署申覆然後行焉同上置降匈奴五原塞温彦博為中書令突厥降詔議所以安邉者彦博請如漢置降匈奴五原塞以為扞蔽與魏徵廷争徵不勝其言天子卒從之後突厥可汗弟結社謀反帝始悔有决勝帷幄定社稷功房𤣥齡太宗即位為中書令第功班賞以如晦等功第一餘皆以次叙封拜帝顧羣臣曰朕論公等功定封邑恐不能盡無有諱各為朕言之淮安王神通曰義師起臣兵最先至今𤣥齡等以刀筆吏居第一臣未諭帝曰叔父兵誠先至然未嘗躬行陣勞故建徳之南兵敗不振今元齡等有决勝帷幄定社稷功此蕭何所以先諸将也列傳二十寜藉多人薛元超帝嘗宴諸王召元超與從容謂曰任卿中書寜藉多人哉俄拜中書令猶知門下省長孫無忌檢校中書令猶知門下省帝欲立昭儀為后無忌固言不可許敬宗數勸長孫無忌厲色折拒列傳三十改后者請更擇貴姓禇遂良高宗將立武昭儀遂良諌曰吾奉遺詔若不盡愚無以下見先帝遂良曰先帝疾執陛下手語臣曰我兒與婦今付郷且徳音在耳何遽忘之翌日復言對曰必欲改后者請更擇貴姓昭儀昔事先帝身接帷笫奈天下耳目何帝羞黙遂良因致笏殿階叩頭流血曰還陛下此笏丐歸田里帝大怒引出武后從帷後呼曰何不撲殺此獠諫立武后來濟遷中書檢校吏部尚書帝将以武氏為后濟諫曰王者立后以承宗廟宜擇禮義名家幽閑令淑者副四海之望稱神祗之意故文王興姒闗雎之化蒙被百姓其福如彼成帝縱欲以婢為后皇統中㣲其禍如此惟陛下詳察問馭下所宜來濟帝嘗從容問馭下所宜濟曰昔齊桓公出遊見老人命之食曰請遺天下食遺之表曰請遺天下衣公曰吾府庫有限安得而給老人曰春不奪農時即有食夏不奪蠶工即有衣由是言之省徭役馭下之宜也於時山東役丁歳别數萬人又議取庸以償雇紛然煩撓故濟言及之問天與帝異稱邢文偉為内史后御明堂詔文偉曰天帝一也制曰郊后稷以配天祀文王於明堂以配上帝奈何而一對曰先儒執論不同昊天及五方總六天帝后曰帝有六則天不同稱固矣文偉不能對中書令可一日不見天子乎王及善留拜内史及善不甚文而清正自持臨事不可奪有大臣節時二張怙寵毎侍宴無人臣禮及善數裁抑之后不悦曰卿年高不宜侍遊宴但撿校閣中及善即移病餘月后不復問及善歎曰中書令可一日不見天子乎遂乞骸骨猶不許改文昌左相同鸞臺三品以中書令執政事筆裴炎改中書令舊宰相議事門下省號政事堂長孫無忌以司空房元齡以僕射魏徵以太子太師皆知門下省事至炎以中書令執政事筆故徙政事堂於中書省列傳四十二自裴度以勲徳居而敏中以㤙澤進白敏中加中書令自裴度以勲徳居而敏中以恩澤進列傳獨不詭隨蕭至忠為侍中中書令時楚客懷姦植黨而韋巨源楊再思李嶠務自安無所弼正至忠介其間獨不詭隨時望翕然歸重帝亦曰宰相中至忠最憐我列傳四十八中書令幸二貟張嘉貞初嘉貞在兵部而説已為侍郎及皆相説位其下議論無所譲故説不平説代其處嘉貞衘悔謂人曰中書令幸二貟何相廹邪傳五十二中書舍人後十年為令嘉貞其始為中書舍人崔湜輕之後與議事正出其上湜驚曰此終其座後十年而為中書令校中書令考二十四郭子儀以身為天下安危者二十年校中書令考二十四詔乗輅謁太廟視事尚書省李晟張延賞當國故與晟有隙宻言晟不可持兵帝感其言貞元三年帝坐宣政殿引見晟偹冊禮拜太尉中書令罷其兵詔乗輅謁太廟視事尚書省賜良馬錦綵千計傳七十九賜錦袍魏元忠拜中書令當朝用事羣臣莫敢望謁告上冢詔宰相諸司長官祖道上東門賜錦袍給千騎四人侍賜銀千兩及還帝為幸白馬寺迎勞之姚崇遷紫㣲令固辭寶封乃停舊食上事鑒十章張九齡上事鍳十章􅃅千秋金鍳録以伸諷諭令君四俊張嘉貞所薦苗延嗣貟嘉静吕太一崔訓皆位清要日與議政事故當時語曰令君四俊苗吕崔貟賜詩裴度拜中書令上已宴曲江度不赴帝賜詩見詩門長得卿在中書舊史薛元超高宗時為中書侍郎特承恩遇嘗召入與諸王同預私讌又重其文學政理之才曽謂元超曰長得卿在中書固不藉多人自舉一人岑文夲善文辭李靖薦于帝擢中書舍人時顔師古為侍郎自武徳以來詔誥或大事皆所草定及得文夲號善職而敏速遇之或策令叢遽敕吏六七人泚筆侍分口占授成無遺意師古以譴罷温彦博為請帝曰師古綀時事長於文誥人少逮者幸得復用朕自舉一人公毋憂乃授文夲侍郎即專典機要副貳舊史崔沔當官正色未嘗撓汨拜中書侍郎或謂沔曰今之中書皆是宰相承宣帝命侍郎雖是副貳但署位而已甚無事也沔曰不然設官分職上下相維各申所見為濟理豈可俛黙偷安而為懐禄士也自是毎有制敕及曹事沔多所異同張説頗不悦出為魏州刺史尚書令三白南宫故事後漢鄭宏為尚書令前後所有補益政者皆著之為南宫故事以竒才拜擢後漢張安世字子儒上幸河東亡書一篋安世曰臣識之具作其書後求得亡書相校無遺失以竒才拜擢尚書令乞留宿衞後漢尚書黄香為東郡太守乞留宿衞拜尚書令送不出郭陳蕃字仲舉為豫章守性方聳峻不接賔客徴為尚書令送者不出郭門問車駕陳嶠為尚書令魏明帝嘗陳車駕卒至尚書門嶠跪問曰陛下何之帝曰欲案文書耳嶠曰此臣職分陛下不宜臨臣不稱職請黜退帝慙而還八座晉百官名尚書令僕射六尚書為八座獨座後漢世祖詔尚書令司𨽻校尉中丞朝會皆專席而坐京師號為三獨座孔尚書省尚書令一人正二品掌典領百官其制有六尚書百官志三十六凢上之逮下其制有六一曰制二曰敕三曰冊四曰令五曰教六曰符下之逹上其制有三一曰闗二曰刺三曰移同上詔趨詣省視事郭子儀至自涇陽恩賚崇縟進拜尚書令懇辭不聼詔趨詣省視事百官徃慶敕射生五百騎執㦸寵衞子儀確譲且言太宗嘗踐此官故累聖曠而不置皇太子為雍王定關東乃得授詎可猥私乎臣隳大典云云帝不獲已許之具所譲付史官六十二改尚書省曰中䑓龍朔二年改尚書省曰中䑓廢尚書令尚書曰太常伯侍郎曰少常伯光宅元年改尚書省曰文昌䑓俄曰文昌都省垂拱元年曰都䑓長安三年曰中䑓武徳中太宗初為秦王嘗親其職自是闕不復置儀形端揆唐六典凢庻務皆㑹而决之太師四白吕尚文王得吕尚以為太師成王尊為太師號曰尚父世家三周公召公為保周公為師相成王為左右書尊敬尊敬師傅漢詔曰國之将興尊師重傅青蓋車董卓為太師乗青蓋車三公御史大夫已下皆拜後六十二靈夀杖平帝拜孔光為太師毎朝賜靈夀杖十日賜食前五十一冠三公之首為百揆之儀教事師也者教之以事而喻諸徳也禮六蔚為帝師文選周寵元勲任先吕尚漢崇碩徳選在孔光當至聖之朝居太師之任出則有師禮問道帝入太學承師問道大戴禮天遺文王卜畋史卜卦曰非熊非羆天遺汝師六韜布衣足矣張良曰為萬户侯帝王師布衣足矣出世家二十五張禹以論語教授成帝前五十一赫赫師尹民具爾瞻詩孔天子所師法太師太𫝊太保各一人為三師三師天子所師法無所縂職非其人則闕百官志三十八仰為元老馮道周太祖拜道太師兼中書令道少能矯行以取稱於世及為大臣尤務持重以鎮物事四姓十君益以舊徳自處然當世之士無賢愚皆仰道為元老而喜為之稱譽五代史五十四唐制置太師以師範一人儀型四海太師官之極五代後唐天成三年詔訓導之官唐六典三師訓導之官也其名即周之三公然非道崇重則不居其位贈天寳以前唯以其官贈長孫禎武獲竇毅韋元貞張説裴光庭而已通典太傅五白周畢周成王即位周公畢公竝為太傅史紀四禹彪鄧禹鄧彪並為太傅後漢三十四聽政鄧彪為太傅和帝㓜百官總已聽於彪恩寵之異莫之與比後紀四横劒趙喜為太傅皇太子諸生尊卑無别喜乃横劒正色以正之後十六絶席禹字伯逹遷太傅朝夕進食與三公九卿絶席也後三十四賜杖世祖即位卓茂以徳行見求時年七十餘拜太傅賜几杖後十五奪服奪服以毋憂自乞聼以太傅行丧三年詔賜牛酒奪服後二十七嗜鮑魚賈誼曰文王使太公望傅太子發嗜鮑魚太公不與文王曰何以不與公曰禮鮑魚不登于俎豈有非禮而養太子哉王陵王陵為太傅漢書周寵元勲任先吕尚漢崇碩徳選在王陵乗輿鍾繇事見上注陳蕃靈帝䇿書以陳蕃為太傅後五十六臨軒懸樂見三公門孔傳之徳義通典太傅古官注云傅傅之徳義也杜重威檢校太師守太傅太保六白召公召公為保書贈刀見三公注賜絹咸寜二年制故太保王祥司空王基各賜絹五百匹晉録云保也者慎其身以輔翼之而歸諸道者也禮六當垂拱之代居論道之司輔翼見上入則有保禮闕朝王祥自休徴為大保中丞侯光上言祥久疾闕朝㑹詔曰太保所毗倚以隆道引理非有司所得議晉三周籠元勲任先邵奭晉推碩徳選在王祥孔止李順節班見百官孔緯進兼太保時天武都頭李順節䟽暴人也以浙西節度使兼平章事䑓史白已謝當班見百官緯判止之明日順節盛服至則無班怏怏去它日見緯以為言緯曰固疑公見望也且百辟卿士天子廷臣班見宰相以宰相為之長公提天武健兒據堂授禮安乎子欲用之去都頭乃可順節慙縮不敢言列傳八十八竇季謀天實以前唯以其官贈竇季謀一人而已通典即其家拜五代趙光逄以司徒致仕天成中即其家拜太保封齊國公太尉七白秦官太尉秦官掌武事漢書掌罰郊社大尉掌四方兵事行掌罰郊社之事百官志張禹在位三世忠孝彌篤牟融典職六年勤勞不息雲屏永和五年鄭宏代鄧彪為太尉舉第五倫為司空毎正朝見宏曲躬自卑帝知致雲母屏風分隔其間後二十三錦被朱寵為太尉食脱粟飯布被上賜錦被肉米不取之布被李固常盖布被所食麥飯麤飯司馬包為太尉常食麤飯厚重周勃為太尉為人厚重安劉高祖曰周勃厚重少文能安劉者必勃也可使為太尉貞廉楊乗貞廉曰我有三不惑為太尉四世楊震秉賜彪四世為太尉讓位陳蕃拜太尉譲於胡廣王暢等臨朝歎曰黃憲在吾不敢先佩印綬漢寵元勲任先周勃晉尊碩徳選在王祥不通州縣書王寵為太尉在位非公事不通州縣書其所辟命皆是海内之長者父來張酺為太尉父尚在酺每一遷轉乃一到洛父來適會正臘公卿罷朝俱賀奉酒上夀極歡人莫不榮之禮錢太尉劉虞譲位於羊士靈帝為三公皆㡏禮錢千萬有舉緼袍示之曰臣有唯此而已遂不拜輸西園曹嵩靈帝時貨賂中官又輸西園一萬億故位至太尉也臨軒懸樂見上注辭劉寳拜太尉自陳年老固辭上不許賜几杖宅一區不朝孔唐興太尉惟七人李徳裕䇿功拜太尉進封趙國公徳裕固譲言唐興太尉惟七人尚父子儀乃不敢拜近王智興李不義皆超拜保傅蓋惜重此官裴度為司徒十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公毋固辭列傳一百五毛髪森竪宣宗即位徳裕奉冊太極殿帝退謂左右曰向行事近我者非太尉邪毎顧我毛髪為森竪即日罷為檢校司徒荆南節度使秦王兼之武徳初秦王兼之永徽中無忌為之唐六典注録尚書續漢書曰帝初即位置太尉録尚書乗輿上殿魏葦歆事見三公門司馬八白祈父大司馬見詩傳雎鳩傳曰少昊氏以鳥名官雎鳩氏司馬也注云王雎也鷙而有别故命為司馬以主法制統六師尚書司馬統六師平邦國注云夏官卿也主戎馬之事掌國征伐統正六軍治邦國之亂田苴立功史記晏子薦田苴曰文能附衆武能却敵乃為大司馬立大功景舍辭賞景舍為大司馬伐蔡有功楚王賞之舍辭不受司武宋司馬名周用吕尚大公望為司馬漢寵霍光光為司馬秉政十三年百姓充實兼領尚書注云成王之時畢公為三公兼領司馬職穰苴桓温竝為司馬九法黄帝時常以為大司馬掌建邦之九法也周任元勲寵崇吕尚漢推大節選在霍光當歸馬之朝雖云無事然雎鳩之職用偹不虞均萬人周禮司馬掌邦典政以平邦國以正百官以均萬人司徒九白周書薄違農父農父司徒也薄近也違繞也言司徒之職所以親近化擾於兆民以成乎其教也父子緇衣鄭武公父子並為周司徒善於其職國人美之為賦緇衣以明有國善善之功也詩曰緇衣之宜弓敝予又改為兮祝鳩傳少昊氏以鳥名官祝鳩氏司徒也注云祝鳩孝故司徒也主教民也掌邦教書曰司徒掌邦教敷五典擾兆民注地官也掌五常之教以安人也敬敷五教帝曰契百姓不親五品不遜汝作司徒敬敷五教在寛云云契為司徒而民成民成知五教之法六禮七教八政禮曰司徒修六禮以節民性明七教以興民徳齊八政以防民滛一道徳以同風俗芮伯書成王以芮伯為司徒君牙書穆王命君牙作周太司徒曰𢎞敷五典式和人則地官掌土地之圗周禮乃立地官大司徒之職掌建邦之土地之國與其民人之數佐王安擾邦國儉後漢儉寛為司徒卧布被又華歆為司徒以禄賜故人親戚帝聞歎曰司徒國之老乃蔬食布衣又王良婁布裙曵柴吏鮑恢不識知乃歎之夢呉録丁固夢松生腹上占者曰松字十八公也後十八年果為三公讓蔡謨字道明遷司徒固譲親舊曰我若作司徒将為後世所嗤義不敢邪詔書數下辭之樂劒晉王導受遺詔輔㓜主加葆羽皷吹及班劒冕服安帝詔侍中太常領司徒可衮冕服緑紱羽葆皷吹也小車晉王戎為司徒委事長史時乗小車而乃以手挿腰使望門而出入人不知其是台司漢用元勲任崇鄧禹晉推碩徳選在山濤况當至理之朝宜重薄違之任當歸馬之代居祝融之官教典周禮司徒掌邦教典以安邦國以教官府擾兆民孔謹奉詔長孫無忌太子承乾廢帝欲立晉王未决坐両儀殿羣臣已罷獨留無忌元齡勣言東宫事因曰我三子一弟未知所立吾心無仰即投床取佩刀自向無忌等敬争抱特奪刀授晉王而請帝所欲立帝曰我欲立晉王無忌曰謹奉詔異議者斬帝顧王曰舅許汝矣宜即謝王乃拜傳三十國家再造郭子儀收東都於是河東河西河南州縣悉平以功加司徒封代國公食邑十户入朝帝遣其軍容迎㶚上勞之曰國家再造卿力也丁儀頓首謝傳六十二李晟收長安李晟至梁帝感泣羣臣上夀且言晟蕩夷㓙憝而市不易㕓宗廟不震長安之人不識旂皷雖三代用師不能加之帝曰天生晟為社稷萬人豈獨朕哉拜晟司徒兼中書令實封千户傳七十九中人不朝服孔緯加司徒帝将郊見中尉樞宻使索宰相朝服有司白中人無衣冠助祭中尉怒責禮官必得緯言中人不朝服國典也陛下欲假借之則請以所兼官為之服諫官固執帝召謂曰方舉大禮為我容之列傳八十八百官志司徒一人唐史品秩章服皆同太尉唐六典隋置司徒皇朝因之歴代品秩章服皆同太尉復為三公通典隋及大唐復為三公司空十白周書若保宏父定辟若順也保安也宏父司空也辟君也言能順安司空之職而任之以定君臣之道也掌邦土書司空掌邦土居四民時地利注冬官卿也主國土以居民也士農工商四民使順天時分地利授之以土鳲鳩傳少昊以鳥名官鳲鳩氏司空也注云鳲鳩平均故為司空平水土平水土舜命伯禹作司空帝曰咨禹汝平水土惟時懋哉懋勉也典職六年後漢牟融為司空數有忠言章帝冊曰司空典職六年特加太尉兼領書成王時毛伯為三公兼領司空職歸免漢彭宣為司空王莽專權宣乃上書乞骸骨上印綬歸鄉又後漢第五倫為司空自陳老病乞歸帝詔以二千石奉終又東觀漢記宗堪為司空十四年歸印綬賜千石奉終兼總二官張華以中書監兼司空辭官徐邈為司空歎曰三公論道之官無其人則闕安以老病参之固辭不拜及沒後制賜故司空邈穀二千石錢四十萬臨軒懸樂見三公門受規陸玩字士瑶既拜司空有人詣之索酒杯瀉置柱梁之間祝曰當今之材以為柱石莫傾人梁棟耶玩笑曰感卿良箴既而歎謂客曰以我為三公是天下無人談者以為知言當歸馬之朝奉鳴鳩之職事典周禮司空掌事典以平邦國以經百官以生萬人以䜟命官後漢王梁君嚴世祖即位以赤伏符曰王梁主衞作𤣥武𤣥武水神司空掌土之官遂擢梁為大司空孔仍總朝政房𤣥齡進司空仍總朝政固辭帝遣使謂曰遜誠美徳也然國家相眷賴久一日去良弼如亾左右手顧公筋力未衰毋多辭列傳二十以外戚位三公長孫無忌進司空知門下尚書省事無忌辭又因高士亷口陳以外戚位三公嫌議者謂天子以私后家帝曰朕任官必以才不者雖親若襄邑王神符不妄授若才雖仇如魏徴不弃也詔曰黄帝得力牧為五帝先夏禹得咎繇為三王祖齊威得管仲為五伯長朕得公遂定天下公其勿遜列傳三十自唐以來無特拜者馬允孫時馮道拜司空司空自唐以來無特拜者有司不知故事朝廷議者紛然或曰司空三公宰相職也當叅為大政而宰相盧文紀獨以為司空之職祭祀掃除而已允孫皆不能决貟外郎一人直第裴寂䇿司空遣尚書貟外郎一人毎日更直寂第其為崇貴如此太宗祠南郊命寂與長孫無忌同昇金輅寂辭讓太宗曰以公有佐命之勲無忌亦宣力於朕同載叅乗非公而誰遂同乗而歸至親亦不虗授長孫無忌䇿拜司空固辭不許太宗曰朕之授官必擇才行若才行不至縱朕至親亦不虗授舊史三公不居宰輔王思禮代李光弼為河東節度副大使從平禄山收東京上元元年加司空自武徳以來三公不居宰輔惟思禮而已楊國忠天寶十三載冊拜楊國忠為司空其日雨止通典門下侍郎十一白拜於牀下漢成帝拜張禹少子於牀下為黄門侍郎恥同列魏夏侯元為黄門侍郎與皇后弟毛曽同坐元恥之明帝恨之左遷羽林監張華字茂先為黄門侍郎博覧圗籍四海之内若指掌千門萬户盡地而成孔門下侍郎二人正三品掌貳侍中之職百官志三十七龍朔二年改黄門侍郎曰東䑓侍郎武后垂拱元年曰鸞䑓侍郎天寳元年曰門下侍郎乾光元年曰黄門侍郎大厯二年復舊同上叅知機務薛稷遷黄門侍郎叅知機務與崔日用數争事帝前罷兄弟對管華近温大雅弟彦博大雅遷黄門侍郎彦博亦為中書侍郎兄弟對管華近帝嘗從容曰我起晉陽為卿一門爾制敕不便輙駮正李乂改黄門侍郎制敕不便輙駮正貴幸有求官者睿宗曰朕非有靳故李乂不可過爾傳四十四奉身纔一布嚢盧懐慎束帶至晚未嘗休偃崔元綜長夀中遷鸞䑓侍郎勤於政事毎在中書必束帶至晚未嘗休偃諌修蓬萊宫張文瓘為東臺侍郎時造蓬萊上陽合璧等宫文瓘因進諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宫室使土崩瓦解户口减半臣聞制化於未亂保邦於未危其弊不去必構禍難商鍳不逺近在隋朝臣願稍安撫之無使生怨帝深納其言士可殺不可辱張廷珪遷黄門侍郎監察御史蒋挺以監决杖刑稍輕朝堂杖之廷珪奏曰御史憲司清望耳目之官有犯當殺即殺當流即流不可决杖士可殺不可辱也議者以廷珪之言為是也竝舊史中書侍郎十二白畫餅魏明帝詔舉中書侍郎為吏部尚書盧毓曰得人與不在盧生耳舉選莫取名名如畫作餅不可啖毓舉韓曁敦篤至行帝乃用之又裴潜風神高邁為中書侍郎出入禁門見者皆肅然改容監令同車見上令門注孔侍郎二人正三品掌貳令之職朝廷大政叅議焉百官志品第四特豫宴于志寜為中書侍郎太宗嘗宴近臣問志寜豫宴安在有司奏敕召三品志寜品第四帝悟特詔豫宴犯吾鱗禆闕失杜正倫進中書侍郎與韋挺虞世南姚思亷論事稱㫖帝設宴具召四人者謂曰我聞神龍可擾以馴然領有逆鱗攖者死人君亦有之卿属遂犯吾鱗禆闕失朕其慮危亡哉思卿至意故舉酒以相樂也各賜帛有差忠勤見表崔知悌與戴至徳郝處俊等同賜飛白賛而知悌以忠勤見表執政久明習故事文辭詔敕多出其手郭正一問所以制戎者郭正一傳劉審禮與吐蕃戰大敗高宗詔羣臣問所以制戎者正一曰吐蕃曠年梗㓂師數出坐費粮資近討則瘞威深入則莫得其巢宂今上䇿莫如少募兵且明烽候勿事侵􅅰湏數年之遲力有餘人思戰一舉可破矣帝納之遼東周箕子國温彦博遷侍郎高麗貢方物高祖欲讓而不臣彦博執不可曰遼東本周箕子國漢𤣥莬郡不使北靣則四夷何所瞻仰帝納而止詔令叢繁裁可占授少選可待也劉禕之擢中書侍郎同三品是時詔令叢繁禕之思致華敏裁可占授少選可待也列傳四十三以謟佞取容王琚始為中書侍郎母居洛陽來京師讓琚曰爾家上世皆州縣職今汝無攻城野戰勞以謟佞取容海内切齒吾恐汝家墳墓無人復掃除也琚卒不免傳四十六美官蘇頲起為工部侍郎帝問宰相有自工部侍郎得中書侍郎乎對曰陛下任賢惟所命何資之計乃詔以頲為中書侍郎帝勞曰方美官缺毎欲用卿然宰相議遂無及者朕為卿恨傳五十諌東西兩朋郝處俊為中書侍郎高宗御殿觀酺時京城四縣及太常音樂分為東西兩朋帝令雍王賢為東朋周王潭為西朋務以角勝為樂處俊諫曰臣聞禮所以示童子無誑者恐其欺詐之心生也伏以二王春秋尚少意趣未定當湏推多讓美相敬如一今忽分為二朋遞相誇競非所以道仁義示和睦也高宗矍然曰卿之逺識非衆人所及中樞白居易除裴垍中書侍郎制宜登中樞以副僉望僕射十三白端揆之司僕射樞機之重晉紀武帝詔曰侍中羊祜秉徳清而處腹心之任始總樞機之重加左僕射祜字叔子賛治道謝安為僕射制曰尚書内賛治道統留事魏志徐宣左僕射加侍中車駕幸許昌宣總留事帝還主司奏呈文書帝曰吾與僕射何異也暮出顧和字君孝為僕射以母老辭制書屢下特聽暮出朝還其優遇如此不朝何澄字君元以脚疾制聽坐家視事三日世説周顗為左僕射深識危亂常飲酒醉三日不醒時人謂之三日僕射墮車王常為僕射常墮車時人謂之墮車僕射魏尊碩德選在徐宣晉寵元勲選在任光羊袩左揆右揆左右僕射左右百官表建安中以執金吾榮邵為尚書左僕射僕射有左右自此始也山濤清虚晉以山濤清虚恬簡轉為左僕射僕射領選齊職儀曰魏朝以尚書僕射毛玠領選曹晉以僕射山濤領吏部後依擬至今或領焉孔各一人從二品掌統理六官為令之貳令闕則總省事劾御史糾不當百官志三十七龍朔二年改左右僕射曰左右匡政光宅元年曰文昌左右相開元元年曰左右丞相天寳元年復同上尚食日給御膳裴寂拜尚書右僕射賜服玩不貲詔視朝必引與同坐入閤則延卧内言無不從呼為裴監不名也貴震當世列傳十約天下已定許上印綬寂遷左僕射帝置酒舍章殿歡甚寂頓首曰始陛下發太原約天下已定許上印綏今四海妥安願賜骸骨歸田里帝泣下曰未也要當相與老爾公為宗臣我為太上皇逍遥晚歳不亦善乎不以私害義屈突通判陜東道行臺左僕射從計王世充時通二子在洛帝曰今以東略属公如二子何通曰臣老矣不足當重任然疇昔陛下釋俘纍加恩禮以蒙更生是時口與心誓以死許國今日之行正當先驅二兒死自其分終不以私害義帝大息曰烈士狥節吾今見之上䟽辭疾劉仁軌拜左僕射太孫廢仁軌專知留守事上䟽辭疾因陳吕后祿産禍敗事以規后傳三十三大事闗僕射房𤣥齡進尚書左僕射帝曰公為僕射當助朕廣耳目訪賢才比聞閲牒訟日數百豈暇求人哉乃敕細務属左右丞大事關僕射共筦朝政杜如晦進位尚書右僕射仍領選與房𤣥齡共筦朝政引士賢者下不肖咸得職當時浩然歸重以令僕委載冑㑹僕射蕭瑀免帝謂冑曰尚書總國綱維失一事天下有受其弊者今以令僕委卿冑明敏長於操决無宿疑議者美其振職武徳以來殆無其輩解事僕射戴至徳遷尚書右僕射時劉仁軌為左人有所訴率優容之至徳乃詰䆒本末理宜者宻為奏終不顕私恩由是當時多稱仁軌號解事僕射嘗更日聽訟有嫗詣省至徳已取牒嫗乃復取曰初以為解事僕射今乃非是至徳笑而還之人伏其長者或以問至徳答曰慶賞刑罰人主之柄為臣豈得與人主爭也帝知歎美至本省具朝服劒佩裴耀卿天寳初進尚書左僕射俄改右僕射而李林甫代之上曰林甫至本省具朝服劒佩博士導郎官唱接禮畢就耀卿聽事乃常服以賛者主事導唱林甫驚曰班爵與公同而禮數異何也耀卿曰比苦眩不堪重衣又郎博士紛泊非病士所宜林甫黙然慙不答四品官拜李程再為僕射先是元和長慶時僕射視事百官皆賀四品以下官答拜太和四年詔不答拜王涯竇易直行之自如程循其故不自安言諸朝御史中丞李漢謂不答拜禮太重文宗不許聽用太和詔書議者不善知選聽就第注官裴遵慶以右僕射復知選事朝廷優其老聽就第注官時以為榮傳六十五檢校右僕射詔宰相百官送至省田神功大厯二年來朝檢校右僕射詔宰相百官送至省傳六十九師長百僚劉宴常衮執政忌宴有公望乃言宴舊徳當師長百僚用為左僕射實欲奪其權帝以計務方冶詔以僕射領使如舊傳七十四自用隔品致恭竇易直檢校尚書右僕射易直以公㓗自喜方執政未甞引用親黨初元和中鄭餘慶議僕射上儀不與隔品官亢禮易直為中丞奏駮之及為僕射乃自用隔品致恭為時鄙笑傳七十六望冠一時李絳寳厯初拜尚書左僕射絳偉儀質以直道進退望冠一時賢不肖太分屢為讒邪所中傳七十七以宿德進鄭餘慶遷左僕射比非其人及餘慶以宿徳進公論浩然歸重傳九十賦朝天行以獻張建封檢校尚書右僕射十三年來朝帝不待日召見延英殿詔㑹朝赴大夫班以示殊寵建封賦朝天行以獻帝眷遇異等賜名馬珍具傳八十三交騎不避王璠拜御史中丞璠挾所持頗横恣道直僕射李絳交騎不避傳一百四位次三公陳夷行進位尚書左僕射與崔珙俱拜乃奏僕射始視事受四品官拜無著令且開元元年以左右僕射為左右丞相位次三公三公上日荅拜而僕射受之非是望敕所司約三公上儀著定令詔可始累朝紛議不决至夷行遂定檢校官重則從其班令狐楚檢校尚書右僕射故事檢校官重則從其班楚以吏部自有品固辭有詔嘉允賜靈夀杖李靖遷尚書右僕射毎參議恂恂似不能言以沉厚稱懇乞骸骨加賜靈夀杖辭㫖䟽躁蕭瑀遷左僕射正觀初房𤣥齡杜如晦新得君事任稍分瑀不能無少望乗罅切詆辭㫖䟽躁太常怒廢于家固辭蕭俛自謂輔政淺固辭僕射換吏部尚書右避選事徙兵部上日唱授按送印皆尚書郎為之裴均元和三年入為尚書右僕射上日唱授按送印皆尚書郎為之文武四品五品郎官御史拜廷下御史中丞左右丞升階荅拜時以為禮太重三世居此官高儉遷右僕射儉三世居此官世榮其貴太宗幸洛陽太子監國命儉攝少師手詔曰端拱三川不憂關中者以属卿也久之請致仕聽解僕射性豪侈裴冕三拜性豪侈既素貴輿服食飲皆光麗珍豐櫪馬直數百金者常十數毎廣㑹賔客不能名其饌自製巾子工甚人爭效之號僕射巾封倫議事輙變易封倫太宗立拜右僕射始倫之歸蕭瑀數薦之及是瑀為左僕射毎議事倫初堅定至帝前輙變易由是有隙貞觀元年感疾卧尚書省帝親臨視命尚輦送還第師長庻官寳厯中左僕射李絳與御史中丞王璠相遇於道車不為之却因上言故事云左右僕射師長庻官開元時以為左右丞相其後雖去三事機務猶總百司之權表狀之中不書其姓尚書以下毎日合衙上日百寮列班宰相送上中丞御史列位于庭禮數之崇中外特異所以自武徳貞觀以來聖君賢臣布政除弊不革此禮謂為合宜茍有不安尋亦合廢近年縁有才不當位恩加特拜者遂從權便不用舊儀酌於羣情事實未當今或有僕射初除就中丞院門相見者即與就參何殊中丞新受亦無見僕射處憲度乖宜乃罷璠除拜必加同中書門下平章事貞觀末除拜僕射必加同中書門下平章事及參知機務等名方為宰相不然則否然為僕射者亦無不加焉至開元以來則罕有加者通典天寳元年議曰按僕射秦官其名則㣲其職甚細東漢以後雖委任漸重職司會府而非師長之職也今尚書令總領衆務舉持綱目僕射貳之誠為崇重且非統國政宰天下之任安有僕射因改丞相之名都無丞相之實而為百寮師長也又與丞郎絶禮若不隔品致敬則諸司長官與隔品寮属其可絶禮乎斯不然矣同上左揆元稹加陳楚左僕射制加之左揆以盛中權端揆同上授韋臯左僕射制罷去職勞正名端揆端右同上授李絳右僕射兼兵部尚書制端右可以旁綏於戎政右揆白居易加程執恭右僕射制特升右揆俾壮中權即其家拜韓文檢校左僕射劉公墓銘昌裔拜陳州刺史兩界桑葉交跡就拜尚書右僕射得病視政不時請去職即其家拜檢校左僕射封郎必居此座封徳彛之少也僕射楊素見而竒之遂妻與姪女常撫座曰封郎必居此座後討遼東封公船沒衆皆謂死楊素曰封郎當得僕射此未必死使人求之封公抱得一板泛沒於大海中力盡欲放之忽憶楊公之言復勉力持之胷前為板所摩擊肉破至骨衆接枚得之後果官至僕射見定命録第一人李揆徳宗幸山南用揆為入蕃㑹盟使拜尚書左僕射揆辭老恐死道路不能逹命帝惻然杞曰和戎者當練朝廷事非揆不可異時年少揆者不敢辭揆至蕃酋長曰聞唐有第一人李揆公是否揆畏留因紿之曰彼李揆安肯來耶尚書改僕射為遷舊史楊志誠檢校工部尚書知節度事七年轉檢校吏部尚書詔下進奏官徐廸詣中書白宰相曰軍中不識朝廷體位只知自尚書改僕射為遷何知工部轉吏部為美且軍事盛飾以待新思一旦復為尚書軍中必慚今中使徃被其勢恐不得出及使至其傔奔還奏曰楊志誠怒不得僕射三軍亦有怨言志誠遣将王文頴謝恩并讓官復賜官告批荅文穎不受而歸朝廷納裴度言務以含垢下詔諭之因再遷使加尚書右僕射一門三僕射左僕射韋安石三從兄待價右僕射從姪巨源右僕射一門三僕射衣冠之盛無以加也西京雜記專以錢糓進王播大和元年入朝拜左僕射復輔政累封太原郡公時韋處厚當國以獻替自任天子嚮之播專以錢榖進不甚與事居位四年僕射不知政事自武徳至長慶四年已前僕射並是正宰相神龍初豆盧欽望為僕射不帶同中書門下三品不敢參議政事後加知軍國事韋安石為僕射東都留守不帶同三品自後僕射不知政事矣唐新語寵待之禮當時無儔李珏牛僧孺碑公東都留守俄以左僕射召王人就賜官告特明異禮公一對而歸不詣相第又加相印出為漢南節度使制出上悔之欲追成命公固辭出都門特賜清廟六噐宣曰以卿精忠用以貺别寵待之禮當時無儔樞宻十四孔梁之崇政使乃唐樞宻之職蓋出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問參謀議于中則有之未始專行事於外也史權侔宰相至崇韜重誨為之始復唐樞宻之名然權侔於宰相矣同上武事任樞宻後世因之遂分為二文事任宰相武事任樞宻樞宻之任既重而宰相自此失其職也機宻之任安重誨郭崇韜不欲馬紹宏在已上初崇韜與宦者馬紹宏俱為中門使而紹宏位在上荘宗即位二人當為樞宻使而韜不欲馬紹宏在已上乃以張居翰為樞宻使紹宏為宣徽使事無巨細一以委之桑維翰拜中書令復為樞宻使事無巨細一以委之數月之間百度寖理晉臣傳詔書救千人濫死唐張居翰掖庭令張從玫之養子同光中為樞宻使偽蜀王衍既降詔遷其族於洛陽行及㤗川時關東已亂荘宗慮衍為變遣中官馳騎賫詔殺之詔王衍一行並宜殺戮其詔已經書時居翰在宻地覆視其詔乃揩去行字改為家字及衍就戮於秦川驛止族其近属而已其偽官及從行者尚千餘人皆免其枉濫居翰力也左右丞十五孔正四品左丞一人正四品上右丞一人正四品下百官司志掌辨六官之儀糾正省内劾御史舉不當者吏部户部禮部左丞總焉兵部刑部工部右丞總焉同上龍朔元年改左右丞曰左右肅機同上判訴牒楊昉為肅機化及子訴治先䕃昉方食未即判遽曰肅機而未食庸知天下有寃而求食乎昉怒取牒書曰父弑隋主子訴隋資可乎人服其敏示四方盛徳張行成檢校尚書左丞是時帝幸靈州詔皇太子從行成諫曰皇太子宜留監國對百寮日决庻務既為京師重且示四方盛徳帝以為忠遷侍中在職修舉溤元常歴尚書左丞嘗宻諫帝中宫權重宜少抑帝雖置其計而内然之由是為武后所惡元常在職修舉識覽澄逺帝委遇特厚傳三十六振明綱轄韋思謙累尚書左丞能振明綱轄朝廷肅然進御史大夫三世居韋濟天寳中授左丞凢三世居之傳四十一郎吏肅然望風脩整韋洪景拜尚書左丞駮正吏銓所除六十餘官不當進資於是鄭絪丁公著楊嗣復皆奪俸郎吏肅然望風脩整時重其有守裴佶遷尚書右丞時李㢲以兵部尚書領鹽鐵将遷使􅈰就本曹經創已半㑹佶至以為不可㢲雖怙恩而羞猶撤之時重其有守本傳不置僕射宇文融祖節貞觀中為尚書右丞謹幹自将江夏王道宗以事請節節以聞太宗喜賫絹二百勞之曰朕比不置僕射正以公在省耳傳五十九趙璟堪此璟拜給事中咸安公主降回紇詔關播為使而璟以御史中丞副之異時使者多私貨以市馬規利入獨璟不然使未還尚書右丞缺帝曰趙璟堪此遂以命之傳七十五士大夫壮其節董晉改尚書左丞是時右丞元琇為韓滉排迮得罪滉勢振朝廷晉見宰相誦元琇非罪士大夫壮其節傳七十六建言有司斷獄必刑部審覆徐浩右丞言故事有司斷獄必刑部審覆自李林甫楊國忠當國專作威福許有司就宰相府斷事尚書以下未省即署乖謹恤意請如故便詔可故詳復自此始正直朕所自知趙涓治衢不為觀察使所容奏免官帝見其名問宰相曰是豈永泰時御史乎對曰然詔拜尚書左丞既至勞之曰卿正直朕所自知乃以罪聞不信也恭謹不去位錢徽召拜尚書左丞㑹宣墨麻羣臣在廷方大寒稍稍引避徽素恭謹不去位乆而仆因告老不許用清察稱崔善為累尚書左丞用清察稱諸曹吏惡之以其短而傴嘲曰曲如鈎列封侯欲沮罷所任帝聞勉之曰昔齊末姦吏歌斛律明月而高緯闇不察至滅其家朕雖不徳幸免是因下令購謗者謗乃止特詔賜錢戴胄遷尚書左丞矜其貧特詔賜錢十萬健于職劉洎拜尚書右丞相健于職於是尚書復始如徴時上言郎官不可賞能吏韋温遷尚書右丞鹽鐵推官姚朂按大獄帝以為能擢職方員外郎將趍省温使止之即上言郎官清選不可賞能吏帝命中人諭送温執議不移詔改朂檢校禮部郎中振舉綱目略無留事韋仁約儀鳳四年除尚書左丞仁約奏曰陛下為官擇人無其人則闕今不惜美錦令臣製之此陛下知之深矣㣲臣盡命之日矣振舉綱目略無留事羣曹肅然通典左綱右轄白居易庾承宣尚書右丞制昔我大宗皇帝嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴冑魏㣲及杜正倫劉洎輩繼領是職分居左右官脩事理人于今稱之故吾前命從持左綱今命承宣操右轄衆口藉藉頗為得人樞轄六曹同上孔揆授尚書左丞制尚書丞掌决百事樞轄六曹晉魏已還右卑於左惟有立者可以糾吏惟無瑕者可以律人白孔六帖卷七十一
