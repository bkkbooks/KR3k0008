body:
  text: 白孔六帖卷三十四唐白居易原本宋孔傳續撰賔主一好客二謝絶賔客三行旅四逆旅五離别六餞送七遊覽八相思九經過十干謁十一賔館十二朋友十三擇交十四相成十五賔主一白賔客主恭禮賔禮毎進以讓禮周諺曰賔有禮主擇之左傳禮無違者子曰赤也束帶立於朝可使與賔客言儼若容樂與餌過客止老子我有嘉賔詩有客有客亦白其馬有客宿宿言再宿也有客信信言四宿也主人慁賔慁患也東都主人西都之賔東道之主鄭謂秦曰若舍鄭以為東道主行李之徃來共其乏困書曰脩五禮吉凶軍賔嘉洪範八政七曰賔天子諸侯無事則嵗三田二為賔客宋公兼享晉楚之大夫趙孟為客座所尊也趙武諡文子季孫飲大夫酒臧紇為客臧武仲也主禮賔榮衛仲叔圉治賔客賔以特牲晉悼公救災之道守出門之恭再拜而見展及階之敬三揖乃升禮賔周禮太宰以八統馭萬民八曰禮賔賔客之式太宰以九式均節財用二曰賔客之式式謂財用之節度也懐賔客懐安也周禮賔客之容周禮六儀二曰賔客之容謂矜莊也饗燕之禮周禮以饗燕之禮觀四方之賔客議賔周禮八辟二曰議賔之辟賔客有罪先議之殺禮周禮凡禮賔客國新殺禮凶荒殺禮札䘮殺禮禍災殺禮在野外殺禮注節省其費用也客位主人敬客則先拜客客敬主人則先拜主人賔客之交譲而展敬飲食之用宴以合歡速賔禮主人親速賔速召也速客責人肅容而入百拜之儀序賔次序也庖有魚不利賔易不速之客三人來敬之終吉易賔之初筵我客戾止永觀厥成詩周禮凡賔客至委積膳獻飲食賔客賜之餐牢注餐食始至小禮也庖人掌賔客之禽獻謂獻禽之賔客凡行人之儀不朝不夕不正其主靣亦不背客謂儐相傳辭不正東向不正西向常視賔主之前却得兩向而已野廬氏掌若有賔客則令守涂地之人聚􅈀有相翔者誅之相翔謂伺候將為盗者環人掌送迎邦國之通賔客舍之授館令聚􅈀有任噐則令環之命野廬氏諸侯賔至奠設庭燎賔至如歸傳國語單襄公如楚候不在疆司空不視塗澤不陂川不梁膳宰不致餼宣詔曰或擅興徭役飾㕑傳稱過客㕑飲食傳傳舍使人及過客來者稱其意置驛馬迎賔客鄭莊當時為太子舍人毎五日沭浴常置驛馬長安四郊請謝賔客夜以繼日好黄老術慕長者知友皆大父行天下有名之士戒門下客至亡貴賤無留門執賔主之禮以貴下人性廉東閤公孫𢎞起客館開東閤延賔客公孫賀劉屈釐壊為馬廐奴婢室也曳裾王門鄒陽上書曰臣飾庸陋則何王之門不可曵長􅅂乎君門如市上責鄭崇言賔客多鄭莊汲黯為九卿兩人中廢賔客益落落散也填門翟公為廷尉賔客填門及廢門外可設雀羅坐上客恒滿罇中酒不空孔融為太中大夫性寛少忌好事誘益後進常嘆曰云云吾何憂後漢崔瑗字子玉好賔客盛肴膳極滋味不致餘産居常自䟽食秋官野廬氏掌野之道路宿息井樹宿息廬之屬客所宿及晝止者也井共飲食樹為藩蔽子姑就館敢辱大館叔弓如晉辭館云疲倦蜀張裔字君嗣為諸葛亮長史北詣亮諮事送車數百兩與親故書曰晝夜接賔客人敬丞相長史男子張君嗣疲倦欲死勢利王雅茂逹時王珣男婚賔客甚衆忽聞雅拜太子少傅廻謁雅者過半時俗頽敝無復廉恥又大將軍青退歸驃騎去病日貴青門下客多去事驃騎輙得官爵唯任安不去歌詩漢書儒林傳王式翁思徴為博士既至諸博士持酒肉勞之博士江公心嫉式謂歌吹諸生曰歌驪駒式曰聞之師客歌驪駒主人歌客無庸歸今日諸君為主人曰尚早未可也江公曰經何以言之式曰在曲禮江公曰何狗曲也式曰恥為豎子所辱遂免歸孔一見謝不往李藩拜祕書郎王仲舒與同舍郎韋成季吕洞日置酒邀賔客相樂慕藩強致之仲舒等為俳說廋語相狎昵藩一見謝不往曰吾與終日不曉所語何哉家客馬周至長安舍中郎將常何家貞觀五年詔百官言得失何武人不渉學周為條二十餘事皆當世所切太宗恠問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之門無雜賔李景譲清素寡欲門無雜賔李琢罷浙西以同里訪之避不見及去令斸其騙石焉廢斥鄭畋李徳裕高其才令狐綯繼當國皆怨徳裕其賔客並廢斥貴盛賔客無敢忤杜顗李徳裕奏為浙西府賔佐徳裕貴盛賔客無敢忤惟顗數諌正之及謫袁州嘆曰門下愛我皆如顗吾無今日由東廂進薛戎福建觀察使栁冕辟佐其府先是馬揔佐鄭滑府監軍宦人誣劾之貶泉州别駕冕欲除揔以附倖家即使戎攝刺史按置其辠戎曰以是待我耶我始不願仕正謂此爾不肯從還白其状冕怒據案引戎入戎叱引者曰見賔客乃爾乎由東廂進冕度未可屈揖而去之竒客崔𢎞禮過宣武從劉𤣥佐獵酒酣顧曰崔生獨不知此樂耶𢎞禮笑曰我固喜武請為公歡𤣥佐臂膺與𢎞禮馳逐急緩在手一軍驚曰安得此竒客𤣥佐大恱欲留之固辭延賔客日夜劇飲陽城拜右諌議大夫與二弟延賔客日夜劇飲召賔客言噱流連杜亞拜淮南節度使雅意丞弼厭外官往往不親事日夜召賔客言噱流連進官大集客李端趙州人始郭曖尚昇平公主主賢明有才思尤招納士故端等多從曖遊曖嘗進官大集客端賦詩最工待以賔友呉武陵淮西呉少陽聞其才遣客鄭平邀之將待以賔友武陵不答賔友日踈散玉罇亦已空李白東武吟高談滿四座一日傾千觴歸家酒債多門客粲成行高談滿四座一日傾千觴賜劉都使青雲客寄上呉王蛾眉笑躄者賔客去平原却斬美人首三千還駿犇送薛九候眉宇之陽氣唐文粹李嶠上高長史書亦曽越嚴序趍下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因門下三千毛遂乏處囊之地喜賔客未嘗以有無計畢構搥牛撾鼓會衆賔李白猛虎行丈夫相見且為樂搥牛撾鼓會衆賔謂從丹霄落乃是故鄉親李白門有車馬客行門有車馬賔金鞍耀朱輪謂從丹霄落乃是故鄉親鄭驛正留賔杜甫贈王侍御村中好客稀寄范員外好客二白宴以禮成賔由主擇我有㫖酒以宴樂嘉賔之心詩公子敬愛客終宴不知疲客從逺方來門有車馬客無留門鄭莊字當時遷司農戒門下曰客至無貴賤無留門司農愛客戒無留門丞相延賔使常開闔捧銅盤而盟平原之賔二十毛遂在十九人末要楚盟後呼十九人上盟曰公等碌碌所謂因人成事者也遂為上客躡珠履而會春申之客三千春申君楚相黄歇也開文舉之樽見上注式宴以衎不醉無歸詩開孟嘗之門投陳遵之轄遵大飲酒賔客滿座取客車轄投井中雖有急不得去管仲會國用三分二在賔客謂二以供賔客也其一在國管仲懼以白桓公公曰吾子猶若是乎四鄰之賔客入者恱而出者譽則其光名滿天下入者不恱出者不譽汗名滿天下名之為貴財安可有財不足也仲尼曰君之明也賔至如歸傳彈鋏之士馮驩在孟嘗門下彈鋏歌曰歸去來出無車食無魚孟嘗聞之乃與車魚鋏劒也周公下白屋之士一沐三握髪一飯三吐哺倒屣之主人蔡邕倒屣迎王粲粲字仲宣登龍之上客孔融謁李膺接士董允字休昭與費褘胡齊等期遊董恢詣允修敬恢年少官㣲見允嚴駕逡廵求去允乃罷期留恢其接士有如此者饌精麤見飲食部儉薄門注宴戱呉諸葛融毎延賔客會休吏假求賔客所能乃合榻促席選對博奕或摴蒱投壺弓弹甘果繼進清酒徐行融周覽不倦也解陳蕃之榻登李膺之門置鄭莊之驛見上注主人必倍食嘉賔得以盡心崔瑗好賔殫極滋味見上孔建請還第與士大夫相見裴度徳宗時宰相闔門謝賔客度以時多故宜延天下髦英咨籌䇿乃建請還第與士大夫相見詔可于志寜愛賔客與賔客相娯樂牛僧孺治第洛之歸仁里多致嘉石美木與賔客相娯樂散家貲養客李客軒然坐客上邢君牙初布衣張汾者無紹而干君牙軒然坐客上會吏擿簿書以盗没宴錢五萬君牙怒其欺汾不謝去曰吾在京師聞邢君牙一時豪傑今與設吏論錢云何君牙慙遽釋吏引為上客留月餘以五百縑為謝其屈己好士類此好接士稱人之長栁璟好接士稱人之長游其門者它日皆顯於世對賔客無少倦賈耽毎歸第對賔客無少倦世謂淳徳有常者置酒置估朱坡樊川頗治亭觀林藪鑿山取泉與賔客置酒為樂與賔客娯樂李日知既罷不治田園唯飾臺池與賔客娯樂李適之喜賔客喜延四方之士石昻家有書數千巻喜延四方之士無逺近多就昻學食其門下者或累嵗昻未嘗有怠色五代史降階勞問平生高智周謝絶賔客三白翟公署門翟公為廷尉賔客交集後免門可張雀羅後復為廷尉賔客欲至翟公乃署門曰一貴一賤交情乃見主父不内主父偃為齊相至齊散五百金與昆弟賔客數之曰我貧時昆弟不我衣食賔客不我門内今吾與諸君絶矣無復入偃之門招賔客蘇建責大將軍青不招賢青曰招賢絀不肖人主之柄也人臣奉職而已何招士大夫哉市道史記廉頗失勢客盡去及後用又復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則進無勢則去此固其理又何怨焉魏其侯灌夫俱失勢賔客盡衰二人相引繩排擯生平慕之後弃之而去者孔閉閤皇甫無逸徙益州長史閉閤不通賔客左右無敢出入者闔門裴度始徳宗時常伺中朝士相過金吾輙飛啓宰相至闔門謝賔客謝賔客不與通尉遲恭晚節謝賔客不與通請謝蕭俛既老家於洛嵗時賔客請謝以為煩乃舍濟源墅李元素謝客元素内望作宰相久之不見用則謝賔客曰無以官散外我寡游合顔師邕不接令狐楚客有以星歩鬼神進者一不接退約少合蕭廪為人退約少合寡諧比呉兢少厲志呉直寡諧比不與人交高郢恭謹不與人交寡合劉禹錫年益晏偃蹇寡所合顔師古頻被譴仕益不進罔然喪沮乃闔門謝賔客門無賔謁孔禎厯監察御史門無賔謁時譏其介不喜賔客史洪肇不喜賔客嘗言文人難耐呼我為卒五代史戒門以絶韓文賔客不通温彦博賔客不通進見必陳政事利害賔客之害昔漢武謂田蚡曰君除吏盡未吾亦欲除吏哀帝責鄭崇曰君門如市何以欲禁切主上皆賔客之害吾謂丞相閉關謝絶賔客則朝廷静徳裕窮愁志不喜賔客蕭至忠不喜接賔客以簡儉自高行旅四逺行附白旅焚其次喪其僮僕旅人先笑後號咷易行邁靡靡馳也中心揺揺憂也君子于役不知其期曷至哉不知及時不日不月汶水湯湯行人彭彭多也大夫跋渉我心則憂旱行曰跋我徂東山滔滔不歸詩婦嘆于室之子于征劬勞于野順彼長道秋蓬之轉月㨗之勞豈敢定居一月三㨗靡所底戾征夫㨗捷蕭蕭馬鳴駪駪征夫毎懐靡及匪居則寜不遑啓處乃裹餱糧于槖于囊行道遟遟人生天地間忽如逺行客古詩不有行者誰捍牧圉跋渉山川蒙犯霜露以逞君心羇旅之臣幸若獲宥莊子曰適莽蒼者三餐而反腹猶果然莽蒼近郊兒果然飽也適百里者宿舂千里者三月聚糧不齎糧漢書上使鄭莊視河決請治行五日上曰吾聞莊行千里不齎糧式微之詠詩云式微式微胡不歸微君之故胡為乎中露高蹈之歌齊人歌曰魯人之臯數年不覺使我高蹈高蹈謂逺行也四方之志萬里之游懐安敗名奚自猶言自何來也日暮塗且逺遊子悲故鄉古詩遊子暮何之李陵詩行旅羈旅西征賦云逺行有羇旅之情辭邦去里車馬有行色行人遊子父母在不逺遊遊必有方方常也口倦乎叱咤手苦乎轡箠朝冒霧露晝披塵埃夏為大暑㬥炙冬為寒風偃薄楚辭曰悲哉秋之為氣憀慄兮若在逺行登山臨水送將歸道敝道長呉王謂季孫曰國君道長大夫不出門何謂也注謂長於道路駕言徂矣窮日力鴻旅於淄歸不復孔不賫糧魏徴帝納之不疑至是天下大治行旅不賫糧取給於道棄官去客秦州杜甫出為華州司功叅軍關輔饑輙棄官去客秦州往來鄠杜間蕭頴士俄免官往來鄠杜間行千里不持尺兵食貨志天寶三載道路列肆具酒食以待行人店有驛驢行千里不持尺兵雪虐風饕韓文背笈篋懐筆牘栁宗元送文郁師讀孔氏書遯而之釋背笈箧懐筆牘挟海泝江獨行山水間覊旅道路辭親入關覊旅道路韓愈論薦侯喜状飄轉况我飄轉無所定終日慽慽愁覊旅杜甫嚴氏溪放歌絶同鄉之人文粹歐陽詹居閩至于呉則絶同鄉之人矣自吳至于楚則絶同方之人矣犯雪過西華韓愈詩旅程愧淹留韓游湘西寺詩心飛秦塞雲影滯楚關月李白江南天津老人裴晉公微時覉遊洛中一日䇿蹇驢上天津橋時淮西不庭已數年矣有二老人倚柱立曰蔡州何時得平見晉公愕然而退有僕夫在後聞其語曰適憂蔡州未平須得此人為將僕遽告公曰見我龍鍾故相戯爾出劇談録秋風飄我行逺與淮海期韋應物將往江淮南徙莫從北遊失路李白上李長史書靡靡踰阡陌人煙渺蕭瑟杜甫北征我行已水濵我僕猶木末上客舍盈樽酒江行滿篋詩韋應物楊州偶會盧主簿天長水闊厭逺渉訪古始及平臺間李白梁園吟且悲就行役安得營農圃李白古風連山去無際流水何時歸李白秋夕逺遊凌絶境杜甫詠懐東遊西還杜甫嚴氏溪放歌東遊西還力實倦從此將身更何許風物悲遊子寄王侍郎詩萍泛苦寅縁詠懐鳴蟬遊子意促織念歸期李白詩天荒地老馬周昔作新豐客天荒地老無人識李賀被冒畏景渉降棧道栁宗元送辛殆庻序枚乗客於呉相如遊於梁或致書匡主用極其志節之大者也適時觀變以成其性節之茂者也桞文送南容解所乗馬以遺王義方孤窶舉明經詣京師客有徒歩疲於道者自言父宦逺方病且革欲往省困不能前義方哀之解所乗馬以遺不告姓名去由是譽振一時樊澤舉賢良次潼關雨淖困不能前有熊執易者同舍逆旅哀之輟所乗馬傾楮以濟之自罷所舉是嵗澤上第本傳逆旅五白保於逆旅逆旅旅舍主人盤飱之饋館榖底寜攸寜不受報後漢周陽少孤㣲嘗修逆旅以供過客而不受報無驗商君亡至關不得舍曰商君令舍人無驗者死商君嘆曰為法自敝除逆旅置官㰚晉時以逆旅逐末廢農亡命依凑勑當除之十里置一官㰚使老少貧户守之差令主掌依客舍收錢潘安仁議曰謹按逆旅久矣行者頼頓止居者薄収其直各得其所故國語曰許由辭帝堯之命而舍逆旅詩外傳曰陽處父過􅑔舍于逆旅魏武詩曰逆旅整設以通商賈然則唐堯到今未有無舍之法唯商鞅尤之朝廷從之不累主人劉寔字子真杖䇿徒行毎止不累主人薪水自備主人之恩孔新豐逆旅馬周舍新豐逆旅主人不之顧起逆旅卒為名臣舒元輿上書言馬周張嘉貞代人作奏起逆旅卒為名臣為逆旅上謁劉從諫傳甄戈者頗任俠從諫厚給卹坐上座自稱荆卿從諫與定州戍將有嫌命戈取之因為逆旅上謁留飲三日乗間斬其首困廣陵間不自振唐李藩年四十餘困廣陵間不自振妻子追咎藩晏如也邸店羅列五代趙在禮厯鎮泰寕天平所至邸店羅列徬徨逆旅李周為内邱捕賊將以勇聞是時梁晉兵爭山東郡盗充斥道路行者必以兵衛内邱人盧岳將徙家太原舍逆旅徬徨不敢進周意憐之為送至西山有盗從林中射岳中其馬周大呼曰吾在此孰敢爾耶盗聞其聲曰此李周也因各潰去五代史與諸生共逆旅李勉少貧狹客梁宋與諸生共逆旅諸生疾且死出白金曰左右無知者幸君以此為我葬餘則君自取之勉許諾既葬宻置餘金棺下後其家竭勉共啓墓出金付之同舍逆旅見上樊澤注離别六白悲莫悲於生别離楚辭登山臨水送將歸燕燕衛莊姜送歸妾也涕泣如雨瞻望不及佇立以泣詩離羣索居之子于歸逺送于野詩驪歌别歌也雲雨之别携手上河梁遊子暮何之李陵别蘇武詩離别之聲呉越春秋勾踐將伐呉乃命國中與之訣而國人悲哀作離别之聲鹿聚孔叢子高與鄒文季節為友季節歸魯臨别流涕子高抗手而止曰人生豈當如羣鹿聚黯然銷魂者唯别而已矣不拜東觀漢記陳遵使匈奴辭王丹丹曰無以相贈贈子以不拜遂揖而别遵甚恱古東門行叙别離事倦客怨離聲鮑昭詩有女仳離摻執子之手兮摻執子之祛兮别行子於東門啜其泣矣送美人於南浦傷如之何自我不見于今三年誰謂宋逺宋襄母思歸衛詩云氣怨結而不暢涕滿泣而横流風流雲散一别如雨文選嵇康吕安皆曠逹之士毎一相思千里命駕老子送孔子曰仁者贈人以言孔慟泣與訣則天皇后武氏召為才人方十四母楊慟泣與訣后獨自如曰見天子庸知非福何兒女悲乎母韙其意止泣悲離之作尤極於古文粹元稹杜甫誌曰悲離之作尤極於古銷魂橋唐開元遺事長安東㶚陵有橋徃來迎送皆至此橋為别離之地故人呼為銷䰟橋睽離在期韓愈暌携同上人生幾何離闊如此不見足下靣已三年矣人生幾何離闊如此況以膠漆之心置於胡越之身進不得相合退不能相忘牽攣乖隔各欲白首白居易與元稹書風吹客衣日杲杲樹覺離思花冥冥杜甫歌行逺别隔兩河雲山杳千里李白魏都别蘇少府離思春冰泮爛熳不可收韓愈逺遊聨句病添兒女戀老丈夫勇會合聨句三見秦城綠離居在咸陽三見秦城綠李白以詩代書草慼韋蘇州送李侍御契闊晚相遇草慼遽離羣離情兩飄斷不異風中絲張籍别叚生浮雲天上雨墮地暫時會合終離異莫東西相逢半新故取别隨薄原杜甫詩復為萬里别送子山之阿杜甫别唐十五滿堂送客皆惜别李白送弟絲桐感人絃亦絶滿堂送客皆惜别明日斗酒别惆悵清路塵遥望長安日不見長安人同上十離詩唐摭言元相公在淛東時賔府薛書記酒後争令以酒器擲傷公由此出幕既去作十離以獻十離者犬離主筆離手馬離廐鸚鵡離籠燕離巢珠離池鷹離韝竹離亭鏡離臺筆詩曰越管宣毫始稱情紅牋紙上散花瓊都緣用久鋒頭盡不得羲之手裏擎竹詩云蓊鬱新栽四五行常将貞節負秋霜為緣春笋穿墻破不得垂隂覆玉堂它詩皆類此也别離慘至今斑白徒懐曩杜甫鄭公虔詩浮雲一别後流水十年間韋應物淮上喜會故人解手背靣韓愈祭河南友人張員外文曰分教東生君掾雍首兩都相望於别何有解手背靣遂十一年君出我入如相避然生闊死休吞不復宣伏枕聞别離疇能忍漂寓杜詩傷離枉芳札韋應物詩餞送七白登山臨水送將歸楚辭仙舟郭林宗自京師歸諸儒送至河上林宗唯與李膺同舟而濟人謂之仙舟贈言見上注送美人兮南浦楚辭出宿于濟飲餞于禰詩申伯信邁王餞于郿詩贈䇿傳士會將歸晉秦大夫繞朝贈之以䇿注云以有䇿而不用也慕從西征賦曰送歸懐慕從之戀送子渉淇之子于歸逺送于野燕燕見上注送荆軻於易水餞踈廣於東門謂東都門也清酒百壺韓侯出祖出宿于屠顯父餞之清酒百壺薄送我畿畿門内也晉侯贈餞如公會侯伯之禮加以宴好國語谷永與段會宗書曰朋友以言贈行萬里之外以身為本高祖以吏繇咸陽吏皆送奉錢三而蕭何獨以五送也送者不出郭陳蕃為豫章太守性峻不接賔客徴為尚書令送者云云供帳東都門祖二踈也瞻望不及佇立以泣衛莊姜送歸妾詩孔御安福門杜元頴出為劒南西川節度使帝為御安福門臨餞供帳餞定鼎門外蕭嵩領朔方節度使既赴軍有詔供帳餞定鼎門外𤣥宗賦詩勞行還鎮帝賦詩以餞張建封鎮徐州還鎮帝赴詩以餞當時雖馬燧渾瑊劉元佐李抱真等勲寵卓越未有以詩餞者賦詩祖道張柬之授襄州刺史中宗為賦詩祖道又詔羣臣餞定鼎門外餞太液亭崔鉉出為淮南節度使帝餞太液亭賜詩寵之祖道洛濵許景先帝自擇刺史景先由吏部侍郎為刺史治虢州十一人治行詔宰相諸王御史以上祖道洛濵盛具奏太常樂帛舫水嬉命高力士賜詩且給紙筆令自賦賚絹三千遣之李勣入朝張文瓘補并州叅軍時李勣為長史常嘆曰稚圭今之管蕭吾所不及勣入朝文瓘與屬僚二人皆餞獨餞於野皇甫鎛之貶前坊州刺史班肅以嘗僚獨餞於野朝廷義之宰相百官班餞李光顔復還忠武宰相百官班餞帝御通化門臨送于郊倪若水為汴州刺史時天下久平人皆重内任雖自冗官擢方靣皆自謂下遷班景倩自揚州採訪使入為大理少卿過州若水餞于郊顧左右曰班公是行若登仙吾恨不得為騶僕也御通化門祖道李吉甫為淮南節度使帝為御通化門祖道臨門送汝韓愈平淮西碑云庚申子其臨門送汝送臨賀楊慿所善客徐晦慿得罪姻友憚累無敢往者獨晦至藍田慰餞宰相權徳輿曰君送臨賀誠厚無乃為累乎晦曰方布衣時臨賀知我今忍遽棄耶有如公異時為姦佞譛斥又可爾乎徳輿嘆其直稱之祖客灞上項斯江東人楊敬之祖客灞上見閩人濮陽愿閲其文大推挹羣公追餞于灞陵列筵而觴送逺之賦圭璋交映栁宗元送苑論登第歸文追而送之江之滸薛存義將行桞子載肉于爼崇酒于觴追而送之江之滸黄鵠一去青冥無極安得不慿豐隆愬蜚廉以寄聲於寥廓邪送元十八南遊樂酣相顧起征馬無由攀羣花散芳園斗酒開離顔樂酣相顧起征馬無由攀李白送族弟凝臨歧惆悵若為分江上送行無白璧臨歧惆悵若為分送陳郎將餞離駐高駕惜别空慇懃餞六父促觴激萬慮掩抑淚潺湲杜甫湘江宴餞詩餞别起登臨之思劉禹錫管城驛記送子清秋暮杜甫送殿中楊監送子清秋暮風物長年悲羣公踐南陌餞裴端公赴道州詩羣公踐南陌肅肅秩初筵前驅入寶地祖征飄金繩杜甫恵義寺餞崔都督開筵引祖帳慰此逺徂征憶舊遊開筵引祖帳慰此逺徂征鞍馬若浮雲送子驛騎亭李白送夫君於天涯惜餘春賦望夫君兮只咨嗟横涕淚兮怨春華遥寄影於明月送夫君於天涯李白賢豪相追餞却到棲霞山李白送族弟凝攝宋城主簿至月橋送君别有八月秋颯颯蘆花復益愁雲忛望逺不相見日暮長江空自流李白送别愁腸若牽繩韓詩祖帳排舟數杜詩遊覽八白以遨以遊詩駕言出遊以寫我憂詩挑兮逹兮在城闕兮挑逹往來相見皃詩子之湯兮宛丘之上宛丘刺陳幽公遊蕩無度晉趙文子觀於九原曰樂哉斯丘可以逺眺望月令五月登城不指常事曰視非常曰觀榖梁傳禁屬遊飲食于市者周禮盤遊慢遊是好寓目憑軾而觀縱觀逸遊是娯孔遨遊林墅盧鈞始被召自以當輔政既失志故内怨望數移病不事事遨遊林墅累日一還酣遨裴耀卿蓋嘉運詔為河西隴右節度使嘉運以新立功日酣遨未赴屯耀卿言於帝召故人出游柳渾罷政事免後數日置酒召故人出游酣肆乃還曠然無黜免意登葛憒山王勃既廢客劒南甞登葛憒山曠望慨然長思不騖逺不陵危環山洄江四出如一誇奇競秀或不相譲徧行天下唯是得之栁訾洲記忽焉若飄浮上騰以臨雲氣伐惡木刜奥草前指後劃心舒目行忽焉若飄浮上騰以臨雲氣萬山靣内重江東隘聨嵐合耀旋視其宜常所未覩同上窮廻谿幽泉怪石無逺不到到則披草而坐傾壺而醉西山記登高嵒而企踵兮瞻故邦之殷轔山水浩以蔽虧兮路蓊勃以揚氛栁宗元閔生賦雲水登臨多聞放志杜牧趙真齡制于暮之春徴賢合姻登舟于兹水之津連山倒垂萬象在下浮空泛景湯若無外横碧落以中貫陵大虚而徑度羽觴飛翔匏竹激越熈然而歌婆然而舞持頥而笑瞪目而倨不知日之將暮則於向之物者可謂無負矣栁宗元南池序其崖谷之委會則泓然為池灣然為溪其上多楓柟竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜函太虛澹灔里閭誠游觀之佳麗也同上曠望延駐目杜甫上後薗山脚曠望延駐目飄颻散踈襟相思九白自我不見于今三年詩静言思之悠悠我思願言思伯我之懐矣實勞我心瞻彼日月有懐于衛靡日不思我思不逺豈不爾思逺莫致之室是逺而如之何勿思一日不見如三秋兮如三月兮無思逺人勞心忉忉忉忉憂也忘我實多伊可懐也未見君子憂心弈弈忡忡千里命駕見上注夢想見容輝我思故人孔桑榆儻可收願寄相思字韓愈寄李大夫詩怨莫怨兮唐文粹皮日休九諷見逐怨莫怨兮新相思相思之苦懐劉禹錫荅栁子厚書相思之苦懐膠結贅聚至是泮然以銷所不如晤言者無幾未能忘情忍不酸鼻文粹劉軻與陸賔虞書兩心始親而形骸已相逺茍未能忘情忍不酸鼻出涕為吾友之思耶交游颯向盡宿昔浩茫然杜甫交游颯向盡宿昔浩茫然促觴激萬慮掩抑涙潺湲風波離思滿宿昔容鬢改韋應物淮上寄親故灑别淚於尺波寄東流於情親李白愁陽春長望杳難見浮雲横逺山李白詩置書雙袂間引領不蹔閑長望杳難見浮雲横逺山佳期綵雲重欲贈隔逺天擬古同上經過十白王商過樓䕶䕶字君卿為天水太守免官居長安都城侯王商為大司馬候䕶䕶宅狹小官屬立車下久住欲雨主簿謂諸掾曰不肯強諫天雨立閭巷耶商聞之遂去主簿終身廢之陳遵飲左氏遵為河南太守弟汲為荆州牧之官俱過長安富人左氏飲司直陳崇劾遵過寡婦左氏家飲免官伐申過鄧傳楚文王伐申過鄧鄧侯曰吾甥也止而享之臧武如晉雨過御叔御叔將飲酒曰焉用聖人我將飲酒而已雨行何以聖為注武仲多智人謂之聖人田蚡謂灌夫曰欲與仲孺過魏其侯會仲孺有服灌夫曰將軍乃肯幸臨魏其候夫安敢以服為解毋􅎒髮待賔陶侃字士行孝廉范逵嘗過侃時倉卒無以待賔客母截髮為二髲以易酒肴極豐備從者亦過望怒直進王忱字元逹桓𤣥詣忱通人未出乗興直進忱對𤣥鞭門人𤣥怒去忱亦不留不交客言嵇康夏月於大樹下鍜向子期佐之鍾會結客同造之康視鍜如舊傍若無人良久不交一言會去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去大恥之遂深怨恨理髮謝安為桓温司馬温詣安安方理髮安性遲緩久而方罷令取幘温見留之曰令司馬著㡌進其見重如此也入沐王恬傲誕不拘禮節謝安造之坐少頃恬便入内安以為必厚待己久之乃沐頭散髮而出竟無賔主之意不過從兄第五倫字伯魚迎送董賢為司馬上令私過孔光光雅恭謹知上欲尊賢乃戒衣冠出門望見賢車乃入拜謁恭迎不敢均敵上恱拜光兄子為諫議大夫王獻之子敬經呉郡聞顧辟疆有名園先不相識乗平肩輿徑入辟疆方集賔客獻之游厯傍若無人辟疆怒曰慠主人非禮也以貴驕士非道也令蒼頭驅出獻之慠然亦不屑意孔杖屨經過齊澣留司東都嚴挺之亦為林甫所廢與澣家居杖屨經過不缺日迎送敕使皆有常處鄭珣瑜江南君凢迎送敕使皆有常處吏宻識其馬進退不數歩差過王繇王鉷子凖以鬪雞供奉禁中過駙馬都尉王繇既置酒永穆公主親視供具萬年尉賈季隣等候凖經過敕具酒食王珪與房𤣥齡杜如晦善母李嘗曰兒必貴然未知所與游者何如人會𤣥齡等過其家李闚大驚敕具酒食歡盡日不迎不送五代裴皥桑維翰已作相嘗過皥皥不迎不送人或問之皥曰我見桑公於中書庻僚也桑公見我於私第門生也何迎送之有人以為當東阡北陌杖屨來徃古之老於鄉者将自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也韓愈孔公銘經過老自休杜甫還灞上遊干謁十一刺附白范睢為須賈御入相府曰我為君先通相君張儀謁蘇秦秦戒門下不為通又不得放去數日方見之坐於堂下以激儀也上謁雋不疑曼倩冠進賢冠𢃄礧其劒上謁暴勝之上謁若今通名也不避寒暑張湯請謁云云埽門魏勃欲見曹參早掃齊相舍人門以自達書刺高紀有謁者自書刺以言爵里若今之通名也景丹性情高未嘗修刺謁人覆刺高彪有雅才從馬融訪大義融乃辭疾不見彪覆刺遺融書云云融慙乃追之刺字漫滅襧衡來遊許下隂懐一刺既無所適於是刺字漫滅奏刺夏侯湛事見聦悟門注六卿之門宋公子魚無日不數於六卿之門朱博馳騁進取不師道徳莫為我先先容也漢書孔融年七嵗謁李膺門下不為通融曰我與李府君親舊門下具白之膺見融問何親融曰先君孔子與老君有師資之道故僕與君亦累世通舊也露索蕭望之王仲翁俱欲謁見霍光光自上官桀事後出入自備士當見者皆露索去刀兵兩史挾持望之獨不肯受索曰不願見非周公握髪之禮徑入哭後漢趙壹元叔為郡計吏到京師造河南尹羊渉不得見壹以非渉無託名者乃日到門渉許通尚卧未起徑入上堂曰竊伏西州承高風久矣乃今方遇而忽然奈何命也因舉哭聲渉知非常人乃起延話大奇之追不顧趙壹為羊渉所稱名動京師西還過𢎞農侯大守皇甫規門者即不通壹遂遁規知是壹大驚追之壹不顧而去一逢掖王符節信性耿介皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還書刺謁規規卧不起既入問君前在郡食鴈美乎有頃白符在門規驚遽出迎入語曰徒見二千石不如一逢掖養痾傲士固其宜也高彪覆刺遺馬融書云徑上牀蜀彭羕見龎統統非羕故舊又有賔客徑上統牀卧曰須賔客罷與卿談賔罷請食然後語統大竒之修刺候通歩隲字子山與衛旌種𤓰自給夜誦經傳會稽焦征羌豪縱二子懼為所侵乃共修刺奉𤓰謁征羗不時通旌欲去隲曰畏之而來非慕義也屈何傷乎孔拒卻常衮性狷潔遷禮部侍郎時宦者劉忠翼權震中外涇原節度使馬璘為帝寵任有所干請衮皆拒卻不往韋純京兆尹李實曰與我同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷終不肯詣韋肇為元載所惡載曰肇若過我當擇善地處之終不肯詣載過府不謁温庭筠薄於行調方山尉不得志去歸江東令狐綯方鎮淮南庭筠怨居中時不為助力過府不謁不顧竇參按江淮獄揚州節度使陳少游偃蹇不郊迎遣軍吏致問參厲辭譙責少游慙往謁參參不顧即去伺望顔色親執轡箠張昌宗貴震天下諸武兄弟及宗楚客等争造門伺望顔色親執轡箠唐史厚以金謝王播既失職見王守澄方得君厚以金謝守澄乗間薦之天子有意復用於是諌議大夫獨孤朗等見延英言播傾邪關通帝左右状帝沖闇不納其言僕妾干謁栁澤上䟽且斜封官者皆僕妾干謁迷謬先帝仕進干請不結子弟則謁主書元載得君縱諸子弟關通貨賄凡仕進干請不結子弟則謁主書私謁盈几不省孔緯為吏部侍郎權要私謁至盈几一不省當路不恱改太常卿具軍容伏謁柳公綽牛僧孺罷政事為武昌節度使公綽具軍容伏謁左右諫止之答曰奇章始去台宰方鎮重宰相所以尊朝廷也非慶弔不至宰相第栁仲郢在朝非慶弔不至宰相第以州民入謁胡証拜振武軍節度使過河中時趙宗儒為帥以州民入謁里人榮之謝絶請謁高郢進禮部侍郎時四方士務朋比更相譽薦以動有司徇名忘實郢疾之乃謝絶請謁請謁不行李乂為吏部侍郎典選事請謁不行時人語曰李下無蹊徑後至宋璟㑹有喪告滿入朝公卿以次謁通禮意易之等後至促歩前璟舉笏却揖唯唯故積怨常欲中傷賕謁紛紜長寜公主韋庻人所生内倚母愛寵傾一朝與安樂宜城二主后媦郕國夫人争任事賕謁紛紜趨階降伏唐持太和中為渭南尉試京兆府進士時尹杜悰欲以親故託之持輙趨階降伏悰語塞乃止荔枝圖劉宗龜姻舊或干以財率不答但冩荔枝圖與之負勢賕請任瓌厯職有功然補吏多為親故人私至負勢賕請瓌知不甚禁遏請託為姦姜晦為吏部侍郎主選曹史嘗請託為姦前領選者周棘扈藩檢窒内外猶不禁至晦悉除之上謁軍門房𤣥齡太宗以燉煌公徇渭北杖䇿上謁軍門一見如舊崔挹為人請託干湜見父子門令狐峘在吏部因尚書劉晏力時楊炎為侍郎故峘内徳晏至分闕以善闕奉晏惡闕與炎炎心不平建中初峘為禮部侍郎炎執政不為憾炎出故宰相杜鴻漸門下其子封求𢎞文生以託峘峘謝使者曰得公手署峘得以職炎不疑署送之峘即日奏言宰相廹臣以私從之負陛下不從則害臣帝以誥炎具道所以然帝怒貶衡州别駕不憚寒暑李敬𤣥造請不憚寒暑公行私謁韋嗣立上書曰垂拱間仕入彌多公行私謁私造韋𢎞景吏部員外郎楊虞卿以累下吏詔𢎞景與御史詳讞虞卿私造門𢎞景厲言曰有詔按公尚私謁耶虞卿多朋助自謂必見納及是惶恐去慢折蘇味道性友愛其弟味元嘗請託不遂因慢折之味道怡然不屑先賂關子李逢吉其黨有張又新等八人而傳會者又八人皆任要劇故號八關十六子有所求請先賂關子後逹於逢吉無不得所欲日見賔客於第李宗閔楊虞卿日見賔客於第無間韋瓘累中書舍人與李徳裕善徳裕任宰相罕接士唯瓘往請無間也恥汚詖謁席豫太平公主聞其名將表為諫官豫䎵汚詖謁遁去干財趙隠始布衣時家無貲與兄隲同耕以養雖姻宗之富未嘗干以財干請不應鄭畋時田令孜恃權有所干請畋不應願罷所授沈傳師初拜官宰相欲以姻私託幕府者傳師固拒曰誠爾願罷所授後生内謁必引見諄諄鄭餘慶後生内謁必引見諄諄教以經義務成就儒學抳杜干請牛徽擢吏部員外郎乾符中選曹吏多姦嵗調四千員徽治以剛明抳杜干請法度復振願事鞭靮封常清年三十未有名高仙芝為都知兵馬使嘗出軍奏傔從三十餘人衣褠鮮明常清慨然投牒請豫常清素瘠又脚跛仙芝陋其皃不納明日復至仙芝謝曰傔已足何庸復來常清怒曰我慕公義願事鞭靮故無媒自前公何見拒深乎以皃取士恐失之子羽公其念之仙芝猶未納乃日候門下仙芝不得已竄名傔中私謁之書吕胃遷禮部侍郎與裴延齡爲姻家擢其子操上第㑹入朝遺私謁之書于廷出為潭州刺史卒以私託人鄭珣瑜未嘗以私託人而人亦不敢謁以私造詣不敢干以私裴垍持法度雖宿貴前望造詣不敢干以私臨教辛讜龎勛反攻杜慆於泗州讜聞之拿舟趍泗口貫賊柵以入慆素聞其名握手曰吾僚李延樞嘗為吾道夫子為人何意臨教吾無憂矣多託以私劉從諫還藩進同中書門下平章事公卿多託以私争出其門韋渠牟帝既偏于聽任士之浮競甘進者争出其門赫然勢熖可炙往見杜甫客呉越齊趙間李邕竒其材先往見之不以私謝李至逺之知選以内史李昭徳進人或勉其徃謝荅曰公以公用我奈何欲謝以私卒不詣結納閽寺李修飾㕑傳結納閽寺求善譽丐援引竇文埸臺省要官走門下丐援引者足相躡徼倖者願一見如天人然高力士知内侍省事徼倖者願一見如天人然退朝門無私謁漢隱帝自即位以來樞密使楊邠揔機政邠頗公忠退朝門無私謁雖不却四方饋遺有餘輙獻之頗行干託隱帝自關西罷兵漸近小人與後賛李業等嬉遊無度而太后親族頗行干託洪肇與楊邠稍裁抑之出五代史三十史洪肇傳足接於門墻之間昇乎堂而望乎室者亦將一年于今矣韓愈陸參薦士書伺候於公卿之門犇走於形勢之塗足將進而趦趄口將言而囁嚅送李愿歸盤谷俛黙惕息疊足搨翼拜祈公侯之閽跪邀賢逹之車栁宗元上權補闕書白璧之契文粹李嶠上高長史書御賔以之失位篲客以之無門將恐慕義之夫思為黄鵠之舉假其白璧之契接以黄金之言閽人斥之馭者排之文粹房琯上張燕公書衣惟素褐乗非車馬閽人斥之馭者排之長衢高門驟拜左右則近於論訴賔館十二白適子之館兮詩于時廬旅廬舍賔客十里有廬廬有飲食周禮天子賜舍司儀致館儀禮賔館記曰大饗卷三牲之爼歸於賔館見人不能館不問其所舍禮賔客至無所館子曰生於我乎館死於我乎殯除館晉人為季孫除館於西河囚之也子姑就館敢辱大館叔弓如晉辭館云云壊垣子産如晉壊其館之垣而納車馬士文伯曰繕完葺牆以待賔客今吾子壊之其若異客何子産曰諸侯舍於𨽻人門不容車而不可踰越崇大諸侯之館晉文為盟主飾㕑傳稱過客傳音轉宣詔曰或擅興徭役飾㕑傳稱過客注㕑飲食傳傳舍使及過客皆得令稱其意賔至如歸舍不為暴東閤公孫𢎞為丞相開東閤以延賔及公孫賀劉屈氂時壊為馬廐連榻坐客晉羊琇豪貴杜預拜鎮南將軍朝士皆畢賀乃連榻而坐琇與裴楷後至曰杜元凱乃復以連榻而坐客耶遂不坐而去倒屣迎賔王粲仲宣詣蔡邕邕倒屣迎之粲年少容皃短小既至一座盡驚邕曰王孫有異才吾不如也吾家書籍文章盡與之孔題客舎蔣欽緒厯吏部貟外郎始韓琬為髙郵主簿使京師自負其才有不遇之言題客舎它日欽緒見之笑曰是子嘆後時邪久之琬舉賢良方正欽緒擢其文異等客次王守恩為西京留守時周太祖以樞宻使將白文珂等軍西平三叛還過洛陽守恩方詣館謁坐於客次以俟見而吏馳報新留守視事於府矣守恩大驚不知所為遂罷去伏枕寄賔館宛同清漳濵李白留别詩客位但箕箒家貧無供給客位但箕箒杜甫送重表姪林表韋蘇州賔館在林表望山啓西扉五花館荆南舊有五花館待賔之上地故蔣鉉上成汭詩云不是上台憐姓字五花賔館敢從容南部新書掃灑黄金臺招邀青雲客李白寄呉王朋友十三白伐木燕朋友故舊也良朋執友同志者面友揚子法言曰友而不心面友也朋又曰朋而不心面朋也知己神交嵇康阮籍山濤一見便為神交同人同道也泛交吾友久敬晏平仲善與人交久而敬之同求將舊識呉季札見鄭子産如舊相識故知叔向適鄭騣蔑與一言而善執手以上遂如故知失人可與言而不與之言失人非義不合合志同術儒有合志同方營道同術並立則樂相下不厭其交友有如此者禮誰謂膠漆堅不如陳與雷陳重雷義友分深人語云淡若水君子之交淡若水小人之交甘如醴君子淡以成小人甘以壊傾蓋如故家語孔子遇程子傾蓋而語終日甚相恱顧謂子路曰程子天下之賢士取束帛以贈之知我者鮑叔管仲曰生我者父母捨短從長後漢李爕字徳公所交者皆捨短從長同心斷金如蘭易二人同心其利斷金同心之言其臭如蘭刎頸漢張耳陳餘相與為刎頸之交忘年文士傳禰衡有逸才與孔融作爾汝交時衡年二十餘融已年五十敬衡秀才而忘年也莫逆莊子曰四人相視而笑莫逆於心相與為友也忘言莊子云得意而忘言也義之與比君子之於天下無適也無莫也義之與比徳不孤必有鄰氣合聲同金石之交漢王與信芝蘭之室有朋自逺方來不亦樂乎無友不如己者友其士之仁者擇其善者而從之取友樂羣禮止於信禮曰交國人止於信盍簪易豫卦曰勿疑朋盍簪簪疾也朋從爾思上交不謟下交不瀆豈無他人唯子之好子夏曰可者與之不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢於人何所不容我之不賢與人將拒我如之何其拒人也注友交當如子夏泛交當如子張為友導騶范式為荆州友人孔嵩家貧為新野縣傭縣遣嵩為式導騶式曰孔仲山耶勑代嵩嵩以傭未畢不肯去定交於杵臼之間公沙穆家貧與呉祐賃舂祐與語大驚遂定交於杵臼之間鍾會年少傅嘏以明智友之君子定其交而後求西南得朋易為誄郤超卓犖有曠世之度竹林交遊毎有勝狀寒門後進拔而友之死之日貴賤為誄者四十人拜親推宅呉周瑜推道南大宅以舍孫䇿母升堂拜之有無通共拜親友荀顗王濟何劭為拜親友不拜母庾衮與諸兄過邑人陳淮兄弟友之拜其母衮獨不拜曰拜人之母將同於子其義至大鄰人禇徳隱逸養親老而無倦衮毎拜之拜父魏志孔融才高倨傲年在陳紀陳羣之間融先與紀友後與羣交更為紀拜下交史記趙有處士毛公藏於博徒薛公藏於賣漿家魏公子無忌從此二人結交遊交小吏呉祐舉孝廉郡中祖道祐越坐與小吏黄真歡語移時功曹以倨傲請黜之太守曰呉季英有知人之明且勿言其後真亦舉孝廉三友為一龍華歆邴原管寜為友俱遊學相善故時人號三友為一龍歆為龍頭原為龍腹寜為龍尾連璧夏侯湛孝若與潘岳友善毎出同輿人謂之連璧近不相得逺而彌親朋友相舉親戚相推心同琴瑟道叶膠漆貴相知心投分推誠金蘭松竹早鶯求友相彼鳥矣猶求友聲矧伊人矣不求友生交府士王尼為䕶軍府士卓犖不羈王澄胡母輔之齎羊酒詣䕶軍府尼時給府養馬輔之等遂入座馬廐下與尼炙羊飲酒醉飽而去不見䕶軍䕶軍大驚即與尼長假免其為兵益親家語孔子曰自季氏賜我粟千鍾其交益親孔與人交終嵗無款曲韋純友善李鄘彊直無私與楊憑穆質許孟容王仲舒友善皆以氣自任不妄交遊常衮與人交始終一節武儒衡交不茍合王珪慎於所遇交不茍合友託薛收與元敬俱為文學館學士時房杜等處心腹之寄深相友託蕭嵩為洛陽尉已有名士争往交非名士夙儒不與游蕭復非名士夙儒不與游以清操顯文章四友杜審言少與李嶠崔融蘇味道為文章四友世號崔李蘇杜小友李泌張九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦勁然蕭軟美可喜方命左右召蕭泌在㫄率爾曰公起布衣以直道至宰相而喜軟美者乎九齡驚改容謝之因呼小友已然諾郗士美平生與人交已然諾以是名重於世莫逆交楊寜與陽城為莫逆交徳宗以諫議大夫召城城未拜詔寜即諭與俱來終始不少變韓愈不詭隨與人交終始不少變深交者易怨禇遂良以為朋友深交者易怨寡交游裴光庭性静黙寡交游忘年交陸䞇張鎰有重名䞇往見語三日奇之請為忘年友與有名者游孔緯多與有名者游所交皆天下有名士鄭絪善屬文所交皆天下有名士一時俊傑杜佑所交遊皆一時俊傑忿恨薛逢初與彭城劉瑑交瑑文辭出逢數人下常易之瑑稍親近逢不得意遂相忿恨喜交豪猾博徒獨孤懐恩喜交豪猾博徒面交如携手北夢𤨏言顔堯自為誌文有面交如携手見利即解携而去也人生交契無老少論交何必先同調杜甫徒歩歸行北䆫三友白樂天以詩酒琴為三友詩曰今日北䆫下自問何所為欣然得三友三友者為誰琴罷輙舉酒酒罷輙吟詩三友遞相引循環無已時交遊解散羞與為戚栁宗元答問交遊解散羞與為戚生乎嚮慕毁書滅跡他人有惡指諉増益身居下流為謗藪澤故友新交李白贈新平少年故友不相恤新交寜見矜斗酒强然諾寸心終自疑李白谷風刺輕薄交道方嶮􅥤斗酒强然諾寸心終自疑對面九疑峰箜􅔃謡輕言託朋友對面九疑峰多花必早落桃李不如松管鮑久已死何人繼其蹤蘭交空懐思李白江上寄元六皆折官位輩行願為交韓愈王公碑家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交謝絶元載李少良上書詆其醜狀載由是非黨與不復接生平道義交皆謝絶傾心李安逺從士大夫茍勝己必傾心交之與楊綰崔祐甫善張鎰不妄交游特與楊綰崔祐甫善交能終始張九齡與嚴挺之袁仁恭梁昇卿盧怡善世稱其交能終始者所交必大人長者張廵所交必大人長者不與庸俗合能交當時豪俊孔述睿少修潔能交當時豪俊全交趙驊敦交友少與商寅顔真卿栁芳陸據蕭頴士李華邵軫善時為語曰啇顔栁陸李蕭趙邵謂能全其交也褐衣之賤路巖所交雖褐衣之賤待以禮始終一節刎頸交杜伏威與里人輔公祐約刎頸交博徒輕俠唐憲所交皆博徙輕俠雅自款結宇文士及初士及為隋奉御而高祖任殿中少監雅自款結寛厚樂易盧承慶寛厚樂易士友以此親之善與人交朱敬則善與人交方外十友陸餘慶雅善趙貞固盧藏用陳子昻杜審言宋之問畢搆郭襲㣲司馬承禎釋懐一時號方外十友耐久朋魏元同與裴炎締交能保終始故號耐久朋與貴近交王琚以父隱居甞為鳯閣侍郎故數與貴近交楊穆許李楊慿重交遊與穆質許孟容李鄘相友善一時歆慕號楊穆許李鄭楊段薛炙手可熱欲得命通魯紹瓌蒙崔鉉所善者鄭魯楊紹復段瓌薛蒙頗參議論時語曰鄭楊段薛炙手可熱欲得命通魯紹瓌䝉帝聞之題于扆是時魯刑部侍郎鉉欲引以相帝不許用為河南尹它日帝語鉉曰魯去矣事由卿乎鉉惶懼謝罪所與遊皆天下豪俊韓滉㓜時已有善名所與遊皆天下豪俊生死不易嚴挺之重交游許與生死不易既久乃益固盧鈞與人交結若澹薄既久乃益固時號鮑謝鮑防與中書舍人謝良弼友善時號鮑謝忘年交孟郊性介少諧合愈一見為忘年交山林友韋温少合所善惟蕭祐少貧窶隱居以孝聞謷然不以塵事自蒙故温號山林友布衣交鄭畋几與布衣交至貴無少易有名士栁渾與游者皆有名士友善富嘉謨累轉晉陽尉呉少㣲新安人亦尉晉陽尤相友善能終能始陳子昻趙貞固前死藏用撫其孤有恩人稱能終始交保交以簡恭栁玭述家訓戒子孫曰余㓜聞先公僕射言保交以簡恭金蘭簿戴洪正毎得宻友一人則書于編簡焚香告祖考號金蘭簿出宣武盛事嘗所與游皆青雲之士聞名如盧杜高韻如包李盧象杜甫包佶李紓劉禹錫武陵集紀故友少年樂新知衰暮思故友韓文除官赴闕金石姿我年二十五求友昧其人哀歌西京市乃與夫子親方為金石姿萬世無緇磷韓北極詩貴賤交不易恐傷中園葵李白宣城送劉副使艱難懐友朋羇旅惜宴㑹艱難懐友朋杜甫陪章留後惠義寺當面論心晚將末契託年少當面論心背面笑杜莫相疑行誠信治友莫若誠信杜牧送人赴舉序忘年友薛道衡崔祖濬與高儉為忘年友同襟期杜甫時赴鄭老同襟期鈞禮岑文本生平故人雖羇賤必鈞禮接故舊如布衣時劉仁軌雖貴顯不自矜倨接故舊如布衣時擇交十四拒交附白擇不處仁焉得智語拜其子後漢矦覇欲友王丹覇子見丹下車拜丹答拜覇子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也君子定其交而後求易無友不如己者語拒交陳遵欲交王丹丹拒而不許又楊仁字文義辟司徒桓虞府府椽宋章貪奢不法仁終不與交言同席友賢仇覽季智太學中與同郡符融比宇常自守融竒之曰志士交結之秋雖務勤學守之何執覽正色曰天子修太學豈使人游談其中乎融告郭林宗林宗曰與融齎刺詣之遂留宿林宗嗟歎下床為拜不拜親庾衮事見上注孔蕭復厲名節不通狎流俗不喜交權利崔從從賢士游宗室璡好從當世賢士游不妄交李讓夷廉介不妄交以道義合韋陟其以道義合雖後進布衣與均禮所與友皆第一流裴佶不喜與流俗交陸龜䝉不喜與流俗交雖造門不肯見胡生非其人不交胡逺客懐道守義非其人不交得無病乎韓愈答胡直均不敢厯門張直方西班倜儻勲臣也好接賔客與裴休善休不敢厯門孟郊審交種樹須擇地惡木變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬氷堅中有濳浪翻唯當金石交可與賢逹論文粹相成十五白相勸以義朋友攸攝攝以威儀攝助也詩雖有兄弟不如友生琢磨切磋君子成人之美不成人之惡贈友以言顔淵贈子路曰過墓則式忠告而善道之不可則止無自辱焉以文會友以友輔仁語博我以文約我以禮切切偲偲相切責皃益者三友友直友諒友多聞損者三友友便僻友善柔友便佞君子之愛人也以徳獨學而無友則孤陋而寡聞儒有聞善以相告見善以相示畏我友朋須友以成自天子至于庻人未有不須友以成者糾徳周徳司諫糾萬人之徳而勸之以朋友一言見上三益見上諍友士有諍友則身不離於令名醇酎程普言與周瑜交如飲醇酎不覺醉如行霧露有所潤也君子以朋友講習易曰麗澤兊投杖子夏哭子喪明曾子怒曰爾何無罪子夏投杖而拜曰吾過矣割席魏管寜與華歆同學歆聞車馬聲出門寜割席曰子非吾友也善交李爕徳公所交皆捨短從長好成人美時荀爽賈彪齊名而夑並交二子情無適莫世稱平正也人相忘於道術魚相忘於江湖蘇秦之激張儀秦先逹張儀候之數日乃見坐於堂下食以僕妾之餐告舍人曰儀才吾不及恐以小利忘求進故辱之儀怒入秦蘇君使舎人齎金帛車馬隂結助之卒相秦也塵附太山霧集河海言小之依大也文選薑桂因地而生不因地而辛韓詩外傳宋玉因其友事㐮王㐮王待玉無異乃譲其友云云孔同心濟謀杜如晦長於斷而房𤣥齡善謀兩人深相知故能同心濟謀以佐佑帝評權臯李華栁識韓洄王定皆仰臯節與友善洄定常評臯可為宰輔師保華亦以為分天下善惡一人而已更為隂陽迭作日月文粹故人相携直上太階更為隂陽迭作日月杜葉公如晦讃吕温子之善猶僕之善也文粹古者自天子至于庻人未有不須友以相成者僕雖老矣辱君子之遊同君子之道見君子之榮三十年矣子之善猶僕之善也得不相成乎答滁州張尚書栁冕不為薦託文粹李商隱與陶進士書時獨與令狐補闕最相厚嵗嵗為寫出舊文納貢院既得引試會故人夏口主舉人時素重令狐賢明一日見之于朝揖曰八郎之友誰最善綯直進曰李商隱者三道而退亦不為薦託之辭故夏與及第十推類援明疊足天庭栁宗元答問今之賢智莫不舒翹揚英推類援明疊足天庭魁磊恢張羣驅連行白孔六帖卷三十四
