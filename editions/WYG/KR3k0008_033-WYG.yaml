body:
  text: 白孔六帖卷三十三唐白居易原本宋孔傳續撰藥一疾二瞽三獸醫四巫五投壺六博棊七彈棊八賭九筭十射覆十一雜技十二藥一白易曰勿藥有喜象曰無妄之藥不可試也若藥弗瞑眩厥疾弗瘳書聚毒醫師掌聚毒藥藥之辛苦者惡石傳曰臧孫之惡我藥石也美疢不如惡石夫惡石猶生我疢之美其毒滋多秦人毒涇上流晉師飲之故多死者康子饋藥拜而受之曰丘未逹不敢嘗良藥苦口利於病張良云上藥養性中藥養病君臣之藥羿合藥姮娥竊食之而奔月青囊蛇膽見孝感門注聚蓄百藥月令仲夏不服其藥醫不三代一丸與我一丸藥光輝有五色魏文帝詩二價韓康字伯休賣藥不二價將欲救療必先聚蓄藥石薏苡馬援在南中得薏苡子食久而輕身辟邪氣乃載一車來為種人言援所載皆明珠文犀芎藭申叔展謂還無射曰冇山芎藭乎曰無河魚腹疾奈何注云欲使無射逃水中故問無禦濕之藥奈腹疾何馬援之欲身輕將求薏苡無射之憂腹疾空望芎藭審味於農帝之經考名於桐君之録列君臣百品之名辨辛苦五毒之味嘗味帝王世紀黄帝使岐伯嘗味於百藥陸抗飲藥抗疾羊祜饋藥抗不疑而飲之或止之抗曰羊叔子豈酖人者哉五藥草木虫石榖寘堇驪姬寘堇於肉堇烏頭也國語寒石散皇甫謐士安羸疾而披玩不怠服寒石散性乖忤每委頓不勝悲憤欲自殺叔母止之婢丸藥晉陳壽父喪羸病使婢丸藥沉累十餘年嘗畜毒藥魏太祖性嚴毅掾屬以公事徃徃加杖何䕫嘗畜毒藥誓死無辱是以終身亦不及也進藥於父傳曰許悼公虐飲太子止之藥卒故書曰止弑其君君子盡心力以事君捨藥物可也言藥有毒非常人知之譏止不捨藥物故加弑君之名孝子操藥以脩慈父聖人羞之投藥水中公羊齊人職守遂遂人投藥水中齊人飲之殱焉漆葉青黏散華佗授弟子可服之年百餘歳裴頠上言宜正太醫權衡此若差違失神農歧伯之正藥分兩輕重稍乖為害尤深占壽攷今夭折由此也郭文字文舉病王道遺藥文曰命在天不在藥壽長短時也孔調藥馬周病帝躬為調藥和藥賜之李大亮疾帝親和藥驛賜之𤣥宗賜讓皇帝憲等書曰魏文帝詩西山一何高高高殊無極上有兩僊童不飲亦不食賜我一丸藥光耀有五色服之四五日身體生羽翼朕毎言服藥而求羽翼寜如兄弟天生之羽翼乎頃因餘暇選仙録得神方云餌之必壽今持此藥願與兄弟共之偕至長齡永永無極也飲藥太宗皇后長孫氏媵侍疾病輙所御飲藥資之雲母粉尉遲恭餌雲母紛賜藥李勣自屬疾帝及皇太子賜藥即服攻疾張臯䟽曰藥以攻疾無疾不用藥也不周曉藥石于志寜與司空李勣脩定本草并圖合五十四篇曰昔陶𢎞景以神農經合雜家别録注名言之江南偏方不周曉藥石往往紕繆四百餘物今考正之棄藥栁公綽有道士獻丹藥問所從來曰自薊門時朱克融方叛遽曰惜哉藥自賊境來雖驗何益即棄藥而逐道士諸子進藥不肯御令狐楚疾甚諸子進藥不肯御曰士固有命何事此物邪童子峯朱孺子㓜事道士王元正居大若岩一日汲于溪上見二花犬相趂因逐之入于枸杞叢下而沒掘之得杞根形如二犬煑而食之味極甘香忽覺身輕飛于山峯上須㬰雲氣擁之而去元正食其餘因得不死遂號童子峯沈汾續仙傳仙藥有青津碧荻龍胎醴九鼎魚火棗交梨炎山夜日𤣥霜絳雪出酉陽雜俎藥草異號丹山魂雄黄青要女空青同上賣藥宋清國史補宋清賣藥長安市朝官出入移貶輒賫藥迎送施藥甚廣人有急難傾財濟之嵗計所得之利常有百餘倍長安人言有義者必稱宋清一置採藥師凡課藥之州置採藥師一人京師以良田為圜庶人十六以上為藥園生業成者為藥辨其所出擇其良者進焉唐志苦乏大藥資山林跡如掃杜詩藥物祕海嶽李白古風藥物祕海嶽採鈆青溪濱不死藥歸登有遺金石不死藥者紿曰已嘗及登服幾死訊之乃未之嘗人皆為怒而登不為愠誤進杜黄裳嘗被疾有醫者誤進藥疾遂甚終不怒譴鍾乳高季輔帝賜鍾乳一劑鍾乳胡椒元載籍其家鍾乳五百兩胡椒至八百石常春藤姜撫召至東都因言服常春藤使白髪還鬒則長生可致藤生太湖最良終南往往有之不及也帝遣使者多取以賜中朝老臣因詔天下使自求之當病飲藥程元振傳栁伉上疏曰陛下以今日勢為安耶危耶若以為危豈得高枕臣聞良醫療疾當病飲藥藥不當病猶無益也蠲疾栁澤上疏曰藥不毒不可以蠲疾停藥石於膚腠王志愔言停藥石於膚腠則俞跗不能攻疾黄耆防風煑湯許𦙍宗仕陳為新蔡王外兵叅軍王太后病風不能言脉沉難對醫家告術窮𦙍宗曰餌液不可進即以黄蓍防風煑湯數十斛置床下氣如霧重薄之是夕語擢義興太守藥籠中物元行冲狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯腊膎胰以供滋膳參术芝桂以防疾疢門下充㫖味者多矣願以小人備一藥石可乎仁傑笑曰此正吾藥籠中物也蒔藥草自供王績金石凌湯酉陽雜俎安禄山恩寵莫比其所賜有金石凌湯劑及藥童子昔賢子就宅煎自怜賦余抱病二年於衡泌之下醫甚庸而氣益盛藥非良而價倍高每一把臂一下杵未嘗不解衣輙食而後至也其為窮且病亦已至矣作自怜賦笠澤叢書服食可延年李白詩我來採菖蒲服食可延年藥許鄰人斸杜歸溪詩藥條藥甲潤青青絶句高齋依藥餌暮春巾拂香餘搗藥塵憶昔行看題檢藥囊西郊詩種藥扶衰病逺遊詩近根開藥圃高柟詩藥裹關心詩揔廢酬郭省郎憂病士書信有柴胡寄韋郎中省郎憂病士書信有柴胡飲子頗通汗懐君想報珠藥餌者所以禦疾裴憐諫夫三牲五榖禀五行以生也發為五味天地生之所以奉人聖人節調以致康强若乃藥劑餌者所以禦疾豈常進之餌哉何用藥為五代崔梲性至孝其父涿病不肯服藥曰死生有命何用藥為梲屢進醫藥不納每賔客問病者梲輙迎拜門外泣涕而告之涿終不服藥而卒曬藥能無婦杜甫秦州詩幸其家甄權嘗以母病與弟專醫方得其㫖趣年一百三嵗太宗幸其家視其飲食訪逮其術因授朝散大夫賜几杖衣服所擣之藥李白飛龍引紫皇乃賜白兎所擣之藥方後天而老凋三光尚藥奉御掌和御藥及診候之事直長為之貳凡藥有上中下之三品凡合藥宜用一君二臣三佐四使方家之太經也必辨其五味三性七情然後為和劑之節五味謂酸鹹甘苦辛酸屬肝鹹屬腎甘屬脾苦屬肺三性謂温寒熱七情謂有相刑者有相須者有相使者有相畏者有相惡者有相反者有相殺者其用又有四焉曰湯丸酒散視其病之深淺所在而服之唐六典凡合御藥與殿中監視其分劑藥成先嘗而進焉同上主藥藥童掌刮削擣篩同上疾二疾疫附白寢疾有加無瘳伯牛有疾子曰斯人也而有斯疾也無妄之疾勿藥有喜易遘厲虐疾日臻彌留顧命曰病日臻既彌留彌久也疾大漸惟幾幾危也六極二曰疾節宣其氣勿使有所擁閉湫底以露其體露臝也子産云五福三曰康寜無疾病也愆于厥身病也病未及死吾子忍之張侯謂郤克云疾瘧方起病莫能興死而後已天有災癘厥疾不瘳恫􅟂乃身恫痛也病也美疢沉疴多瘠罔詔言人疾不詔救書積憂成病遘癘四時皆有癘疾周禮寛疾周禮以保息六養萬民五曰寛疾有疾者寛養之大札移人又曰大札則令邦國移人注大札疾疫也移人避災也病間間差也人有大疫月令夫子之病革矣革音殛不令兄弟交相為瘉夢為豎子晉矦夢病為二豎子夢黄熊入門今夢黄熊入於寢門厲鬼乎子産曰昔堯殛鯀于羽山其神化為黄熊入于羽淵三代祀之晉為盟主其未祀乎韓宣子乃祀夏晉矦有間熊音奴來反子之所慎齋戰疾重膇之疾傳郇瑕氏土薄水淺其惡易遘於是有沉溺重膇之疾膏肓晉矦之疾膏之上肓之下藥不至焉詐令尹薳子慿以疾辭官重蠒衣裘鮮食而寢王使醫視之曰瘠則甚矣而血氣未動佯韋𤣥成讓爵於兄佯病狂而壊容貌偽呉公子光偽足疾入于窟室敗靣魏祖少游蕩叔父數言於其父嵩祖患之偽敗靣口偏叔父見云中惡風又告嵩嵩驚呼曰叔父言汝中風已差乎對曰初不中風但失愛於叔父故見罔爾自後叔父所告嵩終不復信也父母唯其疾之憂伯牛有疾子問之自牖執其手玉體不安士啓楚太子有疾呉客往問之曰聞太子玉體不安啓手足曾子有疾召門弟子曰啓予手啓予足而今而後吾知免夫小子楚昭王曰除腹心之疾而寘諸股肱何益也晝居於内問其疾可也疾病禮疾病外内皆掃君大夫徹縣士去琴瑟寢東首於北牖之下君視疾君視之東首加朝服拖紳消渴司馬相如常患消渴瘨胘揚雄曰臣常有瘨胘之疾漳濵劉公幹卧病漳濵頭風陳琳作檄事見檄門子疾病子路請禱子曰丘之禱久矣祟晉矦有疾叔向問子産曰寡君疾病卜人曰實沉臺鮐為祟敢問何神也子産曰實沉參神也臺鮐汾神也二者不及君身君身則出入飲食哀樂之事山川星辰之神又何為焉六疾傳曰天有六氣淫則生六疾隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾内熱女傷物晦時滛則生内熱惑蠱之疾汲黯之卧淮南劉楨之居漳濵疕瘍皆瘡也周禮廢疾非人不養者一人不從政政徭役也問疾不能遺不問其所欲卿大夫疾君問之無筭士一問之君於大夫疾三問之展轉伏枕既微且尰骭瘍為㣲腫足為尰鼽􅅉易簀舉扶而易簀反席未安而没曾子荀偃癉疽生瘍於頭目出著癰病也非鬼非食惑以喪志左傳孟縶之足不良能行跛也夭疾榖梁曰有夭疾者不得入於宗廟智囊宿瘤並癭也越聲莊舄越人仕楚執圭及病為越聲躄者盤散行汲平原美人笑之重病趙歧年三十有重疾自慮奄忽遺令立碑於墓前刻曰漢有逸人姓趙名歧後疾愈矣生癭賈逵争公事發憤生癭欲割之太祖惜之曰十人割九人死逵猶割竟愈床下蟻聲殷仲堪父患耳聽聞床下蟻動如牛闘聲杯中蛇影樂廣為河南尹有親客久不來廣問之對曰前在坐蒙飲見杯中有蛇影意惡之而有疾于時㕔上有角弓畵作蛇廣意是弓影也乃告所以仍令坐舊處與飲杯中乃是弓影遂豁然而愈痁作而伏趙羅戰無勇縻之吏請之御對曰痁作而伏縻束也負薪之憂嚙被樂頥之病恐母聞不敢呻吟嚙被至破久嬰漳浦常寢茂陵如臨不測之泉似執將枯之木相如疾甚留封禪之書朱超伏枕有寄文之作三疾令戸令諸一目盲兩耳聾手無二指足無大拇指秃瘡無髪久漏下重大癭腫之類皆為殘疾癡瘂侏儒腰折一肢廢如此之類皆為廢疾瘨狂兩肢廢兩目盲如此之類皆為篤疾趙簡子病五日不知人扁鵲曰血脉均治也昔秦穆公如此七日而寤寤曰我之帝所觀樂主君病三日必聞及寤曰我之帝所觀鈞天廣樂賜鵲田四萬畝病忘列子宋陽里華子中常病忘不可救療傳疾疫疾疫方起天有災癘天災流行人有大疫人殃於疫國多風欬人多瘧寒寒暑不時則疾桓虔之差瘧桓豁字石虔為人勇壯時有患瘧者呼桓石虔以怖之疾者多愈庾衮字叔褒咸寜中大疫二兄俱亡次兄毗復病癘氣方盛父母諸弟皆出於外衮獨不去父母彊之可親自扶持晝夜不眠其間又撫柩哀號不輟十餘旬疫勞消歇家人乃反毗疾差衮亦無疾孔風痺裴垍為相五年暴風痺帝悵惜遣使至問藥膳進退輒䟽聞居三月益痼遣使臨問相望於道薛收武徳七年寢疾王遣使臨門相望於道宿病皆愈李百藥㑹高祖遣使招伏威百藥勸朝京師既至厯陽中悔欲殺之飲以石灰酒因大痢瀕死既而宿病皆愈晚節多病房𤣥齡晚節多病時帝幸玉華宫詔𤣥齡居守聽卧治事神用頓耗容止不常岑文本從伐遼東事一委倚至糧漕最目甲兵凡要科配差序籌不廢手由是神用頓耗容止不常至幽州暴病嗜欲勝則疾疹作張臯上䟽曰神慮澹則血氣和嗜欲勝則疾疹作緜頓順宗皇后王氏順宗即位疾已緜頓后侍醫藥不少怠嬰霜露疾后崩年五十四遺令曰未亡人嬰霜露疾日以哀頓房喬疾甚帝命鑿苑垣以便候問親握手與决詔皇太子就省引疾裴度大和四年數引疾不任機重願上政事帝擇上醫䕶治中人日勞問相躡移疾穆寜雖直其誣猶置散位寜嘿不樂唶曰時不我容我不時徇又可以進乎遂移疾滿百日屢矣親友强之輙復一朝挾扶以出韓𢎞病自河中還詔百官問疾𢎞遣子辭不能見公綽謂曰上使百司省候是謂異禮宜力疾以見公卿安可卧令子姪傳言耶𢎞懼挾扶以出自陳孔緯以門下侍郎復輔政使者敦勸力疾到京師見帝嗚咽流涕自陳衰疾不任事乞歸田里帝動容詔使者送緯至堂視事會天子出次石門從至莎城以病還都恃安而忽則疾生為國者如治身及身康寜調適以自助如恃安而忽則疾生李珏病風盧攜後病風足蹇神昏智瞑塞事多决於親吏楊温李修不任奉謁王徽權京兆尹為帝左右所憎衆忿共譛罷徽令赴行在俄授太子少師徽遂移疾河中滿百日免帝還京師復申前授稱疾不任奉謁鬱鬱不得志成疾韋陟肅宗擇相自謂必得及入關又不許至京師鬱鬱不得志成疾且卒嘆曰吾道窮於此乎不甘魚肉之味呉兢䟽曰人將疾必先不甘魚肉之味國將亡必先不甘忠諫之說疾革言不及病李巽元和四年疾革郎官省候巽言不及病但與商校程課功利不良趨走呉湊為福建觀察使與宰相竇參有憾參數加短毁又言湊風痺不良趨走帝召還驗其疾非是繇是不直參飲食資身過則生患柳公綽太醫箴飲食資身過則生患未嘗一日言病張萬福自始終禄食七十年未嘗一日言病惡疾孫思􅊬孟詵盧照隣等師事之照隣有惡疾不可為感而問曰高醫愈疾奈何本傳羸瘠顧相時羸瘠多病左右代拜李林甫已屬病稍侵會帝幸温湯詔以馬轝從御醫珍膳繼至詔㫖存問中官䕶起居病劇巫者視疾云見天子當少間帝欲視之左右諫止乃詔林甫出廷中帝登降御閣舉絳巾招之林甫出能興左右代拜就中書療治楊綰同中書門下平章事素痼疾居旬日寖劇有詔就中書療治加工部尚書拜卧内劉瑑同平章俄而大病加工部尚書拜卧内猶手䟽陳政事病居心腹武平一上書病之在四體者跡分而易逐居心腹者候遽而難治及心則殆張文仲武后時至尚藥奉御特進蘇良嗣方朝疾作仆建中文仲診曰憂憤而成若脅痛者殆未可救頃告脅痛又曰及心則殆俄心痛而死靣不能罷頮髮不能拍櫛如是未移日而疾劉禹錫髪蓬如而忘乎亂靣黔如而忘乎垢同上越人病且憂則聚巫師用雞卜越人信祥而易殺傲化而偭仁越人病且憂則聚巫師用雞卜始則殺小牲不可則殺中牲又不可則殺大牲而又不可則訣親戚飾死事曰神不置我已矣因大食蔽靣死桞子疹疾况自嬰疹疾寜保軀不貲韓文緜惙一朝被病遂至緜惙夢得代裴相譲官表造化小兒相苦杜審言病甚曰甚為造化小兒相苦思愈疾者思愈必呻而求醫夢得書雖父母病皆委去蜀人畏鬼而惡疾雖父母病皆委去士廉為設條教高士廉傳疫癘忽潜遘韓愈赴江陵疫癘忽潜遘卜家無一瘳羸頓栁宗元與韓愈書昔與退之期為史志甚壯今孤囚癈痼連遭瘴癘羸頓朝夕就死無能為也身欲奮飛病在床杜詩韓諫議注職當憂戚伏衾枕况乃遟暮加煩促長卿消渴再公幹沉綿屢送高司直衰疾謝知音西閣詩蕭條病轉嬰司馬卧病海雲邊所思烝生熱否生寒孫思邈曰人之四支五臟一覺一寐吐納徃來流為榮衛章為氣色發為音聲人之常數也陽用其形隂用其精天人所同也失則烝生熱否生寒結為瘤贅䧟為癰疽奔則喘乏竭則焦槁發乎靣動乎形天地亦然五緯縮羸孛彗飛流其危診也寒暑不時其烝否也石立上踊是其瘤贅山崩土䧟是其癰疽奔風暴雨是其喘乏川瀆竭涸是其燋槁高醫導以藥石救以砭劑聖人和以至徳輔以人事故體有可愈之疾天有可振之災逃瘧功臣閣下高力士上皇徙西内居十日為李輔國所誣除籍長流巫州力士方逃瘧功臣閣下輔國以詔召力士趨至閣外遣内養授謫制風氣百二十四氣狀八十方技張文仲諸言方者與共著書詔王方慶監之文仲曰風氣百二十四氣狀八十治不以時則死及之惟頭風與上氣足氣藥可常御病風之人春秋末月可使洞利乃不困劇自餘以時消息乃著四時輕重術凡十八種上之乗秋作寒熱翁嫗所罵譏韓愈譴瘧鬼乗秋作寒熱翁嫗所罵譏求食嘔洩間不知臭穢非醫師加百毒薰灌無停機炙師施艾炷酷若獵火圍詛師毒口牙舌作霹靂飛符師弄刀筆丹墨交横揮有頂骨栁芳為郎中子登疾重時張萬福名善醫張初除泗州與芳有舊遽引視登遥見登頂曰有此頂骨何憂疾也因按脉五息復曰不錯壽且踰八十乃留方數十字謂登曰不服此亦得登後為庶子年至九十而卒出酉陽雜俎凡人好辭工書者皆病癖也栁宗元報崔秀才書凡人好辭工書者皆有病癖也言不幸蚤得二病學道以來日思克砭鍼攻熨卒不能去纒結心腑牢甚願斯湏忘之而不竊嘗自毒今吾子乃始欽欽思易吾病不亦惑乎瞽三白眇能視易子見瞽者雖少必作過之必趨喪明子夏喪其子而喪其明盲子夏杜欽字子夏目偏肓與杜鄴同姓字俱以才能見稱京師謂欽為盲子夏欽患之乃獨為小冠由是京師人呼為小冠子夏盲夏侯魏夏侯惇為流矢中傷左目與夏侯淵俱為將軍中號惇為盲夏侯求方晉范甯患目疾就中書侍郎張湛求方湛嘲之曰右方宋陽里子受魯東門伯伯受左邱明邱明傳杜子夏一減思慮二専内視婢進蠐螬盛彦事見父母疾門倀倀乎目無所見兒左氏喪明厥有國語司馬遷云五色令人目盲老子師冕見及階子曰階也及席子曰席也皆坐子告之曰某在斯某在斯師冕出子張問曰與師言之道與任永君馮信並好學公孫述徴不就皆託青盲及述誅而目明孔治刮崔謹由遷戸部侍郎始謹由苦目疾不得視醫為治刮適愈而召母禁其為學杜顗㓜病目母禁其為學獨盲於目無所能人乃宜以盲廢有所能人雖盲當廢於俗輩不當廢於行古道之人當今盲於心者皆是若籍自謂獨盲於目爾韓愈代張籍書盲者業於藝必専故樂工皆盲同上求道於盲未有見其得答陳生離婁閉目皮日休悼賈離婁閉目瞽者揚眉瞽者不見泰山陳子昂賛瞽者不見泰山子昂之于言其聾瞽歟無用於天下韓愈書兩目不見物無用於天下獸醫四白獸醫掌療病及瘍周禮凡療獸病灌而行之以節之以動其氣療獸瘍灌而刮之以發其惡然後養食之張里以馬醫撃鍾漢書牛醫之子黄憲巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人乗謂驅歩以發其疾知病所處乃治之相助也孔送細馬百官志諸牧監毎嵗孟秋羣牧使送細馬則有獸醫等不得番息于志寜東官僕御舊得番休志寜上䟽極言曰竊見僕寺司馭爰及獸醫自春迄夏不得番息馬醫栁宗元書鑿養為業會昌中有豪士張休復以鑿養為業馬疫不能療者即以一藥啗之旬日而逸歩駿健貨之其利十倍餧之艾之行之節之郤昂八馬坊碑内廐馬毎有瘠者病者老者疲者擇其不任者以頒諸坊則必餧之艾之行之節之俟其跳梁俟其充腯而後入之獸醫掌療馬病凡馬病灌而行之觀其病之所發療馬病有五勞一曰筋勞二曰骨勞三曰皮勞四曰氣勞五曰血勞久歩則生筋勞久立則生骨勞久汗不乾則生皮勞汗未瘥踈而伺飲之則生氣勞驅馳無節則生血勞有傷寒者有傷熱者寒暑加減據經方以療焉唐六典油藥灌劀之物郤昂八馬坊碑巫五白用史巫紛若吉易司巫掌羣巫之政令國大旱則帥巫而舞雩國有大災則帥巫而造巫恒會常聚之巫以待命女巫掌嵗時祓除釁浴嵗時祓除若令三月上已如水上之類俗以香薰草藥沐浴在男曰覡女曰巫使制神處位國語沉巫西門豹為鄴令沉巫覡焚巫傳夏大旱公欲焚巫尫娶巫家女黄覇娶巫家女知其有貴故娶之自汙後漢高鳯不應恐不免自言巫家子以自汚也小巫見大巫神氣殫矣呉書張紘見陳琳作武庫賦嘆之琳答曰僕在河北北少文章易為雄伯故使僕有此譚今足下子布在彼所謂小巫見大巫神氣殫矣桑田巫晉侯病召桑田巫曰不及食新矣梗陽之巫臯梗陽邑名臯巫名章丹陳朱隱形吐火晉夏統仲御從叔敬寜祠先人迎女巫章丹陳朱二人並有國色裝服甚盛善歌舞又能隱形匿影甲夜之初撞鐘擊鼓間以絲竹丹珠又拔刀吐火雲霧杳𡨕流光發電統諸兄弟欲徃觀之而難統於是共理之曰從父聞疾病得瘳小大以為喜慶欲因祭祀並徃賀之卿可俱行乎統從入門忽見之驚愕而走也惟神與鬼杳杳𡨕𡨕託以師巫招於禱祈天神人鬼雖逹幽𡨕如有邪妄其或闕之不為知禮赴巫立祠天神上帝百鬼以雞卜史記宋陽里華子病忘謁巫而卜之不吉列子孔禳祓類巫覡王璵擢太常博士為祠祭使専以祠解中帝意有所禳祓大扺類巫覡乗傳分禱天下名山大川帝嘗不豫太卜建言祟在山川皆遣女巫乗傳分禱天下名山大川巫皆盛服中人䕶領小􅇊栁澤景雲中嘗上䟽言尚醫奉御彭君慶以巫覡小􅇊超授三品奈何輕用名器加非其人召巫太子英鄂王瑶光王琚並廢為庶人遇害天下寃之號三庶人嵗中武惠妃數見庶人為祟因大病夜召巫祈之請改葬且射行刑者瘞之訖不解妃死祟亡置符履中棣王琰妃韋以過置别室而二孺人争寵不平求巫者密置符琰履中以求媚與巫祝言不順來瑱拜兵部尚書是時程元振居中用事疾瑱乃告與巫祝言不順閉關不納侯希逸夜與巫家野次李正己因衆怨閉關不納毬場隱龍龎勛巫言毬場有隱龍得之可戰勝勛大役徒鑿地不能得被髮衘刀劉文静家數有怪文起憂召巫夜被髮衘刀為禳厭營惑於人陳子昂上言巫鬼營惑於人者禁之挾鬼道趙彦昭本以權幸進中宗時有巫趙挾鬼道出入禁掖彦昭以姑事之嘗衣婦服乗車與妻偕謁其得宰相巫力也託鬼神致位將相王璵託鬼神致位將相時以左道進者紛紛出焉南方信禨巫李徳裕出為浙西觀察南方信禨巫雖父母癘疾子棄不敢養徳裕擇長老可語者喻以孝慈大倫患難相收不可棄之義數年惡俗大變喜巫鬼劉禹錫斥朗州司馬州接夜郎諸夷風俗陋甚喜巫鬼毎祠歌竹枝鼓吹裴回其聲傖儜禹錫謂屈原沅湘間作九歌使楚人以迎送神乃倚其聲作竹枝詞十餘篇除巫祝李泌肅宗祝擢王璵執政大抵興造工役輙牽禁忌俗說而黎幹以左道位京兆尹徳宗素不然及嗣位除巫祝鳥卜西域傳東女以十一月為正巫者以十月詣山中布糟麥呪呼羣鳥俄有鳥來如雞狀剖視之有榖者嵗豐否則有災名曰鳥卜胡巫李軌有胡巫妄曰上帝將遣玉女從天來遂召兵築臺以候女多所糜損屬荐飢人相食軌毁家貲賑之能活死人田仁㑹遷右金吾將軍有巫傳鬼道惑衆自言能活死人市里尊神仁會劾徙于邊白頭老人羅𢎞信為禆將主馬牧魏有巫告𢎞信曰白頭老人使謝君君當有是地𢎞信曰神欲危我耶文㺹死衆曰孰願主吾軍者𢎞信輒曰神命我矣衆環視以為宜遂立之巫不吾紿回紇永泰初懐恩反誘回紇吐蕃入冦俄而懐恩死二虜争長回紇首領潜詣涇陽見郭子儀請改事始虜有二巫言此行必不戰當見大人而還及是相顧笑曰巫不吾紿也安祿山母安祿山本姓康母阿史徳為覡居突厥中淫巫瞽史栁宗元貞符曰司馬相如劉向揚雄班彪彪子固皆㳂襲嗤嗤推古瑞物以配受命其言類淫巫瞽史王奉仙高駢師鐸既敗慮駢内應有女巫王奉仙謂師鐸曰楊州災有大人死可以厭彦曰非高公邪命左右陳賞等徃殺之疾不呼巫李勣疾家欲呼巫不許斬巫絶火錢元懿牧新定一日閭里間輒數處火起居民頗憂恐有巫楊媪因之遂興妖言曰某所復當火皆如其言民由是竟禱之元懿謂左右曰火如巫言巫為火也宜殺之乃斬媪于市自此火遂絶恣為鬼神語錢偡年十八出為湖州刺史有妖巫登衙門大樹恣為鬼神語人皆驚畏偡曰妖由人興命張弩而射巫果請命因鞭之州人咸服已上出呉越備史神巫天寶初有范氏居者能知人休咎顔魯公尉醴泉曰詣范居問命日神巫某官階盡五品否居曰幾隣於一品所望何其卑耶魯公曰官階盡五品著緋衫帶銀魚兒子補齋卽某之望滿矣范指座上紫絲布食簟曰顔郎於衫色如此其功勞名節皆稱是云常侍言㫖投壺六白禮記投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賔賔曰子有㫖酒嘉肴某既賜矣又重以樂敢辭燕飲升坐主人乃請投壺也枉哨不正貌主人曰敢固以請賔曰某固辭不得命敢不敬從賔再拜受拜受矢也主人般還曰辟主人阼階上拜送賔般還曰辟般音盤還音旋辟音避禮即兩楹間言將有事於此上同退反位揖賔就筵欲與偕進明為偶也設中東靣執八筭興請賔曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬二馬既立請慶多馬馬勝筭者命弦者奏貍首弦鼓瑟者貍首詩篇名間若一以為志取節左右告矢具請拾投拾更也音其劫反有入者則司射坐而釋一筭焉賔黨於右主黨於左命酌曰請行觴當飲者皆跪奉觴曰賜灌灌飲也當飲者謂不勝者勝者跪曰敬養筭多少視其坐坐人多少四矢則四筭籌室中五扶堂上七扶庭中九扶籌矢也四指曰扶筭長尺二寸壺頸修七寸腹修五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子踰言以上魯同若是者浮唯此一句與弟子賔主黨也魯鼓薛鼓言舉各有節中㑺有酒有肉傳晉侯與齊侯投壺晉侯先曰有酒如淮有肉如坻寡人中此為諸侯師中之齊侯曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂中行穆子曰子失辭吾固師諸侯矣壺何為焉其以中雋一發以中為雋也軍中東漢祭遵為將軍士皆用儒術每雅歌投壺在軍旅中不㤀俎豆主人有儀弟子無敖既備主禮以崇賔儀展再拜之儀盤旋而避備三辭之禮揖譲而升賔主之歡禮樂之節初筵有踐正爵既行主三請以執壺賔再拜而受矢筭惟視坐矢以拾投賔階主黨為勝者立馬而慶多當飲者賜灌而敬養魯薛之令齊晉之君侍投則擁矢侍長者投壺擁矢致敬也勝則洗而以請洗爵請行觴而不敢直飲客亦如之亦洗而請不角角觥也於尊長不行罰觥如獻酬之禮不擢馬擢徹也於長者不去馬嫌勝也魯鼓薛鼓鼓節取半以上為投壺禮盡用之為射禮王弼善投壺魏略云嘉賔投矢既即兩楹司射度壺爰陳八筭勝而慶馬樂則歌貍敏手玉女投壺孔窮日夜韓愈鄭儋碑與賔客朋遊投壺博奕窮日夜若樂而不厭者工投壺裴寛破愁顔投壺破愁顔李白登邯鄲洪波臺詩投壺莫辭頻擬古上官儀投壺經一卷藝文志接高宴他日觀軍容投壺接高宴江夏寄輔録事失辭文粹孫逖伯樂川記笑投壺之失辭博棊七雜博附白寗子視君不如弈者舉棊而不勝其偶左傳云詞曰箆蔽象棊有六博箆蔽玉箸也以象飾其投六箸行六棊故曰六博也分曹並進遒相迫曹偶也道亦迫也成梟而牟呼五白梟勝也倍勝為牟五白博齒也晉制犀比費白日晉制工制作博箸比集犀角為雕飾投之如白日之光費日光貌投江晉陶侃語人曰聖人惜寸隂衆人當惜分隂諸參佐毋以戲廢事乃取摴蒱局投之於江也擲局漢景帝為太子與呉太子博而争道以局擲殺呉太子文選云殯呉嗣於局下善發怒於一博猶賢子曰飽食終日無所用心難矣哉不有博弈者乎為之猶賢乎已好行小惠當惜分隂結黨連羣傾財破産争勝負呼五白賭千金一擲百萬藝成而下漢吾丘壽王善格五待詔注云博類也不用箭但行梟散又曰格三行塞白乗至六格不得行又曰今之戲塞塞音先代反博進漢宣帝微時與陳遵祖父遂有故相隨博弈數負進宣帝即位遂至太原太守賜璽書曰官尊禄厚可以償博進矣妻君寜在旁知狀遂頓首白在赦前劇孟博徒覆棊魏志王粲觀圍棊局壊粲覆之棊者不信使更他局用比校不誤一道方始知其疆記也馬融圍棊賦曰圍棊者法於用兵怯者無功貪者先亡臨難圍棊蜀志費禕與來敏棊于時羽檄交馳嚴駕已訖留敏竟棊色無厭倦敏曰君必能辨賊者哉禕至敵遂退也亡羊莊子臧與榖俱牧羊而俱亡其羊問臧何事挾䇿讀書問榖何事博塞佚游也堯造圍棊教丹朱博物志說文曰弈圍棊也塞行棊相塞之塞王戎居喪不拘禮制或觀博弈然容貌毁悴阮籍棊聞喪不止聞母終而方與人棊棊者求止籍留與决而舉哀號咷吐血數斗王獻之觀人弈曰南風不競人曰此郎所謂管中闚豹時見一班獻之曰近慙荀奉倩逺媿劉真長拂衣而去劫急陳留阮簡字茂𢎞為開封令有劫賊吏白曰甚急簡方圍棊長嘯吏曰劫急簡曰局上劫亦甚急禁博棊管子五政其一也摴蒱擲馬庾翼集曰鞭爛鞍朽異苑曰有人乗馬山行見洞裏有二老翁樗蒱乃以馬䇿莊地觀之俄然馬鞭爛馬鞍朽也爛柯與爛鞭事相類樵人也呼梟擲馬博塞以遊分曹是習晉袁耽字彦道善博桓温少游博徒資産俱盡尚有負進求濟於耽耽在服誠告焉耽略無難色變服懐布㡌隨與債主戯耽素有藝名債者聞而不識謂曰卿當不辨作袁彦道也遂就局十萬一賭直上百萬既投馬絶呌操布㡌於地曰竟識袁彦道否通曉如此也負進見上注摴蒱劉毅家無儋石之儲摴蒱一擲百萬雉盧五木劉毅字布樂於東府聚摴蒱一擲應至數百萬餘並黒犢以還唯劉裕及毅次擲雉大喜褰衣繞床呌謂同坐曰非不能盧不事耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黑其一子轉躍未定裕厲聲叱之即成盧毅意殊不快也牧豬奴戯陶侃投蒱博局於江曰摴蒱者牧豬奴戯耳三盧慕容寶與韓黄李根等因醼摴蒱危坐整容誓之曰世云摴蒱有神豈虛言哉若富貴可期頻得三盧於是三擲盧寶拜而受賜論呉韋曜𢎞嗣為太子中庻子時蔡頴亦在東宮性好博弈太子以為無益命曜論之心懼棊弱符堅入冦衆號百萬京師震懼謝𤣥入見安安夷然不懼曰已别有㫖𤣥不敢言乃令張𤣥重請安遂出遊小墅與𤣥棊賭墅安常劣於𤣥是日𤣥懼便為敵手而又不勝安矯情鎮物如此争道王導與其子恱弈棊争道導笑曰相與有𤓰葛那得為爾忘憂祖納字士言好弈棊王隱謂之曰禹惜寸隂不聞弈棊納曰以忘憂也教弈弈秋通國之善弈秋誨二人弈其一人専心致志唯弈是聼其一人雖聽之一心以為有鴻鵠将至思援弓繳而射之與之俱學弗若之矣將為智獲豈在力求勞情損思廢日妨功存勝負之宜致成敗之理羸師延敵運計乗虛道可存焉莫使迷復博弈為戱典禁光明始開䙝黷之源終虧敬譲之本招悔吝則抱朴興言勞情思則呉儲發嘆禹帝立言寔有輕於尺璧陶公明戒自取貴於寸隂勢似兎宫形如蛇穴失禮迷風圍棊是也賈誼云廢時曠日韋曜論云曹子建喻兄作圍棊言陣如此孔善弈盧藏用舉棊不定則敗長孫無忌曰舉棊不定則敗棊復棊韓琬上言比法令數改或行未見益止未知損譬弈者一棊為善而復之者愈善方圓動静李泌帝方與張說觀弈使說試其能請賦方圓動静泌逡廵曰願聞其略說因曰方若棊局圓若棊子動若棊生静若棊死泌即荅曰方若行義圓若用智動若騁材静若得意說因賀帝得奇童以棊待詔王叔文越州山隂人以棊待詔治國譬之於弈五代史治國譬之於弈知其用而置得其處者勝不知其用而置非其處者敗敗者臨棊注目終日而勞心使善弈者視焉為之易置其處則勝者所用敗者之棊也興國所用亡國之臣也圍棊軍中楊行密龎師古泊清口張訓自漣水來行密使將羸兵千人為前鋒師古易之方圍棊軍中不顧國高皆出其下新羅王死帝命邢璹吊祭又以國人善棊詔楊季鷹為副國高弈皆出其下玉棊子唐宣宗朝日本國王子來朝善圍棊帝令待詔顧師言與之對手王子出本國楸玉棊局冷暖玉棊子蓋玉之蒼者如楸玉色其冷暖者冬暖夏冷出北夢𤨏言嚥子棊天洞覧曰元稹與李杓直棋稹已敗乃竊杓直數子嚥之及尋問稹乃怒檀心棊子棊訣關城中貴家以紫檀心瑞龍腦為棋子四子一詩棊天洞覽王勃圍棊率下四子成一首詩勃因詫之向人曰吾才奪造化一時之間百用亦可龍吐棊經棊訣王積薪夢青龍吐棊經九部授已其藝頓精圍棊短具洞覽王積薪毎出遊必携圍棊短具畫紙為局與棊子倂盛竹筒中繋於車轅馬鬛間道上雖遇匹夫亦與對手勝則徴餅餌牛酒響玉棊盤又曰元頥本枰棊聲與律吕相應盖用響玉棊盤非有異術也知棊勢人能盡數天星則知棊勢出止戈集蛻龍牙取蛻龍牙一枚臨局自然機變横出出棊訣金靣棊盤蘇尚書八十猶叅禪大溈訪之以手拍碎金靣棊盤尚書尋悟出禪學録墨狻猊徐峰善棊叚生欲窮其術峰曰子若以墨狻猊與我當使子過我十倍出龍髓記婦姑弈棊王積薪隨明皇西幸宿山中孤姥之家簷下夜忽聞姑與婦棊因附身門扉一一宻記共下止三十六忽聞姑曰子已北矣吾之勝止七枰耳遲明王其禮請問出局盡平生之好布子未及數十姑謂婦曰是子可教以常勢因指示攻守殺奪救應防拒之法其意甚略曰此已無敵人間矣謝而别回顧失向之室矣出異叢談記石枰仙弈山始登者得石枰于上黑肌而赤脉十有八道可弈栁宗元栁州山水記天帝召棊客北夢𤨏言滑能善弈忽有一小子自云張清與能對弈思甚精敏能異而詰之曰我非世人天帝召公著棊能忽奄然兵灋乃棊局馬舉鎮淮南有一叟謁之稱南山木强人能論兵法驗之乃一棊局耳瀟湘録列筵酬博塞元稹猧子亂局上夏日嘗與親王棊令賀懐智獨彈琶貴妃立於局前觀之將輸妃放康國猧子於座側俄上局局子亂𤣥宗恱酉陽長日一局棊幽閑鼔吹令狐相擬李逺為杭州宣宗曰李逺云長日惟銷一局棊豈可臨郡相曰詩人之言非有實也博打子肅宗在彭原廨舍隘狹帝與張良娣博打子聲聞於外李泌言帝乃潜令刻乾樹子不欲有聲良娣以是怨泌六博争雄六博争雄好彩來金盤一擲萬人開李白送鄭瓘彈棊八白粧奩之戯彈棊起於魏宮粧奩之戯手巾魏文帝以手巾拂之無不中客有以角巾揮之星懸鳥跂百中一揮應手愜心以代蹙鞠西京雜記漢武帝好蹙鞠有進彈棊者以代之帝賜以青羔裘孔招貨賄宗室巨兼河南尹其妃引蒱博少年分黨招貨賄升御床博戯中宗庻人韋氏初帝幽廢與后約一朝見天日不相制至是與三思升御床博戲帝從旁典籌不為忤雜侍樗博張易之昌宗后毎燕集則二張諸武雜侍樗博聚會蒱博張柬之曰姚州官屬提挈子弟嘯引凶愚聚會蒱博一擲累萬藏鈎王琚既失志稍自放在州與官屬小史酋豪樗博藏鈎為樂戱殿上韋安石侍宴殿下易之引蜀商宋霸子等博塞后前安石跪奏商等賤類不當戯殿上顧左右引出坐皆失色后以安石辭正改色慰免與妻妾戯博李師道始師道欲知元濟虛實使劉晏平間道走淮西元濟日與晏平結歡晏平歸以為元濟暴師數萬而晏然居内與妻妾戯博必敗之道也師道本倚蔡為重聞之怒乃以它事殺晏平崔顥好蒱博樗蒱一日費輒盡楊國忠嗜飲博從父𤣥琰死蜀州國忠徃視其家裒其貲至成都樗蒱一日費輒盡乃亡去引見至京師諸楊日為稱譽而言國忠善摴蒱𤣥宗引見擢右金吾兵曹參軍以博喻兵李守真傳王景崇以鳯翔反漢追白文珂等攻之久無功帝乃遣樞密使郭威督之是時馮道罷相居河陽郭威初出兵過道家問䇿道曰君知博乎威少無頼好蒱博以為馮道譏之艴然而怒道曰凡博者錢多則多勝錢少則多敗非其不善博所以敗者勢也今合諸將之兵以攻一城較其多少勝敗可知威意大悟一擲六子皆赤五代徐温江西劉信圍虔州久不克人有誣信逗留隂縱全播言信將反者信聞之因自獻㨗至金陵見温温與信博信斂骰子厲聲祝曰劉信欲背呉願為惡彩茍無二心當成渾化温遽止之一擲六子皆赤温慙自以巵酒飲信然終疑之取骰子擊盆而迸之五代梁廣王全昱太子宴居宫中與諸王飲博全昱酒酣取骰子擊盆而迸之呼太祖曰朱三爾碭山一百姓遭逢天子用汝為四鎮節度使於汝何負而滅他唐家三百年社稷吾將見汝赤其族矣安用博為賭九白賭香囊謝𤣥少好佩紫羅香囊叔父安患之不欲傷其意因賭取焚之遂止一擲百萬劉毅見上注負進博徒賭郡羊𤣥保到公石到溉也賭田射史記田忌與齊賭田射孫臏令田忌曰令君勝以君下駟當彼上駟以君上駟當彼中駟以君中駟當彼下駟一不勝而再勝也孔一擲累萬見上集翠裘薛用弱集異則天時南海郡獻集翠裘珍麗異常張昌宗侍側因以賜之命披裘供奉䨇陸狄梁公入奏事則天因命與昌宗争先三籌賭所衣毛裘狄指所衣紫絁袍曰臣以此敵上笑曰卿未知此物價逾千金卿之所指為不等矣狄曰臣此袍乃大臣朝見奏對之衣昌宗所衣乃嬖倖寵遇之服對臣之袍臣猶怏怏則天遂依昌宗連北梁公褫袍而出至光範門付還之赤雞白狗賭梨栗羞逐長安市中兒李白行路難筭十白厯筭小學漢平紀徴天下厯筭小學所在為駕一封遣詣京師教授注云一封乗一馬射隱伏呉趙逹治九宫一筭之術用意精密計飛蝗射隱伏無不中也又或使筭小豆取數斗播席上趙逹計之驗覆果信知主人酒肉處趙逹如故人家具食食畢主人曰乏嘉肴無以叙意逹因取雙箸冄三縱横曰君東壁下有羙酒一斛鹿肉三斤主人慙曰以卿善射故相試耳筭虚數人又書於簡上作千萬數著空倉中封之令逹筭之亦知其數目知自終趙逹引筭自嘆曰吾筭訖矣妻聞而哭逹彌妻意乃曰向者謬誤耳果如期而終傳綘縣老人曰臣生之嵗正月甲子朔四百四十五甲子矣其季於今三之一也史趙曰亥有二首六身下二如身是其日數也士文伯曰然則二萬六千六百有六旬也該天地而揔隂陽測鬼神而知變化採越人之餘䇿持晉相之牙籌升合不差毫釐靡失桑𢎞羊心計成數謂不用籌也鄭𤣥事馬融融老圖緯令𤣥筭嘆曰鄭生東去吾道東矣屈指心計呉顧譚字子黙省簿書未嘗下筭籌徒屈指心計盡發疑謬人皆服之孫騰少師事趙逹許教之數矣騰他日齎酒拜跪請之逹曰先人得此術圖為帝王師而三代不過太師郎誠不合更得之吾術微妙頭剝尾餘𤣥筭之法父子不相語今真相授乃出素書兩卷曰吾久不看蹔尋一徧數日當與後徃言失之也善計不用籌筭老子孔一把筭子五代王章尤不喜文士嘗語人曰此輩與一把筭子未知顛倒何益於國邪發揮於神筭文粹張說大衍厯序振古未探之象必發揮於神筭𨽻首重生文粹楊炯渾天賦儻𨽻首重生亦不能成其筭也轉筭之徒文粹張說開元正厯頌修徳增祚與天無窮轉筭之徒莫能究也李淳風注述九數乗除之術凡九篇一曰方田以度田畆二曰筭粟以制變易三曰衰分以辨隆殺四曰少廣以求積羃五曰商功以計功程六曰均輸以量逺近七曰盈不足以較盈減八曰方程以御正貟九曰勾股以測高廣心機筭術僧一行擴首載術括一百三十五言撮一位筭法積妙之㫖後有筭訣五章益以折除之法崇文揔目三位乗除灋唐江本撰三位乗除灋位筭法二卷以一位因折進退作一筭術九篇頗為簡要之法出崇文揔目九章筭術周公作也此其遺法歟同上射覆十一白東方朔射覆盂盆之下中之郭舍人曰非至數至數實也臣請覆之問不中賜臣帛中之榜臣百乃覆寄生朔曰窶藪也在樹曰寄生在地曰窶藪也射蜂窠等魏興守諸葛原取鷰卵蜂窠蜘蛛使管輅覆射之皆中也測隱索隱射印囊雞毛劉邠令管輅射之皆中徐季龍取十二種著篋中使輅射之輅曰籍十二種物先說雞子後道蠶蛹皆中唯以梳為箆耳孔射䑕袁天綱子客師為廪犧令高宗置一鼠于篋令術家射皆曰鼠客師獨曰雖實鼠然入則一出則四發之鼠生三子射取宰相名李景譲蔣伸輔政景譲名素出伸右而宣宗擇宰相盡書羣臣當選者以名内器中禱憲宗神御前射取之而景譲名不得射白鵲唐杜陽雜編羅浮先生軒轅集嬪御取金盆覆白鵲以試之集方休於所居忽起詣中貴人曰皇帝安能更能使老夫射覆盆也中貴皆不喻其言于時上召令速至而集纔及玉階謂上曰盆下白鵲宜早放之上笑厯日包橘鍾傳鎮江西有以射覆之法求謁傳以厯日包橘致䄂中使射客口占一歌以揭之云太嵗當頭立諸神莫敢當其中有一物嘗帶洞庭香出南唐近事得卦曰合因上皇始平祸亂在宫所與道士馮存澄因射覆得卦曰合因又得卦曰斬關又得卦曰鑄印乘軒存澄射曰昔此卦三靈爲最善黄帝勝炎帝而筮得之所謂合因斬關乗軒始當具斷終得嗣天上皇掩其口曰止黙識之矣即位應其術焉龍城録雜技十二白列子曰宋有蘭子以技干宋元君召見以雙技長倍其身屬踁並馳弄七劒走而躍之立賜金帛又蘭子能鷰戯復干元君元君大怒曰昔有異技干寡人技無庸適值寡人有歡心故賜金帛今而望吾賞拘而戮之鷰戲今絶倒投挾也祕戲國人以謹厚不飾得預後官祕戯張騫通大夏國得眩人眩與幻同呑刀吐火􅎒馬之術角抵之戲漢武帝始作兩相當角力也易牛馬頭後漢西夷禪國獻幻人能吐火自支解易牛馬頭元會作之陳禪諫不可陳忠劾禪云云人之有技若已有之書凡執技論力適四方羸股肱決射御凡執技以事上不貳事藝成而下曲藝皆誓之尚技而賤車服則民興藝子云吾不試故藝孔蹴踘薛嵩初嵩好蹴踘隱士劉銅勸止曰爲樂甚衆何必乗危邀晷刻歡嵩恱圖其形坐右擊毬周寳與髙駢皆𨽻右神策軍以善擊毬俱補軍將興王之舞服夷之􅇊揳擊吹鼓之音飛騰幻恠之容環觀干逺邇桞宗元嶺南節度使堂記千變百戲分曹賈勇藺子跳劒迭耀流星之輝都盧尋撞倒挂浮雲之影天長節度德政碑李白戴竿舞帝初御勤政樓張樂百技羅列教坊女優王大娘善戴竿舞竿頭載長竿施木山狀如瀛洲方丈命小兒持絳節立其上而舞中音節時劉晏以神童召見上令賦詩立進一絶曰樓前百戲競争新只有長竿妙入神誰爲綺羅畨有力猶自嫌輕更着人妃子甚喜置晏於膝上爲傅脂粉明皇雜録竒倡恠伎裴矩以蠻夷朝貢踵至諷帝悉召天下竒倡恠伎大陳端門白孔六帖卷三十三
