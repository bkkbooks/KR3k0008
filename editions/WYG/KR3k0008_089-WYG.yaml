body:
  text: 白孔六帖卷八十九唐白居易原本宋孔傳續撰九流一講論二道教三養生四道士五圖籙六灋術七齊物八自然九仙十求仙十一吏隱十二丹藥十三宮觀十四釋教十五戒律十六禪定十七佛十八經十九僧二十寺二十一九流一白漢書九流名家者流蓋出於禮官古者名位不同禮亦異數子曰必也正名乎此言其所長也及徼者為之徼訐也工吊反則鉤鈲析辭而已鈲破也音匹為君者愼器與名不可假人也縱横家者流蓋出於行人之官孔子曰使於四方不能專對又曰使乎使乎言當權事制宜受命不受辭此其所長也邪人為之則尚詐而棄信也雜家者流蓋出於議官兼儒墨合名灋此其所長也盪者為之則漫羡無所歸心也農家者流蓋出於農稷之官播五榖以足衣食故八政一曰食及鄙者為之欲使君臣竝耕之小說家者流蓋出於稗官細米為稗王者欲知風俗故立稗官使采街談巷說諸侯議說也孔子曰雖小道必有可觀者焉致逺恐泥此亦芻蕘狂夫之議兵權家者流儒家者流蓋出於司徒官助人君明教化祖述堯舜憲章文武宗師仲尼以重其言於道最高或者既失精微而僻者又隨時抑揚違離道本茍以譁衆取寵後進修之僻儒之患也墨家者流出於清廟之宇茅屋采椽兼受選士及蔽者為之權兼愛之道不知别親踈若能修六藝之術觀九家之言捨短取長則可通萬物之畧也隂陽家者流使人拘而多忌史記道家者流見道教門孔操毫注簡文粹韋處厚薦皇甫湜書操毫注簡判九流之紛蕩擿其舛駮趨于夷途騁思文粹李翰鳳閣王侍郎傳論賛騁思於九流之域如貫珠然文粹權徳輿秘書郎壁記九流百氏如貫珠然學與仕皆優而還相為用者其在茲乎清於心鏡文粹李嶠上高長史書洞庭秋水清九流於心鏡異趣文粹吕温人文化成論九流異趣鼓舞犇走文粹權徳輿崔祐甫集序九流六藝鼓舞犇走偏說白居易黜子書格言具舉則九流之偏說不禁而自隱矣為九流之華蓋李商隱一品集後序九流得失班固序之詳矣白居易九流百家皆所詳悉韓文毛穎傳紛蕩見上韋處厚書注講論二白易曰麗澤兊君子以朋友講習禮曰講學以耨之若非飲食之客則布席席間函丈侍坐大司成逺近間三席可以問終則負牆列事未盡不問傳曰趙武子講求典禮幼者聽而不問嶽嶽五鹿充宗恃貴講論是非鋒生朱雲攝衣登堂志氣慷慨連拄五鹿君人語曰五鹿嶽嶽朱雲折其角匡鼎來匡衡善說詩諸儒語曰無說詩匡鼎來匡說詩解人頥鼎力也發明倪寛訥口不能發明諸人辯論而智不及寛也講尚書後漢張酺肅宗先備弟子禮令酺講尚書一篇然後終君臣之禮重席後漢世祖令羣臣說經史乃相詰難義有不通輙奪其席以益通者戴慿遂坐五十餘席語曰解經不窮戴侍中下坐庾乗能講論自以卑第每處下坐貴人多以下問之由是學中必以下坐為貴論難桓榮論難常以禮譲相厭不能長勝之石渠宣帝令諸儒雜論五經同異於石渠劉更生講亦於石渠也麈尾講者所執講貫忘食晉孫盛字安國常詣殷浩談論對食奮執麈尾悉洛飯食冷而復煖者四至暮忘餐而理竟不定也婦人談論王凝之妻謝道藴居家不嚴而治㑹稽太守劉抑聞其名請與談論道藴素知抑名亦不自阻乃坐帳中抑束修整帶造榻道藴風韻高邁叙致清雅先叙家事慷慨留連徐問義㫖詢理無滯抑退嘆曰使人心形俱服謝亦云始遇此士聽其所問殊開人心也不相譲魯平叔陵和帝因朝魯諸儒平與賈達黄香相難數事帝善平說賜冠幘履鞭平因上䟽曰說經者傳先儒之言非從己出不得相譲之則其道不明孔反復研辯徐曠耆儒沈重講太學授業常千人曠從之質問不數日辭去或問其故荅曰先生所說紙上語耳若奥境彼有所未見者尚何觀重知其語吾與反復研辯嗟嘆其能聽者忘勞文逺說經徧舉先儒異論分明是非乃出新意以折𠂻聽者忘勞入講承光殿陸徳明初陳後主為太子集名儒入講承光殿徳明始冠與下坐國子祭酒徐孝克敷經倚貴縱辯衆多下之獨徳明申荅屢奪其說舉坐咨賞論難鋒生徐曠為國子博士高祖幸國學觀釋奠曠發春秋題論難鋒生隨方占對莫能屈帝異之隨方立義徧析其要陸徳明補太學博士高祖釋奠召博士徐文逺浮屠慧乗道士劉進喜各講經徳明隨方立義徧析其要帝大喜曰三人誠辯然徳明一舉輙蔽可謂賢矣賜帛五十匹遷國子博士舌無留語趙𢎞智入為陳王師講孝經百福殿於是宰相𢎞文館學士太學生皆在𢎞智舉五學諸儒更詰辨隨問酬答舌無留語高宗曰試為我陳經之要以輔不逮對曰天子有争臣七人雖無道不失天下願以獻帝恱賜絹二百名馬一疋酬復淵詣王方慶學者有所咨質酬復淵詣據經條答鄭肅曜太常少卿博士有疑議徃咨必據經條荅誼據該明出其悟表顔師古帝嘗歎五經去聖逺傳習寖訛詔師古於秘書省考定多所釐正既成悉詔諸儒議於是各執所習共非詰師古師古輙引晉宋舊文隨方曉荅誼據該明出其悟表人人歎服孔頴達隋大業初文明經高第授河内郡博士煬帝召天下又儒官集東都為詔國子秘書學士與論議穎達為冠年最少老師宿儒耻出其下幸太學觀釋菜命講拜祭酒侍講東宫帝幸太學觀釋菜命講頴達講經畢上釋奠頌有詔褒美之依經辯舉皆諸儒意所未叩蓋文達博渉前載尤明春秋三家刺史竇抗集諸生講論於是劉焯劉軌思孔頴達並以耆儒開門受業是日悉至而文達依經辯舉皆諸儒意所未叩一坐猒歎譬曉密微逺近宗仰蓋文懿唐高祖於秘書省置學以教王公文㦤為國子助教既升席公卿更相質問文懿譬曉密微逺近宗仰休沐講授尹知章轉國子博士休沐講授始輟升堂講勸太子齒冑扵學詔禇無量升堂講勸百官勸禮厚賚賜講辨三教尹愔為國子大成毎釋奠講辨三教聽者皆得所未聞進講禁中陳希烈工文章開元中帝儲思經義自褚無量元冲卒而希烈康于元馮朝隱進講禁中其應荅詔問敷盡㣲隱皆希烈為之章句博敏而辯褚無量拜國子司業太子釋奠國學令講經建端樹義博敏而辯七寳山座明皇於勤政樓以七寳裝成山座高七尺召諸學士講論古今勝者得升座張九齡論辨風生首登此座焉天寳遺事講貫經籍俾達奥義桞文音吐清辯據引淹該陳少游幼習老子莊周書為崇𤣥生諸生推為都講有娼者欲對廣衆切問以屈少游乃升座音吐清辯據引淹該問窮而對有餘道教三白𤣥元之教自然之教大道至道修道之謂教城中之大無為之道衆妙之門𤣥風教父吾將以為教父真宗道德之文五千言尊道貴徳萬物之宗道也希夷之道觀衆妙之門坐思奥旨𢎞道混成之教正始之原𤣥珠𤣥訓無名之璞道也上士勤行上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道妙有虚無聖人尊道行有餘力坐進比道清淨深行淺行文子曰古之為道者深行之謂之道淺行之謂之仁義薄行之謂之禮智開至道之軌躅發𤣥闗之扄鐍國家教本𤣥元政先清凈一隂一陽之謂道一無也道無不存存隂而無於隂存陽而無於陽然隂陽之中皆是道故曰一隂一陽也百姓日用而不知以其無為之功也大形而上者謂之道道心惟微大道不器大道無名彊名曰道葆光注而不滿酌而不竭不知其由謂之葆光言自光不滿藝文志曰道家者流使人精神專一動合無形澹足其術因隂陽之大順采儒墨之善最與時遷徙應物變化本清虚以自衛守卑弱以自持此乃君南面之術放者為之則絶去禮樂兼棄仁義蕩者曰獨任清虚可以為理丘之道也其由醯雞莊子曰謂罋中蠛蠓在螻蟻在稊稗授業觀形晉張忠臣知至道虚無為宗依山巖幽谷鑿地為窟室弟子亦居窟室相去六十餘歩五日一朝其教以形不言弟子授業觀形而退立道壇於窟上毎日一拜之食用瓦噐鑿石為釡孔清虚寡欲李叔明惡道佛之弊上言道清虚寡欲者也今迷其内而飾其外使農夫女工墯業以避役故農桑不勸兵賦日屈國用軍儲為斁耗彭偃議見僧門集晉魏以來與佛駮者傅奕注老子并集晉魏以來與佛駮者為高識篇請無廣道姚崇請無廣道好黄老清浄術崔𤣥亮少好黄老清浄術晚好黄老李白晚好黄老術栁并初并受業於蕭穎士而并好黄老穎士嘗曰并不受命而尚黄老予亦何誅邢和璞喜黄老好黄老道數祠禱孔戣遷信州刺史李位好黄老道數祠禱部將韋岳告位集方士圖不軌高重謙上變捕位劾禁中妙物為言張薦明高祖召見問道家可以治國乎對曰道也者妙萬物而為言得其極者户居祍席之間可以治天地也高祖大其言五代史放曠而處逍遥而遊崔尚桐柏觀頌以虚寂自然無為為宗唐六典道士修行有三事號其一曰法師其二曰威儀師其三曰律師其徳高思精者謂之練師而齋有七名其一曰金籙大齋其二曰黄籙齋其三曰明真齋其四曰三元齋其五曰八節齋其六曰塗炭齋其七曰自然齋而穰謝復三事其一曰章其二曰醮其三曰理沙大抵以虚寂自然無為為宗出家修道者不干預於人事專清其身心以虚泊為高以無為為妙無欲無管不損不害辛替否諫造金仙觀養生四白禮曰仲夏君子齋戒處必掩身無躁止聲色無或進薄滋味無致和節嗜慾定心氣月令君子有四時子産曰君子有四時朝以聽政晝以訪問夕以修令夜以安身於是節宣其氣勿使有所擁閉湫底以露其體易頥卦曰君子以節飲食養神文子太上養神其次養形谷神不死上藥養命中藥養性攝生善攝生者陸行不遇兕虎清虚素朴致心於止水納性於𤣥珠恬淡清静練冰雪之容延金石之壽納沆瀣之精率逍遥之性勞神役智啄腐吞腥味乃腐腸之藥色為伐性之斧道養和平血氣和平形勞神竭漢書云神太勞則竭形太勞則敝形神早疲而能長久者非所聞也禁精氣之户牖復性命之本原緘縢六志扄鐍百骸一溉之功以稼穡喻養生言一溉之功亦有益也養内養外田開之曰聞之夫子善養生如牧羊然視其後者而鞭之威公四何謂也田開之曰魯有單豹者岩居而飲水不與人共利行年七十而有嬰兒之色不幸遇餓虎食之有張毅者高門懸薄無不走也行年四十而内熱疾死豹養於内而虎傷於外毅養於外而疾攻於内此二者不鞭其後者也利形實下王吉書休則俛仰屈伸以利形進退趍歩以實下吸新吐故以練藏專意積精以適神被褥大温魏王朗曰少小若被太温太渇則不便柔膚是以難可防䕶易用感傷被不至甚温厚安保金石之性壽比南山也孔善攝生崔元綜善攝生年九十餘卒逹於養生穆宗復惑方士張臯上䟽曰高宗時處士孫思邈逹於養生其言曰人無故不應餌藥藥有所偏助則藏氣為不平推此論之可謂逹見至理金石非可御韋澳帝問輔養術澳具言金石非可御方士怪妄宜斥還之未嘗以氣海煖冷物栁公度善攝生八十餘有彊力常云吾初無術但未嘗以氣海煖冷物熟生物不以元氣佐喜怒耳善藥不可離手孟詵嘗語人善言不可離口善藥不可離手嗇神以佑藥兼味以禦祲地泄常燠冬無嚴寒嗇神以佑藥兼味以禦祲夢得答竇中丞栁宗元答周君巢餌藥久壽書今丈人乃盛譽山澤之臞者以為壽且神其道若與堯舜孔子似不相類焉何哉又曰餌藥可以久壽將分以見與固小子之所不欲得也推而大之不為方士所惑卧欲縮足酉陽雜俎雍公云卧欲縮足不欲左脇寢自言毎夕濯足已四十餘年至今六十九而未嘗有病養生終自惜伐數必全懲杜寄伯華嘗採姹女於江華收河車於清溪與天水權昭夷服勤爐火之業久矣李白送權十一序道士五白上士勤行上士聞道勤而行之仙材真籙從事於道性與道俱惟道是從志以道寧品登仙籙名在丹臺紫陽道人周季道入蒙山遇羡門子再拜乞長生訣羡門子曰名在丹臺玉室中何憂不仙志道據德同塵和光遺形反性長生久視心啓𤣥闗品登仙籙奉教𤣥元宅心清浄名𨽻紫府心求𤣥珠探𤣥養素得崆峒之道與汗漫之游刳心求道與道沉浮五千𤣥言人能𢎞道授田令令曰道士受老子經以上道士給田三十畒僧尼受經其戒准此羽服𤣥宫孔丐為道太平公主則天皇后所生后丐主為道士以幸㝠福瓊華真人華陽公主大厯七年以病丐為道士號瓊華真人詭為道士魏徴隋亂詭為道士賞賚嵗巨萬計常衮天子誕日諸道為老子浮屠解禱事衮請皆還之曰今軍旅未寧王畿户口十不一在而諸寺寫經造像焚幣埋玉所以賞賚若比邱道士巫祝之流嵗巨萬計陛下若以易芻粟減貧民之賦天下之福豈有量哉代宗喜納請為道士姜公輔陸䞇為相公輔數求官䞇宻謂曰竇丞相嘗言為公擬官屢矣上輒不恱公輔懼請為道士未報韋渠牟為道士不終更為浮屠已而復冠對麟徳殿韋渠牟與佛老二師對麟徳殿質問大趣渠牟有口辨雖於三家未究解然答問鋒生帝聴之意動不食酒肉南蠻盤盤有佛道士祠僧食肉不飲酒道士謂為貪不食酒肉李嶠上書今道人私度者幾數十萬其中高户多丁富商大賈詭下臺符羼名偽度且國計軍防並仰丁口今丁皆出家兵悉入道征行租賦何以備之絶粒學老子道丁公著三歲䘮母甫七嵗見隣媪抱子哀感不肯食請於父緒願絶粒學老子道父聴之以左道幸李澄出為河南少尹道士孫甑生以左道幸託祠事往來嵩少間干請亂吏治澄不為應㝠居於㟪􅤅寄迹於軒轅陳子昂頌志摩青雲蓬視紫闥同上投身霄嶺感景雲林同上夢游帝居賀知章病夢游帝居數日寤乃請為道士還鄉里噏日安坐凌霄欲飛崔尚桐柏觀頌道士有名無實俗鮮歸重於亂政輕李叔明素惡道佛之弊上言乃下尚書省雜議於是彭偃曰道士有名無實俗鮮歸重於亂政輕拜諌議尹愔初為道士𤣥宗尚𤣥言有薦愔者召對喜甚厚禮之拜諫議大夫曵輕羅羽帔後唐清泰中進士寵式於嵩陽觀聚課有薛學士者因上山採樵次見山上有道士五人曵輕羅羽帔身長大欲擕此子同去薛辭之乃禠其襂背上朱篆一行八字道流則乘虚而去薛歸觀具話其事無有識其篆者出北夢𤨏言建寳皇宫以居閩王鏻好鬼神道家之説道士陳守元以左道見信建寳皇宫以居之守元謂鏻曰寳皇命王小避其位後當為六十年天子鏻欣然遜位命其子五代史專太清之業陳子昂尊師頌𤣥標仙骨同上駕景凌煙同上煑石韋應物寄全椒道士澗底東荆薪歸來煑白石仙階之秀陳子昂頌尊師有弟子十人並仙階之秀見天子必拜凡止民家不過三夜百官志崇𤣥署令道士見天子必拜凡止民家不過三夜出踰宿者立案連署不過七日路逺者州縣給程天下道士七百七十六同上禀訓瑶庭密受瓊室陳子昂潘尊師頌鸞姿鳯骨𦕈愛雲松同上黄冠之倫栁宗元表圖籙六白仙籙真籙靈符真文金簡玉篇仙訣真訣玉冊金䋲玉簡六甲秘文萬年神術淮南王有鴻寳萬年術王烈得石室之書玉版金壇之籙仙籍真官孔躬受道家之籙帝紀賛武宗奮然除去浮圖之法甚銳而躬受道家之籙服藥以求長年以此見其非明智之不惑者特好惡有不同爾金籙司馬承禎𤣥宗詔於王屋山置壇室以居又命玉真公主及光祿卿韋縚至所居按金籙秘書訣籙道行峻異得衆真秘書訣籙聚經籍圖史侔於麟閣栁宗元張先生墓誌銘科籙教戒崔尚桐柏觀頌科籙教戒博綜無所遺著籙之侣升堂者比迹文粹懸明鏡於講肆陳鴻鐘於靈壇著籙之侣升堂者比迹孟法師碑岑文本靈符寳章文粹昇𤣥劉光碑金開玉堂靈符寳章馮宿道㣲陳子昻别中嶽真人序豈知瓊都命淺金籙道㣲秘籙寳書文粹顧况金璫玉珮歌五嶽真君之秘籙九天丈人之寳書雲鶴盤旋北夢𤨏言馬朗州希振釋氏僧尼填咽一旦欲授籙僧徒沮之馬處誠不退及散齋之晨空中雲鶴盤旋衆共睹之判官何致雍為箋齋詞云一聲空洞之音重城月曉數隻仙禽之影碧落霜寒九隴殘經唐道士姜𤣥辨至徳中於九隴伏龍觀拾得殘經四五紙是太上役使六丁法神篇啓黄簡秘籙捧朱籖元稹開元觀灋術七白御風列子御風而行旬有五日而反隨雨赤松子為水工能隨風雨上下隨煙寗封子黄帝時陶正能出五色煙積火自燒而隨煙氣上下石化羊黄初平叱石化為羊竹變龍費長房得山翁所與杖乘至家投葛陂化為龍舄化鳬王喬為鄴令舄化鳬飛朝㑹歩行水上吳葛仙翁飲酒常入陂中吳主遇大風百官皆沒使人鈎求翁船見仙翁歩行水上來衣履不濕有酒色云子胥為設酒孔以術得幸嚴郢方士申泰芝以術得幸肅宗遨遊湖衡間以妖幻詭衆奸贓鉅萬潭州刺史龎承鼎按治帝不信殺承鼎郢方入朝辨之流建州泰芝後坐妖妄不道誅召語養生術李徳裕方士趙歸真以術進徳裕諌曰是當敬宗時以詭妄出入禁中人皆不願至陛下前帝曰歸真我自識顧無大過召與語養生術爾對曰小人於利若蛾赴燭回見歸真之門車轍滿矣不聽于是挾術詭時者進帝志衰焉壽數百歳李徳裕狂人杜景先上言其友周息元壽數百歲帝遣宦者至浙西迎之徳裕曰臣慮今所得者皆迂恠之士使物淖水以小術欺聰明如文成五利者也又前世天子雖好方士未有御其藥者故漢人稱黄金可成以為飲食噐則壽髙宗時劉道合明皇時孫甑生皆作黄金二祖不之服豈非以宗廟為重乎髪白復鬒王逺知隋煬帝為晉王鎮揚州使人介以邀見少選髪白俄復鬒帝懼遣之石自鬬草為人騎馳走天寳中有孫甑生者以技聞能使石自鬬草為人騎馳走楊貴妃喜觀之數召入宫中自隱又有羅思逺能自隠帝學不肯盡其術試自隠常餘衣帶及思逺共試則驗厚賜金帛然卒不得帝怒裹以幞壓殺之數日有中使者自蜀還逢思逺駕而西笑曰上為戯何虐也得役鬼術吕用之亡命九華山事方士牛𢎞徵得役鬼術賣藥廣陵市始詣駢親將俞公楚驗其術因得見駢署幕府張果白驢唐明皇雜録曰張果常乗一白驢日行千里休即疊之其厚如帋致之於巾箱中變宫人貌唐杜陽編羅浮先生軒轅集上令宫人侍茶湯有笑其貌古布素者而縝髪絳脣年纔二八湏㬰忽變成老嫗雞皮鮐背髪鬐皤然宫人悲駭於上前流涕不已上知宫人之過促令謝告先生容質復改遊西涼州明皇雜錄曰上在東都遇正月望夜葉法善謂上曰燈影之盛天下無此然而凉州亞匹上曰頃嘗遊乎法善曰適自彼回於是令上閉目巨躍若昇在霄漢俄而足及地法善曰可以觀覧既視燈燭連亘數十里車馬駢闐士女紛委俄頃復旋故處其樓下歌舞猶未終法善與上到凉州以鏤鐡如意質酒肆翌日命中官以他事使凉州取之髪中出酒杜陽編軒轅集或與人飲則出一壺纔容一二升縱客滿坐而傾之彌日不竭或他人命飲即百斗不醉夜則垂髪於盆中歴歴而出麴孽香無減有墨子術魏州妖人楊千郎用事自信有墨子術能役使鬼神化丹砂水銀莊宗頗神之拜千郎檢校尚書郎賜紫五代唐紀百歳人長慶初山人楊隠之在郴州有唐居士土人謂百歳人楊謁之因留止齊物八白喻指喻馬莊子曰以指喻指之非指不若以非指喻指之非指以馬喻馬之非馬不若以非馬喻馬之非馬天地一指萬物一馬注云是非彼彼我常性情故以我指喻彼指将明無是無非無主各信偏見故至人知天地一指萬物一馬各當分也得失肩吾謂孫叔敖日子三為令尹不榮華三去無憂色今視鼻間栩栩然子之用心獨奈何敖曰吾以來不可却去不可止得失非我在彼乎在我乎注云曠然無係𤣥同彼我何暇至乎人貴人賤也令尹子文三仕為令尹無喜色三已之無愠色嗒然䘮耦南郭子綦隠几而坐嗒然似䘮其耦身也神與偶同均彼我若失亡也顔成子游曰形可使如槁木心可使如死灰今日之隠几非昔日之隠几子綦曰吾䘮我我自亡矣孔循大小於天倪既齊椿菌唐文粹岑文本撰至徳觀法主孟法師碑云循大小於天倪既齊椿囷忘夀夭於物化寕下彭殤比大舜於豕虱張隠居莊子指要序齊彭殤一堯桀等周公於猿狙比大舜於豕虱權徳輿一貫堯桀文粹皮日休正俗既不辨其顔跖兮遂一貫於堯桀窮通與修短造化夙所禀一樽齊死生萬事固難審李白萬齡龜菌等一死天地平元稹遣病譎殤子以為耋誣彭祖以為孺兮譎殤子以為耋皮日休九諷正俗自然九白莊子曰和之以天倪文子曰聖人立灋導民之心各使自然故生者無徳死者無怨孔繫喬松兮唐文粹馮宿撰昇𤣥劉先生碑吾師昇𤣥法於自然繫喬松兮瑶圖金鼎文粹陳子昻中岳潘尊師碑得瑶圖與金鼎信元符之自然天地生成文粹崔融啓母廟碑天地生成其法自然之謂道吸精張曲江謁司馬道士吸精反自然仙十白神仙靈仙列仙九仙羣仙真人羽客羽人仙子上清靈族仙也從汗漫而遊汗漫仙人名白日升天紫氣老子度函谷關關令尹喜望見紫氣生羽翼羽化蟬蛻丹邱仍羽人於丹邱獻桃王母獻武帝駕鶴驂龍羽蓋霓旌旌節霓裳霓衣霞衣羽駕雲軺風馭青鳥西王母使桑田變海桃源秦人松喬彭朔餐霞却粒吸沆瀣之精見下紫府輕舉碧落上升雞犬仙淮南王仙去餘藥噐在庭雞犬䑛之皆得飛升也汗漫崆峒逍遥龜鶴之壽氷雲之膚金石之壽雲軿芝盖絳節朱幡緜日月而不老配天地而長存青牛老子白鹿羡門芝田雲裝文選三神山史記蓬萊方丈瀛洲三神山在渤海中莫有至者諸仙人不死藥在焉禽獸盡白黄金白銀為宫闕欲到則風引船而去終莫能至也大人賦呼吸沆瀣餐朝霞霞日初出青黄氣列仙傳曰陵陽子春食朝霞夏食沆瀣沆瀣是北方夜半氣天地𤣥黄之氣也貫列缺之倒景人在天上視曰列缺去地三千里辭家後漢上成公宻縣人初行久不還後歸語家人曰我已得仙辭去人見其高舉出空良久乃没也藐姑射之神人莊子曰藐姑射山有神人居焉肌膚若氷雪綽約若處子不食五榖吸風飲露乘御飛龍遊于四海之外解佩江妃二女出游江湄逄鄭交甫桃之不知其神人也女遂解佩與交甫恱受佩去數歩空懐無佩女亦不見薊子訓有百歳翁云為兒時見子訓賣藥於㑹稽後有人見與老翁共摩銅人云已五百餘年也簫史秦穆公時善吹簫能致白鶴穆公女弄玉好之妻焉教弄玉作鳯鳴致鳯凰來作鳯凰臺一旦夫妻俱隨鳯去秦人作鳯女之詞携手仙古詩刺作秦女携手仙孔極陳荒妄謾誕李藩帝問神仙長年事藩知帝且有所感極陳荒妄謾誕不可信好神仙杜伏威好神仙長年術請祀青帝王璵者方慶六世孫𤣥宗在位久推崇老子道好神仙事璵上言請祀青帝慕神仙不死術李泌嘗游嵩華終南間慕神仙不死術數與靈仙接李泌賛繁為家傳又著泌數與靈仙接言舉不經骸坼若蟬蛻劉道合卒帝後營宫遷道合墓開其棺見骸坼若蟬蛻者帝聞恨曰為我作丹而自服去然所餘丹無它異可致長生李邕中宗立鄭普思以方伎幸邕諫曰陛下誠以普思術可致長生則爽鳩氏且因之永有天下非陛下乃今可得能致神人邪秦漢且因之永有天下非陛下乃今可得璽書邀禮張果帝更遣中書舎人徐嶠齎璽書邀禮乃至東都舎集賢院肩輿入宫帝親問治道神仙事語秘不傳尸解果懇辭還山至恒山蒲吾縣未幾卒或言尸解帝為立棲霞觀其所少室伯王逺知多恠言詫其弟子潘師正曰吾少也有累不能上天今署少室伯吾將行即沐浴加冠衣若寝者遂卒躍身騰空冉冉而去後唐同光中有任生乘鳯號為野人後於皇子潭躍身騰空冉冉而去雲鶴翔集飛昇而去張志和號元真子嘗歌漁父詞云青箬笠綠蓑衣斜風細雨不須歸後於湖州刺史顔真卿坐上雲鶴翔集飛昇而去耆老自童稚見之淄齊間有道士楊仙公莫知其年壽耆老自童稚見之或就鐡舖借鐡椎自擊其頂或令人極力擊之一無所損入山與虎豹為戯以手擊之猛獸為之偃仆後唐長興中入蜀自云居峨嵋山去也屋内設茵褥原化記嵩山少林寺元和中嘗因風雨有一老人姓潘求宿寺人指空屋止宿二更後僧人忽起見火明乃老人屋内設茵褥翠幕陳列肴饌飲噉自若衆伺之至五更老人睡起取一胡盧子大如拳取牀席帳幕凡是用度悉納其中收訖内懐中空屋如舊神真煉形年未足見求仙門紫微觀題壁乾貞中建業市有卜者不知所從來衣服言語頗與衆異後忽於巢縣紫微觀題壁為詩止能飛歩唐儀鳯中青城縣王仙柯㧞宅上昇蜀僧中寤偶於龍岱相逄寤公曰飛仙之後胡為來此仙柯曰吾昔得靈藥止能飛歩今全家隠於後山更修道法上賔之命吾何望焉出北夢𤨏言石上雄黄表𤣥宗幸蜀夢思邈乞武都雄黄乃命中使齎雄黄十斤送於峨嵋頂上未半見一人幅巾被褐鬂髪皓白二童青衣鬟髻夾侍立屛風側舉手指大盤石曰可致藥於此上有表録上皇帝中使視石上朱書百餘字遂録之隨寫隨滅寫畢石上無復字矣湏㬰白氣漫起因忽不見雜俎求仙十一白𤣥珠仙存象外不可茍求道在域中所宜馴致崆峒訪道雖軒后之或遊蓬島求仙豈秦皇之可致徐生知懼訪蓬嶽以無歸秦皇令徐福求藥蓬萊山欒大伏誅求羡門而不得或以神仙可以學得不死可以力致特受異氣禀之自然非積學所能及也養生論不務垂衣空思脫屣武帝嘆曰使我得如淮南王棄天下如脫屣神仙仙材神仙難致政化易傷棄妻子梅福字子真為南昌尉養性為事一朝棄妻子去九江人傳為仙人後有人見福變姓名為吳門市卒繫風捕影終不可得谷永諫成帝郭璞卜許邁遇泰上爻曰君元吉自天宜舉升遐之道邁聞鮑靚隠迹潜遁乃候之未忍違親謂餘杭縣雷山近延陵茅山是洞庭西門潜通五嶽於是往來茅嶺同至時節還家入山見藥嵇康與王烈共入山烈得石髓如飴自服半半與康皆凝為石又石室中見素書遽呼康往取輙不復見歎曰叔夜志趣非常輒不遇命也五利將軍漢武拜欒大為五利將軍李少君漢武時言道者見下注孔夜夢駕鶴李抱眞好方士謂不死藥可致有受季長者為治丹且曰服此當仙去抱眞表署幕府語左右曰秦漢君不遇此我乃得之後升天不見耳等夫夜夢駕鶴而刻寓鶴衣羽服習乗之後益惑猒勝餌丹二萬丸不能食且死醫以彘肪榖漆下之疾少間季長曰得仙何自棄也益服三千丸卒妄求長年事藩鎮王鎔以房山有西王母祠數遊覽妄求長年事踰月不還篤意求神仙高駢㑹平賊駢聞縮氣悵恨部下多叛去欎欎無聊乃篤意求神仙丹臺蜀女真謝自然泛海將詣蓬萊求師舟為風飄至一處山見道人指言天台山司馬子微名在丹臺身居赤城真良師也蓬萊隔弱水三十萬里非舟楫可行非飛仙無以到自然乃回求子微受度後白日上升續神仙傳昔有道士求神仙靈真下試心確然千鈞巨石一髪懸卧之石下十三年志道存身一試過名奏玉皇乃昇天雲氣冉冉漸不見留語弟子但精堅韋應物學仙詩或云欲學吹鳯笙所慕靈妃嫓蕭史韓愈誰氏子以為服冕乘軒者寵患吾身也擊鍾陳鼎者味爽人口也遂乃損公卿之業學神仙之事文粹崔尚桐柏觀頌竹宫時望拜桂館或求仙杜甫神真煉形年未足有隠者過必寄男又留一函隠者去而男殂以函盛瘞庭中累月不還發函看有黒石字如錐畫曰神真煉形年未足此為我子功相續鄴矦家傳讀仙經古來三人俱弟兄結茅深山讀仙經上有青㝠倚天之絶壁下有飄飄萬壑之松聲韋學仙詩吏隱十二白柱史老聃為周柱下史漆園吏莊子為之鄴令王喬為之南昌尉梅福子真為南昌尉時人謂之神仙之吏雖寵辱若驚則宜晦迹而是非齊致未爽同塵大隱隠於朝市孔彈琴蒔藥趙元調宜禄尉到職彈琴時藥如隠者之操成簡静之化韋渠牟南山四皓畵圖讃故人清河房茂長刺商山成簡静之化曰隠居之類也大徳不官文粹梁肅鄴矦文集序大徳不官既追五嶽之隠隱吏逄梅福杜甫趣近懸解迹同大隱文粹吕温虢州三堂記不離軒冕而踐夷曠之域不出户庭而獲江海之心趣近懸解迹同大隠有志吏隱捨此何求白公江州司馬㕔記郡南樓山北樓水盆亭百花亭風篁石巖瀑布廬宫源潭洞東西二林寺泉石松霄司馬盡有之矣茍有志於吏隠者捨此官何求焉禄仕優穩同上為國謀則尸素之尤蠧者為身謀則祿仕之優穏者不異草澤之人盧肇進海潮賦序云素無强近之援不異草澤之人採藥西山飲泉滫水雲溪友議陸暢初為江西王仲舒從事終日長吟不親公牘仲舒讓之拂衣辭去既而採藥西山飲泉滫水客聞之以為仕隠也縣閒吏傲與塵隔移竹䟽泉常岸幘釣臺水緑荷已生少姨廟寒花始發縣閑吏傲與塵隔移竹䟽泉常岸幘莫言空作折腰官豈似長安折腰客韋應物雜言送黎六郎丹藥十三白一丸五色古詩云與我一丸藥光輝有五色服之四五日身體生羽翼化丹砂李少君曰祠竈丹砂可化為黄金九轉神丹金丹玉液長生靈藥不死神方燒金煉石採术茹芝却粒將延金石之壽以煉氷雪之膚方傳仙訣藥採名山身輕得道羽化升天錬金膏調玉液肘後方囊中藥吸而蟬蛻吞則翼生文武之火隂陽之鑪君臣之藥駐童顔延暮齒去疾蠲痾延齡難老姮娥竊而犇月竊羿不死之藥雞犬䑛以升雲淮南王仙去雞犬䑛其藥噐亦升天上藥養命中藥養性啄腐吞腥求丹葛洪聞交趾出丹求為勾漏令至廣州刺史鄧攸留洪乃止羅浮山煉丹孔可以續年郝處俊拜東臺侍郎時浮屠盧伽逸多治丹曰可以續年高宗欲遂餌之處俊諫曰脩短固有命異方之劑安得輕服哉昔先帝詔浮屠那羅邇娑寐案其方書為秘劑取靈蘤恠石歴嵗乃能就先帝餌之俄而大漸上醫不知所為羣臣請顯戮其人議者以為取笑夷狄故法不得行前鑑不逺惟陛下深察包炎産毒未易可制裴潾帝喜方士而栁泌為帝治丹劑求長年帝御劑中躁病渇潾諌曰方士韋山甫栁泌等以丹術自神更相稱引詭為陛下延年若乃藥劑者所以禦病豈常進之餌哉况又金石性託酷烈而燒治積年包炎産毒未易可制異草皇甫鎛薦方士栁泌自云能致藥為不死者因言天台山靈仙所舎多異草願官天台求采之帝餌藥寖躁怒不常宦侍懼以弑崩為長年藥又薦浮屠大通栁泌為長年藥帝惑之同上疽生於背太醫李元伯治丹劑以進帝餌之疽生於背懿宗立収元伯誅死見畢諴傳膚澤消槁武宗賢妃王氏進才人帝稍惑方士説欲餌藥長生後寖不豫才人每謂親近曰陛下日煉丹言我取不死膚澤消槁吾獨憂之潄之以瓊液餌之以金砂既而童顔益春真氣愈茂李白餌之而驗張易之等姦贓狼藉御史臺劾奏之内史令楊再思曰昌宗主煉丹劑陛下餌之而驗功最大者也即詔釋之善丹砂王琚太子曰先生何以自隠而曰與寡人遊琚曰臣善丹砂且工諧隠願比優人太子喜恨相知晚九鼎丹灋莫不究其條貫岑文本孟法師碑銘𤣥明膏盧照隣病去官居太白山得方士𤣥明膏餌之㑹父䘮號嘔丹輙出由是疾益甚問神仙治錬吳筠帝復問神仙治錬法對曰此野人事積嵗月求之非人主宜留意化黄金治丹葉法善時帝悉召方士化黄金治丹法善上言丹不可遽就徒費財與日請覈真偽帝許之凡百餘人皆罷丹設投周隱唐世雷滿據朗州有廂獄吏推勘囚人是一道士云事解後燒丹報恩他日果寄丹因誤投周隠而不言乃自服食壽九十出北夢𤨏言丹成自服仙去高宗令劉道合合還丹丹成上之而卒及帝營奉天宫遷道合之殯室衆謂尸觧高宗聞之曰劉師為我合丹自服仙去其所進者亦無異焉舊史㧞宅上昇唐儀鳯中青城縣横原翠圍山下有村民王仙柯服道士所遺靈丹拔宅上昇出北夢𤨏言遺丹二粒可過兩甲子僧逍遥唐㑹昌中釋門沙汰于時軒轅先生隠於羅浮山有數僧入山投謁以避歸俗之役逍遥預焉以雄黄數兩齊心奉獻輙希丹藥先生愍而允之遺丹二粒云可過兩甲子逍遥餌之自王蜀變故後兩周丁亥殆一百二十四歲矣出北夢𤨏言􅅺壇鑄鼎􅅺壇方合矩鑄鼎圓中規鑪槖一以動瑞氣紅輝輝白樂天贈郭錬師燒丹于廬山草堂樵人直説曰白樂天燒丹于廬山草堂地仙顔真卿嘗得神丹服之後為李希烈所殺希烈既平人發真卿棺改葬瞋目如生掩之隠士曹庸山云此後三十年能擘裂飛騰而上被羽衣行山澤之間所謂地仙明皇十七年九轉但能生羽翼羙人為政本忘機服藥求仙事不違葉縣已􅅺丹竈畢瀛州當伴赤松歸先師有訣神將助大聖無心火自飛九轉但能生羽翼雙鳬勿去定何依李白題崔明府丹竈宮觀十四白清觀上清觀紫宫紫極宫列真之守太微之宫列仙攸館互相所居鶴觀杏檀九龍之觀靈宫秘宮將尊道徳之風宜廣神仙之宅宫觀之規所宜壯麗𤣥元之教必在尊崇宅真官唐靈旅仙人好樓居銀宫金闕紫府丹房碧洞丹臺上清之宫大壯之宇孔金仙玉真營觀竇懐貞睿宗金仙玉眞二公主營觀費鉅萬諌者交䟽不止唯懐貞勸成之天華上宫王璵廣徳初建言唐家仙系冝崇表福區招致神靈請度昭應南山作天華上宫靈臺等祠焚香禮真像盥手披靈篇陸龜蒙引泉詩閑開蘃珠殿暗閲金字經元稹清都夜境景龍韓思復拜給事中帝作景龍觀思復諌之為虚室以鑿户起層臺而壘土唐文粹崔尚桐栢觀頌崇飾韋嗣立景龍中同三品時崇飾觀寺用度百出嗣立建言伏見營立寺觀累年不絶鴻侈繁麗務相矜勝大抵費常千萬以上轉徙木石廢功害農地藏開發蟄蟲傷露上聖至慈理必不然凖之道法則乖質之生人則損陛下豈不是思諌作金仙等觀韋湊景龍初作金仙等觀湊諫以為方農月興功雖貲出公主然高直售庸則農人捨耕取僱趍末棄本恐天下有受其飢者冶金作帝像郭英乂明皇在蜀時舊宫為道士祠冶金作帝像盡繪乘輿侍衛每尹至先拜祠後視事英乂愛其地勝選輙壊繪像自居之衆始不平紫府薛頥帝為築觀九嵏山號曰紫府黄宅唐文粹李庾西都賦黄宅緇廬金篆玉局上有鬱藍天垂光抱瓊室杜甫金華觀詩焚香玉女跪霧裏仙人來同上羽節凌風文粹崇元聖祖院碑金榜瑶壇仙術真官羽節凌風珠珮珊珊賈餗養真靈境文粹崔尚桐栢觀頌不死之福鄉養真之靈境真氣靈蹤文粹獨孤及古函谷闗銘聆風仙籙則真氣靈蹤起乎其中傳寳圖于本支同上柱史一去流沙萬里留玉函于舊宅傳寳圖于本支寳像珍龕辛替否諫金仙玉真觀天尊無欲無營何必璇臺玉樹寳像珍龕使人困窮秘宇靈宅禁山開秘宇復户㓗靈宅禹錫桃源千秋觀賀知章弃官詔於㑹稽置千秋觀命賀主之雲觀文粹姚崇五老峰詩雲觀此山北天下觀一千六百八十七唐百官志瑞雲靈趾顯徳中世宗營一道宫於皇城之西工人發得石一片上有字題瑞雲靈跡鎮梁東他日多應與古同嵗月遷移人事改再來閑處又興功復題道士任守真記帝讀之歎異令還觀紀異録捨宅為觀天寳九載李林甫等皆請捨宅為觀以祝聖帝恱釋教十五白象法之教金人教起西方化流中夏漢明帝夢見金人飛空而下傳毅曰西域之神其名曰佛今陛下所夢將是乎乃使郎中蔡愔等往天竺尋訪佛名由是化流中夏以戒律為教文以禪定為真守方便之門拔有漏之身超無量之刼道濟真俗理苞聖愚立三世之緣觀感流俗設百法之要誘掖浮生開悟愚蒙拯濟沉溺大雲之教甘露之法苦空貪著既無傷於國經且有補於王化執迷回向開善誘之門施方便之力拯苦海之沉溺救火宅之焚燒大雨之潤衆生攝心脱屣塵勞煩惱解脫慧劍維摩經以智慧劍破煩惱賊戒珠法華經精進修静戒猶如護明珠五翳喻日月為煙雲塵霧垢五翳五静清浄有五啓覺路之緘縢發空門之扄鐍誘羣迷以方便救衆苦以觧脱報應之緣三車之教不言以化無刑而威楚王英信佛道請以縑贖罪詔報曰王好黄老之㣲言尚浮屠之法教何嫌當有悔吝其還贖以助伊蒲塞桑門之盛饌也三郤謟於道二何佞於佛何充執政崇信佛供給沙門縻費巨萬不悋貧乏時郤愔及弟曇奉天師道而充與弟崇釋氏謝萬曰三郤謟於道二何佞於佛度門覺路慈雲甘露孔王縉本傳七月望日宫中造孟蘭盆綴飾鏐琲設高祖以下七聖位幡節衣冠皆具各以帝號識其幡自禁内分諸道佛祠鐃吹鼔舞奔走相属是日立仗百官班光順門奉迎導從嵗以為常羣臣承風皆言生死報應故人事置而不修大厯政刑日以堙陵由縉與元載杜鴻漸倡之也以三塗六道嚇愚欺庸追既往之罪窺將來之福傅奕集駮佛議武徳七年上䟽極詆浮圖法曰西域之法無君臣父子以三塗六道嚇愚欺庸追既往之罪窺將來之福伐摩尼之風壊浮屠之俗李徳裕一品集鄭亞割愛取滅蕭倣懿宗怠政事喜佛道引桑門入禁中為禱祠事數幸佛廬廣施予倣諫以為天竺法割愛取滅非帝王所尚慕今筆梵言口佛音不若懲繆賞濫罰孤殃祈福况佛者可以悟取不可以相求常衮事見道士門習歌唄以為樂裴休宣宗嘗曰休真儒者然嗜浮屠法居常不御酒肉講求其説演繹附著數萬言習歌唄以為樂與終于泉素善至為桑門號以相字當世嘲薄之而所好不衰妖邪之法傅奕遺言戒子六經名教言若可習也妖邪之法謹勿為深詆釋氏吳筠始筠見惡於力士而斥故文章深詆釋氏能致佛法李邕中宗立鄭普思以方伎幸邕諫曰陛下誠以普思術能致能法邪梁武帝且因之永有天下非陛下乃今可得事浮屠法李華晚事浮屠法詆毁葉法善雅不喜浮屠法常切詆毁議者譏其好憎然以術高卒莫之測託浮屠生死説白居易追貶江州司馬既失志能順適所遇託浮屠生死説若忘形骸者久之經月不食葷暮節惑浮屠尤甚至經月不食葷稱香山居士溺浮屠道杜鴻漸晚節溺浮屠道好談浮屠法房琯好談老談浮屠法有為佛老法興浮屠祠屋者皆驅出境王仲舒知俗病利為江西觀察使有為佛老法興浮屠祠屋者皆驅出境寫佛書饋賂僧尼莊宗冊劉氏為皇后自以出於賤㣲踰次得立以為佛力又好聚魰分遣人為商賈至於市肆之間薪蒭果茹皆稱中宫所賣四方貢献必分為二一以上天子一以入中宫宫中貨賄山積惟寫佛書饋賂僧尼而莊宗由此亦佞佛胡僧來迎拜之予策名二十年百慮而無一得然後知世所謂道無非畏塗惟出世間法可盡心爾由是在硯席者多旁行得句之書備將迎者皆赤髭白足之侣深入智地静通還源客塵觀盡妙氣來宅劉禹錫送僧元暠盡妙理者莫如法門變凢夫者莫如佛土佛示滅後大弟子演聖言而成經傳心印曰法承法而能傳曰宗由宗而分教曰支坐而攝化者勝義皆空之宗也行而宣教者推破邪山之支也釋子恵則生於像季思濟刼濁乃學于一支開役羣迷以為盡妙理者莫如法門變凣夫者莫如佛土悟無深者莫如散花故業于浄名深逹實相自京師渉漢沔歴鄢郢登熊湘劉禹錫送惠則歸上都戒律十六白以法求道用刑修心八戒堅持䕶持威儀戒珠見上修行精進勤苦四分律也律儀法要戒行三藏經律論九部經律論各三部小乘戒律也全䕶珠之志雖在修行得捨筏之心豈宜執著未及超於解脱且當攝於威儀僧律國章孔未曾有傾欹懈倦之色唐嚴郢不空三藏自成童至于晚暮常飭供且坐道場浴蘭焚香入佛知見五十餘年晨夜寒暑未曾有湏㬰傾欹懈倦之色異律於定慧不可與言佛栁宗元衡山大明寺律和尚碑儒以禮立仁義無之則壊佛以律持定慧去之則䘮是以離禮於仁義者不可與言儒異律於定慧不可與言佛從峻洎侃以究戒律凡浮屠之道哀其徒必小律而去經大明恐焉於是從峻洎侃以究戒律而大法以立同上杖屨衣巾屏居一室許堯佐廬山東林熙怡大師碑杖屨衣巾屏居一室行住坐卧無非道場衲衣跏趺未嘗出户李華潤州鶴林徑山大師衲衣跏趺未嘗出户周密䕶持律儀細行周密䕶持净覺禪師銘王維金䋲開覺路寳筏度迷川李寄浩然踐青折萌汎席灌盂栁宗元送方及師至於踐青折萌汎席灌盂雖小教戒未嘗肆其心禪定十七白次第之禪真如之理歸空離相悟法斷言捨筏忘筌萬法歸一乘無我之真相有緣之勝果如悟三空終超十地超彼岸初地乘不退之輪證無生之觀初地决定經不捨初地入於二地乃至十地有漏之身無生之理觧法藏之緘縢啓禪門之扄鐍正覺不二法門入定安禪八戒四禪定慧齊修身心無著一乘禪也人能𢎞道觧脱世塵無言無説定慧齊心孔離俗寂静南蠻西舎利凡曲名十有二七曰禪定驃云掣覽詩謂離俗寂静也心不離定中唐文粹李華左谿大師碑銘序心不離定中口不嘗藥味緣隨定設法與心起緣隨定設出唐文粹李華碑無空可住無有可捨是逹有源無空可住是知空本出王維能禪師碑同歸性海舉足下足長在道場是心是情同歸性海出同上寂然不動湛而常存李白崇明寺幢文傳千燈於智種了萬法於真空同上禪龕只宴如吾師雨花外不下十年餘長者自布金禪龕只晏如大珠脱玷翳白月當空虚杜甫謁文公上方鳥聚疑聞法龍叅若䕶禪李寄浩然飛蚊破面舊相禪學錄丁繁自尚書郎叅靈度師去官求道日食脱粟二升諸僧鉢水一盂夏月夜禪雖飛蚊咂食終不揺動夏既滿靣為破爛也斗盆燒香曹務光見趙州以斗盆燒香十斤曰財可得法難求金面棊盤蘓尚書八十猶叅禪大溈訪之以手拍碎金面棊盤如黒而迷仰見斗極一言頓悟不踐初地六祖碑以為真印初逹摩與佛衣俱來得道傳付以為真印至大鑒置而不傳豈以是為筌蹄耶芻狗耶人不已若而不若置之耶佛十八白金人紫金之像白毫之光自相不常隨求而變神周無朕應念而生相好光明相也歸依迴向瞻仰妙相莊嚴具足神通變化七寳之飾有大威徳大神力也象教道場發菩提之心展供養之具西方之神蓮花承歩青蓮妙相孔禁中祀佛號内道場王縉奉佛不茹葷食肉晚節尤謹初代宗未重浮屠法每從容問所以縉與元載盛陳福業報應帝意向之由是禁中祀佛諷唄齋薰號内道場逃父出家傅奕上䟽詆浮屠帝下奕議有司中書令蕭瑀曰佛聖人也非聖人者無法請誅之奕曰禮始事親終事君而佛逃父出家以匹夫抗天子以繼體悖所親瑀非出空桑乃尊其言盖所謂非孝者無親佛西胡黠人爾欺訹夷狄以自神帝又嘗問卿拒佛法奈何奕曰佛西胡黠人爾欺訹夷狄以自神至入中國而􅏽兒㓜夫模象莊老以文飾之有害國家而無補百姓也帝異之彌勒佛身張仁愿華州下邽人遷殿中侍御史御史郭𢎞覇者稱后乃彌勒佛身仁愿正色拒之悟之於心姚元崇曰佛不在外悟之於心玉像祈年張仲方始高祖仕隋時太宗方㓜而病為刻玉像於榮陽佛祠以祈年乆而刓晦仲方在鄭勑吏治䕶鏤石以聞傳于時佞佛過甚孟簡晚節佞佛過甚為時所誚常與劉伯芻歸登蕭俛譯次梵言者詔佛老者大論麟徳殿徐岱帝以誕日嵗嵗詔佛老者大論麟徳殿升召岱講説始三家若矛盾然卒而同歸于善帝大悦為佛老灋皆驅出境王仲舒為江西觀察使有為佛老興浮屠祠屋者灋皆驅出境空寂無為見道教門溺志於佛嚴挺之溺志於佛與浮屠惠義善義卒衰服送其䘮惑佛裴寛惑於佛喜與沙門游習誦其書老彌篤云李蔚贊若佛者特西域一槁人耳祼顛露足以乞食自資癯辱其身屛營山樊行一概之苦本無求于人徒屬稍稍從之未聞佛能致太平張鎬肅宗時引内浮屠數百居禁中號内道場諷唄外聞鎬諫曰天子之福要在養人以一函㝢羙風化未聞區區佛能而致太平願陛下以無為為心不以小乗擾聖慮帝然之攘斥韓愈進學觧曰觝排異端禳斥佛老迎佛骨上表遷刑部侍郎憲宗遣使者往鳳翔迎佛骨入禁中三日乃送佛祠王公大人奔走諷唄至為夷法灼體膚委珍貝騰杳繫路愈聞惡之乃上表臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以豐年之樂徇人之心為京都士庻設詭異之觀戯玩之具耳安有聖明若此而肯信此等事哉然百姓愚㝠易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心信向百姓㣲賤於佛豈合更惜身命以灼頂燔指十百為羣觧衣散錢自朝至暮轉相倣效唯恐後時老㓜奔波棄其生業若不即加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也佛本夷狄之人與中國言語不通衣服殊製口不道先王之法言身不服先王之法服不知君臣之義父子之情假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出之於境不令惑於衆也况其身死已久枯朽之骨凶穢之餘豈宜以入宫禁佛跡西域天竺國尚浮屠法不殺生飲酒處處捐曰佛故跡也營大像李嶠武后将營大像於白司馬坂嶠諌造像雖俾浮屠輸錢然非用縣求辦不能濟是名雖不稅而實稅之延賔宫主雜俎佛為三十三天仙延賔宫主所為道在竺乾有古先生善入無為刻繒泥像今僧尼十萬刻繒泥像以惑天下傅奕䟽支竺歿而佛聲寢靈山廢而灋不作白居易寺記華人之譎誕者又攘荘周列禦寇之説佐其高層累架騰直出其表以無上不可加為勝妄相誇脅而倡其風李蔚賛嗜浮屠灋居常不御酒肉講求其説著數萬言雖當世嘲薄之而所好不衰裴休傳赦湯鑊於幽途息劍輪於苦海李白鍾銘營大像切諌蘓珦后營大像白司馬坂糜用億計珦上䟽切諌見納清静仁恕張士衡太子復問事佛營福其應奈何曰事佛在清静仁恕爾如貪惏驕虐雖傾財事之無損於禍篤志奉佛王維兄弟皆篤志奉佛食不葷衣不文綵佛軀汗流劉𤣥佐汴有相國寺或傳佛軀汗流𤣥佐自往大施金帛教人仁弱突厥毗伽可汗黙暾連欲城所都起佛老廟暾欲谷曰佛老教人仁弱非武彊術黙棘連當其術即遣使者請和帝以不情答而不許策佛牙五代趙鳯有僧遊西域得佛牙以獻明宗以示大臣鳯言世傳佛牙水火不能傷請驗其真偽因以斧斫之應手而碎方是時宫中施物已及數千因鳯碎之乃止以利人為急五代周世宗即位之明年中國乏錢乃悉詔毁天下銅佛像以鑄錢嘗曰吾聞佛説身世為妄以利人為急使其真身尚在猶欲割截况此銅像豈其所惜哉由是羣臣皆不敢言佞佛五代馬嗣孫既學韓愈為文故多斥浮屠氏之説及罷歸乃反學佛撰法喜集佛國記行于世時人誚之曰佞清泰不徹乃來佞佛清泰廢帝年號也光明彌陁像安國寺彌陁像法空自光明寺移來未建都時此像在蘭若中往往放光因號光明韓愈與孟簡書如釋氏能與人為禍祟非守道君子之所懼也况萬萬無此理且彼佛者果何人哉其行事類君子邪如小人邪若君子也必不妄加祸於守道之人如小人也真身已死其鬼不靈天地神祗昭布森列非可誣也又豈令其鬼行胷臆作祸福於其間哉韓文青蓮承趺金獸捧持藻井花鬘葱籠四垂邑人膜拜如佛出世劉禹錫䕫州移鐡像記于闐玉像高一尺七寸濶尺餘一佛四菩薩一飛仙一叚玉成截肪無玷膩彩若滴酉陽雜俎大雄功包隂陽力掩造化首出衆聖卓稱大雄李白崇明寺尊勝陁羅幡文使苦海静滔天之波疑山滅炎崑之火同上慈氏起西方之教習登正覺劉禹錫碑無有十纒之惱栁宗元巽上人修院記佛道有世界曰極樂佛號無量壽如來其國無有三惡八難衆寳以為飾其人無有十纒之惱羣聖以為友云轉惑見為真智即羣迷為正覺栁文西軒記夫佛之道可以轉惑見為真智即羣迷為正覺捨大闇為光明夫性豈異物邪孰能為余鑿大昏之墉闢靈照之户廣應物之軒者吾將與為徒本自依迦葉何曾藉偓佺杜甫詠懷浮屠有不可斥者往往與易論語合栁宗元冶金銀像大或十圍環王喜浮屠道冶金銀像大或十圍經十九白四句之偈十二部尊經貝葉之文翻譯受持讀誦白馬䭾三藏九部誦經徐義為慕容所獲械理其手足将殺之誦觀世音經至夜門開械脱出於重禁中若有導者文字性空佛書經文孔箴血寫佛書肅宗庻人張氏帝不豫后自箴血寫佛書以示誠羅什所譯姚崇卒治令曰今之佛經羅什所譯姚興與之對翻而興命不延國亦隨滅五帝之時父不䘮子兄不哭弟致仁壽無凶短也下逮三王國祚延久其臣則彭祖老聃皆得長齡此時無佛豈抄經鑄像力邪緣死䘮造經像以為追福夫死者生之常古所不免彼經與像何所施為爾曹謹不得為鑱臂血寫浮屠書韋綬父䘮鑱臂血寫浮屠書梵經文粹張説鄎國公主碑手寫金字梵經金澱書經同上佛之迹去乎世乆矣其留而存者佛之言也言之著者為經栁宗元送琛上人六百五十七部沙門𤣥奨俗姓陳郾師人少聰敏有操行貞觀三年因疾而挺志往天竺凡十七年至貞觀十九年二月十五到長安足所親踐者一百一十一國採求佛法咸究根源凡得經論六百五十七部佛舎利像等甚多太宗在東都留所得經像於洪福寺有瑞氣徘徊像上遂詣朝謁太宗以洪福寺為翻經之所御製聖教序高宗為太子作述聖記出南部新書僧二十白桒門沙門開土苾芻衆僧長老高僧惠炬涅槃經曰執惠炬密行浄名利根辯才見性上人彼上人者僧佛佛書善根福地出家修道灋器塵心道心梵行身則有為所以歸於三寳心實無相俾乎宗本一乘演灋有緣遊方無住繼七祖之業振錫浮杯脱略塵境歸依法門虛幻非實身喻芭蕉之形明徹無瑕心學琉璃之地修行宴坐五藴皆空諸漏已盡謂六根也觀色身頓悟無生之理處世界當持不染之心覺性幻身行道坐忘聽灋觀心身心之惠支許支遁字道林講維摩經遁為法師許詢為都講遁衆議謂無以歴難詢設一難亦謂遁不復能通也養馬有遺支遁馬者或譏道林道林曰愛其神俊聊復畜耳放鶴有遺支道林鶴者道林謂鶴曰爾冲天之物寧為耳目之玩者乎遂放之受女髙僧傳鳩摩羅什姚主以妓女偪令受之乃自講説譬如臭泥中生蓮花但取蓮花勿取臭泥馴虎高僧傳惠永感虎來馴生融之學觀肇之名皆僧名高僧傳六時人稱通姓則生融上道精難則觀肇第一乘杯食肉髙僧傳杯渡者不知其名姓常乘木杯渡河因名焉不修細行不甚精持飲酒食肉與俗人不殊也天女髙僧嵬戒行嚴潔嘗有一女子寄宿自稱天女以上人有徳天遣我來勸勉其意嵬執意貞確一心無擾曰吾心若死灰無以革嚢見試女乃凌雲而逝顧曰海水可生湏彌可傾彼工人者秉心堅貞賦詩惠休善屬文作碧雲之什人能𢎞道出塵呪水生蓮佛圖澄妙通𤣥術腹旁有孔當齋時至流水側引五藏洗之還内腹中取鉢盛水燒香呪之生青蓮花食針羅什不拘細行諸僧故多效之什乃聚針盈掬食之諸僧盡皆愧服也彌天桑門道安俊辯至荆州見習鑿齒曰彌天釋道安鑿齒對曰四海習鑿齒時人皆以為名對度人格祠部格王公已下薨别勑許度人者親王二十三品已上三人並湏亡者子孫及妻媵并通取周親妻媵不湏試業若數不足唯見在度如有假冐不在原首之限也又祠部格云私家部曲客奴婢等不得入道如别勑許出家後犯還俗者追歸舊主各依本色也孔表元武尉嚴礪少為浮屠法太守見之偉其材表為元武尉不得箠辱王縉盛陳祸福報應代宗意向之詔天下官司不得箠辱僧尼請行業不如令者還為民李訓嘗建言天下浮屠避徭賦耗國衣食請行業不如令者還為民既執政自白罷因以市恩敕浮屠方士無兩競金仙公主為道士築觀京師以方士史崇𤣥為師觀始興詔崇𤣥䕶作日萬人羣浮屠疾之以錢數十萬賂狂人叚謙冐入承天門升太極殿自稱天子有司執之辭曰崇𤣥使我來詔流嶺南且敕浮屠方士無兩競私侍合浦公主浮屠智朂逆占祸福惠𢎞能視鬼皆私侍主冒為沙門服上官儀父𢎞為隋江都宫副監大業末為陳稜所殺時儀幼左右匿免冒為沙門服請捨家為桑門蕭瑀好浮屠法間請捨家為桑門帝許之矣復奏自度不能為乃詔奪爵上大雲經岑長倩和州浮屠上大雲經著革命事后喜始詔天下立大雲寺長倩争不可為安國寺奴竇懐貞表請為安國寺奴怙勢奪民邸肆薛登為御史大夫僧慧範怙太平公主勢奪民邸肆官不能直登將奏之或勸以自安荅曰憲府直枉朝奏暮黜可矣遂劾奏抜親樹知畜妻養孥辛替否䟽曰今出財依勢避役亡命類度為沙門其未度者窮民善人耳抜親樹知豈離朋黨畜妻養孥非善無私愛是致人毁道非廣道求人也不能擐甲胄又曰假如兵革相乗則沙門不能擐甲胄寺塔不足禳飢饉隱嵩山修浮屠武平一武后時畏禍不敢與事隠嵩山修浮屠汰僧偽濫姚元崇中宗時近戚奏度僧尼温户强丁因避賦役至是崇建言佛不在外悟之于心行事利益使蒼生安穏是為佛理烏用奸人以汩真教帝善之詔天下汰僧偽濫髪而農者餘萬二千人食千僧杜鴻漸自蜀還食千僧以為有報搢紳效之病甚令僧剔頂髪遺命依浮屠葬不為封樹飯千桑門追福田神功䘮帝飯千桑門追福妖妄李尚隠為蒲州刺史浮屠懷照者自言毋夢日入懐生已鏤石著驗尚隠劾奏妖妄詔流懐照播州飯萬僧李蔚懿宗惑浮屠常飯萬僧自為賛唄蔚上䟽切諌云普加髪落李徳裕劾奏王智興為壇泗州募願度為僧者人輸錢二千則不復勘詰普加髮落自淮而右户三丁男必一男剔髪規免徭賦所度無筭臣閲渡江者日數百蘓常齊民十固八九若不加禁遏則前至天子誕月江淮失丁男六十萬不為細變有詔徐州禁止夜飲火其廬栁惲魏少游表為判官僧有夜飲火其廬者歸罪瘖奴軍候受財不詰獄具惲與其僚崔祐甫白奴寃魏少游趣訊僧僧首伏因厚謝二人始度僧尼肅宗改元始度僧尼祝髪事浮屠楊元琰敬暉等為武三思所搆元琰知禍未巳乃詭計請祝髪事浮屠中宗不許緇衣半道魏元忠陳郡男子袁楚客者以書規之曰今度人既多緇衣半道不本行業專以重寳附權門皆有定直昔之賣官錢入公府今之賣度錢入私家以兹入道徒為游食收貲濟軍裴冕建言度僧道上收貲濟軍興事見賣官門講灋劉仁恭招浮屠與講灋以辠為民鄭餘慶知吏部選浮屠法湊以辠為民訴闕下詔御史中丞宇文邈刑部侍郎張彧大理卿鄭雲逵為三司與功徳判官諸葛述參按述故吏也餘慶劾述猥賤不宜與三司雜治時韙其言亡為浮屠成汭青州人少無行使酒殺人亡為浮屠嫉見遇吴筠天子重之羣沙門嫉其見遇而高力士素事浮屠共短筠於帝還治儒學馬嘉運少為沙門還治儒學政事參决吐蕃賛普政事必以桑門參决帥夜光少為浮屠至長安因凡仙公主得召見温泉帝竒其辯賜冠𢃄亡命李徳裕除浮屠法僧亡命者多趍幽州徳裕召邸吏戒曰為我謝張仲武劉從諌招納亡命今視之何益仲武懼以刀授居庸闗吏曰僧敢入者斬請僧道士一切限年李叔明惡道佛之弊上言彭偃曰今僧道不耕而食不織而衣一僧衣食嵗每慮三萬五夫所不能致舉一僧以計天下其費不貲臣謂僧道年未滿五十可令歲輸絹四尼及女冠輸絹二雜役與民同之裴洎言曰傳曰女子十四有為人母之道四十九絶生育之理男子十六有為人父之道六十四絶陽化之理臣請僧道士一切限年六十四以上尼女冠四十九以上許終身在道餘悉還為編人皆童髪毁服以游於世栁宗元送𤣥舉師歸寺序皆童髪毁服以游於世黄金獅子承高座李白送蜀僧晏黄金獅子承高座白玉麈尾談重𤣥紹釋風於西域李白祭璿和尚紹釋風於西域迴佛日於東維日夜誦經九函東川解魔寺僧吉祥魁梧多力受飯五鉢日夜誦經九函池中魚知其數以名召之皆出水面使去即沒出蜀普録居長安慈恩寺張策少好浮屠之説乃落髪為僧居長安慈恩寺黄巣犯長安乃返初服奉父母以避亂赤髭白足之侣深入智地静通還源劉禹錫送僧元暠南逰寺二十一白佛寺仁祠招提精舎灋門梵宫寳地祗園紺園化城浄土象灋之教既務恢張棟宇之規所宜壮麗大壯小乗日宫月殿天宫花界蓮花界蓮宫花宫奈苑二梵之福阿含經世尊説若能補故寺是謂二梵之福鹿苑龍宫雞園灋宫鷲峯諸佛攸館衆聖所居國家恢𢎞象教開設仁祠廣闢浄土精選真僧日月天宫琉璃地道金界金䋲界道鐡圍山雞足山鴈塔象塔金刹香刹布金之地多寳之室孔興廣祠廬矦希逸為淄青節度使佞佛興廣祠廬人苦之請併寺蘓瓌徙同州刺史鑄浮屠立廟塔役無虛嵗瓌以為縻費浩廣雖不出國用要自民産日殫百姓不足君孰與足天下僧尼濫偽相半請并寺著僧常貟數缺則補憲寫宫省安樂公主營第及安樂佛廬皆憲寫宫省而工緻過之荆州河東寺蘓良嗣在荆州時州有河東寺本蕭詧為兄河東王所建良嗣曰江漢間何與河東乎奏易之而當世恨其少學云造浮屠大像狄仁傑武后将造浮屠大像度費數百萬官不能足更詔天下僧月施一錢助之仁傑諫今邉陲未寧宜寛征鎮之徭省不急之務稅天下浮屠錢營佛祠張廷珪武后詔税天下浮屠錢營佛祠於白馬坂作大像廷珪諌以為傾四海之財殫萬民之力窮山之木為塔極冶之金為像然猶有為之法不足高也今天下虚竭蒼生彫弊謂宜先邉境實府庫飬人力后善之祠部凡天下寺緫五千三百五十八所注三千二百所僧二千一百所尼毎寺上座一人寺主一人都維那一人共綱綂衆事而僧持行者有三品其一曰禪二曰法三曰律大抵皆以清浄慈悲為宗唐六典雖復項籍放命封樹紀於邱墳鮑信捐生丹素著於圖象猶恐九泉之下尚論鼎鑊八難之間永纒氷炭可於建義以來交兵之處各建寺刹招延勝侣望法鼔所振變炎火於青蓮清梵所聞易苦海於甘露所司量定立寺稱朕哀矜之意仍命虞世南李百藥禇遂良等為碑銘以紀功業唐貞觀為戰陣處立寺詔白司馬坂復營佛祠神龍初詔白司馬坂復營佛祠廷珪方奉詔抵河北道出其所見營築勞亟懐不能已上書切争營寺塔宋務光神龍元年上書曰自頃營寺塔度僧尼施與不絶非所謂急務也廣殿長廊辛替否景龍中為左拾遺時盛興佛寺公私疲匱替否上䟽曰今疆場危駭倉禀空虚卒輸不充士賞不及而大建寺宇伐木空山不給棟梁運土塞路不充墻壁所謂佛者清浄慈悲體道以濟物不欲利以損人不榮身以害教今三時之月掘山穿地損命也殫府虚幣損人也廣殿長廊榮身也損命則不慈損人則不愛物榮身則不清浄寕佛者之心乎蠧財數百億又同上䟽曰中宗造寺蠧財數百億為佛寺東都白居易後履道第卒為佛寺東都詔毁佛寺韋博昭詔毁佛祠悉以浮屠𨽻主客博言令太暴宜近中鑄銅為瓦金塗王縉初五臺山祠鑄銅為瓦金塗之費億萬計縉給中書符遣浮屠數十軰行州縣歛丐貲財毁屬下浮屠私廬李徳裕毁屬下浮屠私廬數千以地與農蜀先主祠旁有猱材其民剔髪若浮屠者畜妻子自如德裕下令禁止賜寳座二李蔚懿宗成安國祠賜寳座二度髙二丈構以沉檀塗􅀢鏤龍鳯葩蘤金釦之上施複座陳經凡其前四隅立瑞鳥神人高數尺磴道以升前被繡嚢錦䄡珍麗精絶助營開業佛祠崔羣魏博田季安以五千縑助營開業佛祠羣以為無名之献不當受有詔却之榜曰懐恩高霞寓位既高言多不遜帝欲罷其兵益自憂乃上私第為佛祠請榜曰懐恩以塞帝疑百寺南蠻婆賄伽廬國喜佛法有百寺琉璃為甓錯以金銀丹彩紫鑛塗地覆以錦􅄢王居亦如之毁上元道佛祠四十區韓滉遷浙江觀察使聞京都未平毁上元道佛祠四十區修塢壁珍樓寳屋國貲不逮高力士於來廷坊建佛祠珍樓寳屋國貲所不逮神龍佛祠裴延齡又造神龍佛祠湏材五十尺者延齡妄奏同州得大谷木數千章度皆八十尺出軍攻戰必禱佛祠鍾傳凡出軍攻戰必禱佛祠積餅餌為犀象高數尋惠林佛祠李源惠林佛祠憕舊墅也源依祠居闔户日一食表輞川第為祠王維毋亡表輞川第為寺終塟其西安國佛祠李絳是時盛興安國佛祠倖臣吐突承璀立石紀聖德焉營造華廣欲使絳為之頌將遺錢千萬絳上言陛下蕩積習之弊四海延頸望徳音忽自立碑示人以不廣毁寺四千六百招提蘭若四萬食貨志武宗廢浮屠法天下毁寺四千六百招提蘭若四萬籍僧尼為民二十六萬五千人緇廬唐文粹李庾西都賦天雨花大同坊雲花寺大厯初僧儼講經天雨花至地咫尺而滅夜有光燭室敕改為雲華出酉陽雜俎佛室崇佛室為學者居㑹其徒而委之食使擊磬鼓鐘以嚴其道栁大雲寺記起樓架閣切星漢誇雄闘麗止者誰韓愈送澄觀師詩杜甫大雲寺詩夜深殿突兀風動金琅璫天黒捫春院地清棲暗芳玉䋲回斷絶鐡鳯森翺翔花宫玉斗生網户銀河耿花宫李白秋夜宿龍門香山寺香雲花雨香雲徧山起花雨從天來李白尋山僧地靈生寳地靈歩歩雪山草僧寳人人滄海珠塔刼宫墻壯麗敵香厨松道清凉俱蓮花交響共命鳥金榜䨇迴三足烏杜甫岳麓寺詩梵放時出寺鍾殘仍隠床大雲寺詩清聞樹杪磬逺謁雲端僧杜甫惠義寺野寺根石壁諸龕遍崔嵬前佛不復辯百身一莓苔唯有古殿存世尊亦塵埃如聞龍象泣足令信者哀以笏量基唐髙僧傳吠舎黧國有維摩故宅唐顯慶中王𤣥策因向印度過浄名宅以笏量基止有十笏故號方丈室躋閣謁金像韋應物曰禪詩躋閣謁金像攀雲叩禪扄殿宇餘丹紺䙞閣峭欹懸韋蘓州憇東西林精舎詩岧嶤青蓮界蕭條孤興發同上同德寺詩紺殿横江上青山落鏡中李白宴興德寺南閣白孔六帖卷八十九
