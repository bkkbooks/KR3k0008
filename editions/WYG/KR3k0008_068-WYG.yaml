body:
  text: 白孔六帖卷六十八唐白居易原本宋孔傳續撰齋一沐二祭饌三黍稷四犧牲五歸胙六餕七苞茅八祀山川九祭星十釋奠十一薄祭十二修廢祭十三淫祀十四齋一白齋者不樂不弔為哀樂則散其志齋必變食改常饌也居必遷坐孔子曰三日齋一日用之猶恐不敬二日伐鼓何居齋者止樂君子之齋也專致其精明之德也故散齋七日以定之致齋三日以齊之定之謂齋齋者精明之至也然後可以交神明也齋之為言齊也齊不齊以致齊是故君子非有大故非恭敬也則不齋不齋則於物無防也嗜慾無止也及其将齋也防其邪物訖其嗜慾耳不聽樂故記曰齋者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮子曰齋戒以事鬼神恐人之不敬也齋戰疾子之所慎云云齋必有明衣布沐浴衣也楚武王授師将齋曰余心蕩矣蕩動散也致齋於内散齋於外禮齋之日思其居處思其笑語思其志意思其所樂思其所嗜拜大将軍漢髙祖擇日齋戒設壇具禮拜韓信為大将軍十日齋戒齊桓公将與管仲飲云云齋明盛服所以修身也明潔也恭黙思道盡恭之貌嚴絜之心必誠必信齋心藺相如欲授秦王璧乃令齋戒漢髙祖絜誠注意而拜上将韓信周澤敬慎虔心而居太常後漢周澤為太常嘗卧病齋宫妻哀其老病就問之澤以干齋收送獄人語曰居世不諧為太常妻解齋晉劉毅嚴酷妻有過立加杖棰常居齋宫妻省之即奏加妻罪請解齋也取齋衣漢邴吉子顯為諸曹嘗從祠宗廟至夕牲日乃使出取齋衣吉恐謂夫人曰祭重事顯不敬亡吾爵必顯孔齋禱張文瓘為大理卿嘗有小疾囚相與齋禱願亟視事齋大同殿髙力士帝齋大同殿力士侍帝曰我不出長安且十年海内無事朕将吐納導引以天下事付林甫若何力士對曰天子順動古制也躬齋洗謹具食飲躬齋洗奏㫖聲以獻韓祭太湖栗然以敬得以列侯謁三廟又得以展時祭先期致齋栗然以敬既齋盡志歆然永思劉禹錫令狐先廟碑齋戒之别有三唐禮樂志凡祭祀之節有六二曰齋戒其别有三曰散齋曰致齋曰清齋大祀散齋四日致齋三日中祀散齋三日致齋二日小祀散齋二日致齋一日大祀前期七日太尉誓百官於尚書省曰某日祀某神祗于某所各揚其職不供其事國有常刑於是乃齋同上皇帝散齋於别殿致齋其二日于太極殿一日于行宫上前致齋一日尚舍奉御設御幄於太極殿西序及室内皆東向尚舍直長張帷於前楹下上致齋之日質明侍中版奏請申嚴通事舍人引文武五品已上袴褶陪位諸侍臣齋者詣閤奉迎侍中版奏外辦皇帝服衮冕出自西房侍中前跪奏請就齋室皇帝降坐入室上凡豫祀之官散齋理事如舊唯不弔䘮問疾不作樂不判署刑殺文書不行刑罰不預穢惡致齋唯行祀事其祀官已齋而闕者攝其餘清齋一日以上並唐禮志諸大祀齋官皆於散齋日平明集尚書省受誓戒其致齋日三公於都省安置所司鋪設若車駕親行及齋官向祠祭之所本司預告州縣及金吾令平明請所行之路道次不得見諸凶穢縗絰及聞哭泣之聲唐六典注給明衣唐六典聽還舍不奉祭盧邁改尚書左丞将作監元亘攝祠以私忌不聽誓御史劾之帝疑其罰下尚書省議邁曰禮散齋有大功䘮致齋有朞䘮齋有疾病聽還舍不奉祭凡供祠之吏雖當齋戒得以决罰由是禮與敬無不足者故将有事則祠部上其日先一日咸至于祠而考閱焉御史㑹公卿有司執簡而臨之栁宗元監察使壁記又齋心於宿設天子蒼然見於無形澹然若有所聽又齋心於宿設将旰食而匪寧杜甫南郊賦沐二浴附白齋戒君子齋戒必先沐浴彈冠楚辭新沐者必彈其冠晞髮楚辭云汝沐兮咸池晞髪兮陽之阿心覆頭須請見晉侯晉侯辭以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也髮晞用象櫛晞乾也禮潘沐傳曰遺之潘沐潘沐汁可沐也朝濯髮於陽谷楚辭三握周公下白屋之士一沐三握髪後世稱其聖賢膏沐自伯之東首如飛蓬豈無膏沐誰適為容三日具沐子事父母之禮見下燂潘具浴門注沐稷禮沐稷而靧梁櫛用樿櫛髪晞用象櫛進禨進羞工乃升歌進羞作樂以盈器也居䘮之禮頭有創則沐叔武将沐聞君至喜捉髮以出前驅射而殺之注叔武衛侯弟守國者浴浴乎沂風乎舞雩詠而歸君子齋戒必先沐浴去垢史記沐不必江海要之去垢振衣楚辭新浴者必振衣二巾進飲禮浴用二巾上絺下綌出杅履蒯席又曰履席衣布晞身乃屨進飲以盈氣杅音汙浴之器也浴蘭湯兮楚辭日浴鶴不日浴而自白燂湯禮子事父母五日則燂湯請浴三日具沐燂潘請靧足垢燂湯請洗煖也潘米汁也靧洗靣也重耳臝浴傳曰重耳行及曹曹共公聞其駢脅觀其臝浴薄而觀之同川而浴夷狄男女同川而浴湢浴内外不共湢浴浴室也禮孔動逾嵗時栁宗元貶永州司馬貽京兆許孟容曰洗沐盥漱動逾歳時一搔皮膚塵垢滿爪誠恐悲傷無所告訴以至此也雖洗沐未嘗出髙力士知内侍省事雖洗沐未嘗出眠息殿帷中朝罷沐浴閑邀遊閬風亭李白鼓吹入朝澤髮韓愈夜會聯句澤髮解兠鍪李正封三沐三薰方将坐足下三沐而三薫之聽僕之所為韓愈答呂毉書沐芳莫彈冠浴蘭莫振衣李白沐浴子新沐頭輕感髪稀杜甫客至先遣薫濯唐史髙駢客至先遣薰濯詣方士祓除謂之解穢少選即引去憫諸生少年不浴沂水文粹代荀卿與春申君書自為櫛沐梁太祖母生三子其次太祖后少寡攜三子傭食蕭縣劉崇家母時自為櫛沐曰朱三非常人也以麝塗身日再塗再澡南詔環王元和後數用兵宰相不休沐李德裕傳見休假門遇休沐遇休沐往往馳召宇文士及辭以沐髮五代趙鳯于嶠因被酒往見鳳鳯知其必不遜辭以沐髮七十日未甞櫛沐陳利貞守襄城七十日未嘗櫛沐凡大祀中祀接神齋官祀前一日皆沐浴九品以上皆官給明衣通典齋注祭饌三白鼎彖曰亨餁也聖人亨以享上帝而大亨以養聖賢籩豆静嘉詩燔炙芬芬有飶其香有椒其馨吉蠲為饎是用孝享饎酒食也薦鮪周禮内饔掌割烹煎和之事庖人供薦羞品物曰薦滋味曰羞膳羞祭祀供好羞鱃魚蟹醤膴胖肉大臠骨􅀈骨有肉也澤物之奠簠簋之實羊肆羊殽肉豆切肉血薦豚肩不掩豆禮膟膋羶薌薦其血毛燔炙醯醢之美煎塩之尚貴天産也水草之菹陸産之醢蚳蝝小物備矣昆蟲之異草木之實隂陽之物備矣凡俎以骨為主骨有貴賤殷人貴髀周人貴肩貴者取貴骨賤者取賤骨三牲之俎八簋之實美物備矣腥肆音惕爓腍祭豈知神之所享主人自盡其敬儀禮饔人倫倫驛也虞九負革肉擇之取美也午割勿設勿設分散祝曰嘉薦普淖淖和也乃孝反大羮鉶羮有鱣有鮪鰷鱨鯋鰋孔非禮則不薦韋縚請宗廟籩豆皆加十二又言郊奠爵容止一合容小則陋宜増大之張均韋述議曰且嗜好讌私之饌與時而遷故聖人一約以禮雖平生所嗜非禮則不薦所惡是禮則不去禮饌備進又曰唐家清廟時享禮饌備進周法也實于庖厨其牲牢酒醴菜菓之饌必實于庖㕑栁宗元監祭文甘㫖之物肥濃之味文粹韋述等宗廟加籩豆議今欲取甘㫖之物肥濃之味隨所有者皆充祭用以今之時饌恐未可也至孝之情同上自漢以降諸陵皆有寢宮歲時朔望薦以常饌此既常行亦足盡至孝之情矣肴羞具潔罔有不備杜牧祭百神文祭饌則光禄獻㕑李庾西都賦膳部掌邦之牲豆酒膳辨其品數凡郊祀日月星辰嶽瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閱之儀皆載於廪犧之職焉六典黍稷四白簠簋既陳實其籩豆陳其宗器祭器粢盛豐備黍稷非馨書交於神明必在乎恍惚思其嗜慾乃以薦馨香仁者之粟禮父母没必求仁者之粟以祀之此之謂禮終注孝子雖貧尚不取惡人之粟祀其先粢食不鑿昭其儉也周禮甸師掌耕耨王籍以時入供粢盛表粢盛鮮潔辨六齊名物六榖􅅒人供接盛接為版以授舂舂人供米物非一米藏帝籍於神倉祇敬必飭月令薌合黍明粢稷薌萁粱嘉䟽稻滌粢盛明水也傳御廪災藏親耕之廪孔罔黍稷以奉粢盛唐文粹白居易補逸書云湯征諸侯葛伯不祀湯若曰罔黍稷以奉粢盛予佑厥稼穡乃困於仇餉乃饗祖禰牲牢黍稷唐文粹白居易李公家廟碑銘乃饗祖禰牲牢黍稷封署以供祠部郊祭黍稷所司長官封署以供來覲來齋以饋黍稷烏氏廟碑韓愈力難及黍稷得種菜與麻杜甫喜晴德馨斯飫文粹禇亮迎俎樂章嘉稷匪歆德馨斯飫明德感文粹魏證送神樂章明德感兮非黍稷凡簠簋皆一者簋以稷簠以黍禮樂志用皆二者簋以黍稷簠以稻粱同上黍稷用豐野夫讙謡栁宗元太白祠茫茫黍稷昔實棘茨韓愈祭文馨非稷黍魏證祀赤帝降神樂博碩斯薦笙鏞備舉庶盡肅恭馨非稷黍犧牲五白鬼神饗德牲牢貴誠絜爾牛羊或剥或烹循行犧牲視全具桉芻豢瞻肥瘠察物色必比類量大小視長短皆中度謂審牲也月令牲牷肥腯博碩謂其畜之碩大繁滋也魯侯曰犧牲玉帛不敢加也必以信傳小事不用大牲古者六畜不相為用傳祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺犂牛之子騂且角雖欲勿用山川其舍諸告朔之餼羊子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮郊天牲用騂犢貴誠未知牝牡之情牛卜日曰牲牛既得吉則改名曰牲傳郊牛之口傷改卜牛牛死乃不郊非禮也當改卜牛郊不可廢月令仲春祀犧牲無用牝為傷生生之類介葛盧聞牛鳴曰是生三犧皆用之矣問之而信三十維物爾牲則具異毛者三十宋災用馬于四墉非禮也日食用牲于社非禮也凡天災有幣無牲牢禮牢三牲周禮餼牽傳餼牽竭矣楅衡所以持牛角不使觸人周禮設其楅衡水藁所以洗牲也周禮供其水藁歌舞其牲謂君牽牲入時封人隨歌舞之言其肥腯以歆神也周禮展牲選牲告牷牷全也犧牲不育於市牲死則埋之牲孕不用也奉時辰牡辰牡孔碩辰牡謂牲也辰時也於薦廣牡大牡白牡殷騂剛周毛炰豚享以騂犧雞曰翰音兎曰明視羊曰柔毛羔豚而祭百官皆足太牢而祭不必有餘此之謂稱庶羞不踰牲犧牛牷毛天子肥牛養於諸侯也索牛索具大夫具得其用剛鬛豕疏趾雉三月繋七日戒三日宿慎之至也柔嘉牲也二牲庶子若富則具二牲獻其賢者於宗子注賢善也帝牛稷牛見郊天門在滌滌牢養處也納烹納牲告殺也周禮充人掌繫祭祀之牲牷祀五帝則牢芻之三月繫于國門使養散祭祀之牲散祭祀山川之屬享牛牛人掌養公牛享牛獻神也用特書歸格于藝祖用特求牛終事牛擇祭用授職人而芻之饗食賔射供膳羞之牛牛牲之牙牙懸肉格與盆簝以待事共雞牲辨其物祭其首登首於室祈珥共羊牲賔客共法牲若牧人無牲則受布于司馬使置犧牲儀禮曰肫解無腸胃無腸胃君子不食豢腴不愛牲玉傳奉牲以告曰牲牷肥腯謂其畜之碩大蕃滋也謂其不疾瘯蠡也瘯蠡疥癬雄雞斷尾賔孟見之曰自憚為犧也人犧實艱穀梁云免牲者緇衣𤣥纁裳有司𤣥端奉送於南郊鼷䑕食郊牛角改卜牛志不敬也展觔角而知傷展道盡矣注展道雖盡所以備災不盡譏哀公不敬故致天變也傳庀牲六月上甲始庀牲十月甲始繋牲庀具也穀梁周禮沈埋疈辜共犬牲用牷純色伏瘞亦如之伏犬以車轢以脤膰之禮親兄弟之國祀有執膰戎有受脤傳天王使石尚來歸脤脤祭餘肉所以賜諸侯與之同福也夕牲漢受釐宣室釐祭餘肉孔議射牲事裴守真授太常博士髙宗将封嵩山詔諸儒議射牲事守真奏古者郊祀天子自射牲漢武帝封泰山令侍中儒者射之帝不親也今按禮前明十五刻宰人鸞刀割牲質明行事毛血已具天子至奠玉酌獻而已今若前祀一日射牲則早於事及日則晚不逮事漢又天子不親古今異宜恐不可行牲肥祝册自京師至吏以時告乃齋祓視册省牲之夕載暘載隂五鼔既作牽牛正中牲肥酒香樽爵静潔南海廟碑韓文斯碩魏證祀夕月迎俎用雍和有齊斯㫖有牲斯碩載潔牲牷魏證祀黒帝迎俎樂章載潔牲牷爰登俎豆三牲八簋豐備以相㳂杜甫南郊賦梁武帝不用牲牢梁武帝前後三度捨身施佛宗廟之祭不用牲牢韓文犧幣之數放而依之天子以為古爵莫貴於公侯故海岳之祀犧幣之數放而依之所以致崇極於大神韓文視牲啟毛不委下吏杜牧祭百神文剥烹羮胾無愛牛羊同上牲牷既疈栁宗元二妃廟烹牲是祀公受介福栁文武岡銘司門轉致乎牲牢之繫杜甫南郊賦醇犧入饋文粹源乾曜迎俎奠三犧薦五牲李白明堂賦凡牲在滌大祀九旬中祀三旬小祀一旬養而不卜無方色則用純必有副焉省牲而犢鳴則免之而用副禁其捶拊死則瘞之創病者請代犢告祈之牲不養唐禮志角握之牲色純之騂張說迎俎雍和章在滌嘉豢麗碑敬牲角握之牲色純之騂牲以養牛張説后土祠碑五歳繭栗無所貴其誠膳部見祭饌門奉禮郎設牲版之位以成省牲之儀六典廪犧令掌薦犧牲凡主祀之牢牲各有名數凡大祭祀養牲在滌九旬中祀三旬小祀一旬其牲方色難備者以純色代之凡告所之牲不養凡祭祀之犧牲不得捶朴傷損死則埋之病則易之凡供别祀用太牢者則三牲加酒脯及醢大祭祀則與太祝以牲就傍位太常卿省牲則北面告腯及牽牲以授太官而用之六典歸胙六白膳夫祭祀之致福者受而膳之周禮歸胙于公申生祭曲沃也傳賜齊桓宰孔賜齊桓公胙曰天子有事於文武使孔賜伯舅胙胙致福也穀梁傳凡祭祀受福者展而受之歸胙於公周禮受釐見上孔賜胙禮志六曰進熟諸祝皆進跪徹豆還尊所奉禮郎曰賜胙賛者曰衆官再拜在位者皆再拜聰明魏證祀白帝降神樂章馨香是薦受胙聰明太祝減胙禮志太祝減神前三牲胙肉共置一俎太祀又以胙肉授司徒以進皇帝每受以授左右乃跪取爵飲同上三歲一祫五歲一禘若祔若常享若禘祫卜日齋戒飲福受胙進退之數大抵如宗廟之禮上餕七白記曰夫祭有餕餕祭之末也餕鬼神之餘惠術也可以觀政矣尸謖君與卿餕謖起也君起大夫餕下餕上之餘也大夫起士餕賤餕貴之餘也餕餘不祭食人之餘曰餕禮輕故不敢祭父不祭子夫不祭妻祭先也從卑處家故不祭孔從者餕饌禮志納皇后尚宫引皇帝入尚食徹饌設於東房如初皇后從者餕皇帝之饌皇帝侍者餕皇后之饌庶幾來歸餕以侑兮栁宗元祭文皇太子納妃司饌跪奏饌具皇太子及妃俱坐司饌跪取脯取韭葅皆擩於醢授皇太子又取授妃俱受祭於籩豆之間太子妃俱拜司則取爵祭酒遂飲啐爵奠遂拜執爵興司饌奏徹饌司則前跪奏稱司則妾姓言請殿下入於東房釋冕服著袴褶司則啓妃入幃幄皇太子乃入室媵餕皇太子之饌御餕妃之饌禮樂志諸臣之子一品至三品為一等四品至五品六品至九品為一等賛者設尊於室内北牖下饌於房内西墉下如同牢牲體皆節折右載之於舅俎左載之於姑俎婦入房婦進西向再拜坐将餕舅命易醤内賛者易之婦及餕姑饌婦祭内賛者助之上苞茅八白藉用白茅易尚書苞匭菁茅茅縮酒菁為菹其所包裹而致者也蓋三脊之茅也周禮甸師供蕭茅鄉師供茅菹菹藉也長五寸束者菹館茅裹肉菹藉也爾貢苞茅不入王祭不供無以縮酒寡人是徵傳桓責楚也三脊茅江淮之間有一茅三脊此靈物不可常貢也孔所資誠敬唐文粹楊嗣復權德輿文集序藉用白茅所資誠敬苞茅重入歸關内杜甫詩用三脊茅以藉文粹林簡言漢武封禪論漢朝有人如管夷吾應用三脊茅以藉固不使其君與孝武等茅明杜甫朝享太廟賦酌以茅明薦厥茅藉賀知章登歌奠玉帛用肅和禮以琮玉薦厥茅藉縮茅以獻文粹薛稷昭成皇后室酌用坤真縮茅以獻潔秬惟馨荆茅栁文與崔連州食鍾乳書必若土之出無不可者則荆之茅皆可以縮不召斯至蘇頲東封頌藉三脊不召斯至虔奉嚴禋逺修職貢虔苞茅而助祭遣愛子以來朝吳越王備史諸侯有不入苞茅張九齡貢師子賛序祀山川九白虞書歲二月東廵狩至于岱宗柴太山也柴燎告至也望秩于山川東方山川望而祭之秩次序也春秋曰不郊猶三望非禮也三望分野之星及國中山川皆因郊祀望而祀望而祀之魯廢郊天而修小禮故曰非禮望郊之細也不郊亦無望可也竝走羣望晉人曰竝走羣望不愛牲玉注國中望祀並走祭之晉侯疾卜曰臺駘為祟子産曰臺駘汾神也汾水名也抑此者不及君身山川之神則水旱癘疫之災於是禜之山川之神若臺駘者若君身則出入飲食之事也山川之神又何為焉楚昭王疾卜曰河為祟王不祭曰三代命祀祭不越望望境内山川不穀雖不德河非所獲罪也江漢雎漳楚之望也四水在楚望祀之數鄭伯請釋泰山之祀而祀周公鄭當助王祭泰山今釋之而為魯祀周公求許田也書曰祀于新邑咸秩無文言周始修祀于新邑咸次第祀之不在禮文者亦祀之季氏旅於泰山季氏僣祀泰山求福子謂冉有曰女弗能救與救止也正月命祀嶽鎮海瀆月令孟夏禱祀山川以祈雨仲冬祈祀四海大川名源井泉順其盛德之時而祭天子祭名山大川五嶽視三公四瀆視諸侯視者牲器之數國主山川傳申繻曰名以山川則廢祀魯以獻公武公廢具敖二山名惟爾明神順禮經而脩祀報我豐歲應時雨而出雲歲徧禮天子祭天地四方山川五祀歲徧諸侯祭五祀以祀四望四瀆五嶽周禮血祭祭社稷五祀以沉霾祭山林川澤順其性以含藏也周禮記曰山川神祇有不舉者為不敬不敬者君削以地五嶽四瀆皆祀有常禮祀皆使者持節以祠焉唯泰山與河歲五祀江水四餘皆一禱而三祠漢書祭牲幣史記自殽以東名山五大川二山曰太室山恒山太山㑹稽山湘山水曰濟曰淮春酒脯為歲禱因泮涷秋凋冬寒禱祀其牲用牛犢各二牢其圭幣各異也詔修漢武詔曰河海潤千里其令祠官修山川之祠為歲事典加禮祭也木偶馬史記諸名山川用駒者悉以木偶馬代之孔幸東都唐禇無量開元五年帝将幸東都無量上言昔帝舜之狩秩山川願陛下所過名山大川邱陵墳衍並詔致祭祀衡山歸崇敬大厯八年遣祀衡山未至而哥舒晃亂廣州監察御史憚之請望祭而還崇敬正色曰君命豈有畏邪遂往祭名山姜撫自言通僊人不死術開元末太常卿韋縚祭名山因訪隠民還白撫已數百歲名山大川著乎典式靡不加敬張嘉正銘遣女巫乗傳禱天下名山大川王璵帝嘗不豫太卜建言祟在山川璵遣女巫乗傳分禱天下名山大川巫皆盛服中人䕶領五岳四鎮歲一祭禮樂志五岳四鎮歲一祭各以五郊迎氣日祭之東岳岱山於充州東鎮沂山於沂州南岳衡山於衡州南鎮㑹稽於越州中岳嵩山於河南西岳華山於華州西鎮吳山於隴州北岳常山於定州北鎮醫巫閭於營州東海於萊州淮於唐州南海於廣州江於益州西海及河於同州北海及濟於河南望如山川以蕤賔為宫樂志十二和二曰順和以降地祗夏至祭方丘孟冬祭神州地祇春秋社廵狩告社宜于社壇社首皆以函鍾為宫太簇為角姑洗為徵南呂為羽各三奏文舞八成望如山川以蕤賔為宫三奏判縣二面唐之舊禮祭風伯雨師五岳四瀆用之其制去軒縣之北靣祭岳鎮海瀆山林川澤籩豆各二簋簠俎各一禮志四時祭五岳四鎮四瀆各籩豆十簋二簠二俎三同上祭岳鎮海瀆皆太牢同上開元十三年封泰山神為大齊王天寳五載封中岳神為中天王南岳神為司天王北岳神為安天王六載河瀆封為靈源王濟瀆封為清源公江瀆封為廣源公淮瀆封為長源公㑹稽山為永興公岳山為成德公霍山為惠聖公醫巫閭山為廣寧公八載又封太白山為神應公其九州鎮山除入諸岱外並宜封公十載正月以東海為廣德王南海為廣利王西海為廣潤王北海為惠澤王分命卿監詣岳瀆及名山一時備禮兼册祭其祭儀具開元禮唐通典祭星十日月附白傳曰晉侯有疾卜曰實沉為祟子産曰實沉參神也參星也此不及君日月星辰之神則雪霜風雨之不時於是乎禜之星辰之神若實沉之類若君之身則出入飲食之事星辰之神又何為也仲秋享夀星於南郊秋分日祭也夀星南極老人星是也陶唐氏火正閼伯居商邱宋星相土因之故商主大火相土代閼伯之後居商邱以祀大火王宫祭日也夜明祭月也幽禜祭星皆壇名日月星辰人所瞻仰也故祀之孟冬祀司人獻人數軒轅星名周禮王拜受之以圖國用槱燎祀司中司命風伯雨師以實柴祀日月星辰實柴致牛柴上周禮圭璧五寸以祀日月星辰朝日夕月月令春祀朝日於東郊秋祀夕月於西郊為朝夕必於日月日東月西祈福于天宗天宗日月星辰禋于六宗孔安國曰四時也寒暑也日也月也星辰也水旱也靈星之尸晉書曰毛詩絲衣篇髙子曰靈星之尸漢髙亦立星祠江左以來不立七祀靈星則配南郊不特置也詔立漢書詔郡國立靈星祠農祥也祠以牛孔實昔酒以祀以壺尊二實昔酒以祀衆星禮志幣祀以方色幣祀五星以方色天皇大帝北辰北斗天一太一紫微五帝座並差在行位前餘内宮諸坐及五星十二辰河漢曰十九坐在第二等十有二陛之間中官市垣帝坐七公日星帝席大角攝提太㣲五帝太子明堂軒轅三台五車諸王月星織女建星天紀十七座及二十八宿差在前列其餘中官一百四十一座皆在第三等十二階之間外宫一百五在内壝之内衆星三百六十在内壝之外已上在大明夜明壇唐禮志祭五星十二辰二十八宿籩豆各二簋簠俎各一禮志五官五星三辰七宿皆少牢同上開元勑宜令所司特置夀星壇常以千秋節日修其祠典又勑夀星壇宜祭老人星及角亢七宿著之常式通典開元禮立秋之後祀靈星於國城東南同上釋奠十一白月令仲春命樂正習舞将欲釋奠上丁釋奠於國學天子乃率公卿諸侯大夫親往視之觀其禮也釋置也為置牲幣之奠於文宣王廟上戉釋奠於太公廟秋如春釋奠之禮但吹舞異也記曰凡學春官釋奠於先師秋冬亦如之凡始立學必釋奠於先聖先師行事必以幣先聖周公若孔子也式遵前典敬享先師儒禮祀事兩楹之奠皮弁祭菜示敬道也釋菜三獻之儀序齒於虞庠展儀於禰廟太子經徧晉書魏正始中齊王每講經徧輒使太官釋奠先聖先師於辟雍不躬親及惠帝為太子乃愍懐太子講經竟並親釋奠於太學太子進爵於先師中庶子於顔回也孔幸太學觀釋菜孔頴達拜祭酒帝幸太學觀釋菜命頴達講經畢上釋奠頌有詔褒美軒縣三面樂志軒縣三靣皇太子用之若釋奠于文宣王武成王亦用之共制去宫縣之南面祝版皇帝署北面揖以為太重歸崇敬春秋釋奠孔子祝版皇帝署北靣揖以為太重宜准武王受丹書於師尚父行東面之禮事皆施行孔子用王者事巍然當座以門人為配自天子而下薦祭進退誠敬禮如親弟子者韓文國學以祭酒司業博士為三獻辭稱皇帝謹遣禮志州學以刺史上佐博士為三獻縣學以令丞主簿若尉為三獻如社祭給明衣同上其中春中秋皆以上丁戊同上釋奠于文宣王武成王其中春中秋皆以上丁戊樂以軒縣前享一日幸禮郎設三獻位于東門之内道北執事位于道南皆西向北上學官館官位于縣東當執事西南西向學生位于館官之後皆重行北上觀者位于南門之内道之左右皆重行同上緫章元年太子宏釋奠贈顔回為太子少師曽參少保咸亨元年詔州縣皆營孔子廟封孔子為隆道公采邑以奉嵗祀子孫世襲褒聖矦禮樂志司業李元瓘奏先聖廟為十哲像以先師顔子配則配像當坐今乃立侍餘弟子列像廟堂不豫享而范􅑔等皆從祀請釋奠十哲享於上而圖七十子于壁曽參以孝受經於夫子請享之如二十二賢乃詔十哲為坐像曽參特為之像坐亞之圖七十子二十一賢於廟壁奠璧采璘玢元稹詩按月令曰則釋奠于先聖先師國之故也乃立夫子像配以顔氏栁宗元文宣王廟碑公用牲幣栁宗元先聖廟碑公用牲幣祭于先聖文宣王之宫夜漏未盡三刻公元冕以入就位于庭煬焉耆老歎嗟韓愈孔子廟碑廟成躬率吏及博士弟子入學行釋奠禮耆老歎嗟其子弟皆興於學許敬宗等奏天下州縣置三獻官劉禹錫嘗嘆天下學校廢乃奏記宰相曰武德初詔國學立周公孔子廟四時祭貞觀中詔修孔子廟後許敬宗等奏天下州縣置三獻官其他如立社元宗與儒臣議罷釋奠牲牢薦酒脯時王孫林甫為宰相不涉學使御史中丞王敬從以明衣牲牢著為令遂無有非之者本傳今􅇪四縣歲釋奠費十六萬舉天下州縣歲凡費四千萬適資三獻官飾衣裳飴妻子於學無補也請下禮官博士議罷天下州縣牲牢衣幣春秋祭如開元特籍其資半畀所𨽻州使増學校學半歸太學猶不下萬計可以營學室具器用豐簋食増掌故以備使令同上祝文惟夫子固天攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹末學依仁游藝謹以制幣犧齊粢盛庶品祗奉舊章式陳明薦以先師顔子配通典八十一顔子祝文敢昭告于先師顔子爰以仲春率遵故實敬脩釋奠于先師顔子惟子庶幾具體徳冠四科服道聖門實臻壺奥式陳明獻從祀配神薄祭十二白求備去奢傳曰鄭子張有疾命宗人黜官薄祭君子曰善哉晏平仲祀其先人豚肩不掩豆君子以為隘也隘狹陋不中禮仲尼曰難為下也譏平仲偪下也蘋蘩薀藻之菜潢汙行潦之水茍有明信可薦於鬼神傳云絜以精誠茍蘩藻而勞矣怠其肅敬雖犧牲而吐之鬼神享德書傅說戒髙宗曰祀無豐于昵無於親近之廟而致豐也昭其儉傳曰清廟茅屋大路越席大羮不致粢食不鑿昭其儉也禮以少為貴者物已偞卑偞厭也謂物太卑薄也禮禮将偪下君子不以菲廢禮菲薄也言雖薄儉而禮不可廢也殺牛易東鄰殺牛不如西鄰之禴祭實受其福禴薄祭也言奢而慢不如儉而敬也既豐省之有差何貴賤而無别是為殺禮無乃瀆神孝貴饗親儉宜中禮禮明貴賤薦陳之品有差孝備蒸甞追養之心宜勉奉能貧之戒不可求豐鄭子張命黜官薄祭曰貴而能貧可以後亡也非示儉之時亦宜盡物外則盡物内則盡志此祭之心盡物祭物備也既昧蘋蘩之誠是用稊稗之禮敬以致誠雖蘋蘩之可薦儉不中禮亦秕稗而為譏孔儉約以表誠唐文粹楊仲昌議君人者有國奉先敬神嚴享豈肥濃以為尚将儉約以表誠薦精誠文粹栁識弔夷齊文掇澗溪之毛薦精誠而已一樽貳簋文粹楊仲昌加籩豆議一樽之酒貳簋之奠為明祀也潔誠可鑒蘋藻非羞栁宗元祭文觴有㫖酒豆有䋲肩伊奠之菲而誠孔繁栁文敬薦行潦洩哀兹辰栁文潢汙一觴詎寫平素豈獨蘋藻徵諸澗溪並栁文修廢祭十三義祭人附白晉修虞祀晉滅虞而修虞祀且歸職貢於王者虞同宗也燕祭齊廟樂毅下齊七十城而修齊宗廟蓋以興滅繼絶實不血食周書始祀于新邑咸秩無文周始祀於新邑皆次序祀之在禮無文者亦祀之雖魯史垂訓不祀非族而周書咸秩亦祭無文子産以伯有為厲立良止以撫之曰鬼有所歸乃不為厲吾為之歸也良止伯有子立為大夫使有廟也月令孟春禱祀山川古之卿士有益於人者若后稷勾龍之類也周禮荒正日索鬼神求廢祀而修之靡神不舉衛遷帝丘成公夢康叔曰相奪予享帝邱夏后相之舊都公命祀相􅑔武子曰不可鬼神非其類不歆其祀杞鄫何事以止後漢李夑祭王成夑父固為梁兾所誅王成存救燮燮故祭之晉韋泓祭應詹孔復祀感帝蕭徳言乾封初帝已封禪復詔祀感帝神州郝處俊等奏言顯慶定禮廢感帝今改祈穀為祀感帝何升降紛紛焉淫祀十四白子曰非其鬼而祭之者諂也季氏旅於泰山子謂冉有曰女弗能救與救止也非所祭而祭之名曰淫祀淫祀無福楚昭王有疾卜之曰河為祟大夫請祭王曰三代命祀祭不越望望境内山川也江漢濉漳楚之望也泗水也不穀雖不德河非所獲罪也遂不祭孔子曰楚王知天道也申生見狐突曰我将以晉畀秦秦将祀予狐突曰神不歆非類民不祀非族君祀無乃殄乎鬼神非族不歆其祀見上注辛有適伊川見被髮而祭於野者曰此其戎乎其禮先亡矣淫昬之鬼宋公使邾文公執鄫子用於次雎之社子魚曰小事不用大牲而況敢用人乎又用諸淫昬之鬼注睢社非命祀故曰淫昬也宋公無道用鄫君於睢社文仲不智祀爰居於魯門伍倫易㑹稽之俗宋均移辰陽之風並禁淫祀傳曰魯用人亳社以人祭殷社臧武仲聞之曰周公其不享魯祭乎周公享義魯無義也不首其義故誣於祭也首本也媚奥媚竈鬼雖求食宜秩無文神亦依仁不歆非類不在祀典法施於民則祀之以死勤事則祀之茍異蘋蘩之誠是用秕稗之禮漢武禁巫祠道中者無間神魏曹宏與臨汾公主侍者共事無間神司馬芝按之無間山名傳曰楚靈王滅蔡用隐太子于岡山申無宇曰五牲不相為用祭馬祖不用馬之類神君武帝求神君乃舍之於上林中號蹏氏舘神君者長陵女子以免子死見神於先後宛若宛若祠之其室人多往祠帝外祖母平原君亦往祠之及上即位厚禮致祠内中聞其言不見其人注先後妯娌也宛若字也孔禁陳子昻言巫鬼淫祠熒惑於人者禁之妬女祠狄仁傑帝幸洛陽宫并州長史李沖元以道出妬女祠俗言盛服過者致風雷之變見馳道門毁千七百房持節江南廵撫使吳楚俗多淫祀仁傑一禁止凡毁千七百房止留夏禹吳太伯季札伍員四祠而已勸帝罷淫祠蘇源明肅宗復兩京擢考功郎中知制誥是時承大盜之餘國用覂屈宰相王璵以祈襘進禁中禱祀窮日夜中官用事給養繁靡羣臣莫敢切諫昭應令梁鎮上書勸帝罷淫祠其它不暇及也禱淫祀羅珦授太常太祝擢廬州刺史民間病者捨醫藥儔淫祀珦下令止之禁私家妖神淫祀太宗帝紀禁私家妖神淫祀罷淫祀于頔改蘇州罷淫祀淫昏之鬼不載祀典若煩國禮是荒巫風中使遍祈名山公盱衡而稱曰今主上明聖懷于百靈淫昏之鬼不載祀典若煩國禮是荒巫風李太白天長節度韋公碑甌粤間好事鬼山椒水濵多淫祀其廟貌有雄而毅黝而碩者則曰将軍有温而愿哲而少者則曰某郎有媪而尊嚴者則曰姥有容而艶者則曰姑陸龜蒙野廟碑相仍杜甫享太廟賦考武之淫祀相仍糾之以刑白公議祭祀近代以來稍違祀典或巫史假於淫昏伏惟陛下申明國典禳禱非鬼者糾之以刑祀黄熊評黄熊之厲吾不敢聞晉侯方疾偶夢色象之一物謂之黄熊安可執加鮌厲而為昏越之祀哉程晏髙堂亦明王杜甫南池詩髙堂亦明王魂魄猶正直不應空坡上縹緲親酒食淫祠自古昔非惟一川瀆狄梁公檄項羽廟唐垂拱中狄仁傑為淮南安撫大使作檄告于楚霸王項羽文君潛游澤國嘯聚梁楚不知厯數之有歸莫測天符之所㑹遂奮關中之翼卒垂垓下之翅當匿魄東山收魂北極豈合虚承廟食廣費牲牢君宜速遷勿為人害檄到如律令遂除項王廟餘小祠並盡壞惟禹廟存焉出朝野僉載見廣記孰尊惡德逺矣自古孰恣淫昏俾我斯瞽千歲之㝠公闢其戸栁宗元斥鼻亭神記斥一祠而二教興焉明罰行于鬼神愷悌達于蠻夷不惟禁淫祀黜非類而已顧為記以刻同上除淫祀一千一十所李德裕為浙西觀察使除淫祀一千一十所舊村落事妖神元稹賽神詩村落事妖神林木大如村事來三十載巫覡傳子孫村中四時祭殺盡雞與豚董卓廟議文粹髙適茍斯鬼足尚則漢莽可得而神晉敦可得而廟桓元父子可享於江鄉朱泚弟兄可祠於朔上何馨香之氣而用於暴悖之鬼哉廢諸祠不在祀典者周本紀世宗疾淫祀于頔為湖州刺史吳俗事鬼頔疾其淫祀廢生業神宇皆撤去惟吳太伯伍貟等廟存焉舊史大地婆父祠肅宗以王璵為相信妖祠道士李國禎請建大地婆父祠昭應縣令梁鎮上表極言其不可曰大地婆父祠祀無文言甚無經義無可攷陛下特與大建祖宗之廟上天必貽向背之責又何以為祠哉孔平仲續世説毁淫祀韋正貫拜嶺南節度使南方風俗右鬼正貫毁淫祀教民無妄祈㑹海水溢人爭咎撤祠事以為神不厭正貫登城沃酒以誓曰不當神意長人任其咎無逮下民俄而水去民乃信之白孔六帖卷六十八
