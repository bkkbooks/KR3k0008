body:
  text: 白孔六帖巻八十一唐白居易原本宋孔傳續撰換田一田訟二水田三代田四農器五種六苗稼七認田苖八饁餉九田客十場十一百榖十二榖十三粟十四麥十五稻十六黍十七禾十八豆十九捃拾二十儲蓄二十一祈榖二十二農稔二十三蟲蝗二十四換田一求田附白𫝊鄭伯以太山之祊易許田又曰鄭伯以璧假許田榖梁云鄭伯以璧假許田非假也諱易也天子在上諸侯不敢以相與諸侯受於天子助祭太山湯沐邑也子不得専也許魯衛宿邑枋鄭助祭太山湯沐邑也易地交易疆埸之地一彼一此何常之有各以所利兩不相傷去彼取此求田史田蚡使籍城福請魏其侯南田魏其曰老僕雖棄將軍雖貴可以勢奪乎蚡怒曰魏其何愛數頃田也請官地田蚡為丞相請考工地益宅上怒曰君何不遂請武庫為將請美田宅秦王翦伐荆始皇送至㶚請美田宅園地甚衆至軍又使使請美田者五軰或曰將軍之乞貸亦已甚矣翦曰秦王不信人故請業自固也占田王立使客因南郡守李尚書占墾草田數百頃上書願入縣官詔平田與直有費一萬萬孫寳子嚴按發劾奏尚下獄也孔瘠地易上地食貨志憲宗末天下營田皆雇民或借庸以耕又以瘠地易上地民間苦之穆宗即位詔還所易地而耕田畆換易唐楊炎言於帝曰開元承平乆不為版籍而丁口轉死田畆換易田訟二白聽以版圖周禮小宰聽閭里以版圖注版戸籍也圗地圖也聽人訟地者以版圖决之地訟周禮凡地訟以圖正之注云地訟爭疆界也以土地之圖斷其訟齊楚俱失虞芮不爭虞芮二國爭田久而不决相謂曰西伯仁人也盍徃質焉入其境耕者讓畔行者讓路虞芮之君曰吾儕小人不可以入君子之朝遂以所爭之田為閑田宋鄭之間有隙地田彌作頓丘王暢嵒戈錫六邑宋鄭盟曰勿有是鄭人後成嵒戈錫宋向巢伐鄭鄭敗宋師於六邑為虚依前不肯也農必有畔地豈無圖定其廣狹必先量地辨以曲直亦在徴書請詳無理之辭庶驗求多之罪勸農務本必制夫㕓度土有初豈無籍地豪奪吾人漢書先疇沃土爭尋常之地傳邢侯與雍子爭鄐田兄弟爭田韓延夀為左馮翊行縣至髙陵有兄弟爭田者延夀曰是吾化不行閉閤思過請告將觧印訟者慙以田相讓願終身不爭質厥成詩虞芮質厥成見上爭孟子曰爭地以戰殺人盈野孔段秀實初為營田判官涇大將焦令諶取人田自占給與農約熟歸其半是嵗大旱農告無入令諶曰我知入不知旱也責之急農無以償往訴秀實秀實署牒免之紛紜與奪八十一斷李華練塘頌序潤州練湖幅員四十里其傍大姓強家泄流為田専利上腴畆收倍鍾富劇淫衍旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷曲能掩直強者以得之韋公素知截湖申戒縣吏率徒闢之所潤者逺原隰皆春耕者飽憂者泰獵犯人田有辭怒而射許圉師俄坐其子獵犯人田有辭怒而射之圉師掩不奏為人告擿帝讓曰宰相而暴百姓非作威福乎咋舌不敢言劉禹錫高陵令頌涇水東行注白渠灑而為三以沃關中故秦人常得善嵗涇陽人擁而顓之私開四竇澤不及下涇田獨肥他邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之腴皆權倖家榮勢足以破理訴者復得罪由是咋舌不敢言吞怨衘忍公乃循故事考式文暨前後詔條更水道入于我里請杜私竇使無棄流請遵田令使無越制京兆具事以聞詔許訖役訟爭李華復練塘頌膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神靈百年游淀為漻凊不爭歩畆文椊劉梲與崔尚書書方今天下百姓不敢爭歩畆三疏申理卒與民直張仲方為金州刺史宦人奪民田仲方三疏申理卒與民直水田三通溝溉灌附白决渠降雨荷挿成雲溝塍綺錯開竇灑流溝澮脤連白公開涇以溉秦漢太始二年趙中大夫白公奏穿涇水起谷口尾入櫟陽注渭中袤二百里溉四千五百頃人歌曰田於何所池陽谷口云云谷口即今雲陽治國邑也史起引漳而灌鄴魏文侯曾孫襄王時史起為鄴令引漳水而灌鄴以留魏之河内人歌曰引漳水灌鄴旁千古岸生稻粱决為雨之渠泥惟數斗人歌曰涇水一石其泥數斗且溉且糞長我禾黍注水中停淤泥可以當糞收如雲之稼畆乃一鐘鄭國為秦鑿涇水旁北山東注渠成雨其田溉注塡游之水溉舄鹵之地四萬頃皆畆一鐘無凶年一溉之功且異復枯之效旱苗嘗經一溉亦復枯也萬頃之潤寜虞首種之艱月令首種不入且溉且糞如粢如梁濬兹溝洫决彼堰瀦變雲雨於黄汚化膏腴於舄鹵無旱暵之憂得沮洳之澤稻人周禮稻人掌稼下地以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮瀉水種之芒種皆治水也列音禄計切濬其畎澮生彼稻粱見上十二渠具縣令勸課門沃野沃渭溉灌均水均束邵信臣為南陽守行視郡中泉通溝瀆起水門堤閼以廣溉灌人得其利為民作均水約束刻石立碑以防分爭六輔渠倪寛為左内史奏請開六輔渠溉田作塘晉張閔字敬緒為晉陵内史所部四縣以旱田遂立曲河新豐塘溉八百餘頃每年豐稔葛洪作頌以擅興廢免官其後益拜大司農畎澮清白渠斗門式水部式京兆府髙陵界清白二渠交口置斗門堰清水􅁪淮為五分三分上中白渠二分入清渠若雨水上多即上下用水處相開放還入清水三月一日已前八月二十日已後任開放之蓄泄蓄貯水泄放水治舊渠後漢何敞為汝南守治銅陽舊渠百姓頼其利墾田增二萬頃修三渠晉食貨志夏侯和修新渠富夀㳺陂三渠溉田三百頃濬畎澮渠也變逸於勞力移地利以農易􅇤智切天功美鄭白之沃亡沮溺之勤溉岡鹵晉書苻堅通伾上源鑿山起堤通渠引瀆以溉岡鹵百姓頼之孔右史渠温造為朗州刺史開後鄉渠百里溉田二千頃民獲其利號右史渠溉四縣田節度河陽秦復懐州古奏渠枋口堰以溉濟源河内温武陟四縣田計五千頃築句城塘李襲譽累揚州長史揚州吳江大都㑹俗喜商賈不事農襲譽為引雷陂水築句城塘溉田八百頃以盡地利鑿汾水絳州刺史韋武鑿汾水灌田萬三千餘頃以水與民昭懿公主大厯末寰内民訴涇水為磑壅不得溉田京兆尹黎幹以請詔撒磑以水與民時主及曖家皆有磑丐留帝曰吾為蒼生若可為諸戚唱即日毁由是廢者八十所作均水法戴叔倫守撫州刺史民歳爭溉灌為作均水法俗便利之築富人固本二塘李吉甫為淮南節度使築富人固本二塘溉田且萬頃孟瀆孟簡為常州刺史州有孟瀆乆淤閼簡治導溉田凡四千頃斥海濵棄地為田杜佑初佑决雷陂以廣灌溉斤海濵棄地為田積米至五十萬斛厮水溉田李頻再遷武功令有六門堰者廞廢五百五十年方嵗饑頻發官廥庸民浚渠按故道厮水溉田榖以大稔擅决司洧水盧群淮西吳少誠擅决司洧水溉田使者止之不奉詔命群臨詰引伊洛崔縱為河南尹引伊洛溉髙仰通利里閭水甚宜之泄流為田李華潤州復練塘頌序大族強家泄流為田决翟陂趙㫤卒珝代立珝頗知書乃求鄧艾故迹决翟王陂溉民田兄弟居陳二十餘年陳人大頼之五代史釃引新渠匯于河流瀦雷陂以溉穡地釃引新渠匪于河流皆省功費而宏利澤權徳輿岐公淮南遺愛碑嵗獲秔稻蒲魚無慮萬計于頔為湖州刺史部有湖陂異時溉田三千頃久廞廢頔行縣命復修隄閼嵗獲秔稻蒲魚無慮萬計螣泉落環珮畦田差纂組杜牧弄水亭詩波光碧繡疇東坡詩北有澗水通青苖杜甫䕫州歌東屯稻畦一百頃北有澗水通青苖疏導渠流永徽六年雍州長史長孫祥奏言往日鄭白渠溉田四萬餘頃今為富商大賈競造碾磑堰遏費水渠流梗澁止溉一萬許頃請修營此渠以便百姓至於鹹鹵亦堪為水田髙宗曰疏導渠流使通灌溉濟沃炎旱應大利益大尉無忌對曰白渠水𢃄泥淤灌田益其肥美又渠水發源本髙向下枝分極衆若使流至同州則水饒足比為碾磑用水洩渠水隨入滑加以雍遏耗竭所以得利遂少於是遣祥等分檢渠上碾磑皆毁之至大厯中水田纔得六千二百餘頃代田四白後漢末以趙過為捜粟都尉過能為代田一畆甽工犬反嵗代處故曰代田古法也后稷始甽田以耜為耦並兩耜而耕廣尺深尺田甽長終畆一畆三甽一夫三百甽而播種於甽中苖生葉已上稍耨壟草因隤其土以附苗根故詩曰或耘或耔黍稷嶷嶷耘除草也耔附根也言苗稍壯每耨輙附其根也比盛暑壟盡而根深除能風旱故嶷嶷而盛也其耕耘下種田器皆有便巧漢五頃田當古十二頃古以百歩為畆漢以二百四十歩為畆故十二夫之田於漢為頃率五頃田用耦耕二牛三人一嵗之收常過縵田畆一斛已上縵田不為甽者莫幹反善者倍之善為甽者又過縵田畆二斛已上者過使教太常三輔太常主諸陵有民亦課種田大農買工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人輓犂過奏光以為丞教人相與庸輓犂庸功也言輓功共作也義亦與傭賃同率多人者田日三十畆少者十三畆以故田多墾闢又教邊郡及居延是邊城河東𢎞農三輔太常民皆使代田用力少而得榖多也孔月一代唐嚴郢奏秦地膏腴田曰上上耕者皆畿人月一代功甚易農器五白周易斵木為耜揉木為耒耒耨之利以教天下葢取諸益周禮鍜氏為鏄器田器也錢鏄之屬錢鏄農器鑄劒㦸為農器家語天子親載耒耜月令脩耒耜具田器季冬告人月令揉木為耒範金為錢鏄三之日于耜豳詩正月遂人治野以時器勸氓時器耒耜錢鏄之屬越鏄考工記越無鏄非無鏄夫人而能為鏄也借鉏漢賈誼曰商君化秦俗子借父耰鉏慮有徳色秦借而著色西征賦曰子嬴鉏而借父訓秦俗而著色遂大夫簡稼器脩稼政車人為耒庛音次謂耒下前曲接耜也長尺有一寸中直者三尺三寸上句者二尺二寸堅地欲其直庛柔地欲其句庛直庛則利推土回反句庛則利發倨句磬折謂之中地中地之耒其庛以直者如磬折調之調者弦六尺也水排鑄後漢杜詩公君為南陽善計畧教民造作水排鑄為農器用力少見功多人便之孔請三千具黙啜請農器三千具收河北耕器為範五代劉審交遷陳州防禦便出視民田見民耕器薄陋乃取河北耕器為範為民更鑄剡木為犂室韋剡木為犂人挽以耕耕具白敏中兼邠寜制置使規蕭闗通靈威路使為耕戰具大售殷賦陸龜蒙冶家子言吾且始鑄田器嵗東作必大售殷賦重秉耒耜者一撥不敢起器無耒耜張曲江龍池頌人食未粒鳥獸是茹時不耕稼器無耒耜而神農氏將教其本則天為之雨粟鑄鎛釤鉏斸韓文李惟簡誌益市耕牛鑄鏄釤鉏斸以給農之不能自具者夫神農斵耒耜教闢耨所以墾良田而殖嘉榖也然而不能遏稂莠之滋焉其所以遏之者芟夷錢鏄之而已元稹䇿市耕牛佃具李惟簡出為鳯翔節度使市耕牛佃具給農嵗増墾數千萬頃初税農具錢五代唐明宗長興二年種六浸種附白詩曰誕降嘉種維秬維秠維穈維芑秠一稃二米穈赤苗芑白苗也周禮司稼辨穜稑之種周知其名辨五物九等五物五地也九等謂騂剛赤緹云云舍人懸穜稑之種以供皇后春獻禮皇后率六宫獻穜稑之種不能償種假與漢平詔貧人遷徙至徙所易田宅假牛犂穜植也凡糞種騂剛用牛騂赤土剛強也赤緹用羊赤緹縓色音地兮反墳壤用麋渇澤用鹿故水處鹹瀉用貆貆貒音丸勃壤用狐勃壤粉解埴壚用豕壚粘疏也疆㯺用蕡㯺音檻蕡麻實也疆㯺堅地輕㸑用火輕㸑脆音孚照反凡上言用者皆謂煑其汁漬種也五種月令十二月雜五種漢書必雜五種以備災也孔請十萬斛默啜請粟田種十萬斛種不得下權徳輿大旱上闕政曰畿甸之内大率赤地而無所望慮麥種時種不得下宜詔在所裁留經用以種貸民易種子陸贄謂宜詔度支召工就諸屯賜種子勸之播蒔敬始李翰屯田紀績頌陳三壤之禮而敬其始苖稼七白黍稷嶷嶷曾孫之稼如茨如梁既堅既好不稂不莠五榖不滋彼黍離離穫之挃挃穫聲先雨耘耨管子别苖莠列疏遫遫宻也芃芃其麥五稼如雲之稼千耦其耘是刈是稷黍稷方華我黍與與我稷翼翼中原有菽菽藿藝麻如之何衡從其畆實莠國稼若苗之有莠若粟之有秕維穈維芑穈赤苗芑白苖降之穈芑離離山上苗苗而不秀孔崔沔曰祭祀上天苑囿躬稼所收莫不薦而後食盡誠敬也豐苗亦已穊雲水照方塘杜甫東渚詩耕之耰之文粹顧况上古慜農也莠盛苖裒耕之耰之襏襫鋤犂手胼足胝嘉榖奮興根葉肥潤韓愈賀雨表麥芒際天揺青波柳宗元罷亞百頃稻西風吹半黄杜牧稻詩我屯之稼如雲漠漠李翰屯田紀績頌閱稼于冷泉後唐明宗紀綿延稼盈疇韋應物紆直水分野綿延稼盈疇登原忻時稼秋郊詩以稼則碩以植則茂柳宗元認田苗八擅耕附白認禾後漢承宫字少子避地漢中與妻子家隂山種禾黍熟人認與之認稻吳鍾離收子幹種稻將熟縣人認其田遂以稻與之墾萊田晉郭翻長翔欲墾萊田先立表經年無主乃作將熟人認禾悉與之縣令聞將稻還翻翻不受擅耕魏任假昭光有擅耕田種以語假假云我借之孔三疏申理張仲方補金州刺史宦人奪民田三疏申理卒與民宜大族強家泄流為田李華練塘頌序見上田訟門注望沄沄兮視㝠㝠鳥閑魚樂葭菼生膏腴利倍起訟爭斯人怨抑痛無聲韋公正直動神明百年游淀為漻清同上頌髙陵令劉君請杜私竇使無棄流請遵田令使無越制以地還李惟簡改户部尚書金吾大將軍有長尚萬國俊者以軍勢奪興平人田地吏憚莫敢治及公為金吾興平人曰乆聞李將軍為人公平庶能直吾屈即賫縣牒來見公發視立杖國俊廢之以地還興平人訴牛羊使奪其田姚合累給事中奉先馮翊二縣民訴牛羊使奪其田詔美原主簿朱儔覆按偎以田歸使合劾發其私以地還民手詔賜田隠太子傳秦王以美田給淮安王神通而張媫妤為父丐之帝手詔賜田詔至神通已前得不肯與媫妤妄曰詔賜妾父田而王奪與人帝怒召秦王讓曰我令不如爾教耶饁餉九白饁彼南畆田畯至喜詩冀缺耨其妻饁之敬相待如賔具夫妻門書云葛伯仇餉有餉田葛伯殺而奪之餉者怨之故書云仇餉有嗿其饁嗿吐敢反衆貌伊黍來餉載筐及莒其饟伊黍其笠伊糾婦子來饁注筐莒盛黍稷豐年物雖賤猶食黍求漿酺之吕后田中酺老父孔耕餉戴叔倫守撫州刺史民嵗爭溉灌為作均水法俗便利之耕餉嵗廣隨日隨餉杜牧之上周相公墀書邊地無積粟師無見粮不先屯田隨日隨餉是不知地利也田婦有嘉獻發撒新嵗餘韋應物西峯詩田客十白租牛客晉王恂字良夫為河南尹魏時公卿已下租牛客戸有差自後小人憚役多樂為之貴勢之門動有百數又太原諸郡亦有匈奴胡人為田客多者數千武帝禁之恂明峻其防所部莫敢犯之䕃人為衣食客晉武帝制以品之髙卑得䕃人為衣食客六品已上三人七品八品二人九品一人其田客第一第二品無過五十戸第三品十戸第四品七戸五品五户六品三户七品三戸八品九品一戸庇身亢身在其宇下孔縱田客殺人五代蕭希甫初明宗欲以希甫為諫議大夫豆盧革韋說頗沮難之其後革說為安重誨所惡希甫希㫖誣奏革縱田客殺人革說終皆貶死家田佃户五代周行逢民過無小大皆死夫人嚴氏諫曰人情有善惡安得一槩殺之乎行逢怒曰此外事婦人何知嚴氏不恱紿曰家田佃戸以公貴頗不力農多恃勢以侵民請往視之至則營居以老嵗時衣青裙押佃戸送租入城行逢往就見之勞曰吾貴矣夫人何自苦耶嚴氏曰公思作戸長時乎民租後時常苦鞭朴今貴矣宜先期以率衆安得遂志壠畆間乎場十一白十月滌場霜降而收縮物埸功畢入九月築場圃豳詩今之七月場人掌國場圃以時斂而藏之周禮築場圃農乃登榖月令七月孔場圃李林甫傳二十四年帝在東都欲還長安裴耀卿等建言農人場圃未畢湏冬可還委圃賸疏雲矗以委圃歐陽詹就理韋蘇州丁壯俱在野場圃亦就理纍纍白公觀稼纍纍遶場稼地為鬭場孟方立克用擊邢洺滋無虚嵗地為鬬場人不能稼竹木稍摧翳園場亦荒蕪韋應物詩失望築場圃吾衰尤拙計失望築場圃杜甫詩築場看斂積一學楚人為東屯詩百榖十二白播厥百榖百榖用成所寳惟榖嘉榖榖惟國寳食乃民天穜稑之種仰膏雨左傳小國之仰大國如百榖之仰膏雨新榖既升九榖周禮太宰以九職任萬民一曰三農山澤平地九榖黍稷麻麥豆之屬五種月令季冬令告人出五種命農計耦耕五種五榖種孔熾茂劉仁軌諫曰今兹澍澤霑足百榖熾茂嘉生張九齡今百榖嘉生乃怠於事天恐不可以訓青囊盛種李泌請以二月朔為中和節民間以青囊盛百榖種相問遺號為獻生子豐成陸贄奏議今嵗關中之地百榖豐成京尹及諸縣令頻以此事言憂在京米粟太賤請廣和糴以救農人地不愛寳致百榖之豐穰柳文油油時雲雨厥百榖李華髙宗康頌榖十三白祈禮孟春天子乃以元日祈榖于上帝登孟秋農乃登穀天子嘗新先薦寢廟孔不登陳君賔遷邢州刺史徙鄧州明年四方霜潦獨君賔所治有年儲倉充羡蒲虞二州民就食其境太宗下詔勞之曰去年關内六州穀不登糇粮少令析民房遂食聞刺史與百姓識朕此懐務相安養還冇贏粮出布帛贈遺行者知此水旱常數更相拯贍禮讓興行海内之人皆為兄弟變澆薄之風朕顧何憂已踊貴盧坦江淮旱榖踊貴或請抑其價坦曰所部地狹穀來它州若直賤穀不至矣不如任之既而商以米坌至積榖翁韋寅善治生初除廣州宣宗垂誡貪寅奏曰江淮江陵庄積榖尚七千堆固無所貪宣宗曰此所謂積榖翁雜家榖賤傷農馮道明宗問曰天下雖豐百姓濟否道曰榖貴餓農榖賤傷農因誦文士聶夷中田家詩嘉穀奮興根葉肥潤抽莖展穗不失時宜人和年豐莫大之慶韓愈賀雨表始築常平倉韋宙永州刺史州負嶺轉餉艱險每饑人輒殍死宙始築常平倉收榖羡餘以待之有田種榖今流血杜甫憶昔詩所務榖為本邪羸無乃勞杜甫述古詩馬厭榖韓文馬厭穀兮士不厭糠籺榖者所以阜俗康時聚人守位者也下至十室之邑必有千鍾之藏苟凶穰以之貴賤失度雖封丞相而猶困侯大農而謂何杜甫䇿問榖者百姓之本百役皆出同上説旱有田五百畆樹之榖柳宗元送從弟謀序囷倉榖粟滿未有旦夕憂韓文嘉榖隱豐年草深苖且稀農夫既不藝孤穗將安歸李白詩粟十四白有秕若苖之有莠若粟之有秕周粟伯夷叔齊不食周粟紅粟漢紅粟流衍太倉之粟紅腐不可食陳陳相因秦輸粟于晉三日求仁者之粟以祀之雖有粟吾得而食諸孔嵗收粟十萬斛竇靜表請屯田太原帝從之嵗收粟十萬斛輒發蕭復改同州刺史嵗歉州有京畿觀察使儲粟復輙發以貸人有司劾治詔削階停刺史或吊之復曰苟利於人胡責之辭賤估以濟民蕭倣出太倉粟賤估以濟民至渭倉者百二十萬斛裴休進中書侍郎居三年粟至渭倉者百二十萬斛丐粟劉三復母病廢丐粟以養欲粟賤追李峴李峴出為零陵太守時京師米翔貴百姓乃相與謡曰欲粟賤追李峴似莠東夷流鬼粟似莠而小飛龍粟宣宗紀大中元年二月癸未停飛龍粟黄河西岸是吾蜀欲須供給家無粟杜甫瘦地飜宜粟杜甫秦州詩以沙參粒唐史突厥序為將者刻薄自入賦粟以沙參粒財粟殫亡韓文農不耕收財粟殫亡匹縑易粟數十斛郭元振為凉州都督舊凉州粟斛售數千至是嵗數登至匹縑易粟十斛獲陳粟賈相在滑州境内大旱秋稼盡損賈召大將二人謂曰今嵗荒旱煩若救三軍百姓也曰君可辱為健歩翌日當有兩騎衣縿緋所乘馬蕃歩鬛長經市出城君等蹤之識其所滅處則吾事諧矣二將乃裹糧衣皁行尋之一如賈言自市至野行二百里大塜而滅遂壘石標表誌焉經信而返賈大喜令數百人具畚鍤與二將偕往其所因發塜獲陳粟數十斛人竟不之測酉陽雜俎雖有數斗玉不如一盤粟李白鳥雀苦肥秋粟菽杜甫詩白玉換斗粟李白送劉長史濁醪與脫粟在眼無咨嗟杜甫詩日給朝班及暮齒日給還脫粟貞觀初率土饑儉一疋絹纔得帖斗粟而百姓怡然者知陛下憂憐之故人人自安曾無謗讟自五六年來頻歳豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸冇怨言馬周麥十五白芃芃其麥詩登孟夏農乃登麥天子乃以彘嘗麥種董仲舒以春秋云聖人重麥如此宜令關中種宿麥丘中有麥詩兩歧張湛為漁陽人歌曰麥秀兩歧取温之麥鄭國伐周云云甸人獻晉侯欲麥使甸人獻麥詩云貽我來麰大麥也不熟月令仲春行夏令則陽氣不勝麥乃不登勸人種麥無或失時八月孔獨恃於麥獨孤及上疏陳政曰民不敢訴於有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子齩骨矣教種韋丹為容州刺史教種茶麥吐蕃其稼有小麥青􅀈麥蕎麥白麥五代回鶻地宜白麥青􅀈麥進瑞麥五代梁宋州節度使友諒進瑞麥一莖三穗太祖怒曰宋州大水何用此為碧麥唐杜陽編元和八年大軫國貢碧麥形大於中華之麥粒表裏皆碧香氣如粳米食之體輕乆可以禦風金麥同昌公主出降賜金麥銀米共數斛此皆條枝國獻青波麥芒際天揺青波柳宗元詩自蒔以觀其成太子瑛元宗種麥苑中瑛諸王同侍帝曰是將事宗廟故親之亦欲若等知稼穡之艱因分賜侍臣曰春秋無麥禾古所甚重比詔使者閱田畆所對不以實故朕自蒔以觀其成山田麥無壠春氣晚更生杜詩青熒陵陂麥杜甫喜晴詩大麥乾枯小麥黄杜甫大麥行大麥乾枯小麥黄婦女行泣夫走藏東至集壁西梁畔問誰腰鎌胡與羗徼麥早向熟杜甫客堂詩野多青麥同上崆峒小麥熟且願休王師送髙適南陽郭門外桑下麥青青韓文麥篲李賀詩麥芒如篲黍如粟宿麥以秋種太隂子時雨雪而霜故大傷首種首種謂宿麥以秋種故謂之首種入收也春為􅀈寒所傷故至夏麥不成長也臣恐霜雪損稼夏麥不登無所收入也王方慶疏麥雨漲溪田李賀孤城麥秀邊杜詩細麥落輕花同上江畔細麥復纎纎同上再熟髙昌土沃麥皆再熟田舎子䞉穫十斛麥尚欲更故婦許敬宗麥爛于場韋替否疏擇膏腴地蓺麥韋陟稻十六白清流之稻文選九熟抱朴子曰南海有九熟之稻再熟交趾有一嵗再熟之稻薦禮冬薦稻稌夏􅀈滍臯香秔稻嘉蔬禮稻曰嘉蔬十月穫稻詩嘗稻季秋天子嘗稻先薦寢廟生人歌曰引漳水灌鄴旁終古斥鹵生稻粱食夫稻語藉稻左傳鄅人藉稻邾人襲鄅人注君藉蓋履稻而行也認苖鍾離收事見上注不遺種今吳稻蟹食不遺種子國語孔盧城北狄傳渤海俗所居者曰盧城之稻巨粒西域摩掲陀有異稻巨粒號供大人米嵗四熟天竺稻嵗四熟稻粒寫詩北夢𤨏言曰都㑹間有運大筆如椽或於稻粒上寫七言詩一絶歴歴可愛千畆碧泉亂東屯大江北百頃平若按六月青稻多千畆碧泉亂挿秧適云已引溜如溉灌杜甫望補稻畦水歸玉粒定晨炊紅鮮任霞散同上輸官雞輸稻粱杜甫壯遊佇聞粳稻香東渚雨今足佇聞粳稻香秋行東渚詩罷亞罷亞百頃畆西風吹半黄杜甫獨酌野稻水榖唐地理志滄州乾符本魯城乾符元年生野稻水榖二千餘頃燕魏飢民就食之稻收豐衍郭元振為凉州都督遣甘州刺史李漢通闢屯田盡水陸之利稻收豐衍龍睛稻唐謝元卿遇神仙設龍睛稻續仙傳稻米流脂粟米白公私倉廩俱豐出杜甫詩瑯琊之稻唐李百藥見㓜敏門麞牙稻白居易詩鹿米麞牙稻粳稻來東吳杜甫出塞詩香稻香稻啄餘鸚鵡粒秋興詩粳稻共比屋南池昌谷五月稻細青滿平水李賀詩殫江南之稻柳文稻月一熟南蠻墮婆登嘗稻雪飜匙柳司馬詩平田百頃間收稻詩香稻三秋末平田百頃間杜甫珠稻元稹祝神珠稻欲垂新荒畦九月稻义牙李賀田中黍十七白彼黍離離薦月令秋薦黍殺雞為黍芃芃黍苖詩方華黍稷不能藝黍稷我黍與與生鄒衍吹律於燕谷燕谷乃暖生黍五榖之長韓子曰黍者五穀之長祭先王以為上盛也飯黍無以筯孔釀酒王績種黍春秋釀酒東臯多種黍勸爾早耕田李白贈崔秋浦傷萎天風㧞大木禾黍咸傷萎李白寓言映道耕田秋雨足禾黍已映道杜甫遣興自種自斂植乃禾黍自種自斂柳宗元牛賦頼知禾黍收已覺糟床注杜甫荒村詩苦辭酒味薄黍地無人耕同上多麥與黍韓文元和聖徳詩力難及黍稷得種菜與麻杜甫詩禾黍積東菑韋應物授衣綿延稼盈疇韋應物禾十八白唐叔得禾異畆同穎書𤣥山之禾吕氏春秋曰飯之美者𤣥山之禾也禾役穟穟納十月納禾稼禾乃登七月取成周之禾鄭伐周云云犯季子臯葬其妻犯人之禾盡偃盡起天大雷電以風禾盡偃王出郊天乃雨反風禾則盡起尚書大無麥禾春秋書曰孔沒槖它天竺國禾之長者沒槖它玉山禾韓愈駑驥詩飢食玉山禾祥禾甘津澤祥禾秋雨聨句回霜收電文粹李徳裕上尊號册回霜收電為之反未禾生隴畆無東西杜甫兵車行縱有健婦把鋤犁禾生隴畆無東西種禾溝甽元稹田野狐兎行狐猾兎翦同上禾黍日夜長足得盈我囷元稹旱災禾頭生耳朝野僉載諺云秋雨甲子禾頭生耳幽州華州進嘉禾圖各一軸柳宗元賀嘉禾表六穗慙稱於漢臣異畆恥書於周典同上嘉禾一穰江淮為之康嘉禾一歉江淮為之儉嘉禾在全吳之壤最腴李翰屯田頌云一莖五穗聞河南縣獻嘉禾一莖五穗重規視之曰偽也笞其人而遣五代豆十九白人食半菽不辨周子有兄不辨菽麥隕霜殺菽粥後漢光武曰昨公孫豆粥飢寒俱觧種楊惲歌曰種一頃豆落而為箕中原有菽庶民采之詩維秬維秠維穈維芑秬黒黍秠一稃二米穈赤苖芑白苗詩十月納禾稼黍稷穜稑禾麻菽麥稻人掌澤草之所生種之莣種莣種稻麥地官周禮廩人掌九榖以待匪頒賙賜稍食官地黍稷垂成不能為榮黍而不黍不能蕃庶稷而不稷不能蕃殖國語丘中有麻孔䝁豆夏侯端東走擷䝁豆以食黒豆屑五行志黄巢未入京師時都人以黄米及墨豆屑蒸食之謂之黄賊打黒賊兩器盧懐慎日晏設食蒸豆兩器靈光豆唐杜陽編大厯中日林國獻靈光豆大小類中國之菉豆其色紅而光芒長數尺本國人亦呼為詰多珠和石上菖蒲葉煑之即大如鵝卵其中純紫秤之可重一斤已上啖之一丸香美無比而數日不復言飢渇靈沙臛雲仙散録品物類聚曰白馬豆食之齒醉虢國夫人厨吏鄧連以洗豆皮作靈沙臛供翠鴛堂豆以二七為族唐酉陽雜爼狐猾兎翦禾苖豆甲狐猾兎翦元稹挾劒豆酉陽雜俎浪東有融澤之中生豆莢形似人挾劒横斜而生豆苗鹿嚼解烏毒白居易禽蟲章注嘗獵者相擕行豆田秋花藹菲菲杜甫甘林天雨豆五代司天考天雨豆之類皆非中國耳目所及豆入牛口竇建徳竄牛口谷初其軍有謡曰豆入牛口勢不得乆至是果敗已喜黍豆髙杜甫大雨豆子雨已熟杜詩蟲食豌豆陸相奏議京兆府先奏蟲食豌豆全然不收其用甚微且豌豆為物其用甚㣲舊例所支唯充畜料凖數回給大豆諸司誰曰不然計價利剩徴義將安在同上種豆耘鋤元稹田野狐兎行捃拾二十白范丹後漢朝議以范丹為侍御史乃遁梁沛徒行敝服賣卜於市遭黨人禁錮遂推鹿車捃拾自資捃表晉庾衮字叔襃麥熟穫者已畢而尚多衮引羣子退曰待間乃捃不曲行不旁掇跪而把之則亦有六種故畦列子類林百嵗於春陂拾遺故畦並歌並進斂材周禮一曰斂材聚斂疏材彼有不穫稺此有不斂穧彼有遺秉此有滯穗伊寡婦之利詩俯有拾仰有取漢書俯拾地芥拾橡庾衮叔褒又與邑人之山拾橡分夷險序長㓜推易居難禮無違者孔收橡實崔從嵗飢收橡實以飯及衆多杜甫望補稻畦詩遺穗及衆多我倉戒滋漫貧者不免於捃拾柳宗元論政理書今富者稅益少貧者不免於捃拾以輸縣官大田斯穫不有遺秉則滯穗也文粹歐陽詹上鄭相書云萬秉希一萬穗希一某豈遂當其一乎清霜九月天髣髴見滯穗杜甫雨詩捃拾榛藂間唐舊史劉賛為歙州刺史有老婦人捃拾榛藂間猛獸將噬之㓜女號呼摶獸而救之母子俱免故畦遺穗已蕩盡杜甫白鳬行儲蓄二十一白周禮地官委人掌斂野之賦斂薪芻凢疎林木疏林草木有實凡蓄聚物聚物諸瓜瓠葵芋為禦冬之具也以稍聚待賔客以甸聚待羇旅凡余物以待頒賜余當為予詩篤公劉迺積廼倉廼裹糇糧于橐于囊王制國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通制國用雖有凶旱水溢人無菜色然後天子食日舉以樂月令十月謹蓋藏循行積聚無有不斂九月趨人收斂務蓄菜㫖蓄詩曰我有㫖蓄亦以禦冬聚斂之臣敝邑不敢保聚晉飢晉侯紓積聚以貸無藴年藴積斂不分災也子産曰陳其亡乎聚禾粟而不撫其民倉廪實知禮節公私之積賈誼曰漢幾三十嵗公私之積猶可哀痛無不務納月令委積地官委人掌軍旅供其委積薪蒭孔馬周言自古以來國之興亡不由積畜多少在百姓苦樂也且以近事驗之隋貯洛口倉而李宻因之積布帛東都而王世充據之西京府庫亦為國家之用向使洛口東都無粟帛王世充李宻未必能聚大衆但貯積者固有國之常要當人有餘力而後收之豈人勞而強斂之以資冦邪無一嵗之儲韋嗣立建言今廪帑耗竭無一嵗之儲假遇水旱人須賑給不時軍興士待資裝陛下何以具之視年豐耗發斂韓洄積米長安萬年二縣各數十萬石視年豐耗而發斂焉故人不艱食儲廥贏衍王思禮在大原儲廥贏衍蓄積有素崔衍居十年嗇用度府庫充衍及穆賛代之以錢四十萬緍假民賦故雖旱人不流捐由衍蓄積有素也家得儲三十斛王起歴河中節度使方蝗旱粟價騰踊起下令家得儲三十斛斥其餘以市否者死神䇿士怙𫝑不從寘于法由是廥積咸出民頼以生備凶年戸部尚書韓仲良奏王公以下墾田畆納二勝其粟麥粳稻之属各依土地貯之州縣以備凶年制從之自是天下州縣始置義倉每有飢饉則開倉賑給通典髙宗武后數十年間義倉不許雜用其後公私窘迫貸義倉支用自中宗神龍之後天下義倉費用殆盡開元中定式王公以下每年戸别據所種田畆别税粟二升以為義倉其商賈戸若無田及不足者上上户稅五石上中以下逓减各有差同上天寳中凡天下諸色米計九千六百六萬二千二百二十石和糴一百一十三萬九千五百三十石同上常有三年食裴耀卿曰臣願廣陜運道使京師常有三年食雖有水旱不足憂儲給豐衍崔光逺祖敬嗣中宗在房州敬嗣為刺史儲給豐衍帝徳之儲倉充羡陳君賔初徙鄧州明年四方霜潦獨君賔所治有年儲倉充羡積如京坻巨廪崇創翬飛雲矗宿以板幹積如京坻得蓋蔵之宜恊出入之制多黍多稌而禮節行矣文粹政公遺愛碑權徳輿倉廪無宿儲徭役猶未已韋應物田家足食之慶充溢於京坻柳宗元粢盛無虞儲峙用充同上廪取不節敖庾之藏有時而賜唐史李宻家無接新之儲唐史宋務光上言數年以來公私乏竭戸口咸耗家無接新之儲堯遭大水湯遭大旱唐文粹韋嗣立疏臣聞國無九年之儲家無三年之蓄家非其家也國非其國也故立國立家皆資於儲蓄矣夫水旱之災關之隂陽運數非人智力所能及也堯遭大水易遭大旱則知仁聖之君亦所不免當此時百姓不至於困弊者有積也義倉據地取稅髙宗永徽年頒新格義倉據地取稅實是勞煩冝令户出粟上戸五百餘各有差唐杜佑通典請立義倉貞觀初戴胄上言國無九年儲蓄禮經之所明誡今請計所墾田盡令出粟稻麥之郷各納所在為立義倉年榖不登州縣隨便取給同上太倉令掌九榖廪藏之事凡鑿窖置屋皆銘甎為便斛之數其年用受領粟官吏姓名又立碑如其銘焉六典凡粟支九年米及雜種三年六典貯經三年斛聽耗一升五年以上二升同上給公糧者皆承尚書省符同上諸倉監各掌其倉窖修儲積之事凡粟出給者每一屋一窖盡䞉者附計欠者隨事科徴非理欠損者坐所由令徴賠之同上祈榖二十二白詩曰琴瑟擊鼓以御田祖以祈甘雨去其螟螣及其蟊賊田祖有神秉畀炎火噫嘻春夏祈榖于上帝周禮籥章凡國祈年于田祖龡豳雅擊土鼓以樂畯春官豳雅詩豳風七月也豳人以吹籥之聲土鼓以瓦為筐以革為面田祖神農畯田夫月令四月命樂正習吹大雩帝命有司禱祀山川古之卿士有益於人者以祈榖實天子乃以元日祈榖于上帝季冬天子乃蜡百神於南郊為來年祈福於天宗臘日祭也百神自神農至昆蟲也天宗日月星辰之属是也豚蹄㿻酒淳于髠曰臣從東方來見道旁有禳田者操一豚蹄一盂酒祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣笑其所持者寡所願者大甌窶器也篝籠也汙耶下田也乙日祠神農晉禮志云漢儀常以乙日祀先農及耕乙地也乙田見上祭天田漢立靈星祠常嵗時祠以牛龍左角曰天田即農祥也農見而祭之見漢書農祥之祭見上祈年祈榖也孔願為三農祈榖張說帝幸并州說見帝曰太原王業所基陛下廵幸振耀威武以申永思繇河東入京師有漢武睢上祠此禮廢闕歴代莫舉願為三農祈穀誠四海之福帝納其言王者之興必感其一禮樂志按貞觀禮祈榖祀感生帝而顯慶禮祀昊天上帝傳曰郊而後耕詩曰噫嘻春夏祈榖于上帝禮記亦曰上辛祈榖于上帝而鄭𤣥乃云天之五帝迭王王者之興必感其一因别祭尊之故夏正之月祭其所生之帝於南郊以其祖配之故周祭靈威仰以后稷配因以祈榖然則祈榖非祭之本意乃因后稷為配爾此非祈榖之本義也夫祈榖本以祭天也然五帝者五行之精所以生九榖也宜於祈榖祭昊天而兼祭五帝豐稔二十三白必有豐年農夫之慶曾孫之稼如茨如梁曾孫之積如坻如京乃求千斯倉萬斯箱閔閔焉如農夫之望嵗三時不害時和年豐秋成無害嵗計有餘秋收三百之囷嵗計十千之稅膏澤多豐年順成之嵗年榖多熟克殷昔周飢克殷而年豐祈年於田祖祈年祈豐年田祖神農也周禮力田不如逢時躬稼徒欲望嵗豐凶上下豐稔之年陳陳相因補敗以豐補敗餘粮栖畆而不收滯穗斯積餘粮不收大田多稼多黍多稌詩曰豐年有年榖梁五榖皆熟為有年僅有年公羊有年以喜書也僅有年亦足以當喜大有年豐稔也井中氷後漢光和六年冬東海萊琅邪井中氷厚尺餘大有年衆維魚矣兆維豐年夢魚豐年之兆年榖和熟豐穰穰人掌反問年榖晏子春秋景公將伐魯特訊東門無澤問魯年穀對曰隂氷厥陽五寸寒温節寒温節則政平政平則上下和平上下和平則榖熟遂不伐魯孔頻嵗豐稔馬周疏曰五六年來頻嵗豐稔一疋絹易粟十餘斛水旱為災不謂年登宋務光曰今水旱為災不謂年登有富無窶天錫皇帝多麥與黍無召水旱耗于雀鼠億載萬年有富無窶韓愈元和聖徳詩魚鹽滿市井布帛如雲煙李白贈宣城守野多滯穗畆有餘糧足食之慶充溢於京坻阜財之謡歡呼於道路柳宗元請復尊號地不愛寳致百穀之豐穰柳文大穰之徴文粹李翰蘇州屯田紀績頌白雀集于髙豐屯廩盖大穰之徴也如雲漠漠同上我屯之稼如雲漠漠夫伍棊布溝封綺錯閭里一歡顔羣應物郊居言志詩唯當嵗豐熟閭里一歡顔豐本増歧芃芃緜緜無磽塉與良沃獲一十於百千䞉蔬雲矗以委餘粮嶽峙而栖畆歐陽詹徳勝頌榖帛賤民無疾疫五代唐明宗紀問宰相言榖帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報天豐稔之報均于四方柳宗元為父老上狀西成有穰嵗之報同上五榖穰熟既庶而豐韓文西水門記農功以成年榖大熟柳宗元表豐年則多而筐筥甚實杜甫享太廟賦蟲蝗二十四白去其螟􅀈及其蟊賊無害我田穉田祖有神秉畀炎火蟲螟為害蟲蝗為災百螣時起天災流行昆蟲之災介蟲敗榖昆蟲無作飛螟赴海馬援為武陵守飛螟赴海避境魯恭為中牟令飛蝗避境設壇責己公沙穆為𢎞農令時多蝗蟲乃設壇責己蝗蟲遂去境人以為神明之君捕蝗漢平時蝗詔使者捕蝗人能捕蝗者詣吏以石斗受錢蝗隨督郵後漢戴封為西華令汝穎有蝗災不入西華界督郵行縣忽大至督郵其日去蝗亦隨去又宋均為九江守山陽楚沛多蝗蟲至九江輒四散稻蟹不遺種國語雨螽于宋穀梁雨螽于宋芽茨晝夜著上見下曰雨傳曰有蜚蜚負蠜蟲也蟲損免稅令具旱門孔蝗獨不至境史王方翼再遷肅州刺史儀鳯間河西蝗獨不至于境害氣作則蟲螟生狄仁傑時發兵戍疏勒四鎭百姓怨苦仁傑諫曰政不行則害氣作害氣作則蟲螟生水旱起矣遣使分道捕瘞韓思復開元初為諫議大夫山東大蝗宰相姚崇遣使分道捕瘞思復上言夾河州縣飛蝗所至苖輒盡今游食至洛使者往來不敢顯言且天災流行庸可盡瘞望陛下悔過責躬損不急之務任至公之人持此誠實以荅譴咎其駈蝗使一切宜罷𤣥宗然之蝗不入境李紳遷宣武節度使大旱蝗不入境河北蝗張孝忠為易守滄等州觀察使貞元二年河圵蝗民餓死如積孝忠與其下同粗淡日膳裁豆䜺而已祭蝗于臯門五代晉出帝天福八年六月庚戌祭蝗于臯門帥奉軍國捕蝗癸亥供奉官七人帥奉軍國捕蝗于京畿募民捕蝗八月丁未朔募民捕蝗易以粟並同上有蝗蔽天而飛晝為之黒凢庭户衣帳悉充塞之王親祝於都㑹堂即夕大風蝗墮浙江而死吳越備史蜚蝗竟天陸贄集序蜚蝗竟天農稷不能善稼昇之季年蟲蝗為害經時不息及嗣主立皆附草而死江南録張福率威順軍捕蝗於陳州安審信捕蝗于中都大赦以旱蝗大赦並天福八年乾祐元年滑州魚池旱蝗秋七月鸜鵒食蝗五代分道殺蝗姚崇開元四年山東大蝗民祭且拜坐視食苗不敢捕崇奏詩云秉彼蟊賊付畀炎大漢光武詔曰勉順時政勸督農桑去彼螟蜮以及蟊賊此除蝗誼也且蝗畏人易駈又田皆有主使自救其地必不憚勤請夜設火坎其旁且焚且瘞蝗乃可盡古有討除不勝者特人不用命焉乃出御史為捕蝗使分道殺蝗吞蝗五行志貞觀二年六月京畿旱蝗太宗在苑中掇蝗祝之曰人以榖為命百姓有過在予一人但當飿我無害百姓將吞之侍臣懼帝致疾遽以為諫帝曰所冀移災朕躬何疾之避遂吞之蝗集祠旁董昌始立生祠蝗集祠旁使人捕沈鏡湖告曰不為災飛烏食蝗五代馮行襲所至輙天旱境旱有蝗則飛烏食之殺多必戾和氣盧懐慎曰凡天災安可人力制也且殺蟲多必戻和氣願公思之崇曰昔楚王吞蛭而厥疾瘳叔敖斷蛇福乃降今蝗幸可駈若縱之榖且盡如百姓何殺蟲救人禍歸於崇不以諉公也蝗害訖息吏捕蝗者不勝而仰食於民王凝曰吏捕蝗者不勝而仰食於民則率暴以濟災也腹有梵字酉陽雜俎蝗蟲腹下有梵字魚子變今蝗蟲首有王字固自不可曉或言魚子變近之矣蟲食榖者部吏所致侵漁百姓則蟲食榖蟲身黒頭赤武吏也身赤頭黒文吏也同上稼穡茂而螟蝗不生桞文白孔六帖巻八十一
