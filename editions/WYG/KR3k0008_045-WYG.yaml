body:
  text: 白孔六帖卷四十五唐白居易原本宋孔傳續撰刑灋一灋令二寛刑三推斷獄四拷訊五欵辯六察獄七獄囚八放囚九恤囚十濟活囚徒十一錄囚十二無囚十三刑灋一白防姦閑邪國章斯抵人命所懸禁暴竹刑三尺有常無赦速即爾刑干國之紀刑以秋冬刑威踰閑閑法也能刑君子謂晉文公其能刑矣三罪而人大服以類震耀爲刑罰威獄使人畏忌以類其震耀殺戮取象雷電威也刑法志申嚴百刑凡制五刑必即天論制斷也必即天論言與天意合一成而不可變變改也防淫記君子刑以防淫大爲之防人猶踰之而煩刑書傳明啟刑書丹筆正刑之筆明慎易曰君子以明愼用刑而不留獄明罰勑法玉律刑一人史堯刑一人而天下大服四罪舜四罪而天下咸服協大中之灋列用中罰列明也中罰法之輕重得中也書嚴斷刑罰以威其淫勿宥勿辟書殷人在辟予曰辟汝惟勿辟予曰宥爾惟勿宥惟厥中祥刑祥善也書閲實罪罰相當下刑適重上服服罪也一人有二罪則從重也官刑制官刑儆于有位其附于刑附麗也周禮麗刑麗罹也中典周禮國章刑麗灋周禮官禁國禁踰矩矩法也惟刑之恤刑期無刑義刑屏棄典刑教中周禮司徒刑以教中則人不虣在九刑不忘傳季孫行父逐苢僕三罪而人服晉文公能刑將刑爲之不舉不舉則徹樂刑之頗纇獄之放紛人在鼎矣趙鞅鑄刑鼎著范宣子所爲刑書焉仲尼曰人在鼎矣何以尊法謂棄禮徵書也御宄以刑御姦以德僕區之灋楚文王作無自立辟詩人之多僻無自立辟法也觸灋抵禁書律令一定作灋於凉其敝猶貪凉薄也刑灋所以助治劉向上疏教化所恃以爲治也刑灋所以助治也正經三百孔父創其威儀大法三千蕭何設其條貫非日非月照四海而齊明如電如霜肅八方而交泰輕犯憲章不遵禮教孔嚴威柳宗元簡于厥刑不殘而威是謂嚴威刑輕以清我完靡傷貽我子孫百代是康同上刑賞國大事太平公主私長安浮屠慧範御史魏傳弓劾其姦贓四十萬請論死中宗欲赦進曰刑賞國大事陛下賞已妄加矣又欲廢刑天下其謂何禁亂陳子昻八科一措刑謂以禁亂亂靜而刑息不爲承平設也魏徵曰刑賞之本在乎勸善而懲惡帝王所與天下畫一不以親疎貴賤而輕重者也今之刑賞或由喜怒或出好惡喜則矜刑於法中怒則求罪於律外好則鑽皮出羽惡則洗垢索瘢蓋刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且暇豫而言皆敦尚黃老至於威怒則專法申韓故道德之㫖未𢎞而鍥薄之風先揺昔州􅕌上下其手而楚法以敝張湯輕重其心而漢刑以謬沉人主而自高下乎䙝刑陸贄字敬輿奏輕爵䙝刑衰亂之漸也刑罰清則人安劉蕡字去華䇿曰争競息則刑罰清刑罰清則人安朱敬則諫初武后稱制天下頗流言遂開告密羅織之路興大獄誅將相大臣至是已革命事益密敬則諫自文明以來天地草昧内則流言外則搆難故不設鈎距無以順人不切刑罰無以息暴於是置神器開告端故能不出房闥而天下晏然易主矣罰者刑之本魏元忠上封事罰者刑之本刑正故君子朂其心罰重則小人懲其過賞罰者軍國之紀綱政教之藥石刑罰不濫則人壽盧藏用字子濳云古爲政者刑罰不濫則人壽以鋤彊梗韓愈原道篇爲之刑以鋤其彊梗刑名之家文粹朱敬則諫除濫刑疏李斯之相秦也行申商之法重刑名之家摧姦息暴文粹朱敬則諫濫刑疏不切刑名不可摧姦息暴爲不善者不越月踰時而得其罰栁宗元斷刑論必使爲不善者不越月踰時而得其罰則人懼而有懲焉懲之以黜逺鞭扑梏拲斬殺之慘同上守道論繁其刑則是多其網羅欲人之不入也省其刑是卑其牆垣欲人之不踰也故曰繁與省不足道焉裴垍制䇿州犂上下其手楚國之法遂差張湯輕重其心漢朝之刑以敝人臣之頗僻猶不能申其欺罔况人君之高下將何以措其手足乎魏徵罰務速而後有懲柳宗元斷刑論高祖太宗除隋虐亂治以寛平民樂其安重於犯法致治之美幾乎三代之盛時考其推心測物其可謂仁矣自高宗武后以來毒流邦家祚絶而復續𤣥宗初勵精爲政二十年間刑獄減省歲斷死罪纔五十八人以此見致治雖難勉之則易未有爲而不至者唐刑法志周有亂政而作九刑傅奕上言夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑衛鞅爲秦制法増鑿顛抽脅鑊烹等六篇始皇爲挾書律此失於煩不可不監也灋令二白制事典爲之律度趙宣子爲國政徙木史商鞅令既具未布乃立三尺木於市南門募人有徙置北門者與十金人怪莫敢徙復令曰能徙與五十金有一人徙之輙與五十金以明不欺其法憲令史楚懐王使屈平造憲令藁草未定上官大夫欲見奪之不與乃讒曰平爲令衆莫不知王怒疎平攟摭漢蕭何攟摭法令宜於令者作律乃著令不循三尺客謂杜周曰君爲天下决平不循三尺法注三尺以竹簡寫法律也專以人主意指爲獄獄固如是乎周曰三尺安出哉前王所定著爲律後王所定疏爲令令甲宣紀曰令甲死者不可復生刑者不可復息注息生長也甲令第一乙令第二吳芮著乎甲令而稱忠甲者令之篇次深文張湯與趙禹共定律令務深文拘定職之吏注拘刻也定令趙禹張湯威福後漢崔實曰威福人主之神器定典灋順帝使僕射宋登定典法歩過六尺棄灰於道被刑新序商君法也不宜兩端魏盧毓上論古今科律法宜一正不宜兩端使姦吏得容情科律劉邵定科律作新令十八篇蜀科蜀志伊籍與諸葛劉巴李嚴共定蜀科先甲三日先庚三日愼乃出令令出惟行不惟反挈令挈音契獄訟之要漢書執禁以齊衆禁網疎濶禁止姧邪漢書經邦之道撫事攸先庇俗訓人防姧詰暴九章宜緩俗有歸心三典或虧一無措手灋正則人慤罪當則人從發號施令罔有不臧布德和令后以施令誥四方易溢甫刑者除之陳寵昭分拘校律令律法溢於甫刑者奏除之未及施行也孔撰定律令劉祥道字同壽與蕭瑀等撰定律令著律議萬餘言用灋深杜羔拜司農卿入謝帝曰卿用法深信乎答曰轂下百司養名不肯事如司農尤叢劇陛下無遽信流言假臣數月事可濟撓骩朝灋鄭注爲翰林學士時李訓已在禁中日日議論帝前撓骩朝灋尹思正擢大理卿韋丹將告武三思大逆中宗命斬之思正以方發生丹固奏不可乃決流嶺南三思諷所司加法殺之復固爭御史大夫李承嘉助三思而以他事劾思正不得謁思正謂承嘉曰公爲天子執法乃擅威福慢憲度諛附姦臣圖不軌今將除忠良以自恣邪承嘉慚怒劾思正爲青州刺史灋令者人之隄防王志愔爲大理正嘗奏言灋令者人之隄防不立則無所制今大理多不奉法以縱罪爲仁持文爲苛臣執典恐且得謗遂上所著應正論以見志又言刑賞二柄惟人主操之故曰以力役法者百姓也以死守法者有司也以道變法者君上也律明則人信灋一則主尊趙冬曦神龍初上書曰古律目千條隋時姦臣侮法者著律曰律無正條者出罪舉重以明輕入罪舉輕以明重一辭而發條目數百夫法易知則不敢犯而遠機穽文義深則吏乗便而朋附盛律令格式謂宜刋定科條直書其事其以准加减比附量情及舉輕以明重不應爲之類皆勿用使愚夫愚婦相率而遠犯罪者雖貴必坐律明則人信灋一則主尊當時稱是灋爲天下縣衡劉藏器高宗時爲御史衛尉卿尉遲寳琳脅人爲妾藏器劾還之寳琳私請帝止其還凡再劾再止藏器曰灋爲天下縣衡萬民所共陛下用捨繇情法何所施今寳琳私請陛下從之臣公劾陛下亦從之今日從明日改下何所遵彼匹夫匹婦猶憚失信况天子乎帝乃詔可天下所共李素立擢監察御史民犯法不及死高祖欲殺之素立諫曰三尺法天下所共有一動揺則人無以措手足大業經始奈何輦轂下先棄刑書乎帝嘉納不自爲輕重韓洪爲人莊重寡言罪殺人問法何如不自爲輕重議法處令寛平房𤣥齡議法處令務寛平灋爲天下公戴胄長孫無忌被召不解佩刀入東上閣右僕射封德彛論監門校尉不覺罪當令無忌贖胄曰校尉與無忌罪均臣子於尊極不稱誤法著御湯劑飲食舟船雖誤皆死陛下錄無忌功原之可也若罰無忌殺校尉不可謂刑帝曰灋爲天下公朕安得阿親戚詔復議繇是與校尉偕免灋者布大信於人時有詭資䕃冐牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下不以信卿賣獄耶卿自守法而使我失信奈何胄曰灋者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而寘于法此忍小忿存大信也若阿忿違信臣爲陛下惜之帝大感悟設灋與人共孫伏伽東都平欲責賊支黨悉流徙惡地伏伽諫曰今四方已定設法須與人共之法者陛下自作須自守之使天下百姓信而畏之自爲無信欲人之信若爲得哉與定律令韓瑗父仲良武徳初與定律令建言周律其屬三千秦漢後約爲五百依古則繁請崇寛以示惟新於是採開皇律宜於時者定之重貨輕灋蕭鈞左武侯屬盧文操蹂堞盗庫財高宗以其職主幹當自盗罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕灋任喜怒殺人帝曰眞諫議也詔原死通訊遺詔太常工爲宫人通訊遺詔殺之且附律鈞言禁當有漸雖附律工不應死帝曰如姬竊符朕以爲戒今不濫工死然喜得忠言即宥工徙遠裔私役門卒李乾祐貞觀中爲殿中御史鄃令裴仁軌私役門卒太宗欲斬之乾祐曰法令與天下共之非陛下獨有也仁軌以輕罪致極刑非畫一之制刑罰不中則民無所措手足帝意解繇是免死惜有罪虧成法狄仁傑遷大理丞左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜乏賢如本立者不少陛下惜有罪虧成法奈何臣願先斥爲羣臣戒本立抵死繇是朝廷肅然王者設法不可急亦不可慢郝處俊同東西臺三品咸亨初幸東都皇太子監國諸宰相獨留而處俊獨從帝嘗曰我嘗疑秦法爲寛荆軻匹夫耳匕首竊發羣臣皆荷㦸侍莫敢拒豈非習慢使然處俊對曰此乃法意耳秦法輒升殿者夷三族人皆懼族安有敢拒耶魏曹操著令曰京城有變九卿各守其府後嚴才亂與徒數十人攻左掖門操登銅雀臺望之無敢救者時王脩爲奉常聞變召車騎未至領官屬歩至宫門操曰彼來者必王脩乎此由脩察識幾故冐法赴難向若拘常則遂成禍矣故王者設法不可急亦不可慢設法不如息事韓琬上言比法令數改或行未見益止未知損譬弈者一棊爲善而復之者愈善故曰設法不如息事息事則巧不生聖人防亂未然天下何繇不治哉用灋宗室國貞善用灋撓人陸贄説使者以五要簡官事曰蠲法之撓人深文穆贊擢御史中丞裴延齡判度支屬吏受賕具獄欲曲貸吏贊執不可延齡白贊深文貶饒州别駕覆訊殷侑濮州掾崔元武受吏賕又率屬邑奉錢増私馬估售官疊三罪計絹百二十匹大理以入私馬一重削三官刑部覆詳當流未決侑奏三犯不同坐所重律頻贓者累論元武犯皆枉法當死詔用覆訊流元武賀州囚父自首請罪王彦威興平民上官興殺人亡命吏囚其父興聞自首請罪京兆尹杜悰御史中丞宇文鼎以自歸死免父之囚可勸風俗議減彦威上言殺人者死百王共守原而不殺是教殺人者有詔貸死彦威詣宰相據法爭論下遷河南少尹不輸官賦韋澳字子斐改京兆尹帝舅鄭光主墅吏豪肆積年不輸官賦澳逮繫之他日延英帝問其故澳具道姦狀且言必寘以法帝曰可貸否答曰陛下自内署擢臣尹京兆安可使畫一法獨行於臣下乎帝入白太后曰是不可犯后爲輸租乃免問法張嘉貞字嘉貞祕書監姜皎得罪嘉貞希權幸意請加詔杖已而皎死會廣州都督裴伸先抵罪帝問法如何嘉貞復援皎比張説曰不然刑不上大夫以近君子士可殺不可辱向皎得罪官三品且有功若罪宜死即殺獨不宜庭辱以卒伍待也况勲貴在八議乎事往不可咎伸先豈容復濫哉帝然之灋有首王縉字夏卿及敗劉晏等鞠其罪同載論死晏曰重刑再覆有國常典况大臣乎灋有首從不容俱死於是以聞上憫其耄不加刑乃貶括州刺史灋者天地大典賈至字㓜鄰至德中將軍王去榮殺富平令杜徽肅宗新得陜且惜去榮材詔貸死以流人使自効至諫曰律令者太宗之律令陛下不可以一士小材廢祖宗大法帝詔羣臣議見素崔器等皆以為法者天地大典王者不敢專也帝王不擅殺而小人得擅殺是權過人主開元以前無敢專殺尊朝廷也今有之是弱國家也太宗定天下陛下復鴻業則去榮非至德罪人乃貞觀罪人也其罪祖宗所不赦陛下可易之邪詔可灋令有常則邦寧盧藏用字子潛云灋令有常則邦寧所守公灋徐有功與皇甫文備同按獄誣有功縱逆黨乆之文備坐事下獄有功岀之或曰彼嘗䧟君於死今生之何也對曰爾所言者私忿我所守者公灋不可以私害公天子操灋有不變之義王志愔言隋之帝子秦王俊爲并州總管以奢縱免官楊素曰王陛下愛子請赦之帝曰法不可違若如公意我乃吾兒之父非兆人之父矣何不別制天子律乎故天子操灋有不變之義凡數十言意甚嘉誤傷乗輿器服柳渾字夷曠判門下省玉工爲帝作帶誤毁一銙工不敢聞私市他玉足之及獻帝識不類擿之工人伏罪帝怒其欺召京兆府論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法誤傷乗輿器服罪當杖請論如律由是工不死持灋竇參字時中進大理司直婺州刺史鄧班盜贓八千緡宰相右班欲免輸其財詔百官集尚書省議多希意爲助參獨持灋卒輸入之李德裕奏德裕言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威下繫於人也禁齊人文粹蕭頴士爲陳正卿進續尚書法令不足以禁齊人存而不論文粹李華中丞壁記三辟存而不論廷尉上請帝垂泣王志愔言漢成帝甥昭平君殺人以公主子廷尉上請帝垂泣曰法令者先帝之所造也因親故誣先帝法吾何靣目入高廟乎卒可其奏刑罰二柄惟主操之王志愔刑罰二柄惟主操之故曰以力役法者百姓也以死守法者有司也以道變法者君王也上律令塵蠧於棧閣白居易論刑法律令塵蠧於棧閣制勑堆盈於案几官不徧覩法無定科律令格式唐刑法志令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也中外之灋殊以其官禁不一也中外之灋殊以其官禁不一也臣謹按春秋齊桓公盟諸侯不以日而葵邱之盟特以日者美其能宣明天子之禁率王官之法故春秋備而書之夫官者五帝三王之所建也法者高祖太宗之所制也法宜畫一官宜正名劉蕡帝王立灋束縛姦雄正爲才多者舊唐史牛僧孺爲御史中丞宿州刺史李直臣坐贓當死直臣賂中貴人爲之申理僧孺堅執不回穆宗靣諭之曰直臣事雖愆失然此人有經度才可委之邊任朕欲貸其法僧孺曰凡人不才止持祿取容爾云云祿山朱泚以才過人濁亂天下况直臣小才又何屈法哉上嘉其守法參訂重輕劉瑑字子全裒彚勑令可用者由武德大中凡二千八百六十五事類而析之參訂重輕號大中刑律統類以聞法家推其詳三尺律令四海紀綱所宜公共杜牧寛刑三取宥過事用恤刑附白訓夏周書穆王訓夏贖刑附從輕附施刑也求岀之使從輕赦從重雖罪重猶赦之周訓夏刑人克用乂訓暢夏禹之刑更從輕也漢除秦灋政是以和去秦之重刑夏人不敝本乎後罰記夏道先賞後罰其人不敝殷人先罰後賞其人敝秦氏自敗由其峻刑約三章之法漢室以興作五虐之刑苖人自絶得失斯在取捨可知虞夏之道寡怨於人少文法故雖政寛而人慢未盡善也比刑肅而俗敝不猶愈乎爲國制刑雖宜簡易示人知禁信亦難寛寛能御衆猛則殘人宜建大中之法以爲小康之惠作爲金贖垂裕虞書誤入刑以金贖罪除去肉刑稱仁漢牘文選寛而有制書施之以寛雖優優之政布以從寛而恢恢之網疎而不漏代虐以寛兆民允懐商湯以爲御勞止之人寛以濟猛念恤哉之典愛克厥威其政不嚴而治其教不肅而成無子令妻入獄吳祐爲膠東相有毌邱長者殺人臨刑祐問有子否長曰有妻無子乃緩其桎梏令妻入獄妻有孕然後行刑長泣曰何以報吳君後生子以吳爲名也吞藥就死鍾離意字子阿爲瑕邱令有吏行盜意不忍行刑罷其職放歸其父曰有道之君以義刑人子宜進藥死畫衣冠漢文詔曰蓋聞有虞之時畫衣冠異章服以爲戮而人不犯何則治之至也其除肉刑輕典周禮緩刑居上不寛吾何以觀之哉父子君臣禮凡聽五刑之訟必原父子之親立君臣之義以權之注權量也謂立父子君臣之間可以情恕也容姦禮利淫人之蒐匿大爲防而猶踰灋以懲姧小不忍而恐亂况當𢎞貸之朝宜用適輕之典宥汝仇予惠暴寛惡刑法志言上古用象刑是殺人者不死傷人者不刑是惠暴而寛惡也無濫賞不僣刑不濫不幸而過寧僣無濫輔之以寛霍光持刑法嚴任杜延年輔之以寛老宣詔年八十非誣告傷人者皆不坐小成帝令未滿七歲賊鬬殺及犯誅死者上請皆減死面封之張歐字叔明爲御史大夫未嘗按人官屬亦不大欺上具獄有可却者却之謂平反也不可者涕泣面封之注皆封不忍見之去酒省肉杜緩理諸陵縣獄每冬月具獄曰去酒省肉官屬稱其仁于公高門升卿因字後漢虞詡字升卿祖父經爲郡獄吏每上具涕泣隨之嘗曰昔東海于公高其門閭其子卒至丞相吾不及于公子孫何必不爲九卿因字詡曰升卿妻執燭盛吉爲廷尉妻執燭持丹筆相向泣曰若可使一人濫禍及子孫泣辜禹門容駟馬于公孫及九卿虞詡祖經不妄舉按見愼刑門孔公累獲原賈敦頥爲洛陽司馬以公累下獄太宗貰之有司執不貰帝曰人孰無過吾去太甚者若悉繩以法雖子不得于父况臣得事其君乎遂獲原徐堅上言天授三年上言古者罰不逮嗣故郤芮亂國而缺升諸朝嵇康蒙戮而紹死於難則於他親不復致疑今選部廣責逆人親屬至無服者尚數十條且詔書與逆同堂親不任京畿緦麻親不得侍衛臣請如詔書外一切不禁以申曠蕩陛下儻𢎞天地之大德施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱已來常赦所不原者罪無輕重一皆原洗韋嗣立疏審定灋令意在寛平舊唐房𤣥齡蓬勃消李德㭲上尊號冊省刑罰而蓬勃消太宗見明堂圖禁鞭背權德輿字載之帝嘗問政之寛猛孰先對曰唐承隋虐以仁厚爲先太宗見明堂圖禁鞭背列聖所循皆尚德教故天寳大盜竊發俄而夷滅蓋本朝之化感人之深也帝曰誠如言下寛大之令流曠蕩之澤朱敬則字少連願下寛大之令流曠蕩之澤去萋斐之角力頓奸險之芒刃塞羅織之妄原掃朋黨之險跡曠然使天下更始豈不樂哉帝喜其言於用刑喜寛仁憲宗英明果斷自即位數誅方鎮欲治僣叛一以法度然於用刑喜寛仁是時李吉甫李絳爲相吉甫言治天下必任賞罰陛下頻降赦令蠲逋負賑饑民恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時自古欲治之君必先德化至暴亂之世始專任刑法吉甫之言過矣憲宗以爲然唐刑法志太宗降隋氏大辟刑百六十三條入流入徒免死以下遽減唯輕開闢以來未有斯比如罪惡既著制命已行愛人惜命務在哀矜臨於勦絶仁令數覆獲罪自然引分萬姓由是歸仁感兹煦嫗藏於骨髓雖武太后革命二紀安祿山傾䧟兩京西戎侵軼賊泚竊發乗輿巡狩㝢内憂虞億兆同心妖氛旋廓刑輕故也國家仁深德厚固可侔於堯舜夏殷以降無足徵者通典推斷獄四學獄附白情得獄成刑放辭窮察必以情小大之獄雖不能察必以情片言折獄者其由也與片謂偏也察言觀色叩其兩端放紛紛亂也孟秋決小罪月令天子命有司繕囹圄具桎梏斷薄刑決小罪仲秋申嚴百刑月令仲秋命有司申嚴百刑斬殺必當無留有罪嘗學斷斯獄矣禮致其忠愛禮記悉其聰明致其忠愛以盡之謂聽獄訟也哀矜曽子曰如得其情則哀矜而勿喜獄訟益繁要囚伏念五六日至于旬時要囚謂審其要辟哀敬折獄明啓刑書丹筆以定罪也定國之司廷尉爰求明察不疑之尹京師多所正刑高門待封于公隂德欽哉欽哉惟刑之恤哉敬之敬之惟刑之可憂也施鞭貫之威子玉治兵終日鞭七人貫三人耳明察之官滋豐亂獄典獄主獄者兩造具備師聽五辭兩謂囚證造全也兩至具備則衆官聽其入五刑之辝五辭簡孚正于五刑五辭簡核信有罪驗則正之於五刑審克詳審閱實罪與罰相當也何以速我獄平刑舉直措枉則民服丕蔽大斷也察辭稽貌考其貌愼獄之至也留辭謂一人之辭最難聽也束矢周禮以兩造禁人訟入束矢於朝然後聽注必以束矢者自表其直也不入則不聽也鈞金又以兩劑禁人獄入鈞金三日致于朝然後聽之注獄相告罪也劑劵書也使各賫劵書又入鈞金三日而聽之亦重刑不入金則自服不直不堅也鈞三十斤五聽求人情周禮以五聲聽獄訟求人情一日辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽斷獄蔽訟蔽亦斷也辭貴明徵傳明徴其辭罪宜愼測禮慎測淺深之量坐獄於王廷國章斯抵人命所懸刑將不變獄貴惟精舉要傳王叔氏不能舉其要要契之辭徵辭既慙金矢之直何逭鐵冠之劾折獄致刑斷制五刑書察辭于差察辭參差明清于單辭協日周禮司冦旬職聽于朝要之羣士司刑皆在各麗其法以議獄獄成士師受中協日刑殺肆之三日凡以獄財者正之傳别約劑傳别手中别書約劑今之契劵旬乃弊之小司寇以五刑聽萬民之獄訟附於用情訊之至於旬乃弊之注用情理之十日乃斷冀有可出也參聽記獄成告于王王命三公參聽之君子盡心刑者成也一成而不可變故君子盡心焉直鈞㓜賤有罪傳上下其手伯州犂導囚情不探其情而誅焉于定國知審愼之心朝廷稱之漢于定國不寃張釋之爲廷尉天下無寃人于定國爲廷尉人自以為不寃不用三冬後漢陳寵咸之曽孫明家業天下獄訟其所由決平無不厭伏時肅宗詔絶鈷鑕慘酷之科人俗和平屢有嘉瑞漢舊事斷獄報重常盡三冬之月是時帝始改用十月冬初而已元和年旱賈崇上言斷獄不盡三冬故隂氣微陽氣發洩招致災旱寵奏冬至陽氣始萌令曰諸生蕩仲冬日身欲寧事欲靜若降盛怒不可謂寧行大刑不可謂靜帝納之爲廷尉每附輕典務從寛也麥秋案驗和帝令麥秋案驗薄刑司徒魯恭上疏諫盛夏召農人拘對上失天時下傷農業一夫吁嗟王道爲虧後卒施行學獄漢張湯父爲長安丞岀湯爲兒守舍還鼠盜肉父笞湯湯乃掘薰得鼠及餘肉劾鼠掠笞傳受書者訊鞠論報并取鼠肉具磔堂下父親文辭如老獄吏遂使書獄注學決獄之書乃爲律令也必原父子之親禮意論輕重之序慎測淺深之量悉其聰明致其忠愛必察小大之比以成之禮黃沙執憲丹筆垂仁雖折獄以言望古人而多愧惟刑是恤然勿喜而留情梧邱有雪寃之魂棘林無夜哭之鬼泣辜流念無虧大禹之恩丹筆哀矜有裕放勛之惠刑期無刑經䢴之茂範以殺止殺有國之𢎞規故漢制九章設犂元之衘勒湯存一面作黔首之隄防干紀亂常必加誅於三族反道敗德終不捨於五刑孔單言輒判李程字表臣調藍田尉縣有滯獄十年程單言輒判州部審覆徐浩字季海尚書右丞浩建言故事有司斷獄必州部審覆自李林甫楊國忠當國專作威福許有司就宰相府斷事尚書以下未省即書垂謹䘏意請如故詔可納金第五琦有告琦納金者遣御史馳按琦辝曰位宰相何自持金耶若付受有狀請歸罪有司御史不曉以爲具服獄上之遂長流夷州斷疑獄四百張文瓘字稚圭兼大理卿不旬日斷疑獄四百抵罪者無怨言平處輕重沈傳師字子言爲宣州吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論決待報嚴郢字叔敖御史臺請天下斷獄一切待報唯殺人許償死論徒者得悉徙邊郢言罪人徙邊即流也流有三而一用之誠難且殺人外猶有十惡僞造符印强刼大諸盜今一徙之法太輕不足禁惡侍御史掌推獄訟凡有制勑付臺推者則按其實然以奏云若尋常之獄推訖斷於大理同上覈實論殺唐史李景畧爲朔方節度監官五原將張光殺其妻以貲市獄前後不能決景畧覈實論殺之既而有若女厲者進謝庭中如光妻云守死明道徐有功人論之曰昔稱張釋之爲廷尉天下無寃今徐有功斷獄亦天下無寃人然釋之當漢文帝時中外無事守法而已有功居革命之際周興來俊臣等掩義隱賊常飾惡言以誣盛德有功守死明道身濱殆者數矣此其賢於釋之明甚寛平鄭惠王元懿數斷大獄務寛平高宗嘉之無恨韋仁壽京兆萬年人隋大業末爲蜀郡司法書佐斷獄平得罪者皆自以韋君所論死無恨雜治劉晏字士安元載得罪詔晏鞫之晏畏載黨盛不敢獨訊更勑李涵等五人與晏雜治王縉得免死晏之請也詞服陸宣公奏議惟情見跡具詞服理窮者然後加刑法焉臨所入者獨無言唐臨爲大理卿高宗嘗親錄死囚前卿所斷者悉號呌稱寃臨所入者獨無言帝怪問狀囚曰唐卿所斷既非寃濫所以絶意舊史李景畧凡鞫大獄以尚書侍郎與御史中丞大理卿爲三司使唐百官志怒馬造廷薛懷義隂募力少年千人爲浮屠有逆謀侍御史周矩劾狀請治驗太后曰第出朕將使詣獄矩坐臺少選懷義怒馬造廷直往坐大榻上矩召吏受辝懷義即乗馬去矩以聞太后曰是道人素狂不足治力少年聽窮劾推覆詔獄裴守眞天授中爲司府丞推覆詔獄多裁恕全免數十姓不枉不漏張説字道濟睿宗即位遷中書侍郎兼雍州長史景雲秋譙王重福於東都横逆而死留守捕係枝黨經時不決睿宗令説往按其獄一宿捕獲重福謀主盡得其情狀自餘枉被係禁一切釋之故睿宗勞曰知卿按此獄不枉良善不漏罪人非卿忠正豈能如此凡斷獄之官皆舉律令格式正制條以結之若正條不見其可岀者則舉重以明輕其可入者則舉輕以明重岀唐六典拷訊五白二月無肆掠肆暴曰掠捶拷禮記掠笞史楚相亡璧門下意疑張儀貧無行必盜相君璧共執儀掠笞數百不服乃釋之榜笞刺爇貫高對獄吏榜笞數千刺爇身無完者捶楚之下何求不得雖臯陶聽之猶謂死者有餘辜繫笞笞訊掠辜瘐死宣詔係者或以掠辜瘐死獄中今郡國歲上係囚拷一連十拷十連百韓朗云請先拷范陽繫獄以同繫囚多嬰病乃請先就拷掠五毒慘至戴就㑹稽人仕郡倉曹掾楊州刺史奏太守成公俘贓從事薛安收就笞掠五毒慘至燒煆斧使夾肘腋肉焦墮地乃卧就覆舩下以馬糞薫之一宿二日謂已死發舩就口罵曰何不益火又燒地以大針刺指甲中令爬土爪悉落安曰太守贓罪狼藉君何骨肉抵扞就曰太守剖符大臣奈何誣枉忠良安竒其節操解械與譚解釋郡事識母羮陸績字智初詣洛陽獄泣曰母來不得見問何以知曰母所調和羮截肉方斷葱以寸爲度使者嘉之免績吏訊鄒陽書曰左右不明卒從吏訊也要囚夜拷常林夜撾吏崔林聞曰君爲廷尉耶常曰無崔曰何故夜拷囚常慙之罪得其實選誘問囚情吳陳表文奥爲士皆愛附之時有施明盜官物明壯悍収拷極毒雖死無辭孫權以表得健兒心以明付表表破械與沐浴飲食勸誘之乃首服兼引支黨權竒之遂捨明罪孔按訊蘇珦爲監察御史武后殺韓魯諸王付珦密牒按訊珦推之無狀或言珦助韓魯者后詰之挺議無所撓后不悦曰卿大雅士此獄不足諉卿即詔監軍河西乞下有司雜訊朱子奢池陽令崔文康坐事櫟陽尉魏禮臣劾治獄成御史言甚枉禮臣訴御史阿黨乞下有司雜訊不如所言請死鞫報禮臣不實詔如請子奢曰在律上書不實有定罪今抵以死死者不復生雖欲自新弗可得且天下惟知上書獲罪欲自言者懼而不敢申矣詔可同被訊張錫請還廬陵王不爲張易之所右與鄭杲俱知選坐洩禁中語又賕謝鉅萬時蘇味道亦任事同被訊繫鳯閣俄徙司刑三品院錫按轡專道神氣不懾日膳豐鮮無損貶味道徒歩赴逮席地菜食武后聞之釋味道將斬錫既而流循州氣息奄奄惟吏是聽李邕素輕張説㑹仇人告邕贓貸枉法下獄當死邕妻請戍邊自贖曰邕初蒙訊責便繫牢户水不入口者踰五日氣息奄奄惟吏是聽覆訊宗室臯字子蘭授衡州刺史爲觀察使詔劾貶潮州初御史覆訊臯懼憂其母出則囚服入乃貌言如平常恣行楚慘唐史吉頊劉思禮反頊上變事后命武懿宗雜訊因諷囚引近臣高閥生平所惡者凡二十六姓捕繫詔獄榜楚百慘以成其獄同日論死天下寃之諸察獄之官先備五聽又驗諸證信事狀疑似猶不首實者然後拷掠每訊相去二十曰再訊岀通典執政畏禍麤滅無所問姚紹之武三思烝僣不軌王司皎等謀殺事覺送新開獄詔紹之與左臺大夫李承嘉按治初欲原盡其情㑹勑宰相李嶠等同訊執政畏禍麤滅無所問囚虖曰宰相有附三思者嶠等數附承嘉耳呫嚅紹之飜然不復顧楚械搒掠皆呻吟不勝吉温李林甫與李適張垍有隙適之領兵部以垍兄均爲侍郎林甫密遣吏摘其餘銓史僞選六十餘人帝命與京兆雜治累日情不得京兆尹蕭炅使温佐訊温分囚左右中取二重囚重訊後舍楚械搒掠皆呻吟不勝曰公幸留死請如牒乃挺出諸史迎懾其酷及引前不訊皆服日中獄具林甫以爲能笞掠嚴楚穆贊字相明元和時鹽鐵轉運諸院擅係囚笞掠嚴楚贊奏請與州縣吏參決自是不寃唐史隨問輒承吉温推事未窮而先計贓成奏乃引囚問震以裂威隨問輙承無敢迕鞭楚未收於壁而獄具矣環以榜具敬羽擢監察御史岐王珍謀反詔羽窮劾乃悉支黨環以榜具囚惶怖一昔獄成珍賜死楚掠凝慘徐有功傳周興來俊臣邱神勣王𢎞義等揣識后指置總監收院諸獄捕將相俾相鈎逮掩搦䕶送楚掠凝慘鞫訊結斷刑慘獄嚴徐有功上疏唐季人多逆節鞫訊結斷刑慘獄嚴款辯六證驗附白明聽單辭兩辭師聽五辭書王叔氏不能舉其契要契之辭書辭無頗抵讕置辭漢大鴻臚持節移梁王傳相曰王陽病抵讕置辭注抵拒也讕諱也讕力亶切不知置辭牘背周勃下廷尉不知置辭注置立也不知對獄之辭吏稍侵辱之勃以千金與獄吏乃書牘背以公主爲證注牘木簡也置對自伏其過莊子會獄追對南山之竹不足受我辭朱安世引爲證後漢吳詠爲馬賢所辟又爲太尉龐參掾參賢相誣罪應死各引爲證理無兩直自刎死二人慙悔和解凉州刺史張禨祭其墓旌其子孫孔多作辯狀刑法志武后大定元年乃詔法司及推事使敢多作辯狀而加者以故入論占辯皆合韋嗣立論刑法多濫道路藉藉雖知非辜而鍜鍊已成占辯皆合不可䧟正人以求茍免宋璟張易之誣魏元忠有不臣語引張説爲驗將廷辨説惶遽璟謂説曰名義至重不可䧟正人以求茍免緣此受摘芬芳多矣若不測者吾且叩閽救將與子偕死説感其言以實對元忠免死大理烝徒以上各呼囚與其家屬告以罪名問其狀疑不伏則聽其自理唐通典察獄七白小大之獄雖不能察必以情偏聽生姦探情窮審公聽不私察色動魏䕶軍營士竇禮岀不還營以爲亡没事其妻盈及男女詣廷尉高柔曰爾夫不與人交錢財乎妻曰嘗出錢與同營焦子文柔察子文色動應對召至於是叩頭首殺禮胡質爲常山太守士盧顯爲人所殺質曰此士無讎而有少妻見其比居年少書吏李若色動遂窮詰罪人斯得矣蜜中鼠屎吳孫亮方食生梅使黃門以銀碗并蓋就中藏吏取蜜黃門先恨藏吏以鼠屎投蜜中啟言不謹亮令破鼠屎鼠屎中乾亮笑曰若先在蜜中當中外俱濕黃門伏罪兩日在水中符融字博林善斷獄董豐遊學三年而反宿妻家妻爲賊殺妻兄疑豐融引問汝初行不有怪及卜占否豐曰初發夢乗馬渡水而自北而南俯見兩日在水中馬左濕筮者云憂獄訟遠三沐避三枕既至妻具沐夜授豐枕豐憶筮言皆不從妻乃自沐枕枕而寢融曰易坎爲水離爲馬南渡旋北而南從坎至離六爻同變離爲中女坎爲中男左向濕水也水左有馬馮字兩日昌字其馮昌殺之昌乃具服與妻通期新沐沐者枕枕爲驗誤中婦人盜誣行人冀州有老母遇刼唱盜人爲逐之擒盜反誣行人日暮母及路人莫知符融曰二人並走先出鳯陽門者非盜既還融正色謂後出者曰汝真盜其發姧摘伏皆如此與死人語後漢周紆字文通爲邵陵相廷掾憚紆嚴明欲損其威乃取死人斷手足立寺門紆便往至死人邊若與死人共笑語狀隂察口眼中有稻芒乃密問守者曰誰載藁入城對曰惟有廷掾爾又鈴下云外惟廷掾疑君與死人語乃收廷掾而拷問具服不殺人但取道邊死人自後莫敢犯之分縑風俗通曰有一人持一疋絹到市賣遇雨而披覆後一人求庇䕃授一頭雨霽當别因爭之是我縑太守薛宣呼騎吏斷各與半使追聽之後人曰君負縑主稱寃不已宣知其狀拷問乃服也推已以議物捨狀以探情誅一以振萬損少成多妻殺夫陸雲爲浚儀令人有被殺主名不立雲錄其妻無所問遣出密令吏隨之曰有一男與語便縛來果得之云與妻同謀殺也木囚王充論衡李子長爲政欲知囚情以梧桐爲人像囚之形鑿地爲坎置木囚於其中罪若正木囚不動若有怨木囚即動豈囚之誠著木人也孔身聽安潛字進之於吏事尤長雖位將相閲具獄未嘗不身聽之詭稱婚集宋璟京兆人權梁山謀逆勑河南尹王怡馳傳往按牢械充滿乆未決乃命璟爲京兆留守覆其獄初梁山詭稱婚集多假貸欲倂坐貸人璟曰婚禮借索大同而狂謀率然非所防億使知而不假是與爲反貸者不知何罪之云乎縱數百人餞流人馬懷素字惟白魏元忠謫嶺表太僕崔貞謹東宫率獨孤禕之祖道張易之怒使上急變告貞謹與元忠謀反武后詔懷素按之使者促廹懐素執不從曰貞謹餞流人當得罪以爲謀反則非昔彭越以逆誅欒布奏事尸下漢不坐罪今元忠罪非越比不宜坐餞濶之人且陛下操殺生之柄欲加之罪自當處決聖心既付臣按惟知守陛下法爾后意解盜刼貢舩錢徽字蔚章貶江州刺史初州有盜刼貢舩捕吏取濱江惡少年二百人繫訊徽按其枉悉縱去數日舒州得眞盜哀之者哀其化之不行文粹古之決獄得其民情也哀今之決獄得其民情也喜哀之者哀其化之不行喜之者喜其賞之必至鹿門隱書皮日休察獄之官先備五聽又稽諸證信有可徵焉而不首實者然後拷掠二十日一訊之辭聽色聽氣聽耳聽目聽五聽也醉胡懐刀而汙唐史韓思彦字英逺使并州方賊殺人主名不立醉胡懷刀而汙訊掠已服思彦疑之晨集童兒數百暮出之如是者三因問兒出亦有問者皆曰有之乃物色推訊遂擒眞盜獄囚八白囹圄以囚桎梏以縶寘于叢棘易圜土周禮司赦三罰而士加明刑歸圜土注圜土獄名三月省囹圄九月繕囹圄拘繫易係用徽纆索也用脱桎梏屨校滅趾械足也荷校滅耳罪重械及首也上罪中罪同族有爵待弊周禮掌囚守盜賊凡囚上罪梏拲而桎中罪梏王之同族拲有爵者桎以待弊鄭司農曰兩手共一木曰拲桎梏兩手各一木𤣥曰在手曰梏在足曰桎中罪不拲亦各一木又云桎王族及命士以上唯上罪或拲或梏也挺重囚岀輕繫月令夏月注云挺寛也至秋乃決也具桎梏九月以幕蒙之左傳晉人囚季孫意如圄伯嬴於轑陽越椒囚蔿賈南冠而縶者誰也晉侯觀於軍府見鍾儀問之云云縲絏之中公冶長縲囚幽縶囚之七年紂囚文王七年楚囚鍾儀武王下車釋箕子囚方知獄吏之尊周勃云上書梁王囚鄒陽陽乃從獄中上書自説立出之死灰不然史韓安國字長孺坐枉罪獄吏田甲辱之安國曰死灰獨不然乎甲曰然則溺之搶地司馬遷書見獄吏則頭搶地畫地爲獄議不入刻木爲吏議不對司馬遷書仰天而歎李斯既拘執縛仰天云云史關三木史魏其侯衣赭衣關三木注云頸及手足栫棘傳吳子執邾子於樓臺栫之以棘栫擁也音賤羑里紂囚文王於羑里夏臺成王湯囚於夏臺狴牢獄名黃沙獄名晉武帝所置象斗之制元命苞爲獄圓者象斗也圜扉獄門黃霸受經黄霸與夏侯勝俱下獄從勝請受洪範勝辭以死在旦夕霸曰朝聞道夕死可矣勝善其言遂授之入穽揺尾籠鳥檻猿幽而楚奏鍾儀出圜土者殺謂逃出獄也周禮攘獄攘謂拒當獄者周禮赭衣魯謁居繫導官諸獄皆滿權寄此者絳侯囚諸獄千金與吏灌夫受辱居室保官暴室掖廷織作染練署獄市爲寄曹參相齊以獄市爲寄屬後相曰慎勿擾獄市所以并容擾之姦人安所寄虎穴漢尹賞爲長安令獄穿地方深各數丈以瓴甓爲郭大石覆之名虎穴圜牆之中司馬遷書鞠繫訟繫漢景著令年八十已上十歲已下及孕未乳産者師侏儒當鞠繫者訟繫之注師樂師樂師盲瞽也訟寛容不桎梏也但處吏舍不入狴牢也斜谷之木不足爲我械斜口谷名朱安世云逮繫淳于公下獄逮繫長安注在道將送防禦不絶若今傳送囚也淳于公當行㑹逮罵其女云云胥靡史楚王胥靡申公注云連繫而相隨服役之也琅當王莽捕關東犯鑄錢以鐵琅當其項傳詣鍾官萬數注琅當長鎻也瘐死宣詔繫者或以掠苦饑寒瘐死獄中朕甚痛之其㑹郡國歲上繫囚以掠苦瘐死者所坐名縣爵里丞相御史課殿最以聞注瘐病囚徒病殣爲瘐死或作瘉獄中爲誄後漢杜篤字季雅下獄㑹大司馬吳漢薨世祖詔諸儒誄之篤於獄中爲誄辭最高帝美之賜帛免刑械自解許楊字偉君少好術數爲汝南太守鄧晨修隙鴻陂豪右因陂役辜較所在楊一無所聽遂共譖楊受賂下獄而械輒自解獄吏遽白晨驚曰果濫矣太守嘗聞忠信可以感靈即夜出楊遣歸時天雨隂晦道中若有火光照之時人異之救火晉棠邑丞劉榮坐事當死縣有野大所及榮脱械救大畢還自著械刼囚魏囚臧霸父式爲獄掾據法不聽太守私殺太守收霸父付府霸將數人要奪與父亡命導囚走魏孫禮荒亂時與母相失馬台爲求之既得後台坐法當死禮私導令踰獄乃自首主簿温嘉之白太祖罪減一等失囚律捕亡律主守不覺失囚減囚罪二等若拒捍走者又減二等皆限百日内追捕限外他人捕得若囚已死及自首除其罪又云徒流囚徒限内亡者一日笞四十三日加一等主守不覺減囚罪三等故縱者即與囚同罪也職納櫜饘傳晉人囚衛侯甯子職納櫜饘櫜饘衣食也甯俞忠於衛侯以衛侯衣食爲己職纍臣繫纍之臣傳身爲木石與灋吏爲伍司馬遷書跡墜昭憲身䧟幽圉文選深室傳寘諸深室别爲囚室也孔纍繫塡獄崔仁師爲殿中侍御史時青州有男子謀逆有司捕支黨纍繫塡獄詔仁師按覆始至悉去囚械爲具食飲湯瀋以情訊之止坐魁惡十餘人他悉原縱大理少卿孫伏伽謂曰原雪者衆誰肯讓死就決而事變奈何仁師曰治獄主仁恕故諺稱殺人刖足亦皆有禮豈有知枉不申爲身謀哉仗吾以一介易十囚命固吾願也及勑使覆訊諸囚咸叩頭曰崔公仁恕必無枉者無異辭鵲巢其樹大理卿徐嶠奏今歲天下斷死刑五十八大理獄院由來相傳殺事太盛鳥雀不棲今有鵲巢其樹百官以幾刑措賀帝歸功宰相賜李林甫爵晉國公牛仙客幽國公唐史獄户春而不草獨幽怒而沉逮李白萬墳詞囚隂山苦寒地温彦博字大臨突厥入㓂彦博以并州道行軍長史戰大谷王師敗績被執突厥知近臣數問唐兵多少及國虛實彦博不肯對囚隂山苦寒地太宗立得還囚窟室蔣儼爲莫離支所囚内窟室見節門厨院崔隱甫拜御史大夫初臺無獄凡有囚則繫大理貞觀時李乾祐爲大夫始置獄由是中丞侍御史皆得繫人隱甫執故事廢掘諸獄其後患囚往來或漏泄復繫之厨院云以稽決滯陸贄字敬輿八計曰視囚繫盈虛以稽決滯毁械而亡栁晟河中解人朱泚反從帝至奉天自請入京師説賊黨以攜沮之帝壯其志得遣泚將郭常張光晟皆晟雅故晟岀密詔陳禍福逆順常奉詔受命約自㧞歸要籍朱既昌告其謀泚捕繫晟及常外獄晟夜半坎垣毁械而亡斷髪爲浮屠加兵苛督高駢字千里畢師鐸出駢囚南第駢岀金遺守者師鐸知之加兵苛督復入囚中子弟十餘人同幽之囚拘駢乆囚拘供億窘狹羣奴徹延和閤欄楯爲薪煮革帶以食鐵籠􅀢囚頭索元禮爲推使鐵籠􅀢囚頭加以楔至腦裂死又横木關手足轉之號曬翅或紡囚梁上縋石於頭作大枷各爲號來俊臣作大枷各爲號一曰定百脉二喘不得三突地吼四著即臣五失魂膽六實同反七反是實八死猪愁九求即死十求破家暮爲白日囚朝爲青春士暮爲白日囚韓愈赴江陵途中悲作楚地囚悲作楚地囚何由秦庭哭李白示息秀才獄者兼受好惡崔融陳關市疏司刑無鬼哭之庭李庾西都賦司刑無鬼哭之庭大理有烏巢之獄貫五木加連鎻貫五木加連鎻而致之獄更大暑者數月痒不得搔痺不得揺痛不得復摩饑不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞千里人栁宗元斷刑論顧地窺天不過尋丈柳宗元與李建書壁如囚拘圜土一遇和景出負牆搔摩伸展支體當此之時亦以爲適然顧地窺天不過尋丈終不得出復能乆爲舒暢哉槁焉若枿隤然若璞答周君巢書宗元以罪大擯廢居小州與囚徒爲朋行則若帶徽纆處則若關桎梏夕于而無所趍拳拘而不得肆槁焉若枿隤然若璞其形固若是則其中者可得矣網羅未解縱羽翼而何施囊檻方堅雖虎豹其焉往上李襄陽啓衝羅蹈穽不知顚踣柳宗元答問驄馬刑章峻蒼鷹獄吏猜覆盆徒照日蟄户未驚雷駱賓王獄中詩地幽蠶室閉門靜雀羅開有氣還冲斗無時㑹鑿坯同上靜獄五代漢臣蘇逢吉高祖生日遣吉疏理獄囚以祈福謂之靜獄逢吉入獄中閲囚無輕重曲直悉殺之以報曰獄靜矣撓灋貸免王世充隂結豪傑有繫獄者皆撓法貸免以樹私恩放囚九事多在寛刑中白兩釋縲囚傳故縱緩死乃逸楚囚傳晉人令曰蒐乗補卒明日復戰乃逸楚囚注云緩之令逸欲使楚人知其謀也縱囚亡命馬援爲郡督郵送囚有重罪援哀而縱之令亡命北地遇赦放歸殯母鍾離意爲堂邑令民防廣爲父報讎繫獄母病死廣哭不食意怜傷之聽廣歸殯殮丞掾皆争意曰罪自歸我義不累下遂遣殮母訖果還入獄意密以狀聞廣得減罪死論論重者一人魏賈逵字道宗太祖征劉備先遣逵至斜谷水衝載囚于車逵以軍事竟重者一人放其餘太祖善拜諌議大夫伏臘放歸後漢虞延字子大爲淄陽令歲時伏臘放囚歸皆尅期反有一囚於家病自載詣縣既至而死又晉范廣字仲將爲堂邑令丞劉榮坐事當死郡以付縣家有老母至節廣輒遣還榮如期反又曹攄字顧逺爲臨淄令獄有死囚嵗夕攄行獄愍之曰新歲人情所重豈不欲蹔還家乎開獄岀之剋曰令還掾吏固争攄曰此雖小人義不見負至期並來一縣歎伏號曰聖君也在道解徒作徒衣後漢鍾離意字子阿辟司徒府送徒詣河内時寒徒病路過𢎞農意移屬縣使作徒衣縣不與而上書言狀意亦具以聞世祖謂侯霸曰君所使掾何仁於用心誠良吏也意遂於道解徒桎梏恣所欲過與剋期俱至無或違者進藥就死見寛刑門吞藥就死注務以哀矜示其仁信無茍免之心待而懐惠守自拘之限來不忍欺弛刑若今責保漢書誦經得脱晉符丕左丞相徐義爲慕容永所獲杻械其手將殺之義誦觀世音經至夜有力士開械脱出若有導之者遂奔楊銓期銓期以爲洛陽令岀輕繫利滛惠姦寛惡遭逃孔馳騎免死魏元忠爲御史中丞爲來俊臣所搆將就刑神色不動前死者宗室子三十餘尸相枕藉於前元忠顧曰大丈夫行居此矣俄勑鳯閣舍人王隱客馳騎免死傳聲及於市諸囚歡叫元忠獨堅坐左右命起元忠曰未知實否既而隱客至宣詔已乃徐謝亦不改容如期至吕元膺字景夫岀爲蘄州刺史嘗錄囚或白父母在明日歲旦不得省爲恨因泣元膺惻然悉釋械歸之而戒還期吏白不可答曰吾以信待人人豈違我如期而至萬一除刑部囚籍萬一除刑部囚籍復爲士列不堪當世用矣柳宗元許京兆書非卿孰能辨之唐史李元素字大朴東都留守杜亞惡大將令狐運㑹盜刼輸絹於洛北運適與其下畋近郊亞疑而訊掠服之楊寧覆驗事皆不讎亞怒劾寧德宗信不疑詔元素馳按亞迎以獄告元素察其寃悉縱所囚以還亞大驚復劾元素失有罪元素還帝已怒奏獄未畢帝曰出元素曰臣言有所未盡帝曰第去元素曰臣以御史按獄知寃不得盡辭是無容復見陛下帝意解既道運寃狀帝感悟曰非卿孰能辨之縱囚使相告隱太子建成討劉黒闥獲俘皆撫遣之百姓欣悦賊懼夜奔兵追戰黒闥衆猶盛乃縱囚使相告禠衣甲還鄉里告妻子獲者既已釋矣衆乃散或縛渠長降遂擒黒闥恤囚徒十白繫者饑寒瘐死朕甚憐之漢宣詔見上注作徒衣見上注給酒肉趙廣漢爲京兆富人蘇回爲郎二人刼執之求財廣漢就曉之曰京兆職謝兩卿無殺天子臣釋質束手得善相遇二人即叩頭送獄廣令給酒肉至冬當出趙豫爲調棺歛葬具皆曰死無所恨妻入獄見寛刑門無子令妻入獄注又晉喬智明字元逹爲隆慮令部人張兊報父讎母單身有妻無子智明愍之令妻入獄隂縱之有勸逃者兊曰有君如此不忍累之於獄産一男會赦免有官秩在獄惠詔爵有五大夫吏六百石以上及官皇帝而知名者有罪當械皆須繫寛容不入狴牢者問囚欲言吳顧雍爲丞相爲吕壹所誣毁雍和顔色問其辭狀臨岀又謂曰君得無有所欲道耶壹叩頭無言孔問其服否唐志大理寺丞六人正刑之輕重徒以上囚則呼與家屬問其服否盡欽恤之道竭哀矜之誠使生者不怨死者不恨此王者恤刑之法也白居易䇿止獄畫衣不犯載酒無寃文粹楊炯少姨廟碑糾萬人者施之以八刑詰四方者戒之以三典畫衣不犯載酒無寃其恤刑有如此者輕囚乆繫唐臨事見獄囚門三農啓候方陳愛敬之規百姓爲心爰軫泣辜之念中宗慮囚制濟活囚徒十一白邴吉拒閉使者漢書皇曽孫在邸獄望氣者言長安獄中有天子氣上使分條中都官詔獄無輕重皆殺之邴吉爲郡吏拒閉使者使者不得入也袁安條奏楚獄後漢袁安爲楚郡太守楚王英反連及數十人顯宗怒甚治之迫急自誣安不入府往案獄者無證明者條上岀之掾吏叩頭争安曰如不合上意太守自坐不相及帝悟奏出四百餘家治岀崔篆爲建新大尹獄姧塡滿岀二千餘人掾吏叩頭曰將有悔篆曰邾文公不以一人易其身君子謂之知命如殺大尹贖二千人蓋所遇也拷一連十後漢韓朗以侍御史與三府掾治楚獄顔忠辭及劉連連未嘗與忠相見朗傷其寃試以連等物色問忠對錯悞乃上言疑無辜拷一連十拷十連百車駕自幸洛陽獄錄囚徒治出千人論曰仁人之言其利溥哉免於斧鑕史張蒼坐法當斬解衣伏鑕肥白如瓠王陵偉之言於沛公赦不斬又暴勝之欲斬王訢訢曰殺訢不足増威不如時有所捨以明恩貸勝之壯其言而赦之孔釋械狄仁傑出豫州刺史時越王兵敗支黨餘二千人論死仁傑釋其械密疏曰臣欲有所陳似爲逆人申理不言且累陛下欽恤意表成復毁自不能定然此皆非元惡詿誤至此有詔悉謫戍邊囚岀寧州父老迎勞曰狄使君活汝耶因相與哭碑下囚齋三日乃去至流所亦爲立碑七族得貸仁傑免死武承嗣屢請誅之后曰今已行不可返時同被誣者鳯閣侍郎任知古等七族得貸全活數十姓裴度字中立加中書令李訓之禍宦官肆威以逞凡訓注宗婭賔客悉收逮訊報苛慘度上疏申理全活數十姓治獄主仁恕崔仁師事見獄囚門屈突通覆簿覆隴西牧簿得隱馬二萬匹帝怒收太僕卿慕容悉逹監牧官吏千五百人將悉誅死通曰人命至重死不復生陛下以至仁育四海豈容以畜産一日戮千五百人帝叱之通進頓首曰臣願身就戮以挺衆死帝寤曰朕不明乃至是今當免悉逹等旌爾善言遂皆減論情有重輕陳希烈等數百人待罪議者悉抵死李峴獨曰法有首從情有重輕若一切論死非與天下惟新之意固争數日乃見聽衣冠蒙更生録囚十二白有所平反漢雋不疑爲京兆尹每行縣錄囚徒有所平反母即喜如無母爲之不食故不疑爲吏嚴而不殘察顔色後漢左雄爲青州刺史每行部錄囚徒察顔色多得情僞口説應奉爲郡決曹吏行部四十二縣錄囚徒數千人太守問之奉口説罪殺兼繫姓名坐狀輕重一無遺脱罵囚吳吕壹以姦罪繫廷尉尚書懷敘靣罵辱壹丞相顧雍元歎責懐敘云云孔以執灋平恕方戴胄張文瓘字稚圭嘗有小疾囚相與齋禱願亟視事以執灋平恕方戴胄後拜侍中囚因遷皆垂泣其得人心如此指曉枉直何易于凡鬬民在廷易于丁寧指曉枉直杖楚遣之不以付獄吏三年無囚占對唐臨高宗嘗錄囚臨占對無不盡帝喜曰爲國之要在用法刻則人殘寛則失有罪惟是折中以稱朕意盡情成汭青州人頗知吏治嘗錄囚盡其情墊江賊隂殺令其主簿疑小史導之訊不承臨刑曰我且訟地下踰月吏暴死汭聞益詳於獄唐太宗親錄囚徒六年唐太宗親錄囚徒閔死罪者三百九十人縱之還家期以明年秋即刑及期囚皆詣朝堂無後者太宗嘉其誠信悉原之唐刑法志無囚十三白黃霸爲潁川百姓嚮化八年獄無重囚董恢爲不其令獄連年無囚後漢劉平爲全耕令有恩惠百姓懐感刺史行縣獄無繫囚囹圄空虚寂寥孔獄無重囚刑法志代宗性仁恕即位五年府縣寺獄無重囚狴牢傾杜甫有事於南郊賦叢棘坼而狴牢傾無一人獄文粹杜牧上高大夫書梁公元崇首佐元宗起中興業凡三十年天下幾無一人之獄吏閣丹筆文粹李庾西都賦臺收白簡吏閣丹筆司刑無鬼哭之庭大理有烏巢之獄鑽鑿不用獄訟以衰柳宗元表白孔六帖卷四十五
