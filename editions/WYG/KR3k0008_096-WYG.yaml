body:
  text: 白孔六帖卷九十六唐白居易原本宋孔傳續撰馬一牛二羊三馬一白良馬駿足逸足絕羣駔駿權奇躞蹀代勞馬以代勞房精房星之精至駿七發至駿絕足選奇毛坤象易坤元亨利牝馬之貞千駟齊景公有馬千駟朱鬛白顛連錢之色噴玉之聲戀主致遠蕭蕭長鳴駸駸載驟班馬政十二閑之政不知牝牡董仲舒乗馬三年不知牝牡踐葵事具賢女門八尺七尺周禮馬八尺已上爲龍七尺爲騋浴馬圉人浴馬有流矢在白肉效馬效羊者右牽之禮執靮馬則執靮駑駘款段並羸馬行地無疆牽制轅下駒漢武謂鄭當時曰何乃局促如轅下駒白馬翰如易蕃庶晉康侯用錫馬蕃庶服牛乗馬引重致遠易騋牝三千六尺曰騋有驪有皇乗皇禁原蠶夏官爲害馬也牸牝漢景時街巷阡陌馬成羣乗牸牝者不得會聚復卒漢食貨志人有馬一匹復卒三人官假漢時官假馬毎歲三而歸及息十以率一注令人畜官牝馬三歲歸之十母還官一駒果下漢時獻果下馬出關衛琯奏馬高五尺九寸齒未平不得出關注馬十歲齒平馬式馬援得駱越銅鼔鑄爲名馬式既差我馬差擇也蹄噭馬蹄噭千里噭口也認卓茂有人認其馬輒便與馬口錢漢昭詔無斂今年馬口錢注時有百口出歛所謂租及六畜磨許靖字文林不得齒叙以馬磨自給智管仲曰老馬之智可用也飲馬投錢三輔決録安陵項仲山駿馬逐日追風大宛汗血作歌李廣利爲貳師將軍伐大宛國得汗血馬名蒲梢作天馬之歌肅爽唐成公有兩肅爽馬楚子常欲之不與三年止之唐人竊馬而獻子常曰君以弄馬之故隱君身也千里駒稱德驥不稱力而稱其德屈產荀息請以屈產之乗假道於虞曵練白馬出呉閶門望之如一匹曵練渥洼漢得神馬於渥洼水中乃爲歌曰太一貢兮天馬下霑赤汗兮沬流赭今安匹兮龍爲友赤汗見上似鹿韓子曰馬似鹿千里也如龍漢書曰車如流水馬如龍八駿周穆王有八駿九逸漢武帝有九逸獻漢文帝時有獻千里馬者奔踶漢馬或奔踶而致千里者騏驥􅀈驑逸態七命曰天驪之駿逸態超越兾北兾之北土馬之所生騕䮍龍媒飛兔紫鷰浮雲絕景追電緑耳並古駿馬名騅不逝項羽歌曰時不利兮騅不逝蚤翦禮大夫違乗髦馬不蚤翦謂不鑿也黑脊禮馬黑脊而般臂漏音婁臭不可食契需周禮行數千里不契需傷倦也言其善御也乗肥馬逐逐良馬逐逐六馬六種之馬朱其尾鬛宋公子佗有白馬四公取而朱其尾鬛以與向魋求良馬淮南子秦穆公謂伯樂曰子有使求馬者乎荅曰馬不在形容筋骨相也天下之馬若滅若没臣之子皆下材可告天下之馬臣有擔纒束薪者九方歅其於馬非臣之下也求馬三月而反曰得馬矣在沙邱牡而黄及馬至則牝而驪公謂伯樂曰子所求馬者毛色牝牡不知敗矣伯樂太息曰一至此乎歅之所觀者天機也得其精而忘其麄見其内忘其外也果千里馬蹋石有跡大宛有天馬云云泛駕言有逸氣不循軌囓膝飛黄中黄驥子並馬名的盧劉備乗馬名的盧墜檀溪中溺水備急曰的盧今日何不努力馬遂一踊五丈而得過矣駕我騏􅑓詩陸離陸梁良馬四之五之六之詩稱旌繁傳有不腆先人之産馬其可稱旌繁乎稱舉也若恤若失徐無鬼相馬馬有成材若恤若失寳馬東蕃求冐頓寳馬羣臣曰匈奴寳馬勿與冐頓曰奈何與鄰國而惜一馬赤兎吕布馬名赤兎能馳城飛壍人語曰人中有吕布馬中有赤兎有性孫堅戰傷墜馬卧草中軍衆分㪚後失堅所在堅所乗之騘還營掊地而鳴將士随馬於草中得堅至於犬馬皆能有養語調習乗騎附訓騶執轡載馳載驅不馳不驅駟驖孔阜詩既佶且閑有馬者借人乗之走馬長楸間小駟教訓服習晋恵公與秦戰乗鄭之小駟慶鄭曰古者大事必乗其産生其水土知其出入安其教訓而服習其道唯所納之無不如志今乗異産從諸戎事及懼而變將與人易亂氣狡憤隂血周作張脉憤興外强中乾進退不可周旋不能金埒王武子好馬買地試馬人謂之金埒人馬相得文選衘轡之制荀子法言曰夫騏驥古之良馬也然必有衘轡之制兼以鞭䇿之威加之造父之御然後日致千里規行矩歩善御執轡楚辭曰當世豈無騏驥誠莫之能善御見執者非其人故跔跳而逺去馬驚敗績始駕馬者反之車在馬前謂使見而習調之歩馬左師見夫人歩馬注云謂調習也羇馬荘子馬齕草飲水翹足而陸真性也伯樂曰我善治馬連之以羈􅎗鞭之以皂棧而馬死者半傷吻敝䇿庸人之御駑馬惜連乾王濟乗馬不肯渡水濟曰馬必是惜連乾障泥去之乃渡杜預曰王濟有馬癖非土性不畜犬馬云云還濘晋戎馬還濘而止慶氏之馬善驚走馬漢張敞爲京兆尹罷朝走馬章䑓街自以便靣拊馬注便面若今沙門持竹扇爲不欲見人也言敞無威儀也馬墜羊祜叔子人相其先墓當受命者祜㫁其山岡相者曰雖㫁其岡猶有折臂三公俄而墜馬折臂後位至三公載驟駸駸馳騁田獵令人心發狂老子必騁又御師爲短䇿過華胄之門必騁騎至廟韋元成以列矦侍祀當晨入廟天雨淖不駕四馬而騎馬至廟下有司劾之數人皆削爵習馬貳師至燉煌拜習馬二人爲驅馬校尉以破宛擇取善馬惡香朱建平善相馬魏文将出取馬入建平曰此馬今日死矣及入将乗馬惡香嚙帝膝帝怒遣使殺之怒馬楚怒馬及衢而騁班如乗馬班如易教駣駣駒也教謂調習玉勒金羈躡影陵空光照地黄金絡青絲鞚騰駒連鑣竝驅浮軒華軛體與機㑹動躡驚風延首髙驤擢足軒時氣蓋青雲勢凌萬里沃若買賣一顧十倍有賣駿馬者比三日於市人莫市乃見伯樂還而視之去而顧之一旦而價十倍市駿骨燕昭王以百金市駿骨人知好駿馬不逺千里而至交易有無質其有無試可市駮齒色歳齒也毛色也馬訟謂賣馬六言相負也周禮質馬夏官質馬掌貨馬量三物一曰戎馬二曰田馬三曰駑馬皆有物價注云物色也價直言販馬後漢呉漢子顔亡命以販馬自業勸賣庾亮有的盧殷浩以不利於主勸賣之亮曰已所不欲不施於人不貨踶嚙庾嶷遁世性仁牛馬有踶嚙者恐傷人不鬻於市求馬於唐肆肆非停馬之處言旋過去平牝馬武帝用天下馬於平牝馬匹二十萬貴平牝馬價欲使競畜馬秣馬食粟季文子相魯馬不食粟齕草飲水皎皎白駒食我場苖縶之維之以永今朝詩􅀈之秣之乗馬在廐在廐伏草皁棧飲齕芻秣之式周禮太宰以九式均節財用曰芻秣之式式用也謂財之度數也芻秣養馬之禾榖也甞秣馬不甞秣牛驥同皁漢書老驥伏櫪志在千里減漢詔水旱令太僕減榖食馬㗖以棗脯見下馬死注中齊其飲食周禮趣馬所在養任安田仁俱爲衛将軍舎人家貧家監使養惡齧馬兩人竊言曰不知人哉任安曰將軍尚不知何乃家監也厮役訪於廐下晉王尼爲䕶軍府士王澄胡毋輔之等持羊酒訪之尼時給府養馬輔之等入坐於馬廐中炙羊飲酒醉飽不見䕶軍自斬芻第五倫爲㑹稽太守自斬芻飲馬長城窟馬病𤣥黄虺隤陟彼髙岡我馬𤣥黄我馬虺隤並病也垂耳弔屈原文曰驥垂兩耳伏塩車兮傷骨飲馬長城窟水寒傷馬骨帛贖田子方見賣老馬以束帛贖之曰少而盡力老而棄其身仁者不爲毛縮馬毛縮如蝟長鳴困坂騏驥駕塩車上虞坂見伯樂而長鳴知其識已相馬失之瘦文子勞其筋力盡疥疲羸馬醫漢張氏以馬醫擊鐘老馬反爲駒馬死敝帷不棄爲埋馬也禮爲櫝魯昭公乗馬啟服塹而死公將爲之櫝子家曰從者病矣請以食之乃以帷裹不問廐焚子退朝曰傷人乎不問馬自斃以大夫葬史楚莊王有愛馬衣以文繡置之華屋席以露牀啗以棗脯馬病肥而死將以棺椁大夫禮葬之劇孟曰請以六畜𦵏人之腹也却活將軍趙固良馬死惜之不接賔客郭璞求謁吏不敢通璞曰吾能活馬固聞趍出見之乃令三十人持竿東行三十里見邱林社廟竹竿打樹果得一物似玃持歸此物見死馬嘘吸其鼻中頃之馬果起奮訊如故不復見前物牧放牧圉傳曰誰扦牧圉阜蕃畜事教擾周禮散之華山㪚馬於華山之陽而不復乗歸馬于華山之陽示不復用也書飲齕莊子馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬真性也寢訛或寢或訛場苖見上踐雪見上季春乃合累牛騰馬遊牝于牧犧牲駒犢舉書其數騰馬躍馬也遊牝牡於放牧之所也云云仲夏遊牝别羣月令孟春焚牧焚陳草也仲春通滛合牝牡也綱惡馬綱係也周禮芻牧之事牧師周禮牧師掌牧地也䘮馬勿逐七日得風馬牛因而風逸害馬黄帝初見牧童曰牧去害馬坰野駉駉牡馬在坰之野務滋囓人蹋人廐律畜生囓人者絆之蹋人者截兩耳萊夷作牧地名水害可去作放牧校人夏祭先牧塞外草羙明帝欲征匈奴竇固曰塞外草美馬不湏榖祭校人職秋祭馬社臧僕冬祭馬歩㪚馬相蹄怒則分背相蹄河決斯沉漢書河決瓠子武帝沉白馬於河而祭之火災是用宋火災馬於四墉城也城隂氣故以禳用髙帝刑白馬而盟功臣馬牲以馬祭周禮亡失爰䘮其馬于以求之于林之下塞上翁失馬人弔曰未必不爲福俄爾馬引塞外馬歸其風越逐書馬牛其風勿敢越逐岐下亡馬秦穆公亡善馬岐下野人共得食之吏欲法之公曰君子不以畜害人吾聞食善馬肉不飲酒傷人比賜酒赦之後戰二百人争死以報㤙䘮馬勿逐七日得周易廐六繫爲廐廐一僕夫周禮乗馬在廐􅀈之秣之延廐左傳新作延廐壊客館漢公孫𢎞爲丞相開東閤延賔客至劉屈氂爲相壊爲馬廐廐焚見馬死門同皁伏櫪養馬金日磾輸養馬牽馬過不敢仰視馬又獨肥孔弱不可戰李靖爲西海道大總管諸將議春草未芽馬弱不能戰靖決䇿深入賜李勣甞墜馬傷足帝以所乗馬賜之乗小馬出入東西臺又詔得乗小馬出入東西臺市馬姜晦轉太常少卿時國馬乏晦請以詔書市馬六胡州率得馬三十署游擊將軍詔可閑廐乃稍備禠紳爲靮杜譲能李克用兵至帝夜出鳯翔倉皇無知者譲能方直徒歩從十餘里得遺馬禠紳爲靮乗之市索駿馬魏徴上䟽曰今萬里遣使市索駿馬并訪怪珍薄義重利帝遣使齎金帛諸國市馬徴曰今立可汗未定即詣諸國市馬彼必以爲意在馬不在立可汗可汗得立必不懐恩諸蕃聞之以中國薄義重利未必得馬而先失義矣欵段李懐逺甞乗欵段馬僕射豆盧欽望謂曰公貴顯顧當然耶答曰吾幸其馴不願他駿廐馬萬匹張文瓘時髙宗養廐馬萬匹帑廥寖虗文瓘諫帝爲減廐馬數千出飛龍馬給畿驛李渤言道路茀不治驛馬多死憲宗得奏咨駭即詔出飛龍馬數百給畿驛毎色一隊王毛仲髙麗人從帝東封取牧馬數萬匹毎色一隊相間如錦繡天子才之請弛天下馬禁魏元忠封事請弛天下馬禁吏民得乗大馬不爲數限籍其凡勿使得隠不三年人間畜馬可五十萬乗五馬無不終櫪下韓滉自始仕至將相乗五馬無不終櫪下以私馬鞭官兵黒齒常之御下有恩所乗馬爲士箠或請罪之荅曰何遽以私馬鞭官兵乎私齎市馬趙憬咸安公主降回紇闗播爲使憬副之異時使者多私齎以市馬規利入獨憬不然駭突齊映授御史中丞徙幸梁道險澁常爲帝御㑹馬駭突帝恐傷映詔捨轡固不去曰馬奔踶不過傷臣捨之或犯清蹕臣雖死不足償責帝嘉歎䇿其馬謝秦瓊後歸王世充曰世充多詐數與下呪誓乃巫嫗非撥亂主也因約俱西走䇿其馬謝世充曰自頋不能奉事請從此辭於是降髙祖棄馬投塹劉宏基從太宗下西河宋老生敗棄馬投塹宏基斬其首禽馬數百又隋將衛文昇来拒宏基逆擊禽甲士千餘馬數百髙祖恱賜馬二十匹血非野馬張說安九姓曰吾血非野馬不畏其刺馬不善馳張垍帝西狩守咸陽房琯至召見流涕帝問均垍安在曰臣之西亦甞過其家將與偕来均曰馬不善馳後當繼行然臣觀之恐不能從陛下矣置羸軍千匹李固言爲西川節度使置羸軍千匹大馬二丈太宗文徳皇后長孫氏歸寧舅髙士亷妾見大馬二丈立后舍外懼占之青海驄西域吐谷渾地有青海者周八九里中有山須氷合游牝馬其上明年生駒號龍種甞得波斯馬牧于海生驄駒日歩千里故世號青海驄獻名馬罽賔隋漕國貞觀中獻名馬生駒汗血吐火羅比有頗黎山其陽宂中者有神馬國人游牝于側生駒輙汗血監馬至四十三萬王毛仲爲朔方討擊大帥兩營萬騎及閑廐官吏惮之無敢犯雖官田草萊樵斂不敢欺於牧事尤力蕃息不貲初監馬二十四萬後乃至四十三萬髙償馬直王忠嗣初在朔方至𤣥市輒髙償馬直諸蕃争来市故蕃馬寖少唐軍精及鎮河隴又請徙朔方河東九千騎以實軍迄天寳末益孳息助軍李嗣業有宛馬千匹上于官以助軍增太原馬千匹李吉甫增太原馬千匹軍中馬乏康承訓爲天徳軍防禦使軍中馬乏敵來戰數不勝承訓罷冗費市馬益軍軍乃奮張失馬李愿領夏綏銀宥莭度使部有失馬者愿署牒于道以金求之三日失馬并良馬一係署下且曰逸而至不告罪當死今以良馬贖愿歸失馬而縦其良境内肅然有駿馬不敢獻李聽始爲羽林時有駿馬帝在東宫使左右諷取之聽以身宿衛不敢獻於是帝曰李聽徃在軍中不與朕馬是必可任乃授河東節度使籍馬陸贄上書曰捜私牧責將帥以出兵籍馬夫私牧者元勲貴戚之門也将家者統帥岳牧之後也其復除征徑舊矣今奪其畜牧事其子孫丐假以給資装破産以營卒乗元臣貴位解體笞折馬足歸登家僮爲馬所踶笞折馬足登知不加責健馬杜牧言曰山東産健馬下者日馳二百里所以兵常當天下老馬不棄朱忠亮授四鎮節度使吏白耄卒不任戰者可罷荅曰吾於老馬不棄況戰士乎聞者莫不感奮停給王鍔擢爲鴻臚少卿先是天寳末西域朝貢酋長及安西北廷校吏歳集京師者數千人隴右既䧟不得歸皆仰廪鴻臚禮賔月四萬緡比四十年名田養子孫如編民至是鍔悉籍名王以下無慮四千人畜馬二千奏皆停給解鞍自如楊行宻傳朱全忠率葛從周萬騎攻光州柴再用遣小校王稔以輕騎覘賊汴兵圍之候者請救再用曰稔必殺賊第無徃稔解鞍自如暮依越歩戰殺傷多汴兵乃解時亡馬法峻稔追汴軍得馬乃還乗白馬履行陣王審知乗白馬履行陣望者披靡號白馬將軍多畜善馬髙祖皇后竇氏帝在焬帝時多畜善馬后見曰上性樂此盍以獻徒㽞之速罪無益也不聽頃果坐譴乗止一馬朱敬則爲廬州刺史代還無淮南一物所乗止一馬害圉人栁公綽廐馬害圉人公綽殺之或言良馬可愛曰安有良馬而害人乎九尺劉從諫畜馬髙八尺獻之帝帝不納疑仇士良所沮怒殺馬益不平也如鴨而健初大將與萬江者本退渾部李部玉送回紇道太原舉帳從至路州牧津梁寺地美水草馬如鴨而健世所謂津梁種者歳入馬價數百萬十驥回紇骨利幹因使者獻馬帝取其異者號十驥皆爲美名曰驣霜曰皎雪騘曰凝露騘曰縣光騘曰決波騟曰飛霞驃曰發電赤曰流金􅚷曰翔麟紫曰奔虹赤厚禮其賜廐牧地裴延齡妄言長安咸陽閒得陂艿數百頃願爲内廐牧地水草甘薦與苑廐等帝信之出騎弱馬李賀毎旦日出騎弱馬從小奚奴背古錦囊給乗輿馬喬琳次盩厔詭言馬殆不進帝給乗輿馬乗小馬至内省許敬宗同東西䑓三品年老不任趍歩特詔與司空李勣朝朔日聽乗小馬至内省鬱屈蜀馬朝野僉載曰唐郎中張元一以唐波若矮短自爲鬱屈蜀馬舞馬樂志𤣥宗甞以馬百匹盛飾分左右施三重榻舞傾杯數十曲壯士舉榻馬不動樂工少姿秀者十數人衣黄衫文玉帶立左右毎千秋節舞於勤政樓下國之武備五行志永隆二年監牧馬大死凡十八萬匹馬者國之武備天去其備國將危亡矣肉􅐢鱗臆開元二十九年三月滑州刺史李邕獻馬肉􅐢鱗臆嘶不類馬日行三百里吐珠大和九年易定馬飲水因吐珠一以獻尾皆咤蓬光啟二年夏四月僖宗在鳯翔馬尾皆咤蓬如篲咤怒象以馬爲事五代李金全爲彰武節度使罷歸獻馬數十匹居數日又以獻明宗謂曰卿患馬多邪何進獻之數也且卿在涇州治狀如何無乃以馬爲事乎金全慙不能對一丈烏寇彦卿太祖賜以所乗愛馬一丈烏緑野馬五代回鶻地出緑野馬負五石馳安禄山毎乗驛入朝半道必易馬號大夫換馬臺不爾馬輒仆故馬必能負五石馳者乃勝載自在將軍東漢劉旻契丹兀欲聞旻自立遣其貴臣述軋髙勲以自愛黄騮報騪旻爲黄驑治廐飾以金銀食以三品料號自在將軍馬犇乏宋申錫二月晦羣司皆休中人馳召宰相馬犇乏死於道易所乗以復命良馬人所愛吐谷渾獻名馬帝問馬種性使者曰國之最良者帝曰良馬人所愛詔還其馬朱鬃白馬五代南唐劉龑雲南驃信鄭旻遣使致朱鬃白馬以求㛰櫪馬直數百金者常十數裴冕龍種磨鄰有千里馬傳爲龍種九花虬唐杜陽編代宗命御馬九花虬以賜子儀九花虬即范陽節度使李徳山所貢額髙九寸毛拳如鱗頭頸鬃鬛真虬龍也毎一嘶則羣馬聳耳以身披九花紋故號九花虬神智騘徳宗西幸有二馬一號神智騘一號如意騘皆耳中有毛引之可長一尺而進退緩急皆如意花木方春上幸宫苑侍者進瑞鞭上指二駿因謂近臣曰昔朕西幸有二駿今獲此鞭可謂三絶㸔花馬開元遺事長安侠少毎至春時結朋各置馬飾錦韀金絡並轡於花樹下徃来使僕從執酒柶而隨之遇好花則駐馬而飲也望雲騅徳宗幸梁御馬號望雲騅駕還飼以一品料暇日牽而視之至必長鳴四頋若感恩狀人多圖之出李肇國史補忽雷駮秦叔寳所乗馬號忽雷駮常飲以酒毎於月明中試能竪越三領黒氊酉陽雜俎明宗有馬三萬五千眀宗問延光馬數㡬何對曰騎兵三萬五千明宗撫髀歎曰吾居兵間四十年自太祖在太原時馬數不過七千莊宗取河北與梁家戰河上馬纔萬匹今有馬三萬五千匹而不能一天下吾老矣馬多奈何延光因曰臣甞計一馬之費可養歩卒五人三萬五千匹馬十五萬兵之食也明宗曰肥戰馬而瘠吾人此吾所醜也范延光傳騏驥生絶域自今無匹儔韓退之駑驥詩饑食玉山禾渴飲醴泉流同上秣之稊粃飲之沔池廐櫪也劉禹錫說驥上可以獻帝閑次可以鬻十金同上夫昔之翹陸也謂將蹄將齧抵以撾䇿不知其籋雲耳昔之吹嘘也謂爲疵爲癘投以藥石不知其噴玉耳同上我䇿垂空我鑣方揚振鬛軒昻僑如飛翔翹翹其雄也我鞍如山我轡如組弭毛容與宛若孤處靡靡其柔也夷則沮洳髙則􅮟巇虎咆空林䰥鬭荒馗風雨孤征簡書之威俾予弗顛我馬焉依屑屑其勞也非徳而何劉禹錫文天育驃騎歌是何意態雄且傑駿尾蕭梢朔風起毛爲緑縹兩耳黄眼有紫㷔雙瞳方杜甫騘馬行雄姿逸熊何崷崒顧影驕嘶自矜寵隅目青熒夾鏡懸肉􅐢磈礧連錢動赤汗㣲生白雪毛銀鞍却覆香羅帕同上千里馬馬之千里者一食或盡粟一石今食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足才羙不外見且欲與常馬等不可得安求其能千里也韓文越􅠓駿越􅠓之西多薦草産善馬世稱越􅠓駿始生若羔歳中紐莎縻之飲以朱潘七年可御日馳數百里南蠻傳舞馬帝教舞馬四百蹄分爲左右部各有名稱曰某家驕云云禄山入京取數十疋歸范陽禄山敗入田承嗣軍中不知其技也一曰大饗樂作馬聞樂而舞廐人以為妖擊之至斃明皇録立仗馬李林甫召諫官謂曰今明主在上羣臣將順之不暇何用多言子不見立仗馬乎終日無聲而食二品料及其一鳴即黜之雖欲勿鳴其可得乎譚賔録項王之錐符主之騧桓氏之騘晉侯之駿魏公絶影唐國驌驦劉之的顱吕之赤兎其狀則八尺之戎七尺之騋六尺之驕三尺之果邵昻碑八坊唐新造於赤岸澤僅得牝牡三千匹命太僕張萬歳傍隴右馴字之四十年孳婉成七十萬六千匹後於岐邠等四境分爲八坊五在岐州餘在三郡有保樂甘露等坊文粹縑易馬張燕公監牧王禹仲頌徳碑序自正觀訖于麟徳四十年間至七十萬匹置八使以董之設四十八監以掌之于斯之時天下以一縑易一馬秦漢之盛未始聞也頭上銳耳批秋竹脚下髙蹄削寒玉杜甫李鄠縣丈人胡馬行鳯臆龍鬐未易識側身注目長風生同上左右仗廐百官志左右仗廐左曰奔星右曰内駒兩仗内又有六廐左飛右飛左萬右萬東南内西北内官馬坊園苑有官馬坊毎歳河隴羣牧進其良者以供御同上仗内六閑武后通天元年置仗内六閑一曰飛龍二曰祥麟三曰鳯苑四四鵷鸞五曰吉良六曰六羣同上閑廐馬萬疋疋開元初閑廐馬至萬疋疋駱駝巨象皆養焉同上印以三花飛鳯之字凡外牧嵗進良馬印以三花飛鳯之字尚乗局以八馬列宫門之外飛龍廐曰以八馬列宫門之外號南衙立仗馬同上凡驛馬給地四頃蒔以苜蓿官酉志駕部風騣霜鬛栁宗元晋國多馬四散惝怳開合萬狀喜者鵲厲怒者人搏决然坌躍千里相角風騣霧鬛斸山扶壑耳揺層雲腹捎衆木寂寥逺遊不夕而復逐犇星先飄風栁宗元荅問且夫白蟻緑耳之得康莊也逐犇星先飄風瑶光殿天寳中大宛國進汗血馬六疋甚大一曰紅叱撥二曰紫叱撥三曰青叱撥四曰黄叱撥五曰丁香叱撥六曰桃花叱撥上乃製名一曰紅玉輦二曰紫玉輦三曰平坐輦四曰陵雲輦五曰飛香輦六曰百花輦復命圖於瑶光殿仍改爲觀驥殿秦再思紀異録慶雲遙覆天寳中隴右莭度皇甫惟明奏龍支縣人厙狄孝義有馬生龍駒經九旬有九日身不生毛臣就撿視時有慶雲五色遥覆馬上久而不散請付史官舊唐書腕促蹄髙如踣鐵交河㡬蹴層冰裂杜甫髙都護騘馬行腕促蹄髙如踣鐵交河㡬蹴層冰裂五花㪚作雲滿身萬里方看汗流血願騰六尺馬背若孤征鴻杜甫苦雨奉寄王徴士盍簮喧櫪馬守歳因風想玉珂宿左省龍種馬西域箇失宻出龍種馬世傳地本龍池龍徙水竭故徃居之冀北馬多於天下韓愈序伯樂一過兾北之野而馬羣遂空夫伯樂雖善知馬安能遂空其羣邪解之者曰吾所謂空非無馬也無良馬也伯樂知馬遇其良輒取之羣無㽞良馬紫驑行且嘶雙翻碧玉蹄李白臨流不肯渡似惜錦障泥同上金羈絡駿馬同上馬逸墜林下尉遲恭隠太子死領騎七千趍𤣥武門王馬逸墜林下馬者兵之用也監牧所以蕃馬也其制起於近世唐之初起得突厥馬二千匹又得隋馬三千於赤岸澤徙之隴右監牧之制始於此其官領以太僕其屬有牧監初用太僕少卿張萬歳領羣牧自貞觀至麟徳四十年間馬七十萬六千置入坊岐豳涇寧間唐兵志並同上瓜州飼馬以薲草酉陽雜俎𤓰州飼馬以薲草沙州以茨萁凉州以㪍突渾蜀以稗草以蘿蔔根飼馬馬肥安北飼以沙蓬狼針馬體名馬體名有輸鼠外鳬烏頭龍翅虎口同上廻毛在頸白馬黑毛鞍下腋下廻毛右脇白毛左右後白曰馬四足黑目下横毛黄馬白喙旋毛在吻後汗溝上通尾本目赤睫亂及反睫白馬黑目目白却視並不可騎夜眼名附蟬戸肝名懸䗦亦曰雞舌緑祑方言以地黄甘草噉五十歳生三駒百獸韀五行志中宗朝安樂公主令尚方以百獸毛爲韀回視之各見本獸形也天馬歌天馬來出月支窟背爲虎文龍翼骨嘶青雲振緑髪蘭筋權竒走滅沒李白六馬滚塵圖龍城寧王善畫馬開元後花蕚樓下壁上有六馬滚塵圖内明皇最眷愛玉靣花騘謂無纎悉不備風鬃霧鬛信偉如也後壁間恰有五馬其一失去信神物與變化俱也凡馬有左右監以别其麄良以數紀爲名而著其簿籍細馬之監稱左麄馬之監稱右諸牧監凡馬各以年名籍之毎歳季夏造至孟秋羣牧使以諸監之籍合為一同上常以仲秋上於寺同上典廐令掌繫飼馬凡細馬一中馬二駑馬三各給一丁同上六典凡蜀馬給藁八分其圍粟一斗鹽六勺乳者倍之同上凡監牧孳生過分則賞其有死耗者毎歳亦以率除之若歳疫以私畜凖同者以疫除毎歳進馬麄良有差史司毎歳簡細馬五送敦馬一百疋進之若諸監之細馬生駒以其數申所由司次入寺其四歳以下麄馬毎年簡充諸衛官焉乗黄古神馬名亦曰飛黄背有角日行萬里六典凡外牧進良馬印以三花飛鳯之字而為誌焉尚乗奉御掌内外閑之馬辨其麄良而率其習教六閑一曰飛黄二曰吉良三曰龍媒四曰騶駼五曰駃騠六曰天苑左右凡十有二閑分為二廐一曰祥麟二曰鳯苑以繫飼馬山崆峒兮水嗚咽泉噴玉兮草汗血聚如花兮㪚如雪文粹張說頌牛二殺牛駕車牧牛戰敵為犧附踐踏疾疫白爾牛来思其耳濕濕誰謂爾無牛九十其犉詩叩角寗戚叩角而為商歌齊桓公知而舉之蹄角牛羊謂之蹄角谷量牛馬言其多也㽞犢時苖為壽春令牛生犢罷官㽞之曰此淮南所生佩犢漢龔遂字少卿為渤海守人多帶刀劒令賣劒買牛賣刀買犢何爲帶刀而佩犢見月喘呉牛風逸見馬門誤認後漢劉寛文饒有人失牛就寛車中認之寛下車歩歸後人得牛送牛叩頭謝寛寛曰物有相類事有脫誤何謝之有宜稌周禮食醫牛宜稌公牛又牛人掌養國之公牛也秋宜犢麛膳膏腥云云牛夜鳴則㾞㾞臭也羊幽反執靷禮凡獻牛者執靷伐冰之家不畜牛羊黄牛之革易曰鞏用黄牛之革鞏固也言其堅韌不變也稼穡之資易注云牛者稼穡之資畜牝牛吉易蹄角千百六十七頭漢貨殖傳謝拯溺子路拯溺其人拜之以牛子路不受孔子曰魯人必不拯溺矣買晋食貨志云魏時濟北顔斐爲京兆尹人無車牛教閑月取材作車并養猪殺貴賣以買牛一二年間皆有牛也又朱鄆為郡吏有青牛太守阮况常欲市暉牛暉不與及况卒贈送其子曰阮君生時不敢以汚君卒而與之明非有愛也八百里晉書王愷牛名八百里駮常瑩其蹄角王武子與射賭得趍左右探心作炙一啖而去瑩蹄角見上賣鹽買魏衛凱伯儒請致使監賣得益市犂牛若有歸之民以給之賣豬買見上賣老牛張茂建康元年辟爲掾官老牛數十頭將賣之茂曰殺牛有禁買者不得屠齒力疾老又不任耕駕是無用物牧人利不可帝然乃止牛肥百里奚爵禄不入於心故飯牛而牛肥也瑞列子黒牛生白犢孔子曰瑞也云云金牛瑞應圖曰瑞氣也土開闢則至也潭竺法羅山記曽城縣有金牛潭人見牛出其中金鎻引袁喬江賦昔有人釣於牛渚得金鎻引有金牛推而捨之木牛蜀志諸葛亮復出祁山以木牛運木牛者方腹曲頭一脚四足頭入腹中舌著於腹載多而少行宜可大用不可少使持行者數十羣行者二十里曲者為牛頭雙者為牛蹄横者為牛項摶者爲牛足也千斤劉景升有千斤大牛噉芻豆十倍於常牛負重致逺不如羸牸書帛飯牛史齊人少翁以鬼神事武帝帝以為文成将軍後寵衰乃為書帛以飯牛佯不知也言此牛腹中有竒殺而視之得書甚怪其子疑識其手書問之果然爲書乃誅之坤爲牛易四耳八足四耳見駕車門注捜神記晋大興元年武陽太守王諒生牛一頭八足兩尾共一腹厭傷寒疾郭璞洞林曰義興方叔保得傷寒垂死令璞占之不吉令求白牛厭之求不得即曰有大白牛從西來遥徃臨叔保驚惶疾即愈東夷占骨西河畜牸楊方五經鉤深曰東夷之人以牛骨占事呈吉示凶無往不中孔叢曰猗頓魯之窮士聞朱公富徃問其術告之曰欲速富畜五牸乃適西河大畜于猗氏之南十年子息萬計樹精畜中記萬歳樹精為青牛足出背上漢梁孝王北獵獻牛者足出背上有皮牛則有皮傳殺牛古人有言曰殺老牛莫之敢尸尸主也諸侯無故不殺牛禮觳觫孟子曰齊宣王見牽牛過者問之對曰將釁鐘王曰吾不忍其觳觫若無罪而就死地以羊易之見牛未見羊也見無全牛庖丁解牛砉然莫不中者丁曰臣始解牛時所見無牛三年之後未甞見全牛也今臣之刀十九年所解千牛而刃若初發硎其於遊刃有餘地角羙者身必死丈子牛人周禮地官凡賔客共積膳之牛饗食供膳羞之牛軍事供犒牛䘮事供奠牛而供其盆簝盆簝以盛其血肉也東鄰殺牛不如西鄰之禴祭易割雞焉用牛刀盗殺郭舒雅行鄉人盗殺舒牛後事覺来謝舒曰君飢所以食牛餘肉可共啖之世人皆伏埋肉周訪士逹鄉人盗訪牛殺於塚間訪尋得宻埋其肉不使人知殺耕牛董卓仲頴少遊𦍑中盡與豪帥相結後耕於野諸豪帥有從之者卓殺耕牛與宴樂豪感其意斂得雜畜千餘頭送遺之九牛亡一毛司馬遷曰僕伏法受誅若九牛而亡一毛放牧桃林之野放牛于桃林之野示不復用也或寢或訛不狘不獝不疾瘯蠡蠡疥癬也言犧牲畜擾来思遊牝于牧月令藪牧牧于藪澤牧人掌牧六畜而阜其物牧圉阜蕃馴擾牧田畜事教擾通滛合牝牡也䘮牛于易䘮失於平易之處不在於難處易爾牧來思荷蓑荷笠詩下來日之夕矣牛羊下来詩飲牛巢父飲牛於穎水同皁牛馬同皁牛有牧馬有圉云云考牧羙宣王詩誰謂爾無牛九十其犉萊夷作牧原藪顔回曰放牛於原藪牽凉處魏志或有牛暴管寧禾寧爲牽凉處自為飲食遇牛主得牛大慙爲犧三犧皆用介葛盧聞牛鳴曰是生三犧皆用之矣犂牛之子騂且角子謂仲弓葭芻楚王聘莊周周謂使者曰子不見犧牛乎衣以繒綵飼以葭芻牽入太廟時欲作孤犢安可得哉遂不受握角合禮騂毛中牲餼牽竭矣左傳牛牲周禮享牛祭廟之牛求牛祈鬼神求福之牛也周禮天子以犧牛全色牛諸侯以肥牛大夫以率牛求得即用無所擇也一元大武祭廟之名武跡也帝牛在滌稷牛唯具繫牛凡犧牲必繫于牢芻之三月角傷傳人鼠食郊牛角改卜牛非禮也免牛之禮榖梁四卜郊不從乃免牲免牲者為之緇衣而熏裳有司𤣥端奉送于南郊免牛亦然展觔角而知傷展道盡矣見上注楅衡周禮封人掌飾其牛牲設之楅衡置靷供其水藁注楅衡所以持牛令不觸人也踐蹋蹊人之田申叔時曰牽牛以蹊人之田信有罪矣奪之牛罰亦重矣傳瞻彼行葦牛羊勿踐履詩注成周室厚仁繫馬踐葵牽牛蹊田犯人之禾季子臯葬妻犯人之禾申祥請庚之庚償也子臯曰以吾為邑宰買道而葬後難繼也犯麥曺公軍行令曰犯麥者斬所騎馬忽騰驚犯麥曰吾為軍帥不可斬乃下馬自割髪以徇之犯禾管寧㓜安鄰有牛犯寧禾者寧牽著凉處飲食遇主其主乃大慙如犯於嚴刑也又朱冲巨容有牛犯冲禾數畝持芻送而無恨色主媿之乃不復為暴駕車肇牽車牛晥彼牽牛不以服箱詩青牛駕老子乗青牛駕以薄版車而度闗孔阜牛壯也服習任重致逺服牛乗馬引重致逺易韅靷鞅靽鞭䇿服紺轅牽旁轅外輓之牛見周禮始駕謂服箱也㪚牛於桃林之野不復用也禮將相乗漢初將相或乗牛車四耳元封二年大秦獻花蹄牛髙六尺四耳尾繞角生也戰敵伐蜀蜀王本紀秦恵王欲伐蜀乃刻五石牛置金於後曰此牛能糞金蜀王即發五丁力士拖入蜀因成道秦乃使張儀隨石牛路伐蜀破燕田單守城拒燕夜取千牛以絳畫五色綵東刃於角灌脂束葦於尾燒而夜縦牛令壯士随而奔燕軍燕軍見之皆為龍文所觸皆死遂破燕復七十城也犒秦傳曰秦伐鄭次滑商人弦髙以牛十二犒秦師使諜告鄭疾疫問喘漢邴吉少卿為丞相見人逐牛牛喘吐氣問牛行㡬里人或怪之吉曰春少陽用事未可熱恐牛行近因暑故喘此是氣失莭宰相當憂牛雖瘠僨於豚上其畏不死乎傳郊牛口傷醫黄憲叔度父為牛醫文角吳牛土牛火牛騂牛䑛犢金牛鐵牛孔和市張廷珪㑹詔市河南河北牛廷珪上書曰今河南河北牛疫十不一在詔雖和市其於抑奪耕所資又日食所資在耕耕所資在牛牛廢則耕廢耕廢則食去多疫宋務光上書自春及夏牛多病死疫氣浸滛傳曰思之不睿時則有牛禍意者萬㡬之事陛下未躬親乎椎牛犯灋劉宏基征遼度後期且誅遂與其屬椎牛犯灋壽天竺其畜有稍割牛黒色角細長四尺許十日一割不然困且死人飲其血或曰夀五百歳牛夀如之謡竇建徳竄牛口谷初其軍有謡曰豆入牛口勢不得久果敗倒石李絳時盛興安國佛祠吐突承璀請紀聖徳絳請罷之奏愈切帝命百牛倒石盜牛張允濟仕隋為武陽令元武民以牸牛依婦家者久之孳十餘犢將歸而婦家不與牛民訴縣縣不能决乃詣允濟允濟曰若自有令吾何與為民泣訴其抑允濟因令左右縳民蒙其首過婦家云捕盜牛者命盡出民家牛質所来婦家不知遽曰此壻家牛我無豫即遣左右撤䝉曰可以此還壻婦家叩頭服罪元武吏大慙善觸宋令文有力都下有牛善觸人莫敢嬰令文直徃㧞取角折其頸殺之楊再思於時水沴閉坊門以禳再思入朝有牛䧟于濘叱牛不前恚曰癡宰相不能和隂陽遣我艱于行再思遣吏謂曰汝牛自弱不得獨責宰相賜四十角回紇葉護使首領逹于等先到扶風見郭子儀既行日賜牛四十角云乗牛經酒賜王績乗牛經酒賜㽞或數日飽乳犢子朝野僉載唐豫章令賀若瑾眼皮急項轅麄張鷟號為飽乳犢子以蒲韉乗牛李宻聞包愷在緱山徃從之以蒲韉乗牛挂漢書一帙角上行且讀竹畫牛背爲字陸羽幼時師使牧牛三十羽潜以竹畫牛背為字青牛逐朱虎五行志徳宗時或為詩曰此水連涇水雙眸血滿川青牛逐朱虎方號太平年桃林班特寗茵叚大僚莊南山下月夜有叩闗稱桃林班特處士相訪繼而南山班寅將軍來謁茵為置酒及明視門外惟牛蹄虎跡而已廣記鎻而爲伏牛張說蒲津橋賛黄河上有三橋蒲津是其一隔秦稱塞臨晉名闗其舊制横絙百丈亦云固矣開元十二載皇帝乃授彼有司俾鐵代竹結而為連鎻鎔而為伏牛偶立於兩岸襟束於中渾鎖以持航牛以縶纜亦將厭水物奠浮梁光禄屠者太和光禄署欲宰牝牛牛非久當犢生或曰可易之屠者操刀直前畧不介意牛乃屈膝拜之亦不肯退遂俱殞於刃下而屠忽狂惑失常毎日作牛鳴食草身入泥水以頭觸物久之乃定原化記黒牛出圏五代劉知俊奔于蜀王建雖待知俊甚厚然亦隂忌其材蜀人亦共嫉之知俊爲人色黒而其生歳在丑建之諸子皆以宗承為名乃於里巷造為謡言曰黒牛出圏㯶繩㫁建益惡之垂耳抱角毛革踈厚栁文鬭辛讜少耕于野有牛鬭衆畏奔踐讜直前兩持其角牛不能動久而引觸竟折其角帶瓢史徳義居虎邱山騎牛帶瓢出入㕓野轅下李石奏咸陽令韓遼治興成渠起咸陽抵潼闗三百里無車輓勞則轅下牛盡可耕永利秦中矣遇牛方廻杜陽雜編代宗至陕因望鐵牛蹶然謂左右曰朕年十五六宫中有尼號功徳山言事徃徃神驗屢撫吾曰天下有災遇牛方廻今見牛也朕將回爾相牛灋酉陽雜俎相牛灋岐胡有夀膺匡欲廣毫筋欲横蹄後筋常有聲有黄也角冷有病旋毛在珠泉無夀睫亂觸人衘烏角偏妨主毛少骨多有力溺射前良牛也踈肋難養三歳二齒四歳四齒五歳六齒六歳已後毎一年接脊骨一節寢訛爾牛時寢訛韓文晚秋郾城聫句牛色變白嘉話蔡州將破有水牛黒色入池浴既出身白皎然金犢子龐帝師養一牸牛一赤犢子前後生五犢得絹一百疋及翻轉至萬匹時號金犢子朝野僉載渉淖躋髙甞驅是牛引千鈞比登太行南並商嶺掣以回之叱以聳之雖渉淖躋髙轂如蓬而輈不僨乃今廢矣劉禹錫嘆牛牟然而鳴黄鍾滿脰扺觸隆曦日耕百畝栁宗元牛賦䧟泥蹷塊常在草野同上鄭牛識字白居易詩云䧟泥蹷塊吾甞歎注云鄭元家牛觸墻成八字陂中饑烏啄牛背張籍牧童詞被野馬牛被野人行數千里不齎粮食貨志一牛皆天下之美俊者葉城婦耿氏其家有牛澤而角者忽有二鬼入圏視牛曰引重致逺毛角筋骨可愛者吾州無此牛一牛皆天下之美俊者其婦視牛則惴惴然汗流若沃水矣其翁染取藍花塗之纔畢有軍吏紫衣乗馬𨗳從數十騎笑而入視牛則異前所報軍吏大怒呼牛主問之數人登階捽其翁以出長幼遶而呼之婦獨否笑汲水洗牛藍色盡而翁復蘓視其牛已死矣幽怪録金牛御史武后時嚴昇期攝御史廵察江南嗜牛肉而多受金號金牛御史生三角長安中宗晉卿家牛生三角志生二首大厯八年武功櫟陽民家牛生犢二首上生五足咸通七年荆州民家牛生犢五足上探名得者先市牛韋宙為永州刺史民貧無牛以力耕宙為置庄二十家月㑹錢若干探名得者先市牛以是為凖牛喘甚焚角韓愈聫句禁屠牛韓滉以賊非牛酒不嘯結禁屠牛以絶其謀羊三放羊附犧牲爲贄白爾羊来思其角戢戢蹄角之産跪乳羔羊有跪乳之禮人取法焉羝羊觸藩羸其角易叱石黄初平叱石成羊乗車衛玠少乗羊車入市時謂之玉人晨飲孔子為司寇沈猶氏不敢晨飲其羊士刲羊無血卿羔贄孟春食麥與羊仲春獻羔開冰宜黍周禮食醫羊宜黍大夫無故不殺羊春宜羔豚膳膏薌泠毛羊泠毛而毳羶不可食不畜伐冰之家不畜牛羊易牛孟子釁事見牛門其父攘羊而子證之語殺華元殺羊食士其御羊斟不與及戰奔入於鄭左傳云千足食貨志羊千足其人與千户矦等羔羊詩篇名大夫在位節儉徳如羔羊屠屠羊説不受賞曰大王反國説反屠羊鄭伯有死於羊肆傳鄰人亡羊言多岐路列子童羖俾出童羖注羖羊不童也無角曰童羖之性皆角童羖必無之物五色瑞應南越志任尉他之時有五色羊以為瑞因圖之於府㕔矣四角周成王時人獻四角羊玉羊瑞噐也鍾律調和五聲當節則見木羊列仙葛田好刻木羊賣之一旦騎羊入蜀蜀人競追之一角白澤圖曰羊有一角當頂上龍也殺之震死長髯主簿羊一名土恠嶽精國語桓子穿井獲物如缶其中得狗問孔子孔子曰以丘所聞羵羊土之精也周易謀類曰太山失金雞西嶽玉羊鄭𤣥注曰金雞玉羊二嶽之精噉珠劉慶忌幽明録曰洛有洞穴婦殺夫不經多時至一穴宫館金飾明踰三光人長三丈如此九處後至告飢長人指樹下一羊令㗖捋羊鬚得一珠長人次亦得亦取後令噉療飢請問九處名求請不得荅云君去也丹毛續異記吳興庾亮永明八年護軍府史常映處有羊聲疑為神恠見其林下羊也髙二尺許毛若丹光輝滿室白血穆天子傳曰犬戎朝天子于雷首之河乃獻良馬四駟天子使孔牙受之曰雷水之中爰有黒牛靣角黒羊白血也鄭伯牽傳楚子圍鄭鄭伯肉袒牽羊五羖皮史秦以五羖羊皮贖百里奚於楚楚人許之豺狼逐漢書譬如使豺狼逐羣羊無異駈羊攻虎一狼走千羊羊毛裹雪蘓武飢竆以羊毛裹雪而吞之羊車晋宫人以塩塗竹葉引羊車懸頭止盜五行書云割尾更生西域志云敗羣史羊敗羣於卜式偏怨華元傳啖毳蘓武坐皮楊茂將狼史四皓謂使太子將兵無異使狼將羊也放牧誰謂爾無羊三百其羣詩或寢或訛麾肱麾之以肱畢来既升言馴擾從人意畜擾化石具上注敗羣漢卜式牧羊上林嵗餘羊肥息上善之式曰非獨羊治人亦猶是惡者輒去無令敗羣從上拜以緱氏令荷箠列子楊朱曰夫牧羊者百羊為羣使五尺童子荷箠而随之欲東而東欲西而西治天下亦運諸掌亡羊莊子臧與榖牧羊而俱亡其羊問臧何為挾䇿讀書問榖何事慱塞以遊亦亡其羊二人者業雖不同其於亡羊一也十羊九牧荷蓑牧羊于牧牧田畜事教擾通滛並周禮阜藩馴擾䘮羊于易易平也言不待險難而失之牧羊路温舒父使牧羊於澤中截蒲冩書爾羊來思矜矜兢兢竝堅强皃詩養畜鳥獸藪牧云云羝羊乳匈奴罰蘇武於北海牧羝羊乃得歸注羝羊不當乳産亦不許歸也日之夕矣羊牛下来犧牲子貢欲去告朔之餼羊士刲羊亦無􅎺􅎺血也柔毛羊曰云云三十惟物以備三牲餼牽竭矣傳羊牲餻羔修羔以為牲禮餻羔鴈者以繢灋羊饔羞之羊釁廟用羊或剥或烹既有肥羜以速諸父詩注云羜未成羊絜爾牛羊以往蒸甞羵首牂羊羵首詩爲贄卿贄羔死義好仁凡所贄羔示有角而不用好仁者殺之不謗死義者也羔欲其母乳必跪類知禮取以爲贄尚羔魯定公㑹晋師亍瓦范獻子執羔中行文子趙簡子皆執鴈魯於是始尚羔魯以前同贄始知執羔之貴孔上嶲州鬭羊張說王君㚟破吐蕃於青海西說䇿其且敗因上嶲州鬭羊於帝以申諷諭曰使羊能言必將曰鬭而不解立有死者所賴至仁無茂量力取歡焉帝識其意納之賜綵千匹肉非黄羊張說慰安羅㧞野固等直詣其部宿帳下副使李憲以虜難信不宜渉不測說報曰吾肉非黄羊不畏其食生土中有羊生土中臍屬地割必死䝉皮李茂勲傳王處存以輕兵三千䝉羊皮夜布之野李全忠軍望為羣羊争趍之賜八百蹄回紇逹于既行日賜羊八百蹄雨工五行志乾符二年洛陽建春門外因暴雨有物墮地如羖羊不食頃之入地中其跡月餘不滅或以為雨工也占曰當旱鬭海岸西舎利凡曲名十有二五曰鬭羊勝驃云来乃昔有人見二羊鬭海岸強者則見弱者入山時人謂之来乃来乃者勝勢也吐珠五代南唐劉鋹四年苑中羊吐珠樊胡子以為符瑞諷羣臣入賀粧㸃芳草雲仙㪚録竆幽記曰午橋庄小兒坡茂草盈里裴晉公毎使數白羊㪚于坡上曰芳草無情賴此粧㸃尾如翠色酉陽雜俎􅄢賔國出野青羊尾如翠色土人食之玉羊呉越錢元瓘志是有蕃僧以玉羊一獻於鏐曰得此當生貴子元瓘果以丁未歳生九國志青羊從容録魏郡大旱徧禱山岳不應或言西沉陸先生請之必驗太守已下携杏酒青羊告于山中束修羊唐餘録倪若水借書者先投束修羊驅羊王世充傳術士桓法嗣上閉房記畫一男子持一竿驅羊狀豢羊望翼盛均大旱解郡守不清其政而待龍貸雨是猶乗適海豢羊望翼何可冀乎輟御前羊肉上輟御前羊肉以一盤子賜全誨以下皆再三辭譲上曰難得之際且欲同味韓渥金鑾宻記羊有二種不可食楊膳夫録羊有二種不可食毛長而黑壯者曰骨䍽白而有角者曰古羊皆羶臭發病羊之大者不過五十斤奚中所産者百餘斤御者不及華元名大夫也殺羊而御者不及栁子饗軍堂杜邠公食羊中朝故事邠公杜悰福壽少倫日食五飱一食之費皆至萬錢京西李客見人牧羊遍滿山谷不知㡬千萬口詰之自何而来自鄜夏供相公食耳指顧之際轉首恍然並無所覩乃神靈所授也長生供奉凡羊至厨而乳者釋之長生大齊日尚食進蔬食釋所殺羊為長生供奉百官志羊跪乳智也宋子嵩化書紫煙客金華牧羊兒乃是紫煙客李白蘓武看羊䧟賊庭杜甫濮固羊向北有濮固羊大而羙雜俎羊羣選人冗冗甚於羊羣出朝野僉載白孔六帖巻九十六
