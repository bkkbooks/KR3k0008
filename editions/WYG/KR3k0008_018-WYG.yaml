body:
  text: 白孔六帖卷十八唐白居易原本宋孔𫝊續撰擇夫一待妻以禮二烈婦三家道四父子五母子六擇夫一女自擇冥婚附白美如陳平陳平長欲娶冨者莫肯與貧者平亦耻之冨人張負有女五嫁而夫輒死人莫敢娶平欲娶之負謂其子仲曰吾欲以女妻平仲曰平貧不事産業負曰人有美如陳平肯長貧賤乎遂以女妻平徐吾犯妹左傳鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使彊委禽焉犯請於二子請使女自擇焉子晳盛飾而入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也遂適子南公孫楚也王濬妻晉王濬字士冶為河東從事刺史徐邈有女才淑擇夫未嫁邈乃大㑹佐史令女於内觀之指濬告母邈遂妻焉季芉楚昭王出嫁妹季芉曰所謂女子逺丈夫也鍾建負我矣請妻鍾建吴人入郢之時昭王奔隨鍾建負季芉走而從王賢如伯鸞後漢梁鴻字伯鸞同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁年至三十父母問故女曰欲得賢如伯鸞者鴻聞而娶之吕子衡吕範字子衡邑人劉氏家富女美範求之女母嫌欲勿許與劉氏曰吾觀吕子衡寕當乆貧者乎遂與婚𡨕㛰嫁殤周禮媒氏禁嫁殤者遷葬者合葬魏武帝愛子蒼舒卒欲求邢原女合葬原拒之曰合葬非禮也又聘甄氏亡女合葬也又明帝愛女淑薨取甄氏亡從孫合葬死則同穴孔畫孔雀屏間請㛰者射髙祖順聖皇后竇氏父毅在周為上柱國尚武帝姊襄陽長公主常謂主曰此女有竒相且識不凡何可妄與人因畫二孔雀屏間請㛰者射二矢隂約中目則許之射者閱數十皆不合髙祖最後射中各一目遂歸於帝碧鸛鵲裴寛景雲中為潤州參軍事刺史韋詵有女擇所宜歸引為按察判官許妻以女歸語妻曰常求佳壻今得矣明日幃其族使觀之寛時衣碧瘠而長既入族人皆笑呼為碧鸛鵲詵曰愛其女必以為賢公侯妻也何可以貌求人卒妻寛擇壻車新進士大讌于曲江其日公卿家傾城縱觀有若東榻之選者十八九細車珠映擳比摭言折節晚學陜州刺史王當有女令袁天綱擇壻曰惟果毅姚某有貴子嫁之時人笑焉乃元崇也時二十三好獵都未知書母勸令讀書折節晚學以晚節入仕至宰相出太平廣記牽絲為㛰張嘉貞有五女皆絶色欲納郭元振為壻令五女各持一絲元振從便牽之待妻以禮二白始由義合終以禮成如賔齊眉見面漢朱博字子元夜寢早起妻稀見其面若嚴君後漢張湛字子孝矜嚴好禮居處必自修整雖遇妻子若嚴君如君臣後漢馮良字君卿志行髙整非理不動遇妻子如君臣鄉黨以為儀表荅拜後漢樊英有疾妻使婢拜問英下牀荅拜陳寔怪問之英曰妻者齊也供奉祭祀禮無不荅待妻有禮吳志顧愷字子通待妻有禮常夜入晨出罕見其面疾篤妻出省之愷令左右扶起冠幘加襲趣令妻還其貞㓗不濁亂如此南面北面晉何曽閨門整肅年老相見皆整衣冠相待如賔巳南面妻北面拜上酒酬酢既畢便出一嵗如此不過再三焉自責後漢仇覽雖在燕居必以禮自整妻子有過免冠自責妻子庭謝候覽冠乃敢升堂孔相待如賔五代萇從簡許州冨人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隠木間見其夫婦相待如賔二卒歎曰吾今欲奪其寳而害斯人吾必不免因躍出而告之使其速以帶獻踰垣而去不知所之見妻子必正衣冠唐臨烈婦三白聶政姊史記聶政殺韓相俠累破面抉目自屠死韓購以千金久之政姊榮聞之曰吾弟為吾在重自刑以絶妾奈何畏没身之誅滅賢弟之名乎乃之韓市呼天者三死政之旁磨笄山趙襄子登夏屋山請代王使厨人操銅斗行鍖代王殺之其姊聞之呼天磨笄自殺因以為其山名也代夫留獄中盛道妻趙氏字媛姜益部亂道聚衆敗當死媛姜夜告道速逃建立門户妾留獄代君媛姜乃解道桎梏子翔五嵗令携走度道逺以實告應時見殺道㑹赦放歸終身不娶夫惡自殺沛國周都妻趙宗女字阿少閑婦道而都多行無禮都父偉謂阿少曰當以道匡夫阿少退曰我言不用君必謂我不奉教若言見用是謂子違父而從婦不如死乃自殺手刃夫讐吳許升妻吕氏字榮升為博徒不治行榮流涕進規榮父欲改嫁之榮終不肯升乃感勵改行遂成名本州辟至夀春盗害之刺史尹曜捕得盗榮手斷其頭而歸祭升臨危請姑晉禮志云李繁姊先適陳詵為妻而遭賊於賊請活姑命賊掠將去繁後得消息往迎還詵王愆期議李鄙野人而臨危請姑險不忘順可謂孝婦矣議者欲令在没畧之中有殞無二是望人人為宋伯姬也孝婦陜婦人􅄔居事叔姑甚謹家欲嫁之毁面自誓後叔姑病死有女在夫家從婦乞假不得因誣殺其母有司誅之鳥哀鳴屍上盛夏暴之十日不腐蟲獸亦不敗境内經年不雨呼延謀為太守訪其墓謚曰真烈婦其日大雨孔崇義夫人薛仁杲其降將旁仚地復叛所過剽害掠王氏女醉寢于野王取仚地所佩刀斬之送首梁州詔封女為崇義夫人刻石表曰烈女成汭王建遣將屯忠州與夔州刺史毛湘相唇齒厚屯白帝汭率存乗二軍之間攻之二軍使人誶辱汭韓楚言尤甚汭耻之曰有如禽賊當支解以逞㑹存夜斬營襲厚破之厚奔萬州為刺史張造所拒走綿州存入夔州楚言妻李語夫曰君常辱軍且支觧不如前死椘言不决李礪刀席下方共食復語之夫曰未可知李取刀㫁其首并殺三子乃自剄汭畏其烈禮葬之刻石表曰烈女割耳李徳武妻裴徳武在隋坐事徙嶺南時嫁方踰嵗父矩表離婚徳武謂裴曰我方貶無還理君必儷它族于此長訣矣荅曰夫天也可背乎願死無它欲割耳誓保母持不許本傳剔目房𤣥齡妻盧𤣥齡微時病且死諉曰吾病革君年少不可寡居善事後人盧泣入帷中剔一目示房云無他㑹𤣥齡良愈禮之終身啖土飲水王蘭英獨孤師仁之姆師仁之父武都謀歸唐王世充殺之師仁始三嵗免死禁錮蘭英請髠鉗得保養許之時䘮亂餓死者藉藉逰丐道路以食師仁身啖土飲水後詐為採薪竊師仁歸京師髙宗嘉其義詔封蘭英永夀郡君抵甓殺父寃衛孝女絳州夏人字無忌父為鄉人衛長則所殺無忌甫六嵗無兄弟母改嫁逮長志報父仇㑹從父大延客長則在坐無忌抵以甓殺之詣吏稱父寃已報請就刑廵察使禇遂良以聞太宗免其罪給驛徒雍州賜田宅州縣以禮嫁之冒刃立姑側鄭義宗妻盧夜有盗持兵刼其家人皆匿竄惟姑不能去盧冒刃立姑側為賊捽棰幾死賊去人問何為不懼荅曰人所以異鳥獸者以其有仁義也今鄰里急難尚相赴况姑可委棄邪若百有一危我不得獨生姑曰嵗寒然後知松栢後凋吾乃今見婦之心婦人以節楚王靈龜妃上官靈龜卒䘮除兄弟共諭妃少又無子可不有行泣曰丈夫以義婦人以節我未能殉溝壑尚可以御粧澤祭他胙乎將自劓刖衆遂不敢彊蓬頭跣而負土汴女李母䘮盧于墓蓬頭跣而負土以完園塋蒔松數百武后時按察使薛季昶表之詔樹闕門閭斷髮自誓崔繪妻盧繪䘮盧年少家欲嫁之盧稱疾不許女兄適工部侍郎李思冲早亡思冲方顯重表求繼室詔許家内外姻皆然可思冲歸幣三百舉盧不可曰吾豈再辱於人乎寧没身為婢是夕出自竇糞穢衊面還崔舎斷髮自誓思冲以聞武后不奪也詔為浮屠尼以終罵賊沈海符鳳妻某氏尤姝美鳳以罪徙儋州至南海為獠賊所殺脅某氏私之對曰一婦人不足事衆男子請推一長者賊然之乃請更衣有頃盛服立於舟罵曰受賊辱不如死自沉於海著女訓王琳妻韋者士族也琳卒時韋年二十五家欲彊嫁之韋固拒至不聽音樂處一室或終日不食卒年七十五著女訓行于世盧惟清妻徐惟清坐僚姻貶播州尉徐還鄉里糲食斥鈆膏柔絺不御㑹大赦徐間關迎惟清至荆州惟清死二髯奴將劫徐歸下江徐知之數其罪奴不敢逼劫其貲去徐倍道行至播州足繭流血得惟清尸以還饒娥饒州樂平人父勣漁于江遇風濤舟覆屍不出娥年十四哭水上不食三日死俄大震電水蟲多死父屍浮出郷人異之歸賵具禮葬父及娥鄱水之陰河東柳宗元立碑云義聲動江南鄒待徴妻薄者從待徴官江陰袁晁亂薄為賊所掠將汙之不從語家媪使報待徴曰我義不辱即死於水賊去得其尸義聲動江南聞人李華作哀節婦賦再拜就死髙愍女名姝姝父彦昭事李正已及納拒命質其妻子使守濮陽建中二年挈城歸河南都統劉𤣥佐納屠其家時女七嵗母李憐其㓜請免死為婢許之女不肯曰母兄皆不免何頼而生母兄將被刑徧拜四方女問故荅曰神可祈也女曰我家以忠義誅神尚何知而拜之問父在所西嚮哭再拜就死徳宗駭歎詔太常諡曰愍諸儒争為之誄引䋲束髪賈直言妻董直言坐事貶嶺南以妻少乃訣曰生死不可期吾去可亟嫁無湏也董不荅引繩束髪封以帛使直言署曰非君手不可解直言坐貶二十年乃還署帛宛然乃湯沐髪墮無餘父亡間道犇喪李孝女名妙法安禄山亂被劫徙它州聞父亡欲間道犇䘮一子不忍去割一乳留以行自刵陳寃衡方原妻程大和中方厚為邕州録事參軍招討使董昌齡治無狀方厚數爭昌齡怒將執付吏辭以疾不免即以死告卧棺中昌齡知之使闔棺甚牢方厚閉久以𤓰攫棺𤓰盡乃絶程懼并死不敢哭昌齡恬不疑厚遣其喪程徒行至闕下叩右銀䑓門自刵陳寃下御史鞠治有實昌齡乃得罪文宗詔封程武昌縣君賜一子九品正貟官不嫁止陽女趙者父盗鹽當論死女詣官訴曰廹飢而盗救死爾情有可原原之否則請俱死有司義之許减父死女曰身今為官所賜願毁服依浮屠法以報即截耳自信侍父疾卒不嫁名寒如霜雪唐興風化陶淬且數百年而聞家令姓窈窕淑女至臨大難守禮節白刃不能移與哲人烈士爭不朽名寒如霜雪亦可貴矣提刀逐之僕固懷恩反郭子儀至河中瑒攻榆次未抜追兵于祁責其緩鞭之衆怒是夕偏将焦暉白玉等斬其首獻闕下懐恩聞以告母母曰我戒汝勿反國家酬汝不淺今衆變禍且及我奈何懷恩再拜出母提刀逐之曰吾為國殺此賊取其心以謝軍中懷恩走乃與部曲三百北渡河走靈武稍稍引亡命軍復振帝念舊勲不加罪詔輦其母歸京師厚䘏之以夀終僕固懷恩贊曰其母拔刀逐賊烈婦人也引斧自斷其臂五代王凝妻李氏凝家青齊之間時任虢州司户參軍以疾卒于官凝家素貧一子尚㓜李氏携其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨携一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并汚吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚䘏李氏而笞其主人嗚呼士不自愛其身而辱耻以偷生者聞李氏之風宜少知愧哉秦拒黙啜髙叡妻叡為趙州刺史為黙啜所攻州䧟髙叡仰藥不死至黙啜所示以寳帯異袍曰降我賜爾官不降且死叡視秦秦曰君受天子恩當以死報賊一品官安定榮自是皆瞑目不語黙啜知不可屈乃殺之楊完項城楊烈婦者李侃妻也侃為項城令李希烈分兵數千略定諸縣侃以城小賊銳欲逃去婦曰冦至當守力不足則死焉君而逃尚誰守乃募死士固守賊引去卒完家道四白家人女正位乎内男正位乎外易家有嚴君家人有嚴君焉父母之謂也夫子之家事理隋武子刑于寡妻至于兄弟以御于家邦言文王自家刑國萬石君漢石奮子孫為小吏來謁必朝服見之有過失不誚讓為便坐對案不食子孫相責因長老謝改之乃許子孫在側雖宴必冠申申如也注便坐非正寢也閨門自守魏司馬朗父防閨門自守諸子雖冠成人不命進則不敢進不命坐不敢坐不指所問不敢言父子之間整肅如此整肅晉何曽至孝閨門整肅自少及長無聲樂嬖幸之好與妻相見正衣冠相待如賔巳南向妻北面再拜上酒酬酢既畢便出一嵗如此不過再三曽字頴考又庾亮字元規羙姿容談論風格峻整動由禮節閨門之内不肅而成或以為夏侯泰初陳長文之倫人憚其方嚴而莫敢造率子抱孫王羲之率子抱弱孫一味之甘割而分之以娱目前教飬子孫敦厚退讓依陸賈班嗣楊王孫之處世也家人嗃嗃嚴酷甚也婦子嘻嘻失家節也免冠自責見上孔治家以嚴李晟治家以嚴子姪非晨昬不輙見所與言未甞及公事家灋修整韋陟家灋修整敕子允就學夜分視之見其勤旦日問安色必怡稍怠則立堂下不與語集古今家誡書為屏風房𤣥齡治家有法度常恐諸子驕侈席勢凌人乃集古今家誡書為屛風今各取一具曰留意於此足以保躬矣閨門雍穆馮元常閨門雍穆有禮法家灋可稱張知謇每敕子孫經不明不得舉家灋可稱閨門友睦劉徳威於閨門有睦家為賊質李晟家為賊質左右有言者晟涕數行下曰陛下安在而欲䘏家乎朱泚使晟吏王無忌壻欵壁門曰公等家無恙晟怒曰爾乃與賊為間乎叱斬之家行修治李㬌讓家行修治閨門惟謹保家源洧雍睦保家士友推之徳星堂崔鄲四世緦麻同㸑居光徳里宣宗聞而嘆曰郸一門孝友可為士族法因題曰徳星堂後京兆民即其里􅃅為徳星社云私居内齋正色柳仲郢私居内齋正色服用簡素治家柳珪以不孝勒就養柳公綽治家埒韓滉及珪被廢士人愧悵言家灋者尚韓穆穆寧居家嚴甞譔家令訓諸子人一通又戒曰君子之事親養志為大吾志直道茍枉而道三牲五鼎非吾養也先是韓休家訓子姓至嚴正元間言家灋者尚韓穆二門云三世一爨崔邠父倕三世一爨當時言治家者推其法述家訓戒子孫栁玭常述家訓戒子孫夫門第髙者一事墜先訓則異他人雖生可以茍爵位死不可見祖先地下門髙則自驕族盛則人窺至於孝慈友悌忠信篤行乃食之醢醬可一日無哉過家十餘未甞見妻子辛讜初讜之求救也過家十餘未甞見妻子家風楊元禮素弟之子太宗征遼東拜兵部侍郎駐蹕之役領歩騎二十四軍跳出賊背所向摧靡帝自山下望其衆袍仗精整人人盡力壯之謂許敬宗曰越公兒郎故有家風孝睦裴向門户内外親屬百餘口禄俸必均世稱其孝睦君子重其家灋崔祐甫朱泚亂祐甫妻王䧟賊中泚嘗與祐甫同列遺以繒帛菽粟受而緘鐍之帝還京具封以獻士君子重其家灋本傳孝慈韋倫居家以孝慈稱成立覆墜栁玭嘗述家訓戒子孫曰夫名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛擊鼔㑹飯裴寛兄弟八人於東都置第八院相對甥姪亦有名稱嘗擊鼔㑹飯子父女母白居易賛子孫衆盛實為名閥柳玭孝友聞家賛諸子李華與外孫崔氏書云予小時起居尊行三時侍食今諸子日出髙眠爭覽盤器何嘗有此儀肥家以忍順柳玭家訓省事而後可以言家灋家灋備然後可以言養人同上務以門族相髙宰相世系表唐為國乆傳世多而諸臣亦各修其家法務以門族相髙禮灋稱於士林柳玭家訓余家本以學識禮灋稱於士林我子孫今以付汝李勣弟弼為晉州刺史以勣疾召為司衛卿使省視忽語曰我似少愈可置酒相樂於是奏樂宴飲列子孫于下將罷謂弼曰我即死欲有言恐悲哭不得盡故一訣爾我見房𤣥齡杜如晦髙季輔皆辛苦立門户亦望詒後悉為不肖子敗之我子孫今以付汝汝可謹察有不厲言行交非類者急榜殺以聞毋令後人笑吾猶吾笑房杜也父子五訓子不訓不慈知子業官䘮子同無子假孤遺父子戮父附白天性父子之道父道子道人父人子才不才亦各言其子也各子其子各親其親為孺子牛齊景公御繩為孺子牛而折其齒孺子荼也斯子吾有斯子親後子者親之後也敢不敬與禮莫知其惡諺曰人莫知其子之惡堂構書曰若考作室既底法厥子乃不肯堂矧肯構父慈子孝所謂六順負荷古人言其父析薪其子不克負荷天明傳曰為父子兄弟以象天明冬夏之日趙衰冬之日趙盾夏之日冬日可愛夏日可畏雙珠韋端有二子元將仲將孔融與端書曰不意雙珠生於老蚌荀陳之㑹世說曰陳太丘詣荀季和貧儉無僕乃使元方將車季方持杖長文尚小著車中既至荀使叔慈應門慈明行酒餘六龍下食文若小坐膝前于時太史奏五百里内賢人聚長文犀也阿戎談王戎字濬仲父渾阮籍謂曰濬仲清賞非卿倫也與卿言不如與阿戎談厚於慈禮以此防人人猶有薄於孝而厚於慈父為子隠直在其中以篤父子禮家肥禮曰父子篤夫婦和家之肥也異宫禮曰命士以上父子皆異宫宗敬也見父子之倫焉禮厚敬禮父子不同位以厚敬也無能禮父之親子也親賢而下無能故父尊而不親父止於慈禮為人子止於孝為人父止於慈父兮生我身之貳也禮椒聊有實螽斯之詠孝養厥父母書陟彼岵兮瞻望父兮從命禮從命不忿微諫不倦勞而不怨可謂孝矣饋獻父母在饋獻不及車馬示人不敢專不奸傳父子不奸之謂禮有子有父公羊曰父有子子不得有父注云有子謂廢輒之義可立不以父命辭王父命衛侯輒也子由父疎穀梁仲嬰齊卒此公孫也子由父踈也視友史記趙禹謂將軍曰不知其子視其友遺體霍去病至河東傳舎入迎父仲孺仲孺趍拜謁將軍迎跪曰不早知為大人遺體父子之間人所難言武帝謂田千秋三君陳紀元方弟諶季方與父寔齊徳同行號三君一而已傳父一而已惟其疾之憂喜懼父母之年不可不知一則以喜一則以懼子為親後慈乃行先禍患相收荘子假之亡也林回棄千金之璧負赤子而趍為其布與赤子之布寡矣為其累與赤子之累多矣棄千金負赤子者彼以利合此以天屬天屬之親窮廹禍患相收也子為三公張酺為太尉父在田里每有遷職輙一詣京師適㑹歳節公卿詣酺府奉酒上夀極歡人皆慶羡之兼愛敬故母取其愛而君取其敬兼之者父也託子於人子胥使齊託其子於鮑氏吳王聞之怒賜子胥屬鏤劒自刎而死敬父書訊吳顧愷字子通每得父書常掃洒几筵舒書於上拜跪讀之每句應諾畢復再拜若父有疾耗之問即臨書垂泣語聲哽咽訓子不訓義方石碏曰臣聞愛子教之以義方過庭孔子甞獨立鯉趍而過庭曰不學詩無以言不學禮無以立鯉退而學詩語逺子又聞君子之逺其子教忠狐突曰子之能事父教之忠古之制也父教子貳何以事君慈教父慈而教子孝而忠七子之業晉劉殷字長盛有子七人各受一經一門之内七業俱成嚴父愛子天性之恩日嚴之敬父父子子詩禮之訓㓜子㓜子常視無誑長者與之提携則兩手捧長者之手負劒辟咡詔之則掩口而對皆㓜子之教㓜學人生十年曰㓜學餘具儒教㓜學門不就師傅子既生不免於水火母之罪也成童不就師傅父之罪也將紹家聲必資庭訓嚴君之道教子之方居家自相朂導豈不優於嚴君邪萬石君也尊嚴之儀馮奉世奉世子野王通詩次逡通易次立通春秋次參通尚書刑國自家刑國不教吏職漢薛宣子惠為彭城令宣過其縣橋梁郵亭不修宣心知惠不能留數日終不問惠以吏事惠知不稱宣意使椽送宣令椽自從其所問宣以不教戒惠吏職之意宣笑曰吏道以法令為師可問而知自有資才何可學也各使守一藝後漢鄧禹子十三人各使守一藝教養子孫為後世法臨刑告子范滂字孟博被誣下獄謂其子曰吾欲使汝為惡惡不可為使汝為善我亦不為惡行路聞之莫不流涕又鄭𤣥字康成戒子益恩曰吾年七十自非拜國君命親族之憂展敬墳墓當杖而出門家事大小汝一承之爾煢煢無同生之相依朂求君子之道云云不訓後漢馬廖不訓諸子友人楊終戒之廖曰皎皎練絲所在染也八務七識魏氏春秋諸葛亮作八務七識六怒五懼皆有條章誡勵諸子弟睡不聽訓陳萬年疾召子咸教誡之咸睡頭觸屏風萬年怒將杖之咸曰具䁱所言大抵教咸謟也萬年遂不復言撻子崔烈有重名靈帝時入錢五百萬為司徒名譽遂減問子鈞曰議者何如鈞曰嫌其銅臭烈舉杖擊之鈞服武弁而走烈曰死死卒父撾而走孝乎鈞曰大杖則走小杖則受烈慙而止又王丹子有同門生遭䘮在山中請徃吊之丹怒撻之令遺縑而已人問之丹曰交友之道未易言也全者鮮矣斑白逾峻孫盛安國年老還家性方嚴有􅁤憲雖子孫斑白而庭訓逾峻不慈乃疾厥子書曰父不能字厥子乃疾厥子言不慈也匪人不父父不父子不子滅親傳石碏純臣也大義滅親其子厚與州吁同弑君碏殺之不慈父不慈子不孝祗服厥父瘞子郭巨無兒鄧攸字伯道棄子活兄子後竟無兒人曰皇天無知使伯道無兒易子宋人易子而食父頑母嚚信讒琴操尹吉甫信後妻之讒而逐伯竒伯竒自傷無罪乃援琴作履霜操而死故文選曰掇蜂滅天性棄子鄧攸事見上注慈㓜周禮以保息六養萬民一曰慈㓜愛小㓜也犂牛之子騂且角雖欲勿用山川其舎諸言父雖惡不害子善殺子晉獻公驪姬謀殺太子申生太子歸胙于公公田姬寘諸宫六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣斃姬曰賊由太子太子奔新城戊申縊死劫貨不救後漢橋𤣥字公祖遷侍中以疾罷就醫里舎𤣥少子十歳獨游門次卒有三人持杖劫之入舎登樓求貨𤣥不與司𨽻圍守恐殺其子未欲廹之𤣥瞑目呼曰奸人無狀豈以一子之命而縱國賊遂進攻𤣥子亦死𤣥乃詣闕謝罪請下天下凢有劫質皆倂殺之不得贖以財寳開長奸路三綱絶矣漢逄萌見王莽殺子宇曰三綱絶矣不去禍及遂隠殺子漢金日磾子爲帝弄児上前驕逸後於殿下與宫人戱曰磾遂殺之食羮樂羊食肉羮棄子蜀程畿子都在郡龎義使告畿曰爾子在郡不從及禍畿曰樂羊食子羮非無父子之㤙為國邵續字嗣祖初王浚假續樂陵太守石勒破浚遣續子乂招續權附於勒勒以乂為督護叚匹磾要續俱歸元帝其子諫曰今棄勒歸磾任子危矣續泣曰我出身為國豈得顧子為叛臣哉遂絶勒勒乃害乂父兮母兮畜我不卒喪子喪明子夏䘮其子而䘮其眀曽子吊而怒之曰喪爾子而喪其眀爾罪三也子夏投其杖而拜之曰吾過矣嬴愽延陵季子適齊其長子死葬於嬴􅀶之間還封且號者三曰骨肉復于土命也夫七旬潘岳西征賦曰夭赤子於新安坎路側而瘞之亭有千秋之號子無七旬之期雖勉勵於延吳實憯慟於子慈注岳子以三月壬寅生五月甲辰夭六十餘日也􅉃慟見上注珠碎於掌上蘭敗於庭中投車擠于溝壑楚靈聞羣自公之子死投于車下曰人之愛其子也亦如予乎侍者曰甚焉小人老而無子知擠于溝壑矣情鍾晉王衍字夷甫䘮㓜子山簡吊之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及情情之所鍾正在我輩簡服其言更為之慟仁與逹晉書王祥二子烈芳同時而亡将死烈欲還葬舊土芳欲㽞葬京邑祥流涕曰不忘故鄉仁也不戀本土逹也仁與逹二子俱有稽顙禮為長子稽顙重正體也子既不幸老将疇依長子服禮庶子不得為子服三年不繼祖與禰故也注眀遵一統不哭列子東門吴子死不哭其相曰公之愛子天下無有今死而不哭何也吴曰吾嘗無子無子時無憂今子死乃與向無子同吾何憂無益自損晉魏舒字陽元子混先卒舒每哀慟退而歎曰不及荘生遠矣豈以無益自損封篋王導還臺其子恱未嘗不送又為母襞歛箱篋中物恱亡導還臺至常送處哭至臺其母封篋不忍開之齎金贖弟陶朱公中子殺人於楚朱公遣少子齎金千斥贖罪長子請行到楚遺荘生荘生言王將赦天下長子以弟自當免遂不與荘生怒反言於王先殺朱公子而後赦長子持弟䘮歸朱公曰吾固知必殺汝弟汝見吾貧苦時重惜金所以卒殺汝弟無子天窮老而無子天人之窮叔向之憂無子也伯道無兒皇天無知使伯道無兒伯道鄧攸字也擠溝小人老而無子知擠于溝壑見上注絳人絳縣人老而無子預於城杞之食辱在泥塗趙孟謝之無後子文無後何以勸善妻無子衞荘公娶于齊東宫得臣之妹曰荘姜羙而無子衛人為賦碩人又晉獻公娶于賈而無子何以能育託身於人樓護字君卿故人吕公無子歸護護養之終身為將不愛妾後漢祭遵為征虜将軍同産兄午以遵無子取妾送遵不受曰自以身任於國不敢慮繼嗣之計遺孤孤兒愛子託子恤後遑恤我後負薪孫叔敖死無立錐之地其子負薪於楚牧豕陳祐年二十而孤家貧牧豕於長垣澤中其父之友謂曰子二千石子牧豕縱子無耻奈何先君六尺之孤可以託六尺之孤謂㓜君少孤孔子少孤不知其墓孤子死王事者之子周禮不逮事父母謂少孤也以縗抱之禮父没子㓜則以縗抱之慈㓜見上恤孤禮字孤不能字人之孤無父何怙有子疇依漢帝既臨張禹有託安昌侯張禹疾病罷侯車駕親臨令㓜子拜於床下山公尚在嵇紹不孤嵇康臨刑謂子曰山公在汝不孤仲宣無後魏王粲死後二子犯法誅絶後時太祖在漢中聞粲子死歎曰孤若在彼不使仲宣無後也虎子吴凌統卒二子皆孫權收養宫中愛遇與諸子同賔客進見呼之曰此吾虎子八歲令讀書十日一令乘馬及長追録統功封亭侯還其故兵知子莫若父知子莫若父知臣莫若君舉子祁奚請老晉侯問嗣焉稱觧孤其讐将立而卒又問焉對曰午也可午奚子趙奢史趙括少學兵法父奢不能難然不謂之善曰兵死地而括易言之敗趙軍者必括也吳恢後漢吳祐父恢為南海欲殺青簡冩經祐諌曰踰越五嶺俗多珍怪此書若成載必兼两昔馬授以薏苡興謗王陽以衣嚢徼名恢曰吴氏世不乏季子石苞石苞臨終分財與諸子不及崇崇母為言苞曰小兒雖小後自得之王昶晉王湛有隐徳兄弟以為癡父昶獨異焉索靖每曰吾子琳廊廟器非簡札之用州縣吏不足汚吾兒姚弋仲仲令子㐮討石閔謂曰汝才十倍於閔謂不從坐吴志騶子張叔累遷司真封侯父山陰徳卒知淑不良表請有罪謂不從坐詔許之業官明經丞相漢書韋賢字長孺子𤣥成字少翁俱以明經位至丞相故語曰遺子黄金滿籝不如一經司徒緇衣美鄭武公父子並為周司徒善於其職也父作子述禮父作之子述之謂文王武王之業清白問絹晋書胡質仕魏為荆州刺史子威自京師省父自驅驢不止傳舍留十數日告歸父賜縑一匹威跪曰大人清貧何以得此曰吾俸禄之餘及威為徐州刺史武帝問之卿清孰如父對曰臣父清畏人知臣清畏人不知業書晉書王羲之子獻之竝能書謝安問獻之君書何如君家君荅曰固當不同大夫漢書杜延年為御史大夫以居父官不敢當父舊位坐卧皆易其處也張奐生男復臨此郡魏畧張奐為武威太守時猛母方孕夢印綬登楼而歌旦告奐奐訊占夢占夣曰夫人生男復臨此郡必死官乎及生猛以建安中為武威太守殺刺史邯郸商州兵圍之猛急恥見擒曰豈使我頭過華陰歴先君之墓乎乃登楼自燒而死替代漢公孫賀自太僕卿遷丞相其子敬聲代父為太僕卿韋康三輔録曰康字元將代父端為荆州刺史父老止傳舍康入官時人榮之辛毗魏志辛毗為衛尉卿子敞亦為衛尉卿同官隔坐吳録記亮為尚書令子隲為中書令每朝㑹詔以御屏風隔其坐周公拜前魯公拜後尚書劉馥為揚州太守恩化大行子静為盧江守詔曰卿父昔為彼郡可謂能克負荷也三代為司𨽻後漢趙興不恤忌諱三代為司𨽻司𨽻下著姓世祖令鮑昱封降故檄問有所怪否昱曰通官文書不著姓怪司𨽻下著姓世祖曰吾欲令天下知忠臣子復為司𨽻也父子同戮父子伏誅漢書周紓字文通為沛郡守為人酷虐後坐事父子皆伏誅及宗後漢公孫賀為丞相子敬聲為太僕敬聲有罪賀請捕朱安世以贖子罪安世曰丞相禍及宗矣子代父死史石奮相楚行縣有殺人者追之乃其父也縱其父還而自拘曰殺父立政非孝也廢法縱罪非忠也臣當死乃自刎而死假父假子何晏魏略太祖納何晏母收何晏養宫中服飾擬太子文帝憎之謂之假子秦朗獻帝春秋曰秦朗父為張飛所殺太祖納其母愛朗謂人曰豈有愛假子如孤者孔治命韋温為翰林學士先是綬在禁廷積憂畏病廢故誡温不得任近職至是固辝帝怒曰寧綬治命邪禮部侍郎崔蠡曰温用亂命益所以為孝帝意釋然換知制誥賦詩同上既疾召親屬賦綬詩在室愧屋漏因泣下曰今知沒身不負斯誡矣同在禁筦蘇瓌子頲遷給事中拜中書舎人時瓌同中書門下三品父子同在禁筦朝廷榮之俳兒荘恪太子永暴薨帝悔之明年下詔以陳王為太子置酒殿中有俳兒縁撞父畏其㒹環走撞下帝感動謂左右曰朕有天下返不能全一兒乎因泣下繼為宰相竇至徳父子繼為宰相世詫其榮同為侍郎崔挹子湜景龍二年遷兵部侍郎而挹為禮部侍郎武徳已来父子同為侍郎惟挹湜云相失挹得謝而性貪數為人請託以干湜湜多不從由是父子相失廬陵在逺王方慶賛曰李徳裕著書稱方慶為相時子為眉州司士叅軍武后曰君在相位何子之逺對曰廬陵是陛下愛子今尚在逺臣之子庸敢相近以比倉唐悟文侯君子哉父稱忠孝韋嗣立與承慶異母武后召嗣立謂曰爾父常稱二子忠且孝堪事朕比兄弟稱職如而父言今使卿兄弟相代竝為宰相及知政事父子並為宰相世罕其比有父風采崔謹由有父風采彊幹李昭徳彊幹有父風殢愛多愆禇遂良以為父子殢爱者多愆善教楊恭仁隋觀王雄子也仁壽中累遷甘州刺史臨事不苛細徼人安之文帝謂雄曰匪特朕得人乃卿善教子矣吾家有子蘇詵十餘嵗彊學有成人風頲曰吾家有子稱尊桓彦範曰父在子稱尊為逆子善訓子手詔褒善舒王元名子豫章王亶治江州有羙政高宗以元名善訓子手詔褒善不肖髙儉為氏族志崔幹仍居第一帝曰我於崔盧李鄭無嫌顧其世衰不復冠冕猶持舊地以取貲不肖子偃然自髙販鬻松檟不觧人間何為貴之功名之竒近世所未有李愬始晟克京師市不改肆愬平蔡亦如之功名之竒近世所未有同拜李宗閔進中書舍人父䎖為華州刺史父子同拜世以為寵撻潘好禮子請舉明經好禮曰經不明不可妄進乃自試之不能通怒撻之而徇於門有父風矩栁仲郢牛僧孺辟武昌幕府有父風矩僧孺歎曰非積習名教安及此邪不能事父栁珪與璧繼擢進士杜牧李商隐稱之以藍田尉直洪文館遷右拾遺給事中蕭倣鄭裔綽謂不能事父封還其詔賣子朱忠亮授四鎮節度使涇俗舊多賣子忠亮以財贖免者前後数百屬無親踈沈傳師治家不嚴威閨門自化兄弟子姓屬無親疎衣服飲食如一􅉲崔衍繼母李不慈倫使吐蕃歸李赦衣以見問故曰衍不吾給倫怒召衍將袒而鞭之衍泣無所陳倫弟殷趍白衍所廪舉送夫人所尚何云倫悟由是譖無入令子鄭餘慶子涵為右補闕敢言無所諱憲宗謂慶餘曰涵卿令子而朕直臣也可更相賀繼美賈至明皇幸蜀帝傳位至當譔冊既進藁帝曰昔先天誥命乃父為之辭今兹命冊又爾為之兩朝盛典出卿家父子可謂繼美矣至頓首嗚咽流涕率門生出迎楊嗣復父於陵嗣復領貢舉時於陵自洛入朝乃率門生出迎置酒第中於陵坐堂上嗣復與諸生坐兩序始於陵在考功擢浙東觀察使李師稷及第時亦在焉人謂楊氏上下門生世以為美龍崔珙父頴生八子皆有才世以擬漢荀氏入龍密語符令琦幽州亂挈子璘奔昭義田承嗣盗其地引令琦為右職田恱拒命馬燧敗之洹水令琦宻語璘曰吾閱世事多矣自安史干紀無噍􅁼吾觀田氏覆亡無時安用茍朝夕繫縲京師宗族屠地汝能委質朝廷為唐忠臣吾亦名揚後世矣璘泣曰恱忍人也近禍可畏荅曰今王師四合吾屬俎中醢兒今行吾死不朽不行吾亦死尸疊逆地云何璘俯泣不能對得父一絶宋之問父令文富文辭且工書有力絶人世稱三絶既之問以文章起其弟之悌以蹻勇聞之愻精草𨽻世謂皆得父一絶求降外官増父秩孫逖父嘉之逖遷中書舎人拜嘉之且八十猶為令逖求降外官増父秩帝嘉納拜嘉之宋州司馬聴致仕顯名甄逢常以父不得在國史而逢與元稹善稹移書於史舘修撰韓愈愈荅逢能行身幸於方州大臣以標目其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人逢與其父俱當得書矣由是父子俱顯名訪索吕向向之生父岌客逺方不還後有傳父猶在者訪索累年不獲它日自朝還道見一老人物色問之果父也下馬抱父足號慟行人為流涕帝聞咨歎官岌朝㪚大夫杜門不出韋陟以父不得志歿乃與斌杜門不出八年親友更徃孰曉乃強調洛陽令宋璟見陟嘆曰盛徳遺範盡在是矣不私姚崇二子在洛通賔客饋遺憑舊請託魏知古歸悉以聞他日帝召崇曰卿子才乎皆安在崇揣知帝意曰臣二子分司東都其為人多欲而寡謹是必嘗以事干魏知古帝始以崇私其子或為隠微言動之及聞乃大喜問安從得之對曰知古臣所薦也臣子必謂見徳而請之帝於是愛崇不私而薄知古欲斥之崇曰臣子無状撓陛下法而逐知古外必謂陛下私臣乃止廣平風衰宋璟子昇尚渾怒華衡天寳中渾怒尚竝以贓敗流貶華衡亦皆坐廣徳中渾起為太子諭徳物議穢薄之流死江嶺兄弟皆荒飲俳嬉而衡最險悖廣平之風衰焉父子為學士蒋乂父子為學士儒者榮之有方面功田布諸子皆有方面功諌史孝章父憲誠得魏遷士曹參軍孝章見父數奸命内非之承間諌曰大河之北號富強然而挺亂取地天下指河朔若夷狄然今大人身封侯家富不貲非痛洗溉竭節事上恐吾踵不旋禍且至因涕下沾衿父武不盡聽文宗賢之峭立有父風鄭裔綽試文韋温以㧞萃高等補咸陽尉父愕然疑假權謁進召而試諸廷文就無留思喜曰児無愧矣吾兒不及若兒許敬宗孫彦伯昻子也頗有文敬宗晚年不復下筆凡大典册悉彦伯為之嘗戲昻曰吾児不及若児答曰渠父不如昻父請二息補外源乾曜進侍中建言大臣子倂求京職俊乂率任外官非平施之道臣三息俱任京師請二息補外以示自近始詔可乃以子河南參軍弼為絳州司功太祝潔為鄭尉蘇氏宰相蘇廷碩與宋璟同當國璟嘗曰吾與蘇氏父子同為宰相僕射長厚自是國器獻可替否事至即斷盡公不顧私則今丞相過之不親教子張士衡父文慶士衡九歳居母䘮哀慕過禮博士劉軌思見之為泣下竒其操謂文慶曰古不親教子吾為君成就之乃授以詩禮有父風蕭頴士子有亮直有父風庶事無間張曲江集勑突厥可汗書與兒情為旣深庶事無間父子之國直往直来何異一家直無别也其在家無子弟之過居京兆之側遇事輒争不從其令而従其義求子弟之賢而能業其家者韋羣玉也韓文盛徳遺範韋陟為洛陽令宋璟見陟嘆曰盛徳遺範盡在是矣異類合為父子義兒傳世道衰人倫壞而親疎之理反其常干戈起於骨肉異類合為父子開平顯徳五十年間天下五代而實八姓其三出於丐養盖其大者取天下其次立功名位將相豈非因時之隙以利合而相資者邪五代史固宜長有人文章紹編剗韓愈贈張籍詩母子六賢母遺腹惡母出母姙孕生育䨇生母賤後母附白母慈子育有慈無威母取其愛孝經厚其慈母也天只水火子旣生不免水火母之罪母徳母儀陟屺詩母氏劬勞聖善何恃無母何恃詩靡依匪母母兮鞠我腹我育我畜我長我欲報之徳吴天罔極三年免懐子生三年然後免於父母之懐不獨子其子禮各子其子從子婦人從人者也嫁從夫夫死従子慈愛無能禮母之親子也賢則親之無能則憐之母養如母而飬之傍無几杖後漢胡廣年八十心力克壯為太傅繼母在堂朝夕省膳傍無几杖言不稱老母卒居喪盡禮三年母為敵獲徐庶母為曺公所得庶謂劉備曰本欲為明公効愚欵今失老母方寸亂矣備遂聼庶降曹公拜畵像漢金日磾母教誨两子有法度上聞嘉之病死詔圗畵日磾每見像常涕泣賢母聖善母氏聖善我無令人三徙孟軻之母三徙擇鄰以教子買豬韓詩曰孟子少時問東家殺猪何為母曰欲啖汝既而悔曰吾聞胎教割不正不食席不正不坐今適有知而欺之是教之不信乃買猪肉以食之寄鮓吴録孟仁字㳟武本名宗為監魚池司馬自結網捕魚作鮓寄母母還之曰汝為魚官以鮓寄母非避嫌疑也隂徳孫叔敖㓜時逢两頭蛇畏後人見乃殺埋之其母曰汝有陰徳必有陽報汝無憂矣埽墓嚴延年為河東太守峻刑酷法吏人號曰屠伯其母知終伏誅乃曰不意當老見壯子被刑戮今去汝東歸埽除墓地耳言待其靈柩也遂歸見昆弟宗人復言之後嵗餘延年果棄市東海莫不賢其母不食漢書嶲不疑為京兆尹每録囚徒其母問以平反喜而食否則怒不食故不疑為吏嚴而不酷以為己子莊姜無子戴媯生桓公荘姜以為己子言若已生以為嫡子趙姬請逆盾與其母來以盾為才以為嫡子而使其己子下之不哭禮公父文伯之喪敬姜據其牀而不哭曰吾有斯子也吾以為賢人也及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠扵禮矣注内人妻妾也舉徳晉吴隐之字處黙居喪過禮與韓康伯母鄰康伯母聞隐之哭謂其子曰汝居銓衡當舉此人及康伯為吏部尚書遂舉隐之階清級趙括母史趙王使括為將代㢘頗其母請於王曰括必敗請不從坐後果敗王乃原其母王陵母在楚使人於漢謂陵曰漢王長者善事之無以吾為念因對使者自刎以固陵志叔向母叔向欲娶申公巫臣氏其母止之曰甚美必有甚惡叔向懼不敢娶平公彊使娶之生子伯石其母將視之及堂聞其聲而還曰豺狠之聲是必䘮羊舌氏遂不視之陳嬰母秦末天下兵起嬰亦起衆母曰自吾為汝家婦長見貧賤卒富貴不祥不如以兵屬人事成少受其利王經母魏王經為尚書髙貴鄉公欲討司馬文王經及王沉王業謀經諫以魯昭公不忍季氏卒有乾侯之禍沉業馳出告文王經獨不告被収辭母母顔色不變笑而應曰人誰不死恐不得死以此併命何恨之有才學漢崔篆母師氏能通經學百氏之言王莾寵以殊禮賜號義成夫人崔實母後漢崔實母劉氏博覧書傳寔為五原太守有能政母助也生徒受業晉韋逞母宋氏父世儒學盧壼奏就家立講堂置生徒百二十人隔紗幔受業號文宣君侍婢十人智略何無忌母劉氏弟牢之為桓𤣥所殺常思報及無忌與劉裕定謀夜於屏風内制檄劉氏以器覆燭窺之泣曰我不如東海呂母既孤其誠常恐哀促其夀養前妻子羊祜前母孔融女兄發初與祜同母兄弟俱病祜母度不能两存乃専心於發遂淂濟也截髮待客陶侃字士衡孝㢘范逵嘗過侃時倉卒無以待客母謂侃曰汝但留賔客吾為計乃截髮為䨇鬃賣易酒殽極豊偹歡樂従者亦過望逵至京師稱述侃侃遂知名罵賊而死楊阜字義山㕘冀州軍事馬超攻破冀城殺刺史阜外兄姜叙屯厯城阜見叙母説冀中事責叙不討賊叙母慨然救叙與阜起兵超禽得叙母母罵超殺之太祖下詔褒美之遺母鮓陶侃母諶氏侃少為縣吏嘗監魚池以魚鮓遺母母封鮓責之曰爾以官物遺我不能益我乃増吾憂耳惡母母嚚舜不安其室衛之滛風流行雖有七子之母猶不能安其室言欲去嫁也許穆夫人公子頑烝於宣姜生也掇蜂之譖伯竒後母令竒掇蜂因而譖之其父尹吉甫乃逐之欲罪也寤生遂惡鄭公公寤生驚姜氏遂惡之後遂復為母子如初也棄子路有飢婦人抱子棄草間文選棄女堤下宋芮司徒生女子赤而毛棄之恭姬之妾取以入名之曰棄棄於冰上史記姜嫄踐巨人跡而孕生子為不祥棄之冰上飛鳥以翼覆之故名棄周祖后稷也新息婦人殺子後漢賈彪為新息令人貧困多不養子彪嚴為制與殺人同罪城南有盜害人城北婦人殺子彪出案掾吏欲引南彪怒曰賊害人此有常理母子相殘逆天違道遂先北也慈㓜周禮棄子後漢龎參妻棄前妻子於井畜我不卒父兮母兮姙孕生育既生既育比予于毒嗣續以嗣以續續莫大焉父母生之夢蘭鄭文公有賤妾燕姞夢天使與已蘭曰以是為爾子既而文公與之蘭而御之曰妾不才幸而有子將不信敢徴蘭椒聊之實繁衍盈升芣苢婦人樂有子也采采芣苢薄言掇之男子之祥吉夢維何維熊維羆男子之祥維虺維蛇女子之祥弄璋弄瓦乃生男子載衣之裳載寢之牀載弄之璋其泣喤喤乃生女子載寢之地載衣之禓載弄之瓦贈鯉孔子子生三月有贈鯉魚者乃名子曰鯉字伯魚珠生老蚌孔融與韋端書曰不意雙珠生于老蚌繼體承家繼代保家有文在手傳宋武公生仲子有文在其手曰為魯夫人故仲子歸于我又邑姜方娠太叔夢帝謂己子召曰虞乃生有文在手曰虞遂以名之同物傳云桓公是其生也與吾同物命之曰同謂同日生也三月禮子生三月而父名之聞聲不視叔向娶夏姬之女生子伯石其母及堂聞其聲曰豺狼之聲是必喪羊舌氏遂不視之聞聲觀狀椘司馬子良生子越椒良兄子文曰必殺之是子也熊虎之狀豺狼之聲不殺必滅若敖氏矣良不可後果滅若敖氏掌上之珠懸弧之慶男子初生以桑弧蓬矢六射天地四方示男子有事於四方又男女生男子設桑弧蓬矢於門左女子設帨於門右也月辰禮妻將生子及月辰居側室夫使人日再問之至于生子復使人問之諸侯之禮也翦髮子生三月之未擇日翦髮為鬌男角女羇委則男左女右鬌遺髮也負髮子生三月始負子以桑弧蓬矢射也父母全而生之孩而名之子生三月妻以子見夫入門升阼階妻抱子出升自西房父執子之右手父母全而撫其首也皆諸侯之禮食母禮諸侯冢子生卜士之妻大夫之妾使食之大夫之子有食母士之妻自養其子庶人禮庶人無側室生子及月辰夫出居羣室其問之與子見父之禮無以異也子既生見父父必循其首也厥初之生有後之慶寢牀見上注婦孕不育易乃多女災孕者傷也胎夭多傷胎生者不殰卵生者不殈殰敗也殈裂也毛者孕育禮能育不坼不疈無災無害謂姜嫄生后稷也疈音芳􅀈反毛詩似已莊子厲人生子恐其似已夜生取火視之厲醜人也三歳不孕易誕彌厥月先生如逹樂羊子言易産姜嫄彌月不遲彌終也十月生子不遲接子凡接子擇日冢子則太牢謂天子世子太牢庶人特豚士特豕大夫少牢緩帶榖梁一人生子三人緩帶賜酒句踐令有娩者以告公令醫守之生男壷酒一犬生女壺酒一豚生三人公與之乳母二人與之餼給復漢書民產子復二嵗胎教榖後漢章帝賜姙者胎教榖三斛夫復一嵗著於令神光應嫗生四子見神光照室試探之乃得黄金諸子宦學竝有才名兆叶熊羆慶傳嗣續從在手之文徇徴蘭之請名子雙生梁嬴見下過斯注居上為兄公羊言古人尚質䨇生以後生者居上取以為兄則百斯男詩太姒嗣徽音則百斯男螽斯子孫衆多宜爾子孫陸終生六子史記陸終氏生六子拆剖而生焉不夫而孕列子曰思女不夫而孕又漢書哀牢夷者其先有婦名紗壹居牢山捕魚水中觸沉木若有感因懷姙十月産子十人産驚死酈炎字文勝好學風病恍忽至孝母憂其疾發動妻始産而驚死妻家訟之不能理死獄中棄之不死韓朗字伯竒生三日遭亂弃於荆棘數日兵解母往視之有氣息乃収飬及長舉為孝㢘居然生子姜嫄無人道居然生后稷鬻子之閔斯鬻雉也雉之病也脩已背坼而生禹簡狄胷剖而生契生齒家語男子八月生齒七歳而齓墮地范曄母如厠而生華額為塼傷因小字塼天地相應乃得化淳男女匹配乃得化生陰陽不對生可得乎易損卦注過期梁嬴孕過期卜將生一男一女男為人臣女為人妾過期謂十月不生遺腹小同鄭𤣥别傳曰𤣥子為孔融吏舉孝㢘融被圍往赴難被賊害有遺腹子以丁夘日生𤣥以丁夘歳生故名曰小同李陵漢書李廣子當户當户早卒有遺腹生子陵有廣之風烈泗水王漢泗水戴王前薨無嗣國除後宫有遺腹子煖相内史不奏言上聞而憐之立煖為泗水王相内史皆下獄出母白也之母子思曰為伋也妻是為白也母不為伋也妻是不為白也母故孔氏不喪出母自子思始也不喪見上注子上之母禮曰子上之母死而不喪問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也䘮之何也子思曰吾先君子無所失道道隆則從而隆道汚則従而汚伋則安能為伋也妻云云注為禮出母期父卒為父後者則不服無服禮為父後者為出母無服之云不敢以私喪廢宗祀之禮慰心凱風羙孝子也衞之滛風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰母心詩曰有子七人莫慰母心辭母不顧吳駱統字公緒母改適為華歆小妻統時八歳遂與親客歸㑹稽其母送之拜辭上車面西母不顧泣于後御者曰夫人猶泣統曰不欲増母思乃不顧也母賤子貴史記姑布子卿見無恤曰此真將軍也簡子曰此母賤翟婢也子卿曰天之所授雖賤必貴母微裴秀母妾也秀年十八有令望而嫡母猶妬令秀母進饌於客賔見並拜之母曰㣲賤如此應為小兒矣不聘傳聲伯之母不聘穆姜曰吾不以妾為姒也後母織屨給子漢翟方進為小吏蔡文伯有封侯骨西至京師受經後母隨之長安織屨以給子射策甲科迎後母不至漢何武後母在遣使迎㑹盗賊留乆不至哀帝策免曰君孝聲不聞其上印綬事逾謹後漢馮衍子約年十嵗後母惡之因夜行毒而約敬事逾謹旁無几杖胡廣見上雙魚躍出晉王祥繼親朱氏欲生魚祥觧衣將剖冰冰觧雙魚躍出又思黄雀炙有數雀飛入幕中庭有丹柰母令守之風雨抱樹而泣羊祜母羊祜前母孔融女生兄發初與祜同母兄承同得病祜母度不能两存乃專心飬發得濟不肯隨之官傳咸為州繼母杜氏不肯隨咸之官表觧職又䘮繼母見下注中官舎設靈傳咸繼母喪以無兄弟乃使官舍設靈坐誣盗閻纉後母誣纘盗父時金訟於有司被清議所棄十年無怨色孝謹不怠母意觧乃移中正復品蒲麻紵衣王延後母以蒲麻與延紵衣姑問之不言夏扇枕席冬以身温母愛魚求不淂杖之流血叩而哭忽有一魚長五尺躍出水母食之積日不盡扵是撫之如己之子逐不能去薛包字孟常後母憎包分出之包日夜號泣不能去被打不得已廬於舍外旦入而洒埽父怒又逐之乃廬於里門晨夜不廢積嵗餘父母慙而還之後六年服喪過乎哀戚慈愛程文矩妻穆姜有二男而前妻有四子四子以母非所生憎毁日積而穆姜撫字益隆衣食皆兼倍所生文矩卒㦯謂母曰四子不孝何不分母曰方以義𨗳之使善及前妻長子興遇病困母親調藥餌㤙情篤宻久乃瘳謂三弟曰繼母慈仁我曺過深矣遂將三弟詣南鄭獄陳母之徳狀已之過乞就刑縣言於郡郡守表異其母蠲徭遣四子許以脩革託疾求和楊厚守仲植母與前妻子博不相安厚年九嵗思令和親乃託疾不言不食母知其旨懼然後改意㤙飬加篤諫母王祥弟覽字𤣥通母朱氏遇祥無道覽數歳見祥被撻輒流涕抱持及長每諌母少止使祥非理覧亦與焉虐使祥妻覧妻亦趍往祥漸有時譽朱深疾乃酖祥覧知取酒祥亦争之不與朱遽翻之後母食覧必嘗之朱意乃止孔杜羔母更兵亂不知所之羔毎憂號終日及兄兼為澤潞判官鞠獄有媪辨對不凡乃羔母得奉飬以母子天性為言狄仁傑陛下欲三思為後且姑姪與母子孰親毎以母子天性為言后雖忮忍不能無感故卒復唐嗣賢明鄭善果母崔賢明曉政治嘗坐閣内聼善果處决㦯當理則悦有不可則引至牀下責愧之治家嚴蕭俛母韋賢明治家嚴俛雖宰相侍左右如褐衣問計於母王義方拜御史且疾當世附離匪人以欺朝廷内决劾奏意得罪問計于母母曰昔王母伏劔成陵之誼汝能盡忠吾願之死不恨賢操崔𤣥暐母盧有賢操常戒𤣥暐曰吾聞姨兄辛𤣥馭云子姓仕宦有言其貧寠不自存此善也若貲貨盈衍惡也吾嘗以為確論比見親表仕者務多財以奉親而親不究所従来必出于禄􅅒則善如其不然何異盗乎若今為吏不能忠清無以戴天履地宜識吾意故𤣥暐所守以清自名王琚始為中書侍郎母居洛陽来京師讓琚曰爾家上世皆州縣職今汝無攻城野戰勞以謟佞取容海内切齒吾恐汝家墳墓無人復掃除也琚卒不免義先國家桓彦範誅二張也初將起事告其母母曰忠孝不並立義先國家可也問所安張鎰華原令盧摐以公事譙責邑人齊令詵宦人也䘖之結摐罪鎰案驗當免官有司承風以死論鎰不直之乃白其母曰今理摐摐免死而鎰坐貶黜則負官貶則為太夫人憂敢問所安母曰兒無累於道吾所安也遂執正其罪摐得流鎰貶撫州司户訟其子不孝五代史安重榮拜成徳軍節度使有夫婦訟其子不孝重榮㧞劔授其父使自殺之其父泣曰不忍也其婦從旁詬罵奪其劍而逐之問之乃繼母也重榮叱其母出従後射殺之躬加訓導顔真卿師古五世從孫少孤母商躬加訓導既長博學工辭章訓教諸子李景譲母鄭治家嚴躬訓教諸子始貧乏時治墻得積錢僮婢奔告母曰士不勤而禄猶灾其身况無妄而得我何取亟使閉坎箠敕同上為浙西觀察使母問行日景譲率然對有日鄭曰如是吾方有事未及行盖怒其不嘗告也且曰已貴何庸母行景譲重請罪乃赦雖老猶加箠敕已起欣欣如初嘗怒牙將杖殺之軍且謀變母欲息衆讙召景譲責将鞭其背吏大恐再拜請不許皆泣謝乃罷一軍遂定授經薛播早孤伯母林通經史善属文射授經諸子及播兄弟訓道有方楊憑少孤其母訓道有方長善文辭與弟凝凌皆有名母憂潘孟陽初為侍郎年未四十其母謂曰以爾之材而位丞郎使吾憂之矮子李建母憐其孝每字之曰矮子勸吾食吾輒飽進藥吾意其瘳母不肯去鄉里張九齡為冀州刺史以母不肯去鄉里表换洪州都督免為官婢嚴武卒母哭且曰而今而後吾知免為官婢矣事後母栁公綽事後母薛謹甚雖姻屬不知非薛所生善訓子栁仲郢母韓即臯女也善訓子故仲郢㓜而能嗜學嘗和熊膽丸使夜咀嚥以助勤長工文著尚書二十四司箴本傳親導母輿崔邠為太常卿故事太常視事大閱四部樂都人縱觀邠自第去㡌親導母輿公卿見者皆避道都人榮之廻班候夫人趙隐既執政它宰相及百官皆詣第升堂慶母嵗時公卿必多許懿宗誕日宴慈恩寺隐等侍母以安輿臨觀宰相方率百官拜㤙於廷即廻班候夫人起居縉紳以為榮迎還京師陸贄久之不得宰相還京但為中書舍人母韋猶在江東帝遣中人迎還京師不聞無母之人王潮王緒劉行全南走初以糧少故兼道馳約軍中曰以老孺従者斬潮與弟審邽審知奉母以行緒切責潮曰吾聞軍行有法無不法之軍對曰人皆有母不聞無母之人緒怒欲斬其母三子同辭曰事母猶事将軍也殺其母焉用其子緒殺之劉𤣥佐母貴母尚在賢婦人也常月織絁一端示不忘本数教敕𤣥佐盡臣節見縣令走庭中白事退戒曰長吏恐懼卑甚吾思而父吏於縣亦當爾而據案當之何安乎𤣥佐感悟故待下益加禮不貽親憂劉禹錫出為播州刺史詔下御史中丞裴度為言播極逺猿狖所宅禹錫母八十餘不能往當與其子訣恐傷陛下孝治請稍内遷帝曰為人子者當謹事不貽親憂若禹錫望它人尤不可赦度不敢對帝改容曰朕所言責人子事終不欲傷其親乃易連州遊獵以所獲饋母不食趙武孟少逰獵以所獲饋其母泣曰汝不好書而敖蕩吾安望哉不為食楊収母長孫七嵗而孤母長孫親授經母躬訓教孔若思早孤其母躬訓教長以博學聞為母執轡五代張遂清嘗為淄州刺史迎其母及郊遂清為母執轡行數十里州人以為榮臨政問法如何同上馬全節事母至孝其臨政治事必問法如何湯餅客劉禹錫送張盥童子赴舉詩云爾生始懸弧我作坐上賔引箸舉湯餅祝詞天麒麟滿孺月安樂公主􅃝而鞭之崔衍父倫衍繼母不慈倫自吐蕃歸李敝衣以見問故曰衍不吾給倫怒召衍将􅃝而鞭之衍涕泣無所陳弟殷趍白衍所廩舉送夫人所尚何云倫悟由是譛無入長為母所訓江南野史彭昌世習儒學長為母所訓遂習先業逺𫝊冬笋味更覺綵衣春杜甫賀正夫人加㤙芬芳孟母鄰同上白孔六帖卷十八
