body:
  text: 白孔六帖卷九十九唐白居易原本宋孔傳續撰草木一草二雜草三木四雜果五桃六李七橘八櫻桃九梅十梨十一棗十二栗十三石榴十四柰十五胡桃十六草木一白漸苞禹貢曰草木漸苞注漸進長苞叢生甲坼易曰百果草木皆甲坼麗土百穀草木麗乎土草木之滋禮曰䘮有疾食肉飲酒必有草木之滋焉以為薑桂之謂也人形苻堅伐晉晉謝𤣥禦之㑹稽王道子禱於鍾山求助至時堅見八公山上草木皆是人形遂敗若神之助也有時以生周禮草木有時以生有時以死此謂天時也潰茂詩如彼草木莫不潰茂黄落禮草木黄落斧斤入山林土敝則草木不長禮樹藝繇草木也司徒職云孔室韋北狄室韋契丹毎溽夏西保貣勃次對二山山多草木崖樾王徽同平章事是日黄巢入闗僖宗西狩冒夜出詰朝乃知追帝不及墮崖樾間為賊所執候草木記歲西域党項地寒五月草生八月霜降無文字候草木記歲知威名張萬福帝召謂曰朕謂江淮草木亦知爾威名草木荒延崔知温党項羗入冦權善才大破其衆欲遂窮追知温曰谿谷複深草木荒延萬分一有變不可悔茂遂陳子昻上言先王以人通於天也於是養成羣生然後草木茂遂見其滋蕪為喜突厥思摩帝置酒引思摩前曰蒔一草一木見其滋蕪以為喜況我養爾部人息爾馬羊不減昔乎妖草媚木元結集負土為靈囿多妖草媚木綠縟草木香韋應物遊琅琊山寺草二白小人之徳草草上之風必偃去草周任有言曰見惡如農夫之務去草芟夷藴崇之絶其本根勿使能植左傳萋萋楚辭王孫遊兮不歸芳草生兮萋萋書帶三齊記鄭𤣥教學處有草如薤而細俗謂之鄭康成書帶酬恩魏顆嫁先人之妾及戰見老人結草以亢杜回夜夢曰予所嫁婦人之父也爾用先人之治命予是以報滋蔓傳無使滋蔓難圖也青青河畔草離離山上苖薙氏掌芟草周禮農夫務去薙氏所除不絶根而能植必滋蔓而難圖十歩説苑曰十歩之内有芳草殺薙氏榖草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之注萌夷芟耜皆謂刈也有時以生見上注燒薙行水利以殺草季夏庶草蕃蕪書彼茁者葭葭草也茁出地皃隕霜不殺草僖公三十三年蓬蒿藜藿傳化月令腐草化為螢豐草茂草幽草鞠為茂草何草不黄詩華而不實不植松栢之下其草不植具腓百卉具腓池塘生春草權輿大戴禮孟春冰泮百草權輿朋友之墓有宿草而不哭宿草陳根也秀英爾雅草榮而實者謂之秀英而不實者謂之英採擷野無青草春草碧色秀草不實孔可藉以寢五代史載陷羌記曰至湯城淀草軟如茸可藉以寢異草皇甫鏄嘗與李道古共薦方士柳泌召入禁中因言天台山靈仙所舍多異草願官天台求采之起徒歩拜天台刺史碧絲李白詩燕草如碧絲疾風知勁草蕭瑀帝賜詩曰疾風知勁草靈草指佞舊唐賛曰靈草指佞諫臣匡失袁與薛人中屈軼草為人孫甑生能使草為人騎馳走五月草生党項地寒五月草生仰風獵日其間草甚多叢者束兮靡者杳兮仰風獵日如立如笑兮杜牧晚晴賦茂苑草菲菲杜秋娘詩露蔓蟲絲多初入汴口塞草青乾符六年童謡曰八月無霜塞草青將軍騎馬出空城漢家天子西巡狩猶向東吴更索兵五行志五色金草生而五色崔融啓母廟碑野田人稀秋草緑張籍詩縁堦長短春草綠縁堦如有情李白翠羽隂草濕翠羽柳文霸者之瑞山戎有紅草葉如車輪色如朝虹齊桓植之以表霸者之瑞酉陽雜俎雜草三白焉得萱草言樹之背一名忘憂葛之覃兮施于中谷葛生蒙楚蘝蔓于野蓼蓼者莪匪莪伊蒿楚楚者茨棘皃朝菌斬其蓬蒿藜藿而共處之鄭桓公商人也食野之苹之蒿之芩呦呦鹿鳴云云孔刺竹王式徙安南都䕶浚壕繚柵外植刺竹冦不可冒醒醉草開元遺事興慶池南岸有草數叢葉細心勁有醉者過其旁摘草嗅之立醒謂之醒醉草舞草叚成式雜俎云舞草出雅州獨莖三葉葉如決明一葉在莖端兩葉居莖之半相對人或近之歌及抵掌謳曲必動葉如舞兎葵燕麥動揺春風劉禹錫游𤣥都觀詩言惟兎葵燕麥動揺春風耳變晝草杜陽編順宗即位拘彌國貢變晝草有類芭蕉可長三尺而一莖千葉樹之則百歩内昏黒如夜始藏於百寳匣中上見而怒曰背明向暗之物何貴并匣焚之麒麟草元和時館閣湯飲待學士者煎麒麟草退耕傳旗子草五行志光啓元年七月河中解永樂生草葉自相樛結如旗旌之狀時人以為旗子草息雞草五代史載陷羌記又東行至褭潭有息雞草尤美而本大馬食不過一本而飽草則蘭芷又有異卉類合歡而蔓生轇轕水石柳宗元記芸暉草杜陽編元載造芸暉堂芸暉香草也出于闐國香潔如玉入土不朽為屑以塗壁故名之迎涼草杜陽編李輔國家夏則設迎涼草其色類碧榦若苦竹葉細如杉木四白植物木名君子樹之荏苒柔木君子樹之嘉樹封植傳韓宣子宴于季氏有嘉樹焉宣子譽之武子曰敢不封植此樹也勿伐蔽芾甘棠勿翦勿伐召伯所苃將軍大樹馮異有攻伐嘗坐大樹下人謂之大樹將軍木魅𤣥中記秦始皇伐大梓樹有青牛走入河遂立牛祠也又老桑與龜言呼龜為元緒遂以桑煮龜云云合抱之樹生於毫末十圍文子曰十圍之木起於一抱七年淮南子豫章生七年然後知風摧文選木秀於林風必摧之不材山木以不材得終其天年直木必伐文子丁丁伐木丁丁自刻木以文自刻邱木為宫室不斬邱木木奴李衡江陵千樹橘為木奴工度山有木工則度之陽木隂木山虞仲冬斬陽木仲夏斬隂木陽木山北隂木山南惟喬惟條禹貢厥木惟喬厥草惟條樛木詩改柯易葉本實先撥枝葉未有害本實先撥撥絶也伐社樹晉阮修宣子伐社樹或止之修曰若社而為樹則社移樹而為社伐社樹則亡矣孔徙植其家姜皎帝在殿庭翫一佳樹皎盛賛之帝遽令徙植其家堂柱生槐朱偓始家第堂柱生槐枝朞而茂既而偓秉政波羅樹摩揭陀貞觀二十一年獻波羅樹樹類白楊種樹白居易東都所居履道里種樹街樾吴湊為京兆尹兼兵部尚書先是街樾稀殘有司蒔榆其空湊曰榆非人所䕃既悉易以槐及槐成而湊已亡行人指樹懐之斫樹劉漢宏鵶噪諸庭命斫樹或曰巨木不可伐怒曰吾將斬白蛇何畏一木衣錦將軍吴越錢鏐臨安里中有大木鏐幼時與羣兒戯木下光化元年檢校太師號其幼所嘗戯大木曰衣錦將軍擊木陸羽或獨行野中誦詩擊木徘徊金玉為樹木李蔚咸通十四年詔迎佛骨鳯翔京師髙貲相與集大衢金玉為樹木木生花如人首大食西南二千里山谷間有木生花如人首與語輙笑則落題葉李巨川楊守亮為韓建所禽巨川械以從題木葉遺建祈哀常春木杜陽編李輔國鳯首木髙一尺雕刻鸞鳯之狀形枯槁毛羽脱落不甚盡雖凝寒之時置諸髙堂大厦之中而和煦之氣如二三月故别名為常春木縱烈火焚之終不焦黒焉端正樹上登馬嵬行至扶風道旁花畔見石楠樹愛翫之因目為端正樹盖有所思也出太真外傳行者如迎偃者如醉木勢黨伍兮行者如迎偃者如醉髙者如逹低者如跂杜牧晚晴賦行户郎切聲音樹都堂南門道東有古槐垂䕃至廣或夜聞絲竹之聲則省中有入相者俗謂之聲音樹南部新書平楚木叢也文選郡内登望詩注林木窮僻王龜傳永逹里林木窮僻翠羽之木柳宗元石澗記翠羽之木龍鱗之石林垠岑翳賈循擢游擊將軍榆關守捉使地南負海北属長城林垠岑翳寇所蔽伏移牒取槐葉酉陽雜俎西夏無槐惟夏州有一株或要槐葉移牒取木妖開元遺事沈香亭木芍藥朝紅暮黄午碧夜白帝曰此木之妖也壅之以黒墳暖之以春日舊史岑文本封事古人譬之種樹年紀緜逺則枝葉扶踈若種之日淺根本未固雖壅之以黒墳暖之以春日一人揺之必致枯槁今之百姓頗類于此雜果五白時果珍果家果郭子曰楊氏子九嵗孔君平指楊梅示之曰此君家果應聲對曰未聞孔雀是夫子家禽朱實丹實甘實夏熟盧橘夏成素柰春熟朱櫻云云孔甘之味讓於孔融擲於潘岳潘岳美姿容出市羣嫗擲果盈車而還獻果王母獻仙桃於漢武帝投我以木桃木𤓰木李偷東方朔偷王母仙桃也不鬻果實未熟不鬻於市賜賜果於君前其有核者懐其核致核食棗桃李不致于核注為恭敬也後君子凡食果實者後君子君子之後食也甲坼雷雨作而百果草木皆甲坼其實離離詩素華春發雖無人而自芳丹實秋成豈不食而知味貢惟任土孔樹果數百株柳宗元書曰城西有數頃田樹果數百株多先人手自封殖今已荒穢恐便斬伐無復愛惜賜裴諗帝取御奩果以賜諗舉衣跽受帝即顧宫人取巾褁包之獻果一盛陸贄帝徙幸梁道有獻𤓰果者帝嘉其意欲授試官贄曰今獻果一盛則受之彼忘軀命者有以相謂矣林珍韓愈詩篚實摘林珍有實曰果酉陽雜俎有實曰果又曰在木曰果第果品李肇國史補李直方第果品如貢士者以緑李為首楞梨為副櫻桃為三甘子為四蒲桃為五或薦荔枝曰寄舉之首也羞果鮮珍憲宗皇后郭氏為太皇太后文宗性謹孝事后有禮凡羞果鮮珍及四方竒奉必先獻宗廟三宫桃六白始華月令仲春驚蟄之日桃始華灼灼有蕡詩曰桃之夭夭灼灼其華其葉蓁蓁有蕡其實投我以木桃園有桃其實可食獻帝千年漢武帝故事西王母齎其桃七枚獻帝欲留核種之王母笑曰此桃一千年生華一千年結實人壽幾何乃止三偷漢武故事曰西王母指東方朔曰仙桃三熟此兒已三偷也武陵有桃花源秦人避亂之所漁人至焉成蹊漢書桃李不言下自成蹊夏䕃秋實韓詩外傳春樹桃李夏得其䕃秋得其實露井古詩桃生露井上殺士齊景公有勇士三人恃功恣行天下公患之晏子曰可賜二桃令訃功而食三士初爭後讓皆自殺反桃故曰二桃殺三士啖君韓子昔彌子瑕有寵於衛君食桃以其半啖君君曰忠乎以其美而啖寡人及寵衰數以為罪饋食之籩其實棗栗桃周禮後啖孔子侍坐於哀公公賜之桃與黍仲尼先飯黍而後啖桃公曰黍以雪桃也對之曰云云鬼畏莊子挿桃枝於戸連枝其下童子人不畏而鬼畏之是鬼智不如童子也桃梗戰國策蘇秦謂孟嘗君曰臣來過溜上有土偶人與桃梗語桃梗謂土偶人曰子西岸之土也埏子以為人至歲八月降雨下溜水至則子殘矣土偶人曰吾復西岸矣子東園之桃削為人降雨至則漂漂然將如何矣碧桃尹喜内傳老子西游與王母共食碧桃穠華詩何彼穠矣華如桃李孔杏附莊蹻之裔南蠻自夜郎滇池以西皆莊蹻之裔有桃李金桃銀桃西域康居入貢金桃銀桃詔令植苑中植桃若霞劉禹錫入為主客郎中復作游𤣥都詩且言始謫十年京師道士植桃其盛若霞又十四年過之無復一存唯兎葵燕麥動揺春風耳以詆權近聞者益薄其行銷恨花開元遺事明皇於楚苑中初有千葉桃花開盛帝與貴妃日夕宴花樹下帝曰不獨萱草忘憂此花亦能銷恨刻桃木為符明崇儼刻桃木為符事見方術門西王母桃酉陽雜俎洛城華林園内有冬桃十月始熟形如括蔞食之解勞亦名西王母桃桃香異常史論在齊州時出獵至一縣界憇蘭若中覺桃香異常訪其僧僧不及隠言近有人施二桃因從經按下取出獻論大如飯盌論時飢盡之核大如雞卵論因詰其所自僧導論北去上山越澗至一處布泉怪石非人境也有桃數百株幹掃地髙二三尺其香破鼻論與僧各食一蔕腹果然矣論亦疑僧非常取兩箇而返同上玉格枝葉拆青煙樓東一株桃枝葉拆青煙此樹昔所種别來向三年桃今與樓齊我行尚未旋李白寄東魯二稚子紅糝韓愈桃枝綴紅糝崔䕶清明日遊城外叩一莊門求飲有一女子以杯水遺䕶意屬甚厚明年思其人復往叩門久無人應因書一絶後日復往聞哭聲一老父曰子非崔䕶邪吾女比見桃花句絶食而卒崔亦感慟大呼曰某在此女遂復生本事集助嬌花御苑有千葉桃帝親折一枝挿于妃子寳冠上曰此花光能助嬌態出天寳遺事桃花行李嶠等作桃花詩帝令擇三十篇入樂府謂之桃花行景龍記陶氏博異記紅衣人送酒歌曰絳衣披拂露盈盈淡染胭脂一朶輕自恨紅顔留不住莫怨春風道薄情月中隨而送之踰墻入苑中乃桃花精也川原逺近蒸紅霞韓文桃源行桃花亂落如紅雨況是青春日將暮桃花亂落如紅雨岸夾桃花錦浪生李白鸚鵡洲偏桃出波斯國波斯呼為婆淡樹長五六丈圍四五尺葉似桃濶大三月開花白色花落結實狀如桃子而形偏故謂之偏桃其肉苦澁不堪噉核中仁子甘甜西域諸國並珍之第中大杏司徒馬燧子鬯以第中大杏饋竇文場文場以進徳宗未嘗見頗恠鬯令中使就封其樹鬯懼進宅為奉誠園出桂花叢談争春館揚州軍迹曰太守園中有杏花數十株毎至爛開張大宴一株令一娼倚其傍立館曰爭春開元中宴罷夜闌人或聞花有嘆聲雲仙散録杏花煙李賀馬小憐鬢濕杏花煙野杏依寒坼韋應物自蒲塘驛迴駕詩漢帝杏齊南郡之東南有分流山山土多杏大如梨黄如橘土人謂之漢帝杏亦曰金杏居鄰北郭古寺空杏花兩株能白紅韓愈杏花詩二花河東備録曰阮文姬挿鬢用杏花淘浦公呼為二花李七白朱李魏文帝書曰沉朱李于寒冰穠華見上成蹊見上夏隂秋實見上投我以木李鑚核世説王安豐有好李常賣之恐人得其種乃鑚核而賣折枝世説王戎年七歲見道旁李樹其子折枝諸小兒競取唯戎不動人問之荅曰道旁而子多必苦李果然如瓶漢武内傳李少君云鍾山之李大如瓶房陵朱仲之李閑居賦云不整冠古詩君子防未然李下不整冠為姓伯陽生李樹下遂指樹為姓玉李抱朴子蔡誕入山而還欺家人云到崑崙山有玉李光明洞徹而堅須得玉井水洗使軟可食翠質傅𤣥李子賦曰潜實内結豐膚外盈翠質未變形隨運成詩沈約詩曰青玉冠四海碧膚充外區化為中國實其下成蹊衢色潤房陵縹味奪寒山朱孔九都之李北狄渤海果有九都之李李冬有花安金藏母䘮廬墓側李冬有花冰之以寒水蘇源明小洞庭讌籍李下雕籠冰之以寒水美李張九齡賦沉美李李下無蹊徑李乂典選請謁不行時人語曰李下無蹊徑李有九標承平舊纂蕭瑀陳叔逹於龍昌寺看李花相與論李有九標謂香雅細淡潔密宜月夜宜緑鬢泛酒無異色皆實事龍耳墮血琴莊美事崔奉國家一種李肉厚而無核識者曰天罰乖龍必割其耳血墮地生此李也李再花秋大霜酉陽雜俎䑕精李好事集王侍中家堂前有䑕從地出其穴則生李樹花實俱好此䑕精李也詠李花元㣲之白樂天兩不相下一日同詠李花㣲之先成曰葦綃開萬朶樂天乃服葦綃白而織輕綃一時所尚出髙隠外書李直方第果品以緑李為首出國史補風柔雨練風柔雨練雪羞比韓退之李花詩碧實冰盤夏薦碧實脆同上見李思戒𤨏言明宗不豫馮道入問曰寢膳之間尤宜調謹因指御前果實曰如食桃不康他日見李思戒李花釀酒叙聞録憲宗以鳯李花釀换骨醪賜裴度玉枝攅霜葩韓愈李花詩奈何趂酒不省録不見玉枝攅霜葩花作數團如飛仙狀樞要録沆陵伍貫卿家李花一月夜奴婢遥見花作數團如飛仙狀上天去花上露水倐作雨數千㸃花則亡矣白衣天寳中處士崔元㣲東洛有宅入嵩山採术茯苓回宅中蒿萊滿院時春季夜風月清爽忽有白衣引緑裳者曰姓楊一曰陶氏乃命坐月下色皆殊絶滿坐芳香襲人橘八柑柚附白厥苞錫貢禹貢揚州厥苞橘柚錫貢注苞橘柚進之錫命乃貢言不常貢千樹史江陵千樹橘其人千户侯等木奴李衡種丼橘千樹號千頭木奴言利博也為枳周官橘踰淮北為枳地氣使然又晏子使楚楚王使縳盜而至曰齊人也善為盜乎晏子曰橘生江北為枳水土異也今在齊不盜入楚則盜豈非水土之使然乎遺毋見孝門注秋食橘柚周禮瑞建武故事曰西平將軍庾亮進橘十二實同一核為瑞異也丹橘朱橘朱實貢惟任土果貴及時再熟潘岳有冬夏再熟賦湘水張華詩橘在湘水側菲陋人莫傳逢君金華宴得在玉堦前雲夢之柚吴氏春秋斬伐楚辭斬伐橘柚别樹梅桃遺太守子後漢張磐子石為廬陵太守時有卒遺其子兩枚柑鞭卒曰何以賂吾黄甘不常御崔寔正論曰橘柚之實堯舜不常御今臣妾有餘黄甘賦晉胡濟黄柑賦植朱鳥之避鄉賛郭璞賛曰厥苞橘柚精者惟甘實染繁霜葉鮮翠藍凌霜宋謝惠連賦曰質葳蕤而懐風性耿介而凌霜胡甘風土記曰有橘柚之甜美其頳者謂之胡甘孔納直于官柳玭為嶺南節度副使廨中橘熟既食乃納直于官貢薛戎遷浙東觀察使所部州橘未貢先鬻者死戎弛其禁蔚湘岸之夕隂李徳裕瑞橘賦貞枝凝碧蔚湘岸之夕隂動江潭之秋色華實變黄動江潭之秋色同上分貢劉晏自江淮茗橘珍甘常與本道分貢競欲先至雖封山㫁道以禁前發晏厚貲致之常冠諸府黄柑蕭嵩荆州進黄柑帝以紫帉包賜之瀟湘姿杜甫詩嘗聞蓬萊殿羅列瀟湘姿賜大柑安禄山帝使中官輔璆琳賜大柑因察非常布褁柑子益州毎年進柑子皆以紙裹之他時長吏慮紙之不敬代以細布出唐拾遺蓬萊橘太真外傳初開元末江陵進乳柑橘上以十枚種於蓬萊宫至天寳十載九月秋結實宣示宰臣曰朕近於宫内種柑子數株今秋已來結實一百五十顆乃與江南及蜀道所進不異宰臣賀曰雨露所均混天區而齊被草木有性憑地氣以潜通故得資江外之珍果為禁中之華實甘踰萍實劉禹錫為中丞謝柑子表甘踰萍實剖食既同于楚謡寒比蔗漿析酲何慙於漢史同上始發素榮俄成丹實賛皇一品集進瑞橘狀橘中之樂不減商山幽恠録巴卭人家有橘園霜後橘盡收斂大橘如三斗盎巴人異之剖開毎橘有二叟鬢眉皤然肌體紅明皆相對象戲談笑自若一叟曰橘中之樂不減商山但不得深根固蔕為愚人摘下耳黄苞耀頴劉禹錫謝柑子表泊豐城港江淮異人録陳允升好道撫州危全諷迎置郡中嘗夜坐危謂之曰豐城橘美頗思之允升曰方有一舩泊豐城港今為取之港去城十五里少選便還携一布嚢數百青雲着葉密白雪避花繁結子隨邉使開筒近至尊杜甫柑園橘社異聞集柳毅見龍君叩海岸橘樹其樹名橘社也幾歲開花聞噴雪何人摘實見垂珠柳宗元詩密林耀朱緑晚歲有餘芳同上南樓寺柑舊唐史羅浮柑子開元中始有種於南樓寺其後常資進獻幸蜀幸奉天之歲皆不結實書後欲題三百顆韋應物荅鄭騎曹贈青橘憐君卧病思新橘試摘猶酸亦未黄書後欲題三百顆洞庭須待滿林霜破柑霜落爪杜甫詩賜宰臣等朱橘李徳裕橘賦序清霜始降上命中使賜宰臣朱橘各三枚盖靈囿之所植也天漢之華星焜耀閬風之珠樹粲然香若團於野露色凝沍於江煙同上比丹萍之初實樹隠方塘比丹萍之初實與赤瑛而共妍盤映皎月與赤瑛而共妍并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜同上宣宗朝有術者董元素自江南來上召見留於翰林中宿泊夜召與語曰聞公頗有神術今南中柑橘正熟卿能置之否元素對曰請安一合於御榻前數刻間有微風入簾元素乃啓其合柑子滿其中奏曰此江陵枝江縣柑也逺處恐遲上嘗之驚歎開元記櫻桃九白朱櫻春熟含桃薦廟仲夏天子羞以含桃先薦寢廟又漢惠帝出離宫叔孫通曰禮有春嘗果方今櫻桃可獻願陛下出因取櫻桃獻宗廟諸獻果自此始也鳥含吕氏春秋注以鶯鳥所含故曰含桃夏成文選賦潘岳朱實賦曰煥若隋珠皎如列星華林晉宫闕銘曰含章殿及華林園有櫻桃彈丸博物志櫻桃者或若彈丸孔賜李適天子夏宴蒲萄園賜朱櫻擢無庸之𤨏質蒙本枝以自庇蕭穎士作伐櫻桃樹賦擢無庸之𤨏質蒙本枝以自庇雖先寢而或薦非和羮之正味以譏林甫韓愈櫻桃詩漢家舊種明光殿炎帝曾書本草經蠟帛丸雜果中李希烈始入汴聞户曹參軍竇良女美彊取之嘗稱陳仙竒忠勇可用而妻亦竇姓願如姒媢者以固其夫希烈許諾及希烈死子不發䘮欲悉誅諸將乃自立未決有獻含桃者竇請分遺仙竒妻聽之因蠟帛丸雜果中出所謀仙竒大驚與薛育率兵譟而入子出徧拜語已斬之櫻桃有三種櫻桃其種有三大而殷者曰吴櫻桃黄而白者曰蠟珠小而赤者曰水櫻桃食之皆不如蠟珠楊膳夫録朱顔含曉日翠色影長津唐太宗詩玉忩五見櫻桃花李白久别離别來幾春未還家玉忩五見櫻桃花赤墀櫻桃枝隠映銀絲籠杜甫往在詩和以香酪召侍臣學士食櫻桃飲酴醿酒並以琉璃盤和以香酪唐景龍文館記駢朱實以星繁蕭穎士伐櫻桃樹賦綴繁英兮霰集駢朱實以星繁柳宗元謝賜櫻桃表使發九霄集繁星而積耀味調六氣承湛露而不稀盈眥而外被恩光適口而中含渥澤青衣携籃異聞集天寳初有范陽盧子在東都下第嘗春暮乗驢遊行見一僧舍中有僧開講盧子方詣講筵至精舍門見一青衣携一籃籠櫻桃在下坐因與同飱櫻桃青衣云娘子姓盧即盧子再從姑也盧便隨之姑年可六十以下盧為御史大夫至是經三十年却到昔逢携櫻桃青衣精舍門遂下馬以故相之尊升殿禮佛忽然昏醉耳聞講僧云何久不起忽自起立乃見身着白衫服飾如故訪其僕曰日已午矣十二枚及一尺衛公言滑州櫻桃十二枚及一尺酉陽雜俎夢遺裴元裕羣從中有恱鄰女者夢遺二櫻桃食之及覺核墜枕側同上棖子臣櫻桃黎舉欲以棖子臣櫻桃但恨時不同耳出金城記李直方第果品櫻桃為三出國史補西蜀櫻桃也自紅野人相贈滿筠籠數回細寫愁仍破萬顆勻圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬注唐制賜近臣櫻桃有宴轉蓬自言流落如蓬之隨風任其轉徙也杜甫養櫻桃酉陽雜俎陳景思説勑使齊日昇養櫻桃至五月中皮皺如紅柿不落其味數倍人不測其法含桃之羞時令攸貴況今採因御苑分自天厨柳宗元謝表梅十白摽實傾筐詩摽有梅其實七兮又曰其實三兮又曰傾筐暨之票落也言漸落多止渴魏武帝與軍士失道大渴而無水遂令曰前有梅林結子甘酸可以止渴士卒聞之皆口中水出遂得及前源也苦酸鮑昭詩食梅常苦酸摽梅之詠見彼詩人落梅之歌聞諸樂府古樂府有落梅之曲南枝大庾嶺上梅南枝落北枝開調鼎之味和羹書曰若作和羮爾惟鹽梅乾䕩周禮饋食之邊其實乾䕩乾䕩梅也賦梁陳暄食梅賦曰魏無林而止渴范留信而先嘗嘉卉詩曰山有嘉卉惟栗惟梅生梅吴志孫亮方食生梅使黄門以銀椀并盖就藏吏取甘蔗餳黄門著䑕尿於餳中云云一云取蜜而漬梅詩墓門有梅孔槁梅蕭倣拜嶺南節度使家人病取槁梅於厨以和劑倣知趣市還之青梅五代趙匡凝楊偓方宴食青梅匡凝顧偓曰勿多食發小兒熱諸將以為慢偓遷匡凝海陵梅煎地理志洪州土貢梅煎鹽梅相成王義方上言天子置公卿大夫士欲水火相濟鹽梅相成不得獨是獨非也九英梅常朝録曰元稹為翰林承㫖朝退行至廊下時初日映九英梅隙光射稹有氣勃然百寮望之曰豈賜胃之章映日可見乎梅聘海棠黎舉常云以梅聘海棠但恨時不同耳金城記朔風飄夜香繁霜滋曉白柳宗元梅詩安得健歩移逺梅亂挿繁花向晴昊杜甫蘇端薛復醉歌緑英梅李白遊慈恩寺僧獻緑英梅出海墨徽言為梅拆屋張洞林桂林記袁豐之居宅後有六株梅開時曽為鄰屋煙氣所爍乃團泥塞竈張幕蔽風久而又拆其屋曰冰姿玉骨世外佳人但恨無傾城笑耳梅花賦皮日休桃花賦余常慕宋廣平之為相貞姿勁質剛態毅狀疑其鐡腸與石心不解吐婉媚辭然覩其文有梅花賦清便富艶得南朝徐庾體殊不類其為人也棃十一白張公大谷廣志洛陽北郊張公夏棃海内惟一樹潘岳閑居賦曰張公大谷之棃真定魏武詔曰真定棃大如拳甘如蜜魏都賦云真定之棃千樹漢河濟之間千樹之棃其人與千户矦等紫棃尹喜傳老子西游與王母共食紫棃津潤蜀都賦曰紫棃津潤𤣥光漢武内傳有𤣥光棃蔽芾甘棠勿翦勿伐注棠杜也一名杜棃而小也孔季秋出華杜景佺后嘗季秋出棃華示宰相以為祥衆賀曰陛下徳被草木故秋再華周家仁及行葦之比景佺曰隂陽不相奪倫瀆即為災故曰冬無愆陽夏無伏隂春無淒風秋無苦雨今草木黄落而木復華瀆隂陽也飣座棃崔逺飣座棃事見神彩門樂遊之棃北狄渤海果有樂遊之棃鳯棲棃地理志河中府土貢鳯棲棃轉枝棃童子通神集曰房次律弟子金圖十二歲時次律問葛洪仙籙中事以水玉數珠手節之凡兩編三百事次律賞以轉枝棃洗粧酒唐餘録曰洛陽棃花時人多携酒其下曰為棃花洗粧折花簮之壓損帽簷梁緒棃花時折花簮之壓損帽簷至頭不舉出祥雲志李直方第果品楞棃為副國史補九仙銀井九仙殿銀井有棃二株枝葉交結宫中呼為雌雄出金鑾密記二棃肅宗夜坐地爐燒二棃以賜泌穎王恃恩固求上不許曰汝飽食肉先生絶粒何乃爭邪王請聯句頴王曰先生年幾許顔色似童兒信王曰夜枕九仙骨朝披一品衣一王曰不食千鍾粟惟飱兩顆棃上曰天生此間氣助我化無為李泌家傳洛陽報徳寺棃重六斤酉陽雜俎結一實大如升李昇本徐氏湖州安吉人為安吉令先是其家有棃樹云結一實大如升其父異之將獻郡守有謂其父曰此果非常年所有即上獻來年見徴安知復有此物不如勿獻其父然之因㑹鄰里將共食即席割之有赤蛇在實中割者大驚投刄於地俄而赤蛇走其母榻之下尋之了無所見未幾其母遂孕知誥吴越備史淮口出夏棃酉陽雜俎曹州及揚州淮口出夏棃鳯止棠陜州硤石縣山中有棠一株甚偉古老傳云鳯止棠貞觀初有鳯止此木其後結實尤大如合掌狀團團婉轉有赤黄之色其馨香脆美乃諸果之王職貢之珍也刺史韋堅為銘刻於石紀異記張棃杜甫詩張棃不外求離離玉潤紫花開處擅美春林緑蔕懸時回光秋浦離離玉潤落落珠圓李遵作進棃表出耳目記棃花春杭州其俗釀酒趂棃花春時熟號棃花春故白公杭州春望云紅袖織綾誇柿蔕青旗沽酒趂棃花長慶集秋棃滿地紅李賀曲水飄香去不歸棃花落盡成秋苑同上山棃結小紅杜甫雨晴詩色好棃勝頰詠懐瑶光樓南多紫棃津陽門詩棗十二白安邑魏文帝詔曰凡棗味之美莫如安邑之御棗也信都魏都賦曰信都之棗千樹漢安邑千樹棗人與千户侯等弱枝閑居賦曰周文弱枝之棗羊棗孟子曽晳嗜羊棗而曽子不忍食雞心廣志有雞心棗遵羊洗犬並棗名出爾雅女贄傳女贄不過榛栗棗脩以告虔也籩實周禮饋食之籩其實棗八月八月剥棗詩如𤓰漢書李少君曰臣並海上見安期先生食棗如𤓰去婦漢王吉字子陽東家棗樹垂吉庭中其妻取棗啖吉吉知乃去婦鄰人聞之欲伐樹請吉吉乃還婦里人語曰東家棗完去婦復還鮑焦歐風俗通曰鮑焦耕田而食穿井而飲於山中食棗或曰此棗子所植耶遂歐而死也云云活人韓子秦飢應侯曰秦王五苑之棗栗足以活人請王發與之惠王依之羊角梁簡文詠棗曰風揺羊角樹日映雞心枝已聞安邑美永茂王門垂孔不敢伐宗室臯遷荆南節度使凡戰師所過不敢伐棗棗實禮志凡用皆四者籩以棗實波斯棗西域磨鄰人食鶻莽鶻莽波斯棗也龍骨地理志河中府貢龍骨棗檽棗石晉朝趙令公􅉷家庭有檽棗樹婆娑異常四逺俱見望氣者訪其鄰里問人云此家合有登宰輔者不在其人在其子孫後令公由太原太守北夢𤨏言碧棗杜陽編處士元藏大業元年為海使判官遇風浪壊舩獨為破木所載忽逹于洲島洲人曰此乃滄洲有碧棗大如棃單雄信幼時學堂前植一棗樹至年十八伐為鎗長一丈七尺拱圍不合刃重七十斤號寒骨白酉陽雜俎全赤白公秋遊原上新棗未全赤安平御棗劉良文選注信都屬安平出御棗棗無核者食可度世河中永樂縣出棗世傳得棗無核者食可度世里有蘇氏女自小獲而食之不食五榖年五十嫁顔如處子自亂離後莫知其所北夢𤨏言棗圃落青璣韓愈秋雨聯句出籬大棗垂紅殘李賀雜序蒲中多大棗天下傳歲中不過一二無核者感遇傳堂前撲棗任西鄰杜甫詩栗十三白女贄見上門籩實周禮饋食之籩其實棗栗固安魏都賦曰固安之栗罅發蜀都賦曰榛栗罅發千樹漢書燕秦千樹栗其人與千户矦等周社哀公問杜於宰我宰我對曰周人以栗曰使民戰栗秦苑見上注練主禮虞主用桑練主用栗樹之榛栗詩隰有栗詩東門韓詩東門之栗有静家室注云東門樹外有善人可為家室也傷賦蔡邕字伯喈傷故栗賦曰何根莖之豐美嗟大折以摧傷韓國魏志東夷韓國出大栗如棃巨實梁庾肩吾謝栗啓曰北燕巨實嘉卉詩山有嘉卉惟栗惟梅孔食之如李五行志長慶三年十一月成都栗樹結實食之如李栗黄禮志用皆二者籩以栗黄作粉勝菱芡唐本草注栗作粉勝於菱芡丹栗杜陽編滄洲有丹栗大如棃栗木關從容録曰凡門以栗木為關者夜可以逺盜形如棗核酉陽雜俎虔州南有漸栗形如棗核最有實事李直方嘗第果實若貢土者或問栗曰最有實事不出入九語林穰多栗過拳杜甫詠懐栗綴鼻道人殷七七嘗為一官僚召飲有佐酒倡優笑之七七取栗㪚之皆聞異香出自栗中惟笑七七者栗綴鼻中復聞穢氣殆不堪忍共為謝過栗乃墜續神仙傳鳯冠栗謝𤣥卿遇神仙設鳯冠栗同上採栗𤣥猿窟韋應物詩霜栗酤酒提盤飯霜栗李白詩收拾不可遲韓愈送張道士序詩霜天熟柿栗收拾不可遲石榴十四白塗林陸機與弟書曰張騫為漢使外國十八年得塗林塗林安石榴也釀酒扶南傳頓孫國有安石榴取汁停盆中數日成美酒競裂蜀都賦曰若榴競裂若梅潘岳閒居賦曰若梅蒲萄之珍磊落蔓衍于其側磊落若梅也孔贍博南蠻贍博果有波即婆宅䕶遮菴摩石榴天漿雜俎石榴甜者謂之天漿能已乳石毒丹若石榴名同上胡碼碯揚州事迹李漢碎胡碼碯盛送王莒曰安石榴奉送莒見之不疑既食乃覺味絶洛中雜俎南詔石榴子大皮薄如藤紙味絶於洛中新羅多海石榴同上花如槿紅同上衡山祝融峯下法華寺有石榴花如槿紅春秋皆發石阿措廣異記崔𤣥微嘗遇數美人有緋衣小女曰石阿措石阿措即石榴也何年安石國萬里貢榴花元稹詩何年安石國萬里貢榴花迢逓河源道因依漢使槎白馬甜宫人或轉遺親戚以為竒異得者不敢輒食乃歴數家又有大者京師語曰白馬甜榴一石直牛伽藍記山榴躑躅少意思照曜黄紫徒為叢韓愈杏花詩海榴紅綻錦窠勻元稹早春登静勝寺詩緑葉裁煙翠紅英動日華元稹石榴花發滿溪津漢女洗花染白雲李賀緑章封事赤玉何人小琴軫紅纈誰家合羅袴白居易喜山石榴開詩應制詠詩孔紹安仕隋髙祖受禪間往來奔見之甚恱拜内史舍人時夏侯端亦嘗為御史先歸朝紹安受秘書監因侍宴應制詠石榴詩祗為時來晚開花不及春時人稱之漢武致石榴於異域靈根遐布此西域柔服之應也文粹李徳裕橘賦温湯朝元閣七聖殿自神堯至昭成肅明皇后皆立衣衮衣遶殿石榴皆太真所植洪武雜説榴開舞酒紅張説絳英韓文榴花詩柰十五白素柰夏成文選嘉柰晉起居注曰嘉柰一蔕十五實或七寳出酒泉丹白潘岳閒居賦曰二柰耀丹白之色紫柰漢武内傳仙藥之次有圓丘紫柰赤柰廣志酒泉有赤柰張掖有白柰冬至曹植子建謝賜冬至柰表曰柰以夏熟今則冬至抱樹孝子傳王祥字休徴後母庭中有柰樹使祥守驅鳥雀時雨忽至祥抱樹至曙孔冬柰地理志甘州土貢冬柰輕籠杜甫輕籠熟柰香大如兎頭白柰出凉州野猪澤大如兎頭脂衣柰漢時紫柰大如升核紫花青研之有汁可漆或着衣不可浣也𤣥洲白柰謝𤣥卿遇神仙設𤣥洲白柰續仙傳實重七斤白馬寺柰實重七斤至熟時常取之或賜宫人出伽藍記宫人轉遺親戚以為竒異得者不敢輒食乃歴數家同上山風猶滿把野露及新嘗杜甫詩胡桃十六白外剛内柔晉劉滔毋荅國書曰胡桃本生西羌外剛樸内柔甘質似古賢欲以奉貢西域博物志張騫使西域還乃得胡桃遺人後漢孔融字文舉與諸卿書曰多惠胡桃深知篤意孔除風唐孟詵云胡桃不可多食動痰飲除風令人能食黒鬚髪同上胡桃䏑雲仙散録豐年録開元中長安物價大減胡桃䏑十金一拌蔓胡桃出南詔大如扁螺兩隔味如胡桃或言蠻中藤子也酉陽雜俎白孔六帖卷九十九
