body:
  text: 白孔六帖卷二十七唐白居易原本宋孔傳續撰寛恕一直二徳三規誨四賢徳五行六性情七命八寛恕一白包荒易爾無忿疾于頑書無求備於一人語必有忍乃有濟有容徳乃大不恕臧武仲作不順而施不恕勿施於人己所不欲其恕乎子曰有一言而可以終身行之其恕乎躬自厚而薄責於人則逺怨矣人之過也各於其黨觀過斯知仁矣小人不能為君子之行非小人之過也當恕而勿責寛則得衆國君含垢傳天之道也曹參見人有細過掩匿覆盖之丙吉不罪馭吏馭吏頻醉西曹請罪之吉曰以醉飽之過斥人欲令安歸乎不過吐嘔丞相車茵西曹第忍之蒲鞭示恥羮爛汝手漢劉寛字文饒吏人有過但蒲鞭示恥而已又夫人欲試之趨朝裝畢使婢奉肉羮翻汚朝衣上遽收寛神色不異徐謂婢曰羹爛汝手耶宋則蒼頭誤殺子宋則子年十歲與蒼頭共弩射絃斷矢繳誤殺則子死則恕不誅荀爽美之不加聲於僮僕晉鄭黙忠恕違道不逺兼容藉孺勸魏其侯不以已能責人不能王褒忠恕而已認物與具刑法部猜認門注避盗具凶惡門雜盗注不見吏過曹參為國相舍後園近吏舍日夜飲呼從吏患之引參遊園幸國相召按之乃反取酒張坐飲亦歌呼相應見人細過專掩匿盖覆敗面蔡系與謝萬争言推萬落牀冠帽傾脫萬徐起曰卿幾敗面神氣自安理遣衛玠叔寳嘗云人有不及可以情恕非理相干可以理遣故終身無喜愠之色孔馬蹶鞍壊裴行儉嘗賜馬及珍鞍軍吏私馳馬馬蹶鞍壊懼而逃行儉招還之不之罪初平都支遮匐獲瓌寳不貲蕃酋將士願觀焉行儉因宴徧出示坐者有碼碯盤二尺文彩燦然軍吏趨跌盤碎惶懼叩頭流血行儉笑曰爾非故也何至是色不少吝性寛簡郭翰者性寛簡人有忤己遜以自免婁師徳有度量人有忤己輙遜以自免不見容色臨事不苛細楊恭仁遷甘州刺史臨事不苛細徼人安之衆服其量竇徳𤣥帝封禪次濮陽問古謂帝丘徳𤣥不能對許敬宗具道其然帝稱善敬宗自矜于人徳𤣥知不為忤衆服其量長厚常衮與楊綰同執政綰長厚通可而衮苛細於人無所不容薛存誠性和易於人無所不容政尚寛簡顧少連政尚寛簡不為灼灼名夷粹無競沈傳師性夷粹無競寛厚人皆安之髙固拜邠寧節度使固夲宿將且寛厚人皆安之然久在散位數為儕類輕笑及受命衆多懼固一釋不問敦大則有以容而思韓愈釋言劉鼎風稜五代劉鼎性若寛易而與選曹案吏有風稜性寛𤣥宗既命蕭嵩為相嵩性寛博多可及嵩引韓休同列有博厚恢𢎞之徳能并容善偽柳宗元羽化栁公權凡公卿以書貺遺盖鉅萬而主藏奴或盗用嘗貯盃盂一笥縢識如故而器皆亡奴妄言叵測者笑曰銀盃羽化矣不復詰為父禳災李勉為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞於其壠或以告勉勉曰為父禳災亦可矜也舊史寛博多可韓休與蕭嵩同相嵩寛博多可休峭鯁寛恕退抑河間王孝恭寛恕退抑無矜伐色苗晉卿知選事選人訴索好官厲言倨色紛於前晉卿與相對終日無愠顔進侍郎積寛縱而吏下因縁作姦本傳居官有績根仁恕盧鈞所居官必有績大扺仁恕至誠而施於事奴以米易酒陽城嘗絶粮遣奴糴米奴以米易酒醉卧於路城怪其故與弟迎之奴未醒乃負以歸及覺奴痛咎謝城曰寒而飲何責焉僚史非大過不榜責吳湊僚史非大過不榜責召至廷詰服原去其下傳相訓朂舉無稽事家僮折馬足不責歸登性温恕家僮為馬所踶笞折馬足登知不加責有遺金石不死藥者紿曰已嘗及登服幾死訊之乃未之甞人皆為怒而登不為愠寛和髙瑀寛和居官無赫然譽所至稱治士人懐之斷速則寡恕於人陸贄斷速則寡恕於人而疑似不容辨也寡恕而下懼禍故反側之釁生不責奴僮相詬朱朴每對客不責奴僮曵仆諸前相之詬曰若持怒心即自撓矣人伏其長者戴至徳遷尚書右僕射時劉仁軌為左人有所訴率優容之至徳乃詰究本末理直宻為奏終不顯私恩由是當時多稱仁軌者號仁軌為解事僕射常更日聽訟有嫗詣省至徳已收牒嫗乃復取曰初以為解事僕射今乃非是至徳笑還之人伏其長者本傳不知錢陌銖兩之數五代姚顗為人仁恕不知錢陌銖兩之數墨汙爾婁師徳在夏官注選選者就按閱簿師徳曰容我擇之可乎選者不去乃洒筆曰墨汙爾盗飲具九國志王潜夜宴盗入其家盡取飲具逮明方知笑曰亦好飲耶竟不問性寛易袁滋性寛易與之接者皆自謂可見肺腑直二白正曲為直直哉惟清司直彼己之子邦之司直直如朱絲繩如矢之直如弦之心直如弦死道邉舉直錯諸枉能使枉者直民之生也直罔之生也幸而免言人生所以自終以正直直而無禮則絞好直不好學其蔽也絞子貢曰惡訐以為直者訐發人之隂私曰思無邪詩三百一言以蔽之古之愚也直今之愚也詐庸為直乎言非直也惡直醜正言害正直也可謂直矣大直若曲老子身由正立名以直聞友直子曰益者三友友直友諒友多聞獬廌宅買反觸邪本無好惡屈軼指佞豈憚悔尤稱以為權爾雖有說謂之曰直吾則不知盡忠事上正色率下立身勵物軌俗端表雖表必正其景精鋼可折不屈其鋒中正無邪廉直勁正砥礪名節仲尼曰叔向古之遺直言叔向之直有古之遺風治國制刑不隐於親三數叔魚之惡不為末減末薄也曰義也夫可謂直矣叔向刑以殺弟故仲尼以為于義未安直則有也伯宗直言及難伯宗直言其妻戒之曰子好直言必及於難微生乞鄰子曰孰謂微生髙直或乞醯焉乞諸其鄰而與之父子相隐直在其中葉公曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隐子為父隐直在其中矣直哉史魚邦有道如矢邦無道如矢柳下惠以直道而三黜栁下惠為士師三黜人曰子未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦有覺徳行覺然正直貌身有危而志不可奪見利不虧其義見死不更其守朱雲直臣雲直諌帝令斬之雲攀折檻成帝命令勿易折檻以旌直臣汲黯正直黯字長孺朱雲請劎斷佞臣張禹頭張綱埋輪請誅梁冀董宣强項不拜殺公主奴上令謝主宣手據地不肯因謂之强項令任座之言文侯尚喜翟璜曰君仁則臣直任座之言宜文侯大喜也朱雲之節成帝猶旌見上注執徳不廻楊惲曰勁直者未必全直貌王陵任氣好直言虞詡字升卿刺舉無所廻容有譴栲三曹刑罪剛直之性終不可踰免仇盖勲為濮陽長史武威太守貪猾從事蘇正和案致其罪梁州刺史梁鵠畏貴戚欲誅正和訪於勲勲素與正和有仇及問對曰絏食鷹鳶欲有鷙鷙而殺之何哉鵠乃止和聞言詣勲勲不見曰吾為梁使君不為蘇正和也彈射蜀孟光曰吾好直言每彈射利病為世所嫌方直之士晁錯曰奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以無功居尊顯之位可謂方直之士矣不事權貴漢嚴彭祖為太傅廉直不事權貴或說天時不如人事君不修小禮曲意無左右之助願勉强之彭祖曰通經術修先王道何可委曲也又魏劉放孫資用事辛毗獨不交好子弟勸之毗曰吾立身有本末孫劉不平不過不作三公何害者也怒鴨欄劉遜伯言時建昌侯慮於堂前作闘鴨欄頗施小巧遜正色曰君侯宜勤覽經典用此何為慮即時毁徹也面折長官郅惲事見政部屬吏門注孔方挺李栖筠方挺無所屈直道而行長孫無忌帝曰朕當評公等可否謂馬周評裁人物直道而行面刺人短嗣吳王子巘性介直面刺人短無所囘畏魏謩為宰相議事天子前讜切無所囘畏謂彊直為擅權魏徴曰便佞之徒謂彊直為擅權令狐峘諌詔答曰朕頃議山陵荒哀迷繆以違先㫖卿引據典禮非惟中朕之失亦使朕不遺君親於患敢不聞義而從奉以終始雖古遺直何以加焉鯁切李義琰帝每顧問必鯁切不囘主聖則臣直栁範曰主聖則臣直陛下仁明臣敢不盡愚見王公未嘗屈禮韋思謙進御史大夫性謇諤顔色莊重不可犯見王公未嘗屈禮峭直有行劉子翼峭直有行孤直憲宗皇后郭氏崩太常官王皡請后合𦵏景陵以主附憲宗室帝不恱令宰相白敏中讓之皡曰后乃憲宗東宫元妃事順宗為婦歴五朝母天下不容有異論敏中亦怒周墀又責謂皡終不撓墀曰皡性孤直俄貶皡句容令世路孔艱直者先禍楊再思居相十餘年阿匿取容無所薦達人主所不喜毁之所喜譽之畏謹足恭未嘗忤物或曰公位尊何自屈折答曰世路孔艱直者先禍不爾豈全吾軀非公言直道不萌於心顔真卿立朝正色剛而有禮非公言直道不萌於心以直道進退李絳以直道進退望冠一時賢不肖太分屢為讒說所中激浮競宋申錫素孤直少與及進用議者謂可以激浮競元稹上疏人君始即位萌象未見必有狂直敢言者上或激而進之則天下君子望風曰彼狂而容於上其欲來天下士乎吾之道可以行矣其小人則竦利曰彼之直得幸於上吾將直言以徼利乎彊直守正徐晦彊直守正不浮沉於時世推敢直段平仲朝廷有得失未嘗不論奏世推其敢直云氣讜言直吕元膺為同州刺史既謝帝延問政事所對詳詣明日謂宰相曰元膺氣讜言直宜留左右奈何出之李藩裴垍謝因言陛下及此乃宗社無疆之休臣等昧死請留元膺給事左右矜嚴悻直竇參為人矜嚴悻直果於斷以直言相周墀議河湟不合旨罷都尉鄭顥言於帝曰世謂墀矜嚴悻直以直言相亦以直言免性狷直張籍性狷直嘗責韓愈喜博簺及為駮雜之說論議好勝人其排釋老不能著書峭鯁李翺性峭鯁論議無所屈直道是陳柳宗元作陽城碣曰惟兹陽公乃作諫臣抗志厲義直道是陳鯁亮知名崔邠遷補闕上疏論裴延齡姦以鯁亮知名帝思質直賈隐林屬朱泚難率衆扈行在封武威郡王賊圍解從臣稱慶隐林流涕前曰泚已奔羣臣大慶宗社無疆之休然陛下資性急不能容掩若不悛雖今賊亡憂未艾也帝不以為忤拜神䇿統軍卒帝思其質直贈尚書左僕射谷那律從太宗出獵遇雨霑漬因問曰油衣若為而無漏耶那律曰以瓦為之當不漏帝恱其直清直亡欲席豫清直亡欲當官不為權直所憾資質樸直蔣乂資質樸直遇權臣秉政輙數歲不遷遇事不囘崔祐甫性剛直遇事不囘未始降屈魚朝恩凡詔㑹羣臣計事朝恩怙貴誕辭折愧坐人出其上雖元載辨彊亦拱黙惟禮部郎中相里造殿中侍御史李衎酬詰往返未始降屈搢紳賴以為彊李石當軸秉權亡所撓方是時宦侍氣盛陵暴朝廷每對延英而仇士良等往往斥訓以折大臣石徐謂曰亂京師者訓注也然其進孰為之先士良等恧縮不得對氣益奪搢紳賴以為彊願任直臣郭子儀願任直臣則中興之功日月可兾容直臣田布入為左金吾衛將軍諫官嘗論事帝前同列將麾却之布止曰使天子容直臣毋輕進犯顔冒禍人之甚害存焉陸贄直而無隐裴皡性剛急直而無隐五代史盆池魚明皇以李林甫為相一日曲宴近臣於禁苑中帝指示張九齡李林甫曰檻中盆池新魚數頭鮮活可愛林甫曰賴陛下恩波所飬九齡曰盆中之魚猶陛下用人但能裝景致助兒女之戯耳帝不恱人皆美九齡之直天寳遺事賜筯表直宋璟為相朝野歸美時春御宴帝以所用金筯令内臣賜之曰賜筯以表卿之直也天寶遺事諧附者無黜剥之憂正直者有後時之歎韓琬公異時有姦邪譛斥又可爾乎楊憑與御史中丞李夷簡素有隙因隙劾憑江西姦贓及憑罪姻友懼素無往候者徐晦至藍田慰餞宰相權徳輿謂晦曰獨君送臨賀誠厚無乃為累晦曰方布衣時臨賀知識今忍遽棄耶有如公異時有姦邪譛斥又可爾乎徳輿歎其直稱之朝夷簡遽表為監察御史晦過謝問所以舉之之由夷簡曰君不負楊臨賀肯負國乎明目張膽以報天子韋思謙禇遂良市地不如直思謙劾之出為清水令或弔之答曰吾狷直觸機輙發何暇恤身乎丈夫當敢言地要須明目張膽以報天子焉能録録保妻子邪先朝納諌諍直氣横乾坤杜甫别李義詩徳宗謂姜公輔為賣直而不能容徳宗賛王魏善諌而房杜讓其直唐賛三代遺直魏徴賛栁芳稱徴死知不知莫不恨惜以為三代遺直疏直劉蕡與諸儒偕進獨譏切宦官然亦太疏直矣顯身以直遂兮衆之所宜蔽也栁宗元懲咎賦茍縱直而不羈兮乃變罹而禍俱同上佩韋賦覩直道守節者則壯盖有激也同上羣邪沮謀直道不勝陸贄翰苑集序權徳輿忠直孝友羽儀王室張薦顔真卿視端形直心無岐徑柳宗元書曰狀貌嶷然類丈夫視端形直心無岐徑其質氣誠可尚也韓休峭鯁韓休峭鯁時政得失言之未嘗不切直上每從禽苑圃張樂禁中稍為過差必顧左右曰韓休知否言畢而諌書輙至上嘗引鏡自照黙然不樂左右曰自韓休入相陛下無一日盡歡何不逐去使天顔戚戚上曰吾貌雖痩天下必肥恃直而不戒韓愈釋言今我恃直而不戒禍其至哉直不近禍栁玭家訓徳三徳量隂徳徳服人世徳白君子以振民育徳徳言盛美言徳以盛為美進徳脩業欲及時也君子以懿文徳天地之大徳曰生臯陶邁種徳失道而後徳老子皇天無親惟徳是輔徳無常師太上貴徳潤身禮徳潤身徳以柔中國禮上徳不徳是以有徳老子曰樹徳務滋威懐非威非懐何以示徳雅頌者美盛徳之形容大徳不踰閑語吉徳凶徳晉文公能以徳政凉徳薄徳也徳星聚陳太丘詣荀淑元方將車季方驂乗羣㓜坐于車中荀淑使慈明應門行酒文若小坐於膝餘六龍丁食太史奏徳星聚五百里内有賢人聚徳量魏文帝察黄權有徳量欲試驚之使左右催權交錯於道官屬莫不魂懾而權顔色舉止自若仇覽家人莫見喜怒聲色而雅裴遐在東平將軍周馥坐與人圍棊馥司馬行酒遐未即飲司馬曵遐堕地遐徐起還坐色無變棊如故性和有如此者避火王徽之獻之俱有雅量一日火發其舍徽之走不遑取履獻之怡然命左右扶出以此分優劣也霹靂夏侯𤣥倚柱作書霹靂破柱𤣥書如故諸葛誕亦然臨賊蜀費禕文言時魏軍至假禕往禦之來敏詣禕禕别來圍棊時羽檄交至人馬擐甲嚴駕訖禕與敏竟日對戲色無倦敏曰試君耳必能辦賊也果有功又苻堅入冦朝野震恐謝𤣥入見安安夷然不懼曰已别有㫖又令張𤣥重請安遂與𤣥出遊山墅與𤣥棊賭墅安常劣於𤣥是日𤣥懼便敵手不勝日暮歸部署其所鎮物如此也咸有一徳惟有慙徳徳以施惠徳輶如毛既飽以徳以徳綏我反徳為亂崇徳報功惟徳動天明徳務崇明徳惟馨棄徳不祥為政以徳以徳和人徳成而上度徳以處徳惟善政欲報之徳在乎徳行汪汪萬頃波黄叔度大略趙充坦腹王羲之敗面見寛恕門超將中軍原軫將中軍先以下軍超將中軍故曰上徳也徳之不修是吾憂也語有鄰子曰徳不孤必有鄰徳延延久也書惟寧王徳延君奭秉徳不康康安也非我有周秉徳不康寧多方作徳心逸日休周書恃徳者昌史黎民敏徳虞書言民敏疾敬徳徳儉有度徳廣所及望而畏之貌足畏也色足憚也徳禮不易英華外發尊其瞻視威而不猛恭而安容止可觀動則思禮行則思義監其徳也徳之恭也徳之聚也徳施普也徳之輿也上徳不徳秩秩徳音恭儉惟徳率徳改行果行育徳其徳不囘徳音是茂禮以防徳懿文徳既阻我徳皆有嘉徳隂徳韓厥存趙孤太史公曰韓厥感晉靈公紹存孤以成程嬰杵臼之義韓氏隂徳於趙其大者與魏終為諸侯十世宜乎邴吉病漢邴吉病上使加紼而封夏侯勝曰未死臣聞有隂徳必享其樂以及子孫今吉未獲報非死病果愈于公閭于公閭壊父老治之公曰必髙大其門令容駟馬髙盖我治獄多隂徳子孫當有興者至定國果為丞相升卿虞詡祖曰吾治獄多活人後世雖不及于公何知不至九卿乎故字詡曰升卿𦵏書生後漢王忳字少林詣京師於空舍中見一書生病困慜而視之生曰吾腰下有金十斤相贈乞藏骸骨未及問姓而絶忳鬻一斤營𦵏餘悉置棺下無知者後忳為大度亭長至亭有馬入亭中風飄繡被墮忳前忳後乗馬馬牽忳入他舍主人認馬忳具云云主人曰所埋者我兒也姓金名産此隂徳報君也埋牛肉晉周於郷人有盗牛者於塚間訪得宻埋其肉不使知之叔敖斬蛇史孫叔敖見兩頭蛇恐人更見乃斬埋之叔敖母曰夫有隂徳必有陽報汝必當貴後為楚令尹活千人有封和喜鄧太后訓汝叔陔言嘗聞活千人子孫必封兄訓為謁者治石臼河歲活數千人天道可信家必蒙福初太傅禹歎曰吾将百萬衆未嘗妄殺一人後亦有興者全濟順烈皇后父商曰我先人全濟河西活者不可勝數積徳必報當往此女也静隂合徳不告而退遂亡見孝禄飬門􅒥衰三年史程嬰立孤兒訖還自殺趙武服􅒥衰三年春秋祀之世世不絶行成於内天惟報施神亦福謙積善之家必有餘慶為而不恃聖人施徳不望報老子徳服人徳則不競傳曰徳則不競尋盟何為引車史藺相如位在廉頗上欲辱之相如知毎引車避之後頗肉􅃝負荆謝罪徳攻晉文公能以徳攻人飲徳吴程普以年長侮周瑜瑜折節下之不為校普自敬伏乃告人曰與周瑜交若飲醇醪不覺自醉也飽徳既飽以徳詩君子之徳風人皆改操飾行許邵子將為功曺太尉徐璆敬之府中莫不改操飾行同郡袁紹去濮陽令歸車徒甚盛入界謝賓客曰吾輿服豈可使子將見之遂以單車歸也孫生至孝黄巾不犯孫先生舍以孫至孝陳寔所短陳實仲弓鄉里化其徳人有過曰寧為刑罰所加不為陳寔所短王烈誘人先賢行狀曰王烈識道達義其誘人皆因性氣誨之後有盗牛者發曰罪責甘心乞不使王烈知也烈聞之遺布一端以激其心後老父遺劍於路有一人守之乃是盗牛者心服戴良才高見黄叔度未嘗不正容及歸惘然有失母曰汝復從牛毉兒來耶對曰良不見叔度不自謂不及既觀其人固難得而測矣陳蕃周舉相謂曰時月不見叔度則褊吝心生蕃為三公歎曰叔度在吾不敢先佩印綬避盗賞盗與盗開路並見盗門牛犯禾皇甫謐高士傳曰管寧幼安鄰有牛犯寧禾牽牛著凉處飲食過於牛主牛主大慙若犯嚴刑是以左右無鬪訟河海之潤河海之潤千里盛稱及四海左傳行成于身唯有徳者能以寛服人徳化逢萌修道人皆化之以徳後漢無毒草譬如靈蓍在林林無毒草威鳳在野野集仁禽是以子將為吏人皆改操後漢許子將世徳前訓國語叔詹曰昔用前訓文侯之功武公之業可謂前訓世濟其美不隕其名髙陽才子家聲克紹前烈書父作之子述之無違命傳曰自幕至瞽䏂無違命舜之先也世名清廉漢王吉至孫崇世名清廉陳氏公卿陳寔為太丘長子紀為司農孫羣為司馬世有重名語曰公慙卿卿慙長也伏不競後漢伏湛九世祖伏生經學清浄無競故東周號伏不競楊氏名徳楊震伯起八世祖僖封赤泉侯高祖敞丞相父寶隐居自農至七世名徳震及𤣥孫彪四世為大尉世有名徳羊祜九世並清徳聞祖續父述汜毓字雉春奕世敦睦逮毓九世人號其家兒無常父衣無常主孔為國基於徳禮魏徴云徳禮國之大綱又曰徳禮形則逺者來格國之大綱不可斯須廢也以徳並凶勢不相入陳子昻婁公盛徳婁師徳狄仁傑未輔政婁師徳薦之后曰朕用卿師徳薦也誠知人矣出其奏仁傑慙已而歎曰婁公盛徳我為所容乃知吾不逮逺矣本傳質厚少縁飾元徳秀虞世南五絶虞世南帝每稱其五絶一曰徳行風度凝逺宋璟風度凝逺人莫涯其量天下推為舊徳張鎬起布衣二朞至宰相在位雖淺而天下之人椎為舊徳徐岱不談人短外嚴重中寛厚令狐楚外嚴重不可犯而中寛厚博厚恢大之徳陽城出為道州刺史太學諸生何蕃等二百人頓首闕下請留城栁宗元聞之遺蕃等書曰公有博厚恢大之徳并容善偽來者不拒有狂惑小生依託門下飛文陳愚論者以為陽公過於納汙風度沉整房琯風度沉整世推長者盧知猷器量渾厚世推為長者足乎已無待於外之謂徳韓文原道徳有吉有凶同上人不能窺其際陽城居位八年人不能窺其際拜御史卧家無喜色孫伏伽始伏伽拜御史時先被内㫖而制未出歸卧家無喜色頃之御史造門子弟驚白伏伽徐起見之時人稱其有量以比顧雍李石中人自邊還走馬入金光門道路妄言兵且至京師讙走塵起百官或襪而騎臺省吏稍稍遁去鄭覃將出石曰事未可知宜坐須其定宰相走則亂矣若變出不虞逃將安適人之所瞻不可忽也益治薄書沛然如平時置怨結懽李吉甫李泌竇參器其才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州刺史使甘心焉既至置怨與結懽人益重其量器量方峻楊於陵器量方峻進止有常度器局峻整裴垍器局峻整持法度又竇威有器局莫可得窺蕭頴士送弟旭東歸序冲融坦蕩莫可得而窺也深沉有度量婁師徳深沉有度量人有忤己輙遜以自免不見容色嘗與李昭徳偕行師徳素豐碩不能遽步昭徳遲之恚曰為田舍子所留師徳笑曰吾不田舍復在何人蓄雄剛之峻徳韓愈上于頔書性和易於人無所不容薛存誠隂徳在人陸元方臨終取奏藁焚之曰吾隂徳在人後當有興者本傳白中令應舉屢不第詣胡蘆先生問命生不許之意無科級之分試日排安上門人馬駕肩閙擁公顧見一婦人携女奴挈二合在鬧中女奴力勌置門闑門將闢失婦人與女奴所在合留在闑公以㕘裾衛合恐為他人所搆日晏杳然歘南望向之婦人啜泣而來出聲啼號公詰之婦人反袂拭面而言夫犯刑憲罪案已圎在今辰明辰某家道豐厚然所蓄一寶𢃄有能救䕶者惟欲寶帶且曰今辰五鼔親遣女使齎合當閙中失所在今夫不免極刑矣公備認物主不繆於元安置處給還婦人再拜泣謝而去趂試不及遂罷一舉翌日訪胡蘆先生見公驚異且曰公去歲相過耶曰然公來年及第位極人臣必近種隂徳公匿之而不言芝田録張杜有後豈用灋雖深而治者或能去天下之惡除生人之害所以然也賛皇公隂徳論全救數十族裴遵慶調大理丞邊將蕭克濟督役苛暴役者有醜言有司以大逆論遵慶曰財不足聚人力不足加衆焉能反由是全救數十族本傳裴度質狀眇小既屢出名場㑹有相者在洛大為搢紳所神公特造之相者云公形神稍異不入相若不至貴即當餓死他日出遊香山寺忽一素衣婦人致緹䌌於欄楯上祈祝良久而去度見緹䌌在舊處知其遺忘也遂收取以待婦人再至日暮竟不至度挈歸逆旅詰旦復携往寺門始闢昨日素衣疾趍而至摭聲晼嘆若有非横訊之曰阿父無罪被繫告人假得玉帶二犀帶一直千餘緡以賂津要不幸去失於此今老父不測之禍無所逃度憮然詰其物色因授之婦人拜泣請留一度笑而遣之尋詣相者云審聲色頓異驚曰必有隂徳前途萬里後必位極人臣出摭言規誨四白贈人以言史孔子去周老子送之曰仁者贈人以言夫聰明深察近於死者議人也博辨宏達危身也規我子寧以他規我卒事不規傳曰王使椒舉立向戍子産之後以規過卒事不規曰禮吾所未見者有六焉又何以規之良規戢卿良規大夫規誨傳補察其過匡其不及苦言良箴諍友孔陳吕后禄産禍敗事劉仁軌上疏辭疾因陳吕后禄産禍敗事以規后后遣武承嗣齎璽書慰勉詔太子諸王謝規諷意裴光庭撰瑶山往則維城前軌二篇獻之手制褒美詔皇太子諸王於光順門見光廷謝所以規諷意也蔣欽緒出為華州刺史蕭至忠自晉州被召過欽緒欽緒本姻家戒曰以君才不患不見用患非分而求耳至忠竟及禍劉延祐李勣戒之曰子春秋少而有美名宜少自抑無為出人上延祐欽納賢五慕賢知賢附白直方大義以方外通天下之志以賢制爵周禮出其言善則千里應之髦士攸宜昭眀有融髙朗令終南山有臺樂得賢也南有嘉魚樂與賢者共之棫樸文王能官人也慎其獨君子絜矩之道有方之士不尚賢使人不爭老子恥名之浮於行難進易退三揖而進一辭而退賤貨貴徳賢者不隕獲於貧賤不充詘於富貴去讒逺色賤貨貴徳所以勸賢清明在躬氣志如神從善如流賢哉回也求善不厭賢者子孫宜有後也行賢而能去賢安往而不愛賢人集荀陳之㑹見徳門注吉人為善惟日不足擇善而從為善不改其度孳孳雞鳴而起孳孳為善者舜之徒也朝有進善之旌為善最樂後漢明帝問東平王處家何等最樂對曰為善最樂詐善張湛居室修整雖遇妻子如嚴君人謂湛詐善湛曰人皆詐惡我獨詐善何傷乎動不累髙晉謝鯤通簡有識人服其逺揚而悟於榮辱自處若穢而動不累髙守節傳曰前志有之賢守節選賢與能任賢勿貳取賢斂才舉賢援能進賢受上賞親賢下無能也賢賢易色國之紀人之望賢者信賢而任之君之明也議賢而下之臣之忠也吕氏春秋一沐三握髪一飯三吐哺周公下接白屋之士後世稱聖賢傷賢者殃及三代蔽賢者身當其害達賢者福流子孫嫉賢者名跡不全黄石公三畧人之清者為賢賢不肖之杖鬻子惟后非賢不乂書得地千里不如得一賢士吕氏春秋黄金累千不如一賢建官惟賢書素履賤貨責得所以觀賢魏文得譽於諸侯魏文侯師卜子夏敬段干木田子方得譽於諸侯叔堅圖形於屈廟後漢馬叔堅郷里圖其形於屈原廟陳蕃觧榻陳蕃敬徐孺特致一榻來則觧之去則懸之慕賢執鞭所欣慕太史公曰晏子在余雖執鞭所欣慕傾慕漢臨卭令不敢嘗食身請司馬相如相如往一座盡傾慕之慕藺司馬相如本名犬子慕藺相如為人遂名相如李杜齊名見義感門注喜御荀粲常就李膺門因為其御既還喜曰今乃得御李君矣其見仰慕也如此折角巾郭林宗行遇雨巾一角墊士人故折其巾角以效之蒲葵扇謝安風流時多愛慕故人罷中宿縣還有蒲葵扇五萬安取中者題之京師慕效競市價數倍掩鼻詠謝安能詠為洛下書生有鼻疾故音濁名流學詠者掩鼻效之衣練王𨗳為太保時帑藏諸庫中唯練千端鬻之不得國用不給𨗳乃製練布單衣士人翕然效之練遂涌貴何敢望囘賜也語希顔慕藺孟母三徙以擇善見善如不及見善若驚聞義能徙里仁為美擇不處仁焉得知衣潤而行霧室香而襲衣景慕景行龍門李膺元禮以聲名自髙士有得接遇者名為登龍門見賢思齊執轡魏公子執轡迎侯嬴軾廬魏文侯軾段干木之廬止戈於秦以己方人知賢與選部知人藻鑒門雜吾之師表黄憲字叔度世貧賤荀叔遇憲於逆旅時年十四竦然異之謂子吾之師表也既前見袁閬所未及勞問叔曰子國有顔子識之乎閬曰見吾黄叔度耶倒屣王粲字仲宣詣蔡邕邕倒屣迎粲粲年少容貌小短座盡驚邕曰王孫有異才吾不如也吾家書籍文章當盡與之張孝廉劉琰為丹陽尹張憑字長宗詣琰延之上坐言彌日當留宿至旦遣之憑遂還船須史琰傳教覔張孝廉船便召同載託子薛宣為不其丞琅邪太守趙貢見宣恱其能還至府舍令妻相見戒曰貢君至丞相我子亦中丞相先噉牛心王羲之字逸少年十三謁周顗顗異之時重牛心炙坐客未噉顗先割噉羲之由是知名又託子魏三輔決録曰張既徳容世寒素皃童時功曹游殷察之邀既過家設賔饌其妻笑之殷曰方伯器也與論王覇之畧遂以子楚託之後既薦楚為漢興太守求縣石苞字仲容既知名詣吏部郎許允求為小縣允曰卿我輩人當相引在朝何小縣乎苞曰不意允知己也如此武庫五兵周弼見裴頠嘆曰若武庫五兵縱横一時之傑晏子贖越石父在縲紲中見知人門謝尚就袁宏見風流門孔斗南一人狄仁傑司馬李孝亷每曰狄公之賢北斗以南一人而已内無聲妓娛玩崔從位方鎮内無聲妓娛玩士大夫賢之以一賢敵七國衆李邕下獄許昌男子孔璋上書天子曰昔吳楚反漢得劇孟則不憂夫以一賢而敵七國之衆博選賢傑張𤣥素時太子事游畋𤣥素上書曰宜博選賢傑朝夕侍左右官人惟賢政所以治也陳子昻奏官人惟賢政所以治也然君子小人各尚其類若陛下好賢而不任任而不能信信而不能終終而不能賞雖有賢人終不肯至又不肯勸反是則天下之賢集矣議者乃云賢不可知人不易識臣以為固易知固易識得賢須任又曰陛下知得賢湏任今未能者盖以嘗信任者不效如裴炎劉褘之周思茂騫味道固蒙用矣皆孤恩前死以是陛下疑于信賢臣固不然昔人有以噎得病乃欲絶食不知食絶而身殞賢人于國猶食在人人不可以一噎而止飡國不可以謬一賢而逺正士僥倖開則賢者隐韋嗣立建言僥倖開則賢者隐賢者隐則人不安人不安國將危矣木枕布衾質錢陽城拜右諫議大夫常以木枕布衾質錢人重其賢争信之夷澹多容可康敬休夷澹多容可不飲酒食肉不邇聲色俊賢黄金臺貯俊賢多杜甫治君之用能置賢智於近而置愚不肖於逺使君子小人各適其分而身享安榮五代史楊綰以徳服人而人自化可謂賢矣其議論渾大雖古王佐無以加本賛䘮亡之國在賢哲之所扶匡栁宗元賦賢者常不遇韓休書賢者常不遇不賢者比肩賢者常無以自存不賢者志滿氣得賢者雖得卑位則旋而無不賢者或志主有專不知造物者意如何無乃所好惡與人異心哉不知無乃都不省記忘其死生夀夭耶未可知也慕司馬遷渾瑊慕李徳裕蕭遘行六白行發乎邇見乎逺易言行君子之樞機易行過乎恭師氏敎國三行一孝行以親父母二友行尊賢良三順行事師長孝友而睦姻親行前定則不疚危言危行行成於内行篤敬行成而先言過其行君子恥之内行翟方進内修行善行修身踐言謂之善行積行累功行有枝葉素行景行汚行達行孟子曰栁下惠不羞汙君不辭小官進不隐賢必以其道遺逸而不怨阨窮而不憫與鄉人處由由然不忍去也曰爾為爾雖袒裼裸程於我側安能浼我哉徐景山通介有恒語具節操門魏虞欽著書稱徐邈曰志髙行潔言顧行行顧言士有百行士二其行儒行修大行者不拘小節孔無檢幅温彦博裔孫庭筠薄於行無檢幅夷恵不能全行髙馮上五事以為今外官卑品皆未得禄故飢寒之切夷惠不能全行不飾細行于琮宣宗詔選士人尚公主者顥語琮曰子有羙才不飾細行為衆毁所抑能為之乎行方介崔琯行方介有器藴已長形彼短巳清彰彼濁朱偓性通簡不驕飾嘗曰士茍有行不必以已長形彼短巳清彰彼濁脩潔獨行畢隆擇睿宗嘉隆擇脩潔獨行有古人風輿疾上道潘炎劉晏任權炎乃其壻晏得罪坐貶澧州司馬時輿疾上道不自言于邵髙其介于邵孝悌有行晚塗益脩潔進人以行則枝葉安有難别乎劉蕡卓然髙行隐逸衛大經卓然髙行口無二言潔身亂世以全吾志權臯顔真卿表為行軍司馬拜起居舍人固辭嘗曰潔身亂世以全吾志欲持是受名邪李季卿為江淮黜陟使列其髙行以著作郎召不就自力讀書不謁州郡甄濟耕宜城野自力讀書不謁州郡歲飢節用以給親里大穣則振其餘于鄉黨貧缺者朋友有緩急輙出家貲周贍以義聞天下髙其行不名謂之元魯山逺近慕其行陽城謙恭簡素遇人長㓜如一逺近慕其行來學者接跡于道行悖義言異行未嘗見其行有悖乎義言有異乎行者則徐之棄也柳宗元序性情七白利貞者性情也易懲忿窒慾致命遂志吉凶以情遷愛惡相攻而吉凶生情偽相感而利害生習以成性惟民生厚因物有遷不忌不克天命之謂性率性之謂道人心不同其如面焉傳卞急好潔邾莊公成性人各有性張竦答陳遵曰人各有性長短自裁子欲為我亦不能吾將效子亦敗矣厚貌深情禮人各有心翼奉字少君曰知臣之術在六情十二律五性不相害五行所屬之性六情更廢興東方性仁西方性義南方性禮北方性智觀情以律視性以歴明王所宜獨自難與人共露之别不神獨行則自然韋弦西門豹情急佩韋自戒後漢范丹以性狷急亦佩韋自戒董安于性緩佩弦而自戒窮理盡性以致于命達於情聖人達於情遂於命性不可逸老子曰性不可逸命不可變時不可止性與天道不可得而聞也受性於父母後漢髙獲與世祖有舊祖曰欲善當改剛性獲曰臣受性於父母不可改遂辭之吟詠情性以風其上詩序反情以和其志禮情深而文明禮性猶湍水孟子性相近習相逺語孔鄙逺浮華蕭瑀性鯁急鄙逺浮華恬澹韓思復謇特王義方性謇特髙自標樹簡潔蕭俛性簡潔以聲利為汙疾邪太甚方重不茍言笑韋安石天性質厚韋斌幹局明彊戴胄性堅正幹局明彊性疎而果曰卿性疎而果恐以此孝友蕭復不苛察王珪性不苛察臨官務舉綱維去其不可者至僕妾亦不見喜愠明銳元稹性明鋭遇事輙舉傾邪張又新忌前險譎多端李逢吉和厚尹知章性和厚人不見有喜愠未嘗有産業謹厚宗室道𤣥簡重張鎬奢豪河間王孝恭性奢豪然寛恕退遜無矜伐色嚴重少言鄭珣瑜恭畏徐康王元禮謹潔汝陽王璡謹柔李煴性謹柔材無過人者敏獪馬三寳性通率竇威雅澹未始忤物杜黄裳澹於接物武元衡雅性莊重雖澹於接物而開府極一時選浮險杜兼知天盡其心者知其性知其性則知天矣存存成性存存形色天性叔魚之生也其母視之知其必以賄死楊食我之生也叔向之母聞其號也知必滅其宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎韓文原性后稷之生也其母無災其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎雜佛老而言今之言性者雜佛老而言也雜佛老而言奚言而不異性也者與生俱生者也情也者接於物而生也同上性之品有三而所以為性者五情之品有三而所以為情者七同上性之品有上中下三上焉者善而已矣中焉者可𨗳而上下也下焉者惡而已矣其所以為性者五曰仁曰義曰禮曰智曰信上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖于四情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也上者可學而下者可制性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪故上者可學而下者可制也下之情莫不願達於上上之情莫不求知於下陸贄命八白樂天知命故不憂易窮理盡性以至於命以聽天命得之自是不得自是以聽天命不知命莊子曰聖人達於性遂於命命不可變見上不知所以然而然得之在命文子曰所受天之命所遭於時有其才不遇于世命也求之有道得之有命故君子能以為善不能必受其福不忍為惡未能必免其禍故逢時進得之以義何幸之有不逢時必讓何不幸之有道之將行命也道之將廢命也公伯寮其如命何列子有力命論各正性命命可長也短長之命不知命也天命之謂性孔竇威仲尼棲遲不偶餘見勸學髙竇賛曰古來賢豪不遭興運埋光鏟采與草木俱腐者可勝咤哉人禀天地而生而謂之命蕭瑀嘗以劉孝標辯命論詭悖不經乃著論非之以謂人禀天地而生而謂之命至吉凶禍福則繫諸人今一於命非先王所以教人者脩短天也馮宿疾革將斷重刑家人請宥之宿曰命脩短天也撓法以求祐吾不敢命屯子今委脩短豈得恨命屯杜甫詩非人力所支長孫皇后疾太子欲請大赦曰死生有命非人力所支若脩福可延吾不為惡使善無效我尚何求帝聞嗟羙命薄不能勝扈載王朴問李榖載不為舍人何也榖曰非不知其才然載命薄恐不能勝朴曰公為宰相以進賢退不肖何言命耶已而召拜知制誥及為學士歳中卒位三公年踰八十非命乎李勣疾諸子固以藥進輙曰我山東田夫耳位三公年踰八十非命乎生死繫天寧就醫求活耶死生有命李𤣥道李宻署記室宻敗為王世充所執衆懼不能寐獨𤣥道曰死生有命憂能了乎釋縛為著作賛皇公荀恱哀王商論以仲尼之徳足以塞叔孫之毁以仲尼之仕足以免陳蔡之困以仲尼之智足以避匡人之辱以仲尼之道足以容魯哀之世而逼廹多懼殆於危亡由是思之無非命也命之否也龍虎不能免於患及命之泰也蛭螾皆得保其生名士以才為命婦人以色為命同上折羣疑相論百年賦命定豈料沉與浮杜甫送韋評事命與時俱背才將聖不偶命與時俱背李白贈從弟弗耕而望收李白命解或曰貴與富在我而已以智求則得之不求則不得也何命之為或曰不然求之有不得而不求有得之者皆命也人事何為二子出或問曰二者之言其孰是也對曰是皆䧟人於不善之言也以智而求之者盗耕人之田者也皆以為命者弗耕而望收者也吾無取焉爾命之窮通自我為足下曰命之窮通自我為之吾恐未合于道足下徴前世而言之則知矣若曰以道徳為己任窮通之來不接意則可也韓文與衛中行書不遇興詞鬱厖眉之都尉數竒見惜坐猿臂之將軍柳睢陽碑命之窮勢之極栁文書命之窮勢之極其卒呼憤自斃不復望於上矣命乃天也今天子興教化定邪正海内皆欣欣怡愉而僕與四五子者獨淪䧟如此豈非命與命乃天也非云云者所制餘又何恨同上書主相造命李泌帝曰且建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞罰矣自古聖賢多薄命英雄惡少皆封侯杜白孔六帖卷二十七
