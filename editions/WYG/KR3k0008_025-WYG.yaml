body:
  text: 白孔六帖卷二十五唐白居易原本宋孔傳續撰孝一飬禮二孝行三禄飬四父母疾五違離六孝感七毁傷八不孝九天子孝十諸侯孝十一卿大夫士孝十二庶人孝十三事親禮十四忠十五孝一白詩凱風美孝子也能盡其孝道以慰其母心七子之母白華美孝子之潔白也南陔孝子相戒以養也書奉先思孝克諧以孝烝烝又不格姦人之行莫大於孝聖人之徳無以加於孝乎君子務夲夲立而道生孝悌也者其為仁之本與事父母能竭其力父兮生我母兮鞠我長我育我出入腹我欲報之徳昊天㒺極宗族稱孝焉邇之事父弟子入則孝出則悌子生三年然後免於父母之懐予也有三年之愛於其父母乎州閭鄉黨稱其孝也父父子子天之經地之義人之行也君子頃音跬歩之間不敢㤀孝潁考叔純孝也愛其母施及莊公傳孝子不匱永錫爾類曾閔之行綵衣為戲老萊子年八十衣綵衣為嬰兒戲於父母之前扇枕温席羅威孝聞當時生則敬飬無違孟孫問孝子曰無違用孝飬厥父母五常之首百行之先君子篤於親篤厚也當孝理之時懐歸厚之徳天地之經膝下故親生之膝下日嚴嚴致敬於父母也天性父子之道天性也行以内成孝由中出孝哉閔子騫烏反哺六行之先周禮六行孝友為先父在觀其志父沒觀其行請敦不匱無抑有辭仁親之道執以為恭爾雖有說謂之曰孝吾則不知家統乎尊行先乎孝行成於内陶乎孝理根以天性因心之孝名以孝聞禮由恩制棘心天天母氏劬勞蘭陔庭闈陟岵孝子行役思念父母師氏三徳教國子三曰孝徳以知惡逆三行一曰孝行以親父母不遺惡名禮父母既沒慎行其身不遺父母惡名可謂能終矣嚙指蔡順字君仲飬母求薪客至母望順不還母乃嚙指順心動弃薪走歸母畏雷云云巨孝江革事具下注事親孝與士信臨財㢘取與義分别有讓恭儉下人孔晉陽公主文徳皇后所生后崩主始孩不之識及五嵗經后所游地哀不自勝宗室暠事母孝韓思復少孤年十嵗母為語父亡狀感咽㡬絶趙来章時人哀来章孝岑文本自以興孤生事母以孝顯李日知母未及封而卒方𦵏吏乃齎贈制曰知殞絶于道左右為泣莫能視廵察使路敬僣欲表其孝使求狀辭不報表所居為孝慈里劉子翼貞觀初召之辭以母老詔許終飬江南道廵察使李襲譽嘉其孝表所居為孝慈里貎類父既孤不復視鑑韓臯三世以孝行聞楊為三世以孝行聞至門樹六闕古所未有順色柔聲崔彦昭雖為相退朝侍母膳與家人齒順色柔聲在左右無違士人多其孝丐粟以飬劉三復少孤母病廢三復丐粟以飬海東曾子海東王義慈事親孝於弟兄友時號海東曽子以孝悌名通朝廷者多閭巷刺草之民孝友序唐受命二百八十八年以孝悌名通朝廷者多閭巷刺草之民皆得書于史官以孝悌自修於一鄉一行傳五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壊而天理㡬乎其滅矣於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事迹不著而無可紀次五代史求孝悌之士石昻晉髙祖時詔天下求孝悌之士戶部尚書王權宗正卿石光賛國子祭酒田敏兵部侍郎王延等相與詣東土閣上昻行義可以應詔孝者所以教人為善五代周世宗家人傳體常流血劉敦儒母病狂易非笞掠人不能安左右皆亡去敦孺日侍疾體常流血母乃能下食敦儒怡然不為痛隱留守韋夏卿表其行詔標闕於閭徒歩號泣省父宇文融劾張說引術士解禱出為魏州又貶洪州刺史子審與兄弟侍母京師及聞融再貶不告其家徒歩號泣省父使者憐之以車共載達於巖州力耕飬母王質力耕以飬母父誅解衣請代髙郢父伯祥為好畤尉安禄山陷京師將誅之郢尚㓜父誅解衣請代賊義并貸之孝聞里閭髙霞寓五代不異居孝聞里閭徳宗初採使洪經綸言之詔表闕于門路隋父泌從渾瑊㑹盟平凉為虜所執死焉時隋方嬰孺以恩授八品官逮長知父執虜中日夜號泣坐必西嚮不食肉母告以貎類泌者終身不引鏡路巖志純潔親歿終身不食肉闗中曾子賈㑹時號闗中曾子賜鴆代飲賈直言父道冲以藝待詔代宗時坐事賜鴆將死直言紿其父曰當謝四方神祗使者少怠輒取鴆代飲迷而踣明日毒潰足而出乆乃蘇帝憐之免父死俱流嶺南直言猶足躄自負母入京師元徳秀少孤事母舉進士不忍去左右自負母入京師奉禄不入私舎司馬鍠事繼母孝奉禄不入私舎六闕相望朱敬則以孝義世被旌顯一門六闕相望去病孤王忠嗣父海賓戰死元宗憐其忠贈左金吾大將軍忠嗣時年九嵗始名訓授尚輦奉御入見帝伏地號泣帝撫之曰此去病孤也湏壯而將之更賜令名飬禁中李光弼事繼母至孝見本傳賛第五琦子峰婦鄭皆以孝著表闕于門李晟㓜孤奉母孝李源以父死賊手常悲憤不仕不娶絶酒葷恵林佛祠燈舊墅也源依祠居闔戶日一食祠殿其先寢也每過必趨未始踐階穆宗詔曰源有曾參之行怡然無營夫旌孝所以激人倫也並本傳未嘗與人争沈季詮少孤事母孝未嘗與人争皆以為怯季詮曰吾怯乎為人子者可遺憂於親乎哉鄭善果父誠戰死善果方九嵗以死事子襲爵家人為其㓜弗告也及受詔號慟不自勝顔真卿事親孝十嵗有至性獨孤庠父䘮始十嵗有至性聞呼父官及吊客来輒號慟㡬絶欲與人游必先白母五代王殷事母以孝聞欲與人游必先白母母所不可者未常敢往及為刺史政事有小失母責之殷即取杖授婢僕自笞於母前睦親化人韋萬石始萬石奏太樂博士弟子遭䘮者請以卒哭追集侍御史劉思立劾奏萬石曰睦親化人莫善於孝母食必侍立左右五代張希崇事母至孝朝暮母食必侍立左右徹饌乃敢退負王妣登樓錢鏐嘗於後庭樹層樓王妣春秋髙不能上乃親負而登焉吳越備史入㕑具甘㫖上堂問起居韓愈董召南詩賊閔其孝支叔才隋末荒饉夜丏食野中還進母為賊執欲害之告以情賊閔其孝為解縳傭書蕭銑後梁宣帝曾孫少傭書事母孝匹夫單人行孝一槩而凶盜不敢凌天子喟而旌之者以其教孝而求忠也孝友賛天寳三載詔天下家藏孝經本紀孝徳傳郎餘令孝敬在東宫餘令以梁元帝有天寳三載撰後傳數十篇獻太子太子嗟重改著作佐郎卒人知孝慈則氣感和樂薛放曰孝經人倫之本也光武令虎賁士皆習孝經元宗親為注訓蓋人知孝慈則氣感和樂也帝曰聖人以孝為至徳要道信然事親飬志為大穆寧嘗撰家令訓諸子人一通又戒曰君子之事親飬志為大吾志直道而已茍枉道而三牲五鼎非吾飬也靈武二孝李華二孝賛序靈武二孝曰侯知道程具羅所見戎馬旃裘叅於夷狄而能生以孝飬沒奉以哀穿墉起墳廬於冢次根於天性陶我孝理二子之孝過於曾氏故為之賛云肇有二位孝道爰興桞宗元孝門銘肇有二位孝道爰興克修厥猷載籍是登在帝有虞以孝烝烝仲尼述經以教于曾惟昔魯侯見命夷宫亦有考叔寤莊稱純顯顯李氏實與之倫矮子勸吾食輒飽李建母憐其孝每字之曰矮子勸吾食輒飽進藥吾意其瘳衣布飯蔬虞世南所繼父寄陷於陳世南雖服除仍衣布飯蔬寄還乃釋服啗肉本傳飬禮二白南陔孝子相戒以飬也採蘭有事弟子服其勞有酒食先生饌曾是以為孝乎言未足為孝也服勤至凡為人子者冬温而夏凊昏定而晨省定安牀袵省問安否曾子曰君子所謂孝者先意承志諭父母於道參直飬者也安能為孝乎小人皆能飬其親君子不敬何以辨陸績懐橘九嵗字公紀子路負米下氣怡聲和氣愉色啜菽飲水子路曰傷哉貧也生無以為飬孔于曰啜菽飲水以盡其歡斯之謂孝禮曰君子之孝飬也樂其心不違其志生則親安之祭則鬼享之居則致其敬飬則致其樂子曰今之孝者是謂能飬至於犬馬皆能有飬不敬何以别乎語文王之為世子朝於王季日三鷄鳴而衣服至寢門外問内豎之御者曰今日安否食上必在在察視寒暖之節食下問所膳問所食命膳宰曰末有原末勿也原再也令其食物無再進也問所欲而敬進之内則父母在朝夕恒食子婦佐餕子與婦食其餘食父沒母在冢子御食侍母食也羣子婦佐餕如初禮烹熟羶薌嘗而薦之非孝也飬也飬可能也敬為難敬可能也安為難孟子云曾子飬曾晳既食問有餘乎曰有恐曾晳要分賜與人曾元飬曾子既食問有餘乎曰無矣將以復進也若曾子者所謂飬志也曾元者飬口也事親如曾子可也父母何嘗何食詩刺勤勞不得飬父母也慈以甘㫖禮就飬無方大飬後漢書曰夫鐘鼓非樂之本而不可去三牲非孝之主而飬不可廢言能大飬則周公致四海之祭以義則仲由之菽甘於東鄰之牲也行傭供母江革字次翁客下邳行傭供母母老恐揺動自在轅中挽母車父母老不辭官晉賈充責桑純父母老不歸飬中丞孔恂劾詔下議何曾等曰稽之禮律八十者一子不從政九十者家不從政新令亦如之桑純父年八十兄弟六人三人在家不廢侍飬於禮律未有違解職就飬傅咸字長虞出為兾州刺史繼母杜氏不肯隨咸之官咸自表解職也祖母老辭官李宻字令伯徵為太子洗馬宻以祖母劉氏年髙無人奉飬上表陳情不應命孔陽城遷國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還飬者二十軰有三年不歸省者斥之䑓制苛嚴不可省飬韋温入為監察御史以䑓制苛嚴不可收省飬不拜換著作郎既謝輙解歸力耕飬母王質力耕以飬母三時侍食吾小時猶省長㓜每日兩時節盥起居尊行三時侍食飲食訖然後敢食猶責不如禮今者諸子日出髙眠争覽盤器何曾有此儀可為太息李華與外孫書孝行三白子曰父母唯其疾之憂色難承順顔色為難父母之年不可不知也一則以喜一則以懼見其夀考則喜見其衰老則懼孝哉閔子騫人不間於其父母昆弟之言為人子者出必告反必面所游必有常所習必有業恒言不稱老廣也不登髙不臨深不茍訾不茍笑孝子不服闇服事也暗中為事好生嫌疑不登危懼辱親也父母在不許友以死不有私財父母命呼唯而不諾手執業則投之食在口則吐之走而不趨曾子曰身者父母之遺體敢不敬乎居處不莊事君不忠涖官不敬朋友不信戰陣無勇非孝也五者不遂災及其親敢不敬焉遂成也一舉足不敢􅁯父母是以道而不徑徑邪道也舟而不游不敢以先父母之遺體行危殆一出言不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣父母在不稱老閨門之内戲而不歎君子以此坊民人猶薄於孝而厚於慈烝烝舜也孜孜漢眀也鮑永去妻永字君長妻於母前叱狗永遂去之違命則不孝左敬親者不敢慢於人孝經事親者居上不驕為下不亂在醜不争三者不除雖日用三牲之飬猶為不孝也孝莫大於嚴父尊嚴其父敬其父則子恱修身慎行恐辱先也居父舊官漢杜延年拜御史大夫居父舊官不敢當其舊位坐卧皆易其處所子曰孟莊子之孝也其他可能也其不改父之臣與父之政是難能也為人子者三賜不及車馬恐尊踰於父孝有三小孝用力中孝用勞大孝不匱慈愛􅁯勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母在不敢有其身不敢私其財示民有上下也傷足不出樂正子春下堂而傷足數月不出猶有憂色全歸父母全而生之子全而歸之可謂孝矣三年無改於父之道可謂孝矣不擇禄子路曰家貧親老不擇禄而仕倚門王孫賈年十五母曰汝朝出晚来倚門望暮出不歸倚閭望最孝萬石君子孫咸孝建為最號哭救父樂恢年十一父為縣吏得罪將殺恢伏寺中晝夜號哭令哀之而赦其父遇賊江革字次翁臨淄賊起負母逃走遇賊不忍害傍無几杖胡廣年八十繼母在堂口不稱老傍無几杖忌日三日不食申屠蟠字子龍驢鳴戴良字叔鸞母好驢鳴良常學之以恱母手不驅蚊晉吳猛常手不驅蚊畏其去噬母也眇目殷仲堪父病積年拭淚眇一目不許友以死聶政不受嚴仲子金以母在未敢許人之死取江水姜詩母好江水詩皃為母常取之後被江水溺死恐傷母情詐言㳺學俄而舎傍涌泉如江水并雙鯉同出慰母心有子七人莫慰母心揚名後世見下注身輓車江革事見上注聞父耕泣晉趙至景真詣師受業聞父耕叱牛聲投書而泣師恠問之曰我未能養使老父勞苦師甚異之扇枕王延字元事親夏則扇枕冬則以身温之洗浣石建為郎中令每五日洗沐歸舎竊問侍者取親中帬厠牏身自浣滌注親父也中帬言中衣也厠近身衣也牏音投持遺劒張武父業戰失屍骸武每節持遺劒至亡處祭酹而還拜畫圖金日磾見母畫象則拜又晉許孜生有孝行圖父母象於廟朝夕拜之郭巨瘞子見宋畧孔李安期父貶桂州遇盗將加以刃安期跪泣請代盗哀釋之號伏叛壘李甘楊牢有至行甘方未顯以書薦於尹曰執事之部孝童楊牢父茂卿從田氏府趙軍反殺田氏茂卿死牢之兄蜀三往索父喪慮死不果至牢自洛陽走常山二千里號伏叛壘秃髮羸骸有可憐伏讐意感解以尸還之單縗冬月往來太行間凍膚皸瘃衘哀雨血行路稠人為牢泣㱕責其子以牢免之牢為兒踐操如此未聞執事問唁而書顯之豈樹風扶教意耶以身蔽父霍王元軌歷定州刺史王文璪者與賊戰戰敗二子鳳賢更以身蔽父得全二子死縣抑不為言元軌㢘知之遣使吊祭上其事行積雪中五代張策李克用攻王行瑜䇿與婢肩輿其母東歸行積雪中行者憐之侍父母喪還鄉徒跣數千里服雖除容貌癯瘠李百藥里中一龍賈㑹有髙節不答辟置里中号一龍親亡負土成墓廬其左手蒔松栢時號闗中曾子髙堂九仞曽輿有北向之悲積粟萬鍾季路有南遊之嘆駱賔王上裴侍郎禄養四榮親附白孝乃行先禄宜親及禄非為己養貴逮親鴻既漸而于干烏豈忘於反哺欲養而親不待韓詩曾子曰往而不還者親也故孝子欲養而親不待是故椎牛而祭不如雞豚之逮親存也初吾為吏禄不過鍾釡尚忻然而喜者樂其逮親也既沒之後嘗事楚堂髙九尺轉轂百乗猶北向而泣者悲其不逮吾親也家貧親老不擇禄而仕家語子路曰家貧親老不擇禄而仕昔者由也為親百里負米親没南㳺於楚從車百乗累茵而坐列鼎而食願負米百里豈可得乎樹欲靜而風不止子欲養而親不待枯魚衘索㡬何不蠧二親之夀忽如過隙子曰由也可謂思之也毛義捧檄毛義家貧養親張奉慕其名詣義㑹府檄至以義為守令義捧檄入喜動顔色奉心賤之及義母死除服舉賢良方正不就奉嘆曰徃日之喜為親也干及親之禄立身揚名以顯父母日用三牲之養嗷嗷林烏受哺於子耿弇省疾後漢耿弇父况疾兄弟三人皆垂青紫侍省疾當世榮之虞譚母孫氏加金章虞譚母孫氏夫死不改節訓譚忠義後蘇峻反譚有功拜武昌侯太夫人加金章紫綬譚立養堂於家王𨗳已下皆拜感汝墳之就舉周磐堅伯居貧飬母儉薄不充讀詩至汝墳之卒章慨然而歎乃解韋帶就養孝亷之舉卒章曰雖則如燬父母孔迩公卿奉夀後漢張酺家孟疾為太尉雖在公位父嘗歸田里酺每遷職輒一詣京師適㑹嵗公卿罷朝酺府奉酒上夀極歡卒日衆人皆榮慶之將吏拜迎魏張遼文逺屯合肥時遼母至屯遼從出迎所督諸軍將吏皆羅拜迎側觀者榮之顧雍母吳志顧雍為尚書令迎母於吳既至權臨賀之親拜其母於庭大臣畢㑹後太子往慶之孔頼禄而養姜公輔為翰林學士嵗滿當遷上書以母老頼禄而養求兼京兆户曹不得就養李光弼帝幸陕數存問其母令郭子儀輦其母還京二年光弼疾篤將吏問後事答曰吾淹軍中不得就養為不孝子尚何言哉未嘗豫宴樂令狐楚觀察使王珙愛其材將辟楚楚雖在珙所以父官并州不得奉養未嘗豫宴樂滿嵗謝歸求為知院官許康佐家苦貧母老求為知院官人譏其不擇禄及母喪已除凢辟命皆不答人乃知其為親屈嵗月其滔王勃倬彼我系篇有鳥反哺其聲嗷嗷今我不養嵗月其滔循陔思養李賛皇賜何𢎞敬詔卿奉親之孝朕所深知陟屺有懷循陔思養違離周嵗固切歸心一鍾信榮禄可以展懼忻韋應物送鄒少府詩士皆豔其榮蕭嵩請老家饒財而華為二部侍郎衡以尚主位三品就養年踰八十士皆豔其榮父母疾五白喜懼之年父母之年不可不知一則以喜一則以懼左右就養無方方常也左右扶持也昬定而晨省定謂牀衽省問安否父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈矧見齒也行不能正履不脫冠帯而養親有疾飲藥子先嘗之禮病則致其憂色不滿容色憂王季不安節則内豎以告文王文王色憂王季復膳然後復初文王有疾武王不脫冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間間瘳也禮曰下氣怡聲問衣燠寒疾痛痾癢而敬抑搔之出入則或先或後而敬扶持之禮曰親老出不易方復不過時黄雀王祥至孝後母病思黄雀求之不得憂嘆乃有雀數十飛入幕母感憐之母失明盛彦母王氏因疾失明彦不應辟召躬奉病乆婢使數見捶楚婢恨伺彦行取蠐螬炙飴之母食以為美然疑是異物藏以示彦彦見而抱母慟哭絶而後蘇目豁然即開也奉孝行劉􅒮為荆州奏仇敎母老疾困賊至守衛不移以致栲掠㡬至殞命可以訓奬臣子長益風教臣請教為歸鄉令黔婁父痢而私甞其糞孔取急調侍李日知為給事中母老病取急調侍數日鬚髮輒白涕泣不食韓王元嘉聞太妃病涕泣不食孝童段秀實六嵗母疾病不勺飲至七日病間乃肯食時號孝童衣不㢮帯韋温侍親疾調適湯劑弥二十年衣不㢮帶不飲乳許法謹甫三嵗已有知時母病不飲乳惨惨有憂色或以珍餌詭恱之輒不食還以進母刲股膳母章全益少孤為兄全啟所鞠母病全啟刲股膳母而愈侍湯液未甞離劉澭怦之次子怦得幽州不三月病且死澭侍湯液未嘗離親絜湯劑玉燾性至孝為徐州司馬母有疾弥年不廢帯親絜湯劑東光縣主紀王謹女東光縣主始八嵗聞謹有疾不食父哀之紿云已愈主察顔色未平終不肯御内外稱之十旬不解衣房𤣥齡父疾緜十旬不解衣心悸而痛裴敬彛補陳王府典籖一日忽泣涕謂左右曰大人病痛吾輒然今心悸而痛事叵測乃請急倍道歸而父已卒束帯五旬竇抗侍父疾束帯五旬不弛嘗唾焦懷肅母病嘗其唾若味異輒悲號㡬絶獺銜魚張生巖父病藥湏鯉魚冬月冰合有獺衘魚至前得以供父父遂愈逹于神祗李華崔沔集序公之侍疾也孝逹于神祗母病十旬不禠帯藥不嘗不進程袁師心痛知母病舊史孝友張志寛隋末喪父哀毁骨立為州里所稱賊帥聞其名不犯其閭後為里正詣縣稱母疾急求歸縣令問其故對曰母嘗有所苦志寛亦有所苦向患心痛知母有疾令怒曰妖妄之辭也繫之於獄馳驗其母竟如所言令異之慰喻遣去旌表門閭齧疽刳䏶急親之病李甘楊牢有至行以書薦於尹曰且鄉人能齧疽刳䏶急親之病皆一時决耳猶蒙表其閭脫其役上有大禮則差問以粟帛違離六覲省附白陟彼岵兮膽望父兮陟彼屺兮瞻望母兮父曰嗟予子行役母曰嗟予季行役父母在不逺㳺㳺必有方喜懼之年靡瞻匪父靡依匪母凡為人子所㳺必有常親老出不易方復不過時不使憂也扇枕之戀倚門之恩並見上注晨昏之禮朝夕之膳眷戀庭闈心不遑安父母何嘗何食夫為人子者出必告反必面覲省胡威問絹後漢胡威父質為荆州威自京来省父辭歸父賜絹一匹跪曰大人清苦安得此縑父曰吾俸禄之餘又袁宏字夏甫父賀為彭城相宏往省謁變姓名徒行既至吏不為通㑹阿母出驚乃自呼入敬父書訊吳顧愷字子通每得父書必埽儿按致書於上拜跪讀之每句應諾畢後再拜若父有疾即臨書垂泣其聲哽咽孔狄仁傑親在河陽仁傑登太行山反顧見白雲孤飛謂左右曰吾親舎其下瞻望久之雲移乃得去違離周嵗因切歸心一品集賜何宏詔手取連環持答我事不爾吾親屬吾思昨宵夢倚門手取連環持今日有書至問我歸何時韓愈送張道士徒歩號泣省父宇文融劾張說引術解禱出為魏州又貶汝州刺史予審與兄弟侍母京師及聞融再貶不告其家徒歩號泣省父使者憐之以車共載逹于巖州省親鴈門鄭從讜為河東節度使明年賊平詔克用代領河東克用使来曰方省親鴈門願公徐行来告来寧朝夕侍側韓文送鄭十校理序孝感七白曽子至孝三足烏棲其冠家語姜詩江泉見孝門孟宗泣而冬笋出孟宗後母好笋令宗冬月求之宗入竹林慟哭笋為之出劉殷哭而霜堇開劉殷祖母冬月思生堇殷哭感堇生滿地王祥感而黄雀至見父母疾門又剖冰而雙鯉躍出王祥母欲得魚時天寒祥剖氷求之氷開忽有雙鯉躍出動天之徳感神之誠天祚大孝物感精誠孝非外至思自中来蛇膽顧含字肌都養嫂失明含嘗藥視瞻不冠不入嫂目疾湏蚺蛇膽含計盡求不得有一童子以合受含含開視之乃蛇膽也童子出門化為青鳥而去嫂目遂差滅火後漢郅惲為長沙太守有孝子古初遭父䘮未葬鄰婦失火火起初匍匐柩上號哭以身捍火火為之滅惲甄異舉之鶴叫晉吳隠之執喪過禮家貧無人助哭每至哭卧之時常有雙鶴鳴叫也七年粟劉殷至孝夢西籬下有粟掘之得十五鐘銘曰七年粟賜孝子劉殷又二白鳩巢於庭赤烏巢門華陽國志吳順養母赤烏巢門白兔㳺墓後漢方儲字明㓜喪父事母母終負土成墳白兔游其下烏助成墳蕭廣濟孝子傳文讓養母至孝母亡兄弟二人役力葬不用僮僕之力葬之日羣鳥數千銜土壤助而成墳也又李陶母死陶墓側自治墓羣鳥衘土助成墳墳自成生松竹孝子傳宗承父資喪舊塋負土作一夕而成墳上自髙五尺松竹自生火越燒蔡順君仲母終未葬里有火發偪順舎順抱棺呌哭火遂越燒他舎馴兔連理蔡邕廬墓有白兎馴擾木生連理感鳥獸晉許孜季義親沒柴毁負土成墳不受鄉人之助有哀其苦助者晝不逆夜除之每一悲號鳥獸翔集列植松栢五六里一日鹿犯松栢栽歎曰鹿獨不念我乎明日見鹿為猛獸所殺置所犯栢處孜悵惋不已作冢埋鹿猛獸即於孜前自撲而死孜嘆而埋之後樹木滋茂立宅墓側奉亡如在鷹雉同棲鹿獸擾庭中失明後開見父母疾門又冰魚王延後母勑延求魚不得杖之流血延叩頭於冰而哭有一魚躍長五尺孝女沉江後漢叔先䧺父墜湍水䧺感念常有自沉之意家人防之百餘日稍懈因乗船於父墜處哭自投水其家夕夢䧺曰却後日當共父同出至期候之果與父相扶持出投牋河伯異苑荀林宗君儒乗水省舅䧟河而死兄淪於水側投牋與河伯岸側水開儒執牋浮出曹娥曹娥父為巫祝於縣江泝濤迎婆娑神溺死不得屍娥年十四縁江號哭晝夜不絶旬有七日遂投江而死抱父屍而出孔旌大門閭李逈秀武后嘗遣内人候其母犬乳鄰猫中宗以為孝感旌大門閭白鵲馴擾狄仁傑始居母喪有白鵲馴擾之祥燕更巢共乳崔元暐居父喪盡禮節有燕更巢共乳甘露降樹母亡哀毁甘露降庭樹紫芝産坐側白鳩白雀巢樹張九齡遷中書侍郎以母喪解毁不勝哀有紫芝産坐側白鳩白雀巢于家樹庭木連理同上居父喪哀毁庭中木連理芝生壤樹趙憬進太子舎人母喪免有芝生壤樹牛徽其父蔚避地于梁道病徽與子扶籃輿歷閣路盜擊其首血流靣持輿不息盜廹之徽拜曰人皆有父今親老而疾幸無駭驚盜感之乃止及前谷又逄盜盜輒相語曰此孝子也共舉輿舎之家進帛褁創以饘飲奉蔚留信宿去王少元父隋末死亂兵遺腹生少元甫十嵗問父所在母以告即哀泣求屍時野中白骨覆壓或曰以子血漬而滲者父胔也少元饞膚閲旬而獲遂以葬創甚彌年乃興神許二字鄭潜曜侍左右造次不去累三月不靧靣主疾侵刺血為書請諸神丏以身代火書而神許二字獨不化生祥下瑞嗟哉董生孝且慈人不識惟有天翁知生祥下瑞無時期家有狗乳出求食鷄来哺其兒韓愈董生行忽有泉出宋思禮事繼母徐孝㑹大旱井池涸母羸疾非泉不適口思禮憂懼且禱忽有泉出諸庭味甘寒日不乏汲縣人異之栁冕為刻石頌其感芝草生所居堂新説崔希喬以仁孝友悌憂哀毁過禮為鄭縣丞芝草生所居堂一宿而葩盖盈尺州以聞遷監察御史楊炎父喪廬墓有紫芝白雀之祥詔表其閭炎三世以孝聞至門尌六闕許灋謹三嵗母病不飲乳後親喪常廬于塋有甘露嘉禾芝草連理白兔之祥天寳中表異其閭本傳神錫祕祉三秀靈泉栁宗元孝門銘毁傷八白身為親後孝乃行先將使全歸必思淑慎曾子有疾召門弟子曰啟予手啟予足而今而後吾知免夫小子言全而歸也曾子曰身者父母之遺體敢不敬乎全而歸之不虧其體樂正子春下堂傷足足瘳數月不出猶有憂色門弟子問之對曰吾聞之夫子曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣君子頃音跬歩之間不敢忘父母乗險迴車漢王陽為益州長史行至九折坂歎曰奉先人之遺體奈何數乗此險遂以疾去後王遵除為益州刺史至坂問曰此非王陽廻車之坂乎吏曰然遂叱其御曰王陽為孝子王遵為忠臣淑慎其身不敢毁傷曾子曰身體髪膚受之父母不敢毁傷孝之始也不辱曾子曰孝有三大孝尊親其次不辱其下能養慎行其身親之枝也孔子曰身也者親之枝也敢不敬與千金之子坐不垂堂百金之子立不倚衡漢書持遺劒張武父業戰死不獲屍武每節持劒於亡處祭酹而還哀絶第五倫舉孝㢘後遭母喪過毁傷魂靈不反因哀慟絶命孔韓愈鄠人對鄠有以孝子為旌門者乃本其自於鄠人曰彼自刲股以奉母疾瘳鄠大夫常曰他邑有是人乎曰母疾則止於烹粉藥石以為是未聞毁傷支體以為養在教未聞有如此者茍不傷於義則聖賢當先衆而為之也是不幸因而致死則毁傷滅絶之罪有歸矣殘肌敗形栁宗元為夀州安豐孝門銘序安豐縣編氓李興父病自刃股肉父老病已不能啖啜宿而死銘曰黙禱隠冥引刃自嚮殘肌敗形羞繕奉進憂勞孝誠創鉅痛仍號子空旻捧上濡漾頓首成墳陷膺腐眦剔股王懷貞母病毉言得人肉啖良已懷貞刲股以進母病愈詔旌表其門委巷之陋非有學術禮義之資能忘身以及其親出於誠心亦足稱者列十七八焉孝友傳唐時陳藏器著本草拾遺謂人肉治羸疾自是民間以父母疾多刲股肉而進同上不孝九白不愛其親而愛他人者謂之悖徳不敬其親而敬他人者謂之悖禮以順則逆民無則焉凶徳不在於善而皆在於凶徳凶徳謂悖徳禮薄於孝以此坊民民猶有薄於孝而厚於慈大為之坊民猶有踰之匪人不子遺親敗因嚴之教曽莫敬親正懲惡之刑豈容悖禮徳非歸厚罪豈從輕既不念於採蘭安可逃乎寘棘棄色難之訓曽是遺親當孝治之朝敢思悖徳猶為不孝子曰居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日用三牲之養猶為不孝也莫大於不孝五刑之属三千而罪莫大於不孝也三千件也非人孝者無親非人之孝者是有無親之心執以從宜爾雖有說謂之敦孝吾則不知其父攘羊而子證之語殺父傳曰楚欲誅令尹子南子南之子弃疾為王御士王每見之必泣弃疾曰君三泣臣矣誰之罪也王曰令尹之不能子所知也國將討焉爾其居乎對曰父戮子居安用之洩命重刑臣亦不為遂誅子南既葬其徒曰行乎弃疾曰吾與殺吾父行將焉入曰臣王乎曰弃父事讎吾不忍也遂縊而死不孝之刑周禮以八刑糾萬民一曰不孝之刑糾孝糾察也周禮以鄉刑糾孝傷考書子不祗服厥父事大傷厥考心母亡不歸史吳起與母别嚙臂而盟曰不為卿相不歸遂事曾子頃之其母死起終亡不歸曾子薄之而與起絶傷父之心禮有無父之國則可逃刑當篤親之朝如何獲宥此孝子之䟽節也言非至孝也子曰斷一樹殺一獸不以其時非孝寡人嘗學斷斯獄矣子弑父凡在官者殺無赦殺其人壞其室汚其宫而瀦焉弑君父之刑也子弑其父易莫慰母心詩曰有子七人莫慰母心孔母殯不展崔損母殯不葬亦不展殯宦既遂母窮不自給宗室臯貶温州長史攝州事時殿中侍御史李鈞與其弟京兆法曹參軍鍔宦既遂不肯還鄉母窮不自給臯行縣見之嘆曰入則孝出則悌有餘力則學若二子可與事君乎哉舉劾之並錮死事後母不謹元璹父譯事後母不謹隋文帝嘗賜孝經愧朂之至元璹亦不以孝聞士醜其行詔賜孝經罷歸田里于公異擢進士不能事後母既仕不歸省及陸贄當政奏其狀詔賜孝經罷歸田里不諍於父蘇源明上疏子不諍於父不孝也不孝不忠為茍榮冒禄圈牢之物不若也坐不孝免祝欽明於五經該淹自見坐於不孝免無以澡祓鴟梟啄母腦母死子始蕃蝮蛇生子時坼裂膓與肝韓愈孟東野失子詩惡子不可說鴟梟蝮虵然上不能事父栁珪遷右拾遺而給事中蕭倣鄭裔綽謂珪不能事父封還其詔仲郢訴其子冒處諫職為可謂不孝則誣請勒就養詔可不能養母李渤父鈞殿中侍御史以不能養母廢于世渤恥之不肯仕天子孝十白至徳要道子曰先王有至徳要道以順天下民用和睦上下無怨徳之本夫孝徳之本也教之所由生也加於百姓刑於四海以徳教盖天子之孝君子篤於親則民興於仁君子謂在上也民徳歸厚聖人則之夫孝天之經也地之義也是以其教不肅而成其政不嚴而治其所因者本也本謂孝也因親以教愛先王見教之可以化民也故因嚴以教敬因親以教愛先之以博愛而民莫遺其親孝理天下先王之以孝治天下也故得萬國之歡心是以天下和平災害不生禮曰至孝近乎王至悌近乎霸塞乎天地曽子曰夫孝置之而塞乎天地溥之而横乎四海施諸後世而無朝夕之期孟子曰舜其大孝矣五十而慕吾於大舜見之矣不以天下儉其親子曰舜其大孝也與徳為聖人尊為天子富有四海之内孔過慶善宫覽觀梗欷髙祖皇后竇氏太宗後即位過慶善宫覽觀梗欷顧侍臣曰朕生於此今母后永違育我之徳不可報因號慟左右皆流涕乃享后於正寢髙郢臣聞聖人受命於天以人為主茍功濟于人天人同和則宗廟受福子孫蒙慶傳曰徳教加於百姓刑于四海天子之孝也又曰無念爾祖聿修厥徳既受帝祉施于孫子是知王者之孝在於承順天地嚴配祖考恭謹徳教以臨兆民俾四海之内懽心助祭延福流祚永永無窮莫大於承纉穆宗皇后韋氏崩武宗立下詔朕因誕日展禮于太皇太后謂朕曰天子之孝莫大於承纉今穆宗皇帝虛合享之位而宣懿太后實生嗣君當以祔廟繇是奉后合食穆宗室安國家定社稷崔日用因言太平公主逆節有萌陛下徃以宫府討有罪臣子勢湏謀與力今據天位一下制書足矣帝曰畏驚太上皇奈何日用曰庶人之孝承順顔色天子之孝惟安國家定社稷若令姦宄竊發以亡大業可謂孝乎請先安北軍而後捕逆黨於太上皇固無所驚帝納之每懷嗣徽蒸蒸而慕一品集上尊號又以敬養不逮于長樂昭配未升于禄宫毎懷嗣徽蒸蒸而慕所以奉若慈訓對越兩儀因心制名永錫其孝薦饗新宫正月元日初見宗祖躬執百禮登降拜俯薦饗新宫視瞻梁梠戚見容色淚落入爼韓愈元和聖徳詩大孝因心與天罔極蒸蒸之思惟舜其難至徳要道無以加也然臣伏見以畢力追孝誠有所益文粹髙郢諫造章敬寺未聞崇建梵宫彫琢金玉之為孝同上聖徳孝思格于天地湛恩霈澤濟乎生靈同上諸侯孝十一白在上不驕髙而不危所以長守貴也制節謹度滿而不溢所以長守富也制節儉費用謹度守禮法富貴不離其身然後能保其社稷而合其民人盖諸侯之孝也不敢侮於鰥寡治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其君卿大夫士孝十二白非先王之灋服不敢服非先王之灋言不敢道非先王之徳行不敢行是故非法不言非道不行口无擇言身无擇行言滿天下无口過行滿天下无怨惡三者備矣然後能守其宗廟盖卿大夫之孝也治家者不敢失於臣妾而况於妻子乎故得人之歡心以事其親士孝資於事父以事母而愛同資於事父以事君而敬同故母取其愛而君取其敬兼之者父也故以孝事君則忠以敬事長則順忠順不失然後能守其祭祀而保其禄位盖士之孝也以顯父母子揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身事君不忠朋友不信戰陣無勇非孝也庶人孝十三白用天之道分地之利謹身節用以養父母此庶人之孝也禮曰庶人有善本諸父母書曰肇牽車牛逺服賈用孝養厥父母父母慶自洗腆致用酒孔承順顔色崔日用曰庶人之孝承順顔色餘見天子孝門孝門銘孝友夀州安豐李興有至行栁宗元為作孝門銘謹按興匹庶賤陋循習淺下性非文字所𨗳生與耒耨為業而能鍾彼醇孝超出古烈生養以孝李華二孝賛靈武二孝曰侯知道程具羅目不覩朝廷之容耳不聞韶夏之聲足不登齊魯之境所見戎馬旃裘叅於夷狄而能生養以孝青陽孝子何澄粹親病日錮俗尚鬼病者不進藥澄粹剔股肉進親疾為瘳後親沒伏于墓哭踊无數以毁卒當時號青陽孝子刻志從學任敬臣五嵗喪母哀毁至七嵗問父英曰若何可以報母答曰揚名顯親可也乃刻志從學詔吏敦駕程袁師母病十旬不禠𢃄藥不嘗不進代弟戍洛州聞訃日走二百里因負土築墳號癯人不復識改葬曽門以来閲二十年乃畢常有白狼黄蛇馴墓左每哭羣鳥鳴翔永徽中刺史狀諸朝詔吏敦駕既至不願仕授儒林郎遣之匹夫單人行孝一槩而凶盜不敢凌天子謂而旌之事親禮十四白內則曰予事父母雞初鳴咸盥潄櫛縰笄緫拂髦縰束髪音史冠緌纓左右佩用用器也左佩紛帨刀礪小觿金燧右佩玦捍管遰大觿木燧遰刀鞞以適父母舅姑之所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之抑按也搔摩也出入則或先或後而敬扶持之柔色以温之父母衣衾簟席枕几不傳傳移也杖屨祗敬之勿敢近父母之所有命之應唯敬對進退周旋慎齋齋敬也升降出入不敢噦噎􅅉咳欠伸跛倚睇視不敢唾洟竝為不敬寒不敢襲襲重衣也癢不敢搔不有敬事不敢袒禓衣裳垢和灰請澣五日燂湯請浴燂濫也餳餂反三日具沐其間靣垢燂潘請靧足垢燂湯請洗勿逆勿怠子婦孝者敬者父母舅姑之命勿逆勿怠若飲食之雖不嗜必嘗而待己不嗜者亦嘗而待命加之衣服雖不欲必服而待也父母怒撻之流血不敢疾怨起敬起孝起更也親在行禮於人稱父人或賜之則稱父拜受之事統於尊父母呼唯而不諾手執業則投之食在口則吐之走而不趨至敬也父黨無容敦牟巵匜非餕莫敢用敦牟黍稷器巵匜酒漿器孔事繼母尤謹劉審禮事繼母尤謹母食必侍立左右徹饌乃敢退五代張希崇冠帶入門温凊親饋江夢孫事繼母旦則冠帶入門温凊親饋欲饌退更常服力操耒耘暮而歸易衣侍膳畢然後就庠序江南野史侍左右如褐衣時蕭俛母韋賢明治家嚴俛雖宰相侍左右如褐衣時雖宰相退朝侍母膳與家人齒崔彦昭宦寖顯還家易衣侍左右猶布衣也趙隠忠十五白在三之義父生之師教之君食之無二之心事君有死無二又曰君命無二䇿名委質貳乃辟也辟罪也死而利國猶或為之傳危則致身死而同國無私不二竭力推誠臣事君以忠臨患不忘國忠也圖國忘死貞也臨大節而不可奪君子也社稷之臣栁莊死公曰非寡人之臣是社稷之臣也茍利國家何以事君傳士蔿失忠與敬何以事君為人臣者殺其身有益於君則為之匪躬之節時危見臣節世亂識忠臣鮑昭詩難至而節見史忠臣累至而行明貞臣難至而節見為下克忠書悃欵之誠忠一之意見楚詞憂國忘家選以公滅私進思君子之事上也進思盡忠退思補過名以忠聞節因危見儒有忠信以為甲胄又以為寳以道事君不可則止事君不忠非孝也為臣不全禮事君之小心禮圖國之大節忠節之屬荀息竭股肱荀息曰臣竭其股肱之力加之以忠貞不濟則以死繼之子文毁家以紓楚國之難林父進思荀林父事見上子囊城郢子囊將死遺言謂子庚曰必進思君子謂子嚢将死不忘衛社稷可謂不忠乎公家之利知無不為託六尺之孤寄百里之命謂㓜君文子死國難衛國有難公叔文子以其死衛寡人不亦貞乎鬻拳納刑愛君彊諌楚子而自刖君子曰可謂愛君矣諌而自納於刑刑猶不忘納君於善鮑永哭墓後漢鮑君長使過更始墓下車哭盡哀帝問公卿曰何如張堪曰忠者禮義之宗忠不忘君行之髙者上恱王常心如金石後漢光武詣王常曰輔漢室心如金石真忠臣也是日拜為漢忠將軍孔逹利衛請說以死左傳孔逹伐陳晉討之逹曰茍利社稷請以我說遂自縊而死安于寧趙將焉用生傳智伯請趙氏殺董安于安于曰我死而晉國寧趙氏定將焉用生吾死暮矣乃縊而死嵇紹端冕晉蘇峻亂百寮奔散唯嵇紹端冕以身衛帝兵及御輦血湔御衣而死申蒯斷臂崔杼弑莊公申蒯斷臂與門者入哭奪劒以呼天而死之􅒮演内肝吕氏春秋曰狄人殺衛懿公盡食其肉唯捨其肝􅒮演使還哭畢自取出肝内懿公之肝仇牧碎首公羊宋萬弑閔公仇牧聞之趍而手劒叱之萬批牧碎首齒著于闔牧可謂不畏彊禦胡綱懸衣冠後漢胡綱有志節王莽亂綱解衣冠懸府門而去龔勝推印綬後漢王莽簒逆使奉璽書印綬迎勝勝推而不受曰吾受漢家大恩豈忍事二姓也地下復見故主㢤不食而死山甫補過衮職有闕唯仲山甫補之能補過者也季文子無私積傳季文子卒宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子知文子之忠於公室相三君矣無私積史鰌屍諌史記史魚將死不令殯於寢曰吾生不能進蘧伯玉退彌子瑕死以自貶衛君来吊問之其子以告立進蘧伯玉而退彌子瑕上思利人忠也傳為下克忠書丑父與君易位晉韓厥逐齊侯既及逢丑父與君易位使公下如華泉注丑父代公居位故公得下車而免韓厥獻丑父郤獻子將戮之曰代其君任患者戮之不祥舎之以勸事君者乃免之紀信乗車以王誑楚項羽圍漢王於城臯紀信曰事急矣臣請乗車乃以王誑詐降漢王遂從城西門出項王見紀信問漢王安在信曰已去矣遂燒殺紀信王蠋縊樹史燕入齊聞王蠋在晝令軍中環晝三十里無入謂蠋曰齊人多髙子之義吾將封子萬家蠋曰忠臣不事二君貞女不事二夫齊王不聽吾諫故退耕今國亡無義自固遂繫頭於樹奮絶而死齊士大夫曰王蠋布衣義不北靣於燕况食禄者乎相率以從王于莒城也卜式佐軍吕嘉反卜式上書曰主愧臣死皆當盡節其駑下者宜出財以佐軍黄權歸蜀無路蜀黄權軍敗降魏魏文帝謂曰卿去無路歸義欲效曲逆乎對曰臣降吳不可歸蜀無路故降耳蜀先主凶問至羣臣咸賀唯權獨否耿弇不以賊遺君父傳誠志士之成仁豈匹夫之為諒己死己亡豈同親昵之義晏子曰國君為社稷死則死之為其社稷亡則亡之若為己死而為己亡非其親昵誰敢任之言親昵則當死私難主在與在誠為社稷之臣臣克艱厥臣書處不避汚出不逃難傳殺身以成仁代君任患若臨患無茍豈處死為難不得中行誠古人之重死將期激節豈志士之求生君臣士臣國語中行穆子圍鼓以鼔子宛支来令鼔人各復其所非寮勿從宿沙釐以其孥行從鼓子曰我君是事非常士也名曰君臣豈曰士臣穆子曰鼓有君矣曰臣委質於翟之鼓未委質於晉之鼔能執干戈以衛社稷禮社稷臣漢文帝目送絳侯曰社稷臣也袁盎曰功臣非社稷臣也社稷臣者主在與在主亡與亡與諸吕用事絳侯身為太尉主兵柄弗能正吕后崩大臣相共誅諸吕適㑹功成故曰功臣又上問汲黯何如嚴助曰居職無瘉人使輔少主守城郭賁育不如上曰古有社稷臣如黯近之柱石昌邑王淫亂霍光憂懣田延年曰伊尹廢太甲安社稷宗廟後世稱忠將軍為國柱石善能行之亦漢之伊尹臨難致命傳楚圍宋晉使解揚如宋曰晉師悉起將至矣使無降楚楚子囚之使反其言許之登車而呼宋人遂致其君之命楚子將殺之乃赦之又吳楚反圍齊齊使路中大夫告急於天子天子復令齊王堅守二國合圍無從而入二國與盟矣若反言漢已破齊促降許之既至城下望見齊王曰漢興發百萬軍使太尉救齊大夫乃誅忠不忘君孔被害西向大呼姜寳誼與裴寂拒宋金剛戰汾州為所禽帝聞為泣下曰彼烈士必不下賊死矣賜其家物十段米三百斛果謀還被害且死西向大呼曰臣無狀負陛下賊平詔迎其柩贈左衛大將軍謚曰剛死報屈突通援長安至潼闗阻劉文靜兵不得進通勢蹙或說之降曰吾蒙國厚恩事二主安可逃難獨有死報爾毎日摩其頸曰要當為國家受人一刀皇甫無逸煬帝幸江都詔居守洛陽及王世充簒棄母妻斬闗中歸追騎及無逸顧曰吾有死終不能同爾為逆解金帶投之地曰以與爾無相困騎爭下取由是獲免不逆節以生李襲志仕隋始安郡丞或說曰公臨郡久士大夫恱向蠻夷畏服雖曰隋臣實君長也今四海分裂自王者非一姓宜遂據嶺表取百粤豈遽不若尉佗乎襲志曰吾世隋臣今江都雖淪宗社尚有奉諸君當相與戮力刷讐恥豈怙亂圖不義哉吾寧蹈忠死不逆節以生尉佗不足為吾法也不顧身張士貴破反獠還太宗聞其冒矢石先登勞之曰嘗聞以忠報國者不顧身於公見之忠於所事杜讓能帝狩梁天子間闗嶮澁讓能未嘗暫去側帝勞曰朕失道再違宗廟方艱難時卿不少捨朕盖古所謂忠於所事邪忠欵魏徵十漸今外官奏事顔色不接間因所短詰其細過雖有忠欵而不得申忠槩所激戴胄帝嘗謂左右曰胄於我非肺腑親然事之機切無不聞惟其忠槩所激耳挺挺抗忠蕭復初淮南陳少㳺左附李希烈而張鎰判官韋臯殺邠隴叛卒不應楚琳復還執政建言陛下反正功臣已貴矣唯甄善伏惡為未明少游位將相首臣賊臯名淺官下獨挺挺抗忠如以臯代少㳺則天下瞭然知逆順之理帝許之見過不諫非忠蘇安恒武后末年投匭上書諫曰臣聞見過不諫非忠畏死不言非勇陛下以臣為忠則擇是而用以為不忠則斬臣頭以令天下書聞不報秉心忠一朱敬則同平章事張易之誣魏元忠張說欲誅之無敢言者敬則獨奏曰元忠說秉心忠一而所坐無名殺之失天下望乃得不死引咎於己劉禕之房先敏坐累貶衛州司馬訴于相府内史騫味道謂曰太后㫖禕之曰乃上從有司所奏云后聞加禕之太中大夫賜物百段后因曰君為元首臣為股肱以手足疾移於腹背尚為一體乎禕之引咎於己忠臣也割左耳誓不屈契苾何力衆執之至毗伽牙下何力箕踞拔佩刀東向呼曰有唐烈士受辱賊廷耶天地日月臨鑒吾志即割左耳誓不屈毗伽怒欲殺之其妻諫而止挾印赴行在裴諝代宗幸陜徒歩挾考功南曹印赴行在帝曰疾風知勁草果可信李絳自知言切且斥去帝動容曰卿告朕以人所難言者疾風知勁草卿當之矣顔真卿禄山反河朔盡陷獨平原城守具備使司兵叅軍李平馳奏𤣥宗既聞亂歎曰河北二十四郡無一忠臣邪及平至帝大喜謂左右曰朕不識真卿何如人所為乃若此帝思其忠為泣下張九齡曰禄山狼子野心有逆相宜即事誅之以絶後害帝後在蜀思其忠為泣下陸贄裴扆天復初帝宻語韓偓曰陸贄裴扆孰忠於我偓曰扆等皆宰相安有他腸辛京果朱泚盜京師以老病不能從西嚮慟而卒業已效忠不復助惡張孝忠為定滄觀察使朱縚遣蔡䧺說之答曰吾既為唐臣而天性樸强業已效忠不復助惡矣張茂和裴度討蔡茂和數以膽勇求自試謂度無功度請斬之以令軍憲宗曰予以其家忠且孝為卿逺斥以忠力奮馬璘遭時屯棘以忠力奮感慨王室王鐸以太子太保平章事是時誅討大計悉屬駢駢内幸多難數偃蹇而外逗撓鐸感慨王室每入對必噫嗚流涕固請行時中和二年也乃以檢校司徒中書令為義成節度使諸道行營都統張廵贊惟宋三葉章聖皇帝東廵過其廟留駕裴回咨廵等䧺挺盡節異代著金石刻贊明厥忠與夷齊餓踣西山孔子稱仁何以異云黄碣諌昌閩人也董昌為威勝軍節度使表碣自副及昌反諫曰大王抜田畝席貢輸之勤位將相非有􅈴業可紀今不能盡忠王朝乃自尊大一日誅滅無種矣昌怒曰碣不順我邪斥出之奮身死節以動義旅李華宗子翰傳張廵功狀表上之曰且禄山背徳大一臣將相比肩從賊廵官朝不坐宴不與無一伍之士節之權徒奮身死節以動義旅不謂忠乎眷眷本朝甄逄常以父名不得在國史而逄與元稹善稹移書於史館修撰韓愈曰天下大亂死忠者不必顯從亂者不必誅而眷眷本朝甘心白刃難矣哉若甄生弁冕不加其身禄食不進其口直布衣一男子耳及亂則延頸受刃分死不回不以不必顯而廢忠不以不必誅而從亂在古與今盖百一焉虞世南五絶帝每稱其五絶二曰忠直外揚君之美内正君之惡鄭惟忠天授中以制舉召見廷中武后問舉者何所似為忠對皆不合㫖惟忠曰外揚君之美内正君之惡后曰善忠貫日月郭子儀贊天寶末盜發幽陵外阻内訌子儀自朔方提孤軍轉戰逐北誼不還顧當是時天子西走唐祚若贅斿而能輔太子再造王室及大難畧平遭䜛甚詭奪兵柄然朝聞命夕引道無纎芥自嫌及被圍涇陽單騎見虜壓以至誠猜忍沮謀雖唐命方永亦由忠貫日月神明扶持者哉崔圓𤣥宗西出遷劒南節度副大使帝次河池圓䟽具陳蜀土腴糓羡儲供易辦帝省書泣下曰世亂識忠臣即日拜中書侍郎同中書門下平章事仍兼劒南節度使誼不辭難孔緯帝避朱玫次陳倉詔拜緯御史大夫令趣百官至行在緯召御史曰吾等身被恩誼不辭難今詔羣臣皆不至夫與人布衣游猶緩急相䘏况於君乎且泣下御史亦辭方冦􅐁丏衣食請辦一日費而行緯曰吾妻疾旦暮盡丈夫豈以家事後國事乎公善自謀吾行决矣忠烈嶤然杜黄裳賛昔子貢孔堂髙弟而貨殖韓安國漢名宰而資貪黄裳亦以受餉見疵至於忠烈蕘然則不可掩間道衛乗輿王處存遷義武節度使黄巢陷京師處存號哭不俟詔分麾下兵二千間道至山南衛乗輿每痛國難未夷語輒流涕中和二年授京城東靣都統每痛國難未夷語輒流涕常逹拜隴州刺史時薛舉方彊逹敗其子仁杲斬首千級舉遣將仵士政紿降伺隙刼之并其衆二千歸賊舉指其妻謂逹曰識皇后乎答曰彼癭老嫗何所道舉奴張貴又曰亦識我否逹瞋目曰若乃奴耳貴忿舉笏擊其靣逹不為懾亦㧞刀逐之趙𢎞安為蔽捍乃免仁杲平帝見勞曰卿忠節正可求之古人馮立敬君𢎞傳立已蒙貸歸語人曰上赦吾罪吾當以死報未㡬突厥犯便橋立引數百騎與虜薄敗之咸陽帝喜授廣州都督吕子臧見攻守門終不屈賊王行敏與劉黒闥戰歴亭敗之既而釋界不設備為黒闥所掩縛致麾下終不屈賊遂斬之且死西向跪曰臣之忠惟陛下知之帝聞而悼惜李公逸與族弟善行居雍丘始附王世充策其必敗乃獻欵髙祖因其地置杞州即拜緫管封陽夏郡公以善行為刺史世充遣其弟將徐亳兵攻之公逸請授未報因使善行守身入朝言狀至襄城為賊邏送洛陽世充曰君越鄭臣唐何哉荅曰我於天下唯聞有唐賊怒斬之善行亦死帝悼惜之封其子請剖心明皇嗣不反安金藏有誣皇嗣異謀者武后詔来俊臣問狀左右畏􅆭楚欲引服金藏大呼曰公不信我言請剖心明皇嗣不反也引佩刀自剚膓中腸出被地眩而仆后聞大驚輿致禁中命髙醫内腸裭桑楮紩之閲夕而蘇后臨視嘆曰吾有子不能自明不如爾之忠也即詔停獄睿宗乃安當是時朝廷士大夫翕然稱其誼自以為弗及也遁入比干廟自剄王同皎神龍後武三思烝濁王室同皎惡之與張仲之祖延慶周憬李悛冉祖雍謀湏武后靈駕發伏弩射殺三思三思追俊上急變且言同皎欲擁兵闕下廢皇后帝殊不曉大怒斬同皎於都亭驛籍其家同皎且死神色自如仲之延慶皆死憬遁入比干廟自剄將死謂人曰比干古忠臣神而聦明其知我乎後三思亂朝虐害忠良滅亡不久可竿吾頭國門見其敗也褒忠所以勸臣節也李源穆宗下詔曰褒忠所以勸臣節也宿中書十四昔郭元振𤣥宗誅太平公主也睿宗御承天門諸宰相走伏外省獨元振揔兵扈帝事定宿中書十四昔乃休引刀刺心田布度軍且亂歎曰功無成矣即為書謝帝曰臣觀衆意終且負國臣無功不敢忘死願速救元翼毋使忠臣義士塗炭於河朔哭授其從事李石訖乃入至几筵引刀刺心曰上以謝君父下以示三軍言訖而絶屢陳討賊謀王重榮子珂帝為劉季述所廢珂憤見言色屢陳討賊謀既反正首獻方物帝甚倚之劉蕡䇿今忠賢無腹心之寄復何靣目入梁建國門梁臣敬翔與李振俱為太祖所信任莊宗入汴詔赦梁羣臣李振喜謂翔曰有詔洗滌將朝新君邀翔欲俱入見翔夜上髙頭車坊旦左右報曰崇政李公入朝矣翔嘆曰李振謬為文夫矣復何靣目入梁建國門乎乃自經而卒欲操術以致忠兮衆呼然而互嚇栁文懲咎賦石演芬李懷光召石演罵曰爾為我子奈何欲破吾家今日負我宜即死對曰天子以公為股肱公以我為腹心公乃負天子我何不負公且我胡人無異心惟知事一人不呼我為賊死固吾分懷光使士臠食之皆曰烈士也可令快死以刀斷其頸發明其忠吉頊中宗之立頊實倡之㑹得罪無知者睿宗初有發明其忠乃下詔贈御史大夫本傳孝而仁者可與言忠元結叅来瑱府時有父母隨子在軍者結說瑱曰孝而仁者可與言忠渠有責其忠信義勇而不勸之孝慈邪將士父母宜給以衣食則義有所存矣瑱納之示不忘朝廷張播間道走淮南依楊行宻行宻得承制除拜播請每除吏必紫極宫元宗像前致制誥于按乃出之示不忘朝廷人臣同國患為忠常樂公主下嫁趙瓌瓌徙夀州越王貞將舉兵遺瓌書假道瓌將應之主進使者曰為我謝王諸王國懿親宗社所託不捨生取義尚何須邪人臣同國患為忠不同為逆進忠若趨利楊虞卿曰陞下求治於宰相宰相求治於臣等進忠若趨利論政若訴寃不懷二心張憲莊宗遇弑明宗入京師太原猶未知而永王存覇奔于太原左右告憲曰今魏兵南嚮主上存亡未可知存覇之来無詔書而所乗馬斷其鞦豈非戰敗者乎宜拘之以俟命憲曰吾本書生無尺寸之功而人主遇我甚厚豈有懷二心以幸變第可與之俱死爾從事張昭逺教憲奉表明宗以勸之憲涕泣拒之五代史朝事梁暮事晉五代王彦章莊宗愛其驍勇欲全活之使人慰諭彦章彦章謝曰臣於陛下血戰十餘年今兵敗力窮不死何待且臣受梁恩非死不能報豈有朝事梁而暮事晉生何靣目見天下之人乎以死報國孫晟事李昇晟臨死世宗猶遣近臣問之晟終不對神色怡然正其衣冠南望而拜曰臣惟以死報國爾乃就刑同上以忠則九折之塗可叱蕭昕送桂州刺史白孔六帖卷二十五
