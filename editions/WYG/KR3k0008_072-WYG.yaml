body:
  text: 白孔六帖卷七十二唐白居易原本宋孔傳續撰吏部一户部二禮部三兵部四刑部五工部六尚書七郎官八内翰九吏部一白天官吏部為天官尚書冢宰亦曰太宰侍郎小宰會府掌邦治周禮乃立天官而掌邦治以佐王均邦國太宰之職掌建邦之六典以佐王治邦國主司理典周禮太宰掌理典也銓管晉起居注云太康四年制曰選曹銓管人才宜以忠恪尚書朱整以道素自居衡鏡亦曰藻鏡銓衡官人之灋魏略陳羣字長文延康元年羣始建九品官人之灋拜吏部尚書考課之典魏志韓曁為吏部立考課之典法也毛玠之公魏志山濤之識並為吏部尚書賛曰山吏部官人稱允著箴李重為吏部尚書著箴選曹置之左右刋令晉諸公賛李允為吏部尚書稱正身率職刋定選例而著于令擢舊何晏字平叔遷侍中主選宿與之舊者多擢用不退虛名晉起居注王戎領吏部未嘗進寒素退虛名田園徧於天下得才呉書李肅知選世號得才舉魏盧毓遷吏部尚書乃舉孫邕自代之讓薛綜為選曹尚書因譲顧譚曰才昭人物徳服衆望臣不如也遂代綜清通簡要鍾㑹曰裴楷清通王戎簡要後十二年二賢當為吏部兾天下無滯才也後並為吏部尚書就家晉阮孚時遷為吏部尚書稱疾不拜詔惜其大才就家用之品藻九流四科取士持衡掄材采葑采菲刈楚知人取士統百官書冢宰掌邦理統百官均四海注天官卿也統理百官兼領書召公奭為太保兼領冢宰之職射䇿之初旣無失於正鵠掄材之際必有適於輪轅魏擇公方任先毛玠晉推簡要選在王戎當垂拱之朝實資共理奉持衡之職必在至公宻啟山濤為史部尚書用人皆先宻啟然後公舉儉鄧攸遷吏部尚書飲馬於家妻悉素餐不受一飯於人舉用魏諸葛誕為吏部郎中有所屬輒承其言而用後有當不則䟽議得失百寮皆慎其所舉賜衣魏氏春秋曰許士宗為吏部郎帝見其衣敗曰清哉賜之衣也賜錢榖晉山濤為吏部郎清貧文帝賜金錢二百萬絲百斤榖百斛用捨王藴為吏部郎曰欲使時無屈滯先任草萊杜錫為吏部郎不敢用郷親一人黜晉陸抗為吏部郎以務私被黜嗜酒畢卓為吏部郎嗜酒比舎郎酒熟卓醉夜徃飲臥於罋間酒吏繫之明日視乃畢吏部舉山公舉阮咸為吏部郎曰清直寡欲萬金不移矣孔吏部尚書一人正三品侍郎二人正四品上郎中二人五品上貟外郎二人從六品上掌文選勲封考課之政以三銓之灋官天下之材以身言書判徳行才用勞効較考其優劣而定其留放為之注擬五品以上以名上而聽制授六品以下量資而任之其屬有四一曰吏部二曰司封三曰司勲四曰考工劉祥道字同夀魏州觀城人父林甫武徳時為内史舎人典機宻以才稱與蕭瑀等撰定律令著律議萬餘言歴中書吏部二侍郎賜爵樂平縣男唐㳂隋制十二月選集至春停日久事叢有司不及研諦林甫建請四時聼選隨到輒擬於是官無滯人始天下初定州府及詔使以赤牒授官至是罷悉集吏部調至萬員林甫隨才銓錄咸以為宜論者方隋髙孝基祥道少襲爵歴御史中丞􅂋慶中遷吏部黄門侍郎知選事六事上疏陳六事一曰今取士多且濫入流歲千四百多也雜色入流未始銓汰濫也故共務者善人少惡人多臣謂應雜色進者切責有司試判為四等二曰内外官一品至九品萬三千四百六十五員大抵三十而仕六十而退取其中數不三十年存者略盡若歲入流五百人則三十年自相充補況三十年外在官猶多不慮其少三曰永徽以來在官者或以善政擢論事者或以單言進而庠序之諸生未聞甄别四曰唐有天下四十年未有舉秀才者請自六品以下至草野審加捜訪無令赫赫之辰斯學遂絶五曰唐虞三載考績黜陟幽明二漢用人亦久其職今任官率四考罷官知秩滿則懐去就民知遷徙則茍且六曰三省都事主事主書比選補皆取流外雖欲參用士流率以儔類為耻設長名榜銓注等灋裴行儉遷吏部侍郎與李敬元馬載司典選有能名時號裴馬行儉始設長名榜銓注等灋又定州縣升降資擬高下為故事冬初選集唐皎貞觀中官為吏部侍郎先是選集四時補擬不為限皎請以冬初集盡季春止後遂為法傳三十八凡三掌選韋承慶轉天官侍郎凡三掌選銓授平允議者公之傳四十一貴幸憚其嚴韋洪景再遷吏部侍郎銓綜平序貴幸憚其嚴不敢慁以私白衣領職陸元方擢天官侍郎或言其薦引皆親黨后怒免官令白衣領軄元方薦人如初平判皆誦於口唐史傳載韋見素遷吏部侍郎平判皆誦於口銓叙平允官有丐求輙下意聼納人多徳之請謁不行李乂進吏部侍郎仍知制誥與宋璟等同典選事請謁不行時人語曰李下無徯徑傳四十四當公介然不受私謁崔元暐為天官侍郎當公介然不受私謁執政忌之改文昌左丞不踰月武后曰卿向改職乃聞諸令史設齋相慶此欲肆其貪耳乃復拜天官侍郎厚賜綵物銓綜號為公平韋陟遷吏部侍郎選人多偽集與正調相冐陟有風采擿辨無不伏者黜正數百員銓綜號為公平傳㸃頭者更擬蘇晉立户部侍郎遷吏部時宋璟兼尚書晉與齊澣更典二都選更糊名校判而晉獨事賞㧞當時譽之及裴光庭知尚書有遇官被却者就籍以朱㸃頭而已晉國因榜選院曰門下㸃頭者更擬光廷以為侮已出晉汝州㧞寒逺士多至臺閣席豫入拜吏部侍郎𤣥宗曰考功職詳事允故有令授豫典選六年㧞寒逺士多至臺閣當時推知人號席公云臺選齊澣中書令張說擇丞轄以王丘為左澣為右李元紘杜進當國表宋璟為吏部尚書澣及蘇晉為侍郎世謂臺選甞奏事帝指政事堂曰非卿尚誰居者吏選自中宗後綱紀耗蕩盧從愿睿宗立拜吏部侍郎吏選自中宗後綱紀耗蕩從愿精力于官偽牒詭功擿撿無所遺銓綜六年以平允聞特官其一子裴馬盧李初高宗時吏部稱職者裴行儉馬載及是從愿與李朝隱為有名故號前有裴馬後有盧李與盧從愿竝授一子官李朝隱開元初遷吏部侍郎銓敘明審與盧從愿並授一子官洪州調補劉滋興元元年以吏部侍郎知南選故命滋至洪州調補以振職聞積寛縱苗晉卿累遷吏部郎中久之進侍郎性寛縦而吏下因縁作姦品裁清允楊綰歴禮部侍郎俄遷吏部品裁清允人服其公曩與先臣竝命尚念之耶趙宗儒罷為太子右庻子屏居謹静奉朝請而已遷吏部侍郎召見勞曰知卿杜門六年故有此拜曩與先臣並命尚念之耶宗儒俯伏流涕私謁盈几一不省孔緯遷吏部侍郎權要私謁盈几一不省笏擊裴延齡顧少連歴吏部侍郎裴延齡方横無敢忤者裴甞與少連會田鎬第酒酣少連捉笏曰段秀實笏擊賊臣今吾笏将擊姦臣奮且前元友直在坐勸解之毀懐不受金韋夏卿為吏部侍郎時從弟執誼在翰林受人金有所干請宻以金内夏卿懐中夏卿毀懐不受曰吾與爾賴先人遺徳致位及此顧當是哉有台宰望吕元膺拜吏部侍郎正色立朝有台宰望處事裁宜人服其有體時議嘉仰岑羲進吏部侍郎崔湜鄭愔及大理卿理元恭分掌選皆以賄聞獨羲勁廉為時議嘉仰調者丐留張讀為吏部侍郎選牒精允調者丐留二年詔可㮄其事曹門以選事委令史許子孺長夀中歴天官侍郎以選事委令史句直日偃卧不下筆時人語曰句直平配既而補授失序傳為口實書判分甲乙丙科苗晉卿進吏部侍郎天寳二載判入等者凡六十四人書判分甲乙丙三科以張奭為第一奭御史中丞倚之子倚新得幸於帝晉卿欲附之奭本無學故議者囂然不平安禄山囙間言之帝為御花蕚樓覆實中裁十一二奭持紙終日筆不落人謂之曵白帝大怒貶倚及晉卿先收寒素抳吏姦李固言為吏部侍郎既領選按籍自擬先收寒素抳吏姦吏蕭然歛手李至逺遷天官侍郎知選事疾令吏受賄多所絀易吏簫然歛手有王忠者被放吏繆書其姓為士欲擬訖增成之至逺曰調者三萬無士姓此必王忠吏叩頭服罪尚書六職天官首之辨論官材澄汰流品比諸内史選妙秩清白居易栁公綽吏部侍郎制領選號清平石抱忠為侍御史進檢校天官郎中與侍郎劉竒張詢古共領選寡廉潔而竒號清平史給選者成牒以先後丐賕崔從遷吏部員外郎異時史給選者成牒以先後丐賕從一限出之後遂為法莅南曹五年韓滉遷吏部員外郎性彊直明吏事莅南曹五年簿最詳緻罷斜封千四百貟李朝隱遷侍御史吏部員外郎時政出權幸不闗兩省而内受官但斜封其状付中書即宣所司朝隱執罷千四百貟怨誹讙騰朝隱胖然無避屈選人訴索好官苗晉卿累遷吏部郎中中書舎人知選事選人訴索好官厲言倨色紛于前晉卿與相對終日無愠顔世稱吏事第一裴遵慶擢吏部員外郎判南曹天寳時選者嵗萬計遵慶性彊敏視簿牒詳而不苛世稱吏事第一判析有條李栖筠三遷吏部員外郎時大盗後選簿七舛多冐偽栖筠判析有條吏氣奪號神明寒逺無留才崔郾遷吏部員外郎下不敢姦毎擬吏親挾格褒黜必當寒逺無留才右闥白居易獨孤郁自考功遷司勲郎中制選自外郎擢居右闥三列宿韋湊祖叔諧正觀中為庫部郎中與弟吏部即中叔謙兄主爵郎中季武同省時號三列宿黜陟詳當趙宗儒再遷司勲員外郎貞元六年領考功事自至徳後考績失實内外悉考中上殿最混淆至宗儒黜陟詳當無所回憚考功多請託王邱開元初遷考功員外郎考功異時多請託進者濫冐嵗數百人邱務覈實歲登科才滿百議者謂自武后至是數十年采錄精明無邱比其後席豫嚴挺之亦有稱焉出邱下挾考功南曹印赴行在裴諝遷考功郎中數燕見奏事代宗幸陜諝徒歩挾考功南曹印赴行在帝曰疾風知勁草果可信改考功貟外取海内名士取顔真卿李華蕭穎士趙驊等皆海内名士孫逖覈取實材馬懐素遷考功覈取實材權貴謁請一不能阿橈考簿用墨王徽進考功員外郎故事考簿以朱注上下為殿最歲久易漫吏輙竄為姦徽始用墨遂絶妄欺六官之屬選部郎首之白居易除李建吏部員外郎制六官之屬選部郎首之歴代以來諸曹郎之中擇其踐歴久考第高加以有器局律度者遷焉選部以清有簿書以旌淑慝擇刀筆以决臧否剖疑折滯揮翰如流選部以清𦂳公是賴席豫楊吏部郎中碑銘序詞人之冠張九齡改司勲員外郎時張説為宰相親重之與通譜系常曰後出詞人之冠也户部二事具司徒門白地官尚書大司徒侍郎小司徒掌土地之圖周禮大司徒之職掌邦國土地之圖與其民人之數以佐王安邦國民部登其衆寡周禮地官之職孔户部尚書一人侍郎二人掌天下土地人民錢榖之政貢賦之差百官志户部郎中貟外郎掌户口土田賦役貢獻蠲免優復㛰姻繼嗣之事其後以諸行郎官分判錢榖而户部度支郎官失其職矣㑹昌二年著令以本行郎官分判錢榖高宗即位改民部曰户部龍朔二年改户部曰司元光宅元年改户部曰地官同上度支掌天下租税物産豊約之宜水陸道塗之利歳計所出而支調之龍朔二年改度支曰司度金部掌天下庫藏出納權衡度量之數龍朔二年改金部曰司珍天寳十一載改司金倉部掌天下庫儲出納租税祿粮倉廪之事龍朔二年改倉部曰司庚天寳十一載改司儲從獵洛陽唐儉為民部尚書從獵洛陽苑羣豖突出于林帝射四發輙殪四豕一豕躍及鐙儉投馬摶之帝㧞劒斷豕顧笑曰天䇿長史不見上將擊賊耶何懼之甚對曰漢高祖以馬上得天下不以馬上治之陛下神武定四方豈復快心於一獸帝為罷獵好鬚李緯為民部尚書帝曰𤣥齡謂何曰惟稱好鬚無他語奉法持正鄭善果兼民部尚書奉法持正風績顯公卿間詔毎奏事若侍得升殿而從伏獵侍郎嚴挺之傳户部侍郎蕭炅林甫所引不知書甞與挺之言稱蒸甞伏臘乃為伏獵挺之言九齡省中而有伏獵侍郎乃出炅岐州言利病尤詳楊瑒歴户部侍郎甞召宰相大臣議天下户版延英殿瑒言利病尤詳帝咨賞於是宇文融建言檢脱户除口瑒執不便融方貴公卿弇黙唯唯獨瑒抗議故出華州刺史帝才之謂可丞輔李元紘帝欲擢為尚書宰相以資薄乃為户部侍郎條陳利害及政得失帝才之謂可丞輔户部無獻李絳遷户部侍郎判本司帝以户部故有獻而絳獨無何哉荅曰凡方鎮有地則有賦或嗇用度易羨餘以為獻臣乃為陛下謹出納烏有羨贏哉若以為獻是徙東庫物實西庫進官物結私恩帝矍然歲以四萬緡上度支庾敬休為户部侍郎初劒南西川山南道歲征茶户部自遣廵院主之募賈人入錢京師崔元畧奏責本道主當歳以四萬緍上度支之逗留多不至請置院秭㱕收度支錢乃無逋沒又言蜀道米價騰踊百姓流亡請以本道闕官職田賑貧民詔可出入米鹽非所長王彦威為户部侍郎判度支彦威於儒學固該􅃉亦善吏事但經緫財用出入米鹽非所長也救敝莫若省用杜侃建中初河朔兵拏戰民困賦無所出侃以為敕敝莫若省用省用則省官乃上議代貧民租歸融為户部侍郎湖南觀察使盧周仁以南方屬火取羡錢億萬進京師融劾奏天下一家中外之財皆陛下府庫周仁陳小利假異端公違詔書徇私希恩恐海内效之因縁漁刻生人受弊罪始周仁請重責還所進代貧民租入詔不從裒會嚴亟以辦皇甫鏄改户部侍郎憲宗方伐蔡急於用度鏄裒㑹嚴亟以辦帝恱户部侍郎周之地官小司徒也掌天下田户之圖生齒之籍賦役貨幣之政以待國用而質歲成善其職者多登大任白居易牛僧孺制授以耗登之書俾陳生聚之術元稹崔稜授户部侍郎制問歷代户版盧承慶遷民部侍郎帝問歴代户版承慶引據該詳克賊破日韋表㣲進户部侍郎开志詔叛詔李聽帥師討之次河上天子憂無成功表㣲曰以聽軍勢不十五日必破賊及㨗書上止浹日國之材臣張平叔國之材臣也計能析秋毫吏畏如夏日司會逾月綱條甚張况師旅未息調食方急倚成取濟非爾而誰白居易張平叔户部侍郎制世號郎官家初維為郎乃蒔栁于庭及虚心兄弟居郎省對之輙歛容自叔謙後至郎中者數人世號郎官家韋維户部二妙韋維遷户部郎中善裁剖時員外宋之問善詩故時稱户部二妙内舉得人狄光嗣聖厯初為司封丞武后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚内舉得人地官為郎杜牧韋退之制奏課第一裴向累為櫟陽渭南令奏課皆第一擢户部員外郎郎官皆為清秩杜牧韓賔制户部分兩稅出都官故事俊㧞唐新語吕太一為户部員外郎移牒户部令於墻宇悉樹棘以防令史交通太一報牒曰􅆃彼吏部銓緫之司當湏簡要清通何必設籬種棘省中賞其俊㧞判入唐故事度支按郎中判入員外郎判出侍郎緫領押案而已奏度支財物數千言崔仁師為度支郎中甞奏度支財物數千言手不執本太宗恠之令黃門侍郎杜正倫齎本與仁師對唱一無差殊太宗大竒之舊史理寃張位方少頴秀為兒時父友高郢見竒之曰此子非常必為國器後為金州刺史郡人有田産為中人所奪仲方三䟽奏聞竟理其寃入為度支郎中坊州貢杜若貞觀中勅下度支求杜若省郎以謝朓詩芳洲採杜若乃責坊州貢之當時嗤笑獻糗餌舊史張濬為度支員外郎黄巢將逼闗輔濬託疾請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供頓衛軍不得食漢隂令李康獻糗餌數百騾綱軍士始得食僖宗乃召康問卿為縣令安操心及此對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之委錢榖唐德宗建中初罷劉晏塩鐵等使天下錢榖委金部貪猥舊史李石用金部員外郎韓益判度支按益坐贓繫臺石奏曰臣以韓益曉錢榖錄用之不謂貪猥如此帝謂曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之此大謬也受命恬然舊史畢諴歴駕部員外郎倉部郎中故事勢門子弟鄙倉駕二部居之者不悦惟諴受命恬然恭遜執政多之改職方郎中中立正色孟簡為倉部員外郎王叔文驟為户部侍郎簡為其屬中立正色挺然不附叔文忌之不敢退黜言於宰相韋執誼換刑部員外郎出給必恡有司之常元稹范季勝倉部制出給必恡有司之常惑上下之價則茫昧者受弊雜苦良之貨則豪力者􅑿惟一惟公乃㒺不同惟平惟石乃罔不吉民不絓網而國用益饒劉禹錫崔公倕碑檢校户部郎中斡池塩于蒲修牢盆謹衡石煎和既精飴㪚乃盈商通而荐至吏懼而循法民不絓網而國用益饒歲杪㑹其所入贏羡什百詔下褒其能禮部三白春官大宗伯亦曰春卿侍郎小宗伯亦曰秩宗禮闈禮闥主司禮典周禮宗伯掌禮典以和邦國以統百官以諧萬人掌邦禮周禮乃立春官而掌邦禮以佐王和邦國建保邦國周禮大宗伯之職掌邦之天神人鬼地祗之禮以佐王建保邦國治神人和上下書宗伯掌邦禮治神人和上下注云春官卿也宗廟伸官長主國禮治天神地祗人鬼之事及國之吉凶賔軍嘉之禮以和上下尊卑典三禮夙夜惟寅尚書舜典曰有能典朕三禮僉曰伯夷帝曰汝作秩宗夙夜惟寅直哉惟清注三禮天地人禮彤伯書注成王命彤伯入為宗伯當同和之代先務化成居禮樂之司必資明備孔禮部尚書一人侍郎一人掌禮儀祭饗貢舉之政唐志禮部郎中員外郎掌禮樂學校衣冠符印表䟽圖書冊命祥瑞鋪設及百官宫人䘮葬贈賻之數武德三年改儀曹郎曰禮部郎中龍朔二年改禮部曰司禮光宅元年改禮部曰春官同上祠部掌祠祀饗祭天文漏刻國忌廟諱卜筮醫藥僧尼之事龍朔二年改祠部曰司禋膳部掌陵廟之牲豆酒膳諸司供奉口味龍朔二年改膳部曰司膳主客掌二王後諸蕃朝見之事武德三年改司藩郎曰主客郎中失德以却災媚神以丐助韋綬進位禮部尚書帝問所以振災邀福者對曰宋景公以善言退法星三舎漢文除祕祝勑有司祭而不祈此二君皆受自至之福書美前史如失徳以却災媚神以丐助神而有知且因以譴也時帝不徳故託以諷焉抑浮華先行實韋貫之為禮部侍郎所取士抑浮華先行實于時流競為息古栁復榮令貢士賦吕渭遷禮部侍郎始中書省有古栁建中末枯死徳宗自梁遷栁復榮茂人以為瑞栁渭令貢士賦之帝聞不以為善甄幽獨抑浮華高郢為侍郎時四方士務朋比更譽薦以動有司徇名亡實郢疾之乃謝維請設顓行藝司貢部凡三歲甄幽獨抑浮華浮競之俗為衰於鑒裁尤長韋陟遷禮部侍郎陟於鑒裁尤長故事取人以一日試為高下陟許自通所工先就其能試之已乃程考由是無遺材列傳四十七建復孝廉力田等科楊綰為侍郎建復古孝廉力田等科天下高其議人人稱美李揆俄兼禮部侍郎揆病取士不考實徒露搜索禁所挾而迂學陋生藉枕圖史且不能自措于辭乃進諸儒約曰上選士第務得才可盡所欲言由是人人稱美使上聞所未聞鮑防進禮部侍郎得穆質等時比歲旱䇿問隂陽祲沴質對漢故事免三公卜式請烹宏羊指當時輔政者右司郎中獨孤愐欲下質防不許曰使上聞所未聞不亦善乎卒致質高第帝見䇿嘉懌抵㡌于地高湜咸通末為禮部侍郎時士多由權要干請湜不能裁旣而抵㡌于地曰吾决以至公取之得譴固吾分乃取公乗億許棠聶夷中等頗得才實高鍇遷中書舎人開成元年權知貢舉文宗自以題畀有司鍇以籍上帝語侍臣曰比年文章卑弱今所上差勝於前鄭覃曰陛下矯革近制以正頺俗而鍇乃能為陛下得人帝曰宜流宕即以鍇為禮部侍郎閲三歲頗得才實始歲取四十人才益少詔減十人猶不能滿得士多名卿宰相賈餗歴禮部侍郎凡三典貢舉所得士多名卿宰相典冊必出其手于邵進侍郎朝廷有大典冊必出其手請討李㝏王起拜禮部侍郎李㝏叛與播俱上䟽請詔王智興討之卒定其亂賜金紫典郊祀之禮獻賢能之書今小宗伯實兼二事非直清明正者介足以處之白居易韋貫之授禮部侍郎制斥華取實衞次公知禮部貢舉斥華取實不為權力侵撓甄品詳諦權徳輿知禮部貢舉直拜侍郎凡三歲甄品詳諦所得士相繼為公卿宰相為外郎帝嘉其守許孟容拜禮部員外郎公子求補崇文生者孟容固謂不可帝問状以著令對帝嘉其守祠曹白居易張士階除郎中制悉浮屠𨽻主客韋博進主客郎中時詔毁佛祠悉浮屠𨽻主客博言令大暴宜近中宰相李徳裕惡之尚書左侍郎自奏議彌綸外凡邦之牲豆之品醴膳之數實紏理之命文昌長佐春官卿白居易膳部郎中制大才當大用韋安石永昌元年遷雍州司兵叅軍蘇良嗣當國謂安石曰大才當大用徒勞州縣可乎薦于武后擢膳部員外郎學該典禮拜祠部員外郎李華崔沔集序官有秩清而選妙者其儀曹貟外郎之謂乎白居易張元夫禮部貟外即制論回鶻杜牧改膳部貟外郎宰相李徳裕素竒其材㑹昌中黠戞斯破回鶻種落潰入漠南説徳裕不如遂取之以為兩漢伐虜常以秋冬當匈奴勁弓折膠重馬免乳與之相校故敗多勝少今若以仲夏發幽并突騎及酒泉兵出其意外一舉無類矣徳裕善之兵部四事具大司馬門白夏官尚書大司馬也亦曰夏卿侍郎小司馬五兵晉蔡道明遷五兵尚書䟽讓之六師見司馬門孔尚書一人侍郎二人掌武選地圖車馬甲械之政百官志郎中一人判帳及武官階品衞符衆寡校考給告身之事一人判部及軍容調遣之名數朝集祿賜假告之常同上貟外郎一人掌貢舉雜請一人判南曹歲選解狀則覈簿書資厯考課同上龍朔二年改兵部曰司戎光宅元年改兵部曰夏官天寳十載曰武部同上職方掌地圖城隍鎮戍烽候防人道路逺近及四夷歸化之事龍朔二年改曰司城駕部掌輿輦車乗傳驛廐牧馬牛雜畜之籍龍朔二年改駕部曰司輿天寳十一載曰司駕庫部掌戎器鹵簿儀仗龍朔元年改庫部曰司庫清以奉國屈突通授兵部尚書蔣國公為秦王行軍元帥長吏從平薛仁杲時賊珍用山積諸將爭得之通獨無所取帝聞曰清以奉國名定不虚特賚金錢六百兩綵十段忠於所事杜羣懿為尚書朱玖兵逼乗輿帝走寳雞獨羣懿從是時棧道為山南石君渉所毀天子間闗險澁羣懿未甞暫去側帝勞曰朕失道再違宗廟方艱難時卿不少捨朕蓋古所謂忠於所事邪羣懿頓首曰臣出蒙國厚恩陛下不以臣不肖使扞牧圉臨難茍免臣之耻也通知四夷情偽崔敦禮拜兵部尚書詔撫輯回紇鐵勒部姓會薛延冦邊與李勣合兵破之置祁連州處其餘衆澣海都督回紇吐述度為下所殺詔徃綏定立其嗣而還敦禮通知四夷情偽其少慕蘇武為人故屢使突厥前後建明允會事機宰相兼兵部姚崇三為宰相常兼兵部故屯戍斥堠士馬儲械無不暗記坐軍容不整郭元振為兵部尚書𤣥宗於驪山講武坐軍容不整將斬以徇張説於馬前諫曰元振有翊賛大功雖有罪當從原乃赦之流于新州舊史改名順宗冊廣陵王純為太子兵部尚書王純請改名時議非之皆云皇太子亦人臣也東宫之臣改之宜也非其屬而改之諂也乗欵段馬李懐逺見馬門人指樹懐之呉凑方鎮叅辭就兵部令狐楚奏諸道節度使等具帑枺帶器仗就尚書省兵部叅辭伏以軍國異容古今定制夫開省闥之門忽納弓刀之器鄭注首創姦謀將興亂兆致王璠郭行餘之輩敢駈將吏直詣闕庭霆驚乗輿騷動京國伏乞速令停罷如湏叅謝即具公服從之檢校夏官侍郎仍領選李迥秀大定初檢校夏官侍郎仍領選銓汰文武號稱職墨汚爾婁師徳授夏官侍郎判尚書事注選選者就案閲簿師徳曰容我擇之可乎選者不去乃洒筆曰墨汚爾領歩騎出賊背楊宏禮太宗征遼東拜兵部侍郎駐蹕之役領歩騎二十四軍跳出賊背所向摧靡帝自山上下望其衆袍仗精整人人盡力壯之謂許敬宗曰越公兒郎故有家風擇澤潞帥權徳輿還前官時澤路盧從史詐傲寖不制其父虔卒京師而成德王承宗父死术襲德輿諫以謂欲變山東先擇昭義之帥從史㧞自軍校偃蹇不法今可因其䘮選守臣代之成德習俗旣久當制以漸許成德之請則可許昭義則不可宣諭王庭湊韓愈轉侍郎鎮州亂殺田洪正而立王庭凑詔愈宣撫愈至庭湊嚴兵迓之甲士陳庭旣坐庭湊曰所以紛紛者乃此士卒也愈大聲曰天子以公為有將帥才故賜以節豈意同賊反邪語未終士前奮曰先太師為國擊朱滔血衣猶在此軍何負乃以為賊平愈曰以為爾不記先太師也若猶記之固善天寳以來安祿山史思明等有子若孫在乎亦有居官者乎衆曰無愈曰田公以魏博六州歸朝廷官中書令父子受旗節劉悟李祐皆大鎮此爾軍所共聞也衆曰洪正􅈓故三軍不安愈曰然爾曹亦害田公又踐其家矣復何道衆讙曰善庭凑慮衆變疾麾去志簡淡敬括果州刺史累進兵部侍郎志簡淡在職不求名惟兹夏官實掌戎政白居易栁公綽兵部侍郎制選事在尚書盧承慶俄兼檢校兵部侍郎知五品選辭曰選事在尚書臣掌之為出位帝不許曰朕信卿卿何不自信無不召見韋澳遷兵部侍郎與同寮蕭寘深為宣宗所遇毎事二人同直無不召見詢訪時事毎有邦國刑政大中使傳宣草詞興心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否上㫖多從之舊史勲在王府豈限常格衞次公為兵部侍郎選人李勣徐有功之孫名在黜中次公召而謂之曰子之祖先勲在王府豈限常格並優秩而遣之擢兵部貟外郎杜正倫太宗素知名表直秦王府文學館擢兵部貟外郎帝勞曰朕舉賢者非朕獨私以能益百姓也我於宗婭故人茍無能終不得任卿思有以稱吾舉者庭無稽牒張嘉貞遷兵部貟外郎時功狀盈儿郎吏不能决嘉貞為詳處不兊旬庭無稽牒本傳仍遷秩為五兵郎中白居易馬宿訓倉駕二曹為辱畢諴累官駕部貟外郎倉部郎中故事要家勢人以倉駕二曹為辱諴怡然如處美官無異言座右置水一石孔若思勵學擢明經歴庫部郎中甞曰仕宦至郎中足矣座右置水一石明自足意農國之本李渤擢為庫部貟外郎㑹皇甫鎛輔政務剝下佐用度渤上言渭南源鄉户四百今纔四十闐鄉户三十今遷他州縣大抵類此其敝始於攤逃人之賦願下詔賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣家畜聲伎王翰擢通事舎人駕部貟外郎家畜聲伎目使頥令自視王侯人莫不惡之本傳掌五兵六師之重杜裴諗制職方觀圖韋執誼始未􅂋時不喜人言嶺南州縣旣為郎甞詣職方觀圖至嶺南輙暝目命左右徹去及為相所坐堂有圖不就省旣易旬試觀之崖州圖也以為不祥惡之果貶死沉靜少言䘮光庭轉兵部郎中沉静少言寡交㳺旣歴清要時人初未之許及在職公務修整衆方嘆服有吏幹李憕驟歴兵部郎中給事中憕有吏幹明於几案甚有當官之稱所厯有聲盧奕懐慎之少子與其兄逸齊名開元中任京兆司錄叅軍天寳初為鄠縣令兵部郎中所歴有聲皆如逸之所治掌告身印五代蕭愿性嗜酒無節職事弛慢為兵部尚書郎中日掌告身印潘孟陽公卿多父行擢兵部郎中皆有美譽陸象先弟景倩景融景獻景裔歴河南令庫部郎中皆有美譽僧一行少時嘗與象先昆弟相善嘗謂人曰陸氏兄弟皆有才行古之荀陳無以加也其為當時所稱如此舊史拊床舊史李靖為駕部貟外郎事見床門母戒崔元暐為庫部貟外郎事見母門以公事犯李巽韓文胡珦碑尚書駕部郎中數以公事犯尚書李巽巽時主塩鐵事富驕恃勢以語宰相使江東有功同上路應碑為尚書職方郎中佐塩鐵使使江東有功刑部五事具司㓂門白秋官尚書大司寇亦曰秋卿侍郎小司寇刑官周禮孔刑部尚書一人侍郎一人掌律令刑灋徒𨽻按覆讞禁之政凡鞫大獄以尚書侍郎與御史中丞大理卿為三司使志郎中貟外郎掌律法按覆大理及天下奏讞同上龍朔二年改刑部曰司刑光宅元年改刑部曰秋官天寳十一載改刑部曰司憲同上都官掌俘𨽻簿録給衣糧醫藥而理其訴免龍朔二年改都官曰司僕比部掌勾㑹内外賦歛經費俸禄公廨勲賜賦贖徒役課程逋欠之物及軍資械噐和糴屯收所入京師倉庫三月一比諸司諸使京都四時勾㑹於尚書省以後季勾前季諸州則歲終總勾焉龍朔二年改比部曰司計同上司門掌司闗出入之籍及闌遺之物凡有召者降墨敕勘銅魚木契然後入龍朔二年改曰司闗上不習文屈突通為刑部尚書自以不習文固辭毎覆大獄必歔欷劉祥道遷司刑太常伯毎覆大獄必歔欷累嘆奏决日為再不食案無留辭李適之遷刑部尚書喜賔客飲酒至斗餘不亂夜宴娯晝决事案無留辭在朝堂流涕韋倫從狩奉天闕播罷為刑部尚書倫在朝堂流涕曰宰相無状使天下至此不失為尚書後何勸聞者憚其公議姑償死栁公綽為刑部尚書京兆人有姑鞭婦致死府斷以償死公綽議曰尊歐卑非闘且其子在以妻而戮母非教也竟減死出舊史侍郎缺宰相屢進名李道裕貞觀末為將作匠有告張亮反者詔百官議皆言亮當誅獨道裕謂反形未具帝怒不暇省斬之歳餘刑部侍郎缺宰相屢進名不可帝曰朕得之矣是嘗議張亮者頃時雖不從今尚悔之遂命道裕言佛骨韓愈遷刑部侍郎憲宗遣使者徃􅃫翔言佛骨入禁中三日乃送佛祠王公士人奔走膜唄至為夷法灼體膚委珍其騰沓繫路愈聞惡之乃上表以諫争帝曰愈言我奉佛太過猶可至謂東漢奉佛以後天子咸天促言何惟刺耶貶潮州刺史裒彚敕令可用者劉瑑遷刑部侍郎乃裒彚敕令可用者由武德訖大中凡二千八百六十五事類而㭊之叅訂重輕號大中刑律統類以聞家法推其詳決剖如流王播進刑部侍郎是時天下多故大理議䜟科條叢繁播悉置格律坐隅商處輕重決剖如流吏不能竄其私惡緣黨人斥白居易分司東都召拜刑部侍郎二李黨事興險刻乗之更相奪移進退毁譽若旦暮然楊虞􅀸與居易姻家而善李宗閔居易惡緣黨人斥乃移還東都除太子賔客分司本傳刑曹旣清奚陟轉刑部侍郎時主計臣延齡以險刻貴倖而與京兆尹充相惡以危事中之充坐譴已又逮繫其吏峻䋲之事下司寇主奏議者欲文致而甘心焉公侃焉持平挫彼岳岳君子聞之善知其道不私刑曹既清以餘刃兼領選事劉禹錫奚公碑倡飲省中冉祖雍歴刑部侍郎倡飲省中為御史劾奏滯郎位蔣沇以刑部郎中兼侍御史元載持政守道士類不遷沇以故滯郎位不得調衮代相聞士議恨沇屈故擢御史中丞元稹馮宿刑部郎中制亟則失情緩則留獄深則礙恕縱則生姦維是四者持刑之難宰畿甸韋夏卿遷刑部貟外郎時仍歲旱蝗詔以郎官宰畿甸受奉天令課第一改長安令應得才望李林甫源乾曜執政乾曜子潔為林甫求司門郎中乾曜素薄之曰郎官應得才望哥奴豈郎中材邪哥奴林甫小字也草冊劉廼大厯中召拜司門貟外郎徳宗初進郭子儀為尚父時􅁽禮廢視詔文者不適所宜宰相崔裕甫召廼至閤草之少選成文詞義典裁温敏静專白居易王鎰刑部貟外郎制刑曹郎秩朕詔執事檡可以善於其職者而殿中侍御史王鎰自居殿中能察非決連鞫庻獄多叶平允加以温敏静專可當是選一歲之獄決在秋冬今方其時宜敬乃職求郎之難豈敢輕易書曰庻獄庻事予㒺敢知此乃周文王之所理天下也惟獄惟事㑹於南宫求郎之難豈敢輕易今者各有所授皆為清秩杜牧刑部都官貟外郎制德宗欽其才召拜比部貟外郎武元衡比盤比部得廊下食以飯從者號比盤國史補工部六事具司空門白冬官尚書大司空亦曰冬卿侍郎小司空孔工部尚書一人侍郎一人掌山澤屯田工匠諸司公廨紙筆墨之事百官志工部郎中貟外郎掌城池土木之工役程式同上武德三年改起部曰工部龍朔二年曰司平光宅元年曰冬官同上屯田掌天下屯田及京文武軄田諸司公廨田以品給焉同上虞部掌京都衢閧苑囿山澤草木及百官蕃客時蔬薪炭供頓畋獵之事同上水部掌津濟船艫渠梁堤堰溝洫漁捕運漕碾碓之事同上以工部尚書持節宗室暠以工部尚書持節使吐蕃旣還金城公主請明疆場石赤嶺土盟遂定還以奉使有㫖再遷吏部兄弟相代閻立本代立德為工部尚書兄弟相代為入座時論榮之今之尚書漢公卿也言動可否屬人耳目焉固不專率四屬程百工偹位於冬官而已白居易韋貫之工部尚書制以東宫恩拜侍郎歸登諌獻女栁公權為侍郎召問得失因言郭􅌈領邠寧人謂獻二女乃有是除信乎帝曰女自叅承太后豈獻哉公權曰嫌疑問不可户曉因引王珪諫盧陵王妃事是日帝命中官自南内送女還􅌈家於制兄弟不竝臺閣出為雲陽令張文瓘再遷水部貟外郎時兄弟為户部侍郎於制兄弟不並臺閣出為雲陽令入省不數省中司門都官屯田虞部主客皆閑簡無事時諺曰屯田水部入省不數出南部新書參來瑱府元結進水部貟外郎參來瑱府結説曰將士父母宜給以衣食泣諌於玉階之下蔣係轉工部貟外郎又遷本司郎中皆兼史職宰相宋申錫為北軍羅織罪在不測係與諫官崔元亮泣諫於玉階之下申錫方減死時論稱之固請閑官侍養崔沔拜中書舎人時母疾在東都沔不忍捨之固請閑官以申侍養由是改虞部郎中舊史辭控鶴之職舊史貟半千長安中五遷正諫大夫兼右控鶴内供奉半千以控鶴之職古無其事又授斯任者率多輕薄非朝廷進德之選上䟽請罷由是忤㫖左遷水部郎中以水曹郎處張籍白居易張籍制文敎張則儒行顯王澤流則􅁔詩作荅上以張敎流澤為意則服儒業詩者宜稍進之頃籍自校秘文而訓國胄今又覆名揣稱以水曹郎處焉虞曹同上李䎖虞部郎中制虞曹郎缺命以序遷尚書七白八座之尊百揆之首賈稱為尚書稱百揆之首端右之職王戎為尚書稱端右之職尚書兵鮑永拜尚書僕射行大將軍事將兵集河東皂䄡稱鮑尚書兵也尚書履聲鄭崇字子游數上諫甞曵革履上笑曰我識鄭尚書履聲白衣後漢鄭均病章帝東廵幸均舎勑賜尚書禄終身時人號曰白衣尚書典樞機張安世拜大司馬領尚書事典樞機回車駕陳嶠為尚書車駕卒至尚書門嶠跪曰陛下何之曰欲案行文書嶠曰此臣職分陛下不宜臨臣不稱職請黜退帝慙回車駕天子喉舌後漢李固上書曰陛下有尚書猶天有北斗北斗是天之喉舌尚書是天子之喉舌就家晉阮孚事見吏部門賜劒陳寵為尚書帝賜諸尚書劒署陳寵劒曰濟南推誠納言應劭漢官儀曰尚書虞官也書曰龍汝納言帝命惟允詔漢明帝詔曰尚書蓋古之納言出納朕命機事不宻則害成可不慎歟鍾離尚書鍾離意為尚書匈奴羗胡歸義詔賜縑郎暨鄷詔以三百為三千詔鞭之欲死意諫曰云云上曰非鍾離尚書朕擬降威於此耶清哉詔以贓物賜百官鍾離意得珠玉獨委地不拜曰此贓汚之物臣不敢受命曰清哉尚書以庫錢二十萬賜之當垂拱之朝居端右之職郎官八白星郎仙郎臺郎含香含雞舌香握蘭起草錦帳並見漢百官志粉署仙署蘭省仙省華省上應列宿後漢館陶公主為子求郎光武不許賜錢十萬曰郎官上應列宿出宰百里任非其人人受其害出宰百里漢書郎署之官出宰百里水鏡樂廣為尚書郎何晏謂之水鏡雉集蕭芝為尚書郎有雉數千恒集芝舎當直送至洛陽及應休飛迎上其車三臺之妙王譚除尚書郎習練國典三臺之妙題柱田􅃫為郎容貌端正毎入奏靈帝目送之題柱曰堂堂乎張京兆田郎鳳字李宗伏閤馮豹為郎毎奏事未報常休省閤或乃從昬至明天子黙使小黄門持被蓋之帝曰勿驚也駐車待漏樊􅆊字文濟為郎毎欲奏事常駐車待漏襆被魏舒為郎時選郎或非其人論者沙汰之舒曰我則其人襆被而歸同舎償金直不疑事見錯誤門避杖藥崧為郎漢明帝性褊以事怒之崧乃走入床下帝引杖撞之曰郎出崧曰天子穆穆諸侯皇皇未聞人君以杖撞郎帝乃止解縛韓宜字景仁為郎以事受罰文帝輦遇問此誰縛曰尚書郎韓宜上念臨淄侯乃輕車解縛白首漢文帝時馮唐白首為郎帝問之曰臣三朝不遇三朝不遇見上十年無過徐防性周慎在臺閣十年奏事無過分曹寓直為郎居列宿之位入粟漢有入粟為郎父任張安世以父任為郎三入承明廬文選建禮漢官儀制尚書郎三作文字起草更直於建禮門内懐香握蘭趍走於丹墀青縑漢官儀典軄尚書郎給青縑白綾被或以錦被山郎漢楊惲為中郎將故事令郎出錢布市財用給文書乃出休名曰山郎注財用之所出故名曰山郎終嵗不得休而富郎遨逰於外惲乃罷山郎移吏度大司農給財用注摠計一歲所用移以官錢供不取於郎比秩後漢和帝初令郎官詔除者得占丞郎以比秩為真也直臺上藥崧為郎家貧獨臺上一無被枕食糟糠帝夜入臺見崧問其故甚嘉有此制大官賜尚書已下朝夕餐給帷被皂袍及侍吏二人交禮晉職官志八座初拜皆㳂其舊制並集都座交禮遷又解交焉補缺毎一郎缺自試孝亷能給文案者五人謹封奏其名以補之郎選衰射記漢武時入財者得補郎郎衰者也内翰九知制誥侍講侍讀孔學士之職本以文學言語偹顧問出入侍從因得參謀議納諌諍其禮尤寵而翰林院者待詔之所也百官志自太宗時名儒學士時時召以草制然猶未有名號乾符以後始號北門學士同上明皇初置翰林待詔以張說陸堅張九齡等為之掌四方表䟽批答應和文章旣而又以中書務劇文書多壅滯乃選文學之士號翰林供奉與集賢院學士分掌制詔書勑開元二十六年又改翰林供奉為學士别置學士院專掌内命凡拜免將相號令征伐皆用白麻其後選任益重而禮遇益親至號為内相又以為天子私人凡充其職者無定貟自諸曹尚書下至校書郎皆得與選入院一歲則遷知制誥未知制誥者不作文書班次各以其官内宴則居宰相下一品上憲宗時又置學士承㫖唐文學士洪文集賢分𨽻中書門下省而翰林學士獨無所屬也顧問率至夕段文昌為翰林學士遷中書舎人遂為承㫖穆宗即位屢召入思政殿顧問率至夕乃出論書詔勤杜元頴以右補闕為翰林學士敏文詞憲宗特所賞嘆呉元濟平論書詔勤遷司勲貟外郎知制誥多識朝章穆宗以元頴多識朝章尤被寵拜中書舎人户部侍郎為學士承㫖居翰林最久杜審權入翰林遷學士承㫖居翰林最久終不屚禁近語凡號令行下處事值機無所遺筭杜羣懿為翰林學士方闗東兵興調發綏徠書詔叢浩羣懿思精敏凡號令行下處事值機無所遺算帝倚重辭不如㫖韋洪景以左補闕召為翰林學士蘇光榮為涇原節度使洪景當草詔書辭不如㫖罷學士北門學士劉禕之遷洪文館直學士上元中興元萬頃等皆召入禁中論次新書凡千餘篇高宗又宻與參決時政以分宰相權時謂北門學士八塼學士李程召為翰林學士入署常視日影為候程性爤日過八塼乃至時號八塼學士學士院長叅天子宻議沈傳師入翰林學士改中書舎人翰林缺承㫖次當傳師穆宗欲靣命辭曰學士院長叅天子宻議次為宰相臣自必知不能願治人一方為陛下長養之因稱疾出弟兄踵召呉通𤣥德宗立弟兄踵召為翰林學士頃之通㣲遷職方郎中通𤣥起居舎人並立制誥凡帝有譔述非通𤣥筆未嘗慊與陸贄吉中孚韋執誼並位贄文高有謀特為帝噐遇且險難有功通𤣥等特以東宫恩舊進昵而不禮見贄驟擢頗娼恨制書職分宜歸中書舎人陸䞇自恃勁正屢短通𤣥於帝前欲斥逺之即建言承平時工藝書畫之冗皆待詔翰林而無學士至德宗以來命集賢學士入禁中草書詔待進止於翰林院因以名官今四方無事制書職分宜歸中書舎人請罷學士帝不許通元怨日結求兼京兆户曹姜公輔為翰林學士歲滿當遷尚書以母老賴禄而飬求兼京兆户曹叅軍事美哉斯言李絳元和二年授翰林學士俄知制誥帝甞稱太宗𤣥宗之盛朕不徳欲庻㡬二祖之道德風烈無愧諡號不為宗廟羞何行而至此乎絳曰陛下誠能正身勵己尊道徳逺邪佞每進忠直與大臣言敬而信無使小人叅焉與賢者㳺親而禮無使不肖者與焉去官無益於治者則材能出斥宫女之希御者則怨曠銷將相擇士卒勇矣官師公吏治輯矣法令行而下不違敎化篤而俗不遷如是可與祖宗合德號稱中興夫何逺之有言之不行無益也行之不至無益也帝曰美哉斯言朕將書諸紳即詔絳與崔羣錢徽韋洪景白居易等搜次君臣成敗五十種為連屏帳便坐腹心之地絳又數論宦官横肆方鎮進獻等事自知言切且斥去悉取内署所上䟽藁焚之以俟命帝果怒絳謝曰陛下憐臣愚處之腹心之地而惜身不言乃臣負陛下若上犯聖顔旁忤貴倖因而獲罪乃陛下負臣如是帝動容曰卿告朕以人所難言疾風知勁草卿知之矣常以輩行呼而不名陸贄入翰林年尚少以材幸太子常以輩行呼而不名在奉天朝夕進見終小心精潔未甞有過由是帝親倚至解衣衣之同類莫敢望雖外有宰相主大議而䞇常居中叅裁可否時號内相周盡事情陸䞇從狩奉天機務填總逺近調發奏請報下書詔日數百䞇初若不經思逮成皆周盡事情衍繹熟復人人可曉旁吏承寫不給他學士筆閣不得下而䞇沛然有餘數陳讜言崔羣遷翰林學士數陳讜言憲宗嘉納因詔學士凡奏議待羣署乃得上羣以禁宻之言人人當自陳一為故事後或有惡直醜正則他學士不得上言矣固辭見聽本傳夜被㫖草詔韋澳進學士承㫖與蕭寘皆為宣宗禮遇毎二人直必偕召問政得失夜被㫖草詔書事有不安者即遷延湏見帝開陳可否未嘗不順納一日召入屏左右問曰朕於敕使何如澳陳帝威制前世無比帝揺首曰未也䇿安出澳倉卒荅曰若謀之外廷則大和事可用追鑒不若就擇可任者與計事帝曰朕固行之矣自黄至綠至緋猶可衣紫即合為一矣澳愧汗不能對乃罷父誡不得任近職韋温為翰林學士先是父綬在禁庭積憂病廢故誡温不得任近職至是固辭帝怒曰寧綬治命邪禮部侍郎崔蠡曰温用亂命益所以為孝帝意釋換知制誥不專取辭藝韋貫之帝以段文昌張仲素為翰林學士貫之謂學士所以偹顧問不專取辭藝奏罷之蜀纈袍韋綬為翰林學士宻政多所叅逮帝甞幸其院韋妃從㑹綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀纈袍覆而去其待遇如此金蓮炬令狐綯入翰林為學士他夜召與論人間疾苦帝出金鑑書曰太宗所著也卿為我舉其要綯摘語曰至治未甞任不肖至亂未甞任賢任賢享天下之福任不肖罹天下之禍帝曰善又夜對禁中燭盡帝以乗輿金蓮華炬送還院吏望見以為天子來綯至皆驚帝稱其長者錢徽為翰林學士三遷中書舎人加承㫖憲宗甞獨召徽從容言他學士皆高選宜預聞機宻廣叅决帝稱其長者諌無名貢是時内積財圖復河湟然禁無名貢獻而至者不甚却徽懇諌罷之帝宻戒後有獻毋入右銀臺門以避學士梁守謙為院使見徽批監軍表語簡約嘆曰一字可益耶衘之以論淮西事罷學士缺人争薦丞相所善者韋表㣲俄為翰林學士是時李紳忤宰相貶端州龎巖蔣防皆謫去學士缺人人争薦丞相所善者表㣲獨薦韋處厚後與處厚議増選學士復薦路隋處厚以諸父事表㣲因曰隋位崇入且居翁右柰何荅曰選德進賢初不計私也武宗賜以宫錦德裕贈以玉帶封敖㑹昌初以左司貟外郎召為翰林學士敖属辭贍敏不為竒澁語切而理勝武宗使作詔書慰邊將傷痍者曰傷居爾體痛在朕躬帝善其如意出賜以宫錦劉稹平李徳裕以定䇿功進太尉時敖草其制曰謀皆予同言不他惑德裕以能明專仕己以成功謂敖曰陸生恨文不逮意如君此等語豈易得邪解所賜玉帶贈之近世學士超省郎進官者惟鄭顥以尚主而璩以寵升云高璩以拾遺為翰林學士近世學士超省郎進官者惟鄭顥以尚主而璩以寵升云詔假光宅里官第王涯再為翰林學士涯文有雅思永貞元和間訓誥温麗多所藁定帝以其孤進自樹立數訪逮以私居逺或詔不時至詔假光宅里官第諸學士莫敢望凡號令大典冊皆更其手李徳裕穆宗即位擢翰林學士帝為太子時已聞父吉甫名由是顧德裕厚凡號令大典冊皆更其手數召見賚奬優華三俊李紳為翰林學士與德裕元稹同時號三俊捉筆遽成辭皆允切劉瑑大中初擢翰林學士宣宗始復関隴裁處叢繁書詔夜數十捉筆遽成辭皆允切頗牧在禁中畢諴召入翰林為學士党項擾河西宣宗甞召訪邉事諴援質古今條破羗狀甚悉帝悦曰吾將擇能帥者孰謂頗牧在禁中署卿為朕行乎諴唯唯一時書命同僚自以為不及陸扆累進翰林學士中書舎人扆工属辭敏速若注射然一時書命同僚自以為不及昭宗優遇之帝甞作賦詔學士皆和扆獨先就帝覽之嘆曰貞元時陸贄呉通𤣥兄弟善内庭文書後無繼者今朕得之腕可斷麻不可草韓偓為翰林學士宰相韋貽範母䘮詔還位學士使馬從皓逼偓求草制偓曰腕可斷麻不可草從皓曰君求死邪偓曰吾職内署可黙乎明日百官至而麻不出宦侍合譟茂貞入見帝曰命宰相而學士不草麻非反邪艴然出帝畏茂貞卒詔貽範還相成文粲然鄭畋入翰林為學士俄知制誥㑹討徐州賊龎勛書詔紛委畋思不淹晷成文粲然無不機要當時推之掌書王命白居易馮宿知制誥制吾聞武德曁開元中有顔師古陳叔逹蘇頲稱大手筆掌書王命故一朝言語煥成文章朕承祖宗思濟其美馮宿為文甚正而我誥命忽思潤色之聽諸人言曰宿也可勉繼顔陳無辱吾舉訓辭温厚有典誥風崔元翰知制誥訓辭温厚有興誥風然性剛褊不能取容于時孤特自恃掌誥凡再期不遷父子繼美賈至拜起居舎人知制誥帝傳位至當譔冊旣進藁帝曰昔先天誥命乃父為之辭今兹命冊又爾為之兩朝盛典出卿家父子可謂繼美至頓首嗚咽流涕對掌書命蘇頲陸象先殁紫微侍郎未甞補朕思其人無易卿者頲頓首謝明日加知制誥給政事食給食自頲始時李乂對掌書命帝曰前世李嶠蘇味道文擅當時今朕得頲與乂何愧前人哉上疏極諌蘇源明擢考功郎中知制誥史思明䧟洛陽有詔幸東都將親征源明因上疏極諫其不可者十臣聞子不諫於父不孝也臣不諫於君不忠也不孝不忠苟荣冐禄圏牢之物不若也臣雖至賤不能委身圏牢之中將使樵夫指而笑之帝遂罷東幸翰林侍講崔郾拜翰林侍講學士謝曰陛下使臣侍講歴半歲不一問經義臣無功不足副厚恩帝慙曰朕少間當請益高鉞適在旁因言陛下樂善而無所諮詢天下之人不知有向儒意帝重咎謝咸賜錦幣稡擷經史為要錄鄭澣本名涵入翰林為侍講學士帝使梓擷經史為要錄愛其博而精試舉諸條擿問之隨即酬析無留荅毎以厚風俗黜朋比為天子言鄭覃為侍講每以厚風俗黜朋比為天子言之故終為相世榮其遷高元裕自侍讀為中丞文宗難其代元裕表言兄少逸才可任因以命之世榮其遷迎以師禮馬懐素𤣥宗詔與禇無量同為侍讀更日番入旣叩閤肩輿以進或行在逺聽乗馬宫中毎宴見帝目送迎以師禮問閽何人許康佐為翰林侍講學士與王起皆為文宗寵禮帝讀春秋至閽殺呉子餘祭問閽何人邪康佐以中官方強不敢對帝嘻笑罷後勸書蓬萊殿召李訓問之對曰古閽寺今宦人也君不近刑臣以為輕死之道孔子書之以為戒帝曰朕邇刑臣多矣得不慮哉訓曰列聖知而不能逺惡而不能去陛下念之宗廟之福也於是内謀剪除矣康佐知帝指因辭疾唐故事學士草制有所改者當罷職崔梲初梲為學士常草制為宰相桑維翰所改梲以唐故事學士草制有所改者當罷職乃引經據争之維翰頗不樂五代史翺翔禁闈出入諷議杜牧蘇滌制兼京兆户曹白居易為翰林學士初歳滿當遷帝以資淺且家素貧聽自擇官居易請如姜公翰以學士兼京兆户曹參軍以便養詔可元稹翰林制使吾言語文章與三代同風引之而成綸綍垂之而為典訓白居易白孔六帖􅃃七十二
