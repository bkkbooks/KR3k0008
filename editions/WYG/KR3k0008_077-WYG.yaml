body:
  text: 白孔六帖卷七十七唐白居易原本宋孔傳續撰刺史一别駕二録事參軍三功曹四諸曹參軍五縣令六縣丞七主簿八縣尉九二王後十諸矦十一大夫十二九錫十三庶官十四祭酒十五貢舉十六刺史一異政等附白岳牧書曰唐虞稽古建官惟百内有百揆四岳外有州牧矦伯庶官惟和諸矦刺史古諸侯六條政有六條千里百城專城古詩曰四十專城居外臺見漢書列郡列岳刺郡􅊮檐皂蓋朱轓隼旟熊軾朱轓漢書二千石車朱兩輪竹符剖竹分符虎符漢制郡守置銅虎符竹使符發兵遣至郡合符符合乃聽發兵也入爲公卿漢制郡守課最者入為公卿共理漢宣曰與我共理者其帷二千石乎中和王褒為益州刺史王褒作中和樂職之詩分憂分主憂求瘼求民之瘼坐嘯成瑨為南陽守任功曹岑晊人語曰南陽太守岑公孝𢎞農成瑨但坐嘯卧理汲黯為淮陽守閉閤卧理建唐虞之官宜崇九牧播龔黄之政必務六條當共理之朝任分憂之寄股肱之郡季布為河東守上曰河東吾股肱之郡也解榻陳蕃仲舉為豫章守徐孺子至輒解榻去則懸之衣錦上謂朱買臣曰衣錦還鄉遂除會稽大守五馬使君徴黄覇借冦恂二千石之善政東方千騎長人謂諸矦也領兵魏杜恕務伯云刺史勿令領兵以事人専上疏曰今牧守棄治民之術脩将帥之事云云魏志再為郡魏相再為河南黄覇再為穎川陳蕃再為樂安陶侃再為荆州冦恂再為河内郭汲再為并州宜置兵魏司馬芝伯逹請州郡宜置兵外備四夷内威不軌武備晉自平呉後罷軍役山濤以盡去州郡武備後㓂賊起無以備遂大亂前兄後弟布政優優夏侯亶為豫州刺史弟喜後亦為並有㤙恵百姓歌之曰我之有豫州頼夏侯前兄後弟布政優優異政褰帷後漢賈琮為兾州刺史傳車􅂷赤帷裳琮升車褰帷曰刺史當逺視廣聽紏察善惡何反􅂷帷裳以自掩塞乎百姓聞之震慄五袴亷范為蜀郡守先是蜀郡有火災禁人夜作以防災范乃嚴儲水而已歌曰亷叔度来何暮不禁火民皆安堵昔無一􅃭今有五袴奉揚仁風晉袁宏為東陽郡謝安贈一柄扇宏曰敢奉揚仁風以慰黎庶用蒲鞭劉寛為南陽太守用蒲鞭示辱而已投貴要書趙琰為青州刺史有貴要書囑託悉投於水中無所執者閉閤自責嚴詡為潁川守百姓有過輒閉閤自責路不拾遺漢任浦為武都守竹馬之期郭伋字細侯為并州刺史行春赴竹馬童兒之期先即學試諸生何武為揚州行部必先即學宫見諸生誦論通然後入𫝊舎出州問墾田五糓羙惡已乃見二千石以此為常察過詔丞相司直郭欽奏豫州鮑宣煩苛代二千石置吏察過詔條注云所察出六條之外宿郷亭郭欽奏鮑宣行去法駕駕三馬宿郷亭為衆所非不發書魏陳泰為并州懐柔民夷京邑貴人多寄寳貨因泰市奴婢泰皆挂於壁不發其封及徴為尚書乃悉還之不上計史秦昭使王稽為河東守三年不上計令罪人自殺黄覇為頴川守以禮義條教諭告之犯法曉令自殺置正伍長不得舎姧人韓延夀為東都守置正伍長相率以孝悌不得舎姧人閭里有非常事輙聞知始若煩後吏無追捕之苦皆便安米鹽黄覇為穎川長始若煩碎其政米鹽唯覇精力能推行之注米鹽言至細不拘文灋龔遂為渤海守奏曰治亂人猶治亂繩不可急願勑丞相御史且無拘臣以文灋得一切便宜從事願賞罰比三輔膠東盗賊起山陽守張敞請治之乃拜膠東相敞曰理劇郡非賞罰無以懲勸吏追捕有功者願賞罰得比三輔尤異由是盗賊㪚不奪縣政薛宣為左馮翊得郡中人吏罪名輙告其縣使自行罪曰不欲代縣治奪賢令長名置水㧞薤後漢庬參為漢陽太守郡人任棠有志節參到後先候之棠不與言但以薤一本水一盂置屛前抱孫兒伏户下參思其㣲旨曰水欲吾清㧞薤欲吾擊彊宗抱兒孫當户下欲吾開門恤孤率而行之漢陽大治聽事時宋均為九江聽事時冬以日中夏以平旦虎渡江去不行縣韓延夀為東都不肯出行縣丞及掾數請之延壽曰恐無益重為煩也清儉饋魚挂之後漢羊續字興祖為廬江太守府丞饋魚受而不食挂之後復進魚續出前魚示之府丞慙而止不迎妻不然官燭漢巴祗字敬祖為揚州刺史在官不然燭子洗幘而用不然官燭飲貪泉晉呉隱之為廣州至貪泉酌而飲之賦詩曰若使夷齊飲終當不易心計日受禄楊秉字叔節為豫州清儉計日受禄餘俸不入私門畏人知晉胡質為荆州子威自京師省父辭歸洛陽父賜絹一疋威跪問曰安得此絹質曰吾俸料之餘後威為徐州帝問曰卿清何如父對曰臣不如父臣清畏人不知父清畏人知四知楊震為東萊守昌邑令王宻夜半懷金獻曰無人知震曰天知地知爾知我知何無人知也乗葦車袁忠卧羊皮李恂子弟負薪晉祖逖為豫州呼子弟負薪載土洪規罷㑹稽守無資不欲令人知其清乃以舡載土而歸留犢時苖不受馬金張奐為安定羗率上馬金奐以酒酬曰使馬如羊不入廐金如粟不入懷勸課閒月取車材魏志顔裴字子林為京兆郡守乃令屬縣整阡陌樹桑果閒月取車材盛化大行為雍州十郡最也邵父邵信臣字翁卿為河南守躬耕桑嵗增三萬頃吏人親愛號曰邵父起學使受業文翁為蜀郡守乃選郡縣小吏起學官使弟子受業遂變成鄒魯風也天下郡國並立學校自文翁為始勸人種畜龔遂為渤海守令人種榆百本薤五十本葱一畦韭三畆彘五雞五𢃄牛佩犢又郡人好帯劒佩刀遂令賣劒買牛賣刀買犢曰何為𢃄牛而佩犢桑無附枝張堪為漁陽守勸農桑人歌曰桑無附枝麥秀兩歧張君為政樂不可支採木史孫叔敖為楚相秋冬勸人入山採木春夏乘水多時而出材民皆樂業畜養種樹黄覇字次公為穎川使郵亭郷官畜雞豚以贍鰥寡為條教務耕桑畜養種樹而已果菜仇香為蒲亭長勸人生業科令至於桑葉有限雞䐁冇數乏材令種樹魏鄭渾字文公為魏人乏材木乃課樹榆為籬并益樹五果牸牛草馬杜畿字伯侯為河東守課人蓄牸牛草馬炙筆硯魏顔裴為京兆尹課人輸租時車各因便置薪兩束為寒炙筆硯徳政碑晉李𤣥盛為酒泉守敦稼穡年榖登百姓請勒銘𤣥盛許之遂使儒林祭酒劉彦明為文頌其徳遺愛墮淚碑羊祐字叔子為荆州刺史常登峴山及祜薨乃立碑峴山百姓見其碑莫不悲感號為墮淚碑借冦後漢冦恂字子翼為穎川守徴為執金吾從上過穎川百姓遮道願復借冦君一年上乃留拜之去思何武為兖州守徙京兆人皆去思之攀轅卧轍侯覇字君房臨淮太守被徴百姓攀轅卧轍不許去立祠晉祖逖為豫州行恩徳及卒人為立祠罷市羊祐卒人出為巷哭罷市四時置祭扵峴山之陽改户曹為辭曹送到界种暠為梁州被徴吏民詣關乞留一年遷漢陽守夷狄男女送到漢陽界暠與相揖十里不絶遁去孟嘗為合浦當還吏人攀車請之不得進乃附商人舡夜遁去挽不來鄧攸為呉郡不受禄載米來食唯飲郡中水而已去郡數千人挽舡進不得乃少停夜中遁去人歌曰紞如打五更雞鳴天欲曙鄧侯挽不來謝令推不去畫象魏蒼慈孝仁為燉煌守卒官吏如䘮親戚圖畫其形思其遺愛立祠諸遺愛立祠生祠並具祭部雜祠門乞留魏魯定世英為天水遷原太守天水人乞留帝許之策書褒美制服張綱字文紀為廣陵太守卒張英等五百餘人制服人思劉君時歌杜母兄弟繼踵馮立為上郡佐居職亷潔治行與兄弟野王相似人歌曰大馮君小馮君兄弟繼踵相因循政與魯衛徳政均齎送百錢劉寵為會稽守徴入山隂有五叟皆厖眉皓齒人齎百錢送寵曰山谷人未嘗識郡政化他守發求民間至夜不絶或狗吠竟夕至明府來狗不夜吠人不識吏寵為人選一大錢受之而去感瑞珠還孟嘗為合浦守前守採取珠無度珠皆移去及嘗至行清政其珠乃復還也禾生鳳集黄覇為穎川守政化大行嘉禾生扵府鳳凰集於境宣帝賜金四十斤虎渡劉琨字桓公為𢎞農守暴虎皆負子過河而去隨車雨百里嵩為徐州境内旱嵩行部所經轍随車而雨注虎隨䘮王業拜荆州遷司𨽻道卒有三白虎低頭隨䘮而去神馬白烏王阜為幽州有神馬白烏見龍望府沈豐為邑陵守有二黄龍望府中虎渡江宋均叔庠為九江守多暴虎先是設檻捕之猶多傷害均下記曰虎豹在山云云去檻穽人人相傳虎東渡江而去白鹿隨車鄭𢎞為臨淮守飛蝗赴海馬稜守武陵蝗死趙嘉為平原守青州大蝗入平原輒死蝗東西飛宋均為九江守楚沛多蝗均至九江輒東西飛去寵賜髙蓋車及金黄霸為揚州刺史三嵗宣帝下詔賜車髙蓋特髙一尺又為穎川嘉禾生鳳凰集賜金四十斤車劒謝夷吾字堯卿為鉅鹿守制臨發上特賜車劒車馬漢韓崇為汝南守賜車馬賜三公黻冕郭賀字喬卿為荆州顯宗廵狩南陽賜三公黻冕勑行部去幨帷使百姓見以章有徳賜闗内侯漢宣曰太守吏人之本數變易則下不安人知將乆則不欺故二千石其治効輙以璽書勉勵増秩賜金或爵關内侯公卿缺以次用之刑法誅豪右郅都為濟南誅豪族三百餘家不顧妻子不犯蒲鞭劉寛為南陽行蒲鞭人不敢犯舉故人罪後漢蘇章為冀州刺史行部有故人為清河太守按得贓姧乃舉酒飲宴叙歡太守喜曰人皆有一天我獨有二天章曰今日蘇孺文與故人飲私㤙也明日冀州刺史舉清河太守公法也遂舉正其罪霽威嚴魏相為揚州案法郡國守相多貶黜邴吉與書曰朝廷知弱翁公行方直願少蔵器於身注謂不令顯其能相善其言為齊威嚴齊謂収也露章與罪何武為揚州刺史所舉奏二千石長吏必先露章服罪為虧除免之而已録囚徒察顔色法雄為青州守毎行縣録囚徒察顔色多得情偽長吏不奉法皆觧印綬去也孔刺史一人從三品職同牧尹百官志武徳元年改太守曰刺史加使持節天寳元年改刺史曰太守同上於吏有君臣之道焉於民有父母之道焉白居易制古㦸銘平陸宗室齊物為陜州刺史開砥柱通漕路發重石下得古鐡㦸若鏵然銘曰平陸上之詔因以名縣在容三年宗室復改容州刺史先是西原亂吏獲反者没為奴婢長役之復至使訪親戚一皆原縱在容三年人頼以安喜經術數斷大獄鄭惠王元懿徙鄭潞絳三州刺史喜經術數斷大獄務寛平髙宗嘉之璽書褒賜開門偃旗幟虜不敢入霍王元軌為定州刺史突厥冦定州元軌令開城門偃旗幟虜疑不敢入夜遁州人李嘉運潜結賊詔窮誅支黨元軌以冦近且强人必危但殺嘉運餘無所詰因自劾帝喜曰朕固悔之非王子明幾失定州矣所至閉閤讀書霍王元軌歴絳徐定三州刺史所至閉閤讀書以吏事委長史司馬謙謹未嘗與物忤為治亷威舒王元名歴五州刺史治石州二十年數㳺山林有髙蹈意徙鄭州境接東畿諸王貴戚為刺史者縱家人暴百姓元名至一革之為治亷威進加司空擇僚首持紀綱宗室守禮累拜刺史時寕申歧薛王同為刺史皆擇僚首持紀綱守禮惟弋獵酣樂不領事督兵助守李髙遷檢校西麟州刺史突厥冦馬邑髙蒲政請救詔髙遷督兵助守賊盛乃夜斬闗走所將皆没刻石頌美許圉師為相州刺史專以寛治州人刻石頌美部有受賕者圉師不忍按但賜清白箴其人自愧後脩飭更為亷士右史渠温造為朗州刺史開後鄉渠百里溉田二千頃民獲其利號右史渠政有績賜金紫温璋遷婺州刺史治為天下最皇甫無逸歴淯陽太守撫邊俗以㤙信姜謩仁杲擢秦州刺史帝曰昔人稱衣錦故鄉今以本州相授所以償功涼州荒梗宜有以靖之謩至撫邊俗以恩信盗賊衰止人喜曰不意復見太平官府繩擿無所容長孫順徳召為澤州刺史素少儉侈放自如至是折節為政以嚴明稱先是守長多通餉問順徳䋲摘無所容遂為良吏前刺史張長貴趙士逹占部中腴田數十頃奪之以給貧單刺史政教之首陳子昻上言刺史縣令政教之首陛下布徳澤下詔書必待刺史縣令謹宣而奉行之不得其人則委棄有司掛墻壁耳百姓安得知之一州得才刺史十萬户頼其福得不才刺史十萬户受其困國家興衰在此職也録獄訟考耕餉髙智周治尚文雅行部先見諸生質經義及政得失既乃録獄訟考耕餉勤惰以為常政號亷平劉徳威為綿州刺史政號亷平百姓立石頌徳議户猥地狹崔善為為陜州刺史時議户猥地狹者徙寛鄊善為奏畿内户衆而丁壯悉籍府兵若聽徙皆在闗東虚近實逺非經通計詔可討平盗賊竇璡鎮益州時蜀盗賊多皆討平之平陳碩眞崔義𤣥永徽中累遷婺州刺史時睦州女子陳碩真舉兵反分遣其黨圍婺州義𤣥乃署崔𤣥籍先鋒而自統衆繼之至下淮戍詰朝奮擊左右以盾障者義𤣥曰刺史而有避邪誰肯死敕去之由是衆為用斬首數百級降其衆萬餘賊平拜御史大夫所至有能名郭孝恪歴貝趙江淮四州刺史所至有能名推誠撫御郭孝恪拜安西都䕶西州刺史其地髙昌舊都流徙罪人與鎮兵雜限以沙磧隔絶中國孝恪推誠撫御盡得其歡心蝗不至境王方翼再遷肅州刺史州無隍塹冦易以攻方翼乃發卒建樓堞厮多樂水自環烽邏精明儀鳳間河西蝗獨不至方翼境而他郡民或餒死皆重繭走方翼治下乃出私錢作水磑簿其贏以濟飢瘵創舎數千百楹居之全活甚衆芝産其地汾人利之薛從遷汾州刺史隄文谷濾河引溉公私田汾人利之本傳所至禮教大行貟半千出濠蘄二州刺史半千不顓任吏常以文雅粉澤故所至禮教大行喻以恩信馮元常徙眉州刺史劒南有光火盗夜掠人晝伏山谷元常喻以恩信約悔過自新賊相率脱甲面縳闔境頼安薛登出為常州刺史屬宣州賊鍾大眼亂百姓潰震登嚴勒守備闔境頼安撫和戎落得其歡心狄仁傑出為寜州刺史撫和戎落得其歡心郡人勒碑以頌流人為立碑狄仁傑出豫州刺史時越王兵敗支黨餘二千人論死仁傑釋其械宻䟽皆非本惡詿誤至此有詔悉謪戍邊囚出寧州父老迎勞曰狄使君活汝邪因相與哭碑下囚齋三日乃去至流所亦為立碑州將輕元帥初宰相張光輔討越王軍中恃功多暴索仁傑拒之光輔怒曰州將輕元帥耶仁傑曰亂河南者一越王公董士三十萬以平亂縱使暴横使無辜之人咸墜塗炭是一越王死百越王生也云云如得上方斬馬劒加君項雖死不恨光輔還奏仁傑不遜左授復州刺史民愛仰之萬嵗通天中契丹䧟冀州河北震動擢仁傑為魏州刺史前刺史懼賊至驅民保城脩守具仁傑至曰賊在逺何自疲民萬一虜來吾自辦之何預若軰悉縱就田虜聞亦引去民愛仰之復為立祠本傳請選臺閤賢者分典大州韋嗣立同平章事時州縣非其人后以為憂李嶠唐休璟曰今朝廷重内官輕外職每除牧守皆訴不行非過累不得遣請選臺閤賢者分典大州自近臣始后曰誰為朕行嗣立曰内典機要非臣所堪請先行以示羣臣后説以本官檢校汴州刺史由是左肅政臺大夫楊再思等悉補外願下有司精加汰擇韋嗣立建言刺史縣令治人之首比年不加簡擇京官坐負及聲稱下者乃典州吏部年髙不善刀筆者乃擬縣朝輕用人何以治國願下有司精加汰擇凡諸曹侍郎兩省兩臺及五品以上清望官當先選用刺史縣令所冀守宰稱職以興太平帝不聽小吏有罪誡遣陸象先累徙蒲州刺史兼河東察訪使小吏有罪誡遣之大吏白争以為可杖象先曰人情大抵不相逺謂彼不曉吾言邪必責者當以汝為始大吏慙而退卧治為屏蔽王及善神功元年契丹擾山東擢魏州刺史武后勞曰契丹擾邊公雖病可與妻子行日三十里為朕卧治為屏蔽也黄芝五生州署韓思復遷滁州刺史有銅官人鏟鑿尤苦思復為賈他鄙費省獲多有黄芝五生州署民為刻頌其祥縱民歸斂敬暉為衛州刺史是時河北經突厥所騷方秋斂敬暉曰金湯非粟不守豈有棄農畆事池隍哉縱民歸斂闔部頼安吏民尊畏韋安石拜徳鄭二州刺史性方重不茍言笑其政尚清嚴吏民尊畏六合之衆宅生於刺史張九齡建言六合之衆縣命於縣令宅生扵刺史陛下所與共治尤親扵人者今刺史京輔雄望之郡猶少擇之江淮隴蜀三河大府之外稍非其人繇京官出者或身有累或政無聞用牧守之任為斥逐之地或因附會以沗髙位及勢衰謂之不稱京職出以為州武夫流外計資而得不計扵材刺史乃爾縣令尚可言哉欲治之本莫若重守令古者刺史入為三公郎官出宰百里今朝廷士入而不出其扵計私甚自得也臣愚謂欲治之本莫若重守令守令既重則能者可行宜遂科定其資凡不歴都督刺史雖有髙第不得任侍郎列卿不歴縣令雖有善政不得任臺郎給舎都督守令雖逺者使無半年任外如不為此而救其失恐天下猶未治也比州牧或一二歳或三五月即遷盧懷慎遷右御史臺中丞上䟽陳時政曰比州牧或一二嵗或三五月即遷曽不論以課最使未遷者傾耳以聽企踵以望冐進亡亷亦何暇為陛下宣風恤人哉專城之重分陜之雄盧奐出為陜州刺史開元二十四年帝西還次陜嘉其善政題賛扵聽事曰専城之重分陜之雄亦既利物内存匪躬斯為國寳不墜家風治廣有清節者宋璟李朝隱盧奐奐天寳初為南海太守南海兼水陸都㑹物産瓌恠前守劉巨麟彭杲皆以贓敗故以奐代之汙吏斂手中人之市舶者亦不敢干其法逺俗為安時謂自開元後四十年治廣有清節者宋璟李朝隱盧奐三人而已請均賦他郡韓休出為虢州刺史虢扵東西京為近州乘輿所至常税廐芻休請均賦他郡中書令張説曰免虢而與他州此守臣為私惠耳休曰刺史幸知民之弊而不救豈為政哉雖得罪所甘心焉訖如休請悉心撫定李道廣武后時為汴州刺史有善政突厥契丹冦河北議發河南兵擊之百姓震擾道廣悉心撫定人無離散科斂均省裴耀卿為濟州刺史濟當走集地廣而户寡天子東廵耀卿置三梁十驛科斂均省為東門知頓最帝宴從官懽甚𤣥宗封禪還次宋州帝宴從官懽甚謂張説曰今朕有事岱宗而懐州刺史王丘餼牽外無他獻我知其不市㤙也魏州刺史崔沔遣使供帳不施錦繡示我以儉此可以觀政也濟州刺史裴耀卿上書數百言至曰人或重擾則不足以告成朕置書座右以自戒此其愛人也躬護作役裴耀卿俄徙宣州前此大水河防壞諸州不敢擅興役耀卿曰非至公也乃躬䕶作役未訖有詔徙官耀卿懼功不成弗即宣而撫廵飭厲愈急隄成發詔而去濟人為立碑頌徳風俗所瞻夷州刺史陽濬以贓抵死有詔杖六十流古州耀卿上書刺史縣令異諸吏為人父母風俗所瞻今使祼躬受笞事大逼辱恐非崇守令勸風俗意立祠房解袚張嘉祐開元末為相州刺史舊刺史多死官衆疑畏嘉祐以周緫管尉王廽死國難忠臣也立祠房解袚衆心撫循境内尹思貞檢校洺州刺史會契丹孫璽榮亂朔方震驚思貞撫循境内獨無擾武后璽書褒慰蠶至嵗四熟思貞為青州刺史治州有績蠶至嵗四熟尹思貞前後為刺史十三郡皆以清最聞同上帝自擇刺史許景先開元十三年帝自擇刺史景先由吏部侍郎為刺史治虢州凡十一人治行詔宰相諸王御史以上祖道洛濵盛具奏太常樂帛舫水嬉命髙力士賜許帝親書且給筆札令自賦賚絹三千遣之勤力于治潘安禮遷豫州刺史勤力于治清亷無所私然喜察細事下厭其苛風化興行倪若水為汴州刺史政清浄増脩孔子廟興州縣學廬勸生徒躬為教誨風化興行以清毅聞齊澣為汴州刺史地當舟車凑集事浩繁前刺史數不稱職唯倪若水與澣以清毅聞吏民頌美璽書勞問盧從愿下遷豫州刺史政嚴簡奏課為天下第一璽書勞問賜絹百疋以中朝臣為刺史王丘為黄門侍郎會山東旱飢議以中朝臣為刺史制曰臯陶稱在知人在安民皆念存邦本乾乾夕惕無忘一日今長吏或未稱蒼生謂何深思循良以革頺弊宜重刺史之選自朝廷始乃以丘與中書侍郎崔沔等並為山東刺史而丘守懷州尤清嚴為下畏慕入境輙雨裴寛出為蒲州刺史州久旱寛入境輙雨治有異行劉彚進歙州刺史野媪将為虎噬㓜女呼號摶虎俱免觀察使韓滉表賛治有異行加金紫第以剛猛立威劉賛為宣州刺史賛本無學第以剛猛立威官吏重足一迹宣既富饒即厚斂廣貢奉以結忍又不能訓子皆驕傲不􅐚素業衰矣寇疑有備張守珪為𤓰州刺史墨離軍使都督餘衆完故城版築方立寇奄至衆失色守珪曰創痍之餘詎可矢石相埆湏權以勝之遂置酒城上會諸将作樂寇疑有備不敢攻引去守珪縱兵擊敗之善檢督吏楊琮禮歴州刺史善檢督吏以嚴辦自名百姓勞逸在牧守李抱真因言百姓勞逸在牧守願将一州以自試更授澤州刺史徙懐州凡八年始邠以武將領刺史房琯乾元元年出琯邠州刺史始邠以武將領刺史故綱目廢弛即治府為營吏攘民居相淆讙琯至一切革之以便安政聲流聞詔特進五階以寵異政崔讙累官至澧州刺史不為煩苛人便安之流亡還歸居二年増户數萬詔特進五階以寵異攻鎮守自若魏少㳺遷陜州刺史王師潰扵鄴河洛震駭少㳺鎮守自若舊制刺史被代若别追皆降魚書乃得去楊綰復言舊制刺史被代若别追皆降魚書乃得去開元時置諸道採訪使得専停刺史威柄外移漸不可久其刺史不稱職若贓負本道使具條以聞不得擅追及停而刺史亦不得輒去州詣使所如其故闕使司無署攝聽上佐代領帝善其謀扵是髙選州上佐定上中下中州差置兵員詔郎官御史分道廵覆流亡歸萬餘元結拜道州刺史初西京蠻掠居人數萬去遺户裁四千諸使調發符牒二百函結以人困甚不忍加賦即上言臣州為賊焚糧儲屋宅男女牛馬幾盡今百姓十不一在耄孺騷離未有所安嶺南諸州冦盗不盡得守捉候望四十餘屯有一不靖河南且亂請免百姓所負租税及租庸使和市雜物十三萬緡帝許之明年租庸使索上供十萬緡結又奏嵗正租庸外所率宜以時増减詔可結為民營給田免徭役流亡歸者萬餘租入贏異薛珏遷楚州刺史初州有營田宰相遥領使而刺史得専逹俸及他給百餘萬田宫數百别户三千備刺史厮役珏至悉條去之租入贏異時觀察使惡其潔誣以罪宜以上愛人之本為心是時詔舉堪刺史縣令者且百人延問人間疾苦吏得失取尤通逹什二宰相欲校以文辭珏曰求良吏不可責文學宜以上愛人之本為心宰相多其計耕餉歳廣戴叔倫試守撫州刺史民嵗争溉灌為作均水法俗便利之耕餉嵗廣獄無繫囚俄即真朞年詔書褒美民請為生祠徐申遷韶州刺史韶自兵興四十年刺史以縣為治署而令丞雜處民間申按公田之廢者募人假牛犂墾發以所収半畀之田久不治故肥美嵗入凡三萬斛諸工計所庸受粟有差乃徙治故州未幾邑閈如初創驛堠作大市器用皆具州民詣觀察使以其有功扵民請為生祠浚渠李栖筠出為常州刺史歳仍旱編人死徙踵路栖筠為浚渠厮江流灌田遂大稔里無吠狗宿賊張度保陽刺西山累年吏討不克至是發卒捕斬支黨皆盡里無吠狗畫孝友傳李栖筠乃大起學校堂上畫孝友傳示諸生為鄉飲酒禮登歌降飲人人知勸以治行進封賛皇縣男賜一子官人刻石頌徳誅破姦盗窟穴李吉甫為忠州刺史改彬饒二州會前刺史繼死咸言牙城有物恠不敢居吉甫命菑除其廨以視事吏由是安誅破姦盗窟穴治稱流聞不得擅見本道使李吉甫建言州刺史不得擅見本道使有所奉入輒加常數包佶徙華州厚結權近冀進用同華地廹而貧所獻常觳陋至微厚賦斂有所奉入輒加常數人不堪其求專以慈惠為本袁滋為華州刺史政清簡流民至者給地居之名其里曰義合然專以慈恵為本未嘗設條教民愛向之有犯令時時法外縱舎得盗賊或哀其窮出財為償所亡召為左金吾衛大将軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜乃得去莫不流涕延經術士張鎰大厯初出為濠州刺史政條清簡延經術士講教生徒比去州升明經者四十人城守具備顔真卿出為平原太守安禄山逆狀方孽真卿度必反陽託霖雨増陴濬隍料才壯儲廥廩日與賔客泛舟飲酒以紓禄山之疑果以為書生不虞也禄山反河朔盡䧟獨平原城守具備使李平馳奏𤣥宗始聞亂歎曰河北二十四郡無一忠臣耶及平至帝大喜曰朕不識真卿何如人而所為乃若此絳入頼利李憲為衛州刺史以行治稱徒絳州河中兵本仰食扵絳而汾可輸河渭嵗租與糴常數十萬石故敖保山為固民之輸者十年不勝一車憲瀕汾相地治新倉當費二百萬請留垣縣粟糶河南以錢還糴絳粟既免負載勞又權其贏以完新倉絳人頼利以治異等加金紫光禄大夫李愬出為坊晉二州刺史開五鑪官鑄錢李聽為蔚州刺史州有銅冶自天寳復廢不治民盗鑄不禁聽乃開五鑪官鑄錢一日五萬人無犯者兩城望風送欵李聽帝討李師道出聽楚州刺史淮南兵緜弱鄆人素易之聽日整飭士皆奮即掩賊不虞趨漣水破沐陽絶龍沮堰遂取海州攻煦山降之懷仁東海兩城望風送欵務勤教化止横調馬燧勸督農力嵗一税人以為便徙懷州時師旅後嵗大旱田茀不及耕燧務勤教化止横調將吏有親者必造之厚為禮瘞暴横止煩苛是秋耜生於境人頼以濟聚石種樹馬燧為隴州刺史西山直吐蕃其上有道通虜出入者燧聚石種樹障之設二門為樵櫓八日而畢虜不能暴治孟瀆溉田孟簡為常州刺史州有孟瀆久淤閼簡治導溉田凡四千頃以勞賜金紫隄松江為路王仲舒為蘇州刺史隄松江為路變屋瓦絶火災賦調常與民為期不擾自辦江淮草木亦知威名張萬福為濠州刺史召謂曰先帝改爾名正者所以褒也朕謂江淮草木亦知爾威名若從所改恐賊不曉是卿也人稱其直張萬福在泗州遇李希烈反陳少㳺悉以部刺史妻子質揚州萬福獨不遣謂使者曰為吾白公妻老且醜不足慁公意卒不行人稱其直將吏立碑頌功髙承簡蔡平以上蔡等四縣為溵州拜承簡刺史治堰城始開屯田利防庸瀕溵綿地二百里無復水敗皆為腴田先是賊築武宫以夸戰勞承簡夷其邱庀家財以𦵏葺儒宫備俎豆嵗時行禮有菽實民得以食將吏立碑頌功奏罷貢淡菜之屬孔戣為華州刺史眀年嵗貢淡菜蚶蛤之屬戣以為自海抵京師道路役凡四十三萬人奏罷之禁男女為𨽻韓愈改袁州刺史袁人以男女為𨽻過期不贖則没入之愈至悉計庸得贖所沒歸之父母七百餘人因與約禁其為𨽻収豪室税李翺為廬州刺史時州旱遂役逋捐繋路亡籍口四萬權豪賤市田屋牟厚利而窶户仍輸賦翺下教使以田占租無得隱収豪室税萬二千緡貧弱以安虎不為暴李紳遷滁夀二州刺史霍山多虎擷茶者病之治機穽發民迹射不能止紳至盡去之虎不為暴再朞増户五千孫成遷為信州刺史嵗大旱發倉以賤直售民故飢而不亡再朞増户五千詔書褒美以禮灋治下李頻遷都官表丐建州刺史既至以禮灋治下更布條教時盗興政亂朝相推敓而建頼頻以安羣盗感愧吕元膺為蘄州刺史嘗録囚囚或白父母在明日歳旦不得省為恨因泣元膺惻然悉釋械歸之而戒還期吏白不敢答曰吾以信待人人肯我違如期而至自是羣盗感愧悉避境去州人以陽名子陽城出為道州刺史治民如治家宜罰罰之宜賞賞之不以簿書介意月俸取足而已州産侏儒歳貢諸朝城哀其生離無所進帝使求之城奏曰州民盡短若以貢不知何者可供自是罷州人感之以陽名子撫字心勞催科政拙賦税不時觀察使數誚貴州當上考功第城自書曰撫字心勞催科政拙考下下觀察使府遣判官督賦至州恠城不迎以問吏吏曰刺史以有罪自囚於獄判官驚馳入謁城曰使君何罪我奉命來候安否耳留數日城不敢歸仆闔門寢館外以待命判官遽辭去還所餘儲于州李素立徙蒲州刺史將行還所餘儲籺并什器于州齎家書就道薛公徳滂被薛大鼎徙滄州刺史無棣渠久廞塞大鼎浚治屬之海商賈流行歌曰新渠通舟楫利属滄海魚鹽至昔徒行今騁駟美哉薛公徳滂被又䟽長蘆漳衡三渠泄汙潦水不為害鐺脚刺史是時鄭徳本在瀛州賈敦頥為冀州皆有治名故河北稱鐺脚刺史羸馬繩覊道上賈敦頥歴州刺史資亷潔入朝常盡室行車一乘弊甚羸馬繩覊道上不知其刺史棠棣碑敦頥遷洛州洛多豪右占田類踰制敦頥舉沒者三千餘頃以賦貧民發姧摘伏下無能欺咸亨初敦實為洛州長史亦寛惠人心懐向始洛人為敦頥立碑大市旁及敦實入為太子右庶子人復為立碑其側號棠棣碑嵗旱自暴以祈田仁會為平州刺史嵗旱自暴以祈雨大至穀遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廩實兮禮義申願公常在兮不患貧為諸生貢舉韋景駿遷房州刺史州窮險有蠻夷風無學校好祀淫鬼景駿為諸生貢舉通險道作傳舎罷祠房無名者景駿之治民求所以便之類如此轉奉天令益以亷平自勵郭延魯遷復州刺史延魯嘆曰吾先君為沁州者九年民到如今思之今幸得為刺史其敢㤀吾先君之志由是益以亷平自勵民甚頼之秩滿州人乞留不許皆遮道攀號五代史教訓以禮生聚以仁千里封疆一口歌詠杜牧行刺史裴休制政不務威嚴裴守真累遷成州刺史政不務威嚴吏民兩懷之徙寧州送者數千為政惠裕人稱有恩裴子餘遷冀州刺史臨事不苛細楊恭仁隋觀王雄子仁夀中累遷甘州刺史臨事不苛細徼人安之文帝謂父雄曰匪特朕得人乃卿善教子矣所至有績號清吏鄭善果年十四為沂州刺史累轉闕郡太守善果母崔賢明曉政治嘗坐閣内聽善果處决或當理則悦有不可則引至床下責媿之故善果所至有績號清吏澄源陸象先累徙蒲州刺史兼河東按察使小吏有罪誡遣之大吏白争以為可杖象先曰人情大抵不相逺謂彼不曉吾言耶必責者當以汝為始大吏慙而退嘗曰天下本無事庸人擾之為煩耳第澄其源何憂不簡耶故所至吏民懐之還移税錢李勃事見賦税門捕鵁鶄倪若水捕鵁鶄門汴橋立木權懐恩見橋門未嘗設教袁滋見良吏門莅凡九州皆有惠愛張萬福富埒王者丘和見貪濁門官刺史妻子僅免饑寒崔衍父卒事母益謹嵗為母李子郃償負不勝計故官刺史妻子僅免饑寒别駕二白别乘半刺庾亮與郭㳺書曰别駕舊與刺史乘同流王化於萬里任居刺史之半安可非其人也治中别駕亦曰治中從事屏星别駕車前後舊有屏星去屏星孔恂字巨卿為别駕從事刺史因怒欲去别駕車屏星恂曰使君毁國舊制乃投傳去刺史追謝之乃止泥軾漢書别駕主簿卓緹油屏泥於軾前以章有徳題輿周景為豫州刺史辟陳蕃為别駕蕃不就景題别駕輿曰陳仲舉坐展驥龎統字士元劉備為荆州以士元為棗陽令在縣不治免官魯肅曰士元長才百里不足以展驥足備器任為治中也海沂之康别駕之功晉王祥字休徴為徐州别駕時人歌曰海沂之康實頼王祥邦國不空王祥之功腹心在任袁紹領兾州委别駕之任兼緫幕府持版答拜刺史六條曰州别駕治中部見刺史持版拜刺史答拜顧榮知君孝之才晉顧和字君孝族叔榮雅重之曰此吾家千里駒興吾宗者此子也君孝始别駕遷尚書令也吕􅐚賞王祥之量吕􅐚為刺史有佩刀相者以為三公服􅐚乃贈别駕王祥曰茍非其人刀或有害以卿有公輔之量故相與之縣屈良才時善龎統貳龔黄之政播海沂之謡邦稱孔亮人詠王祥佐股肱之政屈公輔之才當共理之才居半刺之任貳職四嶽佐理六條孔别駕一人從四品百官志武徳元年改丞曰别駕十年改雍州别駕曰長史髙宗即位改别駕皆為長史天寳八年諸郡始廢别駕下郡置長史一貟上元二年諸郡復置别駕徳宗時復省元和長慶之際兩河用兵禆將有功者補東宫王府官久次當進及受代居京師者常數十人訢宰相以求官文宗世宰相韋處厚建議復置兩輔六雄十望十緊州别駕同上承上率下郡邑之間承上率下者州長史也白居易制詞軍部長史資秩不卑張嘉㤗延州長史制同上斷𢃄為炷皇甫無逸徙益州大都督府長史所至輙閉閤不通賔客左右無敢出入者所湏皆市易他境嘗按部宿民家燈炷盡主人將續進無逸抽佩刀斷𢃄為炷其亷介如此然過自思謹上表䟽讀數十猶懼未審使者上道進省再三乃得遣督勵風俗髙士亷進益州大都督府長史蜀人畏鬼而惡疾雖父母病皆委去望舎投餌餔之昆弟不相假財士亷為設條教辨告督勵風俗翕然為變又引諸生講授經藝學校復興秦時李冰導汶江水灌田瀕水者須千金民相侵冐士亷附故渠厮引旁出以廣溉導人以富饒皆尚書為之崔神基后以歴官有佳政且其父扵已有功擢拜并州長史謂曰并州朕鄊里宿兵多前長史皆尚書為之今授卿宜知所以委重者乃親為按行圖謀日而遣開廪振民王恂出許州長史嵗旱珣時假刺史事開廩振民即自劾𤣥宗赦之為政尚仁恕陸象先為益州大都督府長史劒南按察使為政尚仁恕司馬韋抱真諫曰公當峻刑法以示威不然民慢且無畏荅曰政在治之而已必刑法以立威乎卒不從而蜀化權豪憚伏魏元忠檢校洛州長史治號嚴明張易之家奴暴横甚元忠笞殺之權豪憚伏政條簡肅姚崇遷揚州長史政條簡肅人為紀徳于碑四十九盧懷慎陳時政曰比上佐或一二嵗或三五月即遷曽不論以課最餘見刺史門吏下畏之張嘉貞歴并州長史政以嚴辦吏下畏之奏事京師𤣥宗善其政數慰勞所至破碎姦猾王志愔出為揚州長史所至破碎姦猾令行禁信境内肅然毎戰輒勝張守珪徙幽州長史契丹奚連年寇邉牙官可突于胡有謀者前長史趙含章薛楚玉等不能制守珪至每戰輙勝虜遂大敗帝喜詔有司告九廟伐鼔窮歡王翰徙仙州别駕日與才士豪侠飲酒逰畋伐鼔窮歡見刺史致恭孔若思為衛州刺史故事以宗室為州别駕見刺史驁放不肯致恭若思劾奏别駕李道欽請訊狀有詔别駕見刺史致恭名郡籍其佽助半刺上佐得與二千石叅挍政事短長利病者也今以名郡籍其佽助杜牧行馬迥等制戎服見帝張説遷荆州長史俄以右羽林将軍檢校幽州都督入朝以戎服見帝帝大喜授檢校并州長史兼天兵軍大使脩國史敕齎藁即軍中論譔囚宦者蘇良嗣見竹門止雪反風王晙為并州大都督府長史止雪反風見雪門人笑其不情蘇世長歴陜州長史邑里犯法不能禁乃引咎自撻人笑其不情見詐偽門單身襆被自將蘇瓌轉揚州大都督府長見清亷門起屯田以代轉輸舊史李聽改靈州大都督府長史境内有光祿渠廢塞歳久欲起屯田以代轉輸聽復開决舊渠溉田千餘頃至今頼之録事叅軍三白州主簿郡督郵並令録事叅軍紏繩大郡管轄外臺紏司典簿書掌符印提舉列曹糾察羣吏千里之姿三輔决録曰韋康成字元將年十五身長八尺為郡主簿郡尹楊彪竒之曰韋主簿昻昻千里駒一府之望世説王東亭為桓温主簿既承籍有美譽為一府之望陳寵之用王渙可謂得人益郡太守陳寵以功曹王渙簡核舉為主簿郭頥之選𤣥明厥有成績前趙録曰劉聰字𤣥明年十四究通經史時有太守郭頥辟為郡主簿吏歌曰我有賢后能任𤣥明政理人殷琳琅羅含傳曰含字君章太守謝仁祖一見稱為湘中之琳琅自江下從事轉主簿州縣之職徒勞人耳稱其職則事舉績成非其材則官邪政廢一郡綱紀六曹表則紏職周禮列股肱之郡居管轄之司勾稽紀綱掾亦録事孔録事叅軍事掌正違失涖符印百官志録事意與天通杜景佺出為益州録事叅軍時隆州司馬房嗣業徙州司馬詔未下欲即視事先笞責吏以立威景佺謂曰公雖受命為司馬州未受命何急數日録邪嗣業怒不聽景佺曰公持咫尺制真偽莫辨即欲攪亂一府敬業揚州之禍非此類耶叱左右罷去既乃除荆州司馬吏歌曰録事意與天通州司馬折威風由是寖知名以殿最升降戴叔倫齊映劉滋執政叔倫勸以天下州縣有上下𦂳望雄輕者有司銓擬皆便所私其尤切者縣令録事叅軍此二者㫖出中書門下無計資序限逺近髙卑一一以殿最升降則人人知勸映等重其言綱紀一州喬琳歴果綿遂懐四州刺史治寛簡不親事嘗謂録事叅軍任紹業曰子綱紀一州能劾刺史乎紹業出條所失示之驚曰能知吾失御史材也紏郡韋應物詩紏郡南海湄鄭翼驁倨唐史崔信明傳揚州録事叅軍鄭世翼亦驁倨數恌輕忤物餘見傲漫門振舉綱目舊史顔杲卿為魏州録事叅軍振舉綱目政稱第一怯斷大案御史臺記李詳為鹽亭尉令考為録事所擠詳請書録事考刺史許之即書曰怯斷大案好勾小稽自隐不清言他揔濁堦前競闘鬪困方休獄裏囚徒非赦不出天下笑之功曹四白主諾後漢宗資為汝南太守委任功曹范滂人歌謡曰汝南太守范孟愽南陽宗資主畫諾坐嘯岑晊事見刺史門編堂東觀漢記郭丹為功曹置編於堂以為後法也懸榻陳蕃事見上注鍾皓之薦陳寔任以代己漢鍾皓穎川人為郡功曹命辟司徒府臨去辭太守薦陳寔為功曹呉璨之選謝譚舉乃得人呉志呉璨為㑹稽守舉謝譚為功曹廊廟之材呉録孫紹字長緒北海人為孔融功曹融稱紹有廊廟之材後為相交友之禮魏志虞翻字仲翔會稽人太守王朗命為功曹接以交友之禮置標府掾任重功曹茍非三語之才則忝六聯之首書史掾漢蕭何為書史掾功曹也諸曹叅軍五白署列六聯六司名髙三語陳留阮千里有令望太尉王君見而問之曰老莊與聖教同異荅曰將無同太尉善其言辟為掾人號曰三語掾官惟府掾署列州司郡掾府察六曹州縣之職徒勞人耳梁竦之言府中趨古詩曰冉冉府中趨謂為師友韓嚴詡為潁川守政清簡常謂掾吏為師友請置田曹温嶠太真上䟽謂置田曹掾州一人勸課農桑察吏能否今宜依舊置之曹事廢被謪陳遵孟公為公府掾吏日出醉歸曹事數廢西曹以故事謪之侍曹詣寺舎白遵曰陳卿今日以某事謫遵曰滿百乃相聞故事滿百則斥後滿百西曹請斥司徒官優容之假日坐曹薛宣為翊城曹掾張扶至假日獨不肯休坐曹治事宣出教曰曹雖有公事家亦望私㤙扶慙之公府掾殺公掾晉周振頻為三公府辟辟書下公輙亡時人號為殺公掾莫有辟者魏舒楊源為司徙遂辟之竟無他事名列府寮職叅軍事理曹魏置理曹掾法曹也冗貟散職孫楚之揖石苞孫楚字子荆為揚州叅軍至州嘗揖刺史石苞曰天子命我叅卿軍事苞刺史桓温之任郤氏晉桓温辟王恂為主簿郗超為叅軍超多鬚髯恂短小荆人語曰髯叅軍短主簿能令公喜能令公怒凱之晉顧凱之善丹青與殷仲堪為叅軍郝隆世説郝隆為南蠻叅軍三月三日作詩曰娵隅濯清池桓温問何物荅曰名魚為娵隅桓温曰何為作蠻語隆曰千里投公始得一蠻府叅軍那得不蠻語也歎州縣之勞梁竦孔功曹司功叅軍事掌考課假使祭祀禮樂學校表䟽書啓祥食祥異醫藥卜筮陳設䘮𦵏倉曹司倉叅軍事掌租調公廨庖厨倉庫市肆户曹司户叅軍事掌户籍計帳道路過所蠲符雜徭逋負良賤芻藁逆旅婚姻田訟旌别孝悌田曹司田叅軍事掌園宅口分永業及䕃田兵曹司兵叅軍事掌武官選兵甲器仗門禁管籥軍防烽堠傳驛畋獵灋曹司灋叅軍事掌鞫獄麗法督盗賊知贓賄没入士曹司士事叅軍事掌津梁舟車舎宅工藝已上百官志入奏軍事盧承慶為秦州叅軍入奏軍事太宗偉其辯詔為御史韓思彦補建州司户叅軍帝召問不見卿久今何官邪思彦泣道所以然帝謂宰相曰此亦太屈今之管蕭張文瓘補并州叅軍時李勣為長史嘗歎曰稚圭今之管蕭吾所不及民服其恩徐有功補蒲州司法叅軍為政仁不忍杖罰民服其恩更相約曰犯徐叅軍杖者必斥之訖代不辱一人河東三絶徐彦伯調蒲州司兵叅軍時司户韋暠善判司士李桓工書而彦伯屬辭時稱河東三絶仁恕不行鞭罰思復轉汴州司户當使絶域狄仁傑授并州法曹叅軍同府叅軍鄭崇質母老且疾當使絶域仁傑謂曰君可貽親萬里憂乎詣長史藺仁基請代行仁基美其誼逺近稱伏韋湊遷揚州法曹州人孟神爽罷仁壽令豪縱數犯法及通貴戚吏莫敢繩湊按治杖殺之逺近稱伏開倉賑民韓思復調梁府倉曹叅軍會大旱輒開倉賑民州劾責對曰人窮則濫不如因而活之無趨為盗賊州不能詘南山可移判不可摇李元紘為雄州司户叅軍時太平公主勢震天下百司順望風㫖嘗與民競碾磑元紘還之民長史竇懷貞大驚趨改之元紘大署判後曰南山可移判不可揺改好畤令吏以紙萬番贐為受百番杜暹補婺州叅軍秩滿歸吏以紙萬番贐之暹為受百番衆歎曰昔清吏受一大錢何異哉部人稱慶尹思貞調隆州叅軍事屬邑豪蒲氏驁肆不法州檄思貞按之擿其姦贓萬計卒論死部人稱慶刻石歎頌條落則本枯齊澣調蒲州司法叅軍有父子連坐論死者澣曰條落則本枯奈何俱死議貸其父太守不聽固爭卒原名動一州號霹靂手裴漼父琰之永徽中為同州司户叅軍年甚少不主曹務州刺史李崇義内輕之鐫諭之曰同三輔吏事繁子盍求便官毋留此琰之唯唯吏白積案數百崇義讓使趨斷琰之曰何至逼人乃命吏連紙進筆為省决一日畢既與奪當理而筆詞勁妙崇義驚曰子何自晦成吾過耶由是名動一州號霹靂手作伐櫻桃賦蕭頴士調廣陵叅軍事頴士褊急中不能堪作伐櫻桃賦曰擢無庸之𤨏質䝉本枝以自庇雖先寝而或薦非和羹之正味以譏林甫云君子恨其褊蕭功曹蕭頴士授揚州功曹天下推知人稱蕭功曹仁愛裴守真父謹隋大業中為淮安司户叅軍郡人楊琳田瓉等亂刧吏多死惟謹以仁愛故賊約其屬無敢害䕶送還鄉對疑獄杜佑以䕃補濟南叅軍事剡縣丞嘗過潤州刺史韋元甫元甫以故人子待之不加禮他日有疑獄不能决訊佑佑為辨處契要無不盡元甫竒之署司法叅軍莅事明濟顔杲卿以蔭調遂州司法叅軍剛正莅事明濟嘗為刺史詰讓正色别白不為屈賦歡喜詩杜審言見詩門月俸一百八索京尹户曹月俸一百八索時為念珠曹出南部新書縣令六能政遺愛感化勸課仁惠屈才彊毅立碑清儉祠祭棄官白一同布政百里宣風墨綬銅章銅墨子男之秩郎官漢書郎官出宰百里象雷雷霆百里縣令象之分土百里烹鮮理大國若烹小鮮邑令邑宰縣尹令長良宰製錦傳偃室陶縣字人撫字宣王化漢書郡令守長所以宣王化河陽花潘岳為河陽令樹桃李花人號曰河陽一縣花彭澤桞陶淵明為彭澤令門栽五桞偶唐虞之朝行卓魯之政當勤恤之朝居撫綏之任累安邑閔仲叔居安邑買猪肝食令乃進猪肝歎曰閔仲叔豈以口腹累安邑哉遂去之之武城子之武城聞絃歌之聲語土不過同同百里鳴琴之化宓子賤為單父宰彈鳴琴不下堂而單父治巫馬期為單父戴星出戴星入以身親之而單父亦治宓子曰彼任力我任人任力者勞任人者逸戴星見上神明公沙穆為𢎞農令蝗蟲出境人以為神明之宰操刀學製子曰未能操刀而使製錦有美錦不使人學製千室之邑可使為之宰冉有十室之邑必有忠信同上願試馮野王以父任為中庶子年十八上書願試守長安令能政絃歌割雞牛刀子㳺為武城宰子之武城聞絃歌之聲曰割雞焉用牛刀驅雞善理人如驅雞彈琴字鄭見勸課門名賈後漢賈彪為新息長人困多不養子彪嚴為制限數年養子千餘人男名賈子女名賈女路不拾遺劉嬉為雍丘令三善子路理蒲夫子入蒲三歎其善市無二價晉陸雲字士龍為浚儀令邑無喧鵲術有驅雞卓茂之政術閻憲之謳謠益都記曰閻憲為緜竹令男子杜成進得其遺装有錦二十五疋詣吏曰縣有明府君不能慙心冦來刈麥宓子賤治單父齊冦來至魯父老請曰冦將至人不及自刈請民出刈宓子不許季孫聞而讓之宓子曰今年無麥明年可種若使不耕者得麥其民樂有冦也増貲就賦減年從役劉平字子公為全椒長政有恩惠人或増賦或減年從役刺史行部獄無繫囚也置水投書魯國先賢傳孔翊為洛陽令置水前庭得囑託書皆投水中無一所發也繭絲保鄣國語趙簡子使尹鐸為晉陽将行請曰為繭絲乎抑其保鄣乎簡子曰保鄣哉尹鐸至則損其户數人則優而税少簡子謂襄子曰晉國有難無以晉陽為逺必以歸之所謂保鄣也繭絲謂减其税損户數見上注無囚繋見上注感化三異馴雉魯恭字仲康為中牟令府遣掾躬親亷之恭随行阡陌見桑下雉雛馴擾傍有童子曰何不捕之童子曰雉方雛不忍捕伺者曰螟蟲不入境一異也化及鳥獸二異也童子有仁心三異也飛鳬王喬為葉令毎月詣朝常乘雙鳬舄也飛蝗魯恭宰中牟令飛蝗避境反風劉琨為江陵令有火災琨向火叩頭火乃反風而降雨甘雨祝長字㓜卿為洛陽令是時亢旱天子雩祈不感長乃暴身堦前引罪自咎甘雨滂注人歌詠之鳳集晉孫卿拜榆次令有鳳凰集帝立碑以褒之鸞翔漢王臯為重泉令有鸞翔至止於縣庭十餘日不雹韓稜為下邳令一邑内獨不雹上聞徴拜尚書鳩巢華陽國志景毅為白水令鳩巢其㕔焉人不忍欺宓子賤為政人不忍欺餘見彊毅門注蝗隨督郵後漢戴封平仲為西華令蝗蟲不入界時督郵行縣蝗忽大至督郵去其日蝗亦頓除一境竒之祝螟蟲公沙穆為𢎞農令縣界有蝗蟲食稼穆乃設壇請以身禱於是暴雨來螟蟲頓消人以為神明君仁惠伏臘放囚虞延為邑令毎伏臘放囚徒歸必尅期還設壇責己見感化門請雨焚軀戴封為西華令大旱祈雨将欲焚軀俄而雨至吞藥鍾離意字子何拜瑕丘令有吏行盗意不忍行刑罷其職放歸其父曰有道君以義刑人乃令子自飲藥而死也避雨晉書光逸為博令小吏遇雨入令被避寒逸不怒之吏不忍欺人懷其惠人告吏求肉米後漢貞茂為宻令人有言亭長受其米肉遺者茂問吏求否人曰自往遺之茂曰鄰里尚相饋遺况吏乎吏不當承威取之耳人曰茍如是律令何以禁之茂曰我以禮教汝必無怨惡以律治汝汝何所措哉大者可論小者可殺姑歸念之人納其訓吏懷其恩借牛魯恭為中牟令亭長從人借牛不還牛主訟之恭勒歸牛再三不從歎曰是教化不行欲解印去民涕泣留之亭長慙悔乃詣獄市令作屋鍾離意為葉令市無屋出俸錢作之解土呪曰興功役令也有過祟令當之人悦也召姧吏復職魏髙柔為管城長令縣中姦吏引去柔教曰昔邴吉吏有非者容之此諸吏於吾未嘗有失安得去皆自勵也終日清談王衍字夷甫為元城令終日清談縣務亦理泣罪夏方為齊山令百姓有合將加箠拷者方向之涕泣初不加罪小大莫犯也彊毅彊項後漢董宣為洛陽令湖陽公主家人殺人宣就主車取殺之主訴帝帝欲殺宣宣觸殿流血帝令謝主宣不拜帝令捺伏宣以手據地不俯帝聞曰彊項令商賈露宿王渙字稚子為河内渙令大小震懼外户不閉商賈露宿遷洛陽令抑彊扶弱人是以息吏不敢欺投巫西門豹為鄴令問人疾苦人曰毎嵗為河伯娶妻斂百姓二三十萬豹乃令娶巫家女至日令大巫嫗報河伯乃投之扵河有頃曰何不反又令投弟子三人趨之有頃曰女子不能自神復欲投三老廷尉掾亭長皆叩頭曰不敢與河伯娶妻也盗車蓋黄昌為宛陵令嚴毅好發姦伏有盗車蓋者昌不言宻令人至賊家掩取之悉収一家一時殺之百姓戰懼咸稱明也人不能欺西門豹為政人不能欺鄭子産為政人不忍欺宓子賤為政人不敢欺清儉單歩魏志崔林除傿令清貧單歩之官塵甑魚釡范丹為萊蕪令清貧人歌曰甑中生塵范史雲釡中生魚范萊蕪留犢魏畧時苖為夀春令始至乘輿車駕黄㹀後嵗餘牛生犢及去留犢曰是淮土所生布被後漢董宣為洛陽令死帝使人視家無餘財以布被蓋之尸妻子守哭帝嗟之賜金帛身處脂膏孔奮君勇為姑臧令時姑臧令獨完富奮清亷或以身處脂膏脂膏不能自潤奮不改其操也乾飯胡紹為河内懷令三日一視事十日一官倉受俸米於閤内作乾飯食之遺愛上書請留漢焦延壽子貢為小黄令當遷三老官屬上書請留制又許増秩留之輕服濳遁後漢劉寵除平陵令訓人以禮母病棄官百姓士人攀轅卧轍充塞道路車不能進乃輕服濳遁他郡王渙為洛陽令病卒䘮西歸過𢎞農𢎞農人設祭扵路曰當時持米至洛陽為卒司所抄自王君來不見侵枉市哭孔弈為全椒令以母疾去官百姓哭送之及弈卒市皆哭勸課立學校晉范寗字武子為餘杭令立學校勸生徒鑿渠西門豹為鄴令鑿渠十二引水灌田魏史起為鄴令以西門豹舊渠引漳水灌鄴田旁脩古岸鹵生稻梁闢田子路治蒲夫子三歎其善入境田疇開闢一善也戴星見上注屈才公琰沉醉蜀蔣琬字公琰除廣都長衆事不治常沉醉先主怒諸葛亮曰公琰社稷之器非百里之才先主乃重之驥足牛刀子㳺為武城宰龐統免官字士元劉備以為棗陽縣令在縣不治免官魯肅曰士元之才百里不足以展驥足耳備大器之乃任為治中屈而未中過猶不及耻汲黯遷滎陽令耻為令以病歸也盤根錯節虞詡字叔卿除朝歌令親舊吊之詡曰何哀不遇盤根錯節何以表利器也朝野歎屈夏侯湛為野王令以恤隱為急而緩於公調政清務閒優㳺多暇朝野歎其屈除中書侍郎恭賞換縣漢書薛宣字贛君為左馮翊穎陽縣大其令薛恭未嘗理粟邑縣小無事其令韋賞才有餘宣乃奏賞與恭換縣二人領縣後兩縣皆理立碑褒鳳集晉孫卿為榆次令有鳳凰集武帝令立碑以褒美之頌徳崔瑗字子玉為汲令遷濟北相卒官汲縣故吏男女號泣共壘石作壇立碑頌徳而祠之生立碑後漢董詡字漢之除湏昌令多異政生為立碑祠祭生祠晉荀朂字公魯為安陽令遺愛在人生為立祠望柩設奠晉記劉璠為江夏令卒百姓如䘮兄弟將歸不受祭吏人往往聚路側望柩設奠酹而哭之畫形配食晉陸雲字士龍為浚儀令有異政及去官民思之畫形配食配社宋登為汝隂令號曰神父及卒人家配社祀之棄官歸去來晉陶潛字淵明為彭澤令州使掾來吏白當迎潛曰不能為五斗米折腰於鄉里小兒乃詠歸去來遂納印棄官而歸周躬漢書躬字子羽為櫟陽令以事去官遺榮解印考課第六蕭育為茂陵令會課第六倉陳令郭舜以率斂見責育為之請扶風怒曰君裁自脱何暇為人請及出傳召茂陵令當以職事對育遥出書佐牽育育㧞刀曰蕭育茂陵男子耳何能詣曹逄趨出欲去官明日且召入拜司𨽻校尉孔縣令掌導風化察寃滯聽獄訟凡民田収受縣令給之毎嵗季冬行鄉飲酒禮簿帳傳驛倉庫盗賊隄道雖有専官皆通知縣丞為之貳衆曹収率課調百官志解印綬去温讓嘗為邑宰解印綬去擊盗所至輒平李大亮収土門令方嵗飢境多盗賊大亮招亡散撫貧瘠賣所乘馬稍稍資業之勸墾田嵗大熟間出擊盗所至輒平秦王行北境下書褒勞單馬詣賊營胡賊大至大亮度不能拒乃單馬詣賊營説豪帥為分別禍福賊衆感服遂相率降大亮殺所乘馬與之食至晡而反與丞尉均取俸髙智周遷費令與丞尉均取俸民安其化刻石頌美誅滅大姓王方翼調安定令誅滅大姓姦豪貼息訟息錢報上不與薛訥遷藍田令富人倪氏訟息錢於肅政臺中丞來俊臣受賕發義倉粟數千斛償之訥曰義倉本備水旱安可絶衆人之仰私一家報上不與會俊臣得罪亦止右善去惡人稱為神明馮元淑歴清漳浚儀始平三縣令右善去惡人稱為神明與奴僕日一食馬日一秣所至不携妻子斥俸餘以給貧窮或譏其近名元淑曰吾性也不為苦中宗降璽書勞勉付狀史官賢令蔣沇乾元中歴陸渾盩厔咸陽髙陵四縣令美政流行長老紀焉郭子儀軍出其縣敕麾下曰蔣沇賢令供億當有素士得蔬飯足矣毋撓其清也遷長安令不得進官韋思謙調應城令負殿不得進官吏部尚書髙季輔曰予始得此一人豈以小疵棄大徳邪政為二川最韋嗣立累調雙流令比年不加簡擇吏部年髙不善刀筆者乃擬縣韋嗣立建言見刺史門吏民愛之韋􅁪見良吏門詔問所以安人者韋濟開元初調鄄城令或言吏部選縣令非其人既衆謝有詔問所以安人者對凡二百人惟濟居第一不能對者悉免官摧勒姦豪陸璪除洛陽令時車駕在洛摧勒姦豪人不敢犯教民耕桑韋維徙内河令教民耕桑縣為刻頌課第一楊元琰補平棘令課第一御史府表其政璽書褒厲鸞降庭樹楊仲昌累為孝義令鸞降庭樹太守蕭恕表其政不事威刑而治韋抗景雲初為永昌令不事威刑而治見良吏門配户和市裴耀卿遷長安令舊有配户和市法人厭苦耀卿一切貴豪門坐賈豫給以直絶僦欺之弊及去人思之所論者民寃抑楊㻛為麟逰令時竇懐真大營金僊玉真二觀檄取畿内嘗負逆人貲暴斂之以佐費瑒拒不應懷真怒曰縣令拒大夫命乎瑒曰所論者民寃抑位髙下乎何取懷貞壯其對為止賜百縑崔隱甫遷洛陽令棃園弟子胡雛善笛嘗負罪匿禁中帝以他事召隱甫從容指曰就卿丐此人對曰陛下輕臣而重樂工請觧官再拜出帝遽謝與胡雛隱甫殺之有詔貰死不及矣賜隐甫百縑六合元元之衆縣命於縣令張九齡建言云見刺史門宜遂科定其資不歴縣令不得任臺郎給舍同上以治最顯房琯授盧氏令拜監察御史坐訊獄非是貶睦州司户叅軍復為縣所至尚徳化興長利以治最顯但計資考不求賢良陳子昂今吏部調縣令如補一尉但計資考不求賢良有如不次用人則天下嚚然相謗矣狃於常而不變也故庸人皆任縣令教化之陵遲顧不甚哉尹當求令長親細事桞渾云見京兆尹門宜以上愛人之本為心薛珏見刺史門宜出中書門下戴叔倫見叅軍門就賜緋魚王正雅穆宗時京邑多盗賊正雅以萬年令威震豪强尹桞公綽言其能就賜緋魚李吉甫建言命有司舉材堪縣令者七十一輸無逋期劉宴天寳中累調夏令未嘗督賦而輸無逋期縣人訴機織未就盧坦為壽安令河南賦限已窮縣人訴機織未就坦詣府請申十日不聽坦諭縣人第輸勿顧限違之不過罰令俸爾由是知名著諭䝉書馮伉醴泉令缺宰相髙選徳宗曰前使澤潞不受幣者其人清可用也遂以授伉縣多嚚猾數犯法伉為著諭䝉書十四篇大抵勸之務農進學而教以忠孝鄉黨授之使輔相教督始築城郭羅立言改武陽令以治劇遷河隂立言始築城郭地所當者皆富豪大賈所占下令使自築其處吏籍其闊狹號扵衆曰有不如約為我更完民憚其嚴數旬畢民無田者不如有役設鏁絶汴流姦盗屏息政化清明顔泉明肅宗拜泉明郫令政化清明誅宿盗人情翕然成都尹舉其課第一治績而負節義張廵出為清河令治績而負節義或以困阨歸者傾貲振謢無吝南金口明府手廵更調真源令土多豪猾大吏華南金樹威恣肆邑中語曰南金口明府手廵下車以法誅之赦餘黨莫不改行遷善政簡約民甚宜之盗尸虎還元徳秀為魯山令前此墮車傷足不能趨拜太守待以客禮有盗㑹虎為暴盗請格虎自贖許之吏白彼詭計且亡去無乃為累乎徳秀曰許之矣不可負約即有累吾當坐不及餘人明日盗尸虎還舉縣嗟嘆歌于蔿于𤣥宗在東都酺五鳯樓下命三百里縣令刺史各以聲樂集是時頗言帝且第勝負加賞黜河内太守輦優伎數百被錦綉或作犀象瓌譎光麗徳秀惟樂工十人聯袂歌于蔿于此元徳秀所為歌也帝聞異之嘆曰賢人之言哉謂宰相曰河内人其塗炭乎乃黜太守徳秀益知名母子相訟授孝經韋景駿為貴鄉令有母子相訟者景駿曰令少不天常自痛爾幸有親而忘孝耶教之不孚令之罪也因嗚咽流涕付授孝經使習大義於是母子感悟請自新遂為孝子豪猾屏息李頻再遷武功令扵是畿民多籍神䇿軍吏以其横類假借不敢繩以法頻至有神䇿士尚君慶逋賦六年不送晘然出入閭里頻宻擿比伍與競君慶叩縣廷質頻即械送獄盡條宿惡請為尹殺之督所負無少貸豪猾大驚屏息奉法縣大治厮水溉田有六門堰者廞廢百五十年方嵗飢頻發官廥庸民浚渠按故道厮水溉田榖以大稔懿宗嘉之賜緋衣銀魚褒諭其能李朝隱遷長安令宦官閭興貴有所干請曵去之睿宗嘉歎後御承天門對百官及朝集使褒諭其能使徧聞之進大中大夫一階賜中上考絹百疋以旌剛烈政養在人賈敦實咸亨初敦實爲洛州長史亦寛惠人心懷向洛陽令楊徳幹矜酷烈杖殺人以立威敦實喻止曰政養在人傷生過多雖能不足貴也徳幹為衰減以愛利爲行張允濟仕隋為武陽令見雜盗門賦役稱平李元紘開元初為萬年令能吏李叔明拜洛陽令招徠遺民號能吏縣民獨免流散韋景駿歴肥鄉令方河北飢躬廵閭里勸人通有無教導撫循縣民獨免流散及去人立石著其功鬼神破膽李杲為洛陽令嚴毅公正吏民畏之有劉兼者過其境宿於村邸夜深聞户外語聲曰古今正人李令是也見其行事令人破膽我軰可以他縣血食兼開户視之無物乃見鬼神也齋馬馮元淑為清漳令所乘馬午後則不與芻云令其作齋張允濟為武陽曰吾境未嘗拾遺唐史見遺物門認婦家牛張允濟事見威名門擇於臺省舊史崔縱為監察御史詔擇令長於臺省除藍田令寛明勤幹徳化流行人為立碑頌徳寛猛得中舊史韋抗景雲初為永昌令不務威刑而政令肅一都輦繁劇為政寛猛得中無如抗者縣丞七白佐邑縣寮縣吏佐理一同貳職百里貳子男之職佐卓魯之政州縣之職徒勞人爾梁竦之言桓譚字君山數言事忤㫖出為安陵丞忽忽不樂道病卒温舒路温舒為石苞邑丞孔諫校獵劉仁軌擢咸陽丞貞觀十四年校獵同州時秋歛未訖仁軌諫曰今兹纔澤霑足百榖熾茂収澍十二常日贅調已有所妨又供獵事繕橋治道役雖簡省猶不損數萬少延一旬使場圃畢勞陛下六飛徐驅公私交㤗璽書褒納開陳經書行釋奠禮王義方貶吉安丞開陳經書行釋奠禮出囚使就畎畆唐臨出為萬泉丞有輕囚久繫方春農事興臨説令可且出囚使就畎畆不許臨曰有所疑丞執其罪令移疾臨悉縱歸與之約囚如期還景倩真清陸景倩為扶溝丞按察使畢講覆州縣殿最惟景倩曰真清貳令丞之職所以貳令於邑之事無所不當問位髙而偪例以嫌不可否事文書行吏抱成案詣丞卷其前鉗以左手右手擿紙尾鴈鶩行以進平立聣丞曰當署丞渉筆占位署唯謹官雖髙力勢反出主簿尉下既噤不得施用又喟然曰丞哉丞哉余不負丞而丞負余植二松日吟哦其間已上韓愈藍田壁記縣吏之長曰令曰丞丞之位八品下桞宗元武功縣丞壁記丞述六職以輔其令同上主簿八白職司符印主掌簿書鴻漸之資鳳棲之位仇香為縣主簿宰謂曰枳棘非鸞鳳所棲百里豈大賢所託他時論道岩廊非主簿而誰厚以資送之棲棘之官紏察凖繩管轄之司王恂恂為桓温主簿人曰短主簿事具叅軍門仇覽仇香名覽紏職周禮朱勾勾稽孔諸縣置主簿以流外為之不遇之言題客舎蔣欽緒始韓琬為髙郵主簿使京師自負其才有不遇之言題客舎他日欽緒見之笑曰吾子嘆後時邪遇事蠭鋭李畬歴氾水主簿遇事蠭鋭雖厮竪一閲輒記姓名作書數百篇蕭存表常熟主簿顔真卿在湖州與存及陸鴻漸等討摭古今韻字所原作書數百篇移文嶽神虎不為害顧少連補登封主簿邑有虎孽民患之少連命塞䧟穽移文嶽神虎不為害佳婿楊於陵調句容主簿節度使韓滉剛嚴少許可獨竒於陵謂妻桞曰吾求佳婿無如於陵賢因以妻之後來之英徐浩張説稱其才繇魯山主簿薦為集賢校理見喜雨五色鴒賦咨嘆曰後來之英縣尉九白一命寸禄秩卑位下馳聲南昌梅福字子真為南昌尉故謂之神仙尉宣威北部曹操為洛北尉造五色棒懸於市門黄綬之秩鴻漸之資仙吏仙尉神仙之吏州縣之勞孔武徳元年改書佐曰縣尉尋改曰縣正七年改縣正復曰尉百官志獨敢廷辯李義琰補太原尉李勣為都督僚吏憚其威嚴義琰獨敢廷辯曲直勣甚禮之殺折衝劉仁軌轉陳倉尉部人折衝都尉魯寧者豪縱狠法縣莫敢屈仁軌約不再犯而寧暴横自如仁軌榜殺之州以聞太宗曰尉而殺吾折衝可乎召詰責仁軌對曰寧辱臣臣故殺之帝以為剛正更擢咸陽丞惠出一尉員半千調武陽尉嵗旱勸令殷子良發粟振民不從及子良謁州半千悉發之下頼以濟刺史大怒囚半千於獄會薛元超持節河南讓太守曰君有民不能恤使惠出一尉尚何罪邪釋之剖斷精允蔣沇授洛陽尉始河南尹韓朝宗裴迥嘗委詳覆撿句而處事平剖斷精允羣僚莫敢望也以清幹稱陸璪補長安尉當時稱其義裴佶授藍田尉徳宗詔發畿縣民城奉天嚴郢為京兆政刻急本曹尉韋重規妻乳且疾不敢免佶請代役要如程當時稱其義摧姦抉隱李勉始調開封尉汴州水陸一都㑹俗厖錯號難治勉摧姦抉隱為有名單言輒判李程調藍田尉數有滯獄十年程單言輙判京兆狀最遷監察御史本傳凡居官亷雖大臣無厚蓄盧坦為河南尉時杜黄裳為尹召坦立堂下曰某家子與惡人㳺破産盍察之坦曰凡居官亷雖大臣無厚蓄其能積財者必剥下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黄裳驚其言自是遇加厚說使者請以五術省風俗陸贄補渭南尉徳宗立遣黜陟使庾何等十一人行天下贄説使者請以五術省風俗八計聽吏治三科登雋乂四賦經財實六徳保罷瘵五要簡官事檄州縣捍賊穆寜調藍山尉安禄山反劉道立為景城守寜募兵斬之檄州縣并力捍賊坐水旁裴囬賦詩孟郊調溧陽尉縣有投金瀬平陵城林薄署䝉翳下有積水郊閒往坐水旁裴囬賦詩而曹務多廢令白府以假尉代之而分其半俸有惠政元徳秀調南和尉有惠政黜陟使以聞月中召入翰林白居易元和元年對制策乙等調盩厔尉為集賢校理月中召入翰林為學士蘭菊裴子餘補鄠縣尉見蘭門裁决明辨蘇珦調鄠尉時李義琰為雍州長史鄠多訟日至長史府珦裁决明辨見知人門茂才異行髙琰以茂才異行髙第累擢咸陽尉有吏能治第一劉延祐補渭南尉有吏能治第一李勣戒之曰子春秋少而有美名宜稍自抑無為出人上延祐欽納屈宋作衙官杜審言二王後十白作賔王家尚書成王命㣲子啓代殷後曰作賔於王家與國咸休永世無窮振鷺二王後來助祭也其詩曰振鷺于飛于彼西雍我客戾止亦有斯容有客微子來見于祖廟詩曰有客有客亦白其馬先代之後宋皇武子曰宋先代之後於周為客天子有事膰焉有䘮拜焉三恪周封胡公於陳以備三恪恪敬也又封夏殷并夏殷為三恪具禮轉隆示敬而已二王後祭式主客式二王後毎年四時享廟牲牢調度祭服祭器一切並官給其帷帳几案缺亦官給主司四時省問孔請周漢為二王後李嗣真為左御史中丞諸侯十一白五等公侯伯子男列國建國天子建國列國諸侯邦君七命侯伯君人漢祖詔曰尊國君人上所尊禮象賢繼世以立諸侯象賢問國君之富數地以對山澤之所出也大夫十二白立家大夫立家食采陪臣灋山陵二十七大夫灋山陵頒冰理家者不敢失於臣妾臣妾大夫刑不上大夫不可徒行孔子曰以吾從大夫之後不可徒行也位崇羔鴈三命為大夫倍士之禄禮下大夫倍上士執羔執鴈乘軒問大夫之富曰有宰食力祭器衣服不假九錫十三白書曰平王錫晉文侯秬鬯珪瓉冊口用賚爾秬鬯一卣彤弓一彤矢百玈弓十玈矢千馬四匹注九命賜弓矢得專征伐周禮九命一命受職謂治職事再命受服謂受祭服三命受位下大夫之位四命受祭器五命受則人法也出為子男六命賜宫謂子男入為卿治官也七命賜國出就侯伯之國也八命受收牧一州也九命作伯謂長也謂諸侯方伯也諸侯有徳則賜一命車馬再命衣服三虎賁四樂器五納陛六朱户七弓矢八斧鉞九秬鬯周遷洛邑方命晉文見上漢幸許昌始加魏武魏曹操挾天子幸許昌受九錫魏受禪追尊武帝事既行於叔世理難議於聖朝勸受蜀志諸葛亮有勸受九錫者亮曰若滅魏後十錫可受而况其九乎庶官十四白無曠庶官書邦之司直詩漢晁錯為大掌故主掌故事將作漢書將作秦官也秩二千石掌宫室屬官有東園主掌諸材木也治水官又有都舡令丞主都舡獄治水官也水衡都尉掌上林苑屬官有輯濯注云主舡官鍾官主鑄錢祭酒十五白書堯曰克明峻徳以親九族九族既睦平章百姓祭酒周受命封建宗盟百官春秋云周封兄弟之國十有六同姓之國三十有五焉選宗中之長而董之謂之宗正成王時彤伯入為祭酒掌主親屬也漢秦因之漢平帝更名宗伯王莽改名秩宗東漢復為宗伯至晉以庶姓為之大祭酒漢魏皆同姓為之晉以後雜用庶姓梁加卿除大字北齊又加大字隋又除之漢髙祖七年自三陽從長安置祭酒官以序九族劉向字子政元帝時蕭望之周堪薦向為宗室忠直明經有行為祭酒劉徳字路叔脩黄老術有知畧少時召見甘泉武帝謂之千里駒昭帝初為祭酒丞後為祭酒妻死大將軍欲以女妻之徳不敢畏盛滿也東漢劉平字公子以仁孝著聞永平三年為祭酒劉般字伯與代名忠孝在朝竭忠建初二年拜宗正也續漢宗正一人秩二千石掌叙録王國嫡庶之徒次及諸宗室親屬逺近郡國嵗初上宗室名若有犯法貢舉十六白位列春官職司貢舉天官天子求賢諸侯貢士懸甲乙之科拾青紫之士敷求多士精選羣才盛矣㑹府直哉主司登龍退鷁待問待取握靈蛇而來中正鵠而取精鑒茂才禮闈之司重其任文囿之主難其人楊葉不穿雖十上而下第桂枝可折以三道而登科眀試諸難撞鍾之鳴以待下問止水之鑒寧遺上才當文思之代必待得賢守明試之司豈宜失士獻賢能之書若今之解狀也職當可試誰慮遺才經茍未明難用拾芥白孔六帖卷七十七
