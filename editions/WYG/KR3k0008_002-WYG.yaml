二氣則生病夢常璩華陽國志曰李特長子盈字仲平少子䧺字仲儁初䧺母羅􅗖䧺時夢兩虹自地而升天一虹中斷羅曰吾二兒若有先亡者後必有貴者後䧺遂王蜀隂陽之精春秋元命苞孔天有四時五行寒暑迭居張為虹蜺孫思邈貫營沙陀傳李嗣昭周徳威下慈隰進屯河中汴将朱友寧以兵十萬壁其南全忠自屯晉州晉人聞全忠皆失色時有虹貫德威營氏叔琮薄壘疾鬬晉兵大敗曲虹天復三年三月􅏤申有曲虹在日東北垂頭軍門延和元年六月幽州都督孫佺帥兵襲奚将入賊境有白虹垂頭于軍門占曰其下流血蜺者斗之精五行志唐隆元年六月戊子虹蜺亘天蜺者斗之精占曰后妃隂脅王者架天安得五彩虹駕天作長橋李白焦香山詩虹見宫中閩王繼鵬晉天福三年夏虹見其宫中螮蝀入紫㣲天明夷廟暉李白慿天霓以結峯李白答孟少府書煙虹君王賜顔色聲價凌煙虹東武吟掩天光虹蜺掩天光哲后起康濟答髙山人天陂斷霓天陂垂杜牧弄水亭入井飲永正二年三月彩虹入潤州大将張子良宅初入漿甕水盡入井飲之後子良擒李錡拜金吾尋歴方鎮南部新書倚劍慷慨氣干虹蜺李白上裴長史書氣如横霓房魯上節使書目視飛鴻氣如横霓紛錯宋務光虹霓紛錯隂勝之沴也虹霓滅而日月張李白明堂賦纎纎雲表霓杜甫五彩奪目荆州有氣如虹五彩奪目有首如驢長數十丈環㕔事而行三匝而滅占者曰㕔中将有哭聲然而非州府之咎頃之順貞穆后崩發哀於此室徐鉉稽神録天河十一白天河謂之天漢銀漢銀河河漢天津絳河明河倬彼雲漢倬明也昭回于天昭回光轉也倬彼雲漢為章于天言為天文章維天有漢監亦有光斜漢左界襃斜南躔躔歴也見文選在天成象耿耿秋河曙耿耿清淺河漢清且淺渭水以象三輔圖秦皇都咸陽列渭水貫都以象天河黄河之精河圖曰河精上為天河仙查博物志舊説天河與海通有居海者年年八月浮查来不失期因上乗去忽忽不知晝夜有一處多織女一丈夫牽牛渚次飲之問之答曰君可於蜀中問嚴君平君平曰某年某月某日有客星犯牽牛星即此人到天河星石集林曰昔有人尋河源見婦人浣紗問之曰此天河也乃與一石而歸問嚴君平君平曰此織女支機之石昭昭清漢暉鵲橋牛女隠見廻旋通海竟天孔如練唐文粹宋之問明河篇倬彼昭回如練白復出東城接南陌昬見南樓曉落西山昬見南樓清且淺曉落西山縱復横落曉霜李白詩天河落曉霜明星方揚斜漢西懸璿柄如墮沉半層瀾劉禹錫楚望賦掛戸河漢掛户牖欲濟無輕舠夜宿南陵李白斗柄當西南韋蘇州擬古詩天河横未落斗柄當西南明河澹如掃杜牧即事詩縱被㣲雲掩終當永夜清含星動雙闕伴月落邉城杜甫天河驚風翻河漢梁棟已出日同上寫懐銀河倒瀉三石梁李白東井南箕曲直殊於河漢楊炯渾天賦天河夜轉漂廻星銀浦流雲學水聲李賀天上謡銀河倒列星杜甫詩明河繞塞㣲夜詩同上天河落處長洲路李賀浩汗若河漢韓詩霜十二災附白履霜堅冰易坤卦季秋霜始降霜降之日百工休禮露為蒹葭蒼蒼白露為霜青女淮南子曰霜神名青女凝而為霜大戴禮隂氣勝陽氣則凝而為霜雪刑罰之表春秋符曰霜者刑罰之表也季秋霜始降鷹隼擊王者順天行誅成肅殺之威紺碧拾遺志曰廣延國霜色紺碧又有甘霜九月肅霜既降禮記霜露既降君子履之必有悽愴之心鐘鳴山海經云豐山之鐘霜降而自鳴始凝易曰履霜隂始凝也葛屨紏紏葛屨可以履霜紈扇班婕妤扇詩新製齊紈素皎潔如霜雪駟見國語云駟見而霣霜駟房星也殺木元命苞曰霜以殺木鷹隼擊霜降則鷹隼擊豺祭霜降之日豺乃祭獸禮婦功家語霜降而婦功成嫁娶者行焉馬蹄荘子曰馬蹄可以踐霜雪蠶繭拾遺記員嶠之山有氷蠶以霜雪覆之然後為繭琴琴有履霜操伯竒所作也尹吉甫信後妻之䜛逐伯竒伯竒自傷無罪清朝履霜乃作履霜操正月云繁詩人興傷之刺憂季秋既降君子有怵惕之心𤣥霜内傳具雪門神鑪抱朴子云凝霜雪於神鑪採靈芝於嵩岳災異五月降霜淮南子曰鄒衍事燕惠王盡其忠貞左右譛之王弃衍衍仰天而哭感霜降夏降不殺草春秋苻曰王者政令苛則夏降霜誅伐不行則冬霜不殺草附木京房易傳曰誅不原情則其霜附木不下不教而誅其霜反在草下雪霜大摯摯傷也月令殺菽周十月今八月也書失時孔清明降霜獨孤及疏曰昨清明降霜争嚴卓行賛曰德秀當與秋霜争嚴真丈夫哉霜厚數寸五行志證聖元年六月陸州隕霜殺草吴越地燠而盛夏隕霜昔所未有殺桑宣宗紀大中三年春隕霜殺桑染紫常奉真湘潭記鵞管山霜可染紫為天下冠恨人無知者慘霜遁叟山居記天霜下嚴威李白古風夜霜朗泳清川飛夜霜縞乎若寒崖之霜虞城令去思頌青楓葉赤天雨霜杜甫韓諌議註㪚下秋草李白送孟賛府林風吹霜㪚下秋草凝霜空冷枕韋應物詩坐看飛霜滿凋此紅芳年古風飛霜早淅瀝緑艶恐休歇同上鐘何鳴兮應霜氣楊炯渾天賦殺惡草元和十四年四月淄青隕霜殺惡草及荆棘而不害嘉榖唐史五行志嚴霜唐史段秀實賛英烈言言如嚴霜烈日可畏而仰哉吴霜㸃歸鬢李賀嚴霜衣帶斷杜甫嚴霜衣帶斷指直不得結露十三瑞附白立秋後五日白露降㪚而為露大戴禮陽氣勝隂則㪚為雨露厭浥行露濕也漙兮零露漙兮為霜白露為霜零露泥泥瀼瀼濃濃湛湛露斯匪陽不晞綴冠束晳曰零露如珠非綴冠之飾泛灎之彩鶴警千年鶴警露而鳴蟬飲取其潔既濡禮曰春雨露既濡君子履之必有怵惕之心珠盤仙掌金莖以承露盤中見上薤上薤露歌曰薤上露朝日晞潤玉垂珠晨降楚辭曰霧露蒙其晨降宵零典引曰甘露宵零於豐草菅茅英英白雲露彼菅茅多露謂行多露詩人夙行興厭浥之詠君子春履有怵惕之心下地騰文别賦助海成深海受霧露以成其深露衣朝諫劉向説苑曰吴伐荆王令敢有諫者死舍人有少孺子者欲諫懐彈於後園露霑其衣如是者三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬髙居悲鳴飲風飲露不知螳蜋在其後曲跗欲取其蟬而螳蜋又不知黄爵居其後延頸欲啄之然黄爵又不知臣操彈丸在其下臣但捕其黄爵不覺露霑衣如此為窺其利而不思後患王聞之遂不伐荆桐葉蘇子曰人生一世若朝露之托於桐葉瑞露王者施徳則甘露降瑞圖一名天酒甘露仁澤也其凝如脂其甘如飴松柏竹葦晉書中興書曰王者敬飬耆老則甘露降而松柏受之尊賢容衆則竹葦受之天地相合以降甘露人莫之令而自均老子漢年甘露之瑞以為年紀三危伊尹説湯曰水中之美三危之露五色瑞露也膏露天不愛其道故天降膏露德動皇天瑞呈甘露表至德之馨且因宵降含孔甘之味不待秋凝若脂之潔如醴之甘孔甘露降李訓十一月帝御紫宸殿京兆尹韓約奏甘露降金吾左仗樹羣臣賀訓元輿奏言甘露近在禁中陛下宜親往觀以承天貺許之即輦入含元殿詔宰相羣臣往視訓奏言非甘露帝曰豈約妄耶顧中尉仇士良于志宏等驗之訓因欲閉之諸官人使無免者露芃芃兮蔓草文粹張説文曰露芃芃兮蔓草霏霏靈液唐文粹李正封詠露詩曰霏霏靈液重雲表無聲落宵潤玉堂簾曙寒金井索同上積耀呈姿栁宗元賀甘露表綴葉而珠璣積耀盈器而冰玉呈姿芳襲椒蘭味兼飴醴甘露徧庭樹李懸為貝州刺史甘露徧庭樹其邑人曰美政所致薔薇露栁宗元得韓愈所寄詩先以薔薇露灌手然後發讀白庶潭露常奉真湘潭記白庶潭露能染紅朝光初燭方湛湛而不晞畏景轉炎更瀼瀼而未已栁宗元賀甘露露垂於草其状如珠吕向注文選玉露凋晚林舊史李宻花露開元遺事太真妃宿酒初消苦肺熱晨遊後苑口吸花露以潤肺秋露如白玉李白古風秋露如白玉團團下庭緑火雲洗月露杜甫玉堦生白露夜乆侵羅襪太白玉階唐李賀金銅仙人辭漢歌敘云魏明帝青龍九年八月詔宦官牽車西取漢孝武捧露盤仙人欲立置前殿宮官既折盤仙人臨載乃澘然泣下歌曰茂陵劉郎秋風客夜聞馬嘶曉無跡畫欄桂樹懸秋香三十六宫土花碧槐官牽車指千里東關酸風射眸子空将漢月出宫門憶君清淚如鉛水襄蘭送客咸陽道天若有情天亦老携盤獨出月荒凉渭城已逺波聲小草露滴秋根杜詩承露盤中珠正圓韋應物通天臺上月初出承露盤中珠正圓珠可飲夀可永武皇南面曙欲分從空下來玉杯冷世間綵翠亦作囊八月一日仙人方仙方稱上藥静者服之常綽約碧天何言空墜露並上同漢武帝雜歌凝珠滿露枝李後主零露凝清華栁文零其庭而著異紀於年以標竒栁宗元甘露表秋荷一滴露清夜墜𤣥天清髙金莖露杜詩承露金莖霄漢間同上玉露凋傷楓樹林秋興詩露裛思藤架遣悶春風拂檻露華濃李詩白露垂珠滴秋月同上凝毫採掇花露容同上華露華露湛新秋濯濯晨露香明珠何聨聨韓愈泣露林攅母亡自延甓作塜廬有甘露降觀察使李若初遣官吏驗實㑹露晞里人失色攅哭曰天所降露禍我耶俄而露復集白孔六帖卷二
