沴珪璧既因方而成珪亦遇圓而成璧巗瞻山則千巖俱白肌膚荘子曰姑射之山有神人肌膚若氷雪綽約如處子田種玉之田原隰則萬頃同縞雪救火髙士傳焦先為野火燒廬遭大雪焦先卧不移人謂已死視之如故乗舟訪戴王子猷雪夜乗舟訪戴安道既至造門不前而返曰乗興而来興盡而返何必見戴也詩謝氏内集講書俄而雪聚太傅欣然曰白雪紛紛何所似兄子胡皃曰撒鹽空中差可擬兄女道藴曰未若栁絮因風起玉馬晉書常山真定縣大雪深數尺融而不積新蔡王縢怪而掘之得玉馬髙尺餘因表而獻之衣詩曰麻衣如雪曹風以麻衣比色扇班婕妤詠扇曰新製齊紈素皎潔如霜雪神仙王恭衣鶴氅雪中行積隂大戴禮云天地積隂温則為雨寒則為雪雨雪霏霏昔我往矣楊栁依依今我來思云云詩丈餘金匱曰武王伐紂都洛邑雪十日深丈餘七尺春秋考異曰庚辰大雪深七尺夏雪山海經由首山小威山空桑山並冬夏有雪梁山歌琴操曽子耕太山雨雪思父母作梁山歌黄竹之歌穆天子休於囬中大寒雨雪乃作歌三章曰黄竹歌客有歌郢中者為陽春白雪曲舞趙飛鷰宛轉如流風之廻雪孔至靴韋斌嘗大雪在廷者皆振裾更立斌不徙足雪甚㡬至靴亦不失恭抱戈李愬出文城柵令曰引而東六十里止㑹大雨雪天晦凛風偃旗裂膚馬皆縮慄士抱戈凍死于道十一二冐雪入州定州亂拜陳楚為節度使馳傳赴軍及郊無迎者左右勸無入楚曰定軍不來迎以試我今不入正墮計中乃冐雪行四十里夜入其州鵞鶩池夜半至懸弧城雪甚城旁皆鵞鶩愬令擊之以亂軍聲頒衣絮錢㣲大雨雪士寒凍先冬頒衣絮蘇定方追虜突厥賀魯傳蘇定方命嗣業婆閏趍邪羅斯川追虜任雅相提降兵踵後㑹大雪軍中請湏霽定方曰今雰晦風裂虜謂我不能師掩其不虞可也緩則逺矣盛夏取進明崇儼盛夏帝思雪崇儼坐頃取以進白云往隂山取之烏海之隂吐蕃遣大臣仲琮入朝帝召見對曰烏海之隂盛夏積雪禬神致雪薛延陀傳帝詔李勣營􅃋州經畧之部将薛萬徹率勁騎先收執馬者故延陀不能去斬首數千級獲馬萬五千大度設亡去萬徹追弗及殘卒奔漠北㑹雪甚衆皸踣死者十八始延陀能以術禬神致雪冀困勣師至是反自弊浙西大雪五行志天復三年三月浙西大雪平地三尺餘其氣如煙其味苦赤雪五行志貞元二十一年正月甲戌雨赤雪于京師詔無得掃五代明宗嵗嘗旱已而雪暴出坐庭中詔武徳司宫中無得掃雪曰天所以賜我也辭魏國憲穆公主下嫁王士平主恣横帝幽之門下客蔡南史獨孤中叔為主作團雪㪚雪辭状離曠意雪雰嚴晦回紇朔方先鋒白元光合回紇兵於靈臺㑹雪雰嚴晦吐蕃閉營撤偹乃縱擊之寢室無雪唐杜陽編懿宗時嘗大雪盈室而帝寝室上輙無分寸見者異之玉花攪空舒元輿序重雪終日玉花攪空舞下散地雪深風起蜀有道士陽狂俗呼為灰袋嘗大雪中衣布褐入青城山暮投蘭若求僧寄宿至夜半雪深風起僧慮其已死就視之去牀數尺氣蒸如炊掃雪迎賔唐開元遺事王元寶每大雪之際令僕夫自門巷掃雪為徑路以迎賔客具宴樂之㑹為煖寒燕山雪花大如席片片飛落軒轅臺李白北風行瀛州玉塵幽恠録巴卭人有橘園兩大橘如三斗盎剖開每橘有二老叟皆相對象戯一叟曰我輸瀛洲玉塵九斛朔雪亂邉花李白千里思從以萬玉妃白帝盛羽衛鬖髿振裳衣白霓先啟塗従以萬玉妃韓愈辛夘年雪滕六降雪蕭至忠景雲元年為晉州刺史将以臈日出獵前一日有薪者樵于霍山時山月甚明見禽獸百許祈於元𡨕使者使者曰祈東谷嚴四嚴四曰若令滕六降雪巽二起風即不復獵矣薪者廻未明風雪暴至剪水作花陸暢雪詩仙人寧底巧剪水作花飛本事集瑶域粉野李華含元殿賦元㝠戒寒海神飛雪瑶域粉野琪樹森列玉宇璇階雲門露闕雪花一尺圍河南二月末雪花一尺圍崩騰相排拶龍鳯交横飛韓文甃珪疊璐舒元輿序曰宫中有崇闕洪觀如甃珪疉璐出空横虚書在星子書生季勝嘗㳺洪州西山與處士盧齊軰雪夜共飲座中一人偶言雪勢如此固不可出門勝曰欲有何詣吾當往之曰吾有書在星子可為取之乎勝曰可乃出門去飲未㪚携書至星子距西山凡三百里江淮異人録髙堂暮冬雪壮哉舊瘴無復似塵埃崖沉谷没白皚皚江石决裂青風摧杜甫朔風落昊天従風渡溟渤海樹成陽春江沙皓明月興從剡溪起思繞梁山發李白淮海對雪以雪為銀耿先生大中召之官嘗大雪戯之曰先生能以雪為銀乎曰可乃取雪自投於熾炭中灰埃芒起徐以炭周覆之過食頃曰可矣乃取出赫然若銅置之於地及冷爛然為鋋銀及視其下若垂酥滴乳之状出江表志江雪薄為霧杜詩犬吠越犬吠雪金羊有積雪乆不消掘地得金羊玉馬髙三尺許廣異記妍光屬瑶階亂緒陵新節韋應物對雪風落吳江雪紛紛入酒杯李白對酒醉題急雪舞廻風對雪閉門長安三日雪推書幞筆歌慷慨韓愈送盤谷子詩田家最恐懼麥倒桑枝折杜甫留花門雪殘鳷鵲亦多時晚出左掖白雪飛花亂人目李白去年白帝雪在山今年白帝雪在地凍埋蛟龍南浦縮寒刮肌膚北風利杜甫苦寒東作可期南畝有望韓愈賀雪實豐穰之嘉瑞消疫癘於新年同上雪水溉田西域碎葉三月訖九月未嘗雨以雪水溉田瑶臺雪花數千㸃片片吹落春風香李白歌季春雨雪乃災也風五災附白巽為風風以㪚之風從虎易聖時風若休徵景風爾雅四氣和為通正謂之景風星有好風箕星好風月離于箕風必揚沙春秋緯習習谷風且霾且暴其凉其喈終風且曀棘心凱風自南吹彼棘心有隧大風觱發栗烈必變迅雷風烈必變扶揺荘子鵬搏扶揺而上九萬里噫氣荘子云大塊噫氣其名為風泠然列子御風泠然而善乗風列子亥商氏友伯髙子二人之道乗風而歸飛廉吕氏春秋云風伯名箕星風俗通云風師轉蕙泛蘭楚辭云光風轉蕙泛崇蘭地籟荘子汝聞天籟未聞地籟注風吹萬物太平之代風不鳴條春風羊角風立春之日東風解凍東風扇㣲和立春條風至春分明庶風至和風光風夏風凱風小暑日温風至五月黄雀風至立夏清明風至夏至景風至炎風秋風立秋日凉風至秋分閶闔風至楚辭曰嫋嫋兮秋風洞庭波起兮木葉下冬風廣莫風北風其凉朔風颯然而至快哉此風八風八節之風穆若清風奮之以風雨春無淒風君子之徳風小人之徳草草上之風必偃異色大庭氏之王天下五風並異色琴歌舜作五絃之琴以歌南風曰南風之薰兮解吾民之愠兮虎嘯淮南子曰虎嘯而谷風生鳶鳴禮記曰前有塵埃則戴鳴鳶鳶鳴則風生易水燕丹送荆軻易水之上軻歌曰風蕭蕭兮易水寒辭漢武作秋風辭曰秋風起兮白雲飛大王宋玉風賦序曰楚王㳺蘭臺之宫風颯然而下乃披襟而當之曰此風寡人與庶人共之耶宋玉奏曰此獨大王之䧺風少女管輅傳曰時大旱輅曰今夕當雨樹上已有少女風矣而湏㬰雨至鶂退六鷁退飛過宋都風也鵬摶見上扇袁宏為東郡謝安授以扇宏曰即當奉揚仁風慰彼黎庶鵲巢淮南子云鳥鵲識嵗之多風去喬木而巢扶枝馬古詩胡馬嘶北風瓢許由以瓢掛樹風吹瓢有聲由以為煩取而捐之穴荘子空穴来風青蘋風起於青蘋之末舞於松柏之下庶人之風掘堁揚塵塕然而起動沙堁吹死灰於窮巷之間入琴琴曲有風入松摧木木秀於林風必摧之驚飈拂野林無静柯䧺雌大王之䧺風庶人之雌風風其吹汝漂汝發兮匪風發兮淒其以風大風漢髙祖過沛而歌磔爾雅祭風曰磔潤之以風雨易相風烏郭緣生述征記云長安宫南有相風銅烏遇風乃動翣脯帝王世紀曰堯時㕑中有白肉脯薄如翣形鼓則風生使食物寒而不臭名曰翣脯􅄙愠阜財詩曰南風之薰兮可以觧吾民之愠兮南風之時兮可以阜吾民之財兮占神仙傳曰老子将去關而出以升崑崙關令尹喜占風逆知當有神人來過乃掃道以待老子老子知喜命應道乃停車關下具以長生之術授喜繕宫室完邉城不周風至誅有罪斷大刑廣莫風至五經通義云北風其凉其喈災飄風不終朝老蒙恒風若風不越而殺暴風來格大風有隧貪人敗類折木發屋揚沙項王圍漢王三匝於是風從西北來折木發屋揚沙楚軍大亂漢王乃領得與數十騎遁去禾偃木㧞書開金縢曰天彰周公之徳海鳥避爰居止於魯東門展禽曰其海有災乎廣川之髙鳥獸恒知避其災是嵗海果大風故避之淜滂風賦淜匹氷反熛怒並風擊物貌蹷石蹷動伐木風災數起月令國多暴風月令疾風博物志云太公為灌壇令文王夢婦人哭當道問之曰吾是太山之神女嫁為西海君婦吾行必有疾風暴雨灌壇當吾道不敢以疾風暴雨過夢覺白太公三日果有疾風暴雨而過孔風㧞樹壊人居廬舎吴兢為太子左庶子十四年六月大風詔羣臣陳得失兢上疏曰乃六月戊午大風㧞樹壊人居廬舍傳曰政悖徳隠厥風發屋壊木風隂類大臣之象恐陛下左右有奸臣擅權懐謀上之心㧞木郭子儀史思明自魏來戰鄴南子儀督後軍未及戰㑹大風㧞木遂晦跬歩不能相物色於是而王師南潰巨木飛舞馮宏鐸天復二年大風發屋巨木飛舞州人駭曰州且易主大将馮暉勸宏鐸南嚮宣告于庭大風㧞樹劉鄴傳豆盧琢者為翰林與崔沆皆拜同中書門下平章事是日宣告于庭大風雷雨㧞樹未㡬及禍道大陂朱宣傳賀瓌以竒兵擊全忠輜重不及戰鉅野東瓌大敗見擒師無孑餘軍道大陂風大起全忠曰豈殺人有遺耶乃捜軍中復斬數千人風亦止天有四時五行寒暑迭居怒為風孫思邈風礫晝㝠裴行儉冊送波斯王且為安撫使徑莫賀延磧風礫晝㝠導者迷路揚沙蔽天五代賀瓌梁兵急追之降其卒三千餘人是日大風揚沙蔽天太祖曰天怒我殺人少耶即盡殺降卒三千人而縶瓌貪狼風前蜀王衍咸康元年十月幸秦州至梓潼大風發屋㧞木太史曰此貪狼風也當有敗軍殺将者衍不省衍至綿谷而唐師入其境衍懼遽還唐師所至州縣皆迎降萬籟真笙竽杜詩占風鐸唐開元遺事岐王宫於竹林内懸碎玉片每夜聞相觸之聲即知有風號占風鐸百家灣風徐温嘗自迎鑾還至百家灣暴風起舟人相顧失色温乃袒裼以帛繫璟首顧謂妾御曰吾善㳺倘溺不暇相救幸保此子言訖風浪漸息九國志暴風自西北元和十二年春青州一夕暴風自西北天地晦𡨕空中有若旌旗状屋瓦上如蹂躒聲出五行志河噴石鳴咸通六年十一月己夘晦潼關夜中暴風山如吼雷河噴石鳴羣鳥亂飛重關傾側出五行志裂風駕地震杜牧集李白詩掩苒衆草紛紅駭緑栁宗元袁家渇記毎風自四山而下振動大木掩苒衆草紛紅駭緑蓊葧香氣衝濤旋瀬退貯谿谷揺颺葳􅅋與時推移相風旌開元遺事五王宫中各於庭立長竿掛五色旌於竿頭旌之四垂綴以金鈴有聲即使視旌之所向可以知四方風候林風天籟劉禹錫武陵北亭記風嫋嫋而先路文粹楊炯少室少姨廟碑鼓之以南箕風嫋嫋而先路經清觸濁栁文風出洞窟流離百物經清觸濁呼竅召穴與夫草木之儷偶紛羅雕葩剡芒臭朽馨香采色之青碧白黄皆寓也巽二起風見雪門麥信國史補江淮舡泝流而上待東北風謂之信風七八月有上信三月有烏信五月有麥信避風臺樂史楊妃外傳明皇覽漢成帝傳以趙飛鷰身輕置七寳避風臺謂妃子曰爾則任吹多少妃子對曰霓裳一曲足以髙掩前世韓愈訟風伯雲屏屏兮吹使醨之氣将交兮吹使離之鑠之使氣不得化寒之使雲不得施震風薄怒唐史裴劉贊震風薄怒萬空不約而號勝風酉陽雜爼山人包超明皇令隨哥舒翰西征每陣常得勝風楚王風杜甫詩斷續楚王風羊角輕風旋