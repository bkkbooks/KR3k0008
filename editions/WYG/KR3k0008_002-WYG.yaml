body:
  text: 白孔六帖卷二唐白居易原夲宋孔傳續撰律吕一雲二雨三雪四風五霞六霰七雷八雹九虹蜺十天河十一霜十二露十三律吕一白萬事根本望敵知吉凶史記六律萬事根夲其於兵械尤重故能望敵知吉凶聞聲效勝負百王不易之道娶妻生子黄鍾初九律之首陽之變也因而六之以九為法得林鍾注以六乗黄鍾之九得六十四也初六吕之首隂之變也皆參天兩地之法也注三三而九二三而六參兩之義也上生六而倍之下生六而損之皆以九為法九六隂陽夫婦子母之道也注異類為子母謂黄鍾生林鍾也同類為夫婦謂黄鍾以大吕為妻也律娶妻注謂黄鍾生林鍾也而吕生子注謂林鍾生太簇也天地之情也統氣類物陽六為律以統氣類物振陽宣氣隂六為吕以振陽宣氣六律黄鍾太簇姑洗蕤賔夷則無射六吕林鍾南吕應鍾大吕夾鍾仲吕嶰谷之竹黄帝使伶倫自大夏之西崑崙之東取竹之嶰谷生其竅厚均者㫁兩節間而吹之為黄鍾之宫律之最長者制十二筩以聽鳳凰之鳴其䧺鳴六雌鳴六比黄鍾之宫而皆可以生之是為律本注比合也可以生之謂上下初生也比音頻寐反予欲聞六律五聲八音在治忽以出納五言汝聽書和律吕也辨六氣和八音玉律竹律候氣之法為室三重户閉塗釁周宻布緹縵室中以木為案每律各如之内卑外髙従其方位加律其上以葭管灰實其端案厯而候之氣至者灰去其為氣所動者其灰㪚其為物所動者其灰聚殿中候用玉律十二靈臺用竹律吹灰楊泉記云𢎞農宜陽縣金門山竹為管河内葭莩為灰或云以律著通十二辰埋之上與地平以灰實律中以羅縠覆律氣至則灰動縠亦動為和大動君弱臣彊不動君嚴暴之應忽㣲漢書云黄鍾為宫則太簇姑洗林鍾南吕皆以正聲應無有忽㣲忽㣲細於髮者謂正聲無殘分吹律生氣燕有寒谷不生黍稷鄒衍吹律於其間煖氣乃至草木發生相生晉書周於十二辰在六律為陽當位自得而下生隂在六吕則得其所行而上生陽於推筭之術無重上生下之法所謂律娶妻吕生子隂陽升降律之夲經京房法晉書京房知六律五音之數六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於仲吕而十二律畢矣仲吕上生執始執始下生去㓕上下相生終於南吕而六十律畢矣夫十二律之變至於六十猶八卦之變為六十四也孔製十二和樂志初祖孝孫已定樂乃曰大樂與天地同和者也製十二和以法天之成數號大唐雅樂一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰夀和七曰太和八曰舒和九曰昭和十曰休和十一曰正和十二曰承和用於郊廟朝廷以和神人依京房為律王朴顯徳六年詔朴考正雅樂朴以謂十二律管互吹難得其真乃依京房為律凖以九尺之弦十二依管長短寸分設柱用七聲為均樂成而和以十二月旋相為六十聲武徳九年詔太常少卿祖孝孫等定樂孝孫以八十四調始黄鍾終南吕迭為綱紀黄鍾之律管長九寸王於中宫土半之四寸五分與清宫合五音之首也故一宫二商三角四徴五羽以十二月旋相為六十聲樂志綜和文粹張説上官昭容集序七聲無主律吕綜其和懸水淙口宫商不能合律吕不能生此全聲也元結訂司樂氏律本文粹李華御史中丞壁記律吕本黄鍾之宫循環文粹李華雜詩黄鍾叩元音律吕更循環六律變窮谷之寒劉禹錫謝竇相啟律者樂之本栁宗元律也者樂之本也而氣達乎物凡音之起者本焉律中鬼神驚杜甫詩調律吕之氣候栁宗元文播塤箎之音韻調律吕之氣候協律郎掌和六律六吕以辨四時之氣八風五音之節陽為六律所以統氣類物仲冬為黄鍾孟春為太簇季春為姑洗仲夏為蕤賔孟秋為夷則季秋為無射隂為六吕所以振陽宣氣季冬為大吕仲春為夾鍾孟夏為仲吕季夏為林鍾仲秋為南吕孟冬為應鍾凡律管之數起于九以九相乗八十一以為宫三分去一五十四以為徴三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽還相為宫以生其氣焉唐六典先王通於倫理以氣候之管為樂聲之均吹子為黄鍾丑為大吕寅為太簇夘為夾鍾辰為姑洗巳為仲吕午為蕤賔未為林鍾申為夷則酉為南吕戌為無射亥為應鍾陽管有六為律者謂黄鍾太簇姑洗蕤賔夷則無射此六者為陽月之管謂之律律者法也言陽氣施生各有其法又律者師也所以導陽氣候之通達隂管有六為吕者謂大吕應鍾南吕林鍾仲吕夾鍾此六者隂月之管謂之為吕總隂陽之聲故為十二調調各文之以五聲播之以八音乃成為樂故有十二懸之樂焉出唐六典凡為樂器以十二律者為之數度以十有二聲為之齊量同上雲二慶瑞附白雲從龍山川出雲天降時雨宻雲不雨黄帝雲紀故為雲師而雲名不待族廣成謂黄帝自爾治天下雲氣不待族而雨必書雲物分至啟閉雲中君漢志巫言祠雲中君霏霏承宇楚辭薈蔚朝隮詩薈兮蔚兮南山朝隮薈蔚雲興貌屏翳雲師名油然作雲沛然下雨英英白雲露彼菅茅淒淒祁祁詩有揜淒淒興雨祁祁垂天大鵬翼若垂天之雲觸石公羊曰雲觸石而出膚寸而合不崇朝而徧天下者唯泰山爾潤礎淮南子曰山雲蒸柱楚潤出蒼梧歸藏曰有白雲出自蒼梧歸于大梁至帝鄉莊子曰乗彼白雲至于帝鄉陽臺朝雲竒峰夏雲多竒峰赤鳥楚有雲如衆赤鳥夾日以飛三日太史曰其當王身乎飛揚髙祖歌大風起兮雲飛揚五雲周禮保章氏以五雲之物辨吉凶水旱豐荒之祲象注云五雲色有五以别水旱豐凶也同雲上天同雲雨雪紛紛干雲文選干雲霧而上達状亭亭以迢迢無心而出岫不興文選朝雲不興而黄潦獨臻隂陽聚春秋元命苞山川氣説文云雲山川氣也􅀙雨保章氏周官見上鄭司農註云二分二至觀雲氣青為蟲白為䘮赤為兵荒黑為水黄為豐望堯望之如雲瑞雲紀事黄帝受命有雲瑞故以雲紀事矞雲瑞圖矞雲慶雲也其状外赤内黄金枝玉葉黄帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因之作華盖覆鼎汾隂寳鼎天子祀之黄雲覆焉慶雲卿雲瑞雲景雲干吕青雲干吕連月不㪚若煙非煙郁郁紛紛史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲五色呈祥氤氲泱漭徳動天心瑞開雲物起封中漢武封泰山白雲起封中青色魏書曰文帝生有雲氣青色如車葢其上終日望氣者以為貴之證非人臣之氣孔五色雲起中宗庶人韋氏禁中謬傳有五色雲起后衣笥帝圖以示諸朝因大赦天下雲状如樹擊之勝帝竒其對馮智戴傳白雲孤飛謂左右曰吾親舍其下狄仁傑天瑞鄭洎子仁規仁表皆豪爽有文嘗以門閥文章自髙曰天瑞有五色雲人瑞有鄭仁表活活韓愈别知賦雲活活其常浮龍噓氣成雲雲固弗靈於龍也然龍乗是氣茫洋窮乎𤣥間然龍弗得雲則無以神其靈矣韓文賊瑞朱㴞武俊等三讓乃就位是日三叛軍上有雲氣頗異燧望笑曰是雲無知乃為賊瑞耶景雲見樂志髙宗即位景雲見張文收采古議為景雲歌白衣蒼狗杜甫詩天上浮雲似白衣湏􅁷改變如蒼狗雲氣甚佳五代楚馬殷傳吕師周謂其禆将綦母章曰吾與楚人為敵境吾常望其營上雲氣甚佳未易敗也抱日浮空韓愈賀慶雲表抱日増麗浮空不收雲氣多夀酉陽雜爼五色雜錯唐新語拾遺崔希喬轉馮翊令有雲如盖當其㕔事前湏􅁷五色雜錯徧於州郭嵯峨韋應物夏景園廬詩夏雲已嵯峨五采五色光華不可徧觀非雲非煙容状詎能詳述韓愈賀慶雲表晴雲如擘絮韓詩雲大如箕大順二年六月我師與宣州兵敗孫儒於宣城初行宻軍師張頗善占筭前一日謂行宻曰明日當水亭午可獲孫儒時畏日曦赫儒兵方盛人皆哂其言及詰旦比有雲大如箕漸次瀰漫俄而澍雨大水暴作儒令其衆曰城中以其大水必将擊我諸營皆當自固未㡬水深丈餘城中知其號令乃逕出兵以擊儒營他營皆不救因獲儒而至皆如軍師之言吴越備史勃怒衝湧擊石薄木栁宗元復吴子松説子不見夫雲之始作乎勃怒衝湧擊石薄木而肆乎空中偃然為人拳然為禽敷舒為林木嵑􅠣為宫室誰其搏而斵之者潤益萬物元結補樂歌雲之出潤益萬物抛雲車國史補暴風之候有抛雲車濃雲鬱興唐史張説論文濃雲鬱興震雷俱發藹藹春空雲韓愈醉贈張籍落落出岫雲杜詩含姿韓愈詩宿雲尚含姿洩雲無定姿杜詩黄雲抱日酉陽雜爼代宗即位慶雲見黄雲抱日羣逰杜甫詩孤雲亦羣逰神物有所歸芒碭雲一去遣懐芒碭雲一去雁鶩空相呼疉嶺宿霾雲同上雲近蓬萊常五色同上出左掖絶壁過雲開錦繡同上雲在髙山空卷舒李白詩浮雲夲無意吹落章華臺贈别雲徹風恬裴行儉為安撫大食使徑莫賀延磧風礫晝𡨕行儉止營致祭俄而雲徹風恬五朶雲韋陟自謂所書陟字若五朶雲號郇公五雲體雨三白雨以潤之遇雨若濡雷雨作􅄙雨我公田遂及我私天降時雨山川出雲月離于畢俾滂沱矣滂沱霡霂益之以霡霂既優既渥既霑既足生我百穀注霡霂小雨貌三日凡雨三日以往為霖九旬十夜朝隮于西崇朝其雨不節禮云風雨不節則飢天作淫雨害於粢盛膏雨百穀仰之時雨不降膏澤多豐年淫雨旱降霈然下雨宻雨如㪚絲霖雨若嵗大旱用汝作霖雨祁祁甘雨膏之芃芃黍苗隂雨膏之驟雨不終日零雨其濛如晦隂雨如晦五政管子曰五政順時春兩方來一旬太平時五日一風十日一雨休應而時若休徵曰肅時雨若咎徵曰狂恒雨若将降時雨将降秋無苦雨霑服諸侯朝天子雨霑服失容則止商羊鼓舞家語曰天将大雨商羊鼓舞墊巾郭林宗雨中行墊其角巾時人效之遂為折角巾鸛鳴于垤言将雨也救成都火欒巴噀酒為雨救成都火災少女風管輅曰天将雨則樹上有少女風降不破塊鹽鐵論周公之時風不鳴條雨不破塊旬而一雨雨則必至夜陽臺巫山神女暮為行雨注必隨車漢百里嵩為徐州刺史境旱行部傳車所經甘雨輙降假蓋孔子将行雨無盖不假盖於子夏䕶其短也伐殷捜神記武王伐殷至河上雨甚雷疾討邢傳曰衛大旱討邢師興而雨洗兵武王伐紂大雨洗兵流麥髙鳯讀書不覺大雨至盡流其麥蟻封穴易占曰蟻封穴戸大雨将至鸛巢苦雨詩曰水鸛巢曾甍山雲潤柱礎鷰飛湘川記零陵有石鷰遇雨則飛如生鷰蜧躍淮南子曰黑蜧神虬潜泉中而居天将雨則躍逃雨文子曰若與俗遽走猶逃雨之無面不濡濡濕也沮澤之龍蜀都賦潜龍蟠於沮澤應鳴鼓而興雨近壬子日管輅過清河見太守曰天旱輅曰今夕當雨傳曰近壬子日直滿星中已有生氣丁夘食頃必至又窘隂雨雨汁雨雪雜下雨行我将飲酒而已雨行雲不待族而雨廣成子謂黄帝濯枝風雨記曰六月大雨名倒井晉傅元詩愁霖文選愁霖貫秋序𤣥𡨕風俗通謂雨師屏翳為雨師亦曰呼號赤松子神農時雨師列仙傳云土龍淮南子云土龍致雨許慎注云湯遭旱作土龍以象雲從龍焚身請謝承後漢書戴封升平為西華令大旱請雨無獲乃積薪坐其上以自焚火起而大雨至逺近嘆伏乃遷中山相漂粟鄒子曰朱買臣苦修學業不休其家暴粟令臣守之不覺雨流粟孔知雨𤾉宗室守禮岐王常奏守禮知雨𤾉帝問故荅曰臣無他當天后時太子被罪臣幽宫中嵗被敕杖凡三四累創痕膚前雨沈懣霽則佳以此知之旱襘解必雨段文昌帥荆南州或旱襘觧必雨或乆雨遇出逰必霽民為語曰旱不苦禱而雨雨不愁公出逰澍澤劉仁軌貞觀十四年校獵同州秋斂未訖仁軌諌曰今兹澍澤霑足百穀熾茂霖雨為害咎在主司舊志神龍元年洛水漲唐休璟