body:
  text: 白孔六帖卷三十八唐白居易原本宋孔傳續撰宮殿一禁門二禁衛三馳道四苑囿五登遐六君臣七社稷八君臣相信九念良臣十君臣問疾十一舊君十二制誥十三宮殿一行宮落成制造附奢焚燒儉白其始也取諸大壯之象其終也落以斯干之詩壯王室廓帝居順晦明而朝啓夕閉易寒暑而夏凊冬温壯麗之規飛動之勢雲構金鋪虹亘梁虬負擔美哉輪焉奐焉禮上棟下宇以待風雨易大厦耽耽欒櫨鷰雀相賀淮南子曰大厦成而鷰雀相賀豐約之折衷杏梁藻梲朱甍青甃實實廣大也枚枚礱密也祕宇宸居彤軒紫柱文榱華梁斯飛之制禮以大為貴者宫室之量也有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺承明殿漢殿名靈光魯殿厯金門上玉堂解嘲重轑音老今館舍一邊虛加木為兩下便殿離宫三十六所離宫别館三十六所選宣室漢上幸宣室在未央宫中盖在前殿之側輦道相屬蒲宮在前葺蒲為殿執戈在前為衛左傳楚公子行宮周禮宮車轅門帷宮旌門注謂主行止宿險阻之處備非常次車以為藩則御車以表門帷宫則設旌門謂王晝止若食具帷宫則樹旌以表門也黄帝有合宫堯有二宮管子湯受命於鑣宮墨子周有蒿宮秦有蘄年宮漢有未央宮沛宮林光宮甘泉宮萬歳池陽壽宮建章太一思子宜春宮後漢有南宮胡宮桃宮魏有鄴宮吳有太初宮此諸宮皆範金合土為之以為貴也紫微𤣥武並宮名三輔記曰京兆有步髙宮長安有望逺宮望仙宮元封三年起集靈宮漢武巡省置曜華宮梁孝王作養德宮趙王如意宮號武帝置宮張羽旗以禮神幽房昭臺並宮名長安有馺娑宮逍遥宮慕容涵造逃夏宮春申君造祈年延壽宮長安有層城殿在長安華林園中朱雀黄龍並殿名在洛陽洛陽有嘉德徽音殿又有九華百福殿景福延休並殿名制造時惟農隙民有子來定之方中作為楚宮揆之以日作為楚室美衛文公得其時制人恱之也層構室瑰材崇制規遵王度經始勿亟周室百堵並作漢宮千門洞開將侔大壯之象必考定星之期雖欲克壯宸居亦可式遵時制萬載不傾蹔勞永逸晝參中景夜考極星奢詭制建章宮漢制建章宮千門萬戸丹楹刻桷傳曰魯莊公丹楹刻桷御孫諌曰侈惡之大也未央壯麗漢書蕭何修未央宮上怒其壯麗何曰天子以四海為家非壯麗何以重威且無命後世有以加也窮泰極侈文選跨周法木衣綈錦土被朱紫文選使鬼為之則勞神矣使人為之則苦矣史記由余謂秦穆公曰不度不臧為之者勞居之者逸極棟宇之規陋百王之制峻宇雕牆大禹誡雖表萬乗之尊恐勞兆人之力秦始阿房殷紂瓊室夏桀瑶臺土無舊質木失本形儉卑宮室夏禹闔閭室不崇壇宫室卑庳無觀臺榭晉文茅茨不翦土階三尺唐堯儉而不陋匪雕匪刻去泰去甚木無雕鎪足以避燥濕不傷財不勞人雖儉德而則然在儀刑而未可既未折中是為偪下落成楚子成章華之臺願與諸侯落之宫室成祭之為落棟宇厥初取諸大壯之象宫室云畢落以斯干之詩禮廟成則釁之殺牲釁之路寢成則考之不釁考之謂設盛食以樂之焚燒栢梁既災越無陳方建章是經用厭火祥文選東京賦靈光巋然獨存呉宫火焚鷰巢魯司鐸火左傳司鐸宫名濟濡帷幕鬱攸從之蒙葺公屋以濡物蒙屋傷人則止財可為也季桓子孔鑿池起山務極侈竇璡遷將作大匠詔修洛陽宫鑿池起山務極侈浮費不勝筭太宗怒詔毁之飛山宮魏徵帝作飛山宮徵上疏曰毁廣殿安處卑宮德之上也建離宮清暑閻立德太宗幸洛陽詔立德按爽塏建離宫清暑乃度地西山號廣成宮宮成煩懊不可居帝廢之翠微玉華又營翠微玉華二宮馬周曰臣伏見大安宮在宮城右墻宇門闕方紫極為卑小東宮皇太子居之而在内大安中至尊居之反在外太上皇雖志清儉愛惜人力陛下不敢違而蕃夷朝見四方觀聽有不足焉願營雉堞門務從髙顯以稱萬方之望則大孝昭矣修復洛陽宮戴胄帝將修復洛陽宮胄上疏諌宿羽髙山上陽韋𢎞機初作宿羽髙山上陽等宫徙洛中橋於長夏門廢利涉橋人便之天子乃登洛北絶岸延眺良久歎其美詔即其地營宮本傳侍宴披香殿蘇世長侍宴披香殿酒酣進曰此殿煬帝作邪何雕麗底此曰郷好諫似直然詐也豈不知此殿朕所營曰臣但見傾宮鹿臺非受命聖人所為者陛下武功舊第纔蔽風雨時以為足今天下厭隋之侈以歸有道宜刈奢淫復朴素今即其宫加飾焉欲易其亂得乎新唐本傳雍和殿上敦睦九族諸侯王為盡友愛既即位於十六院起雍和殿上每幸與諸侯王鞠擊合樂錫賚有差進士司馬樞為雍和殿賦措詞不工志一時之實東觀奏記宮殿風微燕雀髙杜甫早朝發卒治張𤣥素貞觀四年詔發卒治洛陽宫乾元殿𤣥素上書奉天宮韓瑗傳帝造奉天宫御史李善感上疏極言時人喜之造蓬萊上陽合壁等宫張文瓘時髙宗造蓬萊上陽合壁等宮文瓘諫曰王者養民逸則富以康勞則怨以叛秦漢廣事四夷造宮室至二世土崩武帝末年戸口减半夫制治於未亂保邦於未危民罔常懷懷于有仁臣願撫之無使勞而生怨集賢殿張說帝召說與禮官學士置酒集仙殿曰朕今與賢者樂于此遂為集賢殿宫觀臺榭盡居之矣魏徵曰今宫觀臺榭盡居之矣興復殿寢裁制有宜王徽遷右僕射大亂之後宮觀焚殘園陵皆發掘鞠為丘莽乗輿未有東意詔徽充大明宫留守京畿安撫制置修奉使徽外調兵食内撫綏流亡踰年稍稍完聚興復殿寢裁制有宜即上表請帝東還始皇興阿房而秦禍速文帝罷露臺而漢祚永薛收秦王入觀隋宫室且嘆煬帝無道殫人力以事奢侈牧進曰峻宇雕墻殷辛以亡土階茅茨唐堯以昌始皇興阿房而秦禍速文帝罷露臺而漢祚永後主曽不是察奢虐是矜死一夫之手為後世笑何此能保哉王重其言足庇風雨戴胄曰今宫殿足庇風雨容羽衛數年後成猶不謂晚何憚而自生勞擾邪帝覽奏罷役乾陽畢功隋人解體𤣥素諫曰昔阿房成秦人散章華就楚衆離乾陽畢功隋人解體今民力未及隋日而役殘創之人襲亡國弊臣恐陛下之過甚於煬帝帝曰卿謂我不如煬帝何如桀紂對曰若此殿卒興同歸於亂即罷役廣温泉為華清宮房琯𤣥宗有逸志數巡幸廣温泉為華清宫環宫所置百司區署以琯資機筭詔摠經度驪山䟽巖剔藪為天子遊觀重城深宮燕私而居元結時議曰今天子重城深宮燕私而居大為殿宇魏少游肅宗幸靈武杜鴻漸等奉迎而留少游繕治宫室少游大為殿宇幄帟皆象宫闕諸王公主悉有次舍供擬窮水陸又有千餘騎鎧幟光鮮振旅以入帝見宫殿不恱曰我至此欲就大事安用是為稍命去之浴堂殿棟壓裴延齡它日帝謂延齡曰朕所居浴堂殿棟將壓念易之未能也餘見錢門營三陽宫於嵩山興泰宫於萬壽山武三思后春秋髙厭居宫中三思欲因此市權誘脅羣不肖即建營三陽宫於嵩山興泰宫於萬壽山請太后歳臨幸已與二張扈侍撤毁層觀廣殿張𤣥素曰天下不可以力勝當務儉約陛下向平東都曾觀廣殿皆撤毁之天下一口頌歌作離宫游獵五代南漢劉晟遣巨艦指揮使暨彦贇以兵入海掠商人金帛作離宫游獵故時劉氏有南宫大明昌華甘泉玩華秀華玉清太微諸宫凡數百不可悉紀複道䆳廊西都賦推基峻砌同上層簷廣厦飛楹走拱並李白賦曼宇疎楹通軒竝廡並含元賦丹墀文陛之内杜牧制倒影入於朱戸文粹李華含元殿賦天光流於紫庭倒影入於朱户又階瑩氷級瓦敷鱗差又隣斗極之光輝邇天漢之波瀾又雲薄萬拱風交四榮飛觀齊白日韋蘇州擬古詩漢宮南比對飛觀齊白日文檉綺栢日就殿以文檉綺栢為材景龍文館記殿瓦鴛鴦拆秋日送薛明府杜甫新宫李賀能文善樂府卒于太常年二十四夫人鄭氏一夕夢賀曰上帝遷都於月圃創新宮故召與文士數輩共為新宮記又作凝處殿使集纂樂府宣室志帝果有宫室之玩李賀小傳天蒼蒼而髙也上果有帝耶帝果有園圃宫室觀閣之玩耶延英奏事唐制坐宣政殿宰臣立侍紫宸殿奏事畢坐延英奏事自前殿喚仗入便殿為入閤唐末五代初御前殿為閤逭暑宫后造逭暑宫說上疏曰宫距洛城百六十里奈何去宗廟之上都安山谷之僻處是猶倒持劒㦸示人以柄臣竊為勸陛下作此者豈正人邪御苑東西外無禁垣内有榛叢猛獸所伏暴慝所憑狂夫驚犯左右豈不殆哉願為萬姓持重及時旋軫深居上京罷不急之役省無用之費羣生莫不幸甚后不省後貶欽州張説傳雖露坐庸何苦張𤣥素上書臣見隋家造殿伐木於豫章二千人挽一材以鐵為轂行不數里輙壞别數百人齎轂自隨終日行不三十里一材之費以數十萬工揆其餘可知已帝顧𤣥齡曰今𤣥素言如此雖露坐庸何苦玉堂珠殿五代劉襲好奢侈悉聚南海珍寳以為玉堂珠殿作九龍殿以八龍繞柱自言身一龍也五代馬希範玉宇琁階雲門露闕李華含元殿賦攀星納月玉女攀星於網戸金娥納月於琁題李白凄凉大同殿杜甫詩自古帝王宅城闕閉黄埃李白對酒禁門二白周禮掌舍掌主㑹同之舍設車宫轅門王行險阻處次車蕃御車以轅表門為壇壝宮棘門王止平地築壇起土壝比為宫轅門以㦸為門帷宮旌門王食息張帷為宫以旌表門無宫供人門謂王行有逢遇若遊觀陳列周衛則立長大人為門閽寺掌守王宫中門之禁王有五門司門掌授管鍵以啓閉國門幾其出入監門由闑右大夫士出入君門由闑右也乃立臯門臯門有伉乃立應門應門將將注王郭門曰臯門應門正門也太子梁王至司馬門不下車張釋之為宫車令追止劾不敬通籍漢武令從官給事大父母得通籍司馬門失闌王嘉以侍郎射䇿甲科為郎坐戸殿門失闌免注云戸止也時有闌入而嘉失之不執也厯金門上玉堂有日矣揚雄解嘲夜開宫門漢石顯君房欲取信於上嘗使諸宫先奏恐漏盡宫門閉請詔吏開門上許之顯故投夜還稱詔開門入後果有上書言顯專命矯制夜開門天子笑以書示顯顯因謂曰陛下過任小臣羣下無不嫉妬事類此非一後有譛顯者不信也曹植乗車馬行馳道開司馬門出太祖怒坐公車令死由是重諸侯科禁孔宣政牙闔不啓張仲方拜常侍李訓之變大臣或誅或繫翌日羣臣謁宣政牙闔不啓羣臣錯立朝堂無史卒賛候久乃半扉啓使者傳召仲方曰有詔可京兆尹然後門闢唤仗重門内注唐文粹李華含元殿賦重門内注複道潜移居有重門擊柝之衛李嶠上書曰元首之尊居有重門擊柝之衛出有清警戒道之禁所以備非常不可逕入韓愈復志賦君之門不可逕而入兮一門百夫守豈識天子居九重鬱沉沉一門百夫守無籍不可尋晶光蕩相射旗㦸翩以森孟先生詩不得横入禮興門李德裕獻替録德裕為相初見事日令御史臺牓禮興門朝官有公事見宰相皆由牒臺待朝退後從龍尾道出不得入禮興門於是禁者始靜雞跖集開則先外後内闔則先内後外城門郎掌京城皇城宫殿諸門開闔之節奉管鑰而出納之開則先外後内闔則先内後外啓閉有時不以時則詣閤覆奏唐百官志天門沉沉邈不敢詆牛僧孺䇿禁衛三警衛衛主守闌入門籍捜索附行馬白祈父予王之爪牙胡轉予于恤靡所止居詩環列之尹楚穆王使潘崇掌環列之尹宫衛之官列兵而環王宫也環衛警衛申當警備注申勑官中令備也楚公子圍設服離衛注設君服離衛陳守衛也祈父司馬非其人故詩刺之警衛周禮宫正以時比宫府次舍注舍諸居守舍以諸仗直廬也夕繫􅈀而比授八次次主宿衛廬也書三巡夜三鼛鼛擊守鼓古刀反漢衛尉掌宮門屯兵宫衛士於垣下為區廬區廬今伏宿屋也出入周衛之中厭承明之廬漢武賜嚴助書周廬千列衛尉七兵設在蘭錡文選扞撮行夜夜士警晝巡夜宿衛黒衣之缺史趙左師觸讋言於太后曰臣賤息舒祺最少願補黒衣之缺以衛王宫幸得宿衛十有餘年時從出遊遊於後園子虚賦誰何何問也禮主守周禮司門掌授管鍵以啓閉國門抱闗侯嬴隱於夷門為抱闗者為卒梅福變姓名隱吳市門限以外内不可踰也察其出入何莫由斯閽人掌守王之宫門以時客閉閽者禮曰守門之賤者也古者不使刑人守門夜不納帝後漢郅惲為上東門侯帝獵夜還惲拒門不開令從者見面於門惲曰火明遼逺不奉詔帝乃還從中東門入明日賜惲布百疋貶中東門侯為參封尉捜索左傳閉門而索客謂捜索姧人也露索霍光自上官謀後出入自慎引見言事者先露索然後召見蕭望之不肯䦨入衛門籍附此臧㑹讒於臧氏臧昭伯使逐之反犇執於季氏中門之外季平子怒曰何故以兵入吾門拘臧氏老左傳射中苑門漢鮑宣為右扶風坐怒吏成信信亡藏上林中宣使郡令將吏卒闌入上林蠶室門攻亭格殺信射中苑門下吏為大逆當族自殺䦨内罪人嚴延年為侍御史劾大司農田延年持兵干屬車屬車天子車大司農自訟不干事下御史中丞譴責延年何不移書宫門禁止大司農而令得出入宫於是覆劾延年闌内罪人法死注云故事有所劾奏並移宫門禁止不得入也失䦨王嘉字翁仲為郎坐户殿門失闌免户止也通籍董賢幸於上雖休沐不出願侍醫藥上令賢妻通籍得入宫殿中止宿除籍魏其侯竇嬰不好黄老太后怒除嬰門籍不得入朝請嬰字王孫漢元令從官給事官司馬門中者得為大父母父母兄弟通籍從官者及虎賁羽林太官太醫是也行馬周禮掌舍王之㑹同設梐枑再重注梐枑行馬也門施晉成帝美顔含素行加光禄大夫門施行馬又魯定為光禄大夫位特進給吏卒門施行馬孔不嚴羽衛無以重威靈姜公輔德宗在奉天帝知羣臣多勸泚奉迎乗輿者乃詔諸道兵距城一舍止公輔曰王者不嚴羽衛無以重威靈今禁旅單寡而士馬處外為陛下危之帝曰善悉内諸軍泚兵果至如所言戴胄曰今宫殿足容羽衛數年後成猶不晚萬乗之行必具葆衛張仲方曰萬乗之行必具葆衛分衛兵護第裴度及病創一再旬分衛兵護第周廬更呵唐文粹李華含元殿賦周廬更呵市以環衛建衛對營李庾東都賦唐制天子居曰衙行曰駕皆有衛有嚴唐儀衛志夫儀衛所以尊君而肅臣同上夾峙禁省署宇分部夾峙禁省杜牧原十六衛年長彊直能糾劾者為之朝堂置引駕三衛六十人以左右衛三衛年長彊直能糾劾者為之分五番有引駕佽飛六十人以佽飛越騎歩射為之如三衛皆帶刀捉仗而立號曰立門仗唐志宿衛不可闕蘇瓌徙同州刺史歳旱兵當番上者不能赴瓌奏宿衛不可闕宜月賜増半糧俾相給足則不闕番不見省衛兵至三日不食蘇瓌粒食踴貴百姓不足衛兵至三日不食凡朝衛之仗三衛番上分為五仗號衙内五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勲仗以勲衛為之四曰翊仗以翊衛為之皆服鶡冠緋衫裌五曰散手仗以親勲翊衛為之服緋絁裲襠繡野皆帶刀捉仗列坐于東西廊下毎月以四十六人立内廊閤號曰内仗以左右金吾將軍當上中郎將押之舊唐志禁衛之師以備巡警陸贄奏議製翠旄於華蓋之角杜甫南郊賦製翠旄於華蓋之角彗黄屋於鈎陳之星天子之居禁衛九重孫伏伽帝數出馳射伏伽諫曰臣聞天子之居禁衛九重出也警入也蹕非直尊其居處為社稷生人計也深固宫闕以衛不測韓愈直諫表自古天子皆有深固官闕以衛不測事故而出必烏先相風鼔以數里命有司禁道閱將士閑輿然後出之尚懷兢慄今陛下輕為車騎不嚴龍威臣恐社稷危於垂堂矣馳道四白絶馳道成帝為太子詔急召太子太子出龍樓門不敢絶馳道西至直城門得絶乃度上遲之具狀對上恱後乃著令令太子得絶馳道沒入車馬翟方進遷丞相司直從上甘泉行馳道中司𨽻校尉陳慶劾奏沒入車馬以令行馳道鮑宣為司𨽻校尉比司直丞相孔光四時幸園陵官屬以令行馳道中宣出逢之使吏鈎止丞相掾沒入其車摧辱宰相下御史中丞至司𨽻官欲捕從事從事閉門不納宣拒閉使者無人臣禮大不敬坐主守曹植子建嘗乗車馬行馳道中開司馬門出太祖怒公車令坐死由是重諸侯科禁孔改馳道狄仁傑帝幸汾陽宫為知頓使并州長史李沂𤣥以道出妬女祠下俗言盛服過者致風雷之變更發卒數萬改馳道仁傑曰天子之行風伯清塵雨師灑道何妬女避邪止其役帝壯之曰真丈夫哉稽擁車騎宋璟兼侍中帝幸東都次崤谷馳道隘稽擁車騎帝命黜河南尹李朝隱知頓使王恬等官璟曰陛下富春秋今始巡狩以道不治而罪二臣繇此相飭後有受其敝者帝遽命捨之端而如砥唐文粹杜甫南郊賦馳道端而如砥警蹕於繚垣之内周行於馳道之中元稹諫駕幸温湯狀温泉有佳氣馳道指京城韋應物四禪精舍寶馬横來下建章香車却轉避馳道長安道同上苑囿五白天苑禁苑上苑小苑君囿上囿周開靈囿漢立上林廣百里天子苑容萬乗漢上林苑繚以周牆文選制同梁鄒梁鄒古天子苑田名義合靈囿並文選因原東都賦云因原而作苑跨谷西京賦云上林苑跨谷彌阜也遭藪為囿值林為苑養獸漢舊儀上林苑中養百獸天子秋冬射獵取之鈎楯所職鈎盾官也掌小苑之果木詩王在靈囿麀鹿攸伏言鳥獸得其所樵蘇往來無忌文選文王之囿與人共之晉書七十里囿人以為小孟子齊王問孟子曰文王之囿方七十里人以為小寡人之囿方四十里人以為大何也孟子曰文王之囿芻蕘者往焉與人共之人以為小不亦宜乎今君之囿人有殺其麋鹿者與殺人罪同則是以四十里為䧟阱人以為大不亦宜乎芻蕘者往見上注立思賢以招賔西京記文帝為太子立思賢苑以招賔客開博望以通客孝武立子據為太子開博望苑以通賔客得其時制採周法覽漢制以假貧人東觀漢記詔有司京師果園悉以假貧人築鹿囿虞之非正公羊傳云築鹿囿有囿矣天子囿方百里公侯八十里伯七十里子男五十里山林藪澤與人共之虞之非正也罷苑馬以賜貧人漢武養馬苑不禁樵採池籞希御幸者假與貧人斫竹以繩縣連禁御不得往來律名為籞在水中作室可以捕鳥鳥入則捕之此宣詔也毋收藁蕭何謂上林多空弃地願令民得入田毋收藁為獸食上怒械擊之梁苑梁孝王東苑方三百里實陂池而勿禁長洲苑枚乗諫吳王曰漢上林不如長洲之苑上林廣成苑可墾闢者賦貧人後漢安帝詔甘泉三輔黄圖甘泉苑起仙人觀緣山谷行至雲陽三百八十一里入扶風凡周匝五百四十里上林漢舊儀上林苑中廣長二百里離宫七十所皆容千乗萬騎周禮雍氏禁山為苑令禽獸自得其性也以網為周阹音祛長楊賦阹遮禽獸物始皇欲大苑囿優旃諫曰善多縱禽獸於中寇從東方來令麋鹿觸之始皇乃止武帝廣開上林東南至宜春鼎湖御宿也築土為囿植木為苑亦曰養獸為囿草木為苑帝王之盛豫遊其中地控皇居池分太液樓臺先曙鸎花早春漢修靈囿揚雄諌而不聽般遊有禮好樂無荒人且放於芻蕘魚則安於蘋藻梁孝之靡魯恭之奢栖龍之岫落猿之巗鴈池兎園鶴洲鳬渚並孝王所有苑戲九尾之禽三足之鳥髙望漢平並苑名桑梓苑在洛陽桂林苑在建康縣北雙觡共觝之獸五色九苞之禽皆苑有之鴻德苑桓帝延德元年置孔御苑東西二十里張說久侍中宗逭暑三陽宫汔秋未還說上疏曰御苑東西二十里外無墻垣扄禁内有榛叢谿谷猛獸所伏暴慝所憑陛下往往輕行警蹕不肅厯蒙密乗險􅇖卒有逸獸狂夫驚犯左右豈不殆哉易曰思患豫防願為萬姓持重苑樹通堤唐文粹李庾東都賦苑樹通堤菰織蒲紉芡贄菱羞西都賦其中則御水分溝昆明下流在野決溉入宫環洲菰織蒲紉芡贄菱羞渚戯𤣥鷁沙眠白鷗泛舟苑池閻立本太宗與侍臣泛舟苑池見異鳥容與波上宣華苑前蜀王衍起宣華苑表禁苑閑田募耕顧少連為東都留守表禁苑及汝閑田募耕以便民閱武力宴雍州父老于上林苑貞觀十八年宴雍州父老于上林苑賜粟帛太宗紀城上春雲覆苑墻杜甫曲江對雨苑中作層觀以望昭陵魏徵餘見諌諍門起毬場苑中武三思是時起毬場苑中詔文武三品分朋為都帝與皇后臨觀崇訓與駙馬都尉楊謹交注槀築場以利其澤用功不訾人苦之翠微宮籠山為苑唐地理志鋤治禁苑元載賜死披東都第鋤治禁苑塡池壍捐苑囿以賑貧人辛替否上疏曰陛下甞欲塡池壍捐苑囿以賑貧人今天下之寺無數一寺當陛下一宫禁苑在大内宫城之北唐六典禁苑在大内宫城之北北臨渭水東距滻川西盡故都城禽獸蔬果莫不毓焉若祠禴蒸甞四時之薦蠻夷戎狄九賔之享則蒐狩以為儲供焉武后作興泰宫於萬安山盧藏用武后作興泰宫於萬安山上疏曰陛下離宫别觀固多矣又窮人力以事土木臣恐議者以陛下為不愛人而奉己也且頃歳穀雖頗登而百姓未有儲陛下巡幸訖靡休息斤斧之役歳月不空而又廣宫苑臣恐下未易堪京都苑四面監掌所管苑面宫館園池與其種植蕃息之事唐六典上林置令掌苑囿園池之事凡食果進蔬菜以供朝㑹祭祀奉養進御上京東苑總監苑宫館園池之事凡植果以豐甘旨樹疏以修畜聚雖禽魚卉木莫不總而思之同上苑總監凡苑諸面所有壞缺將作不修補者修補之苑内閑廐及諸繕造處斧斤等應湏修理毎日少府給其工人并鐡炭之屬六典注登遐六山陵國忌日附白天子曰崩禮告喪曰天王登遐言若仙去憂天崩杞國人有憂天崩宫車晏駕晏車初崩時也建聖哲違世貽法傳先王違世猶貽之法又云古之王者知命之不長是以並建聖哲著之話言告之訓典而後即命以遺後嗣天禄永終天奪九齡文王三后在天言登遐而精神歸天兆人孺慕萬國縞素二十有八載帝乃殂落百姓如喪考妣舜典三載四海遏密八音遏絶也密静也四夷絶樂三年顧命周成王將崩作顧命臨終之令曰顧命遺詔漢文臨崩作遺詔命令薄葬制三十六日之服髙宗諒隂三年不言君薨百官總已以聽于冢宰天子寢於諒闇八音遏於四海並西征賦叩心絶也行號巷哭並劉琨表七日而殯七月而葬山陵天子七月而葬同軌畢至傳橋山之葬弓劒黄帝葬於橋山南空棺無尸唯劒舄在天崩而憂杞國龍去而哭軒臣黄帝於荆山下鑄鼎成乗龍上天小臣挽持龍髯墮之畏威靈而不敢西向山海經曰窮山際有軒轅邱射者不敢西向畏黄帝之威靈也遵七月之禮畏百年之神大戴禮孔子曰黄帝死後人畏其神百年盜長陵一抔土漢張釋之曰後有人盜長陵一抔土陛下何以加罪焉堯葬穀林見帝王紀舜葬蒼梧象耕鳥耘容衛靈輿歸聖魂於東岱引靈駕於西陵魏武帝謁廟拜陵晉王道字茂引自漢魏已來羣臣不拜山陵道以元帝腃同布衣匪唯君臣而已毎崇進皆就拜不勝哀感由是詔百官拜陵自道始銅雀臺魏武遺詔令起銅雀臺美人作樂對西陵而起之國忌日登遐之日違世之辰如喪之情如喪考妣三載四海遏密八音絶樂於四夷也明摽邦式祠部式國忌日云云攀龍髯之日天忌忌日不樂孔孔昇真人明皇自為上皇嘗玩一紫玉笛一日吹笛有雙鶴下顧左右曰上帝召吾為孔昇真人未幾果崩明皇雜録夢日墮上嘗夢日烏飛蝙蝠數十逐而墮地驚覺召萬廻僧問曰大家即是上天時翌日崩酉陽雜爼哭聲訇天百鳥噪幽坎晝閑空靈輿韓愈豐陵行奉諱之日率土崩心韓愈慰國哀歘憑玉以大漸唐文粹蘇頲中宗諡冊歘憑玉以大漸奄遺天命權德輿德宗諡冊奄遺天命長遊碧落唐文粹王縉𤣥宗哀冊忽乗紫氣長遊碧落掩璿暉於離殿禇遂良太宗哀冊玉几奄及金縢遂愆虞世南唐高祖哀䇿文攀帷扆以孺慕抱歛舄以纏綿同上厥疾大漸不寤不興韓文順宗實録彤堦晶晶兮露驚月玉座微微兮花掩塵徐彦伯中宗哀冊文即行宫作寢韋彤昭陵寢宫為原火延燔而客祭瑶臺佛寺又故宫在山上乏水泉作者憚勞即行宫作寢詔宰相百官議吏部員外郎楊於陵議曰寢宫所占在栢城中距陵不逺使諸陵之寢皆有區限故不可徙若止栢城則故寢已燔行宫已久因以治飾亦復何嫌或曰太宗創業寢宫不輙易是不然夫陵域宅神神本静今大興荒廢嚻役密邇非幽穸所安改之便彤曰先王建都立邑不利則為之遷况有故耶今文寢灾徙而宫之非無故也神安于徙因而建寢於禮至順又他陵皆在栢城隨便營作不越封兆内省易從帝重改先帝制還宫山顚昭陵寢占山上陳京昭陵寢占山上宦侍憚輓汲請更其所宰相未能抗京曰此太宗之志其儉足以為後世法不可改議者多附宦人帝曰京議善卒不徙忌月王綝神功初清邉道總管武攸宜破契丹凱還且獻俘内史王及善以孝明帝忌月請鼔吹備而不作方慶曰晉穆帝納后當康帝忌月時以為疑荀訥謂禮有忌月自月而推則忌時忌年愈無理據也用其言臣謂軍方大凱作樂無嫌詔可白罷行香崔蠡開成中為戶部侍郎白罷忌日百官行香有詔褒可行香於寺觀凡國忌日内教太常停習樂兩京文武五品以上及清望官七品以上行香於寺觀唐史百官志祠部君臣七白有君臣然後禮義有所錯易諸臣之位君天也天可逃乎子文孫箴尹克黄云天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也禮忠臣不潔名事君不避難有罪不逃刑魏絳養人如子君道也仰之如日月臣之奉君知臣莫若君君盤人水孫卿子近臣漢嚴助為太中大夫後得朱買臣吾邱壽王主父偃徐樂嚴安枚臯從車並在左右助等與大臣辨論中外相應以義理之文大臣數詘司馬相如數稱疾避事枚臯東方朔不根持論上頗俳優畜之唯助與壽王見任而助􅆟先進孔君臣同德則海内安王珪太宗召為諫議大夫帝常曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海内安朕雖不明幸諸公數相諌正庶致天下於平尉遲恭贊曰君臣相遇古人謂之千載顧不諒哉君臣明良志叶議從相資以成固千載之遇房杜贊曰方君臣明良志叶議從相資以成固千載之遇蕭曹之勛不足進焉君臣間無少疑長孫無忌或有言無忌權太盛者帝持表示無忌曰我與公君臣間無少疑使各懷所聞不言斯則蔽矣當代名臣人倫凖的虞世南卒帝手詔魏王泰曰世南於我猶一體拾遺補闕無日忘之盖當代名臣人倫凖的今其云亡石渠東觀中無復人矣往事藩國姜皎進楚國公議者譏短皎任遇太過帝以其藩邸舊恩有以宣布之下詔曰殿中監楚國公皎往事朕於藩國雖彭祖同書子陵共學不過也純臣李勣武德二年李密歸朝廷乃録郡縣戸口請自上之使至髙祖訝無表使者以意聞帝喜曰純臣也以譴還第房𤣥齡貞觀末年以譴還第黄門侍郎禇遂良言於帝曰𤣥齡事君自無所負不可以一𤯝責便示斥外非天子任大臣意帝悟遽召于家良臣稷契臯陶也忠臣龍逄比干也魏徵頓首曰願陛下俾臣為良臣毋俾臣為忠臣帝曰忠良異乎曰良臣稷契臯陶也忠臣龍逄比干也良臣身荷美名君都顯號子孫傳承流祚無疆忠臣以嬰禍誅君䧟昏惡喪國夷家秪取空名此其異也帝曰善社稷臣蕭瑀帝嘗曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知勁草版蕩識誠臣悉心奉上裴炎詔送獄鳳閣侍郎胡元範曰炎社稷臣有功於國悉心奉上天下所知臣明其不反君臣相須李珏杜悰領度支有勞帝欲拜戸部尚書以問宰相陳夷行答曰恩權予奪願陛下自斷珏曰祖宗倚宰相天下事皆先平章故官曰平章事君臣相須所以致太平也茍用一吏處一事皆决於上將焉用彼相哉以天下安危自任長孫無忌初無忌與遂良悉心奉國以天下安危自任故永徽之政有貞觀風帝亦賔禮老臣拱已以聽綱紀設張此兩人維持之也追扈崔縱遷京兆尹及帝徙幸梁州追扈不及左右短縱素善懷光殆不來帝曰知縱者朕也非爾輩所及後數日至良臣袁髙韋倫曰髙言勁挺自是陛下一良臣虧君臣之嚴姚崇跪奏十事先朝䙝狎大臣虧君臣之嚴臣願陛下接之以禮可乎賔禮大臣𤣥宗初立賔禮大臣故老雅尊遇崇毎見便殿必為之興去輙臨軒以送它相莫如也君者出令者也臣者行君之令而致之民者也韓愈原道君尊如天臣卑如地李絳傳上拔士論杜如晦監察御史陳師合上拔士論謂一人不可總數職隂刺諷如晦等帝曰𤣥齡如晦不以勲舊進特其才可與治天下者師合欲以此離間吾君臣邪斥嶺表君不虛授臣不虛受劉子𤣥武后證聖初子𤣥上書言君不虛授臣不虚受妄受不為忠妄施不為惠今羣臣無功遭遇輙遷至都下有車載斗量把椎椀脫之諺禮遇隆重蕭德言髙宗立拜為銀青光禄大夫全給其禄遣通事舍人即家致問乗輿至肅章門引見禮遇隆重由是晉府及東宫舊臣子孫竝増秩賜金上下情隔陸宣公奏議君臣意乖上下情隔聖賢相維崔植長慶初拜中書侍郎穆宗問貞觀開元中治道最盛何致而然植曰太宗資上聖興民間知百姓疾苦故厲精思治叉以房𤣥齡杜如晦魏徵王珪為之佐君明臣忠聖賢相維治致升平固其宜也君臣之際顧不難哉以徵之忠而太宗之睿身歿未幾猜譖遽行始徵之諌累數十餘萬言至君子小人未嘗不反復為帝言之以邪佞之亂忠也久猶不免故曰皓皓者易汚嶢嶢者難全自古所嘆云傳贊君有常尊臣有定卑自然之勢也然臣不自通於上君不降而逮諸下則治不得成而功不彰反是而天下之所務粲焉幾矣故聖王屈己從諫君臣兩得其美知道之本歟段平仲贊社稷臣八白能執干戈以衛社稷童汪錡柳莊衛侯哭柳莊曰非寡人之臣是社稷之臣也目送絳侯漢文目送絳侯周勃曰社稷臣也袁盎曰勃乃功臣非社稷臣社稷臣主存與存主亡與亡乃社稷臣方諸㠯用事絳侯為太尉本兵柄弗能正大臣相與共誅諸吕適㑹成功乃功臣耳汲黯上問汲黯何如人嚴助曰使任職居官無以踰人至輔少主守成雖自謂賁育不能奪上曰然古有社稷臣黯其近之柱石漢昌邑王滛亂霍光憂懣問所知故吏田延年曰將軍為柱石昔伊尹相湯廢太甲以安宗廟後世稱忠將軍若能行亦漢之伊尹也處不避汚叔孫豹孔社稷計陳叔達始太子建成等䦧間太宗帝惑之叔達極意救辦至是謂曰武德内難卿有讜言故以此報叔達謝曰豈獨為陛下乃社稷計耳戡定禍亂非公誰杜甫國之社稷今若是戡定禍亂非公誰社稷無常奉明者守之李金陵表李德裕以身扞難功流社稷唐史有功於國裴炎社稷臣有功於國刁斗不聞煙塵不飛盖宗社之靈也林藴上李相公書乃置散地非所宜議者謂子儀有社稷功而孽冦首鼠乃置散地非所宜帝亦悟詔為諸道都統本傳傅說版築臣李斯鷹犬人歘起匡社稷寧復長艱辛李白冬夜太宗社稷一朝正漢官威儀重昭洗杜狄明府詩忠臣之心壯夫之節茍利社稷死無悔焉劉蕡李晟社稷功韓滉卒張延賞揣帝意遂罷晟兵帝曰晟有社稷功君臣相信九白食以駃騠人譖樂毅於燕王燕王按劒怒譖者而食樂毅以駃騠駃騠良馬肉也蜀趙雲雲别傳曰初先主敗人言雲已北去先主以㦸摘之曰子龍不棄我去頃之雲至矣呈文書魏車駕幸許逺徐宣為僕射統留事主者呈文書詔曰吾省與僕射省何異竟不視魯肅張昭非肅謙不足訾毁之權益重之孝昭委任霍光周紀曰成王不疑周公孝昭委任霍光各因其時以成名大矣哉大臣見疑晉石苞為大司馬加侍中鎮淮南聞吴欲為冦築壘過水以自固帝謂羊祜曰苞果有不順乎祜深明之其子為郎上召之經日不至帝益疑欲討之隱其事先策免之苞詣闕後帝慙因謂曰卿子幾破卿門孔虛心温大有與兄大雅同掌機近不自安請徙它職上曰我虛心待卿何所自疑展盡底藴魏徵使還帝日益親或引至卧内訪天下事徴亦自以不世遇乃展盡底藴無所隱洞然不疑王者用人非難盡其才之為難觀太宗之責任也謀斯從言斯聽才斯奮洞然不疑故人臣未始遺力天子高拱操成功致太平矣韋挺傳贊趙㳙治衢不為觀察使韓滉所容奏免官帝見其名問宰相曰是豈永泰時御史乎對曰然詔拜尚書左丞既至勞之曰卿正直朕所自知乃以罪聞不信也龍顔英主一品集謝不許遜官自古臣得其君最為難遇非龍顔英主良平無以效其謀非日角聖姿寇鄧莫能展其志念良臣十白漢宣賜右扶風尹翁歸子黄金百斤奉祭祀大司農朱邑子亦然祭征虜後漢祭遵為征虜將軍卒世祖毎曰安得憂國奉公如祭征虜者乎聞皷鼙之聲則思將帥之臣禮名將後漢賈復力戰傷創甚世祖聞之曰吾所以不遣君聞專征者以其敢深入果失吾名將聞其婦孕曰生女耶我子娶之生男耶我女妻之不令其憂妻子也孔賜膜皮薛萬均卒帝後嘗賜羣臣膜皮及萬徹而誤呼萬均愴然曰萬均朕勲舊忽呼其名豈死者有知冀此賜乎因命取焚之舉坐感嘆讀貞觀政要思徵賢詔訪其後魏謩文宗讀貞觀政要思徵賢詔訪其後楊汝士薦為右拾遺老臣遺像李晟他日與馬遂見延英帝嘉其勲下詔曰歳在己巳秋九月我行西宫瞻望崇創見老臣遺像顒然肅然和敬在色想雲龍之協期感致業之艱難覩往思今取類非逺宣宗追感元和舊事但聞是憲宗朝卿相子孫必擢用杜勝以刑部員外郎閣内次對上詢其祖父勝以其先黄裳永貞之時深排姦邪請憲宗監國上德之而授給事中東觀奏記君臣問疾十一白蕭何疾惠帝自問云君若不幸誰可代君何舉曹參霍光病車駕親臨問之張禹毎疾輒起居聞車駕自臨問上親拜牀下禹頓首謝恩因於牀前拜少子官禹曰臣有一女愛甚於男逺嫁張液太守蕭育不勝父子私恩願與相從即徙育為𢎞農太守張湯嘗病上親至舍視病隆貴如此包咸為大鴻臚以論語授帝後病親輦駕視之桓榮為帝師後病帝親問入門下車執經趍拜修弟子禮呉吕蒙疾孫權在公安迎置内殿治護萬方募有能愈蒙疾者賜千金有加權為慘戚欲數見顔色又恐勞動常穿壁瞻之見小能食則喜顧左右言笑不則咄嘆夜不能寐中瘳為下赦令疾君視之東首加朝服拖紳語君適其臣升自阼階不敢有其室也禮卿大夫疾君三問之及葬三往焉士疾一問之在殯一往焉禮孔舒王持詔往視舒王謨於諸王景長帝欲試以事故拜涇原節度大使時尚父郭子儀病篤帝臨軒遣謨持詔往視謨冠逺游冠御絳袍乗象輅駟馬飛龍士三百門府官皆袴褶以從子儀手叩頭謝恩謨宣詔已乃易服勞問還帝幸其第流涕李靖二十三年病甚帝幸其第流涕曰公乃朕生平故人於國有勞今疾若此為公憂之詔皇太子就問杜如晦病立詔皇太子就問帝親至其家撫之帝親問疾屏左右語加朝服拖帶魏徵疾甚帝親問疾屏左右語終日乃還後復與太子至徵第徵加朝服拖帶帝悲懣拊之流涕問所欲鑿苑垣以便候問房𤣥齡疾甚帝命鑿苑垣以便候問日候増損髙季輔感疾歸第有詔以其兄虢州刺史季通為宗正少卿視疾遣中使日候増損舊君十二白反服禮哀公問曰為舊君反服禮與孔子曰古之君子進人以禮退人以禮故有舊君反服之禮今之君子進人若將加諸膝退人若將墜諸淵無為戎首不亦善乎又何反服之有陳軫秦聲史陳軫至秦秦惠王曰去寡人之楚思寡人乎曰昔越人莊舄仕楚執圭及病則作越聲今臣棄逐之楚能無秦聲乎晉孫惠諌齊王曰屈原放年心存南郢樂毅適趙志在北燕違諸侯之大夫不反服為平不敢服前之尊君也違大夫之諸侯不反服也禮孔以君禮葬黎陽李密帝遣使持密首往招李世勣世勣表請收葬歸其尸乃發喪具威儀三軍縞素以君禮葬黎陽故君吕子臧隋大業末為南陽郡丞髙祖入京師慰輯山南獨子臧堅守及煬帝已弑帝更使其壻薛君倩齎詔言隋所以亡諭之子臧為故君發喪訖即送欵懷祿不屑其榮文粹李翰三名臣論樂毅犇趙趙王問圖燕之策樂毅流涕而對曰臣昔日之事燕昭王猶今日之事大王也可謂懷祿不屑其榮周身不違於道古人言一心以事百君百心不可事一君魏文帝初授漢禪羣臣皆楊魏德惟衛臻獨稱漢美文帝曰天下之珍當與山陽共之為人臣者罔念於此可謂有百心矣窮愁志人臣終節姚崇張柬之等誅二張后遷上陽宫中崇率百官起居王公更相慶崇獨流涕柬之曰今豈涕泣時邪公禍自此始崇曰比與討逆不足以語功然事天后久違舊主而泣人臣終節也由此獲罪甘心焉制誥十三白君命王言如絲其出如綸禮天書詔書鳳詔丹鳳封五色詔紫泥掛詔書急宣王命天語宣布漢書黄霸次公為潁川守時上意於理數下恩澤詔書霸宣布令人人知上意也寛大之詔後漢侯霸君房為尚書令下寛大之詔四時之令霸所建后以施令告四方易發號施令罔有不臧布德和令禮尺一漢司𨽻校尉楊球為太尉勑尚書令召拜不得稽留尺一詔書許為尺一詔書魏志青紙紫泥晉書視草漢報淮南王書帝常召司馬相如視草渙汗其大號孔夜被旨草詔書韋澳為翰林承旨夜被旨草詔書事有不安者即遷延須見帝開陳可否未嘗不順納薄紙手作詔韋澳在河陽宣宗遣使至魏博道出澳所帝以薄紙手作詔賜澳曰密飭裝秋當見卿盖將以為相也下書詔日數百陸贄從狩奉天機務填總逺近調發奏請報下書詔日數百奉天所下制書雖武夫悍卒無不感慟流涕陸贄為帝言今盗徧天下宜痛自咎悔以感人心昔成湯罪已以興楚昭王出犇以一言善復國陛下誠不吝改過以言謝天下使臣持筆亡所忌庶叛者革心帝從之故奉天所下制書雖武夫悍卒無不感慟流涕李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力盖贄有助焉勿謂子孫之謀欲存輔車之勢李德裕其處報機急帝一切令德裕作詔德裕數辭帝曰學士不能盡朕意伐劉稹也詔王元逵何𢎞敬曰勿謂子孫之謀欲存輔車之勢元逵等情得皆震恐思効已而三州降賊遂平帝每稱魏博功則顧德裕道詔語咨其切於事而能伐謀也因誡風俗詔厯詆羣有司元稹擢祠部郎中知制誥變詔書體務純厚明切盛傳一時然其進非公議為士類訾薄稹内不平因誡風俗詔厯詆羣有司以逞其憾裒肅宗所賜詔勑千餘篇上之郭子儀為肅宗山陵使子儀懼讒且成盡裒肅宗所賜詔勑千餘篇上之因自明詔曰朕不德貽大臣憂王言不可存私家舊史髙郢掌誥累年家無制草或謂之曰前輩皆留制集公焚之何也曰王言不可存私家時人重其謹密潛草李白集序潛草詔誥人無知者醜正同列害能成謗恪言不入帝用疎之副本留中蘇頲自景龍後與張說以文章顯稱望略等故時號燕許大手筆帝愛其文曰卿所為詔令别錄副本書臣其撰朕當留中後遂為故事其後李德裕著論曰近世詔誥惟頲叙事外自為文章賜渤海詔張九齡㑹賜渤海詔而書命無足為者乃召九齡為之被詔輒成詞旨豐美許景先詞旨豐美得中和之氣見舍人門渾瑊制曰渾瑊為行營副元帥帝臨軒授鉞用韓信故事制曰寇賊干紀授爾節鉞以戡多難往欽哉切機要鄭畋知制誥㑹討徐州賊龐勛書詔紛委畋思不淹晷成文粲然無不切機要當時推之還詔書張獻恭遷檢校吏部尚書德宗欲徙盧杞為饒州刺史給事中袁髙上還詔書苦争獻恭見帝曰髙所奏宜聽帝不答復前曰髙乃陛下良臣當優異之上遂不徙杞作詔􅀢其前請帝署可安樂公主光艶動天下侯王相臣多出其門嘗作詔􅀢其前請帝署可帝笑從之厮臺送獄手詔喻免時安樂公主與長寧安定三家厮臺掠民子女為奴婢左臺侍御史袁從一縛送獄主入訴帝為手詔喻免同上刺史縣令謹宣奉行陳子昻后召見賜筆札中書省令條上利害子昻對三事其一言陛下布德澤下詔書必待刺史縣令謹宣奉行之不得其人則委棄有司掛墻壁耳書詔叢浩杜讓能僖宗狩蜀為翰林學士方闗東兵興調發綏徠書詔叢浩讓能思精敏凡號令行下處事值機無所遺筭帝倚重之當草詔書辭不如旨韋𢎞景召為翰林學士蘇光榮為涇原節度使𢎞景當草詔書辭不如旨罷學士緘鑰前後詔敕陸元方卒有一押生平所緘鑰者歿後家人發之乃前後詔敕草詔殿上恐懼不能得一詞陸餘慶遷鳳閣舍人后嘗命草詔殿上恐懼不能得一詞降左司郎中裁可占授劉禕之擢中書侍郎方是時詔令叢繁禕之思致華敏裁可占授少選可待也嚴促李乂遷修文館學士韋氏之變詔令嚴促多乂草定家藏詔書李靖五代孫彦芳太和中為鳳翔司録參軍家故藏髙祖太宗賜靖詔書數函上之下沛然之詔房𤣥齡上疏曰願下沛然之詔許髙麗自新焚陵波之船罷應募之衆即臣死骨不朽訓誥温麗王涯遷工部侍郎涯文有雅思元和間訓誥温麗多所藁定誥詔皆援凖古誼齊澣為中書舍人誥詔皆援凖古誼時號解事舍人慰邊將傷痍者曰傷居爾體痛在朕躬封敖武宗作詔書慰邊將傷痍者曰傷居爾體痛在朕躬帝善其如意李德裕進太尉制曰謀皆予同言不他惑封敖劉稹平李德裕以定䇿功進太尉時敖草其制曰謀皆予同言不他惑學士門以筆塗詔李藩王諤賂權近求兼宰相密詔中書門下曰諤可兼宰相藩遽取筆滅宰相字書其左曰不可還奏之宰相權德輿失色曰有不可應别為奏何以筆塗詔邪藩曰勢迫矣出今日便不可止既而事得寢罷統軍用麻鄭絪竇文塲恃功隂諷宰相進擬加統軍比絪當作制奏言天子封建或用宰相以白麻書制付中書門下今以命中尉不識陛下持以寵文塲邪遂著為令也帝悟罷統軍用麻始復闗隴書詔夜數十劉琢擢翰林學士宣宗始復闗隴書詔夜數十雖投筆遽成辭皆允切宣告于廷大風雷雨拔樹劉鄴傳豆盧瑑者與崔沆皆拜同平章事是日宣告于廷大風雷雨拔樹未幾及禍寶書盧從愿課為天下第一寶書勞問將相除徙皆内出制王佖故事將相除徙皆内出制故號白麻至必以責罷遂中書進制焚何易于為益昌令鹽鐵官搉取茶利詔下所在毋敢隱而易于視詔書曰益昌人不征茶且不可活矧厚賦毒之乎命吏閣詔吏曰天子詔何敢拒吏坐死公得免竄邪對曰吾敢愛一身移暴于民乎亦不使罪爾曹即自焚之觀察使素賢之不劾也試息兵詔張昌齡召試息兵詔少選成文帝大恱戒之曰昔禰衡潘岳矜已傲物不得死卿才不減二人宜鑒于前副朕所求乃敕於通事舍人裏供奉無一番紙墜北路藩鎮王鎔朱全忠怒引軍攻鎔次元氏鎔誥其屬曰國危矣奈何周式請見全忠可以口舌罷也許之全忠迎折曰爾公朋附太原今無赦矣即出書示式曰嗣昭在者宜速遣式曰王公所與和者息人鋒鏑間耳况繼奉天子詔和無一番紙墜北路乎解草詔馬前許敬宗檢校中書侍郎駐蹕山破賊命草詔馬前帝愛其藻警由是專掌誥令詔書下雰翳澄駮張柬之傳初易之等誅後中宗猶監國告武氏廟而天久隂不霽侍御史崔渾奏陛下復國當正唐家位號稱天下心奈何尚告武氏廟請毁之復唐宗廟帝嘉納之是日詔書下雰翳澄駮咸以為天人之應詔出執不下袁髙德宗將起盧杞為饒州刺史命舍人作詔詔出髙執不下奏曰陛下用杞為相出入三年附下罔上使陛下越在草莽羣臣願食其肉且不厭今復拜刺史誠失天下望制麻自中以授李栖筠拜御史大夫始栖筠見帝敷奏明辯不阿附帝心善之故制麻自中以授朝廷莫知也不奉詔命盧羣淮西呉少誠擅决司洧水溉田使者止之不奉詔命羣臨詰宣致詔詞董晉五月朔天子㑹朝公卿在廷侍中贊羣臣賀竇參中書令當傳詔疾作公卿相顧未有詔晉從容進曰攝中書令臣參病不能事臣請代參事南面宣致詔詞進退甚詳訓辭温厚崔元翰竇參秉政引知制誥其訓辭温厚有典誥風腕可斷麻不可草韓偓進承旨宰相韋貽範母喪詔還位偓當草制學士使馬從皓逼偓求草偓曰腕可斷麻不可草憂勤兆庶屢降德音四海之内莫不抗首而長息劉蕡䇿曰自陛下御㝢憂勤兆庶屢降德音四海之内莫不抗首而長息自喜復生於死亡之中也翠錦池飾代宗睿真皇后沈氏德宗即位乃先下詔贈后曾祖祖父一日封拜百二十七人詔制皆翠錦池飾以廏馬負載賜其家能辨南陽之牘允符東海之貴崔羣穆宗立以吏部侍郎召之勞曰我為太子卿力也羣曰此先帝意臣何力焉且陛下向為淮西節度使臣起制草其言能辨南陽之牘允符東海之貴先帝然之則傳付久矣朱書御札五代李琪遷吏部尚書同光三年秋天下大水京師乏食尤甚莊宗以朱書御札詔百寮上封事琪上書數千言其漫然無足取而莊宗獨稱重之遂以為國討使百官皆給吿身五代劉岳唐明宗時為吏部侍郎故事吏部文武官告身皆輸朱膠紙軸錢然後給其品髙者則賜之貧者不能輸錢往往但得其敕牒而無告身五代之亂因以為常官卑者無復得告身中書但録其制辭或任其材能或褒其功行或申以訓誡而受官者既不給告身皆不知受命之所以然非王言所以告詔也請一切賜之由是百官皆給告身自岳始也白孔六帖卷三十八
