body:
  text: 白孔六帖卷十六唐白居易原本宋孔𫝊續撰米麫飯飱二粥三羮四肉五炙六膾七脯脩八鮓九醢十醯十一鹽十二酪十三蜜十四餅餌十五嗜好十六食器十七賜食十八與食十九饋食二十異味二十一天子食二十二柴薪二十三芻草二十四菜二十五炭二十六厨二十七米麫一粟附白獻米者操量鼔負子路食藜藿之食為親負米百里之外索長安米東方朔言臣無有用宜棄捐無索長安米聚米馬援對光武説隗囂聚米為山勢受俸求赤米第五倫為㑹稽受俸禄常求赤米留一月餘皆賤糶與貧人與米吴魯肅以賑貧為務周瑜資粮絶肅有兩囷米三千斛乃指一囷與瑜賑贍不啟父全琮父使琮齎米數千斛到吴皆散空船而還曰所事非急而士大夫方有倒懸之患便賑贍不啟報父父竒之麫桄榔文選云麫桄榔粟窖倉粟貨殖志秦敗豪傑争取金玉任氏獨窖倉粟後米石至萬錢金玉盡歸任氏獻粟者執右契陳陳相因太倉之粟紅腐而不可食亦太倉粟皆謂文景時秦輸傳晉饑秦輸之粟所寳惟榖冉子之請冉子為其母請粟子曰與之庾庾十六斛莊生之貸莊子貸粟於魏文侯文侯曰待得邑粟至與子三百鍾周曰若待君粟求臣于丘墳之内後發使送之孔斗米張興一飯至斗米生日湯餅𤣥宗皇后王氏始后以愛弛不自安承問泣曰陛下獨不念阿忠脱紫半臂易斗麫為生日湯餅邪帝憫然動容阿忠后呼其父仁皎云不托五代李茂貞昭宗幸鳯翔梁軍圍之中人相與邀遮茂貞來路以為生昭宗謂茂貞曰朕與六宫皆一日食粥一日食不托安能不與梁和乎黄稑烏節地理志揚州土貢黄稑米烏節米烏羽擇米韋陟以烏羽擇米紫米唐杜陽編元和八年大軫國貢紫米有類于苣勝炊之一升得飯一斗食之令人髭髪鬒黑顔色不老久則後天而死黄兒米雲仙散録浣花旅地志曰杜甫在蜀日以七金買黄兒米半籃炊之甑香吴興米炊之甑香出品物類聚長鎗米李賀詩長鎗米未熟水花冷淘入洛記野􅈢泉一姥善製水花冷淘切以吴刀淘以洛酒潦葉於鐺耳中過投于湯中其疾徐鳴掌趂之不及富子携金就食之玉英粉道士持湯餅請人云玉英粉服之七日必羽化出廣異記苦於嗜麫河東􅇱録河東并代人苦於嗜麫切以吴刀淘以洛酒潦斗貯之擊鼓集老幼自以多寡取之至飽秋菰成黑米精鑿傅白粲杜甫行官張望補稻畦水歸詩米賤大傷農去年米貴闕軍食今年米賤大傷農杜甫嵗晏行日糶太倉五斗米來赴鄭老同襟期以蓬子為麫唐史食貨志龎勛反自闗東至海大旱冬蔬皆盡以蓬子為麫以槐葉為虀玉粒定晨炊紅鮮任霞散杜甫望補稻畦為問淮南米貴賤老夫乗興欲東遊解悶月分梁漢米同上饑籍家家米同上時來一顧我笑飯葵與藿李白寄崔侍御飯飱二白飯食飱牽宰夫掌朝覲㑹同賔客以牢禮之法飯食飱牽注客始至所致也飱饔漿人掌賔客之飱饔也共飯不擇手摶飯致飽之意不亷放飯去手餘飯于器中君未覆手不敢飱覆手以循咡飱勸食饋盤飱僖負羈饋重耳下致璧云云客飱主人辭以䟽飱羙主人之食魚飱公羊晉趙盾食魚飱觥飯不及壺飱觥小器壺大器喻不能圖逺先一飯矣夫差謂勾踐曰寡人禮先一飯矣言巳齒長也脱粟飯公孫𢎞傳飱韓信令禆將傳飱破趙㑹食注飱小飯也武王侍文王一飯亦一飯冄飯亦冄飯飱有陪鼎免粟飯晏子食免粟飯孔飯恩劉従諌傳張谷侍人新聲當㴀諫潜謀窺脅新聲諌谷曰大丈夫勿顧一飯㤙以骨肉腥健兒食蒸麥為飯徐敬業武后遣李孝逸兵三十萬往擊之敬業問計于魏思温思温曰武王居上蒸麥為飯以待我師奈何欲守金陵投死地乎青精杜詩豈無青精飯使我顔色好飯數匕朱泚賊薄丹鳯門徳宗夜至咸陽飯數匕而去秩飯魚朝恩判國子監取子錢供秩飯玉屑飯唐叚成式酉陽雜爼大和中有二人逰嵩山迷路見一人衣潔白枕一襆物方眠二人且問所自因開襆两裹授與二人曰分食此雖不足長生可一生無疾乃起與二人指路香飯春菰米栁宗元飯抄雲子白杜甫滑憶雕胡飯江閣麤飯依他日贈王侍御沙丘無漂母誰􅈕飯王孫李白送薛九敲火煑飯南嶽僧悟空嶽西原近朱陵洞其處險絶僧逰累日捫蘿垂踵無幽不跡忽見前岩有道士坐䋲床僧告以飢困道士歘起指石地曰此有米乃持钁斸石深數寸遂令僧探之得陳米升餘即着於釡承瀑敲火煮飯勸僧飱一口未熟道士笑曰君飱止此可謂薄我當畢之遂喫硬飯雜俎粥三白為粥以待衛國之餓者衛公叔文子賦民粥陸續為郡户曺民飢太守賦粥續簡閱人衆訊以名氏飴餓者王薈為吳國内史年飢作饘粥以飴餓者饘於是粥於是以餬予口正考父鼎銘居䘮食粥行麋粥月令八月養衰老豆粥光武至蕪蔞亭大寒馮異上豆粥上謂諸將曰昨得豆粥飢寒俱解孔屑榆陽城嵗飢不過隣里屑榆為粥白粥呂方毅葬母通人郎餘令以白粥𤣥酒生芻祭路隅左飱右粥吳少誠傳韓愈平淮西碑曰始時蔡人進戰退戮今眠而起左飱右粥天子食粥食貨志昭宗在鳯翔為梁兵所圍天子食粥為粥燎鬚李勣性友愛其姊病嘗自為粥而燎其鬚沸粥獨孤及䟽曰百揆隳刺如沸粥紛麻防風粥金鑾宻記白居易在翰林賜防風粥一甌食之口香七日牛粥王施避巢賊入天台山主人賀理給以牛粥出芳賢傳楊花粥洛陽人家寒食煑楊花粥金門嵗節給麋粥孟詵居尹陽山詔河南春秋給羊酒麋粥羮四白若作和羮爾為鹽梅書羮定定熟也儀禮鄉飲酒也大羮不和無鹽芼羮内則云芼羮菽麥唯所欲羮食自諸矦至庶人無等等差異也羮齊視夏時宜熱大羮不致傳和如羮焉水火醯醢鹽梅以烹魚肉未嘗君之羮一杯亡國戰國䇿中山君饗大夫司馬子期在焉羊羮不徧子期怒走投椘說伐中山君君亡曰吾以一杯羮致亡國也爛手劉寛将朝婢翻羮汚其衣遽収之寛曰徐徐羮爛汝手陶石公起不受遺贈啖無葺羮無鹽不糝孔子陳蔡間七日不食藜藿不糁蓴羮陸機詣王濟濟指羊酪謂機曰吳中何以敵此機曰千里蓴羮未下鹽䜴庾衮藜羮不糁門人進飯曰已食訖頡羮矦髙祖兄子識母羮後漢陸續字智伯初繫獄見餉羮知母吏怒以為卒通意續曰識母羮䓤必寸㫁肉方正以此知也遺漢髙祖謂項羽曰若烹太公遺我一杯羮樂羊食盡樂羊圍中山中山人烹其子遺之羮樂羊食盡黿羮傳椘人獻黿於靈公子家與子公将朝靈公子公之食指動謂子家曰他日我如此必嘗異味及入見宰夫解黿子公笑曰果然靈公問笑故且告及食大夫黿召子公而弗與子公怒染指于鼎嘗之而出孔調羮李白召見金鑾殿論當世事帝賜食親為調羮門皆若沸羮王伾當其黨盛門皆若沸羮不二羮胾栁玭常述家計曰余舊府髙公先君兄弟三人俱居清列非速客不二羮胾夕食齕蔔瓠而已皆保重名於世懲沸傅奕曰懲沸羮者吹冷虀為羮魏元忠復舊官因侍宴后曰卿累負謗鑠何邪對曰臣猶鹿也羅織之吏如獵者茍湏臣肉為之羮爾藜羮盧照隣字昇之客東龍門山布衣藜羮駞蹄羮杜甫詩錦帶香聞錦𢃄羮香芹香芹碧澗羮甘露羮唐明皇雜録李林甫子壻鄭平為户部員外郎一日林甫就院省女因邀之見其鬢髮班白謂平曰上明日當賜甘露羮鄭郎其食此羮縱華皓亦必鬢黒明日果有中使至林甫第賜食因以羮與平食一夕鬢黒月兒羮雲仙散録字錦曰栁公權以隔風紗作龍城記及八朝名品號錦様書以進上方御剪刀麫月兒羮即命分賜公權术羮洛陽人家端午煮术羮金門歳節池羮羣鮮沸池羮韓愈聮句捩手覆羮韓愈送窮文羮煮秋蓴滑杜甫秋日蓴龜蓴龜羮之􅅸羙江東謂之一蓴龜酉陽雜爼肉五白有肉如坻如陵傳濡肉齒決乾肉不齒決鳥獸之肉不登於爼則公不射寘堇於肉堇烏頭毒藥也拔劔割肉東方朔伏日藿肉董賢客漿酒藿肉六十非肉不飽宿肉鼠盗張湯為兒守舍鼠盗肉烏攫黄霸使吏食於道旁烏攫其肉吏還霸迎勞曰乃為烏攫肉吏大驚以為霸知其起居不敢有隐也一肉公孫􅊼食不過一肉束藴蒯通曰里婦夜亡肉姑以為盗逐之諸母束藴請火于亡肉家曰犬暮得肉遽呼婦還肉林漢武兼肉漢劉虞為上公食無兼肉舉太山以為肉曺植與吳質書願舉太山以為肉持蒲作肉秦趙髙為丞相指鹿為馬以蒲作肉對屠門而嚼桓譚新論人聞長安樂出門西向笑如聞肉味美則對屠門而嚼分羊甄宇拜博士每獵詔賜博士羊羊有大小肥痩博士祭酒議殺羊秤分其肉又欲投鉤宇恥之云傷儒因取痩者不復争肉敗不食語孔可割以啖秦叔寳破尉遲敬徳功多帝勞曰使朕肉可食可割以啖爾况子女玉帛乎不喜食肉竇建徳性約素不喜食肉飯脱粟加蔬具自㓜不食楊收字蔵之以母奉浮圖法自幼不食肉母約曰爾得進士第乃可食一飯十斤張興一飯肉十斤割肉宇文士及字仁人嘗割肉以餅拭手帝屢目陽若不省徐㗖之其機悟率類此饔敗肉腐王翃字宏肱拜京兆尹㑹涇源兵討李希烈次滻水京兆主供饌饔敗肉腐衆怒曰食是而討賊乎遂叛肉食君之禄五代劉賛父玭為縣令賛始就學衣以青布衫􅃭每食則玭自肉食而别以蔬食食賛于牀下謂之曰肉食君之禄也爾欲之則勤學問以干禄吾肉非爾之食也由是賛益力學帝詔食肉李泌字長源初泌不食肉帝乃彊詔食肉机上肉桓彦範誅二張也彦範不欲廣殺因曰三思机上肉爾品肉頡字子疊羅支有至性既舍亰師諸婦得供品羅支預焉其母最後至不淂給羅支不敢嘗品肉帝聞嘆曰天禀仁孝詎限華夷㢤遂給母肉肉非黄羊唐史張説慰安羅拔野固等直詣其部宿帳下副使李憲以虜難信不宜渉不測說報曰吾肉非黄羊不畏其食羊脾歸登性甚慳嗇常爛一羊脾旋割旋噉封其殘者一日登妻悮于封處割食登大怒其内由是沒身不食肉比夢鎻言肥肉大酒徒相邀杜甫詩食必梁肉唐舊史隴西王博義有妓妾數百人皆衣羅綺食必梁肉食兼數人江左王元祥食兼數人炙六白嘬炙禮無嘬炙謂一舉盡臠近貪牛心王羲之年十二周顗異之時重牛心炙座客来未噉先割啖義之乃知名行爵食炙傳欒寧處外禮鱠炙處外未熟欒寕将欲飲酒炙未熟欲炙之色顧榮與同僚宴飲見執炙者狀貎不凡有欲炙之色榮割炙啖之曰豈有終日執之不知其味及趙王倫敗榮被執其人為􅇂率救榮得免馬行炙帝王記曰紂宫九市車行酒馬行炙魚炙國語屈建曰祭典庶人有魚炙之薦争食而死風土記吴王闔閭女嬌恣嘗與王争食魚炙怨恚而死孔臠盤炙酒韓愈祭張署文避風大湖七日鹿角鈎登大鮎怒頬豕豹臠盤炙酒羣奴餘啄牛炙杜甫字子羙客耒陽㳺岳祠大水遽至渉旬不淂食縣令具舟迎之令嘗饋牛炙白酒冷炙杜甫詩殘杯與冷炙燔炰胾炙栁宗元嶺南節度饗軍堂記燔炰胾炙之物均飫于卒士驢騣駞峯炙唐酉陽雜俎將軍曲良翰能為驢騣駞峯炙絲竹羅酒䏑縣齋詩韓愈熏林塘文粹張説宴薛王山池序炮炙熏林塘啖朱亥李白俠客行將炙啖朱亥蛤蜊炙杜突承璀嗜蛤蜊炙傳芳畧記杏炙鼃炙酉陽雜爼飲食有杏炙鼃炙膾七白膾鯉詩云炰龞膾鯉膾不厭細紅鮮應刃落俎西征賦華魴躍鱗素鱮揚鬐饔人縷切鸞刀若飛應刃落爼霍霍霏霏紅鮮紛其初載賔客聳而遲遅素膚散雪七命曰命支􅄐飛霜鍔紅肌綺散素膚雪落婁子之毫不能厠其細秋蝉之翼不足擬其薄鮮鯉之膾七發疊縠七彂曰累如疊縠離若散雪輕隨風飛刃不轉切食魚豈其食魚必河之魴芥醬語魚膾非芥醤不食用葱禮曰凡膾春用葱秋用薤冬宜鮮鮮生魚聶而切之禮牛與羊魚之腥聶而切之為膾處外膾炙處外姜詩母好鱠好江水庭中出水味如江水毎日出雙鯉魚以供母膾其孝感如此釣庭中介象字元則與吴王論膾何者最美象曰海中鯔魚為上美也令扵殿前庭中作方坎汲水滿之象垂綸於坎中食頃得鯔魚作鱠釣盤中左慈字元放以銅盤盛水釣水中引出魚皆長三尺以作鱠王餘魚吴王行江中食鱠有餘棄于水化為魚今有王餘魚是也亦名鱠骨也孔操刀鱠鯉李綱字文紀有進魚者太子使鱠之唐儉趙元楷自言其能太子曰操刀鱠鯉和鼎味公等善之若弼諧審諭固屬綱矣鱠寸魚􅃅鵝闕南詔鱠寸魚以胡𤓰椒藙和之號鵝闕銀絲鱠杜甫詩鮮鯽銀絲鱠意在斬巨鼇何論鱠長鯨李白鱠炙之美栁宗元晉問云三河之人則已填溢饜飫腥膏舄鹵聞鱠炙之美則掩鼻蹙額賤甚糞土而莫顧者也庖霜韓愈詩庖霜鱠𤣥鯽膾魴唐文粹蘇源明小洞庭讌籍序燔兔膾魴同心鱠雲仙散録金門嵗節曰洛陽人家七夕装同心鱠縠薄絲縷唐酉陽雜俎進士叚碩常識南孝㢘者善斫膾縠薄絲縷輕可吹起操刀響㨗若合節奏因㑹客衒投先起魚架之忽暴風雨雷震一聲膾悉化為蝴蝶飛去南驚懼遂折刀誓不復作鱠灋鯉一尺鯽八寸去排泥之羽鯽圎天肉腮後耆門用復腴拭刀亦用魚腦皆能令鱠縷不着刀同上金虀玉鱠吴郡獻松江鱸煬帝曰所謂金韲玉鱠東南佳味也隋唐嘉話鱠飛金盤白雪髙饔子左右揮霜刀杜甫觀魚歌蓬池鱠李徳裕述夢詩荷静蓬池鱠凡學士初上賜食悉是蓬池魚鱠魴魚肥羙知第一魴魚肥美知第一既飽懽娱亦蕭瑟杜詩膾莫先扵鯽魚楊畢膳夫録膾莫先於鯽魚鯿魴鯛鱸次之鱭魿黄竹五種為下其他皆強為落碪何曾白紙濕放筯未覺金盤空杜甫詩錦縷白居易詩膾長抽錦縷紅肥花落白雪霏李白酧雙魚見贈雙鰓呀呷鬐鬛張跋刺銀盤欲飛去呼兒拂机霜刃揮紅肥花落白雪霏鯽魚并鱠手刀子酉陽雜爼安禄山所賜有鯽魚并鱠手刀子脯脩八白乾肉脯腊周禮腊人掌乾肉凡脯腊膴胖之事注乾肉大腊也小腊小者也脯斤也捶而施薑桂曰腵脩膴胖皆謂夹脊肉也腒䐹腒乾雉䐹乾魚不食子曰沽酒市脯不食束脩孔子自行束脩已上吾未嘗無誨焉左朐右䏞禮記以脯脩置左胊右䏞注取便也屈中曰朐音衢乾肉不齒決尹祭祭宗廟之禮脯曰尹祭腵脩禮鬼矦紂脯鬼矦以享諸矦捶而食之乾肉則捶而食之噬腊肉遇毒噬乾肉易束國語椘成王聞子文朝不及夕每朝設脯一束濁氏貨殖志濁氏以胃脯而連騎注以湯燖羊胃以􅎛薑也野蒲變而為脯潘岳西征賦失脯桑虞宿寄客失脯虞解衣償之也婦人之贄脯脩棗栗禮祍受榖梁魯昭公奔齊齊使髙子以脯遺公公祍受藥脯以毒驪姬削脯犒師劉表出軍左慈曰有薄禮即以刀削脯以犒師投地百人接脯脯亦不减麟肉脯神仙傳王逺至蔡經家設麟肉脯孔削脯傷指代宗睿真皇后沈氏河南為史思明所沒遂失后所在徳宗即位令州縣物色咨訪髙力士女頗能言禁中事與女官李真一嘗従后㳺年狀差似后嘗削脯哺帝傷左指髙以剖𤓰傷指以供滋膳元行沖狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯腊膎胰以供滋膳贈王績性嗜酒杜之松嵗時贈脯紅虬脯唐杜陽編同昌公主上贈御饌有紅虬脯非虬也但貯扵盤中則虬健知虬絲髙一尺迎凉脯洛陽人家重陽則製迎凉脯脯芼羮董謹續豫章記陳蕃待客拌飯以鹿脯芼羮以牛脯未嘗別為異饌薦脯酒韓文衡嶽廟詩升階傴僂薦脯酒欲以菲薄明其𠂻佳節脩脯禮元稹詩鮓九白遺母陶侃遺母一坩鮓母封鮓還責侃云云又孟宗字武恭為監魚池司馬自結網取魚作鮓寄母母曰汝為魚官而獲鮓奈何不避嫌也遂還之龍鮓世説有人遺張華鮓華曰此龍肉也遂以苦酒沃鮓鮓中有五色光啓齊王融謝司馬賜魚鮓啓曰東越水羞實罄乗時之美南荆任土方揖鮓魚之最十斛鮓陶侃故事曰蘇峻上成帝十斛鮓骨青肉紫漢昭帝時釣得蛟長三丈帝曰此魚鱔之類命太官為鮓骨青肉紫食之甚羙帝更求之不獲孔後池魚韓全誨傳昭宗至鳳翔帝輟所御膳賜全誨等茂貞食鮓羙帝曰此後池魚茂貞曰臣飬魚以候天子聞者皆駭鱘鮓地理志潤州土貢鱘鮓蘆菔鮓蠻甌志白樂天方齋禹錫饋蘆菔鮓含風鮓叩頭録房夀六月調羊酪造含風鮓野猪鮓唐酉陽雜俎安禄山恩寵莫比其所賜品目有野猪鮓苞蘆杜甫詩香飯兼苞蘆鯉鮒鮓灋次第以竹枝齎頭置日中書腹為記出酉陽嗜鮓一㗖㦯至十臠江南野史陳陶所居不與俗接唯嗜鮓一㗖㦯至十臠醢十白女醢二十人周禮醢人職女醢謂女奴曉醢者百二十罋膳夫掌王饋食醤百有二十罋覆醢禮孔子哭子路于中庭既哭問使者曰醢之矣遂命覆醢四豆之實醢人掌之執醬而饋食三老五更于太學天子執醤而饋不得不食語不淂其醤不食蒟醤武帝使唐蒙使南越南越食蒟醤如桑椹取實為醤彭越往年醢彭越千乗之家史記通邑大都醢醬千瓿比千乗之家賣醤張氏賣醤而踰侈覆瓿劉歆謂揚雄曰今學有禄利尚不能易又如太𤣥何吾恐後人覆醤瓿瓿音部小罌也魚醬晉武帝與山濤書兼致魚醤一斗榆梜醤白虎通曰榆梜醤曰􅀈􅀈音末成扵鹽風俗通曰醤成於􅐭而鹹扵鹽南宫長萬宋人醢之啟梁劉孝儀謝蝦醤啓曰龍醤傳甘退誠可陋虹醢稱遺追覺失言芍藥之醤枚乗七彂曰芍藥之醤神藥漢武内傳曰西王母謂帝曰神藥上有連珠云醤玉津金醤中有元靈之醤十二香神仙食經十二香醤以沉香等油煎成服之雷鳴風俗通曰雷鳴不得作醤食之令人腹中雷鳴百罋晉㐮公葬其夫人醯醢百罋孔掌醢署百官志掌醢署令一人丞二人掌供醢醯之物一曰鹿醢二曰兎醢三曰羊醢四曰魚醢坐須葅醢李嗣業字嗣業髙仙芝為大食所敗明日復戰嗣業曰事去矣不可坐須葅醢即馳守白石太官醢朱泚劉文喜刼衆以亂詔泚懐光攻之帝為減太官脯醢給軍鹿尾醤禄山進鹿尾醤出安禄山事迹葫蘆醬唐世風俗貴重葫蘆醤出晉公遺語葅醢姦臣競葅醢杜甫北征詩凡祭神祗享宗廟用葅醢以實豆唐掌醢六典醯十一白女醯周禮醯人女醯掌供五虀七葅凡醯醬之物王舉則供虀葅醢物六十罋供后及世子之醤醯調以醯醢醯雞莊子苦酸古詩云食梅常苦酸醯醢塩梅以烹魚肉處内醯醬處内禮和羮之用乞醯語孰謂㣲生髙直㦯乞醯焉乞諸其鄰而與之苦酒魏名臣傳曰中書監劉放曰官販苦酒與百姓争錐刀之末請停苦酒醋也風林鳴酸漢武内傳西王母謂帝曰仙藥有風林鳴酸孔誤進任廸簡李景畧表佐其軍嘗宴客而行酒者誤進醯景畧用法嚴廸簡不忍其死飲為釂徐以它辭請易之歸衉血不以聞軍中悦長者注醯于鼻来俊臣鞠囚不問輕重皆注醯于鼻桃花酸晉公遺語唐世風俗貴重桃花酸鹽醯貪食以忘軀斟不調鹽醢韓愈詩以濟百味鹽醯以濟百味李大博誌醯敖倉之粟以為酸栁宗元與李睦州書資于適口文粹江嶺之南凡是資于適口者若醯非不酸也止于酸而已華之人所以充飢而遽輟者知其鹹酸之外醇羙者有所乏耳與李生論詩書司空圖苦酸不為文粹真偽難鬻梅醯之質纇而苦酸不為也上李諌議書沈亞之趋君之指文粹醯醢之具必越海逾陸而趋君之指矣同上貯數十甕國史補舊説聖善寺閣常貯數十甕恐為蛟龍所伏致雷燕賔客㑹百官用醯醬以和羮掌醢令唐六典鹽十二白鹽曰鹹鹺祭祀之禮鹽曰鹹鹺作鹹書潤下作鹹蜀井蜀都賦云家有塩泉之井鹽梅若作和羮爾為塩梅和羮見上注形鹽形虎塩賔客之供鹽人掌塩以供百事之鹽苦鹽不涷治之塩祭祀用之散鹽練治之塩煑鹽為塩飴鹽王者膳羞供飴鹽塩之甜者今戎塩有之鬻鹽凡齊事供鬻塩鬻鹽練治者近鹽郇瑕氏之地沃饒而近塩傳減鹽價漢書宣詔曰塩人之食而價貴衆庶重困其減天下之塩價食者之將夫鹽食者之将通行有無魚鹽棗栗上谷有魚塩棗栗之利梁罝鹽後漢天竺國有梁罝塩一名身毒國官鬻張休上言塩食之急雖貴不可不湏官可自鬻載鹽第五倫客河東變姓名曰伯齊載塩往来煮鹽魏志鄧艾言司馬文王曰今因平蜀之勢以乗吳席卷之時然大舉之後将士疲勞且煮塩與比為軍農之要渠展之鹽管子曰齊有渠展之塩燕有遼東之煑虞阪之載騏驥駕塩車上虞阪遇伯樂而長鳴鹽味生晉符朗元逹識味㑹稽王道子設食食之極江左精饌食訖問曰闗内食孰若此朗曰皆好唯塩味少生即問宰夫果如其言修池徐􅊬景山為金城守修武威酒泉塩池以収虜榖軍用豐盈青紫西域記曰西海南有青塩紫塩池塩方寸半食味甚羙孔具舟以載杜中立以䕃為義武節度使舊傜車三千乗嵗輓塩海瀕民苦之中立置飛雪将数百人具舟以載自是民不勞軍食足矣鹽屯姜師度為河中尹安邑塩屯涸廢師度大彂卒洫引其流置塩屯公私収利不貲地産瑞鹽韓滉判度支方是時潦敗河中塩滉奏地產瑞塩帝疑遣諌議大夫􅃽鎮㢘狀鎮畏滉還乃賀帝且請置祠號寳應靈慶池條上新灋盧𢎞正初两池塩法弊得費不相償𢎞正使判官司空輿檢鈎釐正條上新灋即表輿両池使自是課入嵗倍用度頼之計口授鹽盧商為蘇州刺史吏以鹽法求贏貲民愈困啇令計口授塩無常額人便之㩁鹽司空輿當大中時盧弘正管塩鐵表為安邑两池㩁塩使先是法䟽闊吏輕觸禁輿為立約数十條莫不以為宜烏鹽西域骨咄有四大塩山山出烏塩凝樹黒水靺鞨有塩泉氣蒸薄塩凝樹顛鹽井南詔初安寕城有五塩井人得煮鬻自給𤣥宗詔特進何履光以兵定南詔境取安寕城及井官自鬻鹽韋處厚再遷中書舍人張平叔以言利得幸以帝建言官自鬻塩籠天下之財宰相不能詰下羣臣議處厚發十難誚其迂謬平叔愧縮遂寢三萬斛劉晏亰師塩暴貴詔取三萬斛以贍闗中自揚州四旬至都人以為神正鹽官灋劉晏正塩官灋以禆用度致塩靈座李晟既薨城塩州復故池以新塩賜宰相帝思晟乃致塩靈座佐軍食王重榮中人田令孜怒重榮據塩池之饒于時巨冦甫定國用大乏諸軍無所仰而令孜為神䇿軍使建言請二池領屬塩鐵佐軍食重榮不許奏言故事嵗輸塩三千乗于有司則斥所餘以贍軍天子遣使者諭旨不聼楊行宻事見茶門擅取成汭雲安㩁塩本𨽻塩鐵汭善取之故能畜兵五萬蛤垜鹽池李師古棣州有蛤垜塩池嵗産塩數十萬斛李長卿以州入朱滔獨蛤垜為李納所據以專利後徳棣入王武俊納乃築壘徳州南跨河以守蛤垜謂之三􅆜煑海取鹽鄭畋請以嶺南塩鐵委廣州節度使韋荷嵗煮海取塩四十萬緡市䖍吉米以贍安南穴湧鹽訶陵最冨有宂自湧塩嵗給萬三千石南平世家髙保融明宗時嵗給以塩萬三千石後不復給及世宗平淮故命泰州給之紅鹽五代于闐晉天福二年遣使来貢紅鹽化若神造非人力之功栁宗元晉問曰猗氏之塩晉寳之大也化若神造非人力之功神液陰漉甘鹵密起孕靈冨媪不愛其美無聲無形熛結迅詭廻眸一瞬積雪百里晶晶幕幕奮僨離析鍜圭鎚璧眩轉的皪乍似殞星及地明滅相射冰裂雹碎巃嵸増益大者印纍小者珠剖涌者如坻坳者如缶日晶熠熠螢駭電走亘歩盈車方尺數斗鹽如水精唐酉陽雜俎白塩崖有如水精名為君王塩塩田鄯善之東龍城之西南地廣十里皆為塩田行人所經牛馬皆布氈卧焉出酉陽雜俎吳鹽如花玉盤楊梅為君設吳塩如花皎白雪李白梁園吟傘子鹽朐腮縣塩井有塩方寸中央隆起如張􅏛名曰傘子塩酉陽雜俎陸鹽昆吾陸塩周十餘里無水自生上酪十三白以為醴酪禮太𤣥之酪漢武内傳西王母曰仙藥次有太𤣥之酪食酪得疾晉陸玩嘗詣王導食酪因得疾與導書曰雖是吳人㡬為傖鬼指酪陸機詣王武子武子指酪以示機曰東吳何以敵此機曰千里蓴羮未下塩豉賜晉起居注詔曰尚書令茍朂既久羸毁可賜乳酪太官隨日給之酪漿文選李陵書曰羶肉酪漿孔珍味穆賛兄弟皆和粹世以珍味目之賛少裕然有格為酪湩酪囘鶻駮馬國資湩酪以食婦人食酪南蠻有望蠻婦人食乳酪粟沃以酪五代仲雲國其食粟沃以酪分餉譲皇帝憲帝待益厚凡四方所獻酒酪皆分餉之瓊膏乳唐杜陽雜編懿宗迎佛骨入内道場薦瓊膏乳訶陵國所献也銀餅餤宣宗賜韋澳孫宏銀餅餤食之甚羙皆乳酪膏腴之所為唐摭言馬酪酉陽雜俎安禄山其所賜有馬酪授之壷漿子胥始東奔勾吴月渉星遁㦯七日不火傷弓于飛逼廹於昭闗匍匐于瀬渚捨車而徒告窮此女目色以臆授之壺漿全人自沉形與口滅李白漂陽瀨水貞女碑蜜十四白棗栗飴蜜以甘之子事父母蜜餌騷云粔籹蜜餌有餦餭作甘其味甘鼠矢吴志孫亮方食生梅使黄門以銀椀并盖就中蔵吏取餳一云取蜜漬梅黄門先恨蔵吏以鼠矢投餳椀中白亮吏不甘亮令破鼠矢中燥黄門乃伏罪上藥漢武内傳上藥有中華紫蜜雲山米宻買蜜東觀漢記朱祐傳曰光武微時嘗與祐共買蜜合藥後即位乃賜祐白蜜一石問曰何如長安時買蜜蜜房蜀都賦蜜房郁毓被其草孔刻廬西域自拂菻西南度磧二千里有國曰磨鄰曰老勃薩刻石蜜為廬如轝狀石蜜天竺濵海出石蜜兒啖西域康者生兒以石蜜啖之置膠于掌欲長而甘言持珤若黏云粳沃以蜜五代仲雲國其食粳沃以蜜液蜜為人崔彥曾署張佛筵液蜜為人和炭開元遺事楊國忠家以炭屑和蜜塑成雙鳯鸞蜂蜜唐杜陽編貞元八年吴明國貢鸞蜂蜜其蜂之聲有如鸞鳳而身被五色大者可重十餘斤為窠於深巖峻嶺間大者占地一二􅒪國人採其蜜不過二合如過度則有風雷之異若悮螫人則生瘡以石上菖蒲根傅之即愈其蜜色碧常貯之於白玉椀表裏徹如碧琉璃久食之令人長夀顔如童子髮白者應時而黒紅蜜同昌公主疾既甚醫者欲難其藥餅奏云得紅蜜食之可愈上令内庫淂紅蜜數石本兠離國所貢也茶花蜜雲仙散録糖為莫逆傳芳畧記陳眆得蜀糖輒以蜜澆之曰與宻本莫逆交竹蜜蜀中有竹蜜蜂好於野竹上結窠窠大如雞子有蔕長尺許窠與蜜並紺色可愛甘倍于常蜜餅十五白漢書百官表少府屬有湯官主餅餌買餅漢宣帝微時每買餅所從賣者輒大售一笥餅後漢樊煜與世祖少㳺舊徴遷河東都尉引見雲臺世祖微時常以事拘新野煜為市吏饋餅一笥帝不忘乃賜御服食及乗輿衣物因戯之曰一笥餅淂都尉何如煜頓首辭謝賣餅後漢趙岐賣餅印綬易餅魏畧太祖啁丁斐曰印綬何在曰易餅耳畵餅盧毓言有名士如畫地為餅不可啖食弱如春緜白若秋練束晢餅賦吴均餅説細如華山玉屑白似梁甫銀泥既聞香而口悶亦見色而心迷孔驛吏供餅髙元裕兄少逸出為陜虢觀察使中人責峡石驛吏供餅惡鞭之少逸封餅以聞宣帝怒召使者責曰山谷間是餅豈易具邪謫𨽻㳟陵中人皆歛手嗜乾餅西域拂菻俗喜嗜乾餅拭手宇文士及嘗割肉以餅拭手取浮土揉米屑王世充秦王傳城塹而守之世充糧具盡人相食至以水泊泥去礫取浮土揉米屑為餅積餅餌為犀象鍾傳出軍必禱佛祠積餅餌為犀象髙數尋棄餅垣外楊瑶光厯沔綏二州刺史姆饋孺子以餅妻偽受而棄之垣外人咨其㢘籠餅侯思止懶不治業詭狠無良以告變拜㳺擊将軍遷左臺御史嘗命作籠餅謂膳者曰與我縮䓗作之故時人號為縮䓗侍御賣餅黄巢復入京師于時畿民柵山谷自保不得耕士人或賣餅自業袖餅常朝記曰于琮班中有時䄂餅而食或遺同列二儀餅豐年録開元中長安物價大减兩市賣二儀餅一錢數對羊肝餅洛陽人家重陽作羊肝餅金門歳節餅師寕王宅畔有賣餅者妻甚美王厚遺其夫而取之經嵗問曰頗憶餅師否召之使見淚下如雨夲事集一餅熟成一韻詩叚維智嗜煎餅一餅熟成一韻詩摭言鳴牙餅退耕傳許康年謁劉遜贈鳴牙餅千枚曰雖微物也助厨中両日之費不暇唱渭城劉伯芻巷口有鬻餅者每當鑪謳歌一旦劉怜其貧貸以萬錢自是不聞歌聲心計轉麄不暇唱渭城矣以餅拭刀肅宗為太子上使割羊臑以餅拭刀徐噉之上喜曰保福禄當如是爱惜明皇十七事去餅緣李英公為宰相有鄉人過宅為設食客去餅縁公責之客大慙南部新書銀餅㗖宣宗賜韋澳孫宏錢餅㗖之甚羙皆乳酪膏腴之所為出唐摭言以珠易餅原化記賀知章嘗謁賣藥王老問黄白術持一大珠遺之老人得珠即令易餅與賀食賀心念寳珠何以市餅口不敢言老叟乃曰慳吝未除術何由成䄂中盛胡餅肅宗實録云楊國忠自入市衣袖中盛胡餅五色餅刻木蓮花藉禽獸形按成之累積五色酉陽雜俎嗜好十六白嗜芰芰菱也國語屈到嗜芰有疾召宗老而告之曰祭我必以芰及祥祭宗老将薦芰屈建命去曰祭國君牛奠享大夫羊士豚犬之奠庶人有魚炙之奠籩豆簠簋上下供之不羞珍異不陳庶侈夫子以私欲干國之典左史倚相曰君子以違而淂道故進退周旋惟道之從注屈建屈到之子曽晳嗜羊棗孟子曰曽子不食羊棗公儀休嗜魚人獻不受曰吾禄自可致魚受人魚罪奪禄人寜􅈕饋我太子嗜鮑魚不與賈誼書曰太公傳太子發彂嗜鮑魚公不與曰鮑不登俎不可以非禮食太子姜詩母好江魚見膾門注鄭伯有嗜酒傳伯有良宵也従厥攸好従其所好飲食男女人之大欲存焉是人之所欲好牛心王右軍嗜菖蒲周文好搥鑿聲魏明齊好竽聲孔稻梁膾䏑韓愈贈崔羣書疑者曰君子當有所好惡不可不明如清河者人無賢愚無不説其善服其為人以是而疑之耳僕應之曰譬之扵食物至于遐方異味則有嗜者有不嗜者至扵稻也梁也膾也䏑也豈聞有不嗜者哉疑者乃觧饙飯乾脯崔衛公好食新捻頭杜邠公悰每早食饙飯乾脯出摭言蜇吻裂鼻縮舌澁齒栁宗元讀毛頴傳大羮元酒體節之薦味之至者而又設以竒異小蟲水草查梨橘柚苦鹹酸辛雖蜇吻裂鼻縮舌澁齒而咸有篤好之者文王之菖蒲葅屈到之芰曽晳之羊棗栁宗元文文王之菖蒲葅屈到之芰曽晳之羊棗然後盡天下之竒味以足扵口食器十七白維筐及筥于以盛之維筐及筥䟽以逹春食麥與羊其器䟽以達髙以粗夏食菽與彘其器髙以粗㢘以深秋食稻與魚其器㢘以深閎以奄冬食黍與鴈其器閎以奄圜以閎中央士食黍與牛其器圜以閎器之漑者禮御食於君君賜餘器之漑者不寫其餘皆寫注云重汚君器漑謂陶梓之器不溉謂雚茅之器操以受命記凡苞苴簞笥問人者操以受命如使之容注苞苴裏魚肉或以葦㦯以茅或以簞笥熟肉簞食瓢飲顔回奪釡史記曰蔡澤入于趙見逐入韓之魏遇奪釡鬲於塗不置箸上召亞夫食獨置大胾無切肉又不置箸注胾大臠也桉上三杯朱博儉借箸張良借前箸以籌之無下箸處何曽日食萬錢既作象箸必作玉杯琉璃晉武幸王氏家食器盡琉璃玉巵無當當底也孔折箸于琮尚永福公主主未降食帝前以事折匕箸帝知不可妻士大夫更詔尚廣徳公主不過一器栁公綽歳歉饉其家雖給而每飯不過一器嵗豐乃復用器止烏漆鄧景山清約子弟饌不過草具用器止烏漆散風奩郭代公愛姬薛氏貯食物以散風奩出品物類聚記玉精盌馬侍中嘗寳一玉精盌夏蝇不近盛水經月不耗或目痛舎之即愈泛水磁元載凡飲食冷物用硫黄椀熱物用泛水磁噐有三千事出樞要録賽饌木盤簇韓愈城南聮句月光明素槃跪進彫葫飯月光明素槃李白宿五松山下黄金盤李白贈從弟象牀綺食黄金盤白甌青竹箸白公過李生詩白甌青竹箸儉㓗無膻腥肴核分飣餖韓愈南山詩或如臨食按肴核分飣餖金平脱犀頭匙箸唐酉陽雜俎賜安禄山品目有金平脱犀頭匙箸犀箸杜詩麗人行犀箸厭沃久未下賜食十八白賜之玉食書惟辟玉食謂美食與之禮食傳晉侯以魏絳為能以刑佐民與之禮食使佐新軍注禮食以表其功公賜之食傳頴考叔有獻于公公賜之食食舍肉飫賜傳將賞為之加膳加膳則飫賜注飫賜以酒食賜下無不飫足食存人欲賜表主㤙逮下之澤頒賜周禮凡肉脩之頒賜好賜又曰凡王之好賜肉脩則饔人供之注好賜王所善而賜之正席先甞君賜食必正席先嘗之敬君之恵也賜腥君賜腥必熟而薦之注云薦其先祖也侍食於君君祭先飯懐餘肉史記詔賜東方朔食于前飯已盡懐餘肉去衣盡汚賜食於家如在上前漢萬石君記曰若賜之食而君客之則命之祭然後祭先飯徧甞羞飯而俟命之品甞之然後唯所欲君未覆手不敢飱食勸食也飱者三臣勸如是食多魏都守曲阜好酒食飲兼人每賜食於前大飲長歠左右相屬數人益之乃供太祖壯之賜果禮曰賜果於君前其有核者懐其核後漢桓榮春卿詔賜竒果受者皆懐之榮獨舉手捧以拜帝笑曰真儒生也孔分餉譲皇帝憲帝親待愈益厚尚食揔監及四方所獻異饌皆分餉之給政事食蘇頲加知制誥給政事食給食自頲始甘羙必賜李林甫凡御府貢逺方珍鮮使者傳賜相望帝食有所甘美必賜之賜食帝前王方翼引見奉天宫賜食帝前麫豆韓偓李茂貞疑帝間出依全忠以兵衛行在帝行武徳殿前因至尚食局㑹學士獨在宫人招偓偓至冄拜哭曰崔𦙍甚健全忠軍必濟帝喜偓曰願陛下還宫無為人知帝賜以麫豆而去熱洛河哥舒翰素與安禄山安思順不平帝每欲和觧之㑹三人俱来朝帝使驃騎大将軍髙力士宴城東翰等皆集詔尚食生擊鹿取血瀹腸為熱洛河以賜之防風粥見粥門諸王從事翰林學士每遇賜食有物若畢羅形絶大滋味香羙􅃅諸王従事雜說慕風迎致張士衡太子承乾慕風迎致謁太宗洛陽宫帝賜食七寳床賜食太白以七寳床賜食御手調羮以飯之集序殿前羣公賜食罷驊騮蹋路驕且閑韓文推食之賜用勸勲勞置醴之恩以待賢彦元稹謝賜設狀空懐滿腹之慙未有沃心之便上召對浴堂門徳宗雅尚文學每幸學士院顧問錫賚無所不至御膳珍肴輟而賜之仍詔尚食奉御每日賜寂御膳裴寂以御膳分賜𤣥宗貴妃楊氏他日以譴還銛第比中仄帝尚不御食笞怒左右髙力士欲驗帝意乃白以殿中子帳司農酒餼百餘車送妃所帝即以御膳分賜力士知帝㫖是夕請召妃還内出牢饌張説復為右丞相上曰勑所司供帳設樂内出牢饌唐文引坐賜食惟陳覺查文徽得奏事羣臣非召見不得入賈崇詣閤求見景曰陛下新即位所信用者何人奈何頓與臣下隔絶臣老即死恐無復一見顔色因泣下嗚咽景為之動容引與坐賜食而慰之江南李景五代史召賜食傅奕初九年太白躔秦分奕奏秦王當有天下帝以奏付王及太宗即位召賜食謂曰向所奏㡬敗我雖然自今毋有所諱而不盡言與食十九白求食食我少施氏食我以禮嗟来之食予惟不食嗟来之食以至扵此簞食趙宣子見翳桑餓人與之簞食靈輟也乞食史記伍子胥夜行晝伏吹竽乞食於吴市君子茍無禮雖美不食禮與塊重耳乞食于野野人與之塊為食於路黔敖以食餓者晨炊蓐食韓信常從南昌亭長寄食数月長妻患之乃晨炊蓐食食時信往而不為具食信乃自絶而去也求餘鵝晉庾悦嘗食鵝劉毅字希樂求其餘不應毅衘之義熈中奪悦豫章觧其軍府使人微示其㫖悦忿懼而死孔丐食取給李揆江淮飬疾貧無禄丐食取給置甌杓道上陽城為道州刺史日炊米二斛魚一大鬵置甌杓道上人共食之投擲傾脯醬中盤進橙栗投擲傾脯醤韓愈詩搥炰列珍羞我来感意氣搥炰列珍羞過汪氏别業李白授之壷醬溧陽黄山里史氏之女身擊漂以自業子胥始東奔勾吴月渉星遁或七日不火傷弓于飛逼迫於昭闗匍匐於瀨渚捨車而徒告窮此女目色以臆授之壷漿全人自沉形與口滅溧陽瀨水貞義女碑李白漂母進食沒受千金之恩同上一臠殘䏑姚洪董璋反以書招洪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘䏑感恩不已姚洪傳五代史饋食二十白漂母哀王孫而進食漢書漂母飯韓信信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎後信賜以千金僖妻賢公子而饋飱傳僖負羈之妻賢公子重耳乃饋盤飱寘璧公子受飱反璧食我以禮孔子曰吾食扵少施氏而飽少施氏食我以禮親饋禮主人親饋則拜而食操醬禮獻熟食者操醤虀空器荀彧文若初董昭欲進曺公九錫彧以為不可及彧病操饋之食發視之乃空器也遂飲藥卒孔饋鹿裴休有饋鹿者諸生共薦之休不食曰蔬食猶不足今一啖肉後何以繼瓦器饋脱粟鹽蔬宇文融與崔隐两劾張説引術士王慶則夜祠禱觧而奏表其閭兄光刑耳列寃帝遣髙力士往視説蓬首垢靣席藁家人以瓦器饋脱粟塩䟽為自罰憂懼者求珍味饋従官崔日用為芮城尉則天幸長安路次陜州宗楚客時為刺史日用祗共頓事廣求珍味稱椘客之命徧饋從官椘客知而大加賞歎盛稱薦之舊史異味二十一白必嘗異味傳子公之食指動以示子家曰它日我如此必嘗異味及入宰夫將解黿染指於鼎嘗之而出炰鼈鱠鯉詩封熊之蹯翰音之跖雞跖鷰髀髀股也必爾反猩脣肉之美者猩猩之脣臑鼈炮羔臇鳬煎鴻䐪臛也子兖反􅀈牛之股芍藥之醤薄耆之炙秋黄之蘇白之茹蘭英之酒凝脂之飯竝文選春卵夏笋秋韮冬菁鱻薧之物鮮生肉薧乾肉也體名禽獸支節肉物胾蹯之屬孔異饌譲皇帝憲帝親待益厚四方所獻異饌皆分餉之雩肉南蠻室利佛逝有獸類野豕角如山羊名曰雩肉味美以饋膳賔客不能名其饌裴冕每廣㑹賔客不能名其饌禽殻韓愈納凉聮句盤肴饋禽殻遐方異味至扵遐方異味則有嗜者有不嗜者韓愈與崔羣書御厨駱驛送八珍杜甫䴡人行清觴異味情屢極贈姜七少府詩異味煩縣尹數杯資好事異味煩縣尹贈鄭十八豹胎歸来煮豹胎饜飫不能飴杜牧詩素麟脂班螭髓謝𤣥卿遇神仙設素麟脂班螭髓續神仙傳天子食二十二白膳羞膳夫掌王之食飲膳羞凡王之饋食用六榖膳用六牲飲用六清羞用百有二十品醬百二十罋注此王舉之饌也六榖稌黍稷粱麥􅋎也六牲馬牛羊豕犬雞也六清水漿醴涼醫酏八物淳熬淳毋炮豚炮䍧檮珍漬熬肝膋也一舉王日一舉注云殺牲盛饌日舉一舉謂朝食侑食甞食以樂侑食膳夫授膳祭品嘗食王乃食注曰侑勸也禮飲食必祭示有所先也每品食皆嘗之不舉大䘮大荒大札天地有災邦有大故則不舉燕食謂王者日中與夕食奉膳奉進也稍事非日中大事之時而間食謂之稍事不㑹歳終惟王及后之膳不㑹注云不計多少優劣尊也膳以供王之膳孟春食麥與羊孟夏食菽與彘稷與牛季夏中央土乃以彘甞麥孟夏稻與魚孟秋農乃登榖天子甞新孟冬黍與鴈孟冬天子之閣左達五右達五共十閣倉庫冬生菜召信臣字翁卿為少府奏大官冬生葱韮茹覆以屋廡夜㸐藴火待温氣乃生之不時之物有傷扵人奏罷之也注云㸐古然字充君之庖天子四食白虎通曰天子日四食明有四方之物平旦食太陽之始晝食太陰之始晡食少陽之始暮食少陰之始孔禁膳劉晏領東都租庸鹽鐵常平使時大兵後京師斗米千錢禁膳不兼時甸農挼穂以輸晏乃自按行嵗輸始至天子大悦省薄御膳張鎰建中二年同平章事明年以两河用兵詔省薄御膳及皇太子食物鎰因奏減堂飱錢及百官廪奉三之一以助用度不掌膳晉陽公主薨帝閲三旬不掌膳九飣食盧氏雜説唐御厨進食用九飣食以牙盤九杖装食味于其間置上前亦謂之香食尚食奉御掌天子之常膳隨四時之禁適五味之宜注春肝夏心秋肺冬脾皆時王不可食唐六典嘗祭食必先嘗同上薪柴二十三白薪蒸傳藪之薪蒸虞矦守之大曰薪小曰蒸収秩月令季冬命有司収秩薪柴以供郊廟及百祀之薪燎析薪匪斧不克詩析薪如之何匪斧不克鬼薪漢法罪人徒者使伐鬼薪以供宗廟後来居上陛下用人如積薪後来者居其上汲黯謂武帝云負薪朱買臣見夫婦離門不流束薪曵柴逺揚詩取彼斧戕以伐逺揚薪之詩云芃芃棫樸薪之槱之烘燎詩樵彼桑薪卭烘于甚卭我也錯薪詩曰翹翹錯薪言刈其椘委人以法供祭祀之薪蒸木材賔客供其薪芻喪紀供薪蒸木材軍旅供委積之薪芻凡疎材共野委野委謂廬宿止薪芻也又九式七曰芻秣之式桂玉戰國䇿蘇秦之椘三日乃見王曰椘國食貴於桂薪貴於玉負薪其父析薪其子不克負薪勞薪破車脚枯梧列子曰枯梧樹者鄰父曰枯梧不祥伐之鄰母因請為薪鄰父乃不悦尺燼納薪炙筆硯顔裴字文林為京兆守課人置薪两束當輸租時納備寒用炙筆硯薪是穫尚可載哀我憚人亦可息大車詩刺人勞也有洌氿泉無浸穫薪見毛詩桐薪巨斧擊桐薪不待利時良日然後破之淮南子綢繆束薪曲突徙薪棄薪汝南先賢傳曰蔡順以至孝稱順少孤飬母嘗出求薪有客卒至母望順不還即心動棄薪馳歸問其故母曰有急客来吾噬指以悟汝也如束濕薪史寗成為漢中尉嚴酷時人語曰謹上操下如束濕薪孔伐街苑樹劉義節從平京師時傾府庫為軍賞帑財太乏義節曰若伐街苑樹為薪以易布帛歳數十萬可致落葉添薪仰古槐元稹詩玉饌燃薪桂同上負薪杜甫至秦州負薪采橡栗自給燎薪屬道楊行宻傳朱瑾徙屯安豐汴將牛全節苦鬪㑹大雪士多凍死頴州刺史王敬蕘燎薪屬道汴軍免者数千人出城樵拾徐文逺洛陽飢文逺自出城樵拾為李宻所得或燻若柴槱韓愈南山詩黄金買尺薪李白送魯郡劉長史積薪就陽劉禹錫管城縣驛記稍柴薪之栁宗元霹靂琴賛桐生石上一夕暴震倒卧道上震旁之民稍柴薪之樸樕皆薪材文粹陸龜蒙送小雞山樵人序土山無大材木率生小櫟樸樕皆薪材歌曰長其船兮利其斧輸其薪兮勿予侮壠坂長李白北上行採薪壠坂長枯薪夫溝中之木與犧象同體追琢不至坐成枯薪劉禹錫上宰相啟明燃林中薪杜甫携粮負薪李白詩来日一身携粮負薪道長食盡苦口焦唇帝負薪馬上助役髙䴡傳帝至渤錯水阻淖八十里車騎不通長孫無忌楊師道等率萬人斬樵築道聨車為梁帝負薪馬上助役十月兵畢度負填道之薪則精感天地鬻薪自給唐史韓思復以親喪鬻薪自給虞部凡五嶽及名山能藴靈産異興雲致雨有利於人者禁其樵採唐六典芻草二十四白秩芻月令季冬命有司合秩芻以飬犧牲注芻草税也草刈則墨未發秋政則人不敢草也草刈是刈取草也秋則草木成可刈澤農之貢草貢周官秸服禹貢納秸芻蕘芻秣之式周禮九式七曰芻秣之式峙乃芻茭書編菅秉秆傳椘爇郤氏或取一編菅焉或取一秉秆焉投之遂不爇注秉杷也既乖草稅無縦莠言宜正竹刑孔水草甘薦裴延齡妄言長安咸陽間得阪艿數百頃願以為内廐牧地水草甘薦與閑廐等芻藁李晟言今河中米斗五百芻藁且竭中宫所賣荘宗皇后劉氏好聚歛分遣人為商賈至於市肆之間薪芻皆稱中宫所賣卧一束芻五代馮道居軍中不設床席卧一束芻求芻子固異於牛馬兮寕止乎飲水而求芻韓愈復志賦茭芻填􅌎瀕海棄地茭芻填􅌎一夫之勤百畆可獲權徳輿文岐公碑峙芻就燥劉禹錫管城驛記以食牛羊文椊劉蛻梓州文塜銘腐為墟壌生芻藁以食牛羊菜二十五白季秋務蓄菜月令㫖蓄詩曰我有旨蓄可以禦冬野人獻芹屈到嗜芰踐葵魯漆室女曰昔有客繫馬園中馬逸踐予葵使予終歳不飽葵祭韮秋韮冬菁葑菲詩云采葑采菲無以下體注葑菲蔓菁與葍之類也其蔌維何維筍及蒲蔌菜也烹葵及菽七月其甘如薺釋菜合舞釋菜禮先師菜蘋蘩之屬葱渫處末渫蒸也處醯醤之末鴽醸之蓼醸謂雜切蔬食語茹葷荘子云顔囘不茹葷三月切葱若薤禮有畦殖貨志云菜茹有畦百本薤龔遂為渤海太守教人種百本薤五十本葱一畦韮冬生菜見上注噉薤留白庾亮噉薤留白云可以種陶侃歎曰非唯風流兼有為政之實緑葵含露白薤負霜堇荼如飴詩䓗必寸㫁後漢陸續字智伯初下獄知母自餉食曰母所作羮其䓗必寸斷韮曰豐本祭宗廟之禮擇䓗薤禮為君子擇䓗薤必絶其本末注為有萎乾也灌園嵇康與呂安灌園扵山陽碧海之琅菜漢武内傳西王母曰仙之上藥有碧海之琅菜孔鬻蔬蘇良嗣尚方監裴匪躬案諸苑建言鬻果蔬儲利佐公上良嗣曰公儀休一諸侯相拔葵去織未聞天子賣果蔬與人争利遂止渾提葱西域泥婆羅貞觀二十一年遣使入獻波稜酢菜渾提葱佛土菜西域傳貞觀二十一年有健逹王獻佛土菜莖五葉赤華紫湏末禄蔬有果䓗葛藍軍達茇薤掇蔬本以供御渾瑊帝狩奉天朱泚兵薄城人心危惴或夜縋出掇蔬本以供御數杯唐盧懐慎日晏設食菜數杯諸葛菜劉公嘉話云諸葛所止令兵士獨種蔓菁菜取其纔出甲可生啖葉軟可煮食比諸菜属其利不亦博乎三蜀江陵之人今呼蔓菁為諸葛菜是也山谷多薺髙力士逐扵巫山山谷多薺而人不之食因為詩寄意两京作斤賣五溪無人採夷夏雖有殊氣味終不改出明皇雜録頗陵菜之菠薐者本西國中有僧自彼将其子来國名頗陵語訛為菠薐出嘉話録澗蔬煑蒿芹韓愈陪杜御史遊詩柔蔬傲霜而秀折劉禹錫椘望賦曲江拾菜二月二日曲江拾菜土民逰極盛出李綽秦中歳時記半堂食吴初朝中大臣多蔬食月為十齋齋之明日太官具晚膳始復常珍謂之半堂食至是果盡割淮南之地去唐土封疆之半九國志今一啖肉後何以繼裴休有饋鹿者諸生共薦之休不食曰蔬食猶不足今一啖肉後何以繼苦苣刺如針馬齒葉亦繁杜甫園官送菜苦苣刺如針馬齒葉亦繁青青嘉蔬色埋沒在中園畦肥剪韮薤韓文日一蔬食李輔國矯制遷明皇於西宫帝戚戚不樂日一蔬食野蔬拾新柔韓文聮句孟郊孟娘菜江淮有孟娘菜並益肉食酉陽雜俎携兒挑菜叩頭録曰郭元神空貧無食春月携兒挑菜野蔬一日有餘三日不出暮苣有蒲採江之菜兮暮苣有蒲笠澤叢書清晨蒙菜把常荷地主恩杜甫園官送菜詩葵昏又如馬齒盛氣擁葵荏昏同上詩野蔬蓬莠獨不樵野蔬暗泉石蒼耳况療風童兒且時摘杜甫驅豎子摘蒼耳詩登床半生熟下箸還小益放筐亭午際洗剥相蒙羃登床半生熟下箸還小益加㸃𤓰薤間依俙橘奴跡同上詩園蔬抱金甲無以供採掇同上鴨脚葵白居易園蔬鴨脚葵野茹紫花菁赴忠州詩同上䞉蔬雲矗以委圃歐陽詹徳勝頌文粹炭二十六白伐薪為炭月令季秋豫讓吞炭掌炭林衡掌炭之徴令以時入之權量受之供國用陰陽為炭隧炭椘獲吴舟使隨人守之環而塹之及泉盈其隧炭陳以待命廢於鑪炭邾荘公􅄶急執夷射姑不得怒自投於床廢於鑪炭廢墜也蜃炭華元樂舉葬文公用蜃炭注以禦濕也熾炭于位寺人栁有寵太子佐惡之太子居喪栁熾炭于位太子將至則去之欲其温煖又有寵炭輕重淮南子曰水勝故夏至濕火勝則冬至燥燥則輕濕則重故先冬至夏至懸土炭于衡各一端令適停冬至陽氣至則炭仰而鐡低夏至則炭低而鐡仰也禁王莽欲防人盗鑄禁人不挟銅炭獸炭晉羊琇屑炭和作獸形掘得交州記曰竈頭山越王炊㸑之處掘淂炭難合淮南子曰譬如冰炭紐繩也何時而合注曰冰寒炭熱無時得合天帝裝炭越王勾踐有寳劒五薛燭曰當造之時雨師洒掃雷公擊橐蛟龍捧爐天帝装炭啟庾肩吾云識慙曼倩似見昆明之炭清愧伯鸞不復因人之熱劉孝威謝東宫賚炭啟曰洛城雪深不見海神之跡呼沱氷合無待王覇之覘聚而為岳大北黒山稱之以舩將重牙獸鑪生烽熖室滿紅光雉裘入而識奢鼠布焚而無汚孔掌供薪炭百官志鈎盾署令二人丞四人監事十人掌供薪炭三斗楊徳幹厯澤齊汴相四州刺史有威嚴時語曰寜食三斗炭不逢楊徳幹以木炭歸司農杜佑兼鹽鐵使以木炭歸司農韛炭五代王彦章晉取鄆州末帝乃召彦章為招討使馳両日至滑州陰遣人具舟於楊村命甲士六百人皆持巨斧載冶者具韛炭乗流而下趋徳勝舟舉鏁燒㫁之立獸炭徳宗帝紀大厯十四年十月戊午罷九成宮貢立獸炭瑞炭唐開元遺事西涼國進炭百條各長尺餘其炭五色堅如鐵石名曰瑞炭燒於爐中無熖而有光雙鳳唐開元遺事楊國忠家以炭屑同蜜相和塑成㕠鳳至冬月則􅅡爐中三城絶品炭三賢典語曰李華燒三城絶品炭以龍腦褁芋魁煨之炭精張燕公有石緑鏡臺得自胡川道士𤣥宗聞其異取以炭精十車燒之不變乃已出品物類聚錬炭洛下有豪子飲食鮮華有李使君為具召之曾不下箸至飯李曰此以炭炊豪子勉食一匙曰凡以炭炊先錬炭謂之鍊炭方始無煙氣此亦非也劇譚録飛雪㫁道冰成梁矦王燒炭彫玉房蟠龍吐耀虎喙張熊蹲豹躑争低昻攅巒叢崿射末光丹霞翠霧飄竒香栁宗元行路難厨二十七白大庖不盈詩君子逺庖厨也厨車載食車良庖庖丁解牛厨食漢詔吏或飾厨傳稱過客言盛庖厨稱過客之意刀匕是供膳夫充君之庖田獵一為乾豆二為賔客三為充君之庖㸑當㸑無清之人言厨饌之薄也荘子蠟燭炊石季倫以蠟燭炊出世説㸑鼎荘子云有人冬㸑鼎夏造冰同㸑緦禮曰同㸑緦厨傳李倄飾厨傳覆銀瓦㸑香火南蠻婆賄伽盧國厨覆銀瓦㸑香火武臣私厨郄士美充昭義節度使昭義自李抱真以来皆武臣私厨月費米二千石羊千首酒数十斛潞人困甚士羙至悉去之出廩錢市物自給同㸑崔郸崔氏四世緦麻同㸑無它㸑崔𤣥暉貧寓郊墅羣從皆自逺㑹食無它㸑郇公厨長安後記曰韋陟厨中飲食之香錯雜㦯人入於中多飽飫而歸俗語曰人欲不飯筋骨舒夤縁湏入郇公厨長安四月已後自堂至百司厨謂之櫻笋厨咸鎬故事可十人具常衮故事日出内厨食可十人具衮奏罷之牓厨内厨楊輝僖皇末權樞宻事饌甚精四季皆牓厨符江淮大賈使主堂厨李徳裕始二省府符江淮大賈使主堂厨食利因是挾貲行天下所至州鎮為右客富人倚以自高徳裕一切罷之勑厨倍常羞杜甫鄭典設歸詩勑厨倍常羞杯盤頗狼藉中書堂食不可食五代蘇逢吉已貴益豪侈謂中書堂食不可食乃命家厨進羞水陸曾不下箸韋陟每食視厨所棄其直猶不减萬錢宴公矦家雖極水陸曾不下箸冨家厨内臭杜甫摘蒼耳詩竹裏行厨洗玉盤嚴公携酒饌詩白孔六帖卷十六
