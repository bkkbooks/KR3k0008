body:
  text: 白孔六帖卷二十八唐白居易原本宋孔𫝊續撰節操一髙潔二修整三縱逸四風流五剛六豪彊七柔八􅄶急九儉十勤十一怠惰十二節操一白風雨淒淒雞鳴喈喈雞猶守時喻君子不改其度達節子臧曰聖達節謂不守小節守節次守節謂善人守其節若子臧季札之屬失節子臧曰不失節雖不能聖敢失守乎季札曰雖不才願附子臧以無失節不以利累形荘子曰能尊生者不以養身雖貧賤不以利累形也屠羊說辭賞屠羊説楚昭王出奔王反賞之説曰大王反國説反屠羊何賞之有申包胥逃賞楚昭王反國賞中包胥包胥曰吾為君也君既定矣又何求遂逃賞苦節易曰介于石苦節不可貞也天地節而四時成節以制度不傷財不害民虞吉有他不燕虞專也專則吉來他則不安言介節也我心匪石不可轉也我心匪席不可卷也砥礪亷隅雖分國如錙銖不臣不仕其規為如此通分有恒魏盧欽著書稱徐邈曰志髙行絜髙而不狷絜而不介聖人以清為難而徐公所易或問曰武帝時人以為通自凉州還京師以為介何也答曰徃者崔毛用事貴清素士人皆變易車服而徐公不改故人以為通比來奢僣轉相放效徐公雅尚自若故前日之通乃今日之介是世人無常而徐公有常也徐邈字景山不可屈之色晉庾衮有異行頴出太守以功曹命之不俟駕而徃請受天下之役適遭遇之逡廵形益恭而有不可屈之色乃厚禮而遣之懔然節槩楊燀書曰西河魏文侯之居有段干木田子方之遺風其人懍然有節㮣知去就之分也布衣之戀後漢孔僖曾祖子建與崔篆交善篆事王莽勸子建仕對曰吾有布衣之戀子有衮冕之志其道乖矣非耕不食後漢周爕有先人草廬結于岡畔下有陂田常肆勤以自給非身所耕不食也於陵仲子齊之巨擘公孫丑曰陳仲子豈不誠亷士哉孟子曰於齊仲子為巨擘亦焉能亷以兄之禄為不義之祿而不食以兄之室為不義之室而不居避兄離母居於陵身織屨妻辟纑以易衣食以母則不食以妻則食豈能充其類也魏王襃字偉元計口而食嘗刈麥人助之襃棄之不累主人晉劉寔清身行無瑕玷窶貧每憇止薪水自給不累主人口不言貨財手不執珠玉崔洪口不言貨財手不執珠玉汝南王以琉璃鍾行酒與洪洪不執過姊飯留錢後漢范丹字史雲候姊病姊飯之以姊夫不徳乃留錢二百動不累髙晉謝鯤通簡有恒有識者服其逺暢而恬於榮辱自處若穢而動不累髙不失漢節蘇武不肯乗車袁閎夏甫父賀為彭城相閎徃省謁變姓名徒行既至數日吏不敢通阿母出見驚白夫人乃宻呼入去賀遣車送之閎稱眩疾不肯乗車歩擔告歸趙孝長平王莽時父為田禾将軍以父任為郎告歸嘗白衣歩擔欲止郵亭亭長以孝将至灑掃待之孝不告其名長不肯納因問曰聞田禾將軍子當過何時到乎曰尋即到矣不食饋食閔仲叔世稱節士鄉黨見其含菽飲水或遺之受而不食也不受報恩金雷義字仲公濟人死罪以金二斤謝之義不受人伺義不在黙投承塵上義葺屋得之其人已死無所還乃以金送縣口腹不累閔仲叔客居安邑老病家貧不能得肉日買猪肝一片屠或不肯安邑令聞勑使常給仲叔知而歎曰閔仲叔豈以口腹累安邑哉遂去客沛壽終不取於人常林字伯槐單貧自非手力不取於人不取死鹿晉郭文猛獸殺大鹿於文菴側文以語人人取賣分錢與文文曰我若湏錢當自賣之所以相告正以不取聞者皆嗟嘆之不取魚貴價任嘏家貧賣魚㑹官發魚價貴數倍嘏取直如常贖生口任嘏嘗與人共買生口每價八匹絹生口家來贖直六十匹共買者欲随時價取嘏自取本不過從兄飯帝問第五倫伯魚曰聞卿為吏不過從兄飯有之乎倫曰臣少遭飢亂寔不妄過人飯不留姊家沐並徳常過姊姊為殺雞炊黍而竞不肯留郭翻墜刀於水人為取得便與其人不受遺翟陽字道淵始安守于寳與陽通家遺陽一舩勑史曰翟公亷譲致書訖委舩而還陽既無反致乃以貨之買絹物寄還寳寳本以為惠而反煩之益嘆媿焉如水清如玉㓗如霜眀如雪净計口而食見上注孔生平重節義皇甫無逸父誕隋并州緫管府司馬漢王諒反逼之不從見殺無逸在長安聞變即號慟人問故對曰吾父生平重節義必無茍免者頃使至果然挺節無穢聲裴矩虞世基用事官以賄遷惟矩挺節無穢聲世頗稱之臨難不易節長孫無忌帝曰朕嘗評公等可否以相規謂髙士亷心術警悟臨難不易節所乏者骨鯁耳孤操自將李渤孤操自将不茍合于世人咸謂之沽激屢以言斥而悻直不少衰守節者尚之䝉素刃姚思亷授秦王府文學王討徐圎朗嘗謂隋事慨然嘆曰姚思亷䝉素刃以明大節古所難者時思亷在洛陽遣使遺物三百段致書曰景想節義故有是贈操履無玷郝處俊武后雖忌之以其操履無玷不能害完節自髙白居易賛曰當宗閔時權勢震赫終不附離為進取計完節自髙不為聲利所遷韋况雖世貴而志沖逺不為聲利所遷當時重其風操不阿貴近權萬紀帝以為不阿貴近繇是奨禮不以墅奉宰相蕭復廣徳中嵗大飢家百口不自振議鬻昭應墅宰相王縉欲得之使弟紘説曰以君才宜在左右胡不以墅奉宰相取右職復曰鬻先人墅以濟孀單吾何用美官使門内餒且寒乎士大夫壯其節董晉右丞元琇為韓滉排笮得罪滉勢振朝廷晉見宰相誦元琇非罪士大夫壮其節有風節武儒衡論議勁正有風節賜鞭張建封還鎮帝又使左右以所持鞭賜之曰卿節誼嵗寒弗渝故用此為况建封又賦詩以自警勵挺挺有大臣節鄭肅太子母愛弛廢斥有端肅因入見言天下大本不可輕動朝廷謂肅臨義不可奪挺挺有大臣節守節清苦孔戣韓愈上疏其為人守節清苦論議正平不為齷齪小謹杜牧剛直有竒節不為齷齪小謹著名節奚陟少自砥厲著名節務為寛平惇大源乾曜為相十年與張嘉貞張說李元紘杜暹同秉政居中未嘗廷議可否晚節唯唯聮署務為寛平惇大故鮮咎悔晚節苛慘韓滉晚節益苛慘故論者疑其飾情希進既得志則彊肆盖自其性云終始完潔衛次公其節尚終始完潔臣節之光李源長慶初年八十矣御史中丞李徳裕表薦源曰賈誼稱守圍扞敵之臣誠死封疆天寳時士罕伏節逆羯始興委符組棄城郭者不為恥而憕約義同列守位自如抵刃就終臣節之光天下思其風烈裴度及沒天下莫不思其風烈終不屈賊郎餘令祖楚之持節諭山東為竇建徳所獲脅以白刃終不屈賊無愧先烈袁承序髙宗之為晉王也太宗崇選僚屬問梁陳名臣子弟誰可者岑文本曰昔陳亡百司奔散有袁憲者朝服立後主傍白刃不避也王世充篡隋羣臣表勸進而憲子給事中承家稱疾不肯署今其少子承序風操清亮無愧先烈帝乃召拜晉王友任義節段文昌任義節不為齷齪小行帝竒其節蔣儼太宗将伐髙麗遂請行為莫離支所囚以兵脅之不屈内窟室中髙麗平乃得歸帝竒其節授朝散大夫臨事不可奪王及善清正自將臨事不可奪有大臣節先軫免胄以立誠鋤麑觸槐以取䘮富辰懟諫而赴翟仲由結纓而為壯其節則全於大機則無以尚也盧藏用紀信碑以清操顯蕭復常衣垢弊居一室學自力非名士夙儒不與㳺以清操顯華每嘆曰此兒當興吾宗孤特一槩蕭俛以聲利為汙疾邪太甚孤特一槩故輕去位無所藉英烈言言如嚴霜烈日段秀實賛雖千百嵗其英烈言言如嚴霜烈日可畏而抑哉弱操媿筠杉韓文雨中聨句承家節操尚不冺杜甫終明府水樓名節不可一槩論郭代公倜儻不羈之士也少不以名節自檢當蕭牆内難保䕶睿宗雖履危機竟全臣節則名節不可一㮣論窮愁志懐志㓗操貟半千上書行年二十懐志㓗操未蒙一官多君秉古節嶽立冠人曹李白詩峻節冠雲霄同上髙㓗二白鑑明則塵垢不汚神清者則嗜慾不誤閔損字子騫不仕大夫不食汚君羞與鄉人處孟子曰伯夷非其君不事非其民不使羞與鄉人處如以朝衣朝冠而坐於塗炭也崔洪口不言貨財王夷甫口不言錢李膺髙克無所交接唯以荀叔陳寔為師友嵇康叔夜性逺趣率然𤣥逺范史雲之清後漢范丹史雲清節聞閭里中得盗芻藁僮吏怨曰汝之清髙豈范史雲軰而云不盗我菜乎丹自嘆云云不曰白乎湼而不緇語獨清屈原孔像圖固辭朱敬則張易之等集名儒撰三教珠英又繪武三思李嶠蘇味道李逈秀王紹宗等十八人像以為圗欲引敬則固辭不與世潔其為人左右圗史楊綰性沉靖獨處一室左右圗史凝塵蒲席澹如也性髙鯁不耐浮沉於時去居南陽倚帝山請𨽻道士籍吴筠其輕去近髙泌之為人其輕去近髙賛網羅在天大業中舉孝悌亷潔授秘書省正字不樂在朝求為六合丞以嗜酒不任事時天下亦亂因劾遂解去嘆曰網羅在天吾且安之乃還郷里王績傳終始完潔衛次公善琴方未顯時京兆尹李齊運請授之法次公拒絶因終身不復鼓其節尚終始完㓗修整三白修身踐言言不過辭動不過則心正而後身修身修而後家齊君子澡身而浴徳三省吾身曾子不冠不入馬援事嫂遇妻子如嚴君張湛居家修整晉王劭有風操家人近習未嘗見墮簮之容居室言善千里應之名教自樂晉王澄平子任放樂廣曰名教中自有樂事何必乃耳攝以威儀危坐茅容季偉與等軰避雨樹下衆皆夷踞相對容獨危坐愈恭郭林宗見而竒之静以保身悟身之是患黙而思道知道之無為盡飾之道修容曾子與子貢入其廐而修容焉孔趙光逢規矱自持晚塗修潔于邵雅修飭王紹宗雅修飭當時公卿莫不慕恱其風張易之兄弟亦頗結納易之誅坐廢為人醖籍裴休為人醖籍進止雍閑宣宗嘗曰休真儒者早修整盧奐早修整為吏有清白稱檢身厲行賈耽檢身厲行自其所長每歸第對賔客無少倦私居束帶正色柳仲郢每私居内齋束帶正色服用簡素縱逸四白史丹儻蕩無檢而心謹宻阮籍不拘禮教字嗣宗外坦蕩而内淳至率意獨徃車轍所窮輙慟哭而返訪戴王子猷居山隂夜雪霽獨酌咏左太冲招隱詩思戴安道時在剡即乗舟訪之至戴門不前而反曰乗興而來興盡而返何必見戴肆心傳曰昔周穆王欲肆其心周行天下縱欲禮欲不可縦入長吏被中光逸字孟祖為博昌小吏縣令使逸送客寒復遇雨凍濕還令不在解衣入令被中卧令欲誅之逸曰若不蹔温必恐凍死入車中王徽之字子猷為桓冲騎兵參軍冲問卿所主何曹子猷搔首曰似馬曹又問馬死多少曰未知生焉知死嘗從冲行值雨因下馬逃入冲車曰公豈得獨擅一車乎馬曹見上注不知是三公王戎為司徒閑乗小馬從便門出㳺見者不知是三公故吏多至大官道路相遇輒避也街中走馬張敞為京兆尹無威儀罷朝走馬章臺街使御吏驅自以鞭面拊馬也偪官長飲桓温與謝奕善辟奕為安西司馬推布衣好常偪温飲温走入避之奕攜酒就㕔事引温一兵師共飲曰失一老兵亦何所共在温不責之探鵲鷇王澄字平子為荆州刺史送者傾朝見樹上鵲巢便脫衣上樹探鵲鷇反神氣傲然旁若無人醉卧畢卓為吏部鄰家釀酒熟卓醉夜入其家竊飲醉便卧罋間守酒者得而枸之明旦看乃畢吏部也又阮籍鄰家少婦有羙色當壚沽酒籍嘗詣婦飲酒醉便卧其側既不自嫌其夫察之亦不疑之也哭丘家女丘家女有才色未嫁而死阮籍不識其父兄徑徃哭之盡哀而反字其父胡母輔之彦國子謙之子光才學不及父而傲縱過之酣醉常呼父字輔之亦不介意輔之酣飲謙之曰彦國年老不得為爾将令我㞍背東壁輔之歡笑入呼而共飲也八達光逸孟祖太𫝊辟至屬胡母輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髪祼􅃝閉户數日酣飲逸将排户守者不聼逸便脫衣露頭於狗竇中呼輔之輔之曰我孟祖也遽呼入飲人謂之八達孔少繩檢唐儉爽邁少繩檢不治細行唐憲仕隋為東宫左勲衞太子廢罷歸不治細行落魄韓琬落魄少崖檢樂山水自放貟半千年老不衰樂山水自放贈帶其放誕少檢故贈以帶張文瓘傳馬周鄉人以無細謹薄之放蹟江淮間韓思彦至官閲月自免去放蹟江淮間乆之不遵灋度王琚既失志稍自放不能遵灋度跌蕩少檢魏元忠為太學生跌蕩少檢通脫張濬性通脫無檢不屑世事趙冬曦性放達不屑世事豪放李邕資豪放不能治細行不為親近所容李白自知不為親近所容益鷔放不自修求外職桞渾召拜監察御史臺僚以儀矩相繩而渾放曠不樂檢局乃求外職㳺縱自如李紓不為齷齪崖檢官雖貴而㳺縦自如放意文酒白居易所藴不能施乃放意文酒真放皮日休七愛詩序每謂負逸氣者必有真放以李翰林為真放焉飲酒盡百錢嘲諧思逾鮮有時醉花月髙唱清且綿韓愈送靈師詩朋友見妻子杜甫每朋友至引見妻子章侍御退而使其婦送夜飛蟬以助粧飾出雲仙散録放懐集杜書記平善牛竒章帥維楊杜牧在幕中夜多微服逸逰公聞之以街子數軰潜随逐牧之以防不虞後牧之以拾遺召臨别公以縦逸為戒牧之始猶諱之公命取一篋皆是街子軰報貼云杜書記平善乃大感服芝田録無檢幅温廷筠薄於行無檢幅多作側辭豔曲與貴胄蒱飲狎昵同上丐錢楊子院夜醉為邏卒檕折其齒不嬰以家事王績性簡放不喜拜揖兄通知績誕縦不嬰以家事鄉族慶吊冠昏不與也不修飭雷蒲不修飭每宴使客抵寳噐潭中曰此水府也蛟龍所憑吾能沒焉乃祼入水俄取噐出風流五白庾亮登樓晉庾亮都督江荆鎮武昌佐吏殷浩之徒乗秋月登樓不覺亮至将起避之亮曰諸君少住老子於此不淺便據胡床竞坐譚論謝尚泛江與袁宏譚袁宏臨海令朂之子少孤以租運自業謝尚鎮牛渚乗月與左右微服泛江㑹宏在舩中諷咏聲既清㑹詞又藻抜令問之袁臨海耶尚遂就之升舟與譚王樂晉樂廣與王衍俱宅心事外見重於時天下言風流者王樂為首庾亮噉薤亮過陶侃坐噉薤留白云可種侃曰非為風流兼有為政之術終日清譚王衍字夷甫出補元城令終日清譚縣務亦理孔當時稱其風流李迥秀少聦悟多通賔客喜飲酒雖多不亂當時稱其風流以風流自命杜如晦少英爽喜書以風流自命醖籍權徳輿雖動止無外飾其醖籍風流自然可慕季真清譚賀知章字季真性曠夷善談説與族姑子陸象先善象先嘗謂人曰季真清談風流吾一日不見則鄙吝生矣敏辯陸餘慶才不逮子昂等而風流敏辯過之按轡絶道去李林甫傳兵部侍郎盧絢按轡絶道去帝愛其醖籍稱羙之明日林甫召絢子曰尊府素望上欲任以交廣若憚行且當請老絢懼從之因出為華州刺吏俄受太子貟外詹事絢繇是廢暮出端門緩轡賦詩崔湜嘗暮出端門緩轡賦詩張説見之嘆曰文與位固可致其年不可及也體弱有醖籍張九齡體弱有醖籍故事公卿皆搢笏于帶而後乗馬九齡獨常使人持之因設笏囊自九齡始帝後每用人必曰風度能若九齡乎剛六白立地之道曰柔與剛易沉潜剛克髙明柔克剛亦不吐詩人有言剛則吐之惟仲山甫剛亦不吐處父以剛傳陽處父過甯甯嬴從之及温而還其妻問之嬴曰以剛天為剛徳猶不干時况在人乎夫子其不沒乎懼罹其難是以去之後晉殺陽處父子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛欲剛必柔鬻子曰欲剛必以柔守之彊必以弱保之積於柔必剛積於弱必彊漢王嘉剛毅天子敬之髙獲不改性後漢髙獲與世祖冇舊曰欲子為吏宜改常性獲曰臣受性父母不可改也遂辭去之傅咸剛勁諒直不能容人之短好剛不好學其蔽也狂狂躁率也子路行行如也行行剛貎血氣方剛剛彊不得死季布能摧剛為柔虞詡剛而不虐剛腸太剛則折摧剛百錬剛近仁子曰剛毅木訥近仁孔少所降屈温造盛氣少所降屈不可干非其義李大亮内剛烈不可干非其負義對天子争是非無回撓才無屈唐彦謙性剛急温造性剛急人或忤己雖貴勢亦以氣出其上道遇左補闕李虞恚不避捕從者笞辱剛峭李中敏性剛峭剛正過姚崇宋璟剛正又過姚崇元宗素所尊憚常屈意聽納剛果不撓吕諲為治不急細務决大事剛果不撓賜中上考李朝隱遷長安令宦官閭興貴有所干請曳去之睿宗嘉嘆賜中上考絹百匹以旌剛烈官吏重足劉蕡以剛猛立威官吏重足人無敢戲慢韋温性剛峻人望見無敢戲慢者剛正氣節自任穆甯剛于御史韋處厚姿狀如甚懦者居家亦循易至廷争嶷然不可回奪剛于御史百僚謁事畏惕未嘗敢及以私稜稜有風望崔從為人嚴偉立朝稜稜有風望不喜交權利忠厚而讓士大夫賢之本傳剛者天徳二李賛剛者天徳故孔子稱剛近仁骨強四支故君有忠臣謂之骨鯁若栖筠􅅠二子其剛者歟栖筠抗權邪不及相􅅠得相不願拜非剛疇克勝之性剛彊趙鳯好直言而性剛彊素與任圜善自圜為相頗薦進之治剛嚴李紳為河南尹河南多惡少或危㡌散衣擊大毬或尸官道車馬不敢前紳冶剛嚴皆望風遁去不屈牛仙客嚴提之拒宰相不肯見李林甫崔隠甫違詔不屈牛仙客信剛者乎二人坐是皆不得相彼亦各伸其志也陽宅身以執剛兮卒易帥而䝉辜柳宗元佩韋賦以剛正故官齟齬王求禮言行剛正狄兼謨元和末解褐襄陽推官試校書郎言行剛正使府知名舊史剛正有祖風同上剛決犯上僕固懐恩為人雄重寡言應對舒緩然剛決犯上純剛純彊兮必䘮必亡柳文賦剛略類韓愈李漢少事韓愈為人剛略類韓愈愈愛重剛銳果决李巨剛銳果决略通書史張鎰盧杞忌鎰剛直欲去之時朱泚以盧龍卒戍鳯翔帝擇人代之杞曰鳯翔將校班秩素髙非宰相信臣不可鎮撫臣宜行帝乃顧鎰曰文武兼資望重内外無易卿者其為朕撫盧龍士乃為鳯翔節度使豪彊七白血氣方剛戒之在闘小人用壯不在於善而皆在於凶徳剛彊者死之徒灌夫陂池田園宗族賔客為權利横穎川賛曰灌夫無術不遜也竇憲恃宫掖聲勢遂以賤直請奪沁水公主田園梁兾跋扈漢書兾字伯卓質帝目之跋扈将軍認孫奮母為守藏婢盗珠十斛南方之彊犯而不校北方之彊剛毅負毦帶鈴吴甘寧興霸少招合輕薄少年為之渠帥羣聚相随操持弓弩負毦帶鈴民聞聲即知是寧彊梁者不得其死老子彊者脅弱惡聲至必反之北宫黝善養勇者也孟子威重於太守寗成免官居持吏長短出從數十騎其使之威重于太守豪奪吾民旣不能彊外彊恭顯任勢孔文章倚豪横飲噉惟所便文章倚豪横韓愈東都遇春少年負壯氣奮列自有時李白氣岸遥凌豪士前夜郎沉斷皇甫湜廬陵縣壁記彈豪紏㸃以沉斷威震豪彊王正雅以萬年令威震豪彊無踰檢之患劉蕡制豪猾之彊無踰檢之患剛愎班宏剛愎以竇參欺已議事稍不合負氣彊愎李昭徳丘愔上䟽昭徳乗緫權綱而才小任重負氣彊愎聾盲下民芻狗同列柔八怯懦附白立地之道曰柔與剛易柔克見剛門柔亦不茹人亦有言柔則茹之惟仲山甫柔亦不茹詩随㑹柔而不犯傳柔弱勝剛彊老柔弱者生之徒老能下人不犯物欲剛必以柔見上注光武柔直光武幸南陽宴父老父老相謂曰文叔少時謹信與人不欵曲惟柔直耳乃能至是耶帝笑曰今亦以柔道治天下也莫過於水老子曰天下柔弱莫過於水而能攻堅莫之能先轡之柔矣逸詩篇名義取柔轡可御剛馬繞指之柔舌柔口柔之人柔而立怯懦管仲三戰三北鮑子不以我為怯知其母在故魏勃股慄灌嬰責勃劫齊王反魏曰失火之家豈服先言因退立股慄嬰熟視曰人謂勃勇妄庸人耳韓信胯下淮隂市少年辱信曰不能死出我胯下信良乆乃俛出胯下一市皆笑以為怯弱緜力淮南王書曰越人緜力注云柔弱也宫之竒懦而不能彊諌左傳懦夫孟子曰聞伯夷之風懦夫有立志也無拳無勇萊駒失戈晉㐮公獲秦囚使萊駒以戈斬之囚呼萊駒失戈蒯聵墜車衛太子蒯聵與鄭人戰望見鄭師衆太子懼乃投車下子良授太子綏而乗之曰婦人也言其懦也脆弱趙廣漢云羗脆弱易敗國語不占失軾事具下無勇門孔以柔媚自進庾凖以柔媚自進得幸於王縉驟至中書舍人時流嗤薄之以佞柔得為大夫劉暹元載昵厚之載得罪出鄭州徙河南以佞柔故為大夫也三遷工部尚書人貓李義府時又以柔而害物號曰人貓可制關播盧杞雅知播韋柔可制因從容言播材任宰相其懦厚可鎮浮動乃拜同門下平章事徐偃柔以屏義兮倐邦離而身虜柳宗元佩韋賦面柔令李林甫面柔令初若可親既崖穽深阻卒不可得也便柔遜愿崔損建中後宰相無乆任者損以便柔遜愿中帝意乃留八年柔者仁之賊刑法志文宗好治躬自謹畏然閹宦肆孽不能制至誅殺大臣夷滅其族濫及者不可勝數心知其寃為之飲恨流涕而莫能救止盖仁者制亂而弱者縱之然則剛彊非不仁而柔弱者仁之賊也柔情易遷宦者傳殘氣不剛柔情易遷庸輭莫能自達穆宗皇后蕭氏初后去家入長安惟記有弟帝為訪之太后真弟庸輭莫能自達怯懦罕更事楊師道帝亦曰師道資性純淑自應無過而寔怯懦罕更事懦緩髙仙芝美姿質善騎射父猶以其懦緩憂之懦愞董晉為宣武節度使鄧惟恭乃結大将相里重晏等謀亂晉覺之殺其黨械送惟恭京師帝録其縶李廼勞貸死流汀州帝恐晉懦愞詔拜汝州刺史性謹柔宗室煴性謹柔材無過人者􅄶急九白邾莊公卞急左傳邾荘公在臺臨庭閽以瓶水沃庭公怒閽曰夷射姑旋焉執之不得滋怒自投于床廢于壚炭爛遂卒荘公卞急故及此佩韋范丹事見上注蠅集筆端魏王思為司農性急嘗書蠅集筆端驅去復來再三思自起抜劒逐蠅不得取筆擲地踏壊之食雞子晉王述懐祖性急常食雞子以筯刺之不得便大怒擲地雞子圎轉不止便下床以屐齒踏之又不得瞋甚掇内口中齧破而吐之公孫之亟也晉使張骼輔躒致楚師求御于鄭鄭人使宛射犬御二子幄坐射犬於外既食而後食之及戰射犬近不告而馳之敗擒挟囚不待而出既戰二子問曰胡再不謀對曰嚢者之言公孫之亟也言性急不肯受屈量謝包荒徳非含垢忿不思難􅄶心魏君儉嗇􅄶急無徳以將之後漢明帝􅄶急嘗以事怒樂崧以杖撞之崧走入床下帝急呼崧曰天子穆穆諸侯皇皇未聞人君起撞明帝慙而止孔􅄶心怨望劉禹錫遷太子賔客禹錫恃才而廢􅄶心不能無怨望吴通𤣥知制誥與陸贄等同視草陸贄富詞藝特承徳宗重顧經歴艱難通𤣥弟兄又以東宫侍上由是争寵頗相嫌恨贄性􅄶急屢於上前短通𤣥舊史恃才􅄶忿薛逢出為巴州刺史沈詢楊收王鐸由學士相繼為相皆逢同年而逢文藝最優收作相逢有詩收䘖之鐸作相逢又有詩以恃才􅄶忿人士鄙之舊史忿罵張九齡為相性頗躁急動輙忿罵孔平仲續世説被躁望誅劉文静賛曰文静先被躁望誅辭㫖䟽躁蕭瑀性鯁急貞觀初元齡如晦新得君事已稍分瑀不能無少望乗罅切詆辭㫖䟽躁太宗怒廢于家不容人短瑀論議明辯然不能容人短中狹瑀素貴但中狭資􅄶躁陳子昻唐史浮躁􅃷露裴行儉曰如王勃等雖有才而浮躁衒露豈享爵禄者哉資暴急長樂郡王㓜良資暴急髙祖數曉飭不悛佻躁韋渠牟為人佻躁志向浮淺張鷟性躁辯儻蕩無檢罕為正人所遇彊躁張嘉貞彊躁論者恨其不裕氣陵輩行賈餗􅄶急氣陵軰行躁狷柳冕為婺州十三年自以乆䟽斥又性躁狷不能無恨乃上表乞代蜂螫指擣取其液皇甫湜嘗為蜂螫指購小兒歛蜂擣取其液子錄詩誤囓臂血流一日命其子錄詩一字誤詬躍呼杖杖未至囓其臂血流作櫻桃賦蕭頴士李林甫怒其不下已調廣陵參軍頴士急中不能堪作櫻桃賦曰擢無庸之瑣質蒙本枝以自庇雖先寢而或薦非和羹之正味以譏林甫云君子恨其褊不能取容於時崔元翰性剛褊不能取容於時遇事發作先主性狷急遇事發作輙不忍尋後悔之笠凙叢書酷尚弈棊李納性辯急酷尚奕棊每下子安詳極於寛緩徃徃躁怒家人軰則密以奕具陳於前納覩便忻然改容以取其子布筭都忘其恚南部新書李訓浮躁寡謀本賛段文昌之介狭李固言之狷急叚相文昌性介賔客有眉睫之失必致傾又少師李固言性狷急為士大夫之所誚語錄不能包容於尋常人元賔行峻㓗清其中狹隘不能包容於尋常人韓文與李師錫書愚𠂻深􅄶狷杜牧送人詩諡貞􅄶吕諲傳蕭瑀端直近貞性多猜近褊言􅄶則失貞稱貞則遺褊故曰貞褊儉十衣食儉附白禮與其奢也寕儉以約失之者鮮矣去奢去泰老子克儉克勤書曰克儉于邦克勤于家儉則固奢則不遜儉則固與其不遜也寕固物或損之而益徳儉而有度儉徳之恭昭其儉也儉固能廣務嗇勸分嗇儉也示之以儉曾子曰國奢則示之以儉國儉則示之以禮慎乃儉徳躬儉節用服澣濯之衣貶食省用節器用踰矩節儉省嗇昭節儉尚朴棄末反本也亷恥之心躬自菲薄儉而不陋以知足為富居其實大丈夫居其實不居華戒生之厚素業清風貴而能貧節乃用足儉為徳恭聖人不積君子戒盈人道惡盈鬼神害盈易能節禮樂不忘恭敬務利而避害慎始而思終以道制欲見得思義革奢俗以從儉約澆風以反淳無欺暗室不懼神明尚素黜華去奢從儉從儉䧏身惟賢猶病砥礪清節承風宜嘉清徳難奪素風徳因儉立名以清聞妾不衣帛馬不食粟季文子卒宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子曰相三君矣而無私積可不謂忠乎賔以特牲晉饑晉侯命祈以幣更賔以特牲器用不作車服從儉注云皆務儉也行之期年國乃有節卑宫室晉文公為盟主宫室卑庳以崇大諸侯之館又子曰禹卑宫室而盡力乎溝洫室不崇壇闔廬妻子不入官舎後漢王良仲子在位恭儉妻子不入官舎當示禮之代自合執中守臨人之司豈宜偪下難為繼也恥盈示禮曽子國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮損之又損忌蟋蟀之謂何雖則從儉去奢有以小為貴者而乃失中難下無乃此是過與偞卑偞卑墮類反迫下之義也禮矯俗律人奢雖諷於蜉蝣儉亦刺於蟋蟀既異建中則難為下去奢作戒示儉垂文語以執中未為得也比其僣上不猶愈乎是從以約之文未虧寧儉之義雖激俗是稱而相時斯昧既非示儉之日自招失禮之尤况當示禮之日自貽逼下之譏奢侈敗風唯時所惡清儉激俗雖矯何傷罷露臺漢文帝欲作露臺計費百金帝曰百金十家之産何以臺為蟋蟀刺晉僖公也儉不中禮故作是詩以閔之葛屨刺􅄶也魏地陿隘其君儉嗇􅄶急而無徳以將之堯舜儉漢書云堯舜堂髙三尺土階三等茅茨不剪采椽不斵飯土簋歠土鉶糲梁之食藜藿之羮夏日葛衣冬日鹿裘其送死桐棺三寸此儉而難遵也用過乎儉君子儉徳避難不可榮以祿也二簋用享質薄之器納約自牖薪芻第五倫伯魚為㑹㮷身自薪芻養馬妻執㸑恭儉以求役仁馬餼不過稂莠子服子薄祭鄭子張有疾命宗人黜宫薄祭祀先人晏子平仲祀先人豚肩不掩豆澣衣濯冠以朝君子以為隘矣下不僭上上不偪下王良妻布裙曵柴衣食儉子曰禹惡衣服而致美乎黻冕菲飲食而致孝乎鬼神食不二味闔廬食不二味居不重席不取費衣服財用擇不取費儒有居處不淫飲食不辱辱貪欲也惡衣惡食士志於道而恥惡衣惡食者未足與議也脫粟晏子相齊食脫粟飯一狐裘三十年晏子恥纎靡而不服饘於是粥於是以餬予口服澣濯之衣食䟽糲之食文子曰聖人食足以充虚接氣衣足以盖形禦寒古之為道者量腹而食制形而衣三杯朱博儉食不重味案上不遇三杯布被公孫𢎞曰人臣病不節儉常卧布被汲䵭曰飾非以吊名也燕用茶果桓温性儉每燕不過茶果而已拾飯殷仲堪為荆州水旱遭年飢仲堪食常有餘肴飯落席拾取以噉也賔至無供辦謝安欲詣陸納納辭無供辦兄子俶不敢問密厚具饌安至納設茶果而已俶備珍羞客散納怒曰不能光益叔父乃穢我素業杖四十生無長物王忱見王恭六尺簟謂有餘求之恭即送後忱知恭無簟驚問之恭曰我生無長物􅂼食瓦器宜秉字巨公為司𨽻常有布被􅂼食瓦器帝幸其府舎歎曰楚國二龔不如雲陽宣巨公也化人毛玠字孝先居顯位常布衣蔬食以儉率人由是天下莫不以廉節自勵雖貴寵輿服不敢過度太祖歎之又許劭子将為郡公曹人皆改操飾行袁紹豪俠罷獛陽令車徒甚盛入境曰豈可使子将見耶遂乗車歸家孔儉素紀王謹女東光縣主適太子司議郎裴仲将時妃主皆恃貴以奢豫相矜主獨素儉漢陽公主名暢永貞元與諸公主皆進封戚近争為奢詡事主獨以儉常用鐡簪自畫壁記田租所入文宗尤惡世流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宫所服皆當時賜未嘗敢變元和後數用兵悉岀禁藏纎麗物賞戰士由是散於人間内外相矜習以成風若陛下示所好于下誰敢不變帝恱詔宫人視主衣製廣狹徧諭諸主臣勅京兆尹禁切浮靡勸崇節儉岑文本上疏勸崇節儉聖賢以簡素為貴皇王以菲薄為徳姚珽節愍太子稍失道珽諫曰聖賢以簡素為貴皇王以菲薄為徳惟殿下留心恭儉損省玩好以訓天下衣服羸儉竇懐貞衣服羸儉不為輿馬豪侈事居處卑室無䄄褥幃帟岑文本始貴自以興孤生居處卑室無䄄褥幃帟居陋狹甚李大亮位通顯居陋狹甚素約李懐逺乆貴益素約不治居室性節儉韓滉雖宰相子性節儉衣裘茵祍一年一易甚暑不執扇居處陋薄取庇風雨假宅而居栁渾性節儉不治産業宫室丞相假宅而居舊史第室童獲猶儒先生家趙璟性倩約位台宰而第室童獲猶儒先生家夫儉則人用足而不淫栁宗元晉問其人至今儉嗇三河古帝王之更都焉而平陽堯之所理也有茅茨木椽土型之度故其人至于今儉嗇性約素服御取給則止太宗后長孫氏性儉素家不樹産竇威儉不中禮王珪不作家廟四時祭于寢為有司所劾帝為立廟媿之不罪也世以珪儉不中禮少之得大臣體郝處俊性儉素土木形骸自叅綜朝政每與上言議必引經籍以應對多有匡益甚得大臣之體馬周䟽堯之茅茨土階禹之惡衣菲食臣知不可復行于今漢文帝惜百金之費而罷露臺集上書嚢以為殿帷所幸夫人衣不曵地景帝亦以錦繡纂組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈承文景遺徳故人心不揺向使髙祖之後即武帝天下必不能全此時代差近事迹可見入朝不事騶仗裴玢入朝不事騶仗妻乗竹輿二侍婢黄碧縑服為山南莭度營泰建陵殺禮從儉趙憬寳應中方營泰建陵用度廣又吐蕃盗邉天下荐飢憬褐衣上䟽請殺禮從儉士林嘆美堯舜之化慈儉趙宗儒進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言薄居處衣食袁滋李愬行已儉約李愬行已儉約其昆弟頼家勲貴飾輿馬矜室廬唯愬所處乃父時故院無所增廣處身儉勤敬晦為浙西觀察使有詔弛𣙜酒茗官用告乏處身儉勤貲力遂充自持家管鑰徐岱吝嗇自持家管鑰世所譏云以清儉稱李建雖通顯未嘗治垣屋以清儉稱人服其儉張孝忠河北蝗民餓死如積孝忠與其下同粗淡日膳豆䜺而已人服其儉推為賢将供帳不施錦繡裴耀卿帝曰朕有事岱宗魏州刺史崔沔遣使供帳不施錦繡示我以儉此可以觀政也世謂近名潘好禮居室服用麄茍至終身世謂近名李徳裕昔漢文帝身衣弋綈元帝罷輕纎服故仁徳慈儉至今稱之儉約自将李譲夷位雖顯劇以儉約自将為世咨羙玩服不為鮮明盧鈞玩服不為鮮明位将相沒而無贏財簡儉寡欲李虞仲簡儉寡欲時望歸重撙節用度柳公綽為河東莭度遭嵗惡撙莭用度輟宴飲衣食與士卒鈞治身觳薄薛苹封河東郡公治身觳薄所衣緑袍更至緋衣乃易清儉自将韋倫為行軍司馬時中人衛卒多侵暴尤難治倫以清儉自将西人頼濟中宦嫉之以䜛貶為大官居不易第服不改初辛秘不知其刺史賈敦頥數歴州刺史資廉潔入朝常盡室行車一乗弊甚羸馬繩羈道上不知其刺史也服用無贏副陽城與奴僕日一食馮元淑與奴僕日一食馬日一秣所至不挈妻子斥俸餘以給貧窮或譏其近名答曰吾性也不為苦歴職以清儉韋抗歴職以清儉不治産朴簡自處郭曜諸弟或飾池舘盛車服曜獨以朴簡自處磁樽漆器錢武肅王衾被衣服悉用紬布自非公用惟磁樽漆器而已恭穆夫人嘗以王寝帳隳裂乃上青練帳将易之王曰作法於儉猶恐為奢但慮後代皆施綿繡爾卒不用呉越備史用器止烏漆鄧景山清約子弟饌不過草具用器止烏漆待上賔惟豚魚而已取倉粟紅腐者食之兼給麾下楊綰始輔政御史中丞崔寛本寛侈城南别墅池觀堂皇為當時第一即日遣人毁之京兆尹黎幹出入從騶御百數省損才留十餘騎中書令郭子儀在邠州行營方大㑹除書至音樂散五之四它聞風靡然自化者不可勝紀世以比楊綰山濤謝安云崔植穆宗問司馬遷言漢文帝惜十家産而罷露臺身衣弋綈履革舄集上書囊為殿帷信乎何太儉耶植曰良史非虗言漢承秦侈縱之餘海内凋窶文帝從代來知稼穡艱難是以躬履儉約為天下守財景帝遵而不改故家給户足飲食儉狹劉晏所居脩行里粗樸庳陋飲食儉狹室無媵婢歴三鎮居處服玩如儒先生韓充雖将家性儉節歴三鎮居處服玩如儒先生約己省費楊行密始乗孫儒亂府庫殫空能約己省費不三年而軍富雄官九卿無産貲張道源雖官九卿無産貲比亡餘粟二斛儉而不陋崔縱貞元元年天子郊見為大禮使嵗旱用屈縱樽裁文物儉而不陋作陋室銘以見志崔沔儉約自持祿廩随散宗族不治居宅常作陋室銘以見志嗇事省用牛仙客始在河西嗇事省用崔希逸代之即以聞以儉治天下韓全義其子獻女樂八人帝不納曰我方以儉治天下惡用是為節用度王䖍休國本在節用趙璟精治道常以國本在節用極陳生人疲弊歸崇敬代宗幸陜召問得失崇敬極陳生人疲弊當以儉化天下則國富而兵可用居處取避風雨裴玢蔬食弊衣居處取避風雨出軍乗騾封常清性勤儉出軍乗騾私廐裁二馬自刻苦為儉約五代馮道為人能自刻苦為儉約當晉與梁夾河而軍道居軍中為一茅庵不設床席卧一束蒭而已未嘗問生事楊綰儉約未嘗問生事禄廩分姻族造之者清談終晷而不及榮利楮無長貲蘇頲性廉儉奉廪悉推諸弟親族禇無長貲性纎嗇王鍔性纎嗇有所程作雖碎𤨏無所遺官曺簾壊吏将易之鍔取壊者付船坊以鍼箬每燕饗輙錄其餘賣之以收利故鍔家錢偏天下燒衣易驚棄食易駭來鵠儉不至說剪腐帛而火焚者人聞之必遞相驚曰家之何處燒衣耶委餘食而在地者人見之必遞相駭曰家之何處棄食耶燒衣易驚棄食易駭以其衣可貴而食可厚不忍焚之棄之也然而不知家有無用之人服其衣與其焚也何逺以是棄之未嘗有驚駭者儉者能逺人所以寡過㲾子嵩化書李襲譽居家儉厚于宗親禄廩隨多少散之以餘資冩書嘗謂子孫曰吾性不喜財遂至窶乏元徳秀天寳十三載卒家惟枕履簟瓢而已族弟結哭之慟曰未嘗完布帛而衣具五味而食吾哀之以戒荒淫貪佞綺紈粱肉之徒耳饔人減䨇雞之膳圉人省五馬之秣陶不献服圬不塓館自身已徃振廩同食王維張公徳政碑序斥遣浮華皇帝儉勤盥濯陶瓦斥遣浮華好此綈紵勑戒四方侈則有咎韓愈聖徳詩濯衣澣冠崔孝公集序天下富穰車服遇制公菲飲食卑宫室濯衣澣冠俾人瞻我而化李華能節雖虛必盈陸宣公奏議不節則雖盈必竭能節則雖虚必盈太宗敦行儉約謹節徭賦弛不急之用省無事之官黜損乗輿斥出宫女太宗常有氣疾百官以大内卑濕請營一閣以居上憚煩勞竟不之許是以至誠上感淳化下敷貞觀八年以後米斗至四五錢皆以嗇用愛人竞獲豊福是所謂能節雖虚必盈之效也敦尚節儉陸下罷息誅求敦尚節儉同上奏議雖少雄邁及貴居處儉約郭元振一嵗之計用儉者一嵗之計一嵗之用宋子嵩化書勤十一白勞而不伐易成天下之亹亹亹亹猶勉也勤學意克勤于邦業廣惟勤勤勞王家周公哀我癉人癉勞也詩盡悴人生在勤勤則不匱能勤有繼文王猶勤况寡徳乎服其勞有事弟子服其勞以勞定國則祀之勤施無私曰類勤君之執夙興夜寐夙夜匪懈以事一人朝夕臨政處不避汚汚勞事也郤成子曰非徳莫如勤非勤何以求人養天下之形荘子曰堯服無胈脛無毛以養天下之形也無怠無荒勞而不怨服勤執煩辱之事煩辱勞役召信臣為南陽太守躬耕農出入阡陌止舎鄉亭希有安居時自斬芻第五倫見上門休日坐曹理事薛宣為馮翊日至休吏賊曹掾張扶獨不肯休坐曹理事宣出教曰主吏勿令休所繇來逺矣雖休勿休不懈于位夙夜在公晝而講貫夜而計㑹勤王王事靡鹽終日矻矻孔耐勞苦封常清性勤儉耐勞苦居暇日常被甲枕戈而卧五代劉詞居暇日常被甲枕戈而卧謂人曰我以此取富貴豈可一日輙忘之且人情易移若一惰其筋力有事何以報國君人者必時視人之所勤人勤于力則工築罕人勤于財則貢賦少人勤于食則百工廢今財食與人力皆勤矣願陛下廢百事之勞廣三時之務則播植不愆矣劉蕡制䇿跡之勤者情必生焉柳宗元書勤約自将杜暹能以公清勤約自将亹亹為之立己以勤儉為灋柳玭家訓怠惰十二白汝不恭命遐棄厥司書不敢怠荒自暇自逸怠忽荒政燕燕居息滿百陳遵為椽曹輙廢史白曰陳掾今日以某事謫遵曰滿百乃相聞故事滿自謫當斥故也曹參不事日日飲醇酒養名齊俗吏人養名舒緩朱博為郡怒曰齊人欲以為俗耶溺職沉滯不舉守官廢命不敬失官慢也傳一日失職則死及之逋事義縱為上黨令無逋事也孔八塼乃至李程為翰林學士學士入署常視日影為候程性懶日過八塼乃至晚節慵轉劇小年習性懶晚節慵轉劇杜甫送李校書對書常懶讀韋蘇州始除尚書即累日曽一櫛對書常懶讀驕怠易生陸贄奏議昔衛獻出奔乆而復國大夫迎於境者執其手而與之言迎於門頷之而已言其驕怠之易生也齊桓将圗霸功管仲戒之以無忘在莒懼其情志之易變也在莒同上願陛下以在莒為書紳之規以衰衞為覆車之鍳過懶從衣結杜甫春日江村天向交㳺萬事慵登四安樓幽棲身懶動客至欲如何絶句朝事多闕韓熈載知制誥性懶朝事多闕延已奏其怠惰罷職江南錄怠者不能修而忌者畏人修吾嘗試之矣韓文毁原劉詞居暇日常被甲枕戈而卧謂人曰我以此取富貴豈可一日輙忘之且人情易習若一墮其筋力有事何以報國五代史白孔六帖卷二十八
