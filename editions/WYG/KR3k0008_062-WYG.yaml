body:
  text: 白孔六帖卷六十二唐白居易原本宋孔傳續撰琴一瑟二箏三琵琶四箜篌五鼓六鍾七簨簴八磬九笙十簫十一笛十二笳十三竽十四缶十五籥十六嘯十七琴一白神農氏削桐為琴繩絲為絃以通神明之德合天地之和鍾儀操南音樂操土風不忘舊也舜作五絃之琴以歌南風琴瑟在御莫不靜好君子之近琴瑟以儀節也非以慆心也儀節不過度也宓子賤不下堂宓子治單父彈琴不下堂而自治琴者樂之統也見琴操瓠巴鼓琴而鳥舞魚躍善鼔琴者也伯牙彈琴駟馬仰秣善彈琴者也中散廣陵嵇中散臨刑索琴彈為廣陵散曲終曰此曲於今絶矣雍門之感孟甞涕淚承睫樂記曰絲聲哀哀以立亷亷以立志君子聽琴瑟之聲則思忠義之臣禮緑綺美人贈我緑綺琴朱絃尚書大傳曰大琴朱絃琴者所以正人心白虎通焦尾蔡邕於吳中聞人家㸑桐爆聲知其良材因請之以制琴琴尾有焦處故號云焦尾陽春白雪緑水悲風幽蘭别鶴烏夜啼並琴曲名伏羲作以防心伏羲作琴以禁邪僻防淫心而反天真孔子聽而得意韓詩孔子學琴於師襄子曰丘得其意末得其人有間曰得其人矣洋洋乎翼翼乎其惟文王乎列子謂之師襄子禁邪見上納正嵇康琴賛曰閑邪納正宣情宣和情性理性琴操曰理身理性正聲文選竒弄並嵇康琴賦云祕弄雅音龍鳳之象琴形山水之音伯牙絲桐之妙啓期三樂以琴歌自歌云吾有三樂斵孫枝文選清徴雲和空桑周官雲和之琴瑟冬日圜丘奏之空桑之琴瑟夏日方丘奏之龍門之琴瑟宗廟奏之雲和山名伯牙絶絃伯牙鼔琴意在山鍾子期曰巍巍乎意在水子期曰湯湯乎鍾期死伯牙遂絶絃以世無知音也長卿鳯凰之歌以琴心挑卓文君嶧陽孤桐材中琴號鍾古琴名促調高張七命文危絃檿絲之絃野繭之絲以為絃七發文士無故不徹琴瑟不學操縵不能安絃操縵雜弄文以琴瑟禮繁聲後漢宋𢎞薦桓譚拜議郎給事中每侍宴令鼓琴好為繁聲宋𢎞不悅召責之搏拊琴瑟以詠祖考來格終身不聽琴瑟孫林父在戚擊鐘季札非之云云林父聞之終身不聽琴瑟專一晏子曰琴瑟專一誰能聽之君子聽之以平其心晏子推琴莊子曰孔子逰乎淄帷之林休坐于杏壇之上弟子讀書孔子鼔琴曲未終有漁父下船而来孔子推琴而起曰其聖人者與雍門周以琴見孟甞君孟嘗君曰先生能令文悲乎雍門周云云孟嘗泫然承睫周引琴鼓之孟嘗涕泣殺心形於聲蔡邕在陳留隣人以酒食召邕比徃有客彈琴邕至屏聽之曰以樂召我而有殺心何也遂反使者具告主人自追問邕邕以告莫不憮然琴者曰我向見螳蜋方捕鳴蟬蟬將去而未飛恐螳蜋之失蟬也此豈為殺心形於聲乎蔡琰辨斷絃事具知音門但識琴中趣何勞絃上聲陶潜不解琴畜素琴一張絃徽不具曰云云破琴晋戴逵安道少有文蓺善琴太宰武陵王使人召之逵對使者打破琴曰戴安道不能為王門伶人别鶴之音捕蟬之思衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百張骼輔躒與楚戰乗乗車踞轉而鼓琴乗安車也踞倚也轉衣囊也難色魏文矦令杜䕫與左願等於賔客中吹笙鼓琴䕫有難色帝不恱因事擊之𤣥鶴舞史記師曠援琴一奏𤣥鶴二八集于門再奏延頸而鳴舒翼而舞平公大喜云云子敬之琴王獻之卒徽之奔䘮不哭直上靈床取琴彈之久而不調曰嗚呼子敬人琴俱亡因頓絶也左琴右書見夫妻門古琴名梁元纂要黄帝琴名清角齊桓公琴號鍾楚荘王繞梁司馬相如緑綺趙飛鷰鳳凰善鼓劉向别録漢有渤海趙定國梁國龍德凡琴曲和樂而作命之曰暢暢者言其道之暢風俗通憂愁而作命之曰操操者言周征窮追猶不失其操五曲琴操曰古琴曲有詩歌五曲一曰鹿鳴二曰伐檀三曰騶虞四曰鵲巢五曰白駒十二操一將歸孔子作二猗蘭三龜山並孔子作四越常周公作五拘幽文王作六岐山周人為文王作七履霜尹伯竒作八朝飛牧犢子作九别鵠商陵牧子作十殘彤曽子作十一水仙伯牙作十二壊陵亦伯牙作九引一列女椘樊姬作二伯飛魯伯飛作三貞魯次室女作四思歸衛女作五霹靂椘商梁作六走馬樗里牧恭侯作七箜篌霍里子高作八琴引秦明朗高作九椘引楚龍邱子高所作二十一章有河間雜弄二十一章琴厯曰琴曲有蔡氏五弄雙鳳離鸞歸鳳送逺幽蘭白雲長清短清側清調瑟調大游明君胡笳廣陵散白魚歎椘妃歎風入松烏夜啼椘明光石上流泉臨汝矦調子雙鷰離春弄連琴弄暢志清蟹行清看客清便僻清宛轉清孔善琴盧藏用善琴好鼓琴韓滉好鼔琴終身不鼓衛次公本善琴方未顯時京兆尹李齊運使子與逰請授之法次公拒絶因終身不復鼔楊收甞言琴通黄鍾姑洗無射三均側出諸調由蘿蔦附灌木然時有安涗者世稱善琴且知音收問五絃外其二云何涗曰世謂周文武二王所加者收曰能為文王操乎涗即以黄鍾為宫而奏之以少商應大絃收曰止如子之言少商武絃也且文世安得武聲乎涗大驚響泉韻磬李勉善鼓琴有所自製天下寳之樂家傳響泉韻磬勉所愛者西舍利王雍𦍑獻其國樂至成都有大匏琴二覆以半匏皆彩畫之上加銅甌以竹為琴作虺文横其上長三尺餘頭曲如拱長二寸以絛繫腹穿甌及匏本可受二升大絃應太簇次絃應姑洗有獨絃匏琴以斑竹為之不加飾刻木為虺首張絃無軫以絃繫頂有四柱如龜兹琵琶絃應太簇有小匏琴二形如大匏琴長二尺大絃應南吕次應應鍾備指一弄五聲叢鳴舒元輿斵琴志曰越客沈虬子斵琴絃素絲七條其上備指一弄五聲叢鳴鳴中有靈峯横空烏泉出雲鳳龍騰凌鶴哀烏啼松吟風悲鼓琴娛賔王涯使客賀若夷鼓琴娛賔寳琴司馬承禎睿宗引入掖庭錫寳琴琴有氣酉陽雜俎琴有氣曽識一道者相琴知吉凶秦楚聲李龜年至岐王宅聞琴曰此秦聲良久又曰此椘聲主人入問之則前彈者隴西沈妍後彈者楊州薛滿出辨音集胡松節支琴白傳支琴用胡松節出金徽變化篇雪絃韓愈詩雪絃寂寂聽雷氏玉徽蜀中雷氏斵琴常自品第上者以玉徽次者以瑟瑟又次者以金以螺蚌出尚書故實絶無琴韻于頔嘗令客彈琴有知音者聽於簾下嘆曰三分之中一分筝聲二分琵琶聲絶無琴韻國史補怨抑掩朱絃沉吟停玉指白居易聽彈别鶴操清冷石泉引澹泞風松曲同上鼓有虞氏之南風賡之以文王宣父之操有一儒生魁然其形抱琴而来厯階而升坐于樽俎之南鼔有虞氏之南風賡之以文王宣父之操優游夷愉廣厚高明追三代之遺音想舞雩之詠歎及暮而還韓愈燕太學序玉琴纎手弄玉琴清晨起長嗟李白古風冰霜中自結龍鳳相與吟韋蘇州擬古有客天一方寄我孤桐琴迢迢萬里隔託此傳幽音冰霜中自結龍鳯相與吟五絃琴趙璧彈五絃琴人問其術璧曰吾之五絃也始則心驅之中則神遇之終則天随之方吾浩然眼如耳如鼻不知五絃之為璧璧之為五絃也出語林取漆角為之李研公雅好琴常斫桐又取漆角為之多至數百張京師以樊氏路氏琴為第一同上寫聲發情於妙㫖吾但冩聲發情於妙㫖殊不知此曲之古今李白詩沉祝聲董庭蘭三為沉祝聲聲皆琴聲也國史補三聲類聚金徽變化篇曰段由夫携琴就松風間響之甞曰三者皆自然之聲正合類聚半曇即以金縷衣邀之曲終云河輪佩玉同上嵇康抱琴訪山濤濤醉欲割琴康曰吾賣東陽舊業以得琴乞尚書今河輪佩玉藏為徽貨所衣玉簾中單買縮絲為袋論之其價與武庫争先如欲割之吾即死矣眼疾不治獨孤及晚嗜琴有眼疾不肯治欲聽之專也願以頑璞上奉徽音桞宗元與衛淮南石琴薦啓增響亮於五絃應鏗鏘於六律同上慿崖一聽清心耳李白白毫子歌拂花弄琴坐青苔緑蘿之下春風来忩蕭颯松風起慿崖一聽清心耳留連白雪意斷續回風度司空主簿韋應物琴掩仰雖已終忡忡在幽素上古聲久埋滅無由見真濫有琴具徽絃再鼔聽愈淡古聲久埋滅無由見真濫韓愈秋懐琴奏龍門之緑桐李白樽酒行䄂拂白雲開素琴彈為三峡流泉音李白劃然變軒昻勇士赴敵埸韓文聽頴師琴昵昵兒女語恩怨相爾汝劃然變軒昻勇士赴敵埸浮雲桞絮無根蔕天地闊遠随飛揚上斵為緑綺徽聲粲發李白琴賛嶧陽孤桐石聳天骨根老水泉葉苦霜月斵為緑綺徽聲粲發秋風入松萬古竒絶拂彼白石彈吾素琴幽澗湫兮流泉深善乎明徽高張清心寂厯似千古松颼颼兮萬尋同上霹靂琴桞子見桐門百衲琴李沂公勉雅好琴常出絲桐之精者雜綴為之謂之百衲琴用蝸角為徽罷琴惆悵月照席杜甫詩瑟二白伏羲始制素女遺聲漢書黄帝命素女鼔瑟帝悲不止故破五十絃為二十五絃也二十五絃文子曰二十五絃各以其聲應言瑟不鳴而絃有聲膠柱調瑟文子琴瑟在御莫不靜好子曰由之瑟奚為於丘之門門人不敬子路子路之瑟不合雅頌君子之近琴瑟以儀節也非以慆心也士無故不徹琴瑟鏗爾而捨子問曽㸃曰爾何如鼔瑟希鏗爾捨瑟而作云云㸃曽晳也孔子取瑟而歌孺悲欲見孔子孔子辭以疾将命者出戸取瑟而歌使之聞之使知己非真疾亷以立志見琴門雲和空桑同上促柱危絃朱絃清徵軒后之遺音黄帝湘靈之清韻湘妃澠池之㑹趙王恥為偏鼔西征賦絙絃促柱絙急絃也魚躍瓠巴鼓瑟㳺魚躍聽鳳舞趙女鼓瑟而鳯舞趙瑟不學操縵不能安絃禮曰清廟之瑟朱絃而䟽越一唱而三嘆有遺音者矣此雅淡之樂也言至和不在音也越瑟厎孔文以琴瑟禮摶拊琴瑟以詠祖考來格楊惲婦趙女也雅善鼓瑟韓愈答陳商書齊王好竽有求仕於齊者操瑟而徃立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾瑟鼔之合軒轅氏之律吕客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求禄利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟朱絲淫軫禹錫湘靈鼓瑟小說錢起寓宿驛舍外有人詠曰曲終人不見江上數峰青詠者數四怪之及殿試湘靈鼔瑟落句久不屬遂以此聨之因中選瑶瑟清骨唐相國李公集紀洪鍾駭聽瑶瑟清骨雲韶樂有瑟一樂志齊瑟彈東吟秦絃弄西音慷慨動顔魂使人成荒滛李白古風音響清塵埃韋蘇州樂燕行趙瑟正高張音響清塵埃一彈和妙謳吹去繞瑶臺艶雪凌空散舞羅起徘徊瑟有柱以玉為之吕延齊文選别賦注鳴瑟已呼孺人戞鳴瑟韓愈感春寳瑟各數十盧邁有寳瑟各數十有寒玉石磬響泉和志之號出南部新書柔瑟􅅤情弄柔瑟彈作陌上桑絃聲何激裂風卷繞飛梁李白擬古雲和瑟此李唐右史鄭休範贈妓天仙歌曰嚴吹如何下太清玉朋無軫六銖輕雖知不是流霞酌願聽雲和瑟一聲靈瑟時窅窅韓愈逺逰聮句悲管逐清瑟杜甫詩吟松風汎瑟李白感興暫醉佳人錦瑟旁何時詔取金錢㑹暫醉佳人錦瑟旁杜甫曲江對雨挾瑟箏三白蒙恬作筝秦筝史記曰夫彈筝者真秦之聲也郝素善彈筝朱絃玉柱危絃促柱新聲吕布奏於帳中不學操縵不能安絃楊惲曰家本秦也能為秦聲釋名曰筝施絃高筝筝然應六律阮瑶筝賦曰筝長六尺以應律絃有十二象十二時柱高三寸象於三才惣八風陶融妻陳氏筝賦曰惣八風之候不差貫㣲而洞雪不疾不徐矦瑾筝賦曰平平定均云云或合或離傅𤣥筝賦曰追赴促彈急聲而危洪纎奮假或合或離移風易俗推故引新傅𤣥賦云云有始有終傅𤣥云清濁代興有始有終不盈不縮陶融妻陳氏云度申楷模不盈不縮羅敷陌上之聲孔引刀斬指樊彦琛妻魏者楊州人彦琛卒值徐敬業難䧟兵中聞其知音令鼓筝魏曰夫亡不死而逼我管絃禍由我發引刀斬指西舍利獻其國樂至成都筝二其一形如鼉長四尺有四足虚腹以鼉皮飾背靣及仰肩如琴廣七寸腹闊八寸尾長尺餘卷上虛中施關以張九絃左右一十八柱其一靣飾彩花傅以虺皮為别彈筝搊筝樂志西京伎有彈箏搊筝各一哀響嬌童為我歌哀響跨筝笛韓愈感春清箏清筝何繚繞度曲緑雲垂李白邯鄲南亭木聲絲聲均其所自出抑折愉繹學者無能如間發書得筝以為其工獨得於天姿使木聲絲聲均其所自出抑折愉繹學者無能如劉禹錫與桞子厚書手語李白春日行佳人當忩弄白日絲捋手語彈鳴筝銀甲李義山詩十三學尸戰彈筝銀甲不曽御甲鳴銀玓瓅柱觸玉玲瓏白居易詩哀筝傷老大杜甫琴瑟筝筑皆一樂志樂縣之制頌瑟同上五曰絲為琴為瑟為頌瑟頌瑟筝也箏絃玉指調元稹琵琶四白出於絃鞉樂録琵琶本出於絃鞉杜縶以為秦之末盖苦於長城之役百姓絃鞉而歌之釋名琵琶本胡中馬上所鼓也牖下世説謝仁祖在北牖下彈琵琶有天際之意四絃象四時也朱絃奏烏孫之曲漢遣烏孫公主念其行道思慕使知音上奏琵琶以慰之馬嘈囋聲也朱生善彈琵琶雖伯牙之妙無以加焉大道之曲謝鎮西在大市樓上彈琵琶作大道之曲孫放孔偉阮咸並善彈琵琶不學操縵不能安絃竹林七賢傳曰阮咸善彈琵琶風俗通曰琵琶近代樂家作不知所起長三尺五寸法天地人與五行四絃象四時釋名曰推手向前曰琵却手向後曰琶因以為名焉傅𤣥賦曰所樂亦非瑟所樂亦非吟唯言琵琶與箏能娛我心緩調孫該曰緩調中絃元本反始急節成公綏賦云改調高彈急節促過非龍引舞趙女綺羅梁山象柱岱谷絃孫該賦絃則岱谷篚貢天府聲高中虚外實象天地也孔自下逆鼓曰琵自上順鼓曰琶讓皇帝子瑀聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絲大絃也樂家以自下逆鼔曰琵自上順鼔曰琶左庶子奏琵琶李綱仕隋為太子洗馬太子勇宴宫臣左庶子唐令則奏琵琶又歌武媚娘曲綱曰令則官調䕶乃自比倡優進滛聲惑視聽誠使上聞之豈不為殿下累乎龍首雲頭西舍利獻其國樂至成都韋臯以其樂器異常乃圖􅀞以獻有龍首琵琶一如龜兹製而項長二尺六寸餘腹廣六寸二龍相向為首有軫柱各三絃随其數兩軫在項一在頸其覆形如師子有雲頭琵琶一形如前靣飾虺皮四靣有牙釘以雲為首軫以有花象品字三絃覆手皆飾虺皮刻捍撥為舞崑崙狀而彩飾之遣弹琵琶柴紹吐谷渾党項㓂邉敕紹討之㓂據高射紹軍兩矢士失色紹安坐遣人為彈琵琶使二女子舞㓂疑之休射觀楸木為靣樂志高麗伎琵琶以蛇皮為槽厚寸餘有鱗甲楸木為靣象牙為捍撥畫國王形秦漢子樂志初隋有琵琶圓體修頸而小號曰秦漢子盖絃鼗之遺制出於胡中傳為秦漢所作羅沙檀槽明皇雜録天寳中中官白秀正自蜀使回得琵琶以獻其羅以沙檀槽為之温潤如玉光燿可鍳有金縷紅文蹙成雙鳳貴妃毎抱琵琶奏之音韻淒清飄出雲外諸貴主洎虢國夫人號為貴妃琵琶弟子毎授曲畢皆廣為獻玉環羯胡犯京上欲遷幸復登華蕚樓置酒四顧乃命進玉環玉環者睿宗所御琵琶也異時上長樂宫中常置别榻以帕覆之不以雜他樂器而未嘗持用至是命樂工賀懐智取調之又命禪定僧段師彈之除夜宴鼓琴九國志吳越錢鏐嘗嵗除夜宴命諸子及諸孫皆鼓琴一再行遽止之曰人将以我為長夜之飲也低鬟緩視抱明月纎指破撥生胡風劉禹錫秦娘歌琵琶宫調八十一元稹琵琶歌箜􅀢五白坎􅀢風俗通箜􅀢一名坎􅀢漢武帝祠太一后土令人調依琴作坎言其坎坎應節矦氏之音矦氏作故名箜篌箜篌出桑間濮上之地釋名云靡靡之樂見風俗通師涓所作公無渡河之曲琴操箜篌引者霍里子高所作也子高見白首提壺渉河其妻隨而止之不及堕河溺死妻乃援箜􅔃作無渡河之曲歌歌曰公無渡河公竟渡河公堕河死當奈公何曲終自投河死子高援琴而冩其歌聲名曰箜篌引不學操縵不能安絃禮注云操縵雜弄也胡箜篌後漢靈帝好胡服作胡箜􅔃漢祠見上注晉解晉永和起居注曰詔太史解士非祠曲可琵琶箜篌也孫賦孫氏有箜􅔃賦其文甚美麗霍歌見上公無渡河注孔彈箜􅔃為樂哥舒翰監軍李大宜在軍中不治事與将士彈箜􅔃為樂鳳首樂工天竺伎有鳳首箜􅔃一傷妻之夫奏箜􅔃傷妻之夫樊鑄􅊾曲江水伯文韶濩可息同上今欲取甘㫖之物肥濃之味皆充祭用韶濩可息而箜􅔃笙笛皆在奏矣宗廟加籩豆議韋述或出於蕃夷入耳之娛見上同作薊門桑葉王昌齡箜􅔃引有一遷客登高樓不言不寐彈箜篌彈作薊門桑葉秋風沙颯颯青冡頭朱字有李生者其舅姓盧有道術别久忽相遇邀生詣其居曰求得一妓善箜􅔃令侍飲李生視箜􅔃上有朱字云雲中辨江樹天際識歸舟盧曰此人名家莫要作婚姻否李莫測而退後娶陸長源女乃所見於盧家者問何能曰善箜􅔃示之朱字宛然李生具説女亦曰徃嘗夢至一處亦記見生出逸史卧箜􅔃魏高陽王雍美人徐月華能彈卧箜􅔃為明妃出塞之聲雜俎吳絲蜀桐李賀箜􅔃引吴絲蜀桐張高秋荆山玉碎鳳凰呌芙蓉泣露香蘭笑十二門前融令光二十三絲動紫皇同上鼔六白雷霆之聲可以象鐘鼔文子云春分之音風俗通鼔者春分之音以助萬物發生建靈鼉之鼔上林賦伊耆氏蕢桴土鼔密須分唐叔以宻須之鼔宻須國名曹劌曰夫戰一鼓作氣再而衰三而竭我盈故克之𫝊擊鼓其鏜鐘聲也詩鼔以警衆子有鐘鼔弗鼓弗考刺晉昭公鼔方叔入於河播鼗武入於漢武方叔皆鼔師名言周衰不能用樂故去昭其聲也聲以發之師之耳目在吾旗鼓雷門之鶴㑹稽雷門鼔有白鶴來飛入於是鳴洛陽聞其聲人或去之鶴還飛去堯有敢諫鼔禹以聽治禹以五聲聽治曰教寡人以道者擊鼔伐鼓淵淵鼔聲和平軒訇之音坎其擊鼓宛丘之下君子聽鼓鼙之聲則思將帥之臣禮傳曰三軍以利用也金鼔以聲氣也鼓以佐士衆之聲氣未絶鼓聲鼔鐘于宫聲聞于外鼓咽咽節也無持布鼔過雷門漢書殷人以樹樹其鼓也鏗鍧之響坎坎之音簨虡是懸鳴鼓而攻之可也夫子責冉有六鼔四金辨其聲用周禮鼓人掌六鼔四金之音以節聲樂以和軍旅以正田役而辨其聲用所以不同也周禮韗人凡冒鼓必以啓蟄之日象雷之發聲也以革蒙鼓曰冒短聞逺聞又曰鼓大而短則聲疾而短聞鼓小而長則聲舒而逺聞禮曰鼓無當於五聲五聲不得不和當猶王也先鼓以警戒鼓鼙之聲讙讙以立動動以進衆禮書曰下管鼗鼓周禮以雷鼔鼓神祀雷鼔八靣鼓也神祀天神也以靈鼓鼓社祭六靣鼓也地祗也以路鼓鼓鬼享四靣鼓宗廟也以鼖鼔鼔軍事大鼔長八尺以鼛鼓鼓役事一丈二尺以晉鼓鼓金奏長丈六尺金奏謂樂作擊編鐘韗人職曰良鼓瑕如積環革調急也鼔角晉樂志鼓角横笛吹曲周禮以鼖鼓軍事角説者云蚩尤帥魑魅與黄帝戰帝命吹角作龍鳴以禦之鼓之以雷霆易云云則其象也不知誰之所作易通卦驗曰冬至鼔用馬革圓徑八尺一寸夏至鼓用牛皮圓徑五尺一寸鄭曰馬坎類也小鼓謂之應爾雅纂要曰應鼓亦曰鼙鼔亦曰朄鼓亦曰田鼔應者引也言先擊鼓次引大鼓也又見禮圖大鼗謂之麻小者謂之料徒擊鼓謂之咢並爾雅玉鼓見春秋緯銅鼓見馬援傳石鼓見鄧明南康記以為山名又劉敬叔異苑晉武帝時呉郡臨平岸崩出一石鼓打之無聲以問張華華云可以蜀中桐木刻作魚形扣之則鳴如言果聞數十里聖鼓王韶之始興記曰秦鑿桂陽縣閣下鼓便自奔逸於臨武遂之洛陽因名聖鼓今臨武有聖鼓城也節鼓傅𤣥有節鼓賦樂録曰鼗鼓而小執其柄而揺其耳傍還自擊而鳴爾雅曰小者曰料今人倂而言之矣擊玉春秋孔演圖曰有人叩金與擊玉鼓駕六龍也獻銅虞喜志林曰建武二十四年南康郡男子獻鼔有記云廟西禮曰廟堂之下懸鼓在西應鼓在東也座左呉質答曹植書曰塤箎激於華鼓者郭也風俗通云盛𢎞之荆州記曰始興郡桂陽縣有豫章木徑可長二丈作鼔名聖鼓秦時伐此未果忽自奔洛陽交趾鑄銅范曄後漢書馬援好騎名馬交趾得駱越銅鼓乃鑄為馬式孔禁用鄭餘慶兼判太常卿事自朱泚亂都輦數驚太常𨽻樂禁用鼓餘慶以時久平奏復舊制都曇鼓毛員鼓樂志天竺伎用都曇鼓毛貟鼓村鼓時時急杜甫詩雲重鼓聲寒不起李賀龜頭高麗有龜頭雞婁龜兹有荅獵鼓矦提鼓雞婁鼓建鼓樂志八音四曰革為雷鼔為靈鼔為路鼔皆有鼗為建鼓為鼖鼓為縣鼓為節鼓時鼓五代張薦明為道士高祖召見延入内殿薦明聞宫中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也配和鸞以入用並司南而為急桞宗元記里鼓賦施五繫於華山之野知霧氣已籠用百發乎南山之陽識雷聲所及同上鄙繁音之坎坎陋促節之闐闐同上石鼓酉陽雜俎冀縣有天鼔山山有石如鼓河鼓星揺動則石鼓鳴鳴則秦土有殃羯鼓尤宜促急南卓羯鼓録羯鼓尤宜促急作連鼓碎之聲破空透逺持異衆樂凡天神之類皆以雷鼓地祗之類皆以靈鼓人鬼之類皆以路鼔樂志八音領䄂𤣥宗云羯鼓八音之領䄂上南山起雲宋璟尢善羯鼓詞云南山起雲北山起雨者宋所作也羯鼓觧穢上嘗聽琴未終遽止之曰速令花奴持羯鼔来為我解穢上曲終花不墜汝陽王璡打曲上自摘紅槿置㡌上王嘗戴研光絹㡌極滑久而方安曲終花不墜上鐘七白倕作鐘見世本鳬氏作鐘周禮鐘秋分之音五經義從革以成懸於簨虡發鯨魚鏗華鐘鏤杵作魚形以叩鐘文選應雊雉淮南子撞鐘於庭郊雉皆雊注鐘聲似雷雷震則雉雊洪鐘萬鈞西京賦九乳千石三輔圖秦始皇造􅙌三文鐘小者皆千石也豐山有鐘九耳霜降則鳴山海經記曰善待問者如撞鐘叩之大者則大鳴叩之小者則小鳴鼓鐘于宫聲聞于外詩周景王将鑄無射鐘名泠州鳩曰王其以心疾死乎夫音樂之輿也而鐘音之器也器以鍾之鍾聚也聚其音也小者不窕窕細也大者不摦戸化反撗也則和於物物和嘉成嘉樂成也故和聲入於耳而藏於心心億則樂億安也窕則不咸不滿心也摦則不容心不容也心是以感感則生疾禹聽治禹以五聲聽治銘筍虡曰教寡人以義者擊鐘子有鐘鼔弗鼔弗考刺晉昭公昭其聲也聲以發之聽之則思武功錫之以旌文德顓頊居位文德者錫以鐘磬山崩先鳴東方朔傳漢武帝時末史宫殿前鐘無故自鳴三日三夜詔問朔朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鐘先鳴三日南郡太守上言山崩上大笑魯莊既鑄曹劌發言魯荘公鑄鐘大曹劌入見曰今國小鐘大云云齊景将懸晏子遂毁晏子春秋齊景鑄大鐘将懸之晏子曰鐘大不以禮遂毁之杜蕢是聽且諷晉侯禮智悼子卒未葬平公飲酒鼓鐘杜蕢自外来聞鐘聲遂入酌飲師曠曰曠飲斯又酌飲李調曰調飲斯吳札既聞乃誚文子傳吳季札将宿於戚聞鐘聲曰異哉夫子在此猶鷰之巢幕上也君又在殯可以樂乎遂去之不宿南鄰擊鐘磬左思詩撞之以莛豈能發其聲金奏編鐘也兩欒欒鐘口兩角周禮鳬氏作鐘薄厚之震動清濁之所由出侈奄之所由興也鐘已厚則石石聲不發也已薄則播大薄則聲播侈則柞音昨柞然聲大也奄則鬰聲不舒揚也鐘大而短其聲疾而短聞鐘小而長則其聲舒而逺聞周禮鐘聲鏗鏗以立號號以立横横以立武君子聽鐘聲則思武臣禮宋左師向巢每食擊鐘傳鄭伯有於窟室夜飲酒擊鐘傳笙鏞以間鏞鐘鼓鐘伐鼛周禮鐘師掌金奏金謂鐘及鏄也凡樂事以鐘鼓奏九夏漢靈帝鑄鐘四皆受二千斛懸於玉堂及靈臺殿前鳴洪鐘善鐘律魏志杜􅇪字公良以知音為雅樂郎參大樂事善鐘律聰慧過人紹復先代古樂皆䕫始也初漢鑄銅工柴玉巧有意思䕫令鑄鐘其聲鈞聲清濁多不如法數改作玉甚厭之謂䕫清濁任意頗相短䕫玉更相白太祖太祖取所鑄鐘錯雜更試然後知䕫之精而玉之妄於是罪玉國語鐘大不過鈞量不過石無射也單穆公周禮磬師掌擊磬擊編鐘教眡瞭也教縵樂之鐘磬縵樂雜聲之和樂者燕樂房中之樂二樂皆教鐘磬凡祭祀奏縵樂所謂隂之聲孔姑洗角楊收涔陽耕得古鐘高尺餘收扣之曰此古洗角也既劀拭有刻在兩欒果然丐銅鐘南蠻曇陵陀丐馬銅鐘帝與之金銀鐘南蠻婆賄伽盧國王宫設金銀二鐘㓂至焚香擊之以占吉㓙大儀理則天歛天下黄金作大儀理不就撾鐘三千雙娥獻歌笑撾鐘考鼔宫殿傾唐李太白春日行鐘動猿鳴鐘動不知曉韓愈衡岳廟詩寸莛撞有如寸莛撞鉅鐘留東野歌鐘歌鐘樂未休榮至老還逼李白自鳴天寳十載六月乙亥大同殿前鐘自鳴占曰庶雄為亂五行志鐘聲嘶嗄光化三年冬武德殿前鐘聲忽嘶嗄銅鐘孫智諒開元中内殿修齋奉詔投龍於吉州玉笥山泊舟江側有異氣在東川之中疑有古跡乃於閤皂山掘得銅鐘一枚重百餘斤鐘下得玉象三身因置閤皂觀出南部新書寜失制於侈靡喬潭霜鐘賦寕失制於侈靡抑豈遺音於窕摦觸物瀏亮同上乍浮空以紆餘更觸物而瀏亮發越林巒周流井邑鐘之為器諧八音而表節岑文本賦黄鐘元間之登清廟也鏗天地動神祗桞宗元荅問簨虡八白設業設虡崇牙樹羽詩周梓人為簨虡天下大獸五脂者膏者臝者羽者鱗者並雕盡於樂懸上以鳴備物也外骨内骨却行庂行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕琢故擊其所懸而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以為簨削為鐻荘子曰梓慶削木為木為鐻未嘗敢以耗氣必齋心也孔左校署百官志左校暑令二人丞一人掌梓匠之事樂縣簨虡皆供焉二十虡樂志凡植者為簨横者為虡虡以縣鐘磬皆十有六周人謂之一堵而唐人謂之一虡自隋以前宫縣二十虡及隋平陳得梁故事用三十六虡遂用之唐初因隋舊用三十六虡高宗蓬莱宫成増用七十二虡至武后時省之開元定禮始依古著為二十虡造簨虡開元記上造簨虡流蘇之屬皆以金玉珠翠珍怪之物雜飾之蛟螭露簨虡韓愈詩簨虡仡以碣磍杜甫享太廟磬虡起北起西餘見磬門磬虡在西鐘虡在東樂志磬九白無句作磬無句堯時人磬立秋之樂五經義曰磬者夷則之氣象萬物之成白虎通虞書䕫曰擊石拊石百獸率舞擊石拊石並擊磬也百獸感音而舞鳴球球亦玉磬泗濵之石書曰泗濵浮磬言石浮可為磬有心之擊子擊磬於衛有過者曰有心哉擊磬乎擊磬襄入于海襄磬師名昭其聲也懸黎之磬玉石名洞隂之磬磬名也見漢武内傳浮金輕玉之磬漢武帝有之賔媚人行賂於晉晉敗齊齊矦使賔媚行賂以紀甗玉磬賔媚人國佐也文仲告糴于齊國語魯飢臧文仲以玉磬告糴于齊南鄰擊鐘磬左思詩和鐘並擊與笙同音詩云笙磬同音􅇪拊吕氏春秋堯命䕫拊石子擊見上獸舞見上鳥應東漢王阜為重泉令鸞鳥集于學阜擊磬鳥飛應而舞簨虡斯懸襄入於海子擊于衛不擊不考石聲磬磬以立辯辯以致死君子聽磬聲則思死封疆之臣禮周禮磬氏為磬倨句一矩有半磬師掌編磬教眡瞭也教縵樂見鐘門水濵得漢武時犍為郡於水濵得石磬十六枚劉向説上宜興辟雍設膠序隆雅頌之音以風化於天下無句作磬未知孰是樂録云世本亦云笙磬頌磬周禮注曰在東方曰笙磬笙生也西方曰頌磬頌或作康康功也泗濵見上瀛上王子年拾遺記曰瀛州上有青石可為磬長一丈而輕若鳴也浮金郭子撗洞冥記曰漠武帝作仙閤於甘泉宫西其上懸浮金輕玉磬禹以五音聽政懸鼔磬鐸鐘鞀以待四方之士為銘於簨虡曰語寡人以憂者擊磬淮南子魯堂漢書魯恭王壊孔子舊宅以廣宫室聞鐘磬琴瑟之聲遂不敢壊漢閤見上孔大磬編磬歌磬樂志曰凡樂八音二曰石為大磬為編磬為歌磬玉磬文宗好雅樂詔太常卿馮定采開元雅樂製雲韶法曲雲韶樂有玉磬四笙磬同音文宗遇内宴乃奏曰笙磬同音沉吟忘味不圖為樂至於斯也自是臣下功高者輙賜之敗沸耳作驚爆端能敗笙磬韓愈荅桞州食蝦蟇詩清磬司空圖題桞氏集後金之精麄攷其聲皆可辨也豈清於磬而渾於鐘哉緑玉磬楊妃善擊磬乃取藍田緑玉琢之備極精巧幸蜀還乃送太常蔵之出開元記樂石嶧山碑云刻此樂石人多不曉顔師古謂以泗濵浮磬作碑也封氏見聞録東方西方磬虡起北南方北方磬虡起西皆鐘虡次之樂笙十白垂作笙見世本女媧之笙簧禮太簇之氣白虎通笙之言施也牙也萬物始施而牙太簇之氣也正月之音說文笙正月之音物生故謂之笙子晉吹以鳳鳴列仙傳王子晉好吹笙作鳳凰鳴逰伊洛間道士浮丘公接之上嵩山也虞帝奏而獸舞書曰笙鏞以間鳥獸蹌蹌與鏞間奏見上將磬同音詩曰笙磬同音北里之吹左思詩北里吹笙竽南郭之濫韓子曰齊宣王好竽必三百人齊吹南郭先生不竽者而濫於三百人之中以吹笙食禄宣王薨後王即位曰寡人之好竽欲一一吹之南郭先生乃逃也女媧之遺音董成之妙曲西王母侍者董雙成善吹笙曲沃之懸匏汶陽之孤篠潘岳笙賦我有嘉賔鼓瑟吹笙吹笙鼓簧詩周禮笙師掌教吹笙竽塤籥簫箎篴管竹聲濫濫以立㑹㑹以聚衆君子聽笙竽之聲則思畜聚之臣禮絃匏笙簧㑹守拊鼓禮匏竹在下吹笙鼓簧中心翔翔穆天子傳云西王母吟曰云云大笙謂之巢小者謂之和爾雅魏文帝令杜䕫於賔客吹笙鼓琴䕫有難色遂黜免䕫字公良為協律都尉漢桓帝能吹笙見東觀漢記釋名曰笙生也象物貫地而生以匏為之中空以受篁潘岳笙賦曰明珠在水若銜若垂又云荆玉喟其長吟椘妃歎而増悲王廙笙賦曰金清玉振兮受合乎大諧又其調之妙離鴻潘賦曰夫其凄戾辛酸關關若離鴻之鳴兮别鵠王廙賦曰親昵逺逝登山送離發千里之長思詠别鵠於路岐通氣和神許慎説文曰舜祠下得笙玉管夫以玉作音故神人和鳯凰来儀也逹隂陽五經析疑曰夫笙者法萬物始生通逹隂陽氣故有長短黄鐘為象法鳯凰也移風俗晉王廙笙賦曰直而不居曲而不兆䟽音簡節樂不及妙以移風俗合至教𢎞義著於典謨厯萬代而彌邵孔通氣季秋之月上丁入學習吹所以通氣也簫管笙竽皆以吹鳴也月令章句三成下管新宫笙入三成謂三終也儀禮列管匏中列管匏中施簧管端大者十九雅釋樂逸態陸罕詠笙詩人情應節轉逸態逐聲移所美同王子弄羽一参差来應雲和琴楊希道詩短長挿鳯翼洪細摹燕音切切孤竹管来應雲和琴曾城之匏其制也取不周之竹曾城之匏王廙賦簫十一白舜作簫其形参差以象鳳翼風俗通簫仲吕之氣白虎通夏至之樂易通卦驗云簫韶九成鳳凰來儀舜樂簫史弄玉列仙傳簫史善吹簫能致孔雀白鶴秦穆公女弄玉亦好簫遂妻之乃教弄玉作鳳臺一旦夫妻皆随鳳去為作鳳女祠時有遺音簫管悲且清潘岳賦秦簫玉簫晉書發凉王張駿墓得赤玉簫洞簫無底者也雅簫長四寸仲夏之月樂師均簫管参差之音禮秦樓之遺音弄玉也鳳簫短簫折桞之曲短簫有折楊桞之曲王襃洞簫賦文選編竹五經義簫編竹為之長尺五寸簫長則濁短則清月令章句從以簫管禮君子聽簫管之聲則思畜聚之臣與笙門同見上注簫管備舉喤喤厥聲詩天籟人籟地籟籟簫也荘子曰汝聞天籟未聞人籟汝聞地籟而未聞天籟南郭子綦云云漢元帝多才蓺吹洞簫自度曲被歌聲也大者二十四管無底小者十六管有底博異云頌簫長一尺二寸見三禮圖漢元帝靈帝能吹簫見謝丞後漢書九成見上七數鄭注易通卦驗曰簫夏至樂夏至火用事其數七象鳳致鶴並見上注鳳飛簫史魚瞰王襃賦曰遷延縱逸魚瞰雞睨垂啄宛轉瞪瞢惡食文選薊陌葛洪神仙傳曰薊子訓少嘗仕郡人莫知其道三百餘年顔色不老及死殯之宿昔棺輷然作雷霆音光照宅宇見棺盖飛於中庭棺中無復有人但餘履耳須㬰聞陌上有人馬簫鼓之音張墓三十國春秋曰凉州胡安盗晉文王張駿墓見駿貌如生得赤玉簫紫玉笛越宫吕氏春秋曰客有以吹籟見越王者上下宫商和而越王不喜或謂之野者而王乃悦之亦有如此者要在聽之而已籟謂之簫廣雅伍子胥鼓腹吹簫乞食於吳市史記孔細器書注見細噐之備條暢敷紛洞條暢而罕節兮摽敷紛以扶踈王子淵賦武聲仁聲武聲若雷霆仁聲若凱風同上危聲危聲合歌鼓絶弄混笙箎劉孝儀詩間笙簧喧然名都㑹吹簫間笙簧杜甫詩笛十二白武帝時丘仲作笛風俗通列和之遺音列和善吹笛截竹作龍吟笛賦云近世雙笛從羌起餘見下柯亭之竹見知音門發山陽之聲向子期思舊賦序曰山陽鄰人有吹笛者發聲嘹亮感言而作賦折楊桞落梅花之曲曲名也六孔羌笛竹聲禮石崇妓緑珠有國色善吹笛長笛賦序馬融精該術數性好音律能吹笛為督郵無事獨卧郡平陽邸有雒客舍逆旅吹笛融去京師踰年蹔聞甚悲之而作長笛賦當笛賦曰羌人伐竹未及已龍鳴水中不見已截竹吹之聲相似剡其上孔通洞之裁以當便易持京房君明識音律舊本四孔加以一君明所加孔後出是謂商聲五音畢梁蕭統云云笛長短茍朂問協律列和曰作笛唯可依十二律十二笛令一孔依一律否和曰樂東廂長笛尾長四尺三寸令若取其下徵之聲於法聲濁者笛當長計其尺寸乃五分有餘和昔日依之不可吹也又笛諸孔亦恐不能得一孔應律也一定之調晉書云按周禮金石有一定之音故諸音皆受鐘磬之均至於饗宴殿堂之上不懸鐘磬則以笛有一定之調故諸絃歌皆從為正也三尺二調晉荀朂問列和曰若不知律吕之義作樂者均高下清濁之調當以何名之和曰毎合樂時随歌者清濁聲假聲濁者用三尺二笛因名曰此三尺二調聲清者用二尺九笛因名曰此二尺九調漢魏相傳施行皆然也請吹晉桓伊叔夏有蔡邕柯亭笛嘗自吹之王徽之赴召京師泊舟青溪側素不識伊伊於岸上過有客曰此桓野王也徽之便使人謂曰聞君善吹笛試為一奏伊已貴顯素聞徽之名便下車倨胡床為三弄畢便上車去主客不交一言野王伊之小字也作笛晉樂志云宋玉賦玉在漢前作笛賦或云漢武時丘仲作此説恐非也馬融又有長笛賦云近代長笛從羌是笛滌也所以滌邪穢納之於雅正也長一尺四寸今有七孔衡陽之簳笛之所出也見宋玉賦雲夢之竹出笛見魏文與吳質書馬融宋禕並善吹笛桓子野及奴碩見語林芳林皓簳有竒寳兮宋玉賦類削良簳三孔條長昭華之琯西京雜記曰高祖初入咸陽宫周行庫府金玉珍寳不可言其尤驚異者笛長三尺三寸六孔銘曰昭華之琯絲竹之音攄憤蔡邕瞽師賦曰夫何矇昧之瞽兮心窮忽以鬰伊目冥冥而無覩兮嗟懐順以愁悲撫長笛以攄㥽兮云云諭意長笛賦曰可以通靈感物冩神諭意也逺可以通靈逹㣲近可以寫情暢神蔡邕長笛賊激朗清厲隨光分馬融長笛賦云清哀陶潜閑情賦曰起攝帶以伺晨繁雲粲于素階難歛翼而未鳴笛出聲而清哀孔隨歌随歌響更發逐舞聲彌亮姚崇詩紫雲廻明皇夢逰月宫諸仙奏上清之樂流亮清越殆非人問所聞覺以玉笛冩之名紫雲廻曲開元傳信記臥吹笛漢中王瑀為太常卿早起聞永典里人吹笛問是太常樂人否曰然後因閲樂撻之曰某日何得卧吹笛裂石李舟嘗得村舍煙竹截以為笛以遺李謩謩吹笛天下第一月夜泛江吹之寥亮逸發俄有客呼船而至請笛吹之甚為清壮山石可裂及入破呼吸盤辟應手粉碎客散不知所之疑其蛟龍也國史補七月望前許雲封言竹生雲夢之南鍳在柯亭之下以今年七月望前生明年七月望前伐過期不伐則其音窒末期而伐則其音浮甘澤謡洞庭老父賈客吕筠卿嘗於中春夜泊舟於君山側命酒吹笛數曲忽見一老父拏舟而来遂於懐䄂間出笛三管其一大如合拱其次如常人之所蓄其一絶小如細茟管筠卿請老父一吹老父曰其大者諸天之樂不可發其次者對洞府諸仙合樂而吹其小者是老身與朋儕可樂者試為子吹之不知可終一曲否言畢抽笛吹三聲湖上風動波濤沆瀁魚龍跳噴五聲六聲君山上鳥獸呌噪月色昏昧舟人大恐老父遂止博異志斷腸聲吹笛秋山風月清誰家巧作㫁腸聲杜詩催落日鳴笛急吹催落日清歌緩送感行人韓詩水中龍應行雲絶高聲五音随指發水中龍應行雲絶曽将黄鶴樓上吹一聲占盡秋江月劉禹錫笳十三白笳者胡人卷蘆葉吹之以作樂也故曰胡笳播為琴曲蔡琰胡笳互動牧馬悲鳴吟嘯成羣邉聲四起李陵書云悲笳文選出塞入塞胡笳者張博望入西域傳其法於西京唯得摩訶兠勒一曲李延年因胡曲更造新聲二十八解以為武樂有出塞入塞楊桞等十曲感動劉疇字正喬嘗避亂塢璧賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其游客之思於是羣胡皆垂淚而去孔笳吟細桞營杜詩大駕鹵簿前部掆鼔十二夾金鉦十二大鼓長鳴皆百二十鐃鼔十二歌簫笳次之儀衛志羽葆鼓十二歌簫笳次之大横吹羽葆鼔十二歌簫笳次之同上後部歌簫笳次之同上竽十四白北里吹笙竽左思詩笙竽俱唱文選濫吹南郭先生見笙門北里之吹南郭之濫見上注竹聲禮記見笙門竽笙偹而不和禮明器也孔高門有笙竽韓愈詩雲韶竽一樂志文宗好雅樂詔太常卿馮定製雲韶樂有竽一七曰匏樂志七曰匏為笙為竽為巢為和缶十五白坎其擊缶宛丘之道詩陳風澠池之㑹秦王為趙王擊缶趙王命史書之易曰日昃之離不鼔缶而歌則大耋之嗟凶離六三荘缶缶堪擊文選擊缶真秦之樂也楊惲書用缶又曰樽濔簋貳用缶納約禮曰門外缶門内壺孔盎缶地理志河南府土貢埏埴盎缶製用金成張瀆宣室志李員居長安延夀里一夕忽聞室之西隅有歌其音極清越泛泛然久不已切誌其歌詞曰色分藍葉清聲比磬中鳴七月七日吾當示汝之形歌竟其音亦聞後至秋始六日夜有甚雨潰其堂之北垣明日垣圯又聞其聲果前聞者員驚視之於垣下得一缶徑尺餘製用金成形状竒古有文視不可見叩之其韻極長即命滌去塵蘚厯然可讀字若小篆乃崔子玉座右銘貟得而異之琉璃罌缶南蠻婆賄伽盧國與諸蠻市以琉璃罌缶相易擊轅拊缶桞宗元答友人求文章書籥十六白詩曰左手執籥籥三孔笛也舞者執之天地之間其猶橐籥乎老籥師掌教國子舞羽吹籥周禮豳籥豳人吹之以為樂以籥不僣僣音侵孔吹籥王義方貶吉安丞行釋奠禮清歌吹籥登降跽立人人悦順雲韶籥文宗好雅樂製雲韶樂有籥一鳴籥紅頰吹鳴籥韓愈郾城聮句持羽執籥持羽魏證送文舞迎武舞入用舒和文舞郎左執籥五代史崔棁傳廟卑忌尊則去籥裴寛傳嘯十七白蘇門之遺聲妙動林壑蘇門先生孫登善長嘯毎發聲妙動林壑諧琴阮臺阮嗣宗善嘯聲與琴諧陳留有阮公嘯臺成瑨坐嘯成瑨為南陽太守委任功曹岑晊人語曰南陽太守岑公孝𢎞農成瑨但坐嘯成公綏嘯賦逸羣公子慷慨長嘯自然之至音發口成音飛随口吻以發揚音妙聲竹不如肉晉書靈源之餘音神境記曰滎陽西有靈源山昔有採藥此山間林谷聞有長嘯者今樵人徃徃猶聞姑石之遺響異苑曰濤陽姑石山在江之坻初桓𤣥西下令人登之嶺上便聞長嘯聲甚清徹至峯乃見一人箕踞石上不言晋陽秋曰嵇康見孫登對之長嘯而不言也不答漢晉春秋曰桓帝幸樊城百姓莫不觀有老父獨耕不輟議郎張温使問焉父嘯而不答數齒荘子童子夜嘯鬼數若齒有女仳離條其歗矣有女仳離遇人之不淑矣詩解賊圍劉琨字越石為胡騎所圍城中窘廹因乗月登樓清嘯胡賊聞之皆悽然長歎而去趙炳臨流乗舟長呼而自濟捜神記趙炳嘗臨水從舩人乞渡舟人不許炳乃擅坐其中長嘯呼風亂流而濟王廙倚樓而長嘯王廙列傳曰王導與庾亮㳺于石頭㑹過嘯至是日迅風飛㠶倚樓而長神色自逸魯女倚柱而悲嘯列女傳曰魯漆室邑女過時未嫁倚柱而悲嘯旁人問之曰何嘯之悲也子欲嫁乎吾為子求偶􅃮室邑之女曰吾豈為不嫁之故而悲哉憂吾君老太子少也善歌嘯郭子曰劉道真少時善歌嘯有一老姥識其非常人甚識其歌嘯乃殺㹠食之道真食㹠不謝向南風而嘯呉越春秋曰吳王闔閭将欲伐椘登臺向南風而嘯有頃乃歎羣臣莫有曉王意者伍子胥深知王憂乃薦孫武善為兵法人莫能知阮籍性樂酒善嘯聲聞數百里竹林七賢傳箕踞嘯歌世説曰晉文王德盛功大坐席嚴敬擬於王者惟阮籍箕踞嘯歌酣放自若如鼓吹七賢傳蘇門山中忽有真人在焉阮籍徃尋與語不應籍乃長嘯有頃笑曰可更作又為嘯遂還半嶺嶺巔哂然有聲若數部鼔吹乃向人之為嘯潯陽記曰桓宣穆盧山見一人謂之曰君過前嶺必逢二少年相随長嘯試要問之若不與言者可速去果見二人以袂掩鼻長嘯状如惡其臭呼之不與言夢書云夢吹嘯者欲有求也雜字解詰曰嘯吹聲也化石而嘯内傳曰海春仙人居髑髏山善嘯術時太山道士鍾約字期徃来欽其蓻春變為石人約不知乃坐石上仰面而嘯石亦復嘯於下傾山動澗響遏行雲約再拜謝之春知其意莫止即於坐石上對教三事不飲不食乃得嘯而風生於虎也孔乗月吟嘯崔咸善長嘯甘澤謡曰韋騶明五音善長嘯夫婦嘯詠崔覲與妻隠南山夫婦嘯詠相視為娛嘯有十五章一曰權輿二曰流雲三曰深溪虎四曰高桞蟬互曰空林鬼六曰巫峡猿七曰下鳴鵠八曰古木鳶九曰龍吟十曰地動十一曰蘇門十二曰劉公命鬼十三曰阮氏逸韻十四曰正章十五曰畢章出王叡炙轂子遞嘯韓愈納凉聨句遞嘯取遥風㣲微近秋朔溪谷寒白笴夜長嘯爽然溪谷寒李白逰秋浦出原野長嘯出原野澟然寒風生酬崔五郎中長嘯萬里風掃清胸中憂㽞别賈舍人倚天梯送君登黄山長嘯倚天梯送族弟輕衣裾長嘯輕衣裾嘯咤川澤弋獵畋漁嘯咤川澤常衮馬司徒神道碑激於舌端而清永㤗中大理評事孫廣著嘯㫖一篇云其氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事逹情性嘯之清可以感鬼神致不死雷鼓霹靂之引天寳末有峩嵋山道士姓陳来逰京邑善長嘯能作雷鼔霹靂之引初則發聲調暢稍加散越須㬰空寫雷之音忽復震駭聲如霹靂觀者莫不傾悚已上出唐語林激氣衝口吕向注文選嘯賦潜轉於脣齒之間激氣衝口而出聲之清逺吕延濟文選注放歌長嘯歐陽矩移陸司勲書清聲上徹雲漢李翺守盧江有重囚當刑引决之乃哀鳴曰某有薄蓻願於貴人前試之乃長嘯也乃命釋械俄而清聲上徹雲漢公曰不謂蘇門之風出於赭衣之下可與孫阮同躅乎即赦其罪逸韻動海上與南陵常賛府逰五松山安石泛溟渤獨嘯長風還逸韻動海上髙情出人間李白平明空嘯咤思欲解世紛上白孔六帖卷六十二
