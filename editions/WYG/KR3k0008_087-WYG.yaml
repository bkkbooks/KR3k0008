body:
  text: 白孔六帖卷八十七唐白居易原本宋孔傳續撰箴一碑二檄三射䇿四武五文武相須六儒教七儒術八太學九學官十勤學十一廢墯十二過時十三㓜學十四箴一白箴興於補闕箴頓挫而清壯官箴虞箴昔夏后氏命百官箴王闕虞箴於虞人之箴曰茫茫禹跡虞人云云可不懲乎孔進諭善箴韋承慶遷司議郎太子監國進諭善箴獻虞人箴以諷白居易穆宗好畋游獻虞人箴以諷賜君臣箴杜希全封餘姚郡王將即屯獻體要八章砭切政病帝嘉納賜君臣箴一篇獻獄官箴裴諝惡法吏舞文或挾宿怨為重輕因獻獄官箴以諷太醫箴栁公綽憲宗喜武功且數出游畋公綽奏太醫箴以諷其辭挺切謝偃傳初帝即位直中書省張藴古上大寳箴諷帝以民畏而未懷其辭挺切擢大理丞以箴贈行楊炯舉神童遷盈川令張說以箴贈行戒其苛佞䛕有類邪巧多方其萌不絶其害必彰李義府獻承華箴云佞䛕有類邪巧多方其萌不絶其害必彰義府方諂事太子而文致若讜直者太子表之箴以譏刺得失李善文選注上丹扆六箴李徳裕時帝昏荒數游幸狎比羣小聽朝簡忽徳裕上丹扆六箴其一曰宵衣諷視朝希晚也二曰正服諷服御非法也三曰罷獻諷斂求恠珍也四曰納誨諷侮棄忠言也五曰辨邪諷任羣小也六曰防微諷偽遊輕出也辭皆明直婉切帝雖不能用猶作詔謝其意碑白事具䘮部碑門碑披文以相質黃絹絶妙好辭曹娥碑背有人題云黃絹㓜婦外孫虀臼楊脩曰黃絹是色絲色􅁝是絶字㓜婦是少女少女是妙字外孫是女子女子是好字虀臼是受辛之物受辛辭字所謂絶妙好辭孔福先寺碑皇甫湜裴度辟為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而逺取居易請從此辭度謝之湜即請斗酒飲酣援筆立就度贈以車馬綵繒甚厚諸葛石刻南蠻傳廣徳初鳯迦異築柘東城諸葛亮石刻故在文曰碑即什蠻為漢奴夷畏誓常以石搘捂誦碑無謬高智周嘗誦碑無謬者刋誓段文昌長慶二年黔中蠻叛文昌使一介開曉蠻即引還彭濮蠻大酋蹉祿來請立石刋誓修貢獻頌美許圉師為虔州刺史遷相州專以寛治州人刻石頌美著惠韋杭為永昌令遷右御史臺中丞邑民立碑著其惠遺後人作矴石楊瑒在官清白吏請立石紀徳瑒曰事益於人書名史氏足矣若碑頌者徒遺後人作矴石耳寘璧楊炎薛邕嘗得炎所為李楷洛碑寘壁日諷玩之李栖筠為常州刺史人為刻石頌徳劉晏所至有惠利可紀民皆刻石以傳製紀功碑褒賜韋臯進南康郡王帝製紀功碑褒賜之立石紀政殷侑拜義昌軍節度使上下便安請立石紀政刻石載徳高叡遷通義令有治勞人刻石載徳詔鑱名泰華二山安金藏擢右驍衛將軍爵代國公詔鑱名泰華二山碑以為榮持簡操筆從而寫之韓愈平淮西碑文表自古聖神之君既立殊功異徳卓絶之迹必有奇能博辨之士為時而生持簡操筆從而寫之辭事相稱載於書則堯舜二典夏之禹貢商之盤庚周之五誥於詩則𤣥鳥長發歸美殷宗清廟臣工小大二雅周王之歌辭事相稱同上乾坤之容日月之光知其不可繪畫強顔為之同上古碑殘缺苔篆磨滅賈至宓子賤碑序碑版照四裔杜甫詩干謁走其門碑版照四裔各滿深望還森然起凡例孤嶂秦碑在登樓同上碑版笑顔竣元稹詩碑者悲也古者懸而窆用木後人書之以表其功徳因留有不忍去碑之名由是而得自秦漢以降生而有功徳政事者亦碑之而又易之以石失其稱矣陸龜蒙野廟碑公鼎矦碑志隧表阡一字之價輦金如山祭韓愈文崔協任圜明宗問誰可相重誨以崔協對圜曰崔協不識文字而虛有表號没字碑棠棣碑賈敦頥始洛人為敦頥刻碑大市旁及敦實入為太子右庶子人復為立碑其側故號棠棣碑讀路傍碑蕭頴士嘗與李華陸拘游洛龍門讀路傍碑穎士即誦華再閱拘三乃能盡記聞者謂三人才高下此其分也索靖碑歐陽詢嘗行見索靖所書碑觀之去百歩復還立觀疲倦即坐困宿其傍三日乃得去其所嗜類此願立碑省戸下以頌徳楊國忠鮮于仲通等諷選者鄭怤願立碑省户下以頌徳詔仲通為頌帝為易數字因以黄金識其處磨班超紀功碑姜行本高昌之役為行軍副揔管出伊州距栁谷百里其處有漢班超紀功碑行本磨去古刻更刋頌陳國威靈没字碑五代安叔千狀貎堂堂而不通文字所為鄙陋時人謂之没字碑立東渭橋以示後世唐李晟帝紀其功自文于碑敇皇太子書立于東渭橋以示後世字青石赤岣嶁山尖神禹碑字青石赤形摹奇科斗拳身薤葉披鸞飄鳯泊拏虎螭韓愈岣嶁山文字缺滅舊碑斷折其半仆地文字缺㓕幾不可讀祭湘夫人移之於新或失其真舊碑石既多破落文不可盡識移之於新或失其真遂不復刻當晝而文星見不寢而白鳯來鄭亞賛皇公一品集序公祗膺宸命舒展格言呼嘯神祗吐納嵩華當晝而文星見不寢而白鳯來成諸侯不朽之功尊元后無私之化於是有幽州紀聖功之碑苔篆將磷文粹賈至宓子賤頌復立碑魏徴薨帝作文于碑遂書之及纎人毁短乃仆所為碑遼東之役還復立碑碑以頌徳李善文選注已慙黃絹之辭文至淺陋已慙黄絹之辭性茍不廉益昧素􅁝之節字重青瑶鐫于持南曹叙字重青瑶鐫韓送靈師頗黎碑驪山筝殿側有魏温泉堂碑其石􅉷徹宫中呼為頗黎石之碑也出楊妃外傳雞碑芝田録序智昧雞碑碑流汗蔡州既平憲宗命道士張某至境醮于紫極宫宫本呉少誠生祠晉公廢以為宫醮之日雷霆大震少誠徳政碑流汗成泥嘉話青苔乆磨滅峴山臨漢江水緑沙如雪上有墮涙碑青苔久磨滅李白襄陽曲辨碧落碑紀聞譚絳碑篆千餘字李陽氷愛之其中有碧落二字謂之碧落碑後有識者云有唐十三祀龍集敦䍧哀子李訓等為母造道門尊像帝王無徳政碑盧氏雜說憲宗時中人吐突承璀為帝立徳政碑礱石請文内相李絳奏大人與天地合其徳日月合其明無立碑紀徳之事恐貽笑天下遂止之也樂石封氏見聞記嶧山碑云刻此樂石人多不曉顔師古謂以泗濵浮磬作碑也其文剥缺韓文黄陵廟碑湘旁曰黄陵庭有古碑斷裂分散在地其文剝缺苔侵李白詩欲覽碑上文苔侵不堪讀檄三白愈頭風陳琳字孔璋作檄魏太祖讀曰愈我頭風起相如司馬相如以木為書刺外國之君至漢國項羽檄漢高祖入燕營魯仲連檄燕將為彭澤晉毛義家貧養母郡檄義為彭澤令之任後母亡辟之不就孔駐馬即辦房元齡為秦王記室居府出入十年軍符府檄或駐馬即辦文約理盡初不著藁初不竄定薛收為書檄露布或馬上占辭該敏如素構初不竄定囊中檄楊再思舍逆旅有盜竊其衣囊再思遇之盜窘謝再思曰而苦貧故至此囊中檄無所事幸留馳檄比州崔造朱泚亂輒馳檄比州發所部兵二千以待命徳宗嘉之傳聲檄屢飛杜秦州詩玉壘雖傳檄警急捧檄嗚咽李愬擒蔡李祐詔釋以還愬乃令佩刀出入帳下署六院兵馬使六院者隋唐兵也凢三千人皆山南奇材銳士故委祐統之祐捧檄嗚咽為李密草檄祖君彦自負才嘗鬱鬱思亂及為李密草檄乃深斥主闕密敗世充見之曰汝為賊罵國足未君彦曰跖客可使刺由半紙檄召羣盗蕭銑曰吾先人國于此若徇其情復梁祚因以半紙檄召羣盗誰敢不從書記文檄豪健舒元輿裴度表掌興元書記文檄豪健一時推許移檄請無犯州境鄭綮補廬州刺史黄巢掠淮南綮移檄請無犯州境巢笑為斂兵州獨完傳檄天下鄭畋與涇原程宗楚秦州仇公過鄜延李孝恭夏州拓抜思恭約盟傳檄天下時王命不出劔門四方謂王室微不能復興及畋檄至逺近感聳各治兵思立功奔問行在巢大懼不敢西謀檄至號令殷然士氣皆起王鐸為諸道行營都統移檄天下先是諸將雖環賊莫肯先及鐸檄至號令殷然士氣皆起争欲破賊故巢戰數蹙屬城皆下劉武周大業十三年與其徒張萬歳等十餘人候仁恭視事武周上謁萬歳自後入斬仁恭持首出徇郡中無敢動者遂馳檄屬城皆下占檄諭禍福李夷簡徙帥劔南西川嶲州刺史王顒積姦贓屬蠻怒畔去夷簡逐顒占檄諭禍福蠻落復平文檄皆出其手庾抱在隴西府文檄皆出其手檄英王雞王勃沛王聞其名召署府是時諸王闘雞勃戲為文檄英王雞高宗怒曰是且交構斥出府一坏之土未乾六尺之孤何托駱賔王能賦詩徐敬業起兵賔王為府屬為敬業傳檄天下斥武后罪后讀但嬉笑至一坏之土未乾六尺之孤何托矍然曰誰為之或以賔王對后曰宰相安得失此人言吏貪沓賦重賞罰不平黄巢傳乾符二年濮名賊王仙芝亂長垣殘曹濮二州妄號大將軍道言吏貪沓賦重賞罰不平宰相恥之僖宗不知也操檄温廷皓龎勛反以刃脅廷皓使為表倨荅曰我豈以筆硯事汝耶其速殺我勛熟視笑曰儒生有膽耶吾動衆百萬無一人操檄乎囚之列煬帝十罪李密令幕府移檄州縣列煬帝十罪天下震動所作皆俚俗語五代敬翔工書檄客之梁益窘為人作牋刺傳之軍中太祖素不知書翔所作皆俚俗語太祖愛之文檄如狼毒野葛王𢎞義再遷左臺侍御史毎移檄州縣所至震慴𢎞義輙詫曰我文檄如狼毒野葛草檄讓高麗元萬頃李勣使萬頃草檄讓高麗而譏其不知守鴨渌之險莫離支報曰謹聞命徙兵固守軍不得入高宗聞之投萬頃嶺外雉走檄書逺近同至杜牧賀平党項表朱耶赤子盧汝弼為檄云致赤子之流離自朱耶之版蕩謂人曰天生朱耶赤子供我之筆此為梁檄克用兵檄叢進奏決若流姚崇契丹擾河北兵檄叢進奏決若流飛書走檄如飄風李白送安西幕府繡衣貂裘明積雪飛書走檄如飄風檄奏翩翩早從軍府元稹授馬揔制羽檄如流星李白古風羽檄如流星虎符合專城喧呼救邊急羣鳥皆夜鳴軍急羽毛書杜贈李八處處喧飛檄書懷檄筆無與讓韓愈送侯參謀詩射䇿四白公孫𢎞十上蕭望之射䇿甲科為郎射䇿者謂為難問疑義之䇿量其大小署為甲乙之科列置之不彰題有欲射者隨其所取得而釋之以知優劣射之言投射對策第一後漢劉淑五府辟不就帝使使輿詣京師不得而對䇿第一五十難後漢徐防謁卿上書言學者以章句間五十難以妄生穿鑿臣請甲乙䇿試宜從其家章句開五十難以試之解釋多者為上䇿少明者為高第説不依先師皆以為非也孔歲旱策問隂陽祲沴鮑防時比歲旱策問隂陽祲沴穆質對漢故事免三公卜式請烹宏羊指當時輔政者右司郎中獨孤愐欲下質防不許曰使上聞所未聞不亦善乎世美防知人言天人相與文粹董仲舒射策言天人相與之際後之人力不足者詞或侈靡理或底伏崔元翰文集序權徳輿為同門生文粹李栖筠文集序修詞射策為同門生權徳輿潘謝曹馬必居孫樂之右文粹選舉擇賢才䟽樂廣假筆於潘岳靈運辟高於穆之平津文劣於長卿子建筆麗於荀彧若以射策為最則潘謝曹馬必居孫樂之右若使協賛機猷則安仁靈運亦無禆附之益由此言之不可一槩而取也又曰良相寧資於射策薛登痛言理道文粹權徳輿荅栁福州書兩漢設科本於射䇿故公孫洪董仲舒之倫痛言理道武五白以威四夷以遏亂略以靖四國武可畏也仁而不武無能達也兼弱攻昧武之善經立武經於文止戈為武無忘武功武有七徳禁暴戢兵安民和衆保大定功豐財武所以威不軌而昭文徳殷湯始伐而有慙徳子曰武盡美矣未盡善也謂以征伐故未善奮黄鉞之威弧矢宣威黄帝干戈戡難武王布昭聖武武之善經下戒而備武之善經武不違敵違避也桓桓武貌武車不式我武惟揚以亂易亂不武孔王世充三榜設三㮄於府外其一武幹絶衆摧鋒陷陣者疾文吏如仇讎劉蕡策首一戴武弁則疾文吏如仇讎平亂孫伏伽帝語裴疾曰我平亂責武臣守成責儒臣若李綱孫伏伽可謂誼臣矣治軍韋嗣立建言今之取人未試屢遷務進徼幸比肩繼踵故武者治軍則庸懦怯弱武為救世砭劑儒學傳序長槍大劔史洪肇曰安朝廷定禍亂直須長槍大劔若毛錐子安足用哉五代史三十圜㑹百變文粹沈亞之上冡官書學名將霸帥之所以整暴亂至于奮旅陣師圜㑹百變之狀離如驚烏合如凝雲此則得之於師矣摧䧟廓清之功韓文序先生之於文摧䧟廓清之功比於武事不稽之權略魏元忠言武者先騎射不稽之權略武舉起於武后之時武舉盖其起於武后之時長安二年始置武舉其制有長垜馬射歩射平射筒射又有馬槍翹關負重身材之選翹關長丈七尺徑三寸半凡十舉後手持關距出處無過一尺負重者負米五斛行二十歩皆為中第選舉志以追韓信抜吕蒙為急元禛上裴相書始以追韓信抜吕蒙為急務固非叔孫通薦儒之日也親兵百萬制以神策紫身豹首金腰火額獵霞張斾剥犀綴革奮目如虎眦振髯而蝟磔柔六鈞貫七扎對天仗以司戈分玉墀而執㦸别有陳旌賜鉞閫外四十依榆關以作鎮拒桞營而開壁逐虜則出塞飛烟伐叛則救陽作澤此王者之武威也李庾西都賦頡頏作氣勢韓愈書淮右殘孽尚守巢窟環寇之師殆且十萬瞋目語難自以為武人不肯循法度頡頏作氣勢竊爵位自尊大者肩相摩地相属也不聞有一援桴鼓誓衆而前者但日令走馬來求賞給助寇為聲勢而已沙漠收奇勲李白贈何判官羞作濟南生九十誦古文不然拂劔起沙漠收奇勲王室此多難高官皆武臣杜送路君虓士爪臣禇遂良虓士爪臣氣力未衰可驅策文武相須六白記曰張而不弛文武不能也弛而不張文武不為也一張一弛文武之道以弓喻也時惟理亂道有弛張天下既平則用四科之教海内未截宜崇七徳之功救敝宜去煩文慮危豈在耀武故原伯廢學而見非向戍弭兵而致誚戎衣木鐸奉天威以伐叛爰舉干戈恢帝道而化人則張禮樂文徳武功立武修文允文聖武文武之道未墜於地𢎞其用乃殊致臻其極則同㱕威加海内武足畏也化成天下文在茲乎斯文未䘮我武惟揚將欲豋三不可闕一孔制勝御人魏元忠儀鳯中吐蕃數盜邊元忠上封事洛陽宫言命將用兵之要曰天下之柄有二文武而已至制勝御人其道一也今言武者先騎射不稽之權略言文者首篇章不取之經綸武創業文守成儒學序武為救世砭劑文其膏梁歟亂已定必以文治之否者是病損而進砭劑其傷多矣然則武得之武治之不免霸且盜聖人反是而主故曰武創業文守成百世不易之道也大聖兼該文武並用文粹季孫問冉有曰子於戰學之乎性逹之也對曰學之季孫曰事孔子惡乎學冉有曰即學於孔子者大聖兼該文武並用適聞其戰法猶未之詳也注孫子序杜牧聖人知兵同上注孫子序周公相成王制禮作樂尊大儒術有淮夷叛則出征之夫子相魯公㑹于夾谷曰有文事者必有武備叱辱齊侯伏不敢動是二大聖人豈不知兵乎兼授二職裴行儉破郅支帝親勞宴曰行儉提孤軍深入萬里兵不血刃而叛黨擒夷可謂文武兼備矣其兼授二職即拜禮部尚書兼檢校太尉當征伐之急則先武士李絳請崇國學䟽當征伐之急則先武士丁理平之運則尚文徳二柄相須百王不易故漢光於兵革之中投戈講藝儒者徐曠為李密所得世充專制密問焉對曰彼殘忍而意褊促必速於亂將軍非破之不可以朝密曰嘗謂先生儒者不學軍旅至籌大計乃明略過人儒教七白儒風儒行儒術儒服不敢以儒為戲魯哀公問於孔子曰夫子之服其儒服與云云化民成俗君子如欲化民成俗其必由學乎君子之儒子謂子夏曰汝為君子儒無為小人儒儒有忠信以為甲胄禮義以為干櫓禮周孔之遺風儒家之子天之未䘮斯文也文不在茲乎文教儒流經國之大端立身之要道木鐸之教象環之義清風載揚素業不墯必謀君子道無為小人儒洙泗之遺教國家雲屯文士草偃儒風王者設教勸學為先君子立身宗儒為本魯問哀公問也秦坑始皇坑儒鴻儒腐儒儒生豎儒英儒文理化成四術禮曰樂正崇四術立四教以詩書禮樂為太學之教脩道之謂教禮天命之謂性率性之謂道脩道之謂教四科崇儒九流考藝逢唐虞之日𢎞洙泗之風儒林傳六藝者王教典籍先王明天道正人倫致理之成法微儒漢平詔太僕于惲等八人微儒有通知往古紀天文厯筭鍾律小學方術本草及五經教授者所在為駕一封軺傳遣詣京師劉歆等至者數十人小學大學漢食貨志里胥令餘子在序室未任役使者八歳入小學學六甲五方書計之事以知室家長㓜之節十五入大學學先聖禮樂知君臣之禮有秀異者移國學因諸侯貢小學之賢于大學命曰造士造成也孔桞玭夫行道之人徳行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏雨所不能活也詔天下家藏孝經天寳三載詔天下家藏孝經虞世南帝毎稱其五絶三曰博學鷹犬聲樂以儒學易元結祖享嘗曰我承王公餘烈鷹犬聲樂是習吾當以儒學易之經書刮根本史書閱興亡杜牧冬至日寄小姪有天下者遵其易簡遡其元命可以致于清浄文粹常仲孺新修孔子廟碑夫子彰皇繫帝叙王尊周首於儒而開大教也有天下者遵其易簡遡其元命可以致于清浄遵其廣大𢎞其覆載可以致于雍熈遵其禮讓蹈其夷曠可以致于和平風纚露沐儒學傳序太宗身櫜鞬風纚露沭然銳精經術即王府開文學館召名儒十八人為學士問客之所為峩冠講唐虞韓文詠乎堯舜之道舞乎沂泗之風栁冕荅張尚書書觝排異端攘斥佛老補苴罅漏張皇幽𦕈尋墜緒之茫茫獨旁捜而逺紹障百川而東之廻狂瀾於既倒先生之於儒可謂勞矣進學解自晉訖隋佛老顯行聖道不斷如帶諸儒倚天下正議助為恠神愈獨喟然引聖争四海之惑雖蒙訕笑跲而復奮始若未之信卒大顯於時貞觀六年詔罷周公祠更以孔子為先聖顔子為先師盡詔天下惇師考徳以為學官數臨幸觀釋菜命祭酒博士講論經義賜以束帛生能通一經者得署吏儒學序廣學舍千二百區三學益生貟大抵諸生貟至三千二百同上儒術八白周禮九兩繫邦國之民四曰儒以道得民儒有席上之珍以待聘禮祖述堯舜憲章文武衣逢掖之衣僻儒漢藝文志或者既失精㣲僻者又隨時抑揚違離道本茍以譁衆取寵後進循之是以五經乖析此僻之患耳儒服漢王入彭城叔孫通儒服降漢王憎之乃變服服短衣楚制儒者博學乎六藝之文博而寡要儒者六藝傳以千萬數世不通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長㓜之序雖百家不能易也平當傳經術以言得失古者耕且養三年而通一藝者存其大體玩經文而已是以日用少畜徳多三十而立五經立也叔孫通曰儒者難以進取可以樂成儒於道最高志賈山渉獵書記不能為醇儒醇不雜也渉獵厯覽不專精也河間王被服儒術造次必於儒者被服言常居處其中造次所適皆行籯金遺子黃金滿籯不如一經匡衡尤精力過絶人諸儒語曰無說詩匡鼎來鼎力也匡說詩解人頥宣帝曰俗儒好是古非今使人眩於名實不知所守言厯覽不専問事不休賈長頭後漢賈逵字景伯誦左傳及五經本以大小夏矦尚書教授長八尺二寸諸儒謂之曰問事不休賈長頭尤明左氏傳荀淑字季和博學而不為俗所非也井丹通五經語曰五經紛綸井大春周舉字宣光短陋而博學洽聞為儒者所宗京師語曰五經縱横周宣光徒見二千石不如一逢掖皇甫規見王符記曰博聞強識博古洽聞賜書班游博學有俊才與劉向校秘書受詔進讀羣書上噐其能賜以秘書以道得民周禮太宰以九兩繫國民四曰儒以道得民亂世崇儒後漢劉琨字桓公受施氏易教授弟子常五百人王莽時教授不輟毎春秋享社備典儀以素木瓠葉為俎豆桒弧蓬矢以射盤盂諸書漢田蚡封武安矦學盤盂諸書注云孔甲盤盂二十六篇書盤盂中所以為戒也雜家書儒墨名法也孔蕭瑀愛經術王義方淹究經術託儒為姦祝欽明賛曰後之託儒為姦者可少戒云專意經術崔元暐少頗屬辭晚以非已長不復構思專意經術博貫文史令狐徳棻博貫文史博貫經術栁公權博貫經術於詩書左氏春秋國語莊周書尤􅃉毎解一義必數十百言學無不覽盧景亮少孤學無不覽以講道為娯商侑幼有志於學不治貲産長通經術以講道為娯崔郾拜侍講謝曰陛下使臣侍講歴半歳不一問經義臣無功不足副厚恩帝慙曰朕少間當請益高鈛適在旁因言陛下樂善而無所咨詢天下之人不知有嚮儒意帝重咎謝咸賜錦幣郾與高重類六經要言為十篇上之以便觀省薛放帝甞問朕欲學經與史何先放曰六經者聖人之言孔子所發明天人之極也史記道成敗得失亦足以鑒然謬於是非非六經比帝曰吾聞學者白首不能通一經安得其要乎對曰論語六經之菁華也孝經人倫之本也漢時論語首立於學官光武令虎賁士皆習孝經𤣥宗親為注訓盖人知孝慈則氣感和樂也帝曰聖人以孝為至徳要道信然稡擷經史鄭澣帝使稡擷經史為要錄愛其博而精試舉諸條摘問之隨即酬析無留荅􅃉儒術曹確􅃉儒術器識方重動循法度西域鬻異書西域智湛子名昭好學有鬻異書者毋顧笥中金歎曰何愛此不使子有異聞乎盡持易之求純樸經術士王琚或説帝曰王琚麻嗣宗皆詭譎縱横可與履危不可與共安方天下已定宜益求純樸經術士以自輔帝悟稍䟽之劉子𤣥議孝經甞議孝經鄭氏學非康成注舉十二條左證其謬當以古文為正續五說劉迅續詩書春秋禮樂五說書成語人曰天下滔滔知我者希終不以示人不讀非聖書栁公綽屬文典正不讀非聖書博知書傳王龜博知書傳竒難字遣使者問曹憲譔桂苑珠叢太宗嘗讀書有竒難字輒遣使者問憲憲具為音注援驗詳複帝咨尚之精故訓學顔師古少博覽精故訓學名重海内孔頴逹嘗造同郡劉焯焯名重海内初不之禮及請質所疑遂大畏服馬嘉運以孔頴逹正義繁釀故掎摭其疵當世諸儒服其精九經庫谷那律淹識羣書禇遂良嘗稱為九經庫五經指南王元感魏知古見其書歎曰五經指南也嗜學王紹宗少貧嗜學覃思經術尹知章為陸渾令輒棄官去時散騎常侍解婉亦罷㱕與知章覃思經術舉訢訢然好學多所研總栁冲好學多所研總五總龜殷踐猷愽學賀知章嘗號為五總龜謂龜十年五聚問無不知也儒術於我何有哉杜甫醉時歌以儒學顯顔師古父思魯以儒學顯淹該經術啖助淹該經術雅厚雄邁富嘉謨異少微天下文章尚徐庾獨嘉謨少㣲本經術雅厚雄邁書簏李善淹貫古今不能屬辭故人號書簏假直秘書李邕見特進李嶠自言讀書未徧願一見秘書嶠曰秘閣萬卷書豈時日能習邪邕固請乃假直秘書未幾辭去嶠警試問奥篇隱帙了辯如響嶠嘆曰子且名家文選五臣注吕向嘗以李善釋文選為繁釀與呂延濟劉良張詵李周翰等更為詁解時號五臣注問内黄李珽梁太祖幸河北至内黄顧珽曰何謂内黄珽曰河南有外黄下黄故此名内黄太祖曰外黄下黄何在珽曰秦有外黄都尉在今雍邱下黄為北齊所廢在今陳留太祖平生不愛儒者聞珽語大喜五代史五十四萬卷暗誦羣書萬卷常暗誦孝經一通看在手杜甫可嘆詩弱不好弄盧肇進海潮賦狀志在業儒弱不好弄詭然而蛟龍翔蔚然而虎鳯躍文粹諸史百子皆搜抉無隱􅀈瀾卓踔奫泫澄深詭然而蛟龍翔蔚然而虎鳯躍鏘然而韶鈞發日光玉絜周情孔思千態萬貌卒歸於道徳仁義炳如也韓文公集序李漢不知儒術文粹㑹昌一品序周勃霍光雖有勲伐而不知儒術鄭亞六籍奴婢劉蕡精於儒術嘗看文中子忿然而言曰才非上聖擬上聖述作不亦過乎客曰文中子於六籍如何蕡曰若以人望人文中子於六籍猶奴婢之於即主耳後人遂以文中子為六籍奴婢出南部新書極聖人之規矩恢作者之聞見栁宗元不能探奥義窮章句為腐爛之儒雖或寘力於文學懃勤懇懇于歲時然而未能極聖人之規矩恢作者之聞見勞費翰墨徒爾拖逢掖曳大帶游於朋齒且有愧色言其學則皆揔攬羅絡横豎雜博天旋地縮鬼神交錯栁文耒耜筆硯間杜牧上知巳啓腹溢儒書口盈憲章桞宗元起廢荅腹溢儒書口盈憲章包今統古進退齊良言泉百氏腹笥九經文粹陳章甫書行道之儒以是為駕說之儒曷若為行道之儒耶貯之於心有經實施之於事有古道猶不愈於堆案滿架矻矻於筆硯間耶劉軻與馬植書博學蕭頴士言裴子野當著書其所許可當世者孔述睿之博學而已太學九白化民成俗禮曰君子如欲化民成俗其必由學乎教學為先家塾國學考校考其道藝進退祭菜示敬道也鼓篋遜業既闡文明之教咸五登三將令儒學之徒問一知十化成文理傳習雅言討論大義揚先儒之風知要道之善書府學官漢立太學之官樂政崇四術立四教謂春秋教以禮樂冬夏教以詩書凡入學以齒皆以長㓜為序不以尊卑為差比年入學謂每年也中年考校中年間年也一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通逹彊立而不反謂之大成此大學之道也教之大倫春誦夏弦日就月將孔入太學竇抗以帝甥蚤貴入太學勸興太學陳子昻勸后興太學政教之地又言陛下方興大化而太學久廢堂皇埃蕪詩書不聞明詔尚未及之愚臣所以私恨也太學者政教之地也君臣上下之所取則也俎豆揖讓之所興也天子于此得賢臣焉今委而不論雖欲睦人倫興治綱失之本而求之末不可得也請崇太學以立教本蕭昕代宗狩陜昕由武關從帝擢國子祭酒建請崇太學以立教本帝寤其言詔羣臣有籍于朝及神策六軍子弟肄業者聽補生貟明教之源劉蕡文宗引諸儒百餘人于廷䇿曰太學明教之源也攢弁如星文粹太學講禮記沒堦雲來即席之次攅弁如星連袂成帷歐陽詹鋤犂其中唐文粹請修太學書輿人有棄本之議羣生有將壓之虞至有博士助教鋤犂其中播五稼於三時視辟雍於農郊徳宇將摧教源將乾先聖之道將不堪李觀昔學有六舘居類其業生有三千盛侔於古李觀同上學廢則士亡士亡則國虚不知長國之術在乎養士飬士之源在乎隆學學廢則士亡士亡則國虛國虛則下危下危則禮義銷禮義銷則狂可奸聖賊可陵徳邐迤不知其終同上生徒無鼓箧之志李絳請崇國學䟽生徒無鼔篋之志博士有倚席之譏師氏教徳不獨羙於周時橋門觀禮豈復謝於漢日同上李絳四方秀艾挾策負素坌集京師儒林傳序四方秀艾挾策負素坌集京師文治煟然勃興於是新羅百濟吐蕃高麗等羣酋長並遣子弟入學鼓篋踵堂者凡八千餘人紆侈袂曵方履誾誾秩秩雖三代之盛所未聞也過太學之門而不敢跼顧桞宗元與太學諸生書少時嘗有意遊太學受師說以植志持身焉當時説者咸曰太學生聚為朋曹侮老慢賢有隳窳敗業而利口食者有崇飾惡言而肆闘訟者有凌傲長上而誶駡有司者其退然自克特殊於衆人者無幾耳僕聞之恟駭怛悸良痛其遊聖人之門而衆為是􅊱􅊱也遂退託鄉閭家塾考勵志業過太學之門而不敢跼顧尚何能仰視其學徒者哉學官十白君將化人學實為本官能宿業教之所興化民成俗學則為先官茍非人教所由廢冬夏既非失教春秋寜罰有辭學立膠庠士分選造將𢎞洙泗之風必立膠庠之序考課學令曰諸博士助教計當年以考等級孔劉蕡策生徒惰業由學校之官廢歸崇敬徳行純潔文詞雅正形容莊重可為師表者委四品以上各舉所知在外給傳七十者安車蒲輪敦遣為博士博士考課學生謁師䞇用腵脩一束酒一壺襂布一裁色如師所服師出中門延入與坐割修􅝥酒三爵止乃發篋出經摳衣前請師為說經大略然後就室朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬省月試時考歲貢眡生徒及第多少為博士考課太學當得天下名儒楊綰宦者魚朝恩判國子監既誅因是建言太學當得天下名儒汰其選即拜綰國子祭酒躬講經籍陽城下遷國子司業躬講經籍生徒斤斤皆有法度專名譽好文章桞文四門助教壁記有司命太學之官頗以為易專名譽好文章者咸恥為學官致令生徒不自勸勵韓文近年吏部所注多循資敘不考藝能致令生徒不自勸勵召惇師老徳以為學官儒學傳序帝求師儒貳我成均桞文帝求師儒貳我成均開朗蒙滯宣明徳教大和潜布𤣥之宻照羣生聞禮後學知孝進退作則動言是俲匪公之軌人用奚蹈麄厲貪凌待公順之欺偽譎詐待公信之儒庠恣游息聖籍飽商㩁韓愈納凉聮句凡諸學皆有博士助教授其經藝通典勤學十一白玉不琢不成器人不學不知道雖有嘉肴不食不知其㫖學然後知不足小成大成學之次也蟻垤比學積功忘倦求安君子食無求飽居無求安可謂好學吾十有五而志于學不厭學而不厭誨人不倦發憤㤀食絶編孔子讀易韋編三絶欲罷不能君子求諸巳古之學者為巳今之學者為人討論墳典祿在其中學也云云學而時習之日知日知其所亡月無㤀其所能可謂好學也矣日就月將日俯成而月將大也待問儒有夙夜強學以待問多文之富儒有多文以為富七子之業漢劉殷有七子各授一經籯金漢書韋賢長孺子元成皆以明經位至丞相故鄒魯曰遺子黄金滿籯不如教子一經聖人重分寸之隂淮南子云三冬足用惠方朔曰臣學書三冬文史足用自強君子自強不息鑿壁匡衡字稚圭帶經倪寛帶經而耡閉戸孫敬字文寳常閉戸讀書不堪其睡乃懸頭於梁上時人號曰閉戸先生下帷董仲舒耽學下帷讀書十七年不窺園圃映雪孫康聚螢車𦙍字武子刺股蘇秦讀書有睡乃引刀刺股血流於地也不寢不食寗越少時苦耕疲勞友人謂曰君學三十年可免貧賤越曰他食吾不食他寢吾不寢如此十五年可以成矣遂學成稽古之力後漢桓榮字春卿好學為太子少傅明帝賜車馬衣服榮陳之庭廡謂人曰此吾稽古之力也取青紫夏矦勝曰經術茍明取青紫如俯拾地芥也遜志惟學遜志學古入官業廣惟勤近思切問温故知新學而為已道不逺人為學日益徳成而上入室專門勤苦而成學惟時習道乃日彰編蒲寫書路温舒牧羊截澤蒲編而寫書讀以忘倦豈不為之勤學也顓愚朱穆耽學銳意講誦或時思至不自知忘失衣冠顚墜坑岸其父常以為顓愚幾不知數馬足不覺漂麥高鳯専精讀書夜不息妻常至田暴麥於庭令鳯持竿護雞時暴雨而鳯持竿讀書不覺水漂其麥妻還乃悟王充博覽閉户潜思戸牖牆壁各置刀筆著論衡蜀向明年八十猶手自校書刋定誤謬開門接賢誘納後進但論古義不千時事也藜牀半穿高士傳曰管寜字㓜安隱居好學藜牀半穿也役志勵精傳癖書淫杜預有春秋癖皇甫謐有書淫長大勤學魏太祖曰長大而勤學惟吾與袁伯業耳善學者師逸而功倍學以聚之問以辨之都養倪寛從孔安國學貧乏為弟子都養輕彼滿籯慕茲重席不荅候問魯平叔陵好學不倦不荅候問之禮友以此短之平欣然自得人語曰五經復興魯叔陵老學蜀向明字臣逹事見上注失羊王育字伯春為人牧羊好學亡其羊羊主責之鬻已以償同上寫書范注𤣥平燃薪寫書寫了讀誦亦通傭書呉闞澤字徳潤傭書供紙筆寫書畢誦亦畢書肆閱書王充無書游洛陽市閱所賣書見必誦孔畫地書空寓所習劉仁軌好學值亂不能安業毎動止畫地書空寓所習卒以通博聞不調十年竇威授校書郎當遷不肯調者十年故其學益博而諸兄以軍功位通顯薄威職閑沉更謂曰昔仲尼積學成聖猶棲遲不偶汝尚何求耶威笑不荅精思不懈虞世南與兄世基同受學于呉顧野王十餘年精思不懈至累旬不盥櫛誦書不置狄仁傑為兒時門人有被害者吏就詰衆争辨對仁傑誦書不置休澣讀書裴炎補𢎞文生休澣它生或出遊炎讀書不廢篤學舉高第韓思復篤學舉秀才高第夜無燃膏黙念所記宗室戡年十歲即好學大寒輟薪自炙夜無燃膏黙念所記五十餘尚執經宗室則之嗜學年五十餘尚執經太學年老篤意經籍于休烈年老篤意經籍嗜學不厭非寢食不輒廢王起嗜學非寢食不輒廢天下之書無不讀一經目弗忘也力于學鄭肅以儒世家肅力于學有根秪夜燃薪畢諴夜燃薪讀書母䘏其疲奪火使寐不肯息遂通經史晝講經夜著書裴休晝講經夜著書終年不出户雖甚寒暑卷示釋蔣又結髪志學老而不厭雖甚寒暑卷不釋于前故能通百家學口不絶吟於六藝之文手不停披於百家之編焚膏油以繼晷常矻矻以窮年韓文吏事倥偬書不去前馬揔入為戸部尚書揔篤學雖吏事倥偬書不去前論著頗多看書到曉那能眠韓愈短燈檠歌此時提挈當案前看書到曉那能眠研精典墳不告劬勩桞宗元送班孝廉序竟夕誰與言但與竹素俱桞宗元讀書詩少篤志奚陟少篤志通羣書自力於學王彦威少孤家無貲自力於學老益勤賈耽嗜觀書老益勤夜分讀書杜佑資嗜學雖貴猶夜分讀書手不置書郭元振手不置書業精于勤荒于嬉甄逢自力讀書每開經輒祓濯束帶危坐蕭徳言晚節學愈苦毎開經輒祓濯束帶危坐妻子諫曰老人何終曰自苦荅曰對先聖之言何復憚勞王元感年雖老讀書不廢夜燃葉栁璨少孤貧好學晝採薪給費夜燃葉照書未甞廢卷馬懷素篤學手未甞釋卷求為吏𨽻集賢院竊院書讀陽城資好學貧不能得書求為吏𨽻集賢院竊院書讀之晝夜不出户六年無所不通好學不倦崔元翰其好學不倦未曾一日去書不觀權徳輿自始學至老未曾一日去書不觀夕翺翔乎藝苑朝騁騖乎書林夕翺翔乎藝苑韓文復志賦孜孜孜孜凭書案譬彼鳥黏黐韓文一月讀一箱冬至日寄小姪一日讀十紙一月讀一箱勤勤懇懇於歳時寘力千文學勤勤懇懇於歲時然而未能極聖人之規矩恢作者之聞見栁宗元上崔卿懸刺伏念臣夜無脂燭則爇薪蘇曉恨頑𡨕亦嘗懸刺進海潮賦盧肇心好藝文老而不倦臣本以門䕃入仕不由雋造之科獨學無友未嘗琢磨然心好藝文老而不倦賛皇一品集上尊號玉冊狀晝樵夜然馬懐素師事李善貧無貲晝樵夜輙然以讀書博通經史不知寢食韋述性嗜書元行冲載書數車述入其室觀書不知寢食讎比勤勤陸龜蒙得書熟誦乃錄讎比勤勤朱黄不去手熊膽丹桞仲郢母善訓子仲郢㓜嗜學甞和熊膽丹使夜咀嚥以助勤豈殊蠧書蟲生死文字間韓愈雜詩古史散左右詩書置後前豈如蠧書蟲生死文字間經年不出墅門舊史裴休兄弟同學于别墅休經年不出墅門晝講經籍夜課詩賦古人已用三冬足年少今開萬卷餘杜詩兄弟五人勵志讀書張知謇與兄弟五人勵志讀書皆以明經擢第舊史力學淹該書記趙武孟少游獵以所獲饋其母母泣曰汝不好書而傲蕩吾安望哉不為食武孟感激遂力學淹該書記夜字照爇薪垢衣生碧蘚庶以勤苦心報茲劬勞顯杜八哀詩刻意墳典禇無量㓜受經於沈子正曹福刻意墳典家濵臨平湖有龍出人皆走觀無量尚㓜讀書若不聞衆異之讀古聖人書涵咀義味獨坐日昃案上有一杯䔧羮如五鼎七牢饋於左右加之以撞金石萬羽籥也陸龜蒙論文日閱書于肆徐文逺避亂長安家貧無以自給其兄休鬻書為事文逺日閱書于肆博覽五經尤精春秋左氏傳舊史飲水棲衡講誦不輟崔從少孤貧寓居太原與仲兄能同隱山林苦心力學屬歲兵荒至於絶食弟兄採梠拾橡實飲水棲衡而講誦不輟怡然終日不出山巖如是者十年吕諲志行修整勤於學業鄭肅苦心力學好著書李徳裕以噐業自負特逹不羣好著書為文奬善嫉惡雖位極台輔而讀書不輟初貶潮陽雖蒼黄顛沛之中猶留心著述處若忘行若遺學之二十年餘矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其思茫乎其若迷當其取乎心而注乎手也惟陳言之務去戞戞乎其難哉韓文鑽仰沉研如是者十年鑽仰沉研僅於不窺園井矣如是者十年然後粗霑一命粗成一名元稹廢墮十二白息焉游焉教所由廢扑作教刑扑檟楚也不勤道業則撻之詩子衿刺學校廢也青青子衿悠悠我心挑兮逹兮在城闕兮挑逹㳺墮也不學將落傳曰原伯魯不恱學閔子騫曰夫學殖也不學將落原氏其亡乎上陵下替周亦其亂乎困而不學民斯為下矣飽食終日無所用心難矣哉牆靣而立子曰人而不學周南召南其猶正牆靣而立也歟宰予晝寢子曰朽木不可彫也糞土之牆不可汚也既忘禄在其中是謂民斯為下當少壯之歲輕分寸之隂懷居士而懷居不足以為士矣獨學無友則孤陋寡聞學非時習道則日亡學之不講不帥教鄉簡移之學人舍業懷安敗名晝眠邉韶字孝先弟子嘲曰邉孝先腹便便懶讀書愛晝眠不思時習好務晝眠孔父怒楚督之唐劉子元行年十二父藏噐為授古文尚書業不進父怒楚督之稍怠則立堂下韋陟敕子允就學稍怠則立堂下不與語每讀古人一傳數紙已後則再三伸卷復觀姓氏旋又廢失往時讀書自以不至觗滯今皆頑然無復省録毎讀古人一傳數紙已後則再三伸卷復觀姓氏旋又廢失桞宗元寄許孟容不能勠力盡瘁文粹劉岩未與叚校理書性本慵惰強之惟艱不能勠力盡瘁服勤先聖學校之官廢劉蕡䇿生徒墯業由學校之官廢者盖國家貴其祿而賤其能先其事而後其行故庶官乏通經之學諸生無修業之心矣過時十三白敬遜務時敏厥修乃來敏謂及時也禮太學之法禁於未發之謂豫謂年未十五時當其可之謂時謂年二十成人也發然後禁則捍格而不勝時過然後學則勤苦而難成時習五十學易子曰加我數年五十以學易歲月徃矣陸羽師拘之令薙艸莽當其記文字懵懵若有遺過日不食主者鞭苦因書嘆曰歲月徃矣柰何不知年雖老讀書不廢夜唐史王元載年過五十始留意詩什數年之間體格漸變毎吟一篇已為好事者稱誦高適舊史㓜學十四白人生十年曰㓜學禁於未發志學吾十有五而志于學父之罪魯昭公曰子既生不免水火毋之罪也成童不就師父之罪也當竹馬之年就杏壇之列互鄉之童始聞絜已楊氏之子終見參𤣥楊子曰吾家童烏九歲而預我參𤣥佩韘之㓜帶經之勤年始佩觽心在鼓篋克岐克嶷言㓜有所知小成大成學也雖未能負薪庶人之子㓜曰未能云云而已從釋菜示敬道也外傅十年學樂舞勺能食能食教之以右手能言教之以鞶帶以韋為之始勤蟻垤之功永詠鹿鳴之什凡學始誦鹿鳴四牡黃華孔少有名號三少李有嗣真直洪文館與學士劉獻臣徐昭皆少名號三少高祖東封還詔贈孔子太師命有司為祝司文郎中雷少穎文不稱㫖更命嗣真成不淹頃帝覽稱善驚其可教文粹元稹寄樂天書九歲學賦詩長者往往驚其可教跪問湯誓高定七歳彊學有成人風蘇詵子震以䕃補千牛十餘歳彊學有成人風題曰吾家有子僕少好學問自五經之外百氏之書未有聞而不求得而不觀者韓文㓜嗜學母韓嘗和熊膽丹使夜咀嚥以助勤唐史桞仲郢黃卷中與聖賢對狄仁傑為兒時門人有被害者吏就詰誦書不置曰黄卷中與聖賢對何暇偶俗吏語白孔六帖卷八十七
