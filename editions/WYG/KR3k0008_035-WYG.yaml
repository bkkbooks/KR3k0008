body:
  text: 白孔六帖卷三十五唐白居易原本宋孔傳續撰推薦一患難二怨棄三贈貺四死哭五飲食六父友七書信八施惠九施饋十慶遺十一慶賀十二薦獻十三奉使十四専命十五採風謡十六按姦慝十七殺使十八遇讎十九使絶域二十推薦一事具舉舊門白遷喬求友不遺其友隨武子謀其身不遺其友儒有爵位相先近相待逺相致待致皆謂薦舉也其任舉有如此者佯狂漢雷義舉茂才譲陳重刺史不聽義佯狂不應人語曰膠漆不如陳雷蕭朱結綬蕭育與朱博為友著聞當世故語曰蕭朱結綬王貢彈冠漢貢禹王陽為友世稱王陽在位貢禹彈冠言取捨同也伐木出谷拔茅連茹彚征吉言以類相從也樂則思之白虎通行修而名不章友之罪也行不修身之罪也家語義之與比徳必不孤伸於知己越石父曰君子伸於知己屈於不知己人惟求舊官貴知賢類聚彚征管仲囚於堂阜鮑叔薦於桓公引重魏其矦灌夫一人以友善相引重引重猶善薦也自叶彚征之吉寜爽鶴鳴之義舉不失職義在存私能舉善也唯其似之舉不失徳人所具瞻舉善惟㣲知人則哲文舉之升一鶚陶洪之抜二龍薦思能之士採非常之徳國著進賢之賞人思類能之用毛玠當仁克遵徐邈孔融明敏無棄匡衡任官惟良底禄以徳建一官而三物克成舉十望而四方知勸因雲灑潤則芬澤易流文選晏嬰舉穰苴田忌進孫臏李克貢呉起蕭何獻韓信愛善無遺李吉甫當國引薦賢士大夫愛善無遺秃角犀杜悰出入將相而厚自奉養未嘗薦進幽隱佑之素風衰焉故時號秃角犀奉牒丐舉選關播帝問朕比下詔求賢才又遣使黙陟捜逮所遺須能者用之若何播曰陛下湏求賢又使舉薦然止得求名文辭士焉有道賢人肯奉牒丐舉選耶推引張九齡所推引皆正人力薦呉保安李蒙爲姚州都督宰相郭元振以弟之子仲翔記蒙蒙表為判官時保安罷義安尉未得調以仲翔里人也不介而見曰願因子得事李將軍可乎仲翔雖無雅故哀其窮力薦之首薦極論韓愈與陸員外書凢比四子皆可以當執事首薦而極論者主司疑焉則以辯之問焉則以告之未知焉則殷勤而論之期乎有成而後止可也推挽韓文既退又無相知有氣力得位者為之推挽患難二白患難相死禮患則死之白虎通士為知己死鮑叔有疾管仲為之不食曰士為知己死雖為之死亦何傷哉偕死呉範與魏騰相善騰當死罪呉王責好諌者死範謂騰曰與汝偕死竝免終始生死乆要不忘平生之言孝友任恤注任信於友道恤憂患也周禮不恤之刑周禮八刑六曰不恤之刑不許友以死禮父母在白首同歸潘岳與石崇繋獄不為言申屠蟠友人馮雍繫獄豫州黄琬欲殺之或勸蟠救之蟠不行曰黄子琰為吾耶未必合罪如不用雖言何益琬聞釋雍罪也將恐將懼惟予與汝我爾身也交態奔走之友袁紹與何顒孔栁宗元欲以栁州授禹錫而自往播栁宗元元和十年徙栁州刺史時劉禹錫得播州宗元曰播非人所居而禹錫親在堂吾不忍其窮無辭以白其大人且萬無母子俱往理即具奏欲以栁州授禹錫而自往播會大臣亦為禹錫請因改連州呉保安郭仲翔被執蠻之俘華人必厚責財乃肯贖聞仲翔貴胄也求千縑會元振物故保安留嶲州營贖仲翔苦無貲乃力居貨十年得縑七百妻子客遂州間關求保安所在困姚州不能進都督楊安居知状異其故資以行求保安得之引與語曰子棄家急朋友之患至是乎吾請貸官貨昉子之義保安大喜即委縑于蠻得仲翔以歸直其寃韓文王仲舒碑友人得罪斥逐後其家親知過門縮頸不敢視公獨自問為計度論直其寃憂患而不拯其危朋友之際本以善合貴盛則望以力憂患而不拯其危自保榮華坐觀顛覆可不痛哉昔衛青之衰也故人多事冠軍而任安不去呉章之敗也門人皆更名他師而㓜孺自劾此所以可貴也窮愁志姻友憚累徐晦楊慿得罪貶臨賀姻友憚累無徃候者獨晦至藍田慰餞宰相權徳輿謂曰君送臨賀誠厚無乃累乎晦曰方布衣時臨賀知我今忍遽棄邪有如公異時為姦邪譛斥又可爾乎徳與嘆其直稱之朝李夷簡遽表為監察御史晦請問所以舉之之由夷簡曰君不負楊臨賀肯負國乎怨棄三白相謗傳樂轡與華弱少相狎長相優又相謗棄子如遺忘我大徳思我小怨不棄故舊朋友無大故不相棄流言乆不相見聞流言而不信甘醴之壊小人之交甘以壊禮乆要不忘平生冨貴易交亦人情耳漢書一貴一賤翟公署門事見上注餘耳之隙張耳陳餘為刎頸之交後有隙耳斬餘泜水上賛曰張耳陳餘始居約時相然信死豈顧問哉據國争權卒相滅亡何向者相慕用之誠後相背之戻也勢利之交古人羞之盖謂是矣友而不心面友也揚子法言噂沓背憎有小怨而不棄又相謗也不自辱焉棄予子臯曰朋友不以是棄子不遺其友隨武子謀其身云云王丹曰交友之難未易言也張陳隙其末故知全之者少也不我遐棄詩賣友酈寄與吕禄善周勃等令刼其父商使寄說禄令歸相印勃等遂滅吕氏人以酈寄賣友蕭朱結綬王貢彈冠言相薦逹也後有隙故世以交為難也谷風刺朋友道絶也詩朋友數斯䟽矣匿怨而友其人東北喪朋伐木廢則朋友缺矣詩朱穆絶交論穆字公叔疾時交遊不篤輕為棄絶故作絶交論嵇康絶交書山濤為三公舉嵇康自代康聞與書絶之也怨及朋友忘我實多孔僖曾祖父子建對崔篆曰吾有布裘之心子有衮冕之志各從所好也離别離羣子夏拜曾子曰吾離羣而索居亦已久矣乆不相見嵇吕命駕見相思門贈言老子送孔子見上注河梁别李陵詩孔頼寵爭功李訓始鄭注先顯訓藉以進及勢相埒頼寵争功不兩立然方事未集乃出注使鎮鳯翔外為助援内實猜克待誅宦官且殺之劾非宰相器齊映始映㣲時張延賞遇之善及映相而延賞為左僕射數為映畫事又為所親求官映不答延賞恚既復用即劾映非宰相器貶䕫州刺史爭權不協李適之嘗與李林甫爭權不協林甫隂賊即好謂適之曰華山生金采之可以冨國顧上未之知適之性䟽信其言他日從容為帝道之帝喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可以穿治故不敢聞帝以林甫為愛己而薄適之不親故友不過門秋草日上階李白書懐贈常賛府不相恤故友不相恤新交寜見矜贈新平反眼士窮乃見節義今夫平居里巷相慕恱酒食游戯相徴逐詡詡强笑語以相取下握手出肺腑相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落䧟穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為韓文柳子厚誌翻手雲覆手雨杜詩谷風刺輕薄李白古風谷風刺輕薄交道方險􅥤斗酒强然諾寸心終自疑張陳竟火滅蕭朱亦星離嗟嗟失懽容勤問何所規賔友日踈散玉樽亦已空李白東武吟贈貺四白呉季札見鄭子産如舊相識與之縞𢃄子産獻紵衣子路曰願車馬衣輕裘與朋友共敝之而無憾朋友之饋雖車馬非祭肉不拜謂其有通財之義束帛孔子遇程子於路傾盖贈之以束帛君子不盡人之歡不竭人之忠忠謂衣服歡謂飲食不以為貪管仲與鮑叔分財管仲毎多取之管仲曰鮑子不以為貪知我家貧也晏子脫驂贖越石父罪何以贈之通財孔佩刀玉帶張文瓘為李勣長史勣入朝文瓘與屬僚二人皆餞勣贈二人以佩刀玉帶而不及文瓘又以瓘疑請勣曰子無嫌若某沈豫少决故贈以刀欲其果於斷某放誕少撿故贈以帶俾其守約束若子才無施不可焉用贈厚以装使入關馬周客宻州趙仁本高其才厚以裝使入關解玉帶贈封敖李徳裕進太尉敖草其制徳裕解所賜玉帶贈之魯縞如白煙五縑不成束臨行贈貧交一尺重山岳李白送劉長史詩贈粟囷應指杜甫水宿錢財不足以賄左右之匱急韓愈各拔五色毛意重太山輕李白賄微所費廣斗水澆長鯨同上死哭五白我殯朋友死無所歸曰於我殯宿草曾子曰朋友之墓有宿草而不哭焉宿草陳根也謂朞年寢門子曰父之友吾哭諸廟門之外師吾哭之寢朋友吾哭之寢門之外所知吾哭之野䘮明曾子曰吾聞之也朋友喪明則哭之范張白馬范式字巨卿張紹字元伯少為友紹死式夢乃服朋友之喪而赴焉紹葬日紹母望見素車白馬號哭而來母曰必巨卿也式乃修墓種樹而去乆要不忘平生之言絶絃鍾子期死伯牙遂絶絃贈劒延陵季子返留劒于徐君墓樹而去吾已傳鄭子皮卒子産哭曰吾已無為為善矣唯夫子知我注云無人知己之善故曰吾已出涕子産卒仲尼聞之出涕曰古之遺愛也舊館孔子之衛遇舊館人之喪命脫驂而贈之曰子入而哭之遇於一哀而出涕吾惡夫涕之無從也言主人以禮待已我故岀涕有贈哭朋友於寢門外之右南面哭所識於野張帷越界迎喪皇甫規友人喪還規縞素越界迎䘮客以規擅違營并州刺史胡方不坐山濤與嵇康為忘年之友康臨終謂子紹曰山公尚在汝不孤矣東北喪朋顔淵死子哭之慟曰有慟乎非夫人之為慟而誰為驢鳴孫楚字子荆與王濟為友濟死子荆哭曰夫子好驢鳴乃作一聲聲體俱似坐客皆笑之韋泓為應詹服泓喪亂之際親屬遇飢疫應詹營䕶之詹後為江州刺史卒泓為製服王戎經黄公酒壚歎曰昔與嵇叔夜阮嗣宗酣暢此竹林之遊亦預其末嵇阮亡吾為時羈絏今視此近邈若山河也朋友死而歌莊子子桑扈孟子反琴張三人相謂曰孰能相與於無相與相為於無相為三人相視而笑莫逆於心遂相為友俄而子桑死孔子使子貢徃弔或編曲或鼓琴相和歌曰嗟來桑扈乎而已反其真而我猶為人子貢趨問曰臨屍而歌禮乎二人相視而笑曰是惡知禮意棟梁折晉衛玠卒謝琨哭之慟曰棟梁折不覺哀死友趙岐逃難河間變姓名詣北海市中販胡餅孫賔石見曰處士非賣餅者乃開車後戸扶岐上歸白母曰得死友矣託妻子朱暉字文季同縣張堪有名於太學見暉甚重之接以友道乃把暉臂以妻子相託暉以堪先逹未敢對後復見及堪卒自候視妻子賑給之狀皃似友人孔融與蔡邕友善邕卒後有虎賁士皃類邕融毎酒酣引與坐曰雖無老成且有典刑送喪歸後漢任末字叔本遊京師教授友人董奉徳於洛陽病亡末躬推車載奉徳致於墓所由是知名也未申連璧之遊忽軫絶絃之泣明月臨階空有思於𤣥度流波入曲終絶賞於鍾期死而弔者既切子荆之問生乎愛矣還悲王粲之聲儀禮主喪禮朋友在他國袒免歸則已注謂無主䘮者當為之主毎至􅃝時則去冠代之以免舊說免象冠廣一寸以上歸有主則止也如㓜弱則衣止也記曰主人三年喪則為之再祭朋友虞祔而已朋友麻朋友雖無親有同道之恩相與服縗絰帶檀弓羣居則絰出則否不吊服也朋友有恩相為緦服即士之疑服素冠也孔毎至生平故處輒流涕戴胄房𤣥齡魏徴與胄善毎至生平故處輒流涕徃哭其尸王方翼其友趙持蒲誅死尸諸道親戚莫敢視方翼曰欒布哭彭越義也周文王掩骼仁也絶友義蔽主仁何以事君遂徃哭其尸具禮収葬宴飲設虚位沃饋李勉常引李廵張參在幕府後二人卒至宴飲仍設虛位沃饋之青春之逰白首相失韓愈祭薛中丞文青春之遊白首相失慟諸野羅道琮徙嶺表有同斥者死荆襄間臨終泣曰人生有死獨委骨異壌道琮曰終不使君獨留此瘞路左去嵗餘遇赦歸方霖潦積水失其殯處道琮慟諸野波中忽若溢沸者道琮曰若屍在可再沸之復湧乃得屍還鄉歸於所次而哭文粹永泰中於穆鄂州寜㑹客席與故湖南觀察韋大夫之晉同宴適值有發逺書者知鄭林州炅之龎歙州濬或以疾而殁或遇戎於盗韋氏出涕沱若有言曰二刺史之晉之友交也於是歛匕箸離筵席因歸於所次而哭三日人來弔之者韋則盡哀長號不徒慼容而已廣喪朋友義崔祐甫天其喪予文粹盧藏用陳子昻集序昔嘗與子有忘形之契四海之内一人而已良友殁矣天其喪予琴筆兩絶樂天祭微之始以詩交終以詩訣琴筆兩絶再哭經過罷離魂去住銷杜甫哭王掄飲食六白不盡人之歡以全交也歡謂飲食也班荆伍舉與聲子祖善班荆相與食而言復故也殺雞為黍范式張紹千里相期見上注投轄陳遵留客飲共飲盍簪易勿疑朋盍簪盍合也簪疾也伐木燕朋友故舊也詩孔伺相過食飲状韋執誼補闕張正一以上書召所善王仲舒韋成季劉伯芻裴茝常仲孺呂洞徃賀之或謂執誼曰彼將論君與叔文鈎黨事執誼即白成季等朋比有所窺望帝詔金吾伺得相過食飲状悉逐出之酒食接新奉詩書誇舊知韓愈詩聚香團揚州事迹太守仲端畏妻不敢延客謝皓謁之坐久飢甚端入内袖聚香團食之盤殽饋禽殻韓文聨句父友七白見父之執不謂之進不敢進禮父之執可以乗其車不可以衣其衣父之齒隨行家君投分侯霸事見拒交門注馬援不禮梁松援疾松候之拜牀下援不為禮子孫曰梁松尊貴大人何不為禮援曰我乃父之友也嵇紹不孤見上注不避粱肉記曰既葬君食之則食之矣大夫父之友食之則食之矣不避粱肉若有酒醴則辭注變顔色則不可不拜魏常林伯槐年七嵗父黨造之問伯槐曰伯先在否何不拜林曰臨子字父何拜之有不受父友解系少連荀勗諸子謂曰與卿為友應向我公拜勗又曰我與尊先君親厚系曰不奉遺教若先君相厚徃日哀頓當垂書問親厚之誨非所敢承勗父子大慙而壯之也阿戎阮籍與王渾友渾子戎少籍二十嵗毎見戎盡日而去謂渾曰與卿語不如阿戎談孔見父執必感泗滂沱劉審禮父喪見父執必感泗滂沱五君詠張說既失執政意内自懼邪與蘇瓌善時瓌子頲為相因作五君詠獻頲其一紀瓌也候瓌忌日致之頲覽詩嗚咽未幾見帝陳說忠蹇有勲不宜棄外遂遷荆州長史振起張仲方生岐秀父友高郢見異之曰是兒必為國器使吾得位將振起之先君之所友天下善士先君之所與友凡天下之善士與集焉信譲而大顯道博而無雜今之世言交者以為端敢悉書所尤厚者附兹石柳宗元先友記丈人吾父之友文粹崔祐甫穆氏四子講藝記祐甫不腆幸與使君有郎省之舊考盤在阿嵗聿云暮既覿邦君又適諸子之館使君第三子因見謂曰丈人吾父之友也從事於游夏之門久矣遺之梨栗𢎞農楊公㓜失所怙年六嵗時學歸悮入人家乃父執友也二丈人彈棊次見楊氏子戲之曰爾能爲丈人詠此局否楊即詠詩丈人驚撫其背遺之梨栗曰爾後必有文後十八一舉中春官選芝田録在方鎮者交辟之路巖㓜慧敏過人及進士第父故人在方鎮者交辟之久乃答書信八白八行之書馬融書曰書雖兩紙八行云云三嵗之字古詩客從逺方來遺我一書札置之懐袖中三嵗字不滅鯉魚腹中古詩客從逺方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書素書意何如上言加餐飯下言長相思鴻鴈足下蘇武裂帛為書繫鴈足下天子射鴈於上林得書云云李陵之答蘇武用嗣徳音嵇康之逹山濤以絶交道愈風之檄陳琳為太祖作檄書太祖方卧讀之起曰愈我頭風飛箭之書魯連繫書於箭射入城中將得書而自殺書不盡言言不盡意幣帛見上迴紋竇滔妻蘇氏織錦為廻紋詩以寄滔叔夜懶而不作洪喬傳而是棄見上投水門鄭子家使執訊而與之書告趙宣子執訊通訊問之官寓書子産寓書於子西使告范宣子貽書鄭鑄刑書叔向移書子産咫尺之書廣武君謂韓信曰君若使一介奉咫尺之書注簡牘或長咫尺者也秦二世使遺趙王書不封欲使君臣相疑待詔公車公車今屬衛尉上書者所詣口占陳遵孟公善書與人尺牘藏以為榮為河南太守召善書吏十人於前治私書謝京師故人遵慿几口占數百封親踈各如其意河南大驚不發私書郅都公廉後漢杜安字伯夷年十三入太學號竒童貴戚慕其名或遺之書安不發悉壁藏之後收捕貴戚安開壁出其書示之不罹其患也心存尺書劉琨上書曰南北逈邈同契弃致云云袁安初為縣功曹奉檄詣從事從事因安致書於令安曰事有郵驛私請即非功曹所持辭不肯受從事矍然而止篋封呉志曹公聞太史慈名遺慈書篋封之發省無所道但佇當歸通草書魏文帝命劉廙通草書廙答曰初以尊卑有踰禮之分是以守區區之節不敢脩草書陳㤗挂書于壁泰為并州京邑貴人寄寳貝因泰市奴婢泰皆挂之於壁不發其封得劉公一紙書賢於十部從事劉𢎞為荆州毎有興發手書丁寜欵密人皆感争赴之曰云云手答陶侃為荆州閫外多事千端萬緒罔有遺漏逺近書疏莫不手答筆翰如流未嘗留滯投水殷羡洪喬為豫章太守都下士人因其致書者百餘函行次石頭皆投水中曰沈者自沉浮者自浮殷羡不為致書郵也開閉數十桓温將以殷浩為尚書令遺書告之浩欣然答書慮有謬誤開閉者數十竟逹空函温大怒之陸機犬陸機在京乆無呉中家信犬名黄耳能為我取家信乎犬揺尾而去卒逹家信搜得書蜀郡太守因計吏脩敬於曹騰益州刺史种嵩於函谷搜得箋奏騰中臣外交請免官治罪帝曰箋自外來騰書不出非其罪也㸃竄曹公與韓遂書多為㸃竄如遂改定之者馬超愈疑孔工為尺牘殷嶠以字行渉書工為尺牘以雉兎遍遺幕府人為書段成式侍父于蜀以雉兎遍遺幕府人為書因所獲儷前世事無􅃨用者衆大驚封一笥書吉頊傳初太原温彬茂死高宗持封一笥書諉妻曰吾死後須年及垂拱獻之垂拱初妻上其書言武后革命事不作草字席豫與子弟屬吏書不作草字不發蘇瓌厯明歙二州刺史時來俊臣貶州參軍人懼復用多致書請瓌瓌叱其使曰吾忝州牧髙下自有體能過待小人乎遂不發書俊臣未至追還恨之由是連外徙不得入與諸子書顔真卿李希烈䧟汝州真卿往諭真卿毎與諸子書但戒嚴奉家廟恤諸孤訖無它語簡繒寄書惟在頃無吝簡與繒韓愈詩數幅遺我數幅書繼以藥物珍贈元十八書勸養形神同上翫而復之不能自休得足下陜州所留書翫而復之不能自休韓答侯繼且寄一札書令余解愁顔李白自梁園見㑹公寄書問三川不知家在否杜述懐反畏消息來寸心亦何有上但蒙寒温問乆客多枉友朋書素書一月凢一束虚名但蒙寒温問乏愛不敕溝壑辱道州手札適復至紙長要自三過讀杜詩枉裴道州手札不接而喻山川匪遐事使之逺形不接而喻者莫賢乎書夢得古人為書多書於絹呂向文選中有尺素書注光啓别紙唐盧光啓受知於租庸張濟毎致書上䟽允一事别爲一紙風塵荏苒音書絶杜甫宿府一聲何處送書鴈杜甫詩縉在鳯翔作書與别又遺親故書數幅停筆而化王維傳自謂主盟遣將軍張仁則致書於帝帝覧書笑曰宻陸梁不可折簡致之見本傳晉主數困欲與梁和使李襲吉為書諭梁辭甚辨麗太祖使人讀之至於毒手尊拳交相於暮夜金戈鐵馬蹂踐於明時嘆曰李公僻處一隅有士如此使吾得之傅虎以翼也顧其從事敬翔曰善為我荅之及翔所答書辭不工而襲吉之書多傳於世五代李襲吉前後緘書報杜奉漢中王手札鄰舍煩書札杜詩王十五前閣㑹折書放床頭涕與淚垂泗韓愈寄皇甫湜飛書飛書白帝營斗粟杜甫錦樹行音書從此稀杜甫贈韋賛善别江漢故人少音書從此稀施惠九施食附白春頒秋斂用粟賙賜周禮請粟子華使於齊冉子為其母請粟積而能散年雖大殺衆不恇懼恇恐也謂上以法惠救之恵必及下禮小人懐惠惠下之道禮周人尚施分散者仁之施財聚則民散民散則財聚仁者以財發身義濟物也不仁者以身發財豐凶不時聚斂有典適時以權救物惟道匪頒匪非也頒分也又讀為分頒時頒竝周禮博施濟衆見下賑貸門注貸而不書司城氏施而不徳竝賑貸門餼粟子皮事見上注隱人多取食焉子家謂季孫云隱人謂窮困人為粥衛國凶飢公叔文子為粥與國之餓者簞食靈輙餓趙宣子為簞食以與之義由獨斷恵必同沾惠以救災義而濟物好施惠孟嘗君與客語屏風後嘗有侍史主記所與客語問親戚居處客去已使人存謝獻遺其親戚父任散施郤愔字方回好聚斂積財雖千萬嘗開庫任其子超字景興一字嘉賔好施一日散與親戚悉盡也俸錢贍貧第五倫事見俸禄門後漢劉翊字子相旅有張季禮奔師䘮遇寒毁頓滯道路翊以車與之不告姓名䇿馬而去季禮意是翊也後詣還車翊閉門辭行不與相見不合施家施不及國傳大夫不收公利不敢作福臣無有作福作威書免官晉鄧攸為郡時擅開倉賑貧桓彛劾之矯制漢河内傷水旱父子相食汲黯以便宜持節發河内倉以救之及歸汰免官罪武帝賢而釋之博施之人専逹之責積而能散誠謂發身私不及公豈宜作福嵗凶諒可恤人家施不應及國散以家貯収其公利毁家紓難猶謂盡心賑窮救災豈宜獲戾情且渉私美將歸下茍徇便宜則非專逹所司以未有君命何其速與使者以茍利國家専之可也示不敢專禮嗇則濟物宜哀菜色無肆莠言命未及於匪頒罪寜逃於擅發掠美鬻恩恤貧振廪鄧攸雖見免官矯制開倉汲黯猶聞釋罪王望宇慈卿行部見飢者祼形草食以便宜輙出其所在粟布為糧作衣将議罪鍾離意不罪之也劉頌字子雅奉使見飢人上表請振貸不待報貸之而行除名孔輕財好施陳子昂輕財好施分給親故洎麾下裴行儉帝賜都支資産四金三千餘物橐駞馬牛稱是行儉分給親故洎麾下數日輒盡賙急令狐峘貶衢州别駕刺史田敦峘門生也與峘昧生平至是迎拜分俸半以賙給之家無餘貲蘇頲性廉儉奉廪悉推散諸弟親族家無餘貲所得俸物賙急親族李元紘所得俸物賙急親族問餉沈傳師問餉姻家故人賑姻舊乏盧邁所得廪賜皆賑姻舊之乏散施妻子告不給樊宗師家饒于財悉散施姻舊賔客妻子告不給宗師笑而不荅周急崔郾不藏貲有輙周急親舊益務施與李藩居父喪家本饒財姻屬來弔有持去者未嘗問益務施與居數年略盡喜施貸李勣與其父盖皆喜施貸所周給無親踈之問散金三千餘萬有落魄公子悉皆濟之李白上裴長史散金敷惠唐舊史魏元忠請歸鄉拜掃特賜錦袍及銀千兩給十騎四人手勑曰衣錦晝游在乎兹日散金敷惠諒屬斯辰元忠至鄉里竟自藏其銀無所賑施施饋十賑施附白君子以施禄及下易稱物平施用敷錫厥庻民敷分也書先王子惠困窮惠鮮鰥寡周禮遺人掌其委積以待施惠懐子好施士多歸之欒盈也傳在禮家施不及國歌舞陳氏之施人歌舞之博施子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎魏成食禄千鐘什九在外什一在内馬援散財馬援田牧有牛馬羊數千榖萬斛歎曰殖財貴能散施否則守錢虜耳乃盡頒故舊王丹務周給後漢寇恂字翼所得禄賜施朋友故人曰吾因士大夫致此豈可獨受耶君子以振民育徳易散鹿臺之財發鉅橋之粟周書陳錫哉周能施出公粟傳宋飢司城子罕請於公出公粟使大夫皆貸司城氏貸而不書不作記籍施而不徳陳氏以家量貸而以公量收之陳氏家量比公皆加之也施取其厚宋公子鮑禮於國人年自七十已上無不饋貽也與爾鄰里鄉黨乎夫子謂原憲惠而不費漂母哀王孫饋食韓信成詔入榖賑貧者賜直義穀後漢黄香為魏郡年飢分俸禄贍貧人豐冨之家各出義榖樊重假貸數百萬遺令焚削文契載殽糧竇武得兩宫賞賜悉與親族及載殽糧於路以施民也梁高字伯夏載穀於城門與貧餒者不宣己惠散軍糧舒仲應以袁術軍糧散給飢人術曰足下欲獨受天下重名乎餼國人粟鄭子罕卒子展以子罕之命餼國人粟一鐘在喪故假父命也與人者不曰來取禮妄施莊子屠羊說從楚昭王出奔不受賞曰豈使吾君有妄施之名指囷魯肅子敬不治家事以散財賑窮結士為務周瑜為居巢長過肅并求資糧肅時有兩囷米各三千斛肅乃指一囷與瑜瑜益知竒遂定僑札之交也姊助分施駱統君緒事嫡母謹時人多困乏統為飲食與之衰少其姊仁愛問知之曰何不告我乃以私粟與統并告母使分施也散父米呉全琮子撗父柔使齎米數千斛到呉有所市琮皆散施空舩還父怒之琮曰所市非急而士大夫有倒懸之患不及啓報父竒之孔卻州縣饋遺廣徳公主下嫁于琮從琮貶韶州卻州縣饋遺不受莊淑公主下嫁杜悰出為澧州刺史主與偕州縣供具拒不受饋鹿裴休有饋鹿者諸生共薦之休不食曰䟽食猶不足今一啖肉後何以繼饋十羊楊晟王建使王宗裕率騎五萬圍晟遂約降建饋十羊晟曰以我為机上肉乎不出虀葛周寶奔牛埭高騎饋以虀葛諷其且亡也寶抵于地曰公有吕用之難方作無誚我即奔常州多饋金帛鄭餘慶自至徳後方鎮除拜必遣内使持幢節就第至則多饋金帛且以媚天子唯恐不厚故一使者納至數百萬緡憲宗毎命餘慶必誡使曰是家貧不可妄求取議者或詆其沽激餘慶不屑也韓信所以感推食之恩申戰勝之威文粹栁冕論文武書慶遺十一白詒我佩玖雜珮以贈之不敢稅記曰未仕者不敢稅人如稅人則以父兄之命與人者不曰來取禮凡遺人弓者張弓尚筋弛弓尚角凡以弓劒苞苴簞笥問人者操以受命如使之容問猶遺也禮狄滅衛衛人廬于曹齊桓公歸以乗馬祭服五稱歸夫人魚軒宋公子鮑見上晉重耳及曹僖負羈饋盤飱寘璧焉注云寘飱中恐人見也云無境外之交故也晉人誘士會將行繞朝贈之以䇿饋孔子豚陽貨欲見孔子使孔子來拜之君子於有饋者不能見則不視其所饋注謂有疾不見則不納厚徃而薄來不過具食器漢鄭莊性廉不治産然饋遺不過食噐注謂一盤食也江都王建遺越繇閩侯錦帛閩侯亦遺荃葛荃葛今之布或曰細葛也朱邑為大司農無束脩之饋尹翁歸為市吏不受饋遺百賈畏之人訟亭長受米肉䇂茂為宻令不坐問所由晉陶侃為荆州有奉遺者皆問所由若力所致雖微必喜慰賜三倍若非禮得之即厲聲呵辱還其所饋人於是勤於農恐以財貨汚君朱暉文季太守阮況欲市其牛暉不從況卒暉乃厚贈曰前者恐以財貨汚君魚相煦以濕相濡以沬不如相忘於江湖莊小惠未徧受饋不謝劉殷時人嘉其志行競以榖帛遺之受而不謝云待後貴當相酬也楚王老有嘉惠恤老也不受太祖徴華歆賔客故人送行贈遺數百歆不拒宻題識臨去謂曰恐懐璧為害願諸君為之計衆乃知之各留其贈又羅含君章父宰新塗後含到縣縣人以含舊宰之子咸致賂遺不拒及歸悉封留而去又于寶與翟陽船賣之買絹寄還本為惠反煩之益愧歎也旦發暮還晉茍晞道將在兖州見朝政亂懼害毎得珍物貽都下親貴去五百里恐不鮮美求得千里牛旦發暮還漂母饋飯僖妻饋飱孔奉賜悉遺親黨李勉位將相所得奉賜悉遺親黨賂遺得權幸心李聽罷為太子少傅聽素以賂遺得權幸心故多為助力歌兒狗馬金貝踵疊其門楊國忠逺近饋問閹稚歌兒狗馬金貝踵疊其門幃頭紗元和大和已來左右中尉或宻以幃頭紗贈清望者則明晨必有爰立之制出南部新書四方賂遺嵗積鉅萬五代晉臣桑維翰權勢既盛四方賂遺嵗積鉅萬贈遺藩渥㐮武郡王琛初與太常卿鄭元璹持女伎聘突厥始畢可汗約和親始畢禮之贈遺藩渥自弱冠誓不通親友獻遺杜暹自弱冠誓不通親友獻遺以此終身慶賀十二白不知所賀子玉治兵于蒍鞭七人貫三人耳國老皆賀子文蒍賈後至不賀曰不知所賀子玉過三百乗不能以入茍入而賀何後之有傳婚禮不賀人之序也賀取妻者曰聞子有客使某脩慶弔相隨里舍賀生男盧綰父與太上皇同里善髙祖與綰同日生里中持牛酒相賀兩家子長相愛里中喜兩家相善子同日生又相愛復賀兩家也賀錢萬吕公善沛令從人避仇豪傑聞令有重客皆往賀不滿千錢坐堂下髙祖紿謁者曰賀錢萬馬援軍還故人多迎勞平陵人孟兾名有謀於座賀援援曰吾望子有善言反同衆人也相慶孔受弔不受賀岑文本為中書令有憂色母問之荅曰非勲非舊責重位髙所以憂也有來慶者輒曰今日受弔不受賀三慶酷吏郭𢎞霸時大旱𢎞霸死而雨又洛陽橋乆壊至是成都人喜后問羣臣外有佳事邪司勲郎中張元一曰比有三慶旱而雨洛橋成𢎞霸死背著牀瞑來俊臣斬于西市人皆相慶曰今得背著牀瞑矣賀聲盈耳栁宗元送蕭鍊序拜慶寜覲光耀族屬送班孝廉序髙堂稱慶里閈更賀方將髙堂稱慶里閈更賀曵􅅂峩冠榮南諸侯之邦送苑論朝野相賀李義府流朝野相賀泥金帖子新進士毎及第以泥金書帖子附於家書中鄉曲親戚例以聲樂相慶謂之喜信也天寶遺事制下士相賀於朝楊綰遷吏部元載秉政忌綰望髙䟽薄之載得罪綰同平章事制下士相賀於朝宗戚詣慶鄭肇既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣歸與妻子相慶裴諗為翰林承㫖適㑹帝幸其院諗即稱謝帝曰可歸與妻子相慶取御奩果以賜諗舉衣跽受帝顧宫人取巾裹賜之洒然相賀徐有功起為左肅政臺侍御史天下聞有功復進皆洒然相賀清朝燕人杜甫賀陽城郡王太夫人加恩薦獻十三白水潦降不獻魚鼈禮獻鳥者佛其首為其喙害人也佛戾也獻車馬者執䇿綏獻甲者執胄獻杖者執末獻民虜者操右􅃑獻粟者執右契獻米者操量鼓獻熟食者操醬齊獻田宅者操書致獻人禽加於一雙則執一雙以將命委其餘加猶也犬則執緤左牽之守犬田犬擯者既受乃問犬名牛則執靷馬則執靮皆右牽之甲若有以前之則執以將命無以前之則袒櫜奉胄器則執蓋弓則左手屈䪅執拊韣弓衣也劒則啓櫝加夫襓與劒焉注櫝劒函夫襓劒衣也父母在饋獻不及車馬潢汙行潦之水可羞於王公傳楚樂伯使攝叔奉麋獻焉獻叔也士有獻他日君問之曰安取彼再拜稽首而後對獻金玉曰致馬資於有司居山不以魚鼈為禮居澤不以豕鹿為禮天不生地不養君子不以為禮獻禽之未至言未至獻禽之時也問物所由陶侃事見上注西旅獻獒書頴考叔有獻於莊公而諌之傳孔獻女伎齊國昭懿公主憲宗即位獻女伎帝曰太上皇不受獻朕何敢違還之饋獻精腆邱和拜代州刺史煬帝北廵和饋獻精腆獻繒錦崔寜反代宗詔宰相杜鴻漸為劒南西川節度徃平其亂㑹寜遣使至獻繒錦數萬辭卑甚約鴻漸貪其利遂入成都四方獻饋不及門劉瞻四方獻饋不及門門無饋餉李珏獨無所獻李峴呉王恪孫也𤣥宗幸温湯甸内巧供億以媚上峴獨無所獻帝異之漢文罷獻詔還騄駬鑾輅徐驅焉用千里翟裘既焚筒布則毁文粹李徳裕罷獻箴天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事衮以謂漢文帝還千里馬不用晉武帝焚雉頭裘宋髙祖碎琥珀枕是三主者非冇聦明大聖以致治安謹身率下而已今諸道饋獻皆靡侈不急而節度使非能男耕而女織者類出于民是斂怨以媚上也請皆還之上嘉納常衮傳幽燕使者幽燕通使者杜甫送路使君奉使十四白衘君命而使祗役勤王臣能承命為信死而成命臣之禄也下臣獲考解揚成命死又何求使乎使乎善之道也指使六十曰耆指使時使皇皇者華君遣使臣也送之以禮樂言逺而有光華也皇皇者華于彼原隰詩四牡勞使臣之來也有功而見知則說矣四牡騑騑周道逶遲怵惕奉公咨諏問政載馳載驅使四方子曰使於四方不辱君命可謂士矣使適四方周官曰擇任而往奉爾君事敬無廢命傳遽之臣以車馬給使也七十者適四方乗安車自稱曰老夫行役以婦人二星入蜀李郃占知之千里程漢舊儀奉璽書使者乗馳傳日夜千里為程也周官行人漢儀使者不制以辭說苑曰明君之使臣也任以事而不制以辭奉辭復命朝受命而夕飲冰執圭禮大夫執圭而使者以申信張旌儀禮使者及境張旌謁門人謁告也軺車驛騎星駕皆使車也周禮逹八節使四方山國用虎節土國用人節澤國用龍節皆以金飾之齊國莊子來聘自郊勞至於贈賄禮成而加之以敏敏審於事輕幣敬使傳子叔齊子為季武子介以㑹目是晉人輕魯幣而益敬其使齊子相季武子以禮故也承君命不忘敏叔向曰薳罷有後於楚宜哉承君命不忘敏任賢使能周禮云凡為使者已受命君言不宿於家急君使也肅肅宵征夙夜在公詩豈不懐歸王事靡盬遇疾公羊傳曰公子遂如齊至黄有疾而還大夫以君命出聞父母䘮徐行而不反况病乎注聞父母喪不忍疾行君使人追之也又穀梁曰公子遂如齊至黄乃復乃者亡乎人之辭也注大夫受命而出雖死以尸將命今遂以疾而還失禮違命故曰亡乎尸造于朝大夫聘未至而卒則既殯而造于朝介將事也使者旁午旁午謂一縱一横也盖使者縱横也漢書牛軒之使鳯舉班固君子于役星言夙駕詩周禮夷使四夷之使有徴事奉使四方徴師役也使縱横之流蓋出行人之官受命不受辭不辱君命此其所長也及邪人為之則尚諼而棄信也人事之患隂陽之患葉公諸梁使齊問孔子曰王使諸梁甚重齊待使者甚敬事不成當有人事之患事成必有隂陽之患注云人患雖去喜懼戰于心固以結冰炭於五藏矣吾㸑無欲清之人今吾朝受命而夕飲冰我其内熱乎宜重選温嶠字子真上疏曰選使宜重不可減二千石見居三品請治行鄭莊事見行旅門朝冐霧露晝被塵埃夏為大暑暴炙冬為風寒偃薄朝受命夕引道蘇武丁年奉使皓首而歸廢命弃事不忠廢命非敬弃君之命子曰誦詩三百授之以政不逹使於四方不能専對雖多亦奚以為樂祈以君命越疆而使宋致使而私飲酒不敬二君不可不討乃執之晉執之也廢職弃命臣節無失寜念解楊之忠君命不恭宜及樂祈之責既辱君命是速爾尤後漢李郃為漢中戸曹吏時竇憲納妻郡國有禮事錢郃諌太守憲危亡可勿與交通不聼遂自請行許之所在停留以觀變至扶風憲就國自殺友黨悉誅與交通者免官唯漢中不預行人失辭使而失命召而不來是稱姧也獻空籠齊使淳于髠獻鵠于楚出郭門飛其鵠揭空籠徃曰臣過上水不忍鵠之渴飲之遂飛去欲買代之是欺吾王也云云楚王曰善哉得子言倍於鵠矣後漢鄭興奉使私買奴婢左遷蓮芍令墯慢孔神情爽拔可使捕李義琛文成公主貢金遇盗於歧州主名不立太宗召羣御史至日義琛曰是人神情爽抜可使推捕義琛徃數日獲賊帝喜為加七階子昻三事陳子昻對三事一言九道出大使廵按天下申黜陟求人瘼臣謂計有未盡也且陛下發使必欲使百姓知天子夙夜憂勤之也羣臣知考績而任之也姦暴不逞知將除之也則莫如擇仁可以恤孤明可以振滯剛不避彊禦智足以照姦者然後為使故輶軒未動而天下翹然待之矣今使且未出道路之人皆已指笑欲望進賢下不肖豈可得邪有遣使之名無遣使之實使愈出天下愈弊徒令百姓道路送往迎來不見其益也檄取庫錢蘇頲檢校益州大都督長史前司馬皇甫恂使蜀檄取庫錢市錦半臂琵琶捍撥玲瓏鞭頲不肯予因上言遣使御命先取不急非陛下以山澤贍軍費意或謂頲公在逺回得忤上意頲曰不然明主不以私愛奪至公吾可以逺近廢忠臣節邪處決平恕馬懐素以十道使黜陟江西處决平恕幽鎮宣諭温造為幽鎮宣諭使賜緋衣至范陽總櫜鞬迎造為開示禍福劉總懼矍然若兵在頸時劉總比年上書請覲使問行期乃不報穆宗曰卿為我行諭意奉使稱㫖盧羣淮西呉少誠擅决司洧水溉田使者止之不奉詔命羣臨詰少誠曰是於人有利羣曰臣道貴順恭恪所以為順也專命廢順雖利何有為陳古今成敗事逆順禍福皆有効所以感動之少誠竦然奉使稱㫖宣布天子徳意李靖授嶺南撫慰大使以嶺海陋逺乆不見徳非震威武示禮義則無以變風即率兵南廵所過問疾苦延見長老宣布天子徳意逺近懽服寜朔大使竇静改夏州都督詔曰北方之務悉以相委以卿為寜朔大使朕無北顧憂矣多振寃滯劉祥道詔廵察關内道多振寃滯毬場宣詔崔從遷右丞王承宗請割徳棣而遣子入侍也憲宗選堪使者以命從議者謂承宗狠譎非單使可屈次魏田𢎞正請以五百騎從辭之惟童騎十數疾趍鎮集軍士毬場宣詔為陳逆順大節禍福之効音辭暢厲士感動承宗自失貌愈恭至泣下即按二州户口符印上之動揺山岳震慴州縣韋思謙曰御史出使不能動揺山岳震慴州縣為不任職復十道使張廷珪請復十道使廵視州縣帝然然納之因詔陸象先等分使十道至震畏韋見素天寶五載為江西山南黔中嶺南道黜陟使繩糾吏治所至震畏單使弄頰李軌㑹安脩仁兄與貴本在長安自表詣涼州招軌帝曰軌據河西連吐谷渾突厥今興兵討擊尚為難單使弄頰可下邪與貴曰軌盛彊誠然若曉以逆順禍福宜聽如慿固不受臣世涼州豪望多識其士民而脩仁為軌信任典事樞者數十人若候隙圖之無不濟帝許之請傳行天下宇文融自請馳傳行天下事無巨細先上勸農使而後上臺省須其意乃行下融所過見髙年宣天子恩㫖百姓至有感涕者魏博宣慰孔巢父為魏博宣慰使巢父辨而才及見田悦與言君臣大義利害逆順開曉其衆是時恱久不臣下皆厭亂雜然喜曰不圖今日還為王人酒中恱起自陳騎射工曰陛下見用何敵不摧巢父曰若爾不蚤自歸乃一劇賊耳恱曰能為劇賊豈不能為功臣乎巢父曰國方多虞待子而息恱謝焉數日田緒殺恱遂與大將刑曹俊等聽命巢父即以緒權知軍務紓其難勞問循慰奚陟貞元八年遷中書舍人於是江南淮西皆大水詔陟勞問循慰所至人人便安使者趣戰哥舒翰帝趍翰出潼闗復陜洛從國忠之言使者趣戰項背相望持節直入其軍李􅅠徐州張建封卒兵亂囚監軍迫建封子愔主軍務帝以􅅠剛敢拜宣慰使持節直入其軍大會士喻以禍福出監軍獄中脫桎梏使復位衆不敢動愔即上表謝罪稱留後􅅠曰非詔命安得輒稱之削去乃受即還稱㫖遷郎中賜金紫持節袁滋韋臯始招來西夷異牟尋内屬徳宗選郎吏可撫循者皆憚行至滋不辭帝嘉之擢祠部員外郎兼御史中丞賜金紫持節往踰年還使有指願得天子一節柏耆王承宗以常山叛朝廷厭兵耆杖策詣淮西行營謁裴度且言願得天子一節馳入鎮可掉舌下之度為言乃以左拾遺往既至以大誼動承宗至泣下乃請獻二州以二子入質真擢耆左拾遺由是聲震一時敕使柳公綽奏比舘遞匱乏驛置多闕敕使衣緋紫者所乗至三四十驛黄緑者不下十數有専對才于頔為吐蕃計㑹使有専對才巡邊程异同平章事明年西北軍政不治儀置巡邊使憲宗問孰可者乃自請行固辭元行冲出為岐州刺史兼關内按察使自以書生非彈治才固辭分道賑贍劉憲父思立在髙宗時為名御史于時河南大旱詔遣御史中丞崔謐等分道賑贍思立建言蠶務未畢而遣使撫廵所至不能無勞餞花鳥使吕向帝遣使来擇天下姝好納之後宫號花鳥使向因奏美人賦以諷遂使乗驛視吾饑人杜牧作權審制慰撫流散宣導恩澤同上行營宣慰元和中憲宗縁淮西乆未成功遣尚書左丞許孟容行營宣慰令面詰責光顔重𦙍一月内平賊賛皇一品集布宣天子徳澤魏人歡服裴度元和六年以司封員外郎知制誥田洪正效魏博六州于朝憲宗遣度宣諭洪正知度為帝髙選故郊迎趨跽受命且請徧至屬州布宣天子徳澤魏人由是歡服還拜中書舍人傳聲看驛使送節向河源杜甫東樓詩孱僮單騎張薦顔真卿為李希烈所拘遣兄子峴及家僕奏事皆留内侍省不得出薦上疏曰去正月中奉使淮西期不先戒行無素備受命之出不宿於家親黨不遑告别介副不及陳請孱僮單騎即日載馳出使者冠蓋相望李嶠上疏朝廷萬機非無事而機事之動常在四方故出使者冠盖相望今已置使則外州之事悉得専之傳驛减矣請率十州置一御史李素立見名字門専命十五白卿非君命不越竟傳大夫出疆有可以安國家定社稷專之可也不制以辭說苑曰明君之使人也任以事不制以辭專對茍叶盡忠之節難科專逹之辜違命折劵尚不論辜馮驩矯制發倉猶聞釋罪汲黯使者誠為擇利或人未可與權行人將欲敗謀難從膠柱鄧攸免官見上遂事公羊公子結媵陳人之婦遂及齊侯宋公盟遂事也使者受命不受辭馮奉世陳湯矯制見軍矯制門汲黯發倉見不合施門徐偃鼓鑄博士徐偃行風俗矯制使膠東魯國鼓鑄鹽鐵還奏張湯劾至死偃以春秋之義有可以安國家定社稷專之可也詔終軍問罪詰曰古者諸侯國異俗百里不通故有不受辭專可之冝今萬國為一天下同風偃廵封域之中稱以出疆何也且鹽鐵在國家不足為利害而以安社稷為辭何也矯作威福以干名譽罪重而所就小偃即死不至而反汲黯字長孺上使視東越相攻不至呉而反曰越人相攻不足辱天子之使受賂范睢從須賈使齊齊王賜金須賈以告魏齊齊以睢告國隂事得金擊睢折脅拉齒又南越王賜陸賈櫜中装直千金又司馬相如使蜀時受金失官作徒衣鍾離意子阿部送徒詣河内時寒徒病不能行意移牒屬縣使作徒衣縣上狀意亦具聞帝善之施惠孟常使魏子収邑三萬不致曰有賢者轉假與之矣後受施者自刎明孟常不反也雖有君命何其速也茍利國家專之可也示不敢專禮義有隨時恭無專命士匄侵齊及榖聞齊侯卒乃還禮也嫌其不待君命為失禮故明言其禮也又善不伐䘮也傳孔矯詔則天皇后武氏有上封事言嶺南流人謀反者大后遣攝右臺監察御史萬國俊就按得實即論决國俊至廣州盡召流人矯詔賜自盡皆號哭不服臣道貴順盧羣衘命北闕撫寧南方茍利國家專之可也李陽冰上李大夫書採風謡十六白奉兹星使採彼風謡後漢和帝分遣使者各至諸郡觀採其風謡勤宣帝命敷求人瘼使從俗從所宜也風俗通曰周秦帝以嵗八月遣輶軒之使採異方言還奏之藏於私室周適四方廵行風俗漢分八使觀採方言省問國風圖寫山川後溪李恂拜侍御史持節使幽州慰撫北狄所過皆圖畫山川屯田聚落百餘卷悉奏之漢遣八使廵行風俗皆選素有盛名周舉杜喬欒巴張綱等分天下刺使二千石有贓罪顯明者驛馬上之墨綬已下使輒収舉號八俊舉賢史鄭安平操范睢亡匿奉使謁者王稽至魏安平詐為卒侍王稽稽問曰魏有賢人可與俱西游者乎安平曰臣里中有張禄先生欲見君其人有仇不敢晝見乃夜見之稽遂載入秦卒為秦相又暴勝之為直指使至勃海聞雋不疑賢遣使請不疑相見薦詣公車拜青州刺史舉賢使漢武使博士循行天下舉獨行君子士有特招使者之任也注士有異行湏特招也觀風孔五術察風俗陸贄補渭南尉徳宗立遣黜陟使十一人行天下贄說使者請以五術察風俗曰聽謡誦審其哀樂納市賈觀其好惡訊簿書考其争訟覽車服等其儉奢省作業察其趣舍遣御史察風俗則天光宅元年十二月戊子遣御史察風俗發輶軒文粹皮日休霍山賦序所至州縣山川未嘗不求其風謡以訟其文幸上發輶軒使得採以聞或忿形謗讟或醜肆謳謡陸宣公奏議諸道貢珍遽私别庫試詢候舘之吏兼採道路之言果如所虞積憾已甚或忿形謗讟或醜肆謳謡容其身到屬縣李嶠請率十州置一御史容其身到屬縣閭里督察姦訛采風俗然後可課其成功按姦慝十七白儆于有位提舉國章糾逖王慝奉辭問罪暴勝之持斧以懲姦漢武帝末盗賊羣起拜暴勝之為直指使者衣繡衣持斧逐捕盗賊張綱埋輪京師振悚張綱在八使廵行中年少官卑受命埋輪洛陽都亭曰豺狼當路安問狐狸遂劾奏梁冀京師振恐范滂攬轡天下澄清滂請為詔使案察冀州滂登車攬轡慨然有澄清天下之志後漢提振綱紀案察姧宄晉王導使八部從事之部顧和君孝在數中還同時見諸從事各言二千石得失和獨無言導問之和曰明公為政寜有漏網何縁有所察也孔智足以照姦陳子昻三事姦暴不逞知將除之也則莫若擇智足以照姦者然後以為使繩糾吏治韋見素天寶五年為江西山南黔中嶺南道黜陟使繩糾吏治殺使十八白不廢命附樂祈不敬雖聞可討之辭宋樂祈聘晉未致君命而飲酒范獻子曰不敬二君不可不討遂執之伯蠲無辜終貽非禮之誚晉伐鄭鄭人使伯蠲行成晉人殺之非禮也古者兵交使在其間可也虐執使臣將以釁鼓楚伐呉使弟蹶由犒師楚靈王執之將以釁鼔楚子使申舟聘于齊不假道于宋舟曰我則必死王曰殺汝我伐之見犀而行犀舟之子託其子而行示必死傳及宋華元殺之不廢命晉使解揚如宋曰晉師悉起將至矣楚子執之使反其言解揚許之乃見宋人遂致其君命楚子問之對曰云云遂赦之又魏閻温伯儉時馬超圍冀城急州遣温宻出告救於夏侯淵為超所獲超使言於冀城云東方無救温偽許之乃將至城下曰淵軍三日至勉之勉之遂殺之又劉整鄭為諸葛恪所獲事與上閻温相類又後漢冦恂子翼擊髙峻峻遣軍師皇甫文出謁辭禮不屈恂怒欲斬諸將以為不可恂不聽斬之峻即日降諸将問之恂曰文峻之腹心殺之則峻亡其膽所以降耳諸將曰非所及也孔孔巢父李懐光據河中帝復令巢父宣慰罷其兵以太子太保授之懐光素服待命巢父不止衆忿曰太尉無官矣方宣詔乃譟而合害巢父并殺中人啖守盈劉悟斬使者藩鎮劉悟李師道被討使將兵屯曹法一而信士卒樂為用悟徙營潭趙魏師壁阿井或言悟且亂不如速去師道遣使兩軰來責戰宻語其副張暹使斬悟使者與暹屏語移時悟疑之暹以情告悟乃斬使者李希烈害顔真卿希烈拘送真卿蔡州希烈弟希倩坐朱泚誅希烈因發怒使閹奴等害真卿曰有詔真卿再拜奴曰宜賜卿死曰老臣無状罪當死然使人何日長安來奴曰大梁來罵曰乃逆賊耳遂縊殺呉溆被害朱泚反溆齎詔見泚具道帝不疑而泚業僣逆留溆客省不遣卒被害縱使者戕之統葉䕶可汗明年射匱使使來以葛薩邦有世憾請殺之帝不許羣臣曰存一人失一國後且為患秦王曰不然人來歸我我殺之不祥帝又不聽宴禁中酒酣至中書省縱使者戕之不宣也吾行必不免周世宗征淮李景懼遣王知郎求和又遣鍾謨稱臣不荅乃遣王崇質副孫晟奉表謨與晟皆言景願割六州之城世宗已取滁揚諸州因留使者不遣初晟之奉使也語崇質曰吾行必不免及崇質還而周兵數敗盡失所得諸州世宗召晟問江南事晟不對世宗怒㑹重進以景蠟書來多斥周過惡由是發怒曰安得此指斥之言乎亟召収晟下獄及其從者二百餘人皆殺之晟臨死神色怡然遇讐十九白子夏曰居昆弟之仇如之何子曰仕不與共國衘君命而使雖遇之不鬬禮以私害公非忠也傳奉辭成命必念解揚之忠損怨避仇宜寡趙喜之怒虐我則讎誠謂一之已甚衘君之命且宜兩不相傷未復命於飲冰寜報仇於劘刃皇華奉命白刃相讎魯使敬叔弔滕伯惠伯為介及郊懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入注懿伯惠伯叔父也忌怨也惠伯不以私害公故遂入捨則崇讎報為廢命與夫失節寜其斷恩居兄之仇避為不弟私讎不及公傳見讎不殺雖類寛身受命而行亦宜獲考傳不可以見讎而不殺又曰下臣獲考獲考謂事得成孔使者屢覘休璟唐休璟吐蕃來請和既宴使者屢覘休璟后問焉對曰洪原之戰是將軍多殺臣士卒其勇無比今願識之后嗟異擢右武威金吾二衛大將軍使絶域二十白蘇武漢使匈奴十九年不失節歸為典屬國傅介子以馬監求使大宛因詔責樓蘭龜兹遂帥吏斬之還封義陽侯張騫使外國窮河源封博望侯請使絶域路温舒請使絶域暴骨方外盡臣下節太僕杜延年問狀罷歸故官以言無可取請長纓以覊虜終軍請使拜諫議大夫使南越而云云定逺侯班超見志節門陸賈使南越南越王尉佗内屬賜賈櫜中装直千金使於四方不辱君命丁年奉使白首而歸李陵與蘇武書單車之使漢詔求才可使絶域落蕃田令因王事落蕃未還有親屬同居者其身分之地六年乃追身還之曰隨便充給即身死王事者子孫雖未成丁亦不追戰場人篤疾亦不追咸聽終身也没蕃人還戸貫令没蕃得還及化外歸朝者所在州鎮給衣食具狀送省奏聞化外人於寛郷附貫安置落蕃人依舊貫無舊貫任於近親附貫也出禮義之鄉入無知之俗李陵書漢使王烏窺匈奴匈奴請漢使不去節不黯面不入穹廬烏習胡事乃去節黯面單于愛之遣子入侍後使楊信不去節坐穹廬之外求還班超仲叔乆在絶域思土上疏願生入玉門關帝從之千里有不歸之魂殊鄉有哀苦之事隨絶域之聘人領天隅之歸客孔入蕃㑹盟李揆為盧杞所惡用為入蕃㑹盟使揆辭老恐死道路不能逹明命帝惻然杞曰和戎者當練朝廷事非揆不可異時年少揆者不敢辭至蕃酋長曰聞唐有第一人李揆公是否揆畏留因紿之曰彼李揆安肯來耶董晉李涵持節送公主於回紇署晉判官回紇恃有功見使者倨因問嵗市馬而唐歸我賄不足何也晉曰我非無馬而與爾為市為爾賜者不已多乎衆皆南面拜不敢有言食鐵石人和逢堯突厥嘿啜請尚公主逢堯以御史中丞報可嘿啜遣貴近頡利來曰詔送金鏤具鞍乃塗金非天子意使者不可信雖得公主猶非實請罷和親欲馳去左右色動逢堯呼曰我大國使不受辭我可輙去乃牽持其人謂曰漢法重女壻而送鞍具欲安且久不以金為貴可汗乃貪金而不貴信邪嘿啜聞曰漢使至吾國衆矣斯食鐵石人不可易因備禮以見可汗為斂髪南面再拜諭罷可汗兵鄭元璹劉武周將宋金剛與突厥處羅可汗掎角冦汾晉詔元璹諭罷可汗兵不聽乃進為武周援㑹暴疾其下意元璹寘毒囚之處羅死頡利圍留帳中數年既許可汗婚元璹始得還帝勞曰卿不辱於虜可輩蘇武張騫矣突厥崔敦禮回紇吐迷度為下所殺詔往綏定立其嗣而還敦禮通知四夷情偽其少慕蘇武為人故屢使突厥前後建明允㑹事機諭天子威徳賛普順說韋倫徳宗嗣位選使絶域者擢倫太常少卿充和吐蕃使倫至諭天子威徳賛普順說乃入獻還進太常卿使回鶻柳晟為將作監使回鶻奉冊立可汗逆謂曰屬聞可汗無禮自大去信自彊夫禮信不能為何足奉中國乎可汗諸貴人愕然駭皆跪伏留不遣吕温與韋執誼厚因善王叔文再遷為左拾遺以侍御史副張薦使吐蕃㑹順宗立薦卒于虜虜以中國有喪留温不遣時叔文秉權與游者皆貴顯温在絶域不得遷常自悲元和元年乃還而柳宗元等皆坐叔文貶温獨免不辱命胡証太和公主降回鶻以檢校工部尚書為和親使次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者証固不從以唐官儀自將訖不辱命具陳虜情偽山川險易崔倫應二年以右庻子使吐蕃虜背約留二嵗執倫至涇州逼為書約城中降倫不從更囚邏娑城閱六嵗終不屈乃還代宗見之為感動嗚咽即具陳虜情偽山川險易指畫帝前人服其詳天子使可當小國之君李義琰使髙麗其主據榻召見義琰不拜曰吾天子使可當小國之君柰何倨見我主詞屈為加禮屈使者拜商侑使回鶻可汗驕甚盛陳兵甲欲臣使者侑不為屈己傳命虜責其倨宣言欲留不遣衆色怖侑徐曰可汗唐壻欲坐屈使者拜乃可汗無禮非使臣倨也虜憚其言不敢逼虜以金遺隂埋帳下杜暹以監察御史覆屯磧西㑹安西副都䕶郭虔瓘與西突厥可汗阿史那獻鎮守使劉遐慶更相訟詔暹即按入突騎施帳䆒索左驗虜以金遺暹固辭左右曰公使絶域不可失戎心乃受隂埋帳下已出境乃移文俾取之突厥大驚度磧追不及去為西征記韋洪機使西突厥冊拜同俄設為可汗㑹石國叛道梗三年不得歸裂裾録所過諸國風俗物産西征記比還太宗問外國事即上其書三使絶域張薦吐蕃賛普死為弔祭使占對詳辯三使絶域持節弔回紇蕭昕大厯中持節弔回紇回紇恃功廷譲昕曰乃中國亂非我無以平奈何市馬不時歸我直昕徐曰國家龕定冦難功雖絲毫不遺賞况鄰國乎僕固懐恩我之叛臣爾與連禍又引吐蕃暴我郊甸天舍其哀吐蕃敗北回紇悔懼叩顙乞和非天子恤舊功則隻輪不得出塞下孰為失信者回紇大慙回紇禮昕遣使者約和喻國威信婁師徳上元初為監察御史㑹吐蕃盗邊師徳奉使収敗亡於洮河因使吐蕃其首領論賛婆等自赤嶺操牛酒迎勞師徳喻國威信開陳利害虜為畏恱兄弟優劣李義琰使髙麗不拜及義琛再使亦坐召之義琛匍匐拜伏時人由是見兄弟優劣口伐鄭元璹口伐可汗有專對材犬戎請和上問能使絶域者君以竒表有專對材膺選劉禹錫吕温集序白孔六帖卷三十五
