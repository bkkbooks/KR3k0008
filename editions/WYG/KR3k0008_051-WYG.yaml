body:
  text: 白孔六帖卷五十一唐白居易原本宋孔傳續撰大將一偏將二威名將三儒學將四宗族從軍五軍旅六出征七發軍八祭師九接戰十軍政令十一大將一白上將軍處右晉謀元帥用郤縠傳晉侯作三軍謀元帥趙衰曰郤縠説禮樂而敦詩書乃用郤縠將中軍予王之爪牙握兵之要帥師者受命於廟受脤於社傳建牙設壇而拜漢髙祖擇日齊戒設壇場具禮拜韓信為大將軍鑿凶門授鉞孫呉之法韓彭之功位列四七軍盈十萬衞霍寄重旌分閫外之憂杖節天下危注意於將陸賈曰將軍忘家推轂漢書王者遣將跪而推轂曰自閫以外將軍制之握兵權方召之材方叔召虎啓什伍之行列四七之任禮什伍部曲也幕府衞青以幕為府轅門以車轅為門三公之上後漢和帝以竇武為大將軍位在三公之上不趨不名大將軍入朝不趨劒履上殿讃奏不名式是百辟辭第霍去病為嫖姚將軍上為治第辭曰匈奴未滅臣無以家為絶席漢王常為大將軍與諸將絶席尚左禮記軍尚左注左陽也陽主生將軍有決勝之䇿左將軍為上貴不敗績也赳赳武夫公侯干城詩時維鷹揚詩尚父也元戎君子聽鼓鼙則思將帥之臣禮命為軍師師之耳目在吾旗鼓言三軍視大將旗鼓以進退也帥賤人慢之懼不用命焉楚昭王問帥子轂曰右尹羌車與左史老皆可用也子髙云云使仁者佐賢者穀梁晉殺陽處父君漏言也晉將與狄戰使狐夜姑將中軍趙盾佐之處父曰古者使仁者佐賢者今趙盾賢夜姑仁其不可乎公語夜姑夜姑遂殺處父請美田宅秦使王翦將兵十萬伐荆翦請美田宅至關又使請善田或曰將軍乞貸亦甚也翦曰今空國甲士委我請子孫業以自堅爾竟虜荆王斬君使之右史田穰苴為大將軍將斬莊賈景公使馳救穰苴問軍吏曰馳三軍如何曰當斬穰苴曰君使不可戮乃戮僕車之右斬諫者趙使趙奢救韓堅壁不戰秦兵鼓譟屋瓦皆振有軍候一人言急救立斬之後云云奢賜號馬服殺妻呉起為魯將齊攻魯起妻齊女魯疑之起乃殺妻明不與齊也將將將兵韓信謂漢髙曰陛下不善將兵而善將將細栁周亞夫軍細栁文帝勞軍出曰真將軍也用軍市之租饗士馮唐曰李牧居邊軍市之租皆自用饗士賞賜決於外不從中覆故得盡其知能軍行無部曲行陣李廣擊胡軍行無部曲行陣就善水草頓舍不擊刁斗自衞幕府省文書然逺斥候未嘗遇害治軍簿至明程不識與李廣俱擊胡正部曲行伍营陣刁斗自衞軍簿至明士多樂廣而惡不識全師保勝趙充國行必戰備止必堅壁全師保勝自舉漢降羌犯塞上使丙吉問趙充國將充國曰無踰老臣山西出將漢書贊曰秦漢以來山東出相山西出將探簡後漢鄧禹表張宗為偏將軍赤眉大至禹欲就堅城衆人憚為後拒禹書諸將名於竹簡亂著笥中各令探之宗不肯曰死生有命豈辭難就逸戰拒却赤眉軍陣立成後漢耿秉伯初擊匈奴封美陽侯簡易於事休止不結營部然斥候有警急軍陣立成拜井水出耿恭伯宗匈奴攻踈勒城絶澗水城中穿井不得恭向井拜泉湧出善待卒而驕士大夫蜀志闗侯善待卒而驕士大夫張飛愛敬君子而不恤小人手不能書蜀志王平字必均長戎旅間手不能書所識不過千字愛作書論説史漢不失其指遵守法度而無戲謔舉兄子為將晉謝𤣥字幼度為叔父安所器苻堅南伐朝廷舉文武良將安乃舉𤣥竟敗堅晉國謀帥推郤縠之敦詩漢朝論將美祭遵之用儒王師有征利用禦冦軍帥不武何以即戎敦詩説禮誠趙衰之知言使仁佐賢乃處父之善對求用馬援為伏波將軍求用上哀其老未許援曰臣雖老尚能被甲上馬帝試之援據鞍顧盻以示可用上笑曰矍鑠哉是翁也彊禦中行穆子曰吾軍師彊禦卒乘競勸易將史記秦趙相拒亷頗堅壁不戰趙王信間諜令趙括為將代頗藺相如曰王以名使人若膠柱鼓瑟括徒讀父書不知合變後果敗又趙良將李牧常居雁門備匈奴匈奴每至輒入保不戰匈奴趙兵皆以牧為怯趙王怒使他人代將數出戰不利復請牧牧如前竟大破匈奴聽童謡命將吴有童謡曰阿童阿童衘刀浮渡江不畏岸上虎但畏水中龍羊祜求其名應者㑹王濬小字阿童才又可用祜因表為龍驤將軍備舟楫將失一言而軍敗死王過一言而國亡危命將以黼冕晉以黼冕命王㑹將中軍為太傅弓彎似月禦侮之寄尤深劍利如霜干城之任斯重早陪蘭錡應知軍政之嚴夙揔戎麾頗識兵樞之要孔征伐専委將帥白居易帝詔吐突承璀率師出討居易諫唐家制度每征伐専委將帥責成功比年始以中人為都監韓全義討淮西賈良國監之髙崇文討蜀劉正亮監之自興天下兵未有以中人専統領者方時多虞握兵處外郭子儀事上誠御下恕賞罰必信遭幸臣魚朝恩程元振短毁方時多虞握兵處外然詔至即日就道無纎芥顧望故讒間不行中人為制將居易諌曰即承璀為制將四方聞之恐􅁿朝廷後世且傳中人為制將自陛下始陛下忍受此名哉以智為本魏元忠曰周亞夫堅壁以挫吴楚司馬懿閉營而困諸葛此皆全軍制勝不戰而郤敵是知大將臨戎以智為本今之用人類將家子或死事孤兒進非幹畧雖竭力盡誠不免為敗若之何用之臨軒授鉞渾瑊為奉天行營副元帥帝臨軒授鉞用漢拜韓信故事疑者不使使者不疑陸贄云凡任將帥疑者不使使者不疑勞神於拔選端拱於委任蕭復嘗言艱難以來始用宦者監軍權望大重此曹止可委宫掖事兵要政機勿使參領帝不聽王晙贊唐所以能威振夷荒斥大封域亦有虎臣為之牙距也至師行數千萬里窮討殊鬭獵取其國如鹿豕然可謂選值其才歟陸贄曰今將之號令不能行之軍國之典刑不能施之將上下相養以茍嵗時欲褒一有功慮無功者怨嫌疑而不賞欲責一有罪畏同惡者竦隠忍而不誅故忘身效節者抵譟於衆僨軍緩救者蓄奸不畏先求易制者今陛下命帥先求易制者多其部使力分􅁿其任使心弱由是分閫責成之義廢死綏任咎之志衰二帥連營韋貫之初討蔡以宣武韓𢎞為都統又詔河陽烏重𦙍忠武李光顔合兵以進貫之諌諸將戰方力今若置都統又令二帥連營則各持重養威未可歳月下也亦不從斬長蛇殪封豕李希烈陷汝州詔拜哥舒曜東都汝州行營節度使帝召見問曰卿治兵孰與父賢對曰先臣安敢比但斬長蛇殪封豕然後待罪私室臣之願也帝曰爾父昔在開元時朝廷無西憂今朕得卿亦不東慮御勤政樓引榮王受命安禄山反榮王為元帥東討帝御勤政樓引榮王受命蠻貊不庭擢校為將魏元忠上封事云身不臨邊陸贄帥臣身不臨邊而以偏師戍守大抵士之犀鋭悉選以自奉委疲羸者以守要衝冦至而不支則刼執芟蹂恣所欲得比都府聞之虜已旋返治兵若此斯可謂措置乖方矣風前畧横陣我愛李侍中摽摽七尺長白羽八札弓陛壓緑檀槍風前畧横陣紫髯分兩傍淮西萬虎士怒目不敢當杜牧郡齋獨酌萬夫之特勉作萬夫之特田克制塞䕶長榆塞䕶長榆兵分細栁梁榮幹制雷泉之靈太白之精雷泉之靈膺家之禎為時而生張説郭元振碑風雲動色貙兕作威風雲動色齋壇命信靈旗指越文粹缺郤縠之詩書文粹臣繆寄台司幸當統帥乏吉甫之文武缺郤縠之詩書此皆諸將協心羣帥宣力破朱泚露布于公異假陸遜之鉞拜韓信之壇段文昌淮西碑莫重謀帥賛皇一品集賜劉沔詔意自古出師莫重謀帥故李廣威動殊鄰吴漢隠如敵國偏將二白偏將軍處左職佐中軍禆佐禆將記曰軍尚左見大將門注卒尚右右陰也陰主殺卒之行位以右為上示有死志别屯専殺後漢竇固出擊匈奴騎都尉秦彭為副彭在别屯輒以法斬人固奏曰秦彭専擅請誅之朝議皆然郭躬仲孫獨曰於法彭得帝曰當一統於督彭無斧鉞何以得躬曰在部曲則不得彭今専軍别將且漢制棨㦸則為斧鉞帝乃從之不受節度晉命王濬伐吴受王渾節度濬乘勝順流遂不詣渾渾表濬違詔不受節度誣罪之有司遂按濬檻車徴帝不許請不置偏將馮奉世子明討羌請益兵上為發六萬人太常任千秋將以助焉奉世以得其衆不須復煩將上讓之曰大將軍出必有偏將軍何煩焉孔偏將尉遲恭劉武周亂以為偏將與宋金剛南侵得晉澮等州范陽禆將劉怦少為范陽禆將禆將羅𢎞信為禆將主馬牧偏禆李全畧事王武俊為偏禆解所佩劍贈之李光顔為禆將節度使馬燧謂曰若有竒相終必光大解所佩劍贈之積功勞至節度使杜希全以禆將𨽻郭子儀積功勞至朔方節度使位不過禆將李晟世以武力仕然位不過禆將待之加禮韓滉初判度攴李晟以禆將白軍事滉待之加禮使其子拜之厚遺器幣鞍馬後晟終立大功官秩猶卑贊皇一品集賜劉沔詔意聞王逢頗有武用又縁偏禆日近官秩猶卑指揮諸軍即未為稱重戎事而肅王命一品集李丕充攻討副使晉謀元帥則有佐軍漢制出師皆立副貳所以重戎事而肅王命也得具嚴之稱同上淬其智刃研未兆之機森其禮干得具嚴之稱李勣之敗平壤參以道宗李靖之襲陰山副之公謹自古出師皆有副貳臨難則權以相濟料敵則智以相資故韓信伐趙張耳為貳吳漢征蜀劉向副軍國朝以來長用此制李勣之敗平壤參以道宗李靖之襲陰山副之公謹儻能坐覆妖巢亦自歸功元帥賜劉彦佐詔意厚以幣招之王䖍休刺史李深署為禆將澤潞李抱真聞其名厚以幣招之身先士卒五代烏震少事王鎔以功遷禆校𨽻符習軍鎔為張文禮所弑震從習討文禮而家在趙文禮執震母妻及十餘人以招震震不顧文禮乃皆斷其手鼻震一慟而止憤激自厲身先士卒晉軍攻破鎮州以功拜刺史王周事唐莊宗明宗為禆將以力戰有功拜刺史威名將三老將附白得臣猶在憂未艾也晉敗楚于城濮晉侯猶有憂色曰得臣猶在憂未艾也子玉將則文公側席而坐漢書管夷吾所居國重史記鮑子云藺相如曰彊秦不敢加兵以吾兩人也兩人亷頗藺相如也若一敵國漢書曰周亞夫為大將得劇孟喜曰若一敵國也鮮卑不敢南近塞後漢鄧訓遷烏桓校尉萬人敵蜀志張飛雄壯威猛亞闗侯魏謀臣程昱等咸稱飛侯萬人敵周訪有平河洛志善撫納士皆為死王敦有不臣之心終訪之世不敢為非晉何武上書忠臣社稷之衞魯以季友治亂楚以子玉􅁿重魏以無忌折衝項以范增存亡故楚國帶甲百萬於國不以為難子玉將則晉文公側席而坐及死君臣相賀百萬不如一賢也頗牧之名亷頗李牧射偶人郅都為雁門守匈奴不近雁門匈奴為偶人象都令騎射莫能中之見憚如此也充國擊羌羌人相謂曰汝無反天子遣趙將軍年八九十善於兵法孔來嚼鐵來瑱賊懼目為來嚼鐵羌畏不敢􅅥息辛雲京回紇入朝所在暴鈔至太原雲京以戎狄待之羌畏不敢􅅥息有大畧李光弼嚴毅沈果有大畧幼不嬉弄善騎射四鄰畏威田洪正數上表固請留闕下帝勞曰昨韓𢎞以疾辭不就軍朕既從之今卿復爾我不應違但魏人樂卿之政四鄰畏卿之威為朕長城又安用辭察軍中素恣横者三百人斬之汴自劉士寧以來軍益驕韓𢎞察軍中素恣横者三百人斬之流血丹道𢎞言笑自如自是訖𢎞去無一人敢肆者突厥下馬羅拜薛仁貴檢校代州都督率兵擊突厥元珍於雲州突厥問曰唐將為誰曰薛仁貴突厥曰吾聞薛將軍流象州死矣安得復生仁貴脱兠鍪見之突厥相視失色下馬羅拜且遁去威震北方馬燧憚威拜城上賊將徐庭光守長春宫城燧度長春不下乃挺身至城下見庭光庭光憚威拜城上王式初交趾數有變懼式威不自安譁曰黄頭軍將渡海襲我矣相率抗黄頭軍式翌日盡捕斬之羌道其名以怖啼兒郝玼為原州刺史自是羌不敢過臨涇玼在邊積三十年每討賊不持糗粮取之於敵獲羌必刳剔而歸其屍羌大畏道其名以怖啼兒軍中指顧諸將不敢仰視李光弼治師訓整天下服其威名軍中指顧諸將不敢仰視見者重足股栗竇軌從討王世充明年還蜀既貴益嚴酷然能自勤苦每出師臨敵身未嘗解甲其下有不用命即誅至小過亦鞭箠流血人見者皆重足股栗由是蜀盜悉平回鶻不敢仰視王鍔為河中節度使㑹回鶻入朝鍔欲示威武乃悉軍迎廷列五十里旗幟鮮明戈鎧犀宻回鶻恐不敢仰視鍔偃然受其禮帝聞嘉之宿將髙固拜邠寧節度使固本宿將且寛厚人皆安之威令肅然李景畧拜豐州刺史天徳軍西受降城都防禦使儲廪器械畢具威令肅然回紇畏之威震闗中郭子儀六軍將張知節迎子儀洛南大閱兵屯商州威震闗中一軍皆震路嗣恭為郭子儀朔方節度留後大將孫守亮擁重兵驕蹇不受制嗣恭因稱疾守亮至即殺之一軍皆震戎夷畏憚郭知運屯西方戎夷畏憚與王君㚟功名畧等時號王郭當世號為名將王忠嗣蕃戎不敢入寇劉澭拜秦州刺史蕃戎畏懾不敢入寇望風送欵李聽帝討李師道出聽楚州刺史淮南兵綿弱鄆人素易之聽自整勒士卒皆懐其仁東海悉望風送欵唐明宗李嗣源號李横衝名重四方五代唐本紀臨敵御衆肅然有將帥之威左右馳驟疾若風雨晉人望其行陣齊整相謂曰謝彦章必在此也其名重敵中如此五代謝彦章真神將太祖以寇彦卿為都排陣使使乘烏馳突陣前因目之曰真神將也氣貌偉特時謂熊虎相感慕節義有古人風其御下肅壹吏人畏愛王晙軍中為之股栗史洪肇為將嚴毅寡言麾下嘗少忤意立以殺之軍中為之股栗精誠發而石開忠志作而虹貫授河清朝左衞將軍制漢用駱甲則灌嬰傅于騎將魏得闗侯則張遼挾以前驅故能挫强楚之鋒鋩取顔良于麾盖同上名盖一時唐史臣稱馬燧喜得虓將帝謂薛仁貴曰朕舊將皆老欲擢驍勇付閫外事莫如卿者朕不喜得遼東喜得虓將儒學將四白晉謀元帥趙衰曰郤縠可也説禮樂而敦詩書傳帷中講論後漢張奐為匈奴中郎將烏桓叛燒軍門奐坐帷中與弟子講論若無事衆稍安雅歌投壺祭遵為將軍奏置五經博士大夫軍中與諸生雅歌投壺選將用儒士也愛樂儒士魏志張郃武將而愛樂儒士嘗薦同郡王湛言經明也手不釋卷吳志魯肅為將手不釋卷勸將學問孫權謂吕蒙蔣欽曰宜學問自開益蒙曰軍中日苦多務不及讀書權曰孤豈欲卿治經為博士耶但令涉獵見往事爾蒙始就學雖舊儒不及漢書儒林傳序曰明帝正坐自講諸儒執經問難於前又别立校舍自期門羽林之士悉令通孝經章句論説史漢見大將門不跨馬杜預字元凱身不跨馬射不穿札居將帥之列有功後漢盧植子幹初在東觀校書續漢記後拜北平中郎將持節䕶烏桓連戰皆㨗破賊有功隠几孔融為北海相袁譚攻之流矢雨集融隠几讀書言笑自若城陷奔東山妻子為譚所虜合之以文齊之以武内脩文徳良資羽翼之才外拓遐方必藉爪牙之器孔畧知書來瑱畧知書尚名節多所該究封常清外祖教之讀書多所該究居處服玩如儒先生韓充雖將家性節儉厯三鎮居處服玩如儒先生起樓聚書田洪正性忠厚好功名起樓聚書萬餘卷通春秋左氏與賔屬講論終日客為著沂公史例行於世儒知兵唐璿以儒者號知兵自碣石踰四鎮其間綿地幾萬里山川夷阻障塞之要皆能言之故行師料敵未嘗敗脩史即軍中論譔張説授并州長史兼天平軍大使脩國史勑賫藁即軍中論譔率兵南巡宣布天子恩意李靖授嶺南撫慰大使以嶺南陋逺久不見徳非震威武示禮義則無以變風即率兵南巡所過問疾苦延見長老宣布天子㤙意逺近懽服自稱儒者王鍔嘗讀春秋自稱儒者士頗笑之通春秋漢書渾瑊通春秋漢書嘗慕司馬遷自叙著行紀一篇頗牧在禁署畢諴召入翰林為學士党項擾河西宣宗嘗召訪邊事諴援質古今條破羌狀甚悉帝悦曰吾將擇能帥者孰謂頗牧在吾禁署中卿為朕行乎諴唯唯即拜刑部侍郎出為邠寧節度河西供軍安撫使儒者之勇鄭畋遷西面行營都統巢大懼不敢西謀當此時微畋天子幾殆帝聞㨗曰朕知畋不盡儒者之勇乃爾提鼓揮桴臨難決疑此將事也一劍之任非將事也謹按諸葛亮臨戎不親行陣頓蜀兵於渭南宣王持鋭卒不敢當此豈弓矢之用也薛登唐休璟授易於馬嘉運傳禮於賈公彦本傳謝艾書生也破麻秋勁鋭之卒文粹陸長源書儒者契丹攻陷平州得張希崇知其儒者也婁師徳第進士調江都尉募猛士討吐蕃乃自奮戴紅抹額來應詔本傳烏震少好學通左氏春秋喜作詩善書五代文吏為將李林甫疾儒臣以方畧即邊勞且大任欲杜其本以久已權即説帝曰以陛下雄才國家富彊而夷狄未滅者繇文吏為將憚矢石不身先不如用蕃將彼生而雄養馬上長行陣天性然也若陛下感而用之使必死夷狄不足圖也帝然之李光弼贊光弼好讀班固漢書異夫庸人武夫者涉書史劉澭涉書史有材武不樂軍旅田廷玠尚儒學不樂軍旅退讓如諸生史孝章父憲誠以戰力奮孝章獨退讓如諸生稱道皆詩書通書習戎事張仲武范陽人通左氏春秋仲武遣其屬吳仲舒入朝請以兵擊回鶻徳裕因問北方事仲舒曰仲武舊將張光朝子年五十餘通書習戎事居軍中嘗儒服五代謝彦章為將好禮儒士雖居軍中嘗儒服以禮法自矜李晟子憲與愬長喜儒以禮法自矜通左氏春秋張希崇少好學通左氏春秋劉守光不喜儒士希崇因事軍中為偏將五代史身見儒士曹華始從宣武軍為兖海節度使兖自李正已盜齊魯俗益汙驁華下令曰鄒魯禮義鄉不可忘本乃身見儒士春秋祀孔子祠立學官講誦斥家貲佐贍給人乃知教成就諸生仕諸朝華出戎伍而動必由禮用春秋戰法房琯平賊乘髙伐鼓賊不測衆寡鄭畋為西面行營都統賊將王璠率衆三萬來攻畋使𢎞夫設伏以待殺賊二萬級積尸數十里璠遁去宗族從軍五白子弟從軍蕭何遣宗族子弟從軍侍漢王後漢耿純字伯山率宗族賔客三千人從世祖恐賔客等有異心乃燒其廬舍以絶反顧之望舉宗陳力魏志韋成宗族三千人家居乗氏請從魏郡太祖曰卿欲慕耿純耶謝曰臣功微寵過舉宗陳力今征伐未息宜實郊隧非敢望純云云臧覇率子弟請收族屬詣鄴孔史敬奉甥姪部曲二百人每出輒分隊為四五隨水草數日不相知及相遇已皆有獲逆羌㝠寞隨煙燼卿家兄弟功名震杜甫惜别行深誠補王室戮力自元昆紛然喪亂際見此忠孝門蜀中寇亦甚栢氏功彌存深誠補王室戮力自元昆杜覽栢中允并子姪數人除官詩同心注師律灑血在戎軒子弟光卒伍芝蘭疊璵璠同心注師律灑血在戎軒同上年十一善騎射渾瑊父釋之有材武從朔方軍瑊年十一善騎射隨釋之防秋朔方節度使張齊邱戲曰與乳媪俱來邪是嵗立跳盪功請以子率奴馬從軍兵志郭子儀之壻端王傳吳仲孺殖貲累巨萬聞國家有急不自安請以子率奴馬從軍徳宗喜甚為官其子五品家出子弟馬奴裝鎧助征白志貞乃請節度都團練觀察使與世嘗任者家皆出子弟奴馬裝鎧助征授官如仲孺子於是豪富者緣為幸而貧者苦之同上軍旅六白軍旅鈇鉞者先王所以飾怒也禮師出以律否臧凶易師貞丈人吉无咎易軍旅之事未之學也孔子對衞靈公建侯行師易同邦國周禮宗伯以軍禮同邦國制軍詰禁以糾邦國周禮大司馬挈壺氏掌挈壺以令軍井壺以盛飲故以表井軍事懸壺以序聚􅈀懸壺為漏以次更序聚􅈀備守以兩木相擊行夜聽師田以簡稽周禮稽計也簡閱也挈轡以令舎轡所以駕故以表舍凡軍旅夜鼓鼜鼜夜戒守司馬法昬鼓四通為鼜牙璋中璋以起軍旅以治兵守注二璋皆有鉏牙之飾於琰則先言牙璋有文飾也若今之銅虎符挈畚以令粮畚盛粮器記曰軍旅思險隠情以虞思度己之所能以度彼能否也介胄有不可犯之色孝悌脩軍旅衆以義死之而不可犯也師在制命命由己制也傳勤王之師成師以出五材廢一不可誰能去兵兵所以威不軌而昭文徳聖人以興湯武亂人以廢桀紂彊禦中行穆子曰吾軍師彊禦卒乗競勸允當軍志曰允當則歸也拜賜之役秦孟明也中權後勁勁兵殿而中軍制謀兵事以嚴終不土其地不分其民穀梁云南北軍材官七校漢刑法志髙祖踵秦而置材官於郡國京師有南北軍軍屯武帝内脩七校不常置也勞逸相待蜀志陸􅈘曰兵家之術以力相疲勞逸相待愛力惜費以待卻敵之用六十不以戎服禮鋪敦淮夷仍執醜虜注敦當作屯屯其兵於淮水大防之上詩常武召穆公美宣王有常徳以立武事匪紹匪逰徐方繹騷箋云軍行三十里非懈緩也非遨逰也孔娘子軍平陽昭公主下嫁柴紹帝渡河紹以數百騎並南山來迎主引精兵萬人與秦王㑹渭北紹及主對置幕府分定京師號娘子軍陳子昂上言言軍旅之弊斥虛名韓充轉大將軍斥軍士虚名不如令者七百人兵至五萬王鍔為河中節度使徙河東河東自范希朝討鎮無功兵纔三萬騎六百府庫殘耗鍔能補完嗇費未幾兵至五萬騎五千財用豐餘請罷二十萬還農張説故時邉鎮兵贏六十萬説以時平無所事請罷二十萬還農天下以為疑説曰邉兵雖廣諸將自衞營私爾所以制敵不在衆也以陛下之明四夷畏威不慮減兵而招寇臣請以闔門百指為保帝乃可禁兵寡少段秀實嘗以禁兵寡弱不足備非常言於帝曰古者天子曰萬乗諸侯曰千乗大夫曰百乗盖以大制小以十制一今外有不廷之虜内有梗命之臣而禁兵寡少卒有患難何以待之且猛虎所以百獸畏者為爪牙也若去之則犬彘馬牛皆能為敵帝不用及涇卒亂召神䇿六軍無一人至者世多其謀願充一卒効力王事李邕貶遵化尉妻温復為邕請戍邉自贖曰妾願使邕得充一卒效力王事膏塗朔邉骨糞沙壤成邕夙心表入不省魏府牙軍羅紹威嗣父節度驕悍難制時語曰長安天子魏府牙軍言勢彊也鴉兒黄巢陷京師陳敬瑄遣黄頭軍部將李鋋鞏成以兵萬五千屯興平數敗巢軍賊號蜀兵為鴉兒每戰輒戒曰毋與鴉兒鬭衞兵皆長安髙貲黄巢傳帝餞田令孜章信門賚遺豐優然衞兵皆長安髙貲世籍兩軍得廪賜侈服怒馬以詫權豪初不知戰聞科選皆哀哭千家陰出資顧販區病坊以備行陣不能持兵觀者寒毛以慄林㑹山立星羅翼舒杜牧尚漢美制蛇矛犀渠之士獨孤及祭纛文虎牙鷹揚之臣蛇矛犀渠之士一旅之師元稹代諭淮西書以一旅之師抗天下無窮之衆雖妾婦騃孩猶知笑之而況於義夫壯士哉王卒嶷嶷熊羆是式銜勇韜力自思奮殛栁宗元詩精騎練卒陸贄奏議代朔邠靈之騎士自昔之精騎也上黨盟津之步卒當今之練卒也唐兵三變其始盛時有府兵府兵後廢而為彍騎彍騎又廢而方鎮之兵盛矣及其末也强臣悍將兵布天下而天子亦自置兵於京師曰禁軍其後天子弱方鎮强而唐遂以亡滅者措置之勢使然也唐兵志府兵之制起自西魏後周而備於隋唐興因之隋制十二衞曰翊衞曰驍騎衞曰武衞曰屯衞曰禦衞曰侯衞為左右皆有將軍以分統諸府之兵同上又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅同上太宗貞觀十年諸府揔曰折衝府凡天下十道置府六百三十四皆有名號而闗内二百六十有一皆以𨽻諸衞同上凡府三等兵千二百人為上千人為中八百人為下同上府置折衝都尉左右果毅都尉各一人長史兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長同上凡民年二十為兵六十免同上烈烈王者師熊螭以為徒栁宗元鼓吹曲出征七白夫子有三軍之事兩軍之士皆未憗憗缺也以征不義詰誅暴慢深入長驅掃攙搶戮鯨鯢奉辭伐罪受命忘家司馬穰苴曰受命之日則忘其家臨敵則忘其身乗王怒行天誅硌滅有扈而夏功昭成克商奄而周徳著成王四征不庭震揚黄鉞之威以遏亂畧王于興師觀兵示威専征伐諸侯賜彤弓然後専征伐君命大事大事謂軍事陳師鞠旅以王命討不庭正之體也國之大事在祀與戎奄征于兵者以威不軌殷湯始伐猶有慙徳有征無戰王者之師歌采薇以遣之周文王遣將帥之臣周公三年東征宣王六月北伐薄伐于征凡軍行祓社禱社也逺征親討耀武多壘七伐一戎示衆肅將天威恭行天罰徂征攻昧我武惟揚取彼凶殘方叔南征荆蠻詩人歌之列于雅充國西伐先零詞臣美之著於贊即戎大司馬以九伐之法征邦國周禮鐘鼓之伐有鐘鼓曰伐傳例揚軍旅周禮自天子出天下有道則禮樂征伐自天子出師必有名隨善惡為名也翦伐即戎而行遣以采薇之咏擇利而動收其破竹之功武人東征不遑朝矣戎車嘽嘽如霆如雷奮伐荆楚赫赫南仲薄伐西戎賊賢害民則伐之負固不服則侵之侵謂兵至境而已遣將授節晉禮志曰漢魏故事遣將出征授節鉞於朝後荀顗等定新禮遣將御臨軒尚書授節鉞依古兵法跪而推轂之義也受律以出濯征仇方濯大也建侯行師易伐國不問仁人魯君問栁下恵吾欲伐齊對曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉討其不庭伐以昏徳叛而不討何以示威服而不柔何以示懐武先禁暴師克在和因山川以設險整干戈而作威九黎之亂徳黄帝興師三苖之不舉虞舜稱兵疆埸無主則啟戎心孔平淮西裴度平淮西及行上御通化門臨遣賜通天御帶發神䇿騎三百為衞命將興師以討四方陸贄上書云天子無親將吐蕃盜邉帝怒欲自將討平之蘇頲上言古天子無親將惟黄帝五十二戰當未平之時自阪泉功成則脩身閑居無為無事陛下撥定禍亂方當深視髙居制禮作樂禪梁父登崆峒何至厭天居衽金革為一日之敵哉每戰必為先鋒李嗣業每戰必為先鋒所嚮逐北跳盪先鋒從平石國及突馳施以跳盪先鋒加特進裂帛繫書喻以禍福椎牛饗士養以威聲謝赴行營表劉禹錫集指麾而貙兕作威感激而風雲動色遂先登進擊深入合攻七擒連發而星馳兩翼旁張而雲合于公異乗斗杓而誓旅出星門而杖鉞楊炯少姨廟碑涼風至司馬於是乎陳兵太白髙將軍於是乎宜戰云云順天行討正在今日賜王元逵詔清商已至鼙鼓聲雄白露將凝戈鋋色耀飛隼應節而逾厲代馬嘶風而自豪順天行討正在今日刻期深入屢挫狂鋒批亢擣虛遵欵㳺刃永言勲勣豈忘予懐一品集賜石雄及三軍誓不與賊偕存裴度困獸當猛虎窮魚餌犇鯨李白古風凡大將出征皆告廟授斧鉞辭太公廟辭訖不返宿於家六典發軍八白周禮八成二曰聽師田以簡稽計合士卒簡閱兵器為要簿也牙璋中璋以起軍旅以治兵守見上軍旅門有發則命大司徒教士以車甲發卒兵也王制傳曰司馬請瑞焉瑞符節以發兵髙祖曰吾以羽檄徵天下兵未有至者檄木長三尺用徵召急則揷以鳥羽示急也以節發兵漢武曰吾新即位不欲出虎符恐驚吾郡國廼遣嚴助以節發㑹稽兵㑹稽守欲拒法不發注言欲以法拒之為無符驗助乃斬一司馬諭以意㫖遂發兵也頭鬢白後漢光武每發一兵頭鬢皆白吳漢行師朝受詔夕引道老弱漢王在滎陽蕭何發闗中老弱未傅者悉赴軍注云古者二十而傳音附傅發針工史尉佗攻百越上書求女無夫家者三萬人為卒補衣秦皇帝可其萬五千人故百姓離心欲亂者十七八也請監軍後漢馮緄鴻臚卿討武陵蠻性烈直不行賄賂懼為所中乃上䟽請中常侍一人監財費朱穆奏緄以財自嫌失大臣節有詔勿劾擅飾城門官舍稽乏軍興檻車徵以侯贖晉石鑒奏杜元凱為校尉云云漢黄覇為京兆尹發騎士詣北軍以馬不適士劾乏軍興連貶秩注馬少士多不相補滿也適音的具其卒乗繕以甲兵孔陸贄曰今財匱于中人勞未瘳而欲發師徒以犯獵寇境復其侵疆攻其堅城前有勝負未必之虞後有餽運不繼之患萬一撓敗適以硌戎心而挫國威也兵甲歳興陳子昂八科曰今事之最大者患兵甲歳興賦役不省興師十萬則百萬之家不得安業魏徵曰比無事興兵問罪逺裔發自光福里第王式寧國劇賊仇甫亂明越觀察使鄭祗徳不能討宰相選式往代詔可因至京師懿宗問方畧對曰第假臣兵冦不足平也左右宦要皆曰兵衆則餽多當惜天下費式奏盜若猖狂天誅不亟決東南征賦闕矣寧得以億萬計之乎兵多則功速費寡二者孰利帝顧左右曰宜與兵於是詔益許滑淮南兵式發自光福里第麾幟皆東靡獵獵有聲喜曰是謂得天時矣承命於牙旗之下分麾於轅門之外文粹于公異破朱泚露布五月二十八日寅時華州鎮國軍節度使駱元光等承命於牙旗之下分麾於轅門之外將士等超乗賈勇免胄啓行夾川陸而左旋右抽抵邱陵而浸淫布濩聲塞宇宙氣雄鉦鼓陳兵於光泰門外盡鋭於神䴥倉東繚垣摧以成塵滋水涸而為地左廣未離於舊壘前偏已交於賊鋒若降於天如出於地祭師九白周禮太師設軍社類乎上帝太祝宜乎社造乎禰師將行也記曰天子將出類乎上帝帝五徳之帝類宜造皆祭名受命於祖禡於所征之地告祖也受成於學定兵謀也出征執有罪反釋奠於學以訊馘告桓桓講武是類是禡類禡皆師祭也祭蚩尤漢髙為沛公祠黄帝祭蚩尤於沛庭而釁鼓孔葛水沈祭王方翼次葛水暴漲師不可渡沈祭以禱既禡既類于社是宜栁宗元平淮夷雅假神祗之幽贊文粹禡牙饗社假神祗之幽贊破朱泚露布于公異五將䕶野萬靈並轂獨孤及祭纛文惟神降𠂻尚弼予志敢告無靡旗無絓驂無汰輈無僨車命五將䕶野萬靈並轂令天地氛祲望風掃除魑魅魍魎罔不率俾莫我敢遏為神祗羞斬馬祭旄纛韓愈聮句澧有大特化為巨梓秦人慿神乃建茸頭是為兵主用以行師栁宗元祭纛文禡纛黄堂前康承訓崔彦曾乃禡纛黄堂前選兵三千授都虞候元宻屯任山須龎勛至刼取之本傳接戰十白張吾三軍皆陣曰戰連百萬之衆戰必勝攻必取韓信忘身司馬穰苴曰援桴鼓之急則忘其身鼓譟而進一戰而覇左旋右抽唯敵是求左輪朱殷兵深也鬭志鬭心先人有奪人之心軍之善謀夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈神怒人怨見可而進擐甲執兵固即死也躬擐甲胄親授矢石脩陣固列日尋干戈敦陣整旅為魚麗之陣被堅執鋭八陣勍敵鋭師率是熊羆整斯鵝鸛鵝鸛陣名也傳曰鄭偏願為鸛其御願為鵝我伐用張稱爾戈比爾干立爾矛六伐七伐伐擊刺也六步七步書曰今日之事不愆于六步七步乃止齊焉其旅若林紂合圍旝動而鼓旝大將之旗鼓儳傳曰鼓儳可也言敵人在儳嵒險處未成列可鼓而擊之也元戎十乗以先啓行嘗寇嘗試也我戰則克孔子云堂堂之陣赳赳之夫率烏合之師列魚麗之陣彼見吾貌必有懼心貌軍容也玉石俱焚靡旌摩壘執燧象以奔吳師楚昭王敗伯舉也驅畫牛以觸燕衆田單守即墨轍亂旗靡傳曹劌曰吾視其轍亂望其旗靡故逐之也曵柴偽遁武不違敵左實右偽右以衣物為人形乗勝逐北斬將搴旗方蒙矢石漢王矯翦控弦刑法志曰齊愍以矯翦控弦得一首以賜金君未知戰宋襄公不鼓不成列獲則取之明恥教戰求殺敵也交綏而退陷陣却敵前蒙矢石刻日戰羊祜事見示信門夜戰其聲相聞足以相救晝戰其目相視足以相識翦滅兩軍之士皆未憗憗缺也傳決勝運籌中權後勁孔挾矛駷馬王難得為河源軍使吐蕃賛子郎支都者恃趫敏乗名馬寶鈿鞍畧陣挑戰甚閑暇無敢校者難得怒挾矛駷馬馳支都不暇鬭直斬其首明皇壯其果召見令殿前乗馬挾矛作刺賊狀帝大悦賜錦袍金帶陸贄曰以水草為居討獵為生便於馳突不恥敗亡此戎狄所長中國之短也而欲益兵蒐乗争驅角力交鋒原野之上決命尋常之間以此禦寇可謂勉所短而校其長矣車騎挑戰程千里傳賊將蔡希徳圍上黨較騎挑戰千里恃勇開縣門率百騎欲直禽希徳幾得而救至將數騎突入賊中李光顔元和九年討蔡明年大破賊時曲初賊晨壓其營以陣衆不得出光顔毁其柵將數騎突入敵中反往一再衆識光顔矢集其身如蝟手攬馬鞅諫無深入光顔挺刃叱之於是士争奮賊乃潰北馬燧贊曰燧每戰親令於衆無不感慨用命鬭必決死未嘗折北名盖一時郭子儀安禄山反賊陷常山㑹李光弼攻賊常山拔之子儀引軍下井陘與光弼合破賊禄山益出精兵佐思明子儀曰彼恃加兵必易我易我心不固戰則克矣與戰未決戮一步將以狥士殊死鬭遂破之掃境以來利速戰楊行宻太順二年孫儒屯漂水俄而田頵劉威為儒所敗行宻欲守銅官李神福曰儒掃境以來利速戰宜堅壁老其師則我無敵矣又出􅁿騎絕賊粮道使前不得戰退無仰儲不亡何待於是行宻以神福為宣地都逰奕使勒大將教戰各出其意張巡用兵未嘗依古法勒大將教戰各出其意或問之答曰古者人情敦樸故軍有左右前後大將居中三軍望之以齊進退今胡人務馳突雲合烏散變態百出故吾止使兵識將意將識士情上下相習人自為戰矣近戰則守家逺戰則利貨鄭俌中宗時厯右補闕黙啜入寇敗沙吒忠義詔百官陳破賊勝䇿俌言宜因古法募人徙邉免行役次廬伍明教令賞虜獲近戰則守家逺戰則利貨購辯勇結諸蕃以圖攻取叢矛注矢安禄山率河東兵討契丹次天門嶺㑹雨甚弓弛矢脱不可用禄山督戰急何思徳白士方疲宜少息使使者陳利以脅賊賊必降禄山怒欲斬以令軍乃請戰思徳貌類禄山及戰賊叢矛注矢邀取之傳言禄山獲矣奚聞以叛夾攻禄山短兵王世充與李宻戰世充多短兵盾䂎蹙之冐矢石死戰賈隠林屬朱泚難率衆扈行在賊圍擊隠林與侯仲莊冐矢石死戰已而解從臣稱慶手挺鏖擊李嗣業從平石國馳守白石路既隘步騎魚貫而前㑹拔汙那還兵輜餉塞道不可騁嗣業懼追及手挺鏖擊人馬斃仆者數十百虜駭走兩兵相交退者先敗杜重威安重榮反重威逆戰于宗城重榮為偃月陣重威擊之不動重威欲少却以伺之偏將王重𦙍曰兩兵相交退者先敗乃分為三重威先以左右隊擊其兩翼戰酣重𦙍以精兵擊其中軍重榮將趙彦之來奔重榮遂大敗走還鎮州重威攻破之五代史竒兵征衝驍騎横挑杜牧田克制鼉鼓騰聲而隠轔于公異破朱泚露布霜刃交光而震耀鼉鼓騰聲而隠轔烏鳥將墜尚顧危巢同上烏鳥將墜尚顧危巢妖狐就擒猶守舊宂讙譟之聲山傾而河泄鼓鼙之氣霆鬭而雷馳屏翳發向敵之風回禄扇燎原之熖思齒劍者投袂而興争淬刃者不期而㑹同上拔箭斷膚殊死前鬭王難得收京師方戰麾下士失馬難得馳救矢著眉披膚鄣目乃拔箭斷膚殊死前鬭血衊面不已帝悦一戰而蜂蠆盡殱不時而梟獍就戮元稹授李愿節度使制提持戈㦸淬礪卒徒云云指麾而貙兕作威感激而風雲動色七擒連發而星馳兩翼旁張而雲合于公異露布軍政令十一白軍旅之事軍政不戒而備孫叔敖介胄則有不可犯之色貌與服稱介者不拜武車不式戎容暨暨音忌果毅貌言容詻詻音額教令顔色山立不動玉色不變誓旅三令五申孫武下令於軍中整必勝之衆實在中權勵賈勇之夫必曰下令明恥教戰求殺敵也明戮其不果者師直為壯曲為老豈在久乎傳軍之善政古之善教師克在和不在衆鬭亷曰禮樂慈愛戰所蓄也士蒍曰武之善經整軍而經武師出以律否臧凶易師之耳目在吾旗鼓言衆觀大將旗鼔以進退戰所由克有死無犯魏綘曰軍事有死而無犯為敬有嚴有翼政令不一莫肯用命先縠威命御一心之衆建百勝之功軍容戎政威克厥愛允濟愛克厥威允罔功書𦙍征聞將軍令不聞天子詔亞夫軍細栁軍吏曰立武然則師非訓習令貴申嚴率素厲以行必無通也驅白徒而戰是謂弃之天子按轡徐行文帝勞軍細栁經武守文軍禁周禮銜枚周禮軍旅令銜枚禁無囂行間將整其什伍令下不可以二三既崇四七之名安可二三之令申嚴號令月令凡執禁以齊衆不赦過禮振鐸警衆號令也戎昭武列既申詻詻之言必整堂堂之陣整烏合之衆既在一夫勵鷹揚之師必資三令管子謂齊桓公曰君若正卒伍脩甲兵則大國亦然而小國設備難以得志可以作内政以寓軍令故正卒伍整於國治軍旅整於郊内教既成勿使遷徙什伍之人祭祀同福死䘮同恤世同居晝同㳺故夜戰其聲相聞足以相救晝戰其目相見足以相識居同樂得同利死同哀有士三萬人方行天下誅無道莫能禦也穰苴斬莊賈田穰苴將兵請莊賈為監軍與賈日午為期賈恃貴日暮方來苴問法於軍正軍正曰後期當斬遂斬賈敗麥割髮魏志太祖出軍令無敗麥犯者死騎皆下馬持麥相待太祖馬騰入麥中勑主爵議罰對曰春秋罰不加尊太祖曰作法自犯何以率下然孤為軍率不可殺請自刑㧞劍割髪置地士取民笠斬之吴志吕蒙入南郡令軍不得干厯人家蒙麾下士取民之笠以覆官鎧蒙曰不可以鄉里故廢法垂涕斬之士與蒙俱汝南人也髠其職吏吴志射聲校尉孫松於公子中最親戲下兵不整陸遜對之髠其職吏殺妻晉永嘉亂郭黙帥衆自為塢撫循將士甚得懽心黙婦兄陸嘉取官米十石餉妺黙自殺妻以明無私也叱斬子魏志鄧艾遣子忠與諸葛瞻戰不利還白賊未可擊艾怒曰存亡之分在此一舉叱忠將斬之忠馳還更戰大破之教婦人闔廬謂孫武曰子兵法十三篇吾盡見矣可教婦人乎曰可於是出宫女三千孫子分為二隊寵姬二人為隊長令鼔之皆左婦人大笑孫子又三令五申之又鼓之皆右復笑孫子斬二隊長吴王使救之不可用其次為隊長於是左右前後皆中規矩報吴王曰赴水火可矣秣馬蓐食訓卒利兵孔宣朝廷厚意裴度為淮西宣慰招討處置使屯郾城勞諸軍宣朝廷厚意士奮于勇下令士皆雪泣李晟圖復京師乃陳兵下令曰國家多難乗輿播遷見危死節自吾之分公等此時不誅元兇取富貴非豪英也士皆雪泣曰惟公命號令嚴壹段秀實知奉天行營事號令嚴壹軍中畏戢夜登城守者不許吕元膺為中丞拜鄂兵觀察使嘗夜登城守者不許左右曰中丞也對曰夜不可辨乃還明日擢守者為大將李洪正為武寧節度使徐自王智興後吏卒驕縱不法洪正戮其尤無狀者終洪正治不敢譁段秀實為涇州刺史時郭子儀以副元帥居蒲子晞以撿校為尚書領行營節度使屯邠士放縱不法邠人之嗜惡者納賄竄名伍中因肆志吏不得問白晝羣行丐頡于市有不嗛輙擊傷市人椎釡鬲甕盎盈道至撞害孕婦孝徳不敢劾秀實自州以狀白府俄而晞士十七人入市取酒刺酒翁壊釀器秀實列卒取之斷首置槊上植市門外一營大譟盡甲孝徳恐召秀實曰奈何秀實曰請辭於軍乃解佩刀選老躄一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴頭來矣甲者愕眙因曉之曰尚書固負若耶副元帥固負若屬耶奈何欲以亂敗郭氏晞叱左右皆解甲令曰敢譁者死所過樵蘇無犯李晟拜神䇿行營節度使進臨渭北壁東渭橋所過樵蘇無犯時劉徳信自扈澗歸亦次渭南軍囂無制徳信入謁晟晟責所以敗斬之以數騎入壁勞其軍無敢動整衆山立王雄誕每破城邑整衆山立無絲毫犯按甲不戰竇建徳五月自坂堵出為陣秦王登虎牢城望其軍按甲不戰曰賊起山東未嘗見大敵今度險士囂令不肅也逼城而陣有􅁿我心待其飢破之果矣卒已附親而罰不行者則不可用也故令之以文齊之以武是謂必取文恩武罰令素行以教其人者也令素行則人服令素不行則人不服令素信著者與衆相得也厚而不能使愛而不能令亂而不能治譬如驕子不可用也軍政曰言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旗幟者所以一人之耳目也人既専一則勇者不得獨進怯者不得獨退法者曲制官道主用也注謂曲制者部曲幡幟金鼓之制也官者百官之分用也道者粮路也主用者主軍費用也同上兵法制軍門不夜開段志𤣥文徳皇后之葬與宇文士及勒兵衞章武門太宗夜遣使至二將軍所士及披户納使志𤣥拒曰軍門不夜開使者示手詔志𤣥曰夜不能辨不納比曙帝歎曰真將軍周亞夫何以加斬奴竇軌還蜀初以其甥為腹心每夜出呼不時至斬之又戒家奴毋出外忽遣奴取漿公厨既而悔焉曰要當借汝頭以明法命斬奴奴稱寃監刑者疑不時決軌并斬之持法嚴李勣持法嚴故人為之用按軍尚威嚴武攸宜討契丹表陳子昂參謀攸宜輕易無將畧子昻諫曰按軍尚威嚴按邊撫師賞罰必直功罪張仁愿為將號令嚴將吏信伏按邊撫師賞罰必直功罪軍政大治王沛進拜兖海沂宻節度使是時新建府俗獷驁沛明示法制蒐閱以時軍政大治用命王逢從劉沔石雄破回鶻於天徳有士二千人未嘗戰欲冐賞賜逢不與或為請之答曰士奮死取賞若無功而賞何哉武宗以逢用法嚴使宰相李徳裕讓之逢曰戰者前蹈白刃不以法人孰用命令肅不殘馬璘在涇八年令肅不殘人樂為用羌不敢犯為中興鋭將政令無所統一哥舒翰守潼闗病痼不能事以軍政委良􅉌使王思禮主騎字承光主步三人争長政令無所統一衆擕弛無守意李光弼贊曰生戎羌之緒沈鷙有守遭禄山變披任兵柄其䇿敵制勝不世出賞信罰明士卒争奮毅然有古良將風鼓而行角而止韋雲起契丹寇營州詔雲起䕶突厥兵討之啓民可汗以二萬騎受節度雲起使離為二十屯屯相聨絡四道並引令曰鼓而行角而止非公使毋走馬三喻五復之既而紇斤一人犯令即斬以狥於是突厥酋長入謁者皆膝而進莫敢仰視突厥傳杜牧曰多喪兵士顛翻大都則跳身而來刺邦而去回視刀鋸菜色甚安一歳未更已立於壇墀之上此輕罰之過其敗四也號令隠然士氣皆起王鐸為義成節度使諸道行營都統於是表崔安潜自副鄭昌圖等在幕府以周岌王重榮諸葛爽康實安師儒時溥六節度為將佐而中尉西門思恭為監軍率衞兵洎梁蜀師三萬壁盩厔移檄天下先是諸將雖環賊莫肯先及鐸檄至號令隠然士氣皆起争欲破賊故巢戰數蹙宦人田令孜䇿賊必破欲使功出於己乃搆於帝罷之恃權撓政姚南仲為義成節度使監軍薛盈珍恃權撓政不能逞因毁南仲於朝徳宗惑之南仲不自安固請入朝帝勞曰盈珍撓卿政耶曰不撓臣政但隳陛下法耳如盈珍輩所在有之雖使羊杜復生撫百姓御三軍必不能成豈弟之化而正師律也正傳白孔六帖卷五十一
