body:
  text: 白孔六帖卷二十二唐白居易原本宋孔𫝊續撰貴一貧二賤三志節四隠逸五徵聘六貴一爵位附戒懼貪貴驕佚白人之所欲子曰冨與貴是人之所欲不以其道得之不處也尊貴傳曰人是以能尊其貴貴是以能守其業常尊貴有常尊在天冨貴在天金張漢功臣家唯金張二人親近貴寵比於外戚許史許氏史氏皆漢之外戚並重矦累將窮富極貴冠盖如雲貂蟬飛翠緌拖鳴玉念榮身以庇族無欲實難思絜已而立身非道不處衣錦漢書冨貴不歸故鄉如衣錦夜行紆青拖紫綰玉鏘金榮曜繁華議貴周禮暴貴禮崇髙莫大於冨貴西園待士筵列八珍東閣迎賓樽浮九醖爵位青紫之秩七葉左思詩云金張籍舊業七葉珥漢貂五侯漢成帝同日封舅五人為列侯垂三組漢楊僕為樓船將軍梁使歸家懐銀黄垂三組以誇鄉里佩六印蘇秦歸洛陽佩六國相印朱輪十人漢楊惲書曰惲家全盛時乗朱輪十人一門三后後漢梁冀一門三后六葉九公荀卿子家傳六葉九公漢廷七貴周禮九命百乗之家卿大夫也萬石君石建父子珥貂七代金張九遷四至九卿三入承眀廬席寵尚書代綰青螺門傳朱紱四代五公後漢袁氏戒懼寵辱若驚老子曰得之寵辱失之若驚知懼思降傳貴而知懼懼而思降既登而求降階智人也不在程鄭浮雲不義而冨且貴於我如浮雲不處不以其道得之不處也邦無道冨且貴焉耻也必毁盈必毁天之道持盈好禮冨貴而好禮則不驕不淫不慊禮曰聖人之制冨貴也使之冨不足驕貴不慊於上慊恨不滿貎口斂反辭貴君子辭貴不辭賤三命益恭傳三命益恭故鼎銘曰一命而僂再命而傴三命而俯正考父也身退功成名遂身退天之道去甚聖人去甚去奢去泰下人家語以冨貴而下人何人不與物惟惡盛神亦害盈知止知足寡悔寡尤有寵辱之驚老子無喜愠之色令尹子文貴而能貧懼以知降鄭子張黜官傳鄭子張有疾使黜官歸邑曰貴而能貧可以後亡二三子生在敬戒不在冨也君子曰善戒之齊晏嬰辭邑見誡冨門寵辱必驚已而無愠止足史蔡澤曰吳君白起越大夫種功成不去禍至范蠡知止足超然避世長為陶朱公孰見與禍至忍不能離疑不能决云云應侯曰吾聞欲而不知止則失其所欲也成功之下不可乆處不過六百石後漢邴渙兄曼容亦飬志自修為官不過六百石輒自免去張良曰家世相韓及韓滅不愛萬金之用為韓報仇彊秦天下震動今以三寸舌為帝者師封萬戶侯於良足矣願棄人間事欲從赤松子游乃學道引欲求輕舉也疏廣謂受曰知足不辱遂乞骸骨歸驕佚處樂子曰不仁者不可以長處樂不驕君子泰而不驕恃寵子太叔曰無怙冨無恃寵繇禮尚書世禄之家鮮克繇禮其亡傳戍也驕其亡乎公叔戍也斯亂驕斯亂充詘禮不充詘於富貴充詘喜失節貎服文采而驕易生食膏粱而性難正並見上注持盈老子遺咎冨貴而驕自遺其咎期驕位不期驕見上注聖人去泰君子戒盈代禄之家伯有侈不能久矣公孫驕其將亡乎宣驕崇多貪貴進取狂者進取志不可滿知足不辱知止不殆躁求茍得曼滿之欲為卿且聞及禍傳鄭公子曼滿與王子伯廖語欲為卿伯廖曰無徳而貪後鄭人果殺之駟秦不守其位終見伏誅傳駟秦冨而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之子思曰不守其位而能終者鮮矣不義而貴無徳而禄無徳而貪逞無疆之欲争名於朝敗度欲敗度以徼大利必有近憂貪冐之人將寘力焉禮不縱欲人亦惡盈罪莫大於可欲不以義制將由惡終無以寵利居成功謂貪而不退也貪以敗官為墨受爵不讓詩朝廷之位讓而就賤禮暴貴伐檀詩刺在位貪鄙無功受禄也知進而不知退孔貴震當世裴寂拜右僕射入閣則延卧内言無不從呼為裴監不名也貴震當世世榮其貴髙士㢘遷尚書右僕射士㢘三世居此官世榮其貴竇抗帝貴退入卧内從容談笑及平生歡得君日貴盛虞世基得君日貴盛妻妾被服擬王者而世南躬貧約一不改天將冨貴此翁劉仁軌始仁軌任帯方州謂人曰天將冨貴此翁邪習於貴者傲桞澤上書云郝許郝處俊與舅許圍師同里俱宦達鄉人田氏彭氏以髙貲顯故江淮間為語曰貴如郝許冨如彭田進爵為公劉仁軌進爵為公子及兄子授上柱國者三人州黨榮之引升御榻帝或引升御榻呼為蕭郎萬石張家張文瓘四子潜魏州刺史沛同州刺史洽衞尉卿渉殿中監父子皆至三品時謂萬石張家冠蓋騶哄相望崔琳長子儼諌議大夫其羣從數十人自興寧里謁大明宫冠蓋騶哄相望驕奢起於親貴桞澤上書驕奢起於親貴紀綱亂於寵倖禁之於親貴則天下從制之於寵倖則天下畏驕盈貴奢可戒不可恃漢陽公主嘗誨諸女曰先姑有言與若皆帝子驕淫貴奢可戒不可恃在清要岑羲兄獻為國子司業仲翔陕州刺史仲休商州刺史兄弟子侄在清要者數十人儀物貴甚蕭嵩子衡尚新昌公主嵩妻入謁帝呼為親家儀物貴甚眷禮卓異狄仁傑眷禮卓異時無軰者職宦光顯裴席帝常從容曰公華胄職宦光顯厠跡名臣垂榮無窮髙竇賛曰髙竇雖縁外戚姻家然自以才猷結天子厠跡名臣垂榮無窮貴不期驕魏徴曰貴不與驕期而驕自至冨不與奢期而奢自至非徒語也恩寵過幸數入禁閫唐休璟檢校安東都䕶時中宗為皇太子休璟將行進啓曰易之兄弟恩寵過幸數入禁閫非人臣所宜願加防察四第同時列㦸韋斌拜銀青光禄大夫時陟守河東而從兄宙為右金吾衞將軍縚為太子少師四第同時列㦸衣冠罕比者貴赫為冠族楊漢公楊氏自汝士後貴赫為冠族所居静恭里兄弟並列門㦸咸通後在䑓省方鎮率十餘人暴貴栁璨以諫議大夫同中書門下平章事起布衣至是不四嵗其暴貴近世所未有也儻来物㓜王謹女東光縣主時妃主多恃貴以奢侈相矜主獨儉素姊弟誚曰人生冨貴在得志獨勤苦欲何求答曰我㓜好禮今行之不違非得志謂何且自古賢妃淑女以恭遜著名驕縱敗徳况榮寵貴盛儻来物也可恃以凌人乎自懼貴且亢長孫無忌進右僕射無忌自懼貴且亢后又數言之遂解僕射持寵曠貴之譏白敏中召拜司徒數月足疾固求避位不許右補闕王譜奏願聼其請無使有持寵曠貴之譏無貴驕氣不類勲家郭承嘏帝嘗稱其儒素無貴驕氣不類勲家以勲力相髙李峴兄峘嶧峘從上皇峴翊戴肅宗以勲力相髙同時為御史大夫俱判䑓事又合制封公而嶧為戶部侍郎銀青光禄大夫同居長興里第門列三㦸朱紫滿門田𢎞正朱紫滿門榮冠當時寵絶一時徐皓又參太上皇誥冊寵絶一時無貴胄氣王龜無貴胄氣鳳閣王氏王徽曽祖擇從兄弟四人曰易從朋来言從皆擢進士第至鳳閣舍人者三人故號鳳閣王氏自是訖大中時登進士者八十人位䑓省牧守者四十人置止水明自足意孔若思歴庫部郎中常曰仕宦至郎中足矣座右置止水一石明自足意為一代法李靖懇乞骸骨帝遣中書侍郎岑文本諭㫖曰自古冨貴而知止者蓋少雖疾頓憊猶力干進公今引大體朕甚嘉之欲成公美為一代法不可不聼乃授檢校特進口未嘗言家事岑文本或勸其營産業者文本嘆曰吾漢南一布衣徒歩入闗所望不過秘書郎縣令耳今無汗馬勞以文墨位宰相奉稍已重尚何殖産業邪故口未嘗言家事一嵗至宰相李訓起流人一嵗至宰相世素貴李宻權勢可炙張廵傳楊國忠權焄天下吉温不竝處貴者不竝處崔彦曾每宴私自比東晉王謝崔湜與弟液澄從兄涖並以文翰居要官每宴私自比東晉王謝嘗曰吾一門入仕歴官未嘗不為第一本傳位勢隆極蘇安常聲焰熏灼王鉷門閥有素質望自髙魏元同權焰震朝廷毛若虛不能事新貴韓臯王叔文用事嫉之謂人曰吾不能事新貴一門盡貴唐宣州夏榮相陸象先蕭嵩曰陸郎位極人臣然不及蕭嵩一門盡貴位髙而有夀百人緩帯唐諺云一人在朝百人緩帯言一人貴而親友皆榮之也雞跖集貴不足尚桞宗元六逆論晉厲死而悼公入乃理宋襄嗣而子魚退乃亂貴不足尚也自武徳後楊恭仁兄弟位益盛楊執柔始雄在隋以同姓貴自武徳後楊恭仁兄弟位益盛又以武后外家尊寵凢尚主者三人女為王妃五人贈后一人三品以上二十餘人榮盛冠時張垍尚寧親公主時說居中秉政均為舎人諸父光為銀青光禄大夫榮盛冠時貧十一安貧衣食孤貧附窮濫傭賣居處白懸空室如懸磬言空也傳屢空子曰回也其庶乎屢空我艱詩終窶且貧莫知我艱惡衣惡食子曰士志於道而耻惡衣惡食者未足與議也不以貨財為禮貧者君子不辭子曰君子辭冨不辭貧貴而能貧見上注食貧三嵗食貧邦有道貧且賤焉耻也身安白社業保青氊賑窮恤貧周禮以保息六飬萬人三曰賑窮四曰恤貧大惡禮曰死亡貧苦人之大惡存焉始因十盜之由六韜曰貧者十盗謂收種不時娶婦無能飬女太多之類終摽六極之數洪範六極四曰貧也處約凍餒國語叔向見韓宣子憂貧叔向賀之曰吾有卿名而無卿實無以從二三子吾是以憂子賀我何故對曰昔欒武子無一畝之田諸侯親之戎狄懐之以正晉國今吾子有欒武之貧吾以為能修其徳所以賀若患貨之不足予何暇賀之將轉溝壑蓬門下客蓽戶輕生乏於財貨闕於禮義安貧無諂貧而無諂未若貧而樂樂道居常榮啓期曰貧者士之常居常而待終不去貧與賤是人之所惡不以其道得之不去也不改其樂一簞食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也飲水曲肱而枕之樂亦在其中矣孔子簞食無憂顔回琴歌自樂榮啓期云雖冨哉是人所欲而貧者亦士之常非病原憲居蓬戶之中併日而食子貢連騎詣之憲杖藜而出子貢曰先生何病憲曰今貧也非病子貢慙之有守心無淫行魏武子不憂君子憂道不憂貧論語不懾貧賤而知好禮則志不懾君子居易以俟命樂道安徳文子樂道而􅁯賤安徳而亡貧也晏如楊雄家産不過十金無儋石之儲晏如也雪不干人大雪丈餘洛陽令按行見人家皆除雪而袁安門無行路謂安死矣令㸔之見安偃卧問之答曰大雪人餓不宜干人令以為賢遂舉為孝亷荷鍤東阪且棲遲於衡泌帯經南畝常偃息於蒿莱黔婁貧人孤貧天窮禮曰老而無夫曰寡老而無妻曰鰥老而無子曰獨少而無父曰孤此四者天下之窮而無告者皆有常餼保息賑窮周禮見上注地著不分孤寡傳不分救也煢獨煢嫠介獨以飬老孤周禮恤人之艱阨窮困以肺石逹窮民周禮以肺石達窮民凡逺近煢獨老㓜之欲有達其上而不為達者立於肺石三日士聴其辭以告於上而罪其長人是以息小人懐恵語布徳施恵月令仲春飬㓜少存諸孤月令孟冬恤孤寡以逮不足大道之行使老有所終㓜有所長鰥寡孤獨廢疾皆有所飬老㓜孤獨不得其所禮老窮不匱化將行於邦家恵宜達於孤獨恵必及下禮上恤孤則人不倍介特單獨子恵困窮撫俗字人邦不施恵老將疇依道存愛物政在飬民窮濫窮斯濫矣子曰君子固窮小人窮斯濫矣不仁處約子曰不仁者不可以久處約不能居常姑欲行險疾貧子曰好勇疾貧亂也無怨子曰貧而無怨難利回君子不為利回回邪也憂貧喻利斯約斯盜子曰小人窮斯約約斯盗故聖人之制富貴也使貧不至於約隕穫禮不隕穫於貧賤隕穫困逆失節之貎居處環堵蓽門罋牖儒有一畝之宫環堵之室蓽門圭竇蓬戶罋牖四壁司馬相如居徒四壁蓬蒿張仲蔚所居蓬蒿沒人白社董威輦常宿洛陽白社中時乞於市蝸舎席門陳平立錐史孫叔敖為楚相及死其子無立錐之地懸罄之室繩樞之子陋巷顔子蓬戶不完原憲蒿萊之下且甘原憲之貧單陋范丹字史雲結草而居所止單陋隘陋衣惡衣耻惡衣惡食者未足與議也易衣而出禮藍縷敝衣風塵化緇古詩京洛多風廛素衣化為緇百結董先生百結衣緼袍衣敝緼袍與衣狐貉者立而不耻者其由也與被褐帯絲牛衣王章貧卧牛衣懸鶉子夏之衣蓋衣圉寒文子無表肘見踵决莊子云曾子在衛緼袍無表十年不制衣正冠而纓絶捉襟而肘見納履而踵决衣無卒夜之虞食空兼晨之畜人生到此天命何知食惡食見上注一簞食一瓢飲飲水曲肱而枕之樂亦在其中矣倂日而食禮言二日用一日食塵甑范丹甑中生塵釡中生魚擔石之儲魏志華歆清貧家無擔石之儲絶糧子在陳絶糧從者病莫能興霖雨莊子子輿與子桑為友霖雨十日子輿曰子桑殆病矣裹飯往食之十旬九食子思甘藜藿文選充虛接氣文子曰聖人食足以充虛接氣也菜色不舉火莊子曾子在衞三日不舉火糠豆不贍貢禹妻子藜羮不糝半菽蔬菽相半傭賣賣樵朱買臣賣樵薪其妻耻之請去鬻畚晉書王猛少貧賤鬻畚販繒灌嬰晝賃王髙晝則傭賃夜則燒塼賃舂梁鴻字伯鸞賃舂多能鄙事子曰吾少也賤故多能鄙事傭書後漢班超家貧常傭書又吳闞澤徳潤居貧常為人傭書以供帋筆所寫既畢誦之亦訖窶狹馬周家窶狹無正寢文彦博家貧無正寢貧不學儉馬周上疏里語曰貧不學儉冨不學奢言自然也躬貧約虞世南與妻息惡食不贍裴守真闗中旱與妻息惡食不贍也以厚蓄為戒馬燧子暢神策中尉楊志亷諷使納田産中官往往逼取暢畏不敢恡以至困窮當時視暢以厚蓄為戒諸子無室廬自託同上三揖窮鬼而告之韓愈送窮文元和六年正月乙丑晦主人與奴星結栁作車縛草為舡載糗輿粮牛繫軛下引㠶上檣三揖窮鬼而告之曰聞子行有日矣鄙人敢不問所途躬具舡與車備載糗粮日吉時良利行四方子飯一盂子啜一觴攜朋挈儔去故就新駕塵彍風與電争先子無底滯之尤我有資送之恩子等有意於行乎屏息潜聼如聞音聲被病醫藥不具韋表微始被病醫藥不能具所居堂寢隘陋既沒弔客咨嗟噉豆糜韋貫之居貧噉豆糜自給窶困盧商蚤孤家窶困丐補廬州刺史鄭綮累擢右司郎中困窶甚無愠嘆顔泉明遷彭州司馬家貧居官㢘而孤藐相從百口飦鬻不給無愠嘆閉口不食路文逸遇隋末大亂闔門死於盜文逸遁免流離辛苦自傷家多難閉口不食行者哀其窮彊飲食之貧狭王紹宗少貧狭無資馬懐素貧無資晝樵夜輒燃以讀書常苦皸濕劉蛻獻崔尚書伏臘不足於糗糧冬夏常苦於皸濕所取者廣其得必多所取者深其身必窮孫樵與賈生書六經作孔子迹述不滿矣孟子述子思坎軻齊魯司馬遷以史記禍班固以西漢禍揚雄以法言太𤣥窮元結以浯谿碣窮陳拾遺以感遇詩窮王勃以宣尼廟碑窮玉川子以月蝕詩窮杜甫李白王江寧皆相望於窮者也在官貧約甚鄭虔在官貧約甚澹如也杜甫嘗贈以詩曰才名三十年坐客寒無氊空短鄭光孝明皇太后弟太后言其家空短帝厚賜金繒安於窮槁李華居顯官衣常乏五代崔居儉拙於為生居顯官衣常乏衣不盡體常寄食於人杜甫傳家貲不滿千錢貟半千上書自陳臣家貲不滿千錢五窮子之儔朋非三非四在十去五滿七除二各有主張私立名字捩手覆羮轉喉觸諱凡所以使吾面目可憎語言無味者皆子之志也其名曰智窮矯矯亢亢惡圓喜方羞為姦欺不忍害傷其次名曰學窮傲數與名摘抉杳微髙挹羣言執神之機又其次曰文窮不専一能怪怪竒竒不可時施祇以自嬉又其次曰命窮影與形殊面醜心妍利居衆後責在人先又其次曰交窮凡此五鬼為吾五患飢我寒我興訛造訕蝇營狗茍驅去復還韓文禇無長貲蘇頲貲無千日計陸龜䝉被褐短窄杜陵野客人更嗤被褐短窄鬢如絲日糴太倉五升米時赴鄭老同襟期杜甫醉時歌伎能虛富家逾窘韓愈贈崔立之詩判筒而槽童稚戲為送窮舡判筒而槽比籜而閭細絲纒幅楮飾木偶家督被酒請禳窮將成式送窮文家無宿舂之儲李陽冰論古篆書家無宿舂之儲出無代歩之乗長往之計吕才東臯序欲定長往之計而困於貧饑不飽菜寒無襲衣孫樵文傭室寓食栁宗元送辛殆庶嚢如縣磬傭室寓食以下士之禄持窘絶之家元稹誨姪書以下士之禄持窘絶之家其間半是乞丏覊游以相給足囊空甑倒誰救之我今一食日還倂韓文寒食詩無僦屋賃僕之資無緼袍糲食之給韓愈上崔虞部書今所病者在於窮約無僦屋賃僕之資無緼袍糲食之給驅馬出門不知所之尺布不掩體皮膚劇枯桑李白北上行衣不布體食不充腸元稹謝表朝食不盈腸冬衣纔掩骼韓愈縣齋冬暖而兒號寒年登而妻啼饑進學家貧不足以自治韓愈上李侍郎家無錢財寸歩不能自致代張籍書八九年無所取資日求於人以度月日當時行之不覺也今如痛定之人思當痛之時何能自處也僕之家本窮空重遇攻刧衣服無所得飬生之具無所有家累僅三十口攜此將安所歸托乎羸餒桞宗元與李建書貧者士之常今僕雖羸餒亦甘如飴矣無使令之童闕交易之財桞宗元送元生序寓居側陋無使令之童闕交易之財可謂窮躓矣賣藥都市寄食朋友杜甫常困於衣食同上封西岳賦窮愁但有骨同上賤十二甘賤附白蓽門圭竇蓬戶甕牖之人謂貧賤也是人之所惡子曰貧與賤是人之所惡也不以其道得之不去也邦有道貧且賤焉恥也論語吾少也賤故多能鄙事朝不坐宴不與言賤也白屋周公下白屋之士馬韀蘇秦先貴張儀来謁坐於馬韀而食之為本老子貴以賤為本繩樞之子漢陳渉甕牖繩樞之子甿𨽻之人布衣何賤之有妨貴賤妨貴所謂六逆傳甘賤執鞭子曰冨而可求也雖執鞭之士吾亦為之好禮不懾貧賤而知好禮則志不懾君子不辭子曰君子辭貴不辭賤俟命君子居易以俟命不隕穫於貧賤樂道文子曰樂道而㤀賤有守心而無淫行在約思純雖賤者是人所惡而貧者亦士之常賤而知命何必躁求貴且在天豈宜茍得降志辱身桞下恵字展禽辱且不驚老氏之戒已而無愠子文之賢孔起寒賤李修起賤微恵文太子範時王毛仲等起賤微暴貴諸王見必加禮獨範接之自如出貧賤魏元忠上封事曰若陳湯吕蒙馬隆孟觀悉出貧賤而勲閥甚髙寒人張宿者本寒人自名諸生為人操舟南霽雲少微賤為人操舟家素寒韓全義家素寒史失其先世羈賤劉文静與裴寂善夜見邏堞傳烽叱曰天下方亂吾將安舍文静笑曰如君所言豪傑所資也吾二人者可終羇賤乎路無回眸之舊歐陽詹朝無一命之親路無回眸之舊猶孤根寄不食之田也人人耘耨所不及家家灌溉所不沾無貴相王顯與太宗皇帝有嚴子陵之舊毎掣褌為戲捋㡌為歡帝微時常戲顯曰王顯抵老不作繭及帝登極而顯謁因奏曰臣今日得作繭耶帝笑曰未可知也召其三子皆授五品顯獨不及謂曰卿無貴相朕非為卿惜也曰朝貴而夕死足矣時僕射房𤣥齡曰陛下既有龍潜之舊何不試與之帝與之三品取紫袍金帯賜之其夜卒志節四白在心為志匹夫不可奪志隠居以求其志詩言志子有四方之志盍各言爾志願聞子之志言以足志不言誰知其志過橋而題果乗駟馬漢司馬相如字長卿蜀郡北有升遷橋相如往長安乃題橋柱曰丈夫不乗駟馬不復過此遷中郎果如志入關而歎終擁使車漢郭丹字少卿入關而嘆曰不乗使者車不復出關後奉使南陽果乗髙車宰天下之志漢陳平少時為里中社宰分肉甚均父老謂陳孺子曰善為宰乎曰使宰天下亦如之後漢用其策遂定天下埽天下之心後漢陳蕃仲舉室有糞不除薛勤曰孺子何不埽洒荅曰丈夫當埽天下安能事一室乎勤大竒之澄清之志後漢以范滂為詔使攬轡慨然有澄清天下之志棄繻漢終軍字子雲西游入闗闗吏授軍繻軍曰丈夫西游終不徒還遂棄繻而去後拜謁者持節出闗闗吏曰此前棄繻生也投筆後漢班超字叔仲家貧傭書嘆曰大丈夫當學張騫傅介子立功異域以取封侯安能久事筆硯乎後果立功封定逺侯鴻鵠之志漢陳勝字渉少時嘗與人傭耕輟耕之壟上甚久曰茍冨貴無相􅁯傭者笑而應曰若為傭耕何冨貴也勝太息曰燕崔焉知鴻鵠之志哉卿相之盟史吳起出衛郭門與母訣齧臂而盟曰起不為卿相不復入衞門也後果如言有志無時後漢趙歧字邠卿嘗病戒兄姊曰我死爾乃置一圓石於墓刻之云漢有人姓趙名歧有志無時命也奈何後疾瘳仕至太僕歧本名嘉希顔之志慕藺之誠人之所欲天必從之大志逺略砥礪名節擲版後漢逢萌給事縣為亭長時尉過萌候迎拜謁既而擲版歎曰大丈夫安能為役遂之長安學焉不從斗筲郭泰林宗世貧賤母令給事縣庭林宗曰大丈夫安能從乎斗筲之役遂就屈彦宗學孔崖然有大志来瑱尚名節崖然有大志志節完整秦叔寳始為隋將来䕶兒帳内䕶兒曰是子才而武志節完整豈久處卑賤耶志趣竒譎張亮起畎畝志趣竒譎丈夫遭遇當以功名取冨貴李靖嘗謂所親曰丈夫遭遇當以功名取冨貴何至作章句儒憂天下房𤣥齡顧中原方亂慨然有憂天下志大志魏徵有大志以王佐自任蕭曺負大節以王佐自任願宰天下来濟初與髙智周郝處俊孫處約客宣城私相與言志處俊曰願宰天下濟及智周亦然處約曰宰相或不可冀願為通事舍人足矣後領吏部處約以瀛州書佐入調濟遽往曰如志遂以處約為通事舎人後皆至公輔修節陳子昻十八未知書以富家子尚氣决弋博自如它日入鄉校感悔即痛修飾守節顔真卿字希烈陷汝州盧杞乃建遣真卿曰四方所信若往諭之可不勞師而定時朱滔王武俊使皆在坐謂希烈曰聞太師名徳久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顔常山否吾兄也禄山反首舉義師後雖被執詬賊不絶口吾年且八十官太師吾守吾節死而後已内負大節杜如晦内負大節臨機輒斷不屈李晟朱泚西走晟引軍屯含元外舎表著節不屈者自許以功名顯張建封慷慨尚氣自許以功名顯名節自將劉瑑以名節自將凡議論處事不私趨於當乃止未嘗以言色借貴近時人髙其節顔春卿魏徵逺孫贍罪抵死春卿為請玉真公主得不死時人髙其節略細節張廵氣志髙邁略細節朝官不可為為清河令秩罷還都於是楊國忠方専國權勢可炙或勸一見且顯用荅曰是方為國恠祥濟時辛讜罷居揚州年五十不肯仕而慨然常有濟時意軒然有志尚黄碣軒然有志尚潔身亂世權臯召拜起居舍人固辭嘗曰吾潔身亂世以全吾志欲持是受名邪囚軍中裴懐古閻知微之使突厥懐古監其軍黙啜脅知微稱可汗又欲官懐古不肯拜將殺之辭曰守忠而死與毁節以生孰與請斬不避也遂囚軍中因得亡慷慨尚節義羅道宗賜號文簡先生吳融祖翥有名大中時觀察府召以署吏不應髙其槩言諸朝賜號文簡先生折節長孫順徳復爵邑素少檢侈放自如至是折節卓邁崔圎少孤貧志向卓邁整飭吕諲志行整飭濟世段秀實及長沈厚能斷慨然有濟世意功濟四海馬燧與諸兄學輟策嘆曰方天下有事丈夫當以功濟四海渠老一儒哉更學兵書戰策軒軒甚得孔戣擢諫議大夫中人劉希光受財二十萬緍抵死吐突承璀坐厚善逐為淮南監軍太子舍人李渉知帝意投匭上言承璀有功不可棄戣劾奏渉結近倖營罔上聽有詔斥渉峡州司馬官寵側目人為危之戣自以適所志軒軒甚得身可殺名不可死忠義序身可殺名不可死志也張守珪慷慨尚節義浩然有捄世意劉蕡厲名節蕭復志欲移山必能移山天地之心與人不逺昔犬戎滅周申甫復之無知亂齊管仲覇之晉室中絶王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子正救時運有其才必有其志有其言必有其事今一言未行其志乃衰是無志也栁冕荅張僕射書鳴珂遊帝都李泌少為詩曰天覆吾地載吾天地生吾有意無不然絶粒升天衢不然鳴珂遊帝都安能不貴復不去空作昻藏一丈夫可謂有志也鄴侯家傳李渤屢以言斥而悻直不少衰守節者尚之士之有志氣而思冨貴者必能建功業有志氣而輕爵禄者必能立名節二者雖其志不同然時危世亂皆人君之所急也郭代公倜儻不覉之士也少不以名節自檢當蕭岑内難竟全臣節賛皇公臣子論長驅以定中原五代韓熙載北海将家子也初與李榖相善明宗時熙載南奔吳榖送至正陽酒酣臨訣熙載謂榖曰江左用吾為相當長驅以定中原榖曰中國用吾為相取江南如探嚢中物爾及周征淮南命榖為將以取淮南而熙載不能有所為也獨覺志士甘漁樵嗚呼古人已糞土獨覺志士甘漁樵杜甫嚴氏溪放歌隠逸五大隱附白髙尚其事退蔵於宻身中清廢中權飬素素履絜身避地樂天徳成而上樂在其中作者七人隱居以求其志逸人放言不言世事論語虞仲夷逸隱居放言夷齊巢許避秦桃源蓬蒿張仲蔚隱居蓬蒿沒人小隱隱山林賣藥後漢韓康者字伯休賣藥不二價長安女子就買伯休執價不移女子曰君乃韓伯休耶何不二價康且惡其名聞乃遁㶚陵山連徵不至竟不復出採薇史伯夷叔齊不食周粟乃採薇後人詰之餓死首陽山名振京師漢鄭子真不屈其志耕於巖谷中名振京師谷口鄭子真隱居所逍遥放曠至人遺物文選慕山林之操晉陶潜字淵明少慕山林之操志行髙潔退居山林以琴酒自娛外臣上士考槃在澗白駒在谷𤣥豹隱山𤣥豹隱霧鳴鶴在隂嘉遁髙蹈肥遁終身不仕禮名因跡晦志以道寧遺形塵累反性混元逃名放性畢婚娶尚長字子平變姓名梅福自謂羲皇之人安知堯舜之世獨樂其志闇章君子之道闇然而日章禮非時不見禮韞跡匿光銷聲藏影方外之人髙名獨行率性逃名遺榮無悶易遁世無悶䝉以飬正育徳飬徳棲遲衡門之下可以棲遲棲遲偃仰離俗抱罋漢隂丈人抱罋灌園渾沌之術孔子曰彼渾沌之術丘惡乎知之蜀嚴沉冥漢書蜀郡嚴君平四皓七人采榮四皓采榮南山不觀車駕桓帝車駕過漢濱人皆觀之有一丈夫耕如故帝問之不觀車駕云云不告姓名隱居之服妾有隱居之服梁鴻妻蝸牛廬焦先孝然作蝸牛廬呻吟其中蘇門阮籍詣蘇門隱者有竹實數斛杵臼而已籍長嘯而喜月犯少微吳中隱士當死謝敷乃卒五栁陶潜五桞三徑蔣詡歸杜陵有三徑冨春渚嚴陵釣所往来屑屑王良病歸就徵過友人友人不肯見曰有忠言竒謀當取大位何其往来屑屑不憚煩也非聘則徵申屠蟠子龍太尉黄瓊辟不就後㑹𦵏瓊名豪譚論莫及蟠唯南郊一生與酬對臨别執蟠手曰君非聘則徵不久當相見上國蟠作色振手而去鴻飛㝠㝠弋者何慕喻髙道不仕也刺史䞇後漢䑓終孝威刺史行部執䞇見曰孝威居身如是甚苦終曰幸得保性命如使君夕惕庶事反不苦耶露寢魏志髙士傳焦先孝然結草廬於河間後野火燒之乃露寢雪中袒卧人視之並如故後至百有餘嵗乃卒編草為裳魏孫登公和無家屬土窟中居夏則編草為裳冬則被髪也人中龍晉宋纎令艾隱居太守馬岌具威儀鐃鼓造之纎不見岌歎曰名可聞身不可見徳可仰形不可睹人中龍也来視母疾晉夏統仲御隱居不與親族相見後母疾統侍藥宗族因得見勑斷家事尚長字子平建武中婚嫁畢勅斷家事勿復相聞當如我死遂肆意與同志好㑹廣游五岳名山不知所終門室有名嵇含君道在鞏縣豪丘自號豪丘子門曰歸厚之門室曰慎終之室守道自貴人各有能物任其性斯逺暴慢於焉逍遥辰祥降靈山河叶瑞味太𤣥而抜俗守虛白而辭榮洗耳潁川垂綸濮水俯臨盤石仰對貞松名利不混其情榮辱匪易其操攀桂紉蘭則有髙尚衣荷製芰早慕幽貞亭亭朗月逺照山扉肅肅清風傍来澗牖應曜本自周武王左傳曰邢晉應韓武之穆也漢有應曜隱於淮陽山中與四皓俱徵曜獨不至時人謂之曰南山四皓不如淮陽一老八代孫應劭集解漢書云大隱朝市大隱朝市牆東後漢王君公遭亂不仕隱牆東也降志辱身同塵和光薄游于朝不貴軒冕之榮自得山林之趣捕捉逢萌飬志人皆化其徳太守遣使奉謁不答太守恨使捕捉吏曰子康賢天下之所知莊處人敬往必不獲勞山民果相率持兵弩禦吏被傷而還子真隱於吳市梅福字子真變姓名為吳市門卒曼倩游於漢朝東方朔字曼倩韞光混俗隨時出處與道沉浮貞不絶俗隱不違親范滂美袁閎也吏隱王喬鄴令老􅅨柱史君平之居卜肆莊子之吏漆園於陵灌園伯休賣藥吾無隠乎爾偃息藩魏段干木鼓刀朱亥夷門侯嬴被髮董京威輦至洛陽行吟常宿白社之中時乞市肆之間得碎繒結以自覆得金帛佳錦則不受孫楚數就白社與語載歸而不肯也坐晦跡後漢郭林宗雖善人倫不為危言覈論黨事起唯林宗袁閎得免築土自周後漢袁閎夏甫黨事將作閎遂散髮絶世欲投深林以母老不宜逺遁乃四周築土於庭以為房室自牖納食且於室中東向拜母母思閎時往視之去便掩閉兄弟妻子莫得見之似狂向栩甫與少為書生卓犖講老子狀如學道又似狂被髪着絳綃頭常於竈北坐版床久有膝踝之處不語人来伏而不視之孔世推髙節温輔國薛嵩薦之朝授太常丞一謝嵩即去屏處郊野世推其髙節隱王屋山温造氣盛少所降屈不喜為吏隱王屋山人號其居曰處士墅棲白鹿山鄧世隆洛陽平亡命變姓名號隱𤣥先生棲白鹿山隱豹林谷令狐峘天寳末及進士第遇禄山亂去隱南山豹林谷遁舎嵩山杜如晦弟楚客方建成難作楚客遁舎嵩山為不仕者杜淹隋開皇中與其友韋福嗣謀曰上好用隠民蘇威以隱者召得美官乃共入太白山為不仕者文帝惡之乃謫戍江表飬親朱仁軌隱居飬親自放山野蕭俛既老舎濟源墅自放山野優游窮年皆隱盧藏用與兄徵明皆隱終南少室二山徑返江東宗室戡舉進士就禮部試吏唱名乃入戡恥之明日徑返江東隱陽羡里數遊山林舒王元名治石州二十年數遊山林有髙蹈意署其居曰大隱洞韋夏卿晚嵗將罷歸署其居曰大隱洞鏟蹟民伍孔巢父少力學隱徂徕山永王璘稱兵江淮辟幕府不應鏟蹟民伍以處士客隱毗陵竇羣兄弟皆擢進士第獨羣以處士客隱毗陵居青巖山甄濟居青巖山十餘年逺近伏其仁環山不敢畋漁假隱自名至號中南嵩少為仕塗㨗徑隱逸傳為林墟之適顔師古頻被譴仕益不進罔然䘮沮乃闔門謝賓客巾褐裙帔放情蕭散為林墟之適退隱白鹿山王恭累除越王東閣祭酒退隱白鹿山隱陸渾吕向隱陸渾山伊川田父郄純辭疾還東都號伊川田父十年不出自放江湖薛戎桞冕辟佐其府冕病死得解自放江湖間四明狂客賀知章晚節尤誕放遨嬉里巷自號四明狂客煙波釣徒張志和居江湖自稱煙波釣徒著𤣥真子亦以自號桑苧翁陸羽上元初更隱苕溪自稱桑苧翁天隨子陸龜蒙時謂江湖散人或號天随子角里先生自比涪翁漁父江上丈人不諧際人事房琯與吕向偕隱陸渾山十年不諧際人事半隱亭王龜嘗以光福第賓客多更往永達里林木窮僻創半隱亭以自適沈浮人間元結㑹天下大亂沈浮人間棲遲不出尹元凱由慈州司倉參軍坐事免棲遲不出者三十年屏居李華自傷踐危亂不能全節又不能安親欲終飬而母亡遂屏居江南醉吟先生白居易於所居履道里疏沼種樹創石樓香山鑿八節灘自號醉吟先生為之傳暮節惑浮屠道尤甚稱香山居士本傳隨駕隱士盧蔵用始隱山中時有意當世人目為随駕隱士晚乃徇權利務為驕縱素節盡矣司馬承禎嘗召至闕下還山藏用指終南山曰此中大有嘉處承禎徐曰以僕視之仕宦之㨗徑耳蔵用大慙聱叟元結作自釋云逃亂入猗玕洞始稱猗玕子後家瀼濱乃自稱浪士及有官人以為浪者亦漫為官乎呼為漫郎既客樊上左右皆漁者少長相戲更曰聱叟七松處士鄭薰端勁再知禮部舉引寒俊士類多之既老號所居為隱巖號七松處士松菊主人韋表微為監察御史裏行不樂曰爵禄譬滋味也人皆欲之吾年五十拭鏡㨵白冒遊少年間取一班一級不見其味也將為松菊主人不愧陶淵明云耐辱居士司空圖本居中條山王官谷有先人田遂隱不出作亭觀素室悉圖唐興節土文人名亭曰休休自號曰耐辱居士其言詭激不常以免當時禍災云東臯子王績有田十六頃在河渚間奴婢數人種黍春秋釀酒飬鳬雁蒔藥草自供以周易老子莊子置床頭它書罕讀也欲見兄弟輒渡河還家游北山東臯著書自號東臯子居士屩朱桃椎隱山中贈遺無所受嘗織十芒屩置道上見者曰居士屩也為鬻米茗易之置其處輙取去由東鄰田游巖入箕山居許由祠旁自號為由東鄰回軒巷張志和兄鶴齡恐其遁世不還為築室越州東郭茨以生草椽棟不施斤斧豹蓆椶履毎垂釣不設餌志不在魚也觀察使陳少游以其門隘為買地大其閎號回軒巷先是門阻流水無梁少游為創之號大夫橋竹溪六逸李白客任城與孔巢父韓凖裴政張叔眀陶沔居徂徠山日沈飲號竹溪六逸居百丈山蕭希甫王鎔以希甫為黎軍尤不樂居嵗餘又亡之易州削髮為僧居百丈山莊宗將建國于魏置百官求天下隱逸之士幽州李紹宏薦希甫為魏州推官五代五代之亂極矣傳所謂天地閉賢人隱之時歟自古天下未嘗無人也吾意必有潔身自負之士嫉世逺去而不可見者自古材賢有韞於中而不見于外或窮居陋巷委身草莽雖顔子之行不遇仲尼而名不彰况世變多故而君子道消之時乎吾又以謂必有負材能修節義而沉淪於下泯沒而無聞者放身而自得處乎山林而羣麋鹿雖不足以為中道然與其食人之禄俛首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明逍遥先生鄭遨見天下已亂有拂衣逺去之意唐明宗時以左拾遺晉髙祖時以諫議大夫召之皆不起即賜號為逍遥先生上絶人事趙光逢以世亂去官居洛陽杜門絶人事者五六年五代史麋鹿之與處猿狖之與居今所以惡衣食窮體膚麋鹿之與處猿狖之與居因自以其身不能與時俗順俯仰故甘心自絶而不悔焉韓文起居惟適之安窮居而野處升髙而望逺坐茂樹以終日濯清泉以自㓗采於山美可茹釣於水鮮可食起居無時惟適之安韓文盤谷序奈何天地間而作隱淪客貴道皆全真潜輝卧出隣探元入窅黙觀化遊無垠李白送岑徵君詩築巖釣渭唐賛耕延陵之臯荷石門之蓧沉如魚頑冥若鴻翔杜牧處士制耦而耕狂而歌鑿坯以逃荷蓧以遊而晦徳避難不成乎名非斯人之徒則誰與哉梁肅梁髙士碣羔鴈不行崔羣送廬嶽處士序旄頭光明垂三十載不習俎豆化為王矦者十有八九焉由是隱逸憔悴羔鴈不行蒼山沉沉側陋不顯商山拂衣漢且求之不得潁川洗耳堯亦存而勿論白居易泉石膏肓煙霞痼疾田游巖頻召不出髙宗幸嵩山親至其門游巖野服出拜儀止謹樸帝曰先生比佳否曰臣所謂泉石膏肓烟霞痼疾者惟恐入山之不深入林之不宻韓愈書埋光鏟采髙竇賛埋光鏟采與草木俱腐剡川一曲賀知章詔賜鑑湖剡川一曲龎公隱時盡室去杜甫寄從孫龐公隱時盡室去武陵春樹它人迷端居室李泌得請乃於衡嶽隱居詔即所居為端居室鄴矦家傳喚鐡太白山隱士郭休所居有白雲亭客至則擊一片其聲清逺山中鳥獸聞之羣集亭下以為翫號喚鐡天寶遺事髙逸賀知章時謂之髙逸翰林志拾橡實以飯崔從與兄皆隱太原山中㑹嵗飢拾橡實以飯講學不廢徵聘六不起附白仄席之求軟輪之聘用之則行舍之則藏有道則見無道則隱安車漢四皓隱商山恵帝為太子為書卑辭安車迎以為客乃出徳成而上禄在其中旁求俊又兼濟天下𤣥豹隱霧雖欲退藏白駒在場亦宜維縶弓旌蒲帛翹車翹翹車乘招我以弓注聘士之車古者聘士以弓也賁帛易曰賁于丘園束帛戔戔蒲輪蕙帳漢以蒲輪徵枚生鶴書賢遺林藪帛賁丘園將𢎞濟濟之多必在戔戔之賁縻之好爵寘彼周行在谷及門仕進之門聘以尊賢仕而貴義舉逸民天下之人歸心焉辟命詔書沽諸求善價而沽諸身勸為之駕髙詔有稱明徳者長吏必身勸為之駕謂身自往勸以車駕而遣之為駕哀帝徵賢龔勝曰竊見國家徵醫巫為駕徵賢者宜駕之帝曰大夫乗私車来耶勝曰唯唯詔為駕也羔鴈成羣陳實父子世號三君毎宰府辟命嘗同日至羔鴈成羣當世榮之慰遣黄瓊聘辟不應有司劾不敬詔命郡縣以禮慰遣之乃至初不起後應郇恁世祖召不至東平王蒼為驃騎將軍辟而應焉後朝㑹戲之對曰先君秉徳以臨下故臣可得不来驃騎執徳以撿下故臣不敢不至月餘却歸又李憙季和少有髙行累辟三府不就景旁命為從事中郎引見曰先君辟君不應今至何也對曰先公以禮見待憙得以禮進退明公以法臨下故不敢不来席上禮儒有席上之珍以待聘席猶鋪陳也陳上古之道貪議治國白虎通天子聘求士者貪議治國之道三旌之禮聘士之禮續食武詔民有明當世之務習先聖之術者縣次續食與計偕式廬魏文矦過段干木之廬必式之往来屑屑見隱逸門注奪牛翁韓康伯休桓帝徵不得已辭安車自乗柴車先使者行亭長以韓徵君當過發人牛治道見康以為田叟也奪其牛康釋駕與之使者至曰奪牛翁即徵君也敷求哲人夢得髙宗夢得說曰夢帝賚予良弼其代予言乃審厥象營求諸野說築傅巖之野惟肖聘丘園之耿介辟郡國之賢良選就賢辟命皎皎白駒賁然来思五反伊尹史伊尹隱居使人聘之五反然後肯三謁孔明徐庶謂先主曰諸葛孔明卧龍也可就見不可屈致先主遂詣亮三往乃見失望樊英季齊順帝備禮徵聘詔責郡縣羣縣載上道到猶稱疾彊輿入殿猶不屈使就太醫致羊酒後天子為設壇席有司奉引賜几杖拜五官郎將譚者初為不必降志及引問又無竒謀深仁帝失望不起迷邦陽貨謂孔子曰懐其寳而迷其邦可謂仁乎鳥獸不可與同羣孔子曰不降其志不辱其身者伯夷叔齊與願守所志後漢周黨字伯况好清節被徵不得已乃着短布單衣榖皮帩頭及引見伏而不謁因陳願守所志帝許之不辱其身見上注洗耳許由隱於箕山堯聞其賢聘為九州長由聞其聲乃洗耳於潁川之側唐堯髙許由之風見上注漢帝重嚴陵之志後漢嚴光字子陵光武欲授之官子陵曰昔帝堯大聖許由洗耳於河濱今臣欲敦箕山之操陛下遵帝堯之跡光武雅重之宜欽髙士之風難奪匹夫之志雖全獨行儒有獨立特行且亂大倫子路曰不仕無義欲絜其身而亂大倫名穢七啓曰名穢我身位累我躬抗髙尚之風則宜矯俗遇休明之日安可迷邦不仕無義迷邦非仁不事王侯髙尚其志終傲三旌之禮雖勤五反之命樂而無悶寵則可驚遺榮自汚髙鳳自言巫家以辭辟命復恐不免乃與寡嫂争田以自汚與夫僶俛從公未若逍遥樂道育白駒之徳亦既逢時藴𤣥豹之心猶想避世時有昬明理亂道包舒卷行藏優詔奬遺物累不召之臣公車詔楊秉韋著並稱疾不至有司劾大不敬正罪周景邊韶等議秉以退譲為節誠違仄席之望然逶迤退跡是抑苟進之風明王之世必有不召之臣也後應聘見上注圖形後漢桓帝徵姜肱不至遣工圖其形狀肱卧幽室以被韜面竟不出慰遣見上注愍勞以官職昭帝徵涿郡韓福至年老賜帛冊書曰朕愍勞以官職之事大夫其歸修孝悌以敦鄉里行道傳舍縣次具酒食從者及長吏存問八月帝賜複衾飼以中牢持毒藥公孫述持毒藥徵李僕僕曰欲誘我以髙位重餌遂飲毒藥而死以明自煎龔勝被王莽徵不食而死有父老来弔甚哀曰膏以明自煎龔生竟夭天年非吾徒也遂出不知其姓名詭辭王莽徵薛方方辭曰堯舜在上下有巢許陛下興唐虞之風臣亦欲守箕山之志莽喜其言不彊也從吾所好與子偕隱不可詘李彊為益州牧謂揚雄曰吾真得嚴君平矣雄曰君備禮待之此人可見而不可詘及相見彊不敢請為從事不稱臣後漢王覇字儒仲徵到尚書拜稱名不稱臣有司問其故覇曰天子有所不臣偃仰以沐堯曦棲遲而歌舜塗杖藜含糗雅符三徑之歡飲水曲肱取逸一瓢之樂閉門却埽以慰餘年結宇幽巖時堪飬性不事王侯有輕軒冕曳尾塗中楚王使聘莊周周謂使者曰吾寧曳尾於塗中商賈自穢王烈太守欲以為長史烈為商賈自穢得免孔書幣招禮温造隱王屋山夀州刺史張建封聞其名書幣招禮造欣然曰可人也往從之即山敦促不拜李渤詔以右拾遺召於是河南少尹杜兼遣吏持詔幣即山敦促不拜洛陽令韓愈遺書今可為之時自藏深山牢闗而固拒則與仁義者異守矣想遺公冠帯就車恵然肯来舒所畜積以補綴盛徳之缺渤心善其言始出家東都就家致聘張鎰時黜陟使裴伯言薦潞州處士田佐時詔除右拾遺集賢院直學士鎰以為禮輕恐士不勸復詔州縣吏以絹百匹粟百石就家致聘佐時卒不至詔十至堅卧不起甄濟居青巖山採訪使苖晉卿表薦之諸府五辟詔十至堅卧不起封刀召甄濟安禄山反使蔡希德封刀召之曰即不起斷其頭見我濟色不動左手書曰不可以行使者持刀趨前濟引頸待之希徳歔欷嗟歎止乃以實病告還詔陽城陜虢觀察使李泌數禮餉城受之泌欲辟致之府不起乃薦諸朝詔以著作佐郎召并賜緋魚泌使參軍事韓傑奉詔至其家城封還詔自稱多病老憊不堪奔奉惟哀憐泌不敢強頻召不出田游巖愛夷陵青溪上廬其側長史李安期召赴京師行及汝辭疾入箕山頻召不出表以蒲車王友貞𤣥宗在東宫表以蒲車召不至具書幣邀辟石洪罷黄州録事參軍隱居不出公卿數薦辟皆不答烏重嗣鎮河陽求賢者以自重或薦洪重嗣曰彼無求於人其肯為我来耶乃具書幣邀辟洪亦為重嗣知已故欣然戒行重嗣喜其至禮之主上感傷山林之士有逸遺者屢詔内外之臣旁求儒雅于四海而其至者盖闕焉豈無其人哉亦見國家不以非常之道禮之而不来耳韓文風雲入壯懐泉石别幽耳同上送石處士赴河陽幕詩幣帛數四江南野史江夢孫先王聞其徳業遂以幣帛聘之數四不得已乃起徵君已去獨松菊哀壑無光留戶庭杜甫覃山人隱居招聘孔述睿事親以孝聞既孤徳宗踐阼以諫議大夫銀章朱紱纒束帛就嵩山以禮招聘徵再不至隠逸盧鴻廬嵩山𤣥宗開元初備禮徴再不至五年詔曰鴻有泰一之道中庸之徳鉤深訪微確乎自髙詔書屢下毎輒辭託使朕虛心引領于今數年雖得素履幽人之介而失考父滋恭之誼豈朝廷之故與生殊趣邪將縱欲山林往而不能反乎禮有大倫君臣之義不可廢也今城闕宻邇不足為勞有司其齎束帛之具重宣兹㫖想有以翻然易節副朕意焉鴻至東都謁見不拜帝召升内殿置酒拜諫議大夫固辭復下制許還山白孔六帖卷二十二
