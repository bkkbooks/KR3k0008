body:
  text: 白孔六帖卷十五唐白居易原本宋孔𫝊續撰酒一酤㩁二造酒三酣醉四漿五茶六食七煎和酒一飲禮酒徳飲軍中戒酒樂飲淫酒夜飲酗酒賜酒御飲附令罰白我有㫖酒和㫖詩酒既和㫖㫖美也九醞甘醴浮蟻若萍醇酎竹葉榴花為雨樂巴噀酒為雨救蜀都之火百壺詩清酒百壺桂酒椒漿楚辭奠桂酒椒漿以取其香以椒桂漬酒羣飲獨醒腐膓養生論曰醪醴腐人之腸胃大欲禮夫飲食男女人之大欲存焉𤣥鬯抱朴子云𤣥鬯醇酒也十旬兼清酒也既㫖既清且多且有有酒如澠公酒公事作酒也周禮禮酒賔客之酒清酤詩既載清酤飲齊視冬時飲宜寒也禮記上尊酒漢賜丞相上尊注云糯米一斗為上尊稷為中粟為下美禄漢書酒者天之美禄所以頤養天下享祀祈福扶衰養疾蔗漿禮樂志大樂蔗漿析朝醒注甘柘汁為醒病酒析解也釃酒有衍迨我暇矣詩行酒呉諸葛恪行酒至張昭昭不肯飲之曰此非養老禮恪曰昔太公云云昭乃盡爵不與飲阮籍與王戎飲劉公榮在座不得飲戎異之他日問籍曰彼何如人答曰勝公榮者不可不與飲不如公榮者則不敢不與飲惟公榮可不與飲朋酒斯享佐酒助行酒三爵油油以退禮君子之飲酒酒以成禮不繼以淫狂藥具酗酒門有服宴飲灌夫仲孺有服過田蚡蚡曰吾欲與仲孺過魏其侯會仲孺有服夫曰將軍幸許過魏其侯夫安敢以服為辭數石不亂于定國飲酒至數石不亂為廷尉至冬月治諸獄飲酒益加精明酒徳思柔㫖酒思柔不為亂也以洽百禮為酒為醴温克人之齊聖飲酒温克三爵油油禮君子之飲酒也一爵而色洒如也注云肅敬貌洒音廯二爵而言言斯禮已注云和敬貌言音銀三爵而油油以退注云恱敬貌盖美君子之徳也孔嘉詩飲酒孔嘉維其令儀既醉而出並受其福醉而不出是謂伐徳雖取陶陶之樂劉伯倫酒徳頌曰捧甖承糟衘杯漱醪無思無慮其樂陶陶無愆抑抑之儀其未醉止威儀抑抑不忒有儀飽徳既醉以酒既飽以徳樂且有儀戒酒以備酒禍禮曰終日飲酒而不醉焉此先王所以備酒禍不為酒困孔子及亂唯酒無量不及亂伐徳醉而不出是謂伐徳不惑楊秉叔節三不惑酒色財獨醒屈原曰衆人皆醉惟我獨醒酣酒大禹之戒曰酣酒嗜音未或不亡酒誥成王封康叔作酒誥誥戒酒之義亦罔非酒惟辜酒誥曰民用大亂䘮徳亦罔非酒惟行越小大邦用䘮亦罔非酒惟辜言皆由酒以為罪也無彞酒文王誥教小子有正有事無彞酒注正也治事謂下羣吏教之皆使無常飲酒也飲惟祀越庶國飲惟祀言衆國因祭祀乃得飲酒徳將無醉言以徳自將無至醉也不腆于酒腆厚也崇飲其敢崇飲崇聚也酣身酣身猶醉樂其身將成禮以合歡豈納邪而伐徳邴原原舊能飲酒自行八九年酒不向口至陳留師韓子臨歸師友以原不飲酒陳仲弓范孟博盧子幹會米肉送原原曰本能飲但以荒思廢業斷之今逺别可盡飲終日不醉陶侃嘗曰少時有酒失亡親見約故不敢多飲桓温避酒見酗酒門吕氏避酒見令罰門不能滿觴田蚡辭不能滿觴灌夫怒自杖庾衮叔襃父在常戒襃以酒後每醉輙自責曰余廢先人之戒何以訓人乃於墓前自杖三十淫湎繼淫傳君子曰酒以成禮不繼以淫納邪又曰不納於邪驕奢淫佚所自邪也窟室伯有嗜酒為窟室壑谷夜飲而擊鐘為子晳所焚彼昬不知一醉日富及亂見上注沉湎于酒枕麴藉糟劉伯倫酒徳頌千日中山有酒飲者一醉千日𤣥石飲之千日乃醒酒池殷紂為酒池糟邱一鼓而坐飲者三千人嘔丞相之車邴吉為丞相御吏醉嘔其車吉不責酩酊無所知山公側弁絶纓荒湛于酒顛覆厥徳五斗解酲劉伶一石亦醉淳于髠羲和湎淫廢時亂日崇飲見上荒腆于酒不幸齊桓曰寡人不幸而好酒日夜相繼管仲曰惡則惡矣非其急也不繼以淫用備其禍衆醉彼昏卧吏部之甕下嘔丞相之車中畢吏部畢卓為吏部比舍郎釀酒熟卓醉後夜至甕下盜飲之掌酒者縳之明旦乃畢吏部種秫陶潜為彭澤令縣公田盡種秫腐脅周顗在朝能飲一石及過江每稱無對偶有舊對從北來顗出二石酒共飲各醉及顗醒客已腐脅死矣顗為僕射酣身酣樂其身不憂政伐徳醉而不出是謂伐徳投轄陳遵留客飲濡其首易有孚于飲酒濡其首衘杯漱醪劉伯倫酒徳頌求於妻劉伶常乗鹿車携一壺酒使人荷鍤随身曰死便埋我其遺形如此渇甚求酒於妻妻捐酒棄器諫曰非養生之道宜㫁之伶曰善當祝鬼神自誓耳便可具酒肉妻從之伶跪祝曰天生劉伶以酒為名一飲一石五斗解酲婦人之言不可復聽於是乃引其酒御其肉塊然復醉金貂換酒阮孚遥集為散騎常侍以金貂換酒帝宥之杖頭阮修宣子常歩行以百錢掛杖頭至酒店便獨酣暢家無儋石之儲過寡婦飲漢陳崇劾陳遵爵列侯備郡守州牧而乗蒲車入閭巷過寡婦左阿君置酒歌舞醉宿劾周顗伯仁領吏部屢有荒醉失儀為有司所劾嫉嗜酒時苖徳胄性嫉惡為壽春令蔣濟為治中苖往謁濟濟素嗜酒醉不能見苖苖恚悵還刻木為人署曰醉徒蔣濟立於墻下旦夕射之州縣知無奈之何飲至一石于定國為廷尉飲一石㫁獄益精明如淮傳曰有酒如淮有肉如坻酗酒生禍禮曰豢豕為酒非以生禍而獄訟益繁則酒之流生禍也酒禍見上注及亂唯酒無量不及亂既醉是曰既醉不知其秩秩常也載號載呶失意杯酒間白刃起相讐式號式呼酒荒于厥邑羲和淫酗肆虐臣下化之紂也羣飲勿佚其或告曰羣飲汝勿佚盡執拘以歸于周予其殺言禁之也勿佚謂捕之勿失使酒季布酒狂蓋寛饒曰無多酌我我則酒狂酒失陶侃曰少曽有酒失殺人呉志凌統為將軍其督陳勤剛勇任氣自督酒凌轢一坐舉罰不以道統面折之勤怒罵詈統及父操統流涕不荅引刀斫殺之及攻山賊曰死將以謝罪乃身當矢石賊應時披壊孫權嘉其果毅以功贖罪也弔王恱元逹恃才縱酒婦父有慘恱乗醉弔之婦父慟哭恱與賔客連臂被髪裸身而入繞之三匝而出輕重不得灌夫與竇嬰飲輕重不得夫摶嬰注不得謂不平偪官長飲謝奕安兄也少與桓温善為温司馬每因酒無復朝廷禮常偪温酒温走入南康主門避之奕遂攜酒就㕔事引温一兵帥共飲曰失一老兵得一老兵亦何所怪温不責之偽醉責人晉温嶠偽醉以手版擊錢鳯小遺東方朔常醉入殿中小遺殿上劾大不敬免為庶人又張安世少孺為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不反水漿耶其掩人過如此中聖人見禁酒門狂藥孫季舒嘗與石崇飲慠慢過度崇欲表免之裴楷叔則聞之謂曰足下飲人狂藥責人正禮不亦乖乎崇乃止禮飲三爵臣侍宴過三爵非禮成禮酒以成禮有儀樂且有儀百禮以洽百禮見上酌言酬之詩九獻傳曰楚子入享于鄭九獻注云上公之禮九獻而禮畢三行趨出管子曰桓公與管仲飲掘新井而柴焉十日齋戒召管仲管仲至公執爵夫人執樽觴三行管仲趨出公怒曰寡人齋戒以飲仲父以為脫於罪矣管仲曰臣聞湛於樂者洽於憂厚於味者薄於行臣是以走出拜而送之皆有酌數周禮卜晝臣卜其晝未卜其夜侍飲禮侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲並恭敬也靣尊禮曰凡飲唯君面尊賜爵見賜酒門注一獻百拜禮曰酒之流生禍也是以先王因為酒禮一獻之禮賔主百拜終日飲酒而不得醉焉先王所以備酒禍也百拜言至敬用禮飲酒獻酬有儀設醴漢書楚元王每置酒為穆生設醴無荒好樂無荒油油以退禮君子之飲酒一爵而色洒如也二爵而言言斯禮已三爵而油油以退注皆肅敬貌舉酬逸逸有序貌飽徳既醉以酒既飽以徳酳酢禮以賢序賔敬譲無惑軍中飲獻飲傳曰榖陽竪獻飲於子反子反飲之而醉不能見楚子遂宵遁敗楚軍也簞醪三略昔良將有饋一簞醪者投於河使士飲之三軍皆告醉魯酒薄而邯鄲圍莊子音義曰楚宣王朝諸侯魯恭公後至而酒薄宣王怒恭公曰我周公之𦙍長於諸侯行天子禮樂勲在周室我送酒已失禮方責其薄無乃太甚遂不辭而還宣王怒乃發兵與齊攻魯梁惠王常欲擊趙而畏楚楚既以魯為事故梁得圍邯鄲言事相因亦是感應也一曰魯趙俱獻酒於楚酒吏以魯酒易趙厚酒故楚圍邯鄲也罷將曹仁為闗侯所圍太祖以曹植子建為南中郎將征虜將軍欲遣救仁呼有所勑戒植醉不能受命於是上悔而罷之騰酒車以斟酌文選樂飲合歡酒食者所以合歡宴樂我有旨酒以宴樂嘉賔之心厭厭夜飲不醉無歸百榼孔叢子曰子路嗑嗑尚飲百榼其樂陶陶劉伯倫酒徳頌曰捧罌承糟衘杯漱醪無思無慮其樂陶陶玉山之穨晉嵇康醉倒如玉山之將頽舉白漢書曰引滿舉白白酒觴樂飲今夕朱顔酡酡徒何反美人既醉朱顔酡髙陽山簡每至髙陽習家池飲酒大醉而歸人歌曰山公時一醉酩酊無所知日暮倒載歸倒安白接䍦河朔飲袁紹在河朔每至夏大飲云以避一時之暑故號河朔飲也不空孔文舉曰樽中酒不空吾無憂酣身見上投轄陳遵留客飲酒投車轄於井中無酌數周禮資酒食以合歡初筵有禮用歌舞以飾喜終宴不疲即時一杯晉張翰曰使有身後名不如即時一杯酒酒中趣孟嘉嗜酒人問之荅曰君未知酒中趣側弁之俄屢舞傞傞俄傾貌樂未央杯但覺杯行遲夜飲厭厭夜飲不醉無歸以火繼之卜夜桓公樂飲以火繼之敬仲辭曰臣卜其晝未卜其夜不繼以淫絶纓楚荘夜飲燭滅客牽美人衣美人絶其纓俾夜作晝俾晝作夜鄭伯有為窟室而夜飲酒擊鍾樂飲今夕御飲三爵臣侍君宴過三爵非禮也千鍾孔叢子曰堯飲千鍾在鎬王在在鎬豈樂飲酒詩過沛史髙祖過沛置酒酒酣上擊筑自歌湛露之觴瑶池之宴周穆王宴西王母酌彼金罍詩飲酎月令孟夏天子飲酎用禮樂酎醇酒也用禮樂正尊卑也醉後漢劉寛字文饒每引見帝令寛講經嘗於帝前被酒睡帝問太尉醉耶對曰臣不敢醉但任重負大憂心如醉又後漢馬武字子張為人嗜酒濶逹敢言時醉在御前靣折同列言其短長帝故縱之以為樂靣尊凡飲唯君靣尊司過之吏呉孫皓每宴會羣臣無不令沉醉置黃門侍郎十人不與酒令侍立為司過之吏飲罷各奏其闕失随大小加刑勞酒孟春天子躬耕籍田還乃宴飲於太寢公卿大夫諸侯皆御命曰勞酒晉武舉觴河橋成晉武舉觴於杜預曰非卿此橋不成賜酒秬鬯賜晉晉文公獻楚俘於周王賜之秬鬯一卣卣器也秬黒黍鬯香草和酒以降神錫魏册魏公九錫文曰是用錫君秬鬯一卣賜遺細君漢書伏日上賜東方朔酒一石肉百斤歸遺細君酒存人欲賜表主恩逮下之恩賜頒周禮酒正掌酒之賜頒皆有法以行之注法尊卑之差秩酒酒正凡有秩酒者以書契授之注秩常也謂老臣常受酒賜爵禮君若賜之爵即越席而再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虚爵注不敢先君盡之不再拜禮酒肉之賜不再拜再重也不重拜輕也上尊酒漢書賜丞相養牛上尊酒注糯米一斗酒一斗為上尊稷為中粟為下桐馬酒見造酒門令罰兕觥其觩兕觥罰爵地觩然不用酒吏軍灋史記諸吕用事朱虛侯章入侍髙后燕飲令章為酒吏章曰臣將種也請以軍法行酒酒酣諸吕一人亡酒章抜劍斬之還白曰亡酒一人謹行軍法斬之觴政說苑魏文侯與大夫飲酒使公乗不仁為觴政引滿相罰文選立監佐史詩凡此飲酒或醉或不既立之監或佐之史彼醉不臧不醉反耻言幽王立酒監佐之史令人盡醉則耻罰之令出惟行觵其不敬者觵罰爵也周禮杜蕢之爵禮智悼子卒未葬晉平公飲酒師曠李調侍飲杜蕢入寢酌曰曠飲斯又酌曰調飲斯又酌北靣而飲平公問之云云公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公曰如我死則必無廢斯爵也遂謂之杜舉酌彼兕觥有常罰之爵禮罰卜不中晉獻公飲大夫酒令司正實爵與史蘇曰驪之役汝曰勝而不吉夫克國得妃吉孰大焉故罰汝對曰云云飛觴舉白文選孔分賜譲皇帝憲帝親待愈益厚尚食搃監及四方所獻酒皆分賜之藥酒譲皇薨葬橋陵監護使裴耀卿建言尚食料藥酒三十石考求禮據無所憑依請蠲省折衷詔可以酒得過温造字簡輿李景儉以酒得過宰相造坐與飲食出為朗州刺史悠然獨酌馬周字賔王舍新豐逆旅主人不之顧周命酒一斗八升悠然獨酌衆異之上書太子李綱字文紀上書太子曰殿下飲酒過量非養生之道嗜酒蘇世長縱酒為樂唐儉居官不事事與賔客縱酒為樂置酒相樂李勣疾弟弼始為晉州刺史以勣疾召為司衛卿使省視忽語曰我似少愈可置酒相樂於是奏樂宴飲列子孫于下日置酒韋挺在幽州日置酒弗憂職劇飲李百藥喜劇飲踰斗不亂盧齋卿喜飲酒踰斗不亂賜酴醿酒李絳字深之曰今法令不及者五十餘州西戎内訌加此水旱無年陛下焦心銷志求濟時之略渠便髙枕而卧哉帝入謂左右曰絳言骨鯁真宰相也遣使賜酴醿酒卒爵李景譲字後已始為左丞蔣伸坐宴所酌酒語客曰有孝於家忠於國者飲此客肅然景譲起卒爵伸曰無宜於公窮晝夜相歡裴度字中立治弟集賢里野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事把酒為勞王世充擊賊盧明月於南陽俘係數萬還帝自持酒為勞䘮明徐晦字士章嗜酒䘮明引觴同飲張説字道濟宴集賢院故事官重者先飲説曰吾聞儒以道相髙不以官閥為先後大帝時修史十九人長孫無忌以元舅每宴不肯先舉爵長安中與修珠英當時學士亦不以品秩為限於是引觴同飲時服其有體縱酒髙會崔寧杜鴻漸為劍南西川節度使政事日委寧日與僚屬杜亞楊炎縱酒髙會罰爵崔咸字重易李逄吉當國畏裴度復相使京兆尹劉栖楚等十餘人悉力排却之雖度門下賔客皆有去就意他日度置酒延客栖楚曲意自解附耳語咸疾其矯舉酒譲度曰丞相乃許所由官囁嚅耳語願上罰爵度笑受而飲栖楚不自安趍出坐上莫不壯之内詔于懐賈耽為山南節度使徳宗在梁耽使司馬樊澤奏事澤還耽大置酒會諸將俄有急詔至以澤代耽召為工部尚書耽内于懐飲如故既罷召澤曰詔以公見代吾且治行勑將吏謁澤杖䇿往醉張鎬字從周京師未知名率嗜酒鼓琴自娯人或邀之杖䇿往醉即返楊國忠薦釋褐拜左拾遺不喜飲酒李徳裕不治職李紳字公垂素善薛廷老數飲酒不治職罷去坐是亦奪職殺人劉义少因酒殺人亡命會赦出飲謔姚誾性豪蕩好飲謔俸餘送酒家陽城字亢宗每約二弟吾所俸入而可度月食米幾何薪鹽幾錢先具之餘送酒家無留也不任事王績字無功求為六合丞以嗜酒不任事斗酒學士髙祖武徳初以前官待詔門下省故事官給酒日三升或問待詔何樂耶荅曰良醖可戀耳侍中陳叔逹聞之日給一斗時號斗酒學士送酒貞觀初以疾罷復調有司時太樂署史焦革家善醸績求為丞吏部以非流不許績固請曰有深意竟除之革死妻送酒不絶嵗餘又死績曰天不使我酣美酒邪棄官去酒經追述焦革酒法為經酒家南董又采杜康儀狄以來善酒者為譜李淳風曰君酒家南董也立杜康祠所居東南有盤石立杜康祠祭之尊為師以革配著醉鄉記以次劉伶酒徳頌五斗先生其飲至五斗不亂人有以酒邀者無貴賤輙往著五斗先生傳贈酒杜之松故人也為刺史請績講禮荅曰吾不能揖譲邦君門談糟粕棄醇醪也之松嵗時贈以酒脯以上王績傳潔壺置杯陸龜蒙字魯望初病酒再朞乃已其後客至㓗壺置杯不復飲多忤物林藴字復夢嗜酒多忤物宰相置不用也喜蒱酒王翰喜蒱酒與才士豪俠飲樂翰徙仙州别駕日與才士豪俠飲樂劇飲歡甚孟浩然字浩然採訪使韓朝宗約浩然偕至京師欲薦諸朝會故人至劇飲歡甚或曰君與韓公有期浩然曰業已飲遑恤佗卒不赴崔顥嗜酒生春酒本紀徳宗即位五月甲申劍南貢生春酒雖多不亂李迥秀字茂之喜飲酒雖多不亂俗以椰子為酒南蠻訶陵俗以椰子為酒飲之輙醉宿昔壊桑落酒良醖署令二人進御則供春暴秋清酴醿桑落之酒見百官志崔恭飲酒至斗不亂上日内出醪饌張説字道濟遷左丞相上日内出醪饌李適之飲酒至斗餘不亂時美其恭苖晉卿字元輔潞州壺闗人充河北採訪使入計謁歸壺闗太守迎犒吏所属令行酒酒至必立飲白釂侍老有獻降階拜而飲時美其恭將士不飲陽惠元平州人詔移兵萬五千戍闗東帝御樓至春樓誓師因勞遣諸將酒至神䇿將士不敢飲帝問故惠元曰初發奉天臣之帥張巨濟與衆約是役也不立功毋飲酒臣不敢食其言數過友家飲噱劉伯芻字素芝遷主客員外郎數過友家飲噱為韋執誼所陰劾貶虔州叅軍酒崔沔字善仲曰祭祀尚矣古者飲食必先嚴獻未有麴糵故有𤣥酒之奠勸一杯漢蔡王信髙祖之從弟也楊邠等死信大喜謂其寮佐曰吾嘗謂天無眼而使我鬱鬱于此三年矣主上孤立幾落賊手諸公可以勸我一杯矣紫酒青酒五代于闐以蒲萄為酒又有紫酒青酒不知其所醸而味尤美求酒五代張彦澤耶律徳光犯闕帝使求酒於李崧崧曰臣家有酒非敢惜慮陛下憂躁飲之有不測之虞所以不敢進也酒八仙人李白字太白自知不為親近所容益驁放不自修與賀知章李適之汝陽王璡崔宗之蘇晉張旭焦遂為酒八仙人㯽榔瀋為酒環王取㯽榔瀋為酒濁醪有妙理杜詩琥珀春酒杯醲琥珀薄松醪酒熟旁看醉杜甫寄杜員外兄甘若飴韓愈詩一杯春酒甘若飴地黃酒桞玭相國門人賈餗有奴頗横馮球愛賈召奴責之奴泣謝未幾馮謁賈未出有二青衣齎銀罌出曰公恐君寒奉地黄酒三杯馮説盡舉之㳅行長孫無忌帝謂唐儉有辭善和解人酒杯㳅行發言可喜非公會不飲段秀實非公會不飲酒受酒一杯李素立夷人感其惠率牛馬以獻素立止受酒一杯潜泉浮酒回紇入朝帝坐祕殿陳十部樂殿前設髙坫置朱提缾其上潜泉浮酒自左閣通坫趾注之缾轉受百斛繚盎回紇數千人飲畢尚不能半劇飲以自娯五代符習怏怏失職劇飲以自娯麴生唐開元記葉法善居𤣥貞觀嘗有朝士詣之解帶淹留滿座思酒忽有一美措傲睨直入稱麴秀才年二十餘肥白可觀笑揖諸公末席伉聲譁論良久暫起法善曰此子突入詞辯如此豈非妖魅為惑乎俟其復至宻以小劍擊之應手墜于階下化為瓶榼一座驚懾遽視乃瓶醲醖也咸笑飲之其味甚佳曰麴生風味不可忘也龍膏酒唐杜陽編順宗時處士伊初𤣥召入宫飲龍膏酒黒如純漆飲之令人神爽此本鳥弋山離國所獻澄明酒武宗㑹昌元年夫餘國貢火玉才人常用煎澄明酒其酒亦異方所貢也色如紫膏飲之令人膏香凝露漿同昌公主上每賜御饌其酒有凝露漿無憂酒武宗起望仙臺薦無憂酒酒山南昌國有酒山山有泉其味如酒飲之甚美醉則經月不醒菖蒲酒桃花酒滄洲去國萬里出菖蒲酒桃花酒飲之而神氣清爽香露之醑洲人多飲香露之醑麴精潭叙聞録憲宗採鳯李花醸換骨醪晉國公平淮西廻黃帕金瓶逺賜二斗碧芳酒叩頭録房壽六月擣蓮花製碧芳酒凉物也䲻腦酒唐酉陽雜俎肅宗張皇后専權每進酒常寘䲻腦酒令人夕醉健忘洞天聖酒將軍虢國夫人就屋梁懸鹿腸於中空筵宴使人於梁上注酒於腸中結其端欲飲則解開流於盞中號洞天聖酒將軍出酒中𤣥辭醉李仁矩恃恩驕恣見藩臣不以禮東川節度使董瑋置酒召仁矩辭醉不往於傳舍與娼妓宴飲好飲而多酒過初李瀚為翰林學士好飲而多酒過髙祖以為浮薄天福五年九月詔廢翰林學士五代桑維翰傳牛飲閩王曦常為牛飲羣臣侍酒醉而不勝有訴及私棄酒者皆殺之諸子繼柔棄酒并殺其賛者一人舉觴酹先酒桞宗元飲酒詩今旦少愉樂起坐開清樽舉觴酹先酒遺我駈憂煩序飲昔之飲酒有揖譲而酬酢百拜以為禮者有呌號屢舞如沸如羮以為極者有祼䄇􅃝禓以為逹者有資絲竹金石之樂以為和者有以促數紏逖而為宻者桞文文字飲長安衆富兒盤饌羅羶葷不解文字飲惟能醉紅裙韓愈醉贈清夜沉沉動春酌燈前細雨簷花落杜甫醉時歌李白一斗詩百篇長安市上酒家眠天子呼來不上舩自稱臣是酒中仙墻頭過濁醪展席俯長流汝陽三斗始朝天道逢麴車口流涎恨不移封向酒泉老杜八仙歌濁醪氣色嚴皤腹瓶甖古酣酣天地寛怳怳嵇劉伍杜牧雨中作盖至其邊終身太平文粹王績醉鄉記降及堯舜作為千鍾百壺之獻因姑射以假道盖至其邊終身太平與醉鄉隔同上禹湯立法禮繁樂雜數十代與醉鄉隔其臣羲和棄甲子而逃冀臻其鄉失路而道夭故天下遂不寧玉酒湛湛盈華觴齊言此夕樂未央玉酒湛湛盈華觴張籍楚宫行石梁春滎陽之土窟春富平之石梁春酒名也國史補西涼州蒲萄酒李白進清平詞太真以玻瓈七寳杯酌西涼州蒲萄酒飲白出楊妃傳瓊􅏁酒謝𤣥卿遇神仙設瓊􅏁酒續仙傳呼酒韓愈醉贈張籍今日到君家呼酒持勸君數杯澆腸雖暫醉皎皎萬慮醒還新韓愈感春詩金牌㫁酒安禄山眷寵既深人多疾之帝恐其遇毒賜禄山以金牌繫臂每王公勸飲則示金牌准勑㫁酒異國酒阿陸部多獵虫鹿剖其肉重疊之以石壓瀝汁稅波斯拂菻等國米及草子釀於肉汁之中經數日即變成酒飲之可醉出酉陽雜俎酒味既冷洌酒氣又氤氲詩成使之冩亦足張吾軍所以欲得酒為文俟其醺酒味既冷冽酒氣又氤氲性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛車旁側挂一壺酒李白㐮陽歌車旁側挂一壺酒鳯笙龍管行相催咸陽市中嘆黃犬何如月下傾金罍麴神寅日合酒聖卯時歡白樂天詩天文懸瑞色張説天文懸瑞色酒聖泛華巵龍頭㵼酒邀酒星唐李賀詩百罰深杯亦不辭杜甫樂遊園歌却憶年年人醉時只今未醉已先悲數莖白髪那抛得百罰深杯亦不辭山瓶乳酒下青雲氣味濃香幸見分謝嚴公送酒酒憶郫筒不用沽郫蜀縣風俗録曰郫人刳竹之大者傾春釀於筒閑以耦絲蔽以焦葉信宿馨逹於林外然後㫁之以獻俗號為郫筒林也聞道雲安麴米春撥悶聞道雲安麴米春纔傾一盞即醺人蟻浮仍臈味歸溪重碧酤春酒宴楊君樓五花馬千金裘呼兒將出換美酒與爾同消萬古愁李白將進酒辭粟卧首陽屢空飢顔回當代不樂飲虚名安用哉李白飲之以酒五代梁臣劉鄩歸梁太祖賜之冠帶飲之以酒鄩辭以量小太祖曰取兖州量何大乎張飲盡歡髙開道以輕騎五百抵幽州欲圖羅藝自從數騎入都督府且觀藝藝與張飲盡歡知不可圖遂去奏妓飲酒髙開道顧不免擐甲挺刃據堂上坐與妻妾奏妓飲酒醽緑翠濤龍城録魏左相能治酒其名醽緑翠濤常以大金甖内賜公稱醽緑勝蘭生翠濤過玉薤千日醉不醒十年味不敗蘭生漢書百味㫖酒也玉薤傷帝酒名也十年不敗西河人華非得大宛之法司馬酒學謂貴人藏萬石蒲萄酒數十年不敗者也酒兵也兵可千日不用陳暄嗜酒其兄子秀以書諷之乃曰昔周伯仁渡江惟三日醖吾不以為少鄭康成飲三百杯吾不以為多又言酒兵也兵可千日不用不可一日而不偹又曰吾歿之後題其墓曰酒徒陳君之神道良醖令掌五齊三酒之事一曰汎齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊三酒一曰事酒二曰昔酒三曰清酒唐六典破除萬事無過酒韓愈贈鄭兵曹杯行到君莫停手破除萬事無過酒髙陽小飲真瑣瑣山公酩酊何如我李白送竇明府詩爾來未幾嵗散盡髙陽徒杜牧郢水醪李徳裕述夢詩曰荷静蓬池鱠冰寒郢水醪注夏至頒氷以酒味濃和氷而飲禁中有郢酒仙醴杜甫贈汝陽王詩仙醴求浮蟻溧陽酒樓三月春李白猛虎行凓陽酒樓三月春楊花忙忙愁殺人胡雛緑眼吹玉笛呉歌白紵飛梁塵千名春醪又千名酤𣙜二白沽酒市脯不食酤我詩曰無酒酤我黃公開肆卓氏當壚執榼數錢公酒周禮云日成月要周禮酒正日入其成月入其要嵗終則會注皆謂合計其用酒府酒正之府酒正酒官酒人造酒者酒官監之月令監察其造陳魯匡之謀收榮公之利貫酒髙祖從王媪武負貫酒每酤留飲酒酬數倍故二家常折劵棄債當壚司馬相如與卓文君臨卭買酒舍文君當壚相如與傭保雜作滌器千釀殖貨志一嵗千醸比千乗之家酤釀崔寔父卒賣田宅起塚塋立碑頌資産竭以酤醸販鬻為業貫酤呉潘璋字文珪居貧嗜酒好貫酤每曰候富貴當相還阮修以百錢挂杖頭沽酒黃公當壚王戎過謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此今思邈若山河不食孔子曰沽酒市脯不食折劵棄債見上注懸幟韓子宋人有酤酒懸幟甚髙斗槩甚平而沽不售問人人曰君家畜惡狗也十千曹植詩美酒斗十千梁市列仙傳酒客者梁市酒家之客作酒常美日售萬錢孔私釀王仲舒字宏中除江西觀察使㩁酒利多他州十八民私醸嵗抵死不絶榖數斛易斗酒仲舒罷酤錢九十萬吏坐失官息錢五十萬悉産不能償仲舒焚簿書脫械不問弛𣙜酒敬晦南方連饉有詔弛𣙜酒茗官用告乏追償崔植字公修為給事中時皇甫鏄請天下所納鹽酒利增估者以新凖舊一切追償植奏言用兵久百姓彫罄往雖估踰其實今不可復收於是議者咸罪鏄懼而止市酒李宻入闗為邏所獲與支黨護送帝所出所有金示使者使者顧金禁漸弛益市酒飲笑讙譁守者懈宻等遂夜亡去禁京城酤酒食貨志唐初無酒禁乾元元年京師酒貴肅宗以廪食方屈乃禁京城酤酒酒期以麥熟如初二年飢復禁酤罷𣙜酤徳宗帝紀大厯十四年辛邜罷𣙜酤酒翁段秀實傳郭晞士入市取酒刺酒翁壊醸秀實列卒取之已輸者弭怨見處者獲寧陸宣公奏議其𣙜酤等一切停罷則冀已輸者弭怨見處者獲寧金龜換酒賀知章一見李白呼謫仙人以金龜換酒與之共飲出唐摭言金魚換酒來何將軍山林詩杜甫碧䟽玲瓏含春風銀題綵幟邀上客韋蘇州酒肆行豪家沽酒長安陌一旦起樓髙百尺碧䟽玲瓏含春風銀題綵幟邀上客晴景悠揚三月天桃花飄俎桞垂筵繁絃急管一時合他壚隣肆何寂寞止宿酒店文粹吕才東臯子集序或乗牛騎驢出入郊郭止宿酒店動經嵗月郢酒坊李徳裕詩冰寒郢水醪注禁中有郢酒坊恰有三百青銅錢杜甫偪仄行街頭酒價常苦貴方外酒徒稀醉眠速來相就飲一斗恰有三百青銅錢造酒三禁酒附白為酒為醴詩六物月令仲冬命有司秫稻必齊麴糵必時湛熾必㓗水泉必香陶器必良火齊必得兼用六物母有差忒差忒謂失所也酒官監之若作酒醴爾惟麴糵五齊周禮酒正掌酒之政令辨五齊之名泛醴盎緹沈也式法作酒之法式也周禮酒財授酒人以財也周禮掌其薄厚之齊齊節也酒式周禮以酒式誅賞之注云誅賞其作酒之善惡也酒人造酒人也酒官監之見上注女酒三十人周禮注女奴曉酒也飲齊視冬時飲宜寒也千釀見上注三品晉劉𢎞為荆州室中云齊中酒聽事酒猥酒同用麴米而優劣三品𢎞云投醪尚三軍同醉豈得二其厚蒲自今不得分别桐馬酒漢師學士十二人給大官桐馬酒注以馬乳為酒採桐葉時乃成也臣瓉曰按武帝以馬家為桐馬似不為酒也禁酒椎破壚罌趙廣漢為京兆直突入博陸侯霍禹第門索私釀酤椎破壚罌斧破門闗孔融争後漢末年飢曹操表制酒禁孔融頻争之多侮慢之辭融難操書曰堯非千鍾無以建太平孔非百觚無以湛上聖云云由是觀之酒何負於理者哉中聖人魏志徐邈字景山為尚書郎時禁酒邈私飲至醉校尉趙逹問曹事邈曰中聖人逹白之太祖甚怒鮮于輔曰醉客謂酒清者為聖人濁者為賢人邈性修慎偶醉言耳竟免刑釀具蜀大旱先主禁酒有醸具並坐之巷無飲酒羣飲勿佚酒誥曰羣飲汝勿佚盡執拘以歸于周予其殺孔釀宜春酒李泌字長源泌請里閭醸宜春酒以祭勾芒神祈豐年帝恱乃著令弛禁薛戎字元夫遷浙東觀察使所部州觸酒禁者罪當死戎弛其禁酒器九品李適之酒器九品有蓬萊盞海川螺舞仙盞瓠子巵慢卷荷金焦葉玉蟾兒醉劉伶東溟様蓬萊盞上有山象三島注酒以出沒為限舞仙盞有闗捩酒滿則仙人出舞瑞香毬子落盞外出逢原記釀王汝陽王璉取雲夢石甃泛春渠以置酒作金銀龜魚浮沉其中為酌酒具自稱醸王兼麯部尚書出醉仙圖釀老春李白哭宣城善醸酒詩紀叟黃泉裏還應醸老春白酒初熟山中歸李白南陵别兒童冠絶當時文粹吕才東臯子集序時太樂有府吏焦革家善醖酒冠絶當時為酒譜一卷李淳風見而恱之終嵗醇醲味不移韋蘇州酒肆行深門潜醖客來稀終嵗醇醲味不移長安酒徒空擾擾路旁過去那得知呉姬壓酒喚客嘗李賀玉液金脂白公效陶潜造酒開缾㵼樽中玉液黃金脂持玩已可恱歡嘗有餘滋緑香芳烈太宗破髙昌收馬乳蒲萄種於苑中并得酒法仍自損益之造酒成緑色芳香酷烈味兼醍醐南部新書荷杯李宗閔善飲暑月臨池以荷為杯語林梨花春杭州其俗醸酒趂梨花時熟號梨花春長慶集注白雞盞唐朝野僉載桞亨飲未醉造白雞盞取其迅速鶴樽朝野僉載唐韓王元嘉有一銅鶴樽背上注酒則一足倚滿則正不滿則危側歇馬杯天寳遺事長安自昭應縣至都門官道村店民當大路市酒量錢數多少飲亦有施者與行人飲之故路人號為歇馬杯常持滿河東記汝陽王璡飲葉静能葉曰有一生徒能飲當令來謁翌日有通謁者曰常持滿見之侏儒也談胚渾之道飲以五斗忽醉倒乃瓮也衰年催釀黍杜甫詩汲河以釀地理志河中府河東有芳醖監汲河以醸酣醉四白墮車莊子云醉人墮車雖病不死其骨節與人同其犯難與人異畢吏部畢卓醉入比舍郎酒罋下卧酩酊無所知山公倒載見樂飲門載號載呶或號或呼不知其秩亦既醉止不知其秩亂我籩豆屢舞僛僛傞傞側弁之俄霑醉陳遵與客飲投轄井中取其霑醉憂心後漢劉寛字文饒於上前被酒睡上曰太尉醉耶對曰臣不敢醉但憂心如醉也腐脅弔婦父中聖人玉山之頹千日嘔車茵並見上注是曰既醉不知其尤孔使酒宗室景儉字寛中性矜誕使酒縱氣留宴大醉李勣留宴俄大醉帝親解衣覆之頹然長孫順徳削籍為民嵗餘帝閱功臣圖見其像憐之遣宇文士及視順徳方頹然醉醉死傅奕自誌曰奕青山白雲人也以醉死殫財費酣遊山寺鄭敬宣慰江淮帝誡曰卿是行宣諭朕意無若潘孟陽殚財費酣飲遊山寺沈于酒趙㳙沈于酒傲忽少檢慢宰相獨孤朗字用晦拜殿中侍御史坐與李景儉飲景儉使酒慢宰相出為韶州刺史挺笏擊姦臣顧少連裴延齡方横無敢忤者嘗與少連會田鎬第酒酣少連挺笏曰叚秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直在坐勸解之敢言叚平仲字秉庸磊落有氣節嗜酒敢言不持檢操薛廷老字商叟拜翰林學士酣飲不持檢操帝不恱醉謁獨孤用晦為中丞侍御史李道樞醉謁用晦用晦劾不虔下除司議郎醉辱楊炎字公南神烏令李太簡常醉辱之炎令左右反榜二百餘幾死酣醉乃去李徳裕李宗閔時李聽為太子太傅招所善客載酒集宗閔閣酣醉乃去至徳裕則諭御史冇以事見宰相必先白臺乃聽痛飲未嘗醒崔咸字重易累遷陜虢觀察使日與賔客僚屬痛飲未嘗醒夜分决事裁剖精明無一毫差吏稱為神飲酣泣下張濬字巨川為河東行營招討帝置酒安喜樓臨餞飲酣泣下曰陛下偪於賊臣願以死除之酣飫元徳秀字紫芝嗜酒陶然弹琴以自娯人以酒肴從之不問賢鄙為酣飫醉吟先生白居易自號醉吟先生為之傳卧客懐中陽城字亢宗召拜右諫議大夫及受命他諫官論事苛細紛紛帝厭苦而城寢聞得失且熟猶未肯言韓愈作争臣論譏切之城不屑方與二弟延賔客日夜劇飲客欲諫止者城揣知其情彊飲客客辭即自引滿客不得已與酬酢或醉仆席上城或先醉卧客懐中不能聽客語無得闗聞屬辭賀知章字季真每醉輙屬辭以水頮靣李白字太白有詔供奉翰林白每與飲徒醉于市帝坐沉香亭帝意有感欲得白為樂章召入而白已醉左右以水頮靣力士脫鞾白常侍帝醉使髙力士脫鞾力士素貴恥之呼呌狂走張旭蘇州人嗜酒每大醉呼呌狂走乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼張顚醉不能見王源中字正蒙進承旨學士源中嗜酒召之醉不能見及寤憂其慢不悔不得進也他日又如之遂失帝意李𤣥通見忠義門書夜酣飲五代張彦澤自以有功與契丹晝夜酣飲自娯因縱軍士大掠京師軍邏獲罪人彦澤醉不能問瞋目視之出三手指軍士驅出即㫁其腰領解醒具李嗣業入朝賜酒𤣥宗前醉舞帝寵之賜綵百金四五十物錢十萬曰為解酲具攻館下沙陀傳李克用過汴朱全忠邀之全忠忌克用桀邁難制克用醉乃攻館下親將郭景餘滅燭扶克用徐告之尚被酒乃引弓射㑹煙囂四合大震電克用與薛志勤等間闕升南譙門縋走營醉粧後蜀王衍後宫皆戴金蓮花冠酒酣免冠其髻髽然更施朱粉號醉粧國中人皆效之醉聖李白嗜酒醉後文尤竒號醉聖詔奪嶠官于嶠為安重誨所怒趙鳯即左遷嶠祕書少監嶠因被酒往見鳯鳯知其必不遜乃辭以沐髪嶠詬直吏又溺于從者直廬而去省吏白鳯鳯以其事聞明宗下詔奪嶠官淋浪身上衣顛倒筆下字初喧或紛争中静惟嘲戯淋浪身上衣顛倒筆下字韓文公醉後醉人為瑞唐徳宗播遷人多乏食無醸酒者後京師稍寧有一醉人聚觀以醉人為祥瑞輕王侯一醉累月輕王侯李白看朱成碧顔始紅同上賦詩得妓韋應物為蘇守嘗赴杜鴻漸宴醉歸宿傳舍既醒見二妓在側驚問之乃曰郎中席上與司空詩因遣某等問其時何言曰髙髻雲鬟宫様粧春風一曲杜韋娘司空見慣渾閑事㫁盡蘇州刺史腸唐宋遺史醉語李林甫每與同僚議及公直之事則如癡醉之人未嘗問答或語及阿徇之事則響應如流張曲江常謂賔客曰李林甫議事如醉者腦語也不足問可矣開元天寳遺事使酒罵坐呉世家楊隆演嘗飲酒樓上命優人髙貴卿侍酒徐知訓為参軍隆演鶉衣髽髻為蒼鶻知訓嘗使酒罵坐語侵隆演隆演愧恥涕泣而知訓愈辱之贈醉侯皮日休夏日詩云他年謁帝言何事請贈劉伶作醉侯熟酒為身謀杜甫晦日至今阮籍等熟酒為身謀客醉揮金椀崔駙馬宅詩讀醉鄉記吾少時讀醉鄉記私怪隐居者無所累於世而猶有是言豈誠㫖於味耶及讀阮籍陶潜詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也韓愈送王含昨日東城醉還應白接䍦李白醉後失天地兀然就孤枕同上常云恨不逢劉伶與閉戸轟飲吕才東臯子集序日酣遨未赴屯裴耀卿字煥之蓋嘉運為河西隴右節度使以新立功日酣遨未赴屯耀卿言於帝曰今酣呶朝夕胖肆自安非愛人憂國者唐史扶太白登舟范傳正李白新墓碑李白掌翰林専嘗宻命召公作序時公已被酒於翰苑中仍命髙將軍扶以登舟優寵如此漿五白漿人供六飲水漿醴凉醫酏蟻丘之漿賣漿之家見莊子十漿五漿列子之齊中道而反曰驚也吾食於十漿而五漿先饋言其敬也賣漿姜子牙少貧賣漿值天凉屠牛賣肉值天熱而肉敗義漿得玉雍伯孔獻漿王重榮傳帝徙石門帝毎出或獻飴漿帝駐馬為嘗民皆流涕取漿公㕑竇軌戒家奴毋出外忽遣奴取漿公㕑既而悔焉命斬奴一漿藩鎮李師道遣子𢎞方入侍既還師道中悔召諸將諸將議大將崔承度獨進曰公初不示諸將腹心而今委以兵此皆嗜利者朝廷一漿十餅誘之去矣師道恚冰漿杜甫詩冰漿椀碧碼碯寒具壺漿勸迎郭元振旌節下玉門闗去凉州猶八百里城中争具壺漿勸迎鹿角漿雲仙散録傳芳略記吐突承璀嗜蛤蜊炙以鐵絲床數澆鹿角漿然後食天漿舉瓢酌天漿韓愈詶張籍藍橋驛裴航歸輦下經藍橋驛渴甚求漿于茅舍見老媪方綴麻媪咄雲英擎漿來見箔下女子甚佳裴䤯傳竒龍腦漿江淮異人録自南唐保大中南海嘗貢龍腦漿能補益元宗嘗以漿調酒服之耿先生曰未為佳也乃以縑嚢貯龍腦懸於琉璃瓶中食頓曰已漿矣元宗聞滴瀝聲少頃視之一勺水矣明日發之半瓶香氣馥烈沽漿唐史食貨志中官為官市使每出沽漿賣餅之家皆徹肆閉門味如杏酪酉陽雜俎同州司馬裴沆往鄭有老人白衣曵杖而至裴覺非常人以丈人呼之因隨行纔數里至一庄竹落草舍庭蕪狼籍裴渴甚求茗老人指一上龕云此中有少漿可就取裴視龕中有一杏核一扇如笠滿中有漿漿色正白乃力舉飲之不復飢渴漿味如杏酪裴知隐者拜請為奴僕老人曰君有世間微禄縱住亦不終其志瓊漿自間於粢盛杜甫朝太清賦蔗漿明皇移入大内張后進蔗漿明皇不食楊妃外傳茶六白代酒呉志韋曜飲不過三升孫皓享燕以七升為限雖不悉入口皆澆灌取盡宻賜曜茶以當酒至寵衰更偪之供辦晉謝安常詣陸納納供辦設茶果而已寄信劉琨與兄弟羣書吾體中憤悶恒仰真茶汝可寄信致之供御温嶠表遣取供御之調條列真上茶千片茗二百大薄孔㩁茶使鄭注帝問富人術以㩁茶對其法欲置茶官籍名圃而給其直工自擷暴則利悉之官帝始詔王涯為㩁茶使官自治園令狐楚為鹽鐵轉運使先是鄭注建㩁茶使王涯又議官自治國植茶人不便楚請廢使如舊法從之諫增茶賦李珏字待價鹽鐵使王播增茶稅十之五以佐用度珏上疏謂㩁率本濟軍興而稅茶自貞元已來有之方天下無事忽厚歛以傷國體一不可茗為人飲與鹽粟同資若重稅之售必髙其弊先及貧下二不可山澤之産無定數程斤論稅以售多為利若價騰則市者稀其稅幾何三不可陛下初即位詔懲聚歛今反增茶賦必失人心帝不納著經三篇陸羽字鴻漸嗜茶著經三篇言茶之原之法之具尤備天下益知飲茶矣祀為茶神時鬻茶者至陶羽形置煬突間祀為茶神善煑茶有常伯熊者因羽論復廣著茶之功御史大夫李季卿宣慰江南次臨淮知伯熊善煑茶召之伯熊執器煎季卿為再舉杯著毁茶論季卿至江南又有薦羽者召之羽衣野服挈具而入季卿不為禮羽愧之更著毁茶論其後尚茶成風驅馬市茶時回紇入朝始驅馬市茶自判品第陸龜蒙字魯望嗜茶置園顧渚山下嵗取租茶自判品第張又新為水說七種其二惠山泉三虎丘井六松江人助其好者雖百里為致之㩁取茶利何易于為益昌令鹽鐵官㩁取茶利詔下所在毋敢隐易于視詔書曰益昌人不征茶且不可活矧厚賦毒之乎出鹽茗俾民輸帛楊行宻字化源議出鹽茗俾民輸帛幕府髙朂曰瘡破之餘不可以加歛且帑貲何患不足若悉我所有易四鄰所無不積日財有餘矣行宻納之八牀主人劉建鋒死馬殷代髙郁又教殷民得自摘山收茗筭募髙力置邸閣居茗號八牀主人鬻朱桃椎嘗織十芒屩置道上見者為鬻朱茗易之稅茶王紹遷倉部員外郎是時兵旱無年詔户部收闕官俸稅茶及無名錢以修荒政紹由員外判務自擷山為茶藩鎮劉仁恭禁南方茶自擷山為茶號山曰大恩以邀利變茶灋王涯始變茶法益其稅以濟用度下益困而鄭注亦議㩁茶天子命涯為使心知不可不敢争李訓敗乃及禍初民怨茶禁苛急涯就誅皆羣詬罵抵以瓦礫置邸務賣茶楚馬殷始修貢京師然嵗貢不過所産茶名而已乃自京師至㐮唐郢復等州置邸務以賣茶其利十倍受茶一串陸䞇字敬輿張鎰餉錢百萬止受茶一串曰敢不承公之賜緑華紫英唐杜陽編同昌公主上每賜饌其茶則有緑華紫英之號六班茶蠻甌志自樂天方齋禹錫正病酒禹錫乃饋菊苖虀蘆菔鮓換取樂天六班茶二嚢以自醒酒成象殿茶金蠻宻記故例翰林當直學士春晚人困則日賜成象殿茶練囊緘茶末唐李肇國史補韓晉公滉聞奉天之難以夾練嚢緘茶末遣使健步以進滌煩國史補党魯使西蕃烹茶帳中蕃使問何為者魯曰滌煩消渴所謂茶也蕃使曰我亦有之命取出以指曰此壽州者此顧渚者此蘄門者驚雷筴覺林僧志崇收茶三等待客以驚雷筴自奉以萱草帶供佛以紫茸香赴茶者以油嚢盛餘瀝歸出蠻甌志顧蘭露而慙芳豈蔗漿而齊味劉禹錫為武元衡謝新茶表效叅藥石芳越椒蘭同上驟雨飛聲入鼎來白雲滿椀花徘徊劉禹錫西山蘭若試茶歌顧渚貢焙唐制湖州造茶最多謂之顧渚貢焙嵗造一萬八千四百八斤大厯五年已後始有進奉至建中二年袁髙為郡進三千六百串并詩一章刻互具貢搴擷損絲枲而供搴擷劉禹錫文石花紫筍國史補茶名劍南有蒙頂石花湖州有顧渚紫筍峽州有碧澗明月花乳欲知花乳清凉味須是眠雲卧石人劉禹錫詩白泥赤印何况蒙山顧渚春白泥赤印走風塵茶治熱國史補故老云五十年前多患熱黃近代悉無而病腰脚者多乃飲茶所致也食七加膳㢘食奢盛附儉薄貪食白食為民天文選味以行氣氣以實志嘉肴雖有嘉肴弗食不知其旨食惟接氣見儉薄門味以平心君子食之以平其心忘憂魏子曰惟食忘憂不歎傳曰當食不歎非歎所也不語食不語美食美味飽食終日食我以禮少施氏禮爾肴既將既嘉肉食者鄙吉蠲為饎食也飲食醉飽書不時不食語蕙肴楚辭蕙肴蒸􅀆蘭籍初筵終飲置食之間三嘆閻沒汝寛傳吾豈得而食之一飲一食禮飲食以時禮大夫無秩膳未老者無秩膳有閣禮大夫七十而有閣閣食藏不辭孔子食於季氏不辭不食肉而餐以待巳非禮也無禮禮曰君子茍無禮雖美不食焉共飯不澤手覆餗鼎折足覆公餗徒食庶人耆老不徒食徒空也禮素餐無魚中置當食之中飱牽下箸何曾肉味忘味豐儉隨客早晚羊曼為丹陽尹客來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜臨海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆不如曼之真不食珍禮庶人無故不食珍禮之初始於飲食禮男女之大欲飲食男女之大欲存焉食其時百骸理君子以飲食宴樂易洪範八政一曰食尚書大傳曰八政何意先食食者萬物之始人之所本汝郁年五嵗母疾不能食郁亦不肯食母憐之强為之食歡言已愈郁視母顔色未平輙不食加膳飫賜傳曰賞為之加膳膳則飫賜之鄭伯享楚子加籩豆加籩季孫宿如晉晉侯享之有加籩奢盛厭精食不厭精變色有盛饌變色而作六和五味八珍豐饌文選云中㕑辦豐饌膏粱國語曰膏梁之性難正言食膏粱則性易驕擊鐘傳曰宋左師每食擊鐘列鼎家語子路南游於楚列鼎而食玉食美食六禽四膳窮海極陸七命曰六禽殊珍四膳異肴窮海之錯極陸之珍方丈墨子曰美食方丈口不能徧味目不能徧視孟子曰食前方丈厚味薄行管子曰臣聞厚於味者薄於行百品之味周禮百羞食庶庶人無故不食珍極口腹之欲不能反躬天理滅矣禮食浮於人浮過也茍秩膳之是踰則常刑而罔捨嘉肴巧食繁味周禮窮芻豢之味漿酒藿肉董賢賔客每食四簋秦詩於我乎每食四簋今也毎食不飽注四簋黍稷稻粱庶羞不踰牲餘粱肉怒待客豐謝安嘗欲過陸納但言納殊無供辦納兄子俶不敢問宻為具安至納唯設茶果而已俶遂盛饌珍羞畢具客去納大怒曰汝不能光益叔父乃穢我素業耶乃杖之四十二萬何劭敬徂食必四方珍異一日之供以錢二萬為限時論以大官御膳無以加之萬錢何曾字潁考厨膳滋味極於王者每燕會並不食大官所設帝輙令取其蒸餅不坼作十字不食日食萬錢猶云無下箸處下箸見上注極滋味任愷極滋味以自奉養初何劭以公子奢侈愷乃踰之儉薄菲飲食禹不貳味闔廬食不貳味退食自公退食減食也惡食士志於道而耻惡衣惡食者未足與議也昭儉傳曰粢食不鑿昭其儉也無餘不飽詩曰今也每食無餘每食不飽脫粟公孫𢎞藜藿七發曰予甘藜藿未暇此食充虛聖人食足以充虚接氣言儉也一簞食顔回不改其樂貶食傳不溽儒有其飲食不溽疏糲之食餬口正考父鼎銘曰饘於是粥於是以餬予口言儉也糲食漢書糲粱之食藜羮不糝孔子在陳人浮於食浮過也三杯朱博儉每食案上不過三杯傷性蔬食也不敢以傷吾子之性食淡吕后與陛下攻苦食淡食無肉劉虞為上公素飽易曰不素飽也樂飢可以樂飢無魚孟嘗君客馮煖歌曰長鋏歸來兮食無魚賔客嫌後漢井丹大春性髙未嘗修刺候人沛王等五王更請丹不能致信陽侯陰就要劫致之既至為設麥飯葱菜之食丹推去之曰云云何其薄乎更設盛饌乃食之㢘食不謀君子謀道不謀食無禮禮曰君子茍無禮雖美不食不食嗟來之食事見飢門壺飱傳曰趙衰以壺飱從輕餒而不食言其㢘仁且忠也不溽見上公儀休不受枯魚相魯也食時不力珍力務也食四時之食禮屬厭閻沒汝寛曰願以小人之腹為君子之心屬厭而已言厭足而休量腹文子曰聖人量腹而食言食不貪也節嗜慾薄滋味求飽食無求飽鮮食而寢薳子憑辭疾不素飽節飲食並周易貪食以極口腹之欲而無醉飽之心厭而飫之小人之腹屬厭見上注口爽五味令人口爽服腐腸之藥耽爽口之味七命滋味煎其府藏香芳腐其骨髓文選饕餮貪財與食貪于飲食傳飲食無度節嗜慾薄滋味薄於行管子曰厚於味薄於行厚味見上注求飽君子食無求飽人之大欲存焉困于酒食易豐衍之象朶頤易朶頤嚼物喻貪也自求口實將使鼈長而食國語云文伯飲南宫敬叔酒路睹父為客羞鼈小睹父怒曰將使鼈長而食之遂出孟嘗下客史孟嘗君待客夜食或蔽火光客怒以飯不等輟食辭去孟嘗起自將其飯比之飯乃麤客慙之自刎而死無魚之歎見儉薄門注羞鼈之嫌見上注恐其不足閻沒汝寛曰饋之始至恐其不足舉太山以為肉曹植詩過屠門而大嚼孔人天李宻既殺翟譲民食興洛倉者給授無檢至負取不勝委於道路踐輮狼扈密喜自謂足食司倉賈潤甫諫曰人國本食人天今百姓飢損暴骨道路公雖受命然頼人之天以固國本而廪取不節敖庾之藏有時而側粟竭人散胡仰而成功食必進雞馬周毎行郡縣食必進雞小吏訟之帝曰我禁御史食肉恐州縣廣費食雞尚何與榜吏斥之豐餘張文瓘初同列以堂饌豐餘欲少損文瓘曰此天子所以重樞務待賢才也吾等若不任職當自引避不宜節減以自取名衆乃止内㕑食常衮故事日出内㕑食賜宰相家可十人具衮奏罷之共食陽城字亢宗為道州刺史日炊米二斛魚一大鬵置甌杓道上人共食伴食盧懐慎自以才不及崇故事推而不専時議為伴食宰相日具三百人膳郗士美字和夫充昭義節度使盧從史時日具三百人膳以餉牙兵士美曰卒衛於牙固職也安得廣廢為私恩亦罷之不過一器桞公綽尉渭南嵗歉饉其家雖給每飯不過一器嵗豐乃復或問之答曰四方病飢獨能飽乎輟饔鄭珣瑜字元伯叔文一日至中書見執誼直吏方白宰相會食百官無見者叔文恚叱吏吏走入白執誼起就閤與叔文語珣瑜與杜佑髙郢輟饔以待頃之吏白二公同飯矣珣瑜喟曰吾可復居此乎辛酸節適桞宗元答許京兆書當食不知辛酸節適因噎廢食陸䞇諫曰昔人有因噎而廢食者又有懼溺而自沉者其為防患不亦過乎日晏設食盧懐謹日晏設倉蒸豆兩器菜數杯而已噬禽獸咀菓榖桞宗元貞符曰惟人之初飢渇牝牡之欲敺其内於是乃知噬禽獸咀菓榖日極珍膳五代蘇逢吉已貴益為豪侈謂中書堂食為不可食乃命家㕑進羞日極珍膳日膳豆䜺張孝忠日膳豆䜺未嘗具五味而飡元徳秀家苦貧未嘗具五味而飡窮治饌羞韋陟性侈縱窮治饌羞併日韓思復永淳中家益窶嵗飢倂日食甘足蔬糗啖助調臨海尉丹陽主簿秩滿屏屈甘足蔬糗一饍傾千家唐文粹李華言醫鴨肝豬肚王晉飲酒非鴨肝豬肚筯輙不舉出醉仙圖狀如棗楊埏遊王珙家食一物狀如棗核而中空其實麫也詢其法笑而不答出河中記一飲食必費萬錢趙巖自以有功于梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐耻其不及乃占天下良田大宅裒刻商旅其門如市租傭之物半入其私巖一飲食必廢萬錢五代史趙犫傳四十二朝共琅玕之綺食李白寄逺贈以詩勝爛黃魚皇甫湜謁韓愈愈贈以詩怨愈不為置酒愈曰豈不勝以爛黃魚待汝邪魚菜贍呼童具盤飡飣餖魚菜贍韓愈精良海陸評飲食必以精良海陸為貴夢得論書甖鵝籠驢李令問開元中為殿中監事饌酷好甖鵝籠驢南部新書腸肚集藜莧三年國子師腸肚集藜莧韓愈綺食象牀綺食黃金盤李白畜豢天養人李令問飲食至躬親視刲宰有譏之者答曰畜豢天所以養人與蔬果無異何用妄生分别耶古之不農而食之者四而已元稹制䇿古之不農而食之者四而已吏有斷察之明則食之軍有臨敵之勇則食之工有便人之巧則食之商有通物之志則食之愈於飽食元稹寄樂天書是用悉所為文留穢箱笥比夫格奕樗塞之戲猶愈於飽食貧饌羞齷齪韓文聮句水陸擇味以給膳羞桞宗元與楊誨之書置食其前國貞持節朔方治于綘尋加晉綘慈隰沁等州觀察處置使既至糧乏而所儲陳腐民貧不忍遽歛上書以聞而軍中讙謗突將王振乗衆怨紿曰具畚鍤以待役事衆皆怒夜燒牙門左右奔告請迎之國貞曰吾被命為將其可棄城乎固請乃逃獄中振引衆劫取之置食其前曰食是而役其力可乎國貞曰與爾等方討賊何事役為正縁儲食腐儉已請諸朝吾何所負衆服其言且引去屠沽兒有酒食唐文粹陸龜蒙杞菊賦天隨生宅荒少牆屋多隙地著圖書所前後皆樹杞菊得以採擷及夏五月枝葉老硬氣味苦澁旦暮猶責兒童輩拾掇不已人或嘆曰千乗之邑非無好事之家日欲擊鮮為具以飽君者多矣君獨閉闗不出率空腸貯古聖賢道徳言語何自苦如此生笑曰我幾年來忍飢誦經豈不知屠沽兒有酒食邪退而作杞菊賦以自廣云一日不食則憊二日不食則病三日不食則死民事之急無甚於食宋齊丘化書煎和八白司味膳宰屠蒯曰臣實司味平心齊味傳曰水火醯醢以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心故人之濟五味而和五聲以奉五味為六畜五牲三犧以奉五味也以炮以燔以烹以炙五味六和加以滑甘時味凡和春味多酸夏多苦秋多辛冬多鹹調以滑甘時味所以養氣燔炙芬芬煎熬七發曰使伊尹煎熬易牙調和適和調辛甘受和五味之變不可勝嘗文子鹽梅若作和羮爾惟鹽梅煎和滋味濟以鹽梅拂徹羶腥加之薑桂調節五味滑甘見上注膳禽禽獸也周禮凡用禽獻春宜羔豚膳膏薌薌牛脂夏宜腒䐹膳膏臊臊犬脂也腒乾雉也䐹乾魚也秋宜犢麛膳膏腥腥豬脂冬宜鮮羽膳膏羶羶羊脂也鮮魚也羽鴈也膳謂脂膏煎和割烹周禮水火之齊多少之節刀匕是供禮杜蕢云君子逺庖㕑禮味得其時時所宜也禮烹餁調和之器鸞刀執其鸞刀以啓其毛羞服之式周禮九式四曰羞服之式主領飲食膳羞膳夫掌王膳羞以養王及后世子珍用八物炮鼈膾鯉王日一舉鼎火化身踐凡有血氣之類不身踐也踐音翦逺庖㕑也秩膳秩常也天子諸侯也不給於鮮子有軍事獸人無乃不給於鮮洎饋傳公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋洎汁也膳獻禽羞刲之刳之糔溲為稻粉糔溲之捶而食之乾肉則捶而食之良庖㕑車載食車宿肉禮六十不宿肉調之以醯醢内則切葱若薤實醯以柔之屑桂與薑孔和之齊之裴潾帝喜方士潾諫曰水火鹽梅以烹魚肉宰夫和之齊之以味君子食之以平其心沉泛緹盎之齊桞宗元嶺南節度饗軍堂記沉泛緹盎之齊均飫于卒士燔炮烹飪桞宗元新食堂記燔炮烹飪約水燥薪爨火以觀文武之用而已文粹沈亞之上李諫議書夫治鼎之職約水燥薪爨火以觀文武之用而已其輳味則有椒桂梅醯鹽醢之品在吾搃衆勞而調於心也燒尾景龍中蘇瓌拜右僕射初拜官者例各進食名曰燒尾瓌無所進曰宰相調陰陽今粒食踊貴百姓不足臣愚不稱職不敢燒尾景龍記白孔六帖卷十五
