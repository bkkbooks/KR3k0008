body:
  text: 白孔六帖卷六十五唐白居易原本宋孔傳續撰弔一賻贈二唅襲檖三助喪四葬五送人喪歸六遣車七喪期八弔一白贈生芻弔生不及哀弔禮哀弔周禮羔裘元冠不以弔喪主素也孔子哭子路於中庭有人弔者而夫子拜之為主也舊館一哀出涕遂脫驂賻之辱臨其喪來弔弔於人是日不樂君子有哀樂不同日五十無車者不越疆而弔人行弔之日不飲酒食肉以全哀也弔於葬者必執引若從柩及壙皆執紼知生者弔知死者傷知謂與之相知知生而不知死弔而不傷知死而不知生傷而不弔傷弔須異辭宜弔不弔有司罰之弔喪不能賻不問其所費禮喪事不特弔卑者不特弔尊者謂煩也必俟朝夕哭時也魯婦人之髽而弔自敗於臺鮐始也去纚而紒曰髽子游裼裘而弔曾子曰非也主人既小歛袒括髮子游襲裘帶絰而入曾子曰我過矣夫夫是也禮主既變客乃變婦人不越疆而弔人踰封也齊衰不以弔殷人既封而弔周人反哭而弔孔子曰殷已慤吾從周畫宫受弔哀公使人弔蕢尚遇諸道避於路畫宫而受弔焉曽子曰蕢尚不如杞梁之妻之猶知禮也郊弔齊侯遇杞梁之妻於郊使人弔之辭曰有先人之敝廬在下妾不得與郊弔三年之喪雖功衰不弔如有服而將徃哭之則服其服而徃功衰既練服也既喪大功弔哭而退不聽事焉期之喪未葬弔於鄉人哭而退大功衰弔待事不執事小功緦麻執事不於禮禮奠饋也相趨也出宫而退謂相趨姓名而㑹於喪事也相揖也哀次而退嘗㑹於他者相問也既封而退嘗思惠遺相見也反哭而退嘗相執贄相見朋友虞祔而退此五者思厚薄遲逺之節殷人弔於壙周人弔於家示民不偝也周人弔魯人不弔穀梁云周人魯人皆有喪周人弔魯人不弔周人曰吾臣也使人可也魯人曰吾君也親之者也使大夫則不可也故周人弔魯人不弔大夫之喪庶子不受弔曽子問三年之喪弔乎子曰三年之喪練不羣立不旅行君子禮以飾情三年之喪而弔哭不亦虚乎不弔者三畏壓溺既除喪而後弔衛將軍文子之喪既除喪而越人來弔深衣練冠待於廟垂涕洟子游曰其庶幾乎動也中子張死曽子有母之喪齊衰而徃哭或曰齊衰不以弔曽子曰我弔也與哉於朋友哀痛甚哭之非若凡弔事弁絰服服如爵爵弁素冠而加環絰不知名漢龔勝死有父老弔之甚哀曰膏以明目煎龔生竟夭天年人莫知其名也投弔揚雄作反騷自岷山諸江弔屈原生芻郭林宗親喪㑹者甚多徐孺子不言姓名來弔之置生芻一束於前而去人告林宗林宗曰必徐孺子也詩曰生芻一束其人如玉吾無徳何以堪之無雜弔之賔晉太保王祥薨奔喪者非朝賢則親親門無雜弔之賔也主人不哭晉阮籍母終裴楷徃弔之籍醉登牀直視楷行弔禮畢去或問主人不哭何以行禮楷曰阮方外士我俗中士宜以軌儀自居時議以為兩得其道也不弔主人顧榮好琴及卒家人置琴於靈牀吳郡張翰徃哭之慟既而上牀鼔琴數曲嘆曰顧彦先復能賞此不入慟哭不弔喪主而去鶴弔陶侃親喪有人弔之出門化白鶴飛去王衍喪子山濤弔具喪子門裴頠弔王戎具弔喪越禮門主人哭不前而反王羲之代王述為㑹稽太守少齊名而羲之輕述述母喪羲之心止一弔竟不重詣後言徃弔入門主人哭不前而反欲以辱之述甚恨也醉弔王悦字元達弱冠知名恃才放酒誕節慕王澄為人婦父嘗有慘悦乗醉弔之婦父哭慟悦與賔客十許人連臂被髮裸身而入繞之三匝而出後為荆州刺史而卒禮弔三十者執紼鄉人五十者從反哭四十者待盈坎優老者非鄉人則長㓜皆反優逺也青蠅為弔虞翻流交趾將去死云云及哀未除喪時已慤殷既封弔惠子來弔莊子妻死孔乞不臨喪髙士廉卒帝又欲臨弔房元齡以帝餌金石諫不宜近喪帝曰朕有舊故姻戚之重君臣之分卿置勿言即從數百騎出長孫無忌伏馬前陳士廉遺言乞不臨喪帝猶不許無忌至流涕乃還命瘞埋弔祭劉仁軌髙麗百濟餘黨悉平詔劉仁軌統兵鎮守百濟再被亂僵屍如莽仁軌始命瘞埋弔祭焉詩弔白居易卒宣宗以詩弔之中人臨弔李嗣業卒葬日使中人臨弔入赴弔者日數百馬璘治第京師侈甚及喪歸都人争入觀假稱故吏入赴弔者日數百設席行弔禮衛大經蒲州解人素善魏夏侯乾童聞其母卒盛暑徃弔或止之曰方夏渉逺不如致書答曰書能盡意耶比至乾童以事行乃設席行弔禮不語其家而還赴第臨弔尉遲恭卒髙宗詔京官五品以上及朝集使赴第臨弔獨弔叔寳秦叔寳始為隋將來䕶兒遣使襚弔之吏怪曰士卒死喪將軍未有所問今獨弔叔寳何也䕶兒曰是子才而武忠節完整豈久處卑賤耶賔客未嘗至柩室齊澣母亡受弔廬前賔客未嘗至柩室語人曰平生非至親不升堂入謁豈以存亡變禮耶中使弔祭張曲江元宗追嘆曰自公殁後不聞讜言發中使至韶州弔祭孔戡公卿大夫士相弔於朝處士相弔於家韓文墓誌顔色聲容七嵗而正孝公卒來弔哭者見其顔色聲容皆謂權氏世有人權公碑聞弔客至輒號泣韓文獨孤郁誌大官始十嵗有至性聞呼父官與聞弔客至輒號泣以絶遣郎中臨弔韓文李惟簡誌訃至上悼愴罷朝遣郎中臨弔上下弔哭皆曰善人死矣韓文權公墓誌上下弔哭皆曰善人死矣天涯弔鶴來李白詩自大殮至卒哭皆中人臨弔李吉甫卒自大殮至卒哭皆中人臨弔哭門内蕭穎士遷為集賢校理李林甫欲見之頴士方父喪不詣林甫嘗至故人舍邀頴士頴士前徃哭門内以待林甫不得已前弔乃去怒其不下已王公希代寳弃世一何早弔死不及哀殯宫已秋草李白詩弔賔至掌次者引之次賔着素服相者入告内外縗服相者引主人以下立哭於阼階下婦人升哭於殯西相者引賔入立於庭北靣西上為首者一人進當主人東靣立云如何不淑主人哭再拜稽顙為首者復北靣位弔者俱哭十餘聲相者引出少頃相者引主人以下各還次通典詔百官如第弔遣使㑹弔楊綰薨帝驚悼詔贈司徒遣使者冊授欲及其未歛也詔百官如第弔遣使㑹弔賻贈二不受附白知生贈死不及尸賻補謂賻贈死者以補助其不足周禮脫驂而賻孔子之衛遇舊館人之喪入而哭之遇一哀而涕使子貢脫驂而賻之子貢曰於門人之喪未有所脫驂脫驂於舊館無乃已重乎子曰予向者入而哭之遇於一哀出涕予惡夫涕之無從也小子行之言人盡哀是以恩厚待我我為之哀是以思有施惠禮子栁之母死既葬子碩欲以賻布之餘具祭器子柳曰不可吾聞之君子不家於喪請班諸兄弟之貧者布帛布也家於喪謂因死者以為利班分賜之也弔喪不能賻不問其所費禮賵賻贈唅禮遺縑後漢王丹字子有同門生喪親徃弔之公怒撻之令遺縑而已或問之丹曰交友之難終也伯髙之喪孔氏之使者未至冉子攝束帛乗馬而將之孔子曰異哉徒使我不誠於伯高徒空也禮貴誠信司徒旅歸四布旅下土也使歸四方賻布賻者既致命坐委之擯者舉之主人無親受也喪者非尸柩之事不親也魯人之贈也三元二纁廣尸長終幅言失之也贈用制幣元纁束幣也書賵於方方版也書遣於䇿䇿簡也車馬曰賵衣衾曰襚錢財曰賻穀梁上介賵陳路車乗黄於中庭北輈執圭將命禮穀梁武子來求賻歸死者曰賵歸生者曰賻歸之正也求之非正好施周急後漢王丹字仲回好周給有喪者則賻給親自營䕶後遭喪者輒待丹為辦出自機杼河南太守陳遵關西大俠也其友人喪親遵賻助甚厚丹乃懐縑一匹陳於主人前曰如丹此縑出自機杼遵聞有慙色周禮宰夫供賻賵并器幣凡諸侯喪賻補之補助不足之義讀賵袒而讀賵非古賵馬不入廟門以其主於死者也禮生芻之贈徐孺子弔郭林宗也不受賻贈附原渉讓南陽賻送漢原渉字仁先父為南陽太守時二千石死官賦歛送喪皆千萬已上妻子受之以定産業陟乃讓南陽賻送行喪廬塜於是知名戒子不受歐陽地餘貴幸至少府戒子曰我死官屬送汝財勿受也子如父命天子嘉之賜錢百萬作先書告子何並受潁川守召丞掾曰作先書告子昭曰吾生素餐日久雖得賻勿受注先書先遺令管寧稱財送終魏志管寧年十六喪父中表愍其孤貧咸共賵賻悉辭不受稱財以送終也孔賻賵田神功死賻賵絹千疋布五百端百官弔喪上賜屏風茵褥飯于桑門追福賵禮優縟裴度薨賵禮優縟贈弔皆讓不受竇建徳父卒里中送葬千餘人所贈弔皆讓不受諸方賵遺一不取陸䞇以喪解官客東都諸方賵遺一不取惟韋臯以布衣交先以聞故所致輒稱詔受之賜粟帛孔巢父卒賜其家粟帛存恤之給俸為賵鄭餘慶帝以其貧特給一月俸料為賵襚密印加榮於厚夜紫書忽降於九重劉禹錫為杜司徒謝追贈表以篚奉𤣥纁唐志賔有贈者既祖奠賔立於大門外西廂東面從者以篚奉𤣥纁立於西南相者受命出西靣曰敢請事賔曰某敢賵相者入告出曰孤某須矣執篚者奠取幣以授賔賜之布粟其葬物有司官給之韓文許公碑椎暴卉裳來賻來親柳丈李中丞墓誌絹布二千段粟三千斛房𤣥齡薨給使者立於大門外之西東靣從者以篚奉元纁束帛立於使者之西南俱東靣凡賻通以貨賵相者入告主人立哭相者進主人前東靣受命出詣使者前西靣曰敢請事使之從者以篚進詣使者前西向以授使者退復位使者曰某封若某官無官封者即稱某子使某賻相者入告出曰孤某須矣相者引使者入立於内門外之西東靣主人止哭使者少進東面曰某封若某官使某賻主人哭再拜使者少進坐委之興復位掌事者進坐舉之興以束相者引使者出主人拜送若使者致物不以器掌事者訝受之不委於地通典三品已上贈以束帛一品已上加乗馬引又遣使贈於國門之外皆以束帛加璧六典賻絹千匹布三百匹楊綰本傳其厚贈恤之李勣卒帝曰勣奉上忠事親孝厯三朝未嘗有過性廉謹不立産業今亡當無贏貲有司其厚贈恤之賻布祕器尤厚崔敦禮卒髙宗為舉哀東雲龍門賻布祕器尤厚凡職事官薨卒皆有賻贈唐六典禮部注文武一品賻物二百段粟二百石二品物一百五十段三品物一百段正四品物七十段從四品物六十段正五品物五十段從五品物四十段粟各准物數正六品物三十段從六品物二十六段正七品物二十二段從七品物十八段正八品物十六段從八品物十四段正九品物十二段從九品物十段王及二王後若散官以理去官三品已上全給五品已上給半若身死並依職事給其别勑賜物者不在折限而應給者從多給服已終則不給唅襲襚三白禮邾婁考公之喪徐君使容居來弔唅曰寡君使容居坐唅進侯玉有司曰諸侯之來辱敝邑者易則易于則于易于雜者未之有也易臣禮也于君禮也雜者容居人臣而行君禮也王使榮叔來歸唅且賵傳秦人來歸僖公成風之襚傳飯用采貝不忍虚也貝玉曰唅賵以早唅以晚諸侯伐秦曹宣公卒於㑹諸侯請唅使之襲襲非也賤者事也襄公朝于荆康王卒荆人曰必請襲傳曰楚人使公親襚襚亦襲也使臣當親襚楚卑襄公同於使臣也魯人曰非禮也荆人彊之巫先拂柩荆人悔之巫祝以桃茢先拂殯君臨臣喪之禮柳莊死公不釋祭服而徃遂以襚之脫君祭服以襚之親賢也諸侯相襚以後路與冕服先路與襲衣不以襚不以己之正施於人也襚者曰寡君使某襚執冕服左執領右執要入升堂致命委衣於殯東唅者執璧曰寡君使某唅子拜稽顙唅者坐委于殯東南傳荀偃卒而視不可唅見前口閉范宣子撫之乃瞑受唅齊吳戰于艾陵陳子行命其徒具唅玉亦將死也無傷口中珠莊子儒以詩禮發冢大儒曰東方作矣事之何若小儒曰未解裙襦口中有珠詩曰青青之麥生於陵陂生不布施死何唅珠為儒以金槌控其頥徐别其頰無傷口中珠也口中有珠死何唅珠為見上注記諸侯使人弔其次唅襚贈臨皆同日其次如此也五者同時而相次也司士賁請襲於牀子游曰諾縣子曰汰哉叔氏專以禮許人當言禮不當言諾汰者自矜大也贈死不及尸傳臣致襚於君則曰致廢衣於賈人記含人共飯米熬穀敵者曰襚孔家無珠玉為含李大亮卒年五十九將殮家無珠玉為舎帝哭為慟有司備物文粹權徳輿咸寕王澤公神道碑賻襚弔祠有司備物以尊以飾同上襚印易名以尊以飾納飯含於尸口唐志贊者奉盤水及䈂一品至於三品飯用粢含用璧四品至於五品飯用稷含用碧六品至九品飯用粱含用貝其升堂含者盥手於户外洗梁璧實於笲執之以入祝從入北面徹枕去衾受笲奠於尸含者坐於牀東西靣鑿巾納飯含於尸口剔取含珠李林甫斵棺剔取含珠金紫更以小㨹用庶人禮葬之唐史陳襲事於房内襲衣三稱六品以下一稱西領南上明衣裳舄一帛巾一方尺八寸充耳用白纊靣衣用元方尺纁裏組繫掘手用元纁裏長尺二寸廣五寸削約於内旁寸著以綿組繫庶襚繼陳不用將襲具牀席於西階西内外皆出哭於户外其位如浴時襲者以牀升入設於戶東布枕席如初執服者陳襲衣於席祝去巾加靣衣設充耳著握手納舄若履既襲乃覆以大殮之衾内外俱入復位坐哭通典凶禮唐制王公以下之喪贈襚衣服出當時恩制及不著於典同上助喪四白凡民有喪匍匐救之詩弔非從主人言必助主人執事弔喪不能賻不問其所費禮原壤之母死夫子助之沐槨主辦漢項梁在呉吳人喪梁嘗主辦部署豪傑後校尉一人不得官自言梁曰某時喪使公主某事不能辦云云衆乃服之待丹為辦見上賻贈門傳曰孟氏將辟籍除於臧氏臧氏使正夫助之先徃後罷陳平家貧每助喪以先徃後罷為助適公卿之喪則曰聽役於司徒臣如致金玉貨貝於君則曰致馬資於有司敵者曰贈從者臣為君喪納貨貝於君則曰納甸於有司孔身為治喪何蕃和州人居太學二十年有死喪無歸者皆身為治喪以俸敕吏為辦何易于為益昌令民有死喪不能具葬者以俸敕吏為辦解牛與給喪事竇建徳郷人喪親貧無以葬建徳方耕聞之太息遽解牛與給喪事鄉黨異之舉與之無少吝郭元振為太學生家嘗送資錢四十萬㑹有縗服者叩門自言五世未塟願假以治喪元振舉與之無少吝亦不質名氏歸葬韓文柳子厚誌其得歸葬也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚亦為之盡竟賴其力葬五厚葬殉葬薄塟塟合塟知送塟不獲不存亡冐法塟誅者附白昊天降㓙逺日協吉孝無終始喪紀葬事三月終堂稱宅蒿里莠言下里從先大夫於九原卜葬先逺日避不懐也窀穸之事慎終追逺死葬之以禮子思曰凡附於身者必誠必信勿之有悔焉耳矣附身衣衾也既葬皇皇如有望而不至憂悼之貎如慕如疑禮衞有送葬者而夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善彼也曰其徃也如慕其反也如疑子貢曰豈若速反而虞乎子曰我未之能行也言喪以哀為主不食之地成子髙曰生無益於人吾何以死害於人乎哉我死則擇不食之地而葬我云云國子髙曰葬也者藏也藏也者欲人之不得見也是故衣足以飾身棺周於衣椁周於棺土周於椁反壤樹之哉既葬慨焉顔丁善居喪既葬慨焉如不及其反而息記子曰衛人之祔也離之魯人之祔也合之善夫祔合葬也合謂棺中無間送形而徃謂葬迎精而反謂迎精誠而反日中而虞哀親之在土也開白日之銘卜青鳥之兆送子長夜臺靈轜喪車喪事不敢不勉夫子云三日而殯三月而葬天子七月同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至臨穴能以孝終哀以送之送葬卜其宅兆墓也葬備大葬禮葬孝貴慎終葬宜以禮茍聞不度豈曰無違反葬禮太公封營邱比及五世皆反葬於周君子曰禮不忘其本狐死正邱首仁也即逺禮小歛於户内大歛於阼殯於客位祖於廷葬於墓所以即逺也請具葬之具也子柳之母死子碩請具子柳曰何以哉子碩曰請粥庶弟之母葬子柳曰其粥人之母以葬其母也不可也遣車葬時載牲車也大夫已上有之日月有期葬期也公叔文子卒其子戍請謚於君曰日月有期將葬矣請所以易其名者也從死禮葬從死者謂葬禮父為大夫子為士葬以大夫祭以士絞紟衾冒棺中之具地藏謂葬也送死筮宅祔葬者不筮先塋不改小墓楄柎以藉幹者楄拊棺中人苓牀也幹骸骨也宋公將死左氏古之葬者厚衣以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過易繫辭禮葬於北方北首三代之達禮也葬妻犯禾季子臯葬妻犯人之禾由祥請更之子臯曰孟氏不以是罪予朋友不以是弃予以吾為邑長買道而葬後難繼也葬子延陵季子喪長子葬於嬴博之間孔子曰季子呉之習於禮者徃而觀之其坎深不至於泉其斂以時服廣輪揜坎其髙可隱也既窆右旋左袒其封且號者三曰骨肉歸復於土命也若魂氣則無不之也襄事傳葬敬嬴雨不襄事禮也注襄成也雨中成事嫌若汲汲於葬也葛茀葬敬嬴旱無麻始用葛茀庶人葬不為雨止夫柩不早出不暮宿下殤用棺衣斂自史佚始父母之喪偕先葬者不虞祔待後事注葬先輕後重葬畢辭賔遂脩葬事傍置萬家韓信母喪無以葬乃行營髙燥地令傍可置萬家葬鰥寡黄覇次公為潁川鰥寡孤獨有死無葬者覇為區處曰某所大木也可為棺某亭豬子可以祭吏徃皆如言給轊成詔水所厭死者給轊葬廣柳車廣柳車喪車也夀藏圖先賢後漢趙岐將卒先為夀藏圖季札子産晏嬰叔向四賢像於賔位畫己像主位皆為讃墓近先賢梁鴻病告主人曰慎勿令我子持喪歸及卒王伯通葬於要離烈士伯鸞請宜相近又魏田豫戒子曰葬我必於西門豹邉妻子曰豹古之神人那可葬其邊曰豹履行與我適等死有靈當與我善也歸葬留葬晉王祥二子芬烈將死烈欲還葬舊鄉芬欲葬京邑祥泣曰不忘鄉土仁也不戀本達也唯仁與達吾二子有焉不歸葬晉王褒與管彦許為㛰彦葬父河南褒更嫁其女謂彦弟馥曰賢兄葬父洛陽則京邑人也非結好本意馥曰嫂齊人也當還齊褒曰安有葬父河南而隨父還齊用意如此何婚之有坐不歸葬陳夀字承祚為治書御史母遺言葬洛陽夀不遵其㫖夀巴西安漢人坐不以母歸葬又父喪使婢丸藥沉累數年招魂葬晉東海越王尸為石勒所焚妃裴氏求招䰟葬朝廷疑之袁瓌山甫議以為招魂葬所謂埋神不可從以鼓封為縱舍節禮也葬鮮者自西門不以夀終為鮮西門非正門也傳又招魂葬後漢鄧晨娶世祖姊新野公主遇害後晨卒詔令招公主魂與晨合葬也反葬於周具反葬門遺令不歸葬後漢崔瑗子玉臨終命子曰人終歸精於天還骨於地不可不藏形勿歸鄉里子實字子真奉遺令葬於洛陽也周禮喪祝掌大喪勸防之事鄭司農云勸防引棺也元謂勸猶倡率前引者防謂執備傾毁也夢求歸葬後漢河南温序次房死節世祖葬洛陽子夀夢曰久客思鄉乃乞骸骨歸葬葬書生王忳路行遇書生病下車省之生云我腰下有金請取之鬻以葬我未及問姓名而絶忳賣金葬之餘金亦埋之云云葬骸骨後漢曹襃字通為射聲校尉營舍有停棺不葬者百餘所吏曰建武已來絶無後者襃買地葬設祭以禮送之哭聲陳寵昭公為廣漢守先洛陽城南毎陰雨常有哭聲寵使使案行多骸骨不葬者勑縣盡牧葬哭聲自絶葬除鄭簡公卒將為葬除及游氏之廟子産乃使避司空之室毁則朝崩不毁則日中而崩子太叔曰若諸侯之賔何子産曰能來㑹吾喪豈憚日中君子謂子産依禮也機封季康子之母死公輸般請以機封將從之公肩假曰不可夫魯有初公室視豐碑三家視桓楹爾以人之母嘗巧則豈不得以其母嘗巧者乎則病者乎厚葬有豐有省死害於人喪不慮居謂無廟也謂賣宅以奉喪宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜皆僣王禮君子謂華元樂舉於是不臣君生則縱其惑死又益其侈是弃君於惡也何臣之為何厚葬焉顔淵死門人欲厚葬之子曰不可門人厚葬之子曰何傷財過禮傷生過數執必以誠爾雖有說謂之中禮吾則不知石槨桓司馬為石槨三年不成子曰若是其靡也死不如速朽之愈也送死傷生孝在慎終雖云勿悔葬不以禮豈曰無違所宜薄以稱家安用厚而破産儉而失禮遣車雖誚於晏嬰厚則傷生重器終慙於樂舉求備去奢禁奢漢文薄葬令光武詔曰曽子竭歡致飬仲尼葬子有棺無椁其令天下薄葬又召信臣翁卿為南陽守視人如子禁送終奢靡榆沈設撥孺子􅀈之喪哀公欲設撥問於有若有若曰其可也三臣猶設之顔柳曰天子龍輴以槨幬諸侯輴而設幬為榆沉故設撥三臣廢輴而設撥竊禮之不中而君何學焉注撥可發輴車也榆沈以榆汁澆地利其滑易進也五侯樓䕶出入五侯之門咸得歡心母喪送葬治喪車三千兩人語曰五侯治喪樓君卿千乘劇孟母喪送葬蓋車千乗也晉侯請隧隧埏道也天子之禮也諸侯懸棺而封大臣葬漢太師孔光薨賜祕器載以乗輿輼輬起墳如大將軍制度也韋賢陪陵昭帝時徙平陵元成徙杜陵病且死因使者曰不勝父子情願得葬父墓上許焉賜塋陪陵後漢太尉楊秉薨賜塋陪陵薄葬子游問喪具子曰稱家之有無儉無過禮斂手足形還葬懸棺而封人豈有非之者哉遣車一乗有若曰晏子一狐裘三十年遣車一乗及墓而反晏子焉知禮注遣車載牲者禮大夫五乗而晏子一乗言偪下也還葬子路曰傷哉貧也生無以為養死無以為禮子曰斂手足形還葬而無椁稱其財斯之謂禮還葬不待日月也貶禮禮曰大夫廢其事終身不仕死以士禮葬之注貶之也物既偞卑謂用卑薄之物不中禮也偞墮頰反禮將偪下孝貴有終豈宜不勉華或非禮孰謂無違儉宜合禮孝不貶親法惟辨貴送死之禮有差孝在慎終勿悔之心宜勉未可厚而破産亦宜薄以稱家亦宜勉以稱情求備去奢載以牛車漢張湯自殺兄弟欲厚葬母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺無椁鯉也死有棺而無椁豐儉中禮有無稱家執以稱家爾雖有說謂之合禮吾則不知儉而中禮土周於棺太山太守嚴望終於家遺言以身服歛棺周於身土周於棺也臝葬楊王孫學黄老術及病終令其子曰臝葬以反吾真其子不忍又重廢父命乃見父友祁矦祁矦與王孫書曰子欲臝見先人於地下乎王孫報云云遂臝葬不用棺槨後漢盧植字子幹臨卒勑其子儉葬於土穴不用棺槨堯典周盤令二子曰桐棺足以周身簡堯典一篇并刀筆各一致棺前不忘聖道聚沙為牀趙岐邠卿遺令子曰墓中聚沙為牀布簟白衣散髪其上覆以單被即日便下孝經晉皇甫謐令氣絶時便以幅巾令逐篨孝經一卷示不忘孝道葬妻中野符融妻卒貧無以葬鄉人助之融曰古之葬者衣以薪葬之中野唯妻子得行其志下不亂泉上不洩臭張奐令以幅巾葬曰奢非桓文儉非王孫自貶楊震臨死曰不能誅患身死雜木為棺布單盖形勿歸冢次勿設祭祀也阻逺不歸張覇伯饒蜀人也為㑹稽守病徴臨卒敕子曰延陵葬云云令蜀道阻不可歸塋可止葬務遵速朽遂葬河南因家焉合葬季武子成寢杜氏之墓在西階之下請合葬焉許之入宫而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大不許其細何居命之哭祔葬者不筮宅謂祔先塋不改卜墓也衛人之祔也離之魯人之祔也合之善夫祔合葬也離謂棺中間之合謂棺中無間善夫善其魯也孔子少孤不知其墓問於鄒曼父之母然後得合葬於防死則同穴舜葬於蒼梧之野二妃未之從也古者不合葬季武子曰周公蓋祔祔合葬也同墳異藏後漢樊重遺令使與吏人同墳異藏招魂見葬注門爭訟沛國劉仲武娶丹丘氏生子正舒正則後出妻而不絶更娶王氏生陶後皆卒正舒求祔葬陶不許陶訟至死不得無名之冢王式繼母前夫終更適式父式父終喪服訖還前夫家夫家亦有繼子死遂合葬式父臨終求於式式許之中丞卞壼奏議式父臨終曰謬亂云云不可寄命他人之門埋尸於無名之冢為繼世也盧山之象衛青與平陽公主合葬冢象盧山葬殤魏邴原字根矩有女早亡太祖愛子蒼舒亦没太祖求合葬原辭曰非禮明公所以待原以其能守訓典若聽明公是妄庸太祖乃取甄氏女合葬也周禮媒氏禁遷葬者與嫁殤者遷葬者謂生時非夫婦死既葬遷之使相合從也殤謂十九已下未嫁而死生不以禮相接而合是亂人倫鄭司農云嫁殤者謂嫁死人今時娶㑹是也改葬穀梁葬桓王傳曰改葬之禮緦舉下緬注緦者五服之最下者改葬舉最下之服以喪緬邈逺也送葬助葬必執紼紼輓索也禮送葬者執紼白馬素車范式字巨卿與張劭為友劭死式夢之曰吾已死某時葬子能送我乎式覺即服朋友服命駕而徃及葬式未到劭引發中路而柩不進其母曰汝待巨卿也巨卿乗白馬素車至撫棺曰元伯可進矣柩乃進式乃修墓種樹而還劭字元伯送子長夜臺文選臨穴禮曰弔於葬者必執紖若從柩及壙皆執紼示助之以力也送喪不由徑送葬不避塗潦臨喪則必有哀色適墓不歌魯襄公薨滕成公來㑹葬墯而多涕穆叔曰兆於死所矣四十者執紼五十者執紼五十者從反哭鄉人四十者待盈坎優老也非鄉人四十者亦從反哭優逺周勃吹簫送葬五十不散送送葬者不散麻也晨㑹事鄭子蟜卒將葬公孫揮與禆竈晨㑹焉注會葬事也殉葬死害於人宋文公卒始用殉君子謂華元樂舉於是不臣君生則縱其惑死又益其侈秦穆公卒以子車氏三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥君子曰秦穆公死而弃民又収其良以死詩黄鳥哀三良也國人刺穆公以人從死曰交交黄鳥止于棘誰從穆公子車奄息臨其穴惴惴其慄如可贖兮人百其身魏顆用治命魏武子有嬖妾武子疾命顆曰必嫁是妾疾病則曰必以殉及卒顆嫁之曰疾病則亂吾從其治也後與秦戰于輔氏顆見老人結草以亢杜回杜回躓而顛顆遂獲杜回夜夢之曰予爾所嫁婦人之父也爾用先人治命予是以報也養疾於下禮陳子車死於衛其妻與其家大夫謀以殉葬乃告陳子亢曰夫子疾莫養於下請以殉葬子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與子不得已則吾欲以二子者為之於是不果用也二婢子夾陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我其于曰以殉葬非禮也况又同棺乎不果殺注善其不䧟父於不善者也送死害生三良臨穴二婢同棺以死傷生不獲葬辭官晉禮志建武元年以温嶠為散騎常侍嶠以母亡值冦不得葬不拜詔曰於禮制物常使理可經通今桀逆未梟乎陽道斷詔下議皆以嶠萬里投身赴闕廷無縁中辭主事宜如詔者也建武令晉建武元年令曰久喪未葬唯喪主不除以他故未葬人子之情可居殯而除無逺近之斷若亡遇盜喪靈無處求索理絶固當三年而除不得從未葬之例若殱於冦害無收殯之理亦宜三年傳曰穆伯卒子齊請歸葬不許請歸以卿禮葬魯不許惠叔猶毁以為請惠叔穆伯子代居位毁過喪禮以請父葬父卒逾年猶毁故曰猶乃許之又曰襄老死於邲不獲其尸不知存亡晉建武元年令二親為戎狄所破存亡未可絶知宜盡尋云云猶以哀素自居不預告慶賊平尋無蹤宜便制服冐法葬誅者孔車長者漢主父偃有貴幸客數千及死無人親獨孔車收葬上聞之以車為長者桓典棄官後漢桓典舉孝廉國相王吉以罪誅之放親戚莫敢至典棄官收斂葬之負土成墳為立祠堂胡騰葬竇武武誅後府掾胡騰少師事武獨殯葬行服收武孫為己子與聘娶還本姓郭亮葬李固梁冀誅李固露尸於四衢弟子郭亮始童徃哭陳辭夏行亭長呵之亮曰義之所重何以相懼太后聞之聽收葬乞收葬魏志袁譚死别駕王循詣太祖乞收云受袁氏恩得收歛就戮無恨太祖嘉其義故許之責葬罪人晉書鍾㑹辟何雄葬之文帝責之曰王經死哭東市我不問今㑹叛逆云云其如王法何雄曰先王掩骼埋胔今誄已備法雄感義而葬法立於上教𢎞於下何必使雄遺生背死殿下讐枯骨於中野為將來仁賢之資乎先請吳志諸葛恪誅臨淮臧均乞葬曰均恨欒布不先請而專名以肆情得不誅為幸臣不敢率也又齊王誅故吏荀闓乞葬孔陪葬李靖薨陪葬昭陵布裝露車載柩李勣疾謂弟弼曰我死布裝露車載柩斂以常服加朝服其中不得他藏髙士廉遺令墓不得他藏惟置衣一襲與平生所好書示先王典訓可用終始者給羽葆鼓吹班劒魏徴薨給羽葆鼓吹班劒四十人陪葬昭陵將葬其妻裴辭曰徴素儉約今假一品禮儀物褒大非徴志見許乃用素車白布幨帷無塗車芻靈陪葬昭陵房𤣥齡薨給班劒羽葆鼓吹絹布二千段粟二千斛陪葬昭陵葬勿卜曰盧承慶臨終誡其子曰葬勿卜曰倮葬傅奕戒子吾死當倮葬吕才葬篇不擇年與月一也不擇日二也不擇時三也吉凶不可信四也五姓不可信五也事關諸人六也詭斁禮俗七也葬給鼓吹唐紹韋庶人請妃公主命婦以上葬給鼓吹詔可紹曰鼔吹本軍容黄帝戰涿鹿以為警衛故曲有靈䕫吼鵰鶚爭石墜崖壯士怒之類惟功巨詔葬得兼用之男子有四方功所以加寵雖郊祀天地不參設容得接閨閫哉在令五品官㛰葬無給鼓吹者唯京官五品則假四品盖班秩在夫若子請置前詔用舊典不省厚葬又言比羣臣務厚葬以俑人象驂眩耀相矜下逮衆庶流宕成俗願按令切敕裁損凡明器不許列衢路惟陳墓所褒冊典物焜照都邑李適之以祖被廢而父象見逐武后時葬有闕至是丐陪瘞昭陵關中詔可褒冊典物焜照都邑行道為咨嘆戒毋厚葬李夷簡將終戒毋厚葬具禮收葬孔巢父李懐光據河中帝復令巢父宣慰衆害巢父帝聞震悼詔具禮收葬烏御芝墜輤車李紳葬母有烏御芝墜輤車悉以平生書納墓中馮宿治命薄葬悉以平生書納墓中坎瘞枯骨千餘于頔為胡州刺史州地庳薄葬者不掩柩頔為坎瘞枯骨千餘人頼以安給槥韋抗厯職以清儉及終無以葬𤣥宗聞之特給槥車葬以玉魚廣異記髙宗營天明堂每夜見數十騎行殿左右乃使術者劉門奴問其故曰我漢楚王戊之太子門奴詰問漢書楚王與七國謀反夷宗覆族安有遺嗣曰王起兵留吾在長安王誅天子念我不殺養宫中死葬此天子憐我殮以玉魚一雙今在殿東北角史臣遺畧不書今在宫中頗見拘限乞改葬我髙敞無奪我玉魚發其處果然乃勑以禮葬玉魚隨之有徳者薄無徳者厚李峘徳宗立詔元陵制度務極優厚當竭帑藏奉用度峘諫曰伏讀劉向論山陵之誡良史欷歔大畧曰舜葬蒼梧弗變其律禹葬稽山不改其列周武葬伯畢無丘壠漢文霸陵不起山墳禹非不忠啓非不順周公非不弟景帝非不孝宋文公厚葬春秋書華元為不臣桓魋為石槨夫子以為不如速朽由是觀之有徳者薄無徳者厚章章可見出唐史依漢長陵故事虞世南髙祖崩詔依漢長陵故事世南曰昔孝文居霸陵悽愴悲懐顧謂羣臣曰以北山石為槨用紵絮斮陳漆其間豈可動哉張釋之曰使其中有可欲雖錮南山猶有隙使無可欲雖無石槨又何戚焉孝文寤遂以薄葬至武帝之葬霍光暗於大體奢侈過度其後赤眉入長安破茂陵取物漢氏諸陵無不發者至乃燒取玉匣金鏤骸骨並盡豈不重痛哉書奏未報又上䟽本傳葬近城獨孤皇后崩代宗悼痛詔葬近城為陵以朝夕臨望南仲上䟽曰人臣宅於家帝王宅於國長安乃宅祖宗所其可興鑿建陵其側乎帝嘉納宫中親令髙驃騎潜令改葬楊真妃花膚雪態不復見空有香囊如淚滋時肅宗令葬太真妃唯髙力士知其所瘞在馬嵬西北十數歩當時乗輿怱遽無暇修周身之具但以驛中紫褥窆之及改葬時皆已朽壊惟胷前紫香囊存焉囊中有少麝香力士持進上皇泣而佩之津陽門詩作書一通緘之辛秘病自銘其墓作書一通緘之卒後發視則送終制也儉而不違於禮父老相與扶柩葬李頻為建州刺史卒父老相與扶柩葬永樂州其書乃有百二十家吕才後代葬説出於巫史一物有失便謂災及死生多為防禁以售其術附妄憑妖至其書乃有百二十家葬者藏也欲人之弗得見也又曰卜其宅兆而安厝之以是為感慕之所也魂神之宅也同丄朝市貿遷不可知石泉頽齧不可常是其謀及卜筮庶無後艱則備於謹終之禮也上禮部郎中凡百官葬禮皆有轜車引披鐸翣明器方相魌頭之制皆載於鴻臚之職焉六典思鐸在陳州有善政臨終戒其子曰陳人愛我我死則葬焉遂葬於陳州五代陸思鐸上䟽乞留葬劉審交隱帝時為汝州防禦使有能名卒州人聚哭柩前上䟽乞留葬近郊使民得嵗時祀祭詔特贈太尉起祠立碑五代史動土損旺氣泓師與張說卜宅戒勿動西北土以損旺氣後見氣索果掘三坑流欲填之泓曰客土無氣與地脉不相連明皇十七事蓬科馬鬛今已平李白負土作塚丁公著父喪負土作塚貎力癯惙見者憂其死孝姚崇卒治令曰昔楊震趙咨盧植張奐咸以薄葬知真識去身貴速朽耳夫厚葬之家流於俗以奢侈為孝令死者戮力暴骸可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩何用破貲徇侈乎胔骸不相亂張仲方拜常侍李訓之變於時族夷將相髗足旁午仲方皆宻使識其尸俄許收葬故胔骸不相亂啓故窆貎澤若生肅宗皇后吳氏薨合葬建陵啓故窆貎澤若生衣皆赭色見者歎異謂有聖一之符云死不葬宗室暠檢校太原以北節度使太原俗為浮屠法者死不葬以尸棄郊飼鳥獸號其地曰黄阬有狗數百頭習食胔頗為人患吏不敢禁暠至遣捕羣狗殺之申厲禁條約不再犯遂革其風歸葬滏陽崔𤣥亮遺言山東土人利便近皆葬兩都吾族未嘗遷當歸葬滏陽正首丘之義諸子如命崔損母殯而不葬亦不展殯女兄為尼沒不臨喪劾奏母死不葬顔真卿復使河東劾奏朔方令鄭延祚母死不葬三十年有詔終身不齒夜葬山谷楊行密卒遺令縠葛為衣桐瓦為棺夜葬山谷人不知所在出家財殮葬北邙羅士信齊州厯城人初士信為仁基所禮及東都平出家財殮葬比邙以報徳且曰我死當墓其側至是如所志歸葬魏州吳保安郭仲翔母葬服除喟曰吾頼吳公生吾死今親殁可行其志乃求保安於時保安以彭山丞客死其妻亦殁喪不克歸仲翔為服縗絰囊其骨徒跣負之歸葬魏州廬墓三年乃去遺令薄葬孫思邈永淳初卒年百餘嵗遺令薄葬取傭王希夷除州滕縣人家貧父母喪為人牧羊取傭以葬舉衣魂輅彭景直帝崩葬定陵有司議以和思皇后祔葬后為武后所殺不得其喪景直曰請如橋山藏衣冠故事納后褘衣復寢宫舉衣魂輅以布車一乘葬李適遺命以布車一乗葬悅謝家山卒葬東麓李白至姑孰悦謝家青山欲終焉及卒葬東麓神安而後嗣昌嚴善思武后崩將合葬乾陵善思建言今若更擇吉地祔近乾陵取從葬之義使神有知無所不通若神無知合亦何益山川精氣上為列星葬得其所則神安而後嗣昌失其宜則神危而後嗣損願割私愛使社稷長久中宗不納樂山秀峻劉悟大將郭誼者兖州人兄岌事悟為牙將常樂滏山秀峻曰我死必葬此給儀仗王承元大和初祖母喪詔曰武俊當横流時極定奔潰功在史官母李不幸贈䘏宜加厚且給儀仗以算死亂兵挺出收葬丁頎河南人初為京兆士曹參軍尹史劌器之劌鎮山南東道表為判官劌死亂兵手頎挺出收葬之時稱其誼君禮葬黎陽李密帝遣使持密首徃招徐世勣表請收葬詔歸其尸乃發喪具威儀三軍縞素以君禮葬黎陽與兄爭葬丘行恭貞觀初坐與兄爭葬所生母廢為民王仁皎宋璟皇后父王仁皎等卒將葬用昭成皇后家竇孝諶故事墳髙五丈一尺璟等請如著令帝已然可明日復詔如孝諶者璟還詔曰貞觀時嫁長樂公主魏徴謂不可加長公主太宗欣納而文徳皇后降使厚謝韋庶人追王其父擅作酆陵而禍不旋踵國家知人情無窮故為制度不因人以揺動不變法以愛憎比來人間競矜靡葬今以后父重戚不憂乏用髙冢大寢不畏無人百事官給一朝可就而區區屢聞者欲成朝廷之政中宫之美爾制度用天子禮孝敬皇帝𢎞葬緱氏墓號恭陵制度盡用天子禮百官從權制三十六日釋服務從約素讓皇帝憲葬橋陵監䕶使裴耀卿建言尚食料水陸千餘種及馬牛驢犢麞鹿鵝鴨魚鴈體節之味并藥酒二十工盛夏胎養不可多殺考求禮據無所憑依陛下毎申讓帝之志務存約素請蠲省折衷詔可助葬楊虞卿抵淮南㑹陳商葬其先貧不振虞卿未嘗與游悉所賫助之葬宜有銘凡與我弟游而有文者誰乎遂來請銘韓文杜君誌改葬改葬者為山崩水涌毁其墓及葬而禮不備者若文王之葬王季以水齧其墓魯隱公之葬惠公以有宋師太子少葬有闕之類是也韓昌黎改葬服議紅簫籠烏重𦙍葬先世掘得石碑有云牛領岡頭紅簫籠下葬用兩日手板相亞重𦙍依之出壠上書祔葬先營徐浩撰張曲江碑公丁内憂奔喪南訃祔葬先營白雀黄犬號噪庭塋素鳩紫芝巢植廬壠葬壓龍角其棺必斵郝處俊為侍中既葬有書生過其墓曰葬壓龍角其棺必斵後果然朝野僉載少失母墓所在吕向始向之生父岌岌逺方不還少喪母失墓所在將葬巫者求得之不知父在亡招魂合諸墓後有傳父猶在者葬者藏也壤樹之而君子以為議柳文與吕恭書身死賣宅以葬韓文李道古詩欲墮不墮逢王果唐左衛將軍王果被責出為雅州刺史於江中泊船仰見巖腹中有一棺臨空半出乃縁崖而觀之得銘曰欲墮不墮逢王果五百年重收我果歎曰吾今葬此今被責雅州固其命也乃收窆而去廣記拊櫬歸咸秦杜甫詩主人薨城府拊櫬歸咸秦葬日帝游咸宜宫蘇頲葬日帝游咸宜宫將獵聞之曰頲且葬我忍自娱哉半道而還瘞於野則謂之葬韓文篆文佳城沈彬將八十近居阜上有一大樹可數拱未殂前常指之謂家人曰吾死可葬於是既葬穴其處乃古塚爾觀其間儼然且絶朽腐之物復見一石燈臺上有漆燈一盞壙頭獲一銅牌上有鐫篆文曰佳城今已開雖開不葬埋漆燈猶未􅅡留待沈彬來由是葬之江南野史願因山為壠太宗皇后長孫氏及大漸與帝决曰妾生無益於時死不可以厚葬願因山為壠無起墳無用棺槨器以瓦木約費送終是妾不見忘也厚葬之餘自秦漢以來率多聰明英偉之主雖有髙談善說之士極陳其禍福有不能開其惑者矣五代史周太祖以瓦棺紙衣而歛將葬開棺示人送人喪歸六白陳平子託范式後漢范式受業太學長沙陳平子病謂妻曰吾聞山陽有巨卿烈士可以託吾没後但以尸埋巨卿户前乃裂素書以遺巨卿時式出還省書悽愴向墳悒哀哭以為死友營䕶平子妻兒自送喪於臨湘未至四五里委素書於棺上而去其兄弟聞之尋求不復見王子居託申屠蟠送葬申屠蟠始與王子居同在太學子居臨没以身託蟠乃躬推輦送喪歸鄉里遇司𨽻從事於河鞏間從事義之為封使使送蟠不肯受投傳於地而去事畢還太學凡民有喪匍匐救之詩孔渉塗泥歩送讓皇帝薨既發引大雨有詔慶王潭等渉塗泥歩送十里吏民數百皆縞服送喪崔日用御并州長史卒并人懐其惠吏民數百皆縞服送喪宣詔於柩車百官拜哭於道李晟及葬帝又御望春門臨送遣謁者宣詔於柩車百官拜哭於道送葬之盛無與比者李義府瀛州饒陽人為司列太常伯更葬其先葬日詔御史節度送車從騎相御帷帟奠帳自霸橋屬三原七十里不絶轜輴芻偶僣侈不法人臣送葬之盛無與比者遣車七白記曰遣車視牢具言遣車多少各如遣奠所包牲體之數遣車載所包遺而蔵之載粻有子曰非禮也喪奠脯醢而已言不當用黍稷遣車一乘晏子葬父遣車一乗及墓而反大夫五乗孔遣車歸於洛陽十有一月遣車歸於洛陽某日祔於墓柳文魏君墓誌既遣奠掌事者以蒲葦苞牲體下節七苞四品五品五苞六品以下二苞以繩束之盛以盤載於車列於旌前通典執饌者設遣車於柩東禮志喪期八白記曰喪之朝也順死者之孝心也朝謂遷柩於廟儀禮遷於祖用軸徙於祖廟即喪朝象平生將出必辭尊者軸輁軸也升自西階柩猶用子道不由阼其哀離其室也故至於祖考之廟而后行殷朝而殯於祖周朝而遂葬孔某月有限盧子駿劉公善政述下令曰某月有限限畢其家不闕地葬者笞二十訖事野無殯宫焉葬有期曰韓文馬府君行狀今葬有期日請掇其大者為行狀下旬逮半兮祖載於庭權徳輿賈公誌𤣥月載踰卜兆時吉始啓殯昭告奉遷於舊塋武東山之陽禮也陳子昂陳居士墓誌白孔六帖卷六十五
