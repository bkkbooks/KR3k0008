body:
  text: 白孔六帖卷二十一唐白居易原本宋孔傳續撰美丈夫一神彩儀容二醜丈夫三美婦人四醜婦人五長大人六短小人七形貎八冨九美丈夫一白彼美人兮難能子游曰吾友張也爲難能也然而未仁言子張容貎人難能也堂堂曾子曰堂堂乎張也難與並爲仁矣冠玉漢書陳平美丈夫如冠玉耳其中未必有也傅粉何晏字平叔美姿儀而絶白魏文帝疑其傅粉遺帽晉書王濛字仲祖美姿容常覽鏡自照稱其父字曰文開生如此兒耶嘗㡌破入市買之羣嫗悦之争遺之帽擲果晉潘岳字安仁至美毎行於道羣嫗常擲果滿車中明珠玉人羊車衛玠字叔寳在齠齔之中乗羊車於洛陽市市人咸曰誰家玉人王武子玠之舅也語人曰吾與外甥並坐烱然若明珠之在我側後卒人謂之看殺塵尾晉書王夷甫美貎嘗執玉柄塵尾與手無别龍章鳯姿嵇康字叔夜長七尺八寸好容貎雖土木形骸不自飾然而龍章鳯姿天質自然凝脂㸃漆晉王右軍目杜𢎞理曰面如凝脂目如㸃漆此神仙中人也如瓠漢書張蒼肥白如瓠白晳傳陳武子字子彊白晳而鬒鬒髪甚黒也閑麗宋玉體貎閑麗甚美直不疑狀貎甚美美豔傳宋公子鮑美而豔端正吳志孫垣儀客端正彼姝者子詩云邦之彦兮鄒忌之慕徐公問其妻妾與客曰我與城北徐公孰美子游之稱張也見上注貎先五事洪範五事一曰貎且髙柴甚惡推至孝於孔門子張難能稱未仁於言偃茍德行之無取雖容貎而何爲望其容貎使無慢易之心漢相漢王商長八尺餘體甚鴻大容貎絶人單于來朝仰視遷延却退天子聞而嘆曰真漢相目若懸珠齒如編貝並東方朔若畫後漢馬援眉目如畫美秀而文子太叔鄭大夫父母遺德莊子盗跖謂孔子曰長大美好人見而悦者此吾父母遺徳丘雖不吾譽吾不自知耶連璧潘安仁夏矦湛並美姿容毎同行人謂之連璧堂堂田郎田鳯爲郎端正入奏事靈帝目送題柱曰堂堂乎京兆田郎字秀宗孔美鬚眉峻風㝢楊炎退居求志肅宗即家拜散騎常侍號元静先生美鬚眉峻風㝢人物當世第一李揆美風儀善奏對帝嘆曰卿門地人物文學皆當世第一信朝廷羽儀乎故時稱三絶美儀矩盧承慶美儀矩美姿容姜柔逺美姿容竒其風度李嗣真嘗引工展器于庭后竒其風度應對召相王府㕘軍閻元静圖之美容儀竇抗體弱美容儀美姿質陸景融美姿質秀眉美鬚髯楊元琰秀眉美鬚髯容貎瓌偉宗室若水容貎瓌偉傅朱粉衣紈錦盛飾自喜張易之頎晳美姿致出入禁中傅朱粉衣紈錦盛飾自喜體貎偉麗路巖體貎偉麗舉止秀峙時謂玉而冠者崔澹舉止秀峙時謂玉而冠者儀幹秀偉楊謹矜兄弟儀幹皆秀偉謹名嘗視鑑嘆曰兄弟皆六尺餘此貎此才欲見容當世難矣胡不使我少體弱邪世哀其言姿幹瓌壯張守珪姿幹瓌壯人望而慕之崔郾姿儀秀偉人望而慕之然不可狎也容止端秀裴皥出於名家容止端秀五代偉儀質李絳偉儀質狀貎若畫髙儉狀貎若畫神彩容儀二白神清晉謝尚論中朝人物劉琰云杜乂膚清衛叔寳神清爲有識所重如此視日不眩王戎字濬冲㓜穎悟神彩秀澈視日不眩裴楷目之曰爛爛如巖下電風塵外物王戎曰王衍神彩髙澈如瑶林瓊樹自是風塵外物太雋王衍神清明秀王澄曰兄形似遁而神鋒太儁容儀美鬚髯霍光白晳踈眉目美鬚髯竒士漢江充魁岸容貎甚壯帝望見之曰燕趙固多竒士甚都司馬相如車騎雍容閑雅甚都都閑雅之稱玉人裴楷字叔則爲吏部侍郎風神髙邁容儀俊爽博涉羣書特精義理時人稱之為玉人如鐘陸機身長七尺其聲如鐘狀異常人蔡邕字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異常人毎行觀者盈集以此自匿不亦難乎乃止以容爲官漢徐生善爲頌孝文時以頌爲禮官大夫傳子至孫延襄襄之姿性善爲頌不能通經延頗能未善也襄亦以容爲大夫至廣陵内史頌音容取貎失人新野功曹鄧衍以外戚小子侯預朝容姿趨步有出於衆顯宗目之特賜輿服虞遷司延言其雖有容儀而無實行未嘗加禮帝後拜衍郎中馬衍在職不服父喪帝聞乃嘆曰知人則哲以延爲明孔進止詳華人拭目觀溫彦博進止詳華人皆拭目觀姿表瓌傑温造姿表瓌傑凡有獻納搢紳皆屬以目髙士亷進止詳華凡有獻納搢紳皆屬以目姿表魁秀魏謩姿表魁秀善爲容陳叔逹善爲容姿㝢秀偉蕭得聖姿㝢秀偉氣孤峻風采峭整既當國風采峭整神情爽拔李義琛太宗目義琛曰是人神情爽拔見奉使門容止嚴峭韋斌容止嚴峭觀者皆竦崔敦禮善辭令進止觀者皆竦姿質軒秀嚴挺之姿質軒秀宣勞揖賛宗室若水在朝三十年多識舊儀毎宣勞揖賛進止閑華有可觀者無威儀陸長源好諧易無威儀無儀矩趙宗儒以文學歴將相位任崇劇然無儀矩姿儀瓌秀吕元膺姿儀瓌秀舉止都雅張垍舉止都雅帝悦之儀矩峻整王璠儀矩峻整著稱于時姿采如峙玉鄭畋姿采如峙玉簡侻李程簡侻無儀檢端凝若植馮定偉儀觀與宿齊名人方漢二馮文宗詔開元霓裳羽衣舞參以雲韶列于庭部諸工立縣間端凝若植帝異之飣座梨崔逺有文而風致整峭世慕其爲人目曰飣座梨言所珍也進止雍閑裴休爲人醖藉進止雍閑宣宗嘗曰休真儒者儀舉自安魏元忠始以諸生見髙宗髙宗慰遣不知謝即出儀舉自安帝目送謂薛元超曰是子未習朝廷儀宜相天子蕭至忠出爲晉州刺史治有名默啜遣大臣來朝見至忠風采逡廵畏俯謂人曰宜相天子何乃居外乎舉止不煩裴諝性通綽舉止不煩風度高嚴劉伯芻風度高嚴姿制閒美李藩姿制閒美進止雍如崔沔性舒遲進止雍如也儀狀瓌偉張鎬儀狀瓌偉神采軒異趙昶神采軒異精神爽秀蘇逢吉漢髙祖鎮河東父悦爲高祖從事逢吉嘗代悦作奏記悦乃言之高祖召見逢吉精神爽秀憐之乃以爲判官狀貎雄偉閩王審知爲人狀貎雄偉隆凖方口五代巉巗李白上雲樂巉巗容儀戍削風骨神觀爽邁裴度退然才中人而神觀爽邁爲人嚴偉立朝稜稜有風望崔從風骨秀爽趙彦昭風骨秀爽風度凝逺宋璟風度凝逺人莫涯其量昭昭乎若玉山上行朗然映人也李白上裴長史書蕭嵩虛有其表明皇雜録帝拜蘇頲爲相命蕭嵩草制不工帝欲令換之不欲斥言因制中有云國之瓌寳乃指瓌字曰不可言其父名卿宜易之嵩不悟但改瓌爲珍帝見擲於地曰虛有其表以嵩魁偉多髯骨重神寒天廟器一䨇瞳人剪秋水李賀唐兒歌華嶽峯尖見秋隼杜甫魏將軍歌魏矦骨聳精爽𦂳華嶽峯尖見秋隼神氣清爽上令左右求堪爲王府長史太常卿姜皎奏源乾曜公清有吏幹因召見與語乾曜神氣清爽對答皆有倫序上甚悦拜少府少監邠王長史神清韻逺孔季詡永昌初擢制科授祕書郎陳子昻嘗稱其神清韻逺可比衛玠終左補闕神昏形滓齊澣劾奏裴談神昏形滓挾邪以罔上氣挺特不俗呉保安氣挺特不俗醜丈夫三白六極洪範六極五曰惡惡醜也孔醜亦孔之醜不臧宵貎叢陋陋質詭容擲瓦張孟陽醜毎出人惡之輙擲瓦礫盈車眇小丈夫孟嘗君田文也一言而善傳晉叔向適鄭鬷蔑惡而立於堂下一言而善叔向聞之曰必然明也下執其手以上三年不笑傳昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言狂且古之醜人也詩曰不見子都乃見狂且名動孫卿子曰衛靈公有臣曰公孫呂身長七尺面長三尺廣三尺名動天下睅目華元睅其目皤其腹睅睛大皤腹大欽頤周燮字彦祖椎顙呂氏春秋陳有惡人曰敦洽犨䴢椎顙色如漆黒也折頞哆噅辨命論哆噅慼頞形之異也哆噅口張不正音侈撝子羽甚惡以貎失人史記澹臺滅明字子羽狀貎甚惡孔子以爲才薄旣而受業名振諸侯孔子曰吾以言取人失之宰我以貎取人失之子羽鬷蔑不颺因言見用傳叔向謂鬷蔑曰今夫子少不颺子若無言吾其失子矣遂如故交注不颺顔貎不揚顯也睅目佐宋華元慼頞相秦史記蔡澤魋顔慼頞頞鼻莖也澤爲秦相子張難能稱未仁於言偃高柴甚惡推至孝於孔門家語高柴子羔貎甚惡爲人篤孝知名於孔子門茍盡美之可嘉雖孔醜之何害雖伯倫之形不妨賢士劉伶字伯倫形貎醜然肆意放蕩名與七賢而承宫之狀難示逺人後漢承宫名播單于單于使求見宫宫曰夷狄眩名非識真也臣貎醜不可以示逺人乃以大鴻臚魏應代之無以貎取何陋之有行歩俛僂漢蔡羲年八十餘爲丞相短小無鬚眉貎似老嫗行歩俛僂母欲棄周燮字彦祖生而欽頥折額醜狀駭人其母欲棄之父不聼曰吾聞賢聖多有異貎興我宗者此兒也黒而上僂豎牛黒而上僂深目而猳喙陳豹長而上僂恐似己莊子厲人夜半生子其父取火視之恐其似己屬人醜人也孔貎么醜盧杞秉政無學術貎么醜楊炎薄之陋甚永王璘貎陋甚柔野陳子昻貎柔野少威儀容貎最陋張鎰盧杞忌鎰剛直欲去之時朱泚以盧龍卒戍鳯翔帝擇人以代杞曰陛下必以臣容貎最陋不爲三軍所信恐後生變臣不敢自謀惟陛下擇之乃以鎰爲鳯翔節度姿陋盧攜姿陋而語不正陋其貎不納封常清素瘠又脚跛高仙芝陋其貎不納常清怒曰以貎取士失之子羽公其念之陋王伾貎陋楚語無它大志類不勝衣史㳟奉陋類不勝衣侻陋陸羽貎侻陋寢侻歐陽詢貎寢侻敏悦絶人鬼貎藍色盧杞陋甚鬼貎藍色儜陋李輔國貎儜陋醜恠五代桑維翰爲人醜恠黒色胡髯慕容彦超嘗冐姓閻氏黒色胡髯號閻崑崙五代史外陋内險盧杞初尚父郭子儀病甚百官造省不屏姬及杞至則屏之隱几而待家人恠問其故子儀曰彼外陋内險左右見必笑使後得權吾族無類矣貎醜異許敬宗改中書舍人文德皇后䘮羣臣衰服率更令歐陽詢貎醜異敬宗侮笑自如美婦人四美色害德濟難附白彼美人兮彼姝者子美人麗人佳人其姝静女其姝婉兮孌兮窈窕淑女邦之媛兮鍾美傳天鍾美於是鍾聚也桃李詩華如桃李蕣華顔如蕣華國色見公羊傳巧笑倩兮美目盻兮如玉燕趙多佳人美者顔如玉千金之笑千金買笑洵美且都蛾眉詩手如柔荑膚如凝脂螓首蛾眉光可以鑑傳昔任氏生女鬢髪甚美光可以鑑名𤣥妻䕫娶之是不嗣焉西施南威戰國䇿晉文公得南威三日不聼朝遂推南威遠之曰後世必以色亡國巫峽之女浦川之神傾城絶代李延年歌曰北方有佳人絶代而獨立一顧傾人城再顧傾人國北方南國曹植詩云南國有佳人容華若桃李東鄰宋玉曰東鄰之女增之一分則太長減之一分則太短施朱則太赤施粉則太白盈盈樓上女古詩靡顔膩理楚辭云不待脂粉淮南子不待脂粉西施陽文傾國專房宜笑楚辭曰旣含皓兮又宜笑注皓齒也袨服靚裝妍姿麗質一笑再顧金鈿飾首羅縠被身丹脣皓齒詩稱女德必在於賢禮載婦容不專於色揆五事莫先於貎稽四德無大於容姱容楚詞曰姱容修態晤言彼美淑姬可與晤言灼灼其華姬姜令色孟娵古之好女也娵音鄒楚詞𤣥鬢翠蛾美豔美色害德甚美甚惡叔向欲娶申公巫臣氏其母曰吾聞甚美必有甚惡而天鍾美於是必以是有敗也夫有尤物足以移人茍非德義則必有禍尤物見上傾國移人易色子夏曰賢賢易色冶容誨淫易伐性之斧三代之亡恭子之廢皆此物也言皆因女寵恭子申生魚入鳥飛莊子西施毛嬙人之美也魚見之深入鳥見之高飛孔妻美豔宋華父督見孔父嘉之妻于路目逆而送之曰美而豔遂殺孔父而娶其妻殤公怒督遂弑殤公孫壽媚惑後漢梁兾妻孫壽色美善爲妖態作墜馬髻折腰歩以爲媚惑兾縱恣日甚後與妻皆自殺也竒袤媚也周禮有南威之容乃可以論於淑媛有龍泉之利乃可以議於斷割豔妻煽方處難濟釋羑里之縶史紂囚西伯於羑里閎夭之徒以有莘氏之美女獻於紂紂大悦乃釋西伯而歸解平城之圍桓譚論曰高祖被圍平城說閼氏言漢有美女天下無䨇急則進單于單于必得大重之則閼氏之寵衰矣是謂出竒計也孔王珪進見它日進見有美人侍帝側本廬江王瑗姬也帝指之曰廬江無道賊其夫而納其室何有不亡乎珪避席曰陛下以廬江爲是邪非邪帝曰殺人而取其妻乃問朕是非何也對曰臣聞齊桓公之郭問父老曰郭何故亡曰以其善善而惡惡也公曰若子之言乃賢君也何至於亡父老曰不然郭君善善不能用惡惡不能去所以亡今陛下知廬江之亡其姬尚在竊謂陛下以爲是審知其非所謂知惡而不去也帝嗟美其言便詖豔嬖張元素太子乆不見賔友元素曰宫中所見止婦人不知如樊姬等可以益聖德者幾何若無之則便詖豔嬖何足顧哉秀曼都雅一軍驚視李光顔初都統韓𢎞惡光顔忠力思有以抗衊之乃飾名姝教歌舞六博襦䙱珠琲舉止光麗費百鉅萬遣使以遺光顔曰公以君暴露于外恭進侍者慰君征行之勤光顔約旦日納焉乃大合將校置酒引使者以待姝至秀曼都雅一軍驚視光顔徐曰我去室家乆以爲公憂誠無以報德然戰士皆棄妻子蹈白刅奈何獨以女色爲樂爲我謝公天子於光顔恩厚誓不與賊同生指心曰雖死不貳因嗚咽泣下將卒數萬皆感激流涕乃厚賂使者還之獻麗姝畢誠始諴被知於宣宗嘗許以相令狐綯忌之自邠寜凡三徙不得還試思有以結綯至太原求麗姝盛飾使獻綯曰太原於我無分今以是餌將破吾族矣不受娟秀光麗高駢傳呂用之左右姬侍百餘皆姢秀光麗善歌舞巾㡚束帶以侍姿質天挺明皇貴妃楊氏始爲壽王妃開元二十四年武惠妃薨後廷無當帝意者或言姿質天挺宜充掖庭遂召内禁中異之即爲自出妃意者丐籍女官號太真軍中有女子王智興進破姚海兵五萬於豐北獲美妾三人智興曰軍中有女子安得不敗即斬以徇曲眉而豐頰清聲而便體秀外而惠中韓愈盤谷序曲眉而豐頰清聲而便體秀外而惠中飄輕􅅂翳長袖粉白黛緑者列屋而閑居妬寵而負恃争妍而取怜秦以金牛美女啖蜀陳子昻昔蜀與中國不通秦以金牛美女啖蜀花見羞明宗淑妃王氏有美色號花見羞婉冶之姿突厥序婉冶之姿毁節異類淑姿脩態權德輿郊居記淑姿修態廻風遇雲之勢流光含睇中飲笑抃傾都之艷獨孤郁書有傾都之艷而深帷之長安水邉多麗人態濃意逺淑且真肌理細􅕹骨肉勻繡羅衣裳照暮春杜甫麗人行秀色如瓊花西門秦氏女秀色如瓊花李白秦女休行吳娃越豔吳娃與越豔窈窕誇鈆紅同上憶舊遊秀色掩今古荷花嬌玉顔西施詩愛君芙蓉嬋姢之豔色可飱兮難再得寄逺上灼灼芙蓉姿美人出南國灼灼芙蓉姿同上古風眉目豔皎月同上眉目豔皎月一笑傾城歡翠茁鳳生尾丹葉蓮合跗杜牧張好好詩青鏡理雲髪褰簾出深重韋蘇州擬古詩美人奪南國一笑開芙蓉青鏡理雲髪褰簾出深重素面朝天楊妃外傳號國夫人不施粧自有美豔常素面朝天花月之妖武三思妓素蛾有殊色狄梁公請出之忽失所在於堂奥中聞蘭麝芬馥附耳而聴即素蛾語曰某花月之妖帝遣奉公言笑梁時之正人不敢見甘澤謡薛瑶英元載末年納薛瑶英爲姬處以金絲帳却塵褥衣以龍衣一襲無一兩載以瑶英體輕不勝重衣於異國求此服惟賈至楊公南與載友善徃徃得見其歌舞杜陽編楚蓮香都下名妓楚蓮香者國色無雙毎出則蜂蝶相隨聞其香天寳遺事飲乳而美隋唐嘉話侯君集死其家有三美人容色絶代言常飲人乳而不飯第一開元遺事念奴有色善歌宫妓中第一帝嘗曰此女眼色媚人冡角井樂史緑珠傳緑珠冡在角井山下汲者誕女必美識者以美女無益於時以巨石鎮之後有産女者七竅四支多不完具紅拂李靖謁楊素一妓執紅拂侍側目靖乆之靖歸逆旅夜有紫衣戴帽人杖挂一嚢叩門遽延入脫衣去帽乃十八九一美人也靖驚詰之告曰妾楊家紅拂妓也侍司空閲人多矣未有如公者絲蘿願託喬木也旦來觀其姿真天人也乃與俱適太原西子毛嬙之蹈後宫也皎朝日煥浮雲而無鹽逐於鄉里桞宗元答問薛瑶英能詩書善歌舞仙姿玉質肌香體輕雖旋波移光飛燕緑珠不能過也楊炎贈楊英歌雪白淡眉天上女鳳簫鸞翅欲飛去玉釵翹翠歩無塵楚腰如栁不勝春善自塗澤則天皇后武氏雖春秋高善自塗澤雖左右不悟其衰一枝紅豔露凝香李白雲想衣裳花想容春風拂檻露華濃若非羣玉山頭見㑹向瑤臺月下逢同上醜婦人五白甚惡宵形宵形叢陋嫫母醜女鍾離之后列女傳齊邑之女曰鍾離齊宣王之正后也爲人極醜凹頭深目大節卭鼻結喉肥項少髪折腰出胷皮膚若漆行年四十無所容入衒嫁不售乃拂拭短褐自詣宣王願備後宫宣王納之以爲后登徒之妻宋玉曰登徒子之妻蓬頭攣耳齞脣歴齒旁行踽僂又疥且痔登徒子悦之生五子許允之婦郭子許允之婦竒醜交禮竟不復入房許曰婦有四德卿有幾答曰新婦所乏者容耳士有百行君有幾許曰皆備婦曰君好色不好德何謂皆備許有慙色遂相敬重晉惠妃賈充女醜而短黒色陋質詭容鄙貎效顰西施病捧心而顰隣之醜女亦學而顰况賢惟易色醜不誨滛徵美豔之妻且聞亂宋稽宿瘤之女終見興齊茍徳行之可稱雖鄙陋而何害茍宵貎之不藏雖効顰而孔醜首若飛蓬膏沐無用膚如㸃漆脂粉何施雖天地之秀形合齊美惡而男女之大欲亦本妍媸無徵怨於下山宜鹽形於止水稽六極且聞於惡考四德不見其容詩稱女美必在於賢禮載婦容不專於色茍以德稱曷宜貎取􅤞廉楚詞哀時命云古之醜婦人􅤞音龍孔陋而淫閩王延翰審知長子其妻崔氏陋而淫嫫母衣錦李白鳴臯歌錦縠西子不華嫫母錦縠是不能易其美惡房千里文敦洽騁姿皮日休子都蒙袂兮敦洽騁姿悦醜兵部郎中朱凝妻有美色天后時洛中殖業坊酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無朱悦之殆忘寢食朝野僉載醜女來效顰李白古風醜女來效顰還家驚四鄰夀陵失本歩笑殺邯鄲人逐於鄉里桞宗元無塩逐於鄉里老且醜張萬福初在泗州遇李希烈反陳少游悉以部刺史妻子質楊州萬福獨不遣謂使者爲我白公妻老且醜不足慁公意卒不行視姬姜而自退其陋質劉太真上楊相啟文粹長大人六白埋首於子駒之門傳魯叔孫得臣敗長狄于鹹獲長狄僑如冨父終生㫪其喉以戈殺之埋其首于子駒之北門鄋瞞伐齊齊獲其弟榮如埋其首於周之北門鄋瞞由是遂亡注鄋瞞長狄國名蓋長三丈骨節非常恐後代怪之故記其處所長狄眉見軾穀梁傳獲僑如兄弟三人造攻中國凡射不能害得臣善射射其目身横九畆斷首而載之眉見於軾防風骨專車家語呉伐越墮㑹稽獲骨專車呉子使來問仲尼仲尼曰禹㑹諸侯於塗山防風氏後至禹戮之其骨節專車身横九畆長狄身横九畆腰闊十圍晉書尹緯字景亮長八尺腰帶十圍魁梧有大志十丈國語曰人之長者不過十丈數之極也龍伯國之大人列子帝令巨鼇負五山龍伯國之大人釣兩鼇合負而歸帝怒之蓬萊山之竒士漢書王莽時有竒士長丈六腰十圍出自蓬萊山自言巨無霸車不能載三馬不勝卧則枕鼓視跡於襄武魏志咸熙二年襄武縣有大人見長三丈餘跡長二尺二寸白髪著黄單衣見體於臨洮史記秦始皇時有大人見臨洮長五丈脚跡長六尺鴻大漢長樂尉馬騰身長八尺身體鴻大面鼻雄異魁梧後漢趙壹字元叔體貎魁梧身長九尺望之甚偉恃才倨傲乗土禮斗威儀曰君乘土而王者其人長大禹長九尺九寸湯長九尺孔子長九尺伍子胥長一丈韓信長八尺九寸東方朔長九尺三寸金日磾長八尺車千秋長八尺頎而長兮千仞楚詞曰東方長人千仞唯䰟是索乾坤賦象宗類分形非無長短之差自有洪纎之别孔偉容貎裴寂極長偉容貎婁師德長八尺侯希逸長七尺姿貎魁秀劉德威姿貎魁秀宗楚客長六尺八寸魁岸紀處納爲人魁岸陸景融長七尺吉頊洛州河南人長七尺姿質偉岸宗室從晦姿質偉岸黒齒常之百濟西部人長七尺餘白晳長大齊映爲人白晳長大李晟長六尺姿狀秀偉武儒衡姿壯秀偉張忠孝魁偉長六尺楊收長六尺二寸廣顙深頤䟽眉目楊謹矜兄弟皆六尺餘見美丈夫門郭知運長七尺猿臂虎口張廵長七尺魁岸有力程千里長七尺魁岸有力張興長七尺郭子儀長七尺二寸李嗣業長七尺姿度魁傑馬燧姿度魁傑長六尺二寸楊守亮身長七尺餘色如鐵段志𤣥姿質偉岸獻長人五行志開元二十二年四月冀州獻長人李家龎八尺有五寸矣暴長太和十三年民皇甫及年十四暴長七尺餘長啜大嚼三倍如初類長三丈東夷長人者類長三丈鋸牙鈆爪黒毛覆身不火食噬禽獸或撙人以食美晳如玉王延翰爲人長大美晳如玉五代身長九尺鬢眉蒼杜甫洗兵馬張公一生滄海客身長九尺鬢眉蒼白而長身孔子世家三十八吾見其孫白而長身韓文短小人七白侏儒傳臧紇戰敗國人歌曰侏儒侏儒使我敗于邾注臧紇短小故也璝質僬僥國語僬僥氏長三尺短之極也注西蠻也優旃史優旃秦倡侏儒也巨靈漢武故事東郡送一短人長七寸名巨靈眇小丈夫孟嘗君飽欲死東方朔曰臣長九尺三寸俸一囊米錢二百四十侏儒身長三尺亦一囊米錢二百四十侏儒飽欲死臣朔餓欲死二尺廣延之國人長二尺一寸神異經西北荒有小人長一寸朱衣朱冠晏子短小相齊晏子長不滿三尺而相齊蔡義小而佐漢漢蔡羲爲丞相年八十短小無鬢髪行歩俛仰常兩吏夾持乃能行也短主簿王恂爲桓温主簿爲人短小故號曰短主簿若不勝衣孫卿子葉公子高短小行若不勝衣侏儒漢書東方朔謂侏儒曰帝以若曹耕田力不及人從軍不任軍事無益於時今欲盡殺若曹侏儒大懼長七寸神異經西海有一鶴國人長七寸日行千里如飛百物不敢犯畏海鵠鵠吞之夀二百歳在鵠腹中不死或云李子敖也短黒賈充女晉惠妃醜而短小是以區區蕞質還爲楚國之賔𤨏𤨏微容遂入蔡邕之賦僬僥不可使舉侏儒不可使援孔短李李紳爲人短小精悍時號短李儀質陋侻韋述方少儀質陋侻癯短才及中人辛讜陋短俯傴武懿宗貢侏儒陽城爲道州刺史州産侏儒歳貢諸朝城奏州民盡短自是罷眇小無髯關播盛稱李元平帝拜汝州别駕李希烈隂使亡命應募縛元平希烈以其眇小無髯戱李克城曰使爾取元平乃以其子來邪人腊酉陽雜爼李章武有人腊長三尺餘頭項髀肋成就言是僬僥國人短而傴崔善爲用清察稱諸曹史惡之以其短而傴嘲曰曲如鈎封列侯三箇半人桑維翰身短面廣毎對鑑自嘆曰七尺之身何如一尺之面後登第同榜四人秦王幕客陳保極戱謂人曰今歳有三箇半人及第以維翰短陋故謂之半人孔平仲續世說形貎八相似附白圓首方足首圓象天足方象地乾爲首坤爲腹離爲目艮爲手震爲足坎爲耳巽爲股兌爲口易說卦筋骸之束禮云人隂陽之交五行之秀肌膚之㑹筋骸之束駢脅晉公子重耳駢脅蜂目豺聲楚公子商臣忍人也熊虎之狀豺狼之聲越椒深目豭喙豎牛睅目皤腹華元睅其目皤其腹睅目出也皤腹大也肖形天地漢書肖類也謂圓首方足頭小而銳史記平原君武安君頭小而鋭婦人女子人聞張良勇智以爲其狀貎魁梧竒偉乃若婦人女子猿臂李廣真漢相漢王商長八尺餘體鴻大容貎絶人單于來朝仰視遷延却退天子聞而嘆曰真漢相也顧見耳蜀先主劉備鷰頷班超鷰頷行食飛鳥肉萬里侯相後封爲定逺侯鳶肩梁冀魁岸江充龍章鳳姿嵇康雖土木形體人以爲龍章鳳姿天質自然修容目容端口容止不妄動頭容直足容重黒而上僂豎牛眼如紫石稜鬚如蝟毛磔桓温竒表後漢李固字子堅貎有竒表頂角區犀足履龜文影日中無影仙人與虛合體故日中無影雪中無跡服丹韓終乆服丹無影問魍魎莊子云衆魍魎問影處隂休影疾行遁影人有惡影而走者不知處隂而影滅老人子無影捕影隨形若捕影隨形也顧影何晏自喜行歩顧影欲影之直必端其表相似有若史記孔子旣沒弟子思慕以有若似孔子相與立爲師師事如孔子優孟優孟爲孫叔敖衣冠抵掌談論象孫叔敖楚王及左右不能别陽虎子畏於匡蓋孔子貎似陽虎匡人趨而圍之陽虎陽貨也逢丑父公羊逢丑父似齊頃公故代頃公爲晉獲也且有典形後漢孔融與蔡邕素善邕卒有虎賁士貎類於邕融毎酒酣引與同座曰雖無老成人且有典形張衡後身語林曰張衡死蔡邕母始孕二子才貎相似時人云邕是張衡後身兄弟陳國張伯喈弟仲喈相似妻子不能别惟肖肖似也尚書吾靣人心不同如其靣焉吾豈敢謂子靣如吾靣乎厲人見上醜丈夫門注紀信詐降紀信貎似漢王乘黄屋車左纛詐稱漢王出降項羽孔狀魁梧李訓狀魁梧不踰中人魏徵狀貎不踰中人有志膽偉秀蕭嵩貎偉秀姿體魁秀李義琰姿體魁秀髭貎雄偉宗晉卿髭貎雄偉姿貎魁異桞澤姿貎魁異土木形體郝處俊土木形體容而才張知謇自德州刺史入計后竒其貎詔工圗之稱其兄弟容而才謂之兩絶儒謹虞世南貎儒謹貎類王孝傑戰大非川爲敵執賛普見之曰貎類吾父故不死歸之風骨秀爽趙彦昭風骨秀爽儀止秀偉張喜貞儀止秀偉奏對偘偘武后異之氣象清古王丘氣象清古竒其狀貎五代楊行宻唐乾符中江淮羣盗起行宻以爲盗見獲刺史鄭棨竒其狀貎釋縛縱之十圍江安王元祥魁大帶十圍鑒形美惡魏元成傳鑒形之美惡必就止水神觀爽邁裴度退然纔中人而神觀爽邁使外國者其君長必問度狀貎孰似貎類王世充隂索貎類李宻者使縛之旣兩軍接使索類宻者過陣譟曰獲宻矣士皆呼萬歳宻軍遂亂偉其貎賈循從子隱林爲永平兵馬使屬朱泚難率衆扈行在德宗見隱林偉其貎偉儀貎宋之問偉儀貎阡陌聚觀李邕旣入朝人間傳其眉目瓌異至阡陌聚觀後生望風内謁門巷填隘貎豐偉崔㳟貎豐偉資貎瑰傑郭曜資貎瑰傑偉岸薛存慶貎偉㟁異其貎楊行宻年二十亡入盗中刺史鄭綮捕得異其貎曰而且冨貴何爲作賊縱之狀貎非常劉知謙爲清海牙將節使韋宙以兄女妻之衆謂不可宙曰若人狀貎非常吾以子孫託之䟽眉目豐下盧奕䟽眉目豐下望其狀貎李藩張建封卒濠州刺史杜兼疾駈至隂有覬望因誣奏建封死藩撼其軍有非望帝亟追藩旣入帝望其狀貎曰是豈作亂人邪釋之赤心安禄山帝視其腹曰卿腹中何有而大答曰唯赤心耳腰腹十圍朱泚資壯偉腰腹十圍纎瘦李賀爲人纎瘦通眉長指爪能疾書體貎軒特李栖筠體貎軒特質狀頎省王涯質狀頎省長上短下形神秀發五代和凝形神秀發狀貎堂堂同上華温琪少從黄巢爲盗巢敗温琪走滑州顧其狀貎魁偉懼不自容乃投白馬河流數十里不死河上人援而出之又自經於桑林輙枝折乃之胙縣有田父見之曰子狀貎堂堂非常人也乃匿于家燕頷吳元濟燕頷貎似而心不同昔之聖人其首有若牛者其形有若蛇者其喙有若鳥者其狀有若蒙倛者彼皆貎似而心不同焉韓愈雜說牛首鳥身皮日休鹿門隱書神農牛首蜚仲鳥身信乎哉曰非形也象也天光睟清日華明潤古之至聖必有竒相是以黄熊之瑞應於龍體赤精之符協於國表頎然而長文王所以王天下也體貎多竒漢高所以威海内也然則績事之微極於惟肖至於天光睟清日華明潤非可圖也李德裕唐武宗皇帝真容讃序踔越之姿裴劉賛觀二子非有踔越之姿娶與我異類則自堯舜以下皆宜縱目卭鼻四手八足鱗毛羽鬣飛走變化然後乃可茍不爲是則亦人耳桞宗元與楊誨之書姿狀如甚懦者韋處厚姿狀如甚懦者居家亦循易人生非寒松年貎豈長在李白古風願繪而觀藩鎮李寳臣謬謂滔使曰吾聞朱公貎若神願繪而觀可乎滔即圖以示之寳臣置圗射堂大㑹諸將熟視曰信神人也宻選精卒二千夜馳三百里欲劫滔戒曰取彼貎如射堂者時二軍不相虞忽聞變滔大駭戰瓦橋敗衣他服得脫禽類滔者以歸承嗣額鋭角方李宻額鋭角方瞳子黒白明徹貎必儒人五代張廷藴武人所識不過數字而平生重文士嘗從明宗破梁鄆州獲判官趙鳳廷藴謂曰吾視汝貎必儒人可無隱也鳯以實對廷藴亟薦於明宗狀貎堂堂而不通文字五代安叔千狀貎堂堂所爲鄙陋時人謂之没字碑黑色胡髯同上慕容彦超黑色胡髯號崑崙人影數至九酉陽雜爼道士郭采真言人影數至九常試之至六七而已外亂莫能辨郭言漸益炬則可别取人本命日五更張燈相人影同上實厯中有王山人取人本命日五更張燈相人影知休咎言人影深深則貴而壽影不欲照水照井及浴盆中古人避影亦爲此同上冨九戒懼貪富驕逸附禍敗吝嗇白五福二曰冨冨而可求語哿矣冨人詩聚斂季氏冨於周公而求也爲之聚斂而附益之子曰非吾徒也小子鳴鼔而攻之可也語貨殖子曰賜不受命而貨殖焉家富禮家富不過百乗多積儒有不祈多積積財貨也潤屋曾子曰富潤屋藩身傳貨以藩身發身禮仁者以財發身言仁者務施故發身於令名發財不仁者以身發財言不仁者不務施故發財於令名也素封史記冨者無禄秩之俸爵邑之入而與之比者命曰素封金穴郭况富號金穴積財晉書石祟善營生積財如山岳也藏鏹巨萬卓鄭猗陶蜀卓氏程鄭猗朱陶頓四人並古人之富者日食萬錢何曾千駟齊景公有馬千駟貨利惟王不殖貨利豐財徇財貪夫徇財憂貧好利生厚德正傳人生厚而德正言財足則思無邪雖生厚而德正思則無邪茍怙冨而恃盈驕而生亂安富周禮以保息養萬民六曰安也七曰冨謂平其税而不專取旣富子適衛曰庻矣哉冉有曰旣庶矣又何加焉曰富之曰旣冨矣又何加焉曰教之家累千金子貢田農漢秦陽以田農而冨一州販脂翁伯販脂而傾縣邑賣漿張氏以賣漿而踰侈灑削質氏以灑削而食洒削治刀劒濁氏以胃脯而連騎張里以馬醫而擊鍾善人冨謂之賞淫人冨謂之殃子服惠伯謂叔孫曰天殆冨淫慶封又冨矣穆子對曰云云貨財山積牛馬谷量放利而行以財自衛指千僮僕指千巨萬貨財巨萬財雄班固自叙云逺祖以財雄北邊冨埓王者瞻烏爰止于誰之屋言烏集冨人屋朝請史貨殖傳烏氏倮畜牧及衆斥賣求竒繒物間遺戎王戎王什倍其償與畜畜至用谷量牛馬秦始皇令倮比封君以時與列臣朝請貲次如苴成都羅褒資至巨萬初褒賈京師爲平陵石氏持錢石氏貲次如苴親信之厚資遺令徃巴蜀數年間至十餘萬褒舉半遺曲陽侯依其權勢時當物備力餘貸郡國人莫敢負如苴如氏苴氏皆冨人也高貲晉楚之冨孟子曽子曰晉楚之冨不可及也彼以其冨我以吾仁彼以其爵我以吾義吾何慊哉爲仁不冨爲冨不仁用財自衛巴寡婦清史戒懼幅利傳晏子不受邑子尾問之曰吾不受邑非惡冨也恐失冨也冨如布帛有幅焉爲之制度使無遷夫人生厚而利於是乎正德以福爲幅幅利過則敗吾不敢貪多所謂如幅焉冨而無驕冨而好禮人之所欲子曰冨與貴是人之所欲不以其道得之不處也不義如浮雲不義而冨且貴於我如浮雲不淫禮冨貴而知好禮則不驕不淫能散積而能散辭冨君子辭冨不辭貧不仁爲冨不仁爲仁不冨去泰聖人去甚去奢去泰損之而益益之而損知足知止念失冨之由必因厚利思速貧之誡孰敢多藏居利思義聖人不積君子戒盈戒之在得辭宋人之寳曾是不貪譲齊國之封殊非惡冨夫物惡盛惟神害盈知止者冨老子念其潤屋無欲實難慮以焚身非道不處資冨能訓書言資冨而能順教訓也善冨貨殖志任氏折節爲力田畜人争取賤價任氏獨取貴善冨者數世散施後折象父國爲鬱林太守有資二億家童八百人及國卒象感多藏厚亡之義乃以金帛資産周施親踈須知止足之由遽絶錐刀之末驕逸處樂子曰不仁者不可以長處欒怙冨子太叔曰無怙冨又子晢怙冨而卑其上不亡傳曰冨而不驕驕而不亡未之有也斯亂子曰小人冨斯驕驕斯亂故聖人之制使人冨不足以驕也充詘不充詘於冨貴注充詘失節服服文彩而驕易生老子曰服文彩厭飲食是爲盗夸食膏梁而性難正國語曰膏梁之性難正言易驕難正持盈老子遺咎冨貴而驕自遺其咎位不期驕禄不期侈貴位不期而驕自至冨祿不期而侈自來驕侈以行已所以速亡禍敗怙冨子晳怙冨而卑其上不能乆也藴利生孽傳鄭殺駟秦傳鄭駟秦冨而侈嬖大夫也而常陳卿車服於其庭鄭人惡而殺之偏重必離子高曰言聞所求無厭偏重必離言如物偏重必離敗焚身傳象有齒以焚身貨累也賈害傳厚亡多藏必厚亡老子旣生生之太厚亦安安而能遷冨謂之殃傳慶封奔呉呉與之朱方冨於其舊惠伯曰天殆冨淫人慶封又冨矣穆子曰善人冨謂之賞淫人冨謂之殃天其殘之也其將聚而殱旃覆餗之凶必毀盈必毀天之道禍生腐鼠列子曰虞氏梁之冨人財無量登高臨大道陳酒擊博俠客相隨行樓下博者射中兩眼而笑飛鳶適墜其腐鼠而中俠客俠客相謂曰虞氏冨樂乆矣我不侵犯乃辱我以腐鼠必當滅之乃聚衆攻之滅其家注驕侈之致禍非一塗也象有齒而焚身人懐璧而賈害貪冨專利而不厭申侯予取予求不汝瑕疵敗類貪人敗類盈厭饕餮貪于飲食胃干貨賄侵欲崇侈不可盈厭饕餮貪財食也逞無疆之欲以不貪爲寳子罕無欲實難放利而行多怨敗度欲敗度貪惏貪冐屬厭願以小人之腹得爲君子之心屬厭而已懲肆去貪載寳孔子曰南宫敬叔反必載寳而朝孔子曰䘮不如速貧之愈也欲不可縱志不可滿茍得臨財無茍得禮貧無求多貪多也是無厭也不可厭也其能乆乎争利禮不縱欲神亦害盈貪夫徇財傷亷害義可欲罪莫大於可欲不以義制將由惡終無醉飽之心無德而貪不義而冨以徼大利必有近憂小人喻於利語無德而貪子罕謂之䘮寳不義而冨仲尼喻於浮雲貨力而已禮貪泉南海有貪泉人飲之皆貪呉隱之酌飲曰若使夷齊飲終當不易心廉恥缺詩云白華廢則亷恥缺矣黷貨無厭戒得戒之在得行妨難得之貨令人行妨老子楊公不惑楊公云不惑酒色財憂貧谿壑可盈是不可厭國語叔向云人道惡盈吝嗇坤爲地爲吝嗇不足觀子曰如有周公之才之美使驕且吝其餘不足觀也短於財仲尼不假蓋於子夏曰商之爲人也短於財吾聞與人交䕶其短取其長所以能乆曹洪魏志曹洪家冨性吝嗇文帝在東宫時從洪貸絹不如意恨之牙籌晉王戎園田水磑周遍天下自執牙籌晝夜筭計儉嗇不自奉養天下人謂之膏育之疾女適裴顔貸錢數萬乆而未還女後歸寧戎色不悦女遽還直然後乃歡從子將婚戎遺其軍衣婚訖而更責取家有好李賣恐人得種恒鑚其核以此獲譏錢癖和嶠冨擬王者而至吝人謂之有錢癖食不足鄭太有田四百頃食常不足甚愛必大費老子旣􅏽周人旣􅏽􅏽者儉嗇也而師吏尤甚轉轂百數賈郡國無過不至雒陽街居在齊秦楚趙之中冨貴相矜以久賈邑不入門設用此等故師吏能致十千萬也􅏽嗇説苑孔氏南陽大鼓鑄連騎遊諸侯有游閑公子之名然其嬴得過瘉於􅏽嗇也儉嗇魯人儉嗇而丙氏尤甚家自父兄子弟約俯有拾仰有取富至巨萬公侯冨儉張安世字少孺尊爲公侯食邑萬户然而身衣弋綈夫人自紡績家僮七百人皆有手役孔冨不學奢馬周生於冨者驕栁澤上書生於冨者驕田彭郝處俊江淮間爲語曰冨如田彭見貴門冨有金玉韓思復家冨有金玉以貲甲天下馬燧子暢燧沒後以貲甲天下暢亦善殖財家益豐晚爲豪幸牟侵財役里閭嚴震本農家子以財役里閭數出貲助邊多藏者以叔明爲鑒李叔明豪侈在蜀殖財廣地舍田産殁數年子孫驕縱貲産皆盡世言多藏者以叔明爲鑒不立田園張嘉貞雖貴不立田園有勸之者答曰吾嘗相國矣未死豈有飢寒憂若以譴去雖冨田産猶不能有也京師高貲胡証拜嶺南節度使卒廣有舶具竒寳証厚殖財自奉養奴數百人營第修行里彌亘閭陌車服噐用珍侈遂號京師高貲積賄陳儒前此數殺大將冨商故積賄毎曝衣紈繡不可計世冨于財李育德世冨于財家僮百人天下亂乃私完械甲嬰武陟城自保人多從之遂爲長專居賄五年至數千萬裴伷先流北庭無復名檢專居賄五年至數千萬娶降胡女爲妻妻有萬金駿馬牛羊以財白雄養客數百人自北庭屬京師多其客詗候朝廷事聞知十常七八家冨多僮僕積粟常數千鍾李勣本姓徐家冨多僮僕積粟常數千鍾冨埓王者丘和冨擬王侯五代王處直父宗善殖財貨冨擬王侯爲天下高貲王處存家勝業里爲天下髙貲寳精王處回積鉅萬計蜀中冨家罕與比在太原家甚貧善相者周𤣥豹毎指謂知祥曰此子寳精也它日當大冨果如言出九國志藏鏹積粟韓琬飲醲嚙肥被鮮曵華房魯饒財家故饒財韓愈薦契宗師帑櫝之積陸相奏議務鳩斂而厚其帑櫝之積者匹夫之冨也務散發而收其兆庶之心者天子之冨也至冨可敵貴𤣥宗御含元殿望南山有白雲横亘山間左右皆不見令急召元寳曰見一白物横在山頂不辨其狀左右貴臣啓曰臣等不見𤣥宗曰我聞至富可敵貴朕天下之主寳天下之福南部新書金銀屋壁王元寳巨豪常以金銀疊爲屋壁上以紅泥泥之又置禮賢堂以沉香爲軒檻以碔砆甃地面以錦紋石爲柱礎又以銅線穿錢甃於後園花徑中貴泥雨不滑人呼王氏富窟陳子昻以富家子尚氣俠弋博自如貲貨盈衍崔𤣥暐母盧常戒𤣥暐曰我聞姨兄辛𤣥馭云子姓仕宦有言其貧窶不自存此善也若貲貨盈衍惡也白孔六帖卷二十一
