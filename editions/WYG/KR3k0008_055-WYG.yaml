body:
  text: 白孔六帖卷五十五唐白居易原本宋孔傳續撰武勇一單車人賊二交戰叙舊三犒士四虜掠五殿六兵灋七間諜八烽候九斥候十行人十獻㨗十二旋軍十三軍勝十四武勇一力士附驍士白引重鼎不程其力共用之謂勇死國用也死而不義非勇也賈予餘勇齊髙子曰欲勇者賈予餘勇斷布主人懸布秦堇父登之及堞而絶之墜則又懸之蘇而復上者三主人辭焉乃退帶其斷布以徇于軍三日先鳴州綽曰平隂之役先二子鳴二子殖綽郭最勇爵齊莊公為勇爵注設爵命勇士也殖綽郭最欲與焉注自以為勇也訓勇力之士時使車右訓之傳距躍三百曲踊三百魏犫束胷見使者摶人以投中車折軾叔山冉子期曰吾以力事君不可以不然抉豫樟殺人而後死豫樟大木名烏獲舉千鈞力聞諸侯羿善射奡盪舟俱不得其死然論語罔水行舟扛鼎欒氏之力臣曰督戎有力如虎詩募敢死之士漢云斬將搴旗拔山項羽有拔山之力投石甘延壽字君况拔距投石絶於等倫也嘗超踰羽林亭樓甘延壽試弁超踰為期張膽陳渉勇甚犖有力焉能投盖于稷門傳景詔曰不患無勇患其暴材官有材力者角抵角力相抵哀帝時覽弁射武戯皮弁而射角力為武戯周勃材官引彊彊弩也申屠嘉以材官蹶張足踏弩曰蹶張力稱烏獲㨗言慶忌相如諫獵佚材陳湯沉勇飛將李廣驍勇匈奴號曰飛將拔獸箭晉桓石虔材幹趫㨗從父在荆州獵圍猛獸被箭而伏諸將戯令拔箭因而前拔得一箭獸跳虔亦跳髙於獸獸伏復拔一箭從伯父温入闗叔父冲為符健圍垂沒之次虔躍馬赴之拔冲於二萬人中大勇不忮莊子言無往不慎勇則害上不登於明堂狼曋之言也見左傳水行不避蛟龍漁父之勇也陸行不避兕虎獵夫之勇也白刃相交視死如歸烈士之勇也莊子唯力是視挾輈頴考叔輦重秦堇父素厲空猛也方剛好勇疾貧亂也伉健子曰由之勇賢於丘然不能怯家語射石沒羽李廣夜見石如虎射之沒羽後知其石射不復入義勇冠三軍韓延夀絶髕秦武王與孟説舉龍文之鼎絶髕而死秦人殺孟説云云犖投盖於稷門奡盪舟於陸地孔拔箭斷膚殊死前鬬王難得收京師方戰麾下士失馬難得馳救矢著眉披膚鄣目乃拔箭斷膚殊死前鬬血衊靣不已帝嘉之禽生斬馘辛雲京世為將家有膽決以禽生斬馘常冠軍轅門二龍烏承玼與族兄承恩皆為平盧先鋒沈勇而決號轅門二龍其勇無比唐璿吐蕃来請和既宴使者屢覘璿后問焉對曰洪原之戰是將軍多殺臣士卒其勇無比臣願識之后嗟異萬人敵李晟事河西王忠嗣從擊吐蕃悍酋乘城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍讙奮忠嗣撫其背曰萬人敵也冠軍渾瑊從朔方節度使張齊邱破賀魯部拔石堡城龍駒島其勇常冠軍矛矢在手前無彊敵史敬奉痤陋類不勝衣其走逐奔馬挾鞍勒以上而後覊帶之矛矢在手前無彊敵雄邉同上與鳳翔將野詩艮輔及郝玼皆以名雄邉趫雄自奮范君璋以趫雄自奮義而勇裴度帝問諸將才否度對李光顔義而勇當有成功不三日光顔破時曲兵段志𤣥從討王世充深入馬跌為賊擒兩騎夾持其髻將度洛志𤣥忽騰而上二人者俱墜於是奪其馬馳歸尾騎數百不敢近身先鋒鏖陣秦叔寶從討世充建德黒闥三盜未嘗不身先鋒鏖陣前無堅對躍馬挺槍每敵有驍將鋭士震燿出入以夸衆者秦王輙命叔寶往取之躍馬挺槍刺於萬衆中莫不如志力敵數人五代萇從簡事晉為軍校力敵數人善用槊杜伏威煬帝遣右禦衛將軍陳稜以精兵討之伏威迎出挑戰稜軍射中其額伏威怒曰不殺汝矢不拔遂馳入稜陣大呼衝擊衆披靡獲所射將使拔箭已斬之攜其首入稜軍示之又殺數十人膂力絶人王雄誕少彊果膂力絶人勇盖三軍薛萬鈞從李靖討吐谷渾軍次青海與虜遇萬鈞單騎馳突無敢當者還語諸將曰賊易與復馳進擊斬數千級勇盖三軍追奔至積石山大風折旗萬鈞曰虜且来俄而虜至萬鈞直前斬其將衆遂潰勇決楊恭仁楊𤣥感叛詔率兵經畧與屈突通追獲賊煬帝詔見曰比聞與賊戰尤力向但知卿奉法而乃勇決如此朕用自媿着白衣自摽顯薛仁貴髙麗莫離支遣將髙延夀等率兵二十萬拒戰倚山結屯太宗命諸將分擊之仁貴恃驍悍欲立竒功乃着白衣自摽顯持㦸腰鞬兩弓呼而馳軍乗之賊遂奔潰擢驍勇付閫外事師還帝謂曰朕舊將皆老欲擢驍勇付閫外事莫如卿者朕不喜得遼東喜得虓將用兵臨大敵益壯薛訥敢毅石雄少為牙校敢毅善戰氣盖軍中尚材武有崖岸李珙者世儒家珙獨尚材武有崖岸天資票健李光顔葛旃少教以騎射每嘆其天資票徤已所不逮膂力絶衆李嗣業袒持長刀大呼出陣廣平王收長安嗣業統前軍陣于香積祠北袒持長刀大呼岀陣前殺數十人陣復整歩卒二千以陌刀長柯斧堵進所向無前中流矢卧帳中聞金鼓聲瘡潰卒與子儀等圍相州師耄諸將無功獨嗣業被堅數奮為諸軍冠中流矢卧帳中方愈忽聞金鼓聲知與賊戰大呼瘡潰血流數升卒謚曰忠勇云請以勇士二萬椎鋒史思明傳代宗召南北軍諸將問所以討賊計右金吾大將軍薛景仙曰我若不勝請以勇士二萬椎鋒帝曰壯矣衆畏其勇陳利貞朱泚反利貞及張挺芝所統士衆幽薊河隴人故與挺芝合謀應泚而利貞麾下亦從為亂夜半難作利貞拔劒當軍門大謼曰欲過門者先殺我衆畏其勇乃止曲環資勇敢善騎射持陌刀重十五斤張興為饒陽禆將史思明引衆傅城興檈甲持陌刀重十五斤乘城賊將入興一舉刀輙數人死賊皆氣懾左車哥舒翰有奴曰左車年十六以膂力聞翰工用槍追及賊擬槍於肩比之賊反顧翰刺其㗋剔而騰之髙五尺許乃墮左車即下馬斬其首以為常號為擒生踏伏安金全為人驍果工騎射號為擒生踏伏為晉驍將飲釂奮檛馳騎明宗名嗣源梁晉相拒於栢鄉梁龍驤軍以赤白馬為兩陣旗幟鎧仗皆如馬色晉兵望之皆懼莊宗舉鍾以飲嗣源曰卿望梁家赤白馬懼乎雖吾亦怯也嗣源笑曰有其表爾翌日歸吾廐也莊宗大喜曰卿當以氣吞之因引鍾飲釂奮檛馳騎犯其白馬挾二禆將而還梁兵敗以功拜代州刺史本紀善用鐵槍重三十斤王敬蕘為人狀貌魁傑而沉勇有力善用鐵槍重三十斤勇出諸將劉知俊姿貌雄傑能披甲上馬輪劒入敵勇出諸將五代史拔箭反射賊張歸霸張晊軍赤崗以騎挑戰矢中歸霸拔箭反射賊矢發而斃奪其馬而歸太祖從髙邱望見甚壯之臨敵務以身先王景仁為將驍勇剛悍質畧無威儀臨敵務以身先士卒行宻壯之五代史思奮栁宗元方城銜勇韜刀日思奮殛世傳崆峒勇氣激金風壯李白詩其勇無前劉仁軌等以兵開定四夷其勇無前賛令殿前乘馬挾矛作刺賊狀王難得吐蕃賛普子郎支都者恃趫敏乘名馬寶鈿鞍畧陣挑戰甚閑暇無敢校者難得怒挾矛駷馬馳支都不暇闘直斬其首𤣥宗壯其果召見令殿前乘馬挾矛作刺賊狀帝大悦賜錦袍金帶舞刀立馬上斐旻嘗與幽州都督孫佺北伐為奚所圍旻舞刀立馬上矢四集皆迎刀而斷奚大驚引去牧馬襄陵道旁五代氏叔琮晉人復取絳州攻臨汾叔琮選壯士三人深目而胡鬚者牧馬襄陵道旁晉人以為晉兵雜行道中伺其怠擒晉二人而歸晉人大驚以為有伏兵乃退屯于蕭縣單車入賊二敵不相疑附白龔遂漢書遂字少卿渤海賊盜並起拜遂為太守遂未至郡先以書論勑非執弓矢者不得執以為賊單車至郡盗遂清平推赤心後漢世祖降銅馬封渠帥為列侯降者猶不安世祖輕騎按行更相語曰蕭王推赤心置人腹中安得不相投死也更生之辰後廣陵賊張嬰衆數萬殺刺史以張綱為太守單車之職徑造嬰壘諭以禍福嬰泣曰更生之辰所部並靣縳歸降也入賊家拜妻子魏張遼圍昌豨豨欲與遼語詐降遼單身上三公山入豨賊家拜妻子豨隨詣太祖太祖遣責遼曰此非將法遼曰以明公威信著四海遼奉聖㫖必不敢害爾杜畿拜河東河東民衛固謀逆荀彧舉杜畿為太守請單車往出不意固伏誅遺敵藥羊祜事見示信門欒鍼遺子重酒注具下叙舊門單車之官趙喜伯陽時江南未通以喜為簡陽侯相不肯受兵單車之部吏欲不納喜示威信乃悉降于喜又魏裴潜字文行拜代郡郡大亂有烏桓大人專制潜單車之郡單于驚喜潜安撫之孔單騎造壘門王雄誕蘇賊聞人遂安據昆山無所屬杜伏威使討之雄誕以邑險而完攻之引日遂單騎造壘門陳國威靈因開曉禍福遂安即降詣營說豪帥李大亮秦王行北境頃之胡賊大至大亮度不能拒乃單馬詣營說豪帥為分别禍福賊衆感服遂相率降單馬進殺數百人王忠嗣吐蕃大出欲取當新城晨壓官軍陣衆不敵舉軍皆恐忠嗣單馬進左右馳突獨殺數百人身至壁撫諭裴懷古始安賊歐陽倩衆數萬剽沒州縣以懷古為桂州都督招慰討擊使未踰嶺逆以書諭禍福賊迎降自陳為吏侵而反懷古知其誠以為示不疑可破其謀乃輕騎赴或曰獠夷難親備之且不信况易之哉答曰忠信可通神明况裔人耶身至壁撫諭倩等大喜悉歸所掠出降單騎見虜郭子儀懐恩盡説吐蕃回紇党項羌渾奴刺等三十萬掠涇邠躪鳳翔入醴泉奉天京師大震急召子儀屯涇陽軍纔萬人比到虜騎圍已合子儀將出左右諫戎狄野心不可信子儀曰虜衆數十倍今力不敵吾將示以至誠左右請以騎五百從又不聽即傳呼曰令公來虜皆持滿待子儀以數十騎出免胄見其大酋曰諸君同艱難久矣何忽忘忠誼而至是邪回紇捨兵下馬拜曰果吾父也子儀即召與飲遺錦綵結歡誓好如初交戰叙舊三白商鞅請與魏公子卬飲見軍詐門魏祖韓遂魏曹公馬超韓遂戰潼關請與公相見遂與公同歲孝亷又與遂輩至期交語移時不及軍事説京都故舊撫手歡笑既罷超問遂曹公何言遂曰無言超疑之闗侯徐晃後漢闗侯與徐晃相愛及為將相距遥共語但説平生不及軍事須臾晃宣令曰得闗侯賜金千斤侯曰是何言語曰是國事也欒鍼遺子重酒晉與楚戰于鄢陵欒鍼使執榼承飲楚令尹子重子重曰夫子常與吾言於楚必是故也不易識乎受而飲之免使者而復鼓孔舊部闞稜輔公祏反稜與南討青山之戰與陳正道遇陣方接稜脱兠鍪謂衆曰不識我耶何敢戰其徒多稜舊部氣遂索至有拜者笑語如平生歡李全忠因使招朱瑾朱瑾領精騎隔池笑語如平生歡乃使將胡規偽送欵欲得兄瓊射上符竹節全節不入虞瑾伏壯士橋下瓊單騎至方交語士突起掖瓊以入斬其首棄城下汴軍大震全忠恚數日乃去本傳問事胡幾何張巡賊將李懐忠過城下巡問君事胡幾何曰二朞巡曰君祖父官乎曰然君世受官食天子粟奈何從賊闗弓與我确懷忠曰不然我昔為將數死戰竟殁賊此殆天也巡曰自古悖逆終夷滅一日事平君父母妻子並誅何忍為此懷忠掩涕去俄率其黨數十人降犒師四白鄭商人弦髙傳秦人襲鄭鄭商人弦髙以乘韋先牛十二犒師曰不腆敝邑敢犒從者居則具一日之積行則備一夕之衛齊伐魯使展喜以膏沐犒師以義服明且不賂免也武王伐商其小人簞食壺漿以迎之孟子孔乏春服王紹為租庸判官時李希烈阻兵江淮輸物留梗德宗已西狩乃督輕貨趣間道走洋州紹先見帝行在帝勞之曰吾軍乏春服朕且衣裘奈何紹流涕曰紹遣臣貢奉無慮五十萬當即至帝曰道回逺經費方急何可望邪後五日繼至由是紓難置酒饗士竇建德髙士逹留建德守壁身將兵逆戰置酒饗士建德聞曰東海公未㨗遽自矜大禍至不日矣為將者刻薄自入給帛則以䟽易良賦粟則以沙參粒突厥序發家錢頒士卒田布拜魏博節度使發家財頒士卒出愛妾殺以大饗張巡士多餓死存者皆痍傷氣乏巡出愛妾曰諸君經年乏食而忠義不少衰吾恨不割肌以啖衆寧惜一妾而坐視士饑乃殺以大饗坐者皆泣巡彊令食之逺亦殺奴僮以哺卒至羅雀掘鼠煑鎧弩以食以女賣直為衆士費張伾本為澤潞將守臨洛田悦攻之乘城固守累月士死亡且盡救不至伾悉召部將立軍門命女出徧御因曰諸君戰良苦吾無貲為賞願以是女賣直為衆士一日費士皆哭曰請死戰掛甲卸甲錢五代李守貞其始發軍也有賜賚曰掛甲錢班師又加賞勞曰卸甲錢出入之費常不下三十萬由此晉之公私重困作糜粥餔亡卒王敬蕘梁兵攻吳龎師古死清口敗兵亡歸過頴大雪士卒饑凍敬蕘乃㳂淮積薪為燎為作糜粥餔之亡卒多頼以全活五代史斥禁錢百五十萬緡賜其軍李綘田興以魏博聽命綘曰王化不及魏博久矣一日挈六州來歸不大犒賞人心不激請斥禁錢百五十萬緡賜其軍有言太過者綘曰假令舉十五萬衆朞歲而得六州計所轉給三倍于費今興天挺忠義首變汙俗破兩河之汙可嗇小費隳機事哉從之虜掠五不虜掠還生口附白晁錯上䟽曰胡人入驅而能止其所驅者以半與之縣官為贖如此則邑里相救赴難不避死非以徳上也欲利其財也上從之虜獲陳湯貪斬郅支所虜獲入室多不法司𨽻移書於道禁暴秋毫不犯髙祖入闗時賜繡被後漢世祖至井陘問諸將所掠李忠獨無所掠即以所乘大驪馬及繡被賜之還生口後漢武威太守孟威云宜還生口袁安曰還之示中國優貸也又种暠景伯為度遼將軍有生口見獲悉遣之羌胡乃来降夷俘執訊獲醜訊馘嫁生口華歆得嫁生出口孫咸曰施舍自出入居孥戮之家國刑所屬歆當公言以彰天澤而黙受嘉賜獨為君子也折馘執俘楚攝叔致師見上注虜魏王豹韓信係虜累囚囚虜見用韓信克趙得李左車問以計策後封廣武君又太史慈為孫策所執問以進取也又管仲至棠阜鮑叔釋縛季康子伐邾師晝掠傳吳漢平公孫述放兵大掠焚述宫室帝聞譴漢及其副將劉向曰使人既伏孩子老母以萬數一旦縱火放兵人聞莫不酸鼻遂伐三朡俘厥寶玉書孔野無所掠王世充大業十年齊賊孟讓轉寇諸郡至盱眙世充拒之時百姓皆入保野無所掠讓衆餒散失竒寶李靖御史大夫蕭瑀劾靖持軍無律縱士大掠散失竒寶帝召讓之靖無所辯暴掠放肆范希乾遷振武節度使部有党項室韋雜居暴掠放肆日入匿作謂之刮城門希乾度要害置屯保斥邏嚴宻鄙民以安盡還所剽於民張萬福許杲過楚州大掠節度使韋元甫使萬福追討未至杲為其將康自勸所逐循淮鈔而東萬福倍道追殺之免者十三盡還所剽於民斷腕取金崔光逺節度劒南㑹段子璋反李奐敗走成都光逺進討平之然不能禁士卒剽掠士女至斷腕取金者夷殺數千人豢圉一空李守貞晉兵素驕而守貞重威為將皆無節制行營所至居民豢圉一空至於草木皆盡五代史四岀侵暴韓愈天下之兵乘機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒貲産一空李訓舒元輿涯皆為兵所執涯實不知謀士良搒笞急乃自署反狀詔出衛騎千餘馳咸陽奉天捕亡者大索都城分掩涯訓等第兵遂大掠入黎植羅讓渾鐬胡証等家及賈耽廟貲産一空兩省印簿書輙持去大掠居人鄧景山劉展反因引平盧節度副使田神功討展神功兵至揚州大掠居人伐冢墓大食波斯賈胡死者數千人士多鹵掠李光弼急攻趙一日拔之士多鹵掠光弼坐譙間收所獲悉歸之民城中大悦所過剽奪魯炅與史思明戰安陽王師不利炅中流矢輙奔諸節度潰去所過剽奪而炅軍尤甚殿六白孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也論語大車塞隧夙沙衛連大車以塞隧而殿殖綽郭最曰子殿國師齊之辱也注沙衛奄人故辱國子殿國師齊之辱也見上注探簡後漢鄧禹仲華赤眉至人憚為後拒禹書諸將名於竹簡著筒中令探簡張宗曰豈辭難就逸遂破赤眉斷後將蜀志自斷後敗魏志云張繡追太祖太祖自斷後敗繡張飛拒後蜀志曹公追先主張飛拒後瞋目横矛曰是張翼徳可来决死衆莫敢前孔以五百騎殿李光弼思明至偃師光弼悉軍趨河陽身以五百騎殿以下軍殿李愬率中軍三千田進誠以下軍殿出文城栅令曰引而東六十里止襲張柴殱其戍車師後部百夫之敵萬人之特屬於車師後部以殿銅柱張説郭元振碑又遣其將田進誠領馬歩軍三千以殿其後段文昌平淮西碑劒南列將分統之哥舒翰傳禄山反或説翰曰禄山本以誅國忠故稱兵今若留卒三萬守闗悉精鋭渡淮水誅君側此漢挫七國計也思禮亦勸翰翰猶豫未發謀頗露國忠大駭入見帝曰兵法安不忘危大兵在潼闗而無後殿萬有一不利京師危矣即募牧兒三千人日夜訓練以劒南列將分統之又募萬人屯灞上使腹心杜乾運為帥以萬二千人為殿康延孝繼岌班師命延孝以萬二千人為殿五代史以衆殿輔公祐李子通據江都杜伏威使公祐以精兵數千渡江擊之子通拒戰衆十倍鋭甚公祐選甲士千人操長刀居前别以千人隨之公祐以衆殿戰于霍山梁兵敗走王景仁殿而力戰以故梁兵不甚敗霍存從攻潞州與晉人遇戰馬牢川存入則當其前出則為其殿晉人却遂東攻魏取淇門殺三千人五代史兵灋七白國語吳建旗提鼔挾經經兵書也魏公子七畧史記魏公子無忌威名振天下諸侯之客進兵法也魏公子七畧信陵君也司馬兵灋閎闊深逺太史公曰余讀司馬兵法閎闊深逺雖三代征伐未足以統其義如其文穰苴區區為小國行師何暇及司馬乎蹴鞠李將軍射法蹴鞠三十五篇六韜太公黄石公授張良素書曰讀是則為王者師良視之乃太公兵法不學武帝欲教霍去病學孫吳兵法對曰顧方畧何如爾不在學古兵法權謀者以政寄國以權用兵先計後戰兼形勢苞隂陽用技巧也兵形勢雷動風舉後發而先至離合背向變化死生常以輕疾制敵也南楚兵灋七篇蚩尤二篇見吕刑繇叙二篇七畧作由余丁子一篇項生一篇太一兵灋天一鬼容區黄帝宫鬼史區有書三篇圖一卷依託萇𢎞十五篇五勝五行相勝兵技巧十三家者習手足便器械積機闗以立攻守之勝魏太祖自作兵灋十萬言諸侯征伐以新書從事敎婦人具軍政令門金版莊子曰縱説則以金版注太公謀術謀國政事孔武不可玩玩則無震蕭俛進門下侍郎吐蕃寇涇州調兵䕶邉帝因問兵法有必勝乎俛曰兵凶器聖人不得已而用之故武不可玩玩則無震夫以仁討不仁以義討不義先招懷後掩襲故有不殺厲不禽二毛不犯田稼其救人如免水火此必勝術也若乃以小不忍輕任干戈師曲而敵怨非徒不勝又將自危帝重其言喜兵灋樊澤有武力喜兵法議者謂有將帥器嘗召對延英德宗善其論兵與我意合盡畀以術裴行儉蘇定方為大將軍謂曰吾用兵世無可教者今子也賢乃盡畀以術可與語孫吳李靖其舅韓擒虎每與論兵輙歎曰可與語孫吳者非斯人而誰哉灋有攻其必救馬燧田悦反兼魏博招討使抱真芃問曰糧少而深入何也燧曰糧少戰利速兵善於致人今悦與淄青恒三軍為首尾欲不戰以老吾師若分擊左右未可必破悦且来助是腹背支敵也法有攻其必救故趣魏以破之皆曰善應對蠭起王忠嗣雄毅寡言有武畧上與論兵應對蠭起帝器之曰後日爾為良將曉兵術魏元忠江融曉兵術元忠從之游盡傳所學喜讀鬼谷兵家諸書王廷湊喜縱横孫吳術吕恭好讀閫外春秋郭威𨽻從馬直威好讀閫外春秋畧知兵法五代史兵灋本人情陸贄奏議霍去病漢將之良者也每言行軍用師之道顧方畧何如耳不在學古兵法是知兵法者無他人情而已通其變則得失可辨成敗可知古之人所以坐籌樽俎之間制勝千里之外者得此道也為營陣部伍料勝負别器能等四十六訣裴行儉廊廟之士耻言韜畧唐自大中以来以兵為戱者久矣廊廟之士恥言韜畧以櫜鞬為兇物以鈐畧為㓙夫就有如盧潘薛能者自為粗材一旦宇内煙塵飈起遽以褒衣博帶令狎燕頷虎頭足以取敗北夢𤨏言敬翔見太祖太祖問曰聞子讀春秋春秋所記何等事翔曰諸侯戰爭之事爾太祖曰其用兵之法可以為吾之用乎翔曰兵者應變出竒以取勝春秋古法不可用於今太祖大喜五代史以千錢置大盤中為行陣偏伍之狀謝彦章葛從周養以為子授之兵法以千錢置大盤中為行陣偏伍之狀示以出入進退之節彦章盡得之本傳攟摭評議無遺策取其書觀之始自黄帝伏蚩尤至於隋氏平江南語春秋戰國事最備磅礴上下數千年間其攟摭評議無遺䇿劉禹錫魏生兵要用春秋戰灋房琯用春秋戰法以車三千乘繚營騎歩夾之琯自負以天下為己任然用兵非所長舉孫吳倜儻善兵灋科馬燧父季龍兵之隱微不以示矦君集帝命李靖教君集兵法既而奏靖且反兵之隱微不以示帝以讓靖靖曰方中原無事臣之所教足以制四夷而求盡臣術此君集欲反耳破胡必用龍韜策卸甲應將熊耳齊李白送鄭灌詩兵灋五十家爾腹為篋笥杜甫送從弟詩更學兵書戰策馬燧與諸兄學輟策歎曰丈夫當以功濟四海詎老一儒哉更學兵書戰策沈勇多算間諜八探刺附白秦諜晉人獲秦諜殺諸綘市六日而蘇晉侯圍原諜出曰原將降矣傳晉人之覘宋者歸曰宋未可伐陽門介夫死子罕哭之哀國人悦之孔子曰善哉覘國乎覘國見上邦汋周禮司士掌士之八成一曰邦汋讀為酌盜取國之宻事若今探決范宣子數駒支曰言語漏泄則職汝之由漏師齊寺人貂始漏師于多魚三巡數之楚師伐絞分渉於彭羅人欲伐之使伯嘉諜之三巡數之諜告曰楚幕有烏宵諜曰齊人將遁多間諜史趙將李牧居鴈門謹烽火多為間諜女陵漢書淮南王使女陵詗長安中詗侯伺者朽政反伏聽衞青捕伏聽者伏於隱處聽軍之虛實也孔李晟吐蕃君臣大懼相與議尚結賛者善計乃曰唐名將特李晟馬燧渾瑊爾不去之必為吾患即遣使委辭因燧請和上求盟因盟謀執瑊以賣燧於是結賛大興兵踰隴岐無所掠陽怒曰召吾来乃不牛酒犒軍徐引去以是間晟晟選兵三千使王佖伏汧陽旁擊其中軍幾獲結賛諜者反效以情李愬舊令敢舍諜者族愬開其令一切撫之故諜者反效以情愬益悉賊虛實詐為書若同亂者渾瑊崔寧領朔方召為左金吾衞大將軍建中中李希烈詐為瑊書若同亂者帝識其諜用不疑更賜良馬錦幣行反間伊謹以江西牙兵屬李希烈希烈愛其材數饋遺欲縻止之卒以計免明年希烈果反嗣曹王臯至鍾陵得而壯之拔為大將希烈恐為臯所得遺以七屬甲詐為謹書行反間帝遣使斬之臯表列其誣移書還諜蘇頲檢校益州大都督擕州蠻苴院與吐蕃連謀入㓂獲諜者吏請討之頲不聽移書還其諜曰母得爾苴院羞悔不敢侵邊善刺軍中情偽王鍔嗣曹王臯節度江西表為江州刺史兼御史中丞充都虞侯鍔小心善刺軍中情偽事無細大臯悉知之因推以腹心諜軍虛實朱瑄留僕州全忠令友裕馳壯騎諜軍虚實自將而北㑹瑄引還縱兵戰全忠南走絶塹去幾不脱遣諜者入軍中髙仁厚初事劒南西川節度使陳敬瑄為營使㑹卬州賊阡能衆數萬略諸縣列壁數十涪州刺史韓秀昇等亂峽中韓求反蜀州諸將不能定敬瑄召仁厚還使督兵四討屯求安阡能遣諜者入軍中吏執以獻諜自言父母妻子囚於賊約不得軍虛實且死仁厚哀之曰為我執賊明日我且戰有能釋甲迎我者署背曰歸順皆得復農矣縱諜去禽其諜數十人崔義𤣥睦州女子陳碩真反義𤣥自統衆繼之至下淮戍禽其諜數十人提輕兵歛旗鼓李光弼饒陽賊五千至九門光弼諜知之提輕兵歛旗鼓賊方飯襲殺之且盡釋縛飯飲之遣還李晟邏士得姚令言崔宣諜者晟命釋縛飯飲之遣還敕曰為我謝令公等善為賊守勿不忠示泚乃引兵叩都門賊不敢出謳吟思歸李光弼史思明使諜宣言賊將士皆北人謳吟思歸朝恩信然屢上賊可滅狀詔諭光弼光弼固言賊方鋭未可輕動詗刺中國張仲武回鶻常有酋長監奚契丹以督歲貢因詗刺中國仲武使禆將石公緒等厚結三部執諜者八百餘人殺之回鶻欲入五原掠保塞雜虜乃先以宣門將軍四十七人詭好結歡仲武賂其下盡得所謀因逗遛不遣人馬多病死以玉帶與諜者安重誨少事明宗明宗幸汴州重誨建議欲因以伐吳而明宗難之其後户部尚書李鏻得吳諜者言徐知誥欲舉吳國以稱藩願得安公一言以為信鏻即引諜者見重誨重誨大喜以為然乃以玉帶與諜者使遺知誥為信其直千緡初不以其事聞其後逾年知誥之問不至始奏貶鏻行軍司馬夫用間以間人人亦用間以間己彼以宻来理須獨察於心叅㑹於事則不失矣若敵使人来欲候我虚實察我動靜覘知事計而行其間者我當佯為不覺舍其厚利而善啗之微以我偽言誑事示以前却期㑹即我之所須為彼之所失者因其有間而反間之彼若將我虛而為實我則乘其敝而得其志矣通典悉視城中虚實五代劉鄩傳梁已破朱瑾以葛從周為兖州節度使從周將兵在外鄩乃使人負油鬻城中悉視城中虛實出入之所油者得羅城下水竇可入鄩乃以歩兵五百從水竇入襲破之間之道有五焉有因其邑人使潜伺察而致詞焉有因其仕子故洩虛假令告示焉有因敵之使矯其事而返之焉有審擇賢能使覘彼向背虛實而歸説之焉有佯緩罪戾㣲漏我偽情浮計使亡報之焉凡此五間皆須隱祕重之以賞宻之又宻始可行焉通典若敵有寵嬖任以腹心者我當使間遺其珍玩恣其所欲順而傍誘之敵有重臣失勢不滿其志者我則㗖以厚利詭相親帥採其情實而致之敵有親貴左右多詞夸誕好論利害者我則使間曲情尊奉厚遺珍寶揣其所問而反間之敵若使聘於我則稽留其使令人與之共處矯致殷勤偽相親暱朝夕慰諭倍供珍遺觀其辭色而察之仍朝暮令使獨與己伴居我遣聰明者潜於複壁中聽所間使既遲違恐彼怪責必是竊論心事我知計遣使而用之同上烽候九白舉烽史魏公子無忌與魏王方博舉烽言趙寇至王懼釋博公子曰趙王獵爾非為寇也烽舉燧燔論蜀文曰邉郡之士聞烽舉燧燔皆攝而馳荷兵而走唯恐居後偽烽幽王與諸侯約有急則舉烽既而諸侯兵至無寇褒姒乃大笑後犬戎来伐幽王舉烽諸侯以為偽皆不至遂滅周斬褒姒烽火通於甘泉長安匈奴大入灌火滅烽後漢祭彤撫夷狄以恩信論曰政移狄俗乃卧鼓邉庭灌火滅烽於幽障也嚴烽候崔寔為五原守嚴熢候㓂不敢犯字子真去烽火候望种暠為度遼將軍先宣恩信羌來降服乃去烽火候望也乘山舉火魏志孫權放江夏太守遣持書御史荀禹勞邉禹發所經縣兵乘山舉火權乃退也孔築烽堡張獻甫為邠寧節度使斷山浚塹選巖要地築烽堡逺烽偵李元諒加檢討尚書左僕射更節度隴右治良原築連弩臺逺烽偵為守備進據勢勝列新壁虜至無所掠戰又輙北置烽候張仁愿攝御史大夫代朔方於牛頭廟那山北置烽候千八百所自是突厥不敢踰山牧馬朔方益無寇歲捐費億萬計減鎮兵數萬斥地置烽七十所黒齒常之拜河源道經畧大使因建言河源當賊衝乃斥地置烽七十所列炬營中垂拱中突厥復犯塞常之率兵追擊至兩井常之忽與賊遇賊騎三千方擐甲常之見其囂以二百騎突之賊皆棄甲去其暮賊大至常之潜使人伐木列炬營中若烽燧然㑹風起賊疑救至遂夜遁復修杷頭七十烽畢諴為邠寧節度遷河東河東尤近胡復修杷頭七十烽謹候虜㓂不敢入謹烽燧鄭俌中宗時厯右補闕黙啜入敗沙吒忠義詔百官陳破賊勝策俌上疏以為擇邉州刺史謹烽燧以備守燎烽王承元徙鳳翔節度郛左百賈州聚異時為虜剽敓至燎烽相警承元版堞繚之人乃告安邏堞傳烽劉文静夜見邏堞傳烽詫曰天下方亂吾將安舍邉火息燧郭元璹連照甘泉雲烽火動沙漠連照甘泉雲李白塞下曲連山暗烽燧西極最瘡痍連山暗烽燧杜甫送從弟燕悵望但烽火戎車滿闗東遣興照夜烽火照夜屍縱横釋悶漢家還有烽火燃秦家築城備胡處漢家還有烽火燃烽火燃不息征戰無已時李白戰城南詩擅作烽區王晙上言突厥兵已屢動擅作烽區閉障行李築連弩臺李元諒築連弩臺逺烽偵為守備進據勢勝烽候列於郊甸帝嘆曰河湟䧟沒烽候列於郊甸食貨志警急烽常報杜甫詩吐蕃曠年梗寇郭正一吐蕃曠年梗寇師數出坐費糧貲近討則喪威深入則不能得其巢穴今上策莫如少募兵且明烽候勿事侵擾須數年之遲力有餘人恩戰一舉可破矣凡烽候所置大率相去三十里唐六典職方凡烽候所置大率相去三十里注若相山崗隔絶須逐便安置得相望見不必要限三十里其逼邉境者築城以置之同上注每烽置帥一人副一人其放煙有一炬二炬三炬四炬者同上注其放煙有一炬二炬三炬四炬者若多少而為差焉停近甸烽舊闗内京畿河東河北皆置烽開元二十五年勑以邉隅無事寰宇乂安内地置烽誠為非要量停近甸烽二百六十所烽師等一千三百八十八人職方郎中掌城隍鎮戍烽候唐志舍置一烽髙麗傳初帝自太子所屬行在舍置一烽約下遼東舉烽是日傳燎入塞斥候十白周禮懸壺以叙聚􅈀挈壺氏所掌也納斥候示不相備李廣行無部曲行陣就善水草頓舍不擊刁斗自衛幕府省文書然亦逺斥候未嘗遇害趙充國逺斥候行必戰備止必堅壁全師保勝耿秉字伯初休止不結營部逺斥候有警軍陣立成偵還耳目孔斥候不明非可應卒李綘云北虜方彊其憂有五斥候不明非可應卒二也不為斥候李愬為隨唐鄧節度使愬以其軍初傷夷士氣未完乃不為斥候部伍或有言者愬曰賊方安袁公之寛吾不欲使震而備我先是袁滋無功愬求自試故也斥候者邉鄙之視聽不可以不具栁宗元先御史神道碑闢斥候迭望幾二千所文粹吕温三受降城碑来不預知曲江集勑天山渾使竟無斥候来不預知如此防邉無乃踈濶請淮南五路置游奕船㨂解弓弩及請江路者一百人置游奕將一人須清白强幹稍有見㑹者先如法造游奕戰船五十隻一百人分為兩畨長須在江路来徃淮南游奕至池州界首浙西游奕至宣州界首江西游奕至鄂州界首常須半月一度於界首交牌各知界内平安申報本使其下畨人便於㳂江要害處置營不得抽歸便下其糧醬春冬衣仰使司就營所支給如知賊大段巢穴去處仰數道計㑹一時掩殺賛皇一品集潜師入定渾鎬討王承宗鎮定二軍間不百里鎬引兵壓鎮境而屯距賊三十里鼓角聲相聞賊始亦畏見鎬無斥候乃潜師入定境焚廥蓄屠鄉聚鎬軍遂揺㑹取干戈利無令斥候驕杜甫月黒探兵錯韓愈晚秋斥候惶駭裴行儉阿史那伏念懼宻送欵後數日煙塵漲天而南斥候惶駭行儉曰此伏念執温博来降非它也明斥候陸贄論縁邉守備狀謹斥候髙麗傳行人十一白兵交使在其間行人不使今兩國治戎行人不使不可謂整虐執使臣將以釁鼓目動而言肆秦行人夜戒晉帥臾駢曰使者目動而言肆行人失辭孔天子行人西域吐谷渾其相天柱王用事拘天子行人鴻臚丞趙德楷帝遣使曉敕十返無悛言下書臨撫弄賛大宗貞觀八年始遣使者来朝帝遣行人馮德遐下書臨撫行人在彼李靖頡利走保鐵山遣使謝罪以靖為定襄道總管徃迎之又遣鴻臚卿唐儉將軍安修仁慰撫靖謂副將張公謹曰詔使到虜必自安若萬騎齎二十日糧自白道襲之必得所欲公謹曰上已與約降行人在彼奈何靖曰機不可失韓信所以破齊也如唐儉輩何足惜哉督兵疾進斬萬餘級俘男女十萬於是斥地自隂山北至大漠矣獻㨗十二俘馘附白破竹建瓴大捷取虢之旗獻俘受馘飲至大賞戎昭果毅殺敵為果豈敢定居一月三捷歸而飲至以數軍實我武惟揚斬將搴旗之功我戰則克凡諸侯有四夷之功則獻捷于王王以警于夷中國則否諸侯不相遺俘獻楚俘于王晉文獻功于社周禮愷樂凱歌策勲首級居多捷無虛月賞不踰時奉我天誅獻爾月捷獻狀獻功致果程力㑹課受脤以行方見采薇之詠獻俘而入旋聞破竹之功以訊馘告矯矯武臣在泮獻馘子産獻陳捷戎服將事曰陳知其罪授首於我用敢獻功武夫力而拘諸原婦人暫而免諸國先軫怒捨孟明示之以俘馘鄭丈夫人芉氏姜氏勞楚子獻捷乃示之以俘馘鄭入陳子美入數俘而岀但數所獲不將以歸也齊侯来獻以得隕命之禮征伐主獻之籩豆數也隕命禮征伐所獲國君之獻禮司馬法有隕命禮争義不争利也吉語漢書烏孫圍㑹宗陳湯曰不出五日吉語聞春月懸車漢陳湯斬郅支首上疏宜懸藁街蠻夷邸間若今鴻臚舘丞相匡衡大夫繁延夀以月令春當掩骼埋胔勿宜懸車騎許嘉將軍王商以夾谷㑹孔子誅優施方盛夏首足異門而出宜懸十日詔將軍議者是也獻楚捷於周驟稱其伐郤至以一為十魏國淵子尼破賊文書舊以一為十淵上首級如其實太祖問之淵曰夫討外寇多斬之數欲以大武功示民輕也今河間云云太祖悦之孔服金甲乗戎輅告捷于廟李勣從秦王伐東都戰有功東畧地至虎牢平竇建德俘王世充乃振旅還秦王為上將勣為下將皆服金甲乗戎輅告捷于廟獻俘昭陵髙麗莫離支男生為其弟所逐遣子乞師詔勣為遼東道行軍大總管率兵二萬討之破其國執髙藏男建等裂其地州縣之詔勣獻俘昭陵戎服奉賀魯以獻策功蘇定方縛賀魯以還髙宗臨軒定方戎服奉賀魯以獻策功俘獻於乾陽殿都曼靣縛降俘獻於乾陽殿有司請論如法定方頓首請曰臣向論陛下意許以不死願丐其命帝曰朕為卿全信乃宥之上數禽馘曹華日與賊搏數禽馘賊憚之詔百官迎於長樂驛郭子儀乾元元年破賊河上執安守忠以獻遂朝京師詔百官迎於長樂驛帝御望春樓待之進中書令俘馘萬計李愬李師道反愬與賊戰金鄉破之凡十一遇禽其隊師五俘馘萬計破賊功第一時溥黄巢敗東走溥遣將李師悦等追尾巢至菜蕪大破之諸將争得巢首而林言斬之持歸溥以獻天子故破賊溥功第一賀魯西域平帝曰先帝賜賀魯二千帳主之今罪人既得獻昭陵其可乎許敬宗曰古者軍凱還則飲至于廟若諸侯獻馘天子未聞獻于陵然陛下奉園寢與宗廟等可行不疑於是執而獻昭陵赦不誅右翦左屠聿禽其良栁宗元方城論曹參之飲酒正酣鄭亞㑹昌一品制集序謝安之圍棊尚拗曹參之飲酒正酣果有軍書繼聞戎捷平奚虜河北之師當以平奚虜聞吉師矣栁宗元與裴塤書楊復光慷慨負節義有籌畧為小黄門黄巢犯江西復光為排陣使賊䧟江陵復光監忠武軍屯鄧州賊䧟京師節度使周岌投偽命復光因夜宴説岌岌為之流涕瀝酒為盟是夜復光遣其養子守亮殺賊使又入蔡州説秦宗權俾同以義舉收荆㐮敗賊將獻捷行在詔授天下兵馬都監押舊唐廟獻繁馘級樂聲洞椌楬韓愈征蜀聨句中興諸將收山東捷書夜報清晝同洗兵馬行歴代獻捷必有凱歌唐儀衛志厯代獻捷必有凱歌太宗平東都破宋金剛執賀魯克髙麗皆備軍容凱歌入京都然其禮儀不傳太和初有司奏命將征討有大功獻俘馘則神策兵衛於門外如獻俘儀凱樂用鐃吹二部笛觱篥簫笳鐃鼓樂工二人歌工二十四人乘馬執樂陳列如鹵簿鼓吹令丞前導分行俘馘之前將入都門鼓吹振作奏破陣樂應聖期賀朝歡君臣同慶樂等四曲至太社太廟門外陳而不作告獻禮畢樂作至御樓前陳兵仗于旌門外一十歩樂工歩行兵部尚書介胄執鉞于旌門中路前導協律郎二人執麾門外分導太常卿跪請奏凱樂樂闋太常卿跪奏樂畢兵部尚書太常卿退樂工立于旌門外及俘馘入獻乃稱賀俘囚出乃退同上元帥凱旋天子遣使郊勞有司先獻捷于太廟又告齊太公廟唐六典兵部凡六總管師十餘萬皆授靖節度以討之其國遂亡頡利至京師告俘太廟帝御順天樓陳仗衛上民縱觀吏執可汗至帝曰而罪有五而父國破頼隋以安不以一鏃力助之使其廟社不血食一也與我鄰而棄信擾邉二也恃兵不戢部落攜怨三也賊華民暴禾稼四也許和親而遷延自遁五也朕殺爾非無名顧渭上盟未之忘故不窮責也乃悉還其家屬館于太僕廪食之頡利傳旋軍十三白軍志曰允當則歸振旅凱晉盡敵而反歌出車以勞還枤杜以勤歸也入而振旅歸而飲至凡公行告于宗廟反行飲至舍爵策勲傳獻俘授馘軍還之禮洗兵止戈反斾楚令尹南轅反斾班師振旅即戎以岀盡敵而還歌方發於采薇功已成於破竹晉師歸范文子後入武子問之對曰師有功國人喜以逆先入者必屬耳目焉故不敢爾役將班矣喜以逆之謂有功歸望師而哭秦孟明歸秦伯素服郊次望師而哭云云秦以勝歸我何以報孔班師髙仙芝小勃律其王為吐蕃所誘自田仁琬以来三討之皆無功天寶六載詔仙芝以歩騎一萬出討八月芝以小勃律王及妻自赤佛道還連雲堡與令誠俱班師惶惑還軍哥舒曜討希烈帝遣神策將劉德信以兵三千援之又詔河南都統李勉出兵相犄角以希烈在外許守兵少乘虛襲之希烈自解乃遣部將與德信趨許未至有詔切譲使班師德信等惶惑還軍無斥候至扈澗為賊設伏詭擊死者殆半振旅徐還李元諒從渾瑊㑹平凉虜騎乃解元諒遣車重先而與瑊振旅徐還時以為有古良將風返斾河南渉淮浮江梟懸魁逆布宣德澤返斾河南韓雲卿平淮碑軍勝十四警懼附白師有功國人喜以逆之昔歲入陳今兹入鄭楚往歲克敵今又勝都天幸多矣晉師成霸安彊一戰而霸文之教也取威定霸於是乎在七戰皆獲畢萬匹夫也七戰皆獲有馬百乘死於牖下言以夀終也築武軍以為京觀于勝之不可保王師大獻則奏愷樂獻功之樂也周禮若師有功則左執律右秉鉞以先凱樂于社鄧艾伐蜀滅之元凱平吳杜預封當陽侯吉語見上戰勝之後常若輕敵願廣為方畧陸遜與闗羽書狃于蒲騷之役必小羅莫敖常勝之家難與慮敵世祖使臧宫謂之云云敬懼城濮之役楚師敗績晉文猶有憂色曰得臣猶在憂未歇也又列子趙㐮子攻翟勝之有憂色孔子曰趙氏其昌乎勝非其難恃之為難又晉厲公侈與楚戰于鄢陵楚師敗績范文子憂之曰君驕侈而克敵是天益其疾也文子名燮天幸霍去病常與杜騎先大軍亦有天幸未嘗困絶而諸將常坐逗撓若未遇孔搴旗蹈軍出入若神李光顔從髙崇文平劒南數搴旗蹈軍出入若神晝揚兵夜𢷬壘郭子儀討史思明晝揚兵夜𢷬壘賊不得息氣益老擊賊嘉山斬首四萬級獲人馬萬計思明跳奔博陵六戰皆克唐璿吐蕃㓂凉州入洪源谷璿以兵數千臨髙望之見賊旗鎧鮮明謂麾下曰吐蕃自欽陵死賛婆降莽布支新將兵欲以示武且其下皆貴臣酋豪子弟騎雖精不習戰吾為諸君取之乃披甲先登六戰皆克斬二將獲首二千五百築京觀而還斬七禆將劉沔拜河東節度兼招撫回鶻使進屯鴈門闗虜㓂雲州沔擊之斬七禆將敗其衆以還廣平王收長安郭子儀俄從元帥廣平王率蕃漢兵十五萬收長安李嗣業為前軍元帥為中軍子儀副之王思禮為後軍陣香積之寺北距澧水臨大川彌亘一舍賊李歸仁領勁騎薄戰官軍囂嗣業以長刀突岀斬賊數十騎乃定回紇以竒兵繚賊皆夾攻之斬首六萬級生擒二萬賊帥張通儒夜亡陜郡翌日王入京師老㓜夾道呼曰不圖今日復見官軍唐史横貫其營安慶緒聞王師至遣嚴莊悉數十萬屯陜助通儒旗幟鉦鼓徑百餘里師至新店賊已陣出輕騎子儀遣二隊逐之又至倍以往皆不及賊營輙反最後賊以二百騎掩軍未戰走子儀悉軍追横貫其營賊張兩翼包之官軍却嗣業率回紇從後擊塵且坌飛矢射賊賊驚曰回紇至矣遂大敗僵尸相屬于道斬數千級漂血丹渠馬璘遷試太常卿明年吐蕃㓂邉詔璘移軍援河西懷恩之叛璘引還間闗轉闘至鳳翔虜圍已合節度使孫志直嬰城守璘令士持滿外向突入縣門不解甲出戰背城陣虜潰率輕騎追之斬數千級漂血丹渠蕩夷㓙憝李晟露布至梁帝感泣羣臣上夀且言晟蕩夷㓙憝而市不易㕓宗廟不震長安之人不識旗鼓雖三代用師不能加之攻朱泚於光泰門王佖晟在師佖無不從攻朱泚於光泰門賊方鋭佖與李演鏖戰堞血賊數北諸將乘之遂大振馬燧討田悦悦敗餘見火攻門威動京師鄭畋中和元年賊將王璠率衆三萬来攻畋使唐𢎞夫設伏以待璠内輕畋懦柔縱歩騎鼓而前畋以鋭卒數千當賊疏陣而多旗幟乘髙伐鼓賊不測衆寡陣未整伏發衆皆囂日暮軍四合鏖戰龍尾坡殺賊二萬級積尸數十里多獲鎧仗璠遁去禽璠子斬之威動京師霆掃風除突厥賛太宗身勒兵顯責而隂間之戎始内阻不三年縳頡利獻比闕下霆掃風除其國遂墟執酋長南蠻傳詔徙天平軍髙駢領西川節度使駢至不淹月閲精騎五千逐蠻至大渡河奪鎧馬執酋長五十斬之伺敵之隙以取勝周德威老將常務持重以挫人之鋒故其用兵常伺敵之隙以取勝五代史俘馘萬計吳越錢佐王延羲延政兄弟相攻卓儼明朱文進李仁逹等自相簒殺連兵不解者四年仁逹附于李景已而又叛景兵攻之仁逹求救於佐佐召諸將計事乃遣其統軍使張筠趙承泰等率兵三萬水陸赴之遣將誓軍號令齊整筠等大敗景兵俘馘萬計獲其將楊業蔡遇等遂取福州而還由是諸將皆服同上裒㓙鞠頑鋒蝟斧螗栁宗元皇武篇臺圖煥丹𤣥郊告儼匏稭韓愈征蜀聮句未三旬而定晉陽纔期年而滅潞子姦臣放命二紀陸梁據太常之固下窺洛邑通故綘之道旁睨近闕任馮異則拔天井而震上黨仗吳漢則發突騎而傾邯鄲未三旬而定晉陽纔期年而滅潞子不以金購稀將多降不勞師克粤首馳報一品集一舉刈腥膻尸骸積如麻栁宗元鐃歌鼓吹曲掃餘沴以雪霜非天不可元稹賀誅吳元濟表拯遺甿於溝瀆非聖不能掃餘沴以雪霜非天不可斬此鯨鯢破兹梟獍同上賀誅李岕表外委將臣内敷睿筭風行號令天助機謀則可以斬此鯨鯢破兹梟獍若上交下怨可離而間營久卒疲可掩而襲昧去迷就士衆猜嫌可振而走重進輕退遇逢險阻可激而取若敵人旌旗屢動或數顧其卒或縱横其吏或行或止追北恐不利見利恐不獲渉長途而未息入險地而不疑勁風劇寒剖氷濟水烈景炎熱倍道兼行陣而未定合而未畢若此之勢乘而擊之此為天賛我也豈有不勝哉通典擲首陴外降幡夜竪韓愈元和聖德詩負鄙為艱縱則不可出師征之其衆十旅軍其城下告以福禍腹敗肢披不敢保聚擲首陴外降幡夜竪知可以戰與不可以戰者勝知衆寡之用者勝上下同欲者勝以虞待不虞者勝將能而君不御者勝此五者知勝之道通典發三矢輙殺三人於是虜氣懾皆降薛仁貴慮後患悉坑之八遇八克婁師德與虜戰白水澗八遇八克恃武庫之五兵憑宫垣之萬雉于公異破朱泚露布勢均破浪攻甚決河雖其恃武庫之五兵憑宫垣之萬雉北取三闗兵不血刃而史家猶譏其輕社稷之重而僥倖一勝於倉卒殊不知其料彊弱較彼我而乘述律之殆得不可失之機非明於決勝者孰能至此誠非史氏之所及也五代史總仗順之師乘制勝之氣鼓行芟剪易若摧枯陸贄論李晟兵纎縞當彊弩之初孤豚僨肥牛之下衆輕闘蟻勇劣怒蛙纎縞當彊弩之初孤豚僨肥牛之下栁宗元為裴中丞牒事同拾芥力易摧枯杪忽蜂腰虛見辱於齊斧突梯鼠首濫欲寄於旄頭上懽聲洽於萬夫勝氣横於千里上南則浮海濟師共集堂堂之陳東則横江誓衆用成善善之功上如摧枯株如搏畜兎一品集馬牛幾至於谷量虜血殆同於川決同上謝安之圍棊尚拗曹參之飲酒正酣適有軍書果聞戎捷鄭亞㑹昌一品集序足澡吾渭水之恥李靖突厥部種離畔帝方圖進取以兵部尚書為定㐮道行軍總管率勁騎三千繇馬邑趨惡陽嶺頡利可汗大驚曰兵不傾國来靖敢提孤軍至此於是帳部數恐靖縱諜者離其心腹夜襲定㐮破之可汗脱身遁磧口進封代國公帝曰李陵以歩卒五千入絶漠然卒降匈奴其功尚書竹帛靖以騎三千蹀血虜庭遂取定㐮古未有輩足澡吾渭水之恥策勲封龍額歸騎獵麟脚韓愈晚秋聮句破竹寧比其發機走丸未喻於乘勝栁宗元平李師道狀濁河清濟曽無溝洫之虞大峴琅琊不聞崖岸之阻砥磨周鉞水淬鄭刀萬里来袁紹之頭顱三塚葬蚩尤之肩髀一品集跋朝賀書飛塞路歸鞍躍韓文偃城聮句元帥凱樂之日天子遣使郊勞有司先獻捷於太廟又告齊太公唐六典兵部王師奮發勢無駐於建瓴醜類搶攘功有輕於折箠于公異破朱泚露布白孔六帖卷五十五
