body:
  text: 白孔六帖卷三十唐白居易原本宋孔傳續撰言語一博物二隠語三訥四口齒五心六視七聽八面九胷十手十一臂十二言語一慎言辯利口游説失言附誹謗白言語有章發言為詩言之無文行之不逺言以足志不言誰知其志也好言自口言必有中非禮勿言哿矣能言巧言如流俾躬處休不厭公叔文子時然後言人不厭其言言中倫柳下惠思忠君子有九思言思忠無瑕善言無瑕謫千里應之君子居其室出其言善則千里之外應之宰我子貢言語科作乂洪範二曰言言曰從從作乂立言太上立徳其次立言立言謂身沒立言於世身文介子推曰言身之文有徴叔向曰君子之言信而有徴故逺怨於其身子産有辭叔向曰辭之不可已也如是夫子産有辭諸侯頼之若之何釋辭晏子一言君子仁人之言其利溥哉晏子一言而齊侯省刑也輯矣輯睦也詩曰辭之輯矣一言而善傳曰叔向適鄭鬷蔑惡立於堂下一言而善叔向聞之曰必鬷明也下執其手以上曰子若不言㡬失子矣大辯若訥巧言如流文子之賢則聞呐呐而仲尼之聖且貴便便文以君子之辭禮加民言出乎身加乎民口實以台為口實惟口起羞出好興戎有章出言有章大言小言事君大言入則望大利小言入則望小利穆穆皇皇言語之美君子約言小人先言不以言舉人不以人廢言君子也灋語之言能無從乎請事斯語辭達而已矣在耳之言吐嘉言如木屑王澄與人書曰胡母輔之字彥國吐嘉言如木屑霏霏不絶誠為後進領袖也清言理服言譚林藪樂廣常與裴頠清言欲以理服之而頠為言譚之林藪鄙小子之狂簡竊先生之餘論我求懿徳爾有嘉謀當喻以正義豈移於浮辭雖嘉言可聽而國章難廢懐璧興詠鑠金垂範庶遵季布之諾宜附周任之言其容不改斯言有章一言興邦片言折獄戒在三緘應其千里踐言納言訥於言敏於行同心之言其臭如蘭貌言華也至言實也苦言藥也甘言疾也言忠信孟子之知言詖辭知其所蔽淫辭知其所䧟邪辭知其所離遁辭知其所窮慎言古者言之不出恥躬之不逮君子欲訥於言三復南容三復白圭得無訒乎子曰仁者其言也訒曰為之難言之得無訒乎駟不及舌子貢曰耳屬于垣君子無易由言過行君子恥其言而過其行天何言哉子曰予欲無言一言君子一言以為知一言以為不知言不可不慎也呐呐如恱反小貌也趙文子其言呐呐然不出諸口安定辭審言語也桃李無言下自成蹊鸚鵡能言不離飛鳥猩猩能言不離禽獸口容止不妄動易出難悔言易以溺人不可不慎也鉗口結舌大辯若訥言行君子之樞機樞機之發榮辱之主含鋒吉人之辭寡若含劒刃不敢動也慎辭叔向曰晉為伯鄭入陳非文辭不為功慎辭也懲如簧之言緘若訥之辯茍不戒於三緘則必違於千里在朝廷之内雖貴便便於鄉黨之中則宜呐呐出口文子如不出口似不能言言顧行行顧言既三思而後行亦一言而為智亂階亂之所由生也則言語以為階慎乃出話賜不幸言而中孔子云是使賜多言也周廟三緘金人管子曰吾畏事不敢事畏言不為言故如老吃行年六十如老吃耳利口以言取人失之宰我口給子曰禦人以口給屢憎於人焉用佞語巧言如簧顔之厚矣避辯士之舌端惡夫佞者子曰是故惡夫佞者有言者不必有徳惡利口之覆邦家者不辭費有言無實也禮恥之有其言無其行君子恥之溺口子曰君子溺於口注云言如溺水不能自治口費而煩言數煩也舌在張儀舌在足矣多言數窮不如守中喋喋利口婦有長舌惟厲之階詩美言不信信言不美老子躁人之辭多脣舌樓君卿之脣舌亂政書曰君罔以辯言亂舊政亂官書無以利口亂厥官利口惟賢書截截書曰截截善諞言俾君子易辭諞音辯屢中子貢曰億則屢中不思若訥徒務如流巧言亂徳言訒辭煩給奪慈仁子曰給奪慈仁奪亂也言給辯亂慈仁之徳辭有枝葉天下無道則辭有枝葉注虛華之言口恵禮口惠而實不至怨灾及其身奪仁尚口易曰尚口乃窮騰口說也禆竈多言豈不或中揺脣鼓舌莊子緩頰漢王謂酈食其曰緩頰説魏王豹謂徐言引喻嗇夫利口㨗給張釋之言虎圈嗇夫口諧東方朔響應無窮虎圈嗇夫代尉對文帝失言智者不失言起羞惟口起羞書口不道忠信之言為嚚富辰曰傳口過言滿天下無口過莠言自口哀哉不能言匪舌是出唯躬是瘁效夷言衛侯效夷言子之曰君其死於夷乎說其言從之固矣失口君子不失口於人千里違之易曰君子居其室出其言不善則千里之外違之榮辱之主易曰樞機之發云云無徴叔向言曰小人之言僣而無徴故怨咎及之言徐單子㑹韓子于戚視下而言徐叔向曰單子其死乎唯口起羞俾躬自瘁屢中之能雖聞子貢數窮之戒終見老聃多言數窮失辭獲戾失言不可與言而與之言失言其言糞土也謂衛侯之虐上漏其言下失其臣智伯失灌水之言魏武有齚舌之戒辯舌端君子避辯士之舌端口給給也却秦軍魯仲連譚笑而解圍下齊國酈食其掉三寸之舌下齊國七十餘城說楚聲子絶秦吕相雖子貢之言億則屢中而老聃之戒多言數窮折天口舌在張儀宰貢之言蘇張之說碧雞之詞莊子白馬之論公孫龍辯文選離堅合異辯也劇譚膠言辯而不依禮義曰膠言折角五鹿岳岳朱雲折其角杜口齊有辯士田巴於狙邱稷下置館毁三皇而訾五帝一日伏千人有魯連子謂巴日先生之言似梟者惡人也巴乃終身杜口不復敢言服人之口莊子曰服人之口不能服人之心乎害義家語曰小辯害義小言破道蘇秦陳六雄之利害以拒秦六國合從也子貢變五國之興衰以存魯存魯亂齊破吳強晋覇越十年之中五國之變子貢之辯彈射否臧商𣙜得失辯哉家語子貢曰賜願齊楚合戰賜著縞衣白冠陳說其間利害使二國釋患唯賜能之子曰辯哉矯尾厲角鬼谷先生曰蘇秦張儀一體也然其矯尾厲角含吐縱横張儀不如蘇秦是能分人主之地也送金蘇秦抵掌而譚李兊送黄金百鎰賜璧虞卿躡蹻而說趙王賜白璧一雙解連環之璧文子喋喋利口截截諞言言惟可矣利亦博哉未可釋辭所宜從志辭有枝葉禮美言可以市堅白趙人公孫龍為堅白之譚𤣥黄所以為白堅所以為利一拜一起未足為勞蜀伊籍使吳入拜孫權權曰勞事無道籍應聲曰一拜一起未足為勞宏辯陸賈有辯口抵掌河注泉涌懸河之辯宰予子貢蘇秦張儀范睢蔡澤莊周公孫龍惠施桓袁十人皆辯士也騁黄馬之劇譚縱碧雞之雄辯遊說縱横之術合縱連衡蘇張破横散縱使馳説之士無所開其口虞卿説趙史虞卿游説士也躡屨擔簦説趙孝成王一見賜金百鎰白璧一雙再見命為上卿簦長柄笠緩頰見上注掉舌蒯通曰酈食其伏軾掉三寸舌下齊七十餘城立譚以口舌得官婁敬開說語塞語不行辯說得其黨行不茍合義在取容黥布受戮無收朱建之謀韓信伏誅不取蒯通之說否臧於人利害於己樞機之理榮辱在兹巡其邦國建以功名長短術主父偃學長短縱横之術說煒煜而譎誑文選甘言誘我甘辭子以甘辭說子路盗跖責仲尼誹謗謗議庶人謗弭謗國語曰厲王暴虐國人謗王王使衛巫監謗以告而殺之國人莫敢言於道路以目王曰吾能弭謗口語致罪漢書謗讟傳曰君無謗讟宫室崇侈謗讟竝作傳腹心非謗理君父謗鍾繇為廷尉聽君父已沒臣子得為理謗下獄毛玠孝先人有云見黥面妻沒入宫者玠曰天不雨為此也太祖聞怒收玠下獄廷尉鍾繇詰曰自古有孥戮黥墨下獄遂黜免受誅孔融以對孫權使有誹謗之言坐此棄市彼有人焉謀於長者人胥效矣我無是乎去自安之術效滅族之計聲聞于外言不由中利口覆邦巧言亂徳九歌導屈原之情五噫寫梁鴻之恨彼譖人者能無悔乎惟君子乃能非聖人之教殺其管叔見賦於䲭鴞閔於周公用明於狼跋玉石失真卞和泣矣駑驥齊駕伯樂哀之居下訕上君子惡之誹謗之木孔未嘗語禁省事楊師道正觀十年拜侍中性周謹未嘗語禁省事嘗曰吾讀孔光傳想其遺風口伐可汗鄭元璹尚文藝突厥攻太原元璹持節往勞彼以不信咎中國元璹隨語折責無所屈因謂頡利曰今掠財資刼人口皆入所部豈若仆旗接好則金玉重幣一歸可汗口伐可汗如約朕何惜金石賜公哉好醜必言李蕃同平章忠謹好醜必言帝以為無隠漏禁中語劉晏為京兆尹司農卿嚴莊誣劾晏漏禁中語敏于辯論李訓質狀魁梧敏于辯論多大言又持詭辯激昂可聽數言時政得失張公謹數言時政得失太宗多所采納李勣一言髙宗欲立武昭儀為后畏大臣異議宻訪勣勣曰此陛下家事無湏問外人帝意遂定贊曰武氏奮而唐之宗属㡬殱嗚呼不㡬一言而喪邦乎語泄温造帝將用為諌官以語泄乃止警悟而辯温彥博敏於占對髙士亷每論政事得失必陳古為諭竇威千里外猶對面語房元齡髙祖曰每為吾兒陳事千里外猶對面語言天下事若素宦于朝馬周贊曰周之遇太宗顧不異哉由一芥草茅言天下事若素宦于朝㑹朝離立偶語王無競改殿中御史會朝宰相宗楚客楊再思離立偶語附耳語蕭復中官馬欽緒楫宰相列從一附耳語既而從一宻諗復曰有詔與公議向所奏不欲李勉盧翰聞知復曰堯舜有僉曰之言朝廷大事尚當謀及公卿如勉等非其人當罷去一言賢於十萬衆馮盎或告盎叛太宗詔蘭謨發江淮甲卒將討之魏徴諌曰王者兵不宜為蠻夷動勝之不武不勝為辱盎反未狀當懐之以徳盎懼必自來帝乃遣散騎常侍韋叔諧喻盎盎遣智戴入侍帝曰徴一言賢於十萬衆徐彥伯樞機論以謂言者徳之柄行之主志之端身之文也君子之樞機動則物應得失之見也可以濟身亦以覆身否㤗榮辱一繫之能審思而應精慮而動擇其交以後談則悔吝何由而至怨惡何由而生如此乃可以言也以為世戒云俗吏語狄仁傑為兒時門人有被害者吏就詰誦書不置吏讓之答曰黄卷中方與聖賢對何暇偶俗吏語邪劾奏語指斥周允元同平章武后宴宰相詔陳書傳善言允元曰恥其君不如堯舜武三思劾奏語指斥后曰聞其言足以誡安得為過議論必傅經義郝處俊臨事敢言自秉政在帝前議論諄諄必傅經義議論髙簡為時推向陸象先議論持正有守立口辯令狐峘善敷奏機辯明銳馬周言如持水内石李綱乞骸骨帝罵曰卿為潘仁長史而羞朕尚書綱頓首曰潘仁賊也志殘殺然毎諌輙止焉為其長史故無愧陛下功成厚自伐臣言如持水内石敢久為尚書乎語謬劉洎曰頃上書有不稱㫖或面窮詰無不羞汗恐非所以進言者路帝曰卿言善朕能改之及征遼東詔輔皇太子監國帝曰以卿輔太子社稷安危在焉宜識朕意洎曰願無憂即大臣有罪臣請按法誅之帝怪其語謬戒之曰君不宻則失臣臣不宻則失身卿性疎而果恐以此敗劉洎贊曰洎之忠不能自申於上況其下哉古人以言為戒可不謹歟夢進讜言若平生虞世南死帝夢論議持正世南欲有所言目禁輙止闗播盧杞雅知播韋柔可制因從容言播材任宰相其儒厚可鎮浮動乃拜同平章事政一決於杞嘗論事帝前播意不可避坐欲有所言杞目禁輙止退讓播曰以君寡言故至此奈何開口争事邪播即喑畏毋敢與争循謹無所駮異董晉同平章方竇參得君裁可大事不闗咨晉晉循謹無所駮異參欲以其弟申為吏部侍郎諷晉以聞帝怒曰無乃參迫卿為之邪晉謝具道所以然帝問參過失晉無敢隠由是參罷宰相晉皇恐上疏固辭位陸贄曰人之難知堯舜所病胡可以一酬一詰而謂盡其能哉談辯華給崔蕘自負其辯黎幹自負其辯沾沾喜議論單議悟主楊炎同平章言租賦庸調法自是人不土斷而地著賦不加斂而増入版籍不造而得其虛實吏不誡而姦無所取輕重之權始歸朝廷矣炎興嶺表而以單議悟主詳辯李固言吃接賔客頗謇緩然毎議論人主前乃更詳辯陽瘖王徽為户部黄巢入闗為賊所執廹還將汙以官徽陽瘖不答以刄環脅卒不動應對如響宇文融神明警敏應對如響不為偽辭恱人韋貫之名純沉厚寡言與人交終歳無款曲不為偽辭以恱人辯給粉澤其非盧從史擢昭義節度既得志寖恣不道至奪部將妻而能辯給粉澤其非孔戡等屢以直語争刺初唯唯後益不從以口語軒輊事機楊虞卿性佞柔就黨中為最能唱和者以口語軒輊事機故時號黨魁誕譎敢言張宿憲宗為廣陵王時因張茂宗薦尉得出入邸中誕譎敢言坐漏禁中語張宿數召對不能謹宻坐漏禁中語貶栁丞游公卿間熊望恱險躁以辯說游公卿間談辯可喜楊虞卿父寜談辯可喜古興亡事劉蕡明春秋能言古興亡事以口舌縁飾王世充渉書傳善占對習法敢舞文上下人或辯駮世充以口舌縁飾衆知其非亦不能屈也口陳移用費數千名崔仁師遷度支郎中嘗口陳移用費數千名太宗恠之詔黄門侍郎杜正倫持簿使仁師對唱無一謬帝竒之時事無不言白居易工文章被遇憲宗時事無不言湔剔抉摩多見聽可居若不能言桓彥範志忠孝居若不能言及議論帝前雖被詰讓而安辭定争辯争愈切危言切議宋璟張嘉貞後為相閱堂按見其危言切議未嘗不失聲嘆息議論有體張鎬惟簡重清談終晷不及榮利楊綰性儉約清談終晷而不及榮利欲干以私聞其言必内愧止動人以言所感己淺言又不切人誰肯懐陸贄言欲紓多難收羣心惟在赦令而已動人以言所感己淺言又不切人誰肯懐善談確劉伯芻有風度善談確而動與時適論者少之移人王叔文能以口辯移人口無二言衛大經與語見其冲逺盧𢎞宣元和中鄭權帥襄陽辟署幕府李愬代權二人交憾𢎞宣始謁愬敕左右謹衛既與語見冲逺不覺洗然能劇談宋子奢為人樂易能劇談以經誼縁飾重謹苗神客性重謹未嘗語禁中事人及其醉問之亦熟視不答論事者以單言進劉祥道疏曰永徽以來論事者或以單言進族立黨語元結今有仁恤之令憂勤之誥人皆族立黨語指而議之善談名理鄧王元裕好學善談名理談詭和逢堯談詭當大事敢邀福言直不敢專權李峴韓擇木曰峴言直不敢専權片言悟主取宰相房琯贊曰琯以忠誼自片言悟主而取宰相占奏敏給元載為度支郎道路目語不敢復議李少良上書詆其醜狀載怒殺少良道路目語不敢復議稱道皆詩書史孝章性修謹漏言宋申錫文宗時同平章事除王璠京兆尹宻論帝㫖璠漏言而守澄黨鄭注得其謀不詳之言李晟詔罷兵通王府長史丁瓊者嘗為張延賞擠抑内怨望乃見晟曰以公功乃奪兵柄夫惟位髙者難全盍蚤圗之晟曰君安得不詳之言執以聞九弊陸贄九弊騁辯給􅃷聰明上之弊也人人助為談說吳士矩文學蚤就喜與豪英游故人人助為談說誕譎敢言鄭雲逵進見不敢出一言及天下事崔損性齪齪延英進見不敢出一言及天下事樂瘖黙栁宗元貶永州雅善蕭俛詒書言情曰讀易困卦至有言不信尚口乃窮往復益喜曰嗟乎余雖家置一喙以自稱道詬益甚耳用是更樂瘖黙與木石為徒不復致意辯士臨說杜洪淮南將劉存濬次傳城洪軍氣沮存使辯士臨說嚴黙終日孔述睿雖與親朋燕集至嚴黙終日人皆畏之善辭令温彥博性周謹善辭令毎問四方風俗臚布誥命若成誦然發言陋鄙李林甫無學術發言陋鄙聞者竊笑政事多所闗訪王紹謹宻主計凡八年政事多所闗訪紹亦未嘗一言漏于人於大議論往往有所合杜悰有大臣體以捭闔干時張濬不得志乃羸服屏居金鳳山學從横術以捭闔干時說王敬武王敬武在平盧軍最彊累召不肯應濬往說之而敬武已臣賊不迎使者濬責之曰公為天子守藩今使者齎詔至不北面俯伏而敢侮慢公乃未識君臣大分何以長吏民哉敬武愕貽愧謝李抱真說王武俊李抱真沉慮而斷王武俊反以數騎馳入見武俊曰泚希烈争竊帝號滔攻貝州此其志皆欲自肆于天下足下既不能與競長雄捨九葉天子而臣反虜乎且詔書罪己禹湯之心也方上暴露播越公能自安乎因持武俊涕下交頥武俊亦感泣解語馬嗣孫為人懦暗少學劉眗罷相常侍孔昭序建言常侍班當僕射前嗣孫責御史臺檢例臺言故事無所見據今南北班位常侍在前嗣孫即判臺狀施行劉眗大怒崔居儉楊言于朝曰孔昭序解語是朝廷無解語人也述慮劉洎非言無以述慮諄複王世充言語諄複百緒遽言亟辯權徳輿善辯論李吉甫秉政用李絳參贊是時帝切于治事無鉅細悉責宰相吉甫絳議論不能無持異至帝前遽言亟辯徳輿從容不敢有所輕重博物二白博物君子晉侯謂子産云彊識記曰博聞彊識而讓者謂之君子多識晉侍中王粲博物多識指掌張華彊記四海之内若指諸掌顯節陵中䇿嵩山之下有人得簡一枚上有兩行科斗書張華問束晳晢曰此漢明帝顯節陵中䇿驗之果然也識亡書漢書上幸河東亡書三篋詔問知者唯張安世字子孺識之具得其事後得亡書校無所遺上竒之擢拜尚書郎龍肉鮓陸機饋張華鮓發噐曰此龍肉也賔客未信華曰以苦酒漬之必有異漬酒五色光起機反問鮓主主曰茅積下得白魚質狀殊常作鮓美故相獻也虵化為雉武庫封閉甚宻忽有雉雊張華曰此虵化為之開視雉側果有虵蛻也桐材擊石鼓吳郡臨平岸崩出一石鼓槌之無聲帝問張華華曰取蜀中桐材刻為魚形叩之則鳴矣如其言果聲聞數里孔子識土怪羵羊辨防風骨孔鼨鼠盧若虛多才博物辛怡諌為職方有獲異鼠者豹首虎臆大如拳怡諌謂之鼮鼠若虛曰非也此許謹所謂鼨鼠豹文而形小一坐驚服鍾山壙中銘鄭欽說通厯術博物初梁太常任昉大同四年七月於鍾山壙中得銘曰龜言土蓍言水甸服黄鐘啟靈北瘞在三上庚墮遇七中已六千三百浹辰交二九重三四百圯當時莫能辯者因藏之戒諸子曰世世以銘訪通人有知之者吾死無恨昉五世孫升之隱居商洛寫以授欽說欽說出使得之於長樂驛至敷水三十里忽悟曰卜宅者廋葬之嵗月而先識墓圯日辰甸服五百也黄鍾十一也繇大同四年郤求漢建武四年凢五百一十一年葬以三月十日庚寅三上庚也圯以七月十二日己巳七中己也浹辰十二也建武四年三月至大同四年七月六千三百一十二月月一交故曰六千三百浹辰交二九十八也重三六也建武四年三月十日距大同四年七月十二日十八萬六千四百日故曰二九重三四百圯升之大驚服其智霓裳拍王維客有以按樂圖示者無題識維徐曰霓裳第三疊最初拍也引工按曲信然阮咸器元行沖有人破古冡得銅器似琵琶人莫能辯行沖曰此阮咸所作器也姑洗角楊收涔陽耕得古鍾髙尺餘收叩之曰此姑洗角也既劀拭有刻在兩欒果然古鼎銘五代張䇿少聦悟父同居洛陽敦化里浚井得古鼎銘曰魏黄初元年春二月匠告于同以爲竒䇿時年十三居同側啟曰漢建安二十五年曹公薨改元建康是歲十月文帝受禪又改黃初是黃初元年無二月也銘何繆邪同大驚異之狼星直日江南李嗣主詰旦殿庭忽見殘麞一脚視之乃獸食之餘詢宿衛莫知所以遂使人詢陳陶陶曰昨暮乃狼星直日故耳嗣主嘆曰真鴻儒矣隱語三白廋辭國語范文子曰有秦客廋辭於朝卿大夫不知也吾得其二焉武子怒曰童子三掩人於朝以杖擊之折笄廋辭謂作隱語也庚癸吳申叔儀乞粮於魯公孫有山有山曰若登首山以呼曰庚癸乎則諾注云西方主穀癸主水軍中不敢出粮故爲隱語麥麴芎藭楚申叔展問還無社曰有麥麴乎有山芎藭乎注二物可以禦濕欲使無社逃難於泥中郭舎人請東方朔隱語漢書黃絹㓜婦外孫韲臼孔有羙醬乎有梁米乎并乞墨一枝許欽眀為凉州都督嘗輕騎按部㑹突厥黙啜兵掩至被執賊與皆至靈州使說之降欽明至城下呼曰我乏食有羙醬乎有梁米乎并乞墨一枝時賊營四面阻水惟一路得入欽眀欲選將束兵乗夜襲賊也而城中無寤其廋者遂見害迷隱其辭李乾祐擢御史大夫爲禇遂良所惡出邢魏二州刺史嘗爲書與所善刺史取朝廷事迷隱其辭爲吏所賣遂良白發於朝坐流驩州廋文王廷湊始廷湊賤㣲時鄴有道士爲卜及得鎮迎事甚謹復問夀幾何子孫幾何荅曰公三十年後當有二王已而廷湊立十三年死蓋廋文也私䦧隱語髙駢擢發吏百餘號察子厚廪食令居衢閧間凢民私䦧隱語無不知折其文爲十二言叚居正妻謝字小娥居正與謝父同賈江湖上並爲盗所殺小娥轉側丐食至上元夢父及夫告所殺主名離折其文爲十二言持問内外姻莫能曉李公佐隱占得意曰殺若父者必申蘭殺若夫者必申春小娥泣謝歲餘得蘭于江州春于獨樹浦曽崇範妻凢許聘數人其夫趣死一夕夢人謂曰田頭有鹿迹田尾着日炙乃汝之夫也後嫁崇範方悟江南野史舅得詹事朝野僉載張說女嫁廬氏常爲舅求官說不語它日復問說但指支床龜女欣然歸告其夫曰舅得詹事矣後果然也大眀寺水太保令狐綯鎮淮南慕容班嘗與從事俱遊大明寺之西廊見壁前題云一人堂堂二曜重光泉深尺一㸃去冰傍二人相連不欠一邉三梁四柱烈火燃添却雙勾兩日全諸賔顧之皆莫辯獨班曰一人大字也二曜者日月明字也泉深尺一者寸土寺字㸃去氷傍水字二人相連天字不欠一邉下字三梁四柱烈火燃無字添却雙勾兩日全比字得非大明寺水天下無比也衆恍然桂苑叢談其文初不可曉五行志貞觀十七年八月涼州昌松縣鴻池谷有石五青質白文成字曰髙皇海出多子李元王八十年太平天子李世民十年太子李治書燕山人士樂太國主尚注譂奬文仁遇千古火王五王六王七王十風毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上不治示孝仙戈入爲善其文初不可曉而後人因推己事以驗之蓋武氏革命自以爲金徳王其佛菩薩者慈氏金輪之號也樂太國主則鎮國安樂公主太平公主皆以女亂國其五王六王七王者唐世十八之數碑隂八字漢太尉許馘碑乆磨滅諸孫再刻之題八字碑隂曰談馬礪畢王田數七人莫能曉徐鉉父延休一見解曰談馬許字礪畢碑字王田重字數七立字王仲舒與同舎郎日置酒邀賔客相樂李藩名彊致之仲舒專爲俳說廋語相狎昵李藩一見謝不徃曰吾終日不曉所語何哉赤元生粟開元中含元殿火基下出丹至有隱語不可解言天漢三年赤元生粟木下有子傷心過酷此亦不能辯也出百家鱠淮西石䜟宣室志元和元年九月裴晉公徃征吳元濟至境上因發地得石刻有雞未肥酒未熟之語解之者曰鷄未肥無肉也肥去肉爲己酒未熟無水也酒去水爲酉破賊之期在己酉乎後賊平果以是日訥四吃附白吉人寡辭易呐呐見慎言門注剛毅木訥近仁君子欲訥於言周勃張相二人言事未嘗出口訥口李廣訥口少言口吃揚雄口吃不能劇譚質厚呉漢字子顔質厚少文造次不能以辭自逹口訥心辯有珪璋之質郭林宗謂劉鴻儒鄧艾口吃常稱艾艾晉文帝戯曰艾艾爲是幾艾荅曰鳳兮鳳兮是一鳳期期不奉詔周昌剛直而口吃髙祖欲廢太子立趙王昌曰臣期期不奉詔魯恭王餘季年好音樂口吃難言吳志司馬相如口吃而善於著書孔囁嚅翁竇鞏平居與人言若不出口世號囁嚅翁口吃而辯陸羽遇人不能道寒暄五代孫晟爲人口吃遇人不能道寒暄已而坐定談辯鋒生聽者忘倦蹇緩李固言口吃接賔客頗蹇緩合喙而隱志兮幽嘿以待盡桞宗元閔生賦言呐性魯無特逹之節栁宗元上權補闕絳侯木訥爲漢元輔陸相奏議趙武呐呐而爲晉賢臣絳侯木訥而爲漢元輔公孫洪上書論事帝使難洪以十䇿洪不得其一及爲宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一訓一誥而謂其盡能哉口齒五白脣亡齒寒諺曰輔車相依云云舌在張儀開口示妻曰舌在足矣口爽老子曰五味令人口爽折齒齊景公爲孺子牛而折其齒編貝東方朔曰臣齒如編貝口容止不妄言也見齒高柴子羔執親之䘮泣血三年未嘗見齒齒决禮濡肉不齒决乾肉齒决摺齒魏齊笞范睢折脅摺齒摺音路合反皓齒文選没齒管仲奪伯氏駢邑三百飯蔬食没齒無怨言杜口婁敬以口舌得官張儀掉三寸舌匪舌是出徒以口舌藺相如忠言不避截舌載翕其舌翕合也駟不及舌莫捫朕舌婦有長舌口呿而不合舌舉而不下說文云公孫龍也乳臭漢書漢撃魏豹問曰魏大將誰也曰栢直曰是口尚乳臭含香應劭漢官侍中言老口臭帝賜鷄舌香含之口方瀬鄉記老子口方杜恕體論曰束脩之業其上在於不言其次莫如寡辭諺曰使口如鼻至老不失周生烈曰口者言之門脣者舌之藩齒者脣之合也故子貢曰駟不及舌三緘其口家語孔子入太廟階左有金人焉三緘其口防人之口若防大川大决所犯傷人必多子産云孝經鉤命决曰仲居海口言善食海澤也淮南子曰趙襄子殺智伯豫讓欲報怨恐人識之乃落其齒以易其貎齒化爲石神仙傳服神丹三百歲異物志曰西屠夾在海中以草染齒以黒勝白張蒼無齒唯飲乳百餘歲卒漢書夜生晉書成帝杜皇后少有深色長猶無齒有求婚者輙中止及帝納采一夜齒盡生温嶠先有齒疾抜之中風而卒孔方口婁師德顔真卿盧杞數遣人問方鎮所便将出之真卿徃見杞辭曰先中丞傳首平原面流血吾不敢以衣拭親舌䑛之公忍不見容乎杞衘恨切骨鉗口結舌顔真卿令宰相宣進止御史臺作條目不得直進從此人不奏事矣陛下聞見止於數人耳目天下之士方鉗口結舌頭可斷舌不可禁柳渾張延嘗怙權嫉渾守正遣親厚謂曰明公舊德第謹言于朝則位可乆渾曰爲吾謝張公渾頭可斷古不可禁卒爲所擠爲文之士亦多漁獵前作戕賊文史快其意抽其華置齒牙間柳宗元答友人掉長舌於公卿間劉嚴夫與叚校理書文粹爵賞在其口吻黎軒傳䆠者劉忠翼與左衛将軍董秀皆有寵於代宗當盛時爵賞在其口吻折齒温廷筠不得志去歸江東令狐綯方鎮淮南廷筠怨居中時不爲助力過府不肯謁丐錢楊子院夜醉爲邏卒擊折其齒訴於綯綯爲劾吏吏具道其惡行絢兩置之飲堇齒燋張果帝謂髙力士曰吾聞飲堇無苦者竒士也時天寒因取以飲果三進頽然曰非佳酒也乃寢頃視齒燋縮顧左右取鐵如意擊墮之藏帶中更出藥傅其斷良乆齒己生粲然駢㓗帝益神之鴂舌啅譟柳宗元貶永州司馬雅善蕭俛移書言情曰楚越類間音聲特異鴂舌啅譟今聽之恬然不怪己與為矣家生小童皆自然嘵嘵晝夜滿耳聞北人言則啼呼走匿雖病夫亦怛然駭之虎口郭知運二齒生則天春秋髙左右不悟其衰俄而二齒生詔改元長夀五色齒止戈集孔戣好術藝延接方士多所傳授能口中現五色齒綵色光絢一瞬即改舌端之㜸慘乎楚鐡劉禹錫口兵戒浮危所餘十九齒飄颻盡浮危韓愈贈崔二十六詩齒落舌存齒落未是無心人舌存恥作窮途哭杜甫暮秋寄蘇侍御詩皆碎張廵每戰大呼嚼齒皆碎及尹子竒視之其齒存者不過三四老君剪舌唐䕫州道士王法朗舌長呼字不正乃日誦道德經後夢老君剪舌金剛石碎佛牙正觀中有僧言得佛牙所擊無堅物傳奕聞之曰我聞金剛石至堅唯零羊角可破試徃擊之應手而碎劉餗傳記騰口任㘖㘖柳宗元詩羡君齒牙牢且㓗韓文贈劉師服羡君齒牙牢且㓗大肉硬餅如刀截其有口舌者率以利啖之劉晏其有口舌者率以利啖之使不得有所訾短故議者頗言晏任數固恩無掉爾舌以速爾咎姚元崇口箴利口作戒長舌爲詩同上心六白我心匪石不可轉也我心匪席不可卷也如旌楚王曰寡人心揺揺如懸旌無瑕士蔿曰心茍無瑕何恤乎無家不競孔叔曰心則不競何憚於病心不則德義爲頑傳如面富辰曰心之不同如其面焉包藏禍心心能制義曰度人藏其心不可測度心莊則體舒心肅則容敬心正而後身脩禮方寸徐庻曰方寸亂矣心如結兮詩如水鄭崇曰臣門如市臣心如水心若死灰莊子虚其心老子𤣥覽心照老子曰滌除𤣥覽丹府靈府靈臺並心也中心不和不樂而鄙詐之心入矣外貎不莊不敬則慢易之心入矣鄙吝心生郭林宗曰逾月不見黃叔度則鄙吝心生聖人無常心以百姓心爲心以禮制心書志以道寜作德心逸日休作僞心勞日拙至和爲性最靈由心非僻之心無自入也禮主張六志緘縢七情楚王蕩而禄盡徐庻亂而計窮剖賢人之心書刳心而學道言學道先去其心也莊子心計桑𢎞羊以心計十三爲侍中有臣三千惟一心紂有臣億萬惟億萬心予有臣三千惟心同心武王曰予有亂臣十人同心同德啟沃髙宗謂傳說曰啓乃心沃朕心金石後漢世祖指王常曰此家率江夏諸将輔翼漢室心如金石真忠臣也是日遷爲漢中将軍同心之言其臭如蘭劒承其心晏子春秋曰崔杼弑齊莊公以㦸鉤其頸劒承其心春秋元命苞曰心者火之精成於五故人心長五寸二人同心其利斷金其心三月不違仁一心可以事百君百心不可以事一君仲尼聞之曰小子記之哉晏子春秋凡人心險於山川難知於天禮夢人以刀開心異苑曰鄭𤣥師馬融三載無聞融鄙而遣之𤣥過於樹隂下假寐夢見一老父以刀開心謂曰子可以學矣於是却返孔心如山岳尉遲恭隱太子常贈金皿一車辭以聞秦王王曰公之心如山岳然雖積金至斗豈能移之髙世温造張建封節度徐州造謝歸下邳慨然有髙世心心如鐡石契苾何力帝曰若人心如鐡石感心疾韋綬晚乃感心疾罷還第不極於用蹙其心祖君彦正抜柱蹙其心即死厚貎小心髙行周𨽻明宗悵下初爲禆將趙德鈞識之謂明宗曰此子厚貎而小心它日必大貴宜善待之五代史面醜心妍韓愈送窮文言必顧心心必副事陸贄言易曰聖人感人心而天下和平夫感者誠發於心而形於事事或未諭故宣之於言言必顧心心必副事三者相合乃可求感欲小孫思邈曰心爲之君君尚恭故欲小詩曰如臨深淵如履薄氷小之謂也約之於心陸贄上書曰惟勤思而熟計之捨己以從衆違欲以遵道逺憸佞親忠直推至誠去逆詐斯道甚易行不耗神不劬力第約之於心耳心爲萬事主張𤣥素遷右庻子時太子承乾事游畋不恱學𤣥素上書曰心爲萬事主動而無節則亂敗德之原實在於此嘔出心李賀母使婢探囊中見所書多即怒曰是兒要嘔出心乃己耳誓天李抱真見王武俊武俊感其不疑乃指心誓天曰此身已許公死乆矣多記損心劉洎諫曰多記損心披而示心馬燧賊將徐廷光再拜燧曰爾以吾爲欺邪今不逺數歩可射我披而示心廷光感泣夢持巨鑿破其心尹知章少雖學未甚通解忽夢人持巨鑿破其心内若劑焉心沈抑以不舒兮柳宗元閔生賦擾濁浮躁本之於心韋承慶嘗謂人所以擾濁浮躁本之於心治心莫若和平杜牧送人赴舉序旣操心之大謬欲當時之奏技望故園賦鐫心鏤志旁睨後逸鐫心鏤志錦心繡口柳宗元乞巧文駢四驪六錦心繡口將息之道當先理其心心閑無事然後外患不入韓崔羣書忠臣寒膺盧杞傳忠臣寒膺良士痛骨雖長不滿七尺而心雄萬夫李白上韓荆州書視七目附白非禮勿視視思明君子九思將思明也杜蕢謂嬖叔曰爾爲君目將思明也無淫視正視也視遠惟明視曰明洪範曰視曰明明作哲目誠楚辭專專之目誠凡視上於面則傲下於帶則憂傾則姦傾謂旁視不正也目不别五色之章爲昧傳五色令人目盲見小曰明視之不見名曰微以管闚天蔽明冕而前旒所以蔽明視之明也鑒於賢不在見於蚊睫視之遠也觀於德不在覩於秋毫三年視蝨百步觀毫離婁視下單子㑹韓子于戚視下而言徐叔向曰單子其死乎衣有禬禬領也帶有結㑹朝之儀視不過結禬之中所以導容貎以明之失則有闕今單子爲王宫伯而命事於㑹視不登帶言不過歩貎不導容而言不昭不導不恭不昭不從無守氣矣四目舜明四目而天下治逺視賈琮爲刺史升車褰惟逺視廣聽紏察善惡百城震悚尊其瞻視君子正其衣冠尊其瞻視儼然人望而畏之見秋毫之末離婁百歩之外見秋毫之末目逆宋華父督見孔父之妻於路目逆而送之曰羙而艶竊視金日磾見武帝羙人滿側日磾不竊視忤視馬融前授生徒後列歌妓盧欽受業不忤視儀禮曰與大人言始視面中視抱注言書見面觀其顔色所傳言也若父則游目無上於面無下於帶子於父主孝不主敬所視廣因覩安否若不言立則視祫坐則視膝天子視不上於祫不下於帶國君妥視謂上於祫大夫衡視謂平視士視五歩從長者上丘陵則必向長者所視視必下將入戶入户奉扃視瞻無回視速右師視速而言疾有異志焉視流鄭伯視流而行速覆視戴目而視傾耳而聽察泉魚觀天文視目不眩王戎視日之蚤暮禮目目若懸珠東方朔自言美目盼兮目擊貿貿餓者貿貿然來貿貿目不明貎目動臾駢觀秦使者目動而言肆懼我也必敗之青白眼阮籍能爲青白眼禮俗士輙以白眼嵇喜候之籍見以青眼喜乃退五色令人目盲老子䘮明子夏䘮其子而䘮其明曾子弔之曰吾聞朋友䘮明則哭之曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商汝何無罪也䘮爾親使人未有聞焉䘮爾子䘮爾明爾何無罪與子夏投其杖而拜之曰吾過矣吾過矣左丘明䘮明厥有國語司馬遷與任安書云目者離之象易離爲目目如㸃漆杜宏理治國而無禮譬猶瞽之無相與倀倀乎其何之瞭然眊然孟子曰人之善不善在乎目其心正則童子瞭然其心不正則童子眊然瞭音了眊音耄重瞳舜目又項羽目亦重瞳不瞬列子引錐至曉其目不瞬兩葉蔽目不見太山鶡冠子目所不見故若存若亡心所不繋故不生不滅十目所視蜂目豺聲深目而猳喙睆目眼如紫石稜閉門而泣目盡腫爛爛如巖下電裴楷謂王戎之睛孔方瞳子黒白明澈李密方瞳子黒白明澈煬帝見之謂宇文述曰左仗下黒色小兒爲誰曰蒲山公李寛子密帝曰此兒顧眄不常無入衞不能正視永王璘貎陋甚不能正視目禁関播與盧杞論事帝前播意不可避坐欲有所言杞目禁輙止屏蔽元稹曰聾瞽之君非無耳目左右前後者屏蔽之不使視聽欲不亂可得哉失明令狐彰與魚朝恩有隙及用事彰不敢入朝㑹母䘮失明卒白眼相公張允伸性暴厲眸子多白燕人號白眼相公崔光逺瞳子白黒分明目恚李林甫少選詔書出耀鄉九齡以左右丞相罷林甫嘻笑曰尚左右丞相邪目恚而送乃止紿病目行觸柱朱延壽田頵之附朱全忠二人謀絶行密行密憂甚紿病目行觸柱目睛黃而夜有光五代張彦澤目睛黃而夜有光顧視如猛獸一目重瞳子南唐李煜一目重瞳子晝能見星武攸緒晚年瞳有紫光晝能見星廞目史思明鷹視五代秦王從榮爲人輕儁而鷹視目多白睛五代漢髙祖目多白睛凛如也眼語韓建昭宗東遷建從至洛昭宗舉酒屬太祖與建曰遷都之後國歩小康社稷安危繋卿兩人次何皇后舉觴建躡太祖足乃陽醉去建出謂太祖曰天子與宫人眼語幕下有兵仗聲恐公不免也太祖以故尤德之環視羅洪信文㺹死衆曰孰願主吾軍者洪信輙曰神命我矣衆環視以爲宜遂立之低目窺覘蘇安恒䟽深目而髯趙來章卜人秦誗曰宜遇西人深目而髯乃得其實也目如秋水李泌賀知章曰此椎子目如秋水必一拜卿相出鄴侯家傳木睛周寳唐立武選以髙上擊毬較其能否而黜陟之至有致鐡鈎于毬仗以相撃寳嘗與此選爲鐡鈎所摘一目暗失寳取睛吞之復撃毬獲頭籌遂授涇原勑賜木睛以代之一日晨起潄木睛墜水棄之侍姬竊笑寳怒曰瞎漢何足笑遂殺之注木睛莫知何木置中無所礙視之如真睛矣出吳越備史視物隔褷䙰𤣥花著兩眼視物隔褷䙰韓愈寄崔二十六忽盲文粹皮日休九諷遇謗篇目正視兮忽盲腦脂腦脂遮眼卧壯士韓文雪後寄崔公目眇號獨眼龍威名葢代北李克用目瞬如電江南野史吳主璟目瞬如電見善不敬與昬瞽同柳宗元送從兄序其凝其盲韓拘幽操目揜揜兮其凝其盲目視昬花尋常間便不分人顔色韓文伐眼酉陽雜俎三尸上尸青姑伐人眼闊視藩鎮序闊視大言自成一家低目相視劉總譚忠說總曰郡國弄兵低目相視可謂危矣聽八耳附白非禮勿聽聽思聦君子九思無側聽禮舜逹四聦而治天下耳不聽五音之和爲聾傳五音令人耳聾老子司聦杜蕢飲工曰汝爲君耳将司聦不聞樂是不聦也文子曰聽者所以逹知也所以成行也所以致功名也不精不明不深不逹故上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓故聽之不深則知行之不誠凡聽之理虚心清淨耳無茍聽耳屬于垣天聽卑􅁗宓曰天之至髙而聽至卑蜀志言猶在耳聽之不聞名曰希聽曰聦聦作謀洪範曰四曰聽掩聦大戴禮曰冕而前旒所以蔽明黈纊塞耳所以掩聦通人於己文子曰言者所以通己於人聞者所以通人於己旣暗且聾人道不通和聲入於耳而藏於心坎爲耳易惟明在於聽政不在聞螻蟻之鬪惟聦在於聽德不在聞焦螟之聲傾耳而聽之可得而聞也廣聽賈琮事見上注洗耳堯聘許由爲九州長由惡聞之洗耳於潁水枕流王武子曰流非可枕孫子荆曰所以枕流欲洗其耳逆耳張良曰忠言逆耳利於行漢髙紀雉雊髙宗祭有飛雉升鼎耳而雊不聼之異也忘味子在齊聞韶三月不知肉味知音伯牙彈琴鍾期聽而知其音聽和而聦國語單穆公曰耳目心之樞機故視和則明視聽不和則有震眩視秋毫之末則不聞雷霆之音兩豆塞耳不聞雷霆鶡冠子傾聽求聲者則耳苦而目樂定心管物者則神勞而形安同在一身之上而休戚異者是天理殊宜造化白隔言提其耳重聽何傷黃覇爲郡許丞老聾史請代之覇曰許丞廉史重聽何傷諸葛亮請杜徵至以徵聾於座上與書云伏聞徳行飢渴歴時云云徵以老病乞歸孔纚纚令人忘倦馬周岑文本謂所親曰馬君論事㑹文切理無一言可損益聽之纚纚令人忘倦進對失次喬琳同中書門下平章事天下矍然駭之琳年髙且聵每進對失次所言不厭帝㫖顧目見耳前蜀王衍顧目見耳耳大李忠臣帝嘗謂卿耳大真貴兆耳無根袁天剛見馬周曰君耳無根夀不長生缺左耳商成已生而缺左耳忽睽文粹皮日休耳方聦兮忽睽耳冷孟洪徽對宣宗曰陛下何以不知有臣何不以文字召用帝怒曰朕耳冷不知有卿出朝野僉載耳中天地薛君曹見二青衣駕赤犢出耳二童子曰兠𤣥國在吾耳中一童子傾耳示君曹乃别有天地花卉因捫耳投之至一都㑹城池樓堞窮極瓌麗因作思歸賦自童子耳中落幽怪録三耳秀才董謹爲太山府君呼爲録事令決疑獄謹舉秀才張審通決之甚當府君喜其聦敏爲於額上更添一耳旣還額極痒踊出一耳尤聦時人曰天有九頭烏地有三耳秀才亦呼爲雞冠秀才同上聞善不慕與聾聵同柳文送從兄序耳肅肅兮聽不聞聲韓愈拘幽操丁寧附耳莫漏洩韓退之月蝕詩病聾五代鄭玨在相位旣碌碌無所爲自又病聾提其耳五代王峻曰兖州慕容彦超反迹已露若陛下出汜水則彦超入京師陛下何以得之翟守素馳還具道峻言是時太祖已下詔西幸聞峻語遽自提其耳曰幾敗吾事乃止不行面九白夫爲人子者出必告反必面禮女子出門必擁蔽其面事親三日具沐其間面垢不學牆面涖事惟煩朋而不心面朋也友而不心面友也楊子面長二尺荀卿子曰有臣公孫吕身長十尺面長二尺廣三寸名動天下半面後漢應奉字世叔行汝穎過袁賀門出半面不見賀二十年路見識之傅粉何晏面如凝脂王右軍見杜𢎞理而歎曰面如凝脂目如㸃漆此神仙中人也子西袂掩而終國語楚白公勝作亂劫惠王殺子西慙見葉公子髙以袂掩面而終夫差巾覆而死呉越春秋曰呉王夫差死羞見子胥以巾覆面今人謂之面衣也面如驢面呉書諸葛子瑜人心不同其如面焉子産云宋如周面長孔相觸陳夷行楊嗣復及夷行對延英帝以其面相觸頗不恱沬面狄仁傑送制獄歎曰皇天后土使仁傑為此乎即以首觸柱血流沬面不識陸䞇旣放荒逺常闔户人不識其面兩面人劉季述帝囚少陽院崔𦙍告難於朱全忠請以兵除君側全忠封𦙍書與季述曰彼反覆宜圖之季述以責𦙍𦙍曰姦人偽書從古有之必以為罪請誅不及族季述易之乃與盟允謝全忠曰左軍與允盟不相害然僕歸心於公并送一侍兒全忠得書恚曰季述使我為兩面人自是始離季述方面五代寇彦卿方面一尺之面五代桑維翰身短而面長常臨鏡以自竒曰人七尺之身不如一尺之面面澤赤袁天綱見馬周曰君面澤赤壽不長面如虎袁天綱與韋挺游謂挺面如虎當以武處官挺善隠太子薦為左衛率面如髙麗楊再思張易之兄司禮少卿同休請公卿宴其寺戯曰公面似髙麗唾面婁師德其弟守代州辭之官教之耐事弟曰人有唾面絜之乃已黒子似顔平原柏良器父友王奐曰面黒子似顔平原黄面兒賈餗㑹曲江故事尹自門歩入揖御史餗騎而入御史楊儉蘇特固争餗曰黄面兒敢爾以帽障李訓帝下詔暴訓注等罪李孝本猶金帶以帽障面奔鄭注白面兒五代劉鄩末帝遣使者監督其軍鄩召諸將謀曰主上深居禁中與白面兒謀必敗人事會面嗟黧黒杜甫贈王侍御五行秀氣得之居多者為儁人其色㶑灔於顔間其聲發而為文章劉禹錫吕温集記面紫色五代漢髙祖面色青黒五代羅𢎞信狀貌竒怪面色青黒軍中異之人罕識其面五代崔梲遭世亂寓居于滑臺不逰里巷者十餘年人罕識其面面有銀光方鎮編年錢鏐鎮呉越胡岳渡江畫工以貌奏歎曰面有銀光竒士也即召見胷十白釋名曰胷臆也結胷山海經曰有結胷國人為人結胷如人結喉也貫胷又曰貫胷國為人胷有竅孔子之胷文曰制作定世符運春秋孔演圖云披胷列子得卯披胷淯水蕩其胷當味值胷洞胷逹腋開胷毁骨碎胷傷胷左傳魏犨爇僖負羈氏犨傷胷晉文矦愛其才使視之犨束胷而見使者漢髙祖與項羽對軍數羽十罪羽伏弩而射漢王中胷髙祖詐捫指長歎息古詩胷坼而生禹帝王紀禹母吞神珠云云孔封常胷無疑事封常清才而果胷無疑事匕首揕胷于志寧賛曰志寧諫太子承乾㡬遭賊殺然未嘗懼知太宗之明雖匕首揕胷不愧也胷有七黒子髙力士㓜與母麥相失後嶺南節度使得之瀧州迎還不復記識母曰胷有七黒子在否力士􅃝示之如言穴胷李密敗王伯當曰豈公一失利輕去就哉雖殞首穴胷所甘已以手指胷五代王松以手指胷引郭子儀自誚迷惑胷下開迷惑胷窙豁斸株橜韓退之送文暢北遊二十八宿羅心胷李賀髙軒過獨任胷臆唐史呉兢上言芟刈股肱獨任胷臆可為寒心不置白黒於胷中韓愈崔羣書所以言者懼足下以為吾所與深者多不置白黒於胷中耳胷有偃骨酉陽雜俎太極真仙中名青琳青書者胷有偃骨手十一白天將假手傳執子之手詩兩驂如手如臂之使手六轡在手共飯不澤手禮論語隱義曰齊桓公北伐中山還倚柱歎曰天下珍物悉易得未得人肉食易牙歸斷其兒兩手以啖君鉤弋夫人漢書鉤夫人兩手皆拳武帝披之手即展號曰鉤弋夫人母囓手搜神記曰周暢至孝每出母欲呼之自囓手暢心痛即馳歸羮爛後漢劉寛欲朝婢翻羮汚朝服婢以手收之寛曰徐徐羮爛汝手論語摘輔象曰仲弓鉤文在手是謂知宰我握戸是謂守道子游握文雅是謂繁士公冶長手握輔是謂道子夏握五是謂受公伯周手握直期是謂病惡䑕傷晉髙平劉柔夜䑕傷其手指惡之問淳于智智即以朱書腕後横文為田字夜露手而卧明有一大䑕手前死長者與之提攜則兩手奉長者之手燕丹子曰太子與荆軻置酒美人鼓琴軻曰好手太子即斷其手以玉盤盛而奉之繩貫魏畧曰鮑出字文才屬代飢出採蓬子母在家為賊繩貫手掌驅去出走斬賊奪母而還纎纎擢素手不分麈尾王夷甫見美丈夫門脩肱契長肘李廣握鉤仲尼執雅子貢刻文公孫述摻摻女手手如柔荑為魯夫人宋仲子生而有文在其手曰為魯夫人孔如亡左右手房𤣥齡辭位帝遣使謂曰國家相眷頼乆一日去良弼如亡左右手束手太宗討髙麗𤣥齡上䟽曰為中國患無如突厥而大小可汗相次束手握手𤣥齡疾甚帝親握手與决摸稜蘇味道為相特具位未嘗有所發明脂韋自營而已常謂人曰决事不欲明白誤則有悔摸稜持兩端可也故世號模稜手揺手李德裕帝欲授李訓諫官德裕謂訓小人湏咎惡暴天下不宜引致左右帝語王涯别與官德裕揺手止涯帝適見不懌手弱王徽襄王煴作亂煴逼召徽及僣號廹羣臣作誓牒徽託手弱卒不肯署程知節白秦王知節隱太子譛之出為康州刺史白秦王曰大王去左右手矣身欲乆全得乎知節有死不敢去汙吏歛手盧奐為南海太守汙吏歛手一手廢盧照隣客東龍門山疾甚足攣一手又廢斂手李至逺知選事疾吏受賄謝多所絀易吏肅然斂手垂手過膝前蜀王衍垂手過膝毒手尊拳五代李襲吉晉王與梁有隙交兵累年後晉王數困欲與梁通和使襲吉為書諭梁辭甚辨麗梁太祖使人讀之至於毒手尊拳交相於莫夜金戈鐵馬蹂踐於明時歎曰李公僻處一隅有士如此繡其手迹於衣南平髙季興莊宗嘗問季興曰吾已滅梁欲征呉蜀何者為先季興曰宜先蜀臣請以本道兵先進莊宗大恱以手拊其背季興因命工繡其手迹於衣歸以為榮耀霹靂手裴琰之為同州司户名動一州號霹靂手握手諄勞沙陀傳李克用還過汴朱全忠邀之克用入舎上源舘全忠握手諄勞手大尺餘翟天師名乾祐長六尺手大尺餘每揖人手過胷酉陽雜俎炙手可熱勢絶倫杜甫麗人行争指栁玭纎瑕㣲累十手争指矣所以修已不得不至為學不得不堅舉手伸縮便有輕重宦者序威柄下遷政在宦人舉手伸縮便有輕重唾手可取禇遂良翔旝雲朝唾手可取手打賊李巨召入禁中對合㫖帝大恱勑宰相與語乆不得罷國忠怠對奉庭謂巨曰比來人多口打賊君不爾乎巨曰誰為相公手打賊乎臂十二白割臂而盟魯莊公許孟任為夫人孟乃割臂而盟之遂生公子班申蒯斷而鬬崔杼弑莊公申蒯後至將入御止申蒯聞君死請入門者告崔子崔子曰勿納蒯曰汝疑我與汝臂斷左臂與門者門者將示崔子遂入蒯遂拔劎呼天躍而鬬殺七人未及崔子一呌而死也李廣猿臂漢書羿左臂長而善射淮南子齧母臂史記曰呉起出衛郭門齧母臂辭别曰不為卿相不入衛郭門折臂三公幽明録曰羊叔子父墓人相云有帝王氣叔子掘斷之後相者再至曰當出折臂三公後叔子馬墜折臂一臂國交州記曰儋耳國東有一臂國人皆一臂也春秋元命苞曰湯臂四肘是謂神剛象月推移以綏四方也過膝蜀志先主長七尺五寸目顧見耳臂垂過膝李牧臂短謝靈運詩曰李牧媿長袖若身之使臂齧臂為盟續漢書曰單超河南人梁兾振動天下帝呼單超等五人入謀誅梁兾帝齧臂為盟也蜀志曰關侯為流矢中左臂隂雨常痛伸臂與醫刮骨去毒流血盤中神氣自若孔猿臂郭知運斷臂王珂牙將劉訓叩寢門珂疑有變叱之訓自􅃝其衣曰茍有它請斷臂臂短五代朱友謙附于晉醉寢晉王帳中晉王視之顧左右曰兾王雖甚貴然恨其臂短耳臂龍鱗奮張亮程公穎稱亮卧若龍當大貴亮曰國家殆必亂吾臂龍鱗奮矣嚙臂皇甫湜命其子録詩一字悞嚙其臂血流生子兩首四臂劉鋹天寳九年南海民妻生子兩首四臂南漢世家斷臂仍􅤿􅧜韓文征蜀聯句連臂歡咋叛臣陳敬瑄黄巢亂僖宗幸奉天敬瑄夜召監軍梁處厚奉表迎帝繕治行宫令孜亦倡西幸敬瑄以兵三千䕶乗輿宂從内苑小兒先至敬瑄知素暴横遣邏士伺之諸兒連臂歡咋行宫中士捕繫之呼曰我事天子者敬瑄殺五十人尸諸衢由是道路不譁唐史把臂杜甫苦戰行臨江把臂難再得矢著臂唐史王方翼為安西都䕶三姓咽麫兵十萬踵至方翼連戰矢著臂引佩刀斷去左右莫知印臂上曰風月常新史諱録曰明皇開元初被進者曰印選以綢繆記印臂上曰風月常新印以桂紅膏則水洗不退王畿如臂陸贄曰王畿如臂而四方如指此天子大權也堂下斷臂周仁軌酷嗜殺戳異日見堂下有斷臂惡之送于野數日徃視故在白孔六帖巻三十
