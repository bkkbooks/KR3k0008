body:
  text: 白孔六帖卷九唐白居易原本宋孔傳續撰西京一東京二城三關四道路五封疆六郊七野八閭里九舘驛十橋十一西京一白作我上都漢之西遷作我上都上腴九州之上腴奥區天地之奥區三成帝畿周秦漢周以龍興秦以虎視四塞秦地被山帶河四塞之固沃野千里天府名都邦畿千里城闕九重秦據而彊漢都而盛寔惟地之神臯天邑鑒秦制誇周法京邑翼翼四方取順神州之略赤縣之畿京師王室皇州皇都帝里百二之都言險固要害水陸所湊秦之興也天錫鶉首之分漢之王也星符東井之精險左據函谷崤陵之阻右界襃斜隴首之險在鎬王在在鎬帝王之宅崤函作帝王之宅金城漢張良曰闗中左崤函右隴蜀南有巴蜀之饒北有胡苑之利東制諸侯所謂金城千里天府之國建瓴漢書奏中形勝之國加兵於諸侯猶髙屋上建瓴水建邦設都書封畿甸服千里法日白虎通京師者千里之邑法日月之徑千里帝畿王畿申畫書曰申畫郊坼申畫規畫經野周禮體國經野注云經謂為之里數也制其畿疆周禮制其畿方千里而封樹之注樹木溝上所以表助險固也正封周禮正畿疆之封制畿周禮制其畿封以正邦國王城帝宅表裏山河周原詩周原膴膴堇荼如飴域民是以聖主域民漢書郊野之富號為近蜀鄭白之沃坤靈正位孔神州化首魏元忠封事神州化首國家大本在京師裴耀卿答帝問四方之本陸贄曰王畿者四方之本也其勢當令京邑如身王畿如臂四方如指此天子大權也畿内數州京師之本髙季輔列上五事以謂畿内數州京師之本土狹人庶儲蓄少而科役多宜蒙優貸令得休息強本弱枝之義也闢殿軋宫以朝諸侯唐文粹李庾西都賦唐開禪壇新都之門闢殿軋宫以朝諸侯龍道雙廻鳳闕五門同上西京賦以唐東都為西都五代朱梁紀歌吹喧萬井車馬塞康荘韋應物詩王業根本陸䞇論關中事宜状且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則内保一方當天下之半可養力候時也強則外制東夏據域中之大可以蓄威昭徳也所貴乎京師韓文所貴乎京師得不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎洛陽梁為西都後唐為洛京五代職方考洛陽梁唐晉漢周常以為都唐故以為東都梁為西都後唐為洛京晉謂西京漢周因之池象漢兮昭回城依斗兮闌干劉禹錫望賦登灞岸兮見長安紛擾擾兮紅塵漫鬱葱葱兮佳氣盤池象漢兮昭回城依斗兮闌干東京二白建都河洛即土之中東京翼翼四方之極增周法修漢制萬方輻湊處於中土帶河泝􅏖宅中以圖大左伊右瀍封畿千里定鼎之都建圭之地大司徒以土圭之法測土深正日景以求地中經營書成王在豐欲宅洛邑使召公先相宅既卜宅則經營召公既相宅周公往營成周使来告卜曰澗水東瀍水西惟洛食食吉兆也無外稱尊宅中圖大先王之經邑也度天地之所合四時之所交風雨之所會隂陽之所和然則百物阜安乃建王國焉所謂建土圭以測影得天地之中郟鄏成王定鼎于郟鄏王者之里河洛為王者之里後漢中興光武都洛京卜而作邑聞宗周之經營居以為都見炎漢之遺制卜洛遷周險史記初大臣勸髙祖都洛陽曰東有成臯西有崤澠背河洛其固足恃也以為鎮三川九阪三塗九谷建國周禮惟王建國注營作洛邑於中土新邑于東國洛書召公所相周公所營域民見西京門注東周延祚平王東遷而延祚衡臯梓澤金谷銅街河洛大都成周故地孔千里蕭條亭舎不煙郭子儀程元振説帝都洛陽帝可其計子儀奏曰洛陽自大盗以来焚刼略盡百曹榛荒寰服不滿千戸井邑如墟豺狼羣煙嘷東薄鄭汴南界徐北綿懐衛及相千里蕭條亭舍不何以奉萬乗牲餼供百官次舍哉鬭塲又曰且地狹隘才數百里險不足防適為鬪塲形勢不及闗内張𤣥素貞觀四年詔發卒治洛陽宫乾陽殿且東封𤣥素上書漢祖將都洛陽婁敬一言即日西駕非不知地土中道里所均但形勝不及闗内弗敢康也伏惟陛下化凋敝之俗為日尚淺詎可東廵以揺動人心洛陽朝貢天地中𤣥素又言過甚於煬帝帝顧房𤣥齡曰洛陽朝貢天地中朕營之意欲便四方百姓今𤣥素言之如此後必往雖露居庸何苦汴州唐故曰宣武軍梁以汴州為開封府建為東都後唐滅梁復為宣武軍晉天福三年升為東京漢周因之五代職方考作唐東宅唐文粹李庾東都賦始乎周卜今日隋革進十八里作唐東宅與京比儔我甸我郊二聖之靈壇在焉赤縣神州與京比儔籠故地之銅駝抱舊里之玉雞同上神都則天天宅元年九月改東都為神都帝宅李光弼傳判官韋損曰東都乃帝宅公當守之國之都府半在東周白居易制唐髙宗建東都詔朕聞踐華固得百二稱乎建瓴卜洛歸仁七日崇乎定鼎是以控膏腴於天府啓黄圖於渭濵襟沃壤於王城摛緑字於河渚初學記升汴州為開封府建為東都五代朱梁紀雄都定鼎地勢據萬國尊河岳出雲雨土圭酌乾坤韋應物望洛詩帝宅夾清洛丹霞捧朝暾葱蘢瑶臺榭窈窕雙闕門以河南府為東都肅宗本紀寳應元年建夘月辛亥以河南府為東都鳳翔府為西都城三計料順時勞役具土功附白髙城深池崇墉浚洫城郭溝池以為固金湯傳金城湯池美城傳美城之大名無戎而城讎必保焉廣袤髙卑繕其城隍秦築長城延袤千里以拒胡也城郢楚嚢瓦城郢沈尹戌曰苟不能衛城無益也亟城梁伯好土功亟城而不䖏民罷而不堪則曰某冦将至乃溝公宫漆秦二世欲漆其城崩杞梁死其妻哭之城為之崩四墉是資善守何患来攻啓塞從時門戸道橋謂之啓城郭墻壍謂之塞開閉之急不可一日而闕隨壊時而理之不可限以土功之時坏城郭月令孟冬城以巨防門之重閉懐德惟寧雖闘士蒍不供是懼終執仲幾宗子維城山為楚國方城以為城漢水以為池又秦踐華山為城因河為池㩀萬丈之城臨不測之川要害當要害之衝控形勝之國用逸制勞以寡勝衆城門禁後漢郅惲君章為上東門候帝常獵遇夜方駕還惲拒關不開帝乃廻從中東門入賜惲布貶中東門候所過治城馬援所過輒為郡縣治城郭保民穀梁曰城以保民為之也民衆城小則益城益城無極凡城之志皆譏也注夫保民以徳不以城如民衆輒益城是無限極也扼地咽喉為國藩屏扃鐍土宇緘縢地維沙城魏祖征馬超毎渡渭為超騎所突營不得立又多沙不可築城婁子伯說公曰今天寒可起沙為城以水灌之從之一夜而成城民見上衆心國語衆心成城言以衆心為城走集傳險其走集踐華為城賈誼過秦論解帶為城墨子干城詩赳赳武夫公侯干城却月荆州圖說有却月城長雲鮑昭蕪城賦屹若㫁岸矗似長雲城麏楚王使由于城麏復命子西問髙厚大小不知子西責之對不能王遇盗雲中余受戈其所在􅃝示之此余能也脾洩之事余不能麏城在脾洩城惡渠邱城惡衆潰奔莒曰城已惡矣其孰與我為虞雖宗子是固則可徵辭而大夫不供亦宜加罪百雉俟我乎城隅孔築却月城李靖輔公祏據丹陽召靖入朝受方略公祏遣惠亮屯當塗築却月城延袤十餘里為掎角靖曰若出不意挑攻其城必破之惠亮㧞公祏禽矣跨水聨堞崔神基拜并州長史初州隔汾為東西二城神慶跨水聨堞合而一之省防禦兵歳數千建樓堞厮多樂水自環王方翼遷肅州刺史州無隄壍寇易以攻方翼乃發卒建樓堞厮多樂水自環烽邏精明碎葉裴行儉討遮匍奏王方翼為副築碎葉城靣三門迂還多取以詭出入五旬畢西城胡縱觀莫測其方略築三受降城張仁愿黙啜悉兵西擊突騎張仁愿請乗虛取漢南北於河北築三受降城絶虜南寇路唐休璟以為築城虜腹中終為所有仁愿固請中宗從之池隍敬暉為衛州刺史是時河北經突厥所騷方秋而城暉曰金湯非粟不守豈有棄農畝而事池隍哉縱民歸歛􅂒郡頼安和戎郭震為涼州都督初州境輪廣四百里虜來必傅城下元振始於南硤口置和戎城北磧置百亭軍制東要路遂拓境千五百里自是州無虜憂矣豐安定逺先天元年為朔方道大緫管築豐安定逺城兵得保頓上完故城張守珪為𤓰州刺史墨離軍使督餘衆完故城版築方立虜奄至築郛浚隍闗播傳李元平兼泌州别駕知州事元平始至募工築郛浚隍城無完堞非可應卒李絳上言北虜方強其憂有五城無完堞非可應卒二也陽託霖雨増陴浚隍顔真卿為平原太守安禄山逆状牙萌真卿度必反陽託霖雨増陴浚隍金城清河太守使郡人李蕚来乞師蕚曰聞公首奮羣唱大順河朔恃公為金城固繕陴隍張建封進濠壽廬觀察使是時四方尚多故繕陴隍築城堡李齊運拜京兆尹時李晟壁渭橋齊運發民築城堡督芻粟以餉晟詔城臨涇郝玭貞元中為涇鎮將嘗從數百騎出野還說節度使馬璘曰臨涇扼洛口其川饒衍利畜牧其西走戎道曠數百里皆流沙無水草願城之為休養便地詔城或謂璘曰玭言信然雖然公所以蒙恩大幸以邊防未固也上心日夜念此故厚於公今若用玭言則邊以安尚何事為璘遂不聽及代段佑為節度玭又說曰天寳時天下以兵為防獨西域耳西塞至京師且萬里自禄山反西陲盡亡寰内為邊郡毎虜入冦驅井閭父子與馬牛焚積聚殘室廬邊人耗盡今若築臨涇以折虜勢便甚佑唯許請于朝卒詔城臨涇為行原州以玭為刺史戍之自是虜不敢過臨涇浚隍陴堞曺華宋州瑩邱人呉少誠叛留守王栩署華襄城戍將華浚隍陴堞日與賊摶數禽馘陶甓牛僧孺帝欲於鄂州置武昌節度使鄂城土惡亟壞比嵗増築賦版築於民吏倚為擾僧孺陶甓以城五年軍人無復嵗費樓雉相望韓滉遷浙江東西觀察使聞京都未平築石頭五城自京口抵玉山毁上元道佛祠四十區修為壁建業抵京峴樓雉相望城非要地應援艱阻帝詔承璀李絳雖去位因上言今之營築不詢衆謀逺規塞外城非要地虜一入寇應援艱阻三也請城方渠楊朝晟㑹張獻甫卒有詔代為邠寧節度使朝晟請城方渠合道木波以遏吐蕃路問須兵幾何答曰部兵可辦帝問前日城五原興師七萬今何易邪對曰監州之役㓂先知之今薄戎而城㓂料王師不十萬勢難輕入若發部兵十日至塞下未三旬城畢積芻聚糧留卒守之冦至不可㧞莱野剪夷㓂且走此萬全計也若大發兵閱月乃至㓂亦來来必戰戰則不暇城矣帝納其䇿城馬嶺已城吐蕃悉衆至度不能㧞乃引去復城馬嶺而歸上固險示馬燧至太原時天下方騷北邊數有警燧念晉陽王業所基宜固險以示敵乃引晉水架汾而屬之城灌為東隍省守陴萬人又釃汾環城樹以周隄築城郭羅立言宜州人改武陽令以治劇遷河隂立言始築城郭地所當者皆富豪大賈所占下令使自築其處吏籍其濶狹號於衆曰有不如約為我更完民憚其嚴數旬畢民無田者不知有役仗義禦侮柔逺李徳裕出為滑州節度使徙劒南西川築仗義城以制大度清溪關之阻作禦侮城控榮經掎角勢作柔逺城以扼西山吐蕃大𤣥髙駢徙劍南西川節度成都城嵗壞駢易以塼甓陴堞完新負城邱陵悉墾平之以便農桑訖功筮之得大畜駢曰畜者養也濟以剛健篤實輝光日新吉孰大焉文宜去下存上因名大𤣥城榛墟安禄山傳當此之時洛陽諸郡城邑榛墟廣京師新城王朴世宗征淮朴留京師廣京師通道路壯博宏濶今京師之制多其所規為五代史開元二十年築夾城入芙蓉園唐地里志陴壘相望陴壘相望朝駕暮戰杜牧罪言堅壘名城堅壘堅壘相貫杜牧戰論羅娑城北方秃髪譯語謂吐蕃其王為賛普其國都羅娑城重兵死惡病終以累世戰沒者為甲門臨陣奔北者懸狐尾於首以表其性似狐之性唐會要相奪也為之城郭甲兵以守之韓文雉堞粉似雲杜甫晚登瀼上堂城欹連粉堞峡口詩城峻隨天碧上白帝城孤城隱霧深野望風起春城暮髙樓鼓角悲絶句遼鶴記城闉元禎代曲江老人城衢州工畢以圖獻王使陳章城衢州工畢以圖獻王視西門樟樹宻謂左右曰此樹不入城章終非我畜其後章果叛備史六蜚南幸芙蓉苑十里香飄入夾城杜牧長安雜題繚粉堞於綺城望故園賦賢長城逺矣李勣治并州十六年以威肅聞帝嘗曰煬帝不擇人守邊勞中國築長城以備虜今我用勣守并突厥不敢南賢長城逺矣闗四白察出禦入月令章句關在境所以察出禦入關市之征見賦稅門以察偽游漢書置關都尉以察偽游禁異服禮記關以禁異服反拒文選曰關門反拒漢得久長負阻秦負阻於二關卒開項而受沛無外識函谷之可關不知王者之無外善閉無關鍵司關周禮司關掌國貨之節以聨門市凡貨不出於關者舉其貨罰其人國凶札無關門之征關吏控其襟帶束為咽喉緘縢甸服扃鐍王畿何莫由斯不可踰也雖聖朝無外何假於關防而帝里宅中宜察其出入巨防重閉限其内外不可踰也察其出入何莫由斯謹關梁孟冬執禁禮曰闗執禁以譏譏呵察也抱關之吏用傳之人崇其巨防察以偽游謁關用傳傳今之過所也漢興置關都尉以察偽游用傳出入漢文除關無用傳漢景復用傳棄繻漢書終軍初從濟南當詣博士歩入關關吏與軍繻問以此何為吏曰為復還當以合符軍曰大丈夫西還終不復傳却棄繻而去軍為謁者行郡國建節東出關關吏識之曰此使者乃前棄繻生買符東觀漢記郭丹初之長安過宛從陳兆買入關符以入函谷關既入封符語人曰不乗使車不出關丹自入關後十二年不歸後出闗竟如本志徙漢武時楊㒒征南越有功耻為關外人帝為徙函谷關於新安廢臧文仲廢六關孔子曰不仁也封東觀漢記隗囂將王元謂囂曰請一丸泥為大王東封函谷此萬世一時也白馬桓譚新論曰公孫龍常争論曰白馬非白人不能屈後乗白馬無符傳欲出關關吏不聽此虛言難以奪實也青牛列仙傳闗令尹喜周大夫也善内學老子西㳺先見其氣當遇聖人老子果乗青牛薄板車過授喜五千言俱之流沙雞鳴史記秦昭王囚孟嘗君乃改姓易名夜半至函谷關關法雞鳴出客恐追至客居下坐者能為雞鳴衆雞皆鳴遂得出關又燕太子丹質於秦秦王不禮丹怒而亡歸夜至關關門未開丹為雞鳴衆雞皆鳴遂得逃去生入漢書班超在絶域年老思歸乃上書曰不敢望到酒泉但願生入玉門關斬關傳曰臧紇犯門斬關以出徑踰越度閉關先王以至日閉關養孤門關以養孤符節門關用符節易關市來商旅易關市輕稅商旅也月令孟冬無索月令孟夏關市無索順陽敷教不難物也不租禮年不順成關梁不租譏而不征無驗商君亡至關不得舎曰商君令舎人無驗者坐之曰為法自敝詐刻傳寗成為中尉抵罪髠鉗乃解脫因詐刻傳出關亡歸復關君子所近叩關四方賔客叩關即告至偪介之關暴征其稅食門征宋公以門賞耏班使食其征開關延敵閉關備他盗苛留成帝詔勿苛留馬弩關漢詔罷馬弩關舊征馬髙五尺六寸齒未平弩十石已上皆不得出關今不禁故曰罷籍内漢詔流人欲入關者籍内之注為籍内之也粟無用傳宣詔人以車載粟入關得無用傳謁關以從者數對周禮重門擊柝以待暴客盖取諸豫門關關防仰關孔關通末游崔融時有司徙關市融上䟽曰闗通末游險道天下之關必險道同上禦暴關者禦暴之所上閉韓滉為浙東西觀察使聞京都未平乃閉關梁奔突封常清安禄山度河常清奔陜語髙仙芝曰賊銳甚難與争鋒潼關無兵一夫奔突則京師危不如急守潼關仙芝從之阸狹孔緯既及行在緯䇿玫必反建言關邑阸狹不足駐六師請幸梁州即日去陳倉而玫兵至息于河之隂自潼關出息于河之隂韓愈感二鳥賦過潼關而坐息同上抱關之阨陋兮有肆志之陽陽復志賦上天關悠悠不可援和皇甫湜上同吴關倚北固天險自兹設李白備胡借問潼關吏修關還備胡杜甫潼關吏連雲列戰格飛鳥不能踰同上千古用一夫同上艱難奮長㦸千古用一夫一夫怒臨關百萬未可防劍門窺黄流之奔猛韓愈觀天地興衰隨時制事朱朴襄陽人議遷都曰古王者不常厥居宜觀天地興衰隨時制事關中我實因之凡三百嵗廣明巨盗陷覆宫闕比幸石門華隂十二之中又亡八九髙祖太宗之制蕩然矣夫㐮鄧之西夷漫數百里其東漢與鳳林為之關南菊潭環屈而流屬於漢西有上洛重山之險北有白崖乃形勝之地沃衍之墟若廣浚漕渠運天下之材可使大集自古中興之君去已衰之衰就未王而王今南陽漢光武雖起而未王也臣視山河壮麗多處故都已盛而衰難可興也謁歸壺關苖晉卿潞州壺關人充河北採訪使嘗入計謁歸壺關望縣門趣歩吏諌止晉卿以公門當下况父母之邦乎萬古為要樞往来何時息韋應物詩天下關二十六有上中下之差度者本司給過所出塞踰月者給行牒獵手所過給長籍三月一易蕃客往来閱其装重入一關者餘關不議百官志惟天有設險劍門天下壯杜甫劍門詩視函谷關若虎豹之窟栁宗元與楊誨之書視函谷關若虎豹之窟羅之徒實使然也近静潼關掃蜂蟻杜甫青絲詩大城鐵不如小城萬丈餘士卒何草草築城潼關道大城鐵不如小城萬丈餘杜甫潼關吏時清關失險峡口詩延州城北户關防猶可倚杜甫髙談先馬渡偽曉預雞鳴唐太宗入潼關詩霜峰直臨道氷河曲遶城同上襟帶壯兩京同上道路五泥塗附白開通月令三月開通道路無有障塞平易傳曰司空以時平易道路三條西京賦披三條之廣路九軌昔黄帝之為天子國中九經九緯經途九軌野途九軌九途文選詩九途平若水如砥周道如砥劇驂爾雅七達謂之劇驂言車馬多也八達謂之崇期九達謂之逵言交㑹多也方軌蜀都賦畫方軌之途康荘五達六達也並見爾雅大道青樓臨大道文選多岐楊朱曰大道多岐亡羊也甚夷大道甚夷而人好徑老列樹國語周制有之列樹以表道鑿山東觀漢記衛颯為桂陽太守鑿山通道列亭置驛羊腸羊腸路詰曲車輪為之摧由左禮道路男子由右女子由左車從中央由徑行不由徑哭阮籍常率意獨駕不由徑車轍所窮輒慟哭而反泣楊朱泣岐路謂其可以南可以北讓路家語曰西伯化行而耕者讓畔行者讓路不拾遺子産相鄭路不拾遺銅駝洛陽大道有銅駝因名之石牛秦恵王欲伐蜀乃刻石牛置黄金於後曰此天牛能糞金蜀王以為然即遣五丁力士拕成道入蜀使張儀隨其路以伐蜀中衢上路銅街輦轂轍跡通衢道路無壅傳修道周禮修除治道周禮達其道路周禮司險以周知其山林川澤之阻而逹其道路注逹者謂山林之阻則開鑿之川澤之阻則橋梁之通道路也五塗又曰設國之五塗而樹之林以為阻固注五塗道路也藩塞又曰國有故藩塞阻路而止行者謂閉要路以備姦冦道禁道路所禁者周禮端徑術月令孟春端正也徑歩道也術車道也遵彼微行微行牆下行徑也野廬周禮野廬氏掌達國道路至于四畿時祭祀則率其屬修除徑踰禁野之横行徑踰者合方氏掌達天下之道路不得津梁陷絶銜枚氏禁嘂呼歎鳴於國中者行歌哭於國中之道者雨畢而除道國語回中道武帝通回中道子午道王莽通子午道罷子午道後漢詔罷子午道通斜谷隨山刋道馬援拜伏波将軍縁海隨山刋道千里天衢易道周周曲也有蕩魯道有蕩阻長詩道阻且長宿息井樹舟車轚互者叙而行之謂廹隘處使有次序有爵者為之辟辟行人楬懸任器蜡氏掌若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人蜡音七預反除骴謂死人骨及禽獸骨骴禁禁謂孟春掩骼埋胔之屬修閭氏禁以兵革趨行者與馳騁於國中者塞蹊徑十月保路安道路人楚子西閉塗不通内外使左傳道無列樹列樹表周禮視塗司空道笰定王使單襄公聘宋假道於陳道茀不可行謂草穢塞路羊腸若砥馬跡如流開通平易不踐邪徑焦光孝然行不踐邪徑必循阡陌所過糞除第五倫事具灑掃門隘巷詩誕寘之隘巷道而不徑禮言孝子慎身行不由徑澹臺滅明字子羽阡陌風俗通南北為阡東西為陌相鄭吕氏春秋子産相鄭桃李垂於街衢束馬懸車任豫益州記江卣左擔道鄧艾束馬之處道塗不爭險易之利禮坦途泥塗見道路門送葬不避塗潦庶人還濘傳曰晉戎馬還濘而止謂遇泥濘盤旋不進辱在泥塗胡為泥中導從避泥魏先賢行状曰鍾皓季明為司徒掾公出道路泥濘導從惡其相灑去公車絶逺公推軾言司徒今日乃獨行耳還府向閣鈴下疾令揖掾屬公奮手不顧時舉府掾屬皆投劾出皓曉之乃亡出淖晉侯與楚戰公陷於淖欒書欲載晉侯走鍼乃掀公出淖入泥吕錡夢射月中之退入於泥中逵吴都賦流汗霢霂而中逵泥濘雨雪載塗塗凍釋與馬亷范叔度奔國䘮時廬江郡掾嚴麟亦奉章弔國俱㑹于路麟乗小車塗深馬小不得進范愍之命從吏下馬牽與之不告姓名去麟後訪主将歸之人言恐是范果然致逺恐泥泥難不通蹶泥則沒足滅跗荘需于泥易如塗塗附詩淈其泥楚詞妾若濁水泥古詩禹泥行乗橇板置泥上通行涇水一石其泥數斗白公渠孔棧道杜讓能朱玫兵逼乗輿帝進狩梁是時棧道為山南石君渉所據天子間闗險澁讓能未嘗暫去側險澁齊映奔奉天授御史中丞從幸梁道險澁常為帝御狩山南陸䞇帝之狩山南也道險澁與從官相失夜召䞇不得帝驚且泣九折栁文懲咎賦御長轅之無撓兮行九折之峩峩治斜谷道封敖大中中厯平盧興元節度使鄭涯開新路水壊其棧敖更治斜谷道行者告便千里蕭條亭舎不煙郭子儀奏洛陽東薄鄭汴南界徐北綿懐衛及相千里蕭條亭舎不煙天威髙駢鎮安南使者嵗至乃鑿道五所置兵護送其徑有青石或傳馬援所不能治既攻有震碎其石乃得通因名道曰天威云板築所成韋安石后嘗幸興泰宫議趨疾道安石曰此道板築所成非自然之固千金子且誡垂堂況萬乗可輕乗危哉后為回輦鄣梗顧彦卿王建攻成都彦卿挾故憾與并方道路鄣梗敬瑄告難于朝廻山取塗地里志貞元七年刺史李西華自藍田至内鄉開新道七百餘里廻山取塗人不病渉謂之偏路蜀道難韋臯始天寳時李白為蜀道難篇以斥嚴武陸暢更為蜀道易以美臯焉龍尾道安禄山逆謀日熾每過朝堂龍尾道南北睥睨久乃去縈山繞川唐文粹李華言醫道路綿綿縈山繞川驛遽之途欹危隘束其醜尚存使如周道在公頥指耳劉禹錫驛路記棧閣盤虛下臨咸呀層崖峭絶􅃝木亘鐵因而廣之限以鈆欄狹徑深陘䘖尾相接從而拓之方駕從容急宣之騎宵夜不惑上郄曲稜層一朝坦夷駃行者忘其勞吉行者徐其駈拏行者家以安貨行者肩不病徒行者足不蠒乗行者蹄不刑同上不繇其道北轅適楚南轅適晉是不可到不繇其道故也劉軻上崔相書裙腰路白樂天杭州春望云誰開湖寺西南路草緑裙腰一徑斜注孤山寺路在湖州中草緑時望如裙腰念西路之差永韓愈詰曲七轉含元殿側龍尾道自平階至地凢詰曲七轉由丹鳳門北望宛如龍尾下垂於地兩垠欄檻悉以青石為之至今五柱猶有存者南郡新書天網恢恢去將何適朱泚敗走昏迷不辨南北因問路於田父父曰豈非朱太尉耶源休止之曰漢皇帝父曰天地不長惡蛇鼠不為龍天網恢恢去將何適遂亡所在南部新書風伯清塵狄仁傑帝幸汾陽宫為知頃使并州長史李冲元以道出妬女祠俗言盛服過者致風雷之變更發卒數萬改馳道仁傑曰天子之行風伯清塵雨師灑道何妬女避耶止其役帝壮之曰真丈夫哉回復栁宗元夢歸賦若有怵余以往路兮馭儗儗以回復披榛得微路杜甫詩豈無平肩輿莫辨望鄉路杜甫雨詩緣江路熟俯青郊堂成詩道路時通塞歸夢關塞蕭條行路難宿府去旁干戈覔来看道路通送弟赴齊州路危行木杪山舘詩野水平橋路遣興失路武陵源同上畏途巉巗不可攀李白蜀道難卜築應同蒋詡徑杜甫詩千嵓萬轉路不定李白詩行路難何有招尋興己專杜甫詠懐欲渡黄河氷塞川欲登太行雪暗天李白行路難越鳥從南来胡鴈亦北度我欲彎弓向天射惜其中道失歸路同上厯九折而直奔兮固摧轅而失途栁宗元佩韋賦封疆六白申畫郊圻書八則周禮八則治都鄙注都之所居曰鄙公卿大夫采地王子弟所居邑封人中士四人掌設王之社壝為畿封而樹之凡封國設其社稷之壝封其四疆注封國建諸侯立其國之封遂人主六遂若司六鄉自逺郊逹于畿中遂士掌四郊主四郊之獄方士掌都家注四百里至五百里公所食也都王子弟及公卿采地大夫采地潁谷封人潁考叔也封人典封疆者畿疆大司徒制其畿疆而溝封之形方氏制方國地域而正其封疆經略撫封傳曰天子經略諸侯撫封封畛彭仲爽為楚令尹封畛於汝開封畛北至于汝水疆埸之事慎守其一備其不虞隙地宋鄭之間有隙地宋鄭為盟曰勿有是注各勿有之甌脫史東夷與匈奴間中有弃地千餘里各居其邊為甌脫東夷請於冒頓吾欲有之冒頓怒曰地國之本也遂襲滅東胡注甌脫界上屯守處女争桑楚邊邑卑梁氏之處女與吴邊邑妾争桑二家怒相滅邊邑怒而攻呉楚之釁始於邊女割地相與燕莊王送齊桓公入齊境公曰非天子命諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至地與之拓土畫疆疆場有氏疆埸之邑一彼一此何常無之引其封疆引正也封疆之削何國蔑有主齊盟者誰能辯焉注辯治也疆事封疆之事自疆埸之邑至此晉趙孟請楚不戮叔孫豹之辭見左傳昭元年子産云田有溝洫注云封疆溝洫疆埸綺分選諸侯正封封疆有定分也疆埸無主則啓戎心候不在疆送迎賔客單襄聘楚假道於陳知國必亡孔拓地開疆房𤣥齡上䟽曰陛下拓地開疆亦可止矣斥地王忠嗣徙河東節度使自朔方至雲中袤廣數千里據要險築城堡斥地甚逺議棄豐保靈夏唐璿永淳中突厥圍封豐州都督崔智辨死朝廷議棄豐保靈夏休璟以為不可上䟽定疆畛蘇烈縳賀魯以還定疆畛封畛比聨裴度李師道怙強勸帝誅之田𢎞正請自黎陽濟合諸節度曰魏博軍度黎陽即叩賊境封畛比聨易生顧望不出城隍未遊宫室楊炯少姨廟碑東漸西被南馳北走盧敖之窮觀六合不出於城隍陶侃之飛入八門未遊於宫室發兵戍䟽勒狄仁傑諌曰天生四夷皆在先王封域之外東距滄海西隔流沙北横大漢南阻五嶺天所以限中外也自典籍所紀聲教所暨三代不能至者國家既已兼之詩人矜薄伐於太原化行於江漢前代之遐裔而我之域中過夏商逺矣圖海内華夷賈躭尤悉地里圖海内華夷廣三丈從三丈三尺以寸為百里并譔古今郡國縣道四夷述其中國本之禹貢外夷本班固漢書古郡國題墨今州縣以朱刋落䟽舛多所釐正帝善之學長於地里山川險易方隅物産兵戍衆寡無不詳鄭虔郊七白申畫郊圻遂士掌四郊注主四郊之獄周禮郊勞聘客至郊使人郊勞太學在郊邑外謂之郊爾雅郊迓郊迎近郊逺郊多壘禮曰四郊多壘卿大夫之辱不雨易曰宻雲不雨自我西郊適彼樂郊詩孔郊謁李光弼乾元元年入朝詔朝官四品已上郊謁郊迎裴度田宏正獻魏博六州于朝憲宗遣度宣諭宏正知度為帝髙選故郊迎趨跽受命迎氣𤣥宗開元二十六年正月迎氣于東郊屏處温輔國屏處郊野貧寓郊墅崔元暐澄境清露澄境逺韋應物郊原草樹滋同上跨馬出郊時極目不堪人事日蕭條見杜甫野望詩凢京兆河南二都其近為四郊唐六典水部凢京兆河南二都其近為四郊三百里皆不得弋獵採捕野八白牧外謂之野爾雅大野既瀦東原砥平我行其野蔽芾其樗婚姻之故言就爾居詩適野太叔適野祭於野傳辛有遇伊川見被髪而祭於野者曰不及百年此其戎乎其禮先亡矣乞食於野人又晉文公過衛出於五鹿乞食于野人野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之謀於野又禆諶能謀謀於野則獲謀於國則否鄭國有難子産載以如野謀四國之事哭孔子惡野哭者哭所識者則於野又韓詩外傳曰孔子出游少原之野郊野之富有死鹿死麏所知吾哭諸野在野曰廬野無青草莽蒼食野之苹之芩之蒿失禮求之野割鮮野食經野體國經野獲麟西狩大野獲之君子在野野無遺賢孔耕宜城野甄濟子逢及長耕宜城野丐食野中孝友傳支叔才隋末荒饉夜丐食野中還進母别墅李林甫薛王别墅勝麗甲京師以賜林甫茫蕩之野王績之仕以醉失職鄉人靳之託無心子以見趣曰無心子以穢行聞越王黜之無愠色退而適茫蕩之野㕓野史徳義居虎邱山騎牛帶瓢出入廛野草野隱逸序古之隱上焉者身藏而徳不晦故自放草野而名姓從之寛閒之野耕於寛閒之野韓文霧野韋應物寄楊邈詩霧野騰曉騎緑野堂裴度午橋别墅作緑野堂疆畛相望元載膏腴别墅疆畛相望平泉荘劇談録李徳裕東都平泉荘去樂城三十里卉木臺榭若造仙府有虛檻對引泉水縈回䟽鑿像巫峽洞庭十二峰九𣲖迄于海門江山景物之状以間行徑有平石以手磨之皆隠隱見雲霞龍鳳草樹之形初徳裕營平泉逺方之人多以異物奉之有題平泉詩曰隴右諸侯供語鳥日南太守送名梳地卑荒野大杜甫遣興曠野懷咫尺白水崔少府詩出野馮髙李義府居母䘮朔望給告即羸服與元紀出野馮髙窺覘災𤯝衆疑其有異謀别墅在輞川地竒勝王維别墅在輞川地竒勝有華子岡欹湖竹里舘桞浪茱茰堆辛夷塢與裴廸㳺其中賦詩相酬對為樂閭里九敬桑梓附白五家為比使之相保保任也五比為閭使之相受四閭為族使之相葬五族為黨使之相賙五州為鄉使之相賔鄉師稽其鄉器比供吉㓙二服閭供祭器族供䘮器黨供射器州供賔器鄉供吉㓙禮樂之器若國有大故則鄉大夫各守其閭以待政令族師各掌其族之戒令政事以邦比之法五家為比十家為聨五人為伍十人為聨四閭為族八閭為聨使之相保相受刑罰慶賞及相告以受邦賦以役國事以相𦵏埋比長各長其比之治五家相受相和遂人掌邦之野以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為鄼五鄼為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁同里漢盧綰與髙祖同里入里門内史石慶醉歸入里門不下車萬石君聞之對桉不食髙陽後漢荀氏舊里名西豪穎隂令康以髙陽氏有才子八人荀氏亦八子故改其里為髙陽里里仁為美賊不入閭袁閎事見義感門無閉月令孟夏門閭無閉龐公閭里龐公鑿井得銅必歩門閭溝渠必歩閭左秦發式武王式商容之閭廻車曽參廻車勝母之里式干木閭魏文侯式段干木閭聽閭里以版圖太宰以官府之八成經邦治三曰聽閭里以版圖敬桑梓見閭里門必式禮入里必式父母之國後漢張湛子孝罷馮翊告歸平陵望里門而下歩主簿曰明府位尊不宜自輕湛曰禮下公門式路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉惟桑與梓必恭敬止詩與鄉人處由由然不忍去栁下惠孔子於鄉黨恂恂如也語里旅齊景公欲更晏子宅辭云敢煩里旅注旅衆也孔鄉壤李勣韋城翟讓為盗勣往從之説曰公鄉壤不宜自剽殘鳴珂里張嘉祐嘉貞弟嘉貞為相時任右金吾衛將軍昆弟每上朝軒蓋騶導盈閭巷時號所居坊曰鳴珂里居巢劉子元封居巢縣子鄉人以其兄弟六人俱有名號其鄉曰髙陽里曰居巢同里韋貫之或薦之京兆尹李實舉笏示所記曰此其姓名也與同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷望縣門輙歩苗晉卿潞州壺關人充河北採訪使嘗入計謁歸壺關望縣門輒歩吏諌止晉卿以公門當下况父母邦乎郡大守迎犒使所屬令行酒酒至必立飲白釂侍老有獻降西階拜而飲時美其恭恭先世王師範以青州父母所籍每縣令至具威儀入謁令固辭師範遣吏挾坐拜廷中乃出或諫不可答曰吾恭先世且示子孫不􅁯本也髙陽里賀徳仁兄弟八人時比漢氏太守鄱陽王伯山改所居甘澇里為髙陽云閭井無煙安禄山傅英魚朝恩等不能戢軍與回紇縱掠延及鄭汝閭井至無烟安邑李丞相李吉甫居安邑里時號安邑李丞相與閭里耆老相樂司空圖每嵗時祠禱鼓舞圖與閭里耆老相樂衣白襴謁縣令五代馬全節初徙黄晉過元城衣白襴謁其縣令州里以為榮相賀君侯至之初閭里自相賀韓合江亭依然此来江南近里閭故依然同上示爽詩閭里懷離别之思論淮西上虎穴連里閭隄防舊風俗杜甫課伐木邑里邱墟陸宣公徳宗奉天改元赦離去鄉閭邑里邱墟人烟㫁絶松楸浸逺一品集謝賜賛皇縣公桑梓雖存久隔兵戈之地松楸浸逺已絶霜露之思落妃池注亦如王昭君生於峽州有昭君村緑珠生于白州有緑珠江出楊妃外傳經過歎里閭杜甫贈李秘書阮郎迷里巷元稹代曲江老人城郭巋然桑梓如舊張說起義堂頌不遊里巷五代崔稅遭世亂寓居于滑臺不遊里巷十餘年人罕識其面梁貞明三年舉甲科號所居為樂城鄉三柱里劉仁軌進爵為公子及兄子受上柱國者三人州黨榮之號所居為樂城鄉三柱里舘驛十驛馬附白國野周禮凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積置驛漢鄭荘置驛以延賔客公館私館候舘舘穀行李往来供其乏困公食使車傳舎行人適子之舘館給詐傳魏相字弱翁為茂陵令御史大夫桑宏羊客詐乗御傳傳縣相疑有姧案致其罪壞館垣子産相鄭伯如晉以魯䘮未見子産使壞其舘垣以納車馬士文伯讓之子産曰諸侯舍於𨽻人門不容車而不可踰越賔見無時命不可知請執事將何所命若獲薦幣修垣而行君之恵也趙簡子曰信我實不徳而以𨽻人之垣以羸諸侯是吾罪也使士文伯謝不敏晉侯見鄭伯而有加禮厚其宴好而歸之乃築諸侯之館子姑就館改館晉侯具七牢縣次續食鄭當時置驛馬四郊迎賔客縣次與績食注云路次也傳置驛名賦傳傳郵賦給飾㕑傳聚柝野廬氏掌逹國道路至于四畿比國郊及野之道路宿息井樹若有賔客則令守涂地之人聚􅈀之有相翔者則誅之蘧廬荘子曰仁義先王之蘧廬蘧廬舍一宿而去司空不授館不受客單襄公聘楚假道於陳言陳必亡國語不修薛宣子惠為彭城令宣過之橋梁郵驛不修知其不能髙其閈閎厚其牆垣以無憂客使左傳長亭短亭十里五里長亭短亭言十里一長亭五里一短亭息亭傳劉寵免太尉歸清儉出京師欲息亭舍亭吏止之曰整頓以待劉公寵不言而去時人稱其長欲止郵亭趙孝長平王莽時父為田禾將軍以父任為郎嘗告歸歩擔欲止郵亭亭長不納問曰聞田禾将軍子當過何時至孝曰尋将到請亭地作塜漢張禹年老自起塜塋好平陽肥牛亭部處地又近延陵奏請求之上以賜禹詔平陵徙亭他所曲陽侯王根聞而争之此地當平陵寝廟衣冠出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壞舊亭非所宜孔子稱賜汝愛其羊我愛其禮宜賜他地上卒以肥牛亭地賜之投傳不受申屠蟠事見義感門授舘閱人多矣蓋寛饒許伯第曰如此舍閱人多矣驛馬見館驛門使車避傳伯宗避重曰避傳傳置漢文帝詔太僕見馬遺財足餘皆給傳置注遺留也財與纔同傳置驛也具私馬漢王温舒為河内守具私馬五十匹自河内至長安以奏事迎賔客鄭莊見上注駿奔載馳載驅遽令驛馬軍書乗傳遄征遄往驛騎乗驛驛遽傳左氏曰楚子乗驛星軺軺車使車也孔馳驛温造使幽州還詔馳馹入奏飛驛以逹警急馬周飛驛以逹警急皆周建白三梁十驛裴耀卿天子東廵耀卿置三梁十驛創堠徐申遷韶州刺史徙治故州創驛堠復驛堠十一區李吉甫請起夏州至天徳復驛堠十一區以通緩急驛置多闕栁公綽長慶元年復為京兆尹時幽鎮用兵補置諸將使馹係道公綽奏曰比舘逓匱乏驛置多闕敕賜衣緋紫者所乗至三四十騎黄縁者不下十數吏不得視劵隨口輙供驛馬盡乃掠奪民馬怨嗟驚擾行李殆絶宜特著定限以息其蔽有詔中書條檢定數得紓吏罪擅乗驛馬髙元裕以右補闕召道商州㑹方士趙歸貞擅乗驛馬元裕詆曰天子置驛爾敢疾驅耶命左右奪之還其以聞邊奏係驛崔珙起為鳳翔節度使方是時西戎歸故地邊奏係驛議所以援接珙坐不自力避事下除太子少師驛馬疲耗盧鈞拜華州刺史關輔驛馬疲耗鈞為市健馬率三嵗一易自是無乏事舍之外郵顔杲卿常山太守禄山反李欽湊夜還杲卿辭城門不可夜開舍之外郵使履謙及㕘軍馮虔郡豪翟萬徳等數人飲勞既醉斬之通隘道作傳舎韋景駿遷房州刺史通隘道作傳舎乗傳過家仲子陵蜀人典黔中選補乗傳過家西人以為榮豫集劉憲父思立在髙宗時為名御史時河南北大旱詔遣御史中丞崔謐等分道賑贍思立建言賑給須立簿最稽出入往返停滯妨廢且廣若無馹處馬須豫集以一馬勞數家置驛相望劉晏諸道廵院皆募駃足置驛相望同魚鱗府西三百里候舘同魚鱗韓愈酬裴十六曲河晨及曲河驛凄然自傷情羣鳥巢定樹乳鵲飛簷楹韓愈詩驛樓衰桞側縣郭輕烟畔一川何綺麗盡日窮壯觀杜甫詩告至告去之役不絶于道華人夷人往復而受館者旁午而至傳吏奉符而閲其數縣吏執牘而書其物告至告去之役不絶於道栁宗元舘驛壁記寓望迎勞之禮無曠於日同上襃城驛號天下第一至有飼馬於軒宿隼於堂凢所以汚敗室廬糜毁器用日益辟破不與曩類孫樵書襃城驛勞迎餞别劉禹錫管城驛記勞迎展蠲潔之敬餞别起登臨之思傳舎之尤走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎上同陽城驛元禎詩商有陽城驛名同陽道州陽公没已乆感我淚交流又祠曹諱羊祜此驛何不侔我願避公諱名為避賢郵驛千六百三十九凡三十里有驛驛有長舉天下四方之所達為驛千六百三十九唐史百官駕部通驛公舘南有水亭四甍翬飛巉絶浦嶼蓋為接輶軒祖逺客之佳境也李白姑熟亭序野舘濃花發杜甫送司馬詩使塵来驛道遣悶同上微冥水驛孤入洞庭詩停舫臨孤驛韋應物次旴􅇇舘驛之制於千里之内尤重自萬年至於渭南其驛六自㶚而南至于藍田其驛六自長安至于盩厔其驛十有一自武功而西至于好畤其驛三自渭而北至于華原其驛九自咸陽而西至于奉天其驛六由四海之内總而合之以至于關由關之内束而合之以至于王都桞宗元記任官人為舘驛使裴潾兩河用兵憲宗任宦人為舘驛使檢稽出納有曺進玉者尤恃恩倨甚使者過至加捽辱宰相李吉甫奏罷之㑹伐蔡復以中人領使潾諫曰凡驛有官專尸之畿内以京兆尹道有觀察使刺史相監臨臺又御史為之使以察過闕猶有不職則宣明科條督責之誰不惕懼若復以宫闈臣領之則内人而及外職分亂矣驛門十二辰候開元二十九年命觀風使鄭審檢校兩京驛門即今門置十二辰候自審始也村舘泊好木韓愈聨句臨驛卷緹幕外堂接繡衣李白郵傳劇道崔衍郵傳劇道屬嵗無秋治亭舘千餘區五代馮暉徙鎮靈武治倉庫亭舘千餘區橋十一白虹橋星橋華陽記李氷造七星橋上應七星牽牛秦始皇并天下都咸陽端門四逹以制紫宫渭水貫都以象天河横橋南渡以法牽牛濟川黿鼉紀年曰周穆王三十七年伐荆東至九江比黿鼉為梁而渡文選方架黿鼉以為梁烏鵲淮南子烏鵲填河成橋而渡織女驪龍思𤣥賦曰驪龍之飛梁梁左除道梁溠謂作橋於水上造舟為梁詩水涸成梁徒杠輿梁孟子曰子産脫輈濟人是惠而不知為政十一月徒杠成十二月輿梁成人不病渉也徒杠小橋輿梁大橋溴梁梁莫大扵溴梁爾雅石杠不修見館驛門注游張良歩游下邳圯上注楚人謂橋為圯浮魏志鄧艾伐蜀先作浮橋陷鍾會伐蜀先令牙門将許儀治道橋䧟馬足斬儀黿鼉見上魚鼈論衡曰髙麗國王有侍婢自云氣如雞子来下我故有身後生子名曰東明東明善射王恐害其國欲殺東明東明走至淹水以弓擊水魚鼈浮為橋而渡枕席趙充國奏治湟陜以西道橋七十所令可至鮮水左右以制西域信威千里如從枕席上過川不梁單襄公過陳見川不梁飛梁橋也見螭龍注題柱司馬相如往京師過蜀郡升僊橋題其柱曰不乗駟馬不復過此以濟不通以濟要津達川澤之阻司險知川澤之阻而達其道路注謂以橋梁通啓塞從時門户道橋謂之啓城郭牆壍謂之塞開閉之急不可一日而闕故墮壞而治之不可限以土功造舟見上鞭石秦始皇作石橋欲過海有神人能驅山石下海石去不速神輒鞭之流血墮履黄石公舉杯晉書杜預字元凱請建河橋於建平津衆論以為殷周所都經聖賢而不作必不可作也預曰昔造舟為梁則河橋之謂遂作成上臨會舉杯曰非卿也此橋不立預曰非陛下聖明不成必葺之功功濟行路川惟設險橋用濟人茍或騫崩則勞揭厲人無褰裳車不濡軌道路無擁用濟車徒以利来往茍騫崩之不葺雖掲厲而莫通當啓塞之急誠合從時有懷襄之虞如何寘力石鼈晉成都王潁字章度屯汲南阻清水為壘造浮橋通河北以木函盛石沈之以繫橋名曰石鼈崔公橋後魏崔亮渭水為橋利百姓名崔公橋三柱折魏畧洛水浮橋三柱折三公象也豫讓橋下尾生抱梁柱以待女子鴈齒橋有鴈齒半月橋似半月孔止過車者權萬紀族孫懐恩嘗過汴州時刺史楊徳幹與懷恩名相埒汴橋新成立木中涂止過車者懷恩適過人示徳幹曰民不可止耶焉用此徳幹慙服築道為橋梁閻立徳從征遼師還至遼澤亘二百里淖不可通立徳築道為橋梁無留行累石代柱李昭徳洛有二橋司農卿韋機徙其一直長夏門民利之其一橋廢省巨萬計然洛水嵗淙齧之繕者告勞昭徳始累石代柱銳其前厮殺暴濤水不能怒自是無患徙洛中橋韋洪機徙洛中橋於長夏門廢利橋人便之天子乃登洛北絶岸延眺良久嘆其美揣廣狹為橋賈循京兆華原人張守珪北伐次灤河屬凍泮欲濟無梁循揣廣狹為梁以濟大夫橋張志和築室越州東郭觀察使陳少游往見為終日留先是門阻流水無梁少游為創之人號大夫橋争橋李宻王世充進薄其壘宻提敢死士數百邀之世充大潰士争橋溺死者數萬洛水為不流以韋笮維大艦為浮梁李存晉進軍徳勝為南北寨毎以舟兵来往頗以為勞而河北無竹石存晉乃以葦笮維大艦為浮梁荘宗大喜解衣以賜之五代史橋壞覆民租車王周四鎮皆有善政定州橋壞覆民租車周曰橋梁不修刺史過也乃償民粟為治其橋斷橋李愬取吴元濟道分輕兵㫁橋以絶洄曲道三脚木為橋杜重威朔州人契丹冦鎮定轉運使李谷教重威以三脚木為橋募敢死士過河擊賊梯橋唐舊史裴度立第於東門集賢里有風亭水榭梯橋架閣作機橋維以長絙康承訓屯海州度賊至作機橋維以長絙賊半度絙絶士溺死度者不得戰殱之航橋郭子儀史思明自魏来王師南潰子儀以朔方軍保河陽㫁航橋兵扼河橋王建及梁進戰柏鄉相距鄗邑野河上鎮定兵扼河橋梁兵急擊之荘宗登髙望見鎮定兵將敗顧建及曰橋為梁奪則吾軍危矣柰何建及選二百人馳擊梁兵梁兵輒解去出五代史唐臣傳比舟為梁與波外降桞宗元永州訾家洲亭記浮黿沒鵲文粹栁司功石橋銘架海維河浮黿沒鵲力將岸争勢與空鬭文粹張彧石橋銘虹舒電拖虎歩雲就力将岸争勢與空鬪月挂虛簷星羅伏獸長橋臥波未雲何龍杜牧阿房賦飛橋上架漢韓愈初月出雲長虹飲澗趙州石橋望之如初月出雲長虹飲澗天后時黙啜欲南過至橋上忽馬不進見青龍卧橋下乃去朝野僉載文虹橋宋之問文虹橋兮彩鷁舟唐太宗浮橋詩水揺文鷁動䌫轉錦衣縈出初學記駈石架滄津李白古風秦皇按寳劍赫怒振威神逐日廵海右駈石架滄津徵卒空九㝢作橋傷萬人伐竹為橋結創同褰裳不渉往来通杜甫詩日落青龍見水中天寒白鶴歸華表日落青龍見水中野橋分仔細觀山水圖同上橋維萬里檣杜甫酬門下相公舊制横絙百丈連艦千艘辮修笮以維之繫圍木以距之亦云固矣然每冬氷未合春泫初解流澌峥嶸緶㫁航破無嵗不有開元十二載授彼有司俾鉄代竹賦晉國之一鼓法周官之六齊結為連鎻鎔為伏牛偶立於兩岸襟帶於中潬鏁以持航牛以縶纜亦将厭水物奠浮梁奔測不突積凌不隘張說蒲冿橋賛蒲津河橋天下之要津也唐明皇詔鑄鐵牛八頭柱二十四條連鏁一十二條山架八所牧人八枚於中潬分立亭亭有虹霓之狀實萬代之竒絶也又詔中書令張燕公說製河橋賛樹于中潬之上紀異記人不履危栁宗元興州江運記杠梁以成人不履危南浦清江萬里橋野望杜甫野橋齊馬度同上橋斷却尋溪蜀山行同上飛橋上架漢韓文擲巾為橋崔生入山遇仙女為妻久之還客得隱形符潜㳺宫禁為術士所知追捕甚急逃還山中追者在後隔河見其妻告之妻擲其領巾為五色橋度崔徹杠彴髙麗帝度遼水徹杠彴彩虹乗橋躡彩虹李白送温處士白孔六帖卷九
