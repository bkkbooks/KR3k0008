body:
  text: 白孔六帖卷九十一唐白居易原本宋孔傳續撰叛亂一寇賊二竊盗三雜盗四奢侈五僭六叛亂一白竊弄凶器毒痛生民毒流于下腥聞于上稱亂稱舉也俶擾俶始也擾亂也剥亂天下不式王命以亂天常不臣有無君之心亂心侵敗王略社稷之患不令之臣天下之所惡也反易天眀不臣也不帥天常干國之紀顛越不恭劓殄滅之無遺育無育元兇有臣不順神之所惡脅君亂國壞法亂紀臣而不臣阻兵恃險巨猾元兇惠廸吉從逆凶渠魁賊帥也戎毒戍大元惡大憝憝亦惡也姦臣竊命惎間王室惎毒也獨亂文子曰世治則愚者不能獨亂吠堯之犬史記夫跖之犬可使吠堯非不仁犬吠非其主也苞藏禍心天吏逸德列于猛火自底不類類善也穢惡彰聞虞有三苖夏有觀扈商有姺邳周有徐奄皆諸侯之亂者賊臣聞釁有無君之心人反德為亂孔興元軍亂温造興元軍亂殺李絳衆謂造可夷其亂文宗亦以為能乃授檢校右散騎常侍山南西道節度使五州獠叛馮盎隋仁壽初為宋康令潮成等三州獠叛盎馳至京師請討之文帝詔左僕射楊素與論賊形勢素竒之曰不意蠻夷中乃生是人中土不寧狄仁傑䟽曰邊鄙暫警不足憂中土不寧可為慮一軍思亂王虔休李抱真擢都虞􅇋抱真卒元仲經等謀樹其子緘一軍思亂虔休正色語衆曰軍王軍州王士也帥亡當禀天子何有妄謀衆服其言得不亂李愿長慶中徙宣武用婚家竇緩典帳中兵驕驁怠沓牙將李臣則等因衆不忍夜斬緩首愿聞變不及甲與左右數人縋而逸奪野人乗馳以免其家死於兵三子匿而免兵既亂因大掠推李㝏主後務封建論秦有天下裂都㑹而為郡邑不數載而天下大壞時則有叛人而無叛吏漢矯秦之枉立宗子封功臣然而郡邑居半時則有叛國而無叛郡唐興制州邑立守宰然猶桀猾時起虐害方域時則有叛將而無叛州生於放肆李絳帝問𤣥宗開元時致治天寶則亂何一君而相反邪絳曰治生於憂危亂生於放肆巴獠丏降于邵為道州刺史徙巴州㑹歲饑部獠亂薄城下劭勵兵拒戰且遣使喻曉巴獠丏降邵儒服出賊見皆拜即引去天下崩騷李巨川乾符中舉進士方天下崩騷乃去京師生民厄㑹逆臣賛曰生民厄㑹必假手于人者謀去衣冠有望者陸扆徙遷洛柳璨始附朱全忠謀去衣冠有望者貶扆濮州司户參軍殺之生民之命急於倒掛五代馮道傳當是時天下大亂戎夷交侵生民之命急於倒掛華風不競否運所鍾五代周世宗賜南唐李景書書伏夜聚廣王全昱傳衡王友能為宋滑二州留後陳州刺史所至為不法而姧人多依倚之陳俗好滛祠左道具學佛者自立一法號曰上乗晝伏夜聚男女雜亂妖人毋乙董乙聚衆稱天子建置官屬友能初縱之乙等攻刼州縣末帝發兵擊滅之五代史難阸之㑹李嶠外阻内訌郭子儀遭時屯棘馬璘猰㺄擇肉於馳道豺狼整居於禁闈猰㺄擇肉於馳道贄牧河中後請罷兵狀國朝均於絶綖張廷珪請勤政䟽社稷有危於綴旒國朝殆均於絶綖九廟鞠䧟於匪人六師出次於郊邑陸宣公奏議變生都輦盗據宫闈九廟鞠䧟於匪人六師出次於郊邑顧瞻懐二叛換黨姦同上裂土假王者四滔天僣帝者二又有顧瞻懐二叛換黨姦其類實繁滔天之巨滑同上儻有問鼎之雄圖滔天之巨滑幸尖乗間何所不為竪子弄兵劉蜕獻南海崔尚書書雖有竪子弄兵曾無筋穿皮蠧之患尋已誅伏殺人焚廬文粹李庾東都賦殺人如刈焚廬若薙掃臺榭之灰收京野之骨徵郡國之版在驗地官之籍列祲氛其氣豺虎其心于公異破朱泚露布包藏逆謀參㑹凶德祲氛其氣豺虎其心十月即為虀粉期杜甫青絲殿前兵馬破汝時十月即為虀粉期未如面縳歸金闕萬一皇恩下玉墀詔令不出城門國制撓弱賈生慟哭時也杜讓能諫昭宗言三宰嘯凶牝奪晨林甫將蕃黄屋犇唐史賛木將壞蟲實生之國將亡妖實産之故三宰嘯凶牝奪晨林甫將蕃黄屋犇鬼質敗謀興元聖崔柳倒持李宗覆其出穰穰隊以萬數韓愈聖德詩萬牛臠肉萬甕行酒以錦纒股以紅帕首有恇其兇有餌其誘其出穰穰隊以萬數逞豺聲以欺天恣狼心而犯上柳淄青狀惡稔禍盈鬼怨神怒同上裴相狀惡稔禍盈鬼怨神怒恣行悖慢敢肆欺誣天兵四臨所至皆㨗數有闗中亂何曾劒外清春逺杜詩再有朝廷亂難知消息真傷春同上奪馬悲公主登車泣貴嬪傷春反氣凌行在贈李秘書同上妖星下直廬同上鳳闕悲巢鵩鵷行亂野􅍪元稹詩遭鯨鯢之蕩汩杜甫太廟賦遭鯨鯢之蕩汩荒歲月而沸渭神器臬兀而小人呴喻厯紀大破瘡痍未蘇太清宫賦𤣥豈正色白亦不分祭房相文𤣥豈正色白亦不分培塿滿地崑崙無羣乾坤慘慘虎狼紛紛城邑自守鼙鼓相聞同上惡木生槎枿之英猰狗吠豢牢之主于公異破朱泚露布勢同飈馳衆若螽集同上河闗雲擾孟方丘傳時天子在西河闗雲擾君暗政亂兵驕民困周臣王朴獻平邊策曰唐失道而失呉蜀晉失道而失幽并觀所以失之由知所以平之術當失之時君暗政亂兵驕民困近者姦於内逺者叛於外小不制而至於僣大不制而至于濫天下離心人不用命呉蜀乗其亂而竊其號幽并乗其間而據其地人有覬心亂由是生蔣伸言比爵賞稍易人且偷帝愕然曰偷則亂矣伸曰否非遽亂但人有覬心亂由是生帝嗟嘆再三聚為起穢之物腥彼宫闈散作旬始之妖孛于躔次于公異嘯凶命醜阻兵安忍長戈指闕流矢射天穿髙墉以䑕牙毒王師以蠆尾罪踰羿浞惡貫梟獍上九門回望塵分土六龍夜馭兵衞疲縣官無人具軍類行宫徹屋屠雲螭注時御類乏備上命徹行宫太宰御馬享士津陽門詩寇盗二白保聚薦食傳曰呉為封豖長蛇以薦食上國罔不寇賊書鴟義姦宄奪攘矯虔䑕竊狗偷蜂蠆之毒俶擾狡猾艱難其身蝥賊完聚黄巾赤眉緑林並賊名在外為姦萑蒲鄭國多盗聚人於萑蒲之澤子太叔興兵以攻之傳人多相掠行險徼倖草竊於草野中竊盗也書曰殷人好草竊姦宄寇攘人自得罪寇攘姦宄殺越人于貨狃于姦宄致寇探丸尹賞子心守長安令閭里少年殺吏受財執仇相與探丸為彈得赤丸者斫武吏黒者斫文吏白者主治䘮城中薄暮剽刧賞治獄名虎穴數百人枕籍而死抜劒抗賊朱暉與家屬遇盗時年十三抜劒向前曰財物可得諸母不可得今日朱暉死無避賊壯其志遂捨之不言盗掠姜肱兄弟為盗掠奪衣物郡中怪問終不言盗賊感悔就肱舍叩頭乞還所掠肱不受勞以酒食而遣之賊還物戴封字平仲遇盗悉被掠奪唯餘七縑賊不知處追以與之賊曰賢人也遂盡還之肆掠劇賊翦伐將出凶於梟獍宜致伐於鯨鯢無縱滋蔓之草以奔漏網之鯨詰誅暴慢以遏亂略無使滋蔓蔓難圖也多行不義必自斃天人致誅除惡務本既殄元兇乃封京觀商罪貫盈天命誅之掃攙搶乘王怒行天伐啓滅有扈而夏功昭成克商奄而周德著仗黄鉞之威取彼凶殘殱厥渠魁誅戮既不化於皇風宜致誅於赤族既苞無君之心難赦不蔽之罪咎既自貽罪亦盈貫當正無赦之刑以懲莫大之罪棄屍京觀懸首藁街既殄元兇乃樹京觀敢逃刑命肆諸市朝干國之紀其有顛越不恭則殄滅之無遺育無俾易種于兹新邑易種謂生種類也禮曰臣弑君子弑父凢在官者殺無赦殺其人壞其室汙其宫而瀦焉有常無赦以干先王之誅以災于厥身刑亂國用重也脅從殱厥渠魁脅從罔治舊染汙俗咸與惟新書𦙍征羲和之辭蚩尤作亂延于平人言延及平善之人改行率德自新比屋可誅庶自及於迷塗難加誅於比屋與亂同道彊者脅弱衆者暴寡宜絶惡於本根難聽亂於枝葉要君子曰臧文仲以防求為後於魯雖曰不要君吾不信也以防邑要君要君者無上君子謂宋華督有無君之心子犯投璧於河文公曰所不與舅氏同心者有如白水子曰事君三違而不出境則利禄人雖曰不要君吾不信也劫質執子求貨後漢喬元字公祖遷太尉以疾罷就醫里舍元小子十歲獨遊門次有三人持杖劫之入舍登樓求貨元與司𨽻圍守恐殺其子未欲廹之元瞑目呼曰姦人無狀豈以一子之命以縱國賊元子亦死元乃詣闕請劫質者不得贖以財寶以開長姦之路自此遂絶執母妻子後漢李忠進圍鉅鹿王郎遣將攻信都信都大姓馬寵開城内郎衆執太守及忠母妻子而令親屬招忠時寵弟從為校尉忠殺之諸將曰家屬在人手殺其弟何也忠曰縱賊不誅二心也世祖聞而美之家屬亦全又邳彤字偉君從征伐王郎所置信都守捕彤父弟及妻子使為手書報彤曰降者刲爵不降者滅族彤泣報曰事君不得顧家遂不去之又趙苞字威豪為遼西守遣吏迎母及妻子臨到為鮮卑㓂鈔載之以擊羣賊出母示苞苞涕泣母謂曰昔為母子今為君臣不得顧而私恩毁而忠節母又曰昔王陵云云爾其以勉苞即破賊母妻皆死苞殯葬靈帝策弟封侯既而曰食禄避難非忠殺母全義非孝將何面目立天下遂歐血而死又孔奮字君魯為武都丞賊魏茂等攻郡守奮追急乃執奮妻子奮五十唯有二子終不顧遂擒賊妻子亦死世祖褒美之執大將魏夏侯惇元讓與吕布將偽降因共執惇責以寶貨惇將韓浩乃勒兵營門遂詣惇所叱持劫者曰汝執劫大將復望生耶吾受詔討汝寧以一將軍縱爾乎因泣謂惇曰奈國法何但召兵擊持質者持質者惶怖斬之惇亦免太祖因著令有持質者皆當并擊勿顧執宿衞臣趙廣漢為京兆尹富人蘇回為郎二人劫之廣漢將吏到家使人曉賊曰京兆尹趙君謝兩卿無得殺質此宿衛臣也二人驚愕出户叩頭廣漢使獄吏厚遇之孔盗賊衰崔安潜領西川節度吏倚髙駢為姦利者皆誅之數更除繆政於是盗賊衰刺用事大臣裴度王承宗李師道謀緩蔡兵乃伏盗京師刺用事大臣已害宰相武元衡又擊度刃三進斷鞾刜背裂中單又傷首度冒氈得不死共道駭伏獨騶王義持賊大呼賊斷義手度墮溝賊意已死因亡去椎埋掠寇竇建德邑人孫安祖盗羊為縣令捕劾笞辱安祖刺殺令亡抵建德隂舍之時山東飢羣盗起乃謀曰丈夫不死當建功于世渠為亡命虜乎承間竊出椎埋掠寇足以自資因得聚豪傑且觀時變以就大計安祖然之大連州縣小阻山澤劉文静曰上南幸兵填河洛盗賊蜉結大連州縣小阻山澤以萬數湏真主取而用之城闔外即戰塲裴寂曰秦王將舉兵狀因言今盗徧天下城闔外即戰塲盗劫其家竇建德盗夜劫其家建德立户下盗入擊三人死餘不敢進請其尸建德曰可投䋲係取之盗投䋲建德乃自縻使盗曳出躍起捉刀又復殺數人馮盎番禺新興名賊髙法澄洗寶徹等授林士宏節度殺官吏盎率兵破之寶徹兄子曰智臣復聚兵拒戰盎進討兵始合輙釋胄大呼曰若等識我耶衆委戈袒而拜賊遂潰捕盗將徐商徙節山南東道地多山棚為剽賊商取材卒為捕盗將别為屯營寇所發輙迹捕捕必得遂為精兵㑹兵討捕安潜歴忠武節度使王仙芝寇河南安潜首請㑹兵討捕號令精眀賊畏之不犯境手打宗室巨楊國忠謂巨曰比來人多口打賊君不爾乎巨曰誰為相公手打賊者乎盗賊出境王播為京兆尹時禁屯列畿内者出入屬鞬佩劒姦人冒之以剽劫又勲戚家馳獵近郊播請一切苛止盗賊不能隱皆走出境士無鬬志屈突通隋政益亂盗賊多士無鬬志諸將多覆通毎向必持重雖不大克亦不敗負所過剽略崔鉉龎勛叛自桂管北還所過剽略鉉聞大募兵屯江湘邀賊歸路賊懼更踰嶺自淮而北朝廷壯其志羣盗感愧吕元膺釋囚歸之而戒還期吏白不可荅曰吾以信待人人豈違我如期而至由是羣盗感愧悉避境去闔境無盗賊吕諲為荆州治尚威信故軍士用命闔境無盗賊以仁愛賊無敢害裴謹為淮安司户楊琳等亂劫吏多死惟謹以仁愛故賊約其屬無敢害撤私邑山房千四百舍李德裕為浙西觀察使撤私邑山房千四百舍寇無所廋蔽毁山房三千餘所王彦威為忠武節度使毀山房三千餘所盗無所容自記平賊一篇裴休父肅貞元時為浙東觀察使劇賊粟鍠誘山越為亂䧟州縣肅引州兵破擒之自記平賊一篇上之德宗嘉美疾雷將鄭畋為鳳隴節度募銳兵五百號疾雷將境中盗不敢發發輒得㑹巢䧟東都俄而賊使至諸將皆欲附賊畋開諭不可伏兵髙雞泊劫王鐸徙義昌節度使鐸世貴出入裘馬鮮明妾侍且衆過魏樂彦楨子從訓心利之李山甫者數舉進士被黜依魏幕府内樂禍且怨中朝大臣導從訓以詭謀使伏兵髙雞泊劫之鐸及家屬吏佐三百餘人皆遇害朝廷㣲弱不能治其寃天下痛之質家族誓兵討賊韋昭度李昌符亂興倉卒昭度質家族於禁軍誓兵討賊士感動乃平昌符盗射李石三年正月石將朝騎至親仁里狙盗發射石傷馬逸盗邀斫之坊門絶馬尾乃得脫徧南山五谷李抱玉廣德中時吐蕃入寇帝次陜羣盗徧南山五谷間東拒虢西抵岐椎剽不勝計詔太子賔客薛景仙為南山五溪谷防禦使引兵招捕又不克更詔抱玉討賊抱玉盡得賊株柢蹊隧分兵守諸谷使牙將李崇容精騎四百自桃林虢川襲之賊帥髙王脫身走城固山南西道張獻誠擒以獻悉索支黨斬之不閱旬五谷平賊避其鋒崔光逺為京兆尹㑹賊黨剽涇陽休祠房椎牛呼飲光逺刺知之率兵夜趨其所使百騎彀滿彀其前命驍士合譟賊醉不能師斬其徒二千得馬千數俘一酋長以獻自是賊常避其鋒數犯州縣元結時議曰乃今河北姦逆不盡山林江湖亡命尚多盗賊數犯州縣百姓轉徙踵繼不絶將士臨敵而奔賢人君子遁逃不出捕支黨皆盡李栖筠為常州刺史宿賊張度保陽羡西川累年吏討不克至是發卒捕斬支黨皆盡里無吠狗支黨磐結李芃永泰初宣饒劇賊方清陳莊西絶江劫商旅為亂支黨磐結芃請以秋浦置州扼衿要使不得合從李勉是其計奏以宣之秋浦青陽饒之至德置池州即詔芃行州事夾河為藪劉晏以為東垣底柱澠池北河之間六百里戍邏久絶奪攘姦宄夾河為藪依山為剽劉潼厯京兆尹山南有劇賊依山為剽宣宗怒欲討之宰相崔鉉曰此陛下赤子廹於飢寒弄兵山谷間不足討請遣使喻釋之詔潼馳往蝟奮闗播陳少游鎮浙東淮南辟為判官李靈耀叛少游屯淮上所在盗賊蝟奮播儲貲力給軍興驚剽德宗初湖南峒賊王國良驚剽州縣不可制詔播宣輯播且言奉詔平賊有如不受命臣謂發州兵翦定之帝曰善克殄大盗李晟帝至自梁晟以戎服見三橋帝駐馬勞之晟再拜頓首賀克殄大盗廟朝安復為盗剽脅孔緯蕭遘雅不喜及帝避朱玫次陳倉惟黄門衞士數百扈乘輿詔拜緯御史大夫令趣百官至行在時羣臣露潁􅉦厔為盗剽脅衣囊略盡緯謁宰相欲有所論遘與裴澈怨田令孜不欲行辭不見盗賊顯行崔郾改岳鄂等州觀察使自蔡人叛岳鄂常苦兵盗賊顯行郾修治鎧仗駃追窮躡上下千里歲中悉捕平送租賦為盗所奪張萬福攝舒廬壽團練使州送租賦詣都至潁為盗所奪萬福領輕兵尾襲賊倉卒不得戰悉擒之盡得所亡并先掠人妻女財畜萬計螘結劉知謙客封州黄巢自嶺表北還潮湘間羣盗螘結知謙因據封州有詔即授刺史誅宿盗顔泉明拜郫令誅宿盗人情翕然道無寇跡田仁㑹遷勝州都督境有夙賊依山剽行人仁㑹發騎捕格夷之城門夜開道無寇跡劉蕡策官亂人貧盗賊並起土崩之勢憂在旦夕即不幸因之以疾癘繼之以凶荒陳勝呉廣不獨起於秦赤眉黄巾不獨起於漢以戯禦劇賊安禄山反蕭穎士往見河南採訪使郭納言禦守計納忽不用嘆曰肉食者以兒戯禦劇賊難矣哉鴟峙二京李翰傳張廵功狀曰張廵忠誼奮發率烏合守雍邱潰賊心腹及魯炅棄甲宛葉哥舒翰敗績潼闗賊遂盗神噐鴟峙二京遺貲布路黄巢賊破陽武圍鄭州不克螘聚鄧汝間闗以東州縣大抵皆畏賊嬰城守故賊放兵四略殘郢復二州所過焚剽生人㡬盡官軍急追則遺貲布路士爭取之率逗撓不前殺人如藝儳路圍福州觀察使韋岫戰不勝弃城遁賊入之焚室廬殺人如藝城府窮為荆萊秦宗權進破東都圍陜州使秦彦寇淮淝秦賢略江南宗衡亂岳鄂賊渠率剽慘所至屠老懦焚屋廬城府窮為荆萊自闗中薄青齊南繚荆郢北亘衛滑皆麕駭雉伏至千里無舍煙憑培塿以自固合莝脆以為强柳宗元討黄賊狀憑培塿以自固合莝脆以為强劫脅使臣侵暴列郡雖狐䑕之陋無足示威而蜂蠆之毒猶能害物必資翦伐方致和平舉宗肆暴恃狡兎之穴跧伏偷安憑孽狐之邱縳壯殺老啼且號柳宗元寄韋珩到宮數宿賊滿野縳壯殺老啼且號盗賊縱横杜甫寄栢學士林居盗賊縱横甚宻邇形神寂寞甘辛苦大盗割鴻溝如風掃秋葉李白徒堅黨合事鉅寇牢或據深山或閉官道杜牧賀擒賊表唐亡諸盗皆生於大中之朝太宗之遺德餘澤去民也久矣而賢臣斥死庸懦在位厚賦深刑天下愁苦方是時也天將去唐諸盗並出唐逆臣賛逆賊一奮中原刲裂吐蕃賛𤣥宗有逸德而拓地太大務逺功忽近虞逆賊一奮中原刲裂訖二百年不得復完以至陵夷髙雞泊廣袤數里竇建德兵伐遼補隊長㑹邑人孫安祖乃謀曰我聞髙雞泊廣袤數里葭薍阻奥可以違難承間竊出推埋掠敓足以自資為招亡兵使安祖率之入髙雞為盗後自號漫天王築壇於河間樂壽自立為長樂王更號夏王豈伊山川間廻首盗賊繁杜詩漫山賊營壘廻首得無憂同上緑林寧小患同上淘物黄巢䧟京師甫數日因大掠縛箠居人索財號淘物富家皆跣而驅擊殺八萬人血流於路謂之洗城黄巢復入京師怒民迎王師縱擊殺八萬人血流於路可渉也謂之洗城驂衢殺人李揆京師多盗至驂衢殺人尸溝中吏裭氣李輔國方横請選羽林騎五百備徼捕揆曰本朝置南北衙文武區别更相檢伺今以羽林代金吾忽有非常何以制之輔國議格如蝟毛而奮王世充等賛煬帝失德天醜其為生人籲辜羣盗乗之如蝟毛而奮磨牙揺毒其劇者若李宻因黎陽蕭銑始江陵竇建德連河北王世充舉東都皆磨牙揺毒以相噬螫四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒韓愈與桞中丞書狼扈元結醜徒狼扈鋒蝟斧螗柳平淮夷雅皇武裒兇鞠頑鋒蝟斧螗聿擒其良右翦左屠聿擒其良其良既宥告以父母同上方城人揺不寧事變難測陸宣公奏議寇亂有益翦滅無期人揺不寧事變難測屢犯州縣文粹元結時議今所在盗賊屢犯州縣盗賊不起同上天子往在靈武無今日威今而盗賊不起二十為大將英公言我年十三為無賴賊逢人則殺十四五為難當賊所不快者殺十七八為好賊上陣乃殺二十為大將使兵以殺人也出隋唐嘉話猶張蹭蹬之鱗于公異朱泚露布猶張蹭蹬之鱗更舉螳蜋之臂大略居人貲産田神功傳劉展反大略居人貲産發屋剔窌豺狼塞路人斷絶烽火照夜屍縱横杜甫釋悶敓􅔯者時聞於道路穿窬者或縱於鄉閭白居易去盗賊議方今禁科雖嚴桴鼔未静敓􅔯者時聞於道路穿窬者或縱於鄉閭寘蟊賊於其心元稹論討賊表蕞爾㣲醜天將弃之寘蟊賊於其心假螻蟻以為聚忠臣孝子思得食肉除剗寇盗宇縣清夷韓愈賀冊尊號表賊壕連白翟戰瓦落丹墀杜詩長江連海羣盗如麻驟雨絶絃不可尋逐無闗可閑無要可防杜牧上李太尉剽寇日旁午鄭從讜時承軍亂剽寇日旁午從讜既視事奸無廋情乃推捕反賊誅其首惡方地數千里不識盗賊韓文草間求活李宻就翟讓曰今羣豪競興公宜先天下攘除羣凶寧常剽奪草間求活哉道路剽奪王世充傳道路剽奪使者苦之孽氣腥熖所以亡隋觸唐明德折北不支乃就殱夷王竇賛痍叛殘孽衆不盈萬隱太子建成劉黒闥亂河北王珪等進說曰今黒闥痍叛殘孽衆不盈萬利兵鏖之唾手可决請往討之陵驚郡邑杜牧賀擒賊表竊盗三白既貪財以肆心乃行險以寘念蓄行險之心窮斯濫矣遇慢藏之貨獲則取之竊財竊人之財猶謂之盗竊賄為盗盗賊公行盗器盗憎主人充斥言多也盜有所在萑蒲見賊寇門窮斯濫矣小人穿窬之盗小人有勇而無義為盗約斯盗小人貧斯約約斯盗也行險小人行險以求僥倖法令滋彰盗賊多有草竊書曰殷人好草竊言草野竊盗以為姧寇攘書曰凡人自得罪寇攘姦宄殺越人于貨攘奪也言殺人以求財貨􅐁􅔯鴟義姦究􅟃􅔯矯虔吾盗臧武仲謂季孫曰召外盗禮焉何以止吾盗外盗外境之盗貪冒之人將寘力焉既貧斯約謂富可求求浮雲之富緘縢扃鐍揭篋之徒胠篋人患盗之昭也誨盗暴客殺之無罪周禮凡盗賊軍鄉邑及家人殺之無罪注若今無故入人家牽引欲犯法者其時格殺之無罪相翔秋官野廬氏掌賔客至有相翔者則誅之注云相翔猶倡佯觀伺將為盗也外户不閉謂無盗也盗亦有道也跖曰妄意室中之藏聖也先入勇也後出義也知可否智也均分仁也大盗小盗莊子探囊發匱莊子曰將為胠篋探囊發匱之盗而為守備則必攝緘縢固扄鐍此世俗之所知也巨盗至則負匱揭篋擔囊而趍唯恐緘縢扄鐍之不固教盗齊之國氏大富宋之向氏大貧請其術國氏曰吾善為盗向氏聞為盗之言不喻為盗之意遂踰垣穿宇手足所及無不探取俄而㠯獲贓罪沒先人之産國氏曰嘻為盗之道天有時地有利雲雨滂潤山澤田産育生吾禾黍植吾穜稑陸盗禽獸水盗魚鱉皆天地所有豈吾所有吾取之故為盗夫金玉珍寶人之所聚盗之獲罪宜哉向氏以為重罔已也晉侯之豎頭須竊藏以逃傳不殺盗曺襃為圉令以禮化民有他鄉盗五人入圉界捕之太守馬嚴促殺之襃曰絶人命者天亦絶之臯陶不為盗制死刑遂不殺嚴奏襃懦弱遂免官犇伏逃犇晉以士㑹將中軍於是晉國之盗犇於秦羊舌職曰吾聞禹稱善人不善人逺善人在上則國無倖人不仁者逺矣舜有天下舉臯陶不仁者逺矣有耻且格格改也外户不閉大道之行云云路不拾遺子産相鄭使民不為盗絶巧棄智盗賊無有盗賊伏隱傳知禁萑蒲久静桴鼓不鳴頃因魯賞庶其暫聞充斥旋見晉用士㑹終致奔逃四封之詰十里以違不歸死於司敗宜勿使於追胥逋逃掩藏惡既相濟罪亦惟均甲非歸死乙則保姧入懐之鳥漏網之鯨掩賊傳毁則為賊掩賊為藏賴姧之用有常無赦隱賊少皥氏有不才子掩義隠賊好行凶德惠姦疾惡荒閱文王之法曰有亡荒閱閱蒐也荒大也亡逃罪而隱者同罪楚文王作僕區之法曰盗所隱器與盗同罪若以二文之法取之盗有所在詰盗季孫謂臧武仲曰我有四封而詰盗何故不可隱慝慝惡也蒐慝藏惡利滛匿容隱窮鳥入懐逋逃主萃淵藪獲全濟難私匿竄身隱死百家之邑可以隱死藏亡匿湖陽公主謂世祖曰文叔為白衣時藏亡匿死吏不敢到門庇其賊人而取其地傳囊槖廣川王國多盗張敞以耳目發起賊名區處王姬及同族劉調等通為囊槖注容止盗賊若囊槖盛物盗有所在無留慝傳云摘伏舍慝季布窮猿犇林遇者則止走鹿赴隂急何能擇招誘晉髙陽王睦招誘逋亡變姓名者七百餘户貶為縣侯亡抵張儉逃亡抵孔融兄襃襃不在融舍之州郡并收襃融二子争死竟坐襃罪沉命漢王温舒等酷虐而人輕犯法盗賊滋起以是沉命皆藏匿命逃亡也過一飯漢詔捕辛興興與鮑宣女壻許紺俱過宣一飯去宣不知情坐繫獄自殺長寇救其患難誠為好仁匿乃姦回則非嫉惡救難雖容於投足嫉惡終昧於剛腸季布獲全於朱家元節匿死於孔氏疑枉𤓰李古詩曰君子防未然不處嫌疑間𤓰田不納履李下不整㓂薰蕕狐疑狗盗厚誣薄訴盗璧楚相亡璧疑張儀笞數百不伏疑金直不疑為郎同舍郎失金意不疑盗金不疑買金償之後知非亡金者大慙似是而非研覈是非𤓰李可疑淄澠難别拾塵惑孔顔回炊有炲煤入飯中回乃拾之孔子疑之妄意良人元帝引宰相御史條責職事曰惡吏負賊妄意良人猜禍王温舒為中尉召猜禍吏與從事注吏好猜疑作禍害者任之鄰人父史宋人有天雨壞墻其子曰不能築將有盗其鄰人父亦言之後果大失財物其子乃疑鄰人父盗之疑絝陳重景公同舍郎告歸誤持鄰舍郎絝去主疑重終不申說市絝還之後歸者持絝還主事乃顯然賞用聞仲弓之誡子亦既自新遇管氏之知人由斯入用人之縱欲大為防而猶踰法以止姦小不忍而恐亂晝伏夜動始見穿窬之心今是昨非旋聞砥礪之節若容已露之姦恐誘將來之盗作姦者如可舉為善者無乃疑請敦理道無啟倖門既捨而罪乃升諸公唯善所在雖盗何傷惟賢是求雖盗必舉棄瑕録用補過責功所宜權以救世不可垂以訓人若行其權道開以倖門則寇所由興法不可禁若貸前定之法是誘後來之姦見小善而必求財難茍得踰大防而不禁敝將若何不竊子曰茍子之不欲雖賞之不竊遇盗管仲遇盗取二人焉上以為公臣曰所與游辟也遺布陳寔字仲弓為太邱長有盗入其家伏梁上寔覺之召諸子戒之曰不善人未必本惡習以性成梁上君子也盜聞自投伏罪寔曰君貌非惡人當貧耳遺布二疋而遣之賞盗邾庶其以漆閭邱來奔季武子以公姑姊妻之皆有賜於從者魯多盗季孫謂臧武仲曰不可詰也季孫曰我有四封而詰其盗何故不可武仲曰子召外盗而大禮焉何以止吾盗庶其竊邑以來子以姬氏妻之其次皁𨽻輿馬其小者衣裳劒帶是賞盗也而去之其或難焉王烈字彦方有盗牛者主得盗者曰無令王彦方知烈聞遺布一端以激之後有遺劍於路有一人守之以待主乃盗牛者定交戴若思不拘操行行遇陸機赴洛船裝甚盛揮其徒掠之思登岸據胡牀坐指揮機遥謂曰卿才美如此何作刼耶若思流涕投劒謝罪機遂與定交捕捉不歸死於司敗宜勿佚於追胥周禮以比追胥追逐寇也胥司捕寇者唯田與追胥竭作盡室行也逐寇如追逃犇秦之盗執其有罪書曰庶羣飲汝勿佚盡執拘以云云擒姦追亡出匣之兕漏網之鯨鷹鸇之逐鳥雀視盗郤雍能視盗察眉知之千無一遺文子曰雍必不得其死俄而羣盗殺雍赭衣張敞為京兆尹長安多盗敞求得酋長數千貸其罪犯其宿負令致諸偷酋長乃以赭汙小偷衣令吏捕之枹鼔張敞為京兆尹枹鼔稀鳴枹鼔追盗鼔也把重罪王温舒為廣平都尉擇敢往吏皆把其隂重罪而縱使督盗即有廻避夷之伺候先知焦延壽字贛補小黄門以伺候先知姦罪盗不得發怒殺盗張酺為東都吏有殺盗者酺按之以為長吏受贓從不至死盗徒皆飢寒何窮其法乎三科募壯士誘賊虞詡升卿為朝歌長賊屯聚設三科募壯士攻刼為上殺人偷人為次不事家業為下恕其罪使入賊誘令劫掠以伏兵待之緩追逸賊榖梁越逐臣妾逋逃勿敢越逐延耆老致寇賊定襄大姓殺吏拜班伯為太守乃延耆老日為供具耆老知酋豪懐恩醉酒具言盗賊亡匿處乃分部收捕旬日盡得之耳目發姧張敞為刺史以耳目發起盗賊主名區處比三輔張敞請治劇郡吏追捕有功者願比三輔尤異以勸善上許之縫衣以綵綖虞詡升卿為朝歌長賊數千屯聚詡遣貧人能縫者傭作賊衣以縁其裙為識有出市者輒擒拒捍追捕晉周訪士逹時有訪同姓名者罪當死吏誤收訪訪奮擊收者數千人皆走而歸於帝帝不罪之孔以稽禁禦陸贄視姦盗有無以稽禁禦竊其衣囊楊再思初調元武尉使至京師舍逆旅有盗竊其衣囊再思遇之盗窘謝再思曰而苦貧故至此囊中檄無所事幸留他物可持去初不為人言謹視陸希聲上言當謹視盗賊人窮斯詐起為姦盗宋務光書曰數年以來猛吏奮毒急政破資馬困斯佚人窮斯詐起為姦盗從而刑之良可嘆也絶汴流羅立言改陽武令設鎻絶汴流姦盗屏息為償所亡袁滋華州刺史得盗賊哀其貧窮為償所亡姦夫盗兒蘇源明史思明䧟洛陽有詔幸東京將親征源明因上䟽極諫曰姦夫盗兒連墻接棟磨勵以須陛下之出御史大夫必不能澄清禁止䑕竊狗盗陳子昻上書儻䑕竊狗盗西入陜郊東犯虎牢取敖倉一杯粟陛下何以遏之雜盗四白妻巫臣有桑中之喜疑將竊妻以逃也傳藥姮娥竊羿不死藥食之飛入月中殞晉蔡裔聲如雷震有二盗入其室裔撫牀一呼二盗俱殞魚世說王承為東海小吏盗池魚獲之承曰文王之囿與衆共之池魚何足惜乃釋之踰垣牆竊馬牛書曰無敢寇攘云云香韓壽竊香羊其父攘羊而子證之裘孟嘗君有能狗盗入秦宮藏内盗狐白裘獻秦后遂免難東陽國語曰子木曰資東陽之盗使殺椒舉也西鄙傳樂盈過周之西鄙掠之注云劫財物也柳晉陶侃士衡為荆州牧性聰敏尉夏施盗官柳種於巳門侃見駐車問曰此是武昌西門柳何因盗之施惶懼謝罪布楚江乙毋失布以盗由令尹也𤓰桑虞子深以至孝稱園中𤓰熟有人踰垣盗之虞以園多棘恐刺盗者使奴開道偷乃負𤓰出知虞除之乃送所盗𤓰請罪仍以與之斫樹范喬字伯孫臘夕邑人斫其樹人告喬佯不聞邑人愧而歸喬喻之曰節日取柴與父母歡娱何愧之有青氊語林曰王子敬卧齋中偷人取物卧不動偷復登厨子敬曰偷兒青氊我家舊物羣盗驚走禾淳于恭孟孫家有山田果樹有偷恭禾者恭見恐其愧伏草中盗去乃起去馬孔嵩被竊馬賊自相讓曰孔嵩善士豈宜盗竊遂送馬謝之武卒盗强弩絃春秋決獄曰甲為武庫卒盗强弩絃一時與弩異處當何罪論曰兵所居比司馬闌入者髠重武備責精兵也弩蘖機郭弦軸異處盗之不至盗武庫兵陳論曰大車無䡚小車無軏何以行之甲盗武庫兵當弃市乎曰雖與弩異處不得弦不可謂弩矢射不中與無矢同不入與無鏃同律曰此邉鄙兵所贓直百錢者當坐弃市又馬秦穆公有駿馬為盗殺食之公曰吾聞食駿馬肉不飲酒必死遂賜羣盗酒飲生刈稻孫晷字文度年飢榖貴人有生刈其稻晷見而辟之去後乃自刈送之鄉里感愧莫敢侵犯贓物司厲掌盗賊之任器貨賄辨其物皆有數量賈而揭之入于司兵頼姧之用賴姧人之用物隱器傳僕區法曰盗所隱器與盗同罪也孔陳子昻䟽曰夫人情以求生為急今有粟麥牛羊為之餌而不救其死安得不為盗乎光火馮元常徙眉州刺史劒南有光火盗夜掠人晝伏山谷元常諭以恩信約悔過自新賊相率脫甲面縳盗葱張允濟仕隋為武陽令過道旁有姥廬守所蒔葱因教曰第還舍脫有盗當告令姥謝歸俄大亡葱允濟召十里内男女盡至物色驗之果得盗者奪繒王君廓善盗嘗負竹笱如魚具内置逆刺見粥繒者以笱囊其頭不可脫乃奪繒去而主不辨也盗樹陽城有盗其樹者城遇之慮其耻退自匿盗羊竇建徳邑人孫安祖盗羊為縣令捕効笞辱安祖刺殺令亡抵建德數盗姑家牧羊杜伏威與里人輔公祏約刎頸交公祐數盗姑家牧羊以餽伏威奢侈五白聖人去泰君子戒盈物惟惡盛神亦害盈不以義制將由惡終禮無縱欲道貴去奢儉雖諷於蟋蟀奢則刺於蜉蝣况當示禮之時自致宣驕之禍盈不可乆貴而能貧不遜子曰奢則不遜儉則固與其不遜也寧固寧儉禮與其奢也寧儉去奢老子曰聖人去奢去泰書曰位不期驕禄不期侈貴不與驕期而驕自至富不與侈期而侈自至故戒之滿招損謙受益欲敗度縱敗禮以速戾于厥躬窮泰極侈縱欲不度非度所制盈必壓天之道也崇侈滋侈泰侈欲不可縱驕奢滛佚所自邪也侈惡之大也納諸大惡心侈體汰文選言憑虚公子侈靡何禮之拘遺咎富貴而驕自遺其咎益之而損盗夸老子曰服文采厭飲食是謂盗夸宣驕以蕩陵德放蕩敗德敝化奢麗怙侈滅義驕滛矜夸將由惡終雖收放心閑之惟難處樂不仁者不可以乆處約不可以長處樂亡家之主奢侈力敝華定侈女叔齊曰侈將以其力敝言力盡而敝侈汰伯有侈汰終取亡也禆竈指其門莠曰其莠猶在乎富多鄭駟崇富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之速朽桓司馬自為石椁三年而不成孔子曰若是其靡也死不如速朽之愈丹楹刻桷魯莊公丹桓宫楹刻桓宫桷御孫諫曰儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎鷸冠鄭子臧好聚鷸冠鄭伯聞而惡之使盗殺之君子曰服之不𠂻身之灾也彼其之子不稱其服子臧有焉瓊弁楚子玉為瓊弁夢河神乞之不與果戰敗死之左傳云載寶南宫敬叔必載寶而朝夫子曰䘮不如速貧之愈峻宇雕牆示侈楚子示諸侯侈椒舉曰三公二公皆示諸侯禮也今君以汰無乃不可乎不聽之左傳服美傳曰服美不稱必以惡終謂慶封也書曰服美於人管氏有三歸娶三姓之女乗肥馬衣輕裘子曰赤之適齊也云玉食漢陳咸為南郡守奢侈玉食獸炭羊琇作獸炭謂屑炭和作獸而燒之何曾蒸餅不十字坼不食又日食萬錢曰無下筯處抱罋釀酒羊雅冬日令人抱罋取煖須㬰易人酒熟而已鏤簋朱絃管仲鍾石之懸不移而具劉向新序曰孟獻子如晉韓宣子兕觴之飲三徙鍾石之懸不移而具也坐罪韓延壽坐東郡奢侈弃市限利為制度漢書恱紛華盛麗史記曰子夏門人之髙第者猶云出見紛華盛麗而恱入聞夫子之道而樂二者心戰未能自决況中庸乎相夸石崇與王愷羊琇之徒以奢靡相尚愷以􅏁澳釡崇以蠟代薪愷作布歩障四十里崇作錦歩障五十里崇泥屋以椒愷屋以石脂愷以珊瑚示崇崇擊碎之其争豪如此錦維舟呉甘寧字興覇道路往止繪錦維舟去或割弃之以示人之奢也孔用度奢侈范傳正宦益逹用度益奢侈享用叚文昌少羇窶所向皆少諧及居將相享用奢侈士議尤替驕奢則禍至桞玭家訓董生有云賀者在門弔者在閭言受福則驕奢驕奢則禍至當時第一崔寛本豪侈城南别墅池觀堂皇為當時第一為奢侈事裴漼晚節稍畜伎妄為奢侈事議者以為缺侈窮人欲而議者不之貶郭子儀賛奢者好親人所以多過宋子嵩化書京師髙訾胡証厚殖財自奉養車服器用珍侈遂號京師髙訾城中開南北二第室宇奢廣元載城中開南北二第室宇奢廣當時膏腴别墅疆畛相望且數十區名姝異妓雖禁中不逮帝盡得其狀本傳煬帝奢侈竇静授司農卿趙元楷為少卿静鄙其聚斂因㑹官屬大言曰如煬帝奢侈竭四海自奉司農須公矣今天子躬節儉屈一人安兆庶惡用公哉元楷大慙侈飲食李令問厚奉養侈飲食奢靡魏徴曰今難得之貨雜然並進玩好之作無時而息上奢靡而望下朴素力役廣而兾農業興不可得已危亡之漸禇遂良帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾邪遂良曰彫琢害農力纂繡傷女工奢靡之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得開及其横流則無復事矣帝咨美之服玩食飲必極豐侈宇文士及過自奉養服玩食飲必極豐侈韋陟侈縱陟性侈縱喜飾服馬侍兒閹童列左右常數十侔於王宫主第窮治饌羞擇膏腴地藝榖麥以鳥羽擇米毎食視庖中所弃其直猶不減萬錢宴公侯家雖極水陸曾不下筯後房歌舞伎百餘河間元王孝恭性奢豪後房歌舞伎百餘不循法隴西恭王博乂驕侈不循法度伎妾數百曵羅綺甘粱肉放於聲樂以自娱婦人惟侈麗是好封德彛楊素營仁壽宫表為土工監規創鴻侈宫成文帝怒曰素殚百姓力為吾掊怨天下素大懼倫曰毋恐皇后至自當免明日帝果勞素曰公知吾夫婦老無以自娯樂而盛飾此宫邪因大恱素退問何料而知倫曰上節儉故始見必怫然雅聽后言婦人惟侈麗是好后恱則帝安矣素曰吾不及也家聲在人李聽盛飾車馬服玩或戒之聽曰家聲在人若示衰薄恐不見忠功之効吾欲誇而勸之也盛葺第舍潘孟陽盛葺第舍帝微行至樂游原望見之以問左右孟陽懼輟不敢治而伎媵用度過侈汰人多指怒之君臣窮極奢以相誇尚五代晉臣景延廣天福八年秋出帝幸大年莊還置酒延廣第延廣所進器服鞍馬茶牀椅榻皆裹金銀飾以龍鳳又進帛五千疋綿一千四百兩馬二十二匹玉鞍衣襲犀玉金𢃄等請賜從官自皇帝重睿下至伴食刺史重睿從者各有差帝亦賜延廣及其母妻從事押衙孔目官等稱是時天下旱蝗民飢死者歲數十萬而君臣窮極奢以相誇尚如此一飲食必費萬錢五代趙巖自以有功於梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐耻其不及乃占天下良田大宅裒刻商旅其門如市租庸之物半入其私巖一飲食必費萬錢性豪侈王琚自以立勲至天寳時為舊臣性豪侈其處方面去故就新受饋遺至數百萬侍兒數十寶帳備具闔門三百口既失志稍自放不能遵法度在州與官屬小吏酋豪飲謔樗蒱藏鈎為樂毎徙官車馬數里不絶從賔客女伎馳弋凡四十年同上上茍好奢則天下貪暴之吏將回心焉白居易奢者三歲之計一歲之用蒿宫茅柱實興國之清猷玉席珠衣乃危邦之弊化希齊杯飲之年願躡鶉衣之代中宗斷進獻制桀以瑶臺為麗而不悟南巢之禍殷辛以象箸為華而不知牧野之敗謝偃本傳漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡徐賢妃諌䟽初王嘆隋夸侈收進曰峻宇雕墻殷辛以亡土堦茅茨唐堯以昌阿房興而秦禍速露臺罷而漢祚永後王奢侈是矜死一夫之手何能保哉王重其言本傳雕金鏤玉採六合之珍竒剪翠裁紅飾三春之草樹即宜懲革勿用因循唐中宗斷進竒巧制忽彩椽之恭儉追雕墻之侈唐魏徵論時政隋煬帝驅天下以從欲罄萬物而自奉採城中之子女求逺方之竒異宫室是飾臺榭是崇同上苦言嘉謀將作少匠楊務廉素以工巧見用中興初袁恕已恐其更啟遊娯侈靡之端言於中宗曰務廉致位九卿積有歲年苦言嘉謀無足可紀毎宫室營創必務其侈若不斥之何以廣昭聖德由是左授陵州刺史舊史百花煥發𤣥宗毎年幸華清宫楊銛楊錡韓虢秦三夫人五家扈從毎家為一隊着一色花五家合隊照映如百花之換發遺鈿墜舄瑟瑟珠翠燦爛芳馥於路孔平仲續世說䟽築臺沼崇峙廡魏元忠陳郡男子袁楚客者以書規之曰古者茅茨采椽以儉約遺子孫所以愛力也今公主所賞傾庫府所造皆官供其䟽築臺沼崇峙廡山無本石木無近産造之終歲功用不絶夫為君所以養人非以害人今外戚不助養而反害之是使人主受謗天下奉養華裕李紓自奉養頗華裕一言之恱賞至百萬嚴武在蜀頗放肆用度無藝或一言之恱賞至百萬蜀雖號富饒而峻掊亟斂閭里為空正寢華顯避不敢居田宏正為節度使民服玩僣侈者即日徹毁之承嗣時正寢華顯宏正避不敢居更就採訪使堂皇聽事恃功而侈髙崇文為京西諸軍都統崇文恃功而侈舉蜀帑藏百工之巧者皆自隨傾貲貨市權貴驩范傳正宦益逹用度益奢侈傾貲貨市權貴驩私公府如家帑以寶鈿為井幹王鉷賜死有司籍苐舍數日不能徧至以寶鈿為井幹引泉激霤號自雨亭其奢侈如此飲食資身過則生患衣服稱德侈則生慢柳公綽輿服食飲光麗珍豐裴冕性豪侈既素貴輿服食飲光麗珍豐櫪馬直數百金者常十數毎廣㑹賔客不能名其饌郭英乂拜劍南節度使教女妓乗驢擊毬鈿鞍寶勒及他服用日無慮數萬費以資倡樂未問民間事不能自悛李愿拜河中等節度使雖嘗以荒侈敗不能自悛日費凡數十萬呉士矩開成初為江西觀察使饗宴侈縱一日費凡數十萬盛滿楊收既益貴稍自盛滿為夸侈門吏童客倚為奸家畜聲妓目使頥令自視王侯王翰擢駕部貟外郎家畜聲妓目使頥令自視王侯人莫不惡之溺器以七寶裝後漢孟昶幸晉漢之際中國多故而據險一方君臣務為奢侈以自娱至於溺器皆以七寶裝之玉堂珠殿南漢劉龔好奢悉聚南海珍寶以為玉堂珠殿肉臺盤五代孫晟官至司空家益富驕毎食不設几案使衆妓各執一器環立而侍號肉臺盤時人效之金銀為篣筐􅆶籬安禄山帝為禄山起第京師為瑣户交䟽臺觀沼池華僣帟幕皆緹繡金銀為篣筐􅆶籬大抵服御雖乗輿不能過地仙五代張筠居洛陽擁其貲以酒色聲妓自娱足者十餘年人謂之地仙香聞數十里𤣥宗貴妃楊氏傳國忠既遥領劒南毎十月帝幸華清宫五宅車騎皆從家别為隊隊一色俄五家隊合爛若萬花川谷成錦繡國忠導以劒南旗節遺鈿墮舄瑟瑟璣琲狼藉于道香聞數十里錬炭洛下有豪子飲食鮮華有李使君亦尚豪侈為具召之曾不下筯至飰李曰此以炭炊豪子勉食一匙曰凡以炭炊先燒熟謂之錬炭方始無煙氣此亦非也劇談録銷得錦半臂鄭愚好華侈以錦為半臂後以所業獻崔鉉鉉曰真銷得錦半臂北夢瑣言牀畔香童王元寶好賔客務奢侈器玩服用僣於王者四方之士盡歸仰焉常於寢帳牀前使嬌童二人捧七寶博山爐自暝焚香徹曙出開元天寶遺事錦纒頭又王元寶富而無學識嘗㑹賔客明日親友謂之曰昨日必有佳論元寶曰但費錦纒頭耳簾帷珠翠夾道不絶莊宗遣李嚴聘蜀衍與俱朝上清而蜀都士庶簾帷珠翠夾道不絶嚴見其人物富盛而衍驕滛歸獻䇿伐蜀五代史醉粧後宫皆帶金蓮花冠酒酣免冠其髻髽然更施朱粉號醉粧同上觀沼華􅃉費皆千萬杜亞承陳少遊後裒率煩重用度無藝人兾有所矯革而亞雅意丞弼厭外官徃往不親事日夜召賔客言噱流連方春率民為競渡戯亞欲輕駃乃髤舩底使篙人衣油綵衣沒水不濡觀沼華􅃉費皆千萬隴西李衡在坐曰使桀紂為之不是過也既泛九曲池曵繡為颿詫曰要當稱是林沼衡曰未有錦䌫云何亞大慙以沉香為亭宗室漢敬宗侈宫室舶賈獻沉香亭材帝受之漢諫曰以沉香為亭何異瑶臺瓊室乎僭六車服居宇樂舞葬器物城冠祭祀燎附白名位不同禮亦異數易則生亂過乃有刑所宜守以等威豈可易其紀律茍無區别則有覬覦禮由位叙名以器分茍命數之或乖於禮容而何取雖器服不同有以多為貴者而等衰莫辨無乃爾是過與所宜禮以節之位茍殊於品列服則異於節文名位殊倫易則生亂器服異制過則著刑况當示儉之時自貽犯貴之誚唯器與名不可假人不守其位君子以是為濫矣僭禮下陵上僭難為上也孔子謂管仲鏤簋朱紘旅樹反玷賢大夫也而難為上也言大僭也上不僭上下不偪下犯貴袵席之上讓而坐下人猶犯貴犯君朝廷之位讓而就賤人猶犯君敗度敗禮非制非度不度何禮之拘名出於信信以守器器以藏禮易而生亂過則有刑服以旌禮昭其度也昭其數也登降有數各以序守官邪由官邪也名數命數等衰等列禮失則昬名失則愆表儀爵命禮命九命之數見周禮命數周禮聽禄位以禮命謂禄位之差以九命九錫之數正其服位以儀辨等則人不越慎守失守犯上失中班制禮也夾轂焚香士爕字彦成為交趾太守出入鳴鐘磬備威儀笳簫鼔吹車騎滿道胡人夾道焚香妻妾乗輜軿子弟從兵騎當時貴重振服百蠻尉佗不足喻也車服惟鵜諷其不稱相鼠刺以無儀衞仲叔于奚有功衞人賞之以邑辭請繁纓以朝許之繁纓馬飾諸侯之制也仲尼曰惜也不如多與之邑惟器與名不可假人器車服名爵號鄭駟崇富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之繡黼丹朱中衣大夫之僣禮也皆諸侯之禮繡音宵緑衣衞莊姜傷已也妾上僣夫人失位也詩曰緑兮衣兮緑衣黄裳緑間色黄正色緑衣反黄裏非禮制以喻妾上僣朝服之以縞冠自季桓始也僣宋王者之後也易輿服之制後漢梁兾易輿服之制作乎上軿車埤幘狹冠折上角擁身扇狐尾單衣車服兵衞蕭望之奏韓延壽在東郡試騎士治飾兵車畫龍虎朱雀延壽衣黄紈方領駕駟馬傳總建幢棨植羽葆鼔車歌車功曹引車皆駕駟馬載棨㦸五騎馬五分左右部軍假司馬千人持幡旁轂歌者先居射堂望見之延壽坐射堂令騎吏持㦸夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陣被甲把弩負蘭又使騎吏戯車上弄馬盗驂上僣不道坐弃市樂舞孔子謂季氏八佾舞於庭是可忍也孰不可忍也八佾王者之樂季氏僣三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂三家叔孫孟孫季孫雍詩篇名天子祭宗廟之禮也衞仲叔于奚有功衞人賞以邑辭請曲懸曲懸軒懸也三面懸其形曲故曰曲懸仲尼曰惜也唯器與名不可以假人禮諸侯之宫懸而祭以白牡擊玉磬朱干鏤錫舞大夏武乗大輅此諸侯之僭禮皆天子之禮也大夫之奏肆夏自趙文子始也僣諸侯之禮也樂之奢失罪以僣聞徧舞左傳王子頽享大夫樂極徧舞徧舞六代樂鄭伯曰樂禍也金奏郤至聘楚楚子享之為地室而懸焉郤至登金奏作於下驚而走出曲旃武安侯田蚡堂前羅列鍾鼓立曲旃曲旃旌旗之類噭咷楚歌韓延夀事具車服門欲庭觀帝樂杜䕫公良知晉亂奔荆州荆州牧劉表令盍曜為漢主合雅樂樂徧表欲庭觀之䕫諫曰今將軍號為天子合樂而庭作之無乃不可乎表納其言而止奏肆夏於天子舞八佾於季孫器物仲尼曰臧文仲不仁者三作虛器山節藻梲有其器而無其位故曰虚器也邦君為兩君之好有反坫管氏亦有反坫管仲鏤簋而朱紘君子以為濫也華而睆大夫之簀與曾子寢疾曾元曾申坐於足童子隅坐而執燭童子曰云云曾子曰然斯季孫之賜也候月蝕鑄刀劒蕭望之奏韓延壽在東都時取官銅器候月蝕鑄刀劒鈎鐔放效尚方事坐弃市祭祀君子太牢而祭謂之禮匹士太牢而祭謂之攘攘竊也君子大夫已上也諸侯之宫懸見上樂舞門注四時追孝礿祀有常九命辨儀牲盛異數孝感於時雖云罔極祭不以禮豈曰無違追逺誠謂孝思違禮則乖敬享居宇邦君樹塞門管氏亦樹塞門人君樹屏於門外管仲僣之臧文仲居蔡蔡龜也山節藻梲何如其智也言不智也臺門而旅樹大夫之僭禮也儒有居處不滛豐屋蔀家峻屋不度宣驕峻宇雕牆城鄭共叔段為京城太叔祭仲曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一今京不度非制也君將不堪傳周禮門阿之制以為都城之制都五百里内王子弟之所封也取天子門阿之制五雉宫隅之制以為城制天子宫隅之制七雉葬春秋不稱楚越之王䘮恐人惑也楚越僣王號晉侯納王王享之請隧不許曰王章也言隧天子典章也開地通路曰隧王葬之禮也諸侯懸棺而下之宋公卒始厚葬用蜃炭始用殉殉以人從死也椁有四阿棺有翰檜四阿椁也翰旁飾檜上飾也王者之禮君子謂華元樂舉於是不臣君生則縱其惑死又益其侈是棄君於惡也何臣之為孺子􅀈之䘮哀公欲設撥撥引輴車所謂紼也冠禮曰𤣥冠紫緌自魯桓公始也僣宋王者之後衡紞紘綖皆冠飾也昭其度也燎庭燎之有百由齊桓始也僣天子禮也其終夜燎孔専威福宗楚客監察御史崔琬廷奏楚客處訥専威福有無君心晉卿驕恣跋扈園檻李師古園檻僣制室宅輿馬僣法度韓休萬年尉李美玉有罪帝將放嶺南休曰尉小官犯非大惡今朝廷有大姦請得先治金吾大將軍程伯獻恃恩而貪室宅輿馬僣法度臣請先伯獻後美玉帝不許休固争儀服僣上藩鎮王鎔母亡始黷貨財姬侍千人儀服僣上治第過制范傳正拜宣歙觀察使代還坐治第過制憲宗薄不用僣正樂于頔卒諡曰厲子孝友求改諡髙鉞王彦威持不可謂頔内遮使者僣正樂勢廹而朝非其宿心益矜僣公私蕭然張延賞拜荆南劒南西川節度使成都吏郭英乂崔寧楊子琳亂益矜僣公私蕭然延賞事為之制薄入謹出府庫遂實唐史白孔六帖卷九十一
