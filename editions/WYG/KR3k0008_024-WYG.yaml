body:
  text: 白孔六帖巻二十四唐白居易原本宋孔𫝊續撰寢一遊俠二故舊三恤孤四戲謔五笑六喜七怒八拜揖九行歩十趨十一灑埽十二寢一白乃寢乃興乃安斯寢北堂安寢北堂上晝寢宰予晝寢子曰朽木不可雕也糞土之牆不可杇也於予與何誅終夜不寢吾嘗終日不食終夜不寢寢不言論語寢不尸尸伸手足如死人安身傳夜以安身夙興夜寐孝經聖人之責宰予弟子之嘲後漢邉韶字孝先教授數百人曾晝日假寐弟子私嘲曰邉孝先腹便便懶讀書但欲眠韶荅曰邉為姓先為字腹便便五經笥寤與孔子譚寐與周公議師若可嘲出何典記嘲者大慙寢無伏伏覆也禮東首禮君子寢恒東首東首生氣寢衣必有寢衣長一身有半語尚寐無覺詩云憂而欲寐假寐趙盾盛服將朝尚早坐而假寐鉏麑曰不㤀恭敬民之主也明發不寐詩目炯炯而不寐孔酣卧李大亮身三職宿衞兩宫每畨直常假寐帝勞曰公在我得酣卧韋綬為學士帝嘗幸其院韋妃從㑹綬方寢學士鄭絪欲馳告之帝不許神相趙昶巢之圍昶夜掫師疲而寢如有神相之者黎曙决戰士爭奮死垂頭佯睡五代劉延朗初延朗與房嵩並掌機宻每延朗議事則垂頭佯睡不省睡王述律每酣飲自夜至旦晝則常睡國人謂之睡王五代史四夷附録欹眠欹眠聼新詩韓愈鼻息如雷鳴道士倚墻睡鼻息如雷鳴石鼎詩序閒詠松風眠時遊敬亭上閒詠松風眠李白贈宣城太守北窻常晝眠崔令學陶令北䆫常晝眠贈崔秋浦腹揺鼻息曉鼓一發車馳馬奔予方髙枕偃然就寢腹揺鼻息夢到鄉國槐花滿地文鳴蜩噪庭孫樵乞巧寢甚安李𤣥道為王世充所執衆懼不能寐獨𤣥道曰死生有命憂能了乎寢甚安龜息袁天綱又相李嶠曰睡則息從耳出名龜息後必貴瓊筵寳幄連枝錦燈燭熒熒照孤寢李白𢷬衣篇尸寢驚敝裘杜甫晦日尋崔弔慶叅請多亦廢闕嗜酒好睡其癖已痼往往閉戶便經旬日弔慶叅請多亦廢闕至於俯仰進趨隨意所在杜牧書游俠二白意氣史記意氣髙作威於世謂游侠惡少漢昭帝元鳳五年發三輔及邵國惡少年以戍遼東英儁之域西京賦游俠之塲結客少年場輕死重氣結黨連羣殺吏執仇漢書長安姧猾寖多少年殺吏受財執仇相與操丸為彈得赤丸者斬式吏黒者斬文吏城中薄暮塵起剽劫死傷横道及尹賞為長安令乃穿地深數丈名為虎穴捕羣盗内穴中數日視其屍相枕藉而死幽并之俠曺子建詩借問誰家子幽并游俠兒張趙之倫並俠客也文選劇孟之俠漢書劇孟洛陽人以任俠知名季布之諾漢書季布任俠立然諾之信氣蓋闗中俠客少年連交合節節慕原嘗名亞春陵四公子也文選結儔附黨五陵之俠豪俠豪右感分遺身七啓曰䧺俊之從交黨結倫輕生重氣感分遺身此游俠之徒求名殺吏賈勇報讎然諾則黄金不易失意則白刃相讎燕市荆軻飲燕市夷門侯嬴夷門抱闗操丸之俠剚刃之讎杯酒間古詩失意杯酒間白刃起相讎背公死黨謂六國時背公死黨之義成守節奉上之義廢漢興未及匡正游俠序言信行果太史公曰游俠行雖不軌然猶言必信行必果知禁反正非明王在上示之以好惡齊之以禮法曷由知禁而反正四豪六國之罪人謂孟嘗等四公子殺身亡宗郭解之倫四夫之細竊生殺之權觀其温良汎愛振窮周急謙退不伐亦皆絶異之資惜乎不入於道徳放縱於末流殺身亡宗非不幸也並游俠傳序蔵活豪士魯朱家蔵活豪士以百數隂脫季布於危及布貴終不見劇孟周亞夫至河南得劇孟曰七國舉事而不求劇孟吾知其無能為己母死送車十乗而家無十金之産郭解字翁伯靜悍隂賊少蔵亡命作姧剽攻劫鑄錢掘冢年長乃改節以徳報怨姊子為人所殺賊窘自歸解解曰吾兒不直遂不罪其賊以此時人皆義之解出入人皆避然恭節未嘗乗車入縣庭解兄子斷揚掾頭公孫𢎞曰解以布衣以睚眦殺人雖不知罪尤甚遂族解氣蓋闗中季布心長事袁盎弟畜灌夫氣蓋闗中少年任侠者竊其名以行者衆也不以親為解袁盎家居劇孟嘗通盎盎厚待之人謂盎曰孟薄徒也將軍何自通之盎曰孟急人之急造其門不以親為解横穎川灌夫交通無非豪侠横穎川潁川之人歌曰穎川清灌氏寧穎川濁灌氏族椎埋王温舒少時椎埋為姧借客報讎朱雲字游少通輕侠借客報讎馳騖閭閻權行州里力折公矦栁市萬章字子夏居長安栁市孔以侠聞盧祖尚家饒財好施以侠聞為侠行劉义少放肆為侠行以伉俠相矜甄濟家衞州宗為伉侠相矜濟少孤獨好學以文雅稱胡証晉公裴度未顯時羸服私飲為武士所窘証聞突入坐客上引觥三釂客皆失色因取鐡燈檠摘枝葉櫟合其跗横膝上謂客曰我欲為酒令飲不釂者以此擊之衆唯唯証一飲輒數升次授客客流離盤杓不能盡証欲擊之諸惡少叩頭請去証悉驅出故世人稱其侠縱蒱酒長安市哥舒翰家富于財任侠重然諾縱蒱酒長安市任俠使氣郭元振為通泉尉任侠使氣撥去小節嘗盜鑄及掠賣部中口千餘以餉遺賓客百姓厭苦通於宫禁古押牙者富平居有游侠之才多竒計往通於官禁出南部新書撃劒為任俠李白喜縱横術擊劒為任侠輕財好施喜俠節竇建徳喜侠節風流藪澤長安平康坊妓女所居之地侠少萃號風流藪澤天寳遺事閒過信陵飲李白侠客行閒過信陵飲脫劒膝前横將炙啖朱亥持觴勸侯嬴三杯吐然諾五岳到為輕義非侠不立侠非義不成賛皇公豪侠論侠者蓋非常之人也雖以然諾許人必以節義為本義非侠不立侠非義不成難兼之矣真侠鋤麑不賊孟宣承基不忍志寧斯為真侠矣同上弄閣或言刺客飛天夜又術也韓晉公在浙西時瓦棺寺因商人設無遮㑹衆中有一年少請弄閣乃投蓋而上單練裙履膜皮猿挂鳥跂㨗若神鬼復建罌水於結脊下先溜至簷空一足欹身承其溜焉覩者無不毛寒珠衣仗劒張訓者吳丕祖之將校也丕祖在宣州給諸將鎧甲訓所得至敝怒形於色其妻謂之曰此不足介意但司徒茍知之必不爾明日吳公問所由張以告公命易之後吳移廣陵常賜諸將馬訓所得亦駑馬其妻言如前明日吳公又問之訓復以為言吳曰頃在宣州嘗賜諸將甲是夕夢一婦人朱衣衣直仗劒告予所賜張訓甲甚敝當遂易之今賜諸將馬復夢前朱衣人告訓所得非良馬何哉訓亦不能測也訓妻有衣箱常自啓開未嘗見之一日妻出竊啓之果見劒一口朱衣一襲後乃知劒侠也紅線甘澤謡潞帥薛嵩有歌妓曰紅線當至德之後兩河未寧田承嗣有異圖欲倂潞州募武勇超絶三千人號外宅男嵩聞以為憂每咄咄獨語紅線因侍問之嵩具告紅線曰此易耳妾願一到彼觀其形勢初夜首塗三更可還出戶忽不見未曉果復至取承嗣寢所金合來嵩即遣使持送合遺承嗣書曰有客從彼来云自元帥頭邉得此金合承嗣大懼散外宅男河北遂寧飛劍刺木江南野史馬應昌善劒技初守吉州因休沐賓佐宴酣指梁棟間有竅者能於十數歩外飛利劒刺之無不中者乃笑謂人曰吾長以儒術為事斯則少年之技於今亦無所試矣因引滿盡歡意氣素霓生李白侠客行趙客縵胡纓吳鈎霜雪明眼花耳熱後意氣素霓生少年學劒術凌鑠白猿翁珠袍曵錦帶匕首挿吳鴻由来萬夫勇挟此英雄風李白少年場行玉劒誰家子西秦豪俠兒李白詩所從皆博徒大俠隠太子建成資簡弛慢不治常檢荒色嗜酒畋獵無度所從皆博徒大侠故舊三舉舊罰舊具本門中白故舊不遺則民不偷不弃故舊無大過不相弃遺求舊人惟求舊半面之故敬故周禮太宰以八統御萬人二曰敬故謂不慢舊乆要子曰乆要不㤀平生之言原仲季友傳曰季友如陳𦵏原仲仲季友之舊也恤飬故人漢婁䕶君卿有故人吕公無子歸䕶䕶身與吕公妻與呂嫗同食及居妻子頗厭䕶流涕責曰吕公以故舊老窮寄身於我義所當奉遂飬吕公終身孔隆于故舊李晟篤分義隆于故舊宿昔之好劉文靜唐公踐天子位擢納言時多引貴臣共榻文静詠曰云云帝曰我雖應天受命宿昔之好何可㤀契分愈宻裴寂歴晉陽宫副監唐公雅厚及留守太厚契分愈宻引入卧内語平生丘和靖入朝詔其子師利迎之及謁見髙祖為興引入卧内語平生歡甚奏九部樂饗之接故舊如布衣時劉仁軌雖貴顯自矜踞接故舊如布衣時雖羇賤必均禮岑文本生平故人雖羇賤必均禮敦愛故舊薛季昶敦愛故舊布衣定交太宗皇后長孫氏兄無忌於帝本布衣定交以佐命元功出入卧内雖庸下與攜手韋表微篤故舊雖庸下與攜手語笑無間雅故郎餘慶遷交州都督驩州司馬裴敬敷與餘慶雅故以事笞餘慶婢父婢方嬖譛敬敷死獄中欺故囚舊朱敬則五等論商鞅欺故友李斯囚舊交秋草日上堦故人不過門秋草日上堦李白舊不足倚桞宗元六逆論符氏進王猛而殺樊世乃興胡亥任趙髙而族李斯乃亡舊不足倚盲宰相裴垍作相器局峻整人不敢干以私嘗有故人自逺詣垍資給優厚從容欵狎其人乗間求京兆判司垍曰公才不稱此官不敢以人之私傷朝廷至公他日有盲宰相於公者得之垍則必不可孔平仲續世說不見故人十年餘不道故人無素書願逢顔色闗塞逺豈意出守江城居杜甫寄岑嘉州恤孤四白託孤可以託六尺之孤託妻子後漢朱暉同郡張堪素有名稱常於太學見暉重之接以友道把暉臂曰欲以妻子相託堪卒妻子貧暉候視賑贍之崔琰魏崔琰友人公孫方宋階早死琰撫其孤遺恩若己子兄子毛玠居位布衣蔬食撫兄孤子甚篤厚凌統吳凌統為將軍有功卒二子㓜孫權收飬宫中教讀書十日一乗鞍馬㑹羣臣常召統子出示之曰吾家虎子山公撫嵇紹嵇康臨刑謂子紹曰山公尚在汝不孤矣分屋居張裔字君嗣與楊恭善及恭早死孤遺未成人裔迎與分屋居事恭母恭子長為娶置産業使立門戶經恤故舊賑贍衰宗行義至甚也分食邑魏曺真子丹少與宗人曺尊鄉人朱讃並事太祖二人早亡真乞分所食邑封遵六子詔襃美之分邑封二人子為闗内侯食邑百戶字人之孤王成匿李燮恤孤上恤孤則民不倍飬㓜少存諸孤教撫孤姪王珪教撫孤姪雖其子不過也撫安薛收卒秦王與其從兄子元敬書曰且家素貧而子㓜善撫安之撫㓜弟孤兄子宇文士及撫㓜弟孤兄子以友睦稱栁仲郢李徳裕貶死家無禄不自振及領鹽鐡遂取其兄子從質為推官知蘇州院宰相令狐綯持不可乃移書開諭綯綯從之親交無後者為嫁遣孤女韓愈凡内外親若交友無後者為嫁遣孤女而恤其家撫其孤至㛰嫁成立錢徽與薛正倫魏𢎞簡善二人前死徽撫其孤至㛰嫁成立拯孤恤窮李邕孔璋曰邕所能者拯孤恤窮嫁其孤女鄧景山與劉晏善其後家寒窶晏屢經紀之嫁其孤女二女為託韓充李元為河陽節度使署牙將未㡬𢎞領宣武召主親兵元曰我知君舊矣吾兒不才無足累君者二女方㓜以為託遂辭去元沒為嫁二女周其家視恤其孤孟簡尚節義與之交者雖歿視恤其家不少衰經贍其家蕭存韓愈少為存所知自袁州還過存廬山故居而諸子皆死唯一女在為經贍其家撫其二子李晟嵐州刺史譚元澄嘗有徳於晟後貶死晟既貴直其枉晟撫其二子為成就之願以桂兒為念鄭畋父亞任桂管觀察使畋生於桂州小字桂兒時西門思恭為監軍有詔徴赴閤亞送於郊自以衰年以畋託之曰他日願以桂兒為念言訖泫然流涕思恭誌之及為神䇿中尉亞已卒思恭使人召畋待之如甥姪因選師友教𨗳畋後官至將相瑣言嫁故人孤女數十人嚴挺之重交游許與生死不易嫁故人孤女數十人當時重之戲謔五狎侮白善戲謔兮不為虐兮謔浪笑敖中心是悼伊其相謔惟士與女戲譚玩人䘮徳狎侮君子㒺以盡其心前言戲之爾謂割雞焉用牛刀之言好弄傳夷吾弱不好弄戲也暴謔文選鄱陽暴謔中酒而作何晏曰鄱陽惡戲難與為曺不常矜莊鄭𤣥詩箋云君子之徳有張有弛不常矜莊故有戲謔之日子雲之解客嘲孟堅之荅賓戲孝先晝寢弟子興便腹之嘲言偃絃歌仲尼發割雞之戲鍾馬有利錐之戲士龍有白雉之嘲陸雲與荀鶴語曰既開青雲覩白雉何不張爾弓挟爾天荀曰本謂雲龍騤騤乃是山鹿野䴢獸弱弩彊是以發遲天子無戲言周公謂成王云不敢戲言成王沒齒受侮之旁狎禮不旁狎旁彊妄也狎侮玩也戲色禮曰不戲色靳之宋萬歸宋宋公靳之曰始吾敬子今子魯囚也吾不敬子矣萬病之遂弑宋公注戲而相狎曰靳也狗門晏子短小使於楚楚人為小門延晏子晏子對曰使狗國者從狗門而入臣使楚不當從狗門而入縛盜又縛盜置晏子之前楚王謂晏子曰齊國人也善盜乎晏子曰臣聞橘生江南北則為枳棘葉徒似而味不同水土異也此人生於齊不為盜入楚為盜得無水土為盜耶諸葛子瑜吳諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪即請筆益兩字曰之驢人服其敏權即以驢賜恪白頭翁吳諸葛恪侍權坐有白頭烏集殿前恪曰白頭翁張昭年老疑恪戱之因曰恪欺陛下未有鳥名白頭翁請覔白頭母恪曰鳥有鸎母請覔鸎父相弄謔如此有司俱不罪張昭有悟於聴聞好狎不好狎納侮無啓寵納侮書行前後晉孫綽興公好譏調與習鑿齒共行綽在前顧謂習曰沙之汰之瓦礫在後習曰簸之揚之糠粃在前潞涿君劉章有從事張裕饒鬚先主嘲之曰昔涿縣多毛姓東南西北諸毛繞涿郡裕曰昔有作上黨潞長遷涿郡令去官還家人與書欲署潞則失涿署涿則失潞乃署潞涿君先主無鬚故有此答以先祖相譏賈充嘗宴朝士庾純後至謂曰君行常在人前今何在後純曰且有小市井事不了是以來後純之先曾為伍伯者充之先為市魁者故此相譏侮予或敢侮予孔名長意短口正心邪蘇世長帝大笑嘲曰何名長而意之短口正而心之邪世長曰名長意短誠如聖㫖口正心邪不敢奉詔問宦立所来張𤣥素始𤣥素與孫伏伽在隋皆為令史太宗嘗問𤣥素宦立所来深自羞汗禇遂良見帝曰君子不失言於人明主不失言於戱故言則史書之禮成之樂歌之居上能禮其臣乃能盡力以奉其上近世宋武帝侮靳朝臣攻其門戶至耻懼狼狽前史以為非陛下昨問𤣥素在隋任何官對曰縣尉又問未為尉時曰流外又問何曺司𤣥素出不能徒歩顔若死灰精爽頓盡見者咸共驚怪面似髙麗楊再思張易之兄同休請公卿宴其寺酒酣戲曰公面似髙麗再思欣然翦縠綴巾上反披紫袍為髙麗舞舉動合節滿坐鄙笑也仰天相地姜師度喜渠漕是時太史令傅孝忠以知星顯時為語曰孝忠知仰天師度知相地嘲所嗜也好諧易陸長原好諧易無威儀㸃頭更擬蘇晉傳裴光廷知尚書有過官被却者就籍以朱㸃頭而已晉因榜選院曰門下㸃頭者更擬光廷以為侮已出晉汝州侵侮韓偓侍宴朱全忠崔𦙍臨陛宣事坐者皆去席偓不動曰侍宴無輙立二公將以我為知禮全忠怒偓薄已悻然出有譛偓喜侵侮有位𦙍亦與偓貳侮笑自如許敬宗改中書舎人文徳皇后䘮羣臣衰服率更令歐陽詢醜異敬宗侮笑自如貶洪州司馬李程不脩儀檢滑稽好戲舊史李程不脩儀檢滑稽好戲而居師長之地物議輕之頻伸諧戲劉晏所任者雖數千里外奉教令如目前頻伸諧戱不敢隠詔學士嘲之武平一宴兩儀殿帝命后兄光禄少卿嬰監酒嬰滑稽敏給詔學士嘲之嬰能抗數人譽兒癖王勃傳其後助劼又以文顯福畤少子勸亦有文福畤嘗詫韓思彦思彦戲曰武子有馬癖君有譽兒癖王家癖何多邪死而後語五代馬允孫周廣順中卒允孫卒後其家婢有為允孫語者初崔協為明宗相在位無所發明既死而有降語其家允孫又然時人嘲曰生不能言死而後語錦衾爛兮五代史康福世本夷狄貴沙陀故常自言沙陁種福嘗有疾卧閣中寮佐入問疾見其錦衾相頋竊戲曰錦衾爛兮福聞之怒曰我沙陀種也安得謂我為奚聞者笑之兎園册劉岳傳宰相馮道世本田家狀貎質野朝士多笑其陋道且入朝兵部侍郎任賛與岳在其後道行數反顧問何為岳曰遺下乃兎園册爾兎園冊者鄉校里儒教田夫牧子之所誦故岳舉以誚道也世修降表李昊初事王衍為翰林學士衍之亡也昊草降表至孟昶又草焉蜀人夜表其門曰世修降表李家當時傳以為笑謂麗景門為例竟来俊臣詔於麗景門别置獄敕俊臣等顓按事百不一貸王𢎞義戱謂麗景門為例竟謂入者例皆盡也胡頭應祝楊元琰敬暉等為武三思所搆元琰知禍未已詭計請祝髪事浮屠戱曰胡頭應祝以多髭似胡云非所望於蕭𫝊蕭至忠後依太平復當國嘗出主第遇宋璟璟戱曰非所望於蕭傅至忠曰善乎宋生之言然不能自返也火迫鄼侯朱泚初源休與姚令言勸泚圍奉天二人自比蕭何休顧令言曰成秦之業無輩我者我視蕭何子當曺參可矣即收圖籍貯府庫效何者人皆笑為火迫鄼侯宰相擔子入門五代盧程同平章事是時朝廷新造百度未備程始拜命之日肩輿導從喧呼道中莊宗聞其聲以問左右對曰宰相擔子入門莊宗登樓視之笑曰所謂似是而非者也坐有姓閻人同上史洪肇他日㑹飲王章酒酣為手勢令洪肇不能為客省使閻晉卿坐次洪肇屢教之蘇逢吉戱曰坐有姓閻人何憂罰爵洪肇妻閻氏酒家倡以為譏已大怒確確無餘事曺確揚收徐商路岩同秉政外有嘲之者確確無餘事金錢揔被收商人都不管貨賂㡬時休南部新書裴筠㛰蕭楚女言定未㡬擢進士第羅隠嘲之云細㸔月輪還有意信知青桂近嫦娥詩話目連變摭言張祐柘枝詩云鴛鴦細帶抛何處孔雀羅襂付阿誰白樂天呼為問頭詩答曰公之長恨詞云上窮碧落下黄泉兩處茫茫俱不見此即目連訪母故也白着租庸使元載重斂州縣視其簿録其産而中分之甚者十八九時人謂之白着言其厚斂無名其所着者皆公然明白無嫌避渤海髙雲有白着歌云上元官吏務剥削江淮之民多白着詩話飯甕熱發張林受眷於崔相昭緯或謁崔公曰何以久不見林曰飯甕子熱發崔訝飯甕不康之語林曰數日来水米不入非不康邪北夢𤨏言既懐厚朴之才紀異録盧端揆質文筆俊健性好翫又為莊宗管記㑹毉學博士所司請藁公立草之筆不暫輟末句云既懐厚朴之才宜典從容之職莊宗覽之久為啓齒勿使瘡痍之後復作瘡痍同上韋莊為西川管記時王建聚兵甚衆供費尤多㑹有一縣宰託茲箕歛為部民所訟建以用兵岐隴徵督無常乃復用之公乃為建草牒詞云正當彫瘵之秋好安彫瘵勿使瘡痍之後復作瘡痍由是因之為口實錯認顔摽作魯公詩話顔摽咸通中鄭薰下狀元及第先是徐冦作亂薰意在激勸勲烈意摽乃魯公之後故置之巍科既而詢其廟院摽曰寒素京國無廟院薰始大悟有無名子嘲曰主司頭腦太冬烘錯認顔摽作魯公紫袍二主事楊國忠明年大選侍郎韋見素張倚與本曺郎趍走堂下抱案牒國忠顧女弟曰紫袍二主事何如皆大噱尉入䑓多而縣辦否竇懐正時政令多門赤尉由墨制授御史者衆或戲曰尉入臺多而縣辦否對曰辦於異日問其故答曰佳吏在僥倖去故辦聞者皆笑與揔管戲五代郭彦威莊宗滅梁彦威自陕来朝莊宗置酒故梁崇元殿彦威與梁將段凝袁象先等皆在莊宗酒酣指彦威等舉酒屬明宗曰此皆前日之勍敵今侍吾飲虢卿功也彦威等伏地請死莊宗勞之曰與揔管戲爾卿無異也諧噱蘇世長歴天策府軍諮祭酒秦府開文學舘引為學士與房𤣥齡等十八人皆蒙圖畵褚亮賛之曰軍諮諧噱超然辨悟舊史豺咬殺魚婁師徳好諧謔則天朝大禁屠殺師徳因使至陕庖人進肉師徳曰何為有此庖人曰豺咬殺羊師徳曰豺大解事又進鱠復問有此庖人曰豺咬殺魚師徳大叱之曰智短漢何不道是獺祭不食御史䑓記侮玩之目顔抗性詼諧栁渾李泌與之厚自謂知己秉樞要當得達官乆之遷著作佐郎抗不樂求歸於吳班列郡官皆有侮玩之目皆惡嫉之泌卒抗不哭而有調笑之言為憲司劾貶饒州司戶孔平仲續世說笑六白爰笑爰語載笑載言咥其笑矣巧笑倩兮囅然而咍筦爾而笑夫子何哂掩口而笑笑不至矧父母有疾矧齒本也謔浪笑敖一笑千金樂然後笑人不厭其笑公叔文子胡盧宜笑既含睇兮注宜笑齒白也楚詞先笑而後號咷頭沒杯案魏太祖與人譚論戲㺯盡無隐諱及歡恱大笑至於頭沒杯案中餚膳霑汚於巾幘也笑疾陸機見張華華令雲来機曰雲有笑疾及雲至見張華華以錦嚢盛鬚雲見大笑不止又著衰絰上船見水中影因大笑落水救之免死必笑傳曰溺人必笑哂之夫子哂之言笑晏晏言笑晏晏詩啞啞笑言啞啞易嘻嘻婦子嘻嘻終吝易孔桞澤少言笑裴炎寡言笑大笑為樂號莊王鳳遇官屬尤嫚使奴蒙虎皮怖其叅軍陸英俊㡬死因大笑為樂笑殺天下鄭綮同平章事至是省吏走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我吏言不妄俄聞制詔下歎曰萬一然笑殺天下人笑中刀李義府貎足恭與人言嬉怡微笑而隂賊褊忌著于心凡忤意者皆中傷之時號義府笑中刀笑者不可測也魚朝恩㑹釋菜執易升坐百官咸在言鼎有覆餗象以侵宰相王縉怒元載怡然朝恩曰怒者常情笑者不可測載銜之引郭予儀自誚王松晉出帝北遷蕭翰立許王從益於京師以松為左丞相漢髙祖入洛先遣人馳詔東京百官嘗受偽命者皆焚之使勿自疑由是御史䑓悉斂百官偽勅焚之松以手指其胷引郭子儀自誚以語人曰此乃二十四考中書令也聞者笑之笑而不怒五代李茂貞居岐常以地狭賦薄下令𣙜油因禁城門無内松薪以其可為炬也有優者誚之曰臣請并禁月明茂貞笑而不怒持頥而笑桞宗元陪崔使君遊南池序左右皆大笑五代鄭珏莊宗入汴末帝惶恐不知所為珏曰臣有一策願得傳國璽馳入唐軍以緩其行而待救兵之至末帝曰顧卿之行能了事否珏俛首徐思曰但恐不易了於是左右皆大笑叨入相之資同上李鏻初李愚自太常卿作相而盧文紀代之及文紀作相鏻乃求為太常卿及拜命中謝曰臣叨入相之資朝士傳以為笑孤笑發孤笑於羣憂韓愈别知賦衆夫指之笑謂我知不明此日足可惜諧笑性情漸浩浩諧笑方云云笑言溢口前隨杜尹拜表廻笑言溢口何歡咍垂手笑瀧吏垂手笑官何問之愚粲然忽自哂授以鍊藥說李白古風自笑何區區贈張相鎬私唁且笑劉禹錫連州壁記嬉怡微笑李義府本傳笑而不答李守素論人物始言江左山東尚酬對至北則笑而不答虞世南歎曰肉譜足可畏喜七白式宴以喜詩無喜色子文三仕為令尹無喜色喜形於色睢盱小人喜恱之貎楚殺子玉晉侯喜可知也受官喜毛義家貧飬老親張奉慕其名候之㑹府檄至以義守令義奉檄入喜見顔色奉心賤之不知其為親也孔子攝相史孔子由大司冦攝行相事有喜色門人怪之孔子曰非樂其貴然喜下人得吾也一則以喜謂孝子見親年老而猶克壯也喜生於風則哀矜而勿喜喜見顔間太宗皇后長孫氏用無忌為尚書僕射后宻諭令牢讓帝不獲已乃聽后喜見顔間王珪僕妾亦不見喜愠喜甚與家人樂飲劉元濟召為修文館學士既久斥喜甚與家人樂飲數日卒喜津津出眉宇間李林甫對親欣欣郭震自朝還對親欣欣退就室儼如也陸贄狩山南地道險澁與從官相失夜召䞇不得帝驚且泣詔軍中得贄者賞千金久之上謁帝喜見顔間自太子以下皆賀喜於􅅄善李栖筠楊家三喜楊敬之為國子祭酒俄遷太常少卿是日二子戎戴登科時號楊家三喜喜氣排寒冬韓愈贈張籍皆洒然喜隠太子傳帝謂秦王曰爾還洛陽行䑓自陕以東悉王之建成等因宻使人說帝言秦王左右皆山東人聞還洛皆洒然喜觀其意不復来矣信容得色舞于眉端劉禹錫吕温集序得一善輒時衡擊節信容得色舞于眉端神躍色揚司空圖評詩書怒八白將子無怒慿怒逢彼之怒君子如怒王赫斯怒愠見子路無愠色子文三已之無愠色忿思難君子九思一朝之忿㤀其身顔回不遷怒忿懥懥怒忿疾于頑宜無悔怒懲忿窒慾易損卦言可損之美莫大於忿慾内奰于中國奰音被不辭而怒曰奰衆怒不可犯難犯傳衆怒如水火􅏌然今執事􅏌然授兵登陴將以誰罪注􅏌勁怒貎含怒不怒而威神有怒黽俛同心不宜有怒譴怒敬天之怒逢天憚怒憚厚也武怒奮其武怒室於怒市於色忿室家作色於市人色勃髮衝冠藺相如怒髪上衝冠奮髯抵几朱博怒齊吏忿擊伏屍百萬流血千里天子之怒也秦王謂唐睢睢云王聞布衣之怒乎王曰免冠徒跣以顙投地睢曰不然必伏屍二人血流五歩怒生於兩傳王奮厥武如震如怒闞如虓虎詩孔不塞衆人之怒桞宗元貶永州司馬貽蕭俛曰聖朝寛大貶黜甚薄不塞衆人之怒怪怒媢疾又曰超取顯羙欲免世之求進者怪怒媢疾可得乎怒折匕筯廣徳公主與帝食怒折匕筯帝曰此可為士人妻乎更許于琮尚主市怒劉武周太宗王仁恭令揔虞候直閣下宣言于衆曰今嵗飢死者骨相枕於野府君閉倉不卹豈憂百姓意乎以市怒其軍皆憤怨恚見顔間楊漢公鄭裔綽曰漢公既以墨敗陛下容可舉劇部𢎞貪人帝恚見顔間翌日斥裔綽為商州刺史天怒吳武陵遺二部侍郎孟簡書曰古稱一世三十年子厚之斥十二年殆半世矣霆砰電射天怒也不能終朝安有聖人在上畢世而怒人臣耶恚憤張介然守陳留初有詔搆賊首而暴誅慶宗狀禄山入陳留見詔書拊膺大哭曰我何罪吾子何罪乃殺之即大恚憤殺陳留降者萬人以逞血流成川斬介然於軍門左右辟易陳京擢左補闕帝以盧杞為饒州刺史京與趙需裴佶宇文炫盧景亮張薦共劾杞輔政要位大臣踰時月不得對百官懔懔常若兵在頸陛下復用之姦賊唾掌復興帝不聴京等争尤確帝大怒左右辟易諫者稍引却京正色曰需等母遽退極道不可以死請杞遂廢相在怒時魏元忠見相門怒則以力而相并唐藩鎮表詩楊收王鐸皆薛逢同年進士收作相後逢有詩云湏知金印朝天客同是沙隄避路人威鳳偶時皆瑞聖應龍無水謾通神收聞大銜之王鐸拜相逢又有詩云昨日鴻毛萬鈞重今朝山嶽一毛輕鐸又怨之舊史􅅂韈於硯鄭畋遷門下侍郎髙駢請如西戎以公主下嫁畋盧攜入議之畋以國威靈不可相䙝嫚攜怒拂衣去裾韈於硯因抵之帝以大臣争口語俱罷攘袂張嘉貞與張說不相能嘉貞弟嘉祐贓汙事發說勸嘉貞素服待罪不得入謁出為幽州刺史說遂代為中書令嘉貞惋恨謂人曰中書令年二員何相廹之甚也明年移益州都督就宴中書省與相㑹嘉貞恨說因攘袂勃罵源乾曜等共和續世說拜揖九取儀禮門事用白九拜拜有九拜儀周禮揖禮肅拜手容恭禮吉拜凶拜非三年䘮以吉拜凡男拜尚左手左陽女尚右手右隂八十者拜君命一坐再至曲禮再至至地九十者君使人受不使拜也婦人吉事雖有君賜則肅拜低頭而已凶事則手拜手至地也大夫稽首再拜君答拜之禮無不答加勞賜一級無下拜傳王使宰孔賜齊桓胙將拜孔曰且有後命天子以伯舅耋老加勞賜一級無下拜拜下禮也鍾離意受賜不拜頒賜贓物贈子以拜王丹謂陳遵介者不拜品秩殊等拜揖異儀吉凶異道拜揖殊宜位既殊於品列拜則異其節文不拜揖客亢禮漢汲黯字長孺見將軍以亢禮人或說黯不可以不拜之曰夫以大將軍有揖客反不重邪又汲黯見田蚡未嘗拜揖揖三公後漢趙壹元叔為上計吏到京師是時司徒素逢受計吏數百皆拜伏庭中莫能仰視壹獨長揖而已逢望異之命讓之曰小郡吏揖三公何也責稽首傳齊人責稽首注往年齊侯為公稽首公不答故也揖丞相漢書郅都為中尉丞相條矦至倨貴而都揖丞相也頽乎頎乎禮曰拜而後稽顙頺乎其順也稽顙而後拜頎乎其至也注此周之䘮拜先觸地無容哀之至也三年之䘮吾從其至者注重者尚哀戚自朞如殷可也大夫之臣不稽首以避君也不面拜君有賜不面拜為君之答已也揖官屬漢盖寛饒次公左遷衞司馬先是左部見衞尉拜謁寛饒視事按舊令遂揖官屬已下衛者候司馬不拜自此正焉雅拜何武舉方正一人舉者召見行禮盤辟雅拜有司劾所舉不當率軍禮以長揖西征賦說亞夫教拜朱博子元為琅邪守門下掾貢遂耆老大儒教授數百人拜起舒遲博出教主簿曰貢遂書生不習吏禮主簿且教拜起閑習乃止舒遲見上注參軍晉孫楚字子荆為著作郎參石苞驃騎將軍事負其才氣頗侮異於苞初至長揖曰天子命我參卿事因此嫌隙遂搆苞奏楚與吳謗毁朝政楚亦抗表自理一拜一起吳主謂蜀伊籍曰勞事無道君對曰一拜一起未足為勞特揖孤卿特揖旅揖大夫旁三揖士禮記揖人必違其位環拜以鐘鼔為節環謂短拜三肅使者卻至對楚子以軍事不敢拜故三肅使者拜細吾子捨其大而拜其細尚能拜起黄覇不去老聾吏曰尚能拜起雖齊桓受胙恐貽天子之羞而亞夫建營實禀將軍之令耋老加恩齊侯辭一級之賜介胄難犯卻生成三肅之儀馬援受梁松拜援歸梁松候之拜床下援不荅曰我松父友雖貴不可失叙松恨之常林不止晉宣王晉宣王以常林鄉邑之耆徳毎為之拜或謂曰司馬公貴至公宜止之林曰司馬公自欲敦長㓜貴賤非吾所畏拜非吾所制言者踧踖而退王祥不拜晉王具職官三公門注責桑梓拜陸機為鄒平令性矜傲責鄉里謝鯤等拜或曰禮敬年爵以徳為先令鯤拜勢懼傷風俗機不以為慙孔南面拜公卿安樂公主翌日大㑹群臣大極殿主被翠服出嚮天子再拜南靣拜公卿公卿皆伏地稽首使髙麗不拜李義琰使髙麗不拜義琛再使匍匐拜伏凡百官拜禮各有差文武官三品已下正一品東宫官拜三師四品已下拜三少自餘屬官於本司隔品者皆拜焉唐六典舒王元名髙祖之在大安宫太宗晨夕使尚宫問起居元名纔十嵗保媪言尚宫有品當拜元名曰此帝侍婢耳何拜為太宗壯之曰真吾弟也回紇皆南面拜董晉傳回紇恃有功見使者居因問市馬而唐歸我賄不足晉曰我非無馬而與爾為市為爾賜者不已多乎爾之馬嵗五至而邉有司數皮償貲天子不􅁯爾勞敕吏無得問諸戎以我之爾與也莫敢确衆皆南面拜不敢有言將卒皆拜董晉朱泚至河中李懐光反晉說之曰朱泚為臣而背其君茍得志於公敵賊有餘力若襲取之清宫以迎天子雖有大惡猶將掩焉如公則誰敢議懐光喜且泣又語其將卒皆拜人皆羅拜袁滋召為金吾衞大將軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜朝延英詔毋拜馬燧後病足不任謁九年十月自力朝延英詔毋拜矍然下拜顔真卿盧杞將出之辭曰先中丞傳首平原面流血吾不敢以衣拭親舌䑛之公不忍見容乎杞矍然下拜而銜恨切骨憚威拜城上馬燧李懐光反賊將徐廷光守長春宫城燧度長春不下則懐光固守乆攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧顧其心已屈徐曰我自朝廷米可西向受命廷光再拜即率衆降東南向再拜屈突通劉文静遣竇琮追及稠桑通知不免遂下馬東南向再拜號哭曰臣力屈兵敗不負陛下遂被禽送長安指膝郭子儀田承嗣傲狠不軌子儀甞遣使至魏承嗣西望拜指其膝謂使者曰兹膝不屈於人久矣今為公拜汙賊官羅拜甄濟廣平王平東都濟詣軍門上謁泣涕王為感動肅宗詔館之三司署使汙賊官羅拜以媿其心不喜拜揖王績性簡放不喜拜揖諷拜佯不曉薛廷珪累尚書左丞朱全忠兼四鎮廷珪以官告使至汴客將先見諷其拜廷珪佯不曉曰吾何徳敢受令公拜乎及見卒不肯加禮不堪趨拜李源帝自遣使者持詔書抱笏即賜源頓首授詔謂使者伏疾老耄不堪趨拜再拜而辭盧奕安禄山陷東都被執將殺之奕臨刑西向再拜而辭拜中人嚴綬為尚書右僕射帝使中人賜含桃綬見拜之為御史劾奏慙懼待罪使吳越獨揖五代龍敏歴晉為太常卿使于呉越是時使吳越者見吳越王皆下拜敏獨揖之還遷工部侍郎馬上横鞭揖同上尹揮從廢帝入洛陽而晉髙祖来朝與揮相遇于道揮時猶為嚴衞指揮使恃先降功不為髙祖禮馬上横鞭揖之髙祖怒白廢帝揮不可與名藩乃以為應州節度使拜多而乏同上吕琦廢帝怒曰朕一女尚㓜欲棄之外域金帛所以飬士而捍國也又輸以資敵可乎崧等惶恐拜謝無數琦足力不能拜而先止帝曰吕琦強項肯以人主視我耶琦曰臣息素病羸拜多而乏容臣少長揖李愚衡王友諒末帝兄也梁大臣李振等皆拜之獨愚長揖末帝以責愚曰衡王朕拜之卿獨揖可乎愚曰陛下以家人禮見之則拜宜臣於王無所私豈宜妄有所屈並五代史徧拜金吾將軍張萬福聞陽城率拾遺上䟽論裴延齡姦佞遂徧拜陽與仲舒等曰諫議能如此言事天下安得不太平儀矩梗野拜忘舞蹈韓思彦乆去朝儀矩梗野拜􅁯舞蹈謁見不拜盧鴻至東都謁見不拜宰相遣通事舎人問狀荅曰禮者忠信所薄臣敢以忠信見帝觀行於一揖之内劉廼書不名不拜武攸緒敇有司即兩儀殿設位行問道禮詔見不名不拜攸緒至更冠帯仗入通事舎人賛就位攸緒趨就常班再拜帝愕然禮不及行見王無拜西域大食開元中始使使者来辭曰國人止拜天見王無拜有司切責乃拜不拜宰相姜晦開元初擢御史中丞先是不拜宰相御命使四方者廷中揖見後稍屈下至晦獨徇舊體謂御史曰不如故事具奏譴公等由是䑓儀復振行歩十白禮曰凡升階聚足連歩以上謂足不相過上於東階則先右足上於西階則先左足堂上接武跡相近也堂下布武毎足各成跡規行矩歩行不舉足車輪曳踵凡執玉器執輕如不克行不舉足車輪曳踵注主君也如輪行不離地恭慎周旋中規折旋中矩謂行歩君與尸行接武踵跡也大夫繼武跡相及也士中武跡相離也凡行容愓愓愓愓行貎足容重欲遲行歩則有環珮之聲行中節也千里之行始於足下學歩夀陵餘子學歩於邯鄲失其故歩匍匐而反躧歩舎車而徒易賁其趾舎車而徒義不乗也賁飾也肆夏采齊周禮行以肆夏趨以采齊樂儀也歴階而升凡歴階不過二等與先生並行闕黨童子父黨隨行兄黨鴈行朋友不相踰翔歩徒行歩目國語足以歩目吾不徒行玉趾憚行詩豈敢憚行畏不能趨孔進退甚詳董晉天子㑹朝公卿在廷侍中賛羣臣賀竇參攝中書令當傳詔疾作公卿相顧未有詔晉從容進曰臣請代參事南面宣致詔詞進退甚詳走及奔馬髙開道少趫勇走及奔馬後為盜史敬奉走逐奔馬跣足履棘五代王彦章能跣足履棘行百歩不能遽歩婁師徳嘗與李昭徳偕行師徳素豐碩不能遽歩昭徳遲之恚曰為田舎子所留師徳笑曰吾不田舎復在何人低首拱手叚秀實賛太尉為人姁姁嘗低首拱手言氣卑弱未嘗以色待物急歩疾呼韓文府中不聞急歩疾呼行歩欹危杜甫詩稠花亂葉裹江濱行歩欹危實怕春追駿歩而遐遊栁宗元賦惟聰明為可考兮追駿歩而遐遊從容歩進令狐峘貶吉州别駕稍遷刺史齊映為江西觀察使按部及州峘輕映後出先至宰相今雖屬刺史自挟所以過映者至迎謁頗怏怏以語其妻妻曰君自視何如人以白頭走小生前君不以此見映雖黜死我無憾映至峘入謁從容歩進不抹首屬戎器映以為恨去花殘歩􅓏遲杜甫荅鄭十七詩雅幅巾琴壺以隨劉禹錫别集趨十一白趨進翼如帷箔之外不趨堂上不趨執玉不趨趨蹌詩巧趨蹌兮疾趨則欲發而手足無移發起履也無移手足正也齊如流弁行剡剡而起屨疾趨之貎徐趨沒階趨進翼如也遲緩後漢孫堪常為縣令謁府趨歩遲緩門亭長譴堪便解印而去趨以采齊見上注周走以呼棄疾使人楚國趨登晉靈公飲趙盾酒將殺之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下二節禮君召以三節一節以趨二節以走鯉趨論語孔帝問冠冕制董晉帝問冠冕制對曰古者服冠冕以佩玉節歩堂上接武堂下布武君前趨進而已今或奔走以致顛仆趨者無善迹朱敬則諌曰急趨者無善迹沒階趨劉崇魯身為朱玫史官作勸進表在太原府使西川見田令孜沒階趨廢制度自崇魯始趨馳佐郡浙江西病閒絶趨馳李白留别從兄詩豈憶當殿羣臣趨杜甫杜鵑行冉冉自趨競杜詩龍尾道李聼為太子太傅招所善載酒集李宗閔閣至徳裕則喻御史凡罷朝繇龍尾道趨出無輒至閣者趨降階伏唐持太和中為渭南尉試京兆府進士時尹杜悰欲以親故托之持輒趨降階伏悰語塞乃止臣子之禮過位必趨韋湊上言灑埽十二白禮凡為長者糞之禮必加帚於箕上取其兩手捧箕恭也謂初執往時也以袂拘而退其塵不及長者謂埽時也以袂擁帚之前令塵不揚以箕自向而扱之不向尊者亦示之恭也灑埽進退則可矣子游曰子夏之門人小子當灑埽進退則可矣抑末也本之則無如之何本者謂禮也糞除先人之敝廬張趯謂子大叔傳蠲帚不灑埽詩子有庭内不灑不埽埽地而祭掃門魏勃埽丞相曺參門埽室陳蕃字仲舉所居一室不埽人問曰孺子何不埽除蕃曰大丈夫當埽除天下安能事一室乎擁篲迎門執帚所過糞除第五倫字伯魚不逹客河東變姓名稱王伯齊載鹽往来太原上黨所過輒為糞除陌上人號為道士備灑埽納女於大夫禮孔汛埽庭唐房𤣥齡帝幸芙蓉園觀風俗𤣥齡敕子弟汛埽庭唐曰乗輿且臨幸有頃帝果幸其第敝帚栁宗元乞巧文旁羅萬金不鬻敝帚縛帚洛陽要紀王維居輞川宅宇既廣山林亦逺而雅好地不容浮塵日有十數埽飾者使兩童専掌縛帚而有不時給埽㕔屋如兄言即埽㕔屋候兄送毛仙翁灑埽縣中居引水經竹間招揚之罘並韓愈左埽右拂左埽因右拂旋收洛陽宫流夜郎李白呼兒埽中堂坐客論悲辛門有車馬客行埽崖去落葉席月開清尊秋浦宴焚香埽地而坐韋應物性髙潔所居焚香埽地而坐出語林埽花帚悵望送春盃殷勤埽花帚杜牧惜春詩急灑埽唐率更令張文成梟晨鳴於庭樹妻唾之文成曰急灑埽吾當改官言未畢賀客至出僉載埽職無憚五代馮道罷同州入朝拜司空唐制三公為加官無單拜者或三公正宰相便合參大政又云合策授又云祭祀時便令埽除道聞之曰司空埽職吾無所憚既而知非乃止白孔六帖卷二十四
