body:
  text: 卷六十公食大夫一白儀禮公食大夫禮使大夫戒各以其爵戒告也告使同珍獻者易以相親也上介出請賓出拜辱樽樽主於食不獻酬飲酒將飲俟于東房宰夫之饌于東方大夫納賓面而揖入賓入也三揖至階三讓讓先升公二等賓升大夫立東夾面西北上士舉鼎去鼏陳碑南宰夫自房授醯醢將公設之以其為饌本士設俎於豆南設黍稷六簋于俎西賓坐席末取粱即稻祭于醬湆間即就也不於豆豆宜加之擯者進負東塾而立無事謂君賓坐遂卷加席賓三飯以湆醬王饌也三飯而止君子食無求飽若不親食謂若有疾使大夫各以其爵朝開以侑幣致之無儐明日賓朝服以拜賜于朝不宿戒無阼席公不坐故凡炙無醬已有鹹和傳曰晉侯以魏絳為能以刑佐民反役與之禮食使佐新軍儀記曰禮賓受幣再拜稽首主人送幣亦然酬幣二白鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心焉飲之而有幣帛酬幣也已食而有幣帛侑幣也儀禮致享以酬幣亦如之也酬幣饗禮酬賓勸酒之幣束矢乘馬亦不足過士冠禮主人酬賓束帛儷皮傳曰虢公晉侯朝王王享酬命之宥宥加幣帛也介葛廬來朝禮之加宴好宴禮好貨致饗以酬幣致食以侑幣孔玉幣之制禮志神農之幣以赤伊耆以黑五星以方色先農之幣以青先蠶之幣以黑配坐皆如之它祀幣皆以白其長丈八尺此玉幣之制也賓贊進立於主人之右禮樂志冠禮賓贊進立於主人之右俱南面主人授幣賓受之退復位於主人授幣掌事者又以幣篚授贊冠者主人還阼階上北面拜送賓贊降自西階從者訝受幣賓揖出旅酬三白儀禮鄉飲酒禮賓北面坐取俎西之觶阼階上北面酬主人主人降席立于賓東初起旅酬者少長以齒終於沃盥者焉弟長而無遺也賓坐奠觶遂拜執觶興主人荅拜不祭立飲不拜卒觶不洗賓觶東南面授主人賓主飲卒觶因更酌以向主人將受之主人阼階上拜賓少退主人授觶賓拜送于主人之西旅酬同階禮殺也司正升相旅曰某子受酬受酬者降席於是介酬眾賓賓又次序相酬也某者眾賓之姓也同姓則以但仲別姓同則以字別之司正退立于序端東面避受酬者孔暉暉旅酬蘇晉三傑命宴序秩秩賓序暉暉旅酬相旅曰某子受酬受酬者降席自西方進北面立於介右司正退立於序端東面避受酬者介跪奠觶遂拜執觶興見禮樂志某子受酬同上司正曰某子受酬受酬者降席自西方立於某子之左北面某子跪尊觶遂拜執觶受酬者荅拜某子立飲卒觶適尊實之進西階上西南面授之受酬受觶受觶某子立於酬者之右揖復席次一人及堂下眾賓受酬亦如之卒受酬者以觶跪奠於篚興復階下位並鄉飲酒禮酬酢四白尚書曰盥以異同秉璋以酢詩獻酬交錯禮儀卒度東西為交邪行為錯君子有酒酌言酬之酬導飲也主人既卒酢爵又酬曰飲復酌進賓猶今俗勸飲也君子有酒酌言獻之或獻或酢洗爵奠斝郊特牲曰三獻之介君專席而酢焉此降尊以就卑也三獻卿大夫來聘主君享宋公宴介為賓賓為苟敬則徹重席而受酢酒也孔客不得已與酬酢陽城拜右諫議大夫方與二弟延賓客日夜劇飲客欲諫止者城揣知其情強飲客客辭即自引滿客不得已與酬酢或醉什席上城或先醉臥客懷中云百拜以為禮柳文序飲吾聞昔之飲酒者有揖遜酬酢百拜以為禮者作序歌非酬酢之煩李華質文論禮易知易從禮非酬酢禓襲之煩也醆斝序行獻酬有序褒衣危冠與與如也韓文上巳燕太學彈琴序草草具盤饌不持酒獻酬韓愈送劉師服詩公降酬酢進退齊平柳宗元道州先聖廟碑當歌當歌發酬酢韓文晚秋郾城聯句清言屢往復華樽始獻酬韋應物曾不濡翰酬酢文字韓愈祭馬仆射文施余盡沽酒客來相獻酬元稹陽城驛詩上壽五白為此春酒以介眉壽詩傳曰公宴於丘梧武伯為祝祝上壽酒也漢項莊入為壽進爵於尊者無疆之壽呂太后令酌兩卮鴆酒置前合齊王起帝亦起太后恐自起反卮反翻也丞相田蚡為壽武安侯坐皆避伏已而竇嬰為壽魏其侯也故人避席余皆半席典略曰馬超入漢中正旦弟和上壽於超超曰闔門百口一旦同命今二人相賀邪稱彼兕觥萬壽無疆詩淳于髡曰奉觴上壽一斗徑醉矣史記孔一縷一蹄為天子壽劉從諫張谷張沿陳楊庭皆有文時時言古今成敗以佐從諫谷納耶鄲人李嚴女為侍人號新聲當從諫潛圖窺脅新聲諫谷曰始天子以從諫為節度使非有戰野攻城之功直以父挈齊十二州還天子去就問末能奪其嗣耳自有睪潞未聞以一縷一蹄為天子壽生日稱賀韋綬建白帝誕日百官先詣光順門賀皇太后然後上皇帝千萬歲壽詔可久之宰相奏古無生日稱賀者綬議格願持玉卮上千萬壽三事大僚百司庶府願持玉卮上千萬壽杜牧請上壽表進金鏡錄張九齡為中書令時矢長節百僚上壽多獻珍異唯九齡進金鏡錄五卷言前古興廢之道上賞異之舊史彥博以憂國故耗思殫神我見其不逮再期矣恨不許少閑以究其壽溫彥博復文武二舞五代崔梲復文武二舞王公上壽天子舉爵事見舞門皇帝即御座侍中進當御座前北面跪奏稱侍中臣某言請延諸王公等升又侍中稱制曰可詣東西階至解劍席脫舄解劍升上公一人升階少東西面立於座後光祿卿進詣階間跪奏稱臣某言請賜群臣上壽侍中稱制曰可光祿卿退升詣酒尊所西面立上公詣酒尊所北面尚食酌酒一爵授上公上公受爵進前北面授殿中監殿中監受爵封至御前上公退北面跪稱某官臣某等稽首言元正首祚冬至云天正長至臣某等不勝大慶謹奏上千秋萬歲壽再拜在位者皆再拜立於席後侍中前承制退稱敬舉公等之觴在位者又再拜殿中監舉爵奉進皇帝酒在位者皆舞蹈三稱萬歲皇帝舉酒訖殿中監進受虛爵授尚食授爵於坫見朝會門但求椿壽永莫慮杞天崩杜甫白坐必安執爾顏禮記虛坐盡後食坐盡前鄉飲酒六十者坐五十者侍宋公宴魯叔孫昭子使昭子右坐使居己之右以相近不依賓主之位漢丞相田蚡召客飲坐其兄蓋侯東向自南向自以漢相尊不以私撓公又平恩侯許伯入第蓋寬饒從西階上東向坐自尊抗無所屈危坐後漢茅容季偉年四十餘耕於野時與等輩避雨樹下眾皆夷踞容獨危坐愈恭郭林宗異之因就其家容殺雞炊黍供母而與林宗蔬食因勸令學下坐為貴後漢庾乘郭林宗見而拔之遊學後能講論自以卑每處下坐人皆就下坐問之由是學中以下坐為貴儀禮士相見禮凡言非對也妥而後傳言妥安坐也傳言猶出言若問則對不必待後安坐也又曰凡侍坐於君子君子欠伸問日之蚤暮以食具告改居請退可也志倦則欠亂疲則伸夜侍坐問膳葷請退可也葷以正臥並儀禮殿門下坐失位漢王尊奏丞相匡衡會坐殿門下衡南向大鴻臚賞等西向衡更為賞等布席東向起立延賞坐私語眾會而設不正之席使下坐與相北詐為小惠亂朝廷班秩之位孔引與同坐裴寂唐公即位曰使我至此者公也拜尚書右僕射視朝必引與同坐引升御坐竇杭帝聽朝戌引升御坐施一榻堂上壓角而坐裴坦令狐綯當國薦為職方郎中知制誥而裴休持不可不能奪故事舍人初詣省視事丞相送之施一榻堂上壓角而坐坦見休重愧謝虜人爭坐李景略會河東節度使李說病以景略為太原少尹梅錄復入朝說大會虜人爭坐說不敢遏景略叱之梅錄識其聲驚拜曰非李豐州邪遂就坐幄坐安祿山帝登勤政樓幄坐之左置金雞大障前置持榻詔祿山坐褰其幄以示尊寵太子諫曰自古幄坐非人臣當得陛下寵祿山過甚必驕帝曰胡有異相我欲厭之晚坐洲沙厭晚坐嶺壁窮朝升韓愈送侯參謀默坐默坐念語笑癡如遇寒蠅同上送侯參謀坐疲都忘倦冠側懶復正東都遇春露坐辛夷花高最先開青天露坐始此回見上孤坐屢窮辰酬裴十六東西坐朝日出其東我常坐西邊夕日在其西我常坐東偏庭楸詩清坐韓文客至清坐相看竟不能設食袖手竦肩傍北牆坐石鼎聯句詩序升階七白記曰主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階師冕見及階子曰階也以其瞽故告之儀禮士相見禮君在堂升見無方辯君所在若若近東則升階下傳曰孫林父來聘公享之公登亦登禮臣下君一等公登亦登與敵禮也孔升自賓階韓愈送區冊序有區生者自南海挐舟而來升自賓階儀冠甚偉升階答拜裴均為右僕射上曰唱授按送印皆尚書郎為之文武四品五品郎官御史拜庭下御史中丞左右丞升階答拜時以為禮太重階有賓阼杜甫享太廟賦薛貽矩太祖自長蘆還軍哀帝遣貽矩來勞貽矩以臣禮見太祖揖之升階貽矩曰殿下功德及人三靈攻卜皇帝方行舜禹之事臣安敢違乃稱臣拜舞五代史見君八白儀禮士相見禮始見君贄至下謂下君所容彌蹙蹙促恭愨士大夫一也庶人見君不為容謂趨翔也進退走士大夫則奠贄再拜稽首君答一拜則庶人不答拜也凡燕見于君必辨辨正也君之南面若不得則正方不疑君君南面臣北面君或時不然當東若正西面不得君所處卻向之此謂特見圖事非立賓主之燕疑度之也退坐取屨隱辟而後屨君為之興臣不敢辭君若降送之則不降因辭而後出謂君食之飲之而退辭君興而不辭其降降於已大崇不敢當爾大夫則辭下亦降比及門三辭孔陛見裴度陛見陳所以入覲意餘見對見門始見軒陛元結自以始見軒陛恐言不悉情乃上時議贄幣九白尚書輯五瑞既月乃日班瑞于群后輯歛也三帛二生一死贄諸侯世於執纁公之孤執玄附庸之君執黃三帛也卿執羔大夫執鴈二生也士執雉一死也周禮大宗伯以玉作六瑞以等邦國王執鎮圭公桓土二王後及上公侯信圭伯躬圭子榖璧男蒲璧以六贄等諸臣孤執皮帛卿羔大夫鴈士雉天子鬯侯圭庶人鶩童子委鷙而退工商雞取守時而不失也記曰野外軍中無贄以纓拾矢可也拾射韝也禮用時物儀禮士相見禮贄冬雉夏腒左頭奉之贄所以至見至尊將厚意下大夫以鴈飾之布維之繫之索也再拜送贄受贄於庭記曰無辭不相接無禮不相見欲民無相褻禮執飾也飾羔鴈者以繪衣之以布而畫也傳曰哀姜至公使宗婦覿用幣御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告虔也襄仲辭玉秦伯使西乞術來聘襄仲辭玉曰重之以大器寡君敢辭玉大器圭瓚也不欲與秦通好諸侯朝康王曰敢執壤奠書傳曰男女同贄是無別也御孫言宗婦覿用幣也朝聘有圭享頫有璋臣為君使執璋請不用幣聘晉書文帝以聘有幣為煩請絕其禮詔從之皇甫謐歎曰亡國大夫不可以圖存而革歷代之制儀禮士相見禮賓捧幣入門左主人再拜受贄再拜送贄出不受贄於堂上人君禮然周禮公執桓圭繅三采三就繅木為中幹用韋衣而畫成之一匝為一就也覲禮以繅藉玉以韋衣之廣袤如玉大小為玄色上公桓圭繅藉九寸傳曰藻繂理琫藻所以藉玉稱贄士相見禮圭人辭曰聞吾子稱贄敢辭凡執贄者不趨容彌蹙不趨圭慎也執玉者則唯舒武舉前曳踵儀禮士見大夫終辭其贄於其人也一拜其辱賓退送再拜終其贄以不終答凡不答而受唯君於臣爾大夫於士不出迎入一拜正禮送再拜奠賓也賓出使擯者還其贄於門外曰某也使其還贄晉禮贄公辟中二千石二千石羔千石六百石鴈四百已下雉皮幣史顏異曰今王侯朝賀以蒼璧直數千而皮幣反四十萬本末不相稱天子不悅孔具幣邀之李密齊方士徐鴻客上書勸密因士氣趍江都挾帝以令天下密異其言具幣邀之已亡去禮幣結之羅紹威江東羅隱士為詩紹威禮幣結之通譜系持金幣賂當權者劉從諫知留後持金幣賂當權者厚幣劉悟犯法繫河南獄留守韋夏卿貸免李師古厚幣迎之執贄之道自天子達焉夫芬芳在上臭達于下而溫粹無擇有似乎聖人者鬯也故用於天子清越而瑕不自揜潔白而物莫能污內堅剛而外溫潤有似乎君子者玉也故用乎諸侯執之不鳴刑之不嗥似死義乳必能跪似知禮者羔也故卿執焉在人之上而有先後行列者鴈也故大夫執焉耿介而一志者雉也故工執焉視其所執而知其任是故食愈重而志愈卑位彌尊而道彌廣劉禹錫明贄論古者人君及臣重於相見之禮所以相尊敬故將有所見必執贄贄者至也信也君子於其所尊必執贄以相見明其厚心之至以表忠信不敢相褻也然天子無客禮亦有贄者明有事神祇之道故須贄以表心故巡狩至于山川有所告之用鬯酒盛以大璋中璋又典瑞云山搢大圭執鎮圭藻五采五就朝日明其所尊敬象臣之朝君也執鎮圭視安四方以表其功也凡公卿大夫執贄者皆謂始朝及初相見用之諸侯德厚故執玉以比德卿大夫以下德薄故用皮帛羔鴈之等射人職云王將射之時公卿朝見三公執璧卿執羔天子之三公所以執璧為臣之屈與子男同佐王論道理取圓足故以璧為贄不必飾以蒲榖諸侯賓射之時卿大夫士亦皆執贄見其君如天子卿大夫之禮君子所以執玉以比德者也通典白冬雉夏腒見上注曰某也願見無由達某也以命命某也見主人對曰云云請吾子之就家某將走見賓曰某不足辱請終賜見主人曰某不敢為儀聞吾子稱贄敢辭為太崇也迎於門外再拜賓答拜主人揖入門左主人再拜受贄賓再拜送贄出不受於堂人君禮然主人請見賓反見退主人送于門外再拜請見者賓崇禮來相接以矜莊歡心未交也士見大夫終辭其贄一拜其辱賓退送再拜出使擯者還贄上大夫相見以羔上大夫即卿也飾之以布羅之結于面面前也左頭麛執之羔取群而不黨或自麛孤執也蓋左執前足右執後足而已大夫相見雖贄異其儀如士大夫相食親戒速先就告及期復自召之迎賓門外拜至皆如饗侑幣束錦賓執梁與湆之西序端不敢食尊處也主人辭賓反之卷加席主人辭賓反之降幣一等主人從從辭降也受侑幣再拜稽首主人送幣王氏史漢書王氏史記所見多天子諸侯卿大夫之例雖不能備猶愈於倉等推士禮而致於天子之說孔敘齒選舉志初舉人既及第綴行通名詣主司第謝乃敘齒謝恩擯介十一白周禮司儀掌九儀賓客擯相之禮相入贊視以詔儀容辭令揖讓之節王命諸侯則擯擯進也王將命假祖廟立依前南向擯者進當命之使祭士適四方為介介大夫之介賜卿大夫士爵則擯擯之如命諸侯之儀擯士者膳其贄入膳人也大朝覲佐儐為承擯儀禮擯者請期宰告曰質明行事質正也擯者有司佐禮者在主人曰擯在客曰介大夫為擯士為紹擯擯出請事紹繼其位相承而出孔二君相見卿為上儐施敬本玄宗將封禪詔有司講求典儀舊制盥手洗爵者侍中主之詔祀天神太祝主之敬本上言曰今侍中位宰相非鬱人比祝者薦王人意於神非賊職也古二君相見卿為上儐況天人際哉劉悍為人有威儀善擯贊太祖初鎮宣武以為客將五代老十二白燭之武曰臣之壯也猶不如人今老矣無能為也石碏曰老夫耄矣無能為也子曰甚矣吾衰也久矣不知老之將至諺所謂老將至而耄及之者趙孟之謂乎盧蒲嫳曰余髮如此種種余奚能為子曰及其老也血氣既衰戒之在得得貪得也不以筋力為禮鶴髮鮐背垂白班白皤皤國老眉壽倪齒鮐背之叟皤皤然被黃髮者龐眉也少不如人方辭鄭國之使老而無子始為絳懸之師日落桑榆感末光而向盡年催蒲柳嗟弱質之先零顧悅安車駟馬雖申公之已老深計遠謀而楚丘之始壯楚丘先生荅孟嘗君馮唐白首為郎素髮垂領商洛四老黃耇鳩杖二首六身之歲五福一曰壽暮齒髮將種種心既諄諄易離卦九三日昃之離不鼓缶而歌則大耋之嗟凶耄期期頤播棄黎老旄荒旄亂也荒忽也斑白者不提挈君子耆老不徒行庶人耆老不徒食日暮塗遠主父偃曰吾日暮塗遠故倒行逆施之鍾鳴漏盡魏田豫為衛尉乞遜位司馬宣王以豫壯未聽豫報書曰年過七十而居位猶鍾鳴漏盡而夜行不止罪人也拜太中食卿祿而終何知中壽爾墓之木拱矣漢書仲秋祀老人星於國南郊月令享壽星於南郊顧悅與晉簡文帝同年而髮早白帝問之對曰松柏之姿經霜彌茂蒲柳之質望秋先落尚齒膂力既愆書減年從役劉平為全椒令百姓感化減年從役也降老辱在泥塗馮唐屈於郎署持更聲苦劉弘為荊州嘗夜起聞城上持更者歎聲甚苦呼省之兵年過六十羸疾無襦乃謫主者遂給韋袍複帽雞皮劉熙釋名云咽如雞皮凍梨又曰梨皮有班老人如之也濁鏡陸機百年歌曰殘目如濁鏡五十孔子五十而知天命五十無車者不越疆而弔人始衰也五十養於鄉五十異粻粻米糧也音張五十始衰五十杖於家五十不從力政五十而爵命為大夫五十艾服官政髮色蒼白如艾也可專事其官子曰加我數年五十以學易可以無大過矣五十以伯仲五十不致毀謂居喪也五十命為大夫五十不散送送喪不散麻始衰不備禮親沒不髦髦子飾也五十不成喪成備也不備禮漢高舉民年五十已上有脩行能率眾為善置為三老鄉一人擇鄉三老為縣三老令丞尉以相教勿繇戍六十孔子六十而耳順六十養於國六十宿肉六十歲制喪具六十非肉不飽六十杖於鄉六十不與戎服六十不親學不能修弟子禮六十耆指使指使使人也言不躬親於事也矍鑠哉是翁馬援年六十三請行師上愍其老欲不許援曰臣雖老尚能被甲上馬帝試援據鞍顧盼帝笑曰矍鑠哉是翁六十不毀謂居喪者七十孔子七十而縱心所欲不踰矩七十養於學七十貳膳二副也七十時制喪具七十非帛不暖七十杖於國七十不俟朝七十不與賓客之事七十老而傳傳家事在子孫呂望七十遇文王絳縣人老矣生四百四十五甲子矣師曠曰七十三年矣史趙曰亥有二首六身是其日數也七十唯衰麻在身飲酒食肉處於內謂居喪也七十唯縗麻為喪但服麻衣而已七十者不有大故不入朝若有大故而入君必與之揖讓謂至仕者懸車自稱曰老夫宗子雖七十無主婦八十八十常珍八十月制喪具八十非人不暖八十杖於朝八十月告存每月致膳八十齋喪之事不及八十者一子不從政八十九十曰耄耄昏忘也八十不俟朝不待朝事畢歸八十者五豆鄉飲酒禮漢武以束帛安車迎申公申公已八十餘史八十拜君命一坐再至略於禮也漢武令臣年八十復二筭復一口之筭不預兵革之賦八十九十者東行西行不敢過不敢過言道經之必見也犯罪宣詔八十已上非誣告殺傷人佗皆勿坐即驗平詔婦女非身犯法及男子八十已上七歲已下非坐不道詔所名抽他無得繫當驗者即驗問之景帝著令八十已上八歲已下及孕未乳當鞫繫者頌繫之頌讀為容容寬寬也九十趙孟年未五十而諄諄焉如八九十者九十者飲食不離寢膳飲從於游可也游出入也九十日修喪具九十雖得人亦不暖矣九十者天子欲有問焉則就其室以珍從九十日有秩秩常膳也九十者其家不從政九十者六豆鄉飲酒八十九十曰耄雖有罪不加刑焉八十九十欲言政者君就之可也濟南伏生年過九十失其本經口以傳授尚書九十有君命使人受不使拜也漢武令民年九十復甲卒不預甲卒之役百年百年曰期頤期要也頤養也不知衣服食味孝子要盡孝道禮曰天子巡狩問百年者就而見之就見老人舜曰耄期倦于勤百年曰期言已老耄倦於政禮之勤孔要當相與老裴寂願賜骸骨歸田里帝泣下曰未也要當相與老爾故鄉為刺史丘和已老以稷州其故鄉也令為刺史以自養瞑不能視蘇袞以弁故貶永州袞年老瞑不能視帝憫之聽還不可任以事張行成薦里人魏唐卿崔寶權馬龍駒張君等皆以學行聞太子召見以其老不可任以事厚賜遣之耆老王起以宿儒兼宰相秩前世所罕入辭帝勞曰宰相無內外公國耆老朕有闕當以聞百歲如風狂韓愈此日詩男兒不再壯百歲如風狂力疲氣耗韋澳戶部闕判使帝以問澳澳三不對帝曰任卿可乎曰臣老矣力疲氣耗煩劇非所任者帝默不樂昏耄張萬福為杜亞所忌召拜右金吾將軍及見帝驚曰亞乃言爾昏耄何耶年踰七十召對精明趙昌拜安南都護居十年足疾請還朝以兵部郎中裴泰代之入為國子祭酒未幾州將逐泰德宗召昌問狀時年踰七十召對精明帝奇之復拜安南都護耆年宿望劉憲遷太子詹事時玄宗在東宮雅意墳史憲起曰侍讀褚無量經明行修耆年宿望宜數召問以察其言太子順納屬文老不休李觀卒年二十九觀屬文不旁沿前人時謂與韓愈相上下及觀少天而愈後文益工議者以觀文未極愈老不休故卒擅名元老顏真卿李希烈陷汝州杞乃建遣真卿四方所信若往諭之可不勞師而定詔可公卿皆失色李勉以為失一元老貽朝廷羞密表固治治老賈敦實永淳初病篤子孫迎醫不肯見曰未聞良醫能治老也頭童齒豁進學解頭童齒豁竟死何裨韓文長樂老馮道當是時天下大亂戎夷交侵生民之命急於倒挂道方自號長樂老著書數百言陳己更事四姓及契丹所得皆勳官爵以為榮自謂孝於家忠於國為子為弟為人臣為司長為夫為婦有子有孫時開一卷時飲一杯食味別聲被色老安於當代老而自樂何樂如之蓋其自述如此五代史蒲柳易衰遲暮俄及劉禹錫請朝覲表頹老劉太真上楊相公啟形神低悴年鬢頹老若風之飄而旋李翱復性書人之生雖享百年若雷電之驚相激也若風之飄而旋也可知矣況千百人而無一及百年之年哉志氣逾勵韓文舉張正甫年齒雖高志氣逾勵荏苒垂老劉禹錫朝覲表蒼眉皓髯山立時行問大鈞賦形骸僅存心氣俱竭贊皇一品集讓官表堅悍不衰年幾八十堅悍不衰韓文升降如儀音吐鴻暢盧鈞年八十升降如儀音吐鴻暢舉朝咨歎以鈞耆碩長者顧不任職咎令狐綯為媢賢見其老頗貌敬之韓文足了垂百年杜甫老困撥書眠上致君時已晚懷古意空存上九老白樂天嘗與胡杲吉戈鄭據劉真盧真張渾狄兼漠盧貞燕集皆高年不仕者人慕之繪為九老圖雖老尚堪一行李靖吐谷渾寇邊帝謂侍臣曰靖能復起為帥乎靖往見房玄齡曰吾雖老尚堪一行帝喜以為西海道行軍大總管癡頑老子五代馮道律德光謂之曰爾是何等老子對曰無才無德癡頑老子德光喜以道為太傅進對詳洽王徽昭宗立見便殿進對詳洽帝顧宰相曰徽神氣尚彊可用嫌衰不用吳兢雖年老衰僂甚意猶願還史職李吉甫嫌其衰不用冠欹感髮禿語誤悲齒墯韓文枯松晚歲無改節於風霜老驥餘年期盡力於蹄足李白與楊右相書報主身已老入朝病見妨悠悠委薄俗鬱鬱回剛腸杜甫入衡州詩可為成德韓文胡珦碑年幾八十堅悍不衰事可傳載可為成德我齒落且盡君鬚白幾何年皆過半百來日且無多寄李大夫眉厖齒鯢柳宗元文眉厖齒鯢未嘗知此平生渭水曲誰識此老翁李白鞠歌行歌鍾樂未休榮去老還逼君子有所思行上鮐背鶴髮柳宗元賦白教將行於邦國悌先達於庠序幸逢尚齒之朝宜守燕毛之禮時若播棄老將疇依月令仲秋養衰老授几杖行粥糜飲食養耆老以致孝禮凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏深衣養老夏后氏燕衣而養老殷人縞衣而養老周人玄衣而養老乞言乞善言也武王食三老五更於太學天子袒而割牲執醬而饋執爵而酳所以教諸侯悌也釋奠於先老遂設三老五更群老之席位焉天子父事三老兄事五更白虎通執鸞以袒割奉觴豆於國叟文選訓恭展敬教悌八十者五豆九十者六豆夷齊曰吾聞西伯善養老盍歸乎來肆筵授几書曰商王播棄黎老言紂老者不禮敬也無遺老耇傳曰三老凍餒不養老也宋飢年七十者無不饋詒公子鮑尚齒順少長也見禮引年禮曰凡三王養老皆引年謂校年也君子耆老不徒行庶人耆老不徒食徒空也用虞之典既展禮於上庠從周之文乃乞言於東序適饌省禮養老之珍具謂躬省視之凡養老愛之以敬行之以禮修之以養終之以仁禮秋食耆老禮秩膳秩常膳也禮曰凡養老五帝憲憲法也法其德行也養氣體而不乞言有善則記之為敦史惇厚之史三王既養而又乞言徵其禮皆有敦史書其善言周禮羅氏仲春羅鳥獻鳩以養國老凡有秩酒以書契授之秩常也九十曰有秩伊耆氏共王之齒杖大祭共杖函尚敬函其杖也記曰大合樂必遂養老大合樂春秋釋奠也傳曰老有加惠尚書曰詢茲黃髮則罔所愆詩曰養老乞言以成其福祿肆筵設席授几有緝御緝御者侍御者相續立也養老禮黃耇鮐背以引以翼詩漢文詔歲首布帛酒肉之賜文詔曰老者非帛不煖非肉不飽今歲首無布帛酒肉之賜何以佐天下子孫養其親今聞吏廩當受粥者或以陳粟豈稱養老之意其賜物廩粥長吏閱視丞若尉致注云致送也不滿九十嗇夫令史致二千石遣吏循行不稱者督之禮曰三王四代未有遺年燕毛序齒春享孤子而秋食耆老國語斑序顛毛以為紀統顛髮也漢賜孔光靈壽杖漢禮樂志顯宗祀光武於明堂養老更於辟雍父事三老兄事五更祝𩛽在前祝鯁在後𩛽古饐字食不下後漢永平二年三雍成拜桓榮為五更每大射養老畢輒引榮為弟子禮升堂執經又建初二年冬肅宗行享禮以伏恭為三老乞言晉書天子幸太學命王祥為三老南面几杖以師道自居天子北面乞言詳陳明王聖帝君臣政化之要以訓之孔陳子昂上言願養三老五更以教孝悌養高年以教人悌劉蕡策宴侍老于合元殿玄宗開元二年九月丁酉宴京師侍老于合元殿賜九十以上几杖八十鳩杖婦人亦如之賜於其家佚體賈至宓子賤碑燕居以佚其體張樂以和其人始闢西膠楊炯少姨廟補周人之養國老始闢西膠皇帝親養三老五更於太學禮樂志皇帝親養三老五更於太學所司先奏三師三公致仕者用其德行及年高者一人為三老次一人為五更五品以下致仕者為國老六品以下致仕者為庶老尚食具牢饌前三日尚食設大次于學堂之後隨地之宜設三老五更次于南門外之西服進賢冠乘安車禮樂志初鑾駕出宮量時刻遣使迎三老五更於其第三老五更俱服進賢冠乘安車前後導從其國老庶老則預戒之鑾駕既至太學三老五更及群老等俱赴集侍中版奏外辨皇帝出戶殿中監進大珪降三老於門內之東西面立侍臣從立於皇帝之後皇帝西面再拜三老三老南面答拜皇帝又西向肅拜五更五更答肅拜俱坐三公授几九卿正履殿中監尚食奉御進珍羞及黍稷等皇帝省之遂設於三老前皇帝詣三老坐前執爵而饋乃詣酒尊所取爵侍中贊酌酒皇帝進執爵而酳尚食奉御以次進珍羞酒食於五更前國老庶老等皆坐又設酒食於前皆食皇帝即座三老乃論五孝六順典訓大綱格言宣於上惠音被于下皇帝乃虛躬請受惇史執筆錄善言善行禮畢三老以下降筵太常卿引皇帝從以降階逡巡立於階前三老五更出皇帝升立于階上三老五更出門侍中前奉禮畢皇帝降還大次敬老十四白謀於長者必操几杖以從之從就之虞夏殷周天下之盛王未有遺年者是故朝廷同爵則上齒老者在上七十君問則席布席而與言也八十不俟朝不俟朝事畢而歸而弟達於朝廷矣見老者則車徒避班白者不以其任而弟達於道路矣任謂擔持物也居鄉以齒而老窮不遺而弟達於州巷矣頒禽隆諸長者而弟達於蒐狩矣頒分也隆多也軍旅什伍同爵則尚齒而弟達於軍旅矣子曰朝廷敬老則民作孝上老老而民興孝上長長而民興弟老老尊老也長長敬老也少長有禮則興我齒以引以翼言敬老也敬長貴老貴老為其近於親也敬長為其近於兄也貴德尚齒有虞氏也教將行於邦國弟先達於朝廷於道路州巷軍旅云云況當尚齒之朝難許遺年之議孔持詔書袍笏即賜李源帝自遣使者持詔書袍笏即賜又賜絹二百匹源頓首授詔謂使者伏疾年耄不堪趨拜即附表謝辭吐哀愨一無受旬卒優異致政里居亞列半俸足得安枕几而就順養敬老之道亦為優異杜牧鄭㥄少卿致仕制養雍州父老于上林苑賜粟帛貞觀十八年太宗本紀遣使巡問鄭汝懷澤四州高年宴賜之同上尊用舊老陸宣公奏議厚風俗莫如尊老穆宗詔厚風俗莫如尊老李源傳優問耆耄大難始平宜崇進忠直優問耆耄陸贊用老夫十五白史記武帝迎申公申公見天子問治亂事申公時已八十孟嘗君謂楚丘先生老矣春秋高矣多遺忘矣何以教文楚丘曰使我拔距投石追車赴馬何暇見老言將死也使我深謀遠計役精神而決嫌疑吾始壯矣絳縣人老矣趙孟子曰使吾子辱在泥塗使助為政辭以老與之田使為君復陶以為絳縣師鄭伯使燭之武見秦君辭曰臣之壯也猶不如人今老矣無能為也公曰不能早用子寡人之過也雖然云云乃夜縋見秦師漢武以安車徵枚乘乘年老道病卒矍鑠哉馬援被甲上馬事見上注廉頗彊飯頗雖年老彊飯冀趙復用少不如人將辭鄭國之使燭之武老而無子始為絳縣之師絳老渭濱之叟翼周太公商洛之皓匡漢四皓況逢貴老之朝宜尚深謀之略大夫七十而致仕若不得謝謂不聽致仕也則必賜之几杖行役以婦人適四方乘安車自稱曰老夫孔用之必盡節於國張柬之長安中武后謂狄仁傑曰安得一奇士仁傑曰荊州長史張柬之雖老宰相才也用之必盡節於國即召為洛州司馬以耆厚令主東宮兵雖老不怠大宗謂龐王悟君賈至宓于賤碑借五更而悟君賢三老而稟教求讜言李德裕上尊號文禮故老以求讜言宜任耆德殷侑帝問治安術侑言朝廷宜任耆德毋輕用新進朝歌鼓刀叟李白鞠歌行恤老十六白班白者不提挈八十九十曰耄雖有罪不加刑焉老有加惠老者不以筋力為禮君子不禽二毛愛其二毛年長無子絳縣人事見上注五十不從力政天子使宰孔賜齊侯胙曰以伯舅耋老加勞賜一級無下拜周禮三赦一曰幼弱二曰老耄引年引戶校年見上老門注君子耆老不徒行庶人耆老不徒食徒空也禮使老有所終大道之行也教將達於邦家弟先達於閭巷見上況遇引年之朝宜從加惠之典矧過及耄之年宜申在宥之典年既迫於桑榆禮宜加於勞賜孔為御小延英召對苗晉卿代宗立復詔攝冢宰固辭乃免時年老蹇甚乞間日入政事堂帝優之聽入閣下趨為御小延英召對宰相對小延英自晉卿始隨仗聽徐行褚無量以耄老隨仗聽徐行又為設腰輿許乘入殿中白七十致仕還君事也大夫七十而致仕致所掌之事於君而告老也若不得謝謂不聽致仕也則必賜之几杖行役以婦人適四方乘安車自稱曰老夫懸車韋孟詩曰懸車之義以洎小臣賜杖功成名遂身退天之道陳力就列不能者止乞骸骨田豫曰年過七十而居位譬猶鍾鳴漏盡夜行不休息罪人也魏志漢昭帝賜韓福等五人帛放歸曰朕愍勞以官職之事其以行義教鄉里每秋賜羊酒況當尚齒之朝難廢安車之禮況當貴老之朝難許退身之請奉身以退量力而行賜安車漢張禹罷就第賜安車駟馬朝朔望門施行馬晉魏舒罷司徒以劇陽子就第門施行馬二疏漢疏廣為太子太傅兄弟受為少傳廣謂受曰知足不辱則稱病滿百日告老賜黃金二十斤太子賜五十斤挂冠賜帛易離封卦六三日昊之離不鼓缶而歌則大耋之嗟凶朋道將終宜委之於人養志無遺也遺榮知止祁奚請老傳賢哉疏廣疏受告第歸田公卿共帳東都門路人觀之曰賢哉二大夫或為下泣孔負二宜去孔戣為左丞以老自乞雅善韓愈謂曰公尚壯上三留何去之果戣曰吾豈要君者吾年一宜去吾為左右丞不能進退郎官二宜去愈曰公九留貲何恃而歸曰吾負二宜而去尚奚顧子言愈嗟歎即上疏曰禮大夫七十致仕若不得謝則賜之几杖安車不必七十盡許致仕今戣據禮求退陛下若不聽許亦無傷義而有貪賢之美不報以禮部尚書致仕歲舉羊酒如漢徵士禮議者恨其不歸事柳公權大中十三年天子元會公權稍耄志先群臣稱賀占奏忽謬御史劾之奪一季俸議者恨其不歸事咸通初乃以太子太保致仕七十致仕薛苹年七十致仕是時有年過苹不肯去故論者高苹行志穆寧唶曰時不我容我不時徇又可以進乎遂移疾滿百日屢矣親友強之輒復一朝德宗在奉天奔詣行在擢秘書少監改太子右庶子帝還京師乃曰可以行吾志矣即罷歸東都以祕書監致仕得謝乃優禮于頔坐季友居喪荒宴削金紫光祿大夫帝初欲頔告老宰相李逢吉謂得謝乃優禮非所以示責明年乃致仕宰司將以太子太保官之帝改署賓客斥賣車騎闔門不嬰外事開播以太子少師致仕斥賣車騎闔門不嬰外事給公馹孔述睿以疾乞解久乃許以太子賓客還鄉賜帛五十疋衣一襲故事致仕不給公馹帝特命給焉朝廷得失時言之張濬致仕居洛長水墅雖自屏處然朝廷得失時言之公卿以下咸祖都門郤純以老乞身改詹事聽致仕帝召見褒嘆良久賜金紫公卿以下咸祖都門世高其節悉祖餞通化門李義琰聽致仕乃歸田里公卿下悉祖餞通化門時比漢疏廣乞骸歸去歐陽矩移陸司勳書論或不行言或不用則乞骸歸去吳越援景山川如繡鱸鱠蓴羹放歌長嘯夫如是永為陸司勳庶幾乎不朽守國程韋蘇州君子獨知止懸車守國程送郗詹事田里榮同上皇恩賜印綬歸為田里榮解組七品集非敢望三公乞骸之請二疏解組之風懸輿同上自知稅駕無李斯之嘆音便保懸輿復韋賢之故事舊里懸車同上所冀中衢擊壤獲比于堯翁舊里懸車不慚于漢相星變乞辭位同上星變乞辭表武德七年熒惑犯執法右僕射蕭瑀遜位正觀十五年熒惑犯上相左僕射高土廉辭位國史之囚此例甚多空竊高位早負貪飧之責常愧周行老無黃髮之謀空竊高位益恭愈卑謝不許遜位慕考父益恭之誠叔敖愈卑之志豈比罪無所禱孫賈黜于聖人久不自安崔烈詢于厥子歸守丘園散金娛老歸守丘園並一品集身老而才之壯齒宿而意之新李百藥乞致仕帝嘗與偕賦帝京篇嘆其工手詔曰何身老而才之壯齒宿而意之新乎求復用唐璿已逾八十猶託倚權近求復用雪刺滿頭宋璟求致仕表臣切祿簪裳備員廊廟霜毫主額雪刺滿頭求歸耕養築墉岩穴樂太平之世允荷聖朝開元遺事不伏致仕武后時夏官侍郎侯知一以年老敕令致仕知一乃詣朝堂跳躍馳走以示輕捷時謂知一不伏致仕朝野僉載三公入市司徒杜公在維陽日嘗語賓幕曰我致政後著一粗布襴衫跨小馬入市看盤伶傀儡足矣後致政果如其言諫官疏言三公不合入市公曰吾計中矣欲自汙爾禹錫嘉話不謀於家李日知為刑部尚書屢乞骸骨許之日知將有請不謀於家歸乃治行妻驚曰產利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭于心無日而足也不治田園唯飾臺池引賓客與娛樂賜全祿宋璟請致仕許之乃賜全祿退居洛乘輿東幸璟謁道左詔榮王勞問別遣使賜藥餌年八十猶為令孫逖父嘉之年八十猶為令逖求降外官增父秩帝嘉納拜加之宋州司馬致仕更履華劇所守清約王丘致仕更履華劇所守清約未嘗通饋遺室宅童騎敝陋帝嘆之謂有古人節給全祿旌潔吏著疾邪篇張說崔隱甫等恐說復用巧文詆毀忿說者又著疾邪篇帝聞因令致仕少年郎議崔咸舍人嘗受張公之知及懸車之後公與議行止咸極言贊美公便令製奏一章以請三數月後門館闃靜寂寞家人輩竊罵之公後亦悔遂語子弟曰後有大段事勿與少年郎議芝田錄遺名自遂勇退推高元稹裴堪致仕制朝辭位韓愈送楊巨源序昔疏廣受二子以年老一朝辭位而去于時公卿設供帳祖道都門外車數百兩道路觀者多歎息泣下共言其賢漢史既傳其事而後世工畫者又圖其跡筋力耳目未覺衰孔尚書致仕朕筋力耳目未覺衰老憂國忘家用意深遠所謂朝之耆德老成人者韓文優以祿秩不聽其去聖朝故事年雖八九十但視聽心慮苟未昏錯尚可顧問委以事者雖求退罷無不慇勤留止優以祿秩不聽其去以明人君貪賢敬老之道也七十求退人臣之常禮若有德及氣力尚壯則君優而留今戣幸無疾疹但以年當致仕據禮求退陛下若不聽許亦無傷於義上香山居士白居易以刑部尚書致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士悠然賦詩杜鴻漸晚年樂於退靜悠然賦詩曰常願追禪理安能挹化源薛苹時有年過懸車而不知止者唯苹角中東洛時甚高之詩酒賞詠盧簡求以太子太師致仕還於東都有園林別墅歲時行樂子弟侍側公卿在席詩酒賞詠竟日忘歸尉遲恭致仕末年篤信仙方飛鍊金石服食雲母粉穿築池臺崇飾羅綺嘗奏清商樂以自奉養不與外人交通臥振高風蕭德言以年老請致仕太宗下詔曰頃年以來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所冀才德猶茂臥振高風使濟南伏生重在於茲日關西孔子故顯於當今拜祕書少監兩宮禮賜甚厚坐宰相余忿鮑防初防與知雜御史竇參遇導騎不引避參謫其僕及為相防尹京兆迫使致仕授工部尚書防叱曰於與蕭昕子齒而同昕老坐宰相餘忿邪不得志卒鍾山公李建勳及罷相營別墅於鍾山有泉石之美為司徒致仕或謂之曰公既未老無大疾苦受此命欲復為九華先生耶建勳曰平生常笑公卿不審出處豈可違素志自知非壽考者欲求數年閑適遂如其言徐鉉江南錄五老峰前必共聞韋丹與東林僧雲徹為忘形友丹帥江西與僧詩曰王事紛紛無暇日浮生冉冉盡如雲已為平子歸休計五老峰前必共聞出雲溪友議七十以上應致仕若齒髮未亦聽釐務注老請致仕五品以上表六品以上申尚書省吏部郎中唐六典李夷簡請老朝廷謂齒力可任不聽
