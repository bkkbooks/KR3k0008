body:
  text: 卷第三十一白脣亡齒寒左傳宮之奇云云仲尼升脣孝經鉤命決曰老子脣粗厚瀨鄉記脣者齒之垣春秋元命包云云舌之藩周生列云云黑脣燉煌實錄曰王禁字孟曾卒有盜發冢見禁與人摴蒱賜盜者飲出其夜告城門云孟曾使人也發曾塚禁賜酒以黑其脣明日入城黑脣者是也須臾賊至為門吏所縳朱脣外朗曹植賦沸脣賈誼曰沸脣耰塞垣之下匈奴號也孔博脣婁師德膏脣武平一上書膏脣之伍苟輸讒計脣厚杜紫微脣厚不稱才名出瑣言劖脣南蠻赤口濮劖其脣使赤持疑於脣吻間韓愈送毛仙翁發言如駃駟囁嚅持疑於脣吻間焦脣道長食盡苦口焦脣李曰來日大難烏膏注脣五行志元和末婦人不施朱粉惟以烏膏注脣狀似悲啼者縳舌膠脣唐孫樵逐痁文有司馬安者攘義盜仁縳舌膠脣絳脣杜甫觀公孫大娘舞劍絳脣朱袖兩寂寞白龜文抱朴子內篇曰老君足下龜文又漢書曰宣帝足下龜文足下有毛宣帝樂正子春下堂而傷左足禮足不良郤克不失足於人禮啟予手啟予足曾子病堂上接武堂下布武武足跡也孔足痺王徽帝召徽為御史大夫固辭足痺踵相逮褚亮寢疾帝遣中使候問踵相逮足病廢白居易武宗欲召用之是時居易足病廢鄭權穆宗立以左散騎常侍持節為回鶻告哀使以足疾辭不許肩輿就道自置其足折之藩鎮李師道浮圖圓靜者年八十餘嘗為史思明將驍悍絕倫既執力士權其脛不能折罵曰豎子折人腳且不能乃曰健兒因自置其足折之且嘆曰敗吾事不得見洛城流血曳踵光崇它日朝曳踵為有疾狀帝召問之對曰臣損足曰無甚痛乎曰心有憂痛不在足足攣盧照鄰疚甚足攣足下黑子唐明皇雜錄安祿山初為張韓公帳下走使之吏韓公嘗令祿山洗足韓公腳下有黑點子祿山因竊窺之韓公顧笑曰黑子吾貴相汝亦能有之乎祿山曰某賤人也不幸兩足皆有比將軍者黑而加大韓公奇而翫之益親厚捧上皇足上皇至咸陽在望賢宮帝拜舞於樓下上皇降樓撫帝而泣帝捧上皇足嗚咽不自勝唐史引足令高力士脫靴李白引足令高力士脫靴由是斥去乃浪跡江湖終日沉飲墮車足傷元德秀為魯山令前此墮車足傷不能趨拜太守待以客禮嘉其足力五代王進符彥超鎮安遠軍軍中有變遣進馳奏京師明宗怪其來速嘉其定力以隸寧衛指揮足力乏不能拜五代呂琦廢帝發怒曰朕一女尚幼欲棄之夷狄金帛所以養士而扞國也又輸以資虜可乎崧等惶恐拜謝無數琦足力乏不能拜而先止酒濯足馬周初入京至灞上逆旅數公子飲酒不顧周周即市斗酒濯足傍眾異之平地謂無足慮遽跌而傷五代馮道嘗戒明宗曰臣為河東掌書記時奉使中山過井陘之險懼馬蹶失不敢怠於御轡及至平地謂無足慮遽跌而傷凡蹈危者慮深而獲全居安者患生於所忽此人情之常白螓首蛾眉蔡澤巨眉史文王虎眉帝王紀云堯眉八彩春秋元命包云三寸烈士傳云于將子赤鼻眉廣三寸一尺伍子胥眉間一尺白眉京兆眉張敞為婦畫眉人謂之京兆眉也連眉列仙傳陽都女生而連眉以為異後果得仙道也黛眉東勸僕記馬皇后眉施黛左眉小缺補之如粟赤眉琅邪樊宗天鳳中起為盜王莽使平均公廉丹征之宗等欲戰恐其眾與丹兵亂皆朱其眉以相識是謂赤眉賊愁眉桓帝時京師作愁眉細而曲折效梁冀家為之是日收冀婦憂而蹙眉灸眉鄧粲晉紀曰宋歡常以酒狂王澄因叱左右拉歡郭舒厲色曰使君醉左右莫動澄大怒曰別駕枉耶枉我醉因遣灸舒眉頭後事王敦諫敦敦呵曰人以卿癡灸眉舊疾復發也舒曰汲黯朱雲豈癡乎澄時為荊州遂縱酒嬉戲嚬眉西施張氏工梁冀制珠星示象運斗建於雙視春秋元命包曰天有攝提人有兩眉為人表候陽立於二故眉長二寸注曰攝提兩星頗曲人眉似之也孔覽鏡作眉安樂公主臨淄王誅韋庶人主方覽鏡作眉聞亂走至右廷明門兵及斬其首眉宇元德秀房琯每見德秀嘆息曰見紫芝眉宇使人名利之心都盡隆眉五代王建通眉李賀通眉秀眉楊元琰秀眉眉長覆目毛若虛眉長覆目姓殘鷙眉過目袁天綱帝在九成宮令視岑文本曰學堂瑩夷眉過目故文章振天下長眉青韓愈華山女詩白咽紅頰長眉青眉頭不伸五代郭崇韜莊宗思得高樓避暑乃遣王允平營之宦官曰郭崇韜眉頭不伸陛下雖欲有作其可得乎眉睫增妍柳宗元乞巧文齒牙饒利眉睫增妍九聚眉金臺錄朱泚眉分九聚相者告以大貴信之忽軒衣張眉韓文禁去眉開額文宗即位而禁高髻險粧去眉開額唐車服志疏眉目楊收又盧奕疏眉目豐下眉目瑰異李邕既入朝人間傳其眉目瑰異曲眉而豐頰韓愈盤谷序曲眉而豐頰清聲而便體刻眉崔氏姓忌有婢刻其眉得色懸雙眉劉禹錫詩眉間黃色韓愈郾城晚飲城上赤雲呈勝氣眉間黃色見歸期秀整汝陽王璡眉宇秀整鼻四白鼻者心之門養生經東方之人隆鼻淮南子云隆準漢高祖準鼻也鼻為氣戶長沙耆舊傳太尉壽少遇相師相師曰凡鼻為氣戶君鼻太貴之象也鼻仰而頞富貴之相也史記蔡澤就唐舉相舉云云截鼻列女傳後漢周郁妻納一歲夫亡父母欲嫁之遂援刀而截鼻莊子曰郢人圬其鼻端若蠅翼使匠斲之匠運斤成風堊盡而不傷鼻雙柱老子飛龍常璩蜀志曰李雄美容貌相工相之曰此人鼻飛龍孔鼻息所衝上拂雲漢李昭德怙權丘愔上疏曰臣聞其鼻息所衝上拂雲漢鼻長六寸吳元濟山首燕頷側鼻史思明鼻息若龍虎王廷湊醉寢于路有過其所者驚視之曰吾見君鼻之息左若龍右若虎鼻下氣皆黑袁客師嘗度江叩舟而還左右請故曰舟中人鼻下氣皆黑不可以濟金環貫鼻南蠻有穿鼻種以金環徑尺貫其鼻下垂過頤君長以絲係鐶人牽乃行其次以二花頭金釘貫鼻下出鼻出黃膠從容錄賀知章忽鼻中出黃膠醫者謂飲酒之過漸能等薰蕕韓愈江陵詩因疾鼻又寒漸能等薰蕕齧鼻五代史處直養子曰都者執處直因之西宅處直揕其胸逆賊吾何負爾然左右無兵遂欲齧其鼻都掣袖而走處直遂見殺隆準五代閩世家王審知狀貌雄偉隆準方口無厚相李嶠身短小鼻口都無厚相時議不以重祿待之廣記白捋虎鬚吳錄朱垣遠成奉觴於孫權曰願一捋陛下鬚王推几前垣進捋鬚曰今日真可謂捋虎鬚王大笑于腮于腮左傳宋華元多鬚伐鄭為鄭敗宋人歌曰于腮于腮棄甲復來黃鬚兒魏志任城王章為北平中郎將討烏丸有功歸太祖大喜捋章鬚曰黃鬚兒定天下大奇長鬚方士廣陵列士傳劉瑜舉方正對策高第人呼為長鬚方士多髯參軍郤超多鬚人謂之多髯參軍銜鬚後漢溫序為隗囂將軍所獲序臨斬銜鬚曰大丈夫豈宜鬚沔於土晉張華多鬚好以帛纏之陸雲見狀笑不能止蝟毛獸鬣朱垣捋孫權鬚者後漢司馬直潔白美鬚髯人敬之如神奮髯抵几孔數尺紀處訥髭長數尺髮與身等太穆皇后竇氏生髮垂過頸三歲與身等容髮為變惠宣太子業有疾帝憂之一昔容髮為變翦鬚李勣嘗暴疾毉曰用鬚灰可治帝乃自翦鬚以和藥鬢髮班禿肅宗皇后吳氏傳肅宗在東宮宰相李林甫陰構不測太子內憂鬢髮班禿髭貌雄偉司馬晉卿頎而髯令狐綯傳宣帝謂宰相白敏中曰憲宗葬道遇風雨六宮百官皆避獨見頎而髯者奉梓宮不去果誰耶敏中言山陵使令狐楚帝曰有子乎即召綯為知制誥兩昔皆白路巖貶新州剌史美鬚髯至江陵兩昔皆白引刀斷髮玄宗貴妃楊氏天寶九載妃復得譴還外第帝感動輟食詔中人張韜光賜之妃因韜光謝帝曰妾有罪當萬誅然膚髮外皆上所賜今且死無以報引刀斷一繚髮奏之曰以此留訣帝見駭惋遽召入禮遇如初赤髮回鶻黠戛斯人皆赤髮以黑髮為不祥鬚髮輒白李白知神龍初為給事中母病取急調侍數日鬚髮輒白髡髯鬢崔嶢為陝虢觀察使俄為軍吏所執髡其髯鬢蕘苒拜祈免乃得去髮動顏杲卿初杲卿被殺徇首于衢莫敢收有張湊者得其髮持謁上皇是昔見夢帝寤為祭後湊歸髮于其妻妻疑之髮若動云祝髯髮喬琳辭病力帝賜所執策曰勉為良圖與卿別矣不數日祝髯髮舍游佛盧黃鬚後唐莊宗皇后劉氏父劉叟黃鬚善毉卜每怒盡張張巡鬚髯每怒盡張已衰改李白古風春容捨我去秋髮已衰改婦人有鬚李光進母李有鬚數十長五寸長鬚國有土人泛海至一處問之曰長鬚國也其王以公主妻之主亦有鬚土人賦詩曰花無葉不妍女無鬚亦醜乃群蝦所聚也酉陽雜俎鬚生若黳海州司馬韋敖曾往嘉興道遇釋子希遁深於繕生之術又能用日辰可代藥石見敷鑷白曰貧道為公擇日拔之經五六日僧請鑷其半及生色若黳矣凡三鑷之鬢不復變座客有祈鑷者僧言取時稍差拔後髭色果帶綠其妙如此髮長五尺李山甫美姿容而多髮黳然長五尺餘每沐出命侍婢捧大金盤承而櫛之有相者疑其婦人呼之方寤樵牧閑談虞童髮未䰉柳宗元詩音班風鬟霧鬢柳毅見龍女風鬟霧鬢異聞集氣攻髮直大中遺事先生又能散髮箕踞用氣攻其髮一條條如植白髮三千丈李太白秋浦歌白髮三千丈緣愁似箇長長吁望青雲鑷白坐相看秋日贈元六長吁望青雲鑷白坐相看秋顏入曉鏡壯髮凋危冠上挂矢太宗虯鬚嘗戲張弓挂矢酉陽雜俎惟稱好鬚帝以李緯為民部尚書會有自京師來者帝曰玄齡聞緯為尚書謂何曰惟稱緯好鬚無它語帝遽改太子詹事鬚變負人境杜詩莫話清溪髮蕭蕭白映梳贈李秘書婦人以蘇澤髮南詔望苴蠻婦人不粉黛以蘇澤髮鬢髮還應雪滿頭杜寄杜位怒髮猶鬇鬡韓文征蜀聯句綠鬢成霜蓬李白怨歌沉憂能傷人綠鬢成霜蓬虯鬚似太宗杜甫贈汝陽郡王璡白律本律歷志黃帝使伶倫自大夏之西取嶰谷之竹其竅厚薄均者斷兩節而吹之為黃鍾之宮而制十二管以聽鳳皇之鳴其雄鳴為六雌鳴亦六以此黃鍾之宮而皆可生之是為律本注云大夏西戎國也嶰谷谷名也竅孔也取竹孔與肉薄厚均者截以為管也燕谷和氣北燕有谷地美而寒不生五穀鄒衍乃吹律暖之和氣至谷乃生禾黍楚軍死聲師曠曰吾歌北風又歌南風南風不競多死聲而楚必無功注歌吹律也以詠八風易姓京房本姓李後吹律自改為京氏玉律銅管飛灰之候吹律聽聲史記王者制事立法物度軌則一稟於六律律為萬事根本望敵知吉凶聞聲效勝負蓋吹律而聽聲也合其規較之以黍候其氣應之以灰啟迪歲功敬授人事候四氣應八風風雨之變可以音律知之文子審大小必均薄厚考長短無失毫釐履端於始以啟三日六旬舉正於中用定二十四氣頤陰陽而必變雖風雨而不迷東風入律青雲干呂黍累定而百物信毫釐失而千里差藝精吹管業擅專門六律六同六律合陽聲也六同合陰聲也此十二者以銅為管轉而相生黃鍾為首長九寸立均出度國語律所以立均出度言鍾度皆以律而均也以合陰陽之聲太師掌六律六同以合陰陽之聲典同掌六律六同之和以辨天地四方陰陽之聲還相為宮禮五聲六律十二管還相為宮也注十二律遞相生也還謂循環也八風從律而不姦禮姦忒也六氣斯辨八風不姦吹其斷竹既葉鳳鳴之音驗以飛灰已契蟻行之次制苟乖於長短應必失於忽微參天兩地藝文志大演之數五十推歷生律制器規圓矩方莫不參天兩地兩耦數也金門竹葭莩灰晉律歷志楊泉記取宜陽金門山竹河肉葭莩為灰炎帝使羲和占日常儀占月申區占星伶倫造律日大橈造甲子隸首造筭數容成造歷秒忽漢書數起於一產氣黃鍾造計秒忽注秒禾芒也忽起於蜘蛛絲言其微也十二律漢律歷志律有十二陽六為律陰六為呂律以統氣類一曰黃種二太簇三姑洗四蕤賓五夷則六無射呂以振陽宣氣一曰林鍾二南宮三應鍾四大呂五夾鍾六仲呂三統漢志云三統者天地人事之紀也十一月乾之初九陽伏地故黃鍾為天統六月坤之初六陰氣受在太陽繼養化柔萬物生長楙之於未故林鍾為地統云云仁以養之義以行之今物事各得其理寅木為仁其聲商也為義故太簇為仁云云律長八寸象八卦宓羲之所順天地通神明類萬物之情夫婦子母上生九而倍之下生六而損之皆以九為法九六陰陽夫婦子母之道也異類為子母謂黃鍾生林鍾也同類為夫婦謂黃鍾以大呂為妻也律娶妻黃鍾生林鍾也呂生子林鍾在太簇也天地之情也上損下益黃鍾之管長九寸三分損一下生林鍾益一上生太簇三分損一下生南呂三分益一上生姑洗姑洗三分損一下三應鍾應鍾益一上生蕤賓蕤賓損一下生大呂大呂益一上生夷則夷則損一下生夾鍾夾鍾益一上生無射無射損一下生仲呂陰陽相生自黃種左旋八八為位其法皆銅鐵太樂太常主之相生三分損益揚子雲曰聲生於日甲巳為角丁壬為羽乙庚為商丙辛為征戊癸為宮律生為辰謂子為黃鍾丑為太呂之屬也妙察五均工言三統孔樂舞雙鳳西舍利樂舞雙鳳明律呂之和也斷竹為十二律樂志初隋用黃鍾一官惟擊七鍾其五鍾設而不擊謂之啞鍾唐協律郎張文收乃依古斷竹為十二律高祖命與孝孫吹調五鍾叩之而應由是十二鍾皆用鑄銅律三百六十銅斛二張文收既定樂鑄銅律三百六十銅斛二銅秤二銅甌十四秤尺一斛左右耳與臀皆方積十而登以至於斛與古玉尺玉斗同皆藏於大樂署武后時太常卿武延秀以為奇玩乃獻之及將考中宗廟樂有司奏請出之而秤尺已亡其跡猶存以常用度量校之尺當六之五量衡皆三之一至肅宗時山東人魏延陵得律一因中官李輔國獻之云太常諸樂調皆下不合黃鍾請悉更制諸鍾磬帝以為然乃悉取太常諸樂器入于禁中更加磨剡凡二十五日而成御三殿觀之以還太常然以漢律考之黃鍾乃太簇也當時議者以為非是白銅渾設象玉漏授時挈壺氏掌刻漏之職金徒之職銅史之司分以陰陽明晦之時不忒賾其晝夜短長之數無逃金臺銀箭陰陽雖微天地之情可見風雨如晦日夜之度不迷苟昏曉過度致盈縮之差則寢興失時有顛倒之剌敬授人時周禮凡軍事懸壺以序聚柝懸壺以為漏也以次序更聚擊柝備守以警夜及冬則以火爨鼎水沸而沃之東水凍冷不下故以炊令沸以沃之說文曰漏以銅盛水刻節晝夜百刻待漏後漢范楚每常事嘗晨駐車以待漏也孔改刻漏傅奕善數不傳武德時所改刻漏皆詔奕陰亂漏刻王翃河中尹領節度後務悍將凌正數于法不逞約其徒夜斬關逐翃翃覺之陰亂漏刻以差其期眾驚不敢發景刻陸贄曰勤王之師在畿內者急宜亟告景刻不可差金丸拂菻中門中有金巨稱一作金人立其端屬十二丸率時改一丸落蓮花漏唐李肇國史補趙僧靈澈得蓮花漏乃取銅葉製器狀如蓮花置盆水之上底孔漏之水半之則沉每晝夜十二沉為行道之節雖冬夏短長雲陰月黑無差咽蟾蜍李賀云催水咽蟾蜍雞跖集孔壺為漏浮箭為刻漏刻博士六人掌知漏刻凡孔壺為漏浮箭為刻以考中星昏明更以擊鼓為節點以擊鍾為節出唐百官志置鼓以候刻渾天銅儀以木櫃為地平令儀半在地下晦明朔望遲速有準立木人二於地平上其一前置鼓以候刻至一刻則自擊之其一前置鍾以候辰至一辰亦自撞之皆於櫃中各施輪軸鉤鍵關鎖交錯相持置於武成殿前以示百官無幾而銅鐵漸澀不能自轉遂藏于集賢院出唐書天文志漏刻之法馬重績言漏刻之法以中星考晝夜為一百刻六十八刻六十分刻之二十為一時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之五代史卷五十七百刻短長取於口不取於數天下多是也杜牧池州刻漏記靈虯傳夕箭杜詩銀箭金壺漏水多李白烏棲曲節晷漏於鍾律李華含元殿賦方術八白執技以事上推步日者殺黑龍史記黑子北之齊遇日者曰帝以今殺黑龍先生色黑不可行也視日周文為項燕視日視日吉凶舉運之占文即周章緯候鈐決後漢傳曰陰陽推步之學往見於墳典然神經怪牒玉策金繩關扃於玉堂之府靡得而闚至乃河洛之文龜龍之圖箕子之術師曠之書緯候之部鈐決之符皆所以探抽冥賾參驗人區時有可聞其流風用遁甲七政元氣六日七分逢占者專候挺須臾孤虛之術及望雲省氣推處有妖時亦有驗斯道隱遠玄奧難原故聖人不語神力罕言性命或開末而抑其端或曲辭以形其義所謂可使由之不可使知之也漢武帝頗好方術道藝之士莫不負策抵掌順風而屆也任文公善天文曉遁甲役使鬼神請命太山京房自去篤病三年請命太山行過道士張君授以方術所著易林至今行世米道張魯學道鶴鳴山有人受其道者輒出米五斗世謂之米道左慈盤中釣魚曹公欲殺之變為羝羊入羊群中曹公知不可殺乃謝曰試與公戲耳老羝屈膝曰詎如許復欲執之群羝屈膝云云召鬼劉根能令人見鬼太守史祈不信因之乃召祈七祖皆面縛責祈祈乃謝而遣之費長房假壺公之符薊子訓取嬰兒之驗趙炳能令枯木生荑茅屋爨鼎樊英推步災異漱水救蜀火楊由見社中水鴆鬥知有兵賊象不赴酒食風起灶李南少明風角女見疾風起吹灶突及井泣辭姑曰此主爨者當之必死五里霧張楷能作五里霧裴優亦能作三里霧求學於張楷不見後優作賊辭連楷無驗以見原風起知火郎顗父宗字仲緩治京氏易善風角星管六日七分能望氣占候為吳縣吏見暴風卒起宗知京師有火災記時日果如其言郭憲從駕含酒三噀執法奏不敬曰齊國失火故厭之果上言失火也欒巴南漱巴蜀人正旦朝會獨後至頗醉又飲而漱曰臣鄉里以臣能治護病為臣立廟今旦耆老皆入臣廟故醉成都市失火救之果上言失火有雨來皆酒氣風起庭中父哭子管輅字公明在王弘直坐有飄風高二尺在庚中從申上來童童迴轉輅曰東方有馬吏恐父哭子明日吏至弘直子果死也療病人令思過出來漢書張衡為五斗米道東方張角為太平道太平者持九節杖為符咒教病人思過處靜室又為姦令祭酒以五千文使都習姦令為主鬼吏主為病者禱請法書病人姓名服罪之意作三通一上天一埋地一沉水為三官書使病者出米五斗號曰五斗米師為益於病昏愚者競師之衡因人作信義舍置米其中有小過令治道百步則罪除往來者任食量腹取足過則輒病以鬼道教人衡即角子也隱形石苞謂管輅曰君鄉人翟文耀能隱形輅曰此陰陽蔽匿之道苟得其數四岳可藏況七尺之形遊於變化之內僕正身明其道見數不為異術不為奇僕隱行怪末服斯務矣孫策殺道士于吉後照鏡看面創見吉在鏡中遂卒百果立生殿庭釣魚吳介象元則有方術吳主使象變化鍾菰菜百果皆立成又論鯔魚膾最上乃於殿庭穿埳置水垂綸於食項乃釣得鯔魚也活死人吳壬燮字盛為交趾太守病死三日仙人董奉以丸藥以水含之乃蘇四日能語董奉字君蔓丁義以白羽畫水渡江晉丁義授神方於吳猛以白羽畫水渡江夏統水戲統字仲御賈充問統能水戲乎統乃作鯔魚躍鮪䱐引於是風波振駭迴摶大風至含水噀天雲飛雨集矣青囊郭璞授業於河東郭公公以青囊九書與之由是遂洞五行天文卜筮之術攘災轉禍通致無方璞門人趙載竊青囊書未及讀為人所焚後漢段翳子元章治易明風角有就學未至預知姓名有一生辭歸翳令藥並簡書封於筒下告曰有急發視之到葭萌與津吏爭舟撾從者頭破發取膏藥傳瘡乃愈生歎服乃還卒業秀支替戾剛劉曜攻治城石勒訪佛圖澄澄曰相輪鈴聲云秀支替戾剛僕谷劬禿當此羯語也秀支軍也替戾剛出也僕谷劉曜胡位也劬禿當提言此軍出捉得曜書也禁溪水不流徐登孔求見儀形馬周亡帝思之甚將段方士術求見其儀形治丹劑裴潾帝喜方士而柳泌為帝治丹劑求長年帝御劑中躁病渴裴潾諫之曰夫秦漢之君亦信方士矣如虞生徐福欒大李少君後皆詐譎無成功事暴前策皆可驗視穆宗惑方士穆宗雖誅泌而後稍稍復惑方士有布衣張皋者上疏曰先帝晚節喜方士累致危疾陛下所自知不蹈可前覆迎後悔也游江湖間鄭注以力伎游江湖間依李愬為愬煮黃金餌之寖親遇諫罷方士劉瑑諫罷武宗方士言多懇複許巖士朱朴所善方士許巖士得幸出入禁中言朴有經濟才自鬻其伎裴潾曰今乃方士韋山甫柳泌等以丹術自神更相稱引詭為陛下延年臣謂士有道者皆匿名滅景無求於世豈肯干謝貴近自鬻其伎哉喜術士成汭晚喜術士餌約濱死而蘇王若訥劉仁恭從方士王若訥學長年築館大安山掠子女充之能言禍福劉從諫傳初術者李琢能言禍福從諫以重幣邀之避署大將見星門善長短術李丕善長短術與從諫厚善署大將化黃金劉巨容始楊州人申屠生能化黃金見金門陰陽占繇符架之術葉法善括州括蒼人世為道士傳陰陽占繇符架之術能猒劾怪鬼帝聞之召詣京師欲寵以官不拜留內齋場都人自奔火中葉法善嘗在東都凌空祠為壇以祭都人悉往觀有數十人自奔火中眾人驚救而免法善笑曰此為魅所馮吾以法攝之耳問而信病亦皆已其譎幻類若此止樂明崇儼少隨父恪令安喜吏有能召鬼神者盡傳其術乾封初應岳牧舉調黃安丞以奇技自名高宗召見甚悅擢冀王府文學試為窟室使宮人奏樂其中召崇儼書桃木為二符剚室上樂即止曰向見怪龍怖而止易占杜生姜易占有亡奴者問所從追戒曰自此行逢使者懇丐其鞭若不可則以情告其人果值使者於道如生語使者異之曰去鞭吾無以進馬可折道傍葼代之乃往折葼見亡奴伏其下獲之它日又有亡奴者生戒持錢五百伺於道見進鷂使者可市其一必得奴俄而使至其人以情告使者以一與之忽飛集讙莽上往取之而得奴眾以為神請題衿膺桑道茂善大一遁甲術李晟為右金吾大將軍道成齎一縑見晟再拜曰公貴盛無比然我命在公手能見赦否晟大驚不領其言道茂出怀中一書具姓名署其左曰為賊逼脅固請晟判晟笑曰欲我何語道茂曰第言準狀赦之晟勉從又以縑願易晟衫請題衿膺曰它日為信再拜去道茂果汙朱泚偽官晟收長安與逆徒旂下縛將就刑出晟衫及書以示晟奏原其死釣魚術五代鄭遨與道士李道殷友善道殷有釣魚術釣而不餌木獺楚廖光圖與伊岳道士伊用昌為林泉之交父母病思鱠屬江水夏漲魚不可得用昌探懷出一木獺長三寸許再三祝之投於江中須臾波浪沸遂擒一巨鱗出獺著魚背堅不可脫用昌舉之木獺耳因作鱠母愈出九國志為方士房中之術多採良家子以充後宮蜀孟昶傳六十四方士格李白草創大還造化合元符交構騰精魄自然成妙用誰知其指的白日可撫弄清都在咫尺北酆落死名南斗上生籍伊予是何者名在方士格譎詐丕誕不可信余聞武宗之言是以知耳嘗於便殿言及方士皆譎詐丕誕不可信上曰吾知之矣宮中無事以此遣悶耳余嘗覽曹植論左慈對君達之類家王及植兄弟以優笑畜之耳斯言信矣唐贊皇公方士論亡牛在鵲巢賈耽精於術數有一叟失牛詣乘國師卜師曰爾牛在賈相公帽筒中叟迎公馬首訴之公笑取筒中式盤據鞍作卦曰爾牛在安國觀三門後大槐鵲巢中往探樹下見有旁舍繫牛乃其所失者遂獲盜人也芝田錄壁畫飲酒張士政畫一婦人於壁酌酒滿杯飲之酒無遺滴逡巡畫婦人面赤半日許可畫濕處壞落其術終不肯傳人酉陽噀水調角江南野史彭玕時寨中得玉笥山道士劉守真能驅說神每吳兵掠寨劉則噀水調角同雨雷電倏忽而起吳不能攻迨數年一夕劉死遂戰不利叱吒風雨唐史高駢傳呂用之自謂與仙真通對駢叱吒風雨或望空顧揖再拜語言俚近卜筮九白洪範曰明用稽疑明用卜筮考疑事也官占惟先蔽志官占卜筮官也先斷意後用卜不煩聖人不煩卜筮傳龜筮協從龜從筮從龜從筮逆龜筮共違於人貞卜筮短龜長不如從長也龜象也筮數也爾卜爾筮體無咎言臧會曰僂句不余欺我龜既厭不我告猶卜以決疑不疑何卜鬥廉云違卜不祥占險夫易不可以占險卜僣臧會竊僂句以卜為信與僭僭吉爰契我龜不占子曰人而無恒不占而已矣卜不襲吉襲再也卜筮不過三卜筮不相襲謂賣龜筮也決嫌疑禮卜之用龜進斷其志初筮告再三瀆瀆則不告圓神方智易定天下之吉凶莫善於著龜之德圓而神卦之德方以智神以知來智以藏往端策拂龜詹尹對屈原神蔡龜也靈蓍僂句也觀卦察爻鑽龜啟繇繇考先知之兆誠可決疑揆昆命之文必先蔽志疑眾必殺禮假於鬼神時日卜筮以疑眾殺無赦謂使違禮疑而筮之則不非也前知禮至誠之道可以前知見乎蓍龜動首四體禍福將至必先知之故至誠如神四體龜四足也言至誠則不欺禮曰昔者聖人建陰陽天地之情立以為易雖有明智之心進斷其志焉深於易者禮青囊卜也拂龜布卦握粟揲蓍遺策不中也大橫庚庚予為天王漢陳平等迎代王王卜之得兆云云孫賓投蓍用知方朔漢武帝令孫賓筮東方朔詹尹對策不對屈原楚屈原既放心煩志亂往見大卜詹尹曰余有所疑先生決之詹尹乃端策拂龜原曰予寧隨鴻鵠遠舉乎寧與雞鶩爭食乎云云詹尹乃釋策謝曰用君之心龜策不能知之周文王卜獵渭濱其兆曰非熊非羆天錫帝師乃得呂望而歸辨吉凶者存乎辭舍爾靈龜受命如響知來藏往窮神知化幽贊於神明而生蓍天生神物謂蓍龜也極數知來之謂占探賾索隱鉤深致遠觀變枚卜書八卜功臣謂歷卜也周禮三兆王兆瓦兆原兆田原之兆謂灼龜發火而形可占其像似玉瓦原之亹杜子春曰王兆顓頊瓦兆帝堯原兆周之兆也繇兆之體百有二十頌千二百記曰天子無筮謂征伐巡守不用筮小事則用筮諸侯有守筮守國之筮有事則用封父之龜天子之龜封父國名諸侯非其國不筮卜宅寢室假爾泰龜有常命龜策辭奠龜儀禮卜人奠龜楚焞注楚荊也焞以鐕灼龜也置于燋燋炬以然火也乃旅占卒不釋龜告于蒞卜蒞卜旅長與主人占日者龜焦焦兆不成也趙鞅卜也沉陽趙孟卜救鄭遇水適火太史曰是謂沉注云火陽也得水而沉陽青純公羊曰龜青純純緣也謂甲髯千歲龜青髯以明吉凶龜能七十鐕而無遺不能避刳腸之患莊子露蓍漢書上體不安張禹必齋戒以卜吉則獻上不吉則有憂色露蓍於星下卜負金隗炤善易臨終謂妻子曰後雖大荒勿賣宅後五年詔使姓龔負吾金以吾所書版索之後如其言妻齎版詣使者使者惘然沉吟乃悟取蓍筮卦成曰妙哉隗生吾不負金賢夫藏金以待太平知吾善易書版寄意金有五百斤盛以青甕埋在堂屋下去壁一丈入地九尺妻掘之果得金卜云其吉終然允臧允信也臧善也祠部式諸私家不得立雜神及覡巫卜相並宜禁斷其龜易五兆六壬不禁龜蒙狐疑占而從二卜不過三穆卜書成王有疾穆卜公曰我其為王穆卜奪糈周禮罰也卜不中罰不中晉獻公飲大夫酒令司正實窮與史蘇曰驪之役爾云勝而不吉夫克國得妃吉孰大焉故罰汝對曰云云青蓮神蔡彰往考來翠野靈蓍通幽索隱睹兆於未萌誠為智者退咎於既往何其壯哉光啟兩儀能成四象存險易之徵示臧否之兆索隱致遠通幽同微達以陰陽究其天地合於無際應以未形智能藏往神以知來行於冠婚明男女之問用於祭祀定犧牲之名射覆知白鼠之傷布兆見豎牛之禍彼敬仲之徵祥必盛齊國且君平之取給將賣成都鬼神其依吉凶可見屈原遐逝詹尹端策而無言方朔不歸孫賓投蓍而有說故龜文既踐知李固之將封鳳皇于飛識陳完之必貴開於冥數得自天玄卜筮婚姻晉獻公筮嫁伯姬遇歸妹之暌史蘇占之曰不吉繇曰士刲羊無衁女承筐亦無貺也欲納驪姬為夫人卜之不吉筮之吉卜人曰筮短龜長不如從長一薰一蕕十年尚猶有臭崔杼筮娶棠姜曰入其宮不見其妻凶懿氏卜妻敬仲其妻占之曰鳳皇于飛和鳴鏘鏘有媯之後將育子姜筮仕畢萬筮仕於晉辛廖占之曰吉其必蕃昌公侯之子孫必復其始綬笥有蛇後漢馮緄拜隴西太守綬笥有兩赤蛇分走許曼筮曰二歲當為邊將官有果名五年為大將南征管輅自卦冀州剌史裴徵辟輅為文學自卦吉兇云當見三貍果見之淮水絕王氏滅王導初渡淮郭璞筮之云云筮家狀孔僖字仲光拜臨晉令崔駟亭伯以其筮家狀之謂曰不吉勸辭辟官僖曰吉凶已見在縣二年而卒賣卜君平杖頭嚴君平賣卜於都市曰得杖頭百錢即閉肆垂簾司馬季主楚人賣卜於長安市宋忠賈誼謂之曰何居之卑行之污季主捧腹而大笑君平與人子言依於孝張禹為兒時至市觀卜久之自曉別蓍布卦意王宗以賣卜自奉安帝以博士徵恥占驗見知懸綬於縣庭而逃君平以卜筮賤業而可以便眾人有非正用之則依舊龜為言利害卜筮官官占帝王立卜占之官故曰官占釁龜月令正月命有司釁龜策占兆審卦吉凶周禮上春釁龜擇建立卜筮人書龜開四兆卜師收掌策分三易筮人是司技以事卜藝成而下業在其宗三兆之法見卜筮門三易之法連山歸藏周易視高謂以龜骨高者可灼處示宗伯之卜事也作龜謂灼龜人作兆而占之也命龜謂告龜以所卜事蒞卜蒞臨也謂卜官相示卜師掌開龜之四兆開其占書書其四部故曰四兆見下揚火以作龜致其墨以火灼龜也致墨者熟灼之以明其兆也龜室藏龜之室中否周禮歲終則計其否之中否也卜人定龜禮史定墨視兆坼也君定體體吉凶也四兆方兆功兆義兆弓光有其名義未聞六龜六人占龜龜之屬各有名物天龜曰靈屬地龜曰澤屬東果屬西雷屬南龜獵屬北龜若屬燋契周禮箠氏供燋契以待卜事燋爇灼龜之木謂燋契龜之鑿也凡卜以明火爇燋遂吹其後契以受卜師占人掌占龜以八筮占八頌以八卦占筮之八故以視吉凶也凡卜筮君占體大夫占色史視墨卜人視坼體有吉凶色有善惡墨有小大坼有明徵凡卜筮既事則以繫幣以比其命歲終則計其占之中否注云既卜筮史書其命龜之事及兆於策繫其禮神之幣而合藏焉書曰以啟金滕之書是也九筮筮人掌易辨九筮之名國之大事先筮後卜九筮謂筮更筮咸筮式筮目筮易筮比筮祠筮參筮環云云卜正膝侯曰我周之卜正正官之長也卜怪生男墮地而走安平大守王基令管輅作卦輅曰當有婦人生一男墮地而走入灶宋無忌姝也蛇銜筆烏鷰鬥又見老蛇銜筆輅曰書佐也又烏來入室與鷰鬥是官舍久遠有此三怪無所憂也戶前流光王經堂前有一流光鷰雀入懷殷殷有聲輅曰吉遷之徵頃之拜為江夏大守失火管輅在田舍主人患失火輅卜曰明日南陌上有一角巾生駕黑牛故車必邀留如此言生不得已宿然意不安以為圖已乃把刀出門倚積薪假寐欻有一物如獸手中持火舉刀斫腰視之乃狐世火遂絕堂西死男子信都令家驚恐輅筮曰君堂西有兩死男子一持矛一持弓箭矛者主刺項痛弓者射胸腹故心痛果得之疾遂皆愈卜矢卜失管輅為僕婦卜失牛云當在西面窮丘中懸頭向上果於丘塚得牛婦人告官以輅藏牛按驗乃知失妻有人失妻輅卜之令明旦於東陽城門侯擔豚人牽與共鬥其豚走逸即共追之豚入舍突破主人罋其婦從罋中出盜鹿有人捕鹿晨行有盜其鹿者輅曰汝巷中第三家也伺無人時以瓦子密發其東第七椽以瓦子著下當送還如其言其夜盜者父病詣輅卜令擔鹿皮肉著故處自愈盜如言乃令鹿主舉椽棄瓦盜父亦病癒也買鞭懸桑樹鮑瑗貧苦不信卜筮會淳于智至為作一卦曰君安宅失宜故貧入市有人持馬鞭賣買之以懸舍東大桑樹三年當暴得財如言後浚井得錢十萬銅二十斤燒殺人步熊字叔羆少好卜筮術數門徒甚盛熊舍側有人燒死吏持熊謂失火熊卜曰得其人矣使從道南行有一人來縳之果言云草惡難耕故燒之風起延燒不知草中有人不卜聖人不煩卜筮昆命于元龜惟先蔽志蔽斷也昆後也朕志去定卜以決疑不疑何卜鬥廉云命付天管輅謂鍾昱曰我卜可以知生死昱曰命付天不付君勞蓍龜郭璞欲為顏含筮含曰年在天位在人脩已而天不與命也守道而不回性也自有性命無勞蓍龜不占而已矣孔投龜于地張公謹秦王將討隱巢亂使卜人占之公謹自外至投龜于地曰凡卜以定猶豫決嫌疑今事無疑何卜之為卜而不吉其可已乎王曰善秦誗趙矜歷襄城丞客死柳州宮為歛葬後十七年子夾章始壯自襄陽往求其喪不得野哭再閱旬卜人秦誗為筮曰金食其墨而火以貴其墓直丑在道之右南有責神冢士是守宜遇西人深目而髯乃得其實明日有老人過其所問之得矜墓直社北遂歸葬鎖莖自屈義陽王琮子行休琮死桂林行休請身迎柩靈堂鎖一夕莖自屈管上有指跡一奇二並使卜人筮之曰屋於文為尸出指者示也一奇二並三殯也先生告之矣乃趣其所發之如言而一節獨闕城陽公主婚城陽公主初主之婚帝卜之繇曰二火相食始同榮末同戚請晝昏則吉馬周諫曰朝謁以朝思相戒也講習以晝思相成也燕飲以吳思相歡也婚合以夜思相親也故上下有成內外有親動息有時吉凶有儀今先亂其始不可為也夫卜所以決疑若黷禮慢先聖人所不用乃止改葬占地溫大雅改葬其祖卜人占其地曰弟則吉不利於君若何大雅曰如子言我含笑入地矣歲餘卒遇坤之泰太宗文德皇后長孫氏歸寧舅高士廉妾見大馬二丈五立舍外懼占之遇坤之泰卜者曰坤順承天載物宜無疆馬地類也之泰是天地交而萬物通也又以輔相天地之宜繇協歸妹婦人事也女處尊位履中而居順后妃象也折足為敗李綱在隋宦不進筮之得鼎筮人曰君當為卿輔然待易姓乃如志仕不知退折足為敗綱雖顯於唐數稱疾辭位去張公謹贊曰投機之會間不容檖公謹所以抵龜而決也自筮死日李嗣真流藤州久得還自筮死日豫具棺斂如言卒一卦帛十疋天寶末處士錢知微嘗至洛遂榜天津表柱賣卜一卦帛十疋居一日有貴公子讀榜命取帛如數卜焉錢命蓍布卦曰予筮可期一生君何戲為其人曰卜事甚切先生誤乎錢云請為韻語曰兩頭點土中心虛懸足人踏趿不肯下錢其人本意買天津橋也紿之其精如此酉陽雜俎筮命或馮蓍卜情將問蔡韓愈聯句三錢舞耳酒記王廷湊嘗謁五明道士卜擲三錢皆舞桑嫗各半資暇集桑道茂之門有嫗賣卜桑言休則嫗言咎桑言咎則嫗言休陳子昂自筮見貪濁門蓍龜九宮術盧藏用善蓍龜九宮術陰陽雜數賈耽陰陽雜數罔不通其器多招術家房孺復陳少游奏置幕府多招術家言己三十當得宰相以重權近希進以易自筮陸羽不知所生或言有僧得諸水濱畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之得乾之坤王廷湊始廷湊賤微時鄴有道士為卜得乾之坤曰君將有士及得鎮迎事甚謹卜不吉突厥處羅復謀取并州置楊正道卜之不吉左右諫止處羅曰我先人失國賴隋以存今忘之不祥卜不吉神詎無知乎賣卜長安市武攸緒少變姓名賣卜長安市天火之象馬重績晉高祖以太原拒命廢帝遣兵圍之勢甚危急命重績筮之遇同人曰天火之象乾健而離明健者君之德也明者南面而嚮之所以治天下也同人者人所同也必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北南乎乾西北也戰而勝其九月十月之交乎是歲九月契丹遂助晉擊敗唐軍晉遂有天下五代史卷五十七南瞻柝木木不自續遷司天監明年張從賓反命重績筮之遇隨曰南瞻柝木木不自續虛而動之動隨其覆歲將秋矣無能為也七月而從賓敗龜精錢元懿終年六十六初元懿之為新定有十方生時人號為龜精嘗疏卜辭以貽元懿曰太一接天河金華寶貝多君侯六十六別處不經過至是皆如其言吳越備史取質東龜余既幻惑力命之說兮身久放而愈疑心回穴其莫曉兮將取質夫東龜楚人俗巫而好術兮叟有鬻卜而來思乃招而訊之曰嘻人莫不塞有時而通伊我兮夕而滋蔓吾聞人稟五行動止有則四時轉續變於所極何卜賦見天地之情狀識陰陽之變文粹楊炯渾天賦曰帝之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有裨灶魏有石氏齊有甘公唐都之推星王朔之侯氣周文之視日吳範之占風有以見天地之情狀識陰陽之變通李鄴侯泌竇廷芝與卜者胡蘆生相善一日謂竇曰君家禍將至非遇黃中君鬼谷子將不可救芝物色求之得李鄴侯泌傾家結之未幾朱泚亂廷芝陷賊事平德宗命誅之泌以前事上聞得免劇談錄瓦卜休咎西京壽安縣有墨石山神祠頗靈神龍中前有兩瓦子過客投之以卜休咎仰為吉覆為凶南部新書一蓍獨立明皇兼潞州別駕來朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立奇瑞非常也不可言舊史蹈常而俟夫何卜何卜賦時乎去不可邀來不可逃淹兮孰捨孰操屠龍之伎非曰不偉時無所用莫若履豨作踴之工非曰可珍時有所用貴等斲輪絡首縻足兮驥不能踰跬前無所阻兮跛鱉千里同涉于川其時在風沿者之吉泝者之凶同蟄于野其時在澤伊穜之利乃穋之厄故曰是邪非邪主者時也諒淑惡之同出顧所下之若何夫如是得非我美失非我恥姑蹈常而俟之夫何卜為杜生易占見方術門卜者世之餘伎柳宗元非國語卜者世之餘伎也道之所元用也聖人用之吾未之敢非然而聖人之用也蓋以歐陋民也非常用而徵信矣雞骨占年拜水神柳宗元柳州峒氓厭就成都卜杜甫遊子五月為火火主離崔信明見五月五門最深於五行韓文李虛中誌最深於五行書以人之始生年月日所直日辰支干相生勝衰死王相斟酌推人壽夭貴賤利不利輒先處其年時百不失一二星官歷翁莫能與其校得失虛中誌其說汪洋奧義關節開解萬端千緒參錯重出學者就傳其法初若可取卒然失之星官歷翁莫能與其校得失本行正郎劉禹錫之為屯田員外郎時勢事稍異一僧有術數極精寓直日邀之至省方欲問報云韋生在門外公不得已且令僧坐簾下韋獻卷已略省之意色殊倦覺之乃去僧語不對吁嗟良久乃曰某欲言員外心不愜如何公曰但言之僧曰員外後遷乃本行正郎也然須待適來韋生知印處置公大怒揖出不旬日貶官韋乃處厚相也後三十年在中書劉轉屯田郎中白相人叔服來聘公孫敖聞其能相人有知人之鑒許助善相相術龍犀日角帝王之表朱建平相書曰額有龍犀入髮左角日右角月者王天下河目龜文公侯之相孔叢子曰仲尼聖人之表河目龍顙是帝皇之貌也又後漢李固狀貌有奇表鼎角匿犀足履龜文後為太尉已上見文選決疑歸田賦曰感蔡子之慷慨從唐生以決疑漢呂公謂高祖曰少好相人相人多矣無如季相不敢忘德父老相高祖曰君相貴不可言乃謝曰誠如父老言不敢忘德信而有徵億則屢中貴賤之表近取諸身休咎之徵如指諸掌應如影響著龜吉相豐下有後叔服來聘公孫敖聞其能相人見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯鷰頷封侯班超詣相者相者曰當封侯萬里之外問其狀相者曰鷰頷虎頭飛而肉食萬里侯相後封遠定侯山庭子貢有山庭之相月角有月角之相薄姬王者之妃許負相曹操安人之主喬玄相雖賤必貴史記姑布子卿善相見無恤曰真將軍也趙簡子曰是子其母賤翟娌也奚道貴哉子卿曰天之所受雖賤必貴貴不可言漢書蒯通說韓信曰相君之面不過封侯相君之背貴不可言奇骨晉桓溫字元子未期溫嶠見之曰此兒有奇骨真英物父彝以其為溫嶠所貴故名之曰溫躍馬肉食史記蔡澤問唐舉曰聞君相李兌百日之內合持國令有諸舉曰有之若臣者何如舉熟覽笑曰君顒鼻巨肩魋顏蹙額吾聞聖人不相殆先生乎澤知舉戲之乃曰富貴吾自有不知者壽也舉曰四十三年澤笑謝去謂其御者曰吾躍馬肉食四十三年亦足矣後果為秦相奴有侯相衛青至甘泉居至有鉗徒相青官至封侯青曰人之奴得無笞罵足矣安敢望封侯以經術進翟方進年十三為小吏號遲鈍數為椽吏罵辱方進自傷詣蔡父相大奇其形貌曰小吏有封侯之骨當以經術進因病而歸法直指胡廣廣為郡散吏太守法雄子真名知人雄敕真令助求人悉召諸吏人真窺之指胡廣遂舉孝廉為漢名臣公字相者謂陶侃曰君左手中指有豎理當為公若徹上貴不可言侃以針剌決之見血洒壁為公字後果應之功名壽年周訪遇善相者陳訓謂訪與陶侃曰二君皆位至方岳功名略同但侃上壽訪下壽優劣有殊好相羊祜字叔子游汶水濱父孝謂曰孺子有好相年六十建大功既言便去莫知所在論魏王朗論曰仲尼之門童冠之群不言形相之事難據故也固有懷不副貌行不稱聲故夫子以言信行失之宰我以貌度性失之子羽聖人於聽察精矣祠部式卜相築斷見上注相婦人黃霸與善相者同出見一相婦人者言當富貴乃巫家女霸娶為妻與之終身角犀豐盈賢明之相惟德受天以形合相貴賤且殊榮枯斯等鑄錢鄧通魏文帝之深意賣珠董偃遇館陶之厚恩衛青起自於牧羊蔡澤終聞於躍馬辨吳粲之貴始自幼童知陶侃之榮當斯老耄虛陳禍福謬托災祥事且無妄言而有徵論性命之期定吉凶之兆凶相蜂目忍人楚子以商臣為太子子上曰是人也蜂目豺聲忍人也不可立之豺聲滅族楚子良生子越椒子文曰是子也熊虎之狀豺狼之聲不殺之必滅若敖氏矣鬼由求食若敖氏之鬼不其餒而後果滅之傳縱理入口周亞夫縱理入口終餓死於獄中當刑而王黥布姓英氏少時客相之曰當刑而王及壯坐法黥布欣然笑曰人相我當刑而王幾是乎人有聞者共為戲笑餓死鄧通有相者云必餓死帝曰能富通者我也乃與銅山鑄錢景帝時以犯法竟餓死獄中父不祥莊子曰楚司馬子綦有八子召九方歅相之謂曰子則祥矣父則不祥也不過郡吏後漢趙壹以郡爭攻禮命十辟公府不就善相者相壹不過郡吏後果如其言覽鏡知刑蜀張裕曉相術每舉鏡視面目知刑死未嘗不撲之於地後為劉備所殺越王蜂目史記范蠡云眄刀甘卓為歷陽陳訓私曰甘侯頭低視仰相名眄刀目中赤脈自外入必兵死後果為王敦所殺豺狼之聲伯友始生叔向母及堂聞聲曰豺狼也必喪羊舌氏孔使相工視高智周始與郝處俊來濟孫處約共依江都石仲覽仲覽因各語所期處俊曰丈夫惟無仕仕至宰相乃可智周濟如之處約曰得為舍人在殿中周旋吐納可也仲覽使相工視之工語仲覽曰高之貴君不及見來早顯而末躓高晚顯而壽高蔣高智周所善義興蔣子謹有客嘗視兩人曰高公位極人臣而嗣少弱蔣侯官不達後且興蔣子孫其後果顯而高一世之後無聞鳶肩火色騰上馬周岑文本謂所親曰周鳶肩火色騰上必速乃不能久果年四十八而卒貴冠人臣蕭嵩有夏榮者善相謂嵩僚婿陸象先曰君後十年貴冠人臣然不若蕭郎位高年艾舉門蕃熾奇相李光顏為裨將節度使馬燧謂曰若有奇相終必光大解所佩劍贈之日角龍廷唐儉說秦王建大計曰公日角龍廷姓協圖讖係天下望久矣位至太師劉義節從子思禮少學相於張憬藏憬藏謂思禮歷剌史位至太師女有奇相高祖順聖皇后竇氏父毅在周為上柱國尚武帝姊襄陽公主常謂主曰此女有奇相且識不凡奇厖福艾李勣臨事選將必先相其奇厖福艾者遣之或問其故荅曰薄命之人不足與成功名熊虎相王晙氣貌偉特時謂為熊虎相識清貌古韓思復初鄭仁傑李無為者隱居太白山思復少從二人游嘗曰子識清貌古恨仕不及宰相也語遲者神定楊元琰生數歲未言相者視曰語遲者神定必為重器骨體祿命見骨體知祿命見命祿知骨體此則言命祿尚矣呂才有異相徐圓朗劉復禮說圓朗曰彭城有劉世徹才略不常有異相士大夫許其必王將軍欲自用恐敗不如迎世徹立之圓朗後為彭人所殺也日角珠廷非庸人相李玨李絳為華州剌史見之曰日角珠廷非庸人相明經碌碌非子所宜引出韋貫之為右丞時內僧造門曰君貴相貫之命左右引出曰此妄人也相夭且賤柳惲方十餘歲有巫告曰兒相夭且賤為浮屠道可緩死諸父從其言惲曰去聖教為異術不若速死學愈篤有封侯相顧彥朗彥暉並為天德軍小校其使蔡京以兄弟有封侯相每厚禮之子孫當王百年王廷湊嘗使至河陽醉寢于路有過其所者視之曰非常人也從者以告延湊馳及之問其故曰吾見君鼻之息左若龍右若虎子孫當王百年家有大樹覆及堂公興矣及害弘正而樹適庇寢自延湊訖鎔凡百年耳大貴兆李忠臣帝嘗謂卿耳大貴兆對曰驢耳大龍耳小帝喜其野而誠不可以科第進鄭朗始朗舉進士有相者言君當貴然不可以科第進俄而有司擢朗第一既又覆實被放相者賀曰安之已而果相龍鳳之姿天日之表太宗生四歲有書生謁高祖曰公在相法貴人也然必有貴子及見太宗曰龍鳳之姿天日之表其年幾冠必能濟世安民伏犀貫玉袁天綱見竇軌曰君伏犀貫玉就輔角完起十年且顯立功其在梁益間耶右輔澤而動軌後為益州行臺僕射天綱復曰赤脈于瞳方語而浮赤入大宅公為將必多殺願自戒軌果坐事見召天綱曰公毋憂右輔澤而動不久必還果還為都督面部三無金華子李寬為常侍有門下士姓盧善相或問李公如何曰據其面部所無者三無子無宅無塚公有數子皆先公卒有宅未嘗還鄉居死于池州乘舟歸舟破沉其骨龍瞳鳳頸武后之幼天綱是其母曰夫人法生貴子乃見元慶元爽曰官三品保家主也見韓國夫人曰此女貴而不利夫后最幼姆抱以見紿以男天綱視其步與目驚曰龍瞳鳳頸極貴驗也若為女當作天子肉不稱骨帝在九成宮令視岑文本曰學堂瑩夷故文章振天下首生骨未成自前而視法三品肉不稱骨非壽兆也同上豕視淫長社人張憬藏伎與天綱埒郎中裴珪妻越見之憬藏曰夫人目脩緩法曰豕視淫又曰目有四白五夫守宅夫人且得罪俄坐姦沒入掖庭天下之母周世宗宣懿皇后符氏初適李守貞子祟訓守貞事漢為河中節度使已挾異志有術者善聽聲以知吉凶守貞出其家人使聽之術者聞後聲驚曰此天下之母也守貞益自負曰吾婦猶為天下母吾取天下復何疑哉五代史蘭臺學堂袁天綱謂杜淹曰公蘭臺學堂全且博將以文章顯謂王珪法令成天地相臨不十年官五品謂韋挺面如虎當以武處官然三君皆得譴武德中以事俱流嶲州見天綱曰公等終且貴杜位三品難與言壽王韋亦三品後於杜而壽過之耳無根天綱見馬周曰君伏犀貫腦背若有負貴驗也近古君臣相遇未有及公者然面澤赤而耳無根後骨不隆壽不長也厄在三尺土下張憬藏伎與天綱埒蔣儼有所問荅曰公厄在三尺土下盡六年而貴六十位蒲州刺史無有祿矣後儼使高麗為莫離支所囚居土室六年還果為蒲州刺史妻孥告當死俄聽致仕相在怒時魏元忠尚少往見憬藏問之久不答元忠怒曰窮通有命何預君耶拂衣去憬藏據起曰君之相在怒時位必卿相大書台字裴光庭當國憬藏以紙大書台字投之光廷曰吾既台司矣尚何事後三日貶台州刺史大怖得輔政金梁鳳玄宗時人謂呂諲曰君且輔政須大怖乃得諲責驛史榜之吏突入射諲兩矢幾中走而免明年知政事跛男子袁客師天綱子嘗渡江叩舟而還曰舟中人鼻氣皆黑不可以濟俄有一男子跛而負直就舟客師曰貴人在吾可以濟江中風忽起幾覆而免跛男子乃婁師德也相之相在乎清明唐贊皇公折群疑相論相之相在乎清明清明者珠玉是也為天下所寶窮相李白召見及出上指謂力士曰此人固窮相酉陽雜俎以慧性知人爵祿厚薄壽命長短韓愈送仙翁序以慧性知人爵祿厚薄壽命長短發言如駃駟囁嚅持疑於唇吻間即信乎異人也若古之許負輩不足以言哉直將相五代李周盧嶽謂之曰吾少學星曆且工相人子方頤隆準眉目疏澈身長七尺真將相也吾占天象晉必有天下子宜留事晉以圖富貴以相法隱市中五代錢鏐縣錄事鍾起有子數人多竊從之遊豫章人有善術者望斗牛間有王氣牛斗錢塘分也因遊錢塘占之在臨安遂以相法隱市中陰求其人私謂起曰占君縣貴人求之市中不可得視君之相貴矣然不足當之術者過起家鏐適從外來見起反走術者望見之曰此真貴人也召至熟視之顧起曰君之貴因此人乃慰鏐曰子明法非常願自愛拳必入口九國志吳殷文圭舉進士塗中遇一隻目文圭久之謂人曰向者一人眉綠拳必入口神仙狀也如學道當沖虛不爾有大名於天下而文圭拳實入口乾寧中擢第風雷之厄南漢楊洞潛洊水令梁愚堂謝洞潛見之謂同列曰愚血脈貫眸子行步矍鑠類驚麇者當有風雷之厄及愚至縣未幾颶風壞廨壓死言人事多中趙鳳傳術士崔玄豹以相法言人事多中莊公尤信重之以為北京巡官明宗為內衙指揮使重誨欲試玄豹乃使他人與明宗易服而坐明宗於下坐召玄豹相之玄豹曰內衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思玄豹以為神召至京師鳳諫曰好惡上所謹也今陛下神其術而召之則傾國之人皆將奔走吉凶之說明宗遂不復召五代史二十八唐臣傳骨法非常文穆王元瓘淮將李濤冠衣錦軍命王討之自是日者視王曰此人手為百人當大貴有僧自新常衣紙衣住廣德山院聞元瓘至舉家皆遁而自新巋然晏坐軍中有問其故曰前後左右皆兵耳將安適時王在眾中新乃歛衣奉迎與語久之及師還遂載而歸後王問新當時何以見識荅曰微僧無它術但睹王骨法非常故幸得識矣出吳越史額文似臨淮柏良器父友王奐為光弼從事見之曰爾額文似臨淮王面黑子似顏平原殆能立功乃薦之光弼唐史亞夫下獄相南唐宋齊丘微時日者相之曰君貴不可言然亞夫下獄相君實有之位極之日當早引退庶幾保全齊丘登相位數載致仕復以大司徒就徵未幾坐陳覺謀干紀事乃賜死論心擇術孫卿子曰古有姑布今有唐舉相形不如論心論心不如擇術
