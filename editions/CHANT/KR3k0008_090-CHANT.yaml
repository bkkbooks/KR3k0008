body:
  text: 卷第九十白神降傳有神降於莘周內史過曰國將興神降之鑒其德也將亡神又降之觀其惡也故有得神以興亦有得神以亡聞虢請命神賜之土史嚚曰國將興聽於民國將亡聽於神乏主傳民神之主也若百姓困是鬼神乏主也惟爾有神裁之禱祀億吾鬼神衛安格思詩神之格思不可度思仰得一之靈老子曰神得一以靈神無以靈將恐歇降時萬之福十爾有神時萬時億神則不怒而威無作神羞禮曰百眾以畏萬民以服明神明靈神有不通楚辭靈將恐歇見上亦莫不寧山川鬼神鬼神享德禱祀貴誠幽則有鬼神言可以助天地成化率人事神以禮依人鬼神依人而行洋洋乎若在其上聰明正直知鬼神之情狀與天地相似鬼謀宣室之問漢文受厘宣室感鬼神事問賈誼誼具道所以然至夜半文帝前席無鬼論阮瞻字千里製無鬼論人莫能難自謂此理可辨正幽明有客來論甚苦遂乃作色曰僕即鬼也因不見之載鬼一車易感而遂通神之盛也禮曰氣也者神之盛也魄也者鬼之盛也肸蠁冥寞幽途無鬼晉阮脩常有論鬼神者皆以人死為鬼脩獨以為無今見者云著生時衣服若人死有鬼衣服亦有鬼耶論者大服脩字宣子罔象浮光蜮域畢方度朔並鬼名也精氣為物遊魂為變孔以鬼動眾王世充李密破化及還屯金墉勁兵良馬多死世充欲擊之恐上心未一乃謀以鬼動眾令德陽門衛張永通言夢人謂已曰我周公能以兵助討密世充立祠洛旁使巫宣言周公令急擊密有大功不然兵且疫世充下皆楚人信妖遂請戰龐勛好鬼道有言漢高祖廟夜閱兵人馬流汗勛日往請命蜀人畏鬼高士廉進益州長史蜀人畏鬼而惡疾雖父母病皆委去望舍投餌哺之士廉為設條教辯告督勵風俗翕然為變去托鬼神致位將相王璵吾受命不私陸元方使嶺外方涉海風濤驚壯元方曰吾受命不私神豈害哉以紙寓錢王璵擢侍御史為祠祭使專以祠解中帝意漢以來葬喪皆有瘞錢後世里俗稍以紙寓錢為鬼事至是璵乃用之韋正貫擢嶺南節度使南方風俗右鬼正貫毀淫祠教民毋妄祈會海水溢人爭咎撤祠事以為神不厭正貫登城沃酒誓曰不當神意長人任其咎無逮下民俄而水去陳子昂上言夏商之衰桀紂昏暴山川鬼神發妖見災馬醫夏畦之鬼柳宗元荅許京兆孟容書每遇寒食則北向長號馬醫夏畦之鬼無不受子孫追養者然此已息望又何以云哉柳宗元貞符詩曰天子誠神宜鑒於仁神之曷依宜仁之歸廟於羅池既設柳人懷之託言降于州之堂人有慢者輒死廟於羅池韓愈因碑以實之神相趙昶巢之圍昶夜掫師疲而寢如有神相之者黎曙決戰士爭奮死斗禽賊酉數人斬級千餘人而狼首薛延陀傳初延陀將滅有丐食於其部者延客帳中妻視客人而狼首主不覺客已食妻語部人共追之至鬱督軍山見二人焉曰我神也薛延陀且滅追者懼郤走遂失之至是果敗人之年事韓愈祭文神之所依者惟人人之所事者惟神為鬼所殺明崇儼儀鳳四年為盜所刺於東都好事者為言崇儼役鬼勞苦為鬼所殺善視鬼張果時有師夜光者善視鬼帝召果密坐使夜光視之不見果所在降丹鳳門陳希烈天寶元年有神降丹鳳門以為老子告賜靈符鬼夜哭五代王鎔已死張文禮自為留後文禮家鬼夜哭文禮懼病疽卒山魈五代李業高祖皇后弟隱帝即位宮中數見怪物投瓦石撼門扉隱帝召司天趙延乂問禳除之法延乂對曰臣職天象日時察其變動以考順逆吉凶而已禳除之事非臣所知也然臣所聞殆山魈也太白山神五代劉延朗初廢帝起鳳翔與事者五人而延朗為孔目官有瞽者張濛自言事太白山神神崔浩也其言吉凶無不中房暠素信之嘗引濛見帝聞其語聲驚曰此非人臣也暠使濛問於神神傳語曰三珠並一珠驢馬沒人驅歲月甲庚午中興戊己土暠不曉其義濛曰神言如此不能解也帝即位之日受冊明宗柩前冊曰惟應順元年歲次甲午四月庚午朔帝回顧暠曰張濛神言豈不驗哉夜叉精高澧夜叉精也嘗請太學博士丘光庭校書於樓中澧亦屢往視之一日蔑而登光庭之知因回顧見一青面鬼遂大呼俄而見澧撫之曰謹勿言之以是驗其非人吳越備史忽見緋衣人駕赤虯持一板書李商隱李賀小字李長吉將死時忽晝見二緋人駕赤虯持一板書若太苦篆或霹靈石文者云當召長吉長吉了不能請欻下榻叩頭言阿彌老且病不願去緋衣人笑曰帝成白玉樓立召君為記天上差樂無苦也目圍車輪光射島嶼李白天門山銘云推川有神牛渚怪物目圍車輪光射島嶼氣凌星辰牛鬼蛇神不足為其虛荒誕幻杜牧之李賀詩序甘棠詩會昌中許孝廣路由甘棠館逢白衣叟乘馬吟曰春草萋萋春水綠野棠開盡飄香玉繡嶺宮前鶴髮人猶唱開元太平曲忽入林不見鬼市長安中秋夜有人聞吟曰大街鼓歇行人絕九衢茫茫空有月又有聞和者曰九衢生何勞勞長安土盡槐根高俗云務本西門是鬼市南部新書樵夫頑民不知鬼神凡過祠廟不笑即唾孫樵文逐痁鬼孫樵文吾聞有陳萬年者射利乘機迎顏作怡愉愉便佞阿意奉歡死而有知是為諂鬼此鬼依人使人蒙福人見輒喜擺去不得復有公孫洪者克已沽名飾情釣聲內包禍心外示舒弘死而有知是為矯鬼此鬼憑人使人有聞上信於君下喜於民復有司馬安者攘義盜仁縛舌膠唇柔聲婉顏狐媚當權死而有靈是為巧鬼此鬼依人辭枯即榮長劍華纓高步天庭復有和長輿者鉅萬藏家貫朽仄磨鱗差螭縮陣陣腥澀死而有知是為銨鬼此鬼憑人使人氣豪意適交權貶祿買曲成直此四鬼者苟與吾游吾必快所求是資於他鬼也此為我招之無鬼論林蘊父披以臨汀多山鬼淫祠民厭苦之乃撰無鬼論有嘯於梁從而燭之無見也斯鬼乎曰非也鬼無聲有立於堂從而視之無見也斯鬼乎曰非也鬼無形有觸吾躬從而執之無得也斯鬼乎曰非也鬼無氣韓文岳神迎帝將登泰山過華陰見神物迎謁問左右皆不見乃問諸巫有老巫阿馬婆云岳神在道左朱鬒紫衣者是也令巫傳言神可先歸遂不見至廟神復橐鞬迎立庭下呼巫問之對如所見乃封神金天王開元傳信記鬼神事眇茫荒惑無可推明者所不道柳宗元與韓愈論史不欲與鬼神為讎歙州江處士好道能制鬼魅有婦人嘗為鬼附詣江求符江曰吾雖能禦之意不欲與鬼神為讎爾既告我當善為遣之歸酒一室令童子迎客良久一少年見江再拜江命坐不交一言而去婦人自是不復見異人錄稱江淹謝莊鮑生畜聲伎韋生好乘馬一日相遇於途各出所有互易之會飲未終有二人造席曰聞以妾換馬可作題共聯賦否乃折葉書之自稱江淹謝莊異聞錄瀆鬼濛鴻岳只嶪峨韓愈聖德詩山鬼迷春竹湘娥倚暮花杜甫北境黎丘之古鬼焉或醉父以刃其子李白神者不在於禨鬼而在於宗廟皮日休鹿門隱書白欲徼願乞靈神不享矣致力於神可薦於鬼神謂潢汙行潦敬則可薄也神之吊矣丘之禱久矣鬼神罔饗祭祀為誠無瀆鬼神鬼神無常享享于克誠鬼神非其類不歆其祀鬼猶求食禱祀古之卿士有益於人者非其鬼而祭之者諂也鬼難乏主神必依人祭神如神在獲罪於天無所禱也祭有祈焉有報焉有由弭焉祭祀不祈供給鬼神孔海道酌水誓王義方道南海丹師持酒脯請福義方酌水誓曰有如忠獲戾孝見尤四維廓氛千里安流神之聽之無作神羞是時盛夏濤霧蒸湧既祭天雲開露人壯其誠專以祠解中帝意王璵為祠祭使專以祠解中帝意有所祈禳太抵類巫覡造大樓祈祥劉闢吐不臣語求統三川日以術家言五福太一舍于蜀乃造大樓以祈祥帝始重征討宰相杜黃裳且言闢妄書生耳可鼓而浮也斬于城西南誓神得泉裴識徙靈武等軍靈武地斥鹵無井識誓神而鑿之果得泉媼龍祠李紳始紳南逐歷封康間湍瀨險澀惟乘漲流乃濟康州有媼龍祠舊傳能致雲雨紳以書禱俄而大漲裴行儉帝詔行儉冊送波斯王且為安撫大食使徑莫賀延磧風礫晝冥導者迷路將士饑乏行儉止營致祭令曰水泉非遠眾少安俄而雲徹風恬行數百步水草豐美後來者莫識其處眾皆驚以方漢貳師將軍張守珪有詔以瓜州為都督府即詔守珪為都督州地沙塉不可蓺是時渠竭為虜毀材木無所出守珪密禱于神一昔水暴至大木數千障塞流下因取之脩復堰防耕者如舊州人神之刻石紀事蕝祠以祭李嗣業高仙芝留為疏勒鎮使城一隅阤屢築輒壞嗣業祝之有白龍見因其處蕝祠以祭禱江劉漢宏悉軍十萬列艦西陵謀宵濟襲董昌禱於江有一矢墜前惡之禱軋犖山安祿山母居突厥中禱子於軋犖山虜所謂斗戰神者既而妊匿林中禱馬五代史李克用鎮人襲之克用匿林中禱其馬曰吾世有太原者馬不嘶馬偶不嘶以免拂雲祠張仁愿始朔萬軍與突厥以河為界北崖有拂雲祠突厥每犯邊必先謁祠禱解然後料兵度而南粉牆丹柱森然魄動下馬拜松柳一逕趍靈官粉牆丹柱動光彩鬼物圖畫填青紅升階傴僂薦脯酒欲以表薄明其衷廟令老人識神意睢盱偵同能鞠躬手持杯珓道義擲云此最吉餘難同韓愈衡廟詩圖像之威黯昧就戮故制桷樸下窄不足以揭虔妥靈而又梁桷赤白侈剝不治圖像之威黯昧就戮藩拔級夷庭木禿缺偃王廟碑女巫澆酒雲滿空玉爐灰火香鼕鼕寒雲山鬼來座中紙錢窗窄鳴飆風李賀神位立祠房解祓張嘉祐開元末為相州刺史舊刺史多死官眾疑畏嘉祐以同總管尉王迥死國難忠臣立祠房解祓眾心為安三歲入為左金吾衛將軍後吳兢為刺史又加神冕服遂無患白天道福善禍淫神之所惡神所勞矣禮節君子神必據我據安也神所憑依將在德矣神其吐之吐之謂不享其祭神降之福降福穰穰小信未孚神不福也介爾景福小爾百福時萬時億老子曰以道蒞天下其鬼不神非其鬼不神其神不傷人也不善之家福實由已有道之日神不傷人監德觀惡見鬼神門鬼神害盈而福謙易善為積慶正可鬥邪狐突適下國見太子申生申生曰夷吾无禮吾將請於帝矣將以晉畢秦後七日將有巫者見我曰帝許我伐有罪矣斃於韓左傳云多福作梗無忠為崇孔諭以禍福和政公主吐蕃犯京師主避地南奔次商於遇群盜主諭以禍福皆稽顙願為奴禍不旋踵上官儀自褚遂良等元老大臣相次署覆公卿莫敢正議獨儀納忠禍又不旋踵陰禍裴炎斬于都亭初炎見裴行儉破突厥有功沮薄之乃斬降虜阿史那伏念等五十餘人議者恨其媢克且使國家失信四夷以為陰禍有知云禍福無基河間元王孝恭輔公祏反為行軍元帥討之將發大饗士桮水變為血坐皆失色孝恭自如徐曰禍福無基惟所召爾顧我不負於物無重諸君憂公祐禍惡貫盈今仗威靈以問罪桮中血乃賊臣授首之祥乎盡飲罷眾心為安本傳福善禍淫之訓有時而撓張薑武元衡李絳贊鎰元衡暴忠王室絳巨德大臣皆為賊奸所乘不歿元身蓋福善禍淫之訓有時而撓當諭眾以禍福段秀實謂朱泚曰公本以忠義聞天下變起倉卒當諭眾以禍福肅清宮室臣聞天下有危機禍福因之陳子昂三止天下有危機禍福因之而生機靜則有福動則有禍護養孽萌以成禍根藩鎮序乘機反禍崔日用才辯絕人敏於事能乘機反禍取富貴問振災邀福韋綬帝問所以振災邀福者對曰宋景公以善言退法皇三舍漢文除秘祝敕有司祭而不祈此三君皆受自至之福書美前史如失德以郤災媚神以丐助神而有知且因以譴也時帝不德故托諷焉以檢校戶部有非常之福必有非常之禍楊炎自道州還也家人以綠袍木簡棄之炎止曰吾嶺上一逐吏迢登上臺可常哉有非常之福必有非常之禍安可棄是乎及貶還所服禍有何常張道源拜大理卿時何稠得罪籍其家屬賜群臣道源曰禍福何常安可利人之亡取其子女自奉仁者不為也更資以衣食遣之詭跡避禍裴度自見功高位極不能無慮稍詭跡避禍逃禍徐堅初太平公主用事武攸暨屢邀請堅堅不許又以妻岑義女弟固辭機密轉太子詹事曰吾非求高逃禍耳推福及子孫蔡史玉朱泚奏署幕府是時幽州兵強財雄士驕悍曰吞並不知有上下禮法廷玉間語泚曰古未有不臣而能推福及子孫者李岫林甫子岫為將作監見權勢熏灼惕然懼常從遊後園見輦重者跪涕曰大人居位久積棘滿前一旦禍至欲比若人可得乎林又不樂曰勢已然可奈何終免於禍楊涉昭宗時仕至吏部侍郎哀帝時進同中書門下平章事方賊臣陵慢王室殘蕩賢人多罹患涉受命與家人泣語其子疑式曰世道方極吾嬰網羅不能去將重不幸禍且累汝然以謙靖終免於禍積善以致福脩德以消禍高郢代宗為太后營章敬寺郢上言古之明王積善以致福不費財以求福修德以消禍不勞人以欀禍韓愈原鬼故其作而接於民也無恒故有動於民而為福亦有動於民而為禍亦有動於民而莫之為禍福適丁民之有是時也福不以屢徼幸陸贄奏議禍或生福福亦生禍故晉勝鄢陵范蠡祈死吳克勁越夫差啟殃是知福不以屢徼幸劉公殘暴文粹張謂宋受命壇記漢氏寬仁胤緒成大族劉公殘暴子孫無遺種君子小人之禍福五代史君子小人之禍福異也老子曰禍兮福所倚福兮禍所伏後世之談禍福者皆以其言為至論也夫為善而受福焉得禍為惡而受禍焉得福惟君子之罹非禍者未必不為福小人之求非福者未嘗不及禍此自然之理也問事佛營福其應奈何張士衡太子問事佛營福其應奈何對曰事佛在清淨仁恕爾如貪惏驕虐雖輕財事之無損於禍且善惡必報若影赴形聖人言之備矣為君仁為臣忠為子孝則福祚永反是而殃禍至矣時太子以過失聞士衡因是規之然不能用也知星者言上象變不利大臣請禳之光庭曰使禍可禳而去則福可祝而來也論者以為知命君子得禍為不幸而小人得禍為常君子得福為常而小人得禍為不幸韓文敬遠四白子曰敬鬼神而遠之可謂智矣子不語怪力亂神傳曰國將亡聽於神國將興聽於民季路問事鬼神子曰未能事人焉能事鬼鬼神之德子曰鬼神之為德其至矣乎視之而不見聽之而不聞使天下之人齊明盛德以承祭祀洋洋乎如在其上如在其左右不加敬而人自祇仲尼曾不語神季路焉能事鬼鬼神享德祭祀貴誠子曰夏道周人皆事鬼敬神而遠之殷人尊神先鬼而後禮瀆神人神異業不可瀆之史記孔迎佛骨上表韓愈迎佛骨上表曰況其身死已久枯朽之骨凶穢之餘豈宜令入官禁孔子曰敬鬼神而遠之古之諸侯行吊於其國尚令巫祝先以桃茢祓除不祥然後進吊慢侮即死韓愈羅池廟碑明年吾將死死而為神後三年為廟祀我及期而死廟成大祭過客李儀醉酒慢侮堂上得疾挾出廟門即死淫應肸蠁鼓簧而吹笙由是憧憧往來無不加敬喬潭女媧陵記白白虎囓驂史記秦二世夢白虎囓驂卜曰涇水為崇乃沉馬祭之黃熊入寢晉侯有疾夢黃熊入寢于時子產聘晉晉侯使韓子周子產曰何厲鬼手對曰昔堯殛鯀于羽山其神化為黃熊于羽洲實為夏郊三代祀之為盟主其未祀乎乃祀夏郊晉侯乃間淫昏邾文公用鄫子於次睢之社子魚曰用人於淫昏之鬼貝丘之豕齊侯田於貝丘見大豕從者曰公子鼓生也豕人立而啼伯有猶能為鬼乎子產曰人生始化曰魄既生魄陽曰魂用物精多則魂魄彊匹夫匹婦彊死而魂魄猶能憑依於人以為淫厲況良宵三世執其政柄而彊死猶能為厲不亦宜乎傳曰鄭人相驚以伯有至矣或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒明年壬寅公孫段卒國人愈懼子產乃立良止以撫之乃止曰鬼有所歸乃不為厲吾為歸也實沉台駘晉侯疾卜曰實沉台駘為祟子產曰實沉參神也台駘汾神也抑此二者不及君身山川星辰之神又何為乎河神為祟楚昭王疾卜曰河神為祟王不祭大夫請祭之王曰三代命祭祀不越望江漢濉漳楚之望也不谷雖不德河非所獲罪遂不祭既非正直之神曾是淫昏之鬼社官之鬼謀以亡曹莘邑之神降而滅虢黎丘梁叟患黎丘之鬼爭光嵇康夜燭下見鬼熟視乃滅燭曰恥與魑魅爭光當有道之日物不為妖而棄常之人鬼或為厲神奸夏方有德鑄鼎象物而為之備使民知神奸故人入山林不逢魑魅魍魎之屬鬼責莊子王表吳臨海羅陽縣有神自稱王表周游人間飲食言語無異而形不可見孫權以羅山印綬授表表隨使語權所在與守令旋論水旱往往有驗明年亡去孫盛曰求福妖邪亡之道也亡兒入夢蔣濟字子通妻夢亡兒曰今為太山伯憔悴困苦不可言今廟西有謳士孫珂為太山令願屬珂令轉我樂處濟訪得珂言之珂許後月餘夢曰已得轉太山錄事大厲具後報怨注中晉侯夢妖夢傳曰狐突不寐而與申生言故曰妖夢立神式祠部式私家不得立雜坐及巫覡十並宜禁斷淫厲五孔高宗廢后以巫祝解謝王氏及良娣俄為武后所殺武后頻見二人被髮瀝血為厲惡之以巫祝解謝即遷蓬萊宮厲復見故多駐東都唐兵為崇薛舉郝瑗謀曰今唐新破將卒禽俘人心搖矣可乘勝直趍長安舉然之方行而疾召巫占視言唐兵為祟舉惡之未幾死女厲進謝庭中李景略李懷光為朔方節度使署巡官五原將張光殺其妻以貲市獄前後不能決景略覈實論殺之既而有若女厲者進謝庭中如光妻云冤氣在天高沐初淮西平師道勢蹙內甚懼李公度與大將李英曇教獻三州使長子入侍師道然可俄中悔欲殺英曇賈直言諷師道嬖奴曰高沐冤氣在天禍且至英曇復死是益其崇也乃止見有物為厲武后有上封事言嶺南流人謀反者太后遣攝右台監察御史萬國俊就按得實即論決國俊至廣州盡召流人矯詔賜自盡皆號哭不服驅之水曲使不得逃一日戮三百人乃誣奏流人怨望請悉除之太后久乃知其冤使所殺者還其家國俊亦相踵而死皆見有物為厲云弓射宋瑾其死也尸之廣陵北門路人私共瘞之是時民多病瘧皆取其墓上土水服之病輒愈更益新土漸成高墳徐溫等惡之發其尸投於雷公塘其後溫病夢瑾挽弓射之溫懼網其骨葬塘側立祠其上五代召巫祈之玄宗太子瑛武惠妃訴于帝有詔太子瑛鄂王瑤光王琚同惡均罪並廢為庶人尋遇害天子冤之號三庶人歲中惠妃數見庶人為祟因大病夜召巫祈之請改葬且射行刑者瘞之訖不解妃數歲亡白死既有知鬼猶報怨人為不道鬼訴無辜趙氏之冤搏膺入夢晉侯殺趙同趙括及疾夢大厲鬼被髮搏膺而踊曰殺余孫不義予得請於帝矣良夫之酷被髮叫天衛侯殺軍良夫夢見比宮人被髮北面譟曰予為渾良夫叫天云無辜有怨必讎伯有之殺駟帶無道則見齊侯之懼彭生不察其由自貽伊咎鬼誅鬼得而誅當休明之代物不為妖而聚怨之人鬼將有報魏其之讎田蚡田蚡殺魏其侯灌夫其春蚡病一身盡痛若有擊者呼伏謝罪下所視鬼瞻之曰魏其侯灌夫共笞殺之徐伯之讎仲堪殷仲堪先游江濱見流尸接而葬之句日門前溝忽起為岸夕有人通徐伯曰君惠以報水岸為洲君當為州言終而沒果為荊州女子稱冤後漢王純為郿令至釐亭夜中聞女子稱冤言是長亭所殺即今門下游徼是也純為理之具服亭下遂無怪結草左傳魏顆用父治命嫁嬖妾及輔氏之戰顆見老人結草以亢杜回杜回躓而顛遂獲杜回夜夢老人曰予所嫁婦人之父也爾用先人治命予是以報孔盧鉉本以御史事韋堅為判官善張瑄及按謹矜則誣瑄死它日見瑄如平生乃曰公何得來此願假須臾卒死援刀自刳腹酷吏郭弘霸嘗按芳州刺史李思征不勝楚毒死後屢見思征為厲命家人禳解俄見思征從數十騎至曰汝枉陷我今取汝弘霸懼援刀自刳腹死頃而蛆腐叩頭若謝罪狀崔器兩京平令王官陷賊者悉入含元廷中乃建議陳希烈達爰珣等數百人皆抵死士元元年病亟叩頭若謝罪狀家人問之曰達奚珣訴於我三日卒生人接死五代蘇逢吉族李崧家逢吉夜宿金祥殿東閣謂司天夏官正王處訥曰昨夕未瞑已見李崧在側生人接死者無吉事也周太祖至北郊官軍敗于劉子陂逢吉宿七里夜與同舍酣飲索刀將自殺為左右所止明日與隱帝走趙村自殺於民舍太祖定京師梟其首適當李崧被刑之所叩頭乞命朱泚敗去涇州百餘里馬上忽云叩頭乞命因之墜馬良久蘇左右問其故曰見段司農尋為韓旻梟之南部新書朱弓彤矢楊收之死軍容楊玄介有力焉收有子為壽牧見收乘白馬臂朱弓彤矢有朱衣天吏控馬口上帝許我讎楊玄介我射之已必死也俄而玄介暴卒同上世人盛言宿業報應柳玭家訓曰舒相國元輿與李繁有隙為御史鞫譙獄窮致繁罪後舒亦及禍世人盛言宿業報應賣花娘子稽神錄鄂州有田家子既仕欲結豪親而謀其故妻棄尸江側井其婢已而奔告其家號哭云為人所殺後數載奉使廣陵舍逆旅見一婦人賣花貌類其殺婢既近乃真且云往者為賊所繫幸而不死得賈人船寓載東下今在此賣花給食而已復問娘子所在可見之乎曰可即入一小曲巷中指一貧舍曰此是也其妻乃述艱苦俄而設食具酒延入內室日暮不出從者覘之但見白骨一具衣服毀裂流血滿地問其鄰云此宅久無人居也白王猛賣畚王猛少貧鬻畚洛陽有一人貴買之而無直猛利其直從行不覽入深山見一老父踞胡床左右十數人引猛進拜之父云王公何緣拜也乃十倍償畚價猛出反顧乃嵩山也應嫗得金應嫗者生四子而寡見神光照社試探之乃得金自是諸子官崇並有才名至應場七世通顯也糜笁家失火蜀志糜笁字子仲東海人資累巨億從洛還家行未到數十里路傍逢一婦人求車寄載行二十里婦人謝去曰天使我往東海燒糜笁家感君義故相告笁愁請之曰不可不燒君快去我緩行笁急歸盡出財日中果火發陸雲宿王弼墓晉書陸雲字士龍將宿故人家夜暗迷路忽草木有光趨之至一家寄宿見一少年美風姿共談老子辭致深遠曉辭去至故人家云此數十里無人居卻尋乃至王弼墓雲自此談玄大勝嵇康受廣陵散嵇康夜宿華亭彈琴夜半有客詣之共談音律辭致清辯謂廣陵散調絕倫遂授康仍誓不得傳康撰高士傳管寧得神光管寧就征將家屬行夜黑無人見有火燼引人以為神光助積善之應也孔坎地獲古戟十二尹思貞加銀青光祿大夫其家坎地獲古戟十二俄而門樹戟時人異焉為公呵禦蕭遘字得聖繇起居舍人斥播州司馬道三峽方迫畏不瞑若人有謂曰公無恐余為公呵禦遘怳悟俄謁白帝祠見帝貌類向所睹異之秦彥高駢傳秦彥者本名立隸伍籍乾符中以盜系獄且死夢謼曰秦彥而從我去寤而視械破因得亡命後即名彥神覆藥鼎玄宗元獻皇后楊氏帝在東宮后以景雲初入宮為良媛時太平公主忌帝而宮中左右持兩端纖悉必聞媛方娠帝而不自安密語侍讀張說曰用事者不欲吾多子奈何命說挾劑以入帝於曲室自煮之夢若有介而戈者環鼎三而三煮盡覆以告說說曰天命也乃止生男是為肅宗忽曰得活懿宗淑妃郭氏幼入鄆王邸宣帝在位春秋高惡人言立太子事王以嫡長居外宮心常憂惴妃護侍左右生女未能言忽曰得活王驚異之神光滿身唐杜陽編宣宗在藩邸忽一日不豫神光滿身南面獨語如對百寮鄭太后惶恐遂奏文宗云上心疾文宗召見熟視上貌以玉精如意撫腔曰此真我家他日英主女登感神而炎運作文粹崔融啟母廟碑華胥履跡而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黑精降裴寂隋開皇中調左親衛家貧徒步走京師過華山祠祈神自卜夜夢老人謂曰君年逾四十當貴後貴震當世白天乃降災國時有恐鑄鼎象物聖人備罔兩之姦懸鏡鑒形道士防魑魅之惑反物為妖傳曰天反時為災地反物為妖人反德為亂亂則妖災生國將亡必有妖孽何奇不有何怪不儲海賦是何祥也或有憑焉吉凶休咎沴氣咎徵怪物文子曰明於性者天地不能協審於符者怪物不能惑使人知神姦謂鑄鼎象物怪人周禮大傀周禮凡大傀災異合去樂注云傀怪也十煇周禮視祲掌十煇之法以觀妖祥以辨吉凶注云煇氣也其類有十物魅百物之魅祲象謂祲形象妖不勝德祅禳祅除厭勝厭禱見豕負塗易桑榖共生于朝書毫有祥云史記曰七曰大拱石言於晉師曠曰石不能言或憑焉不然民聽濫也六鷁退飛過宋都內蛇與外蛇鬥內蛇死六年而鄭厲公入殺鄭子子不語怪力亂神王母籌漢成帝時關東人行西王母籌斑云元后壽考之稱見人徹屋鼠觸人漢霍禹將誅人其見有人居其屋上徹瓦投地就視無人第中鼠與人相觸第門皆自壞犬禍漢成河平年長安人石良見物如人狀在其室中擊之為狗走去數日有數十人被甲持弓弩至良格擊或死或傷皆為狗五月乃曰犬禍也驢鼠晉宣城郡有一物大於水牛灰色庳腳腳類象胸前尾上皆白爪力而遲鈍到城下郭璞筮之名曰驢鼠官舍多妖怪樂廣為河南尹官舍多妖怪前尹皆不敢處廣居之當外戶自閉後於牆孔中得狸殺之遂絕妖怪也射妖鳥周禮硩族氏掌射國妖鳥若不見其鳥獸則以救日之弓救月之矢夜射之注云獸謂狐狼等不見謂夜來呼鳴為怪者救日射太陽救月射太陰覆鳥巢秋官硩族氏掌覆妖鳥之巢上而去之注妖鳥之巢以方書日月之號十二月十二歲二十八星之號懸其巢上而去之注妖鳥惡鳴之鳥鴞鵬之類射神廷氏職云若神則以太陰之弓與枉矢射之注云神謂非鳥獸之聲或叫若譆譆出出之類問鵬文選賦曰賈誼為長沙王傳三年有鵬飛入誼舍鵬似鴞不祥鳥也誼以謫居自傷故為賦自廣曰野鳥入室主人將去請問于鵬子去何也穿井得土缶家語季桓子穿井得土缶問孔子孔子曰木石之怪夔魍魎水之怪者龍罔象土之怪者羵羊也妖怪八孔臨水自鑒不見其首越王貞臨水自鑒不見其首惡之未幾果及禍李密初密建號登壇疾風鼓其衣幾仆及即位狐鳴於旁惡之及將敗數日回風發於地激砂礫上屬天白日為晦屯營群鼠相啣走西北度洛經月不絕朽木王方翼嘗夜行見長人丈餘引弓射仆之乃朽木也水化為血崔彥曾始治第鄭州引水灌沼水數十步忽化為血署張佛筵液密為人一昔鼠齧皆斷首桮水變血河間元王孝恭事見禍福門鄭覃妖氣李宗閔楊虞卿以京兆尹得罪極言營解帝怒叱曰爾嘗詆鄭覃為妖氣今日為妖邪即出為明州刺史雄雞光燭地劉武周母趙嘗夜坐庭中見若雄雞光燭地飛投其懷起振衣無有感而娠生武周後起兵六年而滅獨孤及上疏去年十一月丁巳夜星隕如雨昨清明霜降三月苦熱錯繆顛倒沴莫大焉陛下宜反躬罪己兢兢乾乾以徼福于上下必能使反妖災為和氣矣生豕二首四足竇參兼戶部侍郎民家生豕二首四足欲以聞參曰此乃豕禍屏不奏牙城物怪李吉甫改郴饒二州會前刺史繼死咸言牙城有物怪不敢居吉甫命菑除其廨以視事吏由是安菌生帶上鄭注敗前菌生所服帶上藥化為蠅楮中藥化為蠅數萬飛走亳州聖水李德裕亳州浮屠詭言水可愈疾號曰聖水轉相流聞南方之人率十戶僦一人使往汲既行若飲病者不敢近葷血老老之人率多死而水斗三十干取者益他汲轉鬻于道三相欺訹往者日數十百人德裕嚴勒津邏捕絕之且言昔吳有聖人宋齊有聖火皆本妖祥古人所禁請下觀察使令孤楚填塞以絕妄源從之炊甑裂杜牧炊甑裂牧曰不祥也地生毛二尺吐突承璀常飾一室藏所賜詔敕地生毛二尺惡之躬糞除座之鼉集城門鄧景山以文吏拜青齊節度使徙淮南有鼉集城門鄧班語景山曰鼉介物也失所次金不從革之象其有兵乎未幾宋州刺史劉展反柳宗元貞符曰後之妖淫嚚昏好怪之徒乃始陳大電大虹玄鳥巨跡白狼白魚流火之烏以為符斯皆詭譎闊誕夜臥常有光怪行密知之曰吾今歸汝于兄梟嘯其屏鼠走于前路敬潛為遂安令到官有梟嘯其屏鼠數十走于前左右驅之擁杖而號敬潛不為懼天雨血突厥處羅復會天雨血三日國中犬夜群號求之不得遂有疾突厥雀調露初單于府立阿史那尼孰匐為可汗始虜未叛鳴鵽群飛入塞吏曰所謂突厥雀者南飛胡必至此春還悉墮靈夏間率無首泥孰果亡堂下斷臂周仁軌后母族也方為并州長史殘酷嗜殺戮異日月堂下有斷臂惡之送于野數昔往視故在是月韋后敗使者誅仁軌刑人與刀承以臂墮地乃悟梁州大鼠五行志弘道初梁州倉有大鼠長二尺餘為貓所囓數百鼠反囓貓少選聚萬餘鼠州遣人捕擊殺人餘皆去狐入李承嘉第神龍初有群狐入御史大夫李承嘉第其堂無故壞又秉筆而管直裂易之又裂衡州火災開元十五年衡州火災延燒三百餘家州人見有物大如甕赤如燭籠所至火即發井中夜有歎聲武后時來俊臣家井水變赤如血井中夜有吁嗟歎惋聲俊臣以木棧之木忽自投十步外泥像汗下大曆十三年二月太僕寺有泥像左臂上有黑汗滴下以紙承之血也空中有若旌旗狀元和十二年春青州一夕暴風自西北天地晦冥空中有若旌旗狀屋瓦上如蹂躒聲有日者佔之曰不及五年茲地當大殺戮翰林院鈴自鳴元和中翰林院有鈴夜中文書入則引之以代傳呼長慶中河北用兵夜輒自鳴井傍石自立南漢劉鋹四年宮中井傍石自立行百餘步而仆玉辟邪肅宗賜李輔國香玉辟邪二常置於座側一日方巾櫛辟邪忽一大笑一悲號俄而涕泗交下輔國惡其怪破之宮中數見怪物隱帝即位宮中數見怪物投瓦石撼門扉乃召群尼誦佛書以禳之一尼如廁既還悲泣不知人者數日及醒訊之莫知其然李業傳聚塵如塚狀楊謹矜每詰朝祀佛像默祈冥衛或一日像前土榻上聚塵三堆如塚狀謹矜惡之且慮兒戲命掃去一夕如初尋而禍作酉陽雜俎木石生怪變狐狸騁妖患韓愈謝自然詩天裂地拆文粹皮日休鹿門隱書山鳴鬼哭天裂地拆怪甚也聖人謂一君之暴災埏天地故諱耳蛇斗于鄭鶂退于宋李德裕張禹論國之妖也雖蛇鬥于鄭鶂退于宋妖不甚於禹矣木魅風號去山精雨嘯旋李白過四皓墓有物投瓦礫鄭絪宅在昭國坊忽有物投瓦礫五六夜不絕及移於安仁宅避之瓦礫又隨而至久而復還昭國及歸將入方丈蒲室懸絲去地三尺不知其數其夕瓦礫亦絕翌日拜相酉陽雜俎鐵騎萬餘寶應中汝南岑順者從人借凶宅居夜中聞鼓鼙之聲忽見鐵騎萬餘悉長數寸狀如戰鬥兩軍步伍各定軍師進曰天馬斜飛度三壇上將橫行擊四輜車直入無徊翔六甲次第不乖行於是鼓之勝負相當掘室內乃是古塚明器及金象戲局也狐人立李揆方盛夏夜寢于堂之前軒而空其中堂為晝日避暑之所於一夜忽有巨狐鳴噪于庭乃狐人立跳跳日光迸射久之逾垣而去揆甚惡之將曉揆入朝其日拜相集異記怪者不在於妖祥而在於政教皮日休隱書胡僧咒術胡僧能咒術生死於人太宗召壯士試之如言而生死傳奕曰此邪法也若使咒臣必不能行蚍蜉王漁紫石徐玄之夜讀書見人物如粟米粒數百皆具甲冑擁一紫衣者行案上傳呼云蚍蜉王欲觀漁於紫石潭漁具數十人入硯中皆獲小魚玄之大駭以冊覆之晝看皆無異聞錄神策浮屠像沒神策軍有浮屠懿宗嘗跪禮之像沒地四尺五行志塚木流血楊謹矜父塚草木皆流血懼以問所善胡人史敬忠敬忠使身桎梧裸而坐林中厭之又言天下且亂勸謹矜居臨汝置田為後計後為林甫王鉷作飛牒告謹矜本隋後蓄讖諱妖言與妄人交規復隋室坐誅坐缺左耳殷踐猷族子成已晉州長史初母顏叔父敬仲為酷吏所陷率二妹割耳訴冤敬仲得減死及成己生而左耳缺書囊物天寶十一載李林甫晨起盥飾將朝取書囊視之中有物如鼠躍于地即變為狗壯大嗔目張牙視林甫林甫射之中殺然有聲隨箭沒鼎相鬥天寶三載四月宰臣李適之常列鼎具膳羞中夜鼎躍出相鬥不解鼎耳及足皆折抱關鐵胡人頭自落安重榮為節度使鎮之城門抱關鐵胡人無故頭自落鐵胡重榮小字雖甚惡之然不悟也牙帳自破突厥始畢牙帳自破帝問內史令蕭瑀瑀曰魏文帝幸許城門無故壞是年崩豈其類耶白妖由人興孽非天作徵社宮之夢曹政亂而始亡降莘邑之神虢德衰而後滅反德而亂常必降災而作沴當有道之曰神不傷人棄常必生無釁不作禍福無門惟人所召積不善之家禍將由已人無釁焉妖不自作人棄常則妖興氣燄申繻曰人之所忌其氣燄以取之注云人如火之所忌其燄不堅止則自取也殃咎哀樂失時殃咎必至吉凶由人罔有天災伊尹曰有夏先后方懋厥德罔有天災山川鬼神亦莫不寧降之百殃作善降之百祥不善降之百殃吉凶不僣災祥在德惟吉凶不僣在人惟天降災祥在德子不語怪力亂神吉凶成敗各以數至運命論國無政不用善則自取謫於日月之災傳由人興九孔人無釁焉妖不妄作魏證石賢士唐有田家每於墓前石人下以肉祭之方此石人能瘉疾人皆禱之疾人愈因號石賢士封氏見聞記魏溪魔神荊有魏溪好食白魚日命僕市之或不獲輒笞責僕訪于獵者給之曰向打魚得一麛因漁而獲不亦異乎僕依所售具事于溪溪喜曰審如是或有靈矣因寘之榻日夕薦香火數年不壞頗有吉凶之驗溪友人惡溪所為伺其出烹而食之亦無其靈桂流泉南中有一泉多有桂子流出因名流桂泉後乃立屋其上為漢高祖廟而祝之又有胥廟者其像分其鬚謂之五髭鬚並有靈應也國史補白晉鮑靚年五歲語父母曰本是曲陽李家兒九歲墮井後問之皆同羊祜取環羊叔子五歲時令乳母取所弄金環即詣鄰家李氏東垣桑樹中採得時人以為李氏之子祜前生身也孔唐紹宿因唐小說唐紹為給事中同里有中郎李邈情好甚篤開元初詔驪山講武紹時懾禮部尚書玄宗抱桴擊鼓時未三舍紹奏畢遂斬紹先一日紹謂妻曰吾自幼即省前生前世為杜氏女適王氏子姑甚嚴吾年十七冬至前一日姑比夜令吾制一羅裙遲明服以待客忽有犬入房觸燈燈僵地仆裙上狼籍殆遍懼姑深責遂舉床以剪刀刺犬偶中其頸刀股折復以一股再刺犬遂斃往者斃犬乃今李邈也明日之死行戮者必李邈翌日就戮果李邈執刀初一刀不能誅刀折再易乃絕焉房琯記前生為僧唐明皇雜錄房琯之宰廬也邢真人和璞自太山而來因與攜手閑步至夏谷村遇一廢僧堂板竹下掘深數尺得一瓶瓶中皆婁師德與永公書和璞笑謂房曰省此乎琯即洒然悟其為僧時乃永公後身也知亡日十一白夫子早作負手曳杖逍遙於門歌曰太山其頹乎梁木其壞乎夢坐奠於兩楹之間石折後漢蜀武檐石折文翁曰西州石折智士死當會子孫設酒食後三日而卒又析象自知亡日辭訣召九族飲燕忽然死謝夷吾知亡日譙周曰昔孔子七十三亡劉向楊雄七十一歿今吾年過七十庶慕遺躅恐不出後年明年卒時人疑以術知假此言也命盡今日郭璞自云孔豫知終日自志其墓王續自筮李嗣真自筮死日豫具棺斂如言卒自謂有官三年死衢州鄭虔有鄭相如者自滄州來師事虔虔未之禮間問何所業相如曰聞孔子稱繼周者百世可知僕亦能知之虔駭然自謂云何荅曰相如有官三年死衢州是年及進士第調信安尉既三年虔詢吏部則相如果死五十五斯壽嘗自視其形視流而疾鼻折山根五十五斯壽矣夢書片紙皎皎白駒在彼空谷傍有人曰空谷也過隙也予生於角星昂星畢於角為第八官吾甚厄也杜牧白撰墓誌生天寶訖貞元病既亟以命其弟回曰吾生天寶訖貞元乙酉歲十月今死于汝之手盈吾志矣乃自為誌而卒柳宗元張先生誌自剋死日文粹呂才東皋子集序臨終自剋死日兼預自為墓誌月蝕東壁八月月蝕東壁李泌曰吾當之矣東壁圖書之府大臣當有憂者未幾果不起餘見月門將死而為神韓愈柳州羅池廟碑柳侯嘗曰明年吾將死死而為神後三年為廟祀我振鐸而逝鎮州普化和尚將入滅入市乞一直棳人與布袋皆不受振鐸而去告人曰明日東門死郡人相率送出城師厲聲曰今日葬不合青烏乃曰第三日南門遷化人亦隨之又曰明日出西門去人意稍怠第四日檠棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之已不見唯聞釋漸遠莫測其中南部新書再生十二白傳曰晉人獲秦謀殺諸絳市六日而蘇梁國女子晉書惠帝時梁國女子許嫁已受禮謝尋而夫戍長安經年不歸女家更以適人女不願父抑之遂得病死後夫還問女所在乃至墓所發塚開棺女遂活因與歸後婿訴官爭之王導議曰此不得以常理斷之宜還前夫朝廷以為人妖于寶婢于寶父瑩有寵婢母甚妒夫卒時生推婢於墓中寶兄年少不審知後十餘年母發開墓見婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如舊家中吉凶輒語地中不覺惡考之悉驗後嫁之生子孔李嶷五行志開元十七年宣州南陵縣丞李嶷死已殯三十日而蘇溫泉民光啟元年隰州濕泉民家有死者既葬行人聞聲呼地下其家發之則復生歲余乃死志紫素元君任生隱嵩山一夕聞異香一女子至留詩云我名籍上清謫居游五岳以君無俗累來勸神仙學任不顧後三日再至又留詩曰葛洪亦有婦玉母亦有夫神仙盡靈匹君子意何如任終不顧後任病卒道遇旌幢擁翠輦中一女子吏令任避女子望見呼問笑曰是嵩山讀書薄命漢取吏所持文書曰不得忘情索筆判曰更與三年吏曰此紫素元君有命須回生乃寤許飛瓊許澶暴卒三日復生問其哉乃誦詩曰曉入瑤臺露氣清並逸志顧非熊再生酉陽雜俎顧兄喪一子年七十悲傷不已因作詩哭之云老人喪愛子日夜泣成血老人年七十不作多時別其子精魂不離其家見父自誓當再為顧家子已而再生年至七歲兄戲批之忽曰是爾兄何批之一家驚異後名非熊舉進士掬沙撲人新安人吳生嘗病熱死既棺斂忽有一鬼被髮跣足自門而入徑至殯所掬沙以撲人人皆驚走即聞椎聲喧噪良久瞥見一人衣冠儼然入廚中少頃即出去至暮家人乃敢臨視棺已開中亦空矣數月吳自建康附書云吾已死矣有鬼救我遂活既寢渴甚即入廚中飲訖性猶恍惚不覺出門今在都矣後歲餘乃歸人皆呼為吳還魂稽神錄白陰陽不測造化多端大塊甄形洪爐孕象氣甄三才功成萬化玄牡為根希夷之精潛運埏埴為氣橐籥之用無窮成形成象諒動靜之有常相蕩相縻信陶鈞之不息萬殊之象不同千變之形無極圓蓋方輿上騰下降形開闢而坱圠氣交泰而氤氳運以無窮生而勿有覆載設位品物流形陰陽為炭天地構精雖品彙萬端而生靈一貫天長地久日往月來元氣至精千變萬化未始有極天地之大德曰生人肖天地之形肖似也謂首圓象天足方象地天地為爐造化為工陰陽為炭萬物為銅天地之物生於有有生於無三生萬物大鈞播物元氣萬物變化一氣生成陰陽陶蒸天地生殖乾知坤作道生德畜以萬物為芻狗天地不仁以萬物為芻狗聖人不仁以百姓為芻狗好惡與人異心韓愈書自省事已來又見賢者常不遇不賢者比肩青紫賢者常無以自存不賢者志滿氣得賢者雖得卑位則旋而死不賢者或至眉壽不知造物者竟如何無乃所好惡與人異心哉造化之柄劉蕡策曰至若念陶鈞之道在擇宰相以王之使權造化之柄造化小兒杜審言初審言病甚宋之問等省候何如荅曰甚為造化小兒相苦高議參造化韓愈赴江陵造化何以當攜劖若使乘酣騁雄怪造化何以當鐫劖酬盧司門四兄詩若執造化關不知誰為助若執造化關題炭谷造化合元符交結騰精魄李白草創大還精誠有所感造化為悲傷古風孰鱗漦以徵而化黿是辜柳宗元天對白陰陽不測造化多端陶鈞無方變化不一生則有常變而無極于何不有莫究其由雖變化之萬端蓋生靈之一貫未始有極不知其生物既反常事亦惑眾周穆軍士化為猿鶴歷陽都人變成魚鱉獸惟毛群天馬潛而在水魚非羽族文鰩飛以排空獸吸風而復生鼠蹈火而不死鳥生杜宇這魄煇化齊女之形婦化石以望夫鳥啣木而填海牛哀病以變虎黃氏化而為黿長弘血而成碧泉客泣以為珠袁公用戲竹之術元緒對焚桑之言察其所由考以同類何異野省入水以成蛤有同田鼠順時而化鴽腐草化螢野雞變蜃雖變化之多端亦地之常理怪物不敢惑萬異為一同文子曰天地之間一人形也故明於性者天地不能負而審於符者怪物不能惑聖人不由近知遠以萬物為一同孔拂菻西域拂菻多幻人能發火于顏手為江湖口幡眊舉足墮珠玉水化為血崔彥曾事見妖怪門橘之蠹陸龜蒙蠹化橘之蠹則蛻為胡蝶矣揮霍紛紜揮霍紛紜爭變化韓愈汴泗交流變化若雷霆上于頔書難推競乘時而射勢兮紛變化其難推復志賦變化成一身風雲一朝會變化成一身北極詩心腸一變化羞見時節盛東都遇春覽雲測變化李白游天笁詩誰料蒼天變化誰料得萬事反覆何所無杜甫杜鵑行郡邑為魚吏人化鱉文粹崔融啟母廟碑河淪越雋有郡邑之為魚水陷歷陽有吏人之化鱉母變空乘男生破竹同上崔融啟母廟碑昔者鸞川之上母變空乘豚水之濱男生破竹美人之虹名螮蝀仙娥之月作蟾蜍精衛銜石而償冤女尸化草而成嬪山崩蜀道臺候婦而無歸石立武昌亭望夫而不及水變芳醪宣皇在藩時常從駕墮馬雪中夜寒甚困且求水於巡警者曰我先王也及以水進舉杯悉變為芳醪大中遺事蟻王化飯為臣妾螺母偷蟲作子孫白居易禽蟲章君子變猿鶴小人為沙蟲李白古風莊周為胡蝶胡蝶為莊周同上莊周為胡蝶胡蝶為莊周一體更變易萬事良悠悠飯粟化為血鄭元躊使突厥還言今突厥飯粟化為血不三年必亡
