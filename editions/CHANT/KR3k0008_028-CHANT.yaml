body:
  text: 卷第二十八節操一白風雨淒淒雞鳴喈喈雞猶守時喻君子不改其度達節曰聖達節謂不守小節守節次守節謂善人守其節若子臧季札之屬失節子臧曰不失節雖不能聖敢失守乎季札曰雖不才願附子臧以無失節不以利累形莊子曰能尊生者不以養身雖貧賤不以利累形也屠羊說辭賞屠羊說楚昭王出奔王反賞之說曰大王反國說反屠羊何賞之有申包胥逃賞楚昭王反國賞申包胥包胥曰吾為君也君既定矣又何求遂逃賞苦節易曰介于石苦節不可貞也天地節而四時成節以制度不傷財不害民虞吉有他不燕虞專也專則吉來他則不安介節也我心匪石不可轉也我心匪席不可卷也砥礪廉隅雖分國如錙銖不臣不仕其規為如此通分有恒魏盧欽著書稱徐邈曰志高行潔高而不狷潔而不介聖人以清為難而徐公所易或問曰武帝時人以為通自涼州還京師以為介何也荅曰往者崔毛用事貴清素士人皆變易車服而徐公不改故人以為通比來奢替轉相放徐公雅尚自若故前日之通乃今日之介是世人無常而徐公有常也徐邈字景山不可屈之色晉庾袞有異行穎出太守以功曹命之不俟駕而往請受天下之役適遭遇之逡巡形益恭而有不可屈之色乃厚禮而遣之懍然節概楊煇書曰西河魏文侯之居有叚干木田子方之遺風其人懍然有節概知去就之分也布衣之戀後漢孔僖曾祖子建與崔篆交善篆事王莽勸子建仕對曰吾有布衣之戀子有袞冕之志其道乖矣非耕不食後漢周燮有先人草廬結于岡畔下有陂田常肆勤以自給非身所耕不食也於陵仲子齊之巨擘公孫丑曰陳仲子豈不誠廉士哉孟子曰於齊仲子為巨擘亦焉能廉以兄之祿為不義之祿而不食以兄之室為不義之室而不居避兄離母居於陵身織屨妻辟蘆以易衣食以母則不食以妻則食豈能充其義也魏王褒字偉元計口而食嘗刈麥人助之褒棄之不累主人晉劉寔清身行無瑕玷窶貧每憩止薪水自給不累主人口不言貨財手不執珠玉崔洪口不言貨財手不執珠玉汝南王以琉璃鍾行酒與洪洪不執過姊飯留錢後漢范丹字史雲候姊病姊飯之以姊夫不德乃留錢二百動不累高晉謝鯤通簡有恒有識者服其遠暢而恬於榮辱自處若穢而動不累高不失漢節蘇武不肯乘車袁閎夏甫父賀為彭城相閎往省謁變姓名徒行既至數日吏不敢通阿母出見驚白夫人乃密呼入去賀遣車送之閎稱眩疾不肯乘車步檐告歸趙孝長平王莽時父為田禾將軍以父在為郎告歸嘗白衣步檐欲此郵亭亭長以孝將至灑掃待之孝不告其名長不肯納因問曰聞田禾將軍子當過何時到乎曰尋即到矣不食饋食閔仲叔世稱節士鄉黨見其含菽飲水或遺之受而不食也不受報恩金雷義字仲公濟人死罪以金二斤謝之義不受人伺義不在默投承塵上義葺屋得之其人已死無所還乃以金送縣腹不累閔仲叔客居安邑老病家貧不能得肉日買豬肝一片屠或不肯安邑令聞敕使常給仲叔知而歎曰閔仲叔豈以口腹累安邑哉遂去客沛壽終不取於人常林字伯槐單貧自非手力不取於人不取死鹿晉郭文猛獸殺大鹿於文菴側文以語人人取賣分錢與文文曰我若須錢當自賣之所以相告正以不取聞者皆嗟歎之不取魚貴價任嘏家貧賣魚會官發魚價貴數倍嘏取直如常贖生口任嘏嘗與人共買生口每價八匹絹生口家來贖直六十匹共買者欲隨時價取嘏自取木不過從兄飯帝問第五倫伯魚曰聞卿為吏不過從兄飯有之乎倫曰臣少遭飢亂實不妄過人飯不留姊家沐並德常過姊姊為殺雞炊黍而竟不肯留郭翻墜刀於水人為取得便與其人不受遺翟陽字道淵始安守于寶與陽通家遺陽一船敕吏曰翟公廉讓致書訖委船而還陽既無反致乃以貨之買絹物寄還寶寶本以為惠而反煩之益歎媿焉如水清如玉絜如霜明如雪淨計口而食見上注孔生平重節義皇甫無逸父誕隋并州總管府司馬漢王諒反逼之不從見殺無逸在長安聞變即號慟人問故對曰吾父生平重節義必無苟免者頃使至果然挺節無穢聲裴矩虞世基用事官以賄遷惟矩挺節無穢聲世頗稱之臨難不易節長孫無忌帝曰朕嘗評公等可否以相規謂高士廉心術警悟臨難不易節所乏者骨鯁耳孤操自將李渤孤操自將不苟合於世人咸謂之古激屢以言斥而悻直不少衰守節者尚之蒙素刃姚思廉授秦王府文學王討徐圓朗嘗語隋事慨然嘆曰姚思廉蒙素刃以明大節古所難者時思廉在洛陽遣使遺物三百段致書曰景想節義故有是贈操履無玷郝處俊武后雖忌之以其操履無玷不能害完節自高白居易贊曰當宗閔時權勢震赫終不附離為進取計完節自高不為聲利所遷韋況雖也貴而志中遠不為聲利所遷當時重其風操不阿貴近權萬紀帝以為不阿貴近繇是獎禮不以墅奉宰相蕭復廣德中歲大飢家百口不自振議鬻眧應墅宰相王縉欲得之使弟紘說曰以君才宜在在右胡不以墅奉宰相取右職復曰鬻先人墅以濟孀單吾何用美官使門內餒且寒乎士大夫壯其節董晉右丞元琇為韓滉排笮得罪滉勢振朝廷晉見宰相誦元琇非罪士大夫壯其節有風節武儒衡論議勁正有風節賜鞭張建封還鎮帝又使左右以所持鞭賜之曰卿節誼歲寒弗渝故用此為況建封又賦詩以自警勵挺挺有大臣節鄭肅太子母愛弛廢斥有端肅因入見言天下大本不可輕動朝廷謂肅臨義不可奪挺挺有大臣節守節清苦孔戣韓愈上疏其為人守節清苦諭議正平不為齪齪小謹杜牧剛直有奇節不為齪齪小謹著名節奚陟少自底厲著名節務為寬平惇大源乾曜為相十年與張嘉貞張說李元紘杜暹同秉政居中未嘗廷議可否晚節唯唯聯署務為寬平惇大故鮮咎悔晚節苛慘韓滉晚節益苛慘故論者疑其飾情希進既得志則彊肆蓋自其性云終始完潔衛次公其節尚終始完潔臣節之光李源長慶初年八十矣御史中丞李德裕表薦源曰賈誼稱守圉扞敵之臣誠死封疆天寶時士罕伏節逆羯始興委符組棄城郭者不為恥而憕約義同列守位自如抵刃就終臣節之光天下思其風烈裴度及沒天下莫不思其風烈終不屈賊郎餘令祖楚之持節論山東為竇建德所獲脅以白刃終不屈賊無愧先烈袁承序高宗之為晉王也太宗崇選僚屬問梁陳名臣子弟誰可者岑文本曰昔陣亡百司奔散有袁憲者朝服立後主傍白刃不避也王世充篡隋群臣表勸進而憲子給事中承家稱疾不肯署今其少子承序風操清亮無愧先烈帝乃召拜晉王友任義節段文昌任義節不為齷齪小行帝奇其節蔣儼太宗將伐高麗遂請行為莫離支所囚以兵脅之不屈內窟室中高麗平乃得歸帝奇其節授朝散大夫臨事不可奪王及善清正自將臨事不可奪有大臣節先軫免胄以立誠鋤麑觸槐以取喪富辰懟諫而赴翟仲由結纓而為壯其節則全於大機則無以尚也盧藏用紀信碑以清操顯蕭復常衣垢弊居一室學自力非名士風儒不與游以清操顯華每歎曰此兒當興吾宗孤特一概蕭俛以聲利為汙疾邪太甚孤特一概故輕去位無所藉英烈言言如嚴霜烈日段秀實贊雖千百歲其英烈言言如嚴霜烈日可畏而仰哉弱操媿筠杉韓文雨中聯句承家節操尚不泯社甫終明府水操名節不可一概論郭代公倜儻不羈之士也少不以名節自檢當蕭牆內難保護睿宗雖履危機竟全臣節則名節不可一概論窮愁志懷志潔操員半千上書行年二十懷志潔操未蒙一官多君秉古節嶽立冠人曹李白詩峻節冠雲霄同上白鑑明則塵垢不污神清者則嗜欲不誤閔損字子騫不仕大夫不食污君羞與鄉人處孟子曰伯夷非其君不事非其民不使羞與鄉人處如以朝衣朝冠而坐於塗炭也崔洪口不言貨財王夷甫口不言錢李膺高克無所交接唯以苟叔陳寔為師友嵇康叔夜性遠趣率然玄遠范史雲之清後漢范丹史雲清節聞閭里中得盜芻槁僮更怨曰汝之清高豈范史雲輩而云不盜我菜乎丹自歎云云不曰白乎涅而不緇語獨清原屈孔像圖固辭朱敬則張易之等集名儒撰三教珠英又繪武三思李山嶠蘇味道李迥秀王紹宗等十八人像以為圖欲引敬則固辭不與世潔其為人左右圖史楊綰性沉靖獨處一室左右圖史凝塵蒲席澹如也性高鯁不耐浮沉於時去居南陽倚帝山請隸道士籍吳筠其輕去近高泌之為人其輕去近高贊網羅在天大業中舉孝悌廉潔授秘書省正字不樂在朝求為六合丞以嗜酒不任事時天下亦亂因劾遂解去歎曰網羅在天吾且安之乃還鄉里王績傳終始完潔衛次公善琴方未顯時京兆尹李齊運請授之法次公拒絕因終身不復鼓其節尚終始完潔白修身踐言言不過辭動不過則心正而後身脩身修而後家齊君子澡身而浴德三省吾身曾子不冠不入馬援事嫂遇妻子如嚴君張湛居家修整晉王劭有風操家人近習未嘗見墮簪之容居室言善千里應之名教自樂晉王澄平子任放樂廣曰名教中自有樂事何必乃耳整風教和嶠少有風格慕夏侯玄之為人厚自崇重有盛名朝野許其能整風教攝以威儀危坐茅容季偉與等輩避兩樹下眾皆夷踞相對容獨危坐愈恭郭林宗見而奇之靜以保身悟身之是患默而思道知道之無為盡飾之道修容曾子與子貢入其廄而修容焉孔趙光逢規矱自持晚塗修潔于邵雅修飭王紹宗雅修飭當時公卿莫不慕悅其風張易之兄弟亦頗結納易之誅坐廢為人醞籍裴休為人醞籍進止雍閑宣宗嘗曰休真儒者早修整盧奐早修整為吏有清白稱檢身厲行賈耽檢身厲行自其所長每歸第對賓客無少倦私居束帶正色柳仲郢每私居內齊束帶正色服用簡素白史丹儻蕩無檢而心謹密阮籍不拘禮教字嗣宗外坦蕩而內淳至率意獨往車轍所窮輒慟哭而返訪戴王子猷居山陰夜雪霽獨酌詠左太沖招隱詩思戴道安時在剡即乘舟訪之至戴門不前而反曰乘興而來興盡而反何必見戴肆心傳曰昔周穆王欲肆其心周行天下縱欲禮欲不可縱入長吏被中光逸字孟祖為博昌小吏縣令使逸送客寒復遇雨凍濕還令不在解衣入令被中臥令欲誅之逸曰若不蹔溫必恐凍死入車中王徽之字猷為桓沖騎兵參軍沖問卿所主何曹子猷搔首曰似馬曹又問馬死多少曰未知生焉知死嘗從沖行值雨因下馬逃入沖車曰公豈得獨擅一車乎馬曹見上注不知是三公王戎為司徒閑乘小馬從便門出游見者不知是三公故吏多至大官道路相遇輒避也街中走馬張敞為京兆尹無威儀罷朝走馬章臺街吏御史驅自以鞭面拊馬也官長飲桓溫與謝奕善辟奕為安西司馬惟布衣好常溫飲溫走入避之奕攜酒就聽事引溫一兵師共飲曰失一老兵亦何所共在溫不責之探鵲鷇王澄字平子為荊州剌吏送者傾朝見樹上鵲巢便脫衣上樹探鵲鷇反神氣傲然旁若無人醉臥畢卓為吏部鄰家釀酒熟卓醉夜入其家竊飲醉便臥罋間守酒者得而拘之明旦看乃畢吏部也又阮籍鄰家少婦有美色當壚沽酒籍嘗詣婦飲酒醉便臥其側既不自嫌其夫察之亦不疑之也哭丘家女丘家女有才色未嫁而死阮籍不識其父兄徑往哭之盡哀而反字其父胡母輔之彥母子謙之子光才學不及父而傲縱過之酣醉常呼父字輔之亦不介意輔之酣飲謙之曰彥國年老不得為爾將令我居背東壁輔之歡笑入呼而共飲也八達光逸孟祖太傅辟至屬胡母輔之與謝鯤阮放畢卓羊曼桓彝阮孚散髮祼袒閉戶數日酣飲逸將耕戶守者不聽逸便脫衣露頭於狗竇中呼輔之輔之曰我孟祖也遽呼入飲人謂之八達孔少繩檢唐儉爽邁少繩檢不治細行唐憲仕隋為東宮左勳衛太子廢罷歸不治細行落魄韓琬落魄少岸檢樂山水自放員半千年老不衰樂山水自放贈帶其放誕少檢故贈以帶張文瓘傳馬周鄉人以無細謹薄之放蹟江淮間韓思彥至官閱月自免去放蹟江淮間久之不遵法度王琚既失志稍自放不能遵法度跌蕩少檢魏元忠為太學生跌蕩少檢通脫張無性通脫無檢不屑世事趙冬曦性放達不屑世事豪放李邕資豪放不能治細行不為親近所容李白自知不為親近所容益鷔放不自脩求外職柳澤召拜監察御史臺僚以儀矩相繩而渾放曠不樂檢局乃求外職游縱自如李紓不為齪齪崖檢官雖貴而游縱自如放意文酒白居易所蘊不能施乃放意文酒真放皮日休七愛詩序每謂負逸氣者必有真放以李翰林為真放焉飲酒盡百醆嘲諧思逾鮮有時醉花月高習清且綿韓愈送靈師詩朋友見妻子杜甫每朋友至引見妻子章侍御退而使其婦送夜飛蟬以助粧飾出雲仙散錄放懷集杜書記平善牛奇章帥維楊杜牧在幕中夜多微服逸遊公聞之以街子數輩潛隨逐牧之以防不虞後牧之以拾遺召臨別公以縱逸為戒牧之始猶諱之公命取一篋皆是街子輩報貼云杜書記平善乃大感服芝田錄無檢幅溫廷筠薄於行無檢幅多作側辭艷曲與貴胄蒱飲狎昵同上丐錢揚子院夜醉為邏卒繫折其齒不嬰以家事王績性簡放不喜拜揖兄通知績誤縱不嬰以家事鄉族慶吊冠昏不與也不修飭雷蒲不修飭每宴使客抵寶器潭中曰此水府也蛟龍所憑吾能沒焉乃祼入水俄取器出白庾亮登樓晉庾亮都督江荊鎮武昌佐吏殷浩之徒乘秋月登樓不覺亮至將起避之亮曰諸君少住老子於此不淺便據胡床竟坐譚論謝尚泛江與袁宏譚袁宏臨海令勖之子少孤以租運自業謝尚鎮牛渚乘月與左右微服泛江會宏在船中諷詠聲既清會詞又藻拔令問之袁臨海耶尚遂就之升舟與譚王樂晉樂廣與王衍俱宅心事外見重於時天下言風流者王樂為首庾亮噉薤亮過陶侃坐噉薤留白云可種侃曰非唯風流兼有為政之術終日清譚王衍字夷甫出補元城令終日清譚縣務亦理孔當時稱其風流李迥秀少聰悟多通賓客喜飲酒雖多不亂當時稱其風流以風流自命杜如晦少英爽喜書以風流自命醞籍權德輿雖動止無外飾其醞籍風流自然可慕季真清談賀知章字季真性曠夷善談說與族姑子陸象先善象先嘗謂人曰季真清談風流吾一日不見則鄙否生矣敏辯陸餘慶才不逮子昂等而風流敏辯過之按轡絕道去李林甫傳兵部侍郎盧絢按轡絕道去帝愛其醞籍稱美之明日林甫召絢一曰尊府素望上欲任以交廣巷憚行且當請老絢懼從之因出為華州剌史俄受太子員外詹事絢繇是廢暮出端門緩轡賦詩崔湜嘗暮出端門緩轡賦詩張說見之嘆曰文與位固可致其年不可及也體弱有醞籍張九齡體弱有醞籍故事公卿皆搢笏于帶而後乘馬九齡獨常使人持之因設笏囊自九齡始帝後每用人必曰風度能若九齡乎白立地之道曰柔與剛易沉潛剛克高明柔克剛亦不吐詩人有言剛則吐之惟仲山甫剛亦不吐處父以剛傅陽處父過寧寧嬴從之及溫而還其妻問之嬴曰以剛天為剛德猶不干時況在人乎夫子貝不沒乎懼罹其難是以去之後晉殺陽處父子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛欲剛必柔鬻子曰欲剛必以柔守之彊必以弱保之積於柔必剛積於弱必彊漢王嘉剛毅天子敬之高獲不改性後漢高獲與世祖有舊曰欲子為吏宜改常性獲曰臣受性父母不可改也遂辭去之傅咸剛勁諒直不能容人之短好剛不好學其蔽也絞絞切也子路行行如也行行剛貌血氣方剛剛彊不得死季布能摧剛為柔虞詡剛而不虐剛腸太剛則折摧剛百鍊剛近仁子曰剛毅木訥近仁孔少所降屈溫造盛氣少所降屈不可干非其義李大亮內剛烈不可干非其義對天子爭是非無回撓負才無屈唐彥謙性剛急溫造性剛急人或忤己雖貴勢亦以氣出其上道遇左補闕李虞恚不避捕從者笞辱剛峭李中敏性剛峭剛正過姚崇宋璟剛正又過姚崇元宗素所尊憚常屈意聽納剛果不撓呂諲為治不急細務決大事剛果不撓賜中上考李朝隱遷長安令宦官閭興貴有所干請曳去之睿宗嘉歎賜中上考絹百匹以旌剛烈官吏重足劉蕡以剛猛立威官吏重足人無敢戲慢韋溫性剛峻人望見無敢戲慢者剛正氣節自任穆寧剛于御吏韋處厚姿狀如甚懦者居家亦循易至廷爭嶷然不可回奪剛于御吏百僚謁事畏惕未嘗敢及以私稜稜有風望崔從為人嚴偉立朝稜稜有風望不喜交權利忠厚而讓士大夫賢之本剛者天德二李贊剛者天德故孔子稱剛近仁骨強四支故君有忠臣謂之骨鯁若栖筠鄘二子其剛者歟栖筠抗權邪不及相鄘得相不願拜非剛疇克勝之性剛彊趙鳳好直言而性剛彊素與任圜善自圜為相頗薦進之治剛嚴李紳為河南尹河南多惡少或危帽散衣擊大毬或尸官道車馬不敢前紳治剛嚴皆望風遁去不屈牛仙客嚴挺之拒宰相不肯見李林甫崔隱甫違詔不屈牛仙客信剛者乎二人坐是皆不得相彼亦各伸其志也陽宅身以執剛兮卒易帥而蒙辜柳宗元佩韋賦以剛正故官齟齬王求禮言行剛正狄兼謨元和末解褐襄陽推官試校書郎言行剛正使府知名舊中剛正有祖風同上剛決犯上僕固懷恩為人雄重寡言應對舒緩然剛決犯上純剛純彊兮必喪必亡柳文賦剛略類韓愈李少事韓愈為人剛略類韓愈愈愛重剛銳果決李巨剛銳果決略通書史張鎰盧杞忌鎰剛直欲去之時朱泚以盧龍卒戌鳳翔帝擇人代之杞曰鳳翔將校班秩素高非宰相信臣不可鎮撫臣宜行帝乃顧鎰曰文武兼資望重內外無易卿者其為朕撫盧龍土為鳳翔節度使豪彊七白血氣方剛戒之在鬥小人用莊不在於善而皆在於凶德剛彊者死之徒灌夫陂池田園宗族賓客為權利橫穎川贊曰灌夫無術不遜也竇憲恃宮掖聲勢遂以賤直請奪沁水公主田園梁冀跋扈漢書冀字伯卓質帝目之跋扈將軍認孫奮母為守藏婢盜珠十斛南方之彊犯而不校北方之彊剛毅負毦帶鈴吳甘寧興霸少招合輕薄少年為之渠帥群聚相隨操持弓弩負毦帶鈴民聞聲即知是寧彊梁者不得其死老子彊者脅弱惡聲至必反之北宮黝善養勇者也孟子威重於太守寧成免官居持吏長短出從數十騎其使之威重於太守豪奪吾民既不能彊外彊恭顯任勢孔文章倚豪橫飲噉惟所便文章倚豪橫韓愈東都遇春少年負壯氣奮列自有時李白氣岸遙凌豪士前夜郎沉斷皇甫湜廬陵縣壁記彈豪紏黠以沉斷威震豪彊王正雅以萬年令威震豪彊無踰檢之患劉蕡制豪猾之彊無踰檢之患剛愎班宏剛愎以竇參欺己議事稍不合負氣彊愎李昭德丘愔上疏昭德乘總權綱而才小任重負氣彊愎聾盲下民芻狗同列白立地之道曰柔與剛易柔克見剛門柔亦不茹大亦有言柔則茹之惟仲山甫柔亦不茹詩隨會柔而不犯傳柔弱勝剛彊老柔弱者生之徒老能下人不犯物欲剛必以柔見上注光武柔直光武幸南陽宴父老父老相謂曰文叔少時謹信與人不款曲惟柔直耳乃能至是耶帝大曰今亦以柔道治天下也莫過於水老子曰天下柔弱莫過於水而能攻堅莫之能先轡之柔矣逸詩篇名義取柔轡可御剛馬繞指之柔舌柔口柔之人柔而立怯懦管仲三戰三北鮑子不以我為怯知其母在故魏勃股慄灌嬰責勃劫齊王反魏曰失火之家豈服先言因退立股慄嬰熟視曰人謂勃勇妄庸人耳韓信胯下淮陰市少年辱信曰不能死出我胯下信良久乃俯出胯下一市皆笑以為怯弱綿力淮南王書曰越人綿力注云柔弱也官之奇懦而不能彊諫左傳懦夫孟子曰聞伯夷之風懦夫有立志也無拳無勇萊駒失戈晉襄公獲秦囚使萊駒以戈斬之囚呼萊駒失戈蒯聵墜車衛太子蒯聵與鄭人戰望見鄭師眾太子懼乃投車下子良授太子綏而乘之曰婦人也言其懦也脆弱趙廣漢云羌脆弱易敗國語不占失軾事具下無勇門孔以柔媚自進庾準以柔媚自進得幸於王縉驟至中書舍人時流嗤薄之以佞柔得為大夫劉暹元載昵厚之載得罪出鄭州徙河南以佞柔故為大夫也三遷工部尚書人貓李義府時又以柔而害物號曰人貓可制關播盧杞雅知播韋柔可制因從容言播材任宰相其儒厚可鎮浮動乃拜同門下平章事徐偃柔以屏義兮倏邦離而身虜柳宗元佩韋賦面柔令李林甫面柔令初若可親既崖阱深阻卒不可得也便柔遜愿崔損建中後宰相無久任者損以便柔遜愿中帝意乃留八年柔者仁之賊刑法志文宗好沿躬自謹畏然閹宦肆孽不能制至誅殺大臣夷滅其族濫及者不可勝數心知其冤為之飲恨流涕而莫能救止蓋仁者制亂而弱者縱之然則剛彊非不仁而柔弱者仁之賊也柔情易遷宦者傳殘氣不剛柔情易遷庸軟莫能自達穆宗皇后蕭氏初后去家入長安惟記有弟帝為訪之太后真弟庸軟莫能自達怯懦罕更事楊師道帝亦曰師道資性純淑自應無過而實怯懦罕更事懦緩高仙芝美姿質善騎射父猶以其懦緩憂之懦懦董晉為宣武節度使鄧惟恭乃結大將相里重晏等謀亂晉覺之殺其黨械送惟恭京師帝錄其縶李迺勞貸死流汀州帝恐晉懦懦詔拜汝州剌史性謹柔宗室熅性謹柔材無過人者白邾莊公卞急左傳邾莊公在臺臨庭閽以瓶水沃庭公怒閽曰夷射姑旋焉執之不得滋怒自投于床廢于壚炭爛遂卒莊公卞急故及此佩韋范丹事見上注蠅集筆端魏王思為司農性急嘗書蠅集筆端驅去復來再三思自起拔劍逐蠅不得取筆擲地踏壞之食雞子晉王述懷祖性急常食雞子以箸刺之不得便大怒擲地雞子圓轉不止便下床以屐齒踏之又不得嗔甚掇內口中齧破而吐之公孫之亟也晉使張骼輔躒致楚師求御於鄭鄭人使宛射犬御二子握坐射犬於外既食而後食之及戰射犬近不告而馳之敗擒挾囚不待而出既戰二子問曰胡再不謀對曰曩者之言公孫之亟也言性急不肯受屈量謝包荒德非含垢忿不思難褊心魏君儉嗇褊急無德以將之後漢明帝褊急嘗以事怒樂崧以杖撞之崧走入床下帝急呼崧曰天子穆穆諸侯皇皇未聞人君起撞明帝慚而止孔褊心怨望劉禹錫遷太子賓客禹錫恃才而廢褊心不能無怨望吳通玄知制誥與陸贄等同視草陸贄富詞藝特承德宗重顧經歷艱難通玄弟兄又以東宮侍上由是爭寵頗相嫌恨贄性褊急屢於上前短通玄舊史恃才褊忿薛逢出為巴州剌史沈詢楊收王鐸由學士相繼為相皆逢同年而逢文藝最優收作相逢有詩收銜之鐸作相逢又有詩以恃才褊忿人士鄙之舊史忿罵張九齡為相性頗躁急動輒忿罵孔平仲續世說被躁望誅劉文靜贊曰文靜先被躁望誅辭旨疏躁蕭瑀性鯁急正觀初元齡如晦新得君事已稍分瑀不能無少望乘罅切詆辭旨疏躁太宗怒廢于家不容人短瑀論議明辯然不能容人短中狹瑀素貴但中狹資褊躁陳子昂唐史浮躁衒露裴行儉曰如王勃等雖有才而浮躁衒露豈亨爵祿者哉資暴急長樂郡王幼良資暴急高祖數曉勒不悛佻躁韋渠牟為人佻躁志向淨淺張鷟性躁辯儻蕩無檢罕為正人所遇彊躁張嘉正彊躁論者恨其不裕氣陵輩行賈餗褊急氣陵輩行躁狷柳冕為婺州十三年自以久疏斥又性躁狷不能無恨乃上表乞代蜂螫指擣取其液皇甫湜嘗為蜂螫指購小兒斂指擣取其液子錄詩誤囓臂血流一日命其子錄詩一字誤詬躍呼杖杖未至囓其臂血流作櫻桃賦蕭穎士李林甫怒其不下己調廣陵參軍穎士急中不能堪作櫻桃賦曰擢無庸之瑣質蒙本枝以自庇雖先寢而或薦非和羹之正味以譏林甫元君子恨其褊不能取容於時崔元翰性剛褊不能取容於時遇事發作先主性狷急遇事發作輒不忍尋後悔之笠澤叢書酷尚弈棋李納性辯急酷尚弈棋每下子安詳極於寬緩往往躁怒家人輩則密以弈具陳於前納睹便忻然改容以取其子布筭都忘其恚南部新書李訓浮躁寡謀本贊段文昌之介狹李固言之狷急段相文昌性介賓客有眉睫之失必致傾又少師李固言性狷急為士大夫之所誚話錄不能包容於尋常人元賓行峻潔清其中狹隘不能包容於尋常人韓文與李師錫書愚衷深褊狷杜牧送人詩謚貞褊呂誙傳蕭瑀端直近貞性多猜近褊言褊則失貞稱貞則遺褊故曰貞褊儉十白禮與其奢也寧儉以約失之者鮮矣去奢去泰老子克儉克勤書曰克儉于邦克勤于家儉則固奢則不遜儉則固與其不遜也寧固物或損之而益德儉而有度儉德之恭昭其儉也儉固能廣務嗇勸分嗇儉也示之以儉曾子曰國奢則示之以儉國儉則示之以禮慎乃儉德躬儉節用服澣濯之衣貶食省用節器用踰矩節儉省嗇昭節儉尚朴棄末反本也廉恥之心躬自非薄儉而不陋以知足為富居其實大丈夫居其實不居華戒生之厚素業清風貴而能貧節乃用足儉為德恭聖人不積君子戒盈人道惡盈鬼神害盈易能節禮樂不忘恭敬務利而避害慎始而思終以道制欲見德思義革奢俗以從儉約澆風以反淳無欺暗室不懼神明尚素黜華去奢從儉從儉降身惟賢猶病砥礪清節承風宜嘉清德難奪素風德因儉立名以清聞妾不衣帛馬不食粟季文子卒宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子曰相三君矣而無私積可不謂忠乎賓以特性晉饑晉侯命祈以幣更賓以特性器用不作車服從儉注云皆務儉也行之期年國乃有節卑宮室晉文公為盟王宮室卑庳以崇大諸侯之館又子曰禹卑宮室而盡力乎溝洫室不崇壇闔廬妻子不入官舍後漢王良仲子在位恭儉妻子不入官舍當示禮之代自合執中守臨人之司豈宜逼下難為繼也恥盈示禮曾子國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮損之又損忌蟋蟀之謂何雖則從儉去奢有以小為貴者而乃失中難下無乃此是過與偞卑偞卑墮類反迫下之義也禮矯俗律人奢雖諷於蜉蝣儉亦剌於蟋蟀既異建中則難為下去奢作戒示儉垂文語以執中未為得也比其僣上不猶愈乎是從以約之文未虧寧儉之義雖激俗是稱而相時斯昧既非示儉之日自招失禮之尤況當示禮之日自貽逼下之譏奢侈敗風唯時所惡清儉激俗雖矯何傷罷露臺漢文帝欲作露臺計費百金帝曰百金十家之產何以臺為蟋蟀剌晉僖公也儉不中禮故作是詩以閔之葛屨剌褊也魏地狹隘其君儉嗇褊急而無德以將之堯舜儉漢書云堯舜堂高三尺土階三等茅茨不剪採椽不斲飯上簋歠土鉶糲粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸此儉而難遵也用過乎儉君子儉德避難不可榮以祿也二簋用享質薄之器納約自牖薪芻第五倫伯魚為會稽身自薪芻養馬妻執爨恭儉以求役仁馬餼不過稂莠子服子薄祭鄭子張有疾命宗人黜宮薄祭祀先人晏平子仲祀先人豚肩不掩豆澣衣濯冠以朝君子以為隘矣下不僣上上不下王良妻布裙曳柴衣食儉子曰禹惡衣服而以美乎黻冕菲飲食而致孝乎鬼神食不二味闔廬食不二味居不重席不取費衣服財用擇不取費儒有居處不淫飲食不辱辱貪欲也惡衣惡食土志於道而恥惡衣惡食者未足與議也脫粟晏子相齊食脫粟飯一狐裘三十年晏子恥纖而不服饘於是粥於是以餬予口服澣濯之衣食疏糲之食文子曰聖人食足以充虛接氣衣足以蓋形禦寒古之為道者量腹而食制形而衣三杯朱博儉食不重味案上不過三杯布被公孫弘曰人臣病不節儉常臥布被汲黯曰飾非以吊名也燕用茶果桓溫性儉每燕不過茶果而已拾飯殷仲堪為荊州水旱遭年飢仲堪食常有餘肴飯落席拾取以噉也賓至無供辦謝安欲詣陸納納辭無供辦兄子俶不敢問密厚具饌安至納設茶果而已俶備珍羞客散納怒曰不能光益叔父乃穢我素業杖四十生無仗物王忱見王恭六尺簟謂有餘求之恭即送後忱知恭無簟驚問之恭曰我生無仗物蔬食瓦器宣秉字巨公為司隸常有布被蔬食瓦器帝幸其府舍歎曰楚國二龔不如雲陽宣巨公也化人毛玠字孝先居顯位常布衣蔬食以儉率人由是天下莫不以廉節自勵雖貴寵輿服不敢過度太祖歎之又許劭子將為郡功曹人皆改操飾行袁紹豪俠罷僕陽令車徒甚盛入境曰豈可使子將見耶遂乘車歸家孔儉素紀王謹女東光縣主適太子司議郎裴仲將時妃主皆恃貴以奢豫相矜主獨素儉漢陽公主名暢永貞元與諸公主皆進封戚近爭為奢詡事主獨以儉常用鐵簪自畫壁記田租所入文宗尤惡世流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宮所服皆當時賜未嘗敢變元和後數用兵悉出禁藏纖麗物賞戰士由是散於人間內外相矜習以成風若陛下示所好于下誰敢不變帝悅詔宮人視主衣制廣狹遍諭諸主臣敕京光尹禁切浮靡勸崇節儉岑文本上疏勸崇節儉聖賢以簡素為貴皇王以菲薄為德姚珽節愍太子稍失道珽諫曰聖賢以簡素為貴皇王以菲薄為德惟殿下留心恭儉損省玩好以訓大下衣服羸儉竇懷貞衣服羸儉不為輿馬豪侈事居處卑室無裀褥幃帟岑文本始貴自以興孤生居處卑室無裀褥幃帟居陋狹甚李大亮位通顯居陋狹甚素約李懷遠久貴益素約不治居室性節儉韓滉雖宰相子性節儉衣裘茵衽一年一易甚暑不執扇居處陋薄取庇風雨假宅而居柳渾性節儉不治產業官至丞相假宅而居舊史第室童獲猶儒先生家趙璟性清約位合宰而第室童獲猶儒先生家夫儉則人用足而不淫柳宗元晉問其人至今儉嗇三河古帝王之更都焉而平陽堯之所理也有茅茨木椽土型之變故其人至于今儉嗇性約素服御取給則止太常后長孫氏性儉素家不樹產竇威儉不中禮王珪不作家廟四時祭于寢為有司所劾帝為立廟愧之不罪也世以珪儉不中禮少之得大臣體郝處俊性儉素土木形骸自參綜朝政每與上言議必引經籍以應對多有匡益甚得大臣之體馬周疏堯之茅茨土階禹之惡衣菲食臣知不可復於今漢文帝惜百金之費而罷露臺集上書囊以為殿惟所幸夫人衣不曳地景帝亦以錦繡纂組妨害女工特詔除之所以百姓安樂至孝武帝雖窮奢極侈承文景遺德故人心不搖向使高祖之後即武帝天下必不能全此時代差近事跡可見入朝不事騶仗裴玢入朝不事騶仗妻乘竹輿二侍婢黃碧嫌服為山南節度營泰建陵殺禮從儉趙憬寶應中方營泰建陵用度廣又吐蕃盜邊天下荐飢憬褐衣上疏請殺禮從儉士林歎美堯舜之化慈儉趙宗儒進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言薄居處衣食袁滋李愬行己儉約李愬行己儉約其昆弟賴家勳貴飾輿馬矜室廬唯愬所處乃父時故院無所增廣處身儉勤敬晦為浙西觀察使有詔弛榷酒茗官用告乏處身儉勤貲力遂充自持家管鑰徐岱吝嗇自持家管鑰世所譏云以清儉稱李建雖通顯未嘗治垣屋以清儉稱人服其儉張孝忠河北蝗民餓死如積孝忠與其下同粗淡日膳豆䜺而已人服其儉推為賢將供帳不施錦繡裴耀卿帝曰朕有事岱宗魏州剌史崔沔遣使供帳不施錦繡示我以儉此可以觀政也世謂近名番好禮居室服用粗苟至終身世謂近名李德裕昔漢文帝身衣弋綈元帝罷輕纖服故仁德慈儉至今稱之儉約自將李讓夷位雖顯劇以儉約自將為世咨美玩服不為鮮明盧鈞玩服不為鮮明位將相沒而無贏財簡儉寡慾李虞仲簡儉寡慾時望歸重撙節用度柳公綽為河東節廣遭歲惡撙節用度輟宴飲衣食與士卒鈞治身觳薄薛苹封河東郡公治身觳薄所衣綠袍更至緋衣乃易清儉自將韋倫為行軍司馬時中人衛卒多侵暴尤難治倫以清儉自將西人賴濟中宦嫉之以讒貶為大官居不易第服不改初辛秘不知其剌史賈敦頤數歷州剌史資廉潔入朝常盡室行車一乘弊甚羸馬繩羈道上不知其剌史也服用無贏副陽城與奴僕日一食馮元淑與奴僕日一食馬日一秣所至不挈妻子斥俸餘以給貧窮或譏其近名荅曰吾性也不為苦歷職以清儉韋抗歷職以清儉不治產朴簡自處郭曜諸弟或飾池館盛國服曜獨以朴簡自處磁樽漆器錢武肅王衾被衣服悉用紬布自非公用惟磁樽漆器而已恭穆夫人嘗以王寢帳隳裂乃青練帳將易之王曰作法於儉猶恐為奢但慮後代皆施錦繡爾卒不用吳越備史用器止烏漆鄧景山清約子弟饌不過草具用器止烏漆待上賓惟豚魚而已取倉粟紅腐者食之兼給麾下楊綰始輔政御史中丞崔寬本寬侈城南別墅池觀堂皇為當時第一即遣人毀之京兆尹黎幹出入從騶御百數省損才留十餘騎中書令郭子儀在邠州行營方大會除書至音樂散五之四它聞風靡然自化者不可勝紀世以比楊綰山濤謝安云崔植穆宗問司馬遷言漢文帝惜十家產而罷露臺身衣弋綈履革舄集上書囊為殿帷信乎何太儉邪植曰良史非貌言漢承秦侈縱之餘海內凋窶文帝從代來知稼穡艱難是以躬履儉約為天下守財景帝遵而不改故家給戶足飲食儉狹劉晏所居脩行里粗樸庳陋飲食儉狹室無媵婢歷三鎮居處服玩如儒先生韓充雖將家性儉節歷三鎮居處服玩如儒先生約己省費楊行密始乘孫儒亂府庫殫空能約己省費不三年而軍富雄官九卿無產貲張道源雖官九卿無產貲比亡餘粟二斛儉而不陋崔縱貞元元年天子郊見為大禮使歲旱用屈縱樽裁文物儉而不陋作陋室銘以見志崔沔儉約自持祿廩隨散宗族不治居宅嘗作陋室銘以見志嗇事省用牛仙客始在河西嗇事省用崔希逸代之即以聞以儉治天下韓全義其子獻女樂八人帝不納曰我方以儉治天下惡用是為節用度王虔休國本在節用趙璟精治道常以國本在節用極陳王人疲弊歸崇敬代宗幸陝召問得失崇敬極陳生人疲弊當以儉化天下則國富而兵可用居處取避風雨裴玢蔬食弊衣居處取避風雨出軍乘騾封常清性勤儉出軍乘騾私廄裁二馬自刻苦為儉約五代馮道為人能自刻苦為儉約當晉與梁夾河而軍道居軍中為一茅庵不設床席臥一束芻而已未嘗問生事楊綰儉約未嘗問生事祿廩分姻族造之者清談終晷而不及榮利褚無長貲蘇頲性廉儉奉廩悉推諸弟親族褚無長貲性纖嗇王鍔性纖嗇有所程作雖碎瑣無所遺官曹簾壞吏將易之鍔取壞者付船坊以鍼箬每燕饗輒錄其餘賣之以收利故鍔家錢遍天下燒衣易驚棄食易駭來鵠儉不至說剪腐帛而火焚者人聞之必遞相驚曰家之何處燒衣耶委餘食而在地者人見之必遞相駭曰家之何處棄食耶燒衣易驚棄食易駭以其衣可貴而食可厚不忍焚之棄之也然而不知家有無用之人服其衣與其焚也何遠以是棄之未嘗有驚駭者儉者能遠人所以寡過宋子嵩化書李襲譽居家儉厚于宗親祿廩隨多少散之以餘資寫書嘗謂子孫曰吾性不喜財遂至窶乏元德秀天寶十三載卒家惟枕履簞瓢而已族弟結哭之慟曰未嘗完布衣具五味而食吾哀之以戒荒淫貪佞綺紈梁肉之徒耳饔人減雙雞之膳圉人省五馬之秣陶不獻服圬不塓館自身已往振廩同食王維張公德政碑序斥遣浮華皇帝儉勤盥濯陶瓦斥遣浮華好此綈紵敕戒四方侈則有咎韓愈聖德詩濯衣澣冠崔孝公集序天下富穰車服過制公菲飲食卑官室濯衣澣冠俾人瞻我而化李華能節雖虛必盈陸宣公奏議不節則雖盈必竭能節則雖虛必盈太宗敦行儉約謹節徭賦弛不急之用省無事之官黜損乘輿斥出宮女太宗常有氣疾百官以大內卑濕請營一閣以居上憚煩勞竟不之許是以至誠上感淳化下敷正觀八年以後米斗至四五錢皆以嗇用愛人竟獲豐福是所謂能節雖虛必盈之效也敦尚節儉陛下罷息誅求敦尚節儉同上奏議雖少雄邁及貴居處儉約郭元振一歲之計用儉者一歲之計一歲之用宋子嵩化書白勞而不伐易成天下之亹亹亹亹猶勉也勤學意克勤于邦業廣惟勤勤勞王家周公哀我癉人癉勞也詩盡悴人生在勤勤則不匱能勤有繼文王猶勤況寡德乎服其勞有事弟子服其勞以勞定國則祀之勤施無私曰類勤君之執夙興夜寐夙夜匪懈以事一人朝夕臨政處不避污污勞事也子重曰非德莫如勤非勤何以求人養天下之形莊子曰堯服無胈脛無毛以養天下之形也無怠無荒勞而不怨服勤執煩辱之事煩辱勞役召信臣為南陽太守躬耕農出入阡陌止舍鄉亭希有安居時自斬芻第五倫見上門休日坐曹理事薛宣為馮翊日至休吏賊曹椽張扶獨不肯休坐曹理事宣出教曰主吏勿今休所繇來遠矣雖休勿休不懈于位夙夜在公晝而講貫夜而計會勤王王事靡盬絡日矻矻孔耐勞苦封常清性勤儉耐勞苦居暇日常被甲枕戈而臥五代劉祠居暇日常被甲枕戈而臥謂人曰我以此取富貴豈可一日輒忘之且人情易移若一惰其筋力有事何以報國君人者必時視人之所勤人勤于力則工築罕人勤于財則貢賦少人動于食則百事廢今財食與人力皆勤矣願陛下廢百事之勞廣三時之務則播植不愆失劉蕡制策跡之勤者情必生焉柳宗元書勤約自將杜暹能以公清勤約自將亹亹為之立己以勤儉為法柳玭家訓怠墯十二白汝不恭命遐棄厥司書不敢怠荒自暇自逸怠匆荒政燕燕居息蒲百陳遵為椽曹輒廢吏白曰陳椽今日以某事謫遵曰蒲百乃相聞故事蒲自謫當斥故也曹參不事日日飲醇酒養名齊俗吏人養名舒緩朱博為郡怒曰齊人欲以為俗耶溺職沉滯不與守宮廢命不敬失官慢也傳一日失職則死及之逋事義縱為上黨令無逋事也孔八塼乃至李程為翰林學士學士入署常視日影為候程性爛日過八塼乃至晚節慵轉劇小年習性懶晚節慵轉劇杜甫送李校書對書常懶讀韋蘇州始除尚書郎累日曾一櫛對書常懶讀驕怠易生陸贄奏議昔衛獻出奔久而復國大夫迎於境者執其手而與之言迎於門頷之而已言其驕怠之易生也齊桓將圖霸功管功管仲戒之以無忘在莒懼其情志之易變也在莒同上願陛下以在莒為書紳之規以衰衛為覆車之鑒過懶從衣結杜甫春日江村天向交游萬事慵登四安樓幽棲身懶動客至欲如何絕句朝事多闕韓熙載知制誥世懶朝事多闕延巳奏其怠墯罷職江南錄怠者不能修而忌者畏人修吾嘗試之矣韓文毀原劉詞居暇日常被甲枕戈而臥謂人曰我以此取富貴豈可一日輒忘之且人情易習若一墯其筋力有事何以報國五代史
