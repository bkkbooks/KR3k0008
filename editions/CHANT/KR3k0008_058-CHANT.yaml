body:
  text: 卷第五十八白周鄭交質王子孤為質於鄭鄭公子為質於周信不由衷質無益也單于遣子入侍侍子質任魏志司馬宣王與孟建書曰保官空虛初無質任孫盛曰五帝初無誥誓入質人起於周微漢高請羹隗囂捐子馬超背父安在囚質勝之以解約致之以來蘇何必拘六親以束其情猖所愛以制其命蕭同叔子為質晉伐齊齊請盟晉人曰必以蕭同叔子為質對曰蕭同叔子非他寡君之母也吾子布大命於諸侯而曰必質其母是以不孝令也長安君史記秦伐趙趙孝戌王求救於齊齊曰必長安君為質太后用事曰有言長安君為質者老歸唾其面侍子陳湯上疏言唐居侍子非王子也按驗實是王子湯下獄死谷永上疏言湯功臣書奏上出湯奪爵為仕伍也兩屬漢書樓蘭遣一子質匈奴一子質漢時貳師擊大宛匈奴因樓蘭候漢使迴者欲絕勿通詔捕樓蘭王詣闕薄責王對曰小國在大國之間不兩屬無以自安願徙居漢地上直其言遣歸國亦因使伺候匈奴自是不甚親信樓蘭孔遣子入侍藩鎮李師道蔡平又遣比部員外郎張宿諷令割地質子宿謂曰公令歸國為宗姓以尊卑論之上叔父矣不屈一也以十二州事三百餘州天子北面稱藩不屈二也以五十年傳爵臣二百年天子不屈三也今反狀已暴上猶許內省宜遣子入宿衛割地以贖罪師道乃納三州遣子弘方入侍狼顧平城李德裕上尊號冊質帝女戚海疆有狼顧平城之心貴女生還同上六贏逃遁貴女生還四夷質子多在京師薛登時四夷質子多在京師如論欽陵阿史德元珍孫萬榮皆因入侍見中國法度及還並為邊害登諫曰臣聞戎夏不雜古所戒也故斥居塞外有時朝謁已事則歸之三王之法也臣慮備豫不謹則夷狄稱兵非貽謀之道臣願充侍子可一切禁絕后不納以子為質劉正臣攝平盧節度使遣使道海至平原與太守顏真卿相結真卿喜以子為質而歸貲糧焉陸長源傳以少女為質尉遲勝本王于闐安祿山反勝使弟曜攝國事身率兵五千赴難國人固留勝勝以少女為質而行肅宗嘉之拜特進兼殿中監遣兄賢入質朱全忠使親將陳俊王紳入叔琮軍崔洪留之紳亡歸洪與行密欲邀友恭軍不克會河東客伊超使淮南還過蔡洪亦留之因是并俊送全忠以步將苛拘為解遣兄賢入質全忠還之質洪子於汴全忠使賢調蔡卒二千出戍將行大將崔景思不悅殺賢洪懼趨申州趙德諲傳遣清平官酋望趙宗政質子三十人朝乞盟請為兄弟若舅甥南蠻傳白象胥周禮國語舌人委而禮之舌人即象胥也重譯而至譯官丞令漢書百官表典客屬官有行人譯官丞令言語不達戎子駒支曰飲食衣服不與華同贄幣不通言語不達左傳九譯漢書譯長黃支國與朱崖相類廣大戶多異物武帝已來皆獻見有譯長屬黃門孔願為天可汗營祠西域傳又國有摩訶波多磨龍池願為天可汙營祠因丐王冊鴻臚譯以聞四譯南詔烏蠻其語四譯乃與中國通通六蕃語安祿山通六蕃語突厥傳聖人飲食聲樂不與之共來朝坐於門外古人體委以食之不使之知馨香嘉味也譯史傳導回鶻帝欲饗回鶻公主問禮於李泌對曰肅宗於燉煌王為從祖兄回鶻妻以女見帝於彭原獨拜廷下帝呼曰婦而不名嫂也當艱虞時方藉其用猶以臣之況今日乎於是引回鶻公主入銀臺門長公主三人候諸內譯史傳導拜必答揖與進帝御秘殿長公主先入侍回鶻公主入拜能漢語四夷附錄莊宗崩明宗遣供奉官姚坤告哀於契丹阿保機謂坤曰吾能漢語然絕口不道於部人懼其效漢而怯弱也重譯以達祿山謀逆十餘年凡降蕃夷皆接以恩或重譯以達故蕃夷情偽並得之祿山通夷語躬自慰撫兵車三白周禮車僕掌戎輅之倅戎輅王車所乘倅副也廣車之倅撗陣車也闕車之倅補闕之車輕車之倅馳敵致師凡師革車各以其倅所謂五戒革車之倅對敵自隱蔽也輂輦鄉師大軍旅治其徒役與其輂輦戮其犯命者注輦馬駕輦人挽以載任器止以為藩營也詩小戎群臣之革車也云云元戎十乘以先啟行詩臨衝詩臨衝閑閑攻城車也武剛車漢書衛青見匈奴以武剛車自環為營即兵車朋車也車戰車也史游闕傳曰楚子為游闕三十乘以逐晉師注車名以游徼補闕也孔引撞車毀其堞侯君集高昌不臣拜交河道行軍大總管出討賊嬰城自守遣諭之不下乃刊木塞塹引撞車毀其堞飛石如雨所向無敢當在關中車乘之在關中者與列於牧廄不殊陸贄以二千乘繚營房琯持節招討西京防禦蒲潼兩關初琯用春秋時戰法以二千乘繚營騎步夾之既戰賊乘風譟牛悉髀栗賊投芻而火之人畜焚燒行以載兵止則為陣馬燧為戰車冒以狻猊象列戟干後行以載兵止則為陣遇險則制衝冒車畫龍虎哥舒翰與崔乾祐戰車畫龍虎飾金銀爪自將駭賊掎戈大逐北賊負薪塞路順風火其車戎服四白均服振振取虢之旂振振盛貌戎事上下同服韎韋之跗注韎韋赤色跗注戎事所服若褲而屬於跗與褲連也戎服將事鄭子產獻捷于晉云云國語晉攻狄叔虎被羽先登克之羽飛鳥繫於背今負眊孔以戎服見三橋李晟帝至自梁晟以戎服見三橋帝駐馬勞之入朝戎服張說遷荊州長史俄以右羽林將軍栓校幽州都督入朝以戎服見帝大喜褫戎服則兩郡守耳柳公綽徙鄂岳觀察使時方討吳元濟詔發鄂岳卒五千隸安州刺史李聽公綽曰朝廷謂吾儒生不知兵邪即請自行許之引兵渡兵抵安州聽以軍禮迎謁公綽謂曰公所以屬鞬負弩豈非兵事邪若褫戎服則兩郡守耳何所統壹哉以公世將曉兵吾且欲署職以兵法從事聽曰唯命簪笏就列鳳儀可觀一品集嗢沒斯等冠帶圖榮以縹纓解其衣毳簪笏就列風儀可觀推勁悍之心豈勞戴鶡服禮義之教寧比雞冠垂老戎衣窄杜甫詩兵器五白老子曰兵者不祥之器非君子之器不得已而用之執兵不反兵而鬥謂遇父母讎兵常在身常持兵河東守每行縣至絳絳侯周勃畏誅常被甲令家人持兵以見之上書告勃反下獄死凶器自選兵仗晉馬隆孝興將討羌請自武庫選兵仗武庫令與隆爭中丞劾奏隆隆曰臣當亡命戰場而武庫令乃以魏時朽杖見給云云帝從之孔拍刀閹稜善用兩刃刀其長丈名曰拍刀一揮殺數人無前堅對用槊羅藝善用槊陌刀李嗣業後應募安西軍中初用陌刀而嗣業尤善袒持長刀出陣廣平王收長安嗣業統長安前軍陣于香積祠北賊大出掩追騎還蹂王師於是辭不能陣即袒持長刀大呼出陣前殺數十人復整步卒二千以陌刀長柄斧堵進所向無前朱瑾槊米志誠弩田頵傳安仁義以善射冠軍中當時稱朱瑾槊米志誠弩皆為第一仁義常曰志誠弩十不當瑾槊之一瑾槊十不當吾弓之一人以為然舞刀立馬上裴旻嘗與幽州都督孫佺北伐為奚所圍旻舞刀立馬上矢四集皆迎刀而斷奚大驚引去持槊而鬥南蠻傳樸子臠趫悍善用竹弓入林射飛鳥無不中人多長大負排持槊而鬥又有望蠻者用木弓短箭鏃傅毒藥中者立死器械犀銳牛仙客始在河西器械犀銳崔希逸代之即上聞舒鉏鉤為兵號霍錐康承訓拜徐泗行營都招討使龐勛之始得徐州資儲蕩然乃四出剽取男子十五以上皆執兵舒鉏鉤為兵號霍錐弧矢制倍於常劉黑闥傳初秦王建天策府其弧矢制倍謚常逐黑闥也為突厥所窘自以大箭射郤之突厥得箭傳觀以為神後餘大弓一張矢五藏之府庫世寶之每郊丘重禮必陳干儀物之首以識武功立器械堅良辛秘拜昭義軍節度使器械堅良銅鐵鑄兵張曲江龍池飲序蚩尤不道炎帝不制銅鐵鑄兵豺狼撗厲而軒轅氏將禁其暴則天為之降玄女修整器械累年用兵計所闕者最是兵仗須早為備贊皇一品集劉濛修器械皆良金壽革蜀器械皆犀銳李德裕徙劍南節度使請甲人於安定弓人河中弩人浙西由是蜀之器械皆犀銳苔臥綠沉槍杜甫重過何氏詩穿朽鈍折安祿山時兵暴起州縣發官鎧仗皆穿朽鈍折持挺鬥弗能亢吏皆乘城匿或自殺不則就擒日不絕禁衛皆市井徒既授甲不能脫弓襡劍繫乃發左藏庫繒帛大募兵武庫令掌藏天下之兵仗器械辨其名數以備國用六典牙六白兵書曰牙旗者將軍之精凡始豎牙必以剛日剛日者謂上剋也兵牙之日吉氣來應大勝之徵又黃帝出軍決曰始立牙之日旗旛或從風而舉暉暉終日吉氣來應勇氣奔逸又出兵討伐引去出城門望見黃雲及白水者舉白牙旗及五色牙旗隨天氣四時也一手舉魏志曲韋初為張邈士屬趙寵牙旗長大莫能勝韋一手舉之寵異其才力崇牙樹羽詩建牙牙旗繽紛文選孔觸門墮注旄干折哥舒翰守潼關師始東先驅牙旗觸門墮注旄干折眾惡之牙干折哥舒曜李希烈陷汝州詔拜曜東都汝州行營節度使帝祖通化門是日牙干折時以翰出師已如此而斬持干者卒以敗今曜復爾人憂之庭容牙節示禮而不慁也劉禹錫管城新驛記箕宿禡牙杜牧賀平党項橦牙茸纛公命享于新堂橦牙茸纛咸飾于下柳宗元嶺南饗軍堂記無劉我徒鏃刃鋒鍔畢集于兇躬柳宗元禡牙文唯爾有神懋揚迺職敢告無縱詭類無劉我徒鏃刃鋒鍔畢集於兇躬鎧甲于盾咸完于義軀是舉也無作神羞牙帳自破武德元年骨咄祿特勒來朝帝宴太極殿為奏九部樂引升御坐是歲始畢牙帳自破突厥傳擇趫秀彊力者萬人號牙兵田承嗣金鼓七白鼓人掌六鼓四金之音聲以節音樂以和軍旅辨其聲用周禮以鼖鼓鼓軍事大鼓也以金鐲節鼓鐲征也真角也以金鐃止鼓如鈴無舌以金鐸通鼓鐸大鈴振之以通鼓軍旅夜鼓鼜晉戚夜戒守鼓軍動則鼓其眾韗人吁遠反為鼓良鼓瑕如積環革急也密須之鼓左傳金鼓以聲氣也吾聞鼓而已不聞金也鼓以進軍金以退軍不聞金言將死齊陳書云持布鼓過雷門漢書鼉鼓路鼓給鼓角令樂令諸道行軍應給鼓角者三萬人以上給大角十四具大鼓二十四面二萬以上角八具鼓十四面萬人以上角六具鼓十面不蒲萬人臨時量給軍三分減鹵簿令大駕長鳴中鳴各百二十具援枹而鼓張侯曰師之耳目在吾旗鼓進退從之乃援枹而鼓枹鼓槌也周禮曰王執路鼓侯執鼖鼓軍將執晉鼓師帥執提旅帥執鞞提鼓周禮馬上之鼓曰提鼓有木可提執也登聞鼓施於朝曰登聞鼓堯置敢諫之鼓即此也朝晡鼓施於府寺曰云云枹鼓枹一作桴謂擊鼓物也在村墅曰枹鼓也在邊徼曰警鼓黃門鼓崔豹古今注漢有黃門鼓吹一名樓車也樂錄曰鼓吹有龍頭大𪔳中鼓獨揭小鼓皆有品秩天子以賜臣下及軍旅用也孔鼓令竇軌稽胡賊五萬掠宜春詔軌討之次黃欽山遇賊乘高叢射眾為卻軌斬部將十四人更拔其次代之身擁數百騎殿令曰聞鼓不進者斬既鼓士爭赴賊大破之警眾馬周先是京師晨募傳呼以警眾後置鼓伐之俗曰冬冬鼓戒鼓人報籌段秀實大曆三年徙涇州是軍自四鎮此廷赴難征伐數有功既驟相與出怨言別將王童之謀作亂約曰聞警鼓而縱秀實知之召鼓人陽怒失節戒曰每籌盡報因延數刻盡四鼓而曙親鼓郗士美討王承宗遣大將王獻督萬人為前鋒獻恣橫逗撓士美即斬以侚下令曰敢後者斬親鼓之大破賊鼉鼓騰聲而隱轔于公異平朱泚露布擊鼓讙山郭子儀遣張知節為前鋒營韓公擊鼓讙山褫氣張介然守陳留賊渡河聞鉦鼓聲皆褫氣不能授甲身執金鼓參佐命平陽公主薨大常議婦人葬古無鼓吹帝曰軍樂也往者主身執金鼓參佐命于古有邪宜用之天地徘徊楊炎平胡聖德頌金鼓一振天地徘徊春風入鼓鼙杜甫詩夜鼓朱雀街郭子儀會故將軍王甫結俠少夜鼓朱雀街呼曰王師至吐蕃夜潰擊銅鼓馮子猷入朝載金一舸自隨高宗遣御史許瓘視其貲瓘至洞子猷不出迎後率子弟數十人擊銅鼓蒙排執瓘而奏其罪凡軍鼓之制有三唐六典武庫令凡軍鼓之制有三一曰銅鼓二曰戰鼓三曰鐃鼓注銅鼓蓋南中所制軍旅之間復有鐃鼓焉金之制有四同上一曰錞二曰鐲三曰鐃四曰鐸氣雄鉦鼓于公異露布金鼓一動萬方畢臣柳宗元平淮西雅錫之金鼓以號以誅盧元輔胥山銘大呼瘡潰李嗣業與子儀等圍相州師耄諸將無功獨嗣業被堅數奮為諸軍冠中流矢臥帳中方愈忽聞金鼓聲知與賊戰大呼瘡潰血流數升卒節鉞八白周禮掌節守邦而辨其用凡邦國之使節山國用虎節土國用龍節皆金也以英蕩輔其節注以函器盛節也門關用符節貨賄用璽節道路用旌節皆有期以反節注門關司門等貨賄司市道路鄉遂大夫主塗之官也守邦國者用玉節守都鄙者用角節注諸於其國中自為節以命為大小角節公卿大夫王子弟於其采邑有命者亦自用也司關掌國貨之節以聯門市貨節謂商本所發司市為之璽節自外來者案其節書其貨之多少也記曰凡君召以三節二節以走一節以趨節以明信傳君命召急則持二緩則持一賜鈇鉞然後殺蘇武仗節牧羊臥起操持節旌落盡嚴助以節發稽兵司隸牧節諸葛豐為司隸舉節欲收侍中許章於是上收豐節司隸去節自豐始也匈奴法漢使不去節不以墨黥面不得入穹廬孔握節登陴李絳握節登陴餘見無備門因降受節馬燧武俊之圍趙也康日知不支將棄趙燧請詔武俊擊朱滔授以深趙以日知為晉慈隰節度使及三州降燧固讓日知且言因降受節恐後有功者踵以為利帝嘉許假長安本色藩鎮劉仁恭光化初使其子守文襲滄州節度使盧彥威棄城走遂有滄景德三州地用守文為節度留後請命于朝昭宗怒不與會中人至仁恭嫚謂曰旌節吾自可為要假長安本色耳何見拒邪由是兵益張秉鉞秉鉞有李公凜然負英姿李白宣城送劉副使帝臨軒授鉞渾瑊朱泚兵傳城賊去授奉天行營副元帥帝臨軒授鉞用漢拜韓信故事制曰寇賊不紀授爾節鉞以戡多難瑊頓首曰敢不畢力以對揚天子休命兵部大將出征皆告廟授斧鉞唐六典蘆生三節北夢鎖言李全忠所居有蘆生三節一枝盈丈而三節後其家三人秉節鉞旌以顓賞節以顓殺符寶郎凡命將遣使皆賜旌節唐百官志節懸畫木盤三旌以絳帛五丈粉畫虎有銅龍一首纏緋幡紫縑為袋油囊為表節懸畫木盤三相去數寸隅垂赤麻餘與旌同車服志金節煌煌柳宗元平淮夷雅金節煌煌錫盾雕戈安用假節為穎王璬安祿山反詔領劍南節度大使璬之出遽不及受節司馬史賁請建大槊蒙油囊先驅以威道路璬笑曰既為真王安用假節為旌節花王處回有道士王栲栳欈花來種之曰此仙家旌節花也後處回除二鎮方致仕出耳目記導以劍南旗節貴妃楊氏每十月帝幸華清宮五宅車騎皆從國忠導以劍南旗節甲冑九白書曰惟甲冑起戎周禮函人為甲犀甲七屬兕甲六屬合甲五屬屬讀如灌注之注謂上旅下札讀之數革堅者札長合甲屑去甲裏肉但取表之以為甲也犀甲壽百年兕甲壽二百年合甲壽三百年革堅也凡為甲先為容容為象式然後制制其廣袤凡察革之道視其鑽空欲惌惌小孔視其朕欲直革剝櫜之欲約也卷置櫜中視其裏欲易易其敗穢傳曰闕鞏之甲武王所以克商闕鞏國名衷甲甲在衣中免胄趨風邾人獲公胄懸諸魚門釋甲執冰言無戰志冰箭筩可以取飲也組甲楚鄧廖也組甲漆甲也棄甲而復華元犀兕尚多棄甲則那敝甲素甲藏於私家非禮也介冑有不可犯之色忠信以為甲冑國家靡敝則甲不組縢組飾甲及襟帶也甲若有以前之則執以將命無以前之則祖櫜奉胄甲鎧也有以前之謂他贄敝也櫜韜甲之衣榖梁傳曰作甲非正也夫甲非人所能為四人各業孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人唯恐傷人故君子慎所習東郡被甲韓延壽鞮鍪兜鍪介冑之士不拜甲不解壘壘以盛甲言齊桓九合諸侯國語夫差水犀之甲三千水犀之皮有珠甲山犀則無贖罪管子曰輕過移諸甲重過贖以犀甲一戟家藏晉桓伊為江州刺史家先藏甲六首領為表死乃上之詔褒納鞮鍪生蟣蝨介冑被露汗見長楊賦兵者不祥之器老子魏武卒能負三屬甲贏糧日中而趨百里者復其人也漢書刑法志不曰堅乎甲吏禮煇者甲吏之賤畜兵器律擅興律諸有禁兵器者徒一年半弓一張加二等甲一領弩三張流二千里甲三領及弩五張絞又雜律諸請受軍器事訖停留不輸者十日杖六十叔孫氏之甲有幟幟記識也傳書曰善敹乃甲冑榖古料字又音僚私畜周亞夫子為父置五官尚方甲楯五百可葬者亞夫下獄曰臣買葬器也廷尉曰欲反地下乎不食而死也燕無函夫人而能為函也見周禮裹糧坐甲固敵是求正義曰用則被之於身不用則坐之於地也孔襞紙為鎧徐商拜河中節度置備征軍凡千人襞紙為鎧勁矢不能動賜旗甲呂元膺拜東都留守故事留守賜旗甲至元膺不給衷甲候諸郊李聽王廷湊之亂詔聽悉兵屯貝州史憲誠懼聽因取道襲之衷甲候諸郊聽敕士櫜兵野次魏人乃安請甲人於安定李德裕請甲人於安定由是蜀人器械皆犀銳褫氣不能授甲張介然守陳留介然到屯不三日賊已渡河士聞鉦鼓聲皆褫氣不能授甲黑繒黑甲楊行密有銳士五千衣以黑繒黑甲號黑雲都器甲充牣王忠嗣節度朔方器甲充牣給太原澤潞車李吉甫奏以江淮甲三十萬給太原澤潞車勁弓利刃不能甚傷吐蕃贊普其鎧冑精良衣之周身竅兩目勁弓利刃不能甚傷委仗鎧韋皋朱泚部將牛雲光謀請皋為帥將劫以臣泚至汧陽遇泚奴使皋所皋迎勞先納奴偽受泚詔皋曰大使固善苟無他圖請釋甲以安眾而後可入也雲光以皋諸生亡能為乃命士委仗鎧明日置酒大會奴雲光與其下至皋伏甲左右廡酒行盡殺之以其首徇造鎧必短長三制馬燧造鎧必短長三制稱士所衣以便進趨犀甲柳宗元平淮夷雅犀甲熊旂威命是荷雨拋金鎖甲社詩貢鎖子鎧西域康居開元初貢鎖子鎧甲光炫日高麗時百濟上金髹鎧又以玄金為山五丈鎧士被以從帝與勣會甲光炫日明光鎧帝料酋長三千五百人悉官之許內從餘眾三萬縱還之誅靺鞨三千餘人獲牛馬十萬明光鎧萬領鎧甲華整尉遲恭傳王世充兄子琬使於建德乘隋帝廄馬鎧甲華整出入軍中以夸眾飾以組繡金銀其光耀日周德威梁軍至於柏鄉趙人告急莊宗自將出贊皇會德威于石橋進距柏鄉五里營野河北晉兵少而景仁所將神威龍驤拱宸等軍皆梁精兵人馬鎧甲飾以組繡金銀其光耀日晉軍望之色動德威勉其眾曰此汴宋傭販兒徒飾其外耳其中不足懼也其一甲之直數十千得之適足為吾資無徒望而愛之當勉以往取也甲之制十有三武庫令甲之制十有三一曰明光甲二曰光要甲三曰細鱗甲四曰山文甲五曰烏鎚甲六曰白布甲七曰皁絹甲八曰布背甲九曰步兵甲十曰皮甲有一曰木甲十有二曰鎖子甲十有三曰馬甲注明光光要細鱗山文烏鎚鎖子皆鐵甲也皮甲以犀兕為之其餘皆因所用物名焉劉詞詞居暇日嘗被甲枕戈而臥謂人曰我以此取富貴豈可一日輒忘之且人情易習若一墮其筋力有事何以報國五代史白表旗傳曰舉其表旗謂旌旗以表貴賤也以為旗章禮分之采物傳言旌旗各有分制耳目張侯事見上注揭竿漢書陳勝揭竿為旗揭豎也三辰旂旗昭其明也三辰畫日月星也火焚其旗不利行師祁瞞亡大旆之左旃因風失之通帛為旃不去其旗是以甚敗衛懿公與狄戰云云拔旆晉人車不能進楚人惎之拔旆投衡乃出內旌楚戰鄢陵鄭石首御成公曰衛侯不去其旗是以甚敗乃內旌於弢中皆為車重去之旌旗拂天文選旌旗繽紛下蟠于地家語軍容戎事虹旗攝麾而就卷文選悠悠旆旌孑孓于旌搖搖楚王曰寡人之心搖搖然如懸旌啟行以先云云反旆令尹南轅反旆將歸也太常書厥有成績紀于太常太常王之旗也盡日月有功者紀之旌表也九章管子曰九章置則兵治士勇矣一曰舉日章則晝行二曰舉月章則夜行三曰舉龍章則水行四曰舉虎章則林行五曰舉鳥章則行阪六曰舉蛇章則行澤七曰舉鵲章則行船八曰舉狼章則行山九曰舉韟章則載食而駕物有其容熊虎之制龍蛇之章頒旗物周禮各建共旗九旗周禮司常掌九旗之名物以待國事日月為常交龍為旂通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌及國之大閱王建大常諸侯建旂孤卿建旃大夫建物師都建旗州里建旟縣鄙建旐道車載旞游車載旌皆畫其象也龍旂九旒以象大火交龍為旂諸侯所建大火心星也其屬九星故以九旒為象鳥旟七旒以象鶉火鳥隼為旟州里所建鶉火七星故取象也禮熊旗六旒以象代熊虎為旗師都所建代屬白虎宿連參六星故取象也龜蛇四旒以象營室象蛇為旐縣鄙所建營室四星以象東壁故象也行前禮前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅衛不去旗懲共甚敗晉能拔旆謂以數奔搴旗艾胡鮮之旗歲時更旌取舊以新周禮旌門王祭祀則置楊徽者公徒也鍪弧鄭伯旗名曲旃田蚡立曲旃注禮孤卿建旃曲者柄木曲許慎曰旃曲把旗以招士也建旐設旌旟旐有翩楚辭蜺旌蜂旌太一史記帝伐南越告禱太一以牡荊畫幡日月北斗登龍以象天一云日月為太一降命曰靈旃兵禱則太史奉以指所伐國旌旗十孔大閱旗幟周七十里嚴綬自河東司馬進司空在鎮九年嘗大閱旗幟周七十里旗鎧照日馬璘從李光弼攻洛陽史朝義眾十萬陣北邙山旗鎧照日每旗五伍為列朱延壽初壽州刺史高彥溫舉州入朱全忠行密襲之諸將憚城堅不可拔延壽鼓之拔其城即表為淮南節度副使全忠猶屯壽春延壽以新軍出每旗五伍為列遣李厚以十旗擊西偏不勝將斬之厚請益五旗誅死戰全忠引去執大旗李光弼執大旗曰望吾旗麾若緩可觀便宜若三麾至地諸軍畢入生死以之退者斬李靖兵法曰諸軍將五旗各准方色赤南方火白西方金皂北方水碧東方木黃中央士上則不動用為四旗之主而大將將動持此黃旗於前立如東西南比有賊各隨方色舉旗當方面兵急須裝束旗向前亞方面兵急須進旗正豎即住臥即迴審細看大將軍所舉之旗須依節度諸每隊給一旗行則引隊住則立於隊前通典偃旗伊謹賊遣驍將莊少誠以兵萬人遏江道不得西謹選士七千列王屯相望偃旗以待旌旗亙二百里哥舒翰安祿山反召翰拜太子先鋒元帥天子召翰以軍行過門毋下旌旗亙二百里執大旗出入陣間萇從簡莊宗與梁軍對陣梁軍有執大旗出入陣間者莊宗登高丘望見之歎曰彼猛士誰能為我取之者從簡因請前往莊宗惜之不許從簡潛率數騎馳入梁軍奪其旗而還軍裡皆鼓譟莊宗壯之五代史雲旗日羽雲旗獨孤及翠蕤雲旓相蕩摩杜甫魏將軍歌麾旗三李光弼麾旗三諸軍爭奮賊眾奔敗白鵲旗李太白詩斬胡血變黃河水梟首當懸白鵲旗旌旗日暖龍蛇動杜甫腊日詩赤羽旗退朝詩春殿晴曛赤羽旗旗掩月杜甫朝太清賦我旆我旗于道于陌柳宗元雅旗之制三十有二唐六典武庫令旗之制三十有二一曰青龍旗二曰白獸旗三曰朱雀旗四曰玄武旗五曰黃龍負圖旗六曰應龍旗七曰龍馬旗八曰玉馬旗九曰鳳凰旗十曰鸞旗十一曰鵔鸃旗十二曰太平旗十三曰麒麟旗十四曰飛麟旗十五曰飛黃旗十六曰駃騠旗十七曰白澤旗十八曰五岳旗十九曰犀角旗二十曰金牛旗二十一曰兕旗二十二曰三角獸旗二十三曰角瑞旗二十四曰吉利旗二十五曰騼䮷旗二十六曰騶牙旗二十七曰黃鹿旗二十八曰白狼旗二十九曰赤熊旗三十曰辟邪旗三十一曰苣文旗三十二白刃旗其大總管及副總管則立十旗以上小總管則立四旗以上行則引前住則立於帳側通典白弦木易聖人弦木為弧剡木為矢以威天下和之弓書和之弓垂之竹矢在東房注和垂皆古之巧者為弓矢皆中法故歷代寶之彤弓天子賜有功諸侯也禮諸侯賜弓矢然後專征伐彤弓弨兮受言藏之詩象弭弓末飾也弓矢既調詩繁弱傳曰封父之繁弱古之良弓名也六鈞顏高之弓六鈞百八十斤弛張禮張而不弛文武不為也弛而不張文武不能也一弛一張文武之道也以其文武喻弓久張則失其力久弛則失其體招我以弓烏號弓名騂騂角弓翩其反矣天之道其猶張弓高者抑之下者舉之老子良弓藏飛鳥盡良弓之子必學為箕禮載櫜弓矢燕弧盈庫而委勁文選既張我弓桃弧傳曰凡啟冰室挑弧棘矢以除其災桑弧禮士初生以桑弧蓬矢六射天地四方示有事於四方也周禮司弓矢掌六弓四弩八矢之法仲春獻弓弩仲秋獻矢菔菔以盛矢也天子之弓合九而成規諸侯之弓合七而成規士合三而成規燕角荊幹周禮燕之角荊之幹此材之美者可作弓弩也遺人弓禮凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣主人自受由客之左接下承弣簫弭頭也弣把中也獻弓禮凡獻弓則以左手屈韣執弭韣弓衣也交韔二弓交二弓於韔中詩二矛重弓重弓備壞不得挾弓矢公孫弘奏云云吾丘壽王誥後漢盍延巨卿彎弓三百斤楚人以繁弱弓徵繳加歸鴈之上戰國策弢無弓菔無矢齊桓公九合諸侯云云楚人亡弓楚人得之谿子巨黍古之良弓罷置弓弩後漢陸康字季寧除高城令在邊舊制戶一人具弓弩以備不虞康皆罷遣以恩信為治寇盜亦息之長八尺後魏書奚康生能引彊弩梁聞之遺大弓長八尺兩把中圍尺有一寸箭粗大如今之長笛送與康康集文武射之猶有餘力竊寶玉大弓傳陽虎造弓周禮弓人為弓取六材必以其時幹角筋膠漆絲六材既聚巧者和之凡相幹欲赤黑而陽聲凡析幹射遠者勢曲射深者用直凡相角秋殺者厚春殺者薄老牛之角直而澤老牛之角彌而昔昔七角反角欲青白而豐末角之中恆當弓之畏畏必撓撓欲其堅畏當為威威烏迴反威謂弓威角中央與淵相當也角長二尺五寸三色不失理謂之牛戴牛本白中青末豐為三色牛戴牛謂角直一牛也此良角也得此六材之全然後可以為良全善也凡為弓冬析幹春液角夏治筋秋合三材三材謂膠絲漆寒奠體則張不流奠謂為定至冬膠堅內檠中定往來之體也流移也冰析灂則審環灂讀筋膠之和也審定也環如環之曲也故張如流水言無難易材美工巧為之以時謂之參均均者三謂之九和謂材幹體力之和均也上制六尺六寸上士之服中制六尺三寸中士之服下制六尺下士之服人各有形自大小為三等上工下工謂定巧拙弓有往來之體謂控弦之淺深也安危之名安危謂弓之體性遲速也安遲也危速也環灂謂筋角之體相得如環之均平繫摩欲張弓先繫摩之謂拂之摩之和既乖於巧者射乃爽於臧弓合材奠體合規中矩為弓各因其居之躬志慮血氣隨人情性豐肉而短寬緩以荼荼紓者謂之危弓安矢骨直以立忿摯以奔者謂之安弓危矢骨直剛毅人也人安弓安矢安則莫能以速中且不深三舒不能疾中且不深也人危弓危矢危莫能以愿中愿愨也三疾不能愨而中言矢行疾而過去也燕角荊幹此材之美者九年成闕子曰宋景公使弓工作弓九年成公曰失遲對曰臣之精力盡矣獻弓三日乃死公登箕山而射矢踰西霜之山集彭城之東餘力逸勁飲羽於石梁也孔請弓人河中李德裕為鄭滑節度使徙劍南西川請弓人河中由是蜀之器械皆犀銳士手不能張突厥毗伽可汗默棘連掠涼州都督楊敬述使官屬盧公利元澄等勒兵討捕澄令于軍曰贏臂持滿外注會大寒裂膚士手不能張弓矢由是大敗霜重麟膠勁風高月影圓鳥飛隨帝輦鴈落逐鳴弦楊師道詠弓詩落鴈帶書驚啼猿映柭轉太宗詠弓漆弓王忠嗣有漆弓百五十斤每弢之示無所用名弓李密饗士翟讓至密所密出名弓示讓讓挽滿始彉從禽弓始彉韓逾遠遊聯句開弓射鵃吺同上聯句大弨大弨擐壁無由彎雪後寄崔二十六盤馬彎弓將軍欲以巧伏人盤馬彎弓惜不發雉帶箭插羽彎弓辭漢月插羽破天驕李白塞下曲射賢王彎弓射賢王薊北門行上彎弧懼天狼挾矢不敢張流夜郎滿月不憚堅彎弓綠絃開滿月不憚堅贈宣城守挽弓當挽彊杜甫遣興三尺角弓兩斛力虎牙行左右無空發張士貴彎弓百五十斤左右無空發不筋漆而利水昌之西野桑生石上其材上屈兩向而不直取以為弓不筋漆而利名曰瞑弓南蠻傳不如識一丁字張弘靖嘗曰天下無事而輩挽兩石弓不如識一丁字軍中以氣自任銜之鳴弓射獸能杜甫詩彎落月之弓李太白獵賦彊弓毒矢韓文弓之制有四唐六典武庫令弓之制有四一曰長弓以桑柘步兵用之二曰角弓以筋角騎兵用之三曰弰弓短弓也利於近射四月格弓綵飾之弓羽儀所執藏之武庫秦王建天策府其弧矢倍於常後餘大弓以藏之武庫餘見矢門白剡木為矢弧矢之利以威天下竹矢亦見上垂之竹矢在東方董澤之蒲可勝既乎徹札之勁養由基蹲甲而射之徹七札焉金僕姑矢名忘歸矢名蕭慎楛矢肅慎國貢以楛木為矢以石為鏃貫隼家語隼集陳侯之庭楛矢貫之石砮白羽若月赤羽若日家語子路云云弓矢既調魚服矢服銀鏑在弦矢在弦上不得不發捨拔則獲攢鍭插羽男子初生以蓬備禮男子生以桑弧蓬矢六以射天地四方示有事於四方冰室方啟用棘除災冰室初開用挑弧棘矢以除其災既挾我矢詩恐不傷人孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人殺矢田獵之矢也周禮冶氏為之枉矢絜矢利大射用諸守城野戰也殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢庫矢用諸散騎亡矢者不用則更更償也用之則不償傳曰抽矢菆菆好箭矢道同的晁錯論材官也矢窮李陵兵盡矢窮挹婁矢魏志挹婁國弓長四尺如弩矢用楛長尺八寸青石為鏃肅慎之國也造矢矢人為矢周禮兵矢田矢五分二在前三在後在前謂箭槁中鐵莖居五分之二在其前三分其長而殺其一殺謂削之令趨鏃也五分其長而羽其一長五分取一分羽之水之以辨其陰陽陽浮陰沉夾其陰陽以設其比比枯夾其比以設其羽三分其羽以設其刃刃鏃雖有疾風亦不憚之矣言矢善也前羽則俛後弱則翔中弱則紓中彊則揚羽豐則遲殺則趮皆謂幹羽之病使矢去不止也趮音子到反故夾而搖之以視其豐殺之節今人以指夾舞之是也撓之以視其鴻殺之稱相笴欲生而摶笴幹字也相擇也生無瑕蠹摶圓也殺羽設刃見上矢射而不入與無鏃同漢書和既垂於巧者射已爽於藏兮茀矢三分一在前二在後戈射之矢也殺矢七分三在前四在後田獵之矢多傷敗漢五行志曰木曰曲直田獵不宿宿時也飲食不享出入不節奪民農時則木不曲直失其性矣蓋工匠之為輪矢多傷敗注輪不曲矢不直也孔引佩刀斷王方翼次熱海連戰矢著臂引佩刀斷去左右莫知三箭定天山薛仁貴時九姓眾十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人於是虜氣懾皆降仁貴慮為後患悉坑之轉討磧北餘眾擒偽葉護三人以歸軍中歌曰將軍三箭定天山壯士長歌入漢闕一矢墜前劉漢宏中和二年遣弟漢宥率諸將攻杭州壁西陵為董昌所敗明年悉軍十萬列艦西陵謀霄濟襲昌禱於江有一矢墜前惡之俄與鏐遇中流矢突厥傳思摩從伐遼中流矢帝為吮血其顧厚類此鏤姓名於箭筈五代陸思鐸少事梁為宣武軍卒以善射知名梁晉相距河上思鐸鏤其姓名於箭筈以射晉軍而矢中莊宗馬鞍莊宗拔矢見思鐸姓名奇之其後滅梁思鐸謁見莊宗出其矢以示之思鐸伏地請死莊宗尉而起之拜龍武指揮使獻兩箭霍彥威朱守殷反伏誅彥威遣使者駝騎獻兩箭為賀明宗賜兩箭以報之夷狄之法起兵令眾以傳艏為號令然非下得施於上也虜箭如沙射金甲李白詩用箭須用長杜甫詩好用四羽唐太宗好用四羽大笴長常箭常一膚射洞門闔雜俎忠志斲石為人馬象拔箭狀丘行恭討王世充戰印山太宗欲嘗賊虛實與數十騎衝出陣後多所殺傷而限長堤與諸騎相失唯行恭從賊騎進及流矢著太宗馬行恭回射之發無虛鏃賊不敢前遂下拔箭以己馬進太宗步執長刀大呼導之斬數人突陣而還後貞觀中語斲石為人馬象拔箭狀長矢五藏之武庫劉黑闥初秦王建天策府其弧矢倍於常逐黑闥也為突厥所窘自以大箭射郤之突厥得箭傳觀以為神後餘大弓一長矢五藏之武庫世寶之每郊丘重禮必陳干儀物之首以識武功雖弓矢亦誌姓名王忠嗣召屬長付以兵使授士卒雖弓矢亦誌姓名其上軍還遺弦二鏃皆按名第罪以是部下人自勸石為矢鏃南蠻盤盤流星白羽腰間插李白詩晉王以三矢賜莊宗五代義兒傳世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之於廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱旋而納之武庫令箭之制有四一曰竹箭二曰木箭三曰兵箭四曰弩箭唐六典方言曰自關而東謂之矢江淮之間謂之鏃關西謂之箭其本曰鏑體曰幹其旁曰羽其矢末曰括旁曰疑又通俗又曰骨鏃曰骲鐵鏃曰鏑鳴箭曰骹靃葉曰鈚皆古之制也竹箭以竹為笴諸箭亦通用木箭以木為笴唯利射獵兵箭剛鏃而長用之射甲弩箭皮羽而短用之陷堅也唐六典發七矢斃七人馮盎弩十三白周禮司弓掌六弓四弩八矢之法辨其名物仲春獻弓弩凡弩夾庾利守唐大利車戰野戰攻守相迫近弱弩發疾戰進退非彊不遠史記曰彊弩之末力不能穿魯縞又彊弩末在前也孫臏伏萬弩馬陵夾道公孫弘奏民不得挾弓弩韓延壽東郡負籣籣承矢如今木桶李廣大黃射匈奴大黃參連弩名煮鎧弩食其筋以為糧耿恭守疏勒城天下勁弩皆自韓出射六百步之外蘇秦說韓王云云罷置弓弩諸葛亮長於巧思損益連弩謂之元戎以鐵為矢矢長八寸一弩十矢俱發也負弩平原君負弩矢前驅迎信陵君又司馬相如奉使縣令負弩前驅千鈞之弩黃間機張黃間弩名文選伏弩項羽伏弩中漢王胸孔請弩人浙西李德裕請弩人浙西由是蜀之器械皆犀銳蹋張揚收同中書門下平章事始南蠻自大中以來火邕州掠交趾調華人往屯涉氛瘴死者十七戰無功蠻勢益張收議豫章募士三萬置鎮南軍以拒蠻悉教蹋張戰必注滿蠻不能支激矢至五百步趙犨子珝巢之難庫有巨弩機牙壞不能張珝以意調治激矢至五百步人馬皆洞賊畏不敢逼伏弩雷萬春事巡為偏將令狐朝圍雍丘萬春立城上與朝語伏弩發六矢著面萬春不動以彊弩據釆石王凝遷宣歙池觀察使時江南還境為盜區凝以彊弩據釆石張疑幟遣別將馬潁解和州之圍百弮弩朱泚自將逼奉天遂長圍以百弮弩射城中不及幄坐者三步銅牙弩杜甫詩正觀銅牙弩置十弩以相警捍韓滉李晟方屯渭北滉運米饋之舡置十弩以相警捍賊不能剽擇善游者沿汴入柏良器李希烈圍陵寧遏水灌之親令軍中明日拔城良器以救兵至擇弩手善游者沿渠夜入及旦伏弩殺賊乘城者皆死弩之制有七唐六典武庫令弩之制有七一曰擘張弩二曰角弓弩三曰木單弩四曰大木單弩五曰竹竿弩六曰大竹竿弩七曰伏遠弩古有黃連百竹八檐雙弓之號今日絞車弩中七百步攻城拔壘用之擘張弩中二百步戰用之馬弩中二百步馬戰用之弩張遲臨敵不過一二發所以戰陣不便於弩非弩不利於戰而將用於弩也可不雜於短兵當別為隊攢箭注射則無立兵對無橫陣通典夫置弩必處其高爭山奪水守隘塞口破驍陷果非弩不剋同上白五兵兵有五等周禮廬人為廬器戈祕六尺六寸秘柄殳長尋有四尺車戟常酋矛常有四尺夷矛三尋八尺曰尋倍尋曰常酋近夷長凡兵不過三其身不能用也又以害人人長八尺因而為制故攻國之兵欲短守國之兵欲長攻國之人眾行地遠食飲飢其涉山林之阻是故兵欲短守國之人寡食飲飽行地不遠且不涉山林之阻故兵欲其長也凡句兵欲無彈彈掉也句兵戈戟之屬刺兵欲無蜎蜎撓也刺兵矛屬擊兵同彊舉圍欲細細則校擊兵戈殳也同彊彊弱上下同也舉圍謂執處也校疾也刺兵同彊舉圍欲重重則密密審也重彊也周禮六建既備謂之國工六建五兵與人也國工良工也並同上書曰善敹乃甲胄敿乃干鍜乃戈矛礪乃鋒刃曰稱爾戈比爾干立爾矛伯也執殳毛詩云修我戈矛戈戟載戢干戈前徒倒戈攻于後以北倒戈以御公徒靈輒趙盾銛戈銳兵物不素備不可以應卒上制中制下制長短小大之制有三等進戈者前其鐏後其刃鐏下刃也進矛戟者前其鐓鐓亦在下斬木為竿範金成刃魯陽是麾且聞駐景魯陽戰酣日晚麾戈而日駐富父斯用亦見舂喉魯叔孫得臣戰獲長狄僑如而富父終生以戈舂其喉而殺之制自廬人之手春其長狄之喉用既異於攻守制亦殊其短長兵者不祥之器兌之戈書曰二矛重英詩厹矛鋈錞厹矛三隅矛錞鐏也周禮廬人試兵置而搖之以視其蜎也炙諸牆以視其撓之均也橫而搖之以視其勁也蜎掉也置樹也炙猶以柱兩牆之間挽而內之本末勝負可知秦無廬人而能為廬人自能為之鬻矛楯韓子曰有鬻矛楯者曰吾楯堅則莫能陷又譽矛曰物無不陷或曰以子之矛擊子之楯如之何不能應蛇矛晉書孔矛戟亙三十里康承訓傳帝遣中人康道隱宣尉徐州龐勛郊迎旗鎧矛戟亙三十里使騎鳴鼙角聲動山谷援矛刺賊李光弼有裨將援矛刺賊洞馬腹光弼賜絹五百疋戈矛林植李德裕幽州紀功碑介冑雪照戈矛林植委戈馮盎賊眾委戈袒而拜業矛注矢安祿山酋矛長戟酋矛柳文四起矛戟四起楊炎平胡頌彫戈鬘胡纓李白詩戈鋋開雪色杜甫詩霜交陛戟含元賦古鐵戟宗室齊物累陝州刺史開砥柱通漕路發重石下得古鐵戟若鏵然銘曰平陸上之詔因以名縣獲古戟十二尹思貞加光祿大夫其家坎地獲古戟十二俄而門樹戟時人異焉舊制官階勳俱三品始聽立戟盧坦舊制官階勳俱三品始聽立戟後雖轉四品官非貶削者戟不奪坦為戶部侍郎時階朝議大夫勳護軍以嘗任宣州刺史三品請立戟許之時鄭餘慶淹練舊章以為非是為憲司劾正詔罰一月俸奪戟自正元以來立戟十八家不應令並追正之三戟崔家崔琳與弟太子詹事珪光祿卿瑤俱列棨戟世號三戟崔家請門戟十二韋綬為山南西道節度使入辭請門戟十二以行父子皆賜李愿晟立功時諸子未官宰相以聞即日召授上柱國故事柱國門列戟遂父子皆賜本鄉列戟張介然入奏稱旨賜典良渥介然啟曰臣謂三品當給棨戟若列於京師雖富貴不為鄉人知願得列戟故里玄宗許之別賜戟京師第門宴間里老本鄉得列戟自介然始當門立戟不請崔從衣冠罕有其比韋斌加銀青光祿大夫列五品時兄陟為河東太守從兄由為右金吾將軍縚為太子少師四人同時列戟衣冠之盛罕有其比榮耀冠時李禕生子峘嶧峴峘為戶部尚書峴為吏部尚書嶧為戶部侍郎兄弟同居長興里第門列三戟兩國公門十六戟正三品門十二戟榮耀冠時玄宗朝始有戟制度開元禮太廟社宮殿門各施二十四戟一品施十六戟開元府郡王嗣王帶職事三品及上州都督府以上十四戟帶職事三品及下州刺史各十戟幡帶每副二十條以五色物充馮鑒事始凡戟廟杜宮殿之門二十有四唐百官志武器署今凡戟廟社宮殿之門二十有四東宮之門一十八一品之門十六二品及京兆河南太原尹大都督大都護之門十四三品及上都督中都督上都護上州之門十二下都督下都護中州下州之門各十衣幡壞者五歲一易之薨卒者既葬追還楯十五白傳曰犀渠楯也龍楯畫龍於楯楊楯狄虒彌建大車之輪而蒙之以甲右執之左拔戟以成一隊傳鬻矛楯見上注孔蒙盾東夷高麗李勣圍遼東虜蒙盾以相士舉長矛春之理必有歸陸相奏議一矛一楯理必有歸傳于西烽之亭楊炎平胡聖德頌彊弩堅楯齊傳于西烽之亭磨墨於鼻劉禹錫為記室參軍會出師淮上常磨墨於鼻楯鼻盾䂎蹙之李密兵多騎與長槊而北薄山地隘騎迮不得騁世充多短名盾䂎蹙之密軍郤縳矛盾乘以度哥舒翰軍爭濟至縳矛盾乘以度喧振天地賊乘之奔潰略盡槊十六白風俗通曰矛長八尺謂之槊墨槊公後魏書于栗磾築壘于河上劉裕憚之遺栗磾書題書曰黑槊公麾下栗磾以聞太宗太宗因授黑槊將軍栗磾常用黑槊故劉裕有此呼折樹槊孔奪取賊槊尉遲恭其戰善避槊每單騎入賊雖群刺之不能傷又能奪取賊槊還刺之齊王元吉使去刃與之校恭請王加刃而獨去之卒不能中帝常問奪槊與避稍孰難對曰奪槊難試使與齊王戲少選王三失槊遂大愧服攢槊外向蘇定方擢伊麗道總管賀魯率十姓名十萬拒戰輕定方兵少舒左右翼包之定方令步卒據高攢槊外向親引勁騎陣北原賊三突步陣不能入定方因其亂擊之夜每有光劉武周據并州兵勢甚盛城上槊刃夜每有火光五行志針可為槊邪黃碣董昌反諫曰桓文不侮周室曹操弗敢危漢今王辟嬰一城乃為大逆何邪碣移書幕府曰順天建元以愚策之針可為槊邪昌令斬之槊中其口李嗣恩從李嗣昭援朱反謙於河中與梁兵力戰槊中其口戰不已五代史舞槊擒之李存孝以精騎五百繞樑柵而呼曰我沙陀之未穴者待爾肉以食軍可令肥者出鬥梁驍將鄧季筠引軍出戰存孝舞槊擒之五代史京官五品以上征行者假甲纛旗旛槊唐百官志庫部槊刃者有華崔義玄河內賊黃君漢為李密守柏崖義玄見稍刃有華文曰此王敦亡兆也險固十七白城郭溝池以為固漢水以為池楚屈完對齊桓公曰君若以力楚國方城以為城漢水以為池雖君之眾無所用之百二漢書曰秦地得百二言秦地險固以二萬人當諸國百萬人孝子忠臣漢書曰王陽為益州刺史至九折阪歎曰奉先人遺體柰何乘此險遂以疾去官後王尊為刺史至阪自叱其馭驅之曰王陽為孝子王尊為忠臣字子贛束馬懸車益州記蜀道至險束馬懸車以度晉表裏山河必無患也子犯曰襟帶西京賦巖險周固襟帶易守得之者久王公設險以守其國易被山帶河秦地防禦之阻保界山河險阻四塞之國秦地隔閡寇戎秦負阻於二關卒開項而受沛一人守隘萬夫莫向阻蠻隔夷咽喉韓天下之咽喉東阨天險重阻巨固隘害並見文選井陘漢書井陘之道車不得方軌騎不得成列天子守在四夷天子卑守在諸侯楚瓦城郢沈尹知其必亡沈尹戍曰苟不能衛城無益也梁伯溝宮左氏稱其自取左傳十二齊得十二吾圉聊固束其要害擊以安危窮地之險極天之峻國家宅于土中守在海外金湯之固金城湯池天險不可升地險山川丘陵也易軍旅息險道塗不爭險易之利禮恃險制巖邑也虢叔死焉虢叔恃制地巖險不修德政而鄭滅之傳在德不在險史記魏武侯曰美哉山河之固此魏國之寶也吳起曰在德不在險昔三苗左洞庭右彭蠡德義不修而禹滅之夏桀之國左濟河右太華伊闕在其南羊腸在其北脩政不仁而湯放之殷紂之國左孟門右太行常山在其北太行經其南不脩德政武王殺之由此言之在德不在險武侯曰善哉以道德為蕃長世字民者以道德為蕃不以習險為屏居安忘危地利不如人和辨亡論曰云云又曰在德不在險九州之險是不一姓考吳起之言在德而已徵司馬之對雖險何為憑險憑洞庭者苗人亡恃巖邑者虢叔死負固周禮負固不服侵之三殆晉侯曰恃險與馬而虞鄰國之難是三殆也左氏冒險孝子去官忠臣叱馭垂堂之誡漢袁盎曰千金之子坐不垂堂百金之子立不倚衡懸車之危束馬懸車行險履死死而不弔者三畏壓溺壓謂行止危險也行殆禮孝子一舉足而不敢忘父母是故道而不徑舟而不游不敢以先父母之遺體行殆孔憑險宗室孝逸徐敬業稱兵以孝逸為行軍大總管偽將韋超據都梁山以拒孝逸超眾憑險完屯支度使薛克創曰超雖據險然兵少若置小敵不擊無以示威披眾以守則戰有闕捨之則後憂不如擊之雍州古稱天府郭子儀程元振說帝都洛陽帝可其計子儀奏曰雍州古稱天府右隴蜀左崤函襟憑終南太華之險背負清渭濁河之固地方數千里帶甲十餘萬兵彊士勇真用武之國秦漢所以成帝業也後或處而泰去而亡者不一姓故高祖先入關定天下太宗以來居洛陽者亦鮮先帝興朔方誅慶緒陛下席西土戮朝義雖天道助順亦地勢則然固險以示敵馬燧至太原念晉陽王業所基宜固險以示敵乃引晉水汾而屬之城瀦為東隍省守陴萬人又釃汾環城樹以固堤聚石種樹表隴州刺史西山直吐蕃其上有通道虜常所出入者燧聚石種樹障之設二門為譙櫓八日而畢虜不敢暴河有造舟之危山有摧輪之險贊皇一品集昔馮異之守孟津已建軍號近光弼之保宣洛先據三城蓋以河有造舟之危山有摧輪之險左右機軸表裏金湯既當形勝之城實為要害之郡制孟州城敕旨表裏山河者備敗而已柳宗元晉問晉人之言表裏山河者備敗而已非以為榮觀顯大也白有備無患居安慮危備預不虞古之善教文子曰不戒而備知難魯具守備臧宣叔曰知難而有備乃可以逞重閉勇夫重閉而況國乎守在四夷又無外懼諸侯卑守在四夷慎其四境結其四援人狎其野三務成功人無內憂又無外懼完其守備慎固其一安不忘危素具應卒秦昭王曰物不素具不可以應卒事事有備書曰惟事事乃其有備有備無患警戒無虞保邦于未危書慎固封守書思其艱圖其易民乃寧不可以怠天下假易道貴圖難吳國之贏修完而師息傳吳國雖贏若早修完其可以師息莒國雖陋失守而施亡莒子恃其僻陋在夷而不備浹辰之間而楚克其三都思則有備輕而寡謀忘守則危過求何害用戒爾虞以備吾圉前定禮云事前定則不困早圖物宜素具事各有初孔置降匈奴五原塞溫彥博請議漢置降匈奴五原塞以為捍蔽天子卒從之斷石嶺制突厥之入竇靜請斷石嶺以制障塞突厥之入障隧隘絕陳子昂后方謀開蜀山剪生羌子昂諫曰吐蕃愛蜀富思益之矣徒以障隘絕頓餓喙不得噬以逸待勞狄仁傑時發兵戍疏勒四鎮百姓怨苦仁傑諫曰陛下姑敕邊兵謹守備以逸待勞則戰士力倍突厥序杜佑誠誠能復兩渠之饒誘農夫趣耕擇險要繕城壘屯田蓄力河隴可復豈唯自守而已孫樵謂兵藉於州則易役卒出於邊則習險相地分屯春耕夏蚕以資衣食秋冬嚴壁以俟冠歲遣廉吏視卒之有無則官無餽運吏無牟盜增亭障徙客館于外史憲忠加隴州刺史增亭障徙客館于外戎諜無所伺築障遮虜劉弘基突厥患邊督步騎萬人備塞自豳北東拒子午嶺西抵臨涇築障遮虜乘閑突厥傳天子東巡太山中書令張說謀益屯以備突厥兵部郎中裴光庭曰封禪以告成功若復調發不可謂成功者說曰突厥雖請和難以信結也且其可汗仁而愛人下為之用闕特勒善戰瞰欲谷沈雄愈老而智李靖世勣流也三虜方協知我舉國東巡有如乘間何以禦之韓愈守戒詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有山者知猛獸之為害則必高其柴柵而外施窞阱以待之宅於都者知穿窬之為盜則必峻其垣墻而內固扃鐍以防之此野人鄙夫之所及非有過人之智而後能也今之通都大邑介於屈彊之間而不知為之備噫亦惑矣韓文得人賁育之不戒童子之不抗魯雞之不期蜀雞之不支今夫魯之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人同上非萬全不謀非百克不鬥陸贄奏議修封疆守要害塹蹊隧壘軍營謹禁防明斥候務農以足食練卒以蓄威非萬全不謀非百克不鬥誘備贏師張曲江敕平盧使書鬥防困獸誘備贏師窮寇勿遏同上敕張守珪書既有克捷當更防之因獸猶鬥窮寇勿遏防北蹙來贊皇一品集劉濛狀其天德自受降城至振武穿陰山賊路如有峻峭及添木石填塞處早令下手修整仍可要路添掘壕塹多置陷馬坑須防戛黠斯向北蹙來回鶻入塞奔突戎備完輯李吉甫弘憲八年回鶻引兵自西城柳谷侵吐蕃六胡州在靈武部中開元時廢之置宥州以處降戶寓治經略軍居中以制戎虜北援天德南接夏州至德寶應間廢宥州以軍遙隸靈武道里曠遠故党項孤弱虜數擾之吉甫始奏複宥州乃治經略以隸綏銀道取鄜城神策屯兵九千實之以江淮甲三十萬給太原澤路軍增太原馬千匹由是戎備完輯白拾瀋傳曰無備而官辦者猶拾瀋也無備雖眾不可恃也臧文仲曰求而無之實難過求何害不備不虞不可以師恃陋而不備罪之大者也城惡申公巫臣謂莒子曰城已惡矣莒子僻陋在夷其孰以我為虞巫臣曰勇夫重閉況國乎明年楚伐莒克三都君子曰恃陋而不備罪之大者浹辰之間楚克三都無備也夫小國忘守則危子產曰莫敖小羅楚莫敖伐羅鬥伯比曰莫敖狃於蒲騷之役將自用也必小羅而不設備羅人大敗之莫敖縊於荒谷傳虢公易晉晉卜偃曰虢必亡矣亡下陽不懼而又有功是天奪之鑒益其疾也必易晉而不設備不可以五稔有功謂敗戎于桑田也傳何恃而不恐無備官辦不戒視成去備來攻惰慢無備十九孔戎之生心不可以無備于休烈吐蕃金城公主請文籍休烈上疏曰戎狄國之寇經籍國之典也戎之生心不可以無備不乘其不虞正恐鳥驚魚駭無以窺其巢穴吐谷渾王伏允在突淪川何力欲襲之萬均懲前敗以為不可何力曰賊無城郭遂薦草美水以為生不乘其不虞正恐鳥驚魚駭無以窺其巢穴乃閱精騎千餘直擣其牙斬首數千級獲櫜駝馬牛羊二十餘萬俘其妻子伏允挺身免契苾何力傳進討龜茲破其國孝恪以餘部未平出營於外國人有謂孝恪曰龜茲國相那利素得志願公備之孝恪忽其言不設備那利果率眾薄城設譟孝恪死鬥中流矢卒郭孝恪傳方宴不設備李絳南蠻寇蜀道詔絳募兵千人往赴不半道蠻已去兵還監軍使楊叔元者素疾絳遣人迎說軍曰將收募直而還為民士皆怒乃譟而入劫庫兵絳方宴不設備遂握節登陴牙將王景延力戰歿絳遂遇害勞人二十白警備結完國雖無患役能罷弊人則不堪恃陋無虞楚雖克莒亟城不處秦亦取梁苟失其防城郢必聞吳入入楚也不得其備溝宮豈免梁亡苟人罷而不恤則魚爛而可憂無戎而城讎必保焉雖安必思危備欲侔於天險而人不堪命患亦生於土崩苟無城惡之虞盍念民罷之戒孔憚勞人力狄仁桀諫征伐疏漢元納賈捐之謀而罷朱崖之郡宣帝用魏相之策而棄車師之田豈不欲慕尚虛名蓋憚勞人力也疲人版築哥舒曜事見持重門致茲暴露贊皇一品集賜王元達洪敬詔旨由此孽童致茲暴露然獫狁孔亟周宣興六月之師淮夷未寧公旦有三年之役事非護己諒匪勞人
