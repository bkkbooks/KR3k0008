屯河中汴將朱友寧以兵十萬壁其南全忠自屯晉州晉人聞全忠皆失色時有虹貫德威營氏叔琮薄壘疾斗晉兵大敗曲虹天復三年三月庚申有曲虹在日東北垂頭軍門延和元年六月幽州都督孫佺帥兵襲奚將入賊境有白虹垂頭於軍門占曰其下流血蜺者斗之精五行志唐隆元年六月戊子虹蜺亙天蜺者斗之精占曰后妃陰脅王者架天安得五彩虹架天作長橋李白焦香山詩虹見宮中閩王繼鵬晉天福三年夏虹見其宮中螮蝀入紫微天明夷朝暉李白憑天霓以結峰李白荅孟少府書煙虹君王賜顏色聲價凌煙虹東武吟掩天光虹蜺掩天光哲后起康濟荅高山人天陂斷霓天帔垂杜牧弄水亭入井飲永正二年三月彩虹入潤州大將張子良宅初入漿甕水盡入井飲之後子良擒李錡拜金吾尋歷方鎮南部新書倚劍慷慨氣干虹蜺李白上裴長史書氣如橫霓房魯上節使書目視飛鴉氣如橫霓紛錯宋務光虹霓紛錯陰勝之沴也虹霓滅而日月張李白明堂賦纖纖雲表霓杜甫五彩奪目荊州有氣如虹五彩奪目有首如驢長數十丈環廳事而行三匝而滅占者曰廳中將有哭聲然而非州府之咎頃之順貞穆后崩發哀於此室徐鉉稽神錄白天河謂之天漢銀漢銀河河漢天津絳河明河倬彼雲漢倬明也昭回於天昭回光轉也倬彼雲漢為章于天言為天文章維天有漢監亦有光斜漢左界褒斜南躔躔歷也見文選在天成象耿耿秋河曙耿耿清淺河漢清且淺渭水以象三輔圖秦皇都咸陽列渭水貫都以象天河黃河之精河圖曰河精上為天河仙查博物志舊說天河與海通有居海者年年八月浮查來不失期因上乘去忽忽不知晝夜有一處多織女一丈夫牽牛渚次飲之問之荅曰君可於蜀中問嚴君平君平曰某年某月某日有客星犯牽牛星即此人到天河星石集林曰昔有人尋河源見婦人浣紗問之曰此天河也乃與一石而歸問嚴君平君平曰此織女支機之石昭昭清漢暉鵲橋牛女隱見迴旋通海竟天孔如練唐文粹宋之問明河篇倬彼昭回如練白復出東城接南陌昏見南樓曉落西山昏見南樓清且淺曉落西山縱復橫落曉霜李白詩天河落曉霜明星方揚斜漢西懸璿柄如墮沉半層瀾劉禹錫楚望賦掛戶河漢掛戶牖欲濟無輕舠夜宿南陵李白斗柄當西南韋蘇州擬古詩天河橫未落斗柄當西南明河澹如掃杜牧即事詩縱被微雲掩終當永夜清含星動雙闕伴月落邊城杜甫天河驚風翻河漢梁棟已出日同上寫懷銀河倒瀉三石梁李白東井南箕曲直殊於河漢楊炯渾天賦天河夜轉漂回星銀浦流雲學水聲李賀天上謠銀河倒列星杜甫詩明河之繞塞微夜詩同上天河落處長洲路李賀浩汗若河漢韓詩白履霜堅冰易坤卦季秋霜始降霜降之日百工休禮露為蒹葭蒼蒼白露為霜青女淮南子曰霜神名青女凝而為霜大戴禮陰氣勝陽氣則凝而為霜雪刑罰之表春秋符曰霜者刑罰之表也季秋霜始降鷹隼擊王者順天行誅成肅殺之威紺碧拾遺志曰廣延國霜色紺碧又有甘霜九月肅霜既降禮記霜露既降君子履之必有悽愴之心鐘鳴山海經云豐山之鍾霜降而自鳴始凝易曰履霜陰始凝也葛屨糾糾葛屨可以履霜紈扇班婕妤扇詩新裂齊紈素皎潔如霜雪駟見國語云駟見而霣霜駟房星也殺木元命苞曰霜以殺木鷹隼擊霜降則鷹隼擊豺祭霜降之日豺乃祭獸禮婦功家語霜降而婦功成嫁娶者行焉馬蹄莊子曰馬蹄可以踐霜雪蠶繭拾遺記員嶠之山有冰蠶以霜雪覆之然後為繭琴琴有履霜操伯奇所作也尹吉甫後妻之讒逐伯奇伯奇自傷無罪清朝履霜乃作履霜操正月云繁詩人興憂傷之剌季秋既降君子有怵惕之心玄霜內傳具雪門神鑪抱朴子云凝霜雪於神鑪採靈芝於嵩岳災異五月降霜淮南子曰鄒衍事燕惠王盡其忠貞左右譖之王棄衍衍仰天而哭感霜降夏降不殺草春秋符曰王者政令苛則夏降霜誅伐不行則冬霜不殺草附木京房易詩曰誅不原情則其霜附木不下不教而誅其霜反在草下雪霜大摯摯傷也月令殺菽周十月今八月也書失時孔清明降霜獨孤及疏曰昨清明降霜爭嚴卓行贊曰德秀當與秋霜爭嚴真丈夫哉霜厚數寸五行志證聖元年六月陸州隕霜殺草吳越地燠而盛夏隕霜昔所未有殺桑宣宗紀大中三年春霜隕殺桑染紫常奉真湘潭記鵝管山霜可染紫為天下冠恨人無知者慘霜遁叟山居記天霜下嚴威李白古風夜霜朗泳清川飛夜霜縞乎若寒崖之霜虞城令去思頌青楓葉赤天雨霜杜甫韓諫議註散下秋草李白送孟贊府林風吹霜散下秋草凝霜空吟枕韋應物詩坐看飛霜滿凋此紅芳年古風飛霜早淅瀝綠艷恐休歇同上鍾何鳴兮應霜氣楊炯渾天賦殺惡草元和十四年四月淄青隕霜殺惡草及荊棘而不害嘉穀唐史五行志嚴霜唐史段秀實贊英烈言言如嚴霜烈日可畏而仰哉吳霜點歸鬢李賀嚴霜衣帶斷杜甫嚴霜衣帶斷指直不得結露十三白立秋後五日白露降散而為露大戴禮陽氣勝陰則散為雨露厭浥行露濕也漙兮零露漙兮為霜白露為霜零露泥泥瀼瀼濃濃湛湛露斯匪陽不晞綴冠束晢曰零露如珠非綴冠之飾泛灩之彩鶴警千年鶴警露而鳴蟬飲取其潔既濡禮曰春雨露既濡君子履之必有怵惕之心珠盤仙掌金莖以承露盤中見上薤上薤露歌曰薤上露朝日晞潤玉垂珠晨降楚辭曰霧露蒙其晨降宵零典引曰甘露宵零於豐草菅茅英英白露霑彼菅茅多露謂行多露詩人夙行興厭浥之詠君子春履有怵惕之心下地騰文別賦助海成深海受霧露以成其深露衣朝諫劉向說苑曰吳伐荊王令敢有諫者死舍人有少孺子者欲諫懷彈於後園露霑其衣如是者三朝王曰子求何名露霑衣如是對曰園中有樹其端有蟬蟬高居悲鳴飲風飲露不知螳蜋在其後曲跗欲取其蟬而螳蜋又不知黃爵居其後延頸欲啄之然黃爵又不知臣操彈丸在其下臣但捕其黃爵不覺露霑衣此者為窺其利而不思後患王聞之遂不伐荊桐葉蘇子曰人生一世若朝露之托於桐葉瑞露王者施德則甘露降瑞圖一名天酒甘露仁澤也其凝如脂其甘如飴松柏竹葦晉書中興書曰王者敬養耆老則甘露降而松柏受之尊賢容眾則竹葦受之天地相合以降甘露人莫之令而自均老子漢年甘露之瑞以為年紀三危伊尹說湯曰水中之美三危之露五色瑞露也膏露天不受其道故天降膏露德動皇天瑞呈甘露表至德之馨且因宵降含孔甘之味不待秋凝若脂之潔如醴之甘孔甘露降李訓十一月帝御紫宸殿京兆尹韓約奏甘露降金吾左仗樹群臣賀訓元輿奏言甘露近在禁中陛下宜親往觀以承天貺許之即輦入含元殿詔宰相群臣往視訓奏言非甘露帝曰豈約妄耶顧中尉仇士良于志弘等驗之訓因欲閉之諸官人使無免者露芃芃兮蔓草文粹張說文曰露芃芃兮蔓草霏霏靈液唐文粹李正封詠露詩曰霏霏靈液重雲表無聲落宵潤玉堂簾曙寒金井索同上積耀呈姿柳宗元賀甘露表綴葉而珠璣積耀盈器而冰玉呈姿芳襲椒蘭味兼飴醴甘露遍庭樹李懸為貝州剌史甘露遍庭樹其邑人曰美政所致薔薇露柳宗元得韓愈所寄詩先以薔薇露灌手然後發讀白庶潭露常奉真湘潭記白庶潭露能染紅朝光初燭方湛湛而不晞畏景轉炎更瀼瀼而未已柳宗元賀甘露露垂於草其狀如珠呂向注文選玉露凋晚林舊史李密蒼露開元遺事太真妃宿酒初消苦肺熱晨遊後苑口吸花露以潤肺秋露如白玉李白古風秋露如白玉團團下庭綠火雲洗月露杜甫玉階生白露夜久侵羅襪太白玉階唐李賀金銅仙人辭漢歌敘云魏明帝青龍九年八月詔宦官牽車西取漢孝武捧露盤仙人欲立置前殿宮官既折盤仙人臨載乃潸然泣下歌曰茂陵劉郎秋風客夜聞馬嘶曉無跡畫欄桂樹戀秋香三十六宮土花碧槐官牽車指千里東關酸風射眸子空將漢月出宮門憶君清淚如鉛冰襄蘭送客咸陽道天若有情天亦老攜盤獨出月荒涼渭城已遠波聲小草露滴秋根杜詩承露盤中珠正圓韋應物通天臺上月初出承露盤中珠正圓珠可飲壽可永武皇南面曙欲分從空下來玉杯冷世間彩翠亦作囊八月一日仙人方仙方稱上藥靜者服之常綽約碧天何言空墜露並上同漢武帝雜歌凝珠滿露枝李後主零露凝清華柳文零其庭而著異紀於年以標奇柳宗元甘露表秋荷一滴露清夜墜玄天清高金莖露杜詩承露金莖霄漢間同上玉露凋傷楓樹林秋興詩露裛思滕架遣悶春風拂檻露華濃李詩白露垂珠滴秋月同上凝毫採掇花露容同上華露華露湛新秋濯濯晨露香明珠何聯聯韓愈泣露林攢母亡自延甓作塚廬有甘露降觀察使李若初遣官吏驗實會露晞里人失色攢哭曰天所降露禍我耶俄而露復集
