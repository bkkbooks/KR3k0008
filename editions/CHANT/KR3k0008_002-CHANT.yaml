body:
  text: 卷第二律呂一白萬事根本望敵知吉凶史記六律萬事根本其於兵械尤重故能望敵知吉凶聞聲效胜負百王不易之道娶妻生子黃鍾初九律之首陽之變也因而六之以九為法得林鍾注以六乘黃鍾之九得六十四也初六呂之首陰之變也皆參天兩地之法也注三三而九二三而六參兩之義也上生六而倍之下生六而損之皆以九為法九六陰陽夫婦子母之道也注異類為子母謂黃鍾生林鍾也同類為夫婦謂黃鍾以大呂為妻也律娶妻注謂黃鍾生林鍾也而呂生子注謂林鍾生太簇也天地之情也統气類物陽六為律以統气類物振陽宣气陰六為呂以振陽宣气六律黃鍾太簇姑洗蕤賓夷則無射六呂林鍾南呂應鍾大呂夾鍾仲呂嶰谷之竹黃帝使伶倫自大夏之西崑崙之東取竹之嶰谷生其竅厚均者斷兩節間而吹之為黃鍾之宮律竹之最長者制十二筩以聽鳳凰之鳴其雄鳴六雌鳴六比黃鍾之宮而皆可以生之是為律本注比合也可以生之謂上下初生也比音頻寐反子欲聞六律五聲八音在治忽以出納五言汝听書和律呂也辨六氣和八音玉律竹律候氣之法為室三重戶閉塗釁必周密布緹縵室中以木為案每律各如之內卑外高從其方位加律其上以葭管灰實其端案歷而候之氣至者灰去其為氣所動者其灰散其為物所動者其灰聚殿中候用玉律十二靈臺用竹律吹灰楊泉記云弘農宜陽縣金門山竹為管河內葭莩為灰或云以律著通十二辰埋之上與地平以灰實律中以羅縠覆律氣至則灰動縠亦動為和大動君弱臣彊不動君嚴暴之應忽微漢書云黃鍾為宮則太簇沽洗林鍾南呂皆以正聲應無有忽微忽微細於髮者謂正聲無殘分吹律生气燕有寒谷不生黍稷鄒衍吹律於其間煖气乃至草木發生相生晉書周於十二辰在六律為陽當位自得而下生陰在六呂則得其所行而上生陽於推筭之術無重上生下之法所謂律娶妻呂生子陰陽升降律之本經京房法晉書京房知六律五音之數六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於仲呂而十二律畢矣仲呂上生執始執始下生去滅上下相生終於南呂而六十律畢矣夫十二律之變至於六十猶八卦之變為六十四也孔製十二和樂志初祖孝孫已定樂乃曰大樂與天地同和者也製十二和以法天之成數號大唐雅樂一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰壽和七曰太和八曰舒和九曰昭和十曰休和十一曰正和十二曰承和用於郊廟朝廷以和神人依京房為律王朴顯德六年詔朴考正雅樂朴以謂十二律管互吹難得其真乃依京房為律准以九尺之弦十二依管長短寸分設柱用七聲為均樂成而和以十二月旋相為六十聲武德九年詔太常少卿祖孝孫等定樂孝孫以八十四調始黃鍾終南呂迭為綱紀黃鍾之律管長九寸王於中宮土半之四寸五分與清宮合五音之首也故一宮二商三角四徵五羽以十二月旋相為六十聲樂志綜和文粹張說上官昭容集序七聲無主律呂綜其和懸水淙口宮商不能合律呂不能生此全聲也元結訂司樂氏律本文粹李華御史中丞壁記律呂本黃鍾之宮循環文粹李華雜詩黃鍾叩元首律呂更循環六律變窮谷之寒劉禹錫謝寶相啟律者樂之本柳宗元律也者樂之本也而气達乎物凡音之起者本焉律中鬼神驚杜甫詩調律呂之气候柳宗元文播塤箎之音韻調律呂之气候協律郎掌和六律六呂以辨四時之气八風五音之節陽為六律所以統气類物仲冬為黃鍾孟春為太簇季春為姑洗仲夏為蕤賓孟秋為夷則季秋為無射陰為六呂所以振陽宣气季冬為大呂仲春為夾鍾孟夏為仲呂季夏為林鍾仲秋為南呂孟冬為應鍾凡律管之數起于九以九相乘八十一以為宮三分去一五十四以為徵三分益一七十二以為商三分去一四十八以為羽三分益一六千四以為角黃鍾為宮太簇為商姑洗為角林鍾為徵南呂為羽還相為宮以生其气焉唐六典先王通於倫理以气候之管為樂聲之均吹子為黃鍾丑為大呂寅為太簇卯為夾鍾辰為姑洗巳為仲呂午為蕤賓未為林鍾申為夷則酉為南呂戍為無射亥為應鍾陽管有六為律者謂黃鍾太簇姑洗蕤賓夷則無射此六者為陽月之管謂之律律者法也言陽氣施生各有其法又律者師也所以導陽氣候之通達陰管有六為呂者謂大呂應鍾南呂林鍾中呂夾鍾此六者陰月之管謂之為呂總陰陽之聲故為十二調調各文之以五聲播之以八音乃成為樂故有十二懸之樂焉出唐六典凡為樂器以十二律者為之數度以十有二聲為之齊量同上白雲從龍山川出雲天降時雨密雲不雨黃帝雲紀故為雲師而雲名不待族廣成謂黃帝自爾治天下雲氣不待族而雨必書雲物分至啟閉雲中君漢志巫言祠雲中君霏霏承宇楚辭薈蔚朝隮詩薈兮蔚兮南山朝隮薈蔚雲興貌屏翳雲師名油然作雲沛然下雨英英白雲露彼管芧淒淒祁祁詩有揜淒淒興雨祁祁垂天大鵬翼若垂天之雲觸石公羊曰雲觸石而出膚寸而合不崇朝而遍天下者唯泰山爾潤礎淮南子曰山雲蒸柱潤礎出蒼梧歸藏曰有白雲出自蒼梧歸于大梁至帝卿莊子曰乘彼白雲至于帝鄉陽臺朝雲奇峰夏雲多奇峰赤鳥楚有雲如眾赤鳥夾日以飛三日太史曰其當王身乎飛揚高祖歌大風起兮雲飛揚五雲周禮保章氏以五雲之物辨吉凶水旱豐荒之祲象注云五雲色有五以別水旱豐凶也同雲上天同雲雨雪紛紛干雲文選干雲霧而上達狀亭亭以迢迢無心而出岫不興文選朝雲不興而黃潦獨臻陰陽聚春秋元命苞山川氣說文云雲山川氣也從雨保章氏周官見上鄭司農註云二分二至觀雲氣青為蟲白為喪赤為兵荒黑為水黃為豐望堯望如雲瑞雲紀事黃帝受命有雲瑞故以雲紀事矞雲瑞圖矞雲慶雲也其狀外赤內黃金枝玉葉黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因之作華蓋覆鼎汾陰寶鼎天子祀之黃雲覆焉慶雲卿雲瑞雲景雲干呂青云干呂連月不散若煙非煙郁郁紛紛史記若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲五色呈祥氤氳泱漭德動天心瑞開雲物起封中漢武封泰山白雲起封中青色魏書曰文帝生有雲氣青色如車蓋其上終日望氣者以為貴之證非人臣之氣孔五色雲起中宗庶人韋氏禁中謬傳有五色雲起后衣笥帝圖以示諸朝因大赦天下雲狀如樹擊之胜帝奇其對馮智戴傳白雲孤飛謂左右曰吾親舍其下狄仁傑天瑞鄭治子仁規仁表皆豪爽有文嘗以門閥文章自高曰天瑞有五色雲人瑞有鄭仁表活活韓愈別知賦雲活活其常浮龍噓氣成雲雲固弗靈於龍也然龍乘是氣茫洋窮乎玄間然龍弗得雲則無以神其靈矣韓文賊瑞朱滔武俊等三讓乃就位是日三叛軍上有雲氣頗異燧望笑曰是雲無知乃為賊瑞耶景雲見樂志高宗即位景雲見張文收采古議為景雲歌白衣蒼狗杜甫詩天上浮雲似白衣須臾改變如蒼狗雲氣甚佳五代楚馬殷傳呂師周謂其裨將綦母章曰吾與楚人為敵境吾常望其營上雲氣甚佳未易敗也抱日浮空韓愈賀慶雲表抱日增麗浮空不牧雲氣多壽酉陽雜俎五色雜錯唐新語拾遺崔希喬轉馮翊令有雲如蓋當其廳事前須臾五色雜錯遍於州郭嵯峨韋應物夏景園廬詩夏雲已嵯峨五采五色光華不可遍觀非雲非煙容狀詎能詳述韓愈賀慶雲表晴雲如擘絮韓詩雲大如箕大順二年六月我師與宣州兵敗孫儒于宣城初行密軍師張頗善占筭前一日謂行密曰明日當水亭午可獲孫儒時畏日曦赫儒兵方盛人皆哂其言及詰旦北有雲大如箕漸次瀰漫俄而澍雨大水暴作儒令其眾曰城中以其大水必將擊我諸營皆當自固未幾水深丈餘城中知其號令乃逕出兵以擊儒營他營皆不救因獲儒而至皆如軍師之言吳越備史勃怒衝湧擊石薄木柳宗元复吳子松說子不見夫雲之始作乎勃怒衝湧擊石薄木而肆乎空中偃然為人拳然為禽敷舒為林木嵑𡿗為宮室誰其搏而斲之者潤益萬物元結補樂歌雲之出潤益萬物拋雲車國史補暴風之候有拋雲車濃雲鬱興唐史張說論文濃雲鬱興震雷俱發靄藹春雲空韓愈醉贈張籍落落出岫雲杜詩含姿韓愈詩宿雲尚含姿洩雲無定姿杜詩黃雲抱日酉陽雜俎代宗即位慶雲見黃雲抱日群遊杜甫詩孤雲亦群遊神物有所歸芒碭雲一去遣懷芒碭雲一去鴈鶩空相呼疊嶺宿霾芸同上雲近蓬萊常五色同上出左掖絕壁過雲開錦繡同上雲在高山空卷舒李白詩浮雲本無意吹落章華臺贈別雲徹風恬裴行儉為安撫大食使徑莫賀延磧風礫晝冥行儉止營致祭俄而雲徹風恬五朵雲直陟自謂所書陟字若五朵雲號郇公五雲體雨三白雨以潤之遇雨若濡雷雨作解雨我公田遂及我私天降時雨山川出雲月离于畢俾滂沱矣滂沱霢霂益之以霢霂既優既渥既霑既足生我百穀注霢霂小雨貌三日凡雨三日以往為霖九旬十夜朝隮于西崇朝其雨不節禮云風雨不節則饑天作淫雨害於粢盛膏雨百穀仰之時雨不降膏澤多豊年淫雨旱降霈然下雨密雨如散絲霖雨若歲大旱用汝作霖雨祁祁甘雨膏之芃芃黍苗陰雨膏之驟雨不終日零雨其濛如晦陰雨如晦五政管子曰五政順時春雨方來一旬太平時五日一風十日一雨休應而時若休徵曰肅時雨若咎徵曰狂恒雨若將降時雨將降秋無苦雨霑服諸侯朝天子雨霑服失容則止商羊鼓舞家語曰天將大雨商羊鼓舞墊巾郭林宗雨中行墊其角巾時人效之遂為折角巾鸛鳴于垤言將雨也救成都火欒巴噀酒為雨救成都火災少女風管輅曰天將雨則樹上有少女風陽臺巫山神女暮為行雨注必隨車漢百里嵩為徐州剌史境旱行部傳車所經甘雨輒降假蓋孔子將行雨無蓋不假蓋於子夏護其短也伐殷搜神記武王伐殷至河上雨甚雷疾討邢傳曰衛大旱討邢師興而雨洗兵武王伐紂大雨洗兵流麥高鳳讀書不覺大雨至盡流其麥蟻封穴易占曰蟻封穴戶大雨將至鸛巢苦雨詩曰水鸛巢曾甍山雲潤柱礎鷰飛湘川記零陵有石鷰遇雨則飛如生鷰蜧躍淮南子曰黑蜧神虯潛泉中而居天將雨則躍逃雨文子曰若與俗遽走猶逃雨之無面不濡濡濕也沮澤之龍蜀都賦潛龍蟠於沮澤應鳴鼓而興雨近壬子日管輅過清河見太守曰天旱輅曰今夕當雨傳曰近壬子日直滿星中已有生氣丁卯食頃必至有窘陰雨雨汁雨雪雜下雨行我將飲酒而已行雨雲不待族而雨廣成子謂黃帝濯枝風雨記曰六月大雨名倒井晉傳玄詩愁霖文選愁霖貫秋序玄冥風俗通謂雨師屏翳為雨師亦曰呼號赤松子神農時雨師列仙傳云土龍淮南子云土龍致雨許慎注云湯遭旱作土龍以象雲從龍焚身請謝承後漢書戴封升平為西華令大旱請雨無獲乃積薪坐其上以自焚火起而大雨至遠近歎伏乃遷中山相漂粟鄒子曰朱買臣苦修學業不休其家暴粟令臣守之不覺雨流粟孔知雨暘宗室守禮岐王常奏守禮知雨暘帝問故答曰臣無他當天后時太子被罪臣幽宮中歲被敕杖凡三四累創痕膚前雨沈憊霽則佳以此知之旱襘解必雨段文昌帥荊南州或旱襘辭必雨或久雨遇出遊必霽民為語曰旱不苦禱而雨雨不愁公出遊澍澤劉仁軌貞觀十四年校獵同州秋斂未訖仁軌諫曰今茲澍澤霑足百穀熾茂霖雨為害咎在圭司舊志神龍元年洛水漲唐休璟以霖雨為害咎在主司穀荒麥爛辛替否疏曰頃淫雨不解穀荒于隴麥爛于場御史雨顏真卿遷監察御史使河隴時五原有冤獄久不決天且旱真卿辨獄而雨郡人呼御史雨告麻大雨崔沆同平章