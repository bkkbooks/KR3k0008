風小暑日溫風至五月黃雀風至立夏清明風至夏至景風至炎風秋風立秋日涼風至秋分閶闔風至楚辭曰嫋嫋兮秋風洞庭波起兮木葉下冬風廣莫風北風其涼朔風颯然而至快域此風八風八節之風穆若清風奮之以風雨春無淒風君子之德風小人之德草草上之風必偃異色大庭氏之王天下五風並異色琴歌舜作五絃之琴以歌南風曰南風之薰兮解吾民之慍兮虎嘯淮南子曰虎嘯而谷風生鳶鳴禮記曰前有塵埃則戴鳴鳶鳶鳴則風生易水燕丹送荊軻易水之上軻歌曰風蕭蕭兮易水寒辭漢武作秋風辭曰秋風起兮白雲飛大王宋玉風賦序曰楚王游蘭臺之宮風颯然而下乃披襟而當之曰此風寡人與庶人共之耶宋玉奏曰此獨大王之雄風少女管輅傳曰時大旱輅曰今夕當雨樹上已有少女風矣而須臾雨至鶂退六鷁退飛過宋都風也鵬搏見上扇袁宏為東郡謝安授以扇宏曰即當奉揚仁風慰彼黎庶鵲巢淮南子云鳥鵲識歲之多風去喬木而巢扶枝馬古詩胡馬嘶北風瓢許由以瓢掛樹風吹瓢有聲由以為煩取而捐之穴莊子空穴來風青蘋風起於青蘋之末舞於松柏之下庶人之風掘堁揚塵塕然而起動沙堁吹死灰於窮巷之間入琴琴曲有風入松摧木木秀於林風必摧之驚飆拂野林無靜柯雄雌大王之雄風庶人之雌風風其吹汝漂汝發兮匪風發兮淒其以風大風漢高祖過沛而歌磔爾雅祭風曰磔潤之以風雨易相風烏郭緣生述征記云長安宮南有相風銅烏遇風乃動翣脯帝王世記曰堯時廚中有白肉脯薄如翣形鼓則風生使食物寒而不臭名曰翣脯解慍阜財詩曰南風之薰兮可以解吾人之慍兮南風之時兮可以阜吾人之財兮占神仙傳曰老子將去關而出以升崑崙關令尹喜占風逆知當有神人來過乃掃道以待老子老子知喜命應道乃停車關下具以長生之術授喜繕宮室完邊城不周風至誅有罪斷大刑廣莫風至五經通義云北風其涼其喈災飄風不終朝老蒙恆風若風不越而殺暴風來格大風有隧貪人敗類折木發屋揚沙項王圍漢王三匝於是風從西北來折木發屋揚沙楚軍大亂漢王乃領得與數十騎遁去禾偃木拔書開金縢曰天彰周公之德海鳥避爰居止於魯東門展禽曰其海有災乎廣川之高鳥獸恆知避其災是歲海果大風故避之淜滂風賦淜匹冰反熛怒並風擊物貌蹶石蹶動伐木風災數起月令國多暴風月令疾風博物志云太公為灌壇文王夢婦人哭當道問之曰吾是太山之神女嫁為西海君婦吾行必以疾風暴雨灌壇當吾道不敢以疾風暴雨過夢覺白太公三日果有疾風暴雨而過風五孔風拔樹壞人居廬舍吳兢為太子左庶子十四年六月大風詔群臣陳得失兢上疏曰乃六月戊午大風拔樹壞人居廬舍傳曰政悖德隱厥風發屋壞木風陰類大臣之象恐陛下左右有奸臣擅權懷謀上之心拔木郭子儀史思明自魏來戰鄴南子儀督後軍未及戰會大風拔木遂晦跬步不能相物色於是而王師南潰巨木飛舞馮弘鐸天復二年大風發屋巨木飛舞州人駭曰州且易主大將馮暉勸弘鐸南嚮宣告于庭大風拔樹劉鄴傳豆盧琢者為翰林與崔沆皆拜同中書門下平章事是日宣告于庭大風雷雨拔樹未幾及禍道大陂朱宣傳賀瑰以奇兵擊全忠輜重不及戰鉅鄴東瑰大敗見擒師無孑餘軍道大陂風大起全忠曰豈殺人有遺耶乃搜軍中復斬數千人風亦止天有四時五行寒暑迭居怒為風孫思邈風礫晝冥裴行儉冊送波斯王且為安撫使徑莫賀延磧風礫晝冥導者迷路揚沙蔽天五代賀瑰梁兵急追之降其卒三千餘人是日大風揚沙蔽天太祖曰天怒我殺人少耶即盡殺降卒三千人而縶瑰貪狼風前蜀王衍咸康元年十月幸秦州至梓潼大風發屋拔木太史曰此貪狼風也當有敗軍殺將者衍不省衍至綿谷而唐師入其境衍懼遽還唐師所至州縣皆迎降萬籟真笙竽杜詩占風鐸唐開元遺事岐王宮於竹林內懸碎玉片每夜聞相觸之聲即知有風號占風鐸百家灣風徐溫嘗自迎鑾還至百家灣暴風起舟人相顧失色溫乃袒禓以帛繫璟首顧謂妾御曰吾善游儻溺不暇相救幸保此子言訖風浪漸息九國志暴風自西北元和十二年春青州一夕暴風自西北天地晦冥空中有若旌旗狀屋瓦上如蹂躒聲出五行志河噴石鳴咸通六年十一月巳卯晦潼關夜中暴風山如吼雷河噴石鳴群鳥亂飛重關傾側出五行志裂風駕地震杜牧集李白詩掩苒眾草紛紅賅綠柳宗元袁家渴記每風自四山而下振動大木掩苒眾草紛紅駭綠蓊葧香氣衝濤旋瀨退貯谿谷搖颺葳蕤與時推移相風旌開元遺事五王宮中各於庭立長竿掛五色旌於竿頭旌之四垂綴以金鈴有聲即使視旌之所向可以知四方風候林風天籟劉禹鍚武陵北亭記風嫋嫋而先路文粹楊炯少室少姨廟碑鼓之以南箕風嫋嫋而先路經清觸濁柳文風出洞窟流離百物絰清觸濁呼竅召穴與夫草木之儷偶紛羅雕葩剡芒臭朽馨香采色之青碧白黃皆寓也巽二起風見雪門麥信國史補江淮舡泝流而上待東北風謂之信風七八月有上信三月有烏信五月有麥信避風臺樂史楊妃外傳明皇覽漢成帝傳以趙飛鷰身輕置七寶避風臺謂妃子曰爾則任吹多少妃子對曰霓裳一曲足以高掩前世韓愈訟風伯雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施震風薄怒唐史裴劉贊震風薄怒萬空不約而號勝風酉陽雜俎山人包超明皇令隨哥舒翰西征每陣常得勝風楚王風杜甫詩斷續楚王風羊角輕風旋細塵元稹詩冬風裂肌夏風如焚侯君集傳唐詩相李林甫大風拔木唐史玄宗本紀開元二十二年五月戊子相李林甫為禮部尚書同中書門下三品是日大風拔木白犬自穴出三水小牘汝南臨汝縣南十八里廣城陂之西垠有小山崆峒其顛