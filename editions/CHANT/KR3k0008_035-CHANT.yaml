body:
  text: 卷第三十五白遷喬求友不遺其友隨武子謀其身不遺其友儒有爵位相先近相待遠相致待致皆謂薦舉也其任舉有如此者佯狂漢雷義舉茂才讓陳重剌史不聽義佯狂不應人語曰膠漆不如陳雷蕭朱結綬蕭育與朱博為友著聞當世故語曰蕭朱結綬王貢彈冠漢貢禹王陽為友世稱王陽在位貢禹彈冠言取捨同也伐木出谷拔茅連茹匯征吉言以類相從也樂則思之白虎通行修而名不章友之罪也行不修身之罪也家語義之與比德必不孤伸於知已越石父曰君子仲於知己屈於不知己人惟求舊官貴知賢類聚匯征管仲囚於堂阜鮑叔薦於桓公引重魏其侯灌夫一人以友善相引重引重猶善薦也自葉匯征之吉寧爽鶴鳴之義舉不失職義在存私能舉善也唯其似之舉不失德人所具瞻舉善惟微知人則哲文舉之升一鶚陶洪之拔二龍薦思能之士採非常之德國著進賢之賞人思類能之用毛玠當仁克遵徐邈孔融明敏無棄匡衡任官惟良底祿以德建一官而三物克成舉十望而四方知勸因雲灑潤則芬澤易流文選晏嬰舉穰苴田忌進孫臏李克貢吳起蕭何獻韓信孔愛善無遺李吉甫當國引薦賢士大夫愛善無遺禿角犀杜悰出入將相而厚自奉養未嘗薦進幽隱佑之素風衰焉故時號禿角犀奉牒丐舉選關播帝問朕比下詔求賢才又遣使黜陟搜逮所遺須能者用之若何播曰陛下須求賢又使舉薦然止得求名文辭士焉有道賢人肯奉牒丐舉選耶推引張九齡所推引皆正人力薦吳保安李蒙為姚州都督宰相郭元振以弟之子仲翔託蒙表為判官時保安罷義安尉未得調以仲翔里人也不介而見曰願因子得事李將軍可乎仲翔雖無雅故哀其窮力薦之首薦極論韓愈與陸員外書凡比四子皆可以當執事首薦而極論者主司疑焉則以辯之問焉則以告之未知焉則殷勤而論之期乎有成而後止可也推挽韓文既退又無相知有氣力得位者為之推挽白患難相死禮患則死之白虎通士為知己死鮑叔有疾管仲為之不食曰士為知己死雖為之死亦何傷哉偕死吳範與魏騰相善騰當死罪吳王責好諫者死範謂騰曰與汝偕死並免終始生死久要不忘平生之言孝友任恤注任信於友道恤憂患也周禮不恤之刑周禮八刑六曰不恤之刑不許友以死禮父母在白首同歸潘岳與石崇繫獄不為言申屠蟠友人馮雍繫獄豫州黃琬欲殺之或勸蟠救之蟠不行曰黃子琰為吾耶未必合罪如不用雖言何益琬聞釋雍罪也將恐將懼以予與汝我爾身也交態奔走之友袁紹與何顒患難二孔柳宗元欲以柳州授禹錫而自往播柳宗元元和十年徙柳州剌史時劉禹錫得播州宗元曰播非人所居而禹錫親在堂吾不忍其窮無辭以白其大人且萬無母子俱往理即具奏欲以柳州授禹錫而自往播會大臣亦為禹錫請因改連州吳保安郭仲翔被執蠻之浮華人必厚責財乃肯贖聞仲翔貴胄也求千縑會元振物故保安留嶲州營贖仲翔苦無貲乃力居貨十年得縑七百妻子客遂州間關求保安所在困姚州不能進都督楊安居知狀異其故資以行求保安得之引與語曰子棄家急朋友之患至是乎吾請貸官貨助子之義保安大喜即委縑于蠻得仲翔以歸直其冤韓文王仲舒碑友人得罪斥逐後其家親知過門縮頸不敢視公獨自問為計度論直其冤憂患而不拯其危朋友之際本以善合貴盛則望以力憂患而不拯其危自保榮華坐觀顛覆可不痛哉昔衛青之襄也故人多事冠軍而任安不去吳章之敗也門人皆更名他師而幼孺自劾此所以可貴也窮愁志姻友憚累徐晦楊憑得罪貶臨賀姻友憚累無往候者獨晦至藍田慰餞宰相權德輿謂曰君送臨賀誠厚無乃累乎晦曰方布衣時臨賀知我今忍遽棄邪有如公異時為姦邪譖斥又可爾乎德輿嘆其直稱之朝李夷簡遽表為監察御史晦請問所以舉之之由夷簡曰君不負楊臨賀肯負國乎白相謗傳樂轡與華弱少相狎長相優又相謗棄子如遺忘我大德思我小怨不棄故舊朋友無大故不相棄流言久不相見聞流言而不信甘醴之壞小人之交甘以壞醴久要不忘平生富貴易交示人情耳漢書一貴一賤翟公署門事見上注餘耳之隙張耳陳餘為刎頸之交後有隙耳斬餘汦水上贊曰張耳陳餘始居約時相然信死豈顧問哉據國爭權卒相滅亡何向者相慕用之誠後相背之戾也勢利之交古人羞之蓋謂是矣友而不心面友也楊子法言僔沓皆憎有小怨而不棄又相謗也不自辱焉棄予子皋曰朋友不以是棄予不遺其友隨武子謀其身云云王丹曰交友之難未易言也張陳隙其末故知全之者少也不我遐棄詩賣友酈寄與呂祿善周勃等令劫其父商使寄說祿令歸相印勃等遂滅呂氏人以麗寄賣友蕭朱結綬王責彈冠言相薦達也後有隙故世以交為難也谷風剌朋友道絕也詩朋友數斯疏矣匿怨而友其人東北喪朋伐木廢則朋友缺矣詩朱穆絕交論穆字公叔疾時交遊不篤輕為棄絕故作絕交論嵇康絕交書山濤為三公舉嵇康自代康聞與書絕之也怨及朋友忘我實多孔僖曾祖父子建對崔篆曰吾有布裘之心子有袞冕之志各從所好也離別離群子夏拜曾子曰吾離群而索居亦已久矣久不相見嵇呂命駕見相思門贈言老子送孔子見上注河梁別李陵詩孔賴寵爭力李訓始鄭注先顯訓藉以進及勢相埒賴寵爭功不兩立然方事未集乃出注使鎮鳳翔外為助援內實猜克待誅宦官且殺之劾非宰相器齊映始映微時張延賞遇之善及映相而延賞為左僕射數為映畫事又為所親求官映不荅延賞恚既復用即劾映非宰相器貶夔州剌史爭權不協李適之嘗與李林甫爭權不協林甫陰賊即好謂適之曰華山生金釆之可以富國顧上未之知適之性疏信其言他日從容為帝道之帝喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可以穿治故不敢聞帝以林甫為愛己而薄適之不親故友不過門秋草日上階李白書懷贈常贊府不相恤故友不相恤新交寧見矜贈新平反眼士窮乃見節義今夫平居里巷相慕悅酒食游戲相徵逐詡詡強笑語以相取下握手出肺腑相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髮比反眼若不相識落陷阱不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為韓文柳子厚誌翻手雲覆手雨杜詩谷風剌輕薄李白古風谷風剌輕薄交道方險巇斗酒強然諾寸心終自疑張陳竟火滅蕭朱亦星離嗟嗟失懽容勤問何所規賓友日疏散玉鐏亦已空李白東武吟白吳季札見鄭子產如舊相識與之縞帶子產獻紵衣子路曰願車馬衣輕裘與朋友共敝之而無感朋友之饋雖車馬非祭肉不拜謂其有通財之義束帛孔子遇程子於路傾蓋贈之以束帛君子不盡人之歡不竭人之忠忠謂衣服歡謂飲食不以為貪管仲與鮑叔分財管仲每多取之管仲曰鮑子不以為貪知我家貧也晏子脫驂贖越石父罪何以贈之通財孔佩刀玉帶張文瓘為李勣長史勣入朝文瓘與屬僚二人皆餞勣贈二人以佩刀玉帶而不及文瓘又以瓘疑請勣曰子無嫌若某沈豫少決故贈以刀欲其果於斷某放誕少撿故贈以帶俾其守約束若子才無施不可焉用贈厚以裝使入關馬周客密州趙仁本高其才厚以裝使入關解玉帶贈封敖李德裕進太尉敖草其制德裕解所賜玉帶贈之魯縞如白煙五縑不成束臨行贈貧交一尺重山岳李白送劉長史詩贈粟囷應指杜甫水宿錢財不足以賄左右之匱急韓愈各拔五色毛意重太山輕李白賄微所費廣斗水澆長鯨同上白我殯朋友死無所歸曰於我殯宿草曾子曰朋友之墓有宿草而不哭焉宿草陳根也謂期年寢門子曰父之友吾哭諸廟門之外師吾哭之寢朋友吾哭之寢門之外所知吾哭之野喪明曾子曰吾聞之也朋友喪明則哭之范張白馬范式字巨卿張紹字元伯少為友紹死式夢乃服朋友之喪而赴焉紹葬日紹母望見素車白馬號哭而來母曰必巨卿也式乃修墓種樹而去久要不忘平生之言絕絃鍾子期死伯牙遂絕絃贈劍延陵季子返留劍于徐君墓樹而去吾已傳鄭子皮卒子產哭曰吾已無為為善矣唯夫子知我注云無人知己之善故曰吾己出涕子產卒仲尼聞之出涕曰古之遺愛也舊館孔子之衛遇舊館人之喪命脫驂而贈之曰子入而哭之遇於一哀而出涕吾惡夫涕之無從也言主人以禮待我故出涕有贈哭朋友於寢門外之右南面哭所識於野張帷越界迎喪皇甫規友人喪還規縞素越界迎喪客以規擅違營并州剌史故方不坐山濤與嵇康為忘年之友康臨終謂子紹曰山公尚在汝不孤矣東北喪朋顏淵死子哭之慟曰有慟乎非夫人之為慟而誰為驢鳴孫楚字子荊與王濟為友濟死子哭之曰夫子好驢鳴乃作一聲聲體俱似坐客皆笑之韋泓為應詹服泓喪亂之際親屬遇飢疫應詹營護之詹後為江州剌史卒泓為製服王戎經黃公酒壚歎曰昔與嵇叔夜阮嗣宗酣暢此竹林之遊亦預其末嵇阮亡吾為時羇絏今視此近邈若山河也朋友死而歌莊子子桑扈孟子友琴張三人相謂曰孰能相與於無相與相為於無相為三人相視而笑莫逆於心遂相為友俄而子桑死孔子使子貢往吊或編曲或鼓琴相和歌曰嗟來桑扈乎而已反其真而我猶為人子貢趨問曰臨屍而歌禮乎二人相視而笑曰是惡知禮意棟梁折晉衛玠卒謝琨哭之慟曰棟梁折不覺哀死友趙岐逃難河間變姓名詣北海市中販胡餅孫賓石見曰處士非賣餅者乃開車後戶扶岐上歸白母曰得死友矣託妻子朱琿字文季同縣張堪有名於太學見暉甚重之接以友道乃把暉臂以妻子相託暉以堪先達未敢對後復見及堪卒自候視妻子賑給之狀貌似友人孔融與蔡邕友善邕卒後有虎賁士貌類邕融每酒酣引與坐曰雖無老成且有典刑送喪歸後漢任末字叔本遊京師教授友人董奉德於洛陽病亡末躬推車載奉德致於墓所由是知名也未申連璧之遊忽軫絕絃之泣明月臨階空有思於玄度流波入曲終絕賞於鍾期死而吊者既切子荊之問生乎愛矣還悲王粲之聲儀禮主喪禮朋友在他國袒免歸則已注謂無生喪者當為之主每至袒時則去冠代之以免舊說免象冠廣一寸以上歸有主則止也如幼弱則衣止也記曰主人三年喪則為之再祭朋友虞祔而已朋友麻朋友雖無親有同道之恩相與服縗絰帶檀弓群居入則絰出則否不吊服朋友有恩相為緦服即士之疑服素冠也死哭五孔每至生平故處輒流涕戴胄房元齡魏徵與胄善每至生平故處輒流涕往哭其尸王方翼其友趙持蒲誅死尸諸道親戚莫敢視方翼曰欒布哭彭越義也周文王掩骼仁也絕友義蔽主仁何以事君遂往哭其尸具禮收葬宴飲設虛位沃饋李勉常引李巡張參在幕府後二人卒至宴飲仍設虛位沃饋之青春之遊白首相失韓愈祭薛中丞文青春之遊白首相失慟諸野羅道琮徙嶺表有同斥者死荊襄間臨終泣曰人生有死獨委骨異壞道琮曰終不使君獨留此瘞路左去歲余遇赦歸方霖潦積水失其殯處道琮慟諸野波中忽若溢沸者道琮曰若屍在可再沸之復湧乃得屍還鄉歸於所次而哭文粹永泰中於穆鄂州寧會客席與故湖南觀察韋大夫之晉同宴適值有發遠書者知鄭林州炅之龐歙州濬或以疾而歿或遇戎於盜韋氏出涕沱若有言曰二剌史之晉之友交也於是斂匕箸離筵席因歸於所次而哭三日人來吊之者韋則盡哀長虢不徒慼容而已廣喪朋友義崔祐甫天其喪予文粹盧蕆用陳子昂集序昔嘗與子有忘形之契四海之內一人而已良友歿矣天其喪予琴筆兩絕樂天祭微之始以詩交終以詩訣琴筆兩絕再哭經過罷離魂去住銷杜甫哭王掄飲食六白不盡人之歡以全交也歡謂飲食也班荊伍舉與聲子祖善班荊相與食而言復故也殺雞為黍范式張紹千里相期見上注投轄陳遵留客飲共飲盍簪易勿疑朋盍簪盍合也簪疾也伐木燕朋友故舊也詩孔伺相過食飲狀韋執誼補闕張正一以上書召所善王仲舒韋成季劉伯芻裴茞常仲孺呂洞往賀之或謂執誼曰彼將論君與叔文鉤黨事執誼即白成季等朋比有所窺望帝詔金吾伺得相過食飲狀悉逐出之酒食接新奉詩書誇舊知韓愈詩聚香團揚州事跡太守仲端畏妻不敢延客謝皓謁之坐久飢甚端入內袖聚香團食之盤殽饋禽殼韓文聯句父友七白見父之執不謂之進不敢進禮父之執可以乘其車不可以衣其衣父之齒隨行家君投分侯霸事見拒交門注馬援不禮梁松援疾松候之拜床下援不為禮子孫曰梁松尊貴大人何不為禮援曰我乃父之友也嵇紹不孤見上注不避梁肉記曰既葬君食之則食之矣大夫父之友食之則食之矣不避梁肉若有酒醴則辭注變顏色則不可不拜魏常林伯槐年七歲父黨造之問伯槐曰伯先在否何不拜林曰臨子字父何拜之有不受父友解系少連荀勖諸子謂曰與卿為友應向我公拜勖又曰我與尊先君親厚系曰不奉遺教若先君相厚往日哀頓當垂書問親厚之誨非所敢承勖父子大慚而壯之也阿戎阮籍與王渾友渾子戎少籍二十歲每見戎盡日而去謂渾曰與卿語不如阿戎談孔見父執必感泗滂沱劉審禮父喪見父執必感泗滂沱五君詠張說既失執政意內自懼邪與蘇環善時環子頲為相因作五君詠獻頲其一紀環也候環忌日致之頲覽詩嗚咽未幾見帝陳說忠蹇有勳不宜棄外遂遷荊州長史振起張仲方生岐秀父友高郢見異之曰是兒必為國器使吾得位將振起之先君之所友天下善士先君之所與友凡天下之善士舉集焉信讓而大顯道博而無雜今之世言交者以為端敢悉書所尤厚者附茲石柳宗元先友記丈人吾父之友文粹崔祐甫穆氏四子講藝記祐甫不腆幸與使君有郎省之舊考盤在阿歲聿云暮既覿邦君又適諸子之館使君第三子因見謂曰丈人吾父之友也從事於游夏之門久矣遺之梨栗弘農楊公幼失所怙年六歲時學歸誤入人家乃父執友也二丈人彈棋次見楊氏子戲之曰爾能為丈人詠此局否楊即詠詩丈人驚撫其背遺之梨栗曰爾後必有文後十八一舉中春官選芝田錄在方鎮者交辟之路巖幼惠敏過人及進士第父故人在方鎮者交辟之久乃答白八行之書馬融書曰書雖兩紙八行云云三歲之字古詩客從遠方來遺我一書札置之懷袖中三歲字不滅鯉魚腹中古詩客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書素書意何如上言加餐飯下言長相思鴻鴈足下蘇武裂帛為書繫鴈足下天子射鴈於上林得書云云李陵之答蘇武用嗣德音嵇康之達山濤以絕交道愈風之檄陳琳為太祖作檄書太祖方臥讀之起曰愈我頭風飛箭之書魯連繫書於箭射入城中將得書而自殺書不盡言言不盡意幣帛見上迴紋竇滔妻蘇氏織錦為迴紋詩以寄滔叔夜懶而不作洪喬傳而是棄見上投水門鄭子家使執訊而與之書告趙宣子執訊通訊門之官寓書子產寓書於子西使告范宣子貽書鄭鑄刑書叔向移書子產咫尺之書廣武君謂韓信曰君若使一介奉咫尺之書注簡牘或長咫尺者也秦二世使遺趙王書不封欲使君臣相疑待詔公車公車今屬衛尉上書者所詣口占陳遵孟公善書與人尺牘藏以為榮為河南太守召善書吏十人於前治私書謝京師故人遵憑几口占數百封親疏各如共意河南太驚不發私書郅都公廉後漢杜安字伯夷年十三入太學號奇童貴戚慕其名或遺之書安不發悉壁藏之後收捕貴戚安開壁出其書示之不罹其患也心存尺書劉琨上書曰南北迥邈同契棄致云云袁安初為縣功曹奉檄詣從事從事因安致書於令安曰事有郵驛私請即非功曹所持辭不肯受從事矍然而止篋封吳志曹公聞太史慈名遺慈書篋封之發省無所道但佇當歸通草書魏文帝命劉廙通草書廙荅曰初以尊卑有踰禮之分是以守區區之節不敢脩草書陳泰挂書于壁泰為并州京邑貴人寄寶貝因泰市奴婢泰皆挂之於壁不發其封得劉公一紙書賢於十部從事劉弘為荊州每有興發手書丁寧款密人皆感爭赴之曰云云手荅陶侃為荊州閫外多事千端萬緒罔有遺漏遠近書疏莫不手荅筆翰如流未嘗留滯投水殷羨洪喬為豫章太守都下士人因其致書者百餘函行次石頭皆投水中曰沈者自沉浮者自浮殷羨不為致書郵也開閉數十桓溫將以殷浩為尚書令遺書告之浩欣然答書慮有謬誤開閉者數十竟達空函溫大怒之陸機犬陸機在京久無吳中家信犬名黃耳能為我取家信乎犬搖尾而去卒達家信搜得書蜀郡太守因計吏脩敬於曹騰益州剌史种嵩於函谷搜得箋奏騰中臣外交請免官治罪帝曰箋自外來騰書不出非其罪也點竄曹公與韓遂書多為點竄如遂改定之者馬超愈疑孔工為尺牘殷嶠以字行涉書工為尺牘以雉兔遍遺幕府人為書段成式侍父于蜀以雉兔遍遺幕府人為書因所獲儷前世事無複用者眾大驚封一笥書吉頊傳初太原溫彬茂死高宗持封一笥書諉妻曰吾死後須年及垂拱獻之垂拱初妻上其書言武后革命事不作草字席豫與子弟屬吏書不作草字不發蘇環歷明歙二川剌史時來俊臣貶州參軍人懼復用多致書請瑰瑰叱其使曰吾忝州牧高下自有體能過待小人乎遂不發書俊臣未至追還恨之由是連外徙不得入與諸子書顏真卿李希烈陷汝州貞卿往諭真卿每與諸子書但戒嚴奉家廟恤諸孤訖無它語簡繒寄書惟在頃無吝簡與繒韓愈詩數幅遺我數幅書繼以藥物珍贈元十八書勸養形神同上玩而復之不能自休得足下陝州所留書翫而復之不能自休韓荅侯繼且寄一札書令余解愁顏李白自梁園見會公寄書問三川不知家在否杜述懷反畏消息來寸心亦何有上但蒙寒溫問久客多枉友朋書素書一月凡一束虛名但蒙寒溫問泛愛不救溝壑辱道州手札適復至紙長要自三過讀杜詩枉裴道州手札不接而喻山川匪遐事使之遠形不接而喻者莫賢乎書夢得古人為書多書於絹呂向文選中有尺素書注光啟別紙唐盧光啟受知於租庸張濟每致書上疏允一事別為一紙風塵荏苒音書絕杜甫宿府一聲何處送書鴈杜甫詩縉在鳳翔作書與別又遺親故書數幅停筆而化王維傳自謂主盟遣將軍張仁則致書於帝帝覽書笑曰密陸梁不可折簡致之見本傳晉王數困欲與梁和使李襲吉為書諭梁辭甚辨麗太祖使人讀之致於毒手尊拳交相於暮夜金戈鐵馬蹂踐於明時嘆曰李公僻處一隅有士如此使吾得之傅虎以翼也顧其從事敬翔曰善為我荅之及翔所荅書辭不工而襲吉之書我傳於世五代李襲吉前後緘書報杜奉漢中王手札鄰舍煩書札杜詩王十五前閣會拆書放床頭涕與淚垂泗韓愈寄皇甫湜飛書飛書白帝營斗粟杜甫錦樹行音書從此稀杜甫贈韋贊善別江漢故人少音書從此稀白介頒秋斂用粟賙賜周禮請粟子華使於齊冉子為其母請粟積而能散年雖大殺眾不恇懼恇恐也謂上以法惠救之惠必及下禮小人懷惠惠下之道禮周人尚施分散者仁之施財聚則民散民散則財聚仁者以財發身義濟物也不仁者以身發財豐凶不時聚斂有典適時以權救物惟道匪頒匪非也頒分也又讀為分頒時頒並周禮博施濟眾見下賑貸門注貸而不書司城氏施而不德並賑貸門餼粟子皮事見上注隱人多取食焉子家謂季孫云隱人謂窮困人為粥衛國凶飢公叔文子為粥與國之餓者簞食靈輒餓趙宣子為簞食以與之義由獨斷惠必同沾惠以救災義而濟物好施惠孟嘗君與客語屏風後嘗有侍史主記所與客語問親戚居處客去已使人存謝獻遺其親戚父任散施卻愔字方回好聚斂積財雖千萬嘗開庫任其子超字景興一字嘉賓好施一日散與親故悉盡也俸錢贍貧第五倫事見俸祿門後漢劉翊字子相旅有張季禮奔師霄遇寒毀頓滯道路翊以車與之不告姓名策馬而去季禮意是翊也後詣還車詡閉門辭行不與相見不合施家施不及國傳大夫不收公利不敢作福臣無有作福作威書免官晉鄧攸為郡時擅開倉賑貧桓彝劾之矯制漢河內傷水旱父子相食汲黯以便宜持節發河內倉以救之及歸汰免官罪武帝賢而釋之博施之人專達之責積而能散誠謂發身私不及公豈宜作福歲凶諒可恤人家施不應及國散以家貯收其公利毀家紓難猶謂盡心賑窮救災豈宜獲戾情且涉私美將歸下苟徇便宜則非專達所司以未有君命何其速與使者以苟利國家專之可也示不敢專禮嗇則濟物宜哀菜色無肆莠言命未及於匪頒罪寧逃於擅發掠美鬻恩恤貧振廩鄧攸雖見免官矯制開倉汲黯猶聞釋罪王望字慈卿行部見飢者裸形草食以便宜輒出其所在粟布為糧作衣將議罪鐘離意不罪之也劉頌字子雅奉使見飢人上表請振貸不待報貸之而行除名孔輕財好施陳子昂輕財好施分給親故洎麾下裴行儉帝賜都支資產四金二千餘物橐駝馬牛稱是行儉分給親故洎麾下數日輒盡賙急令狐峘貶衢州別駕剌史田敦峘門主也與峘昧生平至是迎拜分俸半以賙給之家無餘貲蘇頲性廉儉奉廩悉推散諸弟親族家無餘貲所俸物賙急親族李元紘所得俸物賙急親族問餉沈傳師問餉姻家故人賑姻舊乏盧邁所得廩賜皆賑姻舊之乏散施妻子告不給樊宗師家饒于財悉散施姻舊賓客妻子告不給宗師笑而不荅周急崔郾不藏貲有輒周急親舊益務施與李藩居父喪家本饒財姻屬來吊有持去者未嘗問益務施與居數年略盡喜施貸李勣與其父蓋皆喜施貸所周給無親疏之間散金三千餘萬有落魄公子悉皆濟之李白上裴長史散金敷惠唐舊史魏元忠請歸鄉拜掃特賜錦袍及銀千兩給十騎四人手敕曰衣錦晝游在乎茲日散金敷惠諒屬斯辰元忠至鄉里竟自藏其銀無所賑施施饋十白君子以施祿及下易稱物平施用敷錫厥庶民敷分也書先王子惠困窮惠鮮鰥寡周禮遺人掌其委積以待施惠懷子好施士多歸之欒盈也傳在禮家施不及國歌舞陳氏之施人歌舞之博施子貢曰如有博施於民而能濟眾何如可謂仁乎子曰何事於仁必也聖乎魏成食祿千鐘什九在外什一在內馬援散財馬援田牧有牛馬羊數千谷萬斛歎曰殖財貴能散施否則守錢虜耳乃盡頒故舊王丹務周給後漢寇恂字子翼所得祿賜施朋友故人曰吾因士大夫致此豈可獨受耶君子以振民育德易散鹿臺之財發鉅橋之粟書陳錫哉周能施出公粟傳宋飢司城子罕請於公出公粟使大夫皆貸司城氏貸而不書不作記籍施而不德陳氏以家量貸而以公量收之陳氏家量比公皆加之也施取其厚宋公子鮑禮於國人年自七十已上無不饋飴也與爾鄰里鄉黨乎夫子謂原憲惠而不費漂母袤王孫饋食韓信成詔入榖賑貧者賜直義榖後漢黃香為魏郡年飢分俸祿贍貧人豐富之家各出義榖樊重假貸數百萬遺令焚削文契載殽糧竇武得兩宮賞賜悉與親族及載殽糧於路以施民也梁高字伯夏載榖於城門與貧餒者不宣己惠散軍糧舒仲應以袁術軍糧散給飢人術曰足下欲獨受天下重名乎餼國人粟鄭子罕卒子展以子罕之命餼國人粟一鐘在喪故假父命也與人者不曰來取禮妄施莊子屠羊說從楚昭王出奔不受賞曰豈使吾君有妄施之名指囷魯肅子敬不治家事以散財賑窮結士為務周瑜為居巢長過肅并求資糧肅時有兩囷米各三千斛肅乃指一囷與瑜瑜益知奇遂定僑札之交也姊助分施駱統君緒事嫡母謹時人多困乏統為飲食與之衰少其姊仁愛問知之曰何不告我乃以私粟與統并告母使分施也散父米吳全琮子橫父柔使齎米數各斛到吳有所市琮皆散施空船還父怒之琮曰所市非急而士大夫有倒懸之患不及啟報父奇之孔卻州縣饋遺廣德公主下嫁于琮從琮貶韶州卻州縣饋遺不受莊淑公主下嫁杜悰出為澧州剌史主與偕州縣供具拒不受饋鹿裴休有饋鹿者諸生共薦之休不食曰疏食猶不足今一啖肉後何以繼饋十羊楊晟王建使王宗裕率騎五萬圍晟遂約降建饋十羊晟曰以我為机上肉乎不出虀葛周寶奔牛埭高騎饋以虀葛諷其且亡也寶抵于地曰公有呂用之難方作無誚我即奔常州多饋金帛鄭餘慶自至德後方鎮除拜必遣內使持幢節就第至則多饋金帛且以媚天子唯恐不厚故一使者納至數百萬緡憲宗每命餘慶必誡使曰是家貧不可妄求取議者或詆其沽激餘慶不屑也韓信所以感推食之恩申戰勝之威文粹柳冕論文武書白詒我佩玖雜以贈之不敢稅記曰未仕者不敢稅人如稅人則以父兄之命與人者不曰來取禮凡遺人弓者張弓尚筋弛弓尚角凡以弓劍苞苴簞笥問人者操以受命如使之容問猶遺也禮狄滅衛衛人廬于曹齊桓公歸以乘馬祭服五稱歸夫人魚軒宋公子鮑見上晉重耳及曹僖負羇饋盤飧寘壁焉注云壁飧中恐人見也云無境外之交故也晉人誘士會將行繞朝贈之以策饋孔子豚陽貨欲見孔子使孔子來拜之君子於有饋者不能見則不視其所饋注謂有疾不見則不納厚往而薄來不過具食器漢鄭莊性廉不治產然饋遺不過食器注謂一盤食也江都王建遺越繇閩侯錦帛閩侯亦遺荃葛荃葛今之布或曰細葛也朱邑為大司農無束脩之饋尹翁歸為市吏不受饋遺百賈畏之人訟亭長受米肉舊茂為密令不坐問所由晉陶侃為荊州有奉遺者皆問所由若力所致雖微必喜慰賜三倍若非禮得之即厲聲呵辱還其所饋人於是勤於農恐以財貨污君朱暉文季太守阮況欲市其牛暉不從況卒暉乃厚贈曰前者恐以財貨污君魚相煦以濕相濡以沬不如相忘於江湖莊小惠未遍受饋不謝劉殷時人嘉其志行競以榖帛遺之受而不謝云待後貴當相酬也楚王老有嘉惠恤老也不受太祖徵華歆賓客故人送行贈遺數百歆不拒密題識臨去謂曰恐懷壁為言願諸君為之計眾乃知之各留其贈又羅含君章父宰新塗後含到縣縣人以含舊宰之子咸致賂遺不拒及歸悉封留而去又于寶與翟陽船賣之買絹寄還本為惠反煩之益愧歎也旦發暮還晉荀晞道將在兗州見朝政亂懼害每得珍物貽都下親貴去五百里恐不鮮美求得千里牛旦發暮還漂母饋飯僖妻饋飧慶遺十一孔奉賜悉遺親黨李勉位將相所得奉賜悉遺親黨賂遺得權幸心李聽罷為太子少傅聽素以賂遺得權幸心故多為助力歌兒狗馬金貝踵疊其門楊國忠遠近饋問閹稚歌兒狗馬金貝踵疊其門幃頭紗元和大和已來左右中尉或密以幃頭紗贈清望者則明晨必有爰立之制出南部新書四方賂遺歲積鉅萬五代晉臣桑維翰權勢既盛四方賂遺歲積鉅萬贈遺藩渥襄武郡王琛初與太常卿鄭元璹持女伎聘突厥始畢可汗約和親始畢禮之贈遺藩渥自弱冠誓不通親友獻遺杜暹自弱冠誓不通親友獻遺以此終身白不知所賀子玉治兵干蒍鞭七人貫三人耳國老皆賀子文蒍賈後至不賀曰不知所賀子玉過三百乘不能以入苟入而賀何後之有傳婚禮不賀人之序也賀取妻者曰聞子有客使某脩慶吊相隨里捨賀生男廬綰父與太上皇同里善高祖與綰同日生里中持牛酒相賀兩家子長相愛里中喜兩家相善子同日生又相愛復賀兩家也賀錢萬呂公善沛令從人避仇豪傑聞令有重客皆往賀不蒲千錢坐堂下高祖紿謁者曰賀錢萬馬援軍還故人多迎勞平陵人孟冀名有謀於座賀援援曰吾望子有善言反同眾人也相慶慶賀十二孔受吊不受賀岑文本為中書令有憂色母問之荅曰非勳非舊責重位高所以憂也有來慶者輒曰今日受吊不受賀三慶酷吏郭弘霸時大旱弘霸死而雨又洛陽橋久壞至是成都人喜后問群臣外有佳事邪司勳郎中張元一曰比有三慶旱而雨洛橋成弘霸死背著床瞑來俊臣斬于西市人皆相慶曰今得背著床瞑矣賀聲盈耳柳宗元送蕭鍊序拜慶寧覲光耀族屬送班孝廉序高堂稱慶里閈更賀方將高堂稱慶里閈更賀曳裾峨冠榮南諸侯之邦送苑論朝野相賀李義府流朝野相賀泥金帖子新進士每及第以泥金書帖子附於家書中鄉曲親戚例以聲樂相慶謂之喜信也天寶遺事制下士相賀於朝楊綰遷吏部元載秉政忌綰望高疏薄之載得罪綰同平章事制下士相賀於朝宗戚詣慶鄭肇既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣歸與妻子相慶裴諗為翰林承旨適會帝幸其院諗即稱謝帝曰可歸與妻子相慶取御奩果以賜諗舉衣跽受帝顧宮人取中褁賜之洒然相賀徐有功起為左肅政臺侍御史天下聞有功復進皆洒然相賀清朝燕人杜甫賀陽城郡王太夫人加恩薦獻十三白水潦降不獻魚鱉禮獻鳥者佛其首為其喙害人也佛戾也獻車馬者執策綏獻甲者執胄獻杖者執末獻民虜者操右袂獻粟者執右契獻米者操量鼓獻熟食者操醬齊獻田宅者操書致獻人禽加於一雙則執一雙以將命委其餘加猶也犬則執紲左牽之守犬田犬擯者既受乃問犬名牛則執靷馬則執靮皆右牽之甲若有以前之則執以將命無以前之則袒橐奉胄器則執蓋弓則左手屈韣執拊韣弓衣也劍則啟櫝加夫襓與劍焉注櫝劍函夫襓劍衣也父母在饋獻不及車馬潢汙行潦之水可羞於王公傳楚樂伯使攝叔奉麋獻焉獻叔也士有獻他日君問之曰安取彼再拜稽首而後對獻金玉曰致馬資於有司居山不以魚鱉為禮居澤不以豕鹿為禮天不生地不養君子不以為禮獻禽之未至言未至獻禽之時也問物所由陶侃事見上注西旅獻獒書穎考叔有獻於莊公而諫之傳孔獻女伎齊國昭懿公主憲宗即位獻女伎帝曰太上皇不受獻朕何敢違還之饋獻精腆丘和拜代州剌史煬帝北巡和饋獻精腆獻繒錦崔寧反代宗詔宰相杜鴻漸為劍南西川節度往平其亂會寧遣使至獻繒錦數萬辭卑甚約鴻漸貪其利遂入成都四方獻饋不及門劉瞻四方獻饋不及門門無饋餉李玨獨無所獻李峴吳王恪孫也玄宗幸溫湯甸內巧供億以媚上峴獨無所獻帝異之漢文罷獻詔還騄駬鑾輅徐驅焉用千里翟裘既焚筒布則毀文粹李德裕罷獻箴天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事袞以謂漢文帝還千里馬不用晉武帝焚雉頭裘宋高祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆靡侈不急而節度使非能男耕而女織者類出于民是斂怨以媚上也請皆還之上嘉納常袞傳幽燕使者幽燕通使者杜甫送路使君奉使十四白銜君命而使祗役勤王臣能承命為信死而成命臣之祿也下臣獲考解揚成命死又何求使乎使乎善之道也指使六十曰耆指使時使皇皇者華君遣使臣也送之以禮樂言遠而有光華也皇皇者華于彼原隰詩四牡勞使臣之來也有功而見知則說矣四牡騑騑周道逶遲怵惕奉公咨諏問政載馳載驅使四方子曰使於四方不辱君命可謂士矣使適四方周官曰擇任而往奉爾君事敬無廢命傳遽之臣以車馬給使也七十者適四方乘安車自稱曰老夫行役以婦人二星入蜀李郃占知之千里程漢舊儀奉璽書使者乘馳傳日夜千里為程也周官行人漢儀使者不制以辭說苑曰明君之使臣也任以事而不制以辭奉辭復命朝受命而夕飲冰執圭禮大夫執圭而使者以申信張旌儀禮使者及境張旌謁門人謁告也軺車馹騎星駕皆使車也周禮達八節使四方山國用虎節土國用人節澤國用龍節皆以金飾之齊國莊子來聘自郊勞至於贈賄禮成而加之以敏敏審於事輕幣敬使傳子叔齊子為季武子介以會自是晉人輕魯幣而益敬其使齊子相季武子以禮故也承君命不忘敏叔向曰薳罷有後於楚宜哉承君命不忘敏任賢使能周禮云凡為使者已受命君言不宿於家急君使也肅肅宵征夙夜在公詩豈不懷歸生事靡盬遇疾公羊傳曰公子遂如齊至黃有疾而還大夫以君命出聞父母喪徐行而不反況病乎注聞父母喪不忍疾行君使人追之也又榖梁曰公子遂如齊至黃乃復乃者亡乎人之辭也注大夫受命而出雖死以尸將命今遂以疾而還失禮違命故曰亡乎尸造于朝大夫聘未至而卒則既殯而造于朝介將事也使者旁午旁午謂一縱一橫也蓋使者縱橫也漢書牛軒之使鳳舉班固君子于役星言夙駕詩周禮夷使四夷之使有徵事奉使四方徵師役也使縱橫之流蓋出行人之官受命不受辭不辱君命此其所長也及邪人為之則尚諼而棄信也人事之患陰陽之患葉公諸梁使齊問孔子曰王使諸梁甚重齊待使者甚敬事不成當有人事之患事成必有陰陽之患注云人患雖去喜懼戰于心固以結冰炭於五藏矣吾爨無欲清之人今吾朝受命而夕飲冰我其內熱乎宜重選溫嶠字子真止疏曰選使宜重不可減二千石見居三品請治行鄭莊事見行旅門朝冒霧露晝被塵埃夏為大暑暴炙冬為風寒偃薄朝受命夕引道蘇武丁年奉使皓首而歸廢命棄事不忠廢命非敬棄君之命子曰誦詩三百授之以政不達使於四方不能專對雖多亦奚以為樂祈以君命越疆而使宋致使而私飲酒不敬二君不可不討乃執之晉執之也廢職棄命臣節無夫寧念解楊之忠君命不恭宜及樂祈之責既辱君命是速爾尤後漢李郃為漢中戶曹吏時竇憲納妻郡國有禮事錢郃諫太守憲危亡可勿與交通不聽遂自請行許之所在停留以觀變至扶風憲就國自殺友黨悉誅與交通者免官唯漢中不預行人失辭使而失命召而不來是稱奸也獻空籠齊使淳于髡獻鵠于楚出郭門飛其鵠揭空籠往曰臣過上水不忍鵠之渴飲之遂飛去欲買代之是欺吾王也云云楚王曰善哉得子言倍於鵠矣後漢鄭興奉使私買奴婢左遷蓮芍令墯慢孔神情爽拔可使捕李義琛文成公主貢金遇盜於歧州主名不立太宗召群御名至目義琛曰是人神情爽拔可使推捕義琛往數日獲賊帝喜為加七階子昂三事陳子昂對三事一言九道出大使巡按天下申黜陟求人瘼臣謂計有未盡也且陛下發使必欲使百姓知天子夙夜憂勤之也群臣知考績而任之也姦暴不逞知將除之也則莫如擇仁可以恤孤明可以振滯剛不避彊禦智足以照姦者然後為使故輶軒未動而天下翹然待之矣今使且未出道路之人皆已指笑欲望進賢下不肖豈可得邪有遣使之名無遣使之實使愈出天下愈弊徒令百姓道路送往迎來不見其益也檄取庫錢蘇頲檢校益州大都督長史前司馬皇甫恂使蜀檄取庫錢市錦半臂琵琶捍撥玲瓏鞭頲不肯予因上言遣使御命先取不急非陛下以山澤贍軍費意或謂頲公在遠回得忤上意頲曰不然明主不以私愛奪至公吾可以遠近廢忠臣節邪處決平恕馬懷素以十道使黜陟江西處決平恕幽鎮宣諭溫造為幽鎮宣諭使賜緋衣至范陽總橐鞬迎造為開示禍福劉總懼矍然若兵在頸時劉總比年上書請覲使問行期乃不報穆宗曰卿為我行諭意奉使稱旨廬群淮西吳少誠擅決司洧冰溉田使者止之不奉詔命群臨詰少誠曰是於人有利群曰臣道貴順恭恪所以為順也專命廢順雖利何有為陳古今成敗事逆順禍福皆有效所以感動之少誠竦然奉使稱旨宣布天子德意李靖授嶺南宣慰大使以嶺海陋遠久不見德非震威武示禮義則無以變風即率兵南巡所過問疾苦延見長老宣布天子德意遠近懽服寧朔大使竇靜改夏州都督詔曰北方之務悉以相委以卿為寧朔大使朕無北顧憂矣多振冤滯劉祥道詔巡察關內道多振冤滯毬場宣詔崔從遷右丞王承宗請割德棣而遣子入侍也憲宗選堪使者以命從議者謂承宗狠譎非單使可屈次魏田弘正請以五百騎從辭之惟童騎十數疾趍鎮集軍士毬場宣詔為陳逆順大節禍福之效音辭暢厲士感動承宗自失貌愈恭至泣下即按二州戶口符印上之動搖山岳震慴州縣韋思謙曰御史出使不能動搖山岳震慴州縣為不任職復十道使張廷珪請復十道使巡視州縣帝然納之因詔陸象先等分使十道所至震畏韋見素天寶五載為江西山南黔中嶺南道黜陟使繩紏吏治所至震畏單使弄頰李軌會安脩仁兄與貴本在長安自表詣涼州招軌帝曰軌據河西連吐谷渾突厥今興兵討擊尚為難單使弄頰可下邪興責曰軌盛彊誠然右曉以逆順禍福宜聽如憑固不受臣世涼州豪望多識其士民而脩仁為軌信任典事樞者數十人若候隙圖之無不齊帝許之請馳傳行天下宇文融自請馳傳行天下事無巨細先上勸農使而後上臺省須其意乃行下融所過見高年宣天子恩旨百姓至有感涕者魏博宣慰孔巢父為魏博宣慰使巢父辨而才及見田悅與言君臣大義利害逆順開曉其眾是時悅久不臣下皆厭亂雜然喜曰不圖今日還為王人酒中悅起自陳騎射工曰陛下見用何敵不摧巢父曰若爾不蚤自歸乃一劇賊耳悅曰能為劇賊豈不能為功臣乎巢父曰國方多虞待子而息悅謝焉數日田緒殺悅遂與大將刑曹俊等聽命巢父即以緒權知軍務紓其難勞問循慰奚陟貞元八年遷中書舍人於是江南淮西皆大水詔陟勞問循慰所至人人便安使者趣戰哥舒翰帝趍翰出潼關復陝洛從國忠之言使者趣戰項背相望持節直入其軍李鄘徐州張建封卒兵亂囚監軍迫建封子愔主軍務帝以鄘剛敢拜宣慰使持節直入其軍大會士喻以禍福出監軍獄中脫桎梏使復位眾不敢動愔即上表謝罪稱留後鄘曰非詔命安得輒稱之削去乃受既還稱旨遷郎中賜金紫持節袁滋韋皋始招來西夷異牟尋內屬德宗選郎吏可撫循者皆憚行至滋不辭帝嘉之擢祠部員外郎兼御史中丞賜金紫持節往踰年還使有指願得天子一節柏耆王承宗以常山叛朝廷猒兵耆仗策詣淮西行營謁裴度且言願得天子一節馳入鎮可掉舌下之度為言乃以左拾遺往既至以大誼動承宗至泣下乃請獻二州以二子入質真擢耆左拾遺由是聲震一時敕使柳公綽奏比館遞匱乏驛置多闕敕使衣緋紫者所乘至三四十驛黃綠者不下十數有專對才于頔為吐蕃計會使有專對才巡邊程異同平章事明年西北軍政不治議置巡邊使憲宗問孰可者乃自請行固辭元行衝出為岐州剌史兼關內按察使自以書生非彈治才固辭分道賑贍劉憲父思立高宗時為名御史于時河南大旱詔遣御史中丞崔謐等分道賑贍思立建言蠶務未畢而遣使撫巡所至不能無勞餞花鳥使呂向帝遣使釆擇天下姝奸納之後宮號花鳥使向因奏美人賦以諷遂使乘驛視吾饑人杜牧作權審制慰撫流散宣導恩澤同上行營宣慰元和中憲宗緣淮西久未成功遣尚書左丞許孟容行營宣慰令面詰責光顏重胤一月內平賊贊皇一品集布宣天子德澤魏人歡服裴度元和六年以司封員外郎知制誥田洪正效魏博六州于朝憲宗遣度宣諭洪正知度為帝高選故郊迎趨跽受命且請遍至屬州布宣天子德澤魏人由是歡服還拜中書舍人傳聲看驛使送節向河源杜甫東樓詩孱僮單騎張薦顏真卿為李希烈所拘遣兄子峴及家僕奏事皆留內侍省不得出薦上疏曰去正月中奉使淮西期不先戒行無素備受命之出不宿於家親黨不遑告別介副不及陳請孱僮單騎即日載馳出使者冠蓋相望李嶠上疏朝廷萬機非無事而機事之動常在四方故出使者冠蓋相望今已置使則外州之事悉得專之傳驛減矣請率十州置一御史李素立見名字門專命十五白卿非君命不越竟傳大夫出疆有可以安國家定社稷專之可也不制以辭說苑曰明君之使人也任以事不制以辭專對苟葉盡忠之節難科專達之辜違命折券尚不論辜馮驩矯制發倉猶聞釋罪汲黯使者誠為擇利或人未可與權行人將欲敗謀難從膠柱鄧攸免官見上遂事公羊公子結媵陳人之婦遂及齊侯宋公盟遂事也使者受命不受辭馮奉世陳湯矯制見軍矯制門汲黯發倉見不合施門徐偃鼓鑄博士徐偃行風俗矯制使膠東魯國鼓鑄鹽鐵還奏張湯劾至死偃以春秋之義有可以安國家定社稷專之可也詔終軍問罪詰曰古者諸侯國異俗百里不通故有不受辭專可之宜今萬國為一天下同風偃巡封域之中稱以出疆何也且鹽鐵在國家不足為利害而以安社稷為辭何也矯作威福以干名譽罪重而所就小偃即死不至而反汲黯字長孺上使視東越相攻不至吳而反曰越人相攻不足辱天子之使受賂范睢從須賈使齊齊王賜金須賈以告魏齊齊以睢告國陰事得金擊睢折脅拉齒又兩越王賜陸賈橐中裝直千金又司馬相如使蜀時受金失官作徒衣鐘離意子阿部送徒詣河內時寒徒病不能行意移牒屬縣使作徒衣縣上狀意亦具聞帝善之施惠孟常使魏子收邑三萬不致曰有賢者轉假與之矣後受施者自刎明孟常不反也雖有君命何其速也苟利國家專之可也示不敢專禮義有隨時恭征專命士匈侵齊及榖聞齊侯卒乃還禮也嫌其不待君命為失禮故明言其禮也又善不伐喪也傳孔矯詔則天皇后武氏有上封事言嶺南流人謀反者太后遣攝右臺監察御史萬國俊就按得實即論決國俊至廣州盡召流人矯詔賜自盡皆號哭不服臣道貴順廬群御命北闕撫寧南方苟利國家專之可也李陽冰上李大夫書採風謠十六白奉茲星使採彼風謠後漢和帝分遣使者各至諸郡觀採其風謠勤宣帝命敷求人瘼使從俗從所官也風俗通曰周秦帝以歲公月遣輶軒之使採異方言還奏之藏於私室周適四方巡行風俗漢兮八使觀採方言省問國風圖寫山川後漢李恂拜侍御史持節使幽州慰撫北狄所過皆圖畫山川屯田聚落百餘卷悉奏之漢遣八使巡行風俗皆選素有盛名周舉杜喬欒巴張鋼等分天下剌使二千石有贓罪顯明者驛馬上之墨緩已下使輒收舉號八俊舉賢史鄭安平操范睢亡匿奉使謁者王稽至魏安平詐為卒侍王稽稽問曰魏有賢人可與俱西游者乎安平曰臣里中有張祿先生欲見君其人有仇不敢晝見乃夜見之稽遂載入秦卒為秦相又暴勝之為直指使至勃海聞雋不疑賢遣使請不疑相見薦詣公車拜青州剌史舉賢使漢武使慱士循行天下舉獨行君子士有恃招使者之任也注士有異行須特招也觀風孔王術察風俗陸贄補渭南尉德宗立遣黜陟使十一人行天下贄說使者請以五術察風俗曰聽謠誦審其哀樂納市賈觀其好惡訊簿書考其爭訟覽車服等其憸奢省作業察其趣舍遣御史察風俗則天光宅元年十二月戊子遣御名察風俗發輶軒文粹皮日休霍山賦序所至州縣山川未嘗不求其風謠以訟其文幸上發輶軒使得採以聞或忿形謗讟或醜肆謳謠陸宣公奏議諸道貢珍遽私別庫試詢候館之吏兼採道路之言果如所虞積憾已甚或忿形謗讟或醜肆謳謠容其身到屬縣李嶠請率十州置一御史容其身到屬縣閭里督察姦訛釆風俗然後可課其成功按姦慝十七白儆于有位提舉國章紏逖王慝奉辭問罪暴勝之持斧以懲姦漢武帝末盜賊群起拜暴勝之為直指使者衣繡衣持斧逐捕盜賊張綱埋輪京師振悚張綱在八使巡行中年少官卑受命埋輪洛陽都亭曰豺狼當路安問狐狸遂劾奏梁冀京師振恐范滂攬轡天下澄清滂請為詔使案察冀州滂登車攬轡慨然有澄清天下之志後漢提振綱紀案察奸究晉王導使八部從事之部顧和君孝在數中還同時見諸從事各言二千石得失和獨無言導問之和曰明公為政寧有漏網何緣有所察也孔智足以照姦陳子昂三事姦暴不逞知將除之也則莫若擇智足以照姦者然後以為使繩紏吏治韋見素天寶五年為江西山南黔中嶺南道黜陟使繩紏吏治白不廢命附樂祈不敬雖聞可討之辭宋樂祈聘晉未致君命而飲酒范獻子曰不敬二君不可不討遂執之伯蠲無辜終貽非禮之誚晉伐鄭鄭人使伯蠲行成晉人殺非禮也古者兵交使在其間可也虐執使臣將以釁鼓楚伐吳使弟蹶由犒師楚靈王執之將以釁鼓楚子使申舟聘于齊假道于宋舟曰我則必死王曰殺汝我伐之見犀而行犀舟之子託其子而行示必死傳及宋華元殺之不廢命晉使解揚如宋曰晉師悉起將至矣楚子執之使反其言解揚許之乃見宋人遂致其君命楚子問之對曰云云遂赦之又魏閻溫伯儉時馬超圍冀城急州遣溫密出告救於夏侯淵為超所獲超所言於冀城云東方無救溫偽許之乃將至城下曰淵軍三日至勉之勉之遂殺之又劉整鄭為諸葛恪所獲事與上閻溫相類又後漢寇恂子翼擊高峻峻遣軍師皇甫文出謁辭禮不屈恂怒欲斬諸將以為不可恂不聽斬之峻即日降諸將問之恂曰文峻之腹心殺之則峻亡其膽所以降耳諸將曰非所及也孔孔巢父李懷光據河中帝復令巢父宣慰罷其兵以太子太保授之懷光素服待命巢父不止眾忿曰太尉無官矣方宣詔乃譟而合害巢父並殺中人啖守盈劉悟斬使者藩鎮劉悟李師道被討使兵屯曹法一而信士卒樂為用悟徙營潭趙魏師壁阿井或言悟且亂不如速去師道遣使兩輩來責戰密語其副張暹使斬悟使者與暹屏語移時悟疑之暹以情告悟乃斬使者李希烈害顏真卿希烈拘送真卿蔡州希烈弟希倩坐朱泚誅希烈因發怒使閹奴等害真卿曰有詔真卿再拜奴曰宜賜卿死曰老臣無狀罪當死然使人何日長安來奴曰大梁來罵曰乃逆賊耳遂縊殺吳漵被害朱泚反漵齎詔見泚具道帝不疑而泚業僣逆留漵客省不遣卒被害縱使者戕之統葉護可汗明年射匱使使來以葛薩邦有世憾請殺之帝不許群臣曰存一人失一囚後且為患秦王曰不然人來歸我我殺之不祥帝又不聽宴禁中酒酣至中書省縱使者戕之不宣也吾行必不免周世宗征淮李景懼遣王知郎求知又遣鍾謨稱臣不荅乃遣王崇質副孫晟奉表謨與晟皆言景願割六州之城世宗已取滁楊諸州因留使者不遣初晟之奉使也語崇質曰吾行必不免及崇質還而周兵數敗盡失所得諸州世宗召晟問江南事晟不對世宗怒會重進以景蠟書來多斥周過惡由是發怒曰安得此指斥之言乎亟召收晟下獄及其從者二百餘人皆殺之晟臨死神色怡然遇讎十九白子夏曰居昆弟之仇如之何子曰仕不與共國銜君命而使雖遇不鬥禮以私害公非忠也傳奉辭成命必念解揚之忠損怨避仇宜寡趙喜之怒虐我則讎誠謂一之已甚銜君之命且宜兩不相傷未復命於飲冰寧報仇於劘刃皇華奉命白刃相讎魯使敬叔吊滕伯惠伯為介及郊懿伯之忌不入惠伯曰攻也不可以叔父之私不將公事遂入注懿伯惠伯叔父也忌怨也惠伯不以私害公故遂入捨則崇讎報為廢命與夫失節寧其斷恩居兄之仇避為不弟私讎不及公傳見讎不殺雖類寬身受命而行亦宜獲考傳不可以見讎而不殺又曰下臣獲考獲考謂事得成孔使者屢覘休璟唐休璟吐蕃來請和既宴使者屢覘休璟后問焉對曰洪原之戰是將軍多殺臣士卒其勇無比今願識之后嗟異擢右武威金吾二衛大將軍白蘇武漢使匈奴十九年不失節歸為典屬國傅介子以馬監求使大宛因詔責樓蘭龜茲遂帥吏斬之還封義陽侯張騫使外國窮河源封博望侯請使絕域路溫舒請使絕域暴骨方外盡臣下節太僕杜延年問狀罷歸故官以言無可取請長纓以羈虜終軍請使拜諫議大夫使南越而云云定遠侯班超見志節門陸賈使南越南越王尉佗內屬賜賈橐中裝直千金使於四方不辱君命丁年奉使白首而歸李陵與蘇武書單車之使漢詔求才可使絕域沒蕃田令因王事落蕃未還有親屬同居者其身分之地六年乃追身還之曰隨便充給即身死王事者子孫雖未成丁亦不追戰場人篤疾亦不追咸聽終身也沒蕃人還戶貫令沒蕃得還及化外歸朝者所在州鎮給衣食具狀送省奏聞化外人於寬鄉附貫安置落蕃人依舊貫無舊貫任於近親附貫也出禮義之鄉入無知之俗李陵書漢使王烏窺匈奴匈奴請漢使不去節不黯面不入穹廬烏習胡事乃去節黯面單于愛之遣子入侍後使楊信不去節坐穹廬之外求還班超仲叔久在絕域思土上疏願生入玉門關帝從之千里有不歸之魂殊鄉有哀苦之事隨絕域之聘人領天隅之歸客孔入蕃會盟李揆為盧杞所惡用為入蕃會盟使揆辭老恐死道路不能達明命帝惻然杞曰和戎者當練朝廷事非揆不可異時年少揆者不敢辭至蕃酋長曰聞唐有第一人李揆公是否揆畏留因紿之曰彼李揆安肯來耶董晉李涵持節送公主於回紇署晉判官回紇恃有功見使者倨因問歲市馬而唐歸我賄不足何也晉曰我非無馬而與爾為市為爾賜者不已多乎眾皆南面拜不敢有言食鐵石人和逢堯突厥嘿啜請尚公主逢堯以御史中丞報可嘿啜遣貴近頡利來曰詔送金鏤具鞍乃塗金非天子意使者不可信雖得公主猶非實請罷和親欲馳去左右色動逢堯呼曰我大國使不受辭我可輒去乃牽持其人謂曰漢法重女婿而送鞍具欲安且久不以金為貴可汗乃貪金而不貴信邪嘿啜聞曰漢使至吾國眾矣斯食鐵石人不可易因備禮以見可汗為斂髮南面再拜諭罷可汗兵鄭元璹劉武周將宋金剛與突厥處羅可汗犄角寇汾晉詔元璹諭罷可汗兵不聽乃進為武周援會暴疾其下意元璹寘毒囚之處羅死頡利圍留帳中數年既許可汗婚元璹始得還帝勞曰卿不辱於虜可輩蘇武張騫矣突厥崔敦禮回紇吐迷度為下所殺詔往綏定立其嗣而還敦禮通知四夷情偽其少慕蘇武為人故屢使突厥前後建明允會事機諭天子威德贊普順說韋倫德宗嗣位選使絕域者擢倫太常少卿充和吐蕃使倫至諭天子威德贊普順說乃入獻還進太常卿使回鶻柳晟為將作監使回鶻奉冊立可汗逆謂曰屬聞可汗無禮自大去信自彊夫禮信不能為何足奉中國乎可汗諸貴人愕然駭皆跪伏留不遣呂溫與韋執誼厚因善王叔文再遷為左拾遺以侍御史副張薦使吐蕃會順宗立薦卒于虜虜以中國有喪留溫不遣時叔文秉權與游者皆貴顯溫在絕域不得遷常自悲元和元年乃還而柳宗元等皆坐叔文貶溫獨免不辱命胡證太和公主降回鶻以檢校工部尚書為和親使次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者證固不從以唐官儀自將訖不辱命具陳虜情偽山川險易崔倫應二年以右庶子使吐蕃虜背約留二歲執倫至涇州逼為書約城中降倫不從更囚邏娑城閱六歲終不屈乃還代宗見之為感動嗚咽即具陳虜情偽山川險易指畫帝前人服其詳天子使可當小國之君李義琰使高麗其主據榻召見義琰不拜曰吾天子使可當小國之君柰何倨見我主詞屈為加禮屈使者拜商侑使回鶻可汗驕甚盛陳兵甲欲臣使者侑不為屈已傳命虜責其倨宣言欲留不遣眾色怖洧徐曰可汗唐婿欲坐屈使者拜乃可汗無禮非使臣倨也虜憚其言不敢逼虜以金遺陰埋帳下杜暹以監察御史覆屯磧西會安西副都護郭虔瓘與西突厥可汗阿史那獻鎮守使劉遐慶更相訟詔暹即按入突騎施帳究索左驗虜以金遺暹固辭左右曰公使絕域不可失戎心乃受陰埋帳下已出境乃移文俾取之突厥大驚度磧追不及去為西征記韋洪機使西突厥冊拜同俄設為可汗會石國叛道梗三年不得歸裂裾錄所過諸國風俗物產西征記比還太宗問外國事即上其書三使絕域張薦吐蕃贊普死為吊祭使占對詳辯三使絕域持節吊回紇蕭昕大曆中持節吊回紇回紇恃功廷讓昕曰乃中國亂非我無以平奈何市馬不時歸我直昕徐曰國家龕定寇難功雖絲毫不遺賞況鄰國乎僕固懷恩我之叛臣爾與連禍又引吐蕃暴我郊甸天舍其衷吐蕃敗北回紇悔懼叩顙乞和非天子恤舊功則隻輪不得出塞下孰為失信者回紇大慚回紇禮昕遣使者約和喻國威信婁師德上元初為監察御史會吐蕃盜邊師德奉使收敗亡於洮河因使吐蕃其首領論贊婆等自赤嶺操牛酒迎勞師德喻國威信開陳利害虜為畏悅兄弟優劣李義琰使高麗不拜及義琛再使亦坐召之義琛匍匐拜伏時人由是見兄弟優劣口伐鄭元璹口伐可汗有專對材犬戌請和上問能使絕域者君以奇表有專對材膺選劉禹錫呂溫集序
