body:
  text: 卷第六白火燎若火燎於原不可向邇皇皇者華於彼原隰鶺鴒在原兄弟急難菽中原有菽庶民采之苓詩隰有苓苓大苦地山有荷華隰有遊龍龍紅草也有杻有榆有栗有六駮有樹檖有長楚居不使禮聖人不使澤者居中原巡行三月巡行田原勸農勉人龍鱗原隰龍鱗文蕭條原野蕭條文人肉王莽時原野厭人肉曜威三農之隙曜威中原講武膴膴周原膴膴美也毛詩阽進原險處邐迤平原莓莓傳原田莓莓草盛貌廣平爾雅廣平曰原下濕曰隰可食爾雅可食者曰原放牛於原藪石蕉尸子莒國有石蕉原者廣尋長五十步臨百伊之溪有以勇見莒子者卻行齊限莒國莫之敢近以服莒試望平原孔遁形韋瓘南陵縣大農陂記丘隰遁形空規殘狀清虛原韋嗣立營別第驪山帝臨幸名所居曰清虛原既夷且大柳宗元道州文宣王廟碑畇畇其原既夷且大伏龍高祖紀武德六年十一月丁酉獵於伏龍原作觀池樂游原太平公主始作觀池樂游原以為盛集既敗賜寧申岐薛四王都人歲禊其地卜築李白避地司空原詩卜築司空原北將天桂鄰相原隰之宜奔走經營相原隰之宜指授方法韓愈送水陸運使及茲險阻盡始見原野闊杜甫鹿頭山原鮮而膴卉物柔澤禹錫連州廳記落日有時看禾黍落日上秋原韋蘇州登原忻時稼同上秋郊作郊原草樹滋同上東野辟原畇元稹代曲江老人獵於白鹿原高祖本紀武德六年十月庚申獵於白鹿原西出倉龍門南登白鹿原李白春夏之交陸禽孕育喂獸之藥不入原野六典遙原縈屬肅穎士祓飲序白地險易地險山川丘陵也賁易賁於丘園束帛戔戔送子涉淇至於頓丘旄丘詩責衛伯也旄丘之葛兮何誕之節兮思賢丘中有麻有麥有黍思賢也毛宛丘剌陳幽公羨荒淫昏亂也子之蕩兮宛丘之上兮擊鼓坎其擊鼓宛丘之下從長者而上丘陵則必向長者所視狐死正丘首仁也非人力爾雅大阜曰丘非人力為之自然也五爾雅名丘五淮南州黎丘陳宛丘齊營丘晉潛丘一成為敦丘有莘莘鬼也如狗有角五色莊夷莊子丘夷泉實步仞步仞之丘陵巨獸無所隱其軀則孽狐為之祥鼷隱莊子鼷鼠深穴神丘之下以避熏鑿之患積卑丘山積卑而為高也牡家丘陵為牝千年拾遺丹丘千年一燒至聖之君以為大瑞學山取材用禮孔侯德韓愈宴喜亭記太原王弘中於其居之後丘荒之間上高而望得異處焉卻立而視之出者突然成丘愈請名之名曰侯德之丘奧之宜柳宗元東丘記東丘者奧之宜者也可以處休丘之幽幽可以處休丘之窅窅可以觀妙眾丘求觀眾丘小必上太山岑韓愈詩某水某丘吾童子時所遊釣也送楊巨源高不踰尋丈丘垤之山高不踰尋丈則人狎而玩之上于頔戢戢見相湊常升崇丘望戢戢見相湊南山詩穿空細丘垤雨中聯句險如礙山丘相去不容步險如礙山丘洞庭阻風雲捲一丘房魯上節度使書大道之行則澤布四海否則雲捲一丘丘氣多尪雜俎廣知白鴻漸易鴻漸於陵菁菁者莪在彼中陵深谷為陵老子集鴥彼飛隼集於中陵五月升禮淆二傳淆有二陵焉南陵夏后皋之墓北陵文王之所避風雨也莫大陵莫大於加陵爾雅為高必因孔咸陽有陵齊陵巋然獨存唐文粹喬潭女蝸靈記登黃龍古墓望洪河中流巋然獨存大浸不溺者媧皇陵也有高卑之常水無盈縮之度陵有高卑之常平坦惟君與我同懷抱鋤去陵谷置平坦韓愈遊青龍寺牧羊之子來攀登李白登高丘君不見驪山茂陵盡灰滅牧羊之子來攀登周覽無不極清晨登巴陵周覽無不極明湖映天光徹底見秋色李白陵氣多貪酉陽雜俎白茹藘在阪有漆有桑詩伐木于阪晨上城皋阪旋門門在城也轘轅文邪徑捷乎轘轅轘轅阪名九折王陽馳九折九折阪名也所思四愁詩我所思兮在漢陽欲往從之隴阪長側身西望涕霑裳造雲日文脩阪造雲日班彪登北徵賦登赤須之長阪文帝漢文帝從霸陵上欲西馳下峻阪袁盎攬轡上曰將軍怯耶盎曰臣聞聖主不乘危今陛下騁六轡飛馳不測山有如馬驚車敗陛下縱自輕柰高廟太后何上乃止王陽歎漢王陽為益州守行部至𤏡九折阪歎曰奉先人遺體柰何乘此艱險乃以病辭去及王遵遷益州刺史至此阪問曰此非王陽所畏之道耶吏曰是遵叱馭驅之曰王陽為孝子王遵為忠臣走丸阪上走丸言易吳阪馬見馬門孔白司馬阪侯思止本人奴言語俚下嘗按魏元忠讓曰亟承白司馬不爾授孟青洛陽有白司阪將軍有孟青捧即殺琅玡王沖者元忠不承長樂阪張浚帝置酒安福樓臨餞浚飲酣泣下楊復恭聞不懌率中尉等餞長樂阪以酒屬浚浚不舉崿阪之峻張說上疏曰宮距洛城百六十里有伊水之隔崿阪之峻採薪隴阪長李白北上征汲水澗谷阻採薪隴阪藏昴藏昴低橫阪韓愈南阪即北南阪下久聞有水石營大像白司馬阪蘇珦后營大像白司馬阪靡用億計珦上疏諫見納白上古居易上古穴居而野處後世聖人易之以宮室虛受惴惴詩臨其穴惴惴其栗大木莊子大木百圍之竅穴狐伏莊豐狐文豹伏於巖穴逃越人三世殺其君王子搜患之乃逃於丹穴越人熏之以艾乘以玉輦大明鑣轡於金樞之穴注靈道文也銅乳訪銅乳於洞穴注靈道文禹穴上會稽探禹穴太史公冬上古冬穴夏巢文子穴處識陰陽龍穴吳郡龍穴內蒸雲雨所儲探封狐趫捷之徒赴洞穴探封狐屑沒或屑沒於黿鼉之穴呀越呀之洞穴來風空穴丹穴漢邑寡婦清其先得丹穴而探其利穴出丹砂見鰥寡注五姓出後漢武洛鍾離山有二穴一赤一黑有五姓出焉海鰍風俗記浴鯇一名海鰍長數千里穴居海底出入有恆入穴則潮上出穴則水退也尾閭莊子尾閭之穴山下出也孔穴山藏錢藩鎮劉仁恭以堇土為錢斂真錢穴山藏之誅破姦盜窟穴李林甫洞穴王鍔作洞穴實金錢其中冰雪所儲柳宗元復乳穴記神隧高麗國左有大穴曰神隧每十月王皆自祭冥樓在巖穴中有綠髮翁被雲臥松雪不笑亦不語冥樓在巖穴李白古風四海失巢穴贈河陽李大夫詩韓愈文集不有萬穴歸何以尊四瀆杜甫三川觀水雨洗煙空飆然莫窮文粹禹穴碑銘鄭魴一符一穴不足為最上何必探禹穴誓將歸蓬丘李白感遇萬穴為之倒流杜甫西嶽賦南室中入小穴柳宗元記柳州山水南室中入小穴常聞禹穴奇東去窺甌閩趙俗不好古流傳失其真幽蹤邈難得聖路嗟長煙出韓文漏澤穴兗州泗水縣東有漏澤穴白溪爾雅水注曰溪為牝家溪谷為牝百仞家東流之水不息流行赴百仞之溪也起章華楚靈王起章華之臺於乾溪國人潰叛雄雌老子知其雄守其雌為天下溪玉隱文赤玉隱瑤溪不測臨不測之溪以為固一濯過靈溪而一濯文滌煩想於心胸蕩塵蕩遺塵於旋流千餘仞清溪千餘仞中有一道上文呂望尚書太傅呂望釣磻溪於魚腹中得玉璜潺湲文孔竹溪六逸李白與孔巢父韓准裴政張叔明陶沔居徂徠山日沈飲號竹溪六逸青溪田游岩愛夷陵青溪止廬其側愚溪柳宗元愚溪詩序灌水之陽有溪焉東流入於瀟水或曰冉氏常居也故姓是溪為冉溪余以愚觸罪責瀟水上愛是溪故更之為愚溪善鑒萬類溪雖莫利於世而善於萬類清瑩秀徹上蒙溪陸希聲遁叟山居詩地當溪之上名其溪曰蒙溪將以蒙昧也決於夷壤而發其源又酌而飲蒙溪曰吾所以命夫溪之為蒙者勉子以決也子其決於夷壤以發其源決於寒垣以通其淤流於腴畝以施其潤決於洞澤以溥其惠決於廣陂使介鱗蕃育決於浸使虯龍變化靈溪李白送王屋山人詩靈溪恣沿越水石相噴薄咆哮七十灘水石相噴薄同上百尺照心明吾憐宛溪好百尺照心明溪館虎眼欲往涇溪不辭遠龍門蹙波虎轉眼溪宴駐潺湲韓愈送靈師清溪澄素光李白贈李左司晨溪響虛駃杜甫昔遊有深而綠淺而白文粹舒元輿錄桃源畫記按仙記分靈洞三十六之一支其水輒流勢與江河同有深而綠淺而白白者激石綠者落鏡黃溪柳宗元黃溪記若剖大甕側立千尺同上水木有佳色李白宣城青溪勝桐廬水木有佳色清湍鳴回流遊水西同上其流甚下不可以灌溉柳宗元愚溪詩序馬頭溪深不可厲借車載過水入箱韓愈送盤谷子詩溪行水奔注杜甫詩溪邊春事幽落日點溪荷葉疊青錢謾興雲溪花淡淡鹽亭詩溪即鏡中回李白前溪綠泱泱獨酌一溪初入千花明李白詩綠溪見綠蓧同上溪垘流潰僕固懷恩傳范志誠統眾涇陽時屯堅壁大雨溪垘流潰賊不得過水怪潛去地理志處州東十里有惡溪多水怪宣宗時剌史段成式有善政水怪潛去民謂之好溪秋有虎溪月白居易廬山草堂記釃流為溪鑿石引泉釃其流以為溪溪不袤數丈趣侔江海獨孤琅玡溪述序白山夾水爾雅山夾水曰澗斯千澗也斯千宣王考室也秩秩斯千采蘩于以采蘩於澗之中采蘋于以采蘋南澗之濱考槃在澗碩人之寬詩磊磊文磊磊澗中石萬丈餘深澗萬丈餘文山溜河泠泠飛泉漱鳴玉潺湲文斤竹謝靈運行斤竹澗詩過澗既厲急以衣涉水曰厲馬跳後燕錄晉劉牢之與慕容垂戰敗牢之走馳馬跳五丈澗符堅救至免之澗七孔澗谷之水深不過咫尺韓愈上于頔書亙石為底柳宗元石澗記亙石為底達於兩崖水平布其上流若織文響若操琴交絡之流觸激之音揭跣以往折竹掃陳葉排腐木可羅胡床十八九居之交絡之流觸激之音皆在床下翠羽之木龍鱗之石均蔭其上縈迴六龍過萬壑澗谷隨縈迴李白遊太山詩激激當流赤走踏澗石水聲激激風吹衣韓愈詩出入行澗崗此日足可惜野水日泠泠杜甫酬薛丈詩老夫自汲澗野水日泠泠隔澗語王君廊宋老生與戰君廊不利保方山君廊糧盡詐請降與老生隔澗語祈請哀到尋徑韋蘇州義演師西齋稍指緣原騎還尋急澗徑鳴騶響同上遊琅玡山鳴騶響幽澗弄驚波同上夏景園廬緣澗弄驚波金谷唐樂史綠珠傳石崇別墅在河南金谷澗澗中有金谷霸禽響幽谷寒藻舞淪漪柳宗元南澗中題澗樹落殘花韋應物西郊寢扉臨碧澗同上西澗弄泉朝涉澗同上遊西山躡石欹危過碧澗同上尋澗巖白必盈易遠壑必盈虛受易通谷爾雅水通谷曰壑藏舟莊子志士不忘孟志士不忘在溝壑可盈國溪壑可盈無完柩文怨遙臨浚壑而怨遙文孔足崖壑隱逸序唐興賢人在位眾多其遁戢不出者纔斑班可述然皆下概者也雖然各保其素非托默於語足崖壑而志城闕也度彼絕壑獨孤及招北客文人懸半空度彼絕壑西直巨壑連嶂如屏穹壑李嗣業初討勃律也方通道蔥嶺有大石寒隘以足蹶之抵穹壑識者以謂至誠所感兩岑抱東壑李白寄劉侍郎躋花界韋應物遊寺填壑躋花界千崖無人萬壑靜杜甫憶昔步壑風吹面同上斗水不能平巨壑之量晨說開元曆乾符頌陰壑雲松埋韋應物省風俗暮看雲壑平上陟巖憩殿暮看雲壑平同上萬壑度盡松風穀李白白入于幽谷易困卦辭岱畎書岱畎谷名出絲枲高岸詩高岸為谷為陵詩深谷為陵鳥出鳥鳴嚶嚶出自幽谷遷於喬木葛覃葛之覃兮施於中谷白駒皎皎白駒在彼中谷得一谷得一以盈老子上德若谷曠兮其若谷榮辱知其榮守其辱為天下谷寥廓大谷何寥廓人血川谷流人之血太谷九谷函谷無底文深谷無底蒼蒼大谷晦蒼蒼抵璧於谷儉也淒風起東谷文覆簣將覆簣於浚谷千仞谷吹律煖劉向別錄鄒衍在燕有谷地寒不生五穀衍乃吹律而溫氣至堪植黍今謂之黍谷風浸淫宋玉風浸淫溪谷盛怒於土囊之口風出飀飀出谷風寒煙陰谷曳寒煙響幽谷無私有谷斯響為牝家溪谷為牝注溪爾雅注溪曰谷量牛馬史包氏裸裸人名谷量牛馬不知數也會會於夾谷夾谷地名孔幽棲谷韋嗣立營別第驪山鸚鵡谷帝臨幸寵賜優渥名所居曰清虛原幽棲谷郎君谷王龜侍父至河中廬中條山朔望一歸省州人號郎君谷駱谷德宗幸奉天郭曙方領家兵獵苑北聞蹕至伏謁道左遂從乘輿入駱谷寇盜不入司空圖居中條山王官谷時寇盔所過殘暴獨不入王官谷洪流巨谷呀然成谷陷者呀然成谷韓文其石谷曰謙受之谷其土谷曰黃金之谷同上杳杳深谷杳杳深谷攢青楓杏花詩空谷柰何君獨抱奇才手把犁鋤臥空谷贈唐衢瓊草隱幽谷李白古風今居子午谷故人今居子午谷獨在陰崖結茅屋杜甫玄都壇歌川如掌韋蘇州藍嶺精舍谷轉川如掌泉甘而土肥盤谷之間泉甘而土肥韓文宅幽而勢阻同上滿谷山雲起杜甫示侄佐谷虛雲氣薄暮春谷氣多庳酉陽雜俎川谷成錦繡貴妃楊氏傳白三十六茅君內傳大天之內有玄中之洞三十六所第一王屋山之洞周回萬里名曰小有清虛之天第二委羽之洞周回萬里名曰大有空明之天第三西域土山之谷周回三千里名曰太玄摠真之天第四西方玄三山之谷周回千里名曰三玄極真之天第五青城之洞周回二千里名曰寶仙九室之天第六赤城丹山之洞周回三百里名曰上酒平之天第七羅浮山之洞周五百里名曰朱明曜真之天第八曲向山之洞周一百五十里名曰金壇華陽之天第九林屋山之洞周四百里名曰左神幽墟之天第十括蒼之洞周回三百里名曰成德箱玄之天凡此十洞皆仙人靈真之陰天內宮也其八海之中崑崙蓬萊方丈瀛洲滄波白山八停之神山山皆有洞宮或有方千里五百里非名小天之例不在三十六天之洞數也五岳及名山洞室或三十里二十里十里難併合神仙之言又非小天之數岳洞萬里其岱宗山之洞周三千里名曰三宮空洞之天羅酆山之洞周一萬五千里名曰北帝死生之天皆死神所治五帝之官考謫之府也鬼伸所治又有二十八小洞天之陰宮或地官所在者不能一一記其洞山之名略標其大者耳其餘有六洞天陰宮山皆夷狄異類鬼所不治犬戎鳥獸蠻裸夷之種也匈奴之天下北戎之善山南越之拘屢是也句曲山洞宮之中本有仙人郭四朝者治其宮亦司三官領羅酆師晨候四朝燕人也兄弟四人得道四朝是長兄也孔大隱洞韋夏卿署其居曰大隱洞寶仙洞玄宗幸清華宮太白山人王玄冀言玄皇元帝降於寶仙洞猗玕洞元結作自釋曰天下兵興逃亂入猗玕洞始稱猗玕子寒居洞韓退之宴喜亭記云洞曰寒居之洞志其入時也神刓有洞若神刓韓愈詩黛容崢嶸元傑東嶺洞谷名劃開洞門黛容崢嶸詭狀輪囷疑伏龍怪鎮含煙雲嵌巖巖兮洞無極金沙洞在驪山上魚藻洞見萍門水橫洞以下淥李白鳴皋歌水橫洞以下淥波小聲而上聞玉泉交流余聞荊州玉泉寺山洞往往乳窟窟中多玉泉交流有白蝙蝠如鴉李白荅族侄贈玉泉仙人洞天石扇訇然中李白詩洞口經春長薜蘿杜甫覽物洞口含涼氣韋應物宿青都觀金星洞洋州有金星洞地理志南山孔洞酉陽雜俎有人遊南山乳洞洞深數里乳滴瀝狀若飛仙小兒奔忙入洞龍城錄茅山隱士吳綽素擅潔譽神鳳初因採藥於華陽洞口見一小兒手把大珠三顆其色瑩然戲於松下綽因前詢小兒奔忙入洞張公山洞婺源縣有張公山洞洞穴如井深不可測白水流濕易潤下融而為川瀆流而為江海上善利物幾道老子曰上善若水水善利萬物而不爭處眾人之所惡故近道智者樂水積陰淮南子曰積陰之氣為水習坎易曰水薦至習坎盈科帶地文選悲哉帶地川浮天玄中記天下多者水焉浮天載地高下無不至朝宗沔彼流水朝宗於海冠五行之始洪範五行一曰水居六府之先六府水火金木土谷至柔之性善利之功泉毖彼泉水亦流於淇有漼者泉投石運命論曰以水投石莫之受也以石投木莫之逆也一勺今夫水一勺之多涸禮曰仲冬之月水始涸觀孫卿子曰孔子觀於東流之水子貢曰君子見大水必觀隴水歌曰隴頭流水鳴聲幽咽遙望秦川肝腸斷絕淡君子之交淡若水小人之交甘如醴君子淡以成小人甘以壞積孫卿子曰積水成泉吞舟之魚生焉湧潛㕎洞出急慎子曰西河下龍門其流駛竹箭莊子曰呂梁之險三十仞流沫三十里魚鱉不能進急之甚也懸水三十仞環流九十里尺波豈徒旋瑞王者德及地醴泉湧傳曰共工氏以水紀故為水師名官注共工受命於水感姜詩至孝有泉化出味如江水以養其母飲飯蔬食飲水信易曰行險而不失其信器夫水不凝滯於物在器必隨其方圓竭谷無以盈將恐竭萬頃黃叔度汪汪若萬頃之波洗耳許由濯滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足監書曰人無於水監當於人監又莊子人莫監於流水當於止水積莊子曰水之積也不厚則其負大舟也無力流惡左傳有汾澮以流其惡水滋傳曰拘鄫人之匯菅者曰何故使吾水滋濁明水司烜氏取明水於月川游周禁川游備溺也沉澤雍氏禁沉澤謂毒水蟲也狎玩傳水懦弱人狎而玩之多死狎而玩之則多死焉無沉氣國語水無沉氣春水淥波文雨露文子曰水之道上天為雨露下地為江河天吳水神也山海經曰天吳八首十尾曰河伯八水關內八水一涇二渭三滴四灞五浶六浩七灃八潏利萬物成百事觀溺郡子觀小人溺君子見大水必觀焉溺禮曰小人溺於水君子溺於口積水積而成江河行積而成君子坎易曰坎為水潤萬物者莫潤乎水陰陽谷梁曰水北為陰水南為陽清滌禮曰水曰清滌飲溽水穆天子傳天子飲於溽水之上准通尚書大傳曰非水無准萬里之本非水無以通遠道之重任也愛水韓詩曰冬不數浴非愛水性慾清文子曰水之性慾清砂石穢之人之性慾平嗜欲害之美哉晏子曰景公問廉政何如對曰其行水也美哉水乎其濁無不塗其清無不灑鏡墨子古詩曰君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知其吉凶樂水韓詩外傳曰夫水者緣理而行不遺似有禮者重而之下似有智者蹈深不疑似有勇者障防而清似知命者歷險致遠似有德者天地以生萬物以成國家以寧萬事所平智者所以樂於水也方圓尸子曰水其方折者有玉其圓折者有珠清水者有黃金准南子亦云見珠玉門注明莊子曰水淨則明水猶如是何況精神聖人之心淨乎河伯喜又曰秋水時至百川灌河兩涘之間不辨牛馬於是河伯欣然而自喜以天下之美為盡在己也清濁湍遲淮南子云各類生人見玉門合窳山海經刺山有獸名合窳見天下大水其上有木焉湛而清帝臺之漿水也枯林水出建安吳興縣梧桐水有兩源其山松楊桃枝水出東陽長山縣桃林之下見永嘉郡記湘水湘中記曰湘水至清雖深五六丈見底了了然其石子如樗蒲大五色鮮明白砂如霜雪如朝露禁抱朴子曰左慈能禁水水為之逆流一二丈禁水著庭中大寒不冰飲華陽國志曰朱倉少受學於蜀郡食豆屑飲水諷諫周業憐其貧給米肉倉終不受水災水潦方降國乃大水雨水不時水潦為敗苦雨數來丘隰水潦則天多沉陰淫雨早降並月令以水潦之不時天厲不戒天降之災天作淫雨害於粢盛後乃大水敗其城郭平原出水凡平原出水為大水上天降災下民昏墊墊溺也上帝不弔下民咨嗟流行天災流行城復于隍岸變為谷臼灶生蛙曾薨巢鸛苦雨詩水鸛巢臼灶方割湯湯洪水方割割害也懷山襄陵懷包也襄上也浩浩滔天言漫天也災既流行水方洊至墊溺漂淪五稼商羊家語齊童謠曰天將大雨商羊鼓舞乃一足鳥舞孔子曰齊將大水災也懸釜韓魏圍晉陽決晉水以灌之城中巢居懸釜而炊為魚趙孟曰微禹吾其為魚乎宋國害於粢盛公使弔宋災曰天作淫雨害於粢盛歷陽變於魚鱉辨命論曰空桑之里化為洪川歷陽之都變於魚鱉洪河之決瓠子漢書曰洪河之決瓠子帝親自塞乃為瓠子之歌滄海之吞桑田九年禹有九年水資舟旱則資舟備水災相驚漢京師相驚以大水至百姓奔走相蹂躪王鳳以太后及上後宮可御舡王商曰自古無道水猶不冒城郭今理致平和何由有水此必訛言先知後漢公沙穆為弘農令元壽元年三輔已東漂沒穆曉占乃告百姓令徒高地免漂沒也傷稼漢書和帝元年十年十三年十四年十五年水多漂雨傷稼鼠巢樹漢書占今注光武六年九月大雨連月苗稼更生鼠巢樹上不辨牛馬莊子曰秋水大至渚涯之間不辨牛馬救水災俾乂堯曰洪水方割有能俾乂乂理也有能理水將使之績用弗成鯀元載績用弗成決九川距四海距至也決川使通於海禹曰予浚畎澮距川濬深也深其畎澮以通於川堯水堯時洪水禹功劉子謂趙孟曰美哉禹功明德遠矣微禹吾其為魚乎為魚之患見上乃粒之功禹治水畢蒸人乃粒除九年之災興萬人之利大防大為之防遠績禹功屬方割之災軫其咨之念既有備於流行且無虞於昏墊竊壤以堙山海經洪水滔天鯀竊帝之息壤以洪水積灰而止淮南子曰古者四極則九州裂大水為害於是女媧乃積蘆灰而止之軫恤人之心開救物之志夏禹濬川人受賜矣隨山禹濬川到于今受其賜臺駘障澤帝用嘉之金天氏有裔子昧為玄冥師生允格臺駘宣汾洮障大澤帝用嘉之封諸汾州宜務資舟之備庶無懸釜之虞沉石犀蜀郡水災太守李冰乃刻石為犀於江浦以厭洪水水乃止負薪漢河內決瓠子令將軍已下皆負薪塞之捧土朱浮與彭寵書曰亦猶河濱之人捧土以塞孟津徒人避水漢武帝時河決灌四郡人令謁者二人發河南漕舡五百艘徒人避水居丘陵九萬七千口災同瓠子莫展計於負薪水等孟津方效愚於捧土多穿渠賈讓言若乃多穿漕渠使人得以灌田分散水患雖非聖人法亦救敗之術繕完舊堤賈讓言若繕完舊堤增卑培薄勞費無已數逢其害此下策也堰流法漢書王景仲通能治水詔遣與吳王共治浚儀渠吳王用景之法堰流水乃不復為害鯀堙書曰鯀堙洪水堙塞也盛溢漢王尊字子貢為東郡太守河水盈溢泛浸瓠子金堤老弱皆奔走恐水為害尊躬率人以應投白馬以祭水劾水神河伯尊執珪璧使巫祝以身填金堤因止宿廬居堤吏人數千萬人叩頭諫尊不肯去及水盛壤堤吏人皆走唯一主簿在尊傍不去而水稍卻而還吏人喜尊之勇節三老奏之詔賜秩中二千石加賜金二十斤孔大水杜中立為義武節度使大水泛徐兗青鄆而滄地積卑中立自按行引御水入之毛河東注海州無水災水入帝寢薛仁貴高宗幸萬年宮山水暴至夜突玄武門宿衛皆散走仁貴曰當天子緩急安可懼死遂登門大呼以警宮內帝遽出乘高俄而水入帝寢帝曰賴卿以免始知有忠臣也壅則為淵疏則為川狄仁傑疏民猶水也壅則為淵疏則為川通塞隨流豈有常性投水竇懷貞與太平公主謀逆既敗投水死朿洶湧之崩湍柳文懲咎賦攢巒奔以纖委兮朿洶湧之崩湍湍漣畔尺進而尋退兮蕩洄汨乎湍漣壞民廬舍馮宿擢東川節度涪水數壞民廬舍宿修利防庸一方便賴坐水旁孟郊調漂陽尉有投金瀨平陵城林薄蒙翳下有積水郊間往坐水旁裴回賦詩張又新水說陸龜蒙張又新為水說七種其二慧山泉三虎丘井六松江人助其好者雖百里為置之座右置止水孔若思歷庫部郎中常曰仕宦至郎中足矣右置止水一石明自足意水影五行志大曆末深州束鹿縣中有水影長七八尺遙望見人馬往來如在水中及至前則不見水澄綠水唐杜陽編滄州久視山下出澄綠水其泉一百步亦謂之流綠渠投之金石終不沉沒水發於深而為用且遠能不違於道可浮可載可飲可灌以濟於生物及其道而不防反為患矣韓愈擇言解漂沙漱壑漂沙坼岸去漱壑松柏禿杜甫水漲詩水搖寒山碧李白詩萬里蒼蒼煙水暮韓文輕浪參差魚動鏡同上漩石秋水灌盈漩石漂沙流蘗軒昂舞於盤渦逮及收潦澹如綠醹劉禹錫楚望賦水澹澹兮生煙李白夢遊天姥詩砉如隙光端如匣劍文粹陳寬穎亭記劈地而來砉如隙光端如匣劍視苦中面使人毛磔水之無聲風蕩之鳴韓愈送孟東野序寒水汪灣長煙荏苒杜牧賦水樂元子於山中尤所耽愛者有水樂水樂是南磳之懸水淙淙然聞之多久於耳尤便元次山水樂記辨水李德裕作相有奉使京口者李白金山下楊子江中陵水各置一壺其人忘之至石城立憶乃汲一瓶歸獻之李飲之曰此頗似建業石城下水其人謝過不敢隱出中朝故事聖水李德裕毫州浮屠詭言曰有水可愈疾號曰聖水清寫韓文柳山奇變其水清寫水蕩漾兮碧色李白惜餘春賦秘水茶錄唐秘書省中水最佳故水名秘水水遞芝田錄李德裕取惠山泉自京至常州置遞號水遞微波龍鱗莎草綠李白憶舊遊浮舟弄水蕭鼓鳴微波龍鱗莎草綠京都水脈通惠山李德裕任中書常飲常州惠山井泉自毗至京置遞鋪有僧詣謁德裕曰所謁相公者為相公通常州水脈京都一眼井與惠山寺泉脈相通德裕大笑真荒唐也僧曰相公但取此井水在昊天觀常住庫後是也德裕乃以惠山一罌昊天一罌雜以入瓶都十瓶暗記出處遣僧辨折僧因啜嘗取惠山寺與昊天餘八乃同味德裕大奇之當時停其遞人不告勞浮議弭芝田錄龍文遠水通平岸元積早春風驅鱗甲浪參差同上凡天下之水泉三億三萬三千五百一十有九唐六典水部凡天下之水泉三億三萬三千萬百一十有九其在遐蕪絕域殆不可得而知矣白大防大為之防小決子產曰防人猶川不如小決使導修利導達季春天子命有司曰時雨將降修利堤防導達溝瀆浚畎澮禹曰予修濬畎澮距川濬深也距至也深之以通至於川也防川障澤臺駘宣汾洮障大澤非竊壤可堙豈積灰能止事見救水門漲桃花之水三月桃花水至決瓠子之河漢武決瓠子河發卒數萬塞之自臨河令將軍已下皆負薪上悼功不成作瓠子歌羨溢漢書河決平原將塞之議者曰若堤不及冬成春來桃花水盛必羨溢有填於反壤之害也盡力溝洫禹鄭白之渠決渠降雨也金堤漢書河決酸棗壞金堤苟月令不行闕修利之備則時雨將降致昏墊之憂增卑陪薄溝洫志曰繕完故堤增卑陪薄匠人周禮匠人為溝洫大防外殺謂下厚上薄也止水禮曰夫禮之禁亂猶防之止水所自來也故以舊防為無用而壞之者必有水敗以舊禮為無所用而去之者必有亂患沉白馬見救水災門注都水晉書都水使者漢之水衡之職東都省都水置河堤使者移水道齊人延年上書可令水工開大河上嶺出之湖中東注之海關東長無水災上壯之然大禹所導恐難更改水勢王鳳曰水勢各異不博議利害來春桃花水盛必羨溢也善防水者使水淫之淫讀為廞謂水淤泥土留著助為之厚也地勢溝因水勢河因地勢竹落河堤使者王延年以竹落長四丈九尺圍盛以小石兩船夾載下之三十六日河堤成也開十二渠史記西門豹為鄴令鑿十二渠引河水灌田當時人苦役豹曰百歲後父老子孫思我至今得水利民富足漢長吏以十二渠橋絕馳道相近欲合二渠為一橋父老不肯曰賢君之法式不可改也龍首嚴熊臨晉民願穿洛以既重泉以東萬餘頃故惡地於是穿渠洛水至商嶺下岸岸崩往往為井井渠之生自此始穿渠得龍首骨故名龍首渠所在穿渠馬援所過郡縣為穿渠溉灌以利民賈侯渠魏賈逵字道梁為豫州通運渠二百里所謂賈侯渠水不流後漢王梁字君嚴為河南尹穿伊谷水注洛陽城下東寫鞏川及渠成開決而水不流有司劾之鄭國渠史記云韓患秦好興兵事欲罷之無令東伐乃使水工鄭國間說秦令鑿涇水自中山西抵瓠口為渠並北山東注洛三百里欲溉田中作而覺欲殺鄭國國曰始臣為間然渠成亦秦之利也為韓延數年之命為秦建萬代之功卒使就而田注四萬餘頃收皆畝一鍾於是關中為沃野無凶年秦以是富彊因命曰鄭國渠千金渠漢書張掖郡有千金渠浪蕩渠漢書地理志至滎陽浪蕩渠白渠漢書趙中大夫白公引涇水為渠見涇門注平虜魏祖以袁尚歸單于將征鑿渠自呼沱入汾水名平虜渠股引股支別引水也脈連六甫輔倪寬奏開六鋪之渠水以廣溉灌田也孔徹壅通堙杜亞拜淮南節度使至則治漕渠引湖陂築防庸入之渠中以通大舟夾堤高邛田因得溉灌疏啟道衢徹壅通堙人皆悅賴脩塞宗室皋遷荊南節度使初注陵東北傍溪有古障不治歲輒溢皋脩塞之廣溉道高士廉進益州長史秦時李冰導汶江水灌田瀕水者頃千金民相侵冒士廉附故渠廝引旁出以廣溉道人以富饒平虜渠姜師度為易州刺史並海鑿平虜渠以通餉路罷海運省功多強公渠強循累雍州司士參軍華原無泉人畜多渴死循教人渠水以浸田一方利之號強公渠樹堤自固蕭倣拜義成軍節度使滑州瀕河累歲水壞西北防仿徙其流遠去樹堤自固得以安築堤七百步李渤為虔州刺史治湖水築堤七百步使人不病涉築堤捍錢塘湖白居易遷為杭州刺史始築堤捍錢塘湖鍾洩其水溉田千頃鑿渠齊澣以淮至徐城險急鑿渠十八里入青水人便其漕興成李石奏咸陽令韓遼治興成當咸陽右十八里左直永豐倉秦漢故漕渠城起咸陽抵潼關三百里無車挽勞則轅下牛盡可耕永利秦中矣鑿贛石梗嶮以通舟道路應為虔州刺史鑿贛石梗嶮以通舟道鄭白二渠李棲筠關中舊仰鄭白二渠溉田而豪戚壅上游取磑利且百所奪農田十七棲筠請皆徹毀浚渠廝江流灌田為常州刺史歲仍旱編人死徙踵路棲筠為浚渠廝江流灌田遂大稔上築堤防楊凝亳州刺史缺董晉以凝行州事增墾田決汙堰築堤防水患訖息治河內秦渠崔引禮遷河陽節度使治河內秦渠溉田千頃開盲山故渠改天平節度使李同捷叛與李聽合師討之時徐泗節度使王智興檄兗海鄆曹淄青當徐道者出車五千乘轉粟饋軍引禮度道遠乃自兗開盲山故渠自黃隊抵青丘師人大濟鑿咸應永清二渠李景略拜豐州刺史天德軍曲受降城都防禦使鑿咸應永清二渠時其鍾洩高瑀領忠武節度使州比水旱無年瑀相地宜築堤庸百八十里時其鍾洩民賴不饑引渠溉塞下地李聽以功兼御史大夫夏綏銀宥節度使又徙靈鹽部有光祿渠久廞廢聽始復屯田以省轉餉即引渠溉塞下地千餘頃後賴其饒決翟王渠趙珝封天水郡公按鄂艾故跡決翟王渠溉稻以利農浚渠張志和縣令使浚渠執畚無忤色民歌薛大鼎累遷徙滄州刺史無隸渠久廞塞大鼎浚治屬之海商賈流行里民歌曰新溝通舟楫利屬滄海魚鹽至昔徙行今騁駟美哉薛公德旁被又疏長蘆漳衡三渠洩污潦水不為害度開漕渠黎干遷京兆尹京師苦樵薪乏干度開漕渠興南山谷口尾入於苑以便運載帝為御安福門觀之干審具船舡作倡優水嬉冀以媚帝久之渠不就疲生人之力洩天地之藏陳子昂上方近隋煬帝恃四海之富鑿渠決河目伊洛屬之楊州疲生人之力洩天地之藏中國之難起故身死人手宗廟為墟逆元氣之理也募民治堤五代安彥威徙鎮歸德是時河決滑州命彥威塞之彥威出私錢募民治堤巨渠決太古眾水為長蛇杜甫柴門袁家渴自西南行不能百步得石渠民橋其上有泉幽幽然而其鳴乍大乍細渠之廣或咫尺或倍尺其長可十步許其流抵大石伏出其下踰石而往有石泓菖蒲被之青鮮環周柳宗元石渠記堤喧蔟敗夫白居易詩增石為防柳宗元興州江運記增石為防膏我稻粱青渠一邑傳杜甫秦川龍口飄花金鑾密記曰翰林有龍口渠通內苑大雨之後必飄諸花蕊經由而出有百種香色名不可盡春月尤妙十石壚渠河中府龍門東南二十三里有十石壚渠二十三年縣令長孫恕鑿溉田良沃畝收十石見唐地理志白禹盡力乎溝洫溝洫亦渠也廣四尺深四尺曰溝洫倍溝匠人為溝洫地阞考工記曰凡溝洫逆地阞謂之不行注阞猶脈理也不行謂決溢也一日光深之凡溝防必一日先深之以傳眾力大封周禮大封之禮令眾也注謂正封彊溝塗也雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱獲溝瀆之利於民者秋令寒阱杜獲注害於國稼者謂水潦禽獸也蕩水以瀦蓄水以溝蕩水以防止水以列舍水以澮寫水水勢周禮凡溝必因水勢防必因地勢善溝者水漱之善防者水淫之注淫謂淤泥土助為厚周禮遂人凡治野夫間有遂逐廣深二尺遂上有徑徑容牛馬十夫有溝溝陪遂溝上有畛軫容大車百夫有洫洫陪溝洫上有塗塗容乘車一軌導達月令三月中氣後五日天子命有司修利堤防導達溝洫稍溝三十里而廣倍注謂不墾地之溝也鄭司農云稍讀為桑螵蛸之蛸謂水湍嚙溝也故三十里而廣倍蛸音消水庸禮曰祭防以水庸事也注云水庸溝也股引漢書見渠門注孔廝溝葪門姜師度為易州刺史始廝溝於葪門以限奚契丹通舟楫薛大鼎民歌曰新溝通舟楫利月明溝水曉韓愈詩溝濁萍青青君居泥溝上溝濁萍青青題張十八居詩溝塍耕钃歸溝塍送侯參謀詩木刀溝唐地理志定州新樂有木刀溝有民木刀居溝旁因名之為別詎幾時伊予墜溝洫元稹護溝瀆舊史于頔為湖州剌史因行縣至長安方山其下有水西湖南湖疏鑿溉田三十頃久堙廢頔命設堤塘以復之改蘇州剌史護溝瀆整路衢至今賴之一心穿地姜師度有巧思頗知溝洫之利歷易州剌史河北巡察兼度支營田使又為陝州刺史河中尹師度既好溝洫所在必發眾穿鑿雖時有不利而成功亦多先是太史令傳孝忠善占星緯時人謂之語曰傳孝忠兩眼看天姜師度一心穿地舊唐史漕十四白漢武穿漕入渭水運曰漕呼沱石臼後漢永平中治呼沱石曰河從都慮至羊腸沒溺不可筭都鄧訓監其事上言罷之更用驢輦歲省億萬計也翦木開漕虞詡為武都守先時運道糧艱澀僦五致一詡乃按行之自沮至下辯數千里燒石翦木開漕以人僦直於是水通零桂漕杜元凱開陽口起夏水達巴陵千餘里瀉長江之險通零桂之漕計戶轉漕漢將漕最十式為武皋令領城考課最底柱之漕番孫欲省底柱之漕樹柵立埭劉牢之守甄城兗州溉水道險澀用聞人爽謀堰石渠水樹柵立七埭為派擁二岸之流以利運漕租運朝宏家貧以租運自鄴褒斜道通漕漢時人上書言通褒斜道及漕事下張湯湯問其事言可行舡漕漢中之谷可致便於底柱之漕從之道果近而水湍石不可漕引渭為漕鄭當時言關東之漕從渭上渡六月罷而渭水道九百里時有難處請引漕穿渠起長安並南山下至二百里輕易漕度可令三月罷而渠下民田萬餘頃得溉此損漕省卒而益肥關中之地天子從之為大利便鐫底柱之隘陽焉上言河上下患底柱隘可鐫廣之上從之使焉鐫之裁沒水中不能復去而水益湍怒為害甚於故孔便宜發近海租賦崔仁師征遼東別知河南漕事仁師以漕路回遠恐所輸不時至以便宜發近海租賦餉軍之食舟水東漕崔湜建言山南可引舟水東漕至商州自商鑱山出石門抵北藍田可通挽道中宗以湜充使喜渠漕姜師度喜渠漕所至徭役紛紜不皆便然所就必為後世利矣鑿潭通漕韋堅為水陸運使初滻水銜苑左有望春樓堅於下鑿為潭以通漕二年而成帝為升樓詔群臣臨觀而咸陽灞滻太原永豐渭南諸倉節級轉運水通則舟行水淺寓於倉以待則舟無停留而物不耗失為歇艎支江船二千艘劉宴為歇艎支江船二千艘每船受十斛十舡為綱每綱三百人篙工五十人自楊州遣將部送至河陰上三門號上門填闕船米斗減錢九十調巴蜀襄漢麻枲竹筱為綯挽舟以朽索腐材伐薪物無棄者未十年人人習河陰險同上江船不入汴汴船不入河河船不入渭江南之運積楊州汴河之運積渭口渭船之運入太倉歲輸粟百一十萬石無斗升溺者同上後代控引淮海杜甫試進士策問後代控引淮海漕通涇渭固舟楫之利達倉庾之儲人賴此殷亦行之自久六門堰李頻遷武功令縣有六門堰者廞廢五百五十年方歲饑頻發宮癐庸民浚渠按故道廝水溉田谷以大稔憲宗嘉之賜緋魚減運錢數十萬齊澣遷潤州刺史州北距瓜步沙尾紆匯六十里舟多販溺澣徙漕路繇京口埭治伊婁渠以達楊子歲無覆舟減運錢數十萬新唐白樹柵立埭見上召伯埭謝安至新城築埭後人思之名曰召伯埭流菜堰晉傳祗為滎陽守造流菜堰至令兗豫無水患稅錢晉孔嚴彭視領尚書時王奕求東海鹽錢塘以水牛牽埭稅取錢直帝從之嚴諫乃止孔伊婁埭齊澣遷潤州州距瓜步沙尾紆匯六十里舟多敗溺澣徒漕路繇京口埭治伊婁渠以達楊子歲無覆舟減運錢數十萬又立伊婁埭官征其入招還流入五百戶溝渠堤堰決九河使宇文融檢校汴州剌史河南北溝渠堤堰決九河使壅渭為堰韋安為水陸運使漢有運渠起闕門西抵長安引山東租賦汔隋常治之堅為使乃占咸陽壅渭為堰絕灞滻而東注永豐倉下復與渭合置常豐堰李承遷淮西黜陟使奏置常豐堰於楚州以御海潮溉屯田塉鹵收常十倍它歲築堤閼以防不足洩有餘李吉甫為淮南節度使奏漕渠庳下不能居水乃築堤瘀以防不足洩有餘名曰平津堰脩復王起為山南東道節度使濱漢塘堰聯屬吏弗完治起至部先修復與民約為水令遂無凶年魯陽五堰楊行密孫孺圍行密宣州凡五月不解臺濛作魯陽五堰拖輕舸饋糧故行密兵不困立堰庸水不能暴賈敦頤徙瀛州剌史州瀕滹沱寇二水歲湓溢壞室戶浸洳數百里敦頤為立堰庸水不能暴百勝利之地沙塉不可蓺張守珪詔以瓜州為都督府守珪為都督州地沙塉不可蓺常瀦雪水溉田是時渠堤為虜毀材木無所出守珪密禱千神一昔水暴至大木數千障塞流下因取之修復堰防耕者如舊州人神之強弩射濤頭築捍海堰江濤夜衝擊沙岸板築不能就因命強弩數百以射濤頭又親祝胥山祠仍為詩一章亟淪置海門既而濤頭遂趍西陵乃運巨石盛以竹籠植巨材捍之城基始定其重濠累塹通衢廣陌亦由是而成焉吳武肅備史都水使者凡京畿之內渠堰陂池之壞沒則下之於所由而後修之唐六典白涉水子路問津是知津矣因河為津朝涉之脛揭厲淺則厲淺則揭跋涉山川利涉大川若涉大水其無津涯漸裳濡軌褰裳涉溱脫挽濟人子產方思憑河徒涉公無渡河崔豹古今注津吏霍子高見白首征天被髮提壺亂流而渡其姜止之不及遂溺死妻乃援箜篌作公無渡河之曲歌終亦投河而死佩劍過延平晉雷煥佩劍過延平津劍飛入水化為龍渡盟津書惟十有一年戊午師度孟津誰謂河廣一葦航之陳平渡河舟人疑有金玉平乃脫衣與剌舡自免楊柳津白馬津軍渡韓信擊魏陳舡欲渡臨晉而伏兵從夏陽以木罌缶渡軍虜魏王冰合王郎追世祖世祖南馳至呼沱候吏還曰河流澌無舡可渡官屬大恐令王霸元伯視之霸欲安眾還詐云河冰堅可渡眾喜遂前比至河冰亦合上令霸護渡未畢數車而冰解溺不弔禮死而不弔者三畏壓溺溺憑河也無悔暴虎憑河死而無悔公無渡河見上溺海銜石山海經精衛本赤帝之女游於東海溺而不反化為冤禽名曰精衛常銜西山之木石以填東海此鳥出發鳩山沉湘懷沙屈原既於臨淵有懷沙之志遂投湘江汨羅而死弔屈賈誼過汨羅乃為文弔屈原曰側聞先生兮自沉汨羅問諸水濱齊桓責楚曰昭王南征而不復寡人是問屈完曰昭王不復君其問諸水濱葬於魚腹楚辭屈原曰寧赴湘江葬於魚腹中嫂孟子曰嫂溺而援之以手權也嫂溺不援是豺狼也父女會稽錄曰曹娥父沒江其屍不獲乃沿江號哭七日不絕聲乃自投江三日抱父屍俱出皆死家人收葬之立孝女碑即黃絹之碑也車鄭伯之車僨於濟遇大風飄之入濟也舟水所以載舟亦所以覆舟必笑傳曰溺人必笑善游文子曰善游者溺也抱石韓詩曰申屠挾恨其時抱石投河而沉死浮屍沉骸辨命論曰伍員浮屍於江流三閭沉於湘渚禁川游者備沉溺也周禮水禁水中害人之處則禁舟而不游禮忘子產之誡既聞狎而玩之子產曰水懦弱人狎而玩之棄仲尼之言果見蹈而死者孔子曰水火吾見蹈而死者未見蹈仁而死也惡夢王延壽文考曾有惡夢惡之乃作敘夢賦以自厲後溺水而死試船沒魏杜敬伯侯為僕射受詔作御樓船於陶河試船遇漂沒帝為流涕落水陸士龍常著縗絰上舡於水中顧其影因大笑落水人救免溺孔沉淵隕命柳宗元作賦自儆曰將沉淵而隕命兮詎蔽罪而塞禍競渡杜亞拜淮南節度使方春南民為競渡戲亞欲輕駃乃髹舡底使篙人衣沺綵衣沒水不濡夜濟合流王沛兼御史中丞李光顏討吳元濟奇沛風概署行營兵馬使時詔書趣戰諸將觀望不敢渡殷以壁沛引兵五千夜濟合流扼賊沖遂城以居蒲津李固言領河中節度使蒲津歲河水壞梁史撤笮用舟邀丐行人固言至悉除之自投蔡廷玉至靈寶自投於河津筏開張篋中寶自可得津筏韓北遊詩盟津旋走不及停假道經盟津此日足可惜通津浮游靡定處偶往即通津送惠師回首過津口而多楓樹林杜甫詩瀲綠古津遠杜牧遊石盎詩舟航所聚崔融稅關市疏天下諸津舟航所聚旁通巴漢前指閩越七澤十藪三江五湖探引河洛兼包淮海弘舸巨艦千舳萬艘交貿往還憧憧永日水部大津無梁皆給船人量其大小難易以定其差唐六典水部渡水並須近江白丁便水者充分為五番別一替唐六典同上白天池莊子南溟者天池也地紀地以四海為紀文選百谷王善下老子曰江海所以能為百谷王者其善下也大盈大盈若沖文於曰大滿而小溢重潤海重潤太平之慶家千里潤公羊傳曰海千里潤注雲海出雲雨及千里也朝宗詩沔彼流水朝宗於海書曰江漢朝宗於海委輸海賦曰於廓靈海長為委輸積流孫卿子不積細流無以成海受露海受露霧故能成其深海若海神名天吳水伯名滄溟渤澥滄波浮天之浪浴日之波變桑田神仙傳曰東海凡三變為桑田山海自三神山蓬萊瀛洲方丈橋秦始皇驅石為橋望東海日出處見石門神鞭注樓蜃氣結樓臺蠡酌以蠡酌海桴浮子曰道不行乘桴浮於海吞江納漢百川會同潮海博物志漢使驃騎將軍北伐單于至潮海而還鰍入穴水經曰鰍魚長數千里穴居海底鰍入穴則潮上出穴則潮退出入有節故潮水有期白露之濤朝夕之池潮有朝夕之期故吳都有朝夕之池帷蓋潮有似陣車蓋之狀觀孟子曰觀於海者難為水遊於聖人之門者難為言幼海山海經無皋之南望幼海郭璞注曰幼即少也填東海見溺門注天臺又曰大荒中有山名天臺海水入焉地動莊子曰海水三歲一周流波相薄故地動不讓淮南子曰海不讓水積以成其大大波韓詩外傳曰成王時越裳氏重三譯而朝曰吾受命國之黃髮曰久矣天之不迅風雨海之不波溢也三年於茲矣意者中國有聖人盍去朝之倏忽渾沌莊子曰南海之帝為儵北洋之帝為忽中央之帝為渾沌儵與忽相與過於渾沌待之甚厚儵與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿一竅七日而渾沌死呵水神謝承後漢書汝南陳茂嘗為交趾別駕剌史周敞涉海遇風舡欲覆沒茂拔劍呵罵水神風即息自悔首周景式孝子傳曰管寧避地遼東過海遇風船人危懼皆叩頭悔過寧自思咎念失言嘗如廁不冠即便悔言風亦尋靜東海之鱉謂埳井之蛙曰夫千里之遠足以舉其大千仞之高不足以極其深莊子不益不損莊子曰禹之時九年水潦而水不加益湯之時八年七旱而理不加損夫不為頃久推移不以多少進退者此亦東海之大樂也碧海十洲記曰扶桑在碧海之中地一面萬里太帝之宮太真東王君所治處結水見冰門慕容蹈海注晦釋名海者晦也主引穢濁其水黑而晦四海十戎六蠻九夷八狄形類不同總而言謂之四海言皆近於海東海滄海溟海員海瀛海幼海漲海西海類海潮海蒲昌海西域傳蒲昌海一名疆澤島嶼海中山曰島海中洲曰嶼後海禮曰三王之祭川也皆先河而後海靈胥濤神也伍子胥沉屍於江其精魄為濤之神沸騰百川回復萬里吳都賦潮波洲起沸騰百川八月之觀八月觀濤文選滄波白波洪波奔波淥波波如連山選左海禮曰洗之在阼其水在洗東祖天地之左海也不積小流孫卿子曰不積跬步無以至千里不積小流無以成河海也上應天河見天河仙查注涉海則有方丈蓬萊鯷音啼壑鵬溟孔涉青海李大亮討吐谷渾為河東道行軍摠管與李靖俱出北道涉青海觀河源涉海陸元方武后時使嶺外方涉海風濤驚壯舟人懼元方曰吾受命不私神豈害我趣使濟而風訖息海道風濤歸崇敬大曆初充弔祭冊立新羅使海道風濤舟幾壞漲海連天韓愈既至潮以表哀謝曰臣所領州在廣府極東過海口下惡水濤瀧壯猛難計期程颶風鱷魚患禍不測臣州南近界漲海連天甘棠港王審知招蠻夷商賈海上黃崎波濤為阻一夕風雨雷電震擊開以為港閩人以為審知德政所致號為甘棠港度海王勃父福畤繇雍州同功參軍坐勃故左遷交趾令勃往省度海溺水痵而卒濱海有魚鹽利程日華朱淊王武俊招日華不納日華棄城自固參軍李宇謀曰今州十縣濱海有魚鹽利此軍本號橫海將軍能絕易定歸天子自為一州可亢盜喉襟驚瀾韓愈寄于頔書窺巨海之驚瀾莫不戰悼悸慄眩惑而自失為物最鉅南海神廟碑海於天地間為物最鉅塵霾之雜不處柳宗元東海若今夫大海其東無東其北無北其南無南旦則浴日而西之夜則淊列星涵太陰揚陰火珠寶之光以明其塵霾之雜不處也必洎之西澨故其大也深也潔也光明也無我若者紫海唐杜陽編南昌國有紫海水色如爛椹可以染衣其龍魚龜鱉砂石草木無不紫多風波之患段希堯使於吳越是時江淮不通凡使吳越者皆泛海而多風波之患希堯過海遭大風左右皆恐懼希堯曰吾平生不欺汝等恃吾可無恐也已而風亦止五代史海影翻諮議朱景玄見鮑容說陳司徒在楊州時東市塔影忽倒老人言海影翻則如此出酉陽雜俎海眼唐金華子北海縣因發地得五銖錢取之不盡中得一石記云此是海眼以錢鎮之眾懼復掩波伏不興韓愈南海廟詩求觀眾流細必泛滄溟深孟先生詩四海之水皆立杜甫大禮賦九天之雲下垂四海之水皆立為王天寶十載始封四海神為王南部新書熱海地寒不凍西域碎葉東積流橫地紀疏派引天潢唐太宗海詩高駢開海路交趾以北距南海有水路多覆巨舟高駢往視之乃有橫石隱然在水中因奏以開鑿道海之利云人操利揖石限橫津纔登一去之舟便作九泉之計時有詔聽之乃召工者啖以厚利竟去其石民至今賴之北書嗩言極雲海之微茫試登高而望遠極雲海之微茫李白惜餘春賦泥滓不能濁澄波非益清韋應物贈盧嵩詩雲物不隱像三山共分明柰何疾風若基柱傾海水雖無心洪濤亦相驚同上大海蕩汨兮顛側日月柳宗元招海賈大海蕩汨兮顛倒日月龍魚傾側兮神怪隳突蒼茫無形兮往來遽卒陰陽開闔兮氣霧滃渤投之必沉負羽無力弱水縮畜其下不極投之必沉負羽無力鯨鯢疑畏淫淫嶷嶷同上頹風浩其西起柳宗元佩韋賦橫萬里而極海兮頹風浩其四起長風扇海踴滄溟之波濤李白鳴皋詩浪打天門橫江詞海神來過惡風回浪打天門石壁開同上遙望齊州九點煙一泓海水杯中瀉李賀夢天浪作禽填海杜甫詩江長注海奔奉漢中王潮海蹴吳天秋日旅懷還浮入海船李白詩海水不可解連江夜為潮同上碧海闊逾澄杜甫寄劉峽州海之歸水洪涓必容陸贄論諫穹龜長魚踴躍後先闔廟旋艫祥飆送飄旗纛旌麾飛楊晻藹鐃鼓朝轟高管噭噪武夫奮棹二師唱和穹龜長魚踴躍後先乾端坤倪軒豁呈霧白波連山倒蓬壺李白詩古來海寒多天風白波連山倒蓬壺長鯨噴湧不可涉無心茫茫淚如珠海雲生橫江詞橫江館前津吏迎向余東指海雲生同上海鯨東蹙百川回月暈天風霧不開海鯨東蹙百川回同上謂言掛席渡滄海卻來應是無長風同上沿河而韓文沿河而下苟不止雖有遲疾必至於海斷港絕潢道於楊墨老莊佛之學而欲之聖人之道猶航斷港絕潢以望至於海也海波不驚文粹開元太平海波不驚白大河洪河長河中河靈源長源出崑崙山海經河源出崑崙之山導河積石禹導河積石至於龍門九曲河出崑崙千里一曲九曲入海一清黃河千年一清而聖人生三門水經曰禹鑿砥柱以通河水為三門九折淮南子曰河水九折桃花水溝洫志河決而桃花水漾溢注云三月水漲名水箭流慎子曰河下龍門流駃竹箭駟馬追之不及洋洋活活河水洋洋比流活活詩渾渾濁河九里之潤河潤九里四瀆之宗穆天子傳河者四瀆之所宗積水成淵安流見楚辭大禹鑿石柱見三門注巨靈擘華山見華山門注俟清傳曰俟河之清人壽幾河清遲憂涸文子曰以數集之壽憂天下之亂憂河水之涸泣而益之注集年也止濁阿膠五寸不能止黃河之濁投韓詩申屠狄非其時抱石投河而死入語鼓方叔入於河如帶漢祖誓曰黃河如帶葦航誰謂河廣一葦航之上應絳河援神契黃河者水之伯上應天河中貫清濟清濟貫黃河者截流而不混決漢文帝時決酸棗潰金堤史記元光中孝武決瓠子於是天子臨河沉白馬王璧令群臣從官自將軍以下皆負薪填河而取淇園之竹以為捷天子既臨河決掉功之不成乃作瓠子歌移河齊人延年上書請令水工開大河上嶺出之湖中東注之海關東無水災北邊無匈奴憂上壯之然大禹所導恐難更改之溢谷永以為河中國之經瀆聖人興出圖書王道廢則竭絕今潰溢橫流異之大者宜修政以應之又李尋解光自江河滿溢所謂水不潤下明天道有因而作今由其自決且勿塞以觀水勢河欲居之當稍自成川跳出沙土然順天心圖之必有成功用財力寡經瀆經常也見上注下流說文云河者下也隨地下流而通也按水經云陽紆山陵門山山海經曰並在河之中作臺詩曰新臺剌衛宣公也納伋之妻作新臺於河上國人惡之而作是詩新臺有泚河水彌彌柏舟詩泛彼柏舟在彼中河弗祭左傳楚昭王有疾卜河為祟大夫請祭之王弗祭不流谷梁傳曰梁山崩壅遏河三日不流晉君召伯宗而問焉宗伯來遇輦者問焉輦者曰君視素縞帥群臣而哭之既而祠焉斯流矣宗伯至君問之伯宗如其言而河流矣左傳亦云水伯孝經援神契曰河者水之伯上應天河禹功呂氏春秋曰古者龍門未開呂梁未發出門大溢逆流名曰洪水禹乃決江疏河為彭灃之障所活者萬八千國乃禹之功德水呂氏春秋曰秦滅六國自以為獲水德之瑞遂改河名之德水委地淮南子曰河以委地故能遠也通天見上色黃物理論曰河色黃赤象川之流蓋濁也百里不曲又曰河百里不曲十里一曲色白爾雅河出崑崙虛色白灉又曰水自河出為灉西南流山海經曰積石山其下有石門河水為以西南流九河楚辭曰與遊兮九河沖風起兮水揚波塞朱浮與彭寵書曰亦猶河濱之人捧土以塞盟津四瀆視諸侯禮四瀆爾雅江河淮濟為四瀆四瀆者發源注海者也祥瑞馬圖禮曰河出馬圖言龍馬負圖開奧河洛開奧符命用出圖書之泉見文選魚河圖曰黃帝云余夢見兩龍授圖乃齋往河洛而求之有大魚溯流而上魚泛白圖黃帝跪而受之龍運斗樞曰舜與諸侯觀洛河有黃龍負圖出置帝前䠠入水去也䠠音制繩玉檢河圖曰黃龍既負圖置帝前以黃玉為檢黃金為繩昊天符璽也見一清於千年運命論曰黃河清聖人出拾遺記曰河千年一清聖王之大瑞變五色於三日易乾鑿度曰帝王將起河水先清清變白白變赤赤變黑黑變黃各二日也榮光休氣中候曰榮光出河休氣四塞榮光即五色出圖子曰河不出圖吾已矣夫沉祭白馬漢書河決瓠子帝親臨決河沉白馬玉璧玄貉穆天子傳天子西狩獵獲白狐玄貉以祭於河寶珪傳曰王子朝以成周之寶珪沉於河津人得之河上自浮水出將賣之則為石白璧河圖趙王政以白璧沉於河先河後海禮曰三王之祭川也皆先河而後海此之謂務本言海之本源自河決塞大溢文子曰河江之大溢不過三日瓠子之決見河門注桃花之水漢成時河決平原使王延世治之杜欽曰延世慮害不深若使不及今冬成來春桃花水盛必漾溢有填游反壤之害注云春日桃花之水竹箭之流見上金堤之壞見堤渠門注大防河決大為之防遠績禹功大庇人乎備其漾溢見上修以堤防宜興修利之功月令季春修利堤防以為昏墊之備防其洊至誠合僝功苟非子來則難興力負薪見上賞漢武帝河決館陶上使王延世塞之三十六日河堤成遂為河平元年上曰延世長於計策功貴約省朕甚嘉之乃賜爵關內侯及黃金百斤決溢見漢書上策中策下策漢書賈誼奏言治河者有上中下三策若徙其當水沖之人以避之放河使北入海氾濫期月自定不勞人力此功一立河定人安千載無患謂之上策若穿漕渠使人得以溉田雖非聖人法然亦救時術也今據堅地作石堤東西水門但用木以土耳旱則開東方水門以溉田水則開西方高門以分河北誠富國安人興利除害謂之中策苟繕完故堤增卑陪原勞費無已數逢此害謂最下策孔疏道薛平授鄭滑節度使始河溢瓠子東泛滑距城纔二里所平按求故道出黎陽西南乃籍民田所當者易以它地疏道二十里以釃水悍歸壖田七百頃於河南自是滑人無患河溢馬遂還河陽秋大雨河溢軍吏請具舟以避遂曰使城中盡魚而吾獨完其家吾不忍既而水不為害度河還家王績聚徒河汾間欲見兄弟輒度河還家黃流韓愈賦過潼關而坐息窺黃流之奔猛它水並注則濁吐蕃列傳虜曰悶摩黎山東距長安五千里河源其間流澄緩下稍合眾流色赤行益遠它水並注則濁故世舉謂西戎地曰河湟入於天淵柳宗元晉問其河則浚崑崙入於天淵滔滔河流劉鄩諸將皆欲戰鄩乃悉召諸將坐之軍門人以河水一杯飲之諸將莫測或飲或辭鄩曰一杯飲之猶難若此滔滔河流可盡乎諸將皆失色代宗歎唐蘇鶚杜陽雜編曰代宗廣德元年吐蕃犯便橋上幸陝及回潼關上歎曰河水洋洋送朕東去盤渦轂轉黃河萬里觸山動盤渦轂轉秦地雷榮光休氣汾五彩千年一清聖人在李白雲臺歌隰州黃河清五代朱梁紀清如井水乾元二年七月嵐州合河關河三十里清如井水四日而變出唐史清澄徹見底寶應九年九月甲午同州至陝州二百餘里河清澄徹見底同上永徽五年六月濟州河清同上漢使黃河遠送蔡希魯杜甫
