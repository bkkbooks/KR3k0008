body:
  text: 卷第四十七白如可贖兮詩虞典曰金作贖刑誤入刑者以金贖罪周穆王訓夏贖刑訓暢夏禹贖刑之法更從輕以布告天下百鍰鍰黃鐵也六兩曰鍰罪贖以百鍰重倍加至予鍰也免於刑戮納贖選罰金張釋之為廷尉文帝出中渭橋有人從橋下走出乘輿馬驚釋之奏此人犯蹕當罰金上怒釋之對曰法者天下公共不可一傾云云以功贖後漢竇憲字伯度有罪請誅匈奴以自贖乃拜車騎將軍有功遂勒銘燕然山訓夏之刑贖子罪漢丞相公孫賀請捕朱安世以贖子罪子敬聲也西京賦曰丞相欲以贖子罪云云贖入罪前漢史太倉令淳于公犯法當刑幼女緹縈上書曰妾於為吏齊中皆稱廉乎今坐法當刑妾傷夫死者不可生刑者不可續雖欲改過自新其道無由妾願沒入為官婢以贖父刑文帝哀憐之乃下詔除肉刑千鍰贖大辟死罪周禮職金掌金罰貨罰入于司兵以金以貨贖罪者也入於司兵以給兵及工直也庇族亢身以貨藩身論贖刑放于寵五罰之疑有赦五罰出金贖罪輕重諸罰有權入粟贖罪漢張敞言國兵在外穀度不足願今有罪非盜受財殺人犯法不得赦者得以差入穀蕭望之李彊議曰粟以贖罪則富者得生貧者獨死是貧富異刑而法不一人情貧窮而父囚執聞出財可以生活則不顧死亡之患為敗亂之行以趨財利救親戚一人得生十人已喪此則伯夷之行壞公綽之名滅政教一傾恐不能復竟不施敞議請除贖罪之法貢禹上書買爵惠紀人有罪得買爵三十級以免死罪應劭云若今人三十縑贖罪師古曰令出買爵錢以贖罪也減死罪一等武帝令死罪人贖錢五十萬減云云出縑續漢書建武初令天下系囚減罪一等出縑贖罪輕重有差兵甲贖管子曰管仲令齊桓公制重罪贖以犀甲一戟輕罪楯一戟注云謂征伐不足也義錢後漢虞詡為僕射時長安聽百姓謫罰者輸贖號義錢託為貧人儲而守令因以聚歛詡上疏論之詔下切責州縣也入縑後漢明帝詔亡命者自殊死已下贖死罪縑三十匹右趾至髡鉗城旦春十匹城旦至司寇五匹未發自告半入贖請奴為奴贖父罪晉殿中帳吏部施廣盜官幔三張合三十匹棄市廣二子宗年十三雲十一撾登聞鼓求為官奴以贖父罪尚書郎朱映議曰宜特聽左丞范堅駁曰以殺止殺小不忍輕刑典人之愛父誰不如此為施恩於今聞殺於後遂正廣刑左驂之贖史越石父賢在縲紬之中晏子見而解右驂贖之贖罪一孔願伏斧鑕以贖昶罪閩王昶晉高祖怒其不遜下詔暴其罪歸其貢物不納兵部員外郎李知損上書請籍沒其物而禁錮使者於是以元弼下獄獄具引見元弼俯伏曰昶夷貊之君不知禮義陛下方示大信以來遠人臣將命無狀願伏斧鑕以贖昶罪高祖乃赦元弼遣歸夜論世事宇文士及化及敗與封倫等自歸帝讓之曰汝兄弟率思歸之人為入關計爾時得我父子尚肯相假乎今欲何地自處士及謝曰臣罪當死但臣往在涿郡嘗與陛下夜論世事頃又奉所獻冀以此贖罪罰錢王緯字文卿浙西觀察使缺遣之初州縣有韓滉罰錢未入者十八萬緡府史請裒為進奉緯上疏願蠲以紓民詔聽之議請減贖唐史刑法志隋有議請減贖當免之法唐皆因之盜請格虎自贖元德秀字紫芝為魯山令有盜繫獄會虎為暴盜請格虎自贖許之明日盜尸虎還與縣嗟歎請以官爵贖王忠嗣數上言祿山且亂李林甫益惡之陰使人誣告忠嗣嘗養宮中云吾欲奉太子帝怒召入付三司訊驗罪應死哥舒翰方有寵白上請以官爵贖忠嗣罪帝意解推父蔭贖金裴潾再遷刑部郎中前率府倉曹參軍曲元衡杖民柏公成母死有司以死在辜外推元衡父蔭贖金公成受財不訴以赦免潾議曰杖捶者官得施所部非所部雖有罪必請有司明不可擅也元衡非在官公成母非所部不可以蔭免公成取賄仇家利母之死逆天性當伏誅有詔元衡流公成論死本傳凡贖罪以銅唐六典白國章斯抵宜守限於申嚴人命所懸豈忘情於審慎況刑將不變獄貴惟精月令仲春天子命有司省囹圄省減也去桎梏無肆掠掠拷捶也肆暴屍也止獄訟孟夏挺重囚夏寬也至秋方決出輕繫出而舍之要囚伏念五六日至于旬時要囚察其辭要也君子以明慎用刑而不留獄易旅卦雖緩死以過時未盡善也比失刑於欲速不猶愈乎輟丹筆君子以議獄緩死易中孚卦緩刑周禮容姦禮利淫淹恤過時亦宜問罪稽留有故亦可徵辭若審慎而無他雖愆期而可恕將蔽罪之有程敢忘慎守未得情而難斷寧免稽遲當斷不斷孔不時決殷侑初鹽鐵度支使屬官悉得以罪人繫在所獄或私置牢院而州縣不聞知歲千百數不時決侑奏許州縣紏列所繫申本道觀察使並具獄上聞許之恤獄緩死唐文粹韋嗣立論刑法多濫疏雖陛下仁慈哀念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實犯雖欲寬捨其如法何留獄三白月令仲秋命有司申嚴百刑無留有罪既非伏念之勤宜及過時之責雖事無欲速而法有勾稽而不留獄易見上淹恤過時則宜問罪稽留有故亦可徵辭若審慎而無他雖愆期而可恕雖蔽罪之有程敢忘慎守未得情而難斷寧免稽遲若逾伏念之時淹恤不紏則恐舞文之吏因緣長姦雖要囚惟恤而折獄有程既察情而得情何當斷而不斷違限之紏慢官之科聽訟之要辭既易於二三伏念之期日遂踰於五六孔歲千百數不時決見上門蔽獄文粹李德裕上尊號冊文遠無蔽獄滋豐陸宣公奉天赦大道既隱蔽獄滋豐牢械充滿宋璟京兆人權梁山謀逆敕河南尹王怡馳傳往按牢械充滿久未決乃命璟為京留守復其獄初梁山詭稱婚集多假貸吏並坐貸人璟曰婚禮借索大同而狂謀率然非所防意使知而不假是與為反弗知何罪之云子縱數百人督鄧琬負米唐扶字雲翔大和五年為山南宣撫使內鄉倉督鄧琬負度支漕米七千斛吏責償之繫其父子至孫凡二十八年九人死於獄扶奏申釋之詔切責鹽鐵度支二使天下監院償逋繫三年以上者皆原更三赦不得原白居易字樂天度支有囚繫閿鄉獄更三赦不得原又奏言父死縶其子夫久系妻嫁債無償期禁無休日請一切免之奏凡十餘上益知名疑獄四白記曰疑獄汜與眾共之眾疑赦之疑事無質質成也疑則捨之不可成也狐疑宣尼之聽訟辭不獨見也史記孔子在位聽訟辭有可與人共者不獨有也漢景之恤疑獄亦命讞之漢景詔曰獄疑者輒讞罪疑惟輕舜典周書曰五罰之疑有赦罰贖刑罪也刑疑赦從罰罰疑赦從免言重疑也似是而非禮有指無簡不聽簡誠也雖有其意無其誠者不論以為罪闕疑緩死移讞讞疑罪疑刑放得情猶合哀矜疑事誠宜開釋諸疑獄雖文致於法而於人心不厭者輒讞之景帝詔吏不能決高詔御史獄之疑者吏不能決使有罪者久而不論無罪者久繫而不決自今縣道官獄疑者各讞屬所二千石官二千石官以罪名當報之注當處也某所不能決者移廷尉廷尉亦報之廷尉不能決者具奏平亭疑法史張湯決獄欲傳古義乃請博士弟子治尚書春秋補廷尉史平亭疑法注亭均也奏疑讞事必先奏上分別其原上所是受而著讞法廷尉挈令注云著謂明書之挈者獄訟之要也書於讞法挈令以為後代式雖國令是干罰官無小而人心未厭事合從輕孔四方疑獄悉令按訊崔善為仕隋調文林郎督工徒五百營仁壽宮總監楊素索簿閱實善為執板暗唱無一差謬素大驚自是四方有疑獄悉令按訊皆究其情擒盜韓思彥字英遠使并州方賊殺人主名不立醉胡懷刀而汙訊掠已服思彥疑之晨集童兒數百暮出之如是者三因問兒出亦有問者乎皆曰有之乃物色推訊遂擒真盜辨處契要無不盡杜佑補剡縣丞嘗過潤州刺史韋元甫以故人子待之不加禮它日元甫有疑獄不能決式訊佑佑為辨處契要無不盡元甫奇之署司法參軍積歲疑留權德輿歧公遺愛碑盈庭闢辯積歲疑留者片言以聽斷含冤自誣具獄論殺者覆視而全活訊不承成汭頗知吏治嘗錄囚盡其情墊江賊陰殺令其主簿疑小史導之訊不承臨刑曰我且訟地下踰月吏暴死汭聞益詳於獄唐史疑其冤縱不治崔從字子乂攝守邛州前刺史有以盜繫獄辭已具從疑其冤縱不治俄得真盜疑獄劇事多與參裁韋思謙高宗賢之疑獄劇事多與參裁罪涉疑似必誅韓滉贓賄五白六贓賄賂公行予取予求賄賂並行政以賄成王叔之相也政以賄成而刑放于寵黷貨傳晉有羊舌鮒者黷貨無厭亦將及矣獻子辭梗陽之賂傳梗陽人有獄以女樂遺魏獻子獻子將受之閻沒女寬當食三歡諫而止叔魚鬻邢侯之獄叔魚納雍子之女蔽罪邢侯叔向曰鮒也鬻獄以黷賄賂而煩刑書貪以敗官為墨既求私貨宜正官刑情因利動遽聞雍子之求政以賄成遂受梗陽之賂臨財苟得且不懼於四知黔貨無厭又何逃於三尺相賂以貨受悖之貨禮私求公坐私欲養求不給則應傳刑放貨聞不思絜已曾是徇財受官屬財物景詔左遷徒免罷受故官屬所將監治送財物奪爵為士任免之注奪爵為士又免其官職若今之除名從仕卒之位景詔無爵者罰金二斤沒人所受有能捕告卑其受贓加賞漢武時張武受金加賞賜以媿其心私附益丞相司直繁延壽奏御史大夫蕭望之賣買私所附益十萬三千注云以私錢增益也受飲食景詔吏受所監臨飲食免重受贓物賤買貴賣論輕更議著令廷尉與丞相議曰吏及諸有秩皆受其官屬所監臨治所將其與飲食計償費勿論注云計所齎償價直也他物若買故賤賣故貴皆坐贓為盜沒入縣官也禁錮漢文時貴廉絜賤貪污賣人贅婿及吏坐贓皆禁錮不得為吏賞善懲惡自條其姦贓應記薛宣為馮翊高陵令楊湛貪猾宣手自牒書條其姦贓與湛湛自知贓應記解印綬為記謝注云應記為與宣書相當妻受錢薛宣符為池陽令舉獄掾王昱府未召妻受繫者錢椽不知悲慚自殺宣移書書掾之柩以顯其魂也銖兩之姦趙廣漢字子都所在吏取銖兩之姦皆知之陳咸為少府鉤發姦贓沒入辜搉財辜罪也搉專固財也鉤音遘主守盜十金棄市丞相翟方進云云盜收外國財物陳湯盜收康居財物戒官屬曰絕域不覆校丞相匡衡奏雖在赦不宜處位坐免古者大臣坐不廉而廢曰簠簋不飾尚遷就之諱也賈誼曰貨賂上流公孫賀謝錢弘農守張匡坐贓報陳湯為訟罪得踰冬月許謝錢二百萬懷慚自殺後漢皇甫嵩義真為冀州牧車騎將軍吏有受賂嵩更以財物賜之吏懷慚自殺米肉卓茂為密令人有言吏受其米肉者茂曰汝自以恩意遺之吏不當以威力彊取爾禁錮二世清河相叔孫光坐贓禁錮二世居延都尉犯贓楊震等議光比劉愷以春秋惡止其身禁子孫非詳刑之意封記還鍾離意為郡督郵縣亭長有受人酒禮郡下法記治之意封記曰政化自近及遠宜先清府內闊略遠縣微細之愆太守賢之任以政事酒食為贓王吉為沛相有微過酒食為贓者雖十年猶加貶棄注其名籍也不以贓杖鞠人袁安邵公為河南尹政號嚴明未嘗以贓杖鞠人嘗曰錮人於聖世尹不忍聞者感激京師肅然諫兄鄭均兄為吏受人禮遺均諫不從均傭歲余得錢帛與兄曰物盡可復得為吏坐贓終身棄之兄感之遂為廉吏也減死遷徙魏侍中許允擅用罰錢賜減死遷徙祠發贏錢陶謙字恭祖為舒令郡守張盤搆有錢簿謙在官清白唯祠遷星有贏錢五百欲以為贓謙委於官而去也子坐贓免官晉劉寔子夏以貪污棄於世寔坐夏受賂免官或譏寔不訓子寔曰吾之所行是所聞見不相祖習豈教訓得乎世以寔為言當子受財不累高光為廷尉子韜字子遠放佚無檢受財有司案之光不知時人曰雖非光不能防其子以其用心有素不以為累也撻子庾冰為車騎將軍清慎常以儉約自居中子襲貸官絹十四冰撻之市絹還其官受傢具王述字懷祖求試宛陵令受傢具一千三百條王導使謂曰名父之子不患無祿屈居小縣不宜爾荅曰當自止後居州郡清廉絕偷祿賜皆散之親故宅宇不革於昔清既謝於冰壺罪何逃於霜簡貪泉之戒靡聞廣州有貪泉飲之者則貪濁晉吳隱之為刺史飲之曰夷齊當不易心如水之心遂爽鄭崇曰臣門如市臣心如水言清也還珠懷璧乾沒張湯為小吏乾沒與長安富賈田魚翁叔交私注云乾沒射也得利為乾失利為沒漁奪蚌侵贓物出賜後漢北地太守廖信坐貪穢下獄入財產顯宗以班諸廉吏唯周澤孫堪常仲特蒙賜與京師翕然在位者咸自刻勵受賜贓委地交趾太守坐贓伏法資財簿入司農顯宗班賜群臣鍾離意得珠璣悉以委地不拜帝怪之對曰孔子忍渴於盜泉曾參回車於勝母惡其名也此贓穢之物誠不敢拜帝曰清乎尚書之言更以庫錢三十萬賜意意字子何知而不納南郡太守劉肇遺王戎筒中細布五十端司隸紏之以知而不納不坐帝曰戎豈懷私不欲異爾然為清慎所鄙高名不劾孫盛安國為長沙守頗營資產從事至郡察其名高不劾調發食物陳咸子康為太守調發屬所生食物以自奉養然操下令自斂遠郡犯贓晉李重茂魯奏鬱林守介登役使監臨苟凱以遠郡非人情所樂法謂貶秩居官守重奏恐庸才負遠黷貨奴取蒿免官謝鯤不忌無厭無所畏忌貪惏孔姦贓狼藉張易之元忠說皆被逐其後易之等益自肆姦贓狼藉發贓宗室巨兼河南尹其犯即張皇后從女弟宗正卿李遵素私張發巨贓事貶遂州刺史縱吏取工徒贓崔元略博州人京兆劉栖楚劾元略前造東渭橋縱吏增估物不償直取二徒贓二萬緡詔奪一月俸剔抉其贓楊於陵為嶺南節度使監軍許遂振者悍戾貪肆憚於陵不敢撓以私則為飛語聞京師憲宗不能無惑有詔罷歸遂振領留事笞吏剔抉其贓吏呼曰楊公尚拒他方賂遺肯私官錢耶宰相裴垍亦為帝別白言之金床瑟瑟枕盧簡辭字子策遷侍御史福建鹽鐵院官盧昂坐贓簡辭窮按乃得金床瑟瑟枕大如斗敬宗曰禁中無此昂為吏可知矣贓六百萬楊虞卿字師皋改禮部員外郎進吏部會曹史有李賨等鬻偽告調官六十五員贓六百萬以上虞卿發其姦李賨等繫御史府而虞卿親吏嘗受二百萬亡命私奴受三十萬虞卿縛奴送獄虞卿坐不檢下免官市羅貢奉李邕字泰和貶遵化尉妻溫復為邕請戍滬自贖曰邕初被訊吏迫邕手書貸人蚕種以為枉法市羅貢奉指為姦贓丐乞贓李朝隱字光國入為大理卿武彊令裴景仙丐贓五千匹亡命帝怒詔殺之朝隱曰景仙其先寂有國功載初時家為酷吏所破誅夷略盡而景仙獨存且承嫡於法當請又丐乞贓無死比籍當死坐猶將宥之使私廟之祀無餒魂可也帝不許固請有詔決杖百流嶺南以厚賂謝中人嚴綬加淮西招撫使綬引師壓賊境多出金帛賞士以厚賂謝中人招聲援非賄謝不與官崔祐甫改中書侍郎元載用事非賄謝不與官及祐甫推至公以行賕賂狼籍楊炎字公南其子弘業賕賂狼籍盧杞引嚴郢為御史大夫按之受賕二十萬緡孔戣字君嚴中人劉希光受賕二十萬緡抵死謝錢李義府遣子津召長孫延謂曰吾為子得一官居五日延拜司津監索謝錢七十萬楊行穎白其姦詔劉祥道與三司雜訊李勣監按有狀詔除名流嶲州顯賕公謁無所忌楊國忠凡領四十餘使而度支吏部事目叢夥第署一字不能盡故吏得輕重顯賕公謁無所忌所在賄謝李邕字泰和所在賄謝犯贓輒寘之死五代明字吏有犯贓輒寘之死曰此民之蠹也買曲成直唐孫樵凡計贓者以絹平之其贓有六焉一曰強盜二曰枉法其刑絞三曰不枉法四曰竊盜五曰受所監臨其刑流六曰坐贓其刑徒凡六贓定罪有正條余皆約而斷焉唐六典白衛司馬漢蓋寬饒為左司馬在部常為衛官繇使市買衛卿私使寬饒詣府上辭辭尚書也尚書責問衛尉由是不復私使侯司馬護視家事為妻先引丞相司直繁延壽奏御史大夫蕭望之多使守吏自給車馬往茂陵護視家事小吏冠法冠為妻先引也迎醫晉陶侃廬江人為郡主簿太守張夔妻有疾將迎醫請行曰資於事父以事君本君猶母也云云吏修園宅王戎為荊州刺史坐遣吏修園宅應免官詔以曠論孔抑吏市私第楊炎字公南趙惠伯為河南尹時嘗市楊炎第為官廨御史劾炎宰相抑吏市私第貴取其直盧杞召夫理正曰晉評罪晉曰宰相於庶官比監臨計羨利皋奪官杞怒謫晉於是當監主自盜罪絞使行賈州縣藩鎮劉從諫性奢侈賈人子獻口馬金帶即署牙將使行賈州縣所在暴橫沓貪責子貸錢吏不應命則愬于從諫欲論奏或遣客遊刺故天下怨怒冤獄七白策秀才文曰胏石少不冤之人周禮左胏石達窮棘人之訟注赤石也刺林多夜哭之鬼樹棘槐聽訟於其下夜哭之鬼謂無辜者治長非罪雖在縲絏之中非其罪也良夫無辜衛侯夢人被髮北面而譟曰予為渾良夫叫天無辜多殺不辜而號無告無所告也御冤飲恨吞聲飲恨泰誓曰無辜籲天籲告也誣以偷金難明直氏直不疑執為盜璧誰辨張儀楚相亡璧門下疑儀盜之掠撻數百劍有餘冤尚能衝斗日無私照猶隔覆盆義夫飲恨五月降霜鄒衍被囚仰天而歎五月降霜孝婦含冤三年致旱東海于公明眾口鑠金信非其罪片言折獄不見其人君實不察其罪申生曰冤濫頗邪瓜李雖疑薰蕕自別似是而非治長非罪始因尼父而知叔向無辜終俟祁奚而免國章斯抵誠合申之人命所懸豈宜冤濫黃沙失入丹筆誤書獄非明察法乃濫施未聞情得但見獄成得情猶合哀矜非罪誠宜開釋捶楚之下何求不獲雖皋陶聽之猶謂死者有餘刑刑濫則懼及善人孝婦致旱東海孝婦養姑甚謹夫死不嫁姑恐累之自殺姑女告婦殺母婦自誣服殺姑獄掾于公明之不可竟殺之郡界旱三年後太守至祭其冢天乃立雨上虞寡婦養姑事同東海孝婦姑以壽終姑女誣告婦加鴆竟結其罪孟嘗伯周為戶曹明之不可亦連旱後太守殷丹至明之遂雨血逆流晉劉隗大連為司直丞相府斬督運令吏淳于伯血逆流隗奏曰斬伯著柱遂逆上絲極未復下流百姓諼嘩咸曰冤伯子惠亦訴父不乏軍興生為窮人死為冤鬼抱恨入地御冤受罪氣怨結而不傷涕滿汗而橫流與濁吏何親與冤人何仇孔卒不直冤李齊運萬年丞源邃不事齊運怒悴辱之死於廷邃家告冤御史連章深劾齊運訴於帝言為朋黨所擠天子使宰相喻諫官御史後無得連章以劾然卒不真邃冤誣劾以罪杜兼字處宏僚官韋嘗陵楚皆聞家子有美譽論事忤兼誣劾以罪帝遣中人至兼廷勞畢出詔執賞殺之二人無罪死眾莫不冤魏元忠中宗在東宮為檢校左庶子時二張勢傾朝廷元忠嘗奏曰臣承先帝之顧且受陛下厚恩不能徇忠使小人在君側臣之罪也易之等恨怒因武后不豫即共譖元忠與司禮丞高戩謀挾太子為耐久朋遂下制獄詔皇太子相王及宰相引元忠等辨於廷不能決昌宗乃引張說為證說初偽許之至是迫使言狀不應又促之說曰臣不聞也易之等遽曰說與同逆說又曰臣知附易之朝夕可宰相從元忠則族滅今不敢面敗懼元忠之冤后寤其讒部兵剺耳崔寧為牙將事裴冕被謗朝廷疑之遣使者問狀寧部兵剺耳白其冤使者以聞天下稱冤五代趙延義字子英周太祖自魏以兵入京師太祖召延義問漢祚短促者天數邪延義言王者撫天下當以仁恩德澤而漢法深酷刑罰枉濫天下稱冤此其所以亡也是時太祖方以兵圍蘇逢吉劉銖弟欲誅其族聞延義言悚然因貸其族二家獲全邪正雜揉獄訟冤劇唐史蘇安常曰邪正雜糅獄訟冤劇何昔是而今非邪李元素辨運冤為御史東都留守杜亞惡大將令狐運會盜劫輸絹於洛北運適與其下畋近郊亞疑而訊之掠服之亞請斥運詔監察御史楊寧覆驗事皆不讎亞怒劾寧罔上抵罪詔元素馳按亞迎以獄告元素徐察其冤悉縱囚以還亞大驚復劾元素失有罪元素還帝已怒元素曰臣以御史按獄知冤不得盡辭是無容復見陛下帝意解即道運冤狀帝感寤曰非卿孰能辨之請出獄付外崔琯字從律京兆尹宋申錫為讒所危宦官切齒時人罕敢辨者琯與大理卿王正雅固請出獄付外與眾治之天下重其賢縊殺崔寧時朔方掌書記康湛詐作寧遺泚書獻之廬杞奏寧初無效順心反狀明甚召至朝堂縊殺之籍其家中外冤之平貸李方元字景業為江西判官有大獄論死者十餘囚方元刺審其冤悉平貸之宋申錫開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉久未原雪帝慚曰我當時亦悟其失而詐忠者迫我以社稷計爾使逢漢昭宣時當不坐此因追復右丞出冤繫唐臨持節按獄交州出冤繫三千人累遷大理卿李昭德萬歲通天二年來俊臣誣以逆謀既而俊臣亦下獄同日誅時雨甚眾庶莫以冤昭德而快俊臣疑冤不治崔從攝守卬州前刺史有以盜繫獄辭已具從疑其冤縱不治俄得真盜道路冤譟姚璹遷益州長史新都丞朱待辟坐贓應死待辟所厚浮屠理中謀殺璹劍南有密告后者詔璹窮按璹深探其獄跡疑似皆捕逮株黨牽聯數千人獄具后遣洛州長史宋玄爽中丞霍獻可覆親無所翻坐沒入五千餘族知反流徙者什八以上道路冤譟酷憤紀王謹女東光縣主始諸王妃主自垂拱後被害者皆槁掩之神龍初諸王皆陪葬昭獻二陵主聞感慟卒敕其子曰為我謝親戚酷憤已雪下見先王無恨矣叫閽弗聽叩鼓弗聞徐有功上疏曰天下員有定此選者日多選曹諉囑公行囂謗蒲路唐季人多逆節鞫訊結斷刑慘獄嚴革命歲久其流弗改事表生情法外構理而刻薄吏驅扇成姦雖朝堂進表列匭內牒叫閽弗聽叩鼓弗聞使申其冤正增其枉上冤狀穆贊字相明累侍御史陝虢觀察使盧岳妻分貲不及妾子妾訴之中丞盧佋欲重妾罪贊不聽佋與宰相竇參共誣贊受金捕送獄弟賞上冤狀詔三司覆治無之猶出為柳州刺史刑耳列冤張說字道濟宇文融恨恚乃與崔隱甫李林甫共劾奏說引術士王慶則夜祠禱解而奏表其閭引僧道岸窺詗時事冒署右職帝怒詔乾曜隱甫刑部尚書韋抗即尚書省鞫之發金吾兵圍其第說兄左庶子光詣朝堂刑耳列冤帝遣高力士往視見說蓬道垢面席槁家人以瓦器饋脫粟鹽疏為自罰憂懼者力士還奏且言說往納忠於國有功帝撫然乃停說中書令誅慶則等坐者猶十餘人善良方蒙枉李尚隱其先出趙郡徙貫萬年擢左台監察御史馮昭泰性鷙刻人憚其彊嘗誣繫桐廬令李師旦二百餘家為妖蠱有詔御史覆按皆稱病不肯往尚隱曰善良方蒙枉不為申明可乎因請行果推雪其冤盜金下獄袁滋字德深進詹事府司直部官以盜金下獄滋直其冤執正其罪張鎰字季權一字公度累殿中侍御史乾元初華原令盧樅以公事譙責邑人齊令詵令詵官人也御之構樅罪鎰按驗當免官有司承風以死論鎰不直之乃白其母曰今理樅樅免死而鎰坐貶嘿則負官貶則為太夫人憂敢問所安母曰兒無累於道吾所安也遂執正其罪樅得流鎰貶撫州司戶參軍銅匭申冤則天皇后武氏臨朝乃冶銅匭為一室署西曰申冤受抑枉所欲言姚崇后嘗語左右往周與來俊臣等數治詔獄朝臣相逮引一切承反朕意其枉更畀近臣臨問皆得其手牒不冤朕無所疑即可其奏自俊臣等誅遂無反者然測向論死得無冤邪崇曰自垂拱後被告者類自誣當是時以吉言為功故天下號曰羅織其於漢之鉤黨雖陛下使近臣覆訊彼尚不自保敢一搖手以悖酷吏意哉本傳淫潦獄決而霽崔碣字東標再為河南尹邑有大賈王可久轉貨江湖間值龐勳亂盡亡其貲不得歸妻詣上者楊乾夫咨在亡乾夫名善數而內悅妻色且利其富既占陽驚曰乃夫殆不還矣即陰以百金謝媒者誘聘之妻乃嫁乾夫遂為富人它年徐州平可久困甚丐衣食歸閭裡往見妻乾夫大怒詬逐之妻詣吏自言乾夫厚納賄可久反得罪再訴復坐誣可久恨歎遂失明碣之來可久陳冤碣得其情即敕吏掩乾夫並前獄吏下獄悉發賕姦一日殺之以妻還可久時淫潦獄決而霽都民相語歌舞於道獄靜蘇逢吉喜為殺戮高祖嘗以生日遣逢吉疏理獄囚以祈福謂之靜獄逢吉入獄中閱囚無輕重曲直悉殺之以報曰獄靜矣五代史三十四海多御冤之人韋嗣立論刑法四海多御冤之人九泉有抱痛之鬼鴉挽鈴溫璋為京兆尹有鴉三挽鈴璋曰此必訴冤遣吏隨至城外果有人探其雛追其人詣府決之北夢瑣言或問鬼災武黃門之死也裴晉公為盜所刺隸人王義托刃而斃自為祭文是歲進士撰王義傳者三之二李錡之誅也大霧三日不開或問鬼災內疑其冤詔收葬南部新書義府擅殺寺丞王義方言畏義府之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移佞寵舊史白璧何辜青蠅屢煎李白雪讒曰白璧何辜青蠅屢煎群輕折軸下沉黃泉眾毛飛骨上凌青天造化為悲傷李白古風燕臣昔慟哭五月飛秋霜庶女號蒼天震風繫齊堂精誠有所感造化為悲傷被罪怡然素服俟命舊唐史宋申錫既被罪怡然不以為意自中書歸私第止於外廳素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫曰吾自書生被厚恩擢相位不能鋤去姦亂反為所羅織夫人察申錫豈反者乎因相與泣鬻獄八白周書曰典獄非訖於威惟訖於富典主也訖絕也絕富謂賄賂不行鞠獄罪贓獄貨非寶惟府辜功府聚也辜罪也功事也言受獄貨非寶惟以聚罪之事也閑邪買直刑放於寵獻子辭梗陽之賂也叔魚鬻邢侯之獄叔魚納雍子之女蔽罪邢侯叔向正其罪曰鮒也鬻獄厚賂深繩貪賄賂撓刑書私貨官政政以賄成由官邪也獄由貨黷則死及之財惟苟時法必私行貪以敗官為墨相賂以貨寬縱出之刑漢書受悖入之貨禮罪以貨聞既貪獄貨是速官刑孔以貨市獄李景略李懷光為朔方節度使署巡官五原將張光殺其妻以貨市獄前後不能決景略核實論殺之既而有若女厲者進謝廷中如光妻云貪財鬻獄陸肱宣宗時除刺吏有錄事參軍頗尚修絜肱召問曰錄事參軍有幾對曰有三下等懦政虐刑貪財鬻獄即懼太守出唐語林李義府母妻諸子市獄門如沸湯錢至十萬可以通神張延賞聞度支有一冤獄久不決每不平之及公判度支期以旬日案上有一帖子云奉錢三萬乞不問其獄公怒悉收公吏左右訊之明日於盥洗處云錢五萬又於寢所云錢十萬公歎曰錢至十萬可以通神矣乃不問幽閑鼓吹貴幸鬻獄裴寬遷刑部員外郎萬騎將軍馬崇冒殺人而王毛仲方以貴倖將鬻其獄寬固執不肯從以金五百兩賂貴妃姊妹裴寬先是寬以所善請於裴敦復即欲白發其言林甫趣之敦復未及聞扈幸溫泉官而其下裨將程藏曜曹鑒自以他事繫臺寬捕按之敦復謂寬求致其罪遽以金五百兩賂貴妃姊妹因得事聞於帝由是貶寬睢陽太守鞭扑九白虞典曰鞭作官刑治官者用鞭撲作教刑撲楚也不勤道業則撻之月令仲春無肆掠掠捶拷肆暴屍一抶汝庸何傷傳抶其不勉者司城子罕盜璧之笞楚相枉張儀盜璧笞撻之執扑子罕親執扑抶其不勉者撻之流血禮鞭之見血齊襄誅屨於徒人費箠令鞭刑檟楚二物收其威也示背徒人費遇賊袒而示之背叩脛孔子見原壤以杖即其脛笞令笞罰鞭師曹衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百撻伯禽成王有過則撻伯禽大杖小杖子曰舜之事瞽瞍也小杖則受大杖則走故舜不失蒸蒸之孝瞽瞍不陷於不義受笞史吏過笞撻陳餘餘欲起張耳躡使受笞去耳責餘曰今見一辱而死一吏乎榜郭舍人上令倡監榜郭舍人不勝痛也未嘗撻辱人漢朱邑為桐鄉嗇夫蒲鞭劉寬事見寬刑門撾吏後漢常林夜撾吏崔林嘲之曰君為廷尉耶撾婦翁第五倫三娶孤女人謂之擉婦翁五色棒曹瞞傳曰太祖為洛陽北都尉治四門作五色棒懸門左右加笞景詔曰加笞以為重罪無異幸而不死不可為人其定律笞也五百曰三百三百曰二百也減笞又詔曰加笞者或至死而笞未畢欣甚憐之其減笞三百曰二百二百曰百無得更人又詔曰當笞者笞臀無得更人鞭傳楚子王治兵終日而畢殺七人貫三人耳白挺大杖也禁吏擅笞人第五倫遷蜀禁吏擅笞人仙婦笞秦執敲扑鞭笞天下過秦論捶楚之下縲絏之中殺人以挺孔杖扑踰制王遂仗井皆踰制出示於朝王遂械送京師斬東市監軍上遂所制杖出示於朝為戒云段秀實初秀實為營田判官涇大將焦令諶取人田自古給與農約熟歸其半是歲人旱農告無入令諶曰我知入不知旱也責之急農無以償往訴秀實秀實署牒免之因使人遜諭令諶令諶怒召農責曰我畏段秀實邪以牒置昔上大杖擊二十輿致廷中秀實泣曰乃我困汝即有裂裳裹瘡賣已馬以代償笞楚嚴慘蕭穎示學茂挺有奴事穎士十年笞楚嚴慘榜笞愁痛高郢疏榜笞愁痛盈於道路朝士有不賀者笞之閩王曦嫁女朝士有不賀者笞之御史中丞劉贊坐不糾舉將加笞諫議大夫鄭元弼切諫曦謂元弼曰卿何如魏鄭公乃敢彊諫元弼曰陛下似唐太宗臣為魏鄭公可矣曦乃釋不笞杖捶者官得施所部裴憐議杖捶者官得施所部非所部雖有罪必請有司明不可擅也越法杖人輒死裴憐為汝州刺史越法杖人以太子左庶子分司東都杖都督長史宗室李瑰為荊州都督長史馮長命者嘗為御史大夫素貴事多專決瑰怒杖之坐免賜杖三十馬燧元子暢建中中燧討賊山東暢留京師於是大旱朝廷議括商旅緡錢多亡命入南山為盜暢客單超俊李雲端等竊議以為事且危暢是其言遣奴諫燧班師燧怒執奴以聞使兄炫拘暢請罪帝方倚燧貸不問但誅其客敕炫賜暢杖三十榜笞羅珦越州會稽人為奉天令中官出入係道吏緣以犯禁珦榜笞之雖死不置自是屏息省中榜吏柳渾字夷曠同平章事韓滉自浙西入朝帝虛已付之奏事或日晏它相取充位滉遂省中榜吏自若渾雖為滉所引惡其專質讓曰省闥非刑人地而榜吏至死公家先相國以狷察不滿歲輒罷今公柰何蹈前非顓立威福豈尊主卑臣義邪滉悔悟稍褫其威杖殺人以立威賈敦實傳洛陽令楊德幹矜酷烈杖殺人以立威隨年合歡杖五代劉銖用法亦自為刻深民有過者問其年幾何對曰若干即隨其數杖之謂之隨年杖每杖一人必兩杖俱下謂之合歡杖白挺五代王晏球字瑩之自晏球擊敗禿餒又走惕隱其餘眾奔潰投村落村落之人以鋤耰白挺所在擊殺之無復遺類設箠扑于堂下以修官刑而群吏莫敢不備物柳宗元監察使璧記敲榜韓愈赴江陵塗中詩何況親犴獄敲榜發姦偷始創杖架宇文融以夏楚大小無制始創杖架以高卑度杖長短又鑄銅為規齊其巨細唐刑法志二曰杖杖者持也可持以擊也書曰鞭作宮刑是也一曰笞笞之為言恥也凡過之小者捶撻以恥之漢用竹刑後世更以楚書曰扑作教刑是也同上每笞一人以責其負吳越世家自鏐世重歛每笞一人以責其負則諸案吏各持其簿列於庭凡一簿所負唱其多少量為笞數以次唱而笞之少猶積數十多者至笞百餘人尤不勝其苦五代史扶疻郵人方鎮李載義傳象刑十白尚書大傳曰唐虞上刑赭衣不純中刑雜理下刑墨象純幪巾也不使冠飾周禮害人者不使冠飾注云墨幪也圜土之刑人也不虧其體武詔曰古者異衣冠象而人不犯畫墨者幪巾也犯臏以墨蒙其臏畫之犯劓以赭著衣菲草屨非生於治古乃起於亂今刑法志曰善哉孫卿之論刑也曰世俗論以古無肉刑有象刑墨黥之屬菲屨赭衣而不純注純緣也以為治古無肉刑亦不待象刑矣注言人不犯法則象刑無所施也人或觸罪而輕其刑是殺人者不死傷人者不刑罪至重刑至輕民無所畏亂莫大焉故象刑非生於理古而起於亂今也注言今人惡刑之重因推言之上古如此也其實不然象刑惟明書曰象刑惟明者孫卿謂象天道而作刑安有菲屨赭衣之謂者哉亂世效象刑王莽大傅唐尊出見男女不異路尊下車以象刑赭瀋污其衣莽聞說下詔申敕公卿令思齊封尊平化侯孔以赭以墨文粹沈顏象刑解曰舜禹之代象刑而人不敢犯言象刑者以赭以墨染具衣冠異其服色為三等罪終身不釋恥畢世不滅同上虞舜染其衣冠異其服色是罪終身不釋恥畢世不滅豈特已以為恥人見之者皆以為恥也畫衣文粹楊炯少姨廟碑畫衣不犯自昔羲農以降爰及唐虞或設言而人不犯或畫象而下知禁文粹崔仁師疏肉刑十一白周書曰苗人作五虐之刑爰始淫為刵劓㧻黥苗人始為截耳割鼻㧻陰黥面故為虐也皇帝哀矜暴虐以威遏絕苗人帝堯也言滅絕苗人今爾何懲惟時苗人斷制五刑上帝不蠲降咎于苗苗人制五刑天乃滅之呂刑曰墨辟辟刑也墨謂刻其額而涅以墨劓辟截鼻曰劓剕辟刖足曰剕宮辟次死之刑男子割勢婦人幽閉五刑之疑有赦正于五罰罰贖刑也五刑有疑則赦之從五罰言降而從輕也罰懲非死人極于病刑以懲罰過非殺人也極於病苦者使之莫敢犯也苗人作而降咎垂誡呂刑即尚書文帝廢以從寬稱仁漢牘漢文去肉刑用笞罰文選曰歌雞鳴於闕下稱仁漢牘五虐峻刑即上五刑四肢重罰文選肉刑何痛如之刑者不可復屬緹縈上書云屬連也想踴貴之時俗由是敝念鼻醜之日人何以堪秦酷以施上服之刑上服劓墨也下服宮刖也周禮夫斷支體刻肌膚終身不息何其楚痛之甚也漢文除肉刑詔云守門守關漢書墨者使守門劓者使守關除肉刑加以笞名輕而實重名輕易犯實重傷人是重人骨肉而輕人性命也魏陳群議云云晉曹彥議云鑿顛抽脅玩常苟免犯法乃眾黥刖彰罪而民知恥也一離刀鋸終身不齒議不忍刻截之慘而安剿絕之悲袁完議云議復肉刑孔融文舉議之乃止孔南蠻投和頻盜者死次穿耳及頰而劗其髮盜鑄者截手鋸鑿箠扑楚毒畢至文粹沈顏象刑解秦法苛虐方用肉刑鋸鑿箠扑楚毒畢至而人犯愈多非特上古淳樸人易為化夫法過峻則犯者多犯者多則刑者眾雖曰劓之刖之笞之扑之而不為畏也夫九人冠而一人髽之為勝但見眾而為慕矣今免者多而刑者少人尚慕其多矣及刑者多而免者少焉以少為勝乎故刑者眾則民無恥民無恥則雖曰劓之刖之笞之扑之而不為畏也仁聖程晏蕭何求繼論蕭何之傳曹參也參曰臣不如何善守可也何廢作哉若不可以為廢作即文帝除肉刑不為漢主仁聖之最也刻膚革斷支體白居易肉刑議欲廢之者則曰刻膚革斷支體人主忍而用之則愷悌惻隱之心乖矣此緹縈所謂雖欲改過自新其道無繇也其欲復之者則曰任箠令用鞭刑酷吏倚而行之則專殺濫死之弊作矣此班固所謂以死罔人失本惠也蓋取劓㧻黥刖之類耳夫肉刑者蓋取劓㧻黥刖之類耳書所謂五虐之刑也昔苗人始淫為之而天降咎及秦人又虐用之而天下亦離心夫如是則豈無濫死者耶族誅十二白秦皇暴虐威以三夷文選威以三夷之刑秦法一人有罪夷三族商紂毒痡罪及九族書今商王受罪人以族注刑及九族赤族之誅及宗之禍罰弗及嗣虞書夏刑孥戮汝不從誓言予則孥戮汝泰法誅族族滅之計朱浮與彭寵書朱安世曰丞相禍及宗矣公孫賀及父子俱死獄屋誅夷三在父兄之不加豈宗族而相及連坐濫施除三夷妖言令呂氏臨朝云云孔族于洛陽王師範朱全忠既受唐禪友寧妻訴讎人于朝乃族師範于洛陽先是有司次第左告之故師範乃與家人宴少長列坐語使者曰死固不免予懼坑之則昭穆失序不可見先人地下酒行以次受戮者二百人族夷將相張仲方李訓之變于時族夷將相顱足旁午仲方皆密使識其尸俄許收葬改二十人為五十人蘇逢吉晉相李崧從契丹以北高祖入京師以崧第賜逢吉而崧別有田宅在西京逢吉遂皆取之崧自北還因以宅券獻逢吉逢吉不悅而崧子弟數出怨言其後逢吉乃誘人告崧與弟嶼等下獄崧款自誣伏與家僮二十人謀因高祖山陵為亂獄上中書逢吉改二十人為五十人遂族崧家五代史三十脅制群臣來俊臣后陰縱其慘脅制群臣前後夷千餘族無小犬皆如詔來俊臣宰相樂思晦為俊臣夷其家有子九歲隸司農上變得召見言俊臣凶慘罔上不道若陛下假條及狀付之無小大皆如詔臣父死族夷不求生但惜陛下為俊臣所弄耳由是仁傑六族皆免張漢傑唐莊宗入汴遂族誅漢傑事末帝為顯官以張德妃故用事梁亡唐莊宗入汴遂族誅五代梁臣傳凡盜所居家及鄰保皆族誅漢臣蘇逢吉是時天下多盜逢吉自草詔書下州縣凡盜所居本家及鄰保皆族誅或謂逢吉曰為盜族誅已非王法況鄰保乎逢吉怯以為是不得已但去族誅而已於是鄆州捕賊使者張令柔盡殺平陰縣十七村民數百人族其三家史洪肇字化元業等乘間譖之以謂洪肇威震人主不除必為亂隱帝頗欲除之夜間作坊鍜甲聲以為兵至達旦不寐由是李業等密謀禁中乾祐三年冬十月十三日洪肇與楊邠王章等入朝坐廣政殿東廡甲士數十人自內出擒洪肇邠章斬之並族其三家五代史宗族夷丹后妃贊韋氏乘夫淫蒸于朝斜封因出政教不一既鴆殺帝引睿宗輔政權去手不自知戚地已疏人心相挺玄宗籍其事以憾豪英故取若掇遺不旋踵宗族夷丹勢奪而事淺也白智不如葵傳鮑莊子之智不如奏葵猶能衛足踴貴屨賤傳齊景公繁刖刑有鬻踴者故晏子曰踴貴屨賤必斷其足褚師聲子襪而登衛侯怒曰必斷其足不能衛足鄭伯刖彊鉏君子謂彊鉏不能衛足鬻拳自刖楚鬻拳曰吾懼君以兵罪莫大焉遂自刖也君子曰鬻拳可謂愛君矣諫以自納於刑斮朝涉之脛竹竹刑葵智莠言卞和獻玉於楚王王使工者相之奏王曰石也王怒刖其足邴民爭田傳楚子與邴歜之父爭田不勝及即位掘而刖之而使歜為僕也孔除斷趾法刑法志房玄齡等以謂古者五刑刖居其一及其肉刑既廢今以笞杖徒流死為五刑而又刖足是六刑也於是除斷趾法為加役流三千里居作二年夫偉人之一非夫偉人之一非亦慘乎黥刖劉禹錫猶子戒今何不行文粹服毋三年議周之用刑也則墨劓宮刖今何故不行田再思必獻不至再文粹劉軻上座主書嘗讀史感和璞之事必獻不至三刖不至再必獻不至再殆幾乎無刖矣恩熙寬刖掠韓愈聯句殺人刖足亦皆有禮崔仁師傳治獄主仁恕故諺云殺人刖足亦皆有禮太宗初令公卿更議絞刑之屬五十條免死惟斷其右趾應死者多蒙全活太宗尋又矜其受刑之苦謂蕭瑀曰前代不行肉刑久矣今斷人右趾念其受痛意甚不忍瑀曰古之肉刑乃死刑之外陛下於死刑之內降從斷趾便是以生易死足為寬罪上曰朕意以為如此故欲行之又上書言此非便其後蜀王府法曹悲弘上疏駮律訟於是房玄齡等建議以謂古肉刑既廢制為死流徒杖笞凡五等以備五刑今復設刖足則是為六刑於是除斷趾法通典白獄成刑放記公族有罪獄成告於王三宥之傳曰刑放於寵私不害公愛而知惡唯惡是疾雖親必誅唯令是行雖親不隱君子不黨法家少恩雖親唯立愛而法且斷恩義不掩恩門外之理威克厥愛允濟愛克厥威允罔功書敦既睦之情恩常掩義行無頗之法公不滅私宜准律率難從刑放血屬肉刑罪無掩蔽禮刑不頗邪傳且仁不遺親義無絕愛他人尚思欽恤本族難忘哀矜骨肉之親無絕禮仲尼曰叔向古之遺直也傳治國制刑不隱其親刑者國之大事宜當直矣言至於他事則宜有隱也三數叔魚之惡不為末減言皆正直也叔魚叔向弟也曰義也夫可謂直矣注於義未安直則有也平丘之會數其賄也晉不為暴歸魯季孫稱其詐也晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三害加三善殺親益榮猶義也夫三罪為國施刑不可不正其餘以直傷義故疑之小慈害德大義滅親石碏殺子君子曰大義滅親稱以正直汝雖有說謂之仁愛吾則不知以父成政不孝也史楚王使石奢為治有殺人者奔追之則其父也曰以父成刑不孝也不行軍法非忠也刎頸而死也大為防而猶踰以自速戾小不忍而為亂敢不斷恩戮姨弟晉荀晞字道將都督青兗從母依之養甚厚從母弟求為將晞曰吾不以法貸人將無後悔苦欲之乃以為督後犯法晞斬之從母救不聽既死而哭曰殺卿者乃兗州刺史周公垂涕而治管蔡之獄季友歔欷而行叔牙之誅議親周禮八議一曰議親孔坐伯父岑羲字伯華坐伯父長倩貶郴州司法參軍有司以族犯法不可為侍臣姚璹字令璋延載初拜納言有司以璹族犯法不可為侍臣者璹曰王敦犯順導典樞機嵇康被戮紹以忠死是能為累乎后曰此朕意卿無恤浮言抵舅非王師範敬武之子嗣領軍專于法無所私舅醉殺人其家訴之師範厚賂謝訴者不置師範曰法非我敢亂乃抵舅罪唐史白甸師周禮甸師氏王同姓有罪則刑焉注斷獄於甸師也記曰公族有罪則罄于甸人公族無宮刑不翦其類也三宥獄成有司讞于公公曰宥之三宥不對則走出致刑于甸人公又使人追之曰雖然必赦之有司曰無及也反命于公公素服不舉為之變如其倫之喪無服注倫親疏之比也有司正術公族之罪雖親不以犯有司正術季子遏惡公羊云公子牙卒不稱殺為季子諱季子遏惡不為國獄緣季子之心為之諱君親無將將必誅也緩追逸賊穀梁鄭伯克段段失弟子道賤段而惡鄭伯鄭伯處心積慮成於殺也猶曰取懷中而殺之宜緩追逸賊小慈失教鄭莊成叔段之誅傳曰鄭伯克段于鄢稱鄭伯譏失教也為法斷恩漢武可昭平之奏漢隆慮王子昭平君尚帝女隆慮病困以金千斤錢千萬為昭平君贖死罪上許之隆慮卒昭平醉殺主傳傳母也廷尉請論訣上曰吾第二子又屬我垂涕良久曰先帝法令詘之何面目入高廟遂可其奏哀帝詔下明曰噬膚之恩詔為明是外戚有肌膚之恩孔宗室熅始熅首至群臣白帝御興元南門受之百官稱賀太常博士殷盈孫奏言禮公族有罪有司曰某之罪在大辟君曰赦之如是者三走出致刑焉君為素服不舉者三日今熅以皇族不能固節迫脅至此宜廢為庶人絕屬籍葬以庶人禮大捷之慶須朱玫首至乃賀詔可敗髮痛在身李傑尚衣奉御長孫昕素惡傑遇于道內侍玄宗婭婿與所親楊仙玉共歐辱之傑訴曰敗髮膚痛在身辱衣冠恥在國帝怒詔斬昕朝堂通宮妾書宗室李鰅正元初為饒州別駕妾高善歌入宮鰅因御醫許泳通書坐誅僚吏奔解宗室李晉坐豫太平公主謀被誅改氏厲晉就刑僚吏奔解白清河二天王輔決錄曰蘇章為冀州刺史行部有故人為清河太守案得奸狀乃請太守酣飲太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲私恩也明日冀州刺史按清河太守公法也遂舉正其罪也議故周禮八議一曰議故崇姦獲戾大為之防念舊廢刑小不忍而為亂雖久要之難忘有大故而宜棄申恩屈法獄成刑故私不害公愛而知惡唯惡是去雖舊必誅唯法是行雖舊必罰舊雖在於八議法宜效於二天義有不遺禮則摽於八議罪或難掩法可行於二天事苟足容刑宜緩於一割雖敦於念舊義在不遺而奉彼正刑罪宜無赦孔免官裴寂字玄真唐公留守太原契分愈篤貞觀初浮屠坐訞言辭連寂坐免官削封邑半歸故鄉不齒十七白書曰降霍叔為庶人三年不齒齒錄也有不率教者屏之遠方終身不齒禮廢以馭罪周禮太宰以八柄馭群臣七曰廢以馭罪注廢故也不齒三年周禮凡害人者寘之圜土以明恥之其能改者反於中國不齒三年孔不盡心於軌唐李軌字處則時鄭曉聞軌敗入賀帝曰而委質孝軌以使來聞其亡不少慼乃蹈舞以悅我不盡心於軌能竭節於我乎遂廢不齒以贓論廢者削跡盧懷謹臣請以贓論廢者削跡不數十年不賜收齒母死不葬顏真卿字清臣復使河東劾奏朔方令鄭延祚母死不葬三十年有詔終身不齒繇役如初歸崇敬字正禮請視生徒及第多少為博士考課上下有不率教者擾之國子移禮部為太學生太學又不變徙之四門四門不變徙本州之學復不變繇役如初終身不齒白奪以馭貧周禮太宰以八柄馭群臣六曰奪以馭其貧謂其罪也大沒入其家財也奪駢邑子曰管仲奪伯氏駢邑三百飯蔬食沒齒而無怨言當罪故不怨也抵于公法沒以家財沒入沒先居之產列子宋人向氏學盜俄以贓獲罪沒先居之產也孔無儋石之贏裴炎被劾籍其家無儋石之贏籍貲入官韋虛心歷荊潞楊三大都督府長史荊州有鄉豪負勢于法虛心籍其貲入之官籍元載家賜自盡籍其家鍾乳五百兩詔分賜中書門下臺省官胡椒至八在石他物稱是諸弟訴枉韋堅字子全正月望夜皇甫惟明與堅宴集林甫奏堅外戚與邊將私且謀立太子有語訊鞫林甫使楊謹矜楊國忠王錤吉溫等文致其獄帝惑之貶堅縉雲太守惟明播川太守籍其家堅諸弟訴枉太子懼表與妃絕復貶堅江夏堅別字固請籍沒五代唐臣趙鳳張全義養子郝繼孫犯法死宦官伶人冀其貲財固請籍沒鳳上書言繼孫為全義養子不宜有別籍之財而於法不至籍沒刑人利財不可以示天下珍寶不可計蕭至忠生平奉賜無所遺施及籍沒珍寶不可計白殺人者死漢法以殺止殺倳刃失意古詩失意杯酒間白刃起相讎罪莫大焉死刑無赦之刑殺人之中又有禮焉是樂殺人老子殺人不忌為賊傳莫大之罪周禮殺傷匪人爭奪相殺謂之人患禮殺人不忌為賊死傷橫道不問邴吉為丞相道逢群鬥死傷橫道不問吏怪問之曰此京兆尹長安令事殺子後漢賈彪為新息令土人貧困多安令事多不養子嚴為刑制與殺人同罪城南有盜劫害人城北有婦人殺子彪出按掾吏欲引盜彪怒曰賊寇害人此常理母子相陵背天違道遂行按殺父侍人魏志劉曄字子陽父普母疾困臨終曄年七歲兄渙年九歲母戒以普侍人有諂害之性必亂汝家汝能除之則吾無恨曄年十三謂渙曰亡母之言可行矣即入室殺侍人出拜母墓普怒曄還拜謝曰亡母顧命之言敢受擅行之罪普異之不責也椎埋王溫舒少時椎埋為奸注椎殺人而埋之僵路隅文選曰睚眥蠆介屍僵路隅言遊俠之徒殺人狂易陳忠伯始上言狂易殺人得減重論事遂施行也十三殺人秦武陽也孔所至大殺戮杜兼字處宏擢河南尹杜佑素善兼始終倚為助所至大殺戮賤工謗國李實拜京兆尹貞元三十年旱關輔饑乃峻責租調人窮無告至徹舍鬻苗輸于官優人成輔端為俳語諷帝實怒奏賤工謗國帝為殺之斷頭曹華徙鎮義成軍盜殺商賈吏捕得乃華嬖人華怒斷其頭以祭死者殺萬家五代皇甫暉夜焚具州入于魏趙在禮以暉為馬步軍都指揮使暉擁甲士數百騎大掠城中至一民家問其姓曰姓國暉曰吾當破國遂盡殺之又至一家問其姓曰姓萬暉曰吾殺萬家足矣又盡殺之出詔執殺杜兼字處宏為濠州刺史僚官韋賞陸楚皆聞家子有美譽論事忤兼誣劾以罪帝遣中人至兼廷勞畢出詔執賞等殺之二人無罪死眾莫不冤里胥有罪輒殺韓滉字太沖遷浙江東西觀察使里胥有罪輒殺無貸人怪之滉曰袁晁本一鞭背吏禽賊有負聚其類以反此輦皆鄉縣豪黠不如殺之用年少者惜身保家不為惡內廄小兒王璠字明玉出為河南尹內廄小兒頗擾民璠殺其尤暴者遠近畏伏悍妒多殺戮王重榮性悍妒多殺戮少縱舍斷首置前王洪任威虐殺人斷首置前而顏色泰然下恐不敢叛惟此兩何殺人最多武懿宗孫萬榮死懿宗復興婁師德撫循河北人有自賊中歸者一切抵死先剔取膽乃殺之血沫前而舉動自如始萬榮入寇也別將何阿小陷冀州殺人無餘種以懿宗暴忍似之故號稱兩何相語曰惟此兩何殺人最多謀殺大臣柳璨字炤之天祐二年長星出太微文昌問占者曰君臣皆不利宜多殺以塞天變玄暉廷范乃與璨謀殺大臣宿有望者璨手疏所仇娼若獨孤損等三十人皆誅死天下以為冤殺尉劉仁軌字正則轉陳倉尉部人折衝都尉魯寧者豪縱很法縣莫能屈仁軌約不再犯而寧暴橫自如仁軌榜殺之州以聞大宗曰尉而殺吾折衝可乎對曰寧辱臣臣故殺之帝以為剛正以其肉賜從官呂諲中人馬尚言者素暱於諲為人求官諲奏為藍田尉事覺帝怒命敬羽窮治殺尚言以其肉賜從官罷諲為太子賓客駢頸就鈇血丹狴戶則天皇后武氏稍圖華命然畏人心不肯附乃陰忍鷙害肆斬殺怖天下內縱酷吏周興來俊臣等數十人等為爪吻有不慊若素疑憚者必危法中之宗姓侯王及他骨鯁臣將相駢頸就鈇血丹狴戶家不能自保太后操奩具坐重幃而國命移矣本傳甘露之禍文宗大和九年冬十月辛巳殺觀軍容使王守澄十一月乙巳殺武寧軍監軍使王守涓壬戌李訓及節度使王璠郭行余御史中丞李孝本京兆少尹羅立言謀誅中官不克訓奔于鳳翔甲子尚書右僕射鄺覃同中書門下平章事乙丑知戶部侍郎李石同中書門下平章事左神策軍中尉仇士良殺王涯賈餗舒元輿李孝本羅立言王璠郭行餘鳳翔少尹魏逢戊辰晝晦鳳翔監軍使張仲清殺其節度使鄭注巳巳仇士良殺右金吾衛大將軍韓約十二月壬申殺左金吾衛大將軍李正素學士顧師邕嚴武欲殺杜甫甫性褊躁傲誕嘗醉登武床瞪視曰嚴挺之乃有此兒武亦暴猛外若不為忤中銜之一日欲殺甫及梓州刺史章彝集吏於門武將出冠鉤于簾三左右白其毋奔救得止唐史殺宦者七百餘人梁本紀唐天復三年正月巳巳天子至自鳳翔素服哭于太廟而後入殺宦者七百餘人五代史天子因盜殺人滋濫漢臣蘇逢吉傳衛州刺史葉仁魯聞部有盜自率兵捕之時村民十數共逐盜入山中盜皆散走仁魯從後至見民捕盜者以為賊悉擒之斷其腳筋暴之山麓宛轉號呼累日而死聞者不勝其冤而逢吉以仁魯為能由是天子因盜殺人滋濫五代史務行殺戮史弘肇宇化元出兵警察務行殺戮罪無小大皆死是時太白晝見民有仰觀者輒腰斬于市市有醉者忤一軍卒誣其訛言坐棄市五代史下裴炎獄則天皇后武氏始武承嗣請太后立七廟中書令裴炎沮止及敬業之興下裴炎獄殺之並殺左威衛大將軍程務挺太后方怫恚一日召群臣廷讓曰朕於天下無負若等知之乎群臣唯唯太后曰朕捕先帝踰三十年憂勞天下爵位富貴朕所與也天下安佚朕所羞也先帝棄群臣以社稷為托朕不敢愛身而知愛人今為戎首者皆將相何見負之遽且受遺老臣抗扈難制有若裴炎者乎世將種能合亡命若徐敬業者乎宿將善戰若程務挺者乎彼皆人豪不利於朕朕既戮之公等才有過彼蚤為之不然謹以事朕無詒天下笑群臣頓首不敢仰視曰惟陛下人命殺流人有上封言嶺南流人謀反者后遣攝右臺御史萬國俊就按得實即論決國俊至廣州盡召流人矯詔賜自盡皆號哭不伏國俊驅之水曲使不得逃一日戮三百人乃誣奏流人怨望請悉除之於是太后遣右衛詡府兵曹參軍劉光業司刑評事王德壽苑南面監丞鮑思恭尚輦直長王大貞右武衛兵曹參軍屈貞筠皆攝監察御史分往劍南黔中安南等六道訊鞫而擢國俊左臺侍御史光業等亦希功于上惟恐殺人之少光業殺者九百人德壽殺者七百人其餘亦不減五百人虢國先殺其二子貴妃楊氏馬嵬之難虢國與國忠妻裴柔等奔陳倉縣令率吏追之意以為賊棄馬走林虢國先殺其二子柔曰丐我死即并其女刺殺之乃自刎不殊吏載置于獄問曰國家乎賊乎吏曰互有之乃死
