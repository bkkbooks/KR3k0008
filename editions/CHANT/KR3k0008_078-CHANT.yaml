body:
  text: 卷第七十八戶口版圖一白周禮司民掌登萬民之數自生齒已上皆書於版辨其國中都鄙郊野異其男女歲登下其死生登上也去下也及三年大比以萬民之數詔可寇司寇及孟冬祀司民之日獻其數於王王拜而受之登千天府周官生齒之徒生齒者男八月女七月而生齒而人之生而備體也漢法隱口之罰以代抵欺之罪聽閭里以版圖大宰以官府之八政以經邦國三曰聽閭里以版圖為版官政掌中官府次舍之眾寡為版以待之也比要小司徒掌兵法比於六卿之眾寡六畜車輦辨其家財以歲時入其數及二年大比則受邦國之比要注云大比更閱天下民數及財物今八月案比是也比要其簿書也群臣之版夏官司士掌群臣之版歲登下損益之數以周知邦國都家縣鄙之數沛公入秦蕭何盡收收秦丞相圖籍文書蕭何發關巾未傳者詣軍古者二十而傅一歲為衛七一歲為村官習射御馳射二十而役五十六而老傅謂著名籍公徭役者也名數高詔人或相襲聚川澤不書名數數謂戶籍景詔男子二十始傅始復古制稽夫家眾寡之數夫家男女周禮辟名虛張文簿而事不實空簿地圖版籍天府俾食毛之人登先齒之版稽其阜蕃辨其減耗夫征口賦漢朝倉卒猶或先收聖代昇平寧容後造舊判云隱丁脫卒漢武欲作通天臺未有人王溫舒為中尉覆脫卒得數百人作上拜少府注隱漏未為卒也計文景報石慶書曰流人愈多計文不改注郡上計文書不改也兩貫戶令先有兩貫者從邊一州為定次從關內為定又復從軍府州定即俱是邊州關內俱軍府州從先貫為定戶絕令戶令諸身喪戶絕者所有奴婢客女部曲資財店宅並令近親將營葬事及功德外餘並還女無女均入近親官為檢校亡人在日有遺囑處分處分明者不用此律大戶傳損戶數尹鐸為晉陽損其戶數以保鄣白徒白丁白籍白丁之籍析戶令戶令諸子孫繼絕應以戶者非年十八已上不得折其年十七已下命繼者俱於本生籍內注云年十八然聽即所繼處有母在者雖小亦聽析出隱占新戶晉宣帝紀云邊郡新附多無名戶魏朝欲加隱實天子以問宣帝帝曰賊以密綱束下故下棄之宜弘大綱則自然安樂也占租具十田稅門中發游戶益兵諸葛亮曰荊州非少人也而著籍者少焉平居調戶則不悅可語鎮而南令國中凡有游戶皆使自實目錄以益眾可也孔帝問歷代戶版盧承慶遷民部侍郎帝問歷代戶版承慶敘夏商至周隋增損曲折引據該詳帝嗟賞殫耗孫伏伽上言隋失天下者何不聞其過也欲使天下戶口殫耗請以封戶均餘州宋務光巡察河南道時滑州輸丁少而封戶多每配封人皆亡命失業務光建言通邑大都不以封今命侯之家專擇雄奧滑州七縣而分封者五王賦少於侯租入家倍於輸國請以封戶均餘州議天下戶版楊瑒歷戶部侍郎帝嘗召宰相大臣議天下戶版延英殿瑒言利病尤詳帝咨賞收匿戶羨田宇文融時天下戶版刓隱人多去本籍浮食閭里詭脫繇賦豪弱相并州縣莫能制融由監察御史陳便宜請校天下籍收匿戶羨田佐用度玄宗以融為覆田勸農使鉤檢帳符得偽勳亡丁甚眾八計陸贄補渭南尉說使者請以八計聽吏治曰視戶口豐耗以稽撫字杜佑上議杜佑建中初河朔兵拏戰民困賦無所入佑乃上議曰當開元天寶中四方無虞編戶九百餘萬帑藏豐溢雖有浮費不足為憂今黎苗凋瘵天下戶口三十萬陛下詔使者按此纔得三百萬此天寶三分之一就中浮寄又五之二出賦者已耗而食之者如舊安可不革凡天下之戶量其資產定為九等唐六典每三年縣司注定州司覆之然後注籍而申之于省注每定戶以仲年子午卯酉造籍以季年丑辰未戍州縣之籍嘗留五比省籍留九比括天下亡戶蘇瑰徙同州刺史時十道使括天下亡戶初不立籍人畏搜括即流入比縣旁州更相廋蔽壞請罷十道使專責州縣豫立簿注天下同日閱正盡一月止使抳姦匿歲一括實檢制租調以免勞弊戶口益流盧懷謹曰比州牧上佐兩畿令或一二歲或三五月即遷戶口益以流職為此耳減承平時李泌同平章事帝因問戶口減承平時幾何曰三之二徐申始來韶戶止七千比六年倍而半之楊炎曰河南山東荊襄劍南重兵處皆自奉養王賦所入無幾科斂凡數百名吏因其苛蠶食於人富人多丁者以宦學釋老得免貧人無所入則丁存故課免於上而賦增於下以見居人為簿炎疾其蔽乃請為兩稅法以一其制凡百役之費一錢之斂先度其數而賦於人量出制入戶無主客以見居為數人無丁中以貧富為差不居處而行商者在所州縣稅三十之一滋饒殷侑拜義昌節度使奏罷度支所賜戶口滋饒昭義步兵李抱真為懷澤潞觀察留後凡八年抱真策山東有變澤潞兵所走集乘戰伐後賦重人困軍伍雕刓乃籍戶三丁擇一蠲其徭租給弓矢令閑月得曹偶習射歲終大校親按籍第能否賞責比三年皆為精兵舉所部得戍卒二萬既不廩于官而府庫實乃曰軍可用矣繕甲淬兵遂雄山東天下稱昭義步兵四賦陸贄四賦曰料丁壯以計庸天寶末管戶九百六萬九千一百五十四出南部新書凡民始生為黃唐食貨志凡民始生為黃四歲為小十六為中二十一為丁六十為老兵興則戶減戶減則地荒元稹制策正觀三年是歲中國人歸自塞外及開四夷為州縣者二十餘萬人太宗本紀鉤檢戶籍李遜累為池州刺史鉤檢戶籍所以差量徭賦者皆有科品程章吏不得私常曰沈約年八十手寫簿書蓋為此云開元天寶間天下戶千萬劉晏既被誣而舊吏推明其功陳諫以為管蕭之亞著論紀其詳大略以開元天寶間天下戶千萬至德後殘於大兵飢疫相仍十耗其九至晏充使戶不二百萬唐史隱戶剩田宇文融贊融度帝方調兵食故議取隱戶剩田以中主欲溫戶彊丁姚崇中宗時近戚奏度僧尼溫戶彊丁因避賦役至是崇建言凡天下之戶八百一萬八千七百一十口四千六百二十八萬五千一百六十一唐六典開元二年數每一歲一造季帳三年一造戶籍縣以籍成于州州成于省戶部總而領焉同上白新甿之治周禮旅師凡新甿之治治謂有所求乞也使無征役以地美惡為等注七人已上受上地六口受中地五口受下地期不從政王制曰目諸侯來徙家期不從政勞來詩曰萬民離散不安其居而能勞來旋定安集之自占宣詔膠東相王成勞來不怠流民自占八萬餘口樂郊樂國詩曰逝將去汝適彼樂郊又云適彼樂國歸化童恢為不期令流人歸化從居二萬餘口襁負卓茂為太守旬月間襁負至者千餘人貸糧食宣詔流人還歸者輒假公田貸種且勿筭事事謂始徭役也籍內成詔流人欲入關者輒籍內注云錄其籍名而內之封檄發遣後漢鄧太后詔有損棄其居窮困道路若欲歸所在為封檄以發遣之遣還鄉陳寔仲弓為太丘長鄰國有歸附者寔輒訓譽發遣各令還鄉亢食之成詔避水他郡者所在亢食之注食之者散廩食使生活買牛給魏衛顗伯儒請置使監賣鹽得利市犁牛若有歸民以給之來復去晉劉琨越石為并州士人奔迸多歸琨琨善於懷撫短於控御一日之中雖歸者數千而去者亦相繼也孔勞卹王式為晉州刺史會河曲大歉民流徙他州不納獨式勞卹之給地居之袁滋遷為華州刺史流民至者給地居之名其理曰義合假牛犁興完廬舍王審邽為泉州刺史流民還者假牛犁興完廬舍懇田者加階縣令減選德宗正元四流逋四歸樂生興事韓文羅池廟碑白小人懷土重遷何必去父母之邦柳下惠云桑梓之敬樂所自生禮曰樂樂其所自生禮不忘其本狐死正丘首仁也丘首仁不忘本信美而非吾土鍾儀楚奏鍾儀囚於晉晉侯使與之琴操南音士燮曰南冠而縶者楚囚也楚囚君子也樂操士風不忌舊也不忘舊舊俗也莊舄越吟莊舄在楚而作越吟秦聲陳軫曰臣豈無秦聲乎去墳墓衣錦還鄉朱買臣夫子曰吾捨魯何適矣編戶之氓出鄉之節蓬籜之知歸萍梗地著故鄉舊貫仍舊貫棄本逐末恂恂孔子於鄉黨恂恂如也恂恂和敬貌敬父母之國張湛子孝為馮翊告歸平陵望里門而步主簿曰明府位尊不宜自輕湛曰禮下公門孔子於鄉黨恂恂如也父母之國所宜盡禮何輕之有又凌統公績為偏將軍過本縣步入其中見長吏懷三版恭敬禮盡親舊故人恩益隆也娛樂疏廣仲翁告老歸鄉里日令其家具設酒食請族人故舊賓客老人相與娛樂德化鄉里王烈字彥方以義行稱鄉里有爭田直將質之於烈或至塗而反或望廬而反有盜者不辭刑罰勿使王彥方知之決訟蔡衍孟嘉以禮讓化鄉里有爭訟者輒詣衍決之其所爭者皆無怨又劉虞常降身隱約與邑黨州閭同樂共恤等齊有無鄉曲宗之有辨訟從虞決之以情理論判之止鬥高鳳文通鄰里有爭財持兵而鬥鳳往解之不已乃脫巾叩頭請曰仁義遜讓柰何棄之爭者感之收兵謝罪入里必式禮孔不易杜黃裳京兆萬年人貞元末拜太子賓客居韋曲時中人欲請其地賜公王德宗曰城南杜氏鄉里不可易贖魏人自賣者張萬福改泗州刺史魏州飢父子相賣萬福曰魏州吾鄉里安忍其困令兄子將米百車饟之贖魏人自賣者給資遣之復禮鄉徐岱蘇州嘉興人觀察使李栖筠欽其賢署所居為復禮鄉被嗤於鄉高季輔列上五事以為尚書八坐人主所責成者也宜擇溫厚脩潔者任之使過行者被嗤於鄉簡接鄉人張東之子漪以著作佐郎侍父襄陽恃其家立功簡接鄉人鄉人怨之還鄉上冢張暐嘗還鄉上冢帝賜詩及錦袍繒綵乘驛就道子弟車馬聯裀鄉黨畏慕王虔休以信義為鄉黨畏慕著籍韓文著籍太原之陽曲浮人若雲歸李白贈徐安宜惠化聞京師浮人若雲歸鄉路遠山隔太白淮南國門遙天外鄉路遠山隔流逋四歸樂生興事韓愈柳州羅池廟碑余生如過鳥故里今空村杜甫詩坐深鄉里敬壯游詩龜蒙不復見況乃懷舊邦同上舊籍在東都茅屋枳棘籬韓文江月隱鄉樓李白詩飛鳥還舊巢遷人返躬耕同上鄉里之舊符存審為盧龍節度使自以身為大將不得與破梁之功怏怏疾益甚因請朝京師郭崇韜權位已重不樂其來因沮其事存審妻郭氏泣訴於崇韜曰吾夫於國有功而與公鄉里之舊柰何忍令死棄窮野崇韜愈怒章累上輒不許存審伏枕歎曰吾老夫事二主四十年今天下一家亡國之將射鉤斬祛之人皆得親見天子奉觴為壽獨子棄死於此命已亟乃請許朝五代史離鄉四十年取將相符存審臨終戒其子曰吾少提一劍離鄉四十年取將相然覆鋒冒刃出死入生而得至此也因出其半生身所中矢鏃百餘而示之曰爾其勉哉鄉國人情之不忘也柳冕曰鄉國人情之不忘也遷徙四白周禮九徙于國中及郊則徙授之或自國徙郊或自郊徙國皆從而付所處之吏明無惡罪若徙于他國則為之旌節以行之謂出居異鄉者也受之者有節乃達若無授無節則唯圜土內之出鄉無授出授無節則納於獄而問之凡新氓無征役移人爰適樂土適彼樂郊樂國人乃遷徙月令五遷盤庚五遷人咨胥怨三徙孟母三徙擇其善鄰不安其土禮秋蓬之轉辭根離鄉去里去國之戀徙貧民漢武徙貧民於關西及充朔方以南新秦中皇遣蒙恬卻匈奴於河南造陽北千里甚好為築城郭徙民充之為名新秦西方雜錯奢儉不同今俗名新富貴為新秦聽徙寬大地景詔郡國或磽確無所農桑敷畜或有地饒廣薦草木水泉民欲徙之者聽之注敷古繫之謂放牧也徙廣饒之地公卿言郡國被災害貧民無產業者慕徙廣饒之地慕徙賜田宅平詔起官寺市里募徙貧民縣資給食至所賜田宅什物器假與犁牛種食徙邊武帝徙天下姦猾吏人於邊當徙勿徙後漢順詔坐法當徙勿徙當傳勿傳勿收租除筭章帝時歲不登募貧人無田欲徙他界所至給公田種餉田種器勿收租五歲除筭三年後欲還鄉亦聽戶部格格云非沿邊州及側戶千里內軍府百姓欲於沿邊州府附戶居住並聽與本管計會具申所由司准丁授田給復十年有事於本州防禦不須差外征鎮自此為格越鄉懷土驚走魏相徙淮南人田疇諫不從十餘萬驚走於吳實京師王父偃曰茂陵初成可徙天下豪傑內實京師外銷豪猾上從之遷虜程鄭山東遷虜也治鑄富埒卓氏也既不仍於舊貫宜獲庇於新甿留長安漢辛慶忌狄道人為將軍徙昌陵昌陵罷留長安孔地陝者徙寬鄉崔善為為陝州刺史時議戶猥地陝者徙寬鄉善為奏畿內戶眾而丁壯悉籍府兵若聽徙皆在關東虛近實遠非經通計詔可具舟遣張延賞為淮南節度使歲旱民他遷吏禁之延賞曰食者人所恃以活拘此而斃不如適彼而生苟存吾人何限為乃具舟遣之柳宗元貞符曰焚坼抵掎奔走轉死之害不起而人乃克鳩類集旋奮懷舊都日以滋甚河東古吾土也家世遷徙莫能就緒吾固翹翹褰裳奮懷舊都日以滋甚柳宗元送獨孤申叔序十徙其居安仁舊第置于開元末有屋三十間去元和末酬償息錢為他人有因此移去八年中凡十徙其居杜牧上宰相至有樵蘇莫爨糠麧靡資不暇聊生方憂轉死張廷珪請勤政疏自畿內徙畿外自京縣徙餘縣皆有禁唐志人居狹鄉樂遷就寬鄉者去本居千里外復三年五百里外復二年三百里外復一年一遷之後不得更移通典白徙名數漢元帝徵孔霸為師號裒成君徙名數於長安恥關外後漢楊僕恥為關外之人詔為徙關於新安邊人內移後漢張奐然明燉煌酒泉人為護匈奴中郎願徙屬華陰舊判邊人不得內移唯奐特聽之近親附貫戶令落蕃人得還許於近親附貫也孔徙馬邑劉武周瀛州景城人父匡徙馬邑規脫徭役李栖筠奏部豪姓多徙貫京兆河南規脫徭役遠自吳興近徙于陝文粹張說梁國公碑姚有虞之後遠自吳興近徙于陝今家洛陽焉播徂文粹王勵倬彼我系篇晉歷崩坼衣冠擾弊粵自太原播徂江澨其先在元魏時後徙籍不常盧從史本傳僑居之族其先人始袒不出是國枝葉播越居之數代公實編貫而私寓客營流則號為借壞進宮則名曰寄通高容雅步不為有降一身之居尚在難安故父兄相承兄長相襲近經數代遠或累葉學道講義習人之禮鄉舉里選假人之評居人之境以繁我條乘人之貸以濟我生由人之位以庇我屬恃人之寵以輝我業朝廷則祖考之所階則神靈之所憑昔人思伯之敬尚愛甘棠之木況父母之所始卒而不可加尊推之於心豈道訓之謂哉孔子曰危邦不入亂邦不居是謂離舊適之制背否向泰之文於斯尚矣蓋離舊以其無道適新以其宜宗背否以其多難向泰以其可安孔子宋人也上自孔子逮東否服事宋仕有代祿至仲尼道崇闕里乃為魯人矣春秋之作內魯外宋諱我過彰彼惡以此懲之斷可識矣通典流亡六白喪亦不可久也禮游民禮曰且懼奔逃盡室而行遭逃勞疲徙轉好亡惡定震蕩播越蕩析離逿爾土流冗流人逾多而計文不改景報石慶書也計文謂上計文書也流人不根著鼠竄逋蕩人亡推冰魏祖時人推冰時渠水凍使人推以通船道人憚役而亡孔攜老扶幼魏徵疏曰貞觀初頻年霜旱畿內戶口並就關外攜老扶幼往來數年卒無一戶亡去此由陛下矜育撫寧故死不攜貳也游人韓琬上言夫流亡之人非受羈旅棄桑梓也斂重役亟家產已空鄰伍牽加遂為游人無以奉上張廷珪疏曰或謂人窮不足恤而億兆攜離愁苦昏墊則無以奉上矣攤逃人之賦李渤上言渭南長源鄉戶四百今纔四十閿鄉戶三千而今遷他州縣大抵類此推其敝始於攤逃人之賦假令十室伍逃則均責未逃者若抵石于井非極泉不止誠由聚斂之臣割下媚上願下詔一賜禁止計不三年人必歸于農流客宇文融引拜御史中丞吏下希望融旨不能無擾張空最務多其獲而流客頗脫不止浮人楊炎河南山東荊襄劍南科斂凡數百名是以天下殘瘁蕩為浮人鄉居地著者百不四五炎疾其敝三耗其二文粹李翰蘇州屯田紀績頌亡者墮游編版之戶三耗其二歸耕之人百無其一革車屢動陸贄奏議武德年中革車屢動繼以災歉人多流離逃逝韋蘇州始至詩斯民本樂生逃逝竟何為斃踣道路權德輿十九年大旱因是上陳闕政畿甸之內大率赤地而無所望轉徙之人斃踣道路骸骨蔽野殷侑拜義昌軍節度使于時痍荒之餘骸骨蔽野墟里生荊棘侑單身之官安足麤淡與下共勞苦以仁惠為治歲在流民襁屬而還崔瓘為澧州刺史不煩苛人便安之流亡還歸居二年增戶數萬輕斂則人樂其生樂其生則居者不流而流者日來居者不流流者日來則土地無荒桑柘日繁盡力耕之地無餘利人日益富兵日益彊四鄰之人歸之如父母雖欲驅而去之其可得耶文粹李翱平賦書誠若不蠲免必難存濟所訴逋欠並放舊史人不土斷而地著楊炎凡百役之費一錢之斂先度其數而賦於人量出制入戶無主客以見居為薄人無丁中以貧富為差天下果利之人不土斷而地著又關中比饑士人流入蜀者道路相係也高適傳歸者萬餘元結拜道州刺史為民營舍給田免徭役流亡歸者萬餘至德後兵起天下殘瘁蕩為浮人鄉居地著者百不四五楊炎武帝侈縻不節末年戶口減半稅及舟車人不聊生乃下哀痛詔封丞相民人候崔植傳拘此而斃不如適彼張延賞為淮南節度使歲旱民他遷吏禁之延賞曰食者人恃以活拘此而斃不如適彼而生苟存吾人何限為乃具舟遣之敕吏為修室廬已逋債而歸者更增於舊戶口逋蕩李傑以採訪使行山南時戶口逋蕩細弱下記為豪力所兼傑為設科條區處檢防亡匿復業者十七八居人競東西道路侵壟畝姚合野行罷人不在村野圃泉自注柴扉雖蕪沒農器尚牢固杜甫詩奏理遠逋李渤度支奏理遠逋渤為江州刺史上疏曰伏奉詔敕令臣設計督填逃戶所欠錢四千四百一十貫臣懼史官書陛下於大旱中督三十六年逋懸臣任刺史罪無所逃臣既上不副聖情下不忍鞭笞黎庶不敢輕恃符印乞放歸田里乃下詔所訟逋欠並放舊史貧者固已流韓文賦江陵詩人不復業方今關東荐飢蜀漢流亡江淮而南賦斂不息人不復業則相率為盜本根一搖憂患非淺狄仁傑兵興則戶減戶減則地荒地荒則賦重賦重則人貧人貧則逋役逃征之罪多元稹制策興戰耕之術則游墮之戶盡歸而戀本之心固矣征役省則民無轉徙之憂而黎庶所以安矣白居易民多流亡五代王周歷涇州節度使涇州張彥澤為政苛虐民多流亡周乃更為寬恕問民疾苦去其苛弊二十餘事民皆復歸假御史按州縣招來戶口則分業之於是諸道收沒戶八十萬田亦稱是歲終羨錢數百萬緡帝悅宇文融轉移溝壑曩時之十室共輸而猶不給者今且聚之於一夫矣雖有慈惠之長仁隱之吏尚不能存若憯斷擊摶之則將轉移於溝壑矣元稹制策夫流亡之人非愛羈旅忘桑梓也斂重役亟家產已空鄰伍牽連遂為游人唐史韓琬傳安彥威遷西京留守遭歲大飢彥威賑撫飢民有犯法皆寬貸之飢民愛之不忍流去五代史宇文融韋堅楊謹矜王鉷各以裒剋進剝下益上歲進羨緡百億萬為天子私藏以濟橫賜而天下經費自如帝以為能故重官累使尊顯烜赫然天下流亡日多于前宇文融傳贊白大東東國困於役而傷於財譚大夫作詩以告病焉徵令小司徒比六卿之眾寡以歲時入其數時行其徵令也可任者小司徒三年受邦國之比要稽其民人而周知其數上地家七人可任者三人中地家六人可任者五人下地家五人可任者二人任者謂力也有夫婦然後為家凡起徒無過一人以其人為羨唯畋與追胥竭作竭作盡行役要鄉師以國比法以時稽夫家既沒則受州里役要役要所遣人民數也鄉大夫登眾寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之凡國中有貴者有賢者有能者有服公事者老者病者皆捨之均人掌均地政政音征旬用三日凡均力征以歲上下豐年公旬用三日中年旬用二日無年一日注旬均也任老者之事食壯者之食興事任力升諸司徒不征於鄉曰造士也屬役於植夏官大役與慮事屬役植部曲將吏傳曰華元為植築城版榦者是也無役不從傳役將班矣班還也徵役役夫民勤於力則功築罕榖梁為力不同科科役也上中下三科脫卒王溫舒覆中尉脫卒得數百人敺白徒之眾今白丁也脫更有一人箕踞見郭解解曰是吾德不修謂尉吏曰是人吾所急踐更時脫也支離攘臂莊子支離疏肩高於頂播精求食足以數人齊有徵役則支離攘臂游其間言以疾免役無所懼也減年從役劉平為全椒令以德化人人皆贈貲就賦減年從役也均徭任力弛力荒政十二聚萬民四曰弛力寬徭役也使民以時犯時傳欲無犯時晉悼公徒庸計徒庸僝功踦跂國語發卒敝賦踦跂畢行踦丘知反跂丘氏反子自行蓋寬饒次公為司隸子常步行自戍邊公廉如此私從役魏司馬郎伯達為棠陽長民有徙居都內者後縣調船徒恐不辨相率私還助役見愛如此也上庸直吳王濞以銅鹽利百姓無賦卒賤更輒與平買之充夫式戶部式諸正丁充夫四十日免一十日并免租百日已上課役俁免中男充夫蒲四十日已上免戶內地租無他稅折戶內一丁無丁聽傍折近親戶內丁又謂男女三歲已下為黃十五已下為小二十已下為中男一十一成丁也鼛鼓鼓人以鼛鼓役軍事豈敢憚行畏不能趨詩名士執役晉王尼為護軍兵士胡毋輔之輩訪之廄下師免弟子役具師門注孔勞弊魏徵疏曰比者疲於徭役關中之人勞弊尤甚徭役無時又曰煬帝徭役無時力役廣又力役廣而冀農桑興不可得已國衰繇此房玄齡帝嘗問創業守文孰難魏徵曰人欲靜徭役毒之世方敝裒刻窮之國繇此衰而守文為難不存養馬周疏曰今百姓承喪亂之後比於隋時纔十分一而徭役相望兄去弟還往來遠者五六千里春秋冬夏略無休時陛下雖詔減省而有司不得廢作徒行文書役之如故四五年來百姓頗嗟怨以為陛下不存養之一人就役舉室捐業戴胄帝將修復洛陽宮上疏曰九成之役又興司農將作見丁無幾大亂之後戶口單破一人就役舉室捐業籍軍者督戎仗課役者責糧齎竭貲經紀猶不能濟帝覽奏罷役省征役令狐德棻曰今天下無虞惟省征役為要平賦緩役蘇弁副知度支事承裴延齡後平賦緩役略煩苛人賴其寬省徭役馭下之宜來濟帝嘗從容問馭下所宜濟曰昔齊威公出游見老人命之食曰請遺天下食遺之衣曰請遺天下衣公曰吾府庫有限安得而給老人曰春不奪農時即有食夏不奪蚕工即有衣由是言之省徭役馭下之宜也於時山東役丁歲別數萬人又議取庸以償雇紛然煩擾故濟對及之雕甿遺噍不堪其困陳子昂上書曰山陵穿復必資徙役率癯弊之眾興數萬之軍調發近畿督扶稚老鏟山輦石驅以就功春作無時何望有秋雕甿遺噍再罹艱苦有不堪其困役凡百餘萬閻立德太宗幸洛陽詔立德建離宮清署乃度池汝州西役凡百餘萬役人狄仁傑后將造浮屠大像仁傑諫曰工不役鬼必在役人今天下常兵不下百萬皆衣食於平民歲度其費率中戶五僅能活一兵如此則編戶不五百萬不足以給之故陛下之民力不足也孫樵願省勞役李大亮河西積閑夷狄州縣蕭條比因隋亂殘耗已甚臣愚願停招尉願省勞役使邊人得就農畝此中國利也帝納其計征役稍繁家業先空狄仁傑諫疏比年已來風塵屢擾水旱不節征役稍繁家業先空瘡痍未復時興功役力所不堪征役省則人無流亡轉徙之憂白居易制策倉廩無宿儲徭役猶未已韋應物詩用人之力歲二十日閏加二日不役者日為絹三尺謂之庸食貨志李嶠武后又崇寺觀功費浩廣嶠恐結怨三靈謗蒙四海今道人私度幾數十萬國計軍防並仰丁口今丁皆出家兵悉入道征行租賦何以備之願許十道使括取使姦猾不得而隱又太常樂戶持大鼓者已二萬員願量留之餘勒還籍民逸則富以康勞則怨以叛張文瓘宗造蓬萊上陽合璧等宮復征討四夷京師養廄馬萬匹帑廥寖虛文瓘諫曰民逸則富以康勞則怨以叛秦漢廣事四夷造宮室至二世土崩武帝末年戶口減半夫制治于未亂保邦于未危民罔常懷懷于有仁臣願撫之無使勞而生怨隋鑒未遠不可不察農事既收農事既收靈臺勿亟子來而就役者周邦畿而薄四海咸忘勞而獻功李華供官徭役道路相繼馬周疏用而息之則人斯悅徐賢妃疏願陛下使之以時則力無竭矣用而息之則人斯悅矣廢冗役李渤為虔州刺史廢冗役千六百人稽廉冒陸贄八計曰視賦役薄厚以稽廉冒差量徭賦皆有科品李遜累為池州刺史鉤檢戶籍所以差量徭賦皆有科品程章吏不得私歲月不空盧藏用上疏曰斤斧之役歲月不空不因此時施德布化而又廣宮苑臣恐下未易堪除功役魏知古會造金仙玉貞觀諫曰願下明詔順人欲除力役人力勞敝復諫曰今風教頑替日益甚府藏空屈人力勞敝寬徭役白履忠拜斬散大夫吳兢其里人也謂曰子素貧不沾斗米匹帛雖得五品亦何益履忠曰往契丹入寇家取排門夫吾以讀書縣為免今終身高臥寬徭役豈易得哉罷冗役韋宙為永州刺史罷冗役九百四十四員墯業避役李叔明惡道佛之弊上言曰使農夫工女墯業以避役故農東不勸兵賦日屈國用軍儲為斁耗度產以衰征陸贄四賦曰度產以衰征姦人羼名以避征役薛存誠遷給事中瓊林庫廣籍工役存誠曰此姦人羼名以避征役不可許重耗其力張玄素貞觀四年詔發卒治洛陽宮乾陽殿且東幸玄素上書曰百姓承亂離之後財賦殫空雖蒙更生意未完定柰何營未幸之都重耗其力號呼道路陸贄奏議送父別夫號呼道路市井愁苦室家怨咨農桑廢於徵呼膏血竭於笞捶市井愁苦室家怨咨兆庶嗷然而郡邑不寧矣群情動搖興役無已群情動搖議息言又閭閻疾若君臣同慮議息征徭被八荒徭繇被於八荒勞已甚矣每丁一歲定役二旬古者用人之力不過三日後代多事其增十之國家斟酌物宜立為中制每丁一歲定役二旬若不役則收其庸日準三尺以其出絹而當庸直故謂之庸並同上百役皆在文粹陸龜蒙送小雞山樵人吾有丈夫五人諸縣亦有丁壯者自盜興以來百役皆在亡無所容剝膚及髓獨孤及擁兵者第館亙街陌奴婢厭酒肉而貧人羸餓就役剝膚及髓阿房成秦人散張元素昔阿房成秦人散章華就楚眾離乾陽畢功隋人解體今日而役殘創之人襲亡國弊臣恐陛下之過甚於煬帝躬護作役裴耀卿徙宣州刺史前此大水河防壞諸州下不敢擅興役耀卿曰非至公也乃躬護作役未訖有詔徙官耀卿恐功不成弗即宣而撫巡飭厲愈急隄成發詔而去濟人為立碑頌德事繁則不急之務眾不急之務眾則役數役數則人疲人疲則無聊生矣皇甫憬曾是戍役傷杜甫平原獨憔悴農方廢耕桑非關風露凋曾是戍役傷屩而立于塗孟元陽董作西華屯盛夏屩而立于塗役休乃就舍故田輒歲稔且悲就行役安得營農圃李白古風禁止非徭江南野史李昇薄征輕賦禁止非徭召人納錢唐史食貨志天下用度不足諸道得召人納錢給空名告身授官勳邑號度道士僧尼不可勝計納錢百千賜明經出身商賈就軍者給復晨炊星飯張廷珪諫營建大像疏朝驅暮役勞筋苦骨簞食瓢飲晨炊星飯舊史白北山之刺北山刺幽王役使不均也勞於從事不得終養於父母也或宴宴居息或盡瘁事國東人之子職勞不來西人之子粲粲衣服不平謂何詩不患寡而患不均語年老持更晉劉弘為荊州常夜起聞城上持更者嘆甚苦呼蓋一兵年老羸疾無襦乃謫主者遂給韋袍複帽椎冰注見流亡門孔察賦役不均百官志監察御史十五人其二察賦役不均遙遙負檐卒無乃役不均元稹旱災詩澤不下流民無所告柳宗元荅元饒州必將服役而奴使之多與之田而取其半或乃出其一而收其二三主上思人之勞苦或減除其稅則富者以戶獨免而貧者以受役卒輸其二三與半焉是澤不下流民而無所告訴其為不安亦大矣古之為理在於周知人數乃役其事役庶功以興通典監察御史掌巡按州縣賦役不均唐百官志過貌形狀及差科簿皆親自注定務均齊過六典白盍徹什一而稅曰徹徹通也哀公問有若曰年飢用不足如之何對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足歲收十千倬彼甫田云云布嘗無藝藝法也不給則應不供則應之以罪也不患寡而患不均蓋均無貧量力而供事舉其中斂從其薄則周公之典在上無乏用下不闕供輕重之法月令季冬天子合諸侯制百縣為所稅於人輕重之法貢舉之數以遠近所宜為度舉定國之數禮之大倫以地廣狹賦以廣狹為差也禮之薄厚與年之上下隨年之豐荒故年雖大殺眾不匡懼則上下之制節矣言賦用有節也大殺謂飢也匡猶恐也別土地之宜節遠邇之期禮國家靡弊賦稅極也制財用之節傳陳之藝極制度取之以道樂其輸財文選底慎財賦上有餘用下無怨人趙奢均賦越王使趙奢治國賦大均人富而府庫實人則無貧有若盍徹君孰與足任土作貢副天子恤人之心下不靡敝竭王臣奉公之節上無闕供禹別九州辨貢賦之等周制五服定征稅之差國家優恤黎元底慎財賦斂從其薄作法於貪農事既登國賦先定治賦千乘之國可使治其賦言子路時入周禮以時入之地征征稅也周禮云薄征周禮歲杪量入禮曰冢宰制國用必以歲之杪量入以為出謂五穀之稅斂法周禮以年之上下出斂注云斂法者隨年之豐凶而輕重斂稅也入征征稅豐耗視年之豐耗耗斂也九賦異等百貨殊用繭絲賦稅夫征口賦增貲劉平為全椒令以德化人人有增貲就賦減稅尹鐸為晉陽損尸減稅以為保鄣之法均輸畢納謂納畢也百里之內以供官官謂文書財用千里之內為御謂衣服以菽粟當賦昭詔三輔太常榖賦許得以菽粟當賦謂當錢物也明告期日韓延壽為東郡牧租稅先明布期日以其會吏敬畏趨向也節財必均於九式周禮以九式均節財用成賦咸則於三壤尚書咸則三壤成賦中邦九賦殊別五服異制差以精粗之等從其遠邇之期榖租槁稅殺不出租者趙奢趙之田吏也收租稅平原君不肯出奢以法治乃殺其家用事者負稅當免倪寬為內史見政事得人心門注戶輸晉丁男之戶歲輸絹三疋綿三斤女及次丁為戶者半輸其諸邊戍三分之二遠者三分之十也孔公主所廩殆不給萬安公主天寶時為道士開元新制長公主封戶二千帝妹戶千率以三丁為限皇子王戶二千主半之左右以為薄帝曰百姓租賦非我有士出萬死賞不過束帛女何功而享多戶邪使知儉嗇不亦可乎於是公主所廩殆不給移稅錢免賦米李渤出為虔州刺史渤奏還信州移稅錢二百萬免賦米二萬石觀察使上狀不閱置使督察韋堅見宇文融楊謹矜父子以聚斂進乃運江淮租賦所在置使督察以佐國廩歲終增鉅萬玄宗咨其才量產出賦李栖筠奏部豪姓多徙貫京兆河南脫徭科請量產出賦以杜姦謀詔可選官部送崔造同中書門下平章事建言天下兩稅請委本道觀察使刺史選官部送京師閱稼以奠稅陸贄四賦曰閱稼以奠稅積藏于下柳宗元貞符曰敬奠厥賦積藏于下是謂豐國厚我糗粻又曰賦徹而臧厚我糗粻租賦不時杜羔為萬年令時許季同為長安令京兆尹元義方責租賦不時繫二縣吏將罪之羔等辨列尤苦尹不為縱賦法有三裴垍先是天下賦法有三曰上供曰送使曰留州建中初釐定常賦有物重錢輕其後輕重相反民輸率一倍其初而所在以留州送使之入捨公估更實私宜以自開故賦益苛齊民重困垍奏禁之不輸官賦韋澳改京兆尹帝勇鄭光主墅吏豪肆積年不輸官賦澳逮繫之差量纖息王彥威累擢諫議大夫李師道既平其十二州賦法未均詔彥威為勘定兩稅使差量纖息人不為煩生人之喉命楊炎舊制天下財賦皆入左藏庫而太府四時以數聞尚書比部覆出納舉無干欺及第五琦為度支鹽鐵使京師豪將求取無節琦不能禁乃悉租賦進大盈內庫天子以給取為便故不復出自是天下公賦為人君私藏有所不得計羸少及炎為相言於帝曰財賦者邦國之大本而生人之喉命天下治亂重輕繫焉先朝權制以中人領其職五尺宦豎操邦之柄豐儉盈虛雖大臣不得知則無以計天下利害臣請出之以歸有司帝從之乞盡免江淮兩賦白居易元和四年旱甚即建言乞盡免江淮南兩賦以救流瘠人勤于財則貢賦少魏知古曰人勤于財則貢賦少兵資官俸沈既濟曰臣計天下財賦耗斁大者惟二事一兵資二宮俸自他費十不當二者一籍外取宇文融為覆田勸農使戶部侍郎楊瑒以為籍外取稅百姓困弊得不酬失請天下供錢李泌請天下供錢歲百萬給宮中勸不受私獻凡詔旨須索即代兩稅則方鎮可以行法而天下紓矣請為兩稅法楊炎請為兩稅法以增失進退長吏田畝之稅率以大曆十四年墾田之數為準而均收之夏稅盡六月秋稅盡十一月歲終以戶賦以增失進退長吏端本整棼陸贄上言陛下幸聽臣計凡京師稅間架榷酒抽貫貸商點召之令一切停之則端本整棼之術帝不納蠲民逋賦張建封會詔書蠲民逋賦帝問如何荅曰殘逋積負決無可驗雖蠲除之百姓尚無所益免屬州逋負孔戣拜嶺南節度使既至免屬州逋負十八萬緡米八萬斛黃金稅錢八百兩劾擅賦斂殷侑徙天平節度以餉軍有羸當上送官乃裁制經費歲以錢十五萬緡粟五萬石歸有司御史大夫溫造劾侑違制擅賦斂民為無名之獻詔以庚承宣代還藏於人權德輿建言今霪雨二時農田不開庸亡日眾宜選群臣明識通方者持節勞徠問人所疾苦益其租入與連帥守長講求所宜賦取於人不若藏於人之固也紓下戶之賦崔群處州刺史苗稷進羨錢七百萬群以受之失信天下請還賜其州以紓下戶之賦徹舍鬻苗輸官李實貞元二十年旱關輔飢實方務聚斂乃峻責租調人窮無告至徹舍鬻苗輸官格詔固斂詔書蠲人逋租實格詔固斂畿民大困掊斂王播為淮南節度使是時南方旱歉人相食播掊斂不少衰民皆怨之盡有征稅王鍔擢遷嶺南節度使廣人與蠻雜處地征薄多牟利於市鍔租其壓榷所入與常賦埒以為時進裒其餘悉自入諸蕃舶至盡有征稅於是財蓄不貲農耕之備錢徽貶江州刺史州有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕之備可他用哉命代貧民租入李絳字深之李錡誅憲宗將輦取其貲絳與裴崶諫曰錡僣侈誅求六州之人怨入骨髓今元惡傳首若囚取其財恐非遏亂略惠綏困窮者願賜本道代貧民租賦制可除采金稅盧鈞擢嶺南節度使除采金稅罷泗口猥稅薛元賞出為武寧節度罷泗口猥稅人以為便除租賦鄭光孝明皇太后弟也大中四年詔除其租賦宰相言國常賦窶人下戶不免柰何以外戚廢法帝悟追格前詔悉收其賦張茂宗元和中歷閑廄使初至德時西戎陷隴右監及七廄皆廢而閑廄私其地入寶應初始以其地給貧民茂宗恃恩奏悉收其賦兵彊弱在賦第五琦賀蘭進明徙北海奏琦為錄事參軍肅宗駐彭原進明遣琦奏事既謁見既陳今之急在兵兵彊弱在賦賦所出以江淮為淵若假臣一職請悉東南寶貲飛餉函洛惟陛下命帝悅拜監察御史江淮租庸使人不益賦進度支郎中當軍興隨事趣辨人不益賦而用以饒限違罰俸盧坦為壽安令河南賦限已窮縣人訴機織未就坦詣府請申十日不聽坦諭縣人第輸勿顧限違之不過罰令俸爾由是知名督賦楊城為道州觀察府遣判官督賦至州怪城不迎以問吏吏曰刺史以為有罪自囚於獄判官驚馳入謁城曰使君何罪我奉命來侯安否耳留數日城不敢歸仆門闔寢館外以待命判官遽辭去預借同光三年秋大水兩河之民流徙道路京州賦調不充六軍之士往往殍踣乃預借明年秋夏租稅百姓愁苦號泣于路五代史十四莊宗皇后劉氏傳拆室伐木以納稅錢韓愈天旱人飢狀棄子逐妻以求口食拆室代木以納稅錢黠吏漁奪索錢多門戶喪亂紛敖柰何黠吏徒漁奪成逋逃杜甫遣遇詩聚斂貢城闕彤庭所分制本自寒女出鞭撻其夫家聚斂貢城闕聖人筐篚恩實欲邦國活自京赴奉天詩征賦首入而其人益贍柳宗元碑陰文免其罪以贖之夫家之稅有冒沒者免其罪以贖之文粹權德輿岐公遺愛碑不粒天子不忍征於不粒賦於無衣張公德政碑文粹王維笞肉捶骨陸贄奏議笞肉捶骨呻吟里閭一室已空四鄰繼盡同上或吏理失宜或經賦偏重或厲疾鍾害或水旱薦災田里荒蕪戶口減耗牧守苟避於殿責牢盡申聞所司姑務於取求莫肯矜恤遂於逃死闕稅累加見在疲甿一室已空四鄰繼盡漸行增廣何由自存此則人益困窮用度未盡者羨利權德輿上疏斥言裴延齡以常賦用度未盡者為羨利以誇己功貨田中穗韋溫為陝虢觀察使民當輸租而麥未熟吏更白溫督之溫曰使民貨田中穗以供賦可乎為緩期而賦辨誰能扣君門下令減征賦杜甫詩率貸唐史食貨志肅宗即位遣御史鄭叔清籍江淮蜀漢富商右族訾畜十收其二謂之率貸諸道亦稅商賈以贍軍錢一千者有稅庸調之法壞而為兩稅財物之說興聚斂之臣進蓋口分世業之田壞而為兼并租庸調之法壞而為兩稅至於鹽鐵轉運屯田和糴榷利借商進奉獻助無所不為矣唐史食貨志書于縣門凡稅斂之數書于縣門村坊與眾知之唐史食貨志配租以斂穫早晚遠近為差同上民皆自概量庸調輸以八月發以九月同時輸者先遠民皆自概量同上天下歲入之物租錢二百餘萬緡粟千九百八十餘萬斛庸調絹七百四十萬疋綿百八十餘萬屯布千三十五萬餘端同上虛額徵率元稹同州均田狀其間人戶逃移田地荒廢又近河諸縣每年河路吞侵沙苑側近日有沙礫填掩百姓稅額已定皆是虛額徵率其間有豪富廣占阡陌十分田地纔稅二三致使窮獨逋亡稅賦不辦州縣轉破實在於斯歲終積巨萬韋堅進秘書丞見宇文融楊謹矜父子以聚斂進乃運江淮租賦所在置吏督察以佐國廩歲終積巨萬帝咨其才擢陝郡太守凋氓積逋稅韋應物山林藪澤之地各以肥磽多少為差供甲兵士徒之役府庫賜與之用給郊廟之祀奉養祿食之出辨乎物名存乎有司是謂公賦杜甫策問蠲田租以厚農牛僧孺策不擾自辦王仲舒賦調嘗與民為期不擾自辦兩歲以資產為宗唐史食貨志兩稅以資產為宗不以丁身為本資產少者稅輕多者稅重不知有藏於襟懷囊篋物貴而人莫窺者有場圃囷倉直輕而眾以為富者有流通蕃息之貨數寡而日收其羸者有廬舍器用價高而終歲利寡者計估筭緡失平長偽挾輕費轉徙者脫徭稅敦本業者因斂求此誘之為姦敺之避役也徭賦輕重今徭賦輕重相百而以舊為準重處流亡益多輕處歸附益眾有流亡則攤出已重者愈重有歸附則散出已輕者愈輕人嬰其弊願詔有司與宰相量年支有不急者罷之廣費者節之軍興加稅諸道權宜所增皆可停機織未就盧坦為壽安令河南賦限已窮縣人訴機織未就坦請府請申十日不聽坦諭縣人第輸勿顧限違之不過罰令俸爾由是知名本傳天寶之季賦法懷於奉軍唐史食貨志先王定賦以布麻繒纊百榖勉人功也同上國家全盛也約計歲之常賦錢榖布帛百十餘萬經費之引常積羨餘遇百姓不足而每有蠲卻通典歲飢更以兩稅準米崔造浙江東西歲入米七十五萬石歲飢更以兩稅準米百萬豪壽洪潭二十萬責韓滉杜亞漕送東渭橋諸道有鹽鐵處仍置巡院歲盡宰相計最殿以聞世方斷裒刻窮之唐史房元齡傳魏徵曰世方斷哀刻窮之減燕樂王仲舒水旱民賦不入歎曰我當減燕樂他用可平之出錢二千萬代之本傅謂之租凡授田者丁歲輸粟二斛稻三斛謂之租食貨志以田占租無得隱收豪室稅萬二千緡貧弱以安李翱傳請為兩稅法以一其制楊炎請為兩稅法以一其制凡百役之費一錢之斂先度其數而賦今人量出制入戶無主客以見居為簿人無丁中以貧富為差不居處而行商者在所州縣稅三十之一度所取與居者均使無撓利居人之稅秋夏兩入之其租庸雜徭悉省而丁額不廢其田畝之稅率以大曆十四年墾田之數為準夏稅盡六月秋稅盡十一月歲終以戶賦增失進退長吏而尚書度支總焉帝曰善天下果利之天寶中計帳戶有八百九十餘萬其稅錢約二百餘萬貫其地稅約千二百四十餘萬石通典白碩鼠刺重斂國人刺其君重斂蚕食於民貪而畏人若大鼠也桀之將亡率割于夏邑書夏王率害夏邑謂相率割利於都邑謂桀之賦歛重也紂之欲喪仇斂于殷人書商紂仇斂召敵言厚斂取怨於殷人也誅求無時暴征暴虐以征稅之仇斂見上注浚我以生浚取也侵削于下人何以堪杼軸其空君孰與足政煩賦重徵斂無度規取無度厚斂齊晏平仲曰公厚斂焉陳人厚施人歸之斂怨無為天子取怨于下鳴鼓而攻季氏富於周公冉求為之聚斂子曰小子鳴鼓而攻之可也公叔務人曰事充役重政重稅重何以理人稅畝公田之法十取一今又履其餘畝十取二故哀公云二吾猶不足是稅畝也過籍傳榖出不過籍以豐財也注籍借也周禮人耕百畝公取十畝借人力治之而稅不過此田賦季孫欲作田賦訪仲尼仲尼曰斂從其薄事舉其中如是丘亦足矣若不度於禮則雖丘賦將不足也丘甲魯成十一年作丘甲四丘為甸甸出甲令使丘出甸賦譏重斂也丘賦鄭子產作丘賦如魯丘甲國人謗之作法於貪然則政先圖大事貴舉中陳聚斂之謀利將苟得行誅求之政敝將若何厚斂雕牆晉靈公不君也太半之賦秦人收太半之賦三分稅二分也竭耗靡敝賦稅極也食稅之多老子曰民之飢以其上食稅之多是以飢殄資澤於下民言絕其資用惠澤也聚斂之臣百乘之不蓄聚斂之臣與其有聚斂之臣寧有盜臣出二三之令吾誰適從過什一之征君孰與足財匱人怨禮苟以利之為利豈曰人而愛人下若不足上將疇依雖國用而蹔足所獲幾何苟民罷而不堪其傷多矣不能事舉其中誠恐敝歸於下爭承子產爭承貢賦之事懼不給也倍征悉索倍征敝政悉盡也索求也告緡漢武帝國用少令楊可告緡分遣御史即治邦國緡錢也以此用饒益也又光武時賈人夫作稽積諸物雖物無市籍各以其物自古率錢二千而一告也孔削軍食杜元穎欲中帝意以固幸斂取苛重至削軍食以助裒畜收常租魏徵曰近皇甫德參上書言收常租厚斂也見諫諍門賦已竭而斂不休人已窮而賦愈急韓文世方敝裒刻窮之房元齡傳魏徵世方敝裒刻窮之孫伏伽為治書侍郎是時軍興賦斂重伏伽數諸釐損傷破家產剔屋賣田狄仁傑拜河北安撫大使時民多脅從於賊賊已去懼誅逃匿仁傑上疏曰比緣軍興調發煩重傷破家產剔屋賣田人不為售賦斂煩重朱敬則拜正諫大夫時賦斂煩重民多蕩析后數召入禁中訪得失商棄貨鍾傳拜鎮南節度重斂商人至棄其貨去閭里為空嚴武在蜀用度無藝蜀雖富饒而峻掊亟斂閭里為空斂克韋巨源同平章事下符斂克厚斂以結恩劉餗為宣州刺史宣既富饒即厚斂以結恩旬輸月送楊炎河南山東荊襄科斂凡數百名廢者不削重者不去新舊仍積不知其涯百姓竭膏血鬻親愛旬輸月送無有休息炎疾其敝稅侯王之廬筭裨販之緡陸賈上書曰陛下搜私牧責將家以出兵籍馬夫私牧者元勳貴戚之門也將家者統帥岳牧之後也其復除征徭舊矣今奪其畜牧事其子孫丐假以給資裝破產以營卒乘元臣貴位孰不解體方且稅侯王之廬筭裨販之緡貴不見優近不見異群情囂然而關畿不寧矣不忍橫賦韋貫之時國用不足遣鹽鐵副使程异督諸道賦租異諷州縣厚斂貫之不忍橫賦而所獻不中异意因取屬內六州留錢繼之持下益急于頔拜山東道節度使公斂私輸持下益急而慢於奉上所至聚斂楊元卿所至聚斂諧結權近侵削兆民裴延齡太府卿韋少華劾其妄陛下縱之不為治此乃侵削兆民為天子取怨于下又引建中橫斂多積致播遷者言甚深切白著劉晏初州縣取富人督漕挽謂之船頭主郵遞謂之捉驛稅外橫取謂之白著人不堪命皆去為盜賊上元寶應間如袁晁陳莊方清許欽等亂江淮十餘年乃定晏始以官船漕而吏主驛事罷無名之斂正鹽官法以裨用度輒加常數盧徵同州刺史缺用徵為之乃徙華州厚能權近異進用同華地迫而貧所獻嘗觳陋至徵厚賦歛有所奉入輒加常數人不堪其求急揫斂李聽治官苛細急揫斂頗極所欲市道皆嗤皇甫鏄以吏道進既由聚斂句剝為宰相至雖市道皆嗤之唱其多少量為笞數五代吳越自繆世常重斂其民以事奢僣下至雞魚卵彀必家至而日取每笞一人以責其負則諸案吏各持簿列于庭凡一簿所負唱其多少量為笞數少者猶積數十多者至笞百餘人不堪其苦禁止行人孔謙以至鄣塞天下山谷徑路禁止行人以收商旅征筭遣大程官放豬羊柴炭占庇人戶更制括田竿尺盡率州使公廨錢天下怨苦征利剝下王章周太祖用兵四方章供饋軍旅未嘗乏絕然征利剝下民甚苦之往時民租一石輸一升為雀鼠耗章乃增一石輸二斗為省耗緡錢出入皆以八十為陌章減其出者陌三州縣民訴田者必至州縣覆之以括其隱田天下由此重困五代史漢臣傳總無名之暴賦陸贄大曆中一年科率錢榖數最多者便為兩稅定額此乃採非法之權令以為經制總無名之暴賦以立常規黎民糠籺窄亂世誅求急黎民糠籺窄杜甫驅摘蒼耳庶類恐懼陸贄奏議誅求轉繁庶類恐懼殷繁同上陛下悔征賦之殷繁念黎元之困悴彊歛馬周豈勞人而彊斂稅入加舊權德輿言大曆中一縑直錢四千今止八百稅入加舊則出於民者五倍其初四方銳於上獻為國掊怨廣軍食之求而兵有虛籍剝取多方雖有心計巧曆能商功利其於割股啖口困人均也稅民屋架趙贊請稅民屋架籍賈人貲力以率貸內怨外忿時乃大亂任土之貢皇甫湜論進奉書任上之貢生產有常履畝之收等籍既定人識所出使難為姦進奉既無度程莫知紀極恣橫徵發因緣贓私實大姦之門大罪之竇也促戚下可哀韋應物書情詩兵凶久相踐徭賦得閑慢促戚下可哀寬政身致患縣官急索租租稅從何出杜甫兵車詩拆屋代以納稅錢韓文論大阜人飢狀拆屋代以納稅錢寒餧道途斃踣溝壑有者皆已輸納無者徒被追徵臣愚以為此者群臣之所未言陛下之所未知者也歲進錢百億萬緡唐使食貨志錢榖之臣始事朘刻太府卿楊崇禮句剝分銖有欠折清損者州縣督送歷年不上其子謹知名京倉亦以苛刻結主恩王鉷為戶口色役使歲進錢百億萬緡非租庸正額者積百萬大盈庫以供天子燕私日來徵租韓愈董生行門外唯有吏日來徵租更索錢供十倍之賦陸贄自大盜猾夏耗蠹生人天下嘗屯百萬之師令受衣食農夫蠶婦凍而織餒而耕殫力思死以供十倍之賦今之具寮數萬蠶食府庫侵害黎人國絕數載之儲家無經月之蓄雖其厚稅亦不可供戶口逃亡莫不由此皇甫憬雖東海納為帑藏南山盡為力亦恐不足同上寧容蠹政以害齊人貶李實為通州長史政乖惠和務在苛厲特詔逋租悉皆蠲免敢肆誣罔復今徵剝頗紊朝廷之法實惟聚斂之臣朕寧容蠹政以害齊人韓文趙贊請稅間架筭除陌其法屋二間上間錢二千中間錢一千下間錢五百匿一間杖六十告者賞錢五萬除陌法公私貿易錢舊筭二十加為五十物兩相易者約直為率民益愁怨唐食貨志及涇源兵反大謼長安市中曰不奪爾商戶僦質不稅爾間架陌除矣於是皆罷同上廉使奏吏之能者有四科三曰稅錢長數四曰率辨先期貴稅錢長數重困疲羸捶骨瀝髓苟媚聚斂之司有不恤人之病貴率辨先期作威殘入絲不容織粟不暇舂貧者奔送有不恕物之病同上賦稅無藝自至德軍興所在賦稅無藝帑司給輸乾沒滉檢制吏下四方輸將痛繩以法韓滉開元及於天寶開拓邊境多立功勳每歲軍用日增費其時錢榖之司惟務割剝迴殘剩利名巨萬端府藏雖豐閭閻困矣通典兵冗官濫唐食貨志及其弊也兵冗官濫為之大蠹自天寶以來大盜屢起方銷數叛兵革之興累歲不息而用度之數不能節矣加以驕若昏主姦吏邪臣取濟一時由是財利之說興聚斂之臣用進奉獻助無所不為矣五代劉審交晉高祖拜審交三司使議者請檢天下民田宜得益租審交曰租有交顧而天下比年無閑田民之苦樂不可等也遂止不檢而民賴以不擾
