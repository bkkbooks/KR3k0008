body:
  text: 卷第六十九瀆祀一白子路問諸夫子曰祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也祭不敬則瀆祭主敬禮無瀆神祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘易曰東鄰殺牛不如西鄰之禴祭實受其福注見上宜順時而不數多奚以為苟在禮而或煩過猶不及祭以嚴終禮由煩亂苟有明信蘋蘩薀藻之菜潢汙行潦之水可薦於鬼神君雖獨豐其何福之有季梁謂隨侯云云神其吐之吐之不歆也臨祭不惰鬼神無常享享于克誠瀆于祭祀時謂不欽欽敬也禮煩則亂事神則難事神禮煩則亂而難行忘苦思之貌爇如在之神禮曰季氏祭逮闇而祭日不足繼之以燭自曉至夕雖有疆力之容肅敬之心皆倦怠矣以其久也有司跛倚以臨祭其為不敬大矣跛倚偏立不敬也他日祭子路與音預質明而始行事晏朝而退孔子曰誰謂由也而不知禮乎美之也祭祀主敬禮不絜蘋蘩之誠是行秕稗之禮孔瀆神王璵請度昭應南山作天華上宮露臺大地婆父祠昭應令梁鎮上疏以為婆父之鄙語不經見若三皇五帝等兩京及所都各有宮廟此復營造是謂瀆神終朝走巫祝南有漢王祠終朝走巫視杜詩三年而禘不欲黷事神在於虔誠不求厭飫三年而禘不欲黷也韋述議祝肹響以怪談兮巫妖治而魅醉皮日休端憂三農祈榖帝自東都還說因見帝曰太原王業所基由河東入京師有漢武睢上祠此禮廢闊願為三農祈榖誠四海之福帝納之張說逆祀三白傳曰有事於太廟躋僖公逆祀也僖公是閔公庶兄繼閔公而立廟當在閔公下今夏父弗忌為宗伯以僖公年長又是文公之父阿順時君故升僖公於閔公上故曰逆祀仲尼曰臧文仲不仁者三縱逆祀聽夏父弗忌躋僖公故曰縱也君子以為失禮禮無不順子曰禘自既灌而往者吾不欲觀之矣既灌之後則序昭穆而魯逆祀躋僖公亂昭穆故不欲觀也不首其義故誣於祭也首本也若義禮曰子游之徒祭者若義也若順也五廟本仁禮明昭穆諸侯五大夫三士二廟也四時首義孝備蒸嘗子曰臧文仲安知禮夏父弗忌逆祀而不上也孔引僖公比陳貞節博士蘇獻上言請以中宗為別廟詔可孫平子上書詔有司復議貞節獻與博士馮宗質之曰孝和中興別建園寢百世不毀尚何議哉平子猥引僖公逆祀為比殊不知孝和升新寢聖真方祔廟則未嘗一日居上也正文公逆祀陳京初玄宗肅宗既祔室遷獻懿二祖于西夾室引太祖位東嚮祠官尉仲子陵曰所謂不先食者丘明正文公逆祀儒者安知夏后世數未足時言禹不先鯀乎雜祀四白月令正月其祀戶祀之於戶內順陽氣也祭先脾春宜脾故祀戶祭之先進命有司祭風師仲春祀朝日於東郊春分日也祭馬祖於大澤馬祖房星也季春后妃齊戒享先蠶而躬桑先蠶天駟仲春玄鳥至之日以太牢祠于高禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢于高禖之前高辛氏禖官鷰祥故立祠焉以后妃祈男也孟夏其祀灶祭先肺夏陽氣盛熱祀之於灶從熱類也祀灶祭先進肺也大雩帝祭天祈雨曰云云命有司祀雨師於國城西南也祀皇地祇仲夏夏至日祀之於方丘命有司祭先牧於大澤用剛日季夏其祀中霤祭先心中霤中至也祭霤先進心孟秋其祀門祭先肝祀門順陰氣出也祀門先進肝仲秋祀夕月於西郊秋分日祭也命有司祭馬社於大澤用剛日孟冬其祀行祭先腎行道也陰氣盛寒於外去故祀之於道也祀道之俎光進腎命有司祭司寒於北郊祭司中司命司人司祿於國西北仲冬命有司祭馬步宋大火祝宗用馬於四墉祀盤庚於西郊之外以禳火鄭火災禳火於玄冥回祿水火二神祈于四墉祓除火災禮也皆謂祭也五祀門戶灶井中霤也自天子至大夫皆祀夫聖人之制祭祀也法施於民則祀之以死勤事以勞定國能禦大災能捍大患則祀之非此族也不在祀典陳寶祠晉書陳寶祠秦文至今七百餘歲漢興世世常祭光色赤黃長四五丈真祠而見音聲碎隱野雞皆雊每見雍遣太祝祠以太牢奏請立王母祠酒泉太守馬岑上言酒泉南山即崑崳之體也周穆王見西王母樂而忘歸謂此山有石室王母堂璣鏤錦煥岩神官宜立王母祠以裨朝廷無疆之福也遺愛立祠後漢王煥為洛陽令卒人思之為立祠安陽亭西每有酒食輒絃歌而薦之利人立祠後漢許陽偉君為都水掾修鴻陂百姓得其利後病卒太守鄧晨於都官為起廟圖畫形像百姓思其功皆祭祀之于公祠于定國父子公為獄吏所決皆不恨郡中為生祠號云生祠後漢淳于臨聚屯灊山楊州牧攻之不能克陳眾乘單車白馬往說而降之灊山人立生祠號曰白馬陳從事又韋義為廣都長張渙為武威守任廷字長孫為九真守杜軫字超宗為池陽令百姓皆立生祠遠方神祠史記郡縣遠方神祠民各自奉嗣不令於天子之祝官蚩尤漢令祝官立蚩尤之祠九天巫祠漢九天祠者皆以歲時祠官中山巫祠南山來中來中二人皇帝也祠黃石張良死並葬黃石每上冢伏臘祠黃石具伏臘門詔祀先賢漢詔祀百辟卿士有益於人者蜀郡以文翁九江以召信臣應詔歲祀郡二千石率官屬行禮也祀先賢任延長孫會稽都尉先遣饋祀延陵季子遺愛祠賈達梁道為豫州刺史及卒魯人思之為刻石立祠詔追美云云近墓立祠諸葛亮初亡所在各求立廟向充曰順人心則黷而不典若百姓巷祭野祀非所以存德念功宜因近其墓立祠於沔陽人欲祀者皆限至廟斷其私祀詔從之祀皋繇晉禮志云故事祀皋繇於廷尉新禮移祠律署以同祭先聖於太學故事以社日新禮改以孟秋以應秋政摯虞以皋陶作士惟明克允國重其功人思其當是以獄官禮其神繫者致其祭功在獄之成不在律令始也太學之設義重太常故祭太學律署卑於廷尉移祀於署是去重而就輕也又祭用仲春義取重生改以孟秋以應刑殺理未可以相易宜如舊制可孔祠堯舜禹褚無量帝詔無量祠堯平陽宋璟祠舜蒲阪蘇頲祠禹安邑在所刺史參獻建陵廟陳貞節為拾遺初隱章懷懿德節愍四太子並建陵廟分八署置官列火卒四時祠官進饗貞節以為非是上言詔有司為立廟戴青卒以第舍陋不容祭詔有司為立廟請立七廟裴炎后已持政武承嗣請立七廟追王其先炎諫曰太后天下母以盛德臨朝宜存至公不容追王祖考示自私且獨不見呂氏事乎后曰呂氏之王權屬生人今追崇先世跡異安得同哉炎曰蔓草難圖漸不可長后不悅立廟以祀孫儒建鋒殷哭之相語曰公常有志廟食吾等有土當廟以報德及殷據湖南表儒贈司徒立廟以祀立廟梨山李頻出建州刺史卒父老為立廟梨山歲祀之雙廟巡遠睢陽至今祠享不絕號雙廟云歲時致祭文粹呂才東皋子集序立杜康廟歲時致祭以善醞府吏焦革配焉剪林遷神祠韓愈合江亭詩古廟杉松巢水鶴歲時伏臘走村翁杜甫詠懷古跡蟲蛇穿畫壁巫覡醉蛛絲杜甫詩舊俗存祠廟空山立鬼神先主廟祠堂像侔真擢玉紓煙鬟群怪儼伺候恩威在其顏韓炭谷詩女巫澆酒雲滿空玉鑪灰火香鼕鼕寒雲山鬼來座中紙錢窸窣鳴飆風李賀女巫進紛屢舞陳瑤席湛清酟王維巫山神女迎神歌辭村依野廟壖杜甫詩蟲書玉佩蘚燕舞翠帷塵湘夫人祠同上立祠受降城張仁愿後人思之乃為立祠受降城出師輒享焉青松古廟存李白堯祠詩堯沒三千歲青松古廟存乾封元年幸曲阜祠孔子如亳州祠老子高宗本紀竹日斜虛寢溪風滿薄帷杜甫諸葛廟祠宇毀頓韓愈祭文祠宇毀頓憑附之質丹青之飾暗昧不圭不稱靈明外無四垣堂陛頹落牛羊入室居民行商不來祭享輒敢以私錢十萬祈于邦伯修而作之叢祠古木疏谷口寒流靜叢祠古木疏焚香秋霧濕奠玉曉光初肹饗巫言報精誠禮物餘柳宗元韋使君祈雨從至祠下口號革去狹陋恢閎棟宇同上太白祠碑革去狹陋恢閎棟宇階室之廣三倍其初神實在前敬恭跪起杜牧祭百神凡爾守土各報爾望剝烹羹胾無愛牛羊天下聞命奔走承事同上祭百神齋齋惕慄臨谷臨墜視牲啟毛餚羞具潔罔有不備步及神宇蹐足屏氣同上突厥事祅神酉陽雜俎突厥事祅神無祠廟刻氈為形盛於毛袋行動之處以脂蘇塗之或繫之竿上四時祀之雩禜五白周禮地官舞師教皇舞旱暵之事稻人旱暵供其雩斂斂發斂也禜門用瓢齎甘瓢去抵為樽旱暵則舞雩女巫之職雩禜祭水旱也禮龍見而雩傳榖梁一時而言不雨有志於人也毛澤未盡人力未竭古人重請請道去讓孔雩祀王仲丘沂州琅玡人開元中歷左補闕時典章差駁仲丘欲合貞觀顯慶二禮據有其舉之莫可廢之義即上言貞觀禮雩祀五方上帝五人帝五官于南郊顯慶禮祀昊天上帝下圓丘臣謂雩上帝為百榖祈甘雨故月令大雩帝用盛樂鄭玄說帝上帝也乃天別號祀子圓丘尊天位也顯慶祀昊天與月令合而貞觀嘗祀五帝矣請二禮皆用詔可雩于興慶宮德宗貞元十三年四月壬戍雩于興慶宮祈禳禜雩皆有準程柳終南碑柳子厚禜門文惟神配陰含德司其翕闢能收水沴以估成績淫雨斯降害于麰麥野夫興憂官守增惕諸陰既閉休徵未獲敬用瓢齊以展周索納其雲氣復我川澤冬至及孟夏雩祭皇地祇于方丘禮志旱甚則修雩唐六典禮部旱甚則修雩秋分以後雖旱不雩雨足皆報祀若州縣則先祈社稷及境內山川若霖雨則京城禜諸門門別三日每日一禜不止祈山川岳鎮海濱三日不止祈社稷宗廟若州縣則禜城門及境內山川而已同上周制月令建巳月大雩五方上帝其壇名曰雩禜於南郊之傍配以五人帝命樂工習盛禮舞皇舞月令命有司為民祈祀山川百源百辟卿士有益于民者以祈榖實若國太旱則司巫師巫而舞雩若旱暵則女巫舞雩武德初定令每歲孟夏雩祀昊天上帝於圓丘景皇帝配牲用蒼犢二五方上帝五人帝五官並從祀用方色犢十出杜佑通典正觀雩祀於南郊顯慶禮于圓丘䄍六白記曰伊耆氏始為蜡古天子號蜡也者索也謂求索也歲十二月合聚萬物而索饗之周十二月建亥月也萬物功加於人者之神皆求以享報之蜡之祭也主先嗇而祭司嗇先嗇神農也司嗇后稷也季冬天子乃蜡百神於南郊為來年祈榖於天宗神農后稷勾芒田畯岳鎮海瀆丘陵墳隰鱗介羽毛之類天宗日月星辰命有司脩祭禽之禮謂先蜡日獵禽獸以供蜡祭昔者仲尼與於蜡賓在助祭之中事畢出游於觀之上喟然而歎歎其祭不備也仲尼之歎蓋歎魯也天子大蜡八所祭有八神古之祭者使之必報之迎貓為其食田鼠也迎虎為其食田豕也蜡之祭仁之至義之盡也八蜡以記四方年不順成八蜡不通以謹民財其方榖不熟則不通於蜡使人謹於財用順成之方其蠟乃通以移民也子貢觀於蜡子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也若狂皆醉也子曰百日之蜡一日之澤非爾所知也言人皆勤農有百日之勞今日使之飲酒燕是君之恩澤也非爾所知言其義大也展必報之義觀若狂之歡八神一日擇吉日祈來年福周蜡國祭蜡則吹豳頌擊土鼓以息老物謂方物老成以息勞也息其老物吾則從周闕以禮文子將歎魯副辜太宗伯以副辜祭四方百物注副而磔之謂磔及蜡祭也蜡辭郊特牲祭坊與水庸事也曰土反其澤水歸其壑昆蟲無作草木歸澤注此蜡辭也黃衣黃冠以祭息田夫也草笠而至尊野服也諸侯於蜡遣使戴草笠貢禽獸既蜡而收民息已故既蜡君子不興功放囚華陽國志曰王長文元康初試守江原令縣牧得盜馬及發冢賊長文引見誘慰時遇臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不明使汝等如此長文之過也蜡節慶祚歸就之上下善相憐樂過節還當為汝思他理郡吏惶懼爭請不許尋有赦令無不感恩祠灶搜神記曰宣帝時陰子方者嘗臘日晨炊祭灶神見形子方再祀之以黃羊家至巨富孔順成之方其蜡乃通柳宗元蜡說柳子為御史主祀事將蜡進有司以問蜡之說則曰合百神于南郊以為歲報者也先有事必質於戶部戶部之辭曰旱于某水于某蟲蝗于某癘于某則黜其方守之神不及以祭余嘗學禮蓋思而得之則曰順成之方其蜡乃通若是古矣其名則存而教之實則隱同上旱乎水乎蟲蝗乎癘疫乎豈人為之耶故其黜在神暴乎眊乎沓貪乎罷弱乎非神為之耶故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存而教之實則隱故歎而云也神農伊耆少牢后稷及五方十二次五官五田畯五岳四鎮海瀆日月方以犢二星辰以降方皆少牢五井泉皆羊一禮志蜡祭百神大明夜明在壇上神農伊耆各在壇下后稷在壇東五官田畯各在其方水墉坊各在其方壇之後同上蜡之義自伊耆氏而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報之樂以蕢桴土鼓夏后氏更名曰嘉平殷更名曰清祀周因之復名大蜡以歲十二月合聚萬物而索享之春官宗伯以副辜祭四方百物蜡之神有八一曰先穡二曰司穡三曰農四曰郵表畷五曰貓虎六曰防七曰水墉八曰昆蟲索鬼神而致百物通曲季冬寅日蜡祭百神于南郊大明用犢二籩豆各四簋俎簠登各一神農及伊耆氏各用少牢一籩臣等與大明同后稷及五方十二次五官五方田畯五岳四鎮四海四瀆以下方別各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宮二十八宿五方之山林川澤丘陵墳衍原隰鱗羽臝毛介水墉坊郵表畷貓虎及龍鱗朱鳥白獸玄武方別各用少牢一每座籩豆各二簠簋登俎各一蜡祭百八十七座唐通典若其方不登則闕之其儀具開周禮同上白膢漢書膢五日注貙虎以立秋日祭獸王者以此出獵祭宗廟又後漢蔡邕曰猛虫以立秋日還母王者以此日祭也酺周禮族用春秋祭酺酺者為人物災之神又漢文紀酺五日司寒禮孟冬祖司寒於北郊也又傳曰其藏冰也黑牡秬黍以享司寒又祭司寒而藏之謂藏冰也司寒玄冥北方之神敬而祭之晉孔愉字敬康著信鄰里後忽捨去皆謂之神人為立祠建興初始立雜祭七孔設壇漳南祭建德劉黑闥竇建德故時左右稍歸之兵浸盛乃設壇漳南祭建德告以舉兵意杜康祠王績所居東南有盤石立杜康祠祭之尊為師草木悽悲文粹布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精魂無依李華弔古戰場文立廟睢陽巡遠立廟睢陽歲時致祭河瀆親家乾子郭汾陽鎮蒲欲造浮橋而激流毀墠公酹酒許以小女妻之其夕水回木生墠上遂成橋而小女尋卒因塑廟中人因立公祠號河瀆親家翁祖軷八白周禮大馭掌玉輅以祀及犯軷軷山行王自左馭馭下祝下登受轡犯軷遂驅之封土為山象以蒲芻棘柏為神既祭以車轢喻無險難也及祭酌僕之右祭兩軹軹軎也祭軌乃飲軌當作范車前軾儀禮聘禮釋幣于出祖釋軷祭脯酒乃飲軷其側詩曰取蕭祭脂取羝以軷載燔載烈仲山甫出祖祖範軷之祭又曰韓侯出祖傳曰夢襄公祖昭公將如楚夢襄公祖子服惠伯曰行也先君適楚矣故祖以道之車軸折漢臨江王被祖於江陵北門車軸折父老泣曰吾王不反矣果如言黃帝子舊說黃帝子纍祖好遠遊道死故後祭為神道也孔駕轢軷而行禮志其詳見通典天子出通化門釋軷而入壇禮志籍山祖軷將臨柳宗元夙駕東征祖軷將臨祖者送行之祭因饗飲也唐顏師古注漢書祖者送行之祭因饗飲也昔皇帝之子纍祖好遠游而死於道故後人以為行神也車駕出日右校先於國門外委士于軷注軷為山象也又為瘞埳于神座西北方深取足容物太祝布神位于軷前南向太宮令帥宰人刳羊郊社之屬設樽罍篚羃於神座之左俱右向置幣於樽所駕將至太祝立於罇洗東面西向祝史與執樽罍篚者俱就樽罍所立太祝再拜詣樽所取幣進跪奠於神座興還本位進饌薦脯於神座前加羊於軷西首太祝詣罍洗盥手洗爵詣樽所酌酒進跪奠於神座前興少退北向立讀祝文訖太祝再拜還本位少頃太祝帥齋郎幣爵酒饌物宰人舉羊肆解之太祝并載埋於埳寘之執樽者徹罍篚席駕至權停太祝以爵酌酒授太僕卿左執轡右受酒祭兩軹及軌前乃飲受爵而退遂驅軷轢上而行通典白爾祖其從與享書周禮有功者書於太常祭於大蒸司勳詔之詔告神以辭死則蒸先王祭之左傳趙簡子祀董安于於廟智伯疆請趙簡子殺安于安于曰我死晉寧趙氏定矣乃縊而死故趙氏祀之祀曹真於太祖廟魏志又祫太祖廟祀功臣二十一人孔擇古名將十人配享武成廟周播上元中詔擇古名將十人配享武成廟侑孔子播奏太公古賢今其不稱亞聖孔子十哲皆當時弟子今所配年世不同請罷之詔可示報德也柳宗元監察使壁記事於有功烈者示報德也不肅則無以勸善生弘佐命之道杜甫朝享太廟賦生弘佐命之道死配鬼神之列則殷劉房魏之勳是可以中摩伊呂上冠夔鹵代天之工為人之傑丹青滿地松竹高節向不遇反正撥亂之主曾何以措其觔力與韜鈐載其刀筆與喉舌使祭則與食則丘若斯之盛而已配享太宗廟庭屈突通房玄齡高宗李勣馬周睿宗劉幽求蘇環元宗張說代宗郭子儀肅宗苖晉卿裴冕德宗李晟憲宗裴度貞觀十六年有司言禮功臣配享於廟庭禘享則不配依令禘祫之日功臣並得配享太常卿韋挺等議曰古者臣有大功享祿其後子孫率禮潔粢豐盛礿祠蒸嘗四時不輟國家大祫又得配焉所以昭明其勳尊崇其德以勸嗣臣也其禘及時享功臣皆不應享通典白毛詩采蘩夫人奉祭祀不失職也于以采蘩于沼于沚被之僮僮竦敬貌皆婦人助祭也祁祁舒遲貌采蘋大夫妻能循法度于以采蘋南澗之濱于以采藻于彼行潦誰其尸之有齊季女毛詩饙饎濯溉助祭記曰君在階夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲饗之夫人薦豆執授豆中央直也授之執鐙鐙豆下跗副禕立于東房君制祭夫人薦盎制謂朝事薦骨膋君割牲夫人薦籩豆尸酢夫人執柄夫人授尸執足傳曰行潦之蘋藻季女尸之敬也孔抗言不可蔣欽緒中宗始親郊祝欽明建言皇后當亞獻欲以媚韋氏天子疑之詔禮官議眾曲意阿徇欽緒獨抗言不可諸儒壯其節享先蠶見后桑蠶門以皇后為亞獻祝欽明景龍三年天子將郊欽明與國子司業郭山惲陰迎韋后意謬立議后宜助祭帝果用其言取大臣李嶠等女為齋娘奉豆籩禮成詔齋娘有夫者悉進官引艷妻郊見上帝祝欽明贊欽明以經授中宗為朝大儒乃詭聖僻說引艷妻郊見上帝腥德播聞享祚不終靈靈衡笄翬翬褕翟唐文粹齊夏之歌者夫人祭之所奏也靈靈衡笄翬翬褕翟自內而祭為君之則白宗廟本仁祝嘏首義鬼神饗德辭說貴誠祝史正辭信也季梁曰祝史矯舉以祭臣不知其可也季梁曰左傳薦信晏子曰祝史薦信是言罪也無愧辭叔向曰范武子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭神聰明正直監德觀惡國將興神降之監其德也國將亡又降之觀其惡也害盈福謙監德觀惡乞靈必由乎明德徼福不在於愧辭黍稷馨香葉于明德牲牷肥腯奉以正辭修其祝嘏禮祝以孝告嘏以慈告祝嘏辭說藏於私家非禮也周禮大祝掌六祝之辭以事鬼神祈福祥求永貞一曰順祝順豐午二曰年祝求永貞三曰吉祝祈福祥四曰化祝弭災兵五曰瑞祝逢時雨寧風旱六曰筴祝遠罪戾甸祝掌表貉之祝號甸者謂曰以習兵之禮故爾貉祭音陌欲獲之多宗祝在廟詩曰祝祭于祊祀事孔明工祝致告傳曰祝有益也祖亦有損晏子為齊侯言人怨皆詛上祝不能勝兆人詛善祝尸祝不越樽俎莊子曰庖人雖不理庖尸祝不越樽俎之間而代之矣嘏少禮遍取黍稷牢肉以授尸也量人授舉斝斝當為嘏周禮卒爵飲之酳尸尸嘏主此卒爵儀禮啐酒進聽嘏嘏長也大也授尸以長大之福宜穡于房變黍言穡欲重稼也嘏辭曰宜稼于田眉壽果年詔祝於室孔祝署嗣皇帝顏真卿兩京復帝遣左司郎中李選告宗廟祝署嗣皇帝真卿謂禮儀使崔器曰上皇在蜀可乎器遽奏改之柳宗元貞符詩曰載楊于雅承天之嘏天之誠神宜鑒于仁神之曷依宜仁之歸濮鈆于北祝栗于南幅員西東祗乃一心祝唐之紀後天罔墜祝皇之壽與地咸久曷徒祝之心誠篤之淫巫愚祝史思明陷洛陽有詔幸東都將親征蘇源明上疏極諫曰王者之於天地神祇享之以牲幣而已記曰不祈兮士彼淫巫愚祝妄有關說甚不可本傳尸十二白周禮尸出入奏肆夏周坐尸殷無事則尸立有事則坐坐尸於堂禮尸必式乘以几尊之尸出廟入朝必蹕蹕止行人卿大夫士皆下之君知所以為尸者則自下之也迎尸宿尸妥尸妥下坐也尸在廟門外則疑於臣入廟門內則全於君尸以入廟為尊祭成喪者必有尸尸必以孫孫幼則使人抱之無尸則取於同姓可尸謖君與卿餕尸謖起也君子抱孫不抱子此言孫可以為王父尸子不可以為王父尸孔象其生極其教皮日休正尸祭尸象其生極其教也神降而拜象乎妥尸受福於神象乎酢尸祀享立尸于廟王則迎有拜有醑尸在禱所以立象生之教也今視唐禮皇帝神降而拜象乎妥尸受福于神像乎酢尸象其死窮其思同上聖人知生不足事事之死死不足其思制之生象其死窮其思肆夏文粹皮日休補九夏歌肆夏章肆夏之歌者尸出入之所奏也迎神之榖得神之祜愔愔清廟儀儀袞服我尸出矣迎神之榖杳杳陰竹坎坎路鼓我尸入矣得神之祜皮日休補九夏歌虞夏商周不變李華十論夫祭有尸自虞夏商周不變戰國蕩古法祭無尸尸之重重於卜則明廢龜可也尸神像也祭所有尸者鬼神無形因尸以節醉飽孝子之心也夏后立尸而卒祭殷坐尸周坐尸詔侑無方其禮亦然其道一也通典尸之遺法同上今柳道州人每祭祀迎同姓丈夫婦人伴神以享亦為尸之遺法白陳其宗器宗祭也簠簋既陳籩豆有踐書曰作繪宗彝繪畫也宗彝宗廟彝器也彝器器貢周禮器貢謂貢宗廟之器滌濯謂溉祭器也周禮云閭胥供祭器閭胥司徒之屬官也器謂簠簋鼎俎也度程月令孟冬命有司效功陳祭器案度程無作淫巧以蕩上心效功考其器也度大小也程所容也不鬻禮曰宗廟之器不鬻於市君子雖貧不鬻祭器不假禮大夫祭器不假祭器敝則埋之為先几家造祭器為先養器為後禮無田祿者不設祭器不踰境大夫士去國祭器不踰境大夫寓祭器於大夫士寓祭士器於士也掌蜃供蜃器之屬飾祭器之屬可以白器鬯人主四方山川周禮辨六彝以待祼將六尊以待祭祀也展器告備司烜供明粢明水也滌粢盛陳器之道多陳而省納之可也以多為崇以節為禮醆斝諸侯則用時王之器敬則用祭器賓客來加敬者可以用祭器也四璉六瑚八簋梡嶡周禮內骨外骨卻行連行紆行以脰鳴注鳴旁鳴翼鳴股鳴胷謂之小蟲為雕琢刻畫祭器為雕琢庶物也國語欒武子其官不備宗器孔不飭顏真卿攝事太廟言祭器不飭元載以為誹謗貶峽州別駕祭器視物所宜韋縚傳賓客崔沔議曰大凡祭器視物所宜故大羹占饌也盛以登登古器也和羹時饌也盛以鉶鉶時器也有古饌而用時器者則毛血于盤交酒于尊未有進時饌用古器者古質而今文有所不稱也潔于壇堂之上樽彝罍洗俎豆醆斝之器必潔于壇堂之上柳宗元監察使記私習簋簠元和聖德詩掉棄兵革私習簋簠器血觕弊不能嚴清韓愈祭神文物有品器有數韋縚傳張均韋述議曰使物有品器有數貴賤差降不得相越周制王食用六榖膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋而以四籩四豆供祭祀此祀與賓客豐省不得同舊矣簠簋登俎皆一許敬宗言籩豆以多為貴宗廟乃踰於天請以大祀十二中祀十小祀入大祀中祀簠簋登俎皆一小祀無登詔可唐史韋叔夏傳奉禮郎凡祭器之位簠簋為前登鉶次之籩豆為後六典樽十四白易曰樽酒簋貳一樽之酒一簋之食言其約也周禮冪人以疏布冪八樽畫巾冪六彝疏布者天地之神尚質畫巾者宗廟可以尚文畫老畫為雲氣大罍瓦罍杜蕢也禜門用瓢齎瓠割去底以齎為樽樽彝為上罍為下司樽彝掌六樽六彝之位詔其酌辨其用與其實春祀夏初祼用雞彝鳥彝皆有舟鄭云舟樽下臺若今時承盤子秋嘗冬蒸祼用斝彝黃彝皆有舟斝讀為稼畫禾稼也黃彝黃目樽朝獻用著樽饋獻用兩壼樽著樽者著晷樽也或曰著樽者著地無足也明堂位曰著殷樽也皆有罍凡四時之間祀追享朝享用虎彝蜼彝畫之為飾也蜼讀為虺皆有舟朝踐用大樽再獻用兩山樽皆有罍凡四方山川用蜃廟用脩祼用概凡副用散皆漆犧樽鏘鏘詩記曰五獻之樽門外缶門內壺君樽瓦甒樽用犧象周小罍夏后氏黃目黃者中之色目者氣之清明也言酌於中而清明於外傳曰犧象不出門魯壺周靈王與士文伯宴樽以魯壺白獸樽晉書設白獸樽於殿廷樽蓋上施白獸若有能獻直言則發此樽飲酒案禮白獸樽方杜舉之遺戒也孔黃金樽行酒田令孜置酒食諸將以黃金樽行酒即賜之常滿樽李元素為武德令刺史李文暕調民黃金造常滿樽玄酒太古未有麴蘖污樽杯飲則有玄酒之奠宗廟皆籩豆議崔沔歿廟配樽斝韓愈晚秋郾城聯句樽俎蕭蕭杜甫南郊賦樽俎既陳肴羞惟時韓文樽爵靜潔同上南海廟碑奉禮郎几樽彝之制十有四祭祀則陳之一曰大樽二曰著樽三曰犧樽四曰象樽五曰壺樽六曰山罍七曰概樽八曰散樽九曰山樽十曰蠯樽十一曰雞彝十二曰鳥彝十三曰斝彝十四曰黃彝有事于神祇則用太樽至于山罍有事于宗廟則春夏用雞鳥之彝秋冬用黃斝之彝星之外官用概樽岳鎮山林川澤用蠯樽眾星丘陵以下用散樽唐六典爵十五白周禮王爵儀禮主人洗廢爵爵無足繶爵虛爵以爵拜者不徒作言拜就爵者不徒起主人盥洗升媵觚于賓媵送媵爵坐尊爵記曰宗廟之禮貴者獻以爵賤者獻以散尊者舉觶卑者舉角以小為貴也夏醆殷斝周爵醆斝及尸君非禮也是謂僣君未步爵不嘗羞步行也羞為爵設客爵居左酬賓爵也介爵酢爵僎爵皆居右三爵皆食爵也康爵詩酌此康爵以奏爾詩孔祝欽明言禮家凡稱大祭祀不獨主天爵人大祭祀與量人受與斝之卒爵祭天不祼則九嬪替瑤爵宗廟稱大祭祀也捧爵是醮五帝坐壇百神立坫嵬嶷肹蠁捧爵是醮杜牧黃州祭神文執持甚難文粹今酌獻酒制度全小僅未一合執持甚難不可全依古制猶望稍須廣大崔沔貴者獻以爵文粹按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵此明貴小賤大示之節儉宗廟加籩豆議韋述郊奠爵容止一合容小則陋宜增大之韋縚禮有以小為貴獻以爵是也崔沔太常言爵小不及合執持至難沔曰禮有以小為貴者獻以爵是也然今不及制則非禮自有司之陋也隨失制儀不待議而革去三爵喧嘩李景伯中宗宴侍臣使酒酬令各為迴波詞眾皆為諂佞之詞至景伯曰迴波爾時酒卮微臣職在箴規侍宴既過三爵喧嘩切恐非儀中宗不悅中書令蕭至忠稱之曰此真諫官也舊史俎十六白取俎進俎不坐記凡為俎者以骨為貴賤殷貴髀周貴肩貴者取貴骨賤者取賤骨貴不重賤不虛示均也三牲之俎八簋之實美物備矣鳥獸之肉不登於俎則不射登俎謂祭用也凡祭於公者必自徹其俎主人自致其醬則客徹之非賓客一人徹同事各居者一食之人一人徹為聚食也凡燕婦人不徹質不備禮凡羞俎者則於內俎祭也孔伏身俎盤閻朝隱后有疾令往祀少室山乃沐浴伏身俎盤為犧請代后還奏會后亦愈大見褒賜淚落入俎戚見容色淚落入俎韓愈元和聖德詩樽俎既陳上巳日燕太學詩序禮數不同樽俎異爭持酒肉來相饋禮數不同樽俎異韓桃源圖雕俎靜嘉初筵循乎雕俎靜嘉劉禹錫武陵北亭記寇生幽陵文粹舒元輿國庠記自寇生幽陵軍旅之事殆勝俎豆房俎斯薦賀知章祭地迎俎樂章粢盛以絜房俎斯薦棋布盧從愿樂章太簇角品彙咸亭別俎棋布有馝張說祀天迎有馝章俎豆有馝潔粢豐盛薦俎登鉶劉禹錫低簪委紳薦俎登鉶俎入之後接神亦如之五曰雍和几祭祀以入俎天神之俎以黃鍾為宮地祇之俎以太簇為宮人鬼之俎以無射為宮又以徹豆几祭俎入之後接神之曲亦如之樂志禹雕其俎褚遂良曰舜造漆器禹雕其俎載肉于俎柳送韓存義序盈實芳俎盈實源光裕送神顏回捧俎豆杜牧俎豆有馨齊戒豐潔俎豆有馨張說開元樂章有豆孔碩蠲我漸饎潔我膋薌有豆孔碩為羞既藏賈曾樂白于豆于登籩豆靜嘉籩豆有踐並詩書曰駿奔走執籩豆謂來助祭周禮籩人掌四籩實朝事之籩朝事血腥其實麷蕡白黑形鹽膴鮑魚鱐饋食之籩薦熟時也其實棗栗桃橑橑乾梅加籩之實菱芡栗脯羞籩之實糗餌粉餈醢人掌四豆之實朝事之豆饋食之豆加豆之實羞豆之實禮記薦用玉豆雕篹篹籩屬揭豆獻豆楚子入享于鄭加籩豆六品傳季孫夙如晉晉侯享之有加籩辭曰下臣得享不過三獻請徹加然後入卒事晉人以為知禮卮酒豆肉孔齋娘奉籩豆祝欽明帝用其言以皇后為亞獻取大臣李嶠等女為齋娘奉籩豆歲豆時籩唐文粹李庾西都賦寧觀俎豆之容炎涼代序寧觀俎豆之容少室山少姨廟碑銘序楊炯鯤鮞遺胤莫不備俎豆柳宗元漁者對時饌通於宴享賓客文粹鉶俎籩豆簠簋樽罍之實皆周人之時饌也其用通於宴享賓客加籩豆議崔沔盡天下美物文粹雖加籩豆十二味足以盡天下美物而措諸清廟有兼倍之名近於侈矣同上今欲以甘旨肥濃皆充於祭張灼等議今欲以甘旨肥濃皆充於祭苟踰舊制其何極焉雖籩豆有加不能備也宗廟籩豆皆加十二韋縚三十三年赦令籩豆之薦未能備物宜令禮官共議縚乃請宗廟籩豆皆加十二旄頭彗紫微無復俎豆事杜甫衡山文宣王廟鼎臑俎胾五獻百籩凡百卿士班以周旋柳文平淮夷雅以為有道死乃俎豆之為立祠黃溪記同上淒淒陳述聖披褐鈕俎豆李賀贈陳商有楚其豆柳宗元祭文上乾豆以登歌杜甫享太廟籩以石鹽槁魚棗栗榛菱芡之實鹿脯白餅黑餅糗餌粉餈唐禮志豆以韭葅醯醢菁葅鹿醢芹葅兔醢筍葅魚醢脾析葅豚胉酏食糝食同上中祀之籩無糗餌粉餈豆無飲食糝食小祀之籩無白餅黑餅豆無脾析葅豚胉凡用皆四者籩以石鹽棗實栗黃鹿脯豆以葵葅兔醢菁葅鹿醢用皆二者籩以栗黃牛脯豆以葵葅鹿醢用皆一者籩以牛脯豆以鹿醢太官令凡冬至郊丘之祀昊天上帝籩豆各十二六典珍羞令掌供庶羞之事丞為之二以實籩豆陸產之品曰榛栗脯羞水物之類曰魚鹽菱芡辨其名數會其出入同上膳部州縣祭社稷釋奠每座籩豆名八簠簋俎豆如上同上凡郊祀凡郊祀天地日月星辰岳瀆及享宗廟百神在京師者所用籩豆簠簋鉶登俎之數魚脯醯醢之味石鹽萊果之羞並載於太官令州縣所實之物如京師之制同上祭服十八白祭服敝則焚之禹惡衣服而致美乎黻冕黻冕祭服記曰衛柳莊疾病雖當祭必告公再拜稽首請於尸曰有臣柳莊者社稷之臣也聞其疾請往至則不釋服而往遂以禭之郊天晉輿服志漢制二歲五郊天天子以執事所服各如方色百官不服執事者服常絳衣以從魏已來名為五時服正給四時秋服三年而一易入廟服又云公特進列侯卿大夫世婦夫人紺繒幗簪珥入廟自二千石夫人至皇后皆蠶衣為朝服絮巾魏志管寧字幼安徵不起每四時祭祀輒著絮巾故在遼東有帛單衣親薦饋饌跪拜成禮者也孔天子之服十四大裘冕祀天地袞冕踐祚饗廟驚冕有事遠王毳冕祭海岳絺冕祭社稷饗先農玄冕蜡祭百神朝日夕月唐志藏天子祭服百官志太常寺凡藏大享之器服有四院二曰御衣院藏天子祭服皮弁大裘始進於穹崇之幕杜甫南郊賦天子祀天地服大裘冕車服志顯慶元年長孫無忌等曰武德初撰衣服令天子祀天地服大裘冕按周郊被袞以象天戴冕藻有十二旒與大裘異月令孟冬天子始裘以禦寒若啟蟄祈榖冬至報天服裘可也季夏迎氣龍見而雩如之何可服故歷代唯服袞章漢明帝始采周官禮記制祀天地之服天子備十二章後魏周隋皆如之伏請郊祀天地服袞冕大裘請循歷代故事諸祭皆用袞冕又新禮皇帝祭社稷服絺冕四旒三章祭日月服玄冕三旒衣無章按令文四品五品之服也三公亞獻皆服袞孤卿服毳鷩是天子同於大夫君少臣多非禮之中且天子十二為節以法天烏有四旒三章之服若諸臣助祭冕與王同是貴賤無分也若降王一等則王服玄冕群臣服爵弁既屈天子又貶公卿周禮此文久不用矣猶祭祀之有尸侑以君親而拜臣子硩蔟蟈氏之職不通行者蓋多故漢魏承用袞冕今新禮親祭日月服五品之服請循歷代故事諸祭皆用袞冕制曰可同上凡冕服及爵弁助祭則服之唐六典凡冕服及爵弁助祭則服之若私家祭祀三品以上及褒聖侯祭孔子皆服玄冕五品以上服爵弁六品以下通服進賢冠之服
