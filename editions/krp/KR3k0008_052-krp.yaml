body:
  text: 白孔六帖卷五十二唐白居易原本宋孔傳續撰訓練一禁暴二用刑三示必死四戰死五行恵六不撫士七示信八有禮九軍整十謀畧十一料敵十二訓練一理兵附白鋭敏精勇簡練孟秋天子命將帥選士勵兵簡練傑俊専任有功以征不義詰誅暴慢鋭師訓必勝之衆練賈勇之夫士有陷堅之鋭訓旅觀兵振鐸號令也戒爾車乗厲兵秣馬繕甲治兵訓卒利兵鬭志鬭心卒乗輯睦蒐乗補卒脩我甲兵簡兵蒐乗陳師鞠旅振旅闐闐不教民戰是謂棄之御一心之衆舉百勝之師戮力三年而治兵以數軍實訓熊羆之旅修我戈矛我武惟揚鞭七人貫三人耳子玉治兵於蒍不戮一人子文治兵秋大閱簡車馬講武講事皆為農隙然令未申嚴師非訓練既無訓卒何以成功率素厲以行必無勇也驅白徒而戰是謂棄之素勵空猛非勇也白徒不習訓之師也行孫武之法治子文之兵簡其兵器周禮周禮大司馬仲春教振旅辨鼓鐸之用以教坐作進退疾徐疏數之節皆戰法遂以蒐田仲夏教茇舍如振旅辨名號之用遂以苖田仲秋教治兵辨旗物之用遂以獮田仲冬大閱修戰法遂以狩田王孫賈治軍旅申嚴季冬命將帥講武習射御角力乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外司徒搢扑北面以誓之誓衆以軍法天子乃厲飾執弓挟矢以獵厲飾謂衣戎服也月令有發則命大司徒教士以車甲發發軍也禮明耻教戰將整堂堂之陣必訓赳赳之夫訓戎教戰載纉武功纉繼也晉作被廬之蒐楚自克庸以來無日不討軍實而申儆之傳出曰治兵入曰振旅公羊傳三時務農一時講武一時冬也故征則有威守則有材國語虢文公曰管仲寄軍政具軍政門連率比年簡車十國為連連有率卒正三年簡徒三十國為率率有正牧羣牧五載大簡車徒三百國為州州有牧斬牲郊禮畢始揚威武斬牲以薦太常令謁者一人載以䕶車馳送陵廟還宫遣齎束帛賜文武肄兵習戰之儀斬牲之禮名曰貙劉建而不斾傳曰晉治兵甲車四千乗建而不斾壬申斾之諸侯畏之注將戰則斾不戰則不斾鬭場後漢咸和中詔内外軍戲兵於南郊之場名曰鬭場孔舉動安重來瑱能撫訓七舉動安重賊不能侵校旗郝廷玉曰王善御軍賞當功罰適過每校旗不如令者輒斬人皆自效而赴蹈馳突心破膽裂自臨淮歿無復校旗事閱武力顧少連為東都留守閱武力利鎧仗號良吏郭子儀奏曰願陛下付臣以訓兵禦侮則中興之功日月可冀講兵與諸鎮抗王處存徙節度河中歳時講兵與諸鎮抗無能侵軋者突厥序杜牧曰天下無事時大臣偷處榮逸戰士離落兵甲鈍弊車馬刓弱天下雜然盜發則疾驅以戰是謂宿敗之師此不蒐練之過其敗一也其訓勉士卒必流涕屈突通其訓勉士卒必流涕故力雖窮而人尚為之感奮選徒練旅有衆孔武栁宗元興州江運記號令齊一贊皇一品集牛僧孺等公卿集議自古所云烏合之衆皆謂臨時召募未經訓習如韓信驅市人而戰即是烏合陳許淄青等兵並是節制等師久經戰伐但令一處指揮自然號令齊一固不可謂之烏合料擇伏瘴舊獠與州兵之任戰者李徳裕徙劒南節度使料擇伏瘴舊獠與州兵之任戰者廢遣儜耄十三四士無敢怨又請甲人於安定弓人河中弩人浙西由是蜀之器械皆犀鋭率户二百取一人使習戰貸勿事緩則農急則戰謂之雄邊子弟已未講武於繁臺梁開平元年訓練强兵動鬼神杜甫寄章侍御教練羽林兒同上獨任崇文髙崇文為長武城使劉闢阻兵朝議討伐宰臣杜黄裳以為獨任崇文可以成功宿將専征者甚衆人人自謂當選及詔出大驚崇文在長武城練卒五千常若寇至及是中使至長武夘時宣命而辰時出師五千器用無闕者八大戰皆大㨗舊史選將練兵甚有法五代梁臣朱珍太祖初鎮宣武珍為太祖選將練兵甚有法太祖得諸將所募兵及佗降兵皆以屬珍府兵其能騎而射者為越騎其餘為步兵武騎排䂎手步射每歳季冬折衝都尉率五校兵馬之在府者置左右二校尉兵志禁暴二白兵猶火也不戢將自焚整旅將何以戰黷武吳侵陳斬祀殺厲謂之殺厲之師厲病也祀神屋武有七徳禁暴戢兵暴而不戢安得定功上武糾暴糾察也周禮軍禁師禁申嚴號令月令凡執禁以齊衆知防掠人黷武茍不戢兵何以為將何以制敵吳師斬祀見上羊祜反禾曹公敗麥俱見上注師必有名莫先率義如或不能戢兵則將焉用彼將責帥能軍當陳之隧井堙木刋將求衆整必在令行整烏合之衆必在有威訓鷹揚之師豈宜不戢整軍而經武孔列卒斷首置槊上段秀實郭晞屯邠州士放縱不法白孝徳為節度使不敢劾俄而晞士十七人入市取酒刺酒翁壊釀器秀實列卒取之斷首置槊上植市門外禁止暴兵獨孤及上疏陛下宜禁止暴兵節用愛人折逆旅匕箸髙崇文過興元士有折逆旅匕箸者即斬以徇衞士等共擊之突利子賀邏鶻帝幸九成宫突利弟結社率以郎將宿衞陰結種人謀反刼賀邏鶻北還謂其黨曰我聞晉王丁夜得辟仗出我乗間突進可犯行在是夕大風㝠王不出結社率恐謀漏即射中營譟而殺人衞士等共擊之乃走殺廐人盜馬欲度渭徼邏擒斬之赦賀邏鶻投嶺外突厥訖無犯者藩鎮李載義始回鶻使者歳入朝所過暴慢吏不敢呵禁但嚴兵自守虜狃習益謷悍至鞭候人剽突市區時大酋李暢者曉華人語尤凶黠既就館横須索抶疻郵人載義召暢語曰可汗以舅甥故使將軍朝貢誼不容將軍暴也天子厚饔餼以禮客有不謹吏皆論死若將軍所部不戢而敓攘自如我必殺所犯者將軍其少戒因悉罷所防兵以兩卒䕶闔暢嚴憚之訖無犯者禁暴安人為將臣之良李抱玉在鎮十餘年雖無破虜功而禁暴安人為將臣之良殺賊取功劉崇望玉山都將楊守信反夜陳兵闕下帝列兵延喜門命崇望守度支庫黎旦含光門未開禁卒左右植立將大掠長安中俄聞傳呼宰相來者門闢崇望駐馬勞曰上自將在中營公等禁軍也不帝前殺賊取功而茍欲剽掠成惡名乎士皆唯唯至長樂門賊望兵至乃遁去軍中咸呼萬歳是日京師不亂繄其力用刑三白軍旅之事叛而不討何以示威訓必勝之師罪非無赦勵陷堅之卒令在惟行猛以濟寛威克厥愛戎昭果毅易之戮也整軍而經武師出以律否臧凶易刑者戰之器也申叔時云師衆以順為武軍士有死無犯為敬魏絳曰揚干亂行魏絳甪鉞戮其僕也臣干旗鼓犯令也三罪而人服晉文公士唯聞將軍之令亞夫軍細栁師以嚴終功用威克屬在戎行貞其師律鞭七貫三雖爽理兵之體罰一勸百宜宣用鉞之威有令必行無瑕可戮立武知禁守文經武戮其犯命者周禮又察軍慝慝陰姦也軍刑周禮不用命戮于社書軍禁周禮師執禁以齊衆不赦過禮大為防而猶踰小不忍而恐亂若施用刑之威恐貽責帥之恥明恥教戰撓孫吳之法仁而武無能違也愛克厥威齊之以法訓鷹揚之師令宜先定整烏合之衆刑在必行率職用威齊人以法敗軍責帥受棨既等於秦彭用鉞何殊於魏絳用法伏辜魏絳戮揚干之僕陸遜髠孫松之吏見上注孔斬千二百人曹華擢横海軍節度副使時朝廷披鄆為三鎮其明年兖海軍亂殺觀察使王遂詔華往代視事三日合軍大饗慕甲士于廡酒中令曰天子以鄆人參别而戍有轉從勞欲厚賞之請鄆人右州人左既而出州兵乃闔門大言天子有命誅殺帥者甲起于幕環之凡斬千二百人血流殷渠赤氛冐門髙丈餘海沂之人重足屏息鞭背周墀拜義成節度使宿將暴謷不循令者墀命鞭其背一軍大治殺人流血李希烈資慘害臨戰陣殺人流血於前而飲食自若也驅人填壍乗襄城之㨗進攻汴州入之運土木治道怒不如程驅人填壍號濕梢斬崔衆以徇軍光弼以景城河間兵五千入太原前此節度使王承業政弛謬侍御史崔衆主兵太原每侮狎承業光弼素不平及是詔衆以兵付光弼衆素狂易見光弼長揖不即付兵光弼怒收繫之㑹使者至拜衆御史中丞光弼曰衆有罪已前繫今但斬侍御史若使者宣詔亦斬中丞使者内詔不敢出乃斬衆以徇威震三軍繁臺之誅五代杜重威初契丹留燕兵千五百人在京師髙祖入自太原入告者言其將反髙祖悉誅於繁臺其亡者犇于鄴燕將張璉先以兵二千在鄴聞燕兵見殺乃勸重威固守髙祖已殺燕兵悔之數遣人招璉等璉登城呼曰繁臺之誅燕兵何罪既無生理請以死守重威食盡屑麴而食朝鼎夕砧蘇頲今吐蕃遣渠領干犯國令軍吏一不勝而陛下屈至尊為之敵雖朝鼎夕砧猶未足以夸四夷臨賊境而害主將李國貞死以郭子儀代之及子儀至王振自謂且見徳子儀怒曰汝臨賊境而害主將賊若乗虚是無絳奕又欲為功乎即斬以徇示必死四白背水韓信為背水陣下井陘焚舟傳孟明伐晉濟河焚舟注示必死不復渡也塞井夷竈皆示必死歌虞殯具唅玉吳伐齊齊公孫夏命其徒歌虞殯陳子行命其徒具唅玉皆示必死率先士卒整無敵之旅勵必死之夫其可敵乎誰能禦之躬擐甲胄親授矢石莫有死志使三軍之士視死如歸李陵湛舟破釡甑燒廬舍項羽伐秦渡河乃破釡甑燒廬舍持三日粮示必死無還心於是大破秦軍臨難毋茍免禮死志統率先之卒誓以忘身握尚右之兵示其必死白刃可蹈袵金革死而不厭袵席也孔鬭死有名荔非元禮光弼守河陽周摯攻北城出戰摯軍小却元禮以敵堅未可以馳還軍示弱怠其意光弼怒使召元禮欲按軍法答曰方戰不及往顧麾下曰鬭死有名無庸受戮乃下馬持刀瞋目直前鋭士堵而進左右奮擊一當數人斬賊數百首内刀於鞾李光弼為天下兵馬副元帥將戰内刀於鞾曰戰危事吾位三公不可辱于賊萬有一不㨗當自刎以謝天子及思明奔西河拜舞三軍感動許以死又史思明將李日越請降雍希顥與俱至光弼厚待之表授特進兼金吾大將軍髙暉聞亦降或問公降二將何易也光弼曰思明再敗恨不得野戰聞我野次彼固易之命將來襲必許以死希顥無名不足以為功日越懼死不降何待髙暉材出日越之右降者見遇貳者得不思奮乎效死秋張説為天平軍大使朔方大使王晙誅河曲降羌阿布思也九姓同羅拔野固等皆疑懼説持節從輕騎二十直詣其部宿帳下召見酋豪慰安之副使李憲以羌難信不宜涉不測説報曰吾肉非黄羊不畏其食血非野馬不畏其刺士當見危致命亦吾效死秋也由是九姓遂安蹈萬死取一生李嗣業廣平王收長安嗣業統前軍陣于香積祠北賊酋李歸仁擁精騎薄戰王師注矢逐之走未及營賊大出掩追騎還蹂王師於是亂不能陣嗣業謂子儀曰今日不蹈萬死取一生則軍無類矣即袒持長刀大呼出陣前殺數十人陣復整步卒二千以陌刀長柯斧堵進所向無前歸仁匿兵營左覘軍勢王分回紇鋭兵擊其伏嗣業岀賊背合攻之自日中至昃斬首六萬級填澗壑死幾半賊東走遂平長安不介胄而馳來濟突厥入寇濟總兵拒之謂其衆曰吾嘗絓刑罔蒙赦死今當以身塞責遂不介胄而馳賊沒焉戰死五白以死繼之死寇視死如歸袵金革死而不厭死衞國家吾未獲死所狼瞫曰喪歸灌孟戰死軍法父子俱從軍有死事得與喪歸灌夫不肯歸願取吳將報父讐也為轊歸髙詔從軍死者為轊歸其縣給衣衾葬具祠以少牢長吏視葬刻木葬曹公領兖州牧擊黄巾鮑信戰死購求信喪不獲乃刻木為信祭而葬之襄老死於邲不獲屍傳義貫幽魂徳光往業孔房𤣥齡上疏曰陛下先決死罪必三覆五奏進疏食停音樂以人命之重為感慟也今士無一罪驅之行陣之間委之鋒鏑之下使肝腦塗地老父孤子寡妻慈母望轊車抱枯骨摧心掩泣其所以變動陰陽傷害和氣實天下之痛也士死麻葦房琯敗士死麻葦兄弟死於陣子姓沒於軍僕固懐恩上書陳情曰先帝委臣以兵誓雪國讐攻城野戰身死士卒兄弟死於陣子姓沒於軍九族之内十不一在而存者瘡痍滿身露胔蔽野李光弼傳安禄山反自顔杲卿死郡為戰區露胔蔽野光弼酹而哭之被髪呼天血流出眥懐光反是夕奪二軍恵元建徽走奉天懐光遣將冉宗馳騎追及於好畤恵元被髪呼天血流出眥袒裼戰而死陽恵元傳力戰而死五代王清杜重威遣與宋彦筠俱前清與羌戰敗之奪其橋是時重威已有貳志猶豫不肯進彦筠亦退走清曰吾獨死於此矣因力戰而死歿于陣五代史彦超周兵伐漢太原契丹救漢出忻代世宗遣符彦卿拒之以彦超為先鋒戰忻口彦超勇憤俱發左右馳擊解而復合者數四遂歿于陣是時世宗敗漢髙平乗勝而進圍城之役諸將議不一故久無成功世宗欲解去而未訣聞彦超戰死遽班師死戰猶足報國五代皇甫遇羌兵與遇戰自午至未解而復合益出生兵勢甚盛遇戒慕容彦超曰今日之勢戰與走爾戰尚或生走則死也等死死戰猶足報國張從恩與諸將恠遇視羌無報皆謂遇已陷于羌矣已而有馳騎報遇被圍安審琦率兵將赴之士戰歿者皆遣使弔祭劉仁軌先是貞觀永徽中士戰歿者皆遣使弔祭或以贈官推授子弟顯慶後討伐恩賞殆絶仁軌具論其弊請加慰賚以鼓士心士有戰死以其妻殉杜伏威士有戰死以其妻殉故人自奮戰無完敵王清從杜重威軍中渡橋南羌軍其北以相拒五代史行恵六白勤恤其人與之勞逸熟食者分而後食吳闔廬在軍云云君子不重傷慈愛戰所畜也士蒍曰挾纊楚子伐蕭師人多寒王循三軍撫而勉之三軍之士皆如挾纊徳以施恵戰所由克申叔時曰愛克厥威允罔功書恩加挾纊念師人之多寒恵表投醪感戰士之俱醉置金廡下史記吳楚反上拜竇嬰為大將軍賜金千斤嬰陳於廡下將士過者令裁取為用裁酌也封魏其侯外國懐恩後漢耿秉字伯初為征西將軍單于懐恩及聞卒舉國發哀刺面流血小人懐恵小恵未徧曹劌曰恵則足以使人施恵禮立已推誠示人以恵大事在戎是重握兵之要小人懐恵必資挾纊之恩御衆在寛使人由恵觴酒豆肉未嘗不分國語越王勾踐將伐吳謂申包胥曰在孤側者觴酒豆肉未嘗不分國中疾者吾問之死者吾葬之長其孤問其老記曰宋陽門之介夫死司城子罕哭之哀晉人之覘宋者反報於晉侯曰宋不可伐子曰善覘國乎其所嘗者卒乗與焉闔廬衞士請留報徳漢盖寛饒次公為衞司馬躬撫士卒視其飲食居處撫循疾病致醫藥及歳終交代衞士數千人叩頭願自留一年報寛饒厚徳宣帝嘉之士卒不盡飲不近水不盡餐不嘗食李廣得賞賜分麾下見水云云士樂為用也吮卒疽史吳起為將士卒最下者同衣食卧不設席行不騎乗親裹贏粮與士卒分勞卒有病疽者起為吮之其母哭曰往年吳公吮其父父戰不旋踵而死於敵今又吮此子妾不知死所矣分賜縑後漢董卓字仲頴得賜縑悉分吏兵曰無者則已有者則士裹創後漢段頴愛士卒手與裹創行軍未嘗蓐寢與士同勞苦分賜絹與亡者家魏志孫禮為揚州刺史與吳全琮戰賊退詔賜絹七百匹禮為死者設祭哀臨以絹付亡者家無自入已者壊帳為士襦袴晉謝尚字仁祖為厯陽守始到官郡以布三十匹為尚造烏布帳尚壊之以為軍士襦袴載稻與脂國語勾踐命當室者死三年釋政支子死三月釋政親載稻與脂於舟以行國之孺子㳺者無不餔也無不歠也必問其名非身種夫人織則不衣食也魯昭公伐季氏子家子曰政自之出久矣隠民多取食為之徒者衆矣傳脱衣歛後漢王霸字元伯善撫士卒死者脱衣斂之聞持更聲苦劉𢎞為荆州嘗夜起聞城上持更者歎聲甚苦呼省之年過六十羸痩無襦𢎞謫主者仍給韋袍複㡌也孔民知有生之樂裴度初元濟禁偶語於道夜不然燭酒食相饋遺者以軍法論度視事下令唯盜賊鬭死抵法餘一蠲除往來不限晝夜民始知有生之樂與下同苦李晟收復京師時輸縑不屬盛夏士有衣裘者晟能與下同其苦視其資粮存問家室李勉遣戍兵常視其資粮存問家室故能得人死力士卒病親存問所欲劉澭拜春州刺史屯普潤軍中不設音樂士卒病親存問所欲不幸死哭之婚嫁皆厚資韋臯善拊士至雖婚嫁皆厚資之壻給錦衣女給銀塗衣賜各萬錢死喪者稱是賊降輒聽其便李愬為隨唐鄧節度使愬推誠待士故能張其卑弱而用之賊來降輒聽其便或父母與孤未葬者給粟帛遣還勞之曰而亦王人也無棄親戚衆願為愬死故山川險易與賊情偽一能曉之身居㦸户踰月任迪簡為節度使代張茂昭承茂昭奢縱後公私屈乏欲饗士無所給至與下同糲食身居㦸户踰月軍中感其公請安卧内迪簡乃許得士心烏重嗣以耆將兼節度滄景出行伍善撫士與下同甘苦蔡將李端降重嗣蔡人執其妻殺之妻呼曰善事烏僕射得士心大抵如此下樂為用李光顔善撫士其下樂為用金帛散士卒李勣戰勝得金帛盡散之士卒無私財安足麤淡與天下共勞苦殷侑拜義昌節度使單身之官安足麤淡與天下共勞苦以仁恵為治安邊不生事王忠嗣徙河東節度使忠嗣本負勇敢及為將乃能持重安邉不生事嘗曰平世為將撫衆而已吾不欲竭中國力以幸功名司空李勣每㑹將兵在軍識其臧否聞人片善扼腕而從事㨗之日多推功於下前後在軍所得金帛皆散之將士以是人皆為用所向多克㨗及薨哭之或有嘔血者通典兵五撫士衞兵數逃請聽納室裴矩煬帝幸江都宫是時衞兵數逃去帝憂之以問矩矩曰今乗輿淹狩已二年諸驍果皆無家人無匹合則不久安臣請皆聽納室帝笑曰公定多智因詔矩盡召江都女子孀家恣將士所欲即配之人情翕然相悦曰裴公恵也宇文化及亂衆刼矩賊皆曰裴黄門無豫也士皆感慰盧坦吳少誠之誅詔以兵二千屯安州坦每朔望使人問其父母妻子視疾病醫藥故士皆感慰無逃還者厚給栁公綽徙鄂岳觀察使時方討吳元濟詔發鄂岳卒五千𨽻安州軍出公綽數省問其家疾病生死厚給之朝廷賜與悉分士伍石雄為晉絳行營諸軍副使雄臨財亷每朝廷賜與輒置軍門自取一匹縑餘悉分士伍由是衆感發無不奮先冬頒衣絮錢徽樊澤署掌書記蔡賊方熾澤多募武士于軍澤卒士頗希賞周澈主留事重擅發軍廥不敢給時大雨雪士寒凍徽先冬頒衣絮士乃大悦傷夷病疾親為營䕶李愬士傷夷病疾親為營䕶戰得金寶盡散李宻戰得金寶盡散之繇是人為用裂帷幄以衣士卒吳巒守貝州善撫士卒㑹天大寒裂其帷幄以衣士卒士卒皆愛之五代史路人送者皆號泣五代牛存節為潞州都指揮使太祖召存節為將法令嚴整而善得士心除去苛暴昭宣恵和元稹鎮州制田𢎞正首除去苛暴昭宣恵和愛人如身養士如子拊循教訓必以忠孝為先是以魏之師徒一年而知恩二年而知禮三年而知讓相與於道矣開心待人南霽雲至睢陽與張巡計事退謂人曰張公開心待人真吾所事也遂留巡所葬戰死之骨增以延賞憐刃傷之肌荐其廪給栁文賀平淄青狀與士卒同甘苦五代王廷𦙍為人驍勇自為軍校能與士卒同甘苦亡卒多賴以全活五代王敬蕘梁兵攻吳龎師古死清口敗兵亡歸過頴大雪士卒饑凍敬蕘乃㳂淮積薪為燎為作糜粥餔之亡卒多賴以全活不撫士七白毋閉門不納楚子反攻秦士卒分菽糧而食將軍芻豢黍稷戰敗毋閉門不納佩玉蘂兮余無所繫之吳申叔儀乞糧於公孫有山氏云云㫖酒一盞兮予與褐之人睨之睨邪視也言已與被褐之人同得視之不得飲傳言吳王夫差不恤士也衞懿公好鶴鶴有乗軒者將戰國人授甲皆曰使鶴鶴實有禄位予焉能戰傳躢鞠漢嫖姚將軍霍去病少貴不省士其從軍上遣大官齎數十乗而士有饑色其在塞外卒乏粮不能自振去病尚穿城躢鞠注穿地作鞠室為之實以毛蹙蹋而戲謂將為卒晉謝萬受任北征常以嘯詠自髙未嘗撫衆兄安謂曰諸將宜數接對以悦其心乃集諸將以如意指四座云諸將皆勁卒也將益恨之將不省兵晁錯云闗侯善待卒而驕士大夫張飛愛敬君子不恤小人蜀志乞襦不與晉宣帝仲達兵士寒凍乞襦帝不與或曰王府故襦可以賜之帝曰襦者官物人臣無私施孔餉道乏韋待價拜安息道行軍大總管天大寒待價不善撫御師人多死餉道乏乃旋師不恤士李宻既殺翟讓心稍驕不恤士故繒陳綵皇甫鎛帝斥内帑所餘詔度支評直鎛貴售之以給邊兵故繒陳綵觸手輒壊士怨怒聚焚之裴度以其事聞鎛指所著鞾曰此内庫所出牢韌可服彼言不可用詐也帝信之詬責士皆曰反囚張𢎞靖其詬責士皆曰反囚嘗曰天下無事而輩挽兩石弓不如識一丁字軍中以氣自任衘之償直以鹽陸長源董晉卒長源總留後事大言曰將士久慢吾且以法治之衆始懼軍中請出帑帛為晉制服不許固請止給其直孟叔度希望又償直以鹽乃髙鹽直賤帛估人得鹽二斤舉軍大怒或勸長源曰故事有大變則厚賜于軍軍乃安長源曰異時河北賊以錢買戍卒取旌節吾不忍為衆怒益甚長源性剛不適變又不為備纔八日軍亂殺長源及叔度等食其肉治裝悉帑以行程日華為張孝忠牙將滄故成徳部州也孝忠絶李惟岳徳宗以滄畀義武前刺史李固烈與惟岳姻屬即牢守孝忠令日華往喻之固烈請還恆州既治裝悉帑以行軍中怒曰馬瘠士飢死刺史不棄毫髪恤吾急今刮地以去吾等何望遂共殺固烈屠其家米籺不饜哥舒翰為人嚴少恩軍行未嘗恤士飢寒有㗖民椹者痛笞辱之監軍李大宜在軍中不治事與將士摴蒱飲酒彈箜篌琵琶為樂而士米籺不饜帝令中人袁思藝勞師士皆訴衣服穿空帝即斥御服餘者製袍十萬以賜其軍翰藏庫中及敗封鐍如故軍士苦大熱范延光反遣牙將孫鋭澶州刺史馮暉以兵自萬距黎陽掠滑衞髙祖以楊光逺為招討使𢎞兵滑州渡胡梁攻之鋭輕脱無謀兵行以娼女十餘自隨張盖操扇酣歌飲食自若軍士苦大熱皆不為用光逺得其謀誘鋭等渡河半濟而擊之兵多溺死五代史倡優蒱簺相娛樂渾隴武士飯糲米日不厭而責死戰其敗固宜髙適損糧以漁利季叔良武徳初被命鎮涇州捍薛仁杲仁杲内史令翟長孫以衆降於是大饑米十千錢叔良不恤士損糧以漁利下皆怨皆帶飢寒辛替否䟽當今發一卒以禦邊陲追一兵以衞社稷多無衣食皆帶飢寒賞賜之間迥無所出軍旅驟敗莫不由斯示信八事具信門白古之為軍不以險阻申叔時曰禮信戰之器也信以守物戰所由克晉侯欲用人子犯曰人未知信未宣其用於是乎伐原以示之信晉侯伐原命三日之糧原不降命去之諜出曰原將降矣軍吏請待之公曰得原失信何以使人退一舍而原降也能以徳攻君子謂晉於是役也不待期而薄人於險無勇也胥甲趙穿當晉軍門而呼曰云云與敵人剋日戰晉羊祜叔子為鎮南每與敵人剋日戰而不為掩襲之計授律即戎位既崇於四七推誠示信言不可於二三推己貴誠訓戎在信仗信推誠示人以信能軍訓戎饋藥不疑晉羊祜為鎮南以徳綏懐吳將陸抗疾祜遺之藥抗服之或疑止之抗曰羊公豈酖人者哉互市吳之未平周俊字士林在弋陽南北為互市而諸將多相襲奪以為功吳將于敏守沔中其兄珪與敏書曰慎無為小利忘大備候者得書呈俊俊曰君子也孔以蔡牙卒侍帳下裴度以蔡牙卒侍帳下或謂反側未安不可去備度笑曰吾為彰義節度元惡已擒人皆吾人也衆感泣以恩信為士卒所服段秀實擢光禄少卿俄而元禮為麾下所殺將佐多死惟秀實以恩信為士卒所服皆羅拜不敢害示以至誠郭子儀傳僕固懐恩誘吐蕃回紇党項羌渾等三十萬掠涇邠躪鳳翔入醴泉奉天京師大震急召子儀屯涇陽軍纔萬人比到虜騎圍已合子儀將出左右諫戎狄野心不可信子儀曰虜衆數十倍今力不敵吾將示以至誠置一指以示信張巡傳南霽雲見賀蘭進明愛霽雲壯士欲留之霽雲泣請置一指以示信歸報中丞也因拔佩刀斷指一座大驚為出涕對榻卧起孔戣鄭滑盧羣辟為判官羣卒總攝留務監軍楊志謙雅自肆衆皆怨戣邀志謙至府與對榻卧起示不疑志謙憚嚴不敢動鄧艾得田章既登長驅緜竹魏平得田疇為導潜出盧龍鄧艾得田章既登長驅緜竹段文昌平淮西碑志定金石楊炎出師紀聖功頌夏有一旅之衆武有十人之同志定金石信非盟誓爾其念哉保兹誠信一品集與黠戞可汗書豈必罄經路之金舉留犂之酒保兹誠信固在厥初推誠待士李愬推誠待士故能張其卑弱而用之披而示之心馬燧賊將徐庭光守長春宫城燧度長春不下則懐光固守久攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧顧其心已屈徐曰我自朝廷來可西向受命廷光再拜燧曰公等朔方士自禄山以來功髙天下奈何棄之為族滅計若從吾言非止免禍富貴可遂也未對燧曰爾以吾為欺邪今不逺數步可射我披而示之心廷光感泣一軍皆流涕即率衆降燧以數騎入其城衆大呼曰吾等更為王人矣頡利請和翌日刑白馬與盟薛延陀回紇諸部皆叛使突利討之不勝懼王師引兵入朔州議者責其敗約因伐之帝曰匹夫不可為不信況國乎我既與之盟豈利其災邀險以取之邪頡利傳有禮九禮軍容附白晉侯觀其師曰少長有禮其可用也傳輕則寡謀無禮則脱脱輕也秦師輕而無禮必敗過周北門王孫滿觀之云云師克在和禮樂慈愛戰所畜也申叔時曰禮信戰之器也禮以順時戰所由克有嚴有翼軍旅有禮故武功成軍容戎政晉侯教人三年欲用之子犯曰人未知禮未生其恭於是大蒐以示之禮能以徳攻兵交使在其間可也人於是大服軍旅之容暨暨詻詻周禮殺人之中又有禮焉齊衆班朝治軍涖官行法非禮威嚴不行禮戎容禮軍旅什伍同爵則尚齒而弟達乎軍旅矣戎昭師偉堂堂之陣棣棣之容戎行戎政貴明軍容尚肅能軍訓戎聞喪而還傳曰陳成公卒楚人將伐陳聞喪而還禮也禮不伐喪狂狡失禮違命宜其為擒也狂狡宋大夫為鄭所獲戎昭果毅以聽之之謂禮易之戮也介胄之士不拜為其拜而蓌拜也禮率軍禮以長揖西征賦説周亞夫軍容詻詻教令嚴也色容厲厲肅也戎容暨暨果毅也介胄有不可犯之色孔櫜鞬謁道左李囘張仲武合太原軍攻潞復以回為使督戰至蒲東王宰石雄櫜鞬謁道左回不弛行顧左右呼直史責破賊限循循有禮遜吳溆遷大將軍漵循循有禮遜無倨氣矜色見重朝廷具軍容伏謁栁公綽山南東道節度牛僧孺罷政事為武昌節度使公綽具軍容伏謁具軍容迎灞上郭子儀收東都入朝帝遣具軍容迎灞上勞之曰國家再造卿力也子儀頓首謝以宰相禮受謁李愬入蔡州乃屯兵鞠場以俟裴度至愬以櫜鞬見度將避之愬曰此方廢上下分久矣請因示之度以宰相禮受愬謁蔡人聳觀乃還屯文城柵厮養必整衣見張巡雖厮養必整衣見之與部曲語未嘗不名史匡翰為將沈毅有謀而接下以禮與部曲語未嘗不名五代史計元濟且望救於董重質以書召重質李愬入蔡計元濟且望救於董重質乃訪其家慰安之使無怖以書召重質重質以單騎白衣降愬待以禮軍整十白不整則喪列傳齊救鄭陳成子帥師違榖七里榖人不知違去也不知言軍整也漢王入闗秋毫無犯不掠後漢世祖問諸將所得物惟李忠無所掠世祖賜所乗大驪馬及繡被又吳志孫皓督夏口兵侯獲美女進皓皓更衣服還之下令曰今所誅者曹氏百姓何罪不得繫老弱於是多附也百姓安堵蜀志諸葛亮悉大衆由斜谷出五丈原分兵屯田耕者雜於渭濵百姓安堵軍無私焉又晉陶侃戎政齊肅士卒無私不樵樹不採藝舍不為暴好以衆整晉欒鍼對楚子重送絹酬禾晉羊祜入吳境刈榖為糧送絹酬之孔師屯大逵市井不移髙崇文劉闢陷東川其將李文悦執闢子方叔壻蘇姜遂趣成都餘兵皆面縛送欵闢走追擒之檻送京師入成都也師屯大逵市井不移珍寶如山無秋毫之犯持法嚴整王思禮持法嚴整士不敢犯坊人逺者宿昔乃知王師之入李晟引軍屯含元外延舍右金吾次令軍中曰五日内不得輒通家問違者斬遣京兆尹李齊運部長安萬年令分慰居人秋毫無所擾别將髙明曜取賊妓一司馬伷取賊馬二即斬以徇坊人之逺者宿昔乃知王師之入也長安之人不識旗鼓又露布至梁帝感泣羣臣上夀且言晟蕩夷兇憝而市不易㕓宗廟不震長安之人不識旗鼓雖三代用師不能加之整衆李光弼與九節度圍安慶緒於相州諸將驚潰各引歸所在剽畧獨光弼整衆還太原折逆旅匕箸者即斬髙崇文為左神䇿行營節度使卯漏受命辰巳出師器良械整無一不具過興元士有折逆旅匕箸者即斬以徇號令静嚴李靖蕭銑降靖入其都號令静嚴軍無私焉所過不敢伐桑棗踐禾稼宗室臯遷荆南節度使凡戰大小三十二師所過不敢伐桑棗踐禾稼轉鬭陷陣所向無前劉仁軌百濟故將福信及浮屠道琛迎故王子扶餘豐立之引兵圍劉仁愿詔仁軌統王文度之衆并發新羅兵為援仁軌將兵嚴整轉鬭陷陣所向無前與諸將割臂盟李嗣業安禄山反肅宗追之詔至即引道與諸將割臂盟曰所過郡縣秋毫不可犯瓶罍不發陽恵元田悦増河上兵河南大擾詔移兵萬二千戍闗東帝御望春樓誓師因勞遣諸將酒至神䇿將士不敢飲帝問故恵元曰初發奉天臣之帥張巨濟與衆約是役也不立功毋飲酒臣不敢食其言既行有饋於道惟恵元軍瓶罍不發帝咨嘆不已整飭諸邏李觀為右龍武將軍涇師叛觀適番上即領兵千餘扈徳宗奉天詔盡察諸軍整飭諸邏増募五千人鼙旝讙豎士氣益振盛夏號令若負霜雪李宻持軍嚴雖盛夏號令若負霜雪檢軍令狐彰拜滑亳魏博節度使躬訓吏下檢軍力農法令嚴無敢犯者治謹于法下有犯雖毫髮比不肯貸辛雲京袍仗精整楊洪禮太宗征遼東拜兵部侍郎帝嘗自山下望其衆袍仗精整人人盡力壯之曰越公兒郎故有家風所過樵蘇無犯李晟拜神䇿行營節度使進臨渭北壁東渭橋所過樵蘇無犯法令嚴整牛存節為將法令嚴整而善得士心路人送者皆號泣嘆法令嚴五代安巴堅㑹天大雪契丹人馬飢寒多死安巴堅顧盧文進以手指天曰天未使我至此乃引兵去莊宗攝其後見其宿處環秸在地方隅整然雖去而不亂嘆曰彼法令嚴盖如此也自齎糧所過無秋毫犯令狐彰吐蕃盜邊召防秋兵彰遣士三千自齎糧所過無秋毫犯供擬讓不受時韙其能整衆山立無秋毫犯王雄誕每破城邑整衆山立無秋毫犯謀畧十一白萬人之敵運神筭善計先知獨見獨斷吳用子胥之謀入楚以三帥𨽻之君請子畫畫計䇿用於戰勝則無敵禮七擒七縱諸葛亮百戰百勝武安君六出竒謀陳平決勝運籌髙祖曰運籌帷幄之中決勝千里之外吾不如子房龍韜豹畧拔幟之計韓信攻井陘劒術無前碩畫大畧制勝於廟筭逺畧使輿曵柴而偽遁欒枝先人有奪人之心軍之善謀也相時而動専謀知戰觀釁而動中權後勁其何不濟以竒用兵老子臨難制變王兵先勝而後戰文子有征無戰出竒於術内制勝於彀中借箸一當萬晉杜元凱有滅吳計語人曰以計伐戰一當萬成百克之計定一舉之功軍要兵機善計潜行破勍敵於籌畫之下竒謀獨運解重圍於談笑之間運謀戎畧伐謀伐之以謀畧受成成兵謀也茍未知兵何以為將智合於權義和於利料敵曵柴之謀破竹之勢將執律以嚴終在運籌而謀始能軍之畧視其轍亂望其旗靡故逐之曹劌曰大國難測懼有伏焉傳無扞採樵者楚伐狡莫敖曰狡小而輕請無扞採樵者以誘之帝王之兵貴謀賤戰戰不必勝不茍接刃趙充國云置之死地而後生韓信攻趙背水為陣曰今驅市人而戰故置之死地使人人自為戰也先聲而後實廣武君李左車曰軍固有先聲而後實左實右偽以斾先右以衣物為人形晉侯伐齊平陰時減竈孫臏伐龎涓增竈後漢虞詡升卿為武都守羌遮陳倉詡日夜行令士各作兩竈曰増倍羌見吾益倍必謂有郡兵來昔孫臏示弱今吾示彊羌果畏而不敢逼䇿慮愊憶漢陳易字公子不學古兵法帝使霍去病學孫吳故法曰顧方畧何如爾不至學古兵法百聞不如一見上問趙充國伐羌何如用幾人充國曰百聞不如一見兵難踰度踰遥也臣願馳至金城圗上方畧焚營度尚為荆州以士卒驕不肯戰宻焚其營珍寶遂破賊清嘯胡笳劉琨越石嘗為胡騎所圍窘迫無計乃乗月登樓清嘯賊聞之悽然中奏胡笳賊又流涕向曉復吹之賊並棄圍而走攻其怠以擊疑因其虚而止散利以誘之亂而取孔與帝意合裴度視行營奏攻取䇿與帝意合誅易之兄弟朱敬則初二張權寵盛敬則宻謂敬暉曰公若假太子令舉北軍誅易之兄弟兩飛騎力爾敬暉卒用其䇿紿為臺檢康日知少事李惟岳擢累趙州刺史惟岳叛日知與别駕李翟及部將百人啐牲血共盟固州自歸惟岳怒遣先鋒兵馬使王武俊攻之日知使客謝武俊曰賊孱甚安足共安危哉吾城固士和雖引歳未可下且賊所恃者田悦耳悦兵血衊邢壕可浮不能殘半堞況吾城之完乎又紿為臺檢示曰使者齎詔諭中丞中丞奈何負天子從小兒跳梁哉武俊悟引兵還斬惟岳以獻徳宗美其謀擢為觀察使乗機決䇿韓充乗機決䇿無餘悔世推善將咨逮戎畧鄭雲逵李晟表以禮部侍郎為軍司馬時時咨逮戎畧裴度李師道怙强度宻勸帝誅之乃詔四節度㑹田𢎞正致討𢎞正請自黎陽濟合諸節度兵度曰魏博軍度黎陽即叩賊境封畛比聨易生顧望是自戰其地𢎞正光顔素少斷志盤桓果不可用不如養威河北須霜降水落絶陽劉深抵鄆以營陽榖則人人殊死賊勢窮矣上曰善詔𢎞正如度言凌敬説建徳三利竇建徳諸將新破海公掠獲盈給日夜思歸凌敬説建徳曰今唐以重兵圍東都守虎牢我若悉兵濟河取懐州河陽以重將戍之然後鳴鼓建旗踰太行入上黨傳檄旁郡進壺口以駭蒲津收河東地此上䇿也且有三利乗虚𢷬境師有萬全一也拓土得衆二也鄭圍自解三也建徳怒命扶出果敗莫測其謀董晉為宣武節度大使李萬榮死鄧惟恭總其軍晉受命不召兵惟幕府騶傔從之即日上道至鄭逆者不至人勸止以觀便宜晉不聽直造汴及郊惟㳟始出迎謁既入即委以軍政無所改更莫測其謀定襲蔡謀李愬為隨唐鄧節度使吳秀琳舉文城柵降愬單騎抵柵下與語親釋縛以為將秀琳為愬䇿曰必破賊非李祐無與成功者祐賊健將也守興橋柵其戰嘗易官軍愬候祐䕶穫于野遣史用誠以壯騎三百伏其旁見羸卒若將燔聚者祐果輕出用誠擒而還諸將素苦祐請殺之愬不聽以為客待間召祐及李忠義屏人語至夜艾忠義亦賊將所謂李憲者軍中多諌此二人不可近愬待益厚乃募死士三千人為突將自教之由是始定襲蔡之謀矣平賊䇿韓文臣有平賊䇿狂童不難治其言簡且要陛下幸聽之戈迴白日劒薄雲天天街之北旄頭已落絶轡之野蚩尤未縛俾我元侯恢𢎞逺畧終取單于繫之徽索李徳裕紀聖功碑雄畧動如神杜甫李愬入蔡州張柴殱其戍勑士少休益治鞍鎧發刃彀弓㑹大雨雪天晦凛風偃旗裂庸馬皆縮慄士抱戈凍死于道張柴之東坡澤阻奥衆未嘗蹈也皆謂投不測始發吏請所向愬曰入蔡州取吳元濟士失色監軍使者泣曰果落祐計然業從愬人人不敢自為計愬道分輕兵斷橋以絶洄曲道又以兵絶朗山道行七十里夜半至懸瓠城雪甚城旁皆鵝鶩池愬令擊之以亂軍聲賊恃吳房朗山戍晏然無知者祐等坎墉先登衆從之殺門者發闗留持柝傳夜自如黎明雪止愬入駐元濟外宅兵機事以速為神李靖蕭銑據江陵武徳四年大閱兵䕫州時秋潦濤瀬漲惡銑以靖未能下不設備諸將亦請江平乃進靖曰兵機事以速為神今士始集銑不及知若乗水傳壘是震霆不及掩耳有能倉卒召兵無以禦我此必擒也銑降機不可失同上頡利走保鐵山遣使者謝罪又遣鴻臚卿慰撫靖謂副將張公謹曰詔使到虜必自安若萬騎齎二十日糧自白道襲之必得所欲公謹曰上巳與約降行人在彼奈何靖曰機不可失韓信所以破齊也如唐儉輩何足惜哉督兵疾進行遇候邏皆俘以從去其牙七里乃覺部衆震潰斬萬餘級頡利亡去置酒城上張守珪為𤓰州刺史墨離軍使督衆完故城版築方立虜奄至衆失色守珪曰瘡痍之餘詎可矢石相确須權以勝之遂置酒城上㑹諸將作樂虜疑有備不敢攻引去守珪縱兵擊敗之遣彈琵琶使二女子舞柴紹吐谷渾党項寇邊勑詔討之彼據髙射紹軍雨矢士失色紹安坐遣人為彈琵琶使二女子舞冦疑之休射觀紹伺其懈以精騎從後掩擊冦大潰斬首五百級兵尚權權利於速裴寂封聞喜縣公至河東屈突通未下而三輔豪傑多歸者唐公欲先取京師恐通掎其後猶豫未決寂説曰今通據蒲闗未下而西我腹背支敵敗之符也不若破通而後趨京師秦王曰不然兵尚權權利於速今乗機度河以奪其心通自守賊耳庸能患我一失其機勝負未可計也唐公兩從之留兵圍蒲而遣秦王入闗士夜艾而入李希烈據汴滑副都統劉治率曲環李克信軍十餘萬戰白塔不利夜入宋州時洽將髙彦昭劉昌共嬰壘分守其屬作書言城且危彦昭視曰君輕我耶取紙自為書洽得書喜曰健將在西吾何憂選士八百夜艾而入賊不知詰旦傅城士奮出希烈大敗兵詭道也難豫言盛彦師與史萬寶鎮宣陽李宻叛萬寳謂彦師曰宻驍賊也以王伯當輔之挾思東歸之士非計出萬全不為也殆不可當彦師笑曰請以數千兵為公梟其首萬寶問計答曰兵詭道也難豫言即引衆踰洛水入熊耳山命士持滿夾道伏短兵溪谷間令曰賊半渡乃擊所部皆笑曰賊移洛州何為備此彦師曰宻聲言入洛其實走襄城就張善相我據其要必擒之宻果至彦師横擊首尾不相救遂斬宻及伯當可與計勝梁與晉争徳威從莊宗于河上莊宗問戰對曰此去汴州信宿而近梁軍父母妻子皆在其中而梁人家國係此一舉吾以深入之兵當其必死之戰可以計勝而難與力争也且吾軍先至此粮㸑具而營柵全是謂以逸待勞王宜按軍無動而臣請以騎軍擾之使其營柵不得成樵㸑不暇給因其勞乏而乗之可以勝也莊宗遽督軍而出徳威謂其子曰吾不知死所矣父子皆戰死五代晉臣周徳威傳孟方立為昭義節度使晉遣李克修出兵方立以孤城自守方立將石元佐者善兵而多智為晉將安金俊所得金俊厚遇之問以攻邢之䇿元佐曰方立善守而邢城堅若攻之必不得志宜急攻磁州方立來救可以敗也金俊以為然軍于滏水之西方立果帥兵來救為金俊所敗馳入邢州閉壁不復出外無救兵城中食且盡方立夜出巡城號令守者守者皆不應方立知不可乃歸飲酖而卒其伐南唐問宰相李榖以計䇿後克淮南出榖疏使學士陶榖為贊而盛以錦囊嘗置之坐側五代本紀周世宗贊上平戎十八䇿王忠嗣時突厥新有難忠嗣進軍磧口經畧之烏蘇米施可汗請降忠嗣以其方彊特文降耳乃營木刺蘭山諜虚實因上平戎十八䇿出竒兵襲敵軍中士氣盛日夜思戰忠嗣縱詭間伺虜隙時出竒兵襲敵所向無不克故士亦樂為用隧地擒取李光弼入太原思明為飛樓障以木幔築土山臨城光弼遣宂地隤之思明宴城下倡優居臺上靳指天子光弼遣人隧地擒取之思明大駭徙牙帳逺去軍中皆視地後行論軍旅勝負思明乗勝西嚮光弼敦陣徐行趨東京謂留守韋陟曰賊新勝難與争鋒欲詘之以計然洛無見糧危偪難守公計安出陟曰益陜兵公保潼闗可以持久光弼曰兩軍相敵尺寸地必争今委五百里而守闗賊得地勢益張不如移軍河陽北阻澤潞勝則出敗則守表裏相應賊不得西此猿臂勢也夫辨朝廷之禮我不如公論軍旅勝負公不如我陟不能答髙仙芝㑹連雲堡拔其城仙芝欲遂深入引師行三日過垣駒嶺嶺峻絶下四十里仙芝恐士憚險不敢進乃濳遣二十騎衣阿弩越胡服來迎先語部校曰阿弩越胡來迎我無慮矣既至士不肯下曰公驅我何去㑹二十人至曰阿弩越胡來迎已斷娑夷橋矣仙芝即陽喜令士盡下娑夷河弱水也既行三日越胡來迎明日至阿弩越城遣將軍席元慶以精騎一千先往謂小勃律王曰不窺若城吾假道趨大勃律爾城中大酋領皆吐蕃腹心仙芝宻令元慶曰若酋領逃者第出詔書呼之賜以繒綵至皆縛以待我元慶如言仙芝至悉斬之王及妻逃山谷不可得仙芝招諭乃出降因平其國吐蕃入寇詔問計郭子儀僕固懐恩誘吐蕃回紇党項數十萬入寇朝廷大恐詔子儀屯奉天帝問計所出對曰無能為也懐恩本臣偏將雖慓果然素失士心今能為亂者誠思歸之人刼與俱來且皆臣故部曲素以恩信結之彼忍令以刃相向乎帝曰善沈毅有謀李抱玉柴孝和説李宻曰秦地阻山帶河項背之亡漢得之王今公以仁基壁回洛翟讓保洛口公束鎧保道趨長安百姓誰不郊迎是征而不戰也衆附兵彊然後東向指撝豪傑天下廓然無事矣今遲之恐為人先宻曰僕懐此久顧我部皆山東人今未下洛安肯與我偕且諸將皆羣盜不相統一敗則掃地矣遂止使賊不及計薛仁杲初仁杲降諸將賀且問曰羅㬋雖破而賊城尚堅王能下之何也秦王曰羅㬋健將非急追之使得還城未可取也故吾使賊不及計是以克之諸將咨服以智筭取之魏元忠儀鳳中吐蕃數盜邊元忠封事言命將用兵之要曰必其戰不顧死則兵法謂敵能鬭當以智筭取之何憂不克哉劉昌裔吳少誠引兵薄城兵馬使安國寧謀應賊昌裔以計斬之召其麾下千人為饗人賞二縑乃伏兵于道令持縑者斬一不能脱賊聞解去載嬰兒嗁譟下堡羅士信次洛陽攻千金堡有惡言訽軍士信怒夜遣百人載嬰兒嗁譟下堡若自東都出犇者既而陽悟曰非也此千金堡耳因散去堡兵開門追掠士信伏入屠之無類下令榖熟收以饋軍龎玉為梁州總管巴山獠叛玉梟其首餘黨四犇屬縣獠與反者州里親戚為賊游説言不可窮躡玉不聽下令軍中曰榖熟吾盡收以饋軍非盡賊吾不反聞者懼相謂曰軍不止吾榖盡且餓死乃共入賊營所與親相結斬渠長以降衆遂潰謀畫多中五代敬翔梁太祖與蔡人戰汴郊翔時時為太祖謀畫多中太祖欣然以為得翔之晚取其軍號吳越錢鏐楊渥將周本陳章圍蘇州鏐遣其弟鋸鏢救之淮兵為水柵環城以銅鈴係網沉水中斷濳行者水軍卒司馬福多智而善水行乃先以巨竹觸網淮人聞鈴聲遽舉網福乃過入城中其出也亦然乃取其軍號内外夾攻號令相應淮人以為神遂大敗之猶豫兵家大忌敬瑭其姓石氏趙在禮之亂明宗討之至魏而兵變敬瑭獻計曰豈有軍變於外上將獨無事者乎且猶豫者兵家大忌不如速行願得騎兵三百先攻汴州夷門天下之要害也得之可以成事明宗然之與之驍騎三百渡黎陽為前鋒明宗遂入汴五代史晉本紀閉壘示怯王景仁梁太祖遣子友寧攻王師範于青州師範乞兵於行宻行宻遣景仁以步騎七千救師範大敗之遂斬友寧是時梁太祖方攻鄆州聞友寧死以兵二十萬倍道而至景仁閉壘示怯伺梁兵怠毁柵而出馳驅疾戰戰酣退坐召諸將飲酒已而復戰太祖登髙望見之得青州綘人問飲酒者為誰曰王茂章也太祖歎曰使吾得此人為將天下不足平也梁兵大敗五代史司馬宣王征孟達則八道急攻公孫文懿則捨其鋭而趨其虛文粹吳武陵上韓舍人行軍書夫臨機制變又何可數昔司馬宣王征孟達則八道急攻公孫文懿則捨其鋭而趨其虚緩以撓各從其利也決䇿九重定計千里陸宣公奏議鋒鏑交於原野而決䇿於九重之中機㑹變於斯須而定計於千里之外巨謀纎計杜牧備東則撓西備西則撓東五代周臣王朴獻平邊䇿曰攻取之道從易者始當今惟吳易圖東至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必犇走以救其弊犇走之間可以知彼之虚實衆之強弱攻虛擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我師入其地必大發以來應數大發則民困而國竭一不大發則我獲其利彼竭我利則江北諸州乃國家之所有也既得江北則用彼之民揚我之兵江之南亦不難而平之也如此則用力少而收功多請哥舒翰固闗無出軍哥舒翰當是時禄山雖盜河洛所過殘殺人人怨之淹時月不能進尺寸地又郭子儀李光弼兵益進取常山十數郡禄山始悔反矣將還幽州以自固而國忠計迫繆説帝趨翰出潼闗復陜洛時子儀光弼遥計曰翰病且耄賊素知之諸軍烏合不足戰今賊悉鋭兵南破宛洛而以餘衆守幽州吾直𢷬之覆其巢窟質叛族以招逆徒禄山之首可致若師出潼闗變生京師天下殆矣乃極言請哥舒翰固闗無出軍知機而不知權者得於預謀失於臨事知權而不知機者巧於臨事拙於預謀馮用之權論料敵十二白懼而增徳不可當也趙簡子謂孟明彼見吾貎必有懼心郭嘉料孫䇿魏志孫䇿轉鬭千里盡有江東聞太祖在官渡將襲許衆懼郭嘉料之曰孫䇿新并江東所誅者英髦雄傑輕而無備雖有百萬衆無異獨行中原若刺客伏起一人之敵爾必死匹夫之手䇿臨江為許貢客所殺漢髙問魏將是誰曰栢直乳臭不能當韓信騎將馮敬雖賢不能當灌嬰步將項佗不能當曹參吾無憂矣屈指魏志諸葛亮攻陳倉帝問張郃曰將軍到亮無得陳倉乎郃曰比臣未到亮已走屈指計亮糧盡不至十日郃晨夜至鄭亮果退聚米後漢馬援於帝前聚米為山谷指畫形勢開示衆所從道昭然可曉帝曰虜在吾目中成擒袁尚救鄴諸將以尚歸鄉人人自戰不如避之太祖曰尚從大道來則當避之若循西山來成擒矣果循山臨釡水為營公擊破之先勝後戰魏文帝欲伐不從命吳蜀何先賈詡曰吳蜀依阻山水劉備有雄才諸葛亮善治國孫權識虚實陸遜見兵勢皆難卒謀用兵之道先勝後戰量敵論將臣以今宜先文後武不從江陵役士多死也見可而進知難而退軍之善謀先開賞募山賊陳䇿衆數萬人太祖問可伐否劉曄曰䇿因亂赴險相依為彊非有爵命威信相伏畏死取賞愚智所同先開賞勸大兵臨之令下之日軍門啓而虜自潰矣潘濬請以五千人擒樊伷吳志樊伷誘導諸夷以圖武陵孫權問潘濬濬曰五千兵足以擒伷權曰卿何輕之濬曰伷嘗為州人設食至日中食不可得而十餘自起亦侏儒一節之驗權大笑以五千人授濬果斬伷也口對手畫張千秋與霍禹隨度遼將軍烏桓還謁大將軍霍光問方畧形勢千秋口對兵事手畫地成圖無所失問禹禹不能記由是賢千秋孔圖上河北險要李吉甫請任薛平為義成軍節度使以重兵控邢洛因圖上河北險要所在帝張於浴堂門壁每議河北事必指吉甫曰朕日按圖信如卿料矣料敵如神韓充為義成軍節度使㑹汴軍逐李愿以李岕主留事帝遣人問破賊期充對曰汴天下咽喉臣頗習其人然王師臨之一月可破方二旬即克帝喜曰充料敵如神不十五日破賊韋表微户部侍郎开志詔叛詔李聽率師討之次河上天子憂無成功表微曰以聽軍勢不十五日必破賊及㨗書上止浹日所謂料敵者何定乎得失之計始可兵出而決於勝負矣當料彼將吏孰與己和止客孰與己逸排甲孰與己堅器械孰與己利教練孰與己明地勢孰與己險城池孰與己固騎畜孰與己多糧儲孰與己廣工巧孰與己能秣飼孰與己豐資貨孰與己富以此揣而料之焉有不保其勝哉通典兵料敵北取三闗兵不血刃而史家猶譏其輕社稷之重而僥倖一勝於倉卒殊不知其料彊弱較彼我而乗述律之殆得不可失之機此非明於決勝者孰能至哉誠非史氏之所及也周世宗本紀救敗之師李靖九月蕭銑將文士𢎞以卒數萬屯清江王孝恭欲擊之靖曰不可士𢎞徤將下皆勇士今新失荆門悉鋭拒我此救敗之師不可當宜駐南岸待其氣衰乃取之孝恭不聽自往與戰大敗料敵明李靖贊曰臨機果料敵明根于忠智料敵應變李勣用兵多籌筭料敵應變皆契事機噫嗚咄嗟足以讋敵李宻楊𤣥感嘗私宻曰上多忌隋厯且不長中原有一日警公與我孰後先宻曰決兩陣之勝噫嗚咄嗟足以讋敵我不如公出其意外杜牧宰相李徳裕竒其才㑹昌中黠戞破回鶻回鶻種落潰入漠南牧説徳裕不如遂取之以為兩漢伐虜常以秋冬當匈奴勁弓析膠重馬免乳與之相校故敗多勝少今若以仲夏發幽并突騎及酒泉兵出其意外一舉無類矣王晙上言王晙進并州都督長史明年突厥黙啜為拔曵固所殺其下多降分置河曲既而小殺繼降降者稍稍叛去晙上言突厥向以國亂故欵塞與部落無間延傃北風何嘗忘之今徙處河曲使内同邊罅久必為患討勃律李嗣業髙仙芝討勃律署嗣業及中郎將田畛為左右陌刀將從平石國初仙芝特以計襲取石其子出犇因結諸胡共怨之以告大食連兵攻四鎮仙芝率兵二萬深入為大食所敗殘卒數千事急嗣業謀曰將軍深履賊境後援既絶而大食乗勝諸胡鋭于鬭我與將軍俱前死尚誰報朝廷者不如守白石嶺以為後計仙芝曰吾方收合餘燼明日復戰嗣業曰事去矣不可坐須葅醢即馳守白石料内以敵外郭元振大將論欽陵請罷四鎮兵救十姓之地乃以元振充使因覘虜情還上疏曰善為國者先料内以敵外不貪外以害内然後安平可保平川廣野騎兵所長周徳威告莊宗曰梁兵甚鋭未可與争宜少退以待之莊宗曰吾提孤軍出千里其利速戰今不乗勢急擊之使敵知吾之衆寡則吾無所施矣徳威曰不然趙人能城守而不能野戰吾之取勝利在騎兵平川廣野騎兵之所長今吾軍於河上迫賊營門非吾用長之地也莊宗不悦五代史因其將退而擊至于鄗南兩軍皆陣梁軍横亘六七里汴宋之軍居東魏滑之軍居西莊宗䇿馬登髙望而喜曰平原淺草可前可却真吾之勝地也乃使人告徳威曰吾當為公先公可繼進徳威馳馬諫曰梁軍輕出而逺來與我轉戰其來必不暇齎糧糗縱其能齎亦不暇食不及日午人馬俱饑因其將退而擊之勝諸將亦皆以為然至未申時梁軍東偏塵起徳威鼓譟而進麾其西偏曰魏滑軍走矣又麾其東偏曰梁軍走矣梁陣動不可復整乃皆走遂大敗自鄗追至于柏鄉横尸數十里自梁與晉争凡數十戰其大敗未嘗如此同上因其勞乏而乗之宿湖栁陂黎明候騎報曰梁軍至矣莊宗問戰於徳威徳威對曰此去汴州信宿而近梁軍父母妻子皆在其中而梁人家國繫此一舉吾以深入之兵當其必死之戰可以計勝而難與力争也且吾軍先至此糧㸑具而營柵全是謂以逸待勞之師也王宜按軍無動而臣請以騎軍擾之使其營柵不得成樵㸑不暇給因其勞乏而乗之可以勝也莊宗曰吾軍河上終日俟敵今見敵不擊復何為乎顧李存審曰公以輜重先吾為公殿遽督軍而出徳威謂其子曰吾不知死所矣前遇梁軍而陣莊宗率銀鎗軍馳入梁陣徳威父子皆戰死決勝料勢決戰料情閻寶梁晉戰胡栁晉軍敗莊宗欲引兵退保臨濮寶曰夫決勝料勢決戰料情情勢既得斷在不疑今梁兵窘蹙其勢可破勝而驕怠其情可知此不可失之勢也莊宗謝曰微公幾敗吾事乃整軍復戰遂敗梁兵五代史乗其馳突必欲驅除豈可蓄虺穴于塞垣養蠆毒于懐袖乗其馳突必欲驅除昔晉侯報楚之功避子玉於三舍先軫捨秦之恵覆孟明於二崤安國庇人大義斯在一品集賜劉沔宻詔逺揣羌情終難保信昔去病深入大漠亦殄獯戎近李靖再襲穹廬始擒頡利一品集賜張仲武詔必不遊奕伏道緣回鶻皆是騎兵長於野戰若在靖難以交鋒雖良將勁卒無以制勝比聞戎虜不解攻城則知除馬上馳突其他並不慣習臣伏料必不遊奕伏道又不㑹斫營儻令石雄以義武馬軍一千騎兼揀退渾精選步卒以為羽翼衘枚夜襲必易成功一品集鬭羊王君㚟破吐蕃於西説䇿其且敗因上嶲州鬭羊於帝以申諷諭曰使羊能言必將曰鬭而不解立有死者所賴至仁無殘量力取歡焉帝識其意納之方陣而囂李光弼賊帥周摯攻北城光弼斂軍入登陣望曰彼軍雖鋭然方陣而囂不足虞也日中當破引衆踰洛水入熊耳一山盛彦師授行軍總管從平京師與史萬寶等鎮宣陽李宻叛謀出山南萬寳問計答曰兵詭道也難豫言即引衆踰洛水入熊耳一山命士持滿夾道伏短兵徯谷間令曰賊半渡乃擊所部皆笑曰賊移洛州何為備此彦師曰宻聲言入洛其實走襄城就張善相我據其要必擒之宻果至彦師横擊首尾不相救遂斬宻及王伯當問破敵之期王彦章龍徳三年夏晉取鄆州末帝乃召彦章為招討使以段凝為副使末帝問破敵之期彦章對曰三日左右皆失笑彦章受而出馳兩日至滑州置酒大㑹陰遣人具舟於楊村㑹甲士六百人皆持巨斧載冶者具韝急乗流而下彦章㑹飲酒半佯起更衣引精兵數千沿河以趨徳勝舟兵舉鎻燒斷之因以巨斧斬浮橋而彦章引兵急擊南城浮橋斷南城遂破盖三日矣五代史入人之國利在速戰康延孝莊宗征蜀以延孝為先鋒排陣斬斫使破鳳州取固鎮降興州與王衍戰三泉衍敗走斷吉柏江浮橋延孝謂招撫使李嚴曰吾逺軍千里入人之國利在速戰乗衍破膽之時但得百騎過鹿頭闗彼將迎降不暇若修繕橋梁必留數日使衍得閉闗為備則勝負未可知也因與嚴乗馬浮江軍士隨之濟者千餘人遂入鹿頭闗下漢州居三日後軍始至羣下伏其料敵江南野史劉仁瞻白孔六帖卷五十二
