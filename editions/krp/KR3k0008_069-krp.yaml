body:
  text: 白孔六帖卷六十九唐白居易原本宋孔傳續撰瀆祀一不祀二逆祀三雜祀四雩禜五䄍六雜祭七祖軷八功臣九婦人祭十祝史十一尸十二祭器十三樽十四爵十五俎十六籩豆十七祭服十八瀆祀一白子路問諸夫子曰祭禮與其敬不足而禮有餘也不若禮不足而敬有餘也祭不敬則瀆祭主敬禮無瀆神祭不欲數數則煩煩則不敬祭不欲踈踈則怠怠則忘易曰東鄰殺牛不如西鄰之禴祭實受其福注見上宜順時而不數多奚以為茍在禮而或煩過猶不及祭以嚴終禮由煩亂茍有明信蘋蘩蕰藻之菜潢汙行潦之水可薦於鬼神君雖獨豐其何福之有季梁謂隨侯云云神其吐之吐之不歆也臨祭不惰鬼神無常享享于克誠瀆于祭祀時謂不欽欽敬也禮煩則亂事神則難事神禮煩則亂而難行忘若思之貌褻如在之神禮曰季氏祭逮闇而祭日不足繼之以燭自䁱至夕雖有彊力之容肅敬之心皆倦怠矣以其乆也有司跛倚以臨祭其為不敬大矣跛倚偏立不敬也他日祭子路與音預質明而始行事晏朝而退孔子曰誰謂由也而不知禮乎美之也祭祀主敬禮不絜蘋蘩之誠是行秕稗之禮孔瀆神王璵請度昭應南山作天華上宫露臺大地婆父祠昭應令梁鎮上疏以為婆父之鄙語不經見若三皇五帝等兩京及所都各有宮廟此復營造是謂瀆神終朝走巫祝南有漢王祠終朝走巫祝杜詩三年而禘不欲黷事神在於䖍誠不求厭飫三年而禘不欲黷也韋述議祝肹響以怪談兮巫妖冶而魅醉皮日休端憂三農祈穀帝自東都還說因見帝曰太原王業所基由河東入京師有漢武睢上祠此禮廢濶願為三農祈穀誠四海之福帝納之張說不祀二白葛伯不祀湯始征之䕫子不祀祝融而楚滅之不祀忽諸君祀無乃殄乎狐突謂申生曰相之不享於此久矣寗武子云酆舒不祀晉滅之路相鬼猶求食若敖氏之鬼不其餒而子曰吾不與祭如不祭祭不欲踈踈則怠怠則忘子孫祭祀不輟宗廟不享謂祭無益也紂也故君子之祭也必身親涖之有故則使人可也雖使人不失其義者君明其義故也言茍明祭義雖使人祭不失其義也孔宋務光上書宋務光神龍元年大水務光上書傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗自陛下御極郊廟山川不時薦見地僻易蕪徒生荆棘文粹張謂虞帝廟碑三湘南澨帝之遺廟存焉地僻易蕪徒生荆棘水深難涉誰薦蘋蘩先聖不祀後賢之過四望莫修文粹楊炯少姨廟碑四望於是莫修八神以之無主炎涼代序寧觀俎豆之容霜露霑衣非復絃歌之地逆祀三白傳曰有事於太廟躋僖公逆祀也僖公是閔公庶兄繼閔公而立廟當在閔公下今夏父弗忌為宗伯以僖公年長又是文公之父阿順時君故升僖公於閔公上故曰逆祀仲尼曰臧文仲不仁者三縱逆祀聽夏父弗忌躋僖公故曰縱也君子以為失禮禮無不順子曰禘自既灌而往者吾不欲觀之矣既灌之後則序昭穆而魯逆祀躋僖公亂昭穆故不欲觀也不首其義故誣於祭也首本也若義禮曰子游之徒祭者若義也若順也五廟本仁禮明昭穆諸侯五大夫三士二廟也四時首義孝備蒸甞子曰臧文仲安知禮夏父弗忌逆祀而不止也孔引僖公比陳貞節博士蘇献上言請以中宗為别廟詔可孫平子上書詔有司復議貞節献與博士馮宗質之曰孝和中興别建園寢百世不毁尚何議哉平子猥引僖公逆祀為比殊不知孝和升新寢聖真方祔廟則未嘗一日居上也正文公逆祀陳京初𤣥宗肅宗既祔室遷獻懿二祖于西夾室引太祖位東嚮祠官尉仲子陵曰所謂不先食者邱明正文公逆祀儒者安知夏后世數未足時言禹不先鯀乎雜祀四白月令正月其祀戸祀之於户内順陽氣也祭先脾春宜脾故祀户祭之先進命有司祭風師仲春祀朝日於東郊春分日也祭馬祖於大澤馬祖房星也季春后妃齋戒享先蠶而躬桑先蠶天駟仲春元鳥至之日以太牢祠于髙禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前髙辛氏禖官鷰祥故立祠焉以后妃祈男也孟夏其祀竈祭先肺夏陽氣盛熱祀之於竈從熱類也祀竈祭先進肺也大雩帝祭天祈雨曰云云命有司祀雨師於國城西南也祀皇地祗仲夏夏至日祀之於方丘命有司祭先牧於大澤用剛日季夏其祀中霤祭先心中霤中室也祭霤先進心孟秋其祀門祭先肝祀門順隂氣出也祀門先進肝仲秋祀夕月於西郊秋分日祭也命有司祭馬社於大澤用剛日孟冬其祀行祭先腎行道也隂氣盛寒於外去故祀之於道也祀道之俎先進腎命有司祭司寒於北郊祭司中司命司人司禄於國西北仲冬命有司祭馬步宋大火祝宗用馬於四墉祀盤庚於西郊之外以禳火鄭火灾禳火於𤣥㝠回禄水火二神祈于四墉祓除火灾禮也皆謂祭也五祀門户竈井中霤也自天子至大夫皆祀夫聖人之制祭祀也法施於民則祀之以死勤事以勞定國能禦大災能捍大患則祀之非此族也不在祀典陳寳祠晉書陳寶祠秦文至今七百餘歲漢興世世常祭光色赤黄長四五丈真祠而見音聲碎隐野雞皆雊每見雍遣太祝祠以太牢奏請立王母祠酒泉太守馬岑上言酒泉南山即崐崘之體也同穆王見西王母樂而忘歸謂此山有石室王母堂璣鏤錦煥若神宫宜立王母祠以禆朝廷無疆之福也遺愛立祠後漢王煥為洛陽令卒人思之為立祠安陽亭西每有酒食輒絃歌而薦之利人立祠後漢許陽偉君為都水掾修鴻陂百姓得其利後病卒太守鄧晨於都官為起廟圖畫形像百姓思其功皆祭祀之于公祠于定國父于公為獄吏所决皆不恨郡中為生祠號云生祠後漢淳于臨聚屯灊山楊州牧攻之不能克陳衆乗單車白馬徃說而降之灊山人立生祠號曰白馬陳從事又韋義為廣都長張渙為武威守任延字長孫為九真守杜軫字超宗為池陽令百姓皆立生祠逺方神祠史記郡縣逺方神祠民各自奉嗣不令於天子之祝官蚩尤漢令祝官立蚩尤之祠九天巫祠漢九天祠者皆以歲時祠宫中河巫祠河于臨晉南山巫祠南山祠黄石張良死并葬黄石每上冢伏臈祠黄石具伏臈門詔祀先賢漢詔祀百辟卿士有益於人者蜀郡以文翁九江以召信臣應詔歲祀郡二千石率官屬行禮也祀先賢任延長孫㑹稽都尉先遣饋祀延陵季子遺愛祠賈達梁道為豫州刺史及卒魯人思之為刻石立祠詔追美云云近墓立祠諸葛亮初亡所在各求立廟向充曰順人心則黷而不典若百姓巷祭野祀非所以存德念功宜因近其墓立祠於沔陽人欲祀者皆限至廟斷其私祀詔從之祀臯繇晉禮志云故事祀臯繇於廷尉新禮移祠律署以同祭先聖於太學故事以社日新禮改以孟秋以應秋政摯虞以臯陶作士惟明克允國重其功人思其當是以獄官禮其神繋者致其祭功在獄之成不在律令始也太學之設義重太常故祭太學律署卑於廷尉移祀於署是去重而就輕也又祭用仲春義取重生改以孟秋以應刑殺理未可以相易宜如舊制可孔祠堯舜禹褚無量帝詔無量祠堯平陽宋璟祠舜蒲坂蘇頲祠禹安邑在所刺史參獻建陵廟陳貞節為拾遺初隱章懷懿徳節愍四太子並建陵廟分八署置官列守卒四時祠官進饗貞節以為非是上言詔有司為立廟戴青卒以第舍陋不容祭詔有司為立廟請立七廟裴炎后已持政武承嗣請立七廟追王其先炎諫曰太后天下母以盛德臨朝宜存至公不容追王祖考示自私且獨不見吕氏事乎后曰吕氏之王權屬生人今追崇先世迹異安得同哉炎曰蔓草難圖漸不可長后不悅立廟以祀孫儒建鋒殷哭之相語曰公常有志廟食吾等有土當廟以報徳及殷據湖南表儒贈司徒立廟以祀立廟梨山李頻出建州刺史卒父老為立廟梨山歳祀之雙廟廵逺睢陽至今祠享不絶號雙廟云歲時致祭文粹吕才東臯子集序立杜康廟歲時致祭以善醖府吏焦革配焉翦林遷神祠韓愈合江亭詩古廟杉松巢水鶴歲時伏臘走村翁杜甫詠懷古跡蟲蛇穿畫壁巫覡醉蛛絲杜甫詩舊俗存祠廟空山泣鬼神先主廟祠堂像侔真擢玉紓煙鬟羣怪儼伺候恩威在其顔韓炭谷詩女巫澆酒雲滿空玉鑪灰火香鼕鼕寒雲山鬼來座中紙錢窸窣鳴飈風李賀女巫進紛屢舞陳瑶席湛清酤王維巫山神女迎神歌辭村依野廟壖杜甫詩蟲書玉佩蘚燕舞翠帷塵湘夫人祠同上立祠受降城張仁愿後人思之乃為立祠受降城出師輒享焉青松古廟存李白堯祠詩堯没三千歲青松古廟存乾封元年幸曲阜祠孔子如亳州祠老子髙宗本紀竹日斜虛寢溪風滿薄帷杜甫諸葛廟祠宇毁頓韓愈祭文祠宇毁頓慿附之質丹青之飾暗昧不圭不稱靈明外無四垣堂陛頺落牛羊入室居民行商不來祭享輒敢以私錢十萬祈于邦伯修而作之叢祠古木踈谷口寒流静叢祠古木踈焚香秋霧濕奠玉䁱光初肹饗巫言報精誠禮物餘栁宗元韋使君祈雨從至祠下口號革去狹陋恢閎棟宇同上太白祠碑革去狹陋恢閎棟宇階室之廣三倍其初神實在前敬恭跪起杜牧祭百神凡爾守土各報爾望剥烹羮胾無愛牛羊天下聞命奔走承事同上祭百神齋齋惕慄臨谷臨墜視牲啟毛餚羞具潔罔有不備步及神宇蹐足屏氣同上突厥事祅神酉陽雜俎突厥事祅神無祠廟刻氊為形盛於毛袋行動之處以脂蘇塗之或繋之竿上四時祀之雩禜五事具旱門白周禮地官舞師教皇舞旱暵之事稻人旱暵供其雩斂斂發斂也禜門用瓢齎甘瓢去抵為樽旱暵則舞雩女巫之職雩禜祭水旱也禮龍見而雩傳穀梁一時而言不雨有志於人也毛澤未盡人力未竭古人重請請道去讓孔雩祀王仲邱沂州琅琊人開元中厯左補闕時典章差駮仲邱欲合貞觀顯慶二禮據有其舉之莫可廢之義即上言貞觀禮雩祀五方上帝五人帝五官于南郊顯慶禮祀昊天上帝于圓丘臣謂雩上帝為百穀祈甘雨故月令大雩帝用盛樂鄭𤣥說帝上帝也乃天别號祀于圓丘尊天位也顯慶祀昊天與月令合而貞觀甞祀五帝矣請二禮皆用詔可雩于興慶宫德宗貞元十三年四月壬戌雩于興慶宫祈禳禜雩皆有準程栁終南碑栁子厚禜門文惟神配隂含德司其翕闢能收水沴以祜成績淫雨斯降害于麰麥野夫興憂官守増惕諸隂既閉休徵未獲敬用瓢齎以展周索納其雲氣復我川澤冬至及孟夏雩祭皇地祗于方丘禮志旱甚則修雩唐六典禮部旱甚則修雩秋分以後雖旱不雩雨足皆報祀若州縣則先祈社稷及境内山川若霖雨則京城禜諸門門别三日每日一禜不止祈山川岳鎮海濵三日不止祈社稷宗廟若州縣則禜城門及境内山川而已同上周制月令建巳月大雩五方上帝其壇名曰雩禜於南郊之傍配以五人帝命樂工習盛禮舞皇舞月令命有司為民祈祀山川百源百辟卿士有益于民者以祈穀實若國大旱則司巫帥巫而舞雩若旱暵則女巫舞雩武德初定令每歲孟夏雩祀昊天上帝於圓丘景皇帝配牲用蒼犢二五方上帝五人帝五官並從祀用方色犢十出杜佑通典正觀雩祀於南郊顯慶禮于圓丘䄍六白記曰伊耆氏始為蜡古天子號蜡也者索也謂求索也歲十二月合聚萬物而索饗之周於十二月建亥月也萬物功加人者之神皆求以享報之蜡之祭也主先嗇而祭司嗇先嗇神農也司嗇后稷也季冬天子乃䄍百神於南郊為來年祈穀於天宗神農后稷勾芒田畯岳鎮海瀆邱陵墳隰鱗介羽毛之類天宗日月星辰命有司脩祭禽之禮謂先蜡日獵禽獸以供䄍祭昔者仲尼與於蜡賔在助祭之中事畢出游於觀之上喟然而歎歎其祭不備也仲尼之歎蓋歎魯也天子大蜡八所祭有八神古之祭者使之必報之迎猫為其食田䑕也迎虎為其食田豕也蜡之祭仁之至義之盡也八蜡以記四方年不順成八蜡不通以謹民財其方穀不熟則不通於蜡使人謹於財用順成之方其蜡乃通以移民也子貢觀於蜡子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也若狂皆醉也子曰百日之蜡一日之澤非爾所知也言人皆勤農有百日之勞今日使之飲酒燕是君之恩澤也非爾所知言其義大也展必報之義觀若狂之歡八神一日擇吉日祈來年福周䄍國祭蜡則吹豳頌擊土鼓以息老物謂方物老成以息勞也息其老物吾則從周闕以禮文子将歎魯疈辜大宗伯以疈辜祭四方百物注疈而磔之謂磔及䄍祭也䄍辭郊特牲祭坊與水庸事也曰土反其澤水歸其壑昆蟲無作草木歸澤注此䄍辭也黄衣黄冠以祭息田夫也草笠而至尊野服也諸侯於蜡遣使戴草笠貢禽獸既蜡而收民息已故既蜡君子不興功放囚華陽國志曰王長文元康初試守江原令縣牧得盜馬及發冢賊長文引見誘慰時遇臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不明使汝等如此長文之過也蜡節慶祚歸就之上下善相憐樂過節還當為汝思他理郡吏惶懼争請不許尋有赦令無不感恩祠竈搜神記曰宣帝時隂子方者甞臘日晨炊祭竈神見形子方再祀之以黄羊家至巨富孔順成之方其䄍乃通栁宗元䄍説栁子為御史主祀事将䄍進有司以問䄍之說則曰合百神于南郊以為歲報者也先有事必質於户部户部之辭曰旱于某水于某蟲蝗于某癘疫于某則黜其方守之神不及以祭余甞學禮盖思而得之則曰順成之方其䄍乃通若是古矣其名則存而教之實則隱同上旱乎水乎蟲蝗乎癘疫乎豈人為之耶故其黜在神暴乎眊乎沓貪乎罷弱乎非神為之耶故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存而教之實則隱故嘆而云也神農伊耆少牢后稷及五方十二次五官五田畯五岳四鎮海瀆日月方以犢二星辰以降方皆少牢五井泉皆羊一禮志䄍祭百神大明夜明在壇上神農伊耆各在壇下后稷在壇東五官田畯各在其方水墉坊各在其方壇之後同上䄍之義自伊耆氏而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報之樂以蕢桴土鼔夏后氏更名曰嘉平殷更名曰清祀周因之復名大䄍以歲十二月合聚萬物而索享之春官宗伯以疈辜祭四方百物䄍之神有八一曰先穡二曰司穡三曰農四曰郵表畷五曰猫虎六曰防七曰水墉八曰昆蟲索鬼神而致百物通典季冬寅日䄍祭百神于南郊大明用犢二籩豆各四簋俎簠㽅各一神農及伊耆氏各用少牢一籩臣等與大明同后稷及五方十二次五官五方田畯五岳四鎮四海四瀆以下方别各用少牢一其日祭井泉於川澤之下用羊一卯日祭社稷於社宫二十八宿五方之山林川澤邱陵墳衍原隰鱗羽臝毛介水墉坊郵表畷猫虎及龍鱗朱鳥白獸𤣥武方别各用少牢一每座籩豆各二簠簋㽅俎各一䄍祭百八十七座唐通典若其方不登則闕之其儀具開元禮同上雜祭七白膢漢書膢五日注貙虎以立秋日祭獸王者以此出獵祭宗廟又後漢蔡邕曰猛獸以立秋日還母王者以此日祭也酺周禮族師春秋祭酺酺者為人物災之神又漢文紀酺五日司寒禮孟冬祖司寒於北郊也又傳曰其藏氷也黒牡秬黍以享司寒又祭司寒而藏之謂藏氷也司寒元冥北方之神敬而祭之晉孔愉字敬康著信鄰里後忽捨去皆謂之神人為立祠建興初始立孔設壇漳南祭建德劉黒闥竇建德故時左右稍歸之兵寖盛乃設壇漳南祭建徳告以舉兵意杜康祠王績所居東南有盤石立杜康祠祭之尊為師草木悽悲文粹布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精䰟無依李華弔古戰場文立廟睢陽廵逺立廟睢陽歲時致祭河瀆親家乾􅀈子郭汾陽鎮蒲欲造浮橋而激流毁墠公酹酒許以小女妻之其夕水回木生墠上遂成橋而小女尋卒因塑廟中人因立公祠號河瀆親家翁祖軷八白周禮大馭掌玉輅以祀及犯軷軷山行王自左馭馭下祝下登受轡犯軷遂驅之封土為山象以蒲芻棘栢為神既祭以車轢喻無險難也及祭酌僕之右祭兩軹軹轊也祭軌乃飲軌當作範車前軾儀禮聘禮釋幣于出祖釋軷祭脯酒乃飲其側詩曰取蕭祭脂取羝以軷載燔載烈仲山甫出祖祖範軷之祭又曰韓侯出祖傳曰夢襄公祖昭公将如楚夢襄公祖子服惠伯曰行也先君適楚矣故祖以道之車軸折漢臨江王被祖於江陵北門車軸折父老泣曰吾王不反矣果如言黄帝子舊說黄帝子纍祖好逺遊道死故後祭為神道也孔駕轢軷而行禮志其詳見通典天子出通化門釋軷而入壇禮志籍田祖軷将臨栁宗元夙駕東征祖軷将臨祖者送行之祭因饗飲也唐顔師古注漢書祖者送行之祭因饗飲也昔黄帝之子纍祖好逺游而死於道故後人以為行神也車駕出日右校先於國門外委土于軷注軷為山象也又為瘞埳于神座西北方深取足容物太祝布神位于軷前南向太官令帥宰人刳羊郊社之属設罇罍篚羃於神座之左俱右向置幣於罇所駕将至太祝立於罇洗東面西向祝史與執罇罍篚者俱就罇罍所立太祝再拜詣罇所取幣進跪奠於神座興還本位進饌薦脯於神座前加羊於軷西首太祝詣罍洗盥手洗爵詣罇所酌酒進跪奠於神座前興少退北向立讀祝文訖太祝再拜還本位少頃太祝帥齋郎幣爵酒饌物宰人舉羊肆觧之太祝并載埋於埳寘之執罇者徹罍篚席駕至權停太祝以爵酌酒授太僕卿左執轡右受酒祭兩軹及軌前乃飲受爵而退遂驅駕轢上而行通典功臣配享九白爾祖其從與享書周禮有功者書於太常祭於大蒸司勲詔之詔告神以辭死則蒸先王祭之左傳趙簡子祀董安于於廟智伯彊請趙簡子殺安于安于曰我死晉寧趙氏定矣乃縊而死故趙氏祀之祀曹真於太祖廟魏志又祫太祖廟祀功臣二十一人孔擇古名将十人配享武成廟闗播上元中詔擇古名将十人配享武成廟侑孔子播奏太公古賢今其下稱亞聖孔子十哲皆當時弟子今所配年世不同請罷之詔可示報德也栁宗元監察使壁記事於有功烈者示報德也不肅則無以勸善生宏佐命之道杜甫朝享太廟賦生宏佐命之道死配鬼神之列則殷劉房魏之勲是可以中摩伊吕上冠䕫卨代天之工為人之傑丹青滿地松竹髙節向不遇反正撥亂之主曽何以措其觔力與韜鈐載其刀筆與喉舌使祭則與食則邱若斯之盛而已配享太宗廟庭屈突通房𤣥齡髙宗李勣馬周睿宗劉幽求蘇瓌𤣥宗張說代宗郭子儀肅宗苗晉卿裴冕德宗李晟憲宗裴度貞觀十六年有司言禮功臣配享於廟庭禘享則不配依令禘祫之日功臣並得配享太常卿韋挺等議曰古者臣有大功享禄其後子孫率禮潔粢豐盛礿祠蒸甞四時不輟國家大祫又得配焉所以昭明其勲尊崇其徳以勸嗣臣也其禘及時享功臣皆不應享通典婦人祭十白毛詩采蘩夫人奉祭祀不失職也于以采蘩于沼于沚被之僮僮竦敬貌皆婦人助祭也祁祁舒遲貎采蘋大夫妻能循法度于以采蘋南澗之濵于以采藻于彼行潦誰其尸之有齋季女毛詩餴饎濯溉助祭記曰君在階夫人在房卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲饗之夫人薦豆執授豆中央直也授之執鐙鐙豆下跗副禕立于東房君制祭夫人薦盎制謂朝事薦骨膋君割牲夫人薦籩豆尸酢夫人執柄夫人授尸執足傳曰行潦之蘋藻季女尸之敬也孔抗言不可蔣欽緒中宗始親郊祝欽明建言皇后當亞獻欲以媚韋氏天子疑之詔禮官議衆曲意阿狥欽緒獨抗言不可諸儒壯其節享先蠶見后桑蠶門以皇后為亞獻祝欽明景龍三年天子将郊欽明與國子司業郭山暉隂迎韋后意謬立議后宜助祭帝果用其言取大臣李嶠等女為齋娘奉豆籩禮成詔齋娘有夫者悉進官引豔妻郊見上帝祝欽明賛欽明以經授中宗為朝大儒乃詭聖僻説引豔妻郊見上帝腥德播聞享祚不終􅀈􅀈衡笄翬翬䄖翟唐文粹齊夏之歌者夫人祭之所奏也􅀈􅀈衡笄翬翬䄖翟自内而祭為君之則祝史十一嘏附白宗廟本仁祝嘏首義鬼神饗德辭説貴誠祝史正辭信也季梁曰祝史矯舉以祭臣不知其可也季梁曰左傳薦信晏子曰祝史薦信是言罪也無愧辭叔向曰范武子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭神聰明正直監德觀惡國将興神降之監其德也國将亡又降之觀其惡也害盈福謙監德觀惡乞靈必由乎明德徼福不在於愧辭黍稷馨香叶于明德牲牷肥腯奉以正辭修其祝嘏禮祝以孝告嘏以慈告祝嘏辭說藏於私家非禮也周禮大祝掌六祝之辭以事鬼神祈福祥求永貞一曰順祝順豐年二曰年祝求永貞三曰吉祝祈福祥四曰化祝弭災兵五曰瑞祝逢時雨寧風旱六曰筴祝逺罪戾甸祝掌表貉之祝號甸者謂田以習兵之禮故爾貉祭音陌欲獲之多宗祝在廟詩曰祝祭于祊祀事孔明工祝致告傳曰祝有益也詛亦有損晏子為齊侯言人怨皆詛上祝不能勝兆人詛善祝尸祝不越樽俎莊子曰庖人雖不治庖尸祝不越樽俎之間而代之矣嘏之禮徧取黍稷牢肉以授尸也量人授舉斚斚當為嘏周禮卒爵飲之酳尸尸嘏主此卒爵儀禮啐酒進聽嘏嘏長也大也授尸以長大之福宜穡于房變黍言穡欲重稼也嘏辭曰宜稼于田眉壽永年詔祝於室孔祝署嗣皇帝顔真卿兩京復帝遣左司郎中李選告宗廟祝署嗣皇帝真卿謂禮儀使崔器曰上皇在蜀可乎器遽奏改之栁宗元貞符詩曰載揚于雅承天之嘏天之誠神宜鍳于仁神之曷依宜仁之歸濮鈆于北祝栗于南幅貟西東祗乃一心祝唐之紀後天罔墜祝皇之壽與地咸久曷徒祝之心誠篤之淫巫愚祝史思明陷洛陽有詔幸東都将親征蘇源明上疏極諫曰王者之於天地神祇享之以牲幣而已記曰不祈兮士彼淫巫愚祝妄有關說甚不可本傳尸十二白周禮尸出入奏肆夏周坐尸殷無事則尸立有事則坐坐尸於堂禮尸必式乗以几尊之尸出廟入朝必蹕蹕止行人卿大夫士皆下之君知所以為尸者則自下之也迎尸宿尸妥尸妥下坐也尸在廟門外則疑於臣入廟門内則全於君尸以入廟為尊祭成䘮者必有尸尸必以孫孫幼則使人抱之無尸則取於同姓可尸謖君與卿餕尸謖起也君子抱孫不抱子此言孫可以為王父尸子不可以為王父尸孔象其生極其教皮日休正尸祭尸象其生極其教也神降而拜象乎妥尸受福于神象乎酢尸祀享立尸于廟王則迎有拜有醑尸有禱所以立象生之教也今視唐禮皇帝神降而拜象乎妥尸受福于神象乎酢尸象其死窮其思同上聖人知生不足事事之死死不足其思制之生象其死窮其思肆夏文粹皮日休補九夏歌肆夏章肆夏之歌者尸出入之所奏也迎神之穀得神之祜愔愔清廟儀儀衮服我尸出矣迎神之穀杳杳隂竹坎坎路鼓我尸入矣得神之祜皮日休補九夏歌虞夏商周不變李華卜論夫祭有尸自虞夏商周不變戰國蕩古法祭無尸尸之重重於卜則明廢龜可也尸神象也祭所有尸者鬼神無形因尸以節醉飽孝子之心也夏后立尸而卒祭殷坐尸周坐尸詔侑無方其禮亦然其道一也通典尸之遺法同上今栁道州人每祭祀迎同姓丈夫婦人伴神以享亦為尸之遺法祭器十三白陳其宗器宗祭也簠簋既陳籩豆有踐書曰作繪宗彞繪畫也宗彞宗廟彞器也彞器器貢周禮器貢謂貢宗廟之器滌濯謂溉祭器也周禮云閭胥供祭器閭胥司徒之屬官也器謂簠簋鼎俎也度程月令孟冬命有司效功陳祭器案度程無作淫巧以蕩上心効功考其器也度大小也程所容也不鬻禮曰宗廟之器不鬻於市君子雖貧不鬻祭器不假禮大夫祭器不假祭器敝則埋之為先凡家造祭器為先養器為後禮無田禄者不設祭器不踰境大夫士去國祭器不踰境大夫寓祭器於大夫士寓祭器於士也掌蜃供蜃器之屬飾祭器之属可以白器鬯人主四方山川周禮辨六彞以待祼将六尊以待祭祀也展器告備司烜供明粢明水也滌粢盛陳器之道多陳而省納之可也以多為崇以節為禮醆斚諸侯則用時王之器敬則用祭器賔客來加敬者可以用祭器也四璉六瑚八簋梡嶡周禮内骨外骨却行連行紆行以脰鳴注鳴旁鳴翼鳴股鳴胷鳴謂之小蟲為雕琢刻畫祭器為雕琢庶物也國語欒武子其官不備宗器孔不飭顔真卿攝事太廟言祭器不飭元載以為誹謗貶峽州别駕祭器視物所宜韋縚傳賔客崔沔議曰大凡祭器視物所宜故大羮古饌也盛以㽅㽅古器也和羮時饌也盛以鉶鉶時器也有古饌而用時器者則毛血于盤交酒于尊未有進時饌用古器者古質而今文有所不稱也㓗于壇堂之上樽彞罍洗俎豆醆斚之器必㓗于壇堂之上栁宗元監察使記私習簋簠元和聖德詩掉棄兵革私習簋簠器皿觕弊不能嚴清韓愈祭神文物有品器有數韋縚傳張均韋述議曰使物有品器有數貴賤差降不得相越周制王食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醤用百有二十罋而以四籩四豆供祭祀此祀與賔客豐省不得同舊矣簠簋㽅俎皆一許敬宗言籩豆以多為貴宗廟乃踰於天請以大祀十二中祀十小祀八大祀中祀簠簋㽅俎皆一小祀無㽅詔可唐史韋叔夏傳奉禮郎凡祭器之位簠簋為前㽅鉶次之籩豆為後六典樽十四白易曰樽酒簋貳一樽之酒一簋之食言其約也周禮幂人以䟽布幂八樽畫巾幂六彞疏布者天地之神尚質畫巾者宗廟可以尚文畫者畫為雲氣大罍瓦罍杜蕢也禜門用瓢齎瓠割去底以齎為樽樽彞為上罍為下司樽彞掌六樽六彞之位詔其酌辨其用與其實春祀夏礿祼用雞彞鳥彞皆有舟鄭云舟樽下臺若今時承盤子秋甞冬蒸祼用斚彞黄彞皆有舟斝讀為稼畫禾稼也黄彞黄目樽朝獻用著樽饋獻用兩壺樽著樽者著晷樽也或曰著樽者著地無足也明堂位曰著殷樽也皆有罍凡四時之間祀追享朝享用虎彞蜼彞畫之為飾也蜼讀為虺皆有舟朝踐用大樽再獻用兩山樽皆有罍凡四方山川用蜃廟用脩祼用概凡疈用散皆漆犧樽鏘鏘詩記曰五獻之樽門外缶門内壺君樽瓦甒樽用犧象周小罍夏后氏黄目黄者中之色目者氣之清明也言酌於中而清明於外傳曰犧象不出門魯壺周靈王與士文伯宴樽以魯壺白獸樽晉書設白獸樽於殿廷樽盖上施白獸若有能献直言則發此樽飲酒案禮白獸樽乃杜舉之遺戒也孔黄金樽行酒田令孜置酒食諸将以黄金樽行酒即賜之常滿樽李元素為武德令刺史李文暕調民黄金造常滿樽𤣥酒太古未有麴糵汚樽抔飲則有𤣥酒之奠宗廟加籩豆議崔沔殁廟配樽斚韓愈晚秋郾城聯句樽俎蕭蕭杜甫南郊賦樽俎既陳肴羞惟時韓文樽爵静㓗同上南海廟碑奉禮郎凡樽彞之制十有四祭祀則陳之一曰太樽二曰著樽三曰犧樽四曰象樽五曰壺樽六曰山罍七曰概樽八曰散樽九曰山樽十曰蠯樽十一曰雞彞十二曰鳥彞十三曰斚彞十四曰黄彞有事于神祇則用太樽至于山罍有事于宗廟則春夏用雞鳥之彞秋冬用黄斚之彞星之外官用概樽岳鎮山林川澤用蠯樽衆星丘陵以下用散樽唐六典爵十五白周禮王爵儀禮主人洗廢爵爵無足繶爵虗爵以爵拜者不徒作言拜就爵者不徒起主人盥洗升媵觚于賔媵送媵爵坐尊爵記曰宗廟之禮貴者獻以爵賤者獻以散尊者舉觶卑者舉角以小為貴也夏醆殷斝周爵醆斝及尸君非禮也是謂僣君未步爵不甞羞步行也羞為爵設客爵居左酬賔爵也介爵酢爵僎爵皆居右三爵皆食爵也康爵詩酌此康爵以奏爾時孔祝欽明言禮家凡稱大祭祀不獨主天爵人大祭祀與量人受舉斝之卒爵祭天不祼則九嬪賛瑶爵宗廟稱大祭祀也捧爵是醮五帝坐壇百神立坫嵬嶷肹蠁捧爵是醮杜牧黄州祭神文執持甚難文粹今酌獻酒制度全小僅未一合執持甚難不可全依古制猶望稍湏廣大崔沔貴者獻以爵文粹按舊制一升曰爵五升曰散禮器稱宗廟之祭貴者獻以爵此明貴小賤大示之節儉宗廟加籩豆議韋述郊奠爵容止一合容小則陋宜増大之韋縚禮有以小為貴獻以爵是也崔沔太常言爵小不及合執持至難沔曰禮有以小為貴者獻以爵是也然今不及制則非禮自有司之陋也隨失制儀不待議而革去三爵諠譁李景伯中宗宴侍臣使酒酣令各為廻波詞衆皆為諂佞之詞至景伯曰廻波爾持酒巵微臣職在箴規侍宴既過三爵諠譁切恐非儀中宗不恱中書令蕭至忠稱之曰此真諌官也舊史俎十六徹俎附白取俎進俎不坐記凡為俎者以骨為貴賤殷貴髀周貴肩貴者取貴骨賤者取賤骨貴不重賤不虛示均也三牲之俎八簋之實美物備矣鳥獸之肉不登於俎則不射登俎謂祭用也凡祭於公者必自徹其俎主人自致其醤則客徹之非賔客一人徹同事各居者一食之人一人徹為聚食也凡燕婦人不徹質不備禮凡羞俎者則於内俎祭也孔伏身俎盤閻朝隱后有疾令往祀少室山乃沐浴伏身俎盤為犧請代后還奏㑹后亦愈大見褒賜淚落入俎戚見容色淚落入俎韓愈元和聖德詩罇俎既陳上巳日燕太學詩序禮數不同罇俎異争持酒肉來相饋禮數不同罇俎異韓桃源圖雕俎静嘉初筵循平雕俎静嘉劉禹錫武陵北亭記寇生幽陵文粹舒元輿國庠記自寇生幽陵軍旅之事始勝俎豆房俎斯薦賀知章祭地迎俎樂章粢盛以㓗房俎斯薦棊布盧從愿樂章太簇角品彚咸亨别俎棊布有馝張說祀天迎有馝章俎豆有馝㓗粢豐盛薦俎登鉶劉禹錫低簮委紳薦俎登鉶俎入之後接神亦如之五曰雍和凡祭祀以入俎天神之俎以黄鍾為宫地祇之俎以太簇為宫人鬼之俎以無射為宫又以徹豆凡祭俎入之後接神之曲亦如之樂志禹雕其俎褚遂良曰舜造漆器禹雕其俎載肉于俎栁送韓存義序盈實芳俎盈實源光裕送神顔回捧俎豆杜牧俎豆有馨齋戒豐㓗俎豆有馨張說開元樂章有豆孔碩蠲我漸糦㓗我膋薌有豆孔碩為羞既藏賈曽樂籩豆十七白于豆于登籩豆静嘉籩豆有踐並詩書曰駿犇走執籩豆謂來助祭周禮籩人掌四籩之實朝事之籩朝事血腥其實䵄蕡白黒形鹽膴鮑魚鱐饋食之籩薦熟時也其實棗栗桃䕩䕩乾梅加籩之實菱芡栗脯羞籩之實糗餌粉餈醢人掌四豆之實朝事之豆饋食之豆加豆之實羞豆之實禮記薦用玉豆雕篹篹籩属揭豆獻豆楚子入享于鄭加籩豆六品傳季孫宿如晉晉侯享之有加籩辭曰下臣得享不過三獻請徹加然後入卒事晉人以為知禮巵酒豆肉孔齋娘奉籩豆祝欽明帝用其言以皇后為亞獻取大臣李嶠等女為齋娘奉籩豆歲豆時籩唐文粹李庾西都賦寧觀俎豆之容炎凉代序寧觀俎豆之容少室山少姨廟碑銘序楊烱鯤鱬遺𦙍莫不備俎豆栁宗元漁者對時饌通於宴享賔客文粹鉶俎籩豆簠簋樽罍之實皆周人之時饌也其用通於宴享賔客加籩豆議崔沔盡天下美物文粹雖加籩豆十二味足以盡天下美物而措諸清廟有兼倍之名近於侈矣同上今欲以甘㫖肥濃皆充於祭張灼等議今欲以甘㫖肥濃皆充於祭茍踰舊制其何極焉雖籩豆有加不能備也宗廟籩豆皆加十二韋縚二十三年赦令籩豆之薦未能備物宜令禮官共議縚乃請宗廟籩豆皆加十二旄頭彗紫微無復俎豆事杜甫衡山文宣王廟鼎臑俎胾五獻百籩凡百卿士班以周旋栁文平淮夷雅以為有道死乃俎豆之為立祠黄溪記同上凄凄陳述聖披褐鉏俎豆李賀贈陳商有楚其豆栁宗元祭文上乾豆以登謌杜甫享太廟籩以石鹽槀魚棗栗榛菱芡之實鹿脯白餅黒餅糗餌粉粢唐禮志豆以韮葅醯醢菁葅鹿醢芹葅兔醢筍葅魚醢脾析葅豚胉􅓞食糝食同上中祀之籩無糗餌粉餈豆無飲食糝食小祀之籩無白餅黒餅豆無脾析葅豚胉凡用皆四者籩以石鹽棗實栗黄鹿脯豆以葵葅兎醢菁葅鹿醢用皆二者籩以栗黄牛脯豆以葵葅鹿醢用皆一者籩以牛脯豆以鹿醢太官令凡冬至圓丘之祀昊天上帝籩豆各十二六典珍羞令掌供庶羞之事丞為之二以實籩豆陸産之品曰榛栗脯羞水物之類曰魚鹽菱芡辨其名數㑹其出入同上膳部州縣祭社稷釋奠每座籩豆各八簠簋俎豆如上同上凡郊祀凡郊祀天地日月星辰岳瀆及享宗廟百神在京師者所用籩豆簠簋鉶㽅俎之數魚脯醯醢之味石鹽菜菓之羞並載於太官令州縣所實之物如京師之制同上祭服十八事具衣服門白祭服敝則焚之禹惡衣服而致美乎黻冕黻冕祭服記曰衛栁莊疾病雖當祭必告公再拜稽首請於尸曰有臣栁莊者社稷之臣也聞其疾請往至則不釋服而往遂以禭之郊天晉輿服志漢制二歲五郊天天子以執事所服各如方色百官不服執事者服常絳衣以從魏已來名為五時服正給四時秋服三年而一易入廟服又云公特進列侯卿大夫世婦夫人紺繒幗簮珥入廟自二千石夫人至皇后皆蠶衣為朝服絮巾魏志管寧字幼安徵不起每四時祭祀輒著絮巾故在遼東有帛單衣親薦饋饌跪拜成禮者也孔天子之服十四大裘冕祀天地衮冕踐阼饗廟鷩冕有事逺王毳冕祭海岳絺冕祭社稷饗先農元冕蜡祭百神朝日夕月唐志藏天子祭服百官志太常寺凡藏大享之器服有四院二曰御衣院藏天子祭服皮弁大裘始進於穹崇之幕杜甫南郊賦天子祀天地服大裘冕車服志顯慶元年長孫無忌等曰武德初撰衣服令天子祀天地服大裘冕按周郊被衮以象天戴冕藻有十二旒與大裘異月令孟冬天子始裘以禦寒若啓蟄祈穀冬至報天服裘可也季夏迎氣龍見而雩如之何可服故厯代唯服衮章漢明帝始采周官禮記制祀天地之服天子備十二章後魏周隋皆如之伏請郊祀天地服衮冕大裘請循厯代故事諸祭皆用衮冕又新禮皇帝祭社稷服絺冕四旒三章祭日月服元冕三旒衣無章按令文四品五品之服也三公亞獻皆服衮孤卿服毳鷩是天子同於大夫君少臣多非禮之中且天子十二為節以法天烏有四旒三章之服若諸臣助祭冕與王同是貴賤無分也若降王一等則王服元冕羣臣服爵弁既屈天子又貶公卿周禮此文乆不用矣猶祭祀之有尸侑以君親而拜臣子硩蔟蟈氏之職不通行者盖多故漢魏承用衮冕今新禮親祭日月服五品之服請循厯代故事諸祭皆用衮冕制曰可同上凡冕服及爵弁助祭則服之唐六典凡冕服及爵弁助祭則服之若私家祭祀三品以上及褒聖侯祭孔子皆服元冕五品以上服爵弁六品以下通服進賢冠之服白孔六帖卷六十九
