body:
  text: 白孔六帖卷四十二唐白居易原本宋孔傳續撰攝官一侵官二離局三濫官四賣官爵五詐稱官六巧官七胥吏八申牒文書九才稱職十才過職十一不稱職十二愼擇十三未能爲政十四俸禄十五世禄十六禄不兼利十七寛猛相濟十八替代十九攝官一白名器不可假人官事不攝管仲奢僣士㑹攝右晉文公城濮之役舟之僑先歸士會攝右叔魚攝理晉邢侯與雍子争鄐田士景伯如楚叔魚攝理理獄官攝官承乏供二衛侯將會使祝佗從辭曰臣展四體以率舊職猶懼不給而煩刑書若又攝官招大罪也承乏謂兼二職也拜眞眞受也兼人之職不貳事禮將效一官敢有二事攝政孔子爲司寇攝政七日誅少正卯兼二事傳沈諸梁兼二事二事謂令尹司馬也假器孔停天下攝官劉晏時經費不充停天下攝官獨租庸得補署積數百人皆新進敏銳盡當時之選趣督倚辦故能成功攝官升山張九齡署吏攝百司繁而不綱杜佑始度支嗇用度多佑以署吏攝百司繁而不綱佑以營繕還將作本炭歸司農練染還少府職務簡修兼攝行軍長史李靖陳圖蕭銑十䇿有詔拜靖行軍揔管兼攝孝恭行軍長史募官攝府縣崔光逺元宗西狩詔留光逺爲京兆尹西京留守採訪使乗輿已出都人亂入左藏大盈庫争輦財珍光逺募官攝府縣隨闔宫闕斬數十人乃定地貧俸薄潞磁等四州縣令録事參軍地貧俸薄無人願請多是假攝李德裕會昌一品制集擇文武攝臺省官李晟擇文武攝臺省官以俟乗輿何攝爲李巨授陳留譙郡太守攝御史大夫明日謝帝驚曰何攝爲即詔御史大夫韋相攝衛嶺南異物志韋執誼貶崔州司户刺史閔其羈旅乃舉前件官在朝廷頗諳公事幸其佐理勿憚糜費請參韋相攝衛侵官二白侵官冒也一失其位不謀其政君子思不出其位各有司存思難不越官信也君子行無越思守不假器絜瓶難假不能恤緯傳嫠不恤其緯而憂宗周之殞焉用代庖莊子庖人雖不理庖尸祝不越樽爼而代之兼人之智出位之思侵冒越思各恭乃位出則有尤如冒厥官過猶不及不貳事不移官禮各司其局雖則奉公且爲出位行茍越思動而生悔代斵易而生亂過則有刑將效一官敢有二事茍越思於乃職必速戾于厥躬律諸越司侵職者杖七十議曰設官分職各有司存越其本司侵人職掌當杖之也孔不敢侵官魏謩帝勅謩曰事有不當毋嫌論奏謩對臣頃爲諫官故得有所陳今則記言動不敢侵官設官各以其事治杜淹建言諸司文案稽期請以御史檢按太宗以問㒒射封倫倫曰設官各以其事治御史劾不法而索按求疵是大苛且侵官淹黙然相侵楊炎舊制中書舍人分押尚書六曹以平奏報開元初廢其職盧杞請復之炎固以爲不可杞益怒又宻啓主書過咎逐之炎曰主書吾局吏也吾當自治之奈何相侵邪嫌其出位白居易拜左賛善大夫是時盜殺武元衡京師震擾居易首上䟽請亟捕賊刷朝廷恥以必得爲期宰相嫌其出位不恱知五品選盧承慶檢校兵部侍郎知五品選辭曰選事在尚書臣掌之爲出位帝不許曰朕信卿卿何不自信離局三白失官慢也離局奸也一失其位寵名皆棄臣之失職常刑無赦一日失職則死及之叛官離次遐棄厥司慢官慢易既忘恤緯是不理庖各司其局禮各揚其職揚舉廢職服刑云云由官邪也爾爾則死及之闕擅去官吉茂同産兄黄爲長陵令時禁長吏闕擅去黄聞司徒趙温薨以故吏違科犇䘮司𨽻鍾繇收伏法徵書未至擅去石崇爲荆州徵爲大司農以徵書未至擅去官免之旬日還阮籍爲束平相到郡法令清簡旬日却乗驢還出界晉郭弈爲野王令羊祜過之遂送祜出界數百里坐此免官離軍營求免後漢皇甫規威明爲渡遼將軍欲退身數上病不許友人王旻䘮還規越界迎因令客宻告并州刺史胡芳奏芳曰威明欲避第故耳吾當爲朝廷愛才何能申此子計遂不問也孔不樂職輒去張建封湖南觀察使韋之晉辟署參謀授左清道兵曹參軍不樂職輒去疾其姦蕭存張滂主財賦辟存留務京師裴延齡與滂不叶存疾其姦去官濫官四白爛羊後漢更始官爵皆賈豎羣小語曰竈下養中郎將爛羊胃騎都尉爛羊頭封公侯鴻都後漢靈帝好學祭酒樂松賈護多引無行趍勢之徒並待詔鴻都門士君子皆深耻之貂不足狗尾續晉趙王倫篡位同謀者越階次奴卒厮役亦加爵位毎會貂蟬盈坐時人語曰貂不足狗尾續樂公樂卿漢武時國用耗竭有司請賣爵置賞官名曰武功爵得至樂公樂卿者朝位從九品加樂者別正卿人十九爵二十爵至樂卿食公卿祿而無二也孔斜封官安樂與太平等七公主皆開府而主府官屬尤濫皆出屠販納貲售官降墨勑斜封授之故號斜封官韓琬言仕路太廣故弃農商而趨之一夫耕一婦蠶衣食百人欲儲蓄有餘安可得乎胥史濫章韍張九齡帝封泰山張說多引兩省録事主書及所親攝官升山超階至九品九齡當草詔謂說曰官爵者天下之公器先德望後勞舊今登封告成千載之絶典而清流隔於殊恩胥史乃濫章韍恐制出四方失望既而果得謗倡優授官魏元忠陳郡男子袁楚客以書規之唯名與器不可以假人故曰天工人其代之夫代天非材不可也代非其人必失天意失天意而無患禍未之有也今倡優之輩因耳目之好遂授以官非輕朝廷亂正法邪人君無私私怒害物私賞費財況私人以官乎優人擢將軍曹確優人李可及擢爲威衛將軍確曰太宗著令文武官六百四十三謂房𤣥齡曰朕設此待天下之賢人士工商雜流假使拔出等夷正當厚給以財不可假以官與賢者比肩立同坐食也文宗欲以樂工尉遟璋爲王府掾竇洵直固争卒授光州長史今而位將軍不可帝不聽分職建官不可以濫李嶠在吏部時隂欲藉時望復宰相乃奏置員外官數千既吏衆猥府庫虚耗乃上書歸咎于時因盖前非曰分職建官不可以濫傳曰官不必備惟其人自帝室中興以不謹爵賞爲惠冒級躐階朝陞夕改正闕不給加以員外内則府庫爲殫外則黎庶蒙害非求賢助給之道也臺閣之内朱紫盈滿蕭至忠同平章事上䟽陳時政曰今列位已廣冗員復倍陛下降不貲之澤近戚有無涯之請臺閣之内朱紫盈滿官秩益輕恩賞彌數舞胡致位五品鳴玉曳組趨馳廊廡非貽則子孫之道也李綱諫䟽白版侯朝野僉載武后時封侯者衆鑄印不供至有白版侯者焉委事受權袁楚客規魏元忠閹竪者給宫掖掃除事古以奴𨽻畜之中古以來大道乖䘮䟽賢哲親近習乃委之以事受之以權故竪刁亂齊伊戾敗宋君側之人衆所畏懼所謂鷹頭之蠅廟垣之鼠者也今大君中興獨有閹豎坐升班秩既無正闕率受員外乃盈千人綰青紫耗府庫獻𤓰陸贄幸梁有獻𤓰者帝嘉其意欲授以試官贄曰爵祿者天下公器不可輕也今獻𤓰一器果一盛則受之彼忘軀者有以相謂矣曰吾之軀命乃同𤓰果草木也若草木然人何勸焉内外盈溢至無聽事以居當時謂之三無坐處選舉志中宗時韋后及太平安樂公主等用事於側門降墨勑斜封受官號斜封官凡數千員内外盈溢至無聽事以居當時謂之三無坐處言宰相御史及員外郎也今取士多且濫劉祥知選事上䟽陳六事一曰今取士多且濫入流歲千四百多也雜色入流未始銓汰濫也故共務者善人少惡人多臣謂應雜色進者切責有司試判爲四等第一付吏部二付兵部三付主爵四付司勲若坐負當責雖經赦仍配三司不者還本貫則官不雜矣比年不加簡擇京官坐負及聲稱下者乃典州吏部年高不善刀筆者乃擬縣朝輕用人何以治國願加汰擇韋嗣立員外置官數倍正闕曹署典吏困於發事管府倉儲竭於資俸同上論官濫䟽麒麟楦唐楊炯毎呼朝士爲麒麟楦或問之曰今假弄麒麟者必修飾其形覆之驢上宛然異物及去其皮還是驢爾無德而朱紫何以異是張鷟朝野僉載補闕連車載武后時官濫謠曰補闕連車載拾遺平斗量欋椎侍御史椀脫校書郎云騶子倡人鳴玉曳履舊史孔子曰惟名與器不可假人是言謹舉之爲重也臣伏見王長通白明達本自樂工輿皁雜類韋槃提斛斯正則更無他材獨解調焉縱使術踰儕輩伎能有取可厚賜錢帛以富其家豈宜列預仕流起授高爵遂使㑹朝之位萬國來庭騶子倡人鳴玉曳履與夫朝賢君子比肩而立同坐而食臣竊恥之馬周賣官爵五白入粟拜爵漢食貨志晁錯䇿重粟之道在於以粟爲賞罰令募天下入粟縣官拜爵得以除罪如此富人有爵農人有錢粟有所渫渫散也息列反帝從之入奴爲郎後漢府庫虚乃募人入奴婢得以終身爲郎先爲郎者増秩入羊又入羊爲郎受爵賞欲移賣者無所流駝無所差次駝者移也入粟黄覇入榖沉黎郡補左馮翊二百石卒吏注云三輔郡得仕也郡爲卒吏二百石尤異也以貲爲郎張釋之以貲爲郎注漢法貲五百萬得爲常侍郎郎官桑宏羊爲均輸令吏人入粟補郎官至六百石食貨志云漢桓帝占賣關内侯以貲爲郎司馬相如非其好也賣公卿靈帝開鴻都門賣官又私令左右賣公卿公千萬卿五百萬崔烈入錢行三公問子鈞曰我爲三公人以爲何鈞曰論者嫌其銅臭烈怒擊之禮錢後漢三公皆輸禮錢或以錢不足免西園曹嵩輸西園錢位至太尉賂遺求達魏張德容爲門下小吏家富自惟寒素念無以自逹乃常畜好刀筆伺大吏有乏者即給之以此見識逹也賂遺求官張譲專權孟佗以蒲桃酒一斗遺譲譲拜佗凉州刺史以貨賣鴈門太守見干謁門孔柳澤上䟽曰竊見神龍以來紀綱大壊内寵專命外嬖制權因貴慿勢賣官鬻爵妃主之門同商賈然舉選之署若闤闠然屠販者由邪忝官廢黜者因姦冒進天下溷亂㡬危社稷召富人納貲胡証爲和親使舊制行人有私覿禮縣官不能具召富人子納貲於使而命之官証請儉受省費以絶鬻官之濫母妻諸子賣官李義府母妻諸子賣官市獄門如沸湯賣官收貲濟軍興裴冕太子即位進冕同平章乃建言賣官收貲濟軍興時取償既賤衆不爲宜錢多者得之前蜀王衍太后太妃以教令賣官自刺史以下毎一官闕必數人並争而入錢多者得之堂牒賣官王昶遣醫人陳究以空名堂牒賣官五代閩世家多受金錢中宗庶人韋氏稍寵樹親屬封拜之昭容與乳母及尚宫賀婁等多受金錢封巫趙隴西夫人禁中勢與上官埒繇是墨敕斜封出矣納貲售官號斜封安樂公主官属尤濫皆出屠販納貲售官降墨敕斜封授之故號斜封官納錢物給告身至德四年宣諭使侍御史鄭叔清奏承前諸使下召納錢物多給空名告身雖假以官賞其忠義猶未盡財能今皆量文武才藝兼情願穩使據條格擬同申奏聞通典仇敵賈販韓琬上言往選司從容有禮今如仇敵賈販詐稱官六白御史漢魏相爲茂陵令御史大夫桑宏羊詐稱御史止傳縣之傳舍也丞不以時謁客怒縛丞相疑其有奸收捕案致其罪漢使者後漢公孫述使人詐稱漢使者假述益州收印綬孔冒牒取調戴胄爲大理少卿時選者盛集有詭資䕃冒牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流詐其子使不俟朝制李抱眞卒其子緘匿䘮與其属謀會諸將元仲經詭抱眞令曰吾疾不任事令緘典軍即爲抱眞表翌日令諸將署章請以節付緘天子已聞抱眞䘮遣使者馳入軍詔以事属大將王延貴緘愕然謂諸將曰詔不許若何乃遽以印鑰上監軍始發䘮使者趣延貴視事護緘赴東都始緘遣將陳榮以書抵武俊假其財武俊怒曰吾與乃公善者恭王命非同惡也今聞已亡誰詐其子使不俟朝制邪囚榮而讓緘焉冒名仕至縣令王式慈溪民陳瑊冒名仕至縣令豪縱州不能制式窮治其姦榜死自稱清海軍掌書記五代李鏻唐宗室子少舉進士累不中客河朔間自稱清海軍掌書記謁定州王處直處直不爲禮乃易其綠衣更爲緋衣謁常山李宏規宏規進之趙王王鎔鎔留爲從事未拜命而稱新官同上何擇與宰相趙鳳有舊數私于鳳求爲給諫鳳薄其爲人以爲太常少卿敕未出而澤先知之即稱新官上章自訴章下中書鳳等言未拜命而稱新官輕侮朝廷請坐以法乃以太僕少卿致仕告假冒宗室李義琛始被譎匿身爲傭保而嗣生許瓘利其爵邑告義琛假冒復流嶺外巧官七白司馬安漢汲黯姊子司馬安文巧官官四至九卿以河南太守卒昆季以安故同時至二千石者十人持祿專祿以周旋汲黯謂公孫宏曰齊人多詐始與臣約即上前皆背之遊五侯門漢五侯不相得賔客不同唯樓護君卿遊五侯門盡能得其歡心孔餉謝權倖韋陟襲郇國公坐事貶後爲河東太守以失職内怏怏乃毁亷隅頗餉謝權倖欲自結容容持祿李元素元和初召爲御史大夫一不建爲容容持祿内望作宰相久之不見用結權倖求鎭守鄭權遷工部尚書乃結權倖求鎮守於是檢校尚書右僕射嶺南節度使多裒貲珍使吏輸送凢帝左右助力者皆有納焉人笑之隂事宰相以久其權郭英乂東都平權知留守隂事宰相元載以久其權未㡬嚴武死成都乃拜劒南節度使所至聚斂諧結權近楊元卿性憸巧所至聚斂諧結權近故累更方任僞不勝宗室道古巧求宦便佞傾下游公卿間常與奕博僞不勝厚進所償嗜利者多得其懽心因鄭注以交王守澄王式少節儉巧于宦因鄭注以交王守澄中丞歸融劾之出爲江陵少尹柔聲婉顔狐媚當權孫樵逐痁鬼文有司馬安者攘仁盜義縛舌膠脣柔聲婉顔狐媚當權死而有靈是爲巧鬼此鬼依人辭枯即榮長劒華纓高步天庭胥吏八白恥於厮役後漢趙煜爲縣吏捧檄迎督郵煜耻於厮役弃車馬去從杜撫授韓詩陶侃鄱陽人呉平徙廬江之潯陽早孤爲縣吏胥徒小胥操牘吏部式諸流外官滿未滿得勲五品已上叙勲勅至省者陳牒請解於兵部續勞上經三年折當考考滿日從流外資叙不得輒叙勲階若六品以上勲及國勲不在此限小吏入令被中光逸事見屬吏門注孔爲中書令薛稷㑹鍾紹京爲中書令稷諷使譲因入言於帝曰紹京本胥吏素無才望今特以勲進長百僚恐非朝廷具瞻之美劉祥道六事六曰三省都事主事主書比選補皆取流外有刀筆者雖欲參用士流率以儔類爲耻前後相㳂遂成故事且掖省崇峻王言祕宻尚書政本人物所歸專責曹吏理有未盡宜稍革之以清其選爲書與所善吏刺取朝廷事李乾祐甞爲書與所善吏刺取朝廷事迷隱其辭爲吏所賣胥吏非宰相器牛仙客帝既用仙客知時望不歸乘間以問高力士力士曰仙客本胥吏非宰相器帝忿然曰朕且用康𧦬盖恚言也罷省胥韓洄罷省胥吏冗食三千人堂吏數招權納賄賂韋處厚同平章事堂吏湯鈢數招權納賄賂處厚笑曰此半滑渙也斥出之相府肅然中書史李吉甫中書史滑渙素厚中人劉光琦凢宰相議爲光琦持異者使渙請常得如素宦人傳詔或不至中書召渙於延英承㫖迎附羣意即爲文書宰相至有不及知者由是通四方賂謝弟泳官至刺史鄭餘慶當國嘗一責怒數日即罷去吉甫請間劾其姦捕臺府吏王源中遷左補闕是時中官領禁兵數亂法捕臺府吏屬繫軍中源中上言臺憲者紀綱地府縣責成之所設吏有罪宜歸有司無令北軍亂南衙麾下重於仗内帝納之宿姦老吏裴延齡擢司農少卿素不善財計乃廣鈎距取宿姦老吏與謀以固帝幸出入辜平南唐曹隨知盧陵吉陽令先是邑有二胥酋辨於治體亦精於法律惟能出入辜平時邑民苦之謂之長短星隨以爲親信雖制之以度未爲之殘蠧然或爲之所欺罔而隨不之覺野史巧吏猾徒縁姦而奮張九齡上言張元素與孫伏伽在隋皆爲令史張元素傳牛仙客擢胥吏目不知書張九齡帝將以凉州都督牛仙客爲尚書九齡執曰不可帝怒曰豈以仙客寒士嫌之邪卿固素有門閱哉九齡頓首曰臣荒陬孤生陛下過聽以文學用臣牛仙客擢胥吏目不知書韓信淮隂一壯夫羞絳灌等列陛下必用仙客臣實耻之胥曹失色陸亘遷太常博士禮史孟真練容典博士降色訪逮史倚以倨横會將册皇太子草儀真參議偃蹇亘榜逐之胥曹失色梁客將梁王欲以嬖吏張延範爲太常卿唐宰相裴樞以爲太常卿以清流爲之延範乃梁客將不可梁王大怒曰吾常謂裴樞純厚不蹈浮薄亦為此耶是歲四月彗出西北文昌軒轅天市宰相柳琛希梁王㫖歸其譴於大臣於是左僕射樞等皆以無罪貶同日賜死於白馬驛五代申牒文書九簿書文案符牒附白月終周禮小宰月終則以官府之叙受羣吏之要注云毎月之小計也賛冢宰受歲會終令羣吏致事注使齎歲盈文書來今上計也具文漢宣詔曰上計簿具文而已計簿書黄覇爲馮翊二百石卒吏顔郡錢計簿書以廉正見稱辭案後漢周紆爲齊相任刑法善爲辭案爲州内所則也自校簿諸葛亮常自校簿顒直入諫曰爲理有體上下不可相侵云云亮謝之吕範周谷吳志初孫䇿吏吕範典主財物孫權私求必關白不敢私許當時見望權守陽羨長有私用䇿或料覆功曹周谷爲傳著文簿譴問權臨時恱之及統事以範忠誠厚見信任以谷能欺更簿不用也案牘簿領送解式公式今諸州使人送解至京二十條已上一日付了四十條已上三日了一百條已上四日了二百條已上五日了不視文書後漢向栩字甫興爲趙相不視文書舍中生蒿萊治藏周禮一曰府掌官契以治治藏人主財用簿書也賛治史掌官書以賛治贊治今起革文書也失則名辟名者以官刑注辟多詐作書與實不相應也司書主財用簿書文致嚴延年治獄皆文致不可得反反音幡致至也宻也言大案至宻也多張文簿計簿也計文不改謂上計文書不改也對簿謂獄訟文簿也舉書孔廷無稽牒張嘉正遷兵部員外郎時功狀盈几郎史不能决嘉正爲詳處不閱旬廷無稽牒考簿用墨王徽進考功員外郎故事考簿以朱注上下爲殿最歲久易漫吏輒竄爲姦徽始用墨遂絶妄欺誓牒嗣襄王煴僣號迫羣臣作誓牒徽託手弱卒不肯署請豫立簿注蘇瓌十道使括天下亡戸初不立籍瓌請罷十道使專責州縣豫立簿注天下同日閱正盡一月止視簿領紛積反用爲樂王播毎視簿領紛積於前人所不堪者播反用爲樂沉埋案牘間韋蘇州髙陵書情開卷不及顧沉埋案牘間束帶理官府簡牘盈目前同上寄韓明府盧主簿訟牒滿前温彦博爲吏部汰擇士類寡術不能厭衆訟牒滿前時譏其煩碎盧從愿爲吏部精力于官僞牒詭功摘檢無所遺裴遵慶性彊敏視簿牒詳而不苛世稱吏事第一苗晉卿練逹事體百官簿最一省無遺才稱職十白爵不踰德授方任能類能而使之任良授官君子使人也器之行爵出祿必當其位月令量能授爵其人存則其政舉輪轅適用記曰司馬辨論官材論辨然後官之任定然後爵之位定然後祿之官有小大所貴授方才有長短各宜適用任非其人則官邪而政廢才稱所職必事舉而績成智以效官才宜稱職薛宣換縣宣爲馮翊令潁陽令薛恭與粟邑令尹賞換縣二縣皆理孔京尹稱職嚴郡拜京兆尹減𨽻宫匠丁數百千人號稱職尹振職高釴累進吏部侍郎人善其振職掌文翰薛元敬秦王爲皇太子除舍人於是軍國之務揔於東宫而元恭掌文翰號稱職百司善職張元素若上賢右能使百司善職則高居深拱疇敢犯之以清毅聞齊澣爲汴州刺史地當舟車湊集事浩繁前刺史數不稱職澣以清毅聞吏民頌美持法明審蔣沇遷大理卿持法明審號稱職衆號稱職裴冕厯殿中侍御史少學術然明銳果於事衆號稱職挺議鯁固獨孤郁進右補闕吐突承璀討王承宗郁執不可挺議鯁固號稱職在職以才顯邵說擢吏部侍郎在職以才顯外郎稱職狄光嗣聖厯初爲司府丞武后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚内舉果得人循名責實劉瑑嘗與崔謹由議帝前謹由請甄别流品瑑質曰王夷甫相晉崇尚浮虚以述流品卒致淪夷今日不循名責實使百吏各稱職而先流品未知所以致治也所用皆稱職薛珏入爲司農卿是時詔舉堪刺史縣令者且百人延問人間疾苦吏得失取尤通逹者什二宰相欲校以文辭珏曰求良吏不可責文學宜以上愛人之本爲心也宰臣多其計所用皆稱職韓臯資質重厚有大臣器遷中書舍人御史中丞兵部侍郎號稱職以善職稱韋䋲天寳初入爲秘書少監元宗尚文視其職如尚書丞郎繩刋具圖書以善職稱以稱職兼學士張次宗開成初爲起居舍人文宗詔左右史立螭頭記奏對既退帝召見審正是非故開成時事爲最詳以稱職兼集賢院直學士校外官歲考崔隱甫校外官歲考異時必委曲參審竟春未定隱甫一日㑹朝集使詢逮檢實其暮皆訖議者服其敏帝嘗謂曰卿爲大夫天下以爲稱職世稱吏事第一裴遵慶判南曹天寶時選者歲萬計視簿牒詳而不苛世稱吏事第一銓汰文武李迥秀大足初檢校夏官侍郎仍領選銓汰文武號稱職無易珙才崔珙徐州以王智興後軍驕數犯法天子思材望威烈者撿革其弊知珙治軍精嚴上即謂宰相曰欲武寧節度使者無易珙才以稱職魏知古詔知東都吏部選事以稱職聞才過職十一白趙魏則優子曰孟公綽爲趙魏老則優不可以爲滕薛大夫恭賞皆理換縣事見上門鳳棲王渙辟仇香爲主簿謂曰主簿不討陳文之罪得無少鷹鸇之志乎香曰以爲鷹鸇不如鸞鳳渙乃謝曰枳棘非鳯鸞所棲也驥展龐統字士元劉備在荆州以士元爲棗陽令在縣不理免官魯肅曰士元之俊才百里不足以展驥足耳備召士元與語大竒之乃以爲治中割雞焉用牛刀子謂子游屈而未伸宜展驥足過猶不及馬用牛刀智以效官才宜稱職位不充量漢家人浮於食禮不理蔣琬公琰爲廣都長蜀先主因遊觀奄至廣都衆事不理而又沉醉先主大怒將戮之諸葛亮曰琬社稷之器非百里之才宜重察之乃不罪免官而已孔才用特達張行成髙祖謂吏部侍郎張銳曰今選吏豈無才用特達者朕將用之銳言行成調富平主簿有能名大才當大用韋安石舉明經調乾封尉雍州長史蘇良嗣器之良嗣當國謂安石曰大才當大用徒勞州縣可乎薦于武后屈長才於短用者猶猫捕鼠而斧剪毛也白居易䇿林審官器宏者耻效以圭撮之任足逸者難拘以尋常之地柳宗元柳渾行狀位不配才趙元少負志略武后稱制懼不容其高調宜祿尉自傷位不配才卒才不稱職十二白無德而禄殃也舟之僑陳力就列不能者止周任有言雖有其位茍無其德則素餐也辱髙位尸禄曹子建表君無虚授臣無虚受虚受是尸禄也以速官謗而煩刑書求賢審官以資共理陳力就列不能者止尸官之責圓鑿方枘折足覆餗易云鼎折足覆公餗言不勝任德薄而位尊力小而任重小人而乗君子之器易負且乗致冠至負也者小人之事也乗也者君子之器也小人而乗君子之噐盜斯奪之矣才稱其職乃事舉績成任非其能則官邪政廢薛恭之才但能理於小邑公綽之用不可以爲大夫智以效官力宜稱職所宜舉德安能食浮能小不能大晉庾峻上䟽吏厯試無績依古終身不仕則官無粃政矣能小不能大可降還涖小則人以器之孔朝野嗤薄韋待價起武力典選無銓緫才故朝野共嗤薄之時譏煩碎温彦博檢校吏部侍郎訟牒滿廷時譏其煩碎不爲時所稱楊師道爲吏部尚書起貴胄四海人物非所練悉至銓署專抑勢貴親黨以逺嫌用人多違其才不爲時所稱牛僧孺宿州刺史李直臣坐賕當死賂宦侍爲助具獄上帝曰直臣有才朕欲貸而用之僧孺曰彼不才持禄取容爾天子制法所以束縳有才者禄山朱泚以才過人故亂天下帝異其言乃止廢誅則天皇后武氏臨朝不惜爵位以籠四方豪傑自爲助雖妄男子言有所合輒不次官之至不稱職尋亦廢誅不少縱務取實材真能以不職罷崔渙爲江淮宣諭選補使職受不甚精以不職罷朝野雜然輕笑元稹進同平章事朝野雜然輕笑循黙王涯同中書門下平章事坐循黙不稱職罷都督不稱職盧祖尚貞觀二年交州都督以賄敗太宗方擇人任之咸以祖尚才備文武可用也召見内殿謂曰交州去朝廷逺前都督不稱職公爲我行無以道逺辭也祖尚頓首奉詔不爲人所瞻望鄭綮同平章事自以不爲人所瞻望纔三月以疾乞骸骨任小能於大事猶狸搏虎而刀伐木也白居易䇿林審官韋挺不禮馬周及周爲中書令帝欲湔洗用之周言挺狠于自用非宰相器但才麄可供任使已耳捭豚臑拒貙牙韓偓鄭綮賛懿僖以來賢人遁逃天子塊然所與者惟佞愎庸奴乃欲鄣横流支已顛寧不殆哉觀綮朴輩不次而用捭豚臑拒貙牙趣亡而已一韓偓不能容況賢者乎本道使具條以聞楊綰開元時置諸道採訪使得專停刺史威柄外移漸不可久其刺史不稱職若贓負本道使其條以聞不得擅追及停謹擇十三白難其人務在擇人明試登庸掄材官不必備惟其人防請託漢何武君公問文吏必於儒者問儒者必於文吏以相參驗欲除吏先爲科例以防請託也召故吏擇尹翁歸字子况去吏家居田延年爲河東守行縣至平陽悉召故吏五六十人親臨見令有文者東有武者西翁歸獨伏不起曰翁歸文武兼備唯所施設功曹以爲不遜延年曰何傷召上辭問甚竒之是日補卒史選孤介第五倫伯魚爲蜀郡民吏富掾吏皆鮮車駕馬以財貨自達倫患之簡其豐贍者還之選孤介志行者以處曹任於是貨財抑絶孔擇僚吏堪御史者盧齊卿長安初爲雍州參軍武后詔長史薛季昶擇僚吏堪御史者季昶訪於齊卿曰盧懐景等皆爲通顯巨人創大厦濟巨川必擇文梓艅艎韋承慶明堂災上䟽諫以文明垂拱後執政者未滿歲率以罪去大抵皆惡逆不道夫創大厦濟巨川必擇文梓艅艎若亟毁而敗則是庇朽木乗膠船也臣謂陛下求賢之意切而取人之路寛故一言有合而付大任夫以堯舉舜猶厯試諸艱況庸庸者可超處輔相以百揆萬機畀小人哉書聞不報所擇悉韋嗣立建言設官建吏本於治人官得其人則天下治古者取士先鄉曲之譽然後辟於州州已試然後辟五府五府著聞乃升諸朝得不謂所擇悉而所厯深乎刺史縣令治人之首比年不加簡擇京官坐負及聲稱下者乃典州吏部年髙不善刀筆者乃擬縣朝輕用人何以治國願下有司精加汰擇蕭至忠上䟽臣願陛下愛惜爵賞官無虚授進大雅以樞近退小人於閒左使政令惟一私不害公則天下幸甚帝親擇吏宰畿邑柳渾判門下省帝嘗親擇吏宰畿邑而政有狀召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖德當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之爲官擇人戴叔倫齊映劉滋執政叔倫勸以天下州縣有上中下緊望雄輕者有司銓擬皆便所私此非爲官擇人爲人求治之術映等重其言劉祥道䟽古者爲官擇人不聞取人多而官少官不擇才桓彦範俄墨敕以方士鄭普思爲祕書監葉静能爲國子祭酒彦範執不可曰臣恐物議謂陛下官不擇才以天秩加私愛不從推擇官材韋處厚推擇官材徃徃棄瑕録善時亦譏其太廣凡兹廷臣汝擇自從汝其徃衣食予士凡兹廷臣汝擇自從韓文淮西碑爲官擇人者治竇誕爲宗正卿太宗與語昏謬失對乃下詔曰誕比衰耗不能事朕知而任之是謂不明且爲官擇人者治爲人擇官者亂當擇清流後蜀孟昶有上書言臺省官當擇清流昶嘆曰何不言擇其人而任之士不可不察官不可妄授薛登請擇賢才疏堯資八元而庶績共理周任十亂而天下和平則士不可不察官不可妄授也桓公得敬仲則興隆霸業漢元信石顯而大穢明德信任同而理亂異者何也所任用非其人也賛皇害霸論令製美錦韋思謙初拜左丞奏曰陛下爲官擇人非其人則闕今不惜美錦令臣製之舊史豈待情樂御史中丞桓彦範舉陽嶠爲御史嶠不樂彈糾之事彦範曰爲官擇人豈待情樂遂引爲右臺侍御史爲官擇人至公之道陸元方子象先本名景初時吏部侍郎吉頊擢爲洛陽尉元方時亦爲吏部固辭不敢當頊曰爲官擇人至公之道陸景初才望髙雅非常流所及實不以吏部之子妄推薦也竟奏授之史察行覈才臣伏見比年御史轉郎官拾遺遷闕未聞受命之日天下有以知其由至於繡衣持斧不聞擒其姦决其獄而得者既得而遷又如是拾遺司諫不聞著其狀獻其言而得者亦如是二端登賢之象也若然陛下於此不察其行何以察之於此不覈其才何以覈之牛僧孺賢良䇿亦以擇賢才蕭至忠曰貞觀故事宰相子弟多居外職非直抑彊宗亦以擇賢才爾未能爲政十四白君爲政勿鹵莽莊子未能操刀而使割子皮欲使尹何爲邑宰子産曰少猶未能操刀而使割也其傷實多美錦學製子産謂子皮曰子有美錦不使學製焉大官大邑所以庇身而使學者製焉其爲美錦不亦多乎僑聞學而後入政未聞以政學吾斯未能信子使漆雕開仕對曰吾斯之未能信子恱注云未究習也賊夫人之子子路使子羔爲費宰子曰賊夫人之子言子羔未學而仕是賊害之人也子路曰有民人焉有社稷焉何必讀書然後爲學子曰是故惡夫佞者學優則仕子夏上通而不困上通仕道不學牆面涖事惟煩學古入官政乃不迷先學古訓而後入官授之以政不逹子曰誦詩三百授之以政不逹雖多亦奚以爲舉善而教不能則勸及門仕進之門爲學未能入室䇿名安可及門不能者止智效一官莊子孔幼未能事藩鎮王元逵子紹鼎死子納幼未能事宣宗以元逵次子紹懿爲留後以嗣假以曹參未預署事江南野史蕭儼以童子擢第假以曹參未預署事遂精究法律未能任事賴諸將共持王師範父敬武逐安師儒自稱留後敬武卒昭宗以師範年少其下不服從乃拜太子少師師範不受棣州刺史張蟾叛師範遣其將盧洪攻蟾洪以兵返襲青州師範陽爲好辭遣人近語洪曰吾㓜未能任事賴諸將共持之爾不然聽公所爲也洪以師範無能爲遽還不爲備語其僕劉鄩曰洪來爲我斬之用汝爲牙將洪來師範出迎於坐上斬之乃急攻棣州破張蟾潜犇歸于京師昭宗乃拜師範節度使五代俸禄十五白禄在其中豈無口實底禄以德寸禄營其寵禄事君敬其事而後食食禄也禄不期侈侈不與禄爲期而自然侈退食自公不家食易貴人而賤禄則民興讓言尚賢而不吝禄位惟賢非后不食食祿也雖禄不期侈懼膏粱之易驕而食不充虛豈匏𤓰而可繫計日受俸羊陟爲河南尹云云又楊秉字叔節豫州刺史清儉計日受禄餘俸不入私門馭貴馭富周禮太宰以八柄馭群臣一曰爵以馭其貴二曰禄以馭其富爵公侯伯子男至于大夫士也稍食周禮均其稍食稍食禄廪也以制其食制其等級上農之禄周禮上農夫食九人凡下士禄上農夫禄足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄也人浮於食禮君子與其使食浮於人寧使人浮於食食祿也浮過也言寧使己才過於祿不使祿過其才示不貪也公食家食大祿小祿君子不以小言受大祿不以大言受小祿伐檀詩刺貪也在位貪鄙無功而受祿始聞刈楚之榮俄見伐檀之刺貪天之祿厚賢倍祿以功詔祿以久爲奠食食稍也既爵乃祿之者事成乃食之仕而未有祿禮曰仕而未有祿者君有饋焉曰獻使焉曰寡君見在臣位與祿同也君有饋臣之道也位定然後祿之難得而易祿易祿而難畜禮曰非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎庶士倍祿禮武王克殷庶民弛政庶士倍祿復紂時祿薄也季秋収秩祿之不當不當私所増加也伐氷之家有采地不畜牛羊秩膳天子諸侯有秩膳百祿是荷勸從傳制爲祿位以勸其從也益俸宣詔曰今小吏勤事而俸薄欲其無侵漁百姓難矣其益吏百石以上俸什五注云舊一石者則加五斗也仕不祿班彪益游徼祿趙廣漢爲京兆奏請益長安游徼獄吏秩百石注増秩以勵其行也其後百石吏皆差自重不敢枉法妄繫人考致仕三分故得一以終身也給吏盖寛饒廉直志在奉公俸錢半以給吏人爲耳目之事斗食屬薛宣字貢君爲大司農斗食屬注祿少計日一斗爲數干祿什九在外什一在内史記魏成子食祿于魏什九在外什一在内是以東得卜子夏田子方段干木君皆師之増減後漢光武增百官俸千石以上減西京舊制六百石已上増之助婚任延時爲九真守駱越舊無婚延以年齒相配貧者省俸助成之留一月第五倫爲會稽守俸纔留一月粮餘皆賑與民之貧羸者桓帝減公卿以下俸貸王侯相占賣關内侯侏儒飽欲死臣朔饑欲死東方朔曰侏儒長三尺奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十云云辭俸張安世少孺以父子封侯在位太盛乃辭不受祿詔都囚别藏張氏無名錢以至於得數百萬計上贍貧黄香爲魏郡守分俸祿賞賜班贍貧者豐富之家各出義榖云不及妻子周堪仕郡縣俸祿不及妻子皆以供賔客制祿周禮代耕禮辭粟原思爲之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎注祿法所得當受無讓行爵出祿必當其位月令孔髙輔五事今外官卑品皆未得祿故飢寒之切夷惠不能全其行公議病其持祿崔損建中後宰相無久任者損以便柔遜愿中帝意乃留八年帝亦知公議病其持祿然憐遇彌渥奉祿分宗親劉德威平生所得奉祿以分宗親又李百藥得俸祿與親黨共之又劉瞻所得俸以餘濟親舊之窶困者停京官月奉助軍興王求禮左相豆盧欽望請停京官九品以上月奉助軍興求禮曰公祿萬鍾止可輟仰祿之人可奈何欽望拒不應既奏求禮厯階進曰天子富有四海何待九品奉使宰相奪之以濟軍國用乎加估以給崔從授淮南節度使揚州官吏俸帛常加估以給獨節度使則否從皆與之同虛食祿辛替否䟽曰中宗陛下之兄不聽賢臣之言而恱子女之意虛食祿數千人諸王奉給薄於帝子道孝王元慶時諸王奉給薄於帝子至數窶乏大臣莫敢言十八年黄門侍郎禇遂良爲太宗從容言之不能行増給常衮始當國先是百官俸寡狹議増給之時韓滉使度支與衮皆任情輕重滉惡國子司業張參衮惡太子詹事趙惎皆少給之太子文學爲洗馬副衮姻家任文學者其給乃在洗馬上其騁私崇怨類此刺史俸孔戣拜嶺南節度使先是屬刺史俸率三萬又不時給皆取部中自衣食戣乃倍其俸約不得爲貪暴稍以法繩之本傳奪吏俸助輸崔郾出爲虢州觀察使先是上供財乏則奪吏俸助輸歲率八十萬郾曰吏不能贍私安暇䘏民吾不能獨治安得自封即以府常費代之歸其積俸柳珪杜悰鎮西川表在幕府久乃至㑹悰徙淮南歸其積俸珪不納悰舉故事爲言卒辭之取俸助軍興上䟽執不可朱朴改著作郎乾寧初太府少卿李元實欲取中外九品以上官兩月俸助軍興朴上䟽執不可而止不敢當兩使廪料楊牧爲宣歙觀察使不敢當兩使廪料但収刺史俸留公藏錢七百萬奉廪之費歲鉅億萬盧懐慎上䟽今京諸司員外官數十倍近古未有謂不必備則爲有餘求其代工乃多不釐務而奉廩之費歲鉅億萬徒竭府藏豈致治意哉散故人同上所得祿散於故人親戚又薛苹所得祿即分親屬故人而無餘藏歲入官俸無慮二十四萬緍郭子儀隨官閒劇増奉李泌崔祐甫任吏部員外求爲洪州別駕使府賔佐有所忤者薦爲郎官其當遷臺閣者皆以不赴取罪去泌以謂外太重内太輕乃請隨官閒劇普増其奉時以爲宜定府州官月廪楊綰同平章事定府州官月廩使優狹相均減百官俸廪崔植時皇甫鏄判度支建言減百官俸廩植封還詔書賙濟内外親薛戎悉俸廩賙濟内外親無䟽遠皆歸之衣食人之孤遺者元德秀所得俸祿悉衣食人之孤遺者俸餘送酒家無留也陽城取足則已有陳萇者候其得俸常徃稱錢之美日有獲焉城至道州月俸取足則已官収其餘以俸代輸何易于爲益昌令民有死䘮不能具葬者以俸敕吏爲辦督賦役不忍迫下戸或以俸代輸官一品俸三千李吉甫國家之制官一品俸三千職田祿米大抵不過千石大厯時權臣月俸至九十緍者州刺史無小大皆千緍宰相常衮始爲裁限至泌量閒劇稍増之使相通濟然有名在職廢俸存額去閒劇之間厚薄頓異亦請一切商定譁言月廪薄以動士心王龜爲同州刺史牙將白約素暴横嘗譁言月廪薄以動士心爲亂龜捕殺之減百官一月俸髙宗龍朔三年二月減百官一月俸争求什一高季輔上言公侯勲戚之家邑入俸稍足以奉養而貸息出舉争求什一下民化之競爲錐刀宜加懲革本傳各依錢數多少折爲布帛定數陸贄若但據群官月俸之等各依錢數多少折爲布帛定數某官月給俸絹若干疋明立條列便爲常制羣蟻附腥羶聚蛾投爝火盧坦與李勃拾遺書今之人犇分寸之祿走絲毫之利如羣蟻之附腥羶聚蛾之投爝火取不爲醜貪不避死羅網髙懸去將安所文粹吕才東臯集序時天下䘮亂藩部法嚴屢被勘劾呂嘆曰羅網高懸去將安所遂出所受俸分積於縣城門託以風疾輕舟夜遁豈利斗粟希布帛歐陽詹上鄭相公書不仕則已仕則冀就髙衢逺途展其素蓄垂名于後代美播于當時豈利斗粟希布帛救寒暑給朝夕也開元後毎使各給雜錢國忠身兼數官堂封外月給錢百萬秩登祿富以有廟祀韓文袁氏碑張鎰拜中書侍郎同中書門下平章事明年以两河用兵詔省薄御膳及皇太子食物鎰因奏減堂飡錢及減百官廩俸三分一以助用度世祿十六白世祿之家鮮克由禮書匄也先君守官之嗣范宣子言嗣先君之守官又曰匄之祖自虞為陶唐氏夏為御龍氏商為豕韋氏周為唐杜氏晉主夏盟為范氏其不朽之謂乎穆叔子曰此之謂世祿非不朽也傳子産曰孔張君之昆孫執政之嗣也為嗣大夫漢任子令漢公卿子多以父任為郎王吉曰禹湯不用二公之世而舉臯陶伊尹請除任子令子為郎漢徴馮唐年九十不能為官乃以唐子遂為郎遂字王孫為子求官桑宏羊自以為國家興筦㩁之利伐其功欲為子弟得官恐霍光謀反遂誅滅伐檀之刺孔後嗣長為藩翰長孫無忌帝欲功臣並世襲刺史以無忌為趙州刺史凡十有四人餘官食邑尚不在無忌等辭曰群臣披荆棘事陛下今四海混一誠不願違逺左右而使世牧外州與遷徙等帝曰割地封功臣欲公等後嗣長為藩翰而薄山河之誓反為怨望朕亦安可彊公土宇邪遂止以門資為吏于琮以門資為吏用嗣厥服權德輿張建封文集序公之理也徐人宜之故尚書克家纂業用嗣厥服猶鮑氏之居司𨽻鄭人之賦緇衣大君推恩善善春秋之義也魯三桓之子孫鄭七穆之宗族晉之欒范齊之國髙張氏之七葉貂蟬楊家之四世台衮文粹李翰鳳閣王侍郎賛自秦至漢有吉有駿為漢代名臣自漢至晉有覽有祥為晉室公輔同上祿不兼利十七白畜馬乗不察雞豚伐氷之家不畜牛羊百乗之家不畜聚斂之臣禮仕則不稼田則不漁織蒲臧武仲妾織蒲仲尼曰三不仁天分董仲舒曰天之分與之上齒者去其角傳其翼者兩其足是受大者不得取小故受祿之家不與人争利拔葵史記公儀休相魯茹羮拔園葵而棄之見家織布出妻焚機云欲令農夫女工安所售其貨乎免官削爵貢禹欲約近臣自諸曹郎侍中以上家無問私販賣與人争利犯者輒免官削爵不得仕宦王昶陳五事魏王昶欲令官實祿勵以亷耻不使與百姓争利孔廣市樵米為歲中計尹知章轉國子博士未嘗問産業其子欲廣市樵米為歲中計知章曰如而計則貧人何以取資且吾尚應奪民利邪節財力勵廉隅陸贄奏議國之紀綱在於制度商農工賈各有所專凡在食祿之家不得與人争利此王者所以節財力勵廉隅是古今之所同而不可變革者也収苑中果菜尚萬監裴匪躬檢校京苑將鬻苑中果菜官収其利蘇良嗣駮之曰昔公儀相魯猶能拔葵去織未聞萬乗之主鬻其果菜以與下人争利也匪躬遂止舊史寛猛相濟十八白政寛則民慢猛則民殘仲尼曰政寛則民慢慢則糾之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和火烈水懦子産謂太叔曰唯有德者能以寛服人其次莫如猛夫火之烈民望而畏之故鮮死焉水懦弱人狎而玩之則多死故寛難太叔為政不忍猛而寛鄭多盜太叔悔之韋弦兼佩昔人有性急佩韋自戒性寛佩弦自戒吐茹合宜詩云柔亦不茹剛亦不吐不剛不柔孔間以威斷段文昌授劒南西川節度使素諳蜀利病大抵治寛静間以威斷不常任也政貴知變崔郾治虢以寛經月不笞一人及涖鄂則嚴法峻誅一不貸或問其故曰陜土瘠而民勞吾撫之不暇猶恐其擾鄂土沃民剽雜以夷俗非用威莫能治政所以貴知變者也聞者服焉輦轂之下先彈壓郡邑之治本惠養柳仲郢出河南尹以寛惠為政或言不類京兆時答曰輦轂之下先彈壓郡邑之治本惠養烏可類乎寛猛相濟弦韋適中李白任城縣記寛則人慢糾之以猛猛則人殘施之以寛寛以濟猛猛以濟寛此刑政之文也吕温人文化成論替代十九白及𤓰齊使連稱管至父戍葵丘𤓰時而徃及𤓰而代嗣掌某月周禮注云代住一月三巳無愠楚子文三仕為令尹無喜色三巳之無慍色舊令尹之政必以告新令尹迭代功成者去君子三揖而進一辭而退䇿名隨牒合符後漢傅燮字南容州將范律名知人舉燮孝廉後燮為漢陽太守律交代合符而去鄉郡榮之矯代魏信陵君無忌請救趙魏王畏秦不許趙告急於公子公子之客入王宫盜節矯代晉鄙不設備公子遂入鄙軍鎚殺鄙而代將其軍遂救趙也更書漢段㑹宗為西城都護騎都尉三歲更書還為沛太守邉吏三歲一更也終更亟還谷永與㑹宗書云云親友魏陳矯為廣陵功曹使過太山太守薛悌異之結為親友戯謂曰吏與二千石鄰國屈從陪臣游不亦可乎及為郡及尚書令皆代矯舉吳周瑜病舉魯肅有智略足以代瑜父子相代見父子門注智效一官莊子考績之期三載考績三考黜陟幽明授受不替蕭何舉曹參邴吉知人吉為丞相病篤上自臨問曰即有不諱誰能代卿對曰西河太守杜延年明於法度今在郡治有能名廷尉于定國執憲詳平天下可以無寃太僕陳萬年事後母孝三人皆在臣右惟上審之及居相位並皆稱職上謂邴吉知人孔刺史被代皆降魚書楊綰復言舊制刺史被代若別追皆降魚書乃得去開元時置諸道採訪使得專停刺史威柄外移漸不可久其刺史不稱職若贓負本道使條具以聞不得擅追及停而刺史亦不得輒去帝嘉其謀云舉弟自代韋貫之永貞時始為監察御史舉其弟纁自代及為右補闕纁代為御史議者不謂之私袁公政袁滋召為金吾大將軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜簡自上意唐自兵興以來方鎮節度使少徵入換代者皆死亡乃命焉故行軍司馬皆簡自上意以病求代張建封十六年以病求代詔韋夏卿代之未至而建封卒徃官將代儲什物俟其至韓琬上言徃官將代儲什物俟其至今交罷執符紛競校在亡自以久䟽斥柳冕為福建觀察自以久䟽斥性躁狷不能無恨乃上表乞代李自良為右衛率馬燧來朝德宗罷燧兵以自良代之自良以事燧不敢當義者多其譲乃授右龍武大將軍入謝帝終以河東近胡謂曰卿於進退寧不有禮然守北門無易卿者勉為朕行坐政無狀柳冕奏閩中本南朝蓄牧地可息羊馬置五區於東越又置五區於泉州悉索部馬驢牛羊合萬餘游畜之不經時死耗略盡復調充之民間怨苦坐政無狀代還始偪而來終代其任范希朝節度使韓游瓌畏其才將伺隙殺之希朝懼犇鳳翔貞元四年以游瓌政無狀使代之希朝曰始偪而來終代其任非所以防覬覦安反側也固譲本傳白孔六帖卷四十二
