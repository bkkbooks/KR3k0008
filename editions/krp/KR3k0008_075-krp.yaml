body:
  text: 白孔六帖卷七十五唐白居易原本宋孔傳續撰大理卿一鴻臚卿二司農卿三太府卿四殿中監五國子監六國子祭酒七司業八博士九少府監十將作監十一軍器監十二都水監十三司天十四廢職十五尚衣監十六光禄大夫十七太子太師太傅太保十八太子少師少傅少保十九賔客二十詹事二十一諭德二十二庶子二十三舎人二十四洗馬二十五王府官二十六左右衛二十七金吾衛二十八諸衛二十九羽林三十左右神策三十一中郎將三十二大理卿一白司刑古曰司刑廷尉秦曰廷尉漢改為大理垂泣具斷獄門髙門于公理獄積隂徳修宅令髙其門以待曰我子孫必有昌者至定國為廷尉棘署聼獄扵棘木之下竹刑三尺官尊九寺任重三章郭氏七人呉家三代子孫並為廷尉漢用平允任先張釋魏推明察選在鍾繇况當愼罰之朝宜重典刑之法當恤刑之朝居執法之任舜命臯陶刑惟明允漢尊定國道在寛仁朱博恐為官屬所誣乃以意覆獄具議刑門天下之平髙柔字文明魏明時為廷尉每曰廷尉天下之平齊職儀云大理古官也唐虞以咎繇作士士理官也初秦置廷尉漢因之景帝改曰大理武帝又云廷尉哀帝又曰大理王莽改曰作士東漢又曰廷尉魏復為大理復改廷尉五代史百官志云梁加卿字曰廷尉卿後並因之北齊初為廷尉卿後復為大理卿隋因之唐初因之改曰詳刑卿咸亨初復舊光宅初曰司刑卿神龍初復舊孔大理寺卿一人少卿二人掌折獄詳刑凡罪抵流死皆上刑部覆於中書門下繫五日一慮百官志龍朔二年改曰詳刑寺武后光宅元年改曰司刑寺同上清直戴胄大理少卿缺帝曰大理人命所繫胄清直其人哉即日命胄長孫無忌被召不觧佩刀入東上閣門尚書封徳彛論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子扵尊極不稱誤法著御温劑飲食舟船雖誤皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑繇是無忌與校尉皆免灋者布大信於人冑時有詭資䕃冐牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下不以信卿賣獄耶卿自守法而使我失信奈何胄曰灋者布大信扵人言乃一時喜怒所發陛下以一朝忿将殺之既知不可而寘扵法此忍小忿存大信也若阿忿違信臣爲陛下惜之帝大感悟參處法意至析秋毫戴胄為大理少卿犯顔據正數矣參處法意至析秋毫隨類指擿言若涌泉帝益重之下之寛猛視主之好劉徳威入為大理卿太宗問曰比刑網寖宻咎安在徳威曰在君不在臣下之寛猛視主之好律失入者减三失出者减五今坐入者無辜坐出者有罪所以吏務深文為自營非有教使然也執法平恕方戴胄張文瓘兼大理卿不旬日斷疑獄數百抵罪者無怨言嘗有小疾因相與齋禱願亟視事時以執法平恕方戴胄所守者公法徐有功轉司刑少卿皇甫文偹誣有功縱逆黨久之文偹坐事下獄有功出之或曰彼嘗䧟君扵死今生之何也對曰爾所言者私忿我所守者公法不可以私害公薦張柬之張柬之傳后它日又求人仁傑曰臣嘗薦張柬之未用也后曰遷之矣曰臣薦宰相而為司馬非用之乃授司刑少卿律令請崇寛簡韓仲良為大理少卿律令請崇寛簡不樂法家元稹遷大理卿不樂法家因謝所居官禍福何常張道原拜大理卿何稠得罪籍其家屬賜羣臣道源曰禍福何常更資以衣食遺之諌馳射孫伏伽遷大理少卿帝數出馳射伏伽諌帝恱占對無不盡唐臨累遷大理卿髙宗嘗録囚臨占對無不盡帝喜曰為國之要在用法刻則人殘寛則失有罪惟是折中以稱朕意司刑丞杜景佺徐有功並為司刑丞與來俊臣侯思止同制獄人稱之曰遇徐杜必生遇來侯必死通典狄仁傑儀鳳中為大理丞周嵗斷滯獄一萬七千人無寃訴者時武衛大将軍權善才坐誤斫昭陵栢樹仁傑奏罪當免職髙宗令即誅之仁傑曰陛下必欲變法請從今日為始臣不敢奉制殺善才䧟陛下扵不道帝意解善才因而免舊史鴻臚卿二白司賔一名司賔寺漢尚勲賢寵崇郭况東觀漢記郭况為鴻臚上數幸其宅飲酒賞金帛甚盛京師號况家為金穴魏推恒准選在崔林魏志崔林字徳儒為鴻臚待遇諸外國約故事皆有恒准况當柔逺之朝宜遵典屬之任典屬國鴻臚卿蘇武為之典客大行漢書典客秦官也掌諸侯歸義蠻夷景帝六年更名大行今更名大鴻臚賔賛漢蕭因為陳留太守入為大鴻臚不任於賔賛掌蠻夷主胡漢書曰典客秦官秩中二千石掌諸侯及四方歸義蠻夷山濤唘事曰鴻臚主胡事前後為之者率多不善了今缺當選御史中丞刁攸不審可否掌四方夷賛九賔禮主儐賛九賔之禮王莽初改曰典客東漢又曰大鴻臚其後並因之五代史百官志云至梁加卿字除大字後魏又加大字北齊又除之隋氏因之唐初因之龍朔二年改為同文卿咸亨初復舊光宅初改曰司賔卿神龍初復舊孔鴻臚寺卿一人掌賔客及㓙儀之事領典客司儀一署凡四夷君長以蕃望髙下為簿朝見辨其等位第三等居武官三品之下第四等居五品之下第五等居六品之下有官者居本班百官志海外諸蕃入朝所獻之物先上其數於鴻臚獻藥者鴻臚寺驗覆同上龍朔二年改鴻臚寺曰同文寺武后光宅元年改曰司賔寺同上選親兵廵警郭晞進鴻臚卿河中軍亂父子儀召首惡誅之其支黨猶反及晞選親兵廵警以備非常奸人不得發以功拜殿中監樵貴帛賤劉義節爲鴻臚卿時傾府庫為軍賞帑財大乏義節曰今京師屯兵多樵貴帛賤若伐街苑樹為薪以易布帛嵗數十萬可致唐史司農卿三白治粟秦曰治粟内史月卿大農金糓揚雄司農箴曰惟時大農爰司金糓漢崇儒學選在鄭𤣥字康成徴為大司農晉寵貞亷任先崔氏晉崔洪為司農手不執珠玉口不言貨財韓信歸漢漢以為治粟内史典農本藏不給末用漢毋将隆君房言大司農錢自供乘不給供養勞賜一出少府蓋不以本蔵給末用不以人力供浮費别公私示正畧天倉國泉韓楊天文要集曰天倉者大司農也史㳺急就篇司農少卿國之泉也司金掌帛揚雄大司農箴曰惟時大農惟司金糓續漢書曰大司農卿一人中二千石掌諸錢糓金帛周曰太府莽改羲和周禮有太府下大夫鄭注云太府為王理蔵之長今司農矣羲和見下文髙詡方正牟融明逹東觀漢記髙詡字季回以文學徴而拜大司農在朝以清白方正稱牟融字子優爲大司農惟明逹稱為明卿漢官儀云初秦置治粟内史掌糓貨漢因之景帝更名大農令武帝更名大司農王莽改曰羲和又改為納言東漢復曰大司農五代史百官志云梁加卿字除大字後魏又加大字北齊又去之隋氏因之唐初因之龍朔二年改曰司稼卿咸亨元年復舊孔司農卿一人少卿二人掌倉儲委積之事揔上林太倉鈎盾導宫四署及諸倉司竹諸場宫苑鹽池諸屯等監凡京都百司官吏禄廪朝㑹祭祀所須皆供焉籍田則進耒耜百官志龍朔二年改司農寺曰司稼寺同上鄙其聚歛竇静授司農卿趙元楷為少卿静鄙其聚歛因㑹官屬大言曰如煬帝奢侈竭四海自奉司農湏公矣今天子躬節儉屈一人安兆庶惡用云哉元楷大慙倒用司農印追兵段秀實朱泚反以秀實失兵必憤恨且素有人望使騎迎秀實與子弟訣而入泚喜曰吾事成矣秀實知不可乃陽與合隂結将軍劉海賔姚令言都虞候何明禮欲圖泚三人者皆秀實素所厚源休教泚偽迎天子遣将韓旻領鋭師三千疾馳奉天秀實以為宗廟之危不容喘乃遣人喻大吏岐靈岳竊取令言印不獲乃倒用司農印追其兵旻至駱驛得符還秀實謂海賔曰旻之來吾等無遺類我當直摶殺賊不然死乃約事急為繼而令明禮應扵外奪象笏擊朱泚段秀實翌日朱泚召秀實計事源休姚令言李忠臣李子平皆在秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段我豈從汝反邪遂擊之泚舉臂捍笏中顙流血衊面匍匐走而賊衆未敢動而海賔等無至者秀實大呼曰我不同反胡不殺我遂遇害叢劇杜中立遷司農卿繩吏急反為中傷左徙慶王傅乆之復拜司農卿入謝帝曰卿用法深信乎荅曰轂下百司養名不肯事如司農尤叢劇陛下無遽信流言假臣數月事可濟帝許之六宫飱錢又初度支度六宫飱錢移司農季一出付吏大吏盡舉所給於人權其子錢以給之既不以時黄門來督責慢罵中立取錢納帑舎率五百一出吏不得為奸遂以為法同上杖而後奏韋機拜司農少卿兼知東都營田甚見委遇有宦者扵苑中犯法機杖而後奏髙宗嗟賞賜絹十疋謂曰更有犯者卿即鞭之不湏奏也農天下之本也故國有九列而司農氏居其一焉元稹裴武授司農卿制農天下之本也故國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不在兹選太府卿四自梁已前無太府故事其文章並闕今既列在九卿之數特存其序事應作文章且亦可参諸司農之事用也白司府古名少序亦曰司府位列月卿職司天府漢用公勤任先蔡議魏推清白選在常林况當貢賦之日宜重帑藏之司居監臨之官典出入之務領貢獻於四方彼無虚月掌財用於五庫我有司存頒藏用之府周禮太宰貢之入頒蔵用之府受藏受用太府周官也周禮曰天官屬有太府下大夫掌貢賦受其貨賄之入掌府蔵貨賄秦漢以下不置其官職所司在司農少府矣至梁始置太府卿陳及魏北齊隋皆因梁置之唐龍朔二年改為外府卿咸亨初復舊光宅初改為司府卿神龍初復舊孔太府寺卿一人少卿二人掌財貨廪蔵貿易揔京都四市左右蔵常平七署凡四方貢賦百官俸秩謹其出納賦物任土所出定精麄之差祭祀幣帛皆供焉百官志龍朔二年改太府寺曰外府寺武后光宅元年改曰司府寺中宗即位復曰太府同上聚九州之賦辨百貨之名按其度程謹其出納孰為主者外府上卿裴武太府卿制白居易爲人嚴慤李襲譽召為太府卿為人嚴慤以威肅聞尹卿筆尹思貞召授司府少卿時卿侯知一亦厲威嚴吏為語曰不畏侯卿杖只畏尹卿筆物經楊卿者無不精麗楊隆禮開元初為太府卿時御府財物羡積如山隆禮性詳宻出納雖尋尺皆自按省物經楊卿者無不精麗嵗常愛省數百萬本傳任職二十年楊隆禮任職二十年九十餘卒隆禮罷太府𤣥宗訪其子可代父任者宰相以謹餘謹矜謹名皆得父清白帝喜擢謹矜監察御史知太府出納殿中監五孔殿中監一人從三品少監二人從四品掌天子服御之事其屬有六局尚食尚藥尚衣尚乘尚舎尚輦凡聼朝率屬執繖扇列扵左右大朝㑹祭祀則進爵行幸則侍奉仗内驂乘百官志武徳元年改殿内監曰殿中省龍朔二年曰中御府監曰大監丞曰大夫陪燕私姜皎明皇即位召授殿中少監出入卧内陪燕私詔許捨敬坐與妃嬪連榻間擊毬闘雞呼之不名也賜宫女廐馬及他珍物前後不勝計玩佳樹令徙植其家帝在殿庭玩一佳樹皎盛賛之帝遽令徙植其家後将誅竇懐貞等皎與宻議以功進殿中監進圭進爵元稹韋􅐚度制殿中丞揔六尚以供名物當進圭進爵之時不可虚位國子監六白成均國子監也太學國學當文理之朝奉成均之職不朝漢時呉王年老以劉氏為祭酒授几杖不朝祭酒講學漢王莾以安車駟馬迎龔勝為祭酒議學傳經戴逵為儒材祭酒刻石傳經漢擢荀卿晉選劉毅並為祭酒也國子祭酒七白書堯典曰克明俊徳以親九族九族既睦平章百姓周受命封建宗盟百官春秋云周封兄弟之國十有六同姓之國三十有五焉始選宗中之長而董之謂之宗正成王時彤伯入為祭酒掌主親屬也漢秦因之漢平帝更名宗伯王莾改名秩宗東漢復為宗伯至晉以庶姓為之大祭酒漢魏皆同姓為之晉以後雜用庶姓梁加卿除大字北齊又加大字隋人除之漢髙祖七年自櫟陽從長安置祭酒官以序之族劉向字子政元帝時蕭望之周堪薦向為宗室忠直明經有行爲祭酒劉徳字路叔脩黄老術少時數言事召見甘泉武帝謂之千里駒昭帝初為祭酒丞後為祭酒妻死大将軍欲以女妻之徳不敢畏盛滿也東觀劉平字公子以仁孝著聞永平三年為祭酒劉般字伯與代名忠孝在朝竭忠建初元年拜祭酒也續漢祭酒一人秩二千石掌叙録王國嫡庶之從次及諸宗室親屬逺近郡國嵗上宗室名若有犯法當髠以上請孔國子監祭酒一人從三品掌儒學訓導之政揔國子太學廣文四門律書筭凡七學天子視學皇太子齒胄則講義釋奠執經論議奏京文武七品以上觀禮凡授經以諸經各為一經兼習孝經論語老子嵗終考學官訓導多少為殿最百官志引學官皆名儒冠陽嶠為國子祭酒引尹知章范行㳟趙𤣥黙為學官皆名儒冠當得名儒楊綰是時元載秉政忌綰望髙䟽薄之宦者魚朝恩判國子監既誅因是建言太學當得名儒汰其選即拜綰國子祭酒外示尊重而實以散地處之載日貪冒而天下士議益歸綰請崇太學以立教本蕭昕擢國子祭酒建請崇太學以立教本帝悟其言詔羣臣有籍於朝及神策六軍子弟肄業者聼補生貟論罷蚶菜孔戣歴國子祭酒會嶺南節度使崔詠死謂裴度曰嘗論罷蚶菜者誰歟今安在是可往為朕求之度以戣對即拜嶺南節度使請以祭酒為太師氏歸崇敬授國子司業以祭酒司器之名非學官所宜業者請以祭酒為太師氏位三品孔子碑馮審歴國子祭酒監有孔子碑武后所立睿宗署額審請琢周著唐五經掃地祝欽明為國子祭酒帝與羣臣宴欽明自言能八風舞盧蔵用嘆曰是舉五經掃地矣司業八孔司業二人從四品百官志誦鹿鳴蟋蟀篇山惲累遷國子司業景龍中帝昵宴近臣及修文學士詔徧為伎餘臣各有所陳皆鄙黷而山惲奏無所習惟知誦詩乃誦鹿鳴蟋蟀篇未畢中書令李嶠以近規諷止之帝嘉其直下詔褒咨修講舎陽嶠遷國子司業嶠資謹飭好學喜誘勸後生修講舎人以為善職生徒斤斤陽城引諸生告之曰凡學者所以學為忠與孝也諸生有乆不省親者乎明日謁城還養者二十軰有三年不歸侍者斥之簡孝秀徳行升堂上沈酗不率教者皆罷官講經籍生徒斤斤皆有法度左師右師歸崇敬請以司業為左師右師從四品三世司業孔頴逹為右庶子兼司業子志亦終司業志子恵元又為司業累太子諭徳三世司業時人美之本傳博士九白秦官董仲之文辭史董仲舒景帝時為博士伏生之經學伏生濟南人也為秦博士學官當文明之代居學校之官孔國子博士五人正五品上掌教三品已上及國公子孫從二品以上曾孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人暇則習𨽻書國語說文字林三倉爾雅毎嵗通兩經求仕者上扵監秀才進士亦如之學生以長㓜為序習正業之外教吉凶二禮公私有事則相議百官志龍朔二年改博士曰宣業同上廣文舘博士四人掌領國子學生業進士者同上天寳九載置廣文舘同上冗不見治韓愈既才髙數黜官又下遷乃作進學解以自諭三年博士冗不見治命與仇謀取敗幾時冬煖而兒號寒年豐而妻啼飢頭童齒豁竟死何禆不知慮此而反教人為本傳上書言當世事朱朴擢國子毛詩博士上書言當世事議遷都不報本傳師屬博士師屬也韓文少府監十孔少府監一人從三品少監二人從四品下掌百工技巧之政揔中尚左尚右尚織染掌治五署及謁治鑄錢𤣥市等監供天子器御后妃服餙及郊廟圭玉百官儀物凡武庫袍襦皆識其輕重乃蔵之冬至元日以給衛士諸州市牛皮角以供用牧畜角筋腦革悉輸焉百官志龍朔二年改曰内府監武后垂拱元年曰尚方監同上舉劾宗室臯進少府監時殿中侍御史李鈞與其弟京兆法曹鍔宦既遂不肯還鄉母窮不自給臯行縣見之歎曰入則孝出則弟有餘力則學若二子者可與事君哉舉劾之並錮死将作監十一白大匠漢以監為大匠漢尊任隗始爲置貟東觀漢記建武八年始置将作大匠自任隗始晉寵王彬且聞賜爵晉書王彬為将作大匠省費漢書英仲華為大匠度用省費躬親後漢陳伯直為将作大匠桓帝崩營陵寝皆親作工為士卒先問吏宫人數魏志楊阜為大匠卿時治宫殿發女充後宫庭阜欲上疏請省宫人不見幸者乃召御府吏問後宫人數吏守官令對曰禁宻不得宣露阜怒杖吏一百數之曰國家不與九卿為宻乃與小吏為宻乎帝聞而驚憚孔將作監一人少監二人掌土木工匠之政摠左校右校中校甄官等署百工等監大明興廢上陽宫中書門下六軍仗舎閑廐謂之内作郊廟城門省寺臺監十六衛東宫王府諸廨謂之外作自十月距二月休治功自冬至距九月休土功凡治宫廟太常擇日以聞百官志龍朔二年改将作監曰繕工監咸亨元年曰營繕監天寳十一載改大匠曰大監少匠曰少監同上多所賚賞姜確為将作少匠䕶作九城洛陽宫及諸苑籞以幹力稱多所賚賞㳺幸無不從以工巧進袁恕已将作少匠楊務亷者以工巧進恕已恐其復啟游娯侈麗之漸言於中宗曰務亷位九卿忠言嘉謨不聞而専事營創以媚上不斥之亡以詔德修洛陽宫竇璡貞觀初遷将作大匠詔修洛陽宫鑿池起山務極侈浮費不勝筭太宗怒詔毁之免其官軍器監十二孔軍器監一人正四品上掌繕甲弩以時輸武庫揔署二一曰弩坊二曰甲坊百官志武徳初有武器監一人七年廢軍器監八年復九年又廢開元三年置十一年復廢十六年復同上邊備脩舉韋湊遷太原尹兼北都軍器監邊備修舉都水監十三孔都水監使者二人正五品上掌川澤津梁渠堰陂池之政揔河渠諸湋監署凡漁捕有禁溉田自逺始先稻後稑斗門長節其多少而均焉府縣以官督察百官志武徳初廢都水監為署貞觀六年復為監改令曰使者龍朔二年改都水監曰司津監武后垂拱元年改都水監曰水衡監使者曰都尉開元二十五年不𨽻将作監同上二伯益唐史杜佑曰伯益為虞今虞部郎中都水使者則二伯益也司天十四白太史周官太史掌建邦之六典日官𫝊天子有日官諸侯有日御日官太史也厎日日官居卿以底日禮也注位如卿而不在六卿之數故曰居卿底致也平致也掌日之官司天之吏觀乎天文以察時變率由舊典欽若昊天齊七政於銅渾視四時於玉律職非其才則必昏迷天象官宿其業所以敬授人時頌正朔授人時掌邦六典授嵗四時日月星辰乾象不忒分至啟閉嵗功有成書雲之史窺管之官二十四氣三百六旬恊時月正日書月令孟春命太史司天厯候日月星辰宿離不忒無失經紀以初為常厯推察也候占候也宿二十八宿也離猶厯也七曜為經二十八宿為紀初謂孟春歳首也虞書曰乃命羲和欽若昊天厯象日月星辰敬授人時羲和氏掌天地日月之官辰日月所㑹也厯象分節也人代天工史分日月鳳凰之正傳曰少昊氏以鳥名官鳳凰氏厯正也注鳳凰知天時故以名厯正之官頒朔周禮太史頒朔於邦國當同文之朝思稟正朔奉太史之職宜察天時行夏之時從周之典渾天儀張衡字平子為太史官遂研窮隂陽妙盡璇璣之正作渾天儀以漏水轉之於室内與天相應若符合南正髙陽命南正重司天式叙三辰晉書曰髙陽命南正帝嚳亦式叙三辰唐虞則羲和夏則昆吾殷則巫咸周則史佚魯梓慎宋子韋齊甘徳鄭禆竈魏石由其巫咸髙石之説後代所宗廢職十五白夏書曰羲和湎淫廢時亂日沈湎扵酒廢天時亂甲乙俶擾天紀紀文也擾亂也遐棄厥司昬迷於天象以干先王之誅政典曰先時者殺無赦不及時者殺無赦政典夏國典也先後謂厯不合天時有太先太後殺之無赦也星辰不觀焉知天道既不勤於視夜必有失扵授時罪既彰於亂日職徒列於觀天正朔失序實亂人時尚衣監十六白復陶陶正傳曰昔虞閼父為周陶正注陶正復陶也主君上之衣服齊三服官漢元詔罷齊三服官注春獻冠幘為首服紈素為冬服輕綃為夏服害女工之物無作哀詔齊三服官織綺繡難成害女工之物宜皆止無作輸納也灋天地之數舉冬夏之冝丞相蕭何御史大夫周昌等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君及兆人能法天地順四時奉宗廟天下之大禮臣請法之中謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬各奉一時制可注云各主一時禮物朝祭事光禄大夫十七白門施行馬漢官儀光禄大夫秩用二千石光禄勲門外特施行馬以旌别之傳呼甚寵漢王仲翁出蒼頭盧兒傳呼甚寵蕭望之守門顧望之謂曰不肯碌碌反抱闗乎望之曰人各有志白馬生漢張湛為光禄大夫數諌上常乘白馬每有異政上輙曰白馬生且復諌者矣太子太師太傅太保十八古官也銀章青綬白承華太子門名文選曰遵彼承華又曰髙歩承華皆謂天子諸宫博望太子苑名東朝太子朝也文選曰東朝既建教事諭徳輔翼禮曰凡三王之教世子必以禮樂師也者教之以事而諭諸徳也保也者慎其身而輔翼之以歸諸道入則有保出則有師是故教諭而徳成也司業司成禮曰樂正司業父師司成一有元良萬國以貞注貞正也司主也言樂正教以業父師教以成元良之輔教諭之司並見上注襁褓之訓賈誼䟽曰古之王者太子在襁褓之中置三公導之以教訓去邪人選端士太子見正言行正道三代長久以其輔翼之羽翼之賢漢恵為太子用張良策迎四皓四皓來為太子客髙祖見之心觧尊敬詩曰尊敬師傅又漢詔曰國之将興尊師禮傅也迎於崇賢晉東宫故事皇太子詣崇賢門迎師傅講於宣武晉山濤為太傅講於宣武堂乘歩輦導太子親拜晉賀循字彦先為世儒宗除太子太傅命皇太子親往拜之奉觴疏廣字仲翁為太子太傅廣兄子受為少傅宣帝置酒太子躬奉觴以為夀上甚嘉之漢擇名儒任先疏廣晉崇碩徳選在山濤况當尊敬之朝宜慎父師之選當元良之日居輔翼之司屬監撫之餘敦師資之本鮑魚賈誼書曰文王使太公望傅太子發發嗜鮑魚望曰鮑不登於俎安有非禮之物養太子哉孔太子太師太傅太保各一人從一品掌輔導皇太子毎見迎拜殿門三師答拜毎門必譲三師坐太子乃坐與三師書前名惶恐後名惶恐再拜太子出則乘路備鹵簿以從百官志請朝願留張茂昭憲宗元和二年請朝五奏乃聼願留不許加兼太子太保召訪政理趙宗儒太和初進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言年八十官太師顔真卿改太子太師李希烈䧟汝州盧杞乃建遣真卿四方所信若往諭之可不勞師而定詔可公卿皆失色李勉以為失一元老貽朝廷羞宻表固留至河南河南尹鄭叔則以希烈反狀明勸不行答曰君命可避乎既見希烈時朱滔王武俊田悦李納使者皆在坐謂希烈曰聞太師名徳久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顔常山否吾兄也禄山反首舉義師後雖被執詬賊不絶于口吾年且八十官太師吾守吾節死而後已豈受若等脅邪諸賊失色本傳年八十升降如儀盧鈞守太子太師帝元日大饗含元殿鈞年八十升降如儀音吐鴻暢舉朝咨歎讓田于志寕兼太子少師俄遷太傅讓田見賞由門太子少師少傅少保十九白少傅漢置太子少傅輜車東觀漢記桓榮為太子少傅賜以輜車榮大會諸生陳車馬印綬曰今日之榮是稽古之力小輦晉山濤為少傅拜太子求退帝賜小輦乗之以訓太子也漢用名儒任先疏受受為太子少傅晉推碩徳選在羊公羊枯字叔子孔少師少傅少保各一人從二品掌曉三師徳行以諭太子奉太子以觀三師之道徳百官志冀得效愚鄙李綱拜太子少保尚書詹事上書太子曰綱老矣幸未就木備位保傅冀得效愚鄙曰殿下飲酒過量非養生之道凡為人子務孝謹以慰上心不宜聼受邪説與朝廷生惎間太子覽書不懌以政事詣東宫李綱為少師以足疾賜歩輿聼乗至閤門以政事詣東宫以老乞身張行成拜尚書左僕射太子少傅永徽四年自三月不雨至五月行成懼以老乞身制答曰古者策免乖罪已之義此在朕寡徳非宰相咎乃賜宫女黄金器勑勿復辭行成固請月益仙韶院錢王起改太子少師起治生無撿所得禄賜為僮婢盗有貧不能自存帝詔月益仙韶院錢三十萬議者謂與玩臣分給可耻也起頼其入不克讓卒輔吾兒李綱帝曰知公直士幸卒輔吾兒始詣東宫房𤣥齡加太子少師始詣東宫皇太子欲罷之𤣥齡讓不敢謁乃止賔客二十孔太子賔客四人正三品掌侍從規諌賛相禮儀宴會則尚齒百官志貞觀十八以宰相兼賔客開元中定貟四人同上左右太子李固言進給事中将作監王堪坐治太廟不謹改太子賔客固言上還制書曰陛下當以名臣左右太子堪以慢官斥居調䕶地非所宜詔改他王傅調䕶春闈夫望優四皓然後能調䕶春闈白居易趙昌制以安車召拜武攸緒中宗初降封巢國公遣杜謹盈齎書以安車召拜太子賔客苦祈還山詔可安樂公主出降又遣通事舎人李邈以璽書迎之将至通事舎人賛就位攸緒趣就常班再拜帝愕然禮不及行朝廷歎息賜予無所受親貴來謁道寒温外黙無所言及還中書門下學士朝官五品以上並祖城東言天下大本鄭肅力學開成二年召拜吏部侍郎帝以肅嘗輔導東宫詔兼賔客為太子授經既而太子母愛弛為䜛所乘廢斥有端肅因入見言天下大本不輕動意致深切帝為動容詹事二十一白漢竇嬰字王孫孝景帝即位為詹事孔霸字次孺宣帝時以經授太子詹事晉記卞壼字望之遷太子詹事代稱壼裁斷朝實忠於事上漢官儀詹事秦官也秩二千石晉公卿禮秩太常始立之云云齊職儀品第三銀章青綬擬尚書令位視領将軍孔詹事府詹事一人正三品少詹事一人正四品上掌統三事十率府之政少詹事為之貳百官志論者多其正馮定改太子詹事鄭覃兼太子太師上曰欲㑹尚書省定據禮當集詹事府論者多其正貟外詹事嚴挺之徙絳州帝顧林甫曰嚴挺之安在此其材可用林甫退召其弟損之與道舊諄諄欵曲且許羙官因曰天子視絳州厚要當以事自解歸得見上且大用因紿挺之使稱疾願就醫京師林甫已得奏即言挺之春秋髙有疾幸閑官得自養帝恨叱久之乃以為貟外詹事詔歸東都挺之鬱鬱成疾太子順納劉憲遷太子詹事時𤣥宗在東宫雅意墳史憲唘曰殿下儲副若有絶人之才非以尋擿章句要通大意而已侍讀禇元量經明行脩耆年宿望宜數召問以察其言太子順納諭德二十二孔左右諭徳正四品下掌諭皇太子以道徳隨事諷賛皇太子朝宫臣則列侍左階出入騎從百官志官之有諭徳猶上臺之有騎省也清班優秩所選非輕白居易元稹制東朝諭導杜牧郭錥制庶子二十三白掌侍從獻替職授八舎八次八舎之職班同三舎擬侍中中書侍郎班次同受命天朝入侍儲幄顔含秦寵蒙恬晉尊孔演演傳授經學並為庶子宫官稱陪臣晉鄭黙字思允與郭奕俱為中庶子朝廷以太子官屬宜稱陪臣黙上言太子體皇極之尊不同列國官皆天命遂從之孔左庶子掌侍從賛相駮正啓奏右庶子掌侍從獻納啓奏于志寕加常侍太子左庶子是時建議七廟羣臣請以凉武昭王為始祖志寧以凉非王業所因獨建議違之當輔以正道帝嘗謂志寜曰古者天子既生士負之即置輔弼昔成王以周召為師傅日聞正道習以性成今太子㓜卿當輔以正道無使邪僻唘其心勉之官賞可不次得也太子承乾數有過惡志寕欲救止之上諌苑以諷諌多任宦官太子左右多任宦官志寜諫曰奄宦者體非全氣専柔便佞託親近為戚權假出納為禍福故伊戾敗宋易牙亂齊趙高亡秦張讓傾漢近髙齊任鄧長顒為侍中陳徳信為開府内預宴私外干朝政齊卒顛覆今殿下左右前後皆用寺人輕忽髙班凌轢貴仕品命失序經紀不立行路之人咸以為恠太子益不悦更日侍讀東宫崔神基長安中轉太子右庶子是時突厥使者入見皇太子應朝有司移文東宫召太子神慶諌曰今太子與陛下異宫非朝朔望而别喚者請降墨敕玉契詔可尋詔與詹事更日侍讀輟卿以佐太子杜正倫帝詔正倫曰吾兒㓜未有就徳我常物戒之今當監國不得朝夕見故輟卿扵朝以佐太子謹之勉之他日又言朕十八猶在人間情偽無不察及即位處置有失必待諫乃釋然悟况太子生深宫不及知邪且人主不可自驕今若詔天下敢諌者死将無復發言矣故朕孜孜延進直言卿其以是曉太子冀禆益之奉入同職事三品王方慶直拜左庶子進封公奉入同職事三品兼侍太子讀書方慶奏人臣扵天子未有斥太子名者晉山濤唘事稱皇太子不名孝敬為太子更𢎞為崇沛王為太子更賢為文今東宫門殿名多嫌觸請一改之以恊舊典制可時稱有公望錢徽任左庶子韓公武以賂結公卿遺徽錢二十萬不納或言非當路可無讓徽曰取之在義不在官時稱有公望賜鍾乳高季輔進授太子右庶子數上書言得失辭誠切至帝賜鍾乳一劑曰而進藥石之言朕以藥石相報所薦豪俊士薛元超檢校太子左庶子所薦豪俊士若任希古髙智周郭正一王義方孟利貞鄭祖玄鄧𤣥挺崔融等皆以才自名扵時左右中䕶龍朔二年改左右庶子為左右中䕶通典屏居恬静趙宗儒罷為太子右庶子屛居恬静奉朝請而已典機劇許敬宗髙宗在東宫遷太子右庶子髙麗之役太子監國定州敬宗與髙士亷典機劇舎人二十四白屬文宋書王僧逹善屬文帝召見徳陽殿拜舎人獻頌潘尼字正叔為太子舎人時獻釋奠頌南土之望晉書顧榮南土秀望為太子舎人起家張華起家為太子舎人以授經拜景帝使晁錯詣伏生授尚書還拜太子舎人置驛迎賔鄭當時為太子舎人毎五日休沐常置驛馬迎賔客孔太子舎人四人正六品上掌令書表啓諸臣上皇太子大事以牋小事以唘其封題皆上右春坊通事舎人以進百官志來李李義府侍晉王為太子除舎人崇賢館學士與司議郎來濟俱以文翰顯時稱來李洗馬二十五白朝推文士選在陸機機起家為太子洗馬時號玉人擢於衛玠晉衛玠為洗馬時人號為玉人孝聞晉李宻字令伯為太子洗馬事祖母劉氏以孝聞先馬漢百官表曰洗馬貟十六人秩如謁者如淳曰前驅也國語曰勾踐為夫差馬先或為洗王府官二十六白劉寔以祭酒遷晉書遷為廣陵王師阮孚以尚衣領晉書阮孚為吏部東郡王師孚字遥集張昭爲長吏侍宴升堂呉記龎秀為司馬位加輔國加輔國将軍被刑申公傳楚太子戊無道疾申公及為王胥靡申公腐刑也減死王式翁思為昌邑王師王無道羣臣以不輔導誅式曰臣以詩三百五篇朝夕授王云云書奏減死也戒子孫王吉為昌邑中尉以數諫王得減死髠戒子孫母為王國吏及子駿遷趙内史棄官重師傅清河王慶傅衛訢私贓千萬詔案治并責慶不舉之状慶曰訢以師傅之尊選自聖朝臣唯知聼從不意有此紏察上嘉其對孔王府𫝊一人從三品掌輔正過失友一人從五品下掌侍游處規諷道義記室參軍事二人掌表唘書䟽百官志居府出入十年房𤣥齡太宗以燉煌公徇渭北杖策上謁轅門一見如舊署渭北道行軍記室参軍公為秦王即授府記室征伐未嘗不從衆争取恠珍𤣥齡獨収人物致幕府與諸将宻相申結人人願盡死力王嘗曰漢光武得鄧禹門人益親今我有𤣥齡猶禹也居府出入十年軍符檄駐馬即辦文約理盡初不著藁王佐才杜如晦秦王引為府兵曹叅軍時府屬多外遷王患之房𤣥齡曰去雖多不足吝如晦王佐才也大王若終守藩無所事必欲經營四方捨如晦無共功者王驚曰非公言我幾失之賦詩尤工杜淹秦王引為天策府兵曹叅軍文學館學士常侍宴賦詩尤工賜銀鍾明珠兼乗未若一言薛収授天策府記室叅軍嘗上書諫王止畋獵王答曰覽所陳知戒我者卿也明珠兼乘未若一言今賜黄金四十挺小記室薛元敬武徳中為祕書郎天策府叅軍直記室文學館學士是時収與房杜處腹心之寄更相結附元敬謹畏未嘗申欵曲如晦歎曰小記室不可得而親不可得而踈棄官郝處俊再轉滕王友耻為王府屬棄官去以重吾府韋思謙沛王府長史皇甫公義引為倉曹㕘軍謂曰公非池中物屈公為數旬客以重吾府賴卿師矩劉禕之拜相王府司馬帝謂曰卿家忠孝朕子頼卿師矩冀蓬在麻不扶而挺也識逺文詳韋湊入為相王府屬時姚崇兼府長史嘗曰韋子識逺文詳吾恨晚得之王得自擇劉賛秦王從榮握兵而驕多過失言事者請置師傅以輔翼之大臣畏王不敢决其事因請王自擇秦王即請賛乃拜賛祕書監為秦王傅賛泣曰禍将至矣五代史天下無雙張薦調露初登進士第考功貟外郎騫味道見所對稱天下無雙授岐王府叅軍吾之相如盧照隣調鄧王府典籖王愛重謂人曰此吾之相如郎家二賢郎餘令見松栢門舉五孝趙洪智入為陳王師講孝經百福殿洪智舉五孝見講論門甚見尊憚蘇良嗣髙宗時為周王府司馬王年少不法良嗣數諫王以法繩府官不職者甚見尊憚帝異之不事江滕蔣虢江安主元祥性慵遴時滕蒋虢三王皆貪暴得其府官者惡之不願行當時語曰寕向儋崖振白不事江滕蒋虢檄雞雞門左右衛二十七孔左右衛上將軍各一人從二品大將軍各一人正三品將軍各二人從三品掌宫禁宿衛凡五府及外府皆揔制焉凡五府三衛及折衝府驍騎番上者受其名簿而配以職皇帝御正殿則守諸門及内廂宿衛仗非上日亦將軍一人押仗將軍缺以中郎將代武徳五年改左右翊衛曰左右衛府百官志交㦸之下周廬肅然白居易李演左衛上将軍制八屯之警廵士卒之勤惰爾為其正盡得察之同上恐唐官以射為耻泉獻誠天授中以右衛大将軍兼羽林衛武后嘗出金幣命宰相南北牙羣臣舉善射五軰中者以賜内史張光輔舉獻誠獻誠讓玉鈐大将軍薛吐摩支摩支固辭獻誠曰陛下擇善射者然皆非華人恐唐官以射為耻不如罷之后嘉納宿衛三十年薛平授右衛将軍宿衛三十年本傳故事諸衛大将軍與尚書更為之韋凑遷右衛大将軍𤣥宗問曰故事諸衛大将軍與尚書更為之近時職轉故用卿以重此官其母辭尋徙河南尹延入閤語宇文士及擢右衛大将軍𤣥宗延入閤語或至夜分遇休沐往往馳召金吾衛二十八白金吾緹騎百官志金吾統緹騎二百爪矛之軍予王之爪牙輦轂之衛環衛警廵西京賦曰警夜廵晝嚴衛禁兵統勾陳之衛權蘭綺之兵歎後漢光武帝歎曰仕宦當為執金吾贖罪楊淮奏梁兾叔父執金吾制以三月之俸贖罪環列之尹中尉有式道漢百官志中尉掌徼廵京師武帝更名執金吾有式道左右中注云式道持麾至宫門門乃開孔左右金吾衛掌宫中京城廵警烽堠道路水草之宜凡翊府之翊衛及外府佽飛番上者皆屬焉師田則執左右營之禁南衙宿衛官将軍以下及千牛畨上者皆配以職大功役則與御史循行百官志龍朔二年改左右候衛曰左右金吾同上摧擿姦伏宗室晦遷金吾将軍摧擿姦伏無留隱吏下畏之多識舊儀宗室若水為左金吾衛大将軍兼通事舎人多識舊儀每宣勞揖賛進止闊華有可觀者三至左金吾大將軍張暐再為羽林大将軍三至左金吾大將軍晝夜循行田仁會遷右金吾將軍所得禄估有贏輒入之官人以為尚名然資彊摰疾惡晝夜循行有絲毫姦必發廷中擿罰日數百京師無貴賤舉憚之劾巫徙于邊巫傳鬼道惑衆自言能活死人市里尊神仁會劾徙于邊領禁兵戍咸陽張獻甫累遷至左金吾衛将軍李懐光叛吐蕃盗邊獻甫領禁兵戍咸陽累年兵農恱安捕惡少優戱杜中立歴左右金吾衛大将軍京師惡少優戱道中具騶唱呵衛自謂盧言京兆驅放自如中立部從吏捕繋立箠死大言國有直臣張萬福拜右金吾将軍陽城等詣延英門論裴延齡事伏閣不去帝震怒左右懼不測萬福大言曰國有直臣天下無慮矣吾年八十與見盛事徧揖陽城等勞之天下益重其名執金入侍杜牧王釗訓伺察城中細事徳宗時金吾大將軍李翰好伺察城中細事唐舊史諸衛二十九白傳曰潘崇為太師且掌環列之尹環列之尹宫衛之官列兵而環王宫李將軍李廣嘗夜獵至覇上亭長呵止之從者曰故李将軍亭長曰今将軍猶不可况故也李廣遂宿於亭下分職環衛重名冠軍上將軍處右偏將軍處左孔左右驍衛掌司左右衛凡翊府之翊衛外府豹騎畨上者分配之凡八兵守諸門左皇城四靣宫城内外則與左右衛分知助輔武徳五年改左右驍騎尉曰左右驍騎府龍朔二年省府字左右武衛掌同左右衛凡熊渠畨上者分配之左右威衛凡羽林畨上者分配之凡分兵主守則知皇城東面同上龍朔二年左右威衛曰左右武威衛光宅元年左右威衛曰左右豹韜衛左右領軍衛凡射聲畨上者分配之凡分兵主守則知皇城西面同上龍朔二年左右領軍衛曰左右戍衛咸亨元年改左右武衛曰領軍衛武后光宅元年左右領軍衛曰左右玉鈴衛同上左右監門衛掌諸門禁衛及門籍文武官仗及監門衛以帳報内門凡朝叅奏事待詔官及繖扇儀仗出入者閱其數以物貨器用入宫者有籍有傍左監門将軍判入右監門将軍判出月一易其籍行幸則率屬扵衙門監守左右千午衛掌侍衛及供御兵仗以千牛備身左右執弓箭宿衛以主仗守戎器朝日領備身左右升殿列侍親射率屬以從並同上龍朔二年左右千牛府曰左右奉宸衛後又曰千牛同上躍馬挺槍刺於萬衆中秦叔寳每敵有驍将銳士震耀出入以夸衆者秦王輙命叔寳往取之躍馬挺槍刺扵萬衆中莫不如志及平隱巢功拜左武衛大将軍臨難不屈劉洪基京師平功第一授右驍衛将軍討薛舉戰淺水原八緫管軍皆没惟洪基一軍戰力矢盡為賊拘帝以臨難不屈優䕶其家典衛屯兵阿史那社爾率衆内屬十年入朝授左驍衛大将軍處其部扵靈州詔尚衡陽長公主為駙馬都尉典衛屯兵宿衛四十八年阿史那忠擢右驍衛大将軍宿衛四十八年無纎隙人比之金日磾脱巾固諫執矢思力授左領軍将軍帝逐鹿苑中思力諌曰陛下為四海父母乃自輕臣竊殆之後復逐鹿思力脱巾𢃄固諌乃止佩大横刀王及善除右千牛衛将軍帝曰以爾忠謹故擢三品要職羣臣非捜辟不得至朕所爾佩大横刀在朕側亦知此官貴乎累從征討柴紹髙祖即位拜左翊衛大将軍累從征討以多進封霍國公歴二百餘戰秦叔寳拜左武衛大将軍後稍移疾嘗曰吾少長戎馬間歴二百餘戰數重創出血且數斛安得不病乎解金𢃄投地皇甫無逸轉右武衛将軍王世充篡棄母妻斬闗自歸追騎及無逸解金𢃄投之地餘見忠門安坐遣人為彈琵琶柴紹轉右驍衛大将軍吐谷渾党項冦邉虜據髙射紹軍紹安坐遣人為彈琵琶見謀畧門毒酒楊思訓從幸并州右武衛大将軍慕容寳節夜要思訓與謀亂思訓不敢對寳節懼毒酒以進思訓死妻訴之流寳節嶺表至龍門追斬之乃詔以毒寘人者重其法羽林三十白羽林漢置羽林郎嚴衛禁兵羽林衛良家漢羽林材官取三輔良家之子自給鞍馬孤兒漢羽林諸孤兒並父死子代皆武帝時擊匈奴死子子孤不能自活養扵羽林孔左右羽林軍大將軍各一人正三品將軍各三人從三品掌統北衙禁兵督攝左右廂飛騎儀仗大朝㑹則周衛階陛廵幸則夾馳道為内伏凡飛騎畨上者配其職有勑上南衙者大将軍承墨勑白多於金吾引駕仗官與監門奏覆降墨勑然後乃得入百官志國家設十二衛猶漢之有南北軍而左右羽林尤稱親重自諸衛而移鎮者謂之美遷白居易王元輔制掌勾陳而䕶建章備廵警而嚴羽衛同上軍有羽林用灋星象統之爪士以拱宸居李彦佐制統良家之騎士訓期門之材官王士則制誅二張李多祚以勞改右羽林大将軍遂領北門衛兵張柬之将誅二張以多祚素感慨可動以義乃從容謂曰将軍居北門幾何曰三十年矣將軍擊鐘鼎食貴重當世非大帝恩乎今在東宫大帝子而嬖豎擅朝危廹宗社國家興廢在將軍將軍誠有意乎答曰茍縁王室惟公所使乃引天地以自誓辭氣毅然東之遂定謀興兵於禁門之内立侍於交㦸之中杜牧張直方制論奏衎衎有大臣風李景略遷羽林將軍對徳宗延英殿論奏衎衎有大臣風李聽為羽林時有駿馬帝在東宫使左右諷取之聼自以身宿衛不敢獻餘節度使門左右神策三十一孔左右神策軍掌衛兵及内外八鎮兵百官志左右龍武神武神策號六軍貞元二年神策置大將軍十四年置統軍始殿前左右神威軍號天威軍八年廢以軍𨽻神策有馬軍歩軍將軍及指揮使等以大將軍知軍事天復三年廢神策四年復同上募材勇以代士卒柏良器入為左神策大将軍募材勇以代士卒市販者中尉竇文場惡之坐䦨入柏良器坐友人闌入換右領軍衛自是軍政皆中官専之同上北落親兵夾峙宮省杜牧梁榮幹制中郎將三十三秦官也白銀章青綬魏晉官品云冠服如將軍冠鶡漢官儀曰初置期門平帝更名虎賁中郎將冠鶡取其贄也建節漢司馬相如為中郎將建節至蜀蜀太守已下郊迎縣令負弩矢前驅持漢節蘇武字子卿以中郎將持節使匈奴杖節毛盡而不失白孔六帖卷七十五
