body:
  text: 白孔六帖卷八十五唐白居易原本宋孔傳續撰畋獵一功課二䧟穽三網罟罝羅四射五侯六中七獲八筭九畋獵一禽荒畋規諫仁天子畋諸侯示非禮白三畋禮天子諸侯無事則嵗三畋一爲乾豆二爲賔客三爲充君之庖不畋禮無事而不畋曰不敬田不以禮曰暴天物禮曰畋獵有禮故戎事閑也蒐田以時詩薄狩于敖春蒐夏苗秋獮冬狩皆於農隙以講事也傳不狩不獵胡瞻爾庭有縣貆兮鶉兮特兮從禽于外上無逸飛下無遺走好樂無荒德用不擾夜獵春畋校獵豺祭獸文子曰先王之法也豺未祭獸罝網不通於野鷹隼未擊羅網不張於谷順祭獸之時展從禽之禮宗祧之事傳曰楚子曰属有宗祧之事於武陵言畋獵爲宗祧及時之畋中禮之殺講戎事纘武功講一時之武國語三時務農一時講武遵三畋之文時畋周禮爭禽之訟周禮斷其爭禽之訟頒禽脩祭禽之理獵得禽獸以供祭祀火畋禮曰豺祭獸然後田獵鷹化爲鳩然後設罻羅昆蟲未蟄不用火畋悌達於蒐狩矣禮曰頒禽隆於長者而悌達於蒐狩矣隆多也老者多賜獲獸爭禽易曰畋無禽恒非其位雖勞無獲即鹿無虞以從禽也易畋獲三狐狐者隠藏之物畋獲三品乾豆賔客君庖前禽王用三驅失前禽也給鮮毚兎詩趯趯毚兎遇犬獲之發彼小豝殪此大兕射麋麗龜弋鳬與鴈兩狼並驅從兩狼兮御衆周禮太宰入則田役以御其衆竭作小司徒役無過家一人其餘爲羡唯田與追正月竭作鄉師掌四時之田先期簡衆脩卒伍也山虞澤虞皆掌畋獵之事饁獸小宗伯若大甸則帥有司饁獸于郊注饁饋也以饋四郊之神有司大司馬也遂頒禽獸仲春教振旅遂以蒐田有司表貊立表而貊祭仲夏教茇舎遂以苗田茇草舎止也軍有草止之法仲秋教治兵遂以獮田仲冬教大閲遂以蒐田並大司馬之職有畋獲禽獸者有司教導之月令十一月季春出火爲焚然後簡其車賦而歴其卒伍而親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽塩之利以觀其不犯命也求服其志不貪其德介麋迹人吿曰逢澤有介麋譬如畋獵射御慣則能獲禽若未甞登車射御則敗績壓覆是懼何暇思獲左爭禽榖梁蔡人殺陳佗也陳侯淫獵于蔡與蔡人爭禽而殺之與楊祥事皆云云榖梁秋蒐于紅以習戎事禮之大者艾蘭爲防謂大防也置旃爲轅門云云車軌塵馬後蹄掩禽旅掩取衆禽也御者不失其馳然後射能中過防不逐不從奔也面傷不獻嫌誅降也禽雖多天子取三十餘與衆士也漢髙曰追殺獸者狗也指示蹤者人也鷹隼未發短弋不施於蹊隧既順時取物然猶山不槎蘖妄發期中進退履獲文選因農隙纘武功宋公載燧爰分左右之㿻夏官建旗必殊險易之主險野人爲主易野車爲主大司馬職云建旗于表置旌于門田得禽而射不中穀梁田而習射射中而曰不得禽則得禽射不中而曰得禽則不得貴仁義賤勇力講事必在於有儀塩利取觀於不犯竝驅兩牡一發五豝司原虞箴曰獸臣司原忘蹄結網不狩不獵以畋以漁奉時辰牡辰時也言及時馳逆之車掎角捕鹿翨氏昌氏反掌攻猛鳥各以其物爲媒而掎之禁俗掌部格西京五百里内宜禁捕獵犯者王公以下録奏痛决一頓禽荒書曰外作禽荒暴天物田不以禮曰暴天物習於畋獵謂之賢閑於馳逐謂之好焉詩欲無犯時淫于原獸思其麀鹿並后羿虞箴虞人之箴戒畋獵也擭胎拾卵蚳蝝盡取文選取樂今日遑恤我後發狂老子曰騁馳畋獵令人心發狂灞陵夜獵舊時將軍盤遊無度十旬不返書曰大康尸位以逸豫乃盤遊無度畋于有洛十旬不返有窮后羿距于河五子咸怨𫐠大禹之戒以作五子之歌恒于游畋時謂淫風心苟發狂物斯暴殄外作之荒既暴於物内憂之禍必及其身荒矣武王之志荒矣獵較較爭也孟子曰魯人獵較孔子亦獵校不違俗也燔人家漢長沙王建德獵縱火燔人九十家坐棄市宣詔捨之削八縣也武功載績雖聞七月之詩遊田爲恒須憚三風之戒曹伯陽好弋割鮮染輪文選櫛風沐雨魏鮑勛叔業曰獵暴華蓋於原野傷生育之理櫛風沐雨而不以時隙焚林文子先王之法也不焚林而狩昆蟲未蟄不以火田也欲既犯時殺而盡物規諌刺荒旋刺荒也齊襄公好畋獵從禽獸而無厭國人刺之諫獵揚子雲作長楊賦以諫漢帝獵也好畋晉侯好畋故魏絳陳獸臣之箴取監於后羿觀漁魯侯矢魚于棠遂觀之矢陳也陳捕漁之器臧僖伯諫之虞人之箴見上羅氏之戒禮羅氏致鹿與女曰好田好女者亡其國也老氏之戒見上發狂注云云樊氏之戒楚莊王好田故魏樊夫人爲之不食禽獸之肉三年王爲之自戒也罔遊于逸罔淫于樂禹戒無逸之戒書周公作無逸曰文王不敢盤于游田嗚呼無淫于觀于逸于田于㳺也羅氏致鹿戒諸侯也羅氏掌鳥獸者戒見上注相如諌獵書力稱烏獲捷言慶忌人誠有之獸亦宜然卒遇逸羣之獸駭不存之地輿不及還轅人不暇施巧是胡越起於轂下而羗夷接軫也銜橛之變諫獵書云漢武除地爲上林帝令吾邱夀王舉籍河南隄封頃畝欲除爲上林東方朔諫乃止舉籍謂舉數其籍也獲罪魏長水校尉戴陵諫七獵減死一等獵勝八音魏文侯獵中道問侍臣曰獵之樂何如八音劉曄曰獵勝鮑勛曰樂上通神明下知人理况獵暴華盖於原野傷生育之至性因奏曄佞而問順云云廣城頌馬融季長爲校書時人以文德可興武德宜廢遂寢狩蒐之禮自戰陣之去故使猾賊從横融以文武不墜故上廣城頌諫之露坐諫見諫諍門裨諶草創吳孫策好獵虞翻仲詡諫策策曰君言是也然時有所思端坐悒悒有禆諶草創之計是以行也天子畋示禮傳曰成有岐陽之蒐所以示諸侯禮也諸侯所由用命也示汰商紂爲黎之蒐所以示諸侯汰也諸侯所由棄命也三畋禮曰天子無事則嵗三畋驅獸無害五穀無大畋獵孟夏不合圍天子禮王用三驅失前禽楚畋雲夣之澤漢獵長楊之宫羽獵六師既陳駟馬乃駕當在鎬之年天子無事順于敖之狩虞人有儀周文有渭濵之畋卜曰所獲非熊非羆得太公也薄狩于敖宣王詩大綏禮天子殺則下大綏綏大旗名殺獸也吉日宣王畋獵之詩徒御不驚大庖不盈德至禽獸湯見張羅去三靣祝之云云諸侯聞之曰湯德至禽獸諸侯畋三畋禮曰天子諸侯無事則嵗三畋不掩羣諸侯禮不圍澤國君春畋云云小綏小綏諸侯旗名殺則下小綏禮楚田於夣禮既失之魯狩于郎甞其時也楚子田孟諸宋公爲右㿻鄭伯爲左㿻㿻陣名令夙駕載燧宋公違命無畏抶其僕以徇盧令刺荒齊襄公好畋獵盧犬名詩射鴻于囿衛獻公戒孫文子寗惠子食從公不釋皮冠與之言云云子産唯君用鮮取鮮禽以祭示仁無麛無卵畋既以時殺亦中禮不殺胎不夭殀不覆巢禮不射宿子釣而不網弋不射宿欲無犯時殺不盡禮射不剪謂向己者不殫物以昭仁解網見上注慕天乙之仁且聞羅網卜渭濱之獵不在熊羆取之以道田不夭殀蒐狩順時合騶虞之仁也胎卵盡取是竭澤之淫風鑒五子之戒無及於荒考三驅之文不專於殺好生惡殺周禮禁麛卵與其毒矢射者謂其矢物且害心多餒獸之藥無出國門月令三月畋雖中禮不取於蚳蝝殺亦有仁無及於麛卵苟不道其生成則何殊於暴殄沉澤周禮禁沉澤謂以毒藥沉水中令魚蟲盡死無得春夏探卵彈射飛鳥宣詔曰三驅之禮一靣之羅求服其志不食其得放麑孟孫獵得麑使秦巴西以歸其母隨而哀鳴西不忍放之孟孫怒巴公云乃赦之後託子巴西曰不忍殺麑可託也董仲舒曰禮不麛不卵取麑違命皆非禮也非禮未復命傳曰魏獻子合諸侯城周田於大陸而卒范獻子出其栢椁以其未復命而田也矢魚傳曰魯侯矢魚于棠非禮也臧僖伯諫曰鳥獸之肉不登于俎皮革齒牙骨角毛羽不登于器則公不射古之制也公不聴之不軌不物謂之亂政身剪禮曰凡有血氣之類不身剪剪殺也時殺禮曰禽獸不以其時殺非孝也有禮禮曰田獵有禮故戎事閑畋既有時殺其中禮悌達於蒐狩頒禽隆於長者而悌云云茍或違於禮經則何殊於暴物傳曰晉厲公田使婦人先殺而飲酒而後大夫殺厲公先婦人後卿佐孔從獵洛陽苑唐儉爲民部尚書從獵洛陽苑羣豕突出于林帝射四發輒殪四豕一豕躍及鐙儉投馬搏之帝㧞劔斷豕顧笑曰天策長史不見上將擊賊耶何懼之甚對曰漢髙祖以馬上得之不以馬上治之陛下神武定四方豈復快心於一獸帝爲罷獵畋獵自放段成式侍父于蜀以畋獵自放文昌遣吏白其意諌止侯希逸好畋獵鳥鵲皆識謂之鳥賊李客師喜馳獵雖老猶未衰自京南屬山西際灃水鳥鵲皆識之毎出從之翔噪人謂之鳥賊遊畋自娛李令問魏徵䟽曰在貞觀初髙居深拱無畋獵異弋之好數年之後志不克固鷹犬之貢逺及四夷晨出夕返馳驥爲樂變起不測其及救乎截輕禽逐狡兎韓元超留輔太子監國時太子射獵詔得入禁禦元超諫曰内苑之地繚叢薄冒翳薈絶磴險塗殿下截輕禽逐狡兎衘翳之變詎無可虞冒垂堂淫原獸長孫無忌從父敞隋煬帝爲晉王敞以庫直從畋驪山王凌危逐鹿諌曰大王冒垂堂淫原獸可乎王遂止彈治柳範貞觀中爲侍御史時吳王恪好畋獵範彈治之從獵涇陽蘇世長從獵涇陽大獲帝入旌門詫左右曰從獵畋樂乎世長曰陛下廢萬幾事遊獵不滿十旬未爲樂也數出畋遊虞世南帝數出畋遊世南以爲言皆蒙嘉納以獵爲娛張𤣥素太子承乾事遊畋𤣥素上書曰古者田三驅非以教殺除民害也今反以獵為娛行之無常豈不損盛德哉僞約畋裴行儉至西州徐召四鎮酋長僞約畋謂曰吾念此樂未始忘孰能忘吾獵者於是子弟願從者萬人孫伏伽言凡蒐狩當順四時不可妄動且陛下即位之明日有獻鷂者不郤而受此前世弊事奈何行之柳澤上書曰今貴戚打毬擊鼔飛鷹走犬狎比小人盤遊藪澤陛下誕降謀訓觀以學業示之以好惡陳之以成敗則長享福禄矣以呼鷹逐獸爲樂姚崇陜州硤石人徙同州刺史先天二年𤣥宗講武新豐故事天子行幸牧守在三百里者得詣行在時帝亦密召崇崇至帝方獵渭濱即召見帝曰公知獵乎對曰少所習也臣年二十居廣成澤以呼鷹逐獸爲樂張景藏謂臣當位王佐無自棄故折節讀書遂待罪將相然少爲獵師老而猶能帝悦與俱馳遂緩速如㫖帝歡甚趙武孟彦昭父少遊獵晝夜馳獵不堪其勞隠太子建成為皇太子凉州人安興貴殺李軌以衆降詔趣原州應接建成素驕不恤士雖甚暑晝夜馳獵衆不堪其勞亡者過半不可一日不獵巢刺王元吉曰我寧三日不食不可一日不獵上賦以諷杜鴻漸明皇東行河因游畋上賦以諷荒于游畋崔郾穆宗荒于游畋内酣蕩昕曉不能朝郾進曰十一聖之功德四海之大萬國之衆其治其亂繫於陛下自山以東百城地千里昨日得之今日失之願陛下親政事以幸天下帝動容慰謝游畋恣樂流情傷志憲宗數出游獵柳公綽奏太醫箴以諷曰㳺畋恣樂流情傷志馳騁勞形叱咤傷氣武德獵髙祖帝紀武德四年閏月壬戌獵于好畤乙丑獵于九嵏丁卯獵于仲山戊辰獵于清水谷獻續虞人箴白居易穆宗好畋游獻續虞人箴以諷曰髙祖方獵蘇世長進言不滿十旬未足爲歡上心既悟爲之輟畋降及宋璟亦諫𤣥宗温容聼納獻賛從容璟趨以出鷂死懷中噫逐獸于野走馬于路豈不快哉銜橛可懼審其安危惟聖之慮游獵韋杜王琚懷州河内人𤣥宗爲太子間游獵韋杜間怠休樹下琚以儒服見且請過家太子許之至所廬乃蕭然窶陋坐久殺牛進酒殊豐厚太子駭異自是毎到韋社輙止其廬校獵盧懷慎卒帝後還京因校獵鄠杜間望懷慎家環堵痺陋家人若有所營者馳使問焉還白懷慎大祥帝即以縑帛賜之為罷獵韓休峭鯁時政所得失言之未甞不盡帝獵苑中或大張樂稍過差必視左右曰韓休知否已而䟽輒至遮道諫潘好禮兼邠王府司馬農日王出獵家奴羅列好禮遮道諫王初不許乃卧馬下謼曰今農在田王何得非時暴禾稼以損下人要先踐殺司馬然後聼所為王慙爲還勸止畋獵李絳出爲華州刺史州有捕鷂户嵗責貢限絳以爲言并勸止畋獵有詔澤潞太原天威府并罷之遷御史大夫穆宗數游畋絳率其屬叩延英切諫不納以病辭飛鳥見必羣噪張直方好馳獵往往設罝罘於道當宿衛不時入下遷驍衛將軍後居東都弋獵尤甚洛陽飛鳥皆識之見必羣噪諸將憚其材武樊澤遷山南東道司度就拜節度使每射獵諸將憚其材武從獵夷門崔𢎞禮過宣武從劉元佐獵夷門餘見賔客門荒畋獵藩鎮程懷直荒畋獵出輒數日而返馳獵近郊王播爲京兆尹勲戚家馳獵近郊播請呵止諫畋游王起數上䟽諫穆宗畋游事畋蓬萊池帝甞畋苑中至蓬萊池曰絳甞以諫我今可退也校獵渭川獻詩規諷吕向天子數校獵渭川向又獻詩規諷校獵同州劉仁軌貞觀十四年校獵同州時秋斂未訖仁軌諫懇愊致諫禇亮髙祖獵親格虎亮懇愊致諫暮夜乃還李德裕帝數出畋游暮夜乃還德裕上言宵田爲獠注管子曰獠獵異弋江東亦呼獵爲獠火田爲狩注放火燒草並爾雅履獲進則履退則獲潛身伏草間諌五代何澤爲洛陽令唐莊宗好畋獵數踐民田澤乃潜身伏草間諫莊宗當馬而諫曰陛下未能一天下而休兵而暴斂疲民以給軍食今田將熟奈何恣畋游以害多稼使民何以出租賦吏何以督民耕陛下不聼臣言願賜臣死於馬前莊宗大笑爲之止獵天上黄金吳秦裴好馳獵以鷹隼為事常曰天上黄金餘不足貴出九國志辭弓金爪鏑白馬蹴㣲雪杜甫遣興長陵銳頭兒出獵待明發同上未甞戴星杜牧燕將録今天子鋪樂張獵未甞戴星獵騎圍邊月韓愈詩人業射獵吕元膺鄧虢川谷深曠人業射獵而不務農千騎飈掃萬乘雷犇李白大獵賦千騎飈掃萬乗雷犇稍摶桑而拂委大刮月窋而搜塞門掉倚天之劒彎落月之弓同上功課二獻禽附白收禽論功文選㑹衆收禽論功賜也數諫衆寡又曰収禽舉觜數諫衆寡傳曰獸人無乃不給於鮮數獸計鮮七命曰虞人數獸林衡計鮮論最犒功禽獸課獻禽獸周禮虞中周禮小宰禽佐於虞中注云今得禽者置之虞人之旗中而後獻給焉大獸公之小獸私之獲者取左耳以計功大司馬職云獻獸于公致禽周禮獵孟子曰魯桓公獵獸而祭孔子亦獵不違衆也較爭多也以歳之非時獻禽之未至言私其豵獻豜于公詩獻獸小宰獸人掌網罟田獵辨其名物冬獻麇夏獻鹿春秋獻獸物時皆畋則守罟注備獸觸分禽平任安少卿為亭長邑人俱出獵任安常為分禽麋鹿邵署老少皆喜曰任少卿分列平也孔得禽獻旗下禮志皇帝狩田凡射獸目左射之凡出表者不逐之諸得禽其大者供宗廟次者供賔客下者供庖厨乃命有司饁獸于四郊以獸吿至於廟下獻禽之課文粹杜甫鵰賦解騰攫而竦神開網羅而有喜獻禽之課數備而已田將止虞部建旗於田内乃雷擊駕鼓乃諸將之鼓士徒譟呼諸得獻者致其左耳大獸公之小獸私之通典䧟穽三白周禮曰㝠氏爲穽擭以攻猛獸以靈鼔敺之靈鼓大靣鼓也敺使趨穽擭也又曰凡害於國稼者春秋爲穽擭秋塞穽杜擭害稼爲禽獸也擭爲􅫉㮙也設於穽中秋塞之謂其傷人也書曰杜乃擭敜乃阱塞之禮曰人皆曰予知驅而納諸罟擭䧟阱之中而莫之知避虎兕出於柙柙檻也猛獸在於䧟阱則揺尾而求食擭獸利人除害犯暴標幟律云於深山作䧟穽者須明立標幟恐䧟人也鷙獸禁暴孔治機穽李紳遷滁壽二州刺史霍山多虎擷茶者病之治機穽發民跡射不能止紳至盡去之虎不爲暴拘若檻穽吳武陵信州人少陽子元濟叛武陵遺以書曰數百里之内拘若檻穽常疑死於左右手抵回姑息不可謂明自投機穽李翰五等論大臣側目相視自投機穽誘人文粹劉秩私錢譏今塞其路是設䧟穽而誘之入不可三也諸有猛獸之處聼作檻穽射窩等開元令命塞䧟穽顧少連補登封主簿邑有虎民患之少連命塞䧟穽移文嶽神虎不爲害猛虎落檻穽坐貪如孤㹠韓文送進士劉師服東歸網罟罝羅四白肅肅兎罝詩伏羲氏作網罟以畋以漁蓋取諸離易小宰獸人掌罟畋獸辨其名物周禮驅而納諸罟擭䧟阱之中而莫之知避託言人不知禮羅氏掌羅鳥蜡則供羅襦㝠氏掌設弧張弧張則罿罦屬以局置禽獸也畋獵罝罘羅網畢翳餧獸之藥無出國門月今三月鷹化爲鳩然後設罻羅楚人以弱弓㣲繳加歸鴈之上雖有矰繳安所施戚夫人歌豺獺未祭罝網不布於梁澤鷹隼未發矰弋不施於蹊隧罝罘玉篇云罝兎罝罘覆車也忘筌忘蹄魚網之設鴻則離之施罛濊濊音豁九罭魚網一靣見下畢之羅之周禮守罟備獸觸也罟罶禁罝羅罣䍡罣音毒良罟里革斷罟公曰良罟也鳥亂於上莊子畢弋機變多則鳥亂於上釣餌罟矰笱多則魚亂於下削革羅落罝罘多則獸亂於澤莊子魚不畏網而畏鵜鶘以網無情故也虎豹在囊檻漢以網爲周祛祛遮禽獸圍陣湯羅祝網史記湯出見野張網四靣曰天下去四方皆入吾網湯曰嘻盡之矣乃三靣祝之曰欲左者左欲右者右不用命者入吾網諸侯聞之曰湯德及禽獸矣孔載三十車巢王元吉喜鷹狗出常載罟網三十車設罝罘於道張直方好馳獵往往設罝罘於道易人取禽獸之勞文粹元結補樂調網罟之為義盖稱伏羲能易人取禽獸之勞吾人苦兮水深深網罟設兮水不深吾人苦兮山幽幽網罟設兮山不幽免禽獸文粹楊炯少姨廟碑免禽獸于網羅雲羅張天網布文粹李白大獵雲羅張天網布羅網罝罘緜原峭格掩路綿綿文粹陳子昻陳居士墓銘綿綿羅網㝠㝠髙鴻鳥雀李商隠劉乂傳羅網鳥雀蟭螟飛而不度文粹李白大獵賦蟻蠓過而猶疑蟭螟飛而不度張羅網於門韓文實録貞元末五坊小兒張捕鳥雀於閭里皆為暴横以取錢物至有張羅網於門不許人出入者或有張井上者使不得汲水近之輒曰汝驚供奉鳥雀痛毆之出錢物求謝乃去施衆網以加一禽尚不能得况張一目以羅萬品而望其飛者走者大者小者盡出乎其間其可得乎元稹制策虞羅自合虚施巧杜二鷹詩借狗求罝滕王元嬰爲金州刺史從民借狗求罝所過爲害網罟嵗廣李乂帝遣使江南發在所庫貲以贖生乂上䟽鬻生之徒惟利是視錢刀日至網罟嵗廣射五禮射矜恃善射不中白男子之事禮既張我弓又挾我矢以威天下聖人弦木爲弧剡木爲矢弧矢之利以威天下盖取諸暌有志尚書若射之有志有志則中善射五射周禮六藝一曰五射注云白矢參連剡注襄尺井儀射法法亦禮也習射上功習鄉上齒言功多者居上藝成而下貫革徹札養由基蹲甲而射徹七札并夾取矢周禮危弓安矢具弓矢門引彊周渤云云決拾儀禮司射適堂西垣決遂取弓于階吿賔弓矢既具有司請注云決猶開也以象骨爲之著左臂鈎絃開體遂射以韋爲之所以絃非射時則爲之拾謂斂也楅儀禮射曰司馬出于左物之南立于所設楅之南命弟子設楅猶樞所以承齊矢也乃設楅於中廷南當洗東肆東肆繼於賔也楅長如笥破的奠豐棲鵠啼猿君使士射不能則辭以疾曰某有負薪之憂和容正志射戲李廣與人居則畫地爲軍陣闊狹以飲射戲求踈密持酒飲不勝者專以射爲戲也禮射昭誠心射以禮成賔申賢序射侯終日射侯不出正兮君子無所爭必也射乎揖譲而升下而飲其爭也君子主皮子曰射不主皮爲力不同科古之道也射有五善一曰和志二曰和容三曰主皮四曰和頌五曰興舞决拾既佽君臣合射大侯既抗射矢斯同行以燕禮以明君臣之義射於澤宫以觀禮樂之節將觀盛德必慎令儀燕以序賔射而選士射而觀德三侯文子五正爲節天子以騶虞爲節諸侯以貍首爲節大夫以采蘋爲節士以采蘩爲節故明其節之志以不失其事則功成而德行立也禮記飾以禮樂其容體比於禮其節比於樂盡志於射繹己之志射之為言繹也繹者各繹己之志也心平體正持弓矢固審然後可以言中各射己之鵠動而中禮發必循聲發彼有的以祈爾爵失正鵠者反永諸身合射以禮序賔以賢射者進退周旋必中禮内志正外體直孔子射於矍相之圃觀者如堵牆百中五善四鍭如樹言中考繹志之文不專貫革稽和容之善寧在主皮君子必爭賢者不失發必循聲既合采蘋之節中則破的何慙穿葉之能三年之妙雖貫蝨心五善之容何乖貍首賔射之禮周禮射夫既同周禮凡射王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正大夫三耦射一候一獲一容樂以采蘋五節二正士以三耦射豻侯一獲一容樂以采蘩五節二正容乏也節樂之節也豻獸名獲弊也以燕以射詩三耦四矢四矢既挾周禮司裘供射侯設鵠鵠小鳥而難中是以中之為雋大射大射者謂祭祀時王將有郊廟之事以射擇諸侯及羣臣與鄉國所貢之士可以與祭者射謂三公及王子弟封畿内者與衆臣射者也考功梓人張五采侯此五正之侯也五正者中朱次白次蒼次黄次𤣥居三去𤣥黄二正自蒼而畵朱緑其外之廣皆居侯中三分之二與士射以豻皮飾侯也肆懸懸磬乗矢四矢順羽而興儀禮執矢之禮記曰大夫與公士爲賔不敢使鄉人加尊於人大夫故取公士不宿戒不戒而習之其牲烹狗于堂東方祖陽氣之在方立德行者莫若射故聖王務焉禮諸侯貢士於天子天子試之射宫中多與祭而君有慶少者不與祭而君有譲慶則益地譲則削地是以諸侯君臣盡志於射以習禮樂父鵠子鵠爲人父者以爲父鵠爲人子者以爲子鵠言志各思念己之鵠而射之中則得父子之道横弓却手儀禮決拾并夾楅見上注太守行禮韓延壽為東郡守春秋鄉射陳樂揖譲習射獲罪後漢劉琨桓公教授五百餘人毎春秋鄉射常備典儀以素木瓠葉而為爼豆桑弧蓬矢以射兎首縣宰率親属觀之王莽以琨聚徒私行大禮僣上乃繫琨及家屬莽敗乃免善射彀中射麋麗龜射則臧兮舍㧞則獲弓矢既調將軍射虎以宣威大夫射雉而取笑六鈞顔髙之弓六鈞三十斤為一鈞七札養由基導甲而射徹七札飲羽李廣見石以為虎射而飲其羽弦不再控矢不虚發百歩穿楊葉養由基矯矢猿啼由基引弓鴈落庚嬴中九鳥羿弓不虚發李廣控弦而獸伏属羽而鳥下貫蝨心於三年穿楊葉於百歩藝出常倫絶倫引猿臂控鳥號敏手支左屈右見下如拒如附射者手也發彼有的應弦李廣為將射見敵非十歩之内度不中不發發則應弦而倒用此竒將兵國數辱也善息史養由基射楊葉百發百中人皆曰善有一人曰可教矣由基怒曰子必能教我曰非能教子引左屈右也夫百歩中楊葉而不善息少焉氣衰力倦弓撥矢鈞一發不中百發盡息人不知晉魏舒為後將軍盧毓毎與參佐射常為畫籌後遇朋人不足以舒為數毓初不知其善射容範閑雅發無不中舉坐莫有之敵者賭牛王凱有牛名八百里駮常瑩其蹄角王齊與對射賭之凱矜恃其能令濟先射一發破的因據胡床叱左右令探心來一割便去不中禮曰射有似乎君子失諸正鵠反求諸身反求身不怨不得爲諸侯天子之射謂之射侯中而得為諸侯射不中則不得為諸侯不與於祭天子射於射宫射中則與於祭不中則不與於祭不得與於祭者有譲削於地得與於祭者有慶益於地進爵黜地是也故發不中則反求諸己而已矣若夫不肖之人則彼將安能以中一發不中則棄前功出征云云循聲既爽於采蘩發矢遂垂於楊葉君使士射不能則辭以疾曰某有負薪之憂可教見上門善息注有負薪之憂無穿楊之妙射不主皮矜恃恃射傳若羿恃其善射不修民事而淫于原獸辱國死藝傳曰潘黨與養由基蹲甲而射之徹七札焉以示楚王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝注云賤其不尚智謀矜射力必當於死藝也羿善射不得其死焉一矢復命楚王召養由基與之兩矢使射吕錡中項伏弢一矢復命傳孔賊不敢前邱行恭善騎射王世充戰印山流矢著太宗馬行恭回射之發無虚鏃賊不敢前射無空發張士貴虢州盧氏人彎弓百五十斤左右射無空發善騎射李客師善騎射又長孫詮有甥趙持滿者善騎射逐野馬持滿為凉州長史甞逐野馬射之矢洞於前邊人畏伏所射皆應弦仆薛仁貴與梁建方契苾何力遇髙麗大將温沙多門戰横山仁貴獨馳入所射皆應弦仆又戰石城有善射者殺官軍十餘人仁貴怒單騎突擊賊弓矢俱廢五甲射仁貴為鐵勒道緫管宴内殿帝曰古善射有穿七札者卿試以五甲射焉仁貴一發洞貫帝大驚走馬射帖孫伏伽帝數出馳射伏伽諌曰臣聞天子之居禁衞九重出也警入也蹕非直尊其居處為社稷生人計也比聞陛下走馬射帖娛悦羣臣殆非所以導養聖躬垂憲後代七矢斃七人馮盎羅竇諸洞獠叛詔盎率衆二萬為諸軍先鋒賊據險不可攻盎持弩語左右曰矢盡勝負可知矣發七矢斃七人賊乃退供奉仗内張孝忠天寳末以供奉仗内古先哲王莫不遞襲源乾曜遷諫議大夫景雲後公卿百官上已九日廢射禮乾曜以謂聖王教天下必制禮以正人情古之擇士先觀射禮非取一時樂也夫射者别邪正觀德行共祭祀辟寇戎古先哲王莫不遞襲比年以來射禮不講所同恡費而舊典為虧大射謂春秋不可廢分曹習射田𢎞正軍中甞分曹習射𢎞正注矢聮中每射破的王栖曜賊將邢超然守曹州乗城指顧栖曜曰彼可取也一矢殞之栖曜善騎射始將兵時渉冦境遇游騎環合乃規百歩立表而射每射破的虜相顧懼引去許獵近郊賈耽為東都留守故事居守不出城以耽善射優詔許獵近郊手射賊來瑱賊攻穎川手射賊皆應弦仆萬人敵李晟徃事河西王忠嗣從擊吐蕃悍酋乗城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍讙奮忠嗣撫其背曰萬人敵也一日射雞兎九十五藩鎮王武俊善射甞與賔客獵一日射雞兎九十五觀者駭伏張萬福業儒不顯乃學騎射見白鷺射中其目石雄徐州人初雄討劉稹水次見白鷺謂衆曰使吾射中其目當成功一發如言帝聞下詔褒美射冠軍中田頵傳安仁義以善射冠軍中開門鬪先吿所當中然後射之埋其半土中馳射之至死劉感仁杲約降感紿諾仁杲怒執感埋其半土中馳射之至死詈益甚中左目張廵欲射子琦莫能辨因剡蒿為矢中者喜謂廵矢盡走白子琦乃得其狀使霽雲射一發中左目賊還射皆披靡南霽雲廵復遣如臨淮吿急引精騎三十冒圍出賊萬衆遮之霽雲左右射皆披靡射佛寺浮圖霽雲抽矢回射佛寺浮圖矢著甎曰吾破賊還必滅賀蘭此矢所以志也射賊百歩内霽雲善騎射見賊百歩内乃發無不應弦斃裴旻事見虎門馳射爲樂吳兢帝東封泰山道中數馳射為樂神武超絶突厥黜棘連遣大臣阿史德頡利發入獻遂從封禪有詔四夷諸酋皆入仗佩弓矢會兎超馬前帝一發斃之頡利發奉兎頓首賀曰陛下神武超絶若天上則臣不知人間無有也賜弓矢射禽吕向以起居舍人從帝東廵帝引頡利發及蕃夷酋長入仗内賜弓矢射禽向上言陛下引内從官陪封禪盛禮使飛鏃於前同獲獸之樂是狎昵太過或荆卿詭動何羅竊發逼嚴蹕冒清塵縱醢單于汙穹廬何以塞責帝順納一發貫二鵰髙駢事朱叔明為司馬有二鵰並飛駢曰我且貴當中之一發貫二鵰焉衆大驚號落鵰侍御射不入鐵不如不發五代景延廣父建善射甞教延廣曰射不入鐵不如不發由是延廣以挽强見稱溢的徐敬業射必溢的酉陽雜爼志射朝野僉載督君謨善射閉目而射應口而中云志所在則中有王靈智者學其法久之曲盡其妙欲射君謨殺之君謨時無弓矢執一短刀矢来輙折末後一矢以口承之遂齧其鏑謂靈智曰學射三年但未教汝齧鏃法耳一發竹分唐史帝出近苑或以竹一筒值舎外見纔尺許遠且百歩帝属二矢曰党羗窮寇乃嵗暴吾鄙今我約射竹中則彼當自亡不中我且索天下兵剪之終不以賊遺子孫左右注目帝一發竹分矢徹諸外左右呼萬嵗張歸覇張晊矢中歸覇歸覇㧞之反以射賊一發而斃飛騎貞觀中揀旅力驍㨗善騎射者謂之飛騎衣五色袍乗六閑馬上出遊幸即從駕行矣劉餗傳記捐弓投矢江南野史劉仁贍猿臂善射發無不中一旦世宗親臨城下坐幄中觀戰士攻城仁贍自上城射之矢去御坐數歩輙墜左右驚愕咸諫請少避之世宗乃曰一箭射死一天子天下寧復有天子乎遂命左右進坐於墜箭之上矢復至又遠數歩而止仁贍知之因捐弓投矢謂左右曰斯乃天也非吾所能中之筈不虚彀霍王元軌詔從獵遇羣豕帝使射之筈不虚彀羣豕為盡帝撫其背曰爾藝過人顧今無所施方天下未定得若豈不用乎三發連中薛公達佐鳯翔㑹軍帥不文甞集射設的髙數十尺令曰中者酬錦與金一衆軍莫能中公達執弓矢揖曰請為公讙射三發連中衆大呼笑帥不喜因自免去為母卜安重榮晉髙祖起太原使張潁隂招重榮其母與兄皆以為不可而重榮業已許潁母兄謀共殺潁以止之重榮曰未可吾當為母卜之乃立一箭百歩而射之曰石公為天子則中一發輙中又立一箭而射之曰吾為節度使則中一發又中其母兄乃許重榮以廵邊千騎叛入太原髙祖即位拜重榮成德軍節度使五代史射金瓶崔仁冀父詢天成中有蕃使假道來聘仍以弧矢大誇於吳人武肅王宴之於龍山擊瑒酒酣因以金瓶置射堋之上命蕃使射之蕃使一發中瓶之竇武肅王命詢曰汝能賽之乎詢曰詢雖不能願假王之威德請兼觜竇以勝之遂授以親箭二一發中之竇再發中之觜蕃使慙服者久之王大悦因賜金瓶并帛器以奬之自是命諸王子皆師其射法吳越史或掛針于木或立馬鞭百歩射之在達靼時從其羣豪射獵或掛針于木或立馬鞭百歩射之輙中羣豪皆伏以為神五代莊宗紀射生子弟李寳臣善騎射甞覘虜射六人盡殪及還為禄山射生從入朝留為射生子弟三矢殺三人薛仁貴時九姓衆十餘萬今驍騎來挑戰仁貴發三矢殺三人於是虜慴皆降慮為後患悉坑之轉討磧北擒僞葉護兄弟三人軍中歌曰將軍三箭定天山壯士長歌入漢關九姓遂衰本傳善騎射李光弼嚴毅沈果有大畧㓜不嬉弄善騎射又郭晞善騎射從子儀征伐有功又李懷仙守營州善騎射又王武俊甫十五善騎射侯六祭侯附白周禮梓人爲侯廣與崇崇髙也方參分其廣而鵠居焉器以皮為之各以其侯居中三分之一也兩介與其身三下兩介半之兩介謂布可以維持侯者上幹下幹皆謂舌或謂舌取其出而左右也侯制上廣下狹盖取象於人張臂八尺長六尺也上網與下網出舌尋絹寸焉網所以繫侯於植者上下皆出舌一尋尋一人張臂之節網謂繩絹籠網舌維持侯張皮而棲鵠則蠢以功儀禮大射曰天子熊侯白質諸侯麋侯赤質大夫布侯盡以虎豹士布侯盡以鹿豕此謂獸侯燕射則張之鄉射及賔射當張采侯三正而立天子侯燕射之禮各以鄉射之禮而張此侯也又曰乃張侯下網不及地武武人迹也中人之迹一尺二寸祭侯周禮射人祭侯為位注服不氏以祭其為位服不氏受獻之祭侯之禮以酒脯醢謂司馬實爵而獻獲者於侯薦脯折爼獲者執以祭其辭曰惟若寧侯彊飲彊食語爾子孫諸侯百福謂爾子孫後世為諸侯儀禮司馬洗爵升賔之以降獻獲者于侯薦脯醢折爼與薦皆三祭三祭處處獲負侯中也北面拜受爵司馬拜送爵獲者執爵使人執其薦與爼從之左介設爼豆籩在西豆在東是以獻爼當其北獲者以爲功也南靣坐執爵祭脯醢執爵興取胏坐祭遂祭主中者若神在中侯以明之書二侯孔去殿九十歩禮志射前一日張熊侯去殿九十歩設乏於侯西十歩北十歩可以張射侯文粹歧公遺愛碑轅門言言夏屋耽耽可以張射侯權德輿賔登時畢諸將備戎裝韋蘇州始建射侯詩男子本懸弧有志在四方虎符沗明命熊侯始張皇衆賔登時畢諸将備戎裝星飛的屢破鼔噪武更揚天子五正李善選張大侯注鄭司農曰王張五采之侯也謂天子五正諸侯三正大夫士三正以布盡取五方正也於大侯上也中曰獲下曰留上曰揚禮志千牛將軍以矢行奏中曰獲下曰留上曰揚左曰左方右曰右方注留謂矢短不及侯揚謂矢過侯左右謂矢偏不正獲者持正自乏南行當侯東行至侯負侯北靣立同上皇帝射於射宫則張熊皮去殿九十歩通典觀於射宫則張麋侯如親射儀同上通典中七白周禮射鳥氏凡射事飾中舎筭執其禮事中以盛筭舎謂設筭於中以持射而取之中則釋之射禮君於國射皮於樹中於郊閭中於境虎中士鹿中天子之中未聞儀禮鄉射記國中射則皮樹樹獸名國中城内也中則翿旌獲尚父白羽與朱羽楺於郊謂主皮也又王制曰在郊閭中閭中獸角似牛一角各以其物獲士鹿中翿旌以獲獲八白儀禮獲者坐而獲射者則言大獲獲得也講武田之類是以獲中為獲也舉旌以宫偃旌以商宫為君商為臣聲和律律相生獲而未釋其筭獲者執旌許諾聲不絶以旌負侯而俟俟弟子取矢以旌指教之卒射釋獲者遂以所執餘獲于中西興共而俟司射復位釋獲者進遂取賢獲勝黨之笇司射視筭司馬又命獲者倚旌于侯中爲當負侯也又命獲者執旌以負侯欲命射者見侯與旌深有志於中孔布獲者位乏東禮志射前一日布獲者位乏東東靣負侯靣北立禮志其日質明皇帝服武弁獲者持旌自乏南行當侯東行至侯負侯靣北立侍中一人奏稱有司請具請射司馬奉弓自西階升當西楹前南靣揮弓命獲者以旌去侯西行十歩北行至乏止同上千牛將軍以矢行奏中曰獲下曰留同上皇帝觀射於射宫獲者位於乏東東靣取矢者在獲者南俱東靣將射獲者持旌南行十歩當侯東行至侯負侯北靣立皇帝射於射宫獲者持旌自乏南行當侯東行負侯北靣立已上通典司馬奉弓自西階升當西楹前南面揮弓命獲者去候西行十歩北行至乏止同上獲者謂看矢踈密者通典筭九白儀禮曰司馬去侯者許諾司馬降釋弓反位司射猶挾一箇去扑與司馬交於階前司射北靣曰不貫不釋釋筭也不貫不中也上射揖司射反位釋獲者坐而釋獲每一箇釋一筭上射於右下射於左有餘筭則反委之禮尚曲也司馬降釋弓反位命弟子委如初大夫之矢則兼束之釋獲者東靣于中而坐先數右獲二筭爲純純全耦也一純以取實于左手十純則縮縮縱也十爲蹙而委之有餘純則横於下一筭爲竒竒則又縮之純下又縱之禮曰前籌八十八十者各以十為耦為正全數其有衆禽從實也孔筭籌唐孔穎達曰多筭者筭籌也鄉射記曰箭籌八十有尺有握握素是也多筭謂勝者少筭謂不勝者勝飲不勝而相揖譲故曰君子之所爭也出論語正義司射引王公以下皆如御前之儀射訖王公以下皆北面相對立通事舎人宣勅云射中者依筭賜物不中者罰通典白孔六帖卷八十五
