江心啒啒鳬雛鳴春江無雲水平滿江心啒啒鳬雛鳴張藉春江曲水暗人語驚栖鳬寒塘沉況栁葉踈水暗人語驚栖鳬寒塘曲雪羽飢鳬曬雪羽杜牧弄水亭鳬浴張汪汪同上遊石盎詩類暴雨而至予視穫于甫里夜不能寐往往聲類暴雨而至至明訊其甿曰鳬鷖也其曺蔽天而下盖田所當之而穗必竭笠澤書鵝二十七白書換鵝右軍王羲之甞見山隂道士有羣鵝求之乃邀右軍書黄庭經以換遂書之鶃鶃孟子陳仲子居於陵歸省母有饋其兄生鵝已頻蹙曰惡用是鶃鶃者爲哉他日母殺鵝食之其兄曰鶃鶃之肉而吐之也食晉符朗食鵝知黑白之處觀王羲之性好鵝㑹稽有一孤居姥養一鵝善鳴求市未得遂攜親友命駕就觀之母聞王右軍至乃烹鵝以待之羲之歎息彌日緑眼黄啄駕鵝飛去傅承爲江夏守有鵝一隻飛去三年後更三十餘頭而来霜毛玉羽孔鬭鵝田令孜僖宗即位擢令孜在神䇿軍中尉帝冲騃喜鬭鵝走馬數幸六王宅興慶池與諸王鬭鵝一鵝至五十萬錢飛止必雙徒侣畢會南蠻西舍利凢曲名十有二十曰野鵝謂飛止必雙徒侣畢㑹冶黄金爲鵝吐蕃傳帝伐遼還使禄東賛上書曰髙麗恃逺弗率於禮天子自將度遼隳城䧟陣指日凱旋雖鴈飛于天無是之速夫鵝猶鴈也臣請冶黄金爲鵝以獻其髙九尺中實酒三斛擊鵝鶩李愬入蔡州夜半至懸瓠城雪甚城傍皆鵝鶩池愬令擊以亂軍聲毛羽清潔中和四年臨淮漣水民家鷹化爲鵝而弗能游鷹以鷙而擊武臣象也鵝雖毛羽清潔而飛不能逺魚搏擊之用充庖厨而已警鬼酉陽雜俎衛公言鵝警鬼衆中有鈴聲濟南有鵝浦有漁人居水側常聽鵝聲衆中有鈴聲甚清亮候之見一鵝咽頸極長羅得之項上有銅鈴云以銀鏁隠起元鼎元年字酉陽雜俎養白鵝李羣玉善草書性喜養白鵝及授校書郎東歸盧肇送詩云工書定得鵝南部新書黄庭換白鵝李白送賓客山隂道士如相見應寫黄庭換白鵝山隂遇羽客要此好鵝賓王右軍同上木鵝荔非元禮李光弼守河陽周摯攻北城以車千乗載木鵝撞車麾兵填塹引頸嗔船過杜甫舟前小鵝兒引頸嗔船過無行亂眼多云眠沙泛浦白於雲得房公鵝房相西亭鵝一羣眠沙泛浦白於雲書生入籠中酉陽雜俎許彦相綏安山行遇一書生卧路側云足痛求寄鵝籠中彦戱言許之書生便入籠中籠亦不廣書生與雙鵝並坐負之不覺重至其一樹下書生乃出籠去好鵝尋道士李白詩蟬二十八白綏入趙冠翼爲魏鬢寒蟬鳴孟秋鳴蜩仲夏蜩始鳴詩宛彼栁斯鳴蜩嘒嘒五月鳴蜩豳風如蜩如螳詩飲露車服注凡侍臣加蟬冠取其清髙飲露不食也有綏郕人有兄弟死而不爲衰聞子臯將爲郕宰遂爲衰郕人曰蠶則績蟹有筐范則冠蟬有綏螗蜋吳王伐荆少孺子諫曰園中有榆榆上有蟬居髙而飲露不知螳蜋在後殺聲蔡邕鄰人召邕食聞主人彈琴時有殺聲而反主人曰彈琴時有螗蜋捕蟬吾意唯恐失蟬故情見乎聲齊女董仲舒答問者曰齊王之后怨王而死尸化爲蟬登樹而鳴故蟬名齊女吸風翳葉蟬噪林逾静蟬蛻夜蟬當夏急詩蕭瑟含風蟬蛻殻連拳抱緑葉而猶在新聲響喨噪清風而不歸孔含風飲露宋華蟬鳴篇嘒嘒其長永託于風同上逺近凉颸赴髙栁同上夕吟歳之秋深蟬其夕吟夕響依山郭餘悲散秋嶺韋應物蟬詩風蟬碎錦纈韓愈詩蟬嘯珍木李白序朽木所化酉陽雜俎曰蟬木蛻時名復育相傳蛣蜣所化韋翾莊在杜曲常冬中掘樹根見復育附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實朽木庇影容跡宋華蟬鳴篇于彼踈桐庇影容跡又于林之表含風飲露清如清唳蟬李白寄太宣城龍腦蟬交趾貢龍腦有蟬蚕之狀帝以賜妃出楊妃外傳第一聲蟬聞第一聲杜牧詩亂響亂響生風前唐太宗蟬詩碧樹秋寒蟬碧樹秋杜甫晚秋長沙笳簫笳簫急暮蟬同上送韋大夫蟬煩鳴轉渴韓愈詩𤣥蟬無停號杜甫立秋後題寒蟬聒梧桐日夕長悲鳴李白感秋情詩秋蟬號階軒同上古風秋蟬號階軒感物憂不歇抱葉寒蟬静杜甫詩螢二十九白腐草化爲螢季夏大暑之日螢光増曜於日月鍾㑹論曰熠燿宵行螢火也晝伏夜動照書車允字武子家貧無燈火以絹囊盛螢火以照書夜讀螢署光照而螢飛同上照書螢戴火而寒宵燭丹鳥夜照的的熠熠即炤爾雅螢火即炤孔馳輝韓愈會合聯句云馳輝燭浮螢草腐而螢飛栁宗元天說草腐而螢飛是豈不以壊而後出耶螢鑒縁帷徹杜甫詩孤螢出荒池司空圖與李生論詩書得於寂寥則有孤螢出荒池陳根腐葉漢陵秦苑遥蒼蒼陳根腐葉秋螢光劉禹錫秋螢引紛綸輝映紛綸輝映平明㓕金爐星噴燈花發同上髙麗罘罳髙麗罘罳過珠網斜歴琁題斜歴琁題舞羅幌拂席韋應物螢光拂席流未足臨書卷時能㸃客衣杜甫隨風隔幔小帯雨傍林㣲同上度閣流螢度髙閣韋應物金屋無人螢火流李白長門怨入簾劉禹錫銅雀人歸自入簾長門悵望来照淚綴深壁元稹螢火綴深壁䆫螢韓愈詩安居守䆫螢螢星錦城使李賀度月影纔斂繞竹光復流韋應物一别五秋螢杜甫日暮拾流螢酬薛文空餘泣聚螢贈張翰林案頭乾死讀書螢題鄭著作蠅三十白青蠅刺䜛也詩云營營青蠅止于樊愷悌君子無信䜛言傳赦符堅將赦屏人作赦文有大蠅赤頭聲甚厲入室驅之復来俄而人皆知有赦書於是詰其所得皆云有青衣童子呼於街中堅曰是前青蠅也吊客吴志虞詡仲翔忤孫權徙交州曰死以青蠅爲吊客止筆王思性急方書有蠅飛在筆端去復来思怒乃投筆㧞劒逐之畫曹不興畫屏風誤筆㸃汚似蠅孫權謂是真蠅彈之止樊止棘青蠅附驥後漢青蠅之飛不過十歩若附驥尾日馳千里孔驥尾受蠅回鶻帝平諸姓有来朝者帝勞曰我在天下四夷有不安安之不樂樂之如驥尾受蒼蠅可使日千里也食苽蠅集其上武儒衡時元稹倚宦官知制誥儒衡厭鄙之㑹食𤓰蠅集其上儒衡揮以扇曰適從何處来遽集於此一坐皆失色鷹頭之蠅魏元忠表楚客以書規之曰閻竪者給宫掖掃除事乃委之以事投之以權故竪刁亂齊伊戻敗宋君側之人衆所思懼所謂鷹頭之蠅廟垣之鼠者也藥化鄭注敗禇中藥化爲蠅數萬飛去蠅翔司空圖注愍征賦後日月沒於晷刻晷刻之間蠅翔而螢腐耳被凍蠅朝野僉載王方慶體質鄙陋言辭魯鈍張元一曰王十月被凍蠅㸃白韓瑗禇遂良貶瑗曰遂良社稷臣蒼蠅㸃白傳致有罪蠅營南蠻傳懿宗馳遣太僕卿支詳爲和蠻使蠻本無謀不能乗機㑹鼔行但蚍結蠅營青蠅賀青陽記術士相郭代公若青蠅拜賀方能及第公疑之及登科訖歸坐家庭有蠅作人行立約數萬折躬者三良乆乃去蠅飛蔽天酉陽雜俎大和七年忽有蠅蔽天如蝗止三日河陽界經旬方散獵蠅記室金溪記盧記室多作脯對夏則委人於十歩内扇上塗餳以撲蠅脯以青紗障隔塵土時人呼爲獵蠅記室觸睫隠字長安秋多蠅成式日讀百家五卷頗爲所擾觸睫隠字其類有蒼者聲雄壯負金者聲清聒其聲在翼身青者能敗物巨者首如火出酉陽雜俎翼甚似蜩冠甚似蜂叚成式讀書有蠅隠字偶拂殺一取視之翼甚似蜩冠甚似蜂惟察於腐嗜於酒肉蝶三十一白木蠧生蟲羽化爲蝶入莊周之夢莊周夢爲蝴蝶栩栩然飛不知周夢爲蝶蝶夢爲周也蛺蝶粉蝶舞蝶孔弄芳韓愈詩揚揚弄芳蝶橘之蠧蛻爲蝴蝶陸龜蒙蠧化橘之蠧大如小指一日視之弗食弗動明日復徃則蛻爲蝴蝶矣倚薄風露攀縁草樹同上聳空翅輕聳空翅輕瞥然而去翩旋軒虛颺曵紛拂或隠蕙隙或㽞篁端蝶幸王仁裕天寳遺事明皇春時使妃嬪挿花親放蝶随其止幸之紙剪蛺蝶桂苑叢談進士張辭有道術或人召飲意合即索紙剪蛺蝶三二十枚以氣吹之成列而飛累刻以指収之俄皆在手中人求之即不許南園緑草飛蝴蝶李白思邊撲蝶圖藝文志周昉撲蝶圖一巻縈叢韋應物詩縈叢蝶尚亂黄白蛺蝶杜陽編穆宗殿前千葉牡丹始開自是宫禁中常夜有黄白蛺蝶萬數飛集于花間輝光照耀逹旦方去官人竟以羅巾撲之無有獲者上令張宻網於空中遂得數百於殿内遟明視之則皆金玉也其狀工巧無以爲比而内人多用絳縷絆其脚以爲首飾夜則光起粧奩中其後開寳厨中覩金屑錢異蝶雜俎衛公盡得峡中異蝶翅闊四寸餘深褐色毎翅上有二金眼江夏班劉魯封云見滕王蝶圖有名江夏班大海眼小海眼村裏来菜花子同上百合花白蛱蝶尺蠖蠒所化也工部貟外郎張周封言百合花令之泥其隟經宿化爲大蛱蝶同上若棲芳草裏南唐野史王著及第後欲訪張嘏因出通衢忽相遇遂邀叙話云公蝴蝶詩最嘉今夜若棲芳草裏爲傳消息到王孫嘏無言忽不見驚問鄉人云已卒矣雜蟲鳥三十二白鳶飛戾天匪鶉匪鳶紙鳶有鶖在梁禿鶖也墓門有鴞有鴞萃止䳡似鴞也恠鳥晋書翺翔湘川有似恠鳥肅肅鴇羽集于苞栩鴛鴦在梁戢其左翼七月鳴鵙鸛鳴于垤戴勝降于桑鷦鷯巧婦鳥也六鶂退飛過宋都燒鴧鳥石崇爲荆州刺史得鴧鳥雛與將軍王愷時制鴧鳥不得過江爲司𨽻𫝊祗所劾詔原罪燒鴧鳥於都街孔鷲鳥西域波斯有鷲鳥能噉羊有毒輙鳴拂菻王坐金蘤榻側有鳥如鵝緑毛上食有毒輒鳴類槖駞翅而行吐火羅永徽元年獻大鳥髙七尺色黒足類槖駞翅而行日三百里能噉鐡俗謂駞鳥佳鷂劉齊賢出爲晋州司馬帝以其方直尊憚之時將軍史興宗從獵苑中言晉州出佳鷂可捕取帝曰齊賢豈捕鷂人邪卿安得以此待之夕蔓起寒螿之愁劉禹錫秋聲賦夕蔓起寒螿之愁鶺鴒殿庭樹唐讓皇帝憲傳時有鶺鴒千數集麟徳殿庭樹翔棲浹日左清道率府長史魏光乗作頌以爲天子友悌之祥帝喜亦爲作頌傳信鳥杜陽編處士元藏機有二鳥大小類黄鸝毎翔翥空中藏機呼之即至㦯令衘珠㦯令授人語謂之傳信鳥本出滄州鑄黄金爲蝸酉陽雜俎上爲兾王時寢齋壁上蝸跡成天字上懼遽掃之經數日如初及即位雕玉鑄黄金爲蝸形分置於道釋像前野鳥入室東漢劉贇鎮彭城之二年有鳥集蘓碧堂庭樹上黄質朱喙金目青翼紺趾𤣥尾頗類於鳯賔佐或嘆曰野鳥入室主人将去矣乃馮道至出九國志飛奴張九齡年少時養羣鴿毎與親知書繫鴿足上依所教飛往投之目之爲飛奴出遺事蛙大如鼎神龍中渭水有蝦蟆大如鼎里人聚觀數日而失五行志落日梟呼杜甫朝太清賦愁隂鬼嘯落日梟呼獸三十三白珍禽竒獸不鬻於市禮蹠實獸蹠實而走百獸率舞不狘不獝或寢或訛鋸牙鉤𤓰野心狼子毛物周禮咸若鳥獸魚鼈莫不咸若獸有茂草人有寢廟各有攸處徳用不擾在帝夷羿冐于原獸忘其國恤而思其麀牡原獸見上毛羣軒軒陶融妻陳氏筝賦獸軒軒而率舞駓騃西京賦羣獸駓騃行走貌也猛毅䯱髵奮鬛皃隅目髙睚髙睚有角枕藉死多毛聚猛氣陸梁哮噉值鋒羣居宂託張牙觸突羣分碣磍狂皃走曠宂宅奮髦孔深居簡出韓愈送文暢序獸深居而簡出懼物之爲己害也野獸觸寢門南唐劉鋹四年野獸觸寢門樊胡子皆以爲符瑞諷羣臣入賀之竒獸則天武后武氏臨朝拜洛受圖大陳珍禽竒獸貢物石鑱恠獸延載二年作天樞石鑱怪獸環之豺虎雖伏弗曰仁獸吕向上言可擾於人蜀悼王愔傳帝頻教不悛怒曰獸可擾於人獸有二千四百種酉陽雜俎獸竄山伏吐蕃傳閻立本曰臣恐師到獸竄山伏捕討無所得獸遊劉晏移書宰相居無尺椽㸑無盛煙獸遊鬼哭逸獸張說䟽逸獸驚犯左右原獸長孫敞隋煬帝爲晉王敞以庫直從攻驪山王凌危逐鹿諫曰大王冐垂堂淫原獸可乎獸在豐草白居易續虞人箴鳥生深林獸在豐草龍三十四白鱗蟲之長水物𫝊龍水物莫智無求有悔亢龍四靈麟鳯龜龍雲從龍泥蟠泉躍鱗物周禮龍師𫝊郯子曰昔太皥氏以龍紀故爲龍師而龍名注太皥伏羲氏有龍瑞故以龍紀事爲官負圖龍馬負圖出河薦圖虞舜幸洛有黄龍出薦圖鱗甲成字鬭禜無求傳曰鄭大水龍鬭於時門之外洧泉國人請爲禜焉子産曰龍不我覿焉攘之彼其室也吾無求於龍龍無求於我也龍戰于野其血𤣥黄易豢龍濳醢龍見絳郊魏獻子問蔡墨曰吾閲蟲莫智於龍以其不生得謂之智信乎對曰人實不智非龍實智古有豢龍氏昔有董父實甚好龍求嗜慾以飲食之龍多歸之舜賜之姓曰董氏而豢龍故舜有畜龍及夏孔甲擾於有帝帝賜之乗龍河漢各二有雄雌陶唐氏後曰劉累學擾龍於秦以事孔甲夏后氏曰御龍龍一雌死潜醢以食夏后夏后饗之龍水物也今水官棄矣故龍不生得潜龍勿用見龍在田㦯躍在淵飛龍在天亢龍有悔見羣龍無首吉爲畜龍以爲畜故魚鮪不淰魚化大鯉魚登龍門化爲龍不登者㸃額暴腮矣蛇化史蛇化爲龍不改其文竹化費長房投竹於葛陂乃化爲龍蜿蜿矯矯白龍吕氏春秋白龍化爲魚豫且射中左目劒化雷氏子佩豊城劒過延平津劒躍入津化爲龍畫莊子葉公子髙好龍室屋皆畫龍於是天龍聞而下来窺頭於牗拖尾於屋葉公見之棄而逺去失其魂魄葉公非好龍者好似龍也騤騤荀鳴鶴謂陸士龍曰本爲雲龍騤騤乃是山鹿野麋屠莊子朱漫汗學屠龍於支離益殚千金之産藝成而無用睡河上翁子得千金之珠其父曰此珠是驪龍頷下汝得之必遭睡也若龍覺汝當爲韲粉深山大澤實生龍蛇傳年號漢有龍瑞故改年爲黄龍蛟龍得水而神可立管子云云瑞神龍負圖出河伏羲受之以其文畫八卦臥諸葛亮隠居人謂蜀先主曰諸葛孔明臥龍也伐蛟月令季秋見漢恵時二龍見蘭陵人家井中矯首龍狀宫沼龜龍在宫沼則是無故順之實也梭化陶侃少時漁於雷澤得一織梭挂於壁後雷電化爲龍而飛去蟄龍蛇之蟄以存身也非池中物吴志龍非池中物雨必飛去能幽能明說文甲龍鱗蟲之長能幽能明能大能小能長能短春分而登天秋分而入池有鱗廣雅曰有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍未升天曰蟠龍舉而雲興元命苞曰龍之言萌也隂中之陽舉而雲興龍池括地志曰龍池之山四方髙中有池方七百里羣龍居之多五花樹羣龍食之去㑹稽四萬五千里雄鳴上風淮南子曰夫蛟龍伏潜於川而卵剖於陵雄鳴上風雌鳴下風而化者形精之至而能也人不見龍之飛舉而能髙者雨奉足也蛇蠋化抱朴子曰有自然之龍有蛇蠋化成之龍蠋音蜀又曰山中辰日稱師者龍也衘燭捧鑪王逸注曰大荒北隅有山不合因名不周故神龍衘燭照之吳越春秋曰歐冶子作劒赤墐山破而出錫若邪之溪涸而出錮雷公擊橐蛟龍捧鑪天帝太一下觀之五彩九色河圖曰舜以太尉即位三臨河觀黄龍五彩負圗出置舜前漢武内傳曰王母乗紫雲之輦又駕九色班龍三友兩壻魏志華歆邴原管寕爲友號爲一龍歆爲龍頭原爲腹寧爲尾權宜覽曰黄憲爲司徒與李元禮俱娶太尉桓温女人謂桓叔元兩女俱乗龍言壻如龍也量江海宋玉對楚王問曰夫鳥有鳯而魚有龍龍朝發崑崙之墟暴鰭於碣石暮宿孟渚夫尺澤之鰌豈能與之量江海之大哉注云衆鱗之中龍爲徳鮓晉張華食鮓知龍肉登龍門李膺之門騰雲乗水之蟲乾之象見上見龍出潜離隠御天時乗六龍以御天也吉之先兆化褒國之神化爲二龍夏后藏漦具變化門乗而仙列仙騎龍鳴者演亭人池中得龍子如守宫十餘頭養之長大稍有去者一旦水壊廬而騎龍仙去又馬師黄帝馬醫又治龍病後龍負而去又陶安公冶師也有朱雀止冶上云云七月七日果有赤龍迎之又呼子先騎馬後化爲龍又陽陵子明釣得白龍放去後迎之具仙門畏練葉齊諧記蛟龍畏練葉具端午門爲旱河圖應龍處南極殺蚩尤夸父不得復上應龍狀乃大得雨雕龍言雕鏤如龍文棹龍舟而容與思𤣥賦鳴龍鳴水中不見乃截竹吹之聲相似也樓龍樓二龍戱武功縣唐太宗生之瑞孔祠龍王與請即義扶谷故湫祠龍置房宇梁鎮上疏切諫以爲湫者龍所託耳今湫竭已久龍安所存不宜崇去龍之宂破生人之産魚服韓朝宗曰白龍魚服深可畏也見太子門龍紀火官黄帝廢之𫝊奕上言臨平龍出禇無量家瀕臨平湖有龍出人皆走觀無量尚㓜讀書若不聞可擾以馴杜正倫太宗甞召謂曰我聞神龍可擾以馴然頷有逆鱗嬰者死人君亦有之鄉屬遂犯吾鱗補闕失朕其慮危亡哉錢龍酉陽雜俎馬侍中既立勲業自矜伐常有陶侃之志故呼田恱爲錢龍至今爲義士非之獨眼李克用有武勇才一目㣲𦕈軍中號爲獨眼龍其威名盖於代北不睡龍九國志吳越錢鏐少在軍中未甞寢末年少倦乃刻木爲枕以自警或命諸孫諷詩以逹旦晋天福中契丹使至朝廷以近侍李泳爲監伴使羌有判官者幽薊人謂泳曰呉越常不睡乎泳詰其故對曰甞聞五䑓山王子大師言浙中不睡龍今已歸矣訪所聞乃長興壬辰之後也火龍𤨏言李茂貞入闗焚燒京城昭宗宴茂貞於火龍宫白龍見白龍見三清殿改元曰白龍又更名龑以應龍見之祥南漢謫龍說扶風馬孺子言在澤州與羣兒戯郊亭有竒女墜地有光曄然被緅裘白丈之衣首歩揺之冠貴游少年駭且恱之稍狎焉竒女頩爾怒曰不可吾故居鈞天帝宫帝以吾心侈大怒而謫来七日當復今吾雖辱塵土中非若儷也吾復且害若衆怒而退遂入居佛寺講室焉及期而進取杯水飲之嘘成雲氣五色翛翛也因取表反之化爲白龍徘徊登天栁宗元文起龍祈雨臨安大旱宰君命道士東方氏起龍祈雨對曰茒山前池中有之然不可起起必大異遂止明年宰君復召至將臨池遽指王所居曰此龍生彼家矣時王已誕數日出吳越備史二龍負舟下王之廵句章廵行次餘姚文亭鎮舟湊巨石不能進既而大雨震電有二龍負舟之下鎮遏使翁元軻曵舟而進龍自舟首升焉同上夢化赤龍呉程始勤學文穆王時西府院官滕雋甞夢程化爲赤龍望南方而去雋因語其夢於人曰吳氏子非我所測也及爲福州始驗其兆同上夢黄龍繞殿柱江南李景昇之長子也昇在愛其第三子逹故未定儲貳甞晝寢夢黄龍繞寢殿之柱既寤使人視之乃見景抱其殿楹而立意遂定同上華山紅葉有史生遊華山時署環憇一小溪忽有一葉大如掌紅殷可愛隨流而下史獨接得寘懐中食坐頃覺懐中冷重潜起觀之其葉上鱗起粟粟而動始驚懼弃林中遽白衆人曰此必龍也可速去須臾林中白烟生彌布一谷史下山未半風雷大至酉陽雜俎儋耳龍明皇幸蜀徳宗時年十五從行有父老言於衆曰太孫乃儋耳龍何懼賊哉出鄴侯家傳云龍户長安有龍戸見水色則知有龍或引出但如鰍魚而已南部新書炎沙之罰開元中葉天師講經于明州奉化縣忽一老父来禮自云守藏龍守比千歳方免今爲蕃僧㕨水欲殺天師以符救之幽怪録龍宫藥方孫思邈甞救一青蛇龍子也後爲龍王召至水府得龍宫藥方三千道作千金方三千巻内秘隠方一續神仙傳資州龍韋太尉末年資州一龍長丈餘韋以木匣貯之蟠屈于内時屬中元置于大慈殿上百姓縱觀三日爲煙所燻而死出戎幕閒談冠角被龍吾之形冠角被龍吾之徳泉潜而天飛吾之靈嘘雲而乗風賦吾之職抑驕而澤枯今爾茍容於蹄涔之間惟沙泥之是居惟蛭螾之與徒笠澤叢書招野龍畏蠟愛竹龍之性麄猛而畏蠟愛竹及空青而嗜燒燕肉食燕肉人不可渡海南部新書凌波曲帝在東都一女子髙髻廣裳拜而言曰妾凌波池中久護宫苑陛下知音乞賜一曲帝覺爲作凌波曲奏元池上神出於波間龍巢翻夷陵江或浮大木蔽塞水面上人謂之龍巢翻燒睡龍江南㳂江多蘆荻冬月縦火焚之多燒起睡龍𤨏言盛均真龍對彼其真龍者道能神化其流多𣲖或蟠于天或巢于田或翼于人或爲馬或爲劒有侔於此靡徒不居其在天也樞紐隂陽不蹉厥常其在田也贍腴疆土庶彚蕃廡其在人也珠媚心瀾呀成智門其爲馬也市體柔油徧崇九州其爲劒也鬼涙滛秋江萬尋至如挟雲則十雨時濡衘照則三光逓舒是羣龍也緜今古而不僵渥生人以無倦聖賢在上將利益於物天下無道必亢悔於時豈獨矯矯欄端露威於葉公而誇𤓰喙哉龍湫蜀城南有龍湫常損人當韋令時前後運石填之頃之石復失焉後命道士投簡於内填之方滿出戎幕閑談青龍鬭酉陽雜俎桐城縣百姓胡舉家有青龍鬭死於樹中鱗鬛皆似魚唯有髯長二尺雙角各長二尺餘龍髯拂元載有紫髯龍拂色如爛椹可長三尺削水晶以爲柄刻紅玉以爲環紐或風雨寘臨流沾濕則光彩動揺奮然如怒夜則蚊蚋不敢進拂之爲聲而雞犬牛馬無不驚逸若垂之於池澤則鱗甲之屬皆伏而至収於室中即成瀑布未甞輒㫁上知其異進焉蛟龍之騰於天淵也彌六合澤萬物而蝦與蛭不離尺水栁宗元荅問白龍改常服偶被豫且制李白枯魚過河泣白龍改常服偶被豫且制誰使爾爲魚徒勞訴天帝龍恠潜溟波李白寄裴隠毒龍蛻骨轟雷鼓元稹送崔侍郎其潜也淵其飛也天五行志建中四年九月戊寅有龍見于汝州城壕龍大人象其潜也淵其飛也天城壕失其所也資州得龍文餘貞元末資州得龍文餘見前龍與牛鬭大和三年成都門外有龍與牛鬭同上開元間景州水中見一龍三頭時虜中大水後六月有風自龍見處西南來飛屋㧞木者半晝暝龍城録皎然集房綰甞修學終南山谷中忽聞聲若物戞銅噐之韻盖未之前聞也問父老云此龍吟也不久雨至矣綰望之冉冉雲氣游漫果驟雨作自爾再聞徴驗不差後將赤金鉢戞之謂僞龍吟靈怪録麟三十五白仁獸麟也毛蟲之長大戴禮毛蟲二百六十麟爲之長肉角麟端有肉角示有武不用四靈之首百獸之先靈獸于嗟麟兮含仁戴義麕身狼尾馬足含仁戴義雄鳴曰遊聖雌鳴曰歸昌王者不刳胎則在郊一角春秋感精符曰麟一角明海内共一主也五蹄作歌漢武紀五畤獲白麟一角五蹄因作白麟歌薦郊廟也麟以爲畜禮西狩春秋曰西狩大野叔孫氏之車子鉏商獲麟以爲不祥賜虞人仲尼觀之曰麟也然後取之注云麟者仁獸王者之嘉瑞也時無明主出而遇獲仲尼傷周道之不興感嘉瑞之無應故修春秋爲中興之教也絶筆於獲麟之一句所感而起所以爲終也故曰感麟而作春秋也折左足家語曰鉏商於大野獲麟折其左足孔子觀之曰孰爲来哉反袂拭面泣涕沾襟子貢問曰何泣子曰麟爲明主出非其時見害以傷足麟仁獸木之精也孔演圖云云歲星春秋圖日歲星㪚爲麟在囿黄帝時麒麟在囿鬭淮南子麒麟鬭日月蝕不至史仲尼曰刳胎殺夭則麟不至也吐哺費禕曰鳯皇来翔麒麟吐哺禮修蔡邕曰視明禮修則麒麟至不羣麟者音中鍾吕歩中規矩止不羣行無侣不踐生蟲不噬生草不食生肉夀三千歳麟趾詩美太平之公子皆仁厚如麟趾之時詩曰麟之趾振振公子麟之定振振公姓學如牛毛成如麟角引取榖梁曰西狩獲麟其言引取之也注云麟自爲孔子来也不爲魯魯引而取之不與魯之辭也在郊藪禮曰鳯皇麒麟在郊藪牡曰麒牝曰麟黄色麟春鳴曰飬綏夏鳴曰扶㓜吐書孝經右契曰孔子夜夢豊沛邦有赤氤氣起顔回子夏侶往觀之驅車到楚西北苑氏之廟芻兒麟覆其前折左足束薪而覆之孔子曰兒来汝爲誰兒曰吾姓赤松字時僑名受紀孔子曰汝豈有所見乎曰吾有所見一禽如麕羊頭上有角其末有肉方以是西走孔子發薪下麟視孔子趨而徃麟蒙其耳吐三巻書孔子精而讀之亦出搜神記解罘放麟東京賦嘉瑞中國公羊麟非中國之獸嘉祥瑞應麟王者嘉祥也羊頭狼蹄圓頂身有五彩腹下黄髙一丈二尺含仁抱義不羣居不旅行彬彬乎其有文章食嘉禾之實飲珠玉之英躍躍之麟遊彼靈畤文選麟可係而羇兮豈異夫犬羊同上九眞獻漢宣時九真國獻麟云五十一見漢自和已来迄于章和麟凡五十一見於郡國元朔年獲漢武元朔九年幸雍祠五畤獲白麟一角五足作歌歌之終軍對曰野獸并角同夲也殆將有解編髪左衽冠帶而化者由是改年曰元狩後越地及匈奴名王率衆来降好生孫卿曰王者好生惡殺則在郊野𤣥枵之精鶡冠麟者盖𤣥枵之精也懐義廣雅曰含仁懐義行歩中規折旋中矩遊心擇土詳而後動不犯䧟穽不罹罘網乗金禮斗威儀曰人君乗金而王其政太平即在郊徳至鳥獸則臻援神契云云五行之精月令章句凡麟生於火游於土故修其毋臻致其子五行之精歳星㪚爲麟春秋保乾圖云云鑿井得齊中興二年二月監南兖州蕭日南一言廣陵宣城内鑿井得鏤麒麟一枚吉之先兆孔不常有于天下韓愈獲麟解麟之爲靈昭昭也不畜於家不常有于天下其爲形也不類非若馬牛犬豕豺狼麋鹿然以徳不以形又麟之出必有聖人在乎位麟爲聖人出也聖人者必知麟麟之果不爲不祥也又曰麟之所以爲麟者以徳不以形若麟之出不待聖人則其謂之不祥也亦宜麟有利角衆獸不伏宋子嵩化書麟出豈妖孔子云亡孫樵衆中見毛骨猶是麒麟兒杜甫詩靈瑞韋表㣲麟䑓碑銘曰聖人之生也得其時則化行江漢不得其時則道屈於季孟季孟之出也得其時則名薦於郊廟不得其時則身自罹於殘夫麟見壁州前蜀王建武成元年十月麟見壁州麟見文州永平二年六月麟見文州三年麟見永泰四年麟見昌州並上一角而麟趾天祐二年冬十月有獸入吳興一角而麟趾呉越備史麟獸之逺人者也昔魯哀公出獵得之而不識盖索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其逺也獲麟惡其盡取也狩必書地而哀公馳騁所渉地多不可徧以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之竆山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也詠於詩書於春秋雜出於傳記百家之書雖婦人女子皆知爲祥韓文麟傷泣象尼杜甫詩麒麟踆踆而在郊杜甫封西岳賦白孔六帖卷九十五
