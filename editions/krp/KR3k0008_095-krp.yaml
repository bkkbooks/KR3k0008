body:
  text: 白孔六帖卷九十五唐白居易原本宋孔傳續撰鵲一鸜鵒二鸎三鷰四雀五鵠六鸛七鶬八鴇九鳶十鴨十一白鷴十二鵁鶄十三鷺十四鶂十五鷖十六鷸十七鶖十八鴛鴦十九翡翠二十鷗二十一鵜鶘三十二鳲鳩二十三戴勝二十四鳩二十五鳬二十六鵝二十七蟬二十八螢二十九蠅三十蝶三十一雜蟲鳥三十二獸三十三龍三十四麟三十五鵲一白惟鵲有巢惟鳩居之詩鵲之彊彊詩始巢季冬石印張顥爲梁相有山鵲飛翔化圓石顥椎破之得一金印文曰忠孝侯印南飛見烏門知歲博物志鵲巢門戸背太歲得非才智也填河淮南子烏鵲填河成橋渡織女採粟拾遺記員嶠山多大鵲高一丈羣飛採不周之粟於其上抵玉鹽鐵論曰崑崙之下以玉璞抵鵲鏡有烏鵲鏡異鵲莊子遊彫陵之樊見異鵲翼廣七尺目大運寸感周之顙而集于栗林莊周褰裳躍步執彈而畱之白鵲曹子建魏德論有白鵲之瑞燭夜古今注一名燭夜削竹木爲鵲墨子公輸削竹木爲鵲鵲成飛三日不下自以爲巧方朔占東方朔傳新雨止聞鵲聲問朔朔曰必殿後枯樹上東向也果如言問何以知之朔曰以人事言風從東來鵲尾長旁風則順立枯不滑丹拾遺記周成王時塗循國獻丹鵲一雄一雌孟夏取翅爲扇一名條翮一名素影銜火洞冥記曰鳴鵲銜火孔喜鵲竇參申其族子也爲給事中參親愛毎除吏多訪申申因得招賂漏禁密語故申所至人目爲喜鵲也鵲巢碑上苖晉卿嘗自爲父碑文有鵲巢碑上馴擾狄仁傑始居母喪有鵲馴擾巢車轍中天寶十三載葉縣有鵲巢于車轍中不巢木而巢地失其所也巢麥田五代王處直野鵲數百巢麥田中人皆知其不祥以泥爲巢酉陽雜俎貞元三年中書省梧桐樹上有鵲以泥爲巢焚其巢可禳狐魅開成元年鵲集𤣥灋寺五行志放於野外貞觀中忽有白鵲營巢於寢殿前槐上其巢合歡如腰鼓左右拜舞稱賀上曰我常笑隋煬帝好祥瑞祥瑞在得賢此何足賀乃命毁巢鵲放於野外出酉陽雜俎鵲上梁鵲巢中必有梁崔圓相公妻在家時與姊妹戲於後園見二鵲營巢共㗸一木如筆管長尺餘安巢中衆悉不見俗言見鵲上梁必貴同上補葺天尊殿隙壞大厯八年乾陵上仙觀天尊殿有雙鵲㗸柴及泥補葺隙壞一十五處宰臣上表賀同上酉陽雜俎楂楂鵲鳴聲韓愈雜詩𤣥衣素衿張鷟僉載云貞觀中黎景逸居空青山有鵲巢其庭毎以餘食飼之甚馴熟後景逸出仕被誣下獄一日有鵲於獄屋氣樓中下向景逸喜噪久之亦聞赦將下有一元衣素衿人先報赦來乃悟鵲噪是也鵲巢知歲次貞元四年三月中書省梧桐樹有鵲以泥爲巢知歳次於羽蟲爲有知今以泥露巢遇風雨壞矣五行志丹鵲東飛來喃喃送君札杜牧送孟先軰報喜時人之家聞鵲聲皆爲喜兆曰靈鵲報喜天寶遺事白鵲者霜毛皎潔玉羽鮮明栁文月下鵲李白贈邵圓還聞月下鵲三繞未安枝巢發石之車舊唐書高祖圍堯君素於蒲州粮盡人相食有鳥鵲巢其發石車軍心遂離官軍斬其首送之京師鸜鵒二白左傳曰有鸜鵒來巢書所無也童謡曰鸜之鵒之公出辱之鴝鵒之巢遠哉遥遥鴝鵒株株公在乾侯鴝鴝鵒鵒徃歌来哭鸜鵒不踰濟周禮舞語林謝尚字祖仁酒後爲鸜鵒舞一座傾笑學語幽眀錄荆州有參軍五月五日剪鸜鵒舌教學人語無所不名參軍彈琵琶鸜鵒毎聽移時孔白鸜鵒韓愈感二鳥賦貞元十一年五月戊辰愈東歸癸酉自潼闗出息于河之隂時始去京師有不遇時之歎見行有籠白烏白鸜鵒而西者號於道曰某土之守某官使使者進於天子東西行者皆避路莫敢正目焉因竊自悲乳鵲五行志大厯十三年五月左羽林軍有鴝鵒乳鵲二食蝗五代隠帝乾祐元年七月戊申鸜鵒食蝗禁捕丙辰禁捕鸜鵒不能髙飛杜甫冬狩行有鳥名鸜鵒力不能髙飛蓬蒿下韋應物白鸜鵒歌鸜鵒鸜鵒衆皆蓬蒿下爾自三山来来掌上時拂拭人心鳥意自無猜上可使取火酉陽雜俎鸜鵒舊言可使取火效人言勝鸚鵡取其目睛和人乳研滴眼中能見煙霄外物日夕依仁全羽翼空欲衘環非報徳並同上呼傳鸜鵒令韓愈城南聫句㗸魚袋秘書少監崔行功未得大夫前忽有鸜鵒㗸一物入其室乃魚袋鈎缺不數日加大夫也出國史異集鸎三白出自幽谷遷于喬木詩睍睆黄鳥好貌緜蠻黄鳥載好其音有鸎其羽百囀闗闗擇木候時好鳥鳴髙枝同聲相應黄鸝楚雀孔驚眠韓愈聞鶯詩春風紅樹驚眠處似妬歌童作艶聲賈至秋興亭記當發生之晨則攅秀木於髙砌見鶯其鳴矣出幽而初囀文粹潘炎蕭路尚書林亭宴集序云鶯出幽而初囀金衣公子眀皇毎於禁苑中見黄鶯呼之爲金衣公子開元遺事恰恰啼杜甫詩自在嬌鶯恰恰啼詩腸鼔吹髙隠外書曰戴顒春日携雙柑斗酒人問何之曰往聽黄鸝聲此俗耳砭針詩腸鼔吹汝知之乎花飛出谷鸎李白荆門望蜀江韋蘓州聽鸎曲東方欲曙花𡨕㝠鶯啼相唤亦可聽乍去乍来時近逺纔聞南陌又東城忽似上林翻下苑緜緜蠻蠻如有情欲囀不囀意自嬌羗兒弄笛未應調前聲後聲不相及秦女學筝柱猶澁須㬰風暖朝日暾流音變作百鳥喧誰家嬾婦驚殘夢何處愁人憶故園百勞飛過聲跼促戴勝下時桑田綠不及流鶯日日啼花間能使萬家春意閑有時㫁續聽不了飛去花枝猶裊裊還栖碧樹鏁千門春漏方殘一聲曉上有黄鸝深樹鳴新澗新鸎飛繞上林苑願入簫韶雜鳯笙李白隔葉黄鸝空好音杜甫蜀相嬌辭弄雛鸎韓愈聫句花妥鸎捎蝶杜詩一聲夢㫁楚江曲滿眼故關春草綠栁宗元聞黄鸝曉鸎空迸淚杜甫麥黄韻鸝鶊韓愈城南聫句燕四白𤣥鳥春分至秋乃歸遺卵髙辛氏之世𤣥鳥遺卵有娀氏女簡狄吞之生契後王以爲禖官嘉祥而立其祠焉故𤣥鳥至之日以太牢祠於髙禖㽞瓜呉宫燕呉宫人㽞瓜以記更来衘泥古詩願爲雙飛燕衘泥巢君室立祠見上命官傳曰少皥氏以鳥名官𤣥鳥氏司分也注燕春分来秋分去故命爲司分之官燕燕于飛差池其羽下上其音頡頑頡之頑之巢幕季札謂孫林父曰夫子在此如燕巢幕以喻危也啁啾禮至於燕雀猶有啁啾之頃焉火焚始皇時吳宫守吏以火照燕窟誤燒吳宫石化湘中記雲陵有石燕風雨則飛翔如真燕大厦成而鷰雀相賀淮南子冬藏夏見古詩鷰兮亂羣楚辭風簾入雙鷰涎涎漢成帝時謡曰鷰鷰尾涎涎飛鷰来啄皇孫皇孫死燕啄矢涎涎光浄兒喻趙飛鷰害皇子也食蒺䔧續搜神記沛國有人生三兒不語有一人就門乞食曰君有罪可還内思之愆其人曰昔爲小皃時燕有三子試以指内巢中燕子開口乃以蒺䔧食之吞之即死其母尋廻不見其子徘徊悲啼而去今甚悔之客曰此即是也頷人相班超燕頷飛而食肉萬里侯相也後封爲定逺侯焉知鴻鵠志陳勝曰燕雀云云赤鷰嬌鷰孔更巢共乳崔元暐居父䘮廬有燕更巢共乳集蕭望之冢開成元年燕集蕭望之冢社去社來杜牧歸燕詩畵堂歌舞喧喧地社去社来人不㸔長是江樓使君伴黄昏猶待倚欄干玉燕開元遺事張説母夢玉燕自東飛投入懐中已而有孕生説果爲相燕頷呉元濟養子風塵際来時道路長杜甫陶暄逐風鳦韓愈城南聫句絢練新羽翮時哉髙飛燕絢練新羽翮杜甫詩呈瑞王維賦海燕呈瑞有玉箧之可依紅縷繫足宋李公佐燕女墳記宋末有女姚玉京室有雙燕一爲鷙鳥所獲其一孤不離庭戶秋風起獨啾啾翔集玉京之臂如似告别玉京以紅縷繫足明年紅縷如舊凡六七歳玉京遇疾終明年燕來窺室間訝其無人周回累夕姚氏族泣語墳在南郭可徃燕遂悲鳴至墳所亦死燕語露簾鈎李賀貴壻曲爲歸燕詩以貽林甫張九齡爲歸燕詩以貽林甫其詩曰海燕何㣲𦕈乗春亦暫来豈知泥滓濺只見玉堂開棲戶時雙入華軒日㡬回無心與物競鷹隼莫相猜林甫賢之燕蟄於井底酉陽雜俎㦯言燕蟄於井㡳舊説燕不入室是井虚也取桐爲男女各一投井中燕必来聲嘍嘍韋應物衘泥聲嘍嘍尾涎涎秋去何所歸春来復相見地上衘泥同上豈不解决絶髙飛碧雲裏何爲地上衘泥滓不見百鳥畏人林野宿翻遭羅網俎其肉未若衘泥入華屋燕衘泥百鳥之智莫與齊傳書長安富商任宗妻郭紹蘭能詩宗賈販胡湘久之未歸紹蘭視堂中雙燕祝之曰我聞爾海東来必曽經湘中爲我附書任郎可乎燕即飛下止于膝紹蘭寫詩一絶繫于燕足燕徑去宗在荆州忽有燕遶身而飛止于肩足有小封視之乃妻所書也遺事金窻繡戸玉樓瓊閤不獨栖金窻繡戸長相見李白海燕還秦宫雙飛入簾櫳同上雙雙語前簷同上胡燕别主人雙雙語前簷三飛四回顧欲去復相瞻豈不戀華屋終然謝珠簾帟幕凝風燕杜詩風蒲燕雛老杜牧入汴口檣燕語㽞人同上元烏之爲物也時遊於戶時親於人而不畏人而人撓之宋子嵩化書雀五白黄雀崔豹古今注雀一名嘉賓呈祥周武王時有赤雀衘書爲瑞感孝王祥至孝事後母疾思黄雀肉炙乃有黄雀自入幕巾知鷹鸇之逐鳥雀鷰雀焉知鴻鵠志啁啾見上誰謂雀無角何以穿我屋詩衘環後漢楊寳年六歳見雀瘡被螻蟻摶之寳憐之因置箱中採黄花而食之瘡愈飛去一日化爲黄衣少年持玉環来報寳恩條支國獻大雀季秋雀入大水爲蛤公冶長解雀語得免罪率場啄粟食以數粒栖於一枝螗蜋捕蟬不知黄雀在後黄雀不知彈丸在其後也年漢宣帝屢有神雀之瑞乃改年號爲神雀元年千仞有以随侯珠彈千仞雀以其所舍重而所要輕乳雀黄口吕氏春秋藩籬焚雀禍至集獄祥来耆舊傳魏帝常爲太守獄上有羣雀鳴史占之曰羣雀也我必改官果然孔奪燕巢白居易詩注燕惡艾雀欲奪其巢先衘一艾至其窠輒避去因而有之放生雀唐新語成敬苛與姚崇有親姻崇寢疾敬苛造省懐中置生雀數頭請崇執而後放祝云願令公速愈食張廵士多餓死至羅雀以食凍死五代寇彦卿昭宗既出明年太祖以兵至河中遣彦卿奉表廹請遷都昭宗顧瞻陵廟彷徨不忍去謂其左右爲俚語曰紇干山頭凍死雀何不飛去住處樂相與泣下沾襟黥其頸上爲飛雀東漢劉旻傳周太祖少賤黥其頸上爲飛雀世謂之郭雀兒白雀羅珦擢廬州刺史有白雀巢庭張知謇曰雀巢其庭巢冡樹張九齡母喪白雀巢冢樹知更雀開元遺事裴耀卿勤於政事夜閱案牘書决獄訟常養一雀毎夕自更初有聲至漏盡則急鳴裴呼爲知更雀赤雀則天皇后武氏臨朝御史傅游藝請革命改帝氏爲武又脅羣臣固請妄言赤雀見朝堂却火雀杜陽編順宗即位拘弭國貢却火雀純黒大小似燕其聲清置於火中火自㪚去遂盛於水精籠懸於寢殿夜則宫人持蠟炬燒之終不能損其毛羽酉陽雜俎釋氏書言雀却火因浴沙塵受卵夜宿於柱劉良注文選嗷嗷空城雀嗷嗷空城雀身計何戚促本與鷦鷯羣不随鳯皇族耻渉太行險羞營覆車粟李白常恐烏鳶逐提携四黄口飲乳未甞足食君糠粃餘常恐烏鳶逐黄雀任翩翾杜甫秋日䕫府黄雀飽野粟羣飛動荆榛贈賀蘭銛入懐髙祖斬王威於太原有白雀飛入髙祖之懐唐書雀啄江頭黄栁花曲江啅雀爭枝墜秋日啾啾䆫間雀韓文啾啾窻間雀不知己㣲纎舉頭仰天鳴所願晷刻淹不如彈射死却得親炰燖赤雀上瑞白雀中瑞唐六典禮部注執膠革捕黄雀黄雀從而噪之宋子嵩化書事蟲粒懸彫籠事蟲粒養黄雀黄雀終不樂同上日遊於庭黄雀之爲物也日遊於庭日親於人常畏人而甞撓之異雀數頭舊唐崔信明五月五日日中生有異雀数頭身形甚小五色備集于庭樹鳴聲清亮太史令占之曰五月爲火火爲離離爲文彩日中文之盛也有雀文彩而此兒必文彩聲名播天下雀形既小禄位殆不髙矣及長博聞強記下筆成章而官果不逹鵠六白鵠不浴而白自然也莊子雞不伏卵莊子越雞不伏鵠卵魯雞固能矣不集汙池列子鴻鵠髙飛黄鵠一逺别千里顧徘徊選下雙鵠西都賦逸雲際文慕鴻鵠之髙飛棄燕雀之小志鳴文蕙帳空兮夜鵠鳴仙人去兮獻籠史齊王使淳于髠獻鵠於楚道飛却而掲空籠見楚王曰齊王日使臣獻鵠過水不忍鵠渇臣飲之而飛臣欲自刺恐人議王以令士死臣欲買代之是不信欺王也臣欲亡痛兩主使不通故来伏過楚王善之厚賜以倍鵠價羽翮已就史戚夫人欲以己子爲太子四皓輔太子不得動夫人泣上曰爲我楚舞吾爲君楚歌歌曰鴻鵠髙飛兮一舉千里羽翮已成就兮横絶四海横絶四海兮無奈何雖有矰繳兮安所施歌闋夫人欷歔流涕竟不易太子下太液池漢昭帝太始元年黄鵠下建章宫太液池中公卿上夀賜侯王宗室金錢有差經祠壇漢孝章元和二年廵守于岱宗柴望祀畢黄鵠從南来經祠壇上来此刻後漢馬援書戒子姪曰龍伯髙敦厚願爾曹效之效之不得猶爲謹勑士所謂刻鵠不成尚類鶩客化晉陶侃字士衡丁母憂有一客来弔不哭而去化爲雙鵠冲天思援弓孟奕者一人以爲鴻鵠將至思援弓繳而射之具博奕集蕭池古今注漢惠王五年有黄鵠集蕭池治矰繳戰國䇿莊辛謂楚王曰黄鵠遊於江海不知射者己治矰繳加於己也丹鵠拾遺録塗修國獻丹鵠一雌一雄棲塚列仙傳仙人死𦵏陵陽山下有黄鵠棲其塚邉樹上鳴常呼子安吞短人神異經鶴國男女長七寸畏海鵠鵠遇即吞之大春秋繁露恩及羽蟲則飛鳥大爲鵠出見如鳯皇翔獻說苑魏文侯使蔡澤獻鵠於齊在道失之獻空籠齊侯曰勝得鵠孔黄鵠韓愈南山有髙樹行南山有髙樹花葉一何衰黄鵠㨿其髙衆鳥棲其卑遡清風凌顥氣李華盧氏齋居記曰鴻鵠遡清風凌顥氣翺翔自得於𠖇𠖇之間金衣菊裳李白大鵬賦豈比夫蓬萊之黄鵠誇金衣與菊裳寓鵠髙駢爲寓鵠庭中設機關觸人則飛動駢衣羽服乗之作仙去狀摩蒼天黄鵠摩蒼天杜甫草堂雌鵠啄泥歸雄鵠衘枝来雌鵠啄泥歸巢成不生子大義當乖離韓文别鶴操商陵穆子娶妻不生子仰中雙鵠五代莊宗紀李克用善騎射能仰中雙鵠黄鵠忍長飢兩翅乆不擘韓愈詩黄鵠翅垂雨杜甫秦州詩鵠殻攅瓌橙韓文鸛七白鸛鳴于垤垤蟻塚詩應雨鸛將雨而鳴水鸛巢層甍文喟然感鸛鳥注云仙人浮沉徃来雲集霧散濯翮䟽風鼓翅揮弄洒珠名鸛水鳥也一名負金一名背竈又名旱羣相拂暴沬孔婦歎韓愈詩婦歎鳴鸛趂虵鸛朝野僉載魏光乗任左拾遺題品朝士丞相姚元之長大行急目爲趂虵鸛坐此貶新州新興尉羣飛激雲陳藏噐本草云人探巢取鸛子六十里旱能羣飛激雲雲㪚雨歇其巢中以泥爲池含水滿池中養魚及虵以哺其子碧鸛鵲裴寛韋詵許妻以女幃其族使觀之寛時衣碧瘠而長既入族人皆笑呼爲碧鸛鵲影抱酉陽雜俎言鸛影抱鸛井江淮謂羣鸛旋飛爲鸛井必有風雨人探巢取其子餘見上本草雜俎田鸛同土遊石角詩時聞田鸛鳴號鳴飛翔栁宗元晉問鵾鸛鶖鶬號鳴飛翔戱鳬鸛乎中庭兮同上閔生賦戯鳬鸛乎中庭兮蒹葭生於堂筵鶬八白連雙列蒲子之弋連雙鶬於青雲之際朝發河海暮宿江漢九頭江竒鶬九頭孔聯拳拾穂杜甫鵰賦爾其鶬鴰隝鶂之倫莫益於物空生此身聨拳拾穂長大如人肉多奚有味乃不珍天寒鶬鴰呼杜詩雙鶬弓彎滿月不虚發雙鶬併落連飛􅐴李白行行游且獵篇引臂落鶖鶬射飛魯縦空引臂落鶖鶬杜甫壯遊九頭鳥寳厯中四門助教史㢠常見裴瑜所注爾雅言鶬䴢鴰是九頭鳥也酉陽雜俎長頸赤目呉都賦張銑注鶖如鷺而大長頸赤目其毛辟水毒丹陽鄱陽皆有之東飛駕鵝後鶖鶬安得送我置汝傍杜甫寓居鬼車鳥相傳此鳥昔有十頭能収人䰟氣一首爲犬所噬秦中天隂有時有聲如力車鳴㦯言是水雞過也白澤圖謂之蒼鸆帝鴻書謂之逆鶬夫子子夏所見者其異不可聞之也酉陽雜俎鴇九白鴇羽詩刺時也晋昭公之後大亂五世君子下從征役不得養父母肅肅鴇羽集于苞栩肅肅鴇翼集于苞棘羣飛侣浴戯廣浮深文連軒翔鴇云云拽拽揺揺似鷹無後指文注云孔聨拳拾穂見鶬門急流鴇鷁散杜甫詩獨豹鴇也遇鷙鳥能激糞衘之糞着毛悉脫酉陽雜俎鳶十白鳶飛戾天詩前有塵埃則載鳴鳶禮得腐鼠莊䲭鳶得腐鼠仰嚇鴛雛恐奪之腐鼠鳶起知風舞文嚇寒䲭嚇雛文茅棟嘯愁鳶文蹲䲭之沃蜀都賦白晉中興孝宗永和元年白鳶見二箭下雙鳶後魏托䟦翰從太宗遊自登東北有雙鳶飛鳴於上太宗命左右射之莫能中鳶旋飛稍髙翰因而自射之二箭下雙鳶太宗嘉之賜御弓矢以旌之曰射鳶都尉紙鳶北齊景哲從弟黄頭使于諸國自金鳯䑓各乗紙鳶以黄頭獨能控紫陌乃以殺之孔鳶肩馬周岑文本謂所親曰周鳶肩火色騰上恐不能久果年四十八而卒夜鳴光啓二年正月閿鄉湖城野雉及鳶夜鳴騰音礪吻劉禹錫飛鳶操騰音礪吻相喧呼仰天大嚇疑鵷雛集魚上劉蛻古漁父篇自置魚於葦間仰見鳴鳶集其上乃冠木於噐傍以懼之明日澤西漁者乃刻木澤畔前日置魚者目眂而去三年不敢漁食君糠粃餘常恐烏鳶逐李白䲭梟五代李振昭宗遷洛振一至京師朝廷必有貶降時人目振爲䲭梟旗尾飄揚勢漸髙箭頭石劃聲相似劉禹錫飛鳶操墮鳴屋東惡水溝有䲭墮鳴悲韓愈病䲭嘯羣䲭嘯羣而礪吻栁宗元復志賦鴟鳥鳴黄桑杜甫北征不飲井泉水䲭不飲井及泉水惟雨中潤翮則得水飲南征盡阽鳶杜甫諫懐將亡盧攜爲之䲭梟唐史本賛殷潜爲遂安令到官有梟集於屏潜不爲懼鴨十一白感孝瑞應顔琦事異母沒哀思有野鴨棲其側侣浴文羣飛侣浴戯廣浮深集若霞布㪚如雲霧孔鬭鴨宗室庶人祐養鬭鴨未㡬狸齚鴨四十餘絶其頭去及敗牽連誅死者凢四十餘人射鴨五代莊宗同光二年二月乙酉射鴨于郭泊供鴨百官志鉤盾署掌供鴨浮光多美鴨太原少尹樊千里買百隻置後池出雲林志自呼其名陸龜䝉居雲澤之南有鬭鴨一欄有驛使過挟弹斃其尤者於是龜蒙請而駭之曰此鴨能人語見待附進使者斃之奈何使人恐盡與橐中金龜蒙始焚其章問人語之由曰能自呼其名唼唼張籍春水曲花鴨無泥滓堦前每緩行杜戀地羣鴨廻韓愈人日肥大蕃息韓文羅池碑不教鵝鴨惱比隣杜甫羽毛知獨立黒白太分明同上以亂軍聲見鵝門白鷴二白白鷴失素文選雪賦獻西京雜記閩越獻髙帝白鷴黒鷴各一隻帝大恱厚賜之孔羽族之幽竒蕭頴士白鷴賦序白鷴羽族之幽奇也素質黒章爪觜純丹體備冠距頗類夫雞翟神皃清閒不雜於衆禽栖止遐深栖止遐深與人境罕接固莫得而馴狎也夜棲寒月靜李白白鷴詩清影玉潭裏刷毛琪樹間夜棲寒月静朝歩落花閒彩之𤣥素文不綺班蕭頴士賦雕籠處以雕籠致以驛騎同上白鷴處處聚沙堤李白通塘曲白鷴弄葱濛李華寄趙七侍御家雞所伏聞黄山胡公有雙白鷴盖是家雞所伏自小馴狎了無驚猜以其名呼之皆就掌取食然此鳥耿介尤難畜之余平生酷好竟莫能致而胡公輟贈於我唯求一詩聞之欣然適㑹宿意因援筆三什文不加㸃以贈之李白結罝映深竹妻子張白鷴結罝映深竹秋浦歌同上游必海裔栖必雲間蕭頴士賦杉松可得永日而噪聚蓴荇足以竆年而啄食同上鵁鶄十三白虞機發留鵁鶄呉都賦隨風澹淡與波搖蕩上林賦翠鬛紫纓鬛首毛也孔遣中人捕倪若水𤣥宗遣中人捕鵁鶄溪鵝南方若水上言農方田婦方蚕以此時捕奇禽怪羽爲園籞之玩自江嶺而南逹京師水舟陸齎所伺魚蟲稲粱道路之言不以賤人貴鳥望陛下勅手詔褒荅辟火災酉陽雜俎鵁鶄舊言辟火災巢於髙樹生子穴中㗸其母翅飛下養之又厭火同上似鳬劉良注文選鵁鶄鳥也似鳬頭上揔毛野塘鵁鶄飛樹頭緑蒲紫菱蓋碧流張籍春堤曲至今絓組野人讎自古稻粱髙鳥畏笠澤叢書黒襟青脛丹𤓰躅同上鵁鶄老濕沙同上賀江潭苑鵁鶄鸂䳵滿晴沙杜甫御水鵁鶄滿白蘋李賀酬荅浮跡浮跡侶鷗鶄韓愈詩鷺十四白振鷺于飛于彼西雍雍澤也詩值其鷺羽詩陳宛邱章坎其擊鼔宛邱之下無冬無夏值其鷺羽詩所以刺陳幽王游蕩無度名爾雅一名舂鉏也鵾鷺水鷺白鳥浮沉往来雲集霧㪚篁棲出鼔古今樂録呉王夫差時有雙白鷺飛出鼔中而入雲也鼓精見上孔射石雄始討劉稹水次見白鷺謂衆曰使吾射中其目當成功一發如言鐃鐸集以翔鷺西舍利樂鐃鐸集以翔鷺孤飛如墜霜李白詩簉羽鵷鷺上官儀曰御史供奉赤墀下簉羽鵷鷺野鷺杜甫詩野鷺宿姢姢浮湍戯渚蕭頴士江有楓篇有鳥有鳥粤鷗與鷺浮湍戯渚皓然潔素文粹邈風標之公子杜牧晚晴賦白鷺潜来兮邈風標之公子白鷺轉花影燈記正月十五夜𤣥宗於常春殿張臨光宴白鷺轉花燈宿鷺鈎簾宿鷺起杜甫水閤朝霽飛去入遥碧劉禹錫白鷺兒前山正無雲飛去入遥碧外㓗其色李白夷則格白鷺亦白非純真外㓗其色心匪仁錦石照碧山兩邊白鷺絲李白送族弟錞雪㸃青山雲同上白鷺閑時散飛去又如雪㸃青山雲宿鷺起圓沙杜甫莫須驚白鷺同上鶂十五白六鶂退飛過宋都風也傳相視莊子曰鶂相視眸子不運而化視而生列河澤之鳥視而生曰鶂浮沉往来雲集霧散孔聯拳拾穂見前鴇門倚風遺鶂路杜甫雖鶂退于宋妖不勝於徳也李徳裕張禹論鷖十六白鳬鷖在沙在涇在渚孔鳬鷖韓愈南内朝歸詩云明庭集孔鸞曷取於鳬鷖鳬屬郭知元韻云鷖鳬屬晨鷖李商隠賦晨鷖露雞以喻君子唐張銑注文選思𤣥賦感鸞鷖之特栖兮注鸞鷖皆鳥名以喻君子時獨淑善也水宿半鳬鷖杜甫水宿散亂鳬鷖散亂棹謳發漾陂行鷸十七白鄭子臧好聚鷸冠左傳蚌鷸相持蘓秦曰蚌與鷸相持蚌謂鷸曰今日不出明日不出必是死鷸孔孔鷸李蔚咸通十四年春詔迎佛骨鳯翔乃以金銀爲刹珠玉爲帳孔鷸周飾之寧同蚌頑惡但與鷸相持酉陽雜俎段成式聫句鶖十八白有鶖在梁詩孔集禁苑五行志開成五年六月有禿鶖羣飛集禁苑鶖水鳥也水鳥見上巢寢殿隅昭宗時有禿鶖巢寢殿隅帝親射殺之同上洪濤滔天風抜木杜甫行洪濤淊天風拔木前飛禿鶖後鴻鵠鶖入鳯池朝野僉載魯孔􅏀爲拾遺有武力人目爲鶖入鳯池鴛鴦十九白鴛鴦于飛畢之羅之詩戢其左翼休息止則相耦飛則相雙綺文文客從逺方来遺我一端綺文綵雙鴛鴦裁爲合歡被無匹儔哀鳴無匹儔我願執此鳥惜哉無輕舟文清湍激長流中有雙鴛鴦名文注一名匹鳥雍雍楚辭鴛鴦兮雍雍煥乎其有文章䲭嚇莊子䲭得腐鼠而嚇鴛雛孔風鴛杜甫詩風鴛藏近渚舉翼相蔽虧陳子昻飛飛鴛鴦鳥舉翼相蔽虧文章負竒色同上雄巢漢宫樹雌弄秦草芳錦水東北流波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳寧同萬死碎綺翼不忍雲間雙分張李白白頭吟緑浦上長干行鴛鴦緑浦上願爲天池雙鴛鴦一朝飛去青雲上白紵辭交頸紫山岑陳子昻鴛鴦篇刷羽清江浦交頸紫山岑合婚尚知時鴛鴦不獨宿杜甫佳人綠潭同上具来緑潭裏共向白雲涯綵鴛紫菱如錦綵鴛翔劉禹錫採菱行古人圖之於繡衣上於服以其貞且義也唐楊日華膳夫録爲羽族即不棲樹林類水鳥而不在江滸同上度陌臨流不自持李義山能使狐衛其子尤異者養雛於土窟破冢之間能使狐衛其子江檻俯鴛鴦杜甫文鴛亦西飛韋蘓州翡翠二十白輝翠瑞應援神契神靈滋液百珍用則云云翡翠脅而来萃長門賦㦯拾翠羽洛神賦列巢文翡翠列巢以重行儉吳後宫却翡翠之飾生遐裔孔翠生乎遐裔見文選白山海經孟山多白翡翠孔江上小堂巢翡翠杜甫詩翠