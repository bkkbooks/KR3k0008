body:
  text: 白孔六帖卷五十四唐白居易原本宋孔傳續撰水戰一致師二持重三陣四戰傷五軍門幕府六召募七願從征伐八背軍九乞師十救援十一將交惡十二軍詐十三軍矯命十四專命十五專殺十六水戰一白争舟楫之利我得上流何故不克楚司馬子魚曰燒浮橋後漢公孫述遣任蒲田戎據荆州横江作浮橋闘樓上攅柱絶水道岑彭募人攻浮橋曽竒應募鼔舡逆流而上直衝浮橋而攅柱鈎舩不得進竒乘勢因飛炬焚之橋樓崩燒舩順風並進蜀兵大敗周瑜赤壁戰燒曹公舟船具火攻門注大司馬不習水戰荆門之事取決於征南後漢光武詔征南將軍岑彭司馬吳漢樓船蒙衝孫權討黄祖祖横兩蒙衝夾守沔口以栟櫚大枻繫石為矴上有千人以弩交射軍不得前董襲乘大舸突入蒙衝襲身以刀斷兩紲蒙衝乃横流大兵遂進追而斬之孫權舉觴屬襲曰今日之㑹斷紲之功穿昆明池習水戰漢武將攻昆明夷以運船為戰晉陶侃士行為江夏太守禦賊陳敏敏時冦揚州引兵西上侃乃以運舡為戰艦或言不可侃曰用官舩討官賊但須聞上爾以舟師伐楚傳晉王濬拜益州修艦作大舩連舫方一百二十歩受二千人木為城起樓櫓四門其上皆得馳馬往来又畫鷁首怪獸於舩首以懼江神舟楫之盛自古未有造舩舟於蜀秭蔽江而下吳以鉄鎻横截之又作鉄錐丈餘闇置江中羊祜獲諜知情濬乃作筏數十縛草為人令先行錐輙著筏去又作炬長十餘圍灌以麻油在舩前過鎻燃炬燒之須㬰融液斷絶舩行無礙也水戰則章邯已亡其城髙祖圍章邯以水灌之舟戰於江國語云越伐吳樓船將軍楊僕孔乘潮而上舳艫衘尾蘇烈為神立道大緫管率師討百濟自城山濟海至熊耳口賊瀕江屯兵定方出左涯乘山而陣與之戰賊敗死者數千王師乘潮而上舳艫衘尾進鼓而譟定方將歩騎夾引直趨真都城賊傾國来酣戰破之縱戰艦於江中河間元王孝恭蕭銑據江陵俄進荆湖道摠管統水陸十二軍發夷陵破銑二鎮縱戰艦於江中諸將曰得舟當濟吾用棄之反資賊奈何孝㳟曰銑之境南際嶺左薄洞庭地險士衆若城未拔而援至我且有内外憂舟雖多何所用之今銑瀕江鎮戍見艦舫蔽江下必謂銑已敗不即進兵覘候往返以引救湖則吾既拔江陵矣已而救兵到巴陵見舩疑不進銑内外阻絶遂降渒水楊行宻葛從周渉淮圍壽州行宻出車西門由北門去以鋭士萬二千齕雪馳迫清口不進壅淮上流灌師古軍張訓自連水来行宻使將羸兵一千人為前鋒師古易之方圍碁軍中不顧朱瓉以百騎持汴旌幟直入師古壘舞槊而馳訓亦登㟁超其柵汴軍大囂即斬師古士死十八全忠聞之與從周皆遁走追及壽陽大破之叩渒水方渉為瑾所乘溺死萬餘乗輕船田頵攻趙鍠於宣州鍠出東漢乘暴流以逸阻水解甲謂追騎不能及頵乘輕船追之鍠驚遂見禽反舟順流始頵將王壇等以舟師躡神福後至吉陽磯不戰㑹日暮壇掩神福軍半濟神福反舟順流急擊大破之擇善游者㳂汴渠夜入栢良器李希烈圍寧陵遏水灌之親令軍中明日拔城良器以救兵至擇弩手善游者㳂汴渠夜入及旦伏弩發賊乘城者皆死造齊雲船數百艘南唐李景初周師南征無水戰之具已而屢敗景兵獲水戰卒乃造戰艦數百艘使降卒敎之水戰命王環將以下淮景之水軍多敗長淮之舟皆為周師所得又造齊雲舡數百艘世宗至楚州北神堰齊雲舟大不能過乃開老鵲河以通之遂至大江竹笮維戰艦于河事見火攻門載灰豆江砂五年春三月命王率水師大小戰艦凡五百餘艘皆龍形自東州来趨淮甸夏四月乙巳大戰淮人于狼山江將戰之日召指揮使張元實計之曰彼若徑當避其初仍令軍中宿理㠶檣載石灰黒豆江砂以隨焉翌日昧爽淮舩果乘風自西北而下危檣巨艦勢若雲合我師皆避之而賊舟既髙且巨不能復上我師反乘風以逐之復用小舟圍其上右賊迴舟而闘因颺石灰賊不視乃撤豆于賊我則砂焉戰血既漬踐豆者靡不顛蹉因縱火油焚之吳越備史致師二白環人掌致師致師者致其必死之志古者將戰先使勇力之士犯敵環四方之故郤其以事謀来侵伐者所謂折衝禦侮訟敵國敵國兵来則往之與訟曲直若齊國佐如師並周禮楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰致師者右入壘折馘執俘而還傳席於軍門之外晉趙旃掉戰夜至楚軍席於軍門之外使其徒入之示無畏踞轉而鼓琴轉衣囊也張骼輔躒致楚師甞寇而速去之甞試也蹈師掉戰魏氏春秋曰諸葛亮屯渭南糧少欲速戰魏勑司馬宣王堅壁挫其鋒亮慮遣書又致巾幗以怒宣王宣王將戰辛毗仗節奉詔勑乃止巾幗婦人喪巾遺之巾幗言其無勇以悼之幗音馘孔唐太宗圍王世充於東都竇建德自河朔率兵來救太宗自率騎趣武牢建德自滎陽西上策壘于板渚太宗以五百騎出武牢將挑戰先伏李勣程齩金秦叔寶令尉遲敬德執矟造建德壘大呼致師賊衆大驚撓出兵數千騎太宗逡巡漸却遂引賊以入伏内李勣奮擊大破之獲其大將殷秋石瓉斬首數百級通典引退設伏取之大呼致師尉遲敬德竇建德營板渚王命李勣等為伏親挾弓令敬德執矟畧其壘大呼致師建德兵出乃稍引却殺數十人衆益進伏發大破之致人者且令其自来賛皇一品集牛僧孺等兵法云用兵者致人之師不可自致所謂致人者且令其自来况虜騎倐忽往来疾如風雷不可將兵逺襲今可以計攻者縁其有家口輜重不離漢境三二百里来去未得既有定所便可為謀魏武破烏桓李靖擒頡利皆用此計糧少戰利速馬燧田悦敗走魏州李抱真問曰糧少而深入何也燧曰糧少戰利速兵善於致人今悦與淄青常三軍為首尾欲不戰而老我師若分擊左右未必破悦且来助是腹心支敵也法有攻其必救故趨魏以破之皆曰善公孫上哲戰鹽城覆其軍杜伏威傳持重三白堅卧不起漢周亞夫擊吳楚吳楚饑數挑戰終不出夜軍中驚内相攻擊至帳下亞夫堅卧不起頃之復定梁王使韓安國扞吳楚安國持重吳不得過李廣下馬解鞌李廣望匈奴千騎上山陣廣騎皆恐唯廣曰皆下馬解鞌示不去匈奴必以我為大軍誘之遂縱馬卧胡引兵去吳漢後漢吳漢軍事激怒人倍其勇賊率五千人攻漢營軍中驚亂漢堅卧不動有頃自定突擊大破之漢字子顔射酒樽王霸為後漢將賊挑戰霸不出享士倍樂賊射城中中霸前酒樽安坐不動帷中講論張奐為匈奴中郎將烏桓叛燒度遼將軍門煙火相望奐坐帳中與弟講論若無事稍安隂使斬渠帥諸胡悉降蘇秦曰任大功不輕敵據胡牀指麾晉謝艾討麻秋軺車冠幘秋怒少年冠服如此輕我也命馳擊之艾左右大擾勸艾乗馬艾乃下車據胡牀指麾賊以為有伏兵不敢進也射雉賊杜曽勇冠三軍周訪惡之自於後射雉以安衆心也骨鯁諸葛亮數挑戰宣王欲與戰帝欲令持重乃令骨鯁臣衛尉辛毗仗節制之乃止孔坐城門指縱部分意氣閑舒吕元膺拜東都留守始都有李師道留邸邸兵與山棚謀竊發事覺元膺擒破之始盗發都人震恐守兵弱不足持元膺坐城門指縱部分意氣閑舒人賴以安子儀堅壁子儀賊㓂邠州先驅至奉天諸將請擊之子儀曰客深入利速戰彼下素德我吾緩之當自攜貳因下令敢言戰者斬堅璧待之賊果遁將務持重李晟每與賊戰必錦裘繡帽自表指顧陣前李懷光望見惡之戒曰將務持重豈宜自表暴為賊餌哉晟曰昔在涇原士頗相畏伏欲令見之奪其心耳懷光不悦持重安邊不生事王忠嗣本負勇敢及為將乃能持重安邊不生事嘗曰平世為將撫衆而已吾不欲竭中國力以幸功名疲人版築不如按甲持重哥舒曜討李希烈希烈退保許州詔城襄城曜以疲人版築不如按甲持重以挫之帝不許據城李光弼救常山次真定常山團結子弟執賊將安思義降時賊將史思明李立節蔡希德攻饒陽光弼得思義不殺問其計答曰今軍行疲勞逢敵不可支不如按軍入守料勝而出賊兵焱鋭弗能持重圖之萬全光弼曰善據城待舉動安重來瑱賊圍南陽急瑱與魏仲犀合兵救之不勝人情恼懼瑱能撫訓士舉動安重賊不得侵馭軍持重魏元忠為隴右諸軍大使以討吐蕃又為靈武道行軍大揔管禦突厥元忠馭軍持重雖無赫然功而亦未甞敗士死麻葦房琯請自平賊詔琯持節招討李光進將比軍琯將中軍先鋒中軍北軍遇賊陳濤斜戰不利琯欲持重有所伺中人邢延恩促戰故敗士死麻葦常務持重以挫人之鋒周德威老將常務持重以挫人之鋒故其用兵常伺敵之隙以取勝五代史請持重以敝之哥舒翰奏言禄山雖據河朔不得人心請持重以敝之待其離隙可不血刃而擒賊將崔乾祐守陜郡仆旗鼓羸師以誘戰覘者曰賊無備可圖也帝信之詔翰進討翰執曰禄山習用兵今始為逆不能無備是隂計誘我賊逺来利在速戰王師堅守無輕出闗計之上也國忠計迫謬説帝趣翰出潼闗宜持重以養威五代梁臣敬翔太祖已破趙匡凝取荆襄遂攻淮南翔切諫以謂新勝之兵宜持重以養威太祖不聽兵出光州遭大雨幾不得進進攻壽州不克而多所亡失太祖始大悔恨按軍不動符存審晉軍屯朝邑諸將皆欲速戰存審曰不若緩師示弱伺隙出竒可以取勝乃按軍不動居旬日望氣者言有黒氣狀如闘雞存審曰可以一戰矣乃進軍擊鄩大敗之存審為將有機畧大小百餘戰未甞敗衂與德威齊名陣四白楚以甲午晦晨厭晉軍而陣郤至云陣不違晦晦隂盡日兵家所忌魚麗鄭御王師為魚麗之陣先偏後伍伍承彌縫注二十五人為偏以居前伍人為伍次之伍承偏之陣而彌縫補闕也此盖魚麗陣法晉敗羣狄于太原將戰魏舒曰彼徒我車所遇又阨阨險也不使車以什供車必克更増十人當一車之用而舍車請更卒去車乃毁車以為行歩陣五乗為三伍兵車車三人今以五乗之人合十五人更以五人為伍為三伍為五陣以相離兩於前伍於後專為左角參為右角偏為前拒皆臨時處置之名狄人笑之大敗之笑其失常皆陣曰戰范匄曰塞井夷竈陣於軍中而䟽行首䟽陣晉侯使斥山澤之險雖所不至必斾而䟽陣之示衆也平隂之役也楚武王荆尸授師孑焉以伐隨孑㦸也尸陳也楚始於此參用㦸竒陣李牧為竒陣張左右翼也史死地謂背水陣也兵灋曰右背山陵前左水澤易左次行次師之法欲右背髙故兵法也右牝左牡國語范蠡曰凡陣之道設右為牝左為牡又曰凡陣早晏無失必順天時魏田預討烏桓虜伏騎擊之預因地形迴軍結固陣複陣圓陣陣圖晉書諸葛亮造八陣圖於平沙上壘石八行行相去二丈桓温見之曰此常山蛇勢文帝莫能識也營衛魏祖於官渡使運糧賊數絶之乃使十乗為一道十道方行以營衛之也鵝鸛鄭翩願為鸛其御願為鵝皆陣名越鴈吳越春秋陣名鶴烈莊子徐無鬼曰鶴烈麗譙之間左角右牝並見上注衛為支離之卒陣名立成耿秉行止不正不結營部逺斥候有警軍陣立成也無行陣衛靈公問陣於孔子孔子對曰軍旅之事未之學也軍陣行列之法也孔善布陣郝廷玉吐蕃犯京畿與馬璘屯中渭橋它日魚朝恩聞其善布陣請觀之廷玉申號令鳴鼓角部伍坐作進退若一朝恩嘆曰吾處兵間久今始識訓練法廷玉惻然曰此臨淮王遺法也王善御軍賞當功罰適過每校旗不如令者輙斬由是人皆自効而赴蹈馳突心破膽裂自臨淮殁無復校旗事此安足賞哉未陣即犇康承嗣寵勛軍皆市人囂而强未陣即犇相蹈藉死者四萬勛釋甲服垢襦脫收夷痕士三千以歸分㦸為陣常山愍王承乾好突厥言及所服選貌類胡者被以羊裘辮髮五人建一落張氊舍造五狼頭纛分㦸為陣繫幡旗設穹廬自居自板渚出為陣竇建德自板渚出為陣秦王麾軍先登騎怒塵大漲乃率史大奈秦叔寶纏麾幟馳出賊陣後建德軍顧而驚遂大潰兵家三陣貟半千髙宗御武成殿問兵家有三陣何謂邪衆未對半干進曰臣聞古者星宿孤虚天陣也山川向背地陣也偏伍彌縫人陣也臣謂不然夫師以義出沛若時雨得天之時為天陣足食約費且耕且戰得地之宜為地陣舉三軍士如子弟從父兄得人之和為人陣捨是則何以戰帝曰善陣纔列執長矛馳入羅士信隋大業時長白山賊王薄左才相孟讓攻齊郡通守張須陀率兵擊賊士信以執衣年十四短而悍請自效擊賊濰水上陣纔列執長矛馳入賊營刺殺數人取一級擲之承以矛戴而行賊皆眙懼無敢抗須陀乘之大破賊為兩方陣夾之劉鄩以兵萬人攻魏城東莊宗自貝州返趨擊之鄩忽見晉軍驚曰晉王在此邪兵稍却追至故元城莊宗與符存審為兩方陣夾之鄩為圓陣以禦晉人兵再合鄩大敗八陣圖嘉話録䕫州西市府臨江岸有諸葛亮八陣圖箕張翼舒鵝形鶴勢聚石分布宛然若有岐水之態三蜀消傾湧滉大樹十圍枯槎百丈破磑巨石墮波塞川而下及水落川平萬物皆失故態惟陣圖小石之漂聚行列依然如是今不動圖陣法上内史煬帝遣使圖須陀士信陣法上内史提刀略陣王忠嗣請精鋭數百襲虜㑹賛普大酋閱武鬱標川其下欲還忠嗣提刀略陣斬數千人獲牛馬萬計問賊陣李光弼賊帥周摯取兵復振與安太清合衆三萬攻北城光弼歛軍入登陴望曰彼軍雖銳然方陣而囂不足虞也日中當破乃出戰及期未决召諸將曰彼彊而可破者亂也今以亂擊亂宜無功因問賊陣何所最堅曰西北隅召郝廷玉曰為我以麾下破之曰廷玉所將歩卒請騎五百與之復問其次曰東南隅召諭惟貞辭曰蕃將也不知歩戰請鐵騎三百與之二百乃出賜馬四十分給廷玉等請陣諸原僕固懷恩􅎱光弼功餘見占候門三十二祥雲列曉陣殺氣赫長虹李白登廣武戰塲周成之熊羆獨孤及八陣圖記魏之鶴列鄭之魚麗周成之熊羆昆陽之虎豹出匪以律我異於是陣解星芒盡李白塞下曲陣解星芒盡營空海霧銷將帥簡軍士除地為場北上中間二百歩立五表表間五十歩為二軍進止之節遂聲鼓有司舉旗士衆皆起行及表擊鉦乃止又擊三鼓有司偃旗士衆皆跪又擊鼓有司舉旗士衆皆起驟及表乃止東軍一鼓舉青旗為直陣西軍亦鼓舉白旗為方陣以應次西軍鼔舉赤旗為鋭陣東軍亦鼓舉黒旗為曲陣以應次東軍鼓舉黄旗為圓陣西軍亦鼓舉青旗為直陣以應次西軍鼓舉白旗為方陣東軍亦鼓舉赤旗為鋭陣以應次東軍鼓舉黒旗為曲陣西軍亦鼓舉黄旗為圓陣以應凡陣先舉者為客後舉者為主每變陣二軍各選刀楯五十人挑戰第一第二挑戰迭為勇怯之狀第三挑戰為敵均之勢第四第五挑戰為勝負之形每將變陣先鼔而直陣然後變從餘陣之法既已兩軍俱為直陣又擊三鼓有司偃旗士衆皆跪又聲鼓舉旗士衆皆起騎馳徒走左右軍俱至中表相擬擊而還每日至一行表跪進如前遂復其初唐志雲鳥陣杜甫謾説揔戎雲鳥陣風前略横陣紫髯分兩旁杜牧獨酌四十六訣裴行儉為營陣部伍勝負别器能等四十六訣戰傷五白矢貫予肘及手予折以御左輪朱殷張侯無絶筋無折骨無靣傷刮骨蜀闗侯中箭刮臂骨血流離盈盤器佩刀截矢後漢耿弇擊張歩飛矢中股以佩刀截之左右無知者被創夷傷察夷傷夷亦傷李陵居延北與單于戰令軍中傷三創者載兩創者將居一創者持兵而已不任干戈李陵書曰死傷積野餘不滿百而皆扶病不任干戈然陵振臂一呼創痛皆起孔中流矢酣鬬不解史憲忠田洪正討齊蔡嘗為先鋒閱三十戰中流矢酣闘不解由是著名飛矢著身如蝟深陽壯王道𤣥討王世充每赴敵飛矢著身如蝟氣益厲中流矢忍不言突擊自如段志𤣥從劉文静拒屈突通于潼闗文静為桑顯和所襲軍且潰志𤣥率壯騎馳賊殺十餘人中流矢忍不言突擊自如對熱海苦戰狀王方翼引見奉天宫賜食帝前帝見衣有汗濯處問其故具對熱海苦戰狀視其創帝咨嗟久之剟膚敗靣剟膚浹瘡痍敗靣碎剠頡韓愈征蜀聯句每度出兵傷夷不少賛皇一品集賜王宰詔意感勵士心同上其傷夷校重妨使役者亦任擇人充替其傷夷者仍不停糧非惟感勵士心必冀漸完兵力言念忠誠豈忘收奬張曲江集鋒鏑之下各致捐傷言念忠誠豈忘收奬勑張守信書擇將非良傷人已甚同上近者率爾無謀輕敵馳突不顧遂損師徒擇將非良傷人已甚慰邊將傷痍詔封敖武宗使作詔書慰邊將傷痍詔曰傷居爾體痛在朕躬帝善其如意重傷殘廢之卒陸贄諫大難始平而百役疲瘵之甿重傷殘廢之卒皆忍死扶疾想聞德音百戰傷痍被邊長鎮之兵皆百戰傷痍同上歩鬬傷靣身被數瘡五代梁臣葛從周從太祖攻蔡州太祖墮馬從周扶太祖復騎與敵歩闘傷靣身被數瘡體被十餘箭張歸厚鄆兵大至歸厚度不能支以數十騎衛太祖先還歸厚馬中矢僵乃持槊歩闘太祖還軍中遣張筠馳騎第取之以為必死矣歸厚體被十餘箭得筠馬乃歸太祖見之泣曰爾在喪軍何足計乎使舁歸宣武遷右神武統軍同上梁臣傳軍士負之而還王重師取濮州重師身被八九瘡軍士負之而還太祖聞之驚曰奈何使我得濮州而失重師乎使醫理之逾月乃愈金創被體戰必克㨗徐懷玉從太祖東攻兖鄆破徐宿懷玉金創被體戰必克㨗為梁名將戰罷閱創在背者殺之杜伏威每戰輙先登戰罷閲創在背者殺之血衊靣不已王難得方戰麾下士失馬難得馳救矢著目披膚鄣目乃拔箭斷膚殊死前闘血衊靣不已帝嘉之在陣傷足江夏郡王道宗在陣傷足帝親加砭治賜御膳中創墮馬契苾何力貞觀九年與李大亮薛萬徹萬均討谷渾于赤水川萬均率騎先進為賊所包兄弟皆中創墮馬歩鬪士死十七八何力馳壯騎冐圍奮擊賊披劘去殺傷太甚隱太子建成劉黒闥敗洛水建成問徴曰山東其定乎對曰黒闥雖敢殺傷太甚其魁黨皆縣名處死妻子係囚欲降無繇臨終戒其子曰吾少提一劒去鄉里四十年間取將相然履鋒冐刃出死入生而得至此也因出其平生身所中矢鏃百餘而示之曰爾其勉哉五代符存審張廷藴常從莊宗征伐先登力戰金瘡滿體莊宗壯之以為帳前黄甲二十指揮歩軍都虞候魏博三城巡檢使同上軍門幕府六白轅門以車轅為門牙門建牙也胥甲趙穿當軍門而呼曰薄人於險非勇也傳竇憲征匈奴以班孟堅傅武仲置幕與論文章傳毅字武仲運籌帷幄入幕之賔晉謝安王坦之詣桓温令郤超坐帷帳中風動帳口開安笑曰郤生可謂入幕之賔孔參帷幄機秘杜如晦秦王表留幕府從征伐常參帷幄機秘上謁轅門任瓌髙祖討捕於汾晉瓌上謁轅門承制署河東縣户曹氣凌山河援桴軍門氣凌山河韓雲卿平淮碑二龍烏承泚與兄承恩皆為平盧先鋒沈勇而決戰轅門號二龍闢於大荒孫逖伯樂川記闢轅門於大荒轅門照白袍杜甫喜聞官軍臨賊詩風動將軍幕同上西山詩召募七白漢宣時西羌反募佽飛射士魯竒應募冝受上賞漢岑彭燒橋事見上注耶揄王郎反世祖令王霸於市募人霸至市人皆舉手耶揄笑之霸慙而反募敢死之士乞於鄱陽召募吳志周祗乞於鄱陽召募事下陸遜曰此郡人易動難安祗固陳可取之民吳遽等果殺祗遜討破豬突豨勇王莽時匈奴為㓂甚莽大募天下囚徒人奴名曰豬突豨勇也晉馬隆字孝興涼州有虜隆請募士三千無問所從来鼓行擊之公卿僉曰六軍既衆州郡兵多俱當用之不宜横設賞募帝不許隆孔戴紅抹額應詔婁師德後募猛士討吐蕃乃自奮戴紅抹額来應詔髙宗假朝散大夫使從軍彍騎張説時衛兵貧弱畨休者亡命略盡説建請一切募勇彊士優其科條簡色役不旬日得勝兵十三萬分補諸衛以彊京師後所謂彍騎也山河子弟呂元膺拜東都留守東畿西南通鄧虢川谷曠深多麋鹿人業射獵而不事農遷徙無常皆趫悍善闘號曰山棚權德輿居守將覊縻之未克至是元膺募為山河子弟使衛宫城詔可募羣盜貸死曹華進棣州刺史州與鄆比時賊略定商河華遽逐賊斬二千級復其縣又募羣盜可用者貸死補屯卒使據孔道賊至輙擊郤之不敢北募者内應闗播李希烈叛帝以汝州據賊衝刺史疲軟不勝任播盛稱李元平帝召見拜左補闕不數日檢校吏部郎中兼汝州别駕知州事元平既至希烈隂使亡命應募凡内數百人元平不寤賊遣將李克誠以精騎薄城募者内應縛元平馳見希烈益募兵號後樓都周寳以京師䧟賊將赴難益募兵號後樓都募萬死一生者南霽雲張巡始被圍築臺募萬死一生者數日無敢應俄有喑嗚而來者乃霽雲也廵對泣下得衆二十萬劉仁恭天祐三年朱全忠自將攻滄州壁長蘆仁恭悉發男子十五以上為兵涅其靣曰定霸都士人則涅于臂曰一心事主盧龍塞閭里為空得衆二十萬出金帛募兵康承訓傳龐勛出金帛募兵游民多從之募卒二萬為左右鏌邪軍髙駢以軍事屬吕用之募卒二萬為左右鏌邪軍又與守一分緫置官屬如駢府夜飛將劉從諫妻弟裴問守邢州有募兵五百號夜飛將多豪姓本傳徴兵滿萬不如召募數千韓文若召募土人必得豪勇與賊相熟知其氣力所極無望風之驚愛䕶鄉里勇於自戰徴兵滿萬不如召募數千募勇士為宸衛都閩王昶弟繼嚴判六軍諸衛事昶疑而罷之代以季弟繼鏞而募勇士為宸衛都以自衛其賜予給賞獨厚於他軍五代史募牧兒三千人哥舒翰安禄山反楊國忠大駭入見帝曰兵法安不忘危大兵在潼闗而無後殿萬有一不利京師危矣即募牧兒三千人日夜訓練以劒南列將分統之又募萬人屯霸上使腹心杜乾運為帥翰疑圖已表請乾運兵𨽻節下因詭召乾運計事者至軍即斬首梟牙門并其軍本傳募兵得六萬人封常清安禄山反募兵得六萬人然皆市井庸保乃部分旗幟斷河陽橋以守賊募勇士於市狄仁傑曰北匈奴犯邊陛下使梁王三思募勇士於市踰月不及千人廬陵王代之不浹日輒五萬募重而約嚴蘇頲諫若夫擇良將募重而約嚴違律必誅殺敵必賞所募皆儜劣寒憊劉仁軌破百濟平壤有功者皆不甄叙州縣募不願行身壯家富者以財參逐率得避免所募皆儜劣寒憊無鬪志仁軌具論其弊人賈其勇韓琬上言往者召募人賈其勇今差勒闔宗逃亡願從征伐八白從軍行徇國難奮身卜式上書聞南越反願父子與齊習戰舩往死之下詔曰齊相卜式願奮身國難賜爵闗内侯願奮擊匈奴以贖罪竇憲年少從軍吳吕蒙年十五六竊隨姊夫鄧當擊賊當顧見呵叱不能禁止歸白母母怒欲罰之蒙曰貧賤難可居設有功當富貴可致不探虎穴安得虎子也又張昭弟子奮年未二十造作攻城火攻車歩隲薦之昭不願曰汝年尚少對曰童汪死難子竒治阿奮不才年不為少也領兵連有功孔鼓三軍而進之韓愈與栁公綽中丞書閣下去文就武鼓三軍而進之陳師鞠旅親與為辛苦豈常習於威暴之事而樂其戰鬪之危也挾策從安西節度府馬璘年二十讀漢馬援傳至丈夫當死邊野以馬革裹尸而歸慨然曰使吾祖勲業墜于地乎開元末挾策從安西節度府更學兵書戰策馬燧與諸兄學士策嘆曰方天下有事丈夫當以功濟四海詎老一儒哉更學兵書戰策背軍九白考竟其妻魏髙柔宇文惠為丞相理曹掾宋全逃亡舊法軍征士亡考竟其妻太祖更重其刑全有母及二弟主者奏殺之柔曰士卒亡誠可疾然聞有悔者宜貸其妻子一使賊中不信一使誘其還心太祖善之竇禮近出不還營以為亡沒其妻子見察獄門盧毓見議刑門殺逃士吳志孫策伯策初從袁術䇿騎士有罪逃入術營隱於内廐策使人斬之訖詣術曰兵人好叛當共疾何為謝耶孔以兵自拔李懷光隂通朱泚反迹寢露駱元光以華州之衆守潼闗尚可孤以神策兵保七盤皆受李晟節度懷光懼下益攜落畏為晟襲乃奔河中其將孟渉段威勇以兵數千自拔歸晟皆表以要官身卒奔亡李翰三臣論樂毅一為燕將纔勝齊師剉衂於二城之間狼狽於兩國之際軍不振旅身卒奔亡蔡士多亡去朱全忠殺賢洪懼驅民趨申州遂奔行宻麾鼓亘百餘里武昌杜洪邀之弗及蔡士多亡去趙德諲傳赦亡命背軍梁本紀開平元年十一月壬寅赦亡命背軍髠黥刑徒乞師十白楚子囊乞旅于秦傳重辭榖梁曰公子遂如楚乞師重辭也師出不必反戰不必勝也哭秦庭左傳吳入楚楚申包胥詣秦乞師立依庭墻而哭日夜不絶音水漿不入口七日而得兵漢陳餘從田横籍兵籍借也告急晉伐鄭鄭子駟如秦乞師曰大國在敝邑之宇下是以告急同恤社稷之難犯圍求救犯師而出宋圍華氏華登如楚乞師華貙以車十五乘犯師而出送之一宿之行史趙魏攻韓韓使陳筮如秦乞師曰事急矣公雖病為一宿之行見穰侯穰侯曰急乎筮曰未急穰侯怒曰冠盖相望告敝邑言未急何筮曰急將變孔清河太守乞師顔真卿為平原太守安禄山反清河太守使郡人李蕚来乞師蕚曰聞公首奮𥚑唱大順河朔恃公為金城清河西鄰也有江淮租布備北軍號天下北庫計其積足以三平原之有士卒可以一平原之衆公因而撫有以為腹心他城運之如臂使指耳真卿為出兵二千請乞兵淮南辛讜龎勛反攻杜惂於泗州圍三月救兵外敗城益危讜復請乞兵淮南與壯士徐珍千人夜斬賊柵出見節度使令狐綯復詣浙西見審權平巢王重榮巢復振憂之與楊復光計復光曰我世與李克用共憂患其人忠不顧難死義如己若乞師焉事蔑不濟乃遣使者約連和克用使陳景斯緫兵自嵐石赴河中親帥師從之遂平巢往救必俱亡王珂朱全忠謂張存敬曰珂恃太原侮慢我爾持一繩縳之存敬以兵數萬渡河進攻珂全忠率師繼進即劾珂交結克用為方鎮生事不可赦珂乞師太原為何絪所迮不能進珂急使妻遺克用書曰賊攻我朝夕見俘乞食大梁矣克用荅曰道且斷往救必俱亡不如歸朝廷同上傳乞師李克用劉仁恭敗退壁瓦橋卑辭歸窮於克用求救全忠環滄築而溝之内外援絶人相食仁恭復從克用乞師使百輩往乃許本傳遣使乞兵契丹漢劉旻為折德扆所敗周太祖崩旻聞之喜遣使乞兵契丹契丹遣楊衮將鐵馬萬騎及奚諸部兵五六萬人號稱十萬以助旻諸將疑鎔詐梁遣王景仁攻趙趙王王鎔来乞師諸將疑鎔詐未可出兵王不聽乃救趙敗梁軍救援十一白掎角戎子駒支曰晋禦其上戎亢其下譬如捕鹿晉人犄之諸戎角之諸侯相滅亡齊不相救則桓公恥之榖梁匡救其災大國之於小國周禮宗伯以禬禮哀圍敗同盟者㑹財以救若宋災也矯命救人史魏信陵君無忌矯命令如姬竊軍符於魏王卧内矯發晉鄙軍以救趙奉漏罋沃焦釡秦攻趙趙無食請粟於齊不與周子曰趙齊楚之扞敵邑救趙之急若奉漏罋沃焦釡也患力不能救德不能覆漢閩越圍東甌田蚡以不足煩中國嚴助曰患力不能救德不能覆蠻夷告急天子不救欲令安歸上曰太尉不足與計輔車相依示不相援後漢馬武王霸攻周建武敗奔霸堅壁示不相援賊乘時輕進襲背破之劉備求救於吕布布至謂諸軍曰𤣥德布弟也故相救布好解闘今植㦸營門射小支中則諸軍皆罷一發中之諸軍皆伏遂罷兵此亦宜僚弄丸之類夜不相救世祖擊赤眉耿純伯山營在前去衆營數里賊夜攻純純選敢死士出戰後敗之世祖明旦與諸將至營勞純曰昨夜困乎大軍不可夜動故不相救也違詔不相救吳楚反攻梁梁急曰使使請救於周亞夫亞夫堅壁不出梁請於帝帝詔亞夫救梁亞夫不奉詔但絶吳粮道吳食盡而退擊大敗之孔遣神策將援哥舒曜拜東都汝洲行營節度使討李希烈屯襄城希烈遣衆萬人縱火攻柵殪人于壍以薄壘曜苦戰破之居數月希烈自率兵三萬圍曜築甬道屬城矢集如雨帝遣神策將劉德信以兵三千援之又詔河南都統李勉出兵相掎角勉以希烈在外許守兵少乘虚襲之希烈自解觀望莫肯救張巡傳賀蘭進明代巨節度屯臨淮許叔冀尚衡次彭城皆觀望莫肯救巡復遣南霽雲如臨淮告急引進騎三十冒圍出賊萬衆遮之霽雲左右射皆披靡既見進明進明曰睢陽存亡已决兵出何益霽雲曰城或未下如已亡請以死謝大夫叔冀者進明麾下也房琯本以牽制進明亦兼御史大夫勢相埒而兵精進明懼師出且見襲又思巡威聲恐成功初無出師意又愛霽雲壯士欲留之為大饗樂作霽雲泣曰昨出睢陽時將士不粒食已彌月今大夫兵不出而廣設聲樂義不忍獨饗雖食弗下咽今主將之命不逹霽雲請置一指以示信歸報中丞也因拔佩刀斷指一座大驚為出涕卒不食去指矢回射佛寺浮圖矢著甎曰吾破賊還必滅賀蘭此矢所以志也援矛刺賊李光弼有禆將援矛刺賊洞馬腹中數人又有迎賊不戰而郤者光弼召援矛者賜絹五百疋不戰者斬詔入援北邙之敗朝恩羞其策繆故深忌光弼切骨而程元振尤疾之二人用事日謀有以中傷者及来瑱為元振讒死光弼愈恐吐蕃㓂京師代宗詔入援光弼畏禍遷延不敢行及帝幸陜猶倚以為重數存問其母以解嫌疑梁求救于晉劉處讓少為張萬進親吏萬進叛梁附晉梁遣劉鄩討之萬進遣處讓求救于晉晉王方與梁相拒未能出兵處讓乃於軍門截耳而訴曰萬進所以見圍者以附晉也奈何不顧其急茍不出兵願請死晉王壯之曰義士也為之發兵五代史俱受朝委共防患害張曲江邊鎮統軍詔俱受朝委共防患害何異一家况在絶域尤宜相援赴援梁太祖紀秦宗權聞盧瑭等敗乃自將精兵數千柵北郊五月兖州朱瑾鄆州朱瑄來赴援敬瑭求援契丹敬瑭徙鎮天平不受命曰太原地險而粟多吾當内檄諸鎮外求援契丹可乎梁紀卑辭歸窮劉仁恭敗退壁瓦橋卑辭歸窮於李克用求救克用為侵邢治本傳將交惡十二白廉藺史記㢘頗曰藺相如徒以口舌為勞我羞為之下見必辱之相如聞之不與争望則引車避曰兩虎闘勢不俱生吾先國家之急後私讎頗聞之肉祖負荆謝罪史遷曰智勇兼之也兩虎私鬭後漢寇恂在潁川賈復部將犯法恂斬之復怒欲手刃恂恂每避後於帝坐相遇曰天下未定兩虎安得私闘今日朕為解之遂交歡易諸將魏志帝欲假賈逵節曹休曰逵性剛侮易諸將不可以為督魏略曰休怨逵遲呵使勑豫州拾棄仗逵曰為國作豫州不為拾棄仗與休更相表魏書云休欲罪逵逵絶無言吕蒙曰老母待卿食吳甘寧厨下小兒有過失投吕蒙蒙恐殺之不即還後寧齎酒禮與蒙母蒙與升堂乃出厨下兒寧許不殺斯須還舩縳於桑樹自挽弓射殺之畢勑舩人増䌫解衣臥蒙大怒㑹鼓兵欲攻寧蒙母徒跣曰至尊待汝如骨肉何以私怒甘寜蒙聞母言即自至寧舩笑曰老母待卿食寧嘘􅐵曰負卿即與蒙俱見母歡宴永日左傳郤至曰楚有六間其二卿相惡二卿子重子反也此六間之一不可以私憾忘義魏張遼屯合肥孫權圍之李典曰不可以私憾忘義率衆與遼破權陳武備相見晉王濬等伐吳濬不受渾節度濬先平吳後論功先後因不平渾子濟亦數毁濬濬常疑渾渾詣濬濬陳武備然後相見其相疑如此孔私忿不成大功馬燧田昻降燧請以洺州𨽻抱真而用昭義副使盧𤣥卿為刺史兼魏博招討副使李晟兵前獨𨽻抱真抱真亦請兼𨽻於燧以示協一然議者咎燧私忿交惡卒不成大功不協五代朱珍梁兵攻掠四方李唐賔常與珍俱與珍威名畧等而驍勇過之珍嘗私迎其家置軍中太祖疑珍有異志遣唐賔伺察之珍與唐賔不協唐賔不能忍夜走還宣武珍單騎追之交訴太祖前太祖兩惜其材為和解之大將不協郭虔瓘陜王為安西都䕶詔䖍瓘為副䖍瓘與安撫招慰十姓可汗使那獻數持異交訴諸朝𤣥宗齎詔書諭解曰大將不協小人以逞何功可圖互防飛謗陸贄奏議李建徽楊惠元兵馬狀四軍按壘羣帥異心論勢力則懸絶髙卑據職名則不相統屬懷光輕晟等兵㣲位下而忿其制不從心晟等疑懷光養宼蓄姦而忿其事多凌已端居則宜防飛謗欲戰則遞怒分功齟齬不和嫌釁遂起軍詐十三取詐偽門事附白雄傑之士因勢輔時作為權詐謂孫武事刑法志變詐白起詐坑趙降卒四十萬衛鞅請樂飲史記衛鞅遺魏公子卬書曰往與公子驩今為兩國將不忍相攻可與公子靣相見㑹盟樂飲而罷以安秦魏卬以為然㑹飲伏甲兵攻卬敗其軍豈尚詐謀哉左實右偽偽以衣物為人形韓信擊魏益為疑兵陳舩欲渡臨晉而伏兵夏陽以木罌渡軍襲安邑晉將征南尚無掩襲之計羊祜尅日戰天兵逐北寧多變詐之謀不待期而薄人於險無勇也茍求詐勝匪念德功擊東南備西北周亞夫擊吳吳奔壁東南亞夫備西北已而吳精兵果奔西北不得入也貿易衣服後漢虞詡字升卿為武都守不滿三千兵土羌衆萬餘圍之詡陳兵令從東郭出北郭入貿易衣服迴轉數周羌恐而退設伏邀之大敗反間敵師太祖與韓遂書多所㸃竄如遂改定者遂將示馬超超果疑遂與太祖有應孔曵柴揚塵望者謂大軍至顔杲卿兼御史中丞傳檄河北言王師二十萬入土門遣郭仲邕領百騎為先鋒馳而南曵柴揚塵望者謂大軍至日中傳數百里賊張獻誠方圖饒陽棄甲走張疑幟王雄誕與李子通戰蘇州却之子通以精兵保獨松嶺雄誕遣將陳當率千兵出不意乘髙蔽崦張疑幟夜縛炬於樹徧山澤子通懼燒營遁保餘杭遂追擒之使牽類密者過陣李密王世充軍江淮士出入若飛密兵心動世充督衆疾戰使牽類密者過陣譟曰獲密矣士皆呼萬歲密軍亂遂潰兵詭道盛彦師與史萬寶鎮宣陽李密叛謀出山南萬寶懼謂彦師曰密驍賊也以王伯當輔之挾思東歸之士非計出萬全不為也殆不可當彦師笑曰請以數千兵為公梟其首萬寶問計答曰兵詭道也難豫言張疑屯虛幟楊恭仁為涼州揔管突厥頡利率衆數萬獵其境恭仁應機設拒張疑屯虛幟示之頡利懼而走詐為糧車裴行儉突厥反蕭嗣業討賊不克詔行儉為定襄道行軍大揔管先是嗣業饋糧數為虜鈔軍餒死行儉曰以謀制敵可也因詐為糧車三百乘車伏壮士五輩齎陌刀勁弩以羸兵挽進紿降常逹拜隴州刺史時薛舉方彊逹敗其子仁杲斬首干級舉遣將仵士政紿降逹不疑厚加撫接士政伺隙劫之并其衆二千歸賊陽約降李光弼入太原至德二載思明希德率髙秀巖牛廷珍將兵十萬攻光弼光弼又潜溝營地將沉其軍乃陽約降至期以甲士守陴遣禆校出若送欵者思明大悦俄而賊數千沒于塹城上鼓譟突騎出乘之俘斬萬計思明畏敗乃去紿賊曰吾糧盡明日當降初光弼謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期何若曰棄之抱玉許諾即紿賊曰吾糧盡明日當降賊喜歛兵待期抱玉已繕完即請戰賊忿欺急攻之抱玉出竒兵夾擊俘獲過當刻木作婦人衣絳披髮康承訓傳龎勛反引兵救豐刻木作婦人衣絳披髮兵過斫而火之夜叢萬炬疑賊郭子儀吐蕃犯武功乃遣知節為前鋒擊鼓讙山張旗幟夜叢萬炬疑賊初光禄卿殷仲卿募兵藍田以勁騎先官軍為游奕直度滻民紿虜曰郭令公来㑹故將軍王甫結俠少夜鼓朱雀街呼曰王師至吐蕃夜潰兵屯八百里黄巢攻臨安戍將董昌兵寡不敢戰伏數十騎莽中賊至伏弩射殺賊將下皆走昌進屯八百里見舍媪曰有追至告以臨安兵屯八百里矣賊駭曰向數騎能困我况軍八百里乎乃還多設疑兵李賛皇賜王宰詔意廣立虚塞多設疑兵盖為自防豈暇侵軼且欲偷安歲月以老王師夜半食先雞鳴時鳴鼓角馬燧田悦知燧食乏深壁不戰燧令士齎十日糧進營倉口與悦夾洹而軍造三橋逾洹日挑戰悦不出隂伏萬人將以掩燧燧令諸軍夜半食先雞鳴時鳴鼓角而潜師並洹趨魏州令曰聞賊至止為陣留百騎持火待軍畢發匿其旁須悦衆渡即焚橋燧行十餘里悦兵踰橋乘風縱火譟而前燧乃令士無動命除榛莽廣百歩為場募勇士五千人陣而待比悦至火止氣少衰燧縱兵擊之田悦敗走橋已焚衆赴水死者不可計斬二萬級作機橋康承訓屯海州度賊至作機橋維以長絙賊半度絙絶士溺死度者不得戰殱之縛藁為人張巡城中矢盡廵縛藁為人千餘披黒衣夜縋城下潮兵争射之久乃藁人還得箭數十萬其後復夜縋人賊笑不設備乃以死士五百斫潮營軍大亂焚壘幕追奔十餘里賊慙益兵圍之閉壘示怯五代王景仁初名茂章少從楊行宻梁遣于友寧攻王師範師範乞兵於行宻遂斬友寧太祖聞友寧死以兵二十萬倍道而至景仁閉壘示怯伺梁兵怠毁柵而出驅馳疾戰酣退坐召諸將飲酒已而復戰太祖登髙望見之得青州降人問飲酒者為誰曰王茂章也太祖嘆曰使吾得此人為將天下不足平也梁兵又敗結草為人執以旗幟以驢負之同上劉鄩謂晉兵悉從莊宗赴魏而太原可襲乃結草為人執以旗幟以驢負之往来城上而潜軍出黄澤闗襲太原晉兵望梁壘旗幟往来不知其去也以故不追詐為降書梁臣朱珍朱裕奔于鄆州太祖乃還汴留珍攻鄆州珍去鄆二十里遣精兵挑之鄆人不出朱裕詐為降書隂使人召珍約開門為内應珍信之夜率其兵叩鄆城門朱裕登陴開門内珍軍珍軍已入甕城而垂門發鄆人從城上磔石以投之珍軍皆死甕城中珍僅以身免太祖不之責也賊疑救至黒齒常之垂拱中突厥復犯塞常之率兵追擊至兩井忽與賊遇賊騎三千方擐甲常之見其囂以二百騎突之賊皆棄甲去其暮賊人至常之潜使人伐木列炬營中若烽燧然㑹風起賊疑救至遂夜遁大舉九節度討慶緒將戰子儀選善射三千士伏壁内誡曰須吾却賊必乘壘若等譟而射既戰偽遁賊薄營伏發注射如雨賊震駭王師整而奮郭子儀傳許言救兵至葛從周太祖攻朱瑾于兖州未下留從周圍之瑾閉壁不出從周詐言救兵至陽避之髙吳夜半潜還城下瑾以為從周已去乃出兵収外濠從周掩擊之軍矯命十四白擅發漢書段㑹宗擅發戊巳校尉兵有詔許贖之陳湯矯命誅郅支朝廷以矯制収繫按驗耿育言陳湯討絶域不覊之君係萬里難制之虜云云谷永訟陳湯策虜奮發報十年逋誅雪邊吏宿恥執憲之吏致之大辟云云馮奉世字子明持節送大宛客因設其兵擊莎車王莎車王自殺議封蕭望之以奉使有指而矯制違命雖有功不可為後法不宜封上善之矯制拜官魏鄧艾伐蜀劉禪降輙依鄧禹故事承制拜禪驃騎送於京師司馬宣王使監軍衛瓘喻艾事當須報艾曰承制拜假以安初附謂合權宜也漢魏春秋詔曰司馬法曰賞不踰日欲人速覩為善之利昔鄧禹入闗承制拜季艾為河東守来歙承制拜髙峻為通路將軍皆非先請臨時刻印觀釁而動以信事君節當慎守用權制敵利在從宜在師律而貴貞豈綸言之可贖且不禀命其何議功士師雖許專征君命誠難擅發禀命則不威專命則不孝宜准灋論無從公贖請雖切於利便各自貽於矯誣大夫出境有可以安國家定社稷則專之可也傳茍利便宜則非專違使者以茍利國家專之可也所司以未有君命何其速歟上將誠為擇利監軍未可與權宜承破竹安可守株師律尚貞兵符示信示不敢專是謂臧凶豈宜刑放矯制取馬益軍後漢臧宫擊公孫述衆多食少轉輸不至時帝遣謁者詣岑彭有馬七百匹宫矯制取以自益晨乃進兵矯制赦罪人廣漢羣盜起拜孫寶子嚴為益州刺史親入山谷告諭羣盜非起意渠魁皆得悔過歸田自劾矯制矯制受降馬援討五溪蠻宋均監軍援卒均以道逺士病乃矯制令吕仲奉制書入虜營告以恩信而勒兵隨之蠻夷震怖斬大帥而降均為置吏而還自劾矯制世祖嘉之孔徙屯李晟㑹吐蕃欲徃北帝議幸咸陽督戰懷光大駭疑帝奪其軍圖反益急晟與李建徽陽惠元皆聮屯適有使者到晟軍晟乃令曰有詔徙屯即結陣趨東渭橋後數日懷光并建徽惠元兵惠元死之專命十五白師在制命而已禀命則不威專命則不孝傳謂太子帥師魏絳戮楊干之僕公怒曰必殺魏絳絳曰軍事有死無犯為敬云云公跣而出謝之也擅誅羌任延為武威太守坐擅誅羌左轉邵陵令討旁郡賊後漢李章為琅邪太守比海夏侯思反囚太守而據營陵章即發兵千人馳往擊之掾吏上章曰二千石行不出界兵不擅發章按劒曰逆虜無狀此何可忍若坐討賊而死吾無恨遂引兵斬獲三百餘級上狀帝嘉之不拘科制太守表鍾由守司𨽻持節督闗中諸軍委以事持節不拘科制專之可也大夫出云云見上注黄鬚兒魏鄢陵侯彰乘勝北至乘乾長史以上馬疲又授節度不得過代違命輕敵彰曰帥師專行唯利所在縱敵非良將遂斬獲鮮卑太祖持彰鬚曰黄鬚兒意何大也將在軍君命有所不受諸葛亮數挑戰魏使辛毗仗節制兵司馬宣王固表請戰亮曰彼本無戰心請戰者示武爾將在軍君命有所不受若能制吾豈千里而請戰耶擅紀功後漢馬緄鴻卿擊武陵蠻有監軍張敞承宦官意表緄擅於江陵刻石紀功也違制受降朱祜仲先圍秦豐降檻車送洛陽吳漢劾祜違制受降違將帥之任世祖不罪孔將得顓制裴度為淮西宣慰招討處置使是時諸道兵悉中官統監自處進退度奏罷之使將得顓制號令一戰氣倍不從中治李靖五代孫彦芳家故藏高祖太宗賜靖詔書數函上之一曰兵事節度皆付公吾不從中治也兵多則難用將衆則不一白居易河朔復亂深州圍益急居易上言兵多則難用將衆則不一宜詔魏博澤潞定滄四節度令各守境以省度支安於專行病於羈制陸宣公奏議凡在執干戈而衛社稷者皆自謂勲業由已義烈發心安於專行病於羈制陛下宜俯徇斯意因而委之遂其所安獲其所病敦以付授之義固以親信之恩假以便宜之權制得自專權得自縱李觀上宰相安邊書擇一虎臣練萬虎賁使制得自專權得自縱將無分權則成功同上夫兵有專制則畢力將無分權則成功凡臨軍對冦士卒不用命竝得專行其罰唐六典兵部下多專命吳世家撫州危金諷叛彭彦章彭玕危伃倡皆叛隆演問嚴可求誰可用者可求薦周本時本方敗可求彊起之本曰蘇州之敗非怯也乃上將權輕而下多專命爾若必見任願無用偏禆乃請兵戰於象牙潭執金諷彦章葛從周太祖遣攻劉守文以蔣暉監其軍暉語諸將曰吾王以我監諸將今燕兵来不可迎戰從周怒曰兵在上將豈監軍所得言專殺十六白穰苴斬莊賈見軍政令門注斬監軍御史穿軍壘漢胡建字子孟守君政丞監軍御史穿北軍壘垣為賈區注小菴屋坐買賣也胡建斬御史出城奏於懷中曰穿窬不由路是謂姦臣按軍法正無屬將軍有罪以聞二千石以下行法焉制曰國容不入軍軍容不入國建何疑將在别屯殺人秦彭事見偏将門注孫策斬逃騎士孫䇿事見背軍門注晉􅕄官志云使持節為上持節次之假節為下使持節得殺二千石以下持節得殺無官位人若軍事得與使持節同假節唯軍事得殺犯令者江左以來都督中外尤重唯王導乃居之孔殺偏禆李元諒李懷光反與馬燧渾瑊討之其將徐廷光素易元諒元諒見韓游瓌曰彼詬吾祖今日斬之子助我乎許諾既而遇諸道即數其罪叱左右斬之詣燧謝燧大怒將殺元諒游瓌見曰殺一偏禆尚爾即殺一節度法宜如何燧黙然元諒請輸錢百萬勞軍自贖瑊亦為請燧赦之帝以專殺恐有司劾治前詔勿論麾下為股慄哥舒翰事王忠嗣署衙將翰能讀左氏春秋漢書通大義䟽財多施予故士歸心為大斗軍副使佐安思順不相下忠嗣更使討吐蕃副將倨見翰怒立殺之麾下為股慄斬陴者披闔内軍郭子儀至德二載攻賊崔乾祐於潼闗乾祐敗退保蒲津㑹永樂尉趙復河東司户參軍韓旻司士徐景及宗室子鋒在城中謀為内應子儀攻蒲復等斬陴者披闔内軍乾祐走安邑安邑偽納之兵半入縣門發乾祐得脱身走殺大將路嗣恭後為郭子儀朔方節度留後大將孫守亮擁重兵驕蹇不受制嗣恭因稱疾守亮至即殺之一軍大震乘馬不避者即時榜殺栁公綽拜京兆尹方起府有神策校乘馬不避者即時榜殺帝怒其專殺公綽曰此非獨試臣乃輕陛下法帝曰既死不以聞可乎曰臣不當奏在市死職金吾在坊死職左右巡使帝乃解非用髙瑀不能安李長至乃曰為我白宰相徐州專殺李聽親吏非用髙瑀不能安因瞑目斫父墓射殺栁仲郢遷侍御史有禁卒誣里人斫父墓栢射殺之吏以專殺論而中尉䕶免其死仲郢監罰執曰賊不死是亂典刑遂獨詔京兆杖之不監朝廷嘉其守本傳白孔六帖卷五十四
