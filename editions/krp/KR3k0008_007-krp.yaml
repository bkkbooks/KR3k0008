body:
  text: 白孔六帖卷七唐白居易原本宋孔傳續撰江一淮二濟三漢四湖五陂六洛七渭八涇九昆明池十温湯十一濤十二泉源十三池十四浦十五珠十六玉十七珪璋十八江一白大江長江中江九江書過九江注江分為九道三江周禮揚州其川三江荆池淮南子曰荆楚以江漢為池楚望傳曰江漢濉漳楚之望也南國之紀詩云滔滔江漢南國之紀導岷山夏書岷山導江濫觴家語江水始出岷山其源可以濫觴九𣲖江至潯陽分為九道朝宗書曰江漢朝宗于海安流楚辭曰今沅湘兮無波使江水兮安流滄波白波洪波永矣江之永矣不可方思四瀆之首江河淮濟百谷之王老子曰江海所以能為百谷之王者以其能善下浮天之浪浴日之波如練澄江静如練大溢文子曰江河之大溢不過三日流而為江海積水水之積也不厚雙流蜀江滔滔見上沔彼江水導於岷山魚相忘於江湖池魚有江湖之思誓祖逖字度楚王鮫人搆館於懸流泉客築室於巖底江賦云渉渉江採芙蓉二江灌錦城史記河渠書曰蜀守李氷鑿離堆山辟暴水之害穿二江灌成都中此渠皆可行舟有餘用漑浸百姓又享其利至於所過往往引其水益用溉田疇渠以億計莫之數也孔彰泄有宜李渤桂有灕水出海陽山世言秦命史禄伐粤鑿為漕馬援討徴側復置以通餉後為江水瀆毁渠遂廞淺毎轉餉役數千户濟一艘渤灑浚舊導彰泄有宜舟楫利焉湘流栁宗元懲咎賦泝湘流之沄沄飄風擊以揚波兮舟摧抑而廻邅日霾曀以昧幽黝雲涌而上屯泝淩天之騰波同上却驚棹以横江泝淩天之騰波楓落呉江冷崔信明鄭世翼者遇信明江中謂曰聞公有楓落吴江冷願見其餘信明欣然多出衆篇世翼覽未終曰所見不逮所聞投諸水引舟去乗艫江中楊元琰初張柬之代為荆共乗艫江中私語外家革命元琰悲涕慷慨志在王室柬之執政引為羽林將軍謂曰江上之言君毋忘之嚴程迫風帆劈箭入髙浪追思南渡時魚腹甘所𦵏韓愈引竇司直詩驚波凌大江之驚波同上復志賦銀屋江中白浪如銀屋李白詩緑净不可唾韓文江流悍急送區冊序支流合輸大江澒洞支流合輸夢得楚望横坤大江吞呉去一練横坤抺杜牧送孟遲江共蒹葭逺韓文欺岸江濤欺岸黄沙走杜甫復隂雷騰雲百里一瞬既會既逺淡為安流栁宗元興州江運記鑿岸泄犇湍稱古神禹跡夜喧山門端獨宿不安席韋應物江水出火九國志吴楊渭十二年冬十月濬東塘之楊林江水出火可以燃物江流思夏后杜甫登白帝城寒江觸石喧同上禹鑿寒江正穩流同上天逺暮江遲同上大聲吹地轉髙浪蹴天浮江漲同上澄江平少岸水檻孤石隱如馬長江泓澄湛凝緑韓愈岳陽樓詩泓澄湛凝緑物影巧相向江豚時出戯驚波忽蕩漾封江瀆廣源王五代楊溥二年正月封江瀆廣源王淮二白長淮清淮導自桐柏書導淮自桐柏入于海其乂書淮沂其乂乂治也淮夷書淮夷蠙珠暨魚淮泗周禮青州其川淮泗沔彼淮水積水見上安流見上及淮書曰海岱及淮惟徐州竭淮水竭王氏滅孔無波平如席韓愈送僧詩清淮無波平如席具舠艫遣將度淮杜佑徐州節度使張建封卒軍亂立其子愔請于朝帝不許乃召佑節度淮泗討定之佑具舠艫遣將度淮封淮瀆長源王五代楊漙二年正月封淮瀆長源王山􅀈桐柏發谼歕湧唐文粹吕周任泗州大水記山􅀈桐柏發谼歕湧下注淮濆鐡鎻絶淮流杜慆咸通中為泗州刺史㑹龎勛反圍城淮南節度使令狐綯遣牙將李湘屯淮口與郭厚本合為所敗湘等竝没於是援絶賊乃以鐡鎻絶淮流梯衝乗城壅淮上流楊行宻以銳士萬二千冒雪馳迫清口不進壅淮上流灌龎師古軍淮神唐李肇國史補楚州有漁人忽于淮中得古鎻不絶以告官刺史李陽大集人力引之鎻窮有獮猴躍出復沒後有驗山海經云火獸好為害禹鎻之名無支神淮之水舒舒韓贈張籍水鬭中和三年汴水入於淮水鬬壞船數艘唐史五行志淮水出桐栢韓愈董生行淮水出桐栢山東馳遥遥千里不能休淝水出其側不能千里百里入淮流戍夜踰淮忠義傳辛讜賊將李圎焚淮口讜曰事亟矣獨出可以求援乃與楊文播李行實戍夜踰淮坎岸登馳三十里至洪澤見戍將郭厚本告急厚本許出兵濟三白清濟清源導沇東流書導沇水東流為濟注泉源為沇流去為濟截黄濟水截河而流水不混其清有瀰詩有瀰濟盈濟瀆宜麥周禮兖州其川河濟車僨傳曰鄭伯之車僨于濟沔彼濟水鸜鵒不踰濟周禮四瀆視諸侯孔潜流屢絶状雖微細獨而尊也許敬宗帝曰書稱浮于濟漯今濟與源㫁不相屬何故而然對曰夏禹導沇水東流為濟入于河今自源至温而入河水自北洑地過河而南出為滎又洑而西至曹濮散出於地合而東汶水自南入之所謂溢為滎東出于陶邱北又東㑹於汶是也古者五行皆有官水官不失職則能辨味與色潜而出合而更分皆能識之帝曰天下洪流巨谷不載祀典濟甚細而在四瀆何哉對曰瀆之言獨也不因餘水獨能赴海者也且天有五星運而為四時地有五岳流而為四瀆人有五事用而為四支五陽數也四隂數也有竒偶隂陽為陽者光耀隂者晦昧故辰隠而難見濟者潜流屢絶状雖微細獨而尊也帝曰善與河同靈等秩唐李甘濟為瀆問今盡濟水之力載數石之舟廣不能横深不能浮而曰與河同靈等秩吾不知先王班祀之意也濁河終不沔清濟狄公執政在末年濁河終不沔清濟杜甫濟上没蓬蒿苦雨同上河濟異宜栁宗元上中書状河濟異宜海岱殊服臨濟水五代梁臣龐師古梁兵攻鄆州臨濟水師古徹木為橋夜以中軍先濟朱宣走中都惟神泉源清㓗浸彼遐逺播通四氣作紀一方𤣥冬肇節聿脩典物通典祭濟文清濟濁河清濟曽無溝洫之虞栁文漢四白沱濳為漢尚書池傳楚國漢水以為池楚望江漢濉漳楚之望也漾水書曰嶓塚導漾東流為漢又東為滄浪之水注泉源為漾水流為漢水東流見上南紀滔滔江漢南國之紀廣矣漢之廣矣不可泳思游女詩漢有游女不可求思弄珠游女弄珠於漢臯之曲沉玉蔡昭侯如楚三年止之昭侯歸及漢執玉而沉曰予所有濟漢而南者有若大川大川見上朝宗見江門士軍没魏志曰漢水溢征南等士軍皆沒廣漢孔築隄盧鈞會昌中漢水害襄陽拜鈞山南東道節度使築隄六十歩以障漢漲齧城郭張柬之授襄州刺史會漢水漲齧城郭柬之因壘為隄以遏湍怒其隄莫量唐文粹李善夷責漢水辭漢之深矣其隄莫量遥看漢水鴨頭緑遥看漢水鴨頭緑恰似蒲萄初撥醅李白襄陽歌昨来漢水頭始得完孤羈韓愈寄顧立之詩往復江漢津杜甫子豈無扁舟往復江漢津蕭索漢水清送樊侍御同上漢水饒巨石送李校書同上漢水波浪逺李白詩眼前今古意江漢一歸舟杜甫懷㶚上逰江海雖云廣乗舟度無艱韓愈詩漢水既殊流楚山亦此分李白擬古湖五白五湖洞庭一名太湖彭蠡並湖名其浸五湖周禮揚州其浸五湖注云太湖方五百里故曰五湖范蠡句踐既滅吴雪㑹稽之恥於是范蠡乃乗扁舟泛五湖而不反捐珠新語曰舜捐珠扵五湖之泉積水安流浮天浴日乗舟范蠡賣藥列仙傳東方朔漢武時為郎後有人見於㑹稽賣藥而泛五湖魚相忘於江湖池魚有江湖之思始波洞庭始波木葉微脫文選云孔賜鏡湖剡川一曲賀知章請為道士還鄉里詔許之又求周宫湖數頃為放生池有詔賜鑑湖剡川一曲龍出禇無量家瀕臨平湖有龍出人皆走無量尚㓜讀書若不聞衆異之凌洞庭之洋洋栁宗元懲咎賦飲馬楚世家馬殷荘宗滅梁殷遣其子希範脩貢京師荘宗問洞庭廣狭希範對曰車駕南廵才堪飲馬爾荘宗嘉之五代史南維羣崖水洞庭九州間厥大誰與譲南維羣崖水北往何犇放瀦為七百里吞納各殊状韓文登岳陽樓詩又聲音一何宏轟磕車百兩漭蕩漭蕩見五湖李白送王屋山人詩明湖落天鏡登巴陵開元寺同上徹底見秋色明湖映天光徹底見秋色望洞庭同上連天洞庭連天九疑髙蛟龍出没猩鼯號韓愈贈張二曹語漫漫復志賦過洞庭之漫漫同上自古澄不清環混無歸向岳陽樓詩軒然大波起宇宙隘而妨同上水月如練清光可掇郎官湖序故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴於江城之南湖方夜水月如練清光可掇張公殊有勝槩四望超然乃顧白曰此湖古来賢豪逰者非一而枉踐佳景寂寞無聞夫子可為我標之以嘉名傳不朽白因舉酒酌水號之曰郎官湖亦鄭圃之有僕射陂也李白開帆入天鏡直向彭湖東李白詩半陽湖酉陽雜俎句容縣吴瀆塘有半陽湖湖水半冷半熱可以㵸鷄若有魚誤入輒死陂六白鴻隙漢汝南郡鴻隙陂以為饒翟方進為丞相以數溢為害奏罷之王莽時枯旱郡中追怨乃作童謡曰壞陂誰翟子威飰我豆食羮芋魁言不生稻粱唯生豆芋及覆陂當復誰言兩鴻鵠託神告之也貰貸寗成曰仕不至二千石賈不至千萬安可比人乃貰貸陂田千餘頃假貧人保使數千家引灌張禹為下邳相引灌蒲陽陂率吏人假與糧種鄰郡貧者歸之汪汪萬頃續漢書曰郭林宗言黄憲汪汪若萬頃之陂斷水為陂魏志夏侯惇為濟陽守㫁大水作陂自負土率将士種稻人頼其利穿渠築陂晉青龍元年穿城固渠臨陂溉田數千餘頃投竹杖費長房投竹杖於葛陂化為龍卧抱朴子葛仙公陂水中卧竟日方起脩復後漢鄧晨為汝南守欲脩復翟方進所壞鴻隙陂聞許陽曉水署為都水椽陽因髙下形勢起塘四百里數年乃成方梁石洫汝南多陂池年年决壞年費常三千餘萬鮑昱文淵為太守作方梁石洫水常饒足溉田倍也仲春無漉陂池月令孔閼河灌通靈陂姜師度徙同州刺史又𣲖洛灌朝邑河西二縣閼河以灌通靈陂収棄地二千頃為上田古天子陂沱臺榭皆深宫複禁韋宏機營宫所謂上陽者左僕射劉仁軌謂御史狄仁傑曰古天子陂沱臺榭皆深宫複禁不欲百姓見之恐傷其心而今列岸謻廊亘王域之外豈愛君哉脩復隄閼于頔為湖州刺史有湖陂異時漑田三千頃久廞廢頔至縣命脩復隄閼嵗獲秔稻蒲魚無慮萬計為陂塘五百九十八所韋丹徙為江南西道觀察使凡為陂塘五百九十八所灌田萬千頃漾波敬宗寳厯二年七月癸未以漾波𨽻尚食禁民漁沈竿續蔓深莫測菱葉荷花静如拭杜甫渼陂行波濤萬頃堆琉璃同上陂水寒更緑蓼花被隄岸陂水寒更緑栁宗元詩飛陂永昌中秦州敷水店南西陂白日飛陂四五里一直塞赤水陂上桑畦麥隴依然不動朝野僉載臭陂韓愈宜城驛記驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞逺近因號其陂曰臭陂有蛟害人漁者避之馬首迷荒陂失道蒼耳城壕失往路馬首迷荒陂李白魚龍動陂水處處生波瀾李白逰秋浦白苛陂詩陂影墜晴蜺杜牧詩月陂見李適之注洛七符瑞附白豫州川周禮豫州其川洛導熊耳之源書導洛自熊耳東北㑹于瀍澗又東北入于河宓妃洛水之神名曰宓妃宜禾淮南子洛水輕利宜禾禊王濟解禊于洛竭史昔伊洛竭而夏亡鬬國語周靈王時穀洛二水鬬將毁王宫王乃壅之後王室大亂泱泱小雅瞻彼洛矣維水泱泱仙舟李膺字元禮與郭林宗泛舟洛水人望者以為仙舟也洛神陳思王曹子建有洛神賦三川伊洛瀍禹導禹貢導洛自熊耳周卜洛陽鳳笙列仙傳曰王子晉好吹笙作鳳鳴常游伊洛間遂得仙清洛曲洛四水合流伊洛瀍澗震史記周幽王時三川皆震伯陽甫曰周將亡矣三川涇渭洛沔彼洛水出書孔安國曰九疇是也符瑞開奥東都賦曰河洛開奥符命用出圖書之泉文選𤣥龜宋書𤣥龜洛書者天符也王者有徳至川泉則洛出圖書也青鯉河圖曰黄帝游於洛水有鯉魚長三丈身青無鱗赤文成字鳳集宋書曰黄帝坐於𤣥扈洛水之上有鳳皇集衘圖置帝前圖以黄玉為匣龍見易乾曰帝王始興河洛龍見龜負九疇書曰天乃錫禹洪範九疇注云天與禹洛出書也神龜負文而出列於背有數至于九丹書淮南子曰至徳之運洛出丹書大魚帝王記黄帝時大霧三日帝㳺洛水之上見大魚殺三牲以醮之天乃甚雨七日魚流而得圖書沉璧黑玉帝王世紀湯沉璧於洛乃獲黄魚黒玉之瑞始受命稱王赤光尚書中候曰堯沉璧扵洛赤光起有靈龜負書出赤文成字温寒易乾曰帝徳盛之應洛水先温九日乃寒五日變為五色𤣥黄也鳳䘖圖以授軒見鳳集注龜負書以畀姒見龜負九疇注鷄衘珠而王漢帝王世紀昭靈后名含始㳺於洛池有玉鷄䘖赤珠刻曰吞此者王含始吞之而生漢髙祖五子徯太康於洛汭青雲尚書中候曰武王沉璧而榮光塞河青雲浮洛孔作三大防李適之𤣥宗患榖洛嵗暴耗徭力詔適之以禁錢作三大防曰上陽積翠月陂自是水不能患永昌水則天臨朝武承嗣偽𣢾洛水右導使為帝遣雍人唐同秦獻之改號洛水曰永昌水拜洛受圖則天太后拜洛受圖天子率太子羣臣蠻夷以次列大陳珍禽竒獸貢物鹵簿壇下禮成去别神拂洛水征車轉淆陵韓愈送矦叅謀去来伊洛上相待安罛箄同上寄崔二十六清洛狄犬吠清洛天津成塞垣李白贈武十七交洛赴洪河及闗豈信宿杜甫三川觀水詩上官儀詠詩髙宗時天下無事上官儀獨持國政常凌晨赴朝廵洛水隄歩月緩轡詠詩曰脉脉廣川流驅馬歴長洲鵲飛山月曙蟬噪野風秋音韻清亮望之若仙劉禹錫嘉話水花翻照樹隄蘭倒挿波唐太宗臨洛水詩青壇俯洛濵緑綺膺河檢青壇俯洛濵蘇味道詩嵩山東頭伊洛岸勝事不暇須穿裁韓愈持竿洛水側孤坐屢窮辰上洛有二橋李昭徳洛有二橋司農卿韋宏機徙其一直長夏門民利之其一橋廢省巨萬計然洛水嵗淙齧之繕者告勞昭徳始累石代柱銳其前厮殺暴濤水不能怒自是無患也清洛水光鋪碧簟劉禹錫詩清洛水光鋪碧簟上陽宫葉剪紅綃渭八白導鳥鼠之源書導渭自鳥鼠同穴東㑹于澧又東會于涇又東入于河為雍州之浸周禮雍州其浸渭洛貫都象河三輔記秦都咸陽渭水貫都以象天河浮橋南渡以法牽牛龍飲三秦記昔有黒龍從南山出飲渭水其行道為能首山星見漢武時有女子浴於渭水中乳長七尺上怪其異遣問之曰第七車者知我所来時蜀人張寛為侍中寬對曰天星主祭祀也齋戒不㓗則女人星見垂釣吕望垂釣扵渭水得玉璜遂為帝師造舟詩文王在渭造舟為梁祀宋書曰秦漢都西京渭雖不在祀典以其近咸陽故得比大川之祀貫甸服浸神臯送舅詩我送舅氏曰至渭陽震史記周幽王二年三川皆震周亡之兆也三川涇渭洛也殊流涇渭殊流清濁不雜沔彼渭水浸夫雍州親迎詩曰文定厥祥親迎于渭言迎大姒也涇以渭濁湜湜其沚孔分渭水入金光門韓朝宗為京兆尹分渭水入金光門匯為潭以通西市林木清渭郭子儀奏雍州背負清渭濁河之固祓除李適傳天子春幸梨園並渭水祓除馬化龍栁宗元龍馬賛明皇帝在位靈昌郡得異馬於河其状龍鱗虺尾拳毛環目肉鬛居帝闕二十年遇禍亂帝西幸馬至咸陽西入渭水化為龍㳺泳去不知所終渭流漲膩唐文粹杜牧阿房宫賦渭流漲膩棄脂水也陽春澌還歸非有指㶚渭陽春澌韓愈寄崔十六清渭東流劒閣深杜甫哀江頭泛泛渭水上有舟㳂兮泝兮愛此百里之清流白居易泛渭水賦井通渭河景公寺前街中舊有巨井俗呼為八角井元和初有公主夏中過見百姓方汲令從婢以銀稜椀就井承水誤墜椀經月餘出於渭河酉陽雜俎三百里内漁釣者五坊捕治之渭河三百里内漁釣者五坊捕治之唐史百官志河渠令璜溪徐彦伯臨渭行清渭無情極愁時獨向東秦州詩旅泊窮清渭同上渭城已逺波聲小李賀抱馬鬛以逸僕固懷恩安禄山反王師敗績懷恩至渭水無舟抱馬鬛以逸蛙大如鼎唐志神龍中渭水有蝦蟇大如鼎里人聚觀數日而失渭水逶迤白日净杜甫詩葉墜清渭朗上涇九白雍州之川周禮雍州其川涇汭鄭國之渠見隄渠門注白渠漢書趙中大夫白公穿引涇水二百餘里漑田四十餘頃因名曰白渠人得其饒歌曰田於何處池陽谷口鄭國起前白公起後舉鍤為雲決渠為雨涇水一石其泥數斗秦祟史記秦二世夢虎囓其左驂卜曰涇水為祟二世祀之沉四白馬於涇水漢祠漢書涇渭雖不在祀典以近咸陽皆比大川之祀毒流晉侯伐秦秦人毒涇上流師人多死殊流三秦記涇渭合流三百里清濁不雜震見上壅漢武河平四年長陵臨涇岸穨壅涇流湜湜之流詩涇以渭濁湜湜其止控清引濁沔彼涇水決為鄭渠引湜湜之流泥惟數斗收芃芃之稼畒乃一鍾渒彼涇舟烝徒楫之渒舟行貌涇水之中舟行者乃衆徒船人以楫櫂之孔擁隔黎幹戎州人大厯十三年涇水擁隔請開鄭白支渠復秦漢故道以漑民田廢碾磑八十餘所掎汨泥淖撓混沙礫栁宗元愚谿對秦有水掎汨泥淖撓混沙礫視之分寸𣅿若晲璧淺深險易昧昧不覿乃合清渭自彰穢跡故名曰濁涇冨流唐文粹李庾西都賦其地勢也帶涇渭之富流蕩潏邠郊入地底涇水中蕩潏杜甫北征詩比歲多次文粹王維張公徳政碑惟涇有防比嵗多决近縣疲於輸役他山遺於度材公命刮朽壞填巨石涇水浩浩揚湍波李白豳歌詩涇川三百里若耶羞見之上有琴髙水下有陵陽祠同上涇川送族弟錞詩未聞細栁散金甲腸㫁秦州流濁涇杜甫即事昆明池十白神池靈沼闗中記昆明池曰神池靈沼象滇河習水戰漢書昆明池武帝所穿也初漢欲征昆明夷昆明國有滇河乃使謫戍伐棘上林象滇河作昆明池以習水戰中有戈船樓船數百艘石鯨石皷刼灰見灰門注堯舟闗中記昆明池云堯治水訖停船此池盖堯時已有池漢代因而深廣之漢宇漢書武帝大脩昆明池列舘宇以環之金隄西京賦曰昆明靈池黒水𤣥沚周以金隄樹以栁杞牛女石鯨漢武帝於池中置二石人相對以象牽牛織女又刻石為鯨魚毎雷雨魚常鳴吼鬐尾皆動漢時祭祈雨亦有驗魚珠闗中記有人釣魚綸絶而去入夢於武帝帝明日於池中見魚銜索取而放之後三日帝復逰池濵得珠曰豈非池中魚之報舘昆明池有豫章舘西京賦曰豫章珍舘掲焉中峙似漢之波西京賦曰似雲漢之無涯儀星之石西征賦乃有昆明池其中湯湯汗汗滉瀁瀰漫浩如河漢昔豫章之名宇披𤣥流而特起儀景星於天漢列牛女以雙峙𤣥流見上肇穿文選曰伊兹池之肇穿肄水戰於荒服積水安流孔請為私沼安樂公主嘗請昆明池帝曰先帝未有以與人者主不恱自鑿定昆池延袤數里定言可抗訂之也肄戰許敬宗帝復問漢武開昆明池實何年日對元狩三年將伐昆明實為此池以肄戰習水戰唐髙祖武徳九年三月庚寅幸昆明池習水戰治昆明作紫雲樓綵霞亭鄭注帝嘗詠杜甫曲江辭有宫殿千門語意天寳時環江有觀榭宫室聞注言即詔兩神䇿治曲江治昆明作紫雲樓綵霞亭獻獲于大安宫太宗貞觀五年獵於昆明池獻獲于大安宫石鯨分玉溜刼燼引平池唐太宗詩石鯨吼朝野僉載開元初石鯨吼嵗大熟神池望不極滄波接逺天李百藥温湯十一白温泉湯泉湯液温谷東京賦靈液神泉並文選據神泉而吐溜華清盪邪魏都賦温泉毖涌而白浪華清盪邪而難老愈疾流惡惡穢也蠲痾痾疾温源水經曰温湯即温源神井張衡温泉賦曰余適驪山觀温泉浴神井暄波炎液文選如沸廬山記主簿山有温泉冬夏常如熱沸若湯梁州記漢水南温冬夏常熱若湯其熱可熟鷄子毖彼温泉湧于地脉合水火之徳澤浸萬人倍藥石之功蠲除六疾潔華清之流豈同禊洛救痾癢之疾寧比浴沂浮天浴日天子用之可也温源愈出靈液徐清孔賜浴安禄山入朝楊國忠兄弟姊妹延之新豐給玉食至湯將校皆賜浴别治一湯帝賜書曰為卿别治一湯可會十月朕待卿華清宫給香粉蘭澤李適賜浴湯池給香粉蘭澤治湯井為池地理志天寳六載更温泉曰華清宫治湯井為池環山列宫室鳯泉𤣥宗開元十一年十二月甲午如鳳泉湯廣成十四年十月甲寅廣成湯池石蓮花唐明皇雜録上於華清宫新廣一湯制度宏麗禄山於范陽以玉魚龍鳬鴈石梁石蓮花獻雕鐫尤妙上大恱命陳于湯中仍以石梁横于其上而蓮花纔出於水際上因幸解衣將入而魚龍鳬鴈皆奮鱗舉翼状若飛動上因恐却之蓮花石至今在夢浴孫賛明守福州賛明武肅王時為吴江尉嘗夢浴於温泉至是將及福州途次見飛泉洶湧因問從者答曰此温泉也方悟前夢之應及使汲之將浴從者曰此非佳者至州有之頗佳賛明既及郡齋亟取其泉而浴之出吴越備史隂火煑玉泉杜甫詩沉香山明皇雜録華清池中疊沉香為山效瀛洲長湯十六所開元遺事華清宫中除供奉兩湯外别有長湯十六所嬪御之類浴焉䟽巖剔藪為天子逰觀房琯𤣥宗有逸志數廵幸廣温泉為華清宫環宫所置百司區以琯資機筭詔緫經度驪山䟽巖剔藪為天子逰觀未幾斥為宜春太守葺殿宇於驪山置官曺於昭應元禎兩省供奉官諫幸温湯状賜浴皆長纓與宴非短褐杜甫詩幸温湯髙祖紀武徳六年三月庚戌幸温湯湯成召浴果不至潼闗已濫漁陽師鄭思津陽門詩温泉御湯中有玉蓮湯從蓮中涌出毎浴以錦繡為鳬鴈浮入鈒鏤小舟以為戲玩開元遺事濤十二白陽侯廣雅曰陽侯濤大波神也靈胥濤神也伍子胥死沉屍於江其精魄為濤神又論衡曰儒書言吴王夫差殺伍子胥煑之於鑊盛以囊投之於江子胥恚恨臨水為濤以溺殺人夫言吴王殺子胥投之於江實也言其恚恨臨水為濤虛也且衞葅子路而漢烹彭越子胥之勇不過子路彭越然二人尚不能發怒於鼎鑊之中胥亦自先入鼎鑊後乃入江在鑊之時其神豈怯而勇於江水哉何其怒氣前後之不相副朝夕之池潮有朝夕之期故吴郡有朝夕之池白露之濤海鰌入穴見海門牛魚起毛博物志曰東海有牛魚其形如牛引其皮懸之潮水至則毛起潮退則毛伏沸騰百川廻復萬里吴都賦曰潮波汨起廻復萬里八月之觀文選八月觀濤滄波白波洪波奔波洪漣蹙縮帷盖潮有似帷盖之状孔濤霧蒸湧王義方道南海酌水誓是時盛夏濤霧蒸湧既祭天雲開露人壮其誠風濤驚壯陸元方使嶺外陟海風濤驚壮憤悱皷怒文粹陸元輔胥山銘序曰䲭夷盛屍投于水濵憤悱皷怒配濤作神洗滌南北簸蕩東西抉眼不入投于河上自統波濤晝夜兩至懷沙歎騷洗滌南北簸蕩東西同上奮于呉夕于楚其神迄今一日再至来也海䲭羣飛陽侯夾從奮于吴怫于越夕于楚乃退仲秋闕望杭人以旗皷逆之笳簫和之百城聚觀同上數丸唐酉陽雜俎數丸生江岸如蟛蜞取土作丸數至三百則潮至舟人以為候因名曰數丸也屹起廻臨浙江濤屹起髙峨岷韓愈送惠師蒼濤欝飛翻杜甫客居下壍萬尋岸蒼濤欝飛翻乗濤簸扶胥近岸指一髪韓愈贈元協律洪濤舂天禹穴幽同上劉生詩江湖天濶足風濤寄杜員外詩湖水定可信李白濤波之旋滔山觸天栁宗元晉問濤波之旋滔山觸天旣停既平彌望悠焉良久乃始昻屹涌溢挺㧞而出濤瀬漲惡李靖武徳四年八月大閱兵夔州時秋潦濤漲惡銑以靖未能下不設備泉源十三白山下出易井冽寒泉易泉水衞女思歸也毖彼泉水亦流于淇詩云浸苞稂病也浸苞蕭稂蓍毛莫浚匪泉浚深也氿泉有冽氿泉無浸穫薪載清相彼泉水載清載濁觱沸沸出濫檻泉正泉出貌動禮冬至後五日水泉動藏珠於泉濫觴家江出岷山其源可以濫觴白泉瑞應曰泉色白自出山澤得禮制則澤谷之白泉出飲之使人長壽醴泉美泉也水之精也崐崘山有醴泉華池君乗土而王其政太平則醴泉出湧乗水而王其政和平則醴泉瀌神靈滋液百珍實用則醴泉出黄帝時以醴泉為漿堯之世徳茂清平則醴泉出夏后之時俊乂在官醴泉出漢宣帝三年醴泉流滂枯槁榮茂禮天不愛其道地不愛其寳則醴泉出也刀刺而湧漢書貳師将軍李廣利行無水㧞刀刺山飛泉湧出拜而遂出後漢耿恭拜井泉出又醴泉後漢世祖中元元年夏醴泉出飲之者疾病皆愈唯眇蹇不瘳又有赤草生於水涯泠泠文選山溜何泠泠飛泉漱鳴玉吐溜泉㳙㳙而吐溜文冽清𤣥泉冽清文蜧躍文黒蜧躍重泉灌注傷玉趾寒泉傷玉趾文湧溜石泉湧溜於隂渠天台山賦湧湍於石澗文選跋石挹飛泉靈運山人飲楚辭山中人兮飲石泉兮䕃松栢吸微液吸飛泉之微液張騫窮漢張騫奉使窮河源穿石太山之溜穿石貪泉晉廣州石門有貪泉玉漿泉隋書在盧數引丹陽公鳥鼠山俗呼髙武隴其下渭所出絶壁千仞本之諸羗苦之勛之馬足所踐忽飛泉湧出人為之謡云云因號也水木之本源㧞本塞源孔見貪泉極飲去馮立受廣州都督嘗見貪泉曰此吴隠之所酌邪吾雖日汲庸易吾性哉遂極飲去湧流安金藏京兆萬年人神龍初母䘮𦵏南闕口營石墳晝夜不息地本枯燥泉忽湧流茂松清泉潘師正居逍遥谷髙宗幸東都召見問所須對曰茂松清泉臣所須也既不乏矣宋思禮禱孝友宋思禮蕭縣簿會大旱井池涸毋羸疾非泉水不適口思禮憂懼具禱忽有泉出諸廷味甘寒日不乏汲縣人異之思蘇頲李嶠曰舍人思若泉湧吾所不及書法徐浩書世状其法曰渴驥犇泉股泉杜佑朱坡樊川鑿山股泉應聖楊朝晟師次方渠水乏有青蛇降下走視其跡水從而流使築防環之遂為停淵士飲仰足有詔置祠命泉曰應聖引泉激霤王鉷以寳鈿為井榦引泉激霤號自雨亭玉琴老杜詩泉聲帶玉琴膏肓田㳺巖帝謂曰先生此佳否答曰臣所謂泉石膏肓流泉王涯别墅有佳木流泉幽泉怪石栁文西山宴㳺記蘆葭泉唐酉陽雜俎玉門軍有蘆葭泉周二丈深一尺駞馬千頭飲之不竭交旋如盤龍元街縣有泉眼中水交旋如盤龍或試撓破之尋手成龍状驢馬飲之皆驚走出酉陽雜俎潺湲瀉幽磴繚繞帶嘉樹韋應物香山泉潺湲瀉幽磴繚繞帶嘉樹激轉忽殊流歸泓又同注泄隂壁韋應物遊琅琊山寺新泉泄隂壁石罅同上石罅寒泉潔清德之鑑張曲江龍池頌沉精降液下為靈泉清徳之鑑柔道之體瀑泉司空圖舊三峯泉石之美冠於一山北巖之上有瀑泉流注谷中灌良田數十頃至今子孫猶為司空在南部新書泉音玉淙琤韓愈城南聮句巖花覆谷泉李白犇泉濺水珠杜甫詩石泉流暗壁日暮凍泉依細石謁真諦詩天澤之泉韓愈宴喜亭記泉之源曰天澤之泉出髙而施下也上善泉唐地理志坊州州郭無水東北七里有上善泉開成二年刺史張怡架水入城以紓逺汲四年刺史崔駢復増脩之民獲其利後思之為立祠盗泉飛溢亷夫不飲𤣥宗皇后武氏傳潘好禮䟽盗泉飛溢亷夫不飲池十四白東門之池可以漚麻詩靈沼又曰王在靈沼於牣魚躍沼亦池也酒六韜曰殷君好為酒池廻舟奏廣樂穆天子傳天子西征至于𤣥池三日休于𤣥池之上乃奏廣樂而歸是曰樂池贈雲謡又曰穆天子觴西王母于瑶池之西王母為天子歌白雲之謡照華韓詩外傳曰齊白公出弋照華之池孔作觀池樂游原太平公主始作觀池樂游原以為盛集既敗賜寧申岐薛四王都人嵗祓禊其池築山浚池長寧公主築山浚池帝及后數臨幸䟽龍首池為沼岐陽荘淑公主開第昌化里䟽龍首池為沼穿築池觀尉遲勝穿築池觀厚賔客士大夫多從之㳺蓬萊池李絳帝嘗畋苑中至蓬莱池謂左右曰絳書以諌我今可返也其見禮憚如此馬璘山池馬璘卒其後賜羣臣宴多在璘山池䟽池白居易東都所居履道里䟽沼注水銀為沼李尉咸通十四年春詔迎佛骨京師髙貲相與集大懼注水銀為池以金為隄南蠻驃國有二池以金為隄地變為池樂志帝初賜第隆慶坊坊南之地變為池中宗常泛舟以厭其祥帝即位作龍舟樂臨碧池敬宗帝紀寳厯二年六月辛酉觀魚于臨碧池鑿深池五代雷蒲據朗州常鑿深池於府中客有過者召宴池上指其水曰蛟龍水怪皆屈於此盖水府也酒酣取座上器擲池中因裸而入取其器嬉水上久之乃出治衣服坐意氣自若積翠池魏徴帝宴羣臣積翠池酣樂賦詩徴賦西漢良金池唐杜陽編滄州有良金池可方數里水石沙泥皆如金色水底盤筵白氏東都所居履道里宅有池水可泛舟樂天毎命賔客繞舷以百十油囊懸炙沈水中隨舷而行一物盡則左右又取之藏盤筵於水底也出窮幽記池之勝池方九里邱陵林麓距其涯􅀈島渚洲交其中岸之突而出者水縈之若玦焉池之勝於是為最桞宗元東池記樹之松栢楮被之菱芡芙蕖鬰然而隂粲然而榮同上環斗水為池白公廬山記池園潔脩韓文落妃池貴妃生於蜀嘗誤落池中後人呼為落妃池出貴妃外傳樂天池舘樂天得楊馮宅竹木池舘有林泉之致因為池上篇曰都門風水土木之勝在東南東南之勝在履道里雞跖集凝碧池祿山犯闕王維等數人為賊執一日逆黨㑹飲於凝碧池以梨園數百人奏樂維聞賦詩一絶萬户傷心生野煙書于壁賊平維以此詩得免明皇雜録若連艦縻檻為堂而今居之堂成而勝益竒望之若連艦縻檻與波上下栁宗元東池洄為清池寥廓泓渟同上萬石亭記君子之池韓愈宴喜亭記池曰君子之池虚以鍾其美盈以出其惡也詔賜永穆公主池觀安禄山入朝詔賜永穆公主池觀為㳺燕地觀詔勝爽魚朝恩有賜墅觀詔勝爽表為佛祠文石砌岸元載芸暉閣前有池悉以文石砌岸中有蘋陽花亦類於白蘋其花紅而且大有如牡丹更有碧芙蓉杜陽編瀦沼三百畆唐史長寧公主魏王泰故地東西盡一方瀦沼三百畆泰薨以與民至是主丐得之浦十五白浦說文浦水濵也小口風土記曰大水有小口别通曰浦也出溆浦而邅廻望美人兮南浦並楚辭與浦述征記曰與舊魏步導吴掲水灌之絶道為浦程谿浦顧微廣州記曰程谿浦口有蒲母養龍列㫁其尾因呼掘龍時人見之則上境大豐而利渉之屠兒浦劉禎京口合浦見珠門注孔對青崖唐文粹楊炯少姨廟碑曰浦對青崖獨有金臺之異翻翻翻翻江浦荷韓愈詩弭棹皮日休九諷允遂篇云弭吾棹兮澧之浦又同上憫邪篇云浦上蘆花兮秋復秋朝夕潮至文粹陸龜蒙門外有溝通浦溆而朝夕之潮至焉曠若天地通文粹李華寄趙侍御凌灘出極浦曠若天地通浦沙静如洗李白江上欲歸瀼西宅阻此江浦深杜甫阻雨蕭條别浦清同上江浦向来澄江邉星月村烟對浦沙東山野亭暫留魚復浦寄李秘書珠十六環附白夜光徑寸明月之珠不能無纇握靈蛇之珠九品南越志珠九品言大小之次千金荘子曰河上有人家貧其子投川得千金之珠也度寸韓詩曰良珠度寸雖有百仞之水不能掩其輝無脛而走火齊珠名秋露如珠五星若連珠暗投掌上難得之貨希世之寳是吾寳也不汝容焉蛇報恩隨侯見傷蛇以藥封之蛇銜明珠徑寸純白夜光燭室以報隨侯魚報恩見昆明池注貫禮曰纍纍乎端如貫珠鷄銜見洛門注捐文選沉珠於泉新語曰舜捐珠於五湖之泉以塞滛邪之路生蚌三輔决録曰孔融見韋元將與其父書曰不意雙珠生於老蚌感後漢孟嘗為合浦太守先時二千石貪穢珠悉徙去合浦無珠及孟嘗行化一年其去珠乃復還水尸子曰水圓折者有珠水懷珠而川媚文選贓不拜東觀漢記曰交趾太守坐贓詔以班賜羣臣鍾離意得珠璣悉委地而不拜曰此贓穢之物誠不足拜帝乃别賜錢二十萬賣漢董偃與母賣珠為事又合浦人採珠以易米而食時二千石貪檅珠徙去而餓死者盈路瑞禮斗威儀曰德至淵泉則江海出明珠鳳銜拾遺記鳳皇銜珠於庭少昊拾而懷之遺荘子云黄帝遺𤣥珠於赤水照乗魏王曰寡人有徑寸珠照車前後十二乗者十枚拾抱朴子曰識珍者必拾濁水之明珠採龍頷河上之子於驪龍頷下採珠候驪龍之睡剖蚌胎文選曰蚌蛤珠胎與月虧全又曰馮夷剖蚌列明珠生鯨目廣州記鯨鯢目即明月珠也魚死而目皆無精飾犢韓子曰楚人有賣珠於鄭者為挂之犢飾以珠玉鈿盤後魏武帝廣作黄金盤鈿之以珠玉弄㳺女弄珠於漢臯之曲崖不枯荀子曰淵生珠而崖不枯泣鮫人寄宿人家臨去泣而出珠盈盤以與主人故曰泉客慷慨以泣珠彈雀吕氏春秋曰隨侯之珠彈千仞之雀世必笑之以其所用重而所要輕也藏荘子曰藏珠於川飾劒西京雜記髙祖斬白蛇劒上有七彩珠為飾七彩見上龍銜燭龍銜珠以為耀蠙珠禹貢徐州蠙珠暨魚薏苡馬援載薏苡一船人有譛之為文犀明珠遺蜀宗預聘呉孫權泣别曰君毎銜命結二國之好今孤衰老恐不復見遺珠一斛無足自致新序曰舩人對晉平公曰珠出江漢玉出崐崘山無足而致也不執晉崔洪良伯手不執珠玉汝南王亮燕公卿以琉璃杯行酒酒至洪洪不執夜光東夷有明珠稱夜光致之平地終日不停採珠晉陶璜為交州百姓無農唯以採珠為業以珠易米吴時慮百姓私散好珠絶商旅人飢上請乃制自十月至二月非採上珠時聽往来上幣管子曰先王以珠玉為上幣木難文選云碧珠也解佩鄭交甫將南適楚至漢臯臺下遇二女佩二珠大如荆鷄之卵交甫與言曰欲子之佩二女遂解與交甫而去不見二女其佩亦失璀璨珠光彩貌詭暉别色熠熠熒熒並光含幽育明碕岸碕長岸也珠生則草木不枯環韓宣子有玉環其一在鄭商宣子請諸子産子産不與注同工共璞自共為雙也夫環宣子謂子産曰起請夫環盧重環以環帶犬重鋂貫三環盧令令環聲探環晉羊祜叔子五嵗於鄰家李氏樹中探取金環云先藏時人以為前身環中喻道也荘子象環孔子去魯佩象環五寸象牙有文理言以己有文章也五寸法五行環者取其循環似己徳之無窮黄雀後漢楊寳年七嵗行於華山見一黄雀被傷為螻蟻所摶寳見之而憐因將歸置箱中採黄蘂飼之經旬瘡愈旦来暮去忽一朝變為黄衣少年持玉環一雙来報寳曰好掌此環子孫累代三公果如其言白環帝王世紀西王母慕舜之徳来獻白環及益地圖孔西域大珠魏徴帝遣使市馬徴曰魏文帝欲求市西域大珠蘇則以為恵及四海則不求自至求而得之不足貴也陛下可不思蘇則言乎瑟瑟璣琲狼藉于道貴妃楊氏十月帝幸華清宫五家車騎皆從瑟瑟璣琲狼藉于道滄海遺珠狄仁傑閻立本異其才謝曰君可謂滄海遺珠矣銀榼曺確進中書侍郎帝薄於徳昵寵優人李可及家嘗取婦帝曰苐去吾當賜酒俄而賜者負二銀榼與之皆珍珠也一斗李義府請廢后立昭儀帝恱召見與語賜珠一斗獻西域獅子天寳初王尸羅迷迦再遣使獻大珠賣珠屈突通傳初桂州都督李宏節亦以清謹顯既沒其家賣珠太宗疑宏節實貪欲追坐舉者魏徴曰陛下過矣今世號清白死不變者屈突通張道源火珠南蠻多利火珠大者如鷄卵圎白照數尺日中以艾藉珠輒火出蕩心酖毒太宗賢妃徐恵言珠玉為蕩心酖毒無取韋正貫擢嶺南節度使南海舶賈至大帥必取象犀明珠上珍而售以下直正貫既至無所取易馬五代吐蕃婦人戴瑟瑟珠云珠之好者一珠易一良馬五色珠室韋富人以五色珠垂領明月珠西域拂菻多明月珠堂飾明珠南蠻驃堂飾明珠如意寳珠楚州獻寳十三二曰如意寳珠大如鷄卵琅玕珠琅玕珠形如玉環服珠泥婆羅其君服珠珠殿南漢劉龑聚南海珍寳以為珠殿廢池珠玉馬植為安南都䕶州部廢池珠玉復生五代馬吐珠唐五行志大和九年易定馬飲水因吐珠一以獻珠琲韋堅鑿潭成以小斛舟署其郡以所産暴陳其上若南海則珠琲覆地曺確時帝昵優人李可及教舞者數百舞珠寳覆地上清珠唐杜陽編代宗為兒時𤣥宗毎坐於玉案前因命取上清珠以絳紗囊之繫於頸上上清珠即開元初罽賔國所貢其珠光明㓗白可照一室視之則有仙人玉女雲鶴絳節之象揺動於其中及上即位寳庫中往往有神光異氣履水珠順宗即位拘弭國貢履水珠色黒類鉄大如鷄卵其上鱗皺其中有竅云持入江海中可行於洪波之上上始不為之寳遂命善浮者以五色絲貫之繫於左臂遣入龍池其人則歩驟於波上若在平地亦潜於水中良久復出而遍身畧無沾濕上竒之因以御饌賜使人焉至長慶中嬪御試弄於海池遂化為黒龍入于池内俄而雲煙暴起不復追討照夜珠楚馬希振天祐初殷為娶洪川鍾傳女資從甚厚有玉椀照夜珠希振以非人臣所玩皆納之於殷九國志真珠畦陳繼善拜少傳致仕富於資産自荷一鉏以理小圃成畦以真珠千餘顆若種蔬状土壤之間記顆俯拾出南唐近事清水珠馮翊嚴生家於漢南逰峴山得一珠如彈丸色黒而有光視之瑩澈如水焉以示西國胡人曰此清水珠也即命注水濁缶以珠投之俄而淡然清澈矣胡人以三十萬貨之出宣室志清輝照海月越客採明珠提携出南隅清輝照海月美價傾鴻都李白古風記事珠開元中張說為相有人惠一珠紺色有光名記事珠或有遺忘即玩此珠心神頓悟出開元遺事自平宫中吕大一杜甫自平詩自平宫中吕大一収珠南海千餘日越俗以珠為上寳生女名珠娘生男名珠兒緑珠之字由此稱緑珠傳班螺酌真珠粧樓記曰洛陽有妓樂者四時則散珠厚盈數寸以班螺令妓女酌之仍各具數得雙者為吉妓乃作雙珠宴以勞主人客從南溟来遺我泉客珠杜甫詩客從南溟来遺我泉客珠珠中有隱字欲辨不成書掌中貪見一珠新上漢中王同昌公主以紅琉璃盤盛夜光珠立堂中光如晝杜陽編誥多珠大厯中林國獻靈珠五色紅而光又名誥多珠同菖蒲煮食即大如鷄卵可數日不飢雙珠出海底俱是連城珍李白詩玉十七璧附白美玉吾寳傳曰是吾寳也上幣見珠門注瑾瑜匿瑕韞櫝而藏諸連城之價被褐懷玉碌碌如玉堅白不曰堅乎磨而不磷不曰白乎涅而不緇白虹之氣盈尺聖人不貴盈尺之璧五德五經通義曰玉有五德十仞韓詩良玉度尺雖有十仞之土不能掩其光度尺見上磨玷白珪之玷尚可磨也指瑕藺相如掲而璽之周禮職金掌凡金玉錫石丹青之戒令受其入征者辨其物之美惡與其數量掲而璽之龍輔玉名也左傳公使公衍獻龍輔於齊侯玉石周有砭阨宋有結緑梁有懸黎楚有和璞晉有垂棘玉色有山𤣥文有水蒼文白如截肪黒如㸃漆赤若鷄冠黄如蒸栗天地之精淮南子鍾山之玉灼以爐炭三日三夜色澤不變得天地之精也片玉郄詵自謂荆山之片玉磨礱追琢滿堂金玉滿堂希世之寳玉德子貢問於孔子曰敢問君子貴玉而賤䃉者何也為玉之寡而䃉之多與孔子曰非為䃉之多故賤之也玉之寡故貴之也夫昔者君子比徳於玉焉温潤而澤仁也縝宻以栗智也亷而不劌義也垂之如墜禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見于山川地也圭璋特達徳也天下莫不貴者道也故君子貴之也比德言念君子温其如玉有女如玉其人如玉琢如琢如磨玉不琢不成器他山之石可以攻玉價子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也賣化為石見河門注假道晉荀息請以垂棘之璧假道於虞以伐虢毁子曰龜玉毁於櫝中是誰之過與文選曰碎結緑之鴻輝殘𤣥黎之夜色獻宋人得玉以獻子罕子罕曰我以不貪為寳爾以玉為寳若以與我皆䘮寳不若人有其寳玉璜尚書中候曰吕尚釣於渭濵魚腹中得玉璜刻曰姬受命佐之敬重執玉不趨受玉以掬飲玉爵不揮皆敬重玉燭爾雅四時調謂之玉燭玉山嵇康玉箸王昭君之涙如玉箸玉堂漢堂名玉樽玉酒玉食玉牀西京雜記漢武趙昭儀寢昭陽殿玉為牀象牙為簟佩古之君子必佩玉君子無故玉不去身比徳也三獻不遇楚人卞和以玉璞三獻不遇楚王遂再刖其足不識無價尹文子魏之田父耕於野得玉徑尺鄰人曰怪石歸致于廡下光明照室田父怖棄之鄰人盗之以獻魏王王召玉工相之工望見再拜却立曰敢賀大王得天下之寳問其價曰此無價五城之都僅可一覩賜獻玉者千金長食大夫禄抵鵲荆山之下以王璞抵鵲潜隱尸子曰水方折者有玉大戴禮曰玉在山而木澤文選曰石韞玉而山輝瑞王者不藏金玉則紫玉見深山隱抱朴子荆山之玉潜光荆石之中雖有千仞之土不能掩其光種陽雍伯種石而生玉切寳劒切玉如泥攻玉禁採景帝詔吏發民若庸采黄金珠玉者坐贓二千石有聽者同坐雪融掘得晉新蔡王虅字元邁次貞定大雪平地數尺營門前方數丈雪融不積掘之得玉馬髙尺餘来獻之滅瘢王莽就國南陽守選掾孔休守新都相休候莽疾瘢莽遺休玉休不受莽曰君面有瘢美玉可以滅瘢休猶不受莽曰君嫌其價邪遂椎碎自裹進休休乃受玉玦魏鍾繇元常有玉玦太子欲得之而難公索使臨菑侯因人說之繇送太子報繇書云云碎亞父撞碎漢王所獻玉斗錯他山之石可以為錯注錯石可以磨玉璧植璧秉圭書當璧而拜抵璧於谷和難周禮榖璧以和難以聘女拱璧仲舒璧後漢鍾離意為魯相省視孔子受經堂男子張伯剗草得璧七枚懷藏其一以六白意意曰甕中素書文曰後世脩吾書者董仲舒發吾笥者鍾離意璧有七張伯取其一意召問伯伯叩頭出之求虞叔有玉虞公求旃不與既而悔之曰匹夫無罪懷璧其罪吾焉用此以賈害碎藺相如見秦王無償趙城之意乃持璧睨柱曰大王必欲殺臣臣頭與璧俱碎於柱秦王恐其碎璧乃謝之遂衣褐秉璧歸趙奪璧朱掾名暉詐取隂就璧奉東平王以朝覲禮曰以繅籍玉以韋衣木廣袤各如玉之大小為𤣥色不鬻珪璧金璋不鬻於市孔指環安定公主下嫁回鶻會昌三年来歸以黠戞斯所獻白貂皮玉指環皆賜河西域于闐城有玉珂國人夜視月光盛必得美玉求初徳宗即位遣内給事朱如玉之安西求玉於于闐得圭一珂珮五環一帶胯三百簮四十奩三十釧十杵三瑟瑟百斤并它寳等及還詐言假道回紇為所奪久之事泄得所求流死恩州于闐國玉池于闐國有玉池毎以端午日王親徑取玉自王已下至庶人皆取之毎取一團玉以一團石投之出西域記賜髙昌太宗即位獻公狐裘帝賜妻宇文華鈿一具宇文亦上玉盤刻玉扶南出剛金可以刻玉見金門石國髙仙芝討石國獲寳玉甚衆楚州獻寳五符志上元二年楚州獻寳玉十三曰𤣥黄天符形如笏長八寸有孔云辟兵疫曰玉鷄毛白玉也曰榖璧亦白玉也粟粒自然無雕鐫迹曰西王母白環二曰如意寳珠大如雞卵曰紅靺鞨大如巨栗曰琅玡珠二形如玉環四分缺一曰玉印大如半手理如鹿陷入印中曰皇后採桑鈎如箸屈其末曰雷公石斧無孔其一闕凡十三寘之日中白並連天玉界尺五代梁丞相趙光逢在唐以文行知名時人稱其方直温潤謂之玉界尺玉馬五代回鶻唐荘宗時王仁美遣使者来貢玉馬撈玉于闐其南千三百里曰玉州山多玉者此山也其河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異毎嵗秋水涸國王撈玉于河然後國人撈玉獻玉千斤同上遣都督劉再昇獻玉千斤及玉印降魔杵等夜光璧西域拂菻多夜光璧美玉張説曰宋之問之文如美玉玉斧五代王建立徙昭義賜以玉斧名玉尉遲勝求玉于闐國天寳中入朝獻名玉暖玉鞍天寳遺事寧王有暖玉鞍賜玉器王珂李克用在河中未出也帝懼茂貞之逼復使嗣延王戒不以御服玉器賜之龍虎玉唐杜陽編順宗西域有進美玉者二一圎一方徑各五寸光彩凝冷可鑑毛髪時伊祈𤣥解方坐於上前熟視之曰此一龍玉一虎玉圎者龍也生於水中為龍所寳若投之水必有虹霓出焉方者虎也生於岩谷為虎所寳若以虎毛拂之即紫光迸逸而百獸攝伏上異其言玉辟邪肅宗賜李輔國玉辟邪二各長一尺五寸竒巧殆非人間所有其玉之香可聞於數百步雖鏁於金函鉄櫃終不能掩其氣或以衣裙誤拂則芬馥經年縱澣濯數四亦不消歇火玉武宗㑹昌九年夫余國貢火玉三斗色赤長半寸上尖下圎光照十數歩積之可以燃鼎寘之室内則不復抉纊清越而瑕不自揜㓗白而物莫能汚内堅剛而外温潤有似乎君子者玉乎故用乎諸侯劉禹錫論紅玉環杜陽編元載紫龍髯拂刻紅玉以為環紐瑉中而玉表賈耽等賛以大節責之盖瑉中而玉表歟符彩照滄溟清輝凌白虹李白獲玉真人像二十七唐地理志寧州真寧本羅川天寳元年獲玉真人像二十七因更名也如意玉同昌公主下降寳貨之異有如意玉杜陽編軟玉天寳中興國獻軟玉鞭屈之則首尾相就舒之則勁直如繩同上碧玉檞葉異聞集李章武與王倡往来死後李經所居見王来司寢將曙取一物紺碧似玉而冷状如檞葉贈曰西岳玉京夫人所遺靺鞨寳也玉簫之約唐宋遺史韋臯未仕時寓於姜使君門舘姜子曰荆寳待臯甚厚有小青衣曰玉簫美而艶絶即以贈臯歸覲與玉簫約七年復来因以玉指環贈之臯踰期不至玉簫歎曰韋家郎不来矣絶食而死後臯鎮蜀荆寳往見問玉簫知其已死甚憐之臯誕日東川盧尚書獻歌妓為壽名玉簫遽眎之宛然舊人中指有玉環隱起玉精盌馬侍中嘗寳一玉精盌夏蝇不近盛水經月不腐不耗或目痛含之立愈酉陽雜俎未試囊中餐玉法明朝且入藍田山杜甫去矣行玉婆羅門雞跖集唐修行楊相公毎朝常弄一小玉婆羅門子髙數寸瑩徹精巧可愛云是于闐王内庫之物誇作天下珍李白古風宋國梧臺東野人得燕石誇作天下珍知哂趙王璧璧玉儲精以稠疊杜甫大禮賦蒼璧黄琮歸乎正色南郊賦珪璋十八白輯五瑞輯歛也歛五等諸侯之珪璋而朝覲也班瑞于羣后班還也朝覲禮畢還瑞於諸侯禹錫𤣥圭禹治水畢堯賜之𤣥圭以章其成功爾寳詩曰錫爾介圭以作爾寳注周王錫申伯介圭以為瑞瑟彼珪璋瑟㓗白貎詩剪桐成王剪桐葉為圭戯封唐叔周公曰天子無戯言遂命封之特達之徳禮曰珪璋特達徳特達謂以朝聘不有須而成鞠躬語曰執圭鞠躬如也如不勝銳方之象以法隂陽白虎通圭以為信也上銳陽也下方隂也長短之制以辨上下别貴周禮賤昭度昭其度也器以藏禮物有其容可磨白圭之玷尚可磨也載弄之璋不琢禮曰大圭不琢為石傳曰王子朝用成周寳圭沉于河人得于河上將賣之則為石奉璋峩峩詩六瑞周禮以玉作六瑞植璧秉圭屏璧與圭書治徳結好周禮琬圭以治德結好易行除惡琰圭以易行除惡南容三復剥圭璋為鏚柲剥破也鏚斧也柲柄也楚靈王繅藉周禮公執桓圭繅三采三就注繅木為中幹用韋衣而畫成之一市為一就又覲禮以繅藉玉注以韋衣木廣袤以玉大小為𤣥色王執鎮圭鎮安也以四鎮之山為象飾所以安鎮四方長尺有二寸公執桓圭桓宫室之象可以安上也長九寸侯執信圭伯執躬圭信身也身圭躬圭皆象人形為飾欲其慎行以保身也圭皆長七寸信音身子執糓璧男執蒲璧榖所以養人蒲為席所以安人璧皆徑五寸不執圭者未成國也享頫有章卿為君使執圭璋也傳云孔薦珪璧於房闥陳子昻賛武后竊威柄誅戮大臣宗室脅逼長君而奪之權子昻乃以王者之術勉之卒為婦人試武不用可謂薦珪璧於房闥以脂澤汗漫之也玉圭初德宗即位遣内給事宋如玉之安西求玉于于闐得圭一獻𤣥珪寳建徳宗城人獻𤣥圭一景城丞孔徳紹曰昔天以是授禹今瑞與之侔國宜稱夏建德然之特達珪璋之表崔羣制韓愈文聯累森然炳然若開羣玉之府指揮聯累圭璋琛璜之状各有列位栁宗元文圭璋交映送苑論白孔六帖卷七
