body:
  text: 白孔六帖卷二十六唐白居易原本宋孔傳續撰忠義一忠孝二不忠三義四義感五智六智謀七信八仁九忠義一白不以財貨汙人後漢朱暉為郡吏太守阮況欲市暉牛不與曰恐以財貨汙君況卒厚贈非有愛也請代長吏死劉平為彭城吏龐萌反攻郡刺史孫萌平冒刃伏萌上請以身代賊劍刃止萌中瘡氣絶蘇求飲平以己瘡血飲之袁渙感劉備劉備死羣臣皆賀袁渙不賀表渙以嘗為劉備舉史冒灋辭故主愍懐太子廢有司不許宫臣送江統冒禁至伊水拜辭夙沙釐隨見上門欒布哭彭越布為梁大夫使齊漢梟越首布還奏事越頭下祠而哭之代太守罪後漢周嘉高祖父名燕宣帝時為獄曺掾太守欲枉殺人燕諌不聴死家詣闕詔覆考燕曰願著燕名但言時病拷掠辭無撓當下蠶室不食而死七賢袁祕為郡門下議生從太守趙謙擊黄巾軍敗與功曹封觀等七人以身捍刃皆死謙得免詔復其門號七賢負太守逃劉茂為門下掾赤眉攻郡殺長吏茂負太守孫福踰牆藏穴中得免晝隠夜求食百餘日賊去乃歸府叱辱官長者晉王育字伯春太守桓宣命為主簿宣左遷萬年令杜令王攸詣宣宣不迎攸曰卿為二千石吾所敬也今吾儕耳何不見迎欲以小雀遇我使畏死鷂乎育執刀叱攸曰主辱臣死小縣令敢輕辱吾君将刺之宣跣下抱育乃止由是知名歸故主曹公擒闗侯禮之甚厚而顧其無久留意張遼以情問之侯曰極知曹公待我厚禮然受劉公恩誓以共死不可背要當立効報曹公而後歸及侯獲顔良曹公知其必去重加賞侯封所賜拜書告辭而去奔先主曹公不令追之官長引為證後漢吳詠嘗為馬賢所辟又為太尉龎參掾賢參相誣罪應死各引詠為証詠計理無兩直自刎而死二人慙和解凉州刺史張範祭其墓旌其子舉幡募救罪鮑宣字子都坐拒閉使者大不敬下獄當死弟子王咸舉幡募救宣者㑹此諸生㑹者千餘人遮丞相車又守闕遂得减死一等行賂免長吏罪太守尹端以朱俊公偉為主簿端坐死罪俊行賂得减端不知俊亦不言行賂減罪史弼字公謙坐罪舊舉孝廉魏邵賣郡邸行賂得減死變姓名鄧融請亷范為功曹融下獄范變姓名卒為獄吏管䕶之及出獄又收養融孔來事可為馬周疏臣不幸早失父母犬馬之養已無所施顧來事可為者惟忠義而已忠正義烈天下所推朱敬則睿宗嗣位嘗曰神龍以來忠於本朝者李多祚王同皎韋月将燕欽融竝褒復矣尚有遺者耶劉幽求曰朱敬則忠正義烈天下所推往為宗楚客冉祖雍等所誣謫守刺史長安中嘗語臣曰相王必受命當悉心事之及韋氏干紀臣遂見危赴難雖天誘其衷亦敬則啟之於是追贈名與岱崧等武元衡賛賢者於忠義寧以一不幸遽使慊然於其心哉要躬可殞而名與岱崧等矣其言忠義下皆畏恱張建封治徐十年其言忠義感激故下皆畏恱忠義奮發令狐彰李吉甫奏彰將死籍上土地兵甲遣諸子還第彰同時河朔諸鎮傳子孫熏灼數代唯彰忠義奮發而長子無辜皆竄死今通幸存惟陛下用之天下以忠義多田氏田宏正徙成徳其子布為河陽節度使父子同日受命時韓洪與子公武亦皆領節度而天下以忠義多田氏忠義為當世所高田布諸子皆有方面功以忠義為當世所高我世唐臣守忠義顔杲卿至洛陽祿山怒曰吾擢爾太守何負而反杲卿嗔目罵曰汝營州牧羊羯奴耳竊荷恩寵天子負汝何事而乃反乎我世唐臣守忠義恨不斬汝以謝上乃從爾反耶祿山不勝忿縛之天津橋柱節解以肉噉之詈不絶賊鈎斷其舌曰復能詈否杲卿含胡而絶矣張廵令狐潮素善廵至城下情語廵曰本朝危蹙兵不能出闗天下事去矣足下以羸兵守危堞忠無所立盍相從以茍富貴乎廵曰古者父死於君義不報子乃銜妻孥怨假力于賊以相圖吾見君頭干通衢為百世笑奈何潮赧然去不可為不義屈城陷與逺俱執子竒謂廵曰聞公督戰大呼輒眥裂血面嚼齒皆碎何至是曰吾欲氣吐逆賊顧力屈爾子竒怒以刀使抉其口齒存者三四駡曰我為君父死爾附賊乃犬豕也安得久乎竒服不其節将釋之或曰彼守義者烏肯為我用且得衆心可留乃以刃脅降廵不屈又降霽雲未應廵呼曰南八男兒死爾不可為不義屈霽雲笑曰欲将有為也公知我者敢不死亦不肯降乃與姚閭雷萬春等三十六人遇審程千里事見攻守門龐堅賊縛致東京将磔解之有說祿山曰義士也彼為其主殺之不祥乃縛於樹比且死見者哭之臨刑色不變符令竒田承嗣引令竒為右職田恱拒命馬燧敗之子璘乃以衆降燧璘之出與三子同降恱怒引令竒切讓令竒罵曰爾忘義背主旦夕死吾敎子以順殺身庸何悔鈞死愈爾逺矣恱怒奮而起令竒臨刑色不變孫揆昭宗討李克用以揆為兵馬招討制置副使克用伏兵刀黄嶺執揆厚禮而将用之曰公軰當從容廟堂何為自履行陣也揆大罵不詘克用怒使以鋸解之鋸齒不行揆謂曰死狗奴解人當束之以板汝軰安知行刑者如其所言詈不輟至死以忠義相提衡鄭從讜時鄭畋以宰相鎮鳳翔移檄討賊兩人以忠義相提衡賊尤憚之號二鄭云大閑忠義傳序夷齊排周存商商不害亡而周以興兩人至餓死不肯屈卒之武王蒙慙徳而夷齊為得仁仲尼變色言之不敢少損焉故忠義者真天下之大閑歟姦鈇逆鼎搏人而肆其毒然殺一義士則四方解情故亂臣賊子赧然疑沮而不得逞何哉欲所以為彼者而為我也義在與在義亡與亡故王者常推而褒之所以砥礪生民而窒不軌也李𤣥通拜定州總管為黒闥所破愛其才欲以為将𤣥通曰吾當守節以報烏能降爾賊邪不聴囚之故吏有餉飲饋者𤣥通曰諸君見哀吾能一醉遂縱飲謂守者曰吾能劍舞可借刀守士與之曲終仰天太息曰大丈夫撫方面不能保所守尚何視息邪乃潰腹死帝為流涕盧奕安祿山陷東都奕自朝服坐臺被執将殺之即數祿山罪徐顧賊徒曰為人臣者當識逆順我不蹈失節死何恨觀者恐懼奕臨刑西向再拜而辭罵賊不空口逆黨為變色李紳李錡辟掌書記㑹使者召錡稱疾即脅使者為衆奏天子幸得留錡召紳作疏坐錡前紳陽怖栗至不能為字下筆輒塗去盡數紙錡怒罵曰何敢爾不憚死邪對曰生未嘗見金革今得死為幸即注以刃令易紙復然或言許縱能軍中書紳不足用召縱至操書如所欲即囚紳獄中錡誅乃免或欲以聞謝曰本激於義非市名也乃止願至賊中諭天子至意吳漵朱泚反願至賊中諭天子至意帝大恱漵退謂人曰吾知死無益而决見賊者人臣食祿死其難所也方危時安得自計且不使陛下恨下無犯難者即日齎詔見泚具道帝待以不疑者而泚業僭逆故留漵客省不遣卒被害竄伏里中蔣沇徳宗出奉天沇奔行在為賊所拘欲誘署偽職沇絶食不應命竄伏里中不復見京師平乃出本傳顧忠義可為者聞而黙則不安裴潾傳張臯上疏臣蓬葭之生非以邀寵顧忠義可為者聞而黙則不安郤唐兵升殿姚思亷遷代王侍讀高祖定京師府僚皆奔亡獨思亷侍王兵将升殿思亷厲聲曰唐公起義本安王室若等不宜無禮於王衆眙却布列階下帝義之聴扶王至順王閤泣辭去觀者歎曰仁人有勇謂此人乎忠義盖天性王彦章武人不知書常為俚語謂人曰豹死留名其於忠義盖天性五代史能為國家死姚洪自董璋為梁將時洪嘗事璋後事唐為指揮使長興中遣洪将千人戍閬州董璋反遣人以書招洪洪得璋書輒投厠中後璋兵攻破閬州執洪璋曰爾為徤兒我遇汝厚奈何負我邪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘炙感恩不已今天子用爾為節度使何可反邪吾能為國家死不能從人奴以生璋怒然鑊於前令壮士十人刲其肉而食洪至死大罵明宗聞之泣下錄其二子而厚䘏其家五代史不忍背唐張敬達契丹兵圍敬達楊光逺勸敬達降晉敬達自以不忍背唐而救兵且至光逺促之不已敬達曰諸公何相廹邪何不殺我降光逺即斬敬達降契丹耶律徳光聞敬達死哀其忠遣人收𦵏之罵寇城上沈斌晉開運元年為祁州刺史契丹犯塞至于榆林過祁州斌以州兵邀之契丹以精騎剗門斌兵多死城中無備寇将趙延夀留兵急攻之延夀招斌降斌從城上罵延夀曰公父子悮計陷于腥羶忍以犬羊之衆殘賊父母之邦斌能為國死不能効公所為也已而城陷斌自盡其家屬皆没于敵竝五代史争淬伏讎之刃各懐報國之心争淬伏讎之刃破朱泚露布于公異羽義翼忠若鸞若鴻吕溫房元齡賛身得輕用者忠與義有生所甚重者身也得輕用者忠與義也身可殺名不可死志也孝友序捐生以趣義者寜豫期垂名不朽而為之故次序夏侯端以來凡三十三人于左方同上忠義感人李晟無積貲輸粮提孤軍抗羣賊身佩安危而氣不少衰徒以忠義感人故豪傑樂為之死耳本賛秉義挺忠崒然不可奪同上紀信乗黄屋以誑楚赴丹焰而存漢數千年間一人而已賛皇公三良論忠義之心豈膏肓之所羈絆栁宗元賦自古忠臣義士之難得五代之亂三人者或出于軍卒或出于偽國之臣可勝歎哉忠義之徒泣血固守郭曙傳徳宗詔曰四鎮二廷統西夏五十七蕃十姓部落國朝以來相與率職自闗隴失守王命阻絶忠義之徒泣血固守奉遵朝法此皆侯伯守将來修共治之効朕甚嘉之何亡忠誼至是郭子儀吐蕃等掠涇邠子儀屯涇陽軍纔萬人比到寇騎圍已合子儀以數十騎出免胄見其大酋曰諸君同艱難久矣何忽亡忠義而至是邪李景稱臣願割地輸貢賦以效誠欵而仁贍獨堅守不可下世宗使景所遣使孫晟等至城下招諭之仁贍子崇諫幸哭其父病謀與諸将出降仁贍立命斬之監軍使周廷構于中門救之不得於是士卒皆感泣願以死守夀州故治夀春世以其難尅遂徙城下蔡而復其軍曰忠正軍曰吾以旌仁贍之節也五代史忠孝二白以孝事君則忠移孝為忠王遵忠臣見孝部君親在難魏夏侯肯年十三漢中之敗左右提之以走肯曰君親在難焉所走死奮劍以沒王經辭母魏王經為尚書高貴郷公欲討司馬文王王沈王經皆預謀謀訖沈走告文王經獨不行被收泣辭母母顔色不變曰為子則孝為臣則忠人誰不死死得所何恨之也方寸亂矣蜀徐庶從先主曹公獲其母庶辭先主而指之心曰本欲與将軍共圖覇業以方寸之地今失老母方寸亂矣無益于事遂詣曹公忠孝萃於一門晉卞壺為蘇峻苦戰死二子􅀈盱見父沒同赴賊見害母撫二子屍曰父為忠臣汝為孝子何恨徴士翟陽曰父死於君子死於父忠孝萃于一門違孝徇忠晉溫嶠字太真欲将命母崔氏固止之嶠絶裾而去後母亡阻亂不獲歸𦵏不以母辭周處為中丞朝廷惡其彊直及使𨽻夏侯駿西征孫秀知其将死謂之曰卿有老母可以辭處曰忠孝不兩全既辭親事君父母安得而子乎今日我死日也代父死罪史石奢相楚行縣有殺人者追之乃其父也縱父而自悔曰以父立政不孝廢法縱罪非忠也遂自刎以死隨母亡畢諶為兖州别駕張邈劫其母弟妻子太祖謝遣之曰卿老母在彼當去諶頓首無二心既出遂亡吕布破張邈生得諶諶懼太祖曰孝于親豈不忠于君君子不罪之用為魯相孔立身成名王珪拜禮部尚書兼魏王師王問珪何以為忠孝珪曰陛下王之君事思盡忠陛下王之父事思盡孝可以立身可以成名奉上忠事親孝李勣卒帝曰勣奉上忠事親孝歴三朝未嘗有過韓琬舉茂才名動里中刺史行郷飲餞之主人揚觶曰孝于家忠于國令始充賦請行無筭爵儒林榮之諄諄必忠孝承乾好慢游然懼帝祕其迹臨朝言諄諄必忠孝無敢舉者大中間丞郎宴席蒋伸在坐忽酌一杯言曰坐上有孝於家忠於國及名重於時者飲此爵衆皆肅然無敢舉者獨李公景讓起引此爵蒋曰此宜然南部新書不兩立于志寕母䘮免有詔起復本官固請終䘮帝遣岑文本郭譬曰忠孝不兩立今太子須人敎約卿彊起為我卒輔𨗳之志寕乃就職觀書所志惟忠孝大略桓彦範觀書所志惟忠孝大畧誅二張也張柬之勒兵景運門将遂夷諸武桓将起事告其母母曰忠孝不竝立義先國家可也敎子弟濮陽吳君敎子弟未嘗不以忠孝端其本柳宗元序不孝不忠為茍榮冒祿圈牢之物不若也帝嘉其切直蘇源明諫親征忠孝吾子梁臣牛存節病召歸京師将卒語其子知業曰忠孝吾子也不及其他忠孝臣子之大節唐家人傳無父烏生無君烏以為主而世之言曰為忠孝者不兩全夫豈然哉君父人倫之大本忠孝臣子之大節豈其不相為用而又相害者乎抑私與義而已矣盖以其私則兩害以其義則兩得其父以兵攻其君為其子者從父乎從君乎曰身從其君志從其義可也能事其親以孝然後能事其君以忠若烏震者可謂大不孝矣尚何有於忠哉本傳思履其迹馬周臣每讀前史見賢者忠孝未嘗不廢巻長想思履其迹褒忠以勸臣節旌孝以激人倫李源傳父死賊手常悲憤不仕李徳裕薦曰天寶時士罕伏節逆羯始興委符組棄城郭者不為恥而憕約義同列守位自如抵刃就終臣節之光由憕始而源天與至孝絶心仕祿五十餘年常守沉黙理契深要一亂關析百慮洗然抱此精節棄於清世臣竊為陛下惜之穆宗下詔曰昔盗起幽陵振蕩河洛贈太尉憕處難居首正色就死兩河聞風再固危壁殊節卓焉源有曽參之行巢父之操泊然無營汔此高年夫褒忠所以勸臣節也旌孝所以激人倫也其以源為諫議大夫源謝辭吐哀慤無所受學者學為忠與孝陽城遷國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十軰忠孝之門舊史劉褘之拜中書舍人轉相王府司馬高宗謂曰相王朕之愛子以卿忠孝之門藉卿師範所冀蓬生麻中不扶自直耳雖在千百年之前猶敬而慕之韓愈上李尚書書愈也少從事于文學見有忠于君孝于親者雖在千百年之前猶敬而慕之况親逢閤下得不候于左右以求効其懇懇馮伉授醴泉令著喻䝉書十四篇敎以忠孝郷郷授之使轉相敎督本傳不忠三白臣一主二姧以事君棄君於惡私政贊私劉因毁信廢忠移事智伯豫讓交私諸侯漢法孟子曰長君之惡其罪小逢君之惡其罪大逢迎也謂先意𨗳之為惡居下訕上要君者無上利祿三違不出境則利祿也雖曰不要君吾不信也言不忠信語賊人之主事君不忠非孝也禮貳心懐貳孔為臣不忠王鉷弟銲鉷與銲召術士語不軌術士驚引去鉷捕殺之以絶口銲與邢縡善鉷亦交縡與銲謀引右龍武軍萬騎燒都門誅執政作難先二日事覺帝召鉷付告牒鉷意銲與縡連故緩其事但督兩縣尉捕賊㑹高力士以飛龍小兒甲騎四百至斬縡盡禽其黨國忠奏鉷與謀帝不信林甫亦為鉷言故帝原銲不問然欲鉷請銲罪使國忠諷之鉷良久曰弟為先人所愛義不欲捨而謀存帝聞頗怒而陳希烈固争當以大逆鉷未知方上表自觧有詔希烈訊鉷矣有司不肯通奏鉷見林甫林甫曰事後矣俄而銲至國忠問曰大夫與否未及應侍御史裴冕叱銲曰上以大夫故官君五品君為臣不忠為弟不誼大夫豈與反事乎國忠愕然曰與固不可隠不與不可妄銲乃曰兄不與獄具詔銲杖死鉷賜死本傳不諍於君蘇源明言臣不諍于君不忠也墜君命挫國威白居易李陵論墜君命挫國威不可言忠亦何生為李觀晁錯論忠所以補君忠有不遂是臣不臣亦何生為文粹以不忠為忠裴延齡引經誼惑其主以不忠為忠本賛不忠不孝者斬之閩王延義更名㬢自昶世倔彊難制昶相王倓毎抑折之㬢亦憚倓不敢有所發新羅遣使聘閩以寶劒昶舉以示倓曰此将何為倓曰不忠不孝者斬之曦居旁色變五代史近者楊弁首為猖狂扇惑亂卒今則身膏齊斧縈及妻孥生為不忠之臣死為負義之鬼李賛皇一品集賜石雄及三軍勑古無其比劉稹乳臭騃童未有所識皆是郭誼王協乗其昏弱矯託軍情妄獻表章欲求襲劉稹念其一門受戮便欲自取寵榮不義古無其比朕以誘陷劉稹皆是此賊賣上圖全義難容捨賜潞州軍人勑書同上義四白詩書義之府也義者利之本也君能制命為義義以生利利者義之和也義以建利義以成命見義不為無勇也義之與比禮以行義尊卑有禮得其宜也見義不為是為人子聞而能徙何以憂為将息争端得知義所名以義聞不為義疾疾病也見義則不為病稱以好權爾雖有說謂之曰義吾則不知義以為質以義制事子曰義者天下之斷也義以為工君子有勇而無義為亂小人有勇而無義為盜大道廢有仁義老子名以義聞節因事見失義而後禮老子上義為之而有以為老子土地儒有立義以為土地行而服人張乃國維管子曰國有四維其二曰義節不可奪道不可屈文侯軾廬於干木段干木富於義故千乗為之軾廬諸侯為之止戈馮諼折券於薛人為孟嘗君市義晉文公出定襄王子犯曰人未知義未安其居文公于是出定襄王以示事君之禮也石碏滅親大義滅親謂殺子厚共叔多行共叔喻驕蔡仲請討之荘公曰多行不義必自敝子姑待之喻於義君子聞義不能徙是吾憂也不義而富且貴於我如浮雲思義君子行則思義門内恩掩門内之理恩掩義門外之理義斷恩不可刼以兵文子曰夫為義者不可刼以兵不可懸以利以義衛身文子曰世治則以義衛身世亂則以身衛義匡邪矯枉文子曰義者匡邪以為正攘險以為平衞身以為直方外易曰義以方外存義易知終終之可與存義也達義先王修禮以達義斷恩見上思義居則思義義然後取夫行義者以立言踐行豈徒徇名安己而已将以定去就之槩夫專為義則傷生專為生則傷義義重于生全義可也後漢不謀舊國史樂毅去燕之趙趙王欲圗燕毅泣曰臣事昭王猶事大王若獲戾敎于他國終身不謀趙之徒𨽻况燕昭王後嗣乎不忘舊主見上注慕義李膺門生皆禁錮侍御史景毅子實為膺門徒未有錄牒故不及譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍茍安于己自免歸人義之争罪魏王思與梁習俱為西曹令史思直白事失太祖旨将加重辟時思近出習代被收思乃馳還自陳己罪太祖歎習之不言思之職分曰軍中有義士二人不邀功郭憲西平人仁篤為一郡所歸韓約失信衆依羗人多欲取約邀功憲責怒曰人窮歸我約病死揚達所約送與疏憲曰不生圖之豈取死人功太祖視疏問憲名不在中達以情對賜憲爵闗内侯黙受罪後漢段熲討羌凉州刺史郭閎貪其功稽留熲軍不進羌徒久戀鄉悉反叛閎歸罪熲坐徴輸左校羌覆沒營塢吏人守闕訟熲詔問段熲謝罪不敢言枉京師稱為長者自表取罪雷義字仲翁為尚書郎有同時郎坐事當居刑作義黙自表取其罪以論司冦同臺郎覺之委位自上乞贖義罪順帝詔皆除刑免罪不謝范滂字孟博繫獄尚書霍諝理之得免范到京師往見諝而不為謝或讓之滂曰昔叔向嬰罪祁所奚救之未聞羊舌有謝恩之辭祁奚有伐徳之色竟無言養老窮婁護字君卿有故人吕公無子老窮託身于䕶養其妻及公終身恤孤窮楊峻字秀才同郡王象少孤為人傭年十八見使牧羊而私讀書被羊主箠楚峻美其才質贖象著家中聘取立屋然後與别又晉許子章聞王育傭牧學讀書失羊将鬻以償之章遂代育償羊給衣食使與子同學身長八尺容貌絶異復以兄子妻之為立宅分之資産育受之無愧色太守治病蜀張嶷字伯岐病篤家貧廣漢太守何祗通厚嶷與疎闊乃自舉詣祗託以治病祗傾財療治數年乃愈以馬易棺後漢劉翊字相道逢病亡者以馬易棺脫衣歛之又逢死故人困餒於路因殺所駕牛救之遂與俱餓排患救患救解矜窮權濟富義抱義見得思義仁義為干櫓正路孟子曰義者人之正路也孔解牛與給䘮事竇建徳世為農鄉人䘮親貧無以𦵏建徳方耕聞之太息遽解牛與給䘮事鄉黨異之撫棺號慟李綱為齊王憲參軍憲誅露車載屍故吏犇匿綱撫棺號慟為瘞訖乃去篤恩義岑文本撫弟姪篤恩義搢紳義之李義琰章懐太子之廢盡赦宫臣罪庶子薛元超等皆蹈舞義琰獨引咎涕泣搢紳義之詣獄自言李敬元杭州參軍徐太元哀其僚張惠以賊扺死而惠母老乃詣獄自言與惠偕受薄其罪惠得不死太元坐免官敬元廉知之擢鄭州司功可動以義李多祚張柬之将誅二張以多祚素慷慨可動以義乃從容曰謂将軍居北門幾何曰三十年矣将軍擊鐘鼎食貴重當世非大帝恩乎多祚泣數行下曰死且不忘柬之曰将軍知感恩則知所以報今在東宫乃大帝子而嬖竪擅朝危逼宗社國家廢興在将軍将軍誠有意乎捨今日尚何在答曰茍緣王室惟公所使乃引天地以自誓辭氣毅然柬之遂定謀以敬暉李湛為右羽林将軍命總禁兵與多祚王同皎請太子至元武門斬闗入及長生殿白武后曰諸将誅逆臣易之昌宗恐漏大謀不敢豫奏頓首請歸死后病卧顧湛曰我與爾父子不薄亦豫是邪知義蕃将賛曰夷狄性惇故其能知義所在者鷙挺不可遷盖巧不足而諒常有餘觀大奈等事君皆一其志無有顧望用能功績光明為天子倚信至渾瑊􅎤跌光顔軰烈垂無窮惟其諒有餘故也使絶域請代行狄仁傑同府參軍鄭崇質母老且疾當使絶域仁傑詣長吏藺仁基請代行仁基咨其誼舉不失義思亷以諸生侍孱主奮然陳大義挫虓虎而奪之氣勇夫悍心禠駭自郤不敢加無禮于其君誠使有國家者舉不失義天下其何以抗之救韓思忠王晙朔方元帥魏元忠討賊不利劾奏副将韓思忠敗律當誅晙以思忠偏禆權不已制具其人勇智可惜不宜獨誅固争得釋救魏張朱敬則進鳳閣鸞臺平章事張易之誣魏元忠張說欲誅之無敢言者敬則獨奏曰元忠說秉心忠一而所坐無名殺之失天下望乃得不死又宋璟張易之誣魏元忠有不臣語引張說為驗将廷辯説惶懼璟說曰名義至重不可陷正人以求苟免緣此受謫芬香多矣若不測者吾且叩閤救将與子偕死說感其言以實對元忠免死與資錢治䘮郭元振年十六與薛稷趙彦昭同為太學生家嘗送資錢四十萬㑹有縗服者叩門自言五世未𦵏願假以治䘮元振舉與之無少吝亦不質名氏稷等歎駭時人義之初重俊被害官屬莫敢視惟永和丞甯嘉朂號哭解衣褁其首時人義之義士謝叔方太宗曰義士也贖韋儇妹趙驊陳留陷歿于賊時江西觀察使韋儇族妹坐其夫為畿官不供賊沒為婢驊哀之以錢贖韋厚為資給賊平訪近屬歸之時人高其義獨餞於野皇甫鎛鎛之貶前房州刺史班肅以嘗僚獨餞于野朝廷義之送臨賀楊憑所善客徐晦憑得罪至藍田慰餞宰相權徳輿曰君送臨賀誠厚無乃為累乎餘見餞送門同舍當夕直為代竇參為萬年尉同舍當夕直者聞親疾惶遽參為代之㑹失囚京兆按直簿劾其人參曰彼以不及謁而往參當坐乃貶江夏尉人皆義之申直其寃劉鄴徳裕以朋黨抱誣死海上令狐綯久當國更赦不為還官爵至懿宗立綯去位鄴乃申直其寃復官爵世高其義餉姻家故人沈傅師問餉姻家故人帑無儲錢鬻宅以𦵏行義當時為難顔泉明其行義當時以為難負節義張廵負節義或以困阨歸者傾貲振護無吝走人所急辛讜重然諾走人所急周贍朋友甄濟周贍有緩急輒出家貲朋友以義聞任人之患李邕下獄許昌男子孔璋上書天子曰任人之患義也張廵功狀李翰傳張廵功狀表上之帝繇是感悟而廵大節白於世義士多之以義烈聞李綱孫安仁安静自綱五世同居安仁安静復以義烈聞世稱李氏不衰孝義劉家劉易從遷彭城長史永昌中為酷吏周興誣告坐死将刑百姓奔走争解衣投地曰為長史祈福有司平直乃十餘萬當時號孝義劉家亡匿坐死桓彦範御史李福業嘗與彦範謀反被殺福業亦流番禺後亡匿吉州參軍敬元禮家吏捕得元禮俱坐死福業将刑謝元禮曰子有親吾甚愧恨元禮曰公窮而歸我我得已乎見者傷之三世不異居崔𤣥暐三世不異居家人怡怡如也列狄仁傑枉李嶠來俊臣誣狄仁傑等獄将抵死敕嶠與大理少卿張徳裕侍御史劉憲覆驗徳裕等内知其寃不敢異嶠曰知其枉不申是謂見義不為者卒與二人列其枉忤武后旨出為潤州司馬輟馬傾褚以濟樊澤客河朔相衛節度使薛嵩表為堯山令舉賢良方正次潼闗雨淖困不能前有熊執易者同舍逆旅哀之輟所乗馬傾禇以濟自罷所舉是嵗澤上第救魏元忠蘇安恒魏元忠為張易之兄弟所誣獄方急安恒獨申救曰王者有容天下之量故齊其心能進天下之善故除其惡不然則鬼神馮怒隂陽紛舛行而宜之之謂義韓文原道分多匀薄顔杲卿令泉明到河北求宗屬履謙及父故将妻子奴𨽻尚三百餘人轉徙不自存泉明悉力贍給分多匀薄相扶挾度河再從皆同居劉審禮再從皆同居合二百口内外無間言元結曰信而勇者可以全義雍穆親族翟光鄴雍穆親族麄衣糲食與均有無而光鄴處之晏然五代史宗族七百口每食設廣席南唐李昪州縣言民孝悌五代同居者七家皆表門閭復其繇役其尤盛者江州陳氏宗族七百口每食設廣席長㓜以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食五代南唐世家沈斷固分者義也文粹盧藏用紀信碑荀息守言而死事豫讓感遇以自殘石乞烹身以狥白漸離臛目以報丹其義則立於大濟則闕焉同上視之如鴻毛白居易李陵論義重于死則視之如鴻毛死不為悔狄仁傑誠以山東之人重氣義一往死不為悔九世同居孝友傳序張公藝九世同居高宗有事太山臨幸其居問本末書忍字以對天子為流涕賜縑帛而去請死陛南金開元初少卿盧崇道徙嶺南逃還南金匿之俄為讐人所告招捕按南金當重法弟趙璧詣御史王旭自言匿崇道者我也請死南金言弟自誣不情旭怪之趙璧曰母未𦵏妹未歸兄能辨之我生無益不如死旭驚上状𤣥宗皆宥之舉船錢帛奴婢貺之裴寛尚書罷部西歸汴流中日晚維舟見一人坐樹下衣服極弊因命屈之與語大竒之遂為見知曰以君才識必自富貴何貧云也舉船錢帛奴婢貺之客亦不讓語訖上船奴婢偃蹇者鞭撻之公益竒之芝田錄敎行於天下由伯夷之為師也韓文通解自商之前千萬年渾渾然不知義之可換其生也故伯夷哀天下之偷且以彊則伏食其葛薇逃山而死於是後之人竦然而言曰雖餓死猶有義而不懼者况其小者乎故義之敎行于天下由伯夷之為師也與三從昆弟居四十年朱敬則與三從昆弟居四十年貲産無異割股肉啗之李勣平洛陽得單雄信故人也表其材武且言若貸死必有以報請絀官爵以贖不許乃號慟割股肉啗之曰生死永訣此肉同歸于土為收養其子焉悉奉廪賙濟内外親薛戎悉奉廪賙濟内外親無疎逺皆歸之既病以所有分遺之曰吾死矣叮持為歸資衆皆哭而去匍匐請代史許敬宗始虞世基與善心同遭賊害封徳彝常曰昔吾見世基死世南匍匐請代哭趙持滿王方翼其友趙持滿誅死尸諸道親戚莫敢視方翼曰欒布哭彭越義也周文王掩骼仁也絶友義蔽王仁何以事君遂往哭其屍具禮收𦵏金吾劾繫帝嘉之不罪無有難色韓愈書樊宗師孝友聰明家故饒財身居長嫡悉推與諸弟皆優有餘而宗師妻子常寒露飢餒宗師怡然處之無有難色千金散義士四座無凡賔李白義救難之謂也宋子嵩化書賊相戒無往義門往依者五百室李知本事親篤至與弟知隐雍順子孫百餘至貲用僮僕無間也大業末盗賊過廬不入相戒曰無往義門往依者五百室餘室皆免捐生以趣義者寧豫期垂名不朽而為之孝友序義在與在義亡與亡故王者常推而褒之所以砥礪生人而窒不軌也同上欒向儔宗室李晉坐豫太平公主謀晉就刑僚吏犇解惟司功參軍李撝從王如它日晉死哭其屍盡哀姚元崇歎曰欒向儔也民性多逆聖人𨗳之以其義鹿門隠書六闕相望朱敬則以孝義世被旌顯一門六闕相望裴佶授藍田尉徳宗詔發畿縣民城奉天嚴郢為京兆政刻急本曹尉韋重規妻乳且疾不敢免佶請代役當時稱其義義形必霑巾杜甫詩李自倫六世同居准式旌表門閭勑曰其量地之宜高其外門門安綽楔左右建臺高一丈二尺廣狹方正稱焉圬以白而赤其四角使不孝不義者見之可以悛心而易行焉五代史四世同居兄弟猶同産劉君良四世同居兄弟猶同産也門内斗粟尺帛無所私武徳中深州别駕楊宏業至其居凡六院共一庖子弟皆有禮節歎挹而去兄弟讓死王遇弟遐俱為賊執将釋一人兄弟讓死賊感其意盡縱之孝友傳飛鴞食椹而懐音背本忘義者不及飛鴞逺矣窮愁志鎮澆浮莫如尚義李源傳振高義於流俗之外栁宗元上趙宗儒啟以勇義平國難上嚴東川啟同上義感五白送人䘮後漢申屠蟠與濟隂王子居同在太學子居臨沒以身託蟠乃躬推輦送䘮歸遇司𨽻從事義之為封傳䕶送蟠投傳不受也盗還馬孔嵩仲山正身厲行辭公府之京師宿卞亭盗竊其馬尋知是嵩馬乃責讓曰孔仲山善士豈宜侵盗送馬還之刺客不忍殺崔琦諷刺梁兾兾令刺客隂殺之客見琦耕陌上懐詩諷詠乃以實告曰君賢不忍相殺君可亟逃吾亦從此亡矣遂去之琦音竒賊不入縣鄭𤣥還高宻道遇黄巾見𤣥皆拜相約賊不敢入又袁宏見世亂乃混迹母沒不制服設位世莫能名黄巾賊入縣相約不入其廬託孤吳陸瑁同郡徐原愛居㑹稽素不相識臨死遺瑁書託孤㓜瑁為起墓敎𨗳其子後漢傳論曰李膺振㧞汙險之中藴義生風以鼓動流俗激素行以恥威權立亷尚以抑貴勢使天下之士奮迅感槩波蕩而從之幽深牢破家族而不悔至於子伏其死母歡其義壯哉范滂孟博将誅辭母母曰汝今得與李杜齊名吾何恨哉張儉被捕亡抵孔褒遇融融匿之赤眉弛兵赤眉過姜詩里弛兵而過曰驚乎大孝必觸鬼神魏胡昭為鄉里愛孫浪為寇約不犯胡君不忍刺陽球使刺客刺蔡邕客不忍刺又劉平使刺先主亦然又靈公使刺趙盾亦然孔盗賊過閭不入李知本事見義門義城堢劉君良四世同居族兄弟猶同産也門内斗粟尺帛無所私隋大業末荒饉妻勸其異居因易置庭樹鳥雛令鬭且鳴家人怪之妻曰天下亂禽鳥不相容况人邪君良即與兄弟别處月餘宻知其計因斥去妻曰爾破吾家召兄弟流涕以告更復同居天下亂鄉人共依之衆築為堢因號義城堢孝義鄉李自倫六世同居奉勑淮格按孝義旌表必先加按驗孝者復其終身義門仍加旌表得本州審到鄉老程言等稱自倫高祖訓訓生粲粲生則則生忠忠為生自倫自倫生光厚六世從居不妄敕以所居飛鳬鄉孝義鄉匡聖里為仁和里准式旌表門閭義動人倫無不傷歎賛皇一品集論田羣状外議云田肇緣田羣扺法不食而終義動人倫無不傷歎伏見後漢河間人尹次穎川人史玉皆坐殺人當死尹次兄初史玉母諢皆詣官曹求代其命因縊而物故漢帝哀之並赦其死既有故事敢不宻陳假寢夢獲方恵宣太子業二十二年有疾帝憂之一夕容髪為變因假寢夢獲方寤而業少間數日湩流元徳秀初兄子襁褓䘮親無資得乳媼徳秀自乳之數日湩流能食乃止智六白智者樂水智者樂智者動不惑智者智者詐愚用人之智去其詐智者見于未萌智者千慮必有一失愚者千慮必有一得漢書智者利仁知人者智以恬養智以智養恬恬智交相養智者天下之達徳也何如其智信不智也絜瓶之智守不假器智者不失人語其蔽也蕩好智不好學大智子曰舜其大智也與不以智役物聖人智者心之符文子神者智之役神清則智明智者心之符智公則心平絶聖棄智人則百倍老子智不足稱陽處父不役其身其智不足稱智免禍由智免臧武仲之智可謂成人矣臧文仲不智者三作虛器縱逆祀祀爰居是三不智智不如葵仲尼曰鮑莊子之智不如葵葵能衛其足智之難也有臧武仲之智而不容於魯抑有由也其智可及甯武子邦有道則智邦無道則愚其智可及其愚不可及既明且哲以保其身樊遲問智子曰務民之義敬鬼神而逺之可謂智矣子曰人皆曰予智驅而納諸罟擭陷阱之中而莫之避也言其愚中庸樗里之囊史樗里子癯多智秦人號智囊管仲隨馬桓公北征孤竹山失道管仲曰老馬之智可師乃隨馬馬行果得道隰朋尋蟻桓公北征孤竹無水朋曰尋蟻壤可得水乃掘蟻壤果然得水倉舒稱象魏武欲稱象而不可秤倉舒曰載于舟中刻其至以他物驗之可知矣太祖大恱智有餘陳平智周萬物而不遺易智而不詐張老智士無思慮之變則不樂莊子智計歸之魏賈詡自以非太祖舊臣而謀䇿深長懼見猜嫌閉門而自處無私交嫁娶不結高門天下論智計竝歸賈氏也宫之竒在虞晉不加戎季梁在隨楚不為謀三仁未去武王還歸不伐殷智者所慮之於未形逹者所規之于未兆子胥知姑蘇之有麋鹿輔果識智伯之為趙抄穆生謝病以免楚難鄒陽北遊不同吴禍以賢勇智智囊晁錯智如炙輠史淳于髠智如炙輠輠者車之盛膏器也炙之膏流不窮言如髠之智也桓範司馬宣王将誅曹爽桓範赴爽人曰智囊去也杜預多知人號知囊大智若愚不可以無涯之智役有涯之身莊子孔處事有疑非智尉遲恭隠巢計日急恭與長孫無忌入白恭曰處事有疑非智衛兵數逃請聴納室裴矩隋煬帝幸江都衛兵數逃去帝憂之以問矩矩曰今乗輿淹狩已二年諸驍果皆無家人無匹合則不久安臣請皆聴納室帝笑曰公定多智因詔矩盡召江都女子孀家盡恣士所欲即配之不為愚者謀陳子昻奏八科謂智不為愚者謀尚謀又智者尚謀愚者所不聴智慮周宻主鐸智慮周宻時論推允辯給多智李程辯給多智天之象孫思邈曰智者動天之象故欲圎易曰見幾而作不俟終日圎之謂也望塵以知敵數周徳威多智能望塵以知敵數好謀而成者智盧藏用紀信碑其自全近智泌之為人其自全近智賛用智能顯功烈栁宗元答問用智能顯功烈而麽眇連蹇顛頓披縻固其所也五人智不及一韋公韋顗論議典據裴垍韋貫之李絳崔羣蕭俛皆布衣舊繼為宰相朝廷典章多所咨還嘗曰吾儕五人智不及一韋公民性多愚聖人𨗳之以其智皮日休鹿門書智變通之謂也故居於水化書智謀八機權聰悟先見附敏博物白易人謀鬼謀百姓與能謀及卿士書謀之孔臧詩謨謀乎其上文選咨事為謀好謀而成謀不失利疑謀勿成中智以上荀息謂以璧假道於虞曰玩好在耳目之前患在一國之後中智以上乃能之臣料虞君中智之下也運籌帷幄漢祖曰運籌帷幄吾不如子房隨㑹其智傳隨㑹其智足使也識理過人晋謝安毎曰朝之大事衆不能决咨王公無不得又魏舒元陽朝之碎務無問是非至於興廢大事衆莫能斷者而舒徐為籌之多出衆表也知幾其神乎易祭仲知權公羊宋人執鄭祭仲不名賢也為知權宋人曰為我出芻而立哭仲不從則君必死國必亡從其言則可以存易亡古人有權祭仲是反于經然後有善也行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不為也未可與權可與適道未可與立可與立未可與權行中權廢中權見幾而作不俟終日易孟子曰嫂溺援之以手權也男女不親授禮也嫂溺不援是豺狼也王霸視河後漢世祖為王郎所逐南奔至呼沱河使吏具舟楫還曰河流澌無舟可渡衆皆恐復使王覇往視霸欲安衆心且使至河乃止遂矯云冰堅可渡世祖兵至河氷已合遂令霸䕶渡未畢二車氷乃解也吾謀適不用嘉謀嘉猷謀於野䂓矩誠設小大必由彼有人焉謀于長者無謀謀及婦人謀及庶人謀人之軍師敗則死之謀人之邦邑危則亡之張儀在蘇秦度闗變通之間不容髪機也先見至誠之道可以前知見乎蓍龜動乎四體國家将興必有禎祥國家将亡必有妖孽見乎蓍歸動乎四體禍福将至必先知之先覺抑亦先覺者是賢乎知㣲知彰叔向母聞男聲晉叔向母聞向男伯石生視之及堂聞其聲而還曰豺狼之聲也非此莫䘮羊舌氏遂不視之子文欲殺越椒楚子良生子越椒子文曰必殺之是子也熊虎之状豺狼之聲不殺之必滅若敖氏之族贈䇿士㑹将歸晉繞朝知其情贈之以䇿曰子無謂秦無人吾謀適不用也見事遲史范雎隨王稽入秦穰侯問稽車中有客乎稽曰無雎曰穰侯智士而見事遲向疑車中而忘索之乃下伏草穰侯行十里乃反使索車中有先知而無後悔思鱸魚晉張翰為齊王所辟因秋風起忽思鱸魚曰大丈夫所貴適意耳遂棄官歸江東俄而齊王敗人謂翰有先知之明軍勝人亡鍾㑹鄧艾伐蜀劉寔字子真曰破蜀必矣而皆不還客問之笑而不答果如其言先見皆如此類也虞不臘矣晉假道于虞宫之竒曰虢虞之表也虢亡虞必從之晉不可啟冦不可玩虞君不聴宫之奇曰虞不臘矣虢其亡乎屈瑕伐羅楚屈瑕伐羅闘伯比謂其御曰莫敖必敗舉趾高心不固矣果敗穆叔見趙孝伯曰趙孟将死其言偷且年未五十諄諄如八九十不能久矣偷茍且也先識後艱智者見于未萌求知太早同見彈以思鴞辨事方遲異在途而捜索許負之識條侯牛生白犢孔父知其吉祥位踐朱輪趙母知其必敗敏敏則有功黎民敏徳不忘敏叔向曰薳氏有後於楚哉子蕩承君命不忘敏加之以敏齊國莊子來聘禮成而加之以敏左傳告諸往而知來者敏於事而慎於言訥於言而敏于行囘也非助我者於吾言無所不說聞言即解無所起發増益吾與囘言終日不違如愚黙而識之無所請益聞一知十囘也聞一知二賜也開敏張放以公主子開敏敏給國語雞肋楊修字徳祖為曹公主簿操平漢中欲因討劉備而不得進欲守之難為功于是出令唯曰雞肋衆莫曉修曰夫雞肋食之無所得棄可惜也公歸計决矣承意觀色淳于髠以承意觀色為務再見梁惠王終無言惠王問之曰前見王王志在逐後見王王志在音王曰誠聖人也聰悟識亡書漢武帝幸河東亡書三篋唯張安世識之冩得後購得本相校一無遺脫市肆閱書後漢王充字仲壬博學不為章句家貧無書游洛陽市閱所賣書一見誦得遂博覽百家之書記貧人姓名後漢賈續既孤仕郡户曹嵗荒人饑太守尹興使于都亭設貧人粥訊名字畢太守問口說六百人姓名無差謬博物張華博物彊記黙講四海之内若指掌也讀諸刺夏侯湛從祖榮淵第五子七嵗日誦千言經目輒識之文帝召之時有客百餘人人奏刺書郷里姓名示之一徧復使誦之不錯一人應奉讀書五行俱下為郡博物君子晉侯謂子産為博物君子博物多識王粲為侍中識竹簡晉束晳博物時嵩山下得竹簡一枚上兩行科斗字張華問束晳曰北漢明帝顯節陵中䇿文也驗之果然讀碑覆棋王仲宣與人共行讀道邊碑背而誦之不失一字又觀棋局壊粲為覆之棋者不信以怕盖更以它局為之相校不失一路識部曲妻子吳朱桓字休穆為前将軍彊識與人一面數十年不忘部曲萬口妻子盡識之孔謀則通於逺而周於事栁文晉問胷有心者有其謀陳黯辨謀覆載之中胷有心者有其謀然其謀則必為已而先為人也故有孜孜汲汲力于謀者得之則逸身豐家不得則嫉時怨命為天下之謀堯舜有大寶之位不傳之子而傳于他人是為天下之謀得其君也大禹疏鑿横流過其門而不顧啼嬰為天下之謀人為出其溺也后稷勤耕植百榖為天下之謀人為粒其食也其謀信如何哉同上以謀略高自標顯薛逢杜黄裳善謀賛𤣥齡善謀如晦長于斷而𤣥齡善謀兩人深相知故能同心濟謀以佐佑帝浩蕩深謀噴江海李白述徳英謀合鬼神同上贈張相文種有藏弓之恨李斯有稅駕之歎張華顧優游而不獲傳亮賛識㣲而不免此四子者皆神敏知幾聰明志古圗國致覇動必成功而自謀其身猶有此恨况常人哉窮愁志從容合廟謀徙倚瞻王室從容合廟謀杜甫送王信州曵踵為有疾狀姚崇資權譎始為同州張說以素憾諷趙彦昭劾崇及當國說懼潜詣歧王申欵崇他日朝衆趨出崇曳踵為有疾状帝詔問之對曰臣心有憂痛不在足問以故曰岐王陛下愛弟張說輔臣而宻乗車出入王家恐為所誤故憂之於是出說相州死姚崇能筭生張說崇與張說同為宰輔頗懐疑阻屢以事相侵張銜之頗切崇既病戒諸子曰張丞相與吾不叶釁隙甚深然其為人稍懐奢侈尤好服玩吾身沒之後吾同僚當來吊予汝具陳吾平生服玩寳帶重器羅列於帳前張若不顧汝輩家事産族無類矣若顧此吾屬無虞當錄其玩用致公仍以神道碑為請既獲其文登時錄進仍先礱石以待至便鐫刻張丞相見事常遲于我數日之後必當有悔若徴碑文以刋削為辭當引使視其鐫石仍告已具聞上元崇既沒張果至目其服玩者三四姚崇諸子悉如崇戒不數日文成敘述該詳時謂極筆其略曰八柱承天髙明之位列四時成嵗亭育之功全後數日果遣使取本以為辭未周宻欲加刪改姚氏諸子乃引使者視其碑乃告以奏御使者復命張悔恨撫膺曰死姚崇能筭生張說吾今日方知才之不及逺矣度時舞數楊纂為吏部侍郎度時舞數以自進隨方制變張獻誠為政寛裕有機略隨方制變得匿名書内鞾中王鍔善任數待下在淮南時嘗得匿名書内鞾中俄取它書焚之人信其無名者異日因小罪并以所告窮驗衆以為神明諷劉𤣥佐韓滉劉𤣥佐不朝帝宻詔滉曰宜早見天子不可使夫人白首與新婦子孫填宫掖也𤣥佐泣悟言祿山反狀韋見素同平章事明年祿山表請蕃将三十二人代漢将帝許之見素不恱謂國忠曰言祿山反暴天下又以蕃代漢難将作矣國忠不應見素曰知禍之芽不能防見禍之形不能制焉用彼相毎進見未嘗不為帝状之帝不内其語未幾祿山果反機辯横生鄭注守澄與語機辨横生鈞達其意恨相見晚辯對縱横皆合旨要又言辭敏速還同宿構馬上即成曽無㸃竄薛收舊史智數敏給李懐光人服其敏楊纂從子昉武后時為肅機宇文化及子訴治先䕃昉方食未即判遽曰肅機而未食庸知天下有寃而求食乎昉怒取牒署曰父弑隋主子訴隋資可乎人服其敏思致華敏劉禕之擢中書侍郎方是時詔令叢繁禕思致華敏裁可占授少選可待也屬文敏無留思韋承慶掌天官選属文敏無留思雖大詔令未嘗著藁為祝成不淹頃李嗣真高宗東封還詔贈孔子太師命有司為祝司文郎中雷少頴文不稱旨更命嗣真成不淹頃闇誦六經日數千言劉廼少警穎闇誦六經日數千言敏於占對高士廉觀書一見輒誦敏于占對口記徒籍千人無差顔春卿調犀浦主簿嘗送徒于州亡其籍至廷口記物色凡徒籍千餘人長史陸象先異之呼指無悮崔涓性開敏為兖刺史受署未盡識卒吏乃以紙各署姓名傳襟上過前一閱後數百人呼指無悮本傳厮竪一閱輒記姓名李畬遇事蠭鋭雖厮竪一閱輒記姓名士卒居人一見無不識張廵守睢陽士卒居人一見問姓名其後無不識官萬貟未嘗忘姓氏李敬𤣥性彊記雖官萬貟遇諸道未嘗忘姓氏一覽誦千言有若素習公在兩臺有送别四韻詩四十餘首令公誦之一遍倒覆之遂不錯一字其敏悟也如此韓休蘇頲文集序條神䇿軍建置本末蒋乂遷起居舍人㑹詔問神䇿軍建置本末中書討求不獲時集賢學士甚衆悉亡以對乃訪又又條據甚詳宰相高郢鄭珣瑜嘆曰集賢有人哉明日詔兼判集賢院五十年有聖人出孫思邈隋文帝輔政以國子博士召不拜宻語人曰後五十年有聖人出吾且助之太宗初召詣京師吾孫為屬吏孫處約嘗以諸子見思邈曰俊先顯侑晚貴佺福在執兵後皆騐太子詹事盧齊卿之少也思邈曰後五十年位方伯吾孫為属吏願自爱時思邈之孫溥尚未生及溥為蕭丞而齊卿徐州刺史倚冰山楊國忠權傾天下四方之士争詣其門陜州進士張彖力學有大名志氣高大未嘗低節于人人有勸彖令修謁國忠可圗榮顯彖曰爾軰以楊公之勢倚靠如山以吾所見乃冰山耳或皎日大明之際則此山當悮人矣後果如其言時人美其先見開元天寶遺事千里外猶對面語房𤣥齡高祖曰若人機識是宜委任毎為吾兒陳事千里外猶對面語信九白大信不約小信未孚人未知信末宣其用信以守禮失信不立信以接事小所以事大信也仗徳莫如信言以出信敦信書匹夫一為不信猶不可也可復之言信近於義言可復也車無輗軏子曰人而無信不知其可也大車無輗小車無軏其何以行之哉用情上好信則民莫敢不用情著誠去偽禮之經也作大事不以信未嘗可也寡信輕諾必寡信國寶信國之寶也信人之所庇言要争端好信不好學其蔽也絞伐原示信晉文公二三其徳不信信及豚魚闕而不立寧去兵食失則何行譬無輗軏守約推誠忠信以為寶以為甲胄是曰行先不為人下君之所司也名以出信名位不愆則為民所信信以行義義以成命小國所望而懐也信不可知義無所立四方諸侯其誰不解體信以守器動則不失信則車服可保節以誠著名以信聞子路之言傳千乗之國不信其盟而信子路之言言誠信季布之諾諺曰黄金百斤不如布之一諾澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆棄文子不為人下趙文子能敦信不為人下也孔㐀去食不得已而去於斯二者何先曰去食自古皆有死人無信不立子路無宿諾慎于信也退三舍晉文公與楚戰退三舍以報其徳守信也冒雨赴期魏文侯與虞人期獵雨甚文侯曰與人期不可失信乃冒雨而赴也吳起終日不食吳起與故人期食不至起終日不食來乃食郭細侯竹馬之期郭伋字細侯行縣有童兒騎竹馬迎曰聞使君來喜故迎問伋何日廻伋與之期及廻先期不入留一日以示信也范巨卿雞黍之㑹范巨卿張元伯千里為雞黍之㑹及期果至登堂拜母尾生抱橋而死與女子期也匹夫匹婦自經於溝瀆子曰匹夫匹婦之為諒也自經於溝瀆而莫之知也信士分財文子曰使信士分財不如定分而探籌何則有心者之平不如無心者之平晉侯存信去原晉侯圍原命三日之粮原不降命去之曰信人之所庇得原失信云云子木棄信不及三年巨卿赴期無差千里進徳易曰忠信所以進徳也人之所助者信也信以結人周仁之謂信復言非信也言無善惡而必復之非義信也不欺之臣公羊曰區區宋國猶有不欺之臣修辭立誠易曰閑邪存其誠修辭立誠所以居業也不勉而中誠者不勉而中不思而得相在爾室尚不愧于屋漏著誠之義小人閒居為不善無所不至見君子而後厭然掩其不善而著其善人之視己如見其肺肝然誠於中形於外故君子必慎其獨茍無盟信信以發志茍信不繼盟無益也言忠信行篤敬忠信禮之本也忠信之人可以學禮臣能承命為信信於民未施信于民而民信之矣情欲信信而後勞其民信而後諫未信則以為謗己也信之所勸者信也積善之應傳子曰管寧在遼東三十七年歸海中遇暴風船沒惟寧船自若時夜晦暝望見火光趣之得島島無居人又無火燼行者咸異皇甫謐曰積善之應也耿恭拜井後漢耿恭字伯宗守疎勒城城中無水穿井十丈無水恭整衣冠拜井泉涌出神告亭崩晉徐苗有志行常宿亭舍有神告曰亭欲崩遽走出得免恥費輕實恥為辭費也禮踐言諾責與其有諾責寧有已怨也茍欲全吾言安得全吾身史要盟無質禮子曰負蒲人之盟云云大道既隠小信未孚稱以行權爾雖有說謂之守信吾則不知節以名聞名以信聞蘇秦以百詐成一信淮南子云孔上不信則無以使下下不信則無以事上魏徴陳事曰上不信則無以使下下不信則無以事上信之為義大矣疏曰貞觀之初求士如渇賢者所舉即信而任之取其所長常恐不及比來由心好惡以衆賢舉而用以一人毁而棄雖積年任而信或一朝疑而斥為國保於誠信又陳事曰為國基於徳禮保于誠信誠信立則下無二情徳禮形則逺者來格故徳禮誠信國之大綱不可斯須廢也傳曰君使臣以禮臣事君以忠自古皆有死人旡信不立又曰同言而信信在言前同令而行誠在令外然則言而不行言不信也令而不從令不誠也不信之言不誠之令君子弗為也信為萬事本百姓所歸禇遂良論延陀請婚信者疾偽陳子昻謂信者疾偽以信質偽勢不相和同上强循遇人盡信不疑雨雪與相期蕭至忠少與友期諸路㑹雨雪人引避至忠曰寧有與人期可以失信卒友至乃去衆歎服推誠待士李愬沉鷙務推誠待士故能張其卑弱而用之賊來降輒聴其便人之所助在信信之所本在誠陸贄帝曰朕豈不推誠哉然顧上封者惟譏斥人短長類非忠直往謂君臣一體故推信不疑至憸人賣為威福今兹之禍推誠之敝也贄曰人之所助在信信之所本在誠一不誠心莫之保一不信言莫之行故聖人重焉開心待人南霽雲至睢陽與張廵計事退謂人曰張公開心待人真吾所事也遂留廵所精慤而誠孔述睿貞元四年帝念平涼之難尤惻怛以述睿精慤而誠故遣持祠具稱詔臨祭與人期雨雪虎狼不避陸羽奚偽誠信喜之披心示誠李尚隠再選河南尹論議皆披心示誠厮䜿待以誠信曹華至厮䜿必待以誠信人以為難不負約元徳秀信者美徳且夫信者美徳也秦繆尚之而賢臣莫贖劉禹錫論書有死無二者信盧藏用紀信碑魯陽廻日鄒子動天更無有他只在誠信代李石與劉稹書受君命至於觸槐賊入趙孟之門者覩其盛服将朝不忘恭敬悔受君命至於觸槐所以知其不為患也向使趙孟未闢寢門尚安衽席思變計之數無肅敬之容為盗者必激其怒心増其勇氣焉得保其首領哉推是而言人不可不誠矣窮愁志相欺也為之符璽斗斛權衡以信之韓文民性多妄聖人𨗳之以其信皮日休鹿門書信慤然之謂也故居于土宋子嵩化書智有誠實之謂信同上誠切李綘嘗因浴堂北廓奏對極論中官縱侈方鎮進獻之事憲宗怒厲聲曰卿所論奏何大過耶絳前論不已曰臣所諌論于臣無利是國家之利憲宗見其誠切改容慰喻舊唐書仁十白仁者天下之表親為國寶為仁善鄰國之寶也神福仁而禍滛體仁足以長人仁之本與仁者安仁智者利仁君子去仁惡乎成名仁者樂山仁者静仁者夀知者樂可謂仁之方仁逺乎哉為仁由己仁者不憂甚於水火民之于仁也甚于水火水火吾見蹈而死者未見蹈仁而死者也蹈仁同上當仁不讓于師有仁義大道廢仁者漢書仁者百行之宗稱曰用權爾雖有說謂之仁徳吾則不知上仁為之而有以為老子三月不違仁囘也三月不違仁其餘則日月至焉而已矣克寛克仁民罔常懐懐于有仁達徳仁者天下之達徳仁者必有勇勇者不必有仁宣尼訓人一日能用其力子曰有能一日用其力于仁矣我未見力不足者顔子好學三月不違其心見上注仲尼曰臧文仲不仁者三下展禽廢六闗妾織蒲違仁君子無終食之間違仁求仁得仁伯夷叔齊不食周粟無求生以害仁有殺身以成仁好仁不好學其蔽也愚仁親以為寶舅犯曰人無以為寶仁親以為寶注云仁親行仁也仁之為器子曰仁之為器重其為道逺舉者莫能勝行者莫能致也與仁子罕言利與命與仁若聖與仁則吾豈敢仁則吾不知也仁以自衛家語古之君子以仁自衛惻隠之心孟子曰有惻隠之心仁也無惻隠之心非人也仁而不武無能逹也里仁為美處仁擇不處仁焉得智依於仁游于藝天下歸仁一日克己復禮天下歸仁焉仁有三與仁同功而異情有安仁有利仁有勉彊為仁仁之難成久矣君子而不仁者有矣夫未見小人而仁者人而不仁如禮何其仁不足稱也舅犯見利不顧其君其仁不足稱也放麑董仲舒春秋决獄曰君獵得麑使大夫持以歸大夫道見其母隨而鳴感而縱之君慍議罪未定君病恐死欲託孤㓜乃覺之大夫其仁乎遇麑以恩况人乎乃釋之以為子傅於議何如又淮南子孟孫獵得麑使秦巴持歸烹之其母隨而啼巴不忍去之孟孫怒逐秦巴西居一年取為子傅曰夫一麑猶不忍况人乎董仲舒曰君子不麛不卵大夫不諌使持歸非也然而中感母恩難廢君命徙之可也力行近乎仁禮不背本范子曰不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟取數多者仁也田子方養老馬孔仁者有勇段秀實賛曰栁宗元曰太尉為人常低首拱手行歩言氣卑弱未嘗以色待物視之儒者也遇不可必其志决非偶然者宗元不妄許人諒其然也非孔子所謂仁者必有勇乎臨事或折正韓休蕭嵩以休柔易故薦之休臨事或折正嵩嵩不能平宋璟聞之曰不意休能爾仁者之勇也仁恩溥博郝處俊帝曰朕昔從幸未央宫羣仗既過有横刀伏草中者先帝斂轡却謂朕曰事發當死者數十人汝可命出之史臣惟敘此為實處俊曰先帝仁恩溥博類非一臣之弟處傑被擇供奉時有三衛誤拂御衣者懼甚先帝曰左右撫御史我不汝罪有仁心下懐其恩楊晟王建使王宗裕圍晟晟有仁心下懐其恩雖城中食盡無叛者博愛之謂仁韓愈原道忘生從道者仁盧藏用紀信碑以仁厚蓄生人栁宗元啟本柔仁而立極佩韋賦尼丘戮齊而誅夘兮本柔仁而立極柔仁博愛之道洽乎鰥婺同上民性多暴聖人𨗳之以其仁皮日休鹿門書徳出之為仁宋子嵩化書仁者發生之謂也故居于木同上白孔六帖卷二十六
