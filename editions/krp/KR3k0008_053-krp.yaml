body:
  text: 白孔六帖卷五十三唐白居易原本宋孔傳續撰警備一無備二攻守三火攻四追犇五軍師六神助征伐七軍勝祥應八占候九軍行險道十緩伐十一軍期十二禁軍藥兵十三警備一警急附白預備不虞古之善政防其侵軼罔有敵於我師聊以自固軍行右轅左追蓐前茅慮無軍政不戒而備師無成命多備何為先縠彘子云云儆而師徒有嚴險其走集走集壘壁明其伍候部伍相候望也軍旅思險險阻出其覆緩之處當思念以度人隠情以虞言私度己情所能以度彼之能否斥候用戒不虞且無外懼是資中權完其守備荒谷申儆虞蜂蠆之毒楚君之戒分為二廣廣千乗乗隊也右廣初駕數及日中左則受之以至于昬呉國雖羸完修可息莒都恃漏失守用亡夜事請夜事守之事周禮糺守周禮以軍刑糺守守謂部伍也申嚴設伏料敵軍尚嚴終事資謀始握兵之要束甲之虞能軍賈怠刀劒不離身孫權曰昔雋不疑當安平之世刀劒不離身君子武備不可無之勇夫重閉况國乎莒子恃陋申公巫臣謂之云云雖有文事必有武備公羊非呉子遏之自輕行于臯卒兵事以嚴終穀梁曰古者大國過小邑必飾城而請罪禮也飾城修守備也庀武守宋災子罕使西鉏吾庀武守鄭災子産受兵登陴登陴守備也守闗者備他盜漢王曰不設備小秦師左公徒釋甲執氷而踞踞㳺也言無戰志赤白囊邴吉馭吏習邊事織赤白囊書刺取探候也魯擊柝聞於邾邊遽乃止呉言上聞遽告于鄭商人弦髙遇秦師乗馹正營部程不識正營部行伍營陣擊刁斗至明軍不得休息未嘗遇害李廣不然軍士樂從廣而苦不識孔嚴備常若有敵李芃授河陽三城鎮遏使達練事宜嚴備常若有敵衆不敢入冦張獻甫為邠寧節度使築鹽夏二城邊衆畏不敢入冦以江淮甲給太原增馬千疋李吉甫寳應間廢宥州以軍遥𨽻靈武道里曠逺故党項孤弱虜數擾之吉甫始奏復宥州乃治經畧軍以𨽻綏銀道取鄜城神䇿屯兵九千實之以江淮甲三十萬給太原澤潞軍增太原馬千疋由是戎備全輯發義兵堅壁劉晏領江淮租庸事晏至吳郡而襄陽丞王璘反乃與採訪使李希言謀拒之希言假晏守餘杭㑹戰不利走依晏晏為陳可守計因發義兵堅壁㑹王敗欲轉畧州縣聞晏有備遂自晉陵西走陸贄曰修封疆守要害蹊塹隧列屯營謹禁防明斥堠務農足食非萬全不謀非百克不鬭阨害之地俾置屯禦獨孤及曰假令居安畏危以備不虞自可阨害之地俾置屯禦武備張設王鐸為侍中封晉國公綏納流冗益募軍緝器鎧武備張設豫飭戰備顔真卿拜西節度使劉展將反真卿豫飭戰備都統李峘以為生事非短真卿因召為刑部侍郎繕甲兵治陴隍李晟進中書門下平章事晟受命拜且泣曰京師天下本若皆執羈靮誰將復之乃繕甲兵治陴隍以圖收復陸贄上書曰邊陲之戍以保封疆禁衞之旅以備巡警邦之大防也陛下悉而東征邊備空屈占勁兵三千杜兼為濠州刺史徳宗既厭兵大抵刺史重代易至厯年不徙兼探帝意謀自固即修武備募占勁兵三千帝以為才選親兵晝夜警郭晞從征伐有功河中軍亂子儀召首惡誅之其支黨猶反側晞選親兵晝夜警以備非常姦人不得發備邊韋倫謂吐蕃豺虎野心不可事信約宜謹備邊帝喜其言閱鄉兵嚴守禦張鎰出為濠州刺史李靈耀反于汴鎰團閱鄉兵嚴守禦有詔褒美吳少誠叛獨東畿有備王翃徙東都留守既至開田二十餘屯修器械皆良金夀革練士卒號令精明俄而吳少誠叛獨東畿為有備闗東賴之增陴濬隍顔真卿為平原守安禄山逆狀牙孽真卿陽託霖雨增陴濬隍料材壯儲廥廪日與賔客泛舟飲酒以紓禄山之疑果以為書生不虞也其可弛柝崇墉言言其可弛柝亦宜鎮以元老受降城碑分兵防守贊皇一品集賜王宰詔意當卿腹背受敵之處即須分兵防守以備寇虞列置府兵分𨽻禁衞陸宣公奏議太宗萬方底乂猶務戎備列置府兵分𨽻禁衞總戎備彊敵杜甫詩請五原靈武置舟師於河帝㑹羣臣問所以備邊者將作大匠于筠請五原靈武置舟師於河扼其入中書侍郎温彦博曰魏為長壍遏匈奴今司用帝使桑顯和壍邊大道召江南船工大發卒治戰艦頡利遣使來願欵北樓闗請互市帝不能拒突厥頡利傳無備二白不備不虞不可以師請先者去備薄威無備雖衆不可恃也臧文仲曰諸侯相見軍衞不徹警也莫敖伐羅不設備而敗縊于荒谷恃陋莒子恃陋不修城郭浹辰之間楚克其二都疆埸無主以啓戎心卑邾魯及邾戰公卑邾不設備臧文仲曰國無小不可易也蜂蠆有毒況於國乎易晉卜偃曰虢必亡矣下陽不懼而又有功必易晉而不撫其民不可以五稔納斥候示不相備以藩為軍示不相疑狎敵榖梁遂之因氏飲戍者酒而殺之齊人殱焉此之謂狎敵罷屯漢韓安國史漁陽得生口言匈奴逺即上言田作時請罷屯罷屯月餘匈奴大至上谷漁陽安國嘔血而死也國雖大好戰必亡天下雖安忘戰必危主父偃雖曰薄威且乖重閉不整營伍李廣行無部伍行陣就善水草屯舍人人自便不擊刁斗自衞幕府省文書然逺斥候未嘗遇害軍陣立成耿秉行止不結營部逺斥候有警急而軍陣立成讀孝經涼州刺史宋邊患多寇令多冩孝經令家家習之庶使知義盖勲時為漢陽長史諌曰崔杼弑君慶父簒位齊魯非無文學今不急静難之備云云邊不從奏行之果被詔責之輕裘緩帶羊祜在軍常輕裘緩帶身不被甲鈴閣之下侍衞不過數十人也孔不料天下安危事崔植與杜元頴不知兵謂藩鎮且平不復料天下安危事不數月朱克融亂復失河朔以精兵掩不備侯君集李靖討吐谷渾以君集為磧石道行軍總管師次鄯州議所向君集曰王師已至而賊不走險天贊我也若以精兵掩不備彼不我虞必有大利若遁峘山谷克之實難靖然其計簡鋭士約齎深入及其衆於庫山大戰破之毁垣而出王世充隋大業十年齊賊有孟讓者轉寇諸郡至于盱眙世充拒之世充數戰陽不利走壁讓益驕數日稍分其下南畧裁留兵足圍壁世充知賊懈夜夷竈撤幕為方陣外向毁垣旦而出奮擊大破之賊不虞來楊恭仁𤓰州刺史賀拔行威叛朝廷未即討恭仁募趫盪倍道進賊不虞其來遂克二城乗無備擊不意劉仁軌時蘇定方伐髙麗不克髙宗詔仁軌拔軍就新羅與金法敏議去留計將士咸欲還仁軌曰今天子欲滅髙麗未誅百濟留兵鎮守制其心腹雖孽豎跳梁士力未完宜厲兵粟馬乗無備擊不意百下百全戰勝之日開張形勢騰撽濟聲援接虜亡矣敕去盾鄣崔義𤣥陳碩真反義𤣥發兵自統衆繼之詰朝奮擊左右有以盾鄣者義𤣥曰刺史而有避耶敕去之由是衆為用直𢷬其牙契苾何力吐谷渾主伏允在突淪川何力欲襲之薛萬均懲前敗以為不可何力曰賊無城郭逐薦草美水以為生不乗共不虞正恐鳥驚魚駭後無以窺其巢穴乃閱精騎千餘直𢷬其牙斬首數千級髙仙芝討勃律李嗣業髙仙芝討勃律署嗣業及中將田畛為左右陌刀將吐蕃兵十萬屯婆勒城據山瀕水聯木作郛以扼王師仙芝潜軍夜濟信圖河令曰及午破賊不者皆死嗣業提步士升山頽石四面以擊賊又樹大旗先走險諸將從之虜不虞軍至因大潰投崖谷死者十八鼔而驅至勃律擒其主平之握節登陴李絳為山南西道節度使四年南蠻寇蜀道詔絳募兵千人往赴不半道蠻已去兵還監軍使楊叔元者素疾絳遣人迎説軍曰將收募直而還為民士皆怒乃譟而入刼庫兵絳方宴不設備遂握節登陴或言縋城可以免絳不從牙將王景延力戰歿絳遂遇害開門朱延夀昭宗在鳳翔詔延夀圍蔡以披全忠勢擢奉國軍節度使全忠兵每至延夀開門不設備而不敢逼也𢷬虛南蠻傳蔡京貶死崖州以桂管觀察使鄭愚代節度南詔攻交州進畧安南蔡襲請救發湖荆桂兵五千屯邕州嶺南韋宙奏南詔必襲邕管不先防近而圖逺恐𢷬虚絶糧道且深入乃詔襲按軍海門詔鄭愚分兵禦之候其無備屈突通劉迦論反通發闗中兵擊之次安定初不與戰軍中意其怯通陽言旋師而濳入上郡賊未之覺引而南去通七十里舍分兵徇地通候其無備夜簡精兵甲襲破之𢷬不備徐申進嶺南節度使劉闢反表請發卒五千循馬援故道繇㸑蠻抵蜀𢷬闢不備詔可乗虚𢷬賊張道源守趙州為竇建徳所執㑹建徳寇河南間遣人詣朝請乗虛𢷬賊心脅即詔諸將率兵影接俄而賊平出其不意五代髙行周梁晉軍河上莊宗遣明宗東襲鄆州行周將前軍夜遇雨軍中皆欲止不進行周曰此天贊我也鄆人恃雨不備吾來宜出其不意即夜馳涉濟入其城鄆人方覺遂取之乗人之未備者莫若急攻范廷光明宗行韋汴州至滎陽朱守殷反廷光曰守殷反迹始見若緩之使得為計則城堅而難近故乗人之未備者莫若急攻臣請騎兵五百馳至城下以神速駭之乃以騎兵五百自暮疾馳至汴半夜行二百里戰于城下遲明明宗亦馳至汴兵望見天子乗輿乃開門而廷光先入猶巷戰殺傷甚衆守殷死汴州平五代史𢷬其空虛康延孝莊宗初聞延孝言梁必亡喜及聞其大舉也懼曰其將何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五千自鄆趨汴出其不意𢷬其空虚不旬日天下定矣莊宗甚壯其言後董璋等雖不出兵而梁兵悉屬段凝于河上京師無備莊宗卒用延孝䇿自鄆入汴凡八日而滅梁以功拜鄭州防禦使賜姓曰李不知兵所從來馬嗣勲天祐二年羅紹威將誅牙軍乞兵於梁梁女嫁魏適死太祖乃遣嗣勲以長直千人為綵輿入魏致兵器於輿中聲言助葬嗣勲館銅臺夜與魏新鄉鎮兵攻石柱門入迎紹威家屬衞之乃益取魏甲兵攻牙軍牙軍不知兵所從來莫能為備殺其八千餘人遲明皆盡五代史敵心解弛贊皇一品集賜王宰詔意韓信襲厯下之軍李靖翦陰山之冦皆因敵心解弛故得機計不遺宜選精兵掩其無備使吕嘉懐貳而授首孟獲雖縱而必擒特立竒勲永光千古賜仲武詔掩其無備適見度支報狀王宰已似納其情欵發使之時不先聞奏使受章表欲自擅招撫之功昔韓信破田榮李靖擒頡利皆是納降之後潜兵掩襲只令王宰失信豈得損朝廷武威建立竒功伏望降供奉官今日便赴行營自看進兵掩其無備兼許三軍重賞儻立殊功比類諸軍倍加賞賜贊皇一品集論劉稹狀濳移兵取黄澤路任畹李丕與臣狀兩道魏城路陣後被賊掘坑壍至深恐進兵不得古人云戰不勝則易城而處伏望詔義忠朝請潛移兵取黄澤路掩其不備贊皇一品制集披闔不設備羌恠之不敢進崔知温遷蘭州刺史党項羌三萬人寇州兵寡衆懼莫知所出披闔不設備羌怪之不敢進俄㑹將軍權善才兵至破其衆視其陣無法指觀嗤笑哥舒翰賊將崔乾祐為陣十十五五或却或進以陌刀五千列陣後王師視其陣無法指觀嗤笑曰擒賊乃㑹食及戰乾祐旗少偃如欲遯者王師懈不為備伏忽起薄戰王師大潰兵機事以速為神李靖事見謀畧門休祠房趨之崔光逺為京兆尹遣到渭北募僑民㑹賊黨剽涇陽休祠房椎牛呼飲光逺刺知之率兵夜趨其所使百騎彀滿阻其前命驍士合噪賊醉不能師斬其徒二千得馬千噭過期何若曰棄之李光弼判官韋損曰東都乃帝宅公當守之光弼曰氾水崿嶺盡為賊磎子能盡守乎遂檄河南縱官吏避賊閉無留人謂李抱玉曰將軍能為我守南城二日乎抱玉曰過期何若曰棄之即紿賊曰吾糧盡明日當降賊喜斂兵待期抱玉已繕完即請戰賊忿欺急攻之抱玉出竒兵夾擊賊帥周摯引却技雖窮於九攻志益専於三板偪陽懸布之巧汧城鑿穴之竒無傳燮之歎息有周苛之慷慨烈士抗詞痛臧洪之同日直臣致憤惜蔡恭於累旬栁宗元南睢陽碑塞其飛走元稹代諭淮西書若聖天子推含垢之化圖不戰之功使環而守之塞其飛走則男不得耕女不得織鹽茗之路絶倉廩之積空不三數月求諸公於枯魚之肆矣城中糧盡以筒容米陳敬瑄傳王建為西州行營招討使圍凡三歳城中糧盡以筒容米率寸鬻錢二百梯衝外舞缶穴中偵鈴馬非艱㭊骸猶競栁文李晟收長安李晟自東渭橋栘壁光泰門以薄都城連溝柵而賊將張庭芝李希倩求戰晟顧曰賊不出是吾憂也今乃冐死來天誘之矣勒吳詵等縱兵鏖擊賊攻華師急晟以精騎馳救中軍譟而從大破之乗勝入光泰門再戰敗卻僵尸相藉餘衆走白華賊大哭終夜不息翌日將復戰或請待西師晟曰賊既敗當乗機撲殄茍俟西軍是容其為計豈吾利邪乃悉軍軍光泰門使王佖李廣將騎史萬頃將步抵苑北晟先後隤苑垣為道二百步比兵至賊已伐木塞以拒戰晟叱諸將曰安得縱賊今先斬公矣萬頃先登拔柵以入佖督騎繼之賊崩潰執其將段誠諌大兵分道進雷噪震地殊死鬭晟令唐良臣等步騎犇突賊陣成輒北十餘遇皆不勝䠞入白華賊㐲千餘出官軍背晟以麾下百騎自馳之左右呼曰相公來賊驚潰擒馘畧盡泚率殘卒萬人西走田子竒追之餘黨悉降令分慰居人絲毫無所擾别將髙明曜取賊妓一司馬伷取賊馬二即斬以徇坊人之逺者宿昔乃知王師之入也憚燧威拜城上馬燧度長春不下則懐光固守久攻所傷必衆乃挺身至城下見廷光廷光憚燧威拜城上燧顧其心已屈徐曰我自朝廷來可西嚮受命廷光再拜燧曰公等朔方士自禄山以來功髙天下奈何棄之為族滅計若從吾言非止免禍富貴可遂也未對燧曰爾以吾為欺邪今不逺數步可射我披而示之心廷光感泣一軍皆流涕即率衆降燧以數騎入其城衆大呼曰吾等更為王人矣環汴為三十六柵梁本紀秦宗權稱帝陷陜洛懐孟唐許汝鄭州遣其將秦賢盧瑭張晊攻汴賢軍板橋晊軍陜瑭軍萬勝環汴為三十六柵王顧兵少不敢出乃遣朱珍募兵於東都而求救於鄆兖三年春珍得兵萬人馬數百匹乃擊賢板橋拔其四柵又擊瑭萬勝瑭敗投水死宗權聞瑭等敗乃自將精兵數千柵北郊五代史雲梯飛礮五代張敬達石敬瑭反即以敬達為太原四面詔討使六月兵圍太原敬達為長城連柵雲梯飛礮以攻之所為城柵將成輒有大風雨水暴至以壊之堅守百餘日五代王環初孟昶遣其秦州節度使髙處儔代以兵援環未至聞堂倉兵敗亦潰歸處儔判官趙玼閉城不納處儔遂犇成都玼乃以城降成階二州相繼亦降獨環堅守百餘日然後克之城有不可守者大而人少小而衆多糧多而柴水不供壘薄而攻其不足土踈地下溉灌可潰邑闕人疲修緝未就凡若此類速徙之通典守拒法閉壁清野大梁都統李勉將大兵於大梁閉壁清野將誘其入境覆而取之朱泚賊衆集傅於城下築七山堞道以臨城又為層棚上以乾牛革為屋則居内雨射城中城中長兵勁弩皆所不及衆遂乗城而入勉不能抗擁衆宋州大梁遂陷幸奉天記太祖遣葛從周畧地山東下洛州斬其刺史邢善益又下邢州走其刺史馬師素又下礠州殺其刺史袁奉陷五日而下三州五代攻守三圍附白攻必取漢髙祖曰連百萬之衆戰必勝攻必取吾不如韓信破堅摧剛攻無堅城以此攻城何城不克深溝髙壘褁糧坐甲躬擐甲胄親受矢石必取之術堅守之心城若振槁晉釋宋圍能以徳攻金湯之守金城湯池楚國方城以為城漢水以為池雖君之衆無所用之楚屈完謂齊桓公云云合圍十則戰漢書引兵法楚圍宋國易子而食析骸而㸑雖然城下之盟有以國敝不能從華元却子反謂之曰魯連作書繫書射城中燕將得書自殺完守入保拜井泉湧耿恭守踈勒寇戎來攻武守戎昭重圍同得原於重耳信由是明比剋敵於荀吳義然後取易曰乗其墉弗克攻吉同人卦凌城齊侯親鼓士凌城男女乗城而戰以爾鉤援與爾臨衝以伐崇墉臨衝車鉤援引丄城者木攻國之兵短守國之兵長周禮因壘而降文王脩徳伐崇因壘而降晏弱圍萊甲寅堙之環城傅於堞堙土山堞女墻先登倍則攻敵則戰榖梁曰袁紹以土山地道襲魏太祖太祖以長壍拒之雲梯衝車諸葛亮攻郝昭於陳倉以雲梯衝車臨城中照以火箭射之乃燒之梁麗莊子曰梁麗可以衝城不可以窒穴孫子曰善攻者敵不知所守陷堅摧剛楚子圍蔡里而裁城一里設版築也宋皇瑗圍鄭師每日遷舍作壘壍成輒徙合其圍也壘合鄭師哭遂取鄭也開一面吳志孫權征合肥久不拔張紘進計曰古之圍開一面以疑衆心今圍之宻誠懼倂命死戰也九攻九拒史墨翟宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶為城以堞為械九設攻城之機墨子九拒之公輸般攻械盡墨子守有餘公輸出曰吾知所以拒我者吾不言楚王問之墨子曰公輸意過欲殺臣然臣弟子禽猾等三百人在宋楚乃不攻宋也龍韜潛運定拔幟之竒謀鳥陣臨髙起沈砂之妙筭縱敵生患違天不祥功振七畧勇冠三軍孔乗城固守張孝忠為定滄觀察使朱滔遣説復啖以金帛皆不受易定介二鎮間乃浚溝壘修器械感厲將士乗城固守滔悉兵攻之帝詔李晟率師援滔乃解去遂全其軍城固士和康日知擢左武衞大將軍少事李惟岳惟岳叛日知與别駕及步將百人啐牲血共盟固州自歸惟岳使王武俊攻之日知曰城固士和雖引歳未可下且賊所恃田悦耳悦兵血衊邢壕可浮不能殘半堞況吾城之完乎又給為臺檢示曰使者齎詔喻中丞中丞奈何負天子從小兒跳梁哉武俊引兵還斬惟岳以獻非議事不下城陳利正李希烈叛詔哥舒翰討利正為前鋒希烈攻曜襄城利正登陴捍守七十日未嘗櫛沐非議事不下城以數隊出賊攻城設百機巡柵城上束芻灌膏以焚張巡令狐潮以四萬薄城人大恐巡諭諸將曰賊知城中虚實有輕我心今出不意可驚而潰也乗之勢必折乃分千人乗城以數隊出身前驅直薄潮軍軍却明日賊攻城設百機巡柵城上束芻灌膏以焚焉賊不敢向畫攻守勢魯炅安禄山反拜上洛太守速行於帝前畫攻守勢遷南陽太守突圍同上賊將武令珣等擊之城中食盡米斗五十千一鼠四百餓者相枕藉炅被圍凡一年晝夜戰人至相食卒無救至徳二載乃率衆突圍走襄陽李翰張巡功狀表上之曰賊盜神器鴟視二京南臨漢江西逼岐雍羣師列城望風出犇巡守孤城不為却賊欲繞出巡後以擾江淮巡退軍睢陽阨咽領殺賊凡十餘萬賊不敢越睢陽城孤糧盡外救不至猶奮羸起病摧鋒陷堅三軍噉膚而食知死不叛城陷見執卒無撓詞罵叱兇徒精貫白日環壘刳壍灌以流潦吳武陵吳元濟叛武陵遺以書昏迷不返諸侯之師集城下環壘刳壍灌以流潦主將怨攜士卒崩離元濟不悟嚴兵締壘薛收王世充據東京竇建徳來援收曰建徳身總衆以來必飛轂轉糧更相資哺兩賊連固則伊洛之勝負未可歳月定也不若勒諸將嚴兵締壘浚其溝防戒毋出兵二賊可縛致麾下矣為地道崔寧為漢州刺史吐蕃破柘静等州有詔收復嚴武遣寧將而西既薄賊城城皆累石不得攻惟東南不合者丈許諜知之乃為地道再宿而拔拓地數百里虜衆驚相謂曰寧神兵也齊攻四面儻或神筭風驅天威電擊使齊攻四面各裂一隅彼若聚而待之則自窮分而應之則不足東抗則西入南備則北侵腹背受攻首尾皆畏赤族之刑既迫輿觀之計方施則固難期於曩之宥免矣撞車機石竇建徳引兵討化及連戰破之化及保聊城乃縱撞車機石四面乗城拔之固守二年李襲志仕隋始安郡丞大業末盜賊起襲志傾私産募士得三千人乗城拒盜肅銑林士𢎞屢攻之不下遂固守凡二年侯君集討髙昌拔其城見兵車門驅民保城狄仁傑為魏州刺史前刺史懼賊至驅民保城修守具仁傑至曰賊在逺何自疲民萬一虜來吾自辦之何預若輩悉縱就田虜聞亦引去首鼠莫前陸贄李希烈寇襄城詔問䇿安出贄言李勉文吏也而當汴必争地哥舒翰之衆烏合也扞襄城萬鋭之賊本非素習首鼠莫前則守禦失於不足也完濬城隍杜慆咸通中為泗州刺史㑹龎勛反圍城處士辛讜自廣陵來見慆勸出家屬獨以身守慆曰吾出百口求生衆心揺矣不如與將士生死共之衆聞皆泣下慆之聞難完濬城隍閱器械無不具圍凡十月勛累攻不得志㑹招討使馬舉率兵至遂解去圍凡十月飛棚聨柵劉昌裔曲環方攻濮州表為判官環領軍許州又從府遷累進營田副使環卒上官涚知後務吳少誠引兵薄城涚欲遁去昌裔止曰受詔而守死其職也況士馬完奮足支賊若堅壁不戰七日賊衆必衰我以全制之可也涚許諾賊攻堞壊不得修昌裔宻造飛棚聨柵即募突將千人鑿城以出擊賊走之比還柵已立守陴遂安掘壍以遏地道劉昌李希烈取汴江淮大震昌以兵三千守寧陵希烈衆五萬攻之昌掘壍以遏地道相拒凡四十餘日賊數敗乃解圍去引漳水灌城郭子儀連營進圍相州引漳水灌城漫一時不能破賊中糧盡人相食全十五城元結史思明亂因命發宛葉軍挫賊南鋒結屯泌陽守險全十五城帝狩奉天渾瑊帝狩奉天瑊率家人子弟以從授行在都虞候京畿渭北節度使朱泚兵薄城戰譙門晨至日中不解或以芻車至瑊曵車塞門焚以戰賊乃解泚治攻具矢石四集如雨晝夜不息凡浹日鑿壍圜城城中死者可藉人心危惴或夜縋出掇蔬本供御帝與瑊相泣朱泚方據乾陵造雲梁廣數十丈施火輪濡氊及革冐之周布水囊為障指城東北創木廬蒙革周置之運薪土其下將塞隍帝詔瑊授以詔書千餘自御史大夫實封五百户瑊俯伏嗚咽帝撫而遣之以死拒守趙隠祖植當徳宗出狩變倉卒羽衞單寡朱泚攻城急植率家人奴客以死拒守固壘二歳樵蘇皆盡張瓌固壘二歳樵蘇皆盡米斗錢四十千計杯而食號為通腸疫死者争㗖其尸縣首于戸以備饌軍中甲鼓無遺夜擊門為警秦宗權不能守乃解去嬰城自守王重榮黄巢陷長安分兵畧蒲節度使李都不能支乃臣賊然内憚重榮表以自副地邇京師賊調取横數使者至重輩坐傳舍益發兵吏不堪命重榮脅説都曰我所詭謀紓難以外援未至今賊攻掠日急又收吾兵以困我則亡無日矣請絶橋嬰城自守不然變生何以制之都曰吾兵寡謀不足絶之禍且至願以節假公遂犇行在收殘卒嬰城朱宣中和初魏博韓簡東窺曹鄆引兵濟河曹存實迎戰死于陣宣收殘卒嬰城簡圍之六月不能拔引去僖宗嘉其守拜宣天平節度使增堞深溝全忠之攻宣凡十興師四敗績宣才將皆盡益内沮度不能與全忠确則固守增堞深溝為不可逼繚長壕五周百道攻之趙犨黄巢入長安所在盜興陳人詣節度府請犨為刺史表于朝授之既視事㑹屬計曰巢若不死長安必東出闗陳其衝也乃培城疏壍實倉庫峙藁薪為守計民有貲者悉内之繕甲兵募悍勇悉補子弟領兵巢敗果東犇賊將孟楷以萬人寇項犨擊擒之僖宗嘉其功遷檢校司空巢聞楷死驚且怒悉軍據溵水與秦宗權合兵數十萬繚長壕五周百道攻之犨引鋭士出戰屢破賊巢怒將必屠之宗權輸鎧仗軍須賊益張犨小大數百戰勝負相當故人心固乃間道乞師於朱全忠未㡬汴軍至壁西北陳人思奮犨引兵急擊賊破之圍凡三百日而解雉堞崩剝吕子臧武徳初朱粲新衂子臧率兵與馬元規并力元規軍不進子臧曰乗賊新敗上下惶沮一戰可擒若遷延其衆稍集吾食盡致死於我不可當也不納子臧請以所部兵獨進又不許俄而粲得衆復張元規嬰城子臧振腕曰謀不見用坐公死矣賊圍固㑹霖雨雉堞崩剝或勸其降子臧曰我天子方伯且降賊乎乃率麾下數百人赴敵死城亦陷手板畫地陳攻守計賈循從子隠林徳宗引至卧内以手板畫地陳攻守計雲衝傅堞張巡安禄山反嗣吳王祗受詔合河南兵拒禄山乃舉兖以東委巡經畧賊還七月復圍城以雲衝傅堞巡出鈎于枉之使不得進篝火焚梯賊以鈎車木馬進巡輒破碎之賊服其機不復攻穿壕立柵以守増備固守程千里遷上黨長吏賊將蔡希徳圍上黨為賊執仰首敕諸騎使還曰為我報諸將可失師不可失城軍中皆為泣下增備固守賊不能下乃還傅城百里樹木皆刋龎堅安禄山反南陽節度使魯炅表堅為長史兼防禦副使以薛愿為潁川太守共守潁川時陳留滎陽已陷賊南陽被圍而潁川當往來衝賊將何史那承慶悉鋭攻之傅城百里樹木皆刋城中士單寡糧少而愿堅晝夜戰諸郡兵無援者自正月盡十一月賊設木鵝衝車飛梯薄城矢如雨賊皆雷噪夜半踰城入悉完一州辛讜龎勛反攻杜慆於泗州讜合淮南兵入城上讙呌慆與下迎泣表其功于朝授監察御史圍凡十月乃解悉完一州徹民鄣落為蓬籠南蠻傳盧耽部將李自孝者與刺史喻士珍善士珍臣蠻自孝陰與賊通蠻攻城自孝守陴樹麾以自表麾所指蠻輒攻之為下所覺耽殺自孝以徇城左有民樓肆蠻俯射城中耽募勇士燒之器械俱盡二月蠻以雲梁鵝車四面攻上呌謼鵝車未至陴者以巨索鈎繫投膏炬車焚箱間蠻卒盡死耽遣李璹張察率突將戰城下俘斬二千級蠻徹民鄣落為蓬籠如車轝下設枕木推而前不及城文匿蠻其内以穴墉楊忞以罌貯糞瀋沃蠻蠻不能處注以鐵液蓬籠皆火然南詔負衆益治器械斧兵晝夜有聲將擊錦樓衆失色耽遣將出三面皆戰蠻引卻蠻利夜晦輒薄城聞呼嘯衆齊奮城上施鐵籠千炬賊來不得隠屯夫終夜哄蠻不能侵為攂石車李光弼入太原至徳二載思明希徳率髙秀巖牛廷玠將兵十萬攻光弼時鋭兵悉赴朔方而麾下卒不滿萬衆議培城以守光弼曰城環四十里賊至治之徒疲吾人乃徹民屋為攂石車車二百人挽之石所及輒數十人死賊傷十一植小旗城東北隅望周摯軍荔非元禮李光弼使元禮守羊馬城植小旗城東北隅望周摯軍摯持衆直逼城以車千乗載木鵝撞車麾兵填壍數八道並進光弼諭元禮曰中丞視賊過兵不顧何也報曰公欲守邪戰歟光弼曰戰曰方戰賊為我實壍復何怪光弼曰吾慮不及此公勉之元禮遂出戰造雲旝三百具李宻造雲旝三百具以機發石為攻城械號將軍礮進逼東都坎墉先登李愬至懸瓠城賊恃吳房朗山戍晏然無知者李祐等坎墉先登衆從之以羸兵守危堞張巡令狐潮語巡曰足下以羸兵守危堁忠無所立見忠義門守睢陽巡亡議者或謂巡始守睢陽衆六萬既糧盡不持滿按隊出再生之路與夫食人寧若全人飛鳥不敢過辛讜龎勛反攻杜慆於泗州讜聞之挐舟趨泗口貫賊柵以入慆喜曰圍急飛鳥不敢過君乃冐白刃入危城古人所不能乃勸解白衣被甲南蠻傳黎州陷人走匿山谷蠻掠金帛不勝負入自卭峽闗圍雅州遂擊卭州是冬竇滂棄州壁導江儲貲峙械皆亡矣按甲不出蕭頴士走山南節度使源洧辟掌書記賊别校攻南陽洧懼欲退保江陵頴士説曰官兵守潼闗財用急必待江淮轉餉乃足餉道由漢沔則襄陽乃今天下喉襟一日不守則大事去矣且列郡數千人百萬訓兵衰寇社稷之功也賊方専崤陜公何以遽輕土地欲取笑天下乎洧乃按甲不出亦㑹禄山死賊解去攻之百端王彦章世宗攻夀州圍之數重以方舟載礮自淝河中流擊其城又束巨竹數十萬竿上施版屋號為竹龍載甲士以攻之又決其水砦入于淝河攻之百端自正月至于四月不能下踰年不可下張源徳守貝州晉軍壍而圍之已而劉鄩大敗于故元城南走黎陽晉軍攻破洛州而衞州刺史來昭邢州節度使閻寶皆以城降晉磁州刺史靳昭相州張筠滄州戴思逺皆棄城走當此時晉已先下全燕而鎮定皆附于晉自河以北山以東四面千里六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下五代史穹廬連屬如崗阜張敬逵契丹兵圍敬逵也自晉安寨南長百餘里濶五十里敬逵軍中望之但見穹廬連屬如崗阜四面亘以毛索掛鈴為警縱犬往來敬逵軍中有夜出者輒為契丹所得由是閉壁不敢復出延夀等皆有二心無救敬逵意敬逵猶有兵五萬人馬萬匹久之食盡削木篩糞以飼其馬馬死者食之已而馬盡副招討使楊光逺勸敬逵降晉敬逵自以不忍背唐五代史當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳韓文掩其不虞賀魯敗降步真蘇定方命嗣業追之㑹大雪軍中請須霽定方曰今雰晦風烈彼謂我不能師掩其不虞可也緩則逺矣省日兼功上䇿也於是晝夜進收所過人畜至雙河與彌射步真㑹軍飽氣張距賀魯牙二百里陣而行抵金牙山賀魯衆適獵定方兵縱破其牙俘數萬人裴行儉擢累安西都䕶詔行儉送波斯王旦為安撫大食使至西州諸蕃郊迎行儉召豪傑千餘人自隨揚言大熱未可以進宜駐軍須秋都支覘知之不設備行儉徐召四鎮酋長偽約畋謂曰吾念此樂未始忘孰能從吾獵者於是子弟願從者萬人乃陰勒部伍數日倍道而進去都支帳十餘里先遣其所親問安否外若閑暇非討襲者又使人趣召都支都支本與遮匐計及秋拒使者已而聞至倉卒不知所出率子弟五百餘人詣營謁遂擒之是日𫝊契箭召諸部酋長悉來請命並執送碎葉城簡精騎約齎襲遮匐道獲遮匐使者釋之俾前往諭其王并言都支已擒狀遮匐乃降悉俘至京師將吏為刻石碎葉城以紀功不意兵之至梁本紀秦宗權柵北郊王置酒軍中中席王陽起如厠以輕兵出北門襲張晊晊不意兵之至也兖鄆之兵又從而合擊遂大敗之不為備梁臣朱珍太祖遣珍以兵趨滑州道遇大雪珍趨兵疾馳一夕至城下遂乗其城義成軍以為方雪不意梁兵來不為備遂下之掩其不備丁㑹梁軍在魏乃遣㑹及葛從周等將萬人救之㑹等行至河陰謀曰罕之料吾不敢渡九鼎以吾兵少而來逺且不虞吾之速至也出其不意掩其不備者兵家之勝䇿也乃渡九鼎直趨河陽戰于沇水罕之大敗河陽圍解逆風而戰張彦澤天大風契丹揚塵奮擊甚鋭軍中大懼彦澤以問諸將諸將皆曰契丹乗上風而吾居其下宜待風回乃可戰彦澤以為然諸將皆去偏將藥元福獨留謂彦澤曰今軍中饑渴已甚若待風回吾屬為擒矣且逆風而戰敵人謂我必不能所謂出其不意彦澤即拔拒馬力戰契丹犇北二十餘里追至衞村又大敗之契丹遯去至青崗峽遇雪康福登山望見川谷中煙火有吐蕃數千帳不覺福之至福分其兵為三道出其不意襲之吐蕃大駭棄車帳而走殺之殆盡獲其玉璞綾錦羊馬甚衆由是威聲大振貞觀中突厥諸部離叛朝廷將圖進取以李靖率驍騎三千自馬邑出其不意突利不虞於靖見官軍掩至曰唐兵若不傾國而來靖豈孤軍而至一日數驚四年靖進擊破之通典賊醉不能師崔光逺拜御史大夫復為京兆尹遣到渭北募僑民㑹賊黨剽涇陽休祠房椎牛呼飲光逺刺知之率兵夜趨其所使百騎彀滿狙其前命驍士合噪賊醉不能師斬其徒二千得馬千噭俘一酋長以獻自是賊常避其鋒拜西川節度使建中中西山兵馬使張朏襲成都為亂延賞犇鹿頭戍朏酣亂不設備延賞諜知之遣將叱千遂捕斬朏復成都張延賞傳貞觀中吐谷渾寇邊以李靖侯君集任城王宗道五總管征之軍次伏埃城吐谷渾燒去野草以餒我師退保大非川諸將咸言春草未生馬已羸痩不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數合殺傷甚衆大破其國通典兵八出不意火攻四白公羊焚咸丘火攻也疾始火攻征伐之道不過用兵水火之威疾其暴而不仁也縱火救火漢李陵循龍城于四五日抵大澤葭葦中虜上風縱火陵澤中亦縱火自救注自燒營旁草令虜火不及也析松為炬孫權攻合肥新城滿寵募壯士數十人析松為炬灌麻油從上風放火燒賊攻具殺權子弟權遂退兵燒舟船吳志周瑜救劉備與曹公遇赤壁瑜部將黄盖曰操軍方連船舟首尾相接可燒而走乃取蒙衝鬭艦數十艘實以薪草膏灌其中裹以帷幄欺以欲降豫備走舸各繫火船吏士延頸盡放火諸船同時火發風猛延燒岸上營人馬燒溺軍遂退敗也執燧象以犇吳師楚昭王也繫火燧於象尾火發象犇觸吳師燒浮橋岑彭伐公孫述事見水戰門攻即墨田單燒牛事孔推火車焚柵自晨訖晡馬燧遷兵部尚書初田悦新有魏博悦反圍邢州使火將楊朝光以兵萬人據雙崗築東西二柵以禦燧燧率軍營二壘間是夜東壘遁燧令大將李自良等以騎兵守雙崗戒曰令悦得過者斬燧乃推火車焚朝光柵自晨訖晡争擊大破斬朝光焚賊渾瑊朱泚方據乾陵造雲梁廣數十丈施大輪濡氊及革冐之周布水囊為障指城東北創木廬蒙革周置之運薪土其下將塞隍帝召瑊授以詔書千餘自御史大夫實封五百戸瑊俯伏嗚咽帝撫而遣之瑊前與防城使侯仲莊揣雲梁所道掘大隧積馬矢及薪燃之賊乗風推梁以進雲梁及隧而䧟風返悉焚賊皆死舉城讙譟火棚皆燼韓游瓌進邠寧節度留後朱泚大治戰棚雲橋士皆懼游瓌曰賊取佛祠乾木為攻具可以火之既而賊大譟攻南雉游瓌曰是分吾力也趨北雉遣郭詢以鋭士三百持滿直出火其棚投薪于中風返皆燼賊氣沮故諸將推游瓌赴難功第一乗風縱火伊謹路嗣恭討哥舒晃以謹為先鋒下詔州戰把江口水湍駃乃為桴寘薪焉乗風縱火賊焚且溺不可計與諸將追斬晃縛炬于樹徧山澤王雄誕與李子通戰蘇州却之子通以精兵保獨松嶺雄誕遣將陳當率千兵出不意乗髙蔽崦張疑幟縛炬于樹徧山澤子通懼燒營遁追擒之風順荻乾李敬業反武后遣大將李孝逸兵三十萬往擊之屯髙郵監軍魏真宰曰賊其敗乎風順荻乾火攻之利也固請戰遂渡谿擊之敬業置陣久士疲皆顧望不正列孝逸乗風縱火逼其軍軍稍却敬業乃敗焚其攻具李宻宇文化及擁兵十餘萬至黎陽宻與隔水陣化及瞑目為鄙語辱宻宻顧左右曰此庸人圖為帝吾當折箠驅之乃以輕騎五百焚其攻具火終夜不滅縱火焚三十餘屯秦叔寶從通守張須陀擊賊盧明月須陀委營遁明月悉兵追躡叔寶等馳叩賊營門閉不得入乃升樓拔賊旗旘殺數十人營中亂即斬闗納外兵縱火焚三十餘屯乗風火之王雄誕輔公祏擊李子通以雄誕稜為副戰漂水子通敗公祏乗勝追之反為所擠士皆走壁雄誕曰子通狃于勝無營壘今急擊之必克公祐不從雄誕獨提私卒數百䘖枚夜往乗風火之子通大敗走渡太湖杜咸䍧柯反咸監軍出討賊保壘自固道荒漫師不能進咸乃息士示不欲戰陰伺之時旱暑風熾咸縱火譟而前賊眩怖相失自騰踐死擒其酋遂平之焚四百艘劉仁軌孫仁師帥陸軍以進仁軌與杜爽扶餘隆繇熊津白江㑹之遇倭人白江口四戰焚四百艘海水為丹焚橋馬燧田悦反燧進營倉與戰悦走洹而軍造三橋逾洹日挑戰悦不出陰伏萬人將以掩燧燧令諸軍夜半食先鷄鳴時鳴鼓角而潛師並洹趨魏州令曰聞賊至止為陣留百騎持火待軍畢發匿其旁須悦衆度即焚橋燧行十餘里悦率李納等兵踰橋乗風縱火譟而前燧乃令士無動命除榛莽廣百步為場募勇士五千人陣而待比悦至火止氣少衰燧縱兵擊之悦敗走橋已焚衆赴水死者不可計斬首三萬級殺賊將孫晉卿安墨啜虜三千人尸相駘藉三十里淄青兵㡬殱悦夜走魏州熛薰漲天朱宣全忠遣龎師古攻齊州宣瑾皆戍以兵久不下乾寧元年全忠身往薄情河結壘宣瑾三分其兵出擊之全忠迎戰東阿南風急汴軍居下甚懼俄而風返全忠得縱火焚其旁熛薰漲天宣等大北焚營張孝忠田承嗣見其軍整嚴焚營去縱火大呼史建瑭梁軍已破棗彊存審扼下博橋建瑭分其麾下五百騎為五隊一之衡水一之南宫一之信都一之阜城而自將其一各取梁蒭牧者十人㑹下博至暮擒梁兵數十皆殺之各留其一人縱使逸走告之曰晉王軍且大至明日建瑭率百騎為梁旗旘雜其蒭牧者夜叩梁營斬其守門卒縱火大呼斬擊數十百人梁太祖夜拔營去五代史縱火焚梁艦王建及梁將賀瓌攻南城以竹笮維戰艦于河晉兵不得渡南城危甚莊宗積金帛於軍門募能破梁戰艦者至於吐火焚況莫不皆有建及重鎧執梢呼曰晉梁一水間耳何必巧為吾今破之矣即以大甕積薪自上流縱火焚梁艦建及以二舟載甲士隨之斧其竹笮梁兵皆走晉軍乃得渡救南城瓌解圍去凡火攻皆因天時燥旱營舍茅竹積芻穂粮軍營於秸草宿莽之中因風而焚之通典注追犇五白宣子曰逐寇如追犇軍之善政彼竭我盈晉敗齊師于案逐之三周華不注華不注山名也援再衰之斾晉人犇以廣重不能進楚人惎之脱扃拔斾投衡顧曰吾不如大國之數犇也惎教也前徒倒戈攻于後以北斬將搴旗追犇逐北逐倒戈之徒乗破竹之勢勿佚佚獲逐利追犇困獸猶鬭窮寇勿逐緩追逸賊窮寇緩之則走急則致死趙充國引兵至先零先零望見大軍棄輜重渡湟水道進充國徐行驅之或曰逐利行大遲充國曰窮寇緩之則走急則致死戰不逐犇穀梁曰孔乗勝入光泰門李晟為招討使賊將張庭芝求戰晟顧曰賊不出是吾憂也今乃冐死來天誘之矣勒吳詵等縱兵鏖擊賊攻華師急晟以精騎馳救中軍譟而從大破之乗勝入光泰門再戰敗卻僵尸相藉餘衆走白華賊大哭終夜不息古善戰弗逆犇崔知温遷蘭州刺史党項羌入寇㑹將軍權善才率兵至大破復其衆善才欲窮追取之知温曰古善戰弗逆犇且谿谷深草木荒延萬分一有變不可悔善才曰善追敗李光弼賊别將攻好畤破大横闗光弼追敗之李靖兵法曰諸戰鋭等隊打賊敗其駐隊隊别量抽驍健二十人逐北其輜重隊遥呌作聲援不得輒動跳盪隊竒兵隊趁賊退不得過百步如審知賊徒敗散仍須取機追逐通典敵退追犇契丹自中國多故强於北方中國遭契丹者未嘗少得志自晏球擊敗秃餒又走惕隠其餘衆耳遺投村落村落之人以鋤耰白挺所在擊殺之無復遺類王晏球軍師六白荀攸魏太祖聞荀攸名與語大悦曰公達非常人吾得之計事以為軍師也諸葛亮為中郎將成都軍師辛毗魏典諸葛亮僑軍利在急戰每令持重遣骨鯾臣辛毗仗節為軍師以制之當塗得志有軍師祭酒晉書輿服志田忌孫臏為軍師居輜重車中孔李敬業以魏思温為軍師李敬業開三府自稱匡復府上將領揚州大都督以前盩厔尉魏思温為軍師取為謀主張璿劉季述亂璿徒步入洛泣喻張全義并致書諸藩請謀王室之難王師範起兵州欲取璿為謀主不克神助征伐七祈禱附白假言神助史記燕圍即墨田單令城中必祭先祖於廷蜚鳥下食燕軍恠之單宣言神來助今日當有神人為我師有卒入曰臣可為師乎單東向師事之卒曰臣欺君誠無能單曰勿言出入必稱神祠子産劉聰討李矩矩詐降夜襲之矩兵有懼色矩令祠子産揚言神兵助掩賊營大獲鎧馬祈鍾山神晉符堅載記曰堅入寇望見王師部陣齊整又八公山上草木皆類人形憮然有懼色初㑹稽王道子聞堅入寇以威儀鼔吹求助於鍾山神奉以相國之號及望所見若有力焉秦伯以璧祈戰于河傳奉太一旗見旌旗門太一注求神不設備王氏世事張氏五斗米道凝之尤甚為㑹稽内史孫恩攻郡凝之不設備入浄室請禱詔諸將佐曰大道許鬼兵相助遂為恩所害渡河氷合後漢王霸元伯從世祖南馳聞王郎兵在後從者皆恐至呼沱河候吏還白河水流澌無船可濟衆大懼使霸視之霸欲且安衆令至遂跪曰氷堅可渡遂前比至河氷果合遂獲渡世祖悦霸謝曰神靈之祐也孔妄言有神呼野中康承訓詔黔中觀察使秦正謀討賊下招義鍾離定逺龎勛遣吳逈屯北津援濠士舉鋭兵渡淮盡碎其營初勛之遁懼衆不軍妄言有神呼野中曰天符下國兵休勛使下相語符未降故敗北津方渠青蛇楊朝晟為邠寧節度使次方渠水乏有青蛇降險下走視其跡水從而流朝晟使築防環之遂為停淵士飲仰足圖其事以聞有詔置祠命泉曰應聖遇雪誓神俄而和霽王晙進并州都督長史突厥黙啜叛勑晙將并州兵濟河以討晙倍行卷甲捨幕趨山谷夜遇雪恐失期誓於神曰晙事君不以忠不討有罪天所殛者當自蒙罰士衆無罪心誠忠而天鑒之則止雪反風以奬成功俄而和霽時叛胡分二道走晙自東追道及之獲級三千殺牲祭川髙仙芝吐蕃自仁琬以來三討之皆無功天寶六載詔仙芝以步騎一萬出討仙芝乃分軍為三使疏勒趙崇毗自北谷道撥換賈崇瓘自赤佛道仙芝與監軍邊令誠自䕶宻俱入約㑹連雲堡堡有兵千餘城南因山為柵兵九十守之城下據婆勒川㑹川漲不得度仙芝殺牲祭川命士人齎三日糒集水涯士不甚信既涉旗不霑韀不濡兵已成列仙芝喜告令誠曰嚮吾方涉賊擊我我無類矣今既濟而陣天以賊賜我也遂登山挑戰日未中破之拔其城聞廟廷甲馬號令之聲壬午命統軍使張筠趙承泰等率水陸三萬人以救無諸是行也宿衣錦軍武肅王廟廷有聞甲馬號令之聲凡數夕而止及接戰于閩淮人視我師周遍郊野皆丈餘盖陰兵之助也出吳越備史黒風忽起張曲江賀昭陵狀妖賊張志誠見昭陵山上黒風忽起直衝行首莫不昏迷及至慓橋之際並即散走又父老云往年權梁山之徒將逞不軌當時亦有烈風暴雨發自昭陵彼至京城賊還破滅風礫晝㝠導者迷裴行儉為安撫大食使徑莫賀延磧風礫晝㝠導者迷將士饑乏行儉止營致祭令曰水泉非逺衆少安俄而雲徹風恬行數百步水草豐美後來者莫識其處衆皆驚以方漢貳師將軍明日母大郎死唐神堯拜河東節度使九月領大使擊龍門賊母端兒夜過寒津口時明月方出白露初澄於小橋下有二人語言明日母大郎死我輩勤亦不少矣神堯因駐馬問二人再拜起泣言某二人漢兵也昨奉東嶽命兵神管押七十人付龍門助將軍討賊某二人埋骨在此因少憇亦自感傷亦欲先報於將軍耳神堯訝其言深切詢其姓氏俱笑言將軍貴人某僕卒之賤分不當逾言訖蒼惶去云大隊至矣倐忽不見頃疾風如過矢風煙蔽天而過神堯黙喜明日破賊發七十三矢皆中而復得其矢信乎聖王所向至靈亦先為佐佑焉栁宗元龍城録信安王禕討奚於幽州告捷且言戰時士咸見晙與部將髙昭麾兵赴敵天子嗟異陽伯成上疏請卦晙墓表異之乃遣致祭晙王晙傳軍勝祥應八白牙中梟鳴晉謝艾討麻秋梟鳴牙中艾曰梟激也六博得梟者勝果破麻秋梁上鷹集王敦反虞譚於本縣得宋人大姓數萬赴國難有野鷹集屋梁衆大懼譚曰起大義而鷹鷙之鳥來集破賊必矣晉伐齊師曠曰烏鳥之聲樂齊師其遁矣此鳥得空城故樂傳孔烏噪營李敬業反武后遣大將軍李孝逸兵三十萬往擊之屯髙郵孝逸後軍蘇孝祥率竒兵夜度擊敬業孝祥死孝逸退守石梁有烏羣噪敬業營上監軍御史魏真宰曰賊其敗乎風順荻乾火攻之利也固請戰遂度溪擊之敬業置陣久士疲皆顧望不正列孝逸乗風縱火逼其軍軍稍却敬業乃敗雲出軍上白兔舞吐蕃列傳蕭炅為河西節度留後明年吐蕃攻白草安人軍詔臨洮朔方分援冦絶臨洮道白水軍使髙東于拒守冦引去炅遣將追尾有雲出軍上白兔舞大破吐蕃黒氣狀如鬭雞符存審劉鄩攻同州存審與李嗣昭救之居旬日望氣者言有黒氣狀如鬭雞存審曰可以一戰矣乃進軍擊鄩大敗之五代史王方翼次葛水暴漲沈祭以禱師涉而濟又次葉河無舟而氷一昔合時以為祥王方翼傳占候九避忌附白周禮太師執同律以聽軍聲而詔吉凶王者出軍太師吹律合音師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功歌者吹律以詠八風南風音微故曰不競占夢搏晉楚戰城濮晉文夢與楚子搏楚子伏已而盬其腦子犯曰吉我得天楚伏其罪吾且柔之矣注晉侯面向上故得天腦所以柔物也陳天時蜀先主東征秦宻陳天時必無利坐下獄後貰出之知有走氣吳志吳範治厯知風氣孫權襲闗侯侯請降範曰有走氣言降詐也候者白侯去範曰雖去不免期明日之中權立表下漏待之有風動範撫手曰侯至矣皆如言也傳曰楚師陣不違晦陰盡之日兵家所忌六甲窮日鄧禹仲華為王匡所敗明日癸亥匡以六甲窮日不出禹因得更治兵大破之孤虛後漢趙彦少有術朝廷令宗資討太山殘賊彦為資陳孤虛之法以賊屯在莒莒五陽之地宜發五陽郡兵從孤擊虛一戰破之又段潁為羌所圍樊志張亦在圍中夜謂潁曰東南角無復羌宜乗虚引出住百里還攻之可勝從之果破之孔熒惑守歳李晟始晟屯渭橋也熒惑守歳久乃退府中皆賀曰熒惑退國家之利用兵者昌晟曰天子暴露人臣當力死勤難安知天道邪至是乃曰前士大夫勸晟出兵非敢拒也且人可用而不可使之知也夫惟五緯盈縮不常晟懼復守歳則我軍不戰自屈矣皆曰非所及也雲狀如樹馮智戴帝聞其善用兵指雲問曰下有賊今可擊乎對曰雲狀如樹方辰在金金利木柔擊之勝帝竒其對黄氣出西北吳武陵吳元濟未破數月武陵自硤石望東南氣如旗鼓矛盾皆顛倒横斜少選黄氣出西北盤蜿相交武陵告司馬韓愈曰今西北王師所在氣黄白喜象也敗氣為賊日值木舉其盈數不閱六十日賊必亡夫天見其祥宜修事應之兵可憂矣梁臣王景仁開平四年為北面招討使伐趙進營於柏鄉乾化五年正月庚寅日有食之崇政使敬翔白太祖曰兵可憂矣太祖為之旰食是日景仁及晉人戰大敗於柏鄉景仁歸望雲物李元諒貞元三年吐蕃請盟詔以軍從渾瑊㑹平凉元諒軍潘原游瓌軍洛口以為援既㑹元諒望雲物曰不祥彼必有變傳令約部伍出陣俄而果刼盟瑊犇還元諒兵成列出氣若城王世充十四年世充引軍與宻戰洛南有氣若城壓其營世充大敗衆㡬盡李靖贊世言靖精風角鳥占雲祲孤虚之説為善用兵是大不然特以臨機果料敵明根于忠智而已星墜賊營崔義𤣥睦州女子陳碩真反義𤣥發兵而自統衆繼之有星墜賊營義𤣥曰賊必亡沒唐石王重榮傳帝幸定州次莎城百官繼至士民從者亦數萬帝欲入谷中自固以谷有沒唐石惡之徙石門考蓍龜責將帥牛徽帝召徽曰今伐茂貞彼衆烏合取必萬全卿計何日有㨗對曰臣職諫争所言者軍國大體如索賊平之期願陛下考蓍龜責將帥非臣職也既而師果敗每用征伐問無不中馬重績少學數術明太一五紀八象三統大厯居于太原唐莊宗鎮太原每用征伐必以問之重績所言無不中拜大理司直歳不利用兵郭崇韜因問司天司天言歳不利用兵崇韜曰古者命將鑿凶門而出況成筭已決區區常談豈足信也五代福星煥耀正臨天駟贊皇一品集賜王宰詔意卿宜忠憤必在梟夷況自去年以來月頻奄畢今又福星煥耀正臨天駟東漢書云畢為天網網羅不善之人房為明堂方集重華之慶懸象昭晰前史所書今朕奉天道以行誅鼉集城門見妖怪門城中氣死鼓不能聲破亡兆也薛萬均討梁師都也圍師都諸將以城險未可下萬均曰城中氣死鼓不能聲破亡兆也軍行險道十軍道附白穀梁齊桓越千里之險北伐山戎束馬懸車越太行齊桓公推石布土後漢王霸治飛狐道推石布土築亭障自代至平城三百里鑿山開道魏鄧艾自陰平道行無人之地七百餘里鑿山通道造作橋閣山髙谷深粮運將匱頓於危險艾以氈自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油古之為軍不以阻隘薄人於險斥山澤之險失道李廣引兵與大將軍出東道亡失道後大將軍使持糒醪問失道將廣自殺五將失道李陵獨遇戰導軍張騫以嘗使大夏留匈奴中久從大將軍征導軍知善水草處得無饑渴壼頭之近馬援討五溪蠻有兩道從充則塗夷而逺從壼頭路近而水險援以充道棄日費糧不如進壼頭搤其喉充賊自破遂進壼頭賊乗髙守隘船不得進道惡武帝責楊僕曰失期内顧以道惡為解孔扼衝魯炅拜襄鄧十州節度初賊欲剽亂江湖賴炅適扼其衝故南夏以存䇿勲封岐國公迫險非便李光弼僕固懐恩􅎱光弼功陰佐朝恩陳掃除計使者來督戰光弼使傳山陣懐恩曰我用騎今迫險非便地請陣諸原光弼曰有險可以勝可以敗陣于原敗斯殲矣且賊致死于我不如阻險懐恩不從賊據髙原以長㦸七百壯士執刀隨之委物偽遁懐恩軍争獲伏兵發官軍大潰南塞要衝鳳翔節度使李楚琳殺張鎰得位雖數貢奉議者頗言其挾兩端有所狙伺贄諌曰勤王之師在畿内者急宣亟告景刻不可差商嶺既回逺而駱谷又為賊所扼通王命者惟襃邪爾若復阻則諸鎮之向背者我勝則來賊勝遂往此焉㡬㑹不容差跌使楚琳逞憾敢為猖狂南塞要衝東與賊合則我咽喉梗而心膂分矣豈不病哉今顧望兩端是乃天誘其𠂻通歸塗濟大業也帝釋然優詔勞安之陸贄路隘步騎魚貫而前李嗣業髙仙芝討勃律署為左右陌刀將從平石國馳守白石路既隘步騎魚貫而入緩伐十一白書曰天惟五年須暇之子孫冀改悔也詩曰於鑠王師遵養時晦晦昧也言養之待昏昧而伐之觀釁而動見可而進持重縱之使盈其罪逗遛不進逗撓逗遛而致撓敗也孔待其氣衰乃取李靖蕭銑將文士𢎞屯清江孝恭欲擊之靖曰不可士𢎞健將下皆勇士今新失荆門悉鋭拒我此救敗之師不可當宜駐南岸待其氣衰乃取之孝恭不聽食盡氣老可不戰禽江夏郡王道宗年十七從秦王討賊王登玉璧城以望謂道宗曰賊怙衆欲戰爾計謂何對曰武周席勝剡然鋒未可當正宜以計摧之且烏合之衆憚持久若堅壁以頓其鋭須食盡氣老可不戰禽也王曰而意與我合既而賊糧匱夜引去追戰滅之願徐制之牛徽楊復恭叛李茂貞請假招討節伐之帝乃以招討使授茂貞果有功然益偃蹇帝使宰相杜讓能將兵誅討徽諌曰岐國西門茂貞憑其衆而暴若令萬分一不利屈威重奈何願徐制之不聽逗留其兵天下兵馬副元帥李光弼以河東騎五百馳東都夜入其軍且謂賊方闚洛當扼虎牢帥師東出河上檄召兵馬使張用濟用濟憚光弼嚴教諸將逗留其兵用濟單騎入謁光弼斬之軍期十二白莊賈後期穰苴斬之史具軍政令門失期内顧内顧謂思妻子也見上注王恢逗遛當斬之失道後期李廣事見上注不至質田廣明子都擊匈奴不至質引軍空還下太僕杜延年薄責廣明自殺注質所期處誤令失期後漢祭肜次孫與南單于左賢王信擊北匃奴期至涿耶山信初有嫌於彤行出髙門塞九百里得小山乃妄以為涿耶山肜到不見虜而還坐逗遛畏懦而下獄免孔告師期李愬李光顔戰數勝元濟悉鋭卒屯洄曲以抗光顔愬知其隙可乗乃遣從事鄭澥見裴度告師期于時元和十一年十月己夘師夜起未得其時一品集賜沿邊諸鎮宻詔古人云聖人無巧時變是守盖惜其時也昔漢武命將出師輕齎深入耗蠧中國三十餘年竟不能臣伏匃奴蕩定沙漠此未得其時也至宣帝值匈奴百年之運因壊亂㡬亡之厄單于稽首三代稱藩烽燧不設邊城晏如此遭遇其時也禁軍藥兵十三白秦人毒涇上流師人多死傳毒藥傅矢後漢耿恭伯宗以毒藥傅矢曰漢軍箭神矢瘡皆沸虜乃解去禁兵刃吳志賀齊字公苖擊黝歙諸賊中有善禁者交戰官軍刀劒不得拔弓弩射皆還自向齊長情有思曰吾聞金有刀蟲有毒者皆可禁無刃者不可禁彼必能禁吾兵者也乃多作勁木白棓以精卒五千先登賊恃有禁彼必不備以棓擊之禁果不得大敗賊也羊祜遺藥陸抗不疑見示信門投藥水中公羊齊人殲于遂注殲潰也齊强戍之遂人共投藥水中人多死古者有分土無分人戍之非也孔寘鴆于酒于井楊行宻壁黄鄂間杜洪寘鴆于酒于井棄城去行宻知不入命受建牙遇敵飲藥白居易判同饋醪而無他推誠猶可向毒流而不察雖悔寧追同上白孔六帖卷五十三
