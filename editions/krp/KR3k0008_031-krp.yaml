body:
  text: 白孔六帖卷三十一唐白居易原本宋孔傳續撰脣一足二眉三鼻四鬚五律吕六刻漏七方術八卜筮九相十脣一白脣亡齒寒左傳宫之竒云云仲尼升脣孝經鉤命决曰老子脣麄厚瀬鄉記脣者齒之垣春秋元命包云云舌之藩周生列云云黒脣燉煌實録曰王禁字孟曽卒有盗發塜見禁與人摴蒱賜盗者飲出其夜告城門云孟曽使人也發曽塜禁賜酒以黒其脣明日入城黒脣者是也湏臾賊至為門吏所縛朱脣外朗曹植賦沸脣賈誼曰沸脣擾塞垣之下匈奴號也孔博脣婁師德膏脣武平一上書膏脣之伍茍輸讒計脣厚杜紫微脣厚不稱才名出𤨏言劖脣南蠻赤口濮劖其脣使赤持疑於脣吻間韓愈送毛仙翁發言如駃駟囁嚅持疑於脣吻間焦脣道長食盡苦口焦脣李白來日大難烏膏注脣五行志元和末婦人不施朱粉惟以烏膏注脣狀似悲啼者縳舌膠脣唐孫樵逐痁文有司馬安者攘義盗仁縳舌膠脣絳脣杜甫觀公孫大娘舞劎絳脣朱䄂兩寂寞足二白龜文抱朴子内篇曰老君足下龜文又漢書曰宣帝足下龜文足下有毛宣帝樂正子春下堂而傷左足禮足不良郤克不失足於人禮啟予手啟予足曽子病堂上接武堂下布武武足跡也孔足痺王徽帝召徽為御史大夫固辭足痺踵相逮禇亮寢疾帝遣中使候問踵相逮足病發白居易武宗欲召用之是時居易足病發鄭權穆宗立以左散騎常侍持節為回鶻告哀使以足疾辭不許肩輿就道自置其足折之藩鎮李師道浮圖圓静者年八十餘嘗為史思明將驍悍絶倫既執力士權其脛不能折罵曰竪子折人脚且不能乃曰徤兒因自置其足折之且歎曰敗吾事不得見洛城流血曵踵姚崇它日朝曵踵為有疾狀帝召問之對曰臣損足曰無甚痛乎曰心有憂痛不在足足攣盧照隣疾甚足攣足下黒子唐明皇雜録安禄山初為張韓公帳下走使之吏韓公嘗令禄山洗足韓公脚下有黒㸃子禄山因竊窺之韓公顧笑曰黒子吾貴相汝亦能有之乎禄山曰某賤人也不幸兩足皆有比將軍者黒而加大韓公竒而翫之益親厚捧上皇足上皇至咸陽在望賢宫帝拜舞於樓下上皇降樓撫帝而泣帝捧上皇足嗚咽不自勝唐史引足令髙力士脫靴李白引足令髙力士脫靴由是斥去乃浪跡江湖終日沉飲墮車足傷元德秀為魯山令前此墮車禮足傷不能趨拜太守待以客嘉其足力五代王進符彦超鎮安逺軍軍中有變遣進馳奏京師明宗恠其來連嘉其足力以𨽻寧衛指揮足力乏不能拜五代吕琦廢帝發怒曰朕一女尚㓜欲棄之夷狄金帛所以養士而扞國也又輸以資虜可乎崧等惶恐拜謝無數琦足力乏不能拜而先止酒濯足馬周初入京至㶚上逆旅數公子飲酒不顧周周即市斗酒濯足傍衆異之平地謂無足慮遽跌而傷五代馮道嘗戒明宗曰臣為河東掌書記時奉使中山過井陘之險懼馬蹷失不敢怠於御轡及至平地謂無足慮遽跌而傷凢蹈危者慮深而獲全居安者患生於所忽此人情之常眉三白螓首蛾眉蔡澤巨眉史文王虎眉帝王紀云堯眉八彩春秋元命苞云三寸烈士傳云干將子赤鼻眉廣三寸一尺伍子胥眉間一尺白眉京兆眉張敞為婦畫眉人謂之京兆眉也連眉列仙傳陽都女生而連眉以為異後果得仙道也黛眉東觀漢記馬皇后眉施黛左眉小缺補之如粟赤眉琅邪樊宗天鳳中起為盗王莽使平均公亷丹征之宗等欲戰恐其衆與丹兵亂皆朱其眉以相識是謂赤眉賊愁眉桓帝時京師作愁眉細而曲折效梁兾家為之是日収兾婦憂而蹙眉灸眉鄧粲晉紀曰宋歡常以酒狂王澄因叱左右拉歡郭舒厲色曰使君醉左右莫動澄大怒曰别駕枉耶枉我醉因遣灸舒眉頭後事王敦諫敦敦呵曰人以卿癡灸眉舊疾復發也舒曰汲黯朱雲豈癡乎澄時為荆州遂縱酒嬉戯嚬眉西施張氏工梁兾制珠星示象運斗建於雙視春秋元命苞曰天有攝提人有兩眉為人表候陽立於二故眉長二寸注曰攝提兩星頗曲人眉似之也孔覽鏡作眉安樂公主臨淄王誅韋庶人主方覽鏡作眉聞亂走至右廷明門兵及斬其首眉宇元德秀房琯每見德秀嘆息曰見紫芝眉宇使人名利之心都盡隆眉五代王建通眉李賀通眉秀眉楊元琰秀眉眉長覆目毛若虚眉長覆目性殘鷙眉過目袁天綱帝在九成宫令視岑文本曰學堂瑩夷眉過目故文章振天下長眉青韓愈華山女詩白咽紅頰長眉青眉頭不伸五代郭崇韜莊宗思得髙樓避暑乃遣王允平營之宦官曰郭崇韜眉頭不伸陛下雖欲有作其可得乎眉睫增妍栁宗元乞巧文齒牙饒利眉睫増妍九聚眉金臺録朱泚眉分九聚相者告以大貴信之忽軒衣張眉韓文禁去眉開額文宗即位而禁髙髻險粧去眉開額唐車服志䟽眉目楊收又盧奕䟽眉目豐下眉目瓌異李邕既入朝人間傳其眉目瓌異曲眉而豐頰韓愈盤谷序曲眉而豐頰清聲而便體刻眉崔氏性忌有婢刻其眉得色懸䨇眉劉禹錫詩眉間黄色韓愈郾城晚飲城上赤雲呈勝氣眉間黄色見歸期秀整汝陽王璡眉宇秀整鼻四白鼻者心之門養生經東方之人隆鼻淮南子云隆凖漢髙祖凖鼻也鼻為氣户長沙耆舊傳太尉夀少遇相師相師曰凡鼻為氣户君鼻大貴之象也鼻仰而頞富貴之相也史記蔡澤就唐舉相舉云云截鼻列女傳後漢周郁妻納一嵗夫亡父母欲嫁之遂援刀而截鼻莊子曰郢人圬其鼻端若蠅翼使匠斵之匠運斤成風堊盡而不傷鼻雙柱老子飛龍常璩蜀志曰李雄美容貌相工相之曰此人鼻飛龍孔鼻息所衝上拂雲漢李昭德怙權邱愔上䟽曰臣聞其鼻息所衝上拂雲漢鼻長六寸呉元濟山首燕頷側鼻史思明鼻息若龍虎王廷湊醉寢於路有過其所者驚視之曰吾見君鼻之息左若龍右若虎鼻下氣皆黒袁客師嘗度江叩舟而還左右請故曰舟中人鼻下氣皆黒不可以濟金環貫鼻南蠻有穿鼻種以金環徑尺貫其鼻下垂過頥君長以絲係鐶人牽乃行其次以二花頭金釘貫鼻下出鼻出黄膠從容録賀知章忽鼻中出黄膠醫者謂飲酒之過漸能等薫蕕韓愈江陵詩因疾鼻又寒漸能等薫蕕齧鼻五代史王處直養子曰都者執處直因之西宅處直揕其胷曰逆賊吾何負爾然左右無兵遂欲齧其鼻都掣䄂而走處直遂見殺隆凖五代閩世家王審知狀貌雄偉隆凖方口無厚相李嶠身短小鼻口都無厚相時議不以重禄待之廣記鬚五白捋虎鬚呉録朱垣逺成奉觴於孫權曰願一捋陛下鬚王推几前垣進捋鬚曰今日真可謂捋虎鬚王大笑于顋于顋左傳宋華元多鬚伐鄭為鄭敗宋人歌曰于顋于顋棄甲復來黄鬚兒魏志任城王章為北平中郎將討烏丸有功歸太祖大喜捋章鬚曰黄鬚兒定天下大竒長鬚方士廣陵列士傳劉瑜舉方正對䇿髙第人呼為長鬚方士多髯參軍郤超多鬚人謂之多髯參軍衘鬚後漢温序為隗囂將軍所獲序臨斬衘鬚曰大丈夫豈宜鬚汚於土晉張華多鬚好以帛纒之陸雲見狀笑不能止蝟毛獸鬛朱垣捋孫權鬚者後漢司馬直潔白美鬚髯人敬之如神奮髯抵几孔數尺紀處訥髭長數尺髪與身等太穆皇后竇氏生髪埀過頸三嵗與身等容髪為變惠宣太子業有疾帝憂之一昔容髮為變翦鬚李勣嘗暴疾毉曰用鬚灰可治帝乃自翦鬚以和藥鬢髪班秃肅宗皇后呉氏傳肅宗在東宫宰相李林甫隂搆不測太子内憂鬚髪班秃髭貌雄偉司馬晉卿頎而髯令狐綯傳宣帝謂宰相白敏中曰憲宗葬道遇風雨六宫百官皆避獨見頎而髯者奉梓宫不去果誰耶敏中言山陵使令狐楚帝曰有子乎即召綯為知制誥兩昔皆白路巖貶新州刺史美鬚髯至江陵兩昔皆白引刀斷髪𤣥宗貴妃楊氏天寳九載妃復得譴還外第帝感動輟食詔中人張韜光賜之妃因韜光謝帝曰妾有罪當萬誅然膚髪外皆上所賜今且死無以報引刀斷一繚髪奏之曰以此留訣帝見駭惋遽召入禮遇如初赤髪回鶻黠戛斯人皆赤髪以黒髪為不祥鬚髪輙白李日知神龍初為給事中母病取急調侍數日鬚髪輙白髠髯鬢崔嶤為陜虢觀察使俄為軍吏所執髠其髯鬢嶤再拜祈免乃得去髪動顔杲卿初杲卿被殺徇首于衢莫敢収有張湊者得其髪持謁上皇是昔見夣帝寤為祭後湊歸髪于其妻妻疑之髮若動云祝髯髪喬琳辭病力帝賜所執䇿曰勉為良圖與卿别矣不數日祝髯髪舎游佛盧黄鬚後唐莊宗皇后劉氏父劉叟黄鬚善毉卜每怒盡張張廵鬚髯每怒盡張已衰改李白古風春容捨我去秋髪已衰改婦人有鬚李光進母李有鬚數十長五寸長鬚國有土人泛海至一處問之曰長鬚國也其王以公主妻之主亦有鬚土人賦詩曰花無葉不妍女無鬚亦醜乃羣鰕所聚也酉陽雜俎鬚生若黳海州司馬韋敖曾徃嘉興道遇釋子希遁深於繕生之術又能用日辰可代藥石見敷鑷白曰貧道為公擇日拔之經五六日僧請鑷其半及生色若黳矣凡三鑷之鬢不復變座客有祈鑷者僧言取時稍差拔後髭色果帶緑其妙如此髪長五尺李山甫美姿容而多髪黳然長五尺餘每沐出命侍婢捧大金盤承而櫛之有相者疑其婦人呼之方寤樵牧閑談虞童髪未䰉栁宗元詩音班風鬤霧鬢栁毅見龍女風鬟霧鬢異聞集氣攻髪直大中遺事先生又能散髪箕踞用氣攻其髪一條條如植白髪三千丈李太白秋浦歌白髪三千丈縁愁似箇長長吁望青雲鑷白坐相㸔秋日贈元六長吁望青雲鑷白坐相㸔秋顔入曉鏡壯髪凋危冠上挂矢太宗虬鬚嘗戯張弓挂矢酉陽雜俎惟稱好鬚帝以李緯為民部尚書㑹有自京師來者帝曰𤣥齡聞緯為尚書謂何曰惟稱緯好鬚無它語帝遽改太子詹事鬚變負人鏡杜詩莫話清溪髪蕭蕭白映梳贈李秘書婦人以蘇澤髪南詔望苴蠻婦人不粉黛以蘇澤髪鬢髪還應雪滿頭杜寄杜位怒髪猶鬇鬡韓文征蜀聯句緑鬢成霜蓬李白怨歌沉憂能傷人緑鬢成霜蓬虬鬚似太宗杜甫贈汝陽郡王璡律呂六白律本律厯志黄帝使伶倫自大夏之西取嶰谷之竹其竅厚薄均者斷兩節而吹之為黄鍾之宫而制十二管以聼鳯皇之鳴其雄鳴為六雌鳴亦六以此黄鍾之宫而皆可生之是為律本注云大夏西戎國也嶰谷谷名也竅孔也取竹孔與肉薄厚均者截以為管也燕谷和氣北燕有谷地美而寒不生五穀鄒衍乃吹律暖之和氣至谷乃生禾黍楚軍死聲師曠曰吾歌北風又歌南風南風不競多死聲而楚必無功注歌吹律也以詠八風易姓京房本姓李後吹律自改為京氏玉律銅管飛灰之候吹律聼聲史記王者制事立法物度軌則一禀於六律律為萬事根本望敵知吉凶聞聲效勝負盖吹律而聼聲也合其規較之以黍候其氣應之以灰啟廸嵗功敬授人事候四氣應八風風雨之變可以音律知之文子審大小必均薄厚考長短無失毫釐履端於始以啟三日六旬舉正於中用定二十四氣頥隂陽而必變雖風雨而不迷東風入律青雲干吕黍累定而百物信毫釐失而千里差藝精吹管業擅專門六律六同六律合陽聲也六同合隂聲也此十二者以銅為管轉而相生黄鍾為首長九寸立均出度國語律所以立均出度言鍾度皆以律而均也以合隂陽之聲太師掌六律六同以合隂陽之聲典同掌六律六同之和以辨天地四方隂陽之聲還相為宫禮五聲六律十二管還相為宫也注十二律逓相生也還謂循環也八風從律而不姦禮姦忒也六氣斯辨八風不姦吹其斷竹既叶鳯鳴之音驗以飛灰已契蟻行之次制茍乖於長短應必失於忽微參天兩地藝文志大演之數五十推厯生律制器規圓矩方莫不參天兩地兩耦數也金門竹葭莩灰晉律厯志楊泉記取宜陽金門山竹河内葭莩為灰炎帝使羲和占日常儀占月申區占星伶倫造律日大橈造甲子𨽻首造筭數容成造厯秒忽漢書數起於一産氣黄鍾造計秒忽注秒禾芒也忽起於蜘蛛絲言其微也十二律漢律厯志律有十二陽六為律隂六為吕律以統氣類一曰黄鍾二太簇三姑洗四蕤賔五夷則六無射吕以振陽宣氣一曰林鍾二南吕三應鍾四大吕五夾鍾六仲吕三統漢志云三統者天地人事之紀也十一月乾之初九陽伏地故黄鍾為天統六月坤之初六隂氣受任太陽繼養化柔萬物生長楙之於未故林鍾為地統云云仁以養之義以行之今物事各得其理寅木為仁其聲商也為義故太簇為仁云云律長八寸象八卦宓羲之所順天地通神明類萬物之情夫婦子母上生九而倍之下生六而損之皆以九為法九六隂陽夫婦子母之道也異類為子母謂黄鍾生林鍾也同類為夫婦謂黄鍾以大吕為妻也律娶妻黄鍾生林鍾也吕生子林鍾生太簇也天地之情也上損下益黄鍾之管長九寸三分損一下生林鍾益一上生太簇三分損一下生南吕三分益一上生姑洗姑洗三分損一下生應鍾應鍾益一上生蕤賔蕤賔損一下生大吕大吕益一上生夷則夷則損一下生夾鍾夾鍾益一上生無射無射損一下生仲吕隂陽相生自黄鍾左旋八八為位其法皆銅鐵太樂太常主之相生三分損益揚子雲曰聲生於日甲己為角丁壬為羽乙庚為商丙辛為徴戊癸為宫律生於辰謂子為黄鍾丑為大吕之屬也妙察五均工言三統孔樂舞雙鳳西舎利樂舞雙鳳明律吕之和也斷竹為十二律樂志初隋用黄鍾一宫惟擊七鍾其五鍾設而不擊謂之啞鍾唐協律郎張文収乃依古斷竹為十二律髙祖命與孝孫吹調五鍾叩之而應由是十二鍾皆用鑄銅律三百六十銅斛二張文收既定樂鑄銅律三百六十銅斛二銅秤二銅甌十四秤尺一斛左右耳與臋皆方積卜而登以至於斛與古玉尺玉斗同皆藏於大樂署武后時太常卿武延秀以為竒玩乃獻之及將考中宗廟樂有司奏請出之而秤尺已亡其跡猶存以常用度量挍之尺當六之五量衡皆三之一至肅宗時山東人魏延陵得律一因中官李輔國獻之云太常諸樂調皆下不合黄鍾請悉更制諸鍾磬帝以為然乃悉取太常諸樂器入於禁中更加磨剡凡二十五日而成御三殿觀之以還太常然以漢律考之黄鍾乃太簇也當時議者以為非是刻漏七白銅渾設象玉漏授時挈壺氏掌刻漏之職金徒之職銅史之司分以隂陽明晦之時不忒頥其晝夜短長之數無逃金臺銀箭隂陽雖微天地之情可見風雨如晦日夜之度不迷茍昏曉過度致盈縮之差則寢興失時有顛倒之刺敬授人時周禮凡軍事懸壺以序聚柝懸壺以為漏也以次序更聚擊柝備守以警夜及冬則以火爨鼎水沸而沃之冬水凍冷不下故以炊令沸以沃之說文曰漏以銅盛水刻節晝夜百刻待漏後漢范楚每常事嘗晨駐車以待漏也孔改刻漏傅奕善數不傳武德時所改刻漏皆詔奕隂亂漏刻王翃河中尹領節度後務悍將凌正數干法不逞約其徒夜斬闗逐翃翃覺之隂亂漏刻以差其期衆驚不敢發景刻陸贄曰勤王之師在畿内者急宜亟告景刻不可差金丸拂菻中門中有金巨稱一作金人立其端置十二丸率時改一丸落蓮花漏唐李肇國史補越僧靈澈得蓮花漏乃取銅葉製器狀如蓮花置盆水之上底孔漏之水半之則沉每晝夜十二沉為行道之節雖冬夏短長雲隂月黒無差咽蟾蜍李賀云催水咽蟾蜍雞跖集孔壺為漏浮箭為刻漏刻博士六人掌知漏刻凡孔壺為漏浮箭為刻以考中星昏明更以擊鼓為節㸃以擊鍾為節出唐百官志置鼓以候刻渾天銅儀以木櫃為地平令儀半在地下晦明朔望遲速有凖立木人二於地平上其一前置鼓以候刻至一刻則自擊之其一前置鍾以候辰至一辰亦自撞之皆於櫃中各施輪軸鈎鍵闗鏁交錯相持置於武成殿前以示百官無㡬而銅鐵漸澀不能自轉遂藏於集賢院出唐書天文志漏刻之灋馬重績言漏刻之灋以中星考晝夜為一百刻六十分刻之二十為一時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之五代史巻五十七百刻短長取於口不取於數天下多是也杜牧池州刻漏記靈虬傳夕箭杜詩銀箭金壺漏水多李白烏棲曲節晷漏於鍾律李華含元殿賦方術八白執技以事上推歩日者殺黒龍史記黒子北之齊遇日者曰帝以今殺黒龍先生色黒不可行也視日周文為項燕視日視日吉凶舉動之占文即周章緯候鈐决後漢傳曰隂陽推歩之學徃見於墳典然神經恠牒玉䇿金繩闗扃於玉堂之府靡得而闚至乃河洛之文龜龍之圖箕子之術師曠之書緯候之部鈐决之符皆所以探抽𡨕頥參驗人區時有可聞其流風用遁甲七政元氣六日七分逢占者專候挺湏臾孤虛之術及望雲省氣推處祥妖時亦有驗斯道隱逺𤣥奥難原故聖人不語神力罕言性命或開末而抑其端或曲辭以形其義所謂可使由之不可使知之也漢武帝頗好方術道藝之士莫不負䇿抵掌順風而届也任文公善天文曉遁甲役使鬼神請命太山京房自去篤病三年請命太山行過道士張君授以方術所著易林至今行世米道張魯學道鶴鳴山有人受其道者輒出米五斗世謂之米道左慈盤中釣魚曹公欲殺之變為羝羊入羊羣中曹公知不可殺乃謝曰試與公戯耳老羝屈膝曰詎如許復欲執之羣羝屈膝云云召鬼劉根能令人見鬼太守史祈不信因之乃召祈七祖皆面縛責祈祈乃謝而遣之費長房假壺公之符薊子訓取嬰兒之驗趙炳能令枯木生荑茅屋㸑鼎樊英推歩灾異潄水救蜀火楊由見社中水鳩鬬知有兵賊象不赴酒食風起竈李南少明風角女見疾風起吹竈突及井泣辭姑曰此主爨者當之必死五里霧張楷能作五里霧裴優亦能作三里霧求學於張楷不見後優作賊辭連楷無驗以見原風起知火郎顗父宗字仲緩治京氏易善風角星管六日七分能望氣占候為呉縣吏見暴風卒起宗知京師有火灾記時日果如其言郭憲從駕含酒三噀執法奏不敬曰齊國失火故厭之果上言失火也欒巴南潄巴蜀人正旦朝㑹獨後至頗醉又飲而潄曰臣鄉里以臣能治䕶病為臣立廟今旦耆老皆入臣廟故醉成都市失火救之果上言失火有雨來皆酒氣風起庭中父哭子管輅字公明在王𢎞直坐有飄風髙二尺在庚中從申上來童童廻轉輅曰東方有馬吏恐父哭子明日吏至𢎞直子果死也療病人令思過出米漢書張衡為五斗米道東方張角為太平道太平者持九節杖為符咒教病人思過處静室又為姦令祭酒以五千文使都習姦令為主鬼吏主為病者禱請法書病人姓名服罪之意作三通一上天一埋地一沉水為三官書使病者出米五斗號曰五斗米師為益於病昏愚者競師之衡因人作信義舎置米其中有小過令治道百歩則罪除徃來者任食量腹取足過則輙病以鬼道教人衡即角子也隱形石苞謂管輅曰君鄉人翟文耀能隱形輅曰此隂陽蔽匿之道茍得其數四岳可藏况七尺之形遊於變化之内僕正身明其道見數不為異術不為竒僕隱行恠末服斯務矣孫䇿殺道士于吉後照鏡㸔面創見吉在鏡中遂卒百果立生殿庭釣魚呉介象元則有方術呉主使象變化種苽菜百果皆立成又論鯔魚膾最上乃於殿庭穿塪置水垂綸於食頃乃釣得鯔魚也活死人呉士爕字盛為交趾太守病死三日仙人董奉以丸藥以水含之乃蘇四日能語董奉字君蔓丁義以白羽畫水渡江晉丁義授神方於呉猛以白羽畫水渡江夏統水戯統字仲御賈充問統能水戯乎統乃作鯔魚躍鮪䱐引於是風波振駭廻摶大風至含水噀天雲飛雨集矣青囊郭璞授業於河東郭公公以青囊九書與之由是遂洞五行天文卜筮之術攘災轉禍通致無方璞門人趙載竊青囊書未及讀為人所焚後漢叚翳字元章治易明風角有就學未至預知姓名有一生辭歸翳合藥并簡書封於筒下告曰有急發視之到葭萌與津吏争舟撾從者頭破發取膏藥傅瘡乃愈生歎服乃還卒業秀支替戾剛劉曜攻治城石勒訪佛圖澄澄曰相輪鈴聲云秀支替戾剛僕谷劬秃當此羯語也秀支軍也替戾剛出也僕谷劉曜胡位也劬秃當言此軍出捉得曜歸也禁溪水不流徐登孔求見儀形馬周亡帝思之甚將叚方士術求見其儀形治丹劑裴潾帝喜方士而栁泌為帝治丹劑求長年帝御劑中躁病渴裴潾諫之曰夫秦漢之君亦信方士矣如虞生徐福欒大季少君後皆詐譎無成功事暴前䇿皆可驗視穆宗惑方士穆宗雖誅泌而後稍稍復惑方士有布衣張臯者上䟽曰先帝晚節喜方士累致危疾陛下所自知不可蹈前覆迎後悔也游江湖間鄭注以方伎游江湖間依李愬為愬煑黄金餌之寖親遇諫罷方士劉瑑諫罷武宗方士言多懇複許巖士朱朴所善方士許巖士得幸出入禁中言朴有經濟才自鬻其伎裴潾曰今乃方士韋山甫栁泌等以丹術自神更相稱引詭為陛下延年臣謂士有道者皆匿名滅景無求於世豈肯干謝貴近自鬻其伎哉喜術士成􅜉晚喜術士餌藥濵死而蘇王若訥劉仁恭從方士王若訥學長年築舘大安山掠子女充之能言禍福劉從諫傳初術者李琢能言禍福從諫以重幣邀之辟署大將見星門善長短術李丕善長短術與從諫厚善署大將化黄金劉巨容始揚州人申屠生能化黄金見金門隂陽占繇符架之術葉法善括州括蒼人世為道士傳隂陽占繇符架之術能厭劾恠鬼帝聞之召詣京師欲寵以官不拜留内齋場都人自犇火中葉法善嘗在東都凌空祠為壇以祭都人悉徃觀有數十人自犇火中衆大驚救而免法善笑曰此為魅所馮吾以法攝之耳問而信病亦皆已其譎幻類若此止樂明崇儼少隨父恪令安喜吏有能召鬼神者盡傳其術乾封初應岳牧舉調黄安丞以竒技自名髙宗召見甚恱擢兾王府文學試為窟室使宫人奏樂其中召崇儼書桃木為二符剚室上樂即止曰向見恠龍怖而止易占杜生善易占有亡奴者問所從追戒曰自此行逢使者懇丐其鞭若不可則以情告其人果值使者於道如生語使者異之曰去鞭吾無以進馬可折道傍葼代之乃徃折葼見亡奴伏其下獲之它日又有亡奴者生戒持錢五百伺於道見進鷂使者可市其一必得奴俄而使至其人以情告使者以一與之忽飛集灌莽上徃取之而得奴衆以為神請題衿膺桑道茂善太一遁甲術李晟為右金吾大將軍道茂賚一縑見晟再拜曰公貴盛無比然我命在公手能見赦否晟大驚不領其言道茂出懷中一書自具姓名署其左曰為賊逼脅固請晟判晟笑曰欲我何語道茂曰第言凖狀赦之晟勉從己又以縑願易晟衫請題衿膺曰它日為信再拜去道茂果汙朱泚偽官晟収長安與逆徒縛旗下將就刑出晟衫及書以示晟為奏原其死釣魚術五代鄭遨與道士李道殷友善道殷有釣魚術釣而不餌木獺楚廖光圖與伊岳道士伊用昌為林泉之交母病思鱠屬江水夏漲魚不可得用昌探懷出一木獺長三寸許再三祝之投於江中湏臾波浪沸遂擒一巨鱗出獺着魚背堅不可脫用昌舉之木獺耳因作鱠母愈出九國志為方士房中之術多採良家子以充後宫蜀孟昶傳六十四方士格李白草創大還造化合元符交構騰精魄自然成妙用誰知其指的白日可撫弄清都在咫尺北酆落死名南斗上生籍伊予是何者名在方士格譎詐丕誕不信余聞武宗之言是以知耳嘗於便殿言及方士皆譎詐丕誕不可信上曰吾知之矣宫中無事以此遣悶耳余嘗覽曹植論左慈對君逹之類家主及植兄弟以優笑畜之耳斯言信矣唐賛皇公方士論亡牛在鵲巢賈躭精於術數有一叟失牛詣乘國師卜師曰爾牛在賈相公帽筒中叟迎公馬首訴之公笑取筒中式盤據鞍作卦曰爾牛在安國觀三門後大槐鵲巢中徃探樹下見有旁舎繫牛乃其所失者遂獲盗人也芝田録壁畫飲酒張士政畫一婦人於壁酌酒滿杯飲之酒無遺滴逡廵畫婦人面赤半日許所畫濕處壞落其術終不肯傳人酉陽噀水調角江南野史彭玕時寨中得玉笥山道士劉守真能驅鬼神每呉兵掠寨劉則噀水調角風雨雷電倐忽而起呉不能攻迨數年一夕劉死遂戰不利叱咤風雨唐史髙駢傳吕用之自謂與仙真通對駢叱咤風雨或望空顧揖再拜語言俚近卜筮九卜筮婚姻卜怪筮仕卜失賣卜附卜筮官不卜白洪範曰明用稽疑明用卜筮考疑事也官占惟先蔽志官占卜筮官也先斷意後用卜不煩聖人不煩卜筮傳龜筮協從龜從筮從龜從筮逆龜筮共違於人貞卜筮短龜長不如從長也龜象也筮數也爾卜爾筮體無咎言臧會曰僂句不余欺我龜既厭不我告猶卜以决疑不疑何卜鬪亷云違卜不祥占險夫易不可以占險卜僣臧㑹竊僂句以卜為信與僣僣吉爰契我龜不占子曰人而無恒不占而已矣卜不襲吉襲再也卜筮不過三卜筮不相襲謂賣龜筮也决嫌疑禮卜之用龜進斷其志初筮告再三瀆瀆則不告圓神方智易定天下之吉凶莫善於著龜蓍之德圓而神卦之德方以智神以知來智以藏徃端䇿拂龜詹尹對屈原神蔡龜也靈蓍僂句也觀卦察爻鑚龜啓繇考先知之兆誠可决疑揆昆命之文必先蔽志疑衆必殺禮假於鬼神時日卜筮以疑衆殺無赦謂使違禮疑而筮之則不非也前知禮至誠之道可以前知見乎蓍龜動乎四體禍福將至必先知之故至誠如神四體龜四足也言至誠則不欺禮曰昔者聖人建隂陽天地之情立以為易雖有明智之心進斷其志焉深於易者禮青囊卜也拂龜布卦握粟揲蓍遺䇿不中也大横庚庚予為天王漢陳平等迎代王王卜之得兆云云孫賔投蓍用知方朔漢武帝令孫賔筮東方朔詹尹釋䇿不對屈原楚屈原既放心煩志亂徃見大卜詹尹曰余有所疑先生决之詹尹乃端䇿拂龜原曰予寧隨鴻鵠逺舉乎寧與雞鶩争食乎云云詹尹乃釋䇿謝曰用君之心龜䇿不能知之周文王卜獵渭濵其兆曰非熊非羆天錫帝師乃得吕望而歸辨吉凶者存乎辭舎爾靈龜受命如響知來藏徃窮神知化幽贊於神明而生蓍天生神物謂蓍龜也極數知來之謂占探賾索隱鈎深致逺觀變枚卜書枚卜功臣謂歴卜也周禮三兆王兆瓦兆原兆田原之兆謂灼龜發火而形可占其象似玉瓦原之亹杜子春曰王兆顓頊瓦兆帝堯原兆周之兆也繇兆之體百有二十頌千二百記曰天子無筮謂征伐廵守不用筮小事則用筮諸侯有守筮守國之筮有事則用封父之龜天子之龜封父國名諸侯非其國不筮卜宅寢室假爾泰龜有常命龜䇿辭奠龜儀禮卜人奠龜楚注楚荆也以鑚灼龜也置于燋燋炬以然火也乃旅占卒不釋龜告於涖卜涖卜旅長與主人占日者龜焦焦兆不成也趙鞅卜也沉陽趙孟卜救鄭遇水適火太史曰是謂沉陽注云火陽也得水而沉陽青純公羊曰龜青純純縁也謂甲髯千嵗龜青髯以明吉凶龜能七十鑚而無遺不能避刳腸之患莊子露蓍漢書上體不安張禹必齋戒以卜言則獻上不言則有憂色露蓍於星下卜負金隗炤善易臨終謂妻子曰後雖大荒勿賣宅後五年詔使姓龔負吾金以吾所書版索之後如其言妻齎版詣使者使者惘然沉吟乃悟取蓍筮卦成曰妙哉隗生吾不負金賢夫藏金以待太平知吾善易書版寄意金有五百斤盛以青甕埋在堂屋下去壁一丈入地九尺妻掘之果得金卜云其吉終焉允臧允信也臧善也祠部式諸私家不得立雜神及覡巫卜相並宜禁斷其龜易五兆六壬不禁龜蒙狐疑占而從二卜不過三穆卜書成王有疾穆卜公曰我其為王穆卜奪糈周禮罰也卜不中罰不中晉獻公飲大夫酒令司正實爵與史蘇曰驪之役爾云勝而不吉夫克國得妃吉孰大焉故罰汝對曰云云青蓮神蔡彰徃考來翠野靈蓍通幽索隱覩兆於未萌誠為智者退咎於既徃何其壯哉光啓兩儀能成四象存險易之徴示臧否之兆索隱致逺通幽洞微逹以隂陽究其天地合於無際應以未形智能藏徃神以知來行於冠婚明男女之問用於祭祀定犧牲之名射覆知白䑕之傷布兆見豎牛之禍彼敬仲之徴祥必盛齊國且君平之取給將賣成都鬼神其依吉凶可見屈原遐逝詹尹端䇿而無言方朔不歸孫賔投蓍而有說故龜文既踐知李固之將封鳳皇于飛識陳完之必貴開於寘數得自天𤣥卜筮㛰姻晉獻公筮嫁伯姬遇歸妹之暌史蘇占之曰不吉繇曰士刲羊無􅎺女承筐亦無貺也欲納驪姬為夫人卜之不吉筮之吉卜人曰筮短龜長不如從長一薫一蕕十年尚猶有臭崔杼筮娶棠姜曰入其宫不見其妻凶懿氏卜妻敬仲其妻占之曰鳳皇于飛和鳴鏘鏘有媯之後將育于姜筮仕畢萬筮仕於晉辛廖占之曰吉其必蕃昌公矦之子孫必復其始綬笥有虵後漢馮緄拜隴西太守綬笥有兩赤虵分走許曼筮曰二嵗當為邉將官有果名五年為大將南征管輅自卦兾州刺史裴徵辟輅為文學自卦吉凶云當見三貍果見之淮水絶王氏滅王導初渡淮郭璞筮之云云筮家狀孔僖字仲光拜臨晉令崔駰亭伯以其筮家狀之謂曰不吉勸辭辟官僖曰吉凶已見在縣二年而卒賣卜君平杖頭嚴君平賣卜於都市曰得杖頭百錢即閉肆垂簾司馬季主楚人賣卜於長安市宋忠賈誼謂之曰何居之卑行之汚季主捧腹而大笑君平與人子言依於孝張禹為兒時至市觀卜乆之自曉别蓍布卦意王宗以賣卜自奉安帝以博士徴耻占驗見知懸綬於縣庭而逃君平以卜筮賤業而可以便衆人有非正用之則依蓍龜為言利害卜筮官官占帝王立卜占之官故曰官占釁龜月令正月命有司釁龜䇿占兆審卦吉凶周禮上春釁龜擇建立卜筮人書龜開四兆卜師収掌䇿分三易筮人是司技以事卜藝成而下業在其宗三兆之灋見卜筮門三易之灋連山歸藏周易視髙謂以龜背髙者可灼處示宗伯之卜事也作龜謂灼龜人作兆而占之也命龜謂告龜以所卜事涖卜涖臨也謂卜官相示卜師掌開龜之四兆開其占書書其四部故曰四兆見下揚火以作龜致其墨以火灼龜也致墨者熟灼之以明其兆也龜室藏龜之室中否周禮嵗終則計其占之中否也卜人定龜禮史定墨視兆坼也君定體體吉凶也四兆方兆功兆義兆弓兆有其名義未聞六龜六人占龜龜之屬各有名物天龜曰靈屬地龜曰澤屬東果屬西雷屬南龜獵屬北龜若屬燋契周禮箠氏供燋契以待卜事燋爇灼龜之木謂燋契龜之鑿也凢卜以明火爇燋遂吹其後契以受卜師占人掌占龜以八筮占八頌以八卦占筮之八故以眡吉凶也凢卜筮君占體大夫占色史視墨卜人視坼體有吉凶色有善惡墨有小大坼有明徵凢卜筮既事則以繫幣以比其命嵗終則計其占之中否注云既卜筮史書其命龜之事及兆於䇿繫其禮神之幣而合藏焉書曰以啓金縢之書是也九筮筮人掌易辨九筮之名國之大事先筮後卜九筮謂筮更筮咸筮式筮目筮易筮比筮祠筮參筮環云云卜正滕侯曰我周之卜正正官之長也卜怪生男墮地而走安平太守王基令管輅作卦輅曰當有婦人生一男墮地而走入竈宋無忌姝也蛇衘筆烏鷰鬪人見老蛇銜筆輅曰書佐也又烏來入室與鷰闘是官舎乆逺有此三怪無所憂也户前流光王經堂前有一流光鷰雀入懷殷殷有聲輅曰吉遷之徴頃之拜為江夏太守失火管輅在田舎主人患失火輅卜曰明日南陌上有一角巾生駕黒牛故車必邀留如此言生不得已宿然意不安以為圖己乃把刀出門倚積薪假寐欻有一物如獸手中持火舉刀斫腰視之乃狐也火遂絶堂西死男子信都令家驚恐輅筮曰君堂西有兩死男子一持矛一持弓箭矛者主刺項痛弓者射胷腹故心痛果得之疾遂皆愈卜朱卜牛管輅為僕婦卜失牛云當在西面窮邱中懸頭向上果於邱塜得牛婦人告官以輅藏牛按驗乃知失妻有人失妻輅卜之令明旦於東陽城門侯擔豚人牽與共鬬其豚走逸即共追之豚入舎突破主人罋其婦從罋中出盗鹿有人捕鹿晨行有盗其鹿者輅曰汝巷中第三家也伺無人時以瓦子宻發其東第七椽以瓦子著下當送還如其言其夜盗者父病詣輅卜令擔鹿皮肉著故處自愈盗如言乃令鹿主舉掾棄瓦盗父亦病愈也買鞭懸桑樹鮑瑗貧苦不信卜筮㑹淳于智至為作一卦曰君安宅失宜故貧入市有人持馬鞭賣買之以懸舎東大桑樹三年當暴得財如言後浚井得錢十萬銅二十斤燒殺人歩熊字叔羆少好卜筮術數門徒甚盛熊舎側有人燒死吏持熊謂失火熊卜曰得其人矣使從道南行有一人來縛之果言云草惡難耕故燒之風起延燒不知草中有人不卜聖人不煩卜筮昆命於元龜惟先蔽志蔽斷也昆後也朕志先定卜以决疑不疑何卜鬬亷云命付天管輅謂鍾昱曰我卜可以知生死昱曰命付天不付君勞蓍龜郭璞欲為顔含筮含曰年在天位在人脩己而天不與命也守道而不回性也自有性命無勞蓍龜不占而已矣孔投龜於地張公謹秦王將討隱巢亂使卜人占之公謹自外至投龜於地曰凢卜以定猶豫决嫌疑今事無疑何卜之為卜而不吉其可已乎王曰善秦誗趙矜歴襄城丞客死栁州官為歛葬後十七年子夾章始壯自襄陽徃求其喪不得野哭再閱旬卜人秦誗為筮曰金食其墨而火以貴其墓直丑在道之右南有貴神冢土是守宜遇西人深目而髯乃得其實明日有老人過其所問之得矜墓直社北遂歸葬鎻莖自屈義陽王琮子行休琮死桂林行休請身迎柩靈堂鎻一夕莖自屈管上有指跡一竒二並使卜人筮之曰屋於文為尸出指者示也一竒二並三殯也先生告之矣乃趣其所發之如言而一節獨闕城陽公主婚城陽公主初主之婚帝卜之繇曰二火相食始同榮末同戚請晝昏則吉馬周諫曰朝謁以朝思相戒也講習以晝思相成也燕飲以思相歡也婚合以夜思相親也故上下有成内外有親動息有時吉凶有儀今先亂其始不可為也夫卜所以决疑若黷禮慢先聖人所不用乃止改葬占地温大雅改葬其祖卜人占其地曰地則吉不利於君若何大雅曰如子言我含笑入地矣嵗餘卒遇坤之泰太宗文德皇后長孫氏歸寧舅髙士亷妾見大馬二丈五立舎外懼占之遇坤之泰卜者曰坤順承天載物宜無疆馬地類也之泰是天地交而萬物通也又以輔相天地之宜繇協歸妹婦人事也女處尊位履中而居順后妃象也折足為敗李綱在隋宦不進筮之得鼎筮人曰君當為卿輔然待易姓乃如志仕不知退折足為敗綱雖顕於唐數稱疾辭位去張公謹賛曰投機之㑹間不容檖公謹所以抵龜而决也自筮死日李嗣真流藤州乆得還自筮死曰豫具棺斂如言卒一卦帛十疋天寳末處士錢知微甞至洛遂榜天津表柱賣卜一卦帛十疋居一日有貴公子讀榜命取帛如數卜焉錢命蓍布卦曰予筮可期一生君何戯為其人曰卜事甚切先生誤乎錢云請為韻語曰兩頭㸃土中心虛懸足人踏趿不肯下錢其人本意買天津橋也紿之其精如此酉陽雜爼筮命或馮蓍卜情將問蔡韓愈聨句三錢舞耳酒記王廷湊甞謁五明道士卜擲三錢皆舞桒嫗各半資暇集枽道茂之門有嫗賣卜枽言休則嫗言咎枽言咎則嫗言休陳子昻自筮見貪濁門蓍龜九宫術盧藏用善蓍龜九宫術隂陽雜數賈眈隂陽雜數罔不通其器多招術家房孺復陳少游奏置幕府多招術家言已三十當得宰相以重權近希進以易自筮陸羽不知所生或言有僧得諸水濵畜之既長以易自筮得蹇之漸曰鴻漸於陸其羽可用為儀乃以陸為氏名而字之得乾之坤王廷湊始廷湊賤微時鄴有道士為卜得乾之坤曰君將有土及得鎮迎事甚謹卜不吉突厥處羅復謀取并州置楊正道卜之不吉左右諫止處羅曰我先人失國頼隋以存今忘之不祥卜不吉神詎無知乎賣卜長安市武攸緒少變姓名賣卜長安市天火之象馬重績晉髙祖以太原拒命廢帝遣兵圍之勢甚危急命重績筮之遇同人曰天火之象乾健而離明健者君之德也明者南面而嚮之所以治天下也同人者人所同也必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北南乎乾西北也戰而勝其九月十月之交乎是嵗九月契丹遂助晉擊敗唐軍晉遂有天下五代史卷五十七南瞻析木木不自續遷司天監明年張從賔反命重績筮之遇隨曰南瞻析木木不自續虛而動之動隨其覆嵗將秋矣無能為也七月而從賔敗龜精錢元懿終年六十六初元懿之為新定有十方生時人號為龜精甞䟽卜辭以貽元懿曰太一接天河金華寳貝多君侯六十六别處不經過至是皆如其言呉越備史取質東龜余既幻惑力命之說兮身乆放而愈疑心回宂其莫曉兮將取質夫東龜楚人俗巫而好術兮叟有鬻卜而來思乃招而訊之曰嘻人莫不有時而通伊我兮乆而滋蔓吾聞人禀五行動止有則四時轉續變於所極何卜賦見天地之情狀識隂陽之變通文粹揚炯渾天賦顓帝之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有禆竈魏有石氏齊有甘公唐都之推星王朔之侯氣周文之視日呉範之占風有以見天地之情狀識隂陽之變通李鄴侯泌竇廷芝與卜者胡蘆生相善一日謂竇曰君家禍將至非遇黄中君鬼谷子將不可救芝物色求之得李鄴侯泌傾家結之未㡬朱泚亂廷芝䧟賊事平德宗命誅之泌以前事上聞得免劇談録瓦卜休咎西京壽安縣有墨石山神祠頗靈神龍中前有兩瓦子過客投之以卜休咎仰為吉覆為凶南部新書一蓍獨立明皇兼潞州别駕來朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立竒瑞非常也不可言舊史蹈常而俟夫何卜何卜賦時乎去不可邀來不可逃淹兮孰捨操屠龍之伎非曰不偉時無所用莫若履俙作踊之工非曰可珍時有所用貴等斵輪絡首縻足兮驥不能踰跬前無所阻兮跛鼈千里同渉於川其時在風㳂者之吉泝者之凶同蟄於野其時在澤伊穜之利乃穋之厄故曰是邪非邪主者時也諒淑惡之同出顧所下之若何夫如是得非我美失非我耻姑蹈常而俟之夫何卜為杜生易占見方術門卜者世之餘伎栁宗元非國語卜者世之餘伎也道之所無用也聖人用之吾未之敢非然而聖人之用也盖以歐陋民也非常用而徴信矣雞骨占年拜水神栁宗元栁州峒氓猒就成都卜杜甫遊子五月為火火主離崔信明見五月五門最深於五行韓文李虚中誌最深於五行書以人之始生年月日所直日辰支干相生勝衰死生相斟酌推人壽夭貴賤利不利輙先處其年時百不失一二星官厯翁莫能與其校得失虛中誌其說汪洋奥義闗節開解萬端千緒叅錯重出學者就傳其法初若可取卒然失之星官厯翁莫能與其校得失本行正郎劉禹錫之為屯田員外郎時勢事稍異一僧有術數極精寓直日邀之至省方欲問報云韋生在門外公不得已且令僧坐簾下韋獻卷已畧省之意色殊倦覺之乃去僧語不對吁嗟良乆乃曰某欲言員外心不愜如何公曰但言之僧曰員外後遷乃本行正郎也然湏待適来韋生知印處置公大怒揖出不旬日貶官韋乃處厚相也後三十年在中書劉轉屯田郎中相十吉相凶相附白相人叔孫來聘公孫敖聞其能相有知人之鑒許助善相相術龍犀日角帝王之表朱建平相書曰額有龍犀入髪左角日右角月者王天下河目龜文公侯之相孔業子曰仲尼聖人之表河目龍顙是帝皇之貌也又後漢李固狀貌有竒表鼎角匿犀足履龜文後為太尉已上見文選决疑歸田賦曰感蔡子之慷慨從唐生以决疑漢吕公謂髙祖曰少好相人相人多矣無如季相不敢忘德父老相髙祖曰君相貴不可言乃謝曰誠如父老言不敢忘德信而有徴億則屢中貴賤之表近取諸身休咎之徴如指諸掌應如影響蓍龜吉相豐下有後叔服来聘公孫敖聞其能相人見其二子焉叔服曰榖也食子難也收子榖也豐下必有後於魯鷰頷封侯班超詣相者曰當封侯萬里之外問其狀相者曰鷰頷虎頭飛而肉食萬里侯相後封定逺侯山庭子貢有山庭之相月角有月角之相薄姬王者之妃許負相曹操安人之主喬𤣥相雖賤必貴史記姑布子卿善相見無恤曰真將軍也趙簡子曰是子其母賤翟婢也奚道貴哉子卿曰天之所受雖賤必貴貴不可言漢書蒯通說韓信曰相君之面不過封侯相君之背貴不可言竒骨桓温未朞温嶠見曰此兒有竒骨真英物躍馬肉食蔡澤問唐舉曰聞君相李兊百日内合持國令有諸舉曰然若臣者何如舉熟覧笑曰君顒鼻巨肩魋顔蹙頞吾聞聖人不相殆先生乎澤知其戯曰富貴吾自有不知者夀舉曰四十三年澤笑謂其御曰吾躍馬肉食四十三年足矣奴有侯相衛青至甘泉居至有鉗徒相青官至封侯青曰人之奴得無笞罵足矣安敢望封侯以經術進翟方進年十三為小吏號遲鈍數為椽吏罵辱方進自傷詣蔡父相大竒其形貌曰小吏有封侯之骨當以經術進因病而歸灋真指胡廣廣為郡散吏太守法雄子真名知人雄勑真令助求人悉召諸吏人真窺之指胡廣遂舉孝亷為漢名臣公字相者謂陶侃曰君左手中指有竪理當為公若徹上貴不可言侃以針刺决之見血洒壁為公字後果應之功名壽年周訪遇善相者陳訓謂訪與陶侃曰二君皆位至方岳功名畧同但侃上壽訪下壽優劣有殊好相羊祜字叔子游汶水濵父孝謂曰孺子有好相年六十建大功既言便去莫知所在論魏王朗論曰仲尼之門童冠之群不言形相之事難據故也固有懷不副貌行不稱聲故夫子以言信行失之宰我以貌度性失之子羽聖人於聼察精矣祠部式卜相築斷見上注相婦人黄霸與善相者同出見一相婦人者言當富貴乃巫家女霸娶為妻與之終身角犀豐盈賢明之相惟德受天以形合相貴賤且殊榮枯斯等鑄錢鄧通魏文帝之深意賣珠董偃遇舘陶之厚恩衛青起自於牧羊蔡澤終聞於躍馬辨呉粲之貴始自㓜童知陶侃之榮當期老耄虛陳禍福謬託災祥事且無妄言而有徴論性命之期定吉凶之兆凶相蜂目忍人楚子以商臣為太子子上曰是人也蜂目豺聲忍人也不可立之豺聲滅族楚子良生子越椒子文曰是子曰熊虎之狀豺狼之聲不殺之必滅若敖氏矣鬼由求食若敖氏之鬼不其餒而後果滅族傳縱理入口周亞夫縱理入口終餓死於獄中當刑而王黥布姓英氏少時客相之曰當刑而王及壯坐法黥布欣然笑曰人相我當刑而王幾是乎人有聞者共為戯笑餓死鄧通有相者云必餓死帝曰能富通者我也乃與銅山鑄錢景帝時以犯法竟餓死獄中父不祥莊子曰楚司馬子綦有八子召九方歅相之謂曰子則祥矣父則不祥也不過郡吏後漢趙壹以郡争政禮命十辟公府不就善相者相壹不過郡吏後果如其言覽鏡知刑蜀張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地後為劉備所殺越王蜂目史記范蠡云眄刀甘卓為歴陽陳訓私曰甘侯頭低視仰相名眄刀目中赤脉自外入必兵死後果為王敦所殺豺狼之聲伯友始生叔向母及堂聞聲曰豺狼也必喪羊舌氏孔使相工視髙智周始與郝處俊來濟孫處約共依江都石仲覽仲覽因各語所期處俊曰丈夫惟無仕仕至宰相乃可智周濟如之處約曰得為舎人在殿中周旋吐納可也仲覽使相工視之工語仲覽曰髙之貴君不及見來早顕而末躓髙晚顕而壽髙蔣髙智周所善義興蔣子謹有客嘗視兩人曰髙公位極人臣而嗣少弱蔣侯官不逹後且興蔣子孫其後果顕而髙一世之後無聞鳶肩火色騰上馬周岑文本謂所親曰周鳶肩火色騰上必速恐不能乆果年四十八而卒貴冠人臣蕭嵩有夏榮者善相謂嵩僚壻陸象先曰君後十年貴冠人臣然不若蕭郎位髙年艾舉門蕃熾竒相李光顔為禆將節度使馬燧謂曰若有竒相終必光大解所佩劒贈之日角龍廷唐儉說秦王建大計曰公日角龍廷姓協圖䜟係天下望乆矣位至太師劉義節從子思禮少學相於張憬藏憬藏謂思禮歴刺史位至太師女有竒相髙祖順聖皇后竇氏父毅在周為上柱國尚武帝姊襄陽公主常謂主曰此女有竒相且識不凢竒厖福艾李勣臨事選將必先相其竒厖福艾者遣之或問其故荅曰薄命之人不足與成功名熊虎相王晙氣貌偉特時謂為熊虎相識清貌古韓思復初鄭仁傑李無為者隱居太白山思復少從二人游嘗曰子識清貌古恨仕不及宰相也語遲者神定楊元琰生數嵗未言相者視曰語遲者神定必為重器骨體禄命見骨體知禄命見命禄知骨體此則言命禄尚矣吕才有異相徐圓朗劉復禮說圓朗曰彭城有劉世徹才畧不常有異相士大夫許其必王將軍欲自用恐敗不如迎世徹立之圓朗後為彭人所殺也日角珠廷非庸人相李珏李絳為華州刺史見之曰日角珠廷非庸人相明經碌碌非子所宜引出韋貫之為右丞時内僧造門曰君貴相貫之命左右引出曰此妄人也相夭且賤栁惲方十餘嵗有巫告曰兒相夭且賤為浮屠道可緩死諸父從其言惲曰去聖教為異術不若速死學愈篤有封侯相顧彦朗彦暉竝為天德軍小校其使蔡京以兄弟有封侯相每厚禮之子孫當王百年王廷湊嘗使至河陽醉寢於路有過其所者視之曰非常人也從者以告廷湊馳及之問其故曰吾見君鼻之息左若龍右若虎子孫當王百年家有大樹覆及堂公興矣及害𢎞正而樹適庇寢自廷湊訖鎔凢百年耳大貴兆李忠臣帝甞謂卿耳大貴兆對曰驢耳大龍耳小帝喜其野而誠不可以科第進鄭朗始朗舉進士有相者言君當貴然不可以科第進俄而有司擢朗第一既又覆實被放相者賀曰安之已而果相龍鳳之姿天日之表太宗生四嵗有書生謁髙祖曰公在相法貴人也然必有貴子及見太宗曰龍鳳之姿天日之表其年㡬冠必能濟世安民伏犀貫玉袁天綱見竇軌曰君伏犀貫玉就輔角完起十年且顕立功其在梁益間耶右輔澤而動軌後為益州行臺僕射天綱復曰赤脉千瞳方語而浮赤入大宅公為將必多殺願自戒軌果坐事見召天綱曰公毋憂右輔澤而動不乆必還果還為都督面部三無金華子李寛為常侍有門下士姓盧善相或問李公如何曰據其面部所無者三無子無宅無塜公有數子皆先公卒有宅未嘗還鄉居死於池州乗舟歸舟破沉其骨龍瞳鳳頸武后之㓜天綱見其母曰夫人法生貴子乃見元慶元爽曰官三品保家主也見韓國夫人曰此女貴而不利武后最㓜姆抱以見紿以男天綱視其歩與目驚曰龍瞳鳳頸極貴驗也若為女當作天子肉不稱骨帝在九成宫令視岑文本曰學堂瑩夷故文章振天下首生骨未成自前而視法三品肉不稱骨非壽兆也同上豕視淫長社人張憬藏伎與天綱埒郎中裴珪妻趙見之憬藏曰夫人目脩緩法曰豕視淫又曰目有四白五夫守宅夫人且得罪俄坐姦沒入掖庭天下之母周世宗宣懿皇后符氏初適李守貞子崇訓守貞事漢為河中節度使已挾異志有術者善聼聲以知吉凶守貞出其家人使聼之術者聞后聲驚曰此天下之母也守貞益自負曰吾婦猶為天下母吾取天下復何疑哉五代史蘭臺學堂袁天綱謂杜淹曰公蘭臺學堂全且博將以文章顕謂王珪法令成天地相臨不十年官五品謂韋挺面如虎當以武處官然三君皆得譴武德中以事俱流嶲州見天綱曰公等終且貴杜位三品難與言壽王韋亦三品後於杜而壽過之耳無根天綱見馬周曰君伏犀貫腦背若有負貴驗也近古君臣相遇未有及公者然面澤赤而耳無根後骨不隆壽不長也厄在三尺土下張憬藏伎與天綱埒蔣儼有所問答曰公厄在三尺土下盡六年而貴六十位蒲州刺史無有禄矣後儼使髙麗為莫離支所囚居士室六年還果為蒲州刺史妻孥告當死俄聽致仕相在怒時魏元忠尚少徃見憬藏問之乆不答元忠怒曰窮通有命何預君耶拂衣去憬藏遽起曰君之相在怒時位必卿相大書台字裴光庭當國憬藏以紙大書台字投之光庭曰吾既台司矣尚何事後三日貶台州刺史大怖得輔政金梁鳳𤣥宗時人謂吕諲曰君且輔政須大怖乃得諲責驛吏榜之吏突入射諲兩矢幾中走而免明年知政事跛男子袁客師天綱子嘗渡江叩舟而還曰舟中人鼻氣皆黒不可以濟俄有一男子跛而負直就舟客師曰貴人在吾可以濟江中風忽起幾覆而免跛男子乃婁師德也相之相在乎清明唐贊皇公折羣疑相論相之相在乎清明清明者珠玉是也為天下所寳窮相李白召見及出上指謂力士曰此人固窮相酉陽雜爼以慧性知人爵禄厚薄壽命長短韓愈送仙翁序以慧性知人爵禄厚薄壽命長短發言如駃駟囁嚅持疑於唇吻間即信乎異人也若古之許負軰不足以言哉直將相五代李周盧嶽謂之曰吾少學星歴且工相人子方頥隆凖眉目踈澈身長七尺真將相也吾占天象晉必有天下子宜留事晉以圖富貴以相灋隱市中五代錢鏐縣録事鍾起有子數人多竊從之遊豫章有善術者望斗牛間有王氣牛斗錢塘分也因游錢塘占之在臨安遂以相灋隱市中隂求其人私謂起曰占君縣貴人求之市中不可得視君之相貴矣然不足當之術者過起家鏐適從外來見起反走術者望見之曰此真貴人也召至熟視之顧起曰君之貴因此人乃慰鏐曰子骨法非常願自愛拳必入口九國志呉殷文圭舉進士塗中遇一友目文圭乆之謂人曰向者一人眉緑拳必入口神仙狀也如學道當冲虛不爾有大名於天下而文圭拳實入口乾寧中擢第風雷之厄南漢楊洞潜洊水令梁愚堂謝洞潜見之謂同列曰愚血脉貫眸子行歩矍鑠類驚麕者當有風雷之厄及愚至縣未幾颶風壞廨壓死言人事多中趙鳳傳術士崔𤣥豹以相法言人事多中莊公尤信重之以為北京廵官明宗為内衙指揮使重誨欲試𤣥豹乃使他人與明宗易服而坐明宗於下坐召𤣥豹相之𤣥豹曰内衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思𤣥豹以為神召至京師鳳諫曰好惡上所謹也今陛下神其術而召之則傾國之人皆將奔走吉凶之說明宗遂不復召五代史二十八唐臣傳骨灋非常文穆王元瓘淮將李濤冠衣錦軍命王討之自是日者視王曰此人手刄百人當大貴有僧自新常衣紙衣住廣德山院聞元瓘至舉家皆遁而自新巋然晏坐軍中有問其故曰前後左右皆兵耳將安適時王在衆中新乃斂衣奉迎與語乆之及師還遂載而歸後王問新當時何以見識答曰微僧無它術但覩王骨灋非常故幸得識矣出呉越史額文似臨淮柏良器父友王奐為光弼從事見之曰爾額文似臨淮王面黒子似顔平原殆能立功乃薦之光弼唐史亞夫下獄相南唐宋齊丘微時日者相之曰君貴不可言然亞夫下獄相君實有之位極之日當早引退庶幾保全齊丘登相位數載致仕復以大司徒就徴未幾坐陳覺謀干紀事乃賜死論心擇術孫卿子曰古有姑布今有唐舉相形不如論心論心不如擇術白孔六帖卷三十一
