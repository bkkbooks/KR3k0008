body:
  text: 白孔六帖巻八十二唐白居易原本宋孔傳續撰旱一旱備二祈禱三水澇四饑饉五人餓六荒政七賑貸八求糴九蠶桑十繭稅十一採桑十二爭桑十三后妃桑蠶十四異蠶十五織絍十六旱一白旱暵國乃大旱天災流行天降之災天厲不戒上天降災山陵不收髙田不熟水泉咸竭時雨不降百穀不成五榖不滋害於粢盛為災自十月至于五月不雨不為災野無青草雲漢美宣王遇災能懼詩曰旱既大甚耗斁下土旱魃為虐赫赫炎炎如惔如焚滌滌山川嵗旱時災若嵗大旱用汝作霖雨八月不雨君不舉七年吕氏春秋曰成湯之旱七年煎沙爛石流沙鑠石湯七年旱未覩鸛鳴詩鸛鳴于垤將雨之候也且憂狼顧賈誼曰失時不雨人且狼顧狼顧恐懼貎仰夫膏雨已愆天降之期望彼畢星未及月離之候天厲流行地財耗斁詩耗斁下土注旱害也斁敗也東作既嗟於嵗旱南山空望於朝躋屯西郊之雲且聞不雨廢南畆之稼豈望有秋一溉之功夫為稼於代編一有溉之益雖歸燋爛而一溉之旱苖必後枯也大時不齊同年有豐凶之異也禮記懸耜其雨其雨杲杲出日人専望雨而日出也愆陽陽驕憤歎成隂歡娛為旱晉石珩問袁甫曰夀陽已西恒旱已東恒澇何也甫曰夀陽已東吳人也夫亡國之音哀鼎足強邦一朝失職憤歎成隂隂積成水故恒澇也夀陽已西中國新平強洖美寳盡入志滿心盈長為旱故公羊曰魯僖公甚悦故旱是以京師若抑強扶弱則天下和平宻雲徒自西郊零雨未沾南畆雲重積而又散雨垂下而復收文選水旱免稅令令曰諸田有旱蟲霜處拘見營田州縣撿實且帳申省十損四已上免租稅調七已上課役俱免若桑麥損盡各免其所輸聽折來年經二年後不在折限其應免者通計麥用為分數孔自三月不雨至五月張行成拜左僕射永徽四年自三月不雨至五月行成懼以老乞身訴旱崔蕘出為陜虢觀察使不恤人疾苦或訴旱者指廷樹示之曰柯葉尚爾何旱為即榜笞之頻年霜旱魏徴上疏曰貞觀初頻年霜旱關西小旱耕稼是憂張説疏石然十三年雲陽石然自冬至五月不雨徴上疏極言旱熯之災疏又曰今旱熯之災逺被郡國詔求直言張廷珪𤣥宗開元初大旱闗中饑詔求直言廷珪上疏入秋亢旱辛替否疏曰入秋亢旱草木枯黄下人咨嗟未知所濟雨不時降夏陽驕愆李中敏大和六年天旱文宗内憂詔詢所以致雨者中敏上言雨不時降夏陽驕愆苗欲槁枯陛下憂勤降徳音俾下得盡言昔東海誤殺一孝婦大旱三年宋申錫位宰相生平饋致一不受其道勁正姦人忌之䧟不測之辜獄不參驗銜恨而殁天下士皆指目鄭注臣知數寃必列訴上帝天之降災殆有由然漢武帝國用空竭然卜式請烹桑𢎞羊以致雨况申錫之枉天下知之何惜斬一注以快忠臣之魂則天且雨矣帝不省大旱責民逋賦李渤遷江州刺史上言臣州治田二千頃今旱死者千九百頃若徇度支所歛臣懼天下謂陛下當大旱責民三十年逋賦以時救恤李吉甫江淮旱浙東西尤甚有司不為請吉甫曰以時救恤帝驚馳遣使分道賑貸馬燧徙懐州時師旅後大旱田茀不及耕燧務勤教化農告無入段秀實為營田判官是嵗大旱農告無入涇大將焦令諶曰我知入不知旱也責之急農無以償徃訴秀實秀實書牒免之江淮大旱李絳時江淮大旱帝下赦令有所蠲弛絳言江淮流亡所貸未廣而宫人猥積有怨鬲之思當大出之以省經費問隂陽祲沴鮑防時比嵗旱策問隂陽祲沴質對漢故事免三公卜式請烹𢎞羊指當時輔政者避正殿減膳張薦初貞元時京師旱帝避正殿減膳薦白限日以應古制上疏許孟容貞元十九年夏大旱上疏理囚繫盧商大中元年春旱詔商與御史中丞封放理囚繫於尚書省奏析滻水溉民田崔珙遷京兆尹㑹大旱奏析滻水入禁中者取十九溉民田劉蕡䇿曰臣前所謂救災旱在乎致精誠者臣謹按春秋魯僖公七月之中三書不雨者以人君有恤人之志也文公三年之中一書不雨者以人君無閔人之心也故僖致精誠而旱不害物文無恤閔而旱則成災矣陛下有恤人之志則無成災之變逋捐係路李翺為廬州時州旱遂疫逋捐係路人情愁惴裴延齡帝罷陸贄宰相時大旱人情愁惴延齡言贄等失權怨望多出宫人鄭覃開成三年旱帝多出宫人李班入賀覃又推贊菽麥失時髙郢代宗為太后營章敬寺郢以白衣上書諫曰比八月雨不潤下菽麥失時黔首狼顧憂在艱食若遂不給將何以救之上陳闕政權徳輿貞元十九年大旱徳輿因是上陳闕政乞盡免江淮兩賦白居易元和四年天子以旱甚下詔有所蠲貸振除災沴居易見詔節未詳即建言乞盡免江淮兩賦嵗旱用屈崔縱貞元元年天子郊見為大禮使嵗旱用屈縱樽裁文物儉而不陋災暵成沴盧懐慎曰今民力敝極儻災暵成沴何以濟之乖政之氣張九齡言乖政之氣發為水旱天道雖逺其應甚邇昔東海枉殺孝婦天旱久之一吏不明匹婦匪命則天昭其寃久旱入境輒雨裴寛出為蒲州刺史州乆旱寛入境輙雨時暵之孽裴漼進中書舍人睿宗造金仙玉真二觀時旱甚役不止漼上言今自冬徂春雨不時降人心憔然莫知所出而土木方興時暵之孽職為此發今東作云始丁壯就功妨多益少飢寒有漸春秋莊公三十一年冬不雨是時歳三築臺僖公二十一年夏大旱是時作南門陛下以四方為念宜下明制令二京營作和市木石一切停止不報隂侵於陽吴兢上疏曰自春以來亢陽不雨傳曰敬徳不用厥災旱上下蔽隔庶位踰節隂侵於陽則旱災應煬旱楊炎為相劉文喜不奉詔時方煬旱人情騷雋羣臣皆請赦文喜帝不聽請蠲租稅嚴郢兼御史中丞㑹秋旱郢請蠲租稅嵗仍旱李栖筠出為常州刺史嵗仍旱疫旱王仲舒為婺州刺史州疫旱人徙死幾空居五年里閭增完加金紫服徙蘇州民賦不入除江西觀察使水旱民賦不入歎曰我當减燕樂他用可乎為出錢二萬代之上流亡藉藉杜悰復鎮淮南時方旱道路流亡藉藉權徳輿十九年大旱上言十四年夏旱吏趣常賦至縣令為民歐辱者不可不察不害有秋李實拜河南尹貞元二十年旱闗輔饑實方務聚斂以結㤙民訴府上一不問徳宗訪外疾苦實詭曰嵗雖旱不害有秋江淮旱歉韋温㑹羣臣請上尊號温固諫今河南水江淮旱歉京師雪積五尺此非崇飾虗名時帝順納無年髙瑀領忠武節度使州比水旱無年見隄渠門榖價騰踊紀處訥神龍元年夏大旱榖價騰踊中宗召問所以救之者天乙之武也焦土而爛石楊炯渾天賦旱鉢嚴司空在太原時市童因於水際泅戯見流下一物爭取之乃一瓦瓶重帛羃之市童因就岸撲破有嬰兒長尺餘遂迅走逐之頃刻足下旋風起已蹈數尺近岸舟子遽以篙擊殺之髪朱色目在頂上謂之旱鉢一云旱魃雜爼夏建亢旱韓文論天旱狀今年已來京畿諸縣夏建亢旱秋又早霜田種所收十不存一女魃五行志人痾永隆元年長安獲女魃長尺有二寸其狀恠異詩曰旱魃為虐如炎如焚是嵗秋不雨至于明年正月旱有三唐文粹盛均人旱解涒灘嵗越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴土龍舞巫覡愈不雨或言邦有術人能捕退龍而譟之昔嵗嘗然農剩其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其遺囊有書一幅目曰人旱旱有三曰天旱國旱人旱曷為天旱蹇陽肆凶下土祗敬雖六七嵗黎民不饑曷為國旱君道熾災徳涸仁枯貪風暴氣蒸為時癘曷為人旱邦燬其政吏賊其行千里人心燥不為隂京師孟夏以後旱則先祈嶽鎮海瀆及諸山川能興雲雨者皆於北郊祭又祈社稷又祈宗廟毎月七日皆一祈不雨還從嶽瀆如初旱甚則修雩秋分後雖旱不雩雨足則報祀若州縣則祈社稷及境内山川通典里巷為土龍馬璘拜行營節度使天大旱里巷為土龍聚巫以禱璘曰旱由政不修即令徹之明日雨是嵗大穰田不及耕馬燧徙懐州時師旅後嵗大旱田茀不及耕燧止横調畫龍致雨盧氏雜說明皇一年亢旱内中起龍祈雨將作少監馬紹正於屋壁畫西方龍繪事未畢覺黒雲往梁棟俄而龍拏玃穿屋飛去雨遂足分道賑贍劉思立在髙宗時為名御史于時河南北大旱詔遣御史中丞崔謐等分道賑贍秋苗耗半蘓源明史思明䧟洛陽有詔幸東京將親征源明因上疏極諫曰自春大旱秋苗耗半歛穫未畢先之以清道之役申之以供頓之苦其不可二也青天湛然旱氣轉甚韓愈賀雨表田畆少收是年京師旱田畆少所收上憐民無食兵賦半已休韓愈赴冮陵詩有苗盈野而天不雨今農既勤於稼有苗盈野而天不雨祭竹林神文龍恠潛溟波候時救災旱李白流夜郎至西塞驛雨降不濡物良田起黄埃杜詩飛鳥苦熱死池魚涸其泥同上九泉焦枯而四海渗涸兮柳宗元解崇賦天作旱災嘉榖將槁韓文曲江祭龍大求虵醫王彦威鎮汴夏旱袁王傅李杞過汴因宴王以旱為言李醉曰可求虵醫數頭作大瓮前後設香席選十嵗以下小兒十餘令執小青竹晝夜更互擊其瓮不令少輟王如言試之雨大注數百里舊說龍與虵為親家南部新書皇帝親臨長安萬年二赤縣决獄膏雨沾足杜甫説旱冬麥黄枯春種不入上怨氣積寃氣盛亦能致旱同上稚老孤窮指苗然鼎將穗秀矣忍令莠死以絶民命杜牧祭神苗方甲而水湮之苗秀好而旱莠之同上以蓬子為麵懿宗時自闗中至海大旱冬蔬皆盡貧者以蓬子為麵槐葉為虀唐食貨志前年闗中旱閭里多死饑韓愈歸彭城大旱許孟容上疏言陛下齋居損膳具牲玉走群望而天意未荅豈豐歉有定隂陽適然乎切惟天人交感之際繫教令順民與否今順人奉天而神弗祐嵗弗稔未之聞也種不入土野無青草韓愈上李尚書今年以來不雨者百有餘日種不入土野無青草若旱之望雨廬陵郡王瑗為幽州都督兵曹㕘軍王利涉說瑗曰若諸刺史召之不至將何以全瑗曰奈何對曰山東豪傑嘗為竇建徳所用今失職與編户夷此其思亂若旱之望雨退蔵恨雨師健歩聞旱魃杜甫旱備二白修城勸分魯大旱欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務嗇勸分此其務也徙市見下祈禱門恤人之心救患之䇿有備無患無虞耗斁為災雖爽月離之作流行有備則無嵗取之虞愆陽為沴嵗不順布布政有經衆無匡懼存救之術禮曰九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂方二三千里賈誼曰不幸有方二三千里之旱胡以相恤孔置錢河隂院以虞水旱歸融盧周仁取羡錢進京師融劾奏詔不從置錢河隂院以虞水旱義倉薛訥為藍田令有富商倪氏於御史臺理其私債中丞來俊臣受其貨財斷出義倉米二千石以給之訥曰義倉本備水旱以為儲蓄安敢絶衆人之命以資一家之産竟報上不與祈禱三白有事於山川衛大旱有事於山川不吉興師伐邢而雨龍見而雩龍見建巳之月祭天為百榖祈甘雨桑林之禱湯克夏大旱湯乃以身禱于桑林剪爪髪自以為犧牲以祈於天雨大至人恱之潜龍蟠於沮澤應鳴鼓以降雨蜀都賦靡神不舉雲漢詩曰自郊徂宫上下奠瘞靡神不舉靡受斯牲圭璧既卒寜莫我聽詩禜之鄭子産曰山川之神則水旱厲疫之災於是乎禜之雩禜精誠随車百里嵩為徐州境内旱嵩行部所經雨輒隨車而霔禮崇禋祀神享精誠信天厲之可移兾地財之不害設𤣥寺建靈壇並祈雨之所見文選土龍矯首而立女巫頓足而舞嵗屬亢陽禮修禱祝念夫膏澤既愆天降之期感以精誠惟望月離之應祈年求豐年也望嵗曝身祝長字㓜卿為洛陽令時亢旱長為曝身階庭引罪自咎甘雨乃降人歌詠之積薪後漢諒輔為五官掾時太守禱無應輒自曝身庭中自責祝曰日中不雨以身塞無状乃積薪自環日未中霔雨一郡皆沾足又戴封為西華令大旱封欲焚軀俄而雨至春至秋禜謂雩禜水旱之神周禮俾率舞於小巫庶祈年於大有並走群望展禮雩壇焚巫尫魯大旱公欲焚巫尫臧文仲曰天欲殺之則如勿生若能為旱焚之滋甚也暴巫尫禮嵗旱穆公召縣子而問焉曰吾欲暴巫而奚若對曰天則不雨而暴人之疾不可吾欲暴尫而奚若對曰天則不雨而望之愚婦人無乃疏乎為之徙市不亦可乎周禮春官女巫職嵗旱暵則舞雩邦有大災則歌哭以請或歌或哭兾以悲哀感神明也月令孟夏大雩帝禱祠山川古之卿士有益於人者以祈榖實雩祭天祈雨也山川古卿士能致雲雨者皆祭之徙市見上用師衛大旱卜有事於山川不吉寗莊子曰昔周饑克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而雨傳洗兵武王伐紂大雨洗兵閉陽門董仲舒曰以春秋災異之變推隂陽之所錯行故求雨閉陽門雨甚欲止則反是斬山木鄭大旱使屠擊祝頴豎拊有事於桑山斬其木不雨于産曰有事於山藝山林而斬其木其罪大矣奪之官邑秋再雩春秋昭二十五年秋九月上辛大雩季辛又雩傳曰秋書大雩旱甚也凡天災有幣無牲祈以幣更以幣代牲殺孝婦枯旱東海孝婦養姑甚謹姑恐累不得嫁遂自縊死姑女告婦殺姑婦自誣服罪其獄上府于公為縣吏明其枉竟殺此婦東海枯旱三年後太守至問其故於是殺牛祭孝婦冡即日而注大雨上虞寡婦上虞寡婦養姑姑死夫女弟素與婦不叶誣婦鴆殺母縣竟殺之旱二年孟嘗是時明之不得後太守殷舟至嘗具言之祭婦遂雨去姧河南春夏旱太守魯褒至屛退姦殘澍雨數降録囚後漢和帝時旱帝行洛府寺録囚舉寃滯收洛陽令抵罪司𨽻河南尹左降未及還宫澍雨也請修政周舉宣光時三輔旱請雨舉書云云宜出後宫不御之女治天下寃滯之獄除大官重職之費云云請烹大臣桑𢎞羊為御史大夫興㩁酤鹽鐡之利時天下大旱卜式曰𢎞羊為天子大臣而與小人爭利烹𢎞羊天乃大雨掩骼周暢為河南尹時乆旱祈雨無應暢因收葬洛陽城旁客死骼骨以萬餘人應時雨大豐稔天文推歩楊統授河洛書及天文推歩之術為彭城令時旱統推隂陽消復縣蒙澤太守使為郡求雨亦降自是朝廷災異多訪之至誠束晳為廣陵郡累大旱晳請雨三日雨澍衆謂晳至誠乃歌曰束先生通神明祈禱令祠令云京師四月已降旱則祈雨理寃獄賑窮乏掩骼埋胔先祈嶽鎮海瀆及祈山川能出雲者北郊望而告之又祈社稷不雨則徙其市孔祠曲江池孔戢授京兆尹嵗旱文宗憂甚戢躬祠曲江池一夕大澍造土龍黎幹復為京兆尹時大旱幹造土龍自與巫覡對舞彌月不應又禱孔子廟帝笑曰丘之禱乆矣使毁土龍帝減膳節用既而霔雨由政不修馬璘邠寧節度使天大旱里巷為土龍聚巫以禱璘曰旱由政不修即命徹之明日雨自暴以祈田仁㑹為平州刺史嵗旱自暴以祈而雨大至榖遂登人歌曰父母育我兮田使君挺精誠兮上天聞中田致雨兮山出雲倉廪實兮禮義申願君常在兮不患貧禱乾陵而雨外戚武三思明年春大旱帝遣三思攸暨禱乾陵而雨帝恱周王徒勤于方岳商帝虚美于桑林柳宗元丈商后徒勤於自剪周公空愧於舞雩同上瑞鳥迎舟掩商羊之舞仙雲覆水恊從龍之徴同上木神不空每祈曰無它軌則但設敷繡座手簸旋數寸木神念呪擲之自立於座上伺木神吻角牙出目瞑則雨至酉陽雜俎鏡龍僧一行開元中嘗旱𤣥宗令祈雨一行言當得一器上有龍狀者方可令於内庫中遍視之皆言不類數日後指一古鏡鼻盤龍喜曰此有真龍矣乃持入道塲一夕而雨同上指拂雲氣從容録魏郡開成中大旱徧禱山嶽不應或言西况山陸先生道行精明請之必驗太守已下乃携杏酒青羊以備牲醪告于山中先生受禮訖對太守呼吸數過五指連拂之爪甲間皆出雲煙之氣惟中指氣象甚盛先生曰郡中雨得周足諸縣皆獲八分亦可小稔已而其說不誣清風時興白日顯行若響若荅糞除天地山川清風時興白日顯行韓愈潮州禱晴文劃􅀈雲隂卷日月也同上雖屢舞僊僊而靈應未若王維京兆張公徳政碑仍嵗大旱郡祠介推雖屢舞僊僊而靈應未若公命束藴取火伐樹寘薪釃酒而祝曰有功於人祀為明神無徳而祿禍亦覆餗自絳已來人實祀子純犧大璧不敢愛必以薦也童兒季女不敢黷必以敬也神既靡荅人將安仰若亭午而雨則植其鷺羽執此騂毛不然者火嶛將至焮天燦地靈衣且為煨燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周於闔境無畏致雨上令無畏求雨曰旱數當然求龍適足致暴雨爾乃盡去求雨之具以一鉢水小刀攪之作胡言須臾龍如指大入鉢巾復攪呪之白氣自鉢中出如煙一疋練少頃大風雨震雷零雨隨車或當宵而應唐賛皇公禱祝論嵗或大旱必先令掾属祈請積旬無效乃自躬行未嘗不零雨隨車或當宵而應其術無他唯至誠而已將與祭必閒居三日清心齋戒雖禮未申於泂酌而意已接於神明所以理郡八年嵗皆大稔江左黎庶謳謡至今剪爪致詞積薪自誓古人乃有剪爪致詞積薪自誓精意上逹而雨必滂沱此亦至誠同上玉龍明皇别録玉龍子太宗於晉陽得之開元中三輔大旱帝命宻投玉龍於南内龍池雲雨隨作雞跖集絳幡祈雨唐文粹羅隱請追癸巳日詔䟽夏五月京畿旱癸巳日聞詔大京兆用器水鑪香蒲蕭絳幡軰致於坊市門將用舊法而召雨也臣聞天之有雨澤猶陛下之有渥恩雨澤可以委曲干之則陛下渥恩亦可以委曲干之矣彼蒲蕭輩何足以動天臣請追癸巳日詔敢告誅黒蜧抶隂蜺柳宗元祈晴文納其雲氣復我川澤禜門文同上衆靈受職薈蔚且躋於南山百榖仰榮滂濡遂霑於東作柳宗元焚白檀香龍明皇又嘗詔術士羅公逺與不空同祈雨令校功力上俱召問之不空曰臣昨焚白檀香龍上令左右掬庭水嗅之果有檀香氣段文昌徙荆南州或旱禬禱必雨或乆雨遇出遊必霽民為語曰旱不苦禱而雨雨不愁公出遊唐史水澇四白平原出水為大水天作淫雨害於粢盛宋大水公使人弔之云云天降之災秋大水鼓用牲于社于門非常也鄭大水龍鬬於時門之外洧泉水潦將降懼不得歸荀偃士匄請於荀罃請班師髙下有水災為大水榖梁水訛言水至漢建始三年秋京師相驚言大水至百姓奔走相蹂躪王鳯言太后上及後宫可御船王商曰自古無道水猶不冒城郭今政化和平此必訛言俄而定鳯大慙先徙髙地公沙穆為𢎞農令元夀元年三輔已東漂沒穆曉占乃預告百姓徙髙地遂得免沒溺之憂下民昬墊凡雨自三日已往為霖救水以鼔衆榖梁雨水不時禮下水上騰水潦為敗苦雨數來墊溺水損免稅具旱門注水潦敗國禜用赤幘晉書雨多則禜祭用赤幘朱衣閉諸隂朱紫禜社伐朱鼓孔漂居人六百家魏徴是嵗大雨榖洛溢毁官寺十九漂居人六百家徴陳事山東及江淮大水虞世南貞觀八年山東及江淮大水帝憂之問世南對恐有寃獄枉大宜省録纍囚水氣勃戾宋務光神龍元年大水詔九品以上官直言極諫務光上書曰切見自夏以來水氣勃戻天下多罹其災洛水暴漲漂損百姓傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗自陛下御極郊廟山川不時薦見又水者隂類臣妾之道氣盛則水泉溢須虹蜺紛錯暑雨滯霪隂勝之沴也後廷近習或有離中饋之職以干外政願深思天變杜絶其萌壊廬舍權徳輿貞元八年闗東淮南浙西州縣皆大水壊廬舍漂殺人徳輿建言宜擇群臣明識通方者持節勞徠韋巨源遷侍中武三思封户貝州属大水刺史宋璟義免其租巨源以為蠶桑可輸繇是河朔人多流徙者秋雨害稼裴耀卿開元二十年遷京兆尹明年秋雨害稼帝將幸東都召問所以救人者雨潦敗稼崔沔為魏州刺史雨潦敗稼沔㢮禁便人行水魏王堤李訥為河南尹時乆雨洛暴漲訥行水魏王堤懼漂溺疾馳去水遂大毁民廬損田韓滉以户部侍郎判度支大厯十二年秋大雨害稼什八京兆尹黎幹言狀滉恐有所蠲貸固表不實代宗命御史行視實損田三萬餘頃始渭南令劉藻附滉言部田無害御史趙計按驗如藻言帝又遣御史朱敖覆實害田三千頃帝怒曰縣令所以養民而田損不問豈邱隐意耶貶南浦貟外尉計亦斥為豐州司戸員外參軍霖潦戴胄帝將修復洛陽宫胄諫曰七月以來霖潦未止濵河南北田正洿下年之有無未可知三鴉谷水五行志景龍八年鄧州三鴉口大水塞谷或見二小兒以水相沃須臾有蛇大十圍張口仰天人或斫射之俄而暴雷雨漂溺數百家岸有善崩流或斷堤泛濫疇壠坡陁圃畦柳宗元祈晴文野夫興憂官守増惕敬用瓢齊以展周索同上天涯歇滯雨粳稻卧不翻杜甫霖雨閉坊門宋務光今霖雨閉坊門豈一坊一市能感發天道㢤必不然矣故里人呼坊門為宰相謂能節宣風雨天工人代乃為虚設六隂作潦而不就歐陽詹徳勝頌水澇為災竇建徳方今水澇為災民力刓敝主上不是䘏而親駕臨遼去歳東郡水生民為流屍韓愈歸彭城饑饉五白懸磬傳室如懸磬野無青草凶年荒政百姓不足君孰與足五榖不熟其國乃虚嵗凶年榖不登年雖大殺殺饑年不順成天災流行國家代有大侵榖梁五榖不熟為大侵大侵之禮君膳不祭肺馬不食榖陽九之阨甚虚之食四阻防饑百姓艱食人困國虛土虚人耗不饑何為流亡詩曰瘨我饑饉民卒流亡瘼病也大荒凶年年無儲蓄之嵗祈年不應周禮祈年祈豐年也野荒人散周禮餒在其中大時不齊同年有豐凶之異風雨不節則饑翔踴翔貴懸耜水旱為災蒸黎孔疚軍無見糧嵗惡不入人賣爵子賣爵及子堯水湯旱孔給米孝敬皇帝𢎞帝幸東都詔監國時關中饑𢎞視廡下兵食有榆皮蓬實者悄然命家令寺給米饑人就食李勣破王世充宻署東海郡公是時河南山東大水隋帝令饑人就食黎陽倉吏不時發死者日數萬百姓荐饑陳子昻髙宗崩將遷梓宫長安於是關中無嵗子昻盛言東都勝塏可營山陵上書曰頃遭荒饉百姓荐饑薄河而右惟有赤地循壠以北不逢青草父兄轉徙妻子流離頼天悔禍去年薄稔重繭走治下王方翼遷肅州刺史它郡民或餒死皆重繭走方翼治下乃出私錢作水磑薄其贏以濟饑瘵創舍數十百楹居之全活甚衆拾橡實以飯崔從嵗饑拾橡實以飯荒饉日甚張廷珪疏曰或謂天戒不足畏而上帝馮怒風雨迷錯荒饉日甚則無以濟下矣南方連饉敬晦歴浙西觀察使時南方連饉有詔弛㩁酒茗官用告要晦處身儉勤貲力遂充請出米三十萬石贍貧民楊於陵遷浙東觀察使越人饑請出米三十萬石贍貧民賜米使賑饑捐丁公著長慶中浙東災癘拜觀察使詔賜米七萬斛使賑饑捐削木皮以食李宻淮陽嵗饑削木皮以食歛封植宋璟檢校貝州刺史時河北水嵗大饑三思使歛封植璟拒不與故為所擠採木實野蔬而食五代晉髙祖皇后李氏從帝而北出榆關行砂磧中饑不得食遣宫女從官採木實野蔬而食㪷易一縑陸贄奏議貞觀之初荐属霜旱自關輔綿及三河之地米價踴貴㪷易一縑道路之間餒而相藉路有委骨文粹王維張公徳政碑野無遺糠路有委骨減䨇雞之膳同上王維張公徳政碑饔人減䨇雞之膳圉人省五馬之秣陶不獻服汚不塓館自身以往振廪同食雖人煙不動道殣相望見饉不驚李華中書政事堂記聞荒不救見饉不驚此堂得以殺之民漉漕渠遺米杜悰時方旱道路流亡藉藉民至漉漕渠遺米自給呼為聖米取陂澤茭蒲實皆盡嵗饑骨相枕於野劉武周為鷹掦府校尉見天下已亂隂有異計因宣言于衆曰今嵗饑死者骨相枕於野府君開倉不恤豈憂百姓意乎以市怒其軍皆憤怨人大餒死者係路朱粲傳至有樵蘇莫爨糠麧靡資不暇聊生方憂轉死張廷珪請崇儉約疏人饑六白家室相棄道殣相望殣餓死也菜色病莫能興隠人多取食焉隠困窮也貿貿然來嗟來之食齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終不食而死曾子聞之曰微與其嗟也可去其謝也可食貿貿目不明貎在陳子在陳絶糧首陽伯夷叔齊餓于首陽之下相食漢河内飢父子相食汲黯開倉而賑之棄子文選路逢飢婦人抱子棄草間嚻然思食文選野有餓莩孟子餒在其中有餒而已衛寗惠子曰吾餒而已不來食之易子而食楚人圍宋翳桑之餓人趙宣子初田於首山舍於翳桑見靈輙餓曰不食三日矣與之簞食後倒戈以報宣子惄如調饑餒而食雀鷇史主父餓探雀鷇而食之主父趙武靈王也半菽漢書今嵗饑人团卒食半菽軍無見粮言士卒菜半以菽雜之饑色漢千里饋粮士有饑色師不宿飽樵蘇晚㸑云云人不能二鬴周禮廪人職二鬴月粮也食蒲蠃吳志人飢移就食蒲蠃於東海之濵孔絶廪徐曠世充僣號以為國子博士子士㑹奔長安世充怒絶其廩文逺餓幾死數矣仆于行間史思明䧟洛陽有詔幸東京將親征蘇源明因上疏極諫曰毎立殿廊見旌旗之下餓夫執殳仆于行間日見二三市井􅥌餒求食死于路旁日見四五甚不可三也人餓死墻壁間李晟言赦懐光有五不可今河中米斗五百芻藁且罄人餓死墻壁間其大將殺戮幾盡朱克融等客長安餓且死不得一官蕭俛賛持男易斗粟掉臂莫肯酬韓文有司恤經費未免煩徴求富者既云急貧者固已流傳聞閭里間赤子棄渠溝持男易斗粟掉臂莫肯酬我時出衢路餓者何其稠親逢道死者佇立乆吚嚘顔回忍饑面秦韜玉貴公子行云堦前莎毯綠不捲銀龜噴香挽不斷亂花織錦柳撚線粧㸃池臺盡屏展主人功業傳國初六親聮絡馳朝車鬪雞走狗家世事抱來皆着黄金魚却笑儒生把書卷學得顔回忍饑面使不至於凍餒人凍而後衣之人餒而後食之惠則惠矣不若輕其徭薄其税使不至於凍餒也白居易䇿朱門酒肉臭路有凍死骨杜甫荒政七白嵗凶年榖不登君膳不祭肺不殺牲也馬不食榖馳道不除祭祀不懸不懸徹樂也是故年雖大殺衆不匡懼年不順成則天子素服乘素車食無樂君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬也凶年則乘駑馬祀以下牲取易供也臧文仲曰貶食省用務穡勸分此其務也嵗凶君食不兼味廷道不除百官布而不制鬼神禱而不祀施舍施恩惠舍役力已責止逋責周禮以荒政十二聚萬人一曰散利貨粮食也二曰薄征謂輕租稅三曰緩刑四曰弛力謂息力役五曰舍禁公無私稅六曰去幾去關市之征七曰省禮謂省吉禮八曰殺哀謂省凶禮九曰蕃樂藏樂器不作十曰多㛰不備禮而㛰娶十一曰索鬼神求廢祀而脩十二曰除盗賊飢則多盗不可不去䘮荒之式太宰以九式均節財用二曰䘮荒之式用財之節度也荒凶年也荒禮凶年之禮不儉祭豐年不奢凶年不儉移人就榖周禮廪人以嵗上下數用凡民食上嵗人四鬴中嵗人三鬴下二鬴若食人不能二鬴則移人就榖注四鬴三鬴人一月米也輸粟周禮大荒令邦國移人人有守不可移者令輸粟國凶荒禮䘮則市不征而作布物歸市不稅民困金銅每荒年因物貴大鑄泉布饒也賙委小行人凶荒令賙委蜡不通年不順成八蜡不通以謹民財也順成之方其蜡乃通以移民也急疾就食漢關中饑髙祖令人得賣子就食蜀漢煮木為酪王莽時南方枯旱穀翔踴使民煮木為酪又不可食重為煩擾注為杏酪之属也載榖入關無用𫝊宣語種蕪菁後漢令水傷處種蕪菁助食掘鳬茈王莽末南方飢人掘鳬茈食之國語天災則棄責薄歛市無赤米赤米米之姧言饑也凶年則力政不均地亦不平計地稅也均人職云云孔仍嵗無年韋雲起時議討王世充雲起上言京師初平人未堅附百姓流離仍嵗無年州縣刓敝陸希聲為右拾遺時憸腐秉權嵗數歉梁宋尤甚希聲見州縣刓敝上言當謹視盗賊養人息兵張廷珪將襲回紇廷珪陳五不可天下無年當養人息兵五也衣馬牛之衣食犬彘之食宋務光疏曰數年以來公私乏竭戸口減耗家無接新之儲國乏俟荒之蓄陛下近觀朝市則以為既庶且富試踐閭陌則百姓衣馬牛之衣食犬彘之食薄河而右惟有赤地循隴以北不逢青草陳子昻上言頃遭荒饉百姓荐饑薄河而右惟有赤地循隴以北不逢青草山東饑關隴弊生人流亡誠陛下寜靜思和天人之時安可動甲兵興大役同上痍荒之餘殷侑拜義昌軍節度使於時痍荒之餘骸骨蔽野墟里生荆棘居無尺椽㸑無盛煙劉晏移書於宰相元載以為大抵運之利與害各有四起宜陽熊耳虎牢成臯五百里見戸纔斗餘居無尺椽爨無盛煙獸游鬼哭而使轉車輓漕功且難就為一病雖有數斗玉不如一盤粟李白書懐贈南陵宫賛府富者既云急貧者固已流韓愈赴江陵持男易斗粟傳聞閭里間赤子棄渠溝持男易斗粟掉臂莫肯酬屬嵗無秋崔衍國儲無兼年張𤣥素遺糠野無遺糠路有委骨張公徳政碑文粹王維荒歉韋蘇州始至郡詩旱嵗屬荒歉舊逋積如坻埃􅝙塵勃吳興不雨埃􅝙塵勃葩拆穗結十無一二群鼠夜出囓而壃之信宿食殆盡雖盧守板擊敺而駭之而不能勝笠澤叢書人之生産空於杼軸獨孤及上疏師興不息十年矣人之生産空於杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人羸餓就役剥膚及髓長安城中自晝椎剽吏不敢詰官亂職廢將墮卒暴百揆隳刺如沸粥紛麻民不敢訴於有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易于齩骨矣陛下不以此時厲精更始思所以救之之術忍令宗廟有累卵之危萬姓悼心失圖臣實懼焉賑貸八擅賑貸附白周急不繼富君子云云救災開倉漢河内飢父子相食汲黯使至河内因矯制開倉賑之朝廷不坐罪滯積困人傳曰晋飢悼公謀息人乃輸積聚以貸自公已下茍有積者盡出之國無滯積亦無困人振廪椘大飢莊公乃自廬以徃振廩同食注振廩開倉同食上下無異食也竭粟宋公子鮑禮於國人宋飢竭其粟而貸之一鐘之餼鄭饑人未及麥人病子皮以子展之命餼國人粟户一鐘貸而不書施而不徳宋饑司城子罕請出粟以貸司城氏貸而不書宋無饑人叔向曰樂氏其以宋升降乎施而不徳貸而不書公粟見上施取其厚𫝊有施於人釡鍾之數傳陳氏有施於人人歸之矣豆區釡鐘之數其取之公也薄其施之民也厚謂陳氏三量皆登一焉以家量貸而以公量收之博施濟衆子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸匡乏匡救厚施散利具荒政門野有餓殍而不知發發散也儲蓄虞災振窮振乏絶月令季春天子乃命有司發倉廩賜貧窮振乏絶賙萬人之艱阨周禮鄉師以嵗時廵國及野而賙萬人之艱阨以王命施惠注阨饑困也棄債晉王長文徳濬太康中蜀土荒瘽開倉賑貸長文居貧多無以償郡縣切責送到州刺史徐幹舍之不謝而去擅賑施後漢王望為青州刺史行部見饑寒者愍之以便宜出所在布粟賑給之上欲罪之鍾離意云云乃赦之不待奏報第五訪仲謀為張掖守嵗饑開倉賑給吏爭欲上言訪曰若須奏報是棄人也寜以身救百姓上嘉之又韓詔仲黄為贏長開倉賑贍民主者謂不可韶曰以此伏罪含笑入地太守知韶名徳不坐擅賑左降晉王藴叔仁為吳興守郡荒賑恤主簿爭云朝廷以為科罪免官士庶諸闕特左降晉陵守除名劉頌子雅奉使于蜀表請賑貸不待報乃行而除名也免官鄧攸伯道以吳郡守表賑貸未報開倉坐免官貸䘮祭漢王莽時人欲祭祀䘮紀而無用者錢府以所入工商之貢但賖之祭祀無過旬日䘮紀無過三月依周禮也取利晉張駿境内饑譚詳時出倉穀貸取三倍利隂據曰是因饑要利乃止也孔發廪自劾宗室臯貶温州長史俄攝州事州大饑發官廩數十萬石賑餓者僚吏叩庭請先以聞臯曰人日不再食則死何俟命後發哉苟殺我而活衆其利大矣既貸乃自劾出粟賑鄉里陳子昻父元敬世髙貲嵗饑出粟萬石賑鄉里遣使賑饑民虞世南貞觀八年隴右山崩大虵屢見山東及江淮大水帝憂之以問世南對宜省録纍囚於是遣使賑饑民開廪賑民王珣出許州長史珣嵗旱時假刺史事開廩賑民即自劾𤣥宗赦之璽書褒羙韓思彦廵察劒南㑹蜀大饑開倉賑民然後以聞璽書褒美下頼以濟員半干調武陟尉嵗旱勸令殷子良發粟賑民不從及子良謁州半千悉發之下頼以濟大旱輒開倉韓思復調梁府倉曹參軍㑹大旱輒開倉賑民州劾責對曰人窮則濫不如因而活之無趣為盗賊州不能詘以時救恤李吉甫江淮旱吉甫曰以時救恤帝遣使分道賑貸賑民無所計潘孟陽罷為大理卿其後左司郎中鄭敬宣慰江淮帝誡曰朕宫中用尺寸物皆有籍惟賑民無所計卿是行宣諭朕意職田賑貧民庾敬休言蜀道米價騰踴百姓流亡請以本道闕官職田賑貧民詔可李珏江淮旱發倉廩賑流民崔沔改虞部郎中請發太倉粟及減苑囿鳥獸所給以賑貧乏人頼其利發倉廥盧從願開元二十年河北饑詔為宣撫處置使發倉廥賑饑民雖旱人不流捐崔衍嗇用度府庫充衍及穆賛代州以錢四十萬緡假民賦故雖旱人不流捐由衍蓄積有素也具􅊡鬻李蕚遷南華令大水它縣饑人至相属萼為具􅊡鬻及去糗粮送之救災者勿使至賑給劉晏每州縣荒歉有端則計官所贏先令曰蠲某物貸某户民未及困而奏報已行矣議者或譏晏不直賑救而多賤出以濟民者則又不然善治病者不使至危憊善救災者勿使至賑給故賑給少則不足活人活人多則闕國用國用闕則復重歛之矣問米救旱芝田録令狐文公除守兖州州境方旱米價甚髙迓吏至公首問米價幾何州有幾倉問訖屈指獨語曰舊價若干四倉各出米若干定價出糶則可以賑救矣左右聽之流語逹郡中富人競出其所蓄物價頓平民心欣然得雨遂成豐年矣毎旱潦必貸匱蠲負里無逋家柳仲郢又賑給近僥倖劉晏既被誣而舊吏推明其陳諫以為管蕭之亞著論紀其詳又賑給近僥倖吏下為姦強得之多弱得之少雖刀鋸在前不可禁以為二害災沴之鄉所乏粮耳它産尚在賤以出之易其雜貨因人之力轉於豐處或官自用則國計不乏多出菽粟恣之糶運散入村閭下户力農不能詣市轉相沾逮自免阻饑不待令驅以為二勝家得儲三十斛王起歴河中節度使方蝗旱粟價騰踴起下令家得儲三十斛斥其餘以市否者死神策士怙勢不從寘于法由是廥積咸出民頼以生本傳以賤直售民為信州刺史嵗大旱發倉以賤直售民故饑而不亡再期增户五千孫成李襲譽三輔盗螘聚襲譽請以兵據永豐倉發粟賑窮乏劉思立時遣御史分道賑贍思立建言賑給須立簿最稽出入往返停滯求糴九白請糴傳曰京師來告饑魯侯為請糴於宋衛齊鄭禮也乞糴泛舟晉荐饑乞糴于秦百里奚曰天災流行國家代有救災䘏鄰道也秦於是輸粟於晉自雍及絳相繼命之曰泛舟之役閉糴傳曰晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉獲晉侯告糴傳曰冬無麥禾臧孫辰告糴于齊卿出告糴古之制也鬯圭玉磬敢告滯積國語魯饑臧文仲請糴于齊公曰誰使之文仲曰卿出告糴古之制也幸備卿公使往遂以鬯圭玉磬如齊告糴曰敝邑荐饑大懼周公太公之命祀而獲戻不腆先君之敝器敢告滯積以紓執事救敝邑使能供職榖梁傳臧孫辰告糴于齊國無三年之蓄曰國非其國也一年不升告糴諸侯不正也故舉臧孫辰以為私行也為内諱故不言使若私行也言内無外交榖梁臧孫辰告糴于齊諸侯相歸粟正也告然後與之言内之匡救其災同恤災危備救凶患遏糴葵丘盟曰無遏糴藴年無藴年謂藴蓄年榖而閉糴也若虚其請凶年補敗或闕於宿儲善鄰恤災方資於遏糴周急矜無所宜歸粟歸粟于蔡以周亟矜無資幸災歛怨安可藴年見上災維代有宜酌義於泛舟仁必矜無豈忘情於歸粟匡困資無孔貿易不出境崔倰遷湖南觀察使湖南舊法雖豊年貿易不出境隣部災荒不恤也倰至謂属吏曰此豈人情乎無閉糴以重困吾民削其禁閉粟李軌属荐饑人相食軌毁家貲賑之不能給議發倉粟曹珍亦勸之謝統師語珍曰百姓餓死皆弱不足事者壯勇士終不肯困且儲廩以備不虞豈宜妄散惠孱小乎僕射苟附下非國計軌曰善乃閉粟下益怨多欲叛去蠶桑十白蠶事繭稅月令桑土既蠶書八月載績詩無伐桑柘月令季春受蠶食也蠶事既登孟夏蠶室具下蠶則績而蟹有筐蠶織詩曰婦無公事休其蠶織桑于南陌蠶于南郊禹貢厥篚檿絲桑之絲可中琴瑟絃者遵乃脩之文器宜合禮月令季春乃修蠶器趨既登之日事必及時不衰不帛周禮庶人不蠶者不帛不績者不衰所以恥不免女事禁原蠶原再也蠶與桑馬同氣物莫能兩大禁冄蠶為傷馬也周禮孔河内千樹李襲譽嘗謂子孫曰河内千樹桑事之可以衣以蠶折租張廷珪出為沔州刺史頻徙蘇宋魏三州景龍中宗楚客紀處訥武延秀韋溫等封戸多在河南河北諷朝廷詔兩道蠶産所宜雖水旱得以蠶折租廷珪願依貞觀永徽故事准令折免詔可蠶嵗四熟尹思貞為青州刺史治州有績蠶至嵗四熟蠶桑可輸韋巨源武三思封户在貝州属大水刺史宋璟議免其租巨源以為蠶桑可輸何易干曰方春百姓耕且蠶見耕耘門蠶務劉思立于時河南北大旱詔遣御史中丞崔謐等分道賑贍思立建言蠶務未畢而遣使撫廵所至不能無勞春耕夏蠶突厥序孫樵謂春耕夏蠶以資衣食白眼蜂豐寧傳蠶退之後多為乾腊貨之開元中春末兩市白眼蜂如山市人以此卜絲帛之豐儉吳地桑葉緑吳蠶已三眠李白寄東魯及此柔桑綠春蠶起中國同上若布與帛必蠶績而后成也韓愈圬者傳葚黒老蠶蠋城南聯句滿箔春蠶看滿箔堰城聯句初無桑蠶于闐初無桑蠶丐隣國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶㡌絮中關守不敢驗自是始有蠶女約刻石無殺蠶蛾飛盡得治繭秦地羅敷女採桑綠水邉素手青條上紅粧白日鮮蠶饑妾欲去五馬莫留連李白詩蠶經三卧行欲老元稹織婦詞織婦何太忙蠶經三卧行欲老蠶神女聖早成絲今年絲稅抽徴早越婦未織作吳蠶始蠕蠕李賀感諷長畛徘徊桑柘重新夏野蠶成繭太宗本紀貞觀十三年是嵗滁州野蠶成繭蠶婦一人供自身林藴田間樹之以桑凡樹桑人百之所沐者謂之功桑太寡則乏于帛桑太多則暴于田是故十畆之田植桑五功一功之蠺取不宜嵗度之雖不能盡其功者功不下一疋帛平賦書繭厚絲美陸龜䝉蠶賦逮蠶之生繭厚絲美機杼經緯龍鸞葩卉蠶凋桑柘空李白五月東魯行蠶老客未歸白田已繰絲李白桑者不絲身韓愈三器論繭稅十一白孟夏蠶事既登后妃獻繭乃收繭稅以桑為均貴賤長㓜如一以給郊廟之服繭稅十取一也以桑為均者隨桑多少而稅貴賤長㓜如一各以桑為平不以貴賤為差蠶事懋而既登繭稅收而先定絲入周禮典絲掌絲入絲入收而稅之頒絲謂出之也孔蠶絲盡輸蠶絲盡輸稅機杼空倚壁栁田家詩半天下西界制河東奄左海其間繭稅魚鹽衣食半天下李訥制社牧不逋繭稅不逋於鄉井謝絲表盡取後已陸龜蒙蠶賦官誕益嚵盡取後已織絹未成疋繰絲未成斤里胥迫我納不許蹔逡巡白居易秦中吟採桑十二白十畆之間桑柘閑閑女執懿筐遵彼微行爰求柔桑微行墻下徑也蠶月條桑取彼斧戕以伐逺揚猗彼女桑詩秦氏之女羅敷秋胡之妻並採桑者城南古詩羅敷善採桑採桑城南隅青絲為籠䋲桂枝為籠鉤桑之未落其葉沃若帝女之桑蠶妾公子重耳與從者謀於桑下蠺妾在其上工女奉種于川且宜合禮執筐於陌無或失時南陌桑也無伐我樹桑翳桑翟車採桑祝明欽曰禮家說后以翟車採桑綠條映素手妾本秦羅敷玉顔艶名都綠條映素手採桑向城隅李白陌上桑採桑綠水邉同上争桑十三白楚邊邑名卑梁其處女與吳邊邑處女争桑而傷卑梁女卑梁人讓吳人吳人應不恭怒而殺之吳往盡屠其家於是吳楚大爭吕氏春秋環廬樹桑周禮維桑與梓必㳟敬止桑椹翩彼飛鴞集于泮林食我桑椹懐我好音孔據黨人桑顔翊季父非理據黨人桑牙詣邑求治時令尹下翊因私評之私出已緡償之其訟遂息然使終身不之知江南野史后妃桑蠶十四白月令季春后妃齋戒享先蠶而躬桑以勸蠶事先蠶天駟星也后妃躬桑率先天下也后妃獻繭孟夏蠶事既登后妃獻繭乃收繭稅月令古者天下諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻而外閉之及大昕之朝季春朝日之朝君皮弁素幘卜三宫夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之風戾者恐露濕葉傷蠶風之使燥而後食之嵗既單矣謂三日盡之事世婦卒蠶奉繭以示君遂獻繭于夫人夫人曰此所以為君服與遂副褘而受之因少牢以禮之古之獻繭者其率用此歟及良日夫人繰三盆手遂布于三宫夫人世婦之吉者使繰遂朱綠之元黄之以為黼黻文章君服以祀先王先公敬之至也三盆手三淹也凡繰每淹大緫而手振之以出絲緒王后親蠶於北郊以供緇服夫人蠶於北郊以供冕服王后夫人非莫蠶也身致其誠信也蠶宫桑壇晉元康議皇后採桑桑壇於蠶宫之西南繭館漢孝元皇后採桑繭館織室東觀漢紀明帝馬皇后數來往視之三灑古今事曰蠶始生蠶后食之三灑而已宿瘤齊王后也王遇其採桑可之遂娶為后採帝女之桑爰求十畆獻后妃之繭遂布三宫周禮仲春詔后率外宗内命婦始蠶於圵郊以為祭服昕朝良日苟三宫夫人時展北郊之禮則十畆桑柘盡趍南陌之功漢儀晉禮志漢儀皇后親蠺桑東郊苑中蠶室祭蠶神曰苑窳婦人寓氏公主祠用少牢侍中成粲草定其儀取列侯妻六人為蠶毋擇吉日皇后著十二笄步揺衣青乘油畫雲母安車駕六醜馬女尚書陪載筐鉤外命婦皆步揺青衣各載鉤筐先桑二日蠺室生蠺著薄上桑日皇后未到太祝質明以太牢祀之祠畢班餘胙於從桑后東面躬桑採三條諸妃公主採五條郡縣已下九條以桑受蠶毋也一條皇后儀曰皇后躬桑始將一條執筐受葉三灑見上孔后採桑祝欽明曰禮家説文言后以翟車採桑上桑條歌中宗庶人韋氏太史迦葉志忠表上桑條歌十二篇葢后妃之徳専蠶桑共宗廟事也享先蠶唐禮志皇后嵗祀一季春吉已享先蠺遂以親桑散齋三日后服鈿釵禮衣結佩乗輿出自西房華蓋警蹕后即御座尚儀妾姓言請就齋室尚儀版奏外辨后服鞠衣乘輿以出華盖侍衞警蹕尚儀妾姓言請降車皇后降車乘輿之大次尚宫曰有司謹具備行事尚儀跪取幣於篚皇后受幣進北向跪奠於神座少退再拜皇后已奠幣乃奉血毛入尚儀持版進於神座之右東面跪讀祝文皇后再拜尚宫曰禮畢尚功奉金鉤皇后受鉤採桑典製以筐受之皇后採三條止各以鉤受内外命婦司賓客引内外命婦採桑者以從至蠶室尚功以桑受蠶母母切之以受媫妤食蠺一􅡺止尚儀曰禮畢皇后還大次車駕還宫后親於郊桑李白貞觀元年三月癸巳皇后親蠶太宗本紀親蠶苑中羣命婦相禮肅宗廢后張氏親蠶苑中羣命婦相禮儀物甚盛異蠶十五白八蠶吳都賦郷貢八蠺之緜六測記曰一嵗八蠺出日南氷蠶之繭拾遺録東海圓嶠山有氷蠺長七寸有鱗角以霜雪覆之則為繭五色絲織為文錦入水不濡園客之絲列仙傳有園客種五色香草上有蛾上草客收養之生桑蠺得繭大如盆有女稱客妻繰訖俱去歐絲山海經諸天之野有女子跪樹歐絲注蠶類也孔南詔自曲靖州至滇池人水耕食蠶以柘蠶生閱二旬而蠒織錦縑精緻于闐初無桑蠶丐隣國不肯出其王即求婚許之將迎乃告曰國無帛可持蠶自為衣女聞置蠶㡌絮中守不敢驗自是始有蠶女刻石約無殺蠶蛾飛盡得治蠒四熟尹思貞治州有績蠶嵗至四熟黜降使路敬潜至部嘆曰是非善政致祥于表言之正月蠶南蠻莊蹻之裔正月蠶生二月熟扶桑蠶白公丁記扶桑蠶長七尺卵大如燕宫北田塍曉氣酣黄桑飲露窣宫簾長腰健歩偷攀折將餧吳王八繭蠶李賀南園色金杜陽編彌羅國有桑連延十數頃其上有蠺長四寸其色金其絲碧飼池中大軫國以五色石甃池塘採大柘葉飼蠶于池中始生如蚊睫及老可長五六寸池中有挺荷大者可闊四五尺蠶經十五日即入荷中成繭形如斗同上織絍十六白詩婦無公事休其蠶職休者刺其廢職事也女功恤緯傳曰婺不恤緯注緯少寡婦之所宜憂報章詩曰跂彼織女終日七襄雖則七襄不成報章迴文竇滔妻蘇氏織錦廻文字織素新人工織縑故人工織素織縑日一匹織素日五文精麤中數廣狹中量龍梭女手金梭焚機公儀休焚機去織婦曰欲使女工織婦安所售其利哉機杼王丹持縑一匹與友人曰如丹此縑出自機杼投杼曽參母方織人告參殺人始言不信乃三告而投杼驚疑淵室之人雖聞潜織淵室潜織以巻綃淵室鮫人之所居河漢之女不見報章古詩皎皎河漢女札札弄機杼終日不成章泣涕漣如雨札札弄機杼之聲霜降季秋霜始降則百工休化理絲枲周禮太宰以九織任萬民七曰嬪婦化理絲枲嬪亦婦人之稱化材絲枲周禮展其功織婦功也周禮女事周禮任婦以女事貢布帛也理其絲麻以為布帛執麻理絲禮女子十年不出母教以婉娩執麻枲理絲繭織絍組紃學女事以供衣服稽其女工周禮婦工周禮絲枲以成之謂之婦工注謂成布帛一婦不織賈誼曰一婦不織有受其寒者斷織樂羊子學未就而歸其妻執刀欲斷織曰此織未畢而斷之則不成功學未就而歸猶婦斷織三盆既繰八月載績載元載黄無衣無褐勸課後漢崔寔子真為五原守土宜麻枲而俗不知織績實為作紡績織絍練緼以教之得免其寒苦孔嫂為績織張志和常欲以大布製裘嫂為躬績織勤織絍列女饒娥饒州樂平人生小家勤織絍絍戎衣給戰士鄭畋為鳯翔隴節度使㑹黄巢䧟東都妻自絍戎衣給戰士蚤織而縷柳宗元種樹郭槖駞𫝊蚤繰而緒蚤織而縷經而不緯文粹陸龜蒙論文書譬猶織也經而不緯可成幅乎蠶婦凍而織陸贄蠶婦凍而織殫力忍死以供十倍之賦竭力蠶織陸相奏議論邊守狀使傷耗遺甿竭力蠺織西輸賄幣北償馬資尚不足塞其煩言繰絲鳴機杼李白贈清漳明府繰絲鳴機杼百里聲相聞越婦拜縣官桑牙今尚小㑹待春日晏絲車方擲掉李賀婦不知織韓文杼軸和鳴機罕嚬蛾之女李白任城㕔記美人懶態燕脂愁春梭抛擲鳴髙樓李賀染絲白孔六帖卷八十二
