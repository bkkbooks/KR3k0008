body:
  text: 白孔六帖卷十唐白居易原本宋孔傳續撰井一宅二廨署三厠四樓五閣六臺七堂八屋室九門戸十井一汲附白改井易改邑不改井往來井井射鮒井谷射鮒言井上汲而下注如谷水射小魚羸其瓶瓶未出井而鉤羸其瓶而覆之勿幕井收勿幕謂不覆之不私其利井徳之地井以辨義施而無私義之方也挈壺周禮挈壺氏挈壺以令軍井塞井夷竈堙井堙木刋眢井廢井也及泉孟子譬如掘井不及泉猶為弃井浚井王莽傳謝囂奏武伯長孟通浚井得白石得銅龐儉父先逃走隨母流宕後居鄉里鑿井得銅遂致富奴蒼曰堂上我婦也問其故奴曰我婦姓艾字阿宏足下有黑子腋下有瘜母曰我翁也遂為夫妻時人曰鑿井得銅買奴得翁鑿井而飲擊壤歌者泥而無禽流而可食易曰井泥不食下也舊井無禽時舍也甘井先竭石甃玉甃露井銀牀𤣥泉冽井井冽寒泉伯益之功伯益作井善利水善利萬物老子習坎有仁井有仁焉君子可逝不可陷也抱甕莊子云子貢過漢隂遇一丈人方為圃畦鑿隧而入抱甕而出子貢曰有機於此日浸百畦挈水若抽名曰桔橰丈人曰有機者必有機心吾耻不為也負缶說苑曰衞有五丈人負缶入井灌薤人教以重後輕前名曰桔橰五丈人曰機智之巧必有機智之心吾耻不為再拜耿恭居踈勒匈奴攻城絶其水源穿井十五丈無水恭曰聞貳師將軍拔刀刺山飛泉湧出今漢徳神明豈有窮哉乃整衣服向井再拜請祈有頃飛泉湧出投轄漢書陳遵毎大㑹賔客輒閉門取客車轄投於井中土羊韓詩魯哀公穿井得土羊孔子曰土精也又家語云季桓子穿井得一物如羊不識以問孔子曰此羵羊也土之怪飛火異苑曰蜀都臨卭縣有火井漢室之隆則炎赫彌熾暨桓靈之際火勢漸微至諸葛亮一闞而更盛故曰高焰飛扇於天出雲孫堅討董卓至杞園井出五色雲掘新井管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴覆之取其潔敬也銀井闕地及泉水泉必香聚東井漢高祖入秦五星聚東井玉井蔡誕曰仙人有玉井錢飛出葛仙公投錢於井呪則飛出神農九井神農造井井有九所汲一井餘井悉動在鄧州居所而遷井居其所而遷浚井舜父使浚井出從而揜之以為已死桃李生井傍古詩東井秦分陷井之蛙伏缺甃之崖井渫渫治也去汙穢之名修井象曰井甃无咎修井也浪井典略曰浪井不鑿自成汲短綆不可以深汲汲引爭高士傳管寧所居屯落㑹汲者或男女雜錯或爭井寧乃多買器分置井旁汲以待之又使不知來者得之乃不鬬訟金瓶素綆古詩後園鑿井銀作牀金瓶素綆汲寒漿無喪無得終日汲引未為損終日泉注未為益笑平原君美人見躄者蹣跚行汲笑之後斬以謝孔鑿井宗室臯遷荆南節度使繇荆抵樂鄉二百里其間墟聚凡數十不井飲臯始命鑿井以便人人勤于汲張操徙陜州城中無井人勤于汲操為瀼河溜入城百姓利安韓公井有昭王井相傳汲者死行人雖暍困不敢視韓朝宗移書諭神自是飲者無恙人更號韓公井濤盪蠲愈邵真義井記導之深源經之善利蔑燠暍之虞濟煩乏之艱昏懵者得以濤盪瘵痗者由之蠲愈甖甈負水柳宗元始州之人各以甖甈負江水莫克井飲學者如浚井文宗喜經術宰相李石因言施士匄春秋可讀帝曰朕見之矣穿鑿之學徒為異同但學者如浚井得美水而已何必勞苦旁求然後為得耶新井篇白居易拜左賛善大夫俄有言居易母墮井死而居易賦新井篇言浮華無實行不可用出為州刺史浚李泌六井居易為杭州刺史復浚李泌六井民賴其汲鑿泉以井飲柳宗元天說云鑿泉以井飲盈以其神其來不窮惠我後之人噫疇肯似于政其來日新柳宗元井銘皆百尺韓滉聞京師未平置館第數十於石頭城穿井皆百尺鑿井八十同州水醎而無井牛存節禱而擇地鑿井八十水皆甘可食以寶鈿為井幹王鉷井中歎聲武后時來俊臣家井中夜有吁嗟歎怨聲五行志七井生凉霍仙鳴别墅在龍門一室之中開七井皆以雕鏤木盤覆之夏月坐其旁七井生凉不知暑氣惟古有制八家所共柳宗元祭井文藴利兹久閟靈則深同上井漲才深尺餘張希復言授新州將拜相井忽漲才深尺餘下有人語及雞聲開成末永興坊百姓王乙掘井過常井一丈餘無水忽聽下有人語及雞聲甚喧閙近如隔壁井匠懼不敢掘同上其土堅垍其利悠久柳文井銘其土堅垍其利悠久其深八尋有二尺蓄是𤣥徳柳宗元祭井惟神蓄是𤣥徳以為人用是不窮之養功齊乳湩惟昔匝石今則順道發自𤣥𡨕成於富媪克長厥靈不愛其寶有井朱夏時轆轤凍階戺杜甫題衡山縣學石甃冷蒼苔寒泉湛明月李白桓公井詩梧桐落金井一葉飛銀牀李白贈别舍人弟金色石陽縣有井水半青半黃黃者如金色取作粥玉甖汲水花桐井李賀玉甖汲水花桐井舊絲沉水如雲影玲瓏映玉檻澄澈寫銀牀流水集孔雀帶影出羵羊蘇味道井詩沸湧有聲永寧王相宅南有一井毎夜嘗沸湧有聲晝窺之或見銅厮羅銀熨斗水腐不可飲雜爼八角井賈耽在滑臺城北命鑿八角井以鎮黄河於是潛使人於井所伺之果有一老父至問曰誰人鑿此曰丞相也老父曰大妙手但近東近西近南近北耳耽聞之曰是井太大也出玉泉子兒童汲井華慣捷瓶上手杜甫大雲寺詩鑿井不盡土杜甫太平寺泉眼山頭到山下鑿井不盡土香美勝牛乳取供十方僧杜甫詩露井凍銀床同上有靈異韓文宜城驛記宜城驛東北有井傳是昭王井有靈異至今人莫汲捕鳥雀張羅於井上韓文緑草垂石井李賀隂井多蟲亂韋應物亂石崢嶸俗無井杜甫引水詩月峽瞿塘雲作頂亂石崢嶸俗無井長懐賈傅井依然清明詩上萬井逼舂容巴西浪動灌嬰井上橘井尚高褰上絡緯秋啼金井欄李白宅二脩造貧陋毁壊奢盛辭宅崩倒擇鄰附假宅白安宅其究安宅寧宇爰居爰處風雨攸除鳥鼠攸去上棟下宇上棟下宇以待風雨約折中徙居殖殖其庭殖殖平正貌以避燥濕子罕曰吾儕小人皆有闔閭以避燥濕寒暑大厦大厦初成燕雀相賀閒居潘岳無征周禮曰國宅無征注云城中之宅無稅也度地以居人禮獻宅禮曰獻田宅者操書致度土而居晏子之宅近市齊景公欲更之田宅不鬻禮喪不慮居為其無廟禮一區揚雄之先揚季有田一廛有宅一區版屋寢不踰廟白屋白屋覆屋田宅制晉有司奏王公國家京城不宜有田宅未暇作諸國邸當使有往來之處今限京師得有宅一所君子攸寧自請王翦自請美田宅賣宅葬崔寔父亡賣田宅起冢塋立碑碣無資産以酤釀為業長者轍陳平附郭而居門多長者車轍脩造卜築經營繕完葺墻築室百堵必葺叔孫所舘雖一日必葺于垣詩曰之子于垣百堵皆作底灋書曰若考作室既底法厥子乃不肯堂矧肯構堂構垣墉塗暨茨書若作室家既勤垣墉惟其塗暨茨塗泥也茨蓋也卜居葺牆塓室文選仍舊貫脩月令孟秋脩宫室坏垣墻成寢禮季武子成寢晉獻文子成室晋大夫發焉張老曰美哉輪焉美哉奐焉君子將營宫室宗廟為先廐庫為次居室為後宫室既脩牆屋既設斯飛之制改造糞除先人敝廬考室目巧之室則有奥阼土木勝人國語智襄子室美士茁夕曰臣懼土木勝人人不安室相宅有死者後漢董宣少平為北海相大姓公孫丹為五官掾進新宅而卜工占之云當有死者丹乃命子殺道行人置屍舍内以塞咎宣知乃收丹子公殺之鮫人構館於懸流益宅田蚡為相嘗請考工地益宅作之者勞居之者逸文選儉儉而不陋我圖爾居脩垣左氏毁壞尤其室宋向戌見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間更宅景公謂晏子曰子之宅近市湫隘嚻塵不可以居請更諸爽塏對曰君之先臣容焉臣不足嗣之於臣侈矣及晏子如晉公更其宅反則成矣既拜乃毁曰非宅是卜唯鄰是卜卒復其舊宅而止壞魯共王好治宫室壞孔子舊宅以廣其居無有壞隳壞其室禮剥廬易徹我牆屋詩重勞開一徑後漢張仲蔚蓬蒿滿宅唯開一行徑無毁我室無發屋居辭宅霍去病為將軍帝欲治第去病辭曰國讐未㓕臣無以家為晏子見前注北第北第者近北闕之第嬰最第一也故張衡西京賦云北闕甲第當道直啓推讓後漢范遷為司徒裁有一宅復推與兄子及薨子建自田種置宅三畝時人美之又沈輔字伯禽少履恭儉䘮父服闋推讓田宅與親貧不足者又吳志周瑜推道南大宅以舍孫策與策為友升堂拜母有無通共擇鄰定鄰物理論曰宅者先定鄰焉親仁善鄰國之寶也協比其鄰諸侯守在四鄰孟母三徙以擇鄰里仁為美仁里思𤣥賦匪仁里而焉擇恤鄰晏子曰惟鄰是卜二三子先卜鄰矣五家為鄰五鄰為里度土而居惟鄰是卜張霸受嚴氏春秋博覽五經諸生慕之各市宅其傍以就學後漢時必有鄰論語徳不孤必有鄰睦乃四鄰蔡仲之命貧陋一畝環堵儒有一畝之宫環堵之室蓽門圭竇蓬戸甕牖窮僻蕭何為相買田宅必居窮僻不治垣屋陋巷蓬蒿張仲蔚所居蓬蒿没人儉而不陋湫隘囂塵晏子宅見上蝸舍焦先容身文子曰古之為道者量腹而食容身而居偪下偞卑偞迫也墮莢反禮未免燥濕之患繩樞宫室卑庳上漏下濕蓆門陳平其居容易糞土之牆奢盛居處不淫高其閈閎厚其牆垣豐屋峻宇雕牆美其室向戍見孟獻子尤其室曰子有令聞而美其室非所望也輪奐山節藻梲臧文仲山節藻梲君子以為濫矣丹楹刻桷魯莊公丹桓公楹刻桓公桷非禮也取諸大壯良田廣宅甲第宣驕所閱多矣平恩侯許伯入第蓋寛饒仰視屋而嘆曰富貴無常忽則易人此如傳舍所閱多矣利田宅魏武侯卒中試則復其戸利田宅也寢不踰廟禮請地益宅田蚡事見上注容長㦸幡旗晉王濬士治恢廓有大志嘗起宅開門前路廣數十步或問之濬曰吾欲容長㦸幡旗衆咸笑之土木勝人見脩造門注侵併晉廷尉張闓住小市欲奪左右宅以廣其居乃私作都門早閉晏開人訟於賀循循白闓闓遂毁之屋不呈材文選宫室無量傳汰侈膏腴漢武安侯蚡營甲第地極膏腴堂羅鐘鼓石董呈巧致功期不陀弛非石非董疇能居此衣以綈錦哀帝建董賢宅豐其屋易許伯延賔尚懼蓋侯之誡趙文考室猶欽張老之言崩倒棟折榱崩僑將壓焉梁木其壞禮舊宅支壞天之所壞不可支也傳傾阤騫崩持危扶顛軫騫崩之慮貽燥濕之憂壞墮剥廬易小人剥廬一日必葺其墻屋叔孫昭子假宅田生如長安假大宅令其子求事吕后謁者張釋卿見史記假舘曹交謂孟子曰交得見於鄒君可以假館願留而受業於門王子猷世說王子猷毎假人宅必種竹人詰之曰不可一日無此君推與周瑜事見辭宅門注孔壯麗河間元主孝恭嘗謂人曰吾所居頗壯麗非吾心也當别營一區令粗足充事而已吾殁後子也才易以守不才不為他人所利以圖購宅馬周為御史時遣人以圖購宅衆以其興自書生素無貲皆竊咲它日白有佳宅直二百萬周遽以聞詔有司給直求勝地為創第帝幸翠㣲宫求勝地為創第改治第宅李元紘當國累年未嘗改治第宅甲當時張宏靖先第在東都思順里盛麗甲當時無正寢李義琰宅無正寢弟義璡為市堂材送之義琰曰以吾為國相且自愧尚營美宇是速吾禍豈愛我者耶義璡曰凡仕為丞尉且崇第舍兄位高安可偪下哉答曰不然事難全遂物不兩興既處貴仕又居廣宇非有令徳必受其殃卒不許侈甚馬璘家富不貲治第京師侈甚其寢堂無慮費錢二十萬緡徳宗在東宫聞之不喜及即位乃禁第舍不得踰制詔毁璘中寢及宦人劉忠翼第璘家懼悉藉亭館入之官其後賜羣臣宴多在璘山池開第昌化里岐陽公主下嫁杜悰開第昌化里疏龍首池為沼無所增廣李愬其昆弟賴家勲貴矜室廬唯愬所處乃父時故院無所増廣盛葺第舍潘孟陽盛葺第舍帝微行至樂游原望見之以問左右孟陽懼輟不敢治亘街陌獨孤及疏曰擁兵者第舘亘街陌權貴優笑地李訥初居與宰相楊收接收欲市訥兄舍以廣第訥叱曰先人舊廬為權貴優笑地耶多置嘉石美木牛僧孺治第洛之歸仁里多置嘉石美木賣居宅席豫疾篤遺令貲不足可賣居宅以終事功役叢煩楊憑治第永寧里功役叢煩室處庳漏崔郾室處庳漏無步廡至霖淖則客蓋而屐以就外位輞川王維别墅在輞川地奇勝有華子崗欹湖竹里舘柳浪茱茰沜辛夷塢與裴廸遊其中賦詩相酬對第舍華僣許敬宗營第舍華僣至造連樓使諸妓走馬其上重關復壁李林甫所居重關複壁絡版甃石一夕再徙家人亦莫知也十尺之舍元徳秀未嘗有十尺之舍第舍華僣彌跨都邑楊國忠結廬北渚仲長子光隱者也無妻子結廬北渚凡三十年非其力不食王績愛其真徙與相近宅氣索然浮屠泓黄州人嘗為燕國公張說市宅戒曰無穿東北王隅也他日見說曰宅氣索然云何與說並視隅隅有坎丈餘泓驚曰公富貴一世而已諸子將不終說懼將平之泓曰客土無氣與地脉不連譬身瘡痏補他肉無益也說子皆汙賊死斥裴度治第東都集賢里裴度治第東都集賢里沼石林叢岑繚幽勝作别墅具燠舘凉臺號緑野堂激波其下卜宅篇吕才卜宅篇曰易稱上古穴居而野處後世聖人易之以宫室蓋取諸大壯殷周時有卜宅之文詩稱相其隂陽書云卜洛食為魏徴孫贖故第白居易李師道上私錢六百萬為魏徴孫贖故第居易言徴任宰相太宗用殿材成其正寢後嗣不能守陛下猶宜以賢者子孫贖而賜之師道人臣不宜掠美帝從之通永巷郭子儀宅居親仁里四分之一中通永巷家人三千相出入不知其居本傳池觀堂皇為當時第一楊綰始輔政御史中丞崔寛本豪侈城南别墅池觀堂皇為當時第一即日遣人毁之居寢鬱然楊行宻見王茂章營第曰天下未定而茂章居寢鬱然渠肯為我忘身乎茂章遽毁損市第為官廨趙恵伯為河南尹時嘗市楊炎第為官廨御史劾炎宰相抑吏市私第貴取其直盧杞召大理正田晉評罪晉曰宰相於庶官比監臨計羡利辠杞怒謫晉於是當監主自盗罪絞飛廡複壁李訓起第善和里通永巷飛廡複壁聚京師輕薄子奉權臣楊損家新昌里與路巖第接巖方為相欲易其廏以廣第損族仕者十餘人議曰家世盛衰繫權者喜怒不可拒損曰今尺寸土皆先人舊貲非吾等所有安可奉權臣耶窮達命也卒不與精思亭李徳裕所居安邑里第有院號精思亭毎計大事則處其中雖左右侍御不可豫詔假光宅里官第王涯再為翰林學士帝以其孤進自樹立數訪逮以私居逺或召不時至詔假光宅里官第諸學士莫敢望擬憲宫禁𤣥宗貴妃楊氏兄銛與錡國忠諸姨五家第舍聮亘擬憲宫禁見他第有勝者輙壞復造人臣宅於家姚南仲大厯十年獨孤皇后崩代宗詔近臣為陵以朝夕臨望南仲上疏曰人臣宅於家帝王宅於國長安乃祖宗所宅其可興鑿建陵其側乎辛秘為大官居不易第本傳宅舍如荒村諸孫貧無事宅舍如荒村堂前自生竹堂後自生萱杜詩高甍巨桷韓文垂阿步簷柳文十一廊腰縵廽簷牙高啄見杜牧棼楣有嚴丹雘相宜劉禹錫武陵北亭記木妖唐中官郎將競起亭館第舍力窮乃止時謂之木妖南部新書取庇風雨韓滉居處陋薄取庇風雨富窟富人王元寶頗好賔客宅中起堂甚壯牓以禮賢時呼其宅為王氏富窟門枕流渠録異記段文昌負才傲俗落拓荆楚間嘗半酣靸履於江陵大街往來雨下泥甚街側有大宅門枕流渠文昌醉於渠上脫履濯足旁若無人自言我作江陵節度使必買此宅聞者皆笑其後果鎮荆南遂買此宅玉杯金椀李吉甫宅泓師謂其地形為玉杯玉杯一破無復完全牛僧孺宅如金椀金椀或傷庶可重製金城新宅中宗寵愛安樂公主於金城坊造宅極壯麗帑藏為之空竭出唐舊史辭第輸高義杜甫和嚴中丞宅入先賢傳春日同上悲秋宋玉宅奉漢五王含影漾江流屏跡同上南北二第元載城中開南北二第室宇奢廣當時為冠近郊作觀榭張帟什噐不徙而供建宅宣陽里郭元振建宅宣陽里未嘗一至十王宅唐宗室傳開元後皇子㓜多居禁内既長詔附苑城分院而處號十王宅右屬都城左頫大道長寧公主宅第奪臨川長公主宅以為第旁撤民廬怨聲囂然第成禁藏空殫假萬騎仗内音樂送主還第天子親幸安樂公主憲寫宫省安樂公主營第及安樂佛廬皆憲寫宫省而工緻之五王宅讓皇帝初帝五子列第東都積善坊號五王子宅及賜第上都隆慶坊亦號五王宅云所居履道里疏沼種樹白居易廨署三凶附白伐樹織葦晉羅含字君章為相州别駕以才學知名以廨舍喧擾自於城西小湖安茅屋伐樹為牀織葦為席而居妻子不入漢何竝壞屏障晉阮籍為東平相到郡壞府舍屏障使内外相望脩葺吳陸抗與諸葛恪換宅抗臨去繕完城圃葺其牆屋廬舍恪不然深以為耻去之如始至叔孫雖一日必葺其牆屋擅脩飾晉杜元凱為東羌校尉石鍳奏預擅飾城門宫舍稽乏軍兵車徴詣廷尉以尚主在八議以侯贖論閱人多矣蓋寛饒至許伯第曰此如傳舍所閱多矣凶毁晉羊祜叔子督荆州長史喪多害人皆毁舊府祜以死生有命富貴在天勑征鎮禁斷之孔亟使全新李聴拜邠寧節度使邠署相傳不利治垣舍前刺史視其壞不敢葺聴曰將出鑿凶門何避治署耶亟使全新之卒無異市第為官廨楊炎見宅門起廨韋仁夀檢校南寧州都督詔歲一按行其勞將還酋長泣曰天子藉公鎮撫柰何欲去我仁夀以池壁未立為解諸酋即相率起廨甫旬畧具菑除其廨李吉甫改郴饒二州㑹前刺史繼死吉甫命菑除其廨以視事緑莎㕔河中府有緑莎㕔唐治平時好事者常加澆溉兵興以來而遂至剗削消磨王禹偁送柴諫議任河中詩云緑莎㕔事舊鳴蛩雞跖集極其華侈五代王峻於樞宻起㕔事極其華侈邀太祖臨幸賜予甚厚繕治廨舍唐舊史房琯歴慈溪宋城濟源縣令所在多興利害繕治廨舍頗著能名廁四白周禮邦有大祭賔客厮役煩辱之事煩劇也温廁儀禮𨽻人温廁温塞也為人復往䙝也䧟左傳晉侯將食麥脹如廁陷而卒如廁高祖鴻門㑹因如廁召樊噲等四人間道走軍石崇廁常令婢數十人曳羅縠置之漆箱中盛乾棗奉以塞鼻賈姬郅都侍上賈姬如廁有野彘入廁中上目都擊之都不往上欲自往都伏諌曰一姬死復一姬生上雖欲自輕命奈太后宗廟何太后聞之賜都金焉趙廁襄子廁中䑕李斯云畏人食不潔陶侃晉書侃嘗如廁見一人朱衣介幘劒履曰以君長者故來相報君後當為公侯至八州都督窮子除糞法華經云喻樂小法迫傳蒯瞶迫孔悝於廁强盟之被髮銜刀郭璞在廁桓彛掩之見璞方被髮䘖刀設祭曰常嘱卿莫來今反如此非但禍吾卿亦不免食棗大將軍王敦至石家廁取箱食棗羣婢笑之折脇范雎為魏齊所譛王令人抛廁中折其脅後逃歸秦為張禄先生曹植杜蘭香戒云張碩曰不宜露頭入廁夜行必以燭見庾翼鎮荆州如廁見一物頭如方相兩眼大有光翼擊之入地因病而薨香煙上過襄陽記劉季和上廁從香煙上過誤入劉寔謂石崇曰誤入君内趙襄子如厠心動見豫讓漢高如廁心動過柏人金日磾如厠心動擒莽何羅孔下馬趨厠崔寧朱泚亂㑹王翃赴難時與寧俱出延平門而西寧數下馬趨廁輙迂久翃懼賊追即呼曰既至此而欲顧望乎以世為溷柳宗元曰李赤一惑於恠而所為若是乃反以世為溷為帝居清都今世皆知笑赤之惑也廁鬼同上赤曰吾將從吾妻赤如廁久其友從之見赤軒廁抱瓮詭笑而側視勢且下入乃側曵得之又大怒曰吾已升堂面吾妻吾妻之容世固無有堂之飾宏大富麗椒蘭之氣油然而起顧視汝之世猶溷厠也而吾妻之居與帝居鈞天清都無以異若何苦余至此哉然後其友知赤之所遭乃廁鬼也廁上术湯洛陽要記陳宛盛其居止廁上术湯盥手槐板覆敝糞穴為都城第一廁神每月六廵續幽恠録侍御史錢義方居常樂第夜如廁忽見蓬頭青衣數人來逼義方曰汝非郭登曰然廁神每月六廵藤庭俊出幽恠録樓五白兹樓王粲登樓賦曰登兹樓以四望聊暇日以消憂麗譙魏武有麗譙樓美哉輪焉輪高大也臨大道青樓臨大道曹子建詩齊浮雲古詩西北有高樓上與浮雲齊秦氏古詩日出東南隅照我秦氏樓蜃雲結樓百尺洛陽記曰有百尺樓仙人好樓居層構雲構崇制彭氏黄昌為郡守陟縣彭氏造樓臨道昌行縣彭氏婦人輙升樓而觀昌乃殺之超漢甘延夀以良家子為吏超踰羽林亭樓陟降投墜墜孫秀求緑珠不得及石崇將刑珠乃墜樓死望氣張華善天文解望氣與雷煥夜登樓望見紫氣起斗牛間華曰何氣也雷孔章曰其寶劍氣乎又蜀志周羣作小樓多令奴更直於上視天纔有一氣即白羣規模雖欲干雲制作亦宜揆日十二重之制鮑照詩鳯樓十二重井幹音寒漢武帝造井幹樓高五十丈在建章宫中井幹垣也吹簫秦穆公女弄玉登樓吹簫感鳯來登南樓庾亮字元規在武昌諸佐吏殷浩之徒乗秋夜佳序共登南樓不覺亮至諸人將起避亮曰諸君少住老子於此興復不淺便據胡牀與浩等談詠干雲霧而上達井幹疊而百層文選虞氏高樓列子虞氏者梁之富人登高樓臨大路擊摶樓上而笑有俠客在下飛鳶適墜腐鼠中俠客曰虞氏富樂已久吾不侵犯乃以此辱我此而不報非也遂率其属以滅其家孔籌邊樓李徳裕建籌邊樓召習邊事者與之商訂凡虜之情偽盡知之花萼相輝勤政務本讓皇帝憲天子於宫西南置樓其西署曰花蕚相輝之樓南曰勤政務本之樓帝時時登之聞諸王作樂必亟召升樓與共榻坐作三重樓以馮觀長寧公主起樓聚書田宏正紫雲鄭注帝嘗詠杜甫曲江辭有宫殿千門語意天寶時環江有觀榭宫室聞注言即詔兩神䇿治曲江昆明作紫雲樓采霞亭詔公卿得列舍堤上迎仙高駢造迎仙樓高八十尺百尺樓吕用之建百尺樓託云占星實窺伺城中之有變者燒畢師鐸出駢囚南第燒貢奉樓數十楹七重西域泥婆羅宫中有七重樓覆銅瓦楹棟皆大琲雜寶四隅置銅槽下有金龍口激水仰注槽中宴廣達明皇宴王君㚟及妻夏於廣達樓七鳳五代于闐有七鳯樓長慶登齊雲作辭五代韓建昭宗幸其鎮登齊雲樓西北顧望京師作菩薩蠻辭三章其卒章曰野烟生碧樹陌上行人去安得有英雄迎歸大内中酒酣與從臣悲歌泣下望仙樓武宗帝紀㑹昌六年六月甲申置望仙樓于神䇿軍樵兒牧豎過亦指之文粹沈光太白酒樓記瓦缺椽蠡雖樵兒牧豎過亦指之曰李太白常醉於此四壁含清風丹霞射其牖韋蘇州綺樓何氤氲朝日正杲杲四壁舍清風丹霞射其牖隆樓隆樓傑閣磊嵬高韓愈記夢雄昈競侈文粹獨孤霖宣州疊翠樓當正據扉雄昈競侈五步一樓杜牧阿房賦碧瓦朱甍照城郭孤城西北起高樓碧瓦朱甍照城郭杜甫越王樓歌虞姬壻唐李陽題名於昭慶縣樓韋蟾留謔曰渭水秦川拂眼明希仁何事寡詩情只應學得虞姬壻書字才能記姓名趙倚樓杜紫微讀趙嘏早秋詩曰殘星㡬㸃鴈横塞長笛一聲人倚樓吟咏不已因目嘏為趙倚樓望省樓崔日用恨不居八座為太常卿起樓與尚書省對人謂之崔公望省樓散花樓唐成都有散花樓河東有薰風樓泥樓李景讓為御史大夫貴戚有看街樓閣皆泥之畏其糾彈也出金華子燕子樓白居易集張尚書有愛妓曰眄眄尚書既没張氏舊第有小樓名燕子眄眄念舊愛而不嫁居是樓十餘年幽獨悵然歌吹孫楚樓李白朝沽金陵酒歌吹孫楚樓翫月金牕夾繡戸珠箔懸瓊鈎飛梯緑雲中極目散我憂散花樓同上丹霄樓帝宴丹霄樓翡翠為樓金作梯李白别曲深宫高樓入紫清金作蛟龍盤繡楹春日行江樓翼瓦齊杜甫子規造大樓以祈祥劉闢以太一舍于蜀乃造大樓以祈祥避暑唐莊宗思得高樓避暑宦官進曰郭崇韜眉頭不伸常為租庸惜財用陛下雖欲有作其可得乎莊宗使人問崇韜崇韜曰願陛下無忘創業之難常如河上則可使繁暑坐變清凉莊宗黙然終遣王允平起樓上皇正在望仙樓元稹連昌宫詞上皇正在望仙樓太真同凭欄干立樓上樓前盡珠翠炫轉熒煌照天地端正樓寢殿相連端正樓太真梳洗樓上頭晨光未出簾影黒至今反掛珊瑚鈎同上詔都人列繒樓幔閣裴矩傳結綺樓懿宗宴太后於三殿命翰林學士侍於結綺樓閣六白圖畵漢於麒麟閣上圖畵功臣飛閣文選飛閣逶迤鳳巢帝王記黄帝時白鳯巢於阿閣投閣王莽以符命自立時揚雄校書於天禄閣上治獄使者欲收雄雄從閣上自投㡬死京師語曰惟寂惟寞自投于閣阿閣古詩云交䟽結綺窓阿閣三重階綠苔生閣文選劍閣蜀道菌閣謝元暉詩尋雲師累榭隨山望菌閣層閣層閣肅天居詩芸閣華閣七啓華閣緣空飛陛凌雲連閣連閣水宫延閣結陽成之延閣飛觀榭乎雲中三閣陳後主孔下臨肆區河間王子晦初晦第起觀閣下臨肆區其人候晦曰庻人不及以禮然室家之私不願外窺今將辭公晦驚遽毁撤之飛鸞閣前蜀王衍起宣華苑苑有飛鸞閣登李正抱匡威皆失國無聊相與登城西高閣顧覽山川泫然而泣四香閣楊國忠用沉木為閣檀香為欄檻以麝香乳香飾土為泥飾於閣壁時人謂之四香閣服慈神龍初東都造服慈閣許景先獻賦朝元席豫嘗登朝元閣賦詩羣臣属和帝以豫詩最工華詭長寧公主魏王泰故第泰薨主丐得之亭閣華詭埒西京傑閣韓愈詩瓌瑋絶特之稱韓文滕王閣記愈少時嘗聞江南多登臨之美而滕王閣獨為第一有瓌瑋絶特之稱十步一閣杜牧阿房賦閣道步行月李詩江閣隣石面杜甫水閣朝霽高閣倚天半杜牧詩飛閣凌太虛韋應物飛閣凌太虛晨濟鬰崢嶸滕王閣王勃道出鍾陵九月九日都督大宴滕王閣宿命其壻作序以誇客因出紙筆徧請客莫敢當至勃汎然不辭都督怒起更衣遣吏伺其文輒報一再報語益奇乃矍然曰天才也請遂成文極歡罷凌煙閣圖畵功臣儀仙閣宋之問詩起草儀仙閣翔鸞棲鳯唐六典工部丹鳯門内中正殿曰含元殿夾殿二閣左曰翔鸞右曰棲鳯臺七白三休楚王誇客以章華之臺登之三休乃至其上五仞說苑楚莊王築五仞之臺九層老子云九層之臺起於累土章華見上注姑蘇吳都賦作姑蘓之高臺臨四逺而特建露臺漢文帝欲起露臺計費百金曰百金中人十家之産何以臺為春臺衆人熈熈如登春臺經始經始靈臺築臺置金燕昭王置千金於臺上以延天下士謂之黄金臺崇制峻址集鳯蕭史與弄玉吹簫於臺上有鳯集戱馬臺項羽有戯馬臺騫崩版築作于河上衞宣公納伋之妻作新臺于河上而要之國人惡之榭月令仲夏可以居高明可以處臺榭時制春臺妨農傳宋皇國父為平公築臺妨於農收子罕請俟農功畢築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之執朴抶其不勉者曰吾儕小人皆有闔閭以避燥濕寒暑今君為一臺而不速成何以為役君子謂子罕能分謗中天魏襄王欲築中天之臺許綰諫乃止中天半天也崇九層之制雖欲凌雲起一簣之功亦宜揆日崔嵬垤堄崇崇之制登登之功高以望仙漢武立望仙臺逺而思子漢武帝作思子臺以念戾太子八風通靈臺漢武為鉤弋夫人死後作通靈臺集烏御史府亦曰集烏臺瑶臺仙人所居鹿臺武王散鹿臺之財歸來望思之臺見上思子注彈人晉靈公不君從臺上彈人觀其避丸者漸臺漸臺立於中央狀西白虎曲陽侯王根作漸臺狀西白虎潘扼腕潘岳西征賦曰望漸臺而扼腕王莽死於漸臺陽臺蘭臺令史下筆不能自休思古詩云思婦臨高臺銅雀臺魏武帝臨高臺九層說苑晉靈公造九層臺三年不成人力困敝出令敢諫者斬荀息進曰臣能累十二棋子加九卵於上公曰危哉息曰不危公造臺三年不成男不耕女不織亦甚危矣公遂止觀臺傳登觀臺以望而書禮也通天漢武臺名孔崇臺蜚觀長寧公主廢永昌縣主丐其治為府以地瀕洛築障之崇臺蜚觀相聨属標置華壯李昭徳武后營神都昭徳䂓創文昌臺標置華壯望仙柳仲郢武宗延方士築望仙臺累諌諄切登吹臺杜甫少與李白齊名嘗從白及高適過汴州酒酣登吹臺慷慨懐古人莫測也玉女臺李軌敗嘆曰人心去矣天亡我乎攜妻子上玉女臺屬酒為别安脩仁執送之凉臺裴度午橋作别墅具燠舘凉臺凝霞臺日本國之東三萬里有凝霞臺歌臺暖響春光融融杜牧賦砌臺王侯家多砌臺以為臨觀之景唐張仲封詩云寫望臨香閣登高下砌臺即知唐以來有之愁臺明宗入汴莊宗與元行欽登道旁冢置酒相顧泣野人獻雉問其冢名曰愁臺也因罷酒去五代史臺傾禾黍繁李白登金陵冶城詩高臺一悄望逺樹間朝輝韋應物曾臺俯風渚杜甫雨詩殊俗狀巢居曽臺俯風渚平臺放古遊玉臺觀春臺引細香前閣㑹詩並同上周臺漢園杜牧望故園賦神雀臺天寶二年以赤雀見置唐地理志堂八白堂除考工記堂除十二分謂階前不趨堂上不趨接武堂上接武布武堂下布武不下堂天子不下堂而見諸侯滿金玉滿堂莫之能守玉堂漢武玉堂在太液池南垂堂千金之子坐不垂堂皇堂後漢胡建為軍正斬監察御史於皇堂上堂無壁曰皇萬金後漢靈帝造萬金堂於西園將上堂聲必揚倨堂而應老子見孔子寢處我兮滿堂文選衆滿堂而飲酒獨坐而掩淚升堂由也升堂矣孔隘陋韋表微所居堂寢隘陋鏡堂顧彦睴梓有鏡堂世稱其麗彦睴嘗㑹諸將堂上義堂馬燧起義堂帝牓其額以寵之堂如偃月李林甫有堂如偃月號月堂每欲排擊大臣即居之思所以中傷者若喜而出即其家碎矣草堂盧鴻廬嵩山官營草堂綠野堂裴度作别墅號綠野堂率一堂費緡千萬貴妃楊氏諸姨第舍聨亘率一堂費緡千萬徳星堂崔鄲居光徳里創便齋宣宗嘆曰鄲一門孝友可為士族法因題曰徳星堂芸暉堂唐杜陽編元載末年造芸暉堂芸香草也出于闐國其香潔白如玉入土不朽為屑以塗壁故號芸暉焉更以沉檀為梁棟飾金銀為戸牖喻峻李徳裕周勃功臣論善哉賈生之說喻堂陛之峻高者難攀卑者易陵也淺有蒲蓮深有葭葦韓文谿堂詩公作谿堂播播流水淺有蒲蓮深有葭葦又曰流有跳魚岸有集鳥谿有薲苽有龜有魚公在中流右詩左書賔燕同上公以賔燕其鼔駭駭公燕溪堂賔校醉飽金盆貯瑟虢國堂成以金盆貯瑟瑟三斗以賞匠者見明皇雜錄堂先無挾廡韓滉堂先無挾廡弟洄稍増補之滉見即徹去曰先君容焉吾弟奉之猶恐失墜安敢改作以傷儉徳連山高原林麓之崖間廁隱顯柳宗元新堂記連山高原林麓之崖間廁隱顯邇延野綠逺混天碧公堂宿霧披杜甫崔明府詩堂柱生槐枝孫偓始家堂柱生槐枝朞而茂既而偓秉政屋室九梁柱牎瓦附白上棟下宇版屋詩曰在其版屋亂我心曲注西戎版屋心曲心之委曲也定之方中作于楚宫揆之以日作于楚室考室斯干宣王考室築室百堵築室于兹美其室孟獻子見宅門注必葺葺屋瓦屋考工記葺屋三分瓦屋四分注各分其脩以其一為峻土木勝人見上瞻彼闋者虛室生白莊子言夫視有若無虛室也室虛而純白獨生目巧之室則有奥阼君其反室武詔丞相石慶言使還家也仰視屋室蓋寛饒事見上注淵客江賦淵客築室于岩底宇下泥衞之在宇下梁欂櫨說文梁欂櫨也撫梁易柱論衡曰紂能撫梁易柱遺絹後漢書曰陳寔字仲弓為太丘長嘗夜隂有人伏梁上寔曰梁上者君子也遺絹兩疋梅梁吳越春秋曰夏禹廟以梅木為梁畵羊懸穀廣州記曰州㕔梁上畵五羊又作五懸囊隨羊穀之云昔高固為楚相五羊䘖穀萃於楚庭故圖其象為瑞六國時廣州屬楚繞梁論衡曰韓娥古之善歌者毎一歌餘聲三日繞梁上塵懸頭蘇秦傳曰秦少學苦於睡以頭髮係梁上手引錐刺股以醒睡柱吳越春秋曰越王念吳欲復之中夜抱柱而哭羣臣曰君何愁之甚復讎臣下之急也銅柱後漢馬援征南蠻樹銅柱紀功而歸梓柱生枝葉漢成帝時梓柱生枝葉扶踈上出屋王氏執權之徴倚柱書夏侯𤣥倚柱書雷霹靂不驚崐崘山有銅柱公孫樓柱盛宏之荆州記曰巴東有一折柱孤直高三丈大可十圍傳云是公孫述樓柱破之血出枯而不朽天柱折列子曰共工氏與顓頊爭帝位頭觸不周山崩天柱折地有四柱河圖括地象曰地下有四柱三百六十軸陸玩柱石晉書陸玩字士瑶初遷侍中轉司空有人詣之飲酒寫柱中呪曰當今乏材以汝為柱石莫傾人棟梁玩笑曰得卿良箴敬而佩之嘗嘆曰以我為三公無人談者以為知言然銅柱列女傳紂作銅柱以炭火然之令有罪者抱其柱輒墮妲己觀而笑金塗漢武故事曰上起神屋以銅為柱黄金塗之丈五圍晏子鑿楹晏子將死鑿楹納書謂妻子曰子壯而視之及子壯發書書曰布帛不可窮窮不可服事不可窮窮不可壯出晏子春秋一柱博物志江陵有一臺唯一柱衆梁並皆共之水精柱魏畧曰大秦國以水精為屋柱楹謂柱也廣雅曰釋名曰柱住也楹亭也言亭亭然孤立窻牕牖也廣雅曰朱鳥牖漢武故事曰西王母降東方朔於朱鳥牖中窺母謂帝曰此兒無頼久被斥逐原心無惡尋應得還雲母牕珊瑚牕又曰帝起神屋有雲母牕有珊瑚牕四面夾牕周官曰夏后作堂四面夾窻馬后不臨張璠漢記曰明帝馬皇后不喜出游未嘗臨御窻牖八牕孝經注曰明堂之制八牕四達上圓下方雲集記曰范雲字彦龍少與梁武帝甚篤相隨宿一家雲望見牕外二人窺一人曰可進一人曰有王有相不可也乃俱拜從牕進後帝登位拜雲僕射鹿精晉書謝鯤嘗宿一空亭聞人於外呼鯤字鯤從牕視之乃一著黄人遂引其膊斷之乃鹿精也尋血得之雞語兖州刺史宋處宗買得長鳴雞籠著牕間忽作人語與宗談論終日瑠璃牕世說滿奮畏風武帝坐瑠璃牕内甚宻奮疑其疎恐之帝問其故答曰臣如吳牛見月而喘祁嘉晉書祁嘉清貧好學夜忽牕中有人呼云祁嘉隱去來脩飾人間甚苦不可諧所得未毛銖所䘮如山嶽嘉旦乃悟矣綺疏碧䟽牕中列逺岫不窺牖而見天道老子青𤨏瓦銅瓦漢武故事云起神屋以銅為瓦漆其外撤瓦漢書霍光巷行人見有人居光屋上撤瓦投地就視不見霍誅之應水精瓦呉外國傳曰大秦國王宫殿水精為瓦飛神仙傳班孟圖吹人屋瓦飛入人家吹漢平帝元始四年冬風吹長安城東門屋瓦並盡投孟陽晉張載字孟陽貌醜遊洛陽市羣女以瓦石投之縹碧劉駼騊詩曰縹碧以為瓦鴛鴦之瓦博物志瓦中秦時東郡守為瓦所中遂坐死此亦畏忌所驗毁方瓦合禮瓦不成沬禮乃生女子載弄之瓦瓴甓孔輟殿材為正寢魏徴家初無正寢帝命輟小殿材為之素室司空圖居中條山王官谷作亭觀素室悉圖唐興節士文人寧極盧鴻所居室自號寧極壇室司馬承禎𤣥宗詔於王屋山置壇室以居築室相近秦系姜公輔之謫見系輒窮日不能去築室與相近忘流落之苦茨以生草椽棟不施斤斧張志和兄鶴齡恐其遁世不還為築室越州東郭茨以生草椽棟不施斤斧太虛為室陸羽嘗問孰為往來者志和對曰太虛為室明月為燭與四海諸公共處未嘗少别也何有往來竹茅茨屋宋璟徙廣州都督廣人以竹茅茨屋多火璟教之陶瓦築堵俗始知棟梁利石室韋貫之居輔相石室无所改易架巢空穴柳宗元貞符曰惟人之初雪霜風雨雷雹暴於是乃知架巢空穴木處而顛土處而病然後為之宫室考宫室必以閌門豐屋為美劉禹鍚論書牕綃疑閟艶韓愈聨句以錦紋石為柱唐王元寶天寶遺事木瓦虢國夫人恩傾一時奪韋嗣立宅以廣其居後復歸韋氏因大風折木墜堂上不損視之瓦皆堅木也明皇雜錄欹瓦居易樂叟詩紅葉紛紛蓋欹瓦瓦縫差差釘頭磷磷阿房宫賦蓋瓦級甎韓愈滕王閣記銀瓦南蠻婆賄伽盧國厨覆銀瓦風櫺韓愈詩暑夕眠風櫺瓦甓無脛而犇萃歐陽詹二公亭記冰油飾牕鳯池篇楊炎在中書後閣糊牎用桃花紙塗以冰油取明也竅如七星逢原記鄭廣文屋室破漏下望之竅如七星負棟之柱多於南畝之農夫架榱之椽多於機上之工女榱椽梁柱以成大室乂負偃直各安所施而無遺材其諸將之謂耶唐賛瓦獸李賀松乾瓦獸殘朝室夕室柳文東亭記朝室以夕居之夕室以朝居之度堂匪華麗養拙異考槃杜甫詩野廬不鉏理翳翳起荒煙韋應物不出環堵坐入吳甸包山震澤不出環堵若在牖外柳宗元鑄銅為瓦王縉傳五臺山祠鑄銅為瓦金塗之門戸十天子門諸侯脩造附白重門易曰重門擊柝以待暴客外戸禮曰大道之行外戸不閉由戸語曰誰能出不由戸重門有閈閈髙貌掃門魏勃掃齊相曹參門關揵善閉無關揵而不可開老子重閉傳曰勇夫重閉高其閈閎閎門踰越傳曰門不容車而不可踰越高卑合禮啓閉隨時閫閾扄鐍立不中門行不履閾踰閾婦人送迎不出門見兄弟不踰閾長者之轍陳平門多長者之轍以通往來作限内外不可踰也何莫由斯以時啓閉祀戸祭先脾月令孟春陽氣出祀之於戸其祀門祭先肝孟秋隂氣出祀之於門外順隂也凡祀門為祖祭先肝戒門閭脩揵閉孟冬禮有以高為貴者位尊高則門高拂闑禮君入門介拂闑大夫中棖與闑之間介拂棖凡入門近中為尊不出戸庭蓽門圭竇衡門之下可以棲遲西南其戸蓬戸甕牖繩樞陳涉席門陳平也通徳門後漢鄭元里門名通徳門銘摯虞門銘云禄無常家福無定門人謀鬼謀道在則尊題門翟公受福於戸邪孟嘗君大吾門吕不韋雀羅翟公罷廷尉賔客皆去門可張羅高其門于公銅戸列士傳曰吳王闔閭畏王僚之子慶忌作石室銅柱以備之閉戸先生孫微常閉戸號閉戸先生不完莊子曰原憲家貧蓬戸不完諱晉書羊祜為荆州卒後人為諱祜以戸為門何不高其戸春秋後語薛靖郭君曰嬰嬖妾五月五日生子文俗云此月生子及戸損其父妾匿養之文長曰受命於天受命於戸何不髙其戸卧戸風俗通曰卧戸砌者畏縮其頭令人病顛昌戸帝王録曰有赤雀銜丹書止於昌戸闚其戸闃其無人三戸盡閉王充論衡曰燕王在明光宫欲入所卧處三戸盡閉使二十人開不得不出戸而知天下天子門禮天子五門謂臯門庫門雉門應門路門九重楚辭曰天之門兮九重金馬漢武帝立金馬於魯班門外因改曰金馬門千門蕭相國脩未央宫千門萬戸曰天子之居非壯麗無以重威秦師過北門左右免胄而下超乗者三百餘人王孫滿尚㓜觀之言於王曰秦師輕而無禮必敗過天子門不卷甲束兵超乗示勇後果為晉所敗黄金門楚辭云黄金為君門諸侯門樹塞語邦君樹塞門朱戸漢册魏公九錫文曰以君翼宣風化華夏充實是用錫君朱戸赤戸以居臺門天子之禮臺門旅樹大夫僣禮也言此諸侯之禮大夫僣之請髙其門于公門壊父老共治之于公曰少請其高令容駟馬我理獄多隂徳子孫當有興者至于定國為丞相請容車馬晉陳頵父訢立宅門頵請容車馬後為主簿從事乗車馬歸家踦閭而語公羊傳晉二大夫相與踦閭而語注閭當道門也閉一扇一人在内一人在外曰踦禹三過不入用牲左傳秋大水用牲于門非禮戸開亦開戸闔亦闔大君子之門董仲舒曰當作為力而已不足稱大君子之門注云仲尼之門故稱大脩造啓閉從時門戸橋道謂之啟城郭牆壍謂之塞皆開閉之急不可一日而闕脩其闔扇月令仲春脩鍵閉孟冬有司戒門閭脩鍵閉必重閉也容駟見上注門材與之門材鑿戸牖以為室䡾䡾飛簷䡾音五羯反丁丁必葺廣門衡以旌儒鄭𤣥字康成北海相孔融敬元曰于公僅有一節猶戒高其門閭矧鄭公之徳而無四牡之路可廣開門衡令容車馬號通徳門孔門隘不能容翟車太平公主假萬年縣為㛰舘門隘不能容翟車有司廢垣以入入由左出由右馬周請城門入由左出由右本傳創定鼎上東諸門李昭徳武后營神都昭徳規創定鼎上東諸門往來皆有簿籍姚珽書其三曰前世東宫門閤往來皆有簿籍殿下時有所須惟門司宣令姦偽乗之並請内即畫署冀免詐謬未嘗過門杜黄裳時王叔文用事黄裳未嘗過其門曳車塞闔高固為渾瑊童奴字黄岑徳宗在奉天固仍從瑊賊突入東壅門固引銳士長刀殺賊數十人曳車塞闔賊不能入封渤海郡王指府門田頵已平馮宏鐸至揚州謝行宻又求池歙為属州行宻不許頵始怨將還指府門曰吾不復入此天子自書牓其門田游巖舊宅直宮左天子自書牓其門曰隱士田游巖宅買地大其閎張志和築室越州東郭觀察使陳少游往見為終日留以門隘為買地大其閎足不履路敬淳少志學足不履門歴世名節為天下所高袁朗孫誼為蘇州刺史司馬張沛者侍中文瓘子嘗白誼曰州得一長史隴西李亶天下甲門也誼曰夫門戸者歴世名節為天下所高老夫是也悉走其門李林甫改右相或帝不朝羣司要官悉走其門臺省為空闔門陸羽闔門著書多出其門劉晏任職久勢軋宰相要官華使多出其門能大其門韋王貫少孤臯謂能大其門名曰臧孫推為盛門李叔明始叔明與仲通俱尹京兆及兼秩御史中丞並節制劍南又與子昇俱兼大夫蜀人推為盛門自高鄭仁表嘗以門閥自高牓其曹門張讀遷吏部侍郎中和初為吏部選牒精允調者丐留二年詔可牓其曹門崔之門安得不大柳玭家訓牓選院蘇晉典二都選因牓選院曰門下㸃頭者更擬政事堂北門常衮同平章事政事堂北門異時宰相過舍人院咨逮政事至衮乃塞之以示尊大仙遊尋真潘師正居逍遥谷帝尊異之敕直逍遥谷作門曰仙遊曰尋真清髙門戸白樂天語人曰吾已脫去利名枷鏁開清高門戸但連龕子母丹不知何日可成出自慶傳門闢戸闔連機弛張似公之政經便而通也劉禹錫武陵北亭記苔扉月出東山苔扉半關杜牧望故園𤨏戸交疏禄山門當列㦸韓滉門當列㦸以父時第門不忍壊乃不請籠虛門李賀詩雕玉神簾上輕穀籠虛門晝題時刻夜題更籌司門郎中員外郎各一人掌門關出入之籍凡闌遺之物凡有召者降墨敕勘銅魚木然後入監門校尉廵日送平安凡奏事遣官送之晝題時刻夜題更籌唐史百官志䦨遺之物揭於門外闌遺之物揭於門外榜以物色期年没官同上剥剥啄啄有客至門韓愈剥啄行蒼岑疎秋門李賀到洛一門盡貴唐宣州夏榮相陸象先蕭嵩曰陸郎位極人臣然不及嵩一門盡貴位高而有夀門䦨洞豁而森爽杜甫太廟賦始築候潮通江城門吳越武肅王見備史爭趨其門唐大厯中楊綰為相徳望日崇天下雅正之士爭趨其門門樹六闕楊炎孝著三代表其門閭門樹六闕門若市然𤣥宗貴妃楊氏四方獻餉結納門若市然出門復入門出門復入門兩脚但如舊杜甫九日寄岑參門如沸湯李義府母妻諸子賣官市獄門如沸湯城門郎掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之開則先外而後内闔則先内而後外所以重中禁尊帝居也候其晨昏擊鼓之節而啟閉之出唐六典旌其家大署曰忠臣之門天下髙其節唐史馮元常傳白孔六帖卷十
