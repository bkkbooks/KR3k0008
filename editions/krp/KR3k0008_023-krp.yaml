body:
  text: 白孔六帖卷二十三唐白居易原本宋孔𫝊續撰姓氏一名字二諱三報徳四謝恩五夢六姓氏一改姓附白書序曰别生分類生姓也别其姓氏分其族類夏書曰錫土姓以新生之土賜之為姓保姓受氏傳曰若夫保姓受氏以守宗祊世不絶祀無國無之請族傳無駭卒羽父請謚與族因生以賜姓因其所生以賜姓若舜由媯汭生故以陳為姓胙之土而命之氏報之以土而命氏國陳之類也諸侯以字諸侯位卑不得賜姓故臣因其王父字也為諡因以為族或以先人之諡稱以為族官有世功則有官族邑亦如之謂取其舊官舊邑之稱以為族公命以字為展氏無駭公子展孫故為展氏因功命氏居官以為姓氏漢食貨志言武帝初如此倉氏庾氏之類也第五後漢第五倫其先齊諸田徙園陵多以次第為氏也争先後晉王導與諸葛恢戲争族氏王曰人言王葛不言葛王何也恢曰譬如驢馬驢能勝馬乎庶姓薛庶姓也我不可以後之族類賜姓金日磾七世内侍本以休屠作金人祭天故賜金氏以官漢武時為吏者長子孫居官者以為姓氏今倉氏庾氏也品官晉摯虞字仲治撰族姓昭穆十卷上疏進之以為足備物廣多聞人以為定品違法司徒劾之詔原之改姓推律漢書京房字君明本姓李氏推律自定京氏而姓指樹伯陽生於李樹下遂指李樹為姓劉婁之賜婁敬賜姓劉氏曰婁者劉也疎束晉束晳其先疎姓避亂改姓因去疎之足為束馬矢大司徒馬宫本姓馬矢遂稱馬氏張禄范雎變姓名曰張禄先生冒姓衞青父鄭季給事平陽侯主家與少兒通生青故冐姓衞氏又漢張孟為灌則舎人得幸進之二千石蒙姓灌氏孟灌夫父也民無上吳志氏儀本姓氏孔融嘲之曰氏字民無上可改為是遂改徐衆評曰古之建姓或以所生或以官號或以祖名今離析文字横生諱忌本誣祖也避仇改姓棗據本姓棘避仇改姓為棗又嵇康其先姓奚以避怨嵇山以為氏又范蠡浮海出齊易名為鴟夷子後至陶為陶朱公妨父晉陳元達字長宏後部人也本姓喬以生月妨父故改姓陳也載鹽第五倫官未達客河東變姓名稱王伯齊載鹽往来太原上黨所過糞除孔賜姓李勣本姓徐氏武朝徳二年隨李宻歸廷詔授黎州總管封英國公賜姓附宗正属籍世族志髙士亷太宗詔士㢘與韋廷岑文本令狐徳棻徵天下譜牒叅考史傳撿正真偽進忠賢退悖惡先宗室後外戚退新門進舊望右膏梁左寒畯合二百九十三姓千六百五十一家為九等號曰世族志姓氏録髙宗時許敬宗以不叙武后世又李義府恥其家無名更以孔志約楊仁卿史𤣥道吕才等十二人刋定之合二百三十五姓二千二百八十七家帝自叙所以然改為姓氏録定四海望族先是後魏太和中定四海望族以崔寳等為冠其後矜尚門地故氏族志一切降之推叙昭穆賛曰古者受姓受氏以旌有功是時人皆土著故名宗望姓舉郡國自表而譜系興焉所以推叙昭穆使百代不得相亂也肉譜李守素王世充平召署天䇿府倉曺通氏姓學世號肉譜虞世南與論人物始言江左山東尚相酬對至圵地則笑而不答歎曰肉譜定可畏許敬宗曰倉曺此名豈雅目邪宜有以更之世南曰昔任彦昇通經時稱五經笥今以倉曺為人物志可乎時渭州刺史李淹亦明譜學守素所論惟淹能抗之古未有姓若夷狄然張說后嘗問諸儒言氏族皆本炎黄之裔則上古無乃百姓乎說曰古未有姓若夷狄然自炎帝之姜黄帝之姬始因所生地而為之姓其後天子建徳因生以賜姓黄帝二十五子而得姓者十四徳同者姓同徳異者姓殊其後或以官或以國或以王父之字始為賜族久乃為姓唐虞抵戰國姓族漸廣周衰列國既滅其民各以舊國為之氏下及兩漢人皆有姓故姓之以國者韓陳許鄭魯衞趙魏為多后曰善蟒梟髙宗廢后王氏及良娣俄為武后所殺改后姓為蟒良娣為梟宰相不以姓著張說開元後宰相不以姓著曰燕公與通譜系張九齡張說為宰相親重之與通譜系乞宗姓列屬籍李叔明本嚴氏少孤飬外家冒鮮于姓請還宗詔可叔明初不知意醜之乞宗姓列屬籍代宗從之民生子以姓字韓愈論宫市貶陽山令有愛在民民生子多以其姓字之耻與逆臣共宗李抱玉上言世占凉州耻與逆臣共宗有詔賜之姓因徙籍京兆舉族以李為氏詭姓權臯永王舉兵脅士大夫臯詭姓名以免尤明姓系路敬淳兼修國史尤明姓系自魏晉以降推本其来皆有條序著姓略衣冠系録等百餘篇姓系栁冲修國史初太宗命諸儒撰氏族志甄差羣姓其後門胄興替不常冲請改修其書帝詔魏元忠張錫蕭至忠岑羲崔湜徐堅劉憲吳兢及冲共取功徳時望國籍之家等而次之夷蕃酋長襲冠帶者析著别品㑹魏元忠等繼物故至先天時復詔冲及堅兢與魏知古陸象先劉子𤣥等討綴書乃成號姓系録栁芳著論栁芳著論甚詳芳之言曰氏族者古史官所記也昔周小史定世系辨昭穆故古有世本録黄帝以来至春秋時諸侯卿大夫名號繼統左丘明傳春秋亦言天子建徳因生以賜姓胙之土命之氏諸侯以字為氏以諡為族昔堯賜伯禹姓曰姒氏曰有夏伯夷姓曰姜氏曰有吕下及三代官有世功則有官族邑亦如之後世或氏於國則齊魯秦吳氏於諡則文武成宣氏於官則司馬司徒氏於爵則王孫公孫氏於字則孟孫叔孫氏於居則東門圵郭氏於地則三烏五鹿氏於事則巫乙匠陶於是受姓命氏粲然衆矣明世族學孔至明世族學與韋述蕭頴士栁冲齊名撰百家類例以張說等為近世新族剟去之說子垍方有寵怒曰天下族姓何豫若事而妄紛紛邪求同譜杜正倫與城南諸杜昭穆素逺求同譜不許銜之詔附屬籍韋嗣立與韋后屬疏帝特詔附屬籍變姓名李宻去之淮陽變姓名為劉智逺教授諸生自給吕才卜宅篇曰近世乃有五姓謂宫也商也角也徵也羽也以為天下萬物悉配屬之以處吉凶然言皆不類如張王為商武庾為羽是以音相諧附至桞為宫趙為角則又不然其間一姓而兩屬復姓數字不得所歸是直野人巫師說爾好譜學韋述好譜學見栁冲所撰姓族系録每私寫懐之還舎則又繕録故於百氏源派為詳乃更撰開元譜二十篇譜系䟽晦李憕或言其先出興聖皇帝譜系䟽晦不復傳楊復恭常肩輿抵太極殿宰相對延英論叛臣事孔緯曰陛下左右有將反者帝矍然緯指復恭復恭曰臣豈負陛下者緯曰復恭陛下家奴而肩輿至前殿廣樹不逞皆姓楊非反邪復恭曰欲收士心輔天子帝曰誠欲收士心胡不假李姓乎復恭無以對賜姓李全略本王氏名曰簡田𢎞正遇害穆宗以全略故鎮州將召問所欲言全略多陳利害兾合帝意且請盡死力以報遂授徳州刺史是時杜叔良兵敗博野故以全略為横海節度滄徳棣觀察使賜今姓名矜氏族林藴辯給嘗有姓崔者矜氏族藴折之曰崔杼弑其君林放問禮之本優劣如何其人俯首不能對桑䘮同音桑維翰初舉進士主司惡其姓以為桑喪同音人有勸其不必舉進士可以從它求仕者維翰慨然乃著日出扶桑賦以見志五代史裴氏自晉魏以来世為名族居燕者號東眷居凉者號西眷居河中者號中眷五代裴皥傳徵籍考名陳章甫與吏部孫貟外書傅說無姓商后致鹽梅之地屠羊隱名楚王延三旌之位未聞徵籍也范雎折脅於魏名為張祿先生秦用之為相張良避讐變名姓而亡漢祖因之實取天下何必考名也海内望族李訓四弊尚㛰婭者先外族後本宗尚人物者進庶孽退嫡長尚冠冕者略伉儷慕榮華尚貴戚者徇勢利亡禮教四者俱弊則失其所尚矣栁冲名門右族桞玼良家茂族李華天下諸胡悉帯令令狐相綯以姓氏少族人有投者不吝其族由是逺近趨之至有姓胡冒令者温庭筠戲為詞曰自從元老登庸後天下諸胡悉帯令南部書方相姪唐有土人姓方好矜門地但姓方貴人必認為親或戲之曰豐邑公相何親遽曰再從伯父戲者笑曰既是方相姪只堪嚇鬼豐邑坊造凶器出賣之所也朝野僉載以易自筮陸羽字鴻漸不知所生或云僧得之水濱畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之與諸李叙昭穆李義甫已貴乃言系出趙郡與諸李叙昭穆嗜進者尊為父兄給事李崇徳引與同譜既謫普州亟削去言李出隴西言劉悉出彭城至中葉風教又薄譜録都廢公靡常産之向士云舊徳之傳言李悉出隴西言劉悉出彭城悠悠世祚訖無考按冠冕皁𨽻混為一區鈒鏤王家國史補四姓滎陽鄭崗頭盧澤底李士門崔皆為鼎甲太原王亦四姓之匹而呼為鈒鏤王家喻銀質而金飾族望髙士亷傳髙宗朝以太原王范陽盧滎陽鄭清河博陵三崔趙郡隴西二李其族望耻與諸姓為㛰也别洞尚書故實唐黄生登進士第人問與頗同房否對曰别洞黄氏王黄姓桞宗元黄溪記大㝠之川山舒水緩有土田始黄神為人時居其地傳者曰黄神王姓莽之世也莽既死神更號黄氏逃来擇其深峭者潜焉始莽嘗曰余黄虞之後也故號其女曰黄皇室主黄與王聲相邇而又有本其所以傳言者益驗世有負其姓而立於天下者桞宗元鐡爐歩志世有負其姓而立於天下者曰吾門大他不我敵也問其位與徳曰久矣其先也然而彼猶曰我大也世亦曰某氏大其冒於號有以異於兹歩者乎問家世及年温造天子愛其才問造家世及年對曰臣五世祖大雅外五世祖李勣臣犬馬之齒三十有二帝竒之唐貞觀氏族志凡第一等則為右姓栁芳唐貞觀氏族志凡第一等則為右姓路氏著姓畧以盛門為右姓桞冲姓族系録凡四海望族則為右姓不通歴代之說不可與言譜也今流俗獨以崔盧李鄭為四姓加太原王氏號五姓蓋不經也金陵李氏始以唐號國錢文穆王問之曰金陵冒氏族於巨唐不亦駭人乎沈韜文曰此可取譬也且如郷校間有姓孔氏者人則謂之孔夫子復何怪哉王大笑賞巵酒撰劉氏家史劉子𤣥别撰劉氏家史及譜考上推漢為陸終苖裔非堯後彭城叢亭里諸劉出楚孝王嚚魯孫居巢侯殷不承元王按據明審議者髙其博名字二同名字改名附白㓜名冠字正名名不正則言不順男子二十冠而字父前子名君前臣名名以制義晉穆侯以條之役生太子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以成禮易則生亂君命太子曰仇弟曰成師始兆亂矣兄其替乎子同生魯侯問名於申繻對曰凡名者有信有義有象有假有類以名生為信若唐叔虞魯公子友以徳命為義若文王名昌武王名發以類命為象若孔子首象尼丘山遂名取於物為假若伯魚生有人饋之魚因名之曰鯉取於父為類若子生與父同日名曰同不以國不以官不以山川不以隱疾不以畜生不以器幣以國則廢職以山川則廢主以畜生則廢祀以器幣則廢禮晉以僖侯廢司徒宋以武公廢司空改司空為司城也魯以獻武廢二山二山具敖也魯獻公武公故廢二山大物不可以名是以大物不可以名嘉名楚詞朕皇考曰伯庸肇錫予以嘉名三月而名禮云子生三月父親名之既冠而字之名者所以正體定心意字者所以崇仁義叙長㓜不以日月山川禮曰名子者不以日月不以山川有文在手成季生而冇文在手遂以命名為友又唐叔虞生有文在手曰虞遂名虞咳而名之禮子生三月父執子之右手咳而名之咳謂撫子頭不敢同名禮大夫士之子不敢與世子同名寤生鄭莊公寤生驚姜氏故名曰寤生名終將諱傳曰周人以諱事神名終將諱之待事而名之苫越生子將待事而名之陽州之役獲焉名曰陽州叔孫獲長狄僑如因名子曰僑如苫越欲比之求名而亡此謂名聲之名二名非禮公羊曰仲忌此何忌也譏二名非禮也注云難為諱一字為名難言而易諱所以長臣子之敬不通下君臣同名公羊叔向曰臣有名惡今曰衞禮惡為君臣同名君子不奪人之名不奪人之親所名君不聼臣易名所以重父之命也小同後漢郭𤣥字思益有遺腹子𤣥以其有手文似己名之曰小同三明後漢段頴字紀明與皇甫威明然明並知名京師稱梁州三明二穉後漢周澤字穉朝孫堪字子穉京師號二穉難犯易避吳主孫權曰禮名子難犯易避令太子名雨單雨單彎弓之彎也因賞桓彛生子温嶠賞之曰有竒骨真英物遂名之温祖有隂徳虞詡祖父為獄吏有隂徳曰吾子孫何必不為九卿者遂名詡字升卿晚有子賈充父逵晚始生充言後有充閭之慶因名充字公閭名失則愆傳依謙晉王杞文舒為其子弟作名皆依謙以見其意故後兒子黙字居靜沉字處道子渾字仲𤣥深字道冲遂作書戒之曰以𤣥黙冲虛為名欲使汝曺稱名思義不逾越也應童謡晋桓壑字郎子聞苻堅國中有謡云誰謂堅石打碎有子二十人皆以石為名以應之同名字小冠子夏漢杜欽字子夏時杜欽亦字子夏俱有令名欽捐目時人號為肓子夏欽惡其號稱疾見詆更著小冠自别時人因號小冠子夏南北𤣥吳郡太守張𤣥之與謝𤣥同年名亞於𤣥時稱南北𤣥三明二稺並見上驚座漢陳遵字孟公豪俠所在人懐之唯恐在後時列侯有與遵同姓名者每至門人曰陳孟公座中莫不振動既至而非遵因號其人為陳驚座投杼之疑魯有與曽子同姓名而殺人者人以告曾子母母織如舊不信之及三人来告投杼而驚起改名君子已孤不更名慕藺史司馬長卿名犬子慕藺相如之為人遂改名相如改命楚王曰子文無後何以勸善使復其所改命曰生注云易其名也子文孫克黄也變名梅福變名姓隱於吳市門卒避難改名後漢趙岐字邠卿初名嘉生御史䑓字䑓卿後避難改名字以京兆長陵人示不㤀本土也因夢改名魏程昱本名立少時夢上天兩手捧日太祖曰卿當為吾腹心乃於立上加日而為昱改字諸葛喬字伯松瑾第二子本字仲慎亮未有子求喬為後瑾啓吳王而遣之故改其字孔慕張綱改李綱始名暖慕張綱為人改焉手敇未嘗名帝以綱隋名臣手敇未嘗名五百嵗一賢者生貟半干始名餘慶與何彦先同事王義方以邁秀見賞義方常曰五百嵗一賢者生子宜當之因改今名覆金甌崔琳初𤣥宗每命相皆先書其名一日書琳等名覆以金甌㑹太子入帝謂曰此宰相名若自意之誰乎即中且賜酒太子曰非崔琳盧從愿乎帝曰然賜太子酒象賢陸象先始象先名景初睿宗曰子能紹先創是謂象賢者乃賜名焉龜龍崔液尤工五言詩湜歎因字呼曰液子我家龜龍也斥太子名王方慶奏人臣於天子未有斥太子名者晉山濤啓事稱皇太子不名孝敬為太子更𢎞為崇沛王為太子更賢為文今東宫門殿名多嫌觸請一改之以協舊典制可忘名張嘉貞帝欲果用嘉貞而忘其名夜詔中書侍郎韋抗曰朕嘗記其風操而今為北方大將張姓而復名卿為我思之抗曰非張齊丘乎今為朔方節度使帝即使作詔為相夜且半因閱大臣表疏舉一則嘉貞所獻遂得其名即以為中書侍郎同中書門下平章事詭名伏匿城中張薦朱泚反詭姓名伏匿城中著史遁先生傳謬稱段平仲嘗曰上聪明神武但臣下畏怯自為循黙爾使我一日得召見宜大有開納㑹京師旱詔擇御史郎中平仲與有考功員外郎陳歸被選同得對粗陳賑恤事帝察其意所畜以歸在側未言事訖平仲方獨進帝乃并留歸正色問之雜以他語平仲錯愕不得言乃謬稱名帝怒叱去之然名由此顯曲江公張九齡開元後天下稱曰曲江公而不名不敢有斥李栖筠天下士歸重不敢有所斥稱賛皇公官而不名李吉甫帝尊任之官而不名請改名义蒋乂初名武憲宗時因進見請曰陛下今日偃武修文羣臣當順承上意請改名乂帝恱時討王承宗兵方罷乂恐天子銳於武亦因以諷始名重璋李抱玉始名重璋明皇以其戰西河有大功為改今名嗣漢魯恭路嗣恭始名劒客連徙神烏姑臧二縣令考績為天下最明皇以為可嗣漢魯恭因賜名呼為大臣郭子儀代宗不名呼為大臣名與位皆踰其父楊嗣復韓滉撫其頂曰名與位皆踰其父楊氏之慶也因字曰慶門元魯山元徳秀天下髙其行不名謂之元魯山待事名子李素立孫志逺始名鵬而素立方奉使謂家人曰古有待事名子吾此役可命子孫矣遂以名之陸堅初名友悌𤣥宗嘉其剛正更賜名不虛魏元忠始名真宰以諸生見髙宗髙宗慰遣不知謝即出儀舉自安帝目送謂薛元起曰是子未習朝廷儀然名不虛謂真宰相也於文從戈桞渾朱泚亂平奏言臣名向為賊汙且載於文從戈非偃武所宜乃更今名徳素王紹少為顔真卿所器字之曰徳素以輩行呼陸贄入翰林年尚少以材幸天子以輩行呼而不名也臧孫韋正貫少孤臯謂能大其門名曰臧孫父名吕渭李涵繇御史大夫擢太子少傅渭建言涵父名少康當避宰相崔祐甫善其言擢司門貟外郎天子尊禮杜祐每進見天子尊禮之官而不名人不敢指劉禹錫凢所進退視愛怒重輕人不敢指其名號二王劉栁呼官而不名裴垍帝在殿中常呼垍官而不名更姓名成汭少無行使酒殺人亡為浮屠後入蔡賊中為賊帥假子更姓名為郭禹避祖名源乾曜遷太子少師避祖名更授少傅名相甲乙席豫為中書舎人與韓休許景先徐安貞孫逖名相甲乙名子與帝王同苖晉卿子粲徳宗時官至郎中陸䞇欲進粲官帝不許曰晉卿往攝政有不臣之言又名其子皆與帝王同粲等宜與外官以方榖為字李載義㑹吏下請立碑紀功詔李程為之辭未有字詔曰用書凡厥正人既冨方榖卿宜當之以方榖為字其寵待如此賢者名不可斥孟浩然初王維過郢州畫浩然像於刺史亭因曰浩然亭咸通中刺史鄭諴謂賢者名不可斥更著曰孟亭文章李益李益時又有太子庻子李益同在朝故世言文章李益以辨云賜名劉𤣥佐李希烈攻陳州𤣥佐救之希烈走遂進取汴州詔加汴宋節度使陳州行營都統𤣥佐本名洽至是賜名以尊寵之避太子諱李藩憲宗為皇太子王紹避太子諱始改名時議者以為諂藩曰自古故事由不識體之人敗之不可復正雖紹何誅邈佶烈五代王彦章莊宗遣明宗往諭之彦章病創卧不能起仰顧明宗呼其小字曰汝非邈佶烈乎我豈茍活者遂見殺為龑字音儼以名南漢劉龑初名巖九年白龍見南宫三清殿改元白龍又更名龑以應龍見之祥有胡僧言䜟書滅劉氏者龑也龑乃採周易飛龍在天之義為龑字音儼以名焉世家趨厮走飬朝夕名於刺史前皮日休郢州孟亭記春秋書紀季公子仲孫湫字者貴之也故書字曰貴先是亭之名取先生之諱公曰焉有賢者之名為趨厮走飬朝夕名於刺史前耶命易之以先生姓陳留八駿格輔元與同郡王孝逸繁師元靖君亮鄭祖咸鄭師善李行簡盧協皆有名號陳留八俊益曰日華程日華始名華徳宗以其有功益曰日華父子似兄弟名杜鵬舉宰相鴻漸之父名鵬舉父子而似兄弟之名父嘗夢有所之見大碑云是宰相看之記得姓下偏旁曳脚而忘字乃名鵬舉而謂之曰汝不為相即世世名字鳥旁而曳脚也事蓋亦前定出嘉話録書字記姓名李湯題名於昭應縣樓韋詩渭水秦川拂眼明希仁何事寡詩情只應學得虞姬壻書字纔能記姓名楊氏名子楊遺直為蘭陵簿四子發假收嚴皆登進士第收即大拜發已下皆至丞相發以春為義假以夏為義收以秋為義嚴以冬為義皆有文學登第居修行里楊氏北靖恭諸楊之華盛焉靖恭即楊汝士父子並為公卿門族昌盛所居靖恭里號靖恭楊家百藥為名李百藥隋内史徳林之子㓜時多疾祖母趙氏故以百藥為名齊先聖以立名宋齊丘汪台符貽書訐之足下齊先聖以立名超亞聖而稱字齊丘慙而改為子嵩後使人誘與飲酒縛其尸沉石城下出江南野史以父嫌名不拜賈魯擢中書舍人以父嫌名不拜生子因其官字甄濟為著作佐郎兼侍御史濟生子因其官字曰禮闈憲䑓有時讌語不以公卿指名但呼陸九權徳輿陸贄集序姚崇始名元崇以與突厥叱刺同名武后時以字行至開元世避帝號更以今名諱三不諱附白卒哭乃諱聞名心瞿終將諱之傳周人以諱事神名終將諱之辭曺羊祜為荆州刺史及卒有遺愛故荆州人為諱改戶曺為辭曺諱新禮卒哭以木鐸徇于路捨故而諱新注云故謂髙祖之諱新謂新死者之諱詔王之忌諱周禮小史王有事詔王之忌諱註忌先王死日諱先王名逮事禮逮事父母則諱王父母不逮事父母則不諱王父母注逮及也士以二廟事祖雖不逮亦諱之大夫之所有公諱避先王諱婦諱不出門母之諱宫中諱妻之諱不舉諸其側與君之諱同則稱字入門問諱名其二諱國語范獻子聘魯問具敖二山對曰先君獻武之諱也獻子歸告人曰人不可不學吾適魯名其二諱請長史諱晉書王述字懐祖為揚州長史主簿請諱報曰亡祖先君名播海内内諱不出門餘無所諱改選晉江統叔父春為宜春令統因上䟽曰故事祖父官與名同者皆後改未有身與官職同改選列臣以為臣子開地春秋不奪人親之義朝廷從之同官犯諱禮志云大元十三年召孔安國為寺中表以王瑜名犯諱不得連署求解有司議云公所無私諱豈公奪私王制屈家禮也王祜許換曺是出制外夫皇朝禮大百僚備職徧官列署動相闗渉若人遂其心則易官易職遷流莫已改郡字晉成和元年當徵蘇峻司徒王導欲出王舒為外援乃拜撫軍將軍㑹稽内史上疏以父名㑹不作㑹稽廷尉以字同音異於禮無嫌舒陳狀音雖異而字同乞換他郡於是改㑹為鄶二名非禮廢名廢主廢禮廢職廢祀並見名字門奉諱惡太史典禮執簡記奉諱惡王父母兄弟世父叔父姑姊妹子父同諱父為其親諱則子不敢不從諱不諱臨文不諱詩書不諱廟中不諱二名不偏諱夫子之母名徵在言在不言徵言徵不言在父前子名君前臣名對至尊無大小皆稱名也禮不諱嫌名謂聲相近不逮事父母則不諱王父母謂孤㓜不及識父母思不及於祖此庶人也適士二廟事祖雖不逮猶諱祖也君所無私諱臣於君前不避家諱尊無二也大功小功不諱士於大夫之所有公諱無私諱不敢自諱凡祭不諱教學不諱孔尊諱韋暢臯沒蜀人徳之凡刻石著臯名者皆鑱其文尊諱之對千人可不犯一人諱栁冲傳晉太元中散騎常侍河東賈弼譔姓氏簿狀十八州百十六郡合七百一十二篇甄别士庶無所遺宋王𢎞劉湛好其書每日對千人可不犯一人諱更其姓曰右五代石昂節度使符習髙其行召以為臨淄令習入朝京師監軍楊彦朗知留後昂以公事至府上謁賛者以彦朗諱石更其姓曰右昻趨于庭仰責彦朗曰常侍奈何以私害公昻姓石非右也彦朗大怒拂衣起去昂即趨出解官諱辯李賀以父名晉肅不肯舉進士韓愈為作諱辯然卒亦不就舉改𢎞文舘為崇文五代郭崇韜宰相豆盧革等皆謟事之崇韜父諱𢎞革等即因他事奏改𢎞文舘為崇文轉㗋觸諱韓愈送窮文今上章及詔不聞諱滸勢秉機也惟宦官女子不敢言諭及機以為觸犯諭近代宗諱機近𤣥宗諱諱辯不諱嫌名韓文同上律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類若父名仁子獨不得為人乎周公作詩不諱若曰克昌厥後又曰駿發爾私孔子不偏諱二名若曰宋不足徵又曰某在斯春秋之時不諱嫌名若衛桓公名完康王釗之孫實為昭王曾參之父名晳曾子不諱昔周之時有騏期漢之時有杜度此其子宜如何報徳四不報徳附白無徳不報何以報徳厚報求仁得仁以徳報徳則人有所勸大恵敢忘大恵欲報之徳恵不可棄寛身以徳報怨則寛身之人也以怨報徳則刑戮之人也修舊好也重施而報子桑曰重施而報君將何求重施而不報其人必攜攜離也背施無親三施而無報謂秦閉晉糴何以報我何以報君報者倦矣施者未厭背恵忘舊仁不遺舊不敢忘徳感國士之恩人惟求舊施報禮曰太上貴徳其次務施報禮尚往来禮曰往而不来非禮也来而不往亦非禮也不望其報儒有推賢而進逹之不望其報禮小人懐恵語報余莊子忘我道不虛行仁無遺舊故人念舊感恩忘我實多則吾豈敢瓊瑶木𤓰美齊桓公也衞有狄人之敗齊桓公救而封之衛人思之欲厚報之云投我以木𤓰報之以瓊瑶投我以木李報之以瓊玖匪報也永以為好也鬼結草晉魏顆見老人結草以亢杜回杜回秦將也夜夣之曰予是所嫁婦人之父也爾用先君之治命余是以報之三舎子犯曰微楚之恵不及此退三舎避之所以報也一餐戰國策楚王伐中山中山君亡有二人執戈隨其後二人曰臣之父嘗餓君以一餐餔之父死且曰中山有事汝必死救之一飯范雎云一飯之恩必償餓人宣子舎於翳桑見靈輒餓不食三日矣與簞食既而為公介倒㦸以禦公徒而免宣子問其故曰翳桑之餓人也問其名居不告而退遂自亡言其不望報也僖妻之饋公子晉公子重耳至曺僖負覊之妻而饋盤餐寘璧焉後晉侯伐曺令無入僖負覊之家而免其族報徳也綈袍范雎寒湏賈取綈袍遺之後云吾不殺汝以汝有綈袍之恩也報國士豫讓曰范中行以衆人遇我我以衆人報之智伯以國士遇我我以國士報之絶纓之臣竟答恩於楚主啖炙之士終酬徳於顧榮虵銜珠隋侯見傷虵以藥治之後銜夜光珠以報恩龜顧印見印綬門注客泣珠淵客宿將去泣珠於盤以酬主人雀持環後漢楊寳見病雀憐之因將歸置巾箱中採黄花蘂食之瘡愈飛去旦為黄衣少年持玉環来報之綈袍雖薄尚繫湏賈之仁簞食且微終酬宣子之恵食馬秦繆公亡善馬岐下人得而食之秦赦之後擊晋見繆公窘皆推鋒爭死以報食馬之徳骨肉薳子慿曰吾見申叔夫子所謂死生而骨肉也褚中荀罃在楚鄭賈人將寘褚中以出既謀而未行而楚自歸之後賈人如晋荀罃善待之如實出已者投金於承塵後漢雷義常濟人於死罪後以金二斤謝之義不受金主黙然乃投金於承塵而去蔑我大恵傳報生以死報死以力制服祭祀韋泓遇䘮亂親屬並盡客游洛陽素聞應詹名遂托焉詹與分甘苦樂情若兄弟遂隨積年為營伉儷置居宅升薦於元帝帝辟公府後泓至少府詹卒感生成之恩遂為詹制朋友之服哭止宿草也父事張蒼當斬王陵言赦之及貴常父事陵陵卒後蒼為丞相洗浴朝陵夫人上食然後歸祠以賓位李固既誅門生王成匿其少毎子燮得免成卒燮以禮𦵏之節為設上賓之位而祠之孔厚報王珪少孤且貧人或饋遺初無讓及貴厚報之雖已亡必酬贍其家上書直寃李徳裕丁柔立者徳裕當國時或薦其直清可任諫諍官大中初為左拾遺既徳裕被放柔立内愍傷之為上書直其寃坐阿附貶南陽尉損怨鄭畋傳鄭榖者薰子也方畋秉政擢為給事中至侍郎其損怨類如此故主無寸祿請解官授王毛仲傳李守徳位武衞將軍嘗遇故主於道主走避守徳命左右迎之至第親上食奉酒主流汗不敢當數日入奏曰臣蒙國恩過分而故主無寸禄請解官授之帝嘉其志擢為郎將路應路嗣恭子應徳宗時李泌為相號得君帝曰誰於卿有恩者朕能報之泌乃言曩為元載所疾謫江西路嗣恭與載厚臣嘗畏之㑹與其子應並驅馬囓其脛臣惶恐不自安應閟不言勉起見父臣常媿其長者思有以報帝曰善即日加應檢校屯田郎中賜金紫李泌奏王緯於已有私恩王緯大厯中與李泌俱為路嗣恭江西觀察判官泌見惡於元載嗣恭希意欲殺之緯䕶解僅免泌執政奏王緯於已有私恩徳宗許為泌報故進緯給事中浙西觀察使缺泌擬緯帝曰是朕為君報徳者乎黄門要地獨不留議事耶誓同死生楊晟降王建愛將安師建者勇而有禮既就執建顧曰爾報楊司徒足矣能從我乎謝曰司徒誓同死生不忍復戴日月王謂不回乃戮之願悉官爵授之李大亮嘗以張弼脫其死及貴念有以報之時弼為將作丞匿不見大亮求之不能得一日識諸塗持弼泣悉推家財與之弼拒不受乃言於帝曰臣及事陛下張弼力也願悉臣官爵授之帝為遷弼中郎將直其枉李晟篤分義隆于故舊嵐州刺史譚元澄嘗有徳於晟後貶死晟既貴直其枉晟撫其二子為成就之感國士而能漆張九齡上姚令公書禽息之首為知己而必碎豫譲之身感國士而能漆報飯嫗南卓貧遊上蔡蔡收待之為客吏所沮每宴集令召即云卓自以衣冠弊故不敢赴卓由是愈窘困惟城南鬻飯嫗待之不厭也後十七年守蔡乃曰古人一飯必報睚眦必讎吾雖位微適當斯日也遂刑吏而報嫗焉雲溪友議昔傷蛇傅藥而能報以怨報徳者不及傷蛇逺矣窮愁志垂恩儻丘山報徳有微身李白贈崔司戶詩有徳必報之千金恥為輕李白竊感荀罃栁宗元啓竊感荀罃如實出己之徳報速尉遲恭從擊王世充是日獵榆窠㑹世充自將兵數萬戰單䧺信者賊驍將也騎直趨王恭躍馬大呼横刺雄信墜乃翼王出率兵還戰大敗之王顧曰此衆人意公必叛我獨保無它何相報速耶崔湜在襄州與譙王數相問遺王敗湜當死頼劉幽求張說獲免及為宰相䧟幽求嶺表宻諷廣州都督周利正殺之不克又與太平公主逐張說其猜詭險殆天性雖蠆虺不若也飬蝦蟇得水病牛羊日厯太和中裴度再任中書薦引李宗閔既得志譛度度謂人曰飬蝦蟇得水病附下罔上如此謝恩五不謝志恩不受謝附白展謝叔向不謝祁奚之免已傳晏子贖越石父史越石父賢在縲絏晏子解左驂贖之載歸不謝而入石父遂請絶晏子攝衣謝之延為上賓恨謝漢張安世薦士士謝之大恨不為通為國魏陳羣言劉翼於太祖太祖赦之翼深徳羣羣曰議刑為國非為私拜官公門謝恩私室非義也張安世云不謝范滂孟博繫獄霍諝理之免後詣諝不謝或譏之滂曰叔向祁奚云云孔以身徇恩尉遲恭隠太子贈金皿辭曰恭起幽賤天下䘮亂久䧟逆地秦王實生之方以身徇恩今於殿下無功其敢當賜過謝徐晦中丞李夷簡表為監察御史晦過謝問所以舉之之由夷簡曰君不負楊臨賀肯負國乎歐陽詹卒初徐晦舉進士不中詹數稱之明年髙第仕為福建觀察使語及詹必流涕明目張膽韋思謙曰丈夫當敢言之地要湏明目張膽以報天子焉能碌碌保妻子劾交通術士李吉甫本善竇羣羊士諤吕温薦羣為御史中丞羣即舉士諤侍御史温知雜事吉甫恨不先白持之久不决羣等銜之俄而吉甫病醫者夜宿其第羣捕醫者劾吉甫交通術士帝大駭訊之無狀羣等皆貶之卒上書告不灋韋丹江南西道觀察使有卒違令當死釋不誅去上書告丹不法詔丹解官待辨㑹卒騐卒所告皆不實丹治狀愈明凡號門生而不知恩之所自者非人也纓冠束袵而趨以進者咸曰我知恩知恩則惡乎辨然而辨之亦非難也大抵當隆赫柄用而蜂附蟻合煦煦趄趄便僻匍匐以非乎人而售乎已一旦勢異則電滅飈逝不為門下用矣桞宗元顧十一郎書夢六吉夢凶夢占夢附白吉夢維何維熊維羆夢美傳宋得臣曰予夢美必立我夢乃占我夢吾夢傳吾夢如是爾何夢矣文王謂武王曰無夢文中子曰至人其寢無夢休徵咎徵髣髴若夢文選胡蝶莊子夢為胡蝶栩栩然飛夢友死范式字巨卿與張元伯為友巨卿病卒夢元伯曰吾死某日𦵏子能相送乎及𦵏柩不進母曰必待張元伯元伯至柩乃進論夢衛玠問樂廣夢云是想玠曰形神不接而夢豈是想玠思之經日不得成疾廣故命駕往剖析之則愈廣歎曰此賢胷中必無膏肓之疾也又或問殷浩曰得位而夢棺得錢夢糞何也浩曰官本臭腐故得官而見屍錢本糞土故得財而夢穢時以為名言草虵書王隱晉書唐琮夢虵繞身遂效其形而作草虵之書夢協二人夢同同夢詩甘與子同夢魂交莊子云其夢也魂交其覺也形開占六夢之吉凶周書六夢想邪思悟喜懼候五旬之虛實列子曰西極有人不食不衣而多眠五旬二覺以夢中所為者為實堯舜上聖符域内之休徵夢書曰堯夢乗青龍上太山舜夢擊鼓桀紂下臨作寰中之不軌桀帝夢黑風破其宫紂帝夢大雷擊其首刺出眼中遽獲金鐶之報述征記陳留周氏婢入山採樵夢見一女子曰吾眼中生刺乞拔之當厚報此婢乃於朽棺中見髑髏草生眼乃拔之即於其處得金鐶一雙角生頭上旋聞刀用之災蜀魏延年丞相長男掘得錢而被買幽明録丞相茂𢎞夢人欲以百錢買大兒長豫後掘得一窟錢共數百萬長豫無病而死秣陵陶令枉殺人而致殂述征記陶繼為秣陵令枉殺樂伎後夢伎来曰訴天得理令来相取遂跳入口中繼斯湏而死賈弼易頭之時文章可玩幽明録賈弼夢見人曰愛君羙貎欲易君頭遂許之後能半面笑半面啼兩手把筆文詞各異謝奉說夢之日凶具被臻捜神記謝奉與鄭猷善忽夢猷與人争錢因落水死奉為凶具忽覺即往猷處具說猷曰吾昨夜夢與人争錢惆悵不語落厠而死奉為凶具一如前夢吉夢得說書髙宗夢得說乃營求諸野曰夢帝賚予良弼說築傅巖之野惟肖九齡武王曰夢帝與我九齡男女之祥吉夢維何維熊維羆男子之祥維虺維虵女子之祥徵蘭燕佶夢天使與已蘭曰妾不才幸而有子將不信敢徵蘭乎文公曰諾生穆公名之曰蘭周公孔子曰吾不復夢見周公龜思解網託彼元君魚求去鈎感諸武帝豐年詩牧人乃夢大人占之衆維魚矣實維豐年旐維旟矣室家蓁蓁豐之兆也天樂秦穆公夢遊天上觀鈞天廣樂帝錫公命秦遂大昌懐蛟董仲舒吐鳳楊雄作甘泉賦成夢吐白鳳授筆江淹夢授五色筆文詞日麗吞鳥羅含夢吞五色鳥詞學乃日新日入懐吳志堅夫人夢日入懐中而生䇿松生腹吳丁固夢松生腹上占夢曰松十八公也後十八年當為公三刀王濬夢三刀後為益州刺史為烏宋昭公夢為烏咮加於南門尾加於北門曰予夢必立樹梓周書太姒夢見商之庭産棘小子發取周庭之樹梓化為松栢棫柞驚寤告文王文王召太子占之於明堂王乃與太子發並拜吉夢受商之大命於皇天膓繞吳門孫堅母夢膓繞吳昌門鄰母曰安知其非吉徵也吞三爻吳虞翻立易注奏上曰臣郡吏陳桃夢臣與道士相遇放髪被鹿裘布易六爻繞其身其三以飲臣臣乞盡吞之道士曰易道在天三爻足矣豈臣當受經也禾三穂蔡茂子禮夢坐大殿殿前有禾三穂茂取中穂輒復失問主簿郭賀賀曰殿前有禾人臣上禄也中穂中台也禾失為秩君其為公果如言凶夢豎牛叔孫夢豎牛卒以餒死曺人社宫傳曺人或夢衆君子立於社宫而謀亡曺曺叔振鐸請待公孫彊許之聲伯渉洹傳聲伯夢渉洹歌曰濟洹之水贈我以瓊瑰懼不敢占之三年而後言言之至暮而卒兩楹之奠子曰余疇昔之夜夢坐奠於兩楹之問予殆將死矣遂寢疾七日而沒白虎史秦二世夢白虎囓左驂上曰涇水為祟黄熊傳晉侯有疾夢黄熊入于寢門子産曰黄熊鯀化入于羽淵晉侯祀于夏郊疾乃有間首墮地而荀偃死肉挂車而揚雄誅二豎之災晉侯病夢二豎子曰居膏之下肓之上其奈我何咎徵惡夢周禮妖惡是踐秦伯執晉侯云亦晉之妖夢是踐嵗在辰鄭𤣥夢孔子告之曰起今年嵗在辰来嵗在已既寤知命將終有頃寢疾其年六月中卒夢賦王延夀字文考曾有異夢意惡之乃作夢賦自厲後溺水死年二十山上有水魏鄧艾伐蜀夢坐山上有水流問袁卲卲曰山上有水蹇蹇利西南往有功也不利東圵其道窮也往必克蜀其不還者乎井中生桒蜀何祗夢井中生桑趙直曰桒非井中物井中非桒生之所桒字四十八恐君夀不得過此祗曰足矣占夢乃占我夢大人占之召彼故老訊之占夢張茂問象竟為大郡之徵後漢張茂字子禮夢象意為不善問萬推推曰君當為大郡而不善終象大獸獸者守也然象以齒焚身後為吳内史為沈充所害蔣琬占牛卒踐上公之位蜀蔣琬字公琰夜夢有一牛頭懸在門下流血滂沱趙直曰見血者事分明也牛角及鼻公字之象位當至三公果為中書令吉凶之兆休咎之徵六夢周禮占夢以日月星辰占六夢之吉凶謂以日月㑹合辰參之以占夢也一曰正夢謂無所感動平安自夢二曰噩夢噩愕也謂驚愕而夢也三曰思夢四曰寤夢謂覺所道而為夢也五曰喜夢謂喜恱而夢六曰懼夢恐懼而夢季冬主夢聘問獻吉夢於王拜受之獻羣臣之吉夢也乃舎萌于四方以贈惡夢注云舍萌釋菜也贈送也得天傳晉侯夢與楚子摶楚子伏已而盬其腦子犯曰吉我得天楚伏其罪吾且柔之矣射月傳晉吕錡夢射月中占之曰姬姓日也異姓月也必楚王也聲伯夢渉洹見凶夢門夢中占夢莊子長吾子謂瞿鵲曰夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢中之占又夢焉無異寤也固乃非常人之所知水邉女子鄧殷為淮南太守夢行水邊見女子猛獸自後斷其鞶囊占者曰水邊女汝字也斷鞶嚢者新獸頭代故獸頭也不作汝隂作汝南太守也後漢時二棺後漢李充夫人夢天落二棺於充前問索紞曰棺者職也當有人舉君二官再遷果然虜脫上衣李充又見一虜脫上衣索紞曰虜去上男字也夷狄隂類君婦當生男也果如其言内中有人打宋桶夢内中有人打著赤衣桶手把兩赤杖極打之問索紞曰内中有人肉也兩赤杖者箸也極打之君必遇飽肉食也二角索綏夢東有二角書詣綏大角朽敗小角有題所詣一在前為凶也一在後為背也當有凶背之問時綏父在東居三日凶問果至咬脚張邈奉使夜夢狼咬一脚紞曰脚肉被咬為却字當不行不應命而卒立冰上崔鴻三十國春秋曰令狐策夢立冰上與冰下人語紞曰冰上為陽冰下為隂冰上人與冰下人語為陽請隂媒介事也士如歸妻迨氷未泮君其為人作媒乎策曰老夫耄矣不為媒矣既而太守田約因策為子求張氏女恰至仲春而成婚芻狗魏志周宣字孔和太史問宣夢見芻狗得飲食又云夢見芻狗曰當墮車折脚又云夢見日有火災皆驗太史曰三問皆不夢即試君耳何以皆應曰神靈祐君與夢無異帯夫印綬張奐為武威太守妻懐孕夢帯夫印綬登樓占者云當生子復此郡終此樓果然馬舞黄平夢居中馬舞數十人向馬拍手索紞曰馬火也馬舞火起也向馬拍手救火也平未歸而火發孔精爽可畏李徳裕既沒見夢令狐綯曰公幸哀我使得歸葬綯語其子滈滈曰執政皆其憾可乎既夕又夢綯懼曰衛公精爽可畏不言禍將及白于帝得以䘮還夢紫文大鳥張鷟為兒時夢紫文大鳥五色成文止其庭大父曰吾聞五色赤文鳳也紫文鸑鷟也若壯殆以文章瑞朝廷乎遂命以名夢雙陸不勝狄仁傑武后謂曰朕夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無予也天其意者以儆陛下乎且太子天下本本一揺天下危矣乗舟判為二義陽王琮子行休始琮與二弟同死桂林開元四年行休請身迎柩既至無封樹議者謂不可復得行休歸地布席以祈是夜夢王乗舟舟判為二既而適野見東州中斷乃悟在洛南洲行休既至趣其所發之如言而一節獨闕行休號而寢夢琮告曰在洛南州明日直殯南得之於是以三䘮歸帝夢恵宣太子業有疾帝憂之一夕容髪為變因假寢夢獲方寤而業少間年踰四十當貴裴寂過華山祠祈神自卜夜夢老人謂曰君年踰四十當貴杜如晦薨帝後忽夢如晦若平生魏徵疾甚帝與太子至徵第是夕帝夢徵若平生及旦薨薛收卒秦王即位嘗夢收如平生夢進讜言虞世南卒帝後數嵗夢進讜言若平生夢人遺雙筆李嶠為兒時夢人遺雙筆自是有文辭王涯既族女為竇訓妻以痼病免家人紿告涯當貶忽夢涯自提首告曰族滅矣惟若存嵗時無㤀我女驚號堕地乃以實告賈餗少與沈傳師善傳師前死嘗夢云君可休矣餗寤而祭諸寢復夢曰事已爾叵奈何遂及誅伊謹𦵏父䘮母將合𦵏而不知父墓晝夜哭夢若有導者既發之舊志可按也乃得𦵏劉昌初城平凉當刼盟後將士骸骨不藏昌始命瘞之夕夢若詣昌厚謝者昌具以聞徳宗下詔哀痛出衣數百稱官為賽具斂以棺槥書皎皎白駒字杜牧初牧夢人告曰爾應名畢復夢書皎皎白駒字或曰過隙也牧曰不祥也顔杲卿初杲卿被殺徇首于衢莫敢收有張湊者得其髪持謁上皇是夕見夢帝寤為祭夢日墜以首承之賈隱林奏曰臣嘗夢日墜以首承之帝曰非朕邪因令糾察行在夢游帝居賀知章天寳初病夢遊帝居數日寤乃請為道士還鄊里詔許之楓生腹上張志和母夢楓生腹上而産志和持巨鑿破其心尹知章少雖學未甚通解忽夢人持巨鑿破其心内若劑焉驚悟志思開徹遂徧明六經王勃夢告易王勃嘗讀易夜夢若有告者曰易有太極子勉思之寤而作易發揮數篇與人論大衍數李適嘗夢與人論大衍數寤而曰吾夀盡此乎長庚李白之生母夢長庚星因以命之鳳集其身王逺知母晝寢鳳集其身因有娠男子求為妻堅貞節婦李者十七嫁為鄭亷妻未踰年㢘死夜夢一男子求為妻初不許後數數夢之李自疑容貎未衰醜所召也即截髮夢帝騎而上天武士彠自言嘗夢帝騎而上天帝笑曰爾故王威黨也御大車載日月行中衢鄭光孝明皇太后弟㑹昌末夢御大車載日月行中衢光輝洪洞照六合寤而占之工曰君且暴貴登湛露殿傳游藝嘗夢登湛露殿既寤以語所親有告其謀反者下獄自殺夢人晳而髯逼已李林甫夢人晳而髯逼已寤而物色得裴寛類所夢曰寛欲代我因李遇之黨逐之其後楊國忠代林甫貎類寛云夢李靖李勣安禄山起軍擊契丹還奏夢李靖李勣求食於臣乃祠北郡芝生于梁其詭誕敢言不疑如此夢神决脅以入肅宗章敬皇后吳氏肅宗在東宫后因蒙幸忽寢厭不寤太子問之辭曰夢神降我介而劒决我脅以入殆不能堪燭至其文尚隱然生代宗為嫡皇孫解佩帶履而行樂彦禎嘗夢解佩帶履而行既寤曰此神告我下將有背乎已而軍亂果因彦禎廹為乗門尋殺之大幡出指端劉仁恭嘗自言夢大幡出指端年四十九當建旄節李國威惡之補景城令上相儀衞甚盛方式卒謚曰頃吏部郎中韋乾度曰始式刺蜀州劉闢結難即謂闢曰向夢公為上相儀衞甚盛幸無相忘闢喜以為祥後闢發兵署牒首曰闢副曰式參謀曰符載大節己虧不宜得諡夢持金劉漢宏董昌使斬于市叱刑者曰吾節度使非庸人可殺我嘗夢持金殺我者必錢鏐也昌命鏐斬之夢巨人畀大稱上官昭容者名婉兒初鄭方妊夢巨人畀大稱曰持此稱量天下婉兒生踰月母戲曰稱量豈爾邪輒啞然應後内秉機政符其夢夢以西江水滌腸五代王仁裕喜為詩其少也嘗夢剖其腸胃以西江水滌之顧見江中沙石皆為篆籀之文由是文思益進乃集其平生所作詩萬餘首為百卷號西江集諸門悉署權字蕃鎮程權始名執恭嘗夢滄諸門悉署權字乃改名以應之及入朝詔刺史鄭權代之羣鹿度水史思明愛優諢寢食常在側優者以其忍恨之是夜思明驚據牀叱咤優問故荅曰我夣羣鹿度水鹿死而水乾云何俄如匽優相謂曰胡命盡乎少選駱恱以兵入妖夢燕王忠徙房州刺史數有妖夢封陽城侯許超夢盜羊入獄元稹曰當得陽城令後封陽城侯酉陽雜俎白孔六帖巻二十三
