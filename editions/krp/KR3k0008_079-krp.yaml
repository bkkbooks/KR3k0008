body:
  text: 白孔六帖卷七十九唐白居易原本宋孔傅續撰關市之征一九賦二山澤租稅三田税四筭賦五稅舟車六輕賦税七復除八輸稅九均輸十平糴十一貢獻十二闕貢十三訴貢賦十四九貢十五蠻夷貢賦十六出財助國十七關市之征一白月令孟春易闗市來商旅謂輕税商也四方來集逺鄉皆至則財不匱上無乏用百姓乃遂月令孟冬戒門閭修鍵閉謹關梁月令孟夏門閭無閉關市無索順陽氣敷縱不難物市㕓而不税市㕓舎而税其舎不税其物也闗譏而不征譏察而已不征税也此殷制司闗掌其征周禮司闗掌闗貨之節以聫闗市故有闗市之征國㓙禮殺無闗門之地年不順成闗梁不租孔議關市行人盡征崔融進鳳閣舎人時有司議闗市行人盡征之融上䟽謂周官九賦其七曰闗市以市多淫巧而闗通末㳺欲止抑之故加税耳然雖斂工商而不及往來今一切通取則事不師古且四人異業舊矣復動而揺之市者兼受善惡也若甚則細人無所容久必為亂天下之闗必險道市必要津豪宗惡少在焉聞一旦變起或致騷動恐南走蠻北走狄舟航所聚同上天下諸津舟航所聚旁通巴漢前詣閩越七澤十藪三江五湖控引河洛兼包淮海洪舸巨艦千軸萬艘交貿往來憧憧永日關市之税史籍有文秦皇以雄圖武力捨之而不用也漢武以覇畧雄才去之而勿取也同上富商大賈豪宗惡少輕死重義結黨連羣喑烏則彎弓睚眦則挺劒同上謂市及國門關門也惟斂出入之商税不税徃來之行人崔融有不可者六違背周官其不可一也四人各業今復動揺其不可二也流迸齊人其不可三也萬商廢業其不可四也税市則人散税關則暴興其不可五也儻加重税或慮相驚其不可六也同上九賦二白周禮太宰以九賦斂財賄一曰邦中之賦在城郭者邦中之賦二十而税二曰四郊之賦去國百里也三曰邦甸之賦二百里也四曰家削之賦三百里也五曰邦縣之賦四百里也六曰邦都之賦五百里各有差此已上平民也七曰關市之賦八曰山澤之賦關市山澤謂占㑹百物也九曰敝餘之賦敝餘百工之餘也𤣥謂敝餘占賣國之斥敝當増賦者若今賈人倍筭也孔周官九賦崔融上䟽曰謂周官九賦其七曰關市以市多滛巧而關通末㳺欲止抑之故加税耳八州之内九賦用殷元稹幽州徳音貢賦修於九州桞宗元表貢賦未均於九州同上山澤租税三白羽翮之征羽人以時徴羽翮之征於山澤之農以當邦之政令齒角骨物角人掌徴齒角骨物於山澤之農月令孟冬命有司牧水澤之賦謂蜃蛤蒲萑之屬其利蒲魚謂水澤之利也周禮列而不賦禮年不順成山澤列而不賦注列遮列也雖不賦尚禁止山澤童枯則不税周禮司徒以土會之法辨五地之生一曰山林其動物宜毛物其植物宜羽物二曰川澤其動物宜鱗物其植物宜膏物斡山海貨食貨志浮食寄民欲擅斡山海之貨注斡謂主領之以致富羡利佃人也海租宣帝時欲増海租三倍蕭望之奏言比加海租魚不出武帝時縣官嘗曰魚而不加租帝不聽之孔計斛輸錢崔元亮遷歙州刺史斂人馬牛生駒犢官籍蹄噭故吏得為姦𤣥亮焚其籍一不問民山處輸租者苦之下令許計斛輸錢民頼其利筦㩁山澤之利唐文粹漢有少府水衡筦㩁山澤之利終不若領之大農也論進奉書皇甫湜我在山上舎一畝蒿磽田夜雨呌租吏舂聲暗交關李賀山畋澤虞輸賦扵都栁宗元武崗銘宜歸王者徳宗時户部侍郎韓洄議山澤之利宜歸王者自是皆𨽻鹽鐡使食貨志山川林藪之所産殖雨露春秋之所成就莫非王財皇甫湜田稅四雜稅附白周禮凡任地國宅無征園㕓二十而一近郊十一逺郊二十有三甸稍縣鄙都皆無過十二漆林二十五載師職云周禮輕近而重逺近多役園㕓輕者㕓無糓園少利也夏后五十而貢殷七十而助周百畝而徹皆什一也徹通也助藉也莫善於助莫不善於貢貢者校數嵗之中以為常樂嵗粒米狼戾多取之不為虐則寡取之㓙年糞其田而不足則必取盈焉故不善任農以耕貢九榖周禮閭師七古者公田藉而不税借人力治公田不税也圭田無征厚賢也即周禮土田也月令九月命有司農事既收舉五榖之要定税厚薄税畝履其餘畝而税十而取二履畝公羊傳税畝者何履畒而稅桀貊多乎十一大桀小桀言多税喻桀之害人也寡乎十一大貊小貊言如蠻貊税故少也一夫治田百一十畝公田在内私田稼不善則非吏吏廹不得治私田也公田稼不善則非民民不治公田故罪之趙奢行法不避平原平原家不肯出田税趙奢為趙田部吏以法治平原用事者九人也十五稅一漢恵復田租十五税一注云漢儉於周中廢而復之榖租蒿税以律占租昭紀令人得以律占租不以實家長不自書罰金二斤沒入所不自占隱度定辭也武帝時律外取故令家長各以物自占雖一時供億議以從權而田卒汙萊孰云不足雖給於公上情不渉於徇私然望彼徴求罪湏加於從欲地征地求相地衰征唯加田無征夏官司勲掌賞地之政令凡頒掌地三之一食唯加田無征注既賞之又加賜以田所以厚㤙唯加賞田無國征也賦鐡晉趙鞅賦晉國一鼔鐡以鑄刑鼎著范宣子所為刑書注令人出鐡以一鼔為率也封田陳轅頗為司徒賦封田以嫁公女有餘以為己大器國人逐之出奔墾田不實光武時天下墾田多不實帝見陳留吏牘上有書云穎川𢎞農可問河南南陽不可問帝詰吏不服顯宗曰以墾田相方耳河南帝城多近臣南陽帝鄉多近親田宅踰制不可問也孔稅浮屠錢張廷珪武后税天下浮屠錢營佛祠於白馬坡作大象廷珪諫下碇税孔戣拜嶺南節度使蕃舶泊歩有下碇税戣禁絶無所求索収豪室税李翺為廬州刺史時州旱遂疫逋捐係路亡籍口四萬權豪賤市田屋牟厚利而窶户仍輸賦翺下教使以田占租無得隱收豪室税萬二千緡貧弱以安税泗口王智興檢校濠州節度使揫索財賂交權幸以賈虚名用度不足始稅泗口以佐軍湏稅外加斂嚴礪節度東川擅没吏民田宅百餘所税外加斂錢收都畿佛祠田磑租入李吉甫奏收都畿佛祠田磑税入以寛貧民僧道輸絹李叔明上言謂僧道年未滿五十可令嵗輸絹四尼及女冠輸絹二雜役與民同之過五十者免議雖上罷之請檢天下田宜得益租五代劉審交晉髙祖拜審交三司使議者請檢天下民田宜得益租審交曰租有定額而天下比年無閒田民之苦樂不可等也遂止不檢而民頼以不擾或五分納一謂之率貸自天寳末年盗賊奔突克復之後府庫一空又所在屯師用度不足於是遣御史康雲間出江淮陶鋭往蜀漢豪商富户皆籍其家資所有財貨畜産或五分納一請之率貸所收巨萬計葢權時之宜通典請簿百姓一年税錢唐開元十八年御史大夫百姓一年税錢充本依舊令髙户及典正等捉隨月収利將供官人料錢多率税商賈其後諸道節度使觀察使多率税商賈以充軍資雜用或於津濟要路及市肆間交易之處計錢至一千以上者皆以分數税之自是商賈無利多失業矣上元中勑江淮堰埭商賈牽舩過處凖斛㪷納錢謂之埭程大厯初諸州府應税青苖錢每畝十文充百司手力資課三年十月臺司奏縁兵馬未散百司支計不給每畒更加五文通典稅民屋架籍賈人貲錢陳京初帝討李希烈財用屈京與户部侍郎趙賛請稅民屋架籍賈人貲錢以率貸之請收邸直裴休進中書侍郎時方鎮設邸閣居茶取直因是商人他貨横賦之道路苛擾休建言請收邸直無擅賦商人奏罷稅外薑芋錢崔戎持節劒南奏罷税外薑芋錢當賦錢者率三之以其一凖繒布優其估以與民征乘牛之出入市者宗室具兼河南尹視征乘牛之出入市者斥所得佐用度公田籍而不稅往古之時醇樸未散公田籍而不税關市譏而不征文粹崔融䟽所租入十分錫一江南野史後主昱罷諸郡屯田歸州縣委所屬宰簿與常賦俱征所租入十分錫一謂之率分以為禄廪諸朱膠牙税亦然由是公無遺利而屯田佃民絶公吏之撓刻獲安業焉鹽米又先主世不㮣括定民産自正斛上别輸三斗於官廪受鹽二斤謂之鹽米百姓便之及世宗尅淮南鹽貨遂艱官無可支至今輸之猶為定制民税出雜産物與錢韓文張君墓誌改澧州刺史民税出雜産物與錢尚書有經數觀察使牒州徴民錢倍經君曰刺史可為法不可貪官害民留禁不肯從被支税草以納閑廐韓休為虢州刺史被支税草以納閑廐休奏請均配餘州張說駁之曰若獨免虢州即當移向他郡休復將執奏寮吏曰更奏必忤執政之意休曰為刺史不能救百姓之弊何以為政必以忤上得罪所甘心也竟執奏獲免唐舊史筭賦五白口賦昭詔無收五口賦注漢議民年七嵗至十五出口錢武帝加車騎也減口賦錢昭詔人未家給其減口賦錢文收口錢文詔民三十賦丁男三年而一事收口錢也髙祖劫筭賦民年十五至十六筭賦人百二十年十一筭治庫兵車貢禹上書古無筭賦口錢武帝征四夷重賦民子産三嵗出口錢至有生多輕殺宜令七嵗去齒乃出口錢二十始筭倍筭漢律人出一筭筭百二十錢也唯賈人與奴婢倍筭也孔㩁筭之科陸贄言常賦不給乃議蹙限而加斂焉加斂既殫則别配之别配不足扵是㩁筭之科設資産之中事情不一陸贄奏議資産之中事情不一有藏扵襟懷囊篋物雖貴而人莫能窺有積於場圃囷倉直雖輕而衆以為富有流通蕃息之貨數雖寡而計日収贏有廬舎器用之資價雖髙而終嵗無利如此之比其流實繁一槩計估筭緡宜其失平長偽稅舟車六白筭軺車漢食貨志非吏比者三老北邊騎士軺車一筭注軺車小車也比例也非為吏人之例非為三老非為北邊騎士而有軺車皆令出一筭商賈二筭商賈有軺車之筭注重其賦也筭舩食貨志舩五文已上一筭匿不自占占不悉戍邊一嵗没入緡錢有能告者以其半畀之也孔崔融獻議曰吐蕃傳右史崔融獻議曰張騫始通西域列四郡據兩闗斷匈奴右臂稍稍度河隍築令居以絶南𦍑於是障矦亭遂出長城數千里傾府庫殫士馬行人使者嵗月不絶至作皮幣筭緡錢法税舟車㩁酒酤夫豈不懷為長久計然也天下諸津舟舡所聚旁通巴漢前詣閩越七澤十藪三江五湖控引河洛兼包淮海𢎞舸巨艦千舳萬艘交貿往還憧憧永日今若江津河口置鋪納税則撿覆撿覆則遲留此津纔過彼鋪復止非惟國家税錢更遭主司僦賂船有大小載有多少量物而税觸塗淹久統論一日之中未過十分之一因此淹滯必至吁嗟崔融䟽輕賦税七白大貊小貊公羊傳曰什一天下之中正也寡乎什一大貊小貊注貊蠻貊也蠻貊無宗廟社稷城郭故税薄也白圭之清孟子白圭謂孟子曰吾欲二十而税可乎孟子曰子之道貊道也薄賦輕徭薄斂園有桃魏大夫刺其君國小而廹儉以嗇而無徳以将之也保鄣尹鐸為晉陽請曰繭絲乎保鄣乎趙簡子曰保鄣哉尹鐸損其户數損則税輕而人安可謂保鄣乎繭絲減税也度官用以賦人食貨志漢興約法省禁輕田租什五而税一量利禄而度官用以賦扵人法纔取也斂從其薄藏於百姓孔薄賦斂為要令狐徳棻曰今天下無虞惟薄賦斂為要薄賦斂張𤣥素貞觀四年治洛陽宫且東幸𤣥素上書天下不可以力勝唯當務儉約薄賦斂以身先之願蠲薄徭賦張廷珪上䟽願蠲薄徭賦賦斂省則人富盧藏用嘗以賦斂省則人富輕賦節用李珏帝曰人君輕所賦節所用可乎珏曰貞觀時房杜王魏為文皇帝謀固此耳帝頗嚮納寛百姓租賦李翺條興復太平大略曰寛百姓租賦蠲賦十萬石又曰今嵗關中麥不収陛下哀民之窮下明詔蠲賦十萬石羣臣動色百姓歌樂遍畎畮有詔蠲責李渤張平叔歛天下逋租渤言上不能奉詔下不忍民窮無所逃死請放歸田里有詔蠲責蠲橫租錢三百萬衛次公為陜虢觀察使蠲橫租錢三百萬罷廵勾李吉甫罷諸路嵗終廵勾以絶苛斂寛賦斂曲環陜州安邑人改陳許節度寛賦斂不剥下不加斂程异方討蔡异使江表調財用所至不剥下不加斂經用以饒寛賦田布所至寛賦勸穡人皆安之劉晏書移書於宰相元載京師三輔苦税入之重淮湖粟至可減徭賦半為一利悽惻念誅求薄斂近休明杜甫簡元使君下無曲獻上絶私求陸贄奏議陛下臨御之秘清静之化下無曲獻上絶私求近嵗已來稍逾前㫖今但滌除流誤振起聖猷則淳風再興賄道中寢雖有貪饕之軰曷由復肆侵漁州郡羡財亦將焉往若不上輸王府理湏下紓疲人如是則困窮之中十又緩其四五矣惻惻詔書下半減麥與緡半租豈不薄尚竭力與筋元稹旱災詩詔度支減賦崔衍復奏州縣多岩田又郵𫝊劇道屬嵗無秋民舉流亡不蠲減租頗人無生理臣見長吏之患在因循不以聞不患陛下不憂恤也患申請不實不患朝廷不矜貸也陛下㧞臣大州寧欲視民困而顧望不言哉徳宗從其言為詔度支減賦通賦䝉勿收之惠桞宗元表欲人之安也在於薄斂斂之薄也在於節用若用之不節寜斂之欲薄其可得乎在先省不急之費定經用之數使下之人知上有憂恤之心取非獲己自然樂其輸矣通典復除八白小司徒稽夫家九比之數以辨老㓜貴賤廢疾凡征役施舎者舎謂復不給徭役者賢者能者卿大夫以嵗時登衆寡辨其可任者國中自七尺及六十野自六十有五皆役之其國中貴者賢者服公事老者疾者皆免豐沛漢髙曰以沛為朕湯沭邑復其民父老請曰沛已䝉復豐未䝉上曰豐極不忘也特以其雍齒反吾故遂棄復豐也平城役又髙詔吏卒從軍至平城反城守邑者皆復終日勿事諸侯子又詔曰諸侯子在闗中復十二嵗歸者半之復身及户又髙詔非士大夫已下皆復其身及户勿事注復其身及户内無徭役魏氏武卒刑法志魏氏武卒衣三屬甲操十二石弩負矢五十置戈其上胄帯劒贏三日之糧日中而趨百里中試者復其户利其田宅也買復食貨志武帝時兵革數動民多買復及五大夫長以次徴發之士益鮮也南頓後漢光武過南頓復田租一嵗父老固請十年帝曰安敢逺期十年父老曰陛下惜耳因大笑復増一年也請優復常山三考上言上生元吉民願䝉優復潁川魏志文帝復潁川一年田租復耕織史衛鞅變法民戮力本業耕織致粟帛多者復其身小利舉以為収孥年老漢武詔八十復三笇復二口之笇也九十者復甲九十身末利下與革車之賦貞婦平帝時復貞婦鄉一人車馬武令民車騎馬者復甲卒三人勸人養馬也五女晉武帝以將士應娶者多家有五女給復孔三歳一復韋臯為劒南西川節度使始臯務私其民列州𤣥除租凡三嵗一復臯没人徳之優賢能文粹周禮鄉大夫職曰國中自七十以下皆征之其捨者為賢正責也服公事也注捨謂君今復除其計耳所以優賢能也陳章甫與吏部孫員外書復給文粹百姓並復給五年奉天改元赦陸贄奪其畜牧事其子孫陸贄奏議凡有私牧者例元勲貴戚之門所謂將家者皆統師岳牧之後是乃嘗蒙親委或著忠勞復除征役固有常典今忽奪其畜牧事其子孫有乞假以給資装有破産以營卒乘道路悽憫部曲感傷貴位崇勲孰不解體流民還者給復三年乾元二年肅宗本紀諸没落外畨得還者一年以上復三年二年以上復四年三年以上復五年外畨之人投化者復十年通典輸納九白輸幣子産相鄭伯如晉晉侯未見子産曰未知見時不敢輸幣亦不敢暴露非薦陳之不敢輸也暴露之則恐燥濕之不時而朽蠧也泛舟之役秦輸粟於晉自雍及絳相繼命之曰泛舟之役謂從渭水運入汾河歸粟夏歸粟扵蔡周凾矜終無資也方輸錯出枚乘曰諸侯方輸錯出運行數千里不絶其珍怪不如山東之府僦載煩費王莽傳曰陳寳貨皆重則小用不給皆輕其僦載煩費注僦送也樂輸作大函使投中晉劉超世瑜為句容令常年賦税者四出評百姓家資超作大函封付之使各自書家産投函中訖送還縣百姓依實上課所入有踰乎書也孔緩期韋温出為陜虢觀察使民當輸租而麥未熟吏白督之温曰使民貨田中穂以供賦可乎為緩期而賦辦代下户納租髙承簡遷邢州刺史觀察府責賦尤急承簡代下户數百輸租蠶絲盡輸税機杼空倚壁桞宗元田家姑舂婦擔輸促促輸官不足歸賣屋元稹田家詞老翁家貧在山住耕種山田三四畝苖䟱税多不得食輸入官倉化為土張籍野老歌賦調嘗與民為期不擾自辦王仲舒傳均輸十白桑𢎞羊為大司農中丞管諸侯計事事稍置均輸以通貨物諸所輸於官今去其土地所饒平於其所在時所價官更於他處賣之輸者便而官有利張林請立後漢張林請布帛為租以通貨立均輸朱暉議比賈販而止建以均輸𢎞羊見非於卜式比之賈販張林沮計扵朱暉興㩁筦之利誠欲豐財畜聚斂之臣則為傷義作法於貪其敝何救以義為利則人不食若謀之不臧雖得而非貴同上輸販權販籠貨委輸坐市販昔邊鄙或聳猶假贍軍今役車其休豈資興利賜軍輸後漢光武以劉盆子為趙王郎中上賜洛陽軍輸地以列肆使食税終身平凖食貨志唯桑𢎞羊以天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國名往往置均輸鹽鐡官軍令逺方各以其物如異時商賈所轉販者為賦而相權輸置平凖於京師都受天下委輸召二官治車器皆仰給大農大農諸官盡籠天下諸侯之貨物貴則賣之賤則買之如此富商大賈亡所牟其利反本物不得騰踴故抑天下之物名曰平凖孔顧少連字夷仲改京兆尹先是京畿租賦薄厚不能一少連以法均之均租調韓滉為鎮海軍節度使均租調不踰年境内稱治居無主客人無丁中商賈税三十之一與居者均税自代宗時始以畒定稅而斂以夏秋至徳宗相楊炎遂作兩税法夏輸無過六月秋輸無過十一月置兩税使以總之量出制入居無主客以居者為簿人無丁中以貧富為差商賈税三十之一與居者均役田税視大厯十四年墾田之數為定遣黜陟使按比諸道丁産等級免鰥寡惸獨不濟者敢有加斂以枉法論食貨志因暴斂以毁其家陸宣公豪富之徒乘急令以邀其利窮乏之輩因暴斂以毁其家非所謂均節財物凖平賦法之術也若抵石於井非極泉不止李渤上言渭南長源鄉户四百今纔四十閿鄉户三千而今遷他州縣大抵類此唯其弊始於㰙逃人之賦假令十室五逃則均責未逃者若抵石於井非極泉不止誠由聚斂之臣割下媚上願下詔一賜禁止計不三年人必歸於農夫農國之本本立而太平可議矣免貧者而不益富者税此誠當也乘理政之後固非若此不可不幸乘弊政之後其可爾耶夫弊政之大賄賂行而征賦亂茍然則貧者無資以求於吏則有貧之實而不得貧之名富者操其贏以市於吏則無富之名而有富之實貧者困而無所省富者恣而無所忌固必問其實則貧者固免富者固賦矣安得待一定之論哉若曰止免貧者而富者不問則僥倖者衆皆挾重利以邀貧者猶若不免焉若曰檢富者懼不得實而不可増焉則貧者亦不得實不可免矣若皆得實故縱以為不均何哉孔子曰不患寡而患不均不患貧而患不安今富者税益少貧者不免捃拾以輸縣官以為不均大矣桞宗元答元饒州書不能救弊何以為政韓休請均配餘州餘見田賦門平糴十一白食貨志李悝為魏文侯作盡地力之教曰糴甚貴傷民人士工商也甚賤傷農民傷則離散農傷則國貧甚貴甚賤其傷一也善為國者使民無傷而農益勸故善糴者必謹觀嵗有上中下熟上熟其收自四萬四百石平嵗百畒收百五十石今大熟四倍六百石計民終嵗長四百石官糴三百石此為糴三舎一也中熟自三餘三百石自三収四百五十石終嵗長三百石官糴二百石此為糴二捨一也下熟自倍餘百石自倍収三百石終嵗長百石官糴五十石云下熟糴一謂中分百石之一也小飢收百石平嵗收一百五十石今小飢收百石收三分之二中飢七十石収三分之一大飢三十石收五分之一故大熟則糴三而捨一中熟則糴二下熟則糴一使民適足價平則止小飢則發小熟之所斂大飢則發大熟之所斂而糶之故雖有飢饉水旱糴不貴而民不散取有餘補不足行之魏國以富彊糴三輔罷關東漕漢宣時歳數登穰榖石至五錢大司農耿夀昌善為筭能商功利奏言故事嵗漕關東糓四百萬斛以給京師用九十六萬人宜糴三輔𢎞農河東上黨太原榖足供京師可以省關東漕九十過半大夫蕭望之奏以漕關内之榖築倉治舡費直二萬億有動衆之功恐生旱氣上不聽望之之言漕事果便壽昌遂曰邊郡築倉以榖賤時増價糴之以利農貴時減價糶之名曰常平民便之上奏賜爵關内侯常平元帝時大水琅琊人相食在位諸儒多以常平請罷無與人争利皆罷之管子曰嵗有㓙穰榖有貴賤人君不治則畜賈遊於市乘人不給百倍其本是以民有餘則輕之故人君散之以重凡重輕散斂之以時即准平故大賈畜家不得豪奪吾人也裒多益寡稱物平施貿遷有無狗彘食人食而不知檢野有餓莩而不知發孟子故管子之輕重李悝之平糴𢎞羊之均輸夀昌之常平亦有從事故古為之有數吏良而令行故民頼其利萬人作乂漢書賛糶三十史記糶三十病農九十病末上不過八十下不減三十則農末俱利務完物無息敝相質易腐敗而食之不便後漢劉般伯興為金吾将軍帝欲置常平公卿多以為便般以常平外有利人之名内實侵刻百姓豪右因縁為姦帝乃止孔建平糴法張儉徙代州勸墾田力耕嵗數稔私蓄富實儉恐虜易驕乃建平糴法入之官虜喜悦置和糴貯備使呉武陵信州人長慶初竇易直以户部侍郎判度支表武陵主鹽北邊易直以不職薄其遇㑹表置和糴貯備使擇郎中為之武陵諫曰今縁邊膏壤鞠為榛杞父母妻子不相活前在朔方度支米價四十而無踰月積皆先取商人而後求牒還都受錢脱有冦薄城不三旬便當餓死何所取財而云和糴哉中人爲和糴使髙鉞元和末以中人為和糴使鉞䟽論執關輔以榖賤傷農宜加價糴糓陸贄近嵗關輔之地年榖屢登數減百姓税錢許其折納粟麥公儲委積足給數年田農之家猶困糓賤今夏江淮水潦漂損田苖比於常時米價加倍甿庶匱乏流庸頗多關輔以榖賤傷農宜加價糴榖以勸稼穡江淮以榖貴民困宜減價糶以救㓙災之厄榖糴豐賤殊異往時陸贄近者㳂邊諸州頻嵗大稔榖糴豐賤殊異往時此乃天賛國家永固封畧之時也而尚日不暇給曽無逺圖軍府有歉食之詞穡人有悔耕之意天賛而不愛其利農傷而不䘏其窮及㓙災流行播殖墯廢雖復悔恨事何可追頃請擇人充使委之平糴務農陛下以理貴因循未賜允許江淮旱榖踴貴盧坦江淮旱榖踴貴或請抑其直坦曰所部地狹榖來他州若直賤不來矣不如任之既而商賈以米坌至乃多貸兵食出諸市價遂平貢獻十二白九貢任土百貨以時歸時事於宰旅韓宣子聘問王使請事對曰晉士匄将歸時事於宰旅注時事四時貢職宰旅冡宰之事也言貢獻於宰旅者不敢斥尊陳之藝極藝極法度入以嵗時天子班貢輕重之列貢職之數禮天子合諸侯制貢職之數輕重之法以逺近土宜為度制財用之節貢職多少方物貢之有時取之以道飲化爰來人無逺邇率職而入貢有等夷悦服樂輸樂率貢職賨幪夷狄布貨賮志貨也方賮望曰來賔以時入貢漢書憬彼淮夷來獻其琛憬逺也琛寳也禹别九州而任土作貢王府則有底貢底致也無有逺邇畢獻方物武王克商諸侯官受方物府無虚月魯之於晉職貢不乏史不絶書府無虚月誅求無時悉索敝賦以來會時事也列尊貢重列位也公侯地廣故所貢多卑而貢重甸服也甸服天子畿内供職貢也貢之無藝貢獻無極亡可待也合諸侯藝貢事禮也藝法也棧山般海踰沙軼漠之貢史不絶書文選誅求不已具歎無時供給既難寧無虚月時入周禮以時入之地貢地以生物入貢各以所有周禮制有貢各以地所有畢納納畢庭實有獻於公穎考叔凡於尊者有獻而不敢以聞此謂獻辭貔皮詩曰獻其貔皮赤豹黄羆彞器傳諸侯皆獻彞器於王晉獨無有何叔向曰與䘮賔宴又求彞器非禮也也盡其土實土地所有獻芹列子曰昔有獻芹於鄉老甞之苦笑而退也獻未有程髙詔欲省賦甚今獻未有程法也吏或多賦以為獻宜令諸侯常以八月十月朝獻郡國各以口數率人錢嵗以六十三以給獻費獻費見上注述職漢詔曰諸侯納貢非為財幣所以述職封還獻物後漢順詔桂陽太守文襲獻大珠以希幸媚帝令還之千里馬寳劒光武有獻千里馬及寳劒劒賜騎士馬駕鼔車太官勿受光武詔郡國所獻疲敝令太官勿受也置堠和帝時南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者繼路白羽扇晉庾澤嘗以白羽扇獻帝嫌其非新反之劉劭云云孔巧索珍異杜元頴敬宗驕僻不君元頴每欲中帝意以固幸乃巧索珍異獻之踵相躡於道獻金鐶宇文士及從化及至黎陽帝手書召之士及亦遣家僮間道走長安通諄勤且獻金鐶帝悦曰我嘗與士及共事今以此獻是將來矣孫伏伽上言相國叅軍盧牟子獻琵琶長安丞張安道獻弓矢並被賚賞以率土之富何索不致豈少此物哉簿羡貲百萬以獻王遂師東討李師道召為光禄卿淄青行營糧料使俄而賊誅遂簿羡貲百萬以獻帝髙其能獻木桮藤盤韋嗣立獻木桮藤盤數十物願租賦外一絶姚元崇曰戚里貢獻以求媚於上公卿方鎮寖亦為之臣願租賦外一絶之可乎必躬閱視渾瑊嵗時貢奉必躬閱視掊斂獻貢齊映為桂管江西兩觀察使映罷不以罪兾復進乃掊斂獻貢以中帝欲天下嵗入之物唐食貨志天寳時租錢二百餘萬緡粟千九百八十餘萬斛庸調絹七百四十萬疋綿百八十餘萬屯布千三十五萬餘端天子驕於佚樂而用不知節大抵用物之數常過其所入詭取諸郡輕貨上於帝韋堅舡次樓卜堅詭取諸郡輕貨上於帝以給貴戚近臣獻瓶初諸藩銀大瓶止五尺李兼為江西始獻六尺瓶至齊映乃八尺云數奏鷹犬異獵太穆皇后竇氏帝後見隋政多亂妄誅極乃為自安計數奏鷹犬異獵煬帝喜滄海未全歸禹貢杜甫詩洛下舟車入天中貢賦均上户部郎中掌任土所出而為貢賦之差六典户部有獻李絳遷户部侍郎判本司帝以户部故有獻而絳獨無何哉答曰凡方鎮有地則有賦或嗇用度易羨餘以為獻臣乃為陛下謹出納烏有羡贏哉若以為獻是從東庫物實西庫進官物結私恩帝戄然悟杜鴻漸兼成都尹請入朝獻寳器五床羅錦十五床麝臍五石獻縑韓滉帝既狩梁州獻縑千萬疋無獻李峴遷京兆尹𤣥宗嵗幸温陽甸内巧供億以媚上峴獨無所獻帝異之悉禁李石開成赦令天下非藥物茗果他貢悉禁廣貢奉劉餗廣貢奉以結㤙公託進獻楊炎曰四方貢獻悉入内庫權臣巧吏因得旁縁公託進獻私為贓盗者動萬萬計以珍貢私别庫陸贄始帝播遷府藏委棄衛兵無楮衣至是天下貢奉稍至於是行在夾廡署瓊林大盈二庫别蔵貢物贄諫以今師旅方殷瘡痛呻吟之聲未息遽以珍貢私别庫恐羣臣有所觖望請悉出以賜有功令後納貢必歸有司先給軍賞瓌恠纎麗無得以供是乃散小儲成大儲捐小寳固大寳也帝悟即撤其署獻羡錢五百餘萬韓滉封鄭國二年更封晉是嵗入朝獻羡錢五百餘萬緡詔加度支諸道轉運鹽鐡等使淡菜蚶蛤孔戣明州嵗貢淡菜蚶蛤之屬戣以為自海抵京師道路役凡四十三萬人奏罷之得相王播自淮南還獻玉𢃄十有三銀盌數千綾絹四十萬遂再得相云諫罷錢徽加承㫖是時内積財圖復河湟然禁無名貢獻而至者不甚却徽懇諌罷之貢蚶元稹徙浙東觀察使明州嵗貢蚶役郵卒萬人不勝其疲稹奏罷之獻銀壺甕李絳襄陽裴均違詔書獻銀壺甕數百具絳歸之度支示天下以信帝可奏仍赦均罪以佩刀獻張説為東都留守説知太平等懷逆乃因使以佩刀獻𤣥宗請先决䇿帝納之脂盝粧具李徳裕為浙西觀察使敬宗立侈用無度詔浙西上脂盝粧具徳裕奏比年旱災物力未完三月壬子赦令常貢之外悉罷進獻此陛下恐聚斂之吏縁以成姦雕鏤之人不勝其敝也願詔宰相議何以俾臣不違詔㫖不乏軍興不疲人不斂怨則前􅎁後詔咸可遵承不報方是時罷進獻不閱月而求貢使者足相接於道故徳裕推一以諷他侏儒陽城為道州刺史産侏儒嵗貢朝廷城哀其生離無所進帝使求之城奏曰州民盡短若以貢不知何者可共自是罷獻錢三十萬緡崔祐甫淄青李正己畏帝威斷表獻錢三十萬緡以觀朝廷帝意其詐未能答祐甫曰正己誠詐陛下不如遣使勞其軍以所獻就賜將士若正己奉承詔旨是陛下㤙洽士心若不用彼自斂怨軍且亂又使諸藩不以朝廷為重賄帝曰善正己慙服獻糗餌數百䭾張濬黄巢之亂稱疾挾其母走商山僖宗西出衛士食不給漢隂令李康獻糗餌數百䭾士皆厭給帝異之曰爾乃及此乎對曰臣安知為此張濬教臣也乃急詔濬至行在再進諫議大夫羡餘白居易河東王鍔將加平章事居易以為宰相天下具瞻非有重望顯功不可任按鍔誅求百計不䘏彫瘵所得財號為羡餘以獻今若假以名器四方聞之皆謂陛下得所獻與宰相餼牽外無他獻裴耀卿傳帝謂張説曰今帝有事岱宗而懷州刺史王丘餼牽外無他獻我知其不市㤙也獻馬鄭珣瑜為河南尹未入境會徳宗生日尹當獻馬吏欲前取印白珣瑜視事且内贄珣瑜徐曰未到官而遽事獻禮歟不聽零陵香上供韋宙湘源生零陵香嵗市上供人苦之宙為奏罷四方爭為恠珍入貢𤣥宗貴妃楊氏四方爭為恠珍入貢動駭耳目貢賦不絶趙匡凝太祖表匡凝荆襄節度使以匡萌為荆南留後是時唐衰藩鎮不復奉朝廷獨匡凝兄弟貢賦不絶五代史韓愈上尊號表章亥所歩禹稷所書四面輻輳各修貢職西戎之首北狄之渠怛威愧徳失據狼狽收其種落逃遁逺去來獻羊馬千里不絶寸地尺天皆入貢竒祥異瑞皆來送不知何國致白環復道諸山得銀甕杜甫洗兵馬行感其志而戒初一品集異域歸忠傳序昔越裳貢雉薦於宗廟西旅獻獒陳於典訓所以感其志而戒其初仁聖大孝皇帝龍荒君長上表獻良馬二絶大漢而貢赤誠渉流沙而霑赭汗萬里貢賦百蠻歸欵辛替否傳貢賦均洛下舟車入天中貢賦均杜甫有感詩天子誕日諸道爭以侈麗奉獻常衮天子誕日諸道爭以侈麗奉獻不則為老子浮屠解禱事衮以為漢文帝還千里馬不用晉武帝焚雉頭裘宋髙祖碎琥珀枕是三主者非有聰明大聖以致治安謹身率下而已今諸道饋獻皆淫侈不急而節度使非能男耕而女織者類出於民是斂怨以媚上也請還之禁獻侏儒短節髙祖本紀武徳元年十一月戊申禁獻侏儒短節小馬庳牛異獸竒禽貢奉母慮五十萬王紹為租庸判官徳宗已西狩乃督輕貨趣間道走洋州紹先見行在帝勞之曰吾軍乏春服朕且衣裘奈何紹流涕曰租庸使遣臣貢奉毋慮五十萬即至帝曰道回逺經費方急何可望耶後五十萬繼至猶足紓難天下以進奉結主恩崔衍遷宣歙觀察使先是天下以進奉結主恩州藏耗竭韋臯劉賛為之倡賛死衍代之舊貢金錫凡十八品皆倍直市於州民匱多逃去衍至蠲革之莊宗以來方鎮進獻之事稍作自莊宗以來方鎮進獻之事稍作至於晉陽不可勝紀矣其添都助國之物動以千數計至於來朝奉使買宴􅢥罪莫不出於進獻而功臣大將不幸而死則其子孫率以家貲求刺史其物多者得大州善地葢自天子皆以賄賂為事矣則為其民者其何以堪之哉五代史楚州獻定國寳一十一酉陽雜爼初代宗即位有慶雲見黄氣抱日初楚州獻定國寳一十一乃上詔監國詔曰上天降寳獻自楚州神明生厯數之符合璧定妖災之氣初楚州有尼真如忽有人接去天上天帝言下方有災令以此寳鎮之其數十二楚州刺史崔侁表獻焉一曰𤣥黄天符形勢如笏長八寸有孔辟人間兵疫二曰玉雞毛白玉也王者以孝理天下則見三曰糓璧白玉也如粟粒無雕鐫之跡王者得之五榖豐熟四曰西王母白環二枚所在處外國歸伏五曰闕名六曰如意寳珠大如雞卵七曰紅靺鞨大如巨粟八曰瑯琊珠二枚逾常珠有逾徑一寸三分九曰玉玦形如玉環四分缺一十曰玉印大如半手理如鹿形䧟入印中十一曰皇后粉採桑鈎細如箸屈其末十二曰雷公石斧形無孔諸寳寘之日中皆白氣連天瑞龍腦天寳末交趾貢龍腦如蠶蟬形波斯言老龍腦樹節方有禁中呼瑞龍腦上賜貴妃十枚香聞十歩同上闕貢十三白苞茅不入齊桓伐楚曰爾貢苞茅不入王祭不供寡人是徴對曰貢之不入寡人之罪也敢不供給不供是懼闕而為罪宜守命以供時豈絶書而重月既爽樂輸宜科墯職未乖恱使何悔樂輸無之實難貢或不供必先問罪臨事有虧則思移過先期不告誰今當辜宋義王不供職貢慢官之後徒欲費辭戒事之前胡不申報孔貢獻不入髙駢自乾符以來貢獻不入天子貢職廢闕責當有歸陸宣公自希烈亂常汚染淮甸貢職廢闕責當有歸在於編氓豈任其咎諸侯春不貢杜甫詩藩貢或闕王命征之蘇頲藩貢或闕王命征之於是乎治兵其郊獲辭而止本傳楚貢何年絶杜甫詩珍竒之貢不入張東之論戍姚州之弊訴貢賦十四白子産爭承承謂負賦之次曰鄭伯男也使從諸侯之貢懼不給也貢之無極亡可待也自日中以爭至於昏晉人許之子産爭承田班輕重見上叔孫將命請視邾滕叔孫會於宋季武子使視邾滕言自比邾滕永薄賦也茍非讎敵敢不樂輸請恤薄言宜寛厚斂事必舉中節宜奉上雖家財將竭宜緩誅求而國賦是資則難蠲免訴永減而猶可請不供而謂何孔訴機織未就盧坦為夀安令河南賦限已窮縣人訴機織未就坦詣府請申十日不聽坦諭縣人第輸勿顧限違之不過罰令俸爾由是知名上請貸期文粹孫樵書何易於督賦何如曰上請貸期不欲累絶百姓使錢出粟帛糧儲屋宅男女牛羊幾盡元結拜道州刺史初西原蠻掠居人數萬去遺户裁四千諸使調發符牒二百函結以人困甚不忍加賦即上言臣州為賊焚破糧儲屋宅男女牛羊幾盡今百姓十不一在耄孺騷離未有所安嶺南諸州冦盗不盡得守捉候望四十餘屯一有不靖湖南且亂請免百姓所負税租及租庸使和市雜物十三萬緡帝許之明年租庸使索上供十萬緡結又奏歳正租庸外所率宜以時増減詔可九貢十五白周禮太宰以九貢致邦國之用一曰祀貢積牲苞茅之屬二曰嬪貢嬪或為賔皮帛之屬𤣥謂貢絲枲也三曰器貢宗廟之器也𤣥謂器者銀鏤金磬四曰幣貢繡帛也𤣥謂玉帛皮幣也五曰材貢竹木之材六曰貨貢金珠龜象七曰服貢祭服絺綌八曰㳺貢毛羽之屬九曰物貢謂九州之外各以所貢之物為贄若慎肅貢楛矢之類禹貢九州兾州厥貢漆絲厥篚織文文謂綺錦之屬青州厥貢鹽絺海物惟錯錯雜也非一種也岱畎絲枲鈆石也鈆松恠石厥篚檿絲檿絲柔蠶絲中琴絃者徐州厥貢惟土五色羽畎夏翟嶧陽孤桐泗濵浮磬淮夷璸珠暨魚厥篚𤣥纎縞纎細也縞白纎也𤣥黒繒也纎在中混二物皆細也揚州厥貢惟金三品瑶琨篠蕩篠竹箭也齒革羽毛惟木厥篚織貝厥苞橘柚錫貢注錫命乃貢不常貢荆州厥貢羽毛齒革惟金三品杶榦栝栢礪砥弩丹惟箘簵楛注美竹也三邦底貢厥名注楛中矢榦三物非雲夣之澤三國咸致貢也包匭菁茅厥篚𤣥纁􅀈組九江納錫大龜注大龜亦命錫乃貢之豫州厥貢漆絲絺紵厥篚纎纊錫貢磬錯注治玉曰錯梁州厥貢璆鐡銀鏤砮磬熊羆狐狸織皮雍州厥貢惟璆琳琅玕厥篚𤣥黄兖州厥貢漆絲厥篚織文孔辨其名物白居易裴洪泰太府少卿制九土之貢百品之貨辨其名物謹其出納常在外府貢賦未均於九州桞宗元為樊左丞讓官表版圖再緝貢賦未均於九州貢賦修於九州同上表從民之宜乃九於野墳厥貢藝而有上中下同上天對蠻夷貢賦十六白書西旅獻獒太保作旅獒無有逺邇畢獻方物貴寳周禮九州之外謂之蕃國也一見名以其貴寳為贄象胥諭言語也嚮風來享來王名馬西域獻果下馬魏志穢國今朝鮮皆其地出果下馬漢時嘗獻之才尚三尺以來賨布晉食貨志夷人輸賨布户一疋逺者或一丈逺夷不課田者輸義米户三斛逺者五㪷米極逺者輸筭錢八十二文義米見上被聲教選遐荒越裳白雉後漢交趾之南有越裳國周公居攝六年越裳以三象重譯獻白雉曰天無烈風雷電則中國有聖人也故來獻之請加稅後漢順帝時武陵守上書以蠻夷率服可比漢民増租請加稅虞翻云不可帝不從果叛常賦鄭純為永昌守與哀牢夷得嵗輸布貫頭衣領二鹽一斛以為常賦賨人晉書廪君出武落丹穴名務相氏巴姓種類遂繁奏并為黔中郡薄賦之口出錢四十巴人呼賦為賨人也蕃夷進獻式主客式諸蕃夷進獻答諸色無估價物鴻臚寺量之酬答也孔葱嶺以東皆奉貢贄楊恭仁為凉州總管由葱嶺以東皆奉貢贄就加納言朝貢踵至裴矩帝自東都矩以蠻夷朝貢踵至諷帝悉召天下竒倡恠妓大陳端門前曳錦縠珥金琲者十餘萬詔百官都人列繒樓幔閣夾道被服光麗㕓邸皆供帳池酒林胾譯長縱蠻夷與民貨易在所令邀飲食相娯樂蠻夷咨嗟謂中國為仙都帝所天子以為誠諸國悉使者奉獻魏徴高昌王麴文泰將入朝西域諸國欲困文泰悉使者奉獻帝詔文泰使人厭怛紇干迎之徴曰異時文泰入朝所供擬不能具今又加諸國焉則瀕塞州縣以乏致罪者衆彼以商賈來則邊人為之利若賔客之中國蕭然耗矣漢建武時西域請置都護送侍子光武不許不以蠻夷弊中國也帝曰善追止其詔獻萬釘寳細金𢃄馬五千匹統業護可汗獻萬釘寳細金𢃄馬五千匹獻生口數十裴寛拜范陽節度使檀州刺史何僧獻生口數十寛悉歸之故夷夏感附獻濵塞亭障李吉甫吐蕃復請獻濵塞亭障南北數千里永盟吉甫謀曰邊境荒阻犬羊相吞邊夷按圖覆視且不能知今生蕃綿山跨谷以數畨紙而圖千里起靈武著劒門要險之地所亡二三百所有得地之名而實䘮之陛下將安用此帝乃詔謝賛普不納猛火油薔薇水五代占城顯徳五年其國王因徳漫遣使者莆訶散來貢猛火油八十四瓶薔薇水十五瓶其表以貝多葉書之以香木為函猛火油以洒物得水則出火薔薇水云得自西域以洒衣雖敝而香不滅魚牙紬海豹皮新羅開元中數入朝獻果下馬朝霞紬魚牙紬海豹皮又有二女獻琥珀馬碯日本永徽初獻琥珀大如斗馬碯若五升器龍腦香西域摩揭陀貞觀十六年遣使者獻龍腦香璽書優答貢頗黎狀若酸棗罽賔武徳二年遣使者貢寳𢃄金鎻水晶醆頗黎狀若酸棗鬱金香東安開元十四年納馬豹後八年獻波斯馬二拂菻繡氍毬一鬱金香等緑金精西域驢分國貞觀十七年遣使獻赤玻瓈緑金精下詔荅賚蠻琛夷貢北狄賛蠻琛夷貢踵相逮於廷紫瓷盆唐杜陽編武宗會昌元年渤海貢紫瓷盆量容半斛内外通瑩其色純紫厚可寸餘舉之則若鴻毛黄金鵝以獻吐蕃賛普餘見向化門日本獻方物日本建中元年使者真人興能獻方物興能善書真人葢因官而氏也九夷八蠻在荒服之外者皆已賔貢韓文唐受命為天子凡四方萬國不問海内外無小大咸臣順於朝時節貢水土百物大者特來小者附集送殷貟外序同上越裳貢雉昔越裳貢雉薦於宗廟西旅獻獒陳扵典訓一品集高麗貢方物髙祖欲讓而不臣温彦博執不可曰遼東本周箕子國漢𤣥莬郡不使北面則四夷何所瞻仰帝納而止或時候風潮朝貢蠻胡賈人舶交海中若帥得人則一邊盡治韓文窮天貢賝異同上聮句五色玉酉陽雜俎天寳初安思順進五色玉𢃄又於左藏庫中得五色玉杯上恠近日西賮無五色玉令責安西諸蕃蕃言比嘗進皆為小勃律所劫不逹上怒欲征之乃命王天運統諸蕃兵伐之勃律君長恐懼請罪悉出寳玉願嵗貢獻天運不許即屠城而還出財助國十七白卜式輸家財漠武有事匈奴卜式上書輸家財半助邊上問欲官乎式曰臣少牧羊不曽為吏不願為官曰家有寃乎式曰不與人爭未嘗有寃但以天子征匈奴有智者宜效用有財者宜助國公孫𢎞曰此非人情不可以化而亂法遂不報數嵗渾邪降縣官人衆式復持二十萬與河南尹尹上其名帝謝之召賜式外繇四百人時富家皆匿財唯式欲助軍費上以式為郎中以諷天下杜緩入錢榖元帝時榖貴人流西羗反方征之杜緩上書入錢榖助用前後數百萬後為太常麋竺助軍資蜀志麋竺率奴客二千金銀貨幣助軍資于時困匱頼以復振奉國奉上憂國憂邊徇公産侔陶白室比程羅古時富人王丹上麥鄧禹西征王丹率宗族上麥二千斛蕭何佐軍漢召平謂蕭何曰上有疑君之心宜讓封悉以家私助軍何從其計上大悦王肅上錢縑後漢東海王肅以西𦍑未平上錢二萬永和中復上縑萬匹助國費鄧太后下詔褒納之孔出貲助邊嚴震至徳乾徳中數出貲助邊前後賞賜皆上于官李嗣業前後賞賜皆上扵官以助軍云詔方鎮獻財助軍李固言帝伐回詔方鎮獻財助軍上䟽固諫不從上米五十萬斛鹽二萬斛張允伸龎勛以徐州反上書欲遣弟允臯領兵討賊不許上米五十萬斛鹽二萬斛佐用度出家貲助軍李叔眀徳宗幸興元出家貲助軍悉衣幣獻宫掖白孔六帖卷七十九
