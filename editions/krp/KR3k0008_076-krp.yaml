body:
  text: 白孔六帖卷七十六唐白居易原本宋孔傳續撰留守一元帥二都督三招討使四緫管五節度使六安撫大使七方鎮八治中司馬九觀察使十防禦使十一團練使十二度支十三鹽鐵使十四轉運十五京兆尹十六河南尹十七少尹十八幕府十九留守一白初太宗伐髙麗置京城留守其後車駕不在京都則置留守以右金吾大將軍為副留守百官志關中事一以屬公宗室晦髙宗将幸洛詔晦居守謂曰闗中事一以屬公然法令牽制不可以成政法令外茍可以利人者行之毋湏以聞故事留司官入宫城門列晨衙見留守崔從寳厯初為東都留守故事留司官入宫城門列晨衙見留守吏誕敖久廢至是復行繕三宫城杜暹帝東幸以暹為留守暹率當畨衛士繕三宫城浚池督役不少懈帝聞嘉之數賜書褒勞治尚寛簡源乾曜帝東幸以京兆尹留守京師治尚寛簡人安之居三年政如始至以兵屬居五年張延賞時罷河南山南等副元帥兵屯東都詔延賞知留守以兵屬居五年治行第一召還自變生倉卒頼子儀復安郭子儀射生将王撫自署京兆尹亂京城子儀斬以徇帝以子儀為京城留守自變生倉卒頼子儀復安留守不賜旗甲吕元膺拜東都留守故事留守賜旗甲至元膺不給或上言用兵討淮西東都近賊損其儀沮威望請比華汝夀三州帝不聽并三州罷之留守不賜旗甲自此始呉少誠叛獨東畿為有備王翊徙東都留守既至開田二十餘屯脩器械皆良金夀革練士卒號令精明俄而呉少誠叛獨東畿為有備闗東頼之賜賚優渥宋璟十二年東廵泰山璟復為留守帝將發謂曰卿國元老别方歴時宜有嘉謀以遺朕璟因一二極言手制答曰所進當書之座右出入觀省以誡終身賜賚優渥未遑時廵方委留鎮韓臯留守制白居易元帥二孔髙祖定京師置左右元帥太原道行軍元帥西討元帥皆親王領之天寳末置天下兵馬元帥大厯八年罷天下兵馬元帥建中四年以李希烈反置諸軍行營兵馬都元帥會昌中置靈夏六道元帥天福二年置諸道兵馬元帥尋復改曰天下兵馬元帥百官志議者疾其長亂杜鴻漸廣徳二年同中書門下平章事崔旴殺郭英乂據成都蜀劒大亂命鴻漸以宰相兼成都尹山南西道劔南東川副元帥西川節度副大使往鎮撫之鴻漸性畏怯無他逺畧而晚節溺浮屠道畏殺戮且憚旴雄武先許以不死既見禮遇之且不敢加譙責反委以政日與從事杜亞楊炎縱酒髙㑹因薦旴為成都尹乃請入朝許之及見帝盛言旴威畧可任宜為留後獻寳器五床羅錦十五床麝臍五石復輔政議者疾其長亂悉誅元惡諸鎮惕息郭子儀光弼敗邙山失河陽又眀年河中亂殺李國貞太原戕鄧景山朝廷憂二軍與賊合而少年新将望輕不可用遂以子儀為朔方河中北廷路儀澤沁等州節度行營兼興平定國副元帥屯絳州時帝已不豫引至卧内謂曰河東事一以委卿子儀嗚咽流涕子儀至屯悉誅元惡諸鎮惕息兼三副元帥李抱玉兼三節度副元帥位望隆赫乃上言隴抵逹扶文綿地二千里㓂孔道不一梁岷重則關輔輕願擇能臣帥西道當一靣臣得専事關隴帝多其讓許之不恤其家李晟進京畿渭北鄜坊商華兵馬副元帥及晟家皆為賊質左右有言者晟涕數行下曰陛下安在而恤家乎軍政得専李晟帝議諸軍與神策等力且不贍遣翰林學士陸贄臨詔懐光令與晟計所宜者懐光曰廩賜不均軍何以戰贄數顧晟晟曰公元帥軍政得専之晟将一軍惟所命其増損費調敢不聼懐光黙然計塞臨軒授鉞渾瑊檢校尚書左僕射同中書門下平章事行營副元帥帝臨軒授鉞用漢拜韓信故事制曰㓂賊干紀授爾節鉞以戡多難往欽哉瑊頓首曰敢不畢力以對揚天子休命都督三孔景雲二年置都督二十四人察刺史以下善惡揚益并荆四州為大都督汴兖魏冀蒲緜秦洪潤越十州爲中都督皆正三品齊鄜涇襄安潭遂通梁䕫十州為下都督從三品當時以為權重難制奏罷之唯四大都督府如故百官志欲以威重夸逺俗宗室孝㳟為揚州行臺大都督孝恭再破巨賊北至淮東抱江度嶺而南盡統之欲以威重夸逺俗乃築第石頭城陳廬徼自衛或誣其反鐫詰無状赦為宗正卿以治狀聞宗室晦乾封中為營州都督以治狀聞璽書賜勞政務清净漢陽郡王瓌為荆州都督政務清净嶺外酋豪數相攻瓌遣使諭威徳皆如約不敢亂區落降從膠東王道彦拜􅡠州都督間遣入党項諭國威靈區落降從少威嚴襄邑恭王神符遷楊州大都督自丹陽渡江治隋江故郡楊人利之然少威嚴不為下所畏輕騎按部許欽明為涼州都督嘗輕騎按部㑹突厥黙啜兵奄至被執賊與皆至靈州使説之降欽明至城下呼曰有美醬乎有梁米乎并乞墨一枝時賊營四靣阻水惟一路行入欽明欲選將東兵乘夜襲賊也而城中無寤其廋者遂見害兄弟死王事世名其忠威信盛行竇軌為洛州都督周洛間因隋亂人不土著軌下令諸縣有㳺手末作者按之由是威信盛行民皆趨本密表求鷹李大亮為涼州都督嘗有臺使見名鷹諷大亮獻之大亮宻表曰陛下絶畋獵久矣而使者求鷹信陛下意邪乃乖昔㫖如其擅求是使非其才太宗報書曰有臣如此朕何憂勸墾田力耕張儉徙代州檢校都督勸墾田力耕嵗數稔私蓄富寔儉恐虜易驕乃建平糴法入之官虜悦喜由是儲斛流贏刻石頌徳王晙景龍末授桂州都督州有兵舊常仰餉衡永晙始築籮郛罷戍卒棣江開屯田數千頃以息轉漕百姓頼之期年人丐刻石頌徳便驛走官馮元常拜廣州都督詔便驛走官安南酋領李嗣仙殺都䕶劉延祐刼州縣詔元常討之率士卒航海馳檄先示禍福賊黨多降元常縱兵斬首惡而還本傳境内清畏王方慶武后時累遷廣州都督南海嵗有崑崙舶市外區琛琲前都督路元叡冒取其貨舶首不勝忿殺之方慶至秋毫無所索治部中首領沓墨氏詣府訴府曹素相餉謝未嘗始方慶約官屬不得與交通犯者痛論以法境内清畏議者謂治廣未有如方慶者號第一下詔賜瑞錦雜綵以著善政建議罷都督李景伯景雲中進右庶子時有議者置都督府非是詔羣臣著議景伯與太子舎人盧俌議今天下諸州分𨽻都督専生殺刑賞使授非其人則權重釁生非彊幹弱枝經邦軌物之議願罷都督留御史以時按察秩卑任重以制姦宄便繇是停都督擇最吏陽嶠時議建都督府擇最吏故嶠為涇州都督性分不易李尚隱遷廣州都督及還人或褎金以贈尚隱曰吾自性分不可易非畏人知也脩復堰坊張守珪為𤓰州都督州地沙瘠不可蓺是時渠堰為冦毁材木無所出守珪宻禱扵神一夕水暴至大木散千章塞流下因取之脩復堰坊耕者如舊州人神之刻石紀事政尚清省李襲志轉桂州都督襲志守桂二十八年政尚清省南荒便之酌貪泉舊史馮立拜廣州都督前後作牧者多以黷貨為蠻夷所患由是數怨叛立到不營産業衣食取給而已嘗至貪泉嘆曰此呉隱之所酌也遂畢飲而去俗始知棟梁利宋璟為廣州都督事見火門善撫御唐史郭元振遷涼州都督治涼五嵗善撫御道不舉遺見不拾遺門爲政嚴肅張嘉貞歴秦州都督為政嚴肅甚為人吏所畏招討四孔上破賊方畧孔巢父孔子三十七世孫為河中陜華招討使巢父累上破賊方畧帝嘉納本傳一劒横陣萬夫莫前隂則難窺勇則重閉亞夫緩急之任繼父絳侯祭遵禦侮之才為吾子路一品集王宰制招懷撫諭元稹裴度制前命相臣招懷撫諭矜而詿誤示以生門期扵盡脱網羅豈欲驅之䧟穽而豺狼當道荆棘牽衣雖欲歸之扵仁厥路無由而至緫管五孔縱戰艦放江中孝恭信州緫管蕭銑據江陵俄進荆湘道揔管統水陸十二軍發夷陵破銑二鎮縱戰艦放江中諸將曰得舟當濟吾用棄之反資賊奈何孝㳟曰銑之境南際嶺左薄洞庭地險士衆若城未㧞而援至我且有内外憂舟雖多何所用之今銑瀕江鎮戍見艦船蔽江下必謂詵已敗不即進兵覘候往反以引救期則吾既㧞江陵矣已而救兵到巴陵見船疑不進銑内外阻絶遂降掠其牛羊膠東王道彦從李靖撃吐谷渾詔為赤水道緫管帝厚以利啖党項使為鄉導其酋拓㧞赤辝詣靖自言隋擊吐谷渾我資其軍而隋無信反見仇剽今將軍若無他我願資粮將復如隋乎諸將與㰱血遣之道彦至濶水見無備因掠其牛羊諸𦍑怨爲赤辝所乘軍大敗冒矢石先登張士貴為龔州道行軍緫管破反獠還太宗聞其冒矢石先登勞之曰嘗聞以忠報國者不顧身於公見之宣布㤙意李靖授嶺南撫慰大使檢校桂州緫管以嶺南陋逺久不見徳非震威武示禮義則無以變風即率兵東廵所過問疾苦延見長老宣布天子恩意逺近懽服以全軍歸靖為行軍緫管以江淮兵萬人屯太谷時諸将多敗獨靖以全軍歸俄權檢校安州大都督蹀血虜庭李靖以兵部尚書為定襄道行軍緫管率勁騎三千由馬邑趨陽嶺頡利可汗大驚曰兵不傾國來靖敢提孤軍至此扵是帳部數恐靖縱諜者離其腹心夜襲定襄破之可汗脱身遁帝曰李陵以歩卒五千絶漠然卒降匈奴其功尚得書竹帛靖以騎三千蹀血虜庭遂取定襄古未有輩澡吾渭水之耻矣頡利請舉國内附奠長率部落五萬降李勣為通漢道行軍緫管出雲中與突厥戰走之引兵與李靖合因曰頡利若度磧保於九姓果不可得我若約齎薄之不戰縳虜矣靖大喜以與己合於是意决靖率衆夜發勣勒兵從之頡利欲走磧勣前屯磧口不得度由是奠長率部落五萬降于勣拜大都督府長史裂其地州縣之李勣髙麗莫離支男生為其弟所逐遣子乞師詔勣為遼東道行軍緫管率兵二萬討之破其國執長蔵男建等裂其地州縣之詔勣獻俘昭陵戰可汗襄邑㳟王神符遷并州緫管頡利可汗盗邊神符與戰汾東斬級五百獲馬二千及戰沙河獲乙利逹官得可汗所乘馬及鎧以便冝决事裴寂授晉州道緫管討賊以便宜决事賊将宋金剛據介州寂屯度索原賊埭水上流寂徙屯為賊所薄兵大潰擊下十餘城李大亮擢金州緫管府司馬王洪烈據襄陽詔大亮安撫樊鄧因圖之進擊下十餘城俘其名王李大亮為河東道緫管與李靖俱出北道渉清海觀河源與虜遇蜀渾山大戰破之俘其名王獲雜畜數萬請斷石嶺竇静請斷石嶺以為障塞制突厥之入進㧞八城契苾何力盖蘇文死男子為弟所逐使子詣闕請降乃拜何力為遼東道行軍大緫管安撫大使經畧之副李勣同趨髙麗勣已㧞新城乘勝進㧞八城引兵還與勣㑹何力率兵五十萬先趨平壤虜其王以獻詔入朝所過作鼓吹泉男生授平壤道行軍大緫管兼持節安撫大使舉哥勿南蘇倉巖等城以降帝命舎人李􅐚繹就軍慰勞賜袍𢃄金釦七事明年召入朝詔所過州縣𫝊舎作鼔吹右羽林将軍李同以飛騎仗迎寵璽書襃勞郭孝恪焉耆王叛孝恪請擊之即拜西川道行軍緫管率歩騎三千出銀山道夜襲其王龍突騎支虜之帝悦降璽書襃勞復征賀魯蘇烈擢伊麗道行軍大緫管復征賀魯俟斤嬾獨禄擁衆萬帳絳烈撫之賀魯率十姓兵十萬拒戰輕烈兵少舒左右翼包之烈令歩卒據髙攅矟外向賊三突歩陣不能入因其亂擊之賊大奔建唐旗幟蘇烈出為神丘道大緫管率師討百濟賊傾國來酣戰破之殺虜萬人乘勝入其郛王義慈及太子隆北走烈進圍其城義慈子泰自立為王率衆固守義慈之孫文思曰王與太子出而叔豈能擅為王烈使士登城建唐旗幟扵是泰開門請命其将襧植與義慈降節度使六白方伯元戎揔元帥之任殿天子之邦上將外鎮軍大藩重鎮雄藩旌旗重寄河洛要衡分麾授律節制諸侯紏繩列郡藴佐命之才有經邦之策作捍方隅以奨王室有國柱石予王𤓰牙建牙大任分閫重寄轅門幕府將星人傑鎮撫方城藩屏邦國外威夷狄内撫黎元當注意之朝居建牙之任偶唐虞之代立方邵之勲孔節度使掌緫軍旅顓誅殺初授具帑抹兵仗詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛中官祖送次一驛輙上聞入境州縣築節樓迎以鼔角衙仗居前旌幢居中大将鳴珂金鉦鼔角居後州縣齎印迎於道左視事之日設禮案髙尺有二寸方八尺判三案百官志以八月考其治否銷兵為上考足食為中考邊功為下考同上其後有持節為節度副大使知節度使者正節度也諸王拜節度大使者皆留京師同上申厲禁條李暠檢校太原以北諸軍節度使太原俗為浮屠法者死不𦵏以尸棄郊飼鳥獸號其地曰黄坑有狗數百頭習食胔頗為人患吏不敢禁暠至遣吏捕羣狗殺之申厲禁條約不再犯遂革其風南裔肅然宗室復轉嶺南節度使時安南經畧使髙平正張應繼卒其佐李元度胡懷義等因阻兵脅州縣肆為姦贓復至誘懷義杖死流元度南裔肅然教民作陶瓦鐫諭蠻獠収瓊州置都督府以綏定其人賦不及民宗室復為鄭滑節度使復下令墾營田以廪其軍而賦不及民衆悦受命日不宿家宗室臯李希烈反遷江西節度使受命日不宿家至豫章大令将吏曰有必未申與懷器謀不發者皆自言得禆校伊真李伯潜劉旻悉補大将擢王鍔為中軍以馬彛許孟容為幕府治戰艦裒兵二萬以士二千五百委真等教之自将五百人教以秦兵團力法聨其賞罰弛張如一乃約以五百人擊真卒二千五百莫能當其鋒江漢倚臯為固臯遷荆南節度使凡戰大小三十二取州五縣二十斬首三萬三千生擒萬六千未嘗敗師所過不敢伐柔棗踐禾稼朝廷仰食江淮而淮西道出九江至大别皆與賊接臯轉戰數千里餉路遂通江漢倚臯為固復坊口堰温造節度河陽奏復懷州古秦渠坊口堰以溉濟源河内温武陟四縣田五千頃畏逺權勢裴玢同州劉公濟卒授玢節度使元和三年徙山南西道玢為治嚴稜畏逺權勢不務貢奉蔬食弊衣居處取庇風雨而已倉庫完實百姓安之頗有治名薛嵩相衛洺邢等州節度使方大亂後人亦厭禍嵩謹奉職頗有治名入朝民鄣路願留薛平李師道平詔分淄青齊登萊五州為平盧軍徙平為節度在嶺六年兵鎧完礪徭賦均一寳厯初入朝民鄣路願留河北河西等軍盡屬王晙代張說為兵部尚書同中書門下三品充朔方軍節度大使河北河西隴右河東等軍盡屬之本傳置備征軍徐商拜河中節度使突厥殘種保特峨山以千帳度河自歸詔商綏定商表處山東寛鄉置備征軍凡千人襞紙為鎧勁矢不能洞㓂所發迹捕捕必得徙節山南東道襄多山棚為剽賊商取財卒為捕盗将别為屯營㓂所發輒迹捕捕必得遂為精兵上下皆重足畏之崔從長慶初繇尚書左丞領鄜坊節度屬部多神策屯軍數亂法驕横吏不能制從一繩以法下皆重足畏之本傳俸帛加倍崔從檢校尚書左僕射淮南節度副大使知節度事揚州凡交易貲産奴婢有貫率錢畜羊有口筭又貿麹牟其嬴以佐軍用度從皆蠲除之官吏俸帛常加倍以給獨節度使則否從與之同父子皆秉節居鎮崔從子能奏以自代授嶺南節度使與從皆秉節居鎮世傳為榮更除繆政安潜代髙駢領西川節度使吏倚駢為姦利者安潜皆誅之數更除繆政於是盗賊衰不踰年境内稱治韓滉為鎮海軍節度使綏輯百姓均租調不踰年境内稱治帝在奉天淮汴震騷滉訓士卒分兵戍河南既狩梁州又獻縑十萬疋請以鎮兵三萬助討賊有詔嘉勞行無稽壅張延賞出為淮南節度使嵗旱民他遷吏禁之延賞曰拘此而斃不如適彼而生茍存吾人何限為乃具舟遣之敕吏為脩室廬已逋債而歸者更増扵舊𤓰歩舟艫津凑而遥繋江南延賞請度屬楊州自是行無稽壅事為之制延賞累遷荆南劔南西川節度使建中中西川兵馬使張朏襲成都為亂延賞奔鹿頭戍朏酣亂不設備延賞諜知之遣将叱干遂捕斬朏復成都自楊國忠討南蠻三蜀疲罄及乘輿臨狩縻用百出後更郭英乂崔寧楊子琳亂益矜僣公私肅然延賞事為之制薄入謹出府庫遂實民便安之張洪静徙節宣武承韓洪虐政代以寛簡民便安之一言之悦賞至百萬嚴武復節度劒南破吐蕃七萬衆於當狗城遂収鹽川武在蜀頗放肆用度無藝或一言之恱賞至百萬蜀雖富饒而峻掊亟歛閭里為空然虜亦不敢近擊㓂取都䕶還郭知運徙隴右諸軍節度大使鄯州都督突厥降户阿悉爛􅎤跌思泰率衆叛執單于都䕶張知運詔以朔方兵追擊至黒山呼延谷敗之㓂棄仗走取副都䕶還乘冰度青海王君㚟為河西隴右節度使判涼州都督事開元十四年吐蕃酋悉諾邏㓂大計㧞谷君㚟聞其怠率秦州都督張景順乘冰度青海襲破之以功遷大将軍斷山峻塹張獻甫貞元四年代韓㳺瓌領邠寕節度使邠寕軍素驕憚獻甫嚴因㳺瓌去遂縱掠邀范希朝為帥都将楊朝晟誅首亂者獻甫乃得入於是斷山峻塹選巖要地築峰堡請復鹽州及洪門洛原鎮屯兵詔可佩四將印王忠嗣為河西隴右節度使權朔方河東節度佩四将印勁兵重地控制萬里近世未有也収黄河九曲哥舒翰兼河西節度使攻破吐蕃洪濟大莫門等城収黄河九曲以其地置洮陽郡築神策宛秀二軍賞罰分明封常清北庭都䕶持節伊西節度使常清性勤儉耐勞苦出軍乘騾私廐裁二馬賞罰分明罷軍中雜徭李光弼子彚遷涇原節度使罷軍中雜徭出俸錢贖将士質賣子遝其家軍中畏肅張伯儀為江陵節度使樸厚不知書然推誠遇人軍中畏肅民亦便之解臨洺之圍李抱真領昭義節度使田恱反圍邢及臨洺詔抱真與河東馬燧合神策兵救之敗悦扵雙崗斬其将楊朝光又破之臨洺遂解臨洺之圍銳功名崔圓遷御史中丞劔南節度副大使圓鋭功名初聞難刺國忠意乃治城浚隍列舘宇儲什俱具帝次河池圓䟽具陳蜀土腴糓羡儲供易辦帝省書泣下曰世亂識忠臣即日拜中書侍郎同中書門下平章事仍兼劒南節度使天子至朝廷百司殿宇帷幔皆具益嗟賞之鼉集城門鄧景山拜青齊節度使徙淮南為政簡肅有鼉集城門鄧班謂景山曰鼉介物也失所次金不從革之象其有兵乎未幾宋州節度使劉展反輯綏撫安李承改山南東道節度使時希烈猶據襄州帝慮不授命欲以禁兵衛送承承辭請以單騎入既至希烈舎承外館廹脅日萬端承晏然誓以死守希烈不能屈遂大掠去襄漢蕩然承輯綏撫安之居一年闔境完復商賈饒盈徐申進嶺南節度使前使死吏盗印署府職百餘員畏事泄謀作亂申覺殺之詿誤一不問逺俗以攻刼相矜申禁切無復犯外蕃歲以珠瑇瑁香文犀浮海至申扵常貢外未嘗賸索商賈饒盈劉闢反表請發卒五千循馬援故道繇爨蠻扺蜀𢷬闢不備詔可罷武臣私厨郄士美充昭義節度使昭義自李抱貞以來皆武臣私厨月費米六千石羊千首酒數十斛潞人困甚士美至悉去之出廩錢市物自給又盧從史時日具三百人饍以餉牙兵士美曰卒衘於牙固職也安得廣責為私㤙亦罷之威震兩河討王承宗也遣大将王獻督萬人為前鋒獻恣横逗撓士美即斬以徇下令曰敢後者斬親鼔之大破賊下三營環柏鄉時諸鎮兵合十餘萬繞賊多玩賊犯法獨士美兵鋭最先有功憲宗喜曰固知士美能辦吾事承宗大震懼亡幾㑹詔班師然威震兩河隱然復完鎮辛祕拜昭義軍節度使是時承討常趙之後路人彫耗祕至則約出入嗇用度比四年儲錢七十萬緡糧七十萬斛器械堅良隱然復為完鎮舉動安重來瑱徙山南東道節度使賊圍南陽急瑱能撫訓士卒舉動安重賊不敢侵居三歲奏蠲逋租數百萬李吉甫為淮西節度使居三歳奏蠲逋租數百萬築冨人固本二塘溉田且萬頃漕渠庳下不能居水乃築堤淤以防不足洩有餘名曰平津堰江淮旱浙東西尤甚有司不為請吉甫白以時救恤帝驚馳道使分遣賑貸貲餉不仰有司李鄘拜淮南節度使王師討蔡方急李師道謀撓沮之鄘以兵二萬分壁鄆境貲餉不仰有司是時兵興天子憂財乏使程异馳驛江淮諷諸道輸貲助軍鄘素富強即籍府庫留一嵗儲餘盡納於朝由是悉索以獻繇鄘唱之南夏以完魯炅俄拜襄鄧十州節度使以㑹二京平賊走河北時襄漢數百里鄉聚蕩然舉無樵煙初賊欲剽亂江湖頼炅適扼其衝故南夏以完勤身節用曲環喜兵法改陳許節度二州北爲㓂衝民苦剽鹵客他縣環勤身節用寛賦歛簡條教不三嵗歸者襁係訓農治兵榖食豐衍灋令嚴無敢犯者令狐彰拜滑亳魏博節度使始滑當㓂衝城邑墟榛彰躬訓吏下檢軍力農灋令嚴無敢犯者田疇大闢庫委豐餘嵗時貢賦如期南詔不敢犯邊劉潼拜昭義節度使徙西門時李福討南詔兵不利潼至鎮以恩信蠻皆如約六姓蠻持兩為南詔間候有卑籠部落者請討之潼因出兵襲撃俘五千人南詔大懼自是不敢犯邊受命不召兵董晉為宣武節度副大使知節度事萬營死鄧惟恭揔其軍晉受命不召兵惟幕府騶傔從之即日上道至鄭逆者不至人勸止以觀便宜晉不聼直造汴及郊惟㳟始出迎謁既入即委以軍政無所改更衆服晉有躰莫測其謀始惟㳟謀代萬榮故不遣吏以疑晉令不敢入及晉至情得則怏怏不能平汴士之驕怙亂嘗介勇士伏幕下早暮畨休晉一罷之惟㳟乃結大将相里重晏等謀亂晉覺之殺其黨械送惟㳟京師嚴備而推誠信袁滋徙義成節度使滑用武地東有緇青北魏博滋嚴備而推誠信務在懷來李師道田季安畏服之居七年百姓立祠祀祭本傳開府極一時選武元衡憲宗時為劒南西川節度使帝御安福門慰遣之元衡至綏静約束儉已寛民比三年上下完實蠻夷懐歸雅性莊重雖淡扵接物而開府極一時選議軍政不及私段秀實拜四鎮北庭行軍涇原鄭頴節度使數年吐畨不敢犯塞又按格今官使二科取其一非公㑹不舉樂飲酒室無妓媵無贏財賔佐至議軍政不及私旬日踐父兄兩鎮李愬帝方經畧隴右故徙愬節度鳳翔詔愬代愿帥武寧軍旬日踐父兄兩鎮世以為榮愬與賊戰金鄉破之凡十一遇禽其隊帥五十俘馘萬計淄青平進同平章事擇名臣節度太原李聽穆宗初立幽鎮反擇名臣節度太原者代裴度使統兵北討始聼為羽林時有駿馬帝在東宫使左右諷取之聼自以身宿衛不敢獻於是帝曰李聽往在軍中不與朕馬是必可任乃授河東節度使境内肅然李愿領夏綏銀宥節度使部有失馬者愿署牒扵道以金求之三日失馬并良馬一繫署下且曰逸而至不告罪當死謹以良馬贖悉歸失馬而縱其良境内肅然斬㓂右支韋臯張延賞為劒南西川節度使初雲南蠻羈附吐蕃其盗塞必以蠻為鄊道臯計得雲南則斬㓂右支乃間使招徠之稍稍通西南夷秉正自將吕元膺改河中節度使時方鎮多姑息獨元膺秉正自將監軍及中人徃來者無不嚴憚閭里相約不敢犯孔戣拜嶺南節度使既至免屬州逋負十八萬緡米八萬斛黄金税嵗八百兩先是屬刺史俸率三萬又不時給皆取部中自衣食戣乃倍其俸約不得為貪暴稍以法繩之南方掠人為奴婢戣峻為之禁吏得嬰兒於道收肓之戣論以死由是閭里相約不敢犯交廣晏然鄭從讜改嶺南節度先是林邑蠻内侵召天下兵進援會龎勛亂不復遣而北兵寡弱從讜募士豪職其酋右署為約束使相捍禦交廣晏然有大臣體杜悰武宗詔揚州監軍取倡家女十七人進禁中請悰同選又欲閲良家有姿相者悰曰吾不奉詔而輙與罪也監軍怒表扵帝帝以悰有大臣體乃詔罷所進妓䟽析㕓閈以息火災杜佑嶺南節度䟽析廛閈以息火災宋崖黎民三世保險不濵佑討平之仁惠商侑拜義昌節度於時痍荒之餘體骨蔽野墟里生荆棘侑單身之官麄淡與下共勞苦以仁恵為治嵗中流户襁屬而還遂為營田丐耕牛三萬詔度支賜帛四萬疋佐其市初州兵三萬仰廪度支侑始至一嵗自以賦入贍其半二嵗則周用乃奏罷度支所賜户口滋饒廥儲盈腐上下便安請立石紀政民不勞軍食足杜中立出為義武節度使舊徭車三千乘歳輓鹽海濵民苦之中立置飛雪将數百人具舟以載自是民不勞軍食足矣大中十二年大水泛保兖青鄆而滄地積卑中立自按行引御水入之毛河東江海州無水災人皆恱頼杜亞拜淮南節度使至則治漕渠引湖陂築防庸入之渠中以通大舟夾堤髙卭田因得灌溉䟽唘道衢徹壅通堙人皆恱頼本宿將子且寛厚髙固邠軍劫固為帥固曰然能聼吾言乃可衆唯唯固徇曰毋殺人毋肆掠三軍皆順悦帝亦念固功乃拜邠寕節度使固本宿將子且寛厚人皆安之然久在散位數為儕類輕笑乃受命衆多懼固一釋不問四鎮節度朱忠亮四鎮節度使隱覈軍籍得竄名者三千人嵗収乾沒十餘萬緡吏白耄卒不任戰者可罷荅曰古扵老馬不棄况戰士乎聞者莫不感奮師屯大逵市井不移髙崇文劉闢反拜崇文東川節度使趣成都闢走追禽之送京師崇文入成都也師屯大逵市井不移珍貨如山無秋毫之犯邢能已歸而貳斬於軍衣冠脅汗者詣牙請命崇文為條上全活之本傳非我去卿韋澳授河陽節度使入辭帝曰卿自便而逺我非我去卿盡知㓂情僞李徳裕徙節劔南西川蜀自南詔入㓂敗杜元頴而郭釗代之病不能事民失職無聊生徳裕至則完殘奮怯皆有條次乃建籌邉樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餫逺近曲折咸具乃召習邉事者與之指畫商訂凡冦之情偽盡知之蜀風大變李徳裕蜀人多鬻女為人妾徳裕為之科約凡十三以上執三年勞下者五嵗及期則歸之父母毀浮屠私廬數千以地與農蜀先主祠旁有柔村其民剔髮若浮屠者畜妻子自如徳裕下令禁止蜀風大變於是二邉寖懼專以清静治盧鈞擢嶺南節度使時稱潔亷專以清静治華蠻數千走闕下請為鈞立生祠餘見亷門軍中樂劉瑑進宣武節度使先時大饗雜進倡舞瑑曰豈軍中樂邪取壯士千人被鎧擁矛盾習擊刺與吏士臨觀又下令不呵止夜行使民自便羗人皆順向畢諴出為邠寧節度使諴到軍遣吏懐諭羗人皆順向時戍兵常苦調饟乏諴募士置屯田歳収榖三十萬斛以省度支經費詔書褒美撫循有威惠崔彦昭繇河陽節度使徙河東先是沙陀諸部多犯法彦昭撫循有威惠三年境内大治境中盗不敢發鄭畋為鳳翔隴右節度使募鋭兵五百號病雷将境中盗不敢發發輙得以恩信撫諸夷落李承約拜黔南節度使承約以恩信撫諸夷落勸民農桑興起學校居數年當代黔南人詣京師乞留為許留一年去苛弊二十餘事王周歴貝州涇州節度使涇州張彦澤為政苛虐民多流亡周乃更為寛恕問民疾苦去其苛弊二十餘事民皆復歸歴四鎮皆有善政政有惠愛夏魯竒遷河陽節度使為政有恵愛徙鎮忠武河陽之人遮留不得行父老詣京師乞留明宗遣中使往諭之魯竒始得去擁節緫戎率身和衆劉禹錫令狐先廟碑杖鉞作藩李紳自髙宗永徽以後都督𢃄使持節者始謂之節度使然猶未以名官景雲二年以㧞延嗣為涼州都督河西節度使自此而後接乎開元朔方隴右河東河西諸鎮皆置節度使及范陽節度使安禄山反犯京師天子之兵弱不能抗遂䧟兩京肅宗起靈武而諸鎮之兵共起誅賊其後禄山子慶緒及史思明父子繼起中國大亂肅宗命李光弼等討之號九節度之師久之大盗既滅而武夫戰卒以功起行陣列為侯王者皆除節度使唐史兵志郭子儀收長安見陣勝門李晟收長安秋毫無所擾見攻守門李愬入蔡州黎明駐元濟宅見謀畧門王式討仇甫麾幟東靡見發軍門天下無債帥髙瑀事見債負門誅舞文吏桞公綽山南節度治垣舍亟使新之李聽邠寧節度邠署相傳不利治垣舍亟使新之得無名書唐史王鍔在淮南時得無名書内靴中異日以所告窮驗烏集升平第㦸架桞仲郢咸通五年為天下節度使初仲郢為諫議大夫後毎遷必烏集升平第庭樹㦸架皆滿五日乃散由是不復集卒於鎮安撫大使七孔許以便宜唐儉為并州道安撫大使許以便宜盡簿懷恩貲産賜儉馳入其部契苾何力鐡勒九姓叛詔何力為安撫大使何力以輕騎五百人馳入其部虜大驚何力喻曰朝家知而詿誤遂及飜動使我貰南邊得自新罪及凶渠取之則已九姓大喜共擒偽葉䕶及特勒等二百人以歸何力數其罪誅之餘衆遂安士服其威愛程務挺為單于道安撫大使禦突厥務挺善綏禦士服其威愛突厥憚之不敢盗邊方鎮八孔紅斾將軍白居易詩紅斾將軍昨日歸注藩鎮例驅紅斾奉上益謹田洪正充魏博節度使又遣司封郎中知制誥裴度宣慰賚其軍錢百五十萬緡六州民給復一年赦見囚存問髙年惸獨廢疾不能自存者度眀辯具陳朝廷厚意洪正不覺自失乃深相結納奉上益謹復請度徧行其部宣示天子㤙詔㤙令節度僉謀布衣崔權奉表陳謝眷勞殊等田洪正同中書門下平章事是嵗來朝對麟徳殿眷勞殊等引見僚任將校二百餘人皆有班賜進兼侍中同上爲朕長城田洪正數上表固請留闕下帝勞曰昨韓洪以疾辭不就軍朕既從之矣今卿復爾我不應違但魏人樂卿之政四隣畏卿之威為朕長城父子同日受命田布洪正徙成徳以布為河陽節度使父子同日受命時韓洪與子公武亦皆領節度天下以忠義多田氏天下以忠義多田氏布所至必省冗将募戰卒寛賦勤穡人皆安之元從功臣李惟簡父范陽内屬僚也兄惟岳叛惟簡以家僮票士百餘奉母鄭奔京師帝拘于客省及出奉天惟簡將赴難謀扵鄭鄭曰爾父立功河朔位宰相身未嘗至京師兄死於人手爾入朝未識天子不能効忠吾不子汝矣督其行曰而能死王事吾不朽矣乃斬闗出道更七職得及行在帝見厚撫之拜太子諭徳討賊有功帝徙山南惟簡以三十騎從夜失道馳至盩厔西聞中人語問天子所在宻語曰上在此帝見之流涕執其手曰爾有母乃能從朕邪對曰臣誓以死比明北方有塵起帝憂懼惟簡登髙曰渾瑊以騎來瑊至遂决趨興元惟簡前導及帝還封武安郡王號元從功臣圖形凌煙閣帝嘉其忠程懷直願析東光景城二縣置景州且請刺史河朔刺史不廷授幾三十年帝嘉其忠以徐申為景州刺史擢懐直為留後九年來朝寵遇加等上米鹽佐用度張允伸龎勛反上書欲遣弟允臯領兵討賊不許上米五十萬斛佐用度詔嘉美賜玉帯寳器紈錦進兼侍中其行道也得以阜俗其行法也得以刑人賞人杜牧盧籍等制環千里之疆綰三軍之衆諸侯之任重矣大者敦化風俗小者惠養整衆環千里之疆綰三軍之衆杜收豹尾神旗韓文鉅封劇鎮杜牧追咎長慶以來朝廷措置亡術復失山東鉅封劇鎮所以繋天下輕重不得承襲輕授方鎮相望於内地大者連州十餘小者猶兼三四故兵驕則逐帥帥彊則叛上或父死子握其兵而不肯代或取舎由於士卒徃徃自擇將吏號為留後以邀命於朝天子顧力不能制則忍耻含垢因而撫之謂之姑息之政盖姑息起於兵驕兵驕由於方鎮姑息愈甚而兵将愈俱驕由是號令自出以相侵撃兵志治中司馬九孔武徳元年改賛治曰治中髙宗即位曰司馬下州亦置焉顯慶二年置洛州司馬武后大足元年東都北都雍荆楊益州置左右司馬神龍二年省太極元年雍洛四大都督府増司馬一人亦分左右百官志徃贊坐棠之理鄭公逵司馬制白居易人得就耕崔知温靈州司馬境有渾斛蕯萬帳數擾齊民農皆釋耒習騎射以捍賊知温表徙河北皆不樂遷契苾何力為言乃止知温固請䟽十五報卒徙河北自是人得就耕斛蕯至徙地顧善水草亦忘遷後入朝過州謝曰初徙且怨公今地膏腴衆孳夥更荷公㤙皆再拜本傳方直劉齊賢出為晉州司馬帝以其方直尊憚之時將軍史興宗從獵苑中言晉州出佳鷂可捕取帝曰齊賢豈捕鷂人邪卿安得以此待之宰相材張柬之為荆州大都督府長史長安中武后謂狄仁傑曰安得一竒士用之仁傑曰荆州長史張柬之雖老宰相材也用之必盡節於國即召為洛州司馬有善政韋安石遷并州司馬有善政后手制勞問州司馬折威風杜景佺見録事叅軍門既失志能順適所遇白居易貶江州司馬既失志能順適所遇託浮屠生死說若忘形骸者久之掌弼戎政居則習蒐狞有役則申戰守之法器械糧備軍籍賜予皆專焉百官志觀察使十白連帥亷察諸侯紏䋲列郡明闡使威勤宣王命澄清郡邑鎮撫黎元觀風察俗提綱振領求人瘼分國憂宣埋輪之威布露冕之政藩維寄重江海要衝持節使分郡節當聖治之朝委亷察之寄孔觀察處置使掌察所部善惡舉大綱凡奏請皆屬於州百官志景雲二年置十道採訪使道各一人開元二年曰十道按察採訪處置使至四年罷八年復置十道按察使秋冬廵視州縣十年又罷十七年復置十道京都兩畿按察使二十年曰採訪處置使分十五道天寳末又兼黜陟使乾元元年改曰觀察處置使同上觀察以豐稔為上考省刑為中考辦税爲下考同上降王國良宗室臯拜湖南觀察使前帥辛京杲貪暴虐使部將王國良戍武岡頼其富即劾以死國良恐據縣反歛荆黔洪桂兵討之再嵗不能下臯至遺書曰觀將軍非敢大逆者特逃䜛抗死爾將軍遇我可以降我固為京杲誣者幸蒙雪何忍以兵加將軍哉國良得書喜且畏因請降然尚首䑕臯即日單騎稱使者造國良壘賊延使者入臯大呼其軍曰有識曹王者乎乃我也來受良降良今安在一軍愕貽不敢動國良迎拜叩頭請罪執臯手約為兄弟則盡焚攻守器具散其兵風績不立唐扶為福州觀察使濫殺人風績不立會卒奴婢争財有司按其貲至十餘萬宣國詔條狄兼謨江西觀察使呉士矩加給其軍擅用上供錢數十萬兼謨劾奏觀察使為陛下守土宣國詔條知臨戎賞士州有定數而與奪由己貽弊一方為衆道觖望請付有司治罪士矩由是貶蔡州别駕長撫民短治軍崔彦曽為徐州觀察使曉律令然辨急為政剛猛徐軍素驕而彦曾長於撫民短於治軍士多怨之豪右畏戢韓佽累遷桂觀察使部二十餘州自叅軍至縣令毋慮三百貟吏部所補纔十一餘皆觀察使商才補職佽下車悉來謁一吏持籍請補缺貟佽下教曰居官治吾不奪其不奉法無望縱舎缺者湏按籍取可任任之會春服使至鄉有豪猾厚進賄使者求為縣令使者請佽佽許之既去召鄉豪責以撓法笞其背以令部中自是豪右畏戢於吏治明吏不敢罔沈傳師出江西觀察使徙宣州傳師於吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論决嘗擇邸吏尹倫遲魯不及事官屬屢白易之傳師曰始吾出長安戒倫曰可闕事不可多事倫如是足矣邀擊淮西逃兵李泌拜陜虢觀察使始鑿山開車道至三門以便饟漕淮西兵防秋屯隣州已而四千人亡歸或曰呉少誠宻招之既入境泌邀阻悉擊殺無閉糴以重困民崔陵遷湖南觀察使湖南舊法雖豐年貿易不出境隣部災荒不恤也陵至謂屬吏曰此豈人情乎無閉糴以重困民削其禁自是商賈流行貲物益饒設鄉校使作為文章常衮為福建觀察使閩人未知學衮至設鄉校使作為文章親加勸導與為主客均禮觀㳺宴饗與焉由是俗一變嵗貢士與内州等獻銀瓶齊映為桂管江西觀察使始映罷不以罪冀復進乃掊歛獻貢以中帝欲初諸蕃大瓶止五尺李兼為江西始獻六尺至映乃八尺繕陴隍益治兵張建封為觀察使是時四方尚多故乃繕陴隍益治兵四鄙附悦希烈使票帥捍卒來戰建封皆沮衂之清而忠能惠養民王緯與李泌俱為路嗣㳟江西觀察判官泌執政奏於己有私恩徳宗許為泌報故進緯給事中浙西觀察使缺泌擬緯帝曰是朕為君報徳者乎黄門要地獨不留議事邪對曰浙西賦入而尤劇緯清而忠能惠養民故請遣之制可美譽四騰呉湊為福建觀察使政勤清美譽四騰與宰相竇參有憾參數加短毁又言湊風痺不良趨走帝召還驗其疾非是繇是不直參夜登城吕元膺為御史中丞拜鄂岳觀察使嘗夜登城守者不許左右曰中丞也對曰夜不可元膺乃還明日擢守者為大將入拜尚書左丞蠲横租錢衛次公為陜虢觀察使蠲横租錢嵗三百萬吏稱為神崔咸遷陜虢觀察使日與賔客僚屬痛飲未嘗醒夜分輙决事裁剖精明無一毫差吏稱為神處身儉勤敬晦歴浙西觀察使時南方連饉有詔弛𣙜酒茗官用告乏晦處身儉勤貲力遂充賦物充牣李徳裕為浙西觀察使初潤州承王國清亂竇易直傾府庫賚軍貲用空殫而下益驕徳裕自儉約以留州財贍軍雖儉而均故士無怨每朞則賦物充牣天子詔襃揚南方信禨巫雖父母厲疾子棄不敢養徳裕擇長老可語者諭以孝慈大倫患難相収不可棄之義使歸相曉敕違約者顯寘以法數年惡俗大變又按屬州非經祠者毁千餘所撤私邑山房千四百舎冦無所廋蔽天子詔襃揚禁止剽刼周墀徙江西觀察使劾齊部刺史剪補據賊出兵戍彭蠡湖禁止剽刼厲兵睦鄰李勉徙江西觀察使厲兵睦鄰平賊屯軍禮迎謁桞公綽見戎服門易三鎮聲樂不聞於家薛苹治第過制范𫝊正見僣門按俗守封是其所善白居易行薛伾制俾宣風於亷察同上勞徠諸部綱紀列城奉詔條以安人叅戎索以訓旅鏡湖秦望之遊元稹為浙東觀察使會稽山水竒秀稹所辟幕職皆當時文士而鏡湖秦望之遊月三四焉舊史言絛綾李徳裕事見綾門丹扆六箴李徳裕見箴門賜鞭張建封為徐州觀察使事見節操門防禦使十一孔防禦使以無虞為上考清苦為中考政成為下考百官志市馬益軍唐承訓宣宗擢為天徳軍防禦使軍中馬乏虜來戰數負承訓罷冗費市馬益軍軍乃奮張聲雄北疆李景畧窮塞苦寒地塉鹵邊户勞悴景畧至節用約已與士同甘苦鑿咸應永清二渠溉田數百頃儲廩器械畢具威令肅然聲雄北疆囘紇畏之團練使十二孔團練使以安民為上考懲姦為中考得情為下考百官志官號重複楊綰時諸州悉𢃄團練使綰奏刺史自有持節諸軍事以掌軍旅司馬古司武所以輔軍即今副使司兵叅軍今團練判官官號重複可罷天下團練守捉使詔可請罷唐史李少良傳大厯八年晉州男子郇謨以麻緫髮行哭長安東市人問之曰我有字三十欲以獻上其言團者請罷諸州團練使度支十三白均天下賦稅制海内財用典兹邦本繋在生民必俟良臣以委重務制國用計軍儲晉文帝立度支尚書以計軍儲周之國用制之於冢宰漢之軍食領之於丞相既重於任亦難其人惟彼度支掌斯國用茍有成敗屬於安危納於天府訃在地官得之則征賦克均失之則財用不足平均貢賦充羡帑藏元凱之計杜元凱為度支尚書奏轉運之計也茂先之功張華茂先為度支尚書决河渠地延萬里均節財用周禮太宰以九式均節財用式謂財之節度要會訃等移用謂轉之財用也周禮爲要會之司掌出入之賦冢宰制國用必扵嵗之抄量入以為出制國用如仐度攴經用嵗成禮記司會以嵗之成質扵天子注要計也質平也平其計要扵天子受百官之成亦質扵天子然後成嵗事事計經費經常孔運江南租米給京師韓滉加度支諸道轉運鹽鐡等使右丞元琇判度支也以闗輔旱請運江南租米給京師帝委滉専督之而琇畏其剛愎難其事請自江至楊子滉主之自楊子以北自主之由是衘琇視年豐耗發歛韓洄劉晏被罪天下錢榖歸尚書省而省司廢久無綱紀莫緫其任乃擢為户部侍郎判度攴洄上言江淮七監請皆罷又言天下銅鐡冶乃山澤之利當歸王者請悉𨽻鹽鐡從之復罷省胥吏冗食二千人積米長安萬年二縣各數十萬石視年豐耗發歛焉故人不艱食國無横歛元琇以尚書左丞判度支國無横歛而軍旅濟嵗得江淮米五十萬斛班宏竇參又以江淮兩税置廵院官令宏張滂共差擇滂欲得薄最宏不與滂奏有詔分掌宏見宰相辭曰宏主漕嵗得江淮米五十萬斛前年至七十萬今職移於人敢請罪滂在側儳曰公所言非也朝廷不奪公職乃公喪官緡縱姦吏自取咎爾凡為度支使不一嵗家輙鉅億僮馬産第侈王公非盗縣官財何以然上既知之故令滂分掌今公無乃歸怨上乎宏不答扵是移病歸第宰相白其状許如劉晏韓滉故事以東都河南淮南江南山南東道兩税滂主之闗内河東劒南山南西道宏主之課入歲倍盧洪正拜工部侍郎以户部領度支初兩池鹽法弊得費不相償洪正使判官司空輿檢鈎釐正條上新法即表輿兩池使自是課入嵗倍用度頼之職務簡脩杜佑始度支嗇用度多署吏權攝百司繁而不綱佑以營繕還將作木炭歸司農練染還少府職務簡脩由聚歛句剥為宰相皇甫鏄同平章事猶領度支鏄以吏道進既由聚歛句剥為宰相至雖市道皆嗤之假領度支裴延齡㑹班宏卒假領度支延齡素不善財計乃廣鈎距取宿奸老吏與謀以固帝幸因建言左蔵嵗入不貲見庫藏門精於吏職李巽為度支鹽鐡使掌使一年征課所入類晏之多嵗明年過之又一年加一百八十萬巽精於吏職雖在私家亦置案牘簿書勾檢如公署焉人吏有過絲毫無所貸舉吏程异者勾檢簿籍又精扵巽故課最加衍亦异之助舊史鹽鐡使十四白當軍戎之時宜充國用委㩁筦之務必仗時賢雖仁無禁利而道有從權用之不窮實惟贍國取之以道豈曰奪人漢灋鹽鐡始自扵漢𢎞羊之計牢籠地財侵削人吏然則政先圖大事貴舉中執漢法而行務雖茍得奪齊民之利敝將若何公無禁利左傳佐賦濟時煑海之利鹽鐡論昭帝詔賢良文學對策願罷鹽鐡酒𣙜均輸官桑𢎞羊云制四夷安邊足用之本往反相詰因集之為鹽鐡論孔僅領之漢武時冶鑄煑鹽財或累至萬金而不佐公家之急乃以東郭咸陽孔僅為大司農承領鹽鐡事咸陽人名牢盆孔僅咸陽上言願募自給費因官器作鹽鐡宫與牢盆注取其牢盆之價直不得私鑄鹽器矯制令鑄博士徐偃行風俗矯制使膠東魯國鼔鑄張湯知劾之罷而復置武帝至平帝不變鹽鐡之法武帝嘗罷鹽鐡官三年而復置之鹽賣魏衛顗與荀彧書曰鹽鐡國之大寳宜依舊置使者鹽賣幹鹽鐡而㩁酤漢書取蠻夷鹽鐡張嶷為越嶲太守定笮臺登平卑水三縣舊出鹽鐡去郡三百餘里夷之邉徼自固張嶷盡取得用孔宰相時急財用則為鹽鐡轉運用百官志餉四節度糧崔縱為汴西水陸運兩税鹽鐡等使王師圍田恱乏食詔縱餉四節度糧軍無乏食問㩁酤利裴諝拜河東租庸鹽鐡使時闗輔旱諝入計帝召至便殿問𣙜酤利嵗出納㡬何諝久不對復問曰臣自河東來渉三百里而農人怨歎榖菽未種誠謂陛下軫念元元而乃責臣以利故未敢即對帝曰微公言朕不聞此京師鹽暴貴詔取三萬斛以贍關中自揚州四旬至都人以為神劉晏第五琦始擢鹽鐡使乃𣙜鹽晏代之法益宻利無遺入初嵗収緡錢六十萬末乃什之計嵗入千二百斛而㩁居太半民不告勤京師鹽暴貴詔取三萬斛以贍闗中自揚州四旬至都人以為神至湖嶠荒嶮處所出貨皆賤弱不償所轉晏悉儲淮楚間貿銅易薪嵗鑄緡錢十餘萬其措置纎悉如此權萬貨重輕同上置驛相望四方貨殖低昻及他利害雖甚逺不數日即知是能權萬貨重輕使天下無甚貴賤而物常平自言如見錢流地上鹽鐡名使自第五琦始第五琦肅宗駐彭原賀蘭進明遣琦奏事既謁見即陳今之急在兵兵強弱在賦賦所出以江淮為淵若假臣一戰請悉東南寳貲飛餉函洛惟陛下命帝恱拜監察御史勾當江淮租庸使遷司金郎中兼侍御史諸道鹽鐡鑄錢使鹽鐡名使自第五琦始當軍興隨事趨辦人不益賦而用以饒遷户部侍郎縱錢以起萬貨李若初代王緯為浙西觀察諸道鹽鐡使時天下錢少貨輕州縣禁錢不出境商賈不通若初始奏縱錢以起萬貨而若初持綱檢下吏民畏服合度支鹽鐡為一使王涯自李師道平三道十二州皆有銅鐡官歳不治賦供百萬觀察使擅有之不入公上涯始建白如建中元年九月戊辰詔書収𨽻天子鹽鐡詔可久之以亦官同中書門下平章事合度攴鹽鐡為一使兼領之乃奏罷京畿𣙜酒錢以恱衆轉運十五白轉輸正稅漕運貢賦漕引土貢充羡天府東自江淮西至渭洛書審逺近之害人不告勞課遲速之程事無愆素國用軍儲徴爾貢於任土興我役扵泛舟節省勤王力宣贍國漢通糧道委於丞相漢髙帝曰鎮國家不絶糧道吾不如蕭何之功府無虚月國有餘資晉開較運任在尚書杜元凱事見上注况當庶富之朝宜崇漕運之任當豐穰之時所宜畜積漕船事見漢書節逺邇之期率一鍾致一釡漢書言運糧費一鍾之用致一釡之至也領漕輓之務必在公勤漕轉山東史記漢時漕轉山東粟以給中都官嵗不過十萬石驢輦永平中治石臼河從郁盧至羊腸倉欲令通漕吏民苦役死者無數使鄧訓平叔往監之訓知難成奏罷之用驢輦歲有億萬全活徒數千人木牛流馬諸葛亮作木牛流馬運糧特行數十里羣行二十里孔置河隂集津三門倉裴耀卿同中書門下平章事充轉運使於是置河隂集津三門倉引天下租繇盟津泝河而西三年積七百萬石省運貟三十萬緡或曰以此緡納扵上足以明功荅曰是謂以國財求寵其可乎勅吏為和市費鑿潭通漕韋堅為水陸運使初滻水衘苑左有望春樓堅扵下鑿為潭以通漕二年而成帝為升樓詔羣臣臨觀漕運利害各有四劉晏領東都河南江淮轉運使時大兵後㪷米千錢禁膳不兼時甸農援穗以輸晏乃自按行浮淮泗逹扵汴入扵河右循底柱硤石觀三門遺迹至河隂鞏洛見宇文愷梁公堰厮河為通濟渠視李傑新堤盡得其利病乃移書扵宰相元載以為大抵運之利與害各有四見漕運門増百八十萬緡李巽杜佑表為鹽鐡轉運副使俄代佑使任自劉晏後職廢不振賦入朘耗巽涖職一年較所入如晏最多之年明年又過之又明年増百八十萬緡朝廷仰其湏崔造又以戸部侍郎元琇判諸道鹽鐡𣙜酒事吉中孚度支諸道兩稅事而浙江東西嵗入米七十五萬石方嵗飢更以兩税凖米百萬濠壽洪潭二十萬責韓滉杜亞漕送東渭橋諸道有鹽鐡處仍置廵院嵗盡宰相計殿最以聞時滉方領轉運有寵扵帝朝廷仰其湏滉持不可改帝重違之復以滉為江淮轉運使餘如詣請是秋江淮米大集帝美滉功以滉専領度支諸道鹽鐡轉運等使造懼檄取資糧穆寜佐鹽鐡轉運住埇橋李光弼屯徐州餉不至檄取資糧寧不與李光弼怒召寧欲殺之餘見軍資糧門劫掠為衰當是時河漕不通自漢沔徑商山以入京師淮西節度使李忠臣不奉法設戍邏以征商賈又縱兵剽行人道路幾絶與寧夹淮為治憚寜威劫掠為衰漕賈得通鈎校姧贓末減賦取公財不耗疲人樂生杜牧裴諗制漕輓之職綰牢籠漕輓之職同上一粒不運劉晏與元載書一水不通思荷鍤而先徃一粒不運願負米而先趨焦心苦形期報明主京兆尹十六白京尹尹兹京邑鎮撫畿甸肅清京師統千里之封畿領萬户之版籍表則四方監臨三輔銀章青綬漢書景帝分置左右内史武帝更名京兆尹服銀章青綬佩水蒼玉也桴鼔稀鳴張敞為京兆尹桴鼔稀鳴市無盗賊鉤距趙廣漢為京兆尹善為鈎距捕治盗賊如神人皆稱伏趙張三王京師稱曰前有趙張後有三王謂趙廣漢張敞王遵王章王駿執版漢書典職曰京兆秩中二千石見尚書令僕射執版揖之閉閤漢韓延夀為左馮翊嵗餘不出行縣丞掾請之至髙陵有昆弟訟延夀傷之曰骨肉争訟是吾教不行也乃入傳舎閉閤自思過扵是訟者遞相責讓皆肉袒願以田相移至死不争延夀㤙信周二十四縣無訟者吏不忍欺平反漢雋不疑為京兆尹每録囚徒其母問以平反則美而食若無所出則母怒而不食故不疑為吏嚴而不殘朝許政能任先廣漢時推明察選在不疑况屬休眀之朝宜尊表則之位當堯舜之朝繼張趙之位五日京兆張敞被劾使吏絮舜有所案問絮舜以敞被劾當不乆在職遂慢其事曰五日京兆尹耳何足畏言祗應五日為京兆尹耳敞聞殺舜書簡示曰五日京兆尹如何竟免罪浩穰張敞傳曰浩穰扵三輔尤劇劇注浩大穰盛言人衆多也京兆翼翼四方是則詩取則之地謂京邑也救罪趙廣漢坐罪吏人守關訴號泣曰臣生無益縣官願代趙京兆死使牧養小人竟坐腰斬搏擊擢方進為京兆尹搏擊豪彊京兆畏之孔武徳元年雍州置牧一人以親王為之然常以别駕領州事永徽中改尹曰長史百官志開元元年改京兆府長史復為尹通判府務牧缺則行其事同上分渭水入金光門韓朝宗天寳初召為京兆尹分渭水入金光門匯為潭以通西市材木脂韋張仲方為京兆時軍人横恣仲方脂韋坐不稱職出為華州刺史入侍宴樂出主京邑張曄進京兆尹入侍宴樂出主京邑時人以為寵然自以幹治稱獨無所獻李峴選京兆尹𤣥宗幸温陽甸内巧供億以媚上峴獨無所獻帝異之出為零陵太守時京師米翔貴百姓乃相與謡曰欲粟賤追李峴不待魚朝恩李勉為京兆尹兼御史大夫魚朝恩領國子監威寵震赫前尹黎幹謟事之湏其入敕吏治數百人具以餉至是吏請勉不從曰吾候太學彼當見享軍容幸過府即脩具朝㤙衘之亦不復至太學募官攝府縣崔光逺𤣥宗西狩詔留光凌為京兆尹乘輿已出都人亂火左藏大盈庫争輦財珍至乘驢入宫殿者光逺募官攝府縣誰何官闕斬十數人乃定四為京兆魏少㳺四為京兆雖無赫赫名然善任人縁飾規檢有足稱者承大化桞渾帝嘗親擇吏宰畿邑而政有状召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職爾陛下當擇臣軰以輔聖徳臣當選京兆尹承大化尹當求令長親細事代尹擇令非陛下所宜帝然之頗以治稱黎幹遷京兆尹頗以治稱京師苦樵薪乏幹度開漕渠興南山谷口尾入扵苑以便運載幹宻具􅔓舡作偈優水嬉冀以媚帝久之渠不就號稱職尹嚴郢大厯末進拜京兆尹嚴明持法令疾惡撫窮敢誅殺賊盗一衰減𨽻宫匠丁數百人號稱職尹前尹赫赫具瞻允若後尹熈熈具瞻允斯李叔明遷京兆尹長安歌曰前尹赫赫具瞻允若後尹熙熙具瞻允斯不為灼灼名顧少連改京兆尹政尚寛簡不為灼灼名先是京畿租賦薄厚不能一少連以法均之自内署擢尹京邑韋澳帝舅鄭光主墅吏豪肆積年不輸官賦澳繫之他日延英帝問其故澳具道奸狀且言必寘以法帝曰可貸否荅曰陛下自内署擢臣尹京邑安可使畫一法獨行於貧下乎帝入白太后曰是不可犯后為輸租乃免不徹扇蓋王播再遷京兆尹自李諒後政條隳斁奸豪浸不戢播脩舉政有名負望崔洪遷京兆尹㑹大旱奏柝滻入禁中者取十九溉民田仇士良使盗擊宰相李石於親仁里迹出禁軍珙坐不能捕以為負望少衰輦轂之下先彈壓桞仲郢出河南尹以寛惠為政或言不類尹京兆曰輦轂之下先彈壓郡邑之治本恵養烏可類乎頭上尹劉栖楚改京兆尹峻誅罰不避權豪先是諸惡少竄名北軍凌藉衣冠有罪則逃軍中無敢捕栖楚一切窮治不閲旬宿奸老蠧為歛迹一日軍士乗醉有所凌突諸少年從旁譟曰癡男子不記頭上尹邪政號嚴明桞仲郢為京兆尹北司吏入粟違約仲郢殺而尸之自是人無敢犯政號嚴明上下愛向呉湊為人彊力劬儉瞿瞿未嘗擾民上下愛向京師苦宫市彊佔取物而有司附媚中官率阿從無敢爭湊見便殿因言中人所市不便宵民徒紛紛流議宫中所湏責臣可辦若不欲外吏與聞禁中事宜料中官髙年謹信者為宫布令平賈和售以息衆讙職司輦轂許孟容遷京兆尹神䇿軍自興元後日驕恣府縣不能制軍吏李昱貸富人錢八百萬三嵗不肯歸孟容遣吏捕詰與之期使償曰不如期且死一軍盡驚訴扵朝憲宗詔以昱付軍治之再遣使皆不聽奏曰不奉詔臣當誅然臣職司輦轂當為陛下抑豪彊錢未盡輸昱不可得帝嘉其守正許之京師豪右大震請中書門下五品以上親不得任京兆魏少㳺復為京兆尹始請中書門下省五品尚書省四品諸司正貟三品諸王駙馬朞以上親及壻若甥不得任京兆官詔可河南尹十七白以尹王都楊雄河南尹箴曰爰作卿士以尹王都也尹兹洛邑四方表則晉庾純字謀甫為河南尹為四方之表則萬國承流崔駟為河南尹曰萬國承流東郊書曰保釐東郊取則之地謂帝邑也成周東都京邑翼翼四方是則詩遷殷頑民書成周既成都輦重職山濤啓曰河南尹京輦重職前代皆用名人聖代已來有李允杜預王恂不疑復今减此者也京師肅清袁安為河南尹為政公平未嘗以贓罪鞫人朝廷京師肅清居曰嚴明朝廷深重之計日受俸羊陟為河南尹計日受俸絶豪友屬託書使優賢養人華崧為河南尹優賢養人抑彊扶弱魏志司馬芝為河南尹抑彊扶弱私情不行居官十二年自魏及今為河南尹者莫及天下四會傳子曰河南帝都統領京畿兼右職右卿遂多豪門商賈胡貌天下四會奸之所生前尹司馬芝舉其綱而太簡次尹劉静綜其因而太宻後尹李勝毁常法取一時之聲也郡中多恠晉樂廣為河南尹前時郡中多恠無敢在㕔中者惟廣處之漢推能政選在袁安晉擇公才任先孔坦字君平偶唐虞之代尹河洛之都當文明之代居表則之官孔開元元年改河南府長史復為尹通判府務牧缺則行其事百官志河洛千里都畿在焉俾之乂安屬在尹正崔陵河南尹制白居易洛有前賈後張敵京兆三王張仁愿神龍中檢校洛州長史㑹糓貴多盗仁愿一切捕殺胔積府門畿甸震懾無敢犯先是賈敦頥嘗為長史有政績時人為之語曰洛有前賈後張敵京兆三王征乘牛之出入市者宗室巨兼河南尹征乘牛之出入市者斥所得而佐用度然稍自盗没都闕完雄張延賞大厯初除河南尹河洛當兵衝邑里墟榛延賞政簡約輕徭賦䟽河渠築宫廟數年流庸歸附都闕完雄有詔褒美絶胥吏之私崔縱為河南尹時兵雖定民彫耗縱治簡易蠲略細苛先是戍邊者道由洛儲餼取扵民縱始令官辦使五家相保自占發歛以絶胥吏之私又引伊洛溉髙仰通利里閈人甚宜之政嚴清姦人不容息李朝隱擢河南尹政嚴清姦人不容息太子舅趙常奴怙勢横閭里朝隱曰此不繩不可為政執而榜辱之帝賜書慰勉不屈附權貴裴寛徙河南尹不屈附權貴河南大治五世爲河南裴諝進河南尹東都副留守凡五世為河南諝視事未嘗敢當正處以寛厚和易為治不鞠人以贓其政不苛細李適之徙河南尹其政不苛細為下所便𤣥宗患糓洛嵗暴耗徭力詔適之以禁錢作三大防曰上陽積翠月陂自是水不能患刻石著功都鄙安之房式改河南尹會討王承宗鎮州索餉軍具四千乘民不能具式建言嵗凶人勞不任調發御史元稹亦言賊未禽而河南民先困詔可都鄙安之清淨惠下鄭珣瑜為河南尹未入境會徳宗生日尹當獻馬吏欲前取印白珣瑜視事且納贄珣瑜徐曰未到官而遽事獻禮歟不聼性嚴重未嘗以私託人而人不敢謁以私至河南清凈惠下賤歛貴發以便民不為萬人産沴鄭珣瑜韓全義将兵伐蔡河南主饋運珣瑜宻儲之陽翟以給官軍百姓不知僦運勞凡迎送敕使皆有常處吏宻識其馬進退不數歩差也全義與監軍别檄有所取輙掛壁不酬至軍罷凡數百封有諫者曰軍湏期會為急公可不報荅曰武士統戎多恃以取求茍以為罪尹宜坐之終不為萬人産沴也榜殺姚文夀部曲馮宿拜河南尹洛苑使姚文夀縱部曲奪民田匿扵軍吏不敢捕府大集部曲輙與文夀偕來宿掩取榜殺之惡少望風遁去李紳為河南尹河南多惡少或危㡌散衣擊大毬尸官道車馬不敢前紳治剛嚴皆望風遁去不務苛細李適之為河南尹適之性簡率不務苛細人吏便之舊史少尹十八孔少尹二人從四品下掌貳府州之事嵗終則更次入計百官志亞尹故事内史缺未補間亞尹得行大京兆事長平叔制白居易尹總牧務少尹副焉郭行餘擢累京兆少尹嘗值尹劉栖楚不肯避栖楚捕導從繫之自言宰相裴度頗為諭止行餘移書曰京兆府漢時有尹有都尉有丞皆詔自除後循而不改開元時諸王為牧故尹為長史司馬即都尉丞耳今尹總牧務少尹副焉未聞道路間有下車望塵避者故事猶在栖楚不能荅裁押其謬李憕出為河南少尹尹蕭炅内倚權骫法殖私憕裁押其謬吏下頼之䟽決三輔唐舊史李元紘為京兆少尹有詔䟽决三輔權要之家皆縁渠立磑以害水田元紘一切毁之人獲其利幕府十九白參畫幕掌軍謀膺使檄載筆旌旄運籌帷幄受命辟書秪事戌府任在軍要權制兵機任為從事禮以上賔交辟荀進從軍則望重仲宣王粲也參謀幕府制勝樽俎盛府求賢戎書辟士魯連飛書燕將得而自殺青油幕蓮幕花幕佐幕則才髙阮瑀字元瑜戯談陶侃為督諸參佐戯談廢事侃責之曰君子當攝其威儀何有亂頭養望自謂宏逹耶陳琳草檄魏祖讀以愈風朝廷重寄委之以侯伯軍府庶務制之以賔客賔佐賔僚賔榮主禮入幕之賔郗超在桓温帷下謀謝安在外望見郗生可謂入幕之賔也難進易退三揖而進一辭而退不可則止無自辱焉孔趙璟審官議六藩府官屬曰諸使辟署務得才以重府望能否已試則引而置之朝無俾乆滯列傳䕶解王緯與李泌俱為路嗣㳟江西觀察判官泌見惡扵元載嗣恭希意欲殺之緯䕶解僅免諸將慙懼盧坦為鄭滑節度使判官監軍薛盈珍數干政坦毎據理拒之有善笛者大將等悅之詣帥請為重職坦笑曰大将乆在軍積勞亟遷乃及右職奈何自薄欲與吹笛少年同列耶將慙懼遽出就坦謝平朱泚露布于公異李晟表為招討府掌書記朱泚平露布于徳宗曰臣既肅清宫禁祗奉寢園鍾􅙇不移廟貌如故帝覽泣下曰誰為之辭或以公異對帝咨歎一再佐於賔席諸侯辟之以佐於賔席杜牧李承慶制各宜良士以佐賢侯髙湜制上太原奏令狐楚李説嚴綬鄭儋繼領太原髙其行引在幕府由掌書記至判官徳宗喜文每省太原奏必能辨楚所為數稱之尤相引重桞公綽武元衡節度劒南與裴度俱為判官尤相引重軍府之要掌在賔寮白居易路貫制以師禮禮之劉蕡對後七年有甘露之難令狐楚牛僧孺節度山南東西道皆表蕡幕府以師禮禮之與均禮崔咸元和初擢進士第又中宏辭鄭餘慶李夷簡皆表簡幕府與均禮三佐杜悰畢諴辟忠武杜悰幕府悰領度支表為廵官又從辟淮南入拜侍御史持刀負棺賈直言後署李師道府屬及師道不軌持刀負棺入諫曰願前死不見城之破又畫縳載檻車狀而妻子繫纍者以獻師道怒囚之劉悟既入釋其禁辟署義成府後徙潞亦隨府遷穆宗召為諫議主留務徐彦若為清海軍節度使卒扵鎮而行軍司馬劉隱因主留務方時多難彦若最見信扵帝有以事自陳者帝曰汝當問彦若其所倚任如此料精兵赴難李栖筠遷安西封常清節度府判官常清被召攝行軍司馬肅宗駐靈武發安西兵栖筠料精兵七千赴難擢殿中侍御史神安思敏李巨川河中王重榮辟為掌書記重榮討黄巢書檄奏請紛沓湏報趣發皆屬巨川神安思敏言趣中理鄰藩皆驚檄筆無與讓幕謀惟其膺韓愈送侯叅謀詩異席咨事浙江觀察使其所擇從事望幕府盛選材彦觀察判官許鴻謙有學識栖筠嘗異席事多咨之獨禮敬崔衍遷宣歙池觀察使其所擇從事多得名流時有士者待賔僚率輕傲衍獨加禮敬幕中之士後多顯逹白孔六帖卷七十六
