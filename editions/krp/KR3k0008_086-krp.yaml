body:
  text: 白孔六帖卷八十六唐白居易原本宋孔傳續撰文教一文行二文辭三述作四詩五賦六頌七論八銘九誄十文教一白文王以文治經緯天地曰文觀乎人文以化成天下潤色鴻業大漢之文章炳然與三代同風煥乎其有文章文足昭也子曰周監於二代郁郁乎文哉吾從周天將以夫子爲木鐸木鐸所以振文教文王既没文不在兹乎天之將䘮斯文也後死者不得與於斯文也張而不弛文武不能也弛而不張文武不爲也以弓喻也虞舜誕敷文德舞干羽于兩階七旬有苗格書文王伐崇三旬不降退修文德因壘而降武王克商乃偃武修文毎嵗孟春遒人木鐸徇于路振文教也化民成俗吾將以爲文教馴致發揮夫子之文章可得而聞也文勝質則史文明以止人文也孔文治煟然勃興儒學列傳序太宗既即位四方秀艾挾策負素坌集京師文治煟然勃興任治文者任治如天時有春杜牧原十六衞太宗身櫜鞬風灑露沐然鋭情經術唐儒學序舉天下一之於仁義莫若儒儒得其人乃能光明厥功同上先論文誥前代伐叛皆須先論文誥儻未柔伏則當臨以兵威賛皇公一品集崇教本以厚民風許州牧杜公釋奠于宣父之室有鄉先生前致辭曰自盜起幽陵許為兵衝連戰交扞率無寧嵗爾來生徒教養起居祖習一出於軍容今幸天子為擇賢侯此人人思治之時也崇教本以厚民風乃卜新宫莘莘濟濟化行風驅家慕恭儉戸知敬譲父誨其子兄規其弟不遊學堂與撻市同由是縻勇爵戴鶡冠者往往弭雄姿而觀習禮矜甲胄者知根於忠信服縵胡者不敢侮縫掖教化之移人也如置郵焉劉禹錫先聖廟碑喻蒙篇馮伉授醴泉令縣民多猾為著喻蒙十四篇大略指明忠孝仁義勸學務農毎鄉給一卷俾其傳習舊史夫子之門以文學爲下科何哉盖天之付與於君子小人無常分惟能者得之故號一藝自中智已還恃以取敗者有之朋姦飾僞者有之怨望訕國者有之若君子則不然文藝序周人之養國老始闢西膠漢氏之召諸生初開太學辟雍所以行其禮泮宫所以班其政其文德有如此者楊炯少姨廟碑採摭軒昊牢籠虞夏闢孔子之學堂敷一代之風雅以王者之文教也李庾西都賦文行二白子以四教文行忠信孔子曰敏而好學不恥下問是以謂之文也君子博學於文文質彬彬然後君子汝爲君子儒澡身浴德門傳素風身服儒行修身慎行飾躬君子懿文德美秀而文子太叔文而有禮晉公子重耳孔朝廷許其勝流張九齡傳雖以直道黜不戚戚嬰望惟文史自娛朝廷許其勝流文行知名五代史趙光逢在唐以文行知名故時人謂玉界尺聲華行實光映儒林韓薦張籍文行先生元魯山謚李華凡學者所以學爲忠與孝也諸生有久不省親親者乎明日謁城還養者二十輩有三年年不歸侍者斥之簡孝秀德行者升堂上陽城傳以文雅稱唐甄濟以詞華著名姚元崇耽玩墳史以詞華著名君子自能以功業行實光明于時亦不一於立言而垂不腐文藝序世稱白傅文行比造化之功陶榖白公影堂記有文行之美柳文其次有文行之美積能累勞不由乎舉甲乙厯科第登乎表著之列顯其名焉士之求售於有司或以文進或以行達者稱之不患無成足下之文左馮翊崔公先唱之矣秉筆之徒由是増敬足下之行汝南周潁客又先唱之矣縫掖之列亦以加慕夫如是致隆隆之譽不乆矣又何戚焉柳文出羣之材有沈杞張苰尉遲汾李紳張後餘李翊或文或行皆出羣之材也韓文文行知名五代張文蔚初以文行知名文辭三白文囿辭林君子避文士之筆端小子狂簡斐然成章鄒衍雕龍之文童子雕蟲篆刻而壯夫不爲揚子揚雄鳯藻甘泉賦成夢吐白鳯掞天凌雲司馬相如擲地振玉孫興公賦成其友人曰試擲地必作金聲羅含吞鳥夢吞五色鳥後有文章麗藻摛藻游夏之文文學子游子夏仲尼曰言以足志文以足言言之無文行之不遠握靈虵之珠抱荆山之玉其辭文其言曲而中出言有章文辭以行禮子朝干景王之命文辭何爲辭之輯矣何以文爲遲速漢枚臯爲文疾受詔立成相如為文遲故所作少也閣筆魏王粲才髙鍾繇王朗等閣筆不敢措手五藏桓譚子曰揚子雲甘泉賦成夢吐五藏出在地宿構王粲舉筆成文時人以為宿構兩都賦理勝其辭三都賦文過其意陸逵三都賦序云患才多陸機文才秀逸張華謂曰人為文患才少子為文患才多焚筆硯陸雲與兄機書曰有君苗見兄文欲焚筆硯孔博學善文章吳通𤣥與弟通微皆博學善文章勁迅有體要李栖筠為文章勁迅有體要燕許大手筆蘇頲自景龍後與張説以文章顯稱望略等故時號燕許大手筆帝愛其文曰卿所為詔令别録副本書臣某撰朕當留中後遂為故事爲文華婉崔融為文華婉當時未有輩者朝廷大筆多毎勅委之援筆成文李白援筆成文即府置文學館濮恭王泰改王魏帝以泰好士善屬文詔即府置文學館得自引學士屬辭雄蔚宗室漢少事韓愈通古學屬辭雄蔚溫李温庭筠少敏悟工為辭章與李商隠皆有名號温李文章婉縟虞世南文章婉縟慕僕射徐陵陵自以類己由是有名于休烈善文章詞章峭麗龐嚴詞章峭麗裴矩有文藻蕭瑀善屬文治世華采令狐德棻賛曰德棻之辭章治世華采夜直論文章杜正倫工屬文嘗與中書舎人董思恭夜直論文章思恭歸謂人曰與杜公評文今日覺吾文頓進今復得子白居易工文章未冠謁顧况况吳人恃才少所推可見其文自失曰吾謂斯文遂絶今復得子矣精切居易於文章精切居易贊曰杜救謂纎艶不逞非莊士雅人所為流傳人間子父女母父口教授淫言媟語入人肌骨不可去盖救所失不得不云有所屬綴人多傳諷李嶠富才思有所屬綴人多傳諷雄深雅健柳宗元韓愈評其文曰雄深雅健似司馬子長崔蔡不足多也穿天心出月脇皇甫湜顧况集序逸歌長句駿發蹈厲往往若穿天心出月脇意外驚人語索所爲文章上寳劒篇郭震武后既與言竒之索所為文章上寶劒篇后覽嘉歎李嶠為鳯閣舎人文冊大號令多主為之身老而才之壯齒宿而意之新李百藥帝嘗與皆賦帝京篇歎其工手詔曰卿何身老而才之壯齒宿而意之新乎方晉二陸虞世基辭章清勁過世南而贍博不及也俱名重當時故議者方晉二陸搜章擿句段秀實舉明經其友易之秀實曰搜章擿句不足以立功乃棄去長於應用常衮文采贍蔚長於應用詆誚蕪猥張鷟屬文下筆輙成浮艶少理致其論著率詆誚蕪猥然盛行一時晚進莫不傳記新羅日本出金購文又張鷟新羅日本使至必出金寳購其文藻翰豪邁趙㳙屬思精壯張説為文屬思精壯長於碑誌世所不逮韓愈至于論述陛下功德與詩書相表裏作為歌詩薦之郊廟紀太山之封鏤白玉之牒鋪張對天之宏休揚厲無前之偉績編于詩書之策而無愧措于天地之間而無虧深探本元卓然樹立成一家言韓愈每言文章自漢司馬相如太史公劉向揚雄後作者不世出故愈深探本元卓然樹立成一家言以文害事髙錯文宗曰諸鎮表奏太浮華宜責掌書記以誡流宕李石曰古人因事為文今人以文害事懲弊抑未誠如聖訓屬辭贍敏不爲竒澁封敖屬辭贍敏不爲竒澁語切而理勝聯珠集竇羣兄常平弟庠鞏皆爲郎工詞章爲聯珠集行於時義取昆弟若五星然敏速若注射然陸扆進中書舎人扆工属辭敏速若注射然一時書命同僚自以爲不及昭宗優遇之以文章自髙鄭仁表以文章自髙稱其文則皆汗漫輝煌呼噏隂陽轇轕三光陶鎔帝皇柳宗元荅問清文動哀玉杜甫酬薛文詩短篇隻字杜甫封西嶽賦序白頭之後竒以短篇隻字遂曽聞徹宸極一動人主士大夫掉鞅於文囿柳宗元序秉翰執簡敗北而歸不可言乎文柳宗元文落筆生綺繡李白詩雄之遣言措意頗短局滯澁不若退之猖狂恣睢肆意有所作柳宗元答韋珩書世南五絶虞世南帝毎稱其五絶四曰文詞後出詞人之冠張九齡張説爲宰相親重之與通譜系嘗曰後出詞人之冠也獻復明堂九鼎李泌天寳中詣闕獻復明堂九鼎議作者伏其簡拔柳渾母兄識知名士也工文章與蕭頴士元德秀劉迅相上下而識練理創端往往詣極雖趣尚非博然當時作者伏其簡拔渾亦善属文但沈思不逮於識文藻雄蔚楊炎文藻雄蔚藻翰精富吕温藻翰精富一時流輩推尚倣離騷數十篇柳宗元爲文章卓偉精緻一時流輩推尚既竄斥地又荒癘其堙厄感鬱一寓諸文倣離騷數十篇讀者咸悲惻不立藁張廵爲文章不立藁鳯閣舎人様徐堅属文典厚楊再思毎目爲鳯閣舎人様孫孔孔紹安與孫萬壽皆以文辭稱時爲孫孔屈宋衙官杜審言嘗語人曰吾文章當得屈宋作衙官評文王勃傳它日崔融與張説評勃等文曰勃文章宏放非常人所及炯照隣可以企之説曰不然盈川文如懸河酌之不竭優於盧而不減王恥居後信然愧在前謙也胡楚賔属文敏甚必酒中然後下筆屬文竒詭閻朝隠性滑稽屬文竒詭爲武后所賞北京三傑尹元凱爲右補闕時义有富嘉謨吳少微皆知名嘉謨累轉晉陽尉少微亦尉晉陽尤相友善有魏谷倚者爲太原主簿並負文辭時稱北京三傑天下文章尚徐庾浮俚不正獨嘉謨少微本經術雅厚雄邁人爭慕之號吳富體元氣李義山平淮西碑公之斯文如元氣先時已入人肝脾平生千萬篇金薤垂琳琅仙官勅六丁雷電下取將韓愈酬張籍朝夕歌謡使成文章柳宗元與蕭俛書朝夕歌謡使成文章庶木鐸者采取獻之法官増聖唐大雅之什文陣雄師開元遺事張九齡覽蘇頲文卷曰蘇生俊贍無敵當爲文陣之雄師筆參於造化李白與韓荆州書劉憲遷太子詹事𤣥宗在東宮雅意墳史憲啓曰殿下位副君有絶人之才非以尋擿章句要通大意而已中使臨問索所爲文章李邕始邕早有名既入朝中使臨問索所爲文章且進上公卿愛之交譽陸據神㝢警邁善物理年三十始到京師公卿愛其文交譽之著弔古戰塲文李華文辭綿麗少宏傑氣蕭頴士徤爽自肆時謂不及穎士而華自疑過之因著弔古戰塲文極思研確已成汙爲故書雜置梵書之間它日與頴士讀之稱工華問今誰可及穎士曰君加精思便能至矣華愕然而服抉精剔華孫樵書立言必竒摭意必深抉精剔華期到聖人指擿疵短顔師古字籀薛道衡爲襄州總管與之推舊佳其才每作文章令指擿疵短其文浮靡張昌齡舉進士與王公治齊名爲考功貟外郎王師旦所絀太宗問其故荅曰昌齡等華而少實其文浮靡非令器也取之則後生勸慕亂陛下風雅帝然之平龜兹露布爲崑山道記室平龜兹露布爲時所稱上滕王閣序王勃道出鍾陵九月九日都督大宴滕王閣宿命其壻作序以夸客因出紙筆徧請客莫敢當至勃汎然不辭都督怒起更衣遣吏伺其文輒報語益竒乃矍然曰天才也請遂成文極歡罷五王出閤冊兄勮長壽中爲鳯閣舎人壽春等五王出閤有司具儀志載冊文羣臣已在乃悟其闕宰相失色勮召五吏執筆分占其辭粲然皆畢人人嗟服奏樂屬文李翰爲文精密而思遲常從令皇甫曾求音樂思涸則奏之神逸乃属文李觀属文不旁㳂前人時謂與韓愈相上下及觀少天而愈後文益工議者以觀文未極愈老不休故卒擅名陸希聲以為觀尚辭故辭勝理愈尚質故理勝辭雖愈窮老不能加觀之辭觀後愈死亦不能逮愈之質云用思精緻崔元翰用思精緻馳騁班固蔡邕間肅清宫禁祗奉寢園鍾簴不移廟貌如故于公異李晟表為招討府掌書記朱泚平露布於德宗曰臣既肅清宫禁祗奉寢園鍾簴不移廟貌如故帝覽泣下曰誰爲之辭或以公異對帝咨嗟一再文章李益李益時又有太子庶子李益同在朝故世言文章李益以辨云回復明辯歐陽詹其文章切深回復明辯絶去翰墨畦逕李賀辭尚竒詭所得皆驚邁絶去翰墨畦逕當時人無能效者號三十六體李商隠初爲文瑰邁竒古及在令狐楚府楚本工草奏因授其學商隠儷偶長短而繁縟過之時温庭筠段成式俱用是相夸號三十六體張説論文開元中張説與徐堅論近世文章曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨如孤峰絶岸壁立萬仞濃雲鬱興震雷俱發誠可畏也若施於廊廟駭矣閻朝隠如麗服靚粧燕歌趙舞觀者忘疲若類之風雅則罪人矣韓休之文如太羮𤣥酒有典則薄滋味許景先如豐肌膩理雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊杯玉斚雖爛然可珍而多玷缺堅謂篤論云以多爲富五代和凝爲文章以多爲富有集百餘卷嘗自鏤板以行于世識者多非之筆端膚寸膏潤天下嗚呼咫尺之管文敏者執而運之所如皆合在藩聳萬夫之觀望立朝賁羣類之頰舌居内成大政之風霆導畎澮於章奏鼓洪瀾於訓誥筆端膚寸膏潤天下文章之用極其致也劉禹錫集如非煙祥風縁飾萬物同上令狐集紀起文章而陟大位丹青景化焜燿藩方如非煙祥風縁飾萬物而與令名相終始者有唐文臣令狐公實當之如繁星麗天同上栁宗元集紀初貞元中上方嚮文章昭回之光下飾萬物天下文士爭執所長與時而奮粲然如繁星麗天而芒寒色正人望而敬者五行而已如搏翠屏浮層瀾同上董集記得董生之詞杳如搏翠屏浮層瀾視聴所遇非風塵間物亦猶明金翠羽得于遐裔雖欲勿寳可乎文章自娛戲金石日擊撞韓愈詩文章自娛戲金石日擊撞龍文百斛鼎筆力可獨扛正聲諧韶濩勁氣沮金石韓愈上于相公書文章言語與事相侔變化若雷霆浩汗若江漢正聲諧韶濩勁氣沮金石取青嫓白柳宗元讀毛頴傳世之模擬竄切取青嫓白肥皮厚肉柔筋脆骨而以爲之辭者其讀之也其大笑固宜詞源倒流三峽水筆陣獨掃千人軍杜甫醉歌行玉珮瓊琚大放厥辭韓祭栁文揺毫擲簡韓愈詩朝爲百賦猶鬱怒暮作千詩轉遒緊搖毫擲簡自不供頃刻青紅浮海蜃龍鸞炳文章李白詩裴生覽千古龍鸞炳文章文場元帥明皇謂張九齡真文場元帥也作者之表權德輿荅楊湖南書黄鍾大玉慶霄天籟竒采正聲鏗鏘照燭真可謂作者之表方駕古人抉摘芻蕪文辭元稹李白之文清雄犇放李白上裴長史書前此郡督馬公許爲竒才因謂長史李京之曰諸人之文猶山無烟霞春無草樹李白之文清雄犇放名章俊語絡繹間起髙摘屈宋艷濃薫班馬香杜牧寄小姪詩髙摘屈宋艷濃薰班馬香李杜泛浩浩韓栁摩蒼蒼蒙金以砂錮玉以璞文粹孫樵與賈秀才書物之精華天地所秘惜故蒙金以砂錮玉以璞珊瑚之叢必茂重溟夜光之珍以頷驪龍文章亦然時世之文多偶對文粹裴度寄李翶書常以時世之文多偶對儷句屬綴風雲羈束聲韻爲文之病甚矣故以雄詞逺致一以矯之則是以文字爲意也猶路鼗出于土鼓文粹獨孤及皇甫冉文集序縁情綺靡之功至是乃備雖去雅寖遠其麗有過於古者猶路鼗出于土鼓篆籀生于鳥跡文章之道不殊文粹張説上官昭容文集引漢稱班媛晉譽古嬪文章之道不殊學既慙于刻鵠文有愧于雕蟲一品集道眞容讚良史才沈既濟撰枕中記韓愈撰毛頴傳良史才也與諸人異當令後代作法制命勅書皆出自公手筆不停綴思無所讓帝嘗謂曰朕每見卿文章與諸人尤異當令後代作法韓休蘇頲集序文章當如千兵萬馬風恬雲霽寂無人聲文粹李德裕文章論詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞發李漢韓文序和平之音淡薄愁思之聲要妙韓文和平之音淡薄愁思之聲要妙懽愉之辭難工愁苦之言易好奴僕命騷杜牧李賀集序逺去筆墨畦逕使目未少加以理奴僕命騷可也光熖萬丈韓愈詩李杜文章在光熖萬丈長文者貫道之器韓文序請日試萬言倚馬可待李白與韓荆州文理貴中南部新書李德裕鎮浙西劉三復在幕一旦令草謝御書表謂之曰立成也三復曰文理貴中不貴其速公以爲然澁體朝野僉載唐徐彦伯爲文多變易求新以鳯閣爲鷗閣以龍門爲虬户以金谷爲銑溪以玉山爲瓊嶽以芻狗爲卉犬以竹馬爲篠驂以月兎爲魄兎以風牛爲飈犢後進效之謂之澁體也罷櫛綴文北夢𤨏言温庭筠理髮思來即罷櫛綴文文章風尚國史補元和之後文章則學竒於韓愈學澁於樊宗師歌行則學放於張籍詩則學淺於白居易學矯激於孟郊大抵天寳之風尚黨大厯之風尚浮貞元之風尚蕩元和之風尚恡王迹熄而詩亡離騷作而文辭之士興唐史藝文志王迹熄而詩亡離騷作而文辭之士興歴代盛衰文章與時髙下然其變態百出不可窮極何其多也精深閎博各盡其術同上六經之道簡嚴易直而天人備故其愈乆而益明其餘作者衆矣質之聖人或離或合然其精深閎博各盡其術而怪竒偉麗往往震發於其間此其所以使好竒博愛者不能忘也以六經之文爲諸儒倡唐史贊貞元元和間遂以為六經之文為諸儒倡障隄末流反刓以樸剗偽以真然愈之才自視司馬遷揚雄至班固以下不論也當其所得粹然一出於正同上刋落陳言横騖别驅汪洋大肆要之無牴牾聖人者其道盖自比孟軻以荀況楊雄為未醇寧不信然唐有天下三百年文章無慮三變唐史文藝序唐有天下三百年文章無慮三變髙祖太宗大難始夷㳂江左餘風絺句繪章揣合低昻故王楊爲之伯𤣥宗好經術羣臣稍厭彫琢索理致崇雅黜浮氣益雄渾則燕許擅其宗大厯眞元間美才輩出嚅嚌道真涵泳聖涯於是韓愈唱之柳宗元李翶皇甫湜等和之排逐百家法度森嚴若侍從酬奉則李嶠宋之問沈佺期王維制冊則常衮楊炎陸贄權德輿王仲舒李錫德裕言詩則杜甫李白元稹白居易劉禹譎怪則李賀杜牧李商隠上水船摭言朱梁時姚洎爲學士一日梁祖問及裴延裕曰頗知其人思敏洎曰向在翰林號下水船帝曰卿便是上水船洎甚慙揮翰綺繡揚篇什若有神杜甫贈汝陽王班詩聲華當健筆灑落富清製杜甫贈李祕書詩錦繡心樂史李白集序白之從弟令問常目白曰兄心肝五藏皆錦繡邪不然何開口成文今之言士者先文章文章者士之末也栁宗元與楊京兆書今之言士者先文章文章者士之末也然立言存乎其中即末而操其本可十七八未易忽也自古文士之多莫如今今之後生為文希屈馬者可得數人希王褒劉向之徒者又可得十人至陸機潘岳之比累累相望若皆為之不已則文章之大盛古未有也鏗鏘陶冶同上自貶官來無事讀百家書上下馳騁乃少得知文章利病去年吳武陵來美其齒少才氣壯健可以比興西漢之文章日與之言因爲之出十數篇書庶幾鏗鏘陶冶時時得見古人情狀彼古人亦人耳夫何逺哉爲文以神志爲主同上爲文以神志為主自遭責逐繼以大故荒亂耗竭又常積憂恐神志少矣引筆行墨栁文吾雖少為文不能自雕琢引筆行墨快意累累意盡便至亦何所師法文者以明道栁文少為文章以辭為工及長乃知文者以明道固不茍為炳炳烺烺矜采色夸聲音而以為能也發於羇旅韓愈荆潭詩序文章之作常發於羇旅草野争裂綺繡牙攀日月栁宗元荅友人求文章書且自孔氏以來兹道大闡家修人勵刓精竭慮者幾千年矣其間耗廢簡牘役用心神者其可數乎登文章之籙波及後代越不過數十人耳其餘誰不欲争裂綺繡牙攀日月髙視於萬物之中雄峙於百代之下乎率皆縱誕而不克躑躅而不進力䠞思窮吞志而没故曰得之為難具筆札拂縑緗栁宗元啓專當具筆札拂縑緗贊楊大功垂之不朽文章有六説李翺天下之語文章有六説焉其尚異者則曰文章辭句竒險而已其好理者則曰文章叙意茍通而已其溺於時者則曰文章必當對其病於是者則曰文章不對其愛難者則曰文章宜深不當易其變易者則曰文章宜通不當難也昔人有見小人之違道者恥與之同形貌共衣服遂思倒置眉目反易冠帶以異也不知其倒之反之非也雖失於小亦異於君子矣故文之異在氣格之髙下思致之淺深不在磔裂章句隳廢聲韻也人之異在風神之清濁心志之通塞不在于倒置眉目反易冠帶也裴度寄李翶為文以意爲主以氣爲輔以辭彩章句爲之兵衞未有主彊盛而輔不飄逸者兵衞不華赫而莊整者髙下圓折步驟隨主所指如鳥隨鳯魚隨龍師衆隨湯武騰天潛泉横裂天下無不如意杜牧書太公遇文王贊王勃之先文中子見勃弄筆曰爾為文乎曰然因與題太公遇文王贊曰姬昌好德吕望潛華城闕匪近風雲尚賖漁磯倚石釣浦横沙路幽山谷溪深㟁斜豹韜攘惡龍鈴辟邪雖逢切近猶待安車君王握手何其晚耶連昌宫詞唐荆南崔潭峻㱕朝出元稹連昌宫詞奏御穆宗大悦問稹安在曰今為南宫散郎即日轉祠部郎中知制誥樂天之長爲多大凡人之文各有所長樂天之長可以為多矣夫以諷諭之詩長於激閒適之詩長於遣感傷之詩長於切五字律詩百言而上長於贍三字七字百言而下長於情賦贊箴戒之類長於當碑記叙事制詔長於實啓奏表狀長於眞書檄詞策剖判長於盡揔而言之不亦多乎哉元稹序排終拉賈韓休蘇頲文集序豈特排終拉賈為王超陳而已韋處厚公未為近臣已前所著讃論記述銘誌皆文士之辭也以才麗為主自入為學士至宰相以往所執筆皆經綸制置財成潤色之辭也以識度為宗觀其發徳音福生人霈然如時雨褒元老諭功臣穆然如景風命相之冊和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辯似管夷吾劉禹錫序蹇亢以門望自負嘗矜其文謂過李百藥議者不許崔信明傳孟詩韓筆韓愈能古文孟郊長於五言時號孟詩韓筆獺祭魚談苑李商隠為文多檢閲書冊左右鱗次號獺祭魚沉浸醲郁含英咀華韓愈進學解沉浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣創意造言皆不相師唐文粹李翺書創意造言皆不相師故其讀春秋也如未嘗有詩其讀易也如未嘗有書其讀屈原莊周也如未嘗有六經故義深則意遠意遠則理辯理辯則氣厚氣厚則詞盛詞盛則文工撑霆裂月司空圖與王駕評詩書吾適又自編一鳴集且撑霆裂月劼作者之肝脾亦當吾言之無怍也崇巖峭壁雞跖集李賀文體如崇巖峭壁萬仞崛起時人多效之述作四白作述之謂聖明孔子述而不作吾黨小子狂簡斐然成章不知所以裁之論譔銘老論譔其先祖之德法言訓纂反騷揚雄好古樂道欲窮文章成名於後以經莫大於論語作法言史篇莫善於蒼頡作訓纂以箴莫善於虞箴賦莫大於離騷反而廣之辭莫反於相如作四賦用心於内不求於外者也採摭羣言晉著作郎周左右史之任也竊名向秀於莊子舊注外為解義妙析音致大暢𤣥風惟秋水至樂二篇未竟而卒秀子㓜其義零落有郭象者見秀義不傳於世遂竊以為己注其二篇定㸃文句而已秀本後出故今有向郭二注刪定楊終字子山為校書郎受詔刪定太史公書為十餘萬言為業班固字孟堅典校書篤志於儒以著述為業具詩門注小子何述詩五白詩者志之所之也在心爲志發言爲詩六義詩有六義五言李陵始作詩人之賦麗以則詩縁情而綺靡建安之風格禮曰志之所至詩亦至焉篇章之囿清辭麗則綺合四言韋孟始作六言谷永始作九言髙貴鄉公七言漢武柏梁三言夏矦湛孔元和體元稹尤長於詩與白居易名相埒天下傳諷號元和體往往播樂府穆宗在東京妃嬪近習皆誦之宫中呼元才子云蘭亭絶唱在越時辟竇鞏鞏天才工為詩與之酬和故鏡湖秦望之竒益傳時號蘭亭絶唱上譏切世敝鮑防於詩尤工有所感發以譏切世敝當時稱之得江山助張説謫岳州而詩益悽惋人謂得江山助歇後體鄭綮大順後王政微綮每以詩謡託諷中人有誦之天子前者昭宗意其有所藴未盡綮本善詩其語多俳諧故使落調世共號鄭五歇後體楊收十嵗善属文所賦輙就吳人號神童里人多造門觀詩至壓敗其藩收嘲之曰爾非羸角者奚用觸吾藩切當率類此神物護持劉禹錫素善詩晚節尤精與白居易酬復頗多居易以詩自名著甞推為詩豪又言其詩在處因有神物護持注想待元老裴度拜中書令上已宴曲江度不赴帝賜曰注想待元老識君恨不早我家柱石衰憂來學丘禱朕集中欲見公詩故云此異日可進使者及門而度薨帝聞震悼以詩置靈几思苦竒澁孟郊為詩有理致最為韓愈所稱然思苦竒澁李觀亦論其詩曰髙處在古無上平處下顧二謝長於樂府張籍為詩長於樂府多警句爲月蝕詩盧仝嘗為月蝕詩以譏切元和逆黨愈稱其工時又有賈島劉义皆韓門弟子苦唫雖逢值公卿貴人皆不之覺賈島初為浮屠名元本洛陽令禁僧午後不得出島為詩自傷愈憐之因教其為文遂去浮屠舉進士當其苦唫雖逢值公卿貴人皆不之覺也一日見京兆尹跨驢不避謼詰之久乃得釋氷柱雪車劉又能為歌詩嘗穿屣破衣聞愈接天下士步歸之作氷柱雪車二詩出盧仝孟郊右歌詩最善崔咸游終南山乗月吟嘯至感慨泣下詩文中歌詩最善送西江詩馮定詔開元霓裳羽衣曲參以雲韶肄于庭定部諸工立縣間端凝若植帝異之問學士李珏珏以定對帝喜曰豈非能古章句者邪親誦送西江詩召升殿賜禁中瑞錦聯句命題殿壁栁公權文宗嘗召與聯句帝曰人皆苦炎熱我愛夏日長公權属和曰薰風自南來殿閣生微凉他學士亦属繼帝獨諷公權者以為詞情皆切命題于殿壁論詩工否鄭覃進洪文館大學士帝坐延英論詩工否覃曰孔子所刪三百篇是已其非雅正者烏足為天子道哉夫風大小雅皆下刺上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝特能詩之章解而不知王術故卒歸於亂章什諓諓願陛下不取也號爲小杜杜牧於詩情致豪邁人號為小杜以别杜甫云應聲成文婉切而麗栁公權從幸未央宫帝駐輦曰朕有一喜邊戍賜衣久不時今中春而衣已就公權為數十言稱賀帝曰當賀我以詩宫人廹之公權應聲成文婉切而麗詔令再賦復無停思天子甚悦曰子建七步爾乃三焉自寫以賜宋璟為尚書右丞相而張説為左丞相源乾曜為太子少傅同日拜有詔太官設饌太常奏樂㑹百官尚書省東堂帝賦三傑詩自寫以賜哀吟泣下李密去之淮陽鬱鬱不得志哀吟泣下人有吿太守趙佗者佗捕之遁免氣質自髙髙適始為詩即工以氣質自髙每一篇已好事者輙傳布進詩七百言韋渠牟遷秘書郎進詩七百言未浹旬擢右補闕内供奉作𤣥都觀看花君子詩劉禹錫召還宰相欲任南省郎而禹錫作𤣥都觀看花君子詩語譏忿當路者不喜出為播州刺史五言長城秦系與劉長卿善以詩相贈荅權德輿曰長卿自以為五言長城用偏師攻之雖老益壯蔡允恭工為詩仕隋歴起居舎人帝有所賦必令諷誦遣教宮人允恭恥之數稱疾李詩謝賦謝偃時李百藥工詩而偃善賦時人稱李詩謝賦賦歡喜詩杜審言武后召審言將用之問曰卿喜否審言蹈舞后令賦歡喜詩嘆重其文傷時撓弱情不忘君杜甫為歌詩傷時撓弱情不忘君人憐其忠云詩史元稹謂詩人以來未有如子美者甫又善陳時事律切精深至千言不少衰世號詩史當時歆慕李適為學士凡天子燕㑹游豫唯宰相及學士得從帝有所感即賦詩學士皆属和當時人所歆慕繼雅頌體孫逖入為集賢院修撰時海内少事帝賜羣臣十日一燕宰相蕭嵩㑹百官賦天成𤣥澤維南有山楊之華三月英英有蘭和風嘉木等詩八篇繼雅頌體使逖序所以然緖密思清王昌齡工詩緒密而思清時謂王江寜云曲江詩太眞等爲上劉太真德宗九月詔羣臣宴曲江自為詩敕宰相擇文人賡和李泌等請羣臣皆和帝自第之以太真李紓等為上鮑防于邵等次之張滿等為下與擇者四十一人施之圖繪李益於詩尤所長貞元末名與宗人賀相埒毎一篇成樂工争以賂求取之被歌聲供奉天子至征人早行等篇天下皆施之圖繪悉索家笥詩得五百篇盧綸與吉中孚韓翃錢起司空曙苗發崔峒耿緯夏矦審李端皆能詩齊名號大厯十才子憲宗詔中書舎人張仲素訪集遺文文宗尤愛其詩遣中人悉索家笥詩得五百篇以聞集客賦詩李端趙州人始郭曖尚昇平公主曖嘗進官大集客端賦詩最工錢起曰素為之請賦起姓端立獻一章又工于前客乃服王賜帛百疋微辭譏訕薛逢收輔政逢有詩微辭譏訕收衘之復斥蓬緜二州刺史述古興亡虞世南後帝為詩述古興亡既而嘆曰鍾子期死伯牙不復鼓琴朕此詩將何所示邪田家詩五代馮道明宗問曰天下雖豐百姓齊否道曰榖貴餓農榖賤傷農因誦文士聶夷中田家詩其言近而易曉明宗顧左右録其詩常以自誦離合詩元萬頃從李勣征髙麗管書記勣命别將郭待封以舟師赴平壌馮師本載糧繼之不及期欲報勣而恐為詩所得萬頃為作離合詩遺勣勣怒曰軍機匆遽何用詩為欲斬待封帝問其詩孟浩然帝問其詩浩然再拜自誦所為至不才明主棄之句帝曰卿不求仕而朕未嘗弃卿奈何誣我因放還多爲憂苦流寓之思五行志天寳後詩人多為憂苦流寓之思及寄興于江湖僧寺詩妖五行志天寳中有述士李遐周於宜都觀院廡間為詩曰燕市人皆去函關馬不歸人逢山下鬼環上繫羅衣而人皆不悟近詩妖也賦六白賦者古詩之流也升髙能賦者頌其所見荀宋賈馬賦體物以瀏亮選不歌而誦謂之賦漢書紙貴三都賦成人未之重左思以示張華華深稱贊之兼作序豪貴競寫都下紙貴孔上清暑賦崔仁師為中書舎人帝幸翠微宫上清暑賦以諷海鷗賦崔湜𤣥宗在東宫數至其第申欵密湜隂附主時人危之為寒毛門下客獻海鷗賦以諷幽征賦崔液湜弟坐湜當流亡命郢州作幽征賦以見意南都賦滿州刺史徐彦伯上辭致典縟譏揣當世韋承慶嘗謂人所以擾濁浮躁本之於心乃著靈臺賦譏揣當世岑文本理寃父之象仕隋為邯鄲令坐為人訟不得申文本年十四詣司𨽻理寃哀暢無所詘衆屬目命作蓮華賦文成合臺嗟賞遂得直威鳯賦長孫無忌帝思所與共艱難賴無忌以免作威鳯賦以賜獻賦自況張九齡既戾帝㫖固内懼恐遂為林甫所危因帝賜白羽扇乃獻賦自況其末曰茍効用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩於篋中帝雖優容然卒以右丞相罷宜付太史許景先神龍初東都造服慈閣景先獻賦李逈秀見其文歎曰是宜付太史同上士林一時傳布楊茂孝嘗為華山賦示韓愈愈稱之士林一時傳布李德裕尤咨賞諷危元載城中開南北二第室宇奢廣當時為冠近郊作觀榭帳帟什器不徙而供膏腴别墅疆畛相望客有賦都盧尋橦篇諷其危載泣下而不知悟賜懷昔賦申恩意楊琮為上津令㑹天下亂去官與秦王同里居詔親王宰相一人入宴而琮獨預太宗賜懷昔賦申以恩意獻大明賦李德裕臣在先朝嘗獻大明賦以諷頗蒙嘉採誦賦泣下舒元輿先時裴度令狐楚鄭覃皆為當路所軋致閒處至是悉還髙秩元輿為牡丹賦一篇時稱其工死後帝觀牡丹凭殿欄誦賦遂泣下作思謹賦以刺時劉知幾時吏横酷淫及善人知幾悼士無良而甘於禍作思謹賦以刺時蘇味道李嶠見而歎曰陸機豪士之流乎著閒居賦楊瑒伯父志操頗剛簡未顯時著閒居賦自託常曰得田十頃僮婢十人下有兄弟布粟之資上可供先公伏臘足矣造語警拔李程擢進士宏辭賦日五色造語警拔士流推之後來之英徐浩張説稱其才見喜雨五色鴿賦咨嗟曰後來之英也蹇士賦元德秀善文辭作以自況爲月賦袁朗在陳為秘書郎後主聞其才詔為月賦一篇洒然無留思後主曰謝莊不得獨美於前矣奏賦三篇帝竒之杜甫天寳十三載𤣥宗朝獻太清宫饗廟及郊甫奏賦三篇帝竒之述功德劉允濟武后明堂成奏賦述功德手詔褒答詔獻辭賦李邕起為陳州刺史帝封泰山還邕見帝汴州詔獻辭賦帝悦奏美人賦吕向帝嵗遣使采擇天下姝好内之後宫號花鳥使向因奏美人賦以諷賦土火爐孫逖年十五見雍州長史崔日用令賦土火爐援筆成篇理趣不凡日用駭歎遂與定交景福之上靈光之下李華初華作含元殿賦成以示蕭頴士頴士曰景福之上靈光之下謫九年劉禹錫久落魄欝欝不自聊其吐辭多諷託幽遠作問大鈞謫九年等賦數篇和帝賦陸扆帝嘗作賦詔學士皆和獨扆最先就帝覽之歎曰貞元時陸贄吳通𤣥兄弟善内庭文書後無繼者今朕得之猥稱賜敬德許敬宗身為國史竄改不平太宗賜長孫無忌威鳯賦敬宗猥稱賜敬德八吟撫言曰温庭筠敏於為文未嘗起草燈燭下籠袖憑几每賦一韻一吟而已故場中號為温八吟日出扶桑賦五代桑維翰初舉進士主司惡其姓以為桑䘮同音人有勸其不必舉進士可以從他求仕者維翰慨然乃著日出扶桑賦以見志殿前作賦聲摩空李賀西遊因獻長楊賦李白詩時李百藥工詩而偃善賦時人稱李詩謝賦唐史讀杜牧阿房賦吳武陵太和初禮部侍郎崔郾試進士東都公卿祖道長樂坡武陵最後至謂郾曰君方為天子求竒材敢獻所益因出袖中書搢笏為郾讀之乃杜牧所賦阿房宫辭既警拔而武陵音吐鴻暢運源賦扈載嘗次歴代有國廢興治亂之迹為運源賦又因竹作碧鮮賦世宗稱善詞人之賦文粹歴代相因莫能適中故詩人之賦麗以則詞人之賦麗以淫孫逖文公集序顔真卿賦以陳事李善注文選李程賦在李程以日有五色賦登第後試有舉人浩虚舟卷中行此賦至末韻云浸晚水以芒動俯寒山而秀發程乃笑曰李程賦且在瑞日何得言晚木秀發北夢𤨏言惟皇戒得賦謝偃大略言治忘亂安忘危逸忘勞得忘失四者人主莫不然夏桀以珠臺為麗而不悟南巢之禍殷辛以象箸為華而不知牧野之敗塵影賦偃為塵影賦帝美其文腹笥摭言吳子華為賦一夕夢成於腹笥錦繡堆謝庭浩以詞賦著名錦繡堆摭言崢嶸甚喬彛京兆府解試渥洼馬賦斯須而就其警句云四蹄曵練翻澣海之驚瀾一噴生風下胡山之亂葉便欲首送京兆尹曰彛崢嶸甚乃以副解薦之落筆中書堂杜甫歌曰憶獻三賦蓬萊宫自怪一日聲輝赫集賢學士如堵墻觀我落筆中書堂朝爲百賦猶鬱怒韓文激賞揺天筆承恩賜御衣李白詩漢帝長楊苑誇胡羽獵歸子雲叨侍從獻賦有光輝激賞揺天筆承恩賜御衣逢君奏明主他日共翻飛頌七白頌者美盛德形容頌者所以游揚德業褒讚成功吉甫有穆若之談詩曰吉甫作誦穆若清風季子有至矣之歎傳曰吳季札見歌頌曰至矣哉頌優游以彬蔚選頌而無謟孔洛出寳圖頌崔融洛出寳圖頌尤工奏籍田三元頌岑文本太宗既籍田又元日朝羣臣文本奏籍田三元頌二篇文致華贍封禪壇頌張説東封還詔説撰封禪壇頌刻之太山以誇成功立頌太學門楊㻛奏有司帖試明經不質大義乃取年頭月尾孤經絶句且令習春秋三家儀禮者纔十二恐諸家廢無日遂著令生徒為見立頌太學門獻頌元宗封太山劉晏八嵗獻頌行在李絳是時盛興安國佛祠倖臣吐突承璀請立石紀聖德焉營權華廣欲使絳為之頌將遺錢千萬絳上言芝草嘉蓮二頌袁朗陳後主復詔為芝草嘉蓮二頌嘆賞尤厚上釋奠頌孔頴達上釋奠頌獻嫡皇孫頌庾抱為元德太子學士㑹嫡皇孫生大宴坐中獻頌太子嗟賞獻頌闕下張昌齡貞觀末翠微宫成獻頌闕下奉金帛請其文李邕之文於碑頌是所長人奉金帛請其文前後所受鉅萬計辭類俳優邕載事無大小必贊頌至於廣京城為木偶耕人紫芝白兎之類皆為頌以獻其辭大抵類俳優頌以褒述功美李善文選注世咨其文蘇頲從封泰山詔頌朝覲壇世咨其文論八白論則析理精微論精微而朗暢選孔忠孝論許王素節母被譛死出素節為申州刺史乾封初詔素節病無入朝而實不病乃著忠孝論自明斤漢馬后太宗皇后長孫氏為論斥漢馬后不能撿抑外家使與政事乃戒其車馬之侈此謂開本源恤未事嘗誡守者徐彦伯著樞機論始武后時大獄興王公卿士以語言為酷吏所引死徙不可計徐彦伯乃著樞機論以為世戒八卦論蘇晉作八卦論吏部侍郎房潁叔秘書少監王紹宗嘆曰後來之王粲也毁茶論陸羽李季卿宣慰江南有薦羽者召之羽衣野服挈具而入季卿不為禮羽愧之更著毁茶論著石論數千言李昭德怗權果毅鄧注著石論數千言述其專恣鳯閣舍人逢𢎞敏以聞后由是惡之論以評議臧否以當為宗李善文選注著論窮天人千春秘麟閣李白贈參寥子王子析道論微言破秋毫李白干寳著論近乎王化根源文粹李華序銘九白銘則序事清潤選銘博約而温潤文賦禮曰君子之觀銘也既美其所稱又美其所為言美其人為此銘也孔銘朝覲碑崔融典東朝章疏武后幸嵩髙見融銘嘆美之及已封即命銘朝覲碑撰王承宗先銘蕭俛嘗詔俛撰王承宗先銘俛奏承宗比不臣迷而後復臣不忍稱道其先又辭成當有餉謝拒之則非朝廷撫納意受之臣誼不當取帝善而止賜宸扆台衡二銘馬燧斬李懷光降衆猶萬六千還太原帝賜宸扆台衡二銘以言君臣相成之美勒石起義堂試彞尊銘崔渙起家亳州司功參軍還調於是入判者千餘吏部侍郎嚴挺之試彞尊銘謂曰子清廟器也故以題相命讀者憐其志李華為元德秀權臯銘稱道深婉讀者憐其志詠其形容有異于古文粹李翺荅寺僧書銘古多有之湯之盤銘衞孔悝鼎銘秦始皇之嶧山銘蔡邕黄鉞銘以紀功於黄鉞之上近代為銘大抵詠其形容有異于古人之所為其作鍾銘則必詠其形與其音節與其財用之多少鎔鑄之勤勞爾非為勒功德勸戒于世也銘以題勒示後李善文選主功德卓異者所皆銘紀權德輿其文雅正贍縟當時公卿矦王功德卓異者所皆銘紀十常八九左傳八佐在吳銘雙闕於盤石李白陁羅尼幢頌序誄十白美終則誄發孔丘卒哀公誄曰哀哉尼父無自律子貢曰生不能用死而誄之非禮也誄纒緜而悽愴選魯莊公馬犇敗績縣賁父爲御曰是無勇也遂死圉人浴馬有流矢在白肉股間也公曰非其罪也遂誄之士之有誄自此始也誄其戰功以為謚也賤不誄貴㓜不誄長禮也誄累也累列當時之行以作諡唯天子稱天以誄之以其無尊故也諸侯相誄非禮也追念勲勞孔誌行君所居官為第三品宜得諡于太常余懼州吏之逸其辭也私為之誄以誌其行吕衡州誄是旌是吿永永不渝故友咨懷累行陳謨云云上追列遺懿二三友人哀其行之不昭于世追列遺懿求諸后土申薦嘉名實曰恭甫乃作誄虞鳴鶴誄上誄行謀諡惟古之道生而無位歿有其號爲誄志有孝恭慈仁之誠栁宗元吳君集序不能竄一字文粹栁下季之妻誄其夫門人不能竄一字雜説陸龜蒙誄德銘功厥義有三文粹元魯山墓碣凡與門生吟慕遺風諡曰文行先生夫誄德銘功厥義有三上以簡神明中以鋪先烈下以聳示後人李華德先生誄或曰德先生者奚氏余曰南陽張姓維之其字也或曰與古誰倫余曰原思宓不齊比也向使獲親聖人則鱗差耕雍也或曰何咎而瞽余曰君子道消故仁賢窮或曰夫如是得無誄之余誄之李華犬必㗖肉丁用晦芝田録元魯山誄元德秀退居安陸縣南獨處一室去家數十里值大雨水漲七日不通餒死空室中書舎人盧載為之誄曰誰為府君犬必㗖肉誰為府僚馬必食粟使我元君餒死空谷牋誄任昉騁杜甫張九齡詩蘭陵先生誄閻士和著白孔六帖卷八十六
