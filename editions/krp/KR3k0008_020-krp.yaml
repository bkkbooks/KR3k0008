body:
  text: 白孔六帖卷二十唐白居易原本宋孔傳續撰女一女壻二娣姒三子婦四舅姑五出婦六親屬七宗族八奴婢九僕𨽻十乳母十一㓜敏十二女一白賢女淑女處女處子處室也如玉有女如玉懐春有女懐春聞琴蔡琰字文姬邕之女也邕夜鼓琴絃絶琰年六歲曰第二絃邕曰偶中耳琰曰呉季札觀風知興亡之國師曠吹律識南風不競由此言之何足不知也詠雪見姪女門謝道韞事贖父罪史記太倉令淳于公有罪當刑無男有女五人公罵其女曰生女不生男緩急非有益其女緹縈自傷泣乃上書曰妾父爲吏齊中皆稱廉平今坐法當刑願沒入官爲婢贖父刑罪使得改過自新書奏文帝哀憐其意乃下詔曰夫斷支體剋肌膚楚痛者其除肉刑憂國危魯漆室邑之女過時未適人倚柱而嘯鄰婦曰子欲嫁乎曰非也予憂者魯君老太子㓜鄰婦曰此丈夫之憂也女曰不然昔有客過繫馬園中馬逸踐予葵使予終歲不飽葵鄰女奔使予兄追之逢水溺死使予終身無兄予聞河潤九里漸洳三百歩今魯國有患君臣父子被其辱婦人獨安所避乎知肉味後漢孔融被誅女年七歳男年九歳寄他舍主人有遺肉汁男渴而飲之女曰今日之禍豈得乆活何顔知肉味乎女工詩序曰后妃在父母之家則志在女工之事尊敬師傅可以歸寕父母晚嫁黄公有女至美其父常謙曰醜人謂實然故過時無聘者笄年禮女子十有五而笄二十而嫁從人禮婦人從人者㓜從父兄嫁從夫設帨禮女子生設帨於門右帨佩巾也鞶絲禮女子生能言教之鞶絲女工十年不出禮女子十年不出漸長可居内姆教女師歸寧詩歸寧父母傳曰杞伯姬來歸寧問父母安否女中王魏文帝郭皇后少而父永竒之曰此乃吾女中王遂以女王爲字愛女張禹病帝臨問因言臣四男一女愛女甚於男逺嫁張掖太守蕭咸不勝父子私恩願與相近帝即日徙咸爲𢎞農太守沉江叔先雄沉水求父屍事具孝感門喜書魏文帝甄后九歳喜書視字輙識數字用諸兄弟筆硯兄謂曰汝當習女工用筆爲學當作女博士耶后曰古者賢女未有不覧前世成敗不知書何以見之供賔客周顗母李氏字絡秀顗父浚爲將軍出獵遇兩止李氏㑹其父兄不在絡秀聞浚至與婢於内宰豬羊具饌甚辦不聞人聲浚恠使人窺之見一女甚美因求爲妾父兄不許秀曰門户殄瘁何惜一女遂許之邦之媛也美女爲媛彤管有煒恱懌女美孔歸寧李晟正歳崔氏女歸寧責曰爾有家而姑在堂婦當治酒食具以待賔客即郤之不得進逹禮敦教類如此願備後庭王世充啓帝江淮良家女願備後庭無由進帝喜令閲端麗者美而才魏徴鄭仁基息女美而才皇后建請爲充華典冊具或言許聘矣徴諫曰陛下處臺榭則欲民有棟字食膏梁則欲民有飽適顧嬪御則欲民有室家今鄭已約婚陛下取之豈爲人父母意子女是求魏徵曰隋帝子女是求續曹大家女訓韋温一女歸薛家女工屬文續曹大家女訓行于世嫁爲民妻李白元和末宣歙觀察使范傳正採訪後裔惟二孫女嫁爲民妻進止仍有風範因泣曰先祖志在青山頃葬東麓非本意傳正爲改葬立二碑焉告二女將改妻士族辭以孤窮失身命也不願更嫁傳正嘉歎獻二女柳公權開成三年召問得失因言郭旼領邠寕而議者頗有臧否帝曰旼尚父從子太皇太后季父官無玷缺自大金吾位方鎮何所更議答曰旼誠勲舊然人謂獻二女乃有是除信乎帝曰女自㕘承太后豈獻哉公權曰疑嫌間不可户曉因引王珪諫廬江王妃事是日帝命中官自南内送女還郭旼家聞家令姓列女序婦訓姆則同上幽閨婦女李渤傳幽閒之德其子女聞教訓有幽閒之德韓墓誌作門楣楊妃外傳楊妃寵幸時有謡曰男不封侯女作妃君看女却作門楣桃紋不嫁元正織女詩東家頭白䨇女兒爲解桃紋嫁不得注余掾荆時目擊貢綾户有終老不嫁之女生女灸破其面樂史緑珠傳昭君村生女灸破其面故樂天詩云不取徃者戒恐貽來者寃至今村女面燒灼成瘢痕女子之行於親也孝婦也節母也義而慈止矣列女傳自古女禍大者亡天下其次亡家其次亡身身茍免矣猶及其子孫雖遲速不同未有無禍者也五代史嗚呼女子之禍於人者甚矣自高祖至於中宗數十年間再罹女禍唐祚旣絶而復續中宗不免其身韋氏遂以滅族賛𤣥宗又敗以女子𤣥宗親平其亂可以鑒矣而又敗以女子女壻二孫壻附白玉潤晉樂廣字彦輔人謂之水鏡女壻衛玠字叔寶時號玉人故時語曰婦翁氷清女壻玉潤玉鏡臺世說温嶠字太真姑劉氏有女甚麗姑囑嶠曰佳壻難得曰但如嶠比如何曰何敢希汝比數日白姑已得壻身盡不滅嶠因下玉鏡臺一枚姑大悦旣婚交禮女以手披紗扇撫掌大笑曰吾固疑是老奴果如所卜愛壻子壻以子妻之子謂公冶長可妻也雖在縲紲之中非其罪也以其子妻之佳壻從服禮從服者有從重而輕夫爲妻之父母也承子授壻禮婚禮壻親見於舅姑舅姑承子以授壻恐事之違也注舅姑妻父母也以女授壻而戒之無令違於婦道親受禮壻揖譲而升堂盖親受之於父母甘公之遇㳟祖後漢陶謙字㳟祖同縣甘公出遇之見其容貎駐車與語甚悦因許與女夫人怒甘公曰彼有竒表長必大成遂與之太守之器伯珪魏志公孫瓉字伯珪爲郡門下書佐有恣儀音聲太守器之以女妻之又張華字茂先少孤貧牧羊鄉人劉放竒其才以女妻之又呉志吕範子衡少爲縣吏有姿容邑人劉氏家冨女美範求之母嫌欲勿與劉氏曰觀吕子衡寧乆貧賤耶遂與婚之妻以孫女漢陳平貧以席爲門冨人張負見其門多長者車曰豈有如陳平而乆貧賤者乎遂以孫女妻之再嫁漢張耳亡命游外黄外黄婦人女甚美庸奴其夫夫亡投父客父客素知張耳而遂嫁之絶婚魏志袁術公路爲子索吕布女後布怨術女已在途追還絶婚出贅漢賈誼曰商君遺禮義棄仁思并心於進取行之二歳俗日敗故秦人家冨丁壯則分出贅注分音扶問反不當出在妻家猶體有贅一曰贅質也以身爲質友壻嚴助侍宴上問所欲對曰家貧爲友壻所辱願爲㑹稽太守撾婦翁後漢帝戱第五倫曰聞卿爲吏撾婦翁不過從兄飯有諸對曰臣之三娶妻皆云無父請倩史記黄氏請倩注倩女壻東齊間謂壻爲倩吾兒誤我魏略太祖以丁儀令士未見欲妻之問五官將五官將不可及辟儀到嘉其才曰丁掾即兩目盲亦當與女况但眇吾兒誤我五官將即文帝也禁臠晉武爲晉陵公主求壻謂王珣曰如真長子敬便足珣曰謝渾不及真長不減子敬未幾帝崩袁崧欲以女妻之珣曰卿莫近禁臠東牀坦腹太尉郄鑒使門生求女壻於王導導命東廂徧觀子弟歸謂鑒曰王氐諸子弟咸自矜持唯一人東牀坦腹食若不聞訪問乃羲之遂妻之孫壻李膺祖脩以鍾瑾好學似我家以膺妹妻之孔蔣繒蔣子謹子繒徃見高智周智周方貴以女妻之齊映滑亳節度使令狐彰署掌書記彰疾甚引映託後事因說彰納節歸諸子京師彰從之即以女妻映有子必位宰相楊嗣復父於陵始見識於浙西觀察使韓滉妻以其女歸謂妻曰吾閲人多矣後貴且夀無若生者有子必位宰相旣而生嗣復高選世族獨孤郁最爲權德輿所稱以女妻之德輿輔政以嫌去内職憲宗嘆德輿乃有佳壻詔宰相高選世族故杜悰尚岐陽公主然帝猶謂不如德輿之得郁也張延賞雖蚤孤而博渉經史通吏治苗晉卿尤噐許以女妻之佳壻楊於陵節度使韓滉剛嚴少許可獨竒於陵謂妻桞曰吾求佳壻無如於陵賢因以妻之以嫌自白杜悰權德輿爲相其壻翰林學士獨孤郁以嫌自白憲宗見郁文雅歎曰德輿有壻乃爾時岐陽公主始召擇大臣子唯悰以選召見授駙馬都尉貴顯朝廷郭子儀七壻皆貴顯朝廷蘇頲李至逺蘇頲其出也少失母至逺愛視甚謹以女妻之桞談頴士愛其才以女妻之李頻給事中姚合名爲詩士多歸重頻走千里丐其品合大加奬挹以女妻之愛重宗室漢少事韓愈愛重以女妻之識非庸人王琚謀刺武三思事洩亡命自傭於楊州冨商家識非庸人以女嫁之吕諲里人程氏財雄于鄉以女妻諲不禮杜黄棠初不爲執誼所禮及敗悉力營救旣死表還其柩葬焉崔謙之崔行功祖謙之在北齊終鉅鹿太守少好學唐儉愛其才妻以女因倩作文奏書報未嘗輙開潘炎方劉晏任權炎乃其壻雖書疏報答未嘗輙開時稱有古人節撫座封德彛即楊素之壻素爲僕射嘗撫其座曰封郎必居此座後果如其言南部新書張延賞李彦允韋臯見辱於張延賞崔圓受薄於李彦允皆丈人子壻後韋爲張西川交代崔救李娣死同上碧鸛雀裴寛事見擇夫門婦翁與壻張垍尚主在翰林獨以珍玩常誇於同列張淑曰此婦翁與壻非天子賜學士者也李肇國史補壻半子回紇明年可汗遣宰相􅎤跌都督等衆千餘幷遣其妹骨咄禄毗伽公主率大酋之妻五十人迎主且納聘􅎤跌至振武爲室韋所抄戰死有下七百皆聽入朝舎鴻臚帝御延喜門見使者是時可汗上書㳟甚言昔爲兄弟今壻半子也陛下若患西戎予請以兵除之一見以爲竒姚覬少憃不修容止時人莫之知中條山處士司空圖一見以爲竒以其女妻之五代史娣姒三白姒婦娣婦爾雅曰長婦謂稚婦爲娣婦娣婦謂長婦爲姒婦不以妾爲姒傳聲伯之母不聘穆姜曰吾不以妾爲姒注兄弟之妻相謂爲姒鍾郝之禮灋晉王渾妻鍾氏字琰弟湛妻郝氏皆有德行琰雖門髙與郝氏相親重郝不以賤下琰琰不以貴陵郝時人稱鍾夫人郝夫人之禮灋孔命主家事李光進弟光顔先娶而母委以家事及光進娶母已亡弟婦籍貲貯納管鑰於姒光進命反之曰娣逮事姑且嘗命主家事不可改因相持泣乃如初順和李翺楊烈婦傳婦人女子順和於娣姒則賢矣諸娣姒皆畏莫敢侍髙祖太穆順聖皇后竇氏太后羸老有疾而性素嚴諸娣姒皆畏莫敢侍后事之獨怡謹盡孝使吾姒至此梁太祖皇后張氏太祖已破朱瑾納其妻以歸后迎太祖於封丘太祖告之后遽見瑾妻瑾妻再拜后亦拜悽然泣下曰兖鄆與司空同姓之國昆仲之間以小故興干戈而使吾姒至此若不幸汴州失守妾亦如此矣言已又泣太祖爲之感動乃送瑾妻爲尼五代史子婦四白特豚禮曰婦以特豚饋明婦順雙鯉姜詩字士游母好生魚及江水其妻取水不及時乃棄妻寄鄰舎常作膾請鄰母送詩母母感之呼還舎傍輙有泉脉如江水兼躣雙鯉以供母膳爲婦三歳爲婦靡室勞矣執婦道婦禮四德婦德婦言婦容婦功婦順家肥廟見家和姑慈婦婉傳曰姑慈而從婦聽而婉禮之善物也注從專也婉順也授室禮舅姑降自西階婦降自阼階授之室也宜家宜爾室家雞鳴盥潄禮曰婦事舅姑如事父母雞初鳴咸盥潄也婉娩聽從婉言語娩容貎叱狗東觀漢記鮑永妻嘗於母前叱狗永即去之肅雍之德柔正之道恭承舅姑和協娣姒父戒母戒爾舅爾姑穀梁曰送女父不下堂母不出祭門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言夫夫婦婦所謂順也取婦之家三日不舉樂思嗣親也成婦之義禮三月而廟見稱來婦也擇日而祭於禰成婦之義也謂舅姑没也内和禮曰婦順備而后内和内和理然後家可長乆也婦式婦人模式周禮姑喪南宫縚妻姑之喪夫子訓其髽親饋禮婦旣嫁婦盥親饋舅姑卒食婦餕餘私之也私猶恩也私貨子婦無私貨無私蓄無私器不敢私假不敢私與藏以待乏禮婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如親受賜若反賜之則辭不得命如更受賜藏以待乏注或賜之謂婦之兄弟待舅姑之乏以進之請其故賜婦若有私親兄弟將與之則必復請其故賜而後與之注故賜謂前舅姑所反賜之物者明禮譲於賜也婉容禮不至禮曰以此防人婦猶有不至者謂不親夫事舅姑之側也婦本於孝家綂於尊女旣辭家婦將授室孔唐休璟始老已踰八十猶託倚權近求復用於是賀婁尚宫方用事附者輙榮赫休璟乃爲子娶其義女故復起宰相頗爲時譏訾乳姑崔琯諸崔自咸通後有名厯臺閣藩鎮者數十人天下推士族之冠始其曾王母長孫春秋高無齒祖母唐事姑孝毎旦乳姑一日病召長㓜言吾無以報婦願後子孫皆若爾孝世謂崔氏昌大有所本云珍美非經獻不先嘗楚王靈龜妃上官者舅姑在妃朝夕侍奉謹甚凡珍美非經獻不先嘗嚴奉舅姑夙夜勤事太中二年以起居郎鄭影尚公主詔曰女人之德雅合謹修嚴奉舅姑夙夜勤事此婦人之節也南部新書舅姑五白如事父母内則婦事舅姑如事父母雞初鳴咸盥潄櫛縰縰謂束髪筓緫首飾衣紳紳帶左佩紛帨帨拭巾也右佩箴管線纊施縏袠大觽木燧備尊者之所用衿纓衿結也衿音其朕反綦屨綦繫也綦音忌以適父母舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之待舅姑之禮也不傳舅姑之衣衾簟席枕几不傳傳移也杖履祇敬之勿敢近佐餕凡朝夕恒食子婦佐餕應唯敬對在舅姑之所有命應唯敬對也進退周旋慎齋升降出入揖遊不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔勿逆勿怠子婦孝者敬者舅姑之命勿逆勿怠必嘗而待必服而待若飲食之雖不嗜必嘗而待加之衣服雖不欲必服而待是善事我子不宜其妻事父母曰是善我子行夫婦之道沒身敬之不衰也舅没而姑老傳家事於子婦必請於姑冡婦所祭祀賔客毎事必請於姑不敢專擅也介婦請於冢婦也命適私室凡婦不命適私室不敢退待之以誨也大小必請婦將有事大小必請於舅姑也勿庸疾怨子婦未孝未敬勿庸疾怨姑數之若不可教而後怒之先舅先姑没則曰先舅先姑不幸子夏曰嫁不及舅姑謂之不幸柔色以溫之孔以禮聞莊淑公主事舅姑以禮聞姑疾姑寢疾不解衣藥糜不嘗不進行見舅姑禮王珪子敬直尚南平公主是時諸主下嫁以帝女貴未嘗行見舅姑禮珪曰主上循法度吾當受公主謁見豈爲身榮將以成國家之美於是與夫人坐堂上主執筓盥饋乃退其後公主降有舅姑者備婦禮本於珪鞭婦桞公綽爲刑部尚書京兆獄有姑鞭婦至死者府欲殺之公綽曰尊歐卑非闘也且子在以妻而戮其母不順遂減論事如父母襄城公主下嫁有司告營别第辭曰婦事舅姑如事父母異宫則定省闕出婦六事具夫妻離門中白疾怨子婦未孝未敬勿庸疾怨表禮若不可怒子放婦出而不表禮焉注雖當出猶爲之隱表禮謂不明其過犯也甚冝不恱禮曰子甚冝其妻父母不恱則出之婦當喪而出則除之當舅姑之喪也爲父母喪爲父母喪未練而出則三年旣練而出則止未練而反則朞旣練而反則逐之禮女嫁爲父母朞若出者却服三年不宜其妻見上束藴蒯通曰臣之里有婦姑使守肉夜亡其肉姑以爲婦盗逐之嘗有里婦束藴請火曰昨暮犬得肉姑慚追其婦還水遲姜詩母好江水妻常取之一日來遲母渴詩遂遣其妻孔凡四五娶崔顥娶妻惟擇美者俄又棄之凡四五娶旣啓飛鳳之兆遂操别鶴之音白居易出妻判姜詩出妻蓋爲小瑕鮑永去妻亦非大過同上不待白頭春天百草秋始衰棄我不待白頭時張籍白頭吟歲華逐霜霰賤妾何能乆李白去婦詞溺姬侍李元素其妻石泉公王方慶之孫前妻子皆不肖而元素溺姬侍王不見答元素乆疾益昬惑遂出之王訴諸朝免元素官且令畀王貲五百萬門内斗粟尺布無所私劉君良四世同居族兄弟猶同産也門内斗粟尺帛無所私大業末荒饉妻勸其異居因易置庭樹鳥雛合鬪且鳴家人怪之妻曰天下亂禽鳥不相容况人邪君良即與兄弟别處月餘宻知其計因白去其妻曰爾破吾家召兄弟流涕以告更復同居李逈秀母少賤妻嘗罵媵婢母聞不樂逈秀即出其妻或問之答曰娶婦要欲事姑茍違顔色何可留本傳親屬七白六親老子曰六親不知有孝慈九族以親九族九族旣睦内睦外侮傳周之有懿徳猶懼有外侮捍禦侮者莫如親也敦敘協和貴親綏族旣睦不咸和同德惟暱近仁不遺親厚骨肉之愛廣枝葉之庇親親之殺長長尊尊立愛惟親立敬惟長葛藟刺桓王也周室道䘮棄其九族骨肉將離無親宗族枝葉先落不庇本根義惟立愛仁貴篤親逺間親六逆血屬周親棣華之詩葛藟之刺不睦之刑周禮以八刑紏萬民三曰不睦之刑不獨親其親大道之行各親其親大道旣隱旁殺謂親屬之䘮服以親踈爲殺也從服禮曰從服謂夫爲妻之父母妻爲夫之黨也見親踈之殺焉禮三族失其和禮協比其鄰婚姻孔云𤨏𤨏姻婭兩壻相謂爲婭𤨏𤨏細小貎掩義禮門内之理以恩掩義親叛傳楚公子比族盡親叛可謂無主也分親傳庻人工商各有分親皆有等衰分扶問反親去聲無絶其愛情雖不同無絶其愛親之道也展親書時庸展親棄親用羇周鞏簡公衆叛親離州吁枤杜晉人刺其君不親宗族縱斧宋昭公欲去羣公子樂豫曰公室之枝葉也不可縱尋斧焉孔周䘏親戚宇文士及好周䘏親戚合䟽屬以居裴贄韓偓門内雍友合疏屬以居餘見滛亂門求宗屬顔杲卿被殺真卿方爲蒲州刺史令泉明到河北求宗屬始一女及姑女並流離賊中及是並得之悉錢三萬贖姑女還取貲復徃則己女復失之託外祖母呂向少孤託外祖母蒙擯高季輔以爲今尚書八座人主所責成者也冝擇温厚脩潔者任之使不昵者蒙擯於親無所賑施魏元忠爲僕射謁告上冢到家於親戚無所賑施友壻蔣係宰相李德裕惡李漢以係友壻出爲桂管觀察使依外家孫逖少孤依外家宗族八不親宗族附白父黨爾雅父黨爲宗族也稱孝宗族稱孝焉吾宗傳曰晉吾宗也豈害我哉糾合宗族本支百世宗族旣睦道雖無頗親踈本恩禮則有殺先親後踈枤杜見上宗族不親本根無庇傳叔向曰肹聞之公族將卑其宗族枝葉先落根本從而亡也無縱斧於葛藟宜解網於竹刑道乖綏族義爽篤親小忿雖有小忿不廢懿親散金史記蘇秦旣歸散金宗族散財史記范勝字無忌散財五百萬以施宗族也宗人族子宗易於下禮祖遷於上宗易於下故敬宗所以尊祖也易踈也親屬竭矣禮四世緦服之窮也五世袒免殺同姓也六世則親屬竭矣戚單於下婚姻不通禮曰庻别姓於上戚單於下婚姻可以通乎子曰繫之以姓而弗别綴之以食而不殊雖百世而婚姻不通周道然也言雖踈逺不可通婚也繫之謂宗籍也戚單言親盡漸踈也父母之黨禮睦於父母之黨可謂孝敦叙九族親以飲食之禮周禮大宗伯以飲食之禮親宗族兄弟注人君有食宗族之禮以親之文王世子曰族食世降一等大傳曰繼之以姓而不别繼之以食而不殊三族不虞儀禮士婚禮請期曰唯是三族之不虞注三族父昆弟已昆弟子昆弟宜吊不吊宜免不免禮族之相爲也宜吊不吊宜免不免有司罰之至于賵賻承含皆有正焉謂宗族之相爲也承讀爲贈宗子雖七十無主婦諸婦不可無綂也合族君子因睦以合族合族謂與宗人燕也亢宗子太叔曰吾不能亢身安能亢宗奪宗奪適漢書梅福曰諸侯奪宗聖庻奪適注奪宗始封之君尊爲諸侯則奪其舊爲宗子之事也奪適謂文王舍伯邑考而立武王也老而納正室見壻姻注門宗子禮適子庻子祇事宗子不敢以冨貴加於宗子之門以寡約入必獻其上而服其次若非所獻則不敢入宗子之門宗子正宗敬宗者也族類傳曰非我族類其心必異聚族保族其家宗羞展親分寳玉於伯叔之國時庸展親棄親用羇周鞏簡公棄親用羇用卿士也縱斧見上衆叛親離州吁孔周䘏王珪宗族匱乏周䘏之田宅盡分宗族蕭瑀初瑀關内田宅悉賜勲家至是還給之瑀盡以分宗族撫養宗屬韋䋲撫養宗屬孤㓜無異情宗人欲籍高䕃李懐逺少孤宗人欲以藉高䕃懐逺退而曰因人之勢高士耻之假䕃而官吾志邪護乏畢諴旣貴所得禄奉養護宗族之乏無間世爲名族裴皥裴氏自晉魏以來世爲名族居燕者號東眷居京者號西眷居河東者號中眷族清胄貴杜牧鄭處晦制望閥高華蕭復三世不異居崔元暐三世不異居家人怡怡如也貧寓郊墅羣從皆自逺㑹食無他㸑族人孤貧者撫養教勵同上奉廪推散蘇頲性亷儉奉廪悉推散親族儲無長貲九世同居張公藝九世同居高宗有事泰山臨幸其居問本末書忍字以對天子流涕出孝友傳各爲大家裴爲顯姓入唐尤盛支分族離各爲大家韓文河南少尹裴君墓誌奴婢九白贓獲風俗通古制無奴婢即犯事者也贓者被贓罪没入爲官奴婢獲者逃亡獲得爲奴婢者也丹書傳裴豹𨽻也著於丹書欒氏之力臣曰督戎國人懼之裴豹曰茍焚丹書我殺督戎宣子喜曰所不焚丹書者有如皎日遂殺督戎注豹犯罪没入官奴以丹書其罪家僮僮僕應門李令伯表曰内無應門五尺之僮蒼頭後漢彭寵蒼頭子宻等三人殺寵封矦相衛青與諸羣奴居有一鉗徒相青曰汝當封矦青曰爲人奴虜免笞罵足矣敢望封侯鉗徒見上注略賣欒布爲人所略賣得翁風俗通龎儉少失父不知所在後穿井得錢行求蒼頭乃父也時人語曰鑿井得銅買奴得翁遺陸賈史記陳平結歡太尉勃陸賈之力於是乃遺陸賈以奴婢百人也賜霍光漢宣帝詔大將軍霍光賞奴婢七十人同席史記任安爲衛將軍舎人過平陽主家主令與騎奴同席而食乃援刀而斷席别坐也八百卓氏冨家僮八百人入于罪𨽻周禮其奴男子入于罪𨽻女子入于㫪藁注云謂坐盗賊則没入官爲奴即今之奴婢古之罪人也不爲奴又曰凡人有爵者與七十者與未齓者皆不爲奴注有爵者謂命士已上齓七八歲初毀齒者是也奴僕衛青奮於奴僕囚奴正士尚書箕子爲之奴奴虜黠奴齊俗賤奴虜而刁問愛貴之桀黠奴人之所患唯刁間收使之逐魚鹽商賈之利終各得其力起冨數千萬也殺奴田儋陽爲縛其奴從少年之逞欲得殺其奴注古者殺奴婢皆告官如不告者罪之限數哀詔諸侯王已下及豪冨人多畜奴婢有司條奏諸侯王奴婢二百人列侯公主百人關内侯吏人四十人年六十已上七十已下不在此數犯者以律論過節則沒縣官指千漢僮手指千比千乗之家奴誤殺子宋則逃而舎之是無陪臺私屬王莽曰秦置奴婢之市與牛馬同簡今改奴婢曰私屬禁不得買賣也賣良人鬻良賢行奴李善字次孫本李元蒼頭也建武中元家疾疫相繼死沒唯孤子續始生數旬諸奴婢欲殺續分産善傷不能止負續逃亡瑕丘界中親自奉養乳爲生汁推燥居濕雖在孩時奉之如長君毎事長跪請白而後行閭里感之續年十歲然後與善歸本縣理舊業告奴婢於長吏悉收殺之鍾離意上書言狀世祖詔拜善及續並爲太子舍人後爲本郡太守路經元墓躬自除草洒道自執爨脩饌祭祀拜辭涕泣而去班氏奴初班孟堅在竇憲幕府有奴干洛陽令种兢車騎吏呵之奴醉罵兢兢大怒時畏憲不敢發及憲敗賔客皆逮栲兢捕繫固固遂死於獄中有士風雄翹嘗爲石崇蒼頭性亷直有士風潘岳見而稱異勸崇免之乃還鄉里禁殺光武詔天地之性人爲貴殺奴婢者不得減其罪灸灼光武詔敢灸灼奴婢論如律免所灸灼者爲庻人射傷人光武又除奴婢射傷人棄市律長命奴世說云并州刺史畢軌送故漢渡遼將軍范明友鮮卑奴年二百五十歳言語飲食如常人知文章郄愔字方回有蒼頭善知文章王羲之愛之毎稱奴于劉惔惔問何如方回羲之曰小人耳何得比郄公惔曰不如方回故常奴耳煩辱執煩辱之事先掠光武詔吏人遭亂爲青徐賊所掠賣爲奴婢欲恣聽之敢拘制以掠人論也報讎欒布爲奴於燕爲家主報讎也家僕史記與家僕雜居齊齒也乏使謂無使也怒頑左傳忿嫉于頑書庸奴其夫封不義侯後漢詔討彭寵者封矦寵蒼頭奴子宻殺寵朝廷以奴殺主不義復不可不封乃封爲不義侯平頭奴子提履箱古詩婢贓獲見上注奚人周禮奚三百人注云今官婢也官婢史記太倉令淳于公將刑少女緹縈上書請沒身爲婢贖父罪女奴侍婢遺陸賈賜霍光見上注汚朝衣東觀漢記劉寛簡略夫人欲試寛伺當朝裝訖使婢奉羹翻汚朝衣婢遽收之寛徐徐曰羮爛汝手覆毒酒列女傳主父妻滛於鄰主父還爲毒酒使媵婢進之婢欲言恐逐主母不言害主父於是佯僵覆酒主父怒笞之妻恐婢言欲殺婢婢就杖將死不言主父弟告主父乃去妻納其婢爲妻青衣微賤裴秀母婢也秀年十八有令望而嫡母猶妬令秀母親下食衆賔皆起拜之母曰微賤如此應爲此兒必貴史記姑布子卿見無恤曰此真將軍也簡子曰此母賤翟婢也曰天之所授母雖賤子必貴也泥中之怒劉義慶世說曰鄭𤣥家奴婢皆讀書嘗怒一婢拽於泥中一婢問曰胡爲乎泥中答曰薄言徃訴逢彼之怒代死列女傳曰翟素者翟氏之女也遭賊欲犯之臨以白刃素婢名青乞代賊遂殺素欲犯青青曰我代素者恐其被耻獲害耳今素尚死何以生爲又殺之乃生無恤終因子貴作殯王父未爽失賢茍古今之可徵雖微賤而何害侍婢殺主漢大司空扶平侯王崇就國歲餘為侍婢所殺也認孫守藏後漢梁冀認孫奮母以爲守藏婢盗白珠紫金限數見奴門逃而舎之其無陪臺私屬見奴門誦賦蜀人劉琰侍婢十人皆能爲聲樂又悉讀書誦魯靈光殿賦緑珠石崇有妓曰緑珠美而豔善吹笛孫秀使人求之崇盡出婢妾示之使曰美矣然奉命求緑珠曰吾所愛不可得也秀竟誅崇累騎阮咸素幸姑婢婢從姑去時方有客咸借客馬追姑家婢旣及與婢累騎而還客非之團扇歌晉樂志團扇歌者中書令王珉與嫂婢有情愛甚篤嫂箠婢過苦其婢素善歌而珉好把團扇故制此歌奴價倍婢價祖訥字士言貧常自炊爨養母北下將軍王敦聞之遺其一婢辟爲從事中郎人戲曰奴價倍婢價詞曰百里奚何必輕於五羖羊皮耶作灋買婢郭璞愛主人婢無由得乃取小豆三斗繞主人舍散之主人晨起見赤衣人數十圍其家就視即減主人詣璞璞曰君家不宜畜此婢可於東南二十里賣之勿爭價妖可滅主人從之璞隂使人賤買此婢復爲符投井中赤人一一皆反縛自投井中主人悦璞乃携婢而去周禮女酒女漿女籩女醯女鹽女冪已下皆免其事在者從坐男女沒入縣官爲奴今之侍史官婢也以巾覆物曰冪女祝女婢曉祝之事女史曉書女工曉裁縫豈唯炊爨之勞抑亦巾箱之寵丸藥陳夀居䘮使婢丸藥客見之況累數年隨軍馮緄字鴻卿時荆州監軍張敞承宰官日而奉緄將侍婢二人戎服自隨孔給諸子劉洪基始病給諸子奴婢各十五人謂所親曰使賢固不籍多財即不賢守此可以脫飢凁奴伯嫗監太平公主奴伯嫗監千人厮臺掠民子女安樂公主與長寜定安三家厮臺掠民子女爲奴婢左臺御史袁從一縛送獄主入訴帝爲手詔喻免從一曰陛下納主訴縱奴騶掠平民何以治天下臣知放奴則免罪刻奴則罪於主然不忍屈陛下法以偷生也不納乘驢不肉食岐陽公主所賜奴婢偃蹇皆上還丐直自市悰爲澧州刺史主與偕從者不二十婢乗驢不肉食賜奴婢李大亮初破公祏以功賜奴婢百口謂曰而曹皆衣冠子女不幸破亡吾何忍録而爲𨽻乎縱遣之高祖閒咨美更賜奴婢二十後破吐谷渾復賜奴婢百五十口悉以遺親戚奴婢爭財唐扶卒奴婢爭財有司按其貲至十餘萬視疾大老嫗李靖五世孫彦芳家故藏高祖太宗賜靖詔書數函上之一日有詔夜視公疾大老嫗遣來吾欲熟知公起居狀賜七十人姜譽子確平高昌還賜奴婢七十人奴訴主魏謩大理卿馬曙有犀鎧數十首懼而瘞之奴王慶以怨告曙藏甲有異謀按之無它狀投曙嶺外慶免議者謂奴訴主法不聼謩引律固爭卒論慶死貫率錢崔從授淮南節度副大使揚州凡交易貲産奴婢有貫率錢從皆蠲除之詔市荆益奴婢張廷珪㑹詔市荆益奴婢廷珪上書曰荆益奴婢多國家户口姦豪掠買一入於官永無脫期南北異宜必至生疾此有損無益也訪親戚原縱宗室復改容州刺史先是西原亂吏獲反者沒爲奴婢長役之復至使訪親戚一皆原縱童獲猶儒先生家趙憬位台宰而第室童獲猶儒先生家也奴告張鎰郭子儀壻趙縱爲奴告下御史劾鎰奏言貞觀時有奴告某主謀反者太宗曰謀反理不獨成尚有它人論之豈籍奴告邪乃著令奴婢告主者斬由是賤不得干貴下不得凌上教本旣修悖亂不萌項者長安令李濟以奴得罪萬年令霍晏因婢坐譴輿臺下類主反畏之侼慢成風漸不可長持兵呵衛武元衡被害公卿朝以家奴持兵呵衛殺主竇建德滑州刺史王軌爲奴所殺奴以首奔建德建德曰奴殺主大逆納之不可不賞賞逆則廢教將焉用爲命斬奴而返軌首厭酒肉獨孤及上疏曰人之生産空於杼軸擁兵者第管亘街奴厭酒肉而貧人羸餓就役名姝異技元載名姝異技雖禁中不逮爲倡優䙝戯載諸子牟賊聚歛蓄妓妾爲倡優䙝戯親族環觀不媿也奴私侍兒沈詢爲昭義節度使奴私侍兒詢將戮之奴懼結牙將爲亂夜攻詢滅其家本傳春草楊岑謹矜父冡草木皆流血懼問所善胡人史敬忠使身桎梏祼而坐林中厭之會婢春草有罪將殺之敬忠曰勿殺賣之可市十牛歳耕田十頃謹矜從之婢入貴妃姊家因得見帝帝愛其辨慧留宫中寢侍左右帝問所從來婢奏爲謹矜家所賣具言敬忠夜過謹矜坐庭中歩星變夜分乃去帝怒而婢漏言于楊國忠國忠與王珙隂相語未有發也乃與李林甫作飛牒告謹矜遂有詔賜死黄芩高固生微賤爲家所賣轉爲渾瑊童奴字黄芩性敏慧掠爲奴婢孔戣拜嶺南節度使南方鬻口爲貨掠人爲奴婢戣峻爲之禁親吏得嬰兒于道收育之戣論以死由是閭里相約不敢犯青衣栁玭永寜王相國涯居位竇氏女歸請曰玉工貨釵直七十萬錢王曰七十萬錢豈於女惜但釵直若此乃妖物也禍必隨之女不復敢言後釵爲馮球外郎妻首飾馮爲賈相國餗門人賈有奴頍横馮愛賈召奴責之奴乃泣罪未幾馮晨謁賈賈未出有二青衣齎銀罌出曰公恐君寒奉地黄酒三杯馮悦盡舉之俄病渴且咽因暴卒本傳主藏奴桞公權凡公卿以書貺遺盖鉅萬而主藏奴或盗用常貯盃盂一笥縢識如故而噐皆亡奴妄言叵測者公權曰銀杯羽化矣不復詰以奴主務桞子華爲昭應令宰相元載有别墅以奴主務自稱郎將怙勢縱暴租賦未嘗入官子華囚奴入謁收付獄劾發宿罪杖殺之一邑震伏載不敢怨買婢遷約張又新嘗買婢遷約爲牙儈搜索凌突御史劾舉逢吉庇之事不窮治譖栢耆李同捷反授計㑹使宦人馬國亮譖耆受同捷先所得王稷女及奴婢珍貲都兒陽城歲飢屏跡不過隣里屑榆爲粥講論不輟有奴都兒化其德亦方介自約或哀其餒與之食不納後致糠覈數杯乃受願爲奴以償徳山東節度府聞城義者發使遺五百縑戒使者不令反城固辭使者委而去城置之未嘗發㑹里人鄭俶欲葬親貸於人無得城知其然舉縑與之俶既𦵏還曰蒙君子之施願為奴以償徳城曰非也能與我為學乎俶泣謝即教以書云云數人王績有奴婢數人漁童樵青張志和帝嘗賜奴婢各一志和配為夫婦號漁童樵青田宅財貲分給奴婢崔覲老無子乃以田宅財貲分給奴婢各為業皆為官所賣羅讓或以婢遺讓者問所從答曰女兄九人皆為官所賣留者獨老母耳讓慘然為焚券召母歸之愛才蕭穎士有奴事頴士十年笞楚嚴慘或勸其去答曰非不能愛其才耳奪取武承嗣聞左司郎中喬知之婢窈娘美且善歌奪取之知之作緑珠篇諷婢婢得詩恨死承嗣怒告酷吏殺之殘其家没為官奴王毛仲父坐事没為官奴生毛仲故長事臨淄王王出潞州有李守徳者為人奴善騎射王市得之竝侍左右擾民李絳出為華州刺史承璀田多在部中主奴擾民絳捕繫之家僮上變干頔同中書門下平章事時宦者梁守謙幸於帝頗用事有梁正言者與頔子敏善敏因正言厚賂守謙求頔出鎮久不報敏怒其紿責所饋誘正言家奴支解之棄溷中家僮上變詔捕頔吏沉璧及他奴送御史獄轉側民間李源家覆俘為奴轉側民間及史朝義敗故吏識源於洛陽者贖出之歸其家屬細過輒殺張直方奴婢細過輒殺禄賜僮婢盗有王起治生無檢所得禄賜為僮婢盗有男女質錢桞宗元徙桞州刺史栁人以男女質錢過期不贖子本均則没為奴婢宗元設方計悉贖歸之㑹兒五代朱守殷少事唐荘宗為奴名曰㑹兒姑息僮僕史洪肇李崧坐奴告變族誅洪肇取其幼女以為婢於是前資故將失職之家姑息僮僕而厮養之輩往往脅制其主同上金鳯閩王鏻妻早卒繼室金氏賢而不見答審知婢金鳯姓陳氏鏻嬖之遂立以爲后衣羅紈鳴珥環房魯上節度使書侍妾姢然衣羅紈鳴珥環出聲態者累百免爲官婢嚴武卒母哭且曰而今而後吾知免爲官婢矣市寒賤可制指者始與尚書合諌曰上所賜奴婢卒不肯窮屈奏請納之上嘉歎許可因錫其直悉自市寒賤可制指者杜牧岐陽公主碑淚爛犀簾蜀普録曰閬州叅軍黃渉婢曰笑春紅死渉念之洒淚至爛犀損簾愛姬江陵有士子遊交廣間而愛姬爲太守所放高麗坡底及歸因寄詩曰惆悵高麗坡底宅春光無復下山來太守見詩遂遣還南部新書借頭以明灋竇軌戒家奴無出外忽遣奴取漿公厨旣而悔焉曰要當借汝頭以明灋命斬之謫仙奴酉陽雜俎權同休友人雇得僕遇疾貧窘禠垢衣令辦酒食曰予將㑹村老丐道里資僕曰此固不足辦某當營乃斫桑札噀成牛肉復汲數瓶水頃之廼㫖酒也且曰某固異人僕𨽻十事類備傭賃門白得僮僕貞易僕臣臺傳曰人有十等厮輿之卒漢書淮南王書厮輿之卒有一不備而歸注厮析薪輿主駕僕賃傳申鮮虞僕賃於野以䘮莊公賃身爲僕也我僕痡矣從者病僕人役人賤𨽻僕使孔多僮僕李勣客衛南家冨僮僕厮竪崔蕘爲陜虢觀察使是時王仙芝亂漢上河南羣盗興蕘簡悦不曉事以器韻自高委政厮竪待以誠信曹華至厮竪皆待以誠信人以爲難僮千人王處存侈靡自奉家僮千人五代史家僮至數千李謹行家僮至數千以賄自雄恨不得爲騶虞倪若水爲汴州刺史班景倩入爲大理少卿過州若水顧左右曰班公是行若登仙吾恨不得爲騶虞我僕或歌愕韓愈晚秋郾城聨句兼之僕𨽻小人縁此得親左右亦旣奉承顔色能不恃託恩光作福作威莫不由此時太子與戸奴欵狎韋承慶上書諌舊史饑寒奴僕賤杜甫贈畢四詩未嘗有十歲之僮元德秀侈僕妾鄭餘慶常語人曰禄不及親友而侈僕妾者吾鄙之乳母十一孩㓜附童非狡童㓜敏白慈母昔者魯昭公少䘮其母有慈母良及其死也欲䘮之有司以聞曰古之慈母無服今君爲之服是逆古典公不忍爲之練冠自昭公始也君命所使教子也禮外有師傅内有慈母君命所使教子也何服之有徙邉史記漢武少時東武乳母常養帝詔令乘車馳送乳母子孫奴婢横暴不忍致法有司請徙於邉郭舍人謂乳母曰入辭去勿疾行而數廻顧乳母如其言舍人叱之曰何不疾行陛下壯矣寕湏汝乳帝悟乃不令乳母徙邉抱子桓𤣥初生魁偉奶母抱詣温易人而後至重兼常兒也令取玉環羊祜五歳時令乳母取所弄玉環即詣鄰人李氏東垣桑樹中探得人以李氏子祜前生也葬以卿禮列女傳曰魏節乳母者魏公子乳母也秦破魏皆誅諸公子乳母與公子俱亡秦軍追見争射之乳母身蔽公子公子與乳母俱亡秦王義之葬之以卿禮食我之恩推燥就濕孩子實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食路大也覃始能坐訐張口也嶷識人岐知人意五月能言莊子老𣆀曰舜之治天下使民心競民孕婦十月生子子生五月能言注教人之速不至乎孩㓜而始誰别人之意未孩而已擇人言競教之速成矣嬰兒老子云嬰兒之未孩終日號而不嗄重兼常兒是上注襁褓三月童丱雉齒十歲兒戯竹馬之戯三赦周禮三赦一赦曰㓜弱隅坐童子隅坐而執燭隅坐者不與成人竝禮晏起禮孺子早寢晏起唯所欲食無時注孺子㓜子也居喪禮童子哭不哀不踴不杖不非不廬注不備禮也竹馬是乗期郭伋以敦信雉雛不捕感魯㳟以懐仁不衣裘裳禮童子不衣裘裳言太温也童心魯昭公年十九猶有童心奉雉竪牛母曰予子長矣能奉雉以從我盖五六歲常視無誑禮云㓜子常視無誑童子何知傳齠齔綺紈之歲佩觽詩云童子佩觽佩韘㓜儀禮生六年學㓜儀成童舞象學禮舞勺十三學樂誦詩舞勺七年曰悼禮七年曰悼雖有罪不加刑焉㓜冲侗愿子曰侗而不愿吾不知之矣無知詩樂子之無知互鄉難言猶能潔已論語互鄉難與言童子見門人惑子曰人㓗已以進與其㓗也不保其徃也闕黨童子何欲成人闕黨童子將命或問之曰益者與子曰吾見其居於位也見其與先生竝行非求益者欲速成者也㓜學禮十年曰㓜學揔角丱兮孩提負劒辟咡詔之則掩口而對謂若負劒抱之也扶牀羈貫穀梁云子孫羈貫成童不就師父之罪也羈貫謂交午翦髪也㓜敏對日後漢黄琬字子琰年七歲詔問日蝕多少對曰日蝕之餘如月之初京師知名後乃拜童子郎參元楊子法言曰吾家童烏九歲預吾元文也家禽郭子曰楊氏子九歲聦慧孔君平指楊梅謂之曰此君家果答曰未聞孔雀是夫子家禽辨鬬孔子見二小兒辨鬬一兒曰日初出大如車盖及中則小是上下遠東西近也小兒曰日初出則陽微及中則熱是上下近東西遠也孔子竟不能决甘羅十二爲秦相克岐克嶷謂㓜有知識遜悌㓜而不遜悌長安逺於日晉明帝年五六歳元帝坐之膝上適有人從長安來帝問之曰長安何如日逺明帝曰只聞人從長安來不聞人從日邊來以此可知帝竒之後集羣臣言其對因復問之明帝曰日近元帝問何以異昨日之對對曰舉首即見日不見長安禀生知之性有老成之風弱不好弄傳夷吾弱不好弄弄戱也弱㓜也竒骨晉桓温桓彛之子未朞温嶠見之曰此兒有竒骨可試使啼曰真英物也彛以嶠賞遂名之曰温成人之風竒童九歲屬文班孟堅九歲善屬文不治屋宇陳蕃字仲舉年十五居室不治人曰孺子何不掃除曰當掃除天下諫父呉祐字季英父恢爲南海太守欲殺青簡寫書祐年十二諌父曰南方素多珍怪此書成載之兼兩昔馬援以薏苡興謗無雙黄香㓜歧嶷人語曰天下無雙江夏黄香造謁孔融字文舉九歲詣李膺門謂門者曰與府君有親門者爲通膺見曰與僕何親融曰先君孔子與老𣆀有師資之道僕與公亦累世通家膺大竒任氏童魏任嘏先世皆早成人人語曰蔣氏翁任氏童遺客書虞翻字仲翔年十二有客候其兄不遇翻追與之書曰僕聞琥珀不取腐芥礠石不受曲針客竒之苦李當路有李羣兒競取王戎年七歲獨不取曰李當路而繁必苦李也果然不惜環傅暢小時父友戱解其金環都不言惜見故吏桓𤣥七歲服終州府文武辭其叔冲冲撫𤣥曰此汝家故吏𤣥流涕被面鼠嚙衣魏鄧王蒼舒操子也操馬鞍爲鼠所嚙庫吏懼死冲乃以刀穿破衣而憂曰俗以鼠嚙衣不吉操曰無害俄而庫吏白鞍事操曰小兒衣裾尚被嚙况鞍乎不罪吏也賈誼年十八名稱郡中河南尹呉公舉之終童終君年十八歲時號終童西征賦曰終童山東之英妙英妙見上注懐橘呉陸績字公紀六歲見袁術術出橘食之績懐三枚去拜辭墮地術曰陸郎作賔客而懐橘乎績跪答之曰欲以遺母術大竒之劾鼠張湯爲兒守舎䑕盗肉父笞湯湯乃掘得鼠及餘肉劾鼠掠治訊鞫論報具獄磔于堂下父視其文辭如老獄吏稱象孫權獻象於魏魏祖欲秤之不可得子蒼舒曰載於舟刻其木入多少以他物校之即知輕重乃從之觀師秦師伐滑過周王孫滿尚㓜觀之曰秦師輕而無禮必敗果敗於殽聖童任延長孫年十二學於長安明詩易春秋號曰任聖童小器速成朱勃字叔陽年十二詣馬援兄侃侃方飲言辭閑雅援見之自失侃乃酌酒慰援曰朱勃小器速成終當從汝稟學勿畏慢人者魏司馬朗九歲有人道其父字者朗曰慢人者不敬其親怒字父魏常林字伯槐年七歲父黨造門問之曰伯先在否何不拜林曰臨子字父何拜之有客大嘉之從軍呂蒙年十五六竊隨姊夫鄧當戰當見驚呵叱不能止歸告蒙母母怒之蒙曰貧賤難可居設有功當冨貴又張昭弟子奮年未二十造打城具歩隲薦之以其年少不顧奮曰昔童汪錡赴義不為少也遂領兵又孫䇿年少領父舊兵號孫郎殺父侍兒見母子門狡童狡童刺忽也昭公有狂狡之志不與大臣圖國而使祭仲專于鄭狂童恣行謂突與忽爭國不見子充乃見狡童孔竇懐貞納韋后乳媪乳保之母宋務光上言願乳保之母妃主之家以時接見無令媟瀆䟽奏不省解衣以褓安樂公主帝遷房陵而主生解衣以褓之名曰裹兒六歲間關江左楊於陵父清倦宦客河朔死禄山之亂於陵始六歲間關至江左重遲不好戱劉昌裔㓜重遲不好戯常若有所思度與羣兒戯常爲旗幟戰陣狀楊行宻少孤與羣兒戱常爲旗幟戰陣狀指顧羣兒趙犫兒弄時好爲營陣行列自號令指顧羣兒無敢亂父叔文見之曰是當大吾門不喜兒弄王潜㓜莊重不喜兒弄土城竹馬童兒樂也龜兹傳同隊魚少長聚嬉戱不殊同隊魚韓愈符讀書萬金産薄暮歸見君迎我笑而莞指渠相賀言此是萬金産同上贈張籍視保李氏入韓氏家乳其兒愈孤失怙恃李氏憐不忍棄去視保益謹姢好静秀㓜子姢好静秀瑶環瑜珥蘭茁其芽稱其家兒也馬君誌上攤書解滿床杜甫示宗武覔句新知律攤書解滿床試吟青玉案莫羡紫羅嚢褓負皆補清官李義甫諸子雖褓負皆補清官孺褓授上柱國契苾子明孺褓授上柱國本傳㓜敏十二孔七歲誦經呂才子方毅七歲能誦經舉神童呉通立舉神童補祕書正字國瑞劉晏𤣥宗封泰山晏始八歲獻頌行在帝竒其㓜命宰相張說試之國瑞也屬文李百藥七歲能屬文又子安期亦七歲屬文夙敏章懐太子賢甫數歲讀書一覽輙不忘至論語賢賢易色一再誦之帝問故答曰性實愛此帝語李世勣稱其夙敏㓜警敏房𤣥齡㓜警敏竒童李百藥父友陸義等共讀徐陸文有刈琅邪之稲之語嘆不得其事百藥進曰春秋鄅子藉稲杜預謂在琅邪客大驚號竒童對詔髙第貟半千覊丱通書史客晉州州舉童子房𤣥齡異之對詔髙第已能講易老子爲文徐彦伯七歲能爲文結廬太行山下薛元超表其賢對䇿髙第本傳生七月能展書白居易其始生七月能展書姆指之無兩字雖試百數不差九歲暗識聲律其篤於才章盖天禀然在㓜丱已不凡盧懐謹屬文張九齡七歲知屬文五月能言太宗賢妃徐惠生五月能言圖史一經目輙誌于心禇亮少警敏傳見圖史一經目輒誌于心屬文楊嗣復八歲知屬文讀孝經獨孤及爲兒時讀孝經父母試之曰兒志何語對曰立身行道揚名於後世宗黨竒之一覽千言覆誦蘇廷碩弱敏悟一覽至千言覆誦擢童子舉裴耀卿數歲能屬文擢童子舉作八卦論蘇晉數歲知爲文作八卦論擢童子科獨屬文王丘十一歲擢童子科它童皆專經而獨屬文由是知名共師學劉鄴六七歲能屬辭李德裕憐之使與其子共師學擢明經元正九歲工屬文十五擢明經判入等羈丱屬文韋表微羈丱能屬文髙定辯惠七歲讀尚書至湯誓跪問郢曰奈何以臣伐君郢曰應天順人何云伐邪對曰用命賞于祖不用命戮于社是順乎人郢異之小字董二世重其早慧四歲能賦權德輿生三歲知變四聲四歲能賦詩能爲辭章令狐楚生五歲能爲辭章二郄郄士美年十二通五經史記漢書皆能成誦父友蕭頴士顔真卿與相論繹嘗曰吾曹異日當友二郄之間矣李泌開元十六年悉召能言佛道孔子者相答禁中有貟俶者九歲升座詞辯注射坐人皆屈帝異之曰半千孫固當然因問童子豈有類若者俶跪奏臣舅子李泌帝即馳召之泌旣至帝方與張說觀弈因使說試其能說請賦方圎動静泌逡廵曰願聞其略説因曰方若棋局圓若棋子動若棋生靜若棋死泌即答曰方若行義圓若用智動若騁材静若得意說因賀帝得竒童帝大悦曰是子精神要大於身賜束帛勑其家曰善視養之張九齡尤所奬愛嘗引至卧内九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦勁然蕭軟美可喜方命左右召蕭泌在旁率爾曰公起布衣以直道至宰相而喜軟美者乎九齡驚改容謝之因呼小友有海内名李乂年十二工屬文中書令薛元超曰是子且有海内名所賦輒就楊收七歳而孤母長孫親授經十三通大義善屬文所賦輒就闇記三禮義宗孔穎逹八歳就學誦記日千餘言闇記三禮義宗本傳召試徐齊𣆀八歳能文太宗召試賜所佩金削刀授紙爲賦徐堅㓜有敏性沛王聞其名召見授紙爲賦異之指擿王勃六歳善文辭九歳得顔師古注漢書讀之作指瑕以擿其失授校書郎楊烱舉神童授校書郎賦詩駱賔王七歳能賦詩賦土火爐孫逖㓜有文屬思警敏年十五見雍州長吏崔日用令賦土火爐援筆成篇理趣不凡日用駭嘆遂與定交通詩書李白十歳通詩書屬辭王維九歳知屬辭十歳補太學生蕭穎士四歳能屬文十歳補太學生觀書一覽即誦通百家譜繫書籀學善詩皇甫冉十歳便能屬文張九齡歎異之與弟曾皆善詩賦髙軒過李賀七歳能辭章韓愈皇甫湜始聞未信過其家使賀賦詩援筆輙就如素思自目曰髙軒過二人大驚自是有名工辭賦桞公權年十二工辭賦著語黙賦髙郢九歳通春秋工屬文著語黙賦諸儒稱之器大孫思邈通百家説善言老子莊周洛州揔管獨孤信見其少異之曰聖童也顧器大難爲用爾治尚書左氏春秋李至逺少秀悟能治尚書左氏春秋絶乳即能詩李甘始河南人楊牢有至行甘以書薦于尹曰牢絶乳即能詩洛陽兒曹壯于牢者皆出其下竒名劉禹錫桞宗元文集桞子厚始以童子有竒名於貞元初神仙童子唐元正聦敏年少號神仙童子朝野僉載耳目明逹神器以靈韓愈送張童子十過誦萬言封氏見聞集開元初常敬忠十五歳上書言能一過誦千言張燕公召問曰能十過誦萬言乎曰能以萬言試之七過已通熟矣甘露頂裴敬彛七歳能文章性謹敏宗族重之號甘露頂自七歳屬辭杜甫上賦頌自稱臣頼緒業自七歳屬辭且四十年安陵蓋夫子十歳與天通李白詩安陵蓋夫子十歳與天通懸河與微言談論安可窮能令二千石撫背驚神聦揮毫贈新詩髙價掩山東自然生知公神秀穎發自然生知五歳便措意於文毎坐卧吟諷未嘗蹔輟至于八九歳則有若大成焉一覽誦千言有若素習十七遊太學對䇿甲科韓休蘇頲集序十三弄文史揮筆如振綺李白送魏萬誦憶略徧韋述𢎞機曾孫家儲書二千卷述爲兒時誦憶略徧元行冲常載書數車自隨述入其室觀書不知寢食行冲異之曰外家之寳也再讀輙誦蔣乂性銳敏七歳時見庾信哀江南賦再讀輙誦㓜從外祖家學得其書博覽強記本傳授以屬辭之要梁肅李泌集序七歳見丞相張九齡九齡駭其聦異授以屬辭之要治孝經論語蘇世長十歳上書帝異其㓜問讀何書對治孝經論語帝曰何言可道曰爲國者不敢侮於鰥寡爲政以德帝善之此兒器不可量父友監察御史韓思彦歎曰此兒器不可量盧懐謹傳五歳誦六甲十歳觀百家李白上裴長史書七歲能誦數經李華蕭頴士文集序七歲能誦數經十歲以文章知名尚宫有品當拜舒王元名髙祖之在大安宫太宗晨夕使尚宫問起居元名纔十歲保媪言尚宫有品當拜元名曰此帝侍婢耳何拜爲太宗壯之曰真吾弟也白孔六帖卷二十
