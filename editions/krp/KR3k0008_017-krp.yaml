body:
  text: 白孔六帖卷十七唐白居易原本宋孔𫝊續撰夫婦一婚姻二離三同姓婚四賢婦五惡婦六喪夫七喪妻八後妻九妾十美人十一妬十二寵十三别十四辭十五夫婦一白夫夫婦婦所謂順也傳夫和妻柔夫和而義妻柔而正婦聴而婉宜家宜爾室家偕老與子偕老如賔冀缺耨其妻饁之敬相待如賔晉侯曰能敬必有徳以為下軍大夫鳯皇和鳴懿氏卜妻敬仲其妻占之曰吉是謂鳯皇于飛和鳴鏘鏘伉儷不能庇其伉儷好合妻子好合如鼓瑟琴二物傳謂夫婦外内以經二物配耦各有配耦侍執巾櫛禮閑男女義合夫妻絲蘿古詩與君結新婚兎絲附女蘿琴瑟齊體夫妻齊體齊眉梁鴻妻孟光饋食舉案齊眉家肥夫婦和家之肥也禮必敬禮曰昔三代明王之政必敬其妻子妻者親之主也敢不敬焉中則内饋外言内和男行女隨刑于寡妻寡嫡也言文王先施法於妻而後及于邦家以和夫妻夫義婦聽甚宜其妻宜善也禮妻有服不舉樂於其側也禮移天之義一齊之義一與之齊驚死鄭炎遇風疾遭母憂疾甚發動妻厭而驚死妻家訟之不能自治死於獄中加杖晉劉毅散齊妻子有過立加杖以捶之希見朱博不好酒色之宴夜寢早起妻希見其面又劉基字敬輿與羣弟居夜卧早起妻妾希見面諸弟敬憚之門無雜賔客刀環擊魏略桓範為冀州牧屬鎮北將軍吕昭昭才名過於範範後謂妻曰我寜作卿向三公長跪不能為吕子受屈妻曰君前在東座欲擅斬徐州衆人為君難為下今羞為吕屈難為上也範怒以刀環擊妻妻傷胎死範稱疾不就州疾貪王衍妻郭氏貪戾無厭不能禁有幽州刺史李陽京師大俠郭氏憚之衍曰非但我言卿不可李陽亦言不可郭氏為之小損老而納正室魏鍾繇老而納正室葢取宗子雖七十無主婦之義殺朱浮字叔元為彭寵所攻道走恐不脱乃下馬刺其妻僅以身免又齊伐魯魯欲將吴起起妻齊女也起殺之明不與齊及為將大破齊軍同心僶俛同心細君東方朔謂妻曰細君孺人禮曰大夫曰孺人孔薛仁貴妻栁曰夫有髙世之材要須遇時乃發今天子自征遼東求猛將此難得之時君盍圖功名以自顯感知己王義方魏徵異之欲妻以夫人之姪辭不取俄而徵薨乃取女人問其然曰初不附宰相今感知己故也妻諫竇建徳凌敬說建徳怒命扶出其妻諫曰祭酒計甚善王盍用之夫自滏口道乗唐之虛連營漸進以取山北因招突厥西抄闗中唐必還師自救鄭難紓矣今頓兵虎牢下徒自苦恐無功建徳曰此非女子所知兩妻王毛仲有兩妻一上所賜皆有國色生斂房孺復與妻鄭不相中慈姆為言乃具棺召家人生斂之鄭方乳促上道鄭死于行質張萬福初在泗州遇李希烈反陳少㳺悉以部刺史妻子質揚州萬福獨不遣謂使者為我白公妻老且醜不足溷公意卒不行人稱其直蔡將妻烏重𦙍蔡將李端降重􅏷蔡人執其妻殺之妻呼曰善事烏僕射得士心大抵如此不相宜顔思魯初思魯與妻不相宜師古苦諫父不聽娶二妻五代安重榮娶二妻髙祖因之竝加封爵令匹栁玭夫婦之道王化所基韋挺疏教化之端夫婦教化之端公主傳詔不敢仰視權懐恩姿状沈毅每盛服妻子不敢仰視長貧任婦愁杜甫屛迹詩詩稱鵲巢禮榮翟茀杜牧宋叔康妻封制吾昔與卿同營巳者今日一成矣周彬不治産業伏膺儒學刻苦修進俾晝作夜其妻嘗譲之曰汝家兄弟能力稼穡營巳嚢箱豐溢汝之不調無思悔畢向何如荅曰卿嘗與吾市油數金是亦力穡營巳而已但嵗晚必得力及聞先主鎮金陵囊文而往将有事圎邱募四方英秀各為祝史彬所著特加選用署諸衛廵官嗣主與太弟交辟寘之門下錫賚頗厚以所賜金幣陳列于庭謂婦曰吾昔與卿同營巳者今日一成矣比諸伯叔何箇為勝耶尚能讓于吾乎妻曰斯男子之事非婦人女子所能知江南野史婚姻二白聘則為妻廟見為妻在塗稱婦婚姻以時必告父母及時男女得以及時三星在户在隅婚姻時也百兩御之燕爾新婚嬿婉之求女子有行逺父母兄弟爾室宜爾室家我儀實維我儀反馬既嫁三月而反馬左氏鳴鳳之兆見上注從人女子從人藝麻結褵九十親結其褵九十其儀有室三十壮有室禮不息燭禮曰嫁女之家三夜不息燭思相離也謂親骨肉也不舉樂娶婦之家三日不舉樂思嗣親也謂重世變也又曰婚禮不用樂幽隂之義也欲令子婦深思其義嗣親見上注遵附逺之文娶於異姓所以附逺厚别也卜先近之日禮吉事先近日親迎男女親迎男先於女剛柔之義授室婦降自阼階授之室明婦為家主二十女二十而嫁男女以正六禮納采問名納吉納徴請期親迎奠鴈御輪合巹禮曰主人筵几於廟壻執鴈入揖讓升堂再拜奠鴈降出御婦車而壻授綏御輪三周共牢而食合巹而酳所以合體同尊卑以親之著代承家男贄大者玉帛小者禽鳥以彰物也女贄不過榛栗棗修以告虔也萬代婚禮萬代之始秦晉匹也何以卑我髙國傳曰敝無存曰此役也不死反必娶於髙國髙國貴族也歸我仲子歸于我注婦人謂嫁曰歸好仇仇匹求士娶妻隂禮周禮以隂禮教親則人不怨注隂禮男女之禮也婚姻以時則男女不怨曠多婚周禮荒政十曰多婚注荒年不備禮婚姻也詩曰古者國有凶荒則殺禮而多婚㑹男女之無夫家者所以蕃育人民嘉禮冠婚之禮許嫁禮曰女子許嫁而纓注繫纓示有從人之端授幣禮女自歸禮婚以禮成妻由義合布幣五兩御輪三周既繫許嫁之纓遂執告虔之贄女辭家而適人辭家委巷在塗是稱家事必慎令儀婚惟著代禮貴及時衿鞶展慶榛栗告虔女既辭家婦将授室桃李恐失當年榛栗遂移他族娶巫家女漢黄覇字次公為陽夏游徼與善相者共載見一婦人相者曰此婦人合富貴不然相書不可用也覇推問乃鄉里巫家女也遂娶之後位至丞相配嫁晉書武帝制女年十七父母不嫁使長吏配嫁世婚漢鄭崇字子游本髙宻大族世與王家相嫁娶也逆婦先配傳鄭公子忽如陳逆婦先配而後祖陳鍼子曰是不為夫婦誣其祖矣三月乃奠菜儀禮婦入三月乃奠菜以筐祭用槿祝曰某氏来婦敢奠菜于皇舅姑婦拜扱地扱地猶男子稽首也承我宗事儀禮父醮子曰往迎爾相承我宗事施衿施鞶母施衿結帨勉之曰毋違宮事庶母及門内施鞶申之以父母命遂人以樂婚擾甿田勸婚姻也周禮判妻入子者皆書之媒氏掌萬人之判男女成名已上皆書年月日以名焉令男三十而娶女二十而嫁凡判妻入子者皆書之注入子嫁女也入云容媵姪娣不聘也書之别未成婚禮也入幣不過五兩凡嫁子娶妻也榖圭以聘女若粟文也造端禮造端乎夫婦重責本於婚婭以著代重責婦順焉女壮勿用娶女易人序婚姻不賀人之序也匪寇婚媾易謂無冦難即往就婚也逺耻公羊婚禮不稱主人逺耻也宋公使公孫来納幣稱宋公辭窮劉范劉氏范氏世為婚姻聞子有客賀娶妻曰聞子有客使某羞禮在途稱婦公羊在國稱女在途稱婦入國稱夫人繫援董叔娶於范氏曰将以求繋援也他日董祁愬於范獻子獻子執而縳之於庭槐叔向曰求繫既繫矣求援既援矣欲而得之無所謂也遲暮離騷恐美人之遲暮及年嵗之未晏繁息漢書恵詔女子十五已上至三十不嫁五算欲人繁息勾踐令國中女子十七不嫁罪父母太早王吉字子陽以夫婦人倫為之大綱夭夀之萌世俗婚姻太早未知為人父母之道而有子故人多夭省俸禄賑婚姻任延為九真太守駱越俗無嫁娶禮延令男年二十至五十女年十五至三十相匹配貧無聘財令長吏以下省俸禄賑婚姻悔㛰魏志王褒字偉元與管彦男女各始生許為婚彦為西夷校尉褒女更許人彦弟馥白褒褒曰賢兄葬父於洛陽随妻還臨淄用意如此何婚之有賀婚晉王彪之曰賀娶妻者是因酒食而有慶語愚謂無直相賀之禮而有禮貺共慶㑹之義亂倫之始陸玩為侍中司空兄曄録尚書父英髙平相玩子納尚書令王導初至江左請婚於玩玩曰培塿無松柏薰蕕不同器玩雖不才不為亂倫之始合二姓之好上以事宗廟下以繼後世也老而納正室鍾繇見上注彈非耦齊沈約彈王源嫁女與滿璋男鸞彈文曰璋之下錢五萬源以所聘餘直納妾王滿連姻實駭物聽潘楊之睦有異於此文選王滿見上注潘楊潘岳作楊仲武誄曰潘楊之睦有自来也禁相賀宣詔郡國二千石或擅為苛政禁人嫁娶不得具酒食相賀由是廢鄉里之禮令民無所樂非所以導民也其勿行苛政也軺軿劉歆等新㝎婚禮親迎立軺軿馬軺立乗小車也軿馬驪駕也諸生皮弁韓延夀為潁川定嫁娶喪祭儀品令文章校官諸生皮弁執爼豆為吏民行嫁娶禮皮馬之禮晉所司奏婚禮納徴大婚用𤣥纁束帛加圭馬二駟王侯𤣥纁束帛加璧乗馬大夫𤣥纁束帛加羊古以皮馬為庭實天子加穀圭諸侯加大璋可依周禮改璧用璋其羊鴈酒米𤣥纁如故諸侯婚禮加納采告期迎各帛五匹及納徴馬四匹皆夫家自備唯璋官為具用羊晉書云羊者佯也然則婚者有羊漢末始也斂錢助婚阮脩字宣子居貧年三十未有室王敦等斂錢為助皆名士也時有求入錢不得者舊姻詩曰不思舊姻委禽公子黒彊委禽焉黒字子晳人倫所資伉儷斯重齊體一行義存偕老形分一氣乾坤為八卦之門人列三才夫婦為五倫之首天地之位既分夫婦之禮斯著入幣五兩束帛周禮三十而娶周禮男三十而娶女二十而嫁媒匪斧析薪如之何匪斧不克娶妻如之何匪媒不得因針線因針而入不因針而急女因媒而嫁不因媒而親伐柯如之何匪斧不克娶妻如之何匪媒不得不交禮曰男女無媒不交媒娉彊媒良媒從人曰歸因媒而嫁媒氏周禮行媒禮曰男女非有行媒不相知名妻以禮求為人作媒晉索紈字叔徹有孝亷令狐策夣立氷上與氷下人語紈曰氷上為陽氷下為隂隂陽事也士如歸妻迨氷未泮婚姻事也君在氷上與氷下人語為陽語隂媒介事也君當為人作媒氷泮而成婚㑹太守田豹因䇿為子求張氏女仲春成婚孔族屬姻家李敬元進吏部尚書凡三娶皆山東舊族又與趙李氏合譜故臺省要職多族屬姻家服除乃婚于志寧衡山公主既服除将下嫁志寧曰服可以例除情不可以例改心喪成婚非人情所忍於是公主待服除乃婚潜相聘娶髙士亷王妃主壻皆取當世勲貴名臣家未甞尚山東舊族後房𤣥齡魏徴李勣復與婚故望不減然每姓第其房望雖一姓中髙下懸隔李義府為子求婚不得始奏禁焉其後天下衰宗落譜昭穆所不齒者皆稱禁姻家益自貴凡男女皆潜相聘娶天子不能禁世以為弊云以姻戚進竇威帝嘗引入卧内謂曰昔周有八柱國吾與公家是也今我為天子而公為内史令事固有不等邪威懼頓首謝曰臣家在漢再為外威至元魏有三皇后今陛下龍興臣復以姻戚進夙夜懼不克任帝笑曰公有三后族夸我邪闗東人與崔盧婚者猶自矜大公世為帝戚不亦貴乎嫁娶必多取資髙士亷初太宗嘗以山東士人尚閥閱後雖衰子孫猶負世望嫁娶必多取貲故人謂之賣婚王化所基韋挺上疏曰夫婦之道王化所基故有三日不舉樂之感今婚嫁之初雜奏絲竹以為宴歡官司習俗弗為條禁請婚禇遂良薛延陀請婚帝已納其聘復絶之遂良曰信為萬事本百姓所歸故文王許枯骨而不違仲尼去食存信貴之也通㛰名族李日知貴諸子方緫角皆通婚名族時人譏之引就清列李懐逺與李林甫善常慕山東著姓為婚姻引就清列天子嫁女皇后娶婦蕭至忠韋后嘗為其弟洵與至忠殤女㝠婚至忠又以女妻后舅崔從禮子無詖兩家合禮帝主蕭后主崔時謂天子嫁女皇后娶婦㛰嫁齊澣開府王毛仲寵甚與龍武将軍葛福順相婚嫁毛仲奏請無下從澣乗間曰福順典兵馬與毛仲為婚家小人寵極則姦生不豫圖且有後患不欲與寒鄉凡裔為姻對尚官宋若昭欲以學名家家亦不欲與寒鄉凡裔為姻對用㛰家典帳中兵李聽以威刑操下用婚家竇綬典帳中兵驕驁怠沓牙將李臣則因衆不忍夜斬綬首宗族孤孺者皆為㛰嫁徐岱宗族孤孺者皆為婚嫁結婚張孝忠為成徳軍節度使朱滔悉兵攻之帝詔李晟率師援孝忠滔解去孝忠因與晟結婚本傳嫁故人孤女嚴挺之嫁故人孤女數十人當時重之斥廪婚嫁栁仲郢衣冠孤女不能自歸者斥廪為婚姻蕃華不得通㛰盧鈞擢嶺南節度使蕃獠與華人錯居相婚嫁多占田營第舎有吏或撓之則相挺為亂鈞下令蕃華不得通婚禁占田産闔部肅一無敢犯為立夫家貞元後流放衣冠孤女稚兒為立夫家主其婚嫁顔春卿臨終捉真卿臂曰爾當大吾族顧我不得見以諸子諉汝後真卿主其婚嫁破酒韋宙出為永州刺史初里民婚出財㑹賔客號破酒晝夜集多至數百人貧者猶十數力不足則不迎至滛奔者宙條約使畧如禮俗遂改有姻屬韋元旦與張易之有姻屬易之敗貶感義尉無與為㛰栁宗元貶永州司馬移書言情曰荒陬中少士人女子無以為婚世亦不肯與罪人親昵以是嗣續之重不絶如縷彊使孽子㛰昵干頔常怒判官薛正倫奏貶陕州長史比詔下頔中悔奏復署舊職正倫死以兵圍其居彊使孽子婚昵取世家子杜中立開成初文宗欲以真源臨真二公主降士族謂宰相曰民間修婚姻不計官品而上閥閲我二百年天子顧不及崔盧耶詔宗正卿取世家子以聞中立及校書郎衛洙得召見禁中拜著作郎月中遷光禄少卿駙馬都尉尚真源長公主許㛰劉悟傳裴敞冕之裔辟悟府悟竒之故為從諫納其女裴年十五火光起袿下家人以為怪因許婚封燕國夫人宋宣逺與盧懐慎姻家崔沔監察御史宋宣逺與盧懐慎姻家恃以弄法姚崇子彝留司東都通賔客招賄賂沔将按劾崇懐慎方執政共薦沔有史才改著作郎去其權盖憚之也託繫援於髙門實光榮於舊族見哀羇旅申以婚姻託繋援於髙門實光榮於舊族代李丕與郭誼書汨喪亷耻唐賛遭晉播遷劉石亂華百宗蕩析士去墳墓子孫猶挟系録以示所承而伐閥顯者至賣婚求財汨䘮亷耻天子屢抑不為衰長女當及事誰助出帨縭韓文近代㛰禮當迎婦以粟三升填臼席一枚以覆井枲三斤以塞窻箭三枝置户上婦上車聓騎而環車三匝女嫁之明日其家作黍臛女将上車以蔽膝覆頭而婦入門舅姑以下悉從便門出更從門入言當躪新婦迹又婦入門先拜猪樴及竈酉陽雜俎定㛰店續幽恠録韋固少未娶旅次宋城遇異人倚嚢坐向月檢書如西國梵字云此幽㝠之書固曰然則君何主曰天下之婚爾因問囊中赤繩子云以繋夫妻之足雖仇家異域此繩一繫終不可易君妻乃此店北賣菜陳嫗女爾固逐之入菜市見眇嫗抱二嵗女亦陋老人指示之固怒磨小刀付奴曰殺彼女當賜汝萬錢奴翌日刺於稠人中才眉間爾後十四年以父蔭叅相州軍刺史主泰妻以女年十六七容貌端麗眉間常帖花鈿未嘗暫去逼問之曰妾郡守之猶子也父卒于宋城任時襁褓乳母鬻蔬以給朝夕嘗抱于市為賊所刺痕尚在因盡言宋城宰聞之名其店曰定婚崗頭澤底國史補張說好求山東婚姻與張氏親者皆為甲門四姓鄭氏不離滎陽又崗頭盧澤底李上門崔皆為顯族約不論財資韓愈寄立之詩老婦願嫁女約不論財資言姻喜附葭栁宗元詩玉臺挂寳鏡持此意何如坦腹東床下由来志氣疎李白詩兎絲附蓬麻引蔓故不長杜甫新婚别兎絲附蓬麻引蔓故不長嫁女與征夫不如棄路傍生女有所歸雞狗亦得將同上頗謂秦晉匹從来王謝郎同上凡七姓十家不得自為婚髙儉為氏族志又詔後魏西李寳太原王瓊滎陽鄭温范陽盧子遷盧澤盧輔清河崔宗伯崔懿晉趙郡李楷凡七姓十家不得自為婚女福豐厚必有令匹栁玭家訓曰東都仁和里裴尚書寛子孫衆盛實為名閥天后時宰相魏元同選尚書之先為壻未成婚而魏陷羅織獄家徙鎮嶺表及北還女已踰笄其家議無以為衣食資願下髪為尼有一尼自外至曰女福豐厚必有令匹子孫將遍天下宜北歸家人遂不敢議及荆門則裴齎装以迎矣今勢利之徒捨信誓如反掌則裴之蕃衍乃天之報施中外姻嫁其禮獻皆親閱之鄭餘慶㛰日𠡠北軍供帳李泌無妻不食肉帝乃賜光福里第彊詔食肉為娶朔方故留後李暐甥婚日𠡠北軍供帳將授室而罷白敏中初帝愛萬夀公主欲下嫁士人時鄭顥擢進士第有閥閲敏中以充選顥與盧氏婚将授室而罷䘖之諸王子孫凡㛰聘必先因韓虢以請輒皆遂至數百千金貴妃楊氏女孫適崔臯裁九品衛佐帝重其不婚權家鄭覃傳一村惟兩姓世世為婚姻白樂天陳村詩錦繡張道待其至藩鎮朱滔初回紇以女妻奚王至大厯末奚亂殺王女逃歸道乎盧滔以錦繡張道待其至請為婚女悦許焉遣使修壻禮於回紇回紇喜報以名馬重寳借吉而㛰蒋乂張孝忠子茂宗尚義章公主母亡遺言丐成禮帝念孝忠功即日召為左衛将軍許主下降乂上疏以為墨縗禮本緣金革未有奪喪尚主者禮違人情不可為法帝令中使者諭茂宗之母之請乂意殊堅帝曰卿所言古禮也今俗借吉而婚不為少對曰俚室窮人子旁無至親乃有借吉以嫁不聞男冐凶而娶陛下建中詔書郡縣主當㛰皆使有司循典故母用俗儀公主春秋少待年不為晚請茂宗如禮便帝曰更思之㑹太常博士韋彤諫曰婚禮主人几筵聽命稱事立文謂之嘉所以承宗廟繼後嗣也喪禮創巨者日久痛甚者愈遲二十五月而畢謂之凶所以送死報終示有節也故夫義婦聽父慈子孝昔魯侯改服晉襄墨縗緣金革事則有權變安有釋縗服衣冕裳去堊室行親迎以凶瀆嘉為朝廷爽法疏入帝迕其言促行前詔然心嘉乂有守禮部郎中凡婚嫁花釵禮衣六品以下妻及女嫁則服之其次花釵禮衣庶人女嫁則服之凡婚嫁之服資廕髙者皆以髙唐六典離三白怨耦曰仇失儷儷耦也鳥獸猶不失儷傳仳離有女仳離啜其泣矣棄背花落色衰復相棄背愛弛以色事人色衰而愛弛義絶夫婦之義絶反目易曰夫妻反目同心有怒我怨及爾偕老老使我怨不爽二三女也不爽士貳其行女也罔極二三其徳衰薄夫婦日以衰薄谷風刺夫婦失道也離絶棄其舊室夫婦離絶國俗傷敗覆水難收斷絃可續塵泥浮沉異路弦䇢離合非常上山採靡蕪下山逢故夫叱狗鮑永字君長養後母至孝妻嘗於母前叱狗永即去其妻啖棗王吉字子陽妻取東家棗啖吉吉乃去婦東家欲伐樹請吉去婦復還求去朱買臣負薪其妻羞之求去買臣曰吾五十當富貴今四十九矣妻怒曰終當餓死遂去之去室蘇武還漢生妻去室下堂糟糠之妻不下其堂糟糠榛栗去閤故人從去閤送畿薄送我畿伋也之妻子思曰不為伋也妻是不為白也母秋扇棄捐箧笥中恩情中道絶别鶴商陵牧子娶妻五年無子父母欲為改娶乃援琴為别鶴操比予于毒棄我如遺士三出妻逐於境外言二三其徳也出管子禮曰舅姑怒則子放婦出而不表禮焉不表謂不明言其過不宜其妻宜善也禮束緼去婦復還不安左傳莒子娶女于向向姜不安莒而歸莒人入向以姜氏還也来歸傳凡諸侯之女歸寧曰来出曰来歸喪服喪服小記婦當䘮而出則除之為父母喪未練而出則三年既練而出則己未練而反則期既練而反則遂之注云當喪當舅姑之喪出除喪絶族逆喪榖梁杞伯来逆叔姬之喪傳曰夫無逆出妻之喪無子梁叔魚三十無子欲出其妻商瞿曰吾年四十有子五人恐子晚出耳非妻之過矣陳平兄漢陳平與兄伯居嫂嫉平不親家産伯聞逐其妻金賞霍光以女妻金賞以霍氏事有萌牙上書去妻上哀之得不坐法李充後漢李充貧兄弟六人同衣遞食妻竊謂充曰妾有私財願分異充曰醖酒具㑹鄉里共議及賔至充從座中跪白母曰此婦無状教充離異充母兄弟不可承宗事遂呵叱妻出門黄允後漢以黄允為雋才知名郭林宗曰卿有絶人之才恐守道不篤袁隗見允曰得壻如此人足矣允聞之遂遣其妻夏侯氏婦謂姑曰今日見弃方與黄氏長别乞一㑹以展離訣集客二百餘人婦禳袂而前數允隠匿穢事十五言畢登車而去允遂廢於世仇怨晋書王珣及珉皆謝氏壻太傅安既與珣絶婚又離珉妻遂為仇怨蕩舟之遣傳齊侯與蔡姬乗舟于囿蕩公公懼色變禁之不止公怒歸之未之絶也蔡人嫁之遇故妻朱買臣字翁子為㑹稽太守入呉界見故妻與夫治道令後車載其夫妻到太守舎園中給之食一日妻自縊死與夫錢令葬送以妻與人東胡使使求冒頓妻閼氏左右請擊之冐頓曰奈何與鄰國惜一女子乎取所愛閼氏與之始託微波終傾覆水卷流黄以去閤罷織素於登山於妻有眷尚妍桃李之姿在壻無情頓改松蘿之契女一其心士二其行參商聚怨徒悲出閤之情水火生嫌詎荅下山之問聽秋風於静室臉淚恒齊鑒明月於空牀愁腸欲斷雖求里母束緼難招繼召鄰人斷絃可續生離楚詞曰悲莫悲乎生離别夫妻再合黄昌字真聖初為書佐其妻遇賊被掠轉入蜀為人妻後昌為蜀郡守其妻因治事至於府中昌以其不類蜀人問其由妻曰妾夲㑹稽書佐黄昌妻遭亂入蜀昌左足下有黒子常自言當為二千石昌出足示之相持悲泣乃還為夫妻陳詵妻晉李繁姊先適陳詵生四子遭亂詣賊請活姑命賊遂掠将去詵更娶嚴生子暉繁後得姊歸詵詵藉注二妻及李亡詵疑制服以言於庾亮司馬王愆期議曰案禮不二嫡故惠公元妃卒繼室以聲子諸侯猶然况庶人乎為詵也妻則為暉也母暉之制服無所疑矣詵有老母不可莫之養妻無歸期納妾可也李雖没賊尚有尋求之理而便娶妻詵之短也畝隴之夫不逹禮義施孝叔妻失身於郤犨而不棄者以非其罪李鄙野之人臨危請姑險不忘順可謂婦矣士喪禮曰繼室故稱繼母事之如嫡故先嫡後繼亮從之兩妻晉賈充前妻李氏坐徙後娶郭氏女後李氏以大赦得還詔充置左右夫人充母亦勑充迎李氏郭氏怒曰刋定律令佐命之功我有其分李那得與我竝乃為李築館舎於外也孔逐妻令狐建擢左神武大将軍其妻成徳軍節度使李寳臣女也建将棄之誣與門下客郭士倫通榜殺士倫而逐其妻寳臣請案劾無状詈媵婢出妻李迥秀母閒不樂迥秀即出其妻或問之荅曰娶婦要欲事姑苟違顔色何可留李元素其妻石泉公主方慶之孫前妻子皆不肖而元素溺姬侍主不見荅元素乆疾益昏惑遂出之主訴諸朝詔免元素官且令畀主貸五百萬落花辭枝羞故林李白白頭吟東流不作西歸水落花辭枝羞故林覆水再收豈滿杯棄妾已去難重廻覆水不可收行雲難重尋同上代别情人同姓㛰四白辨姓男女辨姓禮之大同君子惡之子産曰僑聞之内官不及同姓其生不殖羙先盡矣則相生疾君子是以惡之晉侯内實有四姬焉皆同姓不娶買妾則卜禮曰娶妻不娶同姓故買妾不知其姓則卜之不書姓傳曰昭公娶于吳故不書姓徒聞盧癸賦詩斷章取義孰曰昭公知禮陳司敗問昭公知禮乎孔子曰知禮司敗曰君娶於吳為同姓謂之吳孟子君而知禮孰不知禮避宗盧蒲癸妻慶舎女同宗也人謂之曰男女辨姓子何不避宗何也曰宗不余避余焉避之賦詩斷章予取所求焉惡避宗注云苟有求於慶氏不復避宗譬如賦詩直取斷章之義不蕃傳曰男女同姓其生不蕃附逺禮娶於異姓所以附逺厚别也有别男女有别無别無義禽獸之道防人禮曰以禮防人魯春秋猶去夫人之姓曰吳其死曰孟子卒同姓故也本枝同族吳魯之百代不通禮曰吳魯而婚姻不通者周道然也出嗣而㛰本族魏志陳矯本劉氏子出嗣舅氏而婚本族徐宣每非之太祖惜其材乃下令曰喪亂前事一切勿論姓同源異司空陳萊王基當世大儒而不逹禮為子納司空王沉女以姓同源異又王莽娶王咸女以為源異不同而娶之設灋而威小人制禮以防君子孔李光進母李賢婦五白妻柔而正婦聽而婉婦順禮曰婦順備而後内和理然後家可長久四德婦言婦道婦容婦功執婦道以成肅雍之徳婉娩聽從婉言語娩容兒邦之媛兮詩云美女為媛下之趙姬謂趙衰曰請逆盾及其母曰得寵而忘舊何以使人固請逆之以叔隗為内子而已下之以盾為才使為嫡子使其子下之讓夫樂羊子得遺金而歸其妻讓之曰妾聞君子不以小利汚其行如玉之徳匪石之心作程垂範閨闈和柔婉淑叶淑女之詩守夫人之灋晉書時人稱鍾夫人之禮郤守夫人之法謝女之貞道韞曹家之訓大家婦式婦之式周禮從夫禮曰婦人從人者幼從父兄嫁從夫夫死從子甚宜其妻宜善也禮姆教姆是女師教以徳禮和順積中禮婉容禮鳲鳩鵲巢鵲巢夫人之徳也國君積行累功以致爵位夫人徳如鳲鳩乃可配焉采蘩夫人不失職也晏子之御史記晏子相齊其御之妻窺其夫擁大盖䇿駟馬意氣揚揚其妻請去是日夫自抑損晏子問之以實對薦為大夫林下風閨房秀王凝之妻謝氏道韞有才辯同郡張𤣥妹有才質適於顧氏𤣥稱之以敵道韞有濟尼者㳺於二家或問之尼荅曰王家夫人神情朗徹有林下風氣顧家婦氷清玉映自是閨房之秀戒夫傳曰伯宗每朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難伯宗不從故及國語又曰伯宗歸喜曰吾言於朝謂似陽處父妻曰處父華而不實伯宗飲諸大夫酒妻聽曰大夫莫子若也然民不能其上久矣注云上謂賢在人上知人晉王渾妻鍾氏名琰有文才淑求賢夫有兵家子甚俊欲妻之令與羣小吏雜處琰自帷中察之曰此人才足㧞萃然地寒夀促不足展其器遂止其人數年卒才學竇滔妾蘇氏能屬文滔苻堅時坐徙流沙蘇氏織錦作廻文詩以贈滔循還讀之辭甚清婉智略晉書孟昶妻周氏昶弟顗妻又其從妹家並豐昶與劉裕討桓𤣥欲供軍謂妻曰幸早離絶脫富貴相迎周氏曰事不成於奚官中奉餐大家又謂昶曰君舉措非謀及婦人者時所生女在抱推示之曰此可賣不惜傾産給之将舉謂顗妻曰昨夣不好門内不宜赤色我悉取作七日蔵厭乃置帳中以絳與昶得數十人被服赫然云云武勇晉書符登妻毛氏善騎射登為姚萇所殺乃率壮士與萇戰殺傷甚重為萇所執罵萇而死又劉遐妻邵續女驍果有父風遐為石季倫所園妻單将數騎拔出遐於萬人之中又田防為亂遐應之妻止之不從乃密燒甲都盡又張茂妻陸氏茂為吳郡守被江充所害陸氏傾産率茂部曲為先登討充充敗為陸所殺女荀崧女灌崧為襄城太守為杜曽所圍欲求救於平南将軍石覽灌時年十三率勇士數十人踰城突圍且戰且前詣覽乞師兵至賊走患富吳志李衡每欲治家妻輒不聽後遣人於武陵龍陽洲作宅種甘橘千樹臨死勑兒曰洲里有木奴千樹亦當足衣食耳母曰汝父恒稱太史公言江陵千樹橘當封君家吾曰盖人患無徳義不患不富牛衣漢王章與妻居冬無被卧牛衣中涕泣妻怒呵曰京師尊貴誰如仲卿不自憤激乃反涕泣後章至京兆尹欲上封事妻止曰人當知止章不從竟死獄中鮑宣妻後漢鮑宣妻桓氏字少君宣從桓氏父學父竒其清苦以女妻之資送甚盛宣不悦妻曰既承君子唯命是聽乃短衣布裳與宣共挽鹿車歸拜姑禮畢提甕出汲修行婦道宣至司𨽻才學後漢蔡琰字文姬感亂離悲憤作詩二首又劉榛妻陳氏正旦獻椒花頌生徒受業韋逞母宋氏置生徒百二十人隔絳紗受業先姊行袁隗妻馬融女少有才辯隗謂曰弟先兄舉世以為笑今處姊未適前行可乎對曰妾姊髙邈未遇良匹不如鄙薄茍然而已誡孫女張負嫁孫女與陳平誡之曰無以貧故事人不謹事兄伯如父事嫂姑如母齊眉梁鴻伯鸞賃舂於臯伯通廡下妻每饋食不敢仰視舉桉齊眉救夫罪蔡琰字文姬重嫁於董祀祀犯法當死文姬詣曹操請之時賔客滿座操曰蔡伯喈女在外為諸君見之文姬進蓬首徒行請罪音辭清辯㫖甚哀痛操乃出祀罪小郎解圍謝道韞事見嫂叔門詠雪謝氏内集雪下安曰白雪紛紛何所似兄子朗曰撒鹽空中差可擬兄女道韞曰未若栁絮因風起安大悦道韞王凝之妻孔為世聞婦廣徳公主下嫁于琮凡内外冠婚喪祭主皆身荅勞疏戚咸得其心為世聞婦渉書史鄭義宗妻盧者范陽士族也渉書史能文章草𨽻殷保晦妻封敖孫也名絢字景文能文章草𨽻新粧詩楊盈川姪女曰容華幼善屬文甞作新粧詩好事者稱之進士不櫛闗圗有妹能文每語人曰有一進士所恨不櫛爾南楚新聞不許時世粧崔樞夫人治家整肅貴賤皆不許時世粧因話録敏妻朝野僉載則天朝来俊臣强盛朝官側目上林令侯敏偏事之其妻董氏諫止之曰俊臣國賊也勢不久可敬而逺之敏梢梢而退俊臣怒出為涪州武龍令敏欲棄官歸董氏曰速出莫求住遂行至州以刺謁侯不許上敏憂悶董氏曰任莫求去後五十日忠州賊破武陵殺舊縣令畧家口並盡以不許上獲全俊臣誅逐其黨敏又獲免一子未嘗至都城太平廣記狄仁傑為相有盧氏堂姨居橋南别墅姨止一子未嘗至都城仁傑每伏臘晦朔修􅙦甚謹常休假候姨安否適見表弟挾弓矢擕雉兎來歸進膳顧揖仁傑意甚輕簡仁傑因唘姨某今為相表弟何樂願悉力從其㫖姨曰相自貴爾姨止有一子不欲令事女主仁傑大慙而退崔𤣥暐母盧有賢操本傳惡婦六白婦怨無終女子難養近之則不遜逺之則怨語豔妻之煽詩豔妻煽方處怨耦曰仇疾郭氏之貪衍以其妻郭氏鄙口不言錢傲佷法度反易剛柔悖慢驕佚蠱媚惑亂險詖之心不思淑女之章且壊夫人之法三嫁管子女三嫁入于舂榖言見由是不貞順也竒衺媚也周禮隂訟謂争中冓之言庸奴其夫外黄富人女庸奴其夫言視其夫若庸奴也不宜其妻宜善也禮以此防民婦猶有不至者不至謂不親於夫不孝於舅姑婦順不修禮牝雞之晨書曰牝雞無晨牝雞之晨惟家之索家索索盡也言雌代雄鳴則家盡乗夫詩乗陵也孔剛悍楊𢎞武帝嘗讓曰爾在戎司授官多非其才何耶𢎞武曰臣妻剛悍此其所屬不敢違以諷帝用后言也帝笑不罪悍驕戾沓元載妻王氏河西節度使忠嗣女悍驕戾沓元載叵禁善士所惡薛克創有器識族人黄門侍郎顗以弟紹尚太平公主問於克創荅曰室有傲婦善士所惡夫惟淑徳以配君子無患可矣顗不敢沮而紹卒誅殺二侍兒房孺復又娶崔昭女崔悍媚殺二侍兒私瘞之兇暴喜鞭楚人薛仁杲妻亦兇暴喜鞭椘人見不勝痛宛轉於地者則埋其足露腹背受捶喪夫七白夫死不嫁禮一與之齊終身不改故夫死不嫁齊謂共牢而食自誓栢舟共姜自誓也共伯早死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之詩畧曰之死矢靡它靡忒晝哭穆伯之喪敬姜晝哭孔子曰知禮也天窮老而無夫謂之寡此天人之窮而無告也未亡人寡婦自謂殱我良人郊吊傳曰齊侯伐莒莒獲杞梁齊侯歸遇杞梁妻於郊使人吊之對曰植之有罪何辱命焉若免於罪猶有先人之敝廬在下妾不敢與郊吊齊侠遂吊於室植杞梁名城崩琴操曰杞梁死其妻無子乃求夫屍於城下哭之道路聞之者皆揮淚十日而城崩竹死湘川記舜廵狩蒼梧而崩二妃不從以淚染竹竹盡成班而死也斷髪割鼻皆古之寡婦自誓不嫁失儷煢獨潘岳之賦共姜之詩從子禮夫死從子稽顙禮婦人為夫與長子稽顙其餘則否夜哭禮寡婦不夜哭伊寡婦之利詩夫由義合喪以禮成義重移天哀深沒地死同穴夫既溘至妻将疇依屍還隂氏後漢隂喻妻荀爽女名采少寡父母彊嫁與郭弈爽以詐疾召采采歸而懐白刃爽令執奪到郭氏偽為歡建四燈請共談弈敬憚之曙弈出采勑左右辦浴入室令侍人避以粉書扇上曰屍還隂氏字未成恐人来乃以衣帶自縊而死刑耳劉長卿妻桓鸞女生一男五嵗長卿卒逺嫌不歸寧男十五而夭乃刑其耳自誓宗婦愍之曰若家無他意何貴義輕身曰先君五更尊為帝師男以忠孝女以貞順稱是以豫刑以明我情沛相王吉上奏題其門號景行義桓邑有祀黄鵠歌列女傳陶嬰夫死守義作黄鵠歌歌曰悲夫黄鵠之早寡兮七年不雙飛宛頸獨宿兮不與衆同夜半悲鳴兮想其故雄其命早寡兮獨宿何傷嗟此寡婦兮泣下數行嗚呼哀㢤死不忘兮鳥尚然况其夫良雖有賢雄兮終不重行魯人聞之遂不復求嫠婦莒婦人莒子殺其夫已為嫠婦孔哀毁成疾韓愈盧氏銘元和五年尚書薨夫人哀毁成疾當門戸備祭祀劉禹錫譔史公僕射神道碑史孝章妻博陵崔氏僕射之喪自沒竟至葬當門户備祭祀建碑表皆崔氏之能且命其家老具事功来乞辭以傳于後哭聲一何苦白氏聞哭昨日南鄰哭哭聲一何苦問之身哭夫夫年二十五存念平生之形儀張銑注文選寡婦賦仿彿存念平生之形儀酸惻之懐吕向注寡婦賦為時序漸逺哀情降歇而酸惻之懐日以甚也喪妻八白天窮禮老而無妻謂之鰥所謂天人之窮而無告也舞鏡孤鸞念其雌見鏡而舞鼓盆莊子妻死恵子吊之乃鼓盆而歌悼亡潘岳有悼亡詩失儷伉儷廬杖晉劉寔字子真喪妻為廬杖之制終喪不御肉輕薄笑之寔不以為意祥服世説孫楚妻亡至祥服乃為詩以悼之以示王武子武子見其文曰未知文生於情情生於文覽之悽然增伉儷之重傷神世説荀奉倩妻曹氏有豔色妻嘗病熱奉倩恒以冷身熨之之妻亡人吊不哭而傷神未㡬奉倩亦亦卒宴㑹免官晉書廬江太守梁龕明日當除婦服今夕請客奏妓丞相長史周顗等三十人同㑹司直劉隗奏曰夫嫡妻長子皆杖既除而宴請免龕官削侯爵顗等知龕有喪吉㑹所禮宜奪俸一月殺妻史記吳起仕魯齊人攻魯急起娶齊女為妻恐疑之起欲就名乃殺其妻以明不與齊也遂攻齊大破自縊朱買臣既為㑹稽守其妻羞乃自縊而死自溺秋胡妻恨其夫乃自溺而死蕣華蒿里不杖禮曰為妻喪父母在不杖不稽顙私喪妻喪也禮妻以義親服從恩制再娶吳志孫承字仲嗣喪妻父昭欲為索諸葛謹女孫權聞而勸之遂為婚行志後漢符融貧妻亡無以殯斂鄉人欲為備棺服融不受曰古之葬者棄之中野唯妻子可以行其志但即土埋蔵而已葬妻後漢陳蕃喪妻還葬鄉里人畢至唯許劭不往或問曰仲舉性峻峻則少通不可造又時人多不行妻服云云佳人難再得荀璨字奉倩娶曹洪女卒歎曰佳人難再得見上注輕重相反張璠漢記山陽太守薛勤喪妻不哭臨殯曰幸不為夭折復何恨又王龔妻亡與諸子並杖行服時人兩譏之葬妻犯禾季子羔葬妻犯人之禾申祥以告曰請庚之子羔曰吾為邑宰於斯買道而葬後難繼也不再娶漢王駿妻死不娶或問之駿曰徳非曾參子非華元何敢再娶又韓詩外傳曰曾參喪妻不更娶人問之曰以華元善也又後漢楊秉早喪夫人不娶又魏志管寧妻卒知故勸再娶寧曰每省曽子王駿之言意常嘉之豈違本心倚戸觀化荘子徳宫之喪潘岳誄楊仲武曰徳宫之喪謂妻喪也孔約家人無以哭聞母所李畬妻惣故時母病恐悲傷約家人無以哭聞母所朝夕省侍無憂色不娶王維喪妻不娶孤居三十年早喪妻李珏舉桉来饁劉禹錫傷往賦我行其野農民桑者舉案来饁亦在林下我觀于塗裨販之夫同荷均挈荆釵布襦物莫失儷以孤處我方踽踽而焉如指遺袿兮能認愬空帷兮欲歸又曰寳瑟僵兮絃柱絶瑶臺傾兮鏡奩空見巾箱之故封同上刀尺之餘澤見巾箱之故封斂其遺服月旦一出陳之侍御武君當年喪其配歛其遺服櫛珥縏帨于箧月旦十五日則一出陳之抱嬰兒以泣韓愈吊武侍御所畫佛文葬玉埋香玉溪編事孟蜀時秦州節度使王承儉築城獲瓦棺中有石刻曰隋開皇二年渭州刺史張崇妻王氏銘文有深深葬玉鬰鬰埋香之語云臼中炊江淮王生善卜有賈客張贍將歸夣炊臼中問王生生曰君歸不見妻矣臼中炊無釡也賈客歸妻已卒酉陽雜爼四十喪妻丁公著四十喪妻終身不畜妾後妻九白殺前妻子後漢龎參為太尉夫人疾前妻子投於井殺之參素與洛陽令祝良不平率吏入太尉府按實其事遂䇿免繼室傳臧宣叔娶于鑄生賈及為而死繼室以其姪穆姜之姨子逐子薛包字孟嘗母喪以至孝聞父娶後妻而憎包乃出之包日夜號泣不能去至被杖毆不得已廬於舎外旦夕入而灑掃父怒又逐之乃廬於里門晨昏不廢積嵗餘父母慙而還之謀出外蜀志劉表受後妻語愛少子琮長子琦謀自安㳺後園上髙樓去梯謂諸葛亮曰言出子口入吾耳可言乎亮曰君不見申生在内死重耳在外而安琦乃隂規出計非等閑之語也織縑古詩新人工織縑故人工織素孔韋后乳媪竇懐貞㑹嵗除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎懐貞唯唯俄而禁中寳扇鄣衛有衣翟衣出者已乃韋后乳媪王所謂莒國夫人者故蠻婢也懐貞納之不辭世謂媪婿為阿㸙懐貞每謁見奏請輙自署皇后阿㸙而人或謂為國㸙軒然不慙以自媚於后再娶盧邁再娶無子假姓虞許敬宗嬖其妾因以繼室假姓虞斷髪李徳武妻裴氏以孝聞鄉黨徳武坐事徙嶺南時嫁方踰嵗父矩表離婚徳武謂裴曰我方貶無還理君必儷它族于此長訣矣荅曰夫天也可背乎願死無它後十年徳武未還矩決欲嫁之斷髪不食矩知不能奪聽之徳武娶爾朱氏赦還聞其全節乃遣後妻為夫婦如初妾十白賤妾魏武子有賤妾疾曰必嫁是妾及病甚曰我死必以為殉及卒子從治命嫁之嬖妾愛妾歸妾燕燕衛荘姜送歸妾也衣帛季孫相魯無衣帛之妾買妾不知其姓則卜之織蒲臧文仲妾織蒲三不仁也犇則為妾聘則為妻不敢失孝經曰理家者不敢失於臣妾不聘傳聲伯之母不聘穆姜曰吾不以妾為姒誘妾書曰不敢誘偷臣妾汝則有常刑當夕禮妻不在妾御莫敢當夕謂進御於君上僭緑衣衛荘姜傷巳也妾上僭夫人失位云云生子禮妾将生子及月辰使人日一問之謂諸侯也有子則緦禮士妾有子而為之緦無子則已長子服妾為君之長子與女君同注不敢以恩将服君之正統妾袝於妾祖姑無袝祖姑則易牲而袝於女君可也注曰女君嫡祖始也易牲而袝凡下女君一等自獻其身以此防民民猶有自獻其身脅齊媵之先者公羊禘于太廟用致夫人稱姜氏貶也譏以妾為妻脅於齊媵之先者注公聘楚齊君媵脅公以為夫人也無以妾為妻孟子齊桓公盟諸侯于葵丘再命曰無以妾為妻愿欲笄之國語楚司馬子期欲以妾為内子訪左史倚相曰吾妾愿欲笄之注内子服衡笄外婦漢齊悼惠王母為髙祖外婦旁妻王禁多娶旁妻禁元后父小妻武帝詔枚乗乘㜸子臯之母小妻不肯随乗怛妾腐木劉輔上書於成帝曰腐木不可以為柱卑人不可以為主毒張彭祖舊恩封陽都侯為小妻所毒漢宣帝時為妾出妻魏氏春秋鍾㑹母寵於父繇繇出其夫人太后為言文帝詔復之繇憤恚餐椒市噤乃止喪服車𦙍上言喪服禮制庶子為母緦麻三月傳曰尊非為體賢妾蘇秦謂燕王曰客有逺為吏其妻私人夫至使妾舉藥酒進之妾欲言恐逐主母勿言殺主父於是佯僵仆而棄酒主父大怒笞五十杖妾一僵上存主父下存主母身受笞此忠信而得罪也絡秀周顗母李氏字絡秀顗父浚為安東将軍求絡秀為妾父兄不許絡秀曰門户殄瘁何惜一女子遂與之生顗顗長母曰我屈節為汝家妾不與我為親吾亦不惜餘年顗等從命為方雅之族也見夫人晉書漢魏故事王公羣妾見夫人夫人不荅拜新禮亦宜荅拜摯虞議曰以妾事女君如婦事姑則敬與婦同而加賤也宜不酬荅齊縗禮悼公之母死哀公為之齊縗有若曰為妾齊縗禮與公曰吾得已乎哉魯人以妻我言皆為我妻也文過之言官女妾也犇孟僖子泉丘女夣以帷幕孟氏之廟遂犇於孟僖子送妾祭遵兄以遵無子以妾送之遵不受曰以身任於國不敢慮繼嗣孔以妾為妻李齊運晚以妾為妻具冕服行禮士人嗤之飬子李勣謂弼曰我死衆妾願留養子者聽餘出之母事父妾崔渙有嬖妾子縱以母事父之妾剛酷雖縱顯官而數笞詬然率妻子候顔色承養不懈時以為難稍畜伎妾裴漼晚節稍畜伎妾厚妾薄妻嚴武幼豪爽母裴不為挺之所荅獨厚其妾英武始八嵗恠問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戱殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也父竒之曰真嚴挺之子汙逼崔寧在蜀久兵寖彊而肆侈窮欲将吏妻妾多汙逼驍果崔寧其弟寛守成都楊子琳乗間起瀘州寛戰力屈寧妾任素驍果即出家財十萬募勇士得十人設部隊自将以進子琳大懼㑹糧盡且大雨引舟至廷乗而去不荅其妻齊澣納劉戒女為妾不荅其妻李林甫惡其行擠而廢之鬻女為人妾李徳裕蜀人多鬻女為人妾徳裕為著科約凡十三而上執三年勞下者五嵗及期則歸之父母以妾為夫人杜佑議者謂佑治行無缺惟晚年以妾為夫人有所蔽云不置李珏早喪妻不置積媵妾王仁皎積媵妾私通劉褘之垂拱中或告褘之與許敬宗妾私通太后遣肅州刺史王本立鞫治以勑承褘之曰不經鳳閣鸞臺何謂之勑后以謂拒制使賜死于家幽妓妾别舎揚慿入拜京兆尹與御史中丞李夷簡素有隙因劾慿江西姦贓及它不法詔李鄘趙昌即臺叅訊于時慿幽妓妾於永樂别舎謗議頗讙故夷簡藉之痛擿發欲抵以死内無妾媵鄭覃旦夕問省楊晟𨽻鳳翔軍節度使李昌符畏其勇欲殺之妾周擿使亡去昌符死晟得妾周母事之周請為妻晟固辭旦夕問省乃視事納妾李義府洛州女子淳于以姦繫大理義府聞其羙屬丞畢正義出之納以為妾側室劉悟子從諫妻裴從諫有妾韋願封夫人許之詔至裴怒毁詔不與從諫他日㑹裴黨復出詔裴抵去曰淄青李師古四世阻命不聞側室封者君承朝廷姑息宜自黜削求洗濯顧以婢為夫人族不日滅耳從諫赧然止侍姬盈房李林甫尤好聲妓侍姬盈房李伊衡以妾為妻為王妾侍裁十數竇建徳及為王妾侍裁十數私侍賔客南唐李煜嘗以韓熈載盡忠能直言欲用為相而熈載後房妓妾數十人多出外舎私侍賔客煜以此難之左授熈載右庶子分司南都熈載盡斥諸妓單車上道煜喜留之復其位已而諸妓稍稍復還煜曰吾無如之何矣主書韋陟常以五采牋為主記使侍妾書之姢然衣羅紈鳴珥環房魯上節度使書堂皇數仭侍婢姢然衣羅紈鳴珥環出聲態者累百栁枝絳桃語林二侍妾名栁枝絳桃其後王廷湊有夀陽絶句不見園花并巷栁馬頭惟有月團團盖寄意二姝及歸栁枝竄樊素小蠻白居易櫻桃樊素口楊栁小蠻腰侍妾也刻玉為倒龍佩唐樂史緑珠傳崇美妾千人擇數十人粧飾一處忽使視之相分别刻玉為倒龍佩結繞檻而舞千金駿馬換少妾李白襄陽歌千金駿馬換少妾笑坐雕鞍歌落梅女寳太和九年牛羊日厯寶厯中李愿太尉晚得一青衣乃色中之尤者乃字之曰女寳意取季倫緑珠臻於此及愿老乃曰今老矣乃家蔵一女寳曽不問非臣所宜如得善文者希一表進之吾無恨矣乃求於楊漢公美人十一白淑姬詩彼美淑姬可與晤歌螓首蛾眉清揚婉兮靜女其姝彼美淑姬見上注洵美洵信也鍾美尤物天有尤物足以移人甚美必有甚惡捧心而嚬施芳澤設笄珥珥􅖰耳也靡曼雉齒婑媠列子子産弟公孫穆後庭比房擇雉齒婑媠趙女鄭姬北方有佳人美者顔如玉如玉見上注姱容修態楚辭雲雨巫山神女朝為行雲暮為行雨千金買笑巧笑之瑳瑳巧笑兒佩玉之儺乃可反行有節也孔惟擇美者崔顥娶妻惟擇美者矯詔強娶來俊臣傳王慶詵女適叚簡而美俊臣矯詔強娶逼亂之王旭為侍御史紀希虬兄為南劍令坐贓旭奉使臨訊見其妻美逼亂之因殺其夫雲鬢儼分行翠眉縈度曲雲鬢儼分行杜甫華屋艷神仙同上秋日詠懐霧中花有鄰夫自外歸見婦吹火贈詩曰吹火朱唇動添薪玉腕斜遥看烟裏面一似霧中花出笑林諸將有掠得人之美女者以遺道道不能却寘之别室訪其主而還之五代史馮道非人所有畢諴上恩顧特異許以為相令狐綯所忌連徙之鎮皆綯緩其入相之謀也諴思有以結綯在此門得絶色非人所有者盛飾珠翠専使獻綯綯一見心為之動謂其子曰尤物必害人畢太原於吾無分今以是餌吾将傾吾家族也一見立反之使人不敢将回驛候諴意諴又瀝血書輸唘事於綯綯終不納乃命吏貨之東頭醫李𤣥伯上所狎昵者以錢七十萬致於家乃舎上堂坐之𤣥伯執賤役以事之踰月盡得其歡心焉乃進於上上見大惑之寵冠六宫𤣥伯燒伏火丹進以市恩澤上瘡疾作𤣥伯之罪也懿宗即位與山人王岳道士盧仙芝俱棄市東觀奏記妬十二白螽斯美后妃無妬也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮逮下樛木后妃逮下也言能逮下而無嫉妬之心焉夫人無妬忌之行則恵及賤妾入宫而妬史記女無美惡入宫而見妬專房之寵賈氏之種晉武帝欲為太子納妃帝曰賈氏之種妬而少子樊氏之賢楚荘王樊姬進女於王勝巳者二人如巳者七人惡女之仇史記好女入室惡女之仇不宜其妻宜善也禮夫婦之道苦苦謂不至不荅不使視𫝊叔向之母妬叔虎之母美而不使懼視謂叔向曰深山大澤實生龍蛇予生龍蛇以禍汝予何愛焉棄子後漢龎參妻棄前妻子於井中絶嗣晉書賈充妻郭槐疑充視乳母笞殺之其子黎人思慕乳母不食他乳遂死及生小子亦然充遂絶嗣無此句謝太傅劉夫人不令公有别房公頗欲立妓妾生姪等微逹此㫖共訊夫人因方便稱關睢螽斯有不妬之徳夫人問誰撰此詩荅云周公周公是男子相為耳使周姥撰詩當無此句南郡主欲殺李氏妬記曰桓司馬以李勢女為妾南郡主㧞刀率婢數十人往李所因欲斫之見李在窻前梳頭髪垂委地姿貌絶麗乃徐下地結髪歛手向主曰國破家亡無心以至今日若能見殺猶生之年神色閑正辭㫖悽惋主乃擲刀抱之曰我見猶憐何况老奴害色謂之妬密置妾王導妻曹氏性妬導憚之乃密置衆妾於别館以處之曹氏知而将往導恐被妻辱遽命駕猶恐遲以所執麈尾柄驅牛而進求絶謝邈茂度妻鄭氏妬怨懟與邈書邈以書非婦人之辭疑其門生仇𤣥逹為之作遂斥逐𤣥逹被傷晉祖約妻無男性妬約亦不敢違忤常夜寝於外為人所傷疑妻所為求去職不許劉隗劾曰約新荷殊寵當敬以直内而患為婢妾身被刑戮宜貶黜帝不罪孔悍妬張亮更娶李氏李悍妬刵耳劓鼻宜城公主下嫁裴巽巽有嬖姝主怒刵耳劓鼻斷巽髪帝怒斥為縣主刻眉酉陽雜爼房孺復妻崔氏性忌左右婢不得濃粧髙髻月給燕脂一豆粉一錢有一婢新買粧稍佳崔怒曰汝好粧耶我為汝粧乃令刻其眉以青填之燒鏁梁灼其兩眼角皮随手燋卷以朱傅之及痂脫瘢如粧焉莊宗愛姬甚有色而生子后心患之荘宗燕居宫中元行欽侍側荘宗問曰爾新喪婦其復娶乎吾助爾聘后指愛姬請曰帝怜行欽何不賜之荘宗不得已陽諾之后趨行欽拜謝行欽再拜起顧愛姬肩輿已出宫矣荘宗不樂稱疾不食者累日以鐵錐刺閩王延翰妻崔氏延翰多選良家子為妾崔氏性妬良家子之美者輒幽之别室繫以大械刻木為人以手擊其頰又以鐵錐刺之死者八十四人五代史妬婦津臨濟有妬婦津相傳言晉太始中劉伯玉妻叚氏性妬忌伯玉常於妻前誦洛神賦語其妻曰娶婦得如此吾無憾焉段氏曰君何以水神美而欲輕我吾死何愁不為水神其夜乃自沈而死死後七日託夣語伯玉曰君本願神吾仐得為神也伯玉寤而覺之遂終身不復渡水有婦人渡此津者皆壊衣杜粧然後敢濟不爾風波暴發醜婦雖粧飾而渡其神亦不妬也出酉陽雜俎不可以死恐朝野僉載兵部尚書任瓌賜二豔姬妻妬爛其髪秃盡太宗聞之賜金缾酒曰飲之立死不妬即不湏飲栁氏拜敕曰妾與瓌俱出盡微賤更相輔翼遂致榮官今多内嬖誠不如死乞飲無他帝謂瓌曰人不畏死不可以死恐朕尚不能禁卿其奈何其二女令别宅安置君王雖愛蛾眉好無奈宫中妬殺人李白玉壺吟西施宜美復宜嚬醜女效之徒嫉身君王雖愛蛾眉好無奈宫中妬殺人月㸃錢㸃仐婦人面飾用花子起自昭容上官氏所製以掩㸃跡大厯以前士大夫妻多妬悍者婢妾小不如意輒印面故有月㸃錢㸃雜俎寧知趙飛燕奪寵恨無窮李白怨歌行薦枕嬌夕月卷衣戀春風寧知趙飛燕奪寵恨無窮李益少癡而忌克世謂李益少癡而忌克防閑妻妾苛嚴寵十三白畫眉漢京兆尹張敞為婦畫眉長安傳張京兆眉有司奏宣帝問之對曰臣聞閨房之中夫婦之私有過於畫眉上愛其能不責之遺肉漢武帝令東方朔自責朔曰㧞劍割肉一何壮也割之不多又何亷也歸遺細君又何仁也上笑賜酒一石賜肉百斤將遺細君悦己女為悦己者容荀奉倩之深情鍾夫人之重愛小吏為妻先引蕭望之為御史大夫使小吏冠法冠為妻先引遷太子太傅甚宜其妻宜善也禮擇璫賦珥食殘桃竊王車孔自為小君裁衣鳳池編李紳為相時俗尚輕綃紫蘸碧為婦人衣紳自為小君裁衣寵極愛還歇李白妾薄命妍好去婦詞新寵方妍好寵煽赫然武后淑麗冠後廷郭貴妃淑麗冠後廷故寵異之漢帝寵阿嬌貯之黄金屋咳唾落九天随風生珠玉李白妾薄命蕭良娣方幸后引内後宫以撓妃寵武后與后爭寵蕭良娣有寵而武才人以先帝宫人與后爭寵更相毁短廢后王氏傳智算警頴迎意輙悟帝大悦遂専房楊妃傳造芸輝堂紫綃帳龍綃衣元載姬薛瑶英杜陽雜編五代唐莊宗先時攻梁軍於夹城得符道昭妻侯氏寵冠諸宫宫中謂夹寨夫人别十四白思伯樹萱詩曰焉得萱草言樹之背願言思伯使我心痗望夫化石望夫不歸身化石於山之上飛蓬詩曰自伯之東首如飛蓬豈無膏沐誰適為容廻文竇滔妻見賢婦門注蕩子不歸古詩蕩子去不歸空牀難獨守牽衣魏文帝詩将適千里道妻子牽衣袂斂枕禮夫不在斂枕箧簟席襡器而藏之襡示藏塵泥之難古詩君為清路塵妾作濁水泥攀桃李兮不忍别孔團雪散雪辭魏國憲穆公主下嫁王士平主恣横不法帝幽之禁中錮士平于第坐交中人貶賀州司戸門下客蔡南史獨孤申叔為主作團雪散雪辭壮離曠意帝聞怒捕南史等逐之㡬廢進士科思相離漢陽公主名暢下嫁郭鏦辭歸第泣不自勝徳宗曰兒有不足邪荅曰思相離無它恨也帝亦泣顧太子曰真而子也暮婚晨告别嫁女與征夫不如棄路傍結髪為妻子席不煖君林暮㛰晨告别無乃太怱忙杜甫新㛰别泣盡影傷劉良注文選别賦織錦為廻文詩使成章句以寄於夫思念别離故泣盡影傷愁如廻飈亂白雪李白久别離南楚材妻詩進士南楚材始娶薛氏後㳺頴川欲别婚貴族遣奴取琴書以示無歸意薛知見絶乃自圖其形題詩其側以寄有云恐君湏忘却時展畫圖看楚材大慙雲溪友議髙城已不見况乃城中人歐陽詹寄太原官妓麗情集金瓶落井無消息李白寄逺憶昨東園桃李紅碧枝與君此時初别離金瓶落井無消息令人行歎復坐思空留錦字表心素至今緘愁不忍窺上腸随廻紋結織錦作短書腸随廻紋結相思欲有寄恐君不見察覆水不可收行雲難重尋代别同上常嫌玳瑁孤去婦詞自從離别久不覺塵埃厚常嫌玳瑁孤猶羡鴛鴦偶李白寒沼落芙蓉秋風散楊栁同上趙瑟初傾鳳凰柱蜀琴欲奏鴛鴦絃此曲此意無人傳願随春風寄燕然長相思上漢口雙魚白錦鱗贈輔録事漢口雙魚白錦鱗令傳尺素報情人其中字數無多少秪是相思秋復春别時雙鴛綺留此千恨情碧草生舊迹緑琴歇芳聲韋應物詩心逐江水流自從為夫妻何曽在鄉土去年下揚州相送黄鶴樓眼看帆去逺心逐江水流李白江夏行辭㛰十五白非偶左傳鄭公子忽有功於齊齊侯請妻之忽辭人問其故忽曰人各有偶齊大非吾偶也今奔齊之急而受室以歸是以師婚也辭與弟傳敝無存之父将室之辭以與其弟曰此役也不死反必娶於髙國注言欲立功娶卿相之女又後漢王謙為何進長史以謙名公之胄欲與為婚見其二子使擇焉謙不許以疾免又魏志賈詡字文和嫁娶不結髙門天下之論智計者歸之又魏志張範字公儀袁隗欲以女妻範範辭不受又桓階字伯緒劉表欲妻之姪女階自陳結婚處拒不受又陸玩為侍中司空兄曄尚書僕射録尚書事父英髙平相玩子納尚書令王導初至江左請婚於陸陸曰培塿無松栢薰蕕不同器玩不為亂倫之始又漢儁不疑字曼倩為京兆尹大将軍欲以女妻之固辭久之以病免又楊駿欲以女妻鄭黙曰每讀儁不疑傳常嘉之中官女典畧曰中官常侍唐衡欲以女妻汝南傅公明公明不娶轉以女妻荀彧彧父緄慕衡勢誡彧娶之為論者所譏臣松之云時閽豎用事四海屏氣尤懼唐衡威權莫二順則六親以安違則大禍立至斯以存易亡之由昔蔣詡姻于王氏無損清髙之操緄之此婚庸何傷乎彧字文若不許婚孫權遣使為子索關侯女侯罵辱其使不許婚權大怒悔婚王褒偉元與管彦為友約男女為婚彦後葬父於洛陽褒遂别嫁其女謂彦弟馥曰昔嫁妹妹皆逺吉凶絶斷今賢兄葬父洛陽則京邑之人豈吾結好之意㢤馥曰嫂是齊人也當還齊哀曰豈有葬父洛陽而随妻還齊如此去就復何婚之有諫婚晉劉寔妻卒華氏将以女妻寔弟智諫曰華家貧類必汚門户寔辭不得已竟婚而生子夏寔後坐夏受賂免官頃之為大司農又以夏犯罪免官喪婚見哀部注孔為子請婚張延賞與李晟有夙憾及俱入朝韓滉從容邀晟平憾且使薦延賞於帝復拜平章事既而宴禁中帝出瑞錦一端以示和解因為子請婚延賞不許晟曰吾武夫雖有舊惡盃酒可解儒者難犯外睦而内含怒今不許婚釁未忘也白孔六帖卷十七
