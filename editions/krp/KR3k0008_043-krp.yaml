body:
  text: 白孔六帖卷四十三唐白居易原本宋孔傳續撰官闕惡一休假二舉薦三舉選四知人五藻鑒六失所舉七官闕惡一白毁舊府晉羊祜督荆州時長吏䘮官人多毁舊府祜以死生有命下征鎮禁之請替惡闕范甯求補豫章帝曰不宜令守無以身試死甯臨行上䟽云云公亮於幽顯可以經夷險而不變不敢居官舎晉樂廣為河南尹官舎多怪前尹不敢居廣居之孔菑除其署李吉甫改郴饒二州㑹前刺史繼死咸言牙城有物怪不敢居吉甫命菑除其署以視事云以栁易播中山劉夢得亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭願以栁易播遇有以夢得事白上者於是改連州韓文五谿不毛處劉禹錫傳叙張九齡為宰相建言放臣悉徙五谿不毛處然九齡自内職出始安有瘴癘之歎罷政事守荆州有拘囚之思身出荒陬一失意不能堪矧華人士族必致醜地然後快意哉天荒闕忻州刺史是天荒闕盖厯任多死時有金吾郎將任此官舎果有蛇怪後亦絶之饒州餘干令宅亦如此南部新書勸易署寢李珏治淮南三節度皆卒於鎮人勸易署寢珏曰上命我守揚州是實正寢若何去之戸部為凶官畢搆進戸部尚書乆之移疾帝手䟽醫方賜之當時以户部為凶官遽改太子詹事冀其愈㑹卒邠署相傳刺史視其壞莫敢葺李聽拜邠寧節度使邠署相傳不利治垣舎前刺史視其壞莫敢葺聽曰將出鑿凶則何避治署亟使新之卒無畏休假二白休謁休請從吉休沐歸休請給長假並假名也予告賜告漢律令二千石有予告有賜告予告者在官有功最法所當得者也賜告者病滿三月當免天子優賜其告帶印綬將官屬歸家治疾至成帝時賜告不得歸家自馮野王始杜欽言於王鳳曰竊見令云吏二千石告過長安謁不分別賜予今有司以為予告得歸賜告不得是一律兩科失省刑之意夫三最予告也注在官連有三最則得予告也或病滿賜告詔恩也今告則不得失輕重之意鳳不聽竟坐野王後遂為常也過長安謁漢令曰吏二千石過長安謁注云謁者自謁得告也律吏二千石已上告歸歸寧道不過行在所者便道之官無辭漢律五日一沐漢律吏得五日下言休息以洗沐也晉令一月五給晉令給假者一月五給一年之戸六十日為限里内者病疾中延二十日及道政觧故九十五日也解職晉起居注武帝詔大臣疾假滿三月不差解職弔死問疾後漢祝晧字子春篤於仁義為吏休歸先周旋鄉里弔死問疾畢乃還家恤䘮拜老後漢呉馮字子髙為郡吏毎休假先存恤行䘮孝子次瞻疾病畢拜覲耆老然後還家定省宋書王敬則子恢之為秘書郎恢之常請假東還定省遊集世說車武子為侍中與東亭諸人期共遊集乃早請給荷擔後漢許荆字子張家貧為吏休假嘗單歩荷擔清節稱於鄉黨䇿杖後漢范丹字史雲為郡功曹每休假常單歩䇿杖山郎漢書故事郎出錢市財用給文書乃得出名曰山郎注云山財所出故曰山郎移病盡一日輒償一休注云出財者能休常在外貧者實病皆以休假償之其豪富郎日出遊戯或行錢得善部貨賂流行傳相放效楊惲為中郎將罷山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎皆化之莫不自勵不肯休薛宣為馮翊賊曹掾張扶至日獨不肯休坐曹治事宣出教曰盖禮貴和人道尚日至吏以令休所繇來久曹雖有公事家亦望私恩掾宜從衆歸對妻子設酒肴請鄰里一笑相樂亦可矣扶大慙不與休魏志劉類為宏農守使不與休假專使為不急也退食自公休沐未嘗出門張安世精力於職多病賜告汲黯多病疾且滿三月上嘗賜告者數焉終不愈不欲出文帝幸鄧通通亦愿謹不外交雖賜洗沐不欲出也又董賢聖卿便僻善媚毎賜沐浴不省出歸常留中視醫藥哀帝乃詔賢妻得通籍入殿中違假史李園求事春申君為舎人謁歸故失期還謁春申問之對曰齊王使求臣女弟與使者飲故失期也又賈逵梁道為豫州刺史兵曹從事受前刺史假逵到數月乃還逵考竟免之不限日拜墓假晉陸煜仕錄尚書求歸鄉里拜墳墓有司奏舊制假六十日顔含馮懐以為煜居台司受託付大臣之義夲在忘忌既蒙詔許省墳墓豈容有期愚謂宜還自還不湏制日詔從之葬妻魏舒元陽為尚書三娶妻皆亡是年自表乞假葬妻詔賜地及錢孔休沐如令李德裕元和後數用兵宰相不休沐或繼火乃得罷德裕在位雖遽書警奏皆從容裁决率午漏下還第休沐如令沛然若無事時得告還鄉里高智周為侍讀得告還鄉里嘆曰進不知退取禍之道也即移病去太學生謁急狄仁傑太學生謁急后亦報可仁傑曰人君惟生殺柄不可假人至簿書期㑹宜責有司學徒取告丞簿職耳若為報可則胄子數千凡幾詔邪為定令示之而已后納其言遇休日使至第召王琚毎見閤中視日簿乃得出遇休日使至第召之謁告上冢魏元忠謁告上冢詔宰相諸司長官祖道上東門賜錦袍給千騎四人侍賜銀千兩許休澣張薦顔真卿為李希烈所拘遣兄子峴及家僕奏事五輩皆留内客省不得出薦上䟽望許休澣告以安否䟽奏盧杞持之不報休沐遂兹日韋應物休沐東還貴胄里詩休沐遂兹日一來還故墟休沐去人逺髙齊出林杪答李博士上公門懸甲令澣濯遂其私授衣日還田里詩上舉薦三不薦士附白禹稱善人不善人逺矣稱舉也舉不失德出淹滯趙宣子為政振廢滯祁奚舉善舉讎舉子君子曰能舉善矣利其翹楚務在擇人選於衆舜有天下選於衆舉臯陶不仁者遠矣湯有天下選於衆舉伊尹不仁者遠矣烝我髦士烝進也夫舉無他唯善所在選於衆所試如有所譽者其有所試矣無求備於一人或以事舉或以德進或以言揚待舉待取儒有席上之珍以待聘忠信以待舉力行以待取推賢而進儒有推賢而進達之不望其報其舉賢援能有如此者援引也善不可失取節於葑菲考其德藝周禮舉以賢良漢令諸侯舉賢良方正直言極諫之士秀才茂才輒以名聞引薦白屋韓子對揚紫殿劉琨非常之才不次之用進賢推士鄭當時好進賢推士推擇捜揚濟濟多士舉類傳惟其善故能舉其類顯忠遂良旁求上薦登庸羣材允釐庶政人代天工雍熈可致賢為國寶側陋必揚當側席之求膺及門之選道既日彰賢亦歲貢稽諸虞典審九德而擇賢考彼漢章懸四科而取士漢三公辟召以四科取士一曰德行高妙二曰通經學三曰饒法令四曰剛毅多略也漢書進賢達吏周禮太宰以八統御萬人三曰進賢四曰使能七曰達吏謂一舉勤勞之小吏也賢能之書周禮卿大夫獻賢能之書于王王再拜受之登于天府注書書賢者名也王拜受之重得賢也及門進士之門同升諸公君子于時實惟難進主司取士亦不易知俊造俊士造士也士之秀者始以名稱終因事舉舉賢使能禮既升歌於鹿鳴將接武於鴻漸請效禹稱善人庶使衛多君子推轂坐舉人漢華陰守丞嘉上封事言朱雲可試守御史大夫坐之拔茅易拔茅茹以其彚征吉言賢人能進拔同類也無行韓信家貧無行不得推擇為吏薦武士叔孫通專言群盗壯士進之弟子百餘人怨通通曰漢王方蒙矢石諸生寧能鬬邪狐裘反衣漢楊興言於史髙曰將軍所舉不過門下賔客富貴在身烈士不舉是有狐白裘而反衣之平原匡衡材智有餘隨牒逺方髙乃辟衡爲儀曹吏提衡張湯杜周相爲提衡引重竇嬰灌夫二人相爲引重引重相稱舉也處士薦人符融公府連辟皆不應太宗薦代有名稱到官請融相見融徃薦逹郡士范甯韓卓孔伷三人因辭自絶抗孤士朱穆曰韓安國之操不能抗一孤士況其下乎爲將用儒士後漢祭遵爲將軍取士皆用儒術有私或問第五倫公有私乎對曰人有與吾千里馬者雖不受毎三公有所與送心不能忘亦終不用豈能謂無私賔薦士不薦士後漢杜宻爲北海相去官居潁川毎謁郡守多所陳託同郡劉勝字季陵亦自蜀郡告歸閉門掃軌無所干及太守王昱謂宻曰劉季陵清髙士宻知昱激已對曰勝位爲大夫是禮上賔而知善不薦聞惡無言隱情惜已同於寒蟬此罪人也令宻達力行之士不亦萬分之一乎昱慙而服其言恥舉主張儉元節舉茂才以刺史非其人謝病不起兄弟頻舉呉劉繇字正禮兄岱字公山平原陶丘洪薦劉岱後欲舉正禮刺史曰前年已舉公山洪曰若明公用公山於前擢正禮於後所謂御二龍於長途騁騏驥於千里也卧龍蜀先主屯新野徐庻曰諸葛孔明卧龍也不可屈致將軍宜枉駕管庫趙文子爲政舉管庫之士七十有餘家死不屬其子薦盜管仲於群盜中拔二人用之曰可人也其所與游僻也察舉揚厯魏王基舉管寧曰優賢揚厯注揚其所能而厯試出自幽谷遷于喬木詩伐木丁丁鳥鳴嚶嚶喻朋友相引薦薦延年舉自代丙吉病上問誰可代君對曰杜延年明法度于定國執憲議詳平也陳萬年篤厚於行後皆稱職上以爲有知人之鑒又呉周瑜病於鎮舉魯肅自代又鍾皓爲功曹太守問誰可代曰西門亭長陳寔寔曰鍾君似不察人何獨我知不薦士詔舉武猛士賀良無所薦上問之曰平生未常交士衛鞅因景監見人知其不約今士得臣舉亦非榮故不敢薦之也不舉雜學山簡季倫領吏部上䟽請公卿各舉所知廣得才之路毎聽政曰令公卿先議選舉各言所見鄉邑尤異者皆以名奏主者隨缺先叙是爵人於朝與衆共之義朝廷從之邑宰舉魯恭爲中牟令薦名士方帝即徵方與公卿所舉同有瘡不舉張輔孟侯爲東郡守郡吏王青祖父與翟義同起兵攻王莽莽燒殺之父隆爲都尉功曹青爲小吏與父俱從都尉遇賊隆以身衛全都尉死於難青亦被矢前太守以青有金瘡不舉輔歎其一門忠義遂薦青三世死節宜蒙顯異辭舉鄧攸伯道祖父殷有賜官勅攸受之後太守勸攸官欲舉爲孝廉攸曰先人所賜不可改之孔奬薦後進李百藥好奬薦後進宰相職當進賢李吉甫始執政以情謂裴垍曰吾落魄逺裔更十年始相天子此日人物吾懵不及知且宰相職當進賢任能君精鑒爲我言之垍即崖略䟽三十許人吉甫籍以薦于朝天下翕然稱得人推轂士于休烈樂賢下善推轂士甚衆刺舉不阿王播知雜事刺舉不阿有能稱所取多才寔士王鐸爲禮部侍郎所取多才寔士爲世稱誦時時進賢才偉望李訓時時進賢才偉望以恱士心人皆感之或自寒冗躐進至侍從太平公主有所論薦或自寒冗躐進至侍從旋踵將相所薦贏四十人杜淹檢校吏部尚書參豫朝政所薦贏四十人後皆知名樂引後進于志寧愛賔客樂引後進然多嫌畏不能有所薦逹也互相推引薛登爲左補闕時選舉溢甚乃上䟽曰比觀舉薦類不以才馳聲假譽互相推引非所謂報國求賢者也閻立本薦狄仁傑授并州法曹薦使君美於朝郭翰者嘗爲御史廵察隴右多所按劾至寧州狄仁傑爲刺史民争言有異政翰就館以筆紙置于案謂僚屬曰入其境其政可知願薦使君美于朝毋久留即命駕去三品至九品並得薦士魏元同上䟽制書三品至九品並得薦士此誠仄席旁求意也但褒貶不明故上不憂黜責下不盡捜揚薦于朝李滋客荆郢間起學廬講授建中初黜陟使趙賛薦于朝起處士授試校書郎奬士類拔孤仄李景譲性奬士類拔孤仄李蔚楊知退皆所推引舉引寒俊鄭薰再知禮部舉引寒俊士類多之請臺閣長官得自薦其屬陸贄秉政始請臺閣長官得自薦其屬有不職坐舉者用人之長張說善用人之長多引天下知名士以佐佑王化粉澤典章成一王法以恩終始張嘉貞有嗜進者汲引之能以恩終始所薦中書舍人苖延嗣等皆位清要日與議政事故當時語曰令君四俊苗呂崔貟愛善無遺李吉甫引薦賢士大夫愛善無遺并表其書竇群傳啖助春秋學著書數十篇蘇州刺史韋夏卿薦之朝并表其書報闕不召選德進賢初不計私韋表微翰林學士缺人人争薦丞相所善者表微獨薦韋處厚人服其公進知制誥後與韋處厚議増選學士復薦路隋處厚以諸父得表微因曰隋位崇入且翁右奈何答曰選德進賢初不計私也不因介紹張行成補殿中侍御史糾劾嚴正太宗以爲能謂房元齡曰古今用人未嘗不因介紹若行成者朕自舉之無先容也每以用人爲先朱敬則及執政毎以用人爲先細務不省也嶺表蠻叛以裴懐古有文武才用爲桂州都督蠻服其威惠相率降薦魏知古爲鳯閣舍人張思敬爲右史皆稱職大才當大用韋安石蘇良嗣當國謂安石曰大才當大用薦書參同薛珏左遷峽州刺史建中初德宗命使者分諸道察官吏升黜焉而李承狀珏之簡趙賛言其廉盧翰稱其肅薦書參同於是拜中散大夫賜金紫舉智謀果決才堪統衆者來瑱累遷殿中侍御史伊西北廷行軍司馬詔舉智謀果決才堪統衆者拾遺張鎬薦瑱能斷大事有禦侮才擢潁川太守充招討使中人尉薦呂諲哥舒翰敗潼關諲西趨靈武由中人尉薦肅宗才之拜御史中丞取材者數十人揔牙兵及爲尹奏取材者數十人揔牙兵故威惠兩行求才者貴廣陸贄蕭昕始薦張鎬來瑱在禮部擢杜黄裳高郢裴垍其後鎬興布衣不數年位將相瑱爲將有威名黄裳等繼輔政並爲名宰登崇俊良韓愈進學解曰方今聖賢相逢治具畢張抜去兇邪登崇俊良占小善者率以錄名一藝者無不庸薦進才髦李季卿在朝薦進才髦文享氣方直才任諫諍李邕特進李嶠與監察御史張廷珪薦邕文享氣方直才任諫諍乃召拜左拾遺知賢而舉仁也邕下獄當死孔章上書天子曰明主舉能而捨過又曰知賢而舉仁也言於𤣥宗召見金鑾殿李白賀知章見其文歎曰子謫仙人也言於𤣥宗召見金鑾殿愛奬士類李華愛奬士類名隨以重若獨孤及韓雲卿韓㑹李紓柳識崔祐甫皇甫冉謝良弼朱巨川後至執政顯官可使尺澤之鯢奮鱗而震海宻網之鳥舉羽而翔霄子之一名何足就矣柳宗元上權補闕不叩而響不介而合則其舉而至而其感亦甚同上舉賢本無私劉竒長壽中爲天官侍郎薦張鷟司馬鍠爲監察御史二人因申屠瑒以謝竒正色曰舉賢本無私何見謝聞者皆竦玉不韜輝唐呂温房元齡賛網羅遺賢推轂群英玉不韜輝蘭無沈馨文粹藏用守道有歲年崔顥薦樊衡書雖白面書生有雄膽大略藏用守道有歲年無蔽賢之咎一品集舉自代所冀虞丘無蔽賢之咎臧孫無竊位之譏好提掖士大夫許孟容好提掖士大夫天下清議上之有所薦進劾爲朋黨李安期帝屢責侍臣以不能進賢安期進曰十室之邑且有忠信天下至廣不爲無賢比見公卿有所薦進劾爲朋黨若陛下忘其親讎惟才是用塞讒毁路其誰敢不竭忠以聞上乎帝嘉納帝譲不推賢進善權萬紀言治銀帝譲不推賢進善鮮有簡拔蕭俛居位頗介謹持法重名器狹於用人毎除吏常憂不稱鮮有簡拔非文詞者擯而不用常衮懲元載敗窒賣官之路然一切以公議格之非文詞者擯而不用故世謂之濌伯以其濌濌無賢不肖之辨云進退士大夫鄭注進退士大夫撓骫朝法賢不肖淆亂以爲弛張當然未踰年除吏八百貟崔祐甫改中書侍郎未踰年除吏幾八百貟莫不諧允請自代令狐彰方疾甚表吏部尚書劉晏工部尚書李勉堪大事請以自代代宗得表咨悼妄進者少衰周墀同平章事河東節度使王宰重賂權倖求同平章事領宣武墀言天下大鎮如并汴者纔幾宰之求何不厭宣宗納之駙馬都尉韋譲求爲京兆持不與繇是妄進者少衰舉選四白觀國之光利用賔于王易我有好爵鴻漸于陸于陸于磐漸進之義遷喬烝我髦士烝進也翹翹錯薪言刈其楚詩獻賢能之書周禮鄉老及鄉大夫群吏獻賢能之書于王王再拜受之登于天府禮凡語郊者必取賢斂才焉或以德進或以事舉或以言揚樂正論造士之秀者升於司馬曰進士論辨然後使之司馬辨論官材論進士之賢者以告于王而定其論各署其所長也舉不失選傳署行議年髙詔中丞執法郡守舉有明德者遣詣相府署行議年年幾也行狀也計偕武詔吏人有明當世之務習先儒之術者縣次續食令與計偕縣次給之食仲舒發之武帝隆儒術及仲舒對䇿明孔氏抑百家立興學校州郡舉孝廉茂才皆仲舒發之三適武帝時公卿議曰古者諸侯貢士一適謂之好德再適謂之賢三適謂之有功乃加九錫以弓矢車馬也不貢士一則黜爵再則黜地三而削地畢矣不舉孝不奉詔以不敬論不察廉不勝任當免奏可也本仁祖義褒德録賢五帝三王所由昌也武詔得真宣帝詔舉廉吏誠欲得真也吏六百石位左右有罪自今以來毋得注云不復舉爲廉吏也内惡未發平帝詔諸有贓及内惡未發而薦舉者勿案驗也四科漢制見上薦舉門三互後漢以州郡相黨人情比周乃制婚姻家及兩州人士不傳對相監臨後有三互法禁忌轉宻選用艱難蔡邕上䟽宜去三互法帝不省言竟不用限口舉人後漢丁鴻與司空劉萬上言自今郡國率二十萬歲貢孝廉四十萬二人六十萬三人八十萬四人以此爲增減不滿二十萬二歲一人不滿十萬口三歲一人蠻夷錯雜不爲數魏令十萬户察孝廉一人府秀不拘戸口限年又尚書令左雄議改察舉之制限年四十儒者試經學文吏試章奏胡廣駮之曰選用材無拘定制六竒之䇿不出經學鄭阿之政非章奏甘竒入用年乘彊仕終軍揚聲亦在弱冠帝不從遂班下郡國唯茂才異行者不拘年清儉太祖爲丞相司空毛玠爲東曹掾與崔琰並典選舉所用皆清心之士雖於時有盛名而行不由夲者終莫能進務以儉率人由是天下莫不以亷節自勵雖貴寵之家車服不敢過度和治字士陽議儉非中道云云守文衛臻典選舉蔣濟與書曰漢以亡虜爲將周拔漁父爲太師何必守文答曰古人遺智惠而任度量湏考績而加黜陟今予開拔竒之律使天下馳騁也畫地作餅魏盧毓爲吏部尚書諸葛誕鄧颺騁名譽有四䆫八違之謠帝疾之時舉中書侍郎詔曰莫取有名以名如畫地作餅言不可啖也毓曰名不足以得異人可以得常士常士畏教慕善然後有名臣以循名責實無官績但常有以驗其後古者敷奏以言明試以功考績法廢故真僞相蒙帝詔作考績法不抑寒素王藴爲吏部郎不抑寒素毎一官缺求者十輩無所是非連狀白之某人有地某人有才各隨其方不得者不怨之也山濤啓事山濤爲僕射典選吏部並得其才再居十餘年一官缺輒啓數人甄拔人物各爲題目時稱曰山濤啓事也甲午制王戎爲吏部爲甲午制凡選舉先治百姓然後授仕也門調戸選司𨽻傅咸奏戎曰書稱三載考績今内外群官職未朞而奏遷未知優劣且送故迎新宜免戎戎與賈郭通親得不坐戎自典選舉未嘗進寒素退虛名與時沉浮門調户選而已後漢四科黄瓊以左雄孝廉之選專用儒學文吏猶有所遺乃増孝悌及能從政爲四科少牢鹿鳴選舉令諸貢人上州三人中州二人下州一人必有才堪者不限其人數具申送之日行鄉飲酒禮牲用少牢歌鹿鳴之詩賔薦鄉賦國光進士秀才考課令進士試時務䇿五條帖大經通四其䇿文辭順序義理愜當并帖經文過者爲通帖策全通爲甲第諸秀才試方䇿五條文理俱髙者爲上上文髙理平理高文平爲上中云云未成分數考功式諸州及國子監貢舉人試官湏對長官判官共加考試至省及第不成分數者其罪以長官爲從雖未成分落第人内有帖試俱不通一者亦依不成分例冒貢薦延病朋漢何武問文吏於儒者問儒者於文吏以相參驗除吏先爲科條以防請托以貌以言宣父尚云有失孔子曰吾以言取人失之宰予以貌取人失之子羽則惠則哲帝堯亦曰其難充賦晁錯策曰乃以臣錯充賦夫十室之邑必有忠信三人同行厥有我師今闔郡不薦一人是化不下究而積行之君子壅於上聞也武詔州叛廢舉孔坦君平帝手策問曰吳興徐馥爲賊殺群將今應舉孝廉可否坦曰罪不相及今徐馥爲逆何妨一郡之賢孔凡四舉皆知名者王起判太常少卿帝患選士不得才時命起典貢舉凡四舉皆知名者人伏其鑒敵數百人杜顗舉進士禮部侍郎賈竦語國曰得杜顗足敵數百人選舉以私宋務光上書長吏貪冒選舉以私宜以簡練爲急魏元同上䟽言選舉法弊曰國之用人如人用財貧者止糟糠富有餘粱肉故當衰弊之乏則磨䇿朽鈍以取之太平多士則遴東髦俊而使之今選者猥多宜以簡練爲急爲時嘉仰岑羲勁亷爲時嘉仰餘見吏部門官無滯人劉林甫建官四時聴選隨到輒擬於是官無滯人選者就案閱簿婁師德在夏官注選者就案閱簿師德曰容我擇之可乎選者不去乃灑筆曰墨汚爾輕地寒李揆苖晉卿數薦元載揆輕地寒謂晉卿曰龍章鳯姿士不見用麞頭鼠目子乃求官邪載聞衘之調者丐留張薦爲吏部侍郎選牒精允調者丐留其奬用皆一時茂秀王邱遷吏部侍郎典選復號平允其奬用皆一時茂秀以進士選無受惡官者柳仲郢知吏部銓德裕頗抑進士科仲郢無所徇是時以進士選無受惡官者又當調者持闕簿令自閱即擬唱吏無能爲姦升沈在牙頰間楊虞卿善諧麗權倖倚爲姦利歲畢選者皆走門下署第注貟無不得所欲升沈在牙頰間當時有蘇景𦙍楊元夫而虞卿兄弟汝士漢公爲人所犇向故語曰欲趨舉場問蘇張蘇張猶可三楊殺我吏道多端本乎選用失當劉蕡䇿類得優調於時被選者二十有三人所言皆冗齪常務類得優調先収寒素李固言爲吏部侍郎既領選案籍自擬先収寒素柅吏姦爲循資格裴光庭兼吏部尚書初吏部求人不以資考爲限光庭懲之因行儉長名榜乃爲循資格無賢不肖一據資考配擬云魏元同上䟽言選舉法弊曰自魏晉以後始歸吏部以迄于今以刀筆量才簿書察行法與世弊其來久矣又尸厥任者間非其選至爲人擇官爲身擇利下筆繫親䟽措情觀勢要悠悠風塵此焉犇競使百行折之一面九能斷之數言不亦難乎官有丏求輒下意聽納韋見素遷吏部侍郎官有丏求輒下意聽納人多德之歲選萬計張九齡建言今歲選乃萬計京師米物爲耗盖冒濫祗此爾視選舉衆寡以稽風化陸贄入計曰視選舉衆寡以稽風化兄弟並以書判超等顔杲卿開元中與兄春卿弟曜卿並以書判超等吏部侍郎席豫咨嗟推伏以選事委令吏蕭儒長壽中厯天官侍郎以選事委令吏句直日偃卧不下筆抑文雅進黠吏楊纂爲吏部侍郎有俗才抑文雅進黠吏隨才銓録劉林甫厯吏部侍郎吏部調至萬貟林甫隨才銓録咸以爲宜最殿分明劉晏知吏部三銓事推處最殿分明下皆慴伏寒逺無留才崔郾遷吏部貟外郎擬吏親挾格褒黜必當寒逺無留才退觀其治家進察其臨節劉迺方調因進書曰今文部始掄材終授任是知人官人兩任其責昔禹稷臯陶之聖猶曰載采有九德考績以九載今有司獨委三二小宰察言於一幅之判觀行於一揖之内何其易哉夫干霄蔽日巨樹也求尺寸之材必後於椽栰龍吟虎嘯希聲也尚頰舌之感必下於蛙黽豈不悲乎執事誠能先政事次文學退觀其治家進察其臨節則厖鴻深沉之士亦可窺其門閾矣士有一藝者得詣闕就選李林甫時帝詔天下士有一藝者得詣闕就選林甫恐士對詔或斥已即建言士皆草茅未知禁忌徒以狂言亂聖聽請悉委尚書省長官試問使御史中丞監揔而無一中程者林甫因賀上以爲野無留才資格紛謬無復綱序楊國忠既以宰相領選始建罷長名於銓日即定留放故事歲揭版南院爲選式選者自通一辭不如式輒不得調故有十年不官者國忠創押例無賢不肖用選深者先補官牒文謬缺得再通衆議翕然美之先天以前諸司官知政事者兵吏部尚書侍郎分按注擬開元末宰相員少任益尊不復視本司事吏部銓故常三注三唱自春止夏乃訖而國忠隂使吏到第預定其貟集百官尚書省注唱一日畢以夸神明駭天下耳目者自是資格紛謬無復綱序就第唱補明年大選因就第唱補帷女兄弟觀之士之醜野蹇傴者呼其名輒笑于堂聲徹諸外士大夫詬耻之一名爲鼠輩所賣子暄舉明經不中禮部侍郎達奚珣遣子撫徃見國忠國忠方朝見撫喜已而暄當黜詬曰生子不富貴耶豈以一名爲鼠輩所賣珣大驚即致暄高第請置五經秀才科楊綰以進士不鄉舉但試辭賦浮文非取士之實請置五經秀才科詔群臣議李栖筠與賈至李廙以綰言爲是選士第務得才李揆取士必考實乃之陳書廷中進諸儒約曰上選士第務得才可盡所欲言由是人人稱美舒元輿古貢士未有輕於此者且宰相公卿繇此出夫宰相公卿非賢不在選而有司以𨽻人待之誠非所以下賢意羅棘遮截疑其姦又非所以求忠直也詩賦微藝㫁離經傳非所以觀人文化成也臣恐賢者逺辱自引去而不肖者爲陛下用也今貢珠貝金玉有司承以篚笥皮幣何輕賢者重金玉邪所得士相繼爲公卿宰相權德輿知貢舉所得士相繼爲公卿宰相薛登䟽曰煬帝始置進士等科後生復相馳競赴速趨時緝綴小文名曰䇿學不指實爲本而以浮虛爲貴方今舉士尤乖其本明詔方下固已驅馳府寺之廷出入公王之第陳篇希恩奏記誓報故俗號舉人皆稱覔舉就禮部試吏唱名乃入耻之李戡年三十明六經舉進士就禮部試吏唱名乃入耻之楊家三喜楊敬之爲祭酒兼太常少卿是日二子戎戴登科時號楊家三喜糊名較覆張說永昌中武后䇿賢良方正詔吏部尚書李景諶糊名較覆說所對第一后署乙等覆試崔沔擢賢良高第不中者誦訾之武后勅有司覆試對益工遂爲第一文宗自以題畀有司高鍇遷中書舍人開成元年權知貢舉文宗自以題畀有司鍇以籍上帝語侍臣曰比年文章卑弱今所上差勝於前鄭覃曰陛下矯革近制以正頽俗而鍇乃能爲陛下得人抑浮華先行實韋貫之所取士抑浮華先行實累公舉沈傳師時給事中許孟容禮部侍郎權德輿樂挽轂士號權許德輿稱之於孟容孟容曰我故人子盍不過我傳師徃見謝曰聞之文人脫中第則累公舉矣故不敢進孟容曰如子可使我急賢詣子不可使子因舊見我遂擢第曳白苖晉卿進吏部侍郎天寳二載判入等者凡六十四人分甲乙丙三科以張奭爲第一奭御史中丞倚之子倚新得幸晉卿欲附之奭本無學故議者囂然不平安祿山因間言之帝爲御花蕚樓覆實中裁十一二奭持紙終日筆不下人謂之曵白帝大怒貶倚及晉卿取人以一日之長爲高下韋陟遷禮部侍郎陟於鑒裁尤長故事取人以一日之長試爲高下陟許自通所工世謂之玉筍李宗閔復爲中書舍人典貢舉所取多知名士若唐沖薛彦袁都等世謂之玉筍建請依古制縣令舉孝廉賈至楊綰建請依古制縣令舉孝廉于刺史升于天子禮部詔有司參議多是綰言至議以爲自晉後衣冠遷徙人多僑處因縁官族所在占籍今鄉舉取人未盡古柳復榮令貢士賦呂渭遷禮部侍郎古柳復榮令貢士賦餘見禮部門廣明後州縣不鄉貢鍾傳廣明後州縣不鄉貢惟傳歲薦士爲諸生貢舉韋景駿遷房州刺史州窮險無學校景駿爲諸生貢舉一第慁子元結天寳十二載舉進士禮部侍郎楊浚見其文曰一第慁子耳有司得子是賴果擢上第氊筆淡書進士榜頭粘黄紙四張以氊筆淡書禮部貢院四字或曰天皇頃以飛帛書之或云象隂注陽授之狀千佛名經張倬東之孫舉進士不第嘗捧登科記頂戴之曰此千佛名經多取大臣貴近子弟劉太真遷禮部掌貢士多取大臣貴近子弟坐貶信州刺史卒舉博學宏辭于邵獨孤授舉博學宏辭吏部考當乙邵覆之置甲科人咨其公柳公綽取士皆知名顯貴柳公綽取士如許康佐鄭朗盧簡辭崔璵夏侯孜李拭韋長皆知名顯貴取士不宜限數舒元輿又言取士不宜限數今有司多者三十少止二十假令歲有才德纔數人而曰必取二十謬進者乃過半謂之合格可乎第其文異等孫逖舉手筆俊拔哲人竒士隱淪屠釣及文藻宏麗等科開元十年又舉賢良方正𤣥宗御洛城門引見命戸部郎中蘇晉等第其文異等皆海内有名士孫逖取顔真卿李華蕭頴士趙驊等皆海内有名士入第二等劉憲武后時敕吏部糊名考判求高才惟憲與王適司馬鍠梁載言入第二等龍虎榜歐陽詹舉進士與韓愈李觀李絳崔群王涯馮宿庾承宣聨第皆天下選時稱龍虎榜閩人第進士自詹始臨問試賢良趙宗儒改吏部尚書穆宗立詔先朝所召賢良方正委有司試宗儒建言應制而來者當天子臨問試有司非國舊典請罷之詔可甄幽獨抑浮華高郢進禮部侍郎司貢部凡三歲甄幽獨抑浮華流競之俗爲衰得士七十五人多名卿宰相賈餗凡三典貢舉得士七十五人多名卿宰相試進士東都呉武陵入爲太學博士太和初禮部侍郎崔郾試進士東都公卿咸祖道長樂武陵最後至謂郾曰君方爲天子求竒才敢獻所益因出䄂中書搢笏爲郾讀之乃杜牧所賦阿房宫辭既警拔而武陵音吐鴻暢坐客大驚武陵請曰牧方試有司請以第一人處之郾謝已得其人至第五郾未對武陵勃然曰不爾宜以賦見還郾曰如教牧果異等所取皆一時之秀和凝知貢舉是時進士多浮薄喜爲諠譁以動主司毎放榜則圍之以棘閉省門絶人出入以爲常凝徹棘開門而士皆肅然所取皆一時之秀稱爲得人五代史知人五白知人則哲唯帝其難之書知人者智老子子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者舉爾所知仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸子桑之舉孟明鮑叔之知管仲史齊桓霸者管仲之謀天下不知管仲之賢而多鮑叔能知人也人不易知患己不知人也始以智知終因德進叔向之知鬷蔑申於知己越石父賢在縲紲中晏子遇之解左驂贖之載與歸不謝入久之石父請絶晏子懼攝衣冠以謝之石父曰君子屈於不知己而申於知己者也趙貢知薛宣琅邪太守趙貢行縣見不其丞薛宣還府令妻子與相見戒曰君至丞相我兩子亦中丞相史第五倫所舉吏多至二千石世以爲知人字伯英法真指胡廣後漢胡廣爲南郡散吏太守法雄子真知人歲終雄勅真助求才雄命諸吏真自牖間占之乃指廣白雄遂舉孝廉京師試章奏爲天下第一王諶舉种暠种暠爲縣門下吏河南尹田歆外生王諶知人歆曰今當舉六孝廉多得貴戚書以五應之欲自用一人清善者以報國爾助我求之諶送客至洛陽郭遥見暠曰得孝廉矣歆曰當山澤隱滯此近洛陽門下吏耶諶曰山澤不必有異士異士不必出山澤歆召暠於廷辨詰職事辭對有據遂舉孝廉暠官至司徒外静内銛魏曹爽秉政用何晏爲吏部尚書傳嘏謂爽弟義曰何平政外静内銛恐惑我兄弟賔饌託子魏張既德容兒童馮翊功曹殷游設賔饌請之妻笑曰童昏小兒殷曰方伯之器以子楚託之後既薦楚吳興太守勸令兄弟別族呉楊笁少獲聲名陸遜謂笁終敗勸笁兄穆別族南州冠冕龐統少朴鈍司馬德操有知人鑒統徃見操操採桑樹上統坐樹下自晝達夜稱之爲南州冠冕也小吏結交後漢呉祐字季英舉孝廉將行郡中爲祖道祐越壇共小吏雍丘黄真歡語移時與結交而別功曹以爲倨請黜之太守曰呉季英有知人之明卿且勿言真後亦舉孝廉取張遼徐晃於亡敵魏太祖拔于禁樂進於行陣取張遼徐晃於亡敵許郭之鑒後漢郭泰字林宗許劭字子將咸有知人之鑒故天下言拔士者咸稱具許郭之鑒知無實行漢中晉文經梁國黄子艾並恃才智炫燿上京三公毎見辟召輒詢訪之隨其臧否以爲與奪符融謂李膺曰二子行業無聞恐小道破大義公宜察焉膺然之後果輕薄並以罪廢弃也衆中識晉孟嘉方年㓜知名庾亮大㑹州府吏士嘉坐甚逺禇褒問亮聞江州孟嘉其人何在亮曰在座卿但自覔褒厯觀指嘉曰此君小異得無是乎亮大笑得嘉知子石苞臨終分財與諸子不及崇崇母爲言苞曰此兒雖小後自能得賞御人石苞仲容爲縣吏㑹謁者郭元信奉使求人爲御以苞及鄧艾給之行十餘里元信謂二人曰子後並當至卿相苞曰御𨽻也何卿相乎拔杜宻周甫爲太山守行春見鄭𤣥爲鄉佐知其異器遂召署郡職遣就學顯拔第五倫伯魚爲宕渠令顯拔鄉校元賀賀後爲二郡守以清絜稱嗇夫鄭宏巨君爲鄉嗇夫太守第五倫行春見而深竒之署督郵一日千里袁崧漢書曰王允字子師世仕州郡爲冠盖郭林宗見而竒之曰王生一日千里王佐才也遂與之友後王允至司徒孔選任精明裴垍爲學士時引李絳崔群與同列及相又推韋貫之裴度知制誥李夷簡爲御史中丞皆踵躡爲輔相號名臣自他選任罔不精明有子必爲宰相楊嗣復父於陵韓滉妻以其女謂妻曰吾閱人多矣後貴且夀無若生者有子必爲宰相既而生嗣復王珪母王珪少孤且貧始隐居時與房元齡杜如晦善母李嘗曰兒必貴然未知所與游者何如人而試與偕來㑹房元齡等過其家李闚大驚勅具酒食歡盡日喜曰二客公輔才汝貴不疑本傳禄山有逆相張九齡安禄山初以范陽偏校入奏氣驕蹇九齡謂裴光庭曰亂幽州者必此胡雛也及討奚契丹敗張守珪執如京師九齡曰禄山狼子野心有逆相宜即事誅之以絶後患帝曰卿無以王衍知石勒而害忠良卒不用李白永王璘辟爲府僚璘敗當誅初白游并州見郭子儀竒之子儀嘗犯法白爲救免至是子儀請觧官以贖流夜郎今黄叔度劉迅陳郡殷寅名知人見迅嘆曰今黄叔度也劉晏毎聞其論曰皇王之道盡矣封倫倫年方少舅盧思道曰是兒識略過人當自致卿相不能知人害霸也魏徵齊桓公問管仲曰何如而害霸曰不能知人害霸也知而不能用害霸也時號知人呉武陵始李愬節度唐鄧武陵薦李景儉王湘健智沈敏可表以自副時號知人李光顔義而勇裴度帝問諸將才否度對曰李光顔義而勇當有成功不三日光顔破時典兵帝嘆度知言擇僚吏後皆爲通顯巨人盧齊卿武后詔長史薛季昶擇僚吏堪御史者季昶訪於齊卿齊卿曰長安尉盧懐慎李休光萬年尉李乂崔湜咸陽丞倪若水盩厔尉田崇璧新豐尉崔日用季昶用其言後皆爲通顯巨人士之致逺先器識裴行儉善知人在吏部時見蘇味道王勮謂曰二君後皆掌銓衡李敬元盛稱王勃楊炯盧照隣駱賔王之才引示行儉行儉曰士之致逺先器識後文藝如勃等雖有才而浮躁衒露豈享爵祿者哉烱頗沉黙可至令長餘皆不得其死本傳問知人武后問狄仁傑曰婁師德賢乎對曰臣嘗同僚未聞其知人后曰朕用卿師德薦也誠知人矣出其奏仁傑慙所薦進皆中興名臣狄仁傑所薦進若張柬之桓彦範敬暉姚崇等皆爲中興名臣本傳賞知人是時李楷固駱務整討契丹克之獻俘含樞殿二人者本契丹李盡忠部將盡忠入冦楷固等數挫王師後降有司請論如法仁傑稱其驍勇可任若貸死必感恩納節可以責功至是凱旋后舉酒屬仁傑賞其知人識唐公負王霸資姜謩隋大業末高祖在太原謩前識之謂所親曰隋政亂將亡必有聖人受之唐公負王霸資度其必撥亂得天下乃深自結卒以正直稱宗室臯扶風馬彛未知名臯識之卒以正直稱李勣知人李勣初勣拔黎陽倉高季輔杜正倫徃客焉及平虎牢獲戴胄咸引見卧内推禮之後皆爲名臣世以勣知人當爲國器房𤣥齡校讎秘書省吏部侍郎高孝基名知人謂裴矩曰僕觀人多矣未有如此郎者當爲國器但恨不見其聳壑昻霄云爲棟梁用杜如晦大業中預吏部選侍郎高孝基異之曰君當爲棟梁用願保令德以子孫相諉婁師德盧承業異之曰子台輔器也當以子孫相諉詎論僚吏哉王佐才杜如晦秦王引爲府兵曹參軍時府屬多外遷王患之房𤣥齡曰去者雖多不足吝如晦王佐才也待以公輔宗室從晦少與崔龜從李景譲裴休善奬目後進名知人楊収方布衣進謁從晦一見如雅識即待以公輔後果至宰相稱其逺到蕭嵩擢中書舍人時崔琳王邱齊澣皆有名以嵩少學術不以輩行許也獨姚崇稱其逺到使其子拜韓滉初判度支李晟以禆將白軍事滉待之加禮使其子拜厚遺器幣鞍馬後晟終立大功與議事正出其上張嘉正始爲中書舍人崔湜輕之後與議事正出其上湜驚曰此終其坐後十年而爲中書令顧聽事曰此公坐也蘇珦調鄠尉義琰爲雍州長史鄠多訟日至長史府裁决明辨自是無訴者義琰異之顧聽事曰此公坐也恨吾齒晚不及見才當自光大桓彦範以䕃遷司衛主簿狄仁傑曰君之才當自光大毋恤于初厚爲禮識於後生數稱譽之鄭從讜識陸扆於後生數稱譽之扆後爲宰相爲國重將張守珪再遷幽州良杜府果毅時盧齊卿爲刺史器之引與共榻坐謂曰不十年子當節度是州爲國重將願以子孫託可僚屬相期邪捉刀立堂下劉沔少孤客振武節度使范希朝署牙將軍中大㑹沔捉刀立堂下希朝竒之謂曰後日必處吾坐天下推知人稱蕭功曹蕭頴士以推引後進爲己任如李陽李㓜卿皇甫冉吕渭等數十人曰奬目皆爲名士天下推知人稱蕭功曹當時推知人號席公席豫典選六年拔寒逺士多至臺閣當時推知人號席公云李穀能知人扈載樞宻使王朴尤重其才薦於宰相李穀久而不用朴以問穀曰扈載不爲舍人何也穀曰非不知其才然載命薄恐不能勝朴曰公爲宰相以進賢退不肖爲職何言命邪已而召拜知制誥及爲學士居歲中病卒年三十六議者以榖能知人而朴能薦士五代史貌厚而小心高行周隷明宗帳下初爲禆將趙德鈞識之謂明宗曰此子貌厚而小心他日必大貴宜善待之同上夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難爲聽而識之者難遇也韓文今之言曰某子長者可以爲大官類非古之所謂長者也然則土木而已矣夫捧土掲木而致之巖廊之上蒙以紱冕翼以侍隷而趨走其左右豈有補於萬民之勞苦哉故曰知之難栁宗元與楊京兆書藻鑑六商㩁附白月旦評後漢許劭與兄靖俱有高名共覈論鄉黨人物每月更品題由是汝南俗有月旦評也道廣許劭到潁川不詣陳蕃或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通角立傑出桓帝徵徐稺等不至因問陳蕃徐稺袁閎韋著先後蕃曰閎王公之族聞道訓著生三輔仁義之俗不扶自直稺爰自江南卑薄之域角立傑出宜爲先也萬頃之波郭林宗至汝南見袁閎不宿而去從黄憲三日薛勤問曰奉高之噐清而易挹叔度汪若萬頃之波澄之不清撓之不濁蒹葭倚玉樹魏明帝使后弟毛繒與夏侯泰初共坐時人謂之蒹葭倚玉樹泰初如朗月入懐玉人晉王敦以衛玠爲玉人稱王夷甫處衆中如珠玉在瓦礫間也璞玉渾金王戎曰山濤如璞玉渾金人知其寶莫知其器趙魏老子曰孟公綽爲趙魏老則優不可以爲滕薛大夫無皂白鍾皓兄子覲李膺姑之子也覲與膺年齊並有令名覲有退譲之風膺謂覲曰孟軻以人無是非之心非人也公何太無皂白覲以白皓皓曰元禮祖在位諸父並盛韓公之甥故得然國武子招人過以致怨本今豈其時汝道是也王肅三反魏劉寔以王肅忠於事上好下佞已一反也性嗜榮貴不求茍合二反也吝惜財物而理身不穢三反也吳主聦明仁智呉使趙咨於魏魏帝問吳主何等主對曰聦明仁智雄略之主納魯肅於凡器是其聦拔吕蒙於行陣是其明獲于禁而不害是其仁取荆州不血刃是其智據三州虎視天下是其雄屈身於陛下是其略也擬人必於其倫禮銓度國語稱述多過蜀龎統字士元爲郡功曹性好人倫毎稱述多過其才人問之統曰亂世善人少惡人多不美其言則聲名不足慕而爲善者少矣拔十得五猶得其半使有志者自勵不亦可乎商㩁人物龎統至吳多聞其名及西還並會昌門陸績顧劭全悰皆徃統曰陸子可謂駑馬有逸足之力顧子可謂駑牛能負重致逺謂全悰曰卿好施慕名有似汝南樊子昭雖智力不多亦一時之佳也題目龎德公自謂諸葛孔明爲卧龍龎統士元爲鳳雛司馬德操爲水鏡又裴楷目夏侯𤣥云肅肅如入宗廟但見禮樂噐鍾㑹如觀武庫森森但見矛㦸在前瑕玷靡所不見山濤若登山臨下幽然深逺矣問用人吏部郎闕文帝問其人於鍾會會曰裴楷清通王戎簡要皆其選也於是以楷爲之問人物蜀關侯雲長督荆州聞馬超來降舊非故人與諸葛亮書問超人才誰比亮知羽當與並驅争先乃答曰孟超兼資文武雄猛過人一世之烈黥彭之徒當與翼德並驅争先猶未若髯之絶倫逸群也侯美髯故亮謂之髯侯大悦有白起風世說嵇中散語趙景真卿童子黑白分明有白起風恨童子狹景曰尺表能審權衡之度寸管能測徃復之晷何必在大但問識見如何也又世說諸葛瑾弟及從弟誕有盛名各在一國于時以爲蜀得龍呉得虎魏得狗又世稱庾文康爲豐年玉稚恭爲荒年穀也如干將莫邪盧藏用嘗謂李邕如干將莫邪難與争鋒但虞傷缺耳孔卿相才温大雅與弟彦博大有皆知名薛道衡見曰皆卿相才也善銓叙人物高慿爲吏部侍郎善銓叙人物帝賜金背鑑一况其清鑑焉鑒裁尤長韋陟於鑒裁尤長故事取人以一日試爲高下陟許自通所工先就其能試之由是無遺材雅負裁鑒髙儉爲吏部尚書雅負裁鑒用人無不當子孫當依韋宙弟岫宙在嶺南以從女妻小校劉謙或諫止之岫曰吾子孫或當依之謙後以功爲封州刺史喜鑒拔後進獨孤也李至逺見桓彦範力言其賢盧從愿尚少高以評目許弟從逺且貴豫言其位以驗所至王佐才李靖吏部尚書牛宏見之曰王佐才也惟稱好鬚房元齡李緯爲民部尚書㑹有自京師來者帝曰元齡聞緯爲尚書謂何曰惟稱緯好鬚無它語摽鑒通晤王珪帝以珪善人物且知言因謂曰卿摽鑒通晤爲朕言𤣥齡等材且自謂孰與諸子賢對曰孜孜奉國知無不爲臣不如𤣥齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彦博濟繁治劇衆務必舉臣不如胄以諌諍爲心耻君不及堯舜臣不如徵至激濁揚清疾惡好善臣於數子有一日之長帝稱善而𤣥齡等亦以爲盡己所長謂之確論體局方正廊廟才也張行成少師事劉炫炫謂門人曰行成體局方正廊廟才也諸將材否賈曽帝問諸將材否對曰李勣舊臣陛下所自悉龎同善雖非鬬將而持軍嚴薛仁貴摽勇冠軍髙偘忠果而謀契苾何力性沈毅雖忌前後有御才然夙夜小心忘身憂國莫逮於勣者帝然所許衆亦以爲知言以王佐期之張柬之補太學生令狐德棻異其才便以王佐期之問優劣於長史裴子餘補鄠尉同舍李朝隱程行諶以文法稱而子餘以儒顯或問優劣於長史陳崇業答曰蘭菊異芬胡有廢者人物清整李藩沈静藩才能不及韋貫之裴垍然人物清整是其流亞清廟之器李珏爲殿中侍御史宰相韋處厚曰清廟之器豈擊摶才乎除禮部員外郎有鑒裁王珪季父頗通儒有鑒裁尤所噐許鑒拔李敬元杭州叅軍徐太元哀其僚張惠以贓抵死而惠母老乃詣獄自言與惠偕受薄其罪惠得不死太元坐免官十年敬元廉知之擢爲鄭州司功參軍後至祕書少監申王師以德行聞其鑒拔率若此將相材于劭樊澤始舉賢良劭望見曰將相材也霜鷹凍蠅蘇味道髙爽王方慶魯鈍同爲鳳閣侍郎或問張元素二子孰賢答曰蘇如九月得霜鷹王如十月被凍蠅朝野僉載鶴鳴雞樹鳳閣侍郎杜景佺文章知識並髙逺時號爲鶴鳴雞樹張儉同上題目人魏光乗好題目人姚元之長大行且速謂之趂蛇鸛雀王旭短而黑醜謂之煙熏木根楊仲嗣躁急謂之熱𨫼上胡孫同上李華作三賢元德秀李華兄弟德秀而友蕭頴士劉迅或問所長華曰德秀志當以道紀天下迅當以六經諧人心頴士當以中古易今世德秀欲齊愚智迅感一物不得其正穎士呼吸折節而獲重祿不易一刻之安及於孔子之門皆達者與使德秀據師保之位瞻形容乃見其仁迅被卿佐服居賔友謀治亂根源參乎元精乃見其妙穎士若百鍊之剛不可屈使當廢興去就一生一死間而後見其節鳩集鳳池王及善才行猥冗爲内史失所舉七白蔿賈曰子玉之敗子文之舉也舉以敗國將何賀焉傳叔孫穆子好善而不能擇人謂用豎牛不慎所舉君子不以言舉人以言取人失之宰予以貌取人失之子羽宰予言語之科而不仁澹臺滅明字子羽貎寢而賢徒多推士之名終乏知人之鑒受面欺之罪孔融薦禰衡表云人不易知受面欺之罪舉能其官惟爾之能稱匪其人惟爾不任周書言所舉得人惟爾之能也若稱匪其人則是爾不稱其任矣公議得失魏諸葛誕爲吏部郎人有所屬輒顯其言用之後有得失則公議舉者百僚由是慎其所舉也擇善得人必聞有賞非才而舉安可無辜聽言觀行子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行茍於人而聽言則舉事而失德始聽言而信行汝得人焉及論事而稽功予所否者既貌取而失人何面欺而逃責雖入貢於鹿鳴宜奉身於鷁退謝失舉宋宏薦桓譚君山爲議郎世祖令君山鼓琴如其繁聲宏聞召譚責之譚後於帝前鼓琴見宏失其常度帝怪問之宏免冠謝曰臣本舉譚望以忠正導主而今朝廷欣恱鄭聲臣之罪也帝乃改容謝宏席藁史應侯范睢任鄭安平爲將擊趙爲趙所困遂以二萬人降趙睢席藁請罪又舉王稽爲河東守三年不上計坐誅睢日不懌受失舉之謗陳寔仲弓爲郡功曹時中常侍侯覧託太守高倫用吏倫教署爲文學掾寔知非其人白太守此人不宜用侯常侍不可違乞從外署免塵明德從之人怪寔失舉寔終不言漢張勃舉陳湯湯父死不犇䘮坐勃失舉削戸尋卒因謚曰繆孔請降考校趙璟考功歲終請如至德故事陳殿最璟自言薦韋証以貪敗請降考校奪俸贖金陸宣公奏議失實則奪俸贖金亟失則黜免同上皆有情故兼受賄賂同上諸司所舉皆有情故兼受賄賂不得寔才臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閱實失實當闇謬之責同上惟賢知賢聖人篤論身茍濫進庸及知人不擇舉者之賢而責所舉之濫不可得已願少遵周漢之規以分吏部選即所用詳所失鮮矣魏元同李石用韓益判度支案以贓敗石曰臣本以益知財利不保其貪帝曰宰相用人知則用過則棄此謂之至公他宰相所用彊蔽其過此其私也李石傳白孔六帖卷四十三
