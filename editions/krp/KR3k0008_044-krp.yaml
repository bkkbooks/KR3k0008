body:
  text: 白孔六帖卷四十四唐白居易原本宋孔傳續撰坐舉主讓舉舉親三自舉四舉舊五舉讎六舉賤七蔽賢賞舉賢九考試十得賢十一棄賢十二名譽十三辟召十四待士十五考課十六要㑹十七坐舉主一至公附白盤辟雅拜漢司隷何武舉方正見盤辟雅拜有司以爲詭衆虚僞坐左遷楚内史妄舉華隂丞嘉言朱雲兼資文武可試守御史大夫匡衡以爲大臣國家股肱明主慎擇嘉小生狂言妄相舉薦嘉竟坐貶秩嚴延年察獄吏廉㑹其吏有贓不入身坐舉不實貶秩笑曰後無復有舉人者慙自絶後漢王丹字仲回客有薦士於丹者因選舉之後舉者犯罪丹坐免客慙自絶丹召曰何量丹之薄也不設食以罰之相待如舊慙自殺池陽令舉亷吏王昱於薛宣未召昱妻受囚家錢昱實不知後人言之昱慙自殺宣乃旌其柩也請罪失舉丞相參軍宋挺盗官布六百匹正刑棄市遇赦免奮武將軍阮抗請爲長史司直劉隗字大連劾抗請治罪劾舉主晉崔洪良伯薦郤詵爲左丞詵後糾洪洪謂人曰我舉詵詵還奏我是挽弓自射也詵聞曰趙宣子舉韓厥爲司馬以將法戮宣子之僕宣子喜曰可償我矣崔侯爲國舉才我唯法是視云云洪聞重之也劾舉主失舉五雄薦周舉舉稱職後雄又舉馮直爲將而直嘗以賊贓罪舉劾雄雄恱曰宣光奏吾吾不失舉也至公舉夫舉無他唯善所在親踈一也不受謝晉紀羊祜叔子毎薦舉人未嘗知曰拜爵公朝謝恩私室豈臣之節恐知孔光有所薦舉唯恐人知不薦門人孔光魯恭事具師門公言得失注見失所舉門不可干以私尹翁歸子况爲東海守辭廷尉于定國定國家在東海欲託邑子終日竟不言去後謂邑子曰此賢將不可干以私恨其謝張安世嘗有所薦其人來謝安世大恨以爲舉賢逹能豈有私謝不復爲通絶書屬後漢史弼字公謙爲河東守當舉孝廉弼知多權貴請託乃先勅絶書屬中常侍侯覽果遣諸生齎書請之弼大怒捶生數百付獄拷殺之非遷次毛玠孝先典遣文帝爲五官將親自詣玠屬所親念玠曰老臣以能守職免戾今所說人非遷次不敢奉命也孔不實免官得人加賞薛登䟽曰漢法所舉之主終身保任揚雄之坐田儀成子之得魏相賞罰之令行則請謁之心絶退讓之義著則貪競之路銷請寛年限以容簡汰不實免官得人加賞自然見賢不隱貪祿不專矣坐舉非其人張九齡嘗薦長安尉周子諒爲監察御史子諒劾奏牛仙客其語援䜟書帝怒杖子諒于朝堂流瀼州死于道九齡坐舉非其人貶荆州長史有不職坐舉者陸贄秉政始請臺閣長官得自薦其屬有不職坐舉者坐覆視對䇿非是裴垍坐覆視皇甫湜牛僧孺等對䇿非是罷學士奪俸于公異不能事後母既仕不歸省詔賜孝經罷歸田里盧邁坐舉非其人奪俸兩月責其冒薦薛宣不實免王丹之官同上濫舉者􅔰斯罔之罪同上坐薦御史韋抗坐薦御史非其人授安州都督疑其濁罪所舉初桂州都督李宏節亦以清謹顯既没其家賣珠太宗疑宏節實貪追坐舉者魏徵曰陛下過矣且今號清白死不變者屈突通三子來調共一馬道源子不能自存審其清者不加䘏疑其濁者罪所舉亦好善不篤矣帝曰朕未之思置不問故通之清益顯繆舉必行其罰陸贄讓舉二白陳雷後漢雷義仲公舉茂才讓於陳重刺史不聽義遂佯狂被髪走鄉里曰膠漆自謂堅不如雷與陳孔嫌其爭讓而下之令狐楚逮冠貢進士京兆尹將薦爲第一時許正倫輕薄士有名長安間能作蜚語楚嫌其爭譲而下之叔度勤勤之讓秦嘉耿耿之辭薛登請選舉擇賢才䟽貪仕之性彰則廉潔之風薄是知府命雖高異叔度勤勤之讓黄門已貴無秦嘉耿耿之辭既能讓何嫌皆取張楚金有至行與沈越石皆舉進士州欲獨薦楚金固辭請俱罷都督李勣嘆曰士求才行者也既能讓何嫌皆取乎乃並薦之舉親三不舉附白楚君之舉也内姓選於親祁奚舉子午君子曰立其子不爲比祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉曰午也可午奚子也君子曰能舉善也稱其讎不爲諂立其子不爲比祁奚内舉不失親叔向曰魏子近不失親魏舒與魏戊同縣謂成鱄曰吾與戊也縣人以爲黨乎成鱄曰夫舉無他唯善所在親踈一也仲尼曰近不失親逺不失舉可謂義矣儒有内稱不避親禮不敢用親得親有賞唯善所在雖親何傷唯賢是求雖親必舉舉兄子晉以苻堅冦邉朝廷求文武將鎮禦北方謝安以兄子元應舉郤超與元不協曰違衆舉親明也元必不負舉才也舉子呂氏春秋魏公叔疾惠王問之公叔曰臣庻子鞅願任之國政若不用勿使出境王不應謂左右曰叔誖也後鞅果西入秦秦用之而彊魏竟弱也無行不舉義縱少時與張翁俱攻剽爲群盜姊以醫幸王太后后問有兄弟故爲官乎曰有弟無行不可後拜中郎孔公舉雖親何嫌李固言同平章事帝曰宰相用人毋計親踈竇易直爲宰相未嘗用姻戚使己才不足任天下重自宜引去茍公舉雖親何嫌用所長耳帝不欲大臣有黨故語兩及之除吏多姻故李絳帝言公等得無有姻故冗食者當爲惜官吉甫權德輿皆稱無有絳曰崔祐甫爲宰相不半歲除吏八百人德宗曰多公姻故何耶祐甫曰所問當與不當耳非臣親舊孰知其才其不知者安敢與官時以爲名言古有内舉不避親蘇詵累轉給事中時蘇廷碩爲紫微郎固辭帝曰古有内舉不避親者乎對曰晉祁奚是也帝曰若然朕自用詵卿言非公也舉所知不暇問讎黨陸元方擢天官侍郎或言其薦引皆親黨后怒免官令白衣領職元方薦人如初后召讓之對曰舉臣所知不暇問讎黨舉其子光嗣以稱職聞狄仁傑子光嗣聖厯初爲司府丞后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚内舉果得人韋承慶解鳳閣舍人后召嗣立謂曰爾父嘗稱二子忠且孝堪事朕以兄弟稱職如而父言今使卿兄弟自相代即拜鳯閣舍人韋嗣立傳收采遺逸不以親故自嫌崔渙爲江淮宣諭選補使收采遺逸不以親故自嫌所引皆親黨陸贄始請臺閣長官得自薦其屬或言諸司所引皆親黨招賂遺無實才帝復詔宰相自擇擬官多親舊崔祐甫帝嘗謂曰人言卿擬官多親舊何邪對曰陛下令臣進擬庶官夫進擬者必悉其才行如不與聞知何由得其實帝以爲然錫汝明尹王維張公碑此天子至公内舉不避親錫汝明尹張公之力也夫公於國爲外戚於帝爲外弟魏相成璜柳宗元六逆論秦用張祿而黜穣侯乃安魏相成璜而踈呉起乃危親不足與也誠負天下韋巨源爲吏部尚書時官缺執政以次用其親巨源秉筆當除十人楊再思得其一試問餘授皆宰相近屬再思喟然曰吾等誠負天下巨源曰時當爾耳是時雖賢有德終莫得進士大夫莫不解體薦弟福可任季石弟福太和中第進士楊嗣復領劒南辟幕府崔鄲輔政兼集賢殿大學士引爲校理調藍田尉後石當國薦福可任治人由監察御史至戸部郎中舉其弟纁自代韋貫之永貞初始爲監察御史舉其弟纁自代及爲右補闕纁代爲御史議者不謂之私自舉四白東方朔自舉曰臣少失父母長養兄嫂身長九尺五寸學書三冬文史足用云云可以備天子之大臣文武兼備漢田延年爲河東太守至平陽召吏令文者東武者西尹翁歸伏不肯起曰翁歸文武兼備何所設施願守長安令漢馮野王字君卿十八上書願守長安令宣帝竒其志欲用丞相以爲不可也張敞渤海膠東盗賊並起敞上書請自治之徵拜膠東相盗賊並解散自比管樂蜀諸葛亮孔明自比管樂時人未許唯崔州平徐元直信然曰諸葛孔明乃卧龍也將請治郡耿純伯山請曰臣本吏家子孫遭聖帝受命備位列將爵爲通侯天下略定無所用志願試守一郡盡力以効帝笑曰卿既治武復欲脩文耶授東郡太守遞相舉何武公孫禄漢何武舉左將軍公孫禄可輔政禄亦舉武有司劾奏互相稱舉皆免提衡張湯杜周相與提衡馬融崔瑗竇章後漢竇章字伯向好學與馬融崔瑗更相推薦魏其侯與灌夫二人相引重注云重相推薦田仁任安有詔擇衛將軍舍人爲郎將趙禹爲選得田仁任安二人貧將軍不得已上之問能略田仁曰提抱鼓立軍門使士樂死仁不及任安任安曰决嫌疑定是非辨官治使百姓無怨安不及田仁帝曰善也更相薦舉賈捐之字君房與長安令楊興字君間相善捐之薦興可試守京兆楊興亦云我若得見言君房石顯奏捐之興懐詐更相薦舉請論如律捐之棄市孔獻文闕下舒元輿自負才有過人者銳進取太和五年獻文闕下不得報上書自言馬周張嘉正代人作奏起逆旅卒爲名臣備位于朝自陳文章凡五晦朔不一報竊自謂才不後周嘉正而無因入又不露所藴是終無振發時也漢主父偃徐樂嚴安以布衣上書朝奏暮召而臣所上八萬言其文鍛錬精粹出入古今數千百年披剔剖决有可以輔教化者未始遺拔犀之角擢象之齒豈主父等可比哉盛時難逢竊自愛惜文宗得書高其自激昂出示宰相李宗閔以浮躁誕肆不可用改著作郎上書自陳貟半千咸亨中上書自陳臣家貧不滿千錢有田三十畆粟五十石聞陛下封神岳舉豪英故鬻錢走京師朝廷九品無葭莩親行年三十懐志潔操未蒙一官不能陳力歸報天子陛下何惜玉陛方寸地不使臣披露肝膽乎書奏不報武后收人心務拔擢非徒人得薦士亦許自薦其才陸贄高自稱道杜甫數立賦頌因高自稱道且言先臣恕預以來承儒守官十一世迨父審言以文章顯中宗時臣頼緒業自七歲屬辭且四十年然衣不盖體常寄食於人竊恐轉死溝壑伏惟天子哀憐之若令執先臣故事拔泥塗之久辱則臣之述作雖不足鼓吹六經而沈欝頓挫隨時敏給揚雄枚臯可企及也有臣如此陛下其忍棄之必用之要及其時張嘉貞天子許以相嘉貞因曰昔馬周起徒步謁人主血氣方壯太宗用之能盡其才甫五十而没向使用少晚則無及已陛下不以臣不肖必用之要及其時後衰無能爲也且百年夀孰爲至者臣常恐先朝露死溝壑誠得効萬一無負陛下足矣帝曰第徃行召卿舉舊五白楚君之舉也外姓選於舊舉其偏不爲黨祁奚爲中軍尉羊舌職佐之職死晉侯問祁奚曰孰可以代之對曰赤也可赤職子也君子曰舉其偏不爲黨偏黨也刈錯薪之楚且得良賢拔連茹之茅不遺故舊官貴得賢人惟求舊棄舊不仁得賢有賞始以故知終因德進多擢宿舊魏何晏遷侍中主選曹宿與有舊者多擢用之不用鄉親杜錫爲吏部郎不敢用鄉親一人唯善所在雖舊何傷唯賢是求在故必舉用鄉里魏許元爲吏部多用鄉里人告黨與文帝収之元對曰古人云舉爾所知臣之鄉人臣所知也陛下討察有不勝任者臣當受罪帝决察元所用皆當職乃釋元更賜衣服舉本國人傅嘏蘭石為河南尹河南俗黨五官功曹典選職分皆受其本國人無用他邦者嘏各舉良而對用之曹分職而後以次考覈之舉舊人子朱暉文秀與陳揖交善揖早亡後司徒桓虞辟召暉子駢暉乃薦子友代之孔有才雖親舊當白用許季同宰相李絳與季同舉進士爲同年才數月輒徙帝以問絳絳曰進士明經歲大抵百人吏部得官至千人私謂爲同年本非親與舊也今季同以兄嫌徙少尹豈臣所助邪且忠臣事君不以私害公設有才雖親舊當白用避嫌不用乃臣下身謀非天子用人意帝然之胡亥任趙高而族李斯柳宗元六逆論苻堅進王猛而殺樊世乃興胡亥任趙高而族李斯乃亡舊不足倚也選德進賢初不計私注見薦舉門脫中第則累公舉沈傳師舉進士時許孟容權德輿樂挽轂士號權許德輿稱之於容容曰我故人子盍不過我傳師徃見謝曰聞之丈人脫中第則累公舉矣故不敢進孟容遂擢傳師高第舉讎六白稱其讎不爲諂君子謂祁奚能舉善矣謂稱解狐君子曰解狐得舉叔向曰祁奚外舉不避讎豈獨遺乎傳儒有外舉不避怨禮宜取節於葑菲豈失賢於睚眦怨是用希必棄瑕於毫髪善其可失宜取節於葑菲以私害公非忠也私怨也王生之使張柳傳范氏之臣王生惡張柳朔後舉朔爲柏人宰昭子曰夫非而讎乎對曰私讎不及公好不廢過惡不去善義之經也臣敢違之公必滅私憎而知善豈宜報怨安可妨公私憾君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉刈錯薪之楚且務得賢拔連茹之茅宜忘舊怨小白用管仲是捨射鉤之讎重耳見寺人豈念斬袪之罪惡而知美禮私不害公唯善所在雖讎何傷唯賢是求雖讎必舉舉用韓信爲楚王召辱已之少年令出跨下者爲中尉告諸將相曰方辱我時寧不能殺之爲名故忍就於此薦後漢喬𤣥公祖與陳球有隙及爲司徒薦球爲廷尉舉讎子樂恢伯竒同郡楊政數衆毁恢恢後舉政子爲孝廉由是鄉里歸之宜繼美於前賢無失材於舊惡受讎舉魏吉茂兄廣爲鍾繇所繩伏法茂怨怒繇不哭至歲終繇舉茂茂才議者以爲茂必不就乃就之時人或以茂爲畏繇或以茂爲髦邱者也舉爲守韓子曰趙簡王問解狐孰可爲上黨守曰荆伯柳王曰非子之讎乎曰舉賢不避仇讎也又說苑晉文侯問咎犯誰可爲西河守曰虞子羔云云君問爲守非問臣仇子羔詣謝犯曰薦公也不以私事害公議子去之吾當謝子矣注謝引躬迎而謝之韓子曰解狐舉讎於相孔薦爲司元大夫劉仁軌嘗爲御史袁異式所劾慢辱之脅使引决及拜大司憲異式尚在臺不自安因醉以情自解仁軌持觴曰所不與公者有如此觴既執政薦爲司元大夫擢鄭縠爲給事鄭畋右丞鄭薫誣畋罪不可任郎官出之鄭穀者薰子也方畋秉政擢鄭縠爲給事中至給郎其損怨類此是子堅正韋温傳李德裕入輔擢禮部員外郎或言雅爲牛僧孺厚德裕曰是子堅正可以私廢乎舉賤七白管庫趙文子所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉舉管庫小吏以爲士大夫管仲取盜孔子曰管仲遇盜取二人焉上以爲公臣曰其所與遊僻也可人也注言此人可用也管仲死桓公使爲之取官於大夫遷之節以葑菲刈其翹楚引薦白屋韓起趙武對揚紫庭劉琨表云揚側陋書出滯淹唯其任也何賤之有傳且淮隂餓𨽻才能佐漢渭濵賤老道可匡周將致非常之才宜從不次之舉楚使右領楚太師子榖曰右領差車與左史老皆可用也子髙曰賤率人慢之懼不用命焉子穀曰觀丁父鄀俘也武王以爲率是以大啓群蠻彭仲爽申俘也文王以爲令尹實縣申息朝陳蔡封略於汝唯其任也何賤之有草萊王藴爲吏部郎曰欲使時無屈滯先任草萊寒素晉起居晉王戎領吏部未嘗進一寒素退一虛名同升諸公公叔文子之臣大夫僎與文子同升諸公子曰可以爲文矣注薦家臣於公與已同爲大夫執技事上凡執技以事上者不二事不移官出鄉不與士齒謂祝史射御醫卜及百工也唯賢是舉雖賤何傷唯善是求何賤之有將欲捜以賢良豈可遺於側陋楚軍舉善用仲爽於申俘漢主使能擢宏羊於賈豎黄憲牛醫之子黄叔度達吏舉小吏周禮王侯無種孔寒品晚進悉力薦藉陸餘慶於寒品晚進必悉力薦藉分其賢愚而繫其理亂嘗聞既徃布衣之士亦賤者也而一人下之三公崇之將欲分其賢愚而繫其理亂房琯上張燕公書用能畢盡其材器夫舉善不遺於微陋用能畢盡其材器歐陽詹上鄭相公書何能發聲光于幽陋京邑之大居無環堵百官之盛親無𤓰葛夫何能發聲光于幽陋雖不欲雌黄者之所輕重豈不欲持衡者所斤銖耶劉軻上座主書褰芳于幽中夜憤激願從寒士齒庻或褰芳于幽不以孤秀不擷揀金于沚不以泥土不取同上雖微必舉劉蕡䇿元凱在下雖微必舉不遺䟽逺舉賢正而不遺其䟽逺則化浹朝廷矣同上蔽賢八白文仲竊位子曰臧文仲其竊位者與知柳下之賢而不與立也言不舉之在位棄德不讓不仁臧文仲下展禽仲尼曰不仁黜爵大戴禮古者諸侯不官士一則黜爵再則黜地三則黜爵地俱盡野無遺賢書賢路既壅倖門惟開賢路既妨倖門惟啓簡賢附勢簡弃也書史魚不殯於正堂衛史魚知蘧伯玉之才而不能進死不殯於正堂以自貶蔽才有罪管子舉善且聞懋賞蔽賢豈得無辜遺賢不仁蔽賢有罰見賢禮見賢而不能舉舉而不能先慢也注先先已也誠宜見善必求何乃知賢不舉孔引武后革命事盛推仁傑功武儒衡將大用宰相令狐楚忌之會以狄兼謨爲拾遺楚自草制引武后革命事盛推仁傑功以指切儒衡且沮止之儒衡泣見上曰臣祖平一當天后時避仕終老不渉于累帝慰勉之自是薄楚抑逺材譽帝陳樂勤政樓既罷兵部侍郎盧絢按轡絶道去帝愛其醖藉稱美之明日林甫召絢子曰尊府素望上欲任以交廣若憚行且當請老絢懼從之俄授太子詹事由是廢於時有以材譽聞者林甫䕶前皆能得於天子抑逺之賢者媢能者忌盧杞既得志險賊寖露賢者媢能者忌忠臣寒膺良士痛骨諌官趙需等極言杞罪四海共弃今復用之忠臣寒膺良士痛骨必且階禍其言懇到李林甫言嚴挺之春秋髙嚴挺之初帝顧林甫曰挺之其材可用林甫因紿挺之使稱疾即言挺之春秋髙有疾餘見詹事舉朝咎令狐綯爲媢賢盧鈞守太子太師帝元日大饗含元殿鈞年八十升降如儀音吐鴻暢舉朝咨嘆以鈞耆碩長者顧不任職咎綯爲媢賢綯聞言于帝帝即以鈞同中書門下平章事羈旅寒躓願得官自効日訴于前皆抑不與崔植朱克融等賞舉賢九白賞胥臣以先茅之縣晉襄公賞胥臣曰舉郤缺子之功也賜以先茅之縣有功加錫大戴禮古者諸侯貢士三適謂之有功加錫九錫急賢懋賞蔽賢失徳則必有刑舉善援能如何無賞難廢先茅之典請旌刈楚之功臣能進賢君必懋賞孔賜帛三百疋常何言馬周帝賜之進考増秩陸宣公奏議得賢則進考増秩醻其得人張嘉貞御史張循憲使河東咨以事嘉貞條析理分莫不洗然循憲大驚試命草奏皆意所未及它日武后以爲能循憲對皆嘉貞所爲因請以官譲后曰朕寧無一官自進賢邪召嘉貞見内殿嘉貞儀止秀偉奏對偘偘后異之擢循憲司勲郎中醻其得人有稱職者受薦賢之賞薛登選舉䟽考試十白𣙜其得失覆以能否明試以功厯試諸難所試子曰如有所譽者其有所試矣六藝掄材四科取士射䇿之初中正鵠而後取掄材之際審輪轅之必分先論禮凡官人材必先論之謂論其德行道藝論辨然後使之辨謂考問得其定也儒有彊學以待問力行以待取禮懸藻鏡之鑒而取上才藴撞鍾之鳴以待下問一發之初雖失正鵠百鍊之後方辨精鋼考其德藝周禮小司徒職云三年大比考其德行道藝詢事考言登庸並尚書藝成拔萃循聲責實棄瑕録用舉措用捨考其德行察其道藝周禮君子立身道惟難進主司取士才不易知辨論官材考其才也四術崇儒九流考藝刈薪拾芥考覈既在有司僣濫寧由多士試可乃已考第周禮族師讀邦書考第考學者銓度國語稱物緫覈名實漢九徵莊子逺使觀其忠近使觀其能煩使觀其才卒問觀其智急與之期觀其信委之以財觀其仁告之以危觀其節醉酒觀其則雜處觀其色九徵並而不肖人得也以待又語禮或以言揚舉吏先試後漢左雄令舉吏先試公府覆之端門張盛奏除之黄瓊云將以覆實不可改也上第五十難上第高說徐防謂卿上䟽五經宜從其家章句開五十難以試之解釋多者爲上第引文明者爲高說耻不試晉甘卓舉桂陽谷儉一人到臺遂不試儉耻州少士試高第除郎中下第者同次第爲太子舍人漢獻詔試儒生下策者罷之詔曰孔子歎學之不講不講則所試日忘今耆儒年踰六十去本土營粮食不得專業㓜童入學白首空歸永絶榮望朕甚愍之其依科罷者聽同次第爲太子舍人孔不喜與諸生並試有司李所試索所試鄭畋舉進士時年甚少有司上第籍武宗疑索所試自省乃可奏爲宣武推官許自通所工韋陟遷禮部侍郎陟於鑒裁尤長故事取人以一日試爲髙下陟許自通所工先就其能試之已乃程考由是無遺材廉視尤謹温庭筠思神速多爲人作文大中末試有司廉視尤謹庭筠不樂上書千餘言然私占授者已八人左右圜視朋儕拱手觀其掉鞅于術藝之場游刃乎文翰之林風雨交於筆扎雲霞發於簡牘左右圜視朋儕拱手甚可壯也柳宗元送苑論序得賢十一白賢國之寳嘉魚樂得賢也三良爲政未可間也管仲曰鄭有云云干旄美好善也王褒之頌聖主得賢臣頌五百年一賢人出二八舜舉八元八凱致君於堯舜以賢爲寳將照千里齊威王曰所寳惟賢以賢制爵則人慎德周禮賢者能者周禮縶之維之詩汝得人焉吾與㸃也論進士之賢者禮記論進士之賢者以告于王論定然後官之位定然後爵之任事然後禄之終因德進始以名稱禄在其中德成而上以善爲寳禮賢爲國寳人代天工禹稱善人衛多君子野無遺賢書李彊拜益州牧謂揚雄曰吾真得嚴君子矣雄曰此人可見而不可屈也孔房𤣥齡爲秦王記室房𤣥齡太宗爲秦王授府記室王曰漢光武得鄧禹門人益親今我有𤣥齡猶禹也城西作文學館収聘賢才武德四年太宗爲天䇿上將軍㓂亂稍平乃鄉儒宫城西作文學館収聘賢才於是下教以杜如晦等並以本宫爲學士凡分三畨逓宿于閤下悉給珍膳毎暇日訪以政事討論墳籍㩁略前載無常禮之間命閻立本圖像使禇亮爲之賛題名字爵里號十八學士藏之書府以章禮賢之重方是時在選中者天下所慕向謂之登瀛洲長孫無忌進司空知門下省事固辭詔答曰黄帝得力牧爲五帝先夏禹得咎繇爲三王祖齊桓得管仲爲五伯長朕得公遂定天下公其無譲爲政之本要得賢人乃治關播帝問政治之要播曰爲政之本要得有道賢人乃治帝曰朕比下詔求賢才又遣使黜陟捜逮所遺湏能者用之若何播曰陛下雖求賢又使舉薦然止得求名文辭士焉有有道賢人肯奉牒丐舉選邪折節下士賢者乃出李絳帝恠前世任賢以致治今無賢可任何邪對曰聖王選當代之人極其才分自可致治豈借賢異代治今日之人哉天子不以已能盖人痛折節下士則天下賢者乃出賢則當任任則當久夫任官而辨廉措事不阿容無希望依違之辭無邪媚愉恱之容此近於賢矣賢則當任任則當久賢者中立而寡助舉其類則不肖者怨杜邪徑則懐奸者疾一制度則貴戚毁傷正過失則君䟽忌然用賢豈容易哉蕭至忠䟽曰求治之道首于用賢茍非其才則官曠官曠則事廢事廢則人殘厯代所以陵遟者此也成汭任賀隱隱賢者也故汭所舉少過天后重用刑輕用官楊嗣復帝問天后時有起布衣爲宰相者果可用乎嗣復曰天后重用刑輕用官自爲之計爾必責能否冝待厯試乃可用賢不計資柳璨帝謂學士承㫖張文蔚曰璨材可用今擢爲相應授何官對曰用賢不計資帝曰諌議大夫可乎曰唯唯遂以諫議大夫同中書門下平章事拔去兇邪登崇畯良今聖賢相逢治具畢張拔去兇邪登崇畯良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光盖有幸而獲選孰云多而不揚韓文貞觀政成開元業泰陸長源上宰相書太宗得房杜貞觀之政成元宗得蘇宋開元之業泰其下有柱柱下有石石下有土劉軻上韋右丞書横一木而楝明堂者其力固多然其下有柱柱下有石石下有土積三物而楝始成焉太𤣥曰崔嵬不崩群土彊此明上下節級有扶持之道也任賢用善合契同德李澣淮南司馬㕔壁記國僑爲政乃子皮之功晋侯勤王信魏絳之力任賢用善合契同德未嘗無賢以不用亡不必多賢以見用興岑文本賛文本才猷世南鯁諤百藥之持論亮思廉之䆳雅德棻之辭章皆治世華采而淟汨於隋光明於唐何哉盖天下未嘗無賢以不用亡不必多賢以見用興文變風俗學究天人懐經濟之才抗巢由之節文可以變風俗學可以究天人一命不霑四海稱屈李白代宋中丞自薦表棄賢十二廢滯附白權輿秦康公與賢人有始無終也權輿始也考槃刺莊公使賢者退而窮處薖軸之歎伐檀君子不得仕進退不伐檀遺賢白駒在谷不見維縶詩簡兮刺不用賢也衛之賢者仕於伶官柏舟言仁而不遇也任賢委政既乖勿貳之言書曰任賢勿貳失寵退身終及如遺之棄詩云棄予如遺進以趨時不聞刈楚退而窮處空歎伐檀道惟難進人豈易知媢嫉人之有技媢嫉以惡之見賢而不能舉十年不調馬融季長爲校書郎於東觀十年不得調因兄子䘮自劾歸也親累不調晉華廙字長駿宏敞有才妻父盧毓典選難舉姻親故廙年三十五不得調舉廢滯晋陳壽承祚遭父䘮有疾使婢圓藥客徃見之鄉黨以爲敗義及蜀平坐是沉滯累年張華愛其才以壽雖不逺嫌原情不至貶廢舉爲孝廉功髙不調張安世少孺有郎功髙不調自言於安世安世曰君功髙明主所知人臣執事何短長而自言乎絶不許已而郎遷言安世不伐功也孔髙才猶伏草萊李綱諫曰今新造天下開太平之基功臣賞未及徧髙才猶伏草萊王義方死草萊魏元忠遷御史帝嘗從容曰外以朕爲何如主對曰周成康漢文景也然則有遺恨乎曰有之王義方一世豪英而死草萊議者謂陛下不能用賢帝曰我適用之聞其死顧已無及劉藏器七十爲尚書郎魏元忠曰劉藏器行副於才陛下所知今七十爲尚書郎徒歎彼而又棄此帝黙然慙抱真節棄於清世李源李德裕表薦源曰天與至孝絶心禄仕五十餘年嘗守沈黙理契深要一辭開析百慮洗然抱此真節棄於清世臣切爲陛下惜之賢愚同滯崔祐甫改中書侍郎常衮當國惟文辭入第乃得進然無所甄異賢愚同滯焉及祐甫則薦舉惟其人獨無竒士林藴上李相公安邉書假如登奉常之第者未必盡能文章爲牙門之將者未必盡能威敵唐之爲唐獨無竒士也聖朝久棄青雲士他日誰憐張長公李白送族弟獻納少成事歸休辭建章同上白衣干萬乗何事去天庭别劉少府同上騎虎不敢下攀龍忽墮天同上有一裴度不能用韋處厚王廷湊之亂帝疑宰相不才而使姦臣跋扈處厚曰陛下有一裴度不能用乃當饋而嘆恨無蕭曹此馮唐所以謂漢文有頗牧不能用也德如漢光武馮衍不用才如王景略以尹緯爲令史是皆終日號鳴大咤而卒莫之省柳宗元與楊京兆書名譽十三白違道干譽以永終譽言長有譽也子假吾名焉傳言假吾以善名去仁成名以爲子名敗名行浮於名闇然日彰疾没世而名不稱四十五十而無聞斯亦不足畏也爲善無近名名者實之賔莊子德蕩乎名坐馳應坐而馳以身徇名伯夷死名烈士徇名駢明杖仁擢德塞性以収名聲使天下簧鼓以奉不及之法魯史是已犇命仁義蹩躠爲仁踶跂爲義飾非釣名漢汲黯言公孫宏不好立名直不疑唯恐人知爲吏之跡不好立名稱長者畫地作餅魏文帝謂盧毓曰取士勿取名有名如畫地作餅不可啖也畏教慕善盧毓對曰名不足以得異人而可以得常士常士畏教慕善然後有名非所當疾正可循名責實也在邦必聞舉世用之孔世絶紀越紀王謹少好學善星歩與越王齊名當世號紀越乍爲可喜事以邀聲譽王世充突厥圍帝鴈門世充悉發江都兵赴難乍爲可喜事以邀聲譽少有名號三少李嗣真賀蘭敏之脩撰東臺表嗣真直宏文館與學士劉獻臣徐昭皆少有名號三少言吏部者稱裴馬馬載與裴行儉分掌選事言吏部者稱裴馬焉譽望益重楊恭仁既貴不以勢尚人故譽望益重長者稱婁郝婁師德方酷吏殘鷙人多不免獨能以功名始終與郝處俊相亞世之言長者稱婁郝蘇李蘇味道與里人李嶠俱以文翰顯時號蘇李劉孟髙郭劉禕之少與孟利貞髙智周郭正一俱以文辭稱號劉孟髙郭賣直售名李渤杜元頴劾奏渤賣直售名元白劉白白居易初與元稹酬詠故號元白稹卒又與劉禹錫齊名號劉白蘇賈賈魯與蘇晉同掌制誥皆以文辭稱時號蘇賈蘇李蘇頲時李乂對掌書命帝曰前世李嶠蘇味道文擅當時號蘇李今朕得頲又何愧前人哉取空名魏徵忠臣已嬰禍誅君䧟昏惡䘮國夷家祗取空名毁譽常在小人又曰今將致治則委之君子得失或訪諸小人是毁譽常在小人而督責常加君子也語良相必曰房杜如晦元齡兩人深相知當世語良相必曰房杜人有短所以見長霍王元軌數引見處士劉元平爲布衣交或問王所長於元平答曰無長問者不解元平曰人有短所以見長若王無所不備吾何以稱解事僕射戴至德遷右僕射時劉仁軌爲左人有所訴率優容之至德乃語究本末理直者宻爲奏終不顯私恩由是當時多稱仁軌者號仁軌爲解事僕射近名李揆决事明當然銳於進日近名譽重一時常衮長於應用譽重一時魚朝恩賴寵兼判國子監衮奏成均之任當用名儒不宜以宦官領職十譽未之信趙憬五議遺滯曰陛下委宰輔舉才不徧知也則訪之庶僚又不徧知也訪之衆人衆聲囂然十譽未之信一毁之可疑臣謂宜采士論以譽多者先用項斯詩楊敬之愛士類得其文章孜孜玩諷人以爲僻雅愛項斯爲詩所至稱之由是擢上第多士浩然想見其風許孟容數論駮四方知天子開納多士浩然想見其風不爲灼灼顧少連政尚寛簡不爲灼灼名名播戎夷馮定初源寂使新羅其國人傳定黒水畫鶴記韋休符使西蕃所館寫定商山記于屛其名播戎夷如此戰功推爲中興第一李光弼初與郭子儀齊名世稱李郭而戰功推爲中興第一裴度威譽德業比郭汾陽裴度既有功名振四夷其威譽德業比郭汾陽而用不用常爲天下重輕曹畢曹確始畢誠與確同爲相俱有雅望世謂曹畢内宰相王琚帝於琚眷委特異豫大政事時號内宰相譽望大減魏元忠初元忠相武后有清正名至是輔政天下傾望冀幹正王室而稍憚權倖不能賞善罰惡譽望大減完名髙節爛然獨著郭子儀賛及光弼等畏偪不終而子儀完名髙節爛然獨著福禄永終雖齊桓晉文比之爲𥚹不好立名楊綰名動一州號霹靂手裴琰之永徽中爲同州司戸參軍事吏白積案數百命吏連紙進筆爲省决一日畢由是名動一州號霹靂手搢紳想見風采陽城初城未起搢紳想見風采既興草萊處諫諍官天下益憚之尚名田仁㑹遷右金吾將軍所得禄估有贏輒入之官人以爲尚名號二蓋盖文達宗人文懿亦以儒學稱當時號二蓋孫孔孔紹安與孫萬壽皆以文辭稱時爲孫孔云媿在盧前恥居王後王勃與楊炯盧照隣駱賔王皆以文章齊名天下稱王楊盧駱號四傑炯嘗曰吾媿在盧前恥居王後議者謂然來李李義府與司議郎來濟俱以文翰顯時稱來李四䕫崔造與韓會盧東美張正則三人友善居正元好言當世事皆自謂王佐才故號四䕫以治生𤨏碎失名趙宗儒自盜美名楊嗣復傳李珏帝問延英政事孰當記之珏監修國史對曰臣之職切陳夷行曰宰相所録恐掩蔽聖德自盜美名巖巖有風采推重於時髙元俗財賂交權幸以賈虛名王智興聞家子有美譽杜兼爲濠州刺史僚官韋賞陸楚皆聞家子有美譽論事忤兼誣劾以罪劉允濟與王勃齊名本傳李邕名家李邕李嶠歎曰子且名家宋璟劾張昌宗反狀邕召拜左拾遺御史中丞宋璟劾張昌宗反狀武后不應邕立階下大言曰璟所陳社稷大計邕出或譲曰子位卑一忤㫖禍不測邕曰不如是名且不傳文名天下李邕雖詘不進而文名天下時稱李北海云號蕭夫子蕭頴士留客濮陽於是尹徴王恒盧士式賈邕趙臣閻士和柳并等皆執弟子禮以次授業號蕭夫子蕭李所與遊者獨李華與齊名世號蕭李公卿愛其文交譽陸據始到京師公卿愛其文交譽之五尺童子羞稱曹陸閻士和因㩁厯世文章而盛推頴士所長以爲聞蕭氏風者五尺童子羞稱曹陸名冠宗族李華曽祖太沖名冠宗族大龍甲崔澹當時士大夫以流品相尚推名德者爲之首咸通中世推李都爲大龍甲涓豪放不得預雖自抑下猶不許而澹與焉三不開五代馬𦙍孫臨事多不能决當時號爲三不開謂其不開口以論議不開印以行事不開門以延士大夫也詳其善跡陸贄奏議稱人之善者必詳其行善之跡才俊滿前道古今而譽盛德韓文名高逼已韋渉李林甫惡其名高恐逼已乃出爲襄陽太守上失德則與下争名張廷珪賛以下摩上士所甚患然取名最多故上失德則與下争名而後有誅夷斥竄事盛名之下爲難居矣房琯以忠誼自奮片言悟主而取宰相必有以過人者用違所長遂無成功然盛名之下爲難居矣夫名盛則責望備實不副則訾咎深本賛辟召十四白聘名士禮賢者禮徵書同日到嚴延年亡命㑹赦丞相府御史府徵書同日到延年以御史府書先至遂詣御史府爲掾也不及政事後漢司徒侯霸辟閔仲叔至不及政事仲叔曰始蒙嘉命且喜且懼今見明公喜懼皆去以爲不足問不當辟辟而不問失人遂去名儒劉矩再爲太尉所尉召皆名儒宿德不與州郡交還以軍書徵召大將軍何進聞邉讓才名欲辟之恐不至乃詐以軍書徵召既至署令史羔鴈成羣陳寔子紀諶並著名世號三君毎宰府辟召常同時羔鴈成羣丞掾交至當世榮之豫州百姓皆圖畫寔紀諶形象謫罰後漢李充立精舍講授太守魯平請署功曹不就平怒乃援充捐溝中謫署縣都亭長不得已起親職役後詔徵爲博士時平亦爲博士毎與集㑹常欲復也辟不就後會葬後漢申屠蟠事見上徵聘門注祭徐穉字孺子爲黄瓊所辟不就瓊卒負米自南昌至江夏殺雞祭之不告姓名制服司徒袁逢舉荀爽有道不應卒制服三年徃徃爲俗哭王脩爲袁譚所辟不就譚誄哭之幅巾見鄭𤣥康成大將軍何進辟不得已詣進進爲設几杖𤣥不受服以幅巾而見一宿而去留祕閣之吏魏王凌請王基爲別駕後基爲祕書郎凌後請還司徒王朗與凌書曰家臣之良則升公輔公臣之良則入王職今留祕閣之吏所希聞也凌尤不遣殺公掾晉魏舒爲司徒有周震者頻爲三公府辟辟書下公輒亡時人號爲殺公掾莫爲辟者及舒命之竟無他也以禮進退魏李憙累辟不就司馬景王命爲從事中郎引見曰先公辟君不應今至何也對曰先公以禮見待憙得以禮進退明公以法繩下故憙懼法而來也職滿乃得辟左雄伯蒙上䟽言鄉部親民之吏清白從政者請寛其貲筭増其秩祿吏職滿歲宰府州郡乃得辟舉宦豎不久侍竟不用也處士年少崔駰亭伯竇辟爲掾憲府貴重掾属皆故刺史二千石崔駰以處士年少擢在其間彊辟喬元公祖爲漢陽守郡民姜岐守道隱居元辟爲吏不就元怒使督郵偪致之曰岐若不至趍嫁其母督郵諫元不聽徃辟岐岐亦不起士大夫競諫元元乃止皎皎白駒賁然來思焚山太祖辟阮瑀瑀不就逃入山中祖使焚山得瑀瑀即集賔使就技人列瑀鼓琴歌云太祖大恱五府交辟孔府寺交辟薛登䟽漢世求之必觀其行故士有自修爲閭里推舉然後府寺交辟署節度府判官王徽徐商罷政事守江陵心欲表徽在幕府恐其不樂外忍不言徽自徃曰公知徽安得不從商大喜表爲殿中侍御史署節度府判官羅致幕下大夫烏公以鈇鉞鎮河陽之三月以石生爲才以禮爲羅羅而致之幕下未數月也以温生爲才於是以石生爲媒以禮爲羅又羅而致之幕下大夫烏公一鎮河陽而東都處士之廬無人焉三返乃肯應薛戎年四十餘不仕江西觀察使李衡辟召幕府三返乃肯應奏辟不應竇常隱居二十年鎮州王武俊聞其才奏辟不應以厚幣皆不應韋貫之補伊闕渭南尉河中鄭𤣥澤潞郄士美以厚幣召皆不應古者或遥聞辟召或一見任之是以士修名行而流品不雜張九齡上䟽徵拜御史柳文柳渾行狀朝右藉甚有聲徵拜御史遣使者四輩敦趣馬周舍中郎將何武家時詔百官言得失周爲條二十餘事皆當世所切太宗恠問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之間未至遣使者四輩敦趣及謁見與語乃大恱玉麟符屈突通煬帝即位遣持詔召漢王諒先是文帝與諒約若璽書召驗視敕字加㸃又與玉麟符合則就道及是書無驗諒覺變詰通通占對無屈竟得歸長安遇休沐徃徃馳召宇文士及擢右衛大將軍太宗延入閤語或至夜分出遇休沐徃徃馳召召太子用玉契崔神慶轉右庶子是時突厥使者入見皇太子應朝有司移文東宫召太子神慶諫曰五品以上佩龜者盖防徵召之詐内出龜以合之況太子乎古者召太子用玉契此誠重謹防萌之意不可不察以銀爲信代宗欲相李泌元載忌之帝不得已出泌約曰後召當以銀爲信忽除銀青泌知載必敗已且相矣未㡬果然鄴侯家傳云騎詔長慶集騎詔徵還便殿與對隨身魚符以明貴賤應召命左二右一左者進内右者隨身皇太子以玉契召勘合乃赴親王以金庶官以銅皆題某位姓名官有貳者加左右皆盛以魚袋三品以上飾以金五品以上飾以銀刻姓名者去官納之不刻者傳佩相付車服志待士十五白隗始郭隗謂燕昭王曰王欲禮賢請從隗始昭王乃築臺師事隗於是樂毅自魏徃鄒衍自齊徃劇辛自趙徃也信陵之下侯生史魏有隱士侯生爲夷門抱關公子欲厚遺之不受乃置酒大㑹公子從車騎虚左迎侯生於公子上座不讓欲以觀公子公子執轡愈恭侯生曰有客在市屠中願枉車騎公子乃引車入市侯生下見朱亥睥睨久立公子顔色愈和喜士名聞郊迎擁篲鄒子衍重於齊梁惠王郊迎之執賔主禮如燕昭王擁篲前驅列弟子之坐而受業築碣石之宫身親師之記語孟嘗君在薛招致諸侯賔客及亡人有罪皆歸舍業遇之毎待客坐語屏後侍人主記與賔客語不敢加兵魏公子無忌仁而下士無賢不肖謙而禮交之士争徃歸之諸侯不敢加兵於魏無忌即信陵君魏文侯師田子方太子擊遭於道下車伏謁子方不爲禮擊因問曰富貴驕人乎貧賤驕人乎子方曰諸侯驕人失國大夫驕人失家貧賤行不合去之楚越如脫屣懸榻後漢樂安太守陳蕃郡人周璆髙絜之士前後郡守招命不致唯蕃致之而不名特爲致一榻去則懸之璆字宣之皆得所欲袁安博愛客衆無所聞擇賔客入門賢愚皆得其所欲任延爲㑹稽都尉有龍丘萇隱居三公連辟不到延洒掃其門遣功曹奉謁相望於道積一歲萇乃乘輦詣府門願得生死備録遂署議曹祭酒遂卒倒屣蔡邕竒王粲粲至倒屣迎之既至容貌短小一坐盡驚邕曰此王生也有異才吾家書文章當與之董允蜀志董允爲尚書令費禕典中軍期逰燕嚴駕已辦董恢詣允恢年少官微見允將出逡廵求去允不許曰舍此就彼宴非所宜乃命解禕等駕下士如此座無空席王渾爲安東將軍鎮夀陽虛懐接納座無空席門不停謁江東之士恱附之避正寢舍蓋公曹參周公下白屋之士一沐三握髪一飯三吐哺以貴下賤大得民也易貴而能降降心相從降尊就卑孔無貴賤爲盡禮惠文太子範愛儒士無貴賤爲盡禮収人物致幕府房元齡秦王記室征伐未嘗不從衆争取怪珍元齡獨収人物致幕府與諸將宻相申結人人願盡死力雖厮役皆得其歡裴矩見天下方亂其待遇士尤厚雖厮役皆得其歡邢君牙屈己好士性樂士張建封性樂士賢不肖遊其門者禮必均故其徃如歸許孟容韓愈皆奏辟幕府喜接後進李紓喜接後進禮賢下士有終始李勉雖小善數千里邀致李抱真喜士聞世賢者必欲與之游雖小善皆卑辭厚幣數千里邀致之至無可録徐徐以禮謝善遇士田頵善遇士若楊䕫康駢夏侯淑般文圭王希羽等皆爲上客待官屬有禮烏重𦙍公卿多依王審邽爲泉州刺史中原亂公卿多來依之振賦以財如楊承休鄭璘韓偓歸傳懿楊賛圖鄭戩等頼以免禍審邽遣子延彬作招賢院以禮之盡待士之禮伏自開幕府已來辟取當世之名士禮接待遇各盡其意不自矜髙不設塹壘曲盡情意以盡待士之禮杜牧上崔大夫書虚舍邀崔顥初李邕聞其名虚舍邀之重義愛士李邕蚤有名重義愛士好禮士人閩王審知雖起盜賊而爲人儉約好禮士人王惔宰相博之子楊沂唐相渉從弟徐寅時知名進士皆依審知仕宦五代史沐垢不終湯充飲不竟腹沈亞之上冢官書古者賢士之居位也沐垢不終湯充飲不竟腹中輟而起畏日不足是皆採善於衆能燕昭延郭隗遂築黄金臺劇辛方趙至鄒衍復齊來李白古風待士之道韓愈書愚者日至閤下以千金與之賢者至又以千金與之則愚者莫不至而賢者日逺矣欲求待士之道盡於此而已矣置擇能院五代呉越錢元瓘好儒學善爲詩使其國相沈崧置擇能院選呉中文士録用之後出莫不造門韋顗喜接納後出莫不造門而李逄吉方結黨與擅國政頗傅㑹之素議遂衰考課十六白三歲大計周禮太宰之職三歲大計群吏之治而誅賞注三載考績廢置太宰以八則治都鄙三曰廢置以馭其吏注云廢退其不能者進置賢能者也殿最三載黜陟舜典三載黜陟幽明詢事考言明試以功功事周禮責實稽其功事㑹政計㑹政事周禮大比三年大比以考群吏而廢置注云大比大計也崇德黜惡禮程功㑹課稽功底績底致也績功也書智效一官績成三考政乃日修功惟歲課計最考課吏法漢京房君明言古帝王以功舉賢則萬化成末世毁譽取人故功業廢宜令百官各試其功房奏考課吏法令丞尉治一縣云犯法者輒遷有盜賊三日不覺者尉事也令覺之自除二尉負其二率相推如此法朝臣皆以爲上下相司不可許唯鄭宏周堪善之房爲魏郡太守得以考功法治郡房自請願無屬刺史課第六蕭育爲茂陵令㑹課注考課育第六漆令郭舜殿見育救之扶風怒曰君課第六裁自脫何暇爲人言也谷永書曰明度量以程能考功實以定德都官考課魏志劉邵作都官考課上䟽曰官吏考理王政之較然而厯代不務是以理典闕而未補能否混而相蒙傅嘏難之卲作考課法云云盧毓考課法毓曰名不可致異人可以得常士畏教慕善然後有名古者敷奏以言明試以功今考課廢而名譽相進退故真偽相蒙帝納其言作考課法及選舉先性行而後言才也治中周禮天府几官府鄉州及縣都鄙之治中受而藏之以詔王察羣吏之治察其當黜陟者鄭司農注云治中調其職簿書之要也奏課連最閥閱朱博爲琅邪太守始暮縣有盜游繳王卿盡力捕得五十人博移書曰王卿憂公甚有效檄到賫閥閱詣府注閥功勞也閱所經厯黜陟之課杜預元凱受詔爲黜陟之課令委逹官各考所統在官一年已後歲言優者一人爲上第劣者一人爲下因計偕以聞六載則主者揔集優者超用之劣者奏免之優多者叙用之優少者左遷之内外官杜恕務伯爲黄門侍郎時大議考課之制以考内外衆官恕上䟽言州郡考工皆有事效然後察舉郡守以功次補或就増爵秩此最考課之急至於公卿内職大臣不當但以其職考課之也三公坐而論道内職大臣納言補過安有大臣但守職辨課可致雍熈者云云計治而誅賞王昶文舒詔使撰百官考課事昶以唐虞有黜陟之文而考課之法不垂周制冢宰之職大計群吏之治而誅賞又無校比之制由此言之聖王明於任賢略舉黜陟之體以委逹官之長而揔其統紀故能否可知也孔考爲天下第一鄭善果所至有績號清吏嘗與武威太守樊予盖考爲天下第一煬帝賜物千段黄金百兩黜陟詳當趙宗儒領考功事自至德後考績失實内外悉考中上殿最混淆至宗儒黜陟詳當無所回憚右司郎中獨孤良噐殿中侍御史杜倫以過黜考左丞裴郁御史中丞盧佋降考中中凡入中上者纔五十人帝善之自宰相而下升黜李渤拜考功渤自宰相而下升黜之上奏曰宰相俛文昌植陛下即位倚以責功安危治亂繫也方陛下敬大臣未有昵比左右自驕之心而天下事一以付之俛等不推至公陳先王道德又不振拔舊典復百司之本政之興廢在賞罰俛等未聞慰一賢者使天下吏有所勸黜一不職使尸祿有所懼士之邪正混然無章陛下比幸驪山宰相學士皆股肱心腹宜皆知之不先事以諫陷君於過俛與學士杜元頴等請考中下御史大夫李絳左散騎常侍張惟素右散騎常侍李益諫幸驪山鄭覃等諫畋游得事君之禮請考上下奏入不報考績爲天下最路嗣恭連徙神烏姑臧二縣考績爲天下最𤣥宗以爲可嗣漢魯恭因賜名自述其考唐臨他日復訊餘司斷者輒紛訴不已獨臨所訊無一言帝問故答曰唐卿斷囚不寃所以絶意帝嘆曰爲獄者固當若是乃自述其考曰形如死灰心若鐡石坐漕舟溺者中上盧承慶典選校百官考有坐漕舟溺者中上承慶以失所載考中下以示其人無愠也更曰非力所及考中中亦不喜承慶嘉之曰寵辱不驚考中上其能著人善類此以考升趙憬爲尚書左丞考功歲終請如至德故事課殿最憬自言薦果州刺史韋誣以貪敗請降考校考使劉滋謂憬知過更以考升議考課同上獻審官六議其四議考課曰今内庶僚外刺史課最尤者擢以不次善矣臣謂黜陟宜責歲限若任要重未當遷者加爵或秩其餘進退宜示遟速之常若課在中考如限者平轉而厯試之即無茍且之心滯淹之慮固辭上考盧邁進給事中俄㑹考課邁以不滿歲固辭上考薦紳髙其讓以治課加檢校司封郎中獨孤及厯濠舒二州刺史歲飢旱鄰郡庸士什四以上舒人獨安以治課加檢校司封郎中所至有績可紀李遜爲政抑彊植弱貧富均一所至有績可紀宇文融用事將以括田戸功爲上下考盧從愿不許融恨之校京官考注張均爲中書舍人其父說援左丞相校京官考注均考曰父教子忠古之善訓王言帝載尤難以任庸以嫌疑而撓紀綱考上下當時不以爲私進絀清明席豫遷考功進絀清明所至課最崔彦昭於吏治精明所至課最刺史奏課盧從愿下遷豫州刺史奏課爲天下第一以清白聞課第一薛珏累遷乾陵臺令歲中以清白聞課第一改昭應令所至稱最戴叔倫其治清明仁恕多方略故所至稱最課吏治分明淑慝裴垍既當國課吏治分明淑慝撫字心勞催科政拙陽城爲道州刺史賦稅不時觀察使數誚貴州當上考功第城自署曰撫字心勞催科政拙考下下要㑹十七白八成周禮小宰以八成經邦治八曰聽出入以要㑹要㑹計最簿書也月計曰要歲計曰㑹歲會月要日成小宰宰夫之職歲終則令羣吏正歲㑹月終則令正月要旬終則令正日成而以考其治治不以時舉者以告而誅之㑹計周禮司㑹聽其㑹計致事上其計簿於君受質歲之成受質歲事國用禮司㑹以歲之成質於天子冢宰齋戒受質質於百官百官各以其成質於王官王官以百官之成質於天子然後成歲事國用注成計㑹要也質平也平其計也歲事歲計也計一歲之用㑹財㑹筭也經費經常也辟名謂文簿不實也校簿稽事稽以簿書辨其名物三公受計漢書受㑹周禮官聮以㑹邦治宰正其治受其㑹㑹大計也參互周禮以參互考日成歲終㑹計財用物必考於司㑹歲終㑹計事不從中覆漢書云李牧軍市之租賞賜決於外不從中覆張蒼遷爲計相注計簿籍也蕭何令蒼以列侯居相府領郡國上計也計最嚴助願奉三年計最最凡要也主計張蒼白孔六帖卷四十四
