body:
  text: 白孔六帖卷四十七唐白居易原本宋孔傳續撰贖罪一緩獄二留獄三疑獄四贓賄五使吏供已六寃獄七鬻獄八鞭扑九象刑十肉刑十一族刑十二刖十三罰親十四國親刑十五罰故十六不齒十七財産沒官十八殺人十九贖罪一罰附白如可贖兮詩虞典曰金作贖刑誤入刑者以金贖罪周穆王訓夏贖刑訓暢夏禹贖刑之法更從輕以布告天下百鍰鍰黄鐵也六兩曰鍰罪贖以百鍰重倍加至千鍰也免於刑戮納贖選罰金張釋之爲廷尉文帝出中渭橋有人從橋下走岀乗輿馬驚釋之奏此人犯蹕當罰金上怒釋之對曰法者天下公共不可一傾云云以功贖後漢竇憲字伯度有罪請誅匈奴以自贖乃拜車騎將軍有功遂勒銘燕然山訓夏之刑贖子罪漢丞相公孫賀請捕朱安世以贖子罪子敬聲也西京賦曰丞相欲以贖子罪云云贖入罪前漢史太倉令淳于公犯法當刑㓜女緹縈上書曰妾父爲吏齊中皆稱廉平今坐法當刑妾傷夫死者不可生刑者不可續雖欲改過自新其道無由妾願沒入爲官婢以贖父刑文帝哀憐之乃下詔除肉刑千鍰贖大辟死罪周禮職金掌金罰貨罰入于司兵以金以貨贖罪者也入於司兵以給兵及工直也庇族亢身以貨藩身論贖刑放于寵五罰之疑有赦五罰出金贖罪輕重諸罰有權入粟贖罪漢張敞言國兵在外穀度不足願今有罪非盜受財殺人犯法不得赦者得以差入穀蕭望之李彊議曰粟以贖罪則富者得生貧者獨死是貧富異刑而法不一人情貧窮而父囚執聞出財可以生活則不顧死亡之患爲敗亂之行以趨財利救親戚一人得生十人已䘮此則伯夷之行壞公綽之名滅政教一傾恐不能復竟不施敞議請除贖罪之法貢禹上書買爵惠紀人有罪得買爵三十級以免死罪應劭云若今人三十縑贖罪師古曰令出買爵錢以贖罪也減死罪一等武帝令死罪人贖錢五十萬減云云岀縑續漢書建武初令天下繫囚減罪一等出縑贖罪輕重有差兵甲贖管子曰管仲令齊桓公制重罪贖以犀甲一㦸輕罪楯一㦸注云謂征伐不足也義錢後漢虞詡爲僕射時長安聽百姓謫罰者輸贖號義錢託爲貧人儲而守令因以聚斂詡上疏論之詔下切責州縣也入縑後漢明帝詔亡命者自殊死已下贖死罪縑三十疋右趾至髠鉗城旦舂十疋城旦至司㓂五疋未發自告半入贖請沒爲奴贖父罪晉殿中帳吏部施廣盜官幔三張合三十疋弃市廣二子宗年十三雲十一撾登聞鼔求爲官奴以贖父罪尚書郎朱映議曰宜特聽左丞范堅駮曰以殺止殺小不忍輕刑典人之愛父誰不如此爲施恩於今開殺於後遂正廣刑左驂之贖史越石父賢在縲絏之中晏子見而解左驂贖之孔願伏斧鑕以贖昶罪閩王昶晉高祖怒其不遜下詔暴其罪歸其貢物不納兵部員外郎李知損上書請籍沒其物而禁錮使者於是以元弼下獄獄具引見元弼俯伏曰昶夷貊之君不知禮義陛下方示大信以來逺人臣將命無狀願伏斧鑕以贖昶罪高祖乃赦元弼遣歸夜論世事宇文士及化及敗與封倫等自歸帝讓之曰汝兄弟率思歸之人爲入關計爾時得我父子尚肯相假乎今欲何地自處士及謝曰臣罪當死但臣往在涿郡嘗與陛下夜論世事頃又奉所獻冀以此贖罪罰錢王緯字文卿浙西觀察使缺遣之初州縣有韓滉罰錢未入者十八萬緡府史請裒爲進奉緯上疏願蠲以紓民詔聽之議請減贖唐史刑法志隋有議請減贖當免之法唐皆因之盜請格虎自贖元德秀字紫芝爲魯山令有盜繫獄會虎爲暴盜請格虎自贖許之明日盜尸虎還舉縣嗟歎請以官爵贖王忠嗣數上言祿山且亂李林甫益惡之隂使人誣告忠嗣嘗養宮中云吾欲奉太子帝怒召入付三司訊驗罪應死哥舒翰方有寵白上請以官爵贖忠嗣罪帝意解推父䕃贖金裴潾再遷刑部郎中前率府倉曹參軍曲元衡杖民栢公成母死有司以死在辜外推元衡父䕃贖金公成受財不訢以赦免潾議曰杖捶者官得施所部非所部雖有罪必請有司明不可擅也元衡非在官公成母非所部不可以䕃免公成取賄仇家利母之死逆天性當伏誅有詔元衡流公成論死本傳凡贖罪以銅唐六典緩獄二白國章斯抵宜守限於申嚴人命所懸豈忘情於審慎况刑將不變獄貴惟精月令仲春天子命有司省囹圄省減也去桎梏無肆掠掠拷捶也肆暴尸也止獄訟孟夏挺重囚挺寛也至秋方決出輕繫出而舍之要囚伏念五六日至于旬時要囚察其辭要也君子以明慎用刑而不留獄易旅卦雖緩死以過時未盡善也比失刑於欲速不猶愈乎輟丹筆君子以議獄緩死易中孚卦緩刑周禮容姦禮利淫淹恤過時亦宜問罪稽留有故亦可徴辭若審慎而無他雖愆期而可恕将蔽罪之有程敢忘慎守未得情而難斷寧免稽遲當斷不斷孔不時決殷侑初鹽鐵度攴使屬官悉得以罪人繫在所獄或私置牢院而州縣不聞知歳千百數不時決侑奏許州縣糾列所繫申本道觀察使并具獄上聞許之恤獄緩死唐文粹韋嗣立論刑法多濫疏雖陛下仁慈哀念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實犯雖欲寛捨其如法何留獄三白月令仲秋命有司申嚴百刑無留有罪既非伏念之勤宜及過時之責雖事無欲速而法有勾稽而不留獄易見上淹恤過時則宜問罪稽留有故亦可徴辭若審慎而無他雖愆期而可恕雖蔽罪之有程敢忘慎守未得情而難斷寧免稽遲若踰伏念之時淹恤不糾則恐舞文之吏因緣長姦雖要囚惟恤而折獄有程既察情而得情何當斷而不斷違限之糾慢官之科聽訟之要辭既易於二三伏念之期日遂踰於五六孔歲千百數不時決見上門蔽獄文粹李德裕上尊號冊文逺無蔽獄滋豐陸宣公奉天赦大道既隱蔽獄滋豐牢械充滿宋璟京兆人權梁山謀逆敕河南尹王怡馳傳往按牢械充滿乆未決乃命璟爲京留守復其獄初梁山詭稱婚集多假貸吏并坐貸入璟曰婚禮借索大同而狂謀率然非所防意使知而不假是與爲反弗知何罪之云予縱數百人督鄧琬負米唐扶字雲翔大和五年爲山南宣撫使内鄉倉督鄧琬負度支漕米七十斛吏責償之繫其父子至孫凡二十八年九人死於獄扶奏申釋之詔切責鹽鐵度支二使天下鹽院償逋繫三年以上者皆原更三赦不得原白居易字樂天度支有囚繫閿鄉獄更三赦不得原乂奏言父死繫其子夫乆繫妻嫁債無償期禁無休日請一切免之奏凡十餘上益知名疑獄四白記曰疑獄汜與衆共之衆疑赦之疑事無質質成也疑則捨之不可成也狐疑宣尼之聽訟辭不獨見也史記孔子在位聽訟辭有可與人共者不獨見也漢景之恤疑獄亦命讞之漢景詔曰獄疑者輒讞罪疑惟輕舜典周書曰五罰之疑有赦罰贖刑罪也刑疑赦從罰罰疑赦從免言重疑也似是而非禮有指無簡不聽簡誠也雖有其意無其誠者不論以爲罪闕疑緩死移讞讞疑罪疑刑放得情猶合哀矜疑事誠宜開釋諸疑獄雖文致於法而於人心不厭者輙讞之景帝詔吏不能決高詔御史獄之疑者吏不能決使有罪者乆而不論無罪者乆繫而不決自今縣道官獄疑者各讞屬所二千石官二千石官以罪名當報之注當處也某所不能決者移廷尉廷尉亦報之廷尉不能決者具奏平亭疑法史張湯決獄欲傳古義乃請博士弟子治尚書春秋補廷尉史平亭疑法注亭均也奏疑讞事必先奏上分别其原上所是受而著讞法廷尉挈令注云著謂明書之挈者獄訟之要也書於讞法挈令以爲後代式雖國令是干罰宜無小而人心未厭事合從輕孔四方疑獄悉令按訊崔善爲仕隋調文林郎督工徒五百營仁壽宫總監楊素索簿閲實善爲執板暗唱無一差謬素大驚自是四方有疑獄悉令按訊皆䆒其情擒盜韓思彦字英逺使并州方賊殺人主名不立醉胡懐刀而汙訊掠已服思彦疑之晨集兒童數百暮岀之如是者三因問兒岀亦有問者乎皆曰有之乃物色推訊遂擒真盜辨處契要無不盡杜佑補剡縣丞嘗過潤州刺史韋元甫以故人子待之不加禮它日元甫有疑獄不能決試訊佑佑爲辨處契要無不盡元甫竒之署司法參軍積歲疑留權德輿歧公遺愛碑盈庭闢辯積歲疑留者片言以聽斷含寃自誣具獄論殺者覆視而全活訊不承成汭頗知吏治嘗錄囚盡其情墊江賊隂殺令其主簿疑小史導之訊不承臨刑曰我且訟地下踰月吏暴死汭聞益詳於獄唐史疑其寃縱不治崔從字子文攝守卭州前刺史有以盜繫獄辭已具從疑其寃縱不治俄得眞盜疑獄劇事多與參裁韋思謙高宗賢之疑獄劇事多與參裁罪渉疑似必誅韓滉贓賄五白六贓賄賂公行予取予求賄賂並行政以賄成王叔之相也政以賄成而刑放于寵黷貨傳晉有羊舌鮒者黷貨無厭亦將及矣獻子辭梗陽之賂傳梗陽人有獄以女樂遺魏獻子獻子將受之閻没女寛當食三歎諌而止叔魚鬻邢侯之獄叔魚納雍子之女蔽罪邢侯叔向曰鮒也鬻獄以黷賄賂而煩刑書貪以敗官爲墨既求私貨宜正官刑情因利動遽聞雍子之求政以賄成遂受梗陽之賂臨財茍得且不懼於四知黷貨無厭又何逃於三尺相賂以貨受悖入之貨禮私求公坐私欲養求不給則應傳刑放貨聞不思挈已曽是徇財受官屬財物景詔左遷徒免罷受故官屬所將監治送財物奪爵爲士任免之注奪爵爲士又免其官職若今之除名從仕卒之位景詔無爵者罰金二斤沒入所受有能捕告卑其受贓加賞漢武時張武受金加賞賜以媿其心私附益丞相司直繁延壽奏御史大夫蕭望之賣買私所附益十萬三千注云以私錢増益也受飲食景詔吏受所監臨飲食免重受贓物賤買貴賣論輕更議著令廷尉與丞相議曰吏及諸有秩皆受其官屬所監臨治所將其與飲食計償費勿論注云計所齎償價値也他物若買故賤賣故貴皆坐贓爲盜沒入縣官也禁錮漢文時貴廉絜賤貪汚賣人贅壻及吏坐贓皆禁錮不得爲吏賞善懲惡自條其姦贓應記薛宣爲馮翊高陵令楊湛貪猾宣手自牒書條其姦贓與湛湛自知贓應記解印綬爲記謝注云應記爲與宣書相當妻受錢薛宣時爲池陽令舉獄掾王昱府未召妻受繫者錢掾不知悲慙自殺宣移書書掾之柩以顯其魂也銖兩之姦趙廣漢字子都所在吏取銖兩之姦皆知之陳咸爲少府鉤發姦贓沒入辜㩁財辜罪也㩁專固財也鉤音遘主守盜十金弃市丞相翟方進云云盜收外國財物陳湯盜收康居財物戒官屬曰絶域不覆校丞相匡衡奏雖在赦不宜處位坐免古者大臣坐不廉而廢曰簠簋不飾尚遷就之諱也賈誼曰貨賂上流公孫賀謝錢𢎞農守張匡坐贓報陳湯爲訟罪得踰冬月許謝錢二百萬懐慙自殺後漢皇甫嵩義眞爲冀州牧車騎將軍吏有受賂嵩更以財物賜之吏懷慙自殺米肉卓茂爲密令人有言吏受其米肉者茂曰汝自以恩意遺之吏不當以威力彊取爾禁錮二世清河相叔孫光坐贓禁錮二世居延都尉犯贓楊震等議光比劉愷以春秋惡止其身禁子孫非詳刑之意封記還鍾離意爲郡督郵縣亭長有受人酒禮郡下法記治之意封記曰政化自近及逺宜先清府内濶畧逺縣細微之愆太守賢之任以政事酒食爲贓王吉爲沛相有微過酒食爲贓者雖十年猶加貶弃注其名籍也不以贓杖鞠人袁安邵公爲河南尹政號嚴明未嘗以贓杖鞠人嘗曰錮人於聖世尹不忍聞者感激京師肅然諫兄鄭均兄爲吏受人禮遺均諫不從均傭歲餘得錢帛與兄曰物盡可復得爲吏坐贓終身弃之兄感之遂爲廉吏也減死遷徙魏侍中許允擅用罰錢賜減死遷徙祠發贏錢陶謙字恭祖爲舒令郡守張盤搆有錢簿謙在官清白惟祠遷星有贏錢五百欲以爲贓謙委於官而去也子坐贓免官晉劉寔子夏以貪汚弃於世寔坐夏受賂免官或譏寔不訓子寔曰吾之所行夏所聞見不相祖習豈教訓得乎世以寔爲言當子受財不累高光爲廷尉子韜字子逺放佚無檢受財有司案之光不知時人曰雖非光不能防其子以其用心有素不以爲累也撻子庾氷爲車騎將軍清慎常以儉約自居中子襲貸官絹十四冰撻之市絹還其官受家具王述字懐祖求試宛陵令受家具一千三百條王導使謂曰名父之子不患無祿屈居小縣不宜爾答曰當自止後居州郡清廉絶倫祿賜皆散之親故宅宇不革於昔清既謝於冰壺罪何逃於霜簡貪泉之戒靡聞廣州有貪泉飲之者則貪濁晉吳隱之爲刺史飲之曰夷齊當不易心如水之心遂爽鄭崇曰臣門如市臣心如水言清也還珠懐璧乾沒張湯爲小吏乾沒與長安富賈田魚翁叔交私注云乾沒射也得利爲乾失利爲沒漁奪蚌侵贓物岀賜後漢北地太守廖信坐貪穢下獄入財産顯宗以班諸廉吏惟周澤孫堪常仲特蒙賜與京師翕然在位者咸自刻勵受賜贓委地交趾太守坐贓伏法資財簿入司農顯宗班賜羣臣鍾離意得珠璣悉以委地不拜帝怪之對曰孔子忍渴於盜泉曽參迴車於勝母惡其名也此贓穢之物誠不敢拜帝曰清乎尚書之言更以庫錢三十萬賜意意字子何知而不納南郡太守劉肇遺王戎筒中細布五十端司𨽻糾之以知而不納不坐帝曰戎豈懐私不欲異爾然爲清慎所鄙高名不劾孫盛安國爲長沙守頗營資産從事至郡察其名高不劾調發食物陳咸子康爲太守調發屬所生食物以自奉養然操下令自斂逺郡犯贓晉李重茂曽奏欝林守介登役使監臨茍凱以逺郡非人情所樂法謂貶秩居官守重奏恐庸才負逺黷貨奴取蒿免官謝鯤不忌無厭無所畏忌貪惏孔姦贓狼藉張易之元忠説皆被逐其後易之等益自肆姦贓狼藉發贓宗室巨兼河南尹其犯即張皇后從女弟宗正卿李遵素私張發巨贓事貶遂州刺史縱吏取工徒贓崔元畧博州人京兆劉栖楚劾元畧前造東渭橋縱吏増估物不償直取二徒贓三萬緡詔奪一月俸剔抉其贓楊於陵爲嶺南節度使監軍許遂振者悍戾貪肆憚於陵不敢撓以私則爲飛語聞京師憲宗不能無惑有詔罷歸遂振領留事笞吏剔抉其贓吏呼曰楊公尚拒他方賂遺肯私官錢耶宰相裴垍亦爲帝别白言之金牀瑟瑟枕盧簡辭字子䇿遷侍御史福建塩鐵院官盧昻坐贓簡辭窮按乃得金牀瑟瑟枕大如斗敬宗曰禁中無此昻爲吏可知矣贓六百萬楊虞卿字師臯改禮部員外郎進吏部㑹曹史有李賨等鬻僞告調官六十五員贓六百萬以上虞卿發其姦李賨等繫御史府而虞卿親吏嘗受二百萬亡命私奴受三十萬虞卿縛奴送獄虞卿坐不檢下免官市羅貢奉李邕字泰和貶遵化尉妻温復爲邕請戍邊自贖曰邕初被訊吏迫邕手書貸人蚕種以爲枉法市羅貢奉指爲姦贓丐乞贓李朝隱字光國入爲大理卿武彊令裴景仙丐贓五千匹亡命帝怒詔殺之朝隱曰景仙其先寂有國功載初時家爲酷吏所破誅夷畧盡而景仙獨存且承嫡於法當請又丐乞贓無死比籍當死坐猶將宥之使私廟之祀無餒魂可也帝不許固請有詔決杖百流嶺南以厚賂謝中人嚴綬加淮西招撫使綬引師壓賊境多岀金帛賞士以厚賂謝中人招聲援非賄謝不與官崔祐甫改中書侍郎元載用事非賄謝不與官及祐甫推至公以行賕賂狼藉楊炎字公南其子𢎞業賕賂狼藉盧杞引嚴郢爲御史大夫按之受賕二十萬緡孔戣字君嚴中人劉希光受賂二十萬緡抵死謝錢李義府遣子津召長孫延謂曰吾爲子得一官居五日延拜司津監索謝錢七十萬楊行穎白其姦詔劉祥道與三司雜訊李勣監按有狀詔除名流嶲州顯賕公謁無所忌楊國忠凡領四十餘使而度支吏部事目叢夥第署一字不能盡故吏得輕重顯賕公謁無所忌所在賄謝李邕字泰和所在賄謝犯贓輙寘之死五代明字吏有犯贓輙寘之死曰此民之蠧也買曲成直唐孫樵凡計贓者以絹平之其贓有六焉一曰强盜二曰枉法其刑絞三曰不枉法四曰竊盜五曰受所監臨其刑流六曰坐贓其刑徒凡六贓定罪有正條餘皆約而斷焉唐六典使吏供已六白衛司馬漢蓋寛饒爲左司馬在部常爲衛官繇使市買衛卿私使寛饒詣府上辭辭尚書也尚書責問衛尉由是不復私使侯司馬護視家事爲妻先引丞相司直繁延壽奏御史大夫蕭望之多使守吏自給車馬往茂陵護視家事小吏冠法冠爲妻先引也迎醫晉陶侃廬江人爲郡主簿太守張䕫妻有疾將迎醫請行曰資於事父以事君小君猶母也云云吏修園宅王戎爲荆州刺史坐遣吏修園宅應免官詔以贖論孔抑吏市私第楊炎字公南趙惠伯爲河南尹時嘗市楊炎第爲官廨御史劾炎宰相抑吏市私第貴取其直盧杞召大理正曰晉評罪晉曰宰相於庶官比監臨計羡利辠奪官杞怒謫晉於是當監主自盜罪絞使行賈州縣藩鎮劉從諫性奢侈賈人子獻口馬金幣即署牙將使行賈州縣所在暴横沓貪責子貸錢吏不應命則愬于從諫欲論奏或遣客遊刺故天下怨怒寃獄七白䇿秀才文曰胏石少不寃之人周禮左胏石達窮棘人之訟注赤石也棘林多夜哭之鬼樹棘槐聽訟於其下夜哭之鬼謂無辜者冶長非罪雖在縲絏之中非其罪也良夫無辜衛侯夢人被髪北面而譟曰予爲渾良夫呌天無辜多殺不辜而號無告無所告也銜寃飲恨吞聲飲恨泰誓曰無辜籲天籲告也誣以偷金難明直氏直不疑執爲盜璧誰辨張儀楚相亡璧門下疑儀盜之掠撻數百劎有餘寃尚能衝斗日無私照猶隔覆盆義夫飲恨五月降霜鄒衍被囚仰天而歎五月降霜孝婦含寃三年致旱東海于公明衆口鑠金信非其罪片言折獄不見其人君實不察其罪申生曰寃濫頗邪𤓰李雖疑薰蕕自别似是而非冶長非罪始因尼父而知叔向無辜終俟祁奚而免國章斯抵誠合申之人命所懸豈宜寃濫黃沙失入丹筆悞書獄非明察法乃濫施未聞情得但見獄成得情猶合哀矜非罪誠宜開釋捶楚之下何求不獲雖臯陶聽之猶謂死者有餘刑刑濫則懼及善人孝婦致旱東海孝婦養姑甚謹夫死不嫁姑恐累之自殺姑女告婦殺母婦自誣服殺姑獄掾于公明之不可竟殺之郡界旱三年後太守至祭其冡天乃立雨上虞寡婦養姑事同東海孝婦姑以壽終姑女誣告婦加鴆竟結其罪孟嘗伯周爲户曹明之不可亦連旱後太守殷丹至明之遂雨血逆流晉劉隗大連爲司直丞相府斬督運令史淳于伯血逆流隗奏曰斬伯著柱遂逆上絲極未復下流百姓諼譁咸曰寃伯子惠亦訴父不乏軍興生爲窮人死爲寃鬼抱恨入地銜寃受罪氣怨結而不傷涕滿汗而横流與濁吏何親與寃人何仇孔卒不直寃李齊運萬年丞源邃不事齊運怒悴辱之死於廷邃家告寃御史連章深劾齊運訴于帝言爲朋黨所擠天子使宰相喻諫官御史後無得連章以劾然卒不直邃寃誣劾以罪杜兼字處宏僚官韋賞陸楚皆聞家子有美譽論事忤兼誣無劾以罪帝遣中人至兼廷勞畢出詔執賞楚殺之二人罪死衆莫不寃魏元忠中宗在東宫爲檢校左庶子時二張勢傾朝廷元忠嘗奏曰臣承先帝之顧且受陛下厚恩不能徇忠使小人在君側臣之罪也易之等恨怒因武后不豫即共譖元忠與司禮丞高戩謀挾太子爲耐乆朋遂下制獄詔皇太子相王及宰相引元忠等辨於廷不能決昌宗乃引張説爲證説初僞許之至是迫使言狀不應又促之説曰臣不聞也易之等遽曰説與同逆説又曰臣知附易之朝夕可宰相從元忠則族滅今不敢面欺懼元忠之寃后寤其讒部兵𠢐耳崔寧爲牙將事裴冕裴冕被謗朝廷疑之遣使者問狀寧部兵𠢐耳白其寃使者以聞天下稱寃五代趙延義字子英周太祖自魏以兵入京師太祖召延義問漢祚短促者天數邪延義言王者撫天下當以仁恩徳澤而漢法深酷刑罰枉濫天下稱寃此其所以亡也是時太祖方以兵圍蘇逢吉劉銖弟欲誅其族聞延義言悚然因貸其族二家獲全邪正雜揉獄訟寃劇唐史蘇安常曰邪正雜揉獄訟寃劇何昔是而今非耶李元素辨運寃爲御史東都留守杜亞惡大將令狐運㑹盜刼輸絹於洛北運適與其下畋近郊亞疑而訊之掠服之亞請斥運詔監察御史楊寧覆驗事皆不讎亞怒劾寧罔上抵罪詔元素馳按亞迎以獄告元素徐察其寃悉縱囚以還亞大驚復劾元素失有罪元素還帝已怒元素曰臣以御史按獄知寃不得盡辭是無容復見陛下帝意解即道運寃狀帝感寤曰非卿孰能辨之請出獄付外崔琯字從律京兆尹宋申錫爲讒所危宦官切齒時人罕敢辨者琯與大理卿王正雅固請出獄付外與衆治之天下重其賢縊殺崔寧時朔方掌書記康湛詐作寧遺泚書獻之盧杞奏寧初無效順心反狀明甚召至朝堂縊殺之籍其家中外寃之平貸李方元字景業爲江西判官有大獄論死者十餘囚方元刺審其寃悉平貸之宋申錫開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉乆未原雪帝慙曰我當時亦悟其失而詐忠者迫我以社稷計爾使逢漢昭宣時當不坐此因追復右丞岀寃繫唐臨持節按獄交州岀寃繫三千人累遷大理卿李昭德萬歲通天二年來俊臣誣以逆謀既而俊臣亦下獄同日誅時雨甚衆庶莫不寃昭德而快俊臣疑寃不治崔從攝守卬州前刺史有以盜繫獄辭已具從疑其寃縱不治俄得眞盜道路寃譟姚璹遷益州長史新都丞朱待辟坐贓應死待辟所厚浮屠理中謀殺璹劎南有密告后者詔璹窮按璹深探其獄跡疑似皆捕逮誅黨牽聯數千人獄具后遣洛州長史宋元爽中丞霍獻可覆視無所翻坐沒入五十餘族知反流徙者什八以上道路寃譟酷憤紀王謹女東光縣主始諸王妃主自垂拱後被害者皆藁掩之神龍初諸王皆陪葬昭獻二陵主聞感慟卒敕其子曰爲我謝親戚酷憤已雪下見先王無恨矣叫閽弗聽叩鼔弗聞徐有功上疏曰天下員有定此選者日多選曹諉屬公行囂謗滿路唐季人多逆節鞫訊結斷刑慘獄嚴革命歲乆其流弗改事表生情法外􅚰理而刻薄吏驅扇成姦雖朝堂進表列匭内牒叫閽弗聽叩鼔弗聞使申其寃正増其枉上寃狀穆贊字伯明累侍御史陜號觀察使盧岳妻分貲不及妾子妾訴之中丞盧佋欲重妾􅓧贊不聽佋與宰相竇參共誣贊受金捕送獄弟賞上寃狀詔三司覆治無之猶岀爲栁州刺史刑耳列寃張説字道濟宇文融恨恚乃與崔隱甫李林甫共劾奏説引術士王慶則夜祠禱解而奏表其閭引僧道岸窺詗時事冒署右職帝怒詔乾曜隱甫刑部尚書韋抗即尚書省鞫之發金吾兵圍其第説兄左庶子光詣朝堂刑耳列寃帝遣高力士往視見説蓬首垢面席藁家人以瓦器饋脱粟鹽疏爲自罰憂懼者力士還奏且言説徃納忠於國有功帝憮然乃停説中書令誅慶則等坐者猶十餘人善良方蒙枉李尚隱其先出趙郡徙貫萬年擢左臺監察御史馮昭泰性鷙刻人憚其彊嘗誣繫桐廬令李師旦二百餘家爲妖蠱有詔御史覆按皆稱病不肯往尚隱曰善良方蒙枉不爲申明可乎因請行果推雪其寃盜金下獄袁滋字德深進詹事府司直部官以盜金下獄滋直其寃執正其罪張鎰字季權一字公度累殿中侍御史乾元初華原令盧樅以公事譙責邑人齊令詵令詵官人也銜之搆樅罪鎰按驗當免官有司承風以死論鎰不直之乃白其母曰今理樅樅免死而鎰坐貶黙則負官貶則爲太夫人憂敢問所安母曰兒無累於道吾所安也遂執正其罪樅得流鎰貶撫州司户參軍銅匭申寃則天皇后武氏臨朝乃冶銅匭爲一室署西曰申寃受抑枉所欲言姚崇后嘗語左右往周興來俊臣等數治詔獄朝臣相逮引一切承反朕意其枉更畀近臣臨問皆得其手牒不寃朕無所疑即可其奏自俊臣等誅遂無反者然則向論死得無寃耶崇曰自垂拱後被告者類自誣當是時以告言爲功故天下號曰羅織甚於漢之鈎黨雖陛下使近臣覆訊彼尚不自保敢一揺手以悖酷吏意哉本傳淫潦決獄而霽崔碣字東標再爲河南尹邑有大賈王可乆轉貨江湖間値龎勛亂盡亡其貲不得歸妻詣卜者楊乾夫咨在亡乾夫名善數而内悦妻色且利其富既占陽驚曰乃夫殆不還矣即隂以百金謝媒者誘聘之妻乃嫁乾夫遂爲富人它年徐州平可乆困甚丐衣食歸閭里往見妻乾夫大怒詬逐之妻詣吏自言乾夫厚納賄可乆反得罪再訴復坐誣可乆恨歎遂失明碣之來可乆陳寃碣得其情即敕吏掩乾夫并前獄吏下獄悉發賕姦一日殺之以妻還可乆時淫潦獄決而霽都民相與歌舞於道獄靜蘇逢吉喜爲殺戮高祖嘗以生日遣逢吉疏理獄囚以析福謂之靜獄逢吉入獄中閲囚無輕重曲直悉殺之以報曰獄靜矣五代史三十四海多銜寃之人韋嗣立論刑法四海多銜寃之人九泉有抱痛之鬼鴉挽鈴温璋爲京兆尹有鴉三挽鈴璋曰此必訴寃遣吏隨至城外果有人探其雛追其人詣府决之北夢瑣言或問鬼災武黃門之死也裴晉公爲盜所刺𨽻人王義扞刃而斃自爲祭文是歲進士撰王義傳者三之二李錡之誅也大霧三日不開或問鬼災内疑其寃詔收葬南部新書義府擅殺寺丞王義方言畏義府之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移佞寵舊史白璧何辜青蠅屢煎李白雪讒曰白璧何辜青蠅屢煎羣輕折軸下沈黃泉衆毛飛骨上凌青天造化爲悲傷李白古風燕臣昔慟哭五月飛秋霜庶女號蒼天震風繫齊堂精誠有所感造化爲悲傷被罪怡然素服俟命舊唐史宋申錫既被罪怡然不以爲意自中書歸私第止於外㕔素服以俟命其妻出謂之曰公爲宰相人臣位極於此何負天子反乎申錫曰吾自書生被厚恩擢相位不能鋤去姦亂反爲所羅織夫人察申錫豈反者乎因相與泣鬻獄八白周書曰典獄非訖于威惟訖于富典主也訖絶也絶富謂賄賂不行鞫獄罪贓獄貨非寳惟府辜功府聚也辜罪也功事也言受獄貨非寳惟以聚罪之事也閑邪買直刑放於寵獻子辭梗陽之賂也叔魚鬻邢侯之獄叔魚納雍子之女蔽罪邢侯叔向正其罪曰鮒也鬻獄厚賂深繩貪賄賂撓刑書私貨官政政以賄成由官邪也獄由貨黷則死及之財惟茍得法必私行貪以敗官爲墨相賂以貨寛縱岀之刑漢書受悖入之貨禮罪以貨聞既貪獄貨是速官刑孔以貨市獄李景畧李懷光爲朔方節度使署巡官五原將張光殺其妻以貨市獄前後不能決景畧覈實論殺之既而有若女厲者進謝廷中如光妻云貪財鬻獄陸肱宣宗時除刺史有錄事參軍頗尚修潔肱召問曰錄事參軍有幾對曰有三下等懦政虐刑貪財鬻獄即懼太守出唐語林李義府母妻諸子市獄門如沸湯錢至十萬可以通神張延賞聞度支有一寃獄乆不決每不平之及公判度攴期以旬日案上有一帖子云奉錢三萬乞不問其獄公怒悉收公吏左右訊之明日於盥洗處云錢五萬又於寢所云錢十萬公嘆曰錢至十萬可以通神矣乃不問幽閑鼔吹貴倖鬻獄裴寛遷刑部員外郎萬騎將軍馬崇冒殺人而王毛仲方以貴倖將鬻其獄寛固執不肯從以金五百兩賂貴妃姊妹裴寛先是寛以所善請於裴敦復即欲白發其言林甫趣之敦復未及聞扈幸温泉宫而其下禆將程藏曜曹鑒自以他事繫臺寛捕按之敦復謂寛求致其罪遽以金五百兩賂貴妃姊妹因得事聞於帝由是貶寛睢陽太守鞭扑九白虞典曰鞭作官刑治官者用鞭扑作教刑扑楚也不勤道業則撻之月令仲春無肆掠掠捶拷肆暴屍一抶汝庸何傷傳抶其不勉者司城子罕盜璧之笞楚相枉張儀盜璧笞撻之執扑子罕親執扑抶其不勉者撻之流血禮鞭之見血齊襄誅屨於徒人費箠令鞭刑檟楚二物収其威也示背徒人費遇賊袒而示之背叩脛孔子見原壤以杖叩其脛笞令笞罰鞭師曹衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百撻伯禽成王有過則撻伯禽大杖小杖子曰舜之事瞽瞍也小杖則受大杖則走故舜不失蒸蒸之孝瞽瞍不䧟於不義受笞史吏過笞撻陳餘餘欲起張耳躡使受笞去耳責餘曰今一見辱而死一吏乎榜郭舍人上令倡監榜郭舍人不勝痛也未嘗撻辱人漢朱邑爲桐郷嗇夫蒲鞭劉寛事見寛刑門撾吏後漢常林夜撾吏崔林嘲之曰君爲廷尉耶撾婦翁第五倫三娶孤女人謂之撾婦翁五色棒曹瞞傳曰太祖爲洛陽北都尉治四門作五色棒懸門左右加笞景詔曰加笞以爲重罪無異幸而不死不可爲人其定律笞也五百曰三百三百曰二百也減笞又詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百二百曰百無得更人又詔曰當笞者笞臋無得更人鞭傳楚子玉治兵終日而畢鞭七人貫三人耳白挺大杖也禁吏擅笞人第五倫遷蜀禁吏擅笞人仙婦笞秦執敲扑鞭笞天下過秦論捶楚之下縲絏之中殺人以挺孔杖扑踰制王遂杖扑皆踰制出示於朝王遂械送京師斬東市監軍上遂所制杖出示於朝爲戒云段秀實初秀實爲營田判官涇大將焦令諶取人田自占給與農約熟歸其半是歲大旱農告無入令諶曰我知入不知旱也責之急農無以償往訴秀實秀實署牒免之因使人遜諭令諶令諶怒召農責曰我畏段秀實邪以牒置背上大杖擊二十輿致廷中秀實泣曰乃我困汝即自裂裳裹瘡賣已馬以代償笞楚嚴慘蕭穎士字茂挺有奴事穎士十年笞楚嚴慘榜笞愁痛高郢疏榜笞愁痛盈於道路朝士有不賀者笞之閩王曦嫁女朝士有不賀者笞之御史中丞劉贊坐不糾舉將加笞諫議大夫鄭元弼切諫曦謂元弼曰卿何如魏鄭公乃敢彊諫元弼曰陛下似唐太宗臣爲魏鄭公可矣曦喜乃釋不笞杖捶者官得施所部裴潾議杖捶者官得施所部非所部雖有罪必請有司明不可擅也越法杖人輒死裴潾爲汝州刺史越法杖人以太子左庶子分司東都杖都督長史宗室李瓌爲荆州都督長史馮長命者嘗為御史大夫素貴事多專決瓌怒杖之坐免賜杖三十馬燧元子暢建中中燧討賊山東暢留京師於是大旱朝廷議括商旅緡錢多亡命入南山爲盜暢客單超俊李雲端等竊議以爲事且危暢是其言遣奴諫燧班師燧怒執奴以聞使兄炫拘暢請罪帝方倚燧貸不問但誅其客勅炫賜暢杖三十榜笞羅珦越州㑹稽人爲奉天令中官岀入係道吏緣以犯禁珦榜笞之雖死不置自是屏息省中榜吏栁渾字夷曠同平章事韓滉自浙西入朝帝虚已付之奏事或日晏它相取充位滉遂省中榜吏自若渾雖爲滉所引惡其專執讓曰省闥非刑人地而榜吏至死公家先相國以狷察不滿歲輒罷今公奈何蹈前非顓立威福豈尊主卑臣義邪滉悔悟稍褫其威杖殺人以立威賈敦實傳洛陽令楊德幹矜酷烈杖殺人以立威隨年合歡杖五代劉銖用法亦自爲刻深民有過者問其年幾何對曰若干即隨其數杖之謂之隨年杖毎杖一人必兩杖俱下謂之合歡杖白挺五代王晏球字瑩之自晏球擊敗秃餒又走惕隱其餘衆犇潰投村落村落之人以鋤耰白挺所在擊殺之無復遺類設箠扑于堂下以修官刑而羣吏莫敢不備物栁宗元監察使壁記敲榜韓愈赴江陵塗中詩何况親犴獄敲榜發姦偷始創杖架宇文融以夏楚大小無制始創杖架以高卑度杖長短又鑄銅爲規齊其巨細唐刑法志二曰杖杖者持也可持以擊也書曰鞭作官刑是也一曰笞笞之爲言恥也凡過之小者捶撻以恥之漢用竹刑後世更以楚書曰扑作教刑是也同上每笞一人以責其負吳越世家自鏐世重斂每笞一人以責其負則諸案吏各持其簿列于庭凡一簿所負唱其多少量爲笞數以次唱而笞之少猶積數十多者至笞百餘人尤不勝其苦五代史抶疻郵人方鎮李載義傳象刑十白尚書大傳曰唐虞上刑赭衣不純中刑雜理下刑墨象純幪巾也不使冠飾周禮害人者不使冠飾注云墨幪也圜土之刑人也不虧其體武詔曰古者異衣冠象而人不犯畫墨者幪巾也犯臏以墨蒙其臏畫之犯劓以赭著衣菲草屨非生於治古乃起於亂今刑法志曰善哉孫卿之論刑也曰世俗論以古無肉刑有象刑墨黥之屬菲屨赭衣而不純注純緣也以爲治古無肉刑亦不待象刑矣注言人不犯法則象刑無所施也人或觸罪而輕其刑是殺人者不死傷人者不刑罪至重刑至輕民無所畏亂莫大焉故象刑非生於理古而起於亂今也注言今人惡刑之重因推言之上古如此也其實不然象刑惟明書曰象刑惟明者孫卿謂象天道而作刑安有菲屨赭衣之謂者哉亂世效象邢王莽太傅唐尊出見男女不異路尊下車以象刑赭瀋汚其衣莽聞説下詔申勅公卿令思齊封尊平化侯孔以赭以墨文粹沈顔象刑解曰舜禹之代象刑而人不敢犯言象刑者以赭以墨染其衣冠異其服色爲三等罪終身不釋恥畢世不滅同上虞舜染其衣冠異其服色是罪終身不釋恥畢世不滅豈特已以爲恥人見之者皆以爲恥也畫衣文粹楊炯少姨廟碑畫衣不犯自昔羲農以降爰及唐虞或設言而人不犯或畫象而下知禁文粹崔仁師疏肉刑十一白周書曰苗人作五虐之刑爰始淫爲刵劓㧻黥苗人始爲截耳割鼻㧻隂黥面故爲虐也皇帝哀矜暴虐以威遏絶苗人帝堯也言滅絶苗人今爾何懲惟時苗人斷制五刑上帝不蠲降咎于苗苗人制五刑天乃滅之吕刑曰墨辟辟刑也墨謂刻其額而涅以墨劓辟截鼻曰劓剕辟刖足曰剕宫辟次死之刑男子割勢婦人幽閉五刑之疑有赦正于五罰罰贖刑也五刑有疑則赦之從五罰言降而從輕也罰懲非死人極于病刑以懲罰過非殺人也極於病苦者使之莫敢犯也苗人作而降咎垂誡吕刑即尚書文帝廢以從寛稱仁漢牘漢文去肉刑用笞罰文選曰歌雞鳴於闕下稱仁漢牘五虐峻刑即上五刑四肢重罰文選肉刑何痛如之刑者不可復屬緹縈上書云屬連也想踊貴之時俗由是敝念鼻醜之日人何以堪秦酷以施上服之刑上服劓墨也下服宫刖也周禮夫斷支體刻肌膚終身不息何其楚痛之甚也漢文除肉刑詔云守門守關漢書墨者使守門劓者使守關除肉刑加以笞名輕而實重名輕易犯實重傷人是重人骨肉而輕人性命也魏陳羣議云云晉曹彦議云鑿顛抽脅玩常茍免犯法乃衆黥刖彰罪而民知恥也一離刀鋸終身不齒議不忍刻截之慘而安勦絶之悲袁完議云議復肉刑孔融文舉議之乃止孔南蠻投和頻盜者死次穿耳及頰而劗其髪盜鑄者截手鋸鑿箠扑楚毒畢至文粹沈顔象刑解秦法苛虐方用肉刑鋸鑿箠扑楚毒畢至而人犯愈多非特上古淳樸人易爲化夫法過峻則犯者多犯者多則刑者衆雖曰劓之刖之笞之扑之而不爲畏也夫九人冠而一人髽之爲勝但見衆而爲慕矣今免者多而刑者少人尚慕其多矣及刑者多而免者少焉以少爲勝乎故刑者衆則民無恥民無恥則雖曰劓之刖之笞之扑之而不爲畏也仁聖程晏蕭何求繼論蕭何之傳曹參也參曰臣不如何善守可也何廢作哉若不可以爲廢作即文帝除肉刑不爲漢主仁聖之最也刻膚革斷支體白居易肉刑議欲廢之者則曰刻膚革斷支體人主忍而用之則愷悌惻隱之心乖矣此緹縈所謂雖欲改過自新其道無繇也其欲復之者則曰任箠令用鞭刑酷吏倚而行之則專殺濫死之弊作矣此班固所謂以死罔人失本惠也蓋取劓㧻黥刖之類耳夫肉刑者蓋取劓㧻黥刖之類耳書所謂五虐之刑也昔苗人始淫爲之而天降咎及秦人又虐用之而天下亦離心夫如是則豈無濫死者耶族誅十二白秦皇暴虐威以三夷文選威以三夷之刑秦法一人有罪夷三族商紂毒痡罪及九族書今商王受罪人以族注刑及九族赤族之誅及宗之禍罰弗及嗣虞書夏刑孥戮汝不從誓言予則孥戮汝秦法誅族族滅之計朱浮與彭寵書朱安世曰丞相禍及宗矣公孫賀及父子俱死獄屋誅夷三在父兄之不加豈宗族而相及連坐濫施除三夷妖言令吕氏臨朝云云孔族于洛陽王師範朱全忠既受唐禪友寧妻訴讎人于朝乃族師範于洛陽先是有司次第使告之故師範乃與家人宴少長列坐語使者曰死固不免予懼坑之則昭穆失序不可見先人地下酒行以次受戮者二百人族夷將相張仲方李訓之變于時族夷將相髗足旁午仲方皆密使識其尸俄許收葬改二十人爲五十人蘇逢吉晉相李崧從契丹以北高祖入京師以崧第賜逢吉而崧别有田宅在西京逢吉遂皆取之崧自北還因以宅券獻逢吉逢吉不悦而崧子弟數岀怨言其後逢吉乃誘人告崧與弟嶼㠖等下獄崧自誣伏與家僮二十人謀因髙祖山陵為亂獄上中書逢吉改二十人爲五十人遂族崧家五代史三十脅制羣臣來俊臣后隂縱其慘脅制羣臣前後夷千餘族無小大皆如詔來俊臣宰相樂思晦爲俊臣夷其家有子九歲𨽻司農上變得召見言俊臣凶慘罔上不道若陛下假條及狀付之無小大皆如詔臣父死族夷不求生但惜陛下爲俊臣所弄耳由是仁傑六族皆免張漢傑唐莊宗入汴遂族誅漢傑事末帝爲顯官以張德妃故用事梁亡唐莊宗入汴遂族誅五代梁臣傳凡盜所居家及鄰保皆族誅漢臣蘇逢吉是時天下多盜逢吉自草詔書下州縣凡盜所居本家及鄰保皆族誅或謂逢吉曰爲盜族誅已非王法况鄰保乎逢吉恡以爲是不得已但去族誅而已於是鄆州捕賊使者張令柔盡殺平隂縣十七村民數百人族其三家史洪肇字化元李業等乗間譖之以謂洪肇威震人主不除必爲亂隱帝頗欲除之夜間作坊鍛甲聲以爲兵至達旦不寐由是與業等密謀禁中乾佑三年冬十月十三日洪肇與楊邠王章等入朝坐廣政殿東廡甲士數十人自内岀擒洪肇邠章斬之并族其三家五代史宗族夷丹后妃贊韋氏乗夫淫蒸于朝斜封四出政教不一既鴆殺帝引睿宗輔政權去手不自知戚地已疎人心相挺𤣥宗籍其事以憾豪英故取若掇遺不旋踵宗族夷丹勢奪而事淺也刖刑十三事具肉刑門白智不如葵傳鮑莊子之智不如葵葵猶能衛足踊貴屨賤傳齊景公繁刖刑有鬻踊者故晏子曰踊貴屨賤必斷其足禇師聲子韤而登衛侯怒曰必斷其足不能衛足鄭伯刖彊鉏君子謂彊鉏不能衛足鬻拳自刖楚鬻拳曰吾懼君以兵罪莫大焉遂自刖也君子曰鬻拳可謂愛君矣諫以自納於刑斮朝渉之脛竹刑葵智莠言卞和獻玉於楚王王使工者相之奏王曰石也王怒刖其足邴民爭田傳楚子與邴歜之父爭田不勝及即位掘而刖之而使歜爲僕也孔除斷趾法刑法志房𤣥齡等以謂古者五刑刖居其一及其肉刑既廢今以笞杖徒流死爲五刑而又刖足是六刑也於是除斷趾法爲加役流三千里居作二年夫偉人之一非夫偉人之一非亦慘乎黥刖劉禹錫猶子戒今何不行文粹服母三年議周之用刑也則墨劓宫刖今何故不行田再思必獻不至再文粹劉軻上座主書嘗讀史感和璞之事必獻不至三刖不至再必獻不至再殆幾乎無刖矣恩熙寛刖剠韓愈聨句殺人刖足亦皆有禮崔仁師傳治獄主仁恕故諺云弑人刖足亦皆有禮太宗初令公卿更議絞刑之屬五十條免死惟斷其右趾應死者多蒙全活太宗尋又矜其受刑之苦謂蕭瑀曰前代不行肉刑乆矣今斷人右趾念其受痛意甚不忍瑀曰古之肉刑乃死刑之外陛下於死刑之内降從斷趾便是以生易死足爲寛罪上曰朕意以爲如此故欲行之又上書言此非便其後蜀王府法曹裴𢎞上疏駮律令於是房𤣥齡等建議以為古肉刑既廢制爲死流徒杖笞凡五等以備五刑今復設刖足則是爲六刑於是除斷趾法通典罰親十四白獄成刑放記公族有罪獄成告於王三宥之傳曰刑放於寵私不害公愛而知惡唯惡是疾雖親必誅唯令是行雖親不隱君子不黨法家少恩雖親唯立愛而法且斷恩義不掩恩門外之理威克厥愛允濟愛克厥威允罔功書敦既睦之情恩常掩義行無頗之法公不滅私宜准律論難從刑放血屬肉刑罪無掩蔽禮刑不頗邪傳且仁不遺親義無絶愛他人尚思欽恤本族難忘裒矜骨肉之親無絶禮仲尼曰叔向古之遺直也傳治國制刑不隱其親刑者國之大事宜當直矣言至於他事則宜有隱也三數叔魚之惡不爲末減言皆正直也叔魚叔向弟也曰義也夫可謂直矣注於義未安直則有也平丘之會數其賄也晉不爲暴歸魯季孫稱其詐也晉不爲虐邢侯之獄言其貪也以正刑書晉不爲頗三言而除三害加三善殺親益榮猶義也夫三罪爲國施刑不可不正其餘以直傷義故疑之小慈害德大義滅親石碏殺子君子曰大義滅親稱以正直汝雖有説謂之仁愛吾則不知以父成政不孝也史楚王使石奢爲治有殺人者犇追之則其父也曰以父成刑不孝也不行軍法非忠也刎頸而死也大爲防而猶踰以自速戾小不忍而爲亂敢不斷恩戮姨弟晉茍晞字道將都督青兖從母依之養甚厚從母弟求爲將晞曰吾不以法貸人將無後悔苦欲之乃以爲督後犯法晞斬之從母救不聽既死而哭曰殺卿者乃兖州刺史周公垂涕而治管蔡之獄季友歔欷而行叔牙之誅議親周禮八議一曰議親孔坐伯父岑羲字伯華坐伯父長倩貶郴州司法參軍有司以族犯法不可爲侍臣姚璹字令璋延載初拜納言有司以璹族犯法不可爲侍臣者璹曰王敦犯順導典樞機嵇康被戮紹以忠死是能爲累乎后曰此朕意卿無恤浮言抵舅罪王師範敬武之子嗣領軍專于法無所私舅醉殺人其家訴之師範厚賂謝訴者不置師範曰法非我敢亂乃抵舅罪唐史國親刑十五與帝德部公族刑門事類白甸師周禮甸師氏王同姓有罪則刑焉注斷獄於甸師也記曰公族有罪則罄于甸人公族無宫刑不翦其類也三宥獄成有司讞于公公曰宥之三宥不對則走出致刑于甸人公又使人追之曰雖然必赦之有司曰無及也反命于公公素服不舉爲之變如其倫之喪無服注倫親疎之比也有司正術公族之罪雖親不以犯有司正術季子遏惡公羊云公子牙卒不稱殺爲季子諱季子遏惡不爲國獄緣季子之心爲之諱君親無將將必誅也緩追逸賊榖梁鄭伯克段段失弟子道賤段而惡鄭伯鄭伯處心積慮成於殺也猶曰取懐中而殺之宜緩追逸賊小慈失教鄭莊成叔段之誅傳曰鄭伯克段于鄢稱鄭伯譏失教也爲法斷恩漢武可昭平之奏漢隆慮王子昭平君尚帝女隆慮病困以金千斤錢千萬預爲昭平君贖死罪上許之隆慮卒昭平醉殺主傅傳母也廷尉請論決上曰吾第一子又屬我垂涕良乆曰先帝法令詘之何面目入高廟遂可其奏哀帝詔下明曰噬膚之恩詔爲明是外戚有肌膚之恩孔宗室煴始煴首至羣臣白帝御興元南門受之百官稱賀太常博士殷盈孫奏言禮公族有罪有司曰某之罪在大辟君曰赦之如是者三走岀致刑焉君爲素服不舉者三日今煴以皇族不能固節迫脅至此宜廢爲庶人絶屬籍葬以庶人禮大捷之慶須朱玫首至乃賀詔可敗髪痛在身李傑尚衣奉御長孫昕素惡傑遇于道内侍𤣥宗婭婿與所親楊仙玉共毆辱之傑訴曰敗髮膚痛在身辱衣冠恥在國帝怒詔斬昕朝堂通宫妾書宗室李鰅正元初爲饒州别駕妾高以善歌入宫鰅因御醫許泳通書坐誅僚吏犇解宗室李晉坐豫太平公主謀被誅改氏厲晉就刑僚吏犇解罰故十六白清河二天王輔決錄曰蘇章爲冀州刺史行部有故人爲清河大守案得姦贓乃請太守酣飲太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲私恩也明日冀州刺史按清河太守公法也遂舉正其罪也議故周禮八議一曰議故崇姦獲戾大爲之防念舊廢刑小不忍而爲亂雖乆要之難忘有大故而宜弃申恩屈法獄成刑故私不害公愛而知惡唯惡是去雖舊必誅唯法是行雖舊必罰舊雖在於八議法宜效於二天義有不遺禮則標於八議罪或難掩法可行於二天事茍足容刑宜緩於一割雖敦於念舊義在不遺而奉彼正刑罪宜無赦孔免官裴寂字𤣥眞唐公留守太原契分愈篤貞觀初浮屠生妖言辭連寂坐免官削封邑半歸故鄉不齒十七白書曰降霍叔爲庶人三年不齒齒錄也有不率教者屏之逺方終身不齒禮廢以馭罪周禮太宰以八柄馭羣臣七曰廢以馭罪注廢故也不齒三年周禮凡害人者寘之圍土以明恥之其能改者反於中國不齒三年孔不盡心於軌唐李軌字處則時鄧曉聞軌敗入賀帝曰而委質李軌以使來聞其亡不少慼乃蹈舞以悦我不盡心於軌能竭節於我乎遂廢不齒以贓論廢者削迹盧懐慎臣請以贓論廢者削迹不數十年不賜收齒母死不葬顔眞卿字清臣復使河東劾奏朔方令鄭延祚母死不葬三十年有詔終身不齒繇役如初歸崇敬字正禮請眡生徒及第多少爲博士考課上下有不率教者優􅀈之國子移禮部爲太學生太學又不變徙之四門四門不變徙本州之學復不變繇役如初終身不齒財産沒官十八白奪以馭貧周禮太宰以八柄馭羣臣六曰奪以馭其貧謂其罪也大沒入其家財也奪駢邑子曰管仲奪伯氏駢邑三百飯蔬食没齒而無怨言當罪故不怨也抵于公法沒以家財沒入沒先居之産列子宋人向氏學盜俄以贓獲罪沒先居之産也孔無儋石之贏裴炎被劾籍其家無儋石之贏籍貲入官韋虛心厯荆潞楊三大都督府長史荆州有郷豪負勢干法虚心籍其貲入之官籍元載家賜自盡籍其家鍾乳五百兩詔分賜中書門下臺省官胡椒至八百石他物稱是諸弟訴枉韋堅字子全正月望夜皇甫惟明與堅宴集林甫奏堅外戚與邊將私且謀立太子有詔訊鞫林甫使楊謹矜楊國忠王鉷吉温等文致其獄帝惑之貶堅縉雲太守惟明播川太守籍其家堅諸弟訴枉太子懼表與妃絶遂復貶堅江夏焉固請籍沒五代唐臣趙鳯張全義養子郝繼孫犯法死宦官伶人冀其貲財固請籍沒鳯上書言繼孫爲全義養子不宜有别籍之財而於法不至籍沒刑人利財不可以示天下珍寳不可計蕭至忠生平奉賜無所遺施及籍沒珍寳不可計殺人十九白殺人者死漢法以殺止殺倳刃失意古詩失意杯酒間白刃起相讎罪莫大焉死刑無赦之刑殺人之中又有禮焉是樂殺人老子殺人不忌爲賊傳莫大之罪周禮殺傷匪人爭奪相殺謂之人患禮殺人不忌爲賊死傷橫道不問邴吉爲丞相道逢羣鬬死傷橫道不問吏怪問之曰此京兆尹長安令事殺子後漢賈彪爲新息令土人貧困多不養子嚴爲刑制與殺人同罪城南有盜刼害人城北有婦人殺子彪岀按掾吏欲引盜彪怒曰賊冦害人此常理母子相陵背天違道遂行按殺父侍人魏志劉曄字子陽父普母疾困臨終曄年七歲兄渙年九歲母戒以普侍人有諂害之性必亂汝家汝能除之則吾無恨曄年十三謂渙曰亡母之言可行矣即入室殺侍人出拜母墓普怒曄還拜謝曰亡母顧命之言敢受擅行之罪普異之不責也椎埋王温舒少時椎埋爲姧注椎殺人而埋之僵路隅文選曰睚眦蠆介尸僵路隅言遊俠之徒殺人狂易陳忠伯始上言狂易殺人得減重論事遂施行也十三殺人秦武陽也孔所至大殺戮杜兼字處宏擢河南尹杜佑素善兼始終倚爲助所至大殺戮賤工謗國李實拜京兆尹貞元三十年旱關輔饑乃峻責租調人窮無告至徹舍鬻苗輸于官優人成輔端爲俳語諷帝實怒奏賤工謗國帝爲殺之斷頭曹華徙鎮義成軍盜殺商賈吏捕得乃華嬖人華怒斷其頭以祭死者殺萬家五代皇甫暉夜焚具州入于魏趙在禮以暉爲馬歩軍都指揮使暉擁甲士數百騎大掠城中至一民家問其姓曰姓國暉曰吾當破國遂盡殺之又至一家問其姓曰姓萬暉曰吾殺萬家足矣又盡殺之出詔執殺杜兼字處宏爲濠州刺吏僚官韋賞陸楚皆聞家子有美譽論事忤兼誣劾以罪帝遣中人至兼廷勞畢岀詔執賞等殺之二人無罪死衆莫不寃里胥有罪輒殺韓滉字太冲遷浙江東西觀察使里胥有罪輒殺無貸人怪之滉曰袁晁本一鞭背吏禽賊有負聚其類以反此輩皆鄉縣豪黠不如殺之用年少者惜身保家不爲惡内廏小兒王璠字明玉出爲河南尹内廏小兒頗擾民璠殺其尤暴者逺近畏伏悍妬多殺戮王重榮性悍妬多殺戮少縱舍斷首置前王洪任威虐殺人斷首置前而顔色泰然下恐不敢叛惟此兩何殺人最多武懿宗孫萬榮死懿宗復興婁師德撫循河北人有自賊中歸者一切抵死先剔取膽乃殺之血沬前而舉動自如始萬榮入寇也別將何阿小陷冀州殺人無餘種以懿宗暴忍似之故號稱兩何相語曰惟此兩何殺人最多謀殺大臣栁璨字炤之天祐二年長星出太㣲文昌間占者曰君臣皆不利宜多殺以塞天變元暉廷範乃與璨謀殺大臣宿有望者璨手疏所仇媢若獨孤損等三十人皆誅死天下以爲寃殺尉劉仁軌字正則轉陳倉尉部人折衝都尉魯寧者豪縦狠法縣莫能屈仁軌約不再犯而寧暴橫自如仁軌榜殺之州以聞太宗曰尉而殺吾折衝可乎對曰寧辱臣臣故殺之帝以爲剛正以其肉賜從官吕諲中人馬尚言者素暱於諲爲人求官諲奏爲藍田尉事覺帝怒命敬羽窮治殺尚言以其肉賜從官罷諲爲太子賓客駢頸就鈇血丹狴户則天皇后武氏稍圖革命然畏人心不肯附乃隂忍鷙害肆斬殺怖天下内縱酷吏周興來俊臣等數十人等爲爪吻有不慊若素疑憚者必危法中之宗族侯王及他骨鯁臣將相駢頸就鈇血丹狴户家不能自保太后操奩具坐重幃而國命移矣本傳甘露之禍文宗太和九年冬十月辛巳殺觀軍容使王守澄十一月乙巳殺武寧軍監軍使王守涓壬戌李訓及節度使王璠郭行餘御史中丞李孝本京兆少尹羅立言謀誅中官不克訓犇于鳯翔甲子尚書右僕射鄭覃同中書門下平章事乙丑知户部侍郎李石同中書門下平章事左神䇿軍中尉仇士良殺王涯賈餗舒元輿李孝本羅立言王璠郭行餘鳯翔少尹魏逢戊辰盡晦鳯翔監軍使張仲清殺其節度使鄭注己巳仇士良殺右金吾衛大將軍韓約卜二月壬申殺左金吾衛大將軍李正素學士顧師邕嚴武欲殺杜甫甫性褊躁傲誕嘗醉登武牀瞪視曰嚴挺之乃有此兒武亦暴猛外若不爲忤中銜之一日欲殺甫及梓州刺史章彛集吏於門武將岀冠鈎于簾三左右白其母犇救得止唐史殺宦者七百餘人梁本紀唐天復三年正月己巳天子至自鳯翔素服哭於太廟而後入殺宦者七百餘人五代史天子因盜殺人滋濫漢臣蘇逢吉傳衛州刺史葉仁魯聞部有盜自率兵捕之時村民十數共逐盜入山中盜皆散走仁魯從後至見民捕盜者以為賊悉擒之斷其脚筋暴之山麓宛轉號呼累日而死聞者不勝其寃而逢吉以仁魯爲能由是天子因盜殺人滋濫五代史務行殺戮史𢎞肇字化元岀兵警察務行殺戮罪無小大皆死是時太白晝見民有仰觀者輒腰斬于市市有醉者忤一軍卒誣其訛言坐弃市五代史下裴炎獄則天皇后武氏始武承嗣請太后立七廟中書令裴炎沮止及敬業之興下裴炎獄殺之并殺左威衛大將軍程務挺太后方怫恚一日召羣臣廷讓曰朕於天下無負若等知之乎羣臣唯唯太后曰朕輔先帝踰三十年憂勞天下爵位富貴朕所與也天下安佚朕所羞也先帝弃羣臣以社稷爲託朕不敢愛身而知愛人今爲戎首者皆將相何見負之遽且受遺老臣抗扈難制有若裴炎者乎世將種能合亡命若徐敬業者乎宿將善戰若程務挺者乎被皆人豪不利於朕朕既戮之公等才有過彼蚤爲之不然謹以事朕無詒天下笑羣臣頓首不敢仰視曰惟陛下命殺流人有上封言嶺南流人謀反者后遣攝右臺御史萬國俊就按得實即論决國俊至廣州盡召流人矯詔賜自盡皆號哭不伏國俊驅之水曲使不得逃一日戮三百人乃誣奏流人怨望請悉除之於是太后遣右衛詡府兵曹參軍劉光業司刑評事王德壽苑南面監丞鮑思恭尚輦直長王大貞右武衛兵曹參軍屈貞筠皆攝監察御史分往劎南黔中安南等六道訊鞫而擢國俊左臺侍御史光業等亦希功于上惟恐殺人之少光業殺者九百人德壽殺者七百人其餘亦不減五百人虢國先殺其二子貴妃楊氏馬嵬之難虢國與國忠妻裴柔等犇陳倉縣令率吏追之意以爲賊弃馬走林虢國先殺其二子柔曰丐我死即并其女刺殺之乃自刎不死吏載置于獄問曰國家乎賊乎吏曰互有之乃死白孔六帖卷四十七
