body:
  text: 白孔六帖卷四十八唐白居易原本宋孔𫝊續撰鬭一傷二藥人三誣人四罪相容隠五告人罪六從坐七相代罪赦宥過十改過十一待罪十二有罪復用十三恕十四猜認十五錯誤十六文字誤十七犯夜十八鬭一白方剛子曰君子有三戒及其壯也血氣方剛戒之在鬬失意見上注怒有戰鬭傳小人之性釁於勇嗇於禍一朝之忿忘其身以及其親非惑與忿思難君子有九思彼竭我盈鬭心鬭志争鬭之獄繁矣不忍小忿拗怒而少息肆其忿狷恚也暴弱彊者暴弱彊暴之男攘臂而仍之張拳張空拳冒白刃愠見怒形於色力争蚌鷸相持兎犬俱斃血作脈憤争為事末鬭乃禍心鬭怒者成之周禮睚眦方剛奮末謂怒而動四支也禮忿懥懥怒兒也懥音致禮用壯逢彼之怒交捽趙簡子曰孟獻子有鬭臣五人叔向曰子不欲也若使肸侍交捽之可也控拳救鬭批亢史記解雜亂紛糾者不救鬭批亢者不摶橶控拳搗虛形格勢禁而自解搤亢拊背婁敬曰夫人鬭不搤其亢拊其背未能全勝折脅拉齒范睢兩虎安得私鬭㓂恂賈復勸解高鳯教授於西唐山中隣士有争財持兵而鬭鳯徃脫巾叩頭曰仁義遜讓奈何弃之争者慙投刃而謝之雞肋不足以安尊拳劉伶醉與人相忤其人攘袂奮拳伶曰難肋不足以安尊拳其人笑而止老拳毒手石勒與李陽隣居争漚麻池相毆擊及貴召陽與飲酣謔引陽臂笑曰孤徃日厭卿老拳卿亦飽孤毒手教令刑法志毆人教令者與同罪即令人毆其父母不可與行者同决死争雄憑怒力争心競能鬭不過夷吾裂冠毀冕鬭嚻司􅕝禁鬭嚻者嚻謔也􅕝音暴晉侯夢與楚子摶楚子伏地而盬其腦傳佐鬭摶榖梁公子季友與莒挐屏左右而相摶公子友處下左右曰孟勞孟勞魯之寶刀也公子取而殺莒挐剛腸妻呼還春秋專諸與人鬭怒有萬人氣妻一呼即還子胥問之對曰屈於一人之下鬭智不鬭力救鬭者傷淮南子曰救鬭者傷批而殺之宋萬遇仇牧云云五侯之鬭血成江春秋考異曰龍門下血如江時人謡曰云云兩虎相鬭勢不俱生謂藺相如廉頗也孔柳宗元貞符惟人之初揔揔而生林林而羣合偶而居交焉而争際焉而鬭力大者博齒利者齧爪剛者决羣衆者軋兵良者殺披披藉藉草野塗血齽齘薄賊南蠻傳坦綽遣使者賫驃信書遺節度使牛叢叢因責之曰州縣繕甲厲兵犄角相從皆蠻之深讎雖女子能齽齘薄賊况彊夫烈士哉毆辱李傑為御史大夫尚衣奉御長孫昕素惡傑遇于道内恃𤣥宗婭婿與所親楊仙玉共毆辱之傑訴曰敗髮膚痛在身辱衣冠恥在國帝怒斬昕等朝堂爾何功坐我上尉遟敬徳嘗侍宴慶善宫有班其上者敬徳曰爾何功坐我上任城王道宗解喻之敬徳勃然擊道宗目幾眇太宗不懌酒酣捉笏顧少連裴延齡方横嘗與少連㑹田鎬第酒酣少連捉笏曰段秀實笏擊賊臣今吾笏擊姦臣奮且前五坊卒夜鬭傷縣人李渤字濬之五坊卒夜鬭傷縣人鄠令崔發怒敕吏捕捽其一中人也釋之帝大怒收發送御史獄㑹大赦改元發以囚坐雞干下俄而中人數十持挺亂擊發敗面折齒幾死吏哀請乃去既而囚皆釋而發不得原渤上䟽曰縣令曳辱中人中人歐御囚其罪一也然令在赦前而中人在赦後不寘于法恐四夷聞之慢倍之心生矣傷二白戰鬭見上注身體髮膚受之父母不敢毁傷孝經傷人及盜抵罪漢書雖未及死且莫能傷君子不重傷面傷合則兩傷死傷横道邴吉少卿為丞相嘗出逢清道羣鬭死傷横道吉不問吏問之吉曰人相殺長安京兆尹所職宰相不親小事人服其知大體也厥足用傷周禮凡過而殺傷者以民成之周禮肆其一怒合則兩傷鬭毆胥怨相傷抜㦸潁考叔挾輈而走子都抜㦸而逐之折臂三公羊祜字叔子既奮李陽之拳乃折公羊之臂折其右肱易折齒齊景公為孺子牛而折其齒公羊曰宋萬擊仇牧齒者門齒被傷求去職晉祖約士少典選舉妻無男而妬不敢違忤夜寢於外為人所傷約求去職詔不聽司直劉隗劾之宜貶黜詔又不許疻人漢博士申咸毁薛宣宣子况賂客楊明疻破咸於宫門外斷鼻傷脣使不得為近侍中丞奏况及明皆大不敬弃市廷尉直議咸遇人以不義而疻者與疻人罪同况竟减死疻音侈以杖毆撃腫起清黒而無瘡􅂒曰疻敗面謝萬字萬石嘗與蔡系争言系推萬落牀冠㡌傾脫萬徐起謂系曰卿幾敗我面神意自若死傷積野李陵書頭壁俱碎孔兵傷其首韋見素從帝入蜀陳𤣥禮之殺國忠也兵傷其首衆傳聲曰無害韋公父子獲免帝令夀王賜藥傅創傷痍之痛文粹朱敬則諌除濫刑䟽金鼔之聲未歇傷痍之痛尚聞下有小過皆鞭箠流血竇軌下有小過皆鞭箠流血人見者皆重足股慄請剖心以明皇嗣不反安金藏請剖心以明皇嗣不反引佩刀自剚腹中膓出被地眩而仆后聞大驚輿致禁中見忠門毆折一指隱太子傳秦府屬杜如晦騎過尹妃父門恚其傲率家僮捽毆折一指父懼即使妃前訴秦王左右暴其父帝不察大怒詰王曰兒左右乃凌我妃家况百姓乎狙盜發射李石傷見冦賊門瘡猶未平李宻將如黎陽或曰向殺翟讓世勣傷幾死瘡猶未平今可保乎藥人三白寘堇國語驪姬寘堇於肉注堇鳥頭也飲鴆而死地墳藥驗犬斃祭地申生獻胙公祭地地墳與犬犬斃秦人毒涇上流師人多死晉侯帥諸侯伐秦害物之心毒人之罪害人聚毒苞藏禍心合聚毒藥噬腊遇毒羊叔子豈鴆人者乎羊祜遺陸抗藥抗曰云云孔舌壞而死五代李金全為安逺軍節度使金全左都押衙胡漢榮用事所為不法高祖患之為選廉史賈仁沼代之且召漢榮漢榮教金全留已而不遣金全客龎令圖諌曰宜納仁沼而遣漢榮漢榮聞之夜使人殺令圗而酖仁沼舌壞而死吮血得解田令孜置酒㑹諸將黄頭將郭琪不肯飲曰軍容能易偏惠均衆士誠大願也令孜目曰君有功邪荅曰戰党項薄契丹數十戰此琪之功令孜嘻怒曰知之宻以酖注酒中琪飲已馳歸殺一婢吮血得解地黄酒馮球為相國餗門人有奴頗横馮愛賈召奴責之奴泣謝未幾馮晨謁賈未出有二青衣賫錫瓶出曰公恐君寒奉地黄酒三杯馮悦盡舉之俄病渴且咽因暴卒唐史柳玭傳酖殺之梁臣劉鄩尹皓段凝等素惡鄩乃譛之以為鄩與友謙親家故其留以養賊已而鄩兵數敗乃罷鄩歸洛陽酖殺之逗夜宴毒酒而進之隱太子建成等召秦王夜宴毒酒而進之王暴疾衉血數升淮安王扶掖還宮帝問疾因敕建成秦王不能酒毋夜聚誣人四白厚誣君子鄭賈人曰吾小人不可厚誣君子興无妄之辭明巧訴之咎無載爾偽作偽心勞飾虛憑虚行詐情偽詐謀姦計偽言詐偽之心禮爾詐予欺矯誣反坐反受其殃月令枉撓不當云云誣善之人其辭游巧言如簧鑠金之口辭為憑虛罪宜閲實君子之道焉可誣也宣詔年八十已上非誣告殺傷人皆勿坐漢以其罪罪之行僻而堅言偽而辯孔讎家誣衊桓彦範字士則王同皎謀誅三思事泄三思誣彦範等同逆隂令許州司功參軍鄭愔上變三思又䟽韋后隱穢榜於道請廢之帝震怒三思猥曰此殆彦範輩為之命御史大夫李承嘉鞫狀物色其人承嘉即奏彦範敬暉張柬之袁恕已崔元暐暴訕揺變内託廢后而實危君人臣無禮當伏誅詔有司議罪大理丞李朝隱執奏彦範等未訊即誅恐為讎家誣衊酷吏誣籍崔元暐遷鳯閣侍郎先是酷吏誣籍數百家元暐開陳其枉后感寤為原死脅假憂死韋陟安禄山䧟洛陽弟斌没賊國忠欲搆陟與賊通宻諭守吏令脅陟使憂死州豪傑共説曰昔張説被竄匿張氏以免今若詔書下誰敢庇公願公乗扁舟遁去事寧乃出不亦美乎陟慨然曰命當爾其敢逃刑因謝遣堅卧不出誣反宋申錫字慶臣帝惡宦官王守澄典禁兵偃蹇察申錫忠厚因召對俾與朝臣謀去守澄京兆尹王璠漏言守澄遣軍侯豆盧著誣告申錫反初議抵死於是左散騎常侍崔元亮等伏殿陛請以獄付外帝震怒叱曰吾與公卿議矣卿屬第出元亮等執據愈切涕泣懇到由是貸申錫於嶺表舉疑似衊染崔元略授户部侍郎京兆劉栖楚劾元略前造東渭橋縱吏増估物不償直取工徒贓二萬緡詔奪一月俸於是栖楚規相位疑元略妨已路故舉疑似衊染之誣没官錢裴延齡京兆尹李充指延齡專以憸偽罔上延齡捕充所善吏張忠榜掠之誣充没官錢五十萬緡以餌結權幸令妻以犢車載金餉陸贄忠具獄其母投訴光順門匭有詔御史番劾一夕得狀乃釋忠楊炎以劉晏劾載已坐貶乃出晏忠州用庾凖為荆南節度使誣晏殺之朝野側目李正已表請晏罪炎懼乃遣腹心分走諸道聲言宣慰而實自辨解言晏往嘗傅㑹姦邪謀立獨孤妃為后帝自惡之非它過也劾發民浚渠嚴郢字叔敖曰京師天下聚論徒者至廣例不覆讞令若悉待報有司斷决有程月不啻五千獄正恐牒案填委章程紊撓且旁及近邊犯死徒流者若何為差請下有司更議楊炎惡異已諷御史劾郢匿發民浚渠使怨歸丄繫金吾長安中日數千人遮建福門訟郢寃告與羌通竇參字時中神䇿將軍孟華戰有功或誣以反龍武將軍李建玉䧟吐蕃自拔歸部曲告與羌通皆論死參悉治出之人始屬望隂交皇甫無逸字仁儉皇甫希仁憸人也誣告無逸為毋故隂交世充帝判其詐斬希仁遣給事中李公昌馳諭以誣罔論李靖為西海道行軍大緫管高甑生軍繇藍澤道後期靖簿責之既歸而憾與廣州長史唐奉義告靖謀反有司按驗無狀甑生等以誣罔論誣殺忠良吉頊擢右肅政臺中丞來俊臣下獄司刑當以死狀三日不下頊從武后遊苑中因間言臣為陛下耳目知俊臣狀入不出人以為疑后曰朕以俊臣有功徐思之頊曰于安逺告虺貞反今為成州司馬俊臣誣殺忠良罪惡如山國蟊賊也尚何惜於是后斬俊臣為吏誣訴狄仁傑調汴州參軍為吏誣訴黜陟使閻立本召訊異其才曰仲尼稱觀過知仁君可謂滄海遺珠類自誣服韋嗣立上書曰楊豫以來大獄屢興窮治連捕數年不絶大猾伺間隂相影響構似是之言正不赦之辜恣行楚慘類自誣服營罔䧟人不測韋思謙武渙將軍田仁㑹誣奏御史張仁褘帝廷詰仁褘懦不能對思謙為辨其枉因言仁㑹營罔䧟人不測者詞㫖詳暢帝善之仁褘得不坐岑羲初節愍太子之難冉祖雍誣睿宗及太平公主連謀賴羲與蕭至忠保護得免誣表以罪姚南仲拜義成節度使監軍薛盈珍恃權撓政不能逞因毁南仲於朝徳宗惑之俄遣小使程務盈誣表以罪㑹南仲禆將曹文治入奏知其語則晨夜追至長樂驛及之與同舍夜殺務盈投其誣于厠坐誣罔誅孔戣遷尚書左丞信州刺史李位好黄老道數祠禱部將韋岳告位集方士圖不軌監軍高重謙上急變捕位劾禁中戣奏刺史有罪不容繫仗内請付有司詔還御史臺戣與三思雜治無反狀岳坐誣罔誅貶位建州司馬誣逐李實惡萬年令李衆誣逐虔州司馬誣劾以罪杜兼字處𢎞為濠州刺史僚宫韋賞陸楚皆聞家子有美譽論事忤兼誣劾以罪枉殺李紳字公垂始澧人吴汝納者韶州刺史武陵兄子也武陵坐贓貶播州司户參軍死汝納家被逐乆不得調時李吉甫任宰相汝納怨之後遂附宗閔黨中㑹昌時為永寧尉弟湘為江都尉部人訟湘受贓狼籍身取民顔悦女紳使觀察判官魏鉶鞫湘罪明白論報殺之議者謂呉氏世與宰相有嫌疑紳内顧望織成其罪諫官屢論列詔遣御史崔元藻覆按元藻言湘盜用程糧錢有狀娶部人女不實徳裕惡元藻持兩端貶崖州司户叅軍宣宗立徳裕去位紳已卒崔鉉等乆不得志𨗳汝納使為湘訟言湘素直為人訟衊大披重牢五木被體吏至以娶妻資媵結贓且言顔恱故士族湘罪皆不當死紳枉殺唐史李紳傳考訊自誣元行冲為東都副留守嗣彭王子志謙坐仇人告變考訊自誣株蔓數十人行冲察其枉列奏見原反為所搆劉憲字元度天授中奉詔按來俊臣罪憲疾其酷欲痛䋲之反為所搆復坐誣枉李邕字泰和開元二十三年起為括州刺吏復坐誣枉且得罪天子識其名詔勿劾因傅以罪天寳中左驍衛兵曹參軍柳勣有罪下獄邕嘗遺勣馬故告温使引邕嘗以休咎相語隂賂遺宰相李林甫素忌邕因傅以罪詔刑部貟外郎祁順之監察御史羅希奭就郡杖殺之權幸所誣李勉進梁州刺史勉假王晬為南鄭令晬為權幸所誣詔誅之勉曰方藉牧宰為人父母豈以讒殺良吏乎即拘晬為請得免軍呼枉其聲殷地高仙芝傳初邊令誠數私於仙芝仙芝不應因言其逞撓狀以激帝且云常清以賊揺衆而仙芝弃陜地數百里朘盜廩賜帝大怒使令誠即軍中斬之令誠已斬常清陳尸於籧篨仙芝自外至令誠以陌刀百人自從曰大夫亦有命仙芝遽下曰我退罪也死不敢亂然以我為盜劫資糧誣也謂令誠曰上天下地三軍皆在君豈不知又顧麾下曰我募若輩本欲破賊取重賞而賊勢方銳故遷延至此亦以固闗也我有罪若軰可言不爾當呼枉軍中皆呼枉其聲殷地仙芝視常清尸曰公我所引拔又代吾為節度今與公同死豈命歟遂就死李紳帝初即位貶紳端州司馬栖楚等怒得善地皆切齒詔下百官賀逢吉唯右拾遺呉思不往逢吉斥思令告大行喪於吐蕃時人無敢言者惟韋處厚屢言紳枉折逢吉之姦諷論大逆不道宋璟韋丹將告武三思亂宫掖三思諷有司論大逆不道帝詔誅死璟請付獄按罪帝怒岸巾出側門謂璟曰朕謂已誅矣尚何請璟曰人言后私三思陛下不問即斬之臣恐有竊議者請按而後刑帝愈怒璟曰請先誅臣不然終不奉詔帝乃流丹將嶺南誣告祝詛裴懷古恒州浮屠為其徒誣告祝詛不道武后怒命按誅之懷古得其枉為后申訴不聽因曰陛下法與天下畫一豈使臣殺無辜以希盛㫖哉即其人有不臣狀臣何情寛之后意解得不誅邊彦温誣安重誨趙鳳其後重誨為邊彦温等告變明宗詔彦温等廷詰具伏其詐即斬之後數日鳳奏事中興殿啓曰臣聞姦人有誣重誨者明宗曰此閑事朕已處置之卿可無問也鳳曰臣所聞者繫國利害陛下不可以為閑因指殿屋曰此殿所以尊嚴宏壯者棟梁柱石之所扶持也若折其一棟去其一柱則傾危矣大臣國之棟梁柱石也且重誨起微賤厯艱危致陛下為中興主安可使姦人動揺明宗改容謝之曰卿言是也遂族彦温等三家五代史二十八蒼繩㸃白𫝊致有罪韓瑗字伯玉褚遂良貶潭州都督明年瑗上言遂良受先帝顧託一徳無二向日論事至誠懇切詎昔令陛下後堯舜而塵史册哉遭厚謗醜言損陛下之明折志士之銳况彼遷以來再離寒暑其責塞矣願寛無辜以順衆心帝曰遂良之情朕知之矣其悖戾好犯上朕責之詎有過邪瑗曰遂良社稷臣蒼繩㸃白𫝊致有罪昔微子既去殷以亡張華不死晉不及亂陛下富有四海安於清泰忽驅逐舊臣遂不省察乎帝愈不聽豈有知其枉濫而不為申明李嶠遷給事中時酷吏來俊臣䧟狄仁傑李嗣真裴宣禮等三家奏請誅之則天使嶠與大理少卿張徳裕等覆其獄徳裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉乃與徳裕等列其枉狀由是忤㫖出為潤州司馬抱吏呼寃五代唐景思為㳂淮廵檢漢法酷而史洪肇用事喜以告訐殺人景思有奴嘗有所求不如意即馳見洪肇言景思與李景交通而私畜兵甲洪肇遣吏將三十騎往收景思奴謂吏曰景思勇者也得則殺之不然將失之也吏至景思迎前以兩手抱吏呼寃請詣獄自理吏引奴與景思驗景思曰我家在此請索之有錢十千為受外賂有甲一屬為私畜兵吏索之惟一衣笥軍籍糧簿而已吏閔而寛之景思請械送京師以自明景思有僕王知權在京師聞景思被告乃見洪肇願先下獄明景思不反洪肇憐之送知權獄中日勞以酒食景思既械就道潁亳之人隨至京師共明之洪肇乃鞫其奴具伏即奏斬奴而釋景思唐舊臣李安静為右武衛將軍武氏革命羣臣皆勸進安静獨無所請及收繫獄來俊臣問狀安静曰正以我唐舊臣殺之可也若詰其狀吾誰欺俊臣誣殺之罪相容隠五白父為子隱子為父隱直在其中矣語子孫匿祖父宣詔父子之親夫婦之道天性也雖有患禍猶蒙死而存之成愛惜之心仁厚之志豈能違之自今子匿父妻匿夫孫匿祖安其父母皆勿坐其父母匿子夫匿妻大父母匿孫誅仍請廷尉以聞上下相蒙難以濟矣介之推掩義隱賊傳掩蔽掩惡伏藏蒐慝孔子獵犯田掩不奏許圉師俄坐其子獵犯人田有辭怒而射之圉師掩不奏為人告擿帝曰宰相而暴百姓非作威福乎敬崇劾抵遂免官且情比樂羊可謂不慈傷教况罪非石厚徒云大義滅親白居易判告人罪六匿名附白惡訐以為直子曰惡訐人之私以為己之直匿名告罪缿筩趙廣漢為潁川惡相朋黨乃許相訐或匿名相告罪者置缿筩令投書於其中缿筩乃瓦器也請告者名魏典農劉龜竊於禁内射兎其曹張京投書言之帝匿京名送龜付獄高柔字文惠為廷尉請告者名帝怒曰吾豈妄收龜耶柔曰廷尉天下之平不敢毁法帝乃下京名各當其罪投書誹謗魏時有投書誹謗太祖欲得其主國淵字子尼請其本其書多引二京賦淵乃募讀二京賦者果得其罪人敢告王嘉上䟽故事尚書希下章為煩百姓證驗章文必有敢告字乃下告訐發人之私孔詔許上變則天皇后武氏畏天下有謀反逆者詔許上變在所給輕傳供五品食送京師即日召見厚餌爵賞歆動之凡言變吏不得呵詰雖蕘夫耘子必親延見稟之客館敢稽留不送者以所告罪之故上變者徧天下人人屏息無敢議告其反按無狀張嘉貞武后朝為天兵使明年入朝或告其反按無狀帝令坐告者嘉貞辭曰國之重兵利器皆在邊今告者一不當即罪之臣恐塞言路且為未來之患昔天子聽政於上瞍賦矇誦百工諫庻人謗今將坐之則後無繇聞天下事遂得減死從坐七不相及附白應侯席藁史記應侯范睢任鄭安平為將降趙應侯席藁請罪秦法任人所任不善以其罪罪之秦昭王恐傷應侯意乃下令有敢言鄭安平事以其罪罪之文帝除收孥律晁錯曰罪人不孥連坐千餘家王温舒為河内相坐之法刑法志韓任申子秦用商鞅著相坐之法三夷之刑定法令張湯趙禹條定法令作放縱所監臨部連坐之法注云部内有罪並連坐也罪不相及父子兄弟淪胥以鋪兄弟蜀志糜竺為安漢將軍弟芳為南郡與闗侯擕貳叛歸孫權侯因覆兵敗竺請罪先主慰諭以兄弟不相及崇待如故也女荀氏女芝為潁川太守劉子元妻坐死何曽議云云一人之身内外受辜臣請在室之女從父母之誅既醮之婦隨夫家之罰從之妹魏郭淮伯濟妻王陵妹也陵誅妹當從罪見收𦍑夷胡渠帥數千人叩頭請淮表留妻淮不從妻上道五子泣血請淮淮不忍乃令追以書白司馬宣王云云宣王宥之予則孥戮汝夏書妻盧毓為冀州主簿時有士亡妻白所適夫家數日未與夫相見大理奏白并弃市毓駮曰女子以接見㤙生云云太祖從之兄太祖時劉廙弟與魏詡謀反當連坐陳羣長文為言之太祖曰廙名臣也吾亦欲赦之乃使復位子孔融被誅二子年八嵗端坐不起人問之二子曰安有巢毁而不破卵者果并見殺出妻淳于長封定陵侯坐大逆小妻及姑等六人事未發時已出或改嫁翟方進何武以犯時為論廷尉孔光曰夫婦義合云云詔從光議子妻魏毌邱儉誅子妻荀氏應坐同程咸議云云孔坐誅則天皇后武氏臨朝韓王元嘉與魯王靈䕫等皆自殺餘悉坐誅諸王牽連死滅殆盡子孫雖嬰褓亦投嶺南從不應死呉湊元載當國久愎狀日肆帝隂欲誅未發也顧左右無可與計即召湊圖之俄而收載賜死於是王縉揚炎王昻韓㑹包佶等皆當坐湊建言法有首從從不應死一用極刑虧徳傷仁縉等由是得減死父子連坐齊澣字洗心為蒲州司法參軍有父子連坐論死者澣曰條落則本枯奈何俱死議貸其父太守不聽固爭卒原之衣冠多坐畢搆字隆擇為左御史大夫㑹平諸韋治其黨衣冠多坐搆詳比輕重皆得其情此本湜謀崔湜帝誅蕭至忠等湜徒嶺外時雍州長史李晉亦坐誅歎曰此本湜謀今我死而湜生何也坐子往還繫獄荆王元景房遺愛謀反誅坐子則與往還繫獄時呉王亦抵罪高宗謂大臣曰朕欲從公丐叔及兄死兵部侍郎崔敦禮曰陛下雖申恩不可詘天下法遂賜死李峴初東京平陳希烈等數百人待罪議者將悉抵死帝意亦欲懲天下故崔器等附致深文峴時為三司獨曰法有首有從情有重有輕若一切論死非陛下與天下惟新意且羯氐亂常誰不凌汙衣冠犇亡各顧其生可盡責耶陛下之親戚勲舊子若孫皆血鈇砧尚為仁恕哉書稱殱厥渠魁脅從罔治况河北殘孽劫服官吏其人尚多今不開自新之路而盡誅之是堅叛者心使為賊致死困獸猶鬭况數萬人乎固爭數日乃見聽衣冠蒙更生新唐史相代罪八白許相代後漢陳志字伯如為尚書奏母子兄弟相代死聽赦所代者皆施行范曄以為不善人多幸人常代其禍進退無據母兄安帝時尹次玉殺人兄初軍請代命因縊而死故尚書陳志以罪疑輕議活次玉應昭駮主議曰天討有罪五刑五用哉邵忽死子糾孔子曰如經於溝瀆晁父非錯班固云不如趙母指括全宗今殺無罪之初軍活當死之次玉此謂求生非謂代死也孔孔璋願代邕死李邕字太和素輕張說與相惡㑹仇人告邕贓貸枉法下獄當死許昌男子孔璋上書天子曰伏見陳州刺史邕剛毅忠烈難不茍免往者折二張之角挫韋氏之鋒雖身受謫屈而姦謀沮解即邕有功於國且邕所能者拯孤恤窮救乏酬惠家無私聚令聞坐贓下吏死在旦夕臣聞生無益於國者不若殺身以明賢臣願以六尺之軀膏鈇鉞以代邕死臣知有邕邕不知有臣䟽奏減死獄内亡囚竇參字時中為萬年尉時同寮有直官曹者將夕聞親疾請參代之㑹獄内亡囚走京兆尹按直簿將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之舊唐史赦九不用赦附白效天生殖傳曰為温慈惠和以效天之生殖長育勝殘去殺善人為邦百年肆大眚春正月肆大眚赦其罪也眚災肆赦眚過也災害也肆緩也言誤而肆過害當緩之好生之徳洽于民心並舜典發揮生成與嵗更始蕩滌邪穢納入惟新天地發生雷雨作解赦過宥罪易曰雷雨作解君子以赦過宥罪在宥莊子聞在宥天下籥動王充論衡曰赦令將至繫室而動言有感也太恩東觀漢記漢章東狩永和二年晉惠南郊元康六年並大赦歡心欣戴恱隨開釋昭蘇滌惡蕩穢蹈徳詠仁弛秋霜之嚴威流春澤之渥恩文選殷湯解網四面霈然之澤漢景措刑萬物霑雷雨之仁四海及蓼蕭之澤天慈有裕王澤無偏然則政惟圖大法在廷中習以生常則起為姧之敝廢而不用何成作解之恩宜思委轡之懷兼追解網之徳數則不可無之亦難赦者犇馬之委轡也青繩之澤除舊布新仁必好生政焉用殺渙汗之恩緩死好生蓼蕭澤及四海也詩過市周禮國君過市刑人赦茍有以藉手鮮不赦宥大國討小國也赦前事平詔曰赦令改行絜已有司多舉赦前事非重刑灑心自新之意也勵精更始宣詔曰隱赦行刑後漢周紆宇文通刻削少㤙為渤海太守毎赦到輙隱蔽行刑罪畢乃出赦書坐免官知將有赦張成善風角推知當有赦教子殺人李膺為河南尹收捕既而逢宥膺愈懷忿竟按殺之不肯出獄張盤字子石為交趾太守時度尚偽言蒼梧賊入荆州盤下廷尉㑹赦見原不肯出獄曰乞對曲直尚不徴盤埋骨牢檻終不虛出於是徴尚尚到辭窮決罪偏枯之物蜀志孟光責費禕曰赦偏枯之物非明世宜有今上仁賢百僚稱職有何旦夕危負以惠姧宄褘顧謝而已蒼蠅集筆端苻堅為赦令宻議王猛進紙墨有大蒼蠅聲甚厲集筆端驅而復來俄而長安中相告有赦推窮言云有一小兒青衣於市呼之須臾不見得非向者此之告乎皇澤三赦一幼弱二老耄三愚惷封三錢之府陶朱公故人莊生謂楚王曰某星害楚徳可除之王使封三錢之府注黄白赤金也將赦慮人知有竊盜云云楚莊王赦鄭伯見其肉袒也懲惡訓俗寔在於嚴科宥罪恤辜義深於緩獄緬鏡前古莫不攸遵雷雨作解聖人開赦過之門肆眚騰文先王明録刑之典慶洽普天恩洽率土浹歡躍於九域飛渙汗於萬方烏啼叩閤宋元康中徙彭城王義慶時為江州相見而哭文帝聞而怪之徴逺宅義慶大懼妓妾夜聞烏啼聲叩閤云明日有赦後改為南州因作烏夜啼曲不用赦赦權時之宜非常典也荀恱漢紀云小惠不行無忘武侯之議華陽國志諸葛亮時有言惜赦者亮曰為政以大徳不以小惠故匡衡不願為赦先帝亦言治亂之道悉矣曾不及赦大利是務盍遵管氏之言管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者犇馬之委轡也無赦者若痤疽於礦石委轡必顛覆也礦石療疾也屬禍亂之際則貴自新晉成帝詔曰令赦天下使得自新當休明之朝豈勞更始漢紀漢承兵革之後比屋可刑故申以大赦之命滌蕩穢流與人更始時制然也永業者則不然且事宜稽古政貴相時滌惡蕩穢雖權道之攸宜利滛惠姦豈倖門之可啓請思礦石無誘倖門則朱公之子無所用金陶朱公子犯法令中子用金求赦張成之男焉能倳刃見上注人之多辟大為防而猶踰邦有常刑小不忍而為亂唯願無赦後漢呉漢字子顔病甚上親問之曰唯願無赦有常無赦惠者人之仇讎法者人之父母管子凱風無私養之暖朝雲無偏注之潤凡作刑罰輕無赦孔小人之幸劉子知幾上書譏毎嵗一赦或十嵗再赦小人之幸君子之不幸紓多難收羣心陸贄興元赦令方具帝以藁付贄使商討其詳贄知帝執徳不固困則思治泰則易驕欲激之使強其意曰欲紓多難収羣心惟在赦令而已動人以言所感已淺言又不切人誰肯懷易曰聖人感人心而天下和平夫感者發於心而形於事事或未喻故宣之於言言必顧心心必副事三者相合乃可求感惟陛下先斷厥志以施其辭度可行者而宣之不可者措之無茍於言以重取悔廓然大赦劉晏字士安宦人劉清潭與嬖幸請立妃為后且言王數有符異以揺東宫時妄言晏與謀楊炎見帝流涕曰臣位宰相不能正其罪法當死崔祐甫曰陛下已廓然大赦不當究飛語致人於罪遂罷宴蒼生皆自新譙王重福神龍初韋庶人譛與張易之兄弟䧟重潤貶濮州貟外刺史徙合均二州景龍三年中宗親郊赦天下十惡者咸宥流人得還重福不得歸自陳蒼生皆自新而一子擯弃皇天平分固若此乎不報赦令國大事太宗順聖皇后長孫氏疾稍亟太子欲請大赦汎度道人祓塞災㑹后曰死生有命非人力所支若修福可延吾不為惡使善無效我尚何求且赦令國大事佛老異方教耳皆上所不為豈宜以吾亂天下法太子不敢奏以告元齡元齡以聞帝嗟美而羣臣請遂赦帝既許后固爭止澡蕩羣罪天下蒙恩咸得自新陳子昻奏入科比大赦澡蕩羣罪天下蒙㤙咸得自新甕藏北斗僧一行長於數所善王生其子以殺人繫獄求救於一行一行曰吾以數推之當有赦矣遣其徒授以布囊戒令某處廢園伺之有物來其數七共捕之以囊携來勿脫也至晡時有七豕入園盡獲之一行寘之大甕中宻覆封以太一泥朱書梵字誌之太史奏北斗不見召一行問之曰莫若大赦從之其夕太史奏見大星如故酉陽與天下更新孫伏伽諫曰陛下制詔曰常赦不免皆原之此非直赦有罪是亦與天下更新辭也以更赦免徐有功有韓紀孝者受徐敬業偽官已物故推事使顧仲琰籍其家詔已報可有功追議曰律謀反者斬身亡即無斬法無斬法即不得其縁所縁之人亡則所因之罪減詔從之皆以更赦免如此獲宥者數十百姓恩布天下時有詔公罪流私罪徒以丄㑹赦免踰百日不首者復論有功奏曰陛下寛除死罪已發者原之是通改過之心自新之路故律告赦前事以其罪坐之若無告言所犯終不自發如告言赦前事則與律乖令赦前之罪不自言者還以法論即恩布天下而一罪不能貸臣切為陛下不取廓天地之徳施雷雨之仁韋嗣立拜鳯閣舍人時刑濫及善人乃上書曰願陛下廓天地之徳施雷雨之仁取垂拱以來罪無輕重所不赦者普皆原洗死者還官生者霑恩則天下瞭然知向所䧟罪非陛下意恩被天下流昆蟲張仲方鄠令崔發以辱黄門繫獄逢赦不見宥仲方曰恩被天下流昆蟲而以行御前乎發由是不死聞者感泣思奮陸贄李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力盖贄有助焉犯盜馬璘邠寧節度使元日有卒犯盜或曰宜赦璘曰赦之則人將伺其日為盜遂戮之五色雲間鵲飛鳴天上來傳聞赦書至却放夜郎迴李白憶舊遊遷者追迴流者還韓文赦書一日行萬里罪從大辟皆除死遷者追迴流者還滌瑕蕩垢清朝班徳音釋輕繫囚明宗紀赦嗣復李徳裕字文饒帝嘗疑楊嗣復李珏顧望不忠遣使殺之徳裕知帝性剛而果於斷即率三宰相見延英嗚咽流涕曰昔太宗徳宗誅大臣未嘗不悔臣欲陛下全活之無異時恨使二人罪惡暴著天下共疾之帝不許徳裕伏不起帝曰為公等赦之徳裕降拜升坐帝曰如令諫官論爭雖千疏我不赦徳裕重拜因追還使者嗣復等乃免邵說相州安陽人大厯末上言天道三十年一小變六十年一大變禄山思明之難出入二紀多難漸平向之亂今將變而之治宜建徽號承天意而方謁郊廟大赦各一誠恐雷雨之施未普欝結之氣未除願因此時脩享獻欵郊廟褒有徳録賢人與天下更始振災益夀之術不納薛存誠拜御史中丞浮屠鍳虚者自貞元中闗通賂遺倚宦豎為姦㑹坐于頔杜黃裳家事逮捕下獄存誠窮劾之得贓數十萬當以大辟權近更保救於帝帝有詔釋之存誠不聽明日詔使詣臺諭曰朕須此囚面詰非赦也存誠曰獄已具陛下必欲召赦之請先殺臣乃可不然臣不敢奉詔鍳虛卒抵死草赦令韋承慶字延休張易之誅承慶以素附離免冠待罪時議草赦令咸推承慶召使為之無撓色誤辭援筆而就慶賞之餘柳宗元字子厚貶永州司馬雅善蕭俛詒書曰儻因賊平慶賞之餘得以見白使受天澤餘潤雖朽枿敗腐不能生植猶足蒸出芝菌以為瑞物不虚為太平人望外之澤又詒許孟容曰今其黨與幸獲寛貸得善地無公事坐食奉禄徳至渥也尚何敢更俟除弃廢痼希望外之澤駮赦論五代張允晉高祖即位屢赦天下允為駮赦論以獻曰管子曰凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢之呉漢疾篤帝問漢所欲言漢曰惟願陛下無赦爾盖行赦不以為恩不行赦不以為無恩罰有罪故也自古皆以水旱則降徳音而宥過開狴牢而出囚冀感天心以赦其灾者非也假有二人之訟者一有罪而一無罪若有罪者見捨則無罪者銜寃此乃致災之道非救災之術也至使小人遇天災則皆喜而相勸以為惡曰國將赦矣必捨我以救災如此則是教民為惡也夫天之為道福善而禍淫若捨惡人而變災為福則是天亦喜人為惡也凡天之降災所以警戒人主節嗜慾務勤儉恤鰥寡正刑罰而已是時晉高祖方好臣下有言覧之大喜聖徳廣運浹于華夷天光下臨照彼幽蟄劉禹錫賀赦表網開三面危疑者許以自新照達四聦瑕纇者期於録用歡謡上徹于九天福祚永延于億載同上發號之始疾於春風殊私所及沛若時雨同上澤及八荒網開三面賀表同上農有薄征市無彊價勲勤是録爵秩以班柳宗元賀赦表又爰褒有客尊賢之典惟新載奉素工宗教之道斯在滌濯剗磢磨滅瑕垢韓愈元和聖徳詩幸丹鳳門大赦天下滌濯剗磢磨滅瑕垢續功臣嗣拔賢任耉孩養無告仁滂施厚文集卷第一發號出令雲行雨施懼刑政之或差憐鰥寡之重困賀表韓文生恩既及於四海和氣遂充於八紘同上恩浹幽明慶溢寰海同上賀表徳音朝發于九天和氣夕周于九海劉禹錫改元赦狀布惟新之令陸宣公敷肆眚之㤙布惟新之令宣敡之際聞者莫不流涕陸贄奏議徳音煥然以之更始所在宣敡之際聞者莫不流涕雖或凶獷匪人亦為之歔欷誠之動物乃至于斯懷梟鴟以好音消䘲沴為和氣罷兵狀帝命出皇恩普文粹蘇頲東嶽朝觀頌序乃建雞竿伐鼉鼓帝命出皇恩普揚巽風作解雨𤣥衣素衿人報赦貞觀中黎景逸嘗居空青山有鵲巢其庭每以餘食飼之甚馴熟後景逸出仕被誣下獄一日有鵲於獄屋氣樓中下視景逸喜噪久之已而聞赦將下有一𤣥衣素衿人報赦先説赦來乃悟其鵲噪也朝野僉載九廟成禮百神降祥鑾輅旋衡風雲改色殊私廣被再𢎞莫大之恩寳厯惟新更啟無彊之祚劉禹錫改元赦劫脅之役盡除聚斂之名皆去柳宗元東平赦表劫脅之役盡除聚斂之名皆去傷痍受煦老疾加恩豐財已復其征徭賜種更盈於穜稑嚴山川之祀神必有依申義烈之家物無不感就第放赦安樂公主産男滿月中宗韋后幸其第就第放赦天子御端門詔天下渙汗發澤與民更始建金雞於仗内聳脩竿而揭起李庾西都賦以旱蝗責躬大赦太宗本紀貞觀二年正月庚午以旱蝗責躬大赦令在赦前中人在赦後李渤見鬭門一嵗再赦好人喑啞太宗嘗謂羣臣曰吾聞語曰一嵗再赦好人喑啞吾有天下未嘗數赦者不欲誘民於幸免也唐刑法志致理興化必在推誠忘已濟人不恡改過唐文粹陸贄徳宗赦文國有赦宥之事先集囚徒于闕下令衛尉樹金雞待宣制訖乃釋之唐六典后祀南郊壇南有大檞樹赦曰置雞其杪賜號金雞樹武后傳楊恭仁為凉州揔管𤓰州刺史賀拔行威叛朝廷未即討恭仁募趫勇倍道進賊不虞其來遂克二城縱所俘還之衆感恱遂相與縳行威降覬其匍匐相率降款盡至廣務寛大用明惡殺之徳杜甫寛集餘衆悉原盧鈞字子和兼節度昭義軍㑹劉稹死敕乗驛往進檢校兵部尚書専領昭義鈞及潞石雄兵已入而稹將白惟信率餘卒三千保路城未下雄召之使往十餘軰皆死鈞次高平惟信獻欵且曰不即降者畏石尚書爾鈞與約而還石雄欲盡夷潞兵鈞不聽坐治堂下左右皆雄親卒擊鼔傳漏鈞自居甚安雄引去乃召惟信至送闕下餘衆悉原素服乗驢五代王師範梁别將留重霸下其棣州師範乃請降太祖許之師範素服乗驢詣太祖請罪太祖待以客禮江南李景世宗以江南不聽命者嚴續之謀陳覺勸景誅續以謝罪景乃遣鍾謨入朝言不割地者非續謀願赦之宥過十白申恩屈法宥過無大刑故無小罪疑惟輕虞書赦小過孔子曰獄貴哀矜法宜開釋議事原情在宥莊子曰聞在宥天下矣未聞理天下獲宥情非抵冒政尚寛仁眚災肆赦注見赦門君子以赦過宥罪易自新史緹縈上書曰妾傷夫死者不可復生雖欲改過自新其道無由文帝哀之下詔除肉刑察貴用情恕宜及物三宥三赦周禮司刺掌三赦三宥之法一宥曰不識再宥曰過失三宥曰遺忘注不識者謂愚者無所知識也三赦見上赦門注克寛克仁不知不愠居上不寛人之過也各於其黨觀過斯知仁矣語免於刑戮恕而已矣仁逺乎哉孟夏出輕繫輕罪者放出之禮曰有㫖無簡不聴簡誠也有其意無其誠不以為罪也附從輕附施刑也求出之故從輕赦從重雖是重罪猶赦之不赦過禮凡執禁以齊衆不赦過小不忍而恐亂安可容姦計過求瑕肆眚申恩傳肆大眚三細不宥言三犯罪罪雖小不宥也守正名之義當准法論念觀過之人則宜情恕况當弘貸之朝宜用哀矜之典貸法臣無敢作福誠為撓法豈曰愛人且政先執禁教在知防宥汝愛人違法者若可原情畜奸者盡求倖免若踰矩之人如可捨也則防姦之法將焉用之若寛前定之法恐誘後來之姦孽既可逃法將焉用抵冒猶或哀矜過失誠宜開釋奴誤射殺子不誅宋則事具恕門羮爛汝手見上寛恕門孔馳騎宥罪李勉字𤣥卿関東獻俘百將即死有嘆者勉過問曰被脅而官非敢反勉入見帝曰冠冕之汗半天下其欲澡心自歸無由如盡殺之是驅以助賊也帝馳騎宥罪後歸者日至父病為蠱求厭為江西觀察使有父病為蠱求厭者以木偶署勉名埋之掘治驗服勉曰是為其父則孝也縱不誅桓彦範内史李嶠等屢奏往為酷吏破家者請皆宥雪依違未從彦範復上言自文明後得罪惟楊豫博三州不免它可悉赦疏十上卒見聴平宥蕭頴士字茂挺父旻以莒丞抵罪頴士往訴于府佐張惟一惟一曰旻有佳兒吾以旻獲譴不憾乃平宥之全宥甚衆裴度自中立申光平定度入朝㑹帝以二劒付監軍梁守謙使悉誅賊將度遇諸郾城復與入蔡商罪議誅守謙請如詔度固不然謄奏申解全宥者甚衆屈突通仕隋為虎賁郎將文帝命覆隴西牧簿得隱馬二萬匹餘見濟活囚徒門岐州亡卒狄仁傑岐州亡卒數百剽行人道不通官捕繫盜黨窮訊而餘曹紛紛不能制仁傑曰是其計窮日為患乃明開首原格出繫者稟而縱之使相曉皆自縳歸帝嘆其達權宜一切洗貸張廷珪張易之誅議窮治黨與廷珪建言自古革命務歸人心則以刑勝治今唐厯不移天地復主宜以仁化蕩宥且易之盛時趍附犇走半天下盡誅則已暴罰一二則法不平宜一切洗貸中宗納之脅從杜讓能京師平進中書侍郎官吏多汙偽署有司皆欲論死讓能以脅從不足深治固争之多所全貸霍王元軌厯定州刺史突厥冦定州州人李嘉運潜結賊詔窮誅支黨元軌以冦近且強人心危但殺嘉運餘無所詰洗宥絀放權徳輿上言近陛下洗宥絀放者或起為二千石其徒更相勉知牽復可望惟因而𢎞之使人人自效帝頗采用之全活高崇文崇文拜東川節度使賊將邢泚已降而貳斬于軍衣冠脅汙者詣牙請命崇文為條上全活之多所甄復許敬宗字延族初太子承乾廢官屬張𤣥素令狐徳棻趙𢎞智裴宣機蕭鈞皆除名為民不復用敬宗為言𤣥素等以直言被嫌忌今一概被罪疑洗宥有所未至帝悟多所甄復桓文𢎞霸功陸相奏議置射鈎之賊而任其才釋斬袪之怨以免於難此桓文所以𢎞霸功也必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪宥工徙逺裔蕭鈞永徽中太常工為宫人通訊遺詔殺之且附律鈞言禁當有漸雖附律不應死帝曰如姬切符朕以為戒今不濫工死喜得忠言即宥工徙逺裔凝碧詩王維字摩詰禄山䧟兩都𤣥宗出幸維扈從不及為賊所得禄山宴其徒於凝碧宫其樂工皆梨園弟子教坊工人維聞之悲惻潜為詩云萬户傷心生野煙百官何日再朝天秋槐花落空宫裏凝碧池頭奏管絃賊平䧟賊官三等定罪維以詩聞肅宗嘉之特宥之宥過輕刑流汪濊於四海柳宗元赦表得罪當宥郭元振𤣥宗講武驪山既三令帝親鼓之元振遽奏禮止帝怒軍容不整引坐纛下將斬之劉幽求張說叩馬諫曰元振有大功雖得罪當宥乃赦改過十一知過附白今是昨非朝過夕改時有不仁未虧君子過而能改則曰大賢改而勿憚悔亦可追憚改知非誰無能改善莫大焉茍有必知赦之可也先迷後得臨事雖不三思茍有必知陳首明無二過宜嘉後覺盍恕前非既反迷途請寛昭憲自新未悟改行率徳有恥且格聞義不能徙不善不能改是吾憂也語子曰吾未見能見其過而内自訟者訟責也語改之為貴無循枉枉不正也不正之事不循行之徙善逺罪禮知非改過洗愆洗心不逺復既非迷復請以輕論補過無咎者善補過也顔氏之子其殆庻幾乎有不善未嘗不知知之未嘗復行也有過則改見善則遷有過則改益卦大象辭也負罪引慝君子以恐懼修省震卦惟受責俾如流書曰責人斯無難惟受責俾如流是惟艱哉無恥過作非書過失可微辨不可面數禮君子能知其過必有令圖秦公子鍼能補過者君子也仲尼曰人誰無過過而能改過則稱已必文能改陳元改過漢仇覧為亭長有陳元者其母告元不孝覽曰昨過廬舍籬落修整此不是惡人當化未至耳親至元家為陳孝道元後改過卒為孝子周處尋師周處為鄉里所患後知之乃改行詣洛尋師見二陸也宋杲後漢宋杲性悍喜與人報讎郭林宗諭以義杲叩頭後至并州刺史林宗受賈淑之弔後漢淑性險害邑里患之林宗遭母喪淑來修弔既而孫威直後至見林宗賢而受惡人弔不進而去林宗遽追之謝曰賈子厚誠實凶徳然洗心向善仲尼不逆互鄉故吾許其進也毁鴨欄陸遜伯言時建昌侯慮於堂前作鬭鴨欄頗施小巧遜正色曰君侯宜勤覽經典以自新何用此為慮即時毁之遷善易應詩人補衮之歌順周易牽復之義文選改轍孔狄仁傑武后謂曰有譛卿者謝曰陛下以為過臣當改之狄本傳過弗諱改元結上時議曰前日天子恨愧陵廟為羯逆傷汙憤悵上皇南幸巴蜀隱悼宗戚見誅過弗諱改許請改圖王處存子郜以其族犇太原使處直主留後全忠亦至處直辭曰敝邑奉上未嘗不忠事鄰未嘗不禮弗虞君之見攻也全忠責何故事克用荅曰太原藉兄弟之舊修好往來常道也君茍為罪請改圖全忠許之陸贄上書曰人誰無過過而能改善莫大焉仲虺歌成湯之徳曰改過不吝吉甫美宣王之功曰衮職有闕仲山甫補之夫成湯聖君也仲虺聖輔也以聖輔賛聖君不稱其無過稱其改過周宣中興賢王也吉甫文武賢臣也歌誦其美不美其無闕而美其補闕則聖賢之意貴於改過較然明甚盖過差者上智下愚所不免惟賢者能改而之善愚者恥而之非也九弊又九弊恥聞過上之弊也悔過不得不深又悔過不得不深引咎不得不盡知過趙璟字退翁自言薦果州刺史韋証以貪敗請降考校考使劉滋謂璟知過規切陸羽字鴻漸見有過者規切至忤人率徳改行李邕下獄當死孔璋上書天子曰伏惟陛下寛邕之死使率徳改行待罪十二陳首附白席藁應侯范睢失舉席藁請罪免冠伏斧鑕梁孝王既刺殺袁盎請朝茅蘭說王乗布車伏闕下待罪蘭大夫也季孫練冠麻衣跣行傳晉責季孫意如逐昭公意如待罪籍藁玉音坐藁以就刑也有罪不逃刑導囚走陳首孔禮字徳達嘗受馬台恩台坐法當死禮私導令踰獄而自首太祖減罪一等逃亡自首晉王坦之文度卒士韓帳逃亡歸首云失牛故叛有司劾帳盜牛考服罪坦之以帳束身自歸遂原罪敢逃刑命傳范滂後漢誅黨人范滂自詣獄縣令欲與解逃滂曰何故累君令老母流離乎又巴肅事同范滂徒罪長沙負荆孔不敢入謁唐惠宣太子業母早終從母賢妃鞫之妃弟與皇甫恂妄言休咎妃恐降服待罪業不敢入謁帝聞遽召之業伏殿下帝諭妃復位入朝羸服渾瑊為㑹盟使為尚結賛所劫副使崔漢衡以下皆䧟惟瑊得免自奉天入朝羸服待罪詔釋之素服待罪王承宗曰田洪正求入侍請歸徳棣二州入租賦待天子署吏洪正遣知感知信詣闕下請命前此帝賜詔許自新承宗素服待罪乃詔復官爵王承宗傳泥首待罪五代張全義字國維梁亡莊宗入汴全義自洛來朝泥首待罪莊宗勞之曰卿家弟姪幸復相見全義俯伏感涕慙懼待罪嚴綬為右僕射始就廊下食在百官上帝使中人賜含桃綬見拜之為御史劾奏綬始慙懼待罪詔釋綬而貶中人伏斧鑕唐史泉男生字元徳其初至伏斧鑕待罪帝宥之世以此稱焉有罪復用十三白魏尚有罪繫獄馮唐舉之拜雲中太守匈奴畏之韓安國下獄免官後起於獄中拜梁内史張敞起亡命張敞有罪詣闕上印綬即從闕下亡命後冀州有賊盜詔敞加拜冀州刺史棄瑕録用責功補過自效重以才難許其功贖抆拭朱博子元為左馮翊詰長陵大姓尚方禁面上是何等瘡􅂒禁具首服盜人妾見斫博曰馮翊欲灑卿抆拭用卿禁曰願效死也死灰重然秦赦孟明之罪漢収竇憲之功孔柳宗元字子厚貶永州司馬雅善蕭俛詒書陳情曰鄭詹束縳於晉終以無死鍾儀南音卒獲返國叔向囚俘自期必免范座騎危以生易死蒯通據鼎耳為齊上客張蒼韓信伏斧鑕終取將相鄒陽獄中以書自治賈生斥逐復召宣室倪寛擯厄後至御史大夫劉向下獄當誅為漢儒宗此皆瓌偉博辯竒壯之士能自解脫今以恇怯淟涊下材末技又嬰痼病雖欲慷慨攘臂自同昔人愈疏闊矣使功不如使過李靖字藥師開州蠻冉肇則㓂䕫州趙郡王孝恭戰未利靖率兵八百破其屯要險設伏斬肇則俘禽五千帝謂左右曰使功不如使過靖果然澡濯用之劉禹錫字夢得始坐叔文貶者八人憲宗欲終斥不復乃詔雖後更赦令不得原然宰相哀其才且困將澡濯用之㑹程异復起領留務乃詔禹錫等補逺州刺史流移之人皆不得棄放妻妾及私遁還鄉至六載然後聴仕即本犯不應流而特配焉者三載以後聴仕唐六典恕十四事見宥過門又寛恕門雜用之白夫子之道忠恕而已矣己所不欲勿施於人子貢問曰有一言而可以終身行之者乎子曰其恕乎云云作不順而施不恕仲尼謂臧武仲順事恕施尊賢而容衆嘉善而矜不能君子先人後已禮内恕老子曰以身觀身克寛克仁不知不愠仁逺乎哉包荒言包含荒穢也易國君含垢天之道也傳爾無忿疾于頑必有忍其乃有濟有容徳乃大書躬自厚而薄責於人掩匿細過漢曹參見人有細過掩覆匿盖之嘔丞相車茵見寛恕門羮爛汝手見寛恕門奴誤射死子不誅宋則子年十嵗與蒼頭共弩射弦斷矢激誤中則子死則恕不誅荀爽美之孔治獄主仁恕崔仁師為殿中侍御史時青州有男子逆謀有司捕支黨纍纍填獄詔仁師按覆始至悉去囚械為其食飲湯瀋以情訊之坐止魁惡十餘人它悉原縱大理少卿孫伏伽謂曰原雪者衆誰肯讓死就決而事變奈何仁師曰治獄主仁恕故諺稱殺人刖足亦皆有禮豈有知枉不伸為身謀哉使吾以一介易十囚命固吾願也及敕使覆按諸囚咸叩頭曰崔公仁恕必無枉者舉無異辭由是知名過漢于張徐有功或稱有功仁恕過漢于張起居舍人盧若虚曰徐公當雷霆之震而能全仁恕雖千載未見其比時稱平恕狄仁傑稍遷大理丞嵗中斷乆獄萬七千人時稱平恕活無罪數百人李憲性明恕詳正大獄活無罪者數百人以恕自將内挫虐熖徐有功賛處猜后酷吏之間以恕自將内挫虐熖不使天下殘於燎可謂仁人也哉愛恕之譽一旦出吕諲崔器上李栖筠擢殿中侍御史李峴為大夫以三司按羣臣䧟賊者表栖筠為詳理判官推原其人所以脅汙者輕重以情悉心助峴故峴愛恕之譽一旦出吕諲崔器上猜認十五白盜金漢直不疑同舍郎亡金疑不疑不疑乃買金償之後乃明也認馬卓茂字子康為丞相史出行有人認其馬心知其誤黙解與之牽車而去謂之曰汝若自得馬當以此馬詣丞相府將來主得馬乃詣府叩頭謝還之盜絳陳重在郎署有郎誤持鄰舍郎絳去主疑重重不自申說市絳還之後郎還絳事乃白認牛劉寛字文饒為司徒有人失牛就寛車中認之寛下車步歸有得牛者謝曰慙負長者寛曰物有相類事容錯誤幸勞見歸何謝之有認豕魏曹節字元偉鄰人有亡豕者與節豕相類詣門認之節不爭後主得亡豕乃慙送謝節節乃笑而受之失脯晉乗虞字子深嘗宿逆旅同舍失脯疑虞盜之虞解衣償之主人曰多恐狐狸偷去乃將脯主至塜間得脯客還虞衣虞投而不顧氷下得犢朱冲字巨容少有至行鄰人失犢認冲犢以歸後得犢於氷下大慙以犢還冲冲竟不受似是而非認稻鍾離牧字子幹墾田二十畆臨熟縣人認之遂以稻與之縣長執民繫獄牧為之請長曰君慕承宫僕自行法牧遂出裝還山隂長釋民自止之民慙舂稻得六十斛米還牧牧不受民置於道旁無取者開荒被認郭翻長翔家貧無業欲墾荒田先表題經年無主然後作及將熟有認之者悉推與之宰令聞以稻還翻翻不受認禾承宫字子少避地於象隂山耕種禾黍得熟人有認之者宫不爭推與之也盜璧張儀虵酒孔李藩杜亞居守東都表置府中亞嘗疑牙將令狐運為盜掠服之藩爭不從輒去後果獲真盜物色驗之唐史張允濟仕隋為武陽令過道傍有姥廬守所蒔葱因教曰弟還舍脫有盜當告令姥謝歸俄失亡葱允濟召十里内男女盡至果得盜者錯誤十六取宥過門事用白罪分故誤罰有等差法有誤論過宜情恕情匪誣欺法當開釋必先問罪方可原情事雖乖於審慎情直異於矯誣失傳得罪失辭失口闕疑面欺誠非巧詐之辜謂寛過誤之戾事雖昧於三思過宜寛於無簡慎非石氏雖慙數馬之能誤比鍾離宜恕賜縑之謬恕而已矣仁逺乎哉誤宣後漢有兄弟殺人詔報兄重而减弟死孫章誤言兩報重尚書奏章矯詔當斬郭躬曰章應罰金傳命之誤其文輕帝美之奏對夏侯勝質朴見時謂上為君誤相字於上上以是親信之也以十為百後漢詔賜降寇縑以十為百帝怒將笞郎僕射鍾離意字子阿曰過誤之失常人所容若懈怠為愆則臣位大罪重當先坐乃解衣就格帝意解乃復孔過誤楊纂貞觀初為長安令有告女子袁妖逆者纂按之情不得袁敗太宗惡其不忠將殺之中書令温彦博以過誤當宥乃免誤拂御衣郝處俊曰臣之弟處傑被擇供奉時有三衛誤拂御衣者懼甚先帝曰左右無御史我不汝罪帝曰此史臣應載臨敵捨敵無殺文粹皮日休漢斬丁公論丁公臨敵捨敵無殺誠惻隱長者高祖斬之果不為當臣子於尊極不稱誤戴胄長孫無忌被召不解佩刀入東上閤門封徳彛論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子於尊極不稱誤法著御湯劑飲食舟船雖誤皆死陛下録無忌功原之可也若罰無忌殺校尉不可謂刑文字誤十七白書馬闕文責寧加於石建石建為郎奏事事下驚恐曰書馬與尾五四獲譴死矣其懼慎如此今賜縑過數罪亦捨於鍾離見上注五而闕一十以為百一馬之闕二豕之疑亥豕之疑魯魚之誤移文有誤不以文害意掌以簿書誤於文字寧免毫釐之差不容筆削之改踳駮紕繆闕疑改正闕文吾猶及史之闕文也失傳有司失其傳也文不加㸃辨魯非魚孔封敕脫誤蕭倣李燧為嶺南節度使使者已賜節而倣封還詔書帝方作樂不暇命使遣優工趣出追之未及燧所而還後以封敕脫誤法當罰侍講孔温裕曰給事中駮奏為朝廷論得失與有司奏事不類不應罰詔可令坊州貢杜若國史纂要貞觀中度支令坊州貢杜若本州曺官云本州不出杜若應由謝眺詩誤爾華省名郎若如此判事豈不畏二十八宿笑人耶改根為銀尚書故實韓昶愈之子雖教有義方而性頗闇劣嘗為集賢校理史傳有金根車而昶以為誤悉改根為銀後除拾遺坐此言罷制敕既行有誤則奏改之唐百官志中書舍人其禁有四四曰忘誤制敕既行有誤則奏改之弄麞之慶唐舊史𤣥宗朝宰相李林甫無學術太常少卿姜度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口録詩一字誤皇甫湜其子録詩一字誤嚙臂血流犯夜十八白警廵西京賦云警夜廵晝夜事周禮謂夜警守之事三廵周禮掌固晝三廵注廵行以警慎也夜三鼜以號戒鼔也謂夜三擊鼔以廵戒之也鼜音戚灞亭夜獵李廣將軍夜獵還灞陵亭長呵叱之周禮禁行作不時者謂晨行者國禁官禁天街知禁犯禁司寤氏掌夜時謂早晚時也周禮以星分夜以詔夜士夜禁禁行也夜士廵夜之士御星行者禁宵行者游者御亦禁也厭浥行露豈不夙夜謂行多露詩禁御抵冐街禁國章扞掫行諸宵夜夜禁是干必先問罪宵行有故似可徴辭將軍尚不得夜行霸陵亭吏呵叱廣廣騎曰故李將軍曰今將軍尚不得夜行何故為也云云廣宿亭下受書犯夜晉三丞字安期為東海太守政尚清静有犯夜者曰從師受學不覺日暮丞曰鞭撻寗越以立威名恐非教化之本使吏送歸家誰何殺之魏瞞傳曰火祖為洛陽北部尉造五色棒縣門左右各十餘枚犯禁者不避豪彊杖殺之愛幸黄門蹇石叔父夜行太祖殺之孔軍士干禁王重榮太原祁人與兄重盈皆以毅武冠軍擢河中牙將主伺察時兩軍士干禁捕而鞭之士還訴於中尉楊𤣥寔𤣥寔怒執重榮讓曰天子爪士而藩校辱之荅曰夜半執者姦盜孰知天子爪士具言其狀𤣥寔嘆曰非爾明辨孰由知之更諉於府擢右署醉觸夜禁劉貞亮憲宗之立貞亮為有功然終身無所寵假郭旻醉觸夜禁杖殺之由是莫不慴畏晨夜有行必問晨夜有行必問不應則彈弓而嚮之復不應則旁射又不應則射之折衝唐史百官志夜醉為邏卒擊折其齒温庭筠丏錢楊子院夜醉為邏卒擊折其齒白孔六帖卷四十八
