body:
  text: 白孔六帖巻五唐白居易原本宋孔傳續撰山一嵩山二華山三泰山四恒山五衡山六終南山七石八崐崘山九廬山十太行山十一荆山十二鍾山十三北邙山十四天台山十五首陽山十六燕然山十七羅浮山十八九疑山十九交廣諸山二十川澤二十一虞衡二十二山一白天作高山結而為山岳流而為江海拳石禮今夫山一拳石之多及其廣大草木生焉禽獸居焉寳藏興焉纎塵山不讓塵故能成其大國主山川地鎮周禮九州有名山為地鎮注鎮安安地徳也峻極于天崧髙維岳名山見上土聚國語山土之聚節彼南山維石巖巖漸漸之石維其髙矣岵屺爾雅有草木岵無草木屺祭山曰􅍥懸爾雅厲禁山虞掌山林之政令為之厲而為之守禁若祭山林則為之主而脩除且蹕山師掌山林之名辨其物與其利害而頒之邦國使置其珍異之物有木山有木工則度之為山九仞仁者樂山不可乆留離騷山中不可乆留峩峩崇崇秀出削成風雷蒸騰雲雨結成元氣之始秀出太虛之中節彼南山鎮兹下土小隱山林大隱朝市崩晉梁山崩伯宗問絳人絳人曰山有朽壤而崩可若何然國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已詩山冡崒崩不崩如南山之夀不騫不崩出雲天降時雨山川出雲千巗顧凱字長康遊㑹稽人問山川之美答曰千巖競秀萬壑爭流九坂蜀有九坂山漢記梁冀聚上築山十里九坂登山臨水送將歸上山採蘼蕪下山逢故夫鼇負蓬萊蛇繞崐崘祭祀並見祀山川注中崩周禮凡四鎮五岳崩令去樂不舉亨易王用亨於西山設險易始萬物終萬物始萬物莫盛乎艮艮山也桐生朝陽不宜生高岡太平而生為瑞也居禮記居山不以魚鼈為禮出器車禮云天不愛其道地不愛其寳人不愛其情故山出器車國寳左傳山澤林盬國之寳藏疾左傳山藪藏疾仁者樂如山之安萬物生焉藏金莊子獸離莊子函車之獸分而離山不免網罟之患蚉負莊子云使蚉負山不勝任狐棲莊子云豐狐文豹棲於山也有夔莊子云鬼也如鼓一足積卑莊子丘山積卑而為高見列星莊子元天山髙四見列星共工觸列女媧氏斷鼇足以立四極其後共工與顓頊爭天下怒觸不周山大壑中列大壑中有五山焉一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬萊愚公移列子太行王屋二山方七里髙萬仞愚公且九十面山居懲山北將移之操蛇之神聞之山神懼其不已也告帝帝感其誠命夸娥氏二子負山一措朔東一措雍南自此冀南漢隂無隴違家違山十里蟪蛄之聲猶在於耳注謂政事須聽而後到重載渉家語萬仞之山重載渉焉為室楚鑿山楹以為室無獸楚辭山蕭條兮崩史岐山崩周幽王卒名山史天下名山八山在夷五在中國華山首陽山太室山少室山東太山此五山黄帝之常遊刺而泉出漢貳師李廣利軍行無水㧞刀刺山水泉湧出銀溢史殷金銀自山溢出不測漢今陛下騁飛六龍不測之山聚米後漢馬援征隗囂於帝前聚米為山指畫形勢開示衆軍帝曰虜在吾目中耳起景陽山魏明帝鑿太行山之石英採穀城之文石起景陽山於芳林園百役繁興公卿已下莫不展力帝乃躬自掘土以率之云云魏志靈運登宋謝靈運好登山陟嶺必造幽峻巖障数十重莫不盡登躡常着木屐上山則去前齒下山則去後齒固國孟固國不以山谿之險孔隴右山崩虞世南隴右山崩帝憂之以問世南對曰春秋時梁山崩晉侯召伯宗問伯宗曰國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣以禮焉梁山晉所出也晉侯從之故得無害漢文帝元年楚地二十九山同日崩今恐有寃獄枉繫室省録纍囚庻幾或當天意帝然之髙士峯秦系客泉州南安有九日山系結廬其上卒南安人思之為立小亭號其山為髙士峯云窮厯宋之問改越州長史窮厯剡溪山悦謝家青山李白晚度牛渚磯至姑孰悦謝家青山欲終焉及卒葬山麓愛陸渾佳山水元徳秀愛陸渾佳山水乃定居慶山五行志垂拱二年九月己巳雍州新豐縣露臺鄉大風雨震電有山湧出髙二十丈有池周三百畝池中有龍鳳之形禾麥之異武后以為休應名曰慶山僕夫穿竹語稚子入雲呼杜甫蜀山行作得山定否世宗謂馮道曰劉旻烏合之衆若遇我師如山壓卵道曰陛下作得山定否世宗怒起去卒自將擊旻果敗旻於髙平底柱山陜州陜石有底柱山山有山門河所經太宗勒銘誌名山三百六十酉陽雜爼移永昌中華州赤水南岸大山晝日忽風昏有聲隱隱如雷頃之漸移東數百歩擁赤水壓張村三十餘家山髙二百餘丈水深三十丈坡上草木宛然布散雲雨楊烔冕服議曰山者布散雲雨象聖王澤霑下人也孤峯絶岸壁立萬仞張說山嵎嵎以嵓立桞宗元賦磝磝山磝磝其相軋出韓愈别志賦造化尤物九華山自是天地一尤物劉禹錫詩輔唐山王旻請於髙宻牢山合煉𤣥宗許之因號山為輔唐山旻居之出獨異志﨑嶬而不極文粹張說賦江上之峻山兮鬱﨑嶬而不極山隱隱以掃空皮日休晴山翠逺而四合李白文養雲雨以潤物陸希聲山居記酌而飲頥山曰吾所以命夫山之為頥者勉子以義也子其養雲雨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨林以充棟宇養小林以為蒸薪養茅菅以茨藉養竹箭以為器用養百果以充口腹養百藥以蠲札瘥養昆虫使咸樂其生養鳥獸使各遂其性山上有葱下有銀酉陽雜爼山上有葱下有銀山上有薤下有金山上有薑下有銅錫山有寳玉木旁枝皆下垂聚拳石為山白居易廬山記指遥青而㸃黛者問之則曰某山某巖某林某野馮宿東峯新亭記列嶺羣峰文粹陳寛穎亭記列嶺羣峯而來崪岏不得進煙嶠韋應物詩曰山煙嶠物買山錢雲溪友議于頔鎮㐮陽廬山符載山人賫書乞買山錢百萬公遂與之造山﨑危詰曲有若天成紀異録昭宗末年長安役人取石於苑中造山﨑危詰曲有若天成又命取終南草木植之山禽野獸縱其徃復及造屋室如庻民家帝與嬪妃遊處由是王公貴遊爭效之未及半年竒花異草自然生滿宫殿識者以為丘墟之象後巢冦入京焚燒殆盡瓦悉為礫游西山登王母祠五代王鎔游西山登王母祠使婦人維錦繡牽持而上嵩山二白中岳曰嵩山五嶽之中嵩髙維嶽峻極于天維嶽降神生甫及申太室少室嵩髙捴名也其山東為太室西為少室故曰二室謂之室者以其下各有石室萬嵗聲漢書武帝禮登中岳聞冇言萬嵗聲三於是以三百户封奉祀命曰崇髙為嵩髙降神見上鎮地配天三公天子祭名山五嶽視三公仙列仙傳王子喬即子晉也周靈王太子好吹笙作鳳鳴遇道士浮邱公接上嵩髙山三十餘年而得仙已見七月七日門注又漢武帝夣與李少君俱上嵩山逢繡衣使者從雲中下言太一請少君覺曰少君當捨朕去矣嵩山記云鬼谷先生於嵩山東南學仙節彼靈山奠兹中土節髙峻也瞻彼髙嶽鎮兹坤儀巨鎮名雄五嶽秩視三公禮朝陽夕陽爾雅曰山東曰朝陽山西曰夕陽崔嵬爾雅云石戴土謂之崔嵬砠又曰土戴石為砠嵩髙白虎通曰中央之嶽獨加髙字者何中央四方之中可髙故曰嵩髙山墜仙館劉毅慶世說嵩山北有大穴晉時誤墜穴中見二人圍棊有一杯白飲與墜者飲焉氣力十倍棊者曰汝可住此墜者不願棊者曰從此西行有天井其中多蛟龍但投身入井中自當得出若飢取井中物食之墜者如其言可半年出蜀中因至洛問張華華曰此墜仙館也其所飲者玉漿也所食者龍穴内石髓孔神岳則天紀垂拱四年七月改嵩山為神岳封其神為天中王封於神岳萬嵗通天元年甲戌如神岳甲申封於神岳遁舎嵩山杜楚客建成難作楚客遁舎嵩山貞觀四年召為給事中太宗曰君居山似之矣謂非宰相不起渠然耶鶉火大火夀星豕韋為中州唐天文志云云其神主乎嵩邱鎮星位焉日月仙宫唐文粹崔融嵩山啟母廟碑九州地險五嶽天中蛇龍洞穴日月仙宫玉女𢷬帛石五代秦再思紀異曰嵩山之上有玉女𢷬帛石瑩徹光潔人莫能測岳下之人云立秋前一日中夜常聞杵聲響焉望都峰岳之西北一峯號望都峰云天氣晴暖即望見洛陽隱如車盖之狀鷄鳴峯又岳之東北一峯號雞鳴峯云五更之初便見日出中天池岳頂有中天池開元中隱士盧鴻凢有絶境之處皆勒銘其最妙者此四銘也廬嵩山盧鴻廬嵩山賜隱居服官營草堂到山中廣學廬聚徒五百人羣山莫與崇韋應物嵩少多秀色羣山莫與崇謡髙宗自調露中欲封嵩山属突厥叛而止後又欲封以吐蕃入冦遂停時童謡曰嵩山凡㡬層不畏登不得但恐不得登三度徴兵馬傍道打騰騰出五行志四方環鎮嵩當中韓文衡山廟華山三白豫州之鎮周官豫州之鎮曰華山西廵舜典曰嵗八月西廵狩至於西嶽削成五千仞山海經華山削成而四方髙五千仞其廣千里三峯見華山記太華少華故曰二華鎮地見周官配天山嶽則配天介二大都髙五千仞三公見嵩山注天府之襟帶節彼大華鎮於西方瞻彼名山奠兹西土奠鎮也巨鎮名雄五嶽秩視三公巨靈郭縁生述征記曰華山與首陽本一山河神巨靈擘開以通河流故掌迹存焉西京賦巨靈贔屓髙掌逺蹠以流河曲厥跡猶存蓮花峯華山記曰山頂有千葉蓮花服之羽化因名曰華山焉地載禮曰地之廣厚載華岳而不重靈開見巨靈注中秦城史記秦始皇踐華山以為城周馬歸馬華山之陽蒲池在山頂上石鼓有時聞其鳴毛女列仙傳毛女者在華隂中獵人徃徃見之體生毛自云秦皇宫人而不老隱前秦録王猛隱華山桓温入闗猛被褐而謁之面說當代之事捫蝨而言傍若無人列仙傳脩羊公止華山石室中有懸石榻卧其上石盡穿䧟仙列仙傳馬明生入華陰山合金液神丹升天也又列仙傳呼子先者卜師也騎龍上華山而去又衛叔卿乗雲駕鹿博於華山石上追之不可得九山吕氏春秋曰何謂九山㑹稽太山王屋首陽太華岐山太行羊腸孟門為城恨賦華山為城孔祈神自卜裴寂過華山祠祈神自卜生金李適之常與李林甫爭權不協林甫隂賊好䛕謂適之曰華山生金采之可以富國顧上未之知適之性踈信其言他日從容為帝道之帝喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舎不可以穿冶故不敢以聞帝以林甫為愛己而薄適之不親肖安樂公主累石肖華山踞中土西偏當七宫正位張說華山碑又下有方士真人金鼎石室上有明星玉女仙草瑶池弟龍一去毛女千祀巉巉太華柱天直上青崖白谷仰見靈掌雄峯峻削菡蓞森爽是曰靈岳衆山之長上登華嶽之巔唐李肇國史補韓文公登華嶽之巔其顧視險絶恐慄度不可下乃發狂慟哭而欲絶甕肚峯唐開元記華岳雲䑓觀中方之上有山崛起半甕之狀名甕肚峰上賞望嘉其髙迥欲於峰腹大鑿開元二年字填以白石令百餘里見諫官上言乃止朱鬒紫衣車駕次華隂上見嶽神數里迎謁遂召諸巫問神安在獨老巫阿馬婆奏云在路左朱鬒紫衣迎候陛下上顧咲之上至廟見神櫜鞬俯伏庭東南大栢樹下又召阿馬婆問之對如上見上加敬禮尋詔先諸岳封為金天王仍上自書製碑文以寵異之其碑五十餘尺濶丈餘厚四尺天下碑莫比也呼吸之氣想通帝座搔首集李白登華山落鴈峰曰此山最髙呼吸之氣想通帝座矣恨不携謝朓驚人詩來搔首問青天爾靈蹤露指爪靈蹤露指爪殺氣見稜角劉禹錫華山詩上元二年華山曰太山寳應元年復故名地里志倚京師而西峙靈鎮三峰倚京師而西峙文粹席豫楊仲宣碑拜山東夷有識山者徧拜五嶽一拜而退惟入闗望華山自闗西門拜禮至山下仰望七日嘆咤而去謂京師衣冠文物之盛由此而致出唐語林登蓮華峰王𤣥仲欲登蓮華峰約寺僧到峯頂當起煙為信翌日持火而登僧候之數日果有煙起留二旬乃復下僧問之云峯頂有池菡蓞盛開可愛其中又有破鐡舟存焉三水小牘玉井蓮太華峰頭玉井蓮華開十丈藕如船韓文古意見若咫尺田千畆矣楊敬之華山賦起居於上宫室於上如此之乆矣其所見何如也曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻蛭臺九層矣䤈雞徃來周東西矣蠛蠓紛紛秦速亡矣蜂窠聫聮美阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載更改興壊悲愁辛苦循其上矣愛華山之為山而有三得始其卑者朝髙者覆得其掲然無附着而又得其近而能逺窮捜極討灑豁襟抱始以徃來畨畨不遂其願李商隱與陶進士詩玉池神挹石室僊開海絶瀛州天遥𤣥圃華山碑其行配金其氣直酉軒帝遊焉以㑹衆神虞舜柴焉以覲羣后上作鎮中土據於西陲李德裕一品集祭西岳文作鎮中土據於西陲積髙禀靈宅神明之奥少隂恢德成天地之分左抱桃林之塞右産藍田之玉張說碑諒少昊之下都即蓐收之别館也同上太華三芙蓉明星玉女峰李白詩立表以筭其髙五千仞明焉張說太華五千仞劈地抽森秀李賀鶉首實沈以負西海天文志華岳金天晶杜詩雲斷岳連臨大路同上倚巖睨海浪引袖拂天星韓愈答張徹詩華隂有嶽祠唐地里志御製碑有聲唐廣明元年華岳廟𤣥宗御製碑隱隱然有聲聞數里間浹旬乃止泰山四白東嶽博物志曰東嶽一名天孫言為天帝之孫岱宗五經通義曰太山一名岱宗王者受命易姓報功告代於岱宗岱者代也東方物之始交代之處又羣嶽之長封禪白虎通曰王者受命必封太山之髙以報天禪梁甫之趾以報地史記自古封太山禪梁甫者有七十二君東廵尚書曰東廵狩至於岱宗柴日觀太山記東南巖名曰日觀言雞一鳴時見日出秦觀者望見長安吳觀者望見㑹稽周觀望鎬也黄河去嶽三百餘里望見之如帶三宫洞天茅君内傳曰仙家凡有三十六洞天岱宗之洞周廽三千里名之三宫空洞之天天孫見上巗巗詩太山巗巗魯邦所瞻瞻至也言山在魯境雲起史漢武封太山白雲起於封中兖州之鎮周書兖州之鎮曰太山東岱亦泰山石閭在泰山上如礪漢髙祖曰太山如礪五祠漢書五嶽皆三祠獨太山唯五祠隱神仙傳曰太山老父者失其姓名漢武東廵見老父鉏於道間頭上有白光冠五嶽之首五嶽岱為之長視三公之秩見上季氏旅於泰山鄭伯請釋太山而祀周公三廟太山有上中下三廟也節彼髙山鎮兹東土巨鎮瞻彼靈嶽鎮兹東方鎮地配天名山見上其穨禮太山其穨則吾將安仰安仰見上仙列仙傳曰稷邱君太山下道士漢武東廵乃擁琴而拜又仙傳崔文子太山人潜居山下好黄老術嘗賣藥雲公羊傳曰觸石而出膚寸而合不崇朝而徧天下者唯太山之雲也雲氣袁崧漢書曰光武封太山雲氣成宫闕金篋玉䇿古者封泰山禪梁甫風俗通云岱宗上有金篋玉䇿能知人之夀脩短漢武探得十八因倒讀曰八十其後果然主人命博物志一名天孫主召人魂東方萬物之始故知人生命之短長孔禪於社首元宗開元十三年十一月庚寅封於太山辛夘禪於社首升山張九齡帝東封太山說多引兩省録事及所親攝官升山懸崖韓愈書臨泰山之懸崖莫不戰悼惶慄眩惑而自失造化鍾神秀杜甫望嶽一手揺庻人祐野人髙君狀曰今王以數千人為亂猶以一手揺太山又如君父何揔神靈之府唐文粹張說封禪頌泰山者聖帝受天官之言天孫揔人靈之府白騾唐開元記上到泰山益州進白騾至豐潔肥澤俊偉竒異上遂親乗之柔順安便不知登降之倦告成禮畢復乗而下纔下山休息未乆而又言白騾無疾而殪上嘆惜之諡曰白騾將軍命有司具槥櫝疉石為墓墓在封禪壇北一里餘於今存焉泰嶽泰嶽既寕登封有日劉禹錫賀平淄青表參天入雲李善注文選太山之髙參天入雲赤霄可接白雲在下張說封禪頌出天門臨日觀次沆瀣宿巉巖赤霄可接白雲在下石平御道開李白四月上泰山石平御道開六龍過萬壑澗谷隨縈廽泰山起雲無逺不被張九齡龍池聖德頌若泰山起雲無逺不被髙髙至天門李白送范山人歸太山髙髙至天門海日近可攀石銘玉䇿泰山東南之日觀也則秦皇刻其石銘漢皇探其玉䇿楊炯其方處萬物之始故稱岱焉其位居五嶽之伯故稱宗焉明皇太山銘登髙望蓬瀛想像金籙臺李白遊太山詩山際逢羽人方瞳好容顔同上遺我鳥跡書飄然落巗間其字乃上古讀之乃不閑同上舉手開雲闗平明登日觀舉手開雲闗精神四飛揚如出天地間上求觀衆邱小必上泰山岑韓愈詩東岱五嶽之長杜子美南郊賦云東岱五嶽之長足以勒崇垂鴻與山無極髙視萬古明皇紀泰山銘髙視萬古自比九星降婁元枵以負東海其神於岱宗嵗星位焉唐天文志太山㝠㝠崪以髙杜甫離述攀崖上日觀伏檻窺東溟李白日觀東北傾兩崖夾䨇石同上恒山五白北嶽常山爾雅恒山謂之常山風俗通云恒常也萬物狀北方有常也白虎通曰北方有常山者何隂陽終其常乆故曰常山并州之鎮周官曰并州之鎮恒山也朔廵虞書曰十一月朔廵狩至於北嶽瞻彼靈山鎮兹朔土臨岱北俯趙南早生早生而晚殺五榖蕃熟四種而五穫神䕶草本草云常山有草名神䕶致之門上毎夜吒之珪璧慕容雋得璧七十二珪七十侍祀神後魏道武立廟於上置祝九十九人嵗時祈旱至文成帝親祀其神趙符史趙簡子謂子曰吾藏寳符於常山得者立為後諸子皆競徃無所得無恤曰常山臨代代可取也乃立之燕璧前燕録曰慕容雋夀光二年常山得璧七十一光色有異雋以為神嶽之命以太牢祀之趙代之境恒山居趙岱之境簡子曰常山北臨代南俯趙東接河海之間畢昴