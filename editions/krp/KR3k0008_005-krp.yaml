終南山有旱藕餌之延年狀類葛粉帝作湯餅賜大臣作固鎬京桞宗元終南山祠堂碑巍巍靈山興利産材作固鎬京擁其嘉休接終南之壽山唐文粹李廋西都賦其地勢也負秦章臺倚漢甘泉帶涇渭之富流接終南之夀山巉巉長安雨洗新秋出極目寒鏡開塵函終南曉望蹋龍尾倚天更覺青巉巉韓文望秋作伐薪汲泉皆是名士邢和璞曾居終南好道者多卜築依之崔曙年少亦隨焉伐薪汲泉皆是名士出門見南山李白望終南出門見南山引領意無限秀色難為名蒼翠日在眼惟終南㩀天之中柳文惟終南㩀天之中在都之西南至於褒邪又西至於隴首以臨於戎東至於商顔又東至於太華以距於闕是能作固以屏王室其物産之厚器用之出則璆琳瑯玕夏書載焉紀堂條梅秦風詠焉錯磨終南翠杜甫渼陂西南臺詩隱終南山孫思邈常隱居終南與宣律師相接每来徃互參宗旨雜組青㝠天倪色李白君子有所思行紫閣連終南青㝠天倪色平崖望咸陽宫闕羅北極日色低平灣李賀終南日色低平灣石八白玉石俱焚書云火炎崑岡玉石俱焚投人傳齊髙固入晉師磔石以投人曰欲勇者賈余餘勇嘉石周禮大司冦以嘉石平罷民有罪者坐為嘉石胏石周禮以胏石達窮民凢逺近孤獨老㓜之欲有復於上而其長弗達者立於胏石胏石赤石也梁大監中於公車府設謗木胏石置函欲有横議投謗木於函五年詔曰朕晦旦齋居惟刑是恤三辟五聽寢興載懐故陳胏石於都街怪石禹貢曰鈆松怪石注怪異好貌衆珉子貢曰君子賤珉以珉之衆也漸漸詩漸漸之石維其髙矣巗巗節彼南山維石巖巖積石貌落落如石磊磊澗中石佗山之石可以攻玉燕石荀卿子曰宋之愚人得燕石於梧桐臺之東歸而藏之以為寳周客聞而觀焉主人齋七日端冕𤣥服以發寳革匱千重緹巾十襲客見之掩口而笑曰此燕石也其與瓦甓不殊一拳禮今夫山一拳石之多水投以水投石莫之受也以石投水莫之逆也雲觸石而起盤石之固泐泐解散也有時而泐轉我心匪石不可轉也言傳曰石言於晉魏榆師曠曰石不能言或慿焉不然民聽濫也臣又聞作事不時怨讟動於民則有非言之物而言也五色補天女媧煉五色石以補天隕傳僖公十六年隕石於宋五隕星也鵲捜神記常山張顥為梁相時天新雨後有鳥如山鵲飛翔市人擲之墜地爭取即化為一圎石顥椎破之得一金印文曰忠孝侯印鷰唐仲雍湘州記零陵有石鷰得風雨則飛翔如真鷰風雨止還為石也望夫武昌山北有望夫石云昔貞婦夫從役逺赴國難婦携弱子餞送此山立望夫而死化為立石因名焉飲羽射有飲羽於石韓詩外傳曰楚熊渠子夜行寢石以為伏獸彎弓射之飲羽下視乃石也因復射之無跡漢書載李廣亦如之支機織女以石支機羊黄初平叱石成羊魚昆明池刻石鯨魚雷雨則鳴吼異隕於宋都是何祥也言於晉國或有慿焉珪化傳王子朝見珪璋門韞玉文子曰石韞玉而山輝犀蜀都水災乃刻石犀沉江浦見救水災門注童子陳倉童子化為石黄公史記張良見一老人出一編書曰讀是為王者師後十三年見我濟北榖城山下黄石即我也精衛銜石以填東海見海門注惡焦中元記曰天下之彊者東海之惡焦焉水灌而不已惡焦者山石也海東南方三萬里海水灌之即消神鞭見神門注孔累石肖華山安樂公主累石肖華山隥彴横邪囬淵九折以石瀵水隕石十八於馮翊于志寧永徽四年隕石十八於馮翊髙祖問曰此何祥也朕欲悔徃脩來以自戒若何志寕對曰春杖隕石於宋五内史過曰是隂陽之事非吉凶所生物固有自然非繫一人事雖然陛下無災而戒不害為福瑞石馮元常樊文進瑞石后暴石朝堂示百官元常奏石妄偽不可以示羣臣后怒出為隴州刺史洛水石李昭德冇人獲洛水白石而赤文者獻闕下曰此石赤心故以獻昭德叱之曰洛水餘石豈能盡反耶據以草制薛元超轉中書舎人省中有盤石道衡為侍郎時嘗據以草制元超每見輙泫然流涕鬰林石陸龜蒙陸氏在姑蘇其門有巨石逺祖績當仕吳為鬰林太守罷歸無裝舟輕不可越海取石為重人稱其亷號鬰林石世保其居云聚石馬燧表隴州刺史西山直吐蕃其上有通道虜常所出入者燧聚石種樹障之設二門為譙櫓八日而畢虜不能暴書法徐浩書益工世狀其法曰怒猊抉石没唐石王重榮傳帝出奔欲入谷中自固以谷有沒唐石惡之遂徙石門醒酒石五代張全義監軍甞得李德裕平泉醒酒石德裕孫延古因託全義復求之監軍忿然曰自黄巢亂後洛陽園池無復能守豈獨平泉一石哉全義常在巢賊中以為譏己因大怒奏笞殺監軍者石走五行志資州有石方丈走行數畝青錦李白片石寒青錦創石樓香山白居易松風石唐杜陽雜編曰武宗㑹昌元年大食國貢松風石方一丈瑩澈如玉其中有樹形若枯松偃盖颯颯焉而涼飈生於其間至盛夏上令置諸殿内稍稍秋氣颼飀即令徹去仙人鏡日林國西南有怪石方數百里光明澄澈可鑒人五臟六腑謂之仙人鏡其國人有疾皆輙照之其形遂知終南紫石樂天女金鑾十嵗忽書北山移文示家人樂天方買終南紫石欲刋文士傳遂輟以勒焉出豐年傳其石之突怒偃蹇負土而出爭為竒怪狀者殆不可數其􅋂然相累而下者若牛馬之飲於溪其衝然角列而上者若熊羆之登於山柳宗元鈷鉧潭記大石林立渙若犇雲錯若置棊怒者虎鬬企者鳥厲抉其穴則鼻口相呀捜其根則蹄股交峙萬石亭記怪石森然周於四隅或列或跪或立或仆竅穴逶䆳堆阜突怒新堂記佛座武肅王錢鏐自㓜嘗與鄉里児童聚戲於樹隂石上指其樹石曰我貴賞爵而覆之建功臣精舎遂以其石為佛座焉出吳越偹史落星石祕省内落星石薛稷畵鶴賀知章草書郎餘令畫鳳相傳號為四絶南部新書石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石洽聞記沙羅石河南長夀殿南有婆羅亭貯竒石處世傳李德裕醒酒石以水沃之有草木自然之狀今謂沙羅盖以樹石河南志太湖為甲竒章公嗜石游息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉白居易太湖石記嶺石拆天罅韓愈縣齋詩横波之石利侔劍㦸韓文石眼影燈記曰上元夜蕭餘於宣陽里酒盤下得一物如人眼睛其體類美石光影射人每置掌中逰闇處輙光明三尺許後因雨飛去青石三白樂天洛陽履道里洪農楊正一遺石三方丈平滑可以坐卧韶石酉陽雜爼荆州利水間有二石若闕名曰韶石晋永和中有飛仙衣冠如雪各憇一石旬日而去人咸見之青衣若龜形五廣德神異記唐齊王元吉於晋陽宫獲青石若龜形五有丹書四字曰李淵萬吉元吉遣使獻之文字映澈宛若龜形見者咸異焉髙祖曰不足信也乃令水漬磨以騐之數日浸而紅色磨之其字愈明於是内外畢賀髙祖曰上天明命貺以萬吉孤陋寡薄何堪預此宜以少牢祠石龜而爵送之祝石不落獨異記唐中宗為天后所廢於房陵仰天而嘆心祝之因抛一石於空中曰我復帝此石不落其石遂為樹枝勾掛至今尚存燃石建成縣出燃石色黄理踈以水灌之則熱安鼎其上可以炊也酉陽雜爼有流石成形桞州山水記仙弈之山其上有穴有屏有室有宇其下有流石成形如肺肝如茹房或積於下如人如禽如器物甚衆錦石小如錢杜甫秋日詠懐有石焉翳乎奥草栁宗元新堂記秦神驅石以梁大海同上晉問青質白文成字五行志貞觀十七年八月涼州昌松縣鴻池谷有石青質白文成字太宗遣使祭之曰天有成命表瑞貞石文字昭然厯數惟永富哉石乎厥狀非一有盤坳秀出如靈丘鮮雲者有端儼挺出如真官神人者有縝潤削成如珪瓉者有亷稜銳劌如劍㦸者又有如虬如鳳若跧若動將翔將湧如鬼如獸若行若驟將攫將鬬風烈雨晦之夕洞穴開􅥾若欱雲歕雷嶷嶷然有可望而畏之者烟霽景麗之旦巖㠋霮䨴若拂嵐撲黛靄靄然有可狎而翫之者石有大小其數四等以甲乙丙丁品之每有上中下各刻於石隂曰牛氏石甲之上丙之中乙之下百仞一拳千里一瞬此所以為公適意之用也竝白氏記碎石如粉江南野史道士譚紫霄鄰僧於溪滸剏亭為頑石所礙致一百倍不能平之紫霄見曰斯易爾以指捻印水噀之命斧擊石應手如粉黒潤可愛崔𤣥亮常侍在洛中嘗閒步沙岸得一石子大如雞卵黑潤可愛翫之行一里餘忽然而破有鳥大如巧婦飛去崐崘山九白天中柱河圖曰崐崘山天中柱也五城十二樓又曰崐崘之㠊五城十二樓河水出四維魚龍赤水之後黒水之前大荒經曰赤水之後黒水之前有大山名崐崘之丘有神人面虎身有毛西方之美爾雅曰西北之美者有崑崙墟之璆琳琅玕焉黄帝宫穆天子傳曰遂宿於崑崙之阿赤水之陽吉日辛酉天子升於崑崙之觀黄帝之宫仙人居葛仙翁傳崑崙山一曰𤣥圃䑓一曰積瑶房一曰閬風䑓一曰華葢一曰天柱皆仙人所居周穆西征紀年曰穆王十七年西征至崑崙邱見西王母乃宴張騫奉使漢史張騫大夏之役窮河源惡暏本紀所謂崑崙乎日月所隱史記禹本紀言河出崑崙山山髙三千五百餘里日月所相隱避為光明也其上有醴泉華池自張騫大夏窮河流黄水博物志曰崑崙從廣萬一千里神物所生聖人仙人所集也出五色雲氣五色流水東南流黄水入中國為河環炎火捜神記崑崙山地首也寔惟帝之下都故外絶以弱水之深又環炎火之山山上鳥獸草木皆生育滋茂於炎火之中故有火浣布非此山之皮革則鳥獸之毛羽也去中國五萬里水經曰崑崙之墟在西北方去嵩髙五萬里地之中其髙萬一千里河水出其東北陬也孔登崑文粹張說昭容上官氏文集序曰窈窕柔曼誘掖善心故登崑廵海之意寢剪胡刈越之威息仙岑文粹李德裕武宗真賛崑閬仙岑峻極秋旻天地之齊段成式雜爼玉格崑崙為天地之齊惜哉瑶池飲日宴崑崙丘黄鵠去不息哀鳴何所投杜甫詩西北之天門崑閬西北之天門也則五帝處其陽陸三皇居其正地文粹楊炯少姨廟碑崑崙月窟東嶃巖杜甫草堂亂𤣥圃不隔崑崙岑杜甫阻雨詩驅八駿於崐崘杜甫西岳賦崑崙髙萬里嵗盡道苦邅韓愈詩廬山十白天子鄣山海經曰廬山一曰天子都一曰天子鄣匡俗廬周景彧廬山記曰匡俗周威王時生而靈神廬此山世稱廬君故山取號焉江陽之名嶽伏滔遊廬山序曰廬山者江陽之名嶽其形大背湎流向彭蠡蟠根所據亘屬數百里重嶺桀崿仰揷雲日俯激川湖之流南國之德鎮梁元帝廬山碑序曰夫日月麗天星穹所以貞觀川嶺𢃄地后土所以唯寧廬山者亦南國之德鎮雖林石異勢而雲霞共色香爐逺法師廬山記曰東南有香爐山孤峯秀起游氣籠其上則氛氤若烟山帶張野廬山人將雨則有白雲或冠峯巖或亘巖中謂之山帶不出三日必雨也觀禹周景彧廬山記曰登廬山望九江以觀禹之迹其兹峯乎東南隱諸嶺不得駢矚自廬山人迹所暨廽望處無復出此者甚髙峻每雨其下成潦其上猶映日峯頭有盤石坐數百人種杏神仙傳董奉石門逺法師廬山記曰西南有石門山其狀似䨇闕壁立千仞而瀑布流焉孔長山横蹙李白於敬亭送姪遊廬山寺云方告我逺渉西登香爐長山横蹙爐峰權德輿送靈徹序云自爐峰言旋匡廬竒秀甲天下山白居易草堂記曰匡廬竒秀甲天下山廬山以靈勝待我同上記北峯曰香爐峯北寺曰遺愛寺同上據層崖積石嵌空垤堄堂東有瀑布水懸三尺同上蕭存故居蕭存卒韓愈少為存所知自袁州還過存廬山故居惟一女存焉經贍其家九江秀色可攬結廬山東南五老峯青天削出金芙蓉九江秀色可攬結吾將此地巢雲松李白望五老峰詩西登香爐峰南見瀑布外望廬山瀑布上秀出南斗傍廬山謡屏風九疊雲錦張同上興因廬山發好為廬山謡興為廬山發閒窺石鏡清我心謝公行處青苔没同上香爐峯色隱晴湖種杏仙家近白榆杜甫贈蘭若立草堂白居易居廬山二林間香爐峯下立草堂前有喬木脩竹居易與湊蒲朗晦四禪師追惠逺次宗之舊竝為方外之交七詠唐江西帥韋丹與東林僧靈澈友善唱和詩什頗多韋為序曰澈公近以匡廬七詠見寄皆麗絶於文圃也七詠則蓮華峯石鏡虎跑泉聦明水白鹿洞鐡舩康山廟為七詠也雞距集爐峰生轉眄杜甫詠懷太行山十一白歸山山海經曰太行之山其首曰歸山其上有金玉下有碧駕駿穆天子傳曰天子命駕八駿之乗赤驥之駟南征朔行徑絶雀道升太行南濟於河驅驥墨子謂耕桂子曰將上太行駕驥與牛子將誰驅曰驅驥以貴驥牛之難尸子曰龍門魚之難太行牛之難以德報怨人之難壍太行之道戰國䇿曰范雎說秦曰舉兵攻滎陽則成臯之路不通壍太行之道則上黨之兵不下舉兵而攻滎陽則其國斷而為三仙神仙傳曰王烈入太行山忽聞山東雷聲徃視之見山石上破數百丈石中有一孔尺餘中有青泥流出烈取摶之隨手堅凝氣味如粳米飯按仙經云此石髓服之夀與天齊太行恒山至於碣石入於海尚書禹貢孔登山狄仁傑親在河陽仁傑登太行山反顧見白雲孤飛謂左右曰吾親舎其下隱太行崔信明建德潜隱太行山太行却立通谷前廓李明堂賦太行枕甸發址崇垓文粹李庚東都賦羣烏夜集元和四年十二月羣烏夜集於太行山上出五行志崖有聲武德二年三月太行山聖人崖有聲占者有冦至見君乗騶馬知上太行道此地果摧輪全身以為寳李白將登太行雪暗天上行路難不知太行之異乎九衢栁宗元愚溪吾盪而趍不知太行之異乎九衢太行廽車竟可託李白擬古摧輪李白憶舊遊五月相呼度太行摧輪不道羊腸苦磴道盤且峻巉巗凌穹蒼李白北上行北上何所苦北上縁太行磴道盤且峻巉巗凌穹蒼馬足蹶側石車輪摧髙岡沙塵接幽州烽火連朔方蒼然太行路翦翦還榛莾杜牧感懐詩誰把長劍倚太行韓愈是時新晴天井溢誰把長劍倚太行荆山十二白地雌河圗括地象曰荆山為地雌上為軒轅多金鐡山海經曰荆山其隂多鐡其陽多赤金泣玉韓子曰卞和得玉於荆山之中将獻於楚王王使工人相之曰石也王怒刖其左足和抱玉坐荆山之下三日泣盡繼之以血見玉部注水經曰荆山在南郡阻縣東孔放舞象德宗帝紀大厯十四年五月丁亥放舞象三十有二於荆山之陽産玉歐陽詹送族叔下第歸廣陵序荆山産玉自民役巧瑢瑑蓋多此外無秀劉禹錫九華歌愛荆山以謂此外無秀秦欺趙氏璧却入邯鄲宫本是楚家玉還來荆山中李白將遊衡岳荆山長號泣血人忠臣死為刖足鬼李白鞠歌行朅來荆山客同上感興朅來荆山客誰為珉玉分良寳絶見棄虛持三獻君湖城有熊耳山覆釜山一名荆山地里志虢州鍾山十三白蔣山徐援釋問畧曰建康東北十里有鍾山舊名金山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠焉故號曰蔣山庾闡揚都賦注曰建康宫北十里有蔣山輿地圖謂之鍾山元皇未渡江之年望氣者云蔣山上有紫雲時時晨見揚都之鎮山謙丹陽記曰京師南北並有連嶺而蔣山獨隆穹峻異其形象龍眞揚都之鎮也吳主孫權葬山南因山為名號曰蔣陵孔抱金陵李白望金陵詩連山抱金陵霸氣昔騰張龍盤走勢金陵歌石頭巉巗如虎踞凌波欲過滄洲去鍾山龍盤走勢來秀色横分厯陽樹壙中銘鄭欽說通厯術博物初梁太常任昉大同四年七月於鍾山壙中得銘曰龜言土蓍言水甸服黄鍾啟靈址瘞在三上庚墮遇七中已六千三百浹辰交二九重三四百圯羣峰如逐鹿犇走相馳突李白望金陵北邙山十四白辛毗諫魏志曰明帝即位欲平北邙山令登䑓觀見孟津廷尉辛毗諫曰天地之性髙下今而反之既非其理又加損廢人功民不堪役且若九河泛溢洪水為害而邱陵皆夷何以禦之帝乃止光武墳邉杏朱超石與兄書曰登北邙逺眺衆美都盡光武墳邉杏美今當奉送核孔陣馬璘從李光弼攻洛陽史朝義衆十萬陣北邙山偃師李宻王世充悉衆决戰宻自引精兵出偃師北阻邙山待之嵩邙陳子昴上書景山崇秀北對嵩邙講武唐髙宗麟德二年四月丙寅講武於邙山之陽脩邙洛水之陽脩邙之趾劉禹錫史公碑銘塚墓嵯峨白居易浩歌行云賢愚貴賤同歸盡北邙塚墓髙嵯峨城背韋應物登髙望洛城作城背北邙原故都之後文粹張說麗妃神道碑窆於故都之後邙山之陽黒雲上魏蹬武舞作用凱安邙山黒雲上殮𦵏北邙羅士信死隱悼贖其尸以葬及東都平出家財殮葬北邙以報德士信為仁基所禮初且曰我死當墓其側至是如所志巨蛇舊志天寳中洛陽有巨蛇髙丈餘長百尺出邙山下胡僧無畏見之曰此欲決水瀦洛城即以天竺法呪之數日蛇死但哭邙山骨李白誰陳廣陵散但哭邙山骨天台山十五白葛仙公山名山畧記曰天台山在剡即是衆聖所降葛仙公山也劉晨阮肇幽㝠録曰漢明帝永平五年剡縣劉晨阮肇共入天台山度山出一大溪邉有二女子姿容絶妙遂留半年懐土思鄉求歸既出親舊零落邑屋更變無復相識訊問得七世孫玉室璿䑓孔靈符㑹稽記曰赤城山内則有天台靈嶽玉室璿䑓忽生忘形異苑曰㑹稽天台山雖非遐逺自非忽生忘形則不能躋焉孔南游天台吳筠南游天台觀滄海與有名士相娱樂廬天台司馬承禎徧遊名山廬天台不出漫若天合呀如地開崔尚天台桐栢觀碑藐彼天台嵳峩崔嵬下臨滄海遥望蓬莱漫若天合呀如地開靈仙所舎皇甫鏄方士桞泌言天台山靈仙所舎多異草翠屏自云厯天台摶壁躡翠屏李白贈僧崖公五峰轉月色天台連四明日入向國清五峯轉山色百里行松聲送王屋山人天台四萬八千丈對此欲倒東西傾夢遊天姥遂登天台望衆壑皆嶙峋夜宿最髙頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然巖且神韓子送惠師夜半起下視溟波銜日輪上華頂髙百越李白詩夢入瓊樓寒有月皮日休文集送内大德遊天台夢入瓊樓寒有月注云天台山有金庭不死之薌及瓊樓玉室䨇峰如闕中天豁開長澗南㵼諸泉合漱一道瀑布百丈懸流望之雪飛聽之風起石梁翠屏可倚也琪樹珠條可攀也仙花露草春秋榮發幽鳥清猿晨暮合響足賞也見天台桐栢觀頌序願官天台柳泌首陽山十六采苓采苓首陽之巔毛詩伯夷叔齊論語曰伯夷叔齊餓於首陽山下又史記曰伯夷叔齊孤竹君之二子讓國逃去隠於首陽山採薇而食遂餓死於首陽見讓門採薇士嘉樹林魏阮藉詩曰歩出上東門遥望首陽岑下有採薇士上有嘉樹林孔洪河之東首陽穹崇唐文粹桞識弔夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中青苔古木蒼雲秋水同上首陽之二子唐文粹李商隱别令狐拾遺書曰首陽之二子豈蘄孟津之八百吾又何悔焉遁入薛收聞髙祖興遁入首陽山將應義舉食雪首陽巔李白有口莫食首陽蕨李白行道難合窆杜子美於首陽之山元稹杜甫詩序燕然山十七白漢書匈奴傳曰貳師引兵還至燕然山單于知漢軍勞倦自將五萬騎遮擊貳師軍大亂敗貳師降單于匈奴哭漢名臣奏曰漢得隂山匈奴長老過之未嘗不哭孔刋燕然之石唐文粹蘇頲集序嘗亦刋燕然之石神丘唐五臣文選封燕然山銘注神丘燕然山也呼吸走百川燕然可摧傾李白憶舊遊雖居燕支山不道朔雪寒幽州胡馬歌燕支落漢家婦女無花色同上塞上曲請纓不繫越且向燕然山同上觀發兵詩倚劍登燕然邉峰列嵯峨同上發白馬羅浮山十八白朱明曜真天茅君内傳曰大天之内有地之中洞天三十六所羅浮山之洞周廽五里名曰朱明曜真之天石樓袁彦伯羅浮山䟽曰遥望石樓直上十里許石樓之於嶺十分之一耳去縣三十里便見山基至所處當百里許山下皆平敞極目羅山浮山羅浮山記曰羅浮者蓋揔稱焉羅羅山也浮浮山也二山合體謂之羅浮在曾城博羅二縣之境舊說羅浮髙三千丈七十石室七十長溪神明神禽玉樹草木也孔陶仙五代秦再思紀異曰顔真卿為盧杞所䧟令單車問罪於李希烈上遣促装東邁内外知公不還矣親族相見於長樂坡公謂諸姻族曰吾早典郡於江南曽遇道士陶八公授與一刀圭碧霞丹令服之自後體健至仐不衰又云七十有阨如有即吉佗日待我於羅浮山得非今日之厄乎公至汜水忽逢陶笑謂公曰吉吉遂指嵩少而去魯公至汴州希烈僣號使人害於近郊及希烈敗詔得歸葬偃師北山後有商人至羅浮山忽見兩道人樹下圍棊一道士謂商人曰子何人對曰洛陽人道士笑曰奉寄一書逹吾家也立札一封題寄偃師北山顔家商人至偃師詢所居即塋庄也守塜老蒼頭得書大驚曰先太師親翰也因以藏於室子孫選吉日發塚開棺即已空矣子孫徑徃羅浮求之竟無跡海黒天宇曠星辰來逼人劉禹錫羅浮詩四百三十二峯皮日休松陵集題羅浮軒轅所居亂峯四百三十二注四百三十二山峰數君言羅浮上容易見九垠漸髙元氣壯洶湧來翼身劉禹錫詩峨山在博羅縣西北五十里髙三千六百丈周廻三百二十七里浮山者本蓬萊之一峯昔時洪水泛海斯來傅於羅山崖巘皆合故曰羅浮山至今卉木不同浮山皆海中類也陳郡袁彦伯東苑徐履道皆云蓬莱有三島此其一焉峯嶺秀㧞四百餘里峯巒晻映三十二所峯崛起上披重霄下有深洞幽䆳旁逹約數十里號曰朱明洞洞三十六第七也龍公竹第三峯有竹大徑七尺圍節長丈二謂之龍公竹常有鸞鳳棲宿有道士及採樵之侶性朴者或得其篾山東有溪曰羅陽永泰中暑雨漲有一竹葉若芭蕉葉大隨水出湏㬰一竹濶二尺餘長丈二乃龍公竹也竒石髙六百丈廣七十丈綵綺錯爛如霞錦迢迢獨出勢若削成謂之瑶石䑓大小石樓相去五里皆孤髙峻秀邈出雲表重簷四柱宛如樓閣霞灼雲掩人迹罕到羅浮記鐡橋有石如鞍橋在石樓之間望之可髙五十餘歩故老謂鐡橋朱明洞天寳初詔道士申大芝祭山欲尋朱明洞時邑簿任知宣領耆舊尋見一洞以藤儋籠石斛垂一人下洞約五丈餘却出云下視無底日月星辰無不備焉初有白雲湏㬰散漫五色何氏女持石増城何氏有神仙之術持一石措小石樓之上逺觀如畫碧雞山山有碧雞羣飛於絶巘或獨鳴於空林可見不可取也聚霞峰其山在羅浮絶頂上髙三百丈周廻二十里常有紫霞在於峯上花首䑓其洞常有五百花首真人遊㑹開元二十六年奉勑建於花首䑓羅浮靈異記紅翠數聲瑶室響皮日休詩註紅翠山鳥名山有璇房瑶室七十有二九疑山十九白蒼梧之野山海經曰蒼梧之川其中有九疑山焉舜之所葬在零陵縣界九疑紛兮並帀楚辭九歌也水事多淮南子曰九疑之南陸事寡而水事多望祀淮南子九疑之山漢書云武帝南廵狩至於盛唐望祀虞舜於九疑山見巡狩門九山相似湘中記曰九疑山在營道縣北九山相似行者疑惑故名之曰九疑山仙名山略記曰九疑山漢末有張禮正魏時有治明期南遊九疑禮正服黄精明期服澤瀉栢實後俱遇西城君受虹景方兼以守一遂内洞徹東華遣迎乗雲上升天孔九疑嵯峨湘雲古色唐文粹張謂虞帝廟碑望九疑之垠垠桞宗元閔生賦肆余目於湘流兮望九疑之垠垠祠舜禇無量昔武帝祠舜九疑願陛下所過名山大川古帝賢臣在祀典者並詔致祭巉天九疑巉天荒是非出韓愈送歐陽詩永州實惟九疑之麓桞宗元永州新堂雲依俙文粹皮日休見逐雲依俙兮九疑班竹啼舜婦清湘沉楚臣韓文送惠師吾聞九疑好夙志今欲伸班竹啼舜婦清湘沉楚臣天樂一部王維集明皇時道士申太芝遇異人告以九疑山舊有天樂一部嵗乆化五野猪郡人捕之化為五古器太芝往求果得之扣之音律相和遂進之桃核扇量米酉陽雜俎杜陟常見江淮市人以桃核扇量米正容一升言於九疑山中得九疑濬傾犇臨源委縈迴桞宗元詩重疊九疑髙同上登九疑兮望清川李白悲清秋賦登九疑兮望清川見三湘之潺湲水流寒而歸海雲横秋而蔽天交廣諸山二十白泉山顧微廣州記曰南海曽城縣有泉山有瀑布懸注百許牛鼻山又曰南海始昌縣有一石望之似牛向江名牛鼻山又曰縣之西有文盧山山髙入雲霄世傳山上有池毎至甲戌日聞山有鼔角笙簫之響金岡山又曰南海四㑹縣有金岡山行人依依見形其岡側參里山又曰東實安縣有參里山曽參純孝常居此山於後世人因以為名石牛又曰鬱林郡北有太山其髙隱天上有池有石牛在池下民常祀旱嵗百姓殺牛初雩以牛血塗石牛背大雨洪注洗牛背浄方清霽浮石山劉欣期交州記云浮石山在海中而特髙數千丈浮在水上也射聲又有一石神功刻鏤似若射去石室口百許歩夜常聞有射聲石膏山裴氏廣州記曰蒼梧彰平縣有石膏山望之皎若霜雪愚公移山列子含澤布氣春秋記題辭曰山之為言宣也含澤布氣調五行也觸石布雲春秋元命苞曰山者氣之苞所以含晴雲故觸石雲出也符釡山史記曰黄帝東至於海登九山西至於崆峒登雞頭山南至熊相北逐煇鬻名符釜山五丁徙山蜀王本紀曰天為蜀王生五丁力士能徙山秦王獻美女與蜀王王遣五丁迎女見一大蛇入山穴中五丁共引蛇山崩厭殺五丁化為石也孔靈洲山地理志廣州有靈洲山在鬱水中駕鶴山柳宗元記桞州山水云甑山之南皆大山多竒又南且西曰駕鶴山壯聳環立山五嶠張九齡山五嶠號白雲謂嶺南南踰横嶺入炎洲青鯨髙磨波山浮韓文川澤二十一藪附白成形易在地成形地險山川丘陵王公設險以守其國利渉大川易隨山濬川九州隨山濬川書畎澮禹曰予決九川距四海濬畎澮距川尚書濟髙宗命傅說若濟巨川用汝作舟楫沸騰百川沸騰喻衆小人毛詩時入禮以時入川而不禁居禮故聖人所以順山者不使居川出雲禮天降時雨山川出雲取材用禮國主傳國主山川故山崩水竭見山門注辛有適伊川見被髪而祭於野者子在川上曰逝者如斯夫不舍晝夜灌注百川灌注莊子三百莊子禹治名川三百支川三千積刑家川為積刑帶華薄文清川𢃄華薄流人血川谷流人血王莽時臨川有悲悟臨川而有悲文泝泝秦川而舉旗魏武珠媚水懐珠而川媚文周衞蜀都山川不足以周衞也融為川瀆水積竭三川周幽崩爭流晉顧凱之至荆州人問㑹稽山川狀曰千巖競秀萬壑爭流三川河洛伊國六川河水赤水遼水黒水江水淮水八川涇渭灞滻浩潏澧浫閱水川閱水而成川陸機歎逝賦朗詠長川百川𣲖别畫地成川涸而魚逝𢎞海者川不辭盈學海兊為澤九澤既陂彼汾沮洳言采其英滸滸川澤滸滸稲人周禮稲人掌稼下地凢稼澤夏以水殄草而芟夷之注元以澤為稼川衡川衡掌廵川澤之禁令而平其守澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之於王府領其餘於萬民凡祭祀賔客供澤物之奠注謂芹茆菱芡土㑹大司徒以土㑹之法辨五土之物二曰川澤動物宜鱗物植物宜膏物澤之萑蒲舟鮫守之董澤之蒲居民王制居民山澤沮洳為下必因川澤商鞅秦任商鞅專川澤之利占後漢冲拂為潁川守劉翊為功曹陽翟黄綱恃程夫人權力求以川澤拂問翊翊對曰名山大川不以封為民也明府聼之被佞倖之名也沮澤川壅為澤䟽川導滯封植九穀國九川滌源七澤楚地藪四曰藪牧養蓄鳥獸周禮太宰九職云九兩九兩繫人九曰藪以富得人注為厲禁使人富藪中物孟諸之麋子玉夢河神謂己畀予瓊弁予畀汝孟諸之麋謂藪也藏疾山藪藏疾可與人共穀梁築鹿囿山川藪澤之利可與人共也不崇藪澤崇髙也見國語叔在藪火烈具舉詩十藪爾雅魯有大野今髙平距野東北大澤也晉有大陸今鉅鹿北廣河澤也秦有陽陓今扶風汧縣西也宋有孟諸今梁國睢陽縣東北也楚有雲夢今南郡華陽縣東南巴丘湖也吳越之間有具區今吳縣南太湖即震澤也齊有海隅海濵廣斥燕有昭余祈今太原鄢陵縣北澤是鄭有圃田今滎陽中牟西圃田澤是也周有焦護今扶風池陽縣瓠中是也無水周禮澤無水曰藪耦耕幽藪物歸國澤水之鍾也藪物歸也所生物也孔沸崩陳子昻上言幽厲亂常苛慝暴虐詬黷天地川冢沸崩博知韋顗博知山川風俗獵渭川元宗開元元年十月甲辰獵於渭川弛陂澤禁開元十六年十一月甲辰弛陂澤禁順流無窮田頵傳内怨行宻與鏐因移書曰矦王守方以奉天子譬百川不朝於海雖狂奔澶漫終為涸土不若順流無窮也祭髙仙芝討吐蕃自安西經䟽勒據婆勒川㑹川漲不得度仙芝殺牲祭川鑿杜固川流如血杜正倫與城南諸杜昭穆素逺求同譜不許銜之諸杜所居號杜固世傳其地有壯氣故世衣冠正倫既執政建言鑿杜固通水以利人既鑿川流如血閱十日止林表韋蘇州登西南崗林表見川流如掌谷轉川如掌上二川溶溶流入宫牆杜牧阿房宫賦川者高澤者卑高者流卑者止韓愈何蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天將雨水氣上無擇於川澤澗谿之髙下然則澤之道其亦有施乎川光晝昏凝李白詩川長信風來同上白璧山翫月登岳眺百川杳然萬恨長留别下有衝波逆折之回川蜀道其川饒衍郝玭為臨涇鎮將常從數百騎出野還說節度使馬璘曰臨涇扼洛口其川饒衍利畜牧其西走戎道曠數百里其江河自西極逹於東溟中國之大川者也唐六典水部其江河自西極逹於東溟中國之大川者也其餘百三十有五水是為中川者也其千二百五十有二水斯為小川者也百川繞郡落天鏡於孤城韋德碑若壅大川則必決而放諸陸桞宗元讀毛潁傳冬春之交水蟲孕育捕魚之器不施川澤六典虞部虞衡二十二白山虞掌山林之政令為之厲禁虞衡作山澤之材川衡掌廵山澤禁令而平其守澤物之奠賔客祭祀共芹茆菱芡任虞以澤掌禁其物課菜果𤓰之屬山師原師各辨其物名而獻珍異奠地守虞衡大司徒之職山虞凡服耜斬季材以時入之招虞以旌不進左傳曰皮冠以招虞人虞之公羊山林藪澤與人共虞之非正也時入林麓州澤以時入而不禁三衡山立三衡期魏文侯與虞人期遇雨乃命駕而去三虞國語澤立三虞澤虞掌國澤政令為之厲禁孔虞衡掌木班倕葺宇崔融嵩山啟母廟碑銘始詔林衡俄成壯觀紫梲星錯丹梁霞煥楊炯少室山少姨廟碑虞羅獸猶畏虞羅杜甫詩室有魚飱市多山木王維京兆張公德政碑舟漁衡麓之守廢蒲荷新蒸之産入自郊徂邑室有魚飱斬隂伐陽市多山木民得以贍鴻鵠翺翔李華盧郎中齋居記鴻鵠翺翔自得於㝠㝠之間故虞衡繒網不能為患也虞衡斤斧羅千山工命採砍杙與椽桞宗元行路難深林工翦十取一百牛連鞅摧䨇轅上白孔六帖卷五
