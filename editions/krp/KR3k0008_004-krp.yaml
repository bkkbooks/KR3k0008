body:
  text: 白孔六帖卷四唐白居易原夲宋孔傳續撰嵗陽一嵗名二月陽三寒四熱五隂陽六元日七人日八正月十五九晦日十社日十一中和節十二寒食十三三月三十四五月五十五伏日十六七月七十七七月十五十八九月九十九嵗除二十閏月二十一臘二十二嵗陽一白太嵗爾雅云在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰彊在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥黙在癸曰昭陽嵗名二白太嵗爾雅云在寅曰攝提格在夘曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰茂在亥曰大淵獻在子曰困敦在丑曰赤奮若月陽三白月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極寒四白謀時寒若洪範休徵急恒寒若咎徴冬祁寒小民怨嗟沍寒嚴氣升北戸墐扉寒往則暑來祭司寒孟冬地始坼嚴凝之氣天地嚴凝之氣始於西南而盛於西北此天地之義氣寒氣惣至人力不堪其皆入室水澤腹堅室處嗟我婦子曰為改嵗入此室處言寒也火見而清風戒寒國語冬日之陽萬物歸之言煖也在隂時則慘上牽於天薄寒之中人楚辭師人多寒撫勉之三軍之士如挾纊大寒之日鴈北鄉雞始乳嵗寒然後知松栢之後凋冰厚六尺晁錯曰狐貉之地積隂之處木皮三寸氷厚六尺墯指漠北苦寒之野墯指者十有六七皸瘃士卒皸瘃凌競甘泉賦曰馳閶闔入凌競凌競寒凉處也慘凛下隂潜而慘凛堯崩年異苑曰晉太康二年南州人見二鶴語曰今兹寒不减堯崩年綈袍須賈謂范叔寒如此與之綈袍無衣無褐何以卒嵗淒其以風寒也禋于六宗孔安國曰四時也寒暑也日也月也星辰也水旱也一寒易曰日月運行一寒一暑雨雪其雱詩觱發風寒也栗烈寒氣也凍者荘子夫凍者假衣於春耐家食水者善㳺而耐寒不暖戎馬栗不暖冰漿軍士冰為漿火無光朱火青無光蘭膏坐自凝燈也重衾無暖氣挾纊如懐冰巢巢居知風寒激泠文晨風淒以激泠夕雪暠以掩路凝涸文子轍含氷以滅軌氷漸軸以凝涸行積氷之皚皚文鳥失條鳥登木而失條文兼衣文子御狐貉之兼衣襲狐貉之暖者不憂至寒之悽愴文子苦寒行魏武苦寒行曰人馬同時飢擔嚢行取薪斧氷持作糜糜粥也墯指漢髙祖從晉陽連戰乗勝逐北婁煩㑹大寒士卒墯指十有二三凍死漢王莽鑄威斗日大寒人馬凍死毒害漢竇武上表曰今日大寒過節毒害鳥獸城旁竹栢皆為傷死桐不華周書清明日桐不華則嵗有寒黄竹詩穆天子傳雨雪有凍死人天子作黄竹詩以愍之涉水戰國田單解裘衣渉水老人也鑿池吕氏春秋衛靈公寒鑿池王孫賈奏曰君衣狐裘而坐熊席四陬有火民衣穿不補履缺不苴君不寒民寒矣公善之吹律劉向别録燕地寒谷不生五榖鄒子吹律召温風至人名黍谷凍入地廣雅北方地苦寒氷厚一尺凍入地一丈稜稜霜氣䔩䔩風威孔肌革慘懔毛髮蕭條栁宗元貶永州司馬雅善蕭俛貽書曰忽遇圵風晨起薄寒中體肌革慘懔毛髮蕭條連紙禠書為裳褕史思明傳東都再更亂時方烈寒人皆連紙禠書為裳䄖烏質勒死郭元振為安西大都䕶西突厥酋烏質勒部落盛彊欵塞願和元振即牙帳與計事㑹大雨雪元振立不動至乆凍冽烏質勒已老數拜伏不勝寒㑹罷即死裂膚凉州都督楊敬述使官屬盧公等勒兵討突厥㑹大寒裂膚士卒不能張弓矢乃敗引避錢徽拜左丞㑹宣墨麻羣臣在庭方大寒稍稍引避徽素恭謹不去立乆而仆嵗苦寒李石傳文宗時大臣新族死嵗苦寒外情不安却寒簾杜陽編同昌公主堂中設却寒簾類玳瑁班有紫色云却寒鳥骨所為也肌膚生鱗甲衣被如刀鎌韓愈苦寒歌虎豹僵中穴蛟螭死幽潜同上六龍冰脱髯熒惑喪纒次侵爐不覺暖熾炭屢以添探湯無所益何况纊與縑同上蠻夷長老怨苦寒崑崙天關凍應折同上苦寒拂霧盡成霰着水復成冰韋應物詠寒楚江巫峽冰入懐杜甫前苦寒楚江巫峽氷入懐虎豹哀號又堪記漢時長安雪一丈牛馬毛寒縮如蝟上哀哀歌苦寒李白冬夜哀哀歌苦寒鬱鬱獨惆悵硯寒金井水簷動玉壺冰杜甫詩㳺揚日已西肅穆寒初至李後主填忩塞戸謹勿出韓愈苦寒歌填忩塞户謹勿出暄風暖景明年日黒帝歸寒而激昂杜甫享大廟賦辟寒香唐杜陽編同昌公主七寳步輦綴五色玉香囊貯辟寒香氣寒鼻莫齅血凍指不拈韓愈苦寒熱五白夏暑雨夏日之隂萬物歸之言凉也暑往則寒來夏日之日可畏當暑袗絺綌癉暑詩曰我心癉暑藴隆蟲蟲旱熱之氣炎風畏景火雲赫日流金爍石徂暑六月炎炎滌滌並旱熱氣云我無所言無所庇身如惔如焚惔燎也言熱如火燒憂心如熏熏灼爛雲漢之章言旱熱煎沙爛石成湯旱七年如此大暑溽暑六月土潤溽暑暍者荘子曰暍者反凍於冷風不熱抱朴子曰或問不熱之道答曰立夏或服𤣥氷九飛雪㪚六壬六甲之符交扇世説郗嘉賔三伏日詣謝公當風交扇猶霑汗謝着故衫而食熱粥郗曰非公㡬不堪此風雲鬱其如火天地赫以為爐時燠恒燠禋于六宗見寒門注袁紹河朔飲毎至夏大飲云以避一時之暑故號河朔飲夀麻之國爰有大暑不可以往山海經云耘管子曰善為國者使寒耕而熱耘祝融淮南子曰南方之極自北方之界主炎風之野赤帝祝融之所司神異經北方層氷之下土中有鼷鼠食氷草木肉重萬斤可作脯食熱見鼠門暑有暍京房易飛候曰有雲如大車盖十餘此陽水之氣必暑有暍者身熱阪漢書西域傳曰罽賔道歴大小頭痛之山赤土身熱阪令人身熱無色頭痛嘔逆吐忍暑孔三月苦熱獨孤及䟽曰三月苦熱錯繆顛倒沴孰大焉熱風觸人西域大流沙多熱風觸人及六畜皆迷仆土熱多雨牂柯無城郭土熱多霖雨稻粟再熟暑濕暴露兵氣熏蒸白居易王承宗叛詔吐突承璀出討兵老不决居易上言今暑濕暴露兵氣熏蒸雖不顧死孰堪其苦不勝其熱五代郭崇韜荘宗患宫中暑濕不可居思得髙樓避暑乃使人問崇韜曰昔吾與梁對壘河上雖祁寒盛暑被甲跨馬不以為勞今居深宫䕃廣厦不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意艱難逸豫為慮不同勢自然也願陛下無忘創業之難常如河上則可使煩暑坐變清凉荘宗黙然人皆苦炎熱栁公權與文宗聨句帝曰人皆苦炎熱我愛夏日長歘翕炎蒸景杜甫熱詩探湯汲隂井煬竈開重扉栁宗元苦熱詩大水淼茫炎海接竒峰硉兀火雲昇杜甫多病熱詩如坐深甑遭蒸炊自從五月困濕著如坐深甑遭蒸炊韓愈鄭羣贈簟龍沉牛喘納凉聨句龍沉劇煮鱗牛喘甚焚角單絺厭已禠長䈉倦還捉辟暑犀杜陽編文宗延學士講易賜辟暑犀暑氣多殘酉陽雜爼逭暑天后逭暑三陽宫訖秋未還銅井炎罏敲九天赫如鑄鼎荆山前李白答杜秀才陶公攫爍呵赤電囘禄睢盱揚紫煙同上赤脚踏層冰南望青松架短壑安得赤脚踏層氷杜甫早秋苦熱詩汗踰水漿翻南方六七月出入異中原老少多暍死汗踰水漿翻貽華陽栁少府乗陵炎雲呼吸温風景熾氣燠往即南方乗陵炎雲呼吸温風栁宗元送苑論序炖堪輿為甗𨫼兮爇雲漢而成霞觧宗賦水國鬱蒸六月南方吹白沙吴牛喘月氣成霞水國鬱蒸不可處時炎道逺行無車送蕭十一暑火烘房千里竹室記方大暑火烘爆雷赤壤若堅于罏若燎于原舌呀而不能持支墜而不自運如列千萬炬于室内同上赫赫熖熖如列千萬炬于室内冷虵段成式酉陽雜爼明皇以申王畏暑賜之冷蛇色白而不傷人如冷雪玩之不復有煩熱也澄水帛唐寳藏庫中有澄水帛亦自外國貢以水蘸之則寒氣蕭瑟暑月辟熱則一堂寒思挾纊細而似布明薄可鑒云上得龍涎故消暑毒也杜陽編乗小駟木隂下注見前卷六月隆熱韓文蔗漿歸㕑金椀凍杜詩執熱乃沸鼎同上大雨執熱乃沸鼎纎絺成緼袍乞為寒水玉杜甫熱詩乞為寒水玉願作冷秋菰想見隂宫雪風門颯沓開同上炎赫衣流汗炎赫衣流汗低垂氣不蘇同上嬾揺白羽李白夏日詩嬾揺白羽扇裸袒青林中脱巾掛石壁露頂灑松風迎凉草注見前卷隂陽六望氣附白立天之道曰隂與陽一隂一陽之謂道五月隂陽交死生分月令冬夏不争隂陽之和三合穀梁傳云獨隂不生獨陽不生獨天不生三合然後得生之萬物負隂而抱陽冲氣以為和老子隂陽家流出於羲和之官敬授人時拘者為之則牽於禁忌泥於小數徳刑董仲舒曰陽為徳出居大夏生育長飬隂為刑居大冬積於空虚不用之地以此見天之任徳不任刑隂不堪陽愆陽冬暖伏隂夏寒為炭文選隂陽為炭萬物為銅相得禮云隂陽相得望氣保章氏以十二嵗之相觀天下妖祥以五雲物辨吉凶水旱豐荒之祲祥以十二風察天地之和命乖别之妖祥十二辰皆有風吹其律以知和否眡祲掌十煇之法以觀妖祥一祲祲隂陽氣相侵二象象如赤鳥三鐫鐫日旁氣四監臨日五闇日月食六瞢日月瞢瞢無光七彌白虹彌天八叙雲有次敘如山川在日上九隮隮升氣虹也十想輝光新垣平以望氣見漢文時孔天地莫大於隂陽陳子昂上言天地莫大於隂陽萬物莫靈於人主政莫先於安人故人安則隂陽和隂陽和則天地平乖行又夏商之衰桀紂昏暴隂陽乖行治隂陽又昔黄帝合宫有虞總章堯衢室夏世室皆所以調元氣治隂陽也通隂陽韋顗通隂陽愆候張廷珪開元初上疏頃隂陽愆候五榖失稔關輔尤劇陽而阜生隂而肅殺劉禹錫天論瀆即為災杜景佺隂陽不相奪倫瀆即為災草木黄落而復華瀆隂陽也同上隂陽相主客杜甫七月三日隂陽相主客時序遞囬斡隂陽割昏曉望嶽詩混混沌沌隂陽之夲楊炯渾天賦漢儒以月令措諸禮其言有十二月七十有二候迎步氣以追寒暑之序類其物宜而逆為之備栁宗元時令論司天司地楊炯渾天賦昔顓頊之命重黎司天而司地陶唐之分仲叔宅西而宅東其後宋有子韋鄭有禆竈魏有石氏齊有甘公唐都之推星王朔之候氣周文之視日吴範之占風有以見天地之情状識隂陽之變通元日七白正月朔旦月正元日書春王三朝夏正三朝履端於始嵗惟更始四序資始正朝元日朔三元嵗之元日之元時之元元正首祚開元納祐獻嵗發春開甲子於新厯發風光於上春七十二候之初三百六旬之始進酒崔寔月令曰正月一日是謂正日絜祀祖襧進酒降神椒酒董勛答曰開嵗首祝椒酒以飲之索葦荆楚嵗時記曰正月一日懸葦索於戸鬼惡之爆竹荆楚嵗時記曰山臊惡鬼犯人則病惡爆竹之聲桃梗磔雞𤣥羊宋書舊時嵗朔縣官殺羊設葦絞桃梗磔雞於門以禳惡氣放鳩孔叢子曰邯鄲人以正朝獻鳩於簡子簡子大愧厚賞之曰正旦放生恩也得賞競捕之不如勿賞也五辛盤風土記正月元日食五辛練形注云辛菜所以助發五藏也荘子曰春月飲酒茹葱以通五藏仙木造桃板著戸謂之仙木象鬰壘山桃百鬼所畏稱觴崔寔月令云元日進酒降神異室家尊卑次列於先祖之前各上椒酒於家長稱觴舉夀欣欣如也重席東觀漢記戴慿為侍中正旦朝帝命羣臣説經不通輙奪其席慿乃獨坐三十席獻椒花之頌劉臻妻元日獻椒花頌稱栢葉之觴嵗日進栢酒嵗除吕氏春秋注曰前嵗一日擊鼓駈疫癘之鬼謂之逐除亦曰儺宿嵗荆楚記嵗暮家家具肴蔌為嵗之儲放鳩地理志滎陽有兎井沛公避項羽雙鳩集井上故漢世正旦放鳩雕胡米揚州雕胡米一斗供正旦進御端月玉燭寶典云元日端月爆竹以辟山臊見上又神異經云山臊者在西方深山中長丈餘犯人則病畏爆竹聲進椒栢酒崔寔月令曰正日進椒酒栢酒是玉衡之精服之令人却老栢亦是仙藥又云進酒次第從少年者至老首祚王羲之月儀書曰日往月來元正首祚太簇吉辰㣲陽始布罄無不宜和神飬素帖畫雞於戸上挿符於其傍而百鬼畏荆楚嵗時記孔大饗含元盧鈞帝元日大饗含元殿鈞年八十升降如儀輸貢請元日陳於廷吴少陽傳元濟誅是嵗蔡州始輸貢物戸部以其乆不至請元旦陳於廷李晟正嵗崔氏女歸寧讓曰爾有家而姑在堂婦當治酒食以待賔客即郤之不得進春城廻北斗杜甫元日詩春城廻北斗郢樹發南枝燕粉荔枝金門嵗節曰洛陽人家正旦造絲雞蠟燕粉荔枝初見宗祖正月元日初見宗祖韓愈元和聖徳詩元日陳貢篚集於考堂栁晃傳聖唐稽古天下朝集三考一見皆以十月上計京師禮見㑹尚書省應考績事元日陳貢篚集於考堂唱其考第進賢以興善簡不肖以黜惡故嵗去超忽韋蘇州寄諸弟新正加我年故嵗去超忽嵗朔李周翰文選注元日嵗朔也火城國史補宰相禮絶班行元日百官已集而宰相方至珂􅏛列燭多至數百炬謂之火城絲光催栁色日彩泛槐烟虞世南讌宫臣詩賦詩猶落筆杜甫元日示宗武賦詩猶落筆獻夀又稱觴條風開獻節唐太宗正月臨朝詩條風開獻節灰律動初陽御樓御殿唐輦下嵗時記元日御樓御殿發號施令慶賜遂行飲酒相邀法苑珠林唐長安人風俗毎至嵗元日已後遞飲酒相邀迎謂之傳坐川谷風景温城池草木發韋應物分二朋卜嵗善惡西域寧逺毎元日王及首領判二朋朋出一人被甲闘衆以瓦石相之有死者止以卜嵗善惡禮部郎中元正一日陳設於太極殿皇帝衮冕臨軒展宫縣之樂陳歴代寳玉與輅偹黄麾仗二王後百官朝集使皇親諸王並朝服陪位皇太子獻夀次上公次中書令奏諸州表黄門侍郎奏祥瑞户部尚書奏諸州貢獻禮部尚書奏諸蕃貢獻太史令奏雲物侍中奉禮畢然後中書令又與供奉官獻夀殿上皆呼萬嵗出唐六典人日八白七日為人董勛問禮俗曰正月一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人則正旦畫雞於門七日鏤人於上良為此也菜羮金勝嵗時記人日以七種菜為羮剪綵為花勝以相遺或鏤金薄為人勝以象瑞圖之形梅花粧武帝夀陽公主人日梅花落額上成五色後人效為梅花粧銘魏東平王倉是日登夀張縣安民山銘曰正月七日厥日惟人此出郭緣生述征記稽董勛之問俗時則罔愆見上注考陳氏之見儀事乃不忒劉臻妻陳氏進見儀曰正月七日上人日人日荆楚嵗時記云正月七日為人日鏤人帖屏風上亦戴之頭鬢董勛問禮俗云人入新年容改従新孔初正候纔兆涉七氣已弄靄靄野陽浮暉暉水披凍聖朝身不廢佳節古所用韓愈人日城南登髙詩鄭公歸唐劉餗傳記鄭公嘗出行以正月七日謁見太宗勞之曰今日卿至可謂人日隂杜甫云元日到人日未有不隂時氷雪鸎難至春寒花較遲清輝閣景龍文舘記三年七日上御清輝閣令學士賦詩盃中栢葉休隨酒勝裏金光巧耐寒杜甫劍佩衝星聊暫㧞匣琴流水自湏彈鏤金作勝傳荆俗剪綵為人起晉風李商隠人日即事中宗景龍四年正月七日宴大明殿賜王公以下綵勝景龍文舘記盤蔬冬春雜罇酒清濁共韓愈人日詩淚灑行間杜甫撿書帙中得故髙常侍人日在蜀州寄詩淚灑行間自蒙蜀中人日作不意清詩乆零落上青韶既肇人為日景龍文舘記人日詩升髙綴綵人行慶傳芳蟻升髙綴綵人同上膳部有節日食料謂正月七日煎餅唐六典注正月十五九白作膏祠門玉燭寳典曰正月十五日作膏祠門戸祭門見上紫姑卜荆楚嵗時記今州里風俗望日祭門先以栁枝挿門隨枝所指乃以酒脯飲食及豆粥祭之齊諧記曰月半昔吴縣王成家夜一人立宅東南角謂成曰此地是君蠶室我即地神明日月半宜作白粥泛膏於上以祭我必當令君蠶桑百倍神言訖失所在如其言年年大得蠶或云神降陳氏之家云蠶神也劉敬叔異苑曰其夕迎紫姑神以卜云夲人家妾為大婦所妬以其日感激而死故代人至日作其形迎於厠云子胥不在曹夫已行小姑可出子胥壻曹夫姑也祀太一史記樂書曰漢家祀太一昏時祀到明月望上元正月十五日為上元陁國之㑹西域記摩瑞陁國正月十五日僧徒俗衆集觀佛舍利放光雨花三五之夕三五良辰秉燭之遊行樂月惟中氣日則上元試鼓禰衡被魏武謫為鼓吏正月半試鼓衡揚桴作漁陽操淵淵有金石聲也孔燃百千燈嚴挺之睿宗好音律先天二年正月望夜胡人婆陀請燃百千燈因弛門禁挺之上䟽諫帝御咸泰殿大燃燈作樂穆宗皇后蕭氏文宗立上尊號皇太后開成中正月望夜帝御咸泰殿大燃燈作樂迎三宫太后奉觴進夀禮如家人華清宫陳元禮後在華清宫正月望夜帝将出逰復諫曰宫外曠野無備豫陛下必出逰願歸城闕帝不能奪幸其第賚賜不貲韋安石為侍中中宗與韋后以正月望夜幸其第賚賜不貲探官唐開元遺事都城上元造麫璽以官位髙下帖之璽中探之天樞廵使影燈記梁鄴上元後忽髮變如血卜曰元夜食牛肺犯天樞廵使夜行禱謝可免百枝燈樹韓國夫人置百枝燈樹上元夜燃之開寶遺事千炬燭圍楊國忠子弟上元夜各有千炬燭圍出宫女歌舞唐輦下嵗時記先天初上御安福門觀燈太常作歌樂出宫女歌舞朝士能文者為踏歌聲調入雲縱宫女出逰正月望夜中宗與后㣲服過市彷徉觀覽縱宫女出遊鞭梃讙兢𤣥宗貴妃楊氏奴天寶十載正月望夜妃家與廣寧王僮騎相争鞭梃讙兢王墮馬僅得去王見帝泣乃詔殺楊氏奴大陳影燈唐鄭處誨明皇雜録曰上在東都遇正月望夜移仗上陽宫大陳影燈設庭燎自禁中至于殿庭皆設蠟炬連屬不絶時有匠毛順巧思結創繒綵為燈樓三十間髙一百五十尺懸珠玉金銀㣲風一至鏘然成韵乃以燈為龍鳯虎豹騰躍之状似非人力火蛾兒金門事節曰正月十五造火蛾兒食玉臨光宴影燈記曰正月十五夜元宗於長春殿臨光宴芊郎君洛陽人家上元以影燈多者為上其相勝之詞曰千影萬影又各家造芊郎君食之逰凉州明皇雜録正月望夜上與葉法善逰西凉州燭燈十數里俄頃還而樓下之歌舞未終逰廣陵開元十八年正月望夕帝謂葉仙師曰四方之盛陳乎此夕何處極麗對曰天下無踰於廣陵帝曰何術一觀之師曰侍御皆可俄而虹橋起於殿前板閣架虚欄楯若畫師奏橋成但無廻顧於是帝步而上太真髙力士及樂官數十人從行步步漸髙直造雲中俄頃已到廣陵寺觀陳設之盛燈火之光照灼基殿士女華麗皆仰望曰仙人現於五色雲中帝大悦師曰請勑伶官奏霓裳羽衣一曲後可驗矣後數旬廣陵奏曰正月十五二更仙人乗綵雲自西來臨孝感寺髙數十丈又奏霓裳羽衣一曲終西去初元朝禮之晨而慶雲現小臣踐修之地而仙樂陳上覽表大悦方信仙師之不妄也幽怪録晦日十白孟春晦日月晦酺聚飲食荆楚嵗時記云元日至月晦並酺聚飲食也湔掌酹酒玉燭寶典曰元日至晦日人並酺食士女悉湔掌酹酒於水湄又臨河以度厄階蓂彫堯階蓂莢月桂盡謂月晦也陣不違晦以犯天忌戰陣避月晦提月公羊傳提月六鶂退飛提月者何近建月是晦日也何休注提月邉也魯人語此是月之㡬盡也當蓂盡之辰為節荆楚嵗時記曰毎月皆有弦望以正月為初年時俗重之以為節孔晦日之朝猶朔日之夕厯志若合於子正則晦日之朝猶朔日之夕也是以月皆不見若合於午正則晦日之晨猶朔之昏也是以月或皆見之矣春氣漸和柔杜甫晦日詩起行視天宇春氣漸和柔泛舟杜甫陪王使君晦日泛舟晦日更禁愁假日無公事白公春寝是時正月晦假日無公事擇勝地追賞貞元元年九月二日勑今方隅無事烝庶小康其正月晦日三月三日九月九日宜任文武百僚擇勝地追賞為樂出南部新書仍各賜錢以充宴㑹同上晦賞念前嵗京國結良儔韋應物月晦詩晦日膏糜唐六典膳部有節日食料注晦日膏糜罩雲朝葢上唐太宗月晦詩罩雲朝蓋上穿露曉珠呈社十一白漢髙祖天下定詔御史令治榆社春羊彘祠之荆楚記四人並結綜㑹社句龍共工氏有子曰句龍能平水土故祀以為社擇元日月令擇元日命人社為社稷春事興故祭之以祈農元日謂近春分前後戊日元吉也白社孔春秋二社張文琮出為建州刺史州尚淫祠不立社稷文琮乃下教曰春秋二社夲於農今此州廢不立尚何觀於是始建祠塲賜酺則天長夀元年九月大赦改元改用九月社賜酺社日賜酒餅白居易状社甕爾來嘗杜牧獨酌田翁逼社日邀我嘗春酒杜甫遭田父泥飲遥思里中會韋蘇州社日寄崔都水及諸弟山郡多暇日社時放吏歸春風動髙栁芳園掩夕扉遥思里中㑹心緒悵㣲㣲九農成德業百祀發光輝社日詩社雨報年登韋應物報効神如在馨香舊不違杜甫社日詩社恩思蒸羔韓渥社日記陳平亦分肉太史竟論功杜甫杜日中和節十二白時惟太平日乃初吉作為令節以殷仲春發揮陽和幽贊生植敬授人時仲序中和助發生之徳覃作解之恩助隂陽之交泰表天地之和同當太平之昭代屬初吉之良辰國家授時建節備物陳儀詩二月初吉朔日孔李泌請以二月朔為中和節李泌帝以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古若何而可泌請廢正月晦以二月朔為中和節因賜大臣戚里尺謂之裁度民間以青囊盛百穀𤓰果種相問遺號為獻生子里閭釀宜春酒以祭句芒神祈豐年百官進農書以示務夲帝悦乃著令與上巳九日為三令節中外皆賜緡錢燕㑹賦詩遣使者寵賜戴叔倫遷營管經畧使徳宗嘗賦中和節詩遣使者寵賜中者揆三陽之中和者酌二氣之和於是以八九節六七氣排重陽而杧上巳煦元氣於厚壤則幽蟄蘇而勾萌達噫和風於窮荒則桀鷔化而獷俗淳白居易頌又頌和為大和中為大中以暢中氣以播和風萌芽昆蟲昭蘇有融如斡𤣥化如運神功賜紅牙銀寸尺各一白居易當晝夜平分之時頒度量合同之令同上徳宗置中和節唐輦下嵗時記二月一日為中和徳宗方置此節進鏤牙尺及木畫紫檀尺唐六典中尚署令立中和而視農文粹西都賦寒食十三清明附白荆楚嵗時記去冬至節一百五日即有疾風甚雨謂之寒食魏武之令魏武帝時明罰令曰聞太原至鴈門冬至後一百有五日皆絶火食云介子推且北方沍寒之地老小羸弱将有不堪之患今不得寒食若犯者家長半嵗刑主吏百日刑令長奪一月俸周舉之書後漢周舉遷并州刺史太原舊俗以介子推焚骸一月斷火舉移書於子推廟云寒食一月老小不堪今則三日而已一月寒食見上注三日斷火鄴中記并州俗為介子推斷火餐食乾粥三日餳粥玉燭寶典曰今人研杏人為酪以煑麥粥以餳沃之鬬雞玉燭寶典曰今此節城市尤多鬬雞卵之戲或彫鏤相遺餉蹴踘劉向别録云蹴踘黄帝所造夲兵勢遺麥粥齊魏収遺景元麥粥祭文孫楚祭子推文曰醴酪二盂醴酪大粳米或大麥為也禁火之辰内火傳以出内火注内藏也介子推之遺風魏武帝之舊令火禁周禮司烜司烜司烜氏仲春以木鐸修火禁於國中注謂季春将出其火也清明三月之節日在婁清明為三月節桐始華清明之日鑽燧改火春取榆栁之火以順陽時火氣改火之辰孔禮重拜掃栁宗元貽許孟容書曰近世禮重拜掃今已闕者四年矣每遇寒食則北向長號以首頓地野祭而焚紙錢五代周夲紀後序寒食野祭而焚紙錢則禮樂刑政㡬何其不壊矣寒食假五代王峻請用顔衍陳同代李榖范質為相論請不已語漸不遜日亭午太祖未食峻争不已是日寒食假太祖曰俟假開當為卿行獻毬百官志中尚署寒食獻毬雞毬雷車禮志天寶二年諸陵常以寒食薦餳粥雞毬雷車半仙之戲唐天寳遺事天寳宫中至寒食節競築鞦韆令宫嬪軰笑為宴樂帝嘗呼為半仙之戲都中士民倣而呼之萬花輿金門嵗節曰寒食装萬花輿煑楊花粥繡草宣臺唐酉陽雜爼寒食日賜侍臣帖􅙋毬繡草宣臺寒食上墓禮經無文近代相承寖以成俗明皇詔杏粥榆羮杏粥猶堪食榆羮已可煎佳辰韋蘇州寄諸弟焚火曖佳辰寒食江村路杜甫寒食江村路風花髙下飛汀煙輕冉冉竹日净暉暉御㕑分冷食張籍内宴廊下御㕑分冷食殿前香騎逐飛毬雨中禁火空齋冷韋應物寒食寄弟雨中禁火空齋冷江上流鸎寂寂聽杜陵寒食草青青把酒看花憶諸弟杜陵寒食草青青春栁南陌態冷花寒露姿李賀虛霑焦舉為寒食杜甫詩今朝寒食行野外緑楊匝岸蒲生迸韓文店舎無煙宫樹緑元稹連昌宫詞初過寒食一百六店舍無煙宫樹緑佳辰强飲食猶寒杜甫寒食佳辰强飲食猶寒隠几蕭條帶鶡冠十年蹴踘萬里鞦韆十年蹴踘将雛逺萬里鞦韆習俗同杜甫清明詩花㳺曲李賀寒食日諸王娱㳺賀入座賦花㳺曲與妓彈唱帝自擊毬楊漢外傳㑹寒食宴近臣帝自擊毬為樂節日食料唐六典膳部有節日食料注謂寒食麥粥漢宫傳燭德宗擇知制誥批曰與韓翊時有同姓名者遂具奏後批曰春城無處不飛花寒食東風御栁斜日暮漢宫傳蠟燭青煙散入五侯家與此韓翊夲事集進新綵雞子唐史談皎畫寒食圖一卷唐史藝文志㡬年逢熟食萬里逼清明杜甫熟食日示宗武綵繩拂花去輕毬度閣來韋應物清明寒食好春園百卉開綵繩拂花去輕毬度閣來鬬雞戲上在藩邸樂民間清明節鬬雞戲及即位治雞坊東城父老傳㧞河之戲景龍文舘記清明節命侍臣為㧞河之戯以大麻絙兩頭繫十餘小索毎索數人執之以挽力弱為輸時七宰相二駙馬為東朋三相五将為西朋節及桐華恩頒銀燭韋綬除宣察鄭處誨為判作謝新火状節及桐華恩頒銀燭綬削之曰非不巧但非大臣所宜言進火唐輦下嵗時記長安毎嵗至清明尚食内園官小兒於殿前鑽火先得者進上賜絹三疋椀一口延興門都人並在延興門看人出城洒掃車馬喧閙月燈閣新進士於月燈閣置打毬之宴同上酴醿酒或賜宰臣以下酴醿酒藏煙節過藏煙時當改火白居易状三月三十四白上巳漢書禮儀志曰三月上巳日宫人並禊飲於東流水上宋書曰自魏已後但用三日不用上巳元己辰文選暮春之禊元巳之辰脩禊事王羲之序曰永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之蘭亭脩禊事也群賢畢至少長咸集云云祓禊風俗通曰周禮女巫掌嵗時以祓除疾病禊絜也水上釁絜也溱洧韓詩曰三月桃花水鄭國之俗上巳於溱洧之上執蘭招魂祓除不祥解禊於洛張裴之言竹林七賢論王濟常解祓洛水或問昨宵逰有何語議答曰張華善説史漢裴逸人敘前言往行歴歴可聽禊南澗孫綽義序以暮春之始解禊於南澗之濱㑹東堂晉起居注泰和六年三月三日臨流杯池依東堂小㑹南浮橋夏仲御傳曰仲御詣洛三月三日王公莫不方駕連軫並於南浮橋修禊仲御在船中暴所市之藥危坐不揺晉書云曲水流杯荆楚四民三日為流杯曲水之飲取黍麴菜汁和蜜為米以厭時氣犢車捜神記盧充三月禊水旁見水上有犢車還充兒并贈金捥薤露歌後漢梁商上巳日㑹賔客於洛水酒酣繼以薤露周舉歎之商後果薨八公山宋武帝三月三日登八公山劉安故臺曰城郭如匹帛之繞叢花也周公卜邑於洛羽觴隨波秦王置酒於河金人捧劍續齊諧記云晉武帝問摯虞三日曲水其義何指答云漢章帝時平原徐肇以月初生三女至三日俱死一村以為怪乃相携水邉盥水因流水以濫觴曲水起此帝曰若如所説便非嘉事尚書郎束晳曰摯虞小生不足以知臣請説其始昔成王卜洛邑因流水以泛酒故逸詩曰羽觴隨波又秦昭王三日置酒河曲有金人自泉而出捧水心劍曰令君制有西夏因立為曲水二漢相沿皆為盛集執蘭見上注曲水見上注祓除暮春之禊永和之春癸丑之嵗蘭亭曲洛周禊於曲洛也華林晉朝上巳集宴於華林園也三日沈約宋書曰自魏已後但用三日不復用上巳日東流水宋書漢有郭虞者三月三日上辰産二女上巳日産一女二日産三女並不育俗以為大忌故此月此日諱在家皆祓禊於東流水上孔寒食多與上巳同時李泌帝以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古若何而可泌請廢正月晦著令以上巳為三令節宴曲江張建封元巳宴曲江特命與宰相同榻食集龍門宴集杜甫上巳日徐司録林園宴集薄衣臨積水吹靣受和風錢龍宴粧樓記長安有妓樂者三月三日結錢為龍為簾作錢龍宴細栁圏唐酉陽雜爼三月三日賜侍臣細栁圏言帶之免薑毒擇勝地追賞見晦日注酒食出於野文粹魯令三月宴序以酒食出于野曰禊飲古俗也歐陽詹曲水行韋蘇州暮節看已謝茲晨逾可惜風淡意傷春池寒花歛夕誰當曲水行相思尋舊跡燕太學彈琴韓文上巳燕太學聽彈琴序天子肇置三冬節詔公卿羣有司率厥官屬飲酒以樂司業武公於是總太學儒官三十有六人列燕于祭酒之堂有一儒生抱琴而來宴龍門命賦詩天后上巳日宴從臣於龍門命賦詩翰林志人和氣稔禊於洛濵白居易開成二年三月三日河南尹李待價以人和氣稔将禊於洛濱召留守裴令公等一十五人各宴于舟中由斗亭歴槐堤抵津橋登臨沂㳂自晨及暮簮紱交映歌笑間發前佳賔後樂妓左筆硯右壺觴望之若仙觀者如堵盡風光之趣極流泛之娱美景良辰賞心樂事盡得於斯矣禊飲踏青三月三日天氣新杜甫麗人行三月三日天氣新長安水邉多麗人禊逸禮也鄭風有之葢取諸勾萌發達陽景敷煦握芳蘭臨清川乗和蠲潔用徼介祉厥義存矣蕭穎士逢池禊飲序五月五日十五白端午周處風土記仲夏端午進角黍端始也角黍今之糭子浴蘭大戴禮云五月五日以蘭湯沐浴懸艾荆楚嵗時記曰五月五日荆楚人皆蹋百草採艾為人懸於門戸以禳毒氣朱索續漢書曰五月五日朱索五色為門戸飾以禳除惡氣赤符抱朴子或問避五兵之道以五月五日著赤靈符於心前祭屈續齊諧記曰屈原以五月五日投於汨羅而死楚人哀之至此日以竹筒貯米祭之建武元年長沙人見之自稱三閭大夫曰常苦蛟龍所竊願以五色絲纒之則蛟龍所畏祠陳後漢陳臨為蒼梧太守推誠而理臨徴去後夲郡以五月五日祠東門城外令小童絜服而舞競渡荆楚嵗時記屈原此日投汨羅死後人以舟楫救之遂因而為俗胡廣世説云胡廣夲姓黄以五月五日生惡之甕盛弃江中胡公見收飬為己子曹娥異苑曹娥父盱以五月五日溺水死娥循江號哭七日遂投江三日後與父屍俱出五日良時長命縷辟兵繒見抱朴子菰葉裹粘米以象隂陽相苞裹未分散也風土記云繞臂綵詩曰繞臂雙條達採艾荆楚嵗時記曰宗則文常以五月五日未雞鳴時採艾見似人處擾而取之炙有驗蓄藥又曰是日競採雜藥夏小正云此月蓄藥以蠲除毒氣也鬬百草荆楚記此日四人蹋百草今人又有鬬百草之戲競渡越地傳云起於越王勾踐忌蓋屋曝席薦風俗通云此月葢屋令人頭秃又曰不得曝席薦異苑曰新野庾家嘗於五月五日曝席忽見一小兒於席下俄而失所在因相傳以為忌艾草先生多疾病則艾草先生孔羣臣賜襲衣李元紘傳五月五日宴武成殿羣臣賜襲衣特以紫服金魚賜元紘及蕭嵩異雀鳴集庭樹崔信明青州益都人信明之生五月五日日方中有異雀鳴集庭樹太史良為占曰五月為火火主離離為文日中文之盛也雀五色而鳴此兒将以文顯然雀類㣲位殆不髙耶召見山人李唐肅宗廢后張氏端午日帝召見山人李唐帝方擁幼女顧唐曰我念之無怪也唐曰太上皇今日亦當念陛下帝泫然涕下而内制於后卒不敢謁西宫貢獻食貨志端午四方貢獻至數千萬者加以恩澤而諸道尚侈麗以自媚諸陵薦衣扇禮志天寳二年諸陵常以五月五日薦衣扇射團唐開元遺事宫中端午造粉團角黍貯盤中以小角弓射之中者得食都中盛行此戲維摩詰像鬚劉公嘉話云晉謝靈運美鬚臨刑施為南海祗洹寺維摩詰像鬚寺人寳惜初不虧損中宗朝安樂公主五日鬬百草欲廣其物色令馳驛取之又恐為他人所得因剪弃其餘术羮艾酒金門嵗節曰洛陽人家端午术羮艾酒以花綵樓閣挿鬚贈辟瘟扇梳同上重五竹節金門嵗節曰重五日午時有雨則急斫一竿竹竹節中必有神水瀝取獺肝為丸治心腹積聚病進五時圖酉陽雜俎北朝婦人五月進五時圖五時花施帳之上是日又進長命縷宛轉皆結為人象帶之賀端午裁縫雲霧成御衣拜跪題封賀端午杜甫惜别行朱明啟節御府賜衣栁宗元謝端午衣物金花器綵絲端午賜臣墨詔并衣一副金花器三事綵絲一軸大将衣四副綵絲五軸寵光洊至慶賜曲霑劉禹錫謝端午表夀索端午賜百索為夀索李肇翰林志符天數明皇詩五日符天數𤣥武門逰戲唐舊史萬年縣法曹孫伏伽上表近太常於民間借婦女裙襦以充妓衣擬五月五日𤣥武門逰戲非所以為子孫法也江心鑄鏡揚州進水心鏡參軍李守泰曰五月五日午時於揚子江中鑄之宫衣亦有名端午被恩榮杜甫節日食料唐六典五月五日粽䊦進百索綬帶中尚署伏日十六白三伏隂陽書曰夏至後第三庚初伏第四庚為中伏立秋後初庚為後伏秋夏交㑹之辰金火伏藏之日厯忌釋曰立秋以金代火也金畏火故至庚日必伏庚者金也故曰伏日一時之暑典畧曰劉松袁紹於河朔三伏之際晝夜飲酒至於無知以避一時之暑故河朔間有避暑之飲秦修祠史記秦穆公始為伏祠漢擇日風俗通曰漢中巴蜀髙祖用張良之䇿還定三秦葢君子所因者本論功加金帛重復寵異令擇伏日不同凡俗祠黄石史記留侯既得黄石留侯死并黄石而葬每上冢伏臘祠黄石賜肉漢書曰伏日賜肉東方朔割肉曰伏當早歸即懐肉而去金藏之日秋夏之交初伏史記秦徳公三年初伏注云六月上伏日秦始置亢陽徂暑伏臘之費牧羊沽酪孔伏日寒唐五行志大厯四年六月伏日寒遺冰獸唐開元遺事楊國忠毎至伏日取堅冰命工雕為鳥獸之形飾以金鐶縷帶置雕盤中送遺王公惟張九齡不受金數已三伏劉禹錫詩賜醝汁唐輦下嵗時記伏日賜宰相學士醝汁京尹公主駙馬蜜炒及漿水伏者謂隂氣将起廹於殘陽而未得升故為藏伏因名伏日顔師古驕陽化為霖杜甫詩三伏適已過驕陽化為霖七月七日十七白牛女續齊諧記云桂陽城武丁有仙道忽謂其弟曰七月七日織女當渡河暫詣牽牛吾向已被召代人至今云織女嫁牽牛穿針乞巧荆楚嵗時記七夕婦人以綵縷穿七孔針陳几筵酒脯𤓰果於庭中以乞巧或云見天漢中奕奕白氣有光五色以為徴應見者便拜得福緱山鶴列仙傳王子喬見桓良曰告我家七月七日待我緱山頭至時果乗白鶴於山頭望之不到舉手謝時人數日而去曝腹郝隆七月七日曝腹於庭中人問之曰我曝腹中書犢鼻竹林七賢傳七月七日諸阮庭中鋪陳莫非錦繡阮咸時總角乃以長竿標大布犢鼻裩於庭中曰未能免俗七夕秋期西王母漢武故事七月七日上於承華殿齋正中有一青鳥從西方來集殿前上問東方朔朔曰西王母欲來有頃王母至有二青鳥侍王母傍靈匹靈幄河鼓爾雅曰河鼓謂之牽牛瑞光代𫝊竇后少頭秃不為家人所齒遇七夕人皆看織女獨不許后出乃有神光照室為后之瑞作麴合藥崔寔四人月令云其日作麴合藥丸蜀漆丸曝經書及衣裳七日良辰孔置酒前蜀王建子元膺是月七夕元膺召諸王大臣置酒而集王宗翰樞宻使潘峭翰林學士毛文錫不至元膺怒曰集王不來峭與文錫教之耳蛛絲卜巧唐開元遺事帝與妃子毎至七夕夜在華清宫宴時宫女軰陳𤓰果酒饌列于庭中祈恩於牛女也又各以蜘蛛内之小金合子中至曉開視蛛絲稀宻以為得巧之多少民間亦效焉祈請走兒童杜甫牽牛詩亭亭新粧立龍駕具層空世人亦為爾祈請走兒童乞巧栁宗元乞巧文曰栁子夜歸自外庭有設祠者􅊡餌馨香蔬果交羅挿竹垂緌剖𤓰犬牙且拜且祈怪而問焉女𨽻進曰今兹秋孟七夕天女之孫将嬪於河鼓邀而祠者幸而與之巧驅去蹇拙手目開利組絍縫製将無滯於心焉為是禱也栁子曰吾亦有大拙儻可因是以求去之乃再拜稱臣而進曰臣有大拙智所不化毉所不攻威不能遷寛不能容造明星酒唐金門嵗乞巧使蜘蛛結萬字造明星酒装同心鱠祭杼織染署七月七日祭杼出唐百官志軿車繡幄郭子儀初從軍沙塞間至銀州數十里将宿既夜忽見左右皆有赤光仰視空中軿車繡幄中有一美女坐床垂足自天而下俯視子儀拜祝云今七月七日必是織女降臨願賜長夀富貴女笑曰大富貴亦夀考言訖冉冉昇天猶正視子儀良乆而隠子儀後立功貴盛威望烜赫大厯初鎮河中疾甚三軍憂懼公謂幕賔等曰吾此疾自知未便衰殞因話所遇之事衆稱賀忻悦其後拜尚父年九十餘薨出感遇傳蛛絲小人態曲綴𤓰果中曝衣遍天下曵月揚㣲風牽牛出河西織女處其東萬古一相望七夕誰見同並杜詩九孔針七夕宫人向月以九孔針穿五色綵線天寶遺事王時應七夕李賀詩白露含明月青雲斷絳河杜審言袨服鏘環珮香筵拂綺羅同上天廻兎将落河曠鵲停飛上機罷猶安石橋成不礙查劉禹錫七夕曝衣樓景龍記太液池西有漢武帝曝衣樓常至七月七日宫女出后衣登樓曝之因賦曝衣篇雞跖集鵲辭穿線月花入曝衣樓李賀七夕豈意靈仙偶相忘亦彌年夕衣清露濕晨駕秋風前韋應物七夕斫餅唐六典膳部有節日食料注謂七月七日斫餅七孔金鈿針中尚署七月七日進七孔金鈿針牽郎何在郭翰少有清標乗月卧庭中視空中有人冉冉而下乃一少女明艷絶代曰吾天之織女也上帝賜命逰人間願乞神契乃昇堂共寢柔肌膩體妍艶無比欲曉辭去面粉如故試為拭之乃本質也後夜復來翰戲之曰牽郎何在那敢獨行對曰隂陽變化關渠何事且河漢隔絶無可復知縦復知之不足為慮将至七夕忽不復來數夜方至翰問曰相見樂乎笑曰天上那比人間正以感遇當爾非有它故問曰卿來何遲曰人中五日彼一夕爾忽一夜悽惻流涕曰帝命有程便當永訣以七寳枕留贈騰空而去墨庄冗録七月十五日十八白日在張七月中氣日在張建申斗建申位之中孟秋之望十五日三五良辰中氣見上中元道經云七月十五日中元地官勾捜選衆人分别善惡以其日作𤣥都大獻於王公以世間竒異好妙幡幢寶葢供飬之具精膳飲食獻諸衆聖道士於其日講誦老經十方大聖髙詠靈篇㿻蘭盆㿻蘭盆經云目連以母生餓鬼中佛令作㿻蘭盆至七月十五日以百味五果以盖盆中供飬十方大徳而後母得食目連白佛凡弟子孝順者以應奉盂蘭盆供飬佛言大善後世因之廣為華飾孔宫中造盂蘭王縉傳七月望日宫中造㿻蘭盆綴飾璆琲設髙祖以下七聖位幡節衣冠皆具各以帝號識其幡自禁内分詣道佛祠鐃吹鼓舞犇走相屬是日立仗百官班光順門奉迎導從嵗以為常觀禮空王韓愈直諫表近聞陛下七月十五日幸安國寺觀禮空王以為崇福施信示天下仁心三元日宜令崇元學士講道徳南華等經明皇實録三元日宜令崇元學士講道徳南華等經羣公咸就觀禮歩輦召學士明皇在便殿甚思姚元崇論時務七月十五苦雨不止泥濘盈尺上令待制者擡歩輦召學士來時元崇為翰長中外榮之自古急賢待士帝王未有如此也三元日非供祠不採魚唐史百官志河渠令進㿻蘭盆唐六典中尚署七月十五日進㿻蘭盆九月九日十九白重陽魏文帝書曰嵗往月來怱復九月九日為陽數兩月日並應故曰重陽登髙續齊諧記汝南桓景隨費長房逰學長房謂曰九月九日汝家當有災異急令家人縫絳囊盛茱茰繫臂上登髙飲菊花酒此禍乃消景從其言還家登山夕還見雞犬一時暴死今人九月九日登髙是其事白衣菊酒晉陽秋曰陶潛九月九日無酒宅邉摘菊盈把望見白衣人至乃王宏送酒便飲醉而歸龍山落㡌孟嘉傳曰嘉為桓温參軍九月九日温逰龍山參寮畢集風吹嘉落㡌如厠不覺温令孫盛嘲之嘉亦答之戲馬臺南齊書宋武帝為宋公時在彭城九月九日逰項羽戲馬臺今相承以為舊事佩茱茰西京雜記武帝宫人賈蘭佩茱茰食餌飲菊花酒賜菊魏武帝與鍾繇書曰九月九日草木偏枯而黄菊紛然獨秀今奉一束授衣之月落㡌之辰馬射晉書九月九日馬射或説云秋金之節武習射象立秋之禮孔黄菊歌韋綬罷九月九日帝為黄菊歌顧左右曰安可不示韋綬即遣使持往宴羣臣曲江韋綬為集賢院學士九月九日宴羣臣曲江綬請集賢院學士得别㑹帝一順聽大宴滕王閣王勃九月九日都督大宴滕王閣宿命其壻作序以夸客因出紙筆徧請客莫敢當至勃汎然不辭賜茱茰杜甫九日詩茱茰賜朝士難得一枝來菊蘂浮觴之日唐中宗詔迎凉脯金門嵗節曰洛陽人家重陽作迎凉脯羊肝餅佩癭水符霜風破佳菊嘉節廹吹㡌韓愈薦士九日天氣清登髙無秋雲李白九日登巴陵黄花不掇手戰鼓遥相聞䠎踀東籬下淵明不足羣同上茰房薦馥菊蘂含芬中宗九日登髙序餻酒白公九日登西原移座就菊叢餻酒前羅列楚客凛秋時張曲江九月九日登龍山郡庭常窘東凉野求昭曠楚客凛秋時桓公舊臺上挿茰把菊挿茰登鷲嶺把菊坐蜂臺任百寮追賞貞元勑其九月九日宜任百寮追賞菊花節王維詩四海方無事三秋大有年芍藥和金鼎茱茰挿玳筵無窮菊花節長奉栢梁篇泛菊杜甫秋光近青岑季月當泛菊小驛香醪嫰杜甫九日寄嚴大夫綴席茱茰好浮舟菡蓞衰同上登南山文峰唐尹氏女姿容頗麗性識敏慧不因保母而妙善唱歌因重陽與羣女戲登南山文峰而同軰命之歌乃顰眉緩頰怡然一曲聲達數十里故俗耆舊云尹氏之歌聞于長安江南野史九日出餻袁師徳給事中髙之子九日出餻謂坐客曰某不忍喫請諸公食俛首乆之嘉話録坐看桑落酒來把菊花枝杜甫詩登髙素滻源同上九日詩伊昔黄花酒同上登城伊昔黄花酒如今白髮翁重陽獨酌盃中酒抱病豈登江上臺竹葉於人既無分菊花從此不湏開上相要舊俗非九日明朝是相要舊俗非集諸人追歡筋力異望逺嵗時同同上每恨陶彭澤無錢對菊花如今九日至自覺酒湏賖復愁上因招白衣人笑酌黄花菊李白九日登山我來不得意虛過重陽時題輿何俊發遂結城南期築土按響山俯臨宛水湄胡人呌玉笛越女彈霜絲同上今日雲景好水緑秋山明同上九日詩攜壺酌流霞搴菊汎寒榮同上逺岫對壺觴澄瀾映簮紱炰羔備豐膳蒙鳯調鳴律崔元翰和詩龍沙宴㑹龍沙重九㑹千騎駐旌旗權德輿龍沙宴㑹詩膳部有節日食料注謂九月九日麻葛餻唐六典閏重九作宴賦詩李嶠云閏節開重九景龍文舘記即今蓬鬢改舊日重陽日傳杯不放杯即今蓬鬢改但愧菊花開嵗除二十白日窮于次月窮于紀星回于天數将幾終嵗且更始大儺旁磔以送寒氣驅疫吕氏春秋注云前嵗一日擊鼓驅疫癘之鬼謂之逐除亦曰儺宿嵗荆楚記嵗暮家家具肴蔌為宿嵗之儲日月其除卒嵗送寒迎春三百六旬之盡七十二候之窮孔獻鍾馗擊鬼圖吴越錢俶傳佐卒弟倧以次立嵗除畫工獻鍾馗擊鬼圖上胡進思見之大悟知倧将殺己是夕擁兵廢倧迎俶立之夜宴竇懐貞㑹嵗除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎盍簮喧櫪馬列炬散林鴉杜甫守嵗㸃水盆燈金門嵗節曰洛陽人家除夜則銅刀刻門埋小兒硯㸃水盆燈商陸火裴度除夜嘆老殆曉不寐爐中商陸火凡數添也鍜磨齋僧園逸記都下寺院每用嵗除鍜磨是日作鍜磨齋祭詩賈島常以嵗除取一年所得詩祭以酒曰勞吾精神以是補之出金門嵗節燃䗶炬燎沉檀嵗除日太常卿領官屬樂吏並䕶童侲子千人晚入内至夜於寝殿前儺燃䗶炬燎沉檀熒煌如晝上與親王妃主已下觀之其夕賞賜甚多出南部新書儺翁儺母李綽秦中嵗時記嵗除日儺皆作鬼神状二老人名為儺翁儺母爆竹張説守嵗詩爆竹好驚眠階馥舒梅素盤花卷燭紅唐太宗冰池始泮緑梅枝還飄素韋應物詩望家思獻夀算甲又増年歐陽詹詩閏月二十一白以閏月定四時成嵗堯典周禮閏月詔王居門終月門露寝門也天子居明堂無室位則闔門左扉立於其中閏以正時歸餘於終閏月也數扐歸竒於扐以象閏閏月不告朔非禮也不告閏朔棄時政也何以為民閏月者附月之餘日積分而成於月也餘分説文曰餘分之月五嵗再閏閠三月文元年閏三月非禮歸餘於終事則不悖合在僖公末年積閠匪乖期於積閏氣逐閏移孔告朔張齊賢陜人武后詔羣臣議告朔於明堂齊賢曰穀梁氏稱閏月天子不告朔它月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣正時傳云閏者附月之餘日天子不以告朔非禮也閏以正時時以作事不告閏朔棄時政也王方慶明堂告朔議不可謂正孫樵西齋録紫色閏位不可謂正予懼後世牽以稱臨也盛衰千祀正閠更王文粹賈至虎牢關銘周室㣲弱虎狼并吞盛衰千祀正閏更王十九年七閏𤣥始厯以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未逹也厯志失閏已久哀公十二年冬十有二月螽開元厯推置閏當在十一年春至十二月冬失閏已久斗柄未廻猶帶閏元稹送友封詩臘二十二白虞不臘矣左傳夏曰嘉平殷曰清祀周曰大蜡風俗通漢改為臘伊耆氏始為蜡蜡也者索也嵗十二月合聚萬物而索饗之王者各以其行盛日為祖衰日為臘漢以火徳火衰於戌故戌日為臘魏以土徳土衰於辰故辰日為臘晉以金徳金衰於丑故丑日為臘臘與蜡同諸具祭部蜡門注祠黄石史張良於下邳圯上見老人得書云穀城下黄石我也果見取而寶祠之留侯死并黄石𦵏每上冢伏臘祠黄石報有功漢舊儀曰臘者報鬼神古聖賢有功於民送蔡邕獨㫁曰臘者嵗之終大祭從吏民宴飲非迎氣故但送不迎也王氏臘謝承後漢書曰沛國陳咸為廷尉監至王莽篡位還家杜門莽改易漢法令及臘日咸嘗言我之先祖何知王氏之臘也盗樹陳㽞志曰范喬邑人臘夕盗斫其樹有告喬佯不聞邑人愧而歸之喬曰卿臘日取柴欲與父母相歡娱耳竊食袁崧後漢書曰韓卓字子助陳㽞人臘月奴竊食祭其先人卓義其心即出免之持椒飬生要十二月臘夜令人持椒卧井旁無與人言内椒井中除瘟病兎髕風俗通曰兎髕俗説正祖食得兎髕者名之曰幸賞以寒酒幸者善祥令人吉利議晉博士張亮議曰臘接也祭宜在新故交接也俗謂臘之明日為初嵗秦漢已來有賀此皆古之遺語秦惠文君十二年初臘史記夲紀五孔罷獻狐兎憲宗紀元和九年十一月戊子罷京兆府獻狐兎用周臘則天載初二年臘月己未始用周臘口脂百官志中尚署臘日獻口脂造脂花餤金門嵗節曰洛陽人家臘日造脂花餤山川恣遊矚韋蘇州社臘㑹髙年山川恣遊矚賜臘景龍文舘記三年臘日帝於苑中召近臣賜臘晚自北門入於内殿賜食加口脂臘脂盛以碧鏤牙䇶紅雪白居易有臘日謝白蠟紅雪澡豆等状伏臘蕭炅李林甫所引不知書嘗與嚴挺之言稱烝嘗伏臘乃為伏獵挺之白九齡省中有伏獵侍郎乎侵凌雪色還萱草杜甫臘日侵凌雪色還萱草漏泄春光有栁條又口脂靣藥承恩澤翠管銀罌下九霄進衣香囊唐六典中尚署臘日進衣香囊冬臘日前寅蜡百神於南郊唐六典賜銀合駐顔膏臘日賜銀合子駐顔膏牙香等繡香嚢一枚韓偓未将梅蘂驚愁眼杜甫十二月一日未将梅蘂驚愁眼要取楸花媚逺天上苑花開天授二年臘卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝逰上苑火急報春知花湏連夜發莫待曉風吹於是凌晨名花瑞草皆發羣臣咸服其異焉卓異記時當臘節候屬祈寒白居易状白孔六帖卷四
