body:
  text: 白孔六帖卷四十唐白居易原本宋孔傳續撰政理國政二良吏善政三寛不按吏四清亷五貪濁六公政七吏久從政安人得人心九遺愛十教化十一政理一白政如農功日夜思之如農之有畔其過鮮矣傳政者正也子帥以正孰敢不正寛猛相濟政是以和子曰人道政為大酌人言酌人言以為政人存政舉子曰其人存則其政舉其人亡則其政息庶績咸熈熈和也彞倫攸敘允釐百工釐治也徳惟善政政在養民可以觀政政清吏肅事簡人安為政在人禮記施於有政是亦為政以道化人而人善矣必聞其政政鹵莽荘子曰為政勿鹵莽滋彰老子曰法令滋彰盜賊多有人道敏政容人畜衆稱物平施振民育德臨下以簡安人則惠除其苛虐康濟小民弗剛弗柔厥徳允修茹柔吐剛觀政淑慝旌别淑慝亷善亷能周禮蔽羣吏之治一曰亷善二曰廉能注皆以亷為本宰夫徵百官之令徴召所為修法糾職求民之瘼瘼病也不躬不親權衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐教之以德則民有格心齊之以刑則民有遯心政者蒲蘆言如桑蠱變化齊其政不易其俗食節事時務三政不可不慎務三而已一曰擇人二曰因民三曰從時軌物事舉其中化行於上遺愛子産古之遺愛讒慝黜逺去煩宥善莫不競勸用賢理不肖用貴理賤叔梁云近者恱逺者来貴清浄漢曺參為齊相有盖公好黄老術曰貴清浄人自正參避堂以舍之齊大治也抱公絶私尹翁歸縁飾以儒雅張敞浹遺政者以法令為師能與不能自有資財何可學也薛宣不教子吏事孔澄源陸象先嘗曰天下本無事庸人擾之為煩耳第澄其源何憂不簡耶故所至民吏懷之以清浄聞王公著為河南尹治以清浄聞治民如治家陽城至道州治民如治家宜罰罰之宜賞賞之不以簿書介意率其怠勌原道為之政以率其怠勌韓文政化錯迕失大體坐看傾危受厚恩杜甫石笋行政用踈通合典則入秦行滯務兹一掃柏公鎮䕫子滯務兹一掃園人送𤓰以玩替政以荒去理使繼是者咸有薛君之志桞宗元零陵亭記大者驛聞小者立變太原王公觀察江南西道洪江饒虔吉信撫袁悉屬治所公至之日皆罷行之大者驛聞小者立變春生秋殺陽開隂閉令修於庭户數日之間而人自得於湖山千里之外韓文深於理道趙璟深於理道常言為政之本在於選賢能務節儉薄賦斂正賞刑對揚之際必以此為言乃獻審官六議趙宗儒進太子太傅文宗召訪政理對曰堯舜之化慈儉而已願陛下守之帝納其言出本傳國政二白聖人以神道設教而天下服百姓日用而不知辨物居方神而化之使民宜之允釐百工庶績咸熈制理于未亂二十七年遺九年食故三年耕則餘一年之食三載考績餘三年食進業曰登再登曰平三登曰太平二十七年食然後王徳流洽禮樂成故曰如有王者必世而後仁也四維賈誼曰禮義亷恥是謂四維仁義恩厚人主之芒刃權勢法制人主之斤斧守成尚文遭遇右武天下無宿憂宿久也三代至盛際天接地人跡所至咸賔服厲精更始宣詔令自新也王人在位吉士權蔽元詔孔子稱三代之直道周秦之弊政罔宻文峻姦軌不勝漢興除秦煩苛與人休息孝文恭儉孝景遵業五六十年之間至於移風易俗黎民醇厚宜思夏禹卑宫之意太宗露臺之費後漢楊賜上䟽又明帝時反支日不受章奏帝驚曰民廢農桑逺來詣闕拘以禁忌豈為政之意百姓休和兆民頼之蕭曺以寛厚清浄為天下師校事魏太祖置盧洪趙逵為校事使察羣下髙柔曰非居上信下之旨又逵等以愛憎作威福太祖不聴後逵等以奸利殺之乃謝柔治國如治身列子楚聘詹何問治國之要對以冶身之術王曰治國何如曰未聞身治而國亂也董仲舒曰以貪狼為俗法出奸生如以湯止沸以薪救火上之化下猶泥之在鈞唯甄之所為金之在鎔為冶之所化孔進善人共成政道禇遂良帝曰朕行有三二曰進善人共成政道創業守文房𤣥齡帝常問創業守文孰難𤣥齡曰方時草昧羣雄競逐攻破乃降戰勝乃剋創業則難魏徵曰王者之興必乘衰亂覆昏暴殆天授人與者既得天下則安于驕逸人欲静徭役毒之世方敝裒刻窮之國繇此衰則守文為難帝曰𤣥齡從我定天下冐百死遇一生見創業之難徴與我安天下畏富貴則驕驕則怠怠則亡見守文之不為易然創業之不易既往矣守文之難方與公等謹之政先仁恕姚崇十事曰垂拱以来以峻法䋲下臣願政先仁恕可乎以嚴致平王志愔言為國當以嚴致平嚴者非凝網重罰在人不易犯而防難越也故捨衘䇿以犇踶則王良不能御駻停樂石於膚腠則俞附不能攻疾聖哲之治其應如響魏徵帝嘗嘆曰大亂之後其難治乎徴曰大亂之易治譬飢人之易食也帝曰古不云善人為邦百年然後勝殘去殺耶答曰此不為聖哲論也聖哲之治其應如響朞月而可蓋不其難封徳彛曰不然三代之後澆詭日滋秦任法律漢雜覇道皆欲治不能非能治不欲徵書生好虛論徒亂國家不可聽徵曰五帝三王不易民而教行帝道而帝行王道而王顧所行何如耳黄帝逐蚩尤七十戰而勝其亂因致無為九黎害徳顓頊征之已克而治桀為亂湯放之紂無道武王伐之湯武身及太平若人漸澆詭不復返朴今當為鬼為魅尚安得而化哉徳彛不能對孜孜治道常若不足徵上䟽曰在貞觀初孜孜治道常若不足勤勞庶政顔真卿昔太宗勤勞庶政其司門式曰無門籍者有急奏令監司與仗家引對不得闗礙防壅蔽也為國者如治身李珏帝甞自謂臨天下十四年雖未至治然視今日承平亦希矣珏曰為國者如治身及身康寧調適以自助如恃安而忽則疾生天下當無事思所闕禍亂可至哉稱道無逸篇以勸武宗即位帝新聴政珏數稱道無逸篇以勸問政得失韋澳進學士承旨與蕭寘皆為宣宗禮遇毎兩人直必偕召問政得失王者之道在修己任賢杜黄裳知帝銳於治恐不得其要因推言王者之道在修己任賢而已操執綱領要得其大者至簿書獄訟百吏能否非人主所自任治國司馬承禎帝曰治國若何對曰國猶身也故游心於淡合氣於漢與物自然無容私焉而天下治帝嗟嘆曰廣成之言也不恤國患權徳與兩漢辨亡論且眩小男於膝下官子壻於近郡欵然用家人匹婦為心以身圖安不恤國患化感人心同上帝甞問政之寛猛孰先對曰唐家承隋苛虐以仁厚為先太宗皇帝見明堂圖始禁鞭背列聖所循皆尚徳教故天寳大盗竊發俄而夷滅盖本朝之化感人心之深也謂朝廷有新政魏知古諫金仙玉真觀陛下戡翦凶逆保定大器蒼生顒顒将謂朝廷有新政今風教頹替日益甚夫典章圖史有國者尤急所以考存亡成敗陳諸前而為之戒方天下初定徳棻首發其議而後唐之文物粲然誠知治之本歟令狐徳棻賛良史善政三白撫人以寛除其邪虐以徳和人寛而有制亷能亷善不嚴而治不至嚴而人從化文景時為循吏如河南太守吴公蜀守文翁皆謹身率先居以亷平不至嚴而人從化江都相仲舒内史公孫𢎞倪寛居官可紀也孝宣曰庶人安田里而無歎息與我共此理其唯良二千石乎所居人富王成黄覇朱邑龔遂鄭𢎞召信臣所居人富所去見思生有榮號死見奉祀庻幾徳讓君子也韓延壽推至誠吏人不敢欺黄霸力行教化務在成就安全之其材長於治人也未嘗笞辱人龔遂亷平不苛以愛我百姓為行未嘗笞辱人記籍尹翁歸為東海郡中賢不肖記籍持吏短長何並為潁川名次黄霸郡中姦豪持吏短長從横郡中皆亡去利用省費薛宣字貢君為左馮翊下至財用筆硯皆為設方畧利用而省廢吏人稱之郡中遂清浄也朱博決遣如神朱博嘗為冀州行部吏民數百遮道博使從事明勑告吏民欲言縣丞尉者刺史不察黄綬各自詣郡欲言二千石墨綬屯吏者行部還詣治所寃及言盗賊辭訟各使屬其從事博駐車決遣如神祭祀朱邑字仲卿為桐鄉嗇夫亷平未嘗笞辱人遷大司農将死屬其子曰桐鄉愛我後子孫奉嘗我不如桐鄉人必𦵏我桐鄉也不好立名史直不疑為官唯恐人知其為吏之迹不好立名稱為長者武庫晉杜預字元凱在朝七年損益萬機不可勝數朝廷稱美號曰杜武庫言無不有無弃物晉陶侃為荆州造船竹頭及木屑皆令舉掌之咸所不解後正會積雪始晴地濕以木屑布地及桓温伐蜀人以所貯竹頭作釘装船其綜理微宻如此吏無追捕之苦韓延壽為郡守置正任長不得舍姦人後更無云云制移居之法魏鄭渾文公為京兆以百姓制移居之法使兼復與單輕相伍以發姦勤稼於是人安葬鰥獨黄覇在潁川鰥獨有死無以葬者覇為伐某所木為棺以葬之也孔帝嗟賞曰良吏權懐恩馭人安畢羅為髙宗所寵見帝戲慢不恭懐恩奏事適見之退杖四十帝嗟賞曰良吏也號良二千石蒋儼進蒲州刺史户産充夥訴犴積年不平前刺史踵以罪去儼至發隱禁姦號良二千石政亷平劉徳威厯綿州刺史政號亷平治尚文雅髙智周拜壽州刺史其治尚文雅行部先見諸生質經義及政得失不忍杖罰徐有功為政仁不忍杖罰民服其恩更相約曰犯徐參軍杖者斥之訖代不辱一人不行鞭罰韓思復轉汴州司户仁恕不行鞭罰寛惠韋恒初為碭山令政寛恵吏民愛之天子東廵州縣供帳皆鞭扑趣辦恒不立威而事給為政尚仁恕陸象先為劒南按察使為政尚仁恕司馬韋抱真諫曰公當峻扑罰以示威不然民慢且無畏答曰政在治之而已何必刑法以樹威乎卒不從而蜀化長于撫民崔彦曾長于撫民政績暴著李憲勲閥家子所厯皆以吏能顯政績暴著吏事以文雅絢飾馬植精吏事以文雅絢飾其政清浄不煩不事威刑而治韋抗為永昌令輦轂繁要抗不事威刑而治遷中丞善政致祥尹思貞為青州刺史治州有績蠶至嵗四熟黜陟使路敬潜至部嘆曰是非善政致祥乎表言之有文雅齊抗吏事閑敏有文雅不威而治李勉滑毫節度使令狐彰且死表勉為代從之勉居鎮且八年以舊徳方重不威而治本傳專以慈恵為本袁滋遷華州刺史專以慈惠為本能養民王緯上下愛向吴湊為人彊力儉勤未嘗擾民上下愛向所至有惠愛王質為吏所至有惠愛以仁惠為治殷侑拜義昌節度使以仁惠為治莅凡九州皆有惠愛張萬福以愛利為行張允濟仕隋為武陽令以愛利為行政在養人賈敦實咸亨初為洛州長史亦寛惠人心懷向洛陽令楊徳幹矜酷烈杖殺人以立威敦實喻止曰政在養人傷生過多雖能不足賢也徳幹為衰減不可責文學薛珏入為司農卿是時詔舉堪刺史縣令者且百人延問人間疾苦吏得失取尤通達者什二宰相欲校以文詞珏曰求良吏不可責文學宜以上愛人之本為心也慈父李桐客累為通巴二州刺史治尚清平民呼為慈父姚公美政誰與儔不減昔時陳太邱杜甫陪王侍御登東山詩官得其人民去歎愁就妥安循吏序太宗嘗曰朕思天下事丙夜不安枕永惟治人之本莫重刺史故録姓名於屏風卧興對之得才否状輒䟽之下方以擬廢置又詔内外官五品以上舉任縣令吏良則法平政成不良則王道弛而敗矣同上争以惠利顯開元中又錮廢酷吏懲無良羣臣化之革苛嬈之風争以恵利顯叶氣嘉生薰為太平授受之間雖不能皆善而所得十五故叶氣嘉生薰為太平垂祀三百與漢相埒致之之術非循吏謂何率性所安暗與古合李惠登雖朴素無學術而視人所謂利者行之所謂害者去之云云政清浄居二十年田畒闢户口日增人歌舞之政尚仁恕陸象先為益州都督長史政尚仁恕徙蒲州刺史小吏有罪誡遣之大吏白争以為可杖象先曰人情大抵不相逺謂彼不曉吾言耶必責者當以汝為始大吏慙而退嘗曰天下本無事庸人擾之為煩爾第澄其源何憂不簡邪蒲鞭挂簷枝示耻無撲抶李白詩蠧政除害馬傾巢有歸禽同上寛不按吏四白三公府不按吏丙吉為丞相令三公府不按吏後遂為常不以贓罪鞫人後漢袁安字劭公為河南尹政號嚴明未嘗以贓罪鞫人常稱曰凡仕者髙則望宰相下則希牧守錮人於聖世尹所不忍為聞者皆感激自勵謂吏為師友潁川太守嚴翊以孝行為官謂掾吏為師友有過輒閉閣自責王莽徴翊翊曰吾哀潁川人士我以柔弱徴必以剛猛代云云閉閤不出韓延壽為馮翊行縣至髙陵有兄弟訟者延壽曰是馮翊政教不至乃閉閤不出遣吏作告縣中惶懼所訟田兄弟悔過叩頭謝罪請改行龔遂議曺王生遂字少卿為渤海徴入議曺王生請從功曺白王生嗜酒不可從遂不忍逆適㑹引入王生醉呼曰明府天子若問何以理宜有譲遂從之上笑曰君安得長者之言而道之遂曰議曺王生教臣耳丙吉為相馭吏嘗醉掾訴斥之吉曰以醉飽不過吐丞相車茵耳撫人以寛尚書寛而有制寛則得衆蕭曺以寛厚清浄為天下師不嚴而治未嘗笞辱人見上左寛難子産言不忍猛而寛濟猛仲尼曰寛以濟猛猛以濟寛政是以和黄老汲黯長孺為東海守學黄老之言清浄治人責大指不苛細卧治淮隂蒲鞭劉寛宇文饒吏人有過以蒲鞭罰之以示辱也盗進藥鍾離意子阿為瑕丘令吏檀建者竊盗意遣長休其父令建進藥死不殺盗免官曺褒叔通為圉令他界盗入境吏捕得褒不殺之太守馬嚴奏褒軟弱免官清譚王衍夷甫為元城令終日清譚而縣務理孔縱吏侵漁韋湊徙河南尹會洛陽主簿王鈞以賕抵死詔曰兩臺御史河南縱吏侵漁春秋重責帥其出湊曺州刺史政寛簡髙適政寛簡所涖人便之政目簡省盧𢎞宣性寛厚正目簡省人便安之不忍按許圉師為相州刺史以寛治部有受賕者圉師不忍按其人自愧後修飾更為亷士以寛厚和易為治裴諝以寛厚和易為治不鞫人以贓清亷五白身中清勵飲氷之節志懷霜雪行因儉著名以清聞守氷壺之潔人且知畏甘塵甑之貧財無苟得不貪為寳子罕辭玉苦節清規能潔其身不慙於己絜己以進律人弃珠上以交趾太守贓賜羣臣尚書鍾離意得珠玉委地不拜曰孔子忍渇於盗泉此贓穢之寳誠不敢拜上曰清哉尚書乃更以錢賜之珠還合浦孟嘗為合浦守清白政行先去珠悉還也寧亷絜正直以自清兮誰知吾之貞亷楚詞云壺飱從傳趙衰以壺飱從餒而不食言其亷直不忘君也不受枯魚公儀休相魯不受枯魚恐得罪無人遺魚亷善亷能周禮太宰以聴官府之六計蔽羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷法六曰亷辨皆以亷為本拔園葵公儀休相魯焚織機㧞園葵嘆曰欲令農夫工女安所售其藝乎不欲與人争利也不受官屬送遺漢歐陽地餘為少府戒子曰我死官屬即送遺汝慎勿受心如水哀帝謂鄭崇曰君門如市何以禁切人主對曰臣門如市臣心如水妻子不入官舍何並為潁川又羊續妻耒閉門不納子自戍盖寛饒次公為司𨽻校尉子徒歩自戍北邊自斬芻後漢第五倫為會稽太守躬自斬芻養馬妻執爨論曰君子侈不僣上儉不偪下豈尊臨千里而與牧圉等庸平未可言中道也布被蓋尸洛陽令董宣卒官詔遣使者臨視唯見布被盖尸妻子對哭大麥數斛車一乗帝傷之清白遺子孫楊震位髙子孫蔬食歩行故舊長者勸開産震曰使後世稱為清白吏子孫以此遺之不亦厚乎身處脂膏不能自潤後漢孔奮為姑臧長清儉人或譏之曰奮身處脂膏不能自潤瓦器王良為司徒司直妻子不入官舍布被瓦器折轅車張堪去職乗折轅車布被嚢席羊皮李恂叔英為兖州以清約率下席羊皮中病汲黯曰公孫𢎞位在三公俸禄甚多然布被似詐𢎞曰誠中𢎞病也遷徙不過橐衣王吉世名清亷好車馬衣服鮮明而遷徙去處不過橐衣天下服其亷而恠其奢故世傳王陽能作黄金也畏人知胡質為徐州子威自京師歸省驅驢毎舍於驢取樵見父十餘日告歸父賜絹一匹威跪曰大人清亷安得此絹質曰吾俸禄之餘後威為徐州晉武帝問卿清何如父清對曰臣不如父父清畏人知臣清畏人不知披絮吴隱之為中丞冬月無被嘗澣衣乃披絮為太常以蓬為屏風坐無氈席遺絲袁毅多違公例嘗遺山濤絲百斤濤不欲異於時受之毅事露凡受賂皆見推驗取絲付吏積年塵埃并封印並如初也懸魚羊續為廬江丞有獻生魚者續懸魚於庭後又獻之乃出所懸者魚示之杜其意也妻妾布裙吴蒋欽字公奕以戰功遷盪寇將軍權嘗入其堂内丹練帳繡被妻妾布裙權歎其在貴守約即勑御厨為母作錦被改為幔幃妻妾衣服飲馬投錢三輔決録安陵清者有項仲山飲馬渭水毎投三錢郝亷亦然宿樹下魏孟康字公休為𢎞農太守清已平賦時有按行皆預勑督郵不遣迎送探候又不欲煩吏人卒行各持一䥥所在自刈馬草不止傳舍露宿樹下妾不衣帛馬不食粟左傳季文子卒宰庀家備𦵏無衣帛之妾食粟之馬君子曰相三君矣而無私積司謂不忠乎留犢時苖為壽春牛生犢去日留之酌泉吴隱之為廣州酌貪泉賦詩曰試使夷齊飲終當不易心載土洪規罷㑹稽無資不欲令人知其清乃以數舩載黄土而歸又何亷也東方朔曰亷隅清白立身惟賢所尚貞亷勵俗雖矯何傷當官而行絜己以進儒有委之以貨財見利不虧其義稱其貞白常聞於古人告以矯誣今見夫惑者砥礪清白素風冠冕榮身氷霜絜己清徳素誠不受金馬使馬如羊不入廐使金如粟不入懐張奐為屬國都尉烏布帳謝尚仁祖為江夏令相府以布四十疋為尚造烏布帳尚壊之以為軍士𥜗袴楊秉三不惑酒色財也為兖豫州刺史計日受俸四知楊震遷荆州過昌邑所舉茂才王宻為昌邑令懐金遺震曰暮夜無知者震曰天知地知子知我知何謂無人知宻慙而退怒卒遺其子果後漢張磐事具橋門注孔故吏歸縑不受郝處俊甫十嵗而孤故吏歸千縑賵之已能譲不受代還乗止一馬朱敬則為廬州刺史代還無淮南一物所乗止一馬送車二乗陸長源清白自將為汝州刺史汝州送車二乘曰祖罷魏州有車一乘而圖書半之吾愧不及先人云襆被自將蘇瓌轉揚州大都督府長史州據都會多名珍恠産前長史貲取巨萬瓌單身襆被自将以清節進宋申錫以清節進疾要位者納賕餉敗風俗故自為近臣凡四方賄謝一不受既被罪有司驗劾悉得所還問遺書朝野為咨閔吏咨其清韋正貫擢嶺南節度使南海舶賈始至大帥必取犀象明珠上珍而售以下正貫既至無所取吏咨其清本傳重矯激崔戎為華州刺史吏以故事置錢萬緡為刺史私用戎不取及去召吏曰籍所置錢饗軍吾重矯激以夸後人也亷勁辛讜初事李嶧主錢穀性亷勁遇事不處文法皆與之合導待不過三人何易于遷羅江令刺史裴休嘗至其邑導待不過三人亷約盖資性云衣垢弊居一室蕭復衡子生戚里婣從豪汰以服御輿馬相夸復常衣垢弊居一室學自力非名士夙儒不與游以清操顯本傳搜家人所蓄犀珍投江中李勉拜嶺南節度使西南夷舶嵗至纔四五譏視苛謹勉既亷潔又不暴征明年至者乃四十餘柁居官久未嘗抆飾器用車服後召歸至石門盡搜家人所蓄犀珍投江中奉身之具止一布囊盧懐慎清儉不營産服器無金玉文綺之飾雖貴而妻子猶飢寒赴東都掌選奉身之具止一布囊既屬疾宋璟盧從愿候之見敝簀單藉門不施箔風雨至舉蓆自障日晏設食蒸豆兩器菜數杯而已吏以紙萬番贐為受百番杜暹補婺州參軍秩滿歸吏以紙萬番贐之暹為受百畨衆嘆曰昔清吏受一大錢何異哉為鄭尉復以清節顯守清勿憂不遷宋守敬為吏清白亷謹累厯臺省中終於絳州刺史其任龍門丞年已五十八矣數年而登列岳牧謂羣僚曰公軰俱守清勿憂不遷俗云雙六無休勢余以為仕宦亦無休勢各肯勉之新語清譽儉徳時所推伏丞相蘭陵公蕭倣清譽儉徳時所推㐲嘗統戎于番禺有酌泉投香之譽一時夷賈輻湊至於長安寳貨藥肆咸豐衍於南方之物由此人情歸美僖宗誕聖於壬午龍飛於癸巳星筭十有二嵗矣思命耆徳佐佑大化乃自奉嘗卿起為相時八十有三居台席衣裘茵衽十年一易韓滉雖宰相子性節儉衣裘茵祍十年一易居處陋薄取庇風雨門當列㦸以父時第門不忍壞乃不請堂先無挾廡弟洄稍増補之滉即徹去曰先君容焉吾等奉之常恐失墜若摧圮繕之則已安敢改作以傷儉徳居重位清潔疾惡不為家人資産自始仕至將相乗五馬無不終櫪下性分不可易李尚隱遷廣州都督及還人或裒金以贈尚隱曰吾自性分不可易非畏人知也矜已之清崔倰性介潔矜已之清視贓負者若讐清白者比肩而立韓琬上言貞觀永徽之間清白者比肩而立東夷傳其清徳歸崇敬充冊立新羅使外國多齎金帛貿舉所無崇敬嚢槖惟衾衣東夷傳其清徳清約守道丁公著清約守道為河南尹治以清淨聞第不加飾内無妾媵鄭覃為司空清正退約位相國所居第不加飾内無妾媵行止終始完潔劉瞻為人亷約所得俸以餘濟親舊之窶困者家不留儲無第舍四方獻饋不及門行止終始完潔不治産韋抗厯職以清儉不治産及終無以葬亷潔無素儲李後已致仕或諫公亷潔無素儲不為子孫謀邪後已笑曰兒曺詎餓死乎守節清苦孔戣韓愈䟽曰臣與孔戣同在南省為人守節清苦珍用山積獨無所取屈突通為秦王行軍元帥長史平薛仁果時賊珍用山積諸将争得之通獨無所取帝聞曰清以奉國名定不虚特賚銀六百兩綵千叚元徳秀未嘗有十畞之地十尺之舍十嵗之僮未嘗完布帛而衣具五味而飱吾哀之以戒荒滛貪佞綺紈粱肉之徒爾不以苞苴汙家韋詵休日登樓見人於圃有所瘞蔵者訪諸吏曰參軍裴寛居也與偕来詵問状答曰寡義不以苞苴汙家適有人以鹿為餉致而去不敢自欺故瘞之詵嗟異乃引為判官饋餅棄垣外楊瑒厯沔綏二州刺史姆饋孺子以餅妻偽受而棄之垣外人咨其亷撤婦齎具裴垣性簡儉子娶楊収女齎具多飾金玉垣命撤去曰亂我家法往清其㮣納禇遂良書孔若思傳有遺以禇遂良書者納一卷焉其人曰是書貴千金何取之亷答曰審爾此為多矣更還其半牛僧孺不受送錢韓公武用財賄賂權貴公武卒帝遣使者至其家悉収貲簿校計出入所以餉中朝臣者皆在至牛僧孺獨注其左曰某月日送錢千萬不納帝善之錢徽居榖城榖城令王郢善接僑士㳺客以財貸饋坐是得罪觀察使樊澤視其簿獨徽無有為相身沒無留貲程异為相身沒官第無留貲世重其亷云朝廷賜與輙置軍門石雄臨財亷毎朝廷賜與輙置軍門自取一疋縑餘悉分士伍橐駝駿馬范希朝遷振武節度使邊州毎長帥至必效橐駝駿馬雖甚亷者猶受之以結其歡希朝一不納庭中樹王義方為御史時賈第後數日愛庭中樹復召主人曰此佳樹得無欠償乎又予之錢其亷不貪類此母撓其清蒋沇厯四縣令郭子儀軍出其縣勑麾下曰蒋沇賢令供億當有素士得蔬飯足矣母撓其清也廨中橘熟納直于官桞玭為嶺南節度副使廨中橘熟既食納直于官却金幣路隋為翰林學士毎除制出以金幣来謝者隋却之曰公事而當私貺耶位省郎諸子至徒歩趙驊履尚清鯁位省即衣食窶乏俸單寡諸子至徒歩人為咨美清吏張立素為景城縣戶曺竇建徳䧟景城執將殺之邑人千餘號泣請代曰此清吏殺之是無天也建徳遂命釋縳得父清白楊謹矜父隆禮為户部尚書卒明皇訪其子可代父任者宰相以謹矜謹名皆得父清白帝喜擢謹矜監察御史謹餘太子舍人謹名大理評事斷帶為炷皇甫無逸嘗按部宿民家燈炷盡主人將續進無逸抽佩刀斷帶為炷其亷介類如此居室不能庇風雨嗣吴王子巘厯官清白居室不能庇風雨本傳不立産業李勣卒帝曰勣性亷謹不立産業今亡當無嬴貲有司其厚贈䘏之還槁梅蕭倣拜嶺南節度使南方珍賄叢夥不以入門家人病取槁梅於厨以和劑倣知趣市還之清其身者易使盡清者難姚璹下遷益州長史始蜀吏貪暴璹摘發之無所容貸后聞降璽詔慰勞因謂左右曰為二千石清其身者易使盡清者難唯璹為兼之本傳日本遺金帛不納唯取牋一番為書以貽其副蒋溪永泰初厯鴻臚卿嘗使日本遺金帛不納唯取牋一畨為書以貽其副云孝子餉縑嵗凶家窶為受一疋韓思彦客汴州張僧孺者廬墓三十年詔表其閭請思彦為頌餉縑二百不受時嵗凶家窶甚僧徹固請為受一疋命其家曰此孝子縑不可輕用羊馬崔從領鄜坊節度使党項市羊馬類先遺帥守從獨不取而厚慰待之羗不敢盗境餉綾完封不發韓思復永淳中家益窶嵗飢京兆杜瑾者以百綾餉思復思復方倂日食而餉綾完封不發真清陸景倩為扶溝丞河南按察使畢創覆州縣殿最欲必得實有吏言状曰某彊清某詐清唯景倩曰真清王方慶遷廣州都督南海嵗有崑崙舶市外區琛琲前都督路元叡冒取其貨舶酋不勝忿殺之方慶至秋毫無所索以清自名崔𤣥暐為陵主簿母盧有賢操常戒曰比見親表仕者務多財以奉親若今為吏不能忠清無以戴天履地故𤣥暐所守以清自名政清毅宋璟厯杭相二州政清毅使澤潞不受幣焉伉為侍讀李抱真卒伉持節臨弔歸之帛不受又致京兆伉上表固拒於是醴泉令缺宰相髙選徳宗曰前使澤潞不受幣者其人清可用也遂以受伉不通親友獻遺以終身杜暹以公清勤約自将亹亹為之自弱冠誓不通親友獻遺以終身既卒尚書省及故吏致賻其子孝友一不受以行暹素志所守清約王邱致仕更厯華劇而所守清約未嘗通饋室宅童騎敝陋既老藥餌不自給帝嘆之以謂有古人節下制給全禄以旌潔吏本傳亷儉少所欲史憲忠徙節振武軍于是故帥荒沓使㳺奕兵覘戎有良馬牛彊取之歸直十一戎人怒因興盜掠憲忠亷儉少所欲嘗曰吾居河朔去此三千里乃乗五健馬今守邊發吾餘奉不患無馬何忍豪市哉不取州錢令狐楚始鄆帥毎至以州二百萬入私藏楚獨辭不取噉豆糜自給韋貫之補渭南尉以厚幣召不應居貧噉豆糜自給時稱亷潔盧鈞擢嶺南節度使海道商舶始至異時帥府争先往賤售其珍鈞一不取時稱亷潔身亷不殖貲産張鎬起布衣二朞至宰相居身亷不殖貲産受茶一串陸贄壽州刺史張鎰有重名贄往見既行餉錢百萬曰請為母夫人一日費贄不納止受茶一串曰敢不承公之賜盧奕拜御史中丞自懷謹奐及奕三居其官清節似之世傳其美嵗滿笥餘一縑元徳秀為魯山令嵗滿笥餘一縑駕柴車去為吏清而刻於法郎餘慶平生無留蓄楊元琰平生無留蓄厯三鎮家無産李夷簡厯三鎮家無産遺五百縑置之未嘗發陽城山東節度府聞城義者發使遺五百縑戒使者不令返城固辭使者委而去城置之未嘗發假官舍以居五代翟光鄴雖貴不營産常假官舍以居蕭然僅蔽風雨莅官則潔己桞玭家訓亷不沽名同上寧餓死韋貫之裴均子持萬縑請譔先銘答曰吾寧餓死豈能為是哉平生未嘗通饋遺故家無羡財以詔書褒亷吏五代明宗以詔書褒亷吏孫岳等以風示天下為政以亷聞敬塘在陜為政以亷聞是時諸侯多不奉法鄧州陶玘亳州李鄴皆以贓汚論死明宗下詔書褒亷吏普州安崇阮洺州張萬進耀州孫岳等以諷天下而以敬塘為首五代史未嘗改治第宅僮馬敝弱李元紘再世宰相有清節其當國累年未嘗改治第宅僮馬敝弱宋璟嘗嘆曰李公引宋遥之美黜劉晃之貪為國相家無留儲雖季文子之徳何以加之居官亷雖大臣無厚蓄盧坦為河南尉杜黄裳為尹召坦立堂下曰某家子與惡人游破産盍察之坦曰凡居官亷雖大臣無厚蓄其能積財者必剥下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黄裳驚其言素清正李朝隱擢大理丞武三思誣五王鄭愔請誅之朝隱以不經鞫實不宜輕用法忤㫖貶嶺南醜地韋巨源曰朝隱素清正一日逺逐恐駭天下帝更以為聞喜令時政出權幸朝隱泮然無避屈遷長安令宦官有所干請曵去之睿宗聞而嘉嘆治廣有清節者三人盧奐天寳初為南海太守兼水陸都會物産瓌恠前守盧巨鱗彭杲皆以贓敗故以奐代之汙吏斂手中人之市舶者亦不敢干其法逺俗為安時謂自開元後四十年治廣有清節者宋璟李朝隱奐三人而已以清毅聞齊澣為汴州刺史地當舟車湊集事浩繁前刺史數不稱職唯倪若水與澣以清毅聞吏民頌美挺節無穢聲裴矩時綱紀汨廢宇文述虞世基用事官以賄遷唯矩挺節無穢聲世頗稱之雖酌貪泉庸易吾性馮立受廣州都督前日牧守苛肆為蠻夷患故數叛立至不事家産衣食弗求贏嘗見貪泉曰此豈隱之所酌邪吾雖日汲庸易吾性哉遂極飲去在職不三年有惠愛益以亷平自勵郭延魯父饒為沁州刺史者九年為政有惠愛州人思之延魯以功累遷復州刺史延魯嘆曰吾先君為沁州者九年民到于今思之吾今幸得為刺史其敢忘吾先君之志由是益以亷平自勵民甚頼之五代率以家貲求刺史循亷之吏如延魯之徒誠難得而可貴自荘宗以來功臣大將輩或不幸而死則其子若孫率以家貲求刺史其物多者得大州善地盖自天子皆以賄賂為事矣則為其民者其何以堪之哉於此之時循亷之吏如延魯之徒者誠難得而可貴也哉大功不得聨職貞觀中制大功不得聨職賈敦頥為瀛州刺史弟敦實為饒陽令以其兄弟皆亷謹許同職受酒一盃李素立為澣海都䕶夷人感其惠率馬牛以饋素立素立惟受其酒一盃餘悉還之舊史在職清潔賈敦頥為滄州刺史在職清潔毎入朝盡室而行唯弊車一乗羸馬數匹羈勒有闕以䋲為之見者不知其刺史也舊史清白箴許圉師為相州刺史部有受賕賜清白箴貪濁六事具刑部贓賄門注白政以賄成賄賂公行貪以敗官為墨作法於涼其敝猶貪作法於貪敝將若之何子産作丘賦國人謗之渾罕曰君子云云坐贓行儉受賂張武為郎中令受賂文帝賜錢以愧其心行賂陶朱公仲男殺人於楚朱公使長子以百金賂荘子以免茍得貪泉見上注令自為計薛宣字貢君為馮翊謝陵令楊湛為櫟陽令謝游皆貪猾不進宣得其罪贓察湛有改節敬宣之意乃手自牒書條其贓與湛令湛自圖進退湛即時解印欲為記謝宣而去謝㳺恃名儒輕宣宣獨移書顯責之逰得換亦解印而去賜錢皇甫嵩義真為兾州牧吏有罪受賂嵩更賜錢懷慙或至自殺不罪吴祐季英為膠東相嗇夫孫性受贓布衣與父父曰君如此何忍欺促歸罪祐曰觀過知仁使歸其父還以衣賜之貪利而無厭予取予求不汝疵瑕楚文王謂申侯汙吏孔納賂崔湜與鄭愔同典選納賂遺銓品無序裒蓺財貲杜兼擢河南尹裒蓺財貲極嗜欲適幸其時耄而貪韋綬為山南西道節度使入辭請門㦸十二以行又乞賜錫錢二百萬官子元弼太常丞帝以舊恩許之綬耄而貪吏受縑裴矩遷民部尚書太宗即位疾貪吏欲痛懲艾之乃間遣人遺諸曺一吏受縑帝怒詔殺之矩曰吏受賕死固所宜陛下以計紿之所謂罔人以罪帝恱冒沒于財李夷簡京兆尹楊憑性驁侻始為江南觀察使冒沒于財夷簡為屬刺史不為慿所禮至是發其貪慿貶臨賀尉夷簡賜金紫誅斂崔寧為成都尹寧見蜀地險饒於財而朝廷不甚有紀乃痛誅斂使弟寛居京師以賂厚謝權貴驟擢御史中丞貪沓茍得嚴礪為山南節度使在位貪沓苟得士民不勝其苦猥屑相稽王縉性貪冒縱親戚尼姏納財賄猥屑相稽苦市賈冒猥無亷槩楊漢公治荆南有貪贓宣宗擢為同州刺史鄭裔綽奏漢公冒猥無亷槩不可處近輔同州太宗興王地陛下為人子孫當精擇守長付之漢公既以墨敗容可舉劇部私貪人帝恚見顔間賕餉狼藉宋之問中宗将用為中書舍人太平公主發其知貢舉時賕餉狼藉聚斂固寵劉蕡策貪臣聚斂固寵討石國髙仙芝為人貪破石國獲瑟瑟十餘解黄金五六槖駝良馬寳玉甚衆家貲累鉅萬乏清白名杜淹始典二職貴重於朝矣而乏清白名獲譏當世巨匱裁竅王伾當其黨盛門皆若沸羮而伾尤通天下賕謝日月不闋為巨匱裁竅以受珍使不可出則寝其上通饋謝杜黄裳然除吏不甚别流品通饋謝無潔白名鬻官射利李訓性資貪沓既藉權寵專鬻官射利貲積巨萬不知止賂帝親近竇參淄青李納厚饋參外示嚴畏實賂帝親近為間故左右争毁短之冒進忘亷盧懷慎曰比州牧上佐兩畿令或一二嵗或三五月即遷曾不論以課最使未遷者傾耳以聴企踵以望冒進忘亷亦何暇為陛下宣職䘏人哉徇貨掊貲又曰竊見内外官有賕餉狼藉劓剥蒸人雖坐流黜俄而遷復還為牧宰徇貨掊貲訖無悛心奢肆不法路巖進尚書左僕射巖顧天子荒闇且以政委已乃通賂遺奢肆不法遺明珠文犀金寳邱和大業末拜交趾太守林邑西諸國數遺和明珠文犀金寳故和富埒王者以貪冒聞長孫順徳俄以受賕為有司劾發帝曰順徳元勲外戚爵隆位厚至矣何至以貪冒聞乎因賜帛數十媿切之貪暴陳子昻解官縣令叚簡貪暴聞其富欲害子昻家人納錢二十萬緡簡薄其賂捕送獄中子昻之見捕自筮卦成驚曰天命不祐吾殆死乎果死獄中冒于權利宗楚客坐貪贓江夏郡王道宗授鄂州刺史久之坐貪贓帝聞怒曰朕提四海之富士馬若林如使轍跡環天下㳺觀不度采絶域之玩海表之珍顧不得耶特以勞民自樂不為也人心無藝當以誼制之今道宗已王廪賜多而貪不止顧不鄙哉乃免官削封戸以王就第索謝錢七十萬李義府召長孫延謂曰吾為子得一官居五日延拜司津監索謝錢七十萬楊行潁白其贓詔訊按有状居上無清惠之政而有饕餮之害劉蕡䇿去貪臣聚斂之政同上易蠻金南蠻傳五年南詔回掠嶲州明年復来攻㑹刺史喻士珍貪獪隂掠兩林東蠻口縳賣之以易蠻金故開門降南詔盡殺戍卒而士珍遂臣于蠻多私所聘許敬宗饕沓遂以女嫁蠻酋馮盎子多私所聘有司劾奏下除鄭州刺史谿壑之欲惟賄是利李義府既主選無品鑒才而谿壑之利惟賄是利不復銓判人人咨訕裒積無厭南蠻傳李師望治卭州裒積無厭私賄以百萬計當給者無賄而不支應徴者受賕而縱免陸贄論裴延齡姦蠧書延齡以國家大計委於胥吏末流當給者無賄而不支應徵者受賕而縱免紀綱大壞貨賂公行苟操利權實竊邦柄以受餉見疵賛曰子貢孔門髙弟而貨殖韓安國漢名宰而資貪黄裳亦以受餉見疵獻橐装之半蘇逢吉同平章事前客省使王筠自晉末使楚至還逢吉意筠得楚王重賂遣人求之許以一州筠怏怏以其槖装之半獻之而不得州五代史漢臣傳吏有犯贓輙寘之死明宗吏有犯贓輙寘之死曰此民之蠧也貨賄上行則賞罰之柄失貪求下布則亷耻之道衰何者善惡不分功過無辨以貨賄之多少為課績之重輕守道闕供或時致怨招累求得當欲可以釋罪賞榮忍行刻剥者見謂公忠巧飾玩好者獲稱才智陸贄奏議晉世惟貴於錢神漢台不慙於銅臭賛皇公貨殖論昔秦得金䇿謂之天醉豈天之常醉哉故晉世唯貴於錢神漢台不慙於銅臭謂子文無兼日之積顔生樂一瓢之飲晏平仲祀不掩豆公儀休相以拔葵皆為薄命之人矣公然白日受賄賂火齊磊落堆金盤元臣故老不敢語晝卧涕泣何汍瀾韓信問通結於關節交私匪止於苞苴陸贄奏議近者度支小吏屢為府縣所繩鞫其姦贓無不狼藉信問通結於關節交私匪止於苞苴威福潜移乃至於是職司失序固亦可知市權鬻官謗者讙譁蘇逢吉尤納貨賂市權鬻官謗者讙譁公政七白守政至公未嘗至於偃之室子游曰有澹臺滅明者非公事未嘗至於偃之室不賞私勞不伐私怨中立不倚我心匪石不可卷不曰堅乎磨而不磷不曰白乎湼而不緇語抱公絶私尹翁歸不受謝漢張安世嘗有薦士来謝安世大恨之而不為通又晉羊祜字叔子不受私謝拜官公庭謝恩私室也不可干以私尹翁歸拜東海太守辭廷尉于定國定國家在東海欲屬託邑子兩人令坐後堂與翁歸語終日不敢見邑子既去曰此賢不可干以私也朱邑亦不可交以私祁奚舉解狐其讐也左傳又後漢橋𤣥與陳琳有隙及在公位薦琳為廷尉不謝恩祁奚請免叔向叔向既免不謝祁奚亦不見叔向明為公也又後漢范滂字孟博嘗繫獄尚書霍揖理出之候揖而不謝人問之滂引叔向祁奚之言也免讎後漢盖勲初為漢陽長史時武威太守貪横從事蘇正和按致之凉州刺史梁鵠畏貴戚欲殺正和乃語勲勲素與正和有隙諫鵠曰貪應欲鷙而烹之何哉鵠從之不殺正和正和詣勲不見曰吾為梁使君謀不為蘇正和不伐功魏陳羣言劉兾於太祖太祖赦之冀徳羣羣曰議刑為國非為私且明主之意吾何知其𢎞博不伐功如此也立身有本末魏孫資劉放閣之大臣莫不交好唯辛毗不與通毗之子敞諫毗云云毗正色曰主上雖未聦亦不為闇劣吾立身有本末資放不過不令我作三公何危害之有心似秤蜀諸葛亮曰吾心似秤不能為人作輕重不怨蜀李嚴與諸葛亮皆大臣後嚴運粮不繼矯命令邊廻軍亮歸免嚴為民及亮卒嚴嘔血而死以亮在尚有補過復位之望也論者以管仲奪伯氏駢邑三百沒齒無怨言亮之公正過之也投書任棠為太守有人囑書投之於水靣折官長汝南太守歐陽歙臨饗衆出敎曰西郡督郵繇延資性忠貞云云欲顯延于朝功曺郅惲字君章於下坐愀然曰司正舉觥案延資性貪邪云云敢拜奉觥歙大慙不恨刻已蜀郡太守因計吏賂遺曺騰益州刺史种暠於斜谷得其書奏太守并刻騰帝寝之無恨忿稱暠為能吏不發私書郅都為濟南守荆人遺弓不索曰荆人得之何求焉孔子曰去荆可也老𣆀聞曰去人可也故老𣆀則至公矣陳泰字𤣥伯為并州京邑貴人寄貨因泰市奴婢泰不發書及徵悉還之也陳蕃字仲舉為安樂守梁冀遣人齎書有請託不通使者以詐為謁蕃笞殺之左遷修武令王獨坐漢王閎選公少為小吏慷慨有大節遷兾部兾人彊悍又多豪傑閎欲厲威乗傳到州弹治貪濁性亷克不發私書不交豪族賔生號王獨坐後漢蘇章字孺文遷兾州刺史故人為清河太守章行部按其贓賄太守設酒陳平生意甚喜曰人皆有一天我有二天章曰今夕蘇孺文與故人飲私恩也明日兾州刺史按事公方也孔振弊抳私畢隆擇按察劒南振弊抳私號為清嚴官人奪民田卒與民直張仲方補全州刺史官人奪民田仲方三䟽申理卒與民直私事不敢白封倫楊素舉為行軍記室泊海上素召討事倫墜水免易衣以見訖不言久素乃問其故謝曰私事也所不敢白素異其為人未嘗引用親黨竇易直以公潔自喜方執政未嘗引用親黨弗以私害公敬晦隱然持重弗以私害公李朝隱遷長安令成安公主奪民園不酬直朝隱取主奴杖之由是權豪斂伏擢河南尹太子舅趙常奴怙勢横閭里朝隱曰此不䋲不可為政執而榜辱之封常清為仙芝節度判官仙芝委家事於郎將鄭徳詮其乳母子也威動軍中常清始貴易之走馬突常清騶士去常清命左右引徳詮至廷中門輒閉因離席曰吾起細㣲中丞公過聴以主留事郎将安得無禮因叱曰須暫假郎将死以肅吾軍因杖死而靣仆地曳出之仙芝妻及乳母哭門外救請不能得遽以状白仙芝驚及見常清憚其公不敢譲常清亦不謝不屈勢倖王徽擢京兆尹官要家争遣人治弟侵冒齊民訟訴滿前徽不屈勢倖一平以法蕭廪遷京兆尹田令孜養子有罪繫獄請救踵門廩不納杖殺之内外畏讋公事公言宋璟張易之等就獄俄詔原之勑二張詣璟謝璟不見曰公事公言之若私見法無私也盧奐天寳初為南海太守南海兼水陸都會物産瓌恠中人之市舶者亦不敢干其法袁滋為侍御史刑部大理覆罪人失其平憚滋守法因權勢以請滋終不署我所守者公法徐有功轉司判少卿與皇甫文備同按獄誣有功縱造黨久之文備坐事下獄有功出之或曰彼嘗陷君於死今生之何也對曰爾所言者私忿我所守者公法不可以私害公嘗謂所親曰大理人命所繫不可阿㫖詭辭以求苟免故有功為獄常持平守正全活甚衆小選禇翔啓小選公清不為請囑易意號為平盡公不顧私蘇頲宋璟嘗曰吾與蘇氏父子同為宰相僕射長厚自是國器若獻可替否盡公不顧私則今丞相為過之楊綰造之者欲干以私聞其言必内愧止吏久從政八白漢為吏長子孫因以為氏倉氏庾氏是也三載考績唐虞三載考績欲使吏安其任民服習其化而無苟且之政安全長吏黄霸為潁川太守務在成就安全長吏不欲易代日數易吏迎新送故之費及姦吏因縁絶簿書盜財物公私費損甚多皆當出於民所易新吏又未必賢或不如故益為亂也注云吏因縁交代之際匿簿書盗財物也増秩賜金漢宣吏有政績者不即移易就増秩賜金欲使人安其化故人皆勵精為理百姓安富也職滿乃得辟後漢左雄奏鄉部清人之吏清白從者寛其資笇増其禄秩吏職滿嵗宰府州郡乃得辟舉如此則送迎之役損宦竪用權不省孔盧懷慎曰人知吏之不久不率其教吏知遷之不遥不䆒其力媮處爵位以養資望此國病也漢宣綜覈名實黄霸良二千石也加秩賜金就旌其能終不肯遷故古之為吏至長子孫臣請都督刺史上佐畿令任末四考不得遷若治有尤異或加賜車裘禄秩降使臨問璽書慰勉須公卿闕則擢之馬周曰伏見宗室功臣悉就藩國遂貽子孫世守其故竊惟陛下之意誠愛之重之欲其裔緒承守與國無疆也臣謂必如詔書者陛下宜思所以安存之富貴之何必使世官也出入八年韋綬為輸林學士毎入直踰月不得休以老母屢丐解職毎請帝輒不恱出入八年而性謹畏甚劉祥道陳六事五曰唐虞三載考績黜陟幽明二漢用人亦久其職今任官率四考罷官知秩滿則懐去就民知遷徙則茍且以去就之官臨苟且之民欲移風振俗烏可得乎請四考進階八考聴選以息迎新送故之弊以便柔遜愿中帝意乃留八年崔損建中後宰相無久任者損以便柔遜愿中帝意乃留八年帝亦知公議病其持禄然其遇彌渥卒不易所職王播所署吏茍無大罪以嵗勞増秩而已卒不易所職刺史非三載以上不可徙劉知幾雖久次者不得逾四載雖速遷者亦待及於三年此先王較能之大方白居易䇿林刺史縣令逺者三嵗孫樵書褒成驛號天下第一而蕪荒不治驛吏曰賔客暮至朝去寧有顧惜心耶有老甿笑於傍曰舉今州縣皆然也且刺史縣令逺者三嵗再更故州縣之政首有不利於民可以出意革去者其在刺史則曰我即去矣何用如此當愁醉醲當飢飽鮮囊帛匱金笑與秩終嗚呼州縣者真驛也安人得人心九白以貴下賤大得民也易安人則惠黎民懐之書人心惟危危則難交還定安集鴻鴈美宣王也萬民離散不安其居而能勞来還定安集之曰唯此哲人謂我劬勞保氏周禮保氏以道安人保安也教安司徒以十二教以俗教安則民不偷注俗土地所生習保習以保息六養萬民曰慈㓜以紓吾民視民如傷傳按堵漢髙入關吏人按堵如故嚴教吏謹待遇無令其失職業宣詔二千石老者安之論願為僵仆漢趙廣漢以和顔接士待遇慇懃發於至誠吏皆無隱願為僵仆無所避也老小扶車轂韓延壽弃市吏人數千送至渭城老小扶車轂奉酒䏑延夀不忍逆人人為飲使掾吏分謝莫不流涕守闕號泣趙廣漢為京兆下獄吏人或言臣生無益縣官願代京兆死使得牧養小民衛卒請留盖寛饒左遷衛司馬躬行士卒廬室疾病者身自拊循嵗盡交代衛卒數千皆叩頭自請復留共卒一年以報寛饒厚徳以是顯名也借寇寇恂子翼為河内太守後欲從世祖還河内人遮道上言欲更借冦君一年安作亷范叔度為蜀郡先時蜀郡多火災禁夜作人更相隱蔽燒者相屬范至不令禁火但嚴水備百姓安富歌之曰亷叔度来何暮不禁火人安堵平生無襦今五袴徴租不當免倪寛為内史収租稅時裁闊狭與民相假貸以故租多不入以負租當免人聞當免恐失之大家車牛小家檐負課為最也遮使者車侯霸君房為臨淮大尹詔徴百姓遮使者車乞留相戒乳婦不舉子曰侯君去必死孔復見太平官府姜謩撫邊俗以恩信盗賊衰止人喜曰不意復見太平官府撫和戎落得其歡心狄仁傑出為寕州刺史撫和戎落得其歡心郡人勒碑以頌人稱有恩裴子餘遷兾州刺史為政恵裕人稱有恩治稱流聞嚴綬尚寛恵治稱流聞人人喜恱令狐楚遷宣武節度使汴軍以驕故而韓𢎞弟兄務以峻法䋲治士偷于安無革心楚至解去酷烈以仁惠鐫論人人喜恱遂為善心安西酋長𠢐面哭送郭元振為涼州都督睿宗立召為太僕卿將行安西酋長𠢐靣哭送者壺漿歡迎旌節卞玉門關去凉州猶八百里城中争具壺漿歡迎都督嗟嘆以聞上欲粟賤追李峴李峴出為零陵太守峴為政得人心時京師米湧貴百姓乃相與謡曰欲粟賤追李峴民擁留于道崔戎為華州刺史徙兖海沂宻觀察使民擁留于道不得行乃休傳舎民至抱持取其鞾時詔使尚在民泣詣使請白天子丐戎還使許諾戎恚責其下衆曰留公而天子怒不過斬吾二三老人則公不去矣戎夜單騎亡去民追不及乃止本傳人聞其至歡迎王起子龜式徙浙東觀察使初式臨州有恵政人聞其至歡迎之耆老叩閤願留崔彦昭繇河陽節度使徙河東先是沙陀諸部多犯法彦昭撫循有威恵三年境内大治耆老叩閤願留詔可遮道攀號五代郭延魯累遷復州刺史延魯嘆曰吾先君為沁州九年民到于今思之吾今幸得為刺史其敢忘先君之志由是益以亷平自勵民甚頼之秩滿州人乞留不許皆遮道截鐙留鞭開元遺事姚崇牧荆州代還日吏民泣擁馬首遮道不使去所乗之馬鞭鐙民皆截留之新牧以其事奏之朝廷加奨有脚陽春宋璟檢校俱州刺史歴杭相二州厯洛州長史所至有惠政人號有脚陽春天寳遺事送者千數裴守真累成州刺史政不務威嚴吏民兩懐之徙寧州送者千數出境尚不止吏民懐愛裴懐古徙并州所至史民懐愛召羽林將軍未至官還為并州人知其還携扶老稚出迎使人驅迎者還而来者愈衆得人心類如此遺愛十生祠配社附白欒武子之德在人如周人之思召公愛其甘棠況其子乎傳前有召父後有杜母後漢杜詩為南陽守人懐之前漢召信臣為南陽亦有遺愛人歌之曰云云悒然不樂思我劉君何時復来安此下人劉陶為順陽長病免人歌之曰云云蜀諸葛侯蜀諸葛侯瞻亮之子也蜀人思亮而愛瞻毎朝廷有善政雖非瞻建百姓相告曰諸葛侯所為以是美名過其實也葬桐鄉朱邑為桐鄉嗇夫未嘗笞辱人後遷大司農囑其子曰我死必葬桐鄉桐鄉人愛我子孫奉嘗不如桐鄉死後葬桐鄉果立祠去官不受遺後漢劉寵為會稽守徵入山中有五六老叟人齎百錢送寵曰他時吏發求人間至夜不絶狗吠竟夕自明府下車狗不夜吠垂老遇明聖聞當去故自扶奉送寵為取一大錢受之斂馬牛追送後漢孔奮君魚為始臧長被徵吏人相謂曰孔君清亷宜報徳相率賦斂牛馬器物千萬追送數百里奮謝之無所受生祠于定國字曼倩于公為縣獄吏决獄平郡中為立生祠白馬從事後漢鄭衆為廬江從事以單馬譬降灊山人為立祠號曰白馬從事張奐為武威任延為九真並立生祠晉杜軫為池陽令為雍州十一縣最百姓為立生祠陸機為浚儀令弟義為廣都長並立生祠荀朂為安陽令有遺愛立生祠石相祠石慶為齊相齊國慕其家行不言而齊國大治齊為立齊相祠配社欒公社漢欒布為燕相燕齊間為立社號曰欒公社配食縣社後漢甄子然至孝卑卒北海相孔融恨不及見之令配食縣社神父宋登字叔陽為汝隂令政教明能號稱神父遷潁州守市無二價道不拾遺汝隂人配社祠之圖畫晉陸雲為浚儀今去官百姓追思之圖畫形象配食縣社孔古遺愛崔琳天寳二年卒潘肅聞之泫然曰古遺愛也苖晉卿寛厚所至以惠化稱魏人為營生祠立石頌美吕諲為荆州自至徳以来處方面數十人諲最有名荆人生創房祠及沒吏裒錢十萬徙祠府西徐申為韶州刺史民詣觀察使以其有功于人請為生祠申固避觀察使以状聞李綰為栢人令有仁政縣為立祠狄仁傑貶彭澤令邑人為置生祠魏氏復為立祠仁傑為魏州刺史民愛仰之復為立祠来瑱以梁崇義為節度使代瑱既而為瑱立祠四時致饗郭震治涼五嵗河西諸郡置生祠立遺愛頌宋璟廣人為璟立遺愛頌璟上言頌所以傳徳載功也臣之治不足紀廣人以臣當國故為溢辭徒成謟䛕者欲釐正之請自臣始有詔許停肥鄉民酒食迎犒有小兒亦在中韋景駿歴肥鄉令後為趙州長史道出肥郷民喜争奉酒食迎犒有小兒亦在中景駿曰方兒曺未生而吾去邑非有舊恩何故来對曰耆老為我言學廬館舍橋鄣皆公所居意公為古人今幸親見所以来景駿為留終日帝為製遺愛碑于蜀崔圎兼劒南節度使肅宗立命與房琯韋見素赴行在帝為製遺愛碑于蜀以寵之袁滋徙義成節度使居七年百姓立祠祀祭韋丹大和中裴誼觀察江西上言為丹立祠堂刻石紀功不報長老守闕頌遺愛長孫操為陕州刺史人指樹而懐之吴凑為京兆尹官街樹缺所司植榆以補之湊曰榆非九衢之物亟命易之以槐及槐隂成而湊卒人指樹而懐之舊史教化十一白觀民設教易徳博而化易爾惟風下民惟草書草上之風必偃語違上所命從厥攸好言人不從上命從土所好也政由俗革道有升降格其非心風以動之教以化之詩序汝墳道化行也文王之化行于汝墳之國翩彼飛鴞集于泮林食我桑椹懷我好音注鴞改音喻惡人從化敬敷五教在寛司徒掌十二教教民以度教節則人知足以俗教安則民不偷脩其教不易其俗禮教官之屬大司徒化民成俗其必由學禮入其國其教可知禮成人有兄死不為縗子皐為宰乃為縗上好禮則民莫敢不敬上好信則民莫敢不用情敬教勸學衛文公楚俗好庳車史孫叔敖為相王以庳車不便馬欲下令使髙相曰令數下民不知所從臣請閭里使髙梱乗車皆君子君子不能數下車王許之居數嵗民悉髙其車此不教而化風俗移人漢刑法志性相近習相逺言人同稟五常之性趨舍相近但所習漸積而相去逺也異文翁化蜀教人讀書學者比於鄒魯揉曲木者不累月公孫𢎞曰虎豹馬牛禽獸不可制也及教訓服習之至可牽持駕服唯人之從臣聞揉曲木者不累月銷金石者不累日人之於利害好惡豈比禽獸木石之類哉朞年而變臣𢎞尚竊遲之也為陳和睦之義潁川多豪彊難治趙廣漢患其俗朋黨乃構㑹吏人令相告訐由是為俗人多讎怨及韓延夀為潁川欲改更之示以禮譲乃召郡中長老鄉里所信者數十人設酒對訟以謡俗為陳和睦親愛銷除怨咎之路長老以為便可施行及黄覇代為潁川因其迹而大理也閉閣思過延壽後為馮翊令有兄弟訟田延壽曰是教化不行遂閉閤思過問田者髪鉗謝罪以田相移陳元不孝仇覽一名香字季智為蒲亭長民陳元母告元不孝覽驚曰吾近過舍廬整頓此非惡人當是教化未至母守寡養孤何肆意一朝欲致此子子不義母聞感悔涕泣而去覽乃親到元家與母子飲因為陳人倫孝行譬以禍福之言卒成孝子乞詣廷尉許荆為桂陽守行春到萊陽民有蒋均兄弟争財荆乃對之歎曰教化不行罪在太守乃上書陳状乞詣廷尉兄弟感悔求受罪省俸助婚任延為九真守駱越無婚禮各因滛好無適對匹延移書令男年三十至五十女年十五至三十皆以年齒相配其貧者長史已下省奉賑助之是嵗穀稼豐衍生子始知種姓矣縣官不可入劉矩為雍丘令以禮譲化人有争訟者矩提耳告之以忿悉可忍縣官不可入矩字叔方民用丕變書爾之教矣民胥效矣道之以徳齊之以禮有耻且格道之以政齊之以刑民免而無耻化馳如神四誡秦懿伯為山陽守以禮教人為設四誡以定交親長㓜之禮導教化者㩴為鄉三老也鬻羔豚者不飾賈路不拾遺史孔子與聞政之三月笞訟主田叔為魯相初到民訟主取財物叔笞之曰主非爾主邪主聞之大慙而還財也先訓魏覇喬卿為鉅鹿掾吏有過先訓之不改乃罷之或稱他吏之長以激之皆懐慙息訟借牛魯恭仲康為中牟令亭長借牛不還人訟之㳟令還再三不從㳟欲解印吏人泣亭長於是請罪吏受米肉卓茂子康為宻令人遺吏米肉而訟之茂曰遺人之情也不當彊耳人伏其化和解吴祐為膠東相有訟者身到閭里和解之民化其徳諦思杜畿伯侯為河東守有訟者為陳大義令歸諦思之自後少有訟者姦吏復職髙柔文恵為管長姦吏聞名引去召令復職止訟上劉惔真長為丹陽尹時百姓頗有訟官長者惔嘆曰居下訕上蔽道也上雖不君下不可失禮寝而不問自刻責韓延壽接待下吏約誓明著負之者延壽痛自刻責吏皆慙悔又延壽為潁川人家嫁娶䘮祭禮使諸生皮弁執俎豆為吏人行禮又潁川人感延壽化賣偶車馬下里偽物者皆弃之市道劉饒以蒲鞭示耻平化侯王莽太傅唐尊出見男女不異路下車以赭汚其衣莽恱封平化侯孔以文雅粉澤貟半千不顓任使常以文雅粉澤故所至禮化大行兄弟相訟飲以乳韓思彦廵察劒南益州髙貲兄弟相訟累年不決思彦敕厨宰飲以乳二人寤齧肩相泣曰吾乃夷獠不識孝義公将以兄弟共乳而生邪乃請輟訟開陳經書王義方貶吉安丞吉安介蠻夷梗悍不馴義方召首領稍選生徒為開陳經書行釋奠禮清歌吹籥登降跽立人人恱順敦勸生徒韋𢎞機顯慶中為檀州刺史以邊人陋僻不知文儒貴乃修學宫畫孔子七十二子漢晉名儒像自為賛敦勸生徒繇是大化磨治洗汰馬總吴元濟禽為彰義節度留後蔡人習偽惡相掉計獷戾有夷貉風總為設教令明賞罰磨治洗汰其俗一變政化清明顔泉明肅宗拜泉明郫令政化清明誅宿盗人情翕然母子相訟授孝經韋景駿為貴卿令有母子相訟者景駿曰令少不夭常自痛爾幸有親而忘孝耶教之不孚令之罪也因嗚咽流涕付授孝經使習大義於是母子感悟請自新遂為孝子立學官講誦曺華請治兖許之自李正已盗齊魯俗益汗驁華下令曰鄒魯禮義鄉不可忘本乃身見儒士春秋祀孔子祠立學官講誦斥家貲佐贍給人乃知教成就諸生仕諸朝仁化大行韋丹為容州刺史教民耕織止惰㳺興學校教種茶麥仁化大行俗為之改席豫南方俗死不葬暴骨中野豫教埋斂俗為之改風俗翕然為變髙士亷進益州大都督府長史蜀人畏鬼而惡疾雖父母病皆委去望舎投餌哺之昆弟不相假財士亷為設條教辨告督勵風俗翕然為變著諭蒙書馮伉授醴泉令縣多囂猾數犯法伉為著諭蒙書十四篇大抵勸之務農進學而教以忠孝鄉鄉授之使轉相教督用儒術教其俗馬總白孔六帖卷四十
