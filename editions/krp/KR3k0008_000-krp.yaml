body:
  text: 白孔六帖類書類提要臣等謹案白孔六帖一百卷文獻通考載六帖三十卷唐白居易撰後六帖三十卷宋知撫州孔𫝊撰合兩書計之總為六十卷此本編兩書為一書不知何人之所合又作一百卷亦不知何人之所分考胡仔苕溪漁隠叢話稱六帖新書出於東魯兵燹之後南北隔絶其本不傳於江左使學者弗獲增益聞見則南渡之初尚無傳本王應麟玉海始稱孔𫝊亦有六帖今合為一書則併於南宋之末矣黄朝英靖康緗素雜記載白氏六帖有元祐五年博平王安世序此本佚之卷首所冠韓駒序則専為孔傳續書作者也楊億談苑曰白居易作六帖以陶家缾數十各題門目作七層架列齋中命諸生采集其事類投缾中倒取抄録成書故所記時代多無次序唐志稱其書為白氏經史事類六帖葢其别名程大昌演繁露稱唐開元中舉行科試之法帖經者以所習經掩其兩端中間惟開一行裁紙為帖凡帖三字視時增損可否不一或得四得五得六者為通六帖之名所由起取中帖多者名其書也然此書雜採成語故實備詞藻之用與進士帖經絶不相涉莫詳其取義之所在大昌所説殆亦以意附㑹歟其體例與北堂書鈔同而割裂餖飣又出其下資暇集摘其誤引朱博烏集事南部新書摘其誤引陶潛五桞事東臯雜録摘其誤引鳥鳴嚶嚶事學林就正摘其誤引毛寳放龜事然所徵引究皆唐以前書墜簡遺文往往而在要未為無裨考證也容齋隨筆又稱俗𫝊淺妄書如雲仙散録之外皆絶可笑孔𫝊續六帖悉載其中事自穢其書然復齋漫録案復齋漫録今已佚此條見胡仔苕溪漁隠叢話所引稱東魯孔𫝊字聖𫝊先聖之裔而中丞道輔之孫也為人博學多聞取唐以來至於吾宋詩頌銘賛竒編奥録窮力討論纖介不遺撮其樞要區分彚聚有益於世者續唐白居易六帖謂之六帖新書韓子蒼為篇引以為孔侯之書如富家之儲材榱棟枅栱雲委山積匠者得之應手不窮其用豈小云云則宋人亦頗重其書矣玉海引中興書目稱居易採經𫝊百家之語摘其英華以類分門悉注所出卷帙名氏於其下晁公武讀書志則稱居易原本不載所出書曽祖父秘閣公為之注行於世其說不同然公武述其家事當必不誤且玉海又引中興書目稱白居易以天地事分門類為聲偶而不載所吐其說亦自相矛盾葢當代所行原有已註出處之本又有未註出處之本應麟各隨所見書之耳此本註頗簡畧亦不題註者姓名其即晁氏所註與否已不可復考今亦仍原本録之不更增題名氏焉居易始末具唐書本𫝊𫝊有東家雜記已著録乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀白孔六帖原序唐白居易攟摭諸書事提其要區分彚聚有益於世或謂白公文采道徳自足以托不朽顧為此何歟古之君子學則與人共之未有獨善其身者也且其大者尚将發明以示後世况其細乎使學者不執業不佔畢而有博聞之益此仁人之心也由唐至吾宋㡬四百年故事畔散不屬東魯孔侯宣聖之裔中丞公之孫也數試藝于有司輙不售退為新書以倣白公之意方侯著書時士皆挾一經不治他技而侯獨奮不顧自詩頌銘賛竒編秘録窮探厯討纎芥不遺斯亦勤矣書成而當建炎紹興之際主上復古救弊士知博學孔侯之書如富家之儲材棟椽枅栱雲委山積匠者得之應手不窮功用豈小哉若夫貪多務得晦而不出幸人之不知以成己之名者此侯之所恥也余見侯臨川閱其書而善之侯之言曰古之學者必世其家吾惟宣聖之後而子思中庸雜於大戴氏禮及子髙子國始立訓𫝊闕然至今吾甚懼焉於是綴緝使無墜厥緒則侯之意非獨倣白公而已也故余樂為之序陵陽韓駒子蒼
