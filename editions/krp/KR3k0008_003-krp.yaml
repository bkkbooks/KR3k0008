body:
  text: 白孔六帖卷三唐白居易原夲宋孔傳續撰霧一冰二火三灰四塵五敘四時六春七夏八秋九冬十霧一白氛霧𡨕𡨕月令仲冬行夏令則氛霧𡨕𡨕積水上溢故為霧荘子霧不塞望西京雜記曰太平之世霧不塞望浸淫被泊而已三日世紀黄帝時天大霧三日帝㳺洛水之上見大魚乃得圖書五里張楷字公超能為五里霧所居學者成市故有公超市三里裴優能為三里霧後因霧而作賊豹隠陶答子妻曰南山有元豹霧雨七日不下食欲以澤其毛羽成其文章蛇遊韓子飛龍乗雲騰蛇遊霧戰涿鹿黄帝與蚩尤戰于涿鹿之野蚩尤乃作大霧圍平城髙祖於平城之圍大霧三日迷雲夢曹公至赤壁過雲夢澤中大霧遂迷失道丹山銀山並出霧也銀山常出素霧四塞漢王氏五侯同日封其日黄霧四塞開而覩天衛瓘見樂廣曰此人若水鏡毎見瑩然若開雲霧而覩青天行不迷道魏畧劉翊鳴毎出行雲霧中識道不迷時人因謂之能為雲霧如晦髙褰褰開也蒙昬隠翳助海成深見露門浪泊西馬援在浪泊西里間虜未滅時下潦上霧毒氣薫蒸仰觀烏鳶跕跕墮水中夕霧朝煙冒重霧博物志云王爾張衡馬均三人冒重霧行一人無恙一人病一人死問其故無恙人云我飲酒病者食死者空腹終隠南山霧謝眺詩曰雖無元豹姿終隠南山霧覩青天徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之若披雲見日月開霧覩青天孔如墮崔彦曽為徐州觀察使龎勛陷宿州彦曾料丁男乗城俄而勛傅城城中大霧如墮塞庭崔沆乾符五年同平章事昕旦告麻大霧塞庭中晝𡨕竇建徳隋右翊衛将軍薛世䧺督兵三萬討之屯河間七星井㑹大霧晝𡨕跬不可視隋軍驚潰紛霧如雪五行志大厯二年十一月紛霧如雪宿霧洞開髣髴有像神仙下来顥氣氤氲仙都山銘白霧生而匝地文粹楊炯少室廟銘曰白霧生而匝地霧雨如泣五代郭允明謀殺楊邠等是日無雲而昏霧雨如泣百邪之氣五行志霧者百邪之氣為隂冐陽本于地而應于天乗霧行蘇烈貞觀初從李靖襲突厥頡利於磧口為前鋒乘霧行去賊一里許霧霽能為數里霧韓似在桂州有妖賊封盈能為數里霧聲言某日将攻桂州有紫氣者我必勝至期果紫氣如疋帛自山亘于州城白氣直衝之紫氣遂㪚天忽大霧至午稍開霽酉陽雜爼霏㣲誤噓吸膚腠生寒慄韋蘇州凌霧行纔看含鬢白稍視霑衣宻道騎全不分郊樹都如失霏㣲誤嘘吸膚腠生寒慄毎殺不辜天必大霧希聲矯殷令殺髙郁是日大霧四塞殷恠之曰吾嘗從孫儒每殺不辜天必大霧豈馬歩獄有寃死乎明日吏以状白殷撫膺大哭五代史楚世家晝昏天寶間霧昏暗十歩外不見人是謂晝昏占曰有破國霧連日不解其國昏亂景龍三年十一月甲寅日入後昏霧四塞經二日乃止占曰霧連日不解其國昏亂同上寒日出霧遲杜甫早發射洪詩碧牕宿霧濛濛濕同上天景晴麗必有素霧山水小牘汝南臨汝縣南十八里廣城陂之西垠有小山曰崆峒耆老云若九春三秋天景晴麗必有素霧自山嵓起湏㬰粉堞青甃彌亘數里樓殿轇轕花木煥爛數息中霧勢映漫不復見矣庸軰不知神仙窟宅謂廣成子化城乃俚談也天大昏霧五代康懐英荘宗謂周徳威曰梁謂我新立宜出其不意擊之疾馳六日至北黄碾㑹天大昏霧伏兵三垂岡直趨夾城攻破之懐英大敗宿霧浥髙旻韓愈詩霽霧搴髙牖杜甫大雲寺晝霧夜晴臣志得申唐五行志黄霧昬濁不雨景龍二年八月甲戌黄霧昏濁不雨同上白霧四塞至德二載四月賊将武令珣圍南陽白霧四塞黄霧四塞日無光貞元十年三月乙亥黄霧四塞日無光同上大霧昏塞咸通九年十一月龎勛圍徐甲辰大霧昏塞至于丙午冰二藏冰開冰附白履霜堅冰積水所成増氷為積水所成積水曽㣲増氷之凜渙若氷将釋履薄戰戰兢兢如履薄氷渉春心之憂危如渉春氷固沍凝也淋漓泮也冰以風壮風解立春日東風解凍月令冬凝春泮淮南子水冬則凝而為氷春則泮而為水皚皚思元賦云行積冰之皚皚清泉沍而不流清如玉壺氷始氷立冬日水始氷月令水有時以凝周禮不冶之氷陽冰不冶海賦時燠公羊冬無氷時燠也六尺晁錯上書曰胡貉之地氷厚六尺百丈神異經曰北有氷萬里厚百丈東海蠶拾遺記東海員嶠山有氷蠶以霜雪覆之則為繭色有五彩增氷峩峩楚辭未泮迨氷未沣馴致易曰履霜堅氷隂始凝也馴致其道至堅氷也渙然氷釋飲氷荘子曰朝受命而夕飲氷我其内熱與蟲疑荘子曰夏蟲不可與語氷天台山賦哂夏蟲之疑氷魚上立春日東風解凍後五日魚上氷月令光武渡河光武至滹沱河追兵至河水流澌無船可渡使王霸往視霸恐驚衆還曰氷堅可渡比至氷合帝遂得渡慕容蹈海王隠晉書慕容皝上言躬征郭逺假陛下天地之威精誠感靈為結氷凌行海中三百里鳥覆姜嫄踐大人跡生子弃之寒氷上鳥翼覆之魚躍王祥母欲生魚祥解衣将剖氷求之氷忽自解雙鯉躍出狐聽述征記曰河水始合要狐先行方得渡言狐欲渡河氷先聽無水聲而後過陷氷丸後漢青州刺史焦和召治戎烈巫史禜禱又恐賊乘氷過多作陷冰丸投河衆賊遂潰袁譚魏志初袁譚時民亡椎氷注時川凍合不得降火冰博物志曰削氷令圓舉以向日又以艾承其影則有火出琢冰文子曰巧冶不能銷木良匠不能琢氷負重鄧拱上書曰明君之御民若乗奔而無轡履氷而負重寒冰荀子氷生於水而寒於水瓶中冰淮南子曰見一葉之落知嵗之将暮覩瓶中之氷知天下之寒以近論逺誕寘之寒冰鳥覆翼之詩姜嫄尺冰見火門一􅀢火注抱冰吴越春秋曰越王念欲復怨非一旦也苦思勞心夜以接日寒則抱冰當白日見火門猛火注凝池束晳集曰澗薄氷凝非登廟之寶零露垂林非綴冠之飾必将採素璧於層山撰圓珠於重泉北方䑕神異經曰北方氷厚百尺有䑕在氷下其䑕毛長百尺藏冰二之日鑿冰沖沖聲也三之日納于凌隂氷室也今正月四之日其蚤獻羔祭韭圵陸日在北陸而藏氷今十二月取之窮谷深山窮谷固隂沍寒於是取之享司寒其藏之也黒牡秬黍以享司寒司寒𤣥𡨕北方神也山人取之縣人傳之輿人納之𨽻人藏之藏之也周周宻也七月之卒章藏氷之道也豳國風詩方盛季冬天子命有司氷方盛命取而藏之禮納於冰室取以山人當栗烈之辰入沍寒之室文選雅恊豳詩未乖周禮慮蟲疑之時不可闕也及狐聽之日于以藏之斬冰周禮凌人掌氷嵗十二月令斬氷三其凌注三倍其氷為消釋無或失時令藏川池之冰棄而不用言不取於山谷又頒用之餘則棄之開冰四之日其蚤獻羔祭韭西陸朝覿而出之今三月出入以時開冰春分後天子獻羔開氷先薦寝廟朝之禄位賔食喪祭於是乎用之桃弧棘矢其出之也桃弧棘矢以除其災食肉之禄氷皆與焉喪浴大夫命婦喪浴用氷獻羔而啟之火出而畢賦老疾大夫命婦至于老疾無不受氷以風壮而以風出其用之徧山人冬鑿冰室春開玉壺夏薦取順沍寒用資清暑致夏蟲之疑闕而為罪遇時燠之變責則難加春始治鑑鑑盛氷器也将獻羔啟氷也夷盤亦器也喪事供夷盤氷所以寒尸置床也頒冰夏頒氷注夏暑氣盛乃頒賜氷也伐冰之家不畜牛羊夏頒秋刷刷除氷室更納新氷凌人職祭祀供鑑賔客供冰大喪供夷盤冰孔冰一夕合王方翼七月次葉河無舟而冰一夕合時以為祥次鴨緑水契苾何力拜遼東大總管次鴨緑水盖蘇文遣男以精兵數萬拒險衆莫敢濟㑹冰合何力引兵譟而濟賊驚遂潰逐鹿回鶻祓野古族乘木逐鹿冰上木冰五行志永徽二年十一月甲申隂霧凝凍封樹木數日不解劉向以為木少陽貴臣象此人将有害則隂氣脅木先寒故得雨而冰也亦謂之樹介介兵象也海冰長慶元年二月海州海水冰南北二百里東望無際有文如畫五行志景福中滄州城壍中氷有文如畫大樹華葉芬敷者時人以為其地當有兵難近華孽也氷井百官志上林署季冬藏冰千段先立春三日納之氷井以黒牡秬黍祭司寒啟氷亦如之乗木馬馳冰上回鶻俗乗木馬馳冰上以板藉足屈木支腋蹴輙百步勢迅激糜冰吐谷渾任城王道宗行空荒二千里乏水草士糜氷踐冰東夷流鬼以木廣六寸長七尺系其上以踐冰常堅冰唐杜陽編順宗即位嵗拘弭國貢常堅氷其國有大凝山中有氷千年不釋及賫至京師潔冷如故雖盛暑赫日終不消嚼之即與中國者無異冰筯唐開元遺事冬日雪霽寒結簷溜皆為氷條妃子使侍兒取翫帝晚朝廻問之妃子答曰所玩冰筯也粉壁生寒象筵布韋蘇州夏冰歌碎如墜瓊方絶璐粉壁生寒象筵布玉壺紈扇亦玲瓏座有麗人色俱素又出自元泉杳杳之深井浮彩浩浩仰吞素靈韋蘇州氷賦壮以烈風積如羣玉浮彩浩浩仰吞素靈古者祭之以黒牡其藏以節祓之以桃弧其出以潔又云碎似墜瓊方如截璐况粉壁雲矗象筵霜布坐有麗人皎然俱素紅冰唐開元遺事楊妃初承恩詔與父母相别泣涕登車時天寒淚結紅冰長安冰雪至夏價等金璧止戈集千嵗積冰結為玻瓈出酉陽雜爼冰脉勾沚冰解脉杜牧逰石盎夏至頒冰及酒以酒味濃和冰而飲李德裕一品集註冰梁飛雪斷道冰成梁栁宗元冰山避暑楊氏子弟至伏中取大冰琢成山周圍宴席坐客雖酒酣各有寒色有挾纊者開元遺事敲冰煮茗逸人王休居太白山下毎冬時取溪冰琢其精瑩者煑茗以供賔客冰獸見伏日門峻塗拖長冰直上若懸溜韓愈南山詩池冰作花如纈開成末河陽黄魚池池氷作花如纈酉陽雜爼峥嶸如山出酉陽雜爼皓曜羣玉發淒清孤景澄韋應物詩盛夏常凍西域弗栗恃䕶苾那城東北大雪山盛夏常鑿氷乃可度火三火災救火禳祭附白火就燥易炎上書作苦炎上作苦鑚燧改火燧人氏始用火春取榆栁之火夏取棗杏之火秋取柞槱之火冬取槐檀之火一年中鑽火各異逐時色燎原若火之燎于原不可嚮邇火烈人望而畏之則鮮死焉災煇國語火無災曰煇焰焰無若火始焰焰厥攸灼序不其絶嚮邇不可嚮邇撲滅其猶可撲滅言不可近自焚兵猶火也弗戢将自焚盛徳在火立夏月令方陽詩云燎方陽烈烈如火烈烈詩望畏見上注蹈死見論語鬱彼火氣尊而不親火之於人也尊而不親丹邱拾遺録云丹邱千年之燒陽精炎徳生木剋金抱薪救火文子回禄火神陽精上騰炎氣旁達餘燼司爟周禮司爟掌行火之政令四時變國火以救時疾内火出火季春出火季秋納火注云順火星藏見而出納火也火令時則施火令注謂今焚菜之時火禁宫正春秋以木鐸修火禁因火星入戒司烜司烜氏以陽燧取火於日以供祭祀之明燭以照祭也無焚山林月令仲春火化器食皆以火化修火之利火之利人也禮金燧注云取火於日焚巫尪魯旱公欲焚之閼伯陶唐氏火正食心食咮古火正或食於心或食於咮謂有功於職得配享火星心鶉星咮鶉首也火紀炎帝以火紀為火師而火名官燔柴祭天蜀井蜀都賦火井沉熒於幽泉髙燄飛扇齊牛齊将田單燒牛以破燕軍楚象傳曰楚昭王使執燧象以奔吴師謂以火繫象尾燒秦宫室史項羽燒秦宫室火三月不滅燒棧張良勸漢王焚舟秦孟明爝火不息荘子堯讓許由曰日月出矣而爝火不息其光也不亦難乎束藴蒯通請火更火馬融云周月令有更火配五行而攸序備六府而孔修燒劵馮驩燒劵市義於薛人焚山晉侯焚山求賢於介子焚裘晉帝焚雉頭裘冰火見冰門火冰注一茞火論衡曰夫然一茞火爨一尺氷終日不熱持一尺氷置庖㕑中終夜不寒何也㣲之感大不能動也今鄒子不過如茞火尺氷而皇天巨大不徒鑊水庖㕑也一仰天嘆天為雨霜何天之易感霜之易降握吴越春秋越王欲報吴王苦思勞心夜以接日夏熱則握火出入則嘗膽吐火葛仙公别傳曰公與客談話時天寒公謂客曰居貧不能人人得爐火請作一大火以共煖焉仙公因吐氣火赫然從口而出湏㬰火滿室坐客皆熱脱衣矣愛火韓詩曰不數易非愛火也火災人火曰火天火曰災俱焚火炎崑岡玉石俱焚不戢将自焚廏焚吴宫鷰秦始皇時吴宫吏以火照鷰窠因燒吴宫夷陵白起攻楚燒夷陵禍之釁必始於火商人闚其禍敗必始於火是以知天道将有火士伯對晉侯鑄刑書鄭鑄刑書士文伯曰火見鄭其火乎火而出而作火火出而象之呌宋廟焚吴宫鳥鳴或呌宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆書焚室而寛其征與之財鄭子産宋伯姬介子推哭禮有焚先人之廟者則哭三日拜廏焚孔子拜鄉人之為火來者劍飛出晉武庫火累代寶盡焚見斬蛇劍飛出屋池魚殃及池魚宫鷰天火蜀糜竺子仲自洛歸去家數十里路旁有好新婦求載行二十餘里告曰我天使也使燒東海糜竺家竺因愁請之婦曰不得不燒但君馳去我緩行日中火必發竺乃急歸出財物日中火果大發官署失火近廟晉尚書荀顗曰近太祝署失火燒三間半署在廟北隔道在重墻之内又即已滅頻為詔㫖所問主者以詔聞顗責尚書不按行禁止此軰皆為過當償財梁鴻家貧牧豕誤燒火延及他舍鴻乃尋訪燒者問所失悉以其豕償之其主猶以為少鴻曰無他財願以身傭力償之失火有刑司爟掌行火之政令凡國失火野焚萊則有刑罰焉注野焚萊擅放火者救火濟濡帷幕鬰攸從之象葺公屋徹屋樂喜火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重蓄水潦積土塗廵丈城繕守偹表火道具正徒令燧正奔火撲滅見前行火所焮子産令焮炭也抱薪去藁傳去表之藁注表火道藁草也曲突徙薪無恩澤焦頭爛額為上客漢時人有上書論徐福先言霍氏也先言魏勃曰失火之家豈暇先言後救火襦袴㢘范為蜀守不禁火但嚴水偹人歌曰不禁火人安堵昔無襦今五袴降雨江陵令劉昆向火叩頭能反風降雨滅火徵拜議郎三噀郭憲救齊火噀酒欒巴救蜀火雖政在救災而仁唯愛物季桓為政猶止傷人尼父退朝不問乎焉徒望成都之雨誰反江陵之風望而畏之蹈而死者濡馬褐救火起屋漢書言越俗起屋以厭火柏梁災而作建章以厭火囚脱械救火劉榮坐事郡付縣獄為野火所及榮脱械救火事畢還獄自著械禳祭宋樂喜使祝宗用馬於四墉墉城也積隂之氣故祝之祀盤庚西門之外天災有幣無牲用馬祀盤庚皆非禮𤣥𡨕回禄鄭子産禳火於𤣥𡨕回禄𤣥𡨕水神回禄火神祈于四墉子産三日哭國不市大為社祓禳於四方振除火災禮也子産祭爟爟火也祭之者報其為明之功也周禮孔設燎太平公主下降自興安門設燎相屬道樾為枯昭徳寺火温造大和二年内昭徳寺火延禁中野狐落野狐落者宫人所居也死者數百人是日宰相兩省官京兆尹樞宻皆集日華門督神䇿兵救火獨御史府不至造自劾曰臺擊賊恐人緣以結姦人火姚璹證聖初加秋官尚書明堂火后欲退正殿應天變璹奏此人火非天災也多火宋璟徙廣州都督廣人以竹茅茨屋多火璟教之陶瓦築堵列邸肆越俗始知棟梁利而無患禁中火近東宫趙涓始永泰時禁中火近東宫代宗疑之涓以監察御史為廵使驗治明諦迹火所來乃宦人直舍天火鍾傳圖撫州天火其城燧人有興食火之利栁宗元爐存火似紅杜甫詩畬田費火聲同上隄松江為路變屋瓦王仲舒徙蘇州隄松江為路變屋瓦絶火災開大衢䟽析廛閈杜佑遷嶺南節度為開大衢疏析廛閈以息火災夜焚槀積約救火則亂叚秀實大厯二年徙涇州是軍自四鎮北庭赴難征伐數有功既驟徙相與出怨言别将王童之謀作亂明日人有以其謀告者曰夜焚槀積約救火則亂秀實嚴警偹夜中果火發令軍中曰敢救者斬童之居外請入不許明日捕之并其黨八人斬以狥曰後徙者族軍遂遷涇州野火逮塋樹孝友許伯㑹越州蕭山人母喪野火将逮塋樹悲號于天俄而雨火滅登鷰子樓自焚時溥朱全忠使龎師古代友裕溥分兵固保石佛山師古攻㧞之自是完壘不戰王重師牛存節等梯其堞時溥取金玉與妻子登鷰子樓自焚死火輙隨發吴越錢元瓘天福六年杭州大火燒其宫室迨盡元瓘避之火輙隨發元瓘大懼因病狂㜸煨潜扇劉承慶明堂灾䟽㜸煨潜扇倐忽成災熛焱熾突哥舒翰傳負薪塞路順風火其車熛焱熾突騰煙如夜滅炬弗焚黄巢圍福州過崇文舘黄璞家令曰此儒者滅炬弗焚燭天吐蕃入豐義圍華亭守将求救於隴州刺史蘇清沔合兵赴之虜積薪将焚華亭清沔潜兵大象龕夜半約城中舉火燭天虜驚因襲其營乃去士寒附火嚴震朱泚反奉天危􅕚震聞馳表奉迎遣大将張用誠以兵扞衛至盩厔有反計㑹震牙将馬勛嗣至用誠未知其謀隂令焚草舘外士寒争附火景亂水中永王璘領山南江西嶺南黔中四道節度使李銑陳江北夜然束葦人執二炬景亂水中覘者以倍告璘軍亦舉火應之璘疑王師已濟携兒女及麾下遁去遲明覺其紿復入城鬱焰四興髙麗九月藏遣男産率首領百人樹素幡降且請入朝李勣以禮見而男建猶固守出戰數北大将浮屠信誠遣諜約内應五日啟兵燥而出火其門鬱焰四興叱火九國志吴盧文進遷潤州節度城中火救之不息文進怒自出州門使召馬步使将斬之聲至火即滅廣夀殿火明宗廣夀殿火災有司理之請加丹艧喟然嘆曰天以火戒我我豈宜增以侈耶五代史明宗夲紀截然髙周燒四垣神焦鬼爛無逃門陸渾山火詩韓文彤幢絳旃彤幢絳旃紫纛旛炎官熱屬朱冠褌同上霞車紅靷日轂轓丹蕤縓葢緋繙㠾同上八人翟天師乾祐常入䕫州市大言曰今夕當有八人過此可善待之人不之悟其夜火焚數百家八人乃火字也出酉陽雜爼火洩於宻而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣韓文火傘光華閃壁見神鬼赫赫炎官張火傘韓愈青龍寺炖于融風潜火煽孽炖于融風栁宗元湘源妃碑赤龍遊𤣥都金烏入梵天赤龍遊𤣥都武陵觀火劉禹錫星雨灑中衢火出摧半空星雨灑中衢同上驗火登仙文粹渾天賦師門何術兮驗火而登仙楊炯長熛長熛烘舳艫觀火詩吹熒吹熒照水府同上女丁婦壬傳世婚韓文陸渾山火却火錐唐順宗時拘彌國所貢杜陽編雷門四老石事畧王維輞川林下坐用雷門四老石燈滅則石中鑚火玉火唐東夷所貢色赤見玉門杜陽編却火鳥順宗朝拘彌國貢雀一雌一䧺純黒色大小似燕其聲清厲殆不類尋常禽鳥若置於烈火中而火自㪚去帝嘉其異以水精籠盛之宫人以蠟炬燒之終不能損毛羽永州多火災五年之間四為大火所廹跣足出壊墻壁穴牖僅免燔灼一遇火恐累日茫洋不能出言栁文紅衣尼芝田録唐相賈耽退歸第令召上東門卒嚴戒之曰明日當午有異色人入門爾必痛擊之死且無妨門卒禀命自巳至午果有二尼自東相序而至施朱傅粉冶容艶佚如倡人之婦其衣紅色卒因以撾痛擊之行去百步忽不見卒以告耽耽嘆曰然不免小有災矣翌日東市奏火延百十家灰四白積而止水女媧取以救災淮南子云古往之時水浩蕩不息於是女媧積蘆灰以止水㪚以從風楊琰用而破敵後漢楊琰為零陵太守時蒼梧羣賊攻刼琰乃制車數十乗置灰車中從風㪚灰賊不得視因以敗之禁其棄道史商君之法禁棄灰於道死而不然韓安國字長孺坐枉法獄吏田甲辱之安國曰死灰獨不然乎甲曰然則溺之環月暈淮南子畫隨灰而暈闕注云以蘆灰環月闕其一面暈亦隨而闕應律飛續漢書以葭莩灰實律之端按厯而候之其月氣至則飛灰而管通昆明刼灰武帝穿昆明池悉是灰墨有外國胡道人云此是天地劫灰之餘心若死灰荘子煨燼洗膓之用三斗孔取煨汰寶文懿公主薨以金貝寓車廞服火之民争取煨以汰寳灰埃儒學序集賢殿部分典籍乾元殿博彚羣書經籍大偹又稱開元焉禄山之禍兩京所藏一為灰埃典䇿埃滅唐公主賛僖昭之亂典䇿埃滅故亡者闕而不書采灰食貨志奉天鹵池生水栢以灰一斛得鹽十二斤利倍鹻鹵文宗時采灰一斗比鹽一斤論罪地有殘灰咸通十四年成都童謡曰蛇去馬来道路稍開頭無片瓦地有殘灰白檀灰唐開元遺事楊國忠冬月以白檀灰鋪爐底餘灰可參雜也煨塵魏元忠上封事士之懐琬琰就煨塵灑灰周公所不堪灑灰垂教典韓愈食蝦蟇詩吟咏思管樂此人已成灰李白玉真别舘寒灰重煖愁来飲酒二千石寒灰重煖生陽春江夏贈韋氷詩輕我土與灰遂令世上愚輕我土與灰酬張卿詩階除灰死燒丹火憶昔行寒燼劉禹錫福成寺髙門脩廊委為寒燼寒爐委灰劉禹錫傷往賦風臺露榭生光飾死灰棄置參與商栁宗元潰為埃煤劉禹錫驛路記潰為埃煤一篲可掃自然灰酉陽雜爼凡彫琉璃先以自然灰煑令軟灰出海南間夷陵土黒有秦灰劉禹錫望硤中灰劫問胡僧杜甫寄劉峽州燼火滿庭灰元稹詩塵五白生羅韈羅韈生塵化素衣京洛多風塵素衣化為緇生甑中范丹為莱蕪令甑中生塵動梁上虞公善歌發聲動梁塵浮清路君為清路塵妾為濁水泥浮沉各異勢古詩云増髙山山不讓塵故能成其髙大揚滄海神仙傳王君平曰聖人言海中復揚塵紅塵四合黄埃紅塵晝昏清塵維塵𡨕𡨕詩望之而拜潘岳芳塵凝榭滿席輿曵柴而偽遁傳晉楚戰狐毛設二斾而退之欒枝使輿曵柴而偽遁注曵柴起塵詐為衆走塵上而嚻伯州犂望楚軍望塵知馬歩多少名将車軌塵長者禮凡為長者糞之禮必加箒於箕上以袂拘而退其塵不及於長者鳴鳶前有塵埃則戴鳴鳶禮同其塵老子曰和其光而同其塵野馬荘子曰野馬動塵埃也世俗之塵楚辭曰安以皓皓之白蒙世俗之塵埃歸東南淮南子地不滿東南故水潦塵埃歸焉撫塵應璩與曹公書曰昔漢光武與黄子髙有撫塵之好也𤣥蛇山海經曰黒水之南有蛇日食塵又大人之國有𤣥蛇頭方食塵蚓蔡邕云蚓無爪牙軟弱不便穿穴地洞食塵飲泉蓬塊㧞坱博物志云徐州人謂塵為蓬塊吴人謂塵土為㧞坱棲弱草李康遊山序曰盖人生天地之間也若流電之過户牖輕塵之棲弱草汚人郭子曰庾公名位漸重足傾王公時庾在石城王導在都城因風起揚塵王以扇拂之曰元規塵汚人元規庾亮字也孔煙塵漫數十里張介然安禄山反守陳留到屯不三日賊已渡河車騎躁騰煙塵漫數十里日為奪色曵柴揚塵顔杲鄉檄河北言王師二十萬入土門遣郭仲邕為先鋒馳而南曵柴揚塵望者謂大軍至流積武攸暨盤桓龍門少室間所賜金銀鐺鬲野服王公所遺鹿裘素障癭杯塵皆流積不御也三斗塵寧食三斗塵無逢權懐恩煙塵障天裴行儉附史那伏念偽稱可汗行儉摠諸軍頓涇口後數日煙塵障天而南斥堠惶駭飛埃結紅霧唐開元遺事長安春時盛於遊賞故學士蘇頲應制詩云飛埃結紅霧游盖飄青雲帝覽詩嘉焉以御花親挿頲巾上肥馬塵杜甫詩暮隨肥馬塵滿席楊綰凝塵滿席澹如也埃霧囂塞李宻王世充决戰既兩軍接埃霧囂塞辟塵巾髙瑀在蔡州有軍匠田知廻易折欠數百萬令錮勘有處士皇甫貞元者謂田曰當為君解此難遂謁髙曰某於新羅獲一辟塵巾欲獻此贖田髙纔熱已覺體中虚凉請試之翌日宴于郭外時乆旱埃塵且甚髙顧視馬尾鬛及左右騶卒數人並無塵埃監軍固求見皇甫具述救田之意且言餘一針可令一身無塵針金色大如布針試之塵唯及馬髪尾焉出酉陽雜爼辟塵針見上隔兩塵異人丁約隠於卒伍韋子威師事之一日辭去謂子威曰郎君得道尚隔兩塵子威問其故約曰儒謂