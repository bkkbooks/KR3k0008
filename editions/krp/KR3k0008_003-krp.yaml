種不入今孟春講武以隂政犯陽氣害發生之徳臣恐水潦敗物雪霜損稼夏麥不登願陛下不違時令前及孟冬以順天道手制褒允擲金錢為戯唐開元遺事云内庭嬪妃毎至春時於禁中結伴擲金錢為戯迎氣東郊𤣥宗開元二十六年正月丁丑迎氣于東郊二月獻牙尺百官志中尚署獻牙尺布德和令栁宗元時令論古之為政者非春無以布德和令行慶施惠飬幼少省囹圄賜貧窮禮賢者則其闕政亦以繁矣候啟新風陽開初蟄唐文粹魏徵祀青帝曲候啟新風陽開初蟄吞花卧酒曲江春宴録握月擔風且留後日吞花卧酒不可過時問栁尋花到野亭嚴中丞見過杜甫盤出髙門行白玉菜傳纎手送青絲立春置惜春御史唐玉塵集穆宗毎宫中花開則以重頂帳蒙蔽欄檻置惜春御史掌之綵花樹唐酉陽雜爼立春日侍臣綵花樹挂紅餤曲江春宴録春遊之家以脂粉作紅餤挂竿上前引車馬進春書以青繒為幟酉陽雜爼北朝婦人立春進春書以青繒為幟刻龍像衘之或為蝦蟇有脚陽春宋璟愛民惜物朝野歸美人咸謂有脚陽春出天寳遺事臘月寒盡温風發榮劉禹錫楚望賦觸類皆滋陽春播澤觸類皆滋張九齡龍池聖徳頌序嵗始春者嵗之始劉蕡制䇿懸法象魏文粹含元殿賦及乎獻嵗元辰東風發春懸法象魏與人惟新李華萬木華發文粹獨孤及郎邪溪逰序仲春氣至萬木華發觥濁醪而藉落英文粹獨孤及仲春裴宅燕集序與君觥濁醪而藉落英不知年華之相親風景融韋蘇州春序風景融百花師子曲江春宴録曲江貴家逰賞則剪百花装成師子互相送遺師有小連環欲送則以蜀錦流蘇牽之唱曰春光且莫去留與醉人看春之氣兮悦萬族獨含嚬兮千里目以鳥鳴春韓文護花金鈴寧王每花時綴金鈴於花下以驚禽謂之䕶花金鈴裙幄長安士女逰春野步遇名花則藉草而坐解裙四圍遮遶如弈棊焉故謂之裙幄春滋乎堇荼未嘗擇善劉禹錫天論川波岸栁韓文感春洛陽東風㡬時来川波岸栁春全廻暄風暖景同上暄風暖景明年日岸栁動兮渚花落白居易泛渭賦習習兮春風岸栁動兮渚花落春冉冉其将盡予何為乎不樂披香殿前花始紅李白歌披香殿前花始紅流芳發色繡户中水蕩漾兮碧色蘭葳蕤兮紅芳平原萋兮綺色愛芳草兮如剪李白惜餘春賦景物明媚羯鼓録帝當春曉景物明媚曰對此豈可不與他判斷取羯鼓擊之自製一曲名春光好曲終桃杏皆折笑謂侍臣曰此一事不喚我作天工可乎燕草如碧絲李白春思燕草如碧絲秦桑低緑枝寒盡春生洛陽殿杜甫立春日親迎春于東郊開元詔雜花粧林草盖地白日坐上傾天維蜂喧鳥咽留不得紅蔓萬片従風吹韓文挿花賞詩見前鬪花天寳遺事長安士女春時鬪花戴挿以竒花多者為勝皆用千金市名花植於庭苑中以偹春時之鬪山明宿雨霽風煖百卉舒韋應物休沭詩新黄含逺林㣲緑生陳根送豆盧詩𡨕𡨕花正開颺颺新燕乳長安遇貧者暄節西郊新禽弄暄節南亭草心緑春塘泉脉動南亭上樓迎春新春歸李賀正月樂辭上樓迎春新春歸暗黄着栁宫漏遲薄薄淡靄弄野姿複宫深殿竹風起三月流水飄香去不歸棃花落盡成秋苑同上三月樂辭始見洛陽春桃枝綴紅糝韓文夏八立夏五月夏至附四月六月白其日丙丁帝炎帝神祝融夏日可畏朱明夏為南交春與夏交之際南訛訛化也南方化育之事暑雨小人怨咨長嬴夏為南交之序政失於夏文子其蟲羽音徵律中仲吕數七性禮事視味苦臭焦祀竈祭先心夏之日食菽與彘當暑司夏魏相南方之神炎帝乗離執衡司夏其器髙以粗朱夏梁元帝纂要曰夏曰朱夏亦曰長嬴炎夏三夏九夏也天曰昊天風曰炎風節曰炎節亦曰暑節也草木草曰茂草雜草林曰蔚林茂林樹曰茂樹維夏亦曰孟夏首夏初夏甘𤓰朱李魏文與吴質書曰浮甘𤓰於清泉沉朱李於寒水象徳范子與計然書曰徳取象於春夏景曰畏景立夏立夏日螻蟈鳴盛德在火迎夏於南郊立夏日啟閉啟立夏也司閉丹鳥氏以立夏立冬去夏至夏至日鹿角解日長至隂陽争日永星火陽極隂生夏至日一隂生分至至冬至也司至伯趙氏以夏至來冬至去伯趙伯勞也漢雜事冬至陽事起君道長故賀夏至隂事起君道衰故不賀受餉齊春秋何敬叔為長城令清㢘夏節忽榜門受餉得米二千八百斗代貧人輸租税閉關易曰君子至日閉關商旅不行后不省方影長尺有五之中禮云夏至日在東井四月日在昴律中仲吕維夏四月維夏清和首夏猶清和正陽之月匿未作匿隠也未作氣未挺祈雨師祈糓實小暑至挺重囚挺寛也出輕繫繼長增髙無有隳壊驅獸無害五榖飲酎以彘嘗麥溺金象世説四月八日孫皓溺金象云浴佛後隂病懴悔乃差立夏日螻蟈鳴四月節也後五日蚯蚓出後五日王𤓰生慶賜遂行無不欣悦賛傑俊遂賢良舉長大行爵出禄必當其位習盛樂大雩帝自鞀鞞至柷敔皆作曰盛樂禱祝山川古卿士有益於人者以祈榖實小滿之日苦菜秀中氣也後五日靡草死後五日小暑至無起土功無發大衆無伐大樹妨蠶農也無大田獵驅獸類也恐傷生類登麥天子乃以彘嘗麥羞以含桃先薦寝廟收繭税秀葽豳詩五月日在參律中蕤賔麥秋五月鳴蜩反舌無聲關市無索遊牝别羣摯騰駒班馬政祭先牧芒種日螗蜋生五月節也後五日鵙始鳴後五日反舌無聲聚蓄百藥草木蕃時夏至日鹿角解中氣也後五日蜩始鳴後五日半夏生祀黄地祗於方丘岳瀆等神従祀夏至日百官静事無刑以定晏隂之所成晏安也隂猶安也無用火南方害㣲隂也可以居髙明斯螽動股豳詩掩身無躁君子處必掩身無躁六月日在東井律中林鍾徂暑六月徂暑土潤溽暑大雨時行燒薙行水利以殺草糞田疇入山行木無有斬伐暑退火中寒暑乃退謂季夏及季冬小暑日温風至六月節也後五日蟋蟀居壁後五日鷹乃學習染采黼黻文章必以法故以給郊廟之服以為旗章大暑日腐草為螢中氣也後五日土潤溽暑後五日大雨時行不可以興土功不可以合諸侯不可以起兵動衆注云土将用事欲静莎雞振羽食鬱及薁並豳詩鬱棣屬也薁蘡薁也孔造牓天陸扆累遷翰林學士始扆舉進士時方還率而六月牓出至是毎盛暑他學士輙戯曰造牓天也以譏扆進非其時宴葡萄園李適為學士凡天子饗㑹逰豫惟宰相及學士得從夏宴葡萄園賜朱櫻上下歊赩韓愈文六月隆熱上下歊赩曉凉暮凉樹如蓋李賀四月曉凉暮凉樹如盖千山浪緑生雲外依㣲香雨生氤氲膩葉蟠花照曲門景熾氣燠栁宗元文五月獻綬帶百官志中尚署五月獻綬帶薫風自南來文宗嘗與栁公權聨句帝曰人皆苦炎熱我愛夏日長公權屬和曰薰風自南來殿閣生㣲凉節嗜慾栁宗元時令論炎月李徳裕傳迎凉草唐蘇鶚杜陽編曰李輔國家夏則於堂中設迎凉草其色類碧而幹似枯竹葉細如杉雖若乾枯而未嘗凋落盛夏掛之忩戸間則凉風自至冰雪價等金璧止戈集長安氷雪至夏月價等金壁白少傅詩名動於閭閻毎湏氷雪論筐不復償價日日如是進扇北朝婦人夏至日進扇按轡木隂元宗幸洛至繡嶺宫時屬炎暑上曰姚崇多計令力士探廻奏曰崇方紾絺乗小駟按轡木隂上乃命小駟頓忘繁溽出開元記晝蠅宵蚋韓愈納凉聨句晝蠅食案繁宵蚋肌血渥曦赫歊蒸渉夏如鑠逮秋愈熾土山焦熬止水瀵沸翔禽跕墮呀咮垂翅曦赫歊蒸陽極反隂劉禹錫楚望賦鬱蒸之候槿榮芳園蟬嘯珍木盖紀乎南火之月也李白夏日登龍興閣序解帶外堂吕温虢州三堂記濯濯漣漪解帶外堂以雷鳴夏韓文結棚避暑長安富人毎至暑伏中各於林亭内植畫柱以錦結為凉棚設坐具召長安名姝間坐逓請為避暑㑹人皆愛羡開元遺事緑筠尚含粉圓荷始㪚芳於焉洒煩抱可以對華觴韋應物避暑北池鏡湖三百里李白子夜吴歌鏡湖三百里菡蓞發荷花五月西施採人看隘若耶喬樹落踈隂㣲風散煩燠韋應物寄子西清夏飬病惬清夏郊原敷卉木長風始飄閣疊雲纔吐嶺立夏日池荷初貼水林花已掃園同上重門永日掩清池夏雲生同上夏景端居即事郊園夏雨歇閒院緑隂生同上答端井汲鉛華水扇織鴛鴦文李賀五月樂辭夏至獻雷車百官志中尚署秋九立秋八月秋分附七月九月白其日庚辛帝少皥神蓐収秋為白藏嵗云秋矣悲哉秋之為氣秋日淒淒秋風嫋嫋一葉落知天下秋金方戒序白帝用事其蟲毛音商數七性義事言味辛臭腥祀門祭先肺食稻與魚器㢘以深寅餞納日平秩西成獻龜魚周禮草木揺落而變衰敗蘭文子曰叢蘭欲芳秋風敗之秋毫離婁百歩見秋毫之末素秋戒以白露申之嚴霜悲秋騷皇天平分四時竊獨悲此凛秋司秋魏相曰西方之神少昊乗兑執矩司秋商風清風収成梁元纂要曰秋曰収成亦曰白藏亦曰三秋九秋素秋髙秋商秋天曰旻天風曰商風金風素風淒風髙風凉風激風悲風景曰朗景澄景清景時曰淒辰霜辰節曰素節草木衰草木曰踈木衰林霜柯霜條肇秋亦曰孟秋初秋上秋早秋首秋蘭秋西成之序政失於秋文子立秋立秋日凉風至盛徳在金迎秋於西郊立秋日署吏孫寶為京兆尹署侯文為東都督郵勑曰今鷹隼始擊當従天氣取姦惡以成嚴霜之誅漢儀斬牲晉書曰漢儀立秋日自郊禮畢始揚威武斬牲於東門薦陵廟其儀乗輿御戎車白馬朱鬛躬執弩射牲牲薦鹿麛謁者各一人載以獲車馳送陵廟還官遣齎束帛賜武官武官肄兵習戰之儀斬牲之禮名曰貙劉兵官皆肄孫吴之兵法六十四陣也迎氣司馬彪續漢書曰立秋之日夜漏未盡五刻京都百官皆衣帛施皂領緑中衣迎氣西郊秋分雷乃收聲日夜分司分𤣥鳥歸同道傳曰分同道也注云日夜等故曰同道七月日在張律中夷則流火七月流火天地始肅禾乃登繕囹圄具桎梏斷薄刑决小罪納材葦坏墻垣修宫室立秋日凉風至七月節也後五日白露降後五日寒蟬鳴賞軍帥武人乃命将帥選士勵兵簡練傑俊專任有功以征不義詰誅暴慢以明好惡順彼逺方處暑曰鷹乃祭鳥中氣也後五日天地始肅後五日禾乃登築場圃登榖天子甞新先薦寝廟鳴鵙豳風晚寒伯勞七月始鳴烹葵及菽倉𤓰並豳詩肇秋見上注八月日在翼律中南吕宵中星虛迎寒周禮仲秋擊土鼓吹豳詩以迎寒飬衰老授几杖行糜粥循行犧牲視全具乃儺以逹秋氣習吹享夀星於南郊祭馬社申嚴百刑無或枉撓斬殺必當勸人種麥白露日鴻鴈來八月節後五日𤣥鳥歸後五日羣鳥飬羞案芻豢聸肥腯察物色必比類量小大五者備當上丁釋奠於國學上戊釋奠於太公廟擇元日命人社近秋分前後戊日秋分日雷乃収聲中氣也後五日蟄蟲坏戸後五日水始涸祀夕月於西郊秋分日同律度量平權衡因晝夜平則正之天子嘗麻先薦寝廟八月載績載𤣥載黄為公子裳八月其穫剥棗斷壺壺瓠也自載績以下並豳詩仲商梁元纂要亦曰仲秋仲商八月獻良裘周禮司裘氏掌大裘以供王裘禮天之服仲秋獻良裘天子居總章太廟是月也衰老授几杖九月日在角律中無射授衣九月授衣九秋霜降九月肅霜務納百官貴賤無不務納以㑹天地之藏無有宣出伐蛟取鼉登龜取黿咸俯蟄蟲咸俯神倉有司舉五榖之要藏帝藉於神倉祗敬必飾伐薪為炭𤣥月九月寒露日鴻鴈來賔九月節也後五日雀入大水為蛤後五日菊有黄花申嚴號令霜降日豺乃祭獸中氣也後五日草木黄落後五日蟄蟲咸俯百工休膠漆之作停也入室命有司寒風摠至人力不堪其皆入室注云霜降清風戒寒所以令人入室具飭衣裳文繡有恒衣服有量冠帶有常必循其故嘗稻先薦寝廟舉五榖之要農事偹収合秩芻飬犧牲以供皇天上帝名山大川四方之神以祠宗廟社稷之靈為人祈福習吹大享帝於明堂注謂祀昊天於明堂五方帝五官從祀命有司嘗嘗羣神也趣人收歛務蓄菜注始為禦冬之偹九月築場圃豳詩也豳土晚寒也菽苴采荼薪樗食我農夫並豳詩季商梁帝纂要云九月季秋亦曰暮秋末秋暮商季商杪秋亦曰授衣亦曰𤣥月獻功裘見八月獻衣裘注孔登慈恩浮圖李適凡天子饗㑹遊豫唯宰相及學士得從秋登慈恩浮圖獻菊花酒稱夀季秋出畋欲改月李程徳宗季秋出畋有寒色顧左右曰九月猶衫十月而袍不為順時朕欲改月謂何左右稱善程獨曰元宗著月令十月始裘不可改帝矍然止揺落肅殺韓臯曰秋者天将揺落肅殺其嵗之衰乎金風蕩佳節李宻詩七月獻鈿針百官志尚署七月獻鈿針申嚴百刑栁宗元時令論晚枝多露蟬之思夕蔓起寒螀之愁松竹含韶梧楸早脱驚綺疏之曉吹墮碧砌之凉月禹錫秋聲金籠蟋蟀唐開元遺事毎至秋時妃妾以金籠閉蟋蟀寘枕函畔夜聽其聲庶民之家皆效之也秋風一披拂牕前兩好樹衆葉光薿薿秋風一披拂䇿䇿鳴不已韓愈秋懐詩金柔火老韓愈納凉聨句金柔氣尚低火老候愈濁曲江蕭條秋風髙菱荷枯折隨風濤杜甫曲江𤣥蟬無停號秋燕已如客立秋後題水雲秋景初杜牧詩風霜始嚴鷹隼初擊漢家授御史多於立秋盖以風霜始嚴鷹隼初擊裴徳融制猿吟鳥思江山絶域登臨已秋猿吟鳥思草衰木墜上髙尚書状少隂之中景物澄鮮丹葉星房燭耀川原夕月既望躍于丹泉上鏡下冰湔塵濯煙劉禹錫楚望賦廢井苔冷荒園露滋秋聲賦蓐収肅金氣西陸弦海月李白古風金飈掃林景物廓如月委皓素水涵空虚吕温虢州三堂記露滴髙梧同上鳥驚寒沙露滴髙梧秋凉歸期𦕈秋凉韓愈逺逰聨句草木辭榮風霜入候文粹盧肇海潮賦以蟲鳴秋韓文水木澄秋景韋應物詩長安一片月李白子夜吴歌長安一片月萬戸擣衣聲秋風吹不盡總是玉關情秋顔入曉鑑秋日鑷白秋顔入曉鑑壮髪凋危冠我覺秋興逸同上秋日魯郡我覺秋興逸誰云秋興悲火西飛而獻秋汀葭颯然海草㣲落同上送黄鍾之鄱陽序秋色何蒼然海際俱澄鮮上秋風髙南卓羯鼓録明皇製秋風髙一曲毎奏之則秋風徐來夜葉交墜秋天漠漠向昬黑杜詩秋天漠漠向昬黑布衾多年冷如鐵胡兵沙塞合李白秋思胡兵沙塞合漢使玉關回侵陽日沉𤣥剥節風捜兊秋雨聯句翠嶺明華秋髙天澄遥滓韋應物九日灃上碧天如水兮窅窅悠悠百蟲迎暮兮萬葉吟秋劉禹錫秋聲賦冬十立冬月冬至十二附十月十一月白其日壬癸帝顓頊神𤣥冥蟲介音羽數六性智事聽味鹹臭朽祀行祭先腎食黍與鴈器閎以奄冬為𤣥英沍寒嵗将暮時既昏𤣥律窮嚴氣升烈烈冬日閉塞而成冬可愛冬日可爱日短星昴謹蓋藏日窮于次月窮于紀星回于天冬民既入婦人同巷相從績女工一月得四十五日所以省費燎火同巧拙令習俗三餘董遇讀書當以三餘冬嵗之餘夜日之餘隂雨晴之餘執權司冬魏相曰北方之神顓頊乗坎以執權司冬穹窒熏䑕塞向墐户向北牖也穹窮窒塞也墐塗也庶人蓽戸為此者備寒入此室處並豳詩𤣥英梁元帝纂要云冬曰𤣥英亦曰安寧亦云𤣥冬亦曰三冬天曰上大風曰寒風嚴風厲風辰風景曰冬景寒景時曰良時鳥曰寒鳥寒禽亦曰哀禽草木草曰寒草寒卉木曰寒木寒柯寒條祈寒嵗云暮矣政失於冬平秩朔易立冬立冬日水始冰盛徳在水迎冬於北郊立冬日啟閉立秋立冬書雲物司閉丹鳥氏以立夏來立冬去冬至冬至之日蚯蚓結水泉動日短至隂陽争日短星昴宵長晝短隂極陽生冬至一陽生僖五年正月辛亥朔日南至公視朔遂登觀臺以望而書禮也書雲物為備履長玉燭實典曰十一月建子周之正月冬至日極南影長隂陽日月萬物之始當黄鍾律其管最長故有履長之賀朝賀宋書朝賀享祀皆如元日之儀又曰魏晉冬至日百寮稱賀因大㑹其儀亞於嵗朝漢雜事見夏至門注閉關商旅不行后不省方易曰先王以至日祀昊天上帝見十一月注進履韈後魏北凉司徒崔浩女儀云近古常以冬至進韈履於舅姑也又崔寔韈銘有建子之月助飬元之事禳荆楚嵗時記曰共工氏不才子以冬至日死為人厲畏赤豆故作赤豆粥以禳之影長影長一丈三尺夏至日在東井影長尺有五寸見上注十月日在房律中應鍾地始凍賞死事恤孤寡祭司寒命有司祭司中司命司人司禄於國城西北亥日祭之坏城郭戒門閭修鍵閉備邉境塞蹊徑飭喪紀辨衣裳審棺椁之厚薄陳祭器物勒工名以考其誠工有不當必行其罪秫稻必齊麴蘖必時湛熾必絜水泉必香火齊必得兼用六物酒官監之無有差貸良月十月也就盈數也十月之交詩立冬日水始氷十月節也後五日地始凍後五日野雞入大水化為蜃察阿黨則罪無有掩蔽築城郭造宫室穿竇窖修囷倉禮天子始裘祀神州地祗於北郊注云立冬日小雪日虹藏不見中氣也後五日天氣上騰地氣下降後五日閉塞而成冬謹盖藏循行積聚無有不歛注府庫倉囷有藏物大飲烝勞農以休息之十月農功畢黨正屬人飲酒正齒位易關市來商旅納貨賄便人事四方來集逺鄉皆至則財不匱上無乏用百事乃遂收水澤之賦無令侵削兆人以為天子取怨于下注川賦魚鹽蛤澤賦萑蒲隕蘀豳詩十月隕蘀隕墜也蘀落也蟋蟀入我床下詩滌場滌埽也場功畢入也詩穫稻納禾稼黍稷穜穋禾麻菽麥並豳詩上入執宫功晝爾于茅宵爾索綯亟其乗屋其始播百榖注十月定星将中急治室屋儲畜崔寔注月令曰十月農人事畢五穀既登家家儲畜乃順時令祈年周禮天府掌季冬陳玉以貞來嵗之美惡鄭注云問事之正曰貞問嵗之美惡問謂問龜也孟冬梁元纂要云十月孟冬亦曰上冬亦曰陽月也注此純隂用事嫌於無陽故曰陽月十一月日在箕律中黄鍾一之日觱發十一月也内宰申宫令審門閭貴戚近習無有不禁祈祀大川名源井泉農有不收藏積聚者馬牛禽獸有放逸者取之不詰有能取蔬食田獵者有司教導之祭馬步日短見上周官斬木之時豳詩鑿氷之月大雪日鶡鳥不鳴十一月節也後五日虎始交後五日荔挺出土事無作無發室屋及起大衆以固而閉地氣且洩是謂發天地之房諸蟄則死人必疾疫又隨以喪伐木取竹箭此時堅成可取君子處必掩身無躁事欲静以待隂陽之所定注順時氣也罷官之無事去器之無用者注先時權有建作者天地閉藏萬物休可以去之一之日于貉取彼狐狸為公子裘于貉往搏貉自為裘狐狸獻尊者十二月日在南斗律中大吕二之日栗烈十二月僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢扑北面而誓之誓衆以軍法也修祭禽之禮日窮于次月窮于紀星廻于天數将㡬終嵗且更始專其農人無有所使注役則志㪚失業大儺旁磔以送寒氣小寒日鴈北鄉十二月節也後五日鵲始巢後五日野雞始雊将帥講武習射御角力注備田獵也乃教田獵以習五戎班馬政乃䄍百神於南郊為來年祈福於天宗天宗日月星辰之屬大寒日雞始乳中氣也後五日鷙鳥厲疾後五日水澤腹堅始漁天子親往嘗魚先薦寝廟氷方盛命取而藏之冰已入令告人出五種命農計耦耕修耒耜具田器注云農事将興修田器也出土牛以示農耕之早晚見立春注飭國典論時令以待來嵗之宜注正月懸法象魏故於此與公卿先飭之制百縣合諸侯制百縣為來嵗受朔日與諸侯所税於人輕重之法貢職之數以逺近土宜為度以給郊廟之事無有所私咸獻凡在天下九州之人無不咸獻其力以供皇天上帝社稷寢廟山林川澤之祀注人非神福不生大習吹而罷收秩柴薪以供郊廟及百神之薪燎獻豜豳詩二之日其同載纉武功各私其豵獻豜于公鑿冰沖沖豳詩季冬梁元纂要云十二月為季冬亦曰暮冬塗月亦曰暮節嵗窮稔窮孔五大鳥集宫竇建德冬至大㑹僚吏有五大鳥集其宫羣鳥從之本傳卦轉習坎韓愈送無夲詩遂來長安里時卦轉習坎山雪河冰山雪河冰野蕭飈杜詩易關市栁宗元時令論誠使古之為政者非冬無以賞死事恤孤寡舉阿黨易關市來商旅審門閭正貴戚近習罷官之無事者去器之無用者則其闕政亦以繁矣一陽巾雲仙㪚録金門嵗節曰洛陽人家冬至煎錫緑珠戴一陽巾進履韈酉陽雜爼北朝婦人常以冬至進履韈及鞾煖香寳雲溪有僧舍盛冬若客至不燃薪火暖香一炷滿堂如春人歸更收餘燼出雲林異景志草木萌荑如正月長慶二年冬少雪水不氷凍草木萌荑如正月出五行志時時北風振槁揚埃蕭條邉聲與鴈俱來劉禹錫楚望賦隂凝雪飛天地盡閉文粹叚文昌平淮西碑不衣之俗亦垂繒帛李周翰文選雪賦注大雪盈尺吕温虢州三堂記同雲千里大雪盈尺以風鳴冬韓文氷霜辰韋應物送劉評事况復嵗云暮凜凜氷霜辰寒氣凛冽李白大獵賦嚴冬慘切寒氣凛冽不周來風𤣥冥掌雪土囊烟隂火井冰閉上明朝驛使發一夜絮征袍素手抽針冷那堪把剪刀李白子夜吴歌碧瓦初寒外杜甫冬日謁𤣥元廟碧瓦初寒外金莖一氣旁杖藜雪後臨丹壑杜甫冬詩杖藜雪後臨丹壑鳴玉來朝散紫宸星廻節廣記玉谿編事南詔以十二月十六日為星廻節是日登避風臺命清平官賦詩略曰自我居震旦翊衛頼稷契注彼國謂詞臣曰清平官天子曰震旦寒月野無緑寥寥天宇空韋應物擬古玉壺銀箭稍難傾李賀十月玉壺銀箭稍難傾缸花夜笑凝幽明珠帷怨卧不成眠金鳳南衣着體寒宫城團廻凛嚴光十一月宫城團廻凛嚴光白天碎碎墮瓊芳御溝泉合如環素火井温水在何處上𤣥㝠蔚强梁杜甫蓐収困用事𤣥㝠蔚强梁冬之日祀黑帝於北郊唐六典冬至至後日初長逺在劍南思洛陽杜甫白孔六帖卷三
