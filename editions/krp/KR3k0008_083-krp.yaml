body:
  text: 白孔六帖卷八十三唐白居易原本宋孔傳續撰商賈一市二𣙜酒三筭緡四百工五材木六膠皮七商賈一守業市通商抑商籍白乘時射利通天下之財以有易無趨日中之市交易日中爲市交易而退各得其所趨利喻利小人喻於利放於利而行多怨擇利而行欲贏惡嚻賈欲贏而惡嚻乎錐刀之末將盡爭之朝夕識貴賤晏子曰小人近市朝夕得所小人之利也公曰近市識貴賤乎易資求豐傳曰晋文公示信於是人易資不求豐焉明徴其辭也倚市門史記夫用資求富工不如商刺繡文不如倚市門商賈百族裨販禆夫販婦贏優貿遷三倍詩曰如賈三倍利三倍也大賈販賣史記吕不韋陽翟大賈以販賣爲事家累千金市井相語以利管子曰處商就市井合羣萃而别其郡之貨以知其市之價負任擔何以周四方料多少貴賤以有易無是以竒怪珍異以時而來旦夕從事於此以教子弟相語以利相示以時相陳以知價其父兄之教不肅而成子弟之學不勞而能故商之子恒爲商商有十倍之價文選識其貴賤遷以有無爭利於市通財市事又曰任商以市事貢財貨百貨操其竒贏利也日游都市貿遷有無周禮司市以商賈阜財貨而行布布泉布也通四方之貨見通商門阜通太宰九賦六曰商賈阜通貨賄注賄布帛貨金玉也鄭商周賈彊賈鄭桓公與商人俱出自周斬蓬蒿而共處盟曰爾無我叛我無彊貨爾有利市寳貨我勿與知禇中晉荀罃囚於楚鄭賈人將寘諸禇中以出未行而楚人歸之後賈人如晉荀罃待之如實出己者夏則資皮冬則資絺國語言賈人也桑𢎞羊賈人子以心計言利事析秋毫心計不用籌筭貪賈亷賈漢書亷賈三之貪賈五之三倍五倍利以商賈自穢王列辭公孫度之命云云服賈書曰肇牽車牛逺服賈百賈尹翁歸爲市吏清亷百賈畏之賈區胡建爲軍正丞監軍御史穿軍壘垣爲賈區建斬之賈區立廬道旁賣物守業敢不貳事謂兼他業商修族代之所鬻文選不敗其業篤在守業易業代守其業工賈不變抑其淫業石人管子曰四人者國之石人言守業不移如柱石四人各業雜處四人不可雜處異物管子曰少而習焉其心安焉不見異物而遷焉故商之子恒爲商業惟善守利不竝行得朝夕之求利宜相示脩族代之鬻業貴不遷茍能爭利安可惡嚻通商月令孟冬易關市來商旅納貨財以便人事四方來集遠鄉皆至則財不匱上無乏用百事乃遂易關市謂輕税以來通商旅通天下之財趨日中之市關市無索索不禁察月令季春通商衛文公通商惠工通五都之貨識其貴賤易以有無賄以通商浚農工以生利宜招損急關市之税貨則不通阜通貨財太宰以九賦任萬人六曰商賈阜通貨財注云行曰商處曰賈阜盛也周禮通四方周禮通四方之珍異以資人謂之商旅輕其關市利以貨遷抑商市籍周禮司關掌貨賄之節以䏈門故有關市之征謂税商也專市之商兼人之利鬻良雜苦良善也苦惡也素封之富史諸富者無秩禄爵邑之入與封君比者命曰素封卓鄭猗陶竝富者不鬻斜斜不中尺度物專利奪人急商緩農去末反本通四方之財誠宜如惠專三倍之利何用損多關市之征必專其利商旅不至則匱於財政貴得中法惟經乆如欲贏之罔極下必兼平儻知懼而莫來上將乏用縱則不可無之亦難漢制漢髙制賈人無得衣錦繡綺縠乗車騎馬也履絲曵縞鬻良雜苦乘堅策肥眩其邉鄙弛律孝惠髙后時以天下初定復弛商賈之律子孫不得爲吏漢孝惠髙后時市井子孫亦不得官爲吏名田賈人有爭籍及家皆不得名田滯財假貨乘時射利漢發七科謫戍邊身有市籍父母及大父母有市籍者皆調令相糾吿桓譚君山上䟽言可令商賈自相糾吿非身力所得皆以贓卑吿者如此則力弱而歸田舉選令諸官人身乃國籍大功已上親自執工商家專其業不得任其舊經職任自解黜必有事用者三年之後聽用市籍有市籍不得官父母大父母有市籍者亦不得官稽市物秦時民蓄積餘業以稽市物漢髙重租稅以困辱孔商旅之人多宋務光上書曰稼穡之人少商旅之人多願坦然更化以身先之均利陸贄四賦曰占商賈以均利負販鍾傳洪州髙安人以負販自業商賈流通崔陵爲湖南觀察使商賈流通貲物益饒饒盈徐申進嶺南節度使外蕃嵗以珠瑇瑁香文犀浮海至申於常貢外未甞䞉索商賈饒盈征穆寧遷鄂岳沔都團練淮西節度使李忠臣不奉法設戍邏以征商賈又縱兵剽行人道路幾絶與寧夾淮爲治憚寧威掠劫爲衰不取盧鈞擢嶺南節度使海道商舶始至異時帥府爭先往賤售其珍鈞一不取販鹽虜張濬黄巢亂王鐸奏暑都統判官時王敬武己臣賊濬召將伏至鞠場倡言黄巢販鹽虜耳捨天子而臣之何利耶黠商大賈李嶠曰今道人私度者幾數十萬黠商大賈詭作臺符羼名僞度愚賈劉元子曰有學無才猶愚賈操金不能殖貨通其有無韓愈原道篇爲之賈以通其有無分遣人爲商賈莊宗皇后劉氏好聚歛分遣人爲商賈坐賈顒顒行賈遑遑利心中驚貪目不瞬劉禹錫觀市賈所以務財化書京都諸市令以三賈鈞市注精爲上賈次爲中賈麄爲下賈六典萬舡繼至百貨錯出南京象齒航海貿遷悍將反覆逺夷怨櫌吏困沓貪商乆阻絶公乃導其善利推以信誠萬舡繼至百貨錯出文粹權德輿撰岐公遺愛碑金珠貝甲脩牙文犀劉蜕獻南海崔尚書書南海實筦𣙜之地有金珠貝甲脩牙文犀之貨列鋪率稅崔融上䟽今江津河滸列鋪率税撿覆稽留加主司僦畧邀丐則商人廢業有如師興費廣雖倍筭商旅加歛齊人可也后納之萬商往來四海緜歴李白任城壁記出入萬里唐史韓琬上言往商賈出入萬里今市井至失業屠沽興販者爲商唐六典戸部市二市㑹買賣貨殖並屠雜牙市附白易曰日中爲市致天下之民聚天下之貨交易而退各得其所三時周禮大市日中而市百族爲主朝市朝時爲市商賈爲主夕市夕時爲市販夫販婦爲主朝滿夕虛禫裕子曰市朝滿而夕虛非朝愛而夕憎也求存故往來亡故去爭利張儀曰爭名於朝爭利於市闤闠市巷曰闤市門曰闠九市京師九市以致九州之貨三市洛陽三市百壥旗亭五重俯察百禭旗亭市門樓廓開九市通闤帶闠開場九市貨别隧分聚五都之貨列百族商賈裨販交質倚門史記刺繡文不如倚市門居肆百工立市周禮建國立市開壥列肆易其有無孟子曰古之為市以其所有易其所無貿遷有無書畢陳運命論曰游五都之市則天下之貨皆畢陳聚四方之人致九州之貨設次置叙周禮建立市設其次叙其貨賄出有度量陳肆辨物阜貨成賈定物價也斂賖謂人貨不售則斂而買之人無貨則貰而與之司市之職平肆正其行列展成奠賈奠定也定其物恒價常價鬻慝慝惡物也不物不合度之物關市之征㕓而不稅税其舍而不税其物宅近市識貴賤景公謂晏子曰子之宅近市對曰小人近市朝夕得所求小人之利也公曰近市識貴賤乎司市以政令禁物靡而均平物靡者易售而無用禁之則市平以量度成價而徵賈徵召也物有定價買者則來也以質劑結信而止質劑謂兩書一札而别之也若今下書手言保物要還也司農云質劑月平也國凶荒禮䘮則市無征而作泉大鑄錢以饒民僞飾之禁凡爲僞飾之禁在民者十有二在商賈上者各十有二也市刑過市國君過市刑人赦之夫人罰一幕世子罰一帟命夫罰一盖命婦罰一帷大市小市質人掌凡賣買者質劑焉大市以質小市以劑注質劑契劵也大市人民奴婢小市兵器珍異也司虣掌禁屬游飲食於市者司稽掌廵市察其犯禁與不物者肆長掌其肆之政令陳其貨賄各相近者相遠也鄭伯有死於羊肆美言可以市老子吳市子胥吹簫乞食於吳市燕市史記荆軻與髙漸離飲於燕市柳市漢萬章子夏豪俠居長安城西柳市號曰城西萬子夏獄市爲寄曹參爲齊相將去属後相曰以獄市爲寄夫獄市者所并容也若擾之奸人無所容也奸人無所容將爲亂故寄之君門如市哀帝謂鄭崇曰君門如市對曰臣門如市臣心如水閉門成市樊重治産閉門成市游市魏時衣冠無不游市華歆爲吏休沐出府闔門自守卜肆嚴君平賣卜成都市司馬相如沽酒於成都市阿枉第五倫伯魚督鑄錢市無阿枉閲書王充游洛陽市閱所賣書一見皆記公超張楷字公超能作五里霧學者成市因號曰公超市卒梅福變姓名爲吳市門卒市也婆娑五均王莾時劉歆書言樂語有五均專記各有幹焉今開賒貸張五均諸設幹者所以齊衆庶而抑兼并也遂於長安及五都立五均官吏長安五都市爲五均洛陽邯郸臨淄苑成都也絳市傳曰晉獲秦諜殺之絳市六日而更生市儈漢書云節駔儈節謂節物貴賤際儈其餘利比於千乘之家儈謂合㑹二家交易者駔儈首率也子朗反淮南子干木晉大駔大駔市儈也儈牛後漢王君公儈牛自隱號曰牆東王君公爲吏所辱長安市儈劉仲爲市吏所辱踏折其足學問經行周流海内後以有道徵不就衆歸其德也邪嬴在儈牛下周禮賈師定物價各掌次物有貨財奠其價質人質平也司市以度量成價郡吏平肆展成奠價上旌于思次上旌爲衆望見旌知當市思次市亭也觀君子衣服服劔乘馬不價不敢平奠者物貨殖閉門成市樊重治産貪賈三之亷賈五之貪賈未當買而買故得利少十得三之利亷賈什得五之利翁伯以販脂而傾縣邑張氏以賣漿而踰侈質氏以洗削而鼎食治刀劒也濁氏以胃脯而連騎沸湯燖羊胃以末椒薑桂之暴使燥是也張里以馬醫而擊鍾雞鳴而起惶惶求財貨殖傳水居千石一嵗出千石也山居千章楸章千丈材曰章也安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北滎南河濟之間千樹棃陳夏千樹漆齊魯千樹桑麻渭川千畆竹名國萬家之城帶郭千畆畆鍾之田一鍾爲六斛若千畆巵茜可用染也千畦薑虀皆與千户侯等大都酤一嵗千釀醯醬千甕漿千儋儋瓦甖也屠牛羊彘千皮穀糴千鍾常糴而居之薪藁千車船長千丈總積船丈數也木千章竹竿萬介介讀爲个數軺車百乘輕小車也牛車千兩木器漆者千枚銅器千鈞三千斤爲鈞素木鐵器若巵茜千石百二十斤爲石馬蹄噭千噭口也蹄與口共千馬二百匹牛千足羊彘千䨇童手指千奴婢有巧技者筋骨丹砂千斤帛絮絲布文采千匹荅布皮革千石注布帛疊也漆千大斗蘖麴鹽䜴千合蘖麴以千石稱之輕重齊則爲合鹽䜴以斛斗量之多少等亦爲合鮐鮆千斤上音貽下音齊鯫音陬鮑千鈞棗栗千石者狐裘千皮羔裘千石旃席千具他果采千鍾采取果實子貸金錢千貫節駔儈節物貴賤駔其餘利儈首領也亦比千乘之家也生聚傳善居室始有曰茍合矣少有曰茍完矣富有曰茍美矣賜不受命而貨殖焉人棄我取白圭積居與時逐陶朱公施惠後漢樊重好殖貨資至巨萬息加鄉曲賑贍宗族屠刀匕是供刲羊牛刀禽獸不中殺不鬻於市隠於屠史侯嬴謂魏公子曰臣所知屠者朱亥賢而世莫知隠於屠耳意不顯名也鼓刀聶政殺人避仇與母如齊以屠爲事曰政乃市井鼓刀者耳屠狗荆軻好屠狗又樊噲以屠狗爲事解牛賈誼曰屠牛坦一朝解十二牛而芒刄不絶所排剥刺皆中理至於髖髀之間非斤即斧也千皮貨殖志屠牛羊彘千皮比千乘之家屠羊説莊子楚昭王出有屠羊説從反國賞之辭曰大王失國説失屠羊大王反國説反屠羊何賞之有投刃皆虚庖丁解牛者砉然騞然矣不中者投刃皆虚丁曰臣始解牛之時所見非牛三顧之後未甞見全牛也今臣之刀十九年所解千牛而刃無肯綮若初發硎以其游刃必有餘地良庖殺老牛莫之敢尸觳觫孟子齊王見牽牛將以釁鐘王曰吾不忍其觳觫而就死地故以羊易之未能操刀而使割其傷實多傳雜買賣禮曰金璧珪璋不鬻於市戎器用器兵車不中度布帛精麄不中數幅廣狹不中量姧色亂正色錦文珠玉成器衣服飲食五穀不時果實未熟木不中伐禽獸魚鱉不中殺並不鬻於市山木如市不加於山如在山之價魚鹽蜃蛤不加於海如海畔之價踴貴屨賤踊刖足之用也命市納賈以觀人之所好惡志淫好僻後漢韓康字伯休賣藥不二價賣魚魏任嘏遇亂家貧賣魚魚貴倍蝦直如常鬻畚晉王猛少貧賤以賣鬻爲業有一人貴買其畚引入深山見一老父皓然左右十許人王猛拜曰三公何以拜也乃千倍其直既出顧乃嵩山周禮陶人爲甗旊人爲簋瓦陶之事髺音刮墾薛音百暴音剥不入市爲其不任居也暴起也薛裂也墾損傷也裨販販婦鬻繒灌嬰以鬻繒爲業訾呵減價魏衛臻文慈字子許與周文生俱稱盛德郭林宗與二人共至市子許買物隨價雇直文生訾呵減價乃取林宗曰許少欲而文生多情非徒兄弟父子也言相去逺如此也如賈三倍君子是識言非君子宜識販鬻爲業見㩁酤門互市交易以有易無慮懷寳以越鄉雖獻環而勿闕坐賈人漢渾邪王至賈人與市者坐當死五百餘人汲黯曰渾邪王來獻靈府賞賜物然良人待愚夫市賈長安中文吏繩以爲闌出財物如邊關乎切不取也疆場互市晉周浚隨王渾伐吳在弋陽南北爲互市而諸將相襲奪以為功吳察敏兄珏爲將在秣林與敦書曰疆場之事上往往有襲互市此甚不可無以小利而忘大義羌互市格金部格云勅松當悉維翼等州熟羌每年十月已後即來彭州互市易法時差上佐一人於蠶崖關外依市法致市塲交易勿令百姓與往還關市令令云諸外蕃與縁邊互市皆令立官司檢校其市四靣穿壍及立籬垣遣人守門市易之日卯後各將貨物畜産俱赴市所官司先與蕃人對定物價然後交易私𦍑互市晉祖逖在鎮石勒求互市不報而聼私市收利十倍公私豐贍又張騫通國酒賈間出物私豐贍斬胡率梁習子虞爲西部都督鮮卑大人育延五千騎請互市習許於空城中交易胡侵民習乃責延因斬之餘不敢動不與市晉滕修數討南賊不能制陶璜曰兩岸仰吾鹽鐵斷而不市當壞田器如此二年可一戰而滅從之果破賊也禁市髙氏時有司請禁南越關市鐵器尉他遂稱南武帝立夷市晉陶侃鎮武昌立夷市於郡東大收其利楚材晉用孔置數十百人閲物㕓左張建封是時宦者主宫市置數十百人閲物㕓左謂之白望無詔文驗覈但稱宫市則莫敢誰何大率與直十不償一又邀閽闥所奉及脚傭至有重荷趍肆而徒返者有農賣一驢薪宦人以數尺帛易之又取他費且驅驢入宫而農納薪辭帛欲亟去不許恚曰惟有死耳遂擊宦者有司執之以聞帝黜宦人賜農帛十疋然宫市不廢也諌臣交章列上皆不納故建封請間爲帝言之帝頗順聼極論宫市韓愈遷監察御史上䟽極論宫市德宗怒貶陽山令大搜市㕓裴延齡甞奏句獲乾隠二千萬緡請舎别庫爲羡餘供天子私費故上之興作廣宣索多矣延齡欲實其言乃大搜市㕓奪所入獻逮捕匠徒迫脅就工號曰敕索弗讎其直名曰和雇弗與之庸禁屠牛韓滉爲鎮海軍節度使以賊非牛酒不笑樂遂禁屠牛以絶其謀罷市趙讎子珝卒陳人爲罷市賣卜武攸緒少變姓名賣卜長安市得錢輒委去閲書吕向每賣藥即市閲書多淫巧崔融䟽周官七曰關市以市多淫巧市者兼受好惡若甚則細人無所容乆必爲亂同上要津市必要津同上貨隧分㕓唐文粹李庾西都賦貨隧分㕓物次軿連中署肆師夕咽朝昏市鄽軿比東都賦業于饔者列饔饎陳䴵餌而苾然業于酒者舉酒旗滌盂盃而澤然鼓刀之人設髙爼解豕羊而赫然劉禹錫觀市市物襁属於㕓魏徵曰比者市物襁属於㕓遞子背望於道脱有一穀不收百姓之心恐不能如前日之帖泰百貨雜集劉晏移書宰相舟車既通百貨雜集建標立侯陳肆辨物唐六典諸市令以三價均市同上精爲上賈次爲中賈麄爲下賈凡買賣不和而㩁固注㩁謂專畧其利固爲障固其市若三市而規自入者竝之謂在旁髙下其賈以相惑亂也以二物平市同上謂秤以格斗以概六典注夫賈居闤㕓藏其貨物候有求者雖巨人必恭然而請賈人言其直則髙之曰必若干乃得求者率不能小減而市矣及其人持物貨歴戸而自唱曰某好物某好貨其將市雖小兒童則色然視之問其直幾何誠金玉其物貨秪以盜有而竊置爲宜然何以至是彼不求此望售也房魯上節度使書萬貨叢集百工填委羅隠䜛書市賦齊侯幸晏子所止引目長視曰彼也何哉如蜂如蟻萬貨叢集百工填委紛紛汩汩胡可勝紀貨盈則盈貨散則散晏嬰曰貨盈則盈貨散則散賢愚並貨善惡混貨物或戾時雖是亦非工如善事雖賤必貴參雜胡越奔走孩稚同上誰有帳籍詎假文字蜀桑萬畮吳蠺萬機及此而耗繄何所之東海魚鹽南海寶貝及此而耗其誰主宰同上市外區琛琲王方慶累廣州都督南海嵗有崑崙舶市外區琛琲今和市專刻剥唐史韓琬上言太宗朝司農以市木橦倍價抵罪大理卿孫伏伽言官木橦貴故百姓者賤臣見司農識大體未聞其過太宗曰善令和市專刻剥名爲和而實奪之置東西南三市按東都西市則隋南市也南市則隋東市也都南市舊兩坊之地武德中減爲坊半焉中省京南地開元十年又省都西市唐六典華實之毛畋漁之生交蜚走錯水陸羣狀移而入隧而分韞藏而待價者負挈而求沽者乘射其利者竒贏以游者同上冒良苦之巧言斁量衡於險手杪忽之差鼔舌傖儜詆欺相尚詭態横出同上鼓囂譁坌烟埃奮腥羶疊巾屨同上凡市日中擊鼓三百以㑹衆唐史百官志魚鹽滿市井布帛如雲煙李白贈宇文宣城金部郎中掌兩京市互市和市官市交易之事百官志㩁酒三沽酒已具酒門白漢武帝天漢三年初㩁酒賢良對策請罷㩁酒昭帝時罷㩁官王莽爲五均六斡雖利在其中而敝歸其下奪利於民歛怨於下斡酒沽王莽義和魯匡言名山大澤鹽鐵布帛五均賖貨斡在縣官唯酒沽未斡謂王貨酒者天下之美禄帝王所以頥養百禮之㑹非酒不行今官作酒以二千五百爲均率開一壚以賣之計其利而什分之以七入官其三乃糟胾灰炭工器薪蘇之價所用陳魯匡之謀收榮公之利爲賈人㩁史記趙王彭祖使使即縣爲賈人㩁之入多於租税以是趙多金錢注伻儈兩家買賣之價㩁者禁他家獨王家得爲之者孔爲州縣弊孔戣爲諫議大夫條上四事四山澤㩁沽爲州縣弊肅宗以廪食方屈乃禁京城沽酒期以麥熟如初二年飢復禁沽非光禄祭祀燕蕃客不御酒廣德二年定天下沽户以日收稅建中元年罷之三年復禁民沽以佐軍費置肆醸酒斛收直三千州縣總其醨薄私醸者論其罪尋以京師四方所湊罷㩁貞元二年復禁京城畿縣酒天下置肆以沽者斗酒錢百五十免其徭役獨淮南忠武宣武河東㩁麴而已元和六年罷京師沽肆以㩁酒錢隨兩税青苗斂之太和八年遂罷京師𣙜沽凡天下㩁酒爲錢百五十六萬餘緡而釀費居三之一貧户逃沽不在焉昭宗世以用度不足易京畿近鎮麴法復𣙜酒以贍軍鳯翔節度使李茂貞方專其利按兵入奏利害天子遽罷之唐史食貨志筭緡四白漢書武帝初筭緡緡錢貫也一云貫筭食貨志商以取利者雖無市籍各以其物自占率緡二千而筭一率計以二千錢者則出一筭一筭者百二十諸作有租及鑄謂以手功所作而賣率緡錢四千筭一天子既作下緡令而尊卜式式出財佐軍故尊之而勸人也百姓終莫分財佐縣官於是吿緡者縱矣故令相吿楊可吿緡徧天下往往即治郡國緡錢就其所在而治之得財物以億計縣官用益饒矣孔筭禆販之緡陸贄上書方且筭禆販之緡口筭初開元詔書以口筭第郡縣爲三品輸緡錢十六萬嵗貢纎紵三篚劉禹錫和州刺史㕔記失平長僞陸宣公奏議資産之中事情不一有藏於襟懷囊篋物雖貴而人莫能窺有積於場圃囷倉直雖髙而衆以爲富有流通蕃息之貨數雖寡而計日收贏有廬舎器用之資價雖髙而嵗終無利如此之比其流實繁一㮣計估筭緡宜其失平長僞末法今之兩稅獨異舊章惟筭緡之末法同上百工五守業竒巧考課白執斵匠人也傳藝成而下業在其中執技以事上也工欲善其事必先利其器百工居肆以成其事霜降月令季秋霜始降百工休膠漆作也工依於法法規矩也惠工衞文公通商惠工運斤見下注命般輸之巧匠盡變能乎其中公輸般並巧者剞劂彫鎪材以工能周禮曰百工以化材代斵老子曰代大匠斵無不傷其手執藝書曰工執藝事以諫諫失常也巧具文子曰規矩䋲墨者巧之具伐技傳曰小人伐其技以憑君子言矜技以凌上也飭化以材周禮太宰以九職任萬民五曰百工飭化飭材材謂象玉石金革羽飭化謂治之也飭材貢器物又曰任土以飭材事貢器物審曲辨器周禮審曲靣勢以飭五材以辨人器注云審察五材方靣形勢曲直之宜以治之百工非一工也巧者又曰智者創物巧者述之守之世謂之百工百工之事皆聖人作材美工巧周禮天有時地有氣材有美工有巧然後可以爲良材美工巧然而不良不得天時地氣也謂之國工周之名工同上善事六工禮天子六工曰土工金工石工木工獸工草工典制六材殷制食力農工事勤功倍樸斵書若作梓材既勤樸斵惟其塗丹雘鑠金凝土考工記鑠金以爲刃凝土以爲器來百工則材用足禮範金合土山有木工則度之攻木周禮作工成器曰工漢書合四天有時地有氣材有美工有巧合四者然後可以爲良朽木不可雕離婁督繩公輸削墨守業管子曰四人者國之石人也士農工商各守其業不可遷也如今之柱下石也不可雜處雜處則其事亂故聖人必就官府羣萃而州處相良辨其工苦工堅也苦濫也權節其用比其器相語以事相示以功相髙以知以能知器用事相髙旦暮能事於此不見異物而遷故工之子恒爲工工用髙曽之規矩文不敗其業篤在守業代守其業左遷業易業工賈不變業有四人職無二事抑其淫末考以成工不勞而能申子弟之學相語以利用髙曽之規功有務於化材業無遷於異物遵代守之文不失其業及日省之際乃多其功世謂之工考工記知者創物巧者述之世謂之工傳曰工賈不變厥考作室既厎法厥子乃不肯堂矧肯構堂構考課技以事上業在其中知工之巧故觀其器而知其工之巧禮曰日省月試餼廪稱事所以勸百工也日省月試考校成功也餼廪稍食不作無用之器背窳就功窳惡也無作淫巧以蕩上心月令物勒工名以考其成功有不當必行其罪就於官府注見上門掌以工正傳曰五短爲工正主工之官辨其工苦順霜降之侯雖休百工及月試之時且聞獲戾工依於法爰考否臧物勒其名必遵賞罰稽其工事周禮公器官器物稽器稽考也同上月令命有司效功陳祭器案度程效功陳其小大之利器皿之度無或不良禮獻藝百工僝工僝巧也執技論力竒巧運斤成風莊子鄒人堊鏝其鼻若蠅翼使匠石斵去之匠石運斤成風盡堊而鼻不傷棘猴燕王好徵巧人曰臣能棘刺之端造沐猴王請其刺而觀之術人即逃也楮葉宋人有爲其君爲楮葉三年而成雜之楮葉中不辨列子曰使造化三年而成一葉物之有葉者鮮矣木䳒魯般以木爲之而飛窮妙極巧騁巧嘗巧禮雲梯公輸般造雲梯而攻宋木牛諸葛亮造木牛而運木人師偃周穆王時人縛草作人使之舞又作木人以手招王美人王怒殺師偃也心匠手澤目巧無作淫巧以蕩上心諌未聞於執藝巧自見於蕩心物貴考成器惟致用茍於功之不審則雖巧而何爲記曰目巧之室則有奥阼巧者勞而智者憂大巧苦拙老子創造欹器周廟欹器東漢猶在至漢之亂不復存形制遂絶杜預創意造成奏上帝嘉歎之鴨欄陸遜伯言時建昌侯慮於堂前作闘鴨欄頗施小巧遜乃正色曰君侯宜覧經典用此何爲慮即便毁撤之孔造作無程杜元穎爲劒南西川節度使敬宗驕僻不君元頴每欲中帝意以固幸百工造作無程機巧有思閻立德父毗隋殿中少監本以工藝進故立德與弟立本皆機巧有思朝之營繕所司必諮而後行姜確有巧思凡朝之營繕所司必諮而後行馬周䟽曰伏見王長通白明達本樂工輿皁雜類韋槃提斛斯正無他材獨解調馬雖術踰等夷可厚賜金帛以富其家今超受髙爵與外廷朝㑹騶竪倡子鳴玉曵履臣竊恥之制度不立劉蕡策曰百工淫巧繇制度不立宫内造作姚珽遷詹事節愍太子少失道珽四上書諫其一曰伏見内置作坊諸工技得入宫闈之内禁衞之所或言語内出或事狀外通小人無知因爲詐僞有㸃盛德臣望悉出宫内造作付所司贍其器用韓愈原道篇爲之工以贍其器用大木爲杗細木爲桷欂櫨侏儒棖闑扂楔各得其宜以成室屋者匠氏之功也進學解韓文十二刳闢朽壞翦焚榛薉柳宗元文不善爲斵血指汗顔巧匠觀旁縮手袖間韓文以州縣爲團凡工匠以州縣爲團五人爲火置長一人四月至七月爲長功二月三月八月九月爲中功十月至正月爲短功唐史百官志鈿鏤之工教以四年車輅樂器之工三年平漫刀矟之工二年矢鏃竹漆屈柳之工半焉冠冕弁幘之工九月唐史百官少府問工焉取則輿師是供柳宗元嶺南饗軍記錦繡官𤣥宗貴妃楊氏諸姨凡充錦繡官及治瑑金玉者大抵千人圖畵雕鏤之人張𤣥素上書太子所施與者不游手雜色則圖畵雕鏤之人材木六白山有木工則度之伐木丁丁聲也伐木椅矣繩墨誠陳不可欺以曲直遵繩墨而不頗楚辭伐柯如之何匪斧不克掄材執斵良工棄物朽木不可雕既破我斧既缺我斧又破我斨樸斵書曰若作梓材既勤樸斵惟其塗丹艧審輪轅於曲直定鑿枘於方圓相材見上目擊手傷無枉物性不違天真巨川舟楫大厦棟樑山木以不材見棄擁腫之材雕鎪之力藝有所長物無不可抱器呈材如因斧克終以功成陽木隂木周禮仲冬斬陽木仲夏斬隂木山南曰陽山北曰隂時斬又令萬民時斬材其曰言順時斬也不禁凡邦工入山林而播材不禁不狗其日也柞氏柞氏掌攻草木夏日至令刋陽木而火之冬月至令割隂木而水之有美周禮材有美而工有巧攻木之工同上行木月令季夏樹木方盛乃命有司行山行木無有斬伐爲木未堅固中伐禮記材不中伐不鬻於市樹木以時伐焉禮几服耜斬季材季穉也服耜尚柔牣草木黃落然後斧斤入山林登木以伐遠揚随山刋木勿翦勿伐坎坎丁丁並伐木聲枝葉未有害本實先撥撥絶是斵是遷斵而遷之長木之斃無不標也木屑竹頭不棄陶侃士衡在荆州時造舡木屑竹頭悉令掌之咸不解所以後正㑹積雪始晴乃以屑布地及桓溫伐蜀又以侃所貯竹頭作釘裝舡其綜理㣲宻皆此之類也伐社樹晉阮脩字宣子伐社樹或止之脩曰若社而爲樹伐樹則社移樹而爲社伐樹社亡也種材後漢樊重貨殖作器物先種梓木人皆笑之積嵗月皆得而用向之笑者咸求假焉資質巨萬恩及鄉閭不斬邱木禮爲宫室不斬於邱木注廣敬鬼神孔伐木豫章張𤣥素上書臣嘗見隋家造殿伐木於豫章二千人挽一材以鐡為轂行不數里轂輙壞别數百人齎轂自隨終日行不三十里一材之費已數十萬工揆其餘可知已山谷連聲春夏不輟張説䟽遷木石運斧斤山谷連聲春夏不輟同州大木裴延齡造神龍佛祠須材五十尺者延齡妄奏同州得大谷木數千章度皆八十尺帝曰吾聞開元時近山無巨木求之嵐勝間今何地近材之良耶延齡曰異材瑰産處處有之待聖主乃出今生近輔豈開元所當得也帝悦即山求材盤髙孕虚劉禹錫洗心亭記萬工舉斧以入柳宗元萬工舉斧以入必求諸巖崖之欹傾邱壑之紆縈凌㠝岏之杪顛嗽泉源之塗瀯根絞怪石不土而植千尋百圍與栢同色當與持斧翁前溪伐雲木李白林立峯崪穿雲蔽日渙然自撓復就行列渾渾而去以至其所唯良工之指顧叢臺阿房長樂未央建章昭陽之隆麗詭特皆是之自出柳宗元晉問取魏良材五代羅紹威梁太祖即位將都洛陽紹威取魏良材爲五鳯樓朝元前殿浮河而工立之京師太祖嘆曰吾聞蕭何守關中爲漢起未央宫豈若紹威越千里而爲此若神化然功過蕭何逺矣賜以寳帶名馬羅列而伐羅列而伐者頭抗河漢刄披虹霓聲振連巒梯填層谿丁丁登登硠硠稜稜若兵車之乘凌其響之所應則潰潰漰漰洶洶薨薨若騫若崩若螭龍之鬪風霆相騰其殊而下者札􅡴捎殺㩁崪坱比霞披電裂又似共工觸不周而天柱折柳宗元晉問巨木率一章千人乃能引則天皇后武氏薛懐義護作工數萬云徵般碩之匠下荆陽之材文粹李華賦徵般碩之匠下荆陽之材操斧執斤者萬人渉磧礫而登崔嵬擇一榦於干木規大壯於喬枚聲坎坎於青雲若神踣而顛摧勢動連崖拉風捽雷倒勁梢於窮谷斬巨抵於昭回時也山祗効靈波神作氣爲桴爲筏羽疊鱗萃朝泛江海夕出河渭雲奔山横交積于作宫之地同上膠皮七白書曰島夷皮服禮曰脂膠丹漆無或不良西方曰戎被髪衣皮虎豹之鞹猶犬羊之鞹質猶文也皮之不存膠柱寢處州綽指石綽最曰二子者譬如禽獸臣食其肉而寢處其皮天官掌皮秋斂皮冬歛革春獻之皮革踰嵗就乆乃可用也獻謂獻其良者於王以入司裘給用也遂以式法頒皮革於百工式法作物所用多少故事供其毳毛爲氈以待邦事鳯麟膠東方朔十洲記以鳯觜麟角合煎成膠名曰續絃膠衣皮袴馬援千皮食貨志屠牛羊彘千皮比千乘之家止濁阿膠不能止黄河之濁漆林地官載師漆林之征二十而五也漆身豫譲漆身吞炭孔贄魚膠突厥頡利始四年執我使者帝亦囚其使明年還順德等且請和贄魚膠給云固二國之好也生兒置膠於掌西域羌者生兒置膠於掌朋黨盜權蕭瑀言𤣥齡軰朋黨盜權若膠固然螯膠唐酉陽雜爼善菀國出百足蟹長九尺四螯煎爲膠謂之螯膠勝鳯喙膠也輸皮於太府嵗㑹牲之有亡輸皮於太府唐史百官志祠部弓人之弓函人之甲膠角百選犀兕七屬乃使踉超掖夾之倫服而持之技擊節制聞於天下是爲善師柳文晉問勁弓折膠杜牧兩漢伐虜常以秋冬當匈奴勁弓折膠童馬免乳與之相校諸州市牛皮角以供用唐百官志少府監白孔六帖卷八十三
