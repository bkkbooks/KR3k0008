黍與鴈宜麥周禮天官食醫曰鴈宜麥歌漢書武帝獲赤鴈之瑞因作赤鴈之歌遵渚鴈北徂遵渚遵陸于陸鴻漸于陸于干于盤肅肅嗷嗷鴻鴈于飛肅肅其羽哀鳴嗷嗷兄弟之齒鴈行避弓更嬴善射引虚弓而鴈落木落南翔氷伴北徂文雲飛水宿風翥不過衡陽鴈春北秋南管子桓公曰夫鴻鴈春北而秋南不失其時大夫之鷙弋鳬與鴈將翺將翔云云詩離于魚網魚網之設鴻則離之鴻鴈美宣王也箋小曰鴈大曰鴻射衛懿公射鴈於囿獻曹伯陽即位公孫彊好田弋獲鴻獻之視家語衛公與孔子語見飛鴻過仰視之色不恱子乃逝去矣水鳥駕駕乗紫煙仙隨軒後漢虞國字季卿爲日南太守行恵澤有雙鴻隨軒翔舞去郡乃遂還卿卒栖於墓側仰聽張孟陽仰聽離鴻哀鳴人亦感傷觸物増悲朝發河海反宿江漢浮沉徃来雲集霧散攝衣起前庭仰觀鴻鴈翔文彫啄蔓藻刷蕩漪瀾南翔衡陽北集鴈門方塘含白水中有鳬與鴈安得鴈羽從游波瀾草木黄落兮鴈南飛鴈流哀於江海飄飄鴈飄飄而南翔哀哀音響何哀哀歎齊桓公在覇管仲隰明侍有一鴈飛過公歎曰寡人有仲父猶飛鴈之有羽翼也彎弓而落國語更嬴侍魏王見一鴈過曰臣能揺弓而落乃彎弓鴈即落鴻鵠一舉千里所恃六翮也爲田上虞縣鴈爲人田春衘㧞草根秋喙除其穢是以縣官禁民不得妄害安可籠晉阮瑀字元瑜隠於臨薤谷張天錫徴之瑀指翔鴻示使者曰此鳥安可籠哉類長者鵝蒼鴈也小寒之日必北鄕有類長者在其上鴻鴈之集必有先後之次也嬉𤣥渚羊祐賦曰進陵鸞於太清退嬉魚於𤣥渚濯清泉成公賦曰上揮翮於丹霞下濯足於清泉憐孤鴈之偏特兮情悵焉而内傷曹植離繳鴈賦云云寥唳度雲鴈晨吟離鴻晨吟納采用之集若雲布唼萍順流唼萍孔䞇用白鴈孝敬皇帝𢎞納妃裴而有司奏贄用白鴈適苑中獲之帝喜曰漢獲朱鴈爲樂府歌今得白鴈爲婚䞇婚乃人倫首我則無慙黥雙鴈五代朱漢賔梁方東攻兖鄆鄆州朱瑾募其軍中驍勇者黥雙鴈於其頰號鴈子都太祖聞之乃更選勇士數百人號落鴈都以漢賔爲指揮使及漢賔貴人猶以爲朱落鴈仙掌月明孤影過長門燈暗數聲来杜牧之早鴈詩閑飛静集韓愈詩閑飛静集鳴相和中瑞百官志禮部蒼鳥赤鴈爲中瑞其名物三十有二錦繡爲鴈温泉御湯中有玉蓮湯從蓮中涌出毎浴以錦繡爲鴈浮之遺事先花别楚雲杜甫歸鴈詩賔秋别浦鴈賔秋聚沙李白詩雪聚沙鴈鴈飛于天杜蕃書見鵝門養鴈王績汾水上明皇雜録羯羌犯京上欲遷幸復登樓置酒有一少年自言工歌使之登且歌歌曰山川滿目淚沾衣冨貴榮華能㡬時不見只今汾水上唯有年年秋鴈飛上聞之澘然出涕顧侍臣曰誰爲此詞對曰李嶠上曰真才子也不待終曲而去嗷嗷鴻鴈鳴且飛竆秋南去春北歸去寒就暖識所處天長地濶栖息稀韓文鴈翅泊臨邑縣有鴈翅泊泊旁無樹木土人至春夏常於此澤羅鴈鳥取其翅以禦暑酉陽雜俎日照天正綠杳杳歸鴻鳴栁宗元覺衰風號沙宿呉雲寒燕鴻苦風號沙宿瀟湘浦李白王節士歌在人之上而有先後行列者鴈也故大夫執焉劉禹錫明䞇論邉聲俱来北風振槁陽埃蕭條邉聲與俱来劉禹錫楚望賦報寒驚邉鴈搗衣曲胡鴈鳴辭燕山昨發委羽朝度關一一衘蘆枝南飛散落天地間連行接翼徃復還客居煙波寄湘吳凌霜觸雪毛體枯李白鴈壻苦竹嶺頭秋月輝苦竹南枝鷓鴣飛嫁得燕山胡鴈壻欲衘我向鴈門歸李白山鷓鴣聮翩入上林虞世南鴈詩鴈度麥城霜杜甫送田四弟老鴈春忍飢哀號待枯麥杜甫送李校書詩回鴈使者元徹栁實遇水仙既别約曰有信可託回鴈使者後於廻鴈峯下得使者廟太平廣記不巢而宿文選吕向注詠湖中鴈不巢而宿故帶霜也春則北游幽憤詩注稲粱謀杜甫君㸔隨陽鴈各有稲粱謀舊國霜前白鴈來同上見花辭漲海避雪到羅浮同上誰憐一片影相失萬重雲同上朱鴈五色唐六典禮部朱鴈五色爲中瑞鷹十一白鷙鳥不摶鷹鸇之逐鳥雀鷹乃祭鳥春化仲春鷹化爲鳩秋擊立秋之日鷹隼乃擊夏學習季夏鷹乃云云冬厲疾季冬鷙鳥云云制鵬雛孔氏志大鵬雛之始飛爲鷹所制出籠下韝雄飛鮮食鮮食食肉也摶擊利觜長距青骹鉤爪受緤緤絆也匿形史鷙鳥之擊必先匿形鷞鳩鷹也蒼鷹羽族以觜距爲刀鈹礪吻文飢鷹礪吻出鍾岱之林野山出鷹飢則附人載記慕容垂猶鷹也飢則附人飽則髙飛遇風塵之㑹必有凌霄之志唯冝急其羈絆不可任其所欲也畫北齊廣陵王孝珩於㕔壁畫蒼鷹見者以爲真瑶光元命苞瑶光爲鷹猛氣傅𤣥賦楊六離之犯氣兮復㢠旋於天庭雄姿又觜利具㦸目類明星雄姿邈代逸氣横生有金剛之俊鳥生井陘之巖阻擒狡兎於平原􅎒鵷鸞於河渚孫楚賦雖逍遥於廣厦思擊厲於中原傅𤣥賦又鷹則流星曜景奔電飛光青骹素羽飄雪繁霜奮翅不得起舞翼無所翔飾五采之華麗結璇璣之金環秋吟春化攫摶隋魏彦深鷹賦惟兹禽之化育寔鍾山之所生資金方之猛氣禀火徳之炎精何虞者之多端連横羅以羈束綴輕絲於雙臉結長䋲於兩足飛不遂其本情食不充其所欲逸翰困於暫歛雄心爲之自局若乃貌非一種相乃多途指重十字尾貴合盧立如樹木望似秋胡觜如鉤利脚等荆枯亦有白如散花赤如㸃血大文若錦細班如纈眼類明珠毛如霜雪身重如金瓜剛如鐡㦯復頂平似削頭圓如盥臆闊頸長筋麁脛短翅厚羽勁髀寛肉緩求之事用俱爲絶伴㦯似鶉頸㦯似鴟首赤眼黄足細骨小肘懶而易驚而難誘住不可呼飛不及走若斯之軰不如勿有夫疾食速消此則有命鴛頸猴立是爲無病厠門忌大結肚忌軟條不欲絶背不宜喘生於窟者則好伏巢於木者則常立雙骹長則起遅六翮短而飛急毛衣屢改厥色無常寅生酉就姿號爲黄二周作鳴千日成蒼雖曰排虚性殊伏鳥雌則體大雄乃形小遇犬則驚飛得人則馴繞養雛則少疾野羅則多巧察之爲易調之實難格必堅髙屋必華寛薑以取熱酒以排寒韝湏温煖肉不陳乾近之令狎諍之使安晝不離手夜便火宿㣲加其毛少減其肉肌羸腸瘦心和性熟念絶霄雲志在馳逐孔仗内白鷹源乾曜京兆尹㽞守京師仗内白鷹因縱失之詔京兆督捕獲於野絓榛死吏懼得罪乾曜曰上仁明不以畜玩寘罪苟其獲戾尹專之遂入自劾失㫖帝一不問衆伏其知體諷獻李大亮涼州都督嘗有臺使見名鷹諷大亮獻之宻表曰陛下絶畋獵久矣而使者求鷹信陛下意耶乃乖昔㫖如其擅求是使非其才太宗荅書曰有臣如此朕何憂臂鷹崔𢎞禮過宣武從劉𤣥佐獵夷門𤣥佐臂鷹與𤣥禮馳逐髙髻偉臆長距秀頸文粹蘓頲雙白鷹賛序曰開元乙夘歳東夷君長貢白鷹一雙皆皓如練色班若綵章積雪全映飛花碎㸃所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而銳堅剛則厲摩天絶海雷擊颷逝觀其行時令順秋殺指麾應捷顧眄餘雄當落鵬之賞義仇鷂之敵竇稀代之尤也精明竦峻勇銳光芒賛曰鷹之大者精明竦峻勁而横絶雄則逺振錦文素彩珠聫玉潤徃乃奮威将軍所徇鷹之次者勇銳光芒截海而至乗風載揚絡以紅㸃文其綵章天下必中惟吏之良得霜鷹朝野僉載蘓味道才學識度物望攸歸王方慶體質鄙陋言辭魯鈍智不逾俗才不出凡俱爲鳯閣侍郎㦯問郎中張元一曰蘓王孰賢荅曰蘓九月得霜鷹王十月被凍蠅㦯問其故答曰得霜鷹俊捷被凍蠅頑鈍時人服其能體物也鷹相同鵰鷹相同鵰唯欲尾長翅短爲異耳酉陽雜俎調鷹苑中桑維翰契丹破欒城杜重威等大軍隔絶維翰曰事急矣乃見馮玉等計事而謀不合又求見帝帝方調鷹苑中不暇見維翰退而歎曰晉不血食矣籠鷹詞淒風浙瀝飛嚴霜蒼鷹上擊翻曙光雲披霧裂虹蜺㫁霹靂掣電稍平岡砉然勁翮剪荆棘下攫狐兎騰蒼茫爪毛吻血百鳥逝獨立四顧時激昻栁文君不見韝上鷹一飽則飛掣杜甫去矣行鍾岱二山鷹之所產李善注文選鷦鷯賦殊姿各獨立清絶心有向疾禁千里馬氣敵萬人將杜甫畫鷹目如愁胡角鷹翻倒壯士臂將軍玉帳軒翠氣二鷹猛腦徐侯穟目如愁胡視天地杜甫秋鷹整翮當雲霄醉歌行月進安祿山月進牛槖駝鷹狗竒禽異物以蠱帝心鷹飛於天西域髙昌遣使謝帝引責麴文泰猥曰鷹飛于天各得其所杉雞竹兎不自惜溪虎野羊俱辟易同角鷹詩飢鷹飽則去李罕之克用討王行瑜表罕之副都統檢校侍中行瑜誅封隴西郡王檢校太尉兼侍中罕之恃功多甞私克用愛將盖寓求一鎮寓爲請克用不許曰飢鷹飽則去矣我懼其翻覆也神鷹夢澤不顧䲭李白呼鷹姚元崇曰臣年二十居廣成澤以呼鷹逐獸爲樂臂鷹必困好臂鷹者其家必困宋子嵩化書勢若脫韝鷹韓愈詩决雲兒申王有髙麗赤獵置駕前目爲决雲兒隼十二白鴧彼飛隼其飛戾天易曰射隼髙墉之上鷃披隼翼逐鳥雀始擊漢孫寶立秋日署矦文爲掾曰今日鷹隼始擊當順秋氣成嚴霜之誅孔縱入民家劉貞亮傳三坊朱超晏王志忠縱鷹隼入民家榜二百奪職鷙烏鳶文粹楊䕫紀梁公對養隼者誠欲其鷙於烏鳶乎鸞隼不接翼陳子昻曰鸞隼不接翼薫蕕不同噐其理自然燕雀紛拏要鷹隼走章馳檄在得賢燕雀紛拏要鷹隼韓愈贈崔立之詩屈猛鷹隼亦屈猛杜甫苦雨詩鷙擊之鳥通呼曰隼李善注文選秋興賦隰有翔隼云鷙擊之鳥通呼曰隼隼憫胎義也宋子嵩化書烏十三白莫黑匪烏烏不日黔而黒反哺孝也受哺嗷嗷林烏受哺於子三足日有三足烏文選曰三趾而朱儀九雛城上烏一年生九子瞻烏爰止于誰之屋琴夜啼琴有烏夜啼曲聲樂師曠曰烏之聲樂齊師其遁叔向曰城上有烏齊師其遁也楚幕楚師夜遁諜告曰幕有烏矣棲冠家語曰曽子至孝三足烏棲其冠集府朱博爲御史大夫先時御史府有列栢樹常有烏數千集其上朝去暮来號朝夕烏數月不来白頭秦止燕太子丹爲質丹不聽曰烏頭白乃可歸丹仰天歎烏乃頭白遂歸瑞世紀曰周時有天火降于王屋流爲赤烏爲周瑞也射堯時十日並出堯令羿射中九日日烏皆死墮其羽翼又晋書武帝時御幕上有烏命虎賁中郎將王吉射之吉祝曰矢一發烏洞腋至尊夀萬歳臣受二千石遂中之夢宋公子得夢已爲烏喙加於南門尾加於桐門曰子夢美必立也立爲昭公月眀星稀烏鵲南飛繞樹三匝何枝可依選相風長安靈䑓上有相風銅烏有千里風則動陽烏跕跕馬援在日南仰觀烏跕跕墮水中也攫肉黄覇使吏出小吏食道旁烏攫其肉還覇仰謂曰甚苦食於道旁乃爲鳥攫肉吏大驚以謂覇盡知其起居飾鏡有烏鵲鏡瑞瑞應圖曰烏太陽之精也亦至孝之應集庭樹晉虞傳爲鄱陽令白烏羣集其庭樹赤武帝元年有赤烏見三足東觀漢記章帝元和三年代郡髙栁烏生子三足大如雞赤色頭有角寸餘又漢献帝延康元年三足烏見又西王母以三足烏爲使感孝北齊蕭倣字希然居䘮廬前有二慈烏各集一樹爲巢日午己前馴庭飲啄自午己後不下樹每到臨時舒翼悲鳴有似助哀家人見之未甞闕時以爲孝感也謠續漢書桓帝時謡城工烏一年生九雛公爲吏兒爲徒接丸呉録彭澤有烏能接丸行者丸飯投之髙下無失日烏古今注日中無光者日中烏也日中烏若去即天下烏去也名古今注烏一名蟄烏有鵯烏雅烏楚烏鵯音􅂒卑居爾雅此卑居也卑居楚烏也又曰雅烏也小而多腹下白也燕烏炎烏燕白脰烏鸀小烏也􅀈爾烏而小赤觜宂乳出西方鸀音㳙巢門畫壁華陽國志吳順至孝養母有赤烏巢門風俗通王吉射烏見上注後帝令庭壁悉畫爲烏八九子樂府詩有烏生八九子見上注令烏晉成公賦曰惟𤣥烏之令烏兮竆烏梁何遜竆烏賦望絶侶於霞夕聽羣翔於日晚云云太宗烏詩近日毛雖煖聞弦心已驚迎風向日日禽陽烏歸飛反哺雌雄白黒磬磬提提排空孔羣噪營上李敬業蘓孝祥率騎兵五千夜度擊敬業孝祥死有烏羣噪敬業營上天隂雺聞烏聲韓偓崔允請以輝王爲元帥帝問偓它日累吾兒否偓曰陛下在東内時天隂雺王聞烏聲曰上與后幽困烏鵲聲亦悲陛下聞之惻然有是否帝曰然是兒天生忠孝與人異意遂决偓意附允類如此神鴉韓全誨傳初帝至鳯翔有鴉數萬棲殿樹謂之神鴉俄而鴉不来人以爲恐集㦸架栁仲郢初仲郢爲諫議大夫毎遷必烏集升平第庭樹㦸架皆滿五日乃㪚及是不復集卒於鎮噪庭樹劉漢宏鴉噪諸庭命斫樹薄地鴉十國紀年五代蜀呂彦徳驍勇善騎射常從王宗播宗儔征討冠牛革㡌被漆甲跨烏馬執斫刺刀軍中目爲薄地鴉白烏碧烏五行志貞元十八年六月烏集徐州之縢縣嗛柴爲城中有白烏一碧烏一也赤烏巢所居樹朱敬則兄仁軌隠居養親常誨子弟曰終身譲路不枉百歩終身譲畔不失一叚有赤烏巢所居樹夜飛延秋杜甫詩長安城頭頭白烏夜飛延秋門上呼兵曹烏北夢𤨏言崔希喬以仁孝稱其在并州㕔前叢葦上有小烏如鷦鷯來巢孕卵五色如雞子雛見月餘五色成文大如鵝馴擾閑暇頃之飛翔時歸舊所號兵曹烏候雨酉陽雜爼俗候烏飛翅重天將雨前引多喜烏鳴地土無好聲人臨行烏鳴而前引多喜同上白孔六帖卷九十四
