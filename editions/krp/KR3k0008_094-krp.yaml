body:
  text: 白孔六帖卷九十四唐白居易原本宋孔傳續撰鳥一鳯二瑞官三大鵬附鸞四鶴五孔雀六鸚鵡七雞八雉九鴈十鷹十一隼十二烏十三鳥一白卵既生矣翼而張之載飛載鳴一飲一啄羽族擇木仲尼曰鳥能擇木木豈能擇鳥排虛鳥排虚空而飛三年不鳴齊威王曰有大鳥止于王庭三年不飛飛則冲天三年不鳴鳴則驚人相彼鳥矣猶求友聲出自幽谷遷于喬木竆鳥入懐和鳴騫翥羽毛觜距求友籠鳥有山藪之思載好其音有鶯其羽鶯文綵也珍禽羽物周禮獻鳥者佛其首曲禮云云執禽者左手不獝鳯以爲畜故鳥不獝獻禽禮曰凡獻禽加於一䨇則執一䨇以將命妻其餘加猶多嫗伏禮羽者嫗伏夘生者不殈殈裂也男贄禦孫曰男贄大者玉帛小者禽鳥注云云大夫執鴈士執雉鳥焚其巢易飛鳥遺之音宜下不宜上吉也鳥之將死其鳴也哀鷹鸇之逐鳥雀緜蠻黄鳥止于丘隅于飛集木黄鳥于飛集于灌木鸚鵡能言不離飛鳥養鳥秋官閩𨽻掌畜養鳥而蕃阜教之與鳥言秋官夷𨽻秋官夷𨽻掌役牧人養牛與鳥言云云鳥養乃眩視莊子曰海鳥止魯郊魯矦御而觴之奏九韶其太牢鳥乃眩視悲憂不食一臠三日而死非以鳥養養鳥者宜棲之深林聞樂莊子曰咸池九韶張於洞庭野鳥聞之而死咸若書曰鳥獸咸若傅其翼者兩其足漢書翼后稷姜嫄始生后稷誕寘之寒氷鳥以翼覆之鳥獸鏘鏘率然舞化舜徳髙飛詩有鳥髙飛亦傅于天鷹祭禮曰處暑之日鷹乃祭鳥畜鳥者則勿佛佛戾也禮大羅掌天子羅鳥獸雲如赤鳥傳有雲如衆赤鳥夾日以飛三日鳴亳鳥鳴于亳社如曰嘻嘻甲午灾云云無跡莊子云莽眇之鳥逺深無跡入竅者卵生莊子反鄕飛鳥反鄕依其所生羅之一目文子得鳥者羅之一目適至家語少吴立鳯鳥適至故以鳥名官避不義又鳥獸之於不義尚知避之竅啄又鳥獸竅啄悲鳴送子恒山之鳥生四子羽翼既成分飛四海其母悲鳴而送之鳥生於隂属於陽故卵之鳥社瑞應帝王世紀禹𦵏會稽有羣鳥應民春耕則䘖去草根啄除其蕪穢故謂之鳥社書化家語孔子與子夏講道徳有赤氣貫天孔子曰魯瑞門當有血書西飛爲鳥也具變化門衘丹書吕氏春秋周文王時見大赤鳥衘丹書集周社文王火氣勝故其色尚赤也從南方来晋平公時有鳥從南方来赤質五色皆備集於庭相讓叔向曰吾聞師曠曰西方有鳥白質五色曰翬南方有鳥赤質五色曰雉今來爲君瑞也悲楊震後漢楊震改葬華隂潼亭先葬十日有大鳥丈餘集震墓前俯仰悲鳴淚下沾地葬畢飛去時人立鳥象於墓前入帳中宋紀髙祖伐鮮卑夜有大蒼鳥如鵝飛入髙祖帳中從事胡蕃曰蒼者敵人之色敵歸我也明旦攻城大破之小鳥生大鳥宋紀土地開闢則有小鳥生大鳥條支之鳥卵如罋命起西都賦曰命荆州使起鳥野鳥號東廂上有特栖鳥王粲詩列敷丹榮上云云上懐春向我鳴客鳥思故鄕翔鳥薄天飛越鳥巢南枝願隨越鳥翻飛南翔鳥倦飛而知還鳥獸腯膚帝江傳妙鳥於帝江注天山有鳥如丹識歌舞而妙靡名曰帝鄕如彼翰林鳥䨇飛一朝隻棲者擇木雊者擇音鳥登木而失條整輕翮而思矯鳥散餘花落昨夜鳥聲春寄言楚辭願寄言於三鳥三鳥飛以自南覧其志而吹北也見離騷毛羽未成不可以髙飛史傷弓之鳥落於虚發史畢駭文鳥畢駭獸咸作知其能翔史孔子見老子曰鳥吾知其能翔魚吾知其能游於龍吾則不能知𥅆其龍乎鳥獸阜滋阜大也不厭髙同聲相應殊聲文衆形殊聲翩翻逸飛翕翼交頸短羽相鳴接翼巢居翺翔理翮觸絲冲天斂翼髙飛竝影側足纓繳寓居短磬整翰聮翩濯翼排虚䟽風擇木奮飛孔衆禽之偶韋思謙進御史大夫見王公未嘗屈禮㦯以爲譏荅曰耳目官固當特立鵰鶚鷹鸇豈衆禽之偶飛鳥依人帝曰禇遂良鯁亮有學術竭誠親於朕若飛鳥依人自加憐愛啾號栁懲咎賦衆鳥萃而啾號五大鳥集宫竇建徳冬至大會僚吏有五大鳥集其宫羣鳥從之夢張鷟爲兒時夢紫文大鳥五色成文止其庭異鳥蕭銑自稱梁王有異鳥至建元爲鳯鳴飛擁行車開元遺事李元紘爲餘杭令治有聲遷潤州司馬發離百里鳥鵲之類飛擁行車鳥影度寒塘杜甫詩容與波上閻立本太宗泛池見異鳥容與波上召立本侔狀羣噪張直方洛陽飛鳥皆識之見必羣噪鴟梟不鳴未爲瑞鳥吕向上言珍禽則天臨朝拜洛受圖大陳珍禽羅取王世充羅取飛鳥書符命於帛繫鳥足縱之有彈捕得鳥而獻者亦拜官鳥得風而翔元稹曰鳥得風而翔竒禽恠羽倪若水上言竒禽恠羽爲圜禦之玩四千五百種唐酉陽雜爼鳥有四千五百種鳥省馬充給事親仁坊有宅南有山亭多養鵝鴨又雜禽一家人掌之謂之鳥省出廬氏雜記翔霄宻網之鳥舉羽而翔霄栁宗元戞瑟幽鳥啼杜牧詩髙飛之翮長者在前卿朝廷羽翮也文宗謂李程鳥窺新捲簾杜甫詩鳳二白鳯兮鳯兮何徳之衷丹穴于飛四靈麟鳯龜龍五色之文九苞之狀神鳥鳯别名也陽精鶡冠子鳯皇鶉火之禽陽之精翽翽其羽鳯皇于飛云云嗈嗈鳯皇鳴矣嗈嗈喈喈擊九千里應十二律仙翰靈鳯鳯儀丹穴名官見瑞官門鸑鷟鳯雛來儀簫韶九成鳯皇来儀六象鳯有六象頭象天目象日背象月翼象風足象地尾象緯緯五緯也九苞一曰歸命二曰心合度度天度也三曰耳聰逹四曰舌屈伸五曰彩色光六曰冠短州州當朱色也七曰銳鉤八曰音激揚九曰腹戶戸所由出入也鳴行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰即都知我唯黄持竹實來也孔子從鳯故孔子欲居九夷從鳯鳯遇亂則居夷狄鳯皇殿宣帝時鳯皇集上林乃作鳯皇殿以荅嘉瑞鳯羽族之美莊子金咮朱冠鄴中記曰石季龍與皇后在觀上有詔書五色紙書著鳯皇口中既衘詔侍人放數百丈緋䋲麻盧廻轉鳯皇飛下鳯以木作之五色畫之咮脚皆用金顧愷之鳯皇賦曰朱冠赫以䨇翹五綵羽千金毛東觀漢記曰建武十八年鳯髙八尺毛羽五色集潁州郡羣鳥並從盖地數頃㽞十七日乃去又拾遺記周昭王以青鳯之毛爲一裘一曰暖質二曰暄肌常以禦寒至厲王末猶寶此及厲王流于彘人得而珍之罪有䧟大辟者以一青鳯毛贖罪免外一毛千金賦太宗鳯賦曰有一靈鳯羽翮朝陽晨遊紫霧夕飲𤣥霜資長風以舉翰戾天衢而逺翔雄曰鳯雌曰皇書注云云不聞茍徳不降則鳯皇不聞煥乎其有文章南方之鳥所居積石千里河出下鳯居上天爲生食其樹名瓊枝髙百二十圍以琳琅爲寔天爲生救之離珠一人三頭逓卧迭起以司琅玕莊子左文曰賢右丈曰智羽蟲長家語羽蟲三百六十而鳯爲之長也鳯王者之嘉祥應瑞圖仁信瑞應負信戴仁挟義膺文苞智不啄生蟲不折生草不羣居不侣行不經羅墜網上通天維下集河洛明治亂見存亡也食琅玕靈鳯振羽儀戢景西海濵朝食琅玕實夕飲玉池津宿丹山文夕宿丹山際鷰假文鷰翼假鳯翔鴟梟笑鳯皇不亦病乎聽鳴鳯之嗈嗈天台飄飄高逝文鳯飄飄其髙逝兮夫固自引而逺去也翔千仞文鳯皇翔于千仞兮覧徳輝而下之見細徳之險㣲兮揺矰翮而去之集南嶽文鳯皇集南嶽徘徊孤竹根於心有不厭奮翅凌紫雲豈不嘗辛苦羞與黄雀羣何時當来儀順作聖明君鳯騫翥於薨棟咸遡風而欲翔遡向也逺罻羅文鳯鳴髙崗以逺罻羅有聖賢之徳不及棲鳯不及棲喻賢也文擇高梧文鳥擇髙梧来儀之鳥迅翮推迅翮於鳯宂注漢不用敬通丈也鐡鳯皇其闕文藻翰顧愷之賦朱冠赫以雙翹靈質翽其髙舉偹六徳以成文暉藻翰之郁烈云云鳥長鳯也鳯愈飄翔而髙舉楚辭惶惶鳯獨惶惶無集楚辭不下鳯皇飛而不下楚辭安栖鳯兮安栖楚辭不貪鳯亦不貪而妄食楚在笯笯籠簬名楚辭髙翔楚獨見鸞鳯髙翔于大皇之野循四極而廻周覧徳威而後下仙駕来翔呉志費禕曰鳯皇来翔麟吐哺自然之色蜀志鳯生五色豈以五采飾畵也雛蜀龎統字士元號鳯雛東南之實晋張華曰顔彦先鳯鳴朝陽東南之實者也思聲晋習鑿齒既罷歸與桓温弟秘書曰毎從北門而望隆中想卧龍之吟東眺白沙思鳯雛之聲止阿房晉符堅時長安謡曰鳯皇止阿房堅曰鳯皇非梧桐不栖非竹實不食乃植梧桐竹數十萬於阿城以待之時慕容冲小字鳯皇至是終䧟堅城入止阿城也候鳴調律抱樸帝軒轅侯鳯鳴調律翼若竽聲若簫樂帝之心孫卿子濯羽弱水暮宿風宂淮南子形貌韓詩外傳曰鳯雞冠鸞喙虵頸龍胼鶴翼魚尾鴻前麟後鶴顙鴛鴦臆龜目而中注戴徳揚義背負仁翼挟信心抱忠足履正尾繫武仁智之禽鵠鵛而龜腹晋中興書云云首文曰徳翼文曰禮背文曰義膺文曰仁腸文曰信山海經居廣都之野節節白虎通曰雄鳴足足又雌鳴游必擇地飢不妄食白虎通云小音中鐘擊磬帝王世紀曰帝嚳擊磬鳯皇舒翼而舞駕六春秋命厯序昔辰數治世雖小九次之號曰皇談駕六鳯皇出也衝治三百五十歲也火精春秋孔演圖鳯火精随孟虧瑞應蕭孟虧人首身爲虞氏馴百禽夏后之世民始食卵孟虧去之鳯皇随也威鳯鳯有威儀孔河東三鳯薛元敬河東三鳯見兄弟門鳯鳴朝陽韓瑗自瑗與遂良相繼死内外以言爲諱將二十年帝造奉天宫御史李善感始上疏極言時人善之謂爲鳯鳴朝陽鸞鳯冲霄必假羽翼馬周帝以飛帛書賜周曰鸞鳯冲霄必假羽翼在鼓西舍利獻其國樂至成都按瑞圖曰王者有道則儀鳯在鼔故羽葆鼔栖以鳯皇鳯有利觜衆鳥不賔宋子嵩化書獻水鳥爲鳯五代安重榮饒陽令劉巖獻水鳥五色重榮曰此鳯也畜之鳯集通訓門楊國忠帝再幸左藏庫班賚百官出納判官魏仲犀言鳯集通訓門門直庫西有詔改爲丹鳯門進仲犀殿中侍御史属吏率以鳯皇得優調不篝不笯文粹皮日休補九夏樂歌鳯之愉愉不篝不笯樂徳而至如賔之娯蒼梧之𤣥文粹李白大鵬賦耻蒼梧之𤣥鳯輝綵質與錦章建元蕭銑建元鳯鳴若鳯鳥始見李渤韓愈遺書曰朝廷士引頸東望若鳯鳥始見争先覩不憎山栖王績託無心子以見趣曰鳯不憎山栖和聲随祥風窈窕相飄揚丹宂五色羽其名爲鳯凰昔周有盛徳此鳥鳴髙崗和聲随祥風窈窕相飄揚岐山下詩韓文五章備綵珍鳯飛九千仞五章備綵珍李白古風祥風遺蒿鷃韓文聫句鳯飢不啄粟所食唯琅玕焉能與羣雞蹙促争一餐朝鳴崑丘樹夕飲砥柱湍李白詩一毛生鳯穴杜甫鳯凰五色百鳥尊韋應物鳶奪巢鳯凰五色百鳥尊知鳶爲害何不言北風破南極朱鳯日低垂杜甫北風鳴鳯託髙梧凌風何翩翩李白鳯凰蔚跋而來遊杜甫西岳賦鳯凰鳥之逺人者也昔舜治天下政成而民恱命䕫作樂樂聲和鳥獸聞之皆鼔舞當是之時鳯凰適至舜之史因并記以爲美後世因以鳯来爲有道之應其後鳯凰數至㦯出於庸君繆政之時㦯出於危亡大亂之際是果爲瑞哉五代史五色赤文鳯也紫文鸑鷟也張薦祖鷟爲兒時夢紫文大鳥五色成文止其庭大父父曰吾聞五色赤文鳯也紫文鸑鷟也資長風而舉翰戾天衢而逺翔西翥則煙氛閟色東飛則日月騰光太宗鳯賦見萬歳縣前蜀王建天祐七年六月鳯凰見萬歳縣瑞官三白瑞官傳少昊氏之立有鳯鳥適至故紀於鳥而名官鳯鳥氏厯正也注有鳯爲瑞故以鳥名官厯正掌厯之官歌舞丹宂山有鳯自歌自舞見則天下太平鳯凰翔兮舞紫庭周成王時鳯凰来儀於庭成王乃歌曰云云巢阿閣黄帝時鳯巢阿閣鳴岐陽内史曰周之興也鸑鷟鳴于岐陽衘圖漢帝坐於𤣥扈洛水之上有鳯衘圗至帝前以黄玉爲柙也授璽鳯皇負圖授堯黄玉爲檢白玉爲䋲其章曰赤帝符璽止帝梧韓詩曰黄帝齋于宫中鳯乃蔽日而下止帝東園集梧桐食竹實沒身不去君子有道鳯皇在郊藪禮集穎川黄霸爲穎太守仁化大行鳯集境内仙蕭列仙傳曰蕭史吹簫秦穆公女弄玉亦善吹簫因妻之後鳯皇来夫婦俱去穆公因作鳯女樓覆巢毁卵則鳯不翔史仲尼曰鳯鳥不至吾已矣語雛古詩曰鳯皇何啾啾三母將九子易林曰鳯有十子同巢共母權以相保又鳯生五雛又鸑鷟者鳯之雛也作律黄帝使伶倫采嶰谷之竹㫁兩節間而吹之於是制十二管以聽鳯皇之鳴其雄鳴爲六律雌鳴爲六呂謂之律本卜婚傳懿氏妻敬仲其妻占之曰是謂鳯皇于飛和鳴鏘鏘鳴朝陽鳯皇鳴矣于彼髙崗梧桐生矣于彼朝陽鳯非梧桐不棲非竹實不食非醴泉不飲衘詔見上棲枳棘仇香爲主簿人曰枳棘上非鸞鳯所棲上擊九千宋玉曰鳯上擊九千里翺翔於杳冥之際年號漢宣帝時有鳯皇之瑞改元爲王鳯元年鳯以爲畜鳯翼見上雲儀朱冠赫以雙翹金口見上衘詔注集玉谷易林曰鳯皇爲主集於玉谷口鳯宿鳯宂鳯舉鳯鳴孔少皥宗師太皥之道故曰少皥其立也鳯鳥適至故紀於官爲鳥師鳯鳥氏厯正也學記揔叙以爲人極分瑞官於鳯紀斯乃帝吴氏之所以爲人極也霍融嵩山啟母廟碑古師官鳥來鵠聖政紀頌鳯鳥爲司疇人受職張說大衍序大鵬新添讀晉書覩阮宣子大鵬讃鄙心陋之李白序北溟之有魚吾不知其㡬千里其名曰鯤化成大鵬質凝胚渾同上大鵬賦激三千以崛起摶九萬而遐征背嶪太山之崔嵬翼舉垂雲之縱横同上歴汗漫以夭矯塌閶闔之峥嶸上摩蒼蒼下覆漫漫同上六月一息至于海湄憇乎泱漭之野入乎汪湟之池同上大鵬驚攫何諷夢渇賦右翼掩乎西極左翼蔽乎東荒李白賦大鵬横霄而測度明堂賦斬飛鵬於日域獵賦上繽翻鵬翼吕温程盧公賛鵬騫堕長翮韓文送恵師鸞四白女牀山海經云女牀山有鳥曰鸞自歌自舞舞鏡孤鸞見鏡覩其影謂爲雌必悲鳴而舞孝感漢書方諸遭母憂負土成墳種松千根鸞鳥栖其上感政王輔爲重泉令有鸞翔集感異政也感樂抱朴子曰鸞聞樂而舞至則國安樂也棲棘見上置獲異苑曰罽賔國王置得一鸞欲其鳴不可致飾金繁饗珍羞對之愈戚三年不鳴夫人曰常聞鸞見類則鳴乃懸鏡照之鸞覩影悲鳴冲霄一奮而絶鸚鵡配禰衡賦云配鸞皇而等矣垂翅而舞東觀漢記章帝時集郡國王阜世公爲重泉令吏民向化鸞止學館阜使授官掾公沙疊爲張雅樂舉足垂翅應聲而舞復止縣屋㽞十餘日乃去赤神之精瑞應鸞赤神之精鳯皇之恠狀翟而五色以天鳴中音肅肅雍雍喜則鳴舞出女牀之山窟氏之國及軒轅之邱沃民之域標山之所都之野自歌之鳥徘徊漢息夫躬絶命辭曰鷹隼横厲鸞徘徊兮矰若浮焱動則機兮叢棘棧棧曷可棲兮冕頸折翼庸得徃兮裔裔天台賦覿翔鸞之裔裔伏竄鸞鳯伏竄兮鴟梟翺翔鸞崗豫章記在西山洪崖先生乗鸞所憇處也髙翔見上孔鸞降庭楊仲昌爲孝義令鸞降庭太平之瑞楊烱冕服議鸞者太平之瑞也冲霄馬周見鳯門鸞隼不接翼陳子昻本傳鳯之族鸞乃鳯之族翺翔紫雲霓文章輝五色雙在瓊樹棲李白登黄山葳蕤紫鸞鳥巢在崑山樹李白贈漂陽宋少府鸞翔慶霄齊成公碑權徳輿鸞鳯忽覆巢麒麟不来過李白詩翠竹碧梧鸞亭峙韓愈馬殿中誌退見少傳翠竹碧梧鸞停峙能守其業者也鱗羽之於虬鸞獨孤及李華集序時軰歸望如鱗羽之於虬鸞也大瑞唐六典禮部鸞爲大瑞鶴五白仙鶴鳴鶴野鶴胎化仙禽舞鶴賦曰偉胎化之仙禽陽烏鶴金衣西京記黄鶴下太液池上爲歌曰黄鶴飛兮下建章金爲衣兮菊爲裳鶴鳴九臯聲聞于天詩鳴鶴在隂其子和之易乗軒衛懿公好鶴鶴有乗軒者及狄人代衛授甲者皆曰使鶴鶴寔有禄位在雞羣晋書嵇紹在稠人中昻昻然若野鶴之在雞羣五里飛来雙白鶴篇曰五里一反顧十里一徘徊云云琴操曰商陵牧子娶妻無子父母出之牧子别妻援琴而鼔之作别鶴操集華池韓詩田饒曰夫黄鶴一舉千里集君華池啄君稲梁君猶貴之以其從来逺也雞有五徳君輕之以其從来近也仙笙王子喬好吹笙後告其家人曰七月待我於緱氏山頭及期果爲白鶴謝時人去雷門鼔臨海記有鶴飛入㑹稽雷門鼔中於是鼔鳴洛陽聞之後斫破鼔鶴遂飛去舞吳王舞鶴於市中令萬人觀之唳陸機將誅臨刑嘆曰欲聞華亭鶴唳不可得矣歸遼東遼東華表柱忽有鶴集其上曰有鳥丁令威去家千年今始歸城郡知故人民非何不學仙冢纍纍驚露風土記鳴露此鳥性警至八月露降則驚而鳴也青田永嘉記青田有雙白鶴青年年生長便去放冲天有餉鶴於支遁者遁謂之曰爾冲天之物寧爲耳目之玩乎遂放令去紫蓋衡山有紫蓋峯峯上有雙鶴廻翔而鳴君子化抱朴子曰周穆王南征一軍自化爲猿君子化爲鶴鶴不日浴而白莊子千歲鶴千歲棲於偃盖松舞師曠曰鼔琴𤣥鶴鳴舞有鶴在林詩鷰雀焉知鴻鵠之志蜉蝣不知龜鶴之年吊晋陶侃䘮親有一客來吊出門化爲白鶴飛去衘珠報恩搜神記噲參行遇𤣥鶴被傷乃収養之放去至一夜雌雄俱衘一明珠来以報参也王喬控鶴以冲天氅裘晉王恭披鶴氅裘孟永謂曰真神仙中人也千歲抱朴子曰千歳之鶴随時而鳴能登木其未千歳者終不集樹色純白腦盡成骨如此即可知也入帳茅君傳曰好道者入廟㦯見一白鶴入帳中鶴者皆是九轉還丹之使飲溶溪之水唼太湖之萍拾遺記周穆王時塗循國献青鳯二十鶴各一雌一雄飼以潭臯之粟飲以溶溪之水古詩曰鴻鶴比翼遊羣飛献太清常畏大網羅憂禍一朝并豈若集太湖順流唼浮萍相鶴經鶴陽鳥也而游於隂因金氣依火精以自養金數九火數七年八變百六十年大變百六十年變止千六百年形定體潔故白聲聞天故頂赤食於水故喙長輕於前故後指短棲於陸故足髙而尾彫翔於雲故尾豐而肉疎大侯以味故脩頸以納新故生壽夭不可量所以體無青黄一色者木土之氣内養故不表於外是以行必依洲嶼止不集林木盖羽族之崇長仙人麒麟也𤣥鶴壽滿三百六十歳則色純黒指蓬壺而翻翰望崑閬以揚音文選𤣥精鶴經曰鶴之上相露眼𤣥精貟吭吭頸也介鳥思𤣥賦過九臯之介鳥介鳥者鶴也玉羽徘徊絜朗素羽藻質紫頂紫麻明心巢居一舉霜毛嘹唳朱頂月羽白羽頳首清響千里冰質天歩脩趾靈羽孤高馴養露眼天居差池青田羽客翔金城戱芝田飲瑶池出吳市振迅衣逐晉琴飛度武溪精含丹而星耀頂凝紫而烟華孔鶴鳴雞樹張鷟僉載云鳯閣侍郎杜景佺文章知識並髙逺時號爲鶴鳴雞樹𤣥鶴爲上瑞唐六典禮部低昻各有意磊落如長人杜甫薛少保畵鶴詩翔則摩空行則徐歩南蠻西舍利凢曲名十有二四曰白鶴游驃云蘇謾底嘿謂翔則摩空行則徐歩也蓬山之竒禽李白畵鶴賛曰圖蓬山之竒禽想瀛海之縹緲紫頂煙赩丹眸星皎昻然佇眙霍若鶩矯同上長唳風霄寂立霜曉同上夢鶴李抱真夜夢駕鶴寤而刻寓鶴衣羽服習乗之兵爪酉陽雜爼鶴左右脚裏第一指名兵爪慈恩寺大和中長安城南韋曲慈恩寺塔月夜有一美人從三四青衣繞塔言笑忽頋侍婢曰院僧借筆硯来於梁上題詩黄子波頭好月明忘却華亭到遶行煙収山低翠黛横折得荷花逺恨生僧將燭之化爲白鶴飛去出河東記雲間孤鶴𤣥宗天寶十三載重陽日獵於沙苑雲間有孤鶴徘徊上御弧矢中之鶴帶箭矯翼西南而逝益州城西十五里有道觀觀東廊第一院有青城山道士徐佐卿一歳卒三四至一日忽不懌曰偶爲飛矢所加尋已無恙然此箭非人間所有吾㽞之於壁後年箭主至則付之乃記壁去㽞箭之時則十三載及帝幸蜀暇日命駕行游偶至觀入此堂忽覩箭取而翫之乃御箭也深異之佐卿乃中箭鶴出廣徳神異記威遲白鳯熊非是蒼鶊隣杜詩赤霄有真骨耻飲洿池津同上一舉千里李善選鶴賦注一舉千里既𤣥且逺如蓬之集如雪之飛同上羽毛與煙霧同色上風雨既除其色愈浄上老鶴萬里心杜甫毛羽霜雪妍元稹和樂天感鶴我有所愛鶴毛羽霜雪研秋望一滴露聲洞林外天自隨衛矦去遂入大夫軒雪貌久已隔玉音無復傳吟君感鶴操不覺心惕然不知曽化鶴遼海歸㡬度李白鶴鶴相唳氣交也化書星星仙語人聽盡劉夢得歩虛詞華表千年一鶴歸凝丹爲頂雪爲衣星星仙語人聽盡却向五雲翻翅飛孔雀六白綷羽文孔雀綷羽而翺翔集長門孔雀集而相存生遐裔孔雀生遐裔獻白色宋孝武大明五年新昌軍獻孔雀白色者爲裘齊書文恵太子織孔雀毛爲裘夫子家禽孔文舉詣楊脩年九歳爲設果有楊梅文舉語之曰此君家果脩曰未聞孔雀是夫子之家禽也孔翣南蠻婆利左右持孔雀翣飾纛盤盤以孔雀羽飾纛南蠻盤盤傳鸞鳯友韓愈和武相公孔雀詩穆穆鸞鳯友翠角金華又翠角髙獨聳金華煥相差鉦棲孔雀西舎利樂鉦棲孔雀占城孔雀五代占城鳥之孔雀畵屏間髙祖皇后竇氏父毅在周爲上柱國尚武帝姊長公主嘗謂主曰此女有竒相何可妄與人因畵二孔雀屏間請㛰者射髙祖最後射中各一目毛彩光華西舎利曲名九曰孔雀王驃云桃臺謂毛彩光華也因雷聲而孕酉陽雜爼孔雀因雷聲而孕辟惡衛公言孔雀辟惡上尾端一寸名珠毛同上孔雀尾端一寸名珠毛解舞邊鸞工丹青最長於花鳥貞元中新羅國献孔雀解舞徳宗詔於𤣥武門寫貌一正一背翠釋生動金光遺妍能應繁節出唐名畵録翠羽金花孔雀未知牛有角渴飲寒泉逄觝觸青霄𤣥圃湏徃来翠羽金花不辭辱杜甫赤霄行孔翠望赤霄愁入彫籠養同上鄭虔詩羅州土貢孔雀唐地理志採毛爲扇嶺表異録交趾人多養孔雀採金翠毛爲扇鸚鵡七白能言不離飛鳥靈禽襧衡賦曰惟西域之靈禽辨恵之性閉以雕籠剪其翅羽並襧賦黄山山海經曰黄山有鳥赤喙青羽人舌能言語名之曰鸚鵡也籠鳥有山藪之思自然之姿文哿矣之性能言言鳥漢異域志献言鳥注鸚鵡鸚母諸葛恪在吳主座有鳥飛過恪曰白頭翁張昭在座疑恪譏之乃曰恪欺陛下不聞有鳥名白頭翁若有請覔白頭母恪問鳥有鸚母請覔鸚父昭不能對雉顧鶴眄鸞跱鳯息丹喙含恵緗葩煥翼曹毗賦丹足左𤣥賦聚赬爪於丹足朱咮婉朱咮恵鳥郭璞賛鸚鵡獻謝莊賦宋元嘉二十一年湘州獻赤鸚鵡詔羣臣爲賦之又獻晉安帝義熙十四年䄮林邑獻白鸚鵡宋天監二年㫁諸侯進又交州献能謌乃不納之又漢興平元年益州獻鸚鵡三隻日夜食三升麻子今榖貴此鳥無益有損可付安西將軍楊定國令歸本土兩指向前異物志鸚鵡西域靈禽兩指向前也赤羽赤喙見上五色廣州一根社出鸚鵡五色曽見其白色者大如母鴨水霑羽救火靈驗記有鸚鵡飛集山中禽獸輒有愛重之去後山中有火鸚鵡入水霑羽飛灑之天神曰彼雖有志何足云鸚鵡曰常僑止此山禽獸行善不忍見加天神感之爲雨滅火乾臯一名云云三種異物志云鸚鵡有三種青大如鳥一種白五色大於青凡鳥四指三向前一向後此鳥兩指向前兩指向後通夢憂賢周宣夢書曰鸚鵡一爲亡人居宅也夢見鸚鵡憂人也其在堂上者憂賢也感神滅火見上注謝莊賦恵梏昭大天機自曉審國音於中華逹方聲於遐表及其雲移霞峙雪委雨翻陸離翬衛容與傾軒躍林飛岫煥若輕電之勢月圓光於淥水雲寫影於青林殊智緗翼啄蘂恵性紅臆紺趾靈息紫頸金目能言翼襟擇木天機緑衣丹觜竒姿𤣥頷緑襟采采咬咬孔丐還新羅貞觀五年献女樂二太宗曰比林邑献鸚鵡言思鄉丐還况於人乎付使者歸之訴寒環王貞觀時献五色鸚鵡白鸚鵡數訴寒有詔還之五色訶陵元和八年献僧祗奴五色鸚鵡紅毛齊翅陀洹貞觀時献婆律膏白鸚鵡首有紅毛齊于翅白鸚鵡金鸞記曰韓偓與