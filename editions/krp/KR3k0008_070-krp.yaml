body:
  text: 白孔六帖卷七十唐白居易原本宋孔傳續撰叙官一官班二爭長三三公四宰相五叙官一白卑髙以陳貴賤位矣列貴賤者存乎位易唐虞稽古建官惟百夏商官倍亦克用乂書官設居方各設官使居方慎簡乃僚俊乂在官無曠庶官德懋懋官允釐百工理亂在庶官䇿名黄帝以雲紀故為雲師炎帝以火紀太皥以龍紀少皥以鳥紀故為鳥師以鳥名為官名也執秩晉文公作執秩以正其官執秩主作秩者身之所庇謂大官大邑也入財為官馮翊以黄覇入財為官不署右職頒官分務官修其方景詔曰夫吏者人之師表也車服宜稱爛羊後漢更始所置官多羣小長安語曰竈下養中郎将爛羊胃騎都尉爛羊頭封列侯狗尾續晉趙王倫簒位取皆屠沽人人争功官皆濫授珥貂蟬者二百餘人時人語曰貂不足狗尾續舜命九官周分六職狼牧羊楊泉物理論武士宰民猶使狼牧羊鷹養雛是以人主務審官人代天工賢為國寳官執人柄官無滯事寘彼周行䇿名委質善於其職當官而行委之常秩官邪國家之敗由官邪也授方任能政有經矣為大政酌於人百官承事筮仕有位於朝官不易方方業官庀其司官人國之急也物有其官官修其方陳力就列熙帝載亮天工縻王爵朝行命秩設官分職周禮干禄及門仕進之門将仕然後官之大司馬辨論材然後官之各揚其職揚舉官壞禮政荒民散智效一官莊子守道不如守官屬官聯事孔併省外官張延賞時議遣劉元佐復河湟延賞因建言今官繁費廣州縣殘困宜倂省其貟即詔上州留上佐録事參軍司户司兵司士各一貟餘參軍留半中州減司士上縣令尉具中尉省尉京兆河南府司録判官赤縣丞簿尉各省半餘府準上州詔下内外始怨列傳五十二百官分職上下相維崔沔沔既喜論得失或曰今中書宰相承制雖侍郎貳之取充位而已沔曰百官分職上下相維以成至治豈可俛首懹禄耶唐書列傳古者計人置吏不肯虚設杜佑古者計人置吏不肯虚設自漢至唐因征戰艱難以省吏貟誠救弊之切也昔臯陶作士今刑部尚書大理卿則二咎繇也垂作共工今工部尚書将作監則二垂也契作司徒今司徒户部尚書則二契也伯夷為秩宗今禮部尚書禮儀使則二伯夷也伯益為虞今虞部郎中都水使者則二伯益也伯冏為太僕今太僕卿駕部郎中尚輦奉御閑廐使則四伯冏也古天子有六軍漢前後左右将軍四人今十二衛神䇿八軍凡将軍六十貟舊名不廢新資日加且漢置别駕隋刺史廵察猶今觀察使之有副也參軍者參其府軍事猶今節度判官也官名職務直遷易不同爾詎有事實哉誠宜斟酌繁省設官各以其事治杜淹建言諸司文案稽期請以御史檢促太宗問封倫倫曰設官各以其事治御史劾不法而索按求疵是太苛且侵官淹黙然為官擇人戴叔倫齊映劉滋執政叔倫勸以天下州縣有上中下緊望雄輔者有司銓擬皆便所司此非為官擇人為人求治之術映等重其言初太宗省内外官定制為七百三十貟曰吾以此待天下賢才足矣然是時已有貟外置其後又有特置同正貟至於檢校兼守判知之類皆非本制又有置使之名或因事而置事已則罷或遂置而不廢其名類繁多莫能徧舉自中世已後盜起兵興又有軍功之官遂不勝其濫矣唐百官志斜封官安樂公主與太平等七公主皆開府而主府官屬尤濫皆出屠販納貲售官降墨勅斜封授之故號斜封官特進榮亞三台品居第二李德裕賛皇一品制集特進榮亞三台品居第二自非學深張禹功重竇融則何以膺是寵章允兹瞻望文試效官武閱守禦薛登疏超資越序曽無難韓永貞行厯臺閣顯級張洪靖少有令問厯臺閣顯級宦海仙傳拾遺曰顔真卿舉進士登甲科有道士謁曰公有青簡之名金骨可以度世上補仙宦不宜自沉於名宦之海要官華使唐史劉晏要官華使多出其門重官累使唐史宇文融賛髙官厚秩龜兹傳髙官厚秩士大夫樂也官班二失位附白名位不同禮亦異數不守其位名以出信信以守器器以藏禮傳易則生亂過則有刑登降有數序守各以序守名愆禮謬禮順官邪由官邪也所宜守以等威豈可易其紀律茍無區别則有覬覦表儀爵命正其服位周禮修其班制禮苟命數之或乖於禮容而何取九命之數自上公至下士周禮禮命周禮等衰等列禮失則昬名失則愆以儀辨等則人不越周禮名以器分禮由位叙慎守官恪居官次常秩彛憲命秩列官分職正位正上下之位正辨爵之義傳傳曰朝有著定著定列位之所表著之位所以昭事序也貴賤有等禮禮辨等列十等傳人有十等九儀九命之儀書曰天秩有禮有尊卑之禮引之表儀傳何以卑我奚獨後予孰能宗予小宜事大卑不降尊賤宜事貴少不陵長同儕異數同等降尊就卑下陵上替貴貴禮貴貴為其近於君序從禮以端端正也禮貴爵禮夏后氏貴爵而尚齒無序立而無序則亂於位易班辨位易亂也抗禮周班魯人以周班後鄭鄭忽以其有功也怒任齒魯公謂薛侯曰寡人若朝于薛不敢與諸任齒鄭忽慿怒於我先孔張懹慙於客後韓信羞綘灌為伍彭寵恥吳耿同行将後鄭忽乃長滕矦既同列爵於朝亦何進人以禮不敢與任為齒未可黜朱於朝王爵國章朝儀犯貴比肩雖九儀之辨貴宜三命而益恭通班不列隔品品制班次髙卑殊品拜揖異儀以貴下賤雖聞於昔賢降尊就卑恐違於今制情非自下禮豈得中官以命分位由序守孔張失位傳鄭伯享韓宣子起孔張失位後至立於客間執政禦之適客後又禦之適懸間客從而笑之君子立不易方易齒位相序周禮設儀辨位正朝廷之儀辨貴賤之位錯立周禮禁錯立族談者朝以正班爵之位傳序當其次㑹有表表亦位也廉頗恥在藺相如下後來者居上汲黯曰陛下用人如積薪後來者居上雜居齊齒屏風分隔後漢鄭宏字巨君為太尉舉第五倫為司空班次在下每朝見宏曲躬自卑帝知問其故遂聽置雲母屏風分隔其間遂為故事尚齒禮曰朝同爵則尚齒孔序班通乾觀象門朝日殿上設黼扆躡席熏爐香案御史大夫領屬官至殿西廡從官朱衣傳呼促百官就班文武序班于通乾觀象門南武班居文班之次入宣政門文班自東門入武班自西門入至閤門亦如之夾階校尉十人同唱入畢而止宰相兩省官對班于香案前百官班如殿庭先一品班次二品班次三品班次四品班次五品班每班尚書省官為首唐儀衛志十三班行再肅穆韓愈江陵詩班行再肅穆璜珮鳴琅璆亂班唐臨再遷御史大夫韋珽責著位不肅明日珽越次與江夏王道宗語臨進曰王亂班道宗曰與大夫語何至爾臨曰大夫亦亂班珽失色衆皆悚伏朝陪香案班元稹朱紫相參差寄隱客詩況逢多士朝賢雋若布棊班行次第立朱紫相參差同上爭長三白年長以倍則父事之十年以長則兄事之五年以長則肩隨之長幼之節敬長少不凌長少長有禮人猶犯齒一日子曰以吾一日長乎爾慮以下人相下自尊忘彼肩隨務兹心競序齒比肩序齒燕毛何以卑我奚獨後予孰能宗子小宜事大卑不降尊同儕晉鄭同儕商周不敵滕薛之爭絳灌之恥尚齒見官班門序從序進下凌上替降尊就卑将後鄭忽乃長滕侯任齒滕薛爭長公謂滕侯曰寡人若朝于薛不敢與諸任齒以敬事長則順見孝經序無序禮立而無序則亂于位也傳五叔無官豈尚年哉謂康叔冉叔之兄有五人皆無官也有儀抗禮失儀周班魯人以周班後鄭鄭忽以有功也怒亂行辨位我先人下禮繆辝游禮順而與我齒将不汝容廉藺藺相如位在廉頗上頗曰我有攻城野戰之功相如徒以口舌而居我上吾羞不忍為之下見必辱之相如聞之屈節下車避頗頗乃負荆謝罪恥同列費詩公逵舉漢中王遣詩拜關侯為将軍侯聞黄忠為後将怒曰丈夫終不與老兵同列不肯拜詩曰蕭曹親舊而陳韓忠命在上云云侯悟乃拜不可以後之滕侯曰薛庶姓也我不可以後之莫能相下也子晳伯有孔郭崇韜不欲馬紹宏在已上郭崇韜與宦者馬紹宏俱為中門使而紹宏位在上及莊宗即位二人當為樞宻使而崇韜不欲馬紹宏在已上乃以張居翰為樞宻使紹宏為宣徽使太宗即位第功班賞以杜如晦等功第一餘皆以次叙封淮安王神通曰義師起臣兵最先至今元齡等以刀筆吏更居第一臣所未諭帝曰叔父兵誠先至然未嘗躬行陣勞今元齡等功第一此蕭曹所以先諸将也商周不敵晉鄭同儕白居易判德非心競禮失肩隨同上三公四白論道立太師太傅太保兹為三公論道經邦燮理隂陽官不必備惟其人書十一鼎司三公者鼎足之輔漢書神化丹青天設三光以照明天子立三公以明理故公卿者四海之表儀神化之丹青也鹽鐡論四輔誕保文武受民亂為四輔注云大文武所受之民治之為我四維之輔書九三公德成官正設四輔及三公不必備惟其人語使能也君子曰德成而教尊教尊而官正官正而國治禮六三台三星三公之象三槐三公位也周禮九三公上應台宿後九上公庸建爾為上公書七司分鼎足位列台階五嶽三公象五嶽禮演圖中輔又云三公為中輔贈刀吕䖍有佩刀工相之當為三公䖍以贈别駕王祥曰茍非其人刀必為害以子有台輔之量故相贈後祥果為太傅晉三父子司馬孚為太宰其長子為司徒父子居上公自中代未之有也晉七八命王之三公八命周禮乘輿上殿黄初七年以鍾繇為太傅華歆為太尉竝以老疾詔乗輿上殿後三公有疾多以為故事魏十三黒頭諸葛恢為臨沂令名亞王導庾亮謂曰明府當作黒頭三公指司空冠曰後著此冠也晉四十七七為胡廣仕為三公所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝稱疾避廣時人榮之後三十四王祥不拜王祥荀顗往謁晉王祥曰三公與王相去一階班列大同安有天子三司輙拜者損魏朝之望虧晉王之德愛人以禮及至顗遂拜而祥獨長揖而已晉三何曽拜曽字頴考與髙柔鄭沖同為三公謁晉王曾拜盡禮二人長揖而已同上領兵舊制三公領兵皆交㦸及頸後前太祖将討張繡入覲天子始復此禮魏志臨軒懸樂成帝臨軒遣使拜太傅太尉司空儀注太樂宿懸於殿庭下有司奏非祭祀宴享則無設樂之制太常蔡謨言凡敬其事則備禮禮備則有樂晉志十一相陶侃士衡有善相者謂曰君左手中指有竪文理當為公若徹上貴不可言侃以針刺之血灑壁成公字晉三十六折臂人相羊祜先人墓當有受命者祜掘斷地勢相者曰猶當出折臂三公俄而祜墜馬折臂位至三公晉四鼎足承君彭宣云三公鼎足承君一足不任則覆亂美實前四一不案吏邴吉事見上注孔太尉司徒司空各一人是為三公皆正一品佐天子理隂陽平邦國無所不統唐百官志故事臨軒册拜三公中書令讀册侍中賛禮或闕則宰相攝事晟當拜而延賞薄其禮用尚書崔漢衡劉滋代攝唐張延賞傳位三公不可辱於賊李光弼史思明至偃師光弼悉軍趍河陽光弼麾旗三諸軍爭奮賊衆奔敗斬首萬餘級俘八千餘人馬二千軍資器械以億計始光弼将戰内刀于靴曰戰危事吾位三公不可辱於賊萬有一不㨗當自刎以謝天子及是西向拜舞三軍感動本傳三公不居宰輔惟王思禮一人王思禮上元元年加司空自武德已來三公不居宰輔惟王思禮一人而已唐列傳烏氏三公一人重允唐宰相世系表王氏三公二人營州有思禮河内有智興同上上公亢極本待勲臣其間或用時賢皆是元老李賛皇品制集宰相五白阿衡詩實惟阿衡左右商王注云謂伊尹也言湯所依倚而取平也衡平也補衮衮職有闕惟仲山甫補之言能補君之闕股肱書元首明哉股肱良哉作礪濟川舟楫作霖髙宗謂𫝊說曰若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨麴糵鹽梅若作酒醴爾惟麴糵若作和羮爾惟鹽梅啓沃啓乃心沃朕心翼戴天子二八八元八凱立身於二八致君於三五致君堯舜伊尹曰予不克俾厥后惟堯舜其心媿恥若撻于市執政柄鬷嘏言總大政實執人柄而圖吾君以相予位國政之所圖也實相以濟翊萬樞納百揆佐命注意漢陸賈曰天下安注意於相周召蕭曹以道佐人主老子社稷臣具瞻光輔爾光輔予一人保衡伊尹也言天下所取安也垂拱仰成言天子垂拱仰之而成化良弼書曰夢帝賚予良弼良臣惟聖言此良臣乃成聖德當唐虞之聖繼䕫龍之功當堯舜之朝居蕭曹之任當三五之朝居二八之位左相右相湯以伊尹為右相仲虺為左相問牛邴吉為丞相見牛喘問之以為隂陽不和也夢得髙宗夢得說曰夢帝賚子良弼乃俾以形旁求于天下說築傅巖之野惟肖尚書曠位危而不持顛而不扶則将焉用彼相安用彼相見上死君之卿佐為股肱股肱或虧何痛如之三相孫叔敖曰吾三相楚而心愈卑施愈博禮愈恭故三相而無罪也開閤公孫宏為漢丞相開東閤以招賢謝病王陵周勃謝病杜門乞骸韋賢張禹為丞相並請老乞骸骨賜金百斤出征張儀相秦将兵二十萬隨金牛道伐西蜀又漢文帝時匈奴入北地丞相灌嬰擊之父子韋賢及子元成並為漢相平當子平晏亦並為丞相故漢代父子為相稱韋平代蕭何為相曹參代之曰蕭何為法較若畫一曹參代之守而勿失又范雎奪穰侯印而代之穰侯魏冉也並為秦相也鎮撫親附陳平曰宰相上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓卿大夫各得任於其職也輔相彌綸易彌綸天地之道輔相天地之宜鼎鉉易鼎黄耳金鉉爰立作相熈庶績弼一人裁成寅亮天下弼予一人萬邦為憲秉國之鈞詩黄閤漢舊儀丞相聽事門曰黄閤不案吏邴吉為丞相令三公府不案吏遂為常不滿萬錢不移書漢薛宣為丞相府例不滿萬錢不移書百揆時序五興克從惟嶽降神生甫及申巖廊充位張湯為大夫用事丞相充位而已親小事諸葛亮相蜀自校簿書丞相主簿楊顒字子昭諌曰為理有體上下不相侵明公不亦勞乎亮謝之務行故事魏相弱翁為丞相好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而已數施行漢初名臣所奏前四十四孔佐天子總百官宰相之職佐天子總百官治萬事其任重矣然自漢以來位號不同而唐世宰相名尤不正初唐因隋制以三省之長中書令侍中尚書令共議國政此宰相職也其後以太宗常為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相唐百官志其名非一其品位既崇不欲輕以授人故常以他官居宰相職而假以它官自太宗時杜淹以吏部尚書參議朝政魏徵以秘書監參預朝政其後或曰參議得失參知政事之類其名非一皆宰相職也平章事貞觀八年僕射李靖以疾辭位詔疾小瘳三兩日一至中書門下平章事而平章事之名盖於此起同三品其後李勣以太子詹事同中書門下三品謂同侍中中書令也而同三品之名盖起於此然二名不專用而它官居職者猶假它名如故自髙宗以後為宰相者必加同中書門下三品雖品髙者亦然惟三公三師中書令則否同東西臺三品其後改易官名而張文瓘以東臺侍郎同東西臺三品同三品入銜自文瓘始平章事入銜永淳元年以黄門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事平章事入銜自待舉等始自是以後終唐之世不能改議事於政事堂初三省長官議事於門下省之政事堂其後裴炎自侍中遷中書令乃徙政事堂於中書省開元中張說為相又改政事堂號中書門下列五房于其後一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房分曹以主衆務焉宰相事無不統故不以一職名官自開元以後常以領它職實欲重其事而反輕宰相之體故時方用兵則為節度使時崇儒學則為大學士時急財用則為鹽鐡轉運使又其甚則為延資庫使至於國史太清宫之類其名頗多皆不足取法故不著其詳不於帝前殺賊取功而茍欲剽掠成惡名乎劉崇望為中書侍郎同中書門下平章事楊守信反含光門未開禁卒左右植立将大掠長安中俄聞傳呼宰相來者門闢崇望駐馬勞曰上自将在中營公等禁軍也不於帝前殺賊取功而茍欲剽掠成惡名乎士皆唯唯至長樂門賊望兵至乃遁去軍中咸呼萬歲是日京師不亂繄其力言作威福者彊兵重鎮嫚天子灋許圉師黄門侍郎同中書門下三品為左相髙宗自書詔賜遼東諸将謂許敬宗曰圉師愛書可示之俄坐其于獵犯人田有辭怒而謝之圉師掩不奏為人告擿帝讓曰宰相而暴百姓非作威福乎圉師謝且言作威福者彊兵重鎮嫚天子灋臣文吏何敢然帝曰嫌无兵耶敬宗因劾抵遂免官金甌覆宰相名崔琳初元宗每命相先書其名一日書琳等名覆以金甌㑹太子入帝謂曰此宰相名若自意之誰乎即中且賜酒太子曰非崔琳盧從愿乎帝曰然賜太子酒時兩人有宰相望帝欲相之數矣以族大恐附離者衆卒不用阿匿取容無所薦達楊再思居宰相十餘年阿匿取容無所薦達人主所不喜者毁之所喜者譽之畏謹足恭未嘗忤物或曰公位尊何自屈折荅曰世路孔艱直者先禍不爾豈全吾軀癡宰相於時水沴閉坊門以禳再思入朝有車陷於濘叱牛不前恚曰癡宰相不能和隂陽而閉坊門遣我艱于行再思遣吏謂曰尓牛自弱不得獨責宰相軍國重事宜共平章竇懐貞踰年復同中書門下三品兼太子詹事監修國史又以尚書右僕射兼御史大夫軍國重事宜共平章宗紀宗楚客俄同中書門下三品韋后安樂公主親頼之與紀處訥為黨世號宗紀不為士議諧可王璵專以祠解中帝意有所禳祓大抵類巫覡乾元三年俄以中書侍郎同中書門下平章事時大兵後天下願治璵望輕不為士議諧可既驟得政中外悵駭乃奏置太一壇勸帝身見九宫祠帝由是專意他議不能奪宰相文武兼張仁愿景龍二年拜左衛大将軍同中書門下三品宰相文武兼者當時稱李靖郭元振唐休璟仁愿云不減堂饌張文瓘初同列以堂饌豐餘欲少損文瓘曰此天子所以重樞務待賢才也吾等若不任職當自引避不宜節減以自取名衆乃止脂韋自營蘇味道延載中以鳯閣舍人檢校侍郎同鳯閣鸞臺平章事歲餘為真味道練臺閣故事善占奏然其為相特具位未嘗有所發明脂韋自營而已謹身諄諄自全豆盧欽望進文昌右相同鳯閣鸞臺三品帝復位擢尚書左僕射平章軍國重事欽望居宰相積十餘年方易之三思等怙勢宣淫窺間王室戮忠戚觖冀非常不能有所裁抑獨謹身諄諄自全坐政事堂終日不休崔元綜天授初以鸞臺侍郎同鳳閣鸞臺平章事性恪謹坐政事堂終日不休偃尤護細槩外若謹厚而中刻薄每受制鞫獄必案垢索疵不入死不肯世人畏鄙之陳書傳善言周允言同鳯閣鸞臺平章事武后宴宰相詔陳書傳善言允元曰恥其君不如堯舜武三思劾奏語相斥后曰聞其言足以誡安得為過狄仁傑請還廬陵王狄仁傑召拜鸞臺侍郎復同鳯閣鸞臺平章事后召謂曰朕夢雙陸不勝何也於時仁傑與王方慶俱在二人同辭對曰雙陸不勝无子也天其意者以儆陛下乎且太子天下本本一揺天下危矣文皇帝身蹈鋒鏑勤勞而有天下傳之子孫先帝寢疾詔陛下監國陛下掩神器而取之十有餘年又欲以三思為後且姑姪與母子孰親陛下立廬陵王則千秋萬歳後常享宗廟三思立廟不附姑后感悟即日遣徐彦伯迎廬陵王於房州初吉頊李昭德數請還太子而后意不回惟仁傑每以母子天性為言后雖忮忍不能無感故卒復唐嗣議論諄諄必傳經義郝處俊自秉政在帝前議論諄諄必傳經義凡所規獻得大臣體每以用人為先朱敬則及執政每以用人為先細務不省也取日虞淵洗光咸池狄仁傑賛曰武后乗唐中衰操生殺柄刼制天下而攘神器仁傑蒙恥奮忠以權大謀引張柬之等卒復唐室功盖一時人不及知故唐吕温頌之曰取日虞淵洗光咸池潜授五龍夾之以飛世以為名言明達有謀王摶昭宗拜右僕射遷司空初中官權盛帝欲剪抑之自石門還政一决宰相羣臣不平構藩鎮内脅天子摶曰人君務平心大體御萬物偏聽産亂古所戒也今閹人盜威福偪制君上道路人皆知之方朝廷多難未可卒除當徐以計去之事急且冇變崔允與摶並位素忌摶明達有謀即劾摶為中官外應父子並為宰相韋嗣立初嗣立代承慶為鳯閣舍人黄門侍郎承慶亦代為天官侍郎及知政事父子並為宰相世罕其比大事當白陸元方同鳯閣鸞臺平章事后嘗問外事對曰臣備位宰相大事當白奏民間碎務不敢以聞宜幹樞近陸象先景雲中進同中書門下平章事初太平公主謀引崔湜為宰相湜曰象先人望宜幹樞近若不者湜敢辭主不得已為言之遂並知政事真宰相杜景佺載初元年同鳯閣鸞臺平章事后嘗季秋出梨華示宰相以為祥衆賀云云景佺獨曰今草木黄落而木復華瀆隂陽也竊惟陛下布德施令有所虧紊臣位宰相助天治物治而不和臣之咎也頓首請罪后曰真宰相言禄山反韋見素拜武部尚書同中書門下平章事明年禄山表請蕃将三十二人代漢将帝許之見素不恱謂國忠曰禄山反狀暴天下今又以蕃代漢難将作矣國忠不應見素曰知禍之芽不能防見禍之形不能制焉用彼相明日當懇論之既入帝迎諭曰卿等有疑禄山意邪國忠見素趨下流涕且陳禄山反明甚詔復位因以禄山表置帝前乃出帝令中官袁思藝傳詔曰此姑忍朕徐圖之由是奉詔然每進見未嘗不為帝言之帝不入其詔未幾禄山反里人呼坊門為宰相宋務光神龍元年大水上書今霖雨即閉坊門故里人呼坊門為宰相謂能節宣風雨天工人代乃為虚設先德望後文藝李甘累擢侍御史鄭注侍講禁中丞宰相朝廷譁言将用之甘顯倡曰宰相代天治物當先德望後文藝注何人欲得宰相白麻出我必壞之既而麻出乃以趙儋為鄜坊節度使俾對别殿毋拜白敏中懿宗立拜司徒門下侍郎還平章事數月足病不任謁固求避位不許中使者勞問俾對别殿毋拜沉厚有謀能斷大事張柬之姚崇為靈武軍使后詔舉外司可為相者崇曰張柬之沉厚有謀能斷大事其人老惟亟用之即日召見拜同鳯閣鸞臺平章事不能當美罰惡魏元忠相武后有清正名至是輔政天下傾望冀幹王室而稍憚權倖不能當美罰惡譽望大減宿中書十四夕郭元振同中書門下三品𤣥宗誅太平公主也睿宗御承天門諸宰相走伏外省獨元振總兵扈帝事走宿中書省十四日乃休其治委碎韋巨源同鳯閣鸞臺平章事其治委碎無大體勾校省中遺隱下符歛克不少蠲雖收其利然下多怨姚崇十事姚崇徙同州刺史先天二年元宗講武新豐宻召崇崇至帝曰卿宜遂相朕崇知帝大度銳于治乃先設事以堅帝意即陽不謝帝怪之崇因跪奏願以十事聞陛下度不可行臣敢辭帝曰試為朕言曰垂拱以來以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有牽復之悔臣願不倖邊功可乎比來任佞冒觸憲綱皆得以寵自觧臣願法行自近可乎后氏臨朝喉舌之任出閹人之口願宦䜿不與政可乎戚里貢献以自媚于上公卿方鎮寖亦為之臣請租賦外一絶之可乎外戚貴王更相用事班序荒雜臣請戚貴不任臺省可乎先朝䙝狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融韋月将以忠被罪自是爭臣沮折臣願羣臣皆得批逆鱗犯忌諱可乎武后造福先寺上皇造金仙玉真二觀費鉅百萬臣請絶道佛營造可乎漢以禄莽閻梁亂天下國家為甚臣願推此鑒戒為萬代法可乎帝曰朕能行之崇乃頓首謝翌日拜兵部尚書同中書門下三品帝賦三傑詩宋璟十七年為尚書右丞相而張說為左丞相源乾曜為太子少傅同日拜有詔太官設饌太常奏樂㑹百官尚書省東堂帝賦三傑詩自冩以賜務清政刑璟為宰相務清政刑使官人皆任職唐史臣稱崇善應變以成天下之務璟善守文以持天下之正唐三百年輔弼者不為少獨前稱房杜後稱姚宋何哉君臣之遇合盖難矣本傳賛燮和隂陽蘇瓌同中書門下三品時大臣初拜大官獻食天子名曰燒尾瓌獨不進及侍宴宗晉卿嘲之帝黙然瓌自解於帝曰宰相燮和隂陽代天治物今粒食踊貴百姓不足衛兵至三日不食臣實不稱職不敢燒尾相得歡甚蘇頲帝曰陸象先殁紫微侍郎未嘗補朕思其人無易卿者頲頓首謝明日加知制誥給政事食給食自頲始開元四年進同紫微黄門平章事與宋璟同當國璟剛正多所裁决頲能推其長在帝前敷奏璟有未及或少屈頲輙助成之有不㑹意頲更申璟所執故帝未嘗不從二人相得歡甚瓌頲再世稱賢宰相盛矣本賛伴食宰相盧懷慎開元元年進同紫微黄門平章事三年改黄門監懷慎自以才不及崇故事皆推而不專時譏為伴食宰相峻涯撿抑犇競李元紘拜中書侍郎中書門下平章事李元紘當國務峻涯撿抑犇競誇進者憚之元紘再世宰相有清節其當國累年未嘗改治第宅宋璟常歎曰李公引宋遥之美黜劉晃之貪為國相家無留儲雖季文子之德何以加之既為相天下翕然宜之韓休侍中裴光庭卒帝敕蕭嵩舉所以代者嵩稱休志行遂拜黄門侍郎同中書門下平章事休直方不務進趨既為相天下翕然宜之敷陳治道多訐直休峭鯁時政所得失言之未嘗不盡帝獵苑中或大張樂稍過差必視左右曰韓休知否已而疏輙至帝常引鑑黙不樂左右曰自韓休入朝陛下無一日歡何自戚戚而逐去之帝曰吾雖瘠天下肥矣且蕭嵩每啓事必順㫖我退而思天下不安寢韓休敷陳治道多訐直我退而思天下寢必安吾用休社稷計耳善傳奏敏於裁遣張嘉正宋璟等罷帝欲果用嘉貞而忘其名夜詔中書侍郎韋抗曰朕嘗記其風操而今為北方大将張姓而複名卿為我思之抗曰非張齊邱乎今為朔方節度使帝即使作詔以為相夜且半因閱大臣表疏舉一則嘉貞所献遂得其名即以為中書侍郎同中書門下平章事遷中書令居位三年善傳奏敏於裁遣然彊躁論者恨其不裕簡黙自處張洪静同中書門下平章事少有令問人以為有輔相才及居位簡黙自處無所規拂居中未嘗廷議可否源乾曜為相十年與張嘉貞張說李元紘杜暹同秉政居中未嘗廷議可否事晚節唯唯聯署務為寛平敦大故鮮咎悔姜皎為嘉貞所排訖不申救君子譏焉張氏三世宰相然器有所窮嘉貞窮於俗延賞窮於忮洪靖窮於權惜哉本賛位望最舊李峴乾元二年以中書侍郎同中書門下平章事於是吕諲李揆第五琦同輔政而峴位望最舊事多獨决諲等不平李輔國用權制詔或不出中書百司莫敢覆峴頓首帝前極言其惡帝悟稍加撿制輔國由是讓行軍司馬然深銜峴撤政事堂榻故事政事堂不接客自元載為相中人傳詔者引升堂置榻待之峴至即敕吏撤榻爭權不協李適之嘗與李林甫爭權不協林甫隂賊險姦謂適之曰華山生金采之可以富國顧上未之知適之性疏信其言他日從容為帝道之帝嘉以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可以穿治故不敢聞帝以林甫為愛已而薄適之不親盧杞姦邪李勉同中書門下平章事貞元初帝起盧杞為刺史袁髙還詔不得下帝問曰衆謂盧杞姦邪朕顧不知謂何勉曰天下皆知而陛下獨不知此所以為姦邪也時韙其對然自是益見疏當軸秉權無所撓李石以本官同中書門下平章事石器雄逺當軸秉權無所撓古之聖賢必觀書以考察往行然後成治功李石他日紫宸殿宰相進及陛帝喟然歎曰朕即位十年不能得治本夫託億兆之上不能以美利及百姓焉得久無事乎石曰陛下罪已當然然責治太早雖十年孜孜養德適成爾天下治不治要自今觀之且人之氣志雖聖賢猶有優劣陛下春秋少非起人間而知人情偽今自視何如即位時古之聖賢必觀書以考察往行然後成治功陛下即十年盛德日新然向所以疾戾震驚者天其固陛下之志乎誠務修将來之政視太宗致升平之期猶不爲晚宰相左右天子教化李石是時宰相吏卒因内變多死詔江西湖南索募直助召力士石建言宰相左右天子教化若徇正忘私宗廟神靈猶當祐之雖有盜無害也有如挾姦自欺植權黨害正直雖加之防鬼得以誅無所事於召募請直以金吾為衛宰相任人知則用過則棄石用韓益判度支案因以贓敗石曰臣本以益知財利不保其貪帝曰宰相任人知則用過則棄謂之至公他宰相所用彊蔽其過此其私也益治簿書沛然如平時中人自邊還走馬入金光門道路妄言兵且至京師讙走塵起百官或韈而騎臺省吏稍稍遁去鄭覃将出石曰事未可知宜坐須其定宰相走則亂矣若變出不虞逃将安適人之所瞻不可忽也益治簿書沛然如平時盜射宰相三年正月将朝騎至親仁里狙盜發射石傷馬逸盜邀斫之坊門絶馬尾乃得脫天子駭愕遣使者慰撫賜良藥始命六軍衙士二十人從宰相唐宰相以宗室進者九人賛曰周之卿士周召毛原皆同姓國也唐宰相以宗室進者九人林甫姦諛幾亡天下李程知柔在位無所發明其餘以財稱職號賢宰相胥吏為宰相牛仙客同中書門下三品為相謹身無它與時沉浮唯唯恭愿前後錫與緘庋不敢用百司咨决無所處可輒曰如令式帝知時議不歸乗間以問髙力士力士曰仙客本胥吏非宰相器帝忿然曰朕且用康䛒盖恚言也神用警敏應對如響宇文融同中書門下平章事融曰使吾執政得數月久天下定矣乃薦宋璟為右丞相裴耀卿為戶部侍郎許景先為工部侍郎當時長其知人而性卞急少所推下既居位日引賔客故人與酣飲然而神用警敏應對如響雖天子不能屈居宰相凡百日去而錢穀亦自此不治委宰相以簡賢任能郭子儀奏願陛下委宰相以簡賢任能則中興之功日月可冀史調和隂陽安黎庶郭承嘏時江淮旱用度不支詔宰相分領度支户部承嘏言宰相調和隂陽安黎庶若使閱視簿書校緡帛非所宜帝順納機務一一與參决房琯同中書門下平章事俄與韋見素崔渙奉册靈武見肅宗且言上帝所以傳付意因道當時利病箝索邉情辭吐華暢帝為改容琯既有重名帝傾意待之機務一一與參决諸捋相莫敢望片言寤主而取宰相唐名儒多言房琯德器有王佐材而史載行事亦少貶矣一舉䘮師訖不復振原琯以忠誼自奮片言寤主而取宰相必有過人者用違所長遂無成功使琯遭時承平從容帷幄不失為名宰而倉卒濟難事敗隙生陷于浮虛比周之罪名之為累也戒哉賛張鎬起布衣二朞至宰相居身㢘不殖貲産善待士性簡重議論有體在位雖淺天下之人推為舊德主相造命李泌帝嘗言建中亂卿亦知桑道茂語乎乃命當然對曰夫命者已然之言主相造命不當言命言命則不復賞善罰惡矣宰相對小延英自苗晉卿始苗晉卿傳秉政出入七年晉卿秉政出入七年小心謹畏不甚斥是非得失故能保安寵名然練達事體百官簿最一省無遺議者故比漢胡廣復俾輔相必能致治成化裴冕大厯中郭子儀言於代宗曰冕首佐先帝有社稷勲程元振忌其賢遂加誣構海内寃之陛下宜還冕於朝復俾輔相必能致治成化時元載秉政冕早所甄引載德之又貪其衰瘵且下已遂拜左僕射同中書門下平章事入見拜不能興載自扶之代為賛謝吕諲輔政功名不及治賛本賛制下士相賀於朝楊綰拜同中書門下平章事制下士相賀於朝世以比楊震山濤謝安楊綰始輔政御史中丞崔寛本豪侈城南別墅池觀堂皇為當時第一即日遣人毁之京兆尹黎幹出入從騶馭百數省損纔留十餘騎中書令郭子儀在邠州行營方大㑹除書至音樂散五之四它聞風靡然自化者不可勝紀世以比楊震山濤謝安未踰年除吏幾八百貟崔祐甫同中書門下平章事俄改中書侍郎自至德乾元以來天下戰討啓丐填委故官貟繆紊永泰後稍稍平定而元載用事非賄謝不與官剗塞公路綱紀大壞載誅楊綰相未幾卒常衮當國懲其敝凡奏請一杜絶之惟文辭入第乃得進然無所甄異賢愚同滯焉及祐甫則薦舉惟其人不自疑畏推至公以行未踰年除吏幾八百貟莫不諧允願以無逸為元龜崔植長慶初拜中書侍郎同中書門下平章事穆宗問貞觀開元中治道最盛何致而然植曰太宗資上聖興民間知百姓疾苦故厲精思治又以房元齡杜如晦魏徵王珪為之佐君明臣忠聖賢相維致治昇平固其宜也𤣥宗在天后時身踐憂患既得位得姚崇宋璟此二人蚤夜孜孜納君於道璟嘗手冩尚書無逸為圖以獻勸帝出入觀省以自戒其後朽暗乃代以山水圖稍怠於勤左右不復箴規姦臣日用事以至于敗今願陛下以無逸為元龜則天下幸甚舊德栁渾宰相張延賞怙權嫉渾守正遣親厚謂曰明公舊德第謹言於朝則位可久渾曰為吾謝張公渾頭可斷而舌不可禁斥堂吏相府肅然韋處厚同中書門下平章事堂吏湯鉢數招權納財賄處厚笑曰此半滑渙也斥出之相府肅然裴度元勲舊德竇易直長厚忠實帝雖自力機政然驟信輕改揺於浮論處厚嘗獨對曰陛下不以臣不肖使待罪宰相凡所奏可中輒變易自上心出邪乃示臣不信得於横議邪即臣何名執政且裴度元勲舊德輔四朝竇易直長厚忠實經事先帝陛下所宜親重委信之臣乃陛下自擢今言不見納宜先罷即趍下頓首趍出帝復召問所欲言乃對近君子逺小人始可為治諄複數百言又言裴度忠可久任帝嘉納之自是無復横議者擠忠良進貪猥元載同中書門下平章事智略開果久得君以為文武才略莫已若外委主書卓英倩李待榮内劫婦言縱諸子關通貨賄京師要司及方靣皆擠忠良進貪猥凡仕進干請不結子弟則謁主書唐列傳七十曲意附離王縉同中書門下平章事復知政事時元載專朝天子拱手縉曲意附離無敢忤又恃才多所狎侮雖載亦疾其凌靳也京兆尹黎幹數論執載之惡縉折幹曰尹南方孤生安曉朝廷事以單議悟天子楊炎興嶺表以單議悟天子中外翕然屬望為賢相居數月崔祐甫疾不能事喬琳免炎獨當國多變祐甫之政減薄護元陵功優人始不悦盧隂為憾㑹盧杞以門下侍郎同中書門下平章事進炎中書侍郎司秉政杞無術學貌么陋炎薄之託疾不與㑹食杞隂為憾惟樹親黨多所詗察竇參同中書門下平章事領度支鹽鐡使每延英對他相罷參必留以度支為言實專政也然參無學術不能稽古立事惟樹親黨多所詗察四方畏之申其族子也參親愛每除吏多訪申申因得招賂漏禁宻語故申所至人目為喜鵲人得叙進官無留材李吉甫同中書門下平章事吉甫連蹇外遷十餘年究知閭里疾苦常病方鎮彊恣至是為帝從容言使屬郡刺史得自為政則風化可成帝然之出郎吏十餘人為刺史自王叔文時選任猥冒吉甫始簿其貟人得叙進官無留材傳七十一易方鎮三十六德宗以來姑息藩鎮有終身不易地者吉甫為相歲餘凡易三十六鎮殿最分明帝尊任之官而不名六年裴垍免復以前官召吉甫還秉政入對延英凡五刻罷帝尊任之官而不名吉甫疾吏貟廣乃奏今列州三百縣千四百以邑設州以鄉分縣費廣制輕非致化之本願詔有司博議州縣有可併倂之歲時入仕有可停停之則吏寡易求官少易治帝每議河北事必指吉甫曰朕日按圖信如卿料矣同上及再輔政天下想望風采與武元衡連位未幾節度劒南屢言元衡材宜還為相及再輔政天下想望風采而稍脩怨罷李藩宰相而裴垍左遷皆其謀也李正辭晚相失及與蕭俛同召為翰林學士獨用俛而罷正辭人莫不疑憚帝亦知其專吉甫居安邑里時號安邑李丞相同上不可相天子李磎乾寧元年同中書門下平章事崔昭緯素疾磎諷劉崇魯掠其麻哭之言磎懷姦與中人楊復恭昵欵其第為時溥所殺不可相天子翌日下遷太子少傅朝廷羽儀李揆同中書門下平章事揆美風儀善奏對帝歎曰卿門地人物文學皆當時第一信朝廷羽儀乎故時稱三絶傳七十五常衮與楊綰同輔政綰長厚通可而衮苛細以清儉自賢帝内重綰顓任之禮遇信愛衮弗及也每所恨忌奏罷賜内厨食故事日出内厨食賜宰相衮奏罷之又将讓堂封它宰相不從乃止塞政事堂北門政事堂北門異時宰相過舍人院咨逮政事至衮乃塞之以示尊大謂之濌伯窒賣官之路然一切以公議格之非文詞者皆擯不用故世謂之濌伯以其濌濌無賢不肖之辨常以國本在選賢節用薄賦斂寛刑罰趙璟與陸贄同輔政贄於裁决少所讓初贄約共執退裴延齡既對贄極言其姦帝色變璟不為助遂罷贄乃始當國璟精治道常以國本在選賢節用薄賦斂寛刑罰懇懇為天子言之又陳前世損益當時之變獻審官六議一議相臣曰中外知其賢者用之能者任之責材之備為不可得帝謂崔造敢言為能立事造同中書門下平章事帝謂崔造敢言為能立事造在江左疾錢穀諸使罔上或乾没自私乃建言天下兩税請委本道觀察使刺史選官部送京師諸道水陸轉運使度支廵院江淮轉運使請悉停以度支鹽鐡務還尚書省六曹皆宰相分領諫避狄齊映貞元二年以舍人同中書門下平章事與崔造劉滋竝輔政滋端重寡言映謙不肯事可否一顓于造㑹造疾映乃當國吐蕃數入冦關輔震騷咸言帝欲避狄映入諫曰戎狄不懲臣之罪也然内外洶洶謂陛下具糗糧欲治行夫大幸不再奈何不與臣等計乎因俯伏流涕天子為感悟居中治身循灋無它過盧邁同中書門下平章事進中書侍郎時陸贄趙璟專大政邁居中治身循灋無它過盲宰相關播同中書門下平章事時李元平游播門下能侈言誕計以功名自喜播謂宰相材數請帝用之李希烈叛帝召拜汝州别駕知州事募工築郛浚湟希烈使人應募元平不寤賊遣将李克誠以精騎薄城募者内應縳元平馳見希烈遺矢於地希烈以其𦕈小無髯戯克誠曰使爾取元平乃以其子來邪因嫚駡曰盲宰相使汝當我何待我淺邪唐列傳循謹無所駮異董晉同中書門下平章事方竇參得君裁可大事不關咨晉晉循謹無所駮異參欲以其弟申為吏部侍郎諷晉以聞帝怒曰無乃參廹卿為之邪晉謝具道所以然帝即問參過失晉無敢隱由是參罷宰相晉皇恐上疏固辭位九年罷為禮部尚書奏減堂餐錢張鎰同中書門下平章事明年以兩河用兵詔省薄御膳及皇太子食物鎰因奏減堂餐錢及百官廩奉三分之一以佐用度傳七十六眷禮異他相武元衡元和二年拜門下侍郎同中書門下平章事帝素知元衡堅正有守故眷禮異他相帝稱長者八年召還秉政李綘數爭事上前不叶元衡獨持正無所違附帝稱其長者盜賊殺武元衡淮蔡用兵帝悉以機政委之王承宗上疏請赦吳元濟使人白事中書悖慢不恭元衡叱去承宗怨數上章誣詆未幾入朝出靖安里第夜漏未盡賊乘暗呼曰滅燭附元衡中肩復擊其左股徒御格鬪不勝皆駭走遂害元衡批顱骨持去言骨鯁真宰相李絳拜中書侍郎同中書門下平章事李吉甫嘗盛賛天子威德帝欣然絳獨曰陛下自視今日何如漢文帝時帝曰朕安敢望文帝對曰是時賈誼以為措火積薪下火未及然因以為安其憂如此今法令所不及者五十餘州云云帝入謂左右曰絳言骨鯁真宰相也遣使送酴醿酒帝問開元天寶治帝又問元宗甞厯試官守知人之艱難臨御初任用姚崇宋璟勵精聽納故左右前後皆正人也洎林甫國忠得君專引傾邪之人分揔要劇於是上不聞直言嗜欲日滋内則盜臣勸以興利外則武夫誘以開邊天下騷動故禄山乗隙而奮此皆小人啓導從逸而驕繫時王所行無常治亦無常亂帝曰凡人舉事病不通於理追咎其失古人處此有道邪絳曰事或過差聖哲所不免天子有諫臣所以救過上下同體猶手足之於心膂交相為用但矜能䕶失常情所蔽聖人改過不吝願陛下以此處之以清節進宋申錫初申錫以清節進疾要位者納財餉敗風俗故自為近臣凡四方賄謝一不受既被罪有司驗劾悉得所還問遺書朝野為咨閔坐宰相餘忿鮑防初防與知雜御史竇參遇導騎不引避參擿其僕及為相防尹京兆迫使致仕防叱曰吾與蕭昕子齒而同昕老坐宰相餘忿耶傳八十四請臺閣長官得自薦其屬陸贄以中書侍郎同中書門下平章事帝始任楊炎盧杞引樹私黨排忠良天下怨疾貞元後懲艾其失雖置宰相至除用庶官反復參詰乃得下及贄秉政始請臺閣長官得自薦其屬有不職坐舉者或言諸司所引皆親黨招賂遺無實才帝復詔宰相自擇贄奏言云云唐列傳勤職約已天子甞臨朝咨其清素竇德元進檢校左相勤職約已天子甞臨朝咨其清素加以賜賚居位數年賛圖封禪事與李勣皆為使帝次濮陽問古謂帝邱德元不能對許敬宗具道其然居宰相積十五年房元齡居宰相積十五年女為王妃男尚主自以權寵隆極累表辭位言儲嫡事魏謩建言今天下粗治惟東宫未立不早以正人傅導之非所以存副二之重且泣下帝為感動自敬宗後惡言儲嫡事故公卿無敢開陳者時帝春秋髙嫡嗣未辨謩輔政白發其端朝議歸重名臣孫有祖風魏謩為宰相議事天子前他相或委抑規諷惟謩讜切無所回畏宣宗嘗曰謩名臣孫有祖風朕心憚之然卒以剛正為令狐綯所忌讒罷之諌獵温泉薛元超遷中書侍郎同中書門下三品帝校獵温泉諸蕃酋長得持弓矢從元超奏夷狄野心而使挾兵在圍中非所宜帝納可諫脩洛陽宫戴胄檢校吏部尚書參預朝政帝将脩復洛陽宫上疏諫曰比闗中河外置軍團强夫富室悉為兵九成之役又興司農将作見丁無幾大亂之後戶口單破一人就役舉室棄業籍軍者督戎仗課役者責糧賫竭貲經紀猶不能濟七月以來霖潦未止濵河南北田正洿下年之有亡未可知壯者盡行賦調不給則帑藏虚矣帝覽奏罷役一德無二韓瑗褚遂良貶潭州都督瑗上言遂良受先帝顧託一德無二向日論事至誠懇切詎肯令陛下後堯舜而塵史册哉遭厚謗醜言損陛下之明折志士之銳况被遷以來再罹寒暑其責塞矣願寛無辜以順衆心帝曰遂良之情朕知之矣其悖戾好犯上朕責之詎有過邪瑗曰遂良社稷臣蒼蠅㸃白傳致有罪微子既去殷以亡張華不死晉不及亂帝愈不聽唐傳固爭武后攝政李義琰進同中書門下三品髙宗欲使武后攝國政義琰與郝處俊固爭得寢不廣居宇李義琰宅無正寢弟義璡為市堂材送之義琰曰以吾為國相且自愧尚營美宇是速吾禍豈愛我者邪義璡曰凡任為丞尉且崇第舍兄位高安可偪下哉荅曰不然事難全遂物不兩興既處貴仕又廣居宇非有令德必受其殃卒不許其後木久腐乃棄之斥滑渙鄭餘慶主書滑渙與宦人劉光琦相倚為姦每宰相議為光琦沮變者令待往請必得由是四方貲餉奔委之弟泳至官刺史杜佑鄭絪秉政頗姑息而佑常行輩喚不名也至餘慶議事渙傲然指畫諸宰相前餘慶叱去未幾罷為太子賔客後渙贓敗病進士浮夸鄭覃同中書門下平章事不喜文辭病進士浮夸建廢其科曰南北朝所以不治文采勝質厚也士惟用才何必文辭又言文人多佻薄帝曰純薄似賦性之異奚特進士且設是科二百年詎可易乃止列九十傳中人不避宰相鄭朗中人李敬寔排朗騶導馳去朗以聞宣宗詰敬寔自言供奉官不避道帝曰傳我命則絶道行可也而私出不避宰相耶即斥敬寔諫幸東都裴度帝将幸東都大臣切諌不納帝恚曰朕意决矣雖從官宫人自挾糗糧無擾百姓趣有司檢料行宫中外莫敢言度從容奏國家建别都本備廵幸自艱難以來宮闕署屯百司之區荒圯不治假歲月重新然後可行倉卒無備有司且得罪帝恱曰羣臣諫朕不及此如卿言安用往耶淳德有常賈耽為相十三年雖安危大事亡所發明而檢身厲行自其所長每歸第對賔客無少倦家人近習不見其喜愠時謂淳德有常者列傳九十一入對及開元天寳事崔羣皇甫鎛言利幸於帝隂藉左右求宰相羣數言其佞邪不可用既入對及開元天寳事羣因推言其極曰安危在出令存亡繋所任昔𤣥宗少厯屯險更民間疾苦故初得姚崇宋璟盧懷慎輔以道德蘇頲李元紘孜孜守正則開元為治其後安于逸樂逺正士昵小人故宇文融以言利進李林甫楊國忠怙寵朋邪則天寳為亂願陛下以開元為法以天寳為戒社稷之福也列傳九十罷張九齡相李林甫則治亂分羣又言世謂禄山反為治亂分臣謂罷張九齡相李林甫則治亂固已分矣左右為感動羣以是諷帝宰相乃天下選憲宗銳于立功皇甫鎛以聚斂取宰相夫宰相乃天下選彼暫勞一功烏勝任哉賛唐列傳好醜必言李藩忠謹好醜必言帝以為無隱嘗問前世所以家給或國匱乏者何致而然及祈禳之數藩具對儉則足用敦本則百姓富反是則匱又言孔子病止子路之禱漢文帝每祭敕有司敬而不祈使神無知則不能降福有知固不可私已求媚而恱之也且義于人者和于神人乃神之主人安而福至帝恱傳九十四器局峻整裴垍器局峻整持法度雖宿貴前望造詣不敢干以私凡兵進退黄裳自中指授杜黄裳劉闢反議者以闢恃險討之或生事惟黄裳固勸不赦因奏罷中人監軍而專委髙崇文凡兵進退黄裳自中指授無不切于機崇文素憚劉澭黄裳使人謂曰公不奮命者當以澭代崇文懼一死力縳賊以獻蜀平羣臣賀憲宗目黄裳曰時卿之功推言王者之道杜黄裳帝嘗問前古王者所以治亂推言王者之道在修己任賢而已操執綱領要得其大者至簿書獄訟百吏能否本非人主所自任昔秦始皇親程決事見嗤前世魏明帝欲按尚書事陳矯不從隋文帝日昃聽政衛士傳餐太宗笑之孔子稱帝舜恭己正南面以其能舉十六相去四凶而至無為豈必刓神疲體勞耳目之察然後為治哉帝以黄裳言忠嘉納之赫然號中興自杜黄裳啓之杜黄裳憲宗平夏剪齊滅蔡復兩河以機秉還宰相紀律設張赫然號中興自杜黄裳啓之宣宗擇相李景讓大中中進御史大夫蔣伸輔政景讓名素出伸右而宣宗擇宰相盡書羣臣當選者以名内器中禱憲宗神御前射取之而景讓名不得景讓愧艴不能平列傳一百二喻御史有以事見宰相者先白臺李德裕拜中書門下平章事故事丞郎詣宰相湏少間乃敢通郎官非公事不敢謁李宗閔時往往通賔客李聽為太子太傅招所善載酒集宗閔閣酣醉乃去至徳裕則喻御史有以事見宰相者先白臺乃聽凡罷朝繇龍尾道趣出遂無輒至閤者列傳一百五罷京兆築沙堤兩街上朝衛兵同上政去宰相則不治太𤣥德憲四宗皆盛朝其始臨御自視若堯舜寖久則不及初陛下知其然乎始一委輔相故賢者得盡心久則小人並進造黨與亂視聽故上疑而不專政去宰相則不治矣在德宗最甚晚節宰相惟奉行詔書所與圖事者李齊運裴延齡韋渠牟等訖今謂之亂政夫輔相有欺罔不忠當亟免忠而材者属任之政無他門天下安有不治政在中書誠治本李德裕又言開元初輔相率三考輙去雖姚崇宋璟不能逾至林甫秉權乃十九年遂及禍敗是知亟進罷宰相使政在中書誠治本也天下事皆先平章李珏杜悰領度支帝欲拜户部尚書珏曰祖宗倚宰相天下事皆先平章故官曰平章事君臣相須所以致太平也茍用一吏處一事皆决於上将焉用彼相哉列傳一百七擇一令日劉瑑後請間帝視案上厯謂瑑為朕擇一令日瑑跪曰某日良帝笑曰是日卿可遂相即詔同中書門下平章事與崔謹由議帝前謹由請甄别流品瑑質曰王夷甫相晉崇尚浮虛以述流品卒致淪夷今日不循名責實使百吏各稱職而先流品未知所以致治也謹由不得對歇後鄭五鄭綮大順後王政微綮每以詩謡託諷中人有誦之天子前者昭宗意其有所藴未盡因有司上班簿遂署其側曰可禮部侍郎同中書門下平章事綮本善詩其語多俳諧故使落調世共號鄭五歇後體既視事宗戚詣慶搔首曰歇後鄭五作宰相事可知矣固遜不聽唐列傳宰相兼治錢穀李德裕時韋宏質建言宰相不可兼治錢榖德裕奏言貞觀中陳師合上言人之思慮有限一人不可揔數職太崇曰此欲離間我君臣斥之嶺表臣謂宰相有姦謀隱慝則人人皆得上論至於制置職業人主之柄非小人所得干古者朝廷之士各守官業思不出位宏質賤臣豈得以非所宜言妄觸天聽是輕宰相陛下照其邪計從黨人中來當遏絶之德裕大意欲朝廷尊臣下肅而政出宰相深疾朋黨故感憤切言之言從計行王室幾中興德裕常以經綸天下自為武宗知而能任之言從計行是時王室幾中興史午漏下還第休沐元和後數用兵宰相不休沐或繼火乃得罷德裕在位雖遽書警奏皆從容裁决率午漏下還第休沐輒如令沛然若無事時每議論天子前往往語相侵陳夷行同中書門下平章事而楊嗣復李珏相次輔政夷行介特雅不與合每議論天子前往往語相侵短夷行不能堪輒引疾求去文宗遣使者慰勞起之用忠良久益治陳夷行帝常怪天寳政事不善問姚崇宋璟于時在否李珏曰姚亡而宋罷珏因推言𤣥宗自謂未嘗殺一不辜而任李林甫種夷數十族不亦惑乎夷行曰陛下今亦宜戒以權屬人嗣復曰夷行失言太宗易暴亂為仁義用房𤣥齡十有六年任魏徵十有五年未嘗失道人主用忠良乆益治用邪佞一日多矣傳一百六謙静免禍楊涉哀帝時進同中書門下平章事為人端重有禮法方賊臣凌慢王室殘蕩賢人多罹患涉受命與家人泣語其子曰世道方極吾嬰網羅不能去将重不幸禍且累汝然以謙静終免于禍列傳一百九勢動天下路巖同中書門下平章事年三十六居位凡八歲於是王政粃僻宰相得用事巖顧天子荒闇且以政委已乃通賄遺奢肆不法俄與韋保衡同當國二人勢動天下時目其黨為牛頭阿旁言如鬼隂惡可畏也智慮周密王鐸僖宗時以左僕射召始鐸當國練制度智慮周密時論推允㑹河南盗起天下跂鐸入輔又鄭畋數言其賢復拜門下侍郎平章事列傳一百十練知邊事唐璿西突厥烏質勒失諸蕃和舉兵相攻安西道閉武后詔休璟與宰相計議不少選畫所當施行者既而邊州建請置屯盡如休璟䇿后曰恨用卿晚即拜夏官尚書同鳯閣鸞三品后誚楊再思李嶠姚元崇等曰休璟練知邉事卿輩十不當一列傳三十六為時譏訾始老已踰八十猶倚託權近求復用於是賀婁尚宫方用事附者輒榮赫休璟乃為其子娶其義女故復起宰相頗為時譏訾其當國亦無他禆益尊遇它相莫如姚崇元宗立賔禮大臣故老推尊遇崇每見便殿輒為之興去輒臨軒以送它相莫如也列傳四十九先天末宰相至十七人姚崇時承權戚干政之後紀綱大壞先天末宰相至十七人臺省要職不可數崇常先有司罷冗職修制度擇百官各當其材請無廣釋道無數移吏由是天子責成于下而權歸于上矣其奏議有宰相體張延賞及當國飾情復怨不稱所望亦早不幸未及有所建明然帝待遇厚稱其奏議有宰相體專屬以吏事而以軍食委李泌刑法委栁渾時以為任職唐列傳堂封自源乾曜始源乾曜同紫微黄門平章事帝嘗自較其考與張說偕賜時議者言國執政所以同休戚不崇異無以責功帝乃詔中書門下共食實户三百堂封自此始建上宰李泌賛泌之為人也異哉其謀事近忠其輕去近髙其自全近智卒而建上宰近立功立名者觀肅宗拔榛莽立朝廷單言暫謀有所寤合皆付以政當此時泌於獻納為不少又佐代宗收兩京獨不見録寧二主不以宰相器之也傳六十四無經國才崔植賛植輔政當有為之時無經國才履危防淺機不知其潰而發也手弛檻緤縱虎狼焉一日而亡地數千里為天下笑列傳六十七詭謀繆筭舒元輿同中書門下平章事詭謀繆筭日與訓比敗天下事二人為之也然加禮舊臣外釣人譽先時裴度令狐楚鄭覃皆為當路所軋致閑處至是悉還髙秩列傳一百四宰相端方有器度者為之任圜是秋韋説豆盧革罷相圜與安重誨鄭珏孔循議擇當為相者圜意屬李琪而珏循雅不欲琪為相謂重誨曰李琪非無文藝但不亷爾宰相端方有器度者足以為之太常卿崔協可也重誨以為然五代史二十八宰相重器他日明宗問誰可相者重誨即以協對圜前争曰重誨未諳朝廷人物為人所賣天下皆知崔協不識文字而虚有表號為没字碑臣以陛下誤加採擢無功幸進此不知書以臣一人取笑足矣相位有幾豈容更益笑端明宗曰宰相重器卿等更自詳審同上捨琪而相協如棄蘇合之丸而取蜣蜋之轉也重誨等退休於中興殿廊下孔循不揖拂衣而去行且罵曰天下事一則任圜二則任圜圜乃何人圜謂重誨曰李琪才藝可兼時軰百人而讒夫巧沮忌害其能若捨琪而相協如棄蘇合之丸而取蜣蜋之轉也重誨笑而止同上宦官伶人不欲張憲在朝廷張憲郭崇韜伐蜀薦憲可任為相而宦官伶人不欲張憲在朝廷樞宻承㫖叚回曰宰相在天子面前事有非是尚可改作一方之任苟非其人則為患不細憲材誠可用不如任以一方乃以為太原尹五代史朝廷大事皆出逢吉蘇逢吉髙祖建號拜同中書門下平章事是時制度草創朝廷大事皆出逢吉逢吉以為己任然素不學問隨事裁决出其意見是故漢世尤無法度而不施德政民莫有所稱焉五代史三十粥飯僧李愚愍帝即位有意於治數召學士問以時事而以愚為迂未嘗有所問廢帝亦謂愚等無所事常目宰相曰此粥飯僧爾以謂飽食終日無所用其心也五代史五十四三司吏聞罷昫相皆相賀劉昫馮道與昫為姻家而同為相馮道罷李愚代之愚素惡道為人凡事有稽失者必指以誚昫曰此公親家翁所為也朐性少容怒而愚特剛介遂相詬詆相府史吏惡此二人剛直因共揚言其事聞廢帝並罷之以劉昫為右僕射是時三司諸吏提印聚立月華門外聞宣麻罷昫相皆歡呼相賀曰自此我曹快活矣五代史五十五琉璃瓶盧文紀廢帝立欲擇宰相問於左右皆言文紀及姚顗有人望廢帝因悉書清望官姓名内琉璃瓶中夜焚香呪天以筯挾之首得文紀欣然相之乃拜中書侍郎同中書門下平章事三不開馬允孫臨事多不能决當時號曰三不開謂其不開口以論議不開印以行事不開門以延士大夫也在相位齪齪無所為姚顗同中書門下平章事廢帝欲擇宰相選當時清望官知名於世者得盧文紀及顗顗為人仁恕不知錢陌銖兩之數御家無法在相位齪齪無所為登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也韓愈進學解燮贊之崇名以燮贊之崇名被庸虛之陋質劉禹錫代讓平章事表金鉉重名銀青貴服同上讓平章表虞舜享濬哲之名周厲嬰顛覆之禍陸宣公人主昏明繫於所任咎繇䕫契之道長而虞舜享濬哲之名皇父棸楀之嬖行而周厲嬰顛覆之禍自古何嘗有小人柄用而灾禍不及邦國者乎假三事之崇允萬夫之望故韓信以丞相繫魏樊噲以相國伐燕克成茂功抑有前典元達平章事制以平章事為名自郭待舉始也僕射是正宰相房喬始也髙宗朝四品以下有名稱者皆知政事以平章事為名自郭待舉始也僕射是正宰相房喬始也出南部新書鄭覃厯官三十餘任未甞出都門登相位以至于終同上直主政事筆至德二年宰相直主政事筆每人知十日至貞元十年又分每人輪一日執筆潭潭府中居一為公與相潭潭府中居韓愈詩鼎軸老滎公鼎軸老烹斡力健倔韓文宰相者上熙陛下覆燾之恩下遂羣生性命之理以正百度以和四時澄其源而清其流統於一而應於萬為韋相讓官表同上天子之毗諸侯之師止于頔元弼許景先鼎司元侯劉晏釋筆硯以操化權元和初憲宗遵聖祖故事視有宰相器者貯之内庭由是釋筆硯以操化權者十八九劉禹錫李公集序功顯人伏言無不從筆端膚寸澤及天下劉禹錫韋處厚集序韋承慶明堂災上疏諫以文明垂拱後執政者未滿歲率以罪去大抵皆惡逆不道夫創大厦濟巨川必擇文梓艅艎若亟毁而敗則是庇朽木乗膠船也臣謂陛下求賢之意切而取人之路寛故一言有合而付大臣夫以堯舉舜猶厯試諸難况庸庸者可超處輔相以百揆而遽畀小人哉書聞不報縉紳賴以為彊李石器雄逺當軸秉權亡所橈方是時宦寺氣盛陵暴朝廷每對延英而仇士良等往往斥訓注以折大臣石徐謂曰亂京師者訓注也然其進孰為之先士良等恧縮不得對氣益奪縉紳賴以為彊縱諸子關通貨賂道路目語不敢議元載縱諸子關通貨賂京師要司及方面近郊作觀榭帳帟什器不從而供膏腴別野疆畛相望且數十區名姝異妓雖禁中不逮帝盡得其狀嘗獨見帝深戒之謷然不悛客有賦都盧尋橦篇諷其危載泣下而不知悟李少良上書詆其醜狀載怒奏殺少良道路目語不敢議隂禍賊物楊炎以盧杞無識同處台司心甚不悅為杞所譛嚴郢與炎有隙杞乃擢郢為御史大夫以傾炎炎逐崖州舊史乆雨無妨聖政長興三年帝謂馮道曰春雨稍多乆未晴霽何也道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩宥乆雨無妨聖政五代史白孔六帖卷七十
