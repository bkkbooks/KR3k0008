body:
  text: 白孔六帖卷八十四唐白居易原本宋孔傳續撰染一練二金冶三陶四陶瓦五土工六開鑿七傭賃八負擔九舂十債負十一契劵十二乞假十三遺物十四利十五染一白厥篚𤣥纁載𤣥載黄我朱孔陽爲公子裳詩遂朱緑之遂𤣥黄之以爲黼黻文章謂三宫世婦所獻蠒之絲染之以爲君祭服周禮天官染人掌絲帛凡染春暴練練其素而暴之夏纁𤣥𤣥纁天地之色以爲祭服秋染夏夏五色謂之夏者其所謂色以夏爲式也書曰羽畎夏翟冬獻功掌凡染事冬官鍾氏染羽以朱湛丹秫三月而熾之湛潰也丹秫赤粟也湛讀如漸車帷裳之漸熾炊也染羽所以飾旌及王后之車也三入爲纁五入爲緅七入爲緇染纁三入而成又再入深以黑則成緅緅側留反復再染以黒乃成緇語曰君子不以紺緅飾又曰緇衣羔裘爾雅曰三染謂之纁然𤣥色六入與月令命有司染綵黼黻文章必以法故無或差貸黑黄蒼赤莫不質良無敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等級之度水無當於五色五色不得不章不曰白乎湼而不緇惡紫之奪白受采孔掌染百官志織染署令一人丞二人掌染錦羅紗縠綾紬絁絹布柳汁染衣李固言未第前行古柳下聞有弹指聲固問之曰吾柳神九烈君已用汁染子衣矣科第無疑果得藍袍當以棗餻祀我固言許之未乆登第出三峯集素質隨染已悲素質隨時染裂下鳴機色相射杜甫白絲行染人嵗籍所染綾帛陳諫强記染人嵗籍所染綾帛尋丈尺寸爲簿合圍諫泛覧悉記之出唐語林四選香白樂天飛雲履染以四選香染還少府枉佑權攝百司繁而不綱以練染還少府輸染材入宫馬存亮傳敬宗初染署工張韶與卜者蘇𤣥明善𤣥明曰我嘗爲子卜子當御殿食我與焉吾聞上晝夜獵出入無度可圖也韶每輸染材入宫衛士不呵也乃隂結諸工百餘人匿兵車中若輸材者入右銀臺門約昏夜爲變以黦茶染木李守貞與桑維翰有隙賊平行賞悉以黦茶染木給之軍中大怒以帛裹之爲人首梟於木間曰守貞首也五代身所御衣必浣染至再三代宗性儉約身所御衣必浣染至再三欲以先天下唐食貨志凡染大抵以草木而成有以花葉有以莖實有以根皮唐六典織染令凡染大抵以草木而成有以花葉有以莖實有以根皮出有方土採以時月皆並其時而脩其職焉練二白冬官慌氏慌音忙練絲以涗音稅水漚烏豆反其絲七日去地尺暴之涗水以灰所練子禮反漚漸也楚人曰漚齊人曰涹烏禾反暴歩木反晝暴諸日夜宿諸井七日七夜是謂水練宿於井謂懸於井中練帛以欄爲灰漚烏豆反淳其帛實諸澤器淫之以蜃以木欄之灰漸澤其帛滑澤之器也蜃謂灰也鄭曰淫薄粉令其帛白也蛉爲蜃今東海有之清灰盝之而揮之清澄也於灰澄而出盝反令盡揮去其蜃而沃之而盝之而宿之更渥淳也明日沃而盝之朝更沃至夕盝之又更沃至旦而盝之上七日而漚絲吳門曵練練謂白色此事見山川貨賄部練緼之具後漢孔以練染還少府杜佑爲鹽鐵使以練染還少府練龍水圖爲服南唐時有蒼頭持龍水圖求貨或得之將練以爲服或釜中雲起蒸見二龍騰躍穿壁而去出僞史練幛爲衣名畵記有人収張藻畵松石障既死人求之其妻已練爲衣唯得兩幅䨇松一石存焉傳後世已爲名筆也金冶三白攻金之工周禮築氏執下齊多錫爲下齊冶氏執上齊少錫爲上齊鳬氏爲鍾㮚氏爲量鍛氏爲鑄桃氏爲劔金有六錫金錫相和之節凡鑄之狀金與錫墨濁氣竭黄白次之黄白之氣竭青氣次之然可鑄周禮鑠金以爲器範金鑄金爲器修火之利案度程程器小大良冶之子必學為裘鼓鑄鎔鍛晉嵇康善鍛向秀爲之佐欣然旁若無人宅中柳樹乃激水圜夏月居下鍛鍾㑹往省之不與言語鍛自不輟孔鑿山冶銀權萬紀奏言宣饒部中可鑿山冶銀嵗取數百萬帝譲曰天子所乏嘉謀善政有益於下者公不推賢進善乃以利規我欲方我漢桓靈耶斥使還第乆之冶金爲俑文㦤公主葬冶金爲俑恠寳千計實墓中鼓鑄韋倫楊國忠署爲鑄錢内作使判官國忠多發州縣齊人令鼓鑄督非所習雖箠抶苛嚴愈無功倫請凖直募匠代無聊之人由是役用減鼔鑄多矣銅冶李聼爲蔚州刺史州有銅冶自天寳後廢不治民盜鑄不禁聼乃開五鑪官鑄錢日五萬人無犯者鐵爐歩永州北郭有歩曰鐵爐歩蓋嘗有鍜鐵者居其人去其爐毁者不知年矣柳宗元大鹵之金棠谿之工火化水淬器備以充同上晉問掌冶署令一人丞二人掌範鎔金銀銅鐵及塗飾琉璃玉作銅鐵人得採而官收以税百官志邊州不置鐵冶器用所須皆官供凡諸冶成器上數于少府監然後供之並同上冶家子復祖之舊武王既伐商有泣者有司責之其人曰吾冶家孫也數十年之間載易其鎔範矣吾始鑄田器嵗東作必大售商賦重秉耒耜者一撥不敢起吾父易之爲工器属宫室臺榭侈其售益倍民凋力窮土木中輟吾易之以爲兵器㑹師旅戰陣其售又倍前也今四海將奉文理吾之業必壞武王聞之於是包干戈觀農事冶家子復祖之舊陸龜蒙陶四白埏埴以爲器陶器必良凝土以爲器周禮摶埴之工二摶拍也埴粘土也凡陶旊之事墾髺薛暴不入市髺音刮墾損傷也薛音破裂也暴不堅也四者爲其不任用不入於市也陶人爲甗甑鬲庾榖冬官考工記云合土禮範金合土謂陶器也案度程程大小也有虞氏尚陶貴質也舜陶於河濱器不苦窳史記窳濫也土化鑿坏孔甄官百官志甄官署令掌琢石陶土之事土乎質陶乎成器韓愈瘞硯文藝精埏埴制合規模禀至德之陶蒸自無苦窳合大和以融結克保堅貞且無瓦釜之鳴是猶土鉶之德柳宗元進磁器狀陶埴于水涯湘妃廟碑陶土以埴亦在署側人無勞力雲陵亭記土宜陶旊故侯若以壯劉禹錫連州刺史㕔記不則毁文粹陳黯禹誥陶者土之器也持之得其人則完不則毁埏泥範塼李玨牛僧孺碑埏泥範塼始民不知爲瓦屋草茨竹椽乆燥則戞而焚韋丹爲江南觀察使始民不知爲瓦屋草茨竹椽乆燥則戞而焚丹召工教爲陶聚材於場度其費爲估不取贏利人能爲屋者受材瓦于官免半賦陶固收盆甖韓愈聯句陶甄梓匠之工柳宗元與吕恭書陶甄梓匠之工備孽火不得作化墮窳之俗知舜之陶器不苦窳爲信然而舜之德可以及土泥而不化其子何哉是又不可信也同上與楊誨之陶瓦五陶器附白弄瓦詩乃生女子載弄之瓦運甓晉陶侃爲廣州每於齋中運甓婢力反侃字士衡毁方瓦合鴛鴦甑瓦瓦合之衆有虞氏瓦棺瓴甓建瓴挈瓶瓶之罄矣維罍之耻罋易曰井谷射鮒罋敝漏又禮曰罋牖又漢隂丈人抱罋出汲灌園又晉畢卓入比舎郎罋間盜飲又羊雅冬釀酒令人抱罋取煖甑周禮陶人爲甑實二鬴厚半寸唇寸厎七孔穿之墜地不顧後漢孟敏字叔逵負甑行墜地敏不顧郭林宗見而問之對曰甑已破視之何益林宗竒其言勸學問三府辟不就紀甗傳齊賔媚人賂晉師以紀甗甗無底甑也賔媚人國佐也盆記曰及良日夫人繰三盆又司馬遷書曰戴盆何以望天又莊子䘮妻箕踞鼓盆而歌鼓缶叩缶髺懇薛㬥不入市見陶門注孔教作宗室復轉嶺南節度使教民作陶瓦變屋瓦王仲舒徒蘇州隄松江爲路變屋瓦教民陶瓦楊於陵出為嶺南節度使教民陶瓦易蒲屋以絶火患無陶瓦西棫拂菻無陶瓦屑白石塈屋堅潤如玉聚瓦材於場始教民爲瓦屋取材於山召陶工教人陶聚瓦材於場韓愈韋丹墓誌盥濯陶瓦韓文聖德詩陶埴于水涯廼桴廼載柳宗元二妃廟桴木負埴載流於江同上陶瓴甓終南山祠堂碑土工六計料不時順時勞苦白小人勞力屬役悦以使民民忘其勞爲力不同科言力役之事輕重有等勤恤其人事充役煩力敝興事任力愛人爲大敺以就役任役服勤蹔勞永逸官庀役徒勤而不怨荒度土功書曰荒大也大度土功形民力順天時凡啓塞從時門戸道路謂之啓城郭墻壍謂之塞皆啓閉之急不可一日闕墮壞時而理之左傳靈臺經始子來詩曰經始勿亟庶民子來言文王始經營靈臺亟急也衆人自以子義樂來而爲之施舍舍勞役傳弛力息徭役築之登登用力貌百堵皆作雖用千夫之役終資一簣之功家一人周凡起徒役無過家一人以其餘爲羡唯田與追胥竭作云云比居周禮職政役以比居廵役方役之事則廵行也同上人徒役三日禮曰用人之力嵗不過三日治宫室城郭築者客土䟽惡成詔言解萬年作昌匿五年未成客上䟽惡言取他處土爲客土説築傅巖之野土國城漕役土工於國也詩土事無作月令地氣沮洩謂發天地之房役事所役之事廵功傳曰宋城華元爲植廵功計料令尹薳艾獵城沂量功命田分財用平版幹稱畚築程土功議逺邇略基趾具糇糧事三旬而成不愆于素不失本計之期薳艾獵孫叔敖也士彌牟營城周計丈數城之丈數揣髙卑揣度也刃溝洫刃度也物土宜議遠邇物幾物相也相取人功土逺邇之期量事有期知幾時畢計徒庸用幾人工慮材用計所屬役賦丈城之尺度十月庚寅栽栽設版築量力人不吿勞事無愆素揆日稽其功事順時時以作事悦以使人夫土功龍見畢務戒事龍見九日農務畢始戒以土工之事火見而致用致築作之物也水昏正而栽十一月也樹版幹而興作日至于畢日南至微陽作動故土工息也欲無犯時傳曰城諸及防時也月令孟冬可以築城郭造宫室興事任力用人必順順天時也得其時制順作時事以道使人禮冬築郎囿書事時也雖未及時而農事畢可以成故曰書事時也功惟勿亟人則忘憂不時傳曰夏城郎書不時也速成勦人季平子欲城郎囿孫昭子曰焉得速成其以勦民奸時以動言時則妨民多矣作事不時則怨讟動於人月令孟春無聚大衆無置城郭妨農事也孟夏無起土功不可以動衆宋皇國父爲平公築臺妨於農收子罕請俟農功之畢公不許築者歌曰澤門之晳實興我役國父白而居澤門邑中之黔實慰我心子罕黒而居邑中子罕聞之親執扑以行築者而抶其不勉者曰君爲一臺而不速成何以爲役謳者乃止子罕分謗也勿亟不時使人以道則罔吿勞作事不時必聞胥怨梁好土功罷人以潰宋妨農事築者用謳時使日敝茍乖龍見之期見上注則起人疲之怨徵怨勞苦問其勞苦事不愆素人不堪命梁伯好土功亟城而弗處人罷而不堪民不罷勞役徒幾盡敢憚劬勞庶人疲敝胡轉予于恤不敢吿勞莫知我勩勩勞也民力凋盡怨讟竝作人亦勞止哀我癉人亦可息也慘慘劬勞斬艾民力日敝人力不堪事充力竭恤隠恤勞勞力息肩夏王率遏衆力遏絶也梁亡不書其主自取之也以梁伯好土功故也勦人勞人雖有形人之力而無醉飽之心形人之力而便之去其醉飽過盈之心盍思凋敝敢憚勤勞請解吾人之慍無興代役之禮以爲草芥茍不恤於人疲雖有金湯亦何憂於魚爛荒度土功斬艾人力辱在泥塗保其筋力役夫築者老者之事禮曰凡使人任老者之事食壯者之食事勤人怨勦人實難無城猶可人勤於力則功築罕榖梁傳孔躬護役作竇懷貞睿宗爲金仙玉真二公主營觀懷貞躬護役作族弟維鍌諫曰公位上衮當思獻可替否輔天子而計校瓦木雜厠工匠間使海内何所瞻仰乎不荅非憂物恤人所急韓思復帝作景龍觀思復諫曰禍難初弭土木遽興非憂物恤人所急不見省辛替否䟽營寺造觀日繼于時道路流言計用緡錢百餘萬陛下知倉有幾嵗儲庫有幾嵗帛百姓何所活三邊何所輸民散兵亂職此由也又曰往者和帝之憐悖逆也宗晉卿勸爲第宅趙履溫勸爲園亭工徒未息義兵交馳亭不得遊宅不得息陛下所見也今兹二觀得無晉卿之徒隂勸爲之又䟽今大起寺舎廣營第宅伐木空山不足以給棟梁運土塞路不足以充墻壁誇古耀今逾章越制百寮鉗口四海傷心見唐策帝作飛仙宫魏徵䟽曰隋煬帝惟宫室臺榭是飾徭役無時費鉅百萬姚崇曰武后造福先寺上皇造金仙玉真二觀費鉅百萬臣請絶道佛營造可乎窮人力以事工盧藏用武后作興泰宫於萬安山上䟽諫曰陛下離宮别觀固多矣又窮人力以事土木臣恐議者以陛下爲不愛人而奉己也馬周䟽曰五六年來頻嵗豐稔一疋絹易粟十餘斛而百姓咸怨以爲陛下不憂憐何則今營爲者多不急之務故也掊怨天下封德彛楊素營仁壽宫表爲土工監規創鴻侈宫成文帝怒曰素殫百姓力爲吾掊怨天下白衣上書髙郢代宗爲太后營章敬寺郢以白衣上書諫曰奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終嵗之儲大農有㩁酤之敝欲以此時興力役哉土木並起日課萬工今興造趣急人徒竭作土木並起日課萬工不遑食息榜笞愁痛盈於道路以此望福臣恐不然營治不時畢奪廪韋溫太和五年太廟室漏罅詔宗正將作營治不時畢文宗怒責卿李鋭監王堪奪其廪自敕中人葺之温諫王璵請度昭應南山作天華上宫露臺大地婆父祠并三皇道君太古三皇中古伏羲女媧等各爲堂室給百戸掃除又即義扶谷故湫祠龍置房宇有詔從之乃除地課工方嵗飢人不堪命昭應令梁鎮上䟽切諫臣昨受命有所安輯陛下許以權宜今所興造臣謹以便宜悉停帝從之土木是興尹思貞授將作大匠僕射盧懷貞䕶作金仙玉真觀廣調夫匠思貞數有損節懷貞讓之荅曰公輔臣也不能宣贊王化而土木是興以媚上害下又聼小人譛以廷辱士今不可事公矣乃拂衣去輦材瓦薛廷老爲右拾遺敬宗政日僻甞與舒元褒李漢入閤論奏元褒曰宫中興作太甚帝色變曰興作何所元褒不能對廷老曰臣等以諫爲職有問即應論奏然見外輦材瓦絶多知有所營帝曰已諭時造清思院殿中用銅鑑三千薄金十萬餅故廷老等悉言之髙季輔上五事以謂陛下身幸節儉而營繕未息丁匠不能給驅使又和雇以重勞費人主所欲何求而不得願愛其財毋使殫惜其力毋使弊怨結三靈謗蒙四海李嶠上書曰今又崇作寺觀功費浩廣今山東嵗飢糟糠不厭而投艱阨之㑹收庸調之半用吁嗟之物以營土木怨結三靈謗蒙四海棟楹梁桷板檻之腐黑撓折者蓋瓦級甎之破缺者赤白之漫漶不鮮者治之則已無侈前人韓文滕王閣記匠者度材以捐衆徒藝者運思以役衆技劉禹錫修寺記登登其杵坎坎其斧繩之墨之鑿柄枝梧載暨載塗黟烏凌虚許州文宣王廟碑鏟崖堙卑驅石剪棘李白趙公亭頌以門以墉乃棟乃宇同上匠生於心隨指如化開山剪木役以私属劉禹錫别集開鑿七白經啓大道遠績劉子謂趙孟曰美哉禹功吾子盍逺績禹功而庀人乎荒度土功荒大也受賜民到于今受其賜暫勞永逸溥哉之利逺矣禹功開物之智成功禹成厥功逺矣濟時之功役不吿勞事無愆素量功戒事命曰庀徒人可樂成難與慮始智能慮逺愚可樂成苟未僝功豈無胥怨隨山刋木孔鑿石通車吐蕃傳度悉結羅嶺鑿石通車逆金城公主道也鑿道趣城西域康居東有嫓摩川度磧行二百里得泥瓖城在大澤中地墊洳蘆菼荒茂行者鑿道趣城通于闐鑿翠鑿翠開户牖杜甫九成宫䟽鑿就欹斜禹功翊造化䟽鑿就欹斜柴門詩鑿石爲月河天寳中以三門河道險阨漕運阻難乃令旁北山鑿石爲月河以備湍急名曰月寳河嵗省運夫五十餘萬又無覆溺之患天下稱之其河東西徑直長五里餘闊四五丈深二丈三丈至五六文皆鑿石得古鐵鏵上有平陸兩字改爲平陸縣旌其事也出開元記鑿山冶銀權萬紀奏宣饒部中可鑿山冶銀嵗取數百萬帝曰公乃以利規我欲方我漢桓靈耶鑿門導伊兩阜屛開李庾賦鑿石作鼓隳嵯峨韓文鑿八節灘白居易鑿敗灘石以平贛梗韓文路公碑傭賃八白間人轉移執事周禮太宰以九職任萬民九曰閒民無常職轉移執事閒人謂無業者轉移爲人執事閒人若今之傭人僕賃傳申鮮虞僕賃於野移用其人轉相助救周禮揆以時日計其功用計傭揆日廢事食力傭保司馬相如於臨卭市沽酒使文君當壚相如衣犢鼻與傭保相雜作滌器注傭人之可保傭者也傭耕陳勝少時常與人傭耕輟耕於隴上而歎不取直魏焦先自作一蝸舎淨埽其中呻吟獨卧飢則爲人庸作飽食而已不取其直傭書吳闞澤貧常爲人傭書以供紙筆所寫既畢誦之亦徧賣傭彭城爲家人時窮困賣傭於齊爲酒家保也僦賃鄭當時字莊征匈奴招四夷天下費多財用亦屈當時爲大司農任人賔客僦賃夕逋負以此䧟罪貶爲庶人注僦賃受雇賃而載運也言當時保賃其賔客於司農載運孔寫書取傭王紹宗少貧狹嗜學工草𨽻客居僧坊寫書取傭自給凡三十年傭足給一月即止不取贏人雖厚償輙拒不受御史不償李畬母者失其氏畬爲監察御史得廩米量之三斛而贏問于史曰御史米不暨也又問車庸有幾曰御史不償也毋怒敕歸餘米償其傭因切責畬自傭王琚謀刺武三思事洩亡命自傭於揚州富商家識非庸人以女嫁之厚給以貲雜傭保王方翼母李爲主所斥居鳯皇墅方翼尚㓜雜傭保執苦不弃日墾田植桑治林垠塈完墻屋燎松丸墨爲富家卜祝傭保張𤣥素傳卜祝傭保量能並用負擔九白負也者小人之事弛於負擔齊使敬仲爲卿辭曰覊旅之臣弛於負擔君之惠也負荷其父析薪其子不克負荷息肩鄭請息肩於晉注以負擔喻也荷篠遇丈人以杖荷篠儋石劉毅家無儋石之儲一擲百萬負薪之憂擔人之爵未能負薪孔班白負戴李子通居鄉見班白負戴必代之負取不勝李宻民食興洛倉者給受無檢至負取不勝委於道零落艱難韋蘇州白沙亭逢吳叟歌問之執㦸亦先朝零落艱難却負樵刈熟擔肩頳韓文城南聯句擔贓負賄舊唐史盧懷慎時政號擔贓負賄僥倖或即蒙升自軒轅以來服牛乗馬今輦負則人代畜唐史王求禮䟽舂十磑附白易曰斷木爲杵掘地爲臼臼杵之利萬民以濟蓋取諸小過周禮地官舂人掌米物物非一米祭祀供粢盛之美賔客供牢禮之米可成筐筥者也凡享祀米享有食米則享禮兼宴與食也不相鄰有䘮舂不相賜晉衛瓘爲太子少傅詔賜田園水碓辭不受意儉約耳守魏舒陽元少遲鈍雖叔父猶不知之使守水磨不介意封水碓劉頌爲京兆太守洲漢二水有公主碓二十餘區所在塞流水輙爲侵害上表封諸水碓獲便利也衣赭舂於市漢申公白公斗粟漢文殺淮南王人歌曰一斗粟尚可舂兄弟二人不相容賃舂梁鴻使其妻舉案齊眉事定交杵臼之間漢公沙穆奏遊太學無資乃變服爲傭爲吳佑賃舂祐與語大驚遂定交杵臼之間連機傅暢晉諸公賛曰杜預元凱作連機水磑由此洛下糓米豐賤水磑石崇臨刑有簿閱崇財物有水磑三十餘區馬磨蜀志許静爲許劭排擯不得齒序以馬磨自給既揺廻蟻之輪還破鳴鳩之麥舊判洛陽董德之磑同上磨賦諸葛恪别傳孫權享蜀使費禕食湯餅索筆作麥賦恪亦請筆作磨賦咸稱善蟻行磨上抱朴子天圓如盖地方如碁局天旁轉如推磨而左行日月右行隨天左轉天牽之西没譬如蟻行磨上磨左旋蟻右去磨疾蟻不得隨磨左回孔競碾磑李元紘為雍州司戸叅軍時太平公主勢振天下百司順望風指甞與民競碾磑元紘還之民舂市戚姬髠髪入舂市萬古共悲辛李白中山妾歌作婢舂黄糜珊瑚破髙齊作婢舂黄糜杜牧杜秋娘詩宿舂北距澧浦資宿舂而可行劉禹錫杜司徒書水舂雲母碓李白詩鄰女夜舂寒李白野碓杜甫雨詩柴扉臨野碓半熟搗香秔村舂雨外急同上村夜落杵光輝白除芒子粒紅同上粟不暇舂陸宣公奏議論長史増户債負十一賖貨附白周禮凡有債者判書以治則聽謂出債之息判書舉債之契書也失則治之又曰凡屬債者以其地轉而聽其辭屬債轉債使人歸之而本主死亡歸受之數相抵冒者也以其地之人比近能爲證者乃受其辭而治之也傳曰己債己止也己債棄逋債也漢晁錯曰急政暴賦有者半賈而買無者取倍稱之息稱舉息利也倍利而舉債又曰故有鬻子孫賣田宅以償債也稱息漢書商賈大者稱貯息少者坐列販賣注稱舉也十倍之利貨殖志吳楚兵起長安列侯行從軍齊貸子家以關東勝敗未决莫肯與之惟毋鹽氏出千金貸之其息十之三月吳楚平一嵗中息十倍注行者須糧而出錢家貸十倍之也折劵馮煖棄債髙祖從王媪氏武負貫酒嵗竟二家甞棄債周禮聽稱債以别傳傳别劵書也見下門注中周禮賖者祭祀旬日䘮紀三月國服爲之息以其國之所出爲息利也貸粟莊子貸粟於監河侯舎債晉王長文德㪫太康中開倉賑貸長文後無以償郡縣切責送之上州刺史徐幹舎之也求假不稱曹洪家富而恡嗇文帝少時求之假不稱常恨之後因事而免官爵敵國貸粟越大夫種曰臣觀吳政驕矣請試之貸粟以下其事吳王欲與子胥諫勿與之孔債帥髙瑀領忠武節度使自大厯後擇帥悉出宦人中尉所輸貨至鉅萬貧者假貸富人既得所欲則椎斵膏血倍以酬息十常六七及瑀有命士相吿曰韋裴作相天下無債帥負逋許孟容貞元十九年夏大旱上䟽言負逋饋送當免免之負博數十萬來俊臣父操博徒也與里人蔡本善本負博數十萬不能償操因納其妻先己娠而生俊臣冒其姓柳人以男女質錢過期不贖子本均則沒爲奴婢宗元設方計悉贖歸之尤貧者令書庸視直足相當還其質已沒者出己錢助贖柳宗元本傳里無逋家柳仲郢毎旱潦必貸匱蠲負里無逋家負五坊息錢裴度傳大賈張陟負五坊息錢亡命坊使楊朝汶收其家簿閲貸錢雖已償息鈎止根引數十百人列捶挺質不承又獲盧大夫逋劵捕盧坦家客債償久乃悟盧羣劵坦子上訴朝汶讕語錢入禁中何可得御史中丞蕭俛及諫官列陳中人横恣度亦極言之時方討鄆帝曰姑議東軍此細事我自處辦度曰兵事不理止山東中人横暴將亂都下帝不悦徐乃悟讓朝汶曰以爾使我羞見宰相命殺之而原繫者由是京師澄肅三倍取償穆宗皇后蕭氏閩人也初后去家入長安不復知家存亡惟記有弟帝爲訪之俄有男子蕭洪因后姊壻吕璋白見之太后謂得真弟悲不自勝帝拜洪金吾將軍出爲河陽三城節度使稍徙鄜坊始節度自神策出者舉軍爲辦裝因三倍取償洪所代未及償而死軍中併責償於洪洪不許左軍中尉仇士良憾之負息錢數百萬或勸治居産李守禮曰豈天子兄無葬耶契劵十二白周禮小宰以八成經邦國四曰聽稱債以傳别稱債貸債也傳別劵書也聼訟債者以劵書責次之傳著約束之文書别有兩家各得一也六曰聽取與以書契書契與受人之要也七曰聼買賣以質劑書市之平價謂兩書一札同而別之長曰質短曰劑傳别質劑皆今之劵書也交易而退作法示信俾人不爭結信止訟周禮以質劑結信而止訟大市小市周禮質人凡買儥者質劑焉大市以質小市以劑注云質長劵劑短劵儥賣也兩劑見上由質要由用也質要契劵也傳云執右契禮曰獻粟者執右契謀始不明訟之所生由契之不明也有德司契出老子判書舉債之劵書奠債奠定約言要詞要約保人周禮立劵爲保使之相保必由質要以息訟端伏羲始造伏羲氏之王天下也始畫八卦造書契周禮司㑹掌左契書契舉契王叔氏不能舉其契聖人執左契左契心也左者不用之地以喻無爲又云左陽也心藏陽也焚削後漢樊重假人間責令人焚削文契前定折劵髙祖事具債負門注徵辭利有爭端信為言要書致獻田宅者操書致代結繩造書契以代結䋲之政孔焚劵羅譲或以婢遺讓者問所從荅曰女兄九人皆爲官所賣留者獨老母耳讓慘然爲焚劵召母歸之出劵貸直盧羣遷鄭滑行軍司馬姚南仲入朝即以羣代節度甞客于鄭質良田以耕至是則出劵貸直以田歸其人以劵上進五代常思廣順三年從鎮歸德居三年來朝又徙平盧思因啓曰臣居宋州民負臣絲息十萬兩願以劵上進太祖頷之即焚其劵詔宋州悉蠲除之金劵范君璋奔突厥䧟馬邑其部皆中國人多叛去君璋窮乃降自謂障冦贖罪髙祖遣鴈門人元普賜金劵書契以質浮僞韓文劈木契分受之李巨𤣥宗末禄山䧟東京授河南節度使巨奏曰方今艱難恐為賊所詐如忽召臣不知何以取信𤣥宗劈木契分受之遂以巨兼統嶺南節度使李崧第爲晉宰相契丹犯闕從冦北行留守鎮州漢髙祖入汴以崧之第賜蘇逢吉崧之弟嶼􅤡酣酒言及奪我居逢吉之部逋李嶼舡傭嶼撻之遂吿變乃自誣服罪舉家遇害五代史乞假十三白唯名與器不可以假人雖有挈瓶之智守不假器禮無彊匄乞匄袁紹書曰曹操父嵩乞匄攜養禮内外不通乞假别嫌疑也又云乞假於人必量而後入不入而後量量其可否假蓋夫子不假蓋於子夏護其短也借人有馬者借人乗之假羽毛而不歸乆假而不歸孟子曰堯舜性之也湯武身之也五覇假之也乆假而不歸惡知其非有也假不反矣假道璧假許田乞食重耳過衛乞食於野野人與之塊乞醯孰謂㣲生髙直或乞醯焉乞諸其鄰而與之乞糧吳申叔時乞糧於公孫有山有山曰粱則無矣麤則有之若登首山以呼曰庚癸乎則諾亦無幾求言所求少勿虚其請得之不貴孔從民借狗滕王元嬰爲金州刺史廵省部内從民借狗求置所過爲害假鹽麴韓全誨傳始張濬判度支賜復恭以軍貲乏奏假鹽麴一嵗入以濟用度遂不復還羸服丏人間膠東郡王道彦㓜孝謹初神通避使于鄠被疾山谷間累旬食盡道彦羸服丏人間或採山實以進神通未食不敢先即有所分辭以飽乃藏弆以待若稼而穀圃而蔬不丐買而有也柳宗元貸借更何患韓愈詩謂言安堵復貸借更何患乞丏酒食文粹李商隠齊魯二生劉义穿屐破衣隨尋常人乞丏酒食爲活乞丏凍餒元結時議吾州里有仁信之者方直之者今或有病父老母孤兒寡妻如身能存者皆力役乞丏凍餒不足况於死者父母妻子人誰哀之執契擔嚢陸宣公奏議斂穫始畢糇糧已空執契擔嚢行復貸假丏貸文粹陸龜蒙論文書未甞歴王公丏貸飾車馬不相假借髙士亷進益州都督長史蜀人雖昆弟不相假借士亷爲設條教翕然爲變乞食歌姬院韓熙載後主即位頗疑北人鴆死者多而熙載且懼肆情坦率不遵禮法破其財貨售妓樂迨百數人日與荒樂蔑家人之法所受月俸至則散爲妓女所有而熙載不能制之以爲喜既而曰不能給遂弊衣屨作瞽者持獨絃琴俾舒雅執板挽之隨房歌鼓求丏足日膳江南野史民行乞食者屬路唐史食貨志百姓殘於兵盜米斗至錢七千鬻籺爲粮民行乞食者屬路乞米煩佳客杜甫詩丏食取給李揆元載秉政奏揆試秘書監流淮養疾家百口貧無禄丐食取給牧守稍厭慁則去之流落凡十六年載誅始拜睦州刺史持鉢乞食北夣𤨏言裴休常披毳衲於歌姬院持鉢乞食曰不爲俗情所染遺物十四餘具農部捃拾門中白周禮凡得獲財貨人民六畜者委于朝吿于士旬而舉之大者公之小者庶人私之委于朝十日待來識之者也人民謂别人奴𨽻也若今時得遺物六畜也舉之沒入官大者入公小者入私也路不拾遣義然後取茍得遺金列女傳羊子得遺金一餅妻讓之曰妾聞君子不以利汚行羊子慙而棄之亡弓蓍簮少原婦人亡之墜屨昭王管寧錢孔夜發遺袍張允濟爲武陵令有行人夜發遺袍道中行十里乃寤令曰吾境未甞拾遺可還取之既而得袍遺簮屨王藹祖二踈圖記有避席而遺簮屨者利十五禁利附兼并白以利得人周禮以九兩繫邦國之民六曰以利得人注云爲政之利賈而欲贏而惡嚻乎好利惡器專利自封藴利生孽不爲利回小人喻於利因人之利而利之放於利而行多怨子罕言利趨利之人如水走下晁錯言云禁利公無禁利謂不與人共也周禮㓙年荒政則舎利無禁利也奪人專利錮齊人之利國禁野禁厲禁謂山野之林遮禁也周禮有司教導月令山林藪澤有能取蔬食田獵禽獸者有司教導之其有相侵奪者罪之而不赦林麓川澤以時入而不禁禮與人同利禮無盡利子曰君子不盡利以遺人言不與人爭利也禁彼山林茍以利之爲利嚴其厲禁豈曰仁而愛人地林邦禁衆庶所資職司是掌示人知禁作法於貪公不害私義惟和利爲邦以禮材則有餘作法於貪人將安仰物既阜蕃國寧乏用將思佐賦曽不卹人文王之囿與人共之與衆共之禮不獨有道存利物政在養民因人所利而利之不亦惠而不費兼并取貧富中事用禮曰君子不盡利以遺人不與人爭利不兼人之利專利自封禮記孟獻子曰伐冰之家不畜牛羊畜馬乘之家不察雞豚爲兼利也國有四人業唯區别職無貳事利不兼并侵冒盈厭幅利晏子曰人生厚而用利於是乎正徳以幅之謂之幅利君子仕則不稼田則不漁臧文仲不仁者三妾織蒲與人爭利此不仁之一也商工皁𨽻不得遷業商農不移工賈不變守常業也禁二業後漢時禁二業劉毅伯興上書邦國以官禁二業至使畋者不得魚今江濱海湖郡人資漁採且以閑月無關二業食禄者不爭利公儀休為魯相食茹羹拔園葵而去之見家織布遂逐妻焚機曰欲令農夫女工安其所用而售其貨乎仕不得販賣漢張禹上䟽欲令諸曹侍中已上無得貶賣犯者請免官及削爵孔權萬紀帝譲曰以利規我見金冶門言利崔羣是時皇甫鏄言利幸於帝隂藉左右求宰相羣數言其佞邪不可用世訾其嗜利裴冕領使既衆吏白俸簿月二千緡冕顧視喜見顔間世訾其嗜利枘鑿萬端髙適出為蜀彭二州刺史始上皇東還分劔南有兩節度百姓弊于調度而西山三城列戍適上䟽曰劔南雖名東西川其實一道自卭關黎雅以抵南蠻由茂而西經羌中平戎等城界吐蕃瀕邊諸域皆仰給劒南異時以全蜀之饒而山南佐之猶不能舉今列梓遂等八州專為一節度嵗月之計西川不得叅也嘉陵北困夷獠日雖小定而痍痏未平耕紡亡業衣食貿易皆資成都是不可得役亦明矣可税賦者獨成都彭蜀漢四州而已以四州耗殘當十州之役其弊可見而言利者枘鑿萬端窮朝底夕千按百牘皆取之民官吏懼譴責及鄰保威以罰抶而逋逃益滋劉晏四利劉晏乃移書於宰相元載以為大抵運之利與害各有四京師三輔苦税入之重淮湖粟至可減徭賦半為一利東郡凋破百戸無一存若漕路流通則聚洛邑㕓漸可還定為二利諸將有不廷戎虜有侵道聞我貢輸錯入軍食豐衍可以震耀夷夏為三利若車舟既通百貨雜集航海梯嶠可追貞觀永徽之盛為四利誘人陸䞇奏立國惟義與權誘人惟名與利名近虛於教為重利近實於德為輕責臣以利裴諝拜河東鹽鐵使時關輔旱諝入計帝召至便殿問㩁酤利嵗出内幾何諝久不對帝復問曰臣有所思帝曰何耶諝曰臣自河東來涉三百里而農人愁歎榖菽未種誠為陛下軫念元元先訪疾苦而乃責臣以利孟子曰治國者仁義而已何以利為故未即對帝曰微公言朕不聞此趣小利陸贄奏趣小利昧逺圖徳宗晚喜聚財李珏帝又語貞元初政誠善珏曰徳宗晚喜聚財方鎮以進奉市恩吏得賦外求索此其弊也言財利房琯於是第五琦言財利幸為江淮租庸使琯諫曰往楊國忠聚斂産怨天下陛下即位人未見徳今又寵琦是一國忠死一國忠生無以示逺方帝曰六軍之命方急無財則散卿惡琦可也何所取財琯不得對利可通而不可竭宇文融等賛夫民可安而不可擾利可通而不可竭觀數子乃欲擾而竭之歛怨基亡則向所謂利者顧不反哉走絲毫之利盧坦書得利則躍躍以喜不得利則戚戚以泣若不可生者豈韋侯之謂哉韓文開元中宇文融始以言利得幸於時天子見海内完治偃然有攘卻四夷之心融度帝方調兵食故言𨼆戸剰田以中主欲利説一開天子恨得之晚不十年而取宰相雖後得罪而追恨融才有所未盡也孟子所謂上下征利而國危者可不信哉裴冕明彊嗜利不知大體本贊名勝於利則偷競日銷利勝於名則貪暴滋煽唐史薛登䟽蕭至忠本非賢而寄賢以奸利失之則邀利以䘮賢唐史本贊白孔六帖卷八十四
