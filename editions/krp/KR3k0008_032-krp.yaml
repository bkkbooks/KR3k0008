body:
  text: 白孔六帖卷三十二唐白居易原本宋孔傳續撰卜候一祈禳二忌諱三書四圖畫五執馭六醫七卜候一白史記曰計然曰嵗在金禳水毁木饑火旱旱則資舟水則資車物之理山石自立樹葉成字漢昭時太山南匈匈有數千人聲大石自立白頭烏集傍上林苑中枯栁自起蟲食樹葉成文曰公孫病已當立天乆隂不雨漢昌邑王數出夏侯勝當輿諫曰天乆隂不雨臣下有謀上者分卦更直日用事京房治易事焦延壽曰得我道以亡身者京生也其說事長於災變分六十四卦更直日用事以風雨寒温為候以占驗而房用尤精妙婦人生四子京師兵氣南昌有婦人生四子太子問唐擅災變之應唐擅以京師有兵氣其禍發於蕭墻至延和四年孫程揚兵省殿誅閻顯黄龍見後漢和帝永平末黄龍見譙喬𤣥曰此何祥其當有王者不及五十年龍當復見此應見魏郡豐殷宻記之至建安二十五年龍復見譙其冬魏受禪魚生屋上魏時有二魚長尺餘集武庫屋上有司以為吉祥王肅曰魚生泉而及於屋介鱗之物失其所邉將殆有棄甲之象後闗東敗果應之周禮以五雲之物辨吉凶水旱豐荒祲祥十二風察天地之乖和觀變化之妖祥視祲掌十煇之灋以觀妖祥傳曰凡分至啓閉必書雲物赤黒之祲傳曰有事於武宫梓慎曰吾見赤黒之祲非祭祥妖氣也昭二十年正月己丑日南至梓慎望氣曰今兹宋有亂蔡有大䘮晉楚㑹於宋楚人𠂻甲伯夙謂趙孟曰楚氛甚惡懼難孔王敦亡兆崔義𤣥隋大業亂徃見李宻不用河内賊黄君漢為宻守栢崔義𤣥見羣䑕渡河稍刄有華文曰此王敦亡兆也因說君漢以城歸紫微方災豆盧瑑與崔沆皆拜同平章事初咸通中有治厯者工言禍福或問比宰相多不至四五謂何而曰紫微方災然其人又將不免後楊収韋保衡路巖盧攜劉鄴于淙瑑與沆皆不得終云龜兹浮屠西域龜兹有浮屠善數歎曰唐家終有西域不數年吾國亦亡太白躔秦分傅奕善數初武德九年太白躔秦分奕奏秦王當有天下帝以奏付王及太宗即位召曰向所奏幾敗我星犯昴言禄山將死韋見素是嵗十月丙申有星犯昴見素言於帝曰禄山將死矣帝曰日月可知乎見素曰福應在德禍應在刑昴金忌火行當火位昴之昏中乃其時也既死其月亦死其日明年正月甲寅禄山其殪乎帝曰賊何等死荅曰五行之說子者視妻所生昴犯以丙申金木之犯也木火之母也丙火為金子申亦金也二金本同末異還以相尅則殆為子與首亂者更相屠戮乎及禄山死日月皆驗引妖人言占不軌桓彦範張昌宗引妖人迎言占訃不軌宋璟請窮治其姦武后以昌宗嘗自歸不許彦範諫玉床揺帝坐不安而不端髙祖微時與相友大業中討賊河東表端為副端邃術數宻語髙祖曰玉床揺帝坐不安晉得嵗真人將興安天下之亂者其在公乎但上性沉忌内惡諸李今金刀已誅次且取公宜早為計帝感其言二雉雊署寢占者曰軍府將空髙駢㑹二雉雊署寢占者曰軍府將空駢惡之悉出兵營東塘髙垣堞桑道茂召待詔翰林建中初上言國家不出三年有厄㑹奉天有王氣宜髙垣堞為王者居使可容萬乘者德宗素驗其數詔京兆尹嚴郢衆數千及神䇿兵城之時當盛夏趣功人莫知其故及朱泚反帝蒙難奉天頼以濟西師潰同上又善太乙遁甲術乾元初官軍圍安慶緒於湘州勢厄廹道茂在圍中宻語人曰三月壬申西師潰至期九節度兵皆敗女武代王李淳風太宗得祕䜟言唐中弱有女武代王以問淳風對曰其兆已成己在宫中又四十年而王王而夷唐子孫且盡帝曰我求而殺之奈何對曰天之所命不可去也問三日金梁鳳頗言人貴賤夭壽裴冕為河西留後梁鳳輒言一日向雒一日向蜀一日向朔方此時公當國冕妖其言絶之俄而禄山反冕以御史中丞召因問三日答曰雒日即滅蜀日不能乆朔方日愈明肅宗即位而冕遂相逢林即住唐杜楊編初德宗欲西行有知星者奏事曰逢林即住上曰豈可令朕處林木間乎姜公輔曰不然但以地名亦應也及奉天尉賈隱林謁上於行在上觀隱林氣宇雄俊兼是忠烈之家而名叶知星者語龍星動九國志蜀杜光庭黄巢之亂從幸興元途次西縣遇陳休復有道術與光庭憇於路左軍中以柱杖掘地得酒一壺酌之不竭光庭因問車駕何時當還答曰五年後龍星動即歸矣果如其言李淳風於占候若節契然本傳有亡奴者問所從追戒曰自此逢使者懇乞其鞭若不可則以情告其人果值使者於道如生語使者異之曰去鞭吾無以進馬可折道傍葼代之乃徃折葼見亡奴伏其下獲之杜生善易唐史又有亡奴者生戒持錢五百伺於道見進鷂使者可市其一必得奴俄而使者至以情告使者以一與之忽飛集讙莽上徃而取之乃得亡奴衆以為神祈禳二白寧風旱弭災兵逺罪戾祈福祥求永貞周禮堂贈男巫東堂贈無方無筭注自堂始送不祥招彌招安也止凶禍率百𨽻時儺索室中甸師喪師代王受眚灾女祝掌王后之内禱祀祀報福也以時招梗禬禳以除災殃除災害曰禬禬刮去也却變異曰禳梗禦未至也招招善去惡也四祀禮今唯有禳禮在梗音鯁禬音㑹牧人凡外祭毁事用尨可也毁謂疈辜候禳敺除殃咎之厲宗伯以疈辜祭四方百物疈磔狗而祭也肆師以嵗時序其祭禮之祈珥祈當為璣珥當為衈衈者釁禮之事雜記廟成則釁之類是也雞人掌凡國祭祀面禳釁供其雞牲釁宗廟之屬釁廟以羊門夾室以雞司農云面禳四面也太祝掌六祈同鬼神祗一類二造三禬四禜五攻六祝注祈禱也謂有災變則號呼告神以求福也天神人鬼地祗同以祈祀之也傳曰宋災使禳火於𤣥㝠回禄𤣥㝠水神祝之以抑水回禄火神祀之求弭火子路曰禱爾於上下神祗子曰丘之禱乆矣孔子素行合神祗禳彗傳曰齊有彗星齊侯使禳之晏子曰無益也祗取誣焉彗除穢也若德之穢禳之何益也史記成王病周公翦爪禱祈漢文詔不令祈詔曰先王逺施不求其幸望祀不祈其福今祠官祀釐歸福於朕不為百姓其令祠官致敬無有所祈磔雞晉禮志曰嵗旦常設筆筊桃梗磔雞於百寺門禳惡氣漢儀用仲夏有桃無雞雞起於魏青龍元年有司奏春分祠厲殃乃詔曰不在祀典其除之也用牛魏陳嶠為西部都尉曲周民父病以牛禱縣詰罪棄市嶠曰此孝子也表赦之遷郡太守眡祲掌安宅叙降次序其㐫禍禳移之被髪禱北斗漢息夫躬為光禄大夫宜陽侯免官歸國未有第宅寄在邱亭奸人以侯家富夜守之躬邑人賈惠過躬教以祝盗方以桑東南枝為七畫北斗七星其上躬夜自被髪禱北斗招指人有上書言躬怨呪咀躬大呼食頃而死囚祭臯陶范滂字孟博坐鉤黨繫黄門北寺獄吏謂曰凡坐繫皆祭臯陶滂曰臯陶賢者知滂無罪將理之於帝有罪祭之何益為官長禱張綱字文紀為廣陵守疾病吏民祈禱曰千秋萬嵗何時復見此君又劉惔字真長為丹陽尹病篤人為祈禱曰邱之禱乆矣又後漢宋均叔祥為河内寢病耆老為祈請獲罪於天無所禳也孔過華山祠裴寂家貧徒歩走京師過華山祠祈神自卜祝禬惠宣太子業嘗被疾帝自祝禬上象變請禳裴光庭初知星者言上象變不利大臣請禳之光庭曰使禍可禳而去則福可祝而來也論者以為知命水沴閉坊門以禳楊再思為宰相於時水沴閉坊門以禳帝問祈禳之數李藩帝問祈禳之數藩對曰孔子病止子路之禳漢文帝每祭勑有司敬而不祈使神無知則不能降福有知固不可私己求媚而恱之也且義於人者和於神人乃神之主人安而福至帝恱曰當與公等上下相勉以保此言厭勝王凝為宣歙觀察使王仙芝黨賊至㑹大星直寢庭墜術家言宜上疾不視事以厭勝凝曰東南國用所出而宣為大府吾規脫禍可矣顧一方何頼哉誓與城相存亡勿復言既而賊去祭北斗𤣥宗皇后王氏帝宻欲廢后后兄守一懼為求厭勝浮屠明悟教祭北斗取霹靂木刻天地文及帝諱合佩之曰後有子與則天比開元十二年事覺帝自臨劾有狀乃制詔廢為庶人賜守一死與妖人祈福禳解桓彦範張昌宗引妖人迎占言計不軌宋璟欲窮治其姦武后以昌宗嘗自歸不許彦範諫曰昌宗繆横恩包禍心既自歸露而尚與妖人祈福禳解則初無悔意今而宥之誠恐昌宗自謂應運天下浩然從之不禱祠而福盧藏用云古之為政者不禱祠而福第有獄氣李義府㑹術者杜元紀望義府第有獄氣乃曰發積錢二十萬可以厭勝義府信之裒索殊急禍福在德髙郢代宗為太后營章敬寺郢諫曰若以禳禍則方務厥德罔有天災不在勞人雨不止禳祝而霽劉道合時將封太山雨不止帝令道合禳祝俄而霽乃令馳傳先行泰山祈禳報恩田神功既寢疾宋之將吏為祈禳報恩誠不至者物不感陸宣公奏議昔湯遇災禱於桑野躬自髠剔以為犧牲古人所謂割髪宜及膚剪爪宜侵體良以誠不至者物不感盲郭璞搔首集路嚴㓜病篤有人稱解醫禳之術嚴用之不効曰此盲郭璞也争寵不平棣王琰㑹妃以過置别室而二孺人争寵不平求巫者宻置符琰履中以求媚仇人告琰厭魅上帝伺其朝取履視之信帝怒責琰忌諱三白史記隂陽家流拘而多忌好忌諱後漢汝南陳伯敬行必矩歩坐必端膝呵叱狗馬終不言死行路聞凶便引車留還歸觸忌則寄宿亭年老不舉孝亷後坐女婿亡吕䕫殺之不忌諱趙興下邳人不恤忌諱每入官舎繕脩穿移豐熾三代為司𨽻校尉反支日不受章奏後漢明帝時公車以反支日不受章奏帝曰民廢農桑來詣闕拘以禁忌豈為政之意乎蠲其制傳曰辰在子卯謂之疾日君徹宴樂學人舎業為疾故也紂以甲子喪桀以乙卯亡五月生子長與户齊不利其父田嬰賤妾生子名文以五月生嬰父令勿舉母竊舉之長見嬰怒曰五月生子長與户齊不利其父文頓首曰若受天之命何憂也若由户但髙其户父慙之孔徃亡日李愬攻呉房殘外垣始出攻吏曰徃亡日法當避愬曰彼謂吾不來此可擊也衆决死戰射殺其將賊乃走不避治署李聽拜邠寧節度使邠署相傳不利治垣舎前刺史視其壞莫敢葺聽曰將出鑿㓙門何避治署邪亟使完新之卒無異尚時日拘忌李泌代宗將葬帝號送承天門而輼車行不中道問其故有司曰陛下本命在午故避之帝泣曰安有枉靈駕以謀身利命直午而行及宣政廊壞太卜言孟冬魁岡不可營繕帝曰春秋啓塞從時何魁岡為亟詔葺之及桑道茂城奉天事驗始尚時日拘忌因進用泌泌亦自有所建明泌嘗持黄老鬼神說故為人所譏切世俗禁忌李吉甫初政事堂有巨床相傳徙者宰相輙罷不敢遷吉甫笑曰世俗禁忌何足疑耶徹而新之嵗子午忌憲宗皇后郭氏元和八年羣臣三請立為后帝以嵗子午忌故章報聞罷書四王者書附白六文古今篆𨽻書體曰六文者盖叙為文之體也一曰象形二曰指事三曰㑹意四曰假借五曰諧聲六曰轉注八體漢書注曰八體一曰大篆書二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰𨽻書八曰行書崩雲蔡邕表曰重似崩雲埀露古今篆𨽻曰垂露書漢中郎曹家所作也以書章奏謂㸃綴輕露於垂條也臨池盡墨草聖張芝伯英善草書凡家之衣帛必先書而染練之臨池學書池水盡墨寸紙不遺韋仲將謂之草聖銀鉤驚鸞反鵲並書勢鳥跡蒼頡觀鳥跡而成字蟲書科斗古文也團扇王右軍草書於團扇二妙八行得伯英之筋晉衛瓘字伯玉索靖字㓜安俱能書為尚書郎時號一臺二妙謂瓘得伯英之筋靖得伯英之肉也墨妙筆精記姓名漢書項羽少時學書不成乃曰書足記姓名而已墨池彩筆父子王羲之及子獻之並善書故號二王書皆曲盡其妙鍾張鍾𨽻張芝皆善書瓘靖見上注投筆班超投筆歎曰大丈夫安能乆事筆硯乎六書周禮六藝五曰六書見上注曲藝書也小學漢元始中徵天下通小學者以百數各令記字於筐中揚雄取其可用者作訓纂篇正六經蔡邕以經籍去聖乆逺文字多悞乃奏求正定六經文字帝許之邕自書丹於碑使工鐫刻立於太學門外始成觀視模寫者車日千餘兩書䆫塵蕭鋒貧無紙書䆫塵積而書之湛垂露於毫端起懸針於筆杪寫八體之殊蹤窮二王之逸勢龍圖始啓則八卦之象可觀鳥跡初分則六體之書爰起作典墳之韞櫝為文字之濫觴經籍於是𤣥興著述於是間作巧同懸露妙等崩雲化成天下其由此乎六角作扇書法云右軍見一老姥賣六角竹扇因取書之扇名増其價姥後求書笑而不答衛恒字巨山善草𨽻為四體書或不持錢詣酒家飲因書其壁觀者酬錢計足而滅之王者書同文今天下書同文以代結繩之政古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉龍騰魚躍鳳集古今篆𨽻文體曰龍書者太昊氏獲景龍之瑞以紀官用頒政令魚書者周武王有白魚之慶因為書鳳書者白帝朱宣氏有鳳鳥之瑞文字取以為象八卦龍馬負圖伏羲觀之畫為八卦之文九疇洛龜負圗夏禹觀之得九疇之文觀乎人文天文日月之文孔遂良侍書褚遂良工𨽻楷太宗嘗歎曰虞世南死無與論書者魏徴白見遂良帝令侍書帝方博購王羲之故帖天下争獻然莫能質真偽遂良獨論所出無舛冐者唐本傳以書顓家貞觀永徽間虞世南禇遂良以書顓家後莫能繼薛稷外袓魏徴徴家多藏虞禇書故銳精臨倣結體遒麗遂以書名天下五絶虞世南帝每稱其五絶五曰書翰寫列女傳於屏風世南始學書于浮屠智永究其法為世秘愛帝嘗命寫列女傳於屏風蕭祐精書畫精畫及書自鍾王蕭張以來皆能識其真韋温傳臨飛白書晉陽公主臨飛白書下不能辨有楷灋韋渉書有楷灋楊師道善草𨽻前有虞禇後有薛魏魏徴子叔瑜善草𨽻以筆意傳其子華及甥薛唐世稱善書者前有虞禇後有薛魏劉昇善草𨽻鸞鳳冲霄必假羽翼股肱之寄要在忠力馬周帝嘗以飛白賜周曰鸞鳳冲霄必假羽翼股肱之寄要在忠力書兼草𨽻房元齡為飛帛書賜侍臣戴至德髙宗嘗為飛帛書賜侍臣賜至德曰汎洪源俟舟楫郝處俊曰飛九霄假六翮李敬𤣥曰資啓沃罄丹誠崔知悌曰竭忠節贊皇猷皆見意於辭云王魏齊名王方翼善書與魏叔琬齊名八分書張廷珪善八分書寳章集王方慶后嘗就求羲之書方慶集奏十世從祖羲之書四十餘番太宗求之先臣悉上送今所存惟一軸并上十一世祖導十世祖洽九世祖珣八世祖曇首七世祖僧綽六世祖仲寳五世祖騫髙祖規曾祖褒并九世從祖獻之等凡二十八人書共十篇后御武成殿徧示羣臣詔中書舎人崔融序其閥閲號寳章集以善書直鳳閣鍾紹京虔州贛人初為司農録事以善書直鳳閣武后時署諸宫殿明堂及銘九鼎皆其筆也嗜書紹京嗜書畫如王羲之獻之禇遂良真跡藏家者至數十百卷若五朶雲韋陟常以五彩牋為書記使侍妾主之其裁答受意而已皆有禇法陟唯署名乃自謂所書陟字若五朶雲時人慕之號郇公五雲體大小篆盧藏用工草𨽻大小篆八分入神入妙入能張芝書謂之亞聖張旭草入神八分入妙𨽻入能書訣宿索靖碑傍歐陽詢行見索靖所書碑駐觀良乆而去行數百歩復還下馬立觀疲倦即坐因宿其傍三日而後啓行欣然若有所得劉公嘉話蘭亭武德中歐陽詢就越詐求之始秦王府麻道崇奉教搨二本一送辨才一王自收道崇私搨一本於時天下草創秦王雖總戎蘭亭不離肘後及即位學之不倦正觀二十二年禇遂良謂入昭陵但得其模本爾南部新書細㸔亦未能好李邕嘗不許蕭誠書誠乃詐作古帖令紙故暗持示邕曰此乃右軍真跡如何邕㸔稱善誠以實告之復取示之曰細㸔亦未能好伏苓芝法書唐李邕善書仍自刻多假立刻字人名如伏苓芝黄仙苑鶴之類是也不能定筆不可論書韓滉書得張旭筆法常自言不能定筆不可論書有古灋袁滋工篆𨽻有古灋筆力遒婉顔真卿善工草書筆力遒婉世寳傳之圉師愛書許圉師龍朔中為左相髙宗自書詔賜遼東諸將謂許敬宗曰圉師愛書可示之栁氏自備録栁仲郢掌手抄六經司馬遷班固范曄史皆一抄魏晉及南北朝史再又類所抄它書凡三十篇號栁氏自備録旁録仙佛書甚衆皆楷小真精無行草盧知猷善書有楷法沈傳師工書有楷法字徑五寸栁公權文宗嘗召與聨句曰人皆苦炎熱我愛夏日長命題於殿壁字率徑五寸帝歎曰鍾王無以尚也宣宗召至御座前書紙三番作真行草三體帝竒祕賜以器幣且詔自書謝章無限真行當時大臣家碑誌非其筆人以子孫為不孝外夷入貢者皆别署貨具曰此賻格書嘗書京兆西明寺金剛經有鍾王歐虞禇陸諸家法自為得意書楷遒媚裴休書楷遒媚有體法翰藻沈鬱李百藥怒猊抉石渴驥犇泉徐浩始浩父嶠之善書以法授浩益工嘗書四十二幅屏八體皆備草𨽻尤工世狀其法曰怒猊抉石渴驥犇泉藻翰豪邁趙博宜佛廟見筆蹟栁公權李聽表為掌書記因入奏穆宗曰朕嘗於佛廟見卿筆蹟思之乆矣即拜侍書學士以三體寫老子司馬承禎善篆𨽻帝命以三體寫老子白正文句蕭齋李肇國史補梁武造寺命蕭子雲飛白大書蕭字李約見之竭産買歸東洛建小室以玩之號曰蕭齋墨池飛出北溟魚李白草書歌墨池飛出北溟魚筆鋒殺盡山中兎二行數字大如斗怳怳如聞神鬼驚時時只見龍蛇走左盤右蹙如驚電狀同漢楚相攻戰湖南七郡凢㡬家家家屏障書題徧王逸少張伯英古來㡬許浪得名同上詩體備鸞皇思含珠玉元稹進詩狀既仰蜀龍之光難逞聚螢之照同上字向紙上皆軒昂韓愈送盤谷子詩開緘忽覩送歸作字向紙上皆軒昻為時絶筆唐史韋昇卿渉學工書於八分尤工歴廣州都督書東封朝覲碑為時絶筆善書與髙祖書相雜而人不辨也髙祖太穆皇后竇氏紙纔十數字世以為寳賀知章善草𨽻好事者具筆硯從之意有所惬不復拒然紙纔十數字世以為寶髙麗遣使求歐陽詢初倣王羲之書後險勁過之因自名其體尺牘所傳人以為法髙麗嘗遣使求之帝歎曰彼觀其書固謂形貌魁梧耶大小歐陽體歐陽通蚤孤母徐教之以父書懼其墮乃遺錢使市父遺跡通乃刻意臨倣以求售數年書亞於詢父子齊名號大小歐陽體禇遂良亦以書自名嘗問虞世南曰吾書如何智永帝甞以絹素詔寫文選裴行儉工草𨽻名家帝甞以絹素詔寫文選祕愛其法賚物良厚行儉每曰禇遂良非精筆佳墨未甞輙書不擇筆墨而妍㨗者予與世南明所撰選譜草字雜體數萬言水墨積習王紹宗工草𨽻甞與人書曰鄙夫書無工者特由水墨之積習耳甞精心率意虛神静思以取之呉中陸大夫常以余比虞君以不臨寫故也聞虞被中畫腹與余正同虞即世南也羲之北面杜審言甞語人曰吾筆當使羲之北面其矜誕類此工草𨽻王維柿葉𨽻書鄭虔好書常苦無紙於是慈恩寺貯柿葉數屋遂徃日取柿葉𨽻書嵗乆乃遍寫四部羣書崔行功初太宗命祕書監魏徴寫四部羣書將藏内府置讎正二十員書工八員徴徙他職又詔虞世南顔師古踵領功不就顕慶中罷讎正二十員得父一絶宋令文工書子之愻精草𨽻世謂得父一絶連錦吕向工草𨽻能一筆環寫百字若縈髪然世號連錦書張顛張旭每大醉乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼為張顛初仕為常熟尉有老人陳牒求判宿昔又來旭怒其煩責之老人曰觀公筆竒妙欲以藏家爾旭因問所藏盡出其父書旭視之天下竒筆也自是盡其法旭自言始見公主擔夫争道又聞鼓吹而得筆法意觀倡公孫舞劎器得其神後人論書歐虞禇陸皆有異論至旭無非短者傳其法者崔貌顔真卿云鍾王筆迹五代温韜為静勝軍節度使在鎮十年唐諸陵在其境内者悉發掘之而昭陵最固韜從埏道下見宫室制度閎麗不異人間中為正寢東西兩廂列石床床上石函中為鐵匣悉藏前世圖書鍾王筆迹紙墨如新韜悉取之遂傳人間書換銅硯字錦曰有人收得虞世南與圓機書一紙剪開二字賣之至礬鄉一字得麻一斗口一字得銅硯一枚房材一字得芋千頭隨人好之淺深錦様書栁公權以隔風紗作龍城記及八朝名品號錦様書上方御剪刀麫月兒羮命分賜羲之鬼胡尹書冠當時人謂其有羲之鬼鸞翔鳳翥年深豈免有缺劃快劎斫斷生蛟鼉鸞翔鳳翥衆仙下珊瑚碧樹交枝柯金繩鐵索鏁紉壯古鼎躍水龍騰梭韓退之石鼓歌名金剪書司馬承正工篆别為一體名金剪書續神仙傳走馬書建中初有河北軍將姓夏能走馬書一紙出酉陽雜俎得歐虞林鼎能書得歐虞法呉越備史垂露資仰㸔垂露資不崩亦不騫杜觀書畫蛟龍岌相纒鬱鬱三大字蛟龍岌相纒同上觀書畫書入金牓懸同上他日辱銀鈎森然見矛㦸鄭典設一字直百金八分一字直百金蛟龍盤拏肉屈强李潮歌親灑仙毫特䊸睿思親灑仙毫劉禹錫謝手詔表初喜麗天之象逺燭輝光旋驚垂露之蹤曲覃霈澤同上鸞鳳騫翔而變態煙雲舒卷以呈姿同上神物所窺必當奪璧於中流飛鋩於烈火文粹司空圖書屏記神物所窺必當奪璧於中流飛鋩於烈火也殆非子孫之所可存耳今荆璧為璽飛上天矣文粹舒元輿玉筋篆志求秦丞相真跡聞有八字刻在荆玉有洪碑樹嶧山巔今荆璧為璽飛上天矣洪碑留在人間徃徃有好事者躋巔得見異日將褁足觀之蟲蝕鳥歩同上客有得陽氷真跡遺六幅素上者請歸客堂張之見蟲蝕鳥歩痕跡若屈鐵石䧟入屋璧霜畫昭著疑龍蛇駭解鱗甲活動煙顔塵容侵暴日乆同上試以手拂拭其煙顔塵容侵暴日乆攝芻坼裂玉筋欲折予讓其主主曰易致耳金生玉潤禇遂良書字裏金生行間玉潤出書訣墨藪妙中更妙虞世南書體段遒媚舉止不凢能中更能妙中更妙筆虎法書苑竇泉謂李陽氷篆為筆虎孔壁遺文汲冢舊簡李陽氷論古篆玉書二千六百紙尚書故實太宗有大玉書二千六百紙皆以丈二尺為軸獨蘭亭用玉匣貯之後並藏於昭陵印泥畫沙張長史曰禇河南論書云用筆如印泥畫沙始不悟後於江岸見沙地平遂以錐畫字媚好可愛始信長史之言貴藏鋒也書訣墨藪璧坼路魯公與懷素同學草書於鄔兵曹或問曰張長史見公孫大娘舞劎噐得低昻回翔之狀兵曹有之乎懷素以古釵脚對魯公曰何如屋漏痕懷素抱魯公唱賊復問師何所得曰觀夏雲多竒峯及璧坼路常師之法書苑戈灋逼真唐太宗學虞世南𨽻書每難於戈法一日書遇戬字召世南補寫其戈以示魏公公曰仰窺聖作内戩字戈灋逼真帝於是賞鄭公鑒字之精同上况潮小篆逼秦相快劒長㦸森相向李潮八分歌杜甫書依字輙去人韋綬太子書依字輙去人曰上以此可天下事烏得全書耶綬白之帝喜即賜綬錦綵可喜可愕一寓於書韓文天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世夢吞丹篆龍城録退之常說少時夢人與吞丹篆後胷中如物噎能記其上一兩字筆勢非人間書也圖畫五白畫工繢事後素彰施書曰以五彩彰施於五色作服汝明作繪書作繪宗彛者會五彩以作畫也宗彛宗廟彛噐畫為文章也若五彩之相宣文賦云受采禮白受采遁形物無遁形手擇筆精心匠天真指趣五色之章目不别五色之章為昩儀形比象丹青挫於筆端目想心存設色周禮設色之工謂之畫畫繪之事周禮凢畫繢事雜五色後素功注云素白采是也五色成文而不亂禮藝成而下予欲觀古人之象日月星辰山龍華蟲畫此八物於衣服五色比象昭其文也謂車服也三辰旂旗昭其明也三辰日月星辰也善惡家語孔子觀於明堂有堯舜桀紂之象各有善惡之狀廢興之禮也功勲漢畫功臣於麒麟閣葉公好龍居室皆雕畫以寫龍於是天龍聞之而下葉公驚走乃知所好非真龍畫虎馬援戒兄子曰學杜季梁不成猶畫虎不成反類狗也畫堂漢太子生於甲觀畫堂寫真晋顧愷之畫殷仲堪仲堪有目疾乃明㸃瞳子飛白拂上曰如輕雲蔽月愷之字長康為虵畫足誤㸃成蠅曹不興誤㸃屏風因就畫為蠅孫權謂是真以手弹之峻宇雕牆書臧文仲山節藻梲何如其知畫梲為藻文畫犬馬者難為巧圖鬼神者易為功韓非云圖裴楷顧愷之圖裴楷頰上加二毛覺神明殊勝誤筆成牛王獻之善丹青桓温使畫扇筆誤落因畫為駮㹀牛甚妙䑛筆和墨莊子言畫設色之工五周禮畫人顧愷之每畫人成或數年不㸃睛人問之答曰四體妍蚩本無闗於妙處傳神寫照正在阿睹中擬諸形容象其物宜象生於意容止可觀進退可度則而象之孔畫思入神王維善畫名盛於開元天寳間豪英貴人虛左以迎畫思入神至山水平逺雲勢石色繪工以謂天機所到學者不及也按樂圖客有以按樂圖示者無題識維徐曰此霓裳第三疊最初拍也客未然引工按曲乃信鄭虔三絶鄭虔善圖山水嘗自寫其詩并書以獻帝大署其尾曰鄭虔三絶繪齋壁安禄山反偽授䖍水部郎中因稱風緩賊平與張通儒王維並囚宣陽里三人皆善畫崔圓使繪齋壁虔等方悸死即極思祈解於圓卒免死絶品薛稷畫又絶品馳譽丹青閻立本初太宗與侍臣泛舟苑池見異鳥容與波上恱之召立本侔狀閣外傳呼畫師閻立本是時已為主爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰謹無習後為相時人有右相馳譽丹青之嘲聚畫惠文太子範聚書畫皆世所珍者自晦韓滉畫與宗人幹相埒以非急務故自晦不傳於人聚畫侔祕府張宏靖家聚畫侔祕府圖像舊臣之次李晟他日與馬燧見延英帝嘉其勲下詔各圖其像於舊臣之次圖狀李聽吐突承璀討王承宗以聽為神䇿行營兵馬使既戰斬賊驍將憲宗壯之詔圖狀以獻畫像便殿王起帝題詩太子笏以賜詔畫像便殿號當世仲尼棄畫於道王涯家書多與祕府侔前世名書畫甞以厚貨鈎致或私以宫鑿垣納之重複秘固若不可窺者至敗為人破垣剔取奩軸金玉而棄其書畫於道李德裕徙劔南西川乃建籌邉樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋運逺邇曲折咸具乃召習邊事者與之指畫商訂凡虜之情偽盡知之方域圖及教飛騎陣圖吕才帝又詔造方域圖及教飛騎陣圖屢稱旨摭古聨德髙蹈者圖像李渤隱廬山摭古聨德髙蹈者以楚接輿老萊子黔婁先生於陵子王仲豫梁鴻六人圖像賛其行因以自儆九老圖白居易甞與胡杲吉􅌈鄭據劉真張渾狄兼謨盧貞燕集皆髙年不事者人慕之繪為九老圖職方觀圖韋執誼始未顯時不喜人言嶺南州縣既為郎嘗詣職方觀圖至嶺南輙瞑目命左右徹去及為相所坐堂有圖不就省既易旬試觀之乃崔州圖也以為不祥惡之果貶死圖唐興節士文人司空圖作亭觀素室悉圖唐興節士文人善圖山水張志和善圖山水酒酣或擊鼓吹笛䑛筆輒成王會圖東謝蠻其酋元深入朝冠烏熊皮履若注旄以金銀絡額披毛帔韋皮行縢著履中書侍郎顔師古因是上言昔周武王時逺國入朝太史次為王會篇今蠻夷入朝如元深冠服不同可寫為王會圖觀繪圖安禄山反范陽先三日合大將置酒觀繪圖起燕至洛山川險易攻守悉具多納秘畫錢徽入拜禮部侍郎宰相段文昌以所善楊渾之學士李紳以周漢賔並諉徽求致第籍渾之者慿子也多納古帖秘畫於文昌皆世所寳立廟像四垣圖戰陣狀突厥闕特勒死帝為立廟像四垣圖戰陣狀詔髙手工六人徃繪寫稍肖其國以為未甞有黙棘連視之必悲哽圖形禁中陸堅帝待之甚厚圖形禁中親製賛李將軍山水宗室思訓善畫世所謂李將軍山水者異本王方慶圖畫多異本多藏古圖畫顔師古多藏古圖畫亦性所篤愛山水圖崔植曰𤣥宗即位宋璟甞手寫無逸為圖以獻其後朽暗乃代以山水圖稍怠於勤𤣥元五聖唐名畫録呉道𤣥畫𤣥元五聖千官宫殿冠冕勢傾雲龍心若造化故杜甫詩云森羅廻地軸妙絶動宫墻粉本唐名畫録𤣥宗天寳中忽思蜀嘉陵江水遂假呉生驛逓令徃寫貌及廻帝問奏云臣無粉本並記在心遣於大同殿圖之嘉陵江山水一日而就時有李將軍山水擅名亦畫大同殿數月方畢上曰李思訓數月之功呉道𤣥一日之跡皆極其妙也通神佳手天寳中𤣥宗召思訓畫大同殿壁兼掩障異日因對上云卿所畫掩障夜聞水聲真通神之佳手也畫龍道𤣥畫殿内五龍鱗甲飛動每欲大雨即生煙霧鸞手校尉方鎮編年曰錢鏐鎮呉越待賢渴士使名畫工二三十人在㳂江號鸞手校尉伺北方士子流移來者咸寫貌以聞擇清修或有福禄者用之胡岳渡江畫工以貌奏鏐嘆曰面有銀光竒士也即召見釡中龍南唐時有蒼頭持龍水圖求貨或得之將練以為服忽釡中霧起蒸見二龍騰躍穿壁而去畫該毫末備得精神唐東蠻王入朝顔師古奏昔武王時逺國歸欵周史集為王㑹篇今卉服鳥章備集蠻邸宜圖其事貽於後命閻立本畫之莫不畫該毫末備得精神顧子畫山色大厯中呉子顧子畫山水甚竒怪先布絹於地研調采色使數人吹角擊鼓噉呌顧子着錦錦纒頭飲酒半醉取墨汁瀉絹上次寫諸色以大筆開决為峯巒島嶼之狀曲盡其妙也豈但祁岳與鄭䖍筆迹逺過楊契丹杜甫奉先劉少府新畫山水障歌丹粉多狀唐文粹李庾東都上陽别宫丹粉多狀石橋圖唐酉陽雜俎云李涿性好古常於保壽寺庫得舊圖裝治以示栁公權乃張萱所畫石橋圖也後數日仇士良至以勑取去意出塵外恠生筆端王維畫輞川圖山谷鬱盤雲水飛動意出塵外恠生筆端自題詩云夙世繆詞客前身應畫師出朱景𤣥畫斷通靈畫有人牽馬訪馬毉稱患脚醫曰大似韓幹所畫者忽值幹幹曰真是吾設色者歸視所畫馬脚有一㸃墨缺方知是畫通靈矣雜爼傳神寫照呉道𤣥傳神寫照如欲笑言出開元記三百縑易清夜圖清夜遊西園圖顧愷之畫唐張周封得之一日凌晨有賫三百縑叩門問曰仇太尉欲此圖與之乃詐也尚書故實名下無虛士閻立本善畫至荆州見張僧繇舊迹曰定虚得其名耳明日又徃曰猶是近代佳手明日又徃嘆曰名下無虛士坐卧觀之留宿其下十餘日方去劉禹錫嘉話應手生枝張藻畫松云應手生枝則潤如春澤也畫斷王墨王伶善潑墨凡作圖障先以墨潑脚就手捫隨成物像皆妙絶故謂王墨畫斷舞劔助畫呉道𤣥善畫將軍裴旻請畫天宫寺壁道𤣥曰聞將軍善舞劔願作氣以助揮毫旻欣然為舞一曲道𤣥㸔畢奮筆立成若有神助明皇雜録軟畫酉陽雜爼寺塔記韓幹藍田人少時常為酒貰家送酒王維兄弟未遇每貰酒幹常徴債戯畫地為人馬維精思丹青竒其意乃與錢二萬令軟畫十餘年今寳應寺釋梵天女齊公妓等寫真也色訣周長史偏得色訣常理采色於霤下旋取飛用意匠詔謂將軍拂絹素意匠慘淡經營中杜甫丹青引揮西方變薛稷畫又揮西方變發地抉屋椽慘淡壁飛動到今色未填畫藏青蓮界同上用志不分與古争品杜牧行張㓜彰待詔制鴻都奏技工於丹青用志不分與古争品執馭六白五御周禮六藝四曰五御謂鳴和鸞逐水曲過通表舞交衢逐禽左執御子曰吾何執執御乎執射乎吾執御矣六轡如濡執轡如組車馬之容周禮六儀六曰車馬之容注容謂翼翼然規行矩步造父堯之善御者載馳載驅既佶且閑既閑且馳服習如志傳古之大事必乗其産安其教訓而服習其道唯所納之無不如志人馬相得銜轡之制法言曰夫騏驥古之良馬然而前有衘蹶之制後有鞭笞之威加之以御然後能一日而致千里當代豈無騏驥誠莫之能善御見執轡者非其人遂足跳而逺去楚辭終嵗御而衣祍不敝祍裳也謂輈之利御者不勞也終日馳騁左右不揵揵音蹇謂倦也行數千里馬不契需注契需謂傷倦也御者不盡馬之情史記云執技以事上射御也禮君車將駕則僕執䇿僕御也展軨視車之具效駕白已駕執䇿分轡驅之五歩而立謂調試也并轡授綏敬君也進退有度徐疾不愆學傳驂乗業擅訓馭逐水鳴鸞見上注夫子之執吾執御矣朽索之馭六馬人謀馬謀輈人進則與馬謀退則與人謀注云相應也終嵗馭而衣祍不敝此輈之利也逸馬家語顔回曰造父無逸馬東方畢之馭馬力盡矣而猶求馬不已馬窮必逸也經霜雪無跡淮南子太丙之御經霜雪無跡善行無轍跡老子尹儒夢秋駕莊子注云秋駕法駕也見七命注中餘轍餘地列子造父師秦豆豆曰汝先觀吾趣趣行也乃立木為塗僅可容足計歩而置之趣走徃還無跌失三日盡其巧豆歎曰得矣於是應之於心揖於衘轡之間緩急乎唇吻之和正度乎胷臆之中執節乎掌握之間内得其中外合馬志輿輪之外可使無餘轍馬蹄之外可使無餘地夷險視之一也馬志文子治人之道如造父之御内得其心外合馬志也範我驅馳詭遇孟子曰趙簡子使王良與嬖奚御王良辭吾為之範我驅馳終日而不獲一為詭遇一朝而得十範法也謂以法式為御故不獲禽詭譎也不依御故苟得矣傷吻敝䇿王褒論曰庸人御駑馬傷吻敝䇿而不進及駕嚙膝叅乗且王良執韓哀附輿馳騁忽如景靡過都越國􅀈若歴塊追犇電逐遺風萬里一息人馬相得馬驚敗績魯莊公與宋人戰縣賁父御卜國為右馬驚敗績縣賁父曰他日不敗績而今敗績是無勇也遂死之田獵射御慣則能獲禽若未甞登車射御則敗績壓覆是懼傳御非其馬之正汝不恭命書六轡沃若牽旁塵不出軌并轡張侯御郤子郤子病張侯乃左并轡右援桴而鼓使訓羣騶知禮晉程鄭為乗馬御六騶屬焉驂絓而止傳驂廹州綽右驂廹還本門中車軌塵馬候蹄御者不失其馳糓梁弭轡弭歛也廻軫乗君子之器廻長者之車王良叱之於劔閣造父及之於崑崙掉鞅而還伯樂有致師之勇數馬而對石慶懷審惟之情以合人心將調馬性霍光為宣帝驂乗上若背負芒刺張安世驂乗上乃安霍氏之禍起於驂乗叔良御忌抑罄控忌騁馬曰罄正馬曰控孔為帝御齊映授御史中丞從幸梁道險澁常為帝御㑹馬駭躍帝恐傷映詔捨轡固不去曰馬奔踶不過傷臣捨之或犯清蹕雖死不償帝嘉歎與力士對執轡李輔國㑹帝屬疾輔國即詐言皇帝謂太上皇按行宫中至睿武門射生官五百遮道太上皇驚㡬墜馬問何為者輔國以甲騎數十馳奏曰陛下以興慶宫湫陋奉迎乗輿還宫中力士厲聲曰五十年太平天子輔國欲何事叱使下馬輔國失轡罵力士曰翁不解事斬一從者力士呼曰太上皇問將士各好在否將士納刀呼萬嵗皆再拜力士復曰輔國可御太上皇馬輔國鞾而走與力士對執轡還西内授轡䇿𤣥宗貴妃楊氏每從游幸乗馬則力士授轡䇿為懷義御馬武三思薛二張方烝蠱三思痛屈節為懷義御馬醫七白良醫傳曰三折肱知為良醫也醫不三代不服其藥秦醫醫和醫緩三折見上十全周禮醫師十全為上十失二次之十失四為下九折楚辭九折臂而成藝藝成而下技以事上業在其中巫咸之術不可救療傳秦緩秦和俞跗華佗扁鵲並良醫折肱之醫苦口之醫疾醫掌養萬人之醫病掌日臻之病得失殊輪稽終嵗之功上下異食聚毒之功上池之術史扁鵲飲上池之水可以見五藏疾既入於骨髓扁鵲見桓侯曰君有疾在皮膚針灸可及後數日在腠理湯藥可及後見桓侯而反走曰疾在骨髓針灸湯藥皆不及也數日桓侯病召扁鵲鵲已逃公乃卒藥不至於膏肓秦使醫緩視晉侯疾曰肓之上膏之下攻之不可逹針之不可及藥不至焉不可為也南人有言曰人而無恒不可以作巫醫遺類子胥曰使醫徐疾而曰必有遺類焉未之有也四難後漢郭玉云療貴人有四難焉自任不用臣言一難將身不謹二難骨節不僵三難好逸惡勞四難浣膓扁鵲曰上古俞跗療病不以湯液乃割皮解䏎浣膓胃滌洗五藏也刮骨蜀闗羽為流矢所貫醫曰矢鏃有毒入骨乃破臂刮骨去毒飲啖自若烹文摯齊威王有疾良醫文摯曰令王大怒則愈乃誤王大怒將烹文摯罵賜漢髙祖疾甚吕后迎醫醫曰可治上罵曰命乃在天雖扁鵲何益不使治賜金十斤不可為也晉侯求醫於秦秦伯使醫和視之曰疾病不可為也是為近女色疾如蠱惑以䘮志也以制其食周禮醫師掌醫之政令凡有疾病者分而治之嵗終則稽其醫事以制其食注食禄也食醫掌和王之六食六飲六膳百羞百醬八珍之齊聚毒醫師掌醫之政令聚毒以供醫事凡疾病死傷者造焉瘍醫凡療瘍以五毒攻之視生死視醫掌養萬人之疾以五味五藥五穀養其疾以五氣五聲五色視其生死也朱雲不呼醫飲藥華佗字元化破腹取病病若結積針藥不及者令飲麻沸酒至醉困破腹取病之在腹胃中者後煎洗縫以膏摩五日而瘥病同療異倪尋李延俱病頭痛身熱華佗獨令延發汗或問之佗曰尋外實延内實各與藥飲明旦俱起怒郡守病佗曰以盛怒乃瘥乃多取貨而不加功又棄去留書罵之太守怒令追殺之不得嗔恚吐血數斗而愈誤中肝徐毅得病謂華佗曰昨日使醫曹吏劉祖針胃脘便苦夜卧不安佗曰誤中肝也五日不救後果然服藥過顔含字𢎞都兄畿得疾死於醫家家人迎䘮旐每繞樹不可解引䘮者顛仆稱畿曰我未當死服藥多而傷五藏也潰痤䑛痔莊子秦王破癕潰痤得車一乗䑛痔者得車五乗所治愈下得車愈多良醫庸醫何氣候之將衰而致養之有失通五味五糓之資必順其志參九藏九竅之變無逆於時精為神本形於壽期門擅桐君之術家傳葛氏之方藥不至焉三世之功何益疾可為也十旬之卧有瘳華佗臨死出一卷方與獄吏曰可以活人吏畏法不敢取受佗索火燒之孔未嘗問醫傅奕病未甞問醫號外臺袐要王燾母有疾彌年不廢帶視湯劑數從髙醫游遂窮其術因以所學作書號外臺秘要上醫使者視䕶馬周病消渴帝詔上醫使者視䕶躬為調藥䕶醫騎相望讓皇憲有疾䕶醫將膳騎相望也求活李勣疾家欲呼醫不許輒曰我山東田夫耳位三公年踰八十非命乎生死係天寧可更求活耶就第醫候杜如晦疾詔給常俸就第醫候之疾不呼醫蕭瑀感末疾不呼醫曰天若假吾餘年因得為循階矣節宣乖度有資於醫穆宗雖誅栁泌而後稍惑方士布衣張臯者上䟽曰夫寒暑為賊節宣乖度有資於醫尚當重謹故禮稱醫不三世不服其藥庶士猶爾况天子乎授醫杜鴻漸父鵬舉與盧藏用隱白鹿山以母疾與崔沔同授醫蘭陵蕭亮遂窮其術砭頭則天皇后武氏帝頭眩不能視侍醫張文仲秦鳴鶴曰風上逆砭頭血可愈后内幸帝殆得自專怒曰是可斬帝體寧刺血處耶醫頓首請命帝曰醫議疾烏可罪且吾眩不可堪聽為之醫一再刺帝曰吾目明矣言未畢后簾中再拜謝曰天賜我師身負繒寳以賜方書李聽好方書擇其驗者題於帷帟墻屋至滿賜醫方辜隆擇為户部尚書乆之移疾帝手䟽醫方賜之本色官栁仲郢領塩鐵轉運使有劉習者以藥術進詔署鐵官仲郢以謂醫有本色官若委錢榖名分不正帝悟醫術侍亮元裕進中書舎人鄭注入翰林元裕當書命乃言以醫術侍注魏感求生孔緯病家人召醫視緯曰天下方亂何乆求生不肯服藥卒自料醫劑李逢吉父顔有痼疾逢吉自料醫劑遂通方書送詔獄劉瞻同平章事同昌公主薨帝捕太醫韓京紹等送詔獄逮繫者凡數百人瞻喻諫官皆依違無敢言即自上䟽固争京紹窮其術不能效情有可矜陛下徇愛女累平民忿不顧難取肆暴不明之謗帝大怒即日賜罷開腦西域拂菻有善醫者能開腦出蠱以愈目眚不迎李夷簡病不迎醫為今古集驗方陸贄既放荒逺地苦瘴癘贄為今古集驗方五十篇示鄉人云門不内醫呉湊屬病門不内醫帝知之詔侍醫敦進湯劑不獲已一飲之卒善治奚陟貞元十五年病癰帝遣醫療視敕曰陟賢臣為我善治之人子不可不知醫王勃甞謂人子不可不知醫時長安曹元有祕術勃從之游盡得其要濟夭死韓愈原道篇為之醫藥以濟其夭死察脉病否又雜説善醫又者不視人之肥瘠察其脉之病否而已矣善計天下者不視天下之安危察其紀綱理亂而已矣心腹懣煩甄立言有道人心腹懣煩彌二嵗診曰腹有蠱誤食髪而然令餌雄黄一劑少選吐一蛇如拇無目燒之有髪氣乃愈多其物以幸有功許允宗或勸其著書貽後世者答曰醫特意耳思慮精則得之脉之候幽而難明吾意所解口莫能宣也古之上醫要在視脉病乃可識病與藥值唯用一物攻之氣純而愈速今之人不善為脉以情度病多其物以幸有功譬獵不知兎廣絡原野兾一人獲之術亦踈矣一藥偶得它味相制弗能專力此難愈之驗也脉之妙處不可傳虛著方劑終無益於世此吾所以不著書也脉經針方甄權所撰脉經針方明堂等圖傳於時醫之上者理於未然栁公綽太醫箴曰醫之上者理於未然鍼肩隅甄權魯州刺史厙狄嶔風痺不得挽弓權使彀矢嚮堋鍼其肩隅一進曰可以射矣果如言賜御餌禁方李吉甫帝賜御餌禁方上醫療未萌之兆栁宗元愈膏肓疾賦上醫療未萌之兆目定死生心存取捨同上俱收並蓄待用無遺玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也進學解厲者造焉而美肥輒者造焉而善馳今我里有方士淪跡於醫矧常病也劉禹錫鑒藥善治病者不使至危憊劉晏對脉唐宫中以診脉為對脉大中遺事宣洩頥養古之治劇病宣洩頥養白孔六帖卷三十二
