body:
  text: 卷第四十五白防姦閑邪國章斯抵人命所懸禁暴竹刑三尺有常無赦速即爾刑干國之紀刑以秋冬刑威踰閑閑法也能刑君子謂晉文公其能刑矣三罪而人大服以類震耀為刑罰威獄使人畏忌以類其震耀殺戮取象雷電威也刑法志申嚴百刑凡制五刑必即天論制斷也必即天論言與天意合一成而不可變變改也防淫記君子刑以防淫大為之防人猶踰之而煩刑書傳明啟刑書丹筆正刑之筆明慎易曰君子以明慎用刑而不留獄明罰敕法玉律刑一人史堯刑一人而天下大服四罪舜四罪而天下咸服協大中之法刑用中罰列明也中罰法之輕重得中也書嚴斷刑罰以威其淫勿宥勿辟書殷人在辟予曰辟汝惟勿宥予曰宥爾惟勿辟惟厥中祥刑祥善也書閱實罪罰相當下刑適重上服服罪也一人有二罪則從重也官刑制官刑儆于有位其附于刑附麗也周禮麗刑麗罹也中典周禮國章刑麗法周禮官禁國禁踰矩矩法也惟刑之恤刑期無刑義刑屏棄典刑教中周禮司徒刑以教中則人不虣在九刑不忘傳季孫行父逐莒僕三罪而人服晉文公能刑將刑為之不舉不舉則徹樂刑之頗類獄之放紛人在鼎矣趙鞅鑄刑鼎蓍范宣子所為刑書焉仲尼曰人在鼎矣何以尊法謂棄禮征書也御宄以刑御姦以德僕區之法楚文王作無自立辟詩人之多僻無自立辟法也觸法抵禁書律令一定作法於涼其敝猶貪涼薄也刑法所以助治劉向上疏教化所恃以為治也刑法所以助治也正經三百孔父創其威儀大法三千蕭何設其條貫非日非月照四海而齊明如電如霜肅八方而交泰輕犯憲章不遵禮教孔嚴威柳宗元簡于厥刑不殘而威是謂嚴威刑輕以清我完靡傷貽我子孫百代是康同上刑賞國大事太平公主私長安浮屠慧範御史魏傳弓劾其姦贓四十萬請論死中宗欲赦進曰刑賞國大事陛下賞巳妄加矣矣又欲廢刑天下其謂何禁亂陳子昂八科一揩刑謂以禁亂亂靜而刑息不為承平設也魏徵曰刑賞之本在乎勸善而懲惡帝王所與天下畫一不以親疏貴賤而輕重者也今之刑賞或由喜怒或出好惡喜則矜刑於法中怒則求罪於律外好則鑽皮出羽惡則洗垢索瘢蓋刑濫則小人道長賞謬則君子道消小人之惡不懲君子之善不勸而望治安刑措非所聞也且暇豫而言皆敦尚黃老至於威怒則專法申韓故道德之旨未弘而鍥薄之風先搖昔州犁上下其手而楚法以敝張湯輕重其心而漢刑以謬況人主而自高下乎褻刑陸贄字敬輿奏輕爵褻刑衰亂之漸也刑罰清則人安劉蕡字去華策曰爭競息則刑罰清刑罰清則人安朱敬則諫初武后稱制天下頗流言遂開告密羅織之路興大獄誅將相大臣至是已革命事益密敬則諫自文明以來天地草昧內則流言外則構難故不設鉤距無以順人不切刑罰無以息暴於是置神器開告端故能不出房闥而天下晏然易主矣罰者刑之本魏元忠上封事罰者刑之本刑正故君子勖其心罰重則小人懲其過賞罰者軍國之紀綱故教之藥石刑罰不濫則人壽盧藏用字子潛云古為政者刑罰不濫則人壽以鋤彊梗韓愈原道篇為之刑以鋤其彊梗刑名之家文粹朱敬則諫除濫刑疏李斯之相秦也行申商之法重刑名之家摧姦息暴文粹朱敬則諫除濫刑疏不切刑名不可摧姦息暴為不善者不越月踰時而得其罰柳宗元斷刑論必使為不善者不越月踰時而得其罰則人懼而有懲焉懲之以黜遠鞭撲梏拲斬殺之慘同上守道論繁其刑則是多其網羅欲人之不入也省其刑是卑其牆垣欲人之不踰也故曰繁與省不足道焉裴垍制策州犁上下其手楚國之法遂差張湯輕重其心漢朝之刑以弊人臣之頗僻猶不能申其欺罔況人君之高下將何以措其手足乎魏徵罰務速而後有懲柳宗元斷刑論高祖太宗除隋虐亂治以寬平民樂其安重於犯法致治之美幾乎三代之盛時考其推心測物其可謂仁矣自高宗武后以來毒流邦家祚絕而復續玄宗初勵精為政二十年間刑獄減省歲斷死罪纔五十八人以此見致治雖難勉之則易未有為而不至者唐刑法志周有亂政而作九刑傅奕上言夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑衛鞅為秦製法增鑿顛抽脅鑊烹等六篇始皇為挾書律此失於煩不可不監也白制事典為之律度趙宣子為國政徙木史商鞅令既具未布乃立三尺木於市南門募人有徙置北門者與十金人怪莫敢徙復令曰能徙與五十金有一人徙之輒與五十金以明不欺其法憲令史楚懷王使屈平造憲令稿草未定上官大夫欲見奪之不與乃讒曰平為令眾莫不知王怒疏平捃摭漢蕭何捃摭法令宜於令者作律乃著令不循三尺客謂杜財曰君為天下訣平不循三尺法注三尺以竹簡寫法律也專以人主意指為獄獄固如是乎周曰三尺安出哉前王所定著為律後王所定疏為令令甲宣紀曰令甲死者不可復生刑者不可復息注息生長也甲令第一乙令第二吳芮著乎甲令而稱忠甲者令之篇次深文張湯與趙禹共定律令務深文拘定職之吏注拘刻也定令趙禹張湯威福後漢崔寔曰威福人主之神器定典法順帝使僕射宋登定典法步過六尺棄灰於道被刑新序商君法也不宜兩端魏盧毓上論古今科律法宜一正不宜兩端使姦吏得容情科律劉邵定科律作新令十八篇蜀科蜀志伊籍與諸葛劉巴李嚴共定蜀科先甲三日先庚三日慎乃出令令出惟行不惟反挈令挈音契獄訟之要漢書執禁以齊眾禁網疏闊禁止奸邪漢書經邦之道撫事攸先庇俗訓人防奸詰暴九章宜緩俗有歸心三典或虧一無措手法正則人愨罪當則人從發號施令罔有不臧布德和令后以施命告四方易溢甫刑者除之陳寵昭分拘校律令條法溢於甫刑者奏除之未及施行也孔撰定律令劉祥道字同壽與蕭瑀等撰定律令著律議萬餘言用法深杜羔拜司農卿入謝帝曰卿用法深信乎答曰轂下百司養名不肯事如司農尤叢劇陛下無遽信流言假臣數月事可濟撓骫朝法鄭注為翰林學士時李訓已在禁中日日議論帝前撓骫朝法君思正擢大理卿韋丹將告武三思大逆中宗命斬之思正以方發生丹國奏不可乃決流嶺南三思諷所司加法殺之復固爭御史大夫李承嘉助三思而以他事劾思正不得謁思正謂承嘉曰公為天子執法乃擅威福慢憲度諛附姦臣圖不軌今將除忠良以自恣邪承喜慚怒劾思正為青州刺史灋令者人之堤防王志愔為大理正嘗奏言法令者人之堤防不立則無所制今大理多不奉法以縱罪為仁持文為苛臣執典恐且得謗遂上所著應正論以見志又言刑賞二柄惟人主操之故曰以力役法者百姓也以死守法者有司也以道變法者君上也律明則人信灋一則主尊趙冬曦神龍初上書曰古律目千條隋時姦臣侮法者著律曰律無正條者出罪舉重以明輕入罪舉輕以明重一辭而發條目數百夫法易知則不敢犯而遠機阱文義深則吏乘便而朋附盛律令格式謂宜刊定科條直書其事其以准加減比附量情及舉輕以明重不應為之類皆勿用使愚夫愚婦相率而遠犯罪者雖貴必坐律明則人信法一則主尊當時稱是灋為天下縣衡劉藏器高宗時為御史衛尉卿尉遲寶琳脅人為妾藏器劾還之寶琳私請帝止其還凡再劾再止藏器曰法為天下縣衡萬民所共陛下用捨繇情法何所施今寶琳私請陛下從之臣公劾陛下亦從之今日從明日改下何所遵彼匹夫匹婦猶憚失信況天子乎帝乃詔可天下所共李素立擢監察御史民犯法不及死高祖欲殺之素立諫曰三尺法天下所共有一動搖則人無以措手足大業經始奈何輦轂下先棄刑書乎帝嘉納不自為輕重韓洪為人莊重寡言罪殺人問法何如不自為輕重議法處令寬平房玄齡議法處令務寬平灋為天下公戴胄長孫無忌被召不解佩刀入東上閤右僕射封德彝論監門校尉不覺罪當死無忌贖胄曰校尉與無忌罪均臣子於尊極不稱誤法著御湯劑飲食舟船雖誤皆死陛下錄無忌功原之可也若罰無忌殺校尉不可謂刑帝曰法為天下公朕安得阿親戚詔復議繇是與校尉偕免灋者布大信於人時有詭資蔭冒牒取調者詔許自首不首罪當死俄有詐得者獄具胄以法當流帝曰朕詔不首者死而今當流是示天下不以信卿賣獄耶卿自守法而使我失信奈何胄曰法者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而寘于法此忍小忿存大信也若阿忿違信臣為陛下惜之帝大感悟設灋與人共孫伏伽東都平欲責賊支黨悉流徙惡地伏伽諫曰今四方已定設法須與人共之法者陛下自作須自守之使天下百姓信而畏之自為無信欲人之信若為得哉與定律令韓璦父仲良武德初與定律令建言周律其屬三千秦漢後約為五百依古則繁請崇寬以示惟新於是採開皇律宜於時者定之重貨輕灋蕭鈞左武候屬盧文操蹂堞盜庫財高宗以其職主幹當自盜罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法仕喜怒殺人帝曰真諫議也詔原死通訊遺詔太常工為宮人通訊遺詔殺之且附律鈞言禁當有漸雖附律工不應死帝曰如姬竊符朕以為戒今不濫工死然喜得忠言即宥工徙遠裔私役門卒李乾祐貞觀中為殿中御史鄃令裴仁軌私役門卒太宗欲斬之乾祐曰法令與天下共之非陛下獨有也仁軌以輕罪致極刑非畫一之制刑罰不中則民無所措手足帝意解繇是免死惜有罪虧成法狄仁傑遷大理丞左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜乏賢如本立者不少陛下惜有罪虧萬法奈何臣願先斥為群臣戒本立抵死繇是朝廷肅然王者設法不可急亦不可慢郝處俊同東西臺三品咸亨初幸東都皇太子監國諸宰相獨留而處俊獨從帝嘗曰我嘗疑秦法為寬荊軻匹夫耳匕首竊發群臣皆荷戟侍莫敢拒豈非習慢使然處俊對曰此乃法意耳秦法輒升殿者夷三族人皆懼族安有敢拒耶魏曹操著令曰京城有變九卿各守其府後嚴才亂與徒數十人攻左掖門操登銅雀臺望之無敢救者時王修為奉常聞變召車騎未至領官屬步至宮門操曰彼來者必王修乎此由修察識幾故冒法赴難向若拘常則遂成禍矣故王者設法不可急亦不可慢設法不如息事韓琬上言此法令數改或行未見益止未知損譬弈者一棋為善而復之者愈善故曰設法不如息事息事則巧不生聖人防亂未然天下何繇不治哉用灋宗室國貞善用法撓人陸贄說使者以五要簡官事曰蠲法之撓人深文穆贊擢御史中丞裴延齡判度支屬吏受賕具獄欲曲貸吏贊執不可延齡白贊深文貶饒州別駕覆訊殷侑濮州掾崔元武受吏賕又率屬邑奉錢增私馬估售官疊三罪計絹百二十匹大理以入私馬一重削三官刑部覆詳當流未決侑奏三犯不同坐所重律頻贓者累論元武犯皆枉法當死詔用覆訊流元武賀州囚父自首請罪王彥威興平民上官興殺人亡命吏囚其父興聞自首請罪京兆尹杜悰御史中丞宇文鼎以自歸死免父之囚可勸風俗議減彥威上言殺人者死百王共守原而不殺是教殺人者有詔貸死彥威詣宰相據法爭論下遷河南少尹不輸官賦韋澳字子斐改京兆尹帝舅鄭光主墅吏豪肆積年不輸官賦澳逮繁之他日延英帝問其故澳具道姦狀且言必置以法帝曰可貸否荅曰陛下自內署擢臣尹京兆安可使畫一法獨行於臣下乎帝入白太后曰是不可犯后為輸租乃免問法張嘉貞字嘉貞祕書監姜皎得罪嘉貞希權幸意請加詔杖已而皎死會廣州都督裴伸先抵罪帝問法如何嘉貞復援皎比張說曰不然刑不上大夫以近君子士可殺不可辱向皎得罪官三品且有功若罪宜死即殺獨不宜庭辱以卒伍待也況勳貴在八議乎事往不可咎胄先豈容復濫哉帝然之灋有首王縉字夏卿及敗劉晏等鞠其罪同載論死晏曰重刑再覆有國常典況大臣乎法有首從不容俱死於是以聞上憫其耄不加刑乃貶括州刺史灋者天地大典賈至字幼鄰至德中將軍王去榮殺富平令杜徽肅宗新得陝且惜去榮材詔貸死以流人使自效至諫曰律令者太宗之律令陛下不可以一士小材廢祖宗大法帝詔群臣議見素崔器等皆以謂法者天地大典王者不敢專也帝王不擅殺而小人得擅殺是權過人主開元以前無敢專殺尊朝廷也今有之是弱國家也太宗定天下陛下復鴻業則去榮非至德罪人乃貞觀罪人也其罪祖宗所不赦陛下可易之邪詔可法令有常則邦寧盧藏用字子潛云法令有常則邦寧所守公法徐有功與皇甫文備同按獄誣有功縱逆黨久之文備坐事下獄有功出之或曰彼嘗陷君於死今生之何也對曰爾所言者私忿我所守者公法不可以私害公天子操法有不變之義王志愔言隋之帝子秦王俊為并州總管以奢縱免官楊素曰王陛下愛子請赦之帝曰法不可違若如公意我乃吾兒之父非兆人之父非何不別制天子律乎故天子操法有不變之義凡數十言帝嘉之誤傷乘輿器服柳渾字夷曠判門下省玉工為帝作帶誤毀一銙工不敢聞私市他玉足之及獻帝識不類擿之工人伏罪帝怒其欺召京兆府論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法誤傷乘輿器服罪當杖請論如律由是工不死持法竇參字時中進大理司直婺州刺史鄧班盜贓八千緡宰相右班欲免輸其財詔百官集尚書省議多希意為助參獨持法卒輸入之李德裕奏德裕言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威下繫於人也禁齊人文粹蕭穎士為陳正卿進續尚書法令不足以禁齊人存而不論文粹李華中丞壁記三辟存而不論廷尉上請帝垂泣王志愔言漢成帝甥昭平君殺人以公主子廷尉上請帝垂泣曰法令者先帝之所造也用親故誣先帝法吾何面目入高廟乎卒可其奏刑罰二柄惟主操之王志愔刑罰二柄惟主操之故曰以力役法者百姓也以死守法者有司也以道變法者君王也上律令塵蠹於棧閣白居易論刑法律令塵蠹於棧閣制敕堆盈於案幾官不偏睹法無定科律令格式唐刑法志令者尊卑貴賤之等數國家之制度也格者百官有司之所常行之事也式者其所常守之法也中外之法殊以其官禁不一也中外之法殊以其官禁不一也臣謹按春秋齊桓公盟諸侯不以日而葵丘之盟特以日者美其能宣明天子之禁率王官之法故春秋備而書之夫官者五帝三王之所建也法者高祖太宗之所制也法宜畫一官宜正名劉蕡帝王立法束縛姦雄正為才多者舊唐史牛僧孺為御史中丞宿州刺史李直臣坐贓當死直臣賂中貴人為之申理僧孺堅執不回穆宗面論之曰直臣事雖愆失然此人有經度才可委之邊任朕欲貸其法僧孺曰凡人不才止侍祿取容爾云云祿山朱泚以才過人濁亂天下況直臣小才又何屈法哉上嘉其守法參訂重輕劉瑑字子全裒匯敕令可用者由武德大中凡二千八百六十五事類而析之參訂重輕號大中刑律統類以聞法家推其詳三尺律令四海紀綱所宜公共杜牧白訓夏周書穆王訓夏贖刑附從輕附施刑也求出之使從輕赦從重雖罪重猶赦之周訓夏刑人克用乂訓暢夏禹之刑更從輕也漢除秦法政是以和去秦之重刑夏人不敝本平後罰記夏道先賞後罰其人不敝殷人先罰後賞其人敝秦氏自敗由其峻刑約三章之法漢室以興作五虐之刑苗人自絕得失斯在取捨可知虞夏之道寡怨於人少文法故雖政寬而人慢未盡善也比刑肅而俗敝不猶愈乎為國制刑雖宜簡易示人知禁信亦寬難寬能御眾猛則殘人宜建大中之法以為小康之惠作為金贖垂裕虞書誤入刑以金贖罪除去肉刑稱仁漢牘文選寬而有制書施之以寬雖擾擾之政布以從寬而恢恢之網疏而不漏代虐以寬兆人允懷商湯以為御勞止之人寬以濟猛念恤哉之典愛克厥威其政不嚴而治其教不肅而成無子令妻入獄吳祐為膠東相有母丘長者殺人臨刑祐問有子否長曰有妻無子乃緩其桎梏令妻入獄妻有孕然後行刑長泣曰何以報吳君後生子以吳為名也吞藥就死鍾離意字子阿為瑕丘令有吏行盜意不忍行刑罷其職放歸其父曰有道之君以義刑人子宜進藥死畫衣冠漢文詔曰蓋聞有虞之時畫衣冠異章服以為戮而人不犯何則治之至也其除肉刑輕典周禮緩刑居上不寬吾何以觀之哉父子君臣禮凡聽五刑之訟必原父子之親立君臣之義以權之注權量也謂立父子君臣之間可以情恕也容姦禮利淫人之搜匿大為防而猶踰法以懲奸小不忍而恐亂況當弘貸之朝宜用適輕之典宥汝仇予惠暴寬惡刑法志言上古用象刑是殺人者不死傷人者不刑是惠暴而寬惡也無濫賞不僭刑不濫不幸而過寧僭無濫輔之以寬光持刑法嚴任杜延年輔之以寬老宣詔年八十非誣告傷人他皆不坐小成帝令未滿七歲賊鬥殺及犯誅死者上請皆減死面封之張歐字叔明為御史大夫未嘗按人官屬亦不大欺上具獄有可卻者卻之謂平反也不可者涕泣面封之注皆封不忍見之去酒省肉杜緩埋諸陵縣獄每冬月具獄曰去酒省肉官屬稱其忍于公高門升卿因字後漢虞詡字升卿祖父經為郡獄吏每上具涕泣隨之嘗曰昔東海于公高其門閭其子卒至丞相吾不及于公子孫何必不為九卿因字詡曰升卿妻執燭盛吉為廷尉妻執燭持丹筆相向泣曰召可使一人濫禍及子孫泣辜禹門容駟馬于公孫及九卿虞詡祖經不妄舉按慎刑門孔公累獲原賈敦頤為洛陽司馬以公累下獄太宗貰之有司執不貰帝曰人孰無過吾去太甚者若悉繩以法雖子不得于父況臣得事其君乎遂獲原徐堅上言天授三年上言古者罰不逮嗣故卻芮亂國而缺升諸朝嵇康蒙戮而紹死于難則於他親不復致疑今選部廣責逆人親屬至無服者尚數十條且詔書與逆同堂親不任京畿緦麻親不得待衛臣請如詔書外一切不禁以申曠蕩陛下儻弘天地之大德施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱已來常赦所不原者罪無輕重一皆原洗韋嗣立疏審定法令意在寬平舊唐房元齡蓬勃消李德裕上尊號冊省刑罰而蓬勃消太宗見明堂圖禁鞭背權德輿字載之帝嘗問政之寬猛孰尤對曰唐承隋虐以仁厚為先太宗見明堂圖禁鞭背列聖所循皆尚德教故天寶大盜竊發俄而夷滅蓋本朝之化感人之深也帝曰誠如言下寬大之令流曠蕩之澤朱敬則字少連願下寬大之令流曠蕩之澤去萋斐之角力頓奸險之芒刃塞羅織之妄源掃朋黨之險跡曠然使天下更始豈不樂哉帝喜其言於用刑喜寬仁憲宗英明果斷自即位數誅方鎮欲治僭叛一以法度然於用刑喜寬仁是時李吉甫李絳為相吉甫言治天下必任賞罰陛下頻降赦令蠲逋負賑饑民恩德至矣然典刑未舉中外有懈怠心絳曰今天下雖未大治亦未甚亂乃古平國用中典之時自古欲治之君必先德化至暴亂之世始專任刑法吉甫之言過矣憲宗以為然唐刑法志太宗降隋氏大辟刑百六十三條入流入徒免死以下遽減唯輕開闢以來未有斯比如罪惡既著制命已行愛人惜命務在哀矜臨于剿絕仁令數覆獲罪自然引分方姓由是歸仁感茲煦嫗藏於骨髓雖武太后革命二紀安祿山傾陷兩京西戎侵軼賦泚竊發乘吳巡狩寓內憂虞億兆同心妖氣旋廓刑輕故也國家仁深德厚固可侔于堯舜夏殷以降無足征者通典白情得獄成刑放辭窮察必以情小大之獄雖不能察必以情片言折獄者其由也與片謂偏也察言觀色叩其兩端放紛紛亂也孟秋決小罪月令開子命有司繕囹圄具桎梏斷薄刑決小罪仲秋申嚴百刑月令仲秋命有司申嚴百刑斬殺必當無留有罪嘗學斷斯獄矣禮致其忠愛禮記悉其聰明致其忠愛以盡之謂聽獄訟也哀矜曾子曰如得其精則哀矜而勿喜獄訟益繁要囚伏念五六日至于旬時要囚謂審其要辭哀敬折獄明啟刑書丹筆以定罪也定國之司廷尉爰求明察不疑之尹京師多所正刑高門待封于公陰德欽哉欽哉惟刑之恤哉敬之敬之唯刑之可憂也施鞭貫之威子主治兵終日鞭七人貰三人耳明察之官滋豐亂獄典獄主獄者兩造具備師德五辭兩謂囚證造全也兩至具備則眾官聽其入五刑之辭五辭簡孕正于五刑五辭簡核信有罪驗則正之於五刑審克詳審閱實罪與罰相當也保以速我獄平刑舉直措枉則民服不蔽大斷也察辭稽貌考其貌慎獄之至也留辭謂一人之辭最難聽也束矢周禮以兩造禁人訟入束矢于朝然後聽注必以束矢者者自表其直也不入則不聽也鈞金又以兩劑禁人獄入鈞金三日致于朝然後聽之注獄相告罪也劑券書也使各齎券書又入鈞金三日而聽之亦重刑不入金則自服不直不堅也鈞三十斤五聽求人情周禮以五聲聽獄訟求人情一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽斷獄蔽訟蔽亦斷也辭貴明征傳明征其辭罪宜慎測禮慎測淺深之量坐獄於王廷國章斯抵人命所懸刑將不變獄貴惟情舉要傳王叔氏不能舉其要要契之辭征辭既慚金矢之直何逭鐵冠之劾折獄致刑斷制五刑書察辭于差察辭參差明清于單辭協日周禮司寇旬職聽于朝要之群士司刑皆在各麗其法以議獄獄成士師受中協日刑殺肆之三日凡以獄財者正之傅別約劑傅別手中別書約劑今之契券旬乃弊之小司寇以五刑聽萬人之獄訟附于用情訊之至于旬乃弊之注用情理之十日乃斷冀有可出也參聽記獄成告于王王命三公參聽之君子盡心刑者成也一成而不可變故君子盡心焉直鈞幼賤有罪傳上下其手伯州犁導囚情不探其情而誅焉于定國知審慎之心朝廷稱之漢于定國不冤張釋之為廷尉天下無冤人于定國為廷尉人知以為不冤不用三冬後漢陳寵咸之曾孫明家業天下獄訟其所由決平無不厭伏時肅宗昭絕鈷鑕慘酷之科人俗和平屢有嘉瑞漢舊事斷獄報重常盡三冬之月是時帝始改用十月冬初而已元和年旱賈崇上言斷獄不盡三冬故陰氣微陽氣發洩招致災旱寵奏冬至陽氣始萌令曰諸生蕩仲冬日身欲寧事欲靜若降盛怒不可謂寧行大刑不可謂靜帝納之為廷尉每附輕典務從寬也麥秋案驗和帝令麥秋案驗薄刑司從魯恭上疏諫盛夏召農人拘對上失天時下傷農業一夫吁嗟王道為虧後卒施行學獄漢張湯父為長安丞出湯為兒守舍還鼠盜肉父笞湯湯乃掘薰得鼠及餘肉劾鼠掠笞傳受書者訊鞠論報並取鼠肉具磔堂下父親文辭如老獄吏遂使書獄注學決獄之書乃為律令也必原父子之親禮意論輕重之序慎測淺深之量悉其聰明致其忠愛必察小大之比以成之禮黃沙執憲丹筆垂仁雖折獄以言望古人而多愧惟刑是恤然勿喜而留情梧丘有雪冤之魂棘林無夜哭之鬼泣辜流念無虧大禹之恩丹筆哀矜有裕放勳之惠刑期無刑經邦之茂范以殺止殺有國之宏規故漢制九章設犁元之御勒湯存一面作黔首之堤防干紀亂常必加誅於三族反道敗德終不捨於五刑孔單言輒判李程字表臣調藍田尉縣有滯獄十年程單言輒判州部審覆徐浩字季海尚書右丞浩建有故事有司斷獄必州部審覆自李林甫楊國忠當國專作威福許有司就宰相府斷事尚書以下未省即書垂謹恤意請如故詔可納金第五琦有告琦納金者遣御史馳按琦辭曰位宰相何自持金耶若付受有狀請歸罪有司御史不曉以為具服獄上之遂長流夷州斷疑獄四百張文瓘字稚圭兼大理卿不旬日斷疑獄四百抵罪者無怨言平處輕重沈傳師字子言為宣州吏治明吏不敢罔謹重刑法每斷獄召幕府平處輕重盡合乃論決待報嚴郢字叔敖御史臺請天下斷獄一切待報唯殺人許償死論徙者得悉徙邊郢言罪人徙邊即流也流有三而一用之誠難且殺人外猶有十惡偽造符印彊劫火諸盜今一徙之法太輕不足禁惡侍御史掌推獄訟凡有制敕付臺推者則按其實然以奏云若尋常之獄推訖斷於大理同上核實論殺唐史李景略為朔方節度監官五原將張光殺其妻以貲市獄前後不能決景略核實論殺之既而有若女厲者進謝庭中如光妻云守死明道徐有功人論之曰昔稱張釋之為廷尉天下無冤今徐有功斷獄亦天下無冤人然釋之當漢文帝時中外無事守法而已有功居革命之際周興來俊臣等掩義隱賊常飾惡言以誣盛德有功守死明道身濱殆者數矣此其賢於釋之明甚寬平鄭惠王元懿數斷大獄務寬平高宗嘉之無恨韋仁壽京兆萬年人隋大業末為蜀郡司法書佐斷獄平得罪者皆自以韋君所論死無恨雜治劉晏字士安元載得罪詔晏鞫之晏畏載黨盛不敢獨訊更敕李涵等五人與晏雜治王縉得免死晏之請也詞服陸宣公奏議惟情見跡具詞服理窮者然後加刑法焉臨所入者獨無言唐臨為大理卿高宗嘗親錄死囚前卿所斷者悉號叫稱冤臨所入者獨無言帝怪問狀囚曰唐卿所斷既非冤濫所以絕意舊史李景略凡鞠大獄以尚書侍郎與御史中丞大理卿為三司使唐百官志怒馬造廷薛懷義陰募力少年千人為浮屠有逆謀侍御史周矩劾狀請治驗太后曰第出朕將使詣獄矩坐臺少選懷義怒馬造廷直往坐大榻上矩召吏受辭懷義即乘馬去矩以聞太后曰是道人素狂不足治力少年聽窮劾推覆詔獄裴守真天授中為司府丞推覆詔獄多裁恕全免數十姓不枉不漏張說字道濟睿宗即位遷中書侍郎兼雍州長史景雲秋譙王重福於東都橫逆而死留守捕係枝黨經時不決睿宗令說往按其獄一宿捕獲重福謀主盡得其情狀自餘枉被係禁一切釋之故睿宗勞曰知卿按此獄不枉良善不漏罪人非卿忠正豈能如此凡斷獄之官皆舉律令格式正制條以結之若正條不見其可出者則舉重以明輕其可入者則舉輕以明重出唐六典白二月無肆掠肆暴曰掠捶拷禮記掠笞史楚相亡璧門下意疑張儀貧無行必盜相君璧共執儀掠笞數百不服乃釋之榜笞刺爇貫高對獄吏榜笞數千刺爇身無完者捶楚之下何求不得雖皋陶聽之猶謂死者有餘辜執繫笞笞訊掠辜瘦死宣詔係者或以掠辜瘦死獄中今郡國歲上係囚拷一連十拷十連百韓朗云請先拷范陽繫獄以同繫囚多嬰病乃請先就拷掠五毒慘至戴就會稽人仁郡倉曹掾楊州刺史奏太守成公俘贓從事薛安收就笞掠五毒慘至燒段斧使夾肘腋肉焦墮地乃臥就覆船下以馬糞薰之一宿二日謂已死發船就口罵曰何不益火又燒地以大針刺指爪中令爬土爪悉落安曰太守贓罪狼藉君何骨肉抵捍就曰太守剖符大臣奈何誣枉忠良安奇其節操解械與譚解釋郡事識母羹陸績字智初詣洛陽獄泣曰母來不得見問何以知曰母所調和羹截肉方斷蔥以寸為度使者嘉之免績吏訊鄒陽書曰左右不明卒從吏訊也要囚夜拷常林夜撾吏崔林聞曰君為廷尉耶常曰無崔曰何故夜拷囚常慚之罪得其實選誘問囚情吳陳表文奧為士皆愛附之時有施明盜官物明壯悍收拷極毒雖死無辭孫權以表得健兒心以明付表表破械與沐浴飲食勸誘之乃首服兼引支黨權奇之遂捨明罪孔按訊蘇珦為監察御史武后殺韓魯諸王付珦密牒按訊珦推之無狀或言珦助韓魯者后詰之挺議無所撓后不悅曰卿大雅士此獄不足諉卿即詔監軍河西乞下有司雜訊朱子奢池陽令崔文康坐事櫟尉魏禮臣劾治獄成御史言甚枉禮臣訴御史阿黨乞下有司雜訊不如所言請死鞠報禮臣不實詔如請子奢曰在律上書不實有定罪今抵以死死者不復生雖欲自新弗可得且天下惟知上書獲罪欲自言者懼而不敢申矣詔可同被訊張錫請還廬陵王不為張易之所右與鄭杲俱知選坐洩禁中語又賕謝鉅萬時蘇味道亦任事同被訊繫鳳閣俄徙司刑三品院錫按轡專道神氣不攝日膳豐鮮無損貶味道徒步赴逮席地菜食武后聞之釋味道將斬錫既而流循州氣息奄奄惟吏是聽李邕素輕張說會仇人告邕贓貸枉法下獄當死邕妻請戍邊自贖曰邕初蒙訊責便繫牢戶水不入口者踰五日氣息奄奄惟吏是聽覆訊宗室皋字子蘭授衡州刺史為觀察史詔劾貶潮州初御史覆訊皋懼憂其母出則囚服入乃貌言如平常恣行楚慘唐史吉頊劉思禮反頊上變事后命武懿宗雜訊因諷囚引近臣高閥生平所悟者凡二十六姓捕繫詔獄搒楚百慘以成其獄同日論死天下冤之諸察獄之官先備五聽又驗諸證信事狀疑以猶不首實者然後拷掠每訊相去二十日再訊出通典執政畏禍粗滅無所問姚紹之武三思烝僭不軌王司皎等謀殺事覺送新開獄詔紹之與左臺大夫李承嘉按治初欲原盡其情會敕宰相李嶠等同訊執政畏禍粗滅無所問囚虖曰宰相有附三思者嶠等數附承嘉耳咕嚅紹之翻然不復顧楚械搒掠皆呻吟不勝吉溫李林甫與李適張垍有隙適之領兵部以垍兄均為侍郎林甫密遣吏擿其餘銓史偽選六十餘人帝命與京兆雜治累日情不得京兆尹蕭炅使溫佐訊溫分囚左右中取二重囚重訊後舍楚械榜掠皆呻吟不勝曰公幸留死請如牒乃挺出諸史迎懾其酷及引前不訊皆服日中獄具林甫以為能笞掠嚴楚穆贊字相明元和時鹽鐵轉運諸院擅係囚笞掠嚴楚贊奏請與州縣吏參決自是不冤唐史隨問輒承吉溫推事未窮而先計贓成奏乃引囚問震以裂威隨問輒承無敢迕鞭楚未收干壁而獄具矣環以榜具敬羽擢監察御史岐王珍謀反詔羽窮劾乃悉支黨環以榜具囚惶怖一昔獄成珍賜死楚掠凝慘徐有功傳周興來俊臣丘神勣王弘義等揣識后指置摠監收院諸獄捕將相俾相鉤逮掩搦護送楚掠凝慘鞫訊結斷刑慘獄嚴徐有功上疏唐季人多逆節鞫訊結斷刑慘獄嚴白明聽單辭兩辭師聽五辭書王叔氏不能舉其契要契之辭書辭無頗抵讕置辭漢大鴻臚持節移梁王傳相曰王陽病抵讕置辭注抵拒也讕諱也讕力但功不知置辭牘背周勃下廷尉不知置辭注置立也不知對獄之辭吏稍侵辱之勃以千金與獄吏乃書牘背以公主為證注牘木簡也置對自伏其過莊子會獄追對南山之竹不足受我辭朱安世引為證後漢吳詠為馬賢所辟又為大尉龐參掾參賢相誣罪應死各引為證理無兩直自刎死二人慚悔和解涼州刺史張軌祭其墓旌其子孫孔多作獄狀刑法志武后大定元年乃詔法司及推事使敢多作辯狀而加者以故入論占辯皆合韋嗣立論刑法多濫道路藉藉雖知非辜而鍛煉已成占辯皆合不可陷正人以求苟免宋璟張易之誣魏元忠有不臣語引張說為驗將廷辨說惶遽璟謂說曰名義至重不可陷正人以求苟免緣此受謫芬芳多矣若不測者吾且叩閽救將與子偕死說感其言以實對元忠免死大理烝徒以上各呼囚與其家屬告以罪名問其狀疑不伏則聽其自理唐通典察獄七白小大之獄雖不能察必以情偏聽生姦探情窮審公聽不私察色動魏護軍營士竇禮出不還營以為亡沒事其妻盈及男女詣廷尉高柔曰爾夫不與人交錢財乎妻曰嘗出錢與同營焦子文柔察子文色動應對召至於是叩頭首殺禮胡質為常山太守士盧顯為人所殺質曰此士無讎而有少妻見其比居年少書吏李若色動遂窮詰罪人斯得矣蜜中鼠屎吳孫亮方食生梅使黃門以銀碗並蓋就中藏吏取蜜黃門先恨藏吏以鼠屎投蜜中啟言不謹亮令破鼠屎鼠屎中干亮笑曰若先在蜜中當中外俱濕黃門伏罪兩日在水中符融字博林善斷獄董豐遊學三年而反宿妻家妻為賊殺妻兄疑豐融引問汝初行不有怪及卜占否豐曰初發夢乘馬渡水而自北而南俯見兩日在水中馬左濕筮者云憂獄訟遠三沐避三枕既至妻具沐夜授豐枕豐憶筮言皆不從妻乃自沐枕枕而寢融曰易坎為水離為馬南渡旋北而南從坎至離六爻同變離為中女坎為中男左向濕水也水左有馬馮字兩日昌字其馮昌殺之昌乃具服與妻通期新沐沐者枕枕為驗誤中婦人盜誣行人冀州有老母遇劫唱盜人為逐之擒盜反誣行人日暮母及路人莫知符融曰二人並走先出鳳陽門者非盜既還融正色謂後出者曰汝真盜其發奸摘伏皆如此與死人語後漢周紆字文通為邵陵相廷掾憚紆嚴明欲損其威乃取死人斷手足立寺門紆便往至死人邊若與死人共笑語狀陰察口眼中有稻芒乃密問守音曰誰載稿入城對曰惟有廷掾爾又鈴下云外唯廷掾疑君與死人語乃收廷掾而拷問具服不殺人但取道邊死人自後莫敢犯之分縑風俗通曰有人人持一疋絹到市賣遇雨而披覆後一人求庇蔭授一頭雨霽當別因爭之是我縑太守薛宣呼騎吏斷各與半使追聽之後人曰君恩縑主稱冤不已宣知其狀拷問乃服也推己以議物捨狀以探情誅一以振萬損少成多妻殺夫陸雲為浚儀令人有被殺主名不立雲錄其妻無所問遣出密令吏隨之曰有一男與語便縛來果得之云與妻同謀殺也木囚王充論衡李子長為政欲知囚情以梧桐為人像囚之形鑿地為坎置木囚於其中罪若正木囚不動若有怨木囚即動豈囚之誠者木人也孔身聽安潛字進之於吏事尤長雖位將相閱具獄未嘗不身聽之詭稱婚集宋璟京兆人權梁山謀逆敕河南尹王怡馳傳往按牢械充滿久未決乃命璟為京兆留守覆其獄初梁山詭稱婚集多假貸欲並坐貸人璟曰婚禮借索大同而狂謀率然非所防億使知而不假是與為反貸者弗知何罪之云乎縱數百人餞流人馬懷素字惟白魏元忠謫嶺表太僕崔貞謹東宮率獨孤禕之祖道張易之怒使上急變告貞謹與元忠謀反武后詔懷素按之使者促迫懷素執不從曰貞謹餞流人當得罪以為謀反則非昔彭越以逆誅欒布奏事屍下漢不坐罪今元忠罪非越比不宜坐餞闊之人且陛下操殺生之柄欲加之罪自當處決聖心既付臣按惟知守陛下法爾后意解盜劫貢船錢徽字蔚章貶江州刺史初州有盜劫貢船捕吏取濱江惡少年二百人繫訊徽按其枉悉縱去數日舒州得真盜哀之者哀其化之不行文粹古之決獄得其民情也哀今之決獄得其民情也喜哀之者哀其化之不行喜之者喜其賞之必至鹿門隱書皮日休察獄之官先備五聽又稽諸證信有可征焉而不首實者然後拷掠二十日一訊之辭聽色聽氣聽耳聽目聽五聽也醉胡懷刀而汙唐史韓思彥字英遠使并州方賊殺人主名不立醉胡懷刀而汙訊掠己服思彥疑之晨集童兒數百暮出之如是者三因問兒出亦有問者皆曰有之乃物色推訊遂擒真盜白囹圄以囚桎梏以縶寘于叢棘易圜土周禮司空三罰而士加明刑歸圜土注圜上獄名三月省囹圄九月繕囹圄拘繫易係用徽纆索也用脫桎梏屨校滅趾械足也荷校滅耳罪重械及首也上罪中罪同族有爵待弊周禮掌囚守盜賊凡囚上罪梏拲而桎中罪梏王之同族拲有爵者桎以待弊鄭司農曰兩手共一木曰拲桎梏兩手各一木玄曰在手曰梏在足曰桎中罪不拲亦各一木又云桎王族及命士已上唯上罪或拲或梏也挺重囚出輕繫月令夏月注云挺寬也至秋乃決也具桎梏九月以幕蒙之左傳晉人囚季孫意如圄伯嬴於轑陽越椒囚蒍賈南冠而縶者誰也晉侯觀於軍府見鍾儀問之云云縲紲之中公冶長縲囚幽縶囚之七年紂囚文王七年楚囚鍾儀武王下車釋箕子囚方知獄吏之尊周勃云上書梁王囚鄒陽陽乃從獄中上書自說立出之死灰不然史韓安國字長孺坐枉罪獄吏田甲辱之安國曰死灰獨不然乎甲曰然則溺之搶地司馬遷書見獄吏則頭搶地畫地為獄議不入刻木為吏議不對司馬遷書仰天而歎李斯既拘執縛仰天云云史關三木史魏其侯衣赭衣關三木注云頸及手足栫棘傳吳子執邾子于樓臺栫之以棘栫擁也音賤羑里紂囚文王於羑里夏臺成王湯囚於夏臺狴牢獄名黃沙獄名晉武帝所置象斗之制元命苞為獄圓者象斗也圜扉獄門黃霸受經黃霸與夏侯勝俱下獄從勝請受洪範勝辭以死在旦夕霸曰朝聞道夕死可矣勝善其言遂授之入阱搖尾籠鳥檻猿幽而楚奏鍾儀出圜土者殺謂逃出獄也周禮攘獄攘謂拒當獄者周禮赭衣魯謁居繫導官諸獄皆滿權寄此者降侯囚請室今鍾下人灌夫受辱居室保宮暴室掖廷織作染練署獄市為寄曾參相齊以獄市為寄屬後相曰慎勿擾獄市所以並容擾之姦人安所寄虎穴漢尹賞為長安令獄穿地方深各數丈以瓴甓為郭大石覆之名虎穴圜牆之中司馬遷書鞠繫訟繫漢景著令年八十已上十歲已下及孕未乳產者師侏儒當鞠繫者訟繫之注師樂師樂師盲瞽也訟寬容不桎梏也但處吏舍不入狴牢也斜谷之才不足為我械斜口谷名朱安世云逮繫淳于公下獄逮繫長安注在道將送防禦不絕若今傳送囚也淳于公當行會逮罵其女云云胥靡史楚王胥靡申公注云連繫而相隨服役之也琅當王莽補關東犯鑄錢以鐵琅當其項傳旨鍾官萬數注琅當長鎖也瘦死宣詔繫者或以掠苦饑寒瘦死獄中朕甚痛之其會郡國歲上繫囚以掠苦瘦死者所坐名縣爵里丞相御史課殿最以聞注瘦病囚徒病肂為瘦死或作愈獄中為誄後漢杜篤字季雅下獄會大司馬吳漢薨世祖詔諸儒誄之篤於獄中為誄辭最高帝美之賜帛免刑械自解許楊字偉君少好術數為汝南太守鄧晨修隙鴻陂豪右因陂役辜較所在楊一無所聽遂共譖楊受賂下獄而械輒自解獄吏遽白晨驚曰果濫矣太守嘗聞忠信可以感靈即夜出楊遺歸時天雨陰晦道中若有火光照之時人異之救火晉棠邑丞劉榮坐事當死縣有野火所及榮脫械救火畢還自著械劫囚魏囚臧霸父式為獄掾據法不聽太守私殺太守收霸父付府霸將數人要奪與父亡命導囚走魏孫禮荒亂時與母相失馬台為求之既得後台坐法當死禮私導令踰獄乃自首主簿溫嘉之白太祖罪減一等失囚律捕亡律主守不覺失囚減囚罪二等若拒捍走者又減二等皆限百日內追捕限外他人捕得若囚已死及自首除其罪又云徒流囚徒限內亡者一日笞四十三日加一等主守不覺減囚罪三等故縱者即與囚同罪也職納櫜饘傳晉人囚衛侯寧子職納櫜饘櫜饘衣食也寧俞忠於衛侯以衛侯衣食為己職累臣係累之臣傳身為木石與法吏為伍司馬遷書跡墜昭憲身陷幽圉文選深室傳置諸深室別為囚室也孔纍繫填獄崔仁師為殿中侍御史時青州有男子謀逆有司捕支黨累繫填獄詔仁師按覆始至悉去囚械為具食飲湯沈以情訊之止坐魁惡十餘人他悉原縱大理少卿孫伏伽謂曰原雪者眾誰肯讓死就決而事變奈何仁師曰治獄王仁恕故諺稱殺人刖足亦皆有禮豈有知枉不申為身謀哉仗吾以一介易十囚命固吾願也及敕使覆訊諸囚咸叩頭曰崔公仁恕必無枉者無異辭鵲巢其樹大理卿徐嶠奏今歲天下斷死刑五十八大理獄院由來相傳殺事太盛鳥雀不棲今有鵲巢其樹百官以幾刑措賀帝歸功宰相賜李林甫爵晉國公牛仙客幽國公唐史獄戶春而不草獨幽怒而沉逮李白萬墳詞囚陰山苦寒地溫彥博字大臨突厥入寇彥博以并州道行軍長史戰大谷王師敗績被執突厥知近臣數問唐兵多少及國虛實彥博不肯對囚陰苦寒地太宗立得還囚窟室蔣儼為莫離支所囚內窟室見節門廚院崔隱甫拜御史大夫初臺無獄凡有囚則繫大理貞觀時李乾祐為大夫始置獄由是中丞侍御史皆得繫人隱甫執故事廢掘諸獄其後患囚往來或漏洩復繫之廚院云以稽決滯陸贄字敬輿八計曰視囚繫盈虛以稽決滯毀械而亡柳晟河中解人朱泚反從帝至奉天自請入京師說賊黨以攜沮之帝壯其志得遣泚將郭常張光晟皆晟雅故晟出密詔陳禍福逆順常奉詔受命約自拔歸要籍朱既昌告其謀泚捕繫晟及常外獄晟夜半坎垣毀械而亡斷髮為浮屠加兵苛督高駢字千里畢師鐸出駢囚南第駢出金遺守者師鐸知之加兵苛督復入囚中子弟十餘人同幽之囚拘駢文囚拘供億窘狹群奴徹延和閣欄楯為薪煮革帶以食鐵籠赩囚頭索元禮為推使鐵籠赩囚頭加以楔至腦裂死又橫木關手足轉之號曬翅或紡囚樑上縋石於頭作大枷各為號來俊臣作大枷各為號一曰定百脈二喘不得三突地吼四著即臣五失魂膽六實同及七反是實八死豬愁九求即死十求破塚暮為白日囚朝為青春士暮為白日囚韓愈赴江陵塗中悲作楚地囚悲作楚地囚何由秦庭哭李白示息秀才獄者兼受好惡崔融陳關市疏司刑無鬼哭之庭李庾西都賦司刑無鬼哭之庭大理有鳥巢之獄貫五木加連鎖貫五木加連鎖而致之獄更大暑者數月癢不得搔痺不得搖痛不得復摩饑不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞千里人柳宗元斷刑論顧地窺天不過尋丈柳宗元與李建書壁如囚拘圜土一遇和景出負牆搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出復能久為舒暢哉槁焉若蘗隤然若璞荅周君巢書宗元以罪大擯廢居小州與囚徒為朋行則若帶徽纆處刑若關桎梏夕于而無所趍拳拘而不得肆槁焉若蘗隤然若璞其形固若是則其中者可得矣網羅未解縱羽翼而何施囊檻方堅雖虎豹其焉往謝李襄陽啟沖羅蹈阱不知顛踣柳宗元荅問驄馬刑章峻蒼鷹獄吏猜覆盆徒照日蟄戶未驚雷駱賓王獄中詩地幽蠶室閉門靜雀羅開有氣還沖斗無時會鑿坯同上靜獄五代漢臣蘇逢吉高祖生日遣吉疏理獄囚以祈福謂之靜獄逢吉入獄中閱囚無輕重曲直悉殺之以報曰獄靜矣撓法貸免王世充陰結豪傑有繫獄者皆撓法貸免以樹私恩白兩釋縲囚傳故縱緩死乃逸楚囚傳晉人令曰搜乘補卒明日復戰乃逸楚囚注云緩之令逸欲使楚人知其謀也縱囚亡命馬楥為郡督郵送囚有重罪援袁而縱之令亡命北地遇赦放歸殯母鍾離意為堂邑令民防廣為父報讎擊獄母病死廣哭不食意憐傷之聽廣歸殯丞掾皆爭意曰罪自歸我義不累下遂遣殮母訖果還入獄意密以狀聞廣得減罪死論論重者一人魏賈逵字道宗太祖征劉備先遣逵至斜谷木衝載囚于車逵以軍事竟重者一人放其餘太祖善拜諫議大夫伏臘放歸後漢虞延字子大為淄陽令歲時伏臘放囚歸皆依期反有一囚於家病自載詣縣既至而死又晉范廣字仲將為堂邑令丞劉榮坐事當死郡以付縣家有老母至節廣輒遣還榮如期反又曹據字顧遠為臨淄令獄有死囚歲夕攄行獄愍之曰新歲人情所重豈不欲暫還家乎開獄出之剋日令還掾吏固爭攄曰此雖小人義不見負至期並來一縣歎伏號曰聖君也在道解徒作徒衣後漢鍾離意字子阿辟司徒府送徒詣河內時寒徒病路過弘農意移屬縣使作徒衣縣不與而上書言狀意亦具以聞世祖謂侯霸曰君所使掾何仁於用心誠良吏也意遂於道解徒桎梏恣所欲過與剋期俱至無或違者進藥就死見寬刑門吞藥就死注務以哀矜示其仁信無苟免之心待而懷惠守自拘之限來不忍欺弛刑若今責保漢書誦經得脫晉符丕左丞相徐義為慕容永所獲埋械其手將殺之義誦觀世音經至夜有至士聞械脫出若有導之者遂奔楊銓期銓期以為洛陽令出輕繫利淫惠姦寬惡遭逃孔馳騎免死魏元忠為御史中丞為來俊臣所構將就刑神色不動前死者宗室子三十餘屍相枕藉於前元忠顧曰大丈夫行居此矣俄敕鳳閣舍人王隱客馳騎免死傳聲及于市諸囚歡叫元忠獨堅坐左右命起元忠曰未知實否既而隱客至宣詔已乃徐謝亦不改容如期至呂元膺字景夫出為蘄州刺史嘗錄囚或白父母在明日歲旦不得省為恨因泣元膺惻然悉釋械歸之而戒還期吏白不可荅曰吾以信待人人豈違我如期而至萬一除刑部因籍萬一除刑囚籍復為士列不堪當世用矣柳宗元許京兆書非卿孰能辨之唐史李元素字大樸東都留守杜亞惡大將令狐運會盜劫輸絹於洛北運適與其下畋近郊亞疑而訊掠服之楊寧覆驗事皆不讎亞怒劾寧德宗信不疑詔元素馳案亞迎以獄告元素察其冤悉縱所囚以還亞大驚復劾元素失有罪元素還帝已怒奏獄未畢帝曰出元素曰臣言有所未盡帝曰弟去元素曰臣以御史按獄知冤不得盡辭是無容復見陛下帝意解既道運冤狀帝感寤曰非卿孰能辨之縱囚使相告隱太子建成討劉黑闥獲俘皆撫遣之百姓欣悅賊懼夜奔兵追戰黑闥眾猶盛乃縱囚使相告褫衣甲還鄉里告妻子獲者既已釋矣眾乃散或縛渠長降遂禽黑闥恤囚徒十白繫者饑寒瘦死朕甚憐之漢宣詔見上注作徒衣見上注給酒肉趙廣漢為京兆富人蘇回為郎二人劫執之求財廣漢就曉之曰京兆職謝兩卿無殺天子臣釋質束手得善相遇二人即叩頭送獄廣令給酒肉至冬當出晁豫為調棺斂葬具皆曰死無所恨妻入獄見寬刑門無子令妻入獄注又晉喬智明字元達為隆慮令部人張兌報父讎母單身有妻無子智明愍之令妻入獄陰縱之有勸逃者兌曰有君如此不忍累之於獄產一男會赦免有官秩在獄惠詔爵有五大夫吏六百石以上及官皇帝而知名者有當械皆須繫寬容不入狴牢者問囚欲言吳顧雍為丞相為呂壹所誣毀雍和顏色問其辭狀臨出又謂曰君得無有欲所道耶壹叩頭無言孔問其服否唐志大理寺丞六人正刑之輕重徒以上囚則呼與家屬問其服否盡欽恤之道竭哀矜之誠使生者不怨死者不恨此王者恤刑之法也白居易策止獄畫衣不犯載酒無冤文粹楊炯少姨廟碑糾萬人者施之以八刑詰四方者戒之以三典畫衣不犯載酒無冤其恤刑有如此者輕囚久繫唐臨事見獄囚門三農啟候方陳敬愛之規百姓為心爰軫泣辜之念中宗慮囚制白邴吉拒閉使者漢書皇曾孫在邸獄望氣者言長安獄中有天子氣上使分條中都官詔獄無輕重皆殺之邴吉為郡吏拒閉使者使者不得入也袁安條奏楚獄後漢袁安為楚郡太守楚王英反連及數千人顯宗怒甚治之迫急自誣安不入府往案獄者無證明者條上出之掾吏叩頭爭安曰如不合上意太守自坐不相及帝悟奏出四百餘家治出崔篆為建新太尹獄奸填滿出二千餘人掾吏叩頭曰將有悔篆曰邾文公不以一人易其身君子謂之知命如殺太尹贖二千人蓋所遇也拷一連十後漢韓朗以待御史與三府掾治楚獄顏忠辭及劉連連未嘗與忠相見朗傷其冤試以連等物色問忠對錯誤乃上言疑無辜拷一連十拷十連百車駕自幸洛陽獄錄囚徒治出千人論曰仁人之言其利博免於斧鑕史張蒼坐法當斬解衣伏鑕肥白如瓠王陵傳之言於沛公赦不斬又暴勝之欲斬王訢訢曰殺訢不足增威不如時有所寬以明恩貸勝之壯其言而赦之孔釋械狄仁傑出豫州刺史時越王兵敗支黨餘二千人論死仁傑釋其械密疏曰臣欲有所陳似為逆人申理不言且累陛下欽恤意表成復毀自不能定然此皆非元惡詿誤至此有詔悉謫戍邊囚出寧州父老迎勞曰狄使君活汝耶因相與哭碑下囚齋三日乃去至流所亦為立碑七族得貸仁傑免死武承嗣屢請誅之後曰今已行不可返時同被誣者鳳閣侍郎任知古等七族得貸全活數十姓裴度字中立加中書令李訓之禍宦官肆威以逞凡訓注宗婭賓客悉收逮訊報苛慘度上疏申理全活數十姓治獄主仁恕崔仁師事見獄囚門屈突通覆簿覆隴西牧簿得隱馬二萬匹帝怒收太僕卿慕容悉達監牧官吏千五百人將悉誅死通曰人命至重死不復生陛下以至仁育四海豈容以畜產一日戮千五百人帝叱之通進頓首曰臣願身就戮以挺眾死帝寤曰朕不明乃至是今當免悉達等旌爾善言遂皆減論情有重輕陳希烈等數百人待罪議者悉抵死李峴獨曰法有首從情有重輕若一切論死非與天下惟新之意固爭數日乃見聽衣冠蒙更生白有所平反漢直不疑為京兆尹每行縣錄囚徒有所平反母即喜如無母為之不食故不疑為吏嚴而不殘察顏色後漢左雄為青州刺史每行部錄囚徒察顏色多得情偽口說應奉為郡決曹吏行部四十二縣錄囚徒數千人太守問之奉口說罪殺兼繫姓名坐狀輕重一無遺脫罵囚吳呂壹以姦罪繫廷尉尚書懷敘面罵辱壹丞相顧雍元歎責懷敘云云孔以執法平恕方戴胄張文瓘字稚圭嘗有小疾囚相與齋禱願亟視事以執法平恕方戴胄後拜侍中囚因其遷皆垂泣其得人心如此指曉枉直何易于凡斗民在廷易于丁寧指曉枉直杖楚遣之不以付獄吏三年無囚占對唐臨高宗嘗錄囚臨占對無不盡帝喜曰為國之要在用法刻則人殘寬則失有罪惟是折中以稱朕意盡情成汭青州人頗知吏治嘗錄囚盡其情墊江賊陰殺令其主簿疑小史導之訊不承臨刑曰我且訟地下踰月吏暴死汭聞益詳於獄唐太宗親錄囚徒六年唐太宗親錄囚徒閔死罪者三百九十人縱之還家期以明年秋即刑及期囚皆詣朝堂無後者太宗嘉其誠信悉原之唐刑法志白黃霸為穎川百姓向化八年獄無重囚董恢為不其令獄連年無囚後漢劉平為全耕令有恩惠百姓懷感刺史行縣獄無繫囚囹圄空虛寂寥孔獄無重囚刑法志代宗性仁恕即位五年府縣寺獄無重囚狴牢傾杜甫有事於南郊賦叢棘坼而狴牢傾無一人獄文粹杜牧上高大夫書梁公元崇首佐玄宗起中興業凡三十年天下幾無一人之獄吏閣丹筆文粹李庾西都賦臺收白簡吏閣丹筆司刑無鬼哭之庭大理有鳥巢之獄鑽鑿不用獄訟以衰柳宗元表
