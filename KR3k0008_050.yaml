body:
  text: 卷第五十辭賞賜一白公賜公冶冕服辭彊之而後受辭有先登齊侯賞黎彌彌辭曰有先登者臣從之晢幘而衣貍製齊公孫青聘衛侯以為有禮齊侯遍飲諸大夫酒曰二三子之教也苑何忌辭曰與於青之賞必及於其罰言青有善既受賞後青有罪亦當同受其罰也逃賞楚昭及國賞功臣申苞胥曰吾為君也君既定矣又何求遂逃賞魯連不受功而去子産辭賞曰臣不敢及賞禮周仁讓賜周仁景帝再幸其家所賜甚多終讓不受辭賜劍衛青事見上注屠羊說莊子楚昭王失國屠羊說走而從王反國賞從者賞及屠羊屠羊曰大王失國說失屠羊人王反國說亦反屠羊又何賞之有臨沒還賞子家子反賜於府人傳又後漢祭彤次孫臨終謂子曰吾蒙國恩而微績不立不可無功受負吾死後汝悉簿上所得賜物身效死前行陳平還賜見賞賃門反漢鄭弘字巨君為太慰帝詰讓上印綬臨沒悉還賜物孔宮人賜王晙蘭池胡康待賓據長泉反陷六州詔郭知運與晙討平之玄宗以宮人賜知運等晙獨不敢取曰臣之事君猶子事父詎嘗有近闈掖而臣子敢當乎誓死以免見聽賜女樂引詔使辭張茂昭順宗立進同中書門下平章事復遣之鎮賜女樂二人固辭車至第門茂昭引詔使辭曰天子女樂非臣下所宜見者汾陽咸寧西平北平皆有大功故當是賜今臣下述職以朝奈何濫賞後日有立功之臣陛下何以加之復賜安仁里第亦讓不受見功臣多矣未嘗以玉帶賜之周太祖本紀思綰景崇相次降隱帝勞威以玉帶加檢校太師兼侍中威辭曰臣事先帝見功臣多矣未嘗以玉帶賜之因言臣幸得率行伍假威靈以破賊者豈特臣之功皆將相之賢有以安社稷撫內外而饋餉以時故臣得以專事征伐隱帝以威為賢於是悉召楊邠史洪肇蘇逢吉禹圭竇貞固王璋等皆賜以玉帶五代史功二白書曰功加于時時當時也豫嘉乃勳竭力盡能藏於盟府功也戡難書之竹帛茂勳銘于鍾鼎功懋懋賞懋賞也效錐刀之用立毛髮之功展犬馬之效立方寸之功並選名挂史筆銘于太常周禮有功者司勳銘于王之太常周書曰闕有成績紀于太常太常旌旗也鏤於金石文子獻功于王輸力左嘉乃丕績告厥成功嘉績策勳録功昔周宣之代國人歌方叔之功列於周雅漢武之朝詞臣美充國之績興于漢頌圖功臣於麒麟閣漢制保庸周禮大宰以八統馭萬人馭萬人五曰安有功也興功周禮以庸制祿則人興功注以祿賞功則人勸也稽功周禮周禮王功曰勳輔成王業若周公也國功曰功保全國家若伊尹也民功曰庸法施於民若后稷也事功曰勞以勞定國若禹也治功曰力制法成治若皋陶也戰功曰多克敵出奇若韓信陳平也五曰議功之辟周禮八辟也七曰議勤之辟皆謂有功議其罪也成王以周公為有勳勞於天下封於曲阜報功禮名與功偕禮功疑惟重功多有厚賞明試以功車服以庸惟帝念功以奏功庸大功也奏為也報功策勳且旌君伐伐功也榖梁云卑不尸大功尸主也書勞傳公至自晉孟獻子書勞十廟山河之誓漢高興功臣剖符作誓曰黃河如帶太山如礪功不絶丹書銅券金匱石室藏之宗廟也無橫草之功得列宿衛終軍言有汗馬之勞蕭何覆過陳湯列功覆過藺生收功於章臺驃騎發跡於祁連揚雄文光武以吏事責三公故不任功臣方面之動賈復字君文常從帝征伐故少立方面之動兵部敘録格跳蕩先鋒挺入陶堅者為一等陳萬人敘十人上資加兩階優與處分三品五品不限宮考資次敘録式格功計殺獲及輸失數若輕多除跳蕩及斬將外自餘並節級酬勳不在與官放選限也僝功僝具也稽其功緒在泮獻功程功績事禮狐趙之勳計功臧文仲曰無廢二勳謂祖文仲及宣叔之勳祿勳合親傳孔桑蔭不徙而大功立尉遲恭贊曰敬德之來太宗以赤心付之桑蔭不徙而大功立效尺寸功李靖帝將伐遼召靖入謂曰公南平吳北破突厥西定吐谷渾惟高麗未服亦有意乎對曰往憑天威得效尺寸功今疾雖衰陛下誠不棄病且瘳矣論功定封邑房玄齡帝顧群臣曰朕論公等功定封邑恐不能盡無有諱各為朕言之淮安王神通曰義師起臣兵最先至玄齡等以刀筆吏居第一臣所未喻帝曰叔父兵誠先至然未嘗躬行陳勞故建德之南軍敗不振討黑闥叔父望風輒奔今玄齡等有決勝帷幄定社稷功此蕭何所以先諸將也叔父以親宜無愛者顧不可緣私與功臣競先後爾功臣並世襲長孫無忌帝欲功臣並世襲刺史貞觀十一年乃詔有司朕憑明靈之祐賢佐之力克剪多難清寓內蓋時屯共資其力世安專享其利朕所不取刺史古請侯雖名不同而監統一也無忌等義貫休戚效挺夷險嘉庸懿績簡在朕心其改錫士宇用世及之制乃以無忌為趙州刺史以趙為公國凡十有四人葉贊之功五代裴迪梁太祖自歧還將吏皆賜迎鑾葉贊功臣太祖目迪曰葉贊之功惟裴公有之他人不足當也功蓋一世而上不疑郭子儀贊唐史臣裴垍稱權傾天下而朝不忌功蓋一世而上不疑獨有方面功河間王孝恭始隋亡盜賊遍天下皆太宗身自討定無牧將專勳者惟孝恭獨有方面功以自見云定難元從功臣陸贄帝欲以內外從官普號定難元從功臣贄曰官官具僚恪居奔走勞則有之何功之云難則嘗之何定之云今與奮命者齒恐沮戰士之心結勳臣之憤帝乃止投隙龍驤韋張贊曰皋建封弘本諸生震興田畝間未有以異人及投隙龍驤皆為國梁楹光奮一時使不遭遇與庸夫汩汩並胔而腐可也賜號孔緯纍遷尚書左僕射賜號持危啓運保乂功臣所至有功范希朝在朔方時招突厥別部沙陀千落衆萬餘有之其後用沙陀戰者所至有功録過遺功侯君集高昌平君集刻石紀功還初君集配沒罪人不以聞又私取珍寶婦女將士因亦盜入不能制及還京師有司劾之詔君集詣獄簿對中書侍郎岑文本諫曰高昌之罪議者以其遐遠欲置度外唯陛下奮獨見之明授決勝之略君集得指期平殄今推勞將帥從征之人悉蒙重賞未踰數日更以屬吏天下聞之謂陛下録過遺功無以勸後殺敵為功韓全義為淮西行營招討使班師過關下託疾不入謁司馬崔放見帝謝無功帝曰全義誘少誠歸國功大矣何必殺敵乃為功邪王重榮有大功王處存田令孜討王重榮徙處存節度河中上書言王重榮有大功不可改易搖諸侯之心不納正法紀功則戎行可勸鄭俌上疏以為正法紀功則戎行可勸李翰傳巡功狀表上之曰今陝郊一戰大羊駭北王師振其西巡扼其東此天使巡舉江淮以待陛下師至而巡死不謂功乎不欲謁中國力以幸功名王忠嗣嘗曰平世為將撫衆而已吾不欲謁中國力以幸功名不幸邊功姚崇十事朝廷覆師青海未有牽復之悔臣願不幸邊功可乎士貴建功趙犨黃巢與秦宗權合兵數十萬繚長壕五周百首攻之州人大恐犨令曰士貴建功立名節今雖衆寡不敵男子當死地求生徒懼無益也攘袂指天拔劍擊柱陸宣公奏議以漢高之制服雄豪太宗之削平區寓天下既定乃論功勳有蕭何之殊庸有房杜之碩畫戰守經略倬乎殊倫猶謂豐沛故人刀筆文吏諸將不服頗相訏揚攘袂指天拔劍擊柱偶語謀反喧譁訟冤矧今方資武力非恩幸競進之時眷言勳績深注豫懷贊皇一品集賜石雄詔受尺一之詔盤丈八之矛果然蕩寇眷言勳績深注豫懷功績光明為天子倚信史大奈等事君皆一其志無有顧望用能功績光明為天子倚信寧戚未匡齊陳平終佐漢攙搶掃河洛直割鴻溝半李白鼎彝竹帛未足云紀柳宗元啓終與安社稷功成去五湖李白詩留侯將綺李出處未云殊云云聖智不失時建功及良辰贈張相同上功流社稷李德裕以身扞難功流社稷舊史功名之奇近世所未有李訴始晟去京師市不改肆訴平蔡亦如之功名之奇近世所未有或翼或從尸天之功劉裴贊曰觀二子非有踔越之姿當高祖受命赫然利見於世故能或翼或從尸天之功出唐史白范文子後入傳曰晉師伐齊歸范文子後入武子曰為吾望爾也夫對曰師有功國人喜以逆之先入者必屬耳目焉是伐師受名也故不敢武子喜功成不居不自伐故有功老子汝惟不伐天下莫與汝爭功書孟之反不伐奔而殿將入門策其馬曰非敢後也馬不進也辭有先登黎彌事見上魯連推功而去曰所貴天下士者為人排患取之是商賈連不忍為也大樹將軍後漢馮異字公孫為將進止皆有所表識每所止舍諸將並坐論功異獨屏居樹下軍中號大樹將軍劾辭讓魏田疇字子泰從太祖北征為卿導出盧龍去柳城二百里虜驚大斬獲封為亭侯疇讓封至數四有司劾疇悁復宜免官公卿議以文子辭掾包胥逃賞傳載其美原思辭粟仲尼不與之子路拒牛謂之正義疇雖不合大義有益推讓之風宜優其節乃拜議郎又呂氏春秋子路拯溺人拜之以牛不受夫子歎之歸功諸將魏任城王彰破烏桓太子謂曰卿有功見上勿自伐歸功諸將太祖果說無功而受名臣不敢以為有勳不廢宜膺裂地之榮無功受名實懼貪天之罪介推不言陳平讓無知平封戶牖侯辭曰非魏無知安得進乃賞無知也勸令推功不肯趙充國振旅還所善浩生賜迎說曰衆人皆以破羌彊弩二將軍功多將軍即見宜推功於二將軍充國曰吾年老位極豈嫌伐一時事以欺明主哉兵勢國之大事老臣不明言誰為陛下言者卒以實對自知賈復君文未嘗言功帝輒曰君文之功吾自知之避敵讓功唐彬與王濬共伐吳彬知賊勢已殄孫皓將降未至吳三百里稱疾遲留以示不競識者高之孔每捷必歸功於下王世充每捷必歸功於下虜獲盡推與士卒故人爭為效由是功最多長孫無忌辭帝欲功臣並世襲乃詔有司無忌等辭曰群臣披荊棘事陛下今四海混一誠不願違遠左右而使世牧外州與遷徙等帝曰割地封功臣欲公等後嗣常為藩翰而薄山河之誓反為怨望朕亦安可彊公土宇邪遂止未嘗言功姚況性簡退未嘗言功不邀一旦功孔戣拜嶺南節度使貞元中黃洞諸蠻叛久不平容桂二管利虜掠幸有功乃請合兵討之戣固言不可帝不聽大發江湖兵會二管入討兵被瘴毒死者不勝計安南乘之殺都護李象古而桂管裴行立容管陽旻皆無功憂死獨戣不邀一旦功交廣晏然大冶詔與李晟收京師次滻西元諒先奮鏖賊敗之進屯苑東晟使壞垣以入泚連戰皆北遂大潰京師平讓功於晟唐史李元諒白郤至驟稱其伐單子曰郤氏其亡乎位於七人之下而求掩其上怨之所聚亂之本也無伐善顏回曰願無伐善無施勞孟之反不伐云云馮異坐樹下號大樹將軍上商書曰有其善喪厥善矜其能喪厥功果而勿矜果而勿伐老子克伐怨欲不行焉可以為仁矣夫子曰可以為難矣仁則吾不知也克勝也伐功也自伐者無功君子不自大其事不自尚其功禮焉足以驕人漢伐南越楊僕為樓船將軍有功後東越反欲復使為其伐前功上以書責之曰將軍之功焉足以驕人衛侯毀滅邢同姓也故名禮至為銘曰豫掖殺國子莫豫敢止惡其不知恥滅同姓而銘以伐功也君子稱其功以加小人小人伐其技以憑君子貪天之功以為已力伏韜嘔血鼓音不衰晉鄭戰于鐵既戰趙簡子曰吾伏韜嘔血鼓音不衰今日我上也無汗馬勞漢高録功欲先蕭何諸將曰臣攻城野戰蕭何無汗馬之勞鄂君曰云云拔劍擊柱漢高初未有法度諸將會坐論功相向背而坐爭功或拔劍擊柱上患之駐敵之功吳全琮與魏王陵戰于芍陂軍不利魏將乘勝陷五營顧丞與張休奮擊遂駐魏師琮子緒端因拔劍擊退柱論功行賞以為駐敵之功大退敵之功小丞休為雜號將軍緒端為褊裨而已平吳之功晉書初詔王濬至建平受杜預節度至秣陵受王渾節度及濬先受孫皓降范通曰卿功美矣旋旆之日角巾私第口不言平吳功有問者曰聖王之德群率之力藺生下廉頗王渾能無內愧乎濬曰始懼鄧艾事不得不言吾之褊也鄧艾字士載平蜀多功深自矜伐有識者笑之矜政能王尊為京尹行縣上奏曰強不陵弱各得其所和平之氣通云云御史大夫奏尊大言居慢坐免其言不讓無能受祿孔以功自負尉遲恭壯直頗以功自負侍宴慶善又嘗侍宴慶善宮有班其上者恭曰爾何功坐我上恃功而侈高崇文為京西諸軍部統崇文恃功而侈恃功不法僕固懷恩其部下皆蕃漢徑卒恃功多不法子儀政寬能優容之平蜀之功唐延孝蜀平延孝功為多左廂馬步軍都指揮使董璋位在延孝下然特見重於郭崇韜崇韜有軍爭獨召璋與計議而不問延孝延孝大怒責璋曰吾有平蜀之功公等僕遫相從反俯首郭公之門吾為都將獨不能以軍法斬公邪崇韜死延孝謂璋曰公復俯首何門邪璋求哀以免五代史忌而矜功江夏郡王道宗侯君集破高昌還頗怨望道宗嘗從容奏言君集智小言大且為戎首帝問所以知必反者對曰見其忌而矜功恥為房李下官尚書嘗鬱鬱不平帝曰君集誠有功材無不堪朕寧惜爵位邪第未及耳不誼輕億度使自猜危既而君集反帝笑曰如公素揣銘其功五白穆王命君牙曰惟乃祖乃父服勞王家厥有成績紀于太常太常王之旌旗有功者書焉以表顯也周書銘之金石取其不朽勤于鍾鼎衛侯燬滅邢禮至為銘曰豫掖殺國子莫豫敢止季武子以所得齊之兵作林鍾而銘魯功焉臧武仲曰非禮也夫銘天子令德銘其德也諸侯言時計功大夫稱伐今稱伐則下等也從大夫故計功則借人也借晉力也言時則坊民多矣何以為銘且夫大伐小取其所得以作彝器銘其功烈以示孫子昭明德而懲無禮也紀不朽之績垂無窮之制考父之德銘于鼎美其恭儉勒燕然之石雖表有功車騎將軍竇憲擊胸奴有功登燕然山刻石紀功班固作文鑄林鍾之銘終為非禮彝器景鍾漢圖功臣於麒麟閣禮曰夫鼎有銘銘者自名也自銘以稱揚其先祖之美而著之後世者也為先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之自名謂稱揚先祖之德而著已名於其下銘者論撰其先祖之有德善功烈勳勞慶賞聲名列於天下而酌之於祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也酌之於祭器謂斟酌其美著之於鍾鼎也身比焉謂自者名於下也明示後世所以教後世為法也是以君子之觀於銘也既美其所稱又美其所為美所為謂美此人為此名也子孫之守宗廟社稷者其先祖無美而稱之是誣也有而不知不明也知而不稱不仁也此三者君子所恥也宋稱恭儉著考父之銘傳宋考父三命益恭故其鼎銘云一命而僂再命而傴三命而俯循牆而走亦莫矛侮衛美勳勞勒孔悝之鼎孔氏四代有功於衛至孔悝又有功莊公美之勒於鼎以旌之也篆刻孔帝紀其功李晟帝紀其功目文于碑敕皇太子書立于東渭橋以示後世又令太子録副以賜李績永徽四年冊拜司空始太宗時績己畫像凌煙閣至是帝覆命圖其形自序之秦瓊貞觀十三年改卦胡國公後四年詔司徒趙國公無忌等并叔寶並圖形凌煙閣高宗永徽六年遣使至祭名臣圖形凌煙閣者凡七人徵士廉瑀志玄弘基世南叔寶皆始終著名者也圖形凌煙郭子儀圖形凌煙閣圖形禁中陸堅剛正帝待之甚厚圖形禁中親製贊銘鐵券劉幽求拜侍中璽詔特免卜死銘諸鐵券以傳其功後配享廟庭著金石刻贊張巡贊章聖皇帝東巡過其廟著金石刻贊明厥忠刻功于碑韋丹宣宗它日與宰相語元和時治民孰第一周墀對臣嘗守江西韋丹有大功德被八州歿四十年老幼思之不忘乃詔史館修撰杜牧撰丹遺愛碑以紀之採其元功傳於惇史張武仲盧龍獻捷乃命宰臣採其元功傳於惇史文粹李德裕盧龍紀功碑元勳隘鼎銘杜詩詐功六白漢書魏尚為雲中守斬首虜上功差六級下獄馮唐言之乃持節赦尚後漢楊徐賊起中郎趙序坐畏懦不進詐增首級徵還棄市魏志文欽數有戰功增虜獲以徼賞與祭遵爭功又詐增首級檻車徵棄市降羌一種兩豪魏謁者竇林領護羌校尉治狄道為諸羌所信而滇岸詣林降為下吏欺謬奏上滇岸為大豪承制封義侯明年滇吾復降奏第一豪俱與詣闕獻見帝怪之一種兩豪疑非實以語林林辭窘乃僞封滇岸即滇吾隴西語不正爾帝窮驗免官虛張首級晉石鑒為豫州虛張首級詔曰田順以詐增虜自殺鑒歸舊里孔匿功狀五代段疑莊宗與梁相距河上梁以王彥章為副是時未帝昏亂小人趙巖張漢傑用事疑依附巖等為姦彥章為招討使三日用奇計破唐德勝南城而凝與彥章各自上其功巖等從中匿彥章功狀悉歸其功於凝凝因納金巖等求代巢首俱上巢計蹙謂林言曰若取吾首獻天子毋為他人利言東出也不忍巢乃自刎不殊言因斬之及兄存弟鄴並殺其妻子悉函首將詣師時漙而太原博野軍殺言與巢首俱上溥獻于行在唐史篡宗權以獻龐師古敗漙於呂梁淮西牙將申叢執宗權折其定將檻送京師別將郭璠殺叢篡宗權以來獻之王遣行軍司馬李璠獻俘於京師表郭璠淮西留後五代梁本紀封功臣後七白子文無後何以勸善楚滅若敖氏子文之孫針尹克黃使於齊復命拘於司敗王思子文之治楚國曰子文無後何以觀善也使改命曰生成季子之勳宣孟之忠而無後為善者其懼焉韓厥言趙武魏求鍾繇後詔曰楚思子文漢録臧宣鍾繇之後不宜絡無廢二勳祖父勳也臧武仲曰苟守先祀無廢二勳敢不致邑乃立臧焉出於東門後漢明帝詔曰朕出東門見蕭曹墓云云遂褒功臣後也賢者之後宜十代宥之以勸能者寢丘之封史孫叔敖子貧負薪優孟即為孫叔敖衣冠抵掌談語像敖莊王大驚以為敖復生也欲以為相孟曰臣婦言慎毋為昔孫叔敖為楚相楚王以霸今死其子無立錐之地莊王於是召敖子封寢丘四百戶奉其祀賞及父李同與敢死十三千人赴秦秦軍卻李同死封其父為李侯孔録忠臣後李安靜會昌中録忠臣後訪子孫已絶乃贈安靜太子少師求勳臣後苗裔封褚無量元宗幸東都又求武德以來勳臣苗裔紹續其封以起義烈李吉甫當國褒忠臣後以起義烈賜延賞張嘉貞卒後十餘歲韓朝宗以京兆尹見帝曰陛下待宰相進退皆以禮身雖沒子孫咸在廷張嘉貞晚有一息名寶符獨未官帝憫然召拜左司禦率府兵曹參軍賜名曰延賞許宥十世郭曜盧杞秉政忌勳族姦人幸其危多論奪田宅奴婢曜大恐獨宰相張鎰力保護德宗稍聞之詔有司曰尚父子儀有大勳力保人王家嘗誓山河琢金石許宥十世前日其家市田宅奴婢而無賴者以尚父歿妾論奪之自今有司母得受元和大臣子孫牛勝宣宗感章武舊事元和時大臣子若孫在者多振拔之帝嘗問勝勝具道黃裳首建憲宗監國議帝嘉歎拜給事中求忠臣後張巡貞元中復官巡它子去疾遠子峴憎巡妻申國夫人賜帛百端自是訖僖宗求忠臣後無不及二人者封建八白天子建國諸侯正封封疆有定分天子建德德有德諸侯策勳建善則治分茅土白茅苴土賜以立社翦桐為圭成王戲翦桐葉為圭封唐叔史侯曰天子無戲言遂封建賢立德錫壤開封選建明德以藩屏周裂地開國史大啓爾宇錫之山川詩錫以土田陪敦陪多敦厚命之車服列爵惟五五等諸侯也周書分土惟三諸侯之國大小有三等建邦啓土庸建于爾上公書修其禮物惟乃服命書以藩王室封略建侯易齊世胙太師永表東海太師封于齊以表東海也晉登侯伯大啓南陽文公也五等論曰五等之制始于黃唐黃帝堯舜郡縣之始創於秦漢秦創置郡縣漢因之使萬國相維以成磐石之固宗庶雜居而定維城之業並五等論世及之祚立子孫也國除之典漢制有罪者國除往即乃封周建懿親五等列爵漢封異姓八國皆王高祖定天下功臣封入國諸侯王也賜我先君履所踐履之界也夾輔周室藩屏封建親戚以藩屏周宜遵分陝之文周公召公用葉屏周之典以藩屏周龍額定遠並封侯鵲印之封封侯也親疏並建宗無雜居分茅錫土地列犬牙疏爵建侯位崇龍額策命周禮建侯之利同姓之封異姓以封周禮有功德於民者加地禮典阜之封禮成王以周公有勳勞於天下是以封周公於典阜之地方七百里革車千乘益地削地禮諸侯有功則益地取間田以益之有罪則削地削地歸之間田周禮典瑞土圭以致四時日月封國以土地度地封諸侯以土圭測日景觀分寸長短制其域也告后土周禮大宗伯王大封則先告后土蒯聵歸國使告于王曰天誘其衷獲嗣守封焉非天子不得專封榖梁城楚丘封衛非天子不得專封雖通其仁義而不與故曰仁不勝道古者天子封諸侯其地足以容其人榖梁古者有分土無分晉地理志云分人謂計若干戶疇其爵色疇者算邑不復減也帶礪之誓漢茅土之封見上注專地盜土以自益漢匡衡字稚圭為丞相封僮之樂安鄉郡國國誤分界多四百頃衡後封臨淮郡之國遣人之僮牧田租榖九千石司隸劾衡專地盜土以自益免為庶人俾侯于魯五命賜則周禮大宗伯之職九儀之命正邦國之位一命受職云云五命賜則注則法也出為子男則地未成國之名王之下大夫四命出封加一等五命賜之以方百里之地方三百里為國王莽時以二十五為則也子男五十里不能五十里者不合於天子附於諸侯曰附庸以國附于大國不能自以行其道也建置豐氏傳子産云疏爵貴之漢高爵高詔公乘已上皆高爵也連城廣土後漢竇融辭封曰子頑鈍不可連城廣土我圖爾居莫如南土詩封申伯私奉養漢高時大飢自天子至封君其湯沐邑各為私奉養不領於天下之經費推恩主父偃欲削諸侯權請推恩封子弟人人喜不削而弱就國行遲史尚父封齊就國道宿行遲逆旅人曰客寢甚安殆非就國也時難得易失注太公遂夜衣而行比至果萊人來伐爭營自當刑而王黥布少時人相曰當刑而王後果坐法黥布心喜之以儒學勤勞封都鄉侯闞澤字德潤史降虜景帝欲封降虜王徐虔等五人丞相亞夫議不可帝悉封奴封彭寵倉頭子密殺寵詣闕封不義侯擅封後漢梁懂為度遼將軍擅封單于兄塗奴為羌侯授以印綬坐專擅抵罪也分天下為三十六郡史丞相綰燕齊荊地請立王而鎮之李斯曰諸子功臣重貴賜之易制天下安寧之術置諸侯是樹兵本也始皇曰廷尉議是遂分天下為三十六郡陳平凡六出奇計輒益六邑孔以周漢之後為二王後則天載初元年以周漢之後為二王後封舜禹湯之裔為三恪周惰同列國封李百藥上封建論時議裂土與子弟功臣李百藥上封建論理據詳切帝納其言而止異同之要歸于三科或曰周人制五等封親賢其弊也諸侯擅戰伐陪臣執國命故蠶食爪裂以至于衰滅也而李斯周青之議由是興焉又曰秦皇廢列國棄子弟其敗也萬民無定主九族為匹夫故魚爛土崩以至于覆亡也而曹炯士衡之論由是作焉又曰漢氏侯功臣王同姓其失也爵號太尊土宇太廣故鴟張瓦解以至于悖亂也而朝錯主父之計由是行焉然則秦懲周之弊也既以亡而易衰漢鑒秦之失也亦矯任而過正又臣聞王者將欲家四海子兆人垂無疆之休建不拔之業者在乎操理柄立人防導化源固邦本之業者在乎刑行德立近悅遠安恩信推於中惠化流于外如此則四夷為臣妾況海內乎雖置守罷侯亦無害也白居易策非李氏不王非功臣不封唐史蘇安恆疏其改錫土宇用世及之制長孫無忌漢法非有功不封唐遵漢法太宗之制也張九齡讓封九白辭貴就賤讓而就賤民猶犯貴大夫讓爵於朝農夫讓畔於野不貪其土韋玄成佯狂讓葑於兄竟不免竇融數辭爵土以為有勳不廢宜應疏上之封無功受封實懼貪天之罪讓封與弟後漢丁鴻孝公父綝對陵陽侯鴻與弟盛居憐其幼少及綝卒當代封上書讓於盛不報既葬乃挂縗絰於冢廬留書託疾而逃初鴻與鮑駿友乃佯狂不識駿駿乃止而諫曰今子以兄弟私恩而絶父不滅之基可謂知乎鴻乃感悟就國又劉愷以當襲父封讓與弟憲逃遁有司請絶其國帝不許懼罪張奮字通雅父純臨終敕勿傳國奮兄根被病光武令奮嗣爵奮稱父命不受帝以奮違敕收下獄惶怖乃襲封耿國字叔慮當讓上疏以父況愛少子霸請讓詔許之讓兄子桓榮卒子郁當嗣爵讓兄子范帝不許不得已受以祖入與之佯瘖晉馮恢父愛少子淑欲以爵傳之恢父終還鄉結草為廬佯瘖不言淑得襲恢乃仕為祭酒翟嬰薦恢於崔洪良伯以恢不敦儒業雖有小善不足稱也衛瓘六男無爵悉讓二弟遠近稱之辭大受小世祖封功臣令言所欲丁綝幼春願封鄉或謂綝曰人皆欲縣子獨請鄉何也綝曰昔孫叔敖敕其子曰受封必求墝確之地今綝功微德薄鄉亭已為厚矣後漢請貶侯傳昌嗣封無湖侯上疏以國貧不願之封乞五十萬為關內侯肅宗怒貶關內侯亦不與錢孔請與母弟段志玄貞觀十六年疾帝臨視泣顧曰當與卿子五品官頓首謝請與母弟乃拜志感立衛郎將韋挺拜御史大夫扶陽縣男挺曰臣駑下不足以辱高位且非勳非舊而在藩邸故僚上願後臣以勸立功者不聽能讓韓偓令狐渙任機巧帝嘗欲以當國俄又悔曰渙作宰相或誤國朕當先用卿辭曰渙再世宰相練故事陛下業已許之若許渙可改許臣獨不可移乎帝曰我未嘗面命亦何憚偓薦御史大夫趙崇徑正雅重可以準繩中外帝知偓崇門也嘉其能讓白石窖齊師敗歸女子問曰君免乎曰免矣鋭司徒免乎曰免矣曰苟君與吾父免可若何齊侯以為有禮問之乃辟司徒之妻也與之石窖封丘陳留風俗傳曰封丘本延鄉高祖為項氏厄於延鄉有翟母免其難故以延鄉為封丘命婦禮曰婦人無爵從夫之爵坐以夫之齒謂夫為大夫則婦為命婦凡婦人從其夫之爵位生禮死事皆從夫之尊卑恩自宸極慶流閨門婦人封十孔進五品以上母妻封號中宗景龍二年正月庚寅大赦進五品以上母妻封號一等無妻者授其女婦人八十以上版授郡縣鄉君版授玄宗開元二十七年正月大赦百歲婦人郡君九十以上婦人縣君八十以上婦人鄉君啓封備服以疇時勳韓文御史大夫李欒妻何氏封息國夫人在昔正元有息自天啓封備服以疇時勳以戰功封武成郡夫人唐史王君㚟妻亦自以戰功封武成郡夫人一品及國公母妻為國夫人唐六典司封王母妻為妃一品及國公母妻為國夫人三品已上母妻為郡夫人四品若勳官一品有封母妻為郡君五品若勳官三品有封母妻為縣君散官並同職事勳官四品有封母妻為鄉君凡婦人不因夫及子而別加邑號夫人云某品夫人郡君為某品郡君縣鄉君亦然同上繼絶十一白孔子曰興滅國繼絶世天下之民歸心焉成湯革夏而封祀武王入殷而封宋所以興滅繼絶也文選武王克殷未及下車封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳封殷之後於宋禮成王既黜殷命命微子啓代殷後作賓於王家為周之客蔡叔既沒王命蔡仲踐諸侯位命曰肆豫命爾侯于東土傳曰虞閼父為陶正周以其神明之後也以元女太姬配胡公而封諸陳舜後也胡公閼伯子以備三恪周得天下封夏殷二王後又封舜後謂之三恪恪敬也其禮轉降示敬而已故曰三恪宜遵封宋之文甲協屏周之典楚立子文之後王思子文之治楚國曰子文無後何以勸善乃立其孫克黃為後鬼有所歸乃不為厲伯有為厲子産立公孫泄及子良止以撫之曰鬼有所歸乃不為厲吾為之歸也泄子孔之子良止伯有之子皆為國所殺立其後以撫之孤子死王事者之子纂乃前修食其舊德公侯之子孫必復其始孔崔植祐甫弟廬江令嬰甫子也祐甫病謂妻曰吾殃當以廬江次子主吾祀及卒護喪者以聞帝惻然召植使即喪次終服收敘功臣世絶者褚無量字弘度開元五年帝將幸東都上疏曰願到東都收敘唐初逮今功臣世絶者雖在支庶咸得承襲帝納其言求賢者後太宗貞觀十四年求梁周陳隋賢者後嗣絶國除朕甚悼焉唐史越王貞詔王嗣絶國除朕甚悼焉其以貞從孫故許王子夔國公琳嗣王奉王祀本傳白似續慶襲賞延祚承世及嗣子繼世並禮置後無子則為之置後禮纂乃祖服服事也恭承國命克紹家聲必復其始公侯子孫云云不濟其美不隕其名楚王曰子文無後何以勸善乃立其孫針奶克黃繼體而立先職前修後嗣榮分茅土慶襲弓裘嗣德纂我祖考堂構書曰若考作室其子乃不肯堂矧肯構言不能嗣父統承踐修祗遹乃文考敬修爾父道嗣守前烈負荷析薪左傳古人有言其父析薪其子不肯負荷言不嗣也良冶克傳不墜良兮續莫大焉卜所以為後者禮禮曰諸侯世子世國象賢大夫不世爵使以德爵以功請天子大夫也不世爵而世祿進賢諸侯之大夫不世爵祿食其舊德纂乃前修祿以勸賢爵惟及嗣臣能匡國必酬世祿之勳子合承家宜荷賞延之龐冢嫡承祧繼體立嗣以嫡不以賢公羊曰隱長又賢故大夫扳而立之何以不宜立立嗣以嫡不以賢立子以責不以長桓何以貴母貴也趙簡子藏符史趙簡子曰吾藏寶符於常山先得者賞諸子馳至無所得無恤曰已得矣常山臨代代可取也簡子乃廢伯魯而立無恤是為襄子狠在心國語智桓子將以瑤為後智果曰不如宥桓子曰宥也狠曰宥之狠在面瑤之狠在心心狠敗國面狠不害若立瑤智宗必滅竟立瑤果滅智氏使嗣宗職傳為人後移根繼絶不與射孔子射於矍相之圃蓋觀者如堵牆使子路執弓矢出延賓曰賁軍之將亡國之大夫與為人後皆不在此位也注主後已有一人後往奇之是貪利也不別籍晉殷仲堪臨荊州有子孫繼親族無後者惟令主蒸嘗不聽別籍以避役也經侍養襲封封爵令王公已下無子孫以兄弟為後生經侍養者聽承襲若死王事雖不經侍養亦聽承襲姪蜀諸葛喬字伯松瑾第三子本字沖慎亮未有子求喬為後瑾啓吳王而遣之以為嫡故改其字喬子舉亮後自有子舉還復為瑾後中官後漢順帝聽中官以養子為後代襲封爵孔存保世嗣李晟字良器薨帝手詔誓以存保世嗣申告柩前馬周上疏曰臣伏見詔宗室功臣悉就藩國遂貽子孫世守其政竊惟陛下誠愛之重之欲其裔緒承守與國無疆也臣謂必如詔書者陛下宜思所以安存之富貴之何必使世官也且堯舜之父有朱均之子若令有不肖子襲封嗣職兆庶被殃國家蒙患正欲絶之則子文之治猶在也正欲存之則欒黶之惡已暴也必曰與其毒害於見存之人寧割恩於已亡之臣則向所謂愛重者適所以傷之也臣謂宜賦以茅土疇以戶邑必有林行隨器而授雖幹翮非疆亦可以免纍詔功臣世襲于志寧帝詔功臣世襲刺史志寧奏古今纍時慕虛名遺實患非久安計帝皆從之父死王事蘇世長父死王事有詔襲爵世長號踊不自勝帝奭然改容兄子為後戴胄無子以兄子至德為後又杜兼中書令正倫五世孫初正倫無子故以兄子志靜為後嗣續之重柳宗元貶永州司馬貽京兆尹孟書曰煢煢孤立未有子息荒陳中少士人女子無與為婚世亦不肯與罪人親妮以是嗣續之重不絶如縷每春秋時饗子立俸奠顧眄無後繼者懍懍然欷歔惴惕恐此事便巳摧心傷骨若受鋒刃此誠丈人所共閔惜也求胄嗣又曰姑遂少北益輕瘴癘就婚娶求胄嗣有可付託則冥長辭如得甘寢無復恨矣陳少游子請嗣封陳少游死子請嗣封竇參大署省門曰少游位將相以艱危易節上含垢不忍發其息容得傳襲邪竇參傳欲變山東承襲舊封田弘正常欲變山東承襲舊封故悉遣子姪仕朝廷帝皆推任之田布弘正遇害公卿議以魏強而鎮弱且魏人素德弘正以布之賢而世其官可以成功穆宗遽召布解縗拜魏博節度使為父後者高祖紀武德九年為父後者襲勳爵以息屬母弟穆寧真卿著寧河北採訪支使寧以息屬其母弟曰苟不乏嗣足矣即馳謁真卿曰先人有嗣矣我可從公死不乏祀辛讜及兄子客廣陵託杜慆曰我先人不乏祀公之惠也元德秀不及親在而娶不肯婚人以為不可絶嗣答曰兄有子先人得祀吾何娶焉擇嗣文粹獨孤及吳季札論君之大經實在擇嗣王者謹德之不建故以賢則廢年以義則廢卜以君命則廢禮意傳嫡嗣贊皇一品集請改封衛國臣亡父先臣蒙憲宗寵封趙國先臣與嫡孫寬中小名曰三趙三趙在意傳嫡嗣不及支庶臣前年恩例進封合是趙國臣以寬中之故改就中山臣士祖先君衛州汲縣竟以汲縣解進士第儻蒙聖恩改封衛國廬江次子主吾祀見繼絶門盛德果驗於達人積善必徵於餘慶柳宗元駕裴桂州啓白立長則順傳無嫡則立長穆叔曰太子死有母弟則立之無則立長年鈞擇賢義鈞擇上古之道也年鈞以德昔先王之命曰王后無嫡則擇立長年鈞以德德鈞以卜王不立愛公卿無私古之制也贊私立少子朝言單劉贊私立少云云尚年尚齒無忌之弟好仁立少則可周子之兄無惠雖長何為然則政惟圖大教在防人黜惡進賢雖能權道廢長立少必啓幸門反經是啓爭端亂嗣殊非理本楚國之舉恆在少者傳立少子魏劉表字景叔二子琦琮表愛琮而琦不自寧引諸葛亮上樓去梯曰可以言未亮曰君不見申生在內而危重耳在外而安乎琦悟遂謀出守孔推長而立高力士初太子瑛廢武惠妃方嬖李林甫等皆屬壽王帝以肅宗長意未決居忽忽不食力士曰大家不食亦膳羞不具耶帝曰爾我家老揣我何為而然力士曰嗣君未定耶推長而立孰敢爭帝曰爾言是也儲位遂定立賢十四白建賢則治以先王觀之則尚德也選建明德豈尚年哉傳智測藏符難棄無恤史記趙簡子事哀忘佩玉宜立石祁禮記衛石駘仲卒無嫡子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知雖嫡嗣之或非信象賢而可立禮曰繼世以立諸侯象賢也置善則周天子之封實惟建德天子建德諸侯之代必有象賢且學裘之可傳立庶無害苟析薪之不荷雖嫡奚為舍子立弟公羊宋宣公舍子與夷而立弟穆公穆公卒舍馮立與夷與夷見殺宋之禍宣公為之也孔舉軍附賴潘鎮吳少陽與少誠同在魏博軍相友善少誠得淮西多出金帛邀之養以為弟署右職親近元間少陽度少誠猜忍且畏禍請為外捍少誠乃表為申州刺史為治尚寬易舉軍附賴少誠病亟家奴單于熊兒矯召少陽至攝副使總軍事憲宗以王承宗方叛以少陽領留後擇嗣文粹陳越石太甲論君上之不肯與賢智豈臣下之有不知耶擇其嗣當求賢而立之國之大經在擇嗣見嗣立門事殊迎代邸喜異賞朱虛杜甫贈李八祕書廢嫡立庶十五白公儀仲子之喪檀弓免焉為非禮以非仲子也仲子舍其孫而立其子此其所非也周禮嫡子死立嫡孫檀弓曰我未之前聞也問子服伯子伯子曰昔者文王舍伯邑考而立武王微子舍其孫腯而立衍也仲子亦猶行古之道也伯子為仲子諱惡文王立武王權也微子捨其孫立衍殷禮也問於仲尼仲尼曰否立孫據周禮也司寇惠子之喪子游為之麻衰牡麻絰惠子廢嫡立庶游為重服以譏之文子退扶嫡子南面而立曰虎也敢不復其位文子惠子兄也虎惠子嫡子子游趨而就客位所譏行復本位因殷之禮則可捨孫從周之文豈宜立庶孔聖庶抗嫡讓皇帝憲睿宗將建東宮以憲嫡長又嘗為太子而楚王有大功故久不定憲辭曰儲副天下公器時平則先嫡國雖則先功重社稷也使付授非宜海內失望臣以死請因泣涕固讓時大臣亦言楚王有定社稷功且聖庶抗嫡不宜更議帝嘉憲讓遂許之立楚王為皇太子頒大位而付豫天下文粹張說起義堂先后捨元子而立豫主鬯頒大位而付豫天下年長有德屬最尊親權德輿兩漢辨亡論梁冀貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王蒜年長有德屬最尊親可以靖人亦既定策冀乃憚其明哲且不利長君私於蠡吾竟使清河徙廢蠡吾為梗邦家陵夷漢道日蹙唐文粹有嫡子以為疑李泌太子妃蕭母郜國公主也坐蠱媚幽禁中帝怒責太子太子不知所對必入帝數稱舒王賢泌揣帝有廢立意因曰陛下有一子而疑之乃欲立弟之子臣不敢以古事爭且十宅諸叔陛下奉之若何帝赫然曰卿何知舒王非朕子對曰陛下昔為臣言之陛下有嫡子以為疑弟之子敢自信於陛下乎帝曰鄉違朕意不顧家族耶對曰臣衰老位宰相以諫而誅分也使太子廢它曰陛下悔曰我惟一子殺之泌不吾諫吾亦殺爾子則臣絶祀矣雖有兄弟子非所歆也不當廢嫡立庶陸象先公主既擅權宰相爭附之象先未嘗往謁及謀逆召宰相議曰寧王長不當廢嫡立庶也象先曰帝得立何也主曰帝有一時功今失德安可不廢對曰立以功者廢必以罪今不聞天子過失安得廢主怒更與竇懷貞等謀卒誅死辭讓十六白廢祀非孝也季子守節吳國高其賢玄成壞容漢朝誚其詐佯病狂不受寵爵然則教宜圖大禮在防人潔已中清雖稱高節承家失序恐紊大倫亂嗣必啓爭端違禮恐非理本泰伯讓周猶稱至德子曰泰伯可謂至德也三以天下讓民無得而稱焉無忌舉起且曰好仁宜承國命無隕家聲孟子曰無辭讓之心非人也孔撝遜姜皎帝以其藩邸舊思有以宣布之乃下詔曰朕既即位又參誅奸臣將厚以光寵每所撝遜陳讓牢切丁公著穆宗且許以相公著陳讓牢切廢先君之命文粹獨孤及吳季札論季子三以吳國讓而春秋褒之切謂廢先君之命非孝附子臧之義非公執禮全節使國篡君弒非仁泣涕固讓讓皇帝憲見捨嫡立庶門出唐史帝以憲實推天下有高世之行非大號不稱及追諡讓皇其子璡表陳憲宿素退讓不敢當大號本傳卜嗣十七白年鈞擇賢義鈞則卜年鈞以德德鈞以卜衛人以龜為有知見上注當璧而拜楚恭王有寵子五人無適立焉以璧見群望曰當璧而拜者神所立也乃埋璧於大室之庭康王跨之靈王肘加焉子干子晢遠之平王再拜皆壓紐衛孔成子筮立公子元元衛靈公遇屯史朝曰元亨又何疑焉屯象曰利建侯故成子立靈公厭紐之祥雖歸棄疾棄疾平王名見上注佩玉之兆終在石祁孔不宜養玄宗元獻皇后楊氏景雲初為良媛生男是為肅宗初肅宗生卜云不宜養乃命王皇后舉之后無子撫肅宗如所生以義則廢卜文粹獨孤及吳季札論異姓為後十八白榖梁莒人滅鄫莒鄫之外生以立為後非其族類故云滅家立異姓為後則曰亡國立異姓為後則曰滅非其祖以蒞祭祀滅亡之道也朱治以甥然為後吳未然本姓施氏朱治姊子初治朱有子然年十三啓孫策乞為嗣然為治行服訖乞依本姓不許然子復為施氏也蜀劉封本羅侯寇氏之子先主至荊州未有繼嗣養為後因為子衛繼兄弟五人為縣功曹縣長張君無子乞繼父許之時禁異姓為後故復衛氏陳矯晉陳騫父矯本劉氏為外祖陳氏所養因而改焉賈充以外孫韓謐奉充後詔曰外孫骨肉至近推恩繼情合於人心也庇身他族忘情本根螟蛉有子果裸負之孔以甥為嗣司空圖無人以甥為嗣嘗為御史所劾昭宗不責也世道衰人倫壞五代義兒傳世道衰人倫壞而親疏之理反其常干戈起於骨肉異類合為父子豈非因時之隙以利合而相資邪白無外家後漢王符有志操安定俗鄙庶孽而符無外家為鄉人之所賤也母賤史姑布子卿見無恤曰真將軍也趙簡子曰其母賤越婢也奚道貴哉子卿曰天所授也雖賤必貴阮孚字遙集母即胡婢晉書穰苴諸孽之子奪宗配嫡嬖子配嫡言如嫡也匹嫡裴秀母亦婢也孔不得過嫡子濮恭王泰月廩過太子遠甚諫議大夫褚遂良諫曰聖人尊嫡卑庶謂之諸君故用物不會與王共之庶子不得為比所以塞嫌萌杜禍源先王制法本諸人情知有國家者必有嫡庶庶子雖愛不得過嫡子如當親者疏當尊者卑則私恩害公故至亂國潘好禮疏玄宗皇后武氏將立潘好禮疏曰今人間咸言右丞相張說欲取立后功圖復相今太子非惠妃所生而妃有子若一儷宸極則儲位將不安古人所以諫其漸者有以也遂不果立寵冠諸兄田季安微賤公主命為已子寵冠諸兄自古受命之君必興滅國繼絶世立人之後重於封人之墓願收敘唐初逮今功臣絶者雖在支庶咸得承襲帝納其言褚無量白元身子太叔曰吾不亢身安能亢宗棄官則族無所庇葛藟猶能庇其本根春樹桃李夏得其蔭爾祖我躬不恤遑恤我後庇身自庇咎則辱先蔭宜恤後螽斯之慶子孫衆多也椒聊之實葛藟之根如或不能庇族則將焉用策名十代之宥漢有任子令故多以父任為郎庇身有地孔推與其甥張茂昭少子克勤開成中歷左武衛大將軍有詔賜一子五品官克勤以息幼推與其甥吏部員外郎裴夷直劾曰克勤骫有司法引庇他族開後日賣爵之端不可許詔聽遂著于令宦人用階蔭子鄭薰擢纍吏部侍郎時數大赦階正議光祿大夫者得蔭一子門施戟於是宦人用階請蔭子薰卻之不肯敘補弘文生房琯以蔭補弘文生雖襁負皆補清官李義府諸子雖襁負皆補清官以工巧蔭子韋貫之新羅人金忠義以巧工幸擢少府監蔭子補齊郎韋貫之不與曰是將奉郊廟祠祭階為守宰者安可以賤工子為之門庇公初為吏亦以門庇韓文房公墓銘凡用蔭一品子正七品上二品子正七品下三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正三品子從八品上從五品及國公子從八品下凡品子任雜掌及三公以下親事帳內勞蒲而選者七品以上子從九品上敘其任流外而應入流內敘品卑者亦如之九品以下及勳官五品以上子從九品下敘唐選舉志三品以上蔭曾孫五品以上蔭孫孫降子一等曾孫降孫一等同上
