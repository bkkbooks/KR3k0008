body:
  text: 卷第三十四白賓客主恭禮賓禮每進以讓禮周諺曰賓有禮主擇之左傳禮無違者子曰赤也束帶立於朝可使與賓客言儼若容樂與餌過客止老子我有嘉賓詩有客有客亦曰其馬有客宿宿言再宿也有客信信言四宿也主人慁賓慁患也東都主人西都之賓東道之主鄭謂秦曰若舍鄭以為東道主行李之曰來共其乏困書曰修五禮吉凶軍賓嘉洪範八政七曰賓天子諸侯無事則歲三田二為賓客宋公兼享晉楚之大夫趙孟為客座所尊也趙武謐文子季孫飲大夫酒臧紇為客臧武仲也主禮賓榮衛仲叔圉治賓客賓以特牲晉悼公救災之道守出門之恭再拜而見展及階之敬三揖乃升禮賓周禮大宰以八統馭萬民八曰禮賓賓客之式太宰以九式均節財用二曰賓客之式式請財用之節度以懷賓客懷安也周禮賓客之容周禮六儀二曰賓客之容謂矜莊也饗燕之禮周禮以饗燕之禮觀四方之賓客議賓周禮八辟二曰議賓之辟賓客有罪先議之殺禮周禮凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野外殺禮注節省其費用也客位主人敬客則先拜客客敬主人則先拜主人賓客之交讓而展敬飲食之用宴以合歡速賓禮主人親速賓速召也速客責人肅容而入百拜之儀序賓次序也庖有魚不利賓易不速之客三人來敬之終吉易賓之初筵我客戾止永觀厥成詩周禮凡賓客至委積膳獻飲食賓客賜之餐牢注餐食始至小禮也庖人掌賓客之禽獻謂獻禽之賓客凡行人之儀不朝不夕不正其主面亦不背客謂儐相傳辭不正東向不正西向常視賓主之前卻得兩向而已野廬氏掌若有賓客則令守涂地之人聚懷有相翔者誅之相翔謂伺候將為盜者環人掌送迎邦國之通賓客舍之授館令聚柝有任器則令環之命野廬氏諸侯賓至奠設庭燎賓至如歸傳國語單襄公如楚候不在彊司空不視塗澤不陂川不梁膳宰不致餼宣詔曰或擅興徭役飾廚傳稱過客廚飲食傳傳舍使人及過客來者稱其意置驛馬迎賓客鄭莊當時為太子舍人每五日沐浴常置驛馬長安四郊請謝賓客夜以繼日好黃老術慕長者知友皆大父行天下有名之士戒門下客至亡貴賤無留門執賓主之禮以貴下人性廉東閣公孫弘起客館開東閣延賓客公孫賀劉屈厘壞為馬廄奴婢室也曳裾王門鄒陽上書曰臣飾庸陋則何王之門不可曳長裾乎君門如市上責鄭崇言賓客多鄭莊汲黯為九卿兩人中廢賓客益落落散也填門瞿公為廷尉賓客填門及廢門外可設雀羅坐上客怕滿樽中酒不空孔融為太中大夫性寬少忌好事誘益後進常嘆曰云云吾何憂後漢崔瑗字子玉好賓客盛肴膳極滋味不致余産居常自疏食秋官野廬氏掌野之道路宿息井樹宿息廬之屬客所宿及晝止者也井共飲食樹為藩蔽子姑就館敢辱大館叔弓如晉辭館云疲倦蜀張裔字君嗣為諸葛亮長史北詣亮咨事送車數百兩與親故書曰晝夜接賓客人敬丞相長史男子張君嗣疲倦欲死勢利王雅茂達時王珣男婚賓客甚衆忽聞雅拜太子少傅回謁雅者過半時俗頽敝無復廉恥又大將軍青退歸驃騎去病日貴青門下客多去事驃騎輒得官爵唯任安不去歌詩漢書儒林傳王式翁思征為博士既至諸博士持酒肉勞之博士江公心嫉式謂歌吹諸生曰歌驪駒式曰聞之師客歌驪駒主人歌客無庸歸今日諸君為主人日尚早未可也江公曰經何以言之式曰在曲禮江公曰何狗曲也式曰恥為豎子所辱遂免歸孔一見謝不往李藩拜祕書郎王仲舒與同舍郎韋成季呂洞日置酒邀賓客相樂慕藩強致之仲舒等為俳說廋語相狎昵藩一見謝不往曰吾與終日不曉所語何哉家客馬周至長安舍中郎將常何家貞觀五年詔百官言得失何武人不涉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之門無雜賓李景讓清素寡欲門無雜賓李琢罷浙西以同里訪之避不見及去令斸其騙石焉廢斥鄭畋李德裕高其才令狐綯繼當國皆怨德裕其賓客並廢斥貴盛賓客無敢忤杜顗李德裕奏為浙西府賓佐德裕貴盛賓客無敢忤惟顗數諫正之及謫袁州嘆曰門下愛我皆如顗吾無今日由東廂進薛戎福建觀察使柳冕辟佐其府先是馬總佐鄭滑府監軍宦人誣劾之貶泉州別駕冕欲除總以附幸家即使戎攝剌史按置其罪戎曰以是待我耶我始不願仕正謂此爾不肯從還白其狀冕怒據案引戎入戎叱引者曰見賓客乃爾乎是東廂進冕度未可屈揖而去之奇客崔弘禮過宣武從劉玄佐獵酒酣顧曰崔生獨不知此樂耶弘禮笑曰我固喜武請為公歡玄佐臂鷹與弘禮馳逐急緩在手一軍驚曰安得此奇客玄佐大悅欲留之固辭延賓客日夜劇飲陽城拜右諫議大夫與二弟延賓客日夜劇飲召賓客言噱流連杜亞拜淮南節度使雅意丞弼厭外官往往不親事日夜召賓客言噱流連進官大集客李端趙州人始郭曖尚升平公主主賢明有才思尤招納士故端等多從曖游曖嘗進官大集客端賦詩最工待以賓友吳武陵淮西吳少陽聞其才遣客鄭平邀之將待以賓友武陵不答賓友日疏散玉樽亦已空李白東武吟高談滿四座一日傾千觴歸家酒債多門客粲成行高談滿四座一日傾千觴賜劉都使青雲客寄上吳王蛾眉笑躄者賓客去平原卻斬美人首三千還駿奔送薛九候眉宇之陽氣唐文粹李嶠上高長史書亦曾越嚴序趍下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因門下三千毛遂乏處囊之地喜賓客未嘗以有無計畢構捶牛撾鼓會衆賓李白猛虎行丈夫相見且為樂捶牛撾鼓會衆賓謂從丹霄落乃是故鄉親李白門有車馬客行門有車馬賓金鞍耀朱輪謂從丹霄落乃是故鄉親鄭驛正留賓杜甫贈王侍御村中好客稀寄范員外好客二白宴以禮成賓由主擇我有旨酒以宴樂嘉賓之心詩公子敬愛客終宴不知疲客從遠方來門有車馬客無留門鄭莊字當時遷司農戒門下曰客至無貴賤無留門司農愛客戒無留門丞相延賓使常開闔捧銅盤而盟平原之賓二十毛遂在十九人末要楚盟後呼十九人上盟曰公等碌碌所謂因人成事者也遂為上客躡珠履而會春申之客三千春申君楚相黃歇也開文舉之樽見上注式宴以衎不醉無歸詩開孟嘗之門投陳遵之轄遵大飲酒賓客滿座取客車轄投井中雖有急不得出管仲會國用三分二在賓客謂二以供賓客也其一在國管仲懼以白桓公公曰吾子猶若是乎四鄰之賓客入者悅出者譽延譽於言光名滿天下入者不悅出者不譽汙名滿天下名之為貴財安可有財不足也仲尼曰君之明也賓至如歸傳彈鋏之士馮歡在孟嘗門下彈鋏歌曰歸去來出無車食無魚孟嘗聞之乃與車魚鋏劍也周公下白屋之士一沐三握髮一飯三吐哺倒屣之主人蔡雍倒屣迎王粲粲字仲宣登龍之上客孔融謁李膺接士董允字休昭與費褘胡齊等期遊董恢詣允修敬恢年少官微見允嚴駕逡巡求去允乃罷期留恢其接士有如此者饌精粗見飲食部儉薄門注宴戲吳諸葛融每延賓高會休吏假求賓客所能乃合榻促席選對博奕或摴蒱投壺弓彈甘果繼進清酒徐行融周覽不倦也解陳蕃之榻登李膺之門置鄭莊之驛見上注主人必倍食嘉賓得以盡心崔瑗好賓殫極滋味見上孔建請還第與士大夫相見裴度德宗時宰相闔門謝賓客度以時多故宜延天下髦英咨籌策乃建請還第與士大夫相見詔可于志寧愛賓客與賓客相娛樂牛僧孺治第洛之歸仁里多致嘉石美木與賓客相娛樂散家資養客李客軒然坐客上邢君牙初布衣張汾者無紹而干君牙軒然坐客上會吏擲簿書以盜沒宴錢五萬君牙怒其欺汾不謝去曰吾在京師聞邢君牙一時豪傑今與設吏論錢云何君牙慚遽釋吏引為上客留月餘以五百縑為謝其屈已好士類此好接士稱人之長柳璟好接士稱人之長游其門者它日皆顯於世對賓客無少倦賈耽每歸第對賓客無少倦世謂淳德有常者置酒置估朱坡樊川頗治亭觀林藪鑿山取泉與賓客置酒為樂與賓客娛樂李日知既罷不治田園惟飾台池與賓客娛樂李適之喜賓客喜延四方之士石昂家有收數千卷喜延四方之士無遠近多就昂學食其門下者或纍歲昂未嘗有怠色五代史降階勞問平生高智周白翟公署門翟公為廷尉賓客交集後免門可張雀羅後復為廷尉賓客欲至翟公乃署門曰一貴一賤交情乃見主父不內主父偃為齊相至齊散五百金與昆弟賓客數之曰我貧時昆弟不我衣食賓客不我內門今吾與諸君絶矣無復入偃之門不招賓客蘇建責大將軍青不招賢青曰招賢絀不肖人主之柄也人臣奉職而已何招士大夫哉市道史記廉頗失勢客盡去及後用又復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則進無勢則去此固其理又何怨焉魏其侯灌夫俱失勢賓客盡衰二人相引繩排擯生平慕之後棄之而去者孔閉閣皇甫無逸徙益州長史閉閣不通賓客左右無敢出入者闔門襄度始德宗時常伺中朝士相過金吾輒飛啓宰相至闔門謝賓客謝賓客不與通尉遲恭晚節謝賓客不與通請謝蕭俯既老家於洛歲時賓客請謝以為煩乃舍濟源墅李元素謝客元素內望作宰相久之不見用則謝賓客曰無以官散外我寡游合顏師雍不接令狐楚客有以星步鬼神進者一不接退約少合蕭廩為人退約少合寡諧比吳兢少厲志吳直寡諧比不與人交高郢恭謹不與人交寡合劉禹錫年益晏偃蹇寡所合顏師古頻被譴仕益不進罔然喪沮乃闔門謝賓客門無賓謁孔禎歷監察御史門無賓謁時譏其介不喜賓客史洪肇不喜賓客嘗言文人難耐呼我為卒五代戒門以絶韓文賓客不通溫彥博賓客不通進見必陳政事利害賓客之害昔漢武謂田蚡曰君除吏盡未吾亦欲除吏哀帝責鄭崇曰君門如市何以欲禁切主上皆賓客之害吾謂丞相閉關謝絶賓客則朝廷靜德裕窮愁志不喜賓客蕭至忠不喜接賓客以簡儉自高行旅四白旅焚其次喪其僮僕旅人先笑後號咷易行邁靡靡馳也中心搖搖憂也君子於役不知其期曷至哉不知及時不日不月汶水湯湯行人彭彭多也大夫跋涉我心則憂草行曰跋我徂東山滔滔不歸詩婦嘆于室之子于征劬勞于野順彼長道秋蓬之轉月捷之勞豈敢定居一日二捷靡所底戾征夫捷捷蕭蕭馬鳴侁侁征夫每懷靡及匪居則寧不遑啓處乃裹餱糧千橐千囊行道遲遲人生天地間忽如遠行客古詩不有行者誰悍收圉跋涉山川蒙犯霜露以逞君心羇旅之臣幸若獲宥莊子曰適莽蒼者三餐而反腹猶果然莽蒼近郊兒果然飽也適百里者宿舂千里者三月聚糧不齎糧漢書上使鄭莊視可決請治行五日上曰吾聞莊行千里不齎糧式微之詠詩云式微式微胡不歸微君之故胡為胡中露高蹈之歌齊人哥曰魯人之皋數年不覺使我高蹈高蹈謂遠行也四方之志萬里之游懷安敗名奚自猶言自何來也日暮塗且遠遊子悲故鄉古詩遊子暮何之李陵詩行旅羈旅西征賦云遠行有羇旅之情辭邦去里車馬有行色行人遊子父母在不遠遊遊必有方方常也口倦乎叱吒手苦乎轡箠朝冒霧露晝披塵埃夏為大暑暴炙冬為寒風偃薄楚辭曰悲哉秋之為氣憀栗兮若在遠行登山臨水送將歸道敝道長吳王謂季孫曰國君道長大夫不出門何謂也注謂長於道路駕言徂矣窮日力鴻旅於淄歸不復孔不齎糧魏徵帝納之不疑至是天下大治行旅不齎糧取給於道棄官去客秦州杜甫出為華州司功參軍關輔饑輒棄官去客秦州往來鄠杜間蕭穎士俄免官往來鄠杜間行千里不持尺兵食貨志天寶三載道路列肆具酒食以待行人店有驛驢行千里不持尺兵雪虐風叨韓文背笈篋懷筆牘柳宗元送文郁師讀孔氏書遁而之釋背笈篋懷筆牘挾海泝江獨行山水門羈旅道路辭親入關羈旅道路韓愈論薦侯喜狀飄轉況我飄轉無所定終日戚戚愁羈旅杜甫嚴氏溪放歌絶同鄉之人文粹歐陽詹居閩至于吳則絶同鄉之人矣自吳至于楚則絶同方之人矣犯雪過西華韓愈詩旅程愧淹留韓游湘西寺詩心飛秦塞雲影滯楚關月李白江南天津老人裴晉公微時羇遊洛中一日策蹇驢上天津橋時淮西不庭已數年矣有二老人倚柱立曰蔡州何時得平見晉公愕然而退有僕夫在後聞其語曰適憂蔡州未平須得此人為將僕邃告公曰見我龍鍾故相戲爾出劇談録秋風飄我行遠與淮海期韋應物將往江淮南徙莫從北遊失路李白上李長史書靡靡踰阡陌人煙渺蕭瑟杜甫北征我行已水濱我僕猶木末上客舍盈樽酒江行滿篋詩韋應物楊州偶會盧主簿天長水闊厭遠涉訪古始及平台間李白梁園吟且悲就行役安得營農圃李白古風連山去無際流水何時歸李白秋夕遠遊凌絶境杜甫詠懷東遊西還杜甫嚴氏溪放歌東遊西還力實倦從此將身更何許風物悲遊子寄王侍郎詩萍泛苦寅緣詠懷鳴蟬遊子意促織念歸期李白詩天荒地老馬周昔作新豐客天荒地老無人識李賀被冒畏景涉降棧道柳宗元送辛殆庶序枚乘客於吳相如游於梁或致書匡主用極其志節之大者也適時觀變以成其性節之茂者也柳文送南容解所乘馬以遺王義方孤窶舉明經詣京師客有徒步疲於道者自言父宦遠方病且革欲往省困不能前義方哀之解所乘馬以遺不告姓名去由是譽振一時樊澤舉賢良次潼關雨淖困不能前有熊執易者同舍逆旅衰之輟所乘馬傾楮以濟之自罷所舉是歲澤上第本傳逆旅五白保於逆旅逆旅旅舍主人盤飧之饋館穀砥寧攸寧不受報後漢周陽少孤微嘗修逆旅以供過客而不受報無驗商君仁至關不得舍曰商君令舍人無驗者死商君嘆曰為法自敝除逆旅置官樆晉時以逆旅逐末廢農亡命依湊敕當除之十里置一官樆使老小貧戶守之差令主掌依客舍收錢潘安仁議曰謹按逆旅久矣行者賴頓止居者薄收其直各得其所故國語曰許由辭帝堯之命而舍逆旅詩外傳曰陽處父過寧舍於逆旅魏武詩曰逆旅整設以通商賈然則唐堯到今未有無舍之法唯商鞅尤之朝廷從之不纍主人劉實字子真杖策徒行每止不纍主人薪水自備主人之恩孔新豐逆旅馬周舍新豐逆旅主人不之顧起逆旅卒為名臣舒元輿上書言馬周張嘉貞代人作奏起逆旅卒為名臣為逆旅上謁劉從諫傳甄戈者頗任俠從諫厚給恤坐上座自稱荊卿從諫與定州戍將有嫌命戈取之因為逆旅上謁留飲三日乘間斬其首困廣陵間不自振唐李藩年四十餘困廣陵間不自振妻子追咎藩晏如也邸店羅列五代趙在禮歷鎮泰寧天平所至邸店羅列倣徨逆旅李周為內丘捕賊將以勇聞是時梁晉兵爭山東郡盜充斥道路行者必以兵衛內丘人盧嶽將徙家太原舍逆旅倣徨不敢進周意憐之為送至西山有盜從林中射嶽中其馬周大呼曰吾在此孰敢爾耶盜聞其聲曰此李周也因各潰去五代史與諸生共逆旅李勉少貧狹客梁宋與諸生共逆旅諸生疾且死出白金曰左右無知者幸君以此為我葬餘則君自取之勉許諾既葬密置餘金棺下後其家謁勉共啓墓出金付之同舍逆旅見上樊澤注離別六白悲莫於生別離楚辭登山臨水迭將歸燕燕衛莊姜送歸妾也涕泣如雨瞻望不及佇立以泣詩離群索居之子于歸遠送于野詩驪歌別歌也雲雨之別攜手上河梁遊子暮何之李陵別蘇武詩離別之聲吳越春秋勾踐將伐吳乃命國中與之訣而國人悲哀作離別之聲鹿聚孔叢子高與鄒文季節為友季節歸魯臨別流涕子高抗手而止曰人生豈當如群鹿聚黯然銷魂者唯別而已矣不拜東觀漢記陳遵使胸奴辭王丹丹曰無以相贈贈子以不拜遂揖而別遵甚悅古東門行敘別離事倦客怨離聲鮑昭詩有女仳離摻執子之手兮摻執子之祛兮別行子於東門啜其泣矣送美人於南浦傷如之何自我不見于今三年誰謂宋遠宋襄母思歸衛詩云氣怨結而不暢涕滿泣而橫流風流雲散一別如雨文選嵇康呂安皆曠達之士每一相思千里命駕老子送孔子曰仁者贈人以言孔慟泣與訣則天皇后武氏召為才人方十四母楊慟泣與訣后獨自如曰見天子庸知非福何兒女悲乎母韙其意止泣悲離之作尤極於古文粹元稹杜甫志曰悲離之作尤極於古銷魂橋唐開元遺事長安東灞陵有橋往來迎送皆至此橋為別離之地故人呼為銷魂橋睽離在期韓愈睽攜同上人生幾何離闊如此不見足下面已三年矣人生幾何離闊如此況以漻漆之心置於胡越之身進不得相合退不能相忘牽攣乖隔各欲白首白居易與元稹書風吹客衣日杲杲樹覺離思花冥冥杜甫歌行遠別隔兩河雲山杳千重李白魏都別蘇少府離思春冰泮爛熳不可收韓愈遠遊聯句病添兒女戀老喪丈夫勇會合聯句三見秦城緑離居在咸陽三見秦城緑李白以詩代書草戚韋蘇州送李侍御契闊晚相遇草戚遽離群離情雨飄斷不異風中絲張籍別段生浮雲天上雨墮地暫時會合終離異莫東西相逢半新故取別隨薄厚杜甫詩復為萬里別送子山之阿杜甫別唐十五滿堂送客皆惜別李白送弟絲桐感人絃亦絶滿堂送客皆惜別明日斗酒別惆悵清路塵遙望長安日不見長安人同上十離詩唐托言元相公在浙東時賓府薛書記酒後爭令以酒器擲傷公由此出幕既去作十離以獻十離者犬離主筆離手馬離廄鸚鵡離籠燕離巢珠離池鷹離韝竹離亭鏡離臺筆詩曰越管宣毫始稱情紅箋紙上散花瓊都緣用久鋒頭盡不得羲之手裏擎竹詩云蓊鬱新栽四五行常將貞節負秋霜為緣春筍穿牆破不得垂陰覆玉堂它詩皆類此也別離慘至今斑白徒懷曩杜甫鄭公虔詩浮雲一別後流水十年間韋應物淮上喜會故人解手背面韓愈祭河南友人張員外文曰分教東生君掾雍首兩都相望於別何有解手背面遂十一年君出我入如相避然生闊死休吞不復宣伏枕聞別離疇能忍漂寓杜詩傷離枉芳札韋應物詩餞送七白登山臨水送將歸楚辭仙舟郭林宗自京師歸諸儒送至河上林宗唯與李膺同舟而濟人謂之仙舟贈言見上注送美人兮南浦楚辭出宿于濟飲餞于禰詩申伯信邁王餞于郿詩贈策傳士會將歸晉秦大夫繞朝贈之以策注云以有策而不用也慕從西征賦曰送歸懷慕從之戀送子涉淇之子于歸遠送于野燕燕見上注送荊軻於易水餞疏廣於東門謂東都門也清酒百壺韓侯出徂出宿于屠顯父餞之清酒百壺薄送我畿畿門內也晉侯贈餞如公會侯伯之禮加以宴好國語谷永與段會宗書曰朋友以言贈行萬里之外以身為本高祖以吏繇咸陽吏皆送奉錢三而蕭何獨以五送也送者不出郭陳蕃為豫章太守性峻不接賓客徵為尚書令送者云云供帳東都門祖二疏也瞻望不及佇立以泣衛莊姜送歸妾詩孔御安福門杜元穎出為劍南西川節度使帝為御安福門臨餞供帳餞定鼎門外蕭嵩領朔方節度使既赴軍有詔供帳餞定鼎門外玄宗賦詩勞行還鎮帝賦詩以餞張建封鎮徐州還鎮帝赴詩以餞當時雖馬燧渾瑊劉元佐李抱真等勳寵卓越未有以詩餞者賦詩祖道張柬之授襄州剌史中宗為賦詩祖道又詔群臣餞定鼎門外餞太液亭崔鉉出為淮南節度使帝餞太液亭賜詩寵之祖道洛濱許景先帝自擇剌史景先由吏部侍郎為剌史治虢州十一人治行詔宰相諸王御史以上祖道洛濱盛具奏太常樂帛舫水嬉命高力士賜詩且給紙筆令自賦賚絹三千遣之李績入朝張文瓘補并州參軍時李績為長史常嘆曰矬圭今之管蕭吾所不及績入朝文瓘與屬僚二人皆餞獨餞於野皇甫鎛之貶前坊州剌史班肅以嘗僚獨餞於野朝廷義之宰相百官班餞李光顏復還忠武宰相百官班餞帝御通化門臨送于郊倪若水為汴州剌史時天下久平人皆重內任雖自冗官擢方面皆自謂下遷班景倩自揚州採訪使入為大理少卿過州若水餞于郊顧左右曰班公是行若登仙吾恨不得為騶僕也御通化門祖道李吉甫為淮南節度使帝為御通化門祖道臨門送汝韓愈平淮西碑云庚申豫其臨門送汝送臨賀楊憑所善客徐晦憑得罪姻友憚纍無敢往者獨晦至藍田慰餞宰相權德輿曰君送臨賀誠厚無乃為纍乎晦曰方布衣時臨賀知我今忍遽棄耶有如公異時為姦佞譖斥又可爾乎德輿嘆其直稱之祖客灞上項斯江東人楊敬之祖客灞上見閩人濮陽願閲其文大推挹群公追餞于灞陵列筵而觴送遠之賦圭璋交映柳宗元送苑論登第歸文追而送之江之滸薛存義將行柳子載肉于俎崇酒於觴追而送之江之滸黃鵠一去青冥無極安得不憑豐隆訴蜚廉以寄聲於寥廓邪送兀十八南遊樂酣相顧起征馬無由攀群花散芳園斗酒開離顏樂酣相顧起征馬無由攀李白送族弟凝臨歧惆悵若為分江上送行無白璧臨歧惆悵若為分送陳郎將餞離駐高駕惜別空殷勤餞六父促觴激萬慮掩抑淚潺湲杜甫湘江宴餞詩餞別起登臨之思劉禹錫管城驛記送子清秋暮杜甫送殿中楊監送子清秋暮風物長年悲群公踐南陌餞裴端公赴道州詩群公踐南陌肅肅秩初筵前驅入寶地祖征飄金繩杜甫惠義寺餞崔都督開筵引祖帳慰此遠徂帳憶舊遊開筵引祖帳慰此遠徂征鞍馬若浮雲送子驛騎亭李白送夫君於天涯惜餘春賦望夫君兮只咨嗟橫涕淚兮怨春華遙寄影於明月送夫君於天涯李白賢豪相追餞卻到棲霞山李白送族弟凝攝宋城主薄至月橋送君別有八月秋颯颯蘆花復益愁雲帆望遠不相見日暮長江空自流李白送別愁腸若牽繩韓詩祖帳排舟數杜詩白以遨以遊詩駕言出遊以寫我憂詩挑兮達兮在城闕兮挑達往來相見兒詩子之湯兮宛丘之上宛丘剌陳幽公遊蕩無度晉趙文子觀於九原曰樂哉斯丘可以遠眺望月今五月登城不指常事曰視非常曰觀谷梁傳禁屬遊飲食于市者周禮盤遊慢遊是好寓目憑軾而觀縱觀逸遊是娛孔遨遊林墅盧鈞始被召自以當輔政既失志故內怨望數移病不事事遨遊林墅纍日一還酣遨裴耀卿蓋嘉運詔為河西隴右節度使嘉運以新立功日酣遨未赴屯耀卿言於帝召故人出游柳渾罷政事免後數日置酒召故人出游酣肆乃還曠然無黜免意登葛憒山王勃既廢客劍南嘗登葛憒山曠望慨然長思不騖遠不陵危環山洄江四出如一誇奇競秀或不相讓遍行天下唯是得之柳訾洲記忽焉若飄浮上騰以臨雲氣伐惡木刜奧草前指後劃心舒目行忽焉若飄浮上騰以臨雲氣萬山面內重江束隘聯嵐合耀旋視其宜常所未睹同上窮回溪幽泉怪石無遠不到到則披草而坐傾壺而醉西山記登高巖而企踵兮瞻故邦之殷轔山水浩以蔽虧兮路蓊勃以揚氛柳宗元閔生賦雲水登臨多聞放忐杜牧趙真齡制于暮之春征賢合姻登舟于茲水之津連山倒垂萬象在下浮空泛景湯若無外橫碧落以中貫陵大虛而徑度羽觴飛翔匏竹激越熙然而歌婆然而舞持頤而笑瞪目而倨不知日之將暮則於向之物者可謂無負矣柳宗元南池亭其崖谷之委會則泓然為池灣然為溪其上多楓柟竹箭哀鳴之禽其下多芡芰蒲蕖騰波之魚韜函太虛淡灩里閭誠游觀之佳麗也同上曠望延駐目杜甫上後園山腳曠望延駐目飄颻散疏禁相思九白自我不見于今三年詩靜言思之悠悠我思願言思伯我之懷矣實勞我心瞻彼日月有懷于衛靡日不思我思不遠豈不邇思遠莫致之室是遠而如之何物一日不見如三秋兮如三月兮無思遠人勞心忉忉忉忉憂也忘我實多伊可懷也未見君子憂心奕奕忡忡千里命駕見上注夢想見容輝我思故人孔桑榆儻可收願寄相思字韓愈寄李大夫詩怨莫怨兮唐文粹皮日休諷見逐怨莫怨兮新相思相思之苦懷劉禹錫答柳子厚書相思之苦懷膠結贅聚至是泮然以銷所不如晤言者無幾未能忘情忍不酸鼻文粹劉軻與陸賓虞書兩心始親而形骸已相遠苟未能忘情忍不酸鼻出涕為吾友之思耶交游颯向盡宿昔浩茫然杜甫交游颯向盡宿昔浩茫然促觴激萬慮掩抑淚潺湲風波離思滿宿昔容鬢改韋應物淮上寄親故灑別淚於尺波寄東流於情親李白愁陽春長望杳難見浮雲橫遠山李白詩置書雙袂間引領不暫間長望杳難見浮雲橫遠山佳期綵雲重欲贈隔遠天擬古同上經過十白王商過樓護護字君卿為天水太守免官居長安都城侯王商為大司馬候護護宅狹小官屬立車下久住欲雨主簿謂諸掾曰不肯強諫天雨立閭巷耶商聞之遂去主簿終身廢之陳遵飲左氏遵為河南太守弟伋為荊州牧之官俱過長安富人左氏飲司直陳崇效遵過寡婦左氏家飲免官伐申過鄧傳楚文王伐申過鄧鄧侯曰吾甥也止而享之臧武如晉雨過御叔御叔將飲酒曰焉用聖人我將飲酒而已雨行何以聖為注武仲多智人謂之聖人田蚡謂灌夫曰欲與仲孺過魏其侯會仲孺有服灌夫曰將軍乃肯幸臨魏其侯夫安敢以服為解母截髮待賓陶侃字士行孝廉范逵嘗過侃時倉卒無以待賓客母截髮為二髲以易酒肴極豐備從者亦過望怒直進王忱字元達桓玄詣忱通人未出乘興直進忱對玄鞭門人玄怒去忱亦不留不交客言嵇康夏月於大樹下煆向子期佐之鍾會結客同造之康視煆如舊傍若無人良久不交一言會去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去大恥之遂深怨恨理髮謝安為桓溫司馬溫詣安安方理髮安性遲緩久而方罷令取幘見留之曰令司馬著帽進其見重如此也入沭王恬傲誕不拘禮節謝安造之坐少頃恬便入內安以為必厚待己久之乃沭頭散髮而出竟無賓主之意不過從兄第五倫字伯魚迎送董賢為司馬上令私過孔光光雅恭謹知上欲尊賢乃戒衣冠出門望見賢車乃入拜謁恭迎不敢均敵上悅拜光兄子為諫議大夫王獻之子敬經吳郡聞顧辟強有名園先不相識乘平肩輿俘入辟強方集賓客獻之游歷傍若無人辟強怒曰傲主人非禮也以貴驕士非道也令倉頭驅出獻之傲然亦不屑意孔杖屨經過齊浣留司東都嚴挺之亦為林甫所廢與浣家居杖屨經過不缺口迎送敕使皆有常處鄭珣瑜江南君凡迎送敕使皆有常處吏密識其馬進退不數步差過王繇王鉷子隼以鬥雞供奉禁中過駙馬都尉王繇既置酒永穆公主親視供具萬年尉賈季鄰等候准經過敕具酒食王圭與房元齡杜如晦善母李嘗曰見必貴然未知所與游者何如人會元齡等過其家李窺大驚敕具酒食歡盡日不迎不送五代裴皞桑維翰已作相嘗過皞皞不迎不送人或問之皞曰我見桑公於中書庶僚也桑公見我於私第門生也何迎送之有人以為當東阡北陌杖屨來往占之老於鄉者將自佚非自苦閭井田宅具在親戚之不仕與倦而歸者不在東阡在北陌可杖屨來往也韓愈孔公銘經過老自休杜甫還灞上遊干謁十一白范睢為須賈御入相府曰我為君先通相君張儀謁蘇秦秦戒門下不為通又不得放去數日方見之坐於堂下以激儀也上謁雋不疑曼倩冠進賢冠帶礧具劍上謁暴勝之上謁若今通名也不避寒暑張湯請謁云云掃門魏勃欲見曹參早掃齊相舍人以自達書剌高紀有謁者自書剌以言爵里若今之通名也景丹性清高未嘗修剌謁人覆剌高彪有雅才從馬融訪大義融乃辭疾不見彪覆剌遺融書云云融慚乃追之剌字漫滅彌衡來遊許下陰懷一剌既無所適於是剌字漫滅奏剌夏侯湛事見聰悟門注六卿之門宋公子魚無日不數於六卿之門朱博馳騁進取不師道德莫為我先先容也漢書孔融年七歲謁李膺門下不為通融曰我與李府君親舊門下具白之膺見融問何親融曰先君孔子與老君有師資之道故僕與君亦纍世通舊也露索蕭望之王仲翁俱欲謁見霍光光自上官祭事後出入自備士當見者皆露索去刀兵兩史挾持望之獨不肯受索曰下願見非周公握髮之禮徑入哭後漢趙一元叔為郡計吏到京師造河南尹羊涉不得見一以非涉無托名者乃日到門涉許通尚臥未起徑入上堂曰竊伏西州承高風久矣乃今方遇而忽然奈何命也因舉哭聲涉知非常人乃起延話大奇之追不顧趙一為羊涉所稱名動京師西還過弘農侯太守皇甫規門者即不通一遂遁規知是一大驚進之一不顧而去一逢掖王符節信性耿介皇甫規解官歸安定卿人有以貨買雁門太守者亦去職還書剌謁規規臥不起既入問君前在郡食鴈美乎有頃白符在門規驚遽出迎入語曰徒見二千石不如一逢掖養痾傲士固其宜也高彪覆剌遺馬融書云徑上床蜀彭羡見龐統統非羡故舊又有賓客徑上統床臥曰須賓客罷與卿談賓罷請食然後語統大奇之修剌候通步騭字子山與衛旌種瓜自給夜誦經傳會稽焦征羌豪縱二子懼為所侵乃共修剌奉瓜謁征羌不時通旌欲去騭曰畏之而來非慕義也屈何傷乎孔拒郤常袞性狷潔遷禮部侍郎時宦者劉忠翼權震中外涇原節度使馬璘為帝寵任有所干請兗皆拒郤不往韋純京兆尹李實曰與我同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷終不肯詣韋肇為元載所惡載曰肇若過我當擇善地處之終不肯詣載過府不謁溫庭筠薄於行調方山尉不得志去歸江東令狐綯方鎮淮南庭筠怨居中時不為助力過府不謁不顧竇參按江淮獄楊州節度使陳少游偃蹇不郊迎遣軍吏致問參厲辭譙責少游慚往謁參參不顧即去伺望顏色親執轡箠張昌宗貴震天下諸武兄弟及宗楚客等爭造門伺望顏色親執轡箠唐史厚以金謝王播既失職見王守澄方得君厚以金謝守澄乘間薦之天子有意復用於是諫議大夫獨孤剆等見延英言播傾邪關通帝左右狀帝沖暗不納其言僕妾干謁柳澤上疏且斜封官者皆僕妾干謁迷謬先帝仕進干請不結子弟則謁主書元載得君縱諸子弟關通貨賄凡仕進干請不結子弟則謁主書私謁盈几不省孔緯為吏部侍郎權要私謁至盈几一不省當路否悅改太常卿具軍容伏謁柳公綽牛僧孺罷政事為武昌節度使公綽具軍容伏謁左右諫止之答曰奇章始去台宰方鎮重宰相所以尊朝廷也非慶吊不至宰相第柳仲郢在朝非慶吊不至宰相第以州民入謁胡證拜振武軍節度使過河中時趙宗儒為帥以州民入謁里人榮之謝絶請謁高郢進禮部侍郎時四方士務朋比更相譽薦以動有司徇名忘實郢疾之乃謝絶請謁請謁不行李乂為吏部侍郎典選事請謁不行時人語曰李下無蹊徑後至宋璟會有喪告滿入朝公卿以次謁通禮意易之等後至促步前璟舉笏卻揖唯唯故積怨常欲仲傷賕謁紛紜長寧公主韋庶人所生內倚母愛寵傾一朝與安樂宜城二主後媦郕國夫人爭任事賕謁紛紜趨階降伏唐持太和中為渭南尉試京兆府進士時尹杜悰欲以親故托之持輒趨階降伏悰語塞乃止荔枝圖劉宗龜因舊或于以財率不答但寫荔枝圖與之負勢賕請任環歷職有功然補吏多為親故人私至負勢賕請環知不甚禁遏請托為姦姜晦為吏部侍郎主選曹史嘗請託為姦前領選者周棘扈藩檢窒內外猶不禁至晦悉除之上謁軍門房玄齡太宗以燉煌公徇渭北杖策上謁軍門一見如舊崔挹為人請托干湜見父子門令狐峘在吏部因尚書劉晏刀時楊炎為侍郎故峘內德晏至分闕以善闕奉晏惡闕與炎炎心不平建中初峘為禮部侍郎炎執政不為憾炎出故宰相杜鴻漸門下其子封求弘文生以託峘峘謝使者曰得公手署峘得以職炎不疑署送之峘即日奏言宰相迫臣以私從之負陛下不從則害臣帝以詰炎具道所以然帝怒貶衡州別駕不憚寒暑李敬玄造請不憚寒暑公行私謁韋嗣立上書曰垂拱間仕入彌多公行私謁私造韋弘景吏部員外郎楊虞卿以纍下吏詔弘景與御史詳讞虞卿私造門弘景厲言曰有詔按公尚私謁耶虞卿多朋助自謂必見納及是惶恐去慢折蘇味道性友愛其弟味元嘗請託不遂因慢折之味道怡然不屑先賂關子李逢吉其黨有張又新等八人而傳會者又八人皆任要劇故號八關十六子有所求請先賂關子後達於逢吉無不得所欲日見賓客於第李宗閔楊虞卿日見賓客於第無間韋瓘纍中書舍人與李德裕善德裕任宰相罕接士唯瓘往請無間也恥污詖謁席豫太平公主聞其名將表為諫官豫恥污詖謁遁去干財趙隱始布衣時家無資與兄騭同耕以養雖姻宗之富未嘗干以財干請不應鄭畋時田令孜恃權有所干請畋不應願罷所授沈傳師初拜官宰相欲以姻私託幕府者傳師固拒曰誠爾願罷所授後生內謁必引見諄諄鄭餘慶後生內謁必引見諄諄教以經義務成就儒學抳杜干請牛徽擢吏部員外郎乾符中選曹吏多姦歲調四千員徽治以剛明抳杜干請法度復振願事鞭靮封常清年三十未有名高仙芝為都知兵馬使嘗出軍奏傔從三十餘人衣㡚鮮明常清慨然投牒請豫常清素瘠又腳跛仙芝陋其貌不納明日復至仙芝謝曰傔已足何庸復來常清怒曰我慕公義願事鞭靮故無媒自前公何見拒深乎以貌取士恐失之子羽公其忘之仙芝猶未納乃日候門下仙芝不得已竄名傔中私謁之書呂胃遷禮部侍郎與裴延齡為姻家擢其子操上第會入朝遺私謁之書于廷出為潭州剌史卒以私託人鄭珣瑜未嘗以私託人而人亦不敢謁以私造詣不敢干以私裴垍持法度雖宿貴前望造詣不敢干以私臨教辛讜龐勳反攻杜慆於泗州讜聞之拿舟趍泗口貫賊柵以入慆素聞其名握手曰吾僚李延樞嘗為吾道夫子為人何意臨教吾無憂矣多託以私劉從諫還藩進同中書門下平章事公卿多托以私爭出其門韋渠牟帝既偏于聽任士之浮競甘進者爭出其門赫然勢焰可炙往見杜甫客吳越齊趙間李雍奇其材先往見之不以私謝李至遠之知選以內史李昭德進人或勉其往謝答曰公以公用我奈何欲謝以私卒不詣結納閽寺李修飾廚傳結納閽寺求善譽丐援引竇文場臺省要官走門下丐援引者足相躡徼幸者願一見如天人然高力士知內侍省事徼幸者願一見如天人然退朝門無私謁漢隱帝自即位以來樞密使楊邠總機政邠頗公忠退朝門無私謁雖不卻四方饋遺有餘輒獻之頗行干託隱帝自關西罷兵漸近小人與後贊李業等嬉遊無度而太后親族頗行干託洪肇與楊邠稍裁抑之出五代史三十史洪肇傳足接於門牆之間升乎堂而望乎室者亦將一年于今矣韓愈陸參薦士書伺候於公卿之門奔走於形勢之塗足將進而趑趄口將言而囁嚅送李願歸盤谷俯默惕息疊足搨翼拜祈公侯之閽跪邀賢達之車柳宗元上權補闕書白璧之契文粹李嶠上高長史書御賓以之失位篲客以之無門將恐慕義之夫思為黃鵠之舉假其白璧之契接以黃金之言閽人斥之馭者排之文粹房琯上張燕公書衣惟素褐乘非車馬閽人斥之馭者排之長衢高門驟拜左右則近於論訴賓館十二白適子之館兮詩于時廬旅廬舍賓客十里有廬廬有飲食周禮天子賜舍司儀致館儀禮賓館記曰大饗卷三牲之俎歸於賓館見人不能館不問其所舍禮賓客至無所館子曰生於我乎館死於我乎殯除館晉人為季孫除館於西河囚之也子姑就館敢辱大館叔弓如晉辭館云云壞垣子産如晉壞其館之垣而納車馬士文伯曰繕完葺牆以待賓客今吾子壞之其若異客何子産曰諸侯舍於隸人門不容車而不可踰越崇大諸侯之館晉文為盟主飾廚傳稱過客傳音轉宣詔曰或擅興徭役飾廚傳稱過客注廚飲食傳傳舍使及過客皆得令稱其意賓至如歸舍不為暴東閣公孫弘為丞相開東閣以延賓及公孫賀劉屈氂時壞為馬廄連榻坐客晉羊琇豪貴杜預拜鎮南將軍朝士皆畢賀乃連榻而坐琇與斐楷後至曰杜元凱乃復以連榻而坐客耶遂不坐而去倒屣迎賓王粲仲宣詣蔡雍雍倒屣迎之粲年少容貌短小既至一座盡驚曰王孫有異才吾不如也吾家書籍文章盡與之孔題客舍蔣欽緒歷吏部員外郎始韓琬為高郵主簿使京師自負其才有不遇之言題客舍它日欽緒見之笑曰是子嘆後時邪久之琬舉賢良方正欽緒擢其文異等客次王守恩為西京留守時周太祖以樞密使將白文珂等軍西平三叛還過洛陽守恩方詣館謁坐於客次以侯見而吏馳報新留守親事於府矣守恩大驚不知所為遂罷去伏枕寄賓館宛同清漳濱李白留別詩客位但箕帚家貧無供給客位但箕帚杜甫送重表姪林表韋蘇州賓館在林表望山啓西扉五花館荊南舊有五花館待賓之上地故蔣鉉上成汭詩云不是上台憐姓字五花賓館敢從容南部新書掃灑黃金臺招邀青雲客李白寄吳王朋友十三白伐木燕朋友故舊也良朋執友同志者面友楊子法言曰友而不心面友也面朋又曰朋而不心面朋也知己神交稽康阮籍山濤一見便為神交同人同道也泛交吾友久敬晏平仲善與人交久而敬之同求將舊識吳季札見鄭子産如舊相識故知叔向適鄭騣蔑與一言而善執手以上遂如故知失人可與言而不與之言失人非義不合合志同術儒有合志同方管道同術並立則樂相下不厭其交友有如此者禮誰謂膠漆堅不如陳與雷陳重雷義友分深人語云淡若水君子之交淡若水小人之交甘如醴君子淡以成小人甘以壞傾蓋如故家語孔子遇程子傾蓋而語終日甚相悅顧謂子路曰程子天下之賢士取束帛以贈之知我者鮑叔管仲曰生我者父母捨短從長後漢李燮字德公所交者皆捨短從長同心斷金如蘭易二人同心其利斷金同心之言其臭如蘭刎頸漢張耳陳餘相與為刎頸之交忘年文士傳禰衡有逸才與孔融作爾汝交時衡年二十餘融已年五十敬衡秀才而忘年也莫逆莊子曰四人相視而笑莫逆於心相與為友也忘言莊子云得意而忘言也義之與比君子之於天下無適也無莫也義之與比德不孤必有鄰氣合聲同金石之交漢王與信芝蘭之室有朋自遠方來不亦樂乎無友不如己者友其士之仁者擇其善者而從之取友樂群禮止於信禮曰交國人止於信盍簪易豫卦曰勿疑朋盍簪簪疾也朋從爾思上交不諂下交不瀆豈無他人唯子之好子夏曰可者與之不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能我之大賢於人何所不容我之不賢與人將拒我如之何其拒人也注友交當如子夏泛交當如子張為友導騶范式為荊州友人孔嵩家貧為新野縣傭縣遣嵩為式導騶式曰孔仲山耶敕代嵩嵩以傭未畢不肯去定交於杵臼之間公沙穆家貧與吳祐賃舂祐與語大驚遂定交於杵臼之間鍾會年少傅嘏以明智友之君子定其交而後求西南得朋易為誄郤超卓縈有曠世之度竹林交遊每有勝狀寒門後進拔而友之死之日貴賤為誄者四十人拜親推宅吳周瑜推道南大宅以舍孫策母升堂拜之有無通共拜親友荀顗王濟何劭為拜親友不拜母庾袞與諸兄過邑人陳淮兄弟友之拜其母袞獨不拜曰拜人之母將同於子其義至大鄰人褚德隱逸養親老而無倦袞每拜之拜父魏志孔融才高倨傲年在陳紀陳群之間融先與紀友後與群交更為紀拜下交史記趙有處士毛公藏於博徒薛公藏於賣漿家魏公子無忌從此二人結交遊交小吏吳祐舉孝廉郡中祖道祐越坐與小吏黃真歡語移時功曹以倨傲請黜之太守曰吳季英有知人之明且勿言其後真亦舉孝廉三友為一龍華歆邴原管寧為友俱遊學相善故時人號三友為一龍歆為龍頭原為龍腹寧為龍尾連璧夏侯湛孝若與潘嶽友善每出同輿人謂之連璧近不相得遠而彌親朋友相舉親戚相推心同琴瑟道葉膠漆貴相知心投分推誠金蘭松竹早鶯求友相彼鳥矣猶求友聲矧伊人矣不求友生交府士王尼為護軍府士卓犖不羈王澄胡母輔之齎洋酒詣護軍府尼時給府養馬輔之等遂入座馬廄下與尼炙羊飲酒醉飽而去不見護軍護軍大驚即與尼長假免其為兵益親家語孔子曰自季氏賜我粟千鍾其交益親孔與人交終歲無款曲韋純友善李鄘彊直無私與楊憑穆質許孟容王仲舒友善皆以氣自任不妄交遊常袞與人交始終一節武儒衡交不苟合王圭括於所遇交不苟合友託薛收與元敬俱為文學館學士時房杜等處心腹之寄深相友託蕭嵩為洛陽尉已有名士爭往交非名士夙儒不與游蕭復非名士夙儒不與游以清操顯文章四友杜審言少與李嶠崔融蘇味道為文章四友世號崔李蘇杜小友李泌張九齡與嚴挺之蕭誠善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦徑然蕭軟美可喜方命左右召蕭泌在旁帥爾曰公起布衣以直道至宰相而喜軟美者乎九齡驚改容謝之因呼小友已然諾郗士美平生與人交已然諾以是名重於世莫逆交楊寧與陽城為莫逆交德宗以諫議大夫召城城未拜詔寧即論與俱來終始不少變韓愈不詭隨與人交終始不少變深交者易怨褚遂良以為朋友深交者易怨寡交游裴光廷性靜默寡交游忘年交陸贄張鎰有重名贄往見語三日奇之請為忘年交與有名者游孔緯多與有名者游所交皆天下有名士鄭絪善屬文所交皆天下有名士一時俊傑杜佑所交遊皆一時俊傑忿恨薛逢初與彭城劉瑑交瑑交辭出逢數人下常易之瑑稍親近逢不得意遂相忿恨喜交豪猾博徒獨孤懷恩喜交豪猾博徒面交如攜手北夢瑣言顏堯自為志文有面交如攜手見利即解攜而去也人生交契無老少論交何必先同調杜甫徒步歸行北窗三友白樂天以詩酒琴為三友詩曰今日北窗下自問何所為欣然得三友三友者為誰琴罷輒舉酒酒罷輒吟計三友遞相引循環無已時交遊解散羞與為戚柳宗元答問交游解散羞與為戚生乎嚮慕毀書滅跡他人有惡指諉增益身居下流為謗藪澤故友新交李白贈新平少年故友不相恤新交寧見矜斗酒強然諾寸心終自疑李白谷風剌輕簿交道方噞巇斗酒強然諾寸心終自疑對面九疑峰箜篌謠輕言託朋友對面九疑峰多花必早落桃李不如松管鮑久已死何人繼其蹤蘭交空懷思李白江上寄元六皆折官位輩行願為交韓愈王公碑家江南讀書著文其譽藹郁當時名公皆折官位輩行願為交謝絶元載李少良上書詆其醜狀載由是非黨與不復接生平道義交皆謝絶傾心李安遠從士大夫苟勝己必傾心交之與楊綰崔祐甫善張鎰不妄交游特與楊綰崔祐甫善交能終始張九齡與嚴挺之袁仁恭梁升卿盧怡善世稱其交能終始者所交必大人長者張巡所交必大人長者不與庸俗合能交當時豪俊孔述睿少修潔能交當時豪俊全交趙驊敦交友少與商寅顏真卿柳芳陸據蕭穎士李華邵軫善時為語曰商顏柳陸李蕭趙邵謂能全其交也褐衣之賤路巖所交雖褐衣之賤待以禮始終一節刎頸交杜伏威與里人輔公祐約刎頸交博徒輕俠唐憲所交皆博徒輕俠雅自款結宇文士及初士及為隋奉御而高祖任殿中少監雅自款結寬厚樂易盧承慶寬厚樂易士友以此親之善與人交朱敬則善與人交方外十友陸餘慶雅善趙貞固盧藏用陳子昂杜審言宋之問畢構郭襲微司馬承禎釋懷一時號方外十友耐久朋魏元同與裴炎締交能保終始故號耐久朋與貴近交王琚以父隱客嘗為鳳閣侍郎故數與貴近交楊穆許李楊憑重交游與穆質許孟容李鄘相友善一時歆慕號楊穆許李鄭楊段薛炙手可熱欲得命通魯紹環蒙崔鉉所善者鄭魯楊紹復段環薛蒙頗參議論時語曰鄭楊段薛炙手可熱欲得命通魯紹環蒙帝聞之題于扆是時魯刑部侍郎鉉欲引以相帝不許用為河南尹它日帝語鉉曰魯去矣事由卿乎鉉惶懼謝罪所與遊皆天下豪俊韓滉幼時已有善名所與遊皆天下豪俊生死不易嚴挺之重交游許與生死不易既久乃益固盧鈞與人交結若淡薄既久乃益固時號鮑謝鮑防與中書舍人謝良弼友善時號鮑謝忘年交孟郊性介少諧合愈一見為忘年交山林友韋溫少合所善惟蕭祐少貧窶隱居以孝聞謷然不以塵事自蒙故溫號山林友布衣交鄭畋凡與布衣交至貴無少易有名士柳渾與游者皆有名士友善富嘉謨纍轉晉陽尉吳少微新安人亦尉晉陽尤相友善能終始交陳子昂趙貞固前死藏用撫其孤有恩人稱能終始交保交以簡恭柳玭述家訓戒子孫曰余幼聞光公仆射言保交以簡恭金蘭簿戴洪正每得密友一人則書于編簡焚香告祖考號金蘭簿出宣武盛事嘗所與游皆青雲之士聞名如盧杜高韻如包李盧象杜甫包佶李紓劉禹錫武陵集紀故友少年樂新知衰暮思故友韓文除官赴闕金石姿我年二十五求友昧其人哀歌西京市乃與夫子親方為金石姿萬世無緇磷韓北極詩貴賤交不易恐傷中園葵李白宣城送劉副使艱難懷友朋羇旅惜宴會艱難懷友朋杜甫陪章留後惠義寺當面論心晚將末契託年少當面論心背面笑杜莫相疑行誠信治友莫若誠信杜牧送人赴舉序忘年友薛道衡崔祖濬與高儉為忘年友同襟期杜甫時赴鄭老同襟期鈞禮岑文本生平故人雖羈賤必鈞禮接故舊如布衣時劉仁軌雖貴顯不自矜裾接故舊如布衣時白擇不處仁焉得智語拜其子後漢侯霸欲友王丹霸子見丹下車拜丹答拜霸子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也君子定其交而後求易無友不如己者語拒交陳遵欲交王丹丹拒而不許又楊仁字文義辟司徒桓虞府府椽宋章貪奢不法仁終不與交言同席友賢仇覽季智太學中與同郡符融比宇常自守融奇之曰志士交結之秋雖務勤學守之何執覽正色曰天子修太學豈使人游談其中乎融告郭林宗林宗因與融齎剌詣之遂留宿林宗嗟歎下床為拜不拜親庾袞事見上注孔蕭復厲名節不通狎流俗不喜交權利崔從從賢士游宗室璡好從當世賢士游不妄交李讓夷廉介不妄交以道義合韋陟其以道義合雖後進布衣與均禮所與友皆第一流裴佶不喜與流俗交陸龜蒙不喜與流俗交雖造門不肯見胡生非其人不交胡遠客懷道守義非其人不交得無病乎韓愈答胡直均不敢歷門張直方西班倜儻勳臣也好接賓客與裴休善休不敢歷門孟郊審交種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬冰堅中有潛浪翻唯當金石交可與賢達論文粹相成十五白相勸以義朋友攸攝攝以威儀攝助也詩雖有兄弟不如友生琢磨切磋君子成人之美不成人之惡贈友以言顏淵贈子路曰過墓則式忠告而善導之不可則止無自辱焉以文會友以友輔仁語博我以文約我以禮切切偲偲相切責貌益者三友友直友諒友多聞損者三友友便僻友善柔友便佞君子之愛人也以德獨學而無友則孤陋而寡聞儒有聞善以相告見善以相示畏我友朋須友以成自天子于庶人未有不須友以成者紏德周德司諫紏萬人之德而勸之以朋友一言見上三益見上諍友士有諍友則身不離於令名醇酎程普言與周瑜交如飲醇酎不覺醉如行霧露有所潤也君子以朋友講習易曰麗澤兌投杖子夏哭子喪明曾子怒曰爾何無罪子夏投杖而拜曰吾過矣割席魏管寧與華歆同學歆聞車馬聲出門寧割席曰子非吾友也善交李燮德公所交皆捨短從長好成人美時荀爽賈彪齊名而燮並交二子情無適莫世稱平正也人相忘於道術魚相忘於江湖蘇秦之激張儀秦先達張儀候之數日乃見坐於坐下食以僕妾之餐告舍人曰儀才吾不及恐以小利忘求進故辱之儀怒入秦蘇君使舍小齎金帛車馬陰結助之卒相秦也塵附太山霧集河海言小之依大也文選薑桂因地而生不因地而辛韓詩外傳宋玉因其友事襄王襄王待玉無異乃讓其友云云孔同心濟謀杜如晦長於斷而房玄齡善謀兩人深相知故能同心濟謀以佐佑帝評權皇李華柳識韓洄王定皆仰皋節與友善洄定常評皋可為宰輔師保華亦以為分天下善惡一人而已更為陰陽迭作日月文粹故人相攜直上太階更為陰陽迭作日月杜葉公如晦讚呂溫子之善猶僕之善也文粹古者自天子至于庶人未有不須友以相成者僕雖老矣辱君子之遊同君子之道見君子之榮三十年矣子之善猶朴之善也得不相成乎答滁州張尚書柳冕不為薦托文粹李商隱與陶進士書時獨與令狐補闕最相厚歲歲為寫出舊文納貢院既得引試會故人夏口主舉人時素重令狐賢明一日見之于朝揖曰八郎之友誰最善綯直進曰李商隱者三道而退亦不為薦託之辭故夏與及第十推類援明疊足天庭柳宗元答問今之賢智莫不舒翹揚英推類援明疊足天庭魁磊恢張群驅連行
