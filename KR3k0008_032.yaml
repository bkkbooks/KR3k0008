body:
  text: 卷第三十二卜候一白史記曰計然曰歲在金禳水毀木飢火旱旱則資舟水則資車物之理山石自立樹葉成字漢昭時太山南胸胸有數千人聲大石自立白頭鳥集傍上林苑中枯柳自起蟲食樹葉成文曰公孫病已當立天久陰不雨漢昌邑王數出夏侯勝當輿諫曰天久陰不雨臣下有謀上者分卦更直日用事京房治易事焦延壽曰得我道以亡身者京生也其説事長于災變分六十四卦更直日用事以風雨寒溫為候以占驗而房用尤精妙婦人生四子京師兵氣南昌有婦人生四子太子問唐擅災變之應唐擅以京師有兵氣其禍發於蕭牆至延和四年孫程揚兵省殿誅閻顯黃龍見後漢和帝永平末黃龍見譙喬玄曰此向祥其當有王者不及五十年龍當復見此應見魏郡豐殷密記之至建安二十五年龍復見譙其冬魏受禪魚生屋上魏時有二魚長尺餘集武庫屋上有司以為吉祥王肅曰魚生泉而及於屋介鱗之物失其所邊將殆有棄甲之象後關東敗果應之周禮以五雲之物辨吉凶水旱豐荒祲祥十二風察天地之乖和觀變化之妖祥視祲掌十輝之法以觀妖祥傳曰九分至啓閉必書雲物赤黑之祲傳曰有事於武宮梓慎曰吾見赤黑之祲非祭祥妖氣也昭二十年正月已丑日南至梓慎望氣曰今茲宋有亂蔡有大喪晉楚會于宋楚人衷甲伯夙謂趙孟曰楚氛甚惡懼難孔王敦亡兆崔義玄隋大業亂往見李密不用河內賊黃君漢為密守柏崔義玄見群鼠渡河稍刃有華文曰此王敦亡兆也因説君漢以城歸紫微方災豆盧瑑與崔沆皆拜同平章事初咸通中有治歷者工言禍福或問比宰相多不至四五謂何而曰紫微方災然其人又將不免後楊收韋保衡路巖盧攜劉鄴于淙瑑與沆皆不得終云龜茲浮屠西域龜茲有浮屠善數歎曰唐家終有西域不數年吾國亦亡太白躔秦分傳奕善數初武德九年太白躔秦分奕奏秦正當有天下帝以奏付王及太宗即位召曰向所奏幾敗我星犯昴言祿山將死韋見素是歲十月丙申有星犯昴見素言於帝曰祿山將死矣帝曰日月可知乎見素曰福應在德禍應在刑昴金忌火行當火位昴之昏中乃其時也既死其月亦死其日明年正月甲寅祿山其殪乎帝曰賊何等死答曰五行之説子者視妻所生昴犯以丙申金木之犯也木火之母也丙火為金子申亦金也二金本同末異還以相剋則殆為子與首亂者更相屠戮乎及祿山死日月皆驗引妖人言占不軌桓彥范張昌宗引妖人迎言占計不軌宋璟請窮治其姦武后以昌宗嘗自歸不許彥範諫玉床搖帝坐不安而不端高祖微時與相友大業中討賊河東表端為副端邃術數密語高祖曰玉床搖帝坐不安晉得歲真人將興安天下之亂者其在公乎但上性沉忌內惡諸李今金刀已誅次且取公宜早為計帝感其言二雉雊署寢占者曰軍府將空高駢會二雉雊署寢占者曰軍府將空駢惡之悉出兵營東塘高垣堞桑道茂召待詔翰林建中初上言國家不出三年有厄會奉天有王氣宜高垣堞為王者居使可容萬乘者德宗素驗其數詔京兆尹嚴郢衆數千及神策兵城之時當盛夏趣功人莫知其故及朱泚反帝蒙難奉天賴以濟西師潰同上又善太乙循甲術乾元初官軍圍安慶緒於湘州勢厄迫道茂在圍中密語人曰三月壬申西師潰至期九節度兵皆敗女武代王李淳風太宗得祕讖言唐中弱有女武代王以問淳風對曰其兆已成已在宮中又四十年而王王而夷唐子孫且盡帝曰我求而殺之奈何對曰天之所命不可去也問三日金梁鳳頗言人貴賤夭壽裴冕為河西留後梁鳳輒言一日向雒一日向蜀一日向朔方此時公當國冕妖其言絶之俄而祿山反冕以御史中丞召因問三日答曰雒日即滅蜀日不能久朔方日愈明肅宗即位而冕遂相逢林即住唐杜楊編初德宗欲西行有知星者奏事曰逢林即住上曰豈可令朕處林木間乎薑公輔曰不然但以地名亦應也及奉天尉賈隱林謁止於行在上觀隱林氣宇雄俊兼是忠烈之家而名葉知星者語龍星動九國志蜀杜光庭黃巢之亂從宰興元途次西縣遇陳休復有道術與光庭憩於路左軍中以柱杖掘地得酒一壺酌之不竭光庭因問車駕何時當還答曰五年後龍星動即歸矣果如其言李淳風於占候若節契然本傳有亡奴者問所從追戒曰自此逢使者懇乞其鞭若不可則以情告其人果值使者於道如生語使者異之曰去鞭吾無以進馬可折道傍葼代之乃往折葼見亡奴伏其下獲之杜生善易唐史又有亡奴者生戒持錢五百伺於道見進鷂使者可市其一必得奴俄而使者至以情告使者以一與之忽飛集歡莽上往而取之乃得亡奴衆以為神祈禳二白寧風旱弭災兵遠罪戾祈福祥求永貞周禮堂贈男巫東堂贈無方無算注自堂始送不祥招彌招安也止凶禍率百隸時儺索室中甸師喪師代王受眚災女祝掌王后之內禱祀祀報福也以時招梗禬禳以除災殃除災害曰禬禬刮去也卻變異曰禳梗禦未至也招招善去惡也四祀禮今唯有禳禮在梗音鯁禬音會牧人凡外祭毀事用尨可也毀謂副辜侯禳歐除殃咎之厲宗伯以副辜祭四方百物副磔狗而祭也肆師以歲時序其祭禮之祈珥祈當為璣珥當為衈衈者釁禮之事雜記廟成則釁之類是也雞人掌凡國祭祀面禳釁供其雞牲釁宗廟之屬釁廟以羊門夾室以雞司農云面禳四面也太祝掌六祈同鬼神祇一類二造三檜四禜五攻六祝注祈禱也謂有災變則號呼告神以求福也天神人鬼地祗同以祈祀之也傳曰宋災使欀火於玄冥回祿玄冥水神祝之以抑水回祿火神祀之求弭火子路曰禱爾于上下神祇子曰丘之禱久矣孔子素行合神祇禳彗傳曰齊有彗星齊侯使禳之晏子曰無益也祗取誣焉彗除穢也若德之穢禳之何益也史記成王病周公剪爪禱祈漢文詔不令祈詔曰先王遠施不求其幸望祀不祈其福令祠官祀釐歸福於朕不為百姓其令祠官致敬無有所祈磔雞晉禮志曰歲旦常設𥯤筊桃梗磔雞於百寺門禳惡氣漢儀用仲夏有桃無雞雞起於魏青龍元年有司奏春分祠厲殃乃詔曰不在祀典其除之也用牛魏陳嶠為西部都尉曲周民父病以牛禱縣詰罪棄市嶠曰此孝子也表赦之遷郡太守視祲掌安宅敘降次序其凶禍禳移之被髮禱北斗漢息夫躬為光祿大夫宜陽侯免官歸國未有第宅寄在丘亭姦人以侯家富夜守之躬邑人賈惠過躬教以祝盜方以桑東南枝為匕畫北斗七星其上躬夜自被髮禱北斗招指人有上書言躬怨咒咀躬大呼食頊而死囚祭皋陶范滂字孟博坐鉤黨繫黃門北寺獄吏謂曰凡坐繫皆祭皋陶滂曰皋陶賢者知滂無罪將理之於帝有罪祭之何益為官長禱張綱字文紀為廣陵守疾病吏民祈禱曰千秋萬歲何時復見此君又劉惔字真長為丹陽尹病篤人為祈禱曰丘之禱久矣又後漢末均叔祥為河內寢病耆老為祈請獲罪於天無所禳也孔過華山祠裴寂家貧徒步走京師過華山祠祈神自卜祝禬惠宣太子業嘗被疾帝自祝禬上象變請禳裴光庭初知星者言上象變不利大臣請禳之光庭曰使禍可禳而去則福可祝而來也論者以為知命水沴閉坊門以禳楊再思為宰相於時水沴閉坊門以禳帝問祈禳之數李藩帝問祈禳之數藩對曰孔子病止子路之禳漢文帝每祭敕有司敬而不祈使神無知則不能降福有知固不可私己求媚而悅之也且義於人者和於神人乃神之主人安而福至帝悅曰當與公等上下相勉以保此言猒勝王凝而宜歙觀察使王仙芝黨賊至會大星直寢庭墜術家言宜上疾不視事以猒勝凝曰東南國用所出而宣為大府吾規脫隅可矣顧一方何賴哉誓與城相存亡勿復言既而賊去祭北斗玄宗皇后王氏帝密欲廢后后兄守一懼為求猒勝浮屠明悟教祭北斗取霹靂本刻天地文及帝諱合佩之曰後有子與則天比開元十二年事覺帝自臨劾有狀乃制詔廢為庶人賜守一死與妖人祈福禳解桓彥範張昌宗引妖人迎占言計不軌宋璟欲窮治其姦武后以昌宗嘗自歸不許彥範諫曰昌宗繆橫恩包禍心既自歸露而尚與妖人祈福禳解則初無悔意今而宥之誠恐昌宗自謂應運天下浩然從之不禱祠而福盧藏用云古之為政者不禱祠而福第有獄氣李義府會術者杜元紀望義府第有獄氣乃曰發積錢二十萬可以猒勝義府信之裒索殊急禍福在德高郢代宗為太后營章敬寺郢諫曰若以禳禍則方務厥德罔有天災不在勞人雨不止禳祝而霽劉道合時將封太山雨不止帝令道合禳祝俄而霽乃令馳傅先行泰山祈禳報恩田神功既寢疾宋之將吏為祈禳報恩誠不至者物不感陸宣公奏議昔湯遇災禱于桑野躬自髡剔以為犧牲古人所謂割髮宜及膚剪爪宜侵體良以誠不至者物不感盲郭璞搔首集路嚴幼病篤有人稱解醫禳之術嚴用之不效曰此盲郭璞也爭寵不平棣王琰會妃以過置別室而二孺人爭寵不平求巫者密置符琰履中以求媚仇人告琰厭魅上帝同其朝取履視之信帝怒責琰忌諱三白史記陰陽家流拘而多忌好忌諱後漢汝南陳伯敬行必矩步坐必端膝呵叱狗馬終不言死行路聞凶便引車留還歸觸忌則寄宿亭年老不舉孝廉後坐女壻亡呂夔殺之不忌諱趙興下邳人不恤忌諱入官舍繕修穿移豐熾三代為司隸校尉反支日不受章奏後漢明帝時公車以反支日不受章奏帝曰民廢農桑來詣闕拘以禁忌豈為政之意乎蠲其制傳曰辰在子卯謂之疾日君徹宴樂學人舍業為疾故也紂以甲子喪桀以乙卯亡五月生子長與戶齊不利其父田嬰賤妾生子名文以五月生嬰父令勿舉母竊舉之長見嬰怒曰五月生子長與戶齊不利其父文頓首曰若受天之命何憂也若由戶但高其戶父慚之孔往亡日李訴攻吳房殘外垣始出攻吏曰往亡日法當避訴曰彼謂吾不來此可擊也衆決死戰射殺其將賊乃走不避治署李聽拜邠寧節度使邠署相傳不利治垣舍前刺史視其壞莫敢葺聽曰將出鑿凶門何避治署邪亟使完新之卒無異尚時日拘忌李泌代宗將葬帝號送承天門而轀車行不中道問其故有司曰陛下本命在午故避之帝泣曰安有枉靈駕以謀身利命直午而行及宣政廊壞太卜言孟冬魁岡不可營繕帝曰春秋啓塞從時何魁岡為亟詔葺之及桑道茂城奉天事驗始尚時日拘忌因進用泌泌亦自有所建明必嘗持黃老鬼神説故為人所譏切世俗禁忌李吉甫初政事堂有巨床相傳徙者宰相輒罷不敢遷吉甫笑曰世俗禁忌何足疑耶徹而新之歲子午忌憲宗皇后郭氏元和八年群臣三請立為后帝以歲子午忌故章報聞罷白六文古今篆隸書體曰六文者蓋敘為文之體也一曰象形二曰指事三曰會意四曰假借五曰形聲六曰轉注八體漢書注曰八體一曰大篆書二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰隸書八曰行書崩雲蔡雍表曰重似崩雲垂露古今篆隸曰垂露書漢中郎曹家所作也以書章奏謂點綴輕露於垂條也臨池盡墨草聖張芝伯英善草書凡家之衣帛必先書而染練之臨池學書池水盡墨寸紙不遺韋仲將謂之草聖銀鉤驚鸞反鵲並書勢鳥迹蒼頡觀鳥迹而成字蟲書科斗古文也團扇王右軍草書於團扇二妙八行得伯英之筋晉衛瓘字伯玉索靖幼安俱能書為尚書郎時號一臺二妙謂瓘得伯英之筋靖得伯英之肉也墨妙筆精記姓名漢書項羽少時學書不成乃曰書足記姓名而已墨池彩筆父子王羲之及子獻之並善書故號二王書皆曲盡其妙鍾張鍾隸張芝皆善書瓘靖見上注投筆班超投筆歎曰大丈夫安能久事筆硯乎六書周禮六藝五曰六書見上注曲藝書也小學漢元始中徵天下通小學者以百數各令記字於筐中楊雄取其可用者作訓纂篇正六經蔡雍以經籍去聖久遠文字多誤乃奏求正定六經文字帝許之雍自書丹於碑使工鐫刻立於太學門外始成觀視模寫者車日千餘兩書窗塵蕭鋒貧無紙書窗塵積而書之湛垂露於毫端起懸針於筆杪寫八體之殊蹤窮二王之逸勢龍圖始啓則八卦之象可觀鳥迹初分則六體之書爰起作典墳之韞櫝為文字之濫觴經籍於是玄興著述於是間作巧同懸露妙宰崩雲化成天下其由此乎六角竹扇書法云右軍見一老姥賣六角竹扇因取書之扇名增其價姥後求書笑而不答衛恆字巨山善草隸為四體書或不持錢請酒家飲因書其壁觀者酬錢計足而滅之王者書同文今天下書同文以代結繩之政古者伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉龍騰魚躍鳳集古今篆隸文體曰龍書者太昊氏獲景龍之瑞以紀官用頒政今魚書者周武王有白魚之慶因為書鳳書者白帝朱宣氏有鳳鳥之瑞文字取以為象八卦龍馬負圖伏羲觀之畫為八卦之文九疇洛龜負圖夏禹觀之得九壽之文觀乎人文天文日月之滅孔遂良侍書褚遂良工隸楷太宗嘗歎曰虞世南死無與論書者魏證白見遂良帝令侍書帝方博購王羲之故帖天下爭獻然莫能質真偽遂良獨論所出無舛冒者唐本傳以書顓家正觀永徽間虞世南褚遂良以書顓家後莫能繼薛稷外祖魏證證家多藏虞褚書故鋭精臨倣結體遒麗遂以書名天下五絶虞世南帝每稱其五絶五曰書翰寫列女傳於屏風世南始學書于浮屠智永究其法為世祕愛帝嘗命寫列女傳於屏風蕭祐精書畫精畫及書自鍾王蕭張以來皆能識其真韋溫傳臨飛白書晉陽公主帝飛白書下不能辨有楷法韋涉書有楷法楊師道善草隸前有虞褚後有薛魏魏證子叔瑜善草隸以筆意傳其子華及甥薛魏世稱善書者前有虞褚後有薛魏劉升善草隸鸞鳳沖霄必假羽翼股肱之寄要在忠力馬周帝嘗以飛白賜周曰鸞鳳沖霄必假羽翼股肱之寄要在忠力書兼草隸房元齡為飛帛書賜侍臣戴至德高宗嘗為飛帛書賜侍臣賜至德曰泛洪源俟舟楫郝處俊曰飛九霄假六翮李敬玄曰資啓沃罄丹誠崔知悌曰竭忠節贊皇猷皆見意於辭云王魏齊名王方翼善書與魏叔琬齊名八分書張廷圭善八分書寶章集王方慶后嘗就求羲之書方慶集奏十世從祖羲之書四十餘番太宗求之先臣悉上送今所存惟一軸并上十一世祖導十世祖洽九世祖珣八世祖曇首七世祖僧綽六世祖仲寶五世祖騫高祖規曾祖褒并九世從祖獻之等凡二十八人書共十篇后御武成殿遍示群臣詔中書舍人崔融序其閥閲號寶章集以善書直鳳閣鍾紹京虔州贛人初為司農録事以善書直鳳閣武后時署諸宮殿明堂及銘九鼎皆其筆也嗜書紹京嗜書畫如王羲之獻之褚遂良真迹藏家者至數十百卷若五朵雲韋陟常以五彩箋為書記使侍妾主之其裁答受意而已皆有褚法陟唯署名乃自謂所書陟字若五朵雲時人慕之號郇公五雲體大小篆盧藏用工草隸大小篆八分入神入妙入能張芝書謂之亞聖張旭草入神八分入妙隸入能書訣宿索靖碑傍歐陽詢行見索靖所書碑駐觀良久而去行數百步復還下馬立觀疲倦即坐因宿具傍三日而後啓行欣然若有所得劉公嘉話蘭亭武德中歐陽詢就越詐求之始秦王府麻道崇奉教榻二本一送辨才一王自收道崇私榻一本于時天下草創秦王雖總戎蘭亭不離肘後及即位學之不倦正觀二十二年褚遂良謂入昭陵但得其模本爾南部新書細看亦未能好李雍嘗不許蕭誠書誠乃詐作古帖令紙故暗持示雍曰此乃右軍真迹如何雍看稱善誠以實告之復取示之曰細看亦未能好伏苓芝法書唐李雍善書仍自刻多假立刻字人名如伏苓芝黃仙苑鶴之類是也不能定筆不可論書韓滉書得張旭筆法常自言不能定筆不可論書有古法袁滋工篆隸有古法筆力遒婉顏真卿善工草書筆力遒婉世寶傳之圉師愛書許圉師龍朔中為左相高宗自書詔賜遼東諸將謂許敬宗曰圉師愛書可示之柳氏自備録柳仲郢掌手抄六經司馬遷班固范曄史皆一抄魏晉及南北朝史再又類所抄它書凡三十篇號柳氏自備録旁録仙佛書甚衆皆楷小真精無行草盧知猷善書有楷法沈傳師工書有楷法字徑五寸柳公權文宗嘗召與聯句曰人皆苦炎熱我愛夏日長命題於殿壁字率徑五寸帝歎曰鍾王無以尚也宣宗召至御座前書紙三番作真行草三體帝奇祕賜以器弊且詔自書謝章無限真行當時大臣家碑志非其筆人以子孫為不孝外夷入貢者皆別署貨具曰此賻格書嘗書京兆西明寺金剛經有鍾王歐虞褚陸諸家法自為得意書楷遒媚裴休書楷遒媚有體法翰藻沈鬱李百藥怒猊抉石渴驥奔泉徐浩始浩父嶠之善書以法授浩益工嘗書四十二幅屏八體皆備草隸尤工世狀其法曰怒猊抉石渴驥奔泉藻翰豪邁趙博宜佛廟見筆迹柳公權李聽表為掌書記因入奏穆宗曰朕嘗於佛廟見卿筆迹思之久矣即拜侍書學士以三體寫老子司馬承禎善篆隸帝命以三體寫老子白正文句蕭齋李肇國史補梁武造寺命蕭子雲飛白大書蕭字李約見之竭産買歸東洛建小室以玩之號曰蕭齋墨池飛出北溟魚李白草書歌墨池飛出北溟魚筆鋒殺盡由中兔二行數字大如斗恍恍如聞神鬼驚時時隻見龍蛇走左盤右蹙如驚電狀同漢楚相攻戰湖南七郡凡幾家家家屏障書題遍王逸少張伯英古來幾許浪得名同上詩體備鸞皇思含珠玉元積進詩狀既仰蜀龍之光難逞聚螢之照同上字向紙上皆軒昂韓愈送盤谷子詩開緘忽睹送歸作字向紙上皆軒昂為時絶筆唐史韋升卿涉學工書於八分尤工歷廣州都督書東封朝覲碑為時絶筆善書與高祖書相雜而人不辨也高祖太穆皇后竇氏紙才十數字世以為寶賀知章善草隸好事者具筆硯從之意有所愜不復拒然紙才十數字世以為寶高麗遣使求歐陽詢初倣王羲之書後險徑過之因自名其體尺牘所傳人以為法高麗嘗遣使求之帝歎曰彼觀其書固謂形貌魁梧耶大小歐陽體歐陽通蚤孤母徐教之以父書懼其墮乃遺錢使市父遺迹通乃刻意臨倣以求售數年書亞於詢父子齊名號大小歐陽體褚遂良亦以書自名嘗問虞世南曰吾書如何智永帝嘗以絹素詔寫文選裴行儉工草隸名家帝嘗以絹素詔寫文選祕愛其法賚物良厚行險每曰褚遂良非精筆佳墨未嘗輒書不擇筆墨而妍捷者豫與世南明所撰選譜草字雜體數萬言水墨積習王紹宗工草隸嘗與人書曰鄙夫書無工者特由水墨之積習耳嘗精心率意虛神靜思以取之吳中陸大夫常以余比虞君以不臨寫故也聞虞被中畫腹與余正同虞即世南也羲之北面杜審言嘗語人曰吾筆當使羲之北面其矜誕類此工草隸王維柿葉隸書鄭虔好書常苦無紙於是慈恩寺貯柿葉數屋遂往日取柿葉隸書歲久乃遍寫四部群書崔行功初太宗命祕書監魏證寫四部群書將藏內府置讎正二十員書工八員證徙他職又詔虞世南顏師古踵領功不就顯慶中罷讎正二十員得父一絶宋令文王書子之遜精草隸世謂得父一絶連錦呂向工草隸能一筆環寫百字若縈髮然世號連錦書張顛張旭每大醉乃下筆或以頭濡墨而書既醒自視以為神不可復得也世呼為張顛初仕為常熟尉有老人陳牒求判宿昔又來旭怒其頌責之老人曰觀公筆奇妙欲以藏家爾旭因問所藏盡出其父書旭視之天下奇筆也自是盡其法旭自言始見公主擔夫爭道又聞鼓吹而得筆法意觀倡公孫舞劍器得其神後人論書歐虞褚陸皆有異論至旭無非短者傳其法者崔貌顏真卿云鍾王筆迹五代溫韜為靜勝軍節度使在鎮十年唐諸陵在其境內者悉發掘之而昭陵最固韜從埏道下見宮室制度閎麗不異人間中為正寢東西兩廂列石床床上石函中為鐵匣悉藏前世圖書鍾王筆迹紙墨如新韜悉取之遂傳人間書換銅硯字錦曰有人收得虞世南與圓機書一紙剪開二字賣之至礬鄉一字得麻一斗鸛口一字得銅硯一枚房材一字得芋千頭隨人好之淺深錦樣書柳公權以隔風紗作龍城記及八朝名品號錦樣書上方御剪刀面月兒羹命分賜羲之鬼胡尹書冠當時人謂其有羲之鬼鸞翔鳳翥年深豈免有缺劃快劍斫斷生蛟鼉鸞翔鳳翥衆仙下珊瑚碧樹交枝柯金繩鐵索鎖紐壯古鼎躍水龍騰梭韓退之石鼓歌名金剪書司馬承禎工篆別為一體名金剪書續神仙傳走馬書建中初有河北軍將姓夏能走馬書一紙出酉陽雜俎得歐虞林鼎能書得歐虞法吳越備史垂露資仰看垂露資不崩亦不騫杜觀書畫蛟龍岌相纏鬱鬱三大字蛟龍岌相纏同上觀書畫書入金榜懸同上他日辱銀鉤森然見矛戟鄭典設一字直百金八分一字直百金蛟龍盤拏肉屈強李潮歌親灑仙毫特紆睿恩親灑仙毫劉禹錫謝手詔表初喜麗天之象遠燭輝光旋驚垂露之蹤曲覃霈澤同上鸞鳳騫翔而變態煙雲舒卷以呈姿同上神物所窺必當奪璧于中流飛鋩于烈火文粹司空圖書屏記神物所窺必當奪璧于中流飛鋩于烈火也殆非子孫之所可存耳今荊璧為璽飛上天矣文粹舒元輿玉箸篆志求秦丞相真迹聞有八字刻在荊玉有洪碑樹嶧山巔今荊璧為璽飛上天矣洪碑留在人間往往有好事者躋巔得見異曰將褁足觀之蟲蝕鳥步同上客有得陽冰真迹遺六幅素上者請歸客堂張之見蟲蝕鳥步痕迹若屈鐵石陷入屋璧霜晝昭著疑龍蛇駭解鱗甲活動煙顏塵容侵暴日久同上試以手拂拭其煙顏塵容侵暴日久攝芻坼裂玉箸欲折豫讓其主主曰易致耳金生玉潤褚遂良書字裹金往行聞玉潤出書訣墨藪妙中更妙虞世南書體段遒媚舉止不凡能中更能妙中更妙筆虎法書苑寶泉謂李陽冰篆為筆虎孔壁遺文汲冢舊簡李陽冰論古篆玉書二千六百紙尚書故實太宗有大玉書二千六百紙皆以丈二尺為軸獨蘭亭用玉匣貯之後並藏於昭陵印泥畫沙張長史曰褚河南論書云用筆如印泥畫沙始不悟後於江岸見沙地平遂以錐畫字媚好可愛始信長史之言貴藏鋒也書訣墨藪璧坼路魯公與懷素同學草書於塢兵曹或問曰張長史見公孫大娘舞劍器得低昂回翔之狀兵曹有之乎懷素以古叉腳對魯公曰何如屋漏痕懷素抱魯公唱賊復問師何所得曰觀夏雲多奇峰及璧坼路常師之法書苑戈法逼真唐太宗學虞世南隸書每難於戈法一日書遇戩字召世南補寫其戈以示魏公公曰仰窺聖作內戩字戈法逼真帝於是賞鄭公鑒字之精同上況潮小篆逼秦相快劍長戟森相向李潮八分歌杜甫書依字輒去人韋綬太子書依字輒去人曰上以此可天下事烏得全書耶綬白之帝喜即賜綬錦綵可喜可愕一寓於書韓文天地事物之變可喜可愕一寓於書故旭之書變動猶鬼神不可端倪以此終其身而名後世夢吞丹篆龍城録退之常説少時夢人與吞丹篆後胸中如物噎能記其上一兩字筆勢非人間書也白畫工繢事後素彰施書曰以五彩彰施于五色作服汝明作繪書作繪宗彝者會五彩以作畫也宗彝宗廟彝器畫為文章也若五彩之相宣文賦云受采禮曰受采遁形物無遁形手擇筆精心匠天真指趣五色之章目不別五色之章為昧儀形比象丹青挫於筆端目想心存設色周禮設色之工謂之畫畫繪之事周禮凡畫繢事雜五色後素功注云素白采是也五色成文而不亂禮藝成而下豫欲觀古人之象日月星辰山龍華蟲畫此八物於衣服五色比象昭其文也謂車服也三辰旗旗昭其明也三辰日月星辰也善惡家語孔子觀於明堂有堯舜桀紂之象各有善惡之狀廢興之禮也功勳漢畫功臣於麒麟閣葉公好龍居室皆雕畫以寫龍於是天龍聞之而下葉公驚走乃知所好非真龍畫虎馬援戒兄子曰學杜季梁不成猶畫虎不成反類狗也畫堂漢太子生於甲觀畫堂寫真晉顧愷之畫殷仲堪仲堪有目疾乃明點瞳子飛白拂上曰如輕雲蔽月愷之字長康為蛇畫足誤點成蠅曹不興誤點屏風因就畫為蠅孫權謂是真以手彈之峻宇雕牆書臧文仲山節藻梲何如其知畫梲為藻文畫狗馬者難為巧圖鬼神者易為功韓非云圖裴楷顧愷之圖裴楷頰上加二毛覺神明殊勝誤筆成牛王獻之善丹青桓溫使畫扇筆誤落因畫為駁牸牛甚妙舐筆和墨莊子言畫設色之工五周禮畫人顧愷之每畫人成或數年不點睛人問之答曰四體妍蚩本無闕於妙處傳神寫照正在阿睹中擬請形容象其物宜象生於意容止可觀進退可度則而像子孔畫思入神王維善畫名盛於開元天寶間豪英貴人虛左以迎畫思入神至山水平遠雲勢石色繪工以謂天機所到學者不及也按樂圖客有以按樂圖示者無題識維徐曰此霓裳第三疊最初拍也客未然引工按曲乃信鄭虔三絶鄭虔善圖山水嘗自寫其詩并書以獻帝大署其尾曰鄭虔三絶繪齋壁安祿山反偽授虔水部郎中因稱風緩賊平與張通儒王維並囚宣陽里三人皆善畫崔圓使繪齋壁虔等方悸死即極思祈解于圓卒免死絶品薛稷畫又絶品馳譽丹青閻立本初太宗與侍臣泛舟苑池見異鳥容與波上悅之召立本侔狀閣外傳呼畫師閻立本是時已為王爵郎中俯伏池左研吮丹粉望坐者羞悵流汗歸戒其子曰謹無習後為相時人有右相馳譽丹青之嘲聚畫惠文太子範聚書畫皆世所珍者自晦韓滉畫與宗人幹相埒以非急務故自晦不傳於人聚畫侔祕府張弘靖家聚畫侔祕府圖像舊臣之次李晟他日與馬燧見延英帝嘉其勳下詔各圖其像於舊臣之次圖狀李聽吐突承璀討王承宗以聽為神策行營兵馬使既戰斬賊驍將憲宗壯之詔圖狀以獻畫像便殿王起帝題詩太子笏以賜詔畫像便殿號當世仲尼棄畫于道王涯家書多與祕府侔前世名書畫嘗以厚貨鉤致成私以宮鑿垣納之重復祕固若不可窺者至敗為人破垣剔取奩軸金玉而棄其書畫于道李德裕徙劍南西川乃建籌邊樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餫遠邇曲折咸具乃召習邊事者與之指畫商訂凡虜之情偽盡知之方域圖及教飛騎陳圖呂才帝又詔造方域圖及教飛騎陳圖屢稱者托古聯德高蹈者圖像李渤隱廬山托古聯德高蹈者以楚接輿老萊子黔婁先生於陵子王仲豫梁鴻六人圖像贊其行因以自警九老圖白居易嘗與胡杲吉收鄭據劉真張渾狄兼謨盧貞燕集皆高年不事者人慕之繪為九老圖職方觀圖韋執誼始未顯時不喜人言嶺南州縣既為郎嘗詣職方觀圖至嶺南輒瞑目命左右徹去及為相所坐堂有圖不就省既易旬試觀之乃崔州圖也以為不祥惡之果貶死圖唐興節士文人司空圖作亭觀素室悉圖唐興節土文人善圖山水張志和善圖山水酒酣或擊鼓吹笛舐筆輒成王會圖東謝蠻其酋元深入朝冠烏熊皮履若注旄以金銀絡額披毛帔韋皮行縢著履中書侍郎顏師古因是上言昔周武王時遠國入朝太史次為王會篇今蠻夷入朝如元深冠服不同可寫為王會圖觀繪圖安祿山反范陽先三日合大將置酒觀繪圖起燕至洛山川險易攻守悉具多納祕畫錢徽入拜禮部侍郎宰相段文昌以所善楊渾之學士李紳以周漢賓並諉徽求致第籍渾之者憑子也多納古帖祕畫於文昌皆世所寶立廟像四垣圖戰陳狀突厥闕特勒死帝為立廟像四垣圖戰陳狀詔高手工六人往繪寫稍肖其國以為未嘗有默棘連視之必悲哽圖形禁中陸堅帝侍之甚厚圖形禁中親製贊李將軍山水宗室思訓善畫世所謂李將軍山水者異本王方慶圖畫多異本多藏古國畫顏師古多藏古圖畫亦性所篤愛山水圖崔植曰玄宗即位宋璟嘗手寫無逸為圖以獻其後朽暗乃代以山水圖稍怠于勤玄元五聖唐名畫録吳道玄畫玄元五聖千官官殿冠冕勢傾雲龍心若造化故杜甫詩云森羅回地軸妙絶動宮牆粉本唐名畫録玄宗天寶中忽思蜀嘉陵江水遂假吳生驛遁令往寫貌及回帝奏云臣無粉本並記在心遣於大同殿圖之嘉陵江山水一日而就時有李將軍山水擅名亦畫大同殿數月方畢上曰李思訓數月之功吳道玄一日之迹皆極其妙也通神佳手天寶中玄宗召思訓畫大同殿壁兼掩障異日因對上云卿所畫掩障夜聞水聲真通神之佳手也畫龍道玄畫殿內五龍鱗甲飛動每欲大雨即生煙霧鸞手校尉方鎮編年曰錢鏐鎮吳越待賢渴士使名畫工二三十人在沿江號鸞手校尉伺北方士子流移來者咸寫貌以聞擇清修或有福祿者用之胡嶽渡江畫工以貌奏鏐嘆曰面有銀光奇士也即召見釜中龍南唐時有蒼頭持龍水圖求貨或得之將練以為服忽釜中霧起蒸見二龍騰躍穿壁而去畫該毫末備得精神唐東蠻王入朝顏師古奏昔武王時遠國歸疑周史集為王會篇今卉服鳥章備集蠻邸宜圖其事貽于後命閻立本畫之莫不畫該毫末備得精神顧子畫山色大歷中吳子顧子畫山水甚奇怪先布絹於地研調釆色使數人吹角擊鼓噉叫顧子著錦襖錦纏頭飲酒半醉取墨汁寫絹上次寫諸色以大筆開決為峰巒島嶼之狀曲盡其妙也豈但祁嶽與鄭虔筆迹遠過楊契丹杜甫奉先劉少府新畫山水障歌丹粉多狀唐文粹李庾東都上陽別官丹粉多狀石橋圖唐酉陽雜俎云李涿性好古常於保壽寺庫得舊圖裝治以示柳公權乃張萱所畫石橋圖也後數日仇士良至以敕取去意出塵外怪生筆端王維畫輞川圖山谷鬱盤雲水飛動意出塵外怪生筆端自題詩云夙世繆詞容前身應畫師出朱景玄畫斷通靈畫有人牽馬訪馬醫稱患腳醫曰大似韓幹所畫者忽值幹幹曰真是吾設色者歸視所畫馬腳有一點墨缺方知是畫通靈矣雜俎傳神寫照吳道玄傳袖寫照如欲笑言出開元記三百縑易清夜圖清夜遊西園圖顧愷之畫唐張周封得之一日凌晨有齎三百縑叩門問曰仇太尉欲此圖與之乃詐也尚書故實名下無虛士閻立本善畫至荊州見張僧繇舊迹曰定虛得其名耳明日又往曰猶是近代佳手明日又往嘆曰名下無虛士坐臥觀之留宿其下十餘日方去劉禹錫嘉話應手生枝張藻畫松云應手生枝則潤如春澤也畫斷王墨王伶善潑墨凡作圖障先以墨潑腳就手捫隨成物像皆妙絶故謂王墨畫斷舞劍助畫吳道玄善畫將軍裴旻請畫天宮寺璧道玄曰聞將軍善舞劍願作氣以助揮毫旻欣然為舞一曲道玄看畢奮筆立成若有神助明皇雜緑軟畫酉陽雜俎寺塔記韓幹藍田人少時常為酒貰家送酒王維兄弟未遇每貰酒幹常徵債戲畫地為人馬維精思丹青奇其意乃與錢二萬令軟畫十餘年今寶應寺釋梵天女齊公妓等寫真也色訣周長史偏得色訣常理釆色於霤下旋取飛用意匠詔謂將軍拂絹素意匠慘淡經營中杜甫丹青引揮西方變薛稷畫又揮西方變發地抉屋椽慘淡壁飛動到今色未填畫藏青蓮界同上用志不分與古爭品杜牧行張幼彰待詔制鴻都奏技工於丹青用志不分與古爭品白五馭周禮六藝四曰五馭謂鳴和鸞逐木曲過通表舞交衢逐禽左執御子曰吾何執執御乎執射乎吾執御矣六轡如濡執轡如組車馬之容周禮六儀六曰車馬之容注容謂翼翼然規行矩步造父堯之善御者載馳載驅既佶且間既間且馳服習如志傳古之大事必乘其産安其教訓而服習其道唯所納之無不如志人馬相得銜轡之制法言曰夫騏驥古之良馬然而前有銜蹶之制後有鞭笞之威加之以御然後能一日而致千里當代豈無騏驥誠莫之能善御見執轡者非其人遂足跳而遠去楚辭終歲御而衣衽不敝社裳也謂輈之利御者不勞也終日馳騁左右不揵揵音蹇謂倦也行數千里馬不契需注契需謂傷倦也御者不盡馬之情史記云執技以事上射御也禮君車將駕則僕執策朴御也展軨視車之具效駕白已駕執策分轡驅之五步而立謂調試也并轡授綏敬君也進退有度徐疾不愆學傳驂乘業擅訓馭逐水鳴鸞見上注夫子之執吾執御矣朽索之馭六馬人謀馬謀輈人進則與馬謀退則與人謀注云相應也終歲馭而衣衽不敝此輈之利也逸馬家語顏回曰造父無逸馬東方畢之馭馬力盡矣而猶求馬不已馬窮必逸也經霜雪無迹淮南子太丙之御經霜雪無迹善行無轍迹老子尹儒夢秋駕莊子注云秋駕法駕也見七命注中餘轍餘地列子造父師秦豆豆曰汝先觀吾趣趣行也乃立木為塗僅可容足計步而置之趣走往還無跌失三日盡其巧豆歎曰得矣於是應之於心揖於銜轡之間緩急乎唇吻之和正度乎胸臆之中執節乎掌握之間內得其中外合馬志輿輪之外可使無餘轍馬蹄之外可使無餘地夷險視之一也馬志文子治人之道如造父之御內得其心外合馬志也範我驅馳詭遇孟子曰趙簡子使王良輿嬖奚御王良辭吾為之範我驅馳終日而不獲一為詭遇一朝而得十範法也為以法式為御故不獲禽詭譎也不依御故苟得矣傷吻敝策王褒論曰庸人御駑馬傷吻敝策而不進及駕嚙膝參乘且王良執韓哀附輿馳騁忽如景靡過都越國蹶若歷塊追奔電逐遺風萬里一息人馬相得馬驚敗績魯莊公與宋人戰縣賁父御卜國為右馬驚敗續縣賁父曰他日不敗續而今敗續是無勇也遂死之田獵射御慣則能獲禽若未嘗登車射御則敗績壓覆是懼傳御非其馬之正汝不恭命書六轡沃若牽旁塵不出軌并轡張侯御郤子郤子病張侯乃左并轡右援捊而鼓使訓群騶知禮晉程鄭為乘馬御六騶屬焉驂絓而止傳驂迫州綽右驂迫還本門中車軌塵馬候蹄御者不失其馳榖梁弭轡弭斂也回軫乘君子之器回長者之車王良叱之於劍閣造父及之於崑崙掉鞅而還伯樂有致師之勇數馬而對石慶懷審惟之情以合人心將調馬性霍光為宣帝驂乘上若背負芒剌張安世驂乘上乃安霍氏之禍起於驂乘叔良御忌抑罄控忌騁馬曰罄正馬曰控孔為帝御齊映授御忠中丞從幸梁道險澀常為帝御會馬𨀖躍帝恐傷映詔捨轡固不去曰馬奔踶不過傷臣捨之或犯清蹕雖死不償帝嘉歎與力士對執轡李輔國會帝屬疾輔國即詐言皇帝謂太上皇按行宮中至睿武門射生官五百遮道太上皇驚幾墜馬問何為者輔國以甲騎數十馳奏曰陛下以興慶宮湫陋奉迎乘輿還宮中力士厲聲曰五十年太平天子輔國欲何事叱使下馬輔國失轡罵力士曰翁不解事斬一從者力士呼曰太上皇問將士各好在否將士納刀呼萬歲皆再拜力士復曰輔國可御太上皇馬輔國靴而走與力士對執轡還西內授轡策玄宗貴妃楊氏每從遊幸乘馬則力士授轡策為懷義御馬武三思薛二張方蒸蠱三思痛屈節為懷義御馬白良醫傳曰三折肱知為良醫也醫不三代不服其藥秦醫醫和醫緩三折見上十全周禮醫師十全為上十失二次之十失四為下九折楚辭九折臂而成藝藝成而下技以事上業在其中巫咸之術不可救療傳秦緩秦和俞跗華他扁鵲並良醫折肱之醫苦口之醫疾醫掌養萬人之醫病掌日臻之病得失殊輪稽終歲之功上下異食聚毒之功上池之術史扁鵲飲上池之水可以見五藏疾既入於骨髓扁鵲見桓侯曰君有疾在皮膚針灸可及後數日在腠理湯藥可及後見桓侯而反走曰疾在骨髓針灸湯藥皆不及也數日桓侯病召扁鵲鵲已逃公乃卒藥不至於膏肓秦使醫緩視晉侯疾曰肓之上膏之下攻之不可達針之不可及藥不至焉不可為也南人有言曰人而無恆不可以作巫醫遺類子胥曰使醫徐疾而曰必有遺類焉未之有也四難後漢郭玉云療貴人有四難焉自任不用臣言一難將身不謹二難骨節不僵三難好逸惡勞四難浣腸扁鵲曰上古俞跗療病不以湯液乃割皮解肌浣腸胃滌洗五藏也刮骨蜀關羽為流矢所貫醫曰矢鏃有毒入骨乃破臂刮骨去毒飲啖自若烹文摯齊威王有疾良醫文摯曰今王大怒則愈乃誤王大怒將烹文摯罵賜漢高祖疾甚呂后迎醫醫曰可治上罵曰命乃在天雖扁鵲何益不使治賜金十斤不可為也晉侯求醫於秦秦伯使醫和視之曰疾病不可為也是為近女色疾如蠱惑以喪志也以制其食周禮醫師掌醫之政令凡有疾病者分而治之歲終則稽其醫事以制其食注食祿也食醫掌和王之六食六飲六膳百羞百醬八珍之齊聚毒醫師掌醫之政令聚毒以供醫事凡疾病死傷者造焉瘍醫凡療瘍以五毒攻之視生死視醫掌養萬人之疾以五味五藥五榖養其疾以五氣五聲五色視其生死也朱雲不呼醫飲藥華他字元化破腹取病病若結積針藥不及者今飲麻沸酒至醉困破腹取病之在腹胃中者後煎洗縫以膏摩五日而瘥病同療異倪尋李延俱病頭痛身熱華他獨令延發汗或問之他曰尋外實延內實各與藥飲明旦俱起怒郡守病他曰以盛怒乃瘥乃多取貨而不加功又棄去留書罵之太守怒令追殺之不得嗔恚吐血數斗而愈誤中肝徐毅得病謂華他曰昨日使醫曹吏劉祖針胃管便苦夜臥不安他曰誤中肝也五日不救後果然服藥過顏含字弘都兄畿得疾死於醫家家人迎喪旐每繞樹不可解引喪者顛仆稱畿曰我未當死服藥多而傷五藏也潰痤舐痔莊子秦王破癱潰痤得車一乘舐痔者得車五乘所治愈下得車愈多良醫庸醫何氣候之將衰而致養之有失通五味五榖之資必順其志參九藏九竅之變無逆於時精為神本形於壽期門擅桐君之術家傳葛氏之方藥不至焉三世之功何益疾可為也十旬之臥有瘳華他臨死出一卷方與獄吏曰可以活人吏畏法不敢取受他索火燒之孔未嘗問醫傅奕病未嘗問醫號外臺祕要王燾母有疾彌年不廢帶視湯劑數從高醫遊遂窮其術因以所學作書號外臺祕要上醫使者視護馬周病消渴帝詔上醫使者視護躬為調藥護醫騎相望讓皇憲有疾護醫將膳騎相望也求活李績疾家欲呼醫不許輒曰我山東田夫耳位三公年踰八十非命乎塵死係天寧可更求活耶就第醫候杜如晦疾詔給常俸就第醫候之疾不呼醫蕭瑀感末疾不呼醫曰天若假吾餘年因得為循階矣節宣乖度有資於醫穆宗雖誅柳泌而後稍惑方士布衣張皋者上疏曰夫寒暑為賊節宣乖度有資於醫尚當重謹故禮稱醫不三世不服其藥庶士猶爾況天子乎授醫杜鴻漸父鵬舉與病藏用隱白鹿山以母疾與崔沔同授醫蘭陵蕭亮遂窮其術砭頭則天皇后武氏帝頭眩不能視侍醫張文仲秦鳴鶴曰風上逆砭頭血可愈后內幸帝殆得自專怒曰是可斬帝體寧刺血處耶醫頓首請命帝曰醫議疾烏可罪且吾眩不可堪聽為之醫一再刺帝曰吾目明矣言未畢后簾中再拜謝曰天賜我師身負繒寶以賜方書李聽好方書擇其驗者題於帷帟牆屋至滿賜醫方辜隆擇為戶部尚書久之移疾帝手疏醫方賜之本色官柳仲郢領鹽鐵轉運使有劉習者以藥術進詔署鐵官仲郢以謂醫有本色官若委錢榖名分不正帝悟醫術侍亮元裕進中書舍人鄭注入翰林元裕當書命乃言以醫術侍注愧感求生孔緯病家人召醫視緯曰天下方亂何久求生不肯服藥卒目料醫劑李逢吉父顏有痼劑逢吉自料醫劑遂通方書送詔獄劉瞻同平章事同昌公王薨帝捕太醫韓京紹等送詔獄逮繫者凡數百人瞻喻諫官皆依違無敢言即自上疏固爭宗紹窮其術不能效情有可矜陛下徇愛女囚平民忿不顧難取肆暴不明之謗帝天怒即日賜罷開腦西域拂菻有善醫者能開腦出蠱以愈目眚不迎李夷簡病不迎醫為今古集驗方陸贄既放荒遠地苦瘴癘贄為今古集驗方五十篇示鄉人云門不內醫吳湊屬病門不內醫帝知之詔侍醫敦進湯劑不獲已一飲之卒善治奚陟貞元十五年病癰帝遣醫療視敕曰陟賢臣為我善治之人子不可不知醫王勃嘗謂人子不可不知醫時長安曹元有祕術勃從之遊盡得其要濟夭死韓愈原道篇為之醫藥以濟其夭死察脈病否又雜説善醫人者不視人之肥瘠察其脈之病否而已矣善計天下者不視天下之安危察其紀綱理亂而已矣心腹悶煩甄立言有道人心腹悶煩彌二歲診曰腹有蠱誤食髮而然令餌雄黃一劑少選吐一蛇如拇無目燒之有髮氣乃愈多其物以幸有功許胤宗或勸其著書貽後世者答曰醫特意耳思慮精則得之脈之候幽而難明吾意所解口莫能宣也古之上醫要在視脈病乃可識病與藥值唯用一物攻之氣純而愈速今之人不善為脈以情度病多其物以幸有功譬獵不知兔廣絡原野冀一人獲之術亦疏矣一藥偶得它味相制弗能專力此難愈之驗也脈之妙處不可傳虛著方劑終無益於世此吾所以不著書也脈經針方甄權所撰脈經針方明堂等圖傳于時醫之上者理於未然柳公綽太醫針曰醫之上者理於未然針肩隅甄權魯州刺史厙狄嶔風痺不得挽弓權使彀矢嚮堋針其肩隅一進曰可以射矣果如言賜御餌禁方李吉甫帝賜御餌禁方上醫療未萌之兆柳宗元愈膏肓疾賦上醫療未萌之兆目定死生心存取捨同上俱收並蓄待用無遺玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也進學解厲者造焉而美肥輒者造焉而善馳今我里有方士淪迹於醫矧常病也劉禹錫鑒藥善治病者不使至危憊劉晏對脈唐宮中以診脈為對脈大中遺事宣泄頤養古之治劇病宣泄頤養
