body:
  text: 卷第五山一白天作高山結而為山嶽流而為江海拳石禮今夫山一拳石之多及其廣大草木生焉禽獸居焉寶藏興焉纖塵山不讓塵故能成其大國主山川地鎮周禮九州有名山為地鎮注鎮安安地德也峻極于天嵩高維嶽名山見上土聚國語山土之聚節彼南山維石巖巖漸漸之石維其高矣岵屺爾雅有草木岵無草木屺祭山曰庋懸爾雅厲禁山虞掌山林之政令為之厲而為之守禁若祭山林則為之主而修除且蹕山師掌山林之名辨其物與其利害而頒之邦國使置其珍異之物有木山有木工則度之為山九仞仁者樂山不可久留離騷山中不可久留峨峨崇崇秀出削成風雷蒸騰雲雨結成元氣之始秀出太虛之中節彼南山鎮茲下土小隱山林大隱朝市崩晉梁山崩伯宗問絳人絳人曰山有朽壞而崩可若何然國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已詩山冢崒崩不崩如南山之壽不騫不崩出雲天降時雨山川出雲千巖顧凱字長康遊會稽人問山川之美答曰千巖競秀萬壑爭流九阪蜀有九阪山漢記梁冀聚土築山十里九阪登山臨水送將歸上山採蘼蕪下山逢故夫鰲負蓬萊蛇繞崑崙祭祀並見祀山川注中崩周禮凡四鎮五嶽崩令去樂不舉亨易王用亨于西山設險易如萬物終萬物始萬物莫盛乎艮艮山也桐生朝陽不宜生高岡太平而生為瑞也居禮記居山不以魚鱉為禮出器車禮云天不愛其道地不愛其寶人不愛其情故山出器車國寶左傳山澤材監國之寶藏疾左傳山藪藏疾仁者樂如山之安萬物生焉藏金莊子獸離莊子亟車之獸分而離山不免網罟之患蚊負莊子云使蚊負山不勝任狐棲莊子云豐狐文豹棲於山也有夔莊子云鬼也如鼓一足積卑莊子丘山積卑而為高見列星莊子元天山高四見列星共工觸列女媼氏斷鰲足以立四極其後共工與顓頊爭天下怒觸不周山大壑中列大壑中有五山焉一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊愚公移列子太行王屋二山方七里高萬仞愚公且九十面山居懲山北將移之操蛇之神聞之山神懼其不已也告帝帝感其誠命夸娥氏二子負山一措朔東一措雍南自此冀南漢陰無隴違違家山十里蟪蛄之聲猶在於耳注謂政事須聽而後到重載涉家語萬仞之山重載涉焉為室楚鑿山楹以為室無獸楚辭山蕭條兮崩史岐山崩周幽王卒名山史天下名山八山在夷五在中國華山首陽山太室山少室山東太山此五山黃帝之常遊剌而泉出漢二師李廣利軍行無水拔刀剌山水泉湧出銀溢史殷金銀自山溢出不測漢今陛下騁飛六龍不注測之山聚米後漢馬援征隗囂於帝前聚米為山指畫形勢開示衆軍帝曰虜在吾目中耳起景陽山魏明帝鑿太行山之石吳採穀城之文石起景陽山於方林園百役繁與公卿已下莫不展力帝乃躬自掘土以率之云云魏志靈運登宋謝靈運好登山陟嶺必造幽峻巖障數十重莫不盡登躡常著木屐上山則去前齒下山則去後齒固國孟固國不以山溪之險孔隴右山崩虞世南隴右山崩帝憂之以問世南對曰春秋時梁山崩晉候召伯宗問伯宗曰國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣以禮焉梁山晉所出也晉侯從之故得無害漢文帝元年楚地二十九山同日崩今恐有冤獄枉繫室省録纍囚庶幾或當天意帝然之高士峰秦系客泉州南安有九日山系結廬其上卒南安人思之為立小亭號其山為高士峰云窮歷宋之問改越州長史窮歷剡溪山悅謝家青山李白晚度牛渚磯至姑孰悅謝家青山欲終焉及卒葬山麓愛陸渾家山水元德秀愛陸渾佳山水乃定居慶山五行志垂拱二年九月已巳雍州新豐縣露臺鄉大風雨震電有山湧出高二十丈有池周三百畝池中有龍鳳之形禾麥之異武后以為休應名曰慶山僕夫穿竹語稚子入雲呼杜甫蜀山行作得山定否世宗謂馮道曰劉旻烏合之衆若遇我師如山壓卵道曰陛下作得山定否世宗怒起去卒自將擊旻果敗旻於高平底柱山陝州陝石有底柱山山有山門河所經太宗勒銘志名山三百六十酉陽雜俎移永昌中華州赤水南岸太山晝日忽風昏有聲隱隱如雷頃之漸移東數百步擁赤水壓張村三十餘家山高二百餘丈水深三十丈坡上草木宛然布散雲雨楊炯冕服議曰山者布散雲雨象聖王澤霑下人也孤峰絶岸壁立萬仞張說山嵎嵎以巖立柳宗元賦磝磝山磝磝其相軋出韓愈別知賦造化尤物九華山自是天地一尤物劉禹錫詩輔唐山王旻請於高密牢山合煉玄宗許之因號山為輔唐山旻居之出獨異志崎嶬而不極文粹張說賦江上之峻山兮鬱崎嶬而不極山隱隱以掃空皮日休晴山翠遠而四合李白文養雲雨以潤物陸希聲山居記酌而飲頤山曰吾所以命夫山之為頤者勉子以養也子其養雲雨以潤物養霧露以生物養風霆以長物養雪霜以肅物養巨林以充棟宇養小林以為蒸薪養茅管以茨藉養竹箭以為器用養百果以充口腹養百藥以蠲札瘥養昆蟲使咸樂其生養鳥獸使各遂其性山上有蔥下有銀酉陽雜俎山上有蔥下有銀山上有薤下有金山上有薑下有銅錫山有寶玉木旁枝皆下垂聚拳石為山白居易廬山記指遙青而點黛者問之則曰某山某巖某林某野馮宿東峰新亭記列嶺群峰文粹陳寬穎亭記列山嶺群峰而來崒岏不得進煙嶠韋應物詩曰山煙嶠物買山錢雲溪友議于頓鎮襄陽廬山符載山人齎書乞買山錢百萬公遂與之造山崎危詰曲有若天成紀異録昭宗末年長安役人取石於苑中造山崎危詰曲有若天成又命取終南草木植之山禽野獸縱其往復及造屋室如庶民家帝與嬪妃遊處由是王貴游爭效之末及半年奇花異草自然生滿宮殿識者以為丘墟之象後巢寇入京焚燒殆盡瓦悉為礫游西山登王母祠五代王鎔游西山登王母祠使婦人維錦繡牽持而上白中嶽曰嵩山五嶽之中嵩高維嶽峻極于天維嶽降神生甫及申太室少室嵩高總名也其山東為太室西為少室故曰二室謂之室者以其下各有石室萬歲聲漢書武帝禮登中嶽聞有言萬歲聲三於是以三百戶封奉祀命曰崇高為嵩高降神見上鎮地配天三公天子祭名山五嶽視三公仙列仙傳王子喬即子晉也周靈王太子好吹笙作鳳鳴遇道士浮丘公接上嵩高山三十餘年而得仙已見七月七日門注又漢武帝夢與李少君俱上嵩山逢繡衣使者從雲中下言太一請少君曰少君當捨朕去矣嵩山記云鬼谷先生於嵩山東南學仙節彼靈山奠茲中土節高峻也瞻彼高嶽鎮茲坤儀巨鎮名雄五嶽秩視三公禮朝陽夕陽爾雅曰山東曰朝陽山西曰夕陽崔嵬爾雅云石戴土謂之崔嵬砠又曰土戴石為砠嵩高白虎通曰中央之嶽獨加高字者何中央四方之中可高故曰嵩高山墜仙館劉義慶世說嵩山北有大穴晉時誤墜穴中見二人圍棋有一杯白飲與墜者飲飲焉氣力十倍棋者曰汝可住此墜者不願棋者曰從此西行有天井其中多蛟龍但投身入井中自當得出若饑取井中物食之墜者如其言可半年出蜀中因至洛問張華華曰此墜仙館也其所飲者玉漿也所食者龍穴內石髓孔神嶽則天紀垂拱四年七月改嵩山為神嶽封其神為天中王封于神嶽萬歲通天元甲戊如神嶽甲申封于神嶽遁舍嵩山杜楚客建成難作楚客遁舍嵩山貞觀四年召為給事中太宗曰君居山似之矣謂非宰相不起渠然耶鶉火大火壽星豕韋為中州唐天文志云云其神主乎嵩丘鎮星位焉日月仙官唐文粹崔融嵩山啓母廟碑九州地險五嶽天中蛇龍洞穴日月仙宮玉女搗帛石五代秦再思紀異曰嵩山之上有玉女搗帛石瑩徹光潔人莫能測嶽下之人云立秋前一日夜常聞杵聲響焉望都峰嶽之西北一峰號望都峰云天氣晴暖即望見洛陽隱如車蓋之狀雞鳴峰又嶽之東北一峰號雞鳴峰云五更之初便見日出中天池嶽頂有中天池開元中隱士盧鴻凡有絶境之處皆勒銘其最妙者此四銘也廬嵩山盧鴻廬嵩山賜隱居服官營草堂到山中廣學廬聚徒五百人群山莫與崇韋應物高少多秀色群山莫與嵩謠高宗自調露中欲封嵩山屬突厥叛而止後又欲封以吐蕃入寇遂停時童謠曰嵩山凡幾層不畏登不得但恐不得登三度徵兵馬傍道打騰騰出五行志四方環鎮嵩當中韓文衡山廟白豫州之鎮周官豫州之鎮曰華山西巡舜典曰歲八月西巡狩至於西嶽削成五千仞山海經華山削成而四方高五千仞其廣千里三峰見華山記太華少華故曰二華鎮地見周官配天山嶽則配天介二大都高五千仞三公見嵩山注天府之襟帶節彼大華鎮于西方瞻彼名山奠茲西土奠鎮也巨鎮名雄五嶽秩視三公巨靈郭緣生述征記曰華山與首陽本一山河神巨靈擘開以通河流故掌跡存焉西京賦巨靈贔屭高掌遠跖以流河曲厥跡猶存蓮花峰華山記曰山頂有千葉蓮花服之羽化因名曰華山焉地載禮曰地之廣厚載華嶽而不重靈開見巨靈注中秦城史記秦始皇踐華山以為城周馬歸馬華山之陽蒲池在山頂上石鼓有時聞其鳴毛女列仙傳毛女者在華陰中獵人往往見之體生毛自云秦皇宮人而不老隱前秦録王猛隱華山桓溫入關猛被褐而謁之面說當代之事捫蝨而言傍若無人列仙傳修羊公止華山石室中有懸石如榻臥其上石盡穿陷仙列仙傳馬明生入華陰山含金液丹升天也又列仙傳呼子仙者卜師也騎龍上華山而去又衛升卿乘雲駕鹿博于華山石上追之不可得九山呂氏春秋曰何謂九山會稽太山王屋首陽太華岐山太行羊腸孟門為城恨賦華山為城孔祈神自卜裴寂過華山祠祈神自卜生金李適之嘗與李林甫爭權不協林甫陰賊好諛謂適之曰華山生金采之可以富國顧上未之知適之性疏信其言他日從容為帝道之帝喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可以穿治故不敢以聞帝以林甫為愛已而薄適之不親肖安樂公主纍石肖華山踞中土西偏當七宮正位張說華山碑又下有方士真人金鼎石室上有明星玉女仙草瑤池弟龍一去毛女千祀巉巉太華柱天直上青崖白谷仰見靈掌雄峰峻削菡萏森爽是曰靈嶽衆山之長上登華嶽之巔唐李肇國史補韓文公登華嶽之山巔其顧視險絶恐栗度不可下乃發狂慟哭而欲縋甕肚峰唐開元記華嶽雲臺觀中方之上有山崛起半甕之狀名甕肚峰上賞望嘉其高迥欲於峰腹大鑿開元二年字填以白石令百餘里見諫官上言乃止朱鬒紫衣車駕次華陰上見山嶽神數里迎謁遂召諸巫問神安在獨老巫阿馬婆奏云在路左朱鬒紫衣迎候陛下上顧笑之上至廟見神橐鞬俯伏庭東南大柏樹下又召阿馬婆問之對如上見上加敬禮尋詔先諸嶽封為金天王仍上自書製碑文以寵異之其碑五十餘尺闊丈餘厚四尺天下碑莫比也呼吸之氣息相通帝坐搔首集李白登華山落鴈峰曰此山最高呼吸之氣想通帝坐矣恨不移謝眺驚人詩來搔首問青天爾靈蹤露指爪靈蹤露指爪殺氣見稜角劉禹錫華山詩上元二年華山曰太山寶應元年復故名地里志倚京師而西峙靈鎮三峰倚京師而西峙文粹席豫楊仲宣碑拜山東夷有識山者遍拜五嶽一拜而退惟入關望華山自關西門拜禮至山下仰望七日嘆吒而去謂京師衣冠文物之盛由此而致出唐語林登蓮華峰王玄仲欲登蓮華峰約寺僧到峰頂當起煙為信翌日持火而登僧候之數日果有煙起留二旬乃復下僧問之云峰頂有池菡萏盛開可愛其中又有破鐵舟存焉三水小牘玉井蓮太華峰頭玉井蓮花開十丈藕如船韓文古意見若咫尺田千畝矣楊敬之華山賦起居於上宮室於上如此之久矣其所見何如也曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻蛭臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聯聯美阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣其下千載更改興壞悲愁辛苦循其上矣愛華山之為山而有三得始其卑者朝高者覆得其揭然無附著而又得其近而能遠窮搜極討灑豁襟抱始以往來番番不遂其願李商隱與陶進士詩玉池神挹石室仙開海絶瀛州天遙玄圃華山碑其行配金其氣直酉軒帝遊焉以會衆神虞舜柴焉以覲群后上作鎮中土據於西陲李德裕一品集祭西嶽文作鎮中土據於西陲積高稟靈宅神明之奧少陰恢德成天地之分左抱桃林之塞右産藍田之玉張說碑諒少昊之下都即蓐收之別館也同上太華三芙蓉明星玉女峰李白詩立表以算其高五千仞明焉張說太華五千仞劈地抽森秀李賀鶉首實沈以負西海天文志華嶽金天晶杜詩雲斷嶽連臨大路同上倚巖睨海浪引袖拂天星韓愈答張徹詩華陰有嶽祠唐地里志御製碑有聲唐廣明元年華嶽廟玄宗御製碑隱隱然有聲聞數里間浹旬乃止白東嶽博物志曰東嶽一名天孫言為天命之孫岱宗五經通義曰太山一名岱宗王者受命易姓報功告代於岱宗岱者代也東方物之始交代之處又群嶽之長封禪白虎通曰王者受命必封太山之高以報天禪梁甫之趾以報地史記自古封太山禪梁甫者有七十二君東巡尚書曰東巡狩至于岱宗柴日觀太山記東南巖名曰日觀言雞一鳴時見日出秦觀者望見長安吳觀者望見會稽周觀望鎬也黃河去嶽三百餘里望見之如帶三宮洞天茅君內傳曰仙家凡有三十六洞天岱宗之洞周回三千里名之三宮空洞之天天孫見上巖巖詩太山巖巖魯邦所瞻瞻至也言山在魯境雲起史漢武封太山白雲起于封中兗州之鎮周書兗州之鎮曰太山東岱亦泰山石閭在泰山上如礪漢高祖曰太山如礪五祠漢書五嶽皆三祠獨太山唯五祠隱神仙傳曰太山老父者失其姓名漢武東巡見老父鉏於道間頭上有白光冠五嶽之首五嶽岱為之長視三公之秩見上季氏旅於泰山鄭伯請釋太山而祀周公三廟太山有上中下三廟也節彼高山鎮茲東土巨鎮瞻彼靈嶽鎮茲東方鎮地配天名山見上其頽禮太山其頽則吾將安仰安仰見上仙列仙傳曰稷丘君太山下道士漢武東巡乃擁琴而拜又仙傳崔文子太山人潛居山下好黃老術嘗賣藥雲公羊專曰觸石而出膚寸而合不崇朝而遍天下者唯太山之雲也雲氣袁嵩漢書曰光武封太山雲氣成宮闕金篋玉策古者封泰山禪梁甫風俗通云岱宗上有金篋玉策能知人之壽修短漢武探得十人因倒讀曰八十其後果然主人命博物志一名天孫主召人魂東方萬物之始故知人生命之短長孔禪于社首玄宗開元十三年十一月庚寅封于太山辛卯禪于社首升山張九齡帝東封太山說多引兩省録事及所親攝官升山懸崖韓愈書臨泰山之懸崖莫不戰悼惶栗眩惑而自失造化鍾神秀杜甫望嶽一手搖庶人祐野人高君狀曰今王以數千人為亂猶以一手搖太山又如君父何總神靈之府唐文粹張說封禪頌泰山者聖帝受天官之言天孫總人靈之府白騾唐開元記上到泰山益州進白騾至豐潔肥澤俊偉奇異上遂親乘之柔順安便不知登降之倦告成禮畢復乘而下才下山休息未久而有言白騾無疾而殪上嘆惜之諡曰白騾將軍命有司具槥櫝疊石為墓墓在封禪壇北一里餘于今存焉泰嶽泰嶽既寧登封有日劉禹錫賀平淄青表參天入雲李善注文選太山之高參天入雲赤霄可接白雲在下張說封禪頌出天門臨日觀次沆瀣宿巉巖赤霄可接白雲在下石平御道開李白四月上泰山石平御道開六龍過萬壑澗谷隨縈回泰山起雲無遠不被張九齡龍池聖德頌若泰山起雲無遠不被高高至天門李白送范山人歸太山高高至天門海日近可攀石銘玉策泰山東南之日觀也則秦皇刻其石銘漢皇探其玉策楊炯其方處萬物之始故稱岱焉其位居五嶽之伯故稱宗焉明皇太山銘登高望蓬瀛想像金籙臺李白遊太山詩山際逢羽人方瞳好容顏同上遺我鳥跡書飄然落巖間其字乃上古讀之乃不間同上舉手開雲關平明登日觀舉手開雲關精神四飛揚如出天地間上求美南郊賦云東岱五嶽之長足以勒崇垂鴻與山無極高視萬古明皇紀泰山銘高視萬古自比九星降婁玄枵以負東海其神於岱宗歲星位焉唐天文志太山冥冥崒以高杜甫雜述攀崖上日觀伏檻窺東溟李白日觀東北傾兩崖夾雙石同上白北嶽常山爾雅恆山謂之常山風俗通云恆常也萬物狀北方有常也白虎通曰北方有常山者何陰陽終其常各故曰常山并州之鎮周官曰并州之鎮恆山也朔巡虞書曰十一月朔巡狩至于北嶽瞻彼靈山鎮茲朔土臨岱北俯趙南早生早生而晚殺五穀蕃熟四種而五獲神護草本草云常山有草名神護致之門上每夜吒之圭璧慕容雋得璧七十二圭七十侍祀神後魏道武立廟於上置祝九十九人歲時祈旱至文成帝親祀其神趙符史趙簡子謂子曰吾藏寶符於常山得者立為後諸子皆競往無所得無恤曰常山臨代代可取也乃立之燕璧前燕録曰慕容雋壽光二年常山得璧七十二光色有異俊以為神嶽之命以太牢祀之趙代之境恆山居趙代之境簡子曰常山北臨代南俯趙東接河海之間畢昂之精春秋元命苞云常山畢昂之精蟲蛇孫子曰常山之蛇名率然一身兩頭攻其中兩頭應隱列仙傳曰昌容者常山道士稱殷王女食蓬蔂根得道二百餘歲顏色不變兩頭蛇五獲穀奕奕巍巍秀峙陰嶽恆山五孔北嶽醫問神鬼受職韓愈請上尊號表折木大街星宿清潤北嶽醫問神鬼受職西方來助祭者十餘國裴矩帝有事常山西方來助祭者十餘國常山曰恆山五代安重榮朔州人杜重威使人檎之斬首以獻高祖御樓受馘改成德軍為順德鎮州曰恆州常山曰恆山上抶乾門黑帝之宮觀下捺神之都府唐文粹張嘉貞恆山碑其頂也上抶乾門黑帝之宮觀其足也下捺坤軸玄神之都府瘞玄玉可以瘞玄玉於常山子遺又於河隴杜牧論邊事啓泥紫金兵為農器革作軒車泥紫金於常山沉殘戎於青海賀平黨項表中郡有五寶符在代外夷有四昂宿主胡管袤以限之中郡有五寶符在代則高襄以臨之張嘉貞碑序雖黝輅纁旗未由冬覲而圓璧方圭每自天來同上大梁析木以負北海其神主於恆山辰星位焉唐天文志鎮嶽地理志定州曲陽本恆陽元和十五年更名是年又更恆嶽曰鎮嶽有嶽祠惟靈山之秀峙亙朔野而標奇唐太宗祭恆山文幽澗冬暄飛泉夏冷寶符臨代邦之美靈蛇表陳勢之奇同上白南嶽荊山之鎮周禮荊山之鎮衡山岣嶁山海經衡山一名岣嶁上音矩下音縷灊霍為副衡山記衡山南嶽也至黃帝乃以灊霍一山為副爾雅云霍山南嶽因其制也至漢武帝南巡又以衡山遐遠阻江乃徙南嶽之祭于廬山灊山北亦乘軒轅副義也朱陵衡山南嶽者朱陵之靈臺太虛之寶洞赤帝館其嶺祝融宅其陽高四千一十丈三峰衡山有三峰一曰紫蓋每見輒有雙白鶴回翔其上二曰石菌下有石室三曰芙蓉上有泉水飛流如練帶九向湘中記衡山近望如陳雲公湘千里望之九向九背禹祭吳越春秋禹傷父功不成乃巡衡山血馬以祭之仰天而嘯忽夢男子自稱玄夷蒼水使者謂禹曰我欲得山神書者齊焉禹乃退齊三日遂獲金簡玉字之書得治水之要隱宋書曰宋炳尋名山南登衡嶽乃結宇於山懷尚平之志仙異苑曰湘東姚祖遊衡山望見巖下數少年並善筆祖近百步少年相與飛揚遺紙書其字皆鳥跡也紫蓋之峰見上回鴈之嶺鴈不過衡陽陳雲之岫見九向注維南有山巨鎮節彼名山奠茲南服瞻彼靈嶽鎮于炎方鎮地配天銓德上承冥宿銓德鉤物下踞離官攝位大卿赤館舜廟羅含湘中記曰衡山九疑皆有舜廟太守至室常遣戶曹致修祀則如有絃歌之聲寶洞見朱陵注石囷劉麟之好山澤採藥至衡山深入數日其路乃迷忘反見有澗水水南有三石囷一開一閉水廣深不得過石書南嶽文曰衡山高四千一十丈赤帝館其嶺祝融宅其陽盛神堂堂蔭映峨峨是以為神靈之所宅同上梧桐生馬融琴賦曰惟梧桐之所生在衡山之峻阪結宇見上執書荊州記曰初有採藥衡山見一老翁四五年少對坐執書桓玄序姑洗之旬始暨于衡嶽軒塗三百山徑通微垂柯跨谷峽巘交蔭或曲溪如塞已絶復開或垂步長嶺或憩興素石映濯水湄仰瞻翠摽緬視天際身陵太清獨文露景也名備五嶽位列三公峻阪崇巒秀壁孔願隱衡山李泌畏禍願隱衡山有詔給三品祿賜隱士服為置室廬火維韓愈衡廟詩火維地荒足妖怪為宗又送廖道士序南方之山巍然高而大者以數百獨衡山為宗星紀鶉尾以負南海其神主乎衡山熒惑位焉唐天文志游嶽祠杜甫大曆中出瞿唐下江陵泝沅湘以登衡山因客耒陽游嶽祠雲壁覃覃韓文委舟湘流而往觀南嶽雲壁覃覃穹林悠擢衡嶽啼猿裏杜甫詩紫蓋連延接天柱石廩騰擲推祝融韓文五嶽衡山最遠五嶽於中州衡山最遠韓文其神必靈同上學於衡山廖氏郴氏學於衡山蒼蒼入紫冥衡山蒼蒼入紫冥下看南極老人星回飆吹散五峰雪往往飛花落洞庭李白送陳郎將氣清嶽秀有如此同上翠皛衡嶺浮翠皛劉禹錫詩噴雲泄霧噴雲泄霧藏半腹雖有絶頂誰能窮韓愈詩欻吸領地靈鴻洞半炎方杜甫望嶽南嶽配朱鳥秩禮自百王祝融五峰尊峰峰次低昂紫蓋獨不朝爭長業相望同上又恭聞魏夫人群仙來翱翔有時五峰氣散風如飛霜江南之仙山黃鶴之爽氣李白送林公遊衡嶽江南之仙山黃鶴之爽氣又登祝融之峰巒望長沙之煙火白中南關中記一名中南言在天中居都之南故曰中南太一五經通義曰中南一名太一地肺三秦記云終南山一名地肺可避洪水俗人云上有神人乘船行追之不可及福地記稱中南太一山左右三十里內名福地也隱高士傳四皓綺里季等共入商洛漢高徵之不來乃深匿終南又前秦録王嘉不食五穀清虛服氣潛終南山庵廬而已仙三秦記云西有石室靈芝常有一道士不食五穀言太一之精齊潔乃得見節彼南山奠茲中土瞻彼南山鎮茲甸服有條有梅詩云終南何有有條有梅有杞有棠鎮地之雄極天之峻天府之襟帶東接驪山太華西連太白至于隴山北去長安城八十里南楚塞玉堂南五十里有玉堂陽官石室中有石室靈芝張樂後代聖人主得瑞者張樂奏終南山上表都表以太華終南之山文漆船山有漆船碧玉班固終南山賦曰翔鳳哀鳴集其上珍怪碧玉挺其阿彭祖宅以蟬脫安期響以延年崔崒巃嵷嶙囷旁吐飛瀨玄泉落落松連霧幽徑壁千丈萬仞巍峨嵯崢嶸上挺修林密陰沉孔仕途捷徑盧藏用司馬承禎嘗召至闕下將還山藏用指終南山曰此中大有佳處承禎徐曰以僕視之仕途之捷徑爾藏用慚游崔咸游終南山乘月吟嘯至感慨泣下終南山下有舊廬頗有水樹當以耒耜筆硯聞杜牧上知己文章啓廬韓朝宗始開元末海內無事訛言兵當興衣冠潛為避世計朝宗廬終南山為長安尉霍仙奇所發玄宗怒使侍御史王珙訊之貶吳興別駕旱藕方技姜撫言終南山有旱藕餌之延年狀類葛粉帝作湯餅賜大臣作固鎬京柳宗元終南山祠堂碑巍巍靈山興利産材作固鎬京擁其嘉休接終南之壽山唐文粹李庾西都賦其地勢也負秦章臺倚漢甘泉帶涇渭之富流接終南之壽山巉巉長安雨洗新秋出極目寒鏡開塵函終南曉望踏龍尾倚天更覺青巉巉韓文望秋作伐薪汲泉皆是名士邢和璞曾居終南好道者多卜築依之崔曙年少亦隨焉伐薪汲泉皆是名士出門見南山李白望終南出門見南山引領意無限秀色難為名蒼翠日在眼惟終南據天之中柳文惟終南據天之中在都之西南至于褒邪又西至于隴首以臨于戎東至于商顏又東至于太華以距于闕是能作固以屏王室其物産之厚器用之出則璆琳琅玕夏書載焉紀堂條梅秦風詠焉錯磨終南翠杜甫渼陂西南臺詩隱終南山孫思邈常隱居終南與宣律師相接每來往互參宗旨雜俎青冥天倪色李白君子有所思行紫閣連終南青冥天倪色平崖望咸陽宮闕羅北極日色低平灣李賀終南日色低平灣白玉石俱焚書云火炎昆岡玉石俱焚投人傳齊高國入晉師磔石以投人曰欲勇者賈余餘勇嘉石周禮大司寇以嘉石平罷民有罪者坐為嘉石肺石周禮以肺石達窮民凡遠近孤幼之欲有復於上而其長弗達者立於肺石肺石赤石也梁大監中於公車府設謗木肺石置函欲有橫議投謗木於函五年詔曰朕晦旦齊居惟刑是恤三辟五聽寢興載懷故陳肺石於都街怪石禹貢曰鉛松怪石注怪異好貌衆鈱子貢曰君子賤鈱以鈱之衆也漸漸詩漸漸之石維其高矣巖巖節彼南山維石巖巖積石貌落落如石磊磊間中石他山之石可以攻玉燕石荀卿子曰宋之愚人得燕石於梧桐臺之東歸而藏之以為寶周客聞而觀焉主人齊七日端冕玄服以發寶革匱千重緹巾十襲客見之掩口而笑曰此燕石也其與瓦甓不殊一拳禮今夫山一拳石之多水投以水投石莫之受也以石投水莫之逆也雲觸石而起盤石之固泐泐解散也有時而泐轉我心匪石不可轉也言傳曰石言於晉魏榆師曠曰石不能言或憑焉不然民聽濫也臣又聞作事不時怨讟動於民則有非言之物而言也五色補天女媧煉五色石以補天隕傳僖公十六年隕石於宋五隕星也鵲搜神記常山張皓為梁相時天新雨後有鳥如山鵲飛翔市人擲之墜地爭取即化為一圓石皓椎破之得一金印文曰忠孝侯印燕唐仲雍湘州記零陵有石燕得風雨則飛翔如真燕風雨止還為石也望夫武昌山北有望夫石云昔貞婦夫從役遠赴國難婦攜弱子餞送此山立望夫而死化為立石因名焉飲羽射有飲羽於石韓詩外傳曰楚熊渠子夜行寢石以為伏獸彎弓射之飲羽下視乃石也因復射之無跡漢書載李廣亦如之支機織女以石支機羊黃初平叱石成羊魚昆明池刻石鯨魚雷雨則鳴吼異隕於宋都是何祥也言於晉國或有憑焉圭化傳王子朝見圭璋門韞玉文子曰石韞玉而山輝犀蜀都水災乃刻石犀沉江浦見救水災門注童子陳倉童子化為石黃公史記張良見一老人出一編書曰讀是為王者師後十三年見我濟北穀城山下石即我也精衛御石以填東海見海門注惡焦中玄記曰天下之彊者東海之惡焦焉水灌而不已惡焦者山石也海東南方三萬里海水灌之即消神鞭見神門注石八孔纍石肖華山安樂公主纍石肖華山磴彴橫邪回淵九折以石瀵水隕石十八于馮翊於志寧永徽四年隕石十八千馮翊高祖問曰此何祥也朕欲悔往修來以自戒若何志寧對曰春秋隕石于宋五內史過曰是陰陽之事非吉凶所生物固有自然非繫一人事雖然陛下無災而戒不害為福瑞石馮元常樊文進瑞石後暴石朝堂示百官元常奏石妄僞不可以示群臣后怒出為隴州刺史洛水石李昭德有人獲洛水白石而赤文者獻闕下因此石赤心故以獻昭德叱之曰洛水餘石豈能盡反耶據以草制薛元超轉中書舍人省中有盤石道衡為侍郎時嘗據以草制元超每見輒泫然流涕鬱林石陸龜蒙陸氏在姑蘇其門有巨石遠祖績當仕吳為鬱林太守罷歸無裝舟輕不可越海取石為重人稱其廉號鬱林石世保其居云聚石馬燧表隴州刺史西山直吐蕃其上有通道虜常所出入者燧聚石種樹障之設二門為譙櫓八日而畢虜不能暴書法徐浩書益工世狀其法曰怒猊抉石沒唐石王重榮傳帝出奔欲入谷中自固以谷有沒唐石惡之遂徒石門醒酒石五代張全義監軍嘗得李德裕平泉醒酒石德裕孫延古因托全義復求之監軍忿然曰自黃巢亂後洛陽園池無復能守豈獨平泉一石哉全義嘗在巢賊中以為譏己因大怒奏笞殺監軍者石走五行志資州有石方丈走行數畝青錦李白片石寒青錦創石樓香山白居易松風石唐杜陽雜編曰武宗會昌元年大食國貢松風石方一丈瑩徹如玉其中有樹形若枯松偃蓋颯颯焉而涼飆生於其間至盛夏上令置諸殿內稍稍秋氣颼飀即令徹去仙人鏡日林國西南有怪石方數百里光明澄徹可鑒人五臟六腑謂之仙人鏡其國人有疾皆輒照之其形遂知終南紫石樂天女金鑾十歲忽書北山移文示家人樂天方買終南紫石欲刊文士傳遂輟以勒焉出豐年傳其石之突怒偃蹇負土而出爭為奇怪狀者殆不可數其欽然相纍而下者若牛馬之飲於溪其衝然角列而上者若熊羆之登於山柳宗元鈷鉧潭記大石林立渙若奔雲錯若置棋怒者虎鬥企者鳥厲抉其穴則鼻口相呀搜其根則蹄股交峙萬石亭記怪石森然周於四隅或列或跪或立或僕竅穴逶邃堆阜突怒新堂記佛座武肅王錢鏐自幼嘗與鄉里兒童聚戲於樹陰石上指其樹石曰我貴賞爵而覆之建功臣精舍遂以其石為佛座焉出吳越備史落星石祕省內落星石薛稷畫鶴賀知章草書郎餘令畫鳳相傳號為四絶南部新書石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石洽聞記沙羅石河南長壽毀南有婆羅亭貯奇石處世傳李德裕醒酒石以水沃之有草木自然之狀今謂沙羅蓋以樹石河南志太湖為甲奇章公嗜石游息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉白居易太湖石記嶺石拆天罅韓愈縣齊詩橫波之石利侔劍戟韓文石眼影燈記曰上元夜蕭餘於宣陽里酒盤下得一物如人眼睛其體類美石光影射人每置掌中遊暗處輒光明三尺許後因雨飛去青石三白樂天洛陽履道里洪農楊正一遺石三方丈平滑可以生臥韶石酉陽雜俎荊州利水間有二石若闕名曰韶石晉永和中有飛仙衣冠如雪各憩一石旬日而去人咸見之青衣若龜形五廣德神異記唐齊王元吉於晉陽宮獲青石若龜形五有丹書四字曰李淵萬吉元吉遣使獻之文字映徹宛若龜形見者咸異焉高祖曰不足信也乃令水漬磨以驗之數日浸而紅色磨之其字愈明於是內外畢賀高祖曰上天明命貺以萬吉孤陋寡薄何堪預此宜以少牢祠石龜而爵送之祝石不落獨異記唐中宗為天后所廢於房陵仰天而嘆心祝之因拋一石於空中曰我復帝此石不落其石遂為樹枝勾掛至今尚存燃石建成縣出燃石色黃理疏以水灌之則熱安鼎其上可以炊也酉陽雜俎有流石成形柳州山水記仙奕之山其上有穴有屏有室有宇其下有流石成形如肺肝如茹房或積於下如人如禽如器物甚衆錦石小如錢杜甫秋日詠懷有石焉翳乎奧草柳宗元新堂記秦神驅石以梁大海同上晉問青質白文成字五行志貞觀十七年八月涼州昌松縣鴻池有石青質白文成字太宗遣使祭之曰天有成命表瑞貞石文字昭然曆數惟永富哉石乎厥狀非一有盤坳秀出如靈丘鮮雲者有瑞儼挺出如真官神人者有縝潤削成如圭瓚者有廉稜鋭劌如劍戟者又有如虯如鳳若跧若動將翱將湧如鬼如獸若行雲驟將攫將斗風烈雨晦之夕洞穴開嗤若欱雲噴雷嶷嶷然有可望而畏之者煙霽景麗之日旦巖崿霮䨴若拂嵐撲黛靄靄然有可伸而玩之者石有大小其數四等以甲乙丙丁品之每有山中下各刻於石陰曰牛氏石甲之上丙之中乙之下百伊一拳千里一瞬此所以為公適意之用也並白氏記碎石如粉江南野史道士談紫霄鄰僧於溪滸劫亭為頑石所礙致一百倍不能平之紫霄見曰斯易爾以指捻印水噀之命斧擊石應手如粉黑潤可愛崔玄亮常侍在洛中嘗間步沙岸得一石子太如雞卵黑潤可愛玩之行一里餘忽然而破有鳥大如巧婦飛去白天中柱河圖曰崑崙山天中柱也五城十二樓又曰崑崙之墟五城十二樓河水出四維魚龍赤水之後黑水之前大荒經曰赤水之後黑水之前有大山名崼侖之丘有神人面虎身有毛西方之美爾雅曰西北之美者有昆侖墟之璆琳琅玕焉黃帝宮穆天子傳曰遂宿於崑崙之阿赤水之陽吉日辛酉天子升于崑崙之觀黃帝之宮仙人居葛仙翁傳崑崙山一曰玄圃臺一曰積瑤房一曰閬風臺一旦華蓋一曰天柱皆仙人所居周穆西征紀年曰穆王十七年西征至昆侖丘見西王母乃宴張騫奉使漢史張騫大夏之後窮河源惡賭本紀所謂崑崙乎日月所隱史記禹本紀言河出崑崙山山高三千五百餘里日月所相隱避為光明也其上有醴泉華池自張騫大夏窮河流黃水博物志曰崑崙從廣萬一千里神物所生聖人仙人所集也出五色雲氣五色流水東南流黃水入中國為河環炎火搜神記崑崙山地首也實惟帝之下都故外絶以弱水之深又環炎火之山山上鳥獸草木皆生育滋茂於炎火之中故有火浣布非此山之皮革則鳥獸之毛羽也去中國五萬里水經曰崑崙之墟在西北方去嵩高五萬里地之中其高萬一千里河水出其東北陬也孔登崑文粹張說昭容上官氏文集序曰窈窕柔曼誘掖善心故登崑巡海之意寢剪胡刈越之威息仙岑文粹李德裕武宗真贊崑閬仙岑峻極秋旻天地之齊段成式雜俎玉格崑崙為天地之齊惜域瑤池飲日晏崑崙丘黃皓去不息哀鳴何所投杜甫詩西北之天門昆閬西北之天門也則五帝處其陽陸三皇居其正地文粹楊炯少姨廟碑崑崙月窟東嶄巖杜甫草堂亂玄圃不隔崑崙岑杜甫阻雨詩驅八駿於崑崙杜甫西嶽賦崑崙高萬里歲盡道苦邅韓愈詩白天子鄣山海經曰廬山一曰天子都一曰天子鄣匡俗廬周景彧廬山記曰匡俗周威王時生而靈神廬此山世稱廬君故山取號焉江陽之名嶽伏滔遊廬山序曰廬山者江陽之名嶽其形大背涵流向彭蠡蟠根所據亙屬數百里重嶺桀崿仰插雲日俯激川湖之流南國之德鎮梁元帝廬山碑序曰夫日月麗天星穹所以貞觀川嶺帶地后土所以唯寧廬山者亦南國之德鎮雖林石異勢而雲共色香爐遠法師廬山記曰東南有香爐山孤峰秀起游氣籠其上則氛氤若煙山帶張野廬山人將雨則有白雲或冠峰巖或亙巖中謂之山帶不出三日必雨也觀禹周景或廬山記曰登廬山望九江以觀禹之跡其茲峰乎東南隱諸嶺不得駢矚自廬山人跡所暨回望處無復出此者甚高峻每雨其下成潦其上猶映日峰頭有盤石坐數百人種杏神仙傳董奉石門遠法師廬山記曰西南有石門山其狀似雙闕壁立千仞而瀑布流焉孔長山橫蹙李白於敬亭送姪遊廬山寺云方告我遠涉西登香爐長山橫蹙爐峰權德輿送靈徹序云自爐峰言旋匡廬奇秀甲天下山白居易草堂記曰匡廬奇秀甲天下山廬山以靈勝待我同上記北峰曰香爐峰北寺曰遺愛寺同上據層崖積石嵌空垤堄堂東有瀑布水懸三尺同上蕭存故居蕭存卒韓愈少為存所知自袁州還過存廬山故居惟一女存焉經贍其家九江秀色可攬結廬山東南五老峰青天削出金芙蓉九江秀色可攬結吾將此地巢雲松李白望五老峰詩西登香爐峰南見瀑布外望廬山瀑布上秀出南斗傍廬山謠屏風九疊雲錦張同上興因廬山發好為廬山謠興為廬山發間窺石鏡清我心謝公行處青苔沒同上香爐峰色隱晴湖種杏仙家近白榆杜甫贈蘭若立草堂白居易居廬山二林間香爐峰下立草堂前有喬木修竹居易與湊蒲朗晦四禪師追惠遠次宗之並為方外之交舊七詠唐江西帥韋丹與東林僧靈徹友善唱和詩什頗多韋為序曰徹公近以匡盧七詠見寄皆麗絶於文圃也七詠則蓮華峰石鏡虎跑泉聰明水白鹿洞鐵船康山廟為七詠也雞距集爐峰生轉眄杜甫詠懷白歸山山海經曰太行之山其首曰歸山其上有金玉下有碧駕駿穆天子傳曰天子命駕八駿之乘赤驥之駟南征朔行徑絶雀道升太行南濟於河驅驥墨子謂耕桂子曰將上太行駕驥與牛子將誰驅口驅驥以貴驥牛之難尸子曰龍門魚之難太行牛之難以德報怨人之難塹太行之道戰國策曰范睢說秦曰舉兵攻滎陽則成皋之路不通塹太行之道則上黨之兵不下舉兵而攻滎陽則其國斷而為三仙神仙傳曰王烈入太行山忽聞山東雷聲往視之見山石上破數百丈石中有一孔尺餘中有青泥流出烈取搏之隨手堅凝氣味如粳米飯按仙經云此石髓服之壽與天齊太行恆山至於碣石入於三江尚書禹貢孔登山狄仁傑親在河陽仁傑登太行山反顧見白雲孤飛謂左右曰吾親舍其下隱太行崔信明建德潛隱太行山太行卻立通谷前廓李明堂賦太行枕甸發址崇垓文粹李庚東都賦群鳥夜集元和四年十二月群鳥夜集於太行山上出五行志崖有聲武德二年三月太行山聖人崖有聲古者有寇至見君乘騶馬知上太行道此地果摧輪全身以為寶李白將登太行雪暗天上行路難不知太行之異乎九衢柳宗元愚溪吾蕩而趍不知太行之異乎九衢太行回車竟可托李白擬古摧輪李白憶舊遊五月相呼度太行摧輪不道羊腸苦磴道盤且峻巉崖凌穹蒼李白北上行北上何所苦北上緣太行磴道盤且峻巉巖凌穹蒼馬足蹶側石車輪摧高岡沙塵接幽州烽火連朔方蒼然太行路翦翦還榛莽杜牧感懷詩誰把長劍倚太行韓愈是時新晴天井溢誰把長劍倚太行白地雌河圖括地象曰荊山為地雌上為軒轅多金鐵山海經曰荊山其陰多鐵其陽多赤金泣玉韓子曰卞和得玉於荊山之中將獻於楚王王使工人相之曰石也王怒刖其左足和抱玉坐荊山之下三日泣盡繼之以血見玉部注水經曰荊山在南郡阻縣東孔放舞象德宗帝紀大曆十四年五月丁亥放舞像三十有二千荊山之陽産玉歐陽詹送族叔下第歸廣陵序荊山産玉自民役巧瑢瑑蓋多此外無秀劉禹錫九華歌愛荊山以謂此外無秀秦欺趙氏璧卻入邯鄲宮本是楚家玉還來荊山中李白將遊衡嶽荊山長號泣血人忠臣死為刖足鬼李白鞠歌行朅來荊山客同上感興朅來荊山客誰為鈱玉分良寶絶見棄虛持三獻君湖城有熊耳山覆釜山一名荊山地里志虢州白蔣山徐援釋問略曰建康東北十里有鍾山舊名金山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠焉故號曰蔣山庾闡揚都賦注曰建康宮北十里有蔣山輿地圖謂之鍾山元皇未渡江之年望氣者云蔣山上有紫雲時時晨見楊都之鎮山謙丹陽記曰京師南北並有連嶺而蔣山獨隆窟峻異其形象龍置楊都之鎮也吳主孫權葬山南因山為名號曰蔣陵孔抱金陵李白望金陵詩連山抱金陵霸氣昔騰張龍盤走勢金陵歌石頭巉巖如虎踞凌波欲過滄洲去鍾山龍盤走勢來秀色橫分歷陽樹壙中銘鄭欽說通曆術博物初梁太常任昉大同四年七月於鍾山壙中得銘曰龜言土蓍言水甸服黃鍾啓靈址瘞在三上庚墮遇七中巳六千三百浹辰交二九重三四百圯群峰如逐鹿奔走相馳突李白望金陵白辛毗諫魏志曰明帝即位欲平北邙山令登臺觀見孟津尉辛毗諫曰天地之性高下今而反之既非其理又加損廢人功民不堪役且若九河圖溢洪水為害而丘陵皆夷何以御之帝乃止光武墳邊杏朱超石與兄書曰登北邙遠眺衆美都盡光武墳邊杏美今當奉送核孔陳馬璘從李光弼攻洛陽史義衆十萬陳北邙山偃師李密王世充悉衆決戰密自引精兵出偃師北阻邙山侍之嵩邙陳子昂上書景山崇秀北對嵩邙講武唐高宗麟德二年四月丙寅講武於邙山之陽修邙洛水之陽修邙之趾劉禹錫史公碑銘冢墓嵯峨白居易浩歌行云賢愚貴賤同歸盡北邙冢墓高嵯峨城背韋應物登高望洛城作城背北邙原故都之後文粹張說麗妃神道碑窆於故都之後邙山之陽黑雲上魏證武舞作用凱安邙山黑雲上殮葬北邙羅士信死隱悼贖其尸以葬及東都平出家財殮葬北邙以報德士信為仁基所禮初且曰我死當墓其側至是如所志巨蛇舊志天寶中洛陽有巨蛇高丈餘長百尺出邙山下胡僧無畏見之曰此欲決水豬洛城即以天笁法咒之數日蛇死但哭邙山骨李白誰陳廣陵散但哭邙山骨白葛仙公山名山略記曰天台山在剡即是衆聖所降葛仙公山也劉晨阮肇幽冥録曰漢明帝永平五年剡縣劉晨阮肇共入天台山度山出一大溪邊有二女子姿容絶妙遂留斗年懷土思鄉求歸既出親舊零落邑屋更變無復相識訊問得七世孫玉室璇臺孔靈符會稽記曰赤城山內則有天台靈嶽玉室璇臺忽生忘形異苑曰會稽天台山雖非遐遠自非忽生忘形則不能躋焉孔南游天台吳筠南游天台觀滄海與有名士相娛樂廬天台司馬承禎遍遊名山廬天台不出漫若天合呀如地開崔尚天台桐柏觀碑藐彼天台嵯峨崔嵬下臨滄海遙望蓬萊漫若天合呀如地開靈仙所舍皇甫鎛方士柳泌言天台山靈仙所舍多異草翠屏自云歷天台搏壁躡翠屏李白贈僧崖公五峰轉月色天台連四明日入向國清五峰轉山色百里行松聲送王屋山人天台四萬八千丈對此欲倒東西傾夢遊天姥遂登天台望衆壑皆嶙峋夜宿最高頂舉頭看星辰光芒相照燭南北爭羅陳茲地絶翔走自然巖且神韓子送惠師夜半起下視溟波御日輪上華頂高百越李白詩夢入瓊樓寒有月皮日休文集送內大德遊天台夢入瓊樓寒有月注云天臺山有金庭不死之薌及瓊樓玉室雙峰如闕中天豁開長澗南瀉諸泉合漱一道瀑布百丈懸流望之雪飛聽之風起石梁翠屏可倚也琪樹珠條可攀也仙花露草春秋榮發幽鳥清猿晨暮合響足賞也見天台桐柏觀頌序願官天台柳泌首陽山十六白采苓采苓首陽之巔毛詩伯夷叔齊論語曰伯夷叔齊餓於首陽山下又史記曰伯夷叔齊孤竹君之二子讓國逃去隱於首陽山採薇而食遂餓死於首陽見讓門採薇士嘉樹林魏阮藉詩曰步出上東門遙望首陽岑下有採薇士上有嘉樹林孔洪河之東首陽穹崇唐文粹柳識吊夷齊文洪河之東兮首陽穹崇側聞孤竹二子昔也餒在其中青苔古木蒼雲秋水同上首陽之二子唐文粹李商隱別令孤拾遺書曰首陽之二子豈蘄孟津之八百吾又何悔焉遁入薛牧聞高祖興遁入首陽山將應義舉食雪首陽巔李白有口莫食首陽蕨李白行道難合窆杜子美於首陽之山元稹杜甫詩序燕然山十七白漢書胸奴傳曰二師引兵還至燕然山單于知漢軍勞倦將五萬遮擊二師軍大亂敗二師降單于胸奴哭漢名臣奏曰漢得陰山胸奴長老過之未嘗不哭孔刊燕然之石唐文粹蘇頲集序嘗亦刊燕然之石神丘唐五臣文選封燕然山銘注神丘燕然山也呼吸走百川燕然可摧傾李白憶舊遊雖居燕支山不道朔雪寒幽州胡馬歌燕支落漢家婦文無花色同上塞上曲請纓不繫越且向燕然山同上觀發兵詩倚劍登燕然邊峰列嵯峨同上發白馬羅浮山十八白朱明曜真天茅君內傳曰天之內有地之中洞天三十六所羅浮山之洞周回五里名曰朱明曜真之天石樓袁彥伯羅浮山疏曰遙望石樓直上十里許石樓之於嶺十分之一耳去縣三十里便見山基至所處當百里許山下皆平敞極目羅山浮山羅浮山記曰羅浮者蓋總稱焉羅羅山也浮浮山也二山合體謂之羅浮在曾城博羅二縣之境舊說羅浮高三千丈七十石室七十長溪神明神禽玉樹草木也孔陶仙五代秦再思紀異曰顏真卿為盧杞所陷令單車問罪於李希烈上遣促裝東邁內外知公不還矣親族相餞於長樂坡公謂諸姻族曰吾早典郡於江南曾遇道士陶八八八授與一刀圭碧霞丹令服之自後體健至今不衰人七十上有厄如有即吉他日待我於羅浮山得非今日之厄乎公至汜水忽逢陶笑謂公曰吉吉遂指嵩少而去魯公至汴州希烈僭號使人害於近郊及希烈敗詔得歸葬偃師北山後有商人至羅浮山忽見兩道人樹下圍棋一道士謂商人曰子何人對曰洛陽人道士笑曰奉寄一書達吾家也立札一封題寄偃師北山顏家商人至偃師詢所居即瑩莊也守冢老蒼頭得書大驚曰先太師親翰也因以藏於室子孫選吉日發冢開棺即已空矣子孫徑往羅浮求之竟無跡海黑天宇曠星辰來逼人劉禹錫羅浮詩四百三十二峰皮日休松陵集題羅浮軒轅所居亂峰四百三十二注四百三十二山峰數君言羅浮上容易見九垠漸高元氣壯洶湧來翼身劉禹錫詩峨山在博羅縣西北五十里高三千六百丈周回三百二十七里浮山者本蓬萊之一峰昔時洪水泛海斯來博於羅山崖巘皆合故曰羅浮山至今卉木不同浮山皆海中類也陳郡袁彥伯東苑徐履道皆云蓬萊有三島此其一焉峰嶺秀拔四百餘里峰巒暗映三十二所峰崛起上披重霄下有深洞幽邃旁達約數十里號曰朱明洞洞三十六第七也龍公竹第三峰有竹大徑七尺圍節長丈二謂之龍公竹常有鸞鳳棲宿有道士及採樵之侶性撲者或得其篾山東有溪曰羅陽永泰中暑雨漲有竹葉若芭蕉葉大隨水出須臾一竹闊二尺餘長丈二乃龍公竹也奇石高六百丈廣七十丈綵綺錯爛如霞錦迢迢獨出勢若削成謂之瑤石臺大小石樓相去五里皆孤高峻秀邈出雲表重簷四柱宛如樓閣霞灼雲掩人跡罕到羅浮記鐵橋有石如鞍橋在石樓之間望之可高五十餘步故老謂鐵橋朱明洞天寶初詔道士申大芝祭山欲尋朱明洞時邑簿任知宣領耆舊尋見一洞以藤儋籠石斛垂一人下洞約五丈餘卻出云下視無底日月星辰無不備焉初有白雲須臾散漫五色何氏女持石增城何氏有神仙之術持一石措小石樓之上遠觀如畫碧雞山山有碧雞群飛於絶巘或獨鳴於空林可見不可取也聚霞峰其山在羅浮絶頂上高三百丈周回二十里常有紫霞在於峰上花首臺其洞常有五百花首真人遊會開元二十六年奉敕建于花首臺羅浮靈異記紅翠數聲瑤室響皮日休詩注紅翠山鳥名山有璇房瑤室七十有二白蒼梧之丘山海經曰蒼梧之川其中有九疑山焉舜之所葬在零陵縣界九疑紛兮並匝楚辭九歌也水事多淮南子曰九疑之南陸事寡而水事多望祀淮南子九疑之山漢書云武帝南巡狩至於盛唐望祀虞舜於九疑山見巡狩門九山相似湘中記曰九疑山在營道縣北九山相似行者疑惑故名之曰九疑山仙名山略記曰九疑山漢末有張禮正魏時有治明期南遊九疑禮正服黃精明期服澤瀉柏實後俱遇西城君受虹景方兼以守一遂內洞徹東華遣迎乘雲上升天九疑山十九孔九疑嵯峨湘雲古色唐文粹張謂虞帝廟碑望九疑之垠垠柳宗元閔生賦肆余目於湘流兮望九疑之垠垠祠舜褚元量昔武帝祠舜九疑願陛下所過名山大川古帝賢臣在祀典者並詔致祭巉天九疑巉天荒是非出韓愈送歐陽詩永州實惟九疑之麓柳宗元永州新堂雲依俙文粹皮日休見逐雲依俙兮九疑班竹啼舜婦清湘沉楚臣韓文送惠師吾聞九疑好夙志今欲伸班竹啼舜婦清湘沉楚臣天樂一部王維集明皇時道士申太芝遇異人告以九疑山舊有天樂一部歲久化五野豬郡人捕之化為五古器太芝往來果得之扣之音律相和遂進之桃核扇量米酉陽雜俎杜陟常見江淮市人以桃核扇量米正容升言於九疑山中得九疑浚傾奔臨源委縈回柳宗詩重疊九疑高同上登九疑兮望清川李白悲清秋賦登九疑兮望清川見三湘之潺湲水流寒而歸海雲橫秋而蔽天白泉山顧微廣州記曰南海曾城縣有泉山有瀑布懸注百許牛鼻山又曰南海始昌縣有一石望之似牛向江名牛鼻山又曰縣之而有又盧山山高入雲霄世傳山上有池每至甲戌日聞山有鼓角笙簫之響金岡山又曰南海四會縣有金岡山行人依依見形其岡側參里山又曰東實安縣有參里山曾參純孝常居此山於後世人因以為名石牛又曰鬱林郡北有太山其高隱天上有池有石牛在池下民常祀旱歲姓殺牛初雩以牛血塗石牛背大雨洪注洗牛背淨方清霽浮石山劉欣期交州記云浮石山在海中而時高數千丈浮在水上也射聲又有一石神功刻鏤似若射去石室口百許步夜常聞有射聲石膏山裴氏廣州記曰蒼梧彰平縣有石膏山望之皎若霜雪愚公移山列子含澤布氣春秋記題辭曰山之為言宣也含澤布氣調五行也觸石布雲春秋元命苞曰山者氣之苞所以含晴雲故觸石雲出也符釜山史記曰黃帝東至於海登九山西至於崆峒登雞頭山南至熊相北逐輝鬻名符釜山五丁徙山蜀王本紀曰天為蜀王生五丁力士能徙山秦王獻美女與蜀王王遣五丁迎女見一大蛇入山穴中五丁共引蛇山崩厭殺五丁化為石也孔靈洲山地理志廣州有靈洲山在鬱水中駕鶴山柳宗元記柳州山水云甑山之南皆太山多奇又南且西曰駕鶴山壯聳環立山五嶠張九齡山五嶠號白雲謂嶺南南踰橫嶺入炎洲青鯨高磨波山浮韓文白成形易在地成形地險山川丘陵王公設險以守其國利涉大川易隨山浚川九州隨山浚川書畎澮禹曰豫決九川距四海浚畎澮距川尚書濟高宗命傳說若濟巨川用當作舟楫沸騰百川沸騰喻貴小人毛詩時入禮以時入川而不禁居禮故聖人所以順山者不使居川出雲禮天降時雨山川出雲取材用禮國主傳國主山川故山崩水竭見山門注辛有適伊川見被髮而祭於野者子在川上曰逝者如斯夫不捨晝夜灌注百川灌注莊子三百莊子禹治名川三百支川三千積形家川為積形帶華薄文清川帶華薄流人血川谷流人血王莽時臨川有悲悟臨川而有悲文溯溯秦川而舉旗魏武珠媚水懷珠而川媚文周衛蜀都山川不足以周衛也融為川瀆水積竭三川周幽崩爭流晉顧凱之至荊州人問會稽山川狀曰升巖競秀萬壑爭流三川河洛伊國六川河水赤水遼水黑水江水淮水八川涇渭灞滻浩潏澧罕閲水川閲水而成川陸機歎逝賦朗詠長川百川派別畫地成川涸而魚逝弘海者川不辭盈學海兌為澤九澤既陂彼汾沮洳言采其英滸滸川澤滸滸稻人周禮稻人掌稼下地凡稼澤夏以水殄草而芟夷之注玄以澤為稼川衡川衡掌巡川澤之禁令而平其守澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之於王府領其餘於萬民凡祭祀賓客供澤物之奠注謂芹茆菱茨土會大司徒以土會之法辨五土之物二曰川澤動物宜鱗物植物宜膏物澤之萑蒲舟蛟守之董澤之蒲居民王制居民山澤沮洳為下必因川澤商鞅秦任商鞅專川澤之利占後漢沖拂為穎州守劉翊為功曹陽翟黃綱恃程夫人權力求以川澤拂問翊翊對曰名山大川不以封為民也明府聽之被佞幸之名也沮澤川擁為澤疏川導滯封植九穀國九川滌源七澤楚有藪四曰藪牧養蓄鳥獸周禮太牢九職云九兩九兩繫人九曰藪以富得人注為厲禁使人富藪中物孟諸之麋子玉夢河神謂己畀豫瓊辨畀汝孟諸之麋謂藪也藏疾山藪藏疾可與人共穀梁築鹿囿山川藪澤之利可與人共也不崇藪澤崇高也見國語叔在藪火烈具舉詩十藪爾雅魯有大野今高平距野東北大澤也晉有大陸今巨鹿北廣河澤也秦有陽陓今扶風汧縣西也宋有孟諸今梁國睢陽縣東北也楚有雲夢今南郡華陽縣東南巴丘湖也吳越之間有具區今吳縣南太湖即震澤也齊有海隅海濱廣斥燕有昭余祈今太原鄢陵縣北澤是也鄭有圃田今滎陽中牟西圃田澤是也周有焦護今扶風池陽縣瓠中是也無水周禮澤無水曰藪耦耕幽藪物歸國澤水之鍾也藪物歸也所生物也孔沸崩陳子昂上言幽厲亂常苛慝暴虐詬黷天地川蒙沸崩博知韋顗博知山川風俗獵渭川玄宗開元元年十月甲辰獵於渭川弛陂澤禁開元十六年十一月甲辰弛陂澤禁順流無窮田頵傳內怨行密與鏐因移書曰侯王守方以奉天子譬百川不朝於海雖狂奔澶漫終為涸土不若順流無窮也祭高仙芝討吐蕃自安西經疏勒據婆勒川會川漲不得度仙芝殺牲祭川鑿杜固川流如血杜正倫與城南諸杜昭穆素遠求同譜不許銜之諸社所居號杜固世傳其地有壯氣故世衣冠正倫既政建言鑿杜固通水以利人既鑿川流如血閲十日止林表韋蘇州登西南岡林表見川流如掌谷轉川如掌上二川溶溶流入宮牆杜牧阿房宮賦川者高澤者卑高者流卑者止韓愈何蕃之居下其可以施於人者不流也譬之水其為澤不為川乎川者高澤者卑高者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天將雨水氣上無擇於川澤澗溪之高下然則澤之道其亦有施乎川光晝昏凝李白詩川長信風來同上白璧山玩月登嶽眺百川杳然萬恨長留別下有沖波逆折之回川蜀道其川饒衍郝玭為臨涇鎮將常從數百騎出野還節度使馬璘曰臨涇扼洛口其川饒衍利畜牧其西走戎道曠數百里其江河自西極達於東溟中國之大川者也唐六典水部其江河自西極達於東溟中國之大川者也其餘百三十有五水是為中川者也其千二百五十有二水斯為小川者也百川繞郡落天鏡於孤城韋德碑若壅大川則必決而放諸陸柳宗元讀毛穎傳冬春之交水蟲孕育捕魚之器不施川澤六曲虞部白山虞掌山林之政令為之利禁虞衡作山澤之材川衡掌巡山澤禁令而平其守澤物之奠賓客祭祀共芹茆菱芡任虞以澤掌禁其物課菜果瓜之屬山師原師各辨其物名而獻珍異奠地守虞衡大司待之職山虞凡服耜斬季材以時入之招虞以旌不進左傳曰皮冠以招虞人虞之公羊山林藪澤與人共虞之非正也時入林麓州澤以時入而不禁三衡山立三衡期魏文侯與虞人期遇雨乃命駕而去三虞國語澤立三虞澤虞掌國澤政令為之厲禁孔虞衡掌木班倕葺宇崔融嵩山啓母廟碑銘始詔林衡俄成壯觀紫梲星錯丹梁霞煥楊炯少室山少姨廟碑虞羅獸猶畏虞羅杜甫詩室有魚飧市多山木王維京兆張公德政碑舟漁衡麓之守廢蒲荷新蒸之産入自郊徂邑室有魚飧斬陰伐陰市多山木以得以瞻鴻鵠翱翔李華盧郎中齊居記鵠翱翔自得於冥冥之間故虞衡繒網不能為患也虞衡斤斧羅千山工命採斫杙與椽柳宗元行路難深林工翦十取一百牛連鞅摧雙轅上
