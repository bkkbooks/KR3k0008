body:
  text: 卷第三十八宮殿一白其始也取諸大壯之象其終也落以斯干之詩壯王室廓帝居順晦明而朝啓夕閉易寒暑而夏青冬溫壯麗之規飛動之勢雲構金鋪虹亙梁虯負擔美哉輪焉奐焉禮上棟下宇以待風雨易大廈耽耽欒櫨燕雀相賀淮南子曰大廈成而燕雀相賀豐約之折衷杏梁藻梲朱甍青甃實實廣大也枚枚礱密也祕宇宸居彤軒紫柱文榱華梁斯飛之制禮以大為貴者宮室之量也有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺承明殿漢殿名靈光魯殿歷金門上玉堂解嘲重轑音老今館舍一邊虛加木為兩下便殿離宮三十六所離宮別館三十六所選宣室漢上幸宣室在未央宮中蓋在前殿之側輦道相屬蒲宮在前葺蒲為殿執戈在前為衛左傳楚公子行宮周禮宮車轅門帷宮旌門注謂主行止宿險阻之處備非常次車以為潘則御車以表門帷宮則設旌門謂王書止若食具帷宮則樹旌以表門也黃帝有合宮堯有二宮管子湯受命於鑣宮墨子周有蒿宮秦有蘄年宮漢有未央宮沛宮林光宮甘泉宮萬歲池陽壽宮建章太一思子宜春宮後漢有南宮胡宮桃宮魏有鄴宮吳有太初宮此諸宮皆範金合土為之以為貴也紫微玄武並宮名三輔記曰京兆有步高宮長安有望遠宮望仙宮元封三年起集靈宮漢武巡省置曜華宮梁孝王作養德宮趙王如意宮號武帝置宮張羽旗以禮神幽房昭臺並宮名長安有馺娑宮逍遙宮慕容涵造逃夏宮春申君造祈年延壽宮長安有層城殿在長安華林園中朱雀黃龍並殿名在洛陽洛陽有嘉德徽音殿又有九華百福殿景福延休並殿名制造時惟農隙民有子來定之方中作為楚宮揆之以日作為楚室美衛文公得其時制人悅之也層構室瑰材崇制規遵王度經始勿亟周室百堵並作漢宮千門洞開將侔大壯之象必考定星之期雖欲克壯宸居亦可式遵時制萬載不傾暫勞永逸晝參中景夜考極星奢詭制建章宮漢制建章宮千門萬戶丹楹刻桷傳曰魯莊公丹楹刻桷御孫諫曰侈惡之大也未央壯麗漢書蕭何修未央宮上怒其壯麗何曰天子以四海為家非壯麗何以重威且無命後世有以加也窮泰極侈文選跨周法水衣綈錦土被朱紫文選使鬼為之則勞神矣使人為之則苦矣史記由余請秦穆公曰不度不臧為之者勞居之者逸極棟宇之規陋百王之制峻宇雕牆大禹誡雖表萬乘之尊恐勞兆人之力秦始阿房殷糾瓊室夏桀瑤臺土無舊質木失木形儉卑宮室夏禹闔閭室不崇壇宮室卑庫無觀臺榭晉文茅茨不翦土階三尺唐堯儉而不陋匪雕匪刻去泰去甚木無雕鎪足以避燥濕不傷財不勞人雖儉德而則然在儀刑而未可既未折中是為逼下落成楚子成章華之臺願與諸侯落之宮室成祭之為落棟宇厥初取諸大壯之象宮室云畢落以斯干之詩禮廟成則釁之殺牲釁之路寢成則考之不釁考之謂設盛食以樂之焚燒柏梁既災越無陳方建章是經用厭火祥文選東京賦靈光巋然獨存吳官火焚燕巢魯司鐸火左傳司鐸宮名濟濡帷幕鬱攸從之蒙葺公屋以濡物蒙屋傷人則止財可為也季桓子孔鑿池起山務極侈竇璡遷將作大匠詔修洛陽宮鑿池起山務極侈浮費不勝算太宗怒詔毀之飛山宮魏徵帝作飛山宮徵上疏曰毀廣殿安處卑宮德之上也建離宮清暑閻立德太宗幸洛陽詔立德按爽塏建離宮清暑乃度地西山號廣成宮宮成煩燠不可居帝廢之翠微玉華又營翠微玉華二宮馬周曰臣伏見大安宮在宮城右牆字門闕方紫極為卑小東宮皇太子居之而在內大安中至尊居之反在外太上皇雖志清儉愛惜人力陛下不敢違而蕃夷朝見四方觀聽有不足焉願營雉堞門務從高顯以稱萬方之望則大孝昭矣修復洛陽宮戴胄帝將修復洛陽宮胄上疏諫宿羽高山上陽韋弘機初作宿羽高山上陽等宮徙洛中橋於長夏門廢利涉橋人便之天子乃登洛北絶岸延眺良久歎其美詔即其地營宮本傳侍宴披香殿蘇世長侍宴披香殿酒酣進曰此殿煬帝作邪何雕麗底此曰卿好諫似直然詐也豈不知此殿朕所營曰臣但見傾宮鹿臺非受命聖人所為者陛下武功舊第才蔽風雨時以為足今天下厭隋之侈以歸有道宜刈奢淫復朴素今即其宮加飾焉欲易其亂得乎新唐本傳雍和殿上敦睦九族諸侯王為盡友愛既即位於十六院起雍和殿上每幸與諸侯王鞠擊合樂錫賚有差進士司馬樞為雍和殿賦詞錯不工志一時之實東觀漢記宮殿風微燕雀高杜甫早朝發卒治張玄素貞觀四年詔發卒治洛陽宮乾元殿玄素上書奉天宮韓瑗傳帝造奉天宮御史李善感上疏極言時人喜之造蓬萊上陽合壁等宮張文瓘時高宗造蓬萊上陽合壁等宮文瓘諫曰王者養民逸則富以康勞則怨以叛秦漢廣事四夷造宮室至二世上崩武帝末年戶口減半夫制治於未亂保邦於未危民罔常懷懷于有仁臣願撫之無使勞而生怨集賢殿張說帝召說與禮官學士置酒集仙殿曰朕今與賢者樂于此遂為集賢殿宮觀臺榭盡居之矣魏徵曰今宮觀臺榭盡居之矣興復殿寢裁制有宜王徽遷右僕射大亂之後宮觀焚殘園陵皆發掘鞠為丘莽乘輿未有東意詔徽充大明宮留守京畿安撫制置修奉使徽外調兵食內撫綏流亡踰年稍稍完聚興復殿寢裁制有宜即上表請帝東還殆皇興阿房而秦禍速文帝罷露臺而漢祚永薛收秦王入觀隋宮室且嘆煬帝無道殫人力以事奢侈收進曰峻宇離牆殷辛以亡土階茅茨唐堯以昌始皇興阿房而秦禍速文帝罷露臺而漢祚永後主曾不是察奢虐是矜死一夫之手為後世笑何此能保哉王重其言足庇風雨戴胄曰今宮殿足庇風雨容羽衛數年後成猶不謂晚何憚而自生勞擾邪帝覽奏罷役乾陽畢功隋人解體玄素諫曰昔阿房成秦人散章華就楚衆離乾陽畢功隋人解體今民力未及隋日而役殘創之人襲亡國弊臣恐陛下之過甚於煬帝帝曰卿謂我不如煬帝何如桀紂對曰若此殿卒興同歸於亂即罷役廣溫泉為華清宮房琯玄宗有逸志數巡幸廣溫泉為華清宮環宮所置百司區署以琯資幾算詔忽經度驪山疏巖剔藪為天子遊觀重城深宮燕私而居元結時議曰今天子重城深宮燕私而居大為殿宇魏少游肅宗幸靈武杜鴻漸等奉迎而留少游繕治宮室少游大為殿宇幄帟皆象宮闕諸王公主悉有次舍供擬窮水陸又有千餘騎鎧幟光鮮振旅以入帝見宮殿不悅曰我至此欲就大事安用是為稍命去之浴堂殿棟壓裴延齡它日帝謂延齡曰朕所居裕堂殿棟將壓念易之未能也餘見錢門營三陽宮於嵩山興泰宮於萬壽山武三思后春秋高厭居宮中三思欲因此市權誘脅群不肖即建營三陽宮於嵩山興泰宮於萬壽山請太后歲臨幸己與二張扈侍撤毀層觀廣殿張玄素曰天下不可以力勝當務儉約陛下向平東都曾睹廣殿皆撤毀之天下一口頌歌作離官遊獵五代南漢劉晟遣巨艦指揮使暨彥贇以兵入海掠商人金帛作離宮遊獵故時劉氏有南官大明昌華甘泉玩華秀華玉清太微諸官凡數百不可悉紀復道邃廊西都賦推基峻砌同上層簷廣廈飛楹走拱並李白賦曼宇疏楹通軒並廡並含元賦丹墀文陛之內杜牧制倒影入於朱戶文粹李華含元殿賦天光流於紫庭倒影入於朱戶又階瑩冰級瓦敷鱗差又鄰斗極之光輝邇天漢之波瀾又雲薄萬拱風交四榮飛觀齊白日韋蘇州擬古詩漢宮南北對飛觀齊白日文柳綺柏日就殿以文柳綺柏為材景龍文館記殿瓦鴛鴦拆秋日送薛明府杜甫新宮李賀能文善樂府卒于太常年二十四夫人鄭氏一夕夢賀曰上帝遷都於月圃創新宮故召與文士數輩共為新宮記又作凝處殿使集纂樂府宣室志帝果有宮室之玩李賀小傳天蒼蒼而高也上果有帝耶帝果有園圃宮室觀閣之玩耶延英奏事唐制坐宣政殿宰臣立侍紫宸殿奏事畢坐延英奏事自前殿喚仗入便殿為入閣唐末五代初御前殿為閣逭暑宮后造逭暑宮說上疏曰宮距洛城百六十里奈何去廟之上都安山谷之僻處是猶倒持劍戟示人以柄臣竊為勸陛下作此者豈正人邪御苑東西外無禁垣內有榛叢猛獸所伏暴慝所憑狂夫驚犯左右豈不殆哉願為萬姓持重及時旋軫深居上京羅不急之役省無用之費群生莫不幸甚后不省後貶欽州張說傳雖露坐庸何苦張玄素上書臣見隋家造殿伐木於豫章二千人挽一材以鐵為轂行不數里輒壞別數百人齎轂自隨終日行不三十里一材之費以數十萬工揆其餘可知已帝顧玄齡曰今玄素言如此雖露坐庸何苦玉堂珠殿五代劉裴好奢侈悉聚南海珍寶以為玉堂珠殿作九龍殿以八龍繞柱自言身一龍也五代馬希範玉宇琁階雲門露闕李華含元殿賦攀星納月玉女攀星於綱戶金娥納月於琁題李白凄涼大同殿杜甫詩自古帝王宅城闕閉黃埃李白對酒禁門二白周禮掌舍掌主會同之舍設車宮轅門王行險阻處次車蕃御車以轅表門為壇壝宮棘門王止平地築壇起土壝此為宮轅門以戟為門帷宮旌門王食息張帷為宮以旌表門無宮供人門謂王行有逢遇若遊觀陳列周衛則立長大人為門閽寺掌守王官中門之禁王有五門司門掌授管鍵以啓閉國門幾其出入監門由闑右大夫上出入君門由闑右也乃立皋門皋門有伉乃立應門應門將將注王郭門曰皋門應門正門也太子梁王至司馬門不下車張釋之為宮車令追止劾不敬通籍漢武令從官給事大父母得通籍司馬門失闌王嘉以侍郎射策甲科為郎坐戶殿門失闌免注云戶止也時有闌入而嘉失之不執也歷金門上玉堂有日矣楊雄解嘲夜開宮門漢石顯君房欲取信於上嘗使諸宮先奏恐漏盡宮門閉請詔使吏開門上許之顯故投夜還稱詔開門入後果有上書言顯專命矯制夜開門天子笑以書示顯顯因謂曰陛下過任小臣群下無不嫉妒事類此非一後有讚顯者不信也曹植乘車馬行馳道開司馬門出太祖怒坐公車令死由是重諸侯科禁孔宣政牙闔不啓張仲方拜常侍李訓之變大臣或誅或繫翌日群臣謁宣政牙闔不啓群臣錯立朝堂無史卒贊候久乃半扉啓使者傳召仲方曰有詔可京兆尹然後門闢喚仗重門內注唐文粹李華含元殿賦重門內注復道潛移居有重門擊拆之衛李嶠上書曰元首之尊居有重門擊拆衛出有清警戒道之禁所以備非常不可徑入韓愈復志賦君之門不可徑而入兮一門百夫守豈識天子居九重鬱沉沉一門百夫守無籍不可尋晶光蕩相射旗戟翩以森孟先生詩不得橫入禮興門李德裕獻替録德裕為相初見事日令御史臺榜禮興門朝官有公事見宰相皆由牒臺待朝退後從龍尾道出不得入禮興門於是禁者始靜雞跖集開則先外後內闔則先內後外城門郎掌京城皇城宮殿諸門開闔之節奉管鑰而出納之開則先外後內闔則先內後外啓閉有時不以時則詣閣覆奏唐百官志天門沉沉邈不敢詆牛僧孺策禁衛三白祈父豫王之爪牙胡轉豫于恤靡所止居詩環列之尹楚穆王使潘崇掌環列之尹宮衛之官列兵而環王宮也環衛警衛申當警備注申敕宮中令備也楚公子圍設服離衛注設君服離衛陳守衛也祈父司馬非其人故詩刺之警衛周禮宮正以時比宮府次舍注舍諸居守舍以諸仗直廬也夕繫柝而比授八次次主宿衛廬也晝三巡夜三鼛鼛擊守鼓古刀反漢衛尉掌宮門屯兵官衛上於垣下為區廬區廬今伏宿屋也出入周衛之中厭承明之廬漢武賜嚴助書周廬千列衛尉七兵設在蘭錡文選扞撮行夜夜士警晝巡夜宿衛黑衣之缺史趙左師獨龍言於太后曰臣賤息舒拱最少願補黑衣之缺以衛王宮幸得宿衛十有餘年時從出遊遊於後園子虛賦誰何何問也禮主守周禮司門掌授管鍵以啓閉國門抱關侯嬴隱於夷門為抱關者為卒梅福變姓名隱吳市門限以外內不可踰也察其出入何莫由斯閽人掌守王之宮門以時客閉閽者禮曰守門之賤者也古者不使刑人守門夜不納帝後漢郅惲為上東門侯帝獵夜還惲關門不開令從者見面於門惲曰火明遼遠不奉詔帝乃還從中東門入明日賜惲布百匹貶中東門侯為參封尉搜索左傳閉門而索客謂搜索奸人也露索霍光自上官謀後出入自慎引見言事者先露索然後召見蕭望之不肯闌入衛門籍附此臧會讒於臧氏臧昭伯使逐之反奔執於季氏中門之外季平子怒曰何故以兵入吾門拘臧氏老左傳射中苑門漢鮑宣為右扶風坐怒吏成信信亡藏上林中宣使郡令將吏卒蘭入上林蠶室門攻亭格殺信射中苑門下吏為大逆當族自殺闌內罪人嚴延年為侍御史劾大司農延年持兵干屬車屬車天子車大司農自訟不干事下御史中丞譴責延年何不移書宮門禁止大司農而令得出入宮於是覆劾延年闌內罪人法死注云故事有所劾奏並移宮門禁止不得入也失闌王嘉字翁仲為郎坐戶殿門失闌免戶止也通籍董賢幸於上雖休沐不出願侍醫藥上令賢妻通籍得入宮殿中止宿除籍魏其侯竇嬰不好黃老太后怒除嬰門籍不得入朝請嬰字王孫漢元令從官給事官司馬門中者得為大父母父母兄弟通籍從官者及虎賁羽林太官太醫是也行馬周禮掌舍王之會同設梐丫再重注梐丫行馬也門施晉成帝美顏含素行加光祿大夫門施行馬又魯定為光祿大夫位特進給吏卒門施行馬孔不嚴羽衛無以重威靈姜公輔德宗在奉天帝知群臣多勸泚奉迎乘輿者乃詔諸道兵距城一舍止公輔曰王者不嚴羽衛無以重威靈今禁旅單寡而士馬處外為陛下危之帝曰善悉內諸軍泚兵果至如所言戴胄曰今宮殿足容羽衛數年後成猶不晚萬乘之行必具葆衛張仲方曰萬乘之行必具葆衛分衛兵護第裴度及病創一再旬分衛兵護第周廬更呵唐文粹李華含元殿賦周廬更呵市以環衛建衛對營李庾東都賦唐制天子居曰衛行曰賀皆有衛有嚴唐儀衛志夫儀衛所以尊君而肅臣同上夾峙禁省署宇分部夾峙禁省杜牧原十六衛所長彊直能糾劾者為之朝堂置引駕三衛六十人以左右衛三衛年長彊直能糾劾者為之分五番有引駕佽飛六十人以佽飛越騎步射為之如三衛皆帶刀捉仗而立號曰立門仗唐志宿衛不可闕蘇環徙同州刺史歲旱兵當番上者不能赴環奏宿衛不可闕宜月賜增半糧俾相給足則不闕番不見省衛兵至三日不食蘇環粒食踴貴百姓不足衛兵至三日不食凡朝衛之仗三衛番上分為五仗號衙內五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勳仗以勳為之四曰翊仗以翊衛為之皆服鶡冠緋衫夾五曰散手仗以親勳翊衛為之服緋絁禰襠繡野皆帶刀捉仗列坐于東西廊下每月以四十六人立內廊閣號曰內仗以左右金吾將軍當上中郎將押之舊唐志禁衛之師以備巡警陸贄奏議製翠旄於華蓋之角杜甫南郊賦製翠旄於華蓋之角彗黃屋於鉤陳之星天子之居禁衛九重孫伏伽帝數出馳射伏伽諫曰臣聞天子之居禁衛九重出也警入也蹕非直尊其居處為社稷生人計也深固宮闕以衛不測韓愈直諫表自古天子皆有深固宮闕以衛不測事故而出必烏先相風鼓以數里命有司禁道閲將士間輿然後出之尚懷兢栗今陛下輕為車騎不嚴龍威臣恐社稷危於垂堂矣白絶馳道成帝為太子詔急召太子太子出龍樓門不敢絶馳道西至直城門得絶乃度上遲之具狀對上悅後乃著令令太子得絶馳道沒入車馬翟方進遷丞相司直從上甘泉行馳道中司隸校尉陳慶劾奏沒入車馬以令行馳道鮑宣為司隸校尉比司直丞相孔光四時幸園陵官屬以令行馳道中宣出逢之使吏鉤止丞相椽沒入其車摧辱宰相下御史中丞至司隸官欲捕從事從事閉門不納宣拒閉使者無人臣禮大不敬坐主守曹植子建嘗乘車馬行馳道中開司馬門出太祖怒公車令坐死由是重諸侯科禁孔改馳道狄仁傑帝幸汾陽宮為知頓使并州長史李沂玄以道出妒女祠下俗言盛服過者致風雷之變更發卒數萬改馳道仁傑曰天子之行風伯清塵雨師灑道何妒女避邪止其役帝壯之曰真丈夫哉稽擁車騎宋璟兼侍中帝幸東都次崤谷馳道隘稽擁車騎帝命黜河南尹李朝隱知頓使王恬等官璟曰陛下富春秋今始巡狩以道不治而罪二臣繇此相飭後有受其敝者帝遽命捨之端而如砥唐文粹杜甫南郊賦馳道端而如砥警蹕於繚垣之內周行於馳道之中元稹諫駕幸溫湯狀溫泉有佳氣馳道指京城韋應物四禪精舍寶馬橫來下建章香車卻轉避馳道長安道同上苑囿五白天苑禁苑上苑小苑君囿上囿周開靈囿漢立上林廣百里天子苑容萬乘漢上林苑繚以周牆文選制同梁鄒梁鄒古天子苑田名義合靈囿並文選因原東都賦云因原而作苑跨谷西京賦云上林苑跨谷彌阜也遭數為囿值林為苑養獸漢舊儀上林苑中養百獸天子秋冬射獵取之鉤楯所職鉤盾官也掌小苑之果木詩王在靈囿麀鹿攸伏言鳥獸得其所樵蘇往來無忌文選文王之囿與人共之晉書七十里囿人以為小孟子齊王問孟子曰文王之囿方七十里人以為小寡人之囿方四十里人以為大何也孟子曰文王之囿芻蕘者往焉與人共之人以為小不亦宜乎今君之囿人有殺其麋鹿者與殺人罪同則是以四十里為陷阱人以為大不亦宜乎芻蕘者往見上注立思以招賓西京記文帝為太子立思賢苑以招賓客開博望以通客孝武立子據為太子開博望苑以通賓客得其時制採周法覽漢制以假貧人東觀漢記詔有司京師果園悉以假貧人築鹿囿虞之非正公羊傳云築鹿囿有囿矣天子囿方百里公侯八十里伯七十里子男五十里山林藪澤與人共之虞之非正也罷死馬以賜貧人漢武養馬苑不禁樵採池篽希御幸者假與貧人斫竹以繩縣連禁御不得往來律名為篽在水中作室可以捕鳥鳥入則捕之此宣詔也母收稿蕭何謂上林多空棄地願令民得入田毋收稿為獸食上怒械擊之梁苑梁孝王東苑方三百里實陂池而勿禁長洲苑枚乘諫吳王曰漢上林不如長洲之苑上林廣成苑可墾闢者賦貧人後漢安帝詔甘泉二輔黃圖甘泉苑起仙人觀緣山谷行至雲陽三百八十一里入扶風凡周匝五百四十里上林漢舊儀上林苑中廣長二百里離宮七十所皆容千乘萬騎周禮雍氏禁山為苑令禽獸自得其性也以網為周阹音祛長楊賦阹遮禽獸物始皇欲大苑囿優旃諫曰善多縱禽獸於中寇從東方來令麋鹿觸之始皇乃止武帝廣開上林東南至宜春鼎湖御宿也築土為囿植木為苑亦曰養獸為囿草木為苑帝王之盛豫遊其中地控皇居池分太液樓臺先曙鶯花早春漢修靈囿楊雄諫而不聽般遊有禮好樂無荒人且放於芻蕘魚則安於蘋藻梁孝之靡魯恭之奢栖龍之岫落猿之巖鴈池兔園鶴洲鳧渚並孝王所有苑戲九尾之禽三足之鳥高望漢乎並苑名桑梓苑在洛陽桂林苑在建康縣北雙觡共抵之獸五色九包之禽皆苑有之鴻德苑桓帝延德元年置孔御苑東西二十里張說久視中后逭暑三陽宮汔秋未還說上疏曰御苑東西二十里外無牆垣扃禁內有榛叢溪谷猛獸所伏暴慝所憑陛下往往輕行警蹕不肅歷蒙密乘險巇卒有逸獸狂夫驚犯左右豈不殆哉易曰思患豫防願為萬姓持重苑樹通堤唐文粹李庾東都賦苑樹通堤菰織蒲紉芡贄菱羞西都賦其中則御水分溝昆明下流在野決溉入宮環洲菰織蒲紉芡贄菱羞渚戲玄鷁沙眠白鷗泛舟苑池閻立本太宗與侍臣泛舟苑池見異鳥容與波上宣華苑前蜀王衍起宣華苑表禁苑間田募耕顧少連為東都留守表禁苑及汝間田募耕以便民閲武力宴雍州父老于上林苑貞觀十八年宴雍州父老于上林苑賜粟帛太宗紀城上春雲覆苑牆杜甫曲江對雨苑中作層觀以望昭陵魏徵餘見諫諍門起毬場苑中武三思是時起毬場苑中詔文武三品分朋為都帝與皇后臨觀崇訓與駙馬都尉楊謹交注槁築場以利其澤用功不訾人苦之翠微宮籠山為苑唐地理志鋤治禁苑元載賜死披東都第鋤治禁苑填池塹捐苑囿以賑貧人辛替否上疏曰陛下嘗欲填池塹搶苑囿以賑貧人今天下之寺無數一寺當陛下一宮禁苑在大內宮城之北唐六典禁苑在大內宮城之北北臨渭水東距滻川西盡故都城禽獸蔬果莫不育焉若祠禴蒸嘗四時之薦蠻夷戎狄九賓之享則搜狩以為儲供焉武后作興泰宮於萬安山盧藏用武后作興泰宮於萬安山上疏曰陛下離宮別觀固多矣又窮人力以事土木臣恐議者以陛下為不愛人而奉己也且頃歲榖雖頗登而百姓未有儲陛下巡幸訖靡休息斤斧之役歲月不空而又廣宮苑臣恐下未易堪京都苑四面監掌所管苑面宮館園池與其種植蕃息之事唐六典上林置令掌苑囿園池之事凡食果進蔬菜以供朝會祭祀奉養進御上京東苑總苑內宮館園池之事凡植果以豐甘旨樹疏以修畜聚雖禽魚卉木莫不總而思之同上苑總監凡苑諸面所有壞缺將作不修補者修補之苑內間廄及諸繕造處斧斤等應須修理每日少府給其工人並鐵炭之屬六典注白天子曰崩禮告喪曰天王登遐言若仙去憂天崩杞國人有憂天崩宮車晏駕晏車初崩時也鼎駕哲違世貽法傳先王違世猶貽之法又云古之王者知命之不長是以並建聖哲著之話言告之訓典而後即命以遺後嗣天祿永終天奪九齡文王三后在天言登遐而精神歸天兆人孺慕萬國縞素二十有八載帝乃殂落百姓如喪考妣舜典三載四海遏密八音遏絶也密靜也四夷絶樂三年顧命周成王將崩作顧命臨終之令曰顧命遺詔漢文臨崩作遺詔命令薄葬制三十六日之服高宗諒陰三年不言君薨百官總己以聽于冢宰天子寢於諒暗八音遏於四海並西征賦叩心絶也行號巷哭並劉琨表七日而殯七月而葬山陵天子七月而葬同軌畢至傳橋山之葬弓劍黃帝葬於橋山南空棺無尸唯劍舄在天崩而憂杞國龍去而哭軒臣黃帝於荊山下鑄鼎成乘龍上天小臣挽持龍髯墮之畏威靈而不敢西向山海經曰窮山際有軒轅丘射者不敢西向畏黃帝之威靈也遵七月之禮畏百年之神大戴禮孔子曰黃帝死後人畏其神百年盜長陵一抔土漢張釋之曰後有人盜長陵一抔土陛下將以加罪焉堯葬榖林見帝王紀舜葬蒼梧象耕鳥耘容衛靈輿歸聖魂於岱引靈駕於西陵魏武帝謁廟拜陵晉王道字茂引自漢魏已來群臣不拜山陵道以元帝眷同布衣匪唯君臣而已每崇進皆就拜不勝哀感由是詔百官拜陵自道始銅雀臺魏武遺詔令起銅雀臺美人作樂對西陵而起之國忌日登遐之日違世之辰如喪之情如喪考妣三載四海遏密八音絶樂於四夷也明摽邦式祠部式國忌日云云攀龍髯之日天忌忌日不樂孔孔升真人明皇自為上皇嘗玩一紫玉笛一日吹笛有雙鶴下顧左右曰上帝召吾為孔升真人未幾果崩明皇雜録夢日墮上嘗夢日烏飛蝙蝠數十逐而墮地驚覺召萬回僧問曰大家即是上天時翌日崩酉陽雜俎哭聲訇天百鳥噪幽坎晝間空靈輿韓愈豐陵行奉諱之日率土崩心韓愈慰國哀欻憑玉以大漸唐文粹蘇頲中宗諡冊欻憑玉以大漸奄遺天命權德與德宗諡冊奄遺天命長遊碧落唐文粹王縉玄宗哀冊忽乘紫氣長遊碧落掩璿琿於離殿褚遂良太宗哀冊玉几奄及金縢遂愆虞世南唐高袒哀策文攀帷扆以孺慕抱斂舄以纏綿同上厥疾大漸不寤不興韓文順宗實録彤階晶晶兮露驚月玉座微微兮花掩塵徐彥伯中宗哀冊文即行宮作寢韋彤昭陵寢宮為原火延燔而客祭瑤臺佛寺又故宮在山上之水泉作者憚勞即行宮作寢詔宰相百官議吏部員外郎楊於陵議曰寢宮所占在柏城中距陵不遠使諸陵之寢皆有區限故不可徙若止柏城則故寢已燔行宮已久因以治飾亦復何嫌或曰太宗創業寢宮不輒易是不然夫陵域宅神神本靜今大興荒廢囂役密邇非幽穸所安改之便彤曰先王建都立邑不利則為之遷況有故耶今文寢災徙而宮之非無故也神安于徙因而建寢於禮至順又他陵皆在柏城隨便營作不越封兆內省易從帝重改先帝制還宮山顛昭陵寢占山上陳京昭陵寢占山上宦侍憚挽汲請更其所宰相未能抗京曰此太宗之志其儉足以為後世法不可改議者多附宦人帝曰京議善卒不徙忌月王綝神功初清邊道總管武攸宜破契丹凱還且獻俘內史王及善以孝明帝忌月請鼓吹備而不作方慶曰晉穆帝納后當康帝忌月時以為疑荀訥謂禮有忌月自月而推則忌時忌年愈無理據世用其言臣謂軍方大凱作樂無嫌詔可白罷行香崔蠡開成中為戶部侍郎白罷忌日百官行香有詔褒可行香於寺觀凡國忌日內教太常停習樂兩京文武五品以上及清望官七品以上行香於寺觀唐史百官志祠部君臣七白有君臣然後禮義有所錯易諸臣之位君天也天可逃乎子文孫針尹克黃云天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也禮忠臣不潔名事君不避難有罪不逃刑魏絳養人如子君道也仰之如日月臣之奉君知臣莫若君君盤人水孫卿子近臣漢嚴助為太中大夫後得朱買臣吾丘壽王主父偃徐樂嚴安枚皋從車並在左右助等與大臣辨論中外相應以義理之文大臣數詘司馬相如數稱疾避事枚皋東方朔不根持論上頗俳優畜之唯助與壽王見任而助最先進孔君臣同德則海內安王圭太宗召為諫議大夫帝常曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安朕雖不明幸諸公數相諫正庶致天下於平尉遲恭贊曰君臣相遇古人謂之千載顧不諒哉君臣明良志葉議從相資以成固千載之遇房杜贊曰方君臣明良志葉議從相資以成固千載之遇蕭曹之勳不足進焉君臣間無少疑長孫無忌或有言無忌權太盛者帝持表示無忌曰我與公君臣間無少疑使各懷所聞不言斯則蔽矣當代名臣人倫准的虞世南卒帝手詔魏王恭曰世南於我猶一體拾遺補闕無日忘之蓋當代名臣人倫准的今其云亡石渠東觀中無復人矣往事藩國姜皎進楚國公議者譏短皎任遇太過帝以其藩邸舊恩有以宣布之下詔曰殿中監楚國公皎往事朕於藩國雖彭祖同書子陵共學不過也純臣李績武德二年李密歸朝廷乃録郡縣戶口請自上之使至高祖訝無表使者以意聞帝喜曰純臣也以譴還第房玄齡貞觀末年以譴還第黃門侍郎褚遂良言於帝曰玄齡事君自無所負不可以一眚責便示斥外非天子任大臣意帝悟遽召于家良臣稷契皋陶也忠臣龍逢比干也魏徵頓首曰願陛下俾臣為良臣毋俾臣為忠臣帝曰忠良異乎曰良臣稷契皋陶也忠臣龍逢比干也良臣身荷美名君都顯號子孫傳承流祚無疆忠臣以嬰禍誅君陷昏惡喪國夷家秪取空名此其異也帝曰善社稷臣蕭瑀帝嘗曰武德季太上皇有廢立議顧朕挾不賞之功於昆弟弗見容瑀於爾時不可以利怵死懼社稷臣也因賜詩曰疾風知徑草版蕩識誠臣悉心奉上裴炎詔送獄鳳閣侍郎故元範曰炎社稷臣有功於國悉心奉上天下所知臣明其不反君臣相須李玨杜悰領度支有勞帝欲拜戶部尚書以問宰相陳夷行答曰恩權豫奪願陛下自斷玨曰祖宗倚宰相天下事皆先平章故官曰平章事君臣相須所以致太平也苟用一吏處一事皆決於上將焉用彼相哉以天下安危自任長孫無忌初無忌與遂良悉心奉國以天下安危自任故永徽之政有貞觀風帝亦賓禮老臣拱己以聽綱紀設張此兩人維持之也追扈崔縱遷京兆尹及帝徙幸梁州追扈不及左右短縱素善懷光殆不來帝曰知縱者朕也非爾輩所及後數日至良臣袁高韋倫曰高言徑挺自是陛下一良臣虧君臣之嚴姚崇跪奏十事先朝褻狎大臣虧君臣之嚴臣願陛下接之以禮可乎賓禮大臣玄宗初立賓禮大臣故老雅尊遇崇每見便殿必為之興去輒臨軒以送它相莫如也君者出令者也臣者行君之令而致之民者也韓愈原道君尊如天臣卑如地李絳傳上拔士論杜如晦監察御史陳師合上拔士論謂一人不可總數職陰剴諷如晦等帝曰元齡如晦不以勳舊進特其才可與治天下者師合欲以此離間吾君臣邪斤嶺表君不虛授臣不虛受劉子玄武后證聖初子玄上書言君不虛授臣不虛受妄受不為忠妄施不為惠今群臣無功遭遇輒遷至都下有車載斗量把推腕脫之諺禮遇隆重蕭德言高宗立拜為銀青光祿大夫全給其祿遣通事舍人即家致問乘與至肅章門引見禮遇隆重由是晉府及東宮舊臣子孫並增秩賜金上下情隔陸宣公奏議君臣意乖上下情隔聖賢相維崔植長慶初拜中書侍郎穆宗問貞觀開元中治道最盛何致而然植曰太宗資上聖興民間知百姓疾苦故厲精思治又以房玄齡杜如晦魏徵王圭為之佐君明臣忠聖賢相維治致升平固其宜也君臣之際顧不難哉以徵之忠而太宗之睿身歿未幾猜譖遽行始徵之諫纍數十餘萬言至君子小人未嘗不反復為帝言之以邪佞之亂忠也久猶不免故曰皓皓者易污嶢嶢者難全自古所嘆云傳贊君有常尊臣有定卑自然之勢也然臣不自通於上君不降而逮諸下則治不得成而功不彰反是而天下之所務粲焉幾矣故聖王屈己從諫君臣兩得其美知道之本歟段平仲贊社稷臣八白能執干戈以衛社稷童汪錡柳莊衛侯哭柳莊曰非寡人之臣是社稷之臣也目送絳侯漢文目送絳侯周勃曰社稷臣也袁盎曰勃乃功臣非社稷臣社稷臣主存與存主亡與亡乃社稷臣方諸呂用事絳侯為太尉本兵柄弗能正大臣相與共誅諸呂適會成功乃功臣耳汲黯上問汲黯何如人嚴助曰使任職居官無以踰人至輔少主守成雖自謂賁育不能奪上曰然古有社稷臣黯其近之柱石漢昌邑王淫亂霍光憂悶問所知故吏田延年曰將軍為柱石昔伊尹相湯廢太甲以安宗廟後世稱忠將軍若能行亦漢之伊尹也處不避污叔孫豹孔社稷計陳叔達始太子建成等鬩間太宗帝惑之叔達極意救辦至是謂曰武德內難卿有讜言故以此報叔達謝曰豈獨為陛下乃社稷計耳戡定禍亂非公誰杜甫國之社稷今若是戡定禍亂非公誰社稷無常奉明者守之李金陵表李德裕以身扞難功流社稷唐史有功於國裴炎社稷臣有功於國刁斗不聞煙塵不飛蓋宗社之靈也林蘊上李相公書乃置散地非所宜議者謂子儀有社稷功而孽寇首鼠乃置散地非所宜帝亦悟詔為諸道都統本傳傅說版築臣李斯鷹犬人欻起匡社稷寧復長艱辛李白冬夜太宗社稷一朝正漢官威儀重昭洗杜狄明府詩忠臣之心壯夫之節苟利社稷死無悔焉劉蕡李晟社稷功韓滉卒張延賞揣帝意遂罷晟兵帝曰晟有社稷功白食以駃騠上譖樂毅於燕王燕王按劍怒譖者而食樂毅以駃騠駃騠良馬肉也蜀趙雲雲別傳曰初先主敗人言雲已北去先主以戟摘之曰子龍不棄我去頃之雲至矣呈文書魏車駕幸許遠徐宣為僕射統留事主者呈文書詔曰吾省與僕射省何異竟不視魯肅張昭非肅謙不足訾毀之權益重之孝昭委任霍光同紀曰成王不疑周公孝昭委任霍光各因其時以成名大矣哉大臣見疑晉石苞為大司馬加侍中鎮淮南聞吳欲為寇築壘過水以自固帝謂羊祜曰苞果有不順乎祜深明之其子為郎上召之經日不至帝益疑欲討之隱其事先策免之苞詣闕後帝慚因謂曰卿子幾破卿門孔虛心溫大有與兄大雅同掌機近不自安請徙它職上曰我虛心待卿何所自疑展盡底蘊魏徵始還帝日益親或引至臥內訪天下事徵亦自以不世遇乃展盡底蘊無所隱洞然不疑王者用人非難盡其才之為難觀太宗之責任也謀斯從言斯聽才斯奮洞然不疑故人臣未始遺力天子高拱操成功致太平矣韋挺傳贊趙涓治衢不為觀察使韓滉所容奏免官帝見其名問宰相曰是豈永泰時御史乎對曰然詔拜尚書左丞既至勞之曰卿正直朕所自知乃以罪聞不信也龍顏英主一品集謝不許遜官自古臣得其君最為難遇非龍顏英主良平無以效其謀非日角聖姿寇鄧莫能展其志念良臣十白漢宣賜右扶風尹翁歸子黃金百斤奉祭祀大司農朱邑子亦然祭征虜後漢祭遵為征虜將軍卒世祖每曰安得憂國奉公如祭征虜者乎聞鼓鼙之聲則思將帥之臣禮名將後漢賈復力戰傷創甚世祖聞之曰吾所以不遣君聞專征者以其敢深入果失吾名將聞其婦孕曰生女耶我子娶之生男耶我女妻之不令其憂妻子也孔賜膜皮薛萬均卒帝後嘗賜群臣膜皮及萬徹而誤呼萬均愴然曰萬均朕勳舊忽口其名豈死者有如冀此賜乎因命取焚之舉坐感嘆讀貞觀政要思徵賢詔訪其後魏徵文宗讀貞觀政要思徵賢詔訪其後楊汝士薦為右拾遺老臣遺像李晟他日與馬遂見延英帝嘉其勳下詔曰歲在巳秋九月我行西宮瞻望崇創見老臣遺像顒然肅然和敬在色想雲龍之協期感致業之艱難睹往思今取類非遠宣宗追感元和舊事但聞是憲宗朝卿相子孫必擢用杜勝以刑部員外郎閣內次對上詢其祖父勝以其先黃裳永貞之時深排姦邪請憲宗監國上德之而授給事中東觀漢記君臣問疾十一白蕭何疾惠帝自問云君若不幸誰可代君何舉曹參霍光病車駕親臨問之張禹每疾輒起居聞車駕自臨問上親拜床下禹頓首謝恩因於床前拜少子官禹曰臣有一女愛甚於男遠嫁張液太守蕭育不勝父子私恩願與相從徙育為弘農太守張湯嘗病上親至舍視病隆貴如此包咸為大鴻臚以論語受帝後病親輦駕視之桓榮為帝師後病帝親問入門下車執經趍拜修弟子禮吳呂蒙疾孫權在公安迎置內殿治護萬方募有能愈蒙疾者賜千金有加權為慘戚欲數見顏色又恐勞動常穿壁瞻之見小能食則喜顧左右言笑不則咄嘆夜不能寐中瘳為下赦令疾君視之東首加朝服拖紳語君適其臣升自阼階不敢有其室也禮卿大夫疾君三問之及葬三往焉士疾一問之在殯一往焉禮孔舒王持詔往視舒王謨於諸王最長帝欲試以事故拜涇原節度大使時尚父郭子儀病篤帝臨軒遣謨持詔往視謨冠遠游冠御絳袍乘象輅駟馬飛龍士三百門府官皆褲褶以從子儀手叩頭謝恩謨宣詔己乃易服勞問還帝幸其第流涕李靖二十三年病甚帝幸其第流涕曰公乃朕生平故人於國有勞今疾若此為公憂之詔皇太子就問杜如晦病力詔皇太子就問帝親至其家撫之帝親問疾屏左右語加朝服拖帶魏徵疾甚帝親問疾屏左右語終日乃還後復與太子至徵第徵加朝服拖帶帝悲悶拊之流涕問所欲鑿苑垣以便候問房玄齡疾甚帝命鑿苑垣以便候問日候增損高季輔感疾歸第有詔以其兄虢州刺史季通為宗正少卿視疾遣中使日候增損白反服禮哀公問曰為舊君反服禮與孔子曰古之君子進人以禮退人以禮故有舊君反服之禮今之君子進人若將加諸膝退人若將墜諸淵無為戎首不亦善乎又何反服之有陳軫秦聲史陳軫至秦秦惠王曰去寡人之楚思寡人乎曰昔越人莊舄仕楚執圭及病則作越聲今臣棄逐之楚能無秦聲乎晉孫惠諫齊王曰屈原故年心存南郢樂毅適趙志在北燕違諸侯之大夫不反服為平不敢服前之尊君也違大夫之諸侯不反服也禮舊君十二孔以君禮葬黎陽李密帝遣使持密首往招李世績世績表請收葬歸其尸乃發喪具威儀三軍縞素以君禮葬黎陽故君呂子臧隋大業未為南陽郡丞高祖入京師慰輯山南獨子臧堅守及煬帝已弒帝更使其壻薛君倩齎詔言隋所以亡諭之子臧為故君發喪訖即送款懷祿不屑其榮文粹李翰三名臣論樂毅奔趙趙王問圖燕之策樂毅流涕而對曰臣昔日之事燕昭王猶今日之事大王也可謂懷祿不屑其榮周身不違於道古人言一心以事百君百心不可事一君魏文帝初授漢禪群臣皆楊魏德惟衛臻獨稱漢美文帝曰天下之珍當與山陽共之為人臣者罔念於此可謂有百心矣窮愁志人臣終節姚崇張柬之等誅二張后遷上陽宮中宗率百官起居王公更相慶崇獨流涕柬之曰今豈涕泣時邪公禍自此始崇曰比與討逆不足以語功然事天后久違舊主而泣人臣終節也由此獲罪甘心焉制誥十三白君命王言如絲其出如綸禮天書詔書鳳詔丹鳳封五色詔紫泥掛詔書急宣王命天語宣布漢書黃霸次公為穎川守時上意於理數下恩澤詔書霸宣布令人人知上意也寬大之詔後漢侯霸君房為尚書令下寬大之詔四時之令霸所建后以施令告四方易發號施令罔有不臧布德和令禮尺一漢司隸校慰陳球為太尉敕尚書令召拜不得稽留尺一詔書許為尺一詔書魏志青紙紫泥晉書視草漢報淮南王書帝常召司馬相如視草渙汗其大號孔夜被旨草詔書韋澳為翰林承旨夜被旨草詔書事有不安者即遷延須見帝開陳可否未嘗不順納薄紙手作詔韋澳在河陽宣宗遣使至魏博道出澳所帝以薄紙手作詔賜澳曰密飭裝秋當見卿蓋將以為相也下書詔日數百陸贄從狩奉天機務填總遠近調發奏請報下書詔日數百奉天所下制書雖武夫悍卒無不感慟流涕陸贄為帝言今盜遍天下宜痛自咎悔以感人心昔成湯罪己以興楚昭王出奔以一言善復國陛下誠不吝改過以言謝天下使臣持筆亡所忌庶叛者革心帝從之故奉天所下制書雖武夫悍卒無不感慟流涕李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足平議者謂興元戡難功雖爪牙宣力蓋贄有助焉勿謂子孫之謀欲存輔車之勢李德裕其處報機急帝一切令德裕作詔德裕數辭帝曰學士不能盡朕意伐劉稹也詔王元逵何弘敬曰勿謂子孫之謀欲存輔車之勢元逵等情得皆震恐思效已而三州降賊遂平帝每稱魏博功則顧德裕道詔語咨其切於事而能伐謀也因誡風俗詔歷詆群有司元稹擢祠部郎中知制誥變詔書體務純厚明切盛傳一時然其進非公議為士類訾薄稹內不平因誡風俗詔歷詆群有司以逞其憾裒肅宗所賜詔敕千餘篇上之郭子儀為肅宗山陵使子儀懼讒且成盡裒肅宗所賜詔敕千餘篇上之因自明詔曰朕不德貽大臣憂王言不可存私家舊史高郢掌誥纍年家無制草或謂之曰前輩皆留制集公焚之何也曰王言不可存私家時人重其謹密潛草李白集序潛草詔誥人無知者醜正同列害能成謗恪言不入帝用疏之副本留中蘇頲自景龍後與張說以文章顯稱望略等故時號燕許大手筆帝愛其文曰卿所為詔令別録副本書臣其撰朕當留中後遂為故事其後李德裕著論曰近世詔誥惟頲敘事外自為文章賜渤海詔張九齡會賜渤海詔而書命無足為者乃召九齡為之被詔輒成詞旨豐美許景先詞旨豐美得中和之氣見舍人門渾瑊制曰渾瑊為行營副元帥帝臨軒授鉞用韓信故事制曰寇賊干紀授爾節鉞以戡多難往欽哉切機要鄭畋知制誥會討徐州賊龐勳書詔紛委畋思不淹晷成文粲然無不切機要當時推之還詔書張獻恭遷檢校吏部尚書德宗欲徙盧杞為饒州刺史給事中袁高上還詔書苦爭獻恭見帝曰高所奏宜聽帝不答復前曰高乃陛下良臣當優異之上遂不徙杞作詔箝其前請帝署可安樂公主光艷動天下侯王相臣多出其門嘗作詔箝其前請帝署可帝笑從之廝臺送獄手詔喻免時安樂公主與長寧安定三家廝臺掠民子女為奴婢左臺侍御史袁從一縛送獄主入訴帝為手詔喻免同上刺史縣令謹宣奉行陳子昂后召見賜筆札中書省令條上利害子昂對三事其一言陛下布德澤下詔書必待刺史縣令謹宣奉行之不得其人則委棄有司掛墻壁耳書詔叢浩杜讓能僖宗狩蜀為翰林學士方關東兵興調發綏徠書詔叢浩讓能思精敏凡號令行下處事值機無所遺算帝倚重之當草詔書辭不如旨韋弘景召為翰林學士蘇光榮為涇原節度使弘景當草詔書辭不如旨罷學士緘鑰前後詔敕陸元方卒有一押生平所緘鑰者歿後家人發之乃前後詔敕草詔殿上恐懼不能得一詞陸餘慶遷鳳閣舍人后嘗命草詔殿上恐懼不能得一詞降左司郎中裁可占授劉禕之擢中書侍郎方是時詔令叢繁禕之思致華敏裁可占授少選可待也嚴促李乂遷修文館學士韋氏之變詔令嚴促多乂草定家藏詔書李靖五代孫彥芳太和中為鳳翔司録參軍家故藏高祖太宗賜靖詔書數函上之下沛然之詔房玄齡上疏曰願下沛然之詔許高麗自新焚陵波之船罷應募之衆即臣死骨不朽訓誥溫麗王涯遷工部侍郎涯文有雅思元和間訓誥溫麗多所槁定誥詔皆援准古誼齊浣為中書舍人誥詔皆援准古誼時號解事舍人慰邊將傷痍者曰傷居爾體痛在朕躬封敖武宗作詔書慰邊將傷痍者曰傷居爾體痛在朕躬帝善其如意李德裕進太尉制曰謀皆豫同言不他惑封敖劉稹平李德裕以定策功進太尉時敖草其制曰謀皆豫同言不它惑學士門以筆塗詔李藩王諤賂權近求兼宰相密詔中書門下曰諤可兼宰相藩遽取筆滅宰相字書其左曰不可還奏之宰相權德輿失色曰有不可應別為奏何以筆塗詔邪藩曰勢迫矣出今日便不可止既而事得寢罷統軍用麻鄭絪竇文場恃功陰諷宰相進擬加統軍比絪當作制奏言天子封建或用宰相以白麻書制付中書門下今以命中尉不識陛下持以寵文場邪遂著為令也帝悟罷統軍用麻始復關隴書詔夜數十劉家擢翰林學士宣宗始復關隴書詔夜數十雖投筆遽成辭皆允切宣告于廷大風雷雨拔樹劉鄴傳亘盧瑑者與崔沆皆拜同平章事是日宣告于廷大風雷雨拔樹未幾及禍寶書盧從願課為天下第一寶書勞問將相除徙皆內出制王佖故事將相除徙皆內出制故號白麻至必以責罷遂中書進制焚何易于為益昌令鹽鐵官榷取茶利詔下所在毋敢隱而易于視詔書曰益昌人不征茶且不可活矧厚賦毒之乎命吏閣詔吏曰天子詔何敢拒吏坐死公得免竄邪對曰吾敢愛一身移暴于民乎亦不使罪爾曹即自焚之觀察使素賢之不劾也試息兵詔張昌齡召試息兵詔少選成文帝大悅戒之曰昔禰衡潘嶽矜己傲物不得死卿才不減二人宜鑿于前副朕所求乃敕於通事舍人裏供奉無一番紙墜北路藩鎮王鎔朱全忠怒引軍攻鎔次元氏鎔誥其屬曰國危矣奈何周式請見全忠可以口舌罷也許之全忠迎折曰爾公朋附太原今無赦矣即出書示式曰嗣昭在者宜速遣式曰王公所與和者息人鋒鏑間耳況繼奉天子詔和解無一番紙墜北路乎草詔馬前許敬宗檢校中書侍郎駐蹕山破賊命草詔馬前帝愛其藻警由是專掌誥令詔書下氛翳澄駮張東之傳初易之等誅後中宗猶監國告武氏廟而天久陰不霽侍御史崔渾奏陛下復國當正唐家位號稱天下心奈何尚告武氏廟請毀之復唐宗廟帝嘉納之是日詔書下氛翳澄駮咸以為天人之應詔出執不下袁高德宗將起盧杞為饒州刺史誠史命舍人作詔詔出高執不下奏曰陛下用杞為相出入三年附下罔上使陛下越在草莽群臣願食其肉且不厭今復拜刺史誠失天下望制麻自中以授李栖筠拜御史大夫始栖筠見帝敷奏明辨不阿附帝心善之故制麻自中以授朝廷莫知也不奉詔命盧群淮西吳少誠擅決司洧水溉田使者止之不奉詔命群臨詰宣致詔詞董晉五月朔天子會朝公卿在廷侍中贊群臣賀竇參中書令當傳詔疾作公卿相顧未有詔晉從容進曰攝中書令臣參病不能事臣請代參事南面宣致詔詞進退甚詳訓辭溫厚崔元翰竇參秉政引知制誥其訓辭溫厚有典誥風腕可斷麻不可草韓偓進承旨宰相韋貽範母喪詔還位偓當草制學士使馬從皓逼偓求草偓曰腕可斷麻不可草憂勤兆庶屢降德音四海之內莫不抗首而長息劉蕡策曰自陛下御寓憂勤兆庶屢降德音四海之內莫不抗首而長息目喜復生於死亡之中也翠錦池飾代宗睿真皇后沈氏德宗即位乃先下詔贈後曾祖祖父一日封拜百二十七人詔制皆翠錦池飾以廄馬負載賜其家能辨南陽之牘允符東海之貴崔群穆宗立以吏部侍郎召之勞曰我為太子卿力也群曰此先帝意臣何力焉且陛下向為淮西節度使臣起制草其言能辨南陽之牘允符東海之貴先帝然之則傳付久矣朱書御札五代李琪遷吏部尚書同光三年秋天下大水京師乏食尤甚莊宗以朱書御札詔百寮上封事琪上書數千言其漫然無足取而莊宗獨稱重之遂以為國討使百官皆給告身五代劉嶽唐明宗時為吏部侍郎故事吏部文武官告身皆輪朱膠紙軸錢然後給其品高者則賜之貧者不能輸錢往往但得其敕牒而無告身五代之亂因以為常官卑者無復得告身中書但録其制辭或任其材能或褒其功行或申以訓誡而受官者既不給告身皆不知受命之所以然非王言所以告詔也請一切賜之由是百官皆給告身自嶽始也
