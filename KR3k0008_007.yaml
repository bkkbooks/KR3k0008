body:
  text: 卷第七白大江長江中江九江書過九江注江分為九道三江周禮揚州其川三江荊池淮南子曰荊楚以江漢為池楚望傳曰江漢濉漳楚之望也南國之紀詩云滔滔江漢南國之紀導岷山夏書岷山導江濫觴家語江水始出岷山其源可以濫觴九泒江至潯陽分為九道朝宗書曰江漢朝宗於海安流楚辭曰令沅湘兮無波使江水兮安流滄波白波洪波永矣江之永矣不可方思四瀆之首江河淮濟百谷之王老子曰江海所以能為百谷之王者以其能善下浮天之浪浴日之波如練澄江靜如練大溢文子曰江河之大溢不過三日流而為江海積水水之積也不厚雙流蜀江滔滔見上沔波江水導於岷山魚相忘於江湖池魚有江湖之思誓祖逖字度楚王鮫人御名館於懸流泉客築室於巖底江賦云涉涉江採芙蓉二江灌錦城史記河渠書曰蜀守李冰鑿離堆山辟暴水之害穿二江灌城都中此渠皆可行舟有餘用溉浸百姓又享其利至於所過往往引其水益用溉田疇渠以億計莫之數也孔彰泄有宜李渤桂有漓水出海陽山世言秦命史祿伐粵鑿為漕馬援討徵側復置以通餉後為江水瀆毀渠遂廞淺每轉餉役數千戶濟一艘渤灑浚舊導彰泄有宜舟楫利焉湘流柳宗元懲咎賦溯湘流之沄沄飄風擊以揚波兮舟摧抑而回邅日霾曀以昧幽黔雲湧而上屯溯淩天之騰波同上卻驚棹以橫江溯流天之騰波楓落吳江冷崔信明鄭世翼者遇信明江中謂曰聞公有楓落吳江冷願見其餘信明欣然多出衆篇世翼覽未終曰所見不逮所聞投諸水引舟去乘艫江中楊元琰初張東之代為荊共乘艫江中私語外家革命元琰悲涕慷慨志在王室東之執政引為羽林將軍謂曰江上之言君毋忘之嚴程迫風帆劈入高浪追思南渡時魚腹甘所葬韓愈引竇司直詩驚波凌大江之驚波同上復志賦銀屋江中白浪如銀屋李白詩緑淨不可唾韓文江流悍急送區冊序支流合輸大江澒洞支流合輸夢得楚望橫坤大江吞吳去一練橫坤抹杜牧送孟遲江共蒹葭遠韓文欺岸江濤欺岸黃沙走杜甫復陰雷騰雲百里一瞬既遠淡為安流柳宗元興州江運記鑿岸泄奔湍稱古神禹跡夜喧山門端獨宿不安席韋應物江水出火九國志吳楊渭十二年冬十月浚東塘之楊林江水出火可以燃物江流思夏后杜甫登白帝城寒江觸石喧同上禹鑿寒江正穩流同上天遠暮江遲同上大聲吹地轉高浪蹴天浮江漲同上澄江平少岸水檻孤石隱如馬長江泓澄湛凝緑韓愈嶽陽樓詩泓澄湛凝緑物影巧相向江豚時出戲驚波忽蕩漾封江瀆廣源王五代楊溥二年正月封江瀆廣源王白長淮清淮導自桐柏書導淮自桐柏入於海其乂書淮沂且乂乂治也淮夷書淮夷蠙珠暨魚淮泗周禮青州其川淮泗沔彼淮水積水見上安流見上及淮書曰海岱及淮惟徐州竭淮水竭王氏滅孔無波平如席韓愈送僧詩清淮無波平如席具舠艫遣將度淮杜佑徐州節度使張建封卒軍亂立其子愔請於朝帝不許乃召右節度淮泗討定之佑具舠艫遣將度淮封淮瀆長源王五代楊溥二年正月封淮瀆長源王山泐桐柏發谼鼖湧唐文粹呂周任泗州大水記山泐桐柏發谼鼖湧下注淮濆鐵鎖絶淮流杜慆咸通中為泗州剌史會龐勳反圍城淮南節度使令狐綯遣牙將李湘屯淮口與郭厚本合為所敗湘等並沒於是援絶賊乃以鐵鎖絶淮流梯沖垂城壅淮上流楊行密以鋭士萬二千冒雪馳迫清口不進壅淮上流灌龐師古軍淮神唐李肇國史補楚州有漁人忽以淮中得古鎖不絶以告官剌史李陽大集人力引之鎖窮有獮猴躍出覆沒後有驗山海經云火獸好為害禹鎖之名無支神淮之水舒舒韓贈張籍水斗中和三年汴水入於淮水斗壞船數艘唐史五行志淮水出桐柏韓愈董生行淮水出桐柏山東馳遙遙十里不能休淝水出其側不能千里百里入淮流戍夜踰淮忠義傳辛讜賊將李圓焚淮口讜曰事亟矣獨出可以求援乃與楊文播李行實戍夜踰淮坎岸登馳三十里至洪澤見戍將郭厚本告急厚本許出兵白清濟清源導沇東流書導沇水東流為濟注泉源為沇流去為濟截黃濟水截河而流水不混其清有彌詩有彌濟盈濟瀆宜麥周禮兗州其川河濟車僨傳曰鄭伯之車僨於濟沔彼濟水鴝鵒不踰濟周禮四瀆視諸侯濟三孔潛流屢絶狀雖微細獨而尊也許敬宗帝曰書稱浮於濟漯今濟與源斷不相屬何故而然對曰夏禹道治水東流為濟入於河今自源至溫而入河水自北洑地過河而南出為榮又洑而西至曹濮散出於地合而東汶水自南入之所謂溢為榮東出於陶丘北又東會於汶是也古者五行皆有官水官不失職則能辨味與色潛而出合而更分皆能識之帝曰天下洪流巨谷不載祀典濟甚細而在西瀆何哉對曰瀆之言獨也不因餘水獨能赴海者也且天有五星運而為四時地有五嶽流而為四瀆人有五事用而為四支五陽數也四陰數也有奇隅陰陽為陽者光耀陰者晦昧故辰隱而難見濟者潛流屢絶狀雖微細獨而尊也帝曰善與河同靈等秩唐李甘濟為瀆問今盡濟水之力載數石之舟廣不能橫深不能浮而曰與河同靈等秩吾不知先王班祀之意也濁河終不沔清濟狄公執政在末年濁河終不沔清濟杜甫濟上沒蓬蒿苦雨同上河濟異宜柳宗元上中書狀河濟異宜海岱殊服臨濟水五代梁臣龐師古梁兵攻鄆州臨濟水師古徹木為橋夜以中軍先濟朱宣走中都惟神泉源清潔浸彼遐遠播通四氣作紀一方玄冬肇節聿修典物通典祭濟文清濟濁河清濟曾無溝洫之虞柳文白沱潛為漢尚書池傳楚國漢水以為池楚望江漢濉漳楚之望也漾水書曰嶓冢導漾東流為漢又東為滄浪之水注泉源為漾水流為漢水東流見上南紀滔滔江漢南國之紀廣矣漢之廣矣不可沫思游女詩漢有游女不可求思弄珠游女弄珠於漢皋之曲沉玉蔡昭侯如楚三年止之昭侯歸及漢執玉而沉曰豫所有濟漢而南者有若大川大川見上朝宗見江門士軍沒魏志曰漢水溢征南等士軍皆沒廣漢孔築堤盧鈞會昌中漢水害襄陽拜鈞山南東道節度使築堤六十步以障漢漲嚙城郭張柬之授襄州剌史會漢水漲嚙城郭柬之因壘為堤以遏湍怒其堤莫量唐文粹李善夷責漢水辭漢之深矣其堤莫量遙看漢水鴨頭緑遙看漢水鴨頭緑恰似蒲萄初撥醅李白襄陵歌昨來漢水頭始得完孤羈韓愈寄顧立之詩往復江漢津杜甫子豈無扁舟往復江漢津蕭索漢水清送樊侍御同上漢水饒巨石送李校書同上漢水波浪遠李白詩眼前今古意江漢一歸舟杜甫懷灞上遊江海雖云廣乘舟度無艱韓愈詩漢水既殊流楚山亦此分李白擬古白五湖洞庭一名太湖彭蠡並湖名其浸五湖周禮揚州其浸五湖注云太湖方五百里故曰五湖范蠡句踐既滅吳雪會稽之恥於是范蠡乃乘扁舟泛五湖而不反捐珠新語曰舜捐珠於五湖之泉積水安流浮天浴日乘舟范蠡賣藥列仙傳東方朔漢武時為郎後有人見於會稽賣藥而泛五湖魚相忘於江湖池魚有江湖之思始波洞庭始渡木葉微脫文選云孔賜鏡湖剡川一曲賀知章請為道士還鄉里詔許之又求周宮湖數頃為放生池有詔賜鏡湖剡川一曲龍出褚無量家瀕臨平湖有龍出人皆走無量尚幼讀書若不聞衆異之凌洞庭之洋洋柳宗元懲咎賦飲馬楚世家馬殷莊宗滅梁殷遣其子希范修貢京師莊宗問洞庭廣狹希范對曰車駕南巡才堪飲馬爾莊宗嘉之五代史南維群崖水洞庭九州間厥大誰與讓南維群崖水北往何奔放瀦為七百里吞納各殊狀韓文登嶽樓詩又聲音一何宏轟磕車百兩漭蕩漭蕩見五湖李白送王屋山人詩明湖落天鏡登巴陵開元寺同上徹底見秋色明湖映天光徹底見秋色望洞庭同上連天洞庭連天九疑高蛟龍出沒猩鼯號韓愈贈張二曹詩漫漫復志賦過洞庭之漫漫同上自古澄不清環混無歸向嶽陽樓詩軒然大波起宇宙隘而妨同上水月如練清光可掇郎府湖序故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴於江城之南湖方夜水月如練清光可掇張公殊有勝概四望超然乃顧白曰此湖古來賢豪遊者非一而枉踐佳景寂寞無聞夫子可謂我摽之以嘉名傳不朽白因舉酒酌水號之曰郎官湖亦鄭國之有僕射陂也李白開帆入天鏡直向彭湖東李白詩半陽湖酉陽雜俎句容縣吳瀆塘有半陽朗湖水半冷半熱可以瀹雞皆有魚誤入輒死白鴻隙漢汝南郡鴻隙陂以為饒翟方進為丞相以數溢為害奏罷之王莽時枯旱郡中追怨乃作童謠曰壞陂誰翟子威飯我豆食羹芋魁言不生稻粱唯生豆芋及覆陂當復誰言兩鴻鵠托神告之也貰貸寧成曰仕不至二千石賈不至千萬安可比人乃貰貸陂田千餘頃假貧人保使數千家引灌張禹為下邳相引灌蒲陽陂率吏人假與糧種鄰郡貧者歸之汪汪萬項續漢書曰郭林宗言黃憲汪汪汪若萬頃之陂斷水為陂魏志夏侯惇為濟陽守斷大水作陂自負土率將士種稻人賴其利穿渠築陂晉青龍元年穿城固渠臨陂溉田數千餘頃投竹杖費長房投竹杖於葛陂化為龍臥抱朴子葛仙公陂水中臥竟日方起修復後漢鄧晨為汝南守欲修復翟方進所壞鴻隙陂聞許陽曉水署為都水椽陽因高下形勢起塘四百里數年乃成方梁石洫汝南多陂池年年決壞費常三千餘萬鮑昱文淵為太守作方梁石洫水常饒足溉田倍也仲春無漉陂池月令孔閼河灌通靈陂姜師度徙同州刺史又泒洛灌朝邑河西二縣閼河以灌通靈陂收棄地二千頃為上田古天子陂沱臺榭皆深宮復禁韋弘機營宮所謂上陽者左僕射劉仁軌謂御史狄仁傑曰古天子陂沱臺榭皆深宮復禁不欲百姓見之恐傷其心而今列岸謻廊亙王域之外豈愛君哉修復堤閼于頔為湖州刺史有湖陂異時溉田三千頃久廞廢鴝至縣命修復堤閼歲獲粳稻蒲魚無慮萬計為陂塘五百九十八所韋丹徙為江南西道觀察使凡為陂塘五百九十八所灌田萬千頃漾波敬宗寶曆二年七月癸未以漾波隸尚食禁民漁沈竿續蔓深莫測菱葉荷花靜如拭杜甫漾陂行波濤萬頃堆琉璃同上陂水寒更緑蓼花被堤岸陂水寒更緑柳宗元詩飛陂永昌中秦州敷水店南西陂白日飛陂四五里一直塞赤水陂上桑畦麥隴依然不動朝野僉載臭陂韓愈宜城驛記驛前水傳是白起堰西山下澗灌此城壞楚人多死流城東陂臭聞遠近因號其陂曰臭陂有蛟害人漁者避之馬首迷荒陂失道蒼耳城壕失往路馬首迷荒陂李白魚龍動陂水處處生波瀾李白遊秋浦白苛陂詩陂影墜晴霓杜牧詩月陂見李適之注白豫州川周禮豫州其川洛導熊耳之源書導洛自熊耳東北會於瀍澗又東北入於河宓妃洛水之神名曰宓妃宜禾淮南子洛水輕利宜禾禊王濟解禊於洛竭史昔伊洛竭而夏亡斗國語周靈王時谷洛二水鬥將毀王宮王乃壅之後王室大亂泱泱小雅瞻彼洛矣維水泱泱仙舟李膺字元禮與郭林宗泛舟洛水人望者以為仙舟也洛神陳思王曹子建有洛神賦三川伊洛瀍禹導禹貢導洛自熊耳周卜洛陽鳳笙列仙傳曰王子晉好吹笙作鳳鳴常游伊洛間遂得仙清洛曲洛四水合流伊洛瀍澗震史記周幽王時三川皆震伯陽甫曰周將亡矣三川涇渭洛沔彼洛水出書孔安國曰九疇是也符瑞開奧東都賦曰河洛開奧符命用出圖書之泉文選玄龜宋書玄龜洛書者天符也王者有德至川泉則洛出圖書也青鯉河圖曰黃帝游於洛水有鯉魚長三丈身青無鱗赤文成字鳳集宋書曰黃帝坐於玄扈洛水之上有鳳皇集御圖置帝前圖以黃玉為匣龍見易乾曰帝王始興河洛龍見龜負九疇書曰天乃錫禹洪範九疇注云天與禹洛出書也神龜負文而出列於背有數至於九丹書淮南子曰至德之運洛出丹書大魚帝王記黃帝時大霧三日帝游洛水之上見大魚殺三牲以醮之天乃甚雨七日魚流而得圖書沉璧黑玉帝王世紀湯沉璧於洛乃獲黃魚黑玉之瑞始受命稱王赤光尚書中候曰堯沉璧於洛赤光起有靈龜負書出赤文成字溫寒易乾曰帝德盛之應洛水先溫九日乃寒五日變為五色玄黃也鳳銜圖以授軒見鳳集注龜負書以卑姒見龜負九疇注雞銜珠而王漢帝王世紀昭靈后名含始游於洛也有玉雞銜赤珠刻曰吞此者王含始吞之而生漢高祖五子徯太康於洛汭青雲尚書中侯曰武王沉璧而榮光塞河青雲浮洛洛七孔作三大防李適之玄宗患谷洛歲暴耗徭力詔適之以禁錢作三大防曰上湯積翠月陂自是水不能患永昌水則天臨朝武承嗣為款洛水右導使為帝遣雍人唐同秦獻之改洛水為永昌水拜洛受圖則天太后拜洛受圖天子率太子群臣蠻夷以次列太陳珍禽奇獸貢物鹵簿壇下禮成去別神拂洛水征車轉淆陵韓愈送侯參謀去來伊洛上相待安罛箅同上寄崔二十六清洛狄犬吠清洛天津成寒垣李白贈武十七交洛赴洪河及關豈信宿杜甫三川觀水詩上官儀詠詩高宗時天下無事上官儀獨持國政常凌晨赴朝巡洛水步月緩轡詠詩曰脈脈廣川流驅馬歷長洲鵲山月曙蟬噪野風秋音韻清亮望之若仙劉禹錫嘉話水花翻照樹堤蘭倒插波唐太宗臨洛水詩青壇俯洛濱緑綺膺河檢青壇俯洛濱蘇味道詩嵩山東頭伊洛岸勝事不暇須穿裁韓愈持竿洛水側孤坐屢窮辰上洛有二橋李昭德洛有二橋司農卿韋弘機徙其一直長夏門民利之其一橋廢省巨萬計然洛水歲淙嚙之繕者告勞昭德始纍石代柱鋭其前廝殺暴濤水不能怒自是無患也清洛水光鋪碧簟劉禹錫詩清洛水光鋪碧簟上陽宮葉剪紅綃渭八白導鳥鼠之源書導渭自鳥鼠同穴東會於澧又東會於涇又東入於河為雍州之浸周禮雍州其浸渭洛貫都像河三輔記秦都咸陽謂水貫都以象天河浮橋南渡以法牽牛龍飲三秦記皆有黑龍從南山出飲渭水其行道為龍首山星見漢武時有女子浴於渭水中乳長七尺上怪其異遣問之曰第七車者知我所來時蜀人張寬為侍中寬對曰天星主祭祀也齊戒不潔則女人星見垂釣呂望垂釣於渭水得玉璜遂為帝師造舟詩文王在渭造舟為梁祀宋書曰秦漢都西京渭雖不在祀典以其近咸陽故得此大川之祀貫甸服浸神皋送舅詩我送舅氏曰至渭陽震史記周幽王二年二川皆震周亡之兆也三川涇渭洛也殊流涇渭殊流清濁不雜沔彼渭水浸夫雍州親迎詩曰大定厥祥親迎於渭言迎大姒也涇以渭濁湜湜其止孔分渭水入金光門韓朝宗為京兆尹分渭水入金光門匯為潭以通西市林木清渭郭子儀奏雍州背負清渭濁河之固祓除李適傳天子春幸梨園並渭水祓除馬化龍柳宗元龍馬贊明皇帝在位靈昌郡得異馬於河其狀龍鱗虺尾拳毛環目肉鬣居帝闕二十年遇禍亂帝西幸馬至咸陽西入渭水化為龍游沫去不知所終渭流漲膩唐文粹杜牧阿房宮賦渭流漲膩棄脂水也陽春澌還歸非有指灞渭陽春澌韓愈寄崔十六清渭東流劍閣深杜甫哀江頭泛泛渭水上有舟沿兮溯兮愛此百里之清流白居易泛渭水賦井通渭河景公寺前街中舊有巨井俗呼為八角井元和初有公主夏中過見百姓方汲令從婢以銀稜碗就井承水誤墜碗經月餘出於渭河酉陽雜俎三百里內漁釣者五坊捕治之渭河三百里內漁釣者五坊捕治之唐史百官志河渠令璜溪徐彥伯臨渭行清渭無情極愁時獨向東秦州詩旅泊窮清渭同上渭城已遠波聲小李賀抱馬鬣以逸僕固懷恩安祿山反王師敗績懷恩至渭水無舟抱馬鬣以逸蛙大如鼎唐志神龍中渭水有蝦蟆大如鼎里人聚觀數日而失渭水逶迤白日淨杜甫詩葉墜清渭朗上白雍州之川周禮雍州其川涇汭鄭國之渠見堤渠門注白渠漢書趙中大夫白公穿引涇水二百餘里溉田四十餘頃因名曰白渠人得其饒歌曰田於何處池陽谷口鄭國起前白公起後舉鍤為雲決渠為雨涇水一石其泥數斗秦祟史記秦二世夢虎嚙其左驂卜曰涇水為祟二世祀之沉四白馬於涇水漢祠漢書涇渭雖不在祀典以近咸陽皆比大川之祀毒流晉侯伐秦秦人毒涇上流師人多死殊流三秦記涇渭合流三百里清濁不雜震見上壅漢武河平四年長陵臨涇岸頽壅涇流湜湜之流詩涇以渭濁湜湜其止控清引濁沔彼涇水決為鄭渠引湜湜之流泥惟數斗收芃芃之稼畝乃一鍾卑彼涇舟蒸徒楫之卑舟行貌涇水之中舟行者乃衆徒船人以楫擢之孔擁隔黎干戎州人大曆十三年涇水擁隔請開鄭白支渠復秦漢故道以溉民田廢碾磑八十餘所掎汨泥淖撓混沙礫柳宗元愚溪對泰有水掎汨泥淖撓混沙礫視之分寸眙若昵璧淺深險易昧昧不覿乃合清渭自彰穢跡故名曰濁涇富流唐文粹李庾西都賦其地勢也帶涇渭之富流蕩潏邠郊入地底涇水中蕩潏杜甫北征詩比歲多決文粹王維張公德政碑惟涇有防比歲多決近縣疲於書役他山遺於度材公命刮杇蠰填巨石涇水浩浩揚湍波李白豳歌行涇川三百里若耶羞見之上有琴高水下有陵陽祠同上涇川送族弟錞詩未聞細柳散金甲腸斷秦州流濁涇杜甫即事白神池靈沼關中記昆明池曰神池靈沼象滇河習水戰漢書昆明池武帝所穿也初漢欲征昆明夷昆明國有滇河乃使謫戍伐棘上林象滇河作昆明池以習水戰中有戈船樓船數百艘石鯨石鼓劫灰見灰門注堯舟關中記昆明池云堯治水訖停船此池蓋堯時已有池漢代因而深廣之漢宇漢書武帝大修昆明池列館宇以環之金堤西京賦曰昆明靈池黑水玄沚周以金堤樹以柳祀牛女石鯨漢武帝於池中置二石人相對以象牽牛織女又刻石為鯨魚每雷雨魚常鳴吼鬐尾皆動漢時祭祈雨亦有驗魚珠關中記有人釣魚綸絶而去入夢於武帝帝明日於池中見魚銜索取而放之後三日帝復遊池濱得珠曰豈非池中魚之報館昆明池有豫章館西京賦曰豫章珍館揭焉中峙似漢之波西京賦曰似雲漢之無涯儀星之石西徵賦乃有昆明池其中湯湯汗汗滉漾瀰漫浩如河漢昔豫章之名宇披玄流而特起儀景星於天漢列牛女以雙峙玄流見上肇穿文選曰伊茲池之肇穿肄水戰於荒服積水安流孔請為私沼安樂公主嘗請昆明池帝曰先帝未有以與人者主不悅自鑿定昆池延袤數里定言可抗訂之也肄戰許敬宗帝復問漢武開昆明池實何年日對元狩三年將伐昆明實為此池以肄戰習水戰唐高祖武德九年三日庚寅幸昆明池習水戰治昆明作紫雲樓綵霞亭鄭注帝嘗詠杜甫曲江辭有宮殿千門語意天寶時環江有觀榭宮室聞注言即詔兩神策治曲江治昆明作紫雲樓綵霞亭獻獲於大安宮太宗貞觀五年獵於昆明池獻獲於大安宮石鯨分玉溜劫燼引平池唐太宗詩石鯨吼朝野僉載開元初石鯨吼歲大熟神池望不極滄波接遠天李百藥白溫泉湯泉湯液溫谷東京賦靈液神泉並文選據神泉而吐溜華清蕩邪魏都賦溫泉毖湧不白浪華清蕩邪而難老愈疾流惡惡穢也蠲痾痾疾溫源水經曰溫湯即溫源神井張衡溫泉賦曰余適驪山觀溫泉浴神井暄波炎液文選如沸廬山記主簿山有溫泉冬夏常如熱沸若湯梁州記漢水南溫冬夏常熱若湯其熱可熟雞子毖彼溫泉湧於地脈合水火之德澤浸萬人倍藥石之功蠲除六疾潔華清之流豈同禊洛救痾癢之疾寧比浴沂浮天浴日天子用之可也溫源愈出靈液徐清孔賜浴安祿山入朝楊國忠兄弟姊妹延之新豐給玉食至湯將校皆賜浴別治一湯帝賜書曰為卿別治一湯可會十月朕待卿華清宮給香粉蘭澤李適賜浴湯池給香粉蘭澤治湯井為池地理志天寶六載更溫泉曰華清宮治湯井為池環山列宮室鳳泉玄宗開元十一年十二月甲午如鳳泉湯廣成十四年十月甲寅廣成湯池石蓮花唐明皇雜録上於華清宮新廣一湯制度宏麗祿山於范陽以玉魚龍鳧雁石梁石蓮花獻雕鐫尤妙上大悅命陳於湯中仍以石梁橫於其上而蓮花才出於水際上因幸解衣將入而魚龍鳧雁皆奮鱗舉翼狀若飛動上因恐卻之蓮花石至今在夢浴孫贊明守福州贊明武肅王時為吳江尉嘗夢浴於溫泉至是將及福州途次見飛泉洶湧因問從者答曰此溫泉也方悟前夢之應及使汲之將浴從者曰此非佳者至州有之頗佳贊明既及郡齊亟取其泉而浴之出吳越備史陰火煮玉泉杜甫詩沉香山明皇雜録華清池中疊沉香為山效瀛州長湯十六所開元遺事華清宮中除供奉兩湯外別有長湯十六所嬪御之類浴焉疏巖剔藪為天子遊觀房琯玄宗有逸志數巡幸廣溫泉為華清宮環宮所置百司區以琯資機算詔總經度驪山疏巖剔藪為天子遊觀未幾斥為宜春太守葺殿宇於驪山置官曹於昭應無積兩省供奉官諫幸溫湯狀賜浴皆長纓與宴非短褐杜甫詩幸溫湯高祖紀武德六年三月庚戍幸溫湯湯成召浴果不至潼關已濫漁陽師鄭思津陽門詩溫泉御湯中有玉蓮湯從蓮中湧出每浴以錦繡為鳧雁浮又鈒鏤小舟以為戲玩開元遺事白陽侯廣雅曰陽侯濤大波神也靈胥濤神也伍子胥死沉尸於江其精魄為濤神又論衡曰儒書言吳王夫差殺伍子胥煮之於鑊盛以囊投之於江子胥恚恨臨水為濤以溺殺人夫言吳王殺子胥投之於江實也言其志恨臨水為濤虛也且衛葅子路而漢烹彭越子胥之勇不過子路彭越然二人尚不能發怒於鼎鑊之中胥亦自先入鼎鑊後乃入江在鑊之時其神豈怯而勇於江水哉何其怒氣前後之不相副朝夕之池潮有朝夕之期故吳郡有朝夕之池白露之濤海鰍入穴見海門牛魚起毛博物志曰東海有牛魚之形如牛引其皮懸之潮水至則毛起潮退則毛伏沸文選入月觀濤滄波白波洪波奔波洪漣蹙縮帷蓋潮有似帷蓋之狀濤霧蒸湧王義方道南海酌水誓是時盛夏濤霧蒸湧既祭天雲開露人壯其誠風濤驚壯陸元方使嶺外陟海風濤驚壯憤悱鼓怒文粹陸元輔胥山銘序曰鴟夷盛尸投於水濱憤悱鼓怒配濤作神洗滌南北簸蕩東西抉眼不入投於河上自統波濤晝夜兩至懷沙歎騷洗滌南北簸蕩東西同上奮於吳夕於楚其神迄今一日再至來也海鴟群飛陽侯夾從奮於吳怫於越夕於楚乃退仲秋闕望杭人以旗鼓逆之笳簫和之百城聚觀同上數丸唐酉陽雜俎數丸生江岸如蟛蜞取土作丸數至三百則潮至舟人以為候因名曰數丸也屹起回臨浙江濤屹起高峨岷韓愈送惠師蒼濤鬱飛翻杜甫客居下塹萬尋岸蒼濤鬱飛翻乘濤簸扶胥近岸指一髮韓愈贈元協律洪濤春天禹穴幽同上劉生詩江湖天闊足風濤寄杜員外詩湖水定可信李白濤波之旋滔山觸天柳宗元晉問濤波之旋滔山觸天既停既平彌望悠焉良久乃始昂屹湧溢挺拔而出濤瀨漲惡李靖武德四年八月大閲兵夔州時秋潦濤漲惡銑以靖未能下不設備白山下出易井冽寒泉易泉水衛女思歸也毖彼泉水亦流於淇詩云浸苞稂病也浸苞蕭稂看毛也莫浚匪泉浚深也氿泉有冽氿泉無浸獲薪載清相彼泉水載清載濁觱沸沸出濫檻泉正泉出貌動禮冬至後五日水泉動藏珠於泉濫觴家江出岷山其源可以濫觴白泉瑞應曰泉色白自出山澤得禮制則澤谷之白泉出飲之使人長壽醴泉美泉也水之精也昆侖山有醴泉華池君乘土而王其政太平則醴泉出湧乘水而王其政和平則醴泉瀌神靈滋液百珍實用則醴泉出黃帝時以醴泉為漿堯之世德茂清平則醴泉出夏后之時俊乂在宮醴泉出漢宣帝三年醴泉流滂枯槁榮茂禮天不愛其道地不愛其寶則醴泉出也刀剌而湧漢書二師將軍李廣利行無水拔刀剌山飛泉湧出拜而遂出後漢耿恭拜井泉出又醴泉後漢世祖中元元年夏醴泉出飲之者疾病皆愈唯眇蹇不瘳又有赤草生於水涯泠泠文選山溜何泠泠飛泉漱鳴玉吐溜泉涓涓而吐溜文冽清玄泉列清文蜧躍文黑蜧躍重泉灌注傷玉趾寒泉傷玉趾文湧溜石泉湧溜於陰渠天台山賦湧湍於石間文選跂石挹飛泉靈運山人飲楚辭山中人兮飲石泉兮蔭松柏吸微液吸飛泉之微液張騫窮漢張騫奉使窮河源穿石太山之溜穿石貪泉晉廣州石門有貪泉玉漿泉隋書在盧數引丹陽公鳥鼠山俗呼高武隴其下渭所出絶壁千仞本之諸羌若之勳之馬足所踐忽飛泉湧出人為之謠云云因號也水木之本源拔本塞源孔見貪泉極飲去馮立受廣州都督嘗見貪泉曰此吳隱之所酌邪吾雖日汲庸易吾性哉遂極飲去湧流安金藏京兆萬年人神龍初母喪葬南闕口營石墳晝夜不息地本枯燥泉忽湧流藏松清泉潘師正居逍遙谷高宗幸東都召見問所須對曰茂松清泉臣所須也既不乏矣宋思禮禱孝友宋思禮蕭縣簿會大旱井池涸母羸疾非泉水不適口思禮憂懼具禱忽有泉出諸廷味甘寒日不乏汲縣人異之思蘇頲李嶠曰舍人思若泉湧吾所不及書法徐浩書世狀其法曰渴驥奔泉股泉杜佑朱坡樊川鑿山股泉應聖楊朝晟師次方渠水乏有青蛇降下走視其跡水從而流使築防環之遂為停淵士飲仰足有詔置祠命泉曰應聖引泉激霤王鉷以寶鈿為井幹引泉激霤號自雨亭玉琴老杜詩泉聲帶玉琴膏盲田游巖帝謂曰先生此佳否答曰臣所謂泉石膏盲流泉玉涯別墅有佳木流泉幽泉怪石柳文西山宴遊記蘆葭泉唐酉陽雜俎玉門軍有蘆葭泉周二丈深一尺拖馬千頭飲之不竭交旋如盤龍元街縣有泉眼中水交旋如盤龍或試撓破之尋手成龍狀驢馬飲之皆驚走出酉陽雜俎潺湲瀉幽磴繚繞帶嘉樹韋應物香山泉潺湲瀉幽磴繚繞帶嘉樹激轉忽殊流歸泓又同注泄陰壁韋應物遊琅琊山寺新泉泄陰壁石罅同上石罅寒泉潔清德之鑒張曲江龍池頌沉精降液下為録泉清德之鑒柔道之體瀑泉司空圖舊三峰泉石之美冠於一山北巖之上有瀑泉流注谷中灌良田數十頃至今子孫猶為司空在南部新書泉音玉淙琤韓愈城南聯句巖花覆谷泉李白奔泉濺水珠杜甫詩石泉流暗壁日暮凍泉依細石謁真諦詩天澤之泉韓愈宴喜亭記泉之源曰天澤之泉出高而施下也上善泉唐地理志坊州州郭無水東北七里有上善泉開成二年剌史張怡架水入城以紓遠汲四年剌史崔駢復增修之民獲其利後思之為立祠盜泉飛溢廉夫不飲玄宗皇后武氏傳潘好禮疏盜泉飛溢廉夫不飲白東門之池可以漚麻詩靈沼又曰王在靈沼於牣魚躍沼亦池也酒六韜曰殷君好為酒池回舟奏廣樂穆天子傳天子西征至於玄池三日休於玄池之上乃奏廣樂而歸是曰樂池贈雲謠又曰穆天子寧觴西王母於瑤池之西王母為天子歌白雲之謠照華韓詩外傳曰齊白公出弋照華之池孔作觀池樂游原太平公主始作觀池樂游原以為盛集既敗賜寧由岐薛四王都人歲祓楔其池築山浚池長寧公主築山浚池帝及后數臨幸疏龍首池為沼岐陽莊淑公主開第昌化里疏龍首池為沼穿築池觀尉遲勝穿築池觀厚賓客士大夫多從之游蓬萊池李絳帝嘗畋苑中至蓬萊池謂左右曰絳嘗以諫我今可返也其見禮憚如此馬璘山池馬璘卒其後賜群臣宴多在璘山池疏池白居易東都所居履道里疏沼注水銀為沼李尉咸通十四年春詔迎佛骨京師高資相與集大懼注水銀為池以金為堤南蠻驃國有二池以為金堤地變為池樂志帝初賜第慶隆坊坊南之地變為池中宗常泛舟以厭其祥帝即位作龍舟樂臨碧池敬宗帝紀寶曆二年六月辛酉觀魚於臨碧池鑿深池五代雷滿據朗州常鑿深池於府中客有過者召宴池上指其水曰蛟龍水怪皆屈於此蓋水府也酒醴取座上器擲池中因裸而入取其器嬉水上久之乃出治衣服坐意氣自若積翠池魏徵帝宴群臣積翠池酣樂賦詩徵賦西漢良金池唐杜陽編滄州有良金池可方數里水石沙泥皆如金色水底盤筵白氏東都所居履道里宅有池水可泛舟樂天每命賓客繞舷以百十油囊懸炙沈水中隨舷而行一物盡則左右又取之藏盤筵於水底也出窮幽記池之勝池之九里丘陵林麓距其涯壇島渚洲交其中岸之突而出者水縈之若玦焉池之勝於是為最柳宗元東池記樹之松柏楮被之菱芡芙蕖鬱然而陰粲然而榮同上環斗水為池白公廬山記池園潔修韓文落妃池貴妃生於蜀嘗誤落池中後人呼為落妃池出貴妃外傳樂天池館樂天得楊馮宅竹木池館有林泉之致因為池上篇曰都門風水土木之勝在東南東南之勝在履道里雞跖集凝碧池祿山犯闕王維等數人為賊執一日逆黨會飲於凝碧池以梨園數百人奏樂維聞賦詩一絶萬戶傷心野生煙書於壁賊平維以此詩得免明皇雜録若連艦縻檻為堂而今居之堂成而勝益奇望之若連艦縻檻與波上下柳宗元東池洄為清池寥廓泓停同上萬石亭記君子之池韓愈宴喜亭記池曰君子之池虛以鍾其美盈以出其惡也詔賜永穆公主池觀安祿山入朝詔賜永穆公主池觀為游燕地觀詔勝爽魚朝恩有賜墅觀詔勝爽表為佛祠文石砌岸元載藝暉前有池悉以文石砌岸中有蘋陽花亦類於白蘋其花紅而且大有如牡丹更有碧芙蓉杜陽編瀦沼三百畝唐史長寧公主魏王泰故地東西盡一方瀦沼三百畝泰薨以與民至是主丐得之白浦說文浦水濱也小口風土記曰大水有小口別通曰浦也出漵浦而邅回望美人兮南浦並楚辭與浦述征記曰與舊魏步導吳揭水灌之絶道為浦程溪浦顧微廣州記曰程溪浦口有蒲母養龍列斷其尾呼掘龍時人見之則土境大豐而利涉之屠兒浦劉禎京曰合浦見珠門注孔對青崖唐文粹楊炯少姨廟碑曰浦對青崖獨有金臺之異翻翻翻翻江浦荷韓愈詩弭棹皮日休九諷允逐篇云弭吾棹兮澧之浦又同上燘邪篇云浦上蘆花兮秋復秋朝夕潮至文粹陸龜蒙門外有溝通浦漵而朝夕之潮至焉曠若天地通文粹李華寄趙侍御凌灘出極浦曠若天地通浦沙靜如洗李白江上欲歸瀼西宅阻此江浦深杜甫阻雨蕭條別浦清同上江浦向來澄江邊星月村煙對浦沙東山野亭暫留魚復浦寄李祕書白夜光徑寸明月之珠不能無類掘靈蛇之珠九品南越志珠九品言大小之次千金莊子曰河上有人家貧其子投川得千金之珠也度寸韓詩曰良珠度寸雖有百仞之水不能掩其輝無脛而走火齊珠名秋露如珠五星若連珠暗投掌上難得之貨希世之寶是吾寶也不汝容焉蛇報恩隨侯見傷蛇以藥封之蛇銜明珠徑寸純白夜光燭室以報隨侯魚報恩見昆明池注貫禮曰纍纍乎端如貫珠雞銜見洛門注捐文選沉珠於泉新語曰舜捐珠於五湖之泉以塞淫邪之路生蚌三輔決録曰孔融見韋元將與其殳書曰不意雙珠生於老蚌感後漢孟嘗為合浦太守先時二千石貪穢珠悉徙去合浦無珠及孟嘗行化一年其去珠乃復還水尸子曰水圓折者有珠水懷珠而川媚文選贓不拜東觀漢記曰交趾太守坐贓詔以班賜群臣鍾離意得珠璣悉委地而不拜曰此贓穢之物誠不足拜帝乃別賜錢二十萬賣漢董偃與母賣珠為事又合浦人採珠以易米而食時二千石貪穢珠徙去而餓死者盈路瑞禮斗威儀曰德至淵泉則江海出明珠鳳銜拾遺記鳳皇銜珠於庭少昊拾而懷之遺莊子云黃帝遺玄珠於赤水照乘魏王曰寡人有徑寸珠照車前後十二乘者十枚拾抱朴子曰識珍者必拾濁水之明珠採龍頷河上之子於驪龍頷下採珠侯驪龍之睡剖蚌胎文選曰蚌蛤珠胎與月虧全又曰馮夷剖蚌列明珠生鯨目廣州記鯨鯢目即明月珠也魚死而目皆無精飾犢韓子曰楚人有賣珠於鄭者為掛之犢飾以珠玉鈿盤後魏武帝廣作黃金盤鈿之以珠玉弄游女弄珠於漢皋之曲崖不枯荀子曰淵生珠而崖不枯泣鮫人寄宿人家臨去注而出珠盈盤以與主人故曰泉客慷慨以泣珠彈雀呂氏春秋曰隨侯之珠彈千仞之雀世必笑之以其所用重而所要輕也藏莊子曰藏珠於山飾劍西京雜記高祖斬白蛇劍上有七彩珠為飾七彩見上龍銜燭龍銜珠以為耀蠙珠禹貢徐州蠙珠暨魚薏苡馬援載薏苡一船人有譖之為文犀明珠遺蜀宗預聘吳孫權泣別曰君每銜命結二國之好今孤衰老恐不復見遺珠一斛無足自致新序曰船人對晉平公曰珠出江漢玉出崑崙山無足而致也不執晉崔洪良伯手不執珠玉汝南王亮燕公卿以琉璃杯行酒酒至港洪不執夜光東夷有明珠稱夜光致之平地終日不停採珠晉陶璜為交州百姓無農唯以採珠為業以珠易米吳時慮百姓私散好珠絶商旅人饑上請乃制自十月至二月非採上珠時聽往來上幣管子曰先王以珠玉為上幣木難文選云碧珠也解佩鄭交甫將南適楚至漢皋臺下遇二女佩二珠大如荊雞之卵交甫與言曰欲子之佩二女遂解與交甫而去不見二女其佩亦失璀璨珠光彩貌詭暉別色熠熠熒熒並光含幽育明崎岸崎長岸也珠生則草木不枯環韓宣子有玉環其一在鄭商宣子請諸子産子産不與注同工共璞自共為雙也夫環宣子謂子産曰起請夫環盧重環以環帶犬重鋂貫三環盧令令環瓔聲探環晉羊祜叔子五歲於鄰家李氏樹中探取金環云先藏時人以為前身環中喻道也莊子象環孔子去魯佩象環五寸象牙有文理言以己有文章也五寸法五行環者取其循環似己德之無窮黃雀後漢楊寶年七歲行於華山見一黃雀被傷為螻蟻所搏寶見之而憐因將歸置箱中採黃蕊飼之經旬瘡愈旦來暮去忽一朝變為黃衣少年持玉環一雙來報寶曰好掌此環子孫纍代三公果如其言白環帝王世紀西王母慕舜之德來獻白環及益地圖孔西域大珠魏徵帝遣使市馬徵曰魏文帝欲求市西域大珠蘇則以為惠及四海則不求自至求而得之不足貴也陛下可不畏蘇則言乎瑟瑟璣琲狼藉於道貴妃楊氏十月帝幸華清宮五家車騎皆從瑟瑟璣琲狼藉於道滄海遺珠狄仁傑閻立本異其才謝曰君可謂滄海遺珠矣銀榼曹確進中書侍郎帝薄於德昵寵優人李可及家嘗取婦帝曰弟去吾當賜酒俄而賜者負二銀榼與之皆珍珠也一斗李義府請廢后立昭儀帝悅召見與語賜球一斗獻西域獅子天寶初王尸羅迷迦再遣使獻大珠賣珠屈突通傳初桂州都督李弘節亦以清謹顯既沒其家賣珠太宗疑弘節實貪欲追坐舉者魏徵曰陛下過矣今世號清白死不變者屈突通漲道源火珠南蠻多利火珠大者如雞卵圓白照數尺日中以艾藉珠輒火出蕩心鴆毒太宗賢妃徐惠言珠玉為蕩心鴆毒無取韋正貫抉嶺南節度使南海舶賈至大師必取象犀明珠上珍而售以下直正貫既至無所取且馬五代吐番婦人戴珠云珠之好者一珠易一良馬五色珠室韋富人以五色珠垂領明月珠西域拂菻多明月珠堂飾明珠南蠻驃堂飾明珠如意寶珠楚州獻寶十三二如意珠大如雞卵琅玕珠琅玕珠形如玉環服珠泥婆羅其君服珠珠殿南漢劉襲聚南海珍寶以為珠殿廢池珠玉馬植為安南都護州部廢池珠玉復生五代馬吐珠唐五行志大和九年易定馬飲水因吐珠一以獻珠琲韋堅鑿潭成以小斛舟署其郡以所産暴陳其上若南海則珠琲覆地曹確時帝昵優人李可及教舞者數百舞珠寶覆地上清珠唐杜陽編代宗為兒時玄宗每坐於玉案前因命以取上清珠以絳紗囊之繫於頸上上清珠即開元初罽賓國所貢其珠光明潔白可照一室視之則有仙人玉女雲鶴絳節之象搖動於其中及上即位寶庫中往往有神光異氣履水珠順宗即位拘弭國貢履水珠色黑類鐵大如雞卵其上鱗皺其中有竅云持入江海中可行於洪波之上上始不為之寶遂命善浮者以五色絲貫之繫於左臂遣入龍池其人則步驟於波上若在平地亦潛於水中良久復出而遍身略無霑濕上奇之因以御饌賜使人焉至長慶中嬪御試弄於海池遂化為黑龍入於池內俄而雲煙暴起不復追討照夜珠楚馬希振天祐初殷為娶洪川鍾傅女資從甚厚有玉碗照夜珠希振以非人臣所玩皆納之於殷九國志真珠畦陳繼善拜少傅致仕富於資産自荷一鉗以理小圃成畦以真珠千於顆若種蔬狀土壤之間記顆俯拾出南唐近事清水珠馮翊嚴生家於漢南遊峴山得一珠如彈丸色黑而有光視之瑩徹如水焉以示西國胡人曰此清水珠也即命注水濁缶以珠投之俄而淡然清徹矣胡人以三十萬貨之出宣室志清輝照海月越客採明珠提攜出南隅清輝照海月美價傾鴻都李白古風記事珠開元中張說為相有人惠一珠紺色有光名記事珠或有遺忘即玩此珠心神頓悟出開元遺事自平宮中呂大一杜甫自平詩自平宮中呂大一收珠南海千餘日越俗以珠為上寶生女名珠娘生男名珠兒緑珠之字由此稱緑珠傳班螺酌真珠粧樓記曰洛陽有妓樂者四時則散珠厚盈數寸以班螺令妓女酌之仍各其數得雙者為吉妓乃作雙珠宴以勞主人客從南溟來遺我泉客珠杜甫詩客從南溟來遺我泉客珠珠中有隱字欲辨不成書掌中貪見一珠新上漢中王同昌公主以紅琉璃盤盛夜光珠立堂中光如晝杜陽編誥多珠大曆中林國獻靈珠五色紅而光又名誥多珠同菖蒲煮食即大如雞卵可數日不饑雙珠出海底俱是連城珍李白詩白美玉吾寶傳曰是吾寶也上幣見珠門注瑾瑜匿瑕韞櫝而藏諸連城之價被褐懷玉碌碌如玉堅白不曰堅乎磨而不磷不曰白乎涅而不緇白虹之氣盈尺聖人不貴盈尺之璧五德五經通義曰玉有五德十仞韓詩良玉度尺雖有十仞之土不能掩其光度尺見上磨玷白圭之玷尚可磨指瑕藺相如揭而璽之周禮職金掌凡金玉錫石丹青之戒令受其入征者辨其物之美惡與其數量揭而璽之龍輔玉石也左傳公使公衍獻龍輔於齊侯玉石周有砭厄宋有結緑梁有懸黎楚有和璞晉有垂棘玉色有山玄文有水蒼文白如截肪黑如點漆赤若雞冠黃如蒸栗天地之精淮南子鍾山之王灼以爐炭三日三夜色澤不變得天地之精也片玉郤詵自謂荊山之片玉磨礱追琢滿堂金玉滿堂希世之寶玉德子貢問於孔子曰敢問君子貴玉而賤玫者何也為玉之寡而玫之多與孔子曰非為玫之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉溫潤而澤仁也縝密以栗智也廉而不劌義也垂之如墜禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩暇也孚尹旁達信也氣如白虹天也精神見於山川地也圭璋特達德也天下莫不貴者道也故君子貴之也比德言念君子溫其如玉有女如玉其人如玉琢如琢如磨玉不琢不成器他山之石可以攻玉價子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也賣化為石見河門注假道晉荀息請以垂棘之璧假道於虞以伐號毀子曰龜玉毀於櫝中是誰之過與文選曰碎結緑之鴻輝殘玄黎之夜色獻宋人得玉以獻子罕子罕曰我以不貪為寶爾以玉為寶若以我皆喪寶不若人有其寶玉璜尚書中侯曰呂尚釣於渭濱魚腹中得玉璜刻曰姬受命佐之敬重執玉不趨受玉以掬飲玉爵不揮皆敬重玉燭爾雅四時調謂之玉燭玉山嵇康玉箸王紹君之淚如玉箸玉堂漢堂名玉樽玉酒玉食玉床西京雜記漢武趙昭儀寢昭陽殿玉為床象牙為簟佩古之君子必佩玉君子無故玉不去身比德也三獻不遇楚卞和以玉璞三獻不遇楚王遂刖其足不識無價尹文子魏之田父耕於野得玉徑尺鄰人曰怪石歸致於廡下光明照室田父布棄之鄰人盜之以獻魏王召玉工相之工望見再拜卻立曰敢賀大王得天下之寶問其價曰此無價五城之都僅可一睹賜獻玉者千金長食大夫祿抵鵲荊山之下以玉璞抵鵲潛隱尸子曰水方折者有玉大戴禮曰玉在山而木澤文選曰石韞玉而山輝瑞王者不藏金玉則紫玉見深山隱抱朴子荊山之玉潛光荊石之中雖有千仞之土不能掩其光種陽雍伯種石而生玉切寶劍切玉如泥攻玉禁採景帝詔吏發民若庸采黃金珠玉者坐贓二千石有聽者同坐雪融掘得晉新蔡王騰字元邁次真定大雪平地數尺營門前方數丈雪融不積掘之得玉馬高尺餘來獻之滅瘢王莽就國南陽守選掾孔休守新都相休侯莽疾瘢莽遺休玉休不受莽曰君面有瘢美玉可以滅瘢休猶不受莽曰君嫌其價邪遂椎碎自裹進休休乃受玉玦魏鍾繇元常有玉玦太子欲得之而難公密使臨菑侯因人說之繇送太子報繇書云云碎亞父撞碎漢王所獻玉斗錯他山之石可以為錯注錯石可以磨玉璧植璧秉圭書當璧而拜抵璧於谷和難周禮谷璧以和難以聘女拱璧仲舒璧後漢鍾離意為魯相省視孔子受經堂男子張伯剷草得璧七枚懷藏其一以六白意意曰甕中素書文曰後世修吾書者董仲舒發吾笥者鍾離意璧有七張伯取其一意召問伯伯叩頭出之求虞叔有玉虞公求旃不與既而悔之曰匹夫無罪懷璧其罪吾焉用此以賈害碎藺相如見秦王無償趙城之意乃持璧睨柱曰大王必欲殺臣臣頭與璧俱碎於柱秦王恐其碎璧乃謝之遂衣褐秉璧歸道壓璧朱掾名暉詐取陰就璧奉東平王以朝覲禮曰以繅籍玉以韋衣木廣袤各如玉之大小為玄色不鬻圭璧金璋不鬻於市孔指環安定公主下嫁回鶻會昌三年來歸以黠憂斯所獻白貂皮玉指環皆賜河西城域于闐有玉河國人夜視月光盛必得美玉求初德宗即位遣內給事朱如玉之安西求玉于于闐得圭一珂佩五環一帶胯三百簪四十奩三十釧十杵三瑟瑟百斤並它寶等及還詐言假道回紇為所奪久之事泄得所示流死恩州于闐國玉池于闐國有玉池每以端午日王親徑取玉自王已下至庶人皆取之每取一團玉以一團石投之出西域記賜高昌太宗即位獻公狐裘帝賜妻文華鈿一具宇文亦上玉盤刻玉扶南出剛金可以刻玉見金門石國高仙芝討石國獲寶玉甚衆楚州獻寶五符志上元二年楚也粟粒自然無雕鐫跡曰西王母白環二曰如意寶珠大如雞卵曰紅珠鞨大如巨栗曰琅玡珠二形如玉環四分缺一曰玉印大如半手理如鹿陷入印中曰皇后採桑鉤如簪屈其末曰雷公石斧無孔其一闕凡十三置之日中白如連天玉界尺五代梁丞相趙光逢在唐以文行知名時人稱其方直溫潤謂之玉界尺玉馬五代回鶻唐莊宗時王仁美遣使者來貢玉馬撈玉于闐其南千三百里曰玉州山多玉者此山也其河源所出至於闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異每歲秋水涸國王撈玉於河然後國人撈玉獻玉千斤同上遣都督劉再升獻玉千斤及玉印降魔杵等夜光璧西域拂菻多夜光璧美玉張說之曰宋之問之文如美玉玉斧五代王建立徙昭義賜以玉斧名玉尉遲勝求玉于闐國天寶中入朝獻名玉暖玉鞍天寶遺事寧王有暖玉鞍賜玉器王珂李克用在河中未出也帝懼茂貞之逼復使嗣延王戒不以御服賜玉器之龍虎玉唐杜陽編順宗西域有進美玉者二一圓一方徑各五寸光彩凝冷可鑒毛髮時伊祈玄解方坐於上前熟視之曰此一龍玉一虎玉圓者龍也生於水中為龍所寶若投之水必有虹霓出焉方者虎也生於巖谷為虎所寶若以虎毛拂之即紫光迸逸而百獸攝伏上異其言玉辟邪肅宗賜李輔國玉辟邪二各長一尺五寸蔀巧殆非人間所有其玉之香可聞於數百步雖鎖於金函鐵匱終不能掩其氣或以衣裙誤拂則芬馥經年縱浣濯數四亦不消歇火玉武宗會昌九年夫余國貢火玉三斗色赤長半寸上尖下圓光照十數步積之可以燃鼎置之室內則不復挾纊清越而瑕不自掩潔白而物莫能污內堅剛而外溫潤有似乎君子者玉乎故用乎諸侯劉禹錫論紅玉環杜陽編元載紫龍髯拂刻紅玉以為環紐玫中而玉表賈耽等贊似大節責之蓋玫中而玉表歟符彩照滄溟清輝凌白虹李白獲玉真人像二十也唐地理志寧州真寧本羅川天寶元年獲玉真人像二十七因更名也如碧玉同昌公主下降寶貨之異有如意玉杜陽編軟玉天寶中興國獻軟玉鞭屈之則首尾相就舒之則徑直如繩同上碧玉檞葉異聞集李章武與王倡往來死後李經所居見王來司寢將曙取一物紺碧似玉而冷狀如檞葉贈曰西嶽王京夫人所遺鞨靺寶也玉簫之約唐宋遺史韋皋未仕時寓於姜使君門館姜子曰荊寶待皋甚厚有小青衣曰玉簫美而艷絶即以贈皋歸覲與玉篇約七年復來因以玉指環贈之皋踰期不至玉簫歎曰韋家郎不來矣絶食而死後皋鎮屬荊寶往見問玉簫知其已死甚憐之皋誕日東川盧尚書獻歌妓為壽名玉簫遽視之宛然舊人中指有玉環隱起玉指碗馬侍中嘗寶一玉精碗夏蠅不近盛水經月不腐不耗或目痛含之立愈酉陽雜俎未試囊中餐玉法明朝且入藍田山杜甫去矣行玉婆羅門雞跖集唐修行楊相公每朝常弄小玉婆羅門子高數寸瑩徹精巧可愛云是于闐王內庫之物誇作天下珍李白古風宋國梧臺東野人得燕石誇作天下珍知哂趙玉璧璧玉儲精以稠疊杜甫大禮賦蒼璧黃琮歸乎正色南郊賦白輯五瑞輯斂也斂五等諸侯之圭璋而朝覲也班瑞于群后班還也朝覲禮畢還瑞於諸侯禹錫玄圭禹治水畢堯賜之玄圭以章其成功爾寶詩曰錫爾介圭以作爾寶注周王錫申伯介圭以為瑞瑟彼圭璋瑟潔白貌詩剪桐成王剪桐葉為圭戲封唐叔周公曰天子無戲言遂命封之特達之德禮曰圭璋特達德特達謂以朝聘不有須而成鞠躬語曰執圭鞠躬如也如不勝鋭方之象以法陰陽白虎通圭以為信也上鋭陽也下方陰也長短之制以辨上下別貴賤周禮昭度昭其度也器以藏禮物有其容可磨白圭之玷尚可磨也載弄之璋不琢禮曰大圭不琢為石傳曰王子朝用成周寶圭沉於河人得於河上將賣之則為石奉璋峨峨詩六瑞周禮以玉作六瑞植璧秉圭屏璧與圭書治德結好周禮琬圭以治德結好易行除惡琰圭以易行除惡南容三復剝圭璋為鏚柲剝破也鏚斧也柲柄也楚靈王繅藉周禮公執桓圭繅三采三就注繅木為中幹用韋衣而畫成之一匝為一就又覲禮以繅藉玉注以韋衣木廣袤以玉大小為玄色王執鎮圭鎮安也以四鎮之山為象飾所以安鎮四方長尺有二寸公執桓圭桓宮室之象可以安上也長九寸侯執信圭伯執躬圭信身也身圭躬圭皆像人形為飾欲其慎行以保身也圭皆長七寸信音身子執穀璧男執蒲璧穀所以養人蒲為席所以安人璧皆徑五寸不執圭者未成國也享俯有章卿為君使執圭璋也傳云孔薦圭璧於房闥陳子昂贊武后竊威柄誅戮大臣宗室脅逼長君而奪之權子昂乃以王者之術勉之卒為婦人試武不用可謂薦圭璧於房闥以脂澤汗漫之也玉圭初德宗即位遣內給事宋如玉之安西求玉于于闐得圭一獻玄圭寶建德宗城人獻玄圭一景城丞孔德紹曰昔天以是授禹今瑞與之侔國宜稱夏建德然之特達圭璋之表崔群制韓愈文聯纍森然炳然若開群玉之府指揮聯纍圭璋琛璜之狀各有列位柳宗元文圭璋交映送苑論
