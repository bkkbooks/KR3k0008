body:
  text: 卷第七十三孔明宗武君不通文字四方章奏常使安重誨讀之重誨亦不知書多不稱旨孔循教重誨求儒者置之左右而兩人皆不知唐故事於是置端明殿學士以馮道及鳳為之五代史趙鳳傳班在翰林學士上初端明殿學士班在翰林學士下結銜又以官下明年鳳遷禮部侍郎因諷任圜升學士於官上又詔班在翰林學士上同上左右司二孔郎中各一人從五品上員外郎各一人從六品上掌付諸司之務舉稽違置符目知宿直為丞之二百官志墮廢左右司貞觀元年復置左右司郎中龍朔元年改郎中曰左右承務永昌元年復置員外郎同上以詳整稱職武元衡德宗時歲內三遷至右司郎中以詳整稱職宣慰江淮潘孟陽傳左司郎中鄭敬宣慰江淮帝誡曰朕宮中用尺寸物皆有籍唯賑民無所計卿是行宣諭朕意毋若潘孟陽殫財費酣飲游山寺而已會府藂委之任杜牧行右司皇甫鉟制四海百司之條目舉之在勤同上彌綸省闥奚陟歷金部吏部員外郎左司郎中彌綸省闥精簡舊史劉洎上疏尚書省詔敕稽停文案擁滯比者綱維不舉並為勳親在位所以郎中折奪唯事咨稟且宜精簡左右司郎中如並得人自然綱維略舉亦當矯正趨競豈唯息其稽滯哉白獻可替否漢官儀曰秦及前漢置散騎常侍各一人散騎騎馬並乘輿車獻可替否纍清談晉鄭默為散騎常侍世祖出南郊侍中正陪乘詔曰使鄭常侍謂默曰卿如何得參乘昔州內舉卿相輩常愧有纍清談非其好七賢傳高貴公以阮籍為散騎常侍非其好也辭大不辭小周處除楚內史又徵為散騎常侍處曰古人辭大不辭小乃先楚郡珥貂蟬備顧問掌侍從常侍三孔門下省左散騎常侍二人正三品下掌規諷過失侍從顧問百官志中書省右散騎常侍二人同上八貂之列白居易薛戎制近侍之列騎省為貴歸登制上備顧問應對之選列言語侍從之臣同上職規諷李渤又言左右常侍職規諷循默不事若設官不責實如罷之討元濟李訴憲宗討吳元濟以訴檢校左散騎常侍條擲失政鄭綮昭宗時為右散騎常侍往往條擲失政衆歡傳之每以詩謠託諷綮復還常侍大順後王政微綮每以詩謠託諷中人有誦之天子前者昭宗意其有所蘊未盡因有司上班簿遂署其側曰可禮部侍郎同中書門下平章事宜備顧問鄭畋以右散騎常侍召還故事兩省轉對延英獨常侍不與畋建言宜備顧問詔可遂著于令在南宮六卿之下馬胤孫傳時劉昫亦罷相為僕射右散騎常侍孔昭序建言常侍班當在僕射前胤孫責御史臺撿例臺言故事無所見今班在前崔居儉楊言于朝曰孔昭序解語是朝廷無解語人也且僕射師長百僚中丞大夫就班修敬而常侍在南宮六卿之下況僕射乎昭序癡兒豈識事體五代史丹墀文陛之內貂羽金蟬之榮杜牧制置笏在陛崔元亮拜右散騎當侍鄭注誣宋申錫逮補倉卒內外震駭玄亮率諫官叩延英苦諍反覆數百言文宗未諭玄亮置笏在陛俯伏流涕帝感悟衆亦服其不撓繇此名重朝廷勸順納諫諍歸登陟右散騎常侍入謝憲宗問政所先登知帝鋭而果于斷勸順納諫諍內外傳為讜言貂卻開元已後鄙常侍此官者朝中謂之貂卻出南部親事珥貂白居易孔戣制可使珥貂立吾左右隰朋劉向豈遠乎哉垂璫夾乘之官元稹裴向常侍制周文王侍從之臣無可使結襪者我知之矣左右前後無非令人豫欲用為垂璫夾乘之官以代吾盤盂韋弦之戒不亦可乎白夕郎漢官儀暮入對青瑣門拜名曰夕郎名儒國親後漢胡廣曰給事中掌侍從左右位次侍中或名儒或國親宜在左右晉武詔燕王師邵清貞廉潔博通六籍宜在左右敦儒訓可給事中給事中四孔給事中四人正五品上掌侍左右分判省事察洪文館繕寫校讎之課凡百司奏抄侍中既審則駁正違失詔敕不便者塗竄而奏還謂之塗歸季終奏駁正之目凡大事覆奏小事署而頒之三司百官志三十八給事中之職凡制敕有不便於時者封奏之刑獄有未合于理者駁正之天下冤滯無告者得與御史糾理之有司選補不當者與侍中裁退之不專掌侍奏贊詔令而已白居易鄭覃給事中制從當世賢士游宗室璡好從當世賢上游賙人之急纍擢給事中數上言陳當世得失薛元超遷給事中數上言陳當此得失帝嘉納太宗兼將相事張行成遷給事中帝嘗謂群臣朕為人主兼行將相事豈是不奪公等名舜禹湯武得稷搜伊呂而四海安漢高有蕭曹韓彭而天下寧茲事朕皆兼之行成上疏盛德含光規模宏遠左右文武誠無將相材奚用大庭廣衆與之量校擯萬乘之尊與臣下爭功哉帝嘉納之撰三教珠英徐彥伯進給事中武后撰三教珠英取文辭士皆天下選而彥伯李嶠居首還詔狄兼謨擢給事中左藏史盜度支縑帛文宗以經赦詔勿治兼謨對還詔書帝問之對曰典史犯贓不可免帝曰朕已赦其長官吏亦宜宥與其失信寧失罪人既而曰後或事有不可勿以還詔為憚諫作景龍觀韓思復入為給事中帝作景龍觀思復諫曰禍難初除土木遽興非憂物恤人所急不見省批敕李蕃再遷給事中制有不便就敕尾批卻之吏驚請聯他紙蕃曰聯紙是牒豈曰敕邪封駁稱職郭承嘏進給事中俄出為華州刺史給事盧載還詔書且言承嘏數封駁稱職宜在禁闥帝謂曰朕謂久次欲優其稍入耳乃復留給事中還詔議皇甫鏄崔佑甫子植元和中為給事中時皇甫鏄判度支建言減百官奉廩植封還詔收鏄又請天下所納鹽酒利增佑者以新准舊一切追償植奏言用兵久百姓凋罄往雖佑跌踰其實今不可復收於是議者咸罪鏄鏄懼而止時稱其直薛存慶五遷給事中與韋洪景封駁詔書時稱其直馬前臚傳詔旨齊映擢給事中映為人白皙長大言音鴻爽故帝令侍左右或馬前臚傳詔旨以士人直曹關播再遷給事中故事諸司甲庫以令史直曹刓脫為姦播悉易以士人時韙其法請留給事左右呂元膺擢給事中俄為同州刺史既謝帝逮問政事所對詳詣明日謂宰相曰元膺宜氣讜言誼在左右奈何出之李蕃裴洎謝因言陛下及此乃宗社無疆之休請留給事左右駁奏無私盧鈞遷給事中有大詔令必反覆省審駁奏無私力于治李憕三遷給事中力于治有任事稱明簿最下無敢給兼學士陸堅以給事中兼學士帝待之甚厚圖形禁中親製贊仗內供奉閻朝隱性滑稽屬辭奇詭為武后所賞遷給事中仗內供奉后有疾令往禱少室山乃沐浴伏身俎盤為犧請代后病還奏會后亦愈大見褒賜其資佞諂如此瑣闈白居易竇易直制俾升瑣闈以備顧問賦詩悼痛王維安祿山素知其才迎置洛陽迫為給事中祿山大宴凝碧池悉詔梨園諸工合樂諸工皆泣維聞悲甚賦詩悼痛賊平獄或以詩聞行在時縉位已顯請削官屬維罪肅宗亦自憐之下遷太子中允救狄仁傑李嶠遷給事中會來俊臣誣狄仁傑等獄將抵死敕嶠與大理少卿張德裕侍御史劉憲復驗德裕等內知其冤不敢異嶠曰知其枉不申是謂見義不為者卒與二人列其枉忤武后旨出馬閏州司馬議事惟允遷給事中李華崔沔集序又拒貴幸怙恩之語削大臣忤旨之刑同上崔沔集序以勞召孟簡導溉田以勞召為給事中論事有回天之力張玄素遷給事中貞觀四年詔發卒治洛陽宮且東幸玄素上書即詔罷役賜綵二百匹徵名梗挺聞玄素言歎曰張公論事有回天之力著樞機論徐彥伯進給事中始武后時大獄興王公卿士以語言為酷吏所引死徙不可計彥伯著樞機論見言語門執詞頭謁宰相舊史袁高為給事中德宗復用盧杞為饒州刺史命高草詔書高執詞頭謁宰相曰盧杞作相三年矯詐陰賊退斥忠良若更授大郡恐失天下之望宰相不悅命舍人草之詔出執之不下乃奏論之中書舍人五白夙夜出納朕命唯允回翔青瑣典掌紫泥以紫泥封詔書咨爾才華掌茲綸詔啓迪厥命潤色帝謨出納絲綸發揮訓誥親奉聖旨職司王言職在禁闈典茲樞密當盛明之朝居清切之地徐邈文儒謝安舉為中書舍人劉超忠慎晉劉超出納王命忠慎清苦當若日之朝掌如綸之誥王言如絲其出如綸預顧問多補益出命書告經傳掌文法主呈奏孔舍人六人正五品上掌侍進奏參議表章凡詔旨制敕璽書冊命皆起草進畫既下則署行其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤制敕既行有誤則奏改之百官志以久次者一人為閣老判本省雜事又一人知制誥顓進畫給食干政事堂其餘分署制敕同上開元初以他官掌詔敕策命謂之兼知制誥肅宗即位又以他官知中書舍人事兵興急於權便故去臺閣決遣顓出宰相自是舍人不復折六曹之奏會昌末宰相李德裕建議臺閣常務州縣請奏復以舍人平處可否並同上綸閣之職白居易裴度除中書舍人制度以茂學懿文潤色訓誥體要典麗甚得其宜施之四方朕命惟允況中立不倚道直氣平介然風規有光近侍臺郎蒲歲班列當遷綸閣之職所宜其授禁職同上崔群制端厚和敏飾以文學溫溫忠敬得侍臣之風自列內朝兼司誥命事煩而益密職久而彌精寵以正名式光禁職與三代同風元稹沈傳師授中書舍人制煥有文章務為詞誥使吾禁中無漏露之患而朕語言與三代同風勤亦至矣列上五事高馮轉中書舍人列上五事以謂今天下大定而刑未措者何哉蓋謀猷之臣臺閣之吏不崇簡易而昧經遠故執憲者以深刻為奉公當官者以侵下為益國一人足辦我事孫處約始名道茂擢中書舍人高宗即位令社正倫請增舍人員帝曰處約一人足辦我事止不除今事問琳崔琳明政事開元中與高仲舒同為中書舍人侍中宋璟親禮之每所訪逮嘗曰古事問仲舒今事問琳尚何疑為文華婉崔融進鳳閣舍人融為文華婉當時未有輩者朝廷大筆多手敕委之其洛出寶圖頌尤工雖大詔令未嘗著槁韋承慶纍遷鳳閣舍人掌天官選屬文敏無留思雖大詔令未嘗著槁兄弟自相代韋嗣立解鳳閣舍人武后召嗣立問曰爾父嘗稱二子忠且孝堪事朕比兄弟稱職如而父言今使卿兄弟自相代即拜鳳閣舍人本傳不能得一辭陸餘慶遷鳳閣舍人后嘗命草詔殿上恐懼不能得一詞降左司郎中頗見納用韓思復遷中書舍人數指言得失頗見納用詔令嚴促皆乂草定李又遷中書舍人韋氏之變詔令嚴促皆乂草定文冊大號令多主為之李嶠為鳳閣舍人居官鯁正宋璟遷鳳閣舍人居官鯁正武后高其才舍人思若涌泉蘇頲拜中書舍人時瑰同中書門下三品父子同在禁苑朝廷榮之玄宗平內難書詔瑱委獨頲在太極後閣口所占授功狀百緒輕重無所差書史白曰丐公徐之不然手腕脫矣中書令李嶠曰舍人思若涌泉吾所不及當草詔張九齡進中書舍人會帝封泰山說多引兩省録事主文及所親攝官升山超階至五品九齡當草詔謂說曰官爵天下公器先德望後勞舊今登封告或千載之絶典而清流陋於殊恩胥史乃濫章韍恐制出四方失望本傳屢獻讜言蘇珦子晉先天中為中書舍人玄宗監國所下制命多晉及賈曾之定屢獻讜言天子嘉允名相甲乙席預為中書舍人與韓休許景先徐安貞孫逖名相甲乙解事舍人齊浣開元初姚崇復相用為給事中中書舍人論駁及告詔皆援準古誼朝廷大政必咨之時號解事舍人開元後制詔者稱常揚揚炎遷中書舍人與常袞同時知制誥袞長於除書而炎善德音自開元後制詔者稱常揚分押六曹尚書舊制中書舍人分押六曹尚書開元初廢其職杞請復之炎固以為不可杞益怒譽重一時常袞為中書舍人文采贍蔚長於應用譽重一時一坐失色武儒衡時元稹倚宦官知制誥儒衡鄙厭之會食瓜蠅集其上儒衡揮以扇曰適從何處來遽集於此一坐皆失色親擇良笏與李絳遷中書舍人翌日賜金紫親擇良笏與之目曰異時膺顧託南面當如此絳頓首勸聽覽高鉞進知制誥拜中書舍人入見帝因勸躬聽覽以示憂勤帝納其言賜錦綵鄭注以醫術侍高元裕進中書舍人鄭注入翰林元裕當書命乃言注以醫術侍注愧憾最宜為誥王仲舒穆宗立每言仲舒之文可思最宜為誥有古風召為中書舍人既至視同列率新進少年居不樂曰豈可復治筆硯於其門哉吾久棄外周知俗利病不自愧宰相聞之除江西觀察使罷統軍用麻鄭絪德宗自興元邊置六軍都統視六尚書以處功臣竇文瑒恃功陰諷宰相進擬如統軍北絪當制奏言天子封建或用宰相以白麻書制付中書門下今以命中尉不識陛下特以寵文場邪遂著於令也帝悟更命中書作詔並罷統軍用麻鳳閣王氏王徽昆弟四人皆擢進士第至鳳閣舍人者三人故號鳳閣王氏求降外官增父秩孫逖遷中書舍人是時父嘉之且八十猶為令逖求降外官增父秩帝嘉納拜嘉之宋州司馬聽致仕為代言最孫遜開元間蘇頲齊浣等及逖典詔誥為代言最而逖尤精密張九齡視其草欲易一字卒不能也逼下之甚閩王昶立太祖遣散騎常侍盧損冊封昶閩王遣中書舍人劉乙勞損于館乙衣冠偉然騶僮甚盛他日損遇乙于塗布衣芒屩而已損使人誚之曰鳳閣舍人何逼下之甚也乙羞愧白諫臣秩惟大夫職司諫議朝夕論思出入討論明經漢韋玄成以明經拜諫議大夫獻頌漢王褒聖主得賢臣頌拜諫議大夫耳目之官獻納之地公忠謇諤獻替獻可替否司諫盡忠當休明之代居言用之司出諫官為郡漢出諫官為郡守蕭望之為平原太守望之雅意本朝上疏曰陛下憂人出諫官為郡甚大惠也所謂憂末而棄本朝無諍臣則不知過國無達士則不聞善諫議大夫六孔門下省左諫議大夫四人正四品下掌諫諭得失侍從贊相百官志中書省右諫議大夫四人同上諫者救其源褚遂良遷諫議大夫兼知起居事帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必嘗邪遂良曰雕琢害力農纂組傷女工奢侈之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源及其橫流則無復事矣帝咨美之真諫官李景伯景龍中為諫議大夫中宗宴侍臣及朝集使酒酣各命為回波詞或以諂言媚上或要丐謬寵至景伯獨為規針語以諷帝帝不悅中書令蕭至忠曰真諫官願竭狂瞽王圭太宗召為諫議大夫帝嘗曰正主御邪臣不可以致治正臣事邪主亦不可以致治唯君臣同德則海內安朕雖不德諸公數相諫正庶致天下於平圭乃進曰古者天子有諍臣七人諫不用則相繼以死今陛下開聖德收采芻言臣願竭狂瞽論晏朝事李渤進諫議大夫時敬宗宴朝紫宸入閣帝久不出群臣立屏外至頓仆渤見宰相曰昨論晏朝事今益晚是諫官不能移人主意渤請出閣侍罪會喚仗乃止退上疏曰今日入閣陛下不時見群臣皆布路跛倚夫跛倚形諸外則憂思結於內憂倦既積災釁必生論諍堅苦張仲方李程輔政引為諫議大夫帝時詔王播造競渡舟三十艘度用半歲運費仲方見延英論諍堅苦帝為減三之二數上章言得失韓洄拜諫議大夫與補闕李翰數上章言得失論鄭注郭承嘏為諫議大夫言政事得失文宗以注為太僕卿承嘏極論其非注頗懼本傳權近側目高適擢諫議大夫負氣敢言權近側目條上四事孔戣條上四事一多冗官二吏不奉法三百姓田不盡墾四山澤榷酤為州縣弊憲宗異其言史諫穆宗崔郾穆宗荒于游畋內酣蕩昕曙不能朝郾進曰十一聖之功德四海之大萬國之衆其治其亂繫于陛下自山以東百城地千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴畜積無有願陛下親政事以幸天下帝動容慰謝救宋申錫王質宋申錫之得罪質與諫官伏閣文宗開延英召見泣涕陳諫帝稍寤申錫得不死爭神策仗衛殿門馮定遷諫議大夫是歲訓注敗多誅公卿中外危惴及改元天子御前殿仇士良請以爭神策仗衛殿定力門罷之又請許左右史從宰相至延英記所言執政不悅群情灑然稱允費直言穆宗召為諫議大夫群情灑然稱允詞摧黨魁後以諫議大夫在太和末詞摧黨魁杜牧行高元裕制數共工之罪不蔽堯聰辨垣平之詐益彰漢德一品集授元誨諫議大夫制魯公藏罟莫如置華於左右漢后輯檻孰若列游於公卿同上登於文陛是用命爾登於文陛分左右而備針諫豫欲左右前後皆得正人朝夕交戒敬豫之闕分左右而備針諫思見大德骨鯁正直耆艾議論通古今喟然動上心所以增其秩而厚其祿也鄭朗大夫制大臣之任諫議大夫大臣之任故其秩峻其任重則君敬其言而用其道沉謇諤之地宜有老成之人秩不優崇則難用耆德其諫議大夫望依隋氏舊制升為從四品分為左右以備兩省四品之闕後與丞郎出入迭用以重其器贊皇一品制集興草茅處諫諍官陽城拜右諫議大夫既興草茅處諫諍官士以為且死職天下益憚之及命也諫官論事苛細紛紛帝厭苦而城浸聞得失且熟猶未肯言韓愈作爭臣論譏切之餘見酣醉門李景儉為諫議大夫性矜誕醉至中書真諫議蕭鈞纍遷諫議左武侯屬盧文操跳堞盜庫財高宗以職王幹當自盜罪死鈞曰囚罪誠死然恐天下聞謂陛下重貨輕法任喜怒殺人帝曰真諫議也詔原列下能盡規鄭覃纍諫議大夫穆宗不恤國事數荒昵吐蕃方疆覃與郾等廷對帝不懌顧宰相蕭俯曰是皆何人俯曰諫官也帝意解乃曰朕之闕下能盡規忠也因詔覃曰閣中殊不款款後有為我言者當見卿延英時閣中奏久廢至是士相慶白左史右史起居郎一曰左史起居舍人一曰右史記言記事晉起居注古者天子諸侯二史左史記言右史記事書法不隱董狐古之良史執簡南史氏執簡以往立司過之史禮必書君舉必書動則左史書之言則右史書之禮掌邦國四方之事達四方之志周內史官掌三皇五帝之書有善則記之為惇史史載筆士載言禮春秋之旨謹而月之謹而日之榖梁傳國史明乎得失之跡詩序絶書掌紬史記漢書司馬喜生談為太史公談生選為太史令掌紬史注云紬謂綴集之為一代之典王允將殺蔡雍馬日磾曰伯喈曠世逸才多識漢事當續成後史為一代之典允曰武帝不殺司馬遷使作謗書流于後世今不可使佞臣執筆在幼主左右無益聖德吾黨復蒙訕議記注周室既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章春秋序廣記備言左氏序曰身為國史躬覽載籍必廣記而備言之闕文孔子曰吾猶及史之闕文也有馬者借人乘之今亡矣夫傷今無其人勿籍王謂鞏朔曰非禮也勿籍王書詳略筆削撰史求貨晉陳壽字承祚作三國志丁儀丁廙有盛名於魏壽嘗謂其子曰與我千石米當為尊公作佳傳丁不與遂不為作傳起居七孔起居郎二人從六品上掌録天子起居法度天子御正殿則郎居左舍人居右有命俯陛以聽退而書之季冬以授史官百官志貞觀初起居郎一人執筆記録于前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸內閣則夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭同上起居舍人本記言之職唯編詔書不及他事開元初復詔修史官非供奉者皆隨仗而入位於起居郎舍人之次大和九年詔入閣曰起居郎舍人具紙筆立摛頭下復貞觀故事同上貞觀三年置起居郎廢舍人龍朔二年曰左史授元年亦如之同上帝索起居注魏謨為起居舍人帝索起居注謨奏古置左右史書得失以存鑒戒所為善無畏不書不善天下之人亦有以記之帝曰不然我既嘗觀之謨曰向者取觀史氏為失職陛下一見則後求所書必有諱屈善惡不實不可以為史且後代何信哉奏東封記韋述張說既領集賢院薦述為直學士遷起居舍人從封太山奏東封記有詔褒美獨直兩省權德輿遷起居舍人兼知制誥進中書舍人德輿獨直兩省數旬一舍捨乃上言左右掖垣承天子誥命奉行詳覆各有攸司舊制分曹十員以相防檢大抵事有所壅則吏得為非四方聞者或以朝廷為乏士要重之司不宜久廢帝曰非不知卿之勞但擇似卿者未得其人爾入仗內射禽呂向以起居舍人從帝東巡帝引頡利發及蕃夷酋長入仗內賜弓矢射禽向上言鴟梟不鳴未為瑞鳥豺虎雖伏弗曰仁獸況突厥安忍殘賊莫顧君父陛下震以武義來以文德故勢不得不廷使飛鏃于前同獲獸之樂或荊卿詭動何羅竊發逼嚴蹕冒清塵縱醢單于污穹廬何以塞責帝順納賜群臣十日一燕孫逖為起居舍人賜群臣十日一燕宰相蕭嵩會百官賦天成玄澤維南有山陽之華三月英英有蘭和風嘉木等詩八篇繼雅頌體使逖序所以然操筆赤墀下李讓夷纍遷諫議大夫開成初起居舍人李褒免文宗謂李石曰褚遂良以諫議大夫兼起居郎今諫議誰歟可言其人石以馮定孫簡蕭淑李讓夷對帝曰讓夷可也李固言請用崔球張次宗鄭覃曰球故與李宗閔善且記注操筆在赤墀下所書為後世法不可用黨人乃決用讓夷咨質所宜周墀遷起居舍人帝御紫宸與宰相語事已或召左右史咨質所宜墀最為天子欽矚貞觀初以給事中諫議大夫兼知起居注或知起居事百官志長壽中宰相姚璹建議仗下後宰相一人録軍國政要為時政紀月送史館然率推美讓善事非其實未幾亦罷而起居郎猶因制敕稍稍筆削以廣國史之闕同上良史君舉必書于休烈遷太常少卿兼修國史帝嘗謂曰良史君舉必書朕有過失顧卿何如對曰禹湯罪己其興也勃焉有德之君不忘規過大盜後史籍燔鈌于休烈于時經大盜後史籍燔鈌休烈奏國史開元實録等書二千八百餘篇藏興慶宮兵興焚蕩皆盡請下御史核史館所由求府縣有得者許上送官一書進官一資一篇絹十匹几數月止獲一二篇唯韋述以其家藏國史百三十篇上獻中興文物未全休烈獻五代詞論著舊章天子嘉之王羲之故帖天下爭獻褚遂良遷起居郎博涉文史工隸楷太宗嘗嘆曰虞世南死無與論書者魏徵白見遂良帝令侍書帝方博訪王羲之故帖天下爭獻然莫能質真僞遂良論所出無舛冒者善惡記褚遂良遷諫議大夫兼知起居事帝曰卿記起居大抵人君得觀之否對曰今之起居古左右史也善惡必記戒人主不為非法未聞天子自觀史也帝曰朕有不善卿必記邪對曰守道不如守官臣職載筆君舉必書劉洎曰使遂良不記天下之人亦記之矣帝曰朕行有三一監前代成敗以為元龜二進善人共成政道三遠群小不受讒言朕能守而勿失亦欲史氏不能書吾惡也職左史杜正倫帝嘗曰朕坐朝不敢多言必待有利於民乃出諸口正倫曰臣職左史陛下一言之失非止損百姓筆之書千載纍德帝悅史官權重宰相朱敬則遷正諫大夫兼修國史乃請高史官選以求名才侍中韋安石嘗閲其槁史嘆曰董狐何以加之世人不知史官權重宰相宰相但能制生死古之聖君賢臣所以畏懼者也國史記人君之善惡李元紘初左庶子吳兢為史官撰唐書及春秋未成以喪解後上書請畢其功詔許就集賢院成書張說致仕詔在家修史元紘因言國史記人君之善惡王政損益褒貶所繫前聖尤重今國大典分散不一且太宗別置史館禁中所以祕嚴之也請勒說以書就館參會撰録詔可言五不可劉子玄時宰相皆領監修子玄病長官多意尚不一乃奏記求罷去因為蕭至忠言五不可曰今人自為荀袁家自為政駿每記事載一言閣筆相視含毫不斷頭白可期汗青無日一不可今史臣惟自詢采二史不注起居百家不通行狀二不可今作者如林儻示褒貶曾未絶口而朝野咸知孫盛取嫉權門王劭見仇貴族常人之情不能無畏三不可今史官注記類稟監修或須直辭或當隱惡十羊九牧其令難行四不可令監者不肯指授修者又不遵奉務相推避以延歲月五不可著史通始子玄修武后實録有所改正而武三思等不聽自以為見用於時而志不遂乃著史通內外四十九篇譏評今古徐堅讀之嘆曰為史者宜置此坐右也史有三長劉子玄領國史且三十年官雖徒職如舊鄭惟忠嘗問自古文士多史才少何邪對曰史有三長才學識世罕兼之故史者少夫有學無才猶愚賈操金不能殖貨有才無學猶巧匠無楩柟斧斤弗能成室善惡必書使驕君賊臣知懼此為無可加者時以為篤論詔就集賢吳兢始兢在長安景龍間任史事時武三思張易之監領阿貴朋佞釀澤浮辭事多不實兢不得志私撰唐書唐春秋未就至是丐硯筆楮冀得成書詔兢集賢院論次時張說罷相在家修史大臣奏國史不容在外詔兢等赴館撰録進封長垣縣男久之坐書事不當貶荊州司馬以史草自隨今董狐兢敘事簡核號良史晚節稍疏誤時人病其太簡初與劉子玄撰定武后實録敘張昌宗引張說誣證魏元忠事頗言說已然可賴宋璟等激勵苦切故轉禍為忠不然皇嗣且殆後說為相讀之心不喜知兢所為即從容謬謂曰劉生書魏齊公事不少假借奈何兢曰子玄已亡不可受誣地下兢實書之其草故在聞者嘆其直說屢以情蘄改辭曰徇公之情何名實録卒不改世為今董狐云譙周陳壽之流韋述先是詔修六典徐堅立意歲餘嘆曰吾更修七書而六典歷年未有所適及蕭嵩引述撰定述始摹周六官領其屬事歸於職規制遂定初令狐德棻吳兢等撰武德以來國史皆不能成述因二家參以後事遂分紀傳又為例篇嵩欲蚤就復奏起居舍人賈登著作佐郎李鋭助述紬績逮成文約事詳蕭穎士以為譙周陳壽之流宰相咨訪蔣乂在朝廷久居史職二十年每有大政事議論宰相未能決必咨訪之分年撰次蔣偕初柳芳作唐曆大曆以後闕而不録宣宗詔崔龜從韋澳李荀張彥遠及偕等分年撰次盡元和以續云三世踵修國史蔣偕三世踵修國史世稱良筆咸云蔣氏日曆天下多藏焉倣編年法為唐曆柳芳始謫時高力士亦貶巫州因從力士質開元天寶及禁中事具識本末時國史已送官不可追刊乃推衍義類倣編年法為唐曆四十篇頗有異聞然不立褒貶義利為諸儒譏訕世史官冕且世史官父子並居集賢院唐興史官秉筆衆矣唐興史官秉筆衆矣雖論著之人隨世疏舛殘餘本末顛倒故聖主賢臣叛人佞子善惡汩汩有所未盡可為永愾者矣舊史之文猥釀不綱淺則入俚簡則及漏寧當時儒者有所諱而不得騁邪或因淺仍俗不足於文也亦有恃於後取當而行遠邪何知幾以來工訶古人而拙於用己歟已上贊史冊褒勸所在路隋監修國史初韓愈撰順宗實録書禁中事為切有宦官不喜訾其非實帝詔隋刊正隋建言衛尉卿周居巢等皆上言改修非是夫史冊者褒勸所在匹夫善惡尚不可誣況人君乎議者至引雋不疑第五倫為比以蔽聰明臣宗閔臣僧孺謂史官李漢蔣係皆愈之壻不可參撰俾臣得下筆臣謂不然且愈所書已非自出元和以來相循逮今雖漢等以嫌無害公誼請條示甚謬誤者付史官刊定有詔擲貞元永貞間數事為失實餘不復改漢等亦不罷列傳六十七指事載功李翱元和初為國子博士史館修撰常謂史官紀事不得實乃建言大抵人之行非大善大惡暴於世者皆訪於人人不周知故取行狀諡牒然其為狀者皆故吏門生苟言虛美溺于文而忘其理臣請指事載功則賢不肖易見如言魏徵但記其諫爭語足以為直言段秀實但記倒用司農印追逆兵笏擊朱泚足以為忠烈不者願敕考功太常史館勿受如此可以傳信後世矣詔可人君不改史周墀遷中書侍郎建言故宰相德裕重定元和實録竄寄他事以廣父功凡人君尚不改史取必信也遂削新書請宰相人自為記裴休進同中書門下平章事即奏言宰相論政上前知印者次為時政記所論非一詳已辭略他議事有所缺史氏莫得詳請宰相人自為記合付史官詔可請命近臣録禁中事付史館王峻太祖以峻監修國史意其所書不實取日曆讀之史官以禁中事非外所知懼以漏落得罪峻後李彀監修因請命近臣録禁中事付史館乃命樞密直學士就樞密院録送史館自此始五代史文端武淑遷起居舍人崔沔集序論時政紀長壽二年宰臣姚璹以為自今後所論軍國政要宰臣一人撰録臣等商量何後每坐日聖言如有慮及生靈事關興替可昭示百代貽謀後孫者及宰臣獻替謀猷有益風教並請依國朝故事知印宰相撰録連署名印至歲末送史官贊皇一品制集狀修史體例近見實録多載密疏言不彰于朝聽事不顯于當時得自其家未足為信向後所載群臣奏議其可否得失須朝廷共知者方可紀述密疏並請不載如此則書必可法人皆首公愛憎之志不行褒貶之言必信同上從宰相至延英馮定請許左右史從宰相至延英記所言執政不悅省內舊制起居院在中書省內記事之官一時清選白居易蕭俯起居舍人制補闕八孔左補闕六人從七品掌供奉諷諫大事廷議小則上封事百官志右補闕六人同上參裨闕失魏謨為右補闕先是帝曰太宗得證參裨闕失朕今得謨又能極諫朕不敢仰希正觀庶幾處無過之地教坊有工善為新聲者詔授揚州司馬議者謂郎官刺史迭處不可授賤工帝意右之宰相諭諫官勿復言謨獨固諫不可工降潤州司馬有才鑒張九齡俄遷左補闕九齡有才鑒吏部試拔卒與舉者常與右拾遺趙冬曦考次號稱詳平改司勳員外郎泣涕諍申錫蔣係轉右補闕宋申錫被誣文宗怒甚係與左常侍崔玄亮泣涕苦諍申錫得不死中外推其靖密韋處厚擢左補闕禮部尚書李絳請間言古帝王以納諫為聖拒諫為昏今不聞進規納忠何以知天下事帝曰韋處厚路隋數上疏其言忠切顧卿未知爾由是中外推其靖密方士擅乘驛馬高元裕以右補闕召道商州會方士趙歸真擅乘驛馬元裕詆曰天子置驛爾敢疾驅邪命左右奪之還以聞人皆危之敬宗視朝不時稍稍決事禁中宦豎恣放大臣不得進見元裕諫曰今西頭勢乃重南衙樞密之權過宰相帝頗寤而不能有所檢制人皆危之俄換侍御史內供奉士始相賀有將帥器樊澤擢左補闕澤有武力善兵議法者謂有將帥器嘗召對延英德宗嘆其論兵與我意合諫近城為陵姚南仲纍右補闕獨狐皇后崩代宗悼痛詔近城為陵以朝夕臨望南仲上疏曰臣聞人臣宅於家國長安乃祖宗所宅其可建陵其側乎且王者必據高明燭幽隱先皇所以因龍首而建望春也今起陵目前心一感傷纍日不能平辨鍾山壙中銘鄭欽說歷右補闕通曆術初梁大常任昉大同四年七月於鍾山壙中得銘曰龜言土蓍言水甸服黃鍾啓靈址瘞在三上庚墮遇十中已六千三百浹辰交二九重三四百圮當時莫能辨者昉五世孫升之隱居商洛寫以授欽說欽說出使得之於長樂驛至數水三十里而悟曰卜宅者搜葬之歲月而先識墓圮日辰辨宋申錫韋溫遷右補闕宰相宋申錫被誣罪不測溫倡曰丞相操履有初不宜反乃姦人陷之吾等豈避雷霆使上蒙悔咎邪率同舍伏閣切爭由是益知名諫上尊號韋溫群臣請上尊號溫諫曰今河南水江淮旱歉京師雪積五尺老稚顛仆此非崇飾虛名時帝順納乃謝群臣直躬正辭擢左補闕崔沔請討懷光裴佶帝幸梁奔見行在授補闕李懷光以河中叛佶建議請討帝深器之挺議鯁固獨孤郁進右補闕吐突承璀討王承宗郁執不可挺議鯁固號稱職孜孜獻納獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際裴垍廷語之曰獨狐與李二補闕孜孜獻納令之遷轉可謂酬勞無愧矣嚴補闕官業或異於斯進擬不無疑緩休復悚恧而退舊史彌縫其不至元稹楊汝士授右補闕初朕聞袞職有闕仲山甫補之蓋所以節宣天子之嗜欲而彌縫其不至也我國家設司陳署以神明其耳目凡在茲選實難其人司聰之榮同上拾遺九孔左拾遺六人掌供奉諷諫右拾遺六人百官志多所救補宗室漢敬宗侈宮室舶賈獻沉香亭材帝受之漢諫曰以沉香為亭何異瑤臺瓊室乎是時王政謬僻漢言切多所救補諫取宗室女內後宮魏謨為右拾遺李孝本誅死其二女沒入宮謨上言陛下即位不悅聲色于今十年未始採擇數月以來稍意聲伎教坊閲選百十未已莊宅收市亹亹有聞今又取李本女內之後官宗姓不育寵幸為纍傷治道之本速陳譏之嫌帝即出孝本女上書譏切王求禮武后時為左拾遺右方營明堂雕飾以為鐵鸑金龍舟雘珠玉乃商瓊臺夏瑤室之比非古所謂茅茨采椽者自軒轅以來服牛乘馬今輦以人負則人代畜上書譏切不報謹視盜賊陸希聲為右拾遺時儉腐秉權歲數歉梁宋尤甚希聲見州縣刓弊上言當謹視盜賊明年王仙芝友株蔓數十州遂不能制賜中上考韓朝宗初歷左拾遺睿宗詔作乞寒胡戲諫曰道路籍籍咸言皇太子微服觀之且胸奴在邸刺客卒發大憂不測白龍魚服深可畏也況天象變見疫癘相仍厭兵助陰是謂無益帝稱善與賜中上考建言免江淮兩賦白居易召入翰林為學士遷左拾遺四年天子以旱甚下詔有所蠲貸振除災沴居易見詔節未詳即建言乞盡免江淮兩賦以救流瘠且多出官人憲宗頗採納又白居易歲滿當遷聽自擇官有專對材呂溫擢為左拾遺犬戎謂和上問能使絶域者君以奇表有專對材膺選遣公李勃以右拾遺召不拜洛陽令韓愈遺書曰有詔河南敦喻遣公朝廷士引頸東望若景星鳳鳥始見爭先睹之為怏渤心善其言始出家東都諫作興泰宮盧藏用授左拾遺武后作興泰宮於萬安山上疏諫曰陛下離宮別觀固多矣又窮人力以事土木恐議者以陛下為不愛人而奉己也誠意忠到嚴挺之姚崇引為右拾遺睿宗好音律每聽忘倦先天二年正月望夜胡人婆陀請燃百千燈因弛門禁又追賜元年酺帝御延喜安福門縱觀晝夜不息閲月不止挺之上疏陳五不可誠意忠到帝納焉召見延英乃命蔣乂擢右拾遺史館修撰德宗重其職先召見延英乃命之自常侍諫議補闕拾遺四十員沈既濟召拜左拾遺建中二年詔中書門下兩省分置待詔官三十以見官故官若同正試攝九品以上者視品給俸既濟諫曰今日之治患在官煩不患寡患不問不患無人自常侍諫議補闕拾遺四十員日止兩人待對缺員二十一員未補若謂見官不足與議則當更選其人若廣聰明以收淹滯先補其闕何事官外置官願竄吾名雷霆之下歸登為右拾遺裴元齡得幸德宗欲遂以相右補闕熊執易疏論之以示登登動容曰願竄吾名雷霆之下君難獨處故同列有所諫正取聯書無所回諱聲振一時柏耆王承宗以常山叛朝廷厭兵耆杖策詣淮西行營謁裴度且言願得天子一節馳入鎮可掉舌下之度為言乃以左拾遺往既至以大誼動承宗至泣下乃請獻二州以二子入質真擢左拾遺由是聲振一時上疏陳政獨孤及以左拾遺召既至上疏陳政曰陛下屢發德音使左右侍臣得直言極諫然頃者陛下惟容其直而不録其言所上封皆寢不報有容下之名無聽諫之實遂使諫者稍稍自鉗口飽食相招為祿仕此忠鯁之人所以竊嘆而臣亦恥之帝不聽言無回忌王徽召授右拾遺書二十餘上言無回忌公議浩然歸重規諷校獵呂向擢左拾遺天子數校獵渭州向獻詩規諷張說命其子拜孫逖逖幼有文舉手筆俊拔哲人奇士隱淪屠鈞及文藻宏麗等科又舉賢良擢左拾遺張說命子均垍往拜之李雍負才自陳州入許褒其文示逖立階下大言李雍召拜左拾遺御史中丞宋璟劾張昌宗等反狀武后不應雍立階下大言曰璟所陳社稷大計陛下當聽后色解即可璟奏雍出或責曰子位卑一忤旨禍不測雍曰不如是名亦不傳始自草茅竇群德宗擢為左拾遺時張薦持節使吐蕃乃薦群侍御史為判官入見帝曰陛下即位二十年始自草茅擢臣為拾遺何其難也以二十年難進之臣為和蕃判官一何易帝壯其言不遣諫晏朝劉栖楚擢右拾遺敬宗立視朝常晏數游畋失德栖楚諫曰陛下以少主踐阼未幾惡德流布恐福祚之不長也臣以諫為官使陛下負天下譏請碎首以謝遂額叩龍墀血被面李逢吉傳詔無叩頭待詔旨栖楚捧首立帝動容揚袂使去栖楚曰不聽臣言臣請死于此有詔慰諭乃出居職不樂陳子昂擢右拾遺多病居職不樂諫除授不由中書薛廷老寶曆初為右拾遺與舒元褒李漢入閣奏事曰臣伏見近日除拜往往不由中書進擬伏恐綱紀漸壞姦邪恣行敬宗厲聲曰更諫何事元褒曰近日宮中修造太多上色變曰何處修造元褒不能對廷老曰臣等職是諫官凡有所聞即合論奏舊史柳篋子柳璨擢左拾遺公卿記為箋奏時譽日洽以其博奧目為柳篋子舊史斗量天授三年人無賢愚咸加擢用著于廷誦曰補闕連車載拾遺平斗量把持侍御史腕脫校書郎極言無隱元稹制左拾遺韋瓘嘗旅進廷爭極言無隱陳杜詩人屯謇如陳子昂杜甫各授一拾遺而屯剝至死白居易與元稹書
