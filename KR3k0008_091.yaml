body:
  text: 卷第九十一白竊弄凶器毒痛生民毒流于下腥聞於上稱亂稱舉也俶擾俶始也擾亂也剝亂天下不式王命以亂天常不臣有無君之心亂心侵敗王略社稷之患不令之臣天下之所惡也反易天明不臣也不帥天常干國之紀顛越不恭劓殄滅之無遺育無育元兇有臣不順神之所惡脅君亂國壞法亂紀臣而不臣阻兵恃險巨猾元兇惠迪吉從逆凶渠魁賊帥也戎毒戎大元惡大憝憝亦惡也姦臣竊命惎間王室惎毒也獨亂文子曰世治則愚者不能獨亂吠堯之犬史記夫跖之犬可使吠堯非不仁犬吠非其主也苞藏禍心天吏逸德列于猛火自底不類類善也穢惡彰聞虞有三苗夏有觀扈商有姺邳周有徐奄皆諸侯之亂者賊臣聞釁有無君之心人反德為亂孔興元軍亂溫造興元軍亂殺李絳眾謂造可夷共亂文宗亦以為能乃授檢校右散騎常侍山南西道節度使五州獠叛馮盎隋仁壽初為宋康令朝成等三州獠叛盎馳至京師請討之文帝詔左僕射楊素與論賊形勢素奇之曰不意蠻夷中乃生是人中土不寧狄仁傑疏曰邊鄙暫警不足憂中土不寧可為慮一軍思亂王虔休李抱真懼都虞侯抱真卒元仲經等謀樹其子緘一軍思亂虔休正色語眾曰軍王軍州王士也帥亡當稟天子何有妄謀眾服其言得不亂李愿長慶中徙宣武用婚家竇緩典帳中兵驕驁怠沓牙將李臣則等因眾不忍夜斬緩首愿聞變不及甲與左右數入縋而逸奪野人乘馳以免其家死於兵三子匿而免兵既亂因大掠推李朅主後務封建論秦有天下裂都會而為郡邑不數載而天下大壞時則有叛人而無叛吏漢矯秦之枉立宗子封功臣然而郡邑居半時則有叛國而無叛郡唐興制州邑立守宰然猶桀猾時起虐害方域時則有叛將而無叛州生於放肆李絳帝問玄宗開元時致治天寶則亂何一君而相反邪絳曰治生於憂危亂生於放肆巴獠丐降于邵為道州刺史徙巴州會歲饑部獠亂薄城下劭勵兵拒戰耳遣使諭曉巴獠丐降邵儒服出賊見皆拜即引去天下崩騷李巨川乾符中舉進士方天下崩騷乃去京師生民厄會逆臣贊曰生民厄會必假手于人者謀去衣冠有望者陸扆徙遷洛柳璨始附朱全忠謀去衣冠有望者貶扆濮州司戶參軍殺之生民之命急於倒掛五代馮道傳當是時天下大亂戎夷交侵生民之命急於倒掛華風不競否運所鍾五代周世宗賜南唐李景書晝伏夜聚廣王全昱傳衡王友能為宋滑二州留後陳州剌史所至為不法而奸人多依倚之陳俗好潘祠左道其學佛者自立一法號曰上乘晝伏夜聚男女雜亂妖人毋乙董乙聚眾稱天子建置官屬友能初縱之乙等攻劫州縣末帝發兵擊滅五代史難阨之會李嶠外阻內訌郭子儀遭時屯棘馬璘猰㺄擇肉於馳道豺狼整居於禁闈猰㺄擇肉於馳道贄收河中後請罷兵狀國朝均於絕綖張廷珪請勤政疏社稷有危於綴旒國朝殆均於絕綖九廟鞠陷於匪人六師出次於郊邑陸宣公奏議變生都輦盜據宮闈九廟鞠陷於匪人六師出次於郊邑顧瞻懷二叛換黨姦同上裂土假王者四滔天僣帝者二又有顧瞻懷二叛換黨姦其類實繁滔天之巨滑同上儻有問鼎之雄圖滔天之巨滑幸災乘間何所不為豎子弄兵劉蛻獻南海崔尚書書雖有豎子弄兵曾無筋穿皮蠹之患尋已誅伏殺人焚廬文粹李庾東都賦殺人如刈焚廬若薙掃臺榭之灰收京野之骨徵郡國之版在驗地官之籍列祲氛其氣豺武其心于公異破朱泚露布包藏逆謀參會凶德祲氛其氣豺武其心十月即為虀粉期杜甫青絲殿前兵馬破汝時十月即為虀粉期未如面縛歸金闕萬一皇恩下玉墀詔令不出城門國制撓弱賈生慟哭時也杜讓能諫昭宗言三宰嘯凶牝奪晨林甫將蕃黃屋奔唐史贊木將壞蟲實生之國將亡妖實產之故三宰嘯凶牝奪晨林甫將蕃黃屋奔鬼質敗謀興元聖崔柳倒持李宗覆其出穰穰隊以萬數韓愈聖德詩萬牛臠肉萬甕行酒以錦纏股以紅帕首有恇其兇有餌其誘其出穰穰隊以萬數逞豺聲以欺天恣狼心而犯上柳淄青狀惡稔禍盈鬼怨神怒同上裴相狀惡稔禍盈鬼怨神怒恣行悖慢敢肆欺誣天兵四臨所至皆捷數有關中亂何曾劍外清春遠杜詩再有朝廷亂難知消息真傷春同上奪馬悲公主登車泣貴嬪傷春反氣凌行在贈李秘書同上妖星下直廬同上鳳闕悲巢鵩鵷行亂野麇元稹詩遭鯨鯢之蕩汩杜甫太廟賦遭鯨鯢之蕩汩荒歲月而沸渭神器臬兀而小人呴喻曆紀大破瘡痍未蘇太清宮賦玄豈正色白亦不分祭房相文玄豈正色白亦不分培塿滿崑崙無群乾坤慘慘虎狼紛紛城邑自守鼙鼓相聞同上惡木生槎槁之英猰狗吠豢牢之主于公異破朱泚露布勢同飆馳眾若螽集同上河關雲擾孟方丘傳時天子在西河關雲擾君暗政亂兵驕民困周臣王朴獻平邊策曰唐失道而失吳蜀晉失道而失幽並觀所以失之由知所以平之術當失之時君暗政亂兵驕民困近者姦於內遠者叛於外小不制而至於僣大不制而至于濫天下離心人不用命吳蜀乘其亂而竊其號幽並乘其間而據其地人有覬心亂由是生蔣伸言比爵賞稍易人且偷帝愕然曰偷則亂矣伸曰否非遽亂但人有覬心亂由是生帝嗟歎再三聚為起穢之物腥彼宮闈散作旬始之妖孛于躔次于異公嘯凶命醜阻兵安忍長戈指闕流矢射天穿高墉以鼠牙毒王師以蠆尾罪逾羿浞惡貫梟獍上九門回望塵分土六龍夜馭兵衛疲縣官無人具軍類行宮徹屋屠雲螭注時御類乏備上命徹行宮太宰御馬享士津陽門詩白保聚荐食傳曰吳為封豕長蛇以荐食上國罔不寇賊書鴟義姦宄奪攘矯虔鼠竊狗偷蜂蠆之毒俶擾狡猾艱難其身蝥賊完聚黃巾赤眉綠林並賊名在外為姦雚蒲鄭國多盜聚人於雚蒲之澤子太叔興兵以攻之傳人多相掠行險徼幸草竊於草野中竊盜也書曰殷人好草竊姦宄寇攘人自得罪寇攘姦宄殺越人于貨狃于姦宄致寇探丸尹賞子心守長安令閭里少年殺吏受財執仇相與探丸為彈得赤丸者斫武吏黑者斫文吏白者主治喪城中薄暮剽劫賞治獄名虎穴數百人枕藉而死拔劍抗賊朱暉與家屬遇盜時年十三拔劍向前曰財物可得諸母不可得今日朱暉死無避賊壯其志遂捨之不言盜掠姜肱兄弟為盜掠奪衣物郡中怪問終不言盜賊感悔就肱舍叩頭乞還所掠肱不受勞以酒食而遣之賊還物戴封字平仲遇盜悉被掠奪唯餘七縑賊不知處追以與之賊曰賢人也遂盡還之肆掠劇賊翦伐將出凶於梟獍宜致伐於鯨鯢無縱滋蔓之草以奔漏網之鯨詰誅暴慢以遏亂略無使滋蔓蔓難圖也多行不義必自斃天人致誅除惡務本既殄元兇乃封京觀商罪貫盈天命誅之掃攙搶乘王怒行天伐啟滅有扈而夏功昭成克商奄而周德著仗黃鉞之威取彼凶殘殲厥渠魁誅戮既不化於皇風宜致誅於赤族既苞無君之心難赦不蔽之罪咎既自貽罪亦盈貫當正無赦之刑以懲莫大之罪棄屍京觀懸首槁街既殄元兇乃樹京觀敢逃刑命肆諸市朝于國之紀其有顛越不恭則殄滅之無遺育無俾易種于茲新邑易種謂生種類也禮曰臣弒君子弒父凡在官者殺無赦殺其人壞其室汙其宮而瀦焉有常無赦以干先王之誅以災于厥身刑亂國用重也脅從殲厥渠魁從罔治舊染污俗咸與惟新書亂征羲和之辭蚩尤作亂延于平人言延及平善之人改行率德自新比屋可誅庶自及於迷塗難加誅於比屋與亂同道彊者脅弱眾者暴寡宜絕惡於本根難聽辭於枝葉要君子曰臧文仲以防求為後於魯雖曰不要君吾不信也以防邑要君要君者無上君子謂宋華督有無君之心子犯投壁於河文公曰所不與舅氏同心者有如白水子曰事君三違而不出境則利祿人雖曰不要君吾不信也劫質執子求貨後漢喬玄字公祖遷太尉以疾罷就醫里舍玄小子十歲獨遊門次有三人持杖劫之入舍登樓求貨玄與司隸圍守恐殺其子未欲迫之玄瞑目呼曰姦人無狀豈以一子之命以縱國賊玄子亦死玄乃詣闕請劫質者不得贖以財寶以開長姦之路自此遂絕執母妻子後漢李忠進圍鉅鹿王郎遣將攻信都信都大姓馬寵開城內郎眾執太守及忠母妻子而令親屬招忠時寵弟從為校尉忠殺之諸將曰家屬在人手殺其弟何也忠曰縱賊不誅二心也世祖聞而美之家屬亦全又邳彤字偉君從征伐王郎所置信都守捕彤父弟及妻子使為手書報彤曰降者封爵不降者滅族彤泣報曰事君不得顧家遂不去之又趙苞字威豪為遼西守遣吏迎母及妻子臨到為鮮卑寇鈔載之以擊群賊出母示苞苞涕泣母謂曰昔為母子今為君臣不得顧而私恩毀而忠節母又曰昔王陵云云爾其以勉苞即飯賊母妻皆死苞殯葬靈帝策弟封侯既而曰食祿避難非忠殺母全義非孝將何面目立天下遂歐血而死又孔奮字君魯為武都丞賊魏茂等攻郡守奮追急乃執奮妻子奮五十唯有工字終不顧遂擒賊妻子亦死世祖褒美之執大將魏夏侯惇元讓與呂布將偽降因共執惇責以寶貨惇將韓浩乃勒兵營門遂詣惇所叱持劫者曰汝執劫大將復望生耶吾受詔討汝寧以一將軍縱爾乎因泣謂惇曰奈國法何但召兵擊持質者持質者惶怖斬之惇亦免太祖因著令有持質者皆當並擊勿顧執宿衛臣趙廣漢為京兆尹富人蘇回為郎二人劫之廣漢將吏到家使人曉賊曰京兆尹趙君謝兩卿無得殺質此宿衛臣也二人驚愕出戶叩頭廣漢使獄吏厚遇之孔盜賊衰崔安潛領西川節度吏倚高駢為姦利者皆誅之數更除繆政於是盜賊衰剌用事大臣裴度王承宗李師道謀緩蔡兵乃伏盜京師剌用事大臣已害宰相武元衡又擊度刃三進斷靴刜背裂中單又傷首度冒氈得不死共道駭伏獨騶王義持賊大呼賊斷義手度墮溝賊意已死因亡去椎埋掠寇竇建德邑人孫安祖盜羊為縣令捕劾笞辱安祖刺殺令亡抵建德陰舍之時山東飢群盜起乃謀曰丈夫不死當建功于世渠為亡命虜乎承間竊出椎埋掠寇足以自資因得聚豪傑且觀時變以就大計安祖然之大連州縣小阻山澤劉文靜曰上南幸兵填河洛盜賊蜉結大連州縣小阻山澤以萬數須真主取而用之城闔外即戰場裴寂曰秦王將舉兵狀因言今盜遍天下城闔外即戰場盜劫其家竇建德盜夜劫其家建德立戶下盜入擊三人死餘不敢進請其尸建德曰可投繩系取之盜投繩建德乃自縻使盜曳出躍起捉刀又復殺數人馮盎番禺新興名賊高法澄洗寶徹等授林士弘節度殺官吏盎率兵破之寶徹兄子曰智臣復聚兵拒戰盎進討兵始合輒釋胄大呼曰若等識我耶眾委戈袒而拜賊遂潰捕盜將徐商徙節山南東道地多山棚為剽賊商取材卒為捕盜將別為屯營寇所發輒跡捕捕必得遂為精兵會兵討捕安潛歷忠武節度使王仙芝寇河南安潛首請會兵討捕號令精明賊畏之不犯境手打宗室巨楊國忠謂巨曰比來人多口打賊君不爾乎巨曰誰為相公手打賊者乎盜賊出境王播為京兆尹時禁屯列畿內者出入屬鞬佩劍姦人冒之以剽劫夕勳戚家馳獵近郊播請一切苛止盜賊不能隱皆走出境士無鬥志屈突通隋政益亂盜賊多士無鬥志諸將多覆通每向必持重雖不大克亦不敗負所過剽略崔鉉龐動叛自桂管北還所過剽略鉉聞大募兵屯江湘邀賊歸路賊懼更逾嶺自淮而北朝廷壯其志群盜感愧呂元膺釋囚歸之而戒還期吏白不可荅曰吾以信待人人豈違我如期而至田是群盜感愧悉避境去闔境無盜賊呂諲為荊州治尚威信故軍士用命闔境無盜賊以仁愛賊無敢害裴謹為淮安司戶楊琳等亂劫吏多死惟謹以仁愛故賊約其屬無敢害撤私邑山房千四百舍李德裕為折西觀察使撤私邑山房千四百舍寇無所廋蔽毀山房三千餘所王彥威為忠武節度使毀山房三千餘所盜無所容自記平賊一篇裴休父肅貞元時為浙東觀察使劇賊粟鍠誘山越為亂陷州縣肅引州兵破擒之自記平賊一篇上之德宗嘉美疾雷將鄭畋為鳳隴節度募銳兵五百號疾雷將境中盜不敢發發輒得會巢陷東都俄而賊使至諸將皆欲附賊畋開諭不可伏兵高雞泊劫王鐸徙義昌節度使鐸世貴出入裘馬鮮明妾侍且眾過魏樂彥楨子從訓心利之李山甫者數舉進士被黜依魏幕府內樂禍且怨中朝大臣導從訓以詭謀使伏兵高雞泊劫之鐸及家屬吏佐三百餘人皆遇害朝廷微弱不能治其冤天下痛之質家族誓兵討賊韋昭度李昌符亂興倉卒昭度質家族於禁軍誓兵討賊士感動乃平昌符盜射李石三年正月石將朝騎至親仁里狙盜發射石傷馬逸盜邀斫之坊門絕馬尾乃得脫遍南山五穀李袍玉廣德中時吐蕃入寇帝次陝群盜遍南山五谷問東拒虢西抵岐椎剽不勝計詔太子賓客薛景仙為南山五溪谷防禦使引兵招捕又不克更詔抱玉討賊抱玉盡得賊株柢蹊隧分兵守諸谷使牙將李崇容精騎四百自桃林號虢川襲之賊帥高王脫身走城固山南西道張獻誠擒以獻悉索支黨斬之不閱旬五谷平賊避其鋒崔光遠為京兆尹會賊黨剽涇陽休祠房椎牛呼飲光遠刺知之率兵夜趨其所使百騎彀滿彀其前命驍士合譟賊醉不能師斬其徒二千得馬千數俘一酋長以獻自是賊常避其鋒數犯州縣元結時議曰乃今河北姦逆不盡山林江湖亡命尚多盜賊數犯州縣百姓轉徙踵繼不絕將士臨敵而奔賢人君子遁逃不出捕支黨皆盡李栖筠為常州剌史宿賊張度保陽羨西川累年吏討不克至是發卒捕斬支黨皆盡里無吠狗支黨槃結李芃永泰初宣饒劇賊方清陳莊西絕江劫商旅為亂支黨槃結芃請以秋浦置州扼衿要使不得合從李勉是其計奏以宣之秋浦青陽饒之至德置池州即詔芃行州事夾河為藪劉晏以為東垣底柱澠池北河之間六百里戍邏久絕奪攘姦宄夾河為藪依山為剽劉潼歷京兆尹山南有劇賊依山為剽宣宗怒欲討之宰相崔鉉曰此陛下赤子迫於飢寒弄兵山谷間不足討請遣使逾釋之詔潼馳往蝟奮關播陳少游鎮浙東淮南辟為判官李靈耀叛少游屯淮上所在盜賊蝟奮播儲貲力給軍興驚剽德宗初湖南峒賊王國良驚剽州縣不可制詔播宣輯播且言奉詔平賊有如不受命臣謂發州兵翦定之帝曰善克殄大盜李晟帝至自梁晟以戎服見三橋帝駐馬勞之晟再拜頓首賀克殄大盜廟朝安復為盜剽脅孔緯蕭遘雅不喜及帝避朱玫次陳倉惟黃門衛士數百扈乘輿詔拜緯御史大夫令趣百官至行在時群臣露穎盩厔為盜剽脅衣囊略盡緯謁宰相欲有所論遘與裴澈怨田令孜不欲行辭不見盜賊顯行崔郾改岳鄂等州觀察使自蔡人叛岳鄂常苦兵盜賊顯行郾修治鎧仗駃追窮躡上下千里歲中悉捕平送租賦為盜所奪張萬福攝舒廬壽團練使州送租賦請都至穎為盜所奪萬福領輕兵尾襲賊倉卒不得戰悉擒之盡得所亡並先掠人妻女財畜萬計螘結劉知謙客封州黃巢自嶺表北還潮湘間群盜螘結知謙因據封州有詔即授剌史誅宿盜顏泉明拜郫令誅宿盜人情翕然道無寇跡田仁會遷勝州都督境有夙賊依山剽行人仁會發騎捕格夷之城門夜開道無寇跡劉蕡策宮亂人貧盜賊並起土崩之勢憂在旦夕即不幸因之以疾癘繼之以凶荒陳勝吳廣不獨起於秦赤眉黃巾不獨起於漢以戲禦劇賊安祿山反蕭穎士往見河南採訪使郭納言禦守計納忽不用嘆曰肉食者以兒戲禦劇賊難矣哉鴟峙二京李翰傳張巡功狀曰張巡忠誼奮發率烏合守雍丘潰賊心腹乃魯炅棄甲宛葉哥舒翰敗績潼關賊遂盜神器鴟峙二京遺貲布路黃巢賊破陽武圍鄭州不克螘聚鄧汝間關以東州縣大抵皆畏賊嬰城守故賊放兵四略殘郢復二州所過焚剽生人幾盡官軍急追則遺貲布路士爭取之率逗撓不前殺人如藝儳路圍福州觀察使韋岫戰不勝棄城遁賊入之焚室廬殺人如藝城府窮為荊萊秦宗權進破東都圍陝州使秦彥寇淮淝秦賢略江南宗衡亂岳鄂賊渠率剽慘所至屠老懦焚屋廬城府窮為荊萊自關中薄青齊南繚荊郢北亙衛滑皆麇駭雉伏至千里無舍煙憑培塿以自固合莝脆以為強柳宗元討黃賊狀憑培塿以自固合莝脆以為強劫脅使臣侵暴列郡雖狐鼠之陋無足示威而蜂蠆之毒猶能害物必資翦伐方致和平舉宗肆暴恃狡兔之穴跧伏偷安憑孽狐之丘縛壯殺老啼且號柳宗元寄韋珩到官數宿賊滿野縛壯殺老啼月號盜賊縱橫杜甫寄柏學士林居盜賊縱橫甚密邇形神寂寞甘辛苦大盜割鴻溝如風掃秋葉李白徒堅黨合事鉅寇牢或據深山或閉官道杜牧賀擒賊表唐亡諸盜皆生於大中之朝太宗之遺德餘澤去民也久矣而賢臣斥死庸懦在位厚賦深刑天下愁苦方是時也天將去唐諸盜並出唐逆臣贊逆賊一奮中原刲裂吐蕃贊玄宗有逸德而拓地太大務遠功忽近虞逆賊一奮中原刲裂訖二百年不得復完以至陵夷高雞泊廣袤數里竇建德兵伐遼補隊長會邑人孫安祖乃謀曰我聞高雞泊廣袤數里葭薍阻奧可以違難承間竊出推埋掠奪足以自資為招亡兵使安祖率之入高雞為盜後自號漫天王築壇於河間樂壽自立為長樂王更號夏王豈伊山川間迴首盜賊繁杜詩漫山賊營壘迴首得無憂同上綠林寧小患同上淘物黃巢陷京師甫數日因大掠縛箠居人索財號淘物富家皆跣而驅擊殺八萬人血流於路謂之洗城黃巢復入京師怒民迎王師縱擊殺八萬人血流於路可涉也謂之洗城驂衢殺人李揆京師多盜至驂衢殺人尸溝中吏褫氣李輔國方橫請選羽林騎五百備徼捕揆曰本朝置南北衙文武區別更相檢伺今以羽林代金吾忽有非常何以制之輔國議格如蝟毛而奮王世充等贊煬帝失德天醜其為生人籲辜群盜乘之如蝟毛而奮磨牙搖毒其劇者若李密因黎陽蕭銑始江陵竇建德連河北王世充舉東都皆磨牙搖毒以相噬螫四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒韓愈與柳中丞書狼扈元結醜徒狼扈蜂蝟斧螗柳平淮夷雅皇武裒兇鞠頑蜂蝟斧螗聿擒其良右翦左屠聿擒其良其良既宥告以父母同上方城人搖不寧事變難測陸宣公奏議寇亂有益翦滅無期人搖不寧事變難測屢犯州縣文粹元結時議今所在盜賊屢犯州縣盜賊不起同上天子往在靈武無今日威令而盜賊不起二十為大將英公言我年十三為無賴賊逢人則殺十四五為難當賊所不快者殺十七八為好賊上陣乃殺二十為大將使兵以殺人也出隋唐嘉話猶張蹭蹬之鱗于公異朱泚露布猶張蹭蹬之鱗更舉螳蜋之臂大略居人貲產田神功傳劉展反大略居人貲產發屋剔窌豺狼塞路人斷絕烽火照夜屍縱橫杜甫釋悶敓者時聞於道路穿窬者或縱於鄉閭白居易去盜賊議方今禁科雖嚴桴鼓未靜敓者時聞於道路穿窬者或縱於鄉閭寘蟊賊於其心元稹論討賊表蕞爾微醜天將棄之寘蟊賊於其心假螻蟻以為聚忠臣孝子思得食肉除剷寇盜宇縣清夷韓愈賀冊尊號表賊壕連白翟戰瓦落丹墀杜詩長江連海群盜如麻驟雨絕絃不可尋逐無關可閑無要可防杜牧上李太尉剽寇日旁午鄭從讜時承軍亂剽寇日旁午從讜既視事奸無廋惰乃推捕反賊誅其首惡方地數千里不識盜賊韓文草間求活李密就翟讓曰今群豪競興公宜先天下攘除群凶寧常剽奪草間求活哉道路剽奪王世充傳道路剽奪使者苦之孽氣腥焰所以亡隋觸唐明德折北不支乃就殲夷王竇贊痍叛殘孽眾不盈萬隱太子建成劉黑闥亂河北王珪等進說曰今黑闥痍叛殘孽眾不盈萬利兵鏖之唾手可決請往討之陵驚郡邑杜牧賀擒賊表竊盜三白既貪財以肆心乃行險以寘念蓄行險之心窮斯濫矣遇慢藏之貨獲則取之竊則竊人之財猶謂之盜竊賄為盜盜賊公行盜器盜憎主人充斥言多也盜有所在雚蒲見賊寇門窮斯濫矣小人穿窬之盜小人有勇而無義為盜約斯盜小人貧斯約約斯盜也行險小人行險以求僥倖法令滋彰盜賊多有草竊書曰殷人好草竊言草野竊盜以為奸寇攘書曰凡人自得罪寇攘姦宄殺越人于貨攘奪也言殺人以求財貨敓鴟義姦宄敓矯虔吾盜臧武仲謂季孫曰召外盜禮焉何以止吾盜外盜外境之盜貪冒之人將寘力焉既貧斯約謂富可求求浮雲之富緘縢扃鐍揭篋之徒胠篋人患盜之昭也誨盜暴客殺之無罪周禮凡盜賊軍鄉邑及家人殺之無罪注若今無故入人家牽引欲犯法者其時格殺之無罪相翔秋官野廬氏掌賓客至有相翔者則誅之注云相翔猶倡佯觀同將為盜也外戶不閉謂無盜也盜亦有道也跖曰妄意室中之藏聖也先入勇也後出義也知可否智也均分仁也大盜小盜莊子探囊發匱莊子曰將為胠篋探囊發匱之盜而為守備則必攝緘縢固扃鐍此世俗之所知也巨盜至則負匱揭篋擔囊而趍唯恐緘縢扃鐍之不固教盜齊之國氏大富宋之向氏大貧請其術國氏曰吾善為盜向氏聞為盜之言不喻為盜之意遂逾垣穿宇手足所及無不探取俄而已獲贓罪沒先人之產國氏曰嘻為盜之道天有時地有利雲雨滂潤山澤田產育生吾禾黍植吾穜稑陸盜禽獸水盜魚鱉皆天地所有豈吾所有吾取之故為盜天金玉珍寶人之所聚盜之獲罪宜哉向氏以為重罔己也晉侯之豎頭須竊藏以逃傳不殺盜曹褒為圉令以禮化民有他鄉盜五人入圉界捕之太守馬嚴促殺之褒曰絕人命者天亦絕之皋陶不為盜制死刑遂不殺嚴奏褒懦弱遂免官奔伏逃奔晉以士會將中軍於是晉國之盜奔於秦羊舌職曰吾聞禹稱善人不善人遠善人有上則國無侍人不仁者遠矣舜有天下舉皋陶不仁者遠矣有恥且格格改也外戶不閉大道之行云云路不拾遺子產相鄭使民不為盜絕巧棄智盜賊無有盜賊伏隱傳知禁雚蒲久靜桴鼓不鳴頃因魯賞庶其輕聞充斤旋見晉用士會終致奔逃四封之詰十里以違不歸死於司敗宜勿使於追胥逋逃掩藏惡既相濟罪亦惟均甲非歸死乙則保奸入懷之鳥漏網之鯨掩賊傳毀則為賊掩賊為藏賴奸之用有常無赦隱賊少皞氏有不才子掩義隱賊好行兇德惠奸疾惡荒閱文王之法曰有亡荒閱閱搜也荒大也亡逃罪而隱者同罪楚文王作僕區之法曰盜所隱器與盜同罪若以二文之法取之盜有所在詰盜季孫謂臧武仲曰我有四封而詰盜何故不可隱慝慝惡也蒐慝藏惡利淫匿容隱窮鳥入懷逋逃主萃淵藪獲全濟難私匿竄身隱死百家之邑可以隱死藏亡匿胡陽公主謂世祖曰文叔為白衣時藏亡匿死吏不敢到門庇其賊人而取其地傳囊橐廣川王國多盜張敞以耳目發起賊名區處王姬反同族劉調等通為囊橐注容止盜賊若囊橐盛物盜有所在無留慝傳云摘伏舍慝季布窮猿奔林遇者則止走鹿赴陰急何能擇招誘晉高陽王睦拓誘逋亡變姓名者七百餘戶貶為縣侯亡抵張儉逃亡抵孔融兄褒褒不在融舍之州郡並收褒融二子爭死竟坐褒罪沉命漢王溫舒等酷虐而人輕犯法盜賊滋起以是沉命皆藏匿命逃亡也過一飯漢詔捕辛興興與鮑宜女婿許紺俱過宣一飯去宣不知情坐系獄自殺長寇救其患難誠為好仁匿乃姦回則非嫉惡救難雖容於投足嫉惡終昧於剛腸季布獲全於朱家元節匿死於孔氏疑枉瓜李古詩曰君子防未然不處嫌疑間瓜田不納履李下不整冠薰蕕狐疑狗盜厚誣薄訴盜壁楚相亡璧疑張儀笞數百不伏疑金直不疑為郎同舍郎失金意不疑盜金不疑買金償之後知非亡金者大慚似是而非研覈是非瓜李可疑淄澠難別搶塵惑孔顏回炊有炱煤入飯中回乃拾之孔子疑之妄意良人元帝引宰相御史條責職事曰惡吏負賊妄意良人猜禍王溫舒為中尉召猜禍吏與從事注吏好猜疑作禍害者任之鄰人父史宋人有天雨壞牆其子曰不能築將有盜其鄰人父亦言之後果大失財物其子乃疑鄰人父盜之疑褲陳重景公同舍郎告歸誤持鄰舍郎褲去主疑重終不申說市褲還之後歸者持褲還主事乃顯然賞用聞仲弓之誡子亦既自新遇管氏之知人由斯入用人之縱欲大為防而猶逾法以止姦小不忍而恐亂晝伏夜動始見穿窬之心今是昨非旋間砥礪之節若容已露之姦恐誘將來之盜作姦者如可舉為善者無乃疑請敦理道無啟倖門既捨而罪乃升諸公唯善所在雖盜何傷惟賢是求雖盜必舉棄瑕錄用補過責功所宜權以救世不可垂以訓人若行其權道開以倖門則寇所由興法不可禁若貸前定之法是誘後來之姦見小善而必求財難苟得逾大防而不禁敝將若何不竊子曰苟子之不欲雖賞之不竊遇盜骨仲遇盜取二人焉上以為公臣曰所與游辟也遺布陳寔字仲弓為大丘長有盜入其家伏樑上寔覺之召諸子戒之曰不善人未必本惡習以性成梁上君子也盜聞自投伏罪寔曰君貌非惡人當貧耳遺布二疋而遣之賞盜邾庶其以來閭丘來奔季武子以公姑姊妻之皆有賜於從者魯多盜季孫謂臧武仲曰不可詰也季孫曰我有四封而詰其盜何故不可武仲曰子召外盜而大禮焉何以止吾盜庶其竊邑以來子以姬氏妻之其次皁隸輿馬其小者衣裳劍帶是賞盜也而去之其或難焉王烈字彥方有盜牛者主得盜者曰無令王彥方知烈聞遺布一端以激之後有遺劍於路有一人守之以待主乃盜牛者定交戴若思不拘操行行遇陸機赴洛船裝甚盛揮其徒掠之機登岸據胡床坐指揮機遙謂曰卿才美如此何作劫耶若思流涕投劍謝罪機遂與定交捕捉不歸死於司敗宜勿佚於追胥周禮以比追胥追逐寇也胥司捕寇者唯田與追胥竭作盡室行也逐寇如追逃奔秦之盜執其有罪書曰庶群飲汝勿佚盡執拘以云云擒姦追亡出匣之兕漏網之鯨鷹鸇之逐鳥雀視盜郤雍能視盜察眉知之千無一遺文子曰雍必不得其死俄而群盜殺雍赭衣張敞為京兆尹長安多盜敞求得酋長數千貸其罪犯其宿負令致諸偷酋長乃以赭汙小偷衣令吏捕之枹鼓張敞為京兆尹枹鼓稀鳴枹鼓追盜鼓也把重罪王溫舒為廣平都尉擇敢往吏皆把其陰重罪而縱使督盜即有迴避夷之伺侯先知焦延壽字贛補小黃門以伺侯先知姦罪盜不得發怒殺盜張酺為東都吏有殺盜者酺按之以為長吏受贓從不至死盜徒皆飢寒何窮其乎乎三科募壯士誘賊虞詡升卿為朝歌長賊屯聚設三科募壯士攻劫為上殺人倫人為次不事家業為下恕其罪使入賊誘令劫掠以伏兵待之緩追逸賊谷梁越逐臣妾逋逃勿敢越逐延耆老致寇賊定襄大姓殺吏拜班伯為太守乃延耆老日為供具耆老知酋豪懷恩醉酒具言盜賊亡匿處乃分部收捕旬日盡得之耳目發奸張敞為剌吏以耳目發起盜賊主名區處比三輔張敞請冶劇郡吏追捕有功者願比三輔尤異以勸善上許之縫衣以綵綖虞詡升卿為朝歌長賊數千屯聚詡遣貧人能縫者傭作賊衣以緣其裾為識有出市者輒擒拒捍追捕晉周訪士達時有訪同姓名者罪當死吏誤收訪訪奮擊收者數千人皆走而歸於帝帝不罪之孔以稽禁禦陸贄視姦盜有無以稽禁禦竊其衣囊楊再思初調玄武尉使至京師舍逆旅有盜竊其衣囊再思遇之盜窘謝再思曰而苦貧故至此囊中檄無所事幸留他物可持去初不為人言謹視陸希聲上言當謹視盜賊人窮斯詐起為姦盜宋務光書曰數年以來猛吏奮毒急政破資馬困斯佚人窮斯詐起為姦盜從而刑之良可嘆也絕汴流羅立言改陽武令設鎖絕汴流姦盜屏息為償所亡袁滋華州剌史得盜賊哀其貧窮為償所亡姦夫盜兒蘇源明史思明陷洛陽有詔幸東京將親征源明因上疏極諫曰姦夫盜兒連牆接棟磨勵以須陛下之出御史大夫必不能澄清禁止鼠竊狗盜陳子昂上書儻鼠竊盜西入陝郊東犯虎牢取敖倉一杯粟陛下何與遏之白妻巫臣有桑中之喜疑將竊妻以逃也傳藥姮娥竊羿不死藥食之飛入月中殞晉蔡裔聲如雷震有二盜入其室裔撫床一呼二盜俱殞魚世說王承為東海小吏盜池魚獲之承曰文王之囿與眾共之池魚何足惜乃釋之逾垣牆竊馬牛書曰無敢寇攘云云香韓壽竊香羊其父攘羊而子證之裘孟嘗君有能狗盜入秦官藏內盜狐白裘獻秦後遂免難東陽國語曰子木曰資東陽之盜使殺椒舉也西鄙傳欒盈過周之西鄙掠之注云劫財物也柳晉陶侃士衡為荊州牧性聰敏尉夏施盜官柳種於己門侃見駐車問曰此是武昌西門柳何因盜之施惶懼謝罪布楚江乙毋失布以盜由令尹也瓜桑虞子深以至孝稱園中瓜熟有人逾垣盜之虞之園多棘恐刺盜者使奴開道偷乃負瓜出知虞除之乃送所盜瓜請罪仍以與之斫樹范喬字伯孫臘夕邑人斫其樹人告喬佯不聞邑人愧而歸喬喻之曰節日取柴與父母歡娛何愧之有青氈語林曰王子敬臥齋中偷人取物臥不動偷復登廚子敬曰偷兒青氈我家舊物群盜驚走禾淳于恭孟孫家有山田果樹有偷恭禾者恭見恐其愧伏草中盜去乃起去馬孔嵩被竊馬賊自相讓曰孔嵩善士豈宜盜竊遂送馬謝之武卒盜強弩絃春秋決獄曰甲為武庫卒盜強弩絃一時與弩異處當何罪論曰兵所居比司馬闌入者髡重武備責精兵也弩櫱機郭弦軸異處盜之不至盜武庫兵陳論曰大車無輗小車無軏何以行之甲盜武庫兵當棄市乎曰雖與弩異處不得弦不可謂弩矢射不中與無矢同不入與無鏃同律曰此邊鄙兵所贓直百錢者當坐棄市又馬秦穆公有駿馬為盜殺食之公曰吾聞食駿馬肉不飲酒必死遂賜群盜酒飲生刈稻孫晷字文度年飢榖貴人有生刈其稻晷見而辟之去後乃自刈送之鄉里感愧莫敢侵犯贓物司厲掌盜賊之任器貨賄辨其物皆有數量賈而揭之入于司兵賴姦之用賴姦人之用物隱器傳仆區之曰盜所隱器與盜同罪也雜盜四孔陳子昂疏曰夫人情以求生為急今有粟麥牛羊為之餌而不救其死安得不為盜乎光火馮元常徙眉州刺史劍南有光火盜夜掠人晝伏山谷元常諭以恩信約悔過自新賊相率脫甲面縛盜蔥張允濟仕隋為武陽令過道旁有姥廬守所蒔蔥因教曰第還舍脫有盜當告令姥謝歸俄大亡蔥允濟召十里內男女盡至物色驗之果得盜者奪繒王君廓善盜嘗負竹笱如魚具內置逆刺見粥繒者以笱囊其頭不可脫乃奪繒去而主不辨也盜樹陽城有盜其樹者城遇之慮其恥退自匿盜羊竇建德邑人孫安祖盜羊為縣令捕效笞辱安祖刺殺令亡抵建德數盜姑家牧羊杜伏威與里人輔公祐約刎頸交公祐數盜姑家牧羊以餽伏威奢侈五白聖人去泰君子戒盈物惟惡盛神亦害盈不以義制將由惡終禮無縱欲道貴去奢儉雖諷於蟋蟀奢則剌於蜉蝣況當示禮之時自致宣驕之禍盈不可久貴而能貧不遜子曰奢則不遜儉則固與其不遜也寧固寧儉禮與其奢也寧儉去奢老子曰聖人去奢去泰書曰位不期驕祿不期侈貴不與驕期而驕自至富不與侈期而侈自至故戒之滿招損謙受益欲敗度縱敗禮以速戾于厥躬窮泰極侈縱欲不度非度所制盈必壓天之道也崇侈滋侈泰侈欲不可縱驕奢淫泆所自邪也侈惡之大也納諸大惡心侈體汰文選言憑虛公子侈靡何禮之拘遺咎富貴而驕自遺其咎益之而損盜夸老子曰服文采厭飲食是謂盜夸宣驕以蕩陵德放蕩敗德敝化奢麗怙侈滅義驕淫矜夸將由惡終雖收放心閑之惟難處樂不仁者不可以久處約不可以長處樂亡家之主奢侈力敝華定侈女叔齊曰侈將以其力敝言力盡而敝侈汰伯有侈汰終取亡也裨灶指其門莠曰其莠猶在乎富多鄭駟崇富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之速朽桓司馬自為石槨三年而不成孔子曰若是其靡也死不如速朽之愈丹楹刻桷魯莊公丹桓宮楹刻桓宮桷御孫諫曰儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎鷸冠鄭子臧好聚鷸冠鄭伯聞而惡之使盜殺之君子曰服之不衷身之災也彼己之子不稱其服子臧有焉瓊弁楚子玉為瓊弁夢河神乞之不與果戰敗死之左傳云載寶南官敬叔必載寶而朝夫子曰喪不如速貧之愈峻宇雕牆示侈楚子示諸侯侈椒舉曰三公二公皆示諸侯禮也今君以汰無乃不可乎不聽之左傳服美傳曰服美不稱必以惡終謂慶封也書曰服美於人管氏有三歸娶三姓之女乘肥馬衣輕裘子曰赤之適齊也云玉食漢陳咸為南郡守奢侈玉食獸炭羊琇作獸炭謂屑炭和作獸而燒之何曾蒸餅不十字坼不食又日食萬錢曰無下筋處抱罋釀酒羊雅冬日令人抱罋取煖須臾易人酒熟而已鏤簋朱絃管仲鍾石之懸不移而具劉向新序曰孟獻子如晉韓宣子兕觴之飲三徙鍾石之懸不移而具也坐罪韓延壽坐東郡奢侈棄市限利為制度漢書悅紛華盛麗史記曰子夏門人之高第者猶云出見紛華盛麗而悅入聞夫子之道而樂二者心戰未能自決況中庸乎相夸石崇與王愷羊琇之徒以奢靡相尚愷以飴澳釜崇以蠟代薪愷作布步障四十里崇作錦步障五十里崇泥屋以椒愷屋以石脂愷以珊瑚示崇崇擊碎之其爭豪如此錦維舟吳甘寧字興霸道路往止繪錦維舟去或割棄之以示人之奢也孔用度奢侈范傳正宦益達用度益奢侈享用段文昌少羇窶所向皆少諧及居將相享用奢侈士議尤替驕奢則禍至柳玭家訓董生有云賀者在門弔者在閭言受福則驕奢驕奢則禍至當時第一崔寬本豪侈城南別墅池觀堂皇為當時第一為奢侈事裴漼晚節稍畜伎妾為奢侈事議者以為缺侈窮人欲而議者不之貶郭子儀贊奢者好親人所以多過宋子嵩化書京師高訾胡証厚殖財自奉養車服器用珍侈遂號京師高訾城中開南北二第室宇奢廣元載城中開南北二第室宇奢廣當時膏腴別墅疆畛相望且數十區名姝異妓雖禁中不逮帝盡得其狀本傳煬帝奢侈竇靜授司農卿趙元楷為少卿靜鄙其聚斂因會官屬大言曰如煬帝奢侈竭四海自奉司農須公矣今天子躬節儉屈一人安兆庶惡用公哉元楷太慚侈飲食李令問厚奉養侈飲食奢靡魏徵曰今難得之貨雜然並進玩好之作無時而息上奢靡而望下朴素力役廣而冀農業興不可得已危亡之漸褚遂良帝嘗怪舜造漆器禹雕其俎諫者十餘不止小物何必爾邪遂良曰彫琢害力農篡繡傷女工奢靡之始危亡之漸也漆器不止必金為之金又不止必玉為之故諫者救其源不使得開及其橫流則無復事矣帝咨美之服玩食飲必極豐侈宇文士及過自奉養服玩食飲必極豐侈韋陟侈縱陟性侈縱喜飾服馬侍兒閹童列左右常數十侔於王官主第窮治饌羞擇膏腴地蓻穀麥以鳥羽擇米每食視庖中所棄其直猶不減萬錢宴公侯家雖極水陸曾不下箸後房歌舞伎百餘河間元王孝恭性奢豪後房歌舞伎百餘不循法隴西恭王博乂驕侈不循法度伎妾數百曳羅紈甘粱肉放於聲樂以自娛婦人惟侈麗是好封德彝楊素營仁壽宮表為土工監規創鴻侈宮成文帝怒曰素殫百姓力為吾掊怨天下素大懼倫曰毋恐皇后至自當免明日帝果勞素曰公知吾夫婦老無以自娛樂而盛飾此宮邪因大悅素退問何料而知倫曰上節儉故始見必佛然雅聽后言婦人惟侈麗是好后悅則帝安矣素曰吾不及也家聲在人李聽盛飾車馬服玩或戒之聽曰家聲在人若示衰薄恐不見忠功之效吾欲誇而勸之也盛葺第舍潘孟陽盛葺第舍帝微行至樂游原望見之以問左右孟陽懼輟不敢治而伎媵用度過侈汰人多指怒之君臣窮極奢以相誇尚五代晉臣景延廣天福八年秋出帝幸大年莊還置酒延廣第延廣所進器服鞍馬茶床椅榻皆裹金銀飾以龍鳳又進帛五千匹綿一千四百兩馬二十二匹玉鞍衣襲犀玉金帶等請賜從官自皇帝重睿下至伴食剌史重睿從者各有差帝亦賜延廣及其母妻從事押衙孔目官等稱是時天下旱蝗民飢死者歲數十萬而君臣窮極奢以相誇尚如此一飲食必費萬錢五代趙巖自以有功於梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐恥其不及乃占天下良田大宅裒刻商旅其門如市租庸之物半入其私巖一飲食必費萬錢性豪侈王琚自以立勳至天寶時為舊臣性豪侈其處方面去故就新受饋遺至數百萬侍兒數十寶帳備具闔門三百口既失志稍自放不能遵法度在州與官屬小史酋豪飲謔樗蒱藏鉤為樂每徙官車馬數里不絕從賓客女伎馳弋凡四十年同上上苟好奢則天下貪暴之吏將回心焉白居易奢者三歲之計一歲之用蒿宮茅柱實興國之清猷玉席珠衣乃危邦之弊化希齊杯飲之年願躡鶉衣之代中宗斷進獻制桀以瑤台為麗而不悟南巢之禍殷辛以象著為革而不知牧野之敗謝偃本傳漆器非延叛之方桀造之而人叛玉杯豈招亡之術紂用之而國亡徐賢妃諫疏初王嘆隋夸侈收進曰峻宇雕牆殷辛以亡土階茅茨唐堯以昌阿房興而秦禍速露臺罷而漢祚永後王奢侈是矜死一夫之手何能保哉王重其言本傳雕金鏤玉採六合之珍奇剪翠裁紅飾三春之草樹即宜懲革勿用因循唐中宗斷進奇巧制忽彩椽之恭儉追雕牆之侈唐魏徵論時政隋煬帝驅天下以從欲罄萬物而自奉採城中之子女求遠方之奇異宮室是節臺榭是崇同上苦言嘉謀將作少匠楊務廉素以工巧見用中興初袁恕己恐其更啟遊娛侈靡之端言於中宗曰務廉致位九卿積有歲年苦言嘉謀無足可紀每宮室營創必務其侈若不斥之何以廣昭聖德由是左授陵州刺史舊史百花換發玄宗每年幸華清宮楊銛楊錡韓虢秦三夫人五家扈從每家為一隊著一色花五家合隊照映如百花之換發遺鈿墜舄瑟瑟珠翠燦爛芳馥於路孔平仲續世說疏築台沼崇峙廡魏元忠陳郡男子袁楚客者以書規之曰古者茅茨采椽以儉約遺子孫所以愛力也今公主所賞傾庫府所造皆官供其疏築臺沼崇峙廡山無本石木無近產造之終歲功用不絕夫為君所以養人非以害人今外戚不助養而反害之是使人主受謗天下奉養華裕李紓自奉養頗華裕一言之悅賞至百萬嚴武在蜀頗放肆用度無藝或一言之悅賞至百萬蜀雖號富饒而峻掊亟斂閭裡為空正寢華顯避不敢居田宏正為節度使民服玩僣侈者即日徹毀之承嗣時正寢華顯宏正避不敢居更就採訪使堂皇聽事恃功而侈高崇文為京西諸軍都統崇文恃功而侈舉蜀帑藏百工之巧者皆自隨傾貲貨市權貴驩范傳正宦益達用度益奢侈傾貲貨市權貴驩私公府如家帑以寶鈿為井幹王鉷賜死有司籍第舍數日不能遍至以寶鈿為井幹引泉激霤號自雨亭其奢侈如此飲食資身過則生患衣服稱德侈則生慢柳公綽輿服食飲光麗珍豐裴冕性豪侈既素貴輿服食飲光麗珍豐櫪馬直數百金者常十數每廣會賓客不能名其饌郭英乂拜劍南節度使教女妓乘驢擊毬鈿鞍寶勒及他服用日無慮數萬費以資倡樂未問民間事不能自悛李愿拜河中等節度使雖嘗以荒侈敗不能自悛日費凡數十萬吳士矩開成初為江西觀察使饗宴侈縱一日費凡數十萬盛滿楊收既益貴稍自盛滿為夸侈門吏童客倚為奸家畜聲妓目使頤令自視王侯王翰擢駕部員外郎家畜聲妓目使頤令目視王侯人莫不惡之溺器以七寶裝後漢孟昶幸晉漢之際中國多故而據險一方君臣務為奢侈以自娛至於溺器皆以七寶裝之玉堂珠殿南漢劉龔好奢悉聚南海珍寶以為玉堂珠殿肉臺盤五代孫晟官至司空家益富驕每食不設几案使眾妓各執一器環立而侍號肉台盤時人效之金銀為篣筐爪籬安祿山帝為祿山起第京師為瑣戶交疏臺觀沼池華僣帟幕皆緹繡金銀為篣筐爪籬大抵服御雖乘輿不能過地仙五代張筠居洛陽擁其貲以酒色聲妓自娛足者十餘年人謂之地仙香聞數十里玄宗貴妃楊氏傳國忠既遙領劍南每十月帝幸華清宮五宅車騎皆從家別為隊隊一色俄五家隊合爛若萬花川谷成錦繡國忠導以劍南旗節遺鈿墮舄瑟瑟璣琲狼藉于道香聞數十里鍊炭洛下有豪子飲食鮮華有李使君亦尚豪侈為具召之曾不下箸至飯李曰此以炭炊豪子勉食一匙曰凡以炭炊先燒熟謂之鍊炭方始無煙氣此亦非也劇談錄銷得錦半臂鄭愚好華侈以錦為半臂後以所業獻崔鉉鉉曰真銷得錦半臂北夢瑣言床畔香童王元寶好賓客務奢侈器玩服用僣於王者四方之士盡歸仰焉常於寢帳床前使嬌童二人捧七寶博山爐自瞑焚香徹𥌓出開元天寶遺事錦纏頭又王元寶富而無學識嘗會賓客明日親友謂之曰昨日必有佳論元寶曰但費錦纏頭耳簾帷珠翠夾道不絕莊宗遣李嚴聘蜀衍與俱朝上清而蜀都士庶簾帷珠翠夾道不絕嚴見其人物富盛而衍驕淫歸獻策伐蜀五代史醉粧後宮皆載金蓮花冠酒酣免冠其髻髽然更施朱粉號醉粧同上觀沼華邃費皆千萬杜亞承陳少游後裒率煩重用度無藝人冀有所矯革而亞雅意丞弼厭外官往往不親事日夜召賓客言噱流連方春率民為競渡戲亞欲輕駃乃髹船底使蒿人衣油綵衣沒水不濡觀沼華邃費皆千萬隴西李衡在坐曰使桀紂為之不是過也既泛九曲池曳繡為颿詫曰要當稱是林沼衡曰未有錦纜云何亞大慚以沉香為亭宗室漢敬宗侈宮室舶賈獻沉香亭材帝受之漢諫曰以沉香為亭何異瑤台瓊室乎僭六白名位不同禮亦異數易則生亂過乃有刑所宜守以等威豈可易其紀律苟無區別則有覬覦禮由位敘名以器分苟命數之或乖於禮容而何取雖器服不同有以多為貴者而等衰莫辨無乃爾是過與所宜禮以節之位苟殊於品列服則異於節文名位殊倫易則生亂器服異制過則著刑況當示儉之時自貽犯貴之誚唯器與名不可假人不守其位君子以是為濫矣僭禮下陵上僭難為上也孔子謂管仲鏤簋朱紘旅樹反玷賢大夫也而難為上也言大僣也上不僭上下不逼下犯貴衽席之上讓而坐下人猶犯貴犯君朝廷之位讓而就賤人猶犯君敗度敗禮非制非度不度何禮之拘名出於信信以守器器以藏禮易而生亂過則有刑服以旌禮昭其度也昭其數也登降有數各以序守官邪由官邪也名數命數等衰等列禮失則昏名失則愆表儀爵命禮命九命之數見周禮命數周禮聽祿位以禮命謂祿位之差以九命九錫之數正其服位以儀辨等則人不越慎守失守犯上失中班制禮也夾轂焚香士燮字彥成為交趾太守出入鳴鍾磬備威儀笳簫鼓吹車騎滿道胡人夾道焚香妻妾乘輜軿子弟從兵騎當時貴重振服百蠻尉佗不足逾也車服惟鵜諷其不稱相鼠刺以無儀衛仲叔于奚有功衛人賞之以邑辭請繁纓以朝許之繁纓馬飾諸侯之制也仲尼曰惜也不如多與之邑惟器與名不可假人器車服名爵號鄭駟崇富而侈嬖大夫也而常陳卿之車服於其庭鄭人惡而殺之繡黼丹朱中衣大夫之僣禮也皆諸侯之禮繡音宵綠衣衛莊姜傷己也妾上僣夫人夫位也詩曰綠兮衣兮綠衣黃裳綠間色黃正色綠衣反黃裏非禮制以喻妾上僣朝服之以縞冠自季桓始也僣宋王者之後也易輿服之制後漢梁冀易輿服之制作乎上軿車埤幘狹冠折上角擁身扇狐尾單衣車服兵衛蕭望之奏韓延壽在東郡試騎士治飾兵車畫龍虎朱雀延壽衣黃紈方領駕駟馬傳總建幢棨植羽葆鼓車歌車功曹引車皆駕駟馬載棨戟五騎馬五分左右部軍假司馬千人持幡旁榖歌者先居射堂望見之延壽坐射堂令騎吏持戟夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陣被甲把弩負蘭又使騎吏戲車上弄馬盜驂上僭不道坐棄市樂舞孔子謂季氏八佾舞於庭是可忍也孰不可忍也八佾王者之樂季氏僣三家者以雍徹子曰相維辟公天子穆穆奚取於三家之堂三家叔孫孟孫季孫雍詩篇名天子祭宗廟之禮也衛仲叔于奚有功衛人賞以邑辭請曲懸曲懸軒懸也三面懸其形曲故曰曲懸仲尼曰惜也唯器與名不可以假人禮諸侯之宮懸而祭以白牡擊玉磬朱干鏤錫舞大夏武乘大輅此諸侯之僭禮皆天子之禮也大夫之奏肆夏自趙文子始也僣諸侯之禮也樂之奢失罪以僣聞遍舞左傳王子頹享大夫樂極遍舞遍舞六代樂鄭伯曰樂禍也金奏郤至聘楚楚子享之為地室而懸焉郤至登金奏作於下驚而走出曲旃武安侯田蚡堂前羅列鍾鼓立曲旃曲旃旌旗之類噭咷楚歌韓延壽事具車服門欲庭觀帝樂杜夔公良知晉亂奔荊州荊州牧劉表令盍曜為漢主合雅樂樂遍表欲庭觀之夔諫曰今將軍號為天子合樂而庭作之無乃不可乎表納其言而止奏肆夏於天子舞八佾於季孫器物仲尼曰臧文仲不仁者三作虛器山節藻梲有其需而無其位故曰虛器也邦君為兩君之好有反坫管氏亦有反坫管仲鏤簋而朱紘君子以為濫也華而睆大夫之簀與曾子寢疾曾元曾申坐於足童子隅坐而執燭童子曰云云曾子曰然斯季孫之賜也候月蝕鑄刀劍蕭望之奏韓延壽在東都時取官銅器候月蝕鑄刀劍鉤鐔放效尚方事坐棄市祭祀君子太牢而祭謂之禮匹士太牢而祭謂之攘攘竊也君子大夫已上也諸俟之官懸見上樂舞門注四時追孝礿祀有常九命辨儀牲盛異數孝感於時雖云罔極祭不以禮豈曰無違追遠誠謂孝思違禮則乖敬享居宇邦君樹塞門管氏亦樹塞門人君樹屏於門外管仲僣之臧文仲居蔡蔡龜也山節藻梲何如其智也言不智也臺門而旅樹大夫之僭禮也儒有居處不淫豐屋蔀家峻屋不度宣驕峻宇雕牆城鄭共叔段為京城太叔祭仲曰都城過百雉國之害也先王之制大都不過三國之一中五之一小九之一今京不度非制也君將不堪傳周禮門阿之制以為都城之制都五百里內王子弟之所封也取天子門阿之制五雉宮隅之制以為城制天子宮隅之制七雉葬春秋不稱楚越之王喪恐人惑也楚越僣王號晉侯納王王享之請隧不許曰王章也言遜天子典章也開地通路曰隧王葬之禮也諸侯懸棺而下之宋公卒始厚葬用蜃炭始用殉殉以人從死也槨有四阿棺有翰檜四阿槨也翰旁飾檜上飾也王者之禮君子謂華元樂舉於是不臣君生則縱其惑死又益其侈是棄君於惡也何臣之為孺子餭之喪哀公欲設撥撥引輴車所謂紼也冠禮曰玄冠紫緌自魯桓公始也僣宋王者之後衡紞紘綖皆冠飾也昭其度也燎庭燎之有百由齊桓始也僣天子禮也其終夜燎孔專威福宗楚客監察禦史崔琬廷奏楚客處訥專威福有無君心晉卿驕恣跋扈園檻李師古園檻僣制室宅輿馬僣法度韓休萬年尉李美玉有罪帝將放嶺南休曰尉小官犯非大惡今朝廷有大姦請得先治金吾大將軍程伯獻恃恩而貪室宅輿馬僣法度臣請先伯獻後美玉帝不許休固爭儀服僣上藩鎮王鎔毋亡始黷貨財姬侍千人儀服僣上治第過制范傳正拜宣歙觀察使代還坐治第過制憲宗薄不用僣正樂于頔卒謚曰厲子孝友求改謚高鉞王彥威持不可謂于頔內遮使者僣正樂勢迫而朝非其宿心益矜僣公私蕭然張延賞拜荊南劍南西川節度使成都史郭英乂崔寧楊子琳亂益矜僣公私蕭然延賞事為之制薄入謹出府庫遂實唐史
