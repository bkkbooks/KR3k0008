body:
  text: 卷第九白作我上都漢之西遷作我上都上腴九州之上腴奧區天地之奧區三成帝畿周秦漢周以龍興秦以虎視四塞秦地被山帶河四塞之固沃野千里天府名都邦畿千里城闕九重秦據而彊漢都而盛寔惟地之神皋天邑鑒秦制誇周法京邑翼翼四方取順神州之略赤縣少畿京師王室皇州皇都帝里百二之都言險固要害水陸所湊秦之興也天錫鶉首之分漢之王也星符東井之精險左據函谷崤陵之阻右界褒斜隴首之險在鎬王在在鎬帝王之宅崤函作帝王之宅金城漢張良曰關中左崤函右隴蜀南有巴蜀之饒北有胡苑之利東制諸侯所謂金城千里天府之國建瓴漢書奏中形勝之國加兵於諸侯猶高屋上建瓴水建邦設都書封畿甸服千里法日白虎通京師者千里之邑法日月之徑千里帝畿王畿申畫書曰申畫郊圻申畫規畫經野周禮體國經野注云經謂為之里數也制其畿疆周禮制王其畿方千里而封樹之注樹木溝上所以表助險固也正封周禮正畿彊之封制畿周禮制其畿封以正邦國王城帝宅表裏山河周原詩周原膴膴菫荼如飴域民是以聖主域民漢書郊野之富號為近蜀鄭白之沃坤靈正位孔神州化首魏元忠封事神州化首國家大本在京師裴耀卿荅帝問王畿之本陸贄曰王畿者四方之本也其勢當令京邑如身王畿如臂四方如指此天子大權也畿內數州京師之本高季輔列上五事以謂畿內數州京師之本士狹人庶儲蓄少而科役多宜蒙優貸令得休息強本弱枝之義也闢殿軋宮以朝諸侯唐文粹李庾西都賦唐開禪壇新都之門闢殿軋宮以朝諸侯龍道雙迴鳳門五門同上西京賦以唐東都為西都五代朱梁紀歌吹喧萬井車馬塞康莊韋應物詩王業根本陸贄論關中事宜狀且今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則內保一方當天下之半可養力侯時也強則外制東夏據域中之大可以蓄威昭德也所貴乎京師韓文所貴乎京師不以明天子在上賢公卿在下布衣韋帶之士談道義者多乎洛陽梁為西都後唐為洛京五代職方考洛陽梁唐晉漢周常以為都唐故以為東都梁為西都後唐為洛陽京晉謂西京漢周因之池象漢兮昭回城依斗兮闌干劉禹錫望賦登灞岸兮見長安紛擾擾兮紅塵各郁蔥蔥兮佳氣盤池象漢兮昭回城依斗兮闌干東京二白建都河洛即土之中東京翼翼四方之極增周法修漢制萬方輻湊處於中土帶河泝洛宅中以圖大左伊右瀍封畿千里定鼎之都建圭之地大司徒以土圭之法測土深正日景以求地中經營書成王在豐欲宅洛邑使召公先相宅既十宅則經營召公既相宅周公往營成周使來告卜曰澗水東瀍水西惟洛食食言兆也無外稱尊宅中圖大先王之經邑也度天地之所合四時之所交風雨之所會陰陽之所和然則百物阜安乃建王國焉所謂建土圭以測影得天地之中郟鄏成王定鼎于郟鄏王者之里河洛為王者之裡後漢中興光武都洛京十而作邑聞宗周之經營居以為都見炎漢之遺制卜洛遷周險史記初大臣勸高祖都洛陽曰東有成皋西有崤澠背河洛其固足恃也以為鎮三川九阪三塗九谷建國周禮惟王建國注營作洛邑於中土新邑于東國洛書召公所相周公所營域民見西京門注東周延祚平王東遷而延祚衡皋梓澤金谷銅街河洛大都成周故地孔千里蕭條亭舍不煙郭子儀程元振說帝都洛陽帝可其計子儀奏曰洛陽自大盜以來焚埃略畫百曹榛荒寰服不滿千戶井邑如墟豺狼群皋東薄鄭汴南界徐北綿懷衛及千里蕭條亭舍不煙何以奉萬乘牲餼供百官次舍哉鬥場又曰且地狹隘才數百里險不足防適為鬥場形勢不及關內張元素貞觀四年詔發卒治洛陽宮乾陽殿且東封元素上書漢祖將都洛陽婁敬一言即日西駕非不知地土中道里所均但形勝不及關內弗敢康也伏惟陛下化凋敝之俗為日尚淺詎可東巡以搖動人心洛陽朝貢天地中玄素又言遇甚於煬帝帝顧房玄齡曰洛陽朝貢天地中朕營之意欲便四方百姓今玄素言之如此後必往雖露居庸何苦汴州唐故日宣武軍梁以汴州為開封府建為東都後唐滅梁復為宣武軍晉天福三年升為東京漢周因之五代職方考作唐東宅唐文粹李庾東都賦始乎周卜今日隋革進十八里作唐東宅與京比儔我甸我郊二聖之靈壇在焉赤縣神州與京比儔籠故地之銅駝抱舊里之玉雞同上神都則天天宅元年九月改東都為神都帝宅李光弼傳判官韋損曰東都乃地宅公當守之國之都府半在東周白居易制唐高宗建東都詔朕聞踐華固得百二稱乎建瓴卜洛歸仁七日崇平定鼎是以控膏腴於天府啟黃圖於渭濱襟沃壤於王城摛綠宇於河渚初學記升汴州為開封府建為東都五代朱梁紀雄都定鼎地勢據萬國尊河岳出雲雨土圭酌乾坤韋應物望洛詩帝宅夾清洛丹霞捧朝暾蔥蘢瑤臺榭窈窕雙闕門以河南府為東都肅宗本紀寶應元年建卯月辛亥以河南府以東都鳳翔府為西都白高城深也崇墉浚洫城郭溝池以為固金湯傳金城湯池美城傳美城之大名無戎而城讎必保焉廣袤高卑繕其城隍秦築長城延袤千里以拒胡也城郢楚囊瓦城郢沈尹戌曰苟不能衛城無益也亟城梁伯好土功亟城而不處民罷而不堪則曰某寇將至乃溝公宮漆秦二世欲漆其城崩杞梁死其妻哭之城為之崩四墉是資善守何患來攻啟塞從時門戶道橋謂之啟城郭牆塹謂之塞開閉之急不可一日而闕隨壞時而理之不可限以土功之時壞城郭月令孟冬城以巨防門之重閉懷德惟寧雖聞士蒍不供是懼終執仲幾宗子維城山為楚國方城以為城漢水以為池又秦踐華山為城因河為池據萬丈之城臨不測之川要害當要害之衝控形勝之國用逸制勞以寡勝眾城門禁後漢郅惲君章為土東門侯帝常獵遇夜方駕還惲拒關不開帝乃迴從中東門入賜惲布貶中東門侯所過治城馬援所過輒為郡縣治城郭保民榖梁曰城以保民為之也民眾城小則益城益城無極凡城之志皆譏也注夫保民以德不以城如民眾輒益城是無限極也扼地咽喉為國藩屏扃鐍土宇緘滕地維沙城魏祖征馬超每渡渭為超騎所突營不得立又多沙不可築城婁子伯說公曰今天寒可起沙為城以水灌之從之一夜而成城民見上眾心國語眾心成城言以眾心為城走集傳險其走集踐華為城買誼過秦論解帶為城墨子干城詩赳赳武夫公侯干城卻月荊州圖說有卻月城長雲鮑昭蕪城賦屹若斷岸矗似長雲城麇楚王使由干城麇覆命子西問高厚大小不知子西責之對不能王遇盜雲中余受戈其所在袒示之此余能也脾洩之事余不能麇枉在脾洩城惡渠丘城惡眾潰奔莒曰城已惡矣其孰與我為虞雖宗子是固則可徵辭而大夫不供亦宜加罪百雉俟我乎城隅孔築卻月城李靖輔公祏據丹陽召靖入朝受方略公祏遣惠亮屯當塗築卻月城延袤十餘里為掎角靖曰若出不意挑攻其城必破之惠亮拔公祏禽矣跨水聯堞崔神基拜并州長史初州隔汾為東西二城神慶跨水聯堞合而一之省防禦兵歲數千建樓堞廝多樂水自環王方翼遷肅州剌史州無隄塹寇易以攻方翼乃發卒建樓堞廝多樂水自環烽邏精明碎葉裴行儉討遮匍奏王方翼為副築碎葉城面三門迂還多取以詭出入五旬畢西城胡縱觀莫測其方略築三受降城張仁愿默啜悉兵西擊突騎施仁愿請乘虛取漢南比於河北築三受降城絕虜南寇路唐休璟以為築城虜腹中終為所有仁愿固請中宗從之池隍敬暉為衛州剌史是時河北經突厥所騷方秋而城暉曰金湯非粟不守豈有棄農畝而事池隍哉縱民歸歛闔郡賴安和戎郭震為涼州都督初州境輪廣四百里虜來必傳城下元振始於南硤口置和戎城北磧置百亭軍制東要路遂拓境千五百里自是州無慮憂矣豐安定遠先天元年為朔方道大總管築豐安定遠城兵得保頓上完故城張守珪為瓜州剌史墨離軍使督餘眾完故城版築方立虜奄至築郛浚隍關播傳李元平兼泌州別駕知州事元平始至募工築郛浚隍城無完堞非可應卒李降上言北虜方強其憂有五城無完堞非可應卒二也最托霖雨增陴浚隍顏真卿為平原太守交祿山逆狀牙萌真卿度必反陽托霖雨增陴浚隍金城清河太守使郡人李萼來乞師萼曰聞公首奮群唱大順河朔恃公為金城國繕陴隍張建封進濠壽廬觀察使是時四方尚多故繕陴隍築城堡李齊運拜京兆尹時李晟壁渭橋齊運發民築城堡督芻粟以餉晟詔城臨涇郝玭真元中為涇鎮將嘗從數百騎出野還說節度使馬璘曰臨涇抳洛口其川饒行利畜牧其西走戎道曠數百里而皆流沙無水草願城之為休養便地詔城或謂璘曰玭言信然雖然公所以蒙恩大幸以邊防未固也上心日夜念此故厚於公今若用玭言則邊以安尚何事為璘遂不聽及代段估代節度玭又說曰天寶時天下以兵為防獨西域耳而塞至京師且萬里自祿山反西陲盡亡寰內為邊郡每虜入寇驅井閭父子與馬牛焚積聚殘室廬邊人耗盡今若築臨涇以折虜勢便甚佑唯許請于朝卒詔城臨涇為行原州以玭為剌史戍之自是虜不敢過臨涇浚隍陴堞曹華宋州塋丘人吳少誠叛留守王栩署華襄城戍將華浚隍陴堞日與賊搏數禽馘陶甓牛僧孺帝郤於鄂州置武昌節度使鄂城土惡亟壞比歲增築賦表弟於民吏倚為擾僧孺陶甓以城五年軍人無復歲費樓雉相望韓滉遷浙江東西觀察使聞京都未平築石頭五城自京口抵玉山毀上元道佛祠四十區修為壁建業抵京峴樓雉相望城非要應援艱阻帝詔承璀李絳雖去位因上言今之營築不詢眾謀遠規塞外地非要地虜一入寇應援艱阻三也請城方渠楊朝晟會張獻甫卒有詔代為邠寧節度使朝晟請城方渠合道木波以遏吐蕃路問須兵幾何荅曰部兵可辨帝問前日城五原興師七萬今何易邪對曰監州之役虜先知之今薄戎而城虜料王師不十萬勢難輕入若發部兵十日至塞下未三旬城畢積芻聚糧留卒守之寇至不可拔菜野剪夷虜且走此萬全計也若大發兵閱月乃至虜亦來來必戰戰則不暇城矣帝納其策城馬嶺已城吐蕃悉眾至度不能拔乃引去復城馬嶺而歸上固險示馬燧至太原時天下方騷北邊數有警燧念晉陽王業所基宜固險以示敵乃引晉水架汾而屬之城灌為東隍省守陴萬人又釃汾環城樹以周隄築城郭羅立言宜州人改武陽令以治劇遷河陰立言始築城郭地所當者皆富豪大賈所占下令使自築其處吏籍其闊狹號於眾曰有不如約為我更完民憚其嚴數旬畢民無田者不知有役仗義禦侮柔遠李德裕出於滑州節度使徙劍南西川築仗義城以制大度清溪關之阻作禦侮城控榮經掎角勢作柔遠城以扼西山吐蕃大玄高駢徙劍南西川節度成都城歲壞駢易以塼甓陴堞完新負城丘陵悉懇平之以便農桑訖功筮之得大畜駢曰畜者養也濟以剛健篤實輝光日新吉孰大焉文宜去下存上因名大玄城榛墟安祿山傳當此之時洛陽諸郡城邑榛墟廣京師新城王朴世宗征淮朴留京師廣京師通道路北博宏闊今京師之制多其所規為五代史開元二十年築夾城入芙蓉園唐地里志陴壘相望陴壘相望朝駕暮戰杜牧罪言堅壘名城堅壘堅壘相貫杜牧戰論羅娑城比方禿髮譯語謂吐蕃其王為贊普其國都羅娑城重兵死惡病終以累世戰沒者為甲門臨陣奔北者懸狐尾於首以表其性似狐之性唐會要相奪也為之城郭甲兵以守之韓文雉堞粉似雲杜甫晚登瀼上堂城欹連粉堞峽口詩城峻隨天碧上白帝城孤城隱霧深野望風起春城暮高樓鼓角悲絕句遼鶴記城闉元稹代曲江老人城衢州工畢以圖獻王使陳章城衢州工畢以圖獻王視西門樟樹密謂左右曰此樹不入城章終非我畜其後章果叛備史六蜚南幸芙蓉苑十里香飄入夾城杜牧長安雜題繚粉堞於綺城望故園賦賢長城遠矣李勣治并州十六年以威肅聞帝嘗曰煬帝不擇人守邊勞中國築長城以備虜今我用勣守并突厥不敢南賢長城遠矣白察出禦入月令章句關在境所以察出禦入關市之征見賦稅門以察偽游漢書置關都尉以察偽游禁異服禮記關以禁異服反拒文選曰關門反拒漢得久長負阻奏負阻於二關卒開項而受沛無外識函谷之可關不知王者之無外善閉無關鍵司關周禮司關掌國貨之節以聯門市凡貨不出於關者舉其貨罰其人國凶札無關門之征關吏控其襟帶束為咽喉緘滕甸服扃鐍王畿何莫由斯不可踰也雖聖朝無外何假於關防而帝里宅中宜察其出入巨防重閉限其內外不可踰也察其出入何莫由斯謹關梁孟冬執禁禮曰關執禁以譏譏呵察也抱關之吏用傳之人崇其巨防察以偽游謁關用傳傳今之過所也漢興置關都尉以察偽游用傳出入漢文除關無用傳漢景復用傳棄繻漢書終軍初從濟南當詣博士步入關關吏與軍繻問以此何為吏曰為復還當以合符軍曰大丈夫西還終不復傳卻棄繻而去軍為謁者行郡國建節東出關關吏識之曰此使者乃前棄繻生買符東觀漢托郭丹初之長安過宛從陳兆買入關符以入亟谷關既入封符乞人曰不乘使車不出關丹自入關後十二年不歸後出關竟如本志徙漢武時楊僕征南越有功恥為關外人帝為徙函谷關於新安廢臧文仲廢六關孔子曰不仁也封東觀漢記隗囂將玉元謂囂曰請一丸泥為大王東封函谷此萬世一時也白馬桓譚新論曰公孫龍常爭論曰白馬非白人不能屈後乘白馬無符傳欲出關關吏不聽此虛言難以奪實也青牛列仙傳關令尹喜周大夫也善內學老子西遊先見其氣當遇聖人老子果乘青牛薄板車過授喜五千言俱之流沙雞鳴史記秦昭王囚孟嘗君乃改姓易名夜半至函谷關關法雞鳴出客恐追至客居下坐者能為雞鳴眾雞皆鳴遂得出關又燕太子丹質於秦秦王不禮丹怒而曰歸夜至關關門未開丹為雞鳴眾雞皆鳴遂得逃去生入漢書班超在絕域年老思歸乃上書曰不敢望到酒泉但願生入玉門關斬關傳曰臧紇犯門斬關以出徑踰越度閉關先王以至日閉關養孤門關以養孤符節門關用符節易關市來商旅易關市輕稅商旅也月令孟冬無索月令孟夏關市無索順陽敷教不難物也不租禮年不順成關梁不租譏而不征無驗商君亡至關不得舍曰商君令舍人無驗者坐之曰為法自敝詐刻傳寧成為中尉抵罪髡鉗乃解脫因詐刻傳出關亡歸復關君子所近叩關四方賓客叩關即告至偪介之關暴征其稅食門征宋公以門賞耏班使食其征開關延敵閉關備他盜苛留成帝詔勿苛留馬弩關漢詔罷馬弩關舊征馬高五尺六寸齒未平弩十石已上皆不得出關今不禁故曰罷籍內漢詔流人欲入關者籍內之注為籍內之也粟無用傳宣詔人以車載粟入關得無用傳謁關以從者數對周禮重門擊拆以待暴客蓋取諸豫門關關防仰關孔關通末游崔融時有司徙關市融上疏曰關通末游險道天下之關必險道同上禦暴關者御暴之所上閉韓滉為浙東西觀察使聞京都未平乃閉關梁奔突封常清安祿山度河常清奔陝語高仙之曰賊銳甚難與爭鋒潼關無兵一夫奔突則京師危不如急守潼關仙芝從之阨狹孔緯既及行在緯策攻必反建言關邑阨狹不足駐六師請幸梁州即日去陳倉而攻兵至息于河之陰自潼關出息于河之陰韓愈感二鳥賦過潼關而坐息同上抱關之阨陋兮有肆志之陽陽復志賦上天關悠悠不可援和皇甫湜上同吳關倚北固天險自茲設李白備胡借問潼關吏修關還備胡杜甫潼關吏連雲列戰格飛鳥不能踰同上千古用一夫同上艱難奮長戟千古用一夫一夫怒臨關百萬未可防劍門窺黃流之奔猛韓愈觀天地興襄隨時制事朱樸襄陽人議僉都曰古王者不常厥君家觀天地興衰隨時制事關中我實因之凡三百歲廣明巨盜陷覆宮闕比幸石門華陰十二之中又亡八九高祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東漢與鳳林為之關南菊潭環屈而流屬於漢西有上洛重山之險北有白崖乃形勝之地沃衍之墟若廣浚漕渠運天下之材可使大集自古中興之君去已衰之衰就未王而王今南陽漢光武雖起而未王也臣視山河壯麗多處故都已盛而衰難可興也謁歸壺關苗晉卿潞州壺關人充河北採訪使嘗入計謁歸壺關望縣門趣步吏諫止晉卿以公門當下況父母之邦乎萬古為要樞往來何時息韋應物詩天下關二十六有上中下之差度者本司給過所出寒踰月者給行牒獵手所過給長籍三月一易蕃客往來閱其裝重入一關者余關不議百官志惟天有設險劍門天下壯杜甫劍門詩視亟谷關若虎豹之窟柳宗元與楊誨之書視亟谷關若虎豹之窟羅之徒實使然也近靜潼關掃蜂蟻杜甫青絲詩大城鐵不如小城萬丈餘士卒何草草築城潼關道大城鐵不如小城萬丈餘杜甫潼關吏時清關失險峽口詩延州城北戶關防猶可倚杜甫高談先馬渡偽曉預雞鳴唐太宗入潼關詩霜峰直臨道冰河曲遶城同上襟帶壯兩京同上白開通月令三月開通道路無有障塞平易傳曰司空以時平易道路三條西京賦披三條之廣路九軌昔黃帝之為天子國中九經九緯經途九軌野途九軌九途文選詩九途平若水如砥周道如砥劇驂爾雅七達謂之劇驂言車馬多也八達謂之崇期九達謂之逵言交會多也方軌蜀都賦畫方軌之途康莊五達六達也並見爾雅大道青樓臨大道文選多岐楊朱曰大道多岐亡羊也甚夷大道甚夷而人好徑老子列樹國語周制有之列樹以表道鑿山東觀漢記衛颯為桂陽太守鑿山通道列亭置驛羊腸羊腸路詰曲車輪為之摧由左禮道路男子由左女子由右車從中央由徑行不由徑哭阮籍常率意獨駕不由徑車轍所窮輒慟哭而反泣楊朱泣岐路謂其可以南可以北讓路家語曰西伯化行而耕者讓畔行者讓路不拾遺子產相鄭路不拾遺銅駝洛陽大道有銅駝因名之石牛秦惠王欲伐蜀乃刻石牛置黃金於後曰此天牛能糞金蜀王以為然即遣五丁力士拖成道入蜀使張儀隨其路以伐蜀中衢上路銅街輦轂轍跡通衢道路無壅傳修道周禮修除治道周禮達其道路周禮司險以周知其山林川澤之阻而達其道路注達者謂山林之阻則開鑿之川澤之阻則橋梁之通道路也五塗又曰設國之五塗而樹之林以為阻固注五塗道路也藩塞又曰國有故藩塞阻絡而止行者謂閉要路以備姦寇道禁道路所禁者周禮端徑術月令孟春端正也徑步道也術車道也遵彼微行微行牆下行徑也野廬周禮野廬氏掌達國道路至于四畿時祭祀則率其屬修除徑踰禁野之橫行徑踰者合方氏掌達天下之道路不得津梁陷絕銜枚氏禁嘂呼歎嗚於國中者行歌哭於國中之道者雨畢而除道國語回中道武帝通回中道子午道王莽通子午道罷子午道後漢詔罷子午道通斜谷隨山刊道馬援拜伏波將軍緣海隨山刊道千里天衢易道周周曲也有蕩魯道有蕩阻長詩道阻且長宿息井樹舟車轚互者敘而行之謂迫隘處使有次序有爵者為之辟辟行人楬懸任器蜡氏掌若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人蜡音七預反除骴謂死人骨及禽獸骨骴禁禁謂孟春掩骼埋胔之屬修閭氏禁以兵革趨行者與馳騁於國中者塞蹊徑十月保路安道路人楚子西閉塗不通內外使左傳道無列樹列樹表周信視塗司空道笰定王使單襄公聘宋假道於陳道笰不可行謂草穢塞路羊腸若砥馬跡如流開通平易不踐邪徑焦光孝然行不踐邪徑必循阡陌所過糞除第五倫事具灑掃門隘巷詩誕寘之隘巷道而不徑禮言孝子慎身行不由徑澹台滅明字子羽阡陌風俗通南北為阡東西為陌相鄭呂氏春秋子產相鄭桃李垂於街衢束馬懸車任豫益州記江卣左擔道鄧艾束馬之處道塗不爭險易之利禮坦途泥塗見道路門送葬不避塗潦庶人還濘傳曰晉戎馬還濘而止謂遇泥濘盤旋不進辱在泥塗胡為泥中導從避泥魏先賢行狀曰鍾皓季明為司徒掾公出道路泥濘導從惡其相灑去公車絕遠公推軾言司徒今日仍獨行耳還府向閣鈐下疾令揖掾屬公奮手不顧時舉府掾屬皆投劾出皓曉之乃亡出淖晉侯與楚戰公陷於淖欒書欲載晉侯走鍼乃掀公出淖入泥呂錡夢射月中之退入於泥中逵吳都賦流汗霢霂而中逵泥濘雨雪載塗塗東釋與馬廉范叔度奔國喪時廬江郡掾嚴麟亦奉章弔國俱會于路麟乘小車塗深馬小不得進范愍之命從吏下焉牽與之不告姓名去麟後訪主將歸之人言恐是范果然致遠恐泥泥難不通蹶泥則沒足滅跗莊需于泥易如塗塗附詩淈其泥楚詞妾若濁水泥古詩禹泥行乘橇板置泥上通行音茅蕝漢涇水一石其泥數斗白公渠孔棧道杜讓能朱玫兵逼乘輿帝進狩梁是時棧道為山南石君涉所與天子間關險澀讓能未嘗暫去側險澀齊映奔奉天授御史中丞徒幸梁道險澀常為帝御狩山南陸贄狩山南也道險澀與從官相失夜召贄不得帝驚且泣九折柳文懲咎賦御長轅之無撓兮行九折之峨峨治斜谷道封敖大中中歷平盧興元節度使鄭涯開新路水壞其棧敖更治斜谷道行者后便千里蕭條亭舍不煙郭子儀奏洛陽東薄鄭汴南界徐北綿懷衛及相千里蕭條亭舍不煙天威高駢鎮安南使者歲至乃鑿道五所置兵護送其徑有青石或傳馬援所不能治既攻有震碎其石乃得通因名道曰天威云板築所成韋安石后嘗幸興泰宮議趨疾道安石曰此道板築所成非自然之固千金子且誡垂堂況萬乘可輕乘危哉后為回輦鄣梗顧彥卿王建攻成都彥卿挾故憾與并方道路鄣梗敬瑄告難于朝迴山取塗地里志貞元七年剌史李西華自藍田至內鄉開新道七百餘里迴山取塗人不病涉謂之偏路蜀道難韋皋始天寶時李白為蜀道難篇以斥嚴武陸暢更為蜀道易以美皋焉龍尾道安祿山逆謀日熾每過朝堂龍尾道南北睥睨久乃去縈山繞川唐文粹李華言醫道路綿綿縈山繞川馹遽之途欹危隘束其醜尚存使如周道在公顧指耳劉禹錫驛路記棧閣盤虛下臨咸呀層崖峭絕擔太亙鐵因而廣之限以鈆欄狹徑深陘銜尾相接從而拓之方駕從容急宣之騎宵夜不惑上郤曲稜層一朝坦夷駃行者忘其勞吉行者徐其駐拏行者家以安貨行者肩不病徒行者足不繭乘行者蹄不刑同上不繇其道北轅適楚南轅適晉是不可到不繇其道故也劉軻上崔相書裙腰路白樂天杭州春望云誰開湖寺西南路草綠裙腰一徑斜注孤山寺路在湖州中草綠時望如裙腰念西路之差永韓愈詰曲七轉含元殿側龍尾道自平階至地凡詰曲七轉由丹鳳門北望宛如龍尾下垂於地兩根欄檻悉以青石為之至今五柱猶有存者南部新書天網恢恢去將何適朱泚敗走昏迷不辨南北因問路於田父父曰豈非朱泰尉耶源休止之曰漢皇帝父曰天地不長惡蛇鼠不為龍天網恢恢去將何適遂亡所在南部新書風伯清麝狄仁傑帝幸汾陽官為知頃使并州長史李沖玄以道出妒女祠俗言盛服過者致風雷之變更發卒數萬改馳道仁傑曰天子之行風伯清塵雨師灑道何妒女避耶止其役帝壯之曰真丈夫哉回復柳宗云夢歸賦若有鉥余以往路兮馭儗儗以回復披榛得微路杜甫詩豈無平肩輿莫辨望鄉路杜甫雨詩緣江路熟俯青郊堂成詩道路時通塞歸夢關塞蕭條行路難宿府去旁干戈覓來看道路通送弟赴齊州路危行水杪山館詩野水平橋路遣興失路武陵源同上畏途巉巖不可攀李白蜀道難卜築應同蔣詞徑杜甫詩千巖萬轉路不定李白詩行路難何有招尋興已專杜甫詠懷欲渡黃河冰塞川欲登太行雪暗天李白行路難越鳥從南來胡鴈亦北度我欲彎弓向天射惜其中道失歸路同上歷九折而直奔兮固摧轅而失途柳宗元佩韋賦白申畫郊圻書八則周禮八則治都鄙注都之所居曰鄙公卿大夫采地王子弟所居邑封人中士四人掌設王之社壝為畿封而樹之凡封國設其社稷之壝封其四彊注封國建諸侯立其國之封遂人主六遂若司六卿自遠郊達干畿中遂士掌四郊主四郊之獄方士掌都家注四百里至五百里公所食也都王子弟及公卿采地大夫采地穎谷封人穎考叔也封人典封疆者畿疆大司徒制其畿疆而溝封之刑方氏制方國地域而正其封疆經略撫封傳曰天子經略諸侯撫封封畛彭仲爽為楚令尹封畛於汝開封畛北至于汝水疆場之事慎守其一備其不虞隙地宋鄭之間有隙地宋鄭為盟曰勿有是注各勿有之史東胡與匈奴間中有棄地千餘里各居其邊為甌脫東胡請於冒頓吾欲有之冒頓怒曰地國之本也遂襲滅東胡注甌脫界上屯守處女爭桑楚邊邑卑梁氏之處女與吳邊邑妾爭桑二家怒相滅邊邑怒而攻吳楚之釁始於邊女割地相與燕莊王送齊桓公入齊境公曰非天子命諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至地與之拓土畫疆疆場有氏疆場之邑一彼一此何常無之引其封疆引正也封疆之削何國蔑有主齊盟者誰能辯焉注辯治也疆事封疆之事自疆場之邑至此晉趙孟請楚不戮叔孫豹之辭見左昭元年子產云四有溝洫注云封疆溝洫疆場綺分選諸侯正封封疆有定分也疆場無主則啟戎心候不在疆送迎賓客單襄聘楚假道於陳知國必亡孔拓地開彊房玄齡上疏曰陛下拓地開疆亦可止矣斥地王忠嗣徙河東節度使自朔方至雲中袤廣數千里據要險築城堡斥地甚遠議棄豐保靈夏唐璿永淳中突厥圍封豐州都督崔智辨死朝廷議棄豐保靈夏休璟以為不可上疏定彊畛蘇烈縳賀魯以還定彊畛封畛比聯裴度李師道怙強勸帝誅之田弘正請字黎陽濟合諸節度曰魏博軍度黎陽即叩賊境封畛比聯易生顧望不出城隍未遊宮室楊炯少姨廟碑東漸西被南馳北走盧敖之窮觀六合不出於城隍陶侃之飛入八門未遊於宮室發兵戍疏勒狄仁傑諫曰天生四夷皆在先王封域之外東距滄海西隔流沙北橫大漢南阻五嶺天所以限中外也自典籍所紀聲教所暨三代不能至者國家既已兼之詩人矜薄伐於太原化行於江漢前代之遐裔而我之域中過夏商遠矣圖海內華夷賈耽尤悉地里圖海內華夷廣三丈從三丈三尺以寸為百里并撰古今郡國縣道四夷述述中國本之禹貢外夷本班固漢書古郡國題墨今州縣以朱刊落疏舛多所厘正帝善之學長於地里山川險易方隅物產兵戍眾寡無不詳鄭虔白申畫郊圻遂士掌四郊注主四郊之獄周禮郊勞聘客至郊使人郊勞太學在郊邑外謂之郊爾雅郊迓郊迎近郊遠郊多壘禮曰四郊多壘卿大夫之辱不雨易曰密雲不雨自我西郊適彼樂郊詩孔郊謁李光弼乾元元年入朝詔朝官四品已上郊郊迎裴度田弘正獻魏博六州干朝憲宗遣度宣諭弘正知度為帝高選故郊迎趨跽受命迎氣玄宗開元二十六年正月迎氣于東郊屏處溫輔國屏處郊野貧寓郊墅崔元韓澄境清露澄境遠韋應物郊原草樹滋同上跨馬出郊時極目不堪人事自蕭條見杜甫野望詩凡京兆河南二都其近為四郊唐六典水部凡京兆河南二都其近為四郊三百里皆不得弋獵採捕野八白牧外謂之野爾雅大野既瀦東原砥平我行其野蔽第其樗婚姻之故言就爾居詩適野太叔適野祭於野傳辛有遇伊川見被髮而祭於野者曰不及百年此其戎乎其禮先亡矣乞食於野人又晉文公過衛出於五鹿乞食於野人野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之謀於野又裨諶能謀謀於野則獲謀於國則否鄭國有難子產載以如野謀四國之事哭孔子惡野哭者哭所識者則於野又韓詩外傳曰孔子出遊少原之時郊野之富有死鹿死磨所知吾哭諸野在野曰廬野無青草莽蒼食野之苹之芩之蒿失禮求之野割鮮野食經野體國經野獲麟西狩大鹿野獲之君子在野野無遺賢孔耕宜城野甄濟子逢及長耕宜城野丐食野中孝友傳支叔才隋末荒饉夜丐食野中還進母在野曰廬野無青草莽蒼食野之苹之芩之蒿失禮求之野別墅李林甫薛王別墅勝麗甲京師以賜林甫茫蕩之野王績之仕以醉失職鄉人靳之托無心子以見趣曰無心子以穢行聞越王黜之無慍色退而適茫蕩之野廛野史德義居虎丘山騎牛帶瓢出入廛野草野隱逸序古之隱上焉者身藏而德不晦故自放草野而名姓從之寬閑之野耕於寬閑之野韓文霧野韋應物寄楊邈詩霧野騰曉騎綠野堂裴度午橋別墅作綠野堂彊畛相望元載膏腴別墅彊畛相望平泉莊劇談錄李德裕東都平泉莊去樂城三十里卉木臺榭若造仙府有虛檻對引泉水縈回疏鑿像巫峽洞庭十二峰九泒迄于海門江山景物之狀以間行徑有平石以手磨之皆隱隱見雲霞龍鳳草樹之形初德裕營平泉遠方之人多以異物奉之有題平泉詩曰隴右諸侯供語鳥日南太守送名梳地卑荒野大杜甫遣興曠野懷咫尺白水崔少府詩出野馮高李義府君母喪朔望給告即贏版與元紀出野馮高窺覘災眚眾疑其有異謀別野在輞川地奇勝王維別墅在輞川地奇勝有華子岡欹湖竹里館柳浪茱萸淮辛夷塢與裴迪游其中賦詩相酬對為樂閭里九白五家為比使之相保保任也五比為閭使之相受四閭為族使之相葬五族為黨使之相賙五州為鄉使之相賓鄉師稽其鄉器比供吉凶二服閭供祭器族供喪器黨供射器州賓器鄉供吉凶禮樂之器若國有大故則鄉大夫各守其閭以待政令族師各掌其族之成令政事以邦比之法五家為比十家為聯五人為伍十人為聯四閭為族八閭為聯使之相保相受刑罰慶賞及相告以受邦賦以役國事以相葬埋比長各長其比之治五家相受相和遂人掌邦之野以土地之圖經田野造縣鄙形體之法五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁同里漢盧綰與高祖同里入里門內史石慶醉歸入里門不下車萬石君聞之對按不食高陽後漢荀氏舊里名西豪穎陰令康以高陽氏有才子八人荀氏亦八子故改其里為高陽里里仁為美賊不入閭袁閎事見義感門無閉月令孟夏門閭無閉龐公閭里龐公鑿井得銅必步門閭溝渠必步閭左秦發式武主式商容之閭迴車曾參迴車勝毋之里式干木閭魏文侯式叚干木閭聽閭里以版圖太宰以官府之八成經邦洽三曰聽閭里以版圖敬桑梓見閭里門必式禮入里必式父母之國後漢張湛子孝罷馮翊告歸平陵望寺門而下步主簿曰明府位尊不宜自輕湛曰禮下公門式路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉惟桑與梓必恭敬止詩與鄉人處由由然不忍去柳下惠孔子於鄉黨恂恂如也語里旅齊景公欲更晏子宅辭云敢煩里旅注旅眾也孔鄉壤李勣韋城翟讓為盜勣往從之說曰公鄉壤不宜自剽殘鳴珂里張嘉祐嘉貞弟嘉貞為相時任右金吾衛將軍昆弟每上朝軒蓋騶導盈閭巷時號所居坊曰鳴珂里居巢劉子玄封居巢縣子鄉人以其兄弟六人俱有名號其鄉曰高陽里曰居巢同里韋貫之或薦之京兆尹李實舉笏示所記曰此其姓名也與同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷望縣門輒步苗晉卿潞州壺關人充河北採訪使嘗入計謁歸壺關望縣門輒步吏諫止晉卿以公門當下況父母邦乎郡太守迎犒使所屬令行酒酒至必立飲白釂侍老有獻降西階拜而飲時美其恭恭先世王師範以青州父母所籍每縣令至具威儀入謁令固辭師範遣吏挾坐拜廷中乃出或諫不可荅曰吉恭先世且示子孫不忘本也高陽里賀德仁兄弟八人時比漢荀氏太守鄱陽王伯山改所居甘澇里為高陽云閭井無煙安祿山傳英魚朝恩等不能戢軍與回紇縱掠延乃鄭汝閭井至無煙安邑李丞相李吉甫居安邑里時號安邑李丞相與閭里耆老相樂司空圖每歲時祠禱鼓舞圖與閭里耆老相樂衣白襴謁縣令五代馬全節初徒黃晉過元城衣白襴謁其縣令州里以為榮相賀君侯至之初閭里自相賀韓合江亭依然此來江南近里閭故依然同上示爽詩閭里懷離別之思論淮西上虎穴連里閭隄防舊風俗杜甫課伐木邑里丘墟陸宣公德宗奉天改元赦離去鄉閭邑里丘墟人煙斷絕松楸浸遠一品集謝賜贊皇縣公桑梓雖存久隔兵戈之地松楸浸遠已絕霜露之思落妃池注亦如王昭君生於峽州有昭君村綠珠生於白州有綠珠江出楊妃外傳經過歎里閭杜甫贈李秘書阮郎迷里巷元稹代曲江老人城郭巋然桑梓如舊張說起義堂頌不游里巷王代崔稅遭世亂寓居于滑臺不游里巷十餘年人罕識其面梁貞明三年舉甲科號所居為樂城鄉三柱里劉仁軌進爵為公子及兄子受上柱國者三人州黨榮之號所居為樂城鄉三柱里白國野周禮凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積置驛漢鄭莊置驛以延賓客公館私館候館館榖行李往來供其乏困公食使車傳舍行人適子之館館給詐傳魏相字弱翁為茂陵令御史大夫桑弘羊客詐乘御傳傳縣相疑有奸案致其罪壞館垣子產相鄭伯如晉以魯喪未見子產使壞其館垣以納車馬士文伯讓之子產曰諸侯舍於隸人門不容車而不可踰越賓見無時命不可知請執事將何所命若獲薦幣修垣而行君之惠也趙簡子曰信我實不德而以錄人之垣以嬴諸侯是吾罪也使士文伯謝不敏晉侯見鄭伯而有加禮厚其宴好而歸之乃築諸侯之館子姑就館改館晉侯具七牢縣次續食鄭當時置驛馬四郊迎賓客縣次與續食注云路次也傳置驛名賦傳傳郵賦給飾廚傳聚柝野廬氏掌達國道路至于四畿比國郊及野之道路宿息井樹若有賓客則令守涂地之人聚柝之有相翔者則誅之蘧廬莊子曰仁義先生之蘧廬蘧廬舍一宿而去司空不授館不受客單襄公聘楚假道於陳言陳必亡國語不修薛宣子惠為彭城令宣過之橋梁郵驛不修知其不能高其閈閎厚其牆垣以無憂客使左傳長亭短亭十里五里長亭短亭言十里一長亭五里一短亭息亭傳劉寵免太尉歸清儉出京師欲息亭舍亭吏止之曰整頓以待劉公寵不言而去時人稱其長欲止郵亭趙孝長平王莽時父為田禾將軍以父任為郎嘗告歸步擔欲止郵亭亭長不納問曰聞田禾將軍子當過何時至孝曰尋將到請亭地作塚漢張禹年老自起塚塋好平陽肥牛亭部處地又近延陵奏請求之上以賜禹詔平陵徙亭他所曲陽侯王根問而爭之此地發平陵寢廟衣冠出遊道禹為師傳不遵謙讓至求衣冠所游之道又徙壞舊亭非所宜孔子稱賜汝愛其羊我愛其禮宜賜他地上卒以肥牛亭地賜之投傳不受申屠蟠事見義感門授館閱人多矣蓋寬饒許伯第曰如此舍閱人多矣驛馬見館驛門使車避傳伯宗避重曰避傳傳置漢文帝詔太僕見馬遺財余皆給傳置注遺留也財與纔同傳置驛也具私馬漢王溫舒為河內守具私馬五十匹自河內至長安以奏事迎賓客鄭莊見上注駿奔載馳載驅遽令驛馬軍書乘傳遄征遄往馹騎乘馹馹遽傳左氏曰楚子乘馹星軺軺車使車也孔馳馹溫造使幽州還詔馳馹入奏飛驛以達警急馬周飛驛以達警急皆周建白三梁十驛裴耀卿天子東巡耀卿置三梁十驛創堠徐申遷韶州剌史徙治故州創驛堠復驛堠十一區李吉甫請起夏州至天德復驛堠十一區以通緩急驛置多闕柳公綽長慶元年復為京兆尹時幽鎮用兵補置諸將使馹係道公綽奏曰比館遞匱乏驛置多闕敕賜衣緋紫者所乘至三四十騎黃緣者不下十數吏不得視券隨口輒供驛馬盡乃掠奪民馬怨嗟驚擾行李殆絕特著定限以息其蔽有詔中書條檢定數得紓吏罪擅乘驛馬高元裕以祐補闕召道商州會方士趙歸貞擅乘驛馬元裕詆曰天子置驛爾敢疾驅耶命左右奪之還具以聞邊奏係驛崔珙起為鳳翔節度使方是時西戎歸故地邊奏係驛議所以緩接珙坐不自力避事下除太子少師驛馬疲耗盧鈞拜華州剌史關輔驛馬疲耗鈞為市健馬率三歲一易自是無乏事舍之外郵顏杲卿常山太守祿山反李欽湊夜還杲卿辭城門不可夜開舍之外郵使履謙及參軍馮虔郡豪翟萬德等數人飲勞既醉斬之通隘道作傳舍韋景駿遷房州剌史通隘道作傳舍乘傳過家仲子陵蜀人典黔中選補乘傳過家西人以為榮豫集劉憲父思立在高宗時為名御史時河南北大旱詔遣御史中丞崔謐等分道賑贍思立建言賑給須立薄最稽出入往返停滯妨廢且廣若無馹處馬須豫集以一馬勞數家置驛相望劉晏諸道巡院軍皆募馱足置驛相望同魚鱗府西三百里候館同魚鱗韓愈酬裴十六曲河晨及曲河驛凄然自傷情群烏巢定樹乳鵲飛簷楹韓愈詩驛樓衰柳側縣郭輕煙畔一川何綺麗蓋日窮壯觀杜甫詩告至告去之役不絕于道華人夷人往復而受館者旁午而至傳吏奉符而閱其數縣吏執牘而書其物告至告去之役不絕於道柳州元館驛壁記寓望迎勞之禮無曠於日同上褒城驛號天下第一至有飼馬於軒宿隼於堂凡所以污敗室廬糜毀器用日益辟破不與曩類孫樵書褒城驛勞迎餞別劉禹錫管城驛記勞迎展蠲潔敬餞別起登臨之思傳舍之尤走轂奔蹄遄正急宣入而忘勞出必屢頸其傳舍之尤乎上同陽城驛元稹詩商有陽城驛名同陽道州陽公沒已久感我淚交流又祠曹諱羊祐此驛何不侔我願避公韓名為避賢郵驛千六百三十九凡三十里有驛驛有長舉天下四方之所達為驛千六百三十九唐史百官駕部通驛公館南有水亭四薨翬飛巉絕浦嶼蓋為接輶軒祖遠客之隹境也李白姑熟亭序野館濃花發杜甫送司馬詩使塵來驛道遣問同上微冥水驛孤入洞庭詩停舫臨孤驛韋應物馬次旰胎館驛之制於千里之內尤重自萬年至於渭南其驛六自灞而南至於藍田其驛六自長安至於盩厔其驛十有一自武功而西至于好畤其驛三自渭而比至于華原其驛九自咸陽而西至于奉天其驛六由四海之內總而合之以至于關由關之內束而合之以至于王都柳宗元記任官人為館驛使裴潾兩河用兵憲宗任官人為館驛使檢稽出納有曹進玉者尤侍恩倨甚使者過至加捽辱宰相李吉甫奏罷之會伐蔡復以中人領使潾諫曰凡驛有官專尸之畿內以京兆尹道有觀察使剌史相監臨臺又御史為之使以察過闕猶有不職則宣明科條督責之誰不惕懼若復以官闈臣領之則內人而及外職分亂矣驛門十二辰候開元二十九年命觀風使鄭審檢校兩京驛門即今門置十二辰候自審始也事姑村館泊好木韓愈聯句臨驛卷緹幕外堂接繡衣李白郵傳劇道崔衍郵傳劇道屬歲無秋治亭館千餘區五代馮暉徙鎮靈武治倉庫亭館千餘區白虹橋星壽辰華陽記李冰造七星橋上應七星牽牛秦始皇并天下都咸陽瑞門四達以制紫官渭水貫都以象天河橫橋南渡以法牽牛濟川黿鼉紀年曰周穆王三十七年伐荊東至九江比黿鼉為梁而渡文選方架黿鼉以為梁烏鵲淮南子烏鵲填河成橋而渡織女驪龍思玄賦曰驪龍之飛梁梁溠左除道梁溠謂作橋於溠水上造舟為梁詩水涸成梁徒杠輿梁孟子曰子產脫輈濟人是惠而不知其政十一月徒杠成十二月輿染成人不病涉也徒杠小橋輿梁大橋溴梁梁莫大於溴梁爾雅石杠不修見館驛門注游張良步游下邳圯上注楚人謂橋為圯浮魏志鄧艾伐蜀先作浮橋陷鍾會伐蜀先令牙門將許人儀治道橋陷馬足斬儀黿鼉見上魚鱉論衡曰高麗國王有侍婢自云氣如雞子來下我故有身後生子名曰東明東明善射王恐害其國欲殺東明東明走至淹水以弓擊水魚鱉浮為橋而渡枕席趙充國奏治湟陝以西道橋七十所全可至鮮水左右以制西域信威千里如從枕席上過師川不梁單襄公過陳見川梁飛梁橋也見螭龍注題柱司馬相如往京師過蜀郡升僊橋題其柱曰不乘駟馬不復過此以濟不通以濟要津達川澤之阻司險知川澤之阻而達其道路注謂以橋梁通啟塞從時門戶道橋謂之啟城郭牆漸謂之塞開閉之急不可一日而闕故墮壞而治之不可限以土功造舟見上鞭石秦始皇作石橋欲過海有神人能驅山石下海石去不速神輒鞭之流血墮履黃石公舉杯晉書杜預字元凱請建河橋於建乎津眾論以為殷周所都經聖賢而不作必不可作也預曰昔造舟為梁則河橋之謂遂作成上臨會舉杯曰非卿也此橋不立預曰非陛下聖明不成必葺之功功濟行路川惟設險橋用濟人苟或騫崩則勞揭厲人無褰裳車不濡軌道路無擁用濟車徒以利來往苟騫崩之葺雖揭厲而莫通當啟塞之急誠合從時有懷襄之虞如何寘力石鱉晉成都王穎字章度屯汲南阻清水為壘造浮橋通河北以木函盛石沈之以繫橋名曰石鱉崔公橋後魏崔亮渭水為橋利百姓名崔公橋三柱折魏略洛水浮橋三柱折三公象也豫讓橋下尾生抱梁柱以待女子鴈齒橋有鴈齒半月橋似半月孔止過車者權萬紀族孫懷恩嘗過汴州時剌史楊德幹與懷恩名相埒汴橋新成立木中涂止過車者懷恩適過之示德幹曰民不可止耶焉用此德幹慚服築道為橋梁閻立德從征遼師還至遼澤亙二百里淖不可通立德築道為橋梁無流行累石代柱李昭德洛有二橋司農卿韋機徙其一直長夏門民利之其一橋廢省巨萬計然洛水歲淙齧之繕者告勞昭德始累石代柱銳其前廝殺暴濤水不能怒自是無患徙洛中橋韋洪機徙洛中橋於長夏門廢利橋人便之天子乃登洛北絕岸延眺良久嘆其美揣廣狹為橋賈循京兆華原人張守珪北伐次灤河屬凍泮欲濟無梁循揣廣狹為梁以濟大夫橋張志和築室越州東郭觀察使陳少游往見為終日留先是門阻流水無梁少游為創之人號大夫橋爭橋李密王世充進薄其壘密提敢死士數百邀之世充大潰士爭橋溺死者數萬洛水為不流以韋笮維大艦為浮梁李存晉進軍德勝為南北寨每以舟兵來往頗以為勞而河北無竹石存晉乃以葦苲維大艦為浮梁莊宗大喜解衣以賜之五代史橋壞覆民租車王周四鎮皆有善政定州橋壞覆民租車周曰橋梁不修剌史過也乃償民粟為治其橋斷橋李愬取吳元濟道分輕兵斷橋以絕洄曲道三腳木為橋杜重威朔州人契丹寇鎮定轉運使李谷教重威以三腳木為橋募敢死士過河擊賊梯橋唐舊史裴度立第於東門集賢里有風亭水榭梯橋架閣作機橋維以長緪康承訓屯海州度賊至作機橋維以長緪賊半度緪絕士溺死度者不得戰殲之航橋郭子儀史思明自魏來王師南潰子儀以朔方軍保河陽斷航橋兵扼河橋王建及梁進戰柏鄉相距鄗邑野河上鎮定兵扼河橋梁兵急擊之莊宗登高望見鎮定兵將敗顧建及曰橋為梁奪則吾軍危矣柰何建及選二百人馳擊梁兵梁兵輒解去出五代史唐臣傳比舟為梁與波外降柳宗元永州訾家洲亭記浮黿沒鵲文粹柳司功石橋銘架海維河浮黿沒鵲力將岸爭勢與空鬥文粹張彧石橋銘虹舒電拖虎步雲就力將岸爭勢與空鬥月挂虛簷星羅伏獸長橋臥波未雲何龍杜牧阿房賦飛橋上架漢韓愈初月出雲長虹飲澗趙州石橋望之如初月出雲長虹飲澗天后時默啜欲南過至橋上忽馬不進見青龍臥橋下乃去朝野僉載文虹橋宋之問文虹橋兮彩鷁舟唐太宗浮橋詩水搖文鷁動纜轉錦衣縈出初學記驅石架滄津李白古風秦皇按寶劍赫怒振威神逐日巡海右驅石架滄津徵卒空九寓作橋傷萬人伐竹為橋結創同褰裳不涉往來通杜甫詩日落青龍見水中天寒白鶴歸華表日落青龍見水中野橋分仔細觀山水圖同上橋維萬里檣杜甫酬門下相公舊制橫緪百丈連艦千艘辮修苲以維之繫圍木以距之亦云固矣然每冬冰未合春泫初解流澌崢嶸綆斷航破無歲不有開元十二載授彼有司俾鈇代竹賦晉國之一鼓法周官之六齊結為連鎖鎔為伏牛偶立於兩岸襟帶於中潬鎖以持航牛以縶纜亦將厭水物奠浮梁奔測不突積凌不隘張說蒲津橋贊蒲津河橋天下之要津也唐明皇詔鑄鐵牛八頭柱二十四條連鎖一十二條山架八所牧人八枚於中潬分立亭亭有虹霓之狀實萬代之奇絕也又詔中書令張燕公說制河橋贊樹于中潬之上紀異記人不履危柳宗元興州江運記杠梁以成人不履危南浦清江萬里橋野望杜甫野橋齊馬度同上橋斷卻尋溪蜀山行同上飛橋上架漢韓文擲巾為橋崔生入山遇仙女為妻久之還客得隱形符潛游宮禁為術士所知追捕甚急逃還山中追者在後隔洞見其妻告之妻擲其領巾為五色橋度崔徹杠彴高麗帝度遼水徹杠彴彩虹乘橋斷彩虹李白送溫處士
