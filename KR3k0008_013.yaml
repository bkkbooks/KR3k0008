body:
  text: 卷第十三白龜顧會稽傳孔愈嘗放龜溪中流左顧數四及愈封侯鑄印而龜左顧更鑄亦然工以問愈愈悟乃取佩之字敬康鵲翔張皓為梁相雨後有山鵲翔化為圓石皓推破之得一金印文曰忠孝侯印龜鈕漢舊儀諸侯正印黃金橐駝鈕文曰璽列侯黃金龜鈕文曰印丞相黃金龜鈕文曰章二千石銀印六百石銅印鼻鈕文曰印也鼻鈕見上印章滅私印銘乃設印章作信萬國篆文刓敝史記曰項羽欲封人印刓敝而不與弄印史記周昌既為趙相高祖以御史大夫印弄之視堯曰此印無易堯者遂拜之六國蘇秦佩六國印奉以行之守而勿失彤鏤傳信以守器官不易方不言而信示人有信範金禮操漢王使張良操印立韓信為齊王方寸淮南王上書陛下以方寸之印文二之組鎮於方寸懷其印綬朱買臣拜會稽大守懷其印綬而入會稽郡相印魏許允宗士宗遷鎮北將軍允善相印將拜不善使更刻之如此者三允曰雖始成而已被辱問送印者果被懷而墜於廁銀黃黃金印銀綬是謂銀黃郡縣公晉輿服志郡公縣公縣侯大夫夫人銀印青綬佩水蒼玉買臣懷淵明棄天道漢武令刻玉印賜欒大文曰天道將軍使使衣羽衣夜立白茅上五利將軍亦之白茅上受印以示不臣土數漢武時據上數五故五字為印文若印文不足五字則以之字足之蔡澤懷金印結紫綬於腰言其足矣刻六國印漢王納酈生之言欲立六國後曰趣刻印先生因行佩之矣銷六國印漢王聞張良言不可立六國後曰趣銷綰皇帝璽得印一匱秦時自相署置官之印也夏候嬰從擊秦得之假印綬晉輿服志假印綬而官不給鞶囊得自具作但印綬不假假者不得佩綬鞶古制也漢世有鞶囊者佩在腰間或謂之綬囊符銅虎符漢文帝初與郡守為銅虎一至五合符乃受各分半留在京師竹使符竹符五枚長五寸錐畫篆書一至五以代古之圭璋伍符軍中伍伍相保之符孔緑綟綬王世充為太尉尚書令加黃門印緑綟綬許上印綬裴寂遷左僕射帝置酒含章殿歡甚寂頓首曰始陛下發太原約天下已定許上印綬今四海妥安願賜骸骨歸田里佩四將印王忠嗣為河西隴右節度使權朔方河東節度佩四將印倒用司農印追兵段秀實會源休教朱泚偽迎天子遣將韓旻領鋭師三千疾馳奉天秀實以為宗社之危不容喘乃遣人喻大吏岐靈嶽竊取令言印不獲乃倒用司農印追其兵不敢久當印程忌以錢榖奮而至宰相自以非人望不敢久當印監軍印宗室説馬燧節度太原辟署少尹李自良代燧自良卒説與監軍王定遠祕其喪詔以通主為節度使授説行軍司馬節度留後定遠自以有勞於説頗橫恣請別賜印監軍有印自定遠始郡印柳文懲咎賦幸皇鑒之明宥兮纍郡印而南適假印李藩李吉甫復相藩頗沮止會吳少陽襲淮西節度吉甫已見帝潛欲中藩即奏曰道逢中人假印節與吳少陽臣為陛下恨之帝變色不平翌日罷藩為太子詹事遣妻子懷印間道走京師盧奕黃門監懷謹子也留臺東都兼知武部選安祿山陷東都吏亡散奕前遣妻子懷印間道走京師挈尚書印走河陽劉允章為東都留守黃巢至分司李磎挈尚書印走河陽允章寄治河清巢僣號輒受偽官文書盡用金統遣取印磎所磎不與更悔愧移檄近鎮起兵捍賊磎持印還之獻定國寶十三帝紀元年建已月肅宗寢疾乃詔皇太子監國而楚州獻定國寶十三因曰楚者太子所封今天降寶於楚宜以建元乃以元年為寶應元年傳國八璽竇建德斬于長安市齊善行乃與裴矩及建德妻奉山東之地傳國八璽來降六合大同印肅宗在靈武鑄印追兵文曰六合大同印鄴侯傳白版侯武后時封侯者衆鑄印不供至有白版侯者僉載軍符侯印取豈遲杜甫枉裴道州手札軍符侯印取豈遲紫燕緑耳行甚速重垂重印押千官金窠篆字奇屈盤李白印綬煒煌劉禹錫謝金紫御印彤管內人書細膩金奩御印篆分明元稹鑄銀印董昌即偽位鑄銀印方四寸白順天治國之印金銀不供於印辛替否曰陛下倍百行賞倍十增官金銀不供於印玉璽金印晉宗室延煦挈丹滅晉出帝與太后遣延煦延寶齎降表玉璽金印以歸契丹挈丹得璽以為製作非工與前史所傳者異命延煦等還報求真璽出帝以狀答曰頃潞王從珂自焚於洛陽玉璽不知所在疑已焚之先帝受命命玉工制此璽在位群臣皆知之乃已金龜印唐杜陽編順宗元和五年給事中張維則自新羅使回云於海上泊洲島間見花木臺殿有數公子命一青衣捧金龜以授維則乃置之於寶函復語維則曰致皇帝還舟中回顧舊路悉無蹤迹金龜印長五寸上負黃金玉印面方一寸八分其篆文曰鳳芝龍木受無疆維則達京師即具以事準上曰朕前世豈非仙人乎倒用都統印李嵩劉皇后聽讒者言陰遣人之蜀教繼岌殺崇韜人情不安嵩入見繼岌曰王何為作此危事誠不能容崇韜至洛誅之何晚今遠軍五千里不見咫尺之詔殺大臣動搖人情是召亂也繼岌曰吾亦悔之奈何嵩乃召書吏三四人登樓去梯夜以黃紙作詔書倒用都統印告諭諸軍人心乃定五代史玉册金印唐莊宗入洛鏐遣使貢獻求玉册莊宗下其議於有司群臣皆以謂非天子不得用玉册既而許之乃賜鏐玉册金印兵越世家天子有傳國璽及八璽皆玉為之唐車服志神璽以鎮中國藏而不用受命璽以封禪禮神皇帝行璽以報王公書皇帝之璽以勞王公皇帝信璽以召王公天子行璽以報四夷書天子之璽以勞四夷天子信璽以召兵四夷皆泥封大朝會則符璽郎進神璽受命璽于御座行幸則合八璽為五舉函封從于黃鉞之內同上藏而不用太皇太后皇太后皇后皇太子及妃璽皆金為之藏而不用太皇太后皇太后封令書以宮官印皇后以內侍省印皇太子以左春坊印妃以內坊印同上初太宗刻受命玄璽以白玉為螭首文曰皇天景命有德者昌武后改諸璽皆為寶中宗復位復為璽開元六年復為寶天寶十載改傳國寶為承大寶同上初高祖入長安罷隋竹使符班銀葂符其後改為銅魚符以起軍旅易守長安都留守折衝府捉兵鎮守之所及左右金吾宮苑總監牧監皆給之畿內則左三右一畿外則左五右一左者進內右者在外用始第一周而復始同上交魚巡魚符宮殿城門給交魚符巡魚符開門閉門符左廂右廂給開門閉門符蕃國亦給之雄雌各十二銘以國名雄者進內雌者付其國朝貢使各齎其月魚而至不合者刻奏傳信符以給郵驛通制命雙龍符皇太子監國給雙龍符左右皆十留守給麟符兩京北都留守給麟符左二十右十九東方諸州給青龍符南方諸州朱雀符西方諸州白虎符北方諸州玄武符皆左四右三左者進內右者付外行軍所亦給之以上並唐志白平權衡月令仲春仲秋日夜分則命有司平權衡欺以輕重禮之於正國也猶衡之於輕重也故衡誠懸不可欺以輕重誠蕃也折平於物作信於人錙銖斤兩謹權量四方之政行焉惟器有信則人不爭和均平施稱物平施作法於平示人以信同其數器謂權衡不得異輕重同利也黍纍律歷志權性重不失黍纍任權權衡者衡平也權重也可以任權而平輕重也以群之正繩之直左旋見規右旋見矩在於天也左助旋璣斟斗建指以齊七政故曰五衡也五權五權之制以義立之以物均之餘於小差輕重為宜圜而環之今肉倍好鑄形如環周旋無端終而復始也衡權輿物均而生衡衡運生規規圜生矩矩方生繩繩者直生準準正則平衡而均權矣是為五繩者上下端直經緯四通準繩連體衡權合德百工繇焉以定法式信者誠誠者直故為繩職在大行鴻臚掌之注均平遠近故在鴻臚也用於出納資以和均為醫改晉裴頠為醫方人命所急而稱兩與古不同失神農岐伯之政為害特重宜因此改理權衡孔置東西市柳仲郢拜京兆尹置權量於東西市使貿易用之禁私製者衡者稱也權者錘也陸贄楚琳狀權宜之為義取類權衡衡者稱也權者錘也故權在於衡則物之多少可準權施於事則義之輕重不差增之銖兩則俯反是則仰夫觀文章者宜若懸衡然增之銖兩則俯反是則仰無可私者柳宗元答吳秀才書納以大稱為工商者雜良以苦偽內而華外納以大稱斛以小出之欺奪北門戇民銖積粒聚以至于富杜牧之新造南亭紀揣其鈞石銖黍將子為巨衡以揣其鈞石銖黍劉禹錫答柳宗元書稱物低仰不差毫釐文粹姚崇執稱誡稱者衡天下之平也稱物低仰不差毫釐使錙銖不惑輕重無疑智不能矯愚不能欺燮理李華中書政事堂記燮理化為權衡諸權衡以秬黍中者黍之重為銖二十四銖為兩十六兩為斤出開元令白嘉量起於一黍圭合升斗之數起於黃鍾律之一千黍惟器作信則人不爭謹量謹權量用於出納資以均和用當其無守而失信信以守器官不易方豆區釜鍾家量傳曰齊舊四量豆區釜鍾四升為豆各自其四以登於釜釜十則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量收之故人歸之言陳氏以五升為豆各自五以登於釜釜十為鍾自然鍾則大矣言陳氏家量大於公量也黍纍作法於平示人以信中規一其度量周禮栗氏為量改煎金錫則不耗銷鍊之精不復減不耗然後權之準之量之為量也其聲中黃鍾其銘曰時文思索允臻其極嘉量既成以觀四國永啓敢後茲器維則已上並嘉量銘範金禮庣馬五量銅方尺而圓其外旁有庣馬注庣不滿處上為斛下為斗右耳合籥狀似馬以爵以麋祿上三下三參天兩地之象圓而函方左一右二陰陽之象其圜象規其重一鈞也用小斛魏志太祖賦斂不足軍糧少主者請以小斛給軍糧太祖曰善後軍中有言太祖欺衆太祖曰借君之死以厭衆乃徇曰主者用其小斛乃斬之於軍門斗筲概而不稅栗氏改煎金錫而不耗不耗然後權之權之然後準之準之然後量之量之以為釜注釜十則鍾其聲中黃鍾之宮注應律之首概而不脫注金百姓得量而不為租稅五量律曆志量者籥合升斗斛中黃鍾之籥以子榖秬黍中者千二百實其籥以井水準其概欲直以水平之井水清則平十籥為之合云云而五量加矣圭撮最多者不失其圭撮為概禮維北有斗不可以挹酒漿西柄之揭盈升椒聊之實蕃衍盈升斗粟一斗粟尚可舂漢書始於黃鍾而反覆焉反解中黃鍾覆亦中黃鍾之宮宮居也君製器之象夫量者始於籥合登於升聚於斗角於斛職在太倉司農主之穿地得隋開皇二年五月長安人穿地得金版有銘云始皇時量器孔自視衡量宗室皋以物遺人必自視衡量尺丈之量魏元同曰尺丈之量非所及則不能度張文收既定樂鑄銅斛二出唐樂志八角玉升宣宗有八角玉升西夷且陀國所進夏以水澆之則無暑冬以火逼之則無寒異事甚衆出逢原記量斗碩未許波蘭量斗碩韓愈河南令池臺一概誠不如雨忘但以一概量讀皇甫湜詩諸量以巨黍為籥十籥為合十合為升十升為斗十斗為斛開元令籥合斗斛何以用銅取寒暑暴露不改其容李商隱太倉針白始於一黍五度律歷志度者分寸尺又引本起黃鍾之長以子榖秬黍中者注子榖北方黑黍取大小中者一黍以廣度之九十分為黃鍾長之一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法以銅高一寸長一丈而分寸尺丈存焉以為引高一分分者自三微而成著可分別寸忖尺彠職在內官廷尉掌之注法度所起故有屬廷尉彠音約周尺王制古者以周尺八天為步今以周尺六尺四寸為步古者百畝今百三十六畝三十六步古者百里當今百二十一里注案周禮猶以十寸為尺蓋六國時多變法者或言周尺尺八寸則步更八八六十四以此計古者百畝今百五十六畝也惟物有度俾人不爭信以守器官不易方同度月令仲春仲秋則日夜分則同度量作程中度毫釐度長短者不失毫釐十毫為釐失之毫釐差若千里分寸尋常爭尋常之地五尺曰尋倍尋曰常短長取則忖度詩曰他人有心豫忖度之一其度量周禮百度得數而有常百物之度也枉尺直尋去彼取此尺有所短寸有所長古今長短晉荀勗校八音不和始知後漢至魏尺長於古尺四分有餘乃依周禮制尺更鑄銅律呂調聲韻以尺量古器與本銘尺寸無差時人服其精密唯阮咸作其聲高後掘得古尺果長於勗尺四分璧羡以起度周禮進寸退尺老子曰不敢進寸退尺禹以身為度禹以身為尺度也孔製尺呂才王圭魏徵盛稱才製尺法凡十二枚長短不同與律諧契裁度李泌請以二月朔為中和節因賜大臣戚里尺謂之製尺紀度之數張曲江謝賜尺狀尺者紀度之數宜麗天文批答尺之為數陰陽象之宰臣匠物有以似之逮下明忖度之心為上表裁成之德紅牙為尺白銀為寸美而有度煥以相鮮逮下明忖度之心為上表裁成之德白居易謝賜尺表諸度以北方秬黍中者一為一分十分為寸十寸為尺開元令度長短者不識毫分通典尋尺所以適遠近不為運斤者故也劉禹錫別集白龍泉太阿秋水越絶書云太阿劍其色如秋水純鈞鏌邪越王勾踐有寶劍五純鈞湛盧鏌邪毫曹巨闕自衛家語子路拔劍而舞曰古之君子以劍自衛乎龜文龍藻並劍彩倚天宋玉賦長劍耿介倚天外七星劍文白虹劍名青蛇劍彩冰刃霜鍔文選一人敵漢書項羽學劍不成乃曰劍一人敵不足學學萬人敵屬鏤吳王賜子胥屬鏤劍以死贈徐君延陵季札帶劍贈徐君已死季子挂劍於徐君墓上樹而去鹿盧古劍以玉刻鹿盧形白刃起相讎衛君子斷佞臣進劍者左手尊也禮啓櫝夫襓禮凡言劍則啓櫝夫襓與劍焉注櫝面也夫襓劍衣音饒斬馬朱雲請上方斬馬劍斷佞臣一人頭張禹也賜後漢韓稜為尚書右僕射郅壽尚書令陳寵三人同時以不能稱肅宗嘗賜諸尚書劍特以寶劍自為其名韓稜楚龍泉郅壽蜀漢文陳寵濟南推誠稜淵深有謀故得龍泉壽明達有文章故得漢文寵敦朴善不見外故得推誠賣龔遂為渤海太守令人賣劍買牛又世祖時獻名馬寶劍直千金詔以馬駕鼓車劍賜騎士劍舞子路拔劍而舞見上又馮諼寄食孟嘗門下倚柱彈鋏而歌曰長鋏歸來乎食無魚又鴻門項莊起為壽曰軍中無以為樂請以劍舞價直文選曰價兼三鄉聲貴二都蜀志云勾踐有寶劍五召薛燭示之燭曰客有直者市之鄉三駿馬千匹千戶之都二可乎燭曰不可當造此劍時赤堇山破出錫若邪溪出銅雨師灑塵雷公擊橐天精下歐冶固天之精至其巧一曰純鈞二曰湛盧今赤堇山合若邪溪深歐冶死雖城量金珠猶不可得千金西京記昭帝時茂陵人獻寶劍上銘曰直千金壽萬歲櫑具劍俊不疑帶以謁暴勝之擊東方朔十五學擊劍帶劍入省梁冀帶劍入省張陵字處中刻之以一歲俸贖罪三劍莊子曰臣有三劍天子劍諸侯劍庶人劍墜水古人劍墜水刻舟以求迭躍列子蘭子以技示宋君弄上劍迭而躍之五劍常在空立賜金帛諸吏帶劍魏相以文吏為丞相好武皆令諸吏帶劍奏事不有帶借劍入木劍晉輿服志朝服帶劍晉世易之以木客慚恩文選劍客慚恩不折莊子曰復讎者不折鏌邪劍履上殿漢蕭相國昆吾周穆王征十戎得昆吾劍水心劍秦昭王三月三日曲水宴有金人於水中捧水心劍以奉王百金之劍楚捕子胥子胥至江上有老父乘舟知子胥急故渡之既渡胥解其劍曰直百金以與父父曰楚法得子胥賜粟五萬石爵執圭豈徒百金之劍耶劍一良越王遺子胥不受步光劍勾踐使大夫種遺吳王步光之劍鄧師鄧國有善鑄劍者因名宛馮宛人於馬鑄劍因以為號淬以龍泉水孟康曰龍泉宮西平界其水可用淬劍特堅利古龍泉之劍取於此未嘗服之衛綰景帝賜之劍綰曰無帝賜臣劍凡六不敢奉詔使取之六劍常盛未嘗服司馬氏在趙者以傳劍論顯劍術也史記利用發硎之刃出匣之鋒陸斷犀兕水截蛟龍選斬馬見上注切玉列子周穆玉得昆吾之劍切玉如泥剸犀斬蛇前高祖斬白蛇刜鍾干將劍刜鍾無聲補履不如兩錢之錐決雲上決浮雲其鋒不可當前書腐肉之齒利劍青蓱劍也雄稜鈷利剸割莫能佽飛斬蛟呂氏春秋曰荊有佽飛者得寶劍於江渡中流兩蛟繞舟佽飛拔寶劍赴江斬兩蛟殺之荊王聞之仕以執圭靈異指鄭則三軍白首麾晉則千里血流楚王作劍三枚晉鄭求之不得興師圍楚三年不解楚王登城引太和之劍麾之三軍破敗血流千里鄭人頭盡白夜飛去吳越絶書曰吳王闔閭無道湛盧劍乃去吳之楚秦伐楚求之楚不與之神兵文選此蓋稀世之神兵化去雷煥云靈異之物終當化去衝斗晉書曰斗牛之間有紫氣雷煥曰寶劍之精上徹於天耳在豫章酆城令掘獄基入地四丈得石函中有兩劍一曰龍泉一曰太阿化龍雷煥得劍送一與張華一自佩及華誅後失劍所在及煥卒其子華持劍行經延平津忽於腰下躍出墮水使人入水化兩龍合盤光照水而去斬蛇劍飛出晉武庫災張華見漢高祖斬蛇劍沖屋而飛出鑒識風胡之鑒薛燭之識並古之善相劍者候時去國惡無道於吳王入夜千星幸見知於雷煥衝斗紫氣見上注相劍患劍之似吳干吳之干將鑄礪磨礪發硎試人傳曰莒子虐而好劍苟鑄劍必試諸人作礪若金用汝作礪歐冶子善鑄劍邪溪之鋌赤山之精並出良鐵萬辟千灌淬煉之名奮椎神器化成陽文雄劍文陰縵雌劍文煆礪書曰煆乃戈矛礪乃鋒刃淬礪之功砥礪法言干將鏌邪古之良劍然而不加砥礪則不能利百鍊剛越砥劍其鍔清水淬其鋒越砥斂其鍔言干將之璞也鷈膏瑩鋒洗削殖貨傳質民以洗削鼎食敝盡而無惡候月蝕鑄韓延壽字長公為東郡取官銅物候月蝕鑄作刀劍鉤鐔放效尚方以此棄市鐔音尋鐔衛皆用玉師古曰鐔劍口衛劍鼻華陰赤土雷煥得酆城劍取南昌西山下上拭劍送一劍并土與張華華以南昌上不如華陰赤土報雷煥書云云兼以華陰土一斤致煥煥將拭劍轉精明也孔獲寶劉仁軌遇倭人白江口四戰皆克扶餘豐脫身走獲其寶劍遺李訴以寶劍遺牛元翼曰此劍吾先人嘗以捕大盜吾又以平蔡姦今鎮人逆天公宜用此夷之也元翼拜辭曰敢有不承而愛其死力青龍突陳酉陽雜俎開元中河西騎將宋青春每陳常運臂大呼執馘而旋未嘗中鋒鏑西戎憚之一軍始賴焉所吐蕃入寇獲生口數千軍帥令澤問衣大蟲皮者爾何不能害青春答曰嘗見青龍突陳而來兵刃所及若叩銅鐵我為神助將軍也青春乃知劍之有靈也解所佩贈李光顏長從河東軍為裨將節度使馬燧解所佩劍贈之拜三動王潮衆推劉行全為將軍辭曰我不及潮請以為王潮苦讓不克乃除地剚劍祝曰拜而劍三動者我以為主至審知劍躍於地衆以為神皆拜之審知讓潮自為副喜擊劍李白喜擊劍鹽城寶劍高駢蕭勝納賄用之求鹽城監駢不肯用之曰仙人言鹽城有寶劍須真人取之唯勝可往駢許諾拔劍瞋目辛讜龐勳反攻杜慆於泗州大將袁公異等曰賊衆我寡不可在讜拔劍瞋目呼曰泗州陷在旦夕公等被詔來乃逗留不進欲何為鐸鞘浪劍鬱刃南詔異牟尋獻鐸鞘浪劍鬱刃鐸鞘者狀如殘刃有孔旁達出麗水飾以金所擊無不洞夷人尤寶之以血祭之鬱刃鑄時以毒藥并冶取迎躍如星者凡十年乃成淬以馬血以金犀飾鐔首傷人即死浪人所鑄故亦名浪劍王所佩者傳七世矣藏劍銘文粹潘存實藏劍銘曰龍入泉星上天雄雄神器蓄在人間於戲動不仁靜不德雖百煉之銅於愛身也奚力板橋王氏劍五代馮暉魏州入傷鎮靈武行至梅戍蕃夷稍稍來謁暉顧首領一人指其佩劍曰此板橋王氏劍耶吾聞王氏劍天下利器也俯而取諸腰間若將玩之因擊殺首領者及其從騎十餘人皆殺之橫磨大劍五代景延廣謂契丹使喬瑩曰晉有橫磨大劍十萬口翁要戰則來他日不禁孫子取笑天下火精劍唐杜陽編德宗將欲幸奉天自攜火精劍出內殿因歎曰千萬年社稷豈謂狗鼠所竊耶遂以劍斫檻上鐵狻應手而碎上曰若碎小寇如碎俊猊不足優也及乘輿遇夜侍從皆見上仗數尺先明即火精劍也劍煙玉塵集成都朱善存家世寶一劍每生神芝則天下晏清如安史黃巢難作劍皆生黑煙屬天不差毫髮飛躍九國志蜀許寂少學劍居四明一夕有村民夫婦揭壺酒訪寂而飲迭謠以歡寂寂飲訖聞室中戛戛有聲視之有數劍飛躍寂甚懼夫婦顧寂笑曰奉以薄伎佐酒公何懼也及舉手叱劍皆入指端至夜分乃去明日有二僧至寂以其事語之僧曰此俠也知君好劍術欲來相教耳願公無好學凡神仙清淨事異於此諸俠皆鬼為陰物故婦人與僧尼皆學之言訖命水洗足以淨水拭之騰空而去韓愈利劍詩我心如冰劍如雪不能剌讒夫使我心腐劍鋒折決雲中斷開青天噫劍與我俱變化歸黃泉鱗鋏星鐔鄭雲逵少時得一劍鱗鋏星鐔有時而吼常在莊居晴日藉膝玩之忽有一人從庭樹窣宰然而下紫衣朱糾髮露劍而立黑氣周身狀如重霧其人因言我上界人知公有異劍願借一觀鄭謂曰此凡鐵爾不堪君玩上界豈藉此乎其人求之不已鄭同便良久疾起斫之不中驚墜黑氣著地數日方散酉陽雜俎劍花秋蓮光出匣劍花明無人李白蛇化銅劍武勝之嘗於江灘見雷公逐一黃蛇或以石投之鏗然有聲雷公飛去乃得一蛇化銅劍有文云許旌陽斬蛟第三劍廣異記酒闌插劍肝膽露杜甫魏將軍歌湛然玉匣中秋水澄不流白居易古劍詩雄劍四五動彼軍為我奔杜甫霩如羿射九日落矯如群帝驂龍翔來如雷霆權震怒罷如江海凝清光上色青無刃大曆中高郵人張存以踏藕為業嘗於陂中見旱藕稍大如臂遂併力掘之深二丈大至合抱以不可窮乃斷之中得一劍長二尺色青無刃酉陽雜俎贈劍刻玉字延平兩蛟龍李白洞庭詩雄劍挂壁時時龍鳴獨漉篇雄劍挂壁時時龍鳴不斷犀象羞澀苔詩隙月斜明刮露寒練帶平鋪吹不起挼絲團金懸麗敕神光欲截藍田玉提出西方白帝驚嗷嗷鬼母秋郊哭李賀提攜玉龍為君死李賀鴈門太守行先輩匣中三尺水曾入吳潭斬龍子李賀劍歌零落蛟龍匣杜甫八歌詩青熒芙蓉劍青熒芙蓉劍犀兕豈獨剸獨坐親雄劍杜甫詩正枕當星劍瞑詩流落劍三千同上舞劍過人故武衛將軍挽歌騎突劍吹毛同上徒聞斬蛟劍覆舟長劍吼血南郊賦閉劍琉璃匣李白錦帶橫龍泉同上電騰感遇詩寶劍雙蛟龍雪花照芙蓉精光射天地電騰不可衝龍鳳劍五代孫德昭梁太祖頗德其附己以龍鳳劍鬥雞綾遺之霜刃賈島客詩白徐氏匕首典論部匕首諸葛亮作部匕詩五百枚以給騎士百辟魏太子造百辟匕首二其一理似堅冰名曰民清剛其二曜似朝日名曰陽文圖窮荊軻獻燕地圖圖窮而匕首見仲文笑神仙傳曰有書生張子就李仲文學隱術久無所得患之張懷匕首剌之仲文笑曰我寧可殺晉張載匕首銘曰先民造制戒豫惟謹匕首之設應速周近既不忽備亦慚輕忿利以形彰功以道隱曹沫投曹沫為魯莊公將與齊戰三敗莊公懼獻遂邑之地莊公與齊桓盟于柯曹沫執匕首劫齊桓左右莫敢動問曰子將何欲沫曰齊強魯弱而大國侵魯亦已甚矣今魯城壞即壓齊境君其圖之桓公乃許還魯之假地既而曹沫投匕首北面就群臣之位顏色不變桓公怒欲背其約管仲曰不可專諸進吳公子光將令專諸殺吳王僚四月丙子光伏甲士於窟室乃請王僚酒酣公子光佯為足疾入窟使專諸置匕首於魚腹中而進王既至前專諸擘魚因以匕首刺王僚立死左右亦殺專諸闔廬立乃封專諸子為上卿徐夫人匕首燕丹欲使荊軻入秦乃求天下名利匕首得趙人徐夫人匕首與之百金使工以藥石淬之以試人血濡縷無不立死者濡縷謂刺人血可濡絲縷徐大夫男子也姓徐名夫人提入強秦荊軻云提一匕首入不測強秦揕胸中柱引匕首擲秦王不中中銅柱短劍鹽鐵論曰匕首短劍也長一尺八寸頭類匕故曰匕首孔北帝所佩高駢數月勝獻銅匕首用之曰此北帝所佩也得之者兵不敢犯駢寶祕之常持以坐起玉匣閉霜雪神中趙匕首買自徐夫人玉匣閉霜雪經燕復歷秦持此歌投贈與君同患難李白贈友人笑開燕匕首拂拭竟無言同上匕首插吳鴻結客少年場李白竊發帝曰荊軻匹夫耳匕首竊發群臣皆荷卓著戟待莫敢拒豈非習慢使然處俊對曰此乃法急耳郝處俊白贈佩刀晉書呂處為刺史有佩刀相者曰以三公可服處乃贈別駕王祥曰苟非其人力哉為害卿有公輔之量故相與也割雞焉用牛刀佩犢龔遂為渤海令人賣劍買牛賣刀買犢曰何為帶牛佩犢鞞琫詩曰鞞琫容刀皆刀鞘飾鞞上飾琫下飾操割子皮欲使尹何為邑宰子産曰猶未能操刀而使之割白刃冰刃霜鍔霜鋒寶刀孟勞榖梁曰孟勞魯之寶刀鄭刀周禮云鄭之刀宋之斤魯之削遷其地不能為良地氣然也大刃同上刀劍之屬獻刀禮曰凡獻刀則郤刃授穎注云郤卻也辟刃凡有刺刃者以授人則辟刃謂避也辟音匹亦反敝盡而無惡周禮候月蝕鑄見上注問刀賈武帝責楊僕曰君欲請蜀刀問賈幾何對曰率數百武帝怒曰出兵而陽不知注僕行請官蜀刀詔問賈答言率數百鉛刀為銛賈誼曰鏌邪鈍兮鉛刀為銛鉛刀一割墜水郭翻刀墜水人為取之因與其人曰我取此天地神明所責翻終不受又投於水人又為取翻不能逆十倍價與之龍雀赫連勃勃造百鍊銅刀為龍雀大環號曰大夏龍雀也庖丁之刀十九年如新發硎贈蜀費禕別傳云禕使吳孫權以手中嘗所執寶刀贈之禕答曰臣不才何以堪然此討不庭禁暴亂者願大王勉建功業同獎漢室臣雖暗弱不負來願引鏡神仙傳河東孫博能引鏡為刀屬刀為鏡鸞貴禮曰鸞刀為貴閽以刀殺吳子見舟門注首山之金或曰黃帝採首山之金始為刀見洞冥記執其鸞刀詩刀有鸞者割玉如泥孔叢子西戎利刀秦王得割玉如泥切玉如土十洲記昆吾割玉刀周穆王時西胡所獻切玉如土鳴鴻刀洞冥記漢武東方朔鳴鴻百鍊青犢漏景三刀吳大帝刀也見催豹古今注火精協數古人鑄刀以五月內丙午取純火精以協其數受法於金精之靈阮師作刀受法於金精之靈七月庚辛見金神於冶監之門向而再拜金神授以水火之齊五精之鍊用陰陽之候取剛柔之和三年作千七百七十口其刀于皆狹刃方口洪首截輕微不絶絲發之系斫堅剛無交動之見揚泉物理志百鍊利器魏武內戒令曰百鍊利器以辟不祥攝服姦究者也赤刀博物志曰赤刀周之寶器剃毛淮南子屠未朝解九牛而刀可能剃毛斬虎刀銘何晏給介士傅咸曰尚書舊秦給介士二百人大銅刀各一口用刀舞吳書凌統怨甘寧殺其父寧常備統不得與相見於呂蒙舍會酒酣統乃用刀舞寧起曰寧能雙戟舞白虎之象春秋繁露曰白刀在古白虎之象巧冶鍊剛金馬托形李尤金馬書刀銘云鼓刀揚聲楚辭曰師望在肆昌何識鼓刀揚聲后乃喜陸剸犀兕水截鯨鯢王粲刀銘曰龍熊為飾魏曹植寶刀賦曰建安中魏王命有司造寶刀五枚以龍熊馬雀為飾露陌刀銘魏文帝孔佩大撗刀王及善除右衛將軍帝曰群臣非搜辟不得至朕所爾佩大撗刀在朕側亦知此官貴乎贈以佩刀張文瓘李績入朝文瓘與屬僚二人皆餞贈二人以佩刀玉帶而不及文瓘文瓘疑以請績曰子無嫌若某沉豫少決故贈以刀欲其果於斷解佩刀賜魏徵帝親解佩刀賜金削刀徐齊聃太宗召試賜所佩金削刀寶鈿刀阿史那社爾太宗美其廉賜高昌寶鈿刀精刀薛延陀其弟統特勒入朝帝以精刀賜之麥芒刀三賢典略牛僧孺進士時常用麥芒刀字有誤謬隨手刪割點定鏽澀空莓苔寶刀隱玉匣鏽澀空莓苔李白酬張卿撗行青海夜帶刀李白寒夜獨酌君不能學哥舒撗行青海夜帶刀而屠石堡取紫袍朝歌鼓刀叟李白歌鼓刀叟虎變磻溪中一舉鈞六合遂荒營丘東三杯弄寶刀白馬篇酒後競風彩三杯弄寶刀殺人如剪草劇孟同遊遨拆封刀子資暇録云起於郭汾陽書吏也舊但用刀之小者所收文帖既繁刀刃銷拆不殘寸餘吏乃鑽以應急教愈於全時漸出新意因削木加拆刃之上汾陽喜其用心曰真郭子儀之部吏後用傳之益妙其制刀開明月環李白白維綺及釜詩錡釜之器釜鍑音富釜大者鍑古釜字二釜之歲周禮人食二釜之歲言儉也五熟釜魏文帝在東宮賜鍾繇五熟釜而銘曰於赫有魏作漢藩輔厥相鍾繇實幹心膂魚遊後漢揚州賊率張嬰詣太守張綱降日苟全性命如魚遊於釜中生魚范丹字史雲為萊無令清貧人歌曰釜中生魚范萊蕪奪史蔡澤於趙見逐入韓之魏遇奪釜鬵於途釜鬵詩曰誰能享魚溉之釜鬵鬵釜屬懸釜而炊韓子曰智伯圍晉陽城襄子決晉水灌之城中懸釜而炊神釜茅君內傳曰欲合九美先作神釜蒸之櫟釜轑釜孔鐺釜韋堅鑿潭以通漕成帝為升樓臨觀堅豫取小斛舟每舟署某郡以所産物陳其上若豫章力士瓷飲器茗鐺釜椎釜盈道段秀實郭晞屯邠州士放縱不法擊傷市人椎釜鬲甕盎盈道紫駝之峰出翠釜杜甫麗人行土銼冷疏煙聞斛斯未歸詩井中破釜五代蕭希甫誣奏韋説與鄰人爭井井有寶貨有司推劾井中破釜而已銀釜南唐近事元宗嘗欲真珠數升耿先生曰易致爾即命小麥數升以銀釜炒之食頃勻圓成珠爨釜不沸酉陽雜俎爨釜不沸者有物如豚居之去之無也鼎白貢金九牧鑄鼎象物左傳問輕重楚子問二孫蒲鼎之大小輕重示欲篡田取天下銘禮衛孔悝之鼎銘云云又正考甫鼎銘云一命而傴再命而僂三命而俯循牆而走莫之敢侮周鼎漢鼎漢武於汾陰祀得寶鼎群臣皆賀曰升下得周鼎吾丘壽王曰非周鼎也詰之曰上天佐漢為出神鼎此乃漢鼎非周鼎上説汾陰之鼎見上注遷於洛邑武王克商遷九鼎於洛邑定於郟鄏成王定鼎於郟鄏卜世三十卜年七百天所命也出廬江漢不平六年廬江出寶鼎太守王雄獻之納于太廟詔曰易鼎足像三公豈非公卿奉職得其理乎賂魯侯傳曰宋人以郜太鼎賂公公納于太廟臧哀伯曰非禮也賂荀偃魯侯賂荀偃以乘馬加蓋耒錦先吳壽夢之鼎謂以馬璧為鼎之先也黃耳金鉉利貞之象玉鉉革去故而鼎取新潛江淮楚辭曰潛周鼎於江淮自熟自滿瑞圖曰寶鼎金銅之精知吉凶存亡不爨自沸不炊自熟不汲自蒲不舉自藏不遷自行黃雲漢得寶鼎於汾陰上有黃雲陽之金景龍文東京賦曰嶽修貢兮川效珍吐金景兮敵浮雲寶鼎見兮色氣氳煥其炳兮被龍文沒於泗水史記周末九鼎沒於泗水彭城下秦始皇兼天下過彭城齊戒禱祠使千人沒水求之不得謀於華亭後語秦師臨周以求九鼎顯王患之以告顏率率曰請救於齊遂説齊王曰秦無道欲興師求周之鼎君臣計不若歸齊即願王圖之齊王悅發師救周秦師罷齊求鼎顏率曰周即獻鼎不識何塗之所從王曰塗於梁率曰梁欲求鼎謀暉臺之下小海之上梁必不出也王曰從楚率曰謀於華亭之上楚必不出矣齊王乃止折足易曰鼎折足覆公餗出榖城晉陽秋曰咸康四年榖城縣門外有光取得九鼎一枚鑄於荊山史記黃帝採首山之銅鑄鼎於荊山下鼎成乘龍而升天號曰鼎湖懷挾後語鼎者不可懷挾提挈雉升書曰高宗祭成湯有飛雉升鼎耳而雊注云耳不聰之異也聖作神姦行藏輕重漢德方盛武帝善吾丘之言周室雖衰楚子慚王孫之對有道則見無道則隱九鼎寶鼎五鼎主父偃曰生不五鼎食死當五鼎亭記曰崇鼎貫鼎烏獲扛鼎文選郜鼎見上範金鼎有實鼎顛趾謂鼎足倒也大鼎漢武時見地如鉤狀掊視得鼎鼎大異於衆鼎掊音步鉤反鼎絶大謂之鼐圜掩上謂之鼐獲寶鼎迎日推策謂來日而推策舉龍文鼎秦武王有力與孟説舉龍文鼎絶臏而死臏音頻刃反入秦秦昭王時周器九鼎入秦而滅周祠后土而得汾陰巫錦為民祠魏睢后土營傍得寶鼎迎至甘泉將薦上帝至中山有黃雲蓋焉有鹿過上自射之以祭也巫錦巫之名象三才黃帝作寶鼎三象天地人九牧之金禹收九牧之金以鑄九鼎皆嘗鬺鬺音殤皆當以烹牲牢以祭祀斡棄周鼎兮寶康瓠賈誼弔屈平云文鼎言其刻鏤文也覆鼎文摯發怒齊涽王以愈王疾王命生烹文摯三月三夜不死顏色不變文摯曰胡不覆鼎以絶陰陽之氣王使覆之文摯乃死銘功分國銅鼎漢平中葛陵城東祝里社下上中得銅鼎銘曰楚元武王墓孔神器姚璹時九鼎成武后欲用黃金塗之璹奏鼎者神器也貴質朴不得外飾臣觀其上先有五采雜昈豈待塗金為符曜耶后乃止鑄九州鼎各位其方列庭中則天皇后武氏環四海以為鼎柳文積大亂至於隋氏環四海以為鼎跨九垠以為壚置九鼎神功元年四月戊辰置九鼎于通丁宮六熟鼎常山王承乾造六熟鼎招亡奴盜取人牛馬親視烹燖負鼎詣闕和逢堯武后時負鼎詣闕下上書自言願助天子和飪百度有司護曰昔桀不道伊尹負鼎于湯今天子聖明百司以和尚何所調逢堯不能答常燃鼎唐杜陽編貞元八年吳明國貢常燃鼎量容三斗光潔類玉其色純紫每修飲食不熾火而自熟香潔異常久食之令人反老不可柱車鼎也不可以柱車韓文王君志龍文百斛鼎筆力可獨扛韓愈淑氣舍公鼎杜甫詩鼎食為門戶同上食家行鼎鼐韓愈詩立鼎幾時烹元瑱答姨兄詩雕螭刻篆相錯蟠地中歲久青苔寒韋應物古鼎歌乃銷九金乃鑄九鼎韓愈堯水滔天人禽鬼神之居相混匕禹導川決水以分神人之居乃銷九金乃鑄九鼎僕萬有之族露怪異狀其護人已其救人已炊稻視爨鼎柳宗元詩白敝漏易曰井谷射鮒甕敝漏甕牖禮逢戶甕牖抱甕莊子子貢過漢陰見一丈夫方為圃畦鑿隧而入抱甕而出眠畢卓為吏部嗜酒鄰舍有酒卓因行往飲之醉眠甕間抱甕釀酒羊雅冬抱甕令人釀酒欲其溫藏鸚鵡張華養白鸚鵡華自外來並以家事告之華出後童僕怒乃藏甕中藏賊東觀漢記曰王渙與洛陽令方略捕賊賊乃藏大甕中悉擒獲瑤甕左傳齊人伐北燕燕人賂以瑤甕銅甕淮南萬畢術曰取沸湯著銅甕中堅塞之內於井中作雷鳴聞數十里風雷幽惟志曹著為建康小吏忽有廬少府君所迎見府門前有大甕可受五百石使風雲出其中瓶瓶之罄矣維罍之恥詩挈瓶之智毀衛孫蒯田于曹遂飲馬于重丘人重丘人詬之曰親逐而君父為厲是之不憂何田之為祭灶禮祭灶盛於盆尊於瓶甑紀甗齊侯使賓媚人賂晉師以紀甗注有底曰甗無底曰甑生塵之甑范丹字史雲清貧人語曰甑中生塵范史雲破甑孟敏字叔達荷甑墜地不顧而去郭林宗問之敏曰甑已破視之何益林宗異之勤令學果著其名拾塵家語顏回炊飯於敗屋下有塵墜飯中孔子遙見攫食之及回至孔子曰吾嚮夢先人將祭之回曰不可向有炱煤落甑中置之不可棄之則不祥因攫而食之陶人為甑周禮陶人為甑實二釜厚半寸底上孔玉甑左傳晉伐齊使貽以玉甑竹甑郭文傳曰文以竹筒為甑銅甑任文公王莽亂時奇物悉賣唯留銅甑孔銀甕數百具李絳裴均獻銀壺甕數百具絳請歸之度支火甕周興天授中人告謀反誅來俊臣鞠狀初興未知被告方封俊臣食俊臣曰囚多不服奈何興曰易且內之火甕熾炭周之何事不承俊臣曰善命取甕且熾火徐謂興曰有詔按君請嘗芝興駭汗叩頭服罪八斗金渡銀酒甕酉陽雜俎安祿山所賜有八斗金渡銀酒甕金甕唐杜陽編咸通九年同昌公主出降以金銀為井欄金鐺甕之屬萬甕行酒韓愈元和聖德詩舁酒車載牲牢甕舁酒並召賓客延鄒枚贈張十一詩喧聒鳴甕盎余瀾怒不已喧聒鳴甕盎嶽陽樓抱甕灌秋疏李白贈張公甕中百斛金陵春寄韋南陵水鬥甕福昌宮隋置開元末重修其中什物畢備駕幸俱頓以百餘甕貯水駕將起所宿內以盡傾出水以宮甕兩兩相次數人共推一甕初且搖之然後齊呼扣杯乾甕即空杜甫遣悶投姓名於琉璃瓶中命相廬文紀廢帝悉書清望官投姓名於琉璃瓶中命相中夜楚香祝天以筋挾之首得文紀欣然相之五代截手足投酒甕高宗王皇后蕭良娣既被囚武后令人杖之各一百截去手足投酒甕曰令此二嫗骨醉叔舅欲飲我社甕爾來嘗杜牧獨酌玉瓶沽美酒李白開喙倒腹斟酌更持柳宗元瓶賦桐甑舟後有小灶安桐甑而炊出唐語林樂天事金瓶敘聞録憲完釀換骨醪金瓶賜裴慶曾元建中末獨孤彥客淮四間佛寺遇青短衣人自稱曾元後驗之乃瓶耳宣室志水晶瓶九國志蜀王宗銖有海客鬻龍腦蜀中貯以水晶瓶殿直李葩示之海客邀善價比數倍葩造宗銖曰水晶瓶為爾取之翌日至其所令持錦衾過若貨者宗銖索衾與海客共觀歎其纖織久之因目從者挈瓶去器物十一白制器者尚其象易備物致用易器非求舊惟新書班宗宗廟彝器作分器器貢周禮有器貢謂宗廟器稽器展事用器不中度去器之無用者權置者令去之月令祭器燕器禮祭器未成不造燕器春疏以達夏高以粗秋廉以深冬間以奄養器為後利用備器什器儲跱哀帝詔吏舍無得署什器儲時注軍去二伍為什則供其器故通謂生具為什器又器用濫惡濫不堅牢滌器司馬相如與傭保雜作條器於蜀市官司彝器官司常用器物器不過用國語萬乘路蟠木離奇為萬乘器者左右先為之容鄒陽上書頭為飲器胸奴降者言胸奴破月氏王以其頭為飲器生無仗物主恭器不雕鏤闔廬孔四百車蔣王惲造器物服玩多至四百車所經州縣騷然護送欹器宗室皋嘗自創意為欹器以髹木上出五觚下鋭圓為盂形所容二豆少則水弱多則強中則水氣力均雖動搖乃不覆云寶爐女樂公主為寶爐鏤怪獸神禽開以璩貝珊瑚不可涯計造作奇器柳澤監嶺南選中郎將周慶立造奇器以進澤上書曰慶立雕製詭物造作奇器用浮巧為珍玩以譎怪為異寶乃治國之巨蠹明王所宜嚴罰者也無金玉之飾盧懷謹器無金玉之飾玳瑁盆唐杜陽編敬宗寶曆元年南昌國進玳瑁盆可容十斛外以金玉飾之盛夏上置殿內貯水令滿遣嬪御持金銀杓酌水相沃終不竭焉馬腦匱武宗會昌元年渤海貢馬腦匱方三尺深茜色工巧無比白雞盞柳亨飲未嘗醉有白雞盞取其迅速朝野僉載什器不徙而供元載近郊作觀榭悵帟什器不徙而供請增東宮什器太宗皇后長孫氏太子承乾乳媼請增東宮什器后曰太子患無德與名器何請為金銀器酉陽雜俎神廚俱振提國尚鬼神城北隔真珠江二十里有神春秋祠之時國王所須什物金銀器神廚中自然而出祠畢亦滅太后使人驗之不妄白珠盤周禮王府掌王之金玉若合諸侯則供珠盤銘禮湯之盤銘曰苟日新日日新又日新取鍾為盤季武子救台遂入鄆取其鍾以為盤奉銅盤毛遂謂楚王左右曰取雞豬血來遂奉銅盤而疏進君者盤也民者水也盤圓則水圓盤方則水方孫卿子銘後漢李尤盤銘曰或以承觴或以授物既舉清觴又盛口實承露盤賦魏毋丘儉露盤賦曰采和風之精液承清露於飛雲玉盤應劭漢官儀曰封禪壇南有玉盤盤中有龜鼓盤而舞風土記越俗飲鼓盤以為樂取大素圜盤以廣尺五六者抱以著腹以右手五指更彈之以為節舞者應盤而舞澡盤述征記曰長安逍遙宮門有澡盤面徑一丈尺銅盤之凍知萬里之寒顧彥先云銅澡盤異苑曰中朝有人畜銅澡盤朝夕恆如人扣乃問張公公曰此盤與洛鍾宮商相應朝為撞鍾故聲相應可錯令輕自止如其言後不復聞其聲銀盤神異經曰西北有金樓上有銀盤廣五十丈夷盤大盤孔碼瑙盤裴行儉有碼瑙盤廣二尺文彩粲然軍吏趨跌盤碎惶懼叩頭流血行儉曰爾非故也何至是色不少吝藤盤韋嗣立帝臨幸獻藤盤翡翠盤後唐莊宗十一從克用破王行瑜遣獻捷于京師昭宗異其狀貌賜以翡翠盤銀盤藩鎮李寶臣既貯異志引妖人作讖兆為丹書靈芝朱草齋別室築壇置銀盤金匜王斝猥曰內産甘露神酒五色藤盤地理志循州貢五色藤盤水精盤杜工部麗人行水精之盤行素鱗玉盤高昌太宗即位帝賜妻宇文華鐏一具宇文亦上玉盤銀平脫馬頭盤南蠻異牟尋享使者出銀平脫馬頭盤二曰此天寶時先君以鴻臚少卿宿衛皇帝所賜也紅琉璃盤唐酉陽雜俎安祿山恩寵莫比錫賚無數其所賜品目有金大腦盤盤中走丸有讀武書豫解者因而學之猶盤中走丸丸之走盤橫斜圓直計於臨時杜牧孫子序中盤進橙栗韓愈詩低頭拭小盤杜甫歸來白口澤記毋沒而杯圈不能飲口澤之氣存焉杯圈孟子告子云性猶杞柳義猶杯圈奉杯管子曰叔牙奉杯起為桓公壽三杯漢朱博為御史大夫食不重味案上不過三杯土杯後漢宋叔平為定陵令土杯食麥飯銘馮敬道杯銘曰樂則思舊燕則思歡又李尤作杯銘曰杯之用無施不可流霞一杯論衡曰項曼都好道去家三年而反曰仙人將上天飲我流霞一杯數月不飢常滿十洲記周穆王時西胡獻夜光珠常滿杯杯容三升是白玉之精夜置杯於庭中以向天比旦而水斗滿溢而香美斯實靈器耳蝦頭杯南越志曰南海以蝦頭為杯須長數尺以金銀鏤之酒躍於外晉廣州刺史嘗以杯獻簡文用以盛藥未及飲無故酒躍於外時廬江太守曲安遠頗解術數即命筮之安遠曰卻三旬後庭當吉曰螺杯陶侃上成帝螺杯一枚卮奪卮史陳軫楚有辭者賜其舍人一卮酒舍人數人相謂請畫地為蛇蛇先成者飲酒有一人先成引酒且飲乃以右手為之足後成者奪其卮曰蛇本無足今既伐魏得成又移師攻齊是畫蛇有足漏卮鹽鐵論川源不能實漏卮不能滿頌崔駰卮頌曰酌酒旗之玉卮頌明帝卮酒何武賜何壽況卮酒玉卮無當當底也行遲古詩但欣杯行遲孔銀杯羽化柳公權嘗貯杯盂一笥滕緘如故而器皆亡奴妄言叵測者公權笑口銀杯羽化矣不復詰玻璃水精杯西域罽賓武德二年遣使者獻玻璃水精杯木杯韋嗣立帝臨幸獻木杯萬歲杯五代馮道臨河縣得一玉杯有文曰傳國寶萬歲杯明宗甚愛之以示道道曰此前世有形之寶爾王者固有無形之寶也癭杯武攸緒王公所遺癭杯塵流積不御金銀杯胡楚賓高宗命作文常以金銀杯㪺酒飲之文成輒賜玉杯五代孫晟與馮延已並為李升相晟輕延已為人常曰金碗玉杯而盛狗尿可乎瓊杯玉斝開元中張説與徐堅論近世文章説曰王翰如瓊杯玉斝雖爛然可觀而多玷缺碧瑤杯唐張瀆宣室志韋弇遊蜀郡南鄭氏亭上遇玉清之女曰有三寶將以贈君能使君富敵王侯始出一杯其色碧而光瑩洞徹曰碧瑤杯也遂挈還長安售于廣陵市胡人見而拜曰王清三寶以錢數千萬易之紫霞杯光祿紫霞杯李白贈崖侍御玻璃七寶杯樂史太白後序太真持破璃七寶杯酌西涼州蒲萄酒自暖內庫有酒杯青玉色其薄如紙以酌酒少頃即沸熱名自暖杯開元天寶遺事持杯棬而承澍雨元稹榮陽公詩序受偏隘者不可以語大持杯棬而承澍雨自滿而止又安能測其滂霈之所至哉白鎔範鑄也屢照袁彥伯未嘗見明鏡疲於屢照鸞舞罽賓王獲一鸞懸鏡以照之鸞睹影乃悲鳴而舞猒魑魅抱朴子道士以明鏡九寸懸於背老魅不敢近若有鳥獸邪物照之其本形皆見鏡中菱花魏武帝有菱花鏡秦鏡西京雜記曰秦始皇有方鏡照見心膽女子有邪心者即膽張心動有然者始皇輒殺之傾冠抱朴子曰明鏡舉則傾冠見矣盤龍舞鳳飛鵲並舞於鏡照膽鑒形負局先生肝膽毫髮水鏡樂廣字彥輔衛瓘見而奇之曰此人瑩然若水鏡仁壽洛陽仁壽殿前有方鏡高五尺向之立寫人形不將不迎文子曰聖人若水鏡不將不迎言若鏡之無心而物自應見醜文子曰人舉其疵必鑒見其醜即自善以鏡無心故也物無遁形明無私照百鍊玉臺范金鑄勝物無傷莊子曰聖人之用心也若鏡不將不迎應而不藏故勝物無傷窺鏡鄒忌衣朝衣冠問妻妾曰我何如城北徐公美皆曰美明日徐公來窺鏡自視始知不如徐公之色遠矣山雞舞異苑曰山雞愛其毛羽映水則舞魏武帝時南方進之公子蒼舒以大鏡著其前雞鑒形而舞之遂乏死賦傅咸鏡賦曰清邈明水景若朝陽應物無偏又梁劉緩賦曰欲開奩而更飾乃當窗而取鏡鞶鑒傳鄭伯享王王以后之鞶鑒與之注以鏡為帶飾匪鑒我心匪鑒不可以茹茹度也但知方圓不能度真偽屈刀為鏡引鏡為刀見刀門失鏡風俗通曰魯相臧氏之婦忽失鏡經數日從空中擲下有人言曰還汝鏡勿責之遲遲觀面韓子曰古之人目短於自見故以鏡觀面智短於自知故以道正已鏡無見疵之罪道無明過之惡目失鏡則無以正鬚眉身失道則無以知迷惑萬乘之主人何以堪矣而無所鏡呂氏春秋美惡自備申子曰豈不如鏡設精無為而美惡自備也盲者不可貽以鏡淮南子曰宮人得戟則以刈葵肓者得鏡則以蓋卮肓者不可貽以鏡亂王不可舉其疵桀失玉鏡尚書帝命期曰桀失玉鏡用其噬獸注玉鏡喻清明之人噬獸謂暴秦失金鏡考靈曜曰秦失金鏡魚目入珠注金鏡喻明始皇呂不韋子言亂真也大鏡晉東宮故事皇太子納妃有著太鏡一尺八寸著小鏡一尺二寸漆奩盛蓋銀華金薄金錯鐵鏡魏武上雜器物疏曰日御物三十種有尺二金錯鐵鏡一枚九寸明鏡劉根別傳曰以九寸明鏡照面熟視之令自識已形常令不忘如此其神不散疾患不入徑二三尺陸翽鄴中記曰石季龍三臺及內宮中鏡有徑二三尺者有二寸者百鍊之鑑夏侯湛抵疑曰百鍊之鑒剔鬚眉之數而僻士不見泰山四窺鏡抱朴子曰用明鏡九寸自照有所思存七日即見神仙知千里外事也明鏡或用一或用二謂之四窺鏡又抱朴子曰昔張蓋二人並精思於蜀雲臺石室中忽有一人黃練衣葛巾到其前曰勞乎道士卒苦幽隱於是一人顧視鏡中乃鹿也火齊鏡王子年拾遺記曰穆王時渠國貢火齊鏡人語則鏡響應玉之榮石之精表如日光裹如衆星兩人相睹相知情此名為鏡東方朔傳璣鏡出孝經援神契曰神靈滋液百寶用則鏡出宋均注曰大珠有光可以為鏡月鏡王子年拾遺記曰周穆王時有石如鏡此石色白似月照面如雪謂之月鏡明鏡之始朦然及粉之以玄錫磨之以白旃則鬚眉發可得而鑒淮南子青銅鏡蕭萬等三十國春秋曰慕容垂攻鄴符丕遣其從弟就請救乃遣謝玄青銅鏡黃金婉轉繩等為信表裏明西京雜記曰高祖入咸陽宮得方鏡廣四尺九寸表裏有明人來照之影則倒見以手捧心可見腸胃五贓歷然無疑至人之道不如鏡有明有照有引有致符子鏡而居賈誼曰鏡而居無執無藏美惡必至各得其常梁劉緩照鏡賦曰訝宿粉之猶調笑殘黃之不正又近來頰色不須紅即時好眉猶約黛隋孔範詠鏡詩曰懷恩未得報空歎髮成絲李巨鏡詩曰鳳從臺上出龍就匣中出又無波菱自動不夜月桓明鏡臺魏武雜物疏曰鏡臺出魏武宮中宮有純銀參帶鏡臺一純銀七子公主鏡臺四玳瑁鏡臺晉東宮舊事皇太子納妃有玳瑁細鏤鏡臺一玉鏡臺劉義慶世説劉聰為玉鏡臺溫嶠辟劉越石長史北征得之後娶姑女下焉又宋元嘉起居注景郎為廣州剌史作鏡臺御史劉楨請以事免朗官陳叔達入關詠空鏡詩形過鏡則照窮陸士衡連珠孔三鑑魏徵薨帝後臨朝歎曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失朕嘗保此三鑑內防已過今魏徵逝一鑑亡矣引鑑不樂韓休同平章事帝嘗引鑑默不樂左右白自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘠天下肥矣刻鑑文龐勳賊首孟敬文欲絶勳自立陰刻鑑為文曰天口刻鑑文錫爾將軍夜瘞之野耕者得之以獻衆駭異乃齋三日授之勳知其謀使人襲殺之終身不引鏡路隋父執虜中母告以貌類泌者終身不引鏡拭鏡揃白韋表微授監察御史裏行不樂曰爵祿譬吱味也人皆欲之吾年五十拭鏡揃白冒遊少年間取一班一級不見其味也千秋節公主並獻寶鑑張九齡初千秋節公主並獻寶鑒九齡上事鑑十章號千秋金鑑録以伸諷諭金皆鑒高季輔善銓敘人物帝賜金皆鑑一況其清光能洞微文粹姚元崇執鏡誡曰秦樓明鏡鑒有餘輝色自凝曉光能洞微飾以鞶組匣以珠璣龍繞池臥鳥臨月飛照形魏元忠上封事明鑑所以照形往事所以知今水心鏡唐説鏡龍記天寶三載五月十五日揚州進水心鏡一面縱橫九寸青瑩耀目皆有盤龍長三尺四寸五分勢如生動玄宗異之七載秦中大旱詔中使孫知古引葉法善於內閘閲此鏡曰鏡龍負龍也上幸凝陰殿詔法善伺鏡龍忽於梁棟及鏡龍口鼻有白氣須更滿殿遂遍城內甘雨大澍容成侯金炯唐文粹司空圖有容成侯金炯傳三方鏡雲仙散録纂異記曰黃巢陷京城南康王氏有鏡六鼻當生雲煙照之則左右前三方事皆見王氏即京城照之巢冠兵甲如在目前上平都邑以映日紗囊取入禁中青衣小兒九國志蜀王宗壽嘗於許間得一鏡晦不可覽屢令工人營之了無所睹置巾奩中有日矣至是忽覽之光彩煥發因見市舍中有一青衣小兒丱角獨坐宗壽令人訪之小兒欣然肯來因曰我為鐵鏡來耳公不見還神物當還去宗壽山鏡與之長揖而去明鏡崖石方三丈濟南郡有方山山南有明鏡崖石方三丈魑魅行伏了了然在鏡中南燕時鏡上遂使漆焉俗言山神惡其照物故漆之酉陽雜俎鼻大如拳荀諷有鐵鏡徑五寸餘鼻大如拳數人同照各見其影不見別人影出酉陽雜俎照人五藏舞溪石岸石窟有方鏡徑丈餘照人五藏秦皇世號為照骨寶在無勞縣山境出酉陽雜俎照日花環一丈元和末海陵夏侯乙庭前生百合花大於常數倍異之因發其下得甕匣十三重各匣一鏡第七者光不蝕照日花環一丈其餘規銅而已酉陽雜俎南金既雕錯鞶帶共輝飾韋蘇州雜體沉沉匣中鏡為此塵垢蝕輝光何所如月在雲中黑南金既雕錯鞶帶共輝飾空存鑑物名坐使妍蚩惑美人歇肝膽思照冰玉色自非磨瑩工日日空嘆息附山而居同族中多見搜採容成侯傳歷試臺閣號為明達上聞而器之召見嘉其鑒局且謂毫髮無隱屢顧之歷試臺閣號為明達或被以組繡蓋便其俯仰取容雖穿鼻服役亦無恥爾並同上壽光先生上晨興必先至則與冠冕者偕進號壽光先生龍駒持月異聞集隋王度有寶鏡歲度度令僕持鏡詣里有疾照之即愈皆云龍駒持一月來光彩破體清涼而愈紫珍同上龍駒夢一人朱冠紫衣曰我鏡神名纍珍也寶鏡氣同上王度寶鏡大業中有胡僧至其家曰宅上常有碧光連日絳氣屬月此寶鏡氣也金煙玉水同上胡僧又曰以金煙薰之玉水洗之金膏塗之朱粉拭之雖藏泥中不晦矣日蝕鏡隋唐嘉話蘇威有鏡日餂則昏後半餂則半如墨魚鏡三水小牘云元稹登黃鶴樓望江濱有光若星就視得一鯉剖其腹得古鏡如錢大背有雙龍口中常吐光焉秦淮鏡唐王歆松窗録漁者投網秦淮覺異常極力舉得一鏡照之歷歷見五藏六腑驚懼失墜後萬計終不獲方丈鏡王幼臨造並照人馬朝野僉載鏡影成相字宋璟未第時因於日中覽鏡影成相字璟因此自負於相業開元遺事火鏡唐文粹韋端符衛公故物記火鏡等凡十三物夷則之鏡唐博異天寶中有陳仲躬井中有鏡自云敬元穎又曰其本師曠所鑄十二鏡之第七者仲躬後交戰纍勝為大官其鏡背有二十六字科蚪書曰維晉新公二年七月七日午時於首陽山前白龍覃鑄成此鏡千年後出於背上環書一字管天文一宿依方列之則左有日右有月龜龍虎雀各依方安焉於鼻下題曰夷則之鏡鏡光照室樵牧間談孟蜀時軍校張敵得一古鏡模闊尺餘光照室寢處不施燈燭將求磨滌之有貧士見而嘆禮曰久知寶在蜀中一見足然此鏡不久當亦歸敵益珍藏自得鏡無疾病照病鏡葉法善有一鐵鏡監物如水人每有疾病以鏡照之盡見贓腑中所滯之物後以藥療之竟至痊天寶遺事明明金鵲鏡了了玉臺前紼拭的冰月光輝何清圓代美人愁鏡李白鈿鏡李賀鈿鏡飛孤鵲奩鏡幽鳳塵神女廟既孤不復視鑑韓皋貌類父既孤不復視鑑飛精龍城録曰長安任仲宣家素畜寶鏡示之識者謂之三代物後有八字僅可曉仍篆籍云水銀陰精百鍊成鏡詢所得云高山樵者石下得之後仲宣南騖洞庭風濤洶湧然因泊洲夢一道士赤衣乘龍詔仲宣言此鏡乃水府至寶出世有期言當歸我矣因持鏡去仲宣睡覺亟視篋中已失所在
