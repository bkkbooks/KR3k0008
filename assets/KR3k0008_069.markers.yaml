  - {type: variant, offset: 502, length: 0, content: '', WYG: 不祀二白葛伯不祀湯始征之䕫子不祀祝融而楚滅之不祀忽諸君祀無乃殄乎狐突謂申生曰相之不享於此久矣寗武子云酆舒不祀晉滅之路相鬼猶求食若敖氏之鬼不其餒而子曰吾不與祭如不祭祭不欲踈踈則怠怠則忘子孫祭祀不輟宗廟不享謂祭無益也紂也故君子之祭也必身親涖之有故則使人可也雖使人不失其義者君明其義故也言茍明祭義雖使人祭不失其義也孔宋務光上書宋務光神龍元年大水務光上書傳曰簡宗廟廢祠祀則水不潤下夫王者即位必郊祀天地嚴配祖宗自陛下御極郊廟山川不時薦見地僻易蕪徒生荆棘文粹張謂虞帝廟碑三湘南澨帝之遺廟存焉地僻易蕪徒生荆棘水深難涉誰薦蘋蘩先聖不祀後賢之過四望莫修文粹楊炯少姨廟碑四望於是莫修八神以之無主炎涼代序寧觀俎豆之容霜露霑衣非復絃歌之地}
