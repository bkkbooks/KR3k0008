  - {type: variant, offset: 4914, length: 0, content: '', krp: 孔鸞降庭楊仲昌爲孝義令鸞降庭太平之瑞楊烱冕服議鸞者太平之瑞也冲霄馬周見鳯門鸞隼不接翼陳子昻本傳鳯之族鸞乃鳯之族翺翔紫雲霓文章輝五色雙在瓊樹棲李白登黄山葳蕤紫鸞鳥巢在崑山樹李白贈漂陽宋少府鸞翔慶霄齊成公碑權徳輿鸞鳯忽覆巢麒麟不来過李白詩翠竹碧梧鸞亭峙韓愈馬殿中誌退見少傳翠竹碧梧鸞停峙能守其業者也鱗羽之於虬鸞獨孤及李華集序時軰歸望如鱗羽之於虬鸞也大瑞唐六典禮部鸞爲大瑞鶴五白仙鶴鳴鶴野鶴胎化仙禽舞鶴賦曰偉胎化之仙禽陽烏鶴金衣西京記黄鶴下太液池上爲歌曰黄鶴飛兮下建章金爲衣兮菊爲裳鶴鳴九臯聲聞于天詩鳴鶴在隂其子和之易乗軒衛懿公好鶴鶴有乗軒者及狄人代衛授甲者皆曰使鶴鶴寔有禄位在雞羣晋書嵇紹在稠人中昻昻然若野鶴之在雞羣五里飛来雙白鶴篇曰五里一反顧十里一徘徊云云琴操曰商陵牧子娶妻無子父母出之牧子别妻援琴而鼔之作别鶴操集華池韓詩田饒曰夫黄鶴一舉千里集君華池啄君稲梁君猶貴之以其從来逺也雞有五徳君輕之以其從来近也仙笙王子喬好吹笙後告其家人曰七月待我於緱氏山頭及期果爲白鶴謝時人去雷門鼔臨海記有鶴飛入㑹稽雷門鼔中於是鼔鳴洛陽聞之後斫破鼔鶴遂飛去舞吳王舞鶴於市中令萬人觀之唳陸機將誅臨刑嘆曰欲聞華亭鶴唳不可得矣歸遼東遼東華表柱忽有鶴集其上曰有鳥丁令威去家千年今始歸城郡知故人民非何不學仙冢纍纍驚露風土記鳴露此鳥性警至八月露降則驚而鳴也青田永嘉記青田有雙白鶴青年年生長便去放冲天有餉鶴於支遁者遁謂之曰爾冲天之物寧爲耳目之玩乎遂放令去紫蓋衡山有紫蓋峯峯上有雙鶴廻翔而鳴君子化抱朴子曰周穆王南征一軍自化爲猿君子化爲鶴鶴不日浴而白莊子千歲鶴千歲棲於偃盖松舞師曠曰鼔琴𤣥鶴鳴舞有鶴在林詩鷰雀焉知鴻鵠之志蜉蝣不知龜鶴之年吊晋陶侃䘮親有一客來吊出門化爲白鶴飛去衘珠報恩搜神記噲參行遇𤣥鶴被傷乃収養之放去至一夜雌雄俱衘一明珠来以報参也王喬控鶴以冲天氅裘晉王恭披鶴氅裘孟永謂曰真神仙中人也千歲抱朴子曰千歳之鶴随時而鳴能登木其未千歳者終不集樹色純白腦盡成骨如此即可知也入帳茅君傳曰好道者入廟㦯見一白鶴入帳中鶴者皆是九轉還丹之使飲溶溪之水唼太湖之萍拾遺記周穆王時塗循國献青鳯二十鶴各一雌一雄飼以潭臯之粟飲以溶溪之水古詩曰鴻鶴比翼遊羣飛献太清常畏大網羅憂禍一朝并豈若集太湖順流唼浮萍相鶴經鶴陽鳥也而游於隂因金氣依火精以自養金數九火數七年八變百六十年大變百六十年變止千六百年形定體潔故白聲聞天故頂赤食於水故喙長輕於前故後指短棲於陸故足髙而尾彫翔於雲故尾豐而肉疎大侯以味故脩頸以納新故生壽夭不可量所以體無青黄一色者木土之氣内養故不表於外是以行必依洲嶼止不集林木盖羽族之崇長仙人麒麟也𤣥鶴壽滿三百六十歳則色純黒指蓬壺而翻翰望崑閬以揚音文選𤣥精鶴經曰鶴之上相露眼𤣥精貟吭吭頸也介鳥思𤣥賦過九臯之介鳥介鳥者鶴也玉羽徘徊絜朗素羽藻質紫頂紫麻明心巢居一舉霜毛嘹唳朱頂月羽白羽頳首清響千里冰質天歩脩趾靈羽孤高馴養露眼天居差池青田羽客翔金城戱芝田飲瑶池出吳市振迅衣逐晉琴飛度武溪精含丹而星耀頂凝紫而烟華孔鶴鳴雞樹張鷟僉載云鳯閣侍郎杜景佺文章知識並髙逺時號爲鶴鳴雞樹𤣥鶴爲上瑞唐六典禮部低昻各有意磊落如長人杜甫薛少保畵鶴詩翔則摩空行則徐歩南蠻西舍利凢曲名十有二四曰白鶴游驃云蘇謾底嘿謂翔則摩空行則徐歩也蓬山之竒禽李白畵鶴賛曰圖蓬山之竒禽想瀛海之縹緲紫頂煙赩丹眸星皎昻然佇眙霍若鶩矯同上長唳風霄寂立霜曉同上夢鶴李抱真夜夢駕鶴寤而刻寓鶴衣羽服習乗之兵爪酉陽雜爼鶴左右脚裏第一指名兵爪慈恩寺大和中長安城南韋曲慈恩寺塔月夜有一美人從三四青衣繞塔言笑忽頋侍婢曰院僧借筆硯来於梁上題詩黄子波頭好月明忘却華亭到遶行煙収山低翠黛横折得荷花逺恨生僧將燭之化爲白鶴飛去出河東記雲間孤鶴𤣥宗天寶十三載重陽日獵於沙苑雲間有孤鶴徘徊上御弧矢中之鶴帶箭矯翼西南而逝益州城西十五里有道觀觀東廊第一院有青城山道士徐佐卿一歳卒三四至一日忽不懌曰偶爲飛矢所加尋已無恙然此箭非人間所有吾㽞之於壁後年箭主至則付之乃記壁去㽞箭之時則十三載及帝幸蜀暇日命駕行游偶至觀入此堂忽覩箭取而翫之乃御箭也深異之佐卿乃中箭鶴出廣徳神異記威遲白鳯熊非是蒼鶊隣杜詩赤霄有真骨耻飲洿池津同上一舉千里李善選鶴賦注一舉千里既𤣥且逺如蓬之集如雪之飛同上羽毛與煙霧同色上風雨既除其色愈浄上老鶴萬里心杜甫毛羽霜雪妍元稹和樂天感鶴我有所愛鶴毛羽霜雪研秋望一滴露聲洞林外天自隨衛矦去遂入大夫軒雪貌久已隔玉音無復傳吟君感鶴操不覺心惕然不知曽化鶴遼海歸㡬度李白鶴鶴相唳氣交也化書星星仙語人聽盡劉夢得歩虛詞華表千年一鶴歸凝丹爲頂雪爲衣星星仙語人聽盡却向五雲翻翅飛孔雀六白綷羽文孔雀綷羽而翺翔集長門孔雀集而相存生遐裔孔雀生遐裔獻白色宋孝武大明五年新昌軍獻孔雀白色者爲裘齊書文恵太子織孔雀毛爲裘夫子家禽孔文舉詣楊脩年九歳爲設果有楊梅文舉語之曰此君家果脩曰未聞孔雀是夫子之家禽也孔翣南蠻婆利左右持孔雀翣飾纛盤盤以孔雀羽飾纛南蠻盤盤傳鸞鳯友韓愈和武相公孔雀詩穆穆鸞鳯友翠角金華又翠角髙獨聳金華煥相差鉦棲孔雀西舎利樂鉦棲孔雀占城孔雀五代占城鳥之孔雀畵屏間髙祖皇后竇氏父毅在周爲上柱國尚武帝姊長公主嘗謂主曰此女有竒相何可妄與人因畵二孔雀屏間請㛰者射髙祖最後射中各一目毛彩光華西舎利曲名九曰孔雀王驃云桃臺謂毛彩光華也因雷聲而孕酉陽雜爼孔雀因雷聲而孕辟惡衛公言孔雀辟惡上尾端一寸名珠毛同上孔雀尾端一寸名珠毛解舞邊鸞工丹青最長於花鳥貞元中新羅國献孔雀解舞徳宗詔於𤣥武門寫貌一正一背翠釋生動金光遺妍能應繁節出唐名畵録翠羽金花孔雀未知牛有角渴飲寒泉逄觝觸青霄𤣥圃湏徃来翠羽金花不辭辱杜甫赤霄行孔翠望赤霄愁入彫籠養同上鄭虔詩羅州土貢孔雀唐地理志採毛爲扇嶺表異録交趾人多養孔雀採金翠毛爲扇鸚鵡七白能言不離飛鳥靈禽襧衡賦曰惟西域之靈禽辨恵之性閉以雕籠剪其翅羽並襧賦黄山山海經曰黄山有鳥赤喙青羽人舌能言語名之曰鸚鵡也籠鳥有山藪之思自然之姿文哿矣之性能言言鳥漢異域志献言鳥注鸚鵡鸚母諸葛恪在吳主座有鳥飛過恪曰白頭翁張昭在座疑恪譏之乃曰恪欺陛下不聞有鳥名白頭翁若有請覔白頭母恪問鳥有鸚母請覔鸚父昭不能對雉顧鶴眄鸞跱鳯息丹喙含恵緗葩煥翼曹毗賦丹足左𤣥賦聚赬爪於丹足朱咮婉朱咮恵鳥郭璞賛鸚鵡獻謝莊賦宋元嘉二十一年湘州獻赤鸚鵡詔羣臣爲賦之又獻晉安帝義熙十四年䄮林邑獻白鸚鵡宋天監二年㫁諸侯進又交州献能謌乃不納之又漢興平元年益州獻鸚鵡三隻日夜食三升麻子今榖貴此鳥無益有損可付安西將軍楊定國令歸本土兩指向前異物志鸚鵡西域靈禽兩指向前也赤羽赤喙見上五色廣州一根社出鸚鵡五色曽見其白色者大如母鴨水霑羽救火靈驗記有鸚鵡飛集山中禽獸輒有愛重之去後山中有火鸚鵡入水霑羽飛灑之天神曰彼雖有志何足云鸚鵡曰常僑止此山禽獸行善不忍見加天神感之爲雨滅火乾臯一名云云三種異物志云鸚鵡有三種青大如鳥一種白五色大於青凡鳥四指三向前一向後此鳥兩指向前兩指向後通夢憂賢周宣夢書曰鸚鵡一爲亡人居宅也夢見鸚鵡憂人也其在堂上者憂賢也感神滅火見上注謝莊賦恵梏昭大天機自曉審國音於中華逹方聲於遐表及其雲移霞峙雪委雨翻陸離翬衛容與傾軒躍林飛岫煥若輕電之勢月圓光於淥水雲寫影於青林殊智緗翼啄蘂恵性紅臆紺趾靈息紫頸金目能言翼襟擇木天機緑衣丹觜竒姿𤣥頷緑襟采采咬咬孔丐還新羅貞觀五年献女樂二太宗曰比林邑献鸚鵡言思鄉丐還况於人乎付使者歸之訴寒環王貞觀時献五色鸚鵡白鸚鵡數訴寒有詔還之五色訶陵元和八年献僧祗奴五色鸚鵡紅毛齊翅陀洹貞觀時献婆律膏白鸚鵡首有紅毛齊于翅白鸚鵡金鸞記曰韓偓與姚洎皆爲翰林學士從昭宗幸岐偓毎與兩敕使㑹碁兩使稍不勝洎即以手壞之偓呼爲白鸚鵡色凌紈質彩奪繒衣王維賦慧性孤禀雅容非飾含火徳之明輝被金方之正色又色凌䊵質彩奪繒衣聲容可觀韋臯鸚鵡塔記云前嵗有献鸚鵡者曰此鳥聲容可觀入座蕭頴士白鷴賦鸚能言而入座同朱喙之清音王維白鸚鵡同朱喙之清音變緑衣於素彩雪衣娘明皇雜録天寶中嶺南献白鸚鵡養之宫中歳久頗聰慧洞曉言詞上及貴妃皆呼爲雪衣娘上毎與嬪御及諸王博戯上稍不勝左右乃呼雪衣娘即飛至將翼以亂其行列四趾酉陽雜俎鸚鵡衆鳥趾前三後一唯鸚鵡四趾齊分綠衣使者長安富民楊崇義妻劉氏有色與隣人李弇通共殺崇義遽謀𦵏日將𦵏客集家有鸚鵡語人曰殺主者劉氏李弇也遂敗明皇聞之封鸚鵡爲緑衣使者後人因以呼之開元遺事戢羽雕籠際延思彩霞端李義府鸚鵡詩瞋目叱咤明皇時有五色鸚鵡能言上令左右試牽帝衣鳥輒瞋目叱咤岐府文學熊延京献鸚鵡篇以賛其事張燕公有表賀稱爲時樂鳥雜爼翠衿渾短盡紅觜謾多知杜甫秃襟小袖調鸚鵡李賀秦宫行鸚鵡能歌幽恠録栁歸舜至君山忽見鸚鵡羣集皆能人言各相稱呼有武遊郎武仙郎阿蘓兒者又有自在先生踏蓮露鳯皇臺戴蝉兒多花子亦有善歌者音調清麗阿春㸔客同上鸚鵡見歸舜忽呼曰阿春看客忽有一青衣乗雲而下相見鸚鵡来過吳江水李白詩鸚鵡来過呉江水江上洲傳鸚鵡飛隴俗輕杜角隴俗輕鸚鵡落羽辭金殿孤鳴吒繡衣能言終見弃還向隴山飛李白尋王侍御不遇詠壁上鸚鵡避籠交翠尾罅觜静新毛杜牧之鸚鵡詩雞八白寳雞鳴雞晨雞陳倉童子秦時陳倉見二寳雞化爲童子㦯云得雄者王得雌者覇穆公獵獲得雌者遂霸西戎立祠神光從東方來如雄雞之聲五德田饒曰夫雞戴冠文也足持距武也敵鬭勇也得食相呼義也鳴不失時信也雞有五德君猶烹而食之其所由來近也長鳴言聲長也牝雞無晨古人有言云云翰音祭宗廟曰翰音斷尾傳賔孟適郊見雄雞自斷其尾曰自惮爲犧也注雞惮爲人用之金距傳曰季郈之雞鬭季平子芥其雞郈氏爲之金距花冠南越志雞冠開如蓮花日之夕矣雞棲于塒詩風雨淒淒雞鳴喈喈膠膠雞鳴不已雞既鳴矣大寒之日雞始乳衘珠昭靈后名含始遊於洛水有玉雞衘赤珠曰吞之者王含始吞之生漢髙祖割雞焉用牛刀繫火殷浩北伐差江逌爲長史取雞百餘隻以長䋲連之皆繫火一時驅放過壍集羗營皆發火燒之䑛仙藥淮南王劉安食藥得仙餘藥雞犬䑛之皆飛升故雞鳴天上犬吠雲間入新豐漢髙祖