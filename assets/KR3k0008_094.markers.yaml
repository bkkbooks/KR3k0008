  - {type: variant, offset: 4914, length: 0, content: '', WYG: 孔鸞降庭楊仲昌爲孝義令鸞降庭太平之瑞楊烱冕服議鸞者太平之瑞也冲霄馬周見鳯門鸞隼不接翼陳子昻本傳鳯之族鸞乃鳯之族翺翔紫雲霓文章輝五色雙在瓊樹棲李白登黄山葳蕤紫鸞鳥巢在崑山樹李白贈漂陽宋少府鸞翔慶霄齊成公碑權徳輿鸞鳯忽覆巢麒麟不来過李白詩翠竹碧梧鸞亭峙韓愈馬殿中誌退見少傳翠竹碧梧鸞停峙能守其業者也鱗羽之於虬鸞獨孤及李華集序時軰歸望如鱗羽之於虬鸞也大瑞唐六典禮部鸞爲大瑞鶴五白仙鶴鳴鶴野鶴胎化仙禽舞鶴賦曰偉胎化之仙禽陽烏鶴金衣西京記黄鶴下太液池上爲歌曰黄鶴飛兮下建章金爲衣兮菊爲裳鶴鳴九臯聲聞于天詩鳴鶴在隂其子和之易乗軒衛懿公好鶴鶴有乗軒者及狄人代衛授甲者皆曰使鶴鶴寔有禄位在雞羣晋書嵇紹在稠人中昻昻然若野鶴之在雞羣五里飛来雙白鶴篇曰五里一反顧十里一徘徊云云琴操曰商陵牧子娶妻無子父母出之牧子别妻援琴而鼔之作别鶴操集華池韓詩田饒曰夫黄鶴一舉千里集君華池啄君稲梁君猶貴之以其從来逺也雞有五徳君輕之以其從来近也仙笙王子喬好吹笙後告其家人曰七月待我於緱氏山頭及期果爲白鶴謝時人去雷門鼔臨海記有鶴飛入㑹稽雷門鼔中於是鼔鳴洛陽聞之後斫破鼔鶴遂飛去舞吳王舞鶴於市中令萬人觀之唳陸機將誅臨刑嘆曰欲聞華亭鶴唳不可得矣歸遼東遼東華表柱忽有鶴集其上曰有鳥丁令威去家千年今始歸城郡知故人民非何不學仙冢纍纍驚露風土記鳴露此鳥性警至八月露降則驚而鳴也青田永嘉記青田有雙白鶴青年年生長便去放冲天有餉鶴於支遁者遁謂之曰爾冲天之物寧爲耳目之玩乎遂放令去紫蓋衡山有紫蓋峯峯上有雙鶴廻翔而鳴君子化抱朴子曰周穆王南征一軍自化爲猿君子化爲鶴鶴不日浴而白莊子千歲鶴千歲棲於偃盖松舞師曠曰鼔琴𤣥鶴鳴舞有鶴在林詩鷰雀焉知鴻鵠之志蜉蝣不知龜鶴之年吊晋陶侃䘮親有一客來吊出門化爲白鶴飛去衘珠報恩搜神記噲參行遇𤣥鶴被傷乃収養之放去至一夜雌雄俱衘一明珠来以報参也王喬控鶴以冲天氅裘晉王恭披鶴氅裘孟永謂曰真神仙中人也千歲抱朴子曰千歳之鶴随時而鳴能登木其未千歳者終不集樹色純白腦盡成骨如此即可知也入帳茅君傳曰好道者入廟㦯見一白鶴入帳中鶴者皆是九轉還丹之使飲溶溪之水唼太湖之萍拾遺記周穆王時塗循國献青鳯二十鶴各一雌一雄飼以潭臯之粟飲以溶溪之水古詩曰鴻鶴比翼遊羣飛献太清常畏大網羅憂禍一朝并豈若集太湖順流唼浮萍相鶴經鶴陽鳥也而游於隂因金氣依火精以自養金數九火數七年八變百六十年大變百六十年變止千六百年形定體潔故白聲聞天故頂赤食於水故喙長輕於前故後指短棲於陸故足髙而尾彫翔於雲故尾豐而肉疎大侯以味故脩頸以納新故生壽夭不可量所以體無青黄一色者木土之氣内養故不表於外是以行必依洲嶼止不集林木盖羽族之崇長仙人麒麟也𤣥鶴壽滿三百六十歳則色純黒指蓬壺而翻翰望崑閬以揚音文選𤣥精鶴經曰鶴之上相露眼𤣥精貟吭吭頸也介鳥思𤣥賦過九臯之介鳥介鳥者鶴也玉羽徘徊絜朗素羽藻質紫頂紫麻明心巢居一舉霜毛嘹唳朱頂月羽白羽頳首清響千里冰質天歩脩趾靈羽孤高馴養露眼天居差池青田羽客翔金城戱芝田飲瑶池出吳市振迅衣逐晉琴飛度武溪精含丹而星耀頂凝紫而烟華孔鶴鳴雞樹張鷟僉載云鳯閣侍郎杜景佺文章知識並髙逺時號爲鶴鳴雞樹𤣥鶴爲上瑞唐六典禮部低昻各有意磊落如長人杜甫薛少保畵鶴詩翔則摩空行則徐歩南蠻西舍利凢曲名十有二四曰白鶴游驃云蘇謾底嘿謂翔則摩空行則徐歩也蓬山之竒禽李白畵鶴賛曰圖蓬山之竒禽想瀛海之縹緲紫頂煙赩丹眸星皎昻然佇眙霍若鶩矯同上長唳風霄寂立霜曉同上夢鶴李抱真夜夢駕鶴寤而刻寓鶴衣羽服習乗之兵爪酉陽雜爼鶴左右脚裏第一指名兵爪慈恩寺大和中長安城南韋曲慈恩寺塔月夜有一美人從三四青衣繞塔言笑忽頋侍婢曰院僧借筆硯来於梁上題詩黄子波頭好月明忘却華亭到遶行煙収山低翠黛横折得荷花逺恨生僧將燭之化爲白鶴飛去出河東記雲間孤鶴𤣥宗天寶十三載重陽日獵於沙苑雲間有孤鶴徘徊上御弧矢中之鶴帶箭矯翼西南而逝益州城西十五里有道觀觀東廊第一院有青城山道士徐佐卿一歳卒三四至一日忽不懌曰偶爲飛矢所加尋已無恙然此箭非人間所有吾㽞之於壁後年箭主至則付之乃記壁去㽞箭之時則十三載及帝幸蜀暇日命駕行游偶至觀入此堂忽覩箭取而翫之乃御箭也深異之佐卿乃中箭鶴出廣徳神異記威遲白鳯熊非是蒼鶊隣杜詩赤霄有真骨耻飲洿池津同上一舉千里李善選鶴賦注一舉千里既𤣥且逺如蓬之集如雪之飛同上羽毛與煙霧同色上風雨既除其色愈浄上老鶴萬里心杜甫毛羽霜雪妍元稹和樂天感鶴我有所愛鶴毛羽霜雪研秋望一滴露聲洞林外天自隨衛矦去遂入大夫軒雪貌久已隔玉音無復傳吟君感鶴操不覺心􅅥然不知曽化鶴遼海歸㡬度李白鶴鶴相唳氣交也化書星星仙語人聽盡劉夢得歩虛詞華表千年一鶴歸凝丹爲頂雪爲衣星星仙語人聽盡却向五雲翻翅飛孔雀六白綷羽文孔雀綷羽而翺翔集長門孔雀集而相存生遐裔孔雀生遐裔獻白色宋孝武大明五年新昌軍獻孔雀白色者爲裘齊書文恵太子織孔雀毛爲裘夫子家禽孔文舉詣楊脩年九