  - {type: variant, offset: 9615, length: 0, content: '', WYG: 稼田則不漁臧文仲不仁者三妾織蒲與人爭利此不仁之一也商工皁𨽻不得遷業商農不移工賈不變守常業也禁二業後漢時禁二業劉毅伯興上書邦國以官禁二業至使畋者不得魚今江濱海湖郡人資漁採且以閑月無關二業食禄者不爭利公儀休為魯相食茹􅃵拔園葵而去之見家織布遂逐妻焚機曰欲令農夫女工安其所用而售其貨乎仕不得販賣漢張禹上䟽欲令諸曹侍中已上無得貶賣犯者請免官及削爵孔權萬紀帝譲曰以利規我見金冶門言利崔羣是時皇甫鏄言利幸於帝隂藉左右求宰相羣數言其佞邪不可用世訾其嗜利裴冕領使既衆吏白俸簿月二千緡冕顧視喜見顔間世訾其嗜利枘鑿萬端髙適出為蜀彭二州刺史始上皇東還分劔南有兩節度百姓弊于調度而西山三城列戍適上䟽曰劔南雖名東西川其實一道自卭關黎雅以抵南蠻由茂而西經羌中平戎等城界吐蕃瀕邊諸域皆仰給劒南異時以全蜀之饒而山南佐之猶不能舉今列梓遂等八州專為一節度嵗月之計西川不得叅也嘉陵北困夷獠日雖小定而痍痏未平耕紡亡業衣食貿易皆資成都是不可得役亦明矣可税賦者獨成都彭蜀漢四州而已以四州耗殘當十州之役其弊可見而言利者枘鑿萬端窮朝底夕千按百牘皆取之民官吏懼譴責及鄰保威以罰抶而逋逃益滋劉晏四利劉晏乃移書於宰相元載以為大抵運之利與害各有四京師三輔苦税入之重淮湖粟至可減徭賦半為一利東郡凋破百戸無一存若漕路流通則聚洛邑㕓漸可還定為二利諸將有不廷戎虜有侵道聞我貢輸錯入軍食豐衍可以震耀夷夏為三利若車舟既通百貨雜集航海梯嶠可追貞觀永徽之盛為四利誘人陸䞇奏立國惟義與權誘人惟名與利名近虛於教為重利近實於德為輕責臣以利裴諝拜河東鹽鐵使時關輔旱諝入}
