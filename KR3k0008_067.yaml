body:
  text: 卷第六十七祭祀一白苟失其儀是誣於祭鬼神饗德祭祀貴誠禮崇明祀神享至誠夙夜毖祀毖敬也周書祭祀以為人也祀國之大事也籩豆有踐祭之以禮無違之義祭神如神在吾不與祭如不祭祭必齋如也祀事孔明祭思敬齋敬之心國之大事在祀與我四時之常祀陳其簠簋如見所祭者入室僾然如見諸其位祀典禮祭者外則盡物祭物備也內則盡志敬也祝史正辭禋祀享祀豐潔薦馨香勞矣豈弟君子神所勞矣勞勞來也弔矣敬之吐之神其吐之乎吐猶不食也饗之諂也非其鬼而祭之語季氏旅於泰山子謂冉有曰汝不能救與來顧來饗慎抑抑之儀降禳禳之福蘋藻之奠誰其尸之有齊季女克禋克祀是享是宜錫以純嘏純大也嘏福也洪範八政三曰祀血食依德享義仰得一之靈降時萬之福儼恪之儀敬齋之色禮不卜常祀月令正月修祭典國垂祭故歲首修之正若思之貌仰如在之神祭祀以馭其神周禮祭祀之式周禮太宰以九式均節財用曰祭祀之式謂財用之節度又曰以祀禮教敬則人不苟祭祀之容周禮六儀一曰祭祀之容注濟濟皇皇苟祭典之有乖在禮容而奚取為人祈福聖人為能饗帝孝子為能享親子曰我祭則受福蓋得其道矣福非謂望神之報以祭祀禮備為福豐凶禮祭豐年不奢凶年不儉注常用數之仂暴浩喪祭用不足曰暴有餘曰浯祭用數之仂算今年一年經用之數用其什一也從生祭從主者父為大夫子為士葬以大夫祭以士非禮不誠禱祠祭祀供給鬼神非禮不誠不莊鼎俎既陳籩豆既設薦陳侑酳旅酬獻酬尸祝過時祭過時不祭祀首義誣祭今之祭者不首其義故誣於祭也注首本也謂失禮也於彼於此禮曰不知神之所在於彼乎於此乎祭祀主敬祭有十倫見事鬼神道焉見貴賤之等焉幼之序夫婦之別親疏之殺爵賞之施君臣之位上下之際政事之均父子之倫著誠致潔禮苟非蘋藻之誠是用秕稗之禮追養祭者所以追養繼孝納約易曰樽酒簋二用缶納約自牖終無咎祀不期豐二簋可用享八樽祭天以疏布羃八樽多儀書曰享多儀儀不及物祀無豐于昵傳説戒高宗祭祀不當豐厚于親近之廟恤祀明德恤祀吉蠲祝事無乃殄乎狐突謂申生曰君祀無乃殄乎乏祀鬼猶求食致其誠信潔以馨香忠敬貴氣大祀不享味而貴氣臭也齋莊之色怵惕之心齋如祭必齋如顒若易觀盥而不薦有孚顒若武王所重武王克殷所重民食喪祭執籩豆孔祠使者王璵出為淮南節度使猶兼祠祭使九宮祠奏置太一壇勸帝身見九宮祠長其恩愛韓愈原道篇為之葬埋祭祀以長其恩愛薦饗新宮正月元日初見宗祖躬執百禮登降拜俯薦饗新宮視瞻梁梠戚見容色淚落入俎侍祠之臣助我惻楚韓愈元和聖德詩牢蔬中堂高且新四時祭牢蔬示兒上宰嚴祀事清塗振華鑣上不能嚴清牲糈酒食器皿粗弊不能嚴清潮州祭神祭祀之義大率有三禋于天地所以示人報本也祠于聖賢所以訓人崇德也享于祖孝所以教人追孝也三者行於天下則萬人順百神和此先王所以重祭祀也白居易議祭祀毛牷既副椒馨爰糈柳宗元湘妃廟牲牢伊碩黍稷伊豐睢陽廟碑嘔啞俯僂黍稷稻梁嘔啞俯僂杜牧黃州祭神文先祭不敢食捧鮮望清玄有客得嘉魚自謂天見憐先祭不敢食捧鮮望清玄劉禹錫有獺吟貞元中太常奏每年大中小祠共七十七祭出南部新書潔心勤禮潔心勤禮導暢純精柳宗元終南祠堂碑唐開元禮凡大祠若干中祠若干咸以御史監視祠官有不如儀者以聞其刻印移書則曰監祭使寶應中尤異其禮更號祠祭使俄復其初柳宗元監祭使壁記又制凡供祠之吏雖當齊戒得以決罰同上聖人之於祭祀非必神之也蓋亦附之教焉事於天地示有尊也不肅則無以教敬事於宗廟示有孝也不肅則無以教愛事於有功烈者示報德也不肅則無以勸善將有事焉則祠部上其日吏部上其官奉制書以來告然後頒于有司以謹百事同上太常修其禮光祿合其物百工之役先一日咸至于祠而考閲焉同上蘭蒸椒漿歲事罔缺李白漂陽義女碑銘夫祀先王以佐教也未必神之柳宗元非國語分祀事而孔修杜甫太清賦歷良辰而戒告分祀事而孔修事神以誠內外單盡不為表襮韓文南海神廟碑牲王有禮祀典無虧李白祭九江文凡祭祀之名有四唐六典禮部凡祭祀之名有四一曰祀大神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝五方帝皇地祇神州宗廟為大祀日月星辰社稷先代帝王嶽鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師靈星山林川澤五龍祠等及州龍祠等及州縣社稷釋奠為小祀國有大祭祀之禮帝親祭則太尉為亞獻光祿卿為終獻上享于神靈太祝止辭庶官精誠李白賦捧玉瓚而一獻光靈來格振金石而六變魄寶昭臨李德裕上尊號太常卿七曰太卜及祭祀卜日皆往蒞之於太廟南門之外唐六典白四時追祭礿禘有常九命辨儀牲牢異數孝自中出祭宜無怠禮由外作物必有常孝因順立禮以備成禮明貴賤薦陳之品有差孝備蒸嘗追養之心宜勉禮曰春禘秋嘗合諸天道順天時而祀也又曰春礿夏禘秋嘗冬蒸傳曰凡祀始殺而嘗建酉之月閉蟄而蒸建亥之月有事于祖宗追遠孝思春秋匪懈享祀不忒禮吉蠲為饎是用孝享礿祀蒸嘗禹致孝於鬼神致美於黻冕祭服也常祀四時之禮苾芬孝祀苾芬馨香是蒸是享薦其嘗事霜露既降君子履之必有悽愴之心非其寒之謂也春雨既濡君子履之必有怵惕之心如將見之皆感時念親也樂以迎來哀以送往謂一祭之問齋之日思其笑語思其居處思其志意思其所樂思其所嗜也祭之日入室僾然必有見於位出戶而聽愾然必有聞乎歎息之聲色不忘乎目聲不絶乎耳嗜欲不忘乎心安得不敬乎死則敬享孝子能享親祭之日樂與哀半享之必樂已至必哀祭者所以追養繼孝也廟祧鼎俎祭則致其嚴鬼享之祭則宗廟致敬時思春秋祭祀以時思之雨露既濡必有若思之貌春秋匪懈乃虔如在之心孝感於時雖云罔極祭不以禮豈曰無違追遠誠謂孝思違禮則乖敬饗時祭禮在首義而或愆於時思而何有宗廟本仁祭祀首義儼齋如之色若見其容想愾然之聲必聞其歎仲尼奉薦趨趨以行音促敬慕故少威儀孝子臨尸齊齊其敬音濟禮追孝祭祀嗜芰之薦屈到嗜芰命家老薦之父母既沒必求仁者之粟以祀之此之謂禮終雖貧困猶不敢取惡人物以事亡親敬而時也祭則觀其云云祭則享之諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿謂四方朝聘各闕一時干夾大夫士有大事省於其君干夾及其高祖干空也謂無廟而祭於壇孔象時王者法諸天道制祀典焉蒸嘗象時通典太常議蒸嘗禘於廟陳貞節傳伊闕男子孫平子上書曰乃正月太廟毀此躋二帝之驗也春秋君甍卒哭而祔祔而作主時祀於主蒸嘗禘於廟今乃違之蒸嘗伏臘嚴挺之戶部侍郎蕭炅林甫所引不知書嘗與挺之言稱蒸嘗伏臘乃為伏臘挺之白九齡省中而有伏獵侍郎乎示之以禮陛下申明國典蒸嘗不經者示之以禮白居易議祭祀崩心之痛罔極歲時蒸嘗崩心之痛罔極駱賓王上裴侍郎書蒸嘗不過把握蒸嘗不過把握天神以精明臨人者也求備於物不求豐大韋述宗廟加籩議月祭彭景直時獻昭乾三陵皆日祭景直上言在禮陵不日祭宗廟有月祭蒸礿韓愈郾城聯句何日親蒸礿蒸嘗之獻既著於常式通典薦新三白記曰仲春獻羔開冰先薦寢廟羞以含桃孟夏云云先薦寢廟天子嘗新先薦寢廟嘗麻嘗稻嘗麥大夫士有田則祭無田則薦祭以首時薦以仲月庶人春薦韭夏薦麥秋薦黍冬薦稻韭以羊麥以魚黍以豚稻以鴈配也薦新如朔奠明薦陳薦殷薦孔有新必薦韋縚傳太子賓客崔沔議曰唐家清廟時享有新必薦順時令也薦貴新同上薦貴新味不尚褻雖曰備物猶有節制存焉鉶俎籩豆簠簋鐏疊周人時饌也其用通於燕享賓客周公乃與毛血玄酒通共薦晉中郎盧諶家祭皆晉日食則當時之食不可闕於祀巳薦櫻桃赤墀櫻桃枝隱映銀絲籠千春薦陵寢永永垂無窮杜甫往在時物鮮美文粹崔沔宗廟加籩豆議時物鮮矣編諸甲令因宜而薦以類相從則新鮮肥濃盡在是矣時膳具設清廟時享禮饌畢陳用周制也而古式存焉園寢上食時膳具設遵漢法也而珍味極焉苑囿之內躬稼所收搜狩之時親發所中莫不主鮮美薦而後食盡誠敬也但當申敕有司祭如神在無或簡怠勉悔虔誠上近古薦新彭景直諸節進食近古之薦新鄭康成曰殷事月之朔半薦新奠也新果韋縚請室加籩豆每四時以四時新果珍饔實之元日冬至寒食伏臘社薦新於諸陵禮樂志元日冬至寒食伏臘社薦新於諸陵其物五十有六品始將進御所司必先以送太常與尚食滋味薦之祼四白易曰觀盥而不薦盥禮大而薦禮小王入太室祼書周禮肆師祼築鬻築鬻所築煮以祼也鄭司農云築煮謂築香草以為鬯也鬱人凡祭祀賓客之祼加鬱鬯鬱草也祼以鬱鬯既灌然後迎牲禘自既灌而往者吾不欲觀之論語莫重於祼記曰祭有三重獻之屬莫重於祼孔薦祼韓愈南海神廟碑明宮齋廬上甫旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼藉籩豆薦祼興俯不中儀式以祼以擩孝孫兢兢執爵而升以祼以擩以伏以興水陸具來羶薌畢登劉禹錫王氏先廟碑躬祼鬱鬯文粹張説酌瓚肅和之樂章躬祼鬱鬯跪奠羽神張説酌獻用壽和宮酌鬱鬯跪奠羽神後世疑孫樵西齋録起王氏已廢之魂止配天皇者何登嫌黜冢不可謂順子懼後世疑於禘祼也聲明格文粹張説開元樂章聲明格祼奠臨未明三刻贊引引太廟令太祝宮闈令詣東陛升常詣獻祖室入開坎室太祝宮闈令奉出神主置于座訖引太廟令以下次奉出懿祖次奉出太祖次奉出代祖次奉出高祖次奉出太宗次奉出高宗次奉出中宗次奉出睿宗神主置于座如獻相之儀駕至大次門外回輅南向將畢降立于輅侍中進當鑾駕前跪奏稱侍中臣其請降輅俯伏興皇帝降輅乘輿之大次繖扇華蓋侍衛如常儀太常卿引皇帝至廟門外殿中監進鎮圭皇帝執鎮圭華蓋仗衛停於門外近侍者從入如常皇帝至版位西向立太常卿奏請再拜退復位太常卿前奏有司謹具請行事協律郎跪俯伏舉麾鼓祝奏永和之樂樂舞九成偃麾戛敔樂止太常卿引皇帝入詣獻祖神座前北向跪以鬯祼地奠之俯伏興太常卿引皇帝出戶北向再拜太常卿引皇帝次祼懿祖次祼太祖次祼代祖次祼高祖次祼太宗次祼高宗次祼中宗次祼睿宗並如上儀通典繹五白書曰高宗肜日殷曰肜周曰繹爾雅曰繹又祭也祭之明日又祭名繹於庫門內祊之於東方失之矣記宗不具不繹國語文伯母祭悼子康子與焉酢不受徹俎不宴敬薑不親受徹俎又不與康子宴飲也宗不具不繹宗臣不具任一本作在敬薑不繹也繹不盡飫而退宗具繹畢而飲不盡飫而退恐醉失遠嫌也猶繹傳有事於太廟公子遂卒于垂壬午猶繹注卿佐之喪不為廢繹非禮也故曰猶猶者可已之辭孔陸龜蒙書陸龜蒙答友生書謂史語直而淺則春秋書壬午猶繹萬入去籥之類果純直而淺乎廣求通典注郊特牲云索祭祝于祊緣此處生乎待賓客之處故廣求也祭名為繹亦名為祊通典注云爾雅云繹又祭也春秋云壬午猶繹注云先日辛巳有事於太廟故禮器云祊祭明日之繹祭也謂之祊者以於廟門之傍因名焉侑六白周禮以樂侑食勸食也儀禮乃燅尸俎燅音尋溫也乃議侑于賓以異始異始廣發也凡侑食不盡食禮以妥以侑詩孔侑香潔韓愈潮州祭神文吹擊管鼓侑香潔也侑孔子關播上元中詔擇古名將十人配享武成廟如十哲侑孔子播奏所配年世不同請罷之詔可侑以音聲清酌嘉羞侑以音聲潮州祭神文勸侑厥初孰開張僶俯誰勸侑韓南山詩奠獻嗚咽文粹蘇頲大唐東封頌侑而作主奠獻嗚咽天子之孝也人思得飽文粹張九齡送張説上賜謨序食以樂侑人思德飽戛鼓侑牢牲韓愈城南聯句侑酳申申王道式訛柳宗元道州先聖廟碑師于辟雍大邦以和侑酳申申王道式訛神乎來哉辭以為侑韓愈祭文侑神荷傳符以在今敢侑神而無報舊史禮儀志第三臨茲饗侑柳宗元祭段弘古文庶鑒于誠臨茲饗侑作主侑神謹以制幣一元大武柔毛剛鬣明粢薌合薌萁嘉薦醴齊陳于表位作主侑神通典進熟白王假有廟易七世之廟可以觀德書奕奕寢廟寢廟繹繹相連屬前廟後寢也清廟肅雍作廟翼翼並詩本仁禮祖廟所以本仁也新廟奕奕奚斯所作閟宮有洫清靜民有寢廟不忍廟也鄭子産將為廟除子太叔之屬廟在道南其寢在道北將毀之子太叔使其徒執用以立而無庸毀子産過曰何故不毀曰不忍廟也諾將毀矣子産使避之傳言子産仁不毀人廟刻桓宮桷丹桓宮楹皆僣天子禮禮曰天子諸侯黝堊大夫蒼士黈刻桷天子斫之礱之加密石焉土斫本設為宗祧教人反古復始廟貌周禮廟則有司修除之祧則有司黝堊之榖梁云復廟重簷重屋也刮楹達鄉鄉牖屬也反坫出尊崇坫康圭疏屏天子之廟飾也出尊當尊南康當為亢又為高坫亢所受重樽於上焉壞廟有時日月擔改塗毀故納新漢書茅屋采椽貴儉也傳曰清廟茅屋納牲詔於庭血毛詔於室羹定詔于房周禮辨廟祧之昭穆凡建國左宗廟右社稷晉范寧字武子為豫章守下十五縣皆使左宗廟右社稷淮之太廟皆煩人力修造後抵罪周廟欹器東漢時猶在御座漢末喪亂失之形制遂絶杜預元凱創意造成奏上帝嘉歎之入廟服晉輿服志公特進列卿大夫世婦中二千石二千石夫人紨繒簪珥入廟自二千石夫人上至皇后皆蠶衣為朝服廟損免官晉元康四年大風後廟闕屋瓦數傾落免太常荀寓以嚴詔所譴不敢言皆謂事輕責重也傳曰太室屋壞魯太廟之室也衣冠遊漢朝議者又以為清廟之詩交神之禮無不清淨今衣冠出遊有車騎之衆風雨之氣非所謂清淨也鑿廟壖朝錯為內史府居太上廟堧中東出不便錯乃穿門向南出鑿廟壖垣中申屠嘉奏錯鑿廟垣為門上曰非廟垣乃壖中孔馬周疏自陛下踐祚宗廟之享未嘗親事切惟聖情以乘輿一出所費無蓻故忍孝思以便百姓而一代史官不書皇帝入廟將何以貽厥孫謀示來葉耶臣知大孝誠不在俎豆之間然聖人訓人必以己先之示不忘本奏郊廟祭事不虔崔黯為監察御史奏郊廟祭事不虔文宗語宰相曰宗廟之禮朕當親之但千乘萬騎國用不給故使有司侍祠然是日朕正衣冠坐以俟旦今聞主者不虔祭器敝惡豈朕事神蠲潔意耶公宜敕有司道朕斯意議殷盈孫擢太常博士光啓三年帝將還京而十廟焚殘告享無所盈孫白宰相始乘輿西有司盡載神主以行至鄠悉為盜奪今天子還宮宜前具其禮宰相建言修復宗廟功費廣請與禮官議時它博士不在獨盈孫從議曰故廟十一室二十三楹楹十一梁垣墉廣袤稱之今朝廷多難宜少變禮接至德時作神主長安殿饗告如宗廟廟成乃祔今正衙外無它殿伏聞詔旨以少府監寓太廟請因增完為十一室其三太后廟權舍西南夾廡須廟成議遷詔可清廟不奢崔沔歷太子賓客是時太常議加宗廟籩豆又欲增喪服沔曰班固稱墨家出於清廟是以貴儉然清廟不奢舊矣享廟應用樂裴寬改太常博士禮部建言忌日享廟應用樂寬自以情立議曰忌卑則作樂廟尊忌則備而不奏中書令張説善之請如寬議建親廟六朱子奢纍轉諫議大夫弘文館學士始武德時太廟享止四室高祖崩將附主于廟帝詔有司詳議子奢建言漢丞相韋玄成奏享五廟劉歆議當七鄭玄本玄成王肅宗歆於是歷代廟議不一且天子七諸侯五降殺以兩禮之正也若天子與子男同則間無異等非德厚遊廣德薄遊狹之義臣請依古為七廟若親盡則以王業所基為太祖虛太相室以俟無疆迭遷乃處之於是尚書共奏自春秋以來言天子七廟諸侯五大夫三士二惟親親顯尊尊為不可易之法請建親廟六詔可乃祔弘農府君高祖神主為六室侍中若饗宗廟則進瓚而贊酌鬱酒以祼既祼則贊酌醴齊六典去孝弟兩字崔龜從泰和二年改太常博士龜從長於禮學精歷代沿革問無不通時饗宗廟於敬宗室祝版稱皇帝孝弟龜從議曰臣審詳孝字載考禮文義本主於子孫理難施於兄弟臣謂享敬宗廟宜去孝弟兩字舊史宗廟有纍卯之危獨孤及代宗以去拾遺召既至上疏陳政曰陛下不以此時厲精更始思所以救之之術忍令宗廟有纍卯之危萬姓悼心失圖臣實懼焉京師宗廟所在李大亮臨終表又言京師宗廟所在願以關中為意唐家宗廟共殿異室以右為首若奉遷主納右夾室而得尊處祈之禱之未絶也有詔如敬宗議朱子奢傳許敬宗議元宗奉昭成皇后祔睿宗廟又並升肅明皇后陳貞節奏云廟必有配肅明皇后既非貴宜在別廟睿宗於孝和弟也兄弟不相為後請以中宗為別廟太廟壞陳貞節傳五年太廟壞伊闕男子孫平子上書乃者正月太廟毀此躋二帝之驗也春秋太室壞説曰僖雖閔兄嘗為之臣臣在君上是謂失禮且兄臣於弟猶不可躋弟嘗臣兄乃可躋乎陛下未祭孝和先祭太上皇先臣後君昔躋兄弟上今弟先兄祭昔太室壞今太廟毀與春秋正同武后篡國孝和中興有功今內主別祠不得列乎世亦已薄矣夫功不可棄君不可下長不可輕且臣繼君猶子繼父故禹不先鯀稷不先不窋宋鄭不以帝乙厲王不肖猶尊之也況中興邪臣請遷孝和還廟何必違禮下同魯晉哉帝語宰相召平子與博士詳議博士護前言合軋平子平子援經辨數分明不能屈蘇頲右博士故平子坐貶都城尉前春禮郊廟祀事親聖躬微軀忝近臣景從陪群公杜甫往在詩前春禮郊廟祀事親聖躬微軀忝近臣景從陪群公登階捧玉册峨冕聆金鍾侍祠恧先露掖垣邇濯龍營室主夫宗廟杜甫朝獻太清賦斷紫雲而竦墻撫流沙而承霤同上廟焉而人鬼饗韓文事於宗廟示廣孝也柳文太常卿凡有事於宗廟少卿帥太祝齋郎入薦香燭整拂神幄出入神至將享則與良醞令實尊罍六典昔者先王感時代謝思親立廟曰宗廟因新物而薦享以申孝敬遠祖非一不可遍近故親盡而止唐虞立五廟二昭二穆及始祖也其祭尚氣先迎牲殺於庭取血告於室以降神然後奏樂尸入王祼以鬱鬯夏氏因之殷制土廟周制小宗伯掌建國之神位左宗廟通典唐武德元年追尊高祖曰宣簡公曾祖曰懿王祖曰景皇帝考曰元皇帝法駕迎神于太廟始享四室高祖崩增修太廟岑文本議曰祖鄭玄者則陳四廟之制述王肅者則引七廟之文貴賤混而莫辨是非紛而不定夫天子三昭三穆與太祖之廟而七是以晉宋齊梁皆依斯義立親廟矣豈有國之茂典不刊之休烈乎若使違群經之正説從纍代之疑議背子雍之篤論遵康成之舊學則天子之禮下逼於人臣諸侯之制上潛於王者非所謂尊卑有序名位不同者也請依晉宋故事立親廟六其祖宗之制式遵舊典制從之通典睿宗開元十年制後中宗神主就正廟仍創立九室其後制獻祖懿祖太祖代祖高祖太宗高宗中宗睿宗太廟九室注中宗睿宗兄弟相繼孫平子上書論之具昭穆篇同上唐既革命稱帝改大唐京太廟為享德廟四時唯享高祖以上三室餘四室閉其門廢享祀之禮又於東都改制太廟為七室祔武氏七代神主又改京崇先廟為崇尊廟其享祀如太廟之儀仍改太廟署為清廟臺加官員崇其班秩神龍元年改享德廟依舊為京太廟遷武氏七廟神于西之崇尊廟東都置太廟以景皇帝為太祖廟崇六室上釁廟八白成廟則釁之饗人舉羊升屋自中刲羊血流于前乃降釁於屋下交神明之道路寢成則考之而不釁祭祀面禳釁供雞牲其廟則有司修除之祧則有司黝堊之小子釁軍器邦器太卜蒞釁主軍器器鼓鐸主遷主孔斬阿布離釁鼓李忠臣本董秦也奚王阿篤幼孤初引衆與正臣合已而紿約夜乘間襲秦秦按戰敗之追奔至溫泉山禽首領阿布離斬以釁鼓建旆釁鼓遂據天位柳宗元漢原廟銘豈神明貴殺文粹李華上論鍾鼓器械必釁之豈神明貴殺享腥羶歟今亡其禮若以軍行唐張齊賢等議春秋君若以軍行祓社釁鼓祝奉以從故曰不用命戮于社社稷主用石以月奉而行也武庫令凡大駕親征及大田巡狩以羝羊猳豬雄雞釁鼓六典主九白周禮司巫匰主主木主匰器也偽主齊柏公亟舉兵作偽主以行其瓦薦諸祖廟廟有二主自桓公始也廟有二主見上主出廟入廟必蹕古者師行必以遷廟主行載于齊車言必有尊也今也取七廟主以行則失之矣廟無虛主群廟之主作僖公主虞主用桑練主用栗喪主於虞吉主於練作主壞廟有時日祔而作主哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗士虞禮桑主不文吉主皆刻孔取神主祕于家嚴郢補太常協律郎守東都太廟祿山亂郢取神主祕于家至德初定洛陽有司得以奉迎還廟三品以有神主唐禮志別立神主歸崇敬言東都太廟不當置木主按禮記典禮虞主用桑練主用栗作栗主則瘞桑主猶大無二日土無二王也東都太廟本武后所建以祀諸武中宗去主存廟以備行幸遷都之置且商遷都前八後五不必每都別立神主也負木主以逃崔佑甫安祿山陷洛陽祐甫冒矢石入私廟負木主以逃大難始平宜以大臣馳傳迎復神主陸贄諫奉神主于太極殿開元五年太廟四室壞奉其神主干太極殿天子素服避正殿輟朝三日時將行幸東都遂謁神主于太極殿而後行九室神主亡失安祿山陷兩京宗廟皆焚燬肅宗即位西都建廟作主而東都太廟毀為軍營九室神主亡失至大曆中始於人間得之寓于太微宮不復祔享以太微神主祔東都廟自建中至于會昌議者不一或以為東西二京宜皆有廟而舊主當瘞虛其廟以俟巡幸則載主而行或謂宜藏其神主于夾室或曰周豐洛有廟者因遷都乃立廟爾今東都不因遷而立廟非也又曰古者載主以行者惟新遷一主爾未有載群廟之主者也至武宗時悉廢群議詔有司擇日修東都廟已而武宗崩宣宗竟以太微神主祔東都廟已上唐禮志白地祇饗德社土貴成美報記曰教民美報焉謂社稷也社勾龍也共工氏之子能平水土故後代祀之稷周祖后稷能播百榖故百代皆祀之仲春擇元日命人社祀社稷也春土興故祀之祈農祥也元日謂春分前後戊日也仲秋擇元日命人社賽秋成也元日近秋分前後戊日也先王祀社於國所以別地利也故禮行於社而百貨可極焉社祭土而主陰氣也君南饗於北牖下答陰之義也北牖社內北牖日用甲用日之始也天子太社必受霜露風雨以達天地之氣是故喪國之社屋不受天陽也絶其陽通其陰社所以神地之道地載萬物天垂象取財於地取法於天是以尊天而親地故教民美報焉唯為社事單出里單盡也皆往祭祀也所以報本反始天子有事於社報地功也時殷仲春禮展常祀吉日惟戊戊日社也魯侯之觀曹翽諫其非禮傳公如齊觀社非禮也曹翽諫曰君舉必書宰我之對宣尼非其失言哀公問社於宰我宰我對曰周人以栗曰使民戰栗子聞之曰成事不説云云祀典瘞禮埋幣也禮曰制幣犧齊去聲粢盛庶品並祭社之物奠瘞之禮詩事地以祭地只周禮乃奏太簇歌應鍾舞咸池以祭地祇地祇皆出奏樂於方丘八變則地祇皆出可得而禮矣瘞埋禮瘞埋於太折祭地也太折祭所春祈秋報書湯既勝夏欲遷其社不可勾龍為社湯欲改其社而後代無及勾龍者故不可作夏社亡書篇名言夏之社不可遷也貢五色土為王者社乃立冢土以御田祖以社四方周禮血祭祭社稷也勝國之社謂亡國之社也亳社殷社也出師者受脤於社傳設軍社奉以行凡建國右社稷獻功于社設社稷之堰而樹之田主田神以所宜木為社以松則曰松社亳社北牖使陰明也王為群姓立社曰泰社王自立社曰王社諸侯為國立社曰國社侯自立社曰侯社大夫已下成群立社曰置社傳曰社稷五祀之本后土社稷田正也里中社見上注枌榆社土發而社助時也土發春分欒公社燕為欒布作錢繫樹為社魏邴原根矩拾遺錢繫於樹因而繫之者逾多原惡其惑衆明日乃取錢以為社供也公社用羊漢高令縣為公社有司請令縣常以春二月及臘祠社稷以羊制曰可官稷漢興遂於官社稷以夏禹配食官社稷配食官稷者也稷祠漢武言周興而部邑立稷祠至今常血食於天下於是高祖令天下立靈星祠以牛也二社一稷晉禮志太康中詔曰社實一神其並二社祀之傅咸奏曰祭法王社國社各有其義天子躬耕土以重孝享粢盛自為立社為藉而報也國以人為本人以榖為本又為百姓立社而祈榖焉事異報殊所以二也里社漢有司奏民里社各任裁以祠制曰可又里中陳平為宰分胙肉甚均父老曰善哉孺子平曰宰天下亦然伐社樹魯阮修宣子伐社樹或止之修曰若社而為樹伐樹則社移樹而為社伐樹則社亡矣石相社石慶為齊相舉國皆慕其家行不言而大治為立石相社配社陸雲為浚儀令去官百姓追思之圖畫形象配食縣社又宋登叔陽為汝陰令號神父遷穎川守市無二價路不拾遺汝陰人配食於社又甄子然孝行早卒北海相孔融恨不及之令配食縣社孔春秋二社本于農張文琮出為建州刺史州尚淫祀不立社稷文琮下教曰春秋二社本于農今此州廢不立尚何觀比歲田畝卒荒或未之思乎神在于敬可以致福於是始建祀場民悅從之沒而可祭於社古之所謂鄉先生沒而可祭於社者其在斯人乎韓愈送楊少尹用所宜木張齊賢周之田主用所宜木其民間之社歟非大社也古社基址在人散社不神元稹古社詩願為同社人雞豚燕春秋韓愈敬逾齊國社柳宗元詩民即其里為德星社崔郾通得祀而遍天下自天子至郡邑守長通得祀而遍天下者唯社稷與孔子焉韓廣五丈以五土為之者社稷之壇也唐禮志社以后土稷以后稷同上神州社稷以兩圭有邸幣以黑同上先農壇請改曰帝社壇韋叔夏張齊賢等乃奏言經無先農禮曰王自為立社曰王社先儒以為在籍田也永徽中猶曰籍田垂拱後乃為先農然則先農與社惟一神今先農壇請改曰帝社壇以合古王社之義其祭準令以孟春吉亥祠后土以勾龍氏配於是為帝社壇又立帝稷壇於西如太社太稷而壇不設方色以異於太社唐禮志凡州縣皆置社稷如京師唐六典顓頊祀共工氏子勾龍為社列山氏子柱為稷周制天子立三社祭法云王為群姓立社曰太社於庫門內之西立之王自為立社曰王社於籍田立之亡國之社曰亳社廟門之外立之諸侯立三社祭法曰諸侯為百姓立社曰國社於皋門之西立之自為立社曰侯社亦於籍田中立之亳社大夫以下立一社祭法曰大夫以下成群立社曰置社立名雖異其神則同皆以勾龍配之稷周棄配之社者五土之神稷者於五土之中特指原隰之祇社壇在東稷壇在西俱北面天子之社則以五色土各依方色為壇廣五丈諸侯則但用當方之色為壇皆立樹以表其處又別為主以象其神大夫以下但各以地所宜之木而立之通典唯中央數尺飾以黃土舊社稷壇上四方布以方色中央數尺飾以黃土禮官韋叔夏議云天子太社廣五尺各分置四方色訖上冒以黃土象王者覆被四方據此合用黃土遍覆壇上今檢舊壇之上亦備方色唯中央數尺飾以黃土則是覆被之道有所不及既乖舊制請準古改造同上天寶三載詔社稷列為中祀頗紊大猷自今以後升為大祀同上大唐社稷大唐社稷亦於含光門內之在仲春仲秋二時戊日祭太社太稷同上禮神之玉禮神之玉蓋用兩圭有邸其牲王制云天子祭社稷皆太牢諸侯祭社稷皆少牢皆黝色用黑幣日用甲祭日之晨玉及尸皆服絺冕同上説曰王者諸侯所以立社稷者為萬民求福報功也人非土不立非榖不生土榖不可遍敬故立社稷而祭焉同上諸里祭社前一日社正及諸社人應祭者各清齋一日於家正寢應設饌之家先修治神樹之下又為瘞坎于神樹之北座取足容於物掌事者設社正位於稷深西北十步東面諸社人位於其後東面南上設祝奉血豆位於瘞坎之北南面祭器之數每座樽酒二并勺一以巾覆之俎一籩二豆二爵二簠二簋二祭日未明烹牲於廚夙與掌饌者實祭器常事者以席入社神之席設於神樹下稷神之席設於神樹西俱北向質明社以下各服其服社正以下皆再拜祝進跪讀祝文曰維年月日某坊社正姓名合社若干人等敢昭告于社神惟神載育黎元長茲庶物時屬仲春仲秋日惟吉戊謹率常禮恭用特牲上皇帝春秋上戊祭祭日未明三刻諸祭官各服其郊社令良醞令各帥其屬入實樽罍玉幣太官令帥進饌者實諸籩豆簠簋皆設於神廚同上祭祀祝文敢昭告于太社惟神德兼博厚道著方亙載生品物含洪庶類謹用仲春祗率常典同上祭稷祝文敢昭告于后稷氏爰以仲春式揀吉辰敬修常禮敢昭告于太稷惟神功協稼穡闡修農政允茲從祀用率舊章同上地祇十一白夏至於澤中方丘奏樂之八變地祇可得而禮也周禮夏至祀皇地祇於方丘記孟冬祀神州地祇於北郊為下必因川澤因地事地漢立后土祠於汾陰睢上孔北郊許子儒高宗時為奉常博士初帝已封禪復詔以正月祭北郊於是子儒與博士陸遵揩張統師權無二等共白北郊月不經見漢光武正月建北郊咸和中議北郊以正月武德以來用十月請循武德詔書明年詔圓方二丘明堂感帝神州宜奉高祖太宗配春官修頌祇之書杜甫南郊賦春官修頌祇之書夏至祭皇地祇以高祖配五方之嶽鎮海瀆原隰丘陵墳衍在內壝之內各居其方而中嶽以下在西南孟冬祭神州地祇以太宗配唐禮樂志祀皇地祇以黃琮同上以著尊實泛齊祀皇地祇神州地祇以著尊實泛齊犧尊實醴齊象尊實盎齊山罍實酒皆醞同上告至自昔后王時邁省方柴燎告至幽隱胥洎大舜則五載一巡武帝則三歲一祭朕就為損益折以法度一紀再駕亦無闕焉張説后土神祠碑黃雲蓋於神鼎絳光燭於靈壇自昔已然乃今復見同上張説王者父天母地故包犧氏俯而觀法焉顓帝乃命火正黎司地以屬人夏以五月祭地祇殷以六月祭周制大司樂云夏日至禮地祗於澤中之方丘其丘在國之北禮神之玉以黃琮牲用黃犢幣用黃繒王及尸同服大裘配以后稷通典唐制夏之日至祭皇地祇於宮城之北郊十四里為方丘壇因隋制以景帝配神州五方嶽鎮海瀆山林川澤丘陵墳衍原隰皆從祀地祇及配帝牲用黃犢二神州用黝犢一嶽鎮以下加羊豕各五孟冬祭神州於北郊景帝配牲用黝犢二貞觀中奉高祖配地祇永徽中廢神州之祀乾封初詔依舊祀於渭水北置同上正祀典房元齡與禮官議唯祭皇地祇及神州以正祀典同上十一年玄宗自東都將還西京幸并州至開元十一年親祠后土為蒼生祈榖自是神明昭祐纍年豐登有祈必報禮之大者且漢武親祠睢上前後數四請準舊事至后土行報賽之禮從之至十一月祀后土於睢上其文曰恭惟坤元道昭品物廣大茂育暢於生成庶憑休和惠及黎獻博厚之位粵在汾陰肅恭時巡用昭舊典敬以琮幣犧牲粢盛庶品備茲瘞禮式展誠愨睿宗皇帝配神作主禮畢令有司刊石于祠所同上祀五帝十二白周禮太宰職祀五帝掌百官之誓戒與其具修掌次祀五帝則大次小次重帟重桉五祀奉牛牲羞肆肆解骨體也月令春其帝太皞夏炎帝中央土季夏黃帝秋少昊冬顓頊渭陽五帝新垣平言長安東北有神氣若人冠冕東北神明之舍宜立祠上帝以合符應遂作渭陽五帝廟同宇同宇謂上同下異禮所謂復廟重屋也文帝親郊見渭陽五帝廟五帝廟臨渭其北穿蒲池云設座儀晉群臣議五帝即天也五氣時異故殊其號名雖五其實一神明堂南郊宜除五帝之座五郊改五精之號皆同稱昊天上帝各設一座而已孔五行之精九榖之宗王仲丘歷左補闕時典章差駁仲丘欲合貞觀顯慶二禮即上言貞觀禮正月上辛祀感帝於南郊顯慶禮祀昊天上帝於圓丘以祈榖臣謂詩春夏祈榖于上帝禮上辛祈榖于上帝則上帝當昊天矣鄭元曰天之五帝遞王王者必感一以興故夏正月祭所生於郊以其袒配之因以祈榖感帝之祀貞觀用之矣請因祈榖之壇遍祭五方帝五帝者五行之精九榖之宗也請二禮皆用詔可冬至祀昊天上帝於圓丘以高祖神堯皇帝配東方青帝靈威仰南方赤帝赤熛怒中央皇帝含樞紐西方白帝白昭拒北方黑帝汁光紀唐禮樂志立春祀青帝以太皞氏配歲星三辰在壇之下東北七宿在西北勾芒在東南立夏祀赤帝以神農氏配熒惑三辰七宿祝融之位如青帝土王之日祀黃帝以軒轅氏配鎮星后土之位如赤帝立秋祀白帝以少昊氏配太白三辰七宿蓐收之位如赤帝立冬祀黑帝以顓頊氏配辰星三辰七宿玄冥氏之位如白帝五郊迎氣黃帝以黃鍾為宮樂志十二和一曰豫和五郊迎氣黃帝以黃鍾為宮赤帝以函鍾為徵白帝以太簇為商黑帝以南呂為羽青帝以姑洗為角皆文舞六成壇其廣皆四丈而高八尺者青帝七尺者赤帝五尺者黃帝九尺者白帝六尺者黑帝之壇也白報天之禮歸地之敬先王祭帝於郊所以定天位也將有事於上帝必先有事於頖宮大報天南郊就陽位也掃地而祭於其質也用繭栗之牲陳陶匏之器郊所以明天道報本反始正月天子乃以元日祈榖于上帝郊祀昊天上帝於圓丘上帝其饗為人祈福凡在天下九州之人無不咸獻其力以供皇天上帝十一月祀昊天上帝於圓丘凡啓蟄而郊建寅之月有事于天祈福于上玄文選六變之樂以降天神周禮大禮郊天卜郊非禮也禮不卜常祀魯以周公得用天子之禮故郊為魯常祀玄德升聞皇天眷命明德動天至誠感神毖祀敬也常祀禮曰郊之祭喪者不敢哭凶服不敢入國門敬之至也祭者吉禮不欲聞見凶事祭金人以為主霍去病祭金人注祭天以為主也天親克敬神享至誠盛禮備樂事天郊祀四海之內各以其職來祭以祀天神周禮奏黃鍾歌大呂舞雲門以祀天神天神皆降冬至日地上之園丘奏樂之六變則天神皆降可得而禮百神受職禮行於郊而百神受職焉天神饗德禮曰鬼神饗德郊祀貴誠郊特牲云貴誠之義郊血禮郊血至敬不饗味而貴氣臭也郊天勿用氣唯聖人為能饗帝讓德於天天子有善云云郊社之義所以仁鬼神也仁在敬也易曰殷薦于上帝書曰肆類于上帝柴望柴燎思文后稷克配彼天周禮大旅上帝張氈按設皇邸以褾祀之旅上帝供金版孤竹之管雲和之瑟雲門之舞於圓丘周禮凡陽祀用騂牲毛之郊天也燔柴於太壇祭天也越紼行事有喪不祭唯祭天地社稷為越紼行事吉土因吉上以饗帝于郊注吉土王者所都之地天位祭帝於郊所以定天位配天郊祀后稷以配天升中因名山以升中于天帝牛稷牛帝牛不吉以為稷牛注養二也帝牛必在滌三月稷牛唯具所以別事天神與人鬼也泛掃反道鄉為田燭不命唯人聽上謂郊祀也泛掃反道謂郊除其道用犢貴誠竹宮望拜漢武帝祀天天子自竹宮望拜百官侍祀也南郊匡衡議宜於長安定南北郊為萬世基天子從之既定衡言甘泉泰畤紫壇八觚宣通入方五帝之壇周環其下有群神之壇以尚書禋于六宗望于山川遍于群臣之義紫壇有文章采刻鏤黼黻之飾及王女樂石壇仙人祠瘞鸞輅騂騎寓龍馬臣聞郊紫壇饗帝之義掃地貴誠尚質不敢修其文以為神祇功德至大雖備庶物不足以報功唯至誠為可其紫殿飾女樂鸞輅騂騎龍馬石壇之屬宜皆勿修晉圓丘位晉始營洛陽南委粟山為圓丘廢郊四卜郊不從乃免牲郊不吉故免牲不郊猶三望望祭山川星辰也非禮也禮不卜常祀而卜之故曰非禮牛卜日曰牲牛卜得吉乃改名牛曰牲禮不卜常祀必以其時而卜其牲日但卜牛為牲擇日而已牲成而上郊卜怠慢也怠於古典慢棄舊法望郊之細也不郊亦無望可也又郊牛之口傷改卜牛死乃不郊非禮也言牛雖死當改卜取吉者郊不可廢故曰非禮商紂不修武王以伐書曰今商王受郊社不修魯國怠慢春秋用書見上孔以皇后為亞獻祝欽明景龍三年天子將郊欽明與國子司業郭山惲陰迎韋后意謬立議曰周官天神曰祀地祗曰祭宗廟曰享禮曰祀大神祭大祇享大鬼王有故不預則攝而薦追帥掌后首服以待祭祀內司服掌后六服祭祀則供又九嬪凡大祭祀后祼獻則贊瑤爵然則后當助天子祀天神祭地祇鄭玄稱闕狄后助王祭群小祀服小祀尚助況天地哉是時左僕射韋巨源助后掎製帝奪政事即傳欽明議帝果用其言以皇后為亞獻敬天命報所愛張九齡為左拾遺時玄宗即位未郊見九齡建言天百神之君王者所由受命也自古繼統之主必有郊配蓋敬天命報所受也不以德澤未洽年榖未登而闕其禮又迎日之至升紫壇陳采席陛下紹休聖緒于今五載而未行大報考之於經義或未通今百榖嘉生鳥獸咸若夷狄內附兵革用弭乃怠於事天恐不可以訓願以迎日之至升紫壇陳采席定天位則聖典無遺矣謝況則天臨朝武承嗣偽款洛水石導使為帝遣雍人唐同泰獻之后號為寶圖於是泛人又上瑞石太后乃郊上帝謝況蘇環折欽明帝南郊國子祭酒祝欽明建白皇后為亞獻安樂公主為終獻瑰以為非禮帝前折愧之帝昏懦不能從詔定儀典褚無量中宗將南郊詔定儀典時祝欽明郭山惲建言皇后為亞獻無量與太常博士唐紹蔣欽緒固爭以為郊祀國大事其折衷莫若周禮周禮冬至祭天圓丘不以地配惟始祖為主亦不以妣配故后不得與又大宗伯凡大祭祀王后不與則攝而薦豆籩徹是后不應助祭又內宰職大祭祀后祼獻則贊瑤爵祭天無祼知此乃宗廟祭耳巾車內司服掌后六服與五路無后祭天之服與路是后不助祭天也惟漢有天地合祭皇后參享事未代黷神事不經見不可為法不設皇地祇位賈曾天子親郊有司議不設皇地祇位曾請合享天地如古制並后祀等坐睿宗詔宰相禮官議皆如曾請一歲四祭黎幹言白虎通義曰祭天歲一者何事之不敢黷也故因歲之陽氣始達而祭之今一歲四祭黷莫大焉上帝五帝祀闕不舉怠孰甚焉黷與怠皆失也改郊張全義帝幸洛陽將祀天於南郊而不果其儀仗法物猶在全義因請幸洛陽南郊而禮物不具明年十一月莊宗幸洛陽南郊而禮物不具因改用來年二月然不責全義五代史古之王者必郊祀趙巖言古之王者必郊祀陛下即位猶未郊天議者以為朝廷無異藩鎮何以威重天下今河北雖失天下幸安願陛下力行之敬翔以為不可曰今府庫虛竭箕斂供軍若行郊禋則必賞賚是取虛名而受實弊也末帝不聽乃備法駕幸西京而莊宗取楊劉或傳晉兵入東都矣或曰扼泛水矣或曰下鄆濮矣京師大風拔木末帝大懼乃還遂不果郊五代四十二獸盾騰拿圓壇帖妥乃以上辛於郊用牡除于國南鱗筍毛虡廬幕周施開揭磊砢獸盾騰拿圓壇帖妥韓愈元和聖德詩文集卷一柴焰噓呵高靈下墮天兵四羅箕常婀娜駕龍十二魚魚雅雅宵升于丘奠壁獻斝衆樂驚作轟豗融治柴焰噓呵高靈下墮同上大輅親郊李德裕上尊號親旌承祀大輅親郊捧玉瓚而一獻光靈來格振金石而六變魄寶昭臨郊焉而天神假韓愈原道篇上南郊賦徐彥伯移蒲州以近畿會郊祭上南郊賦一篇辭致典縟獻祭天之紀杜甫南郊賦享祖考通神明主上肇於南郊聿懷多福者舊矣今茲練時日就陽位之美又所以享祖考通神明而已同上令泰龜而不昧俟萬事之將履掌次閲氈邸之則封人考匱宮之旨司門轉致乎牲牢之繫小胥專達乎懸位之使上降帷宮之綝縭屏玉軷以蠷略人門行馬以拱乎合沓之場皮辨火裘始進於穹崇之幕旌門坡陀以前騖彀騎反覆以相經頓曾城之軋軋軼萬方之熒熒馳道端而如砥浴日上而如萍同上製翠毛於華蓋之角彗黃屋於鉤陳之星同上官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極同上禋祀職在宗伯首崇禋祀以上並杜甫賦圓丘峻且坦前對南山標韓文和李相公攝事南郊詩郊告儼匏秸韓文征蜀聯句元宗既定開元禮天寶元年遂合祭天地于南郊是時神仙道家之説興二月辛卯親享玄元皇帝廟甲午親享太廟丙申有事于南郊其後遂以為故事終唐之世莫能改也唐志秦之增封也覬望神仙漢之郊丘也禳除災害雖無文而咸秩終有廢而莫舉猶可以編在方册垂其鴻名豈若國家參文質於六經之中陛下酌損益於百代之後順昊天之成命得黎人之歡心令狐楚因吉土迎長日咸池屢奏太簇登歌萬靈識周旋之位百神知饗獻之節賀表同上雲散而柴燔高達風清而蕭薌遠聞以上並令狐楚賀郊赦表宜修飭郊丘展禋享之禮陸贄諫大難始平宜修飭郊丘展禋享之禮申告謝之意張薦貞元元年帝親郊時更兵亂儀物殘替用薦為太常博士參綴典儀略如舊章本傳夫聖人之運莫大乎承天天行健其道變化故包犧氏仰而觀之以類萬物之情焉黃帝封禪天地少昊戴時以象天顓帝乃命南正重司天以屬神高辛順天之義帝堯命羲和敬順昊天故郊以明天道也所從來尚矣唐通典大唐武德初定令每歲冬至祀昊天上帝於圓丘以景帝配五方上帝天文皆從祀上帝及配帝用蒼犢各一五方帝及日月用方色犢各一內官以下加羊豕各九孟春辛日祈榖祀感帝於南郊以元帝配武德正觀之制大享之外每歲立春立夏季夏立秋立冬郊祀並依周禮其配食及星辰從祀亦然正觀中奉高祖配圓丘元皇帝配感帝餘依武德制同上分祭王肅等皆以郊即圓丘圓丘即郊猶王城京師異名同實符合經典其義甚明今從鄭氏之説分為兩祭圓丘之外別有南郊違棄正經深未允耳同上永泰二年杜鴻漸奏冬至祀昊天上帝夏至祀皇地祗請以太祖景皇帝配享同上
