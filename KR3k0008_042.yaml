body:
  text: 卷第四十二白名器不可假人官事不攝管仲奢階士會攝右晉文公城濮之役舟之僑先歸士會攝右叔魚攝理晉邢侯與雍了爭鄐田士景伯如楚叔魚攝理理獄官攝官承乏衛侯將會使祝他從辭曰臣展四體以率舊職猶懼不給而煩刑書若又攝官招大罪也承乏謂兼二職也拜真真受也兼人之職不二事禮將效一官敢有二事攝政孔子為司寇攝政七日誅少正卯兼二事傳沈諸梁兼二事二事謂令尹司馬也假器孔停天下攝官劉晏時經費不充停天下攝官獨相庸得補署積數百人皆新進敏鋭盡當時之選趣督倚辦故能成功攝官升山張九齡署吏攝百司繁而不綱杜佑始度支嗇用度多佑以署吏攝百司繁而不綱佑以營繕還將作本炭歸司農練染還少府職務簡修兼攝行軍長史李靖陳圖蕭銑十策有詔拜崝行軍總管兼攝孝恭行軍長史募官攝府縣崔光遠玄宗西狩詔留光遠為京兆尹西京留守採訪吏乘輿已出都人亂入左藏大盈庫爭輦財珍光遠募官攝府縣誰何宮闕斬數十人乃定地貧俸薄潞磁等四州縣令録事參軍地貧俸薄無人願請多是假攝李德裕會昌一品制集擇文武攝臺省官李晟擇文武攝臺省官以俟乘輿何攝為李巨授陳留譙郡太守攝御史大夫明日謝帝驚曰何攝為即詔御史大夫韋相攝衛領南異物志韋執誼貶崔州司戶刺史閔其羈旅乃舉前件官在朝廷頗諳公事幸其佐理勿憚縻費請參韋相攝衛侵官二白侵官冒也一失其位不謀其政君子思不出其位各有司存思難不越官信也君子行無越思守不假器潔瓶難假不能恤緯傳嫠不恤其緯而憂宗周之殞焉用代庖莊子庖人雖不理庖尸祝不越樽俎而代之兼人之智出位之思侵冒越思各恭乃位出則有尤如冒厥官過猶不及不二事不移官禮各司其局雖則奉公且為出位行苟越思動而坐悔代斫易而生亂過則有刑將效一官敢有二事苟越想於乃職必速戾于厥躬律諸越司侵職者杖七十議曰設官分職各有司存越其本司侵人職掌當杖之也孔不敢侵官魏謨帝敕謨曰事有不當毋嫌論奏謨對臣頃為諫官故得有所陳今則記言動不敢侵官設官各以其事治杜淹建官諸司文案稽期請以御史檢捉太宗以問僕射封倫倫曰設官各以其事治御史效不法而索按求疵是大苛且侵官淹默然相侵楊炎舊制中書舍人分押尚書六曹以平奏報開元初廢其職盧杞請復之炎固以為不可杞益怒又密啓主書過咎逐之炎曰主書吾局吏也吾當自治之奈何相侵邪嫌其出位白居易拜左贊善大夫是時盜殺武元衡京師震擾居易首上疏請亟捕賊刷朝廷恥以必得為期宰相嫌其出位不悅知五品選盧承慶檢校兵部侍郎知五品選辭曰選事在尚書臣掌之為出位帝不許曰朕信卿卿何不自信離局三白失官慢也離局奸也一失其位寵名皆棄臣之失職常刑無赦一日失職則死及之叛官離次遐棄厥司慢官慢易既忘恤緯是不理庖各司其司禮各揚其職揚舉廢職服刑云云由官邪也爾爾則死及之闕擅去官吉茂同産兄黃為長陵令時禁長史闕擅去黃聞司徙趙溫薨以故吏違科奔喪司隸鍾繇收伏法征書未至擅去石崇為荊州征為大司農以征書未至擅去官免之旬日還阮籍為東平相到郡法令清簡旬日卻乘驢還出界晉郭奕為野王令羊祜過之遂送祜出界數百里坐此免官離軍營求免後漢皇甫規威明為渡遼將軍欲退身數上病不許友人王旻喪還規越界迎因令客密告并州刺史胡芳奏芳曰威明欲避第故耳吾當為朝廷愛才何能申此子計遂不問也孔不樂職輒去張建封湖南觀察使韋之晉辟署參謀授左清道兵曹參軍不樂職輒去疾其姦蕭存張滂主財賦辟存留務京師裴延齡與滂不葉存疾其姦去官白爛羊後漢更始官爵皆賈豎群小語曰灶下養中郎將爛羊胃騎都尉爛羊頭封公侯鴻都後漢靈帝好學祭酒樂松賈護多引無行趍勢之徒並待詔鴻都門士君子皆深恥之貂不足狗尾續晉楚工儉篡仕同謀者越階次奴卒廝役亦加爵位每會貂蟬盈坐時人語曰貂不足狗尾續樂公樂卿漢武時國用耗竭有司請賣爵置賞官名曰武功爵得至樂公樂卿者朝位從九品加樂者別正卿人十九爵二十爵至樂卿食公卿祿而無二也孔斜封官安樂與太平等七公主皆開府而主府官屬尤濫皆出屠販納資售官降墨敕斜封授之故號斜封官韓琬言仕路太廣故棄農商而趨之一夫耕一婦蠶衣食百人欲儲蓄有餘安可得乎胥吏濫章韍張九齡帝封泰山張說多引兩省録事主書及所親攝官升山超階至九品九齡當草詔謂說曰宮爵者天下之公器先德望後勞舊今登封告成千載之絶典而清流隔於殊恩胥吏乃濫章韍恐製出四方失望既而果得謗倡優授官魏元忠陳郡男子袁楚客以書規之唯名與器不可以假人故曰天工人其代之夫代天非材不可也代非其人必失天意失天意而無患禍未之有也今倡優之輩因耳目之好遂授以官非輕朝廷亂正法邪人君無私私怒害物私賞費財況私人以官乎優人擢將軍曹確優人李可及擢為滅衛將軍確曰太宗著令文武官六百四十三為房元齡曰朕設此待天下之賢人士工商雜流假使拔出等夷正當厚給以材不可假以官與賢者比肩立同坐食也文宗欲以樂工尉遲璋為王府椽竇洵亙固爭卒授光州長史今而位將軍不可帝不聽分職建官不可以濫李嶠在吏部時陰欲藉時望復宰相乃奏置員外官黔子既吏衆猥府庫虛耗乃上書歸咎于時因蓋前非曰分職建官不可以濫傳曰官不必備惟其人自帝室中興以不謹爵賞為惠冒級躐階朝升夕改正闕不給加以員外內則府庫為殫外則黎庶蒙害非求賢助給之道也臺閣之內朱紫盈滿蕭至忠同平章事上疏陳時政曰今列位已廣冗員復陪陛下降不資之澤近戚有無涯之請臺閣之內朱紫盈滿官秩益輕恩賞彌數舞胡致位五品鳴玉曳組趨馳廊廡非貽則子孫之道也李綱諫疏白版侯朝野僉載武后時封侯者衆鑄印不供至有白版侯者焉委事受權袁楚客規魏元忠閹豎者給宮掖掃除事古以奴隸畜之中古以來大道乖喪疏賢哲親近習乃委之以事受之以權故堅刁亂齊伊戾敗宋君側之人衆所畏懼所謂鷹頭之蠅廟垣之鼠者也今大君中興獨有閹豎坐升班秩既無正闕率受員外乃盈千人綰青紫耗府庫獻瓜陸贄幸梁有獻瓜者帝嘉其意欲授以試官贄曰爵祿者天下公器不可輕也獻瓜一器果一盛則受之彼忘軀者有以相謂矣曰吾之軀命乃同瓜果草也若草木然人何勸焉內外盈溢至無聽事以居當時謂之三無坐處選舉志中宗時韋后及太平安樂公主等用事於側門降墨敕斜封受官號斜封官凡數千員內外盈溢至無聽事以居當時謂之三無坐處言宰相御史及員外郎也今取士多且濫劉祥知選事上疏陳六事一曰今取士多且濫入流歲千四百多也雜色入流未始銓汰濫也故共務者善人少惡人多臣謂應雜色進者以責有司試判為四等第一付吏部二付兵部三付主爵四付司勳若坐負當責雖經赦仍配三司不者還本貫則官不雜矣比年不加簡擇京官坐負及聲稱下者乃典州吏部年高不善刀筆者乃擬縣朝輕用人何以治國願加汰擇韋嗣立員外置官數倍正闕曹晉典吏困於發事管府倉儲竭於資俸同上論官濫疏麒麟楦唐楊炯每呼朝士為麒麟楦或問之曰今假弄麒麟者必修飾其形覆之驢上宛然異物及去其皮還是驢爾無德而朱紫何以異是張鷟朝野僉載補闕連車載武后時官濫謠曰補闕連車載拾遺平斗量把椎侍御文碗脫校書郎上騶子倡人鳴玉曳履舊史孔子曰惟名與器不可假人是言謹舉之為重也臣伏見王長通白門達本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩伎能有取可厚賜錢帛以富其家豈家列預仕流起授高爵遂使會朝之位萬國來庭騶子倡人鳴玉曳履與夫朝賢君子比肩而立同坐而食臣竊恥之馬周白入粟拜爵漢食貨志朝錯策重粟之道在於以粟為賞罰令募天下入粟縣官拜爵得以除罪如此富人有爵農人有錢粟有所泄泄散也息列反帝從之入奴為郎後漢府庫虛乃募人入奴婢得以終身為郎先為郎者增秩入羊又入羊為郎受爵賞欲移賣者無所流駝無所差次駝者移入粟黃霸入谷沉黎郡補左馮翊二百石卒吏注云三輔郡得仕也郡為卒吏二百石尤異也以資為郎張釋之以資為郎注漢法資五百萬得為常侍郎郎官桑弘羊為均輸令吏人入粟補郎官至六百石食貨志云漢桓帝占賣關內侯以資為郎司馬相如非其好也賣公卿靈帝開鴻都門賣官又私令左右賣公卿公千萬卿五百萬崔烈入餞行三公問子鈞曰我為三公人以為何鈞曰論者嫌其銅臭烈怒擊之禮錢後漢三公皆輸禮錢或以錢不足免西園曹嵩輸西園錢位至太尉賂遺求達魏張德容為門下小吏家富自惟寒素念無以自達乃常畜好刀筆同大吏有乏者即給之以此見識達也賂遺求官張讓專權孟他以蒲桃酒一斗遺讓讓拜他泉州刺史以貨賣鴈門太守見干謁門賣官爵五孔柳澤上疏曰竊見神龍以來紀綱大壞內寵專命外嬖制權因貴愈勢賣官鬻爵妃主之門同商賈然舉選之署若闤闠然屠販者由邪忝官廢黜者因姦冒進天下溷亂幾危社稷召富人納資胡證為和親使舊制行人有私覿禮縣官不能具召富人子納資於使而命之官證請儉受省費以絶鬻官之濫母妻諸子賣官李義府母妻諸子賣官市獄門如沸湯賣官收資濟軍興裴冕太子即位進冕同平章乃建言賣官收資濟軍興時取償既賤衆不為宜錢多者得之前蜀王衍太后太妃以教令賣官自刺史以下每一宮闕必數人並爭而入錢多者得之堂牒賣官王昶遣醫人陳宛以空名堂牒賣官五代閩世家多受金錢中宗庶人韋氏稍寵樹親屬封拜之昭容與乳母及尚官賀婁等多受金錢封巫趙隴西夫人禁中勢與上官捋繇是墨敕斜封出矣納資售官號斜封安樂公主官屬尤濫皆出屠販納資售官降墨敕斜封授之故號斜封官納錢物給告身至德四年宣諭使侍郎御史鄭叔清奏承前諸使下召納錢物多給空名身雖假以官賞其忠義猶未盡財能今皆量文武才藝兼情願穩使據條格擬同申奏聞通典仇敵賈販韓琬上言往選司從容有禮兮如仇敵賈販白御史漢魏相為茂陵令御史大夫秉弘羊詐稱御史止傳縣之傳舍也丞不能時謁客怒縛丞相疑其有奸收捕案致其罪漢使者後漢公孫述使人詐稱漢使者假述益州牧印綬孔冒牒取調戴胄為大理少卿時選者盛集有詭資蔭冒牒取調者詔許自者不首罪當死俄有詐得者獄具胄以法當流詐其子使不俟朝制李抱真卒其子緘匿喪與其屬謀會諸將元仲經詭拘真令曰吾疾不任事令緘典軍即為抱真表翌日令諸將署章請以節付緘天子已聞抱真喪遣使者馳入軍詔以事屬大將王延貴緘愕然謂諸將曰詔不許若何乃遽以印鑰上監軍始發喪使者趣延貴視事護緘赴東都始緘遣將陳榮以書抵武俊假其財武俊怒曰吾與乃公善者恭王命非同惡也今聞已亡誰詐其子使不俟朝制邪囚榮而讓緘焉冒名仕至縣令王式慈溪民陳瑊冒名仕至縣令豪縱州不能制式窮治其姦榜死自稱清海軍掌書記五代李鏻唐宗室子少舉進士纍不中客河朔間自稱清海軍掌書記謁定州王處直處直不為禮乃易其緑衣更為緋衣謁常山李弘規弘規進之趙王王鎔留為從事未拜命而稱新官同上何擇與宰相趙鳳有舊數私于鳳求為給諫鳳薄其為人以為太常少卿敕未出而澤先知之即稱新官上章自訴章下中書鳳等言未拜命而稱新官輕侮朝廷請坐以法乃以太僕少卿致仕告假冒宗室李羲琛始被譎匿身為傭保而嗣生許瓘利其爵邑告羲琛假冒復流嶺外白司馬安漢汲黯姊子司馬安文巧官官四至九卿以河南太守卒昆季以安故同時至二千石者十人持祿專祿以周旋汲黯謂公孫弘曰齊人多詐始與臣約即上前皆背之游五侯門漢五侯不相得賓客不同唯樓護君卿游五侯門盡能得其歡心孔餉謝權幸韋陟襲郇國公坐事貶後為河東太守以失職內怏怏乃毀廉隅頗餉謝權幸欲自結容容持祿李元素元和初召為御史大夫一不建為容容持祿內望作宰相久之不見用結權幸求鎮守鄭權遷工部尚書乃結權幸求鎮守於是檢校尚書右僕射嶺南節度使多裒資珍使吏輸送凡帝左右助力者皆有納焉人笑之陰事宰相以久其權郭英以東都平權知留守陰陽宰相元載以久其相未幾嚴武死成都乃拜劍南節度使所至聚斂諧結權近楊元卿性儉巧所至聚斂諧結權近故纍更方任僞不勝宗室道古巧求宦便佞傾下游公卿間常與奕博僞不勝厚進所賞嗜利者多得其歡心因鄭注以交王守澄王式少節儉巧于宦因鄭注以交王守澄中丞歸融劾之出為江陵少尹柔聲婉顏狐媚當權孫樵逐店鬼文有司馬安者攘仁盜義縛舌膠唇柔聲婉顏狐媚當權死而有靈是為巧鬼此鬼依人辭枯即榮長劍華纓高步天庭白恥於廝役後漢趙曄為縣吏捧檄迎督郵曄恥於廝役棄車馬去從粒撫授韓詩陶侃鄱陽人吳平徙廬江之潯陽早孤為縣吏胥徒小胥一操牘吏部式諸流外官滿末滿得勳五品已上敘勳敕至省者陳牒請解於兵部續勞上經三年折當考考滿日從流外資敘不得輒敘勳階若六品以上勳及國勳不在此限小吏入令被中光逸事見屬吏門注孔為中書令薛稷會鍾紹京為中書令稷諷使讓因入言於帝曰紹京本胥吏無素才望今特以勳進長百僚恐非朝廷具瞻之美劉祥道六事六曰三省都事主事主書比選補皆取流外有刀筆者雖欲參用士流率以儔類為恥前後相沿遂成故事且掖省崇峻王言祕密尚書政本人物所歸專責曹史理有未盡宜稍革之以清其選為書與所善吏刺取朝廷事李乾祐嘗為書與所善吏刺取朝廷事迷隱其辭為吏所賣胥吏非宰相器牛仙客帝既用仙客知時望不歸乘間以問高力士力士曰仙客本胥吏非宰相器帝忿然曰朕且用康崖蓋恚言也罷省胥韓洄罷省胥吏冗食三千人堂吏數招權納賄賂韋處厚同平章事堂吏湯璽數招權納賄賂處厚笑曰此半滑漁也斥出之相府肅然中書吏李吉甫中書史滑煥素厚中人劉光琦凡宰相議為光琦持異者使渙請常得如素宦人傳詔或不至中書召渙於延英承旨迎附群意即為文書宰相至有不及知者由是通四方賂謝弟泳官至刺史鄭餘慶當國嘗一責怒數日即罷去吉甫請間劾其姦捕臺府吏王源中遷左補闕是時中官領禁兵數亂法捕臺府吏屬繫軍中源中上言臺憲者紀綱地府縣責成之所設吏有罪宜歸有司無令北軍亂南衙麾下重於仗內帝納之宿姦老吏裴延齡擢司農少卿素善財計乃廣鉤距取宿姦老吏與謀以固帝幸出入辜平南唐曹隨知盧陵吉陽令先是已有二胥酋辨於治體亦精於法律惟能出入辜平時邑民苦之謂之長短星隨以為親信雖制之以度未為之殘蠹然或為之所欺罔而隨不之覺野史七史猾徒緣姦而奮張九齡上言張玄素與孫伏伽在隋皆為令史張玄素傳牛仙客擢胥史自不知書張九齡帝將以涼州都督牛仙客為尚書九齡執曰不可帝怒曰豈以仙客寒士嫌之邪卿固素有門閲哉九齡頓首曰臣荒陬孤生陛下過聽以文學用臣牛仙客擢胥吏自不知書韓信淮陰一壯夫羞絳灌等列陛下必用仙客臣實恥之胥曹失色陸亙遷太常博士禮史孟直練容典博士降色訪逮史倚以倨橫會將冊皇太子草儀真參議偃蹇亙榜逐之胥曹失色梁客將梁王欲以嬖吏張延范為太常卿唐宰相裴樞以為太常卿以清流為之延范乃梁客將不可梁王大怒曰吾常為裴樞純厚不蹈浮薄亦為此耶是歲四月彗出西北文昌軒轅天市宰相柳琛希王旨歸其譴於大臣於是左僕射樞等皆以無罪貶同日賜死於白馬驛五代白月終周禮小宰月終則以官府之敘受群吏之要注云每月之小計也贊冢宰受歲會終令群吏致事注使齎歲盈文書來今上計也具文漢宣詔曰上計簿具文而已計簿書黃霸為馮翊二百石卒吏顏郡錢計簿書以廉正見稱辭案後漢周紆為齊相任刑法善為辭案為州內所則也自校簿諸葛亮常自校簿顒直入諫曰為理有體上下不可相侵云云亮謝之呂范周谷吳志初孫策吏呂范典主財物孫權私求必關白不敢私許當時見望權守陽羡長有私用策或料覆功曹周谷為傅著文簿譴問權臨時悅之及統事以范忠誠厚見信任以谷能欺更簿不用也案牘簿領送解式公式今諸州使人送解至京二十條已上一日付了四十條已上三日了一百條已上四日了二百條已上五日了不視文書後漢向栩字甫興為趙相不視文書舍中生蒿萊治藏周禮一曰府掌官契以治治藏人主財用簿書也贊治史掌官書以贊治贊治今起草文書也失則名辟名者以官刑注辟多詐作書與實不相應也司書主財用簿書文致嚴延年治獄皆文致不可得反反間幡致至也密也言大案至密也多張文簿計簿也計文不改謂上計文書不改也對簿謂獄訟文簿也舉書孔廷無稽牒張嘉正遷兵部員外郎時功狀盈几郎史不能決嘉正為詳處不閲旬廷無稽牒考簿用墨王徽進考功員外郎故事考簿以朱注上下為殿最歲久易漫吏輒竄為姦徽始用墨遂絶妄欺誓牒嗣襄王熅僭號迫群臣作誓牒徽托手弱卒不肯署請豫立簿注蘇環十道使括天下亡戶初不立籍環請罷十道使專責州縣豫立簿注天下同日閲正盡一月止視簿領紛積反用為樂王播每視簿領紛積於前人所不堪者播反用為樂沉埋案牘間韋蘇州高陵書情開卷不及顧沉埋案牘間束帶理官府簡牘盈目前同上寄韓明府盧主簿訟牒滿前溫彥博為吏部汰擇士類寡術不能獻衆訟牒滿前時譏其煩碎盧從願為吏部精力於官僞牒詭功擲粉無所遺裴遵慶性彊敏視簿牒詳而不苛世稱吏事第一苗晉卿練達事體百官簿最一省無遺才辭職十白爵不踰德授方任能類能而使之任良授官君子使人也器之行爵出祿必當其位月令量能授爵其人存則其政舉輪陵適用記曰司馬辨論官材論辨然後官之任定然後爵之位定然後祿之官有小大所貴授方才有長短各宜適用任非其人則官邪而政廢才稱所職必事舉而績成智以效官才宜稱職薛宣換縣宣為馮翊令穎陽令薛恭與粟邑令尹賞換縣二縣皆理孔京尹稱職嚴郡拜京兆尹減隸宮匠丁數百千人號稱職尹振職高鍋纍進吏部侍郎人善其振職掌文翰薛元敬秦王為皇太子除舍人於是軍國之務總於東宮而元恭掌文翰號稱職百司善職張玄素若上賢右能使百司善職則高居深拱疇敢犯之以清毅聞齊浣為汴州刺史地當舟車湊集事浩繁前刺史數不稱職浣以清毅聞吏民頌美持法明審蔣沇遷大理卿持法明審號稱職衆號稱職裴冕歷殿中侍御史少學術然明鋭果於事衆號稱職挺議鯁固獨狐郁進右補闕吐突承璀討王承宗郁執不可挺議鯁固號稱職在職以才顯邵說擢吏部侍郎在職以才顯外郎稱職狄光嗣聖曆初為司府丞武后詔宰相各舉尚書郎一人仁傑薦光嗣由是拜地官員外郎以稱職聞后曰祁奚內舉果得人循名責實劉瑑嘗與崔謹由議帝前謹由請甄別流品瑑質曰王夷甫相晉崇尚浮虛以述流品卒致淪夷今日不循名責實使吏各稱職而無流品未知所以致治也所用皆稱職薛玨入為司農卿是時詔舉堪刺史縣令者且百人延問人間疾苦吏得失取尤通達者什二宰相欲校以文辭玨曰求良吏不可責文學宜以上愛人之本為心也宰臣多其計所用皆稱職韓皋資質重厚有大臣器遷中書舍人御史中丞兵部侍郎號稱職以善職稱韋繩天寶初入為祕書少監元宗尚文視其職如尚書丞郎繩刊具圖書以善職稱以稱職兼學士張次宗開成初為起居舍人文宗詔左右史立螭頭號記奏對既退帝召見審正是非故開成時事為最詳以稱職兼集賢院直學士校外官歲考崔隱甫校外官歲考異時必委曲參審竟春未定隱甫一日會朝集使詢逮檢實其暮皆訖議者服其敏帝嘗謂曰卿為大夫天下以為稱職世稱吏事第一裴遵慶判南曹天寶時選者歲萬計視簿牒詳而不苛世稱吏事第一銓汰文武李迥秀大足初檢校夏官侍郎仍領選銓汰文武號稱職無易珙才崔珙徐州以王智興後軍驕數犯法天子思材望威烈者撿革其弊知珙治軍精嚴上即謂宰相曰欲武寧節度使者無易珙才以稱職魏知古詔知東都吏部選事以稱職聞白趙魏則優子曰孟公綽為趙魏老則優不可以為滕薛大夫恭賞皆理換縣事見上門鳳棲王渙辟仇香為主簿謂曰主簿不討陳文之罪得無少鷹鸇之志乎香曰以為鷹鸇不如鸞鳳渙乃謝曰枳棘非鳳鸞所棲也驥展龐統字士元劉備在荊州以士元為棗陽令在縣不理免官魯肅曰士示之俊才百里不足以展驥足耳備召士元與語大奇之乃以為治中割雞焉用牛刀子謂子游屈而未伸宜展驥足過猶不及焉用牛刀智以效官才宜稱職位不充量漢家人浮於食禮不理蔣琬公琰為廣都長蜀先主因遊觀奄至廣都衆事不理而又沉醉先主大怒將戮之諸葛亮曰琬社稷之器非百里之才宜重察之乃不罪免官而已孔才用特達張行成高祖謂吏部侍郎張鋭曰今選吏豈無才用特達者朕將用之鋭言行成調富平主簿有能名大才當大用韋安石舉明經調乾封尉雍州長史蘇良嗣器之良嗣當國謂安石曰大才當大用徒勞州縣可乎薦於武后屈長才於短用者猶貓捕鼠而斧剪毛也白居易策林審官器宏者恥效以圭撮之任足逸者難拘以尋常之地柳宗元柳渾行狀位不配才趙元少負志略武后稱制懼不容其高調宜祿尉自傷位不配才卒才不稱職十二白無德而祿殃也舟之僑陳力就列不能者止周任有言雖有其位苟無其德則素餐也辱高位尸祿曹子建表君無虛授臣無虛受虛受是尸祿也以速官謗而煩刑書求賢審官以資共理凍力就列不能者止尸官之責圓鑿方柄折足覆餗易云鼎折足覆公餗言不勝任德薄而位尊力小而任重小人而乘君子之器易負且乘致冠至負也者小人之事也乘也者君子之器也小人而乘君子之器盜斯奪之矣才稱其職乃事舉績成任非其能則官邪政廢薛恭之才但能理於小邑公綽之用不可以為大夫智以效官力宜稱職所宜舉德安能食浮能小不能大晉庾峻上疏吏歷試無績依古終身不仕則官無秕政矣能小不能大可降還涖小則人以器之孔朝野嗤薄韋待價起武力典選無銓總才故朝野共嗤薄之時譏煩碎溫彥博檢校吏部侍郎訟牒滿廷時譏其煩碎不為時所稱楊師道為吏部尚書起貴胄四海人物非所練悉至銓署專抑勢貴親黨以遠嫌用人多違其才不為特所稱牛僧孺宿州刺史李直臣坐賕當死賂宦侍為助具獄上帝曰直臣有才朕欲貸而用之僧孺曰彼不才持祿取容爾天子製法所以束縛有才者祿山朱泚以才過人故亂天下帝異其言乃止廢誅則天皇后武氏臨朝不惜爵位以籠四方豪傑自為助雖妄男子言有所合輒不次官之至不稱職尋亦廢誅不少縱務取實材真能以不職罷崔渙為江淮宣諭選補使職受不甚精以不職罷朝野雜然輕笑元稹進同平章事朝野雜然輕笑循默王涯同中書門下平章事坐循默不稱職罷都督不稱職盧祖尚貞觀二年交州都督以賄敗太宗方擇人任之咸以祖尚才備文武可用也召見內殿謂曰交州去朝廷遠前都督不稱職公為我行無以道遠辭也祖尚頓首奉詔不為人所瞻望鄭綮同平章事自以不為人所瞻望才三月以疾乞骸骨任小能於大事猶狸搏虎而刀伐木也白居易策林審官韋挺不禮馬周及周為中書令帝欲湔拭用之周言挺狠於自用非宰相器挺才任粗使言謂然捭豚臑拒貙牙韓偓鄭綮贊懿僖以來賢人遁逃天子塊然所與者惟佞愎庸奴乃欲鄣橫流支已顛寧不殆哉觀綮朴輩不次而用捭豚臑拒貙牙趣亡而已一韓偓不能容況賢者乎本道使具條以聞楊綰開元時置諸道採訪使得專停刺史威柄外移漸不可久其刺史不稱職若贓負本道使具條以聞不得擅追及停謹擇十三白難其人務在擇人明試登庸掄材官不必備惟其人防請托漢何武君公問文吏必於儒者問儒者必於文史以相參驗欲除吏先為科例以防請托也召故吏擇尹翁歸字子況去吏家居田延年為河東守行縣至平陽悉召故吏五六十人親臨見令有文者東有武者西翁歸獨伏不起曰翁歸文武兼備唯所施設功曹以為不遜延年曰何傷召上辭問甚奇之是日補卒史選孤介第五倫伯魚為蜀郡民吏富掾吏皆鮮車駕馬以財貨自逵倫患之簡其豐贍者選孤介志行者以處曹任於是貨財抑絶孔擇僚吏堪御史者盧齊卿長安初為雍州參軍武后詔長史薛季昶擇僚吏堪御史者季昶訪於齊卿曰盧懷景等皆為通顯巨人創大廈濟巨川必擇文梓艅艎韋承慶明堂災上疏諫以文明垂拱後執政者未滿歲率以罪去大抵皆惡逆不道夫創大廈濟巨川必擇文梓艅艎若亟毀而敗則是庇朽木乘膠船也臣謂陛下求賢之意切而取人之路寬故一言有合而付大任夫以堯舉舜猶歷試諸難況庸庸者可超處輔相以百揆萬機畀小人哉書聞不報所擇悉韋嗣立建言設宮建吏本於治人官得其人則天下治古者取士先狼鄉曲之譽然後辟於州州已試然後辟五府五府著聞乃升諸朝得不謂所擇悉而所歷深乎刺史縣令治人之首比年不加簡擇京官坐負及聲稱下者乃典州吏部年高不善刀筆者乃擬縣朝輕用人何以治國願下有司精加汰擇蕭至忠上疏臣願陛下愛惜爵賞官無虛授進大雅以樞近退小人於間左使政令惟一私不害公則天下幸甚帝親擇吏宰畿邑柳渾判門下省帝嘗親擇吏宰畿邑而政有狀召宰相語皆賀帝得人渾獨不賀曰此特京兆尹職耳陛下當擇臣輩以輔聖德當選京兆尹承大化尹當求令長親細事代尹揮令非陛下所宜帝然之為官擇人戴叔倫齊映劉滋執政叔倫勸以天下州縣有上中下緊望雄輕者有司銓擬皆便所私此非為官擇人為人求治之術映等重其言劉祥道疏古者為官擇天不聞取人多而官少官不擇才桓彥范俄墨敕以方士鄭普思為祕書監葉靜能為國子祭酒彥范執不可曰臣恐物議請陛下官不揮才以天秩加弘愛不從推擇官材韋處厚推擇官材往往棄暇録善時亦譏其太廣凡茲廷臣汝擇自從汝其往衣食豫士凡茲廷臣汝擇自從韓文淮西碑為官擇人者治竇誕為宗正卿太宗與語昏謬失對乃下詔曰誕比衰耗不能事朕知而任之是謂不明且為官擇人者治為人擇官者亂當擇清流後蜀孟昶有上書言臺省官當擇清流昶嘆曰何不言擇其人而任之士不可不察官不可妄授薛登請擇賢才疏堯資八元而庶績共理周任十亂而天下和平則士不可不察官不可妄授也桓公得敬仲則興隆霸業漢元信石顯而大穢明德信任同而理亂異者何也所任用非其人也贊皇害霸論令制美錦韋思謙初拜左丞奏曰陛下為官擇人非其人則闕今不惜美錦令臣制之舊史豈待情樂御史中承桓彥范舉陽嶠為御史嶠不樂彈糾之事彥范曰為官擇人豈待情樂遂引為右臺侍御史為官擇人至公之道陸元方子象先本名景初時吏部侍郎告頊擢為洛陽尉元方時亦為吏部固辭不敢當頊曰為官擇人至公之道陸景初才望高雅非常流所及實不以吏部之子妄推薦也竟奏授之史察行核才臣伏見比年御史轉郎官拾遺遷闕未聞受命之日天下有以知其由至於繡衣持斧不聞擒其姦決其獄而得者既得而遷又如是拾遺司諫不聞著其狀獻其言而得者亦如是二端登賢之象也若然陛下於此不察其行何以察之於此不核其才何以核之牛僧孺賢良策亦以擇賢才蕭至忠曰止觀故事宰相子弟多居外職非直抑彊宗亦以擇賢才爾白君為政勿鹵莽莊子未能操刀而使割子皮欲使尹何為邑宰子産曰少猶未能操刀而使割也其傷實多美錦學制子産謂子皮曰子有美錦不使學制焉大官大邑所以庇身而使學者制焉其為美錦不亦多乎僑聞學而後入政未聞以政入學吾斯未能信子使漆雕開仕對曰吾斯之未能信子悅注云未究習也賊夫人之子子路使子羔為費宰子曰賊夫人之子言子羔未學而仕是賊害之人也子路曰有民人焉有社稷焉何必讀書然後為學子曰是故惡夫佞者學優則仕子夏上通而不困上通仕道不學牆面蒞事惟煩學古入官政乃不迷先學古訓而後入官授之以政不達子曰誦詩三百授之以政不達雖多亦奚以為舉善而教不能則勸及門仕進之門為學未能入室策名安可及門不能者止智效一官莊子孔幼未能事藩鎮王元逵子紹鼎死子納幼未能事宣宗以元逵次子紹懿為留後以嗣假以曹參未預署事江南野史蕭儼以童子擢第假以曹參未預署事遂精究法律未能任事賴諸將共持王師範父敬武遂安師儒自稱留後敬武卒昭宗以師範年少其下不服從乃拜太子少師師範不受棣州刺史張蟾叛師範遣其將盧洪攻蟾洪以兵返襲青州師範陽為好辭遣人近語洪曰吾幼未能任事賴諸將共持之爾不然聽公所為也洪以師範無能為遽還不為備語其僕劉鄩曰洪來為我斬之用汝為牙將洪來師範出迎於坐上斬之乃急攻棣州破張蟾潛奔歸於京師昭宗乃拜師範節度使五代白祿在其中豈無口實底祿以德寸祿營其寵祿事君敬其事而後食食祿也祿不期侈侈不與祿為期而自然侈退食自公不家食易貴人而賤祿則民興讓言尚賢而不吝祿位惟賢非后不食食祿也雖祿不期侈懼膏粱之易驕而食不充虛豈匏瓜而可繫計日受俸羊陟為河南尹云云又楊秉字叔節豫州刺史清儉計日受祿餘俸不入私門馭貴馭富周禮太宰以八柄馭群臣一曰爵以馭其貴二曰祿以馭其富爵公侯伯子男至於大夫士也稍食周禮均其稍食稍食祿廩也以制其食制其等級上農之祿周禮上農夫食九人凡下士祿上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上土卿四大夫祿君十卿祿也人浮於食禮君子與其使食浮於人寧使人浮於食食祿也浮過也言寧使己才過於浮不使禍過其才示不貪也公食家食大祿小祿君子不以小言受大祿不以大言受小祿伐檀詩刺貪也在位貪鄙無功而受祿始聞刈楚之榮俄見伐檀之刺貪天之祿厚賢倍祿以功詔祿以久為奠食食稍也既爵乃祿之者事成乃食之仕而未有祿禮曰仕而未有祿者君有饋焉曰獻使焉曰寡君見在臣位與祿同也君有饋臣之道也位定然後祿之難得而易祿易祿而難畜禮曰非時不見不亦難得乎非義不合不亦難畜乎先勞而後祿不亦易祿乎庶士倍祿禮武王克殷庶民弛政庶士倍祿復紂時祿薄也季秋收秩祿之不當不當私所增加也伐冰之家有釆地不畜牛羊秩膳天子諸侯有秩膳百祿是荷勸從傳制為祿位以勸其從也益俸宣詔曰今小吏勤事而俸薄欲其無侵漁百姓難矣其益史百石以下俸什五注云舊一石者則什五斗也仕不祿班彪益游徼祿趙廣漢為京兆奏請益長安游徼獄吏秩百石注增秩以勵其行也其後百石吏皆差自重不敢枉法妄繫人考致仕三分故得一以終身也給吏蓋寬饒廉直志在奉公俸錢半以給吏人為耳目之事斗食屬薛宣字貢君為大司農斗食屬注祿少計日一斗為數干祿什九在外什一在內史記魏成子食祿于魏什九在外什一在內是以東得卜子夏田子方假干木君皆師之增減後漢光武增百官俸千石以上減西京舊制六百石已上增之助婚任延時為九真守駱越舊無婚延以年齒相配貧者省俸助成之留一月第五倫為會稽守俸才留一月糧餘皆賑與民之貧羸者桓帝減公卿以下俸貸王侯相占賣關內侯侏儒飽欲死臣朔饑欲死東方朔曰侏儒長三尺奉一囊粟錢二百四十臣朔長九尺亦奉一囊粟錢二百四十云云辭俸張安世少孺以父子封侯在位太盛乃辭不受祿詔都囚別藏張氏無名錢以至於得數百萬計上贍貧黃香為魏郡守分俸祿賞賜班贍貧者豐富之家各出義穀云不及妻子周堪仕郡縣俸祿不及妻子皆以供賓客制祿周禮代耕禮辭粟原思為之宰與之粟九百辭子曰毋以與爾鄰里鄉黨乎注祿法所得當受無讓行爵出祿必當其位月令孔高輔五事今外官卑品皆未得祿故饑寒之切夷惠不能全其行公議病其持祿崔損建中後宰相無久任者損以便柔遜願中帝意乃留八年帝亦知公議病其持祿然憐遇彌渥奉祿分宗親劉德威平生所得奉祿以分宗親又李百藥得俸祿與親黨共之又劉瞻所得俸以餘濟親舊之窶困者停京官月奉助軍興王求禮左相豆盧欽望請停官九品以上月奉助軍興求禮曰公祿萬鍾正可輟仰祿之人可奈何欽望拒不應既求禮階進曰天子富有四海何待九品奉使宰相奪之以濟軍國用乎加估以給崔從授淮南節度使楊州官吏俸帛常加估以給獨節度使則否從皆與之同虛食祿辛替否疏曰中宗陛下之兄不聽賢臣之言而悅子文之意虛食祿數千人諸王奉給薄於帝子道孝王元慶時諸王奉給薄於帝子至數窶乏大臣莫敢言十八年黃門侍郎褚遂良為太宗從容言之不能行增給常袞始當國先是百官俸寡狹議增給之時韓滉使度支與袞皆任情輕重滉惡國子司業張參袞惡太子詹事趙惎皆少給之太子文學為洗馬副袞姻家任文學者其給乃在洗馬上其騁私崇怨類此刺史俸孔戣拜嶺南節度使先是屬刺史俸率三萬又不時給皆取部中自衣食戣乃倍其俸約不得為貪暴稍以法繩之本傳奪吏俸助輸崔郾出為虢州觀察使先是上供財乏則奪吏俸助輸歲率八十萬郾曰吏不能贍私安暇恤民吾不能獨治安得自封即以清常費代之歸其積俸柳圭杜悰鎮西川表在幕府久乃至會悰徙淮南歸其積俸圭不納悰舉故事為言卒辭之取俸助軍興上疏執不可朱朴改著作郎乾寧初太府少卿李元實欲取中外九品以上官兩月奉助軍興朴上疏執不可而止不敢當兩使廩料楊牧為宣歙觀察使不敢當兩使廩料但收刺史俸留公藏錢七百萬奉廩之費歲巨億萬盧懷謹上疏今京諸司員外官數十倍近古未有謂不必備則為有餘求其代工乃多不厘務而奉廩之費歲巨億萬徒竭府藏豈致治意哉散故人同上所得祿散於故人親戚又薛蘋所得祿即分親屬故人而無餘藏歲入官俸無慮二十四萬緡郭子儀隨官間劇增奉李泌崔祐甫任吏部員外求為洪州別駕使府賓佐有所忤者薦為郎官其當遷臺閣者皆以不赴取罪去泌以謂外太重內太輕乃請隨官間劇普增其奉時以為宜定府州官月廩楊綰同平章事定府州官月廩使優狹相均減百官俸廩崔植時皇甫鎛判度支建言減百官俸廩植封還詔書賙濟內外親薛戎悉俸廩賙濟內外親無疏遠皆歸之衣食人之孤遺者元德秀所得俸祿悉衣食人之孤遺者俸餘送酒家無留也陽城取足則已有陳萇者侯其得俸常往稱錢之美日有獲焉城至道州月俸取足則已官收其餘以俸代輸何易於為益昌令民有死喪不能具葬者以俸敕吏為辨督賦役不忍迫下戶或以俸代輸官一品俸三千李吉甫國家之制官一品俸三千職田祿米大抵不過千石大曆時權臣月俸至九十緡者州刺史無小大皆千緡宰相常袞始為裁限至泌量間劇稍增之使相通濟然有名在職廢俸存額去間劇之間厚薄頓異亦請一切商定譁言月廩薄以動士心王龜為同州刺史牙將白約素暴橫嘗譁言月廩薄以動士心為亂龜捕殺之減百官一月俸高宗龍朔三年二月減百斷一月俸爭求什一高季輔上言公侯勳戚之家邑入俸稍足以奉養而貸息出舉爭求什一下民化之競為錐刀宜加懲革本傳各依錢數多少為布帛定數陸贄若但據群官月俸之等各依錢數多少折為布帛定數某官月給俸絹若干匹明立條列便為常制群蟻附腥膻聚蛾投爝火盧垣與李勃拾遺書今之人奔分寸之祿走絲毫之利如群蟻之附腥膻聚蛾之投爝火取不為丑貪不避死羅網高懸去將安所文粹呂才東皋集序時天下喪亂藩部法嚴屢被勘劾君嘆曰羅網高懸去將安所遂出所受俸分積於縣城門托以風疾輕舟夜遁豈利斗粟希布帛歐陽詹上鄭相公書不仕則已仕則冀就高衢遠途展其素蓄垂名於後代美播於當時豈利斗粟希布帛救寒暑給朝夕也開元後每使各給雜錢國忠身兼數官堂府外月給錢百萬秩登祿富以有廟祀韓文袁氏碑張鎰拜中書侍郎同中書門下平章事明年以兩河用兵詔省薄御膳及皇太子食物鎰因奏減堂餐錢及減百官廩俸三分一以助用度世祿十六白世祿之家鮮克由禮書丐也先君守官之嗣范宣子言嗣先君之守官又曰丐之祖自虞為陶唐氏夏為御龍氏商為豕韋氏周為唐杜氏晉主夏盟為范氏其不朽之謂乎穆叔子曰此之謂世祿非不朽也傳子産曰孔張君之昆孫執政之嗣也為嗣大夫漢任子令漢公卿子多以父任為郎王吉曰禹湯不用二公之世而舉皋陶伊尹請除任子令子為郎漢征馮唐年九十不能為官乃以唐子遂為郎遂字王孫為子求官桑弘羊自以為國家興管榷之利伐其功欲為子弟得官恐霍光謀反遂誅滅伐檀之刺孔後嗣長為藩翰長孫無忌帝欲功臣並世襲刺史以無忌為趙州刺史凡十有四人餘官食邑尚不在無忌等辭曰群臣披荊棘事陛下今四海混一誠不顧違遠左右而使世收外州與遷徙等帝曰割地封功臣欲公等後嗣長為藩翰而薄山河之誓反為怨望朕亦安可彊公土宇邪遂止以門資為吏於琮以門資為吏用嗣厥服權德輿張建封文集序公之理也徐人宜之故尚書克家纂業用厥服猶熙氏之居司隸鄭人之賦緇衣大君推恩善善春秋之義也魯三桓之子孫鄭士穆之宗族晉之欒范齊之國高張氏之士葉貂蟬楊家之四世台袞文粹李翰鳳閣王侍郎贊自秦至漢有吉有駿為漢代名臣自漢至晉有覽有祥為晉室公輔同上祿不兼利十七白畜馬乘不察雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣禮仕則不稼田則不漁織蒲臧武仲妾織蒲仲尼曰三不仁天分董仲舒曰天之分與之上齒者去其角傅其翼者兩其足是受大者不得取小故受祿之家不與人爭利拔葵史記公儀沐相魯茹羹拔園葵而棄之見家織布出妻焚機云欲令農夫女工安所售其貨乎免官削爵貢禹欲約近臣自諸曹郎侍中以上家無問私販賣與人爭利犯者輒免官削爵不得仕宦王昶陳五事魏王昶欲令官實祿勵以廉恥不使與百姓爭利孔廣市樵米為歲中計尹知章轉國子博士未嘗問産業其子欲廣市樵米為歲中計知章曰如而計則貧人何以取資且吾尚應奪民利邪節財力勵廉隅陸贄奏議國之紀綱在於制度商農工貿各有所專凡在食祿之家不得與人爭利此王者所以節財力勵廉隅是古今之所同而不可變革者也收苑中果菜尚萬監裴匪躬檢校京苑將鬻苑中果菜官收其利蘇良嗣駁之曰昔公儀相魯猶能技葵去織未聞萬乘之主鬻其果菜以與下人爭利也匪躬遂止舊史寬猛相濟十八白政寬則民慢猛則民殘仲尼曰政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和火烈水懦子産謂太叔曰唯有德者能以寬服人其次莫如猛夫火之烈民望而畏之故鮮死焉水懦弱人狎而玩之則多死故寬難太叔為政不忍猛而寬鄭多盜太叔悔之韋弦兼佩昔人有性急佩韋自戒性寬佩弦自戒吐茹合宜詩云柔亦不茹剛亦不吐不剛不柔孔間以威斷段文昌授劍南西川節度使素諳蜀利病大抵治寬靜間以威斷不常任也政貴知變崔郾治虢以寬經月不笞一人及蒞鄂則嚴法峻誅一不貸或問其故曰陝土瘠而民勞吾撫之不暇猶恐其擾鄂土沃民剽雜以夷俗非用威莫能治政所以貴知變者也聞者伏焉輦谷之下先彈壓郡邑之治本惠養柳仲郢出河南尹以寬惠為政或言不類京兆時答曰輦轂之下先彈壓郡邑之治本惠養烏可類乎寬猛相濟弦違適中李白任城縣記寬則人慢糾之以猛猛則人殘施之以寬寬以濟猛猛以濟寬此刑政之文也呂溫人文化成論白及瓜齊使連稱管至父戍葵丘瓜時而往及瓜而代嗣掌某月周禮注云代住一月三已無慍楚子文三仕為令尹無喜色三巳之無慍色舊令尹之政必以告新令尹迭代功成者去君子三揖而進一辭而退策名隨牒合符後漢傅燮字南容州將范律名知人舉燮老廉後燮為漢陽太守律交代合符而去鄉郡榮之矯代魏信陵君無忌請救趙魏王畏秦不許趙告急於公子公子之客入王宮盜節矯代晉鄙不設備公子遂入鄙軍錘殺鄙而代將其軍遂救趙也更書漢段會宗為西城都護騎都尉三歲更書還為沛太守邊吏三歲一更世終更亟還谷永與會宗書云云親友魏陳矯為廣陵功曹使過太山太守薛悌異之結為親友戲謂曰吏與二千石鄰國屈從陪臣游不亦可乎及為郡及尚書令皆代矯舉吳周瑜病舉魯蕭有智略足以代瑜父子相代見父子門注智效一官莊子考績之期三載考績三考黜陟幽明授受不替蕭何舉曹參邴吉知人吉為丞相病篤上自臨問曰即有不諱誰能代卿對曰西河太守杜延年明於法度今在郡治有能名廷尉於定國執憲詳平天下可以無冤太僕陳萬年事後母孝三人皆在臣右惟上審之及相君位並皆稱職上謂邴吉知人替代十九孔刺史被代皆降魚書楊綰復言舊制刺史被代若別追皆降魚書乃得去開元時置諸道採訪使得專停刺史威柄外移漸不可久其刺史不稱職若贓負本道使條具以聞不得擅追及停而刺史亦不得輒去帝嘉其謀云舉弟自代韋貫之永貞時始為監察御史舉其弟纁自代及為右補闕纁代為御史議者不謂之私袁公政袁滋召為金吾大將軍以楊於陵代之滋行耆老遮道不得去於陵使喻曰吾不敢易袁公政人皆羅拜簡自上意唐自兵興以來方鎮節度使少徵入換代者皆死亡乃命焉故行軍司馬皆簡自上意以病求代張建封十六年以病求代詔韋夏卿代之未至而建封卒往官將代儲什物俟其至韓琬上言往官將代儲什物俟其至今交罷執符紛競校在亡自以久疏斥柳冕為福建觀察自以久疏斥性躁狷不能無恨乃上表乞代李自良為右衛率焉燧來朝德宗罷燧兵以自良代之自良以事燧不敢當義者多其讓乃授右龍武大將軍入謝帝終以河東近胡謂曰卿於進退寧不有禮然守北門無易卿者勉為朕行坐政無狀柳冕奏閩中本南朝畜牧地可息羊馬置五區於東越又置五區於泉州悉索部焉驢牛羊合萬餘游畜之不經時死耗略盡復調充之民間怨苦坐政無狀代還始逼而來終代其任范希朝節度使韓游環畏其才將伺隙殺之希朝懼奔鳳翔貞元四年以游環政無狀使代之希朝曰始逼而來終代其任非所以防覬鯤安反側也固讓本傳
