body:
  text: 卷第一白高明柔克高明天也柔克寒暑不干陰騭下人言天默定下人之命天尊地卑成象在天成象觀天之道而四時不忒天垂象見吉凶聖人則之天行健資始大哉乾元萬物資始上浮為天下降天氣下降高遠窮高極遠貞觀天地之道無私不息者天清明象天天何言哉四時行焉不可階而升天秉陽垂日星無私覆高也明也悠也久也天之道昭昭今夫天昭昭之多及其無窮日月星辰繫焉萬物覆焉注云昭昭小明也本生小而成大覆盆之狀圓蓋之形轉轂之狀設位易石補女媧氏煉五色石補天惡盈天道易知立天之道曰陰與陽倬彼昭回天步艱難詩焉知禆灶焉知天道恆象天事恆象以會天位馮相氏辨其敘事以會天位為大惟天為大得一天得一以清恐裂天無以清將恐裂憂崩杞國人憂天崩墜身無所寄輕清九天漢高祖致九天巫祠八州及中央顥穹紛弦六幕之合九重圓則九重孰營度之八柱八柱何當西北何傾傾西北日月星辰就焉浩浩元氣蒼蒼正色老子曰天之蒼蒼其正色邪以其遠而無所至極也上玄彼蒼者天大清持滿范蠡曰天以持滿言天道盈而不溢天長地久天大老子曰域中四大斷鰲足立四極大圓洪覆無為而成不言而信張弓天道其猶張弓乎窺牖不窺牖見天道訢合覆燾得一以清吹萬以生蒼蒼者天恢恢其網無聲無臭或煦或吹剛德天為剛德覆物無私臨下有赫垂象干時天猶干時氣如橐籥物為芻狗其高必跼厥類唯章屍居而龍見淵默而雷聲莊子開雲霧衛瓘每見樂彥輔曰每見此人瑩然若開雲霧睹青天圓不中規文子曰至大者無形故天圓不中規無端文子曰天圓而無端故不可觀父天王者父天母地左旋天道左旋日月順之西傾見上注生三道生一一生二二生三三才也得一見上注既階升而莫致豈測管而可窺蜀吳使張溫來聘問秦密曰天有頭有口有耳有足鶴鳴九皋聲聞于天張重答漢昭帝渾天乘天氣而立載水而浮天轉如車蓋之運銅渾以察天也蓋天宣夜渾天晉書曰古言天有三家一蓋天二宣夜三渾天蔡邕周髀即蓋天說也唯渾天近而得上書言宣夜之學絕無法師周髀術數多所違失周髀即蓋天說也唯渾天近得其情今候台銅儀即其法也立八尺圓體具天地之形以正黃道以行日月以步五緯精微深妙百代不易周髀術即蓋天蓋天說天圓如張蓋地方如棋局天旁轉如推磨石而左行而日月右行而隨天左轉譬如蟻行磨上天之居如倚空也宣夜學宣夜學云天了無質日月眾星自然浮生虛空之中相駮張平子作渾天儀琁璣所加其星集皆如合符王仲任據蓋天之說以駮渾儀桓君山謂仲任之徒曰吾待奏報暴背西廁下頃之日光出去是應渾天也維秬維秠詩云誕降嘉種又孫氏瑞圖曰舜時後稷播植天降秬秠文虹竟天傅玄陽春賦丹霞播景文虹竟天昊天上帝其佐曰五帝五經通義曰天神之大者設位易曰天地設位而易行其中來麰大麥也始自天降見漢書天方授楚左傳曰公孫歸父會楚子於宋宋人告急於晉晉侯欲救之伯宗曰不可天方授楚未可與爭雖晉之彊能違天乎車蓋九辨云仰觀天形如車蓋渾儀郭緣生述征記云長安宮南有雲台高十五仞上有銅渾儀敬天之威之怒詩戴盆多謝悠悠子瞻天如戴盆圓天為蓋大言孔天以無言為尊聖人以不言為德劉洎傳書曰天道無親惟德是輔苟違天道人神棄之張元素諫太子承乾游畋不私於人柳公綽太醫箴曰天布寒暑不私於人百神之君張九齡玄宗即位未郊九齡建言天百神之君王者所由受命形於上者謂之天韓愈原人篇日月星辰之生同上天之道在生植其用在彊弱劉禹錫天論天以陽為主一人行之三才皆順盧肇潮賦萬物之始黎幹曰萬物之始天也人之始祖也天道亂而日月星辰不得其行原人篇天形常圓而色常清周迴可以度得晝夜可以表候非數之存常高而不卑常動而不已非勢之乘乎劉禹錫天論天圓十二網運關三百六十轉為一周天運三千六百周為陽孛酉陽玉格渾天儀貞觀初李淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黃道之驗也漢洛下閎作渾儀其後賈逵張衡等亦各有之而推驗七曜並循赤道按冬至極南夏至極北而赤道常定於中國無北之異蓋渾儀無黃道久矣太宗異其說因詔為之七年儀成表裏三重下據准基狀如十字未樹鼇足以張四表一曰六合儀二曰三辰儀三曰四游儀唐天文志以木為游儀開元九年一行受詔改治新曆欲知黃道而太史道儀梁令瓚以木為游儀一行是之乃奏請更鑄以銅鐵十一年儀成上渾天銅儀玄宗又詔一行與令瓚等更鑄渾天銅儀圓天之象具列宿先道及周天度數注水激輪令其自轉一晝夜而天運周外絡二輪綴以日月令得運得每天西旋一周日東行一度月行十三度十九分度之七二十九轉有餘而日月會三百六十五轉而日周天同上倚蓋文粹楊炯渾天賦天如倚蓋三光北馳文粹崔融乾棟傾而三光北馳窮阨而呼必可聞隱痛而祈必可答劉禹錫天論剛健為氣粹精為體夫帝王者天也天以剛健為氣粹精為體氣剛而明則三剛不昏體粹而精則四氣不亂李德裕漢元論天以六運生萬物而以正氣鍾賢人夢得奚公廟碑巖曲天深杜牧望故園賦天之有三光懸寓萬象之神明者也然其本在乎山川五行噓為雨露噫為雷風乘氣而生群分匯從天論天開碧落劉禹錫望賦陽而阜生陰而肅殺水火傷物木堅金利壯而武健老而耗眊氣雄相長天之能也見天論有宣夜渾天周髀之書古之言天之曆象有宣夜渾天周髀之書言天之高遠卓詭有鄒子令子之言有自乎荅曰吾非斯人之徒也大凡入乎數者由小而推大必合由人而推天亦合以理揆之萬物一貫也同上天說韓愈謂柳子曰若知天之說乎吾為子言天之說今夫人有疾痛倦辱饑寒甚者因仰而呼天曰殘民者昌佑民者殃又仰而呼天曰何為使至此極戾也若是者舉不能知天虧益於物夫日中則吳盛衰必復天吾不知吾見其虧益於物者矣五代史司天考天右旋入海而日隨之日之至也水其可以附之乎故因其灼激而退焉潮賦登華山落鴈峰搔首集李白登華山落鴈峰曰此最高呼吸之氣想通帝坐恨不攜謝眺驚人詩來搔首問青天爾自堯舜三代以來莫不稱天以舉事孔子刪詩書不去也五代史司天考序至高而無上至大而無外四時行焉萬物生焉楊炯渾天賦天聰明也聖人得之天垂象也聖人則之其道也不言而信其神也不怒而威驗之以衡軸考之以樞機三光北轉天則三光北轉楊炯渾天賦仰觀天則比參右肩之黃如奎大星之黑五材所以致用七政於焉不忒渾天賦靈心不測神理難筌同上天則圓如彈丸楊炯渾天賦君子法天運韓文天之運也一北而萬物生一南而萬物生其周天也三百六十五度其去地也九萬一千餘里渾天賦春秋以元加於歲以春加於王明王者當奉若天道以謹其始也又舉時以終歲舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作終始必法於天以其運行而不息也大君若天覆廣運無不至天氣不和而寒暑併俞文俊書慶霄在上萬物五色劉禹錫上而玄者世謂之天柳宗元天說物之大者莫大乎天通典氛蒙晦之柳公綽箴謂天高矣氛蒙晦之白地卑天尊地卑成形在地成形上隮地氣上隮深厚不測厚德載物變盈流謙地道資生萬物曰柔與剛立地之道沉潛剛克不動者地無疆德合無疆廣大象地博厚地秉陰竅於山川地載萬物取財於地是以親地無私載地之道博也厚也一撮土之多今夫地一撮土之多及其廣厚載華嶽而不重振河海而不洩萬物載焉注云地之博厚本由撮土持載無不持載坤元五土大司徒掌土地之圖知九州之地域廣輪之數辨五土之物得一以寧地無以寧將恐發貴貞漢書地道貴貞方輿宋玉大言詩曰圓天為蓋方地為輿大舟河圖曰地恒動不止譬人在大舟中閉牖而坐舟行不覺牝馬地類銅儀張衡作銅儀以察天地敏樹禮地道敏樹注云樹謂植草木東傾地傾東南百川歸焉右動元命苞天左旋地右動生植之功直方之德不知厚子貢曰終日履地不知地之厚地道坤儀節事范蠡曰地以節事言不至不可彊生地久天長地大域中四大重濁大方無隅方不中矩至大者無形故地方不中矩文子方而無涯文子曰地方而無涯故莫能窺其門生三道生一一生二二生三三才也得一見上注廣莫莫大地媼漢書地維絕列子云共工與顓頊爭帝觸不周山天柱折地維絕演地絡振天維政之本管子曰地政之本養材以地任地動儀後漢張衡字平子造候風地動儀以精銅鑄成圓徑八寸合蓋隆起形似酒樽飾以篆文山龜鳥獸之形中有都柱旁行八道施開發機外有八龍首銜銅丸下有蟾蜍張口承之牙機巧制皆在樽中覆蓋周密無際如有地動樽則震龍機發吐丸而蟾蜍承之振聲激揚因此覺知雖一龍發機而七首不動尋其方面乃知震之所在驗之以事合契若神自書契所記未曾有也嘗龍發機而地不覺動咸怪其無征數日後驛至果地動隴西人皆服其妙萬物祖白虎通曰地者萬物之祖元氣所生九州八柱淮南子曰天有九部八紀地有九州八柱四荒五土三壤四海皆地之總載名爾雅曰東至於泰遠西至于豳國南至于卜鈆北至于祝栗謂之四荒山林川澤丘陵墳衍原隰謂之五土上中下有三襄九夷八狄七戎六蠻謂之四海辨五土周官辨五地之物性一曰山林其動物宜毛物其植物宜皂物二曰川澤其動物宜鱗物其植物宜膏物三曰丘陵其動物宜羽物其植物宜覈物四曰墳衍其動物宜介物其植物宜莢物五曰原隰其動物宜臝物其植物宜叢物恒動見上大舟注地祗地祗曰黃地祗亦曰神州亦曰后土湛濁神農書曰湛濁為地積陰黃帝素問曰積陰為地故地者濁陰上地揚泉物理論曰凡居地有大利而無害者此上地也總名蔡邕月令章句曰總丘陵原隰阪險曰地易也春秋元命包曰地者易也言養物懷信交易變化含吐應節故其字力於一者為之廣河圖括地象曰地廣東西二萬八千南北二萬六千有君長之州州有九限中土之文德及而不治量山海經曰帝令堅亥步自東極至于西極五億十萬八千二十四頃磽確不墾者千五百萬二千頃下元樂聲儀曰下元者地氣也為萬物始生育長養蓋藏之主右轉春秋元命包曰地所以右轉者氣濁精所含陰而起遲故轉右迎天左其道也仁墨子曰禽子問天孰與地仁墨子曰翟以地為仁太山之上則封禪焉培塿之隈則生松柏下生黍苗莞蒲水生黿鱉魚龜民衣食焉家焉死焉地終不責德焉翟以地為仁經緯家語曰子夏曰商聞山書曰地東西為緯南北為經山為積德川為積形高為生下為死丘陵為牝谿谷為牡地理周禮大司徒掌建邦之土地之圖周知九州之地域廣輪之數辨山林川澤丘陵墳衍原隰之名物制畿疆而溝封之以土會之法辨五土之物史秦孝公作咸陽築冀闕徙都之秦韓天下之樞也形相錯如繡便利漢書曰秦形勝之國地勢便利沛公從杜南入蝕中太史公曰自太山屬之琅邪北被之海膏壤二千里其人闊達多匿其天性張儀紿楚曰秦商於之地六百里沃野千里李熊談公孫述曰蜀沃野千里果實所生無榖而飽土一撮今夫地一撮土之多五色徐州厥貢惟五色土稼穡作甘土爰稼穡土敝則草木不長配五行而攸序備六府而允脩一抔漢張釋之曰盜長陵一抔土抔音蒲侯反土厚水深居之不疾土薄水淺其惡易覯捧朱浮與彭寵書曰亦猶河濱之人捧土以塞孟津十仞韓詩見玉部與塊重耳乞食於野人野人與之塊子犯受而載之注有土之象篩土築阿房土被朱紫孔臣象張行成傳晉州地震不息帝問之對曰天陽也君象地陰也臣象君宜動臣宜靜今靜者動恐女謁用事大臣陰謀也橫流潰之柳公綽曰謂地厚矣橫流潰之師度知相地姜師度喜渠漕時為語曰師度知相地山川夷阻必究知賈耽尤悉地理四方之人與使夷狄者見之必從詢索風俗故天下地土區產山川夷阻必究知圖海內華夷廣三丈從三丈三寸以寸為百里并譔古今郡國縣道四夷述其中國本之禹貢外夷本班固漢書古郡國題以墨今州縣以朱刊誤疏舛多所釐正帝善之地癖李憕并州人頗殖產時謂地癖鄭虔學長於地理山川險易方隅物產兵戍眾寡無不詳閩越地肥衍歐陽詹泉州晉江人閩越地肥衍有山泉禽魚客土浮屠泓曰客土無氣見宅門遼東奉使還奏上山川道里賈曾擢監察御史方事遼東奉使稟軍餉還奏上山川道里形於下者謂之地韓愈原人篇草木山川之主同上土悉高三丈朱滔建中三年冬十月庚申為壇魏西祀天先是其地土悉高三丈魏人韋稔佞田悅以為益土之兆後二年滔等冊壝正值其所地道亂而山川草木不得其平韓愈原人篇浮舟文粹楊炯渾天賦地若浮舟地不和堆阜出則天臨朝新豐有山因震突出荊人俞文俊上言地不和堆阜出地震草木皆搖元和七年八月京師地震草木皆搖唐五行志地紀推機三百三十轉為一度地轉三千三百度為陽蝕酉陽玉格漢驛所通文粹呂溫地誌圖序禹跡之所窮漢驛之所通百川東瀉文粹崔融啟母廟碑坤輿缺而百川東瀉地則東南不足而萬穴東流渾天賦唐之治不能過兩漢而地廣於三代唐史南蠻贊北紀南紀唐天文志初貞觀中李淳風撰法象志北戒自積石負終南地絡之陰東及太華踰河並雷首底柱王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮是謂北紀所以限戎狄也南戒自岷山嶓塚負地絡之陽東及太華連商山熊耳外方桐柏自上路南逾江漢攜武當荊山至于衡陽乃東循嶺徼達東甌閩中是謂南紀所以限蠻夷也故星傳謂北戒為胡門南戒為越門地之平也景長而多暑景短而多寒渾天賦以彈丸地困全蜀高適始上皇東還分劍南為兩節度百姓弊于調度而西山二城列戍適上疏為戎狄言不足利戎狄為國家言不足廣土宇柰何以彈丸地困全蜀太平之人也哉下而黃者世謂之地柳宗元天說玉杯金盞唐僧泓師云未寧坊東南坊是玉杯地安邑里西是金盞地盧氏雜說包涵區夏載植群生漙彼域中賴茲厚德顏師古神州地祗祝文畫地陳乎梗概文粹呂溫地里圖序與夫聚米擬其端倪畫地陳乎梗概固不可同年而語土厚水淺江南水淺人心囂浮輕巧不可以都河北土厚人心彊愎狠戾不可以都惟襄鄧為中原人心質良有土洛之限無夷狄之虞此建都極選也方如棋局地則方如棋局渾天賦白日麗乎天易日中則昃易貞明易日昃之離易日居月諸胡迭而微朝日禮云冕而朝日東門之外冬日趙衰可愛夏日趙盾可畏三足烏日中有陽烏三足陽德之母出自東方照臨下土太陽說文云日實也太陽之精大明曜靈東君普名大明生東無私照在天成象瞻仰夫日月人所瞻仰方中日之方中杲杲出日遲遲春日未融明而未融無二天無二日並明天子與日月並明明照四海代明日月之代明扶桑虞泉淮南子曰日出暘谷豋于扶桑入于虞泉桑榆暮景葵藿傾心向日麗天見上出地文子炎精陽德寸晷文選分陰陶侃曰聖人惜寸陰至于凡俗惜分陰晨明拂扶桑入虞泉是謂晨明問日近遠晉明帝少時言長安遠於日如日之升我日斯邁日云暮矣致日馮相氏冬夏致日春秋致月以齊四時之序正日協時月正日書乃日既月乃日書十日淮南子云堯時十日並出羿射九烏死揮戈魯陽與韓戰酣日暮援戈揮日反三舍踆烏土圭測景不盈不縮若木日所出長繩繫日金烏懸象著明莫大乎日月雙麗文選夕淪濛谷朝隮嵎夷魯陽揮后羿射昭昭揭行如揭日月赤羽若日白駒過隙日過隙之景冬日之陽夏日之陰萬物歸之文子羲和之景為日御王者以日為兄火德明暉陽精正色冠三光之首具瞻皆仰人皆仰之王宮祭日在北陸出東方棄杖夸父競走虧盈畏愛暴儒士之腹郝隆炙野人之背負日之暄人莫知之夤賓出日夤餞納日禋六宗齊七政天子日官諸侯日御底日底平居卿日官大如車蓋列子曰一兒曰日初出大如車蓋及其中如盤此豈不謂遠者小近者大乎一兒曰初出蒼蒼涼涼及其中如探湯此不謂近者熱而遠者涼乎孔子不能決笑曰孰謂汝多知乎東方未晞下土是冒師尹惟日黃道烏景久照日月得天而能久照就之如日堯劍日虞公與夏戰日欲落公以劍指日日退不落走日山海經云夸父與日爭走乃渴死於道棄其杖而成鄧林慶瑞重光五色並瑞日合璧日月若合璧政太平則日五色至德之萌則日月如連璧重輪亦瑞兩珥吉徵再中漢文帝時新垣平候日再中有王字日中有王字瑞玄德動天祥光生日重光崔豹古今注曰漢明帝作太子樂八歌四章以贊太子一曰日重光災食鼓用牲于社春秋六月日食鼓用牲非禮也非常鼓之月用牲非禮也天子不舉凡日食天子不舉去盛饌伐鼓于社責群陰也諸侯用幣于社社尊於諸侯請救而不敢責伐鼓于朝退自責也以昭事神訓民事君天子不舉諸侯用幣所以事神尊卑異制所以訓民昭公十七年六月日食祝史請用幣季平子不許太史曰日過分而未至過春分未夏至謂四月正陽月三辰有災日月相侵又犯星宿故三辰皆為災於是百官降物素服君不舉避移時避正寢過日食時樂奏鼓伐鼓祝用幣用幣于社史用辭用辭自責故夏書曰辰不集于房集安房舍也日月不安其舍則食瞽奏鼓嗇夫馳庶人走此月朔之謂也今之四月正月之朔慝未作正陽之月慝陰氣也非日月之眚不鼓月侵日為眚陰陽逆順聖賢所重故特鼓二至二分日有食之不為災日月之行也分同道也日夜等故至相過也長短極故相過日月同道至相過也長短極故日月相過何損於明亦孔之醜于何不臧不用其行詩曰日月告凶不用其行能無旱乎日食叔孫昭子曰日過分而陽猶不克克必甚能無旱乎吳入郢乎日食史墨曰六年及此月吳其入郢雲如赤鳥夾日以飛楚昭王時有雲如赤鳥夾日以飛三日周太史曰其當王乎白虹貫日漢書云荊軻慕燕丹之義君子之過如日月之食麟斗淮南子曰麟斗日月食如月之初蜀中日食黃琬曰日食之初如月之餘草焦木枯堯時十日草焦木枯流金鑠石招魂曰十日並出流金爍石曷喪時日曷喪言比桀於日何時得喪日月薄食謪見於天禮曰男教不修陽事不得謪見於天日為之食故日食則天子素服而修六官之職蕩天下之陽事哭傳叔輒哭日食注志在於憂災也昭子曰子叔將死非所哭也言天災常道不足憂也子叔輒字也外壤內壤榖梁曰日有食之也吐者外壤食者內壤注凡所吐出者其壤在外所吞者其壤入於內闕然不見其壤有食之者注今日闕損不知壤所在必有物食之孔人君動法於日故出而視朝入而燕見李德裕奪色張介然祿山反授河南節度採訪使守陳留介然到屯不三日賊已渡河車騎蹂騰煙塵漫數十里日為奪色夢鄭光孝明皇太后弟也會昌未夢御大車載日月行中衢光暉洪洞照六合寤而占之工曰暴貴八磚李程為翰林學士入署常視日影為候程性懶日過八塼乃至時號八塼學士骨利干回鶻骨利干日入烹羊胛熟東方已明蓋近日出處也日蝕修德宋璟會日食帝素服俟變錄囚多所貸遣賑恤災患罷不急之務璟曰恐議者直以月蝕修刑日蝕修德或言分野之變冀有揣合臣謂君子道長小人道消止女謁放讒夫此所謂修德也囹圄不擾兵甲不黷官不苛治軍不輕進此所謂修刑也陛下常以為念雖有虧食將轉而為福又何患乎帝嘉納跳丸韓愈秋懷詩日月如跳丸日者陽之祖文粹盧肇海潮賦拜日五代契丹貴日每月朔旦東向而拜日五日並照天文志貞觀初突厥五日並照眾陽之長人君之尊渾天賦云日也者眾陽之長人君之尊天雞曉唱靈烏晝踆扶桑林於大海若木照於崑崙太平太像所以司其出入南至北至所以節其寒溫龍山銜燭不能議其光景夸父棄策無以方其駿奔赩至陽之元精海潮賦若熾堅金圓徑千里同上賦取日虞淵狄仁傑贊唐呂溫頌之曰取日虞淵洗光咸池潛授五龍夾之以飛賦日五色李程賦日五色造語警拔銜日李白詩青山猶御半邊日日君韓愈元和聖德詩變熙熙之純曜柳宗元迎長日賦變熙熙之純曜流杲杲之晴光璧影始融麗景才凝於城闕輪形尚疾斜暉未駐於康莊金鴉既騰翥韓愈詩陽烏李白上雲樂陽烏未出谷金烏韓愈李花詩金烏海底初飛來朱暉散射有霞開日荏苒以騰晶劉禹錫賦古之太平日不蝕且十月之交於曆當蝕君子猶以為變詩人悼之然則古之太平日不食蓋有之矣杜甫雲陰解駮日光穿漏韓文南海碑隆景觸白日之隆景韓文凡陰陽往來皆馴積而變日南至其行最急急而漸損以至春分及中而後遲迨日北至其行最舒舒而漸益以至秋分又及中而益急曆志金天之西白日所沒李白日出東方隈似從地底來歷天又復入西海六龍所舍安在哉日出行日中有若飛鷰唐史天文志乾符三年日中有若飛鷰射芳甸杜甫水閣朝霽朝日射芳甸日君道也無朏魄之變曆志白日欺紅顏李白古風二日相觸江南野史後主昱三年二日相觸時人見之恨不得掛長繩於青天繫此西飛之白日李白惜餘春賦烏照始潛輝龍燭便爭秉李後主太陽合朔當食不吉太平廣記唐太史李淳風校新曆太陽合朔當食既於占不吉太宗不悅曰日或不食卿將何以自處曰如有不蝕臣請死之及朔帝候於庭謂淳風曰吾放汝與妻子別對以尚早一刻指表影曰至此則蝕如言而蝕不差毫髮赤日照曜從西來六龍寒急光徘徊杜甫晚晴詩卻浮空而留六龍杜甫太清賦火輪飛出客心驚桃源圖惟神宣布太陽照臨下土動植咸賴幽顯無遺通典春分朝日於東郊祝文仙馭隨龍轉靈烏帶影飛臨波無定彩入隙有圓輝唐太宗賦秋日詩玉樹陰初正桐圭影未斜虞世南詠日午詩赬玉盤東方發紅照推捍赬玉盤李賀昌谷詩羲和敲日玻璃聲劫灰飛盡今古平李賀秦王飲酒羲和騁六轡晝夕不曾閒李賀相勸酒白坎為月易月者太陰之精淮南子月生於西禮夜光月名望舒月御月出皎兮如月之緪緪上弦而就盈照臨下土三辰三光七曜並月居其一盈必毀天之道也三五而盈三五而缺成象在天成象無私照代明日月代明三日成魄鄉飲酒禮三讓象月三日而成魄金精陰靈月賦月以陰靈萓莢晦朔應月而生落桂華月中有仙桂樹玉鉤金波蛾眉纖纖似玉鉤娟娟若蛾眉謂初月破環破鏡飛上天謂殘月如圭秋月如圭隨灰之暈淮南子畫隨灰而月暈缺注云以蘆灰環月缺其一面則月暈亦缺西園游曹植詩云清夜遊西園明月澄清景北堂寢陸機詩云安寢北堂上明月入我牖照之有餘輝欖之不盈手紈扇班婕妤詩曰新裂齊紈素皎潔如霜雪裁為合懽扇團圓似明月牛喘世說吳牛見月而喘鵲飛魏武帝歌曰月明星稀烏鵲南飛恆娥奔羿妻竊藥奔月乃為月中仙麗天日月麗乎天懸象著明莫大於日月離畢月離于畢俾滂霶矣夢月入懷元后母李氏夢月入懷魚腦減淮南子月毀而魚腦減月以為量禮記從星月之從星則以風雨書哉生魄書卿士惟月得天日月得天而能久照易九行天文志月有九行玉兔陰兔玄兔金兔蟾蜍瑤兔蟾光蟾輝素月蟾魄素蛾圓魄金魄素光月名王者姊事月具瞻皆仰蚌蛤月望則蚌蛤實斯征詩云而月斯征月將日就春秋致月馮相氏以齊四時之序連璧日月如連璧水德之明輝金精之正色一月之光百星之明不如一月之光入懷盈手闕也釋名曰云月闕也言滿則復闕方諸見月則津而為水淮南子云高誘注云方諸陰遂大蛤也熟摩拭令熱向月則有水生月道漢書云月立夏夏至行南方赤道曰西陸立冬冬至行北方黑道曰北陸分則同道至則相過朔月初之名也朔蘇也月死而復蘇晦月盡之名也晦灰也死為灰月光盡似之也弦月半之名也上下弦望月滿名也日月遙相望也觀萓莢以知月抱朴子云帝軒候鳳鳴以調曆唐堯二者襲月慶忌猛勇之將被要離謀殺以劍自刎將死感彗星襲月夢夏禹未遇夢乘舟月中過慶瑞陰靈月賦合璧漢書至德之萌日月若合璧重輪累聖之慶為大子也三天下喜委照而吳業昌淪精而漢道融月賦並夢月入懷生子為帝王德聞皇天慶見瑞月災食不用其行行道也日月告凶不用其行何損於明麟斗元命包麟斗則日月薄蝕則維其常彼月而食則維其常君子之過如日月之食月盈則食與時消息日月薄食謪見於天禮曰婦順不脩陰事不得謪見於天月為之食故月食則后素服蕩天下之陰事胡亥立劉向說苑云秦胡亥立日月薄食熒惑襲月孔乘月吟嘯崔咸乘月吟嘯月蝕東壁李泌四年八月月蝕東壁泌曰東壁圖書府大臣當有憂者吾以宰相兼學士當之矣昔燕國公張說由是以亡又可免乎明年果卒乘月自釆石至金陵李白嘗乘月與崔宗之自釆石至金陵著宮錦袍坐舟中旁若無人夢鄭光夢御天車載日月見日門月蝕修刑李栖筠會月食帝問其故栖筠曰月食修刑今罔上行私者未得天若似儆陛下耶三月並見五行志貞觀初突厥有三月並見群陰之紀上天之使唐文粹楊炯渾天儀賦月也群陰之紀上天之使異姓之王后妃之事方諸對而明水浹重暈幣而邊風駛纔盈蚌蛤則虜騎光侵適斗麒麟則暗虎潛值晦不東見朔不西眺曆志傳仁均始為定朔而月晦不東見朔不西眺入月宮鄭愚津陽門詩云蓬萊池上望秋月萬里無雲懸清輝上皇半夜月中去三十六宮愁不歸月中秘樂天半聞玎璫玉石和塤箎宸聰聽覽未終曲卻到人間迷是非釋云葉能靜嘗引上入月宮時秋已深上苦淒寒不堪久回至天半尚聞仙樂及歸但記其半遂於笛中寫之金盆杜甫詩落月如金盆玉兔騰精明水賦桂花吐曜玉兔騰精陰精龜茲帝怒討之是夜月食昴詔曰月陰精用刑兆也星胡分數且終月中桂酉陽雜俎天咫門舊說異書言月桂高五百丈下有一人常斫之樹創隨合其人姓吳名剛西河人學仙有過謪令伐樹修月戶雜俎云大和中有二人游嵩山迷路見一人衣布被枕一樸物方眠二人因就之且問其所自其人笑曰君知月乃七寶合成乎月勢如丸其影日爍其凹處常有八萬二千戶脩之予即一數因開樸有斤鑿數事言訖不見月中蟾桂地影也酉陽雜俎或言月中蟾桂地影也空處水影也月光屬於林中長慶中八月十五夜月光屬於林中如匹練其人尋視之見一金背蝦蟆疑是月中者月形如白盤韓文月蝕詩影娥池上官儀應詔詩中用影娥池學士時無解其事者令狐德棻召柬之等十餘人問出何書柬之對洞冥記漢武帝於望鶴台西起俯月台台下穿影娥池每登台眺月影入池中使宮人乘舟笑弄月影因名影娥池亦曰眺蟾臺令狐德棻嘆其博識雞跖集捲簾見月清興來疑是山陰夜中雪李白送族弟老兔寒蟾泣天色李賀夢天老兔寒蟾泣天色雲樓半開璧斜白玉輪乾露濕團光鸞珮相逢桂香陌酒酣喝月使倒行秦王飲酒曉月當簾挂玉弓李賀南園敗璧剝寒月韓愈委波金不定照席綺逾依杜甫月圓詩兔應疑鶴髮蟾亦戀貂裘同上殘月壞金樞同上香霧雲鬟濕清輝玉臂寒蟾蜍薄太清蝕此瑤臺月李白古風蟾蜍薄太清蝕此瑤台月圓光虧中天金魄遂淪沒嘗聞古老言疑是蝦蟆精同上嘗聞古老言疑是蝦蟆精徑圓千里納汝腹何處養汝百醜形把沙腳手鈍誰使汝解緣青冥臣有一寸刃可刳凶蟆腸敢告上天公臣有一寸刃可刳凶蟆腸清月出嶺光入扉山石詩清光可愛蘇頲掌文誥八月十五禁中直宿與諸學士翫月時長天無雲月色如晝蘇曰清光可愛何用燈燭遂令撤去擊鑑救月長安城中每當月蝕即士女取鑑向月擊之蓋云救月百丈高臺明皇八月十五夜與太真臨太液池憑欄望月帝意不快敕池西岸別築百丈高臺後經祿山之亂不復置惟基址存焉梯雲取月周生者有道術中秋夜與客會月色方瑩謂坐客曰我能梯雲取月置之懷袂因取筋數百條繩而駕之曰我梯此取月俄以手舉衣懷中出月寸許光色照爛寒流入骨宣室志仙婦之月作蟾蜍崔融啟母廟碑暑退九霄淨秋澄萬景清劉禹錫八月十五天柱峰翫月趙知微有道術皇甫玄真等師事之中秋積陰不解眾惜良辰知微曰可備酒殽登天柱峰翫月既出門天色開晴及豋山峰月色如晝會飲至月落方歸下山則淒風苦雨陰晦如前三水小牘紫雲回帝夢游月宮聞樂聲記其曲而寓之笛名紫雲回開元傳信記月落西上陽餘輝半城樓李白古風滿目飛明鏡歸心折大力杜甫八月十五夜月氣沉全浦暗樓仄半輪明同上縈窗素月垂文練杜甫太白入月李白聞祿山反作胡無人詩云太白入月敵可摧後祿山死日果太白食月雜俎紙月長慶初楊隱之訪道人唐居士因留宿夜月暗而不設燈唐呼其女曰可將一下弦月來其女以片紙作月形貼之壁間祝曰今夕有客願賜光明須臾滿室朗然魍魎多深樹蝦蟆動半輪杜甫詩廣寒清虛之府龍城錄開元六年上皇與申天師道士鴻都客八月望日夜天師作術三人同上皇上游月中過天門在玉光中飛浮宮殿往來無定寒氣逼人露沾衣紳皆濕望見太府榜曰廣寒清虛之府其間守門兵衛甚嚴白刃粲然望之如凝雪時二人皆止其下天師得入天師引上皇起躍身如在煙霧中直下視玉城嵯峨但聞清香靄鬱下若萬里琉璃之田其間見有仙人道士乘雲駕鶴往來若遊戲少頃告而前覺翠色冷光相射目精極寒不可進下見有素娥十餘人皆皓衣乘白鸞往來笑舞於廣庭大桂樹下又樂音錯雜亦甚清麗上皇素解音律熟覺而意已傳頃天師言欲歸三人下若旋風忽悟若醉中夢回可次夜上皇欲再往天師但笑謝而不允上皇因想素娥風中飛舞帔編律樂音制為霓裳羽衣曲自古洎今清麗無復加于是矣玉階桂樹閒婆娑并光全耀歸我月盲眼鏡淨無纖瑕弊蛙拘送主府官帝箸下腹嘗其皤依前使兔操杵曰玉階桂樹閒婆娑韓文月蝕效玉川子瓊樓金闕翟天師乾祐曾於江岸翫月或問曰此中竟何有翟笑曰可隨吾指觀之俄見月規半天瓊樓金闕滿焉數息間不復見也出酉陽雜俎新月似磨鎌韓愈詩明月出天山蒼茫雲海間李白舒波纖雲四卷天無河清風吹空月舒波韓愈八月十五豔豔欹眠聽新詩屋角月豔豔喜候喜至同上月妃韓文聖德詩日君月妃煥赫婐𡛖稽於天道則寒暑均取於月數則蟾兔圓歐陽四門集翫月詩序月可翫翫古月也謝賦鮑詩眺之庭前亮之樓中皆翫也貞元秋八月十五夜詣陳之居修厥翫事八月於季始孟中於夜又月之中稽於天道則寒暑均取於月數則蟾兔圓肌骨與之疏涼神鬼與之清冷星五白庶人惟星星有好風星有好雨天秉陽垂日星成象在天成象歷候不忒無失經紀七曜為經二十八宿為紀天文觀乎天文以察時變天垂象玄象明星煌煌皙皙嘒彼小星子興視夜明星有爛在戶三星在戶保章氏掌天之日月星辰之變動以觀天下之遷辨吉凶以星土辨九州之地所封之域皆有分星以觀妖祥天宗歲星在紀而淫于玄枵在于虛危之次星紀吳越之分火中寒暑乃退火心星懸象在霤三星在霤經星經恒也榖梁攝提失方星名隨斗杓指攝提直方五星如連珠星星無常老人星以能分時候之星拱北辰語為政以德譬如北辰居其所而眾星拱之德星陳仲弓從諸子造荀季和德星聚太史奏賢人聚二使後漢遣使者二人入蜀李郃曰有二使星入蜀分野犯牛博物志曰仙槎犯牛占客星於蜀郡問嚴君平衝斗冤氣衝斗識寶劍埋於酆城張華雷煥識之箕畢春秋緯月離于箕風揚沙詩云月離于畢俾滂沱矣歷歷古詩天上何所有歷歷種白榆焞焞天策焞焞無光貌躔次盈縮五緯流行經八方而天文著七紀迭見正四時而歲功成明不慆之道天道不慆慆疑也垂有爛之文上天設象下土具瞻道雖玄遠象則昭明仰止瞻之六物三辰並日月星有嘒宿離不忒維南有箕不可簸揚載翕其舌有捄天畢畢所以揜兔維北有斗不可以挹酒漿西柄之揭北斗服箱睆彼牽牛不以服箱啟明東有長庚西有幽禜祭星也散也釋名云星者散也言列位布散陽之榮也春秋說題云星之為言精也布爾雅云祭星曰布連貝九辨曰仰觀天形如車蓋眾星累累如連貝慶瑞聚於東井漢王入關五星聚東井此高祖受命之符連珠五星連珠至德之萌虹流華渚河圖曰大星如虹下流華渚女節感而生白帝金天氏電繞斗樞少典妃附寶見大電光繞北斗樞星曜郊野附寶感而孕黃帝軒轅氏熒惑三舍宋景公熒惑守心子韋曰禍當君可移於相公曰相所以理國家不可曰可移於百姓公曰不可曰可移於歲公曰不可子韋曰君有至德之言三天必三賞熒惑必徙三舍後果徙三舍玄德動天德動天道瑞見星文德動天文祥開星見五星同色天下偃兵百姓寧也歸邪如星非星如雲非雲出必有歸國也格擇如炎光之狀見則不種而穫不有土功必有大害助月景星如半月生於晦朔助月為明瑞星漢書音義曰瑞星曰景星亦曰德星災異隕石于宋五隕星不見恒星不見如雨星隕如雨孛妖星也傳曰孛于北斗宋齊晉之君皆將死亂禳彗齊有彗星公欲禳之晏子曰彗所以除穢也君無穢德又何禳焉若德之穢禳之何益太白食昴漢書衛先生為秦畫長平之事太白食昴昭王疑之熒惑襲月見上注處士憂死月犯少微少微處七星戴逵名著於謝敷時人憂逵俄而敷死會稽人嘲曰吳中高士求死不得死三台坼張華死彗淮南子鯨魚死而彗星出注云彗所以除舊布新陰陽之事星隕於宋叔興曰是陰陽之事也五星文子曰政失於春歲星盈縮政失於夏熒感逆行政失於秋太白出入無常政失於冬辰星不效其鄉星搖則人勞光武元年如月如爪元帝時飛星如缶元帝時如盂流晉書曰流星天使也枉矢妖星漢書音義曰妖星曰孛星彗星長星亦曰攙搶絕跡而去曰飛星光跡相連曰流星也孔太白數晝見李君羨洛州武安人先是貞觀初太白數晝見太史占曰女主昌熒惑入井傳奕隋漢王諒反問奕今茲熒惑入井果若何對曰東井黃道所由熒惑之舍烏足怪耶若入地上井乃為災諒怒星孛虛危歷氐餘百日虞世南星孛虛危歷氐餘百日帝訪群臣世南曰昔齊景公時彗見公問晏嬰嬰曰公穿池沼畏不深起臺榭畏不高行刑罰畏不重是以天見彗為戒耳景公懼而修德後十六日而滅臣願陛下勿以功高而自矜勿以太平久而驕謹終于初彗雖見猶未足憂帝曰誠哉勸帝修德韓思彥太白晝見勸帝修德荅天譴犯昴韋見素見肅宗於順化郡是歲十月丙申有星犯昴見素言於帝曰昴者胡也天道謪見所應在人祿山將死矣直寢庭墜王疑大星直寢庭墜術家言宜上疾不視事以厭勝大星霣寢令狐楚卒是夕有大星霣寢上其光燭廷彗出東方鄭注絳州翼城人文宗暴眩王守澄復薦注即日召入對浴堂門賜賚至渥是夜彗出東方長三尺芒耀怒急熒惑犯上相李德裕星家言熒惑犯上相相懇丐去位不許星變求去位鄭畋再遷門下侍郎以星變求去位不許彗見東井張楚金為刑部侍郎儀鳳初彗見東井上疏陳得失高宗欽納德星舍秦分薛頤滑州人武德初進直秦王府密語曰德星舍秦分王當帝天下王表為太史封泰山彗星見太宗封泰山彗星見頤因言臣商天意陛下未可東亦會太臣上議帝遂罷山川精氣方伎嚴善思言山川精氣上為列星月揜畢口大星五代張希崇頗知星曆天福三年月揜畢口大星希崇嘆曰畢口大星邊將也我其當之乎明年正月果卒流于天棓莊宗皇后劉氏明年三月客星犯天庫有星流于天棓占星者言御前當有急兵宜散積聚以禳之宰相請出庫物以給軍莊宗從之后不許日中見北斗昭宗帝紀天祐元年二月丙寅日中見北斗長庾李白之生母夢長庚星因以命之熒惑入月嚴善思長安中熒惑入月鎮犯天闕善思曰法當亂臣伏罪而有下謀上之象歲餘柬之等起兵誅二張熒惑掩太微上相李吉甫卒前一歲熒惑掩太微上相吉甫曰天且殺我再遜位不許星如撒沙出攢集爭強雄月蝕詩韓文曙星相望所謂同年友當其盛時聯袂齊鑣亙絕九衢若屏風然今來落落如曙星相望劉禹錫送張與序可摘北夢瑣言顧雲為高駢草醮詞天靜則星辰可摘光芒相照燭南北爭羅陳韓愈送惠師析木天街星宿清潤尊號表天福之降下於國使有御車使星參乘文選宋郊祀歌織女斜河異聞集沈警過張女郎廟將別女郎曰織女無賴已復斜河星宮之君杜甫詩星宮之君醉瓊漿學者仰之如北斗韓愈芒寒色正如繁星麗天而芒寒色正人望而敬者五行而已劉禹錫柳宗元文序若景星初見韓愈遺李渤書天狗聲如雷韓愈汴州亂云汴州城門朝不開天狗墮地聲如雷木為重華火為熒惑鎮居戊已斯為土德太白主西辰星主北楊炯渾天賦牛奮其角箕張其口三星行彗星孛于東方江南野史後主昱八年春彗星孛于東方初出亙中天其末曲向北時謂之掃星迨曉幾亭午短如帚焉老人星下列星燦然唐史曆志使者李元太言交州望極纔高二十餘度八月海中望老人星下列星燦然明大者甚眾古所未識乃渾天家以為常沒地中者也旄頭四光芒李白旄頭四光芒爭戰如蜂攢星垂平野闊旅夜景星燭夜文粹楊炎紀聖功頌休光灼前曜瑞彩接重輪虞世南七星掛城聞漏版李賀宮娃歌明天文六白觀乎天文以察時變焉知子產曰裨灶焉知天道是亦多言矣豈不或信恒象天事恒象言恒以象示人羲和湎淫廢時亂日俶擾天紀昏迷于天象天極星太一常居也旁三星三公也餘三星後宮也文昌宮六星上將次將貴相司命司錄司史王梁策馬車騎滿野上天垂象下土具瞻察有爛之文詳不慆之色琁衡齊政授時於虞典銅渾設象致用於漢朝二儀剖判見若卯之肇分七曜迴旋觀如蟻之環轉博考乾象眇覿星辰稽日月之度考其盈縮推星辰之躔審其次舍式觀玄象洞曉天文祕奧精微爰度變通罔或差忒業習談天識乖窺管興而視夜仰以觀天天無遁形星無遺象七紀五緯躔次如契於心四海九州分野若指諸掌道雖玄遠象則昭明藝精窺牖業著專門俯察仰觀下學上達子貢多言尼父未賢其屢中裨灶或信子產猶謂其焉知漢志天文志周官保章氏掌觀日月星辰之變辨其吉凶以觀妖祥史秦始皇宿中外官凡百一十八伏見蚤晚邪正存亡虛實闊狹及五星所行合散犯守凌歷斗蝕暈謪背穴抱珥虹蜺者本在地而上發於天管輅八九歲時鄰兒戲土壤中輒畫天文及日月星辰語皆不常父母禁之不令出自言家雞野鵠猶知況人乎歷代人高陽南正帝佶式敘三辰唐虞羲和夏昆吾殷巫咸周史佚魯梓慎晉卜偃鄭裨灶宋子韋齊甘德楚唐昧趙丑皋魏石甲皆掌著天文巫咸石甘之說後代所宗暴秦焚書天官星占存而勿毀司馬談父子劉向廣鴻範作星極論馬續述天文蔡邕譙周各有撰錄司馬彪采之又桓君山奏事坐西廡下以寒故曝背有頃日光去不復曝背乃告信蓋天日如推磨天左轉而日西行光景當照此廊下移而東耳不當迭去迭去乃應渾天也日若繞西及北故應如月在雲之狀不得夜便暗渾天信而有徵也天遠人邇曾不戒於多言夜考晝參果致尤於私習雖躔次運行可徵於漢史而吉凶占候有犯於國章氣衝斗牛晉書吳之未滅牛斗之間常有紫氣術者皆云吳可圖張華獨以不然及吳平紫氣逾明華聞雷煥妙達緯象乃邀煥宿共尋天文知將來吉凶豋樓仰觀煥曰唯斗牛之間有異氣耳寶劍之精上徹於天在酆城獄屋下孔明天文象緯王琚敏悟有才略明天文象緯李琢劉從諫初術者李琢能言禍福從諫以重幣邀辟署大將會昌初謂從諫曰往歲長星經斗公生直之今鎮復至當有災從諫即從軍山東李元凱善天律曆黎干善星緯術待詔翰林歲星居心宿五度德輿歲星居心頌春三月司天氏奏歲星居心宿五度北斗七星飲酒唐太宗時李淳風奏北斗七星當化為人明日至西市飲酒使人候之有僧七人共飲酒二石太宗召之七人笑曰此淳風小兒在彼言耳忽不見枕天子膝睡李泌謂肅宗曰臣絕粒無家祿位第宅皆非所欲收復京師後得枕天子膝睡一覺使有司奏客星犯帝位一動天文足矣鄴侯家傳太白酒星成都酒家每有紗帽藜杖四人來飲孫思邈因奏其事明皇問思邈曰此太白酒星下人間飲酒唐逸史文星暗大中九年日官李景亮奏云文星暗科場當有事臣為禮部懼焉至是三科盡覆試宏詞趙矩等皆落吏部裴諗除祭酒南部新書上象變不利大臣裴光庭知星者言上象變不利大臣請禳之暨於週末器乃亡貞觀初李淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黃道之驗也暨於周末器乃亡洛下閎作渾儀其後賈逵張衡亦各有之而推驗七曜並循赤道冬至極南夏至極北而赤道常定於中國無南北之異蓋渾儀無黃道久矣太宗異其說詔為之表裏三重下據準基狀如十字七年儀成表裏三重下據准準狀如十字餘見天門游儀大唐新語曰一行造黃道游儀以進御付太史監將向雲臺上用以測候熒惑太白犯太微上將北平王馬燧薨先是司天頻奏熒惑太白犯太微上將間一月而燧薨祕書郎掌四部之圖籍天文以紀星辰象緯唐六典凡占天文變異日月薄蝕五星凌犯石氏甘氏巫咸三家中外官占唐六典星犯昴祿山將死韋見素是歲十月丙申有星犯昴見素言於帝曰昴者胡也天道謪見所應在人祿山將死矣帝曰日月可知乎見素曰福應在德禍應在刑昴金忌火行當火位昴之昏中乃其時也既死其月亦死其日明年正月甲寅祿山其殪乎帝曰賊何等死答曰五行之說子者視妻所生昴犯以丙申金木之妃也木火之母也丙火為金子申亦金也二金本同末異還以相剋賊殆為子與首亂者更相屠戮乎及祿山死日月皆驗旺氣流萃於秦地吳嶠霅溪人年十三作道士煬帝元年過鄴中告其令曰中星不守太微王君有嫌而旺氣流萃於秦地子知之乎令不之信至神堯即位方知不誣嶠精明天文即袁天綱之師也柳宗元龍城錄明天步曆筭李淳風靈臺郎掌觀天文之變而占出唐六典薛頤善天步曆筭晨夜七白旭日始旦雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲顛倒衣裳顛之倒之不能晨夜不夙則暮夜如何其夜未央未央向晨日云暮矣莫夜有戎日旰晝爾已上並詩卜晝未卜其夜日入虞泉桑榆暮景辨色晨夜時夜莊子見卯而求時夜孔晝長夜短回鶻又北度則晝長夜短晝短苦夜長闇時多也李石帝嘗曰朕觀晉君臣以曠夷致傾覆當時卿大夫之過耶石曰然晝短苦夜長闇時多也晝作夕休文粹李翱復性書晝而作夕而休者凡人也生晝夜文粹楊炯渾天賦出于卯入于酉而生晝夜陰陽運行梁肅磻溪銘天地闔辟陰陽運行昏旦文粹劉軻黃巖院記矧卯戍之昏旦露夕霞朝劉禹錫楚望賦露夕霞朝望如飛動昏曉杜甫望嶽陰陽割昏曉沉吟坐西軒飲食錯昏晝寄岑參渾天儀以木地為平今儀半在地下晦明朔望遲速有準天文志刻漏之法今失其傳以午正為時始下侵未四刻十分而為午是晝夜昏曉皆失其正馬重纘今夕是何年牛僧孺入薄后廟應教作詩曰香風引上大羅天月地花宮拜洞仙共道人間惆悵事不知今夕是何年周秦行紀晝夜刻五代司天考晝夜刻置日入分以日出分減之為晝分用減統法為夜分各滿經法為晝夜刻既夜天如曛天文志骨利干居澣海之北北距大海晝長而夜短既夜天如曛不暝夕靦羊胛纔熟而曙蓋近日出沒之所挈壺正司晨掌知漏刻孔壺為漏浮箭為刻以考中星昏明之候焉出唐六典律曆八白君子以治歷明時易羲和敬授咨汝羲暨和以閏月定四時成歲洪範五紀五曰歷數正歲年周禮太史正歲年次以敘事頒于官府都鄙宿離不忒無失經紀底日日官以底日底致也諸侯有日御不失日以授百官於朝司歷哀公十二月螽仲尼曰火伏而後蟄者畢今火猶西流司歷過也火伏十月漢藝文志會日月五星之辰以考寒暑生殺之實聖人必以曆數定三統服色之制又探知日月五星之會凶阨之患吉隆之喜此聖人知命之術非天下至精孰能與焉小人彊欲知天道壞大以為小削遠以為近是以破碎而難知推歷生律製器規圜矩方重黎惇曜堯命天之曆數在爾躬秦推五勝五行相勝漢習秦正黃帝合而不死歷始終無窮故曰不死三統曆漢考步小學太史之職漢書夫推歷生律製器規圓矩方權重衡平准繩嘉量探頤鉤深莫不用為紀行於一衍於萬其術在筭為天下小學職在太史羲和掌之分天部漢造太初歷募民間治曆者方士唐都洛下閎與焉都分天部而閎運籌轉曆益部耆舊說曰巴郡洛下閎漢武時改顓頊歷為太初歷曰後八百歲此歷差一日當有聖人定之八十一分漢昭用鄧平所造八十一分律歷罷廢尤疏者十七家覆歷又使校律曆昏明宦者淳于陵渠復覆太初歷晦朔弦望皆最密日月如連珠陵渠奏狀遂用鄧平歷歷正少皞官鳳烏氏歷正也孔崔善為貝州武城人傅仁均撰戊寅歷李淳風詆其疏帝令善為考二家得失多所裁正善律歷李元凱善律曆通陰陽曆術裴行儉通陰陽曆術每戰豫道勝日專用大衍之策歷志至唐一行始專用大衍之策則曆術又本於易矣八改唐始終二百九十餘年而曆八改初曰戊寅元曆曰麟德甲子元曆曰開元大衍曆曰寶應五紀曆曰建中正元曆曰元和觀象曆曰長慶宣明曆曰景福崇玄曆而止矣馳騁反覆于乘除間昭宗時宣明曆施行已久數亦漸差詔太子少詹事邊岡與司天少監胡秀林均州司馬王墀改治新曆然術一出於岡岡用算巧能馳騁反覆於乘除間由是簡捷超徑等接之術興而經制遠大衰序之法廢矣欽天曆王朴明敏非獨當世之務至於陰陽律曆之法莫不通焉顯德二年詔朴校定大曆乃削去近世符天流俗不經之學設通經統三法以歲軌離交朔望周變率策之數步日月五星為欽天曆請所頒曆劉仁軌請所頒曆或問其故荅曰當削平遼海頒示本朝正朔卒如其言合二中以通律曆曆本議曰天數中於五地數中於六合二中以通律曆天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此究天地之心曆志正一氣之元宣萬邦之命曆象王者所以正一氣之元宣萬邦之命而古今所紀考審多差五代馬重纘傳下協黃鍾上稽玄象張曲江集開元握乾符曆洛下閎極其數而知來耆舊傳尚其占而示後下黃鍾上稽玄象以和六氣以協三光審晷度之短長覆星間之廣狹繩九道之朓肭紏五精之進退張說大衍曆序歷經玄宗詔一行於光大殿改撰大唐新語日蝕不效曆志開元九年麟德曆署日食不效詔一行作新曆推大衍數立衍以應之較經史所書氣數日名宿度可考者皆合十五年草成而一行卒八百歲後當差一日彼落下閎者漢太初時一巧律耳其云後八百歲當差一日有聖人正之斯人也抑將露才揚術預證來望有耆舊之傳記無史策明文張說開元曆頌杼軸萬象優柔四載參大衍天地之數綜八卦六爻之序一轍於文王也覈春秋交蝕之辰研九疇五紀之奧同文於孔子也杼軸萬象優柔四載奏草朝竟一夕公落張說序一司曆掌國之曆法以頒于四方有戊寅曆麟德曆神龍曆大衍曆凡天下測景之處分至表准其詳可載故參考星辰稽驗晷影各有常典唐六典聖人握符之大曆以數推氣以氣定朔以星正時以閏成歲考星間而革速度置歲差而辨誤日立大衍之紀參大渾之晷合鍾律之聲極鬼神之情是之謂聖人握符之大曆也開元十二年甲子凡三千四十歲而大衍曆興張說曆者先王所以明時授人敬天育物者也辰極常居斗運不息晦明相推而變月寒暑往來而成歲日月右進周天之度啟星辰左旋正時之氣合積餘分而致閏配甲子而設蔀張說序非軒后至聖不啟履端之素非容成詣極不就歸余之經同上張說大衍曆序赤光照室之夜謹以赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新曆同上
