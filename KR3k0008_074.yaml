body:
  text: 卷第七十四孔集賢殿書院學士掌刊緝經籍凡圖書遺逸賢才隱滯則承旨以求之謀慮可施於時著述可行於世者考其學術以聞凡承旨撰集文章校理經籍月終則進課於內歲終則考課於外唐志開元五年乾元殿寫四部書置乾元院六年乾元院更號麗正修書院置使改修書宮為麗正殿學士十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事至德二年置大學士貞元四年罷大學士元和四年集賢御書院學士直學士皆用五品如開元故事置酒集仙殿張說進中書令詔說與禮官學士置酒集仙殿曰朕今與賢者樂于此當遂為集賢殿乃下制改麗正書院為集賢殿書院而授說院學士知院事授說大學士帝欲授說大學士辭曰學士本無大稱中宗崇寵大臣乃有之臣不敢以為稱後宴集賢院故事官重者先飲說曰吾聞儒以道相高不以官閥為先後於是引觴同飲時伏其有體賜渤海詔張九齡始說知集賢院事九齡可備顧問及說卒天子思其言召為祕書少監集賢院學士知院事會賜渤海詔而書命無足為者乃召九齡為之被詔輒成遷工部侍郎知制誥該綜群籍蔣乂父將明擢集賢殿學士吳兢位史官乂幼從外家學得其書博覽彊記逮冠該綜群籍有史才司徒楊綰尤稱之蔣明在集賢值兵興圖籍殽舛白宰相請引乂入院助力整比宰相張鎰亦奇之署集賢小職乂料次踰年各以部分得善書四萬卷補凌煙舊贊蔣乂帝嘗登凌煙閣視左壁頽剝題文漫缺才數字命録以問宰相無能知者遽召乂至答曰此聖曆中侍臣圖贊帝前口以誦補不失一字帝嘆曰雖虞世南默寫列女傳不過是詔問神策軍本末會詔問神策軍本末中書討求不獲時集賢學士甚衆悉亡以對乃訪乂乂條據甚詳宰相高郢鄭珣瑜歎曰集賢有人哉明日詔兼判集賢院事蔣乂父子為學士儒者榮之辭大學士李泌俄加集賢殿崇之館大學士泌建言學士加大始中宗時及張說為之固辭乃以學士知院事至崔員復為大學士亦引泌為讓而止以宰相兼學士四年八月月蝕東壁泌曰東壁圖書府大臣當有憂者吾以宰相兼學士當之昔燕國公張說由是以亡又可免乎明年果卒采天下遺書以益闕文褚無量初內府舊書自高宗時藏宮中甲乙叢倒無量建請繕録補第以廣祕籍天子詔於東都乾元殿東廂部彙整比無量為之使因表盧僎陸去泰王擇從徐楚壁分部仇定衛尉設次光祿給食又詔祕書省司經局昭文崇文二館更相撿仇采天下遺書以益闕文不數年四庫完治帝詔群臣觀書賜無量等帛帝西還徙書麗正殿更以修書學士為麗正殿有學士同上中宗景龍二年始於修文館置大學士四員學士八員直學士十二員象四時八節十二月於是李嶠等為大學士李適等為學士薛稷等為直學士李適傳宴私未嘗不預上官儀召授洪文館學士遷祕書郎太宗每屬文遣儀視玨草宴私未嘗不預本傳省中盤石薛元超洪文館學士省中有盤石道衡為侍郎時常據以草制元超每見輒泫然流涕並直昭文館劉禕之與孟利貞高智周郭正一俱以文辭稱號劉孟高郭並直昭文館俄遷右史洪文館直學士文章固耐久武平一以字行兼修文館學士初崔日用自言明左氏春秋諸侯官族它曰學士大集日用折平一曰君文章固耐久若言經則敗績矣論詩工否鄭覃遷洪文館大學士帝坐延英論詩工否覃曰孔子所刪三百篇是已其非雅正者烏足為天子道哉夫風大小雅皆下刺上之變非上化下為之故王者采詩以考風俗得失若陳後主隋煬帝特能詩之章解而不知王術故卒歸於亂章什諓諓願陛下不取也手未嘗廢卷馬懷素兼昭文館學士篤學手未嘗廢卷謙恭謹畏推為長者為弄辭悅帝沈佺期拜起居郎兼修文館直學士既侍宴帝詔學士等舞回波佺期為弄辭悅帝還賜牙緋懷先王之道經緯之文賀知章開元中遷禮部侍郎兼集賢院學士一日中謝宰相源乾曜語說曰賀公兩命之榮足為光寵然學士侍郎孰為美說曰侍郎衣冠之選然要為具員吏學士懷先王之道經緯之文此其為間也玄宗自為贊賜之俾從丹地之遷佇繼緇衣之美一品集鄭裔綽直洪文館制當代所推舊史李揆集賢殿崇文館大學士肅宗嘗謂揆曰卿門地人物文章皆當代所推時人稱三絶寫列女傳於屏風唐史虞世南授洪文館學士帝嘗命寫列女傳於屏風見書門上官詩體唐史上官儀太宗時授洪文館直學士工詩人多效之謂為上官體見詩門晚節學愈苦蕭德言兼洪文館學士德言晚節學愈苦見勤學門御史大夫二白秦官也應劭云御史之率故曰大夫周官宗伯之屬有御史掌贊書御侍也戰國以為糾察之官並典吏官秦趙會澠池各顧大夫書其事秦有御史置大夫置領也亞相憲臺霜臺柏臺烏臺烏府職司邦憲糾轄朝綱恪居司憲慎守國章弄印無以易堯史記趙堯為周昌侍御史人謂曰君之趙堯奇才必代君為大夫昌曰堯刀筆之吏何至此哉復昌為趙王相既行上持御史大夫印弄之視堯曰無以易堯者遂拜之諫漢薛廣德為御史大夫直言極諫上欲御樓船廣德諫請從橋上明法杜延年明法律拜御史大夫居父官不敢當舊位居父官見上賜金薛廣德為御史大夫乞歸上賜黃金六十斤安車駟馬立法受辜朝錯為大夫請諸侯有過者削其地七國反遂誅之無文貶秩卜式為大夫無文貶為庶子冠鴛鷺之序奮鷹隼之威烏集朱博字子元為御史大夫府中列柏樹常有野烏數十棲其上朝與暮集因名烏臺謂之朝夕烏朝夕烏見上不法丞相司直繁延壽奏御史大夫蕭望之知御史有令不得擅使吏守之杜陵護親家事小吏冠法冠為妻先引又使買賣私所附益凡十萬三千孔御史大夫一人正三品掌以刑法典章糾正百官之罪惡百官志凡冤而無告者三司詰之三司謂御史大夫中書門下也大事奏裁小事專達凡有彈劾御史以白大夫大事以方幅小事署名而已有制覆囚則與刑部尚書平閲行幸乘輅車為導朝會則率其屬正百官之班序同上龍朔二年改御史臺曰憲臺大夫曰大司憲武后文明元年改御史臺曰肅政臺光宅元年分左右臺左臺知百司監軍旅右臺察州縣省風俗尋命左臺兼察州縣同上諸司文案稽期請以御史檢促杜淹為御史大夫建言諸司文案稽期請以御史檢促太宗以問僕射封倫倫曰設官各以其事洽御史劾不法而索案求疵是太苛且侵官淹默然劾奏易之等罪御史大夫魏元忠嘗劾奏易之等罪易之訴於后反誣元忠與司禮丞高戢約曰天子老當挾太子為耐久朋后問孰為證易之曰鳳閣舍人張說翌日庭辨皆不讎然元忠說猶皆被逐高宗美其概高智周為大夫與裴炎同治章懷太子獄無所同異固表去位高宗美其概以情自解劉仁軌嘗為御史袁異式所劾慢辱之脅使引決及拜大司憲異式尚在臺不自安因醉以情自解仁軌待觴曰所不與公者有如此觴後既執政薦為司元大夫朝奏暮黜可矣薛登景雲中為御史大夫僧慧范恃太平公主勢奪民邸肆官不能直登將治之或勸以自安答曰憲府直枉朝奏暮黜可矣遂劾奏反為主所誣出祁州刺史耳目官固當特立韋思謙進御史大夫性蹇諤顏色壯重不可犯見王公未嘗屈禮或以為譏答曰耳目宮固當特立鵰鶚鷹鸇豈衆禽之偶故事大夫與御史鈞禮思謙復為右肅政大夫故事大夫與御史鈞禮思謙獨不答或以為疑思謙曰班列固有差奈何尚姑息邪不喜為繩察韓思復遷御史大夫性恬淡不喜為繩察慨然論元載姦崔渙遷御史大夫元載輔政與中官董秀盤結固寵渙疾之因進見慨然論元載姦代宗曰載雖非重謹然協和中外無間然能臣也對曰和之為貴由禮節也不節之以禮焉得和今干戈甫定品物思乂載為宰相宜明制度易海內耳目而怙權植黨毀法為通鬻溫為恕附下苟容乃幽國卑生術臣所未諭帝默然處大體不急細事崔縱為御史大夫處大禮不急細事獄訟付成僚屬而已諫營大像蘇珦進肅政臺御史大夫后營大像白司馬阪縻用億計珦上疏切諫見納天下以其有素望每大夫缺冀朝隱得之李朝隱為御史大夫天下以其取有素望每大夫缺冀朝隱得之及居職不爭引大體惟先細務由是名少衰臺吏側目威名赫然崔隱甫進拜御史大夫初臺無獄凡有囚則繫大理貞觀時李乾祐為大夫始置獄由是中丞侍御史皆得繫人隱甫執故事廢掘諸獄其後患囚往來或漏泄御繫之廚院云臺中自監察御史而下舊皆得顓事無所承咨隱甫始一切令歸稟乃得行有忤意輒劾正多貶絀者臺吏側目威名赫然天下以為稱職崔隱甫帝嘗謂曰卿為大夫天下以為稱職並本傳兄弟同時為御史大夫李峴兄峘從上皇峴翊戴肅宗以同時為御史大夫俱判臺事又合制封公攝御史大夫房琯賀蘭進明自河南至詔攝御史大夫嶺南節度使既入謝帝曰朕語琯除正大夫何為攝邪進明銜之因曰陛下知晉亂乎惟以尚虛名任王衍為宰相纂組浮華不事天下事故至於敗方唐中興當用實才而綰性疏闊大言無當非宰相器本傳制麻自中授李栖筠元載當國恣橫代宗不能堪陰引剛鯁大臣自助欲收綱權以黜載擇可為大夫者拜栖筠為大夫始栖筠見帝敷奏明辨不阿附帝心善之故制麻自中以授朝廷莫知也中外竦貽栖筠素方挻無所屈劾元載厚李栖筠華原尉侯莫陳怤以優補長安尉當參臺栖筠物色其勞怤色動不能對乃自言為徐浩杜濟薛雍所引非真優也始浩罷嶺南節度使以瑰賣數十萬餉載而濟方為京兆雍吏部侍郎三人皆載所厚栖筠並劾之宴曲江獨不往故事賜百官宴曲江教坊倡顐雜侍栖筠以任國風憲獨不往臺遂以為法推為盛門李叔明始叔明與仲通俱尹京兆及兼秩御史中丞並節制劍南又與子升俱兼大夫蜀人推為盛門大夫自貞元後難其人李元素元和初召為御史大夫自貞元後難其人不補而元素以夙望召拜中外企聽風采既而一不建為容容持祿見屬吏輒先拜人人失望諫游畋李絳遷御史大夫穆宗數游畋絳率其屬叩延英切諫不納繩治如平日顏真卿遷御史大夫方朝廷草昧不暇給而真卿繩治如平日侍郎崔漪諫議李何忌皆破劾斥降廣平王總兵二十萬平長安辭日當闕不敵乘趨出陛𣐙乃乘王府都虞候管崇嗣先王而騎真卿劾之帝還奏慰答曰朕子每出諄諄教戒故不敢失崇嗣老而躄卿姑容之百官肅然所居守法度薛蘋加御史大夫所居守法度務在安人治身觳簿所衣緑袍更十年至緋衣乃易傳八十九辱臺李景讓大中中進御史大夫甫視事劾免侍御史孫王汝監察御史盧植威肅當朝為大夫三月蔣仲輔政景讓名素出伸右而宣宗擇相盡書群臣當選者以名於器中禱憲宗神御前射取之而景讓名不出世謂除大夫百日有他官相者謂之辱臺景讓愧艴不能平見宰相自陳考深當代即拜西川節度使丐致仕隱然持重敬栝拜御史大夫隱然持重弗以私害公副相杜牧行制秩崇官不常置大夫秩崇官不常置一品集亞相之秩威重寵崇白居易李昌元制高位韋挻拜御史大夫太宗謂挻曰卿之任大夫獨朕意左右無為卿地者挺曰臣駑下不足以辱高位且非勛非舊而在藩邸故僚上願後臣以勸立功者不聽白中司獨坐耳目之官管轄之任分路晉百官表曰中丞故事與洛陽令相過則分路而行避車漢書典職云中丞過尚書郎避車執板揖車過乃去之專席漢官儀云中丞朝會獨坐與尚書今司隸皆專席時號三獨坐賜車馬馬嚴字威卿為由丞賜冠幘並車馬漢推明習選在薛宣晉擇重威任先庾峻提舉邦憲糾轄周行執憲提綱糾職周禮御史中丞三孔御史中丞二人正四品下百官志龍朔二年改中丞曰司憲大夫同上每宴集人以為榮李漢為中丞表孔溫業為御史及漢晚見召溫業已為中丞每宴集人以為榮昭德火御史不至溫造進中丞昭德寺火延禁中野狐落蓋宮人所居也死者數百人是日宰相兩省官京兆尹中尉樞密皆集日華門督神策兵救火所及獨御史府不至造自劾曰臺繫賊恐人緣以造姦申警備乃得入臣請入三十直自贖宰相劾造不待罪于朝而自許輕比不可聽有詔皆奪一月俸辱天子侍臣溫造道遇左補闕李虞恚不避補從者笞辱左拾遺舒元褒建言故事供奉官惟宰相外無屈避造棄蔑典禮無所畏辱天子侍臣凡事小而關分理者不可失失之則亂生遺補雖卑侍臣也中丞雖高法吏也侍臣見凌則恭不廣法吏自恣則法壞聞元和長慶時中丞可止不半坊今乃至兩坊謂之籠街造擅自尊大有僣擬之嫌請得論罪帝乃詔臺官供奉官共道路行聽先後行相值則揖中丞傳呼不得過三百步威望隱然溫造彈擊無所回畏威望隱然發南曹僞官九十人主吏皆論死紀綱所寄魏謨遷御史中丞發駙馬杜中立姦贓權戚縮氣俄兼戶部侍郎謨奏中丞紀綱所寄不宜雜領錢榖乞專治戶部詔可三劾崔從為中丞薦引御史務取質重廉退者李翛以寵得京兆尹為莊憲山陵橋道使務以減未徭費為功至不治道輴車留渭橋久不得進從三劾之無少貸劾大夫蕭至忠長於擊斷譽望聞當時中宗神龍初為御史中丞始至忠為御史而李承嘉為大夫嘗讓御史曰彈事有不咨大夫可乎衆不敢對至忠獨曰故事臺無長官御史天子耳目也其所奏請當專達若大夫許而後論則劾大夫者又誰白哉承嘉慚至忠劾祝欽明竇希玠與承嘉等罪百僚震悚非大事不出使宋璟後遷左臺御史中丞以數忤旨詔按楊州獄璟奏按州縣才監察御史職爾又詔按幽州都督屈突仲翔辭曰御史中丞非大事不出使仲翔罪止贓今使臣往此必有危臣者李夷簡發揚憑貪夷簡元和時至御史中丞京兆尹楊憑性珦侻始為江南觀察使冒沒于財夷簡為屬刺史不為憑所禮至是發其貪負勢楊謹矜授御史中丞韋堅之獄王桸等文致而謹矜依違不甚力桸恨之雖林甫亦不悅桸父與謹矜外兄弟也故與桸狎及為侍御史繇謹矜所引後遷中丞同列謹矜猶以子姓畜之桸負林甫勢滋不平當時憚其持法呂諲拜御史中丞所陳事無不順納帝復兩京詔盡繫群臣之汙賊者又詔御史大夫李峴及諲領使諲於權宜知大體不及峴而援律傳經過之當時憚其持法本傳多與宰相駁異竇參入為御史中丞舉劾無所回忌德宗數召見語天下事或決大議帝器之然多與宰相駁異為帝御齊映授御史中丞徙幸梁常為帝御會馬駭突帝怒傷映詔捨轡固不去曰馬奔踶不過傷臣捨之或犯清蹕臣雖死不足償責帝嘉歎劾格詔輸獻盧坦遷中丞初諸道長吏罷還者取本道錢為進奉帝因赦令一切禁止而山南節度使柳晟浙西觀察使閻濟美格詔輸獻坦劾奏晟濟美白衣待罪帝諭坦曰二人所獻皆家財朕已許原不可失信坦曰所以布大信者赦令也今二臣違詔陛下奈何以小信失大信乎帝曰朕既受之奈何坦曰出歸有司以明陛下之德帝納之未繩輒肅孔緯擢御史中丞緯方雅疾惡若仇中外聞風未繩輒肅紀綱地官屬須選高元裕進御史中丞即建言紀綱地官屬須選有不稱職者請罷之於是監察御史杜宣猷柳環崔郢侍御史魏中庸高弘簡並奪職故事三司監院官帶御史者號外臺得察風俗舉不法元和中李夷簡因請按察本道州縣後益不職元裕請監院御史隸本臺得專督察詔可權中丞不三月即真舒元輿權知御史中丞會帝録囚元輿奏辨明審不三月即真專附鄭注注所惡感舉繩逐之本傳氣剛易疵李紳牛僧孺輔政以紳為御史中丞顧其氣剛下易疵纍而韓愈徑直乃以愈為京尹兼御史大夫免臺參以激紳紳愈果不相下更持臺府故事論詰往反詆訐紛然繇是皆罷之三世其官清節似之盧奕拜御史中丞自懷謹奐及奕三世其官清節似之時傳其美抨彈之勇正當時病杜牧中丞崔璪制憲臺之長贊皇一品集中丞為大夫之二緣大夫秩崇官不常置中丞常為憲臺之長今九寺少卿及祕書少監國子司業京兆少尹並省寺之二皆為四品惟御史中丞官業雖重品秩未崇望升為大夫之二令不隔品亦與丞郎出入秩用以重其選增中丞品秩狀節高天下升御史中丞李華崔沔集序權寵屏息朝章盛行崔沔為中丞數發太倉減上林禽鳥之給以賑艱食陝東之人仆而復起中官犯法執以按劾權寵屏息朝章盛行同上集序劾進羡錢歸融拜御史中丞湖南觀察使盧周仁取羡錢億萬進京師融劾周仁陳小恐違詔書徇私希恩恐海內效之侍御四孔侍御史六人從六品下掌糾舉百僚及入閣承詔知推彈雜事百官志故事御史臺不受訟有訴可聞者略其姓名託以風聞其後御史嫉惡者少通狀壅絶十四年乃定授事御史一人知其日劾狀題告事人姓名同上其後宰相以御史權重建議彈奏先白中丞大夫復通狀中書門下然得奏自是御史之任輕矣建中元年以侍御史分掌公廨推彈自是雜端之任輕矣同上雜端大事法冠朱衣纁裳白紗中單小事常服久次者一人知雜事謂之雜端同上請復朱衣豸冠溫造授侍御史知彈奏請復朱衣豸冠示外廡不聽夏州節度使李祐拜大金吾違詔進馬造正衙枰劾祐曰吾夜入蔡州擒吳元濟未嘗心動今日膽落於溫御史具法冠對仗王義方顯慶元年擢侍御史不再旬會李義府縱大理囚婦淳于迫其丞畢正義縊死無敢白其姦義方即上言陛下撫萬邦而有之蠻區夷落罪無逃罰況輦轂下姦人肆虐乎殺人滅口此生殺之極不自主出而下移佞臣履霜堅冰彌不可長請下有司雜治正義府死狀具法冠對仗死義府下跪讀所言帝方安義府狡佞恨義方以孤士觸宰相貶蔡州司戶參軍庭中樹義方為御史時買第後數日愛庭中樹復召主人曰此佳樹得無缺償乎又豫之錢其廉不貪類此主聖臣宜柳範貞觀中為侍御史時吳王恪好畋獵範彈治之太宗曰權萬紀不能輔道恪罪當死范進曰房玄齡事陛下猶不能諫止田獵豈宜獨罪萬紀帝怒拂衣起頃之召謂曰何廷折我范謝曰主聖則臣直陛下仁明臣敢不盡愚帝乃解天下聞有功復進灑然相賀徐有功俄起為左肅政臺侍御史辭曰臣聞鹿走山林而命繫庖廚者勢固自然陛下以法官用臣臣守正行法必坐此死矣后固授之天下聞有功復進灑然相賀朝廷肅然狄仁傑授侍御史左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜乏賢如本立者不鮮陛下惜有罪虧成法奈何臣願先斥為群臣戒本立抵罪由是朝廷肅然按大獄据正不撓韋虛心遷侍御史神龍中按大獄僕射竇懷貞侍中劉幽求有所輕重虛心据正不撓景龍中屬羌叛既禽捕有詔悉誅虛心惟論酋長死原治其餘出入天禁李嶠初置右御史臺察州縣風俗得失嶠上疏曰御史出入天禁勵已自修比他吏相百也按劾回庸糾擲隱欺比他吏相十也陛下誠用臣言妙擇能者委之莫不屈力效死矣人吏畏讋呼為皂雕王志愔中宗神龍中為左臺侍御史以剛鷙為治所居人吏畏讋呼為皂雕伸難進抑躁求陽嶠長安中左右御史中丞桓彥範袁恕己爭取為御史楊再思素與嶠善知其意不樂抨彈事為語彥範彥範曰為官擇人豈待情樂乎唯不樂者固與之以伸難進抑躁求也遂為右臺侍御史呈身御史韋澳御史中丞高元裕與其兄溫善欲薦用之諷澳謁已溫歸以告澳不答溫曰元裕端士若輕之邪澳曰然恐無呈身御史本傳處正特立風采動一時崔咸入朝為侍御史處正特立風采動一時敬宗將幸東都裴度在興元憂之自表求覲以章偕來於是李逢吉當國畏度復相使京兆尹劉栖楚等十餘人悉力根卻之雖度門下賓客皆有去就意他日度置酒延客栖楚曲意自解附耳語咸嫉其矯舉酒讓度曰丞相乃許所由官囁嚅耳語願意上罰爵度笑受而飲栖楚不自安趨出左右莫不壯之習知法令盧簡辭入遷侍御史習知法令及臺閣舊事寶曆中黎幹子渭詣臺請復葉縣故田有司莫能知簡辭獨詰曰按幹坐黨魚朝恩誅資田皆沒大曆後數十年比有赦令無原洗之言渭安得冒論不為治清要李素立授七品清要有司擬雍州司戶參國帝曰要而不清復擬校書郎帝曰清而不要乃授侍御史匡拂時病磨切貴近始以御史諫官在長慶寶曆之際匡拂時病磨切貴近杜牧高元裕制南臺持斧杜牧糾輸誠之罔持國屬之罪為御史糾輸誠之罔持國屬之罪文粹李華崔沔集序烘堂國史補御史臺官雖共坐絶言笑雜端先笑則合坐皆笑謂之烘堂癡床御史臺記曰侍御史號雜端最為雄劇臺中聚會則於坐南設橫床號南床又曰癡床登此床者倨敖若癡焉唐賈忠言撰御史本草以侍御為脆梨言漸入佳味臺院御史三院一曰臺院侍御史隸焉百官志郭弘霸遷左臺侍御史魏元忠病僚屬省候弘霸獨後入憂見顏間請視便液即染指嘗驗疾輕重賀曰甘病不瘳今味苦當愈殿中侍御史五孔殿中侍御史九人從七品下掌殿庭供奉之儀京畿諸州兵皆隸焉正班列於閣門之外糾離班語不肅者元日冬至朝會則乘馬具報戴黑豸升殿巡幸則往來門旗之內百官志選吏豈無才用特達者張行成高祖謂吏部侍郎張鋭曰今選史豈無才用特達者朕將用之鋭言行成調富平主簿有能名召補殿中侍御史糾劾嚴正太宗以為能天子四海為家不容以東西為限張行成嘗侍宴帝語山東及關中人意有同異行成曰天子四海為家不容以東而為限是示人以隘矣帝稱善供奉赤墀下上官儀同東西臺三品時以雍州司戶參軍韋絢為殿中侍御史或疑非遷儀曰此野人語爾御史供奉赤墀下接武夔龍簉羽鵷鷺豈雍州判佐比乎時以為清言上書言進奇器乃治國之巨蠹柳澤轉殿中侍御史監嶺南選時市舶使右威衛中郎將周慶立造奇器以進澤上書曰慶立雕製詭物造作奇器用浮巧為珍玩以譎怪為異寶乃治國之巨蠹明王所安嚴罰者也書奏玄宗稱善抨按不避近彊許景先還為左補闕宋皓蘇頲擇殿中侍御史久不補以授景先時議僉愜抨按不避近彊默則負官張鎰纍殿中侍御史乾元初華原令盧樅以公事譙責邑人齊令詵令詵宦人也銜之誣樅罪鎰按驗當免官有司承風以死論鎰不直之乃白其母曰今理樅樅免死而鎰坐貶默則負官貶則太夫人憂敢問所安母曰兒無纍於道吾所安也遂執正其罪籍蕭本財韋博遷殿中侍御史開成中蕭本詐窮得罪詔與中人藉其財中人利寶玉欲竊取去博奪還簿無遺資京尹避路王播為監察御史轉殿中歷侍御幸臣李實為京兆尹恃恩頗橫嘗遇播於途不避故事尹避臺官播移文詆之實怒彈劾任職李雍拜左臺殿中侍御史彈劾任職人頗憚之戴豸正殿之劾御史之舉職者國朝亦有戴豸正殿之劾杜牧行盧潘制嫉邪忿佞除殿中侍御史崔沔二曰殿院殿中侍御史隸焉百官志綴供奉班出入後唐天成中御史臺奏每遇入閣舊例只一員侍御史在龍墀邊祗候彈奏公事或南班失儀點不及今欲依常朝例帶差殿中侍御史二員押鍾鼓位仍各綴供奉班出入從之監察御史六孔監察御史十五人正八品下掌分察百寮巡按州縣獄訟軍戌祭祀宮作太府出納皆蒞焉知朝堂左右廂及百司綱目志大曆十四年兩京以御史一人知館驛號館驛使監察御史分察尚書省六司繇下第一人為始出使亦然同上元和中以新人不出使無以觀能否乃命顓察尚書省號曰六察官同上神情爽拔可使推捕李義琛歷監察御史正觀中文成公主貢金遇道於歧州主名不立太宗召群御史至目義琛曰是人神情爽拔可使推捕義琛往數日獲賊帝喜為加七階列傳自圖先鋒當矢石狀張仁願萬歲通天中監察御史孫承景監清邊軍戰還自圖先鋒當矢石狀武后歎曰御史乃能如是乎擢為右肅政臺中丞昌言當世得失韓思彥授監察御史昌言當世得失高宗夜召加二階待詔洪文館御史耳目官韓琬拜監察御史先天中賦絹非時於是榖賤縑益貴丁別二縑人多徙亡琬曰御史乃耳目官知而不言尚何賴又上言源報則弊已甚移檄罷督乃聞詔可帝從容問外以為如何主魏元忠遷監察御史帝嘗從容問外以朕為如何主對曰周成康漢文景也然則有遺恨乎曰有之王義方一世豪英而死草萊議者陛下不能用賢帝曰我適用之聞其死顧已無及元忠曰劉藏器行副於才陛下所知今七十為尚書郎徒歎彼而又棄此帝默然慚蕭至忠劾蘇味道至忠遷監察御史劾奏鳳閣侍郎蘇味道贓貪劾奏常先風教齊浣景雲初姚崇取為監察御史凡劾奏常先風教號稱職知朝廷之尊李勉擢監察御史時武臣崛興無法度大將管崇嗣背闕坐笑語譁縱勉劾不恭帝歎曰吾有勉乃知朝廷之尊不樂檢局柳渾拜監察御史臺僚以儀矩相繩而渾放曠不樂檢局乃求外職軍中事多所諏訪張建封馬燧擢授監察御史軍中事多所諏訪即表其能于朝楊炎將任以要職盧杞不喜出為嶽州刺史磊落有氣節段平仲擢監察御史磊落有氣節嗜酒敢言是時德宗春秋高躬自聽斷事有所壅膈群臣畏帝苛察無敢言平仲常曰上聰明神武但臣下畏怯自為循默爾我一日得召見宜大有開納兄弟同臺楊牧兄假自浙西判官擢監察御史而收亦自西川遷兄弟同臺當世榮之法天下所共有李素立監察御史民犯法不及死欲殺之素立曰三尺法天下所共有一動搖則人無以措手足方大業經始奈何輦轂下先棄刑書乎帝嘉納時譏其介孔禎歷監察門無賓謁時譏其介劾桉不饒李華遷監察御史宰相楊國忠支婭所在橫滑華出使劾桉不饒州縣肅然方直彊白敕舊制副丞相缺中執憲得出入御史缺則於內外史中考核其實封奏其名以補之今御史中丞僧孺奏張徹宋申錫皆方直彊白可中御史章下丞相府丞相亦曰可朕其從之並可監察御史白居易張徹宋申錫監察御史制送臨賀徐晦揚憑得罪獨晦至藍田慰餞李夷簡擢監察御史御史出使不能動搖山嶽震懾州縣為不任職韋思謙天且旱辨獄而雨郡人呼御史雨顏真卿事見雨門奉使涉海風息陸元方見海門引對禁近張嘉貞引對禁近后詔上簾引拜監察御史推雪冤獄李尚隱擢監察御史睦州刺史馬眧泰性鷙刻人憚其彊常誣繫恫廬令李師旦二百餘家為妖蠱有詔御史覆驗皆稱病不肯往尚隱曰善良方蒙枉不為申明可乎因請行果推雪其冤白仙省祕省祕閣蘭臺撰皇覽王象為祕書監撰皇覽著陽秋晉孫盛字固安為祕書監著三國晉陽秋祕書丞魏志薛夏字聲太祖召之為祕書丞博學有才太祖每呼之不名曰薛君常公事移蘭蘭臺自以優而祕書署耳謂夏不得儀夏報之曰蘭臺為外祕書為內閣一也何不相移之有蘭臺屈無以折自後遂為常內閣見上典籍是司傳孫伯壓司晉之典籍司典傳汝司典之後祕署仙室魏略蘭臺祕書署也華嶠後漢書曰學者稱東觀為老氏藏室道家蓬萊山王融曲水詩序曰紀言事於仙室謂藏室也典圖書掌祕奧東觀漢記曰桓帝延熹二年初置祕書監曰國史之興將明得失之跡謂之實録使一代之典煥然可觀散騎常侍嵩文質彬彬思義通博歷位先朝蒞事以穆宜掌祕奧宣明史籍考同異校古今祕書監七孔祕書監一人掌經籍圖書之事領著作局少監為之二百官志刊是圖簡韋繩天寶初入為祕書少監玄宗尚文視其職如尚書丞郎繩刊是圖簡以善職稱列傳祕書外監賀知章遷賓客授祕書監而左補闕薛令之兼侍讀時東宮官積年不遷令之書壁望禮之薄帝見復題聽自安者令之即棄官徒步歸鄉里知章晚節尤誕放遨嬉里巷自號四明狂客及祕書外監專刊正事顏師古拜祕書少監專刊正事古篇奇字世所惑者討折申執必暢木源商略古今虞世南已衰老屢乞骸骨不聽遷太子右庶子固辭改祕書監世南論議持正太宗嘗曰朕與世南商略古今有一言失未嘗不悵恨其懇誠乃如此一日並命趙宗儒拜翰林學士時父驊遷祕書少監德宗欲寵其門使一日並命司讎校登館殿權德輿祕書郎壁記榮陽鄭君諸父諸兄或解巾以司讎校或決科而登館殿含章筮仕多至於斯猶桓公武公之代為卿士蓋善於其職而宜之義也御府祕書外府也韓愈送鄭校理序白地居華省職在修文著書東觀漢班固著作為東觀西觀文士傳束皙除著作西觀造晉書創三帝紀十志五世應奉讓著作表云自司隸校尉至臣父凡五世著作不絶也四部晉李充字弘度為著作于時典籍混辭分四部祕省史才漢用史才任先班固晉推經術選在李充並為著作郎漢推良史選在孟堅晉重名儒任先弘度官在藝香職惟筆削述作傅玄歎賦夏湛壞書張載字孟陽作濛汜賦太僕傳玄見其賦歎息以車迎載言談盡日載遂知名起家徵為著作郎陳壽好學善述著除著作佐郎當時夏侯湛等欲作魏書見壽所作乃壞己書著作八孔著作局郎二人從五品相著作佐郎二人從六品上掌撰碑志祝文祭文與佐郎分判局事百官志面折僚友劉禕之父子翼字小心在隋為著作郎峭直有行嘗面折僚友短退無餘訾李伯藥曰子翼詈人人多不憾仕宦不為著作無以成門戶許敬宗除著作郎喜謂所親曰仕宦不為著作無以成門戶自稱不堪奔奉陽城以著作佐郎召並賜緋魚李泌使參軍事韓傑奉詔至其家城封還詔自稱多病老憊不堪奔奉惟哀辭泌不敢彊撰百家類例孔至曆著作郎明氏族學與韋述蕭穎士柳沖齊名撰百家類例以張說等為近世新族剷去之說子垍方有寵怒曰天下族姓何豫若事而妄紛紛邪垍弟素善至以實告初書成示韋述謂可傳及聞垍語懼欲更增損述曰大丈夫奮筆成一家書奈何因人動搖有死不可改遂罷東觀著述杜牧蕭孜制論撰之地唯才史是居禹錫謝男授著作表換韋溫入為監察御史以臺制苛嚴不可以省養換著作郎既謝輒解歸侍親疾裒次經史蕭德言歷著作郎太宗欲知前也得失詔魏徵虞世南褚亮及德言裒次經史百氏帝王所以興衰者上之帝愛其文博而要曰使我稽古臨事不惑者公等力也賚賜尤渥從伐高麗敬播再遷著作佐郎兼修國史從太宗伐高麗而帝名所戰山為駐蹕播謂人曰鑾輿不復東矣已而果然采魯哀公後十二世接戰國為魯後春秋劉元濟纍著作佐郎采魯哀公後十二世接戰國為魯後春秋獻之白地惟蘭省職在藝閣仙省祕閣藝署典校讎校校文官聯祕閣職在校文官惟司典職在校文耽美書刪書文蜀志曰卻正字令先安貧好學弱冠屬文遷祕書郎性淡於榮利尤耽意文章及當代美書王隱晉書曰鄭默字思元為祕書郎刪省舊文除其浮穢著魏中經中書令虞松謂然曰而今而後朱紫別矣賦三都著中經晉書左思三都賦絶人流之事自以所見不博求為祕書郎作中經見上掌三閣定四部晉令曰祕書郎掌中外三閣經書覆校闕遺正定脫誤晉太原起居注曰祕書丞桓石在綏啓校定四部書詔遣郎中四人各掌一部別朱紫淡榮利並見上注沈約奏彈祕書郎蕭遙昌曰謹按長兼祕書郎臣蕭遙昌盛戚茂年升華祕館淑慎之跡未彰違墮之容已及宜寡徵納以肅朝風請以見事免遙昌所居官也校書郎九孔校書郎十人正九品上掌讎校典籍刊正文章百官志始調張九齡擢進士始調校書郎以道侔伊呂科策高第為左拾遺欽其賢徐岱世農家子於學無所不通辨論明鋭座人常屈大曆中劉晏表為校書郎觀察使李栖筠欽其賢署所居為復禮鄉名達于朝推蔭為校書郎段成式推蔭為校書郎博學彊記多奇篇祕籍校郎唐文粹李庾西都賦白惟月月卿書云卿十惟月象河三公象五嶽九卿法河海九棘九卿皆樹棘為位見周禮三圭莊子楚昭王延屠羊說以三圭之位司馬彪曰諸侯三卿皆執三圭四至漢汲黯姊子司馬安巧宦四至九卿再見史記虞卿躡蹻檐簦一說趙孝成王賜金百鎰再見上卿列卿列寺亞卿少卿卿才卿佐傳君之卿佐是謂股肱惟月之位代天之工九列六卿六命周禮王之卿六命白司禮奉常古為奉常寺漢曰奉常赤車太常行陵赤車千乘典三禮掌大樂居九寺之先冠九列之首奏妻後漢周澤字雉都為太常清齊遇疾妻憐其老病窺內問之澤大怒以為干齊送詣獄吏爭之不聽語曰居世不諧為太常妻一日不齊醉如泥拜子後漢桓榮從少傅遷太常明帝即位尊以師禮拜子為郎乘輿至太常設几杖會百官天子親拜自執策漢臣齊戒推於周澤晉失禮樂任在蔡謨況當明聖之朝宜尊禮樂之任當文思之代居禮樂之司代天之工惟月之位坐罪漢武時廣陵侯越人為太常坐廟酒酸論罰劉太常後漢劉愷為太常議論常有正大義諸儒語曰難經伉伉劉太常太常卿十一孔太常寺卿一人正三品少卿二人正四品上掌禮樂郊廟社稷之事百官志龍朔二年改太常寺曰奉常寺九寺卿皆曰正卿少卿曰大夫武后光宅元年復改太常寺曰司理寺同上立國之本禮樂為先今之太常兼掌其事二茲職者不亦重乎歷代迄今謂之清選白居易陳中師除太常卿制請以詔書市馬姜晦轉太常少卿時國馬乏請以詔書市馬六胡州率得馬三十署游擊詔可間廄乃稍備諷鍾紹宗讓中令薛稷遷太常少卿會鍾紹京為中書令稷諷使讓因入言於帝曰紹京本胥史無素才望今特以勳進師長百僚恐非朝廷具瞻之美帝然之遂許讓以祠禱見寵王璵專以祠解中帝意有所禳祓大抵類巫覡肅宗立遷太常卿又以祠禱見寵請加宗廟籩豆韋縚開元時歷光祿卿遷太常唐興禮文雖具然制度時多繆缺不倫至顯慶中許敬宗建言籩豆已多為貴縚建言請宗廟籩豆皆加十二以懦不職罷趙宗儒守太常卿太常有五方師子樂非大朝會不作帝嗜聲色宦官領教坊者乃移書取之宗儒不敢違以訴宰相以事專有司不應關白以懦不職罷為太子少保部諸工立縣間馮定再遷太常少卿文宗嘗詔開元霓裳羽衣舞參以雲韶隸于庭定部諸工立縣間端凝若植帝異之問學士李玨玨以定對帝嘉曰豈非能古章句者邪親誦定送客西江詩召計殿賜禁中瑞錦詔悉所著以上遷諫議始視事庭設九部樂封敖為太常卿始視事庭設九部樂敖宴私第為御史所劾徙國子祭酒去帽親導母輿崔邠為太常卿故事太常始視事大閲四部樂都人縱觀邠自第去帽親導毋輿公卿見者皆避道都人榮之博士有疑議往咨必據經條答鄭肅擢太常少卿博士有疑議往咨必據經條答遷太常卿天下愈推為巨人長德韓文權公碑定郊廟樂曲韋萬石纍遷太常少卿當時郊廟宴會樂曲皆萬石與姚元辨增損之贊道法儀踰於四百元稹授趙宗儒太常卿制朕見天地朝祖宗哀勵祗嚴不克是懼惟爾肇自清廟逮豫還宮贊道法儀踰於四百俯伏趍數訖無尤違選樂童舊史王涯為太常卿選樂童事見樂門振起廢禮元載忌楊綰奏為國子祭酒清議益歸於綰上深知之未即罷仍遷綰為太常卿充禮儀使以郊廟禮久廢藉綰振起之舊史太常博士十二孔博士四人從七品上掌辨五禮按王公三品以上功過善惡為之諡大禮則贊卿導引百官志持議儒而不俚呂才纍太常博士帝病陰陽家所傳書多繆僞淺惡世益拘畏命才與宿學老師刪落煩訛掇可用者為五十三篇合舊書四十七凡百篇詔頒天下才於持議儒而不俚以經誼推處其驗術諸家共訶短之又舉世相惑以禍福終莫悟云才之言不甚文要欲救俗失切時事俾易曉也諸儒壯其節蔣欽緒纍遷太常博士中宗始親郊國子祭酒欽明建言皇后應亞獻欲以媚韋氏帝疑之詔禮官議衆曲意阿徇欽褚獨抗言不可諸儒社其節才稱其官裴守真授太常博士善容典時謂才稱其官享廟奏樂裴寬改太常博士禮部建言忌日享廟應用樂寬自以情立議曰廟尊忌卑則作樂廟卑忌尊則備而不奏中書令張說善之請如寬議裴守真射牲高宗封嵩山事見犧牲門據禮以對柳冕德宗既親郊重謹祠事動稽典禮冕以禮部郎中攝博士與張薦及司封郎中徐岱蒼部郎中陸質修飭儀矩帝疑郊廟每升輒去劍履及象劍尺寸祝語輕重冕據禮以對本未詳明追補容典商盈孫擢太常博士帝將還宮而七廟焚殘告享無所盈孫白宰相始乘輿西有司盡載神主以行至鄠縣悉為盜奪今天子還宮宜前具其禮時喪亂後制度雕紊追捕容典皆盈孫折衷焉藏天子旗常楊收以詳禮學皆太常博士因建言漢制總百官而聽曰省分務而專治曰寺太常分務專治者也所以藏天子旗常今旗因車飾隸太僕非是自建言七廟尹知章遷太常博士中宗時或建言以涼武昭王為七廟始祖知章議武昭遠世非王業所因乃止廟必有配陳貞節遷太常博士玄宗奉昭成祔睿宗室又欲肅明皇后並升焉正節奏言廟必有配一帝一后禮之正也昭成皇后有太姒之德升配睿宗肅明皇后既非子貴宜在別廟周人奏夷則歌小呂以享先妣姜嫄也以生后稷故特立廟曰閟宮晉簡文帝鄭宣皇后不配食築宮于外以歲時致享肅明請准同姜嫄晉宣后納主別廟時享如儀於是留主儀坤廟詔隸太廟毋置官請以中宗為別廟貞節又與博士蘇獻上言睿宗於孝和弟也按賀循說兄弟不相為後商盤庚不序陽甲而上繼先君漢光武不嗣孝成而上承元帝晉懷帝繼世祖不繼惠帝故陽甲孝成出為別廟又言兄弟共世昭穆位同則毀二廟有天下者從禰而上事七廟尊者所統廣故及遠祖若容兄弟則上毀祖考天子不得全事七世矣請以中宗為別廟大祫則合食太祖奉睿宗繼高宗則祼獻永序詔可榜逐禮史陸亙再遷太常博士禮史孟真練容典博士降色訪建史倚以倨橫府將冊皇太子草儀真參議偃蹇亙榜逐之胥曹失色元和新禮王彥威奄識古今典禮未得調求為太常散吏卿知其經生補檢討官彥威不獲隋以求下訖唐凡禮沿革皆條次彙分號元和新禮上之有詔拜博士問不虛酬崔黽從太和初遷太常博士最明禮家沿革問不虛酬定敬宗廟室祝辭皇帝不可稱孝弟九宮皆列星不容為大祠大臣薨不於訃日輟朝乃在數日外因引貞觀時任瑰卒有司對仗奏太宗責其不知禮岑文本歿是夕罷警嚴張公謹亡哭不避辰日故憫悼之切不可過時詔皆可其議九宮遂為中祠折中輕重詳校疑似使祝宗卜史之徒不敢以習近類爾斯則可矣杜牧蕭峴除太常博士制白邵春德行鄉里諺曰鄉里恂恂邵伯春孫湛清廉孫湛字伯雅為光祿以清廉見稱首九列總三署庾冰集申樂謨詔曰光祿九卿列首且職典史署續漢書曰杜林字伯山為光祿勳內則宿衛外總三署周密敬慎選舉稱平經宮室掌掖門楊雄光祿針曰經乃宮室書為中外廊殿門闈限以禁衛漢書秦曰郎中令掌宮殿掖門丞武帝太初元年更名光祿勳也後代因之五代史百官云至梁加卿字曰光祿卿除勳字光祿卿十三孔光祿寺卿一人從三品少卿二人從四品上掌酒醴膳羞之政總太官珍羞良醞掌醢四署百官志龍朔二年改光祿寺曰司宰寺武后光宅元年曰司膳寺同上衛尉卿十四白官尊九寺職重八屯西京賦衛尉八屯警夜巡晝馬光以忠慎見親光字仲仙趙嘉以周密獲寵嘉字伯陽嚴衛列卿入清近之地居警巡之司衛屯漢書衛尉秦官宮門衛屯也兼官後漢鮑昱兼衛尉司徒丁寬兼云云辭官魏田豫為并州徵為衛尉屢乞遜位曰年七十而居位譬如鍾鳴漏盡而夜行不休罪人也祿賜親戚身勞無惜吳志孫權為吳王及稱尊號嚴峻常為衛尉祿賜散之親戚知故家常不充續吳書曰陰興為衛尉每選將征伐身勞無所愛惜也秦官也掌門衛屯兵之職尉者罻也古者兵獄之官皆以尉言所以罻羅奸非也漢因之景帝更名中大夫尋復為衛尉卿自王莽及後漢初並省之至獻帝復署魏晉宋齊因之五代史百官志云梁加卿字曰衛尉卿後代並因之唐武德初省之貞觀中復置龍朔二年改為司衛寺咸亨初復舊光宅又為司衛卿神龍初復舊孔衛尉寺卿一人少卿二人掌器械文物總武庫武器守宮三署兵器入者皆籍其名數百官志龍朔二年改曰司衛寺武后光宅二年又改同上善兵馮智戴授衛尉少卿帝聞其善兵指雲問曰下有賊今可擊乎對曰雲狀如樹方辰在金金利木柔擊之勝帝奇其對纍遷左武衛將軍募兵綏銀論惟貞肅宗在靈武以衛尉少卿募兵綏銀閲旬衆數萬本傳願試一縣自效裴行立遷衛尉少卿口陳願治民試一縣自效除河東令寬猛時當白恭惟天族掌以月卿本枝宗子庶子之官禮庶子之正於公族者教之以孝悌睦友慈愛明父子義長幼之序古者庶子之官治而邦國有倫邦國有倫而衆向方矣卿寺宗臣宗枝子政之忠劉向字子政以至忠為宗室也路叔之慎劉德字路叔修黃老術召見甘泉官武帝謂之千里駒拜宗正妻死大將軍光欲以女妻之不敢娶當敦睦之代居糾綏之司豈無他人不如同姓後魏注曰宗正卿多取同宗崇象河之秩糾盤石之宗職是維城詩曰宗子維城宗正周官也宋百官春秋云周受命封建宗盟周封兄弟之國十五同姓之國三十有五始選其宗中之長而董正之謂宗正成王時彤伯入為宗正掌王親屬秦漢因之漢平帝更名宗伯王莽改為秩宗東漢復為宗正晉曰大宗正魏漢皆同姓為之晉以後雜用庶姓五代史百官志云梁加卿字除大字曰宗正卿北齊又加大字隋又除之唐初因之龍朔二年改為司宗卿咸亨初復舊光宅初改為司屬卿神龍初復舊宗正卿十五孔宗正寺卿一人少卿二人掌天子族親屬籍以別昭穆領陵臺崇玄二署百官志武德二年置宗師一人後省龍朔二年改宗正寺曰司宗寺武后光宅元年曰司屬寺同上昏繆失對竇誕為宗正卿太宗與語昏繆失對乃下詔曰誕比衰耗不能事朕知而任之是謂不明且為官擇人者治為人擇官者亂其以光祿大夫罷整訓屬族杜牧李文舉制取自遠藩擢為宗正大則提舉群吏灑掃守奉次則整訓屬族次第昭穆第其賢能以次序昭穆元稹李從易宗正丞敕昔劉氏子孫在屬藉者十餘萬我唐光有天下二百餘年伯仲叔季幼子童孫可勝道哉第其賢能以次序昭穆皆吾宗寺之職也長幼秩序盡委之於大宗正元稹李拭授宗正卿等制明皇而下其屬未遠諸王在閣朕得其寒溫睿宗而上五十餘族長幼秩序盡委之於大宗正苟非能賢不敢輕授白司僕一名司僕卿僕正書穆王命伯冏為周太僕正奉車夏侯嬰為沛公太僕以奉車數馬漢石慶為太僕從御出上問車中幾馬慶以策數而後對周用忠良任先伯冏穆王命伯冏曰小大之臣咸懷忠良其侍御僕從罔匪正人漢推廉正選在萬年漢陳萬年為太僕廉正善事人守清近之臣居僕御之任吾之禦侮後漢蔡刪次孫膂力過人入為太僕從至魯明帝入孔子廟至子路室曰此太僕之室也太僕吾之禦侮廄馬充晉郭展為太僕心精於養畜是以馬充盛其後伐吳得以濟事太僕卿十六孔太僕寺卿一人少卿二人掌廄牧輦輿之政總乘黃典廄典牧車府四署及諸監牧行幸供五路屬車百官志永徽中太僕寺曰司馭寺武后光宅元年改曰司僕寺同上還鄉賜錦袍舊史張暐為殿中監太僕卿天寶初嘗還鄉上冢帝賜及錦袍贈綵乘馹就道
