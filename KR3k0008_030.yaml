body:
  text: 卷第三十言語一白言語有章發言為詩言之無文行之不遠言以足志不言誰知其志足成好言自口言必有中非禮勿言哿矣能言巧言如流俾躬處休不厭公叔文子時然後言人不厭其言言中倫柳下惠思忠君子有九思言思忠無瑕善言無瑕謫千里應之君子居其室出其言善則千里之外應之宰我子貢言語科作乂洪範二曰言言曰從從作乂立言太上立德其次立言立言請身沒立言於世身文介子推曰言身之文有徵叔向曰君子之言信而有徵故遠怨於其身子産有辭叔向曰辭之不可已也如是夫子産有辭諸侯賴之若之何釋辭晏子一言君子仁人之言其利博哉晏子一言而齊侯省刑也輯矣輯睦也詩曰辭之輯矣一言而善傳曰叔向適鄭鬷蔑惡立於堂下一言而善叔向聞之曰必鬷明也執其手以上曰子若不言幾失子矣大辨若訥丐言如流文子之賢則聞訥訥而仲尼之聖且貴便便文以君之辭禮如民言出乎身加乎民口實以治為口實惟口起羞出好興戎有章出言有章大言小言事君大言入則望大利小言入則望小利穆穆皇皇言語之美君子約言小人先言不以言舉人不以人廢言君子也法語之言能無從乎請事斯語辭達而已矣在耳之言吐嘉言如木屑王澄與人書曰胡母輔之字彥國吐嘉言如木屑霏霏不絶誠為後進領袖也清言理服言談林藪樂廣常與裴頠清言欲以理服之而頠為言談之林藪鄙小子之狂簡切先生之餘論我求懿德爾有嘉謀當喻以正義豈移於浮辭雖嘉言可聽而國章難廢懷璧興詠鑠金垂範庶遵季布之諾宜附周任之言其容不改斯言有章一言興邦片言折獄戒在三緘應其千里踐言納言訥於言敏於行同心之言其臭如蘭貌言華也至言實也苦言藥也甘言疾也言忠信孟子之知言詖辭知其所蔽淫辭知其所陷邪辭知其所離遁辭知其所窮慎言古者言之不出恥躬之不逮君子欲訥於言三復南容三復白圭得無訒乎子曰仁者其言也訒曰為之難言之得無訒乎駟不及舌子貢曰耳屬于垣君子無易由言過行君子恥其言而過其行天何言哉子曰豫欲無言一言君子一言以為知一言以為不知言不可不慎也訥訥如悅反小貌也趙文子其言訥訥然不出諸口安定辭審言語也桃李無言下自成蹊鸚鵡能言不離飛鳥猩猩能言不離禽獸口容止不妄動易出難悔言易以溺人不可不慎也鉗口結舌大辨若訥言行君子之樞機樞機之發榮辱之主含鋒吉人之辭寡若含劍刃不敢動也慎辭叔向曰晉為伯鄭入陳非文辭不為功慎辭也懲如簧之言緘若訥之辨苟不戒於三緘則必違於千里在朝廷之內雖貴便便於鄉黨之中則宜訥訥出口文子如不出口似不能言言顧行行顧言既三思而後行亦一言而為智亂階亂之所由生也則言語以為亂慎乃出話賜不幸言而中孔子云是使賜多言也周廟三緘金人管子曰吾畏事不敢事畏言不為言故如老吃行年六十如老吃耳利口以言取人失之宰我口給子曰禦人以口給屢憎於人焉用佞語巧言如簧顏之厚矣避辨士之舌端惡夫佞者子曰是故惡夫佞者有言者不必有德惡利口之覆邦家者不辭費有言無實也禮恥之有其言無其行君子恥之溺口子曰君子溺於口注云言如溺水不能自治口費而煩言數煩也舌在張儀舌在足矣多言數窮不如守中喋喋利口婦有長舌惟厲之喈詩美言不信信言不美老子躁人之辭多唇舌樓君卿之脣舌亂政書曰君罔以辨言亂舊政亂官書無以利口亂厥官利口惟賢書截截書曰截截善諞言俾君子易辭諞音辨屢中子貢曰億則屢中不思若訥徒務如流巧言亂德言訒辭煩給奪慈仁子曰給奪慈仁奪亂也言給辨亂慈仁之德辭有枝葉天下無道則辭有枝葉注虛華之言口惠禮口惠而實不至怨災及其身奪仁尚口易曰尚口乃窮騰口説也裨灶多言豈不或中搖脣鼓舌莊子緩頰漢王謂酈食其曰緩煩説魏王豹謂徐言引喻嗇夫利口捷給張釋之言虎圈嗇夫口諧東方朔響應無窮虎囝嗇夫代尉對文帝失言智者不失言起羞惟口起羞書口不道忠信之言為嚚富臣曰傳口過言滿天下無口過莠言自口哀哉不能言匪舌是出雅躬是瘁效夷言衛侯效夷言子之曰君其死於夷乎説其言從之固矣失口君子不失口於人千里違之易曰君子居其室出其言不善則千里之外違之榮辱之主易曰樞機之發云云無徵叔向言曰小人之言僣而無徵故怨咎及之言徐單于會韓子千歲視下而言徐叔向曰單子其死乎唯口起羞俾躬自瘁屢中之能雖聞子貢數窮之戒終見老聃多言數窮失辭獲戾失言不可與言而與之言失言其言糞土也謂衛生之虐上漏其言下失其臣智伯失灌水之言魏武有齰舌之戒辨舌端君子避辨士之舌端口給給也卻秦軍魯仲連談笑而解圍下齊國酈食其掉三寸之舌下齊國七十餘城説楚聲子絶秦呂相雖子貢之言億則屢中而老聃之戒多言數窮折天口舌在張儀宰貢之言蘇張之説碧雞之詞莊子白馬之論公孫龍辨文選離堅合異辨也劇談膠言辨而不依禮義曰膠言折角五鹿嶽嶽朱雲折其角杜口齊有辨士田巴於狙丘稷下置館毀三皇而訾五帝一日伏千人有魯連子謂巴曰先生之言似梟者惡人也巴乃終身杜口不復敢言服人之口莊子曰服人之口不能服人之心乎害義家語曰小辨害義小言破道蘇秦陳六雄之利害以拒秦六國合從也子貢變五國之興衰以存魯存魯亂齊破吳強晉霸越十年之中五國之變子貢之辨彈射否臧商榷得失辨哉家語子貢曰賜願齊楚合戰賜著縞衣白冠陳説其間利害使二國釋患唯賜能之子曰辨哉矯尾厲角鬼谷先生曰蘇秦張儀一體也然其矯尾厲角含吐縱橫張儀不如蘇秦是能分人主之地也送金蘇秦抵掌而談李兌送黃金百鎰賜璧虞卿躡蹻而説趙王賜白璧一雙解連環之璧文子喋喋利口截截諞言言惟可矣利亦博哉未可釋辭所宜從志辭有枝葉禮美言可以市堅白趙人公孫龍為堅白之談玄黃所以為白堅所以為利一拜一起未足為勞蜀伊籍使吳入拜孫權權曰勞事無道籍應聲曰一拜一起未足為勞宏辨陸賈有辨口抵掌河注泉涌懸河之辨宰豫子貢蘇秦張儀范睢蔡澤莊周公孫龍惠施桓袁十人皆辨士也騁黃馬之劇談縱碧雞之友辨遊説縱橫之術合縱連衡蘇張破橫散從使馳説之士無所開其口虞卿説趙史虞卿遊説士也躡屨擔簦説趙孝成王一見賜金百鎰白璧一雙再見命為上卿簦長柄笠緩頰見上注掉舌蒯通曰酈食其伏軾掉三寸舌下齊七十餘城立談以口舌得官婁敬開説語塞語不行辨説得其黨行不苟合義在取容黥布受戮無收朱建之謀韓言伏誅不取蒯通之説否臧於人利害於已樞機之理榮辱在茲巡其邦國建以功名長短術王父偃學長短縱橫之術説煒燁而譎誑文選甘言誘我甘辭子以甘辭説子路盜跖責仲尼誹謗謗議庶人謗弭謗國語曰厲王暴虐國人謗王王使衛巫監謗以告而殺之國人莫敢言於道路以目王曰吾能弭謗口語致罪漢書謗讟傳曰君無謗讟宮室崇侈謗讟並作傳腹心非謗理君父謗鍾繇為廷尉聽君父已沒臣子得為理謗下獄毛玠孝先人有云見黥面妻沒入宮者玠曰天不雨為此也太祖聞怒收玠下獄廷尉鍾繇詰曰自古有孥戮黥墨下獄遂黜免受誅孔融以對孫權使有誹謗之言坐此棄市彼有人焉謀於長者人胥效矣我無是乎去自安之術效滅族之計聲聞于外言不由中利口覆邦巧言亂德九歌導屈原之情五噫寫梁鴻之恨彼譖人者能無悔乎惟君子乃能非聖人之教殺其管叔見賦於鴟梟閔於周公用明於狼跋玉石失真卞和泣矣駑驥齊駕伯樂哀之居下訕上君子惡之誹謗之木孔未嘗語禁省事楊師道正觀十年拜侍中性周謹未嘗語禁省事嘗曰吾讀孔光傳想其遺風口伐可汗鄭元璹尚文藝突厥攻太原元璹持節往勞虜以不信咎中國元璹隨語折責無所屈因謂頡利曰今掠財資劫人口皆入所部豈若僕旗接好則金玉重幣一歸可汗口伐可汗如約朕何惜金石賜公哉好醜必言李蕃同平章忠謹好醜必言帝以為無隱漏禁中語劉晏為京兆尹司農卿嚴莊誣劾晏漏禁中語敏于辨論李訓質狀魁梧敏于辨論多大言又持詭辨激昂可聽數言時政得失張公謹數言時政得失太宗多所采納李績一言高宗欲立武昭儀為后畏大臣異議密訪績績曰此陛下家事無須問外人帝意遂定贊曰武氏奮而唐之宗屬幾殲嗚呼不幾一言而喪邦乎語泄溫造帝將用為諫官以語泄乃止警悟而辨溫彥博敏於占對高士廉每論政事得失必陳古為諭竇威千里外猶對面語房玄齡高祖曰每為吾兒陳事千里外猶對面語言天下事若素宦于朝馬周贊曰周之遇太宗顧不異哉由一芥草茅言天下事若素宦于朝會朝離立偶語王無競改殿中御史會朝宰相宗楚客楊再思離立偶語附耳語蕭復中官馬欽緒揖宰相列從一附耳語既而從一密諗復曰有詔與公議向所奏不欲李勉盧翰聞知復曰堯舜有僉曰之言朝廷大事尚當謀及公卿如勉等非其人當罷去一言賢於十萬衆馮盎或告盎叛太宗詔蘭謨發江淮甲卒將討之魏證諫曰王者兵不宜為蠻夷動勝之不武不勝為辱盎反未狀當懷之以德盎懼必自來帝乃遣散騎常侍韋叔諧喻盎盎遣智戴入侍帝曰證一言賢於十萬衆徐彥伯樞機論以謂言者德之柄行之主志之端身之文也君子之樞機動則物應得失之見也可以濟身亦以覆身否泰榮辱一繫之能審思而應精慮而動擇其交以後談則悔吝何由而至怨惡何由而生如此乃可以言也以為世戒云俗吏語狄仁傑為兒時門人有被害者吏就詰誦書不置吏讓之答曰黃卷中方與聖賢對何暇偶俗吏語邪劾奏語指斥周允元同平章武后宴宰相詔陳書傳善言允元曰恥其君不如堯舜武三思劾奏語指斥后曰聞其言足以誡安得為過議論必傅經義郝處俊臨事敢言自秉政在帝前議論諄諄必傅經義議論高簡為時推向陸象先議論持正有守立口辨令狐峘善敷奏機辨明鋭馬周言如持水內石李綱乞骸骨帝罵曰卿為潘仁長史而羞朕尚書綱頓首曰潘仁賊也志殘殺然每諫輒止焉為其長史故無愧陛下功成厚自伐臣言如持水內石敢久為尚書乎語謬劉洎曰頃上書有不稱旨或面窮語無不羞汙恐非所以進言者路帝曰卿言善朕能改之及征遼東詔輔皇太子監國帝曰以卿輔太子社稷安危在焉宜識朕意洎曰願無憂即大臣有罪臣請按法誅之帝怪其語謬戒之曰君不密則失臣臣不密則失身卿性疏而果恐以此敗齊洎贊曰洎之忠不能自申於上況其下哉古人以言為戒可不謹歟夢進讜言若平生虞世南死帝夢論議持正世南欲有所言目禁輒止關播盧杞雅知播韋柔可制因從容言播材任宰相其儒厚可鎮浮動乃拜同平章事政一決於杞嘗論事帝前播意不可避坐欲有所言杞目禁輒止退讓播曰以君寡言故至此奈何開口爭事邪播即喑畏毋敢與爭循謹無所駮異董晉同平章方竇參得君裁可大事不關咨晉晉循謹無所駮異參欲以其弟申為吏部侍郎諷晉以聞帝怒曰無乃參迫卿為之邪晉謝具道所以然帝問參過失晉無敢隱由是參罷宰相晉皇恐上疏固辭位陸贄曰人之難知堯舜所病胡可以一酬一詰而謂盡其能哉談辨華給崔堯自負其辨黎幹自負其辨沾沾喜議論單議悟主楊炎同平章言租賦庸調法自是人不土斷而地著賦不加斂而增入版籍不造而得其虛實吏不誡而姦無所取輕重之權始歸朝廷矣炎興嶺表而以單議悟主詳辨李固言吃接賓客頗謇緩然每議論人主前乃更詳辨陽瘖王徽為戶部黃巢入關為賊所執迫還將汙以官徽陽瘖不答以刃環脅卒不動應對如響宇文融神明警敏應對如響不為偽辭悅人韋貫之名純沈厚寡言與人交終歲無款曲不為偽辭以悅人辨給粉澤其非盧從史擢昭義節度既得志寖恣不道至奪部將妻而能辨給粉澤其非孔戡等屢以直語爭剌初唯唯後益不從以口語軒輊事機楊虞卿性佞柔就黨中為最能唱和者以口語軒輊事機故時號黨魁誕譎敢言張宿憲宗為廣陵王時因張茂宗薦尉得出入邸中誕譎敢言坐漏禁中語張宿數召對不能謹密坐漏禁中語貶柳丞遊公卿間熊望悅險躁以辨説遊公卿間談辨可喜楊虞卿父寧談辨可喜古興亡事劉蕡明春秋能言古興亡事以口舌緣飾王世充涉書傳善占對習法敢舞文上下人或辨駮世充以口舌緣飾衆知其非亦不能屈也口陳移用費數千名崔仁師遷度支郎中嘗口陳移用費數千名太宗怪之詔黃門侍郎杜正倫持簿使仁師對唱無一謬帝奇之時事無不言白居易工文章彼遇憲宗時事無不言湔剔抉摩多見聽可居若不能言桓彥範志忠孝居若不能言及議論帝前雖被詰讓而安辭定爭辨爭愈切危言切議宋璟張嘉貞後為相閲堂按見其危言切議未嘗不人聲嘆息議論有體張鎬惟簡重清談終晷不及榮利楊綰性儉約清談終晷而不及榮利欲干以私聞其言必內愧止動人以言所感已淺言又不切人誰肯懷陸贄言欲紓多難收群心惟在赦令而已動人以言所感已淺言又不切人誰肯懷善談確劉伯芻有風度善談確而動與時適論者少之移人王叔文能以口辨移人口無二言衛大經與語見其沖遠盧弘宣元和中鄭權帥襄陽辟署幕府李訴代權二人交憾弘宣始謁訴敕左右謹衛既與語見沖遠不覺洗然能劇談宋子奢為人樂易能馴談以經誼緣飾重謹苗神客性重謹未嘗語禁中事人及其醉問之亦熟視不答論事者以單言進劉祥道疏曰永徽以來論事者或以單言進族立黨語元結今有仁恤之令憂勤之誥人皆族立黨語指而議之善談名理鄧王元裕好學善談名理談詭和逢堯談詭當大事敢邀福言直不敢專權李峴韓擇木曰峴言直不敢專權片言悟主取宰相房琯贊曰琯以忠誼自片言悟主而取宰相占奏敏給元載為度支郎道路目語不敢復議李少良上書詆其醜狀載怒殺少良道路目語不敢復議稱道皆詩書史孝章性修謹漏言宋申錫文宗時同平章事除王璠京兆尹密論帝旨璠漏言而守澄黨鄭注得其謀不詳之言李晟詔罷兵通王府長史丁瓊者嘗為張延賞擠抑內怨望乃見晟曰以公功乃奪兵柄夫惟位高者難全盍蚤圖之晟曰君安得不詳之言執以聞九弊陸贄九弊騁辨給衒聰明上之弊也人人助為談説吳士矩文學蚤就喜與豪英遊故人人助為談説誕譎敢言鄭雲逵進見不敢出一言及天下事崔損性齪齪延英進見不敢出一言及天下事樂瘖默柳宗元貶永州雅善蕭俯詒書言情曰讀易困卦至有言不信尚口乃窮往復益喜曰嗟乎余雖家置一喙以自稱道詬益甚耳用是更樂瘖默與木石為徒不復致意辨士臨説杜洪淮南將劉存濬次傳城洪軍氣沮存使辨士臨説嚴默終日孔述睿雖與親朋燕集至嚴默終日人皆畏之善辭令溫彥博性周謹善辭令每問四方風俗臚布誥命若成誦然發言陋鄙李林甫無學術發言陋鄙聞者竊笑政事多所開訪王紹謹密主計凡八年政事多所關訪紹亦未嘗一言漏于人於大議論往往有所合杜悰有大臣體以捭闔干時張濬不得志乃羸服屏居金鳳山學從橫術以捭闔干時説王敬武王敬武在平盧軍最強纍召不肯應濬往説之而敬武已臣賊不迎使者濬責之曰公為天子守藩今使者齎詔至不北面俯伏而敢侮慢公乃未識君臣大分何以長吏民哉敬武愕貽愧謝李抱真説王武俊李抱真沈慮而斷王武俊反以數騎馳入見武俊曰泚希烈爭竊帝號滔攻貝州此其志皆欲自肆于天下足下既不能與競長雄捨九葉天子而臣反虜乎且詔書罪己禹湯之心也方上暴露播越公能自安乎因持武俊涕下交頤武俊亦感泣解語馬嗣孫為人懦暗少學劉昫能相常侍孔昭序建言常侍班當僕射前嗣孫責御史臺檢例臺言故事無所見據今南北班位常侍在前嗣孫即判臺狀施行劉昫大怒崔居儉揚言于朝曰孔昭序解語是朝廷無解語人也述慮劉洎非言無以述慮諄復王世充言語諄復百緒遽言亟辨權德輿善辨論李吉甫秉政用李絳參贊是時帝切于治事無巨細悉責宰相吉甫絳議論不能無持異至帝前遽言亟辨德輿從容不敢不所輕重白博物君子晉侯謂子産云強識記曰博聞強識而讓者謂之君子多識晉侍中王粲博物多識指掌張華強記四海之內若指諸掌顯節陵中策嵩山之下有人得簡一枚上有兩行科斗書張華問束晢晢曰此漢明帝顯節陵中策驗之果然也識亡書漢書上幸河東亡書三篋詔問知者唯張安世識之具得其事後得亡書校無所遺上奇之擢拜尚書郎龍肉鮓陸機饋張華鮓發器曰此龍肉也賓客未信華曰以苦酒漬之必有異漬酒五色光起機反問鮓主主曰茅積下得白魚質狀殊常作鮓美故相獻也蛇化為雉武庫封閉甚密忽有雉雊張華曰此蛇化為之開視雉側果有蛇蛻也桐材擊石鼓吳郡臨平岸崩出一石鼓槌之無聲帝問張華華曰取蜀中桐材刻為魚形叩之則嗚矣如其言果聲聞數里孔子識土怪羵羊辨防風骨孔鼨鼠盧若虛多才博物辛怡諫為職方有獲異鼠者豹首虎臆大如拳怡諫謂之鼨鼠若虛曰非也此許謹所謂鼨鼠豹文而形小一坐驚服鍾山壙中銘鄭欽説通曆術博物初梁太常任昉大同四年七月於鍾山壙中得銘曰龜言土蓍言水甸服黃鍾啓靈北瘞在三上庚墮遇七中已六千三百浹辰交二九重三四百圯當時莫能辨者因藏之戒諸子曰世世以銘訪通人有知之者吾死無根昉五世孫升之隱居商洛寫以授欽説欽説出使得之於長樂驛至敷水三十里忽悟曰卜宅者瘦葬之歲月而先識墓圯日辰甸服五百也黃鍾十一也繇大同四年郤求漢建武四年凡五百一十一年葬以三月十日庚寅三上庚也圯以七月十二日己巳七中已也浹辰十二也建武四年二月至大同四年七月六千三百一十二月月一交故曰六千三百浹辰交二九十八也重三六也建武四年三月十日距大同四年七月十二日十八萬六千四百日故曰二九重三四百圯升之大驚服其智霓裳拍王維客有以按樂圖示者無題識維徐曰霓裳第三疊最初拍也引工按曲信然阮咸器元行沖有人破古家得銅器似琵琶人莫能辨行沖曰此阮咸所作器也姑洗角楊收涔陽耕得古鍾高尺餘收叩之曰此姑洗角也既剝拭有刻在兩欒果然古鼎銘五代張策少聰悟父同居洛陽敦化里浚井得古鼎銘曰魏黃初元年春二月匠告于同以為奇策時年十三居同側啓曰漢建安二十五年曹公甍改元建康是歲十月文帝受禪又改黃初是黃初元年無二月也銘何繆邪同大驚異之狼星直日江南李嗣主誥旦殿庭忽見殘麋一腳視之刀獸食之餘詢宿衛莫知所以遂使人詢陳陶陶曰昨暮乃狼星直日故耳嗣主嘆曰真鴻儒矣白庾辭國語范文子曰有秦客庾辭於朝卿大夫不知也吾得其二焉武子怒曰童子三掩人於朝以杖擊之折笄庾辭謂作隱語也庚癸吳申叔儀乞糧於魯公孫有山有山曰若登首山以呼曰庚癸乎則諾注云西方主穀癸主水軍中不敢出糧故為隱語麥麴芎藭楚申叔展問還無社曰有麥麴乎有山芎藭乎注二物可以禦濕欲使無社逃難於泥中郭舍人請東方朔隱語漢書黃絹幼婦孫齏臼隱語三孔有美醬乎有梁米乎並乞墨一枝許欽明為涼州都督嘗輕騎按部會突厥默啜兵掩至被執賊與皆至靈州使説之降欽明至城下呼曰我乏食有美醬乎有梁米乎并乞墨一枝時賊管四面阻水惟一路得入欽明欲選將東兵乘夜襲賊也而城中無寤其庾者遂害迷隱其辭李乾祐擢御史大夫為褚遂良所惡出邢魏二州剌史嘗為書與所善剌史取朝廷事迷隱其辭為吏所賣遂良白發於朝坐流歡州庾文王廷湊始廷湊賤微時鄴有道士為卜及得鎮迎事甚謹復問壽幾何子孫幾何答曰公三十年後當有二王已而廷湊立十三年死蓋庾文也私鬩隱語高駢擢發吏百餘號察子厚廩食令居衢哄間凡民私鬩隱語無不知折其文為十二言段居正妻謝字小娥居正與謝父同賈江湖上並為盜所殺小娥轉側丐食至上元夢父及夫告所殺主名離折其文為十二言持問內外姻莫能曉李公佐隱占得意曰殺若父者必申蘭殺若夫者必申春小娥泣謝歲餘得蘭于江州春于獨樹浦曾崇範妻凡許聘數人其夫趣死一夕夢人謂曰田頭有鹿迹由尾著日炙乃汝之夫也後嫁崇範方悟江南野史舅得詹事朝野僉載張説女嫁廬氏常為舅求官説不語它日復問説但指支床龜女欣然歸告其夫曰舅得詹事矣後果然也大明寺水太保令狐綯鎮淮南慕容班嘗與從事俱遊大明寺之西廊見壁前題云一人堂堂二曜重光泉深尺一點去冰傍二人相連不久一邊三梁四柱烈火燃添卻雙勾兩日全諸賓顧之皆莫辨獨班曰一人大字也二曜者日月明字也泉深尺一者寸土寺字點去冰傍水字二人相連天字不欠一邊下字三梁四柱烈火燃無字添卻雙勾兩日全比字得非大明寺水天下無比也衆洗然桂苑叢談其文初不可曉五行志正觀十七年八月涼州昌松縣鴻池谷有石五青質白文成字曰高皇海出多子李元王八十年太平天子李世民千年太子李治書燕山人士樂太國主尚注譂獎文仁遇千古火王五王六王七王十風毛才子七佛八菩薩及上果佛田天子文武貞觀昌大聖延四方上不治示孝仙戈入為善其文初不可曉而後人因推已事以驗之蓋武氏革命自以為金德王其佛菩薩者慈氏金輪之號也樂太國主則鎮國安樂公主太平公主皆以女亂國其五王六王七王者唐世十八之數碑陰八字漢太尉許馘碑久磨滅諸孫再刻之題八字碑陰曰談馬礪畢王田數七人莫能曉徐鉉父延休一見解曰談馬許字礪畢碑字王田重字數七立字王仲舒與同舍郎日置酒邀賓客相樂李藩名強致之仲舒專為俳説庾語相狎昵李藩一見謝不往曰吾終日不曉所語何哉赤元生粟開元中含元殿火基下出丹至有隱語不可解言天漢三年赤元生粟木下有子傷心過酷此亦不能辨也出百家鱠淮西石讖宣室志元和元年九月裴晉公往征吳元濟至境上因發地得石刻有雞未肥酒未熟之語解之者曰雞未肥無肉也肥去肉為己酉未熟無水也酒去水為酉破賊之期在己酉乎後賊乎果以是日白吉人寡辭易訥訥見慎言門注剛毅木訥近仁君子欲訥於言周勃張相二人言事未嘗出口訥口李廣訥口少言口吃楊雄口吃不能劇談質厚吳漢字子顏質厚少文造次不能以辭自達口訥心辨有圭璋之質郭林宗謂劉鴻儒鄧艾口吃常稱艾艾晉文帝戲曰艾艾為是幾艾答曰鳳兮鳳兮是一鳳期期不奉詔周昌剛直而口吃高祖欲廢太子立趙王昌曰臣期期不奉詔魯恭王餘季年好音樂口吃難言吳志司馬相如口吃而善於著書孔囁嚅翁竇鞏平居與人言若不出口世號囁嚅嗡口吃而辨陸羽遇人不能道寒暄五代孫晟為人口吃遇人不能道寒暄已而坐定談辨鋒生聽者忘倦蹇緩李固言口吃接賓客頗蹇緩合喙而隱志兮幽默以待盡柳宗元閔生賦言訥性魯無特達之節柳宗元上權補闕絳侯木訥為漢元輔陸相奏議趙武訥訥而為晉賢臣絳侯木訥而為漢元輔公孫洪上書論事帝使難洪以十策洪不得其一及為宰相卒有能名周昌進諫其君病吃不能對詔乃曰臣口雖不能言心知其不可然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一訓一誥而謂其盡能哉白脣亡齒寒諺曰輔車相依云云舌在張儀開口示妻曰舌在足矣口爽老子曰五味令人口爽折齒齊景公為孺子牛而折其齒編貝東方朔曰臣齒如編貝口容止不妄言也見齒高柴子羔執親之喪泣血三年未嘗見齒齒決禮濡肉不齒決乾肉齒決摺齒魏齊笞范睢折脅摺齒摺音路合反皓齒文選沒齒管仲奪伯氏駢邑三百飯蔬食沒齒無怨言杜口婁敬以口舌得官張儀掉三寸舌匪舌是出徒以口舌藺相如忠言不避截舌載翕其舌翕合也駟不及舌莫捫朕舌婦有長舌口呿而不合舌舉而不下説文云公孫龍也乳臭漢書漢擊魏豹問曰魏大將誰也曰柏直曰是口尚乳臭含香應劭漢官侍中言老口臭帝賜雞舌香含之口方瀨鄉記老子口方杜恕體論曰束修之業其上在於不言其次莫如寡辭諺曰使口如身至老不失周生烈曰口耆言之門脣者舌之藩齒者脣之合也故子夏曰駟不及舌三緘其口家語孔子入太廟階左有金人焉三緘其口防人之口若防大川大決所犯傷人必多子産云孝經鉤命決曰仲居海口言善食海澤也淮南子曰趙襄子殺智伯豫讓欲報怨恐人識之乃落其齒以易其貌齒化為石神仙傳服神丹三百歲異物志曰西屠夾在海中以草染齒以黑勝白張蒼無齒唯飲乳百餘歲卒漢書夜生晉書成帝杜皇后少有深色長猶無齒有求婚者輒中止及帝納采一夜齒盡生溫嶠先有齒疾拔之中風而卒孔方口婁師德顏真卿盧杞數遣人問方鎮所便將出之真卿往見杞辭曰先中丞傳首平原面流血吾不敢以衣拭親舌舐之公忍不見容乎杞銜恨切骨鉗口結舌顏真卿令宰相宣進止御史臺作條目不得直進從此人不奏事矣陛下聞見止於數人耳目天下之士方鉗口結舌頭可斷舌不可禁柳渾張延賞怙權嫉渾守正遣親厚謂曰明公舊德第謹言于朝則位可久渾曰為吾謝張公渾頭可斷舌不可禁卒為所擠為文之士亦多漁獵前作箋賊文史快其意抽其華置齒牙間柳宗元答友人掉長舌於公卿間劉嚴夫與段校理書文粹爵賞在其口吻黎幹傳宦者劉忠翼與左衛將軍董秀皆有寵於代宗當盛時爵賞在其口吻折齒溫廷筠不得志去歸江東令狐綯方鎮淮南廷筠怨居中時不為助力過府不肯謁丐錢楊子院夜醉為邏卒擊折其齒訴於綯綯為劾吏吏具道其惡行綯兩置之飲堇齒燋張果帝謂高力士曰吾聞飲堇無苦者奇士也時天寒因取以飲果三進頽然曰非佳酒也乃寢頃視齒燋縮顧左右取鐵如意擊墮之藏帶中更出藥傅其齗良久齒已生粲然駢潔帝益神之鵙舌啅譟柳宗元貶永州司馬雅善蕭俯移書言情曰楚越間音聲特異鵙舌啅譟今聽之恬然不怪已與為矣家生小童皆自然嘵嘵晝夜滿耳聞北人言則啼呼走匿雖病夫亦忸然駭之虎口郭知運二齒生則天春秋高左右不悟其衰俄而二齒生詔改元長壽五色齒止戈集孔戣好術藝延按方士多所傳授能口中現五色齒綵色光絢一瞬即改舌端之孽慘乎楚鐵劉禹錫口兵戒浮危所餘十九齒飄颻盡浮危韓愈贈崔二十六詩齒落舌存齒落未是無心人舌存恥作窮途哭杜甫暮秋寄蘇侍御詩皆碎張巡每戰大呼嚼齒皆碎及尹子奇視之其齒存者不過三四老君剪舌唐夔州道士王法朗舌長呼字不正乃日誦道德經後夢老君剪舌金剛石碎佛牙正觀中有僧言得佛牙所擊無堅物傳奕聞之曰我聞金剛石至堅唯零羊角可破試往擊之應手而碎劉餗傳記騰口任㘖㘖柳宗元詩羡君齒牙牢且潔韓文贈劉師服羡君齒牙牢且潔大肉硬餅如刀截其有口舌者率以利啖之劉晏其有口舌者率以利啖之使不得有所訾短故讓者頗言晏任數固恩無掉爾舌以速爾咎姚元崇口針文粹利口作戒長舌為詩同上心六白我心匪石不可轉也我心匪席不可卷也如旌楚王曰寡人心搖搖如懸旌無瑕士為曰心苟無瑕何恤乎無家不競孔叔目心則不競何憚於病心不則德義為頑傳如面富辰曰心之不同如其面焉苞藏禍心心能制義曰度人藏其心不可測度心莊則體舒心肅則容敬心正而後身修禮方寸徐庶曰方寸亂矣心如結兮詩如水鄭崇曰臣門如市臣心如水心若死灰莊子虛其心老子玄覽心照老子曰滌除玄覽丹府靈府靈臺並心也中心不和不樂而鄙詐之心入矣外貌不莊不敬則慢易之心入矣鄙吝心生郭林宗曰逾月不見黃叔度則鄙吝心生聖人無常心以百姓心為心以禮制心書志以道寧作德心逸日休作偽心勞日拙至和為性最靈由心非僻之心無自入也禮主張六志緘縢七情楚王蕩而祿盡徐庶亂而計窮剖賢人之心書刳心而學道言學道先去其心也莊子心計桑弘羊以心計十三為侍中有臣三千惟一心紂有臣億萬惟億萬心豫有臣三千惟一心同心武王曰豫有亂臣十人同心同德啓沃高宗謂傳説曰啓乃心沃朕心金石後漢世祖指王常曰此家率江夏諸將輔翼漢室心如金石真忠臣也是日遷為漢中將軍同心之言其臭如蘭劍承其心晏子春秋曰崔杼弒齊莊公以戟鉤其頸劍承其心春秋元命苞曰心者火之精成於五故人心長五寸二人同心其利斷金其心三月不違仁一心可以事百君百心不可以事一君仲尼聞之曰小子記之哉晏子春秋凡人心險於山川難知於天禮夢人以刀開心異苑曰鄭玄師馬融三載無聞融鄙而遣之玄過於樹陰下假寐夢見一老父以刀開心謂曰子可以學矣於是卻返孔心如山嶽尉遲恭隱太人常贈金皿一車辭以聞秦王王曰公之心如山嶽然雖積金至斗豈能移之高世溫造張建封節度徐州造謝歸下邳慨然有高世心心如鐵石契苾何力帝曰若人心如鐵石感心疾韋綬晚乃感心疾罷還第不極於用蹙其心祖告彥正拔柱蹙其心即死厚貌小心高行周隸明宗帳不初為裨將趙德鈞識之謂明宗曰此子厚貌而小心它日必大貴宜善待之五代史面醜心妍韓愈送窮文言必顧心心必副事陸贄言易曰聖人感人心而天下和平夫感者誠發於心而形於事事或未諭故宣之於言言必顧心心必副事三者相合乃可求感欲小孫思邈曰心為之君君尚恭故欲小詩曰如臨深淵如履薄冰小之謂也約之於心陸贄上書曰惟勤思而熟計之捨己以從衆違欲以遵道遠檢佞親忠直推至誠去逆詐斯道甚易行不耕神不劬力第約之於心耳心為萬事主張玄素遷右庶子時太子承乾事遊畋不悅學玄素上書曰心為萬事王動而無節則亂敗德之原實在於此嘔出心李賀母使婢探囊中見所書多即怒曰是兒要嘔出心乃已耳誓天李抱真見王武俊武俊感其不疑乃指心誓天曰此身已許公死久矣多記損心劉洎諫曰多記損心披而示心馬燧賊將徐廷光再拜燧曰爾以吾為欺邪今不遠數步可射我披而示心廷光感泣夢持巨鑿破其心尹知章少雖學未甚通解忽夢人持巨鑿破其心內若劑焉心沈抑以不舒兮柳宗元閔生賦擾濁浮躁本之於心韋承慶嘗謂人所以擾濁浮躁本之於心治心莫若和平杜牧送人赴舉序既操心之大謬欲當時之奏技望故園賦鐫心鏤志旁睨後逸鐫心縷志錦心繡口柳宗元乞巧文駢四纚六錦心繡口將息之道當先理其心心間無事然後外患不入韓崔群書忠臣寒膺盧杞傳忠臣寒膺良士痛骨雖長不過七尺而心雄萬夫李白送孟贊府還都序白非禮勿視視思明君子九思將思明也杜蕢謂嬖叔曰爾為君目將思明也無淫視正視也視遠惟明視曰明洪範曰視曰明明作哲目誠楚辭專專之目誠凡視上於而則傲下於帶則憂傾則姦傾謂旁視不正也目不別五色之章為昧傳五色令人目盲見小曰明視之不見名曰微以管窺天蔽明冕而前旒所以蔽明視之明也鑿於賢不在見於蚊睫視之遠也觀於德不在睹於秋毫三年視蝨百步睹毫離婁視下單子曾韓子于戚視下而言徐叔向曰單子其死乎衣有禬禬領也帶有結會朝之儀視不過結禬之中所以導容貌以明之失則有闕今單于為五官伯而命事於會視不登帶言不過步貌不導容而言不昭不導不恭不昭不從無守氣矣四目舜明四目而天下治遠視賈琮為剌史升車褰帷遠視廣聽紏察善惡百城震悚尊其瞻視君子正其衣冠尊其瞻視儼然人望而畏之見秋毫之末離婁百步之外見秋毫之末目逆宋華久督見孔父之妻於路目逆而送之曰美而艷竊視金日殫見武帝美人蒲側日磾不竊視忤視馬融前授生徒後列歌妓盧欽受業不忤視儀禮曰與大人言始視面中視抱注言書見面觀其顏色所傳言也若父則遊目無上於面無下於帶子於父主孝不主敬所視廣因觀安否若不言立則視夾坐則視膝天子視不上於夾不下於帶國君妥視謂上於夾大夫衡視謂平視士視五步從長者上丘陵則必向長者所視視必下將入戶入戶奉扃視瞻無回視速右師視速而言疾有異志焉視流鄭伯視流而行速覆視戴目而視傾耳而聽察泉魚觀天文視日不眩王戎視日之蚤暮禮目目若懸珠東方朔自言美目盼兮目擊貿貿都貿貿然來貿貿目不明貌目動臾駢觀秦使者目動而言肆懼我也必敗之青白眼阮籍能為青白眼禮俗士輒以白眼嵇喜候之籍見以青眼喜乃退五色令人目盲老子喪明子夏喪其子而喪其明曾子弔之曰吾聞朋友喪明則哭之曾子哭子夏亦哭曰天乎豫之無罪也曾子怒曰商汝何無罪也喪爾親使人未有聞焉喪爾子喪爾明爾何無罪與子夏投其杖而拜之曰吾過矣吾過矣左丘明喪明厥有國語司馬遷與任安書云目者離之象易離為目目如點漆杜弘理治國而無禮譬猶瞽之無相與倀倀乎其何之瞭然眊然孟子曰人之善不善在乎目其心正則童子瞭然其心不正則童子眊然瞭音了眊音耄重瞳舜目又項羽目亦重瞳不瞬列子引錐至曉其目不瞬兩葉蔽目不見太山鶡冠子目所不見故若存若亡心所不繫故不生不滅十目所視蜂目豺聲深目而猳喙睆目眼如紫石稜閉門而泣目盡瞳爛爛如巖下電裴楷謂王戎之睛視七孔方瞳子黑白明徹李密方瞳子黑白明徹煬帝見之謂宇文述曰左仗下黑色小兒為誰曰蒲山公李寬子密帝曰此兒顧眄不常無入衛不能正視永王璘貌陋甚不能正視目禁關播與盧杞論事帝前播意不可避坐欲有所言杞目禁輒止屏蔽元稹曰聾瞽之君非無耳目左右前後者屏蔽之不使視聽欲不亂可得哉失明令狐彰與魚朝恩有隙及用事彰不敢入朝會母喪失明卒白眼相公張允伸性暴厲眸子多白燕人號白眼相公崔光遠瞳子白黑分明目恚李林甫少選詔書出耀鄉九齡以左右丞相罷林甫嘻笑曰尚左右丞相邪目恚而送乃止紿病目行觸柱朱延壽田頵之附朱全忠二人謀絶行密行密憂甚紿病目行觸柱目睛黃而夜有光五代張彥澤目睛黃而夜有光顧視如猛獸一目重瞳子南唐李煜一目重瞳子晝能見星武攸緒晚年瞳有紫光晝能見星廞目史思明鷹視五代秦王從榮為人輕俊而鷹視目多白睛五代漢高祖目多白睛凜如也眼語韓建昭宗東遷建從至洛昭宗舉酒屬太祖與建曰遷都之後國步小康社稷安危繫卿兩人次何皇后舉觴建躡太祖足乃陽醉去建出謂太祖曰天子與宮人眼語幕下有兵仗聲恐公不免也太祖以故尤德之環視羅洪信文𤥡死衆曰孰願主吾軍者洪信輒曰神命我矣衆環視以為宜遂立之低目窺覘蘇安恆疏深目而髯趙來章卜人秦誗曰宜遇西人深目而髯乃得其實也目如秋水李泌賀知章曰此稚子目如秋水必一拜卿相出鄴侯家傳木睛周寶唐立武選以高上擊毬較其能否而黜陟之至有致鐵鉤于毬仗以相擊寶嘗與此選為鐵鉤所摘一目暗失寶取睛吞之復擊毬獲頭籌遂授涇原敕賜木睛以代之一日晨起漱木睛墜水棄之侍姬竊笑寶怒曰瞎漢何足笑遂殺之注木睛莫知何木置中無所礙視之如真睛矣出吳越備史視物隔褷褵玄花著兩眼視物隔褷褵韓愈寄崔二十六忽盲文粹皮日休九諷遇謗篇目正視兮忽盲腦脂腦脂遮眼臥壯士韓文雪後寄崔公目眇號獨眼龍威名蓋代北李克用目瞬如電江南野史吳主璟目瞬如電見善不敬與昏瞽同柳宗元送從兄序其凝其盲韓拘幽操目掩掩兮其疑其盲目視昏花尋常間便不分人顏色韓文伐眼酉陽雜俎三尸上尸青姑伐人眼闊視藩鎮序闊視大言自成一家低目相視劉總談忠説總曰都國弄兵低目相視可謂危矣白非禮勿聽聽思聰君子九思無側聽禮舜達四聰而治天下耳不聽五音之和為聾傳五音令人耳聾老子司聰杜蕢飲工曰汝為君耳將司聰不聞樂是不聰也文子曰聽者所以達知也所以成行也所以致功名也不精不明不深不達故上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓故聽之不深則知行之不誡凡聽之理虛心清淨耳無苟聽耳屬于垣天聽卑秦宓曰天之至高而聽至卑蜀志言猶在耳聽之不聞名曰希聽白聰聰作謀洪範曰回曰聽掩聰大戴禮曰冕而前旒所以蔽明黈纊寒耳所以掩慈通人於己文子曰言者所以通已於人聞者所以通人於己既暗且聾人道不遇和聲入於耳而藏於心坎為耳易惟明在於聽政不在聞蠖蟻之鬥惟聰在於聽德不在聞焦螟之聲傾耳而聽之可得而聞也廣聽賈琮事見上注洗耳堯聘許由為九州長由惡聞之洗耳於潁水沈流王武子曰流非可枕孫子荊曰所以沈流欲洗其耳逆耳張良曰忠言逆耳利於行漢高紀雉雊高宗祭有飛雉升鼎耳而雊不聽之異也忘味子在齊聞韶三月不知肉味知音伯牙彈琴鍾期聽而知其音聽和而聰國語單穆公曰耳目心之樞機故視和則明視聽不和則有震眩視秋毫之末則不聞雷霆之音兩豆塞耳不聞雷霆鶡冠子傾聽求聲者則耳苦而目樂定心管物者則神勞而形安同在一身之上而休戚異者是天理殊宜造化自隔言提其耳重聽何傷黃霸為郡許丞老聾吏請代之霸曰許丞廉殞重聽何傷諸葛亮請杜徵至以徵聾於座上與書云伏聞德行飢渴歷時云云徵以老病乞歸孔纚纚令人忘倦馬周岑文本謂所親曰馬君論事會文切理無一言可損益聽之纚纚令人忘倦進對失次喬琳同中書門下平章事天下矍然駭之琳年高且聵每進對失次所言不厭帝旨顧目見耳前蜀王衍顧目見耳耳大李忠臣帝嘗謂卿耳大真貴兆耳無根袁天綱見馬周曰君耳無根壽不長生缺左耳商成已生而缺左耳忽睽文粹皮日休耳方聰兮忽睽耳冷孟洪徽對宣宗曰陛下何以不知有臣何不以文字召用帝怒曰朕耳冷不知有卿出朝野僉載耳中天地薛君曹見二青衣駕赤犢出耳二童子曰兜玄國在吾耳中一童子傾耳示君曹乃別有天地花卉因捫耳投之至一都會城池樓堞窮極瑰麗因作思歸賦自童子耳中落幽怪録三耳秀才董謹為太山府君呼為録事令決疑獄謹舉秀才張審通決之甚當府君喜其聰敏為於額上更添一耳既還額極癢踊出一耳尤聰時人曰天有九頭烏地有三耳秀才亦呼為雞冠秀才同上聞善不慕與聾聵同柳文送從兄序耳肅肅兮聽不聞聲韓愈拘幽操丁寧附耳莫漏泄韓退之月蝕詩病聾五代鄭玨在相位既碌碌無所為又病聾自提其耳五代王峻曰兗州慕容彥超反迹已露若陛下出汜水則彥超入京師陛下何以得之翟守素馳還具道峻言是時太祖已下詔西幸聞峻語遽自提其耳曰幾敗吾事乃止不行面九白夫為人子者出必告反必面禮女子出門必擁蔽其面事親三日具沐其間面垢不學牆面蒞事惟煩朋而不心面朋也友而不心面友也楊子面長三尺荀卿子曰有臣公孫呂身長十尺面長二尺廣三寸名動天下半面後漢應奉字世叔行汝穎過袁賀門出半面不見賀二十年路見識之傅粉何晏面如凝脂王右軍見杜弘理而歎曰面如凝脂目如點漆此神仙中人也子西袂掩而終國語楚白公勝作亂劫惠王殺子西慚見葉公子高以袂掩面而終夫差巾覆而死吳越春秋曰吳王夫差死羞見子胥以中覆面今人謂之面衣也面如驢面吳書諸葛子瑜人心不同其如面焉子産云宋如周面長孔相觸陳夷行楊嗣復及夷行對延英帝以其面相觸頗不悅洙面狄仁傑送制獄歎曰皇天后王使仁傑為此乎即以首觸柱血流沫面不識陸贄既放荒遠常闔戶人不識其面兩面人劉季迷帝囚少陽院崔胤告難於朱全忠請以兵除君側全忠封胤書與季述曰彼翻覆宜圖之季述以責胤胤曰姦人偽書從古有之必以為罪請誅不及族季述易之乃與盟胤謝全忠曰左軍與胤盟不相害然僕歸心於公并送一侍兒全忠得書恚曰季述使我為兩面人是始離季術方面五代寇彥卿方面一尺之面五代桑維翰身短而面長常臨鏡以自奇曰人七尺之身不如一尺之面面澤赤袁天綱見馬周曰君面澤赤壽不長面如虎袁天綱與韋挺遊謂挺面如虎當以武處官挺善隱太子薦為左衛率面如高麗楊再思張易之兄司禮少卿同休請公卿宴其寺戲曰公面似高麗唾面婁師德其弟守代州辭之官教之耐事弟曰人有唾面潔之乃已黑子以顏平原柏良器父友王奐曰面黑子以顏平原黃面兒賈餗會曲江故事尹自門步入揖御史餗騎而入御史楊儉蘇特固爭餗曰黃面兒敢爾以帽障李訓帝下詔暴訓注等罪李孝本猶金帶以帽障面奔鄭注白面兒五代劉鄩末帝遣使者監督其軍鄩召諸時謀曰主上深居禁中與白面兒謀必敗人事會面嗟黧黑杜甫贈王侍御五行秀氣得之居多者為俊人其色瀲灩於顏間其聲發而為文章劉禹錫呂溫集記面紫色五代漢高祖面色青黑五代羅弘信狀貌奇怪面色青黑軍中異之人罕識其面五代崔梲遭世亂寓居于滑臺不遊里巷者十餘年人罕識其面面有銀光方鎮編年錢鏐鎮吳越胡嶽渡江畫工以貌奏歎曰面有銀光奇士也即召見胸十白釋名曰胸臆也結胸山海經曰有結胸國人為人結胸如人結喉也貫胸曰貫胸國為人胸有竅孔子之胸文曰製作定世符運春秋孔演圖云披胸列子得卵披胸淯水蕩其胸當味值胸洞胸達腋開胸毀骨碎胸傷胸左傳魏犨爇僖負羈氏犨傷胸晉文侯愛其才使視之犨束胸而見使者漢高祖與項羽對軍數羽十罪羽伏弩而射漢王中胸高祖詐捫指長歎息占詩胸坼而生禹帝王紀禹母吞神珠云云孔封常胸無疑事封常清才而果胸無疑事匕首揕胸于志寧贊曰志寧諫大子承乾幾遭賊殺然未嘗懼知太宗之明雖匕首揕胸不愧也胸有七黑子高力士幼與母麥相失後嶺南節度使得之瀧州迎還不復記識母曰胸有七黑子在否力士袒示之如言穴胸李密敗王伯當曰豈公一失利輕去就哉雖殞首穴胸所甘已以手指胸五代王松以手指胸引郭子儀自誚迷惑胸下開迷惑胸窙豁斸株橛韓退之送文暢北遊二十八宿羅心胸李賀高軒過獨任胸臆唐史吳兢上言芟刈股肱獨任胸臆可為寒心不置白黑於胸中韓愈崔群書所以言者懼足下以為吾所與深者多不置白黑於胸中耳胸有偃骨酉陽雜俎太極真仙中名青琳青書者胸有偃骨白天將假手傳執子之手詩兩驂如手如臂之使手六轡在手共飯不擇手禮論語隱義曰齊桓公北伐中山還倚柱歎曰天下珍物悉易得未得人肉食易牙歸斷其兒兩手以啖君鉤弋夫人漢書鉤夫人兩手皆拳武帝披之手即展號曰鉤弋夫人母囓手搜神記曰周暢至孝每出母欲呼之自囓手暢心痛即馳歸羹爛後漢劉寬欲朝婢翻羹污朝服婢以手收之寬曰徐徐羹爛汝手論語摘輔象曰仲弓鉤文在手是謂知宰我握戶是謂守道子遊握文雅是謂繁土公冶長手握輔是謂道子夏握五是謂有公伯周手握直期是謂病惡鼠傷晉高平劉柔夜鼠傷其手指惡之問淳于智智即以朱書腕後橫文為田字夜露手而臥明有一大鼠手前死長者與之提攜則兩手奉長者之手燕丹子曰太子與荊軻置酒美人鼓琴軻曰好手太子即斷其手以玉盤盛而奉之繩貫魏略曰鮑出字文才屬代飢出採蓬子母在家為賊繩貫手掌驅去出走斬賊奪母而還纖纖擢素手不分塵尾王夷甫見美丈夫門修肱契長肘李廣握鉤仲尼執雅子貢刻文公孫述摻摻女手手如柔荑為魯夫人宋仲子生而有文在其手曰為魯夫人孔如亡左右手房元齡辭位帝遣使謂曰國家相眷賴久一日去良弼如亡左右手束手太宗討高麗元齡上疏曰國患無如突厥而大小可汗相次束手握手元齡疾甚帝親握手成決摸稜蘇味道為相特具位未嘗有所發明指韋自營而已常謂人曰決事不欲明白誤則有悔摸稜持兩端可也故世號摸稜手搖手李德裕帝欲授李訓諫官德裕謂訓小人須咎惡暴天下不言引致左右帝語王涯別與官德裕搖手止涯帝適見不懌手弱王徽襄王熅作亂熅逼召徽及僣號迫群臣作誓牒徽托手弱卒不肯署程知節白秦王知節隱太子譖之出為康州刺史秦王曰大王去左右手矣身欲久全得乎知節有死不敢去汙吏斂手盧奐為南海太守汙吏斂手一手廢盧照鄰客東龍門山疾甚足攣一手又廢斂手李至遠知選事疾吏受賄謝多所絀易吏肅然斂手垂手過膝前蜀王衍垂手過膝毒手尊拳五代李襲吉晉王與梁有隙交兵纍年後晉王數困欲與梁通和使襲吉為書諭梁辭甚辨麗梁太祖使人讀之至於毒手尊拳交相於莫夜金戈鐵馬蹂踐於明時歎曰李公僻處一隅有士如此繡其手迹於衣南平高季興莊宗嘗問季興曰吾已滅梁欲征吳蜀何者為先季興曰宜先蜀臣請以本道兵先進莊宗大悅以手拊其背季興因命工繡其手迹於衣歸以為榮耀霹靂手裴琰之為同州司戶名動一州號霹靂手握手諄勞沙陀傳李克用還過汴朱全忠邀之克用入舍上源館全忠握手諄勞手大尺餘翟天師名乾祐長六尺手大尺餘每揖人手過胸酉陽雜俎炙手可熱勢絶倫杜甫麗人行爭指柳玭纖瑕微纍十手爭指矣所以修己不得不至為學不得不堅舉手伸縮便有輕重宦者序威柄下遷政在宦人舉手伸縮便有輕重唾手可取褚遂良翔旝雲朝唾手可取手打賊李巨召入禁中對合旨帝大悅敕宰相與語久不得罷國忠怠對奉庭謂巨曰比來人多口打賊君不爾乎巨曰誰為相公手打賊乎白割臂而盟魯莊公許孟仕為夫人孟乃割臂而盟之遂生公子班申蒯斷而鬥崔杼弒莊公申蒯後至將入御止申蒯聞君死請入門者告崔子崔子曰勿納蒯曰汝疑我與汝臂斷左臂與門者門者將示崔子遂入蒯遂拔劍呼天躍而鬥殺七人未及崔子一叫而死也李廣猿臂漢書羿左臂長而善射淮南子齧母臂史記曰吳起出衛郭門齧母臂辭別曰不為卿相不入衛郭門折臂三公幽明録曰羊叔子父墓人相云有帝王氣叔子掘斷之後相者再至曰當出折臂三公公叔子馬墜折臂一臂國交州記曰儋耳國東有一臂國人皆一臂也春秋元命苞曰湯臂四肘是謂神剛象月推移以綏四方也過膝蜀志先生長七尺五寸目顧見耳臂垂過膝李牧臂短謝靈運詩曰李牧愧長袖若身之使臂齧臂為盟續漢書曰單超河南人梁冀振動天下帝呼單超等五人入謀誅梁冀帝齧臂為盟也蜀志曰關羽為流矢中左臂陰雨常痛伸臂與醫刮骨去毒流血盤中神氣自若孔猿臂郭知運斷臂王珂牙將劉訓叩寢門珂疑有變叱之訓自袒其衣曰苟有它請斷臂臂短五代朱友謙附于晉醉寢晉王帳中晉王視之顧左右曰冀王雖甚貴然恨其臂短耳臂龍鱗奮張亮程公穎稱亮臥若龍當大貴亮曰國家殆必亂吾臂龍鱗奮矣囓臂皇甫湜命其子録詩一字誤囓其臂血流生子兩首四臂劉鋹天寶九年南海民妻生子兩首四臂南漢世家斷臂仍𤬁𤫶韓文征蜀聯句連臂歡咋叛臣陳敬瑄黃巢亂僖宗幸奉天敬瑄夜召監軍梁處厚奉表迎帝繕治行宮令孜亦倡西幸敬瑄以兵三千護乘輿冗從內苑小兒先至敬瑄知素暴橫遣邏士伺之諸兒連臂歡咋行宮中士捕繫之呼曰我事天子者敬瑄殺五十人尸諸衢由是道路不譁唐史把臂杜甫苦戰行臨江把臂難再得矢著臂唐史王方翼為安西都護三姓咽面兵十萬踵至方翼連戰矢著臂引佩刀斷去左右莫知印臂上曰風月常新史諱録曰明皇開元初被進者曰印選以綢繆記印臂上曰風月常新印以桂紅膏則水洗不洗不退王畿如臂陸贄曰王畿如臂而四方如指此天子大權也堂下斷臂周仁軌酷嗜殺戮異日見堂下有斷臂惡之送于野數曰往視故在
