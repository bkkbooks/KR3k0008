body:
  text: 卷第十一白倉虛老子田甚蕪倉甚虛廩實管子倉廩實知禮節千倉乃求千斯倉乃求萬斯箱太倉紅腐太倉之粟紅腐而不可食海陵流衍觀海陵之倉則紅粟流衍鄧攸免官又第五訪仲謀為張掖守歲飢開倉賑給曰若須報是棄人也樂以身救百姓詔嘉之修囷月令孟冬命有司穿竇窖修囷倉謹蓋藏務積聚出納之吝謂之有司藏於天下韓詩外傳曰王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥賑廩傳曰楚莊王賑廩同食注賑廩開倉同食上下無異饌也我倉詩曰我倉既盈我庾維億儲蓄收藏委積收斂庾庾露積也詩曰曾孫之庾如坻如京巨橋武王克殷發巨橋之粟大賚于萬姓巨橋紂倉不盈管子曰不務地利則倉不盈發倉廩月令季春發倉廩賑貧窮粟入周禮倉人掌粟入之藏辨九榖之物以待邦用量入禮曰五穀皆入必量於歲之杪九年之蓄陳陳相因匪頒周禮廩人掌九榖之數以待國之匪頒賙賜稍食以歲之上下數邦用以知足否注稍食祿廩也露積太倉粟陳陳相因充溢露積敖倉下有積粟滯積公無滯積神倉藏帝籍於神倉祗敬必飾囷鹿國語廥積貴庾藏榖以防貴庾謂積榖待價蘇章後漢為武原令歲飢開倉廩活三千餘人喬玄公祖為梁州剌史歲飢開倉級之主者以為舊典宜先表聞玄曰方待奏民且死矣開倉訖乃上聞天子嘉之吳中有均輸之號吳倉春申君所造名均輸洛陽有常滿之名見洛陽記御廩災桓十四年八月壬申乙亥嘗以未易災之餘而嘗曰近也榖云白帝倉漢記公孫述有白帝倉細柳倉三輔故事曰漢文大將軍周亞夫軍於細柳今呼古徼是也徼西有細柳倉城東有嘉倉擅開倉汲黯因使矯制發倉救河內上釋罪韓韶後漢韓韶字仲黃為羸長賊不入界余縣多被寇廢耕入縣界求索衣糧甚衆韶愍其飢困開倉賑之万餘戶主者爭為不可韶曰此活溝壑之民而伏罪笑入地太守素知名德竟不坐鄭默晉鄭默為東郡守歲凶開倉賑給待罪詔書褒嘆比之汲黯班告天下王蘊字仁叔為吳興守郡人飢開倉賑恤主簿諫請先上聞待報蘊曰行仁義敗無所恨朝廷以違科免之士庶詣闕左降晉陵太守常平壽昌之計食貨志漢宣帝時年豐人少利時大司農中丞耿壽昌上計令郡國皆築倉以榖賤時增其價而糴以利農榖貴時減價而糶以利人名曰常平倉百姓利之平糴管氏之輕至李悝之平糴弘羊之均輸壽昌之常平人皆賴其利不涸之倉管子曰積於不涸之倉者務五榖也不盡文子曰積於不盡之倉存救存救之要術儲蓄以虞災以待凶而頒之周禮豐凶不常斂散有典既有無之相均亦豐儉而交利智合於權利和其義均節豐儉適宜公私交利苟栖畝之餘糧豐年不斂則在野之餓莩凶歲疇依羡耗出納有倉出如珠玉取如糞土史監臨當其豐歲雖多京坻之謠守在職司宜謹豆區之量秋斂春頒孔依高為廥薑師度為陝州剌史太原倉水陸運所湊轉屬諸河師度使依高為廥而注米于舟以故人不勞儲廥嬴衍鄧景山王思禮在太原儲廥嬴衍請輸半以實京師會卒管崇嗣代之政弛不治數月為下盜費略盡帝聞即以景山為太原尹帑廥寖虛張文瓘高宗征計四夷京師養廄馬萬匹帑廥寖虛文瓘諫發義倉粟薛訥遷藍田令富人倪氏訟息錢於肅政臺中丞來俊臣受財發義倉粟數千斛償之訥曰義倉本備水旱安可絶衆人之仰私一家報上不與倉廩未實呂元泰上書曰今倉廩未實不謂國富倉廥充宋慶禮兼營州都督不數年倉廥充倉庫積巨萬牛仙客始在河西嗇事省用倉庫積巨萬愈匱盧懷謹陳時政曰比州牧或一二歲或三五月即遷倉庫愈匱職為此耳條士馬倉廥宗室涵郭子儀表為關內鹽弛判官肅宗至平涼未知所從朔方留後杜鴻漸等條士馬倉廥使涵奉箋馳謁廥儲盈腐殷侑拜義昌軍節度廥儲盈腐太倉武庫並在都邑張説疏太倉武庫並在都邑紅粟利器蘊若丘山新倉李憲遷衛州剌史河中兵仰食于絳憲治新倉以儲粟絳人賴利主倉韋丹徙為江南西道觀察使有吏主倉十年丹覆其糧亡二千斛丹曰吏豈自費徙籍其家盡得文記乃權吏所奪召諸吏曰若恃權取於倉罪也與若期一月還之皆頓首謝及期無敢違收榖羡餘丹子宙為永州剌史州負嶺傳餉艱險每飢人輒莩死宙始築常平倉收榖羡餘以待乏罷並建常平倉宇文融拜御史中丞請馳傳行天下詔以客賦所在並建常平倉益貯九榖權發斂儲三百萬斛劉晏又以常平法豐則貴取飢則賤與率諸州常儲三百萬斛豈所謂有功者耶有白雀集于高豐屯廩蓋大穰之證也李翰蘇州屯田紀頌罕畜劉蕡策曰國廩罕畜本乎冗食尚繁太原廥巨萬之倉陳子昂上書稻米流脂粟米白公私倉廩與豐實杜詩憶昔積粟埋梁文粹皇甫湜吉州剌史廳記向覆官倉倉無斗糧公來幾時積粟埋梁翬飛雲矗巨廩崇創翬飛雲矗縮以板幹積如京坻得蓋藏之宜協出入之制岐公遺愛碑廣關輔之糴廣關輔之糴京師糧廩益羡粟十七萬斛皆糴於關中號為和糴憲宗即位有司以歲豐熟請畿內和糴當時府縣配戶督限有稽違則迫蹙鞭撻甚於稅賦號為和糴其實害民計墾田秋熟所在為義倉戴胄建議自王公以下計墾田秋熟所在為義倉歲凶以給民太宗善之唐史食貨志粟藏九年米藏五年唐食貨志其後洛相幽徐齊并秦蒲州又置常平倉粟藏九年米藏五年下濕之地粟藏五年米藏三年皆著于令倉儲盈衍唐史韓琬上言往年倉儲盈衍今所在空虛倉空戰卒飢韓愈詩白庫月令季春命有司開府庫出幣帛聘名士帑藏説文庫兵器所藏帑金布所藏五庫禮曰季春審五庫之量天子之庫有五藏於天下王者藏於天下諸侯藏於百姓農於囷庾商賈藏於篋司武庫漢立武庫以藏禁兵王府御府大內竊藏晉文之豎頭須守藏者及其出竊藏以逃焚臺韓詩外傳曰晉文公藏寶之臺燒三日公子晏賀山臣聞王者藏於天下諸侯藏於百姓今賦斂無已皇天降災於藏是君之福故賀之東山窺東山之府則怪實溢目充府庫周禮凡萬人之貢以充府庫貨賄之藏長府藏名白藏魏之藏名充創積滯鹿臺紂所積之附庫曰鹿臺不竭之府管子曰藏於不竭之府謂之養桑麻育六畜受藏周禮頒其資於受藏之府內府周禮內府掌受九貢九賦九功之貨賄良兵器以待邦家之大用注謂朝覲頒賜外府掌邦之出入以供百物而待邦之小用注布帛也藏曰泉行曰布小用謂賜也管庫禮記晉趙文子舉管庫之士七十有餘家府實子産曰其輸之則君府實余財武帝初府庫餘財京師錢纍百巨萬餘貫朽而不可校六府周禮天子六府曰司土司木司水司草司器司貨典司六職注府謂主藏物之稅禁庫無聚水衡錢天子私藏乘輿供養所出母將隆君房言大司農錢自供乘輿不以給供養供養勞賜一出少府蓋不以本藏給末用本藏給末用見上注五庫車庫兵庫祭器庫樂庫宴器庫大庭之庫魯自壞後漢靈帝光和庫屋自壞魚魏嘉平中魚集武庫屋上主守出納之吝謂之有司出匣虎兕出於匣龜玉燬於櫝中是誰之過與守藏委質監臨所守攸守晉侯之豎頭須守藏者也竊藏以逃孔庫委豐餘令狐彰拜滑毫節度使庫委豐餘瓊林大盈陸贄始帝播遷府藏委棄衛兵無褚衣至是天下貢進稍至乃於行在夾廡署瓊林大盈二庫別藏貢物贄諫以為瓊林大盈於古無傳舊老皆言開元時貴臣飾巧以求媚建言郡邑賦稅當委有司以制經用其貢獻悉歸天子私有之蕩心侈欲亦終以餌寇廥藏殫耗半徽改給事中留陳倉張濬伐以太原引為判官敕在所敦遣徽太息曰王室方復廥藏殫耗當協和諸侯以為藩屏而又濟之以兵諸俟離心必有後憂不肯進後濬果敗薄入謹出府庫遂實張延賞纍拜荊南劍南西川節度使自楊國忠討南蠻三蜀疲罄及乘輿臨狩糜用百出後更郭英乂崔寧楊于琳亂益矜僣公私蕭然延賞事為之制薄入謹出府庫遂實令史直曹關播再遷給事中故事諸司甲庫以令史直曹刓脫為姦播悉易以士人時韙其法倉無久儲段秀實遷涇州干時倉無久儲郛無居人朝廷患之言詔百官觀庫物楊國忠因言古者二十七年耕餘九年食今天下太平請在所出積滯變輕齎內富京師又悉天下義倉及丁租地課易布帛以充天子禁藏明年帝詔百官觀庫物積如丘山賜群臣各有差錫國忠紫衣金魚楊炎言大盈見稅門負賸季月裴延齡建言左藏天下歲入不資耗不可校請列別舍以檢盈虛於是以天下宿負八百萬緡析為負庫抽貫三百萬緡為賸庫樣物三十萬緡為季庫帛以素出以色入者為月庫帝皆從之廢內藏庫明宗廢內藏庫四方所上物悉歸之有司五代史本紀庫無尺繒文粹皇甫湜吉州剌史廳記向閲官庫庫無尺繒公來幾時山積層層諸道貢珍遽私別庫陸宣公奏議忽觀古廊之下榜列三庫之名竊揣軍情或生觖望合入官則納于其內合給用則出乎其中奏議云錢余於庫韓文王仲舒志宮庫饒豐劉文靜曰晉陽士健馬強宮庫饒豐白管庫之士見前北門之管杞子云鄭人使我掌其北門之管琅當鐵鎖鋃當長鎖橐籥老子曰天地之間其猶橐籥乎謹守管籥漢書啓籥書啓籥見書乃并是吉金縢司門周禮司門掌拔鍵以啓閉國門戒門閭修鍵閉善閉老子曰善閉者無關鍵而不可開扃鐍莊子則必攝緘縢固扃鐍孔不為扃鑰元德秀愛陸渾隹山水乃定居不為扃鑰自持管籥徐岱吝嗇自持家管籥世所議云掌六軍管鑰楊復恭見帝賜姓李名順節使掌六軍管籥納四金鑰朱滔反僣相王與正武俊田梲納四金鑰於回紇曰四國願聽命於可汗謹上金鑰啓閉出納推所命至是乞師焉銀鑿鏤鐵鎖唐酉陽雜俎安祿山恩寵莫比其所賜品目有銀鑿鏤鐵鎖掊鎖擴門及州不解衣下令掊鎖擴門悉棄倉廩與民韓文曹成王廟碑金鎖罽賓國武德二年遣使貢金鎖抱關掌管就車于司馬門外聞之於抱關掌管者柳文太學諸生書出管鑰數篋吳越世家諸將泣下皆曰元瓘從王征伐最有功請立之鏐乃出管籥數篋詔元瓘與之曰諸將許爾矣下鑰開金坊門玄宗貴妃楊氏以譴還第高力士知帝旨是夕請召妃還下鑰開金坊門馳入城門郎掌京城皇城宮殿諸門開闔之節奉管鑰而出納之武德五年置門僕八百人番上送管籥白老圃樊遲請學為圃子曰吾不如老圃折柳詩曰折柳樊圃注云樊蕃也不窺董仲舒勤學三年不窺園圃踐葵魯漆室之女曰昔有客繫馬園中馬逸踐葵使豫終歲不飽葵百畦莊子云子貢過漢陰見一丈人鑿隧抱甕而灌園子貢曰有機於此日浸百畦挈水若抽名曰桔槔丈人曰吾知之恥而不為外圃左傳孔氏之外圃九畹楚辭曰豫既滋蘭之九畹又樹蕙之百畝西園曹子建詩清夜遊西園飛蓋相追隨北園遊于北園樹果樹菜説文園樹果圃樹菜樹藝周禮二十而一周禮園廛二十而一注云以利少故二十而稅一也廛城市中空地不樹者無槨罰之樹事周禮任圃以樹事貢草木謂果瓜葵薤灌於陵子辭卿相而桂槔灌園又戴宏為河間相自免歸而灌蔬以經教授山陽餘利向秀傳曰秀與呂安灌園山陽收其餘利以供酒食之費自賃范丹學通三經常自賃灌園鬻蔬潘嶽賦序灌園鬻蔬使吏鉏治魏顏斐文材為京兆守於府下起菜園使吏役間鉏治之請美史王翦為秦伐楚請美田宅園圃悉與貧人後孝和鉏園得黃金印後漢戴異園公陳留志園庾居園中世謂之園公孔子嘗為魯乘田吏苑囿之吏九月築場圃注春夏為圃秋冬為場園有桃有棘孔市取宗室皋遷山南節度使張柬之有園圃在襄陽皋宴集將市取之馬彝曰漢陽有中興功令遺業當百世共保奈何使其子孫鬻乎皋謝曰主吏失詞以為君羞微君安得聞此言修蒔蕭嵩請老退修蒔園區延平門林園李晟賜延平門之林園我圃日蒼翠杜甫雨詩築室茨草為圃乎湘之西柳宗元送從弟謀序名園依緑水何將軍山林杜奉誠園馬燧子暢終小府監諸子無室廬自托奉誠園亭觀即其安邑里舊第治國沼林藪李簡求還東都沼園沼林藪左浮飛閣右列間館柳文訾家洲亭記抗月檻於回溪出風榭於篁中同上青林重復緑城瀰漫景龍文館記芙蓉在京羅城東南隅有青林重復緑城瀰漫蓋帝城勝景駕時幸之故園秦地杜牧望故園賦霜中登故畦杜詩百畦凡闢地南北東西若干圃百畦柳文決溪泉為圃但當把鉏荷鍤決溪泉為圃以給茹其隙則浚溝池藝樹木柳文白羝羊觸藩易折柳樊圃詩遊藩莊子曰願遊其藩藩籬之鷃授條晉書庾袞與弟了樹籬跪而授條曰幽顯易操非君子意鷦鷯長於藩籬之下鷦鷯賦云芳枳樹籬間居賦為軍傳晉楚弭兵以藩為軍注示不相疑藩籬五孔里人多造門觀賦詩至壓敗其藩楊收吳人號神童里人多造門觀賦詩至壓敗其藩收嘲之曰爾非羸角者奚用觸吾藩斥鷃笑李太白大鵬賦而斥鷃之輩空見笑於藩籬周棘扈藩薑晦除吏部侍郎主選曹吏嘗請托為姦前領選者周棘扈藩檢窒內外猶不禁至晦悉除之示無防限枳棘茅屋枳棘籬韓詩是缺是補我有藩籬是缺是補杜甫課伐木序失固文粹于公異破朱泚露布曾乏鑄刃之鋒已失藩籬之固藩籬帶松菊杜甫赤谷藩籬生野徑斤斧任樵童杜詩洞無藩籬元積册燕寇勃起洞無藩籬踸踔藩籬之際文粹李嶠上高長史重此藩籬護柳宗元商山臨路孤松詩幸逢仁惠意重此藩籬護白厚其牆垣傳數仞及肩論語耳屬于垣藏書魯恭王壞孔子舊宅於壁中得古文尚書皆科斗文字環堵之室循牆而走正考父有茨牆有茨不可掃茨蒺藜也蔽惡叔孫曰人之有牆蔽惡也牆既壞誰之咎注咎在牆以禦風雨以避燥濕大為之防猶有踰者高墉射隼高墉既勤垣墉惟其塗蔇茨牆面不學牆面勿仞漢書牆藩勿仞三尺周禮牆厚三尺崇之注云高卑為率足以相稱短垣國語曰君有短垣而自踰負牆子貢負牆而起郤壞牆之郤壞百堵皆作制淮南子舜作室築牆茨屋令人皆知去巖穴各有家室此其始也相如成都唯四壁負牆而立奢侈雕牆尚書峻宇雕牆傳曰晉靈公不君厚斂以雕牆不露形土被朱紫並文選椒塗取其溫香粉壁紫素漢官儀郎省中皆胡粉塗壁紫素界也黼繡漢書黼繡古天子服也今商人大賈嘉會召客者皆用以被牆金銀後漢琅玡王好治宮室殿壁皆飾以金銀牆藩甘泉賦電倏忽於牆藩以琉璃為牆南州異物志大秦國築牆登登築之登登用力也百堵之子于垣百堵皆作版築高卑溥厚廣袤數仞之制一簀之功啓塞從時城郭垣塹謂之塞皆隨其壞則治不限土功之時平版幹稱畚築程土物略基址土物既程高卑是揣計徒庸順時屬役其繩則直縮版以載以索縮其板上下相承垝垣毀牆葺壞葺牆傳曰繕完葺牆一日必葺叔孫所居館罐一日必葺其牆屋百堵皆興見上注騫崩阤陊糞糞土之牆不可朽也圬人傳圬人以時塓館宮室圬人塗者塓亦塗也塗塈塈泥也見上毀垣積墉壞牆垣月令孟秋穿窬穿窬之盜鑿壁匡微讀書無蠋鑿鄰家壁因燭以照之穿墉誰謂鼠無牙何以穿我墉踰垣而走鄰女宋玉東鄰女登牆而窺者三年矣連牆列子師壺丘子林友伯昏瞀人交居東郭與南郭子連牆二十年不相謁請相遇於道及肩屬耳被誅齊莊公私崔杼於室牆下被誅無踰我牆詩短垣君有短垣而自踰之踰書曰踰垣牆竊牛馬則有常刑乘彼垝垣孔盛夏治垣王遂盛夏治署舍牆垣程督慘峭環堵庳陋盧懷謹卒帝後還京因校獵樗社間望懷謹家壞堵庳陋家人若有所營者馳使問焉還白懷謹大祥帝即以縑帛賜之梯牆出首賀知章遷太子右庶子充侍讀申王薨詔選挽郎而知章取捨不平蔭子喧訴不能止知章梯牆出首以決事人皆靳之鐵簪畫壁漢陽公主常用鐵簪畫壁記田租所入不為牆垣元德秀不為牆垣負牆立于家童上變詔捕頔吏沈壁及它奴送御史御史獄頔與諸子素服待罪建福門吏不納屏營負牆立牆置耳九國志吳崔太初多疑好察每通街交會之所牆必置耳謂人曰還聞牆有耳否非牆耳乃吾耳行路人鮮敢偶語粉堵丹色輝粉堵杜牧開元寺詩大壁曠凝淨韓愈納涼聯句椒壁懸錦幕杜甫杜秋娘詩短垣三面繞逶迤韓愈泗汴交流疥壁酉陽雜俎大曆末禪詩玄覽住荊州陟屺寺道高有風韻人不可得而親張璪嘗畫古松於齋壁符載譖之衛象詩之亦一時三絶覽悉加堊焉人問其故曰無事疥吾壁也重關復壁李林甫所居重關復壁左壁頽剝蔣乂帝嘗登凌煙閣視左壁頽剝題文漫缺行才數字命録以問宰相無能知者遽召乂至答曰此聖曆中侍臣圖贊帝前口以誦補不失一字運土塞路不充牆壁辛替否諫造佛寺疏竇七白宮中之竇其崇三尺周禮考工記圭竇傳華門圭竇之人皆陵其上逃出自竇有過氏滅夏后相后緡方娠逃出自竇大竇先王之大竇孔食自竇進劉季述囚帝少陽院食自竇進爭水竇于嶠詆訾趙鳳鳳心銜之而未有以發而嶠與鄰家爭水竇鳳由是左遷嶠蛇竇梟驚墮梁蛇走竇韓愈乾竇逍遙越坤位詆訐陷乾竇南山詩私開四竇澤不及下涇田獨肥高陵令劉君請杜私竇使無棄流請遵田令使無越制劉禹錫泄水脈白公春遊陰竇泄水脈一竇之泉一竇之泉其音清也茲吾方在懸得乎人得乎天吾不知所以然笠澤叢書不得謁面陸宣公貶忠州土塞其門家人臣於狗竇中州將不得謁面芝田録引泉竇以滌塵垢文粹許堯佐東林寺碑旁引泉竇以滌塵垢齊映自竇出張鎰撫盧龍楚琳亂軍司馬齊映自竇出免生魚上元二年秋霖雨連月渠竇生魚志竹竿接嵌竇引注來鳥道杜甫園人送瓜詩引泉開故竇柳宗元詩嵌竇潛泄瀨杜甫詩遠川通曲流嵌竇潛泄瀨從水竇入梁臣劉鄩梁已破朱瑾等悉有袞鄆以葛從周為袞州節度使從周將兵在外鄩乃使人負油鬻城中悉心視城中虛實出入之所由者得羅城下水竇可入鄩乃以步兵從水竇入襲破之白夷灶傳塞井夷灶居灶觚仲尼讀春秋老聃踞灶觚聽之灶觚額也媚灶王孫賈曰與其媚於奧寧媚於灶騷除史記李斯曰灶上騷除萬世一時也騷音掃減孫臏減灶增虞詡增灶曲突漢書曲突徙薪無恩澤向栩後漢向栩性不恆又似狂坐於灶北版屋上避灶莊子云煬者避灶風吹李南少明風角女見疾風卒起吹灶突及井泣辭白姑此主爨者當之果卒也生蛙戰國策曰智伯攻晉陽而水之城不沒者三版臼灶生蛙人馬相食無黔突墨子灶銘李充曰燧人造火灶五突魯連子灶五突分煙者衆矣祭灶禮有五祀灶居一焉孟夏其祀灶祭先肺陽氣盛熱外祀之於灶從熱類也老婦之祭禮曰灶者老婦之祭盛於盆尊於瓶注老婦先炊器也祭灶以祭先炊也燔柴於爨非禮也時多失禮燔於灶祀火神失祀灶之義孫寶後漢張忠署孫寶為主薄遂祭灶請比鄰臘日後漢陰子方臘日晨炊而灶神見黃羊因祀之三世至識繁昌遂當以臘日祭也風吹風吹灶神主婦當死庶人祭灶天子親祠李少君言祀灶皆可致神而丹砂可化為黃金黃金成以為器飲食則益壽壽益則海中蓬萊仙者皆可見之封禪則不死黃帝是也於是天子親祠灶焉又抱朴子曰孟夏可以祠灶灶神每月晦日上天言人罪狀大者奪紀小者奪算紀三百日算一百日孔茶灶陸龜蒙升舟齎束書茶灶筆床釣具往來作灶堂中東夷新羅冬則作灶堂中廚灶無青煙李白玉真公主別館詩不燭貧新不燭灶韓愈秋雨聯句詩井灶任塵埃杜甫詠懷炊稻烹鯉白公舟行詩床頭有行灶炊稻烹紅鯉列三四灶王彥伯醫既著列三四灶煮藥於庭老幼塞門來請彥伯指曰熱者飲此寒者飲此風者氣者飲此皆飲而去出唐語林壤子灶神名出酉陽雜俎灶有馬狀如促織穴於灶側俗有謂灶有馬足食之兆酉陽雜俎擇日以祀灶之煬者請新之又請擇日以祀之曰灶在祀典聞之舊矣祭法曰王為群姓立七祀其七曰灶達於庶人立一祀或立戶或立灶飲食之事先自火化生民以來賴之孫樵文灶鬼以時録人功過此出漢武時方士之言室暗不欺屋漏不愧雖歲不一祀其誣我乎同上灶神名隗狀如美女酉陽雜俎灶神名隗狀如美女又姓張單字子郭夫人字卿忌有六女皆名察竹齋燒藥灶杜甫寄高岑詩丹灶熾東序元稹白肇牽車牛同軌車同軌以爾車來詩大車轞轞載馳載驅不馳不驅有車轔轔脂轄巾車巾車王車官也流水漢書車如流水馬如龍立而至秦慎子曰行陸者立而至秦有車任重致遠百兩之子于歸百兩御之十乘元戎十乘以先啓行棘軸史記狶膏棘軸所以為滑也不能運方穿任載持重致千里莊子曰軸不運而致千里載物服箱公車車周禮巾車掌公車之政令公官也退與人謀周禮輈之和也進則與馬謀退則與人謀注云言車進退之易與人馬之意相應此為輈之善所致也勸和馬力言輈和勸馬用力一取周禮馬力既竭輈猶能一取焉象天地日月軫之方象天蓋之圓象地輪輻丹象日月牽傍車轅之外挽牛曰牽傍乘殷之輅命車九命三命而賜車馬也禮獻車獻車馬者執策綏禮暢轂詩文茵暢轂謂長轂也有棧之車行彼周道役車其休庶人車也言農功畢匪車朅兮疾車五楘梁輈梁輈上鈞衡長者轍陳平門多長者轍魚軒蓽路柴車車甚澤澤美也鍥軸陽虎盡借邑人之車鍥其軸鍥刻也借車見上爭車公孫閼與穎考叔爭車考叔挾輈以走子都逐之不及輦車駕輦五輅金輅玉輅象輅革輅木輅夏縵卿乘也黑車大夫乘棧車士車役車庶人車行陸作車以行陸察車自輪始一器而工聚者車為多推轂漢書還轅輿不及還轅轂擊車馳轂還擊六飛袁盎曰陛下馳六飛熊軾後漢列侯伏熊軾皂蓋虛左魏公子乘車虛左自迎侯生戲車衛綰以戲車為郎驢車張楷公超家貧無業常乘驢車至市賣藥足給而還又蒯子訓常乘驢車上殿魏鍾繇有膝疾拜起不便時華歆亦以高年有疾帝皆使乘輿上殿一馬鮑宣子都為豫州牧郭欽奏宣行部乘傳去法駕駕一馬舍宿卿亭坐免罪賜車蓋黃霸字次公任楊州剌史宣帝下詔賜車蓋特高一丈別駕主簿車緹油屏泥於軾前以章有德褰帷見剌史門葦車袁閎夏甫為沛相乘葦車柴車謝夷吾堯卿遷巨麟守行春乘柴車剌史上其儀序失中損國典左遷為下邳令羊車晉輿服志護軍羊琇輒乘羊車司隸劉毅劾其罪官給太康四年詔依漢故事給九卿朝車駕駟馬及安車各一乘詔諸尚書軍校加侍中常侍者皆給傳車給劍得入殿省與侍臣相隨雨隨車漢百里嵩事見兩門注牛車漢初將相或乘牛車乘入宮殿車千秋年老上憂之朝見得乘小車入宮殿因號車丞相德車結旌德車乘車也結謂收斂不飾車中不內顧舍車而徒易造車轉蓬淮南子聖人觀轉蓬而為車椎輪文選夫椎輪為大輅之始大輅寧有椎輪之質伐輪坎坎伐輪伐輻有車之用三十輻共一轂當其無有車之用象日文子曰轉輪而無窮象日月之運行輪轅之材文選遵途合轍季材稚材也以柔刃故為車也作車以行陸聚工一器而聚工者車為多朴屬凡察車之道欲其朴屬不朴屬無以為完久微至不微至無以為蹙速也注謂輪圓甚則著地微少也蹙速疾行貌三材輪人為輪斬三才必以其時三材既具巧者和之注三材轂輻牙利轉轂者以為利轉也輻者以為直指也牙者以為固抱也牙音訝謂車網幎爾莫歷反輪貌掣爾音消輻貌皆謂其美容轂必直轂之為容取之於直楺楅必齊揉以火矯之取之於直杼以行澤侔以行山凡為輪行澤者欲杼之行山者欲侔之杼以行澤則是刀以割塗故塗不附侔以行山則是槫以行石也輪雖弊不甐於鑿鑿徒端反注杼謂削薄也侔厚也槫亦厚也弊畫也甐動之也平沉必均謂以輪沉於水考其輕重四平輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有二寸軸有三理一者為美無節目也二者以為久堅刃也三者以為利滑密也揉輈凡揉輈欲其遜而無弧深輈欲頎典頎若很反典讀為殄輈欲弧而無折經而無絶太深則折經亦謂順理也進則與馬謀退則與人謀勸登馬力注登上也謂輈和勸馬用力也馬力既竭輈猶能取焉注正馬取道喻易進人謀馬謀契需衽斃軫方軫之方以象地蓋之圓以象天周禮奚仲薛相奚仲居薛以為夏車正掌車之官庳車使高史記孫叔敖為楚相俗好庳車楚王以為不便馬欲下令使高其車相曰令數下人不知所從王必欲高車臣請教閭里使高其捆乘車皆君子君子不能數下車從之半歲民悉自高其車此不教而人從化也司南車記里車晉輿服志司南記里諸車過江亡失制度而謝安率意造焉及獲京師舊輦形制無差千里振策終不契需五馭和鸞罕能反覆既勸登於馬力亦退與於人謀美車服美不稱傳曰慶季之車不亦美乎叔孫曰服美不稱必以惡終美車何為美澤可鑑慶封獻車於季武子美澤可鑑展莊叔見之曰車甚澤人必瘁宜其亡也不飾闔廬舟車不飾儉也七香五雲並美車名如輊如軒詩戎車既安如輊如軒疾驅於通道大都詩序載驟駸駸詩過國如歷塊晉阮裕有好車有人葬母意欲借不敢言裕聞歎曰有車使人不敢借何以車為遂命焚之紺轅翠轂車不雕幾謂國家靡弊也周禮鮮車後漢向裕甫興狀若狂生好被髮裸足或騎驢入市乞丐後徵拜趙相及之官時人謂其必脫素從儉而栩更乘鮮車御良馬世疑其始偽也宜稱朱轓漢詔吏者人之師也車服宜稱六百石以上皆長吏也而與民無異令二千石朱兩轓千石至六百石朱左轓流水馬皇后見親戚車如流水馬如龍甚不悅茱萸輞石崇作及白槐之輻黜車子駟黜豐止車曰爾非禮也注過制覆破僨濟鄭伯之車奔于濟僨風飄入濟水也載輸爾載詩曰載輸爾載輸墮也棄爾輔詩曰其車既載乃棄爾輔無輗論語脫輻傳車脫其輻不利行師説輹易曰輿説輹摧輪魏武帝時北登太行山羊腸阪詰曲車輪為之摧前覆後戒漢書前車覆後車戒或載或隳老子折軸史記群輕折軸毀折周禮謂車損也弊車故弊之車勞薪荀勗食知破車腳為柴恥弊車見同載門將泛駕泛覆也中道而廢輔車既不相依脫輻如何前進同載同載而歸文王得呂望為師乃同載而歸虛左以迓信陵君聞侯嬴乃虛左以迓執轡親御共載均茵憑汲黯與周陽由同列共車未嘗敢均茵憑惠而好我攜手同車恥弊車董允少與費禕齊名許靖喪子允父和與禕同會其葬父和遣開後鹿車給之允有難色禕便前上和謂允曰始吾嘗疑汝於禕而今而後吾意了矣兄弟也張骼謂宛射大曰公孫同乘兄弟也注云同乘之恩若兄弟也監令晉和嶠為中書令荀勗為監舊監令同車嶠嫉勗諂乃先登專坐不容勗勗乃自備車自此始異車王徽之嘗從恆沖行遇雨因下馬排入沖車謂曰公豈獨擅一車獻帝與趙溫同車後漢獻帝西都與侍中趙溫同輿輦至長安封江南侯為司空溫字子柔太子不與同姓同車與異姓同車不同服禮以朝服異也夏侯惇魏太祖與夏侯惇同車載諸將無得比也戎車十乘元戎十乘以先啓行左輪朱殷小戎戎車輕車即戎輕車疾者以即戎同禮也不鬻禮兵車不中度不鬻於市不式兵車不式尚威武也武車綏旌綏謂張也武車兵車戰車晉馬隆孝興討羌依入陳圖作偏箱車地廣為鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應絃而倒使車埋輪張綱為御史在入使之中埋輪於洛陽都亭云豺狼當道安問狐狸遂劾梁異也使者車軺車並使車攬轡慨然有澄清天下之志軺傳晉輿服志軺車古之將軍車也一馬曰軺車二馬曰軺停車漢貴輜軿而賤軺車晉重軺車而賤輜軿聘車翹翹車乘招我以弓豈不欲往畏我朋友軟輪蒲輪安車公車為駕漢龔勝曰竊見國家徵筮巫皆備駕徵賢者亦宜為駕上曰大夫乘私車來耶勝曰唯唯無車彈鋏馬援彈鋏歌曰長鋏歸來乎出無車徒行語顏回死顏路請子之車以為之槨子曰以吾從大夫之後不可以徒行蔡誼以明經給事大將事幕府無車嘗步行衆門下好事者相合為買犢車借車借車東方朔為尚書從公孫弘借車借邑人車陽虎囚於西鄙盡借邑人之車鍥其軸麻約而歸之注鍥刻也走馬車入國不馳馳若藺人恤勿驅禮記國中以策篲恤勿驅塵不出軌注謂不馳也子有車馬弗馳弗驅塵不出軌見上注長楸詩走馬長楸閭馳騁知村蹍市人之足莊子蹍市人之足則辭以放傲兄則傴大親則已矣章臺街張敞為京兆尹走馬章臺街馳六飛袁盎曰陛下馳六飛賭逐射田忌數與齊諸公子馳逐重射孫子曰臣能令君勝與君及公子賭千金孫子曰以君之下駟與彼上駟君以上駟彼以中駟君以中駟彼以下駟卒得王千金過華臣之門必騁怒馬注林楚及衢而騁孔乘小輿濮恭王泰帝以泰大腰腹聽乘小輿至朝金根趙國莊懿公主下嫁魏博節度使田緒厭翟敝不可乘以金根代之易銅萬壽公主下嫁鄭皓舊制車輿以鐐金為飾帝曰我以儉率天下宜自近始易以銅命升金輅裴寂太宗命寂與長孫無忌升金輅寂辭帝曰公有佐命勳無忌宣力王室非二人誰可參乘者遂同載歸步輿李綱以足疾賜步輿聽乘至閣登輿夾待李多祚帝祠太廟特詔多祚與相王登輿夾侍肩輿入殿房元齡病稍間召許肩輿入殿肩輿以朝韋思謙轉納言辭疾不許肩輿以朝聽子孫侍三衛挾輿襄邑恭王神符以足不良太宗令乘小輿入紫微殿三衛挾輿以升肩輿至中書崔祐甫被疾詔肩輿至中書臥而承旨許乘入殿中褚無量復故官以耆老隨仗聽徐行又為設腰輿許乘入殿中一乘賈敦頤入朝常盡室行車一乘弊甚不知其剌史也以牛駕車劉子玄皇太子將釋奠國學有司具儀從臣著衣冠乘馬魏晉後以牛駕車江左尚書郎輒輕乘馬則御史劾治顏延年罷官乘馬出入閭里世稱放誕此則乘馬宜從褻服之明驗宦士肩舁以見李叔明後朝京師以病足賜錦輦令宦士有舁以見七寶輿崔寧嚴武奏為漢州剌史吐蕃引雜羌寇西山於是武遣寧將而西既薄賊城城皆纍石不得攻惟東西不合者丈許諜知之乃為地道再宿而拔拓地數百里虜衆驚相請曰寧伸兵也及還武大悅裝七寶輿迎入成都以誇于車朱輪華榖武平一上言臣一宗階三等家數侯朱輪華轂過許史梁鄧遠甚送車二乘陸長源為汝州剌史送車二乘曰吾祖罷魏州車一乘而圖書半之吾魏不及先人云紅網朱網畫香車楊復恭帝問遊幸費對曰聞懿宗以來每行幸無慮用錢十萬金帛五車十部樂工五百犢車紅網朱網畫香車百乘諸衛士三千凡曲江溫陽若田獵曰大行從宮中苑中曰小行從帝乃詔類減半軿車五代史王出入閭里乘輜軿車錦車繡與李蔚傳咸通十四年迎佛骨鳳翔京師錦車繡輿載歌舞從之乘黃金輿黃巢乘黃金輿衛者皆繡袍華幘陷京師入自春明門牛不能引明皇雜録上將幸華清宮貴妃姊妹競飾車服各為一犢車展以金翠間以珠玉一車之費不啻數十萬既成甚重而牛不能引醉輿申王每至冬月醉即使宮妓將錦綵兜子舁歸寢室本宮呼醉輿出開元遺事雙轂長轅礙荊棘緣岡入澗投田家張籍羈旅行輕轂韋蘇州車鬥風元稹連昌宮鈿車珠映托言三輪車蜀林知元所居有茂林修竹為山石之娛嘗駕三輪車命僮牽之隨意所止九國志大車揚飛塵亭午暗阡陌李白古風凡天子之車唐車服志凡天子之車曰玉輅者祭祀納後所乘也青質玉飾未金輅者鄉射祀還飲至所乘也亦質金飾未象輅者行道所乘也黃質象飾末華輅者臨兵巡守所乘也白質鞔以革木輅者搜田所乘也黑質漆之五輅皆重輿左青龍右白虎金鳳翅畫龍文鳥獸黃屋左纛金鳳一鈴二在軾前鸞十二在衡龍輈前設鄣塵青蓋三層繡飾上設博山方鏡下圓鏡樹羽輪金根朱班重牙左建旗十有二旒畫升龍其長曳地青繡綢杠右載闟戟長四尺廣三尺黻文旗首金龍銜錦結授及緌帶垂鈴金鍐方釳押翟尾五焦鏤錫鞶纓十二就旌旗蓋鞶纓皆從路質唯蓋裏皆用黃五輅皆有副耕根車者耕籍所乘也青質三重蓋除如玉帑安車者臨奉年乘也金飾重輿曲壁紫油纁朱里通幰朱絲絡網朱鞶纓朱覆髮貝絡駕赤駢副輅耕根車安車皆八鸞四望車者拜陵臨弔所乘也制如安車屬車十乘一曰指南車二曰記里鼓車三曰白鷺車四曰鸞旗車五曰辟惡車六曰皮軒車七曰羊車與耕根車四望車安車為十乘行幸陳于鹵簿則分前後大朝會則分左右皇后之車六重翟車厭翟車翟車安車四望車金根車皇太子之車三金輅軺車四望車親王及武職一品有象輅青油纁朱裏通幰朱絲絡網二品三品有革輅朱裏青通幰四品有木輅五品有軺事皆碧裏青偏幰象飾朱班輪八鸞左建旗畫升龍右載闟戟革輅木輅左建旃軺車曲壁碧裏青通幰諸路朱質朱蓋朱旗朱班輪一品之旃九旒二品八旒三品七旒四品六旒鞶纓就亦如之三品以上珂九子四品七子六品以下去通幰及珂王公車輅藏于太僕受船册行册命巡陵昏葬則給餘皆以綺代車以上並車服志衆車之用具任而安之者箱達而行之者輪常中者軸捐而固者蚤長而撓進不罪乎馬退不罪乎人者轅卻暑與雨蓋敬而可伏者軾服而制者馬若牛然後衆車之用具柳文説車高以遠乎污若蓋下以成乎禮若軾其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎內若軸搹之以剛健若蚤引焉而宜御乎物若轅高以遠乎污若蓋下以成乎禮若軾險而安易而利動而法則庶乎車之全也車畜雷杜甫朝獻大清宮賦名馬工車叛巨贊蒼頭女奴名馬工車惴惴常畏捕取乘庳車舍他所宋璟張易之初冀璟出則劾奏誅之計不行乃伺璟家婚禮將遣客剌殺之有告璟者璟乘庳車舍他所剌不得發白濟巨川若濟巨川用汝作舟楫書藏夜壑莊子夫藏舟於壑謂之固矣然而夜半有力者負之而走昧者不知汛彼柏舟在彼中河一葦誰謂河廣一葦航之汛汛楊舟載沉載浮神仙後漢郭林宗自京師歸諸儒送至河上林宗唯與李膺同舟而濟衆賓望之以為神仙坐而至越慎子曰行海者坐而至越有舟故也鷁舟淮南子龍舟鷁首青雀舟名鳥舟七命曰乘鳥舟兮為水嬉艅艎吳王敗楚獲吳之乘舟名艅艎不繫汛兮若不繫之舟任重致遠篙工楫師榜人水行老子利涉大川涉川行海川惟設險舟以濟人持載一葉桂葉舟千艘萬舸臭厥載書曰若乘舟汝不濟臭厥載行舟書罔水行舟言丹朱無道習於無水行舟荃橈桂棹蘭枻並見楚辭布帆錦纜檜楫松舟作舟以行水周禮虛舟莊子同舟而濟胡越何患乎異心容舠誰謂河廣曾不容舠小船舳艫千里繒帛維舟吳甘寧輕俠以繒帛維舟去則割棄之以示奢也紼纚維之乏泛楊舟弗纚維之隱遁乘桴子曰道不行乘桴浮于海扁舟句踐既滅吳范蠡乘扁舟泛五湖仙槎海客犯午斗野人之船晉郭翻字長翔乘小船歸武昌安西將軍庾造之以其船狹小就引大船翻曰使君不以鄙賤而辱臨之此固野人之船棹船漢鄧通以棹船為黃頭郎土船晉書曰昔武落鍾山崩有石穴二其一赤如丹其一黑如漆有一人出赤穴者名務相出黑穴者凡四姓又五姓爭為神以土為船雕畫之浮者以為廩君務相船獨浮遂稱廩君船相避虞翻仲翔行逢麋芳人謂翻避將軍船翻曰失忠與敬何以事君傾人二城稱將軍可乎芳闔戶不應刻舟求劍孝廉船劉恢真長為丹陽尹張憑長宗詣恢恢留宿明旦還船須臾恢出傳教見張孝廉船召同載之為梁詩造舟為梁操舟莊子顏回問仲尼曰吾嘗濟平觴深之泉津人操舟若神吾問曰操可學乎曰可善遊者數習而後能金人乘船瑞圖王者德茂則金人乘船遊王後池泛棹扣枻輕枻縱枻稱象蒼舒以舟稱象得失韓子曰千鈞得舟則浮錙銖失舟則沉非千鈞輕而錙銖重有勢之與無勢舟非水不行水入舟則舟沒君非民不治民犯上則君危造舟刳木易曰聖人刳木為舟剡木為楫以濟不通以利天下五覆月令季春命有司覆舟五覆五反乃告舟備天子乃乘舟不飾闈廬舟車不飾乃告舟備見上注舳艫千里舟之前後落葉古者觀落葉因以為舟作舟以行水修艦晉王濬拜益州修艦作大船連舫方一百二十步受二千人為城起樓櫓四門其上皆馳馬往來又畫鷁首怪獸於船首以懼江神舟楫之盛自古未有造船於蜀柿蔽江而下將伐吳造舟為梁吳子觀舟左氏曰吳伐越獲俘以為閽使守船吳子餘祭觀舟閽人以刀殺之戰船焚舟秦伯伐晉濟河焚舟戈船漢武作昆明池以習水戰中有戈船樓船百般上建樓櫓戈矛四角垂幡髦旌葆麾蓋樓船漢楊僕征南越為樓船將軍青龍飛燕戰艦名蒼鷹赤雀鐵軸牙檣並戰船名船械晉朱伺擊賊開諸船底以水淹之名船械伺傷退人船從底沉行五十步乃逸以運船為戰艦陶侃以運船為戰艦或言不可侃曰以官物討官賊試船沒見溺門覆船覆舟家語夫水所以載舟亦所以覆舟懼齊侯與蔡姬乘舟于囿蕩公公懼變色禁之不可載沉載浮魚吞鯨魚吞舟風波漢書渡江河無楫中流而遇風波船必覆之積羽沉舟史漂蕩沉溺顛覆膠舟御船五覆始乘月令季春天子命有司覆舟五覆五反及告舟備具于天子焉天子始乘舟有司船官也覆反者慎之至也魚跳武王伐殷有白魚跳入王舟龍負夏禹南渡江黃龍負舟濟汾泛樓船汾河漢武帝諫御船漢成帝酎祭出便門欲御樓船薛廣德諫宜從橋免冠曰陛下不聽臣言臣自刎以血污軍輪上乃止試御舟遇風波見溺門開水路鑿雜堆溝洫志蜀守李冰鑿離堆穿二江城都中皆可船行百姓享其利往往引水溉田引渭水鄭莊當時引渭水渠傍南山下漕粟為便上為然乃穿三歲方通通褒斜溝洫志有人上書欲通褒斜道反漕言褒水通沔斜水通渭可以船行漕漢中上發數萬人作褒斜而水多湍石不可漕也開漕引擘華山擘山以通河流鑿砥柱大禹鑿砥柱為三門濬川之功泛舟之利揣高卑議遠近舟師造戰船見上注孔舟艦相屬李績翟讓為盜往從之説曰宋鄭商旅之會御河在中舟艦相屬往邀取之可以自資五百艘閻立德即洪州造浮海大航五百艘遂從征遼幾壞歸崇敬册立新羅使海道風濤舟幾壞衆驚謀以單舸載而免答曰合共舟數十百人我何忍獨濟哉少選風息競渡舟張仲方帝時詔王播造競渡舟三十艘仲方見延英論諍堅苦帝為減三之二樓艦韓滉遷浙東西觀察使造樓艦三千柁以舟師由海門大閲至申浦乃還以二小舸趨官楊收貶端州司馬吏具大舟以須收曰方謫去可乎以二小舸趨官以舟千二百柁入蛉子湖楊行密封吳王天祐二年王彥章李德誠拔潤州殺安仁義以王茂章為潤州團練使聶彥章等率舟師伐殷攻嶽州許德勳詹佶以舟千二百柁入蛉子湖𤥡山之南為木龍鎖舟夜徙三百舸斷楊林岸彥章入荊江將趍江陵佶躡之德勳以梅花海鶻迅舸進斷木龍舟蔽江車弩亂髮執彥章溺死萬人殷釋彥章還德勳謂曰為我謝吳王僕等數人在湖湘不可冀也巨艦堂皇悉備戒汭青州人天復三年帝詔淮南節度使楊行密圍鄂州朱全忠使韓勍救之諷汭與馬殷當彥威掎角汭身自將而行為巨艦堂皇悉備仃至公安卜不吉欲還楊師厚曰公舉全軍中道還何以見百姓汭乃行野艇才留野艇語浮家泛宅張志和顏真卿為湖州剌史志和來謁真鄉以舟弊漏請更之志和曰顧為浮家泛宅往來茗霅間辨捷類如此拏野人船張伯儀李希烈反賊追及奮力以御之兩刃相嚮不得下會救至免至漢水拏野人船以達沔州索民挽繂何易于為益昌令縣距州四十里剌史崔朴常乘春與賓屬泛舟出益昌旁索民挽繂易于身引舟朴驚問狀易于曰方春百姓耕且蠶惟今不事可任其勞朴愧與賓客疾驅去著宮錦袍坐舟中李白嘗乘月與崔宗之自采石至金陵著宮錦袍坐舟中旁若無人泛舟飲餞歐陽詹泉州晉江人常袞罷宰相為觀察使詹與羅山甫同隱潘湖往見袞袞奇之辭歸泛舟飲餞獲鬥艦千艘蕭銑遣將文士引拒孝恭戰清江口孝恭大破之獲鬥艦千艘泛舟海池尉遲恭隱太子死時帝泛舟海池秦王命恭不解甲趍行在帝驚曰今日之亂為誰爾來何耶對曰秦王以太子齊王作亂舉兵誅之恐陛下不安遣臣宿衛帝悅與侍臣泛舟苑池閻立本初太宗與侍臣泛舟苑池見異鳥容與波上悅召立本侔狀請御船韋安石中宗幸安樂公主池主請御船安石曰御輕舟乘不測非帝王事乃止鶩沒鑿舟高仁厚陳敬暄與仁厚謀曰秀升未禽公能破賊當以東川待公詔拜行軍司馬仁厚聞賊儲械子安皆在屯乃以鋭兵瀕江伐木頽水礙舟道負岸而陳使遊軍逼賊久不戰則夜以千卒持短刀強弩直薄營火而譟之秀升率舟兵救火仁厚使人鶩沒鑿舟皆沉拏飛艫入其軍張雄傳馮弘鐸大敗收殘士欲入海行密懼復拒遣人迎犒東塘好謂曰兵有勝負今衆尚強乃自棄于海奈何吾府雖隘尚可以居若欲楊州我且讓公弘鐸舉軍盡哭行密拿飛艫不持兵入其軍執弘鐸手慰勉遂以歸龍舟畫舸前蜀王衍乾德二年北巡狩至于西縣其還也自閬川浮江而上龍舟畫軻照耀江水輕艫循流下安祿山之還至淇門輕艫循流下萬夫挽繂而助日三百里舟楫皆飾金寶南蠻驃帛舫水嬉許景先為刺史治號州有治行詔宰相盛具奏太常樂帛舫水嬉綵艦順宗為皇太子侍宴魚藻宮張水嬉綵艦宮人為棹歌衆樂間發德宗歡甚顧太子曰今日何如太子誦詩好樂無荒以為對輕艫緩棹權德輿歧國公郊居記輕艫緩棹沿洄上下凌風舸唐杜陽編處士元藏幾達滄洲既久忽思中國洲人遂制凌風軻以送之激水如箭不數日達東萊大艎偶舫帝決取虜故詔越州都督治大艎偶舫以待出唐高麗傳齊山絶海荊南成汭造巨艦一艘三年而成號曰和州載又有齊山絶海之名華狀可知出托言警舟劉子浮于汴涉淮而東亦既釋紼纚楞人告子歸方今湍旱而舟檻宜謹其備以虞焉繇是袽以塞之灰以墐之𠠘以乾之警舟偃檣弭棹偃檣弭棹次于準陰同上小舟若鳧鴈大舟若鯨鯢李白送族弟詩舟艫津湊張延賞傳連檣挾櫓韋堅遊舸羅洪信棹歌搖艇月中尋李白江上煙艇杜甫軒輊泛浮亦有輕舟軒輊泛浮劉禹錫望楚賦竹葉舟陳季卿家于江南舉進士不成常訪僧于青龍寺遇僧它適有終南山翁亦候僧歸東壁有寰瀛圖季卿乃尋江南路而長嘆曰得自渭泛河達于家亦不悔山翁笑曰此不難致命僧僮折階前一竹葉作舟置圖上季卿熟視久之稍覺渭水波浪一葉漸巨席帆既張恍然若登舟旬餘至家一更復登舟泛江遵舊途而去復遊青龍寺見山翁尚擁褐而坐季卿曰非夢乎山翁曰六十日當自知爾後季卿妻子自東南奔來謂季卿猒世矣妻曰某日歸是夕題詩於西齋及留別二章始知非夢出異聞實録人疑天上坐樓船水淨霞明兩重綺李白江上贈竇長史聞道青雲貴公子錦帆遊戲西江水人疑天上坐樓船水淨霞明兩重綺利楫馳深鼓利楫韓愈遠遊
