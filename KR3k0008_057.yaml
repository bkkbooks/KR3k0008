body:
  text: 卷第五十七白挈畚以令糧周禮峙乃糗糧無敢不供尚書費誓虢不畜也亟戰將饑傳室如懸磬野無青草盛餱糧晉令諸侯供其資糧扉屨扉草屨也楚莊伐庸自廬以往振廩同食振發也同食上下無異歸粟于蔡以周亟矜無資晉荀首如齊逆女宣伯餫諸榖野饋曰餫卜式請半家財以助邊飛芻挽粟主父偃曰秦使天下飛芻挽粟負海轉輸率三十鐘而致一石注引車船飛挽言疾率鐘致石見上注給餉餽不絶糧道吾不如蕭何海陵之倉枚乘曰轉庾之粟不如海陵之倉贏糧景從贏擔也言如影隨形贏三日之糧日中而趨百里魏氏武卒衣三屬之甲負戈弩于其上贏三日之糧日中而趨百里中選者復其戶注日中謂一日之中刑法志云僦五致一水運通利後漢虞詡字升卿為五都奮擊差先是運糧難澀驢馬負載僦五致一詡燒石翦木開漕以人僦直於是水運通利鄧禹西征糧乏王丹率宗族上麥二千斛見糧魏志張既曰軍無見糧以敵為資小斛魏太祖嘗賦廩粟不足私請主者主者曰以小斛足之後軍中言太祖欺衆乃謂主者曰借君死以厭衆乃斬之以徇曰用小斛主者罪之運者相率杜畿為河東太守魏祖征漢中遣五千人運運者相率曰勉之人生有一死不可負我使府君無一人逃亡得人心也如此濟河論鄧艾字士載為尚書郎大積軍糧又通漕運乃著濟河論以諭正始中開廣濟渠下達江淮資糧者儲之無水害運糧為最鄭渾為京兆尹大軍入漢中運糧為最遣人由漢中無逃叛者木牛流馬蜀志諸葛亮由斜谷道作木牛流馬以運據武功五丈原斬太守吳志孫堅字文臺討董卓至南陽太守張資不運軍糧主簿入白堅軍資不具稽停義兵堅僞疾咨省之遂拔劍斬於軍門師不宿飽千里餉運裹糧泛舟之役秦輸晉粟不積九年之儲奚備千金之費衣賜式兵部式給賜者用所在官庫絹布相兼其軍每年得賜者不在別給時服限其賜每年隨庸調預支諸應有知發軍處所司與兵部計會量支當年庸調及腳價留本州便克兵賜又度支式供軍道次州郡軍無物者每年支庸調及租并腳並納本州如當州不足以餘州應入京庸調便配重裘挾纊軍糧格倉部格諸處不得擅用兵賜及軍糧縱令要用亦須遞表奏聞乏軍興律擅興律諸法軍興者斬故失同注謂軍征討有所調發而稽廢者不憂軍事者杖一百注謂臨軍征討闕之細少之物又應調發雜物供軍事者皆先上言待報注謂給用當從私出者皆是違者徒一年給與者減一等若事有警急得便調發給與並即上言若不調發給與者並即上言如不調發及不給與者亦徒一年不即上言者各減一等市租饗士不從中覆馮唐曰李牧居邊軍市之租皆用饗士賞賜決於外不從中覆故得盡其智能今魏尚云云庚癸傳吳申叔儀乞糧於魯公孫有山山曰登首山呼庚癸兮則諾注庚西方榖癸北方水軍中不敢正言故謬諾傳言吳王不恤士故亡也闔廬在軍熟食者分而後敢食行賚居送乏食也傳調兵食朝錯傳曰上方與錯調兵食仰食棗椹魏志袁紹軍河北軍人仰食棗椹取給蒲嬴袁述淮南云云漢書曰千里餽糧士有饑色樵蘇後爨師不宿飽又曰今歲人饑困卒食半菽軍無見糧言士卒食菜半以菽雜之又無見在糧煮鎧耿恭守疏勒食盡煮鎧弩食其筋分少李陵為將與士卒絶甘分少軍食軍諸病莫能興困而猶鬥軍無見糧師不宿飽兵不足食贍軍乾椹魏楊沛孔渠為新鄭長課民備乾椹收勞豆得數千斛後太祖西迎天子將士無糧乃進乾椹太祖大喜之孔取奇贏千萬贍軍和政公主自兵興財用耗主以貿易取奇贏千萬贍軍作漕艫轉糧韋挺遣燕州司馬王安德行渠作漕艫轉糧自桑乾水抵盧思臺行八百里渠塞不可通挺以方苦寒未可進遂下米臺側廥之待凍泮乃運以為解即上言度王師至食且足帝不悅曰兵寧拙速無工遲我明年師出挺乃度他歲運何哉即詔繁時今韋懷質馳按陳子昂疏曰今甘州積粟萬計兵少不足以制賦宜益屯兵處以儉約韓佽遷桂管觀察使時詔置五管監兵盡境賦不足以充其費佽處以儉約遂為制民貧不忍遽斂宗室國貞加晉絳等州觀察處置使既至糧乏而所儲陳腐民貧不忍遽斂上書以聞陸贄五要曰廢兵之冗食補渭南尉德宗立遣黜陟使庾何等十一人行天下陸贄使者請以五要簡官事曰廢兵之冗食又上言今朔方太原衆已屯山東而神策六軍悉戎關外將不能盡敵則請濟師陛下為之輟邊軍缺環衛竭內廄之馬武庫之兵古將家子以益師賊私畜以增騎又告乏財則為算室廬貸商人設諸催之科日日以甚又上書陛下命將興師以討四方一人征行十室資奉居者疲饋轉行者苦鋒鏑去留騷然而閭里不寧矣聚兵日衆供費日慱常賦不給乃議蹙限而加斂焉加斂既殫乃別配之別配不足於是榷算之科設率貸之法興禁防滋章吏不堪命農桑廢于追呼膏血竭于笞箠兆庶嗷然而邑郡不寧矣又言又如遇敵而守不固陳謀而功不成責將帥將帥曰資糧不足責有司有司曰須給無乏更相為解而朝廷含糊未嘗究詰故抱真者吞聲罔上者不慚馭衆若此可謂責課虧度也又言屯集雖衆無施戰陳虜常橫行以謂境無人焉吏習其常惟曰兵少不敵朝廷莫之省則又調發益師無裨於備禦而有弊於供億閭井日耗斂求日繁傾家析産榷鹽稅酒無慮所入半以事邊制用若此可謂財匱於兵衆矣度支郎中凡天下邊軍皆有度支之使以計軍資糧仗之用每歲所費皆申度支而會計之以長行皆為準唐六典率貸天寶末年所在屯師用度不足於是遣御史康雲間出江淮陶鋭往蜀漢豪商富戶皆籍其家資或五分納一謂之率貸通典轉輸非不勤稽逋有軍令韓文獨孤及言今天下東洎海南至番禺西盡巴蜀無鼠竊之盜而兵不為解傾天下之貨竭天下之榖以給不用之軍為無端之費臣不知其故假今居安思危以備不虞自可扼害之地俾置屯禦悉休其餘以糧儲扉屨之資充疲人貢賦歲可以減國租半陛下豈持疑於改作逡巡於舊貫使大議有所壅而率土之患日甚一日是益其弊而厚其疾也檄取資糧穆寧佐鹽鐵轉運李光弼屯徐州餉不至檄取資糧寧不與光弼怒召寧欲殺之或勸寧去寧曰避之失守亂自我始何所逃罪乎即往見光弼光弼曰吾師衆數萬為天子討賊食乏則人散君閉廩不救欲潰吾兵耶寧曰命寧主糧者敕也公可以檄取乎今公求糧而寧專饋寧有求兵而公亦專與光弼執其手謝曰吾固知不可抑與公議耳時重其能守官本傳百姓不知僦運勞鄭珣瑜為河南尹方是時韓全義將兵伐蔡河南主饋運珣瑜密儲之陽翟以給官軍百姓不知僦運勞凡全義與監軍別檄有所取非詔約者珣瑜輒掛壁不酬至軍罷凡數百封有諫者曰軍須期會為急公何不報珣瑜曰武士統戎多恃以取求苟以為罪尹宜坐之終不為萬人産沴也裒財用以給軍興王播帝討淮西切於饋餉播引程异自副异尤通萬貨盈虛使馳傳江淮衰財用以給軍興兵得無乏帝嘉其功兵所藉者食戴叔倫齊映劉滋執政叔倫勸以屯難未靖安之者莫先於兵兵所藉者食故金榖之司不輕易人儲資力給軍興關播陳少游鎮浙東淮南表為判官李靈耀叛少游屯淮上所在盜賊蝟奮播儲資力給軍興人無愁苦督運繫道段秀實李嗣業署秀實兼懷州長史知州事兼留後時師老財乏秀實督運繫道募士市馬以助軍聚糧二十萬斛周寶進涇原節度使務耕力聚糧二十萬斛挾珍走軍張雄楊行密圍楊州畢師鐸厚齎寶幣啖雄連和雄率軍浮海屯東塘是時楊州圍久皮囊革帶食無餘軍中殺人代糧才干錢聞雄至間道挾珍走軍以銀二斤易斗米逮糠籺以差為甚出粟千石濟軍王行敏傳劉武周入并州寇上黨賊圍急儲偫空乏州民陳正謙者以信義稱鄉里出粟千石濟軍是人自奮賊乃去齕木皮鬻紙而食張巡賊還七月復圍城初睢陽穀六萬斛可支一歲而巨發其半餫濮陽濟陰遠固爭不聽濟陰得糧即叛至是食盡士目賦米一勺齕木皮鬻紙而食才千餘人皆臒劣不能彀吏食槐葉槁節張允濟遷高陽郡丞賊帥王須枝攻郡於是糧屈吏食槐葉槁節無叛者軍食以饒盧弘宣徙義武節度使初詔賜其軍粟三十萬斛貯飛狐弘宣計挽費不能滿直敕吏守之明年春大旱教民隨力往取時幽魏饑甚獨易定自如至秋悉收所貸軍食以饒轉米峙塞下鄭克鈞為都官郎中吐蕃圍靈州軍餉匱竭德宗以克鈞為靈夏二州運糧使轉米峙塞下守者遂安兵食所資在東南蕭穎士客金陵時盛王為淮南節度大使留蜀不遣副大使季承式玩兵不振穎士與宰相崔圓書以為今兵食所資在東南但楚越重山復江自古中原擾則盜先起宜時遣王以捍鎮江淮俄而劉展果反館餉窮覂南蠻傳詔徙天下軍高駢領四川節度使乃奏蠻小醜勢易制而蜀道險館餉窮覂今左神策所發長武河東兵多用度繁廣且彼皆扼制羌戎不可以弛備詔乃罷長武等兵糧資善者先以給士李芃德宗立受河陽三城鎮遏使糧資善者先以給士士悅之本傳自齎糧令狐彰吐蕃盜邊召防秋兵彰遣士三千自齎糧所過無秋毫犯軍食豐衍可以震耀夷夏劉晏移書於宰相元載以為諸將有不庭戎虜有侵盜聞我貢輸錯入軍食豐衍可以震耀夷夏為三利積穀陸贄奏議軍志曰雖有石城十仞湯池百步無粟不能守也故朝錯論安邊之策要在積穀充國建破羌之議先務屯田若無儲蓄是棄封疆同上兵之所屯食最為急若無儲蓄是棄封疆自昔敗亂之因多因餽餉不足不得輒有費用同上奏減河運腳錢用充軍鎮和糴共計收糴米粟一百八十餘萬碩非緣城守乏絶及不承別敕處分並不得輒有費用則是邊城常貯一十五萬人一歲之糧以為急難之備諸鎮軍食例皆闕供告急上聞宣旨下迫則又請貸貯粟所謂匱竭其能幾何夫栽植至難毀拔至易古人以樹楊為喻能不為之嘆惜哉佛汗劉元佐守汴或言相國寺佛有汗元佐自往持金帛以施繼遣其家屬往禮之翌日復起齊場由此士庶競集輸施甚衆乃令將吏籍其物十日乃閉寺曰佛汗止矣所得數十萬盡贍軍國史補虜鈔數為饋糧是虜鈔數為饋糧軍餒死行儉曰以謀制敵可也因詐為糧草三百乘車伏壯士五輩齎齏陌刀徑弩以羸兵挽進又伏精兵踵其後虜果掠車羸兵走險賊驅就水草解鞍牧馬方取糧車中而壯士突出伏兵至殺獲幾盡自是糧車無敢近者資用空殫初潤州承王國清亂竇易直傾府庫賚軍資用空殫而下益驕德裕自儉約以留州財贍兵雖儉而均故士無怨再期則賦物儲足李德裕廣德問疆寇末夷民耗斂重及吐蕃逼京師近甸屯兵數萬又率戶以給軍糧先務積穀人無加賦官不費財坐致邊儲數逾百萬分貯軍城用防艱急縱有寇戍之患必無乏絶之憂更經二年可積十萬人三歲之糧矣陸宣公奏議常操天下贏資以佐軍興雖拿兵數十年斂不及民而用度足唐中僨而振晏有勞焉劉晏贊運糧束馬之路高適上疏運糧束馬之路坐甲無人之鄉挽漕所至輒留以饋軍劉晏淮南去蒲阪亙三千里屯壁相望中軍皆鼎司元侯每言衣無纊食半菽挽漕所至輒留以饋軍非單車使者折簡書所能制白趙充國計漢擊先零充國度其必壞欲罷騎兵屯田以待其敝奏曰羌易以計破屯田得十二便用兵失十二利云云內無勞費之損外有守禦之備上報曰聽將軍計也虞詡奏三郡僕射虞詡上疏曰雍州厥田惟上沃野千里榖稼殷積書奏帝乃復三郡激河後渠為屯田省內郡計歲一億計屯田塞羌胡之路曹鳳上言曰西戎為害前世所患其土小榆上地服美又有西海魚鹽之利設屯田隔絶羌胡交關之路以遏絶狂狡窺欲之源殖榖畜邊省委輸之役乃拜鳳為金城西部都尉後金城長史上官鴻上聞置歸義建威屯三十六部又侯羈海上置東西屯田五部列屯夾河其功垂成羌叛乃罷魏公許下屯田得榖百萬斛於是州郡列置田官所在屯積穀韓浩獨見魏祖與諸將會議諸將以方今之急務在盡敵浩獨曰方今宜急田租魏祖善之乃大興田以足其軍用濟河論鄧艾字士載為尚書郎時欲廣田畜榖為減賦之資至壽春艾以田良水火不盡地利宜關河渠積糧通運漕為濟河論以諭指請以淮北淮南各三萬人分休常有四萬人且田且守也諸葛亮屯田亮每以糧少不得展志於是屯武功五丈原分兵屯田耕者雜於渭濱人各安堵也秦務耕戰築室反耕楚圍宋募屯田漢武募豪民田受南入粟縣官而受田於都內孔置屯田張公謹貞觀初為代州都督置屯田以省餽運豐州率士屯田婁師德天授初檢校豐州都督率士屯田積穀數百萬兵以饒給無轉餉和糴之費表請屯田太原竇靜高祖入京師時突厥數為邊患糧道不屬靜豪表請屯田太原以省餽運息轉漕王晙授桂州都督州有兵舊常仰餉衡永晙始築羅郛罷戍卒埭江開屯巴數千頃以息轉漕百姓賴之賦不及民宗室復鄭滑節度使李融卒代融節度復下令墾營田以廩其軍而賦不及民陸贄曰臣愚謂宜罷四方之防秋者以其數折而三之其一以所輸資糧給應募者以安其業詔度支市牛召工就諸屯繕完器具至者家給牛一耕耨水火之器畢具一歲給二口糧賜種子勸之播蒔須一年則使自給有餘粟者縣官倍價以售既息調發之煩又無幸免之弊出則人自為戰處則家自為耕與夫暫屯遽罷豈同日論哉以省餽挽王起以戶部尚書判度支靈武邠寧多曠土奏為營田以省餽挽諸屯以地良薄與歲之豐凶為三等具民田歲獲多少取中熟為率有警則以兵唐志天下屯田收榖百九十餘萬斛同上耕以官兵憲過末天下營田皆雇民或借庸以耕又以瘠地易上地民間苦之穆宗即位詔還所易地而耕以官兵耕官地者給三之一以終身上有虞則起為戰卒無事則散為農夫白居易復府兵置屯田故有虞則起為戰卒無事則散為農夫不待徵發而封城有備矣不勞饋餉而軍食自充矣此亦古者尉侯之制兵賦之義也可給塞下五城韓愈送韓約序約奏曰得益間田四千頃則盡可以給塞下五城矣田五十頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制虜庶幾所謂兵農兼事一務而兩得者也凡軍州邊防鎮守轉運不給則設屯田以益軍儲唐六典開屯田高承簡裴度征蔡奏署牙將蔡平詔折上蔡郾城遂平西平四縣為殷州拜承簡刺史治郾城始開屯田列防庸瀕殷綿地二百里無復水敗皆為腴田墾發屯田五十頃楊元卿擢涇原謂節度使元卿墾發屯田五十頃屯築高垣牢鍵閉寇至耕者保垣以守居六年涇人德之墾苑中為營田杜亞留守東都奏墾苑中為營田可減度支歲廩詔許之以間手耕棄地李元紘是時廢京師職田議者欲置屯田元紘曰軍國不同中外異制若人間無役也棄不懇以間手耕棄地省餽運實軍糧於是有屯田其為益尚矣今百官所廢職田不一貶弗可聚也百姓私田皆力自耕不可取也若置屯田即當公私相易調發丁夫調役則業廢於家免庸則賦闕於國內地為屯古未有也恐得不補失徒為煩費遂止勸士墾藝李元諒更節度隴右椔翳榛莽闢美田數十里勸士墾藝歲入粟菽數十萬斛募士置屯田畢誠為邠寧節度河西供軍安撫使時戍兵常苦調餉乏誠募士置屯田歲收榖三十萬斛以省度支經費詔書嘉美資賊糧楊收為杜悰節度府判官蜀有可縣直雋州西南地寬平多水泉可灌粳稻或謂悰計興屯田省轉餽以飽邊士悰將從之收曰田可致兵不可得也地當蠻衝本非中國人輟西南屯士往耕射姚雋兵少賊得乘間若調兵捍賊則民疲士怨假令大穰蠻得長驅是資賊糧豈國計耶乃止擾而無利嚴郢拜京兆尹宰相楊炎請屯田豐州發關輔民鑿陵陽渠郢習朔邊利病即奏舊屯肥饒地今十不墾一水田甚廣力不及而廢若發二京關輔民浚豐渠營田擾而無利盡水陸之利郭元振為涼州都督遣甘州刺史李漢通闢屯田盡水陸之利稻田收豐衍師有餘糧公命屯田師有餘糧柳宗元興州江運記屯官敘功開元間詔屯官敘功以歲豐凶為上下唐志犬戎適至則有連阡接畛之兵大建屯田塞下諸軍儲使令守防之外一切出之於野限人名田復其租入然後因其阡陌制之閭井因其卒伍立之師長固其塍塹以備不虞犬戎適至則有連阡接畛之兵戎騎才歸則復耰鋤獲耨之事若此則曩時聚食者盡歸於復勤之農矣元稹官府既建史胥備設李翰屯田紀績頌序求天下良才善政以食為首者掌其務屯有都知群士為之都知有治即邑為之官府既建史胥備設田有官官有徒野有夫夫有任上下相維如郡縣吉凶相恤如鄉黨有誅賞之政馭其衆有教令之法頒于時此其所以為屯也疆場日履而人不知同上金溝封犬牙而不相侵疆場日履而人不知方舟而上以饋師旅此功及於國也登量而入以寬征稅此德加於人也開屯田勸士耕種五代張希崇遷靈武節度使靈州地接戎狄戍兵餉道常若抄掠希崇乃開屯田勸士耕種軍以足食而省轉饋明宗下詔褒美有白雀集于高豐屯廩蓋大穰之徵也屯田紀績頌天下屯田總九百九十二食貨志唐開軍府以扞要衝因隙地置營田天下屯田總九百九十二司農寺每屯三頃州鎮諸軍每屯五十頃水陸瘐瘠播殖地宜與其功庸煩省收率之多少皆決於尚書省褒進詔屯田收多者褒進之上白請纓終軍請長纓繫單于頸請命陳計借箸張良借前箸以為籌之請師史謀動干戈於邦內語季氏將伐顓臾以少擊衆李陵請以少擊衆獨當一隊請瑞傳曰司馬請瑞以命其徒攻桓氏注瑞發兵之符孔兵出杜讓能傳李茂貞守鳳翔自大順後兵寖疆恃有功不奉法朝廷弱弗能制會楊復恭走山南茂貞欲兼有梁漢請以師問罪未報而兵出帝忿其專然不得已從之范延光萌宗為宣徽南院使明宗幸汴州至滎陽朱守殷反延光曰守殷反跡始見若緩之使得為計則城堅而難近故乘人之未備者莫若急攻臣請騎兵五百馳至夜半行二百里戰于城下遲明明宗亦馳至五代史潞王從珂為河中節度使重誨以非李氏後必為家患乃欲陰圖之從珂閲馬黃龍莊其牙內指揮使楊彥溫閌城以叛彥溫曰非叛也得樞密院宣請公趍歸朝廷耳從珂走虞卿馳驅上變明宗疑其事拜彥溫絳州刺史以金帶襲衣金鞍賜彥溫以誘致之重誨固請用兵明宗不得也乃遣樂彥稠率兵討之安重誨傳白簡稽周禮小宰以官府之八成以經邦政二曰聽師田以簡稽注士卒兵器簿書也稽計也簡閲也合也合計其士卒閲其兵器為之要籍也足以動衆動衆謂師役之事禮尺籍伍符馮唐曰士卒盡家人子起田中安知尺簿伍符注尺籍以書軍令伍符者軍行士伍伍相保符信事具將帥門赤白囊邴吉馭吏習知邊事警急因驛騎持赤白囊書馭吏因刺取探候之知虜入雲中代郡因白吉也軍書交馭而輻湊羽檄重跡而狎至息夫躬言邊遽乃至吳語遽聞虎符徵兵後漢初禁防尚簡但以璽書發兵未有虎符之信杜詩公君上疏請立虎符絶詐僞從之孔為四籍兵志十三年始以彉騎分隸十二衛總十二萬為六蕃每衛萬人京兆彉騎六萬六千華州六千同州九千蒲州萬二千三百絳州三千六百晉州千五百岐州六千河南府三千陝虢汝鄭懷汴六州各六百內弩手六千其制皆制下戶白丁宗下品子疆壯五尺七寸以上不足則兼以戶八等五尺以上皆免征鎮賦為四籍兵部及州縣衛分掌之十人為火五火為團皆有首長又擇材勇者為番頭頗習弩射不能歲比其籍德宗幸梁還以神兵兵有勞皆號興元元從奉天定難功臣恕死罪中書御史府兵奇乃不能歲比其籍名隸籍而身居市肆德宗時白志貞請節度團練觀察使皆出子神策兵既發志貞陰以市人補名隸籍而身居市肆兵部郎中判簿及軍戎調遣之名數百官志作書言城且危李希烈據汴汴滑副都統劉洽率曲壞李克信軍十餘萬夜入宋州時洽將高彥昭劉昌共嬰壘以守彥昭請援於洽其屬作書言城且危彥昭視曰君輕我耶取紙自為書洽得書喜曰健將在西吾何憂倚帳作書封常清賊移書平原令太原顏真卿以兵五千防河真卿馳使司兵參軍事李平入奏常清取平表發視即倚帳作書遺真卿勸堅守書帛內蜜丸叛臣周智光反詔郭子儀密圖之同華路閉詔書不能通乃召子儀壻趙縱受品詔書帛內蜜丸間道詔子儀邊書告急陸贄邊書告急方使關白用兵是謂從容拯溺揖讓救焚矣白聊固吾圉罔蔽我師胸奴犯邊飛將出塞胡馬南牧漢軍北征徵兵出塞召募從軍漢壘藩營殺左賢虜右校傳烽朔野奔兵樓蘭榆關柳塞晨征鞞鼓夜嚴刀斗洗兵於交河之源飲馬於長城之窟十年老將萬里疲兵長征鴈塞苦戰漁陽博望之窮河曲定遠之望王闕征隴上戍雲中將軍重圍守疏勒而井竭都尉深入戰居延而矢窮周伐獫狁至于太原漢擊單于窮于大漠天子用兵將軍占募將軍不能深入大夫無乃淺為疆場塞垣邊鄙不聳係虜之功安邊之策外鎮中權如或不能安邊則將焉用彼相保鄣貔虎宣威豺狼滅跡慎固封守疆場之事慎守其一而備其不虞險其走集走集邊境壘壁守在四夷天子尊云云思啓封疆以利社稷或思啓封疆者或縱其暴掠者蕩搖我邊疆封疆之削何國蔑有疆場日駭守徼乘塞隋何曰分卒云云朝錯言邊備勸農力本戍者死於邊輸者僨於道賈誼言秦時戌卒謫戌秦以謫發之故曰謫戌漢書欲立威者始於折膠秋氣至膠可折弓弩可用胸奴以為候而出王莽始開邊隙建徼塞起亭遂叛為邊害東南一尉西北一侯劉歆言漢武帝詔李陵出遮虜障障塞要險處臥鼓邊亭滅烽幽障祭彤胸奴入盜急收入保有捕虜者斬李牧居鴈門邊最後漢胡虜連入雲中朔方一歲九奔五原太守崔實整厲上馬嚴烽候虜不敢犯常為邊最實字子真一名台字元始甌脫土室胡兒所作以候漢也又云往來界上屯守處疆以周索索法也謂魯衛戎索謂晉近北邊故疆界以戒法恩感蠻夷蜀張嶷為越嶲太守十五年徵詣成都夷人戀慕扶慕流涕或追尋至蜀郡乘障慱士狄山與張湯爭和親事山曰和親事兵凶器不可用上作色曰使生居一郡能使虜無入盜乎曰不能曰一縣曰不能曰乘障山窮即曰能使山乘障旬月胸奴斬山頭而去請置郡主父偃言朔方地肥饒外阻河內轉輸滅胡之本也公孫弘以為不可上聽主父言遂立朔方郡孔賢長城李績帝嘗曰煬帝不擇人守邊勞中國築長城以備虜今我用績守并突厥不敢南賢長城遠矣以保封疆陸贄邊陲之戌以保封疆邊障妥寧劉昌在邊凡十五年兵械鋭新邊障妥寧立戍限裴識為涇原節度使初將士戌邊或積歲不得還識為立戊限滿者代親七十近戌由是人感悅請徙京西軍戌原州元載嘗任西州具知河西隴右要領乃言於帝曰國家西境極于潘原吐蕃防戌乃在摧沙堡而原州界其間草薦水甘舊壘存焉比吐蕃毀夷垣墉棄不居其右則監牧故地巨塹長壕重復深固原州雖早霜不可蓻而平涼在其東獨耕一縣可以足食請徙京西軍戌原州築橫塞軍郭子儀天寶八載木剌山始築橫塞軍及安北都護府詔即軍為使俄苦地偏不可耕徙築永清號天德軍以使兼太原太守今冰合防秋冰消解戌今冰合防秋冰消解戌行之已久虜為長然杜牧論邊事憲宗平淮濆文宗定滄海士不解甲或四五年旨高宗伐鬼方三年乃克周公東征三年不歸想卿等久在戎行必經此役一品集賜石雄書太原屯集請發陳訐步兵三千人鄭滑步兵三千人且令太原屯集如此邊有警則大同軍政當賊路足應事應如河曲有虞便令取嵐石路渡河亦便況兩道人心忠義徵發不難一年防秋無所損廢臣等詢千物議皆願如此隄防一品制集吐蕃不敢近青海哥舒翰會王忠嗣被罪帝召入朝踰年築神威軍青海上吐蕃攻破之更築於龍駒島有白龍見因號應龍城翰相其川原宜畜牧譴罪人二千戍之由是吐蕃不敢近青海詔翰以朔方河東群牧兵攻吐蕃遂以赤嶺為西塞邊庭流血成海水武皇開邊意未已杜甫兵車行長防萬里秋同上辛苦三年戌長防萬里秋西北邊歲調河南江淮兵謂之防秋陸贄又以西北邊歲調河南江淮兵謂之防秋士不素練戰數敗將統制不一亡以應敵乃上陳其弊今之邊戍勢弱氣消同上兵以氣與勢為用者也氣聚則盛散則消勢合則威析則弱今之邊戍勢弱氣消建軍若此可謂力分於將多矣蓬斷草枯凜若霜晨李華弔古戰場文浩浩乎平沙無垠敻不見人河水縈帶群山紏紛黯兮慘悴風悲日矄蓬斷草枯凜若霜晨鳥飛不下戰挺亡群亭長告余曰此古戰場也白戍申楊之水不流束薪彼巳之子不與我戍申戍許采薇遣戍役也及瓜之期齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至遂作亂勤戍五年天子曰勤戍五年豫一人無日忘之卒更踐更過更更有三品有卒更有踐更有過更古者正卒無常人皆迭為之一月一更是為卒更貧者欲顧更錢者出次直雇者用二千為踐更天下人皆直戍邊三日律謂繇戍雖丞相子亦在調不可自行各出錢三百入官以給戍為過更漢初因秦後改有謫乃戍邊謫戍見上注秦發閭左戍卒居閭之後盡發之婁敬戍隴西脫挽輅一人橫鹿車前三人挽之一人推武帝時女子乘亭障王褒引成詔卒治河者著外徭六月著謂著於簿藉律戍邊一歲書罷若有急當留六月以卒治河之勞雖役月近得同外徭六月繇戍孔失於太繁陸贄為翰林學士李希烈寇襄城詔問策安出贄言代朔邠靈自昔之精騎上黨盟津今之選師舉而委之山東將多而勢分兵廣而財屈則屯戍失於太繁也陸贄又言今朔方太原衆已屯山東而神策六軍悉戍關外將不能盡敵則請濟師陛下為之輟邊軍缺環衛謁內廄之馬武庫之兵占將家子以益師賦私畜以增騎餘見軍資糧門聞絶塞荒陬則辛酸動容聆彊蕃徑虜則懾駭褫情今遠調屯士以戍邊陲關中百物阜殷士怵溫飽比諸邊隅不啻天地聞絶塞荒陬則辛酸動容聆疆蕃徑虜則懾駭褫情又使去親族捨園廬甘所辛酸抗所懾駭將冀為用不亦疏乎又有休代之期無統制之善資奉姑息譬如驕子進不邀以成功退不處以嚴憲屈指計歸張頤待飼師一挫傷則乘其危撓布路東潰平居殫資儲以奉浮冗臨難棄城鎮以搖疆場其弊豈牧無益哉列屯北邊郭子儀九年入朝對延英帝與語吐蕃方疆慷慨至流涕退上書曰臣所統士不當賊四之一馬不當賊四之二外畏內懼將何以安臣惟陛下制勝力非不足但簡練不至進退未一特淹師老地廣勢分願於諸道料精卒蒲五萬者列屯北邊則制勝可必春秋存問家室李勉遣戍兵常視其資糧春秋存問家室故能得人死力應龍城哥舒翰事見邊戍門請以所部為天子戍隴劉澭為瀛洲刺史請以所部為天子戍隴發其兵千五百馳歸京師無一卒敢違令者德宗甚寵之困獸當猛虎窮魚餌奔鯨李白古風不習山川之險突厥序歲發戍卒不習山川之險緩步一舍巳呵然流汗去時里正與褁頭歸來頭白還戍邊杜甫兵車行被邊長鎮之兵陸贄被邊長鎮之兵皆百戰傷夷角所能則習度所處則危考服役則勞察能敵則勇然衣廩止於當身又為家室所分常居凍餒而關東戍士歲月更代怯於應敵懈於服勞然衣廩優厚繼以茶藥資以蔬醬豐寡相懸勢則遠甚又有以邊車詭為奏請遙隸神策者廩賜之饒有三倍之益此士類所以忿恨經費所以褊匱夫事業未異給養頓殊人情所不甘也謂宜罷四方之防秋者以其數析而三之臣謂宜罷四方之防秋者以其數析而三之其一責本道節度募壯上願屯邊者徙焉其一則第以本道衣廩責關內河東募用蕃夏子弟願傳軍者給焉其一以所輸資糧給近應募者以安其業詔度支市牛召工就諸屯繕完器其至者家給牛一耕耨丞火之器畢具歲給二口糧賜種子勸之播蒔須一年則使自給有餘粟者縣官倍價以售既息調發之煩又無幸免之弊出則人自為戰處則家自為耕與大暫屯遽罷豈同日論哉戍卒驕顧家屬不欲去盧鈞拜節度詔義興士五千戍代北鈞坐城門勞遣攜家人以觀戍卒驕顧家屬不欲去酒酣反攻城迫大將李文矩為帥鈞倉卒奔路城文矩投地僵臥稍諭叛者衆乃悔服即相與謝鈞迎還府斬首惡乃定詔趣戍者行密使盡戮之鈞請徐乘其變而使者不發須報時戍人已去路一舍鈞選牙卒五百壯騎百以騎載兵夜趍遲明至太平驛盡斬之戎狄七白憬彼匪人桀驁荒獷夷禮傳曰疆以戎索索法也戎狄之法飲食衣服不與華同贄幣不通言語不達夷狄之有君不如諸夏之亡也被髮左衽子欲居九夷或曰陋如之何子曰君子居之何陋之有君子所居則化吳為封豕長蛇裔不謀夏夷不亂華異俗器械異制衣服異宜蠻夷戎狄皆有安居和味宜服利用備器其事雖異各自足也五方之民言語不通嗜欲不同食無火化飲其血茹其毛無絲麻衣其羽皮狄之廣莫狄地之廣絶也殊方異類種別群分蠻陬夷落譯道而通鳥獸之氓威儀所不懾憲章所不綴無知之俗李陵書曰身出禮義之鄉而入無知之俗天之驕子胸奴自稱要荒之服南蠻西戎東夷北狄自相猱雜東方曰夷被髮文身有不粒食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣皮有不粒食者矣北方曰狄衣羽毛穴居有為粒食集洎聲教朔南來王豺狼戎狄豺狼不可厭也狄固貪婪不式王命魏絳和戎錫歌鍾之半惠公謂我諸戎四兵之裔胄無是翦棄拜戎不暇春秋內諸侯而外夷狄楚有王者則後服無王者則先叛公羊美齊桓救中國攘夷狄卒帖楚注帖服也象胥通譯語者也重譯史舌人象胥款塞來朝漢宣時呼韓邪單墟款五原塞請朝明年正朋有司議先京師後夷狄宜在諸侯王下蕭望之云宜以客禮待之故其位在諸侯王之上賈人與市渾邪王來朝賈人與市坐死者汲黯曰文吏繩以闌出財物邊關以徵文殺無知者尚不許注律胡不得持兵器及錢出關也大月氏本行國也逐水草居賈誼五餌賜車服以懷目珍味以懷口音樂婦人以懷耳高堂邃宇懷其腹降者親酌而手食之以懷其心也羈縻司馬相如牧夷狄其義羈縻勿絶而已龍城蹛林單于歲正月諸長少會單于庭祠五月大會龍城祭其先天地鬼神秋馬肥大會蹛林課校人畜數蹛音帶蹛繞三林也日上戊巳單于俗日上戊巳常乘月盛舉兵月虧退兵解辮髮削左衽而蒙化終軍言南越鼻飲以鼻飲言與禽獸無異單于置諸部王為郡縣偵邏耳目卉服後漢陳禪云帝王之庭不宜陳夷狄樂引夾谷會仲尼誅侏儒云云陳忠云古者四夷陳於門非鄭衛之樂禪訕朝政左遷因亂撫綏胸奴大亂議者皆曰為害日久可因其壞亂舉兵滅之蕭望之曰是幸災也宜遣使即問救其災患如復其位必猶臣服此德之盛也上乃從之優復夷人後漢版循蠻夷者秦昭王有白虎害人於秦蜀巴漢境募能殺者賞邑萬家閬中夷人作白竹弩射殺人以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻勿算殺人得以贖死迎名王渾邪王率衆來降漢發軍二萬乘迎之縣官無錢從人貰馬人或匿馬馬不具上欲斬長安令汲黯曰云云何騷動天下者乎徙戎論晉江統應元作徙戎論以四海之衆豈須戎虜在內然後取足哉皆宜申論發遣帝不能用未十年而夷狄亂華時人服其深識孔竇靜上書曰夷狄窮則搏噬飽則群聚不可以刑法繩仁義教也衣食仰給不恃耕桑今損有為之民資無知之虜得之無益於治失之不害於化房玄齡疏曰邊夷醜種不足待以仁義責以常禮古者以禽魚畜之必絶其類恐獸窮則摶苟救其死以馬羊準盛衰元璹貞觀三年復使突厥還言夷狄以馬羊準盛衰今厥六畜不蕃人色若菜米肉飯粟化為血不三年必亡無幾突厥果敗陳子昂上言臣恐將相有貪夷狄利以廣地疆武說陛下者欲動其機機動則禍結又疏曰今九姓叛亡北蕃喪亂君長無主回紇殘破磧北諸姓已非國有欲掎角亡叛惟金山諸蕃共為形勢有司乃以揚名擅破回紇歸十姓之罪拒而遣還不使入朝恐非羇戎之長策也代有雄桀上戎狄代有雄桀與中國抗有如勃起招合遣散衆將係興此國家大機不可失也枝葉李大亮上言欲綏遠者必自近中國天下本根四夷猶枝葉也殘本根厚枝葉而求安未之有也謂中國為仙宸帝所裴矩帝在東都矩以蠻夷朝貢踵至調帝悉召天下奇倡怪伎大陳端門前曳錦縠珥合琲者十餘萬詔百官都人列繒樓幔閣夾道被服光麗廛邸皆供帳池酒林胾譯長縱蠻夷與民貿易在所令邀飲食相娛樂蠻夷咨嗟謂中國為仙宸帝所水草為居討獵為生便於馳突不恥敗亡陸贄以西北邊歲調河南江淮兵謂之防秋士不素練將數敗統制不一亡以應敵乃止陳其弊曰以水草為居討獵為生便於馳突不恥敗亡此戎狄所長而中國之短也而欲益兵搜乘爭驅角力交鋒原野之上決命尋常之間以此禦寇可謂勉所短而校其長矣綏服韋皋為劍南西川節度使初東蠻地二千里勝兵常數萬南倚閣羅鳳西結吐蕃狙勢彊弱為患皋能綏服之故戰有功重夷輕漢契苾何力與李大亮薛萬徹萬鈞討吐谷渾於赤水川兵還帝責謂其故何力且言萬鈞敗狀帝怒將解其官授何力何力曰以臣而解萬鈞官恐四夷聞者謂陛下重夷輕漢則誣告益多又夷狄無知謂漢皆然非示遠之義帝重其言乃止人面獸心易以兵制難以信結柳渾瑊與吐蕃會乎涼帝語大臣以和戎息師之便馬燧賀曰今日已盟可百年無慮患渾詭曰五帝無誥誓三王無盟詛蓋盟詛之興皆在季末今盛明之朝反以季末事行於夷狄夫夷狄人面獸心易以兵制難以信結臣竊憂之李晟繼言曰蕃戎多不情誠如渾言屢乞李晟結贊屢乞和會晟朝京師奏言戎狄無信不可詐世世為國一犬思摩帥衆渡河牙於故定襄城遣使謝曰蒙恩立為落長實望世世為國一犬守吠天子北門有如延陀侵逼願入保長城詔許之居三年入朝班固謂其來慕義則接以禮讓何者禮讓以交君子非所以接禽獸夷狄也纖麗外散則戎羯之心生戎羯之心生則侵盜之本也聖人飲食聲樂不與之共來朝坐於門來天生四夷皆在先王封域之外東距滄海西隔流沙北橫大漠南阻五嶺天所以限中外也今乃用武荒外邀功絶域此秦皇漢武之所為也狄仁傑晉大臣議告契丹致表稱臣景延廣獨不肯但致書稱孫大臣不能奪契丹怒數以責晉延廣謂契丹使者喬瑩曰先帝北朝所立今天子中國自冊可以為孫而不可為臣且晉有橫磨大劍十萬口翁要戰則來它日不禁孫子取笑天下瑩知其言必起兩國之爭懼後無以取信也因請載于紙以備遣忘延廣敕吏具載以授瑩瑩藏其書衣領中以歸虜騎奄至乃與從事閻丕馳騎見德光德光責曰南北失歡皆因爾也召喬瑩質其前言延廣初不服瑩從衣領中搜出所藏書延廣乃服五代史漢氏習玩驕虜供之則增求絶之則招怨是飽豺狼以良肉而縱其獵噬也控弦且百萬突厥阿史那隋大業之亂始畢可汗咄吉嗣立華人多往依之契丹室韋吐谷渾高昌皆役屬竇建德薛舉劉武周梁師都李軌王世充等倔起虎視悉臣尊之控弦且百萬戎狄熾彊古未有也驅戎狄攻豺狼賀魯寇廷州發府兵三萬合回紇騎五萬擊之駱引義獻計曰願發射脾處月處密契苾等兵齎一月食急趍之大軍住憑洛水土為景助此驅戎狄攻豺狼殊裔絶域褚遂良帝欲自討遼東遂良固勸無無行一不勝必再興再興為忿兵兵忿者勝負不可必帝然可會李績抵其計帝意遂決東遂良懼上言臣請譬諸身兩京腹心也四境手足也殊裔絶域殆非支體所屬高麗王陛下所立莫離支殺之討其逆夷其地固不可失但遣一二謹將付鋭兵千萬翔旝雲輣唾手可取上策郭正一劉審禮與吐蕃戰青海大敗高宗召群臣問所以制戎正一曰吐蕃曠年梗寇師數出坐費糧資近討則喪威深入則不得其巢穴今上策莫如少募兵且明烽候勿事侵擾須數年之遲力有餘人思戰一舉可破矣帝納之虜情狼顧蘇頲吐蕃盜邊諸將數敗帝怒欲自將兵討之頲復上言今吐蕃遣渠領于犯國令軍吏一不勝而陛下屈至尊為之敵雖朝鼎夕砧未足以誇四夷臣恐虜情狼顧牽連北敵聞六師之行入幽并犯靈夏南動京師太上皇一致憂勞是陛下以天下之安不能寧其親也臣固曰居中制勝策之上者也吐蕃遣使請尋盟李吉甫吐蕃遣使請尋盟吉甫議德宗初未得南詔故與吐蕃盟自異牟尋歸國吐蕃不敢犯塞誠許盟則南詔怨望邊隙日生帝辭其使禮讓行于殊俗則怫戾者化韋皋為劍南西川節度使稍稍通西南夷明年蠻大首領苴那時以王爵讓其兄子烏星始烏星幼那時攝領其部故請歸爵皋上言禮讓行于殊俗則怫戾者化願畢封以示褒進詔可氈裘冒頓之裔徐齊聃咸亨初詔突厥酋長子弟得事東宮齊聃上書諫以為氈裘冒頓之裔解辮削任使在左右非所謂恭謹威儀以近有德任官惟賢才左右惟其人之義夷狄居處飲食隨水草五代四夷附録夷狄居處飲食隨水草寒暑遷徙有君長部號而無世族文字記別至於弦弓毒矢疆弱相并國地小大興滅不常是皆烏足以考述哉自古夷狄之於中國有道未必服無道未必不來蓋自因其盛衰雖常置之怡外而羈縻制馭恩威之際不可失也其得之未必為利失之有足為患可不謹哉夷狄種號多矣其大者自以名通中國其次小遠者附見又其次微不足録者不可勝數其地環列九州之外而西北常強為中國患三代玁狁見於詩書秦漢以來胸奴著矣隋唐之間突厥為大其後有吐蕃回鶻之強五代之際以名見中國者一十八而契丹最盛嚴尤三策臣以為一可采也侵逼則驅而遠之遁逃則守而備之此帝王御戎狄之要經靖邊之大略也裴垍賢良策回紇九姓回紇北盡磧口三百里悉有九姓地九姓者曰藥羅葛曰胡咄葛曰啒羅勿曰貊歌息紇曰阿勿嘀曰葛薩曰斛嗢素曰藥勿葛曰奚邪勿藥羅葛回紇姓也貊謠衆猥款巴語相咿嚘韓愈聯句貴貨易士於休烈吐蕃金城公主請文籍休烈曰狄固貪婪貴貨易士正可錫以錦綵厚以金玉無足所求以資其智荒服之外聲教所不逮突厥序諸耶為姓其先塞上人多以騎獵為業胡人三十輩於大山中見飛鳥甚衆頡頏於一谷中衆胡就觀之見一小兒才二歲以來衆鳥銜果實而飼之衆胡異之遂收而遽養之長求姓衆之人共育得大遂以諸耶為姓朱耶者訛也南部新書滅杖餘高句麗出自杖餘氏有朱象孫莫來滅伏餘都城壤溫彥慱曰遼東同為箕子之國漢之玄都郡耳魏晉以前近提封之地唐會要時發兵戍疏勒四鎮狄仁傑諫詩人矜薄伐於太原化行於江漢前伐之遐裔而我之城中過夏商遠矣今乃竭府庫之實以爭磽確不毛之地得其人不足以增賦獲其土不足以耕織苟求冠帶遠夷不務固本安人伏見國家右戍四鎮左屯安東杼軸空匱轉輸不絶昔漢元帝納賈捐之之謀而罷珠崖宣帝用魏相之策而棄車師至貞觀中克平九姓拜李司摩為可汗使統諸部夷狄叛則伐降則撫得推亡固存之義不見納虜陳橫北荒胡星耀精芒羽書速驚電烽火晝連光單于四平蕩種落自奔亡李白薊門行青箬褁鹽歸峒客緑荷苞飯趁虛人柳宗元柳州峒氓海俗衣猶卉山夷髻不鬟同上南蠻垣綽遣使者王保成等四十人齎縹信書遺節度使牛叢欲假道入朝請憩蜀王故殿叢因責之曰詔王之祖六詔最小蠻也天子録其勤合六詔為一俾附庸成都名之以國許子弟入太學使習華風今乃自絶王命且蛇雀犬馬猶能報德王乃不如蟲鳥乎自古夷狄服叛雖不繫中國之盛衰而中國之制夷狄則必因其強弱世宗取贏漢定三關兵不血刃不幸世宗遇疾功志不就然贏漢三關遂得為中國之人而十四州之俗至今陷於夷狄彼其志豈不可惜而其功不亦壯哉五代史鮮卑其居曰梟羅沒固里沒里者河也是謂黃水之南黃龍之北得鮮卑之故地故又以為鮮卑之遺種八部其部族之大者曰太賀氏後分為八部其一曰但利皆部二曰乙室活部三曰實活部四曰納尾部五曰頻沒部六曰內會雞部七曰集解部八曰奚嗢部部之長統大人而常惟一人建旗鼓以統八部馭夷狄以權賀魯傳駱弘義獻計曰安中國以信馭夷狄以權理有變通也賀魯保一城方寒積雪謂唐兵必不來宜乘此一舉滅之阿保機某部大人遙輦次立遙輦不任事選於其衆以阿保機代之阿保機亦不知其何部人也謂諸部曰吾立九年所得漢人多矣吾欲自為一部以治漢城可乎諸部許之漢城在炭山東南欒河上有鹽鐵之利乃後魏滑鹽縣也其地可植五穀阿保機率漢人耕種為治城郭邑屋廛市如幽州制度漢人安之不復思歸自號天皇王至阿保機稍并服旁諸小國而多用漢人教之以隸書之半增損之作文字數千以代克木之約又制婚嫁置官號乃僣稱皇帝自號天皇王以其所居橫帳地名為姓曰世里世里譯者謂之耶律名年曰天贊以其所居為上京起樓其間號西樓往來射獵人無定居陳女真善射多牛鹿狗其人無定居行以牛負物遇雨則張革為蓋常作鹿鳴呼鹿而射之食其生肉能釀縻為酒醉則縳之而睡醒而後解不然則然之衣卉麵木宋璟遺愛碑文身鑒齒被髮儋耳衣卉麵木巢山館水種落異俗而化齊張說駃騠之生擒招千里一品集賜嗢沒斯王制駃騠之生擒超千里之擊氣厲九秋願削衽以圖全同上戴斗之鄉精誠貫日負射鵰之藝氣自凌雲願削衽以圖全且櫜兮而俟命能入朝仍疏魏爵同上授歷支特以下官制昔徐盧款塞即授漢封能入朝仍疏魏爵今則解其被毳榮以彯纓居寒露之野同上與紇扢可汗書生戴斗之鄉居寒露之野降精斗極雄漠朔以為君稟耀旄頭分天街而建國同上與黠戛斯書龍沙以北部落牛毛褚遂良戎虜之性驟往倏來敗不恥奔勝不讓成若大軍一臨邊怖震烏散蘇頲諫穹廬賢於城郭檀罽美於章紱薛登吐蕃之望中國猶孤星之對太陽有自然之大小不疑之明暗魏元忠涉河而北履海而西宇宙絶徼羌戎全區亦不可得而制可斥而遠之李觀白段會宗漢書會宗為西域都護西域敬其威信三年更書還後復為都護諸國子弟郊迎及卒諸國發哀立祠班超後漢護西域五十餘國得遠夷之和陳龜世習邊俗鮮卑不敢近塞上疏請誅梁冀知不免不食而死西域為舉哀弔祭其墓鄧訓後漢為護羌校尉迷吾欲脅月支訓擁護之羌胡恥病死輒以刀自刺訓聞其病重禁不與刀使療之愈者非一父母死恥哭及訓率號哭以刀割面殺其馬曰鄧使君死我曹亦俱死爾羌虜望風李膺為度遼將軍羌虜望風懼服先略男女悉還塞下過冢號泣祭遵卒胸奴朝賀過冢拜謁號泣刑以威四夷懷近以德柔遠能邇蠻夷率服誕敷文德七旬有苗格舜周禮懷方氏掌來遠方之民四夷也致方貢致遠物也達之以節還生口武威太守孟雲上言北虜既和親而南郡猶掠單于謂漢欺之欲犯塞宜還生口以安定之群臣議曰不可許袁安字邵公獨曰還之是以邊人得安上從安議獻長吏後漢張奐為屬國都尉羌豪感恩上為二十匹先零酋長又遺金鐻八枚奐受之召主簿於羌前以酒酹地曰使馬如羊不以入廄使金如粟不以入懷悉還之羌性貪而貴清威化大行又田豫國讓先卑素利吏等遺牛馬輒送入官胡乃密懷金三十斤避左右曰見公貧故遺牛馬公輒送官今密奉此金可以為家資豫張袖受之答其厚意胡去後悉付外上狀詔褒曰昔魏絳開懷以納戎今卿舉袖以受狄云云歲使相攻後漢祭彤次卿為遼東太守偏何邑落歸義願自效彤曰當斬胸奴首來乃為信偏何遂繫之後歲歲相攻孔殘衆孽君縮氣不敢息房元齡疏曰高麗歷代逋命莫克窮計陛下責其弒逆身自將六軍征荒裔不曰日拔遼東虜獲數十萬殘衆孽君縮氣不敢息可謂功倍前世矣虜不盜塞王忠嗣節度朔方虜不敢盜塞感恩柳公綽為河東節度北有沙陀部勇武喜鬥為九姓六州所畏公綽召其酋朱耶執宜其妻母來太原者令夫人飲食問遺之沙陀感恩故悉力保鄣存以大信示以優恩前代伐叛皆須先論文誥儻未柔服則當臨以兵威古人云明其有罪敵乃可服緣党項自鄜坊種落實蕃其間皆有良善豈敢盡為暴況北有殘虜西有犬戎使其二心終成邊隙切要存以大信示以優恩撫納不悛然加顯戮便須擒盡惡黨永絶禍根如此則朝廷誅之有名彼亦無怨贊皇一品集皇風所覃八識革面薛登相與奔走朝闕之不暇元稹代論淮西書蠻夷懾竄戎臣震揚相與奔走朝闕之不暇白豺狼無厭蜂蠆有毒胡塵夕起文選代馬南牧蠻夷猾夏周禍也注猾亂狄固貪婪王文啓之蠻夷戎狄王式王命侵攻王略棄背我盟誓蕩搖我邊疆以荐食上國夷德無厭疆場之患文王之時西有昆夷之患北有獫狁之難遣將帥以守衛中國四夷交侵凡諸侯有四夷之功則獻捷于王王以警于夷以警懼夷狄也刑以威四夷商紂為黎之搜東夷叛之周幽為太室之盟戎狄叛之傳漢有郅都魏向胸奴不敢南嚮沙漠方叔南征荊蠻詩人歌之列於雅充國西伐先零詞臣美之著於頌周作獫狁至于太原漢擊胸奴遠窮大漠侵軼羽書朝飛烽火夕警不與漢馬田豫國讓持節護烏丸鮮卑等十部共要誓不得以馬與中國豫以戎狄為一非利乃先搆離之使為讎敵相攻伐也孔歲苦邊裴矩時突厥數盜邊高約遣使約西突厥連和突厥因請婚帝曰彼勢與我絶緩急不可為用奈何矩曰然北虜方熾歲苦邊苦權順許以示外援須我完實更議之帝然其計窺犯亭障魏知古會造金仙玉真觀諫曰突厥於中國為患自久其人非可以禮義誠信約也雖遣使請婚恐豺狼之心弱則順伏疆則驕逆月滿騎肥乘中國饑虛講親際會窺犯亭障復何以防之數犯史憲忠會昌中築三原城吐蕃因之數犯拜憲忠涇原節度使以怖其侵吐蕃寇邊劉禕之儀鳳中吐蕃寇邊帝訪侍臣所以置之討之之宜人人異謀禕之獨勸帝夷狄猶禽獸雖被馮陵不足校願戢威紓百姓之急帝納其言劫饋榖以焚舟殺軺車而閉道兔伏鳥飛戎虜之耳目狼心梟響作郊畿之殘賊比以回鶻未殄吐蕃正疆且須羈縻未可重擁於是邊疆日駭種類歲繁每至徑兮折膠重馬免乳以魁健之質張忿勢之凶劫饋榖以焚舟殺軺車而閉道杜牧賀平党項表鳥散山谷蟻聚塞垣贊皇一品集請鹽州屯集党項狀党項日知惡稔朝廷將欲翦除必恐轉自不安更懷姦計出師則鳥散山谷兵則蟻聚塞垣日來漸成邊患望賜王昭劉士幹詔及其屯集未散速令攻討秣騎內侵蘇頲傳吐蕃盜邊諸將數敗虜盜張秣騎內侵北有胡寇覷邊南有夷獠騷徼張說疏犯我王略一旦蠻生犯我王略竇靜上書風高馬肥而肆侵軼回鶻傳李終奏北狄貪沒惟利是視北進馬規直再歲不致豈厭繒帛利哉殆欲風高馬肥而肆侵軼故外攘內備必煩朝廷狙侯中國鄭覃吐蕃在邊狙侯中國北風振漠胡兵伺便李華弔占戰場文北風振漠胡兵伺便主將騎敵期門受戰野豎旌旗川回緝練法重心駭威尊命賤利鏃穿骨驚沙入面主客相摶山川震眩白周室息北伐之師胡人絶南牧之馬以服事諸夏撫有蠻夷柔服率服古者天子守在四夷修其教不易其俗陸龍言水栗奔走而來賓呼韓朝漢思稟正朔樂率貢職俗變國風法遵王度夷邸槁街張安中戎夷邸斂柱魏闕周書曰武王既克商遂通道於九夷八蠻慕化而通也太保用訓于王曰惟王慎德四夷咸賓無有遠邇畢獻方物旅獒制單于以係頸賈誼羈徑越以長纓終軍並見文選雖負驕子之名敢廢外臣之禮羈縻天子之牧夷狄也其義羈縻而已邊鄙不聳要荒底寧非我求於四夷惟爾歸於一德彼欽皇風服事諸夏我慎明伐守在四夷勿絶咸賓請入朝漢時單于上書願朝五年時哀帝被疾或言胸奴從上游來厭人自黃龍以來單于來朝中國必有大故帝由是難之問公卿公卿亦以為虛府庫且勿許單于使辭去未發楊雄上書曰國家雖費不可以自卑天子召還使報書許來賜雄帛五十匹金十斤單于朝從人數故事單于朝名王已下及從者二百餘人單于又上書言蒙天子神靈民人盛壯願發五百人入朝以明盛德上許之罷塞漢元以王嬙賜單于單于歡甚願保塞請罷邊塞休民議者云可許唯侯應為不可上詔勿議罷塞也向化十孔蠻夷君長襲衣冠帶刀宿衛魏證帝納之不疑在是天下大治蠻夷君長襲衣冠帶刀宿衛高昌等二十七國謁道左裴矩帝有事常山西方來助者十餘國矩遣人說高昌伊吾等啖以厚利使入朝帝西巡燕支山高昌等二十七國謁道左皆使佩金玉服錦罽奏樂歌舞令士女盛飾縱亘數十里示中國彊富四夷稽服柳宗元貞符曰四夷稽服願得稽首聖顏以部落附安西永為外臣處木昆匐延闕律啜等諸部皆上書願得稽首聖顏以部落附安西永為外臣許之殊類稽顙群疑革心柳宗元柳州賀破東平咸稱天子神文皇南面坐夷狄千九趨咸稱天子神往古不得俱柳宗元高昌詩不期而趨闕下楊炎鳳翔紀聖德頌巢山駕海之群狼纛鳥章之名不期而趨闕下者四十有三萬委命下吏同上平胡頌丹穴之賮孤竹之君金罽括羽委命下吏執玉而朝靈囿解辮而拜甘泉鄭亞會昌一品集序宗英可汗獻琛輸賮越自絶域通于本朝文畢伯亡之裔呼韓鹿蠡之師或執玉而朝靈囿或解辮而拜甘泉誓心向闕一品集謝示嗢沒斯冠帶國故得誓心向闕稽首歸忠自獻刑馬之書仍酌留犁之酒七旬之格同上不勞六月之師坐俟七旬之格冠帶入朝一品集尊號名王結髮冠帶入朝賢昆稽首疑驛來獻詩列既平同上異域歸忠傳序書載率服美大舜之功詩列既平顯周宣之德漢宣帝亦單于慕義稽首來朝絶域慕義之心所冀聖明柔遠之德高千百王絶域慕義之心傳于千古贊皇一品制集進朝貢圖序漸以詩書陶一聲教于休烈寇今求哀啓顙許其降也漸以詩書陶一聲教斯可致也服改氈罽語習楚夏薛登曰伏見突厥吐蕃契丹往因入侍並被獎遇官戎秩步黌門服改氈罽語習楚夏黃金為鵝以獻吐蕃謂疆雄曰贊丈夫曰普帝伐邀還使録東贊上書曰陛下定四方日月所照並臣治之高麗侍遠弗率於禮天子自將度隳城陷陳指日凱旋雖鴈飛于天無是之速夫鵝猶鴈也臣謹治黃金為鵝以獻其高七尺中實酒三斛二十二年來獻俘鼠無夜動梟變好音柳宗元狀泥孰立帝詔劉善持節冊號泥孰遣使謝晏於兩儀殿謂無忌曰今蠻夷率服古亦云乎解辮削衽田歸道突厥默啜請和武后詔將軍閻知微冊可汗號持節往默啜又遣使謝知微遇諸道即與緋袍銀帶因表使者即到請備禮廷賜歸道諫曰膚背惠且積年今悔過入朝解辮削衽宜待天旨而知微擅賜使朝廷何以加之宜敕初服須天子命后從焉款闕韓琬上言往夷狄款闕今軍屯積年請和贄魚膠唐史頡利唐之德大矣際天所覆悉臣而屬之薄海內外無不州縣遂尊天子曰天可汗三王以來未有以過之至荒區君長待唐璽纛乃能國一為不賓隨輒夷縛故蠻琛夷寶踵相逮于庭唐契丹贊和戎十一白蠻夷欣戴戎狄率服事之以皮幣結之以婚姻魏絳請和諸戎曰和戎有五利焉戎狄荐居貢貨易土土可賈焉一也邊鄙不聳二也戎狄事晉四鄰震動諸侯威懷三也以德綏戎師從不勤四也遠至邇安五也以兵伐則獲戎失華無乃不可乎賜女樂晉侯賜魏絳女樂曰子教寡人和諸戎狄故八年之中九合諸侯辭曰夫和戎狄國之福也臣何力之有和親侯後漢封王歙為和親侯樊噲請以十萬兵橫行胸奴中季布曰噲可斬也武帝詔求可使絶域者傳曰始修戎好也隱二年會戎于潛和親之謀始於婁敬當婁敬曰胸奴未可以武服宜以長公主妻之生子則為漢外孫外孫為單于豈與大父亢禮哉乃使劉敬往結和親約王恢習胡事以為和親不過數歲使入蕃賜物令雜令諸官人緣使諸色行人請賜訖停行並卻徵已發五百里外停徵巳造衣裳聽兼納東至高麗南至真獦西至波斯吐蕃及堅朝都督北至突厥契丹靺鞨並為入蕃餘為絶域漢通西南夷史唐蒙已略夜郎因發巴蜀廣漢卒通南夷道時筇笮之君聞南夷與漢通得賞多願內屬請隸為臣妾上使司馬相如持節以幣賂西南夷便略定西夷筇笮除邊關通筇笮還報天子大悅之蜀布筇竹張騫曰臣在大夏時見蜀布杖筇竹此其去蜀不遠矣令使大夏從羌中險少北又為胸奴所得從蜀直徑又無寇難天子發使四道並出賜官爵竇融言莎車王賢事漢誠款宜加位虢乃因來使賜賢西域都護印綬燉煌守裴遵上言夷狄大權詔書收還都護印綬賜大將軍印綬使不肯易奪之賢由是始恨孔勝而後和威德兩全封倫突厥寇太原且遣使和親帝問計群臣咸請許之可紓戰倫曰不然彼有輕中國心謂我不能戰若乘其怠擊之勢必勝而後和威德兩全今雖不戰後必乘來臣以為擊之便自言和親無狀定安公主下嫁回鶻崇德可汗至京師詔神策軍回百具鹵簿群臣班迓主乘輅謁憲穆二室欷歔流涕退詣光順門易服褫冠鈿待罪自和親無狀帝使中人勞慰復冠鈿乃入請以宗女嫁叱吉設裴矩以始畢可汗衆漸盛建請以宗女嫁叱吉設建為南面可汗分其勢叱吉不敢受始畢聞之稍怨望禦戎守信為上牛僧孺進門下侍郎洪文館大學士是時吐蕃請和約弛兵而大酋悉但謀舉維州入之劍南於是李德裕上言韋皋經略西山至死恨不能致今以生羌三千人燒十三橋搗虜之虛可以得志帝使群臣大議請如李德裕策僧孺持不可曰吐蕃綿地萬里失一維州無害其彊今修好使者尚未至遽反其言且中國禦戎守信為上應敵次之彼來責曰何故失信贊普牧馬蔚茹川若東襲隴陂以騎綴回中不三日抵咸陽橋則京師戒嚴是雖得百維州何益乃帝然之頡利請和許之翌日刑白馬與頡利盟便橋上本傳紓歲月之禍突厥序和親非久安計而為之者以天下初定紓歲月之禍耳皇室淑女嬪於穹廬掖庭良人降於沙漠同上夫貢子女方物臣僕之職也詩曰莫敢不來享莫敢不來王荒服稱其來不言往也公及吳盟諱而不書奈何以天子之尊與胸奴約為兄弟帝婦之號與胡媼並御蒸母報子從其汙俗中國異於蠻夷者有父子男女之別也婉冶之姿毀節異類垢辱甚矣同上晉人苦兵乃遣開封府將軍張暉假供奉官告聘于契丹奉表稱臣以修和好德光語不遜然契丹亦自厭兵德光母述律嘗謂晉人曰南朝漢兒爭得一向臥邪自古聞漢來和蕃不聞蕃去和漢兒若漢兒實有回心則我亦何惜通好晉亦不復遣使五代四夷附録突厥遣使請婚恐豺狼之心弱則順伏彊則驕逆月滿騎肥乘中國饑虛講親際會窺犯亭障復何以防之魏知古傳密請講和張說始為相時帝欲事吐蕃說密請講和以休息鄣塞與連和突厥阿史那始畢可汗咄吉高祖起太原遣府司馬劉文靜往聘與連和不許和親毗加可汗默棘連遣大臣阿史德頡利發入獻遂從封禪扈封畢厚宴賜遣之然卒不許和親毗伽不敢迎契苾何力帝詔兵部侍郎崔敦禮持節許薛延陀尚主因求何力乃得還公主行有日何力陳不可帝曰天子無戲言既許之叵奈何何力曰禮有親迎宜詔毗加身到京師或詣靈武彼畏我必不來則姻不成而憂憤不知所出下必攜二不及一年交相疑沮毗伽素狠戾必死死則二子爭國內判外攜不戰而擒矣帝然毗伽不敢迎悒不得志恚而死遺錦綵結歡郭子儀屯涇陽軍才萬人比到虜騎圍已合子儀以數十騎出免胄見其大酋曰諸君同艱難久矣何忽忘忠誼而至是邪回紇捨兵下馬拜曰果吾父也子儀即召與飲遺錦綵結歡誓好如初歲給金帛妻之以女五代呂琦契丹數求和琦因言方今之勢不如與契丹通和如漢故事歲給金帛妻之以女廢帝大喜他日以琦等語問樞密直學士薛文遇大以為非因誦社稷依明主安危託婦人之詩以誚琦舅甥和好似聞贊普更求親舅甥和好應難棄杜甫近聞詩詭辭結歡回鶻遣將詭辭結歡潛伺邊隙公密賂其下盡得陰謀李德裕荊州紀功碑思往來之績垂不臣之姻李觀上宰相安邊書切睹北狄和親帝女下嫁實國家思往來之績垂不臣之姻然聞蒸然且數貪婪無厭何待結約張曲江集敕贊普書先代公主既是舅生今日公主即為子壻如是重姻何待結約遇事足以相信隨情足以相親似恃姻好之情一品集賜可汗等書雖云隨逐水草動皆逼近城柵遙揣深意似恃姻好之情每睹縱田實懷馳突之計代結姻好同上賜背叛回鶻書我國家與卿等本國代結姻好久為親鄰協德同心嘗為諸侯所羡故得邊侯不聳封彊晏然良田孟樂同上授回鶻內帝相詔昔戎狄請和良由孟樂呼韓師服始自秩宗
