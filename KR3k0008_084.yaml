body:
  text: 卷第八十四染一白厥篚玄纁載玄載黃我朱孔陽為公子裳詩遂朱緑之遂玄黃之以為黼黻文章謂三宮世婦所獻繭之絲染之以為君祭服周禮天官染人掌絲帛凡染春暴練練其素而暴之夏纁玄玄纁天地之色以為祭服秋染夏夏五色謂之夏者其所謂色以夏為式也書曰羽猷夏翟冬獻功掌凡染事冬官鐘氏染羽以朱湛丹秫三月而熾之湛潰也丹秫赤粟也湛讀如漸車帷裳之漸熾炊也染羽所以飾旌及王后之車也三入為纁五入為緅七入為緇染纁三入而成又再入深以墨則成緅緅側留反復再染以黑乃成緇語曰君子不以組緅飾又曰緇衣羔裘爾雅曰三染謂之纁然玄則六入與月令命有司染彩黼黻文章必以法故無或差貸黑黃蒼赤莫不質良無敢詐偽以給郊廟祭祀之服以旗章以別貴賤等級之度水無當於五色五色不得不章不曰白乎涅而不緇惡紫之奪白受采孔掌染百官志織染署令一人丞二人掌染錦羅紗縠綾紬絁絹布柳汁染衣李固言未第前行古柳下聞有彈指聲固問之曰吾柳神九烈君已用汁染子衣矣科第無疑果得藍袍當以棗糕祀我固言許之未久登第出三峰集素質隨染已悲素質隨時染裂下鳴機色相射杜甫白絲行染人歲籍所染綾帛陳諫強記染人歲籍所染綾帛尋丈尺寸為簿合圍諫泛覽悉記之出唐語林四選香白樂天飛雲履染以四選香染還少府杜佑權攝百司繁而不綱以練染還少府輸染材入宮馬存亮傳敬宗初染署工張韶與卜者蘇玄明善玄明曰我嘗為子卜子當御殿食我與焉吾聞上晝夜獵出入無度可圖也韶每輸染材入宮衛士不呵也乃陰結諸工百餘人匿兵車中若輸材者入右銀臺門約錯夜為變以黦茶染木李守貞與桑維翰有隙賊平行賞悉以黦茶染木給之軍中大怒以帛裹之為人首梟於木間曰守貞首也五代身所御衣必浣染至再三代宗性儉約身所御衣必浣染至再三欲以先天下唐食貨志凡染大抵以草木而成有以花葉有以莖實有以根皮唐六典織染令凡染大抵以草木而成有以花葉有以莖實有以根皮出有方土採以時月皆並其時而修其職焉練二白冬官慌氏慌音忙練絲以涗音稅水漚烏豆反其絲七日去地尺暴之涗水以灰所練子禮反漚漸也楚人曰漚齊人曰涹烏豆反暴步禾反晝暴諸日夜宿諸井七日七夜是謂水練宿於井謂懸於井中練帛以欄為灰漚烏豆反淳其帛實諸澤器淫之以蜃以木欄之灰漸澤其帛滑澤之器也蜃謂灰也鄭曰淫薄粉今其帛白也蛤為蜃今東海有之清灰盝之而揮之清澄也於灰澄而出盝反令盡揮去其蜃而沃之而盝之而宿之更渥淳也明日沃而盝之朝更沃至夕盝之又更沃至旦而盝之上七日而漚絲吳門曳練練謂白色此事見山川貨賄部練縕之具後漢孔以練染還少府杜佑為鹽鐵使以練染還少府練龍水圖為服南唐時有蒼頭持龍水圖求貨或得之將練以為服或釜中雲起蒸見二龍騰躍穿壁而去出偽史練幛為衣名畫記有人收張藻畫松石障既死人求之其妻已練為衣唯得兩幅雙松一石存焉傳後世已為名筆也白攻金之工周禮築氏執下齊多錫為下齊冶氏執上齊少錫為上齊鳧氏為鐘栗氏為量煆氏為鑄桃氏為劍金有六錫金錫相和之節凡鑄之狀金與錫墨氣竭黃白次之黃白之氣竭青氣次之然可鑄周禮鑠金以為器范金鑄金為器修火之利案度程程器小大良冶之子必學為裘鼓鑄鎔煆晉嵇康善煆向秀為之佐欣然旁若無人宅中柳樹乃激水圜夏月居下煆鐘會往省之不與言語煆目不輟孔鑿山冶銀權萬紀奏言宣饒部中可鑿山冶銀歲取數百萬帝讓曰天子所乏嘉謀善政有益於下者公不推賢進善乃以利規我欲方我漢柏靈耶斥使還第久之冶金為俑文懿公主葬冶金為俑怪寶千計實墓中鼓鑄韋倫楊國忠署為鑄錢內作使判官國忠多發州縣齊人令鼓鑄督非所習雖箠抶苛嚴愈無功倫請準直募匠代無聊之人由是役用減鼓鑄多矣銅冶李聽為蔚州刺史州有銅冶自天寶後廢不治民盜鑄不禁聽乃開五爐官鑄錢日五萬人無犯者鐵爐步永州北郭有步曰鐵爐步蓋嘗有煆鐵者居其人去其爐毀者不知年矣柳宗元大鹵之金棠溪之工火化水淬器備以充同上晉問掌冶署令一人丞二人掌范鎔金銀銅鐵及塗飾琉璃玉作銅鐵人得採而官收以稅百官志邊州不軒鐵冶器用所須皆官供凡諸冶成器上數干少府監然後供之並同上冶家子復祖之舊武王既伐商有泣者有司責於其人曰吾冶家孫也數十年之間載易其鎔范矣吾始鑄田器歲東作必大售商賦重秉耒耜者一撥不敢起吾父易之為工器屬宮室臺榭侈其售益倍民凋力窮土木中輟吾易之以為兵器會師旅戰陳其售又倍前也今四海將奉文理吾之業必壞武王聞之於是包干戈觀農事冶家子復祖之舊陸龜蒙白埏埴以為器陶器必良凝土以為器周禮搏埴之工二搏拍也埴粘土也凡陶施之事墾薛暴不入市髺音刮墾損傷也薛音破裂也暴不堅也四者為其不任用不入於市也陶人為甗甑鬲庾榖冬官考工記云合土禮范金合土謂陶器也案度程程大小也有虞氏尚陶貴質也舜陶於河濱器不苦窳史記窳濫也土化鑿杯孔甄官百官志甄官署令掌琢石陶土之事土乎質陶乎成器韓愈瘞硯文藝精埏埴制合規模稟至德之陶蒸自無苦窳合大和以融結克保堅貞且無瓦釜之鳴是猶土釧之德柳宗元進磁器狀陶埴千水涯湘妃廟碑陶土以埴赤在署側人無勞力雲陵亭記土宜陶瓬故侯若以壯劉禹錫連州刺史聽記不則毀文粹陳黯禹誥陶者土之器也持之得其人則完不則毀埏泥范磚李玨牛僧孺碑埏泥范磚始民不知為瓦屋草茨竹椽久燥則戛而焚韋丹為江南觀察使始民不知為瓦屋草茨竹椽久燥則戛而焚丹召工教為陶聚材於場度其費為估不取贏利人能為屋者受材瓦于官免半賦陶固收盆罌韓愈聯句陶甄梓匠之工柳宗元與呂恭書陶甄梓匠之工備孽火不得作知舜之陶器不苦窳為信然而舜之德可以及土泥而不化其子何哉是又不可信也同上與楊誨之白弄瓦詩乃生女子載弄之瓦運甓晉陶侃為廣州每於齋中運甓婢力反侃字士衡毀方瓦合鴛鴦甑瓦瓦合之衆有虞氏瓦棺瓴甓建瓴挈瓶瓶之罄矣維罍之恥甕易曰井谷射鮒甕敞漏又禮曰甕牖又漢陰丈人抱甕出沒灌園又晉畢卓入比舍郎甕間盜飲又羊雅冬釀酒令人抱甕取暖甑周禮陶人為甑實二釜厚半寸唇寸底七孔穿之墜地不顧後漢孟敏字叔逵負甑行墜地敏不顧郭林宗見而問之對曰甑已破視之何益林宗奇其言勸學問三府辟不就紀甗傳齊賓媚人賂晉師以紀甗甗無底甑也牢媚人國佐也盆記曰及良日夫人繅三盆又司馬遷書曰戴盆何以望天又莊子喪妻箕局鼓盆而歌鼓缶叩缶髺墾薛暴不入市見陶門注孔教作宗室復轉嶺南節度使教民作陶瓦變屋瓦王仲舒徙蘇州堤松江為路變屋瓦教民陶瓦楊於陵出於嶺南節度使教民陶瓦易蒲屋以絶火患無陶瓦西城拂菻無陶瓦屑白石塈屋堅潤如玉聚瓦材於場始教民為瓦屋取材於山召陶工教人陶聚瓦材於場韓愈韋丹墓志盥濯陶瓦韓文聖德詩陶埴于水涯乃桴乃載柳宗元二妃廟桴木負埴載流於江同上陶瓴甓終南山祠堂碑土工六白小人勞力屬役悅以使民民忘其勞為力不同科言力役之事輕重有等勤恤其人事充役煩力敝興事任力愛人為大歐以就役任役服勤暫勞永逸官庀役徙勤而不怨荒度土功書曰荒大也大度土功刑人力順天時凡啓塞從時門戶道路謂之啓城郭牆塹謂之塞皆啓閉之急不可一日闕墮壞時而理之左傳靈臺經始子來詩曰經始勿亟庶民子來言文王始經營靈臺亟急也衆人自以子義樂來而為之施舍舍勞役傳弛力息徭役築之登登用力貌百堵皆作雖用千夫之役終資一簣之功家一人周凡起徒役無過家一人其餘為羡唯田與追胥竭作云云比居周禮職政役以比居巡役方役之事則巡行也同上人徒役三日禮曰用人之力歲不過三日治宮室城郭築者客土疏惡成詔言解萬年作昌匿五年未成客土疏惡言取他處土為客上説築傅巖之野土國城漕役土工於國也詩土事無作月令地氣沮泄謂發天地之房役事所役之事巡功傳曰宋城華元為植巡功計料令尹薳艾獵城沂量功命田分財用平版幹稱畚築程土功議遠邇略基趾具餱糧事三旬而成不愆于素不失本計之期薳艾獵孫叔敖也士彌牟菅城周計丈數城之丈數揣高卑揣度也刃溝洫刃度也物土宜議遠邇物幾物相也相取人功土遠邇之期量事有期知幾時畢計徒庸用幾人工慮材用計所屬役賦丈城之尺度十月庚寅栽栽設版築量力人不告勞事無愆素揆日稽其功事順時時以作事悅以使人夫土功龍見皆務戒事龍見九日農務畢始戒以土工之事火見而致用致築作之物也水昏正而栽十一月也樹版幹而興作日至于畢日南至微陽作動故土工息也欲無犯時傳曰城諸及防時也月令孟冬可以築城郭造宮室興事任力用人必順順天時也得其時制順作時事以道使人禮冬築郎囿書事時也雖未及時而農事畢可以成故曰書事時也功惟勿亟人則忘憂不時傳曰夏城郎書不時也速成剿人季平子欲城郎囿孫昭子曰焉得速成其以剿民姦時以動言時則妨民多矣作事不時則怨讟動於人月令孟春無聚大衆無置城郭妨農事也孟夏無起土功不可以動衆宋皇國父為平公築臺妨於農收子罕請俟農功之畢公不許築者歌曰澤門之晰實興我役國父白而居澤門邑中之黔實慰我心子罕黑而居邑中子罕聞之親執撲以行築者而抶其不勉者曰君為一臺而不速成何以為役謳者乃止子罕分謗也勿亟不時使人以道則罔告勞作事不時必聞胥怨梁好土功罷人以潰宋妨農事築者用謳時使日敝苟乖龍見之期見上注則起人疲之怒要懲怨勞苦問其勞苦事不愆素不堪命梁伯好二功亟城而弗處人罷而不堪民不罷勞役徒幾盡敢憚劬勞庶人疲敝胡轉豫于恤不敢告勞莫知我勩勩勞也民力凋盡怨讟並作人亦勞止哀我疸人亦可息也慘慘劬勞斬艾民力日敝人力不堪事充力竭恤隱恤勞勞力息肩夏王率遏衆力遏絶也梁亡不書其主自取之也以梁伯好土功故也剿人勞人雖有形人之力而無醉飽之心形人之力而便之去其醉飽過盈之心盍思凋敝敢憚勤勞請解吾人之慍無興代役之禮以為草芥苟不恤於人疲雖有金湯亦何憂於魚爛荒度土功斬艾人力辱在泥塗保其筋力役夫築者老者之事禮曰凡吏人任老者之事食壯者之食事勤人怨剿人實難無城猶可人勤於力則功築罕榖梁傳孔躬護役作竇懷貞睿宗為金仙玉真二公主營觀懷貞躬護役作族弟維鍌諫曰公位上袞當思獻可替否輔天子而計校瓦木雜廁工匠間使海內何所瞻仰乎不答非憂物恤人所急韓思復帝作景龍觀思復諫曰禍難初弭土木遽興非憂物恤人所急不見省辛替否疏營寺造觀日繼于時道路流言計用緡錢百餘萬陛下知倉有幾歲儲庫有幾歲帛百姓何所活三邊何所輸民散兵亂職此由也又曰往者和帝之憐悖逆也宗晉卿勸為第宅趙履溫勸為園亭工徒未息義兵交馳亭不得遊宅不得息陛下所見也今茲二觀得無晉卿之徒陰勸為之又疏今大起寺舍廣營第宅伐大空山不足以給棟梁運土塞路不足以充牆壁誇古耀今逾章越制百寮鉗口四海傷心見唐策帝作飛仙宮魏證疏曰隋煬帝惟宮室臺榭是飾徭役無時費巨百萬姚崇日武后造福先寺上皇造金仙玉真二觀費巨百萬臣請絶道佛營造可乎窮人力以事工盧藏用武后作興泰宮於萬安山上疏諫曰陛下離宮別觀固多矣又窮人力以事土木臣恐議者以陛下為不愛人而奉己也馬周疏曰五六年來頻歲豐稔一匹絹易栗十餘斛而百姓咸怨以為陛下不憂憐何則今營為者多不急之務故也掊怨天下封德彝禓素營仁壽宮表為土工監規創鴻侈宮成文帝怒曰素殫百姓力為吾掊怨天下白衣上書高郢代宗為太后營章敬寺郢以白衣上書諫曰奈何戎虜未平侵地未復金革未戢疲人未撫太倉無終歲之儲大農有榷酤之敝欲以此時興力役哉土木並起日課萬工今興造趣急人徒竭作土木並起日課萬工不遑食息榜笞愁痛盈於道路以此望福臣恐不然營治不時畢奪稟韋溫太和五年太廟室漏鏬詔宗正將作營治不時畢文宗怒責卿李鋭監王堪奪其廩自敕中人葺之溫諫王興請度昭應南山作天華上宮露臺大地婆父祠並三皇迫君太古三皇中古伏羲女敕等各為堂皇給百戶掃除又即義扶谷故秋祠龍置房宇有詔從之乃除地課工方歲飢人不堪命昭應令梁鎮上疏切諫臣昨受命有所安輯陛下許以權宜今所興造臣謹以便宜悉停帝從之土木是興尹思貞授將作大匠僕射盧懷貞護作金仙玉真觀廣調夫匠思貞數有損節懷貞讓之答曰公輔臣也不能宣贊王化而土木是興以媚上害下又聽小人譖以廷辱土今不可事公矣乃拂衣去輦材瓦薛廷老為右拾遺敬宗政日僻嘗與舒元褒李漢入閣論奏元褒曰宮中興作太甚帝色變曰興作何所元褒不能對廷老曰臣等以諫為職有問即應論奏然見外輦材瓦絶多知有所營帝曰已諭時造清思院殿中用銅鑑三千薄金十萬餅故廷老等悉言之高季輔上五事以謂陛下身幸節儉而營善未息丁匠不能給驅使又和雇以重勞費人主所欲何求而不得願愛其財毋使殫惜其力毋使弊怨結三靈謗蒙四海李嶠上書曰今又崇作寺觀功費浩廣今山東歲飢糟粳不厭而投艱厄之會收庸調之半用吁嗟之物以營土怨結三靈謗蒙四海棟楹梁桷板檻之腐黑撓折者蓋瓦級磚之破缺者赤白之漫漶不鮮者治之則已無移前人韓文滕王閣記匠者度材以捐衆徒藝者運思以役衆技劉禹錫修寺記登登其杵坎坎其斧繩之墨之鑿柄枝梧載暨載塗黟烏凌虛許州文宣王廟碑鏟崖堙卑驅石剪棘李白趙公亭頌以門以墉乃棟乃宇同上匠生於心隨指如化開山剪木役以私屬劉禹錫別集白經啓大道遠績劉子謂趙孟曰美哉禹功吾子盍遠績禹功而庀人乎荒度土功荒大也受賜民到于今受其賜暫勞永逸慱哉之利遠矣禹功開物之智成功禹成厥功遠矣濟時之功役不告勞事無愆素量功戒事命曰庀徒人可樂成難與慮始智能慮遠愚可樂成苟未僝功豈無胥怨隨山刊木孔鑿石通車吐番傳度悉結羅嶺鑿石通車逆金城公主道也鑿道趣城西城康者東有媲摩川度迹行二百里得尼壞城在大澤中地墊洳蘆菼荒茂行者鑿道趣城通于闐鑿翠鑿翠開戶牖杜甫九成宮疏鑿就欹斜禹功翊造化疏鑿就欹斜柴門詩鑿石為月河天寶中以三門河道險厄漕運阻難乃令旁北山鑿石為月河以備湍急名曰月寶河歲省運夫五十餘萬又無覆溺之患天下稱之其河東西徑直長五里餘闊四五丈深二丈三丈至五六丈皆鑿石得古鐵鏵上直平陸兩字改為平陸縣旌其事也出開元記鑿山冶銀權萬紀奏宣饒部中可鑿山冶銀歲取數百萬帝曰公乃以利規我欲方我漢柏靈耶鑿門導伊兩阜屏開李庾賦鑿石作鼓隳嵯峨韓文鑿八節灘白居易鑿敗灘石以平贛梗韓文路公碑白間人圍移執事周禮太宰以九職任萬民九曰間民無常職轉移執事間人謂無業者轉移為人執事間人若今之傭人僕賃傳申鮮虞僕賃於野移用其人轉相助救周禮揆以時日計其功用計傭揆日廢事食力傭保司馬相如於臨邛市沽酒使文君當壚相如衣犢鼻與傭保相雜作滌器注傭人之可保傭者也傭耕陳勝少時常與人傭耕輟耕於隴上而歎不取直魏焦老自作一蝸舍淨掃其中呻吟獨取飢則為人客作飽食而已不取其直傭書吳闞澤貧常為人傭書以供紙筆所寫既畢誦之亦遍賣傭彭城為家人時窮困賣傭於齊為酒家保也僦賃鄭當時字莊征胸奴招四夷天下費多財用亦屈當時為大司農任人賓客僦賃夕逋負此以陷罪貶為庶人注僦賃受雇賃而載運也言當時保賃其賓客於司家載運孔寫書取傭王紹宗少貧狹嗜學工草隸客居僧坊寫書取傭自給凡三十年傭足給一月即止不取羸人雖厚償輒拒不受御史不償李畬母者失其氏畬為監察御史得廩米量之三斛而羸問于史曰御史米不暨也又問車庸有幾曰御史不償也母怒敕歸餘米償其傭因切責畬自傭王琚謀刺武三思事泄亡命自傭於楊州富商家識非庸人以安嫁之厚給以資雜傭保王方翼母李為主所斥居鳳皇墅方翼尚幼雜傭保執苦不棄日墾田植桑治林垠塈完牆屋燎松丸墨為富家卜祝傭保張玄素傳卜祝傭保量能並用負簷九白負也者小人之事弛於負簷齊使敬仲為卿辭曰羈旅之臣弛於負簷君之惠也負荷其父析薪其子不克負荷息肩鄭請息肩於晉注以負簷喻也荷篠遇丈人以杖荷蓧儋石劉毅家無儋石之儲一擲百萬負薪之憂簷人之爵未能負薪孔班白負戴李子通居鄉見班白負戴必代之負取不勝李密民食興洛倉者給受無檢至負取不勝委於道零落艱難韋蘇州白沙亭逢吳叟歌問之執戟亦先朝零落艱難卻負樵刈熟簷肩赬韓文城南聯句簷贓負賄舊唐史盧懷謹時政號簷贓負賄僥幸或即蒙升自軒轅以來服牛乘馬今輦負則人代畜唐史王求禮疏舂十白易曰斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過周禮地官舂人掌米物物非一米祭祀供粢盛之美賓客供牢禮之米可成筐呂者也凡享祀米享有食米則享禮兼宴與食也不相鄰有喪舂不相賜晉衛瓘為太子少傅詔賜田園水碓辭不受意儉約耳守魏舒陽元少遲鈍雖叔父猶不知之使守水磨不介意封水碓劉頌為京兆太守洲漢二水有公主碓二十餘區所在塞流水輒為侵害上表封諸水碓獲便利也衣赭舂於市漢申公白公斗粟漢文殺淮南王人歌曰一斗粟尚可舂兄弟二人不相容賃舂梁鴻韋具妻舉案齊眉事定交杵臼之間漢公沙穆奏遊太學無資乃變服為傭為吳佑賃舂祐與語大驚遂定交杵臼之間連機傳暢晉諸公贊曰杜預元凱作連機水磑由此洛下榖米豐賤水磑石崇臨刑有簿閲崇財物有水磑三十餘區馬磨蜀志許靜為許劭排擯不得齒序以馬磨自給即搖回蟻之輪還破鳴鳩之麥舊判洛陽董德之磑同上磨賦諸葛恪別傳孫權饗蜀使費禕食湯餅索筆作麥賦恪以請筆作磨賦咸稱善蟻行磨上抱朴子天圓如蓋地方如碁局入旁轉如推磨而左行日月右行隨天左轉天牽之西沒譬如蟻行磨上磨左旋蟻右去磨疾蟻不得隨磨左回孔競碾磑李元紘為雍州司戶參軍時太平公主勢振天下百司順望風指嘗與民競碾磑元紘還之民舂市戚姬髡髮入舂市萬古共悲辛李白中山妾歌作婢舂黃糜珊瑚破高齊作婢舂黃糜杜牧杜秋娘詩宿舂北距灃浦資宿舂而可行劉禹錫杜司徒書水舂雲母碓李白詩鄰女夜舂寒李白野碓杜甫雨詩柴扉臨野碓半熟搗香粳村舂雨外急同上村夜落杵光輝白除芒子粒紅同上粟不暇舂陸宣公奏議論長史增戶債負十一白周禮凡有債者判書以治則聽謂出債之息判書舉債之契書民失則治之又曰凡屬債者以其地轉而聽其辭屬債轉債使人歸之而本主死亡歸受之數相抵冒者也以其地之人比近能為證者乃受其辭而治之也傳曰已債已止也已債棄逋債也漢朝錯曰急政暴賦有者半賈而買無者取倍稱之息稱舉息利也倍利而舉債又曰故有鬻子孫賣田宅以償債也稱息漢書商賈大者稱貯息少者坐列販賣注稱舉也十倍之利貨殖志吳楚兵起長安列侯行從軍齊貸子家以關東勝敗未決莫肯與之惟母鹽氏出千金貸之其息十之三月吳楚平一歲中息十倍注行者須糧而出錢家貸十倍之也折券馬援棄債高祖從王媼氏武負貰酒歲竟二家嘗棄債周禮聽稱債以別傳傳別券書也見下門注中周禮賒者祭祀旬日喪紀三月國服為之息以其國之所出為息利也貸粟莊子貸粟於監河侯舍債晉王長文德睿太康中開倉賑貸長文後無以償郡縣切責送之上州刺史徐幹舍之也求假不稱曹洪家富而吝嗇文帝少時求之假不稱常恨之後因事而免官爵敵國貸粟越大夫種曰臣觀吳政驕矣請弒之貸粟以下其事吳王欲與子胥諫勿與之孔債帥高瑀領忠武節度使自大曆後擇帥悉出宦人中尉所輸貨至巨萬貧者假貸富人既得所欲則椎斫膏血倍以酬息十常六七及瑀有命士相告曰韋裴作相天下無債帥負逋許孟容貞元十九年夏大旱上疏言負逋饋送當免免之負博數十萬來俊臣父操博徒也與里人蔡本善本負博數十萬不能償操因納其妻先己娠而生俊臣冒其姓柳人以男女質錢過期不贖子本均則沒為奴婢宗元設方計悉贖歸之尤貧者令書庸視直足相當還其質已沒者出己錢助贖柳宗元本傳里無逋家柳仲郢每旱潦必貸匱觸負里無逋家負五坊息錢裴度傳大賈張陟負五坊息錢亡命坊使楊朝汶收其家簿閲貸錢雖已償息鉤止根引數十百人列捶挺質不承又獲盧大夫逋券捕盧坦家客債償久乃悟盧群券坦子上訴朝汶讕語錢入禁中何可得御史中丞蕭俯及諫官列陳中人橫恣度亦極言之時方討鄆帝曰姑議東軍此細事我自處辨度曰兵事不理止山東中人橫暴將亂都下帝不悅徐乃悟讓朝汶曰以爾使我羞見宰相命殺之而原繫者由是京師澄肅三倍取償穆宗皇后蕭氏閩人也初后去家入長安不復知家存亡惟記有弟帝為訪之我有男子蕭洪因后姊壻呂璋白見之太后謂得真弟悲不自勝帝拜洪金吾將軍出為河陽三城節度使稍徙鄜坊始節度自神策出者舉軍為辨裝因三倍取償洪所代未及償而死軍中並責償於洪洪不許左軍中尉仇士良憾之負息錢數百萬或勸治居産李守禮曰豈天子史無葬耶契券十二白周禮小宰以八成經邦國四曰聽稱債以傳別稱債貸債也傳別券書也聽訟債者以券書責次之傳著約束之文書別有兩家各得一也六曰聽取與以書契書契與受人之要也十曰聽買賣以質劑書市之平價謂兩書一札同而別之長曰質短曰劑傳別質劑皆今之券書也交易而退作法示信俾人不爭結信止訟周禮以質劑結信而止訟大市小市周禮質人凡買儥者質劑焉大市以質小市以劑注云質長券劑短券儥賣也兩劑見上由質要由用也質要契券也傳云執右契禮曰獻粟者執右契謀始不明訟之所生由契之不明也有德司契出老子判書舉債之券書奠債奠定約言要詞要約保人周禮立券為保使之相保必由質要以息訟端伏羲始造伏羲氏之王天下也始畫八封造書契周禮司會掌左契書契舉契王叔氏不能舉其契聖人執左契左契心也左者不用之地以喻無為又云左陽也心藏陽也焚削後漢樊重假人間貴令人焚削文契前定折券高祖事具債負門注徵辭利有爭端信為言要書致獻田宅者操書致代結繩造書契以代結繩之政孔燹券羅讓或以婢遺讓者問所從答曰女兄九人皆為官所賣留者獨母老耳讓慘然為燹券召母歸之出券貸直盧群遷鄭滑行軍司馬姚南仲入朝即以群代節度嘗客于鄭質良田以耕至是則出券貸直以田歸其人以券上進五代常思廣順三年從鎮歸德居三年來朝又徙平盧思因啓曰臣居宋州民負臣絲息十萬兩願以券上進太祖頷之即焚其券詔宋州悉蠲除之金券范君璋奔突厥陷馬邑其部皆中國人多叛去君璋窮乃降自謂障虜贖罪高祖遣鴈門人元普賜金券書契以質浮偽韓文劈木契分受之李巨玄宗末祿山陷東京授河南節度使巨奏曰方今艱難恐為賊所詐如忽召臣不知何以取信玄宗劈木契分受之遂以巨兼統嶺南節度使李嵩第為晉宰相契丹犯闕從虜北行留守鎮州漢高祖入汴以嵩之第賜蘇逢吉嵩之第嶼嶬酣酒言及奪我居逢吉之部逋李嶼船傭嶼撻之遂告變乃自誣服罪舉家遇害五代史乞假十三白唯名與器不可以假人雖有挈瓶之智守不假器禮無疆丐乞丐袁紹書曰曹操父嵩乞丐攜養禮內外不通乞假雖嫌疑也又云乞假於人必量而後入不入而後量量其可否假蓋夫子不假蓋於子夏護其短也借人有馬者借人乘之假羽毛而不歸久假而不歸孟子曰堯舜性之也湯武身之也五伯假之也久假而不歸惡知其非有也假不反矣假道璧假許田乞食重耳過衛乞食於野野人與之塊乞醯孰謂微生高直或乞醢焉乞諸其鄰而與之乞糧吳申叔時乞糧於公孫有山有山曰梁則無矣粗則有之若登首山以呼曰庚癸呼則諾亦無幾求言所求少勿虛其請得之不貴孔從民借狗滕王元嬰為金州刺史巡省部內從民借狗求置所過為害假鹽麴韓全誨傳始張濬判度支賜復恭以軍資乏奏假鹽麴一歲入以濟用度遂不復還羸服丐人間膠東郡王道彥幼孝謹初神通避使于鄠被疾山谷間纍旬食盡道彥羸服丐人間或採山實以進神通未食不敢先即有所分辭以飽乃藏辨以待若稼而榖圃而蔬不丐買而有也柳宗元貸借更何患韓愈詩謂言安堵復貸借更何患乞丐酒食文粹李商隱齊魯二牛劉又穿屐破衣隨尋常人乞丐酒食為活乞丐凍餒元結時議吾州里有仁信之者方直之者今或有病父老母孤兒寡妻如身能存者皆力役乞丐凍餒不足況於死者父母妻子人誰哀之執契簷囊陛宣公奏議斂穫始畢餱糧已空執契簷囊行復貸假丐貸文粹陸龜蒙論文書未嘗歷王公丐貸飾車馬不相假借高士廉進益州都督長史蜀人雖昆弟不相假借士廉為設條教翕然為變乞食歌姬院韓熙載後主即位頗疑北人鴆死者多而熙載且懼肆情坦率不遵禮法破其財貨售妓樂逮百數人日與荒樂蔑家人之法所受月俸至則散為妓女所有而熙載不能制之以為喜既而日不能給遂弊衣屨作瞽者持獨絃琴俾舒雅執板挽之隨房歌鼓求丐足日膳江南野史民行乞食者屬路唐史食貨志百姓殘於兵盜米斗至錢七千鬻籺為糧民行乞食者屬路乞米煩佳客杜甫詩丐食取給李揆元載秉政奏揆試祕書監流淮養疾家百口貧無祿丐食取給牧守稍厭慁則去之流落凡十六年載誅始拜睦州刺史持鉢乞食北夢瑣言裴休常披毳衲於歌姬院持鉢乞食曰不為俗情所染遺物十四白周禮凡得獲財貨人民六畜者委于朝告于士旬而舉之大者公之小者庶人私之委于朝十日待來識之者也人民謂則人奴隸也若今時得遺物六畜也舉之沒入官大夫入公小者入私也路不拾遺義然後取苟得遺金列伯傳羊子乃遺金一餅妻讓之有妾聞君子不以利污行羊子慚而棄之亡弓蓍簪少原婦人亡之墜屨昭王管寧錢孔夜發遺袍張允濟為武陵令有行人夜發遺袍道中行十里乃寤人曰吾境未嘗拾遺可還取之既而得袍遺簪屨王藹祖二疏圖記有避席而遺簪屨者利十五禁利兼并附白以利得人周禮以九兩繫邦國之民六曰以利得人注云為政之利賈而欲嬴而惡囂乎好利惡器專利自封蘊利生孽不為利回小人喻於利因人之利而利之放於利而行多怨子罕言利趨利之人如水走下朝錯言云禁利公無禁利謂不與人共也周禮凶年荒政則舍利無禁利也奪人專利錮齊人之利國禁野禁厲禁謂山野之林遮禁也周禮有司教導月令山林藪澤有能取蔬食田獵禽獸者有司教導之其有相侵奪者罪之而不赦林麓川澤以時入而不禁禮與人同利禮無盡利子曰君子不盡利以遺人言不與人爭利也禁彼山林苟以利之為利嚴其厲禁豈曰仁而愛人地林邦禁衆庶所資職司是掌示人知禁作法於貪公不害私義惟和利為邦以禮材則有餘作法於貪人將安卯物既阜蕃國寧乏用將思佐賦曾不恤人文王之囿與人共之與衆共之禮不獨有道存利物政在養民因人所利而利之不亦惠而不費兼并取貧富中事用禮曰君子不盡利以遺人不與人爭利不兼人之利專利自封禮記孟獻子曰伐冰之家不畜牛羊畜馬乘之家不察雞豚為兼利也國有四人業唯區別職無二事利不兼并侵冒盈厭幅利晏子曰人生厚而用利於是乎正德以幅之謂之幅利君子仕則不計帝召至便殿問榷酤利歲出內幾何諝久不對帝復問曰臣有所思帝曰何耶諝曰臣自河東來涉三百里而農人愁歎榖菽未種誠為陛下軫念元元先訪疾苦而乃責臣以利孟子曰治國者仁義而已何以利為故未即對帝曰微公言朕不聞此趣小利陸贄奏趣小利昧遠圖德宗晚喜聚財李玨帝又語貞元初政誠善玨曰德宗晚喜聚財方鎮以進奉市恩吏得賦外求索此其弊也言財利房琯於是第五琦言財利幸為江淮租庸使琯諫曰往楊國忠聚斂産怨天下陛下即位人未見德今又寵琦是一國忠死一國忠生無以示遠方帝曰六軍之命方急無財則散卿惡琦可也何所取財琯不得對利可通而不可竭宇文融等贊夫民可安而不可擾利可通而不可竭觀數子乃欲擾而竭之斂怨基亡則向所謂利者顧不反哉走絲毫之利盧坦書得利則躍躍以喜不得利則戚戚以泣若不可生者豈韋侯之謂哉韓文開元中宇文融始以言利得幸於時天子見海內完治偃然有攘郤四夷之心融度帝萬調兵食故言隱戶剩田以中主欲利説一開天子恨得之晚不十年而取宰相雖後得罪而追恨融少有所未盡也孟子所謂上下征利而國危者可不信哉裴冕明強嗜利不知大體本贊名勝於利則偷競日銷利勝於名則貪暴滋煽唐史薛登疏蕭至忠本非賢而寄賢以姦利失之則邀利以喪賢唐史本贊
