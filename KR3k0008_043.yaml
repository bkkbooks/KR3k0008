body:
  text: 卷第四十三白毀舊府晉羊祜督荊州時長吏喪官人多毀舊府祜以死生有命下征鎮禁之請替惡闕范寧求補豫章帝曰不宜令守無以身試死寧臨行上疏云云公亮於幽顯可以經夷險而不變不敢居官舍晉樂廣為河南尹官舍多怪前尹不敢居廣居之孔菑除其署李吉甫改郴饒二州會前刺史繼死咸言牙城有物怪不敢居吉甫命菑除其署以視事云以柳易播中山劉夢得亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭願以柳易播遇有以夢得事白上者於是改連州韓文五溪不毛處劉禹錫傳敘張九齡為宰相建言故臣悉徙五溪不毛處然九齡自內職出始安有瘴癘之歎罷政事守荊州有拘囚之思身出荒陬一失意不能堪矧華人士族必致丑地然後快意哉天荒闕欣州刺史是天荒闕蓋歷任多死時有金吾郎將任此官舍果有蛇怪後亦絶之饒州餘千令宅亦如此南部新書勸易署寢李玨治淮南三節度皆卒於鎮人勸易署寢玨曰上命我守楊州是實正寢若何去之戶部為凶官畢構進戶部尚書久之移疾帝手疏醫方賜之當時以戶部為凶官遽改太子詹事冀其愈會卒邠署相傳刺史視其壞莫敢葺李聽拜邠寧節度使邠署相傳不利治垣捨前刺史視其壞莫敢葺聽曰將出鑿凶則何避治署亟使新之卒無畏白休謁休請從吉休沐歸休請給長假並假名也豫告賜告漢律令二千石有豫告有賜告豫告者在官有功最法所當得者也賜告者病滿三月當免天子優賜其告帶印綬將官屬歸家治疾至成帝時賜告不得歸家自馮野王始杜欽言於王鳳曰竊見令云吏二千石告過長安謁不分別賜子今有司以為豫告得歸賜告不得是一律兩科失省刑之意夫三最豫告也注在官連有三最則得豫告也或病滿賜告詔恩也今告則不得失輕重之意鳳不聽竟坐野王後遂為常也過長安謁漢令曰吏二千石過長安謁注云者自曰得告也律吏二千石已上告歸歸寧道不過行所在者便道之官無辭漢律五日一沐漢律吏得五日下言休息以洗沐也晉令一月五給晉令給假者一月五給一年之戶六十日為限里內者病疾中延二十日及道政解故九十五日也解職晉起居注武帝詔大臣疾假滿三月不差解職弔死問疾後漢祝皓字子春篤於仁義為吏休歸先周旋鄉里弔問疾畢乃還家恤喪拜老後漢吳馮字子高為郡吏每休假先存恤行喪孝子次瞻疾病畢拜覲耆老然後還家定省宋書王敬則子恢之為祕書郎恢之常請假東還定省遊集世說車武子為侍中與東亭諸人期共遊集乃早請結荷檐後漢許荊字子張家貧為吏休假嘗單步荷檐清節稱於鄉黨策杖後漢范丹字史云為郡功曹每休假嘗單步策杖山郎漢書幫事郎出錢市財用給文書乃得出名曰山郎注云山財所出故曰山郎移病盡一日輒償一休注云出財者能休常在外貧者實病皆以休假償之其豪富則出出遊戲或行錢得善部貨賂流行傳相放效楊惲為中郎將罷出山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎皆化之莫不自勵不肯休薛宣為馮翊賊曹掾張扶至日獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚日至吏以令休所繇來久曹雖有公事家亦望私恩掾宜從衆歸對妻子設酒肴請鄰里一笑相樂亦可矣扶大慚不與休魏志劉類為弘農守使不與休假專使為不急也退食自公休沐未嘗出門張安世精力於職多病賜告汲黯多病疾且滿三月上嘗賜告者數焉終不愈不欲出文帝幸鄧通亦願謹不外交雖賜洗沐不欲出也又董賢聖卿便僻善媚每賜沐浴不省出歸常留中視醫藥哀帝乃詔賢妻得通籍入殿中違假史李園求事春申君為舍人謁歸故失期還謁春申問之對曰齊王使求臣女弟使者飲故失期也又賈逵梁道為豫州刺史兵曹從事受前刺史假逵到數月乃還逵考竟先之不限日拜墓假晉陸曄仕録尚書求歸鄉里拜墳墓有司奏舊制假六十日顏含馮懷以為曄居台司受托付大臣之義本在忘忌既蒙詔許省墳墓豈容有期愚謂宜還自還不須制日詔從之葬妻魏舒元陽為尚書三娶妻皆亡是年自表乞假葬妻詔賜地及錢孔休沐如令李德裕元和後數用兵宰相不休沐或繼火乃得罷德裕在位雖遽書警奏皆從山容裁決率午漏下還第休沐如令沛然若無事時得告還鄉里高智周為侍讀得告還鄉里嘆曰進不知退取祝之道也即移病去太學生謁急狄仁傑太學生謁急後亦報可仁傑曰人君惟生殺柄不可假人至簿書期會宜責有司學徒取告丞簿職耳若為報可則胄子數千凡幾詔邪為定令示之而已后納其言遇休日使至第召王琚每見閣中視日簿乃得出遇休日使至第召之謁告上蒙魏元忠謁告上蒙詔宰相諸司長官祖道上東門賜錦袍給千騎四人侍賜銀千兩許休浣張薦顏真卿為李希烈所拘遣兄子峴及家僕奏事五輩皆留內客省不得出薦上疏望許休浣告以安否疏奏盧杞持之不報休沐遂茲日韋應物休沐東還貴胄里詩休沐遂茲日一來還故墟休沐去人遠高齊出林抄答李博士上公門懸甲令浣濯遂其私授衣日還田里詩上舉薦三白禹稱善人不善人遠矣稱舉也舉不失德出淹滯趙宣子為政振廢滯祁奚舉善舉讎舉子君子曰能舉善矣利其翹楚務在擇人選於衆舜有天下選於衆舉皋陶不仁者遠矣湯有天下選於衆舉伊尹不仁者遠矣蒸我髦士蒸進也夫舉無他唯善所在選於衆所試如有所譽者其有所試矣無求備於一人或以事舉或以德進或以言揚待舉待取儒有席上之珍以待聘忠信以待舉力行以待取推賢而進儒有推賢而進達之不望其報其舉賢援能有如此者援引也善不可失取節於葑菲考其德藝周禮舉以賢良漢令諸侯舉賢良方正直言極諫之士秀才茂才輒以名聞引薦白屋韓子對揚紫殿劉琨非常之才不次之用進賢推士鄭當時好進賢推士推擇搜揚濟濟多士舉類傳惟其善故能舉其類顯忠遂良旁求上薦登庸群材允厘庶政人代天工雍熙可致賢為國寶反陋必揚當反席之求膺及門之選道既日彰賢亦歲貢稽諸虞典審九德而擇賢考彼漢章懸四科而取士漢三公辟召以四科取士一曰德行高妙二曰通經學三曰饒法令四曰剛毅多略也漢書時賢達吏周禮太宰以八統御萬人三曰進賢四曰使能七曰達吏謂一舉勤勞之小吏也賢能之書周禮卿大夫獻賢能之書於王王再拜受之登於天府注書書賢者名也王拜受之重得賢也及門進士之門同升諸公君子於時實惟難進主司取士亦不易知俊造俊士造士也士之秀者始以名稱終因事舉舉賢使能禮既升歌於鹿鳴將接武於鴻漸請效禹稱善人庶使衛多若子推轂坐舉人漢華陰守丞嘉上封事言朱雲可試守禦史大夫坐之拔茅易拔茅茹以其匯征吉言賢人能進拔同類也無行韓信家貧無行不得推擇為吏薦武士叔孫通專言群盜壯士進之弟子百餘人怨通通曰漢王方蒙矢石諸生寧能斗邪狐裘反衣漢楊興言於史高曰將軍所舉不過門下賓客富貴在身烈士不舉是有狐白裘而反衣之平原匡衡材智有餘隨牒遠方高乃辟衡為儀曹吏提衡張湯杜周相為提衡引重竇嬰灌夫二人相為引重引重相稱舉也處士薦人符融公府連辟皆不應太宗薦代有名稱到官請融相見融往薦達郡士范寧韓卓孔胄三人因辭自絶抗孤士朱穆曰韓安國之操不能抗一孤士況其下乎為將用儒士後漢祭遵為將軍取士皆用儒術有私或問第五倫公有私乎對曰人有與吾千里馬者雖不受每三公有所與送心不能忘亦終不用豈能謂無私賓薦士不薦士後漢杜密為比海相去官居穎川每謁郡守多所陳托同郡劉勝字季陵亦自蜀郡告歸閉門掃執無所幹及太守王昱謂密曰劉季陵清高士密知昱激己對曰勝位為大夫是禮上賓而知善不薦聞惡無言隱情惜己同於寒蟬此罪人也令密達力行之士不亦萬分之一乎昱慚而服其言恥舉主張儉元節舉茂才以刺史非其人謝病不起兄弟頻舉吳劉繇字正禮兄岱字公山平原陶丘洪薦繇岱後欲舉正禮刺史曰前年已舉公山洪曰若明公用公山於前擢正禮於後所謂陶二龍於長途騁騏驥於千里也臥龍蜀先生屯新野徐庶曰諸葛孔明臥龍也不可屈致將軍宜枉駕管庫趙文子為政舉管庫之上七十有餘家死不屬其子薦盜管仲於群盜中拔二人用之曰可人也其所與游僻也察舉揚歷魏王基舉管寧曰優賢揚歷注揚其所能而歷試出自幽谷遷於喬木詩伐木丁丁鳥鳴嚶嚶喻朋友相引薦薦延年舉自代丙吉病上問誰可代君對曰杜延年明法度於定國執憲議詳平也陳萬年薦厚於行後皆稱職上以為有知人之鑒又吳周瑜病於鎮舉魯自代又鍾皓為功曹太守問誰可代曰西門亭長陳實實曰鍾君似不察人何獨我知不薦士詔舉武猛士賀良無所薦上問之曰平生未常交士衛鞅因景監見人知其不約今士得臣舉亦非榮故不敢薦之也不舉雜學山簡季倫領吏部上疏請公卿各舉所知廣得才之路每聽政曰令公卿先議選舉各言所見鄉邑尤異者皆以名奏主者隨缺先敘是爵人於朝與衆共之義朝廷從之邑宰舉魯恭為中牟令薦名士方帝好征方與公卿所舉同有瘡不舉張輔孟侯為東郡守郡吏王青祖父與翟義同起兵攻王莽燒殺之父隆為都尉功曹青為小吏與父俱從都尉遇賊隆以身衛全都尉死於難青亦被矢前太守以青有金瘡不舉輔歎其一門忠義遂薦青三世死節宜蒙顯異辭舉鄧攸伯道祖父殷有賜官敕攸受之後太守勸攸官欲舉為孝廉攸曰先人所賜不可改之孔獎薦後進李白藥好獎薦後進宰相職當進賢李吉甫始執政以情謂裴垍曰吾落魄遠裔更十年始相天子此日人物吾懵不及知且宰相職當進賢任能君精鑒為我言之垍即崖略疏三十許人吉甫籍以薦於朝天下翕然稱得人推轂士於休烈樂賢下善推轂士甚衆刺舉不阿王播知雜事刺舉不阿有能稱所取多才實士王鐸為禮部侍郎所取多才實士為世稱誦時時進賢才偉望李訓時時進賢才偉望以悅士心人皆感之或自寒冗躐進至侍從太平公主有所論薦或自寒冗躐進至侍從旋踵將相所薦贏四十人杜淹檢校吏部尚書參豫朝政所薦贏四十人後皆知名樂引後進於志寧愛賓客樂引後進然多嫌畏不能有所薦達也互相推引薛登為左補闕時選舉溢甚乃上疏曰比觀舉薦類不以才馳聲假譽互相推引非所謂報國求賢者也閻立本薦狄仁傑授并州法曹薦使君美於朝郭翰者嘗為御史巡察隴右多所按劾至寧州狄仁傑為刺史民爭言有異政翰就館以筆紙置於案謂僚屬曰入其境其政可知願薦使君美於朝毋久留即命駕去三品至九品並得薦士魏元同上疏制書三品至九品並得薦士此誠仄席旁求意也但褒貶不明故上不憂黜責下不盡搜揚薦於朝李滋客荊郢間起學廬講授建中初黜陟使趙贊薦於朝起處士授試校書郎獎士類拔孤仄李景讓性獎士類拔孤仄李蔚楊知退皆所推引舉引寒俊鄭薰再知禮部舉引寒俊士類多之請臺閣長官得自薦其屬陸贄秉政始請臺閣長官得自薦其屬有不職坐舉者用人之長張說善用人之長多引天下知名士以佐佑王化粉澤典章成一王法以恩終始張嘉貞有嗜進者汲引之能以恩終始所薦中書舍人苗延嗣等皆位清要日與議政事故當時語曰令君四俊苗呂崔員愛善無遺李吉甫引薦賢士大夫愛善無遺並表其書竇群傳啖助春秋學著書數十篇蘇州刺史韋夏卿薦之朝並表其書報闕不召選德進賢初不計私韋表微翰林學士缺人人爭薦丞相所善者表微獨薦韋處厚人服其公進知制誥後與韋處厚議增選學士復薦路隋處厚以諸父得表微因曰隋位崇入且翁右奈何答曰選德進賢初不計私也不因介紹張行成補殿中侍御史糾劾嚴正太宗以為能謂房玄齡曰古今用人未嘗不因介紹若行成者朕自舉之無先容也每以用人為先朱敬則及執政每以用人為先細務不省也嶺表蠻叛以裴懷古有文武才用為桂州都督蠻服其威惠相率降薦魏知古為鳳閣舍人張恩敬為右史皆稱職大才當大用韋安石蘇良嗣當國謂安石曰大才當大用薦書參同薛玨左遷峽州刺史建中初德宗命使者分諸道察官吏升黜焉而李承狀玨之簡趙贊言其廉盧翰稱其肅薦書參同於是拜中散大夫賜金紫舉智謀果決才堪統衆者來瑱纍遷殿中侍御史伊西北廷行軍司馬詔舉智謀果決才堪統衆者拾遺張鎬薦瑱能斷大事有禦侮才擢瑱川太守充招討使中人尉薦呂諲哥舒翰敗潼關諲西趨靈武由中人尉薦肅宗才之拜御史中丞取材者數十人總牙兵反為尹奏取材者數十人總牙兵故威惠兩行求才者貴廣陸贄蕭昕始薦張鎬來瑱在禮部擢杜黃裳高郢裴垍其後鎬興布衣不數年位將相瑱為將有威名黃裳等繼輔政並為名宰登崇俊良韓愈進學解曰方今聖賢相逢治具皆張拔去凶邪登崇俊良占小善者率以録名一藝者無不庸薦進才髦李季卿在朝薦進才髦文享氣方直才任諫諍李雍特進李嶠與監察御史張廷圭薦雍文享氣方直才任諫諍乃召拜左拾遺知賢而舉仁也雍下獄當死孔章上書天子曰明主舉能而捨過又曰知賢而舉仁也言於玄宗召見金鑾殿李白賀知章見其文歎曰子謫仙人也言於玄宗召見金鑾殿愛獎士類李華愛獎士類名隨以重若獨孤及韓雲卿韓會李紓柳識崔祐甫皇甫冉謝良弼朱巨川後至執政顯丫官可使尺澤之鯢奮鱗而震海密網之鳥舉羽而翔霄子之一名何足就矣柳宗元上權補闕不叩而響不介而合則其舉而至而其感亦甚同上舉賢本無私劉奇長壽中為天官侍郎薦張鷟司馬鍠為監察御史二人因申屠瑒以謝奇正色曰舉賢本無私何見謝者皆竦玉不韜輝唐呂溫房玄齡贊網羅遺賢推轂群英玉不韜輝蘭無沈馨文粹藏用守道有歲年崔皓薦樊衡書雖白面書生有雄膽大略藏用守道有歲年無蔽賢之咎一品集舉自代所冀虞丘無蔽賢之咎臧孫無竊位之譏好提掖士大夫許孟容好提掖士大夫天下清議上之有所薦進劾為朋黨李安期帝屢責侍臣以不能進賢安期進曰十室之邑且有忠信天下至廣不為無賢比見公卿有所薦進劾為朋黨若陛下忘其親讎惟才是用塞讒毀路其誰敢不竭忠以聞上乎帝嘉納帝讓不推賢進善權萬紀言治銀帝讓不推賢進善鮮有簡拔蕭俯居位頗介謹持法重名器狹於用人每除吏常憂不稱鮮有簡拔非文詞者擯而不用常袞懲元載敗窒賣官之路然一切以公議格之非文詞者擯而不用故世謂之濌伯以其濌濌無賢不肖之辨云進退士大大鄭注進退士大夫撓骫朝法賢不肖淆亂以為弛張當然未踰年除吏八百員崔祐雨改中書侍郎未踰年除吏幾八百員莫不諧允請自代令狐彰方疾甚表吏部尚書劉宴工部尚書李勉堪大事請以自代代宗得表咨悼妄進者少衰周墀同平章事河東節度使王宰重賂權幸求同平章事領宣武墀言天下大鎮如並汴者才幾宰之求何不厭宣宗納之駙馬都尉韋讓求為京兆持不與繇是妄進者少衰舉選四白觀國之光利用賓於王易我有好爵鴻漸於陸於陸於磐漸進之義遷喬蒸我髦士蒸進也翹翹錯薪言刈其楚詩獻賢能之書周禮鄉老及鄉大夫群吏獻賢能之書于王王再拜受之登于天府禮凡語郊者必取賢斂才焉或以德進或以事舉可以言揚樂正論造士之秀者升於司馬曰進士論辨然後使之司馬辨論官材論進士之賢者以告於王而定其論各署其所長也舉不失選傳署行議年高詔中丞執法郡守舉有明德者遣詣相府署行議年年幾也行狀也計偕武詔吏人有明當世之務習先儒之術者縣次續食令與計偕縣次給之食仲舒發之武帝隆儒術及仲舒對策明孔氏黜百家立興學校州郡舉孝廉茂才皆仲舒發之三適武帝時公卿議曰古者諸侯貢士一適謂之好德再適謂之賢三適謂之有功乃加九錫以弓矢車馬也不貢士一則黜爵再則黜地三而削地畢矣不舉孝不奉詔以不敬論不察廉不勝任當免奏可也本仁祖義褒德祿賢五帝三王所由昌也武詔得真宣帝詔舉廉吏誠欲得真也吏六百石位左右有罪自今以來毋得注云不復舉為廉吏也內惡未發平帝詔諸有贓及內惡未發而薦舉者勿案驗也四科漢制見上薦舉門三互後漢以州郡相黨人情比周乃制婚姻家及兩州人士不傳對相監臨後有三互法禁忌轉密選用艱難蔡雍上疏宜去三互法帝不省止不死限口舉人後漢丁鴻與司空劉萬上言自今郡國率二十萬歲貢孝廉四十萬二人六十萬三人八十萬四人以此為增減不滿二十萬二歲一人不滿十萬口三歲一人蠻夷錯雜不為數魏令十萬戶察孝廉一人府秀不拘戶口限年又尚書令左雄議改察舉之制限年四十儒者試經學文吏試章奏胡廣駁之曰選用材無拘定制六奇之策不出經學鄭阿之政非章奏甘奇入用年乘疆仕終惡揚聲亦在弱冠帝不從遂班下郡國唯茂才異行者不拘年清儉太祖為丞相司空毛玠為東普掾與崔琰並典選舉所用皆清心而士雖於時有盛名而行不由本者終莫能進務以儉率人由是天下莫不以廉節自勵雖貴寵之家車服不敢過度和治字土陽議儉非中道云云守文衛臻典選舉蔣濟與書曰漢以亡虜為將周拔漁父為太師何必守文答曰古人遺智惠而任度量須考績而加黜陟今豫開拔奇之律使天下馳騁也畫地作餅魏盧育為吏部尚書諸葛誕鄧揚騁名譽有四窗八達之謠帝疾之時舉中書侍郎詔曰莫取有名以名如畫地作餅言不可啖也育曰名不足以得異人可以得常士常士畏教慕善然後有名臣以循名責實無官績但常有以驗其後古者敷奏以言明試以功考績法廢故真僞相蒙帝詔作考績法不抑寒素王蘊為吏部郎不抑寒素每一官缺求者十輩無所是非連狀白之某人有地某人有才各隨其方不得者不怨之也山濤啓事山濤為僕射典選吏部並得其才再居十餘年一官缺輒啓數人甄拔人物各為題目時稱曰山濤啓事也甲午制王戎為吏部為甲午制凡選舉先治百姓然後授仕也門調戶選司隸傅咸奏戎曰書稱三載考績今內外群官職未期而奏遷未知優劣且送故迎新宜免戎戎與賈郭通親得不坐戎自典選舉未嘗進寒素退虛名與時沉浮門調戶選而已後漢四科黃瓊以左雄孝廉之選專用儒學文吏猶有所遺反增孝悌及能從政為四科少牢鹿鳴選舉令諸貢人上州三人中州二人下州一人必有才堪者不限其人數具申送之日行鄉飲酒禮牲用少牢歌鹿鳴之詩賓薦鄉賦國光進士秀才考課令進士試時務策五條帖大經通四其策文辭順序義理愜當並帖經文過者為通帖策全通為甲第諸秀才試方策五條文理俱高者為上上文高理平理高文平為上中云云未成分數考功式諸州及國子監貢舉人試官須對長官判官共加考試至省及第不成分數者其罪以長官為從雖未成分落第人內有帖試俱不通一者亦依不成分例冒貢薦延病朋漢何武問文吏於儒者問儒者於文吏以相參驗除吏先為科條以防請托以貌以言冥父尚云有失孔子曰吾以言取人失之宰豫以貌取之失之子羽則惠則哲帝堯亦曰其難充賦朝錯策曰乃以臣錯充賦夫十室之邑必有忠信三人同行厥有我師今闔郡不薦一人是化不下憲而積行之君子壅於上聞也武詔州叛廢舉孔坦君平帝手策問曰吳興徐馥為賊殺群將今應舉孝廉可否坦曰罪不相及今徐馥為逆何妨一郡之賢孔凡四舉皆知名者王起判太常少卿帝患選士不得才時命起典貢舉凡四舉皆知名者人伏其鑒敵數百人杜顗舉進士禮部侍郎賈竦語國曰得杜顗敵數百人選舉以私宋務光上書長吏貪冒選舉以私宜以簡練為急魏元同上疏言選舉法弊曰國之用人如人用才貧者止糟糠富有餘粱肉故當衰弊之乏則磨策朽鈍以取之太平多士則遴東髦俊而使之今選者猥多宜以簡練為急為時嘉仰岑羲徑廉為時嘉仰餘見吏部門官無滯人劉林甫建官四時聽選隨到輒擬於是官無滯人選者就案閲簿婁師德在夏官注選者就案閲簿師德曰容我擇之可乎選者不去乃灑筆曰墨污爾輕地寒李揆苗晉卿數薦元載揆輕地寒謂晉卿曰龍章鳳姿士不見用獐頭鼠目子乃求官邪載聞御之調者丐留張薦為吏部侍郎選牒精允調者丐留其獎用皆一時茂秀王丘遷吏部侍郎典選復號平允其獎用皆一時茂秀以進士選無受惡官者柳仲郢知吏部銓德裕頗抑進士科仲郢無所徇是時以進士選無受惡官者又當調者持闕簿令自閲即擬唱吏無能為姦升沈在牙頰間楊虞卿善諧麗權幸倚為姦利歲畢選者皆走門下署第注員無不得所欲升沈在牙頰間當時有蘇景胤楊元夫而虞卿兄弟汝士漢公為人所奔向故語曰欲趨舉場間蘇張蘇張猶可三楊殺我吏道多端本乎選用失當劉蕡策類得優調於時被選者二十有三人所言皆冗齪常務類得優調先收寒素李固言為吏部侍郎既領選案籍自擬先收寒素柅吏姦為循資格裴光廷兼吏部尚書初吏部求人不以資考為限光廷懲之因行儉長名榜乃為循資格無賢不肖一據資考配擬云魏元同上疏言選舉法弊曰自魏晉以後始歸吏部以迄於今以刀筆量才簿書祭行法與世弊其來久矣又尸厥任者間非其選至為人擇官為身擇利下筆繫親疏措情觀勢要悠悠風塵此焉奔競使百行折之一面九能斷之數言不亦難乎官有丐求輒下意聽納韋見素遷吏部侍郎官有丐求輒下意聽納人多德之歲選萬計張九齡建言今歲選乃萬計京師米物為耗蓋冒濫只此爾視選舉衆寡以稽風化陸贄八計曰視選舉衆寡以稽風化兄弟並以書判超等顏杲卿開元中與兄春卿弟曜卿並以書判超等吏部侍郎席豫咨嗟椎伏以選事委令吏蕭儒辰壽中歷天官侍郎以選事委令吏句直日偃臥不下筆抑文雅進黠吏楊纂為吏部侍郎有俗才抑文雅進黠吏隨才銓録劉林甫歷吏部侍郎吏部調至萬員林甫隨才銓録咸以為宜最殿分明劉晏知吏部三銓事推處最殿分明下皆懾伏寒遠無留才崔郎遷吏部員外郎擬吏親挾格褒黜必當寒遠無留才退觀其治家進察其臨節劉乃方調因進書曰今文部始掄材終授任是知人官人兩任其責昔禹稷皋陶之聖猶曰載采有九德考績以九載今有司獨委三二小宰察言於一幅之判觀行於一揖之內何其易哉夫干霄蔽日巨樹也求尺寸之材必後於椽筏龍吟虎嘯希聲也尚頰舌之感必下於蛙黽豈不悲乎執事誠能先政事次文學退觀其治家進察其臨節則龐鴻深沉之士亦可窺其門閾矣士有一藝者得詣闕就選李林甫時帝詔天下士有一藝者得詣闕就選林甫恐士對詔或斥己即建言土皆草茅未知禁忌徒以狂言亂聖聽請悉委尚書省長官誠問使御史中丞監總而無一中程者林甫因賀上以為野無留才資格紛謬無復綱序楊國忠既以宰相領選始建罷長名於銓日即定留放故事歲揭版南院為選式選者自通一辭不如式輒不得調故有十年不官者國忠創押例無賢不肖用選深者先補官牒文謬缺得再通衆議翕然美之先天以前諸司官知政事者兵吏部尚書侍郎分按注擬開元末宰相員少任益尊不復視本司事吏部銓故常三注三唱自春止夏乃訖而國忠陰使吏到第預定其員集百官尚書省注唱一曰畢以誇神明駭天下耳目者自是資格紛謬無復綱序就第唱補明年大選因就第唱補帷女兄弟觀之士之丑野蹇傴者呼其名輒笑於堂聲徹諸外士大夫詬恥之一名為鼠輩所賣子暄舉明經不中禮部侍郎達奚珣遣子撫往見國忠國忠方朝見撫喜已而聞暄當黜詬曰生子不富貴耶豈以一名為鼠輩所賣珣大驚即致暄高第請置五經秀才科楊綰以進士不鄉舉但試辭賦浮文非取士之實請置五經秀才科詔群臣議李棲筠與賈至李廙以綰言為是選士第務得才李揆取士不考實乃之陳書廷中進諸儒約曰選士第務得才可盡所欲言是人人稱美舒元輿古貢士未有輕於此者且宰相公卿繇此出夫宰相公卿非賢不在選而有司以隸人待之誠非所以下賢意羅棘遮截疑其姦又非所以求忠言也詩賦微藝斷離經傳非所以觀人文化成也臣恐賢者遠辱自引去而不肖者為陛下用也今貢珠貝金玉有司承以篚笥皮幣何輕賢者重金玉邪所得士相繼為公鯽宰相權德輿知貢舉所得士相繼為公唧宰相薛登疏曰煬帝始置進士等科後生復相馳競赴速趨時緝綴小文名曰策學不指實為本而以浮虛為貴方今舉士尤乖其本明詔方下固已驅馳府寺之廷出入公王之第陳篇希恩奏記誓報故俗號舉人皆稱覓舉就禮部試吏唱名乃入恥之李戡年三十明六經舉進士就禮部試吏唱名乃入恥之楊家三喜楊敬之為祭酒兼太常少卿是日二子戎戴登科時號楊家三喜糊名較覆張說永昌中武后策賢良方正詔吏部尚書李景諶糊名較覆說所對第一后署乙等覆試崔沔擢賢良高第不中者誦訾之武后敕有司覆試對益工遂為第一文宗自以題畀有司高錯遷中書舍人開成元年權知貢舉文宗自以題畀有司錯以籍上帝侍臣曰比年文章卑弱今所上差勝於前鄭覃曰陛下矯革近制以正頽俗而錯乃能為陛下得人抑浮華先行實韋貫之所取士抑浮華先行實纍公舉沈傳師時給事中許孟容禮部侍郎權德輿樂挽轂士號權許德輿稱之於孟容孟容曰我故人子盍不過我傳師往見謝曰聞之文人脫中第則纍公舉矣故不敢進孟容曰如子可使我急賢詣子不可使子因舊見我遂擢第曳白苗晉卿進吏部侍郎天寶二載判入等者凡六十四人分甲乙丙三科以張奭為第一奭御史中丞倚之子倚新得幸晉卿欲附之奭本無學故議者囂然不平安祿山因間言之帝為御花萼樓覆實中裁十一二奭恃紙終日筆不下人謂之曳白帝大怒貶倚及晉卿取人以一日之長為高下韋陟遷禮部侍郎陟於鑒裁尤長故事取人以一日之長試為高下陟許自通所工世謂之玉筍李宗閡復為中書舍人典貢舉所取多知名士若唐沖薛彥袁都等世謂之玉筍建請依古制縣令舉孝廉賈至楊綰建請依古制縣令舉孝廉刺史升於天子禮部詔有司參議多是綰言至議以為自晉後衣冠遷徙人多僑處因緣官族所在占籍今鄉舉取人未盡古柳復榮令貢士賦呂渭遷禮部侍郎古柳復榮令貢士賦餘見禮部門廣明後州縣不鄉貢鍾傳廣明後州縣不鄉貢惟傳歲薦士為諸生貢舉韋景駿遷房州刺史州窮險無學校景駿為諸生貢舉一第慁子元結天寶十二載舉進士禮部侍郎陽浚見其文曰一第慁子耳有司得子是賴果擢上第氈筆淡書進士榜頭粘黃紙四張以氈筆淡書禮部貢院四字或曰天皇頃以飛帛書之或云象陰注陽授之狀千佛名經張倬東之孫舉進士不第嘗捧登科記頂戴之曰此千佛名經多取大臣貴近子弟劉太真遷禮部掌貢士多取大臣貴近子弟坐貶信州刺史卒舉博學宏辭於邵獨孤授與博學宏辭吏部考當乙邵覆之置甲科人咨其公柳公綽取士皆知名顯貴柳公綽取士如許康佐鄭朗盧簡辭崔璵夏侯孜李拭韋長皆知名顯貴取士不宜限數舒元輿又言取士不宜限數今有司多者三十少止二十假令歲有才德才數人而曰必取二十謬進者乃過半謂之合格可乎第其文異等孫逖舉手筆俊拔哲人奇士隱淪屠釣及文藻宏麗等科開元十年又舉賢良方正玄宗御洛城門引見命戶部郎中蘇晉等第其文異等皆海內有名士孫逖取顏真卿李華蕭穎士趙驊等皆海內有名士入第二等劉憲武后時救吏部糊名考判求高才惟憲與王適司馬鍠梁載言入第二等龍虎榜龍虎詹舉進士與韓愈李觀李絳崔群王涯馮宿庾承宣聯第皆天下選時稱龍虎榜閩人等進士自詹始臨問試賢良趙宗儒改吏部尚書穆宗立詔先朝所召賢良方正委有司試宗儒建言應制而來者當天子臨問試有司非國舊典請罷之詔可甄幽獨抑浮華高郢進禮部侍郎司貢部凡三歲甄幽獨抑浮華流競之俗為衰得士七十五人多名卿宰相賈餗凡三典貢舉得士七十五人多名卿宰相試進士東都吳武陵入為太學博士大和初禮部侍郎崔郾試進士東都公卿咸祖道長樂武陵最後至謂郾曰君方為天子求奇才敢獻所益因出袖中書搢笏為郾讀之乃杜牧所賦阿房宮辭既警拔而武陵音吐鴻暢坐客大驚武陵請曰牧方試有司請以第一人處之郾謝已得其人至第五郾未對武陵勃然曰不爾宜以賦見還郾曰如教牧果異等所取皆一時之秀和凝知貢舉是時進士多浮薄喜為喧譁以動主司每放榜則圍之以棘閉省門絶人出入以為常凝徹棘開門而士皆肅然所取皆一時之秀稱為得人五代史知人五白知人則哲唯帝其難之書知人者智老子子桑之忠也其知人也能舉善之子桑公孫枝舉孟明者舉爾所知仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其捨諸子桑之舉孟明鮑叔之知管仲史齊桓霸者管仲之謀天下不知管仲之賢而多鮑叔能知人也人不易知患己不知人也始以智知終因德進叔向之知鬷蔑申於知己越石父賢在縲紲中晏子遇之解左驂贖之載與歸不謝入久之石父請絶晏子懼攝衣冠以謝之石父曰君子屈於不知己而申於知己者也趙貢知薛宣琅邪太守趙貢行縣見不其丞薛宣還府令妻子與相見戒曰君至丞相我兩子亦中丞相史第五倫所舉吏多至二千石世以為知人字伯英法真指胡廣後漢胡廣為南郡散吏太守法雄子真知人歲終雄敕真助求才雄命諸吏真自牖間占之乃指廣白雄遂舉孝廉京師試章奏為天下第一王諶舉种皓种皓為縣門下吏河南尹田歆外生王諶知人歆曰今當舉六孝廉多得貴戚書以五應之欲自用一人清善者以報國爾助我求之諶送客至洛陽郭遙見皓曰得孝廉矣歆曰當山澤隱滯此近洛陽門下吏諶曰山澤不必有異士異士不必出山澤歆召皓於廷辨詰職事辭對有據遂舉孝廉皓官至司徒外靜內銛魏曹爽秉政用何晏為吏部尚書傅嘏謂爽弟義曰何平政外靜內銛恐惑我兄弟賓饌托子魏張既德容兒童馮翊功曹殷游設賓饌請之妻笑曰童昏小兒殷曰方伯之器以子楚托之後既薦楚吳興太守勸令兄弟別族吳楊笁少獲聲名陸遜謂笁終敗勸笁兄穆別族南州冠冕龐統少朴鈍司馬德操有知人鑒統往見操操採桑樹上統坐樹下自晝達夜稱之為南州冠冕也小吏結交後漢吳祐字季英舉孝廉將行郡中為祖道祐越擅共小吏雍丘黃真歡語移時與結交而別功曹以為倨請黜之太守曰吳季英有知人之明卿且勿言真後亦舉孝廉取陳遼徐晃於亡虜魏太祖拔於禁樂進於行陳取陳遼徐晃於亡虜許郭之鑒後漢郭泰字林宗許劭字子將咸有知人之鑒故天下言士者咸稱其許郭之鑒知無實行漢中晉文經梁國黃子艾並恃才智炫耀上京三公每見辟召輒詢訪之隨其臧否以為與奪符融謂李膺曰二子行業無聞恐小道破大義公宜察焉膺然之後果輕薄並以罪廢棄也衆中識晉孟嘉方年幼知名庾亮大會州府吏士嘉坐甚遠褚褒問亮聞江州孟嘉其人何在亮曰在座卿但自覓褒歷觀指嘉曰此君小異得無是乎亮大笑得嘉知子石苞臨終分財與諸子不及崇崇毋為言苞曰此兒雖小後自能得賞御人石苞仲容為縣吏會謁者郭玄信奉使求人為御以苞及鄧艾給之行十餘里玄信謂二人曰子後並當至卿相苞曰御隸也何卿相乎拔杜密周甫為太山守密縣見鄭玄為鄉佐知其異器遂召署郡職遣就學顯拔第五倫伯魚為宕渠令顯拔鄉佐玄賀賀後為二郡守以清潔稱嗇夫鄭弘巨君為鄉嗇夫太守第五倫行春見而深奇之署督郵一日千里袁嵩漢書曰王允字子師世仕州郡為冠蓋郭林宗見而奇之曰王生一日千里王佐才也遂與之友後王允至司徒孔選任精明裴垍為學士時引李絳崔郡與同列及相又推韋貫之裴度知制誥李夷簡為御史中丞皆踵躡為輔相號名臣自他選任罔不精明有子必為宰相楊嗣復父於陵韓滉妻以其女謂妻曰吾閲人多矣後貴且壽無若生者有子必為宰相既而生嗣復王圭母王圭少孤且貧始隱居時與房元齡杜如晦善母李嘗曰兒必貴然未知所與游者何如人而試與偕來會房等過其家李窺大驚敕具酒食歡盡日喜曰二客公輔才汝貴不疑本傳祿山有逆相張九齡安祿山初以范陽偏校入奏氣驕蹇九齡謂裴光庭曰亂幽州者必此胡雛也及討奚契丹敗張守圭執如京師九齡曰祿山狼子野心有逆相宜即事誅之以絶後患帝曰卿無以王衍知石勒而害忠良卒不用李白永平璘闢為府僚璘敗當誅初白游并州見郭子儀奇之子儀嘗犯法白為救免至是子儀請解官以贖流夜郎今黃叔度劉迅陳郡殷寅名知人見迅嘆曰今黃叔度也劉晏每聞其論王之道盡矣封倫倫年方少舅盧思道曰是兒識略過人當自致卿相不能知人害霸也魏徵齊桓公問管仲曰何如而害霸也不能知人害霸也知而不能用害霸也時號知人兵武陵始李訴節度唐鄧武陵薦李景儉王湘健智沈敏可表以自副時號知人李光顏義而勇裴度帝問諸將才否度對曰李光顏義而勇當有成功不三日光顏破時典兵帝嘆度知言擇僚吏後皆為通顯巨人盧齊卿武后詔長史薛季昶擇僚吏堪御史者季昶訪於齊卿齊卿曰長安尉盧懷謹李休光萬年尉李乂崔湜咸陽丞倪若水盩厔尉田崇璧新豐尉崔日用昶用其言後皆為通顯巨人士之致遠先器識裴行儉善知人在吏部時見蘇味道王劇謂曰二君後皆掌銓衡李敬玄盛稱王勃楊炯盧照鄰駱賓王之才引示行險行儉曰士之致遠先器識後文藝如勃等雖有才而浮躁入炫露豈享爵祿者哉炯頗沉默可至令長餘皆不得其死本傳問知人武后問狄仁傑曰婁師德賢乎對曰臣嘗同僚未聞其知人后曰朕用卿師德薦也誠知人矣出其奏仁傑慚所薦進皆中興名臣狄仁傑所薦進若張東之桓彥范敬暉姚崇等皆為中興名臣本傳賞知人是時李楷固駱務整討契丹克之獻俘含樞殿二人者本契丹李盡忠部將盡忠入寇楷固等數挫王師後降有司請論如法仁傑稱其驍勇可任若貸死必感恩納節可以責功至是凱旋后舉酒屬仁傑賞其知人識唐公負王霸資姜謨隋大業末高祖在太原謨前識之謂所親曰隋政亂將亡必有聖人受之唐公負王霸資度其必撥亂得天下乃深自結卒以正直稱宗室皋扶風馬彝未知名皋識之卒以正直稱李績知人李績初績拔黎陽倉高季輔杜正倫往客焉及平虎牢獲戴胃咸引見臥內推禮之後皆為名臣世以績知人當為國器房玄齡校讎祕書省吏部侍郎高孝基名知人謂裴矩曰僕觀人多矣未有如此郎者當為國器但恨不見其聳壑昂霄云為棟梁用杜如晦大業中預吏部選侍郎高孝基異之曰君當為棟梁用願保令德以子孫相諉婁師德盧承業異之曰子台輔器也當以子孫相諉詎論僚吏哉王佐才杜如晦秦王引為府兵曹參軍時府屬多外遷王患之房玄齡曰去者雖多不足吝如晦王佐才也待以公輔宗室從晦少與崔龜從李景讓裴休善獎目後進名知人楊收方布衣進謁從晦一見如雅識即待以公輔後果至宰相稱其遠到蕭嵩擢中書舍人時崔琳王丘齊浣皆有名以嵩少學術不以輩行許也獨姚崇稱其遠到使其子拜韓滉初判度支李晟以裨將白軍事滉待之加禮使其子拜厚遺器幣鞍馬後晟終立大功與議事正出其上張嘉正始為中書舍人崔湜輕之後與議事正出其上湜驚曰此終其坐後十年而為中書令顧聽事曰此公坐也蘇珦調鄠尉義琰為雍州長史鄠多訟日至長史府裁決明辨自是無訴者義琰異之顧聽事曰此公坐也恨吾齒晚不及見才當自光大桓彥范以蔭遷司衛主簿狄仁傑曰君之才當自光大毋恤於初厚為禮識於後生數稱譽之鄭從讜識陸扆於後生數稱譽之扆後為宰相為國重將張守圭再遷幽州良杜府果毅時盧齊卿為刺史器之引與共榻坐謂曰不十年子當節度是州為國重將願以子孫托可僚屬相期邪捉刀立堂下劉沔少孤客振武節度使范希朝署牙將軍中大會沔捉刀立堂下希朝奇之謂曰後日必處吾坐天下推知人稱蕭功曹蕭穎士以推引後進為己任如李陽李幼卿皇甫冉呂渭等數十人曰獎目皆為名士天下推知人稱蕭功曹當時推知人號席公席豫典選六年拔寒遠士多至臺閣當時推知人號席公云李谷能知人扈載樞密使王朴尤重其才薦於宰相李谷久而不用朴以問谷曰扈載不為舍人何也谷曰非不知其才然載命薄恐不能勝朴曰公為宰相以進賢退不肖為職何言命邪已而召拜知制誥及為學士居歲中病卒年三十六議乾以谷能知人而朴能薦士五代史貌厚而小心高行周隸明宗帳下初為裨將趙德鈞識之謂明宗曰此子貌厚而小心他日必大貴宜善待之同上夫牛角之歌辭鄙而義拙堂下之言不書於傳記齊桓舉以相國叔向攜手以上然則非言之難為聽而識之者難過也韓文今之言曰某子長者可以為大官類非古之所謂長者也然則土木而已矣夫捧土揭木而致之巖廊之上蒙以紱冕翼以侍隸而趨走其左右豈有補於萬民之勞苦哉故曰知之難柳宗元與楊京兆書白月旦評後漢許劭與兄靖俱有高名共核論鄉黨人物每月更品題由是汝南俗有月旦評也道廣許劭到穎川不詣陳蕃或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通角立傑出桓帝征徐稚等不至因問陳蕃徐稚袁閎韋著先後蕃曰閎王公之族聞道訓著生三輔仁義之俗不扶自直稚爰自江南卑薄之域角立傑出宜為先也萬頃之陂郭林宗至汝南見袁閎不宿而去從黃憲三日薛勤問曰奉高之器清而易揖權度汪若萬頃之陂澄之不清撓之不濁兼葭倚玉樹魏明帝使後弟毛繒與夏侯泰初共坐時人謂之蒹葭倚玉樹泰初如朗月入懷玉人晉王敦以衛玠為王人稱王夷甫處衆中如珠玉在瓦礫間也璞玉渾金王戎曰山濤如璞玉渾金人知其寶莫知其器趙魏老子曰孟公綽為趙魏老則優不可以為滕薛大夫無皂白鍾皓兄子覲李膺姑之子也覲與膺年齊並有令名覲有退讓之風膺謂覲曰孟軻以人無是非之心非人也公何太無皂白覲以白皓皓曰元禮祖在位諸父並盛韓公之甥故得然國武子招人過以致怨本今豈其時汝道是也王肅三反魏劉實以王肅忠於事上好下佞已一反也性嗜榮貴不求苟合二反也吝惜財物而理身不穢三反也吳主聰明仁智吳使趙咨於魏魏帝問吳主何等主對曰聰明仁智雄略之主納魚肅於凡器是其聰拔呂蒙於行陳是其明獲於禁而不害是其仁取荊州不血刃是其智據三州虎視天下是其雄屈身於陛下是其略也擬人必於其倫禮銓度國語稱述多過蜀龐統字士元為郡功曹性好人倫每稱述多過其才人問之統曰亂世善人少惡人多不美其言則聲名不足慕而為善者少矣拔十得五猶得其半使有志者自勵不亦可乎商榷人物龐統至吳多聞其名及西還並會昌門陸績顧劭全悰皆往統曰陸子可謂駑馬有逸足之力顧子可謂駑牛能負重致遠謂全悰曰卿好施慕名有似汝南樊子昭雄智力不多亦一時之佳也題目龐德公自謂諸葛孔明為臥龍龐統士元為鳳雛司馬德操為水鏡又裴楷目夏候玄云肅肅如入宗廟但見禮樂器鍾會如觀武庫森森但見矛戟在前瑕玷靡所不見山濤若登山臨下幽然深遠矣問用人吏部郎闕文帝問其人於鍾會會曰裴楷清通王戎簡要皆其選也於是以楷為之問人物蜀關羽雲長督荊州聞馬超來降舊非故人與諸葛亮書問超人才誰比亮知羽當與並驅爭先乃答曰孟超兼資文武雄猛過人一世之烈黥彭之徒當與益德並驅爭先猶未若髯之絶倫逸群也羽美髯故亮謂之髯羽大悅有白起風世說嵇中散語趙景真卿童子黑白分明有白起風恨童子狹景曰尺表能審權衡之度寸管能測往復之晷何必在大但問識見如何也又世說諸葛瑾弟及從弟誕有盛名各在一國於時以為蜀得龍吳得虎魏得狗又世稱庾文康為豐年王稚恭為荒年谷也如干將莫耶盧藏用嘗謂李雍如干將莫耶難與爭鋒但虞傷缺耳孔卿相才溫大雅與弟彥博大有皆知名薛道衡見皆卿相才也善銓敘人物高憑為吏部侍郎善銓敘人物帝賜金背鑒一況其清鑒焉鑒裁尤長韋陟於鑒裁尤長故事取人以一日試為高下陟許自通所工先就其能試之由是無遺材雅負裁鑒高儉為吏部尚書雅負裁鑒用人無不當子孫當依韋宙弟岫宙在嶺南以從女妻小校劉謙或諫止之岫曰吾子孫或當依之謙後以功為封州刺史喜鑒拔後進獨孤也李至遠見桓彥范力言其賢盧從願尚少高以評目許弟從遠且貴豫言其位以驗所至王佐才李靖吏部尚書牛弘見之曰王佐才也惟稱好須房玄齡李緯為民部尚書會有自京師來者帝曰玄齡聞緯為尚書謂何曰惟稱緯好須無它語摽鑒通晤王圭帝以圭善人物且知言因謂曰卿摽鑒通晤為朕言玄齡等材且自謂執與諸子賢對曰孜孜奉國知無不為臣不如玄齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彥博濟繁治劇衆務必舉臣不如胄以諫諍為心恥君不及堯舜臣不如徵至潔濁揚清疾惡好善臣於數子有一日之長帝稱善而玄齡等亦以為盡己所長謂之確論體局方正廊廟才也張行成少師事劉炫炫謂門人曰行成體局方正廊廟才也諸將材否賈曾帝問諸將材否對曰李績舊臣陛下所自悉龐同善雖非鬥將而持軍嚴薛仁貴票勇冠軍高侃忠果而謀契苾何力性沈毅雖忌前後有御才然夙夜小心忘身憂國莫逮於績者帝然所許衆亦以為知言以王佐期之張東之補太學生令狐德棻異其才便以王佐期之問優劣於長史裴子餘補鄠尉同捨李朝隱程行諶以文法稱而子餘以儒顯或問優劣於長史陳崇業答曰蘭菊異芬胡有廢者人物清整李藩沈靜藩才能不及韋貫之裴垍然人物清整是其流亞清廟之器李玨為殿中侍御史宰相韋處厚曰清廟之器豈擊搏才乎除禮部員外郎有鑒裁王圭季父頗通儒有鑒裁尤所器許鑒拔李敬玄杭州參軍徐太玄哀其僚張惠以贓抵死而惠母老乃詣獄自言與惠偕受薄其罪惠得不死太玄坐免官十年敬玄廉知之擢為鄭州司功參軍後至祕書少監申王師以德行聞其鑒拔率若此將相材於劭樊澤始舉賢良劭望見曰將相材也霜鷹凍蠅蘇味道高爽王方慶魯鈍同為鳳閣侍郎或問張元一二子孰賢答曰蘇如九月得霜鷹王如十月被凍蠅朝野僉載鶴鳴雞樹鳳閣侍郎杜景佺文章知識並高遠時號為鶴鳴雞樹張儉同上題目人魏光乘好題目人姚元之長大行且速謂之趁蛇鸛雀王旭短而黑丑謂之煙熏木根楊仲嗣躁急謂之熱鏊上胡孫同上李華作三賢元德秀李華兄弟德秀而友蕭穎士劉迅或問所長華曰德秀志當以道紀天下迅當以六經諧人心穎士當以中古易今世德秀欲齊愚智迅感一物不得其正穎士呼吸折節而獲重祿不易一刻之安及於孔子之門皆達者與使德秀據師保之位瞻形容乃見其仁迅被卿位服居賓友謀治亂根源參乎元精乃見其妙穎士若百煉之剛不可屈使當廢興去就一生一死間而後見其節鳩集鳳池王及善才行猥冗為內史失所舉七白蒍賈曰子玉之敗子文之舉也舉以敗國將何賀焉傳叔孫穆子好善而不能擇人謂用豎牛不慎所舉君子不以言舉人以言取人失之宰豫以貌取人失之子羽宰豫言語之科而不仁淡臺滅明字子羽貌寢而賢徒多推士之名終乏知人之鑒受面欺之罪孔融薦彌衡表云人不易知受面欺之罪舉能其官惟爾之能所舉得人亦爾之能周書稱匪其人惟爾不任言是爾不稱其任也公議得失魏諸葛誕為吏部郎人有所屬輒顯其言用之後有得失則公議舉者百僚由是慎其所舉也擇善得人必聞有賞非才而舉安可無辜聽言觀行子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行苟於人而聽言則舉事而失德始聽言而信行汝得人焉及論事而稽功豫聽否者既貌取而失人何面欺而逃責雖入貢於鹿鳴宜奉身於鷁退謝失舉宋弘薦桓談君山為議郎世祖令君山鼓琴如其繁聲弘聞召談責之談後於帝前鼓琴見弘失其常度帝怪問之弘免冠謝曰臣本舉談望以忠正導主而今朝廷欣悅鄭聲臣之罪也帝乃改容謝弘席稿史應侯范睢任鄭安平為將擊趙為趙所困遂以二萬人降趙睢席稿請罪又舉王稽為河東守三年不上計坐誅睢日不懌受失舉之謗陳實仲弓為郡功曹時中常侍侯覽托太守高倫用吏倫教署為文學掾實知非其人曰太守此人不宜用侯常待不可違乞從外署免塵明德從之人怪實失舉實終不言漢張勃舉陳湯湯父死不奔喪坐勃失舉削戶尋卒因諡曰繆孔請降考校趙璟考功歲終請如至德故事陳殿最璟自言薦韋證以貪敗請降考校奪俸贖金陸宣公奏議失實則奪俸贖金亟失則黜免同上皆有情故兼受賄賂同上諸司所舉皆有情故兼受賄賂不得實才臣請陛下當使所言之人詳陳所犯之狀某人受賄某舉有情陛下然後以事質於臣臣復以事質於舉主若便首伏則據罪抵刑如或有詞則付法閲實失實當暗謬之責同上惟賢知賢聖人篤論身苟濫進庸及知人不擇舉者之賢而責所舉之濫不可得已願少遵周漢之規以分吏部選即所用詳所失鮮矣魏元同李石用韓益判度支案以贓敗石曰臣本以益知財利不保其貪帝曰宰相用人知則用過則棄此謂之至公他宰相所用彊蔽其過此其私也李石傳
