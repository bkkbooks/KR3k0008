body:
  text: 卷第十九白天倫春秋公羊傳兄弟天倫也鴈行兄弟之齒鴈行燕兄弟詩常棣燕兄弟也閔管蔡之失道故作常棣焉棣萼常棣之華萼不韡韡莫如凡今之人莫如兄弟終鮮兄弟維豫與汝外禦其侮致美史佚有言兄弟致美陟岡陟彼岡兮瞻望兄兮兄曰嗟豫季行役夙夜無寐豫弟吾兄鶺鴒在原急難兄弟急難魯衛魯衛之政兄弟也兄愛弟敬不間於言孝哉閔子騫人不間於其父母昆弟之言兄良弟悌共被後漢薑肱字伯淮家世名族與弟仲海季江俱以孝行著聞友愛天至兄弟共被而寢不入房室以慰母心易衣汝南記李充兄弟六人家貧易衣而出併日而食兩驥劉正兄弟二人時號兩驥八龍荀爽兄弟八人時號八龍連枝同氣同胞三荊周景式孝子傳曰古有兄弟三人意欲分異出見三荊同株接葉連陰歎曰木猶欣聚況我而殊異哉閨門雍睦汝南先賢傳穎川陳實有子曰元方次曰仲方並以名德稱兄弟孝養閨門雍睦慕其風兄弟嘗過同郡荀爽夜會飲宴太史奏德星聚因心唯此王季因心則友則友其兄則篤其慶二陸入洛三張減價陸機士衡雲士龍張載孟陽協景陽亢季陽友于五常蜀志馬良字季常眉間有白毫兄弟五人時人為之語曰兄弟五常白眉最良貴介左傳曰王子圍寡君之貴介弟也介大也弟悅敬其兄則弟悅人兄教以弟所以敬天下之為人兄也骨肉之恩血屬手足之愛仁兄令弟哲兄寵弟季孟之間以睦兄弟禮長惠幼順禮家肥兄弟睦家之肥禮旁理禮曰旁理兄弟理正也敬長禮曰敬長為其近於兄也至悌禮立敬禮曰立敬自長始教人順長類兄也令兄詩此令兄弟綽綽有裕兄必長之辛廖語恩推形影寡兄書曰乃寡兄勗諸兄之言亦可畏也兄及弟矣式相好矣無相猶矣匪他豈伊異人兄弟匪他具來兄弟具來莫遠具爾戚戚兄弟莫遠具爾倡豫和汝伯兮叔兮倡豫和汝和協寡人有弟不能和協辭辟後漢鍾皓字季明以二兄未顯故不受公府辟夾河為郡杜周二子夾河為郡敵吾一體漢詔兄弟敵吾一體一支謂同父母也令兄北向丞相田蚡召客飲坐其兄蓋侯北嚮自坐東嚮為漢相尊不可以兄故私撓由比漸驕托病不仕魯恭憐弟平小欲就其名托病不仕佯喑不仕後漢董恢弟翊名高於恢宰府先辟之翊佯喑不肯仕及恢被命乃就孝廉俱在朝趙孝辟太尉府顯宗聞其行官至長樂衛尉弟禮為御史中丞帝嘉篤行寵異之詔禮十日就長樂衛尉府太官送供具對盡歡數年禮卒令孝從官屬送喪歸也喪毀劉紆早失母同産弟平尚幼鞠育與同起臥及成人未嘗相離平卒紆哭泣歐血而死王祥弟覽見後母門注難為兄陳元方季方共論其父因白實曰元方難為兄季方難為弟又王珉字秀粲少有才藝名出殉之右語曰法護非不嘉僧彌難為兄法護殉小字僧彌珉小字六龍卞壺兄弟並登宰輔世稱卞氏六龍第五之名晉何準兄為驍騎勸準仕準曰第五之名何減驍騎準兄弟中居第五也優劣戴逮逵之弟並驍果多權略逵厲操山東而逮以武勇顯謝安問志業何如逮曰下官不堪其憂家兄而不改其樂俱病王徽之與獻之俱病術人曰應終而有生人樂代則死者可生徽之曰吾才不如弟請代術人曰凡代死者已年有餘今君與弟算俱盡何可代獻之卒徽之奔喪不哭直上靈床坐取獻之琴彈之久而不調曰子敬人琴俱亡因一慟而絶八達安平王兄弟八人時號八達出下策周顗字伯仁友愛過常弟嵩因酒曰兄才不及弟橫得重名然蠟燭殳之顗神無忤徐曰阿奴火攻誠出下策競爽二惠競爽競爽猶皆善纍世同居後漢蔡雍與從弟同居三世不分財鄉里服其義又桑虞纍世同居閨門雍穆云云諫兄鄭均仲虞兄為縣吏頗受禮遺均諫不從乃為傭得錢帛歸與兄曰物盡可復得為吏坐贓終見捐棄兄感悟遂為廉潔托疾求母具後母門注不過從兄飯帝問第五倫伯魚曰聞卿為吏不過從兄飯有之乎對曰臣少遭飢亂實不敢妄過人飯帝大笑劉束帶兄獻每隔壁呼束帶而後語連枝同氣無鳴四鳥之悲金友玉昆詎見三荊之茂陟岡之望已深在原之情逾切偕崇共被之仁並篤同居之愛不睦不悌失教傳段不悌故不言弟稱鄭伯譏失教也不義不昵鬩牆兄弟鬩于牆管蔡閔管蔡之失道小忿兄弟雖有小忿不廢懿親義乖不問恩匪相容不令為愈不令兄弟交相為愈不能和協鄭莊公曰寡人有弟不能和協而使糊其口於四方不可以據詩亦有兄弟不可以據據依也縱尋斧焉傳宋昭公群公子樂豫曰公公室之枝葉也葛藟猶庇其本根故君子以為比而縱尋斧焉不可用也不友書云兄不友弟不恭不相能也日尋干戈高辛二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討不協吾兄弟之不協焉怨諸侯之不睦匪人于弟不念天顯大不克恭厥兄言為人弟不念天之明道不能恭事其兄出書兄亦不念鞠子哀大不友于弟言為人兄不念稚子之可哀大不能和友于弟不悌之刑周禮以八刑糾萬人二曰不睦之刑三曰不悌之刑虧恩失信信蠻夷之訴絶兄弟之國晉信莒祁訴以絶魯無復入偃之門主父偃為齊相遍召昆弟散五百金與曰無復入偃之門火攻見前注攻弟袁談欲攻弟尚王修諫曰敗亡道也兄弟左右手譬人將鬥斷右手曰我必勝乎排擯蜀志許靖與從弟劭俱知名有人倫盛名私情不協劭為郡功曹排擯靖不得齒敘也教敗五常恩虧一體既彰尋斧之醜豈慚尺布之謠道既爽於家肥罪宜論於邦憲既虧魯衛之義是同齊楚之失弟雖乖於克順兄亦爽於相容情雖不同無絶其愛傳謂兄弟奴畜衛青少時自平陽公主家歸其父父使牧羊先母之子皆奴畜之不以為兄弟皆能刷羽懷彼獸心異和氏之兄弟側目生嫌遵薛包之軌模脫身而去須敦友于之心遽失孔懷之禮事乖友弟迹忝參商雖有兄弟不如友生尺布可縫漢文徙淮南於蜀嚴道不食而死人謠曰一斗粟尚可舂一尺布尚可縫兄弟二人不相容分財不相容見上注推弟漢南記陰慶為朝陽侯其弟員與丹皆為郎慶推其居第園田奴婢分與員丹但佩印而已當代稱美之讓田益部傳李孟元性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績日給而已推財王商為侯推財與弟身無所受脫身史卜式脫身出分取羊百餘口餘田宅財物悉與弟式乃入山牧羊去婦汝南記李充兄弟六人貧無擔石之儲具妻謂充曰我有私財可異居充乃集宗族而起白母曰此婦令充異居叱之出門訟田漢韓延壽為左馮翊行縣至高陵有昆弟訟田延壽傷曰骨肉爭訟是教化不至乃閉閣自思過於是訟者相責讓肉袒願以田相和終死不爭延壽恩信如此無有訟人也班諸貧者禮子柳之母死既葬子碩請以賻布之餘具祭器子柳曰君子不家於喪請班諸兄弟之貧者自撾繆彤字公豫兄弟四人同財及各娶兄弟求分異彤乃掩戶自撾曰修身謹行學聖人法將以齊整風俗奈何不能正家及諸婦聞之叩頭謝過更為敦睦之門取肥田許荊祖父武第五倫舉武乃為孝廉以二弟普晏未顯欲成之乃謂白禮有別居乃剖財為三分自取肥田強奴婢鄉人皆稱二弟義讓普晏等以得舉武乃會宗族泣曰吾盜聲位二弟未立所以自取人譏今理産所增三倍於前悉推二弟一無所留取荒田薛包好學敦行弟求分財異居包不能止乃中分其財奴婢取老弱者曰與我共事久矣田園取其荒者曰吾少時所理意所戀也器物取其朽敗者曰吾素所服食身口所安也虧魯衛之義既不相容聽齊楚之辭是為俱失情乖致美分且求多多自與項羽短於財卜商均分君子取分分爭辨訟非禮不決禮躬自厚也分無求多臨財無苟得瓜割豆分死喪天倫之戚孔懷死喪之戚兄弟孔懷哭廟孔子曰兄弟吾哭諸廟寡兄弟子路曰吾寡兄弟而不忍除也姊喪灑血陳業兄渡海同死六十人骨肉消爛而不可別業乃剖臂流血以灑骨上而後別也含癰徐苗弟亡臨殯口中有癰膿苗含去之獨亡之憂司馬牛憂曰人皆有兄弟我獨亡不縗禮郕人有兄弟死而不為縗者聞子皋為郕宰遂為之縗郕人曰蠶則績而蟹有匡范則冠而蟬有緌見則死而子皋為之縗終鮮兄弟惟豫與汝詩斷手之悲同母異父禮公叔木有同母異父昆弟死問於子遊子遊曰其大功乎狄儀有同母異父昆弟死問於子夏子夏曰我未之前聞也魯人則為之齊衰今之齊衰狄儀之問也奔喪禮奔兄弟喪先之墓而後之家為位而哭旁殺禮謂兄弟之喪以親疏為輕重存乎書策子曰兄弟之喪存乎書策矣言其有常禮也內除禮兄弟之喪喪內除哀隨禮殺也如剡期之喪如剡言痛也人琴俱亡見上注哀毀見上注棣萼凋零形影增悲不離墓所後漢馬援兄卒行服期年不離墓所心喪三年馬稜字伯威少孤依從兄毅共居恩猶同産毅卒稜心喪三年用刑事具刑法罰親事中鄭伯克段傳鄭伯克段于鄢段不弟故不言弟稱鄭伯譏失教周公殺管叔管蔡流言以亂周室周公乃殺管叔而放蔡叔無使滋蔓段不弟祭仲諫曰無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎遷蜀嚴道見上注荊雖念於同根草宜除於滋蔓孽由自作法豈相容漢書兄弟二人不相容漢文淮曲王也揚干亂行晉侯不罪其用鉞傳晉侯弟揚干亂行於曲梁魏絳戮其僕晉侯謂絳曰寡人有弟不能教訓使于大命絳謝曰不敢廢命至于用鉞鮒也鬻獄叔向亦明其正刑鮒叔魚也叔魚為理官納雍子之女蔽罪邢侯邢侯殺雍子叔向曰三人同罪施生戮死可也雍也買直鮒也鬻獄刑侯專殺其罪一也仲尼曰叔向古之遺直也治國制刑不隱於親絶愛斷恩斷手之痛天倫固絶不友匪人失教虧恩雖義除一惡而教失五常雖存國禁終爽家肥恩既遺於形影義遂爽於急難非大義之可誅亦小過而宜忍患難爭死孔融兄褒以容張儉事發兄弟爭死竟坐褒讓生令平代死載旌史衛宣公與使子白旄告盜曰馬白旄殺之壽子聞之載其旌而往盜殺之伋子至曰我之求也彼何罪焉盜又殺之二子同舟思伋壽也二子爭相為死衛人嘉之而作是詩見危授馬秦録姚襄戰馬中流矢弟萇下馬授襄曰天下可無我不可無兄患難相死詣賊相代後漢趙孝弟禮為賊所得將食之孝自縛訪賊曰禮瘦不如孝肥賊感其意而俱捨之遇赤眉王琳弟又兒萌梁國車成弟為賊所得與趙孝事同又淳于恭弟為賊所得請代得免死爭難兄弟急難別離四鳥之悲孔子聞婦人哭聲謂顏淵曰此非獨喪哀又有別離之苦何以知之曰昔恆山萌鳥塵四子羽翼既成將欲分飛聲類於此問之果然父死賣豫以葬三荊之變田真兄弟欲分其夜庭前三荊便枯兄弟嘆之卻合樹還榮茂陟岡之望見上在原之恩叔出季處義兄弟孔子兄事子産史記孔子過鄭與子産如兄弟兄事子産張湯趙禹漢張湯趙禹共定律令務在深文禹至少府湯為廷尉交歡湯兄事禹季心心長事袁紹以兄事之而弟畜灌夫籍孺子立侍終日蜀志關羽張飛為別部司馬先王與二人寢則同床恩若兄弟二人廣坐立侍終日孫權母謂權曰公瑾伯符同年小一月耳我視之如子汝可兄事之孔名重當時韋綬韋纁兄弟名重當時聞哭麻恚不食劉崇龜其弟崇魯與崔緯善帝以李磎輔政緯懼見奪共謀沮之及磎黑淋出崇魯輒掠麻大哭帝問焉崇魯曰今雖乏人豈宜取儉人為宰相磎由是不得相崇龜聞哭麻恚不食曰吾兄弟未始以聲利敗名今不幸乃生是兒哀慟過期趙弘智父事兄弘安俸祿歸之不敢私弘安卒哀慟過期兄弟情天至惠文太子範駙馬都尉裴虛已坐私與範遊徙嶺南然帝於範無少間也謂左右曰兄弟情天至於我豈有異哉對管華近溫大雅遷黃門侍郎而彥博亦為中書侍郎對管華近帝嘗從容謂曰我起晉陽為卿一門耳同氣尉遲恭隱巢計日急恭與長孫無忌入白曰大王不先決社稷危矣秦王曰我惟同氣所不忍尚節義李績季弟感年十五有奇操李密敗陷於世充令作書召績對曰兄尚節義今已事主昆弟不能移也杜楚客杜如晦弟楚客貞觀四年召為給事中太宗曰人不恤無官患才不副而兄與我異支一心者爾當如兄事吾而輔我楚客頓首謝每宴自比東晉王謝崔湜與弟液澄從兄蒞並以文翰居要官每宴私自比東晉王謝曰吾一門入仕歷官未嘗不為弟一丈夫當先據要路以制人豈能默默受制於人哉河東三鳳薛元敬隋選部郎邁之子與收及族兄德音齊名世號河東三鳳收為長離德音為鸑鷟奏事升殿鄭善果詔與裴寂等十人每奏事得升殿而從父兄元璹亦與時以為榮明經高第張知謇兄弟五人知玄知晦知泰知默皆明經高事容而才兄弟容而才謂之兩絶華首同貴帝復位拜知謇左衛將軍知泰御史伯仲華首同貴母所鍾念岑文本弟文昭任校書郎多交輕薄帝不悅謂文本曰卿弟多過朕將出之文本曰臣少孤母所鍾念者弟也不欲離左右今若出外母必憂無此弟是無老母也泣下嗚咽帝愍其意召文昭讓敕卒無過同受學虞世南與兄世基同受學於吳顧野王哀毀骨立宇文化及已殺帝欲殺世基而世南抱持號訴請代不能得自是哀毀骨立兄弟優劣李義琰使高麗其王據榻召見義琰不拜曰吾天子使可當小國之君奈何倨見我王詞屈為加禮及義琛再使亦坐召之義琛匍匐拜伏時人由是見兄弟優劣與弟為聞友劉審禮與弟延景為聞友得祿多資之友睦郝處俊兄弟友睦異母韋嗣立與承慶異母少友悌母遇承慶嚴每笞輒解衣求代母不聽即遣奴自捶母感寤為均愛人多其友陸景融於象先後母弟也象先被笞景融諫不入則自楚母為損威人多其友三列宿韋湊祖叔諧貞觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武同省時號三列宿教之耐事婁師德其弟守代州辭之官教之耐事弟曰人有唾面潔之乃已師德曰未也潔之是違其怒正使自乾爾撫昆媦友愛姚璹李氏花萼集李乂事兄尚一尚貞孝謹甚又俱以文章自名同為一集號李氏花萼集從祖弟白居易與弟行簡從祖弟敏中友愛相恃以長張嘉貞奏事京師玄宗善其政數慰勞嘉貞自陳少孤與弟嘉祐相恃以長今為鄯州別駕願內徙使少相近冀盡力報死無恨帝為徙嘉祐欣州剌史本傳哀毀如大喪畢構弟栩大府留司東都聞疾馳歸及卒哀毀如大喪雖變服未嘗笑天下稱其友佛文詞類其兄白敏中武宗雅聞居易名欲召用之是時居易足病衰廢宰相李德裕言其衰薾不任事即薦敏中文詞類其兄而有器識即日知制誥兄弟八人皆擢明經裴寬兄弟八人皆擢明經任臺省州剌史兄弟終不相下唐高祖謂建成世民見權寵太盛極言皇甫鏞見兄鎛權寵太盛每極言鎛不悅乃求分司鎛敗朝廷賢之時號三楊楊憑與弟凌凝皆有名大曆中踵擢進士第時號三楊營丐李建初建為學時家苦貧兄造知其賢為營丐使就之故遜建皆舉進士兄弟皆有志行裴子餘家闈友愛兄弟六人皆有志行三品崔鄯兄弟六人至三品邠郾鄲凡為禮部五吏部再唐興無有也搢紳景重高釴諸弟皆檢願友愛為搢紳景重言兄才可任高元裕自侍講為中丞文宗難其代元裕表言兄少逸才可任因以命之世榮其遷士林器許韋綬弟纁有精識為士林器許兄弟皆名重當時榮冠當時李光進為都將光顏亦至大夫故軍中呼大小大夫俄為振武軍節度使賜姓以光寵之別詔光顏拜洛州剌史兄弟榮冠當時人之杞梓韋述弟逌迪學業亦亞述與逌對為學士與迪並禮官搢紳高之時趙冬曦兄弟亦各有名張説嘗曰韋趙兄弟人之杞梓轅門二龍烏承玼與族兄承恩皆為平虜先鋒沈勇而決號轅門二龍兄弟和粹穆贊兄弟皆和粹是以珍味目之贊少俗然有格為酪質美而多入為酥員為醍醐賞為乳腐弟病棄官杜牧分同東都以弟覬病棄官篤行杜佑從弟郁痼疾躬為營方藥羞膳及死期而泣世稱其篤行並據顯劇崔琯進右丞時弟珙任京兆尹並據顯劇處世以為榮兄弟同臺楊收弟嚴自浙西判官擢監察御史而收亦自西川遷兄弟同臺世榮其友張巡巡與兄曉名稱重一時不娶終身陽城年長不肯娶謂弟曰吾與若孤惸相育既娶則間外姓雖共處而益疏我不忍弟義之亦不娶遂終身太沖無兄孝端無弟李知本父孝端事隋為獲嘉丞與族弟太沖俱有世閥而太沖官婚最高鄉人語曰太沖無兄孝端無弟德望相埒李至遠兄弟皆德望相埒比漢荀氏賀德仁兄弟八人時比漢荀氏請告往視孫成為洛陽令兄宿為華州剌史因悸病瘖成請告往視不待報輒行代宗嘉其悌不責也世推顯家孫簡歷河中興元宣武節度使而弟範亦為淄青節度使世推顯家俱列棨戟崔琳事見戟門又張暐贈開府儀同三司子履冰金吾將軍弟季良殿中監俱列棨戟死難薛膺其弟齊佐興元李絳幕府絳遇害齊死於難膺聞不及請馳赴之哀甚聞者垂泣不能容弟蕭至忠泣諫帝名相上下盧奕與兄奐名相上下而剛毅過之坐死不及兄弟有司建議謀反大逆惟父母坐死不及兄弟請更議詔群臣大議播曰兄弟雖孔懷之重然比於父子則輕故生有異室死有別宗今高官重爵本蔭惟逮子孫而不及昆弟烏得榮隔具蔭而罪均其罰詔從播議三珠樹王勃初勉劇勃皆著才名故杜易簡稱三珠樹不得遷李揆兄揩有時稱滯冗官不得遷自劾鄭雲逵弟方逵悖悍結徒剽劫父欲殺之不克雲逵自劾不能教恐赤臣家詔錮死黔州五短五長王維三遷尚書右丞縉為蜀州剌史未還維自表已有五短縉五長臣在省戶縉遠方願歸所任官放田里使縉得還京師議者不之罪弟兄六人俱有名劉知幾與兄知柔俱以善文詞知名鄉人以其弟兄六人俱有名號其鄉曰高陽里曰居巢兄弟天生之羽翼玄宗賜讓皇帝昆令季強兮鄉黨附杜牧望故園賦急熱同手足感懷詩與弟友愛王鉷與弟銲友愛銲疾鉷宦達常忿慢鉷終不異情與三從昆弟居朱敬則與三從昆弟居四十餘年資産無異楊穆兄弟優劣貞元中楊氏穆氏兄弟人物概不相下或云楊氏賓客皆同穆氏賓客皆殊以此優劣之李肇國史補遺兄弟欲行凝涕留孤飛一鴈秦雲秋李白送族弟詩故鄉有弟妹流落隨丘墟杜甫詩兄弟七人皆擢進士第為衣冠光韙薛播兄弟衎衎以相友柳宗元序飛鳴還接翅行序密銜蘆得觀書杜甫詩皆有美譽陸象兄弟景倩景融景獻景裔僧一行少時與象先兄弟相善嘗謂人曰陸氏兄弟皆有士行古之荀陳亡以加之也兄弟相代閻立本代兄立德為工部尚書兄弟相代為入座時人榮之間以兄弟嗣來京師會于舊里若璩瑒在魏機雲入洛柳宗元詩序白猶子引進禮兄弟之子猶子也蓋引而進之廣受之榮漢疏廣為太子太傅兄子受為少傳朝廷以為榮籍咸之會竹林南阮北阮晉書阮咸字仲容任達不拘與叔籍為竹林之興諸阮居道北籍咸居道南南阮富而北阮貧吐哺世説郤鑒遇永嘉亂窮餒鄉人共食之常攜兄子外甥就食鄉人辭不能兼濟乃獨往輒含飯於兩頰歸吐與二子垂誡馬援有誡兄子嚴書香囊晉書謝玄嘗佩紫羅香囊叔安惡之而不欲傷其意因戲賭得焚之杖晉謝安嘗欲詣陸納納兄子俶密作食供之納設茶果而已淑下精飯食客罷納大怒杖四十曰不能光我叔父而乃穢我素風千里駒晉書符朗字文達堅從兄子也堅常目之曰吾家千里駒諸父詩我有肥羜以速諸父裏言傳曰寡人之出叔父無裏言篤猶子之愛文選癡叔晉王湛字叔仲兄弟宗族皆以為癡兄子濟因共談易剖析精妙大奇之初武帝見濟輒曰卿冢癡叔死未濟常無以答復問濟曰臣叔不癡山濤已下魏舒已上由是顯名十起後漢第五倫字伯魚或問倫有私乎曰余兄子嘗病一夜十起退而安寢余子有病雖不省視而通夕不寢若是可謂無私乎雪詩晉謝安常內集俄而雪下安曰白雪紛紛何所似兄子朗曰撒鹽空中聊可擬林下之情見上幼姪早孤恩深伯道晉書鄧攸字伯道永嘉亂走擔其兒及其弟子綏度不能兩全乃謂妻曰吾弟早亡唯有一息理不可絶耳應自棄我兒妻泣從之與夷宋穆公疾囑兄子與夷曰先君舍與夷而立寡人寡人不敢忘若棄德不讓是廢先君之舉先君若問與夷其將何辭以對乃立之自捶後漢淳于恭兄崇卒恭養孤幼教訓學問有不如法反自捶以感悟之兒慚改過辭辟命避叔父後漢劉矩有高節以叔父遼未仕絶州郡之命太尉朱寵嘉其志義故遼為諸公所辟至太尉號為賢相推與伯父後漢張禹字伯達推田宅與伯父身自寄止分封魏志云王基封安樂鄉侯上疏來分封二百戶賜叔父子喬爵關內侯以報叔父詔特聽之詣賊張範字公儀子凌及弟子畿為山賊所執範詣賊賊還範子範曰君厚矣吾憐畿小請以易之賊美其言感而悉還之叔母勸晉書皇甫謐字士安年二十時不好學遊蕩得瓜果與叔母任氏曰三牲之養無慰我心昔孟母三徙終身篤學對之流涕謐感激帶經而農又羊助妻辛氏字憲英鍾會為鎮西憲英謂從子祜曰會非處下之道畏有他志云云祜常送錦被憲英反覆之芝蘭玉樹謝玄與從兄朗為叔父安所器因戒約子姪曰子弟預何人事譬如芝蘭玉樹欲使生於階庭也伯兮叔兮燕私諸父兄弟備言燕私又千里駒魏曹休字文烈太祖姪子太祖曰吾家千里駒賣子活姪晉孔嚴字彭祖為吳興太守時餘杭婦人經年荒賣其子以活夫之況子又武康有兄弟妻各有孕弟遠行未反遇歲荒不能兩全棄其子而活弟之子嚴並褒薦之論者美焉伯叔之喪踴不絶地如此者由文矣哉義服恩輕也姪女兄之子子謂南容邦有道不廢邦無道先於刑戮以其兄之子妻之篚器之訓晉書庾袞孤兄女曰芳將嫁美服既備袞乃艾荊若為箕帚命芳曰汝將事舅姑灑掃庭內婦人道也故賜汝篚器之為美欲使汝溫恭朝夕柳絮之詩晉書王凝之妻謝氏道韞叔安常問毛詩何句最嘉道韞曰吉甫作誦穆如清風又嘗內集俄而雪下安曰何所似道韞曰未若柳絮因風起安大悗適凝之不樂安曰王郎謝氏之子不惡汝何恨也道韞曰不意天壞之中乃有此王郎也南宮縚禮南宮縚之妻之姑之喪夫子誨之髽曰爾無從從爾爾無扈扈爾蓋榛以為笄長尺而總八寸注從從謂大高扈扈謂大廣總束髮垂為飾齋縗之總八寸也縚南言閲字子容其妻孔子兄女也夏侯淵魏志淵字妙才時大亂飢之棄其子而活亡弟孤女遺腹姪女後漢劉平弟仲為賊所殺扶母奔逃仲遺腹女一歲平抱仲女而棄其子母欲取之平曰力不能兩活仲不可絶類姪繼叔恭繼黯宗後漢伏恭字叔高湛之兄子湛弟黯字雉文治齊詩位至光祿無子以恭為嗣少繼從父宋書謝弘微本名密年十歲出繼從叔父峻長還本生晉皇甫謐字士安漢太尉嵩之曾孫也出繼叔父徙居新安謐年四十叔父有子謐喪本生遂還其父孔慈均所生趙宏智撫兄子慈均所生門內幾盡杜楚客與叔父淹皆沒於王世充淹與如晦有隙譖其兄殺之并囚楚客瀕死世光平淹當誅楚客請于如晦不許楚客曰叔殘兄今兄又棄叔門內幾盡豈不痛哉如晦感悟請封兄子魏徵以定五禮當封一子縣南徵請封孤兄子叔慈帝愴然曰此可以勵俗即許之撫諸姪同已姪徐彥伯撫諸姪同己姪與群子姪均指使盧邁叔下邽令休沐過家邁終日與群子姪均指使無位貌之異時已進中書侍郎邁再娶無子或勸畜姬媵對曰兄弟之子猶子也可以主後寄門戶任瓖父陳將忠之兄為定遠太守瓖早孤忠撫愛甚常曰吾子雖多庸保耳所以寄門戶者瓖也南北鄭相鄭餘慶與從父絪家昭國坊絪第在南餘慶第在北世謂南鄭相北鄭相云從父賈循從子隱林德宗問家世答曰故范陽節度副使循臣從父也帝異之二父韓弘子公武從弘入朝為右金吾將軍弘出河中弘弟充徙宣武乃曰二父居重鎮我以孺子又當執金吾職乎因固辭改右驍衛大將軍兄弟子李泌太子妃蕭母郜國公主也坐蟲媚幽禁中帝怒責太子太子不知所對泌入帝數稱舒王賢泌揣帝有廢立意曰臣衰老位宰相以諫而誅分也使太子廢他日陛下每曰我惟一子殺之泌不吾諫吾亦殺爾子則臣絶祀矣雖有兄弟子非所歆也撫孤姪韋夏卿撫孤姪恩踰己子篤恩義岑文本撫弟姪篤恩義剖竹赤城邊李白送楊山人我家小阮賢剖竹赤城邊詩人多見重官燭未曾然同上推為叔父羅威賦詠甚有情致錢塘人羅隱有詩名自號江東生威遣使賂遺敘其宗姓推為叔父威酷嗜其詩目己所為曰偷江東集舊史族子李栖筠族子華每稱有三佐才士慕向治居汲共城山下華因請舉進士俄擢高第伯父杜兼祿山亂兼尚幼逃入終南山伯父存介為賊執臨刑兼號呼願為奴以贖遂皆免興門柳公綽始生三日伯父子華曰興吾門者此兒也因小字起之白諸舅詩曰既有肥羜以速諸舅展我甥兮渭陽渭陽康公念母也秦康公送晉文公于渭之陽曰我見舅氏如母存焉何以贈之路車乘黃白水之誓晉文公謂子犯曰所不與舅氏同心者有如白水投其璧于河明珠王武子衛玠之舅也武子語人曰與吾甥坐炯然若明珠之在側宋鄭傳曰宋鄭甥舅我之自出謂我甥也酷似其舅何無忌吐哺見叔姪門注屬徙禮屬從者所從沒也亦服注屬從謂母雖沒亦為之服母黨禮曰睦於父母之黨可謂孝矣黨親也豈伊異人兄弟甥舅伯舅叔舅長曰伯舅少曰叔舅元舅千之元舅文武是憲汾王之甥韓侯娶妻汾王之甥宅相晉魏寄字元陽少孤為外家寧氏所養寧氏起宅相者曰當出貴甥寄曰當為外氏成此宅相賞愛殷浩甥韓伯浩素賞愛之浩被廢徙東陽韓隨至徙所經歲餘還都浩送至渚側詠曹顏遠詩云富貴他人合貧賤親戚離因而泣下乞墅謝安與姪玄賭墅顧謂甥羊曇曰以墅乞汝安薨曇輟樂彌年行不由西門路嘗因石頭大醉不覺至州門左右曰此西門曇悲感以馬策叩扉詠曹子建詩生存華屋處零落歸山丘慟哭而去焉有此甥王悅造其舅范寧寧曰卿風流雋望後來之秀悅曰不有此舅焉有此甥元舅謝絢於公座戲調其舅袁湛湛不堪曰汝父輕舅汝今復加我可謂母無渭陽情絢父重即正胡外孫與舅有不葉之論絢字宣美食肉國語晉公子重耳以伐逐其舅子犯曰若吾無濟吾食舅氏之肉不討賊漢郭解甥恃解強人酒人不堪怒殺之而逃解以甥不直不為討賊周翼無托養存郤家孔帝甥竇抗母隋文帝姊安成公主也抗以帝甥蚤貴入太學釋褐宮中稱舅歸長安高祖以兄呼之宮中稱為舅請度為浮屠張知默掌詔獄數陷大臣雖其甥惡鞠引之暴不得去請度為浮屠后許之舅許長孫無忌太子承乾廢帝曰我欲立晉王無忌曰謹奉詔異議者斬帝顧王曰舅許汝矣宜即謝王乃拜事舅謹甚郝處俊事諸舅謹甚宦達與舅許圉師同里俱宦達識略過人封倫年方少舅盧思道曰是兒識略過人當自致卿相使舅家移塋李義琰改葬其先使舅家移塋而兆其所帝聞怒曰是人不可使秉政悉廩祿裴守真關中旱悉廩祿奉姊及諸甥給與王佖李晟之甥武敢間騎射晟在師佖無不從晟視佖與子姪等其給與過之引庇它族張克勤左將衛大將軍有詔賜一豫五品官克勤以息幼推與其甥裴夷直劾曰克勤骫有司法引庇它族開後日賣爵之端不可許詔聽遂著于令無罪斬甥劉昌寧陵之圍昌令守陴內顧者斬昌孤甥張俊守西北未嘗內顧稡下斬之士有死志史臣謂勒兵乘城與賊抗所賴推賞罰爾今無罪而斬其甥士心離離不祥莫大焉少依舅家韓充少亦依舅家約為甥舅王重榮子珂全忠自洛至全忠王出也始背賊事重榮約為甥舅得以全己指日月曰我得志凡氏王者皆事之至是忘誓言過重榮墓偽哭而祭次虞卿珂欲面縛牽羊以見全忠報曰舅之恩無日可忘君若以亡國見黃泉其謂我何珂出迎握手泣下駢轡以入居旬日以存敬守河中舉珂室從于汴抵舅罪王師範舅醉殺人其家訴之師範厚賂謝訴者不置師範曰法非我敢亂乃抵舅罪母恚之師範立堂下日三四至不得見三年拜省戶外不敢解殊宗而代疏姚崇外甥任奕任異少孤長於崇家乃與之立家産謂之曰爾吾無間然矣惜殊宗而代疏矣命與其子同名冀無以別也時人多之真珠室皇甫松牛奇章公之甥怨公不薦作謗詩曰夜入真珠室朝遊玳瑁筵真珠公侍妾名也托言不時至斬之竇軌以甥為腹心嘗夜出呼不時至斬之負以出入陽城寡妹依城居其子四十餘癡不知人城常負以出入季父母舅反拜姪甥頭盧革傳吏部銓文書不完吏至有私鬻告敕亂易昭穆而季父母舅反拜姪甥者五代史甥姪亦有名稱裴寬白合謀魏志楊阜與外兄薑敘合謀攻馬超大敗之以報殺本州剌史太守讎令鼓琴晉阮瞻字千里讀書不甚研而默識其要善彈琴伯兄潘嶽每令彈琴終日達夜無忤色不可得以榮辱讓封羊祜進爵乞封舅子蔡襲不餞送城陽太守梁柳皇甫謐從姑子之官有勸謐餞之謐曰柳為布衣送迎不出門食不過鹽菜貧不以酒肉為禮今作郡選之是貴城陽太守而賤柳豈中古之人情非吾心所安也朗陵公文選詩序曰朗陵公何敬祖余之從外兄也孔為育其女柳公綽外兄薛宮早卒為育其女嫁之外家之寶韋述父景駿元行沖景駿姑子也為時儒宗常載書數車自隨述入其室觀書不知寢食行沖異之試與語前世事熟復詳諦如指掌然使屬文受紙輒就行沖曰外家之寶也中外屬我與子當中外屬當為伯仲其抵我書執禮太卑劉禹錫答薛郎中論書儀勵志於學孔若思陳亡客居鄠勵志於學外兄虞世南曰本朝淪覆吾分湮滅有弟若此知不亡矣時以為榮鄭善果兼民部尚書與裴寂等十人每奏事及侍立並令升殿與從兄元璹在其數時以為榮舊史倨不冠帶崔彥昭與王凝外昆弟也凝太中初先顯而彥昭未任嘗見凝凝倨不冠帶嫚言曰不若從明經舉彥昭為憾至是凝為兵部侍郎母聞彥昭相敕婢多制履襪曰王氏妹必與子偕逐吾將共行彥昭聞之泣且拜不敢為怨而凝竟免本傳帝問子俶跪奏臣舅子李泌李泌開元十六年悉召能言佛老者相答難禁中有員淑者九歲升坐詞辨注射帝因問童子豈有類若者俶跪奏臣舅子李泌帝即馳召之泌既至帝方與張説觀奕因使賦方圓動靜泌即答説因賀帝得奇重白不通問禮嫂叔不通問問遺也無服推遠禮嫂叔之無服也蓋推而遠之不撫禮嫂不撫叔叔不撫嫂為喪服中為位禮子思之哭嫂也為位為別世説阮籍嫂常還家籍見之為別或譏之籍曰禮豈為我設耶溺孟子曰嫂溺援之以手權也嫂溺不援豺狼也前倨後恭史記蘇秦憔悴而歸兄嫂弟妻不下機嫂不為炊及為秦相佩六國相印歸昆弟妻嫂側目不敢視秦秦笑謂曰何前倨而後恭嫂謝曰見季子位高金多也不長者漢高祖微時嘗與賓客過其丘嫂嫂厭叔佯為羹盡轇釜客已去而視釜中有羹由是怨嫂羹盡及立獨不封其子太上皇為言高祖曰非敢忘也為其母不長者故封其子為頡羹侯轇音歷不冠後漢馬援敬事寡嫂不冠不入廬爭田逸民傳高風為太守所召恐不得免乃與寡嫂爭田由是不仕不如無陳平與兄伯居伯常縱平遊學人或謂平何食而肥其嫂嫉平不視家産曰食粳核耳有叔如此不如無伯聞之遂棄其婦核音核麥粳中不破者小郎新婦魏志王澄字平子衍季弟衍妻郭氏貪鄙令婢擔糞澄年十四諫郭郭怨謂澄曰太夫人臨終以小郎囑新婦不以新婦囑小郎投裾杖之澄踰窗得免解圍晉王凝之妻謝氏道韞獻之與客談議辭理將屈道韞遣婢白獻之曰欲與小郎解圍乃施青紗步障自蔽論獻之前義客不能屈也親省青囊藥晉書顏含字弘都嫂老失明含躬親省視病須髯蛇膽為藥含求不得有童子持一青囊授含開視乃髯蛇膽出戶化為青鳥飛去嫂疾便愈養嫂東方朔上書曰臣少失父母長養兄嫂又後漢第五訪字子謀少孤貧傭耕以養嫂魏舒曰得八百戶長將老嫂入官舍斯願足矣殺嫂晉書慕容熙字道文僣即尊位寵符氏立為皇后符氏無嫂張氏美姿容熙乃殺之以為符氏之殉葬白團扇歌樂志云白團扇歌者晉中書令王玫與嫂婢有情其婢制扇歌以贈玫可謂之母禮謂弟之妻婦者是嫂亦可謂之母乎家嫂晉謝朗父據早卒總角時病新起體嬴未堪勞於叔父安前與沙門支遁講論遂至相苦嫂王氏再遣信令還安留使竟論王氏因出云新婦少遭艱難一生所寄唯在此兒因流流涕攜朗去謂座客曰家嫂辭情慷慨恨不使朝士見之盜漢書人言陳平善盜嫂又直不疑為郎朝廷毀不疑曰狀貌雖美善盜嫂不疑曰我無兄然終不自明孔奉嫂趙弘智奉嫂謹甚家事咨而後行王圭奉寡嫂家事咨而後行事寡嫂謹徐彥伯事寡嫂謹韓愈生三歲而孤隨伯兄會卒嫂鄭鞠之躬踐教義魏徵定服制議且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顏弘都則端肅致感馬援則其見必冠孔伋則哭之為位此並躬踐教義仁深孝友白諸姑詩曰問我諸姑遂及伯姊從姑傳姪其從姑絶地禮曰姑姊妹之大功踴絶於地如知是者由文矣哉注降服恩重也受我而厚禮姑姊妹之薄也蓋有受我而厚之者所以夫家厚姑我薄也孔諫李昭德武承嗣任文昌左相昭德諫曰承嗣已玉不宜典機衡以惑衆庶且父子猶相篡奪況姑姪乎后矍然曰我未之思也乃罷姑姪母子狄仁傑曰姑姪與母子孰親見母子門張巡姊軍中號陸家姑張巡傳姑所服何年法漢陽公主文宗尤惡世流侈因主入問曰姑所服何年法今之弊何侍而然對曰妾自貞元間辭言所服皆當時賜未嘗敢變元和後數出禁藏纖麗物賞戰士由是散於人間內外相矜忸以成風幼從姑周世宗柴后兄守禮于幼從姑長太祖家以謹厚見愛白伯姊見上注歸妹既嫁妹也女弟月為姊王者姊事月留錢風俗通太原郝子廉飢不可得食寒不可得衣一分及一芥不取諸過姊留飯密留五十錢於席上而去姊親傳君子曰禮謂其姊親而先姑刖姊韓子梁車為鄴令其姊往見之暮而後至閉門因踰郭而入梁車刖其足趙成侯以為不慈奪璽而逐之同氣共胞血屬骨肉之愛漢杜周誠哀老姊東宮之妹詩碩人美莊薑曰東宮之妹內賓儀禮有司徹曰主人洗獻內賓十房中內賓姑姊妹也從妹傳連稱有從妹在公宮無寵使間公收育從妹後漢盧延遭王莽亂延從女弟年在孩乳其母不能活之棄於溝中延哀而收養遂至成人不留沐並德信嘗過姊妹為殺雞炊黍沐不留飯惡姊夫留錢范丹字史雲候姊姊飯之以姊夫不德留錢二百文賢姊詈楚辭曰女嬃之嬋娟兮申申詈余注嬃屈原姊也申重言也言嬃責原不與衆合乃見流故來牽引數怒也余猶我也義烈史記聶政妹事見上烈婦門教弟賈逵年五歲其姊聞鄰家讀書每抱逵聽之逵年十歲乃暗誦六經姊曰吾未有教入門汝安得三墳五典讀之逵曰憶昔抱聽鄰家讀書與粟吳志駱統字么緒年八歲時飢多有困者統為減飲食飼之其姊仁愛見統甚哀曰何不告我而乃自苦以私粟與統磨笄自殺趙襄子誘殺代王王夫人襄子之姊聞之磨笄自殺托弟於人梁異誅李同同少子燮字德公姊文姬賢而有智謀匿燮乃告父吏王成曰君執義於先公今委君以六尺之孤李之休戚在君矣成乃將燮東下得全姊喪尚右禮孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子亦皆尚左不忍除子路有姊之喪可以除而不除孔子問之曰何不除也子路曰吾寡兄弟而不忍也孔子曰行道之人皆不忍也先王制禮過之者俯而就之不及者跂而及之不可踰也遂除之寡姊不嫁東觀漢記秦彭字伯平為山陽太守欲嫁寡妹妹不嫁乃引鐮自害引刃烈女傳桓林姊妹夫劉敬仲早亡桓氏引刃割耳以示林事不諧矣後漢宋弘為太尉時帝妹胡陽公主新寡帝與共論群臣以微觀其意主曰宋公威容群臣莫及帝曰試圖之主坐於屏風召弘問曰貴易妻人情乎弘曰糟粳之妻不下堂帝回謂主曰事不諧矣老姊求名蜀志郭奕遷雍州剌史有寡姊姊下僮僕多有姦犯而殺人者吏孰之奕曰大夫豈以老姊求名遂遣而不問嫁姊妹歸妹婦人謂嫁曰歸東郭偃之妹傳齊棠公之妻東郭偃之妹棠公死偃御崔子吊之見棠妻美使偃娶之偃曰同宗也君出自桓我出自丁又筮之不吉曰嫠婦也何害前夫當之矣徐吾犯之妹見上擇夫門注得臣之妹衛莊公娶于齊東宮得臣之妹美而無子外妹左傳聲伯嫁外妹管于奚之女於施孝叔郤犨來聘求婦於聲伯聲伯奪施氏婦以與之外妹謂同母異父也姊妹壻維私詩曰談公維私爾雅云姊妹之夫為私鍾瑾妻李膺妹李膺祖修言鍾瑾好學類我家以膺妹妻之絶榖晉書郤超為臨海太守與妹夫王羲之邁世修黃老絶榖之術申祥之哭言申祥妻之昆弟也道原之睦潘嶽詩曰潘陽之睦有自來矣道原嶽妻之兄弟孔進粥李績性友愛其姊病嘗自為粥而燎其鬚姊戒止答曰姊多疾而績且老雖欲進粥尚幾何恭順韋顗蚤孤事姊恭順士推其禮法裴守真養寡姊謹甚士推其禮法水淳初關中旱悉廩祿奉姊姊卒悲梗成疾李元素少孤奉長姊謹悌及姊卒悲梗成疾因辭職事姊如母楊謹矜兄弟友愛事姊如母陸家姑張巡初子琦議生致一人慶緒所或曰用兵拒守者巡也乃送遠洛陽至偃師亦以不屈死拒之走臨淮巡有姊嫁陸氏遮王勸勿行不納賜百縑不受為巡補綴行間軍中號陸家姑先巡被害不嫁李氏妻王阿足夫妻無子以嫠姊高年無供養乃不忍嫁晝耕夜織能辦生事餘二十年姊乃亡輟公堂饌因話庾約為河南兵曹有寡姊在家約常於輟公堂已饌餉之世稱其德蘇頲事寡姊有禮世稱其德姊為內官劉禕之先是姊為內官武后遣至外家問疾禕之因賀蘭敏之私省之坐流嶲州后為丐還寡妹陽城事見甥舅門誨諸妹如嚴師尚宮宋若昭父廷芬生五女長若莘次若昭若倫若憲若荀若昭文尤高若莘誨諸妹如嚴師白孝孫祭稱孝子孝孫也順孫史虞詡孝養祖母縣舉為順孫孫謀詩曰貽厥孫謀以燕翼子祖業傳序云弘宣祖業抱孫禮抱孫不抱子此言孫可以為王父尸子不可以為王父尸必復畢萬筮仕曰公侯之子孫必復其始舍孫公儀仲子之喪仲子舍其嫡孫而立其庶子檀弓免焉子服伯子曰昔者文王舍伯邑考而立武王微子舍其孫腯而立衍仲子亦猶行古之道也孔子曰否立庶子周禮立嫡子纘乃祖服服行事也纘繼也爾祖無念爾祖王父禮曰逮事王父母則諱王父母謂之祖父母也忝祖忝辱也禮名孫凡父在孫見於祖祖名之謂生子見於祖以名之上殺謂祖以上喪服亦漸殺輕也下治禮上治祖禰尊尊也下治子孫親親也自義率祖禮自仁率親等而上之至于祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也注自用也率循也用恩則父母重祖輕用義則祖重父母輕哀孫禮喪稱哀子哀孫銘禮銘者稱揚先祖之美也此孝子孝孫之心螽斯之盛螽斯羽詵詵兮宜爾子孫振振兮必興吾門陳群為兒時祖實謂宗人曰此兒必興吾門與硯晉范喬字伯繇年五歲時祖馨撫喬首曰所恨不見汝成人以所見硯與之五歲父母告喬喬執硯涕泣受賜官晉鄧攸祖殷有賜官敕攸受之後太守勸去王官舉為孝廉攸曰先人所賜不敢改也靈運謝玄子煥不惠早卒煥子靈運才藻艷逸玄曰我尚生煥煥那得生靈運委蛻列子曰子孫非汝是天地之委蛻也本枝詩文王孫子本枝百世不為子孫留財産列子衛端木叔子貢世子也籍先資纍千金年六十棄家散庫一年盡不為子孫留財産散之一國及病無藥石之儲死無瘞埋之所受施者相與反子孫之財也又疏廣歸鄉里以所賜金日與鄉里樂飲子孫因鄉里長者勸及身在時為子孫立産業廣曰此金聖主所賜以惠養老臣故樂與鄉黨共之拜畫象魏志曹休文烈嘗為吳郡太守休後至吳於太守舍見壁上祖父畫像恭敬非怠乃下榻泣涕同坐嘉之假托魏賈詡字文和道遇氐羌同行數十人皆為所執詡曰我段公外孫也汝別理我我家必厚贖之段穎昔為邊將威震西土故詡假而懼於氐羌氐羌果不敢害也祖母老辭官晉李密字令伯徵為太子洗馬以祖母劉氏年老無人侍養乃止表陳情辭官字孫虞詡祖父為縣獄吏多所平理曰于公子孫竟至三公吾雖不及于公子孫何必不為九卿遂字詡曰升卿祖母思芹劉殷祖母王氏盛冬思芹而不言殷知之時年九歲乃於澤中慟哭乃有芹生於地得斛餘至芹生乃盡孔有祖風魏謨宣宗嘗曰謨名臣孫有祖風朕心憚之贊曰謨之論議挺挺有祖風烈詩所謂是以似之者歟紹訓姚珽始曾祖察嘗著漢書訓纂而後之注漢書者多竊取其義為己説珽著紹訓以發明舊儀省中盤石薛元超轉中書舍人省中有盤石道衡為侍郎時常據以草制元超每見輒泣然流涕孝通幽顯劉審禮少喪母為祖母元所養隋末大亂道不通審禮尚少自鄉里負祖母度江轉側避地及天下平西入長安元每疾病必親煮藥嘗而進元曰兒孝通幽顯吾一顧念疾輒間兼謨祖風狄仁傑孫兼謨有祖風當興吾宗王晙少孤好學祖有方奇之曰是子當興吾宗當嗣家聲狄兼謨遷御史中丞帝曰卿梁公後當嗣家聲不可不謹祖母入見王承元入朝祖母入見帝命中官禮賚異等祖勳衛次公為兵部侍郎故英公李績大理卿徐有功之孫皆以貧不得調次公召見曰子之祖勳在王府寧限常格即優補而遣不能盡識郭子儀諸孫數十不能盡識至問安但頷之而已勳業墮地馬璘少孤流蕩無所業年二十讀漢馬援傳至丈夫當死邊野以馬革裹尸而歸慨然曰使吾祖勳業墮于地乎為扶風郡王卒事祖母殷寅子亮事祖母如寅在材子賢孫唐宰相世系序材子賢孫不隕其世德
